  He was vague about his schooldays and couldn't say what happened to his old friends. At times the conversation veered as wildly as his accent – from claims he survived the London Tube bombing (he got the date wrong) to a story about once meeting Del Boy's sidekick Rodney. He repeatedly denied being Nicholas Rossi, but when I asked about tattoos he said he was "too tired" to show me his arms. It was a surreal, unconvincing performance that was being watched across the Atlantic by plenty of people who recognised the main character. "I'd know those hands anywhere," Mary Grebinski later told me. She'd been a college student in 2008 when Nicholas Rossi sexually assaulted her on the way to class. He was convicted and placed on the sex offenders register. In Dayton, Ohio – the city where that attack happened – I also spoke to Rossi's ex-wife. Kathryn Heckendorn said she had bought him the red silk pyjamas "Arthur" had been filmed wearing outside court. Their unhappy marriage lasted eight months. The judge who granted their divorce in 2016 said Rossi was guilty of "gross neglect of duty and cruelty" on account of his abusive behaviour. Conversations like this helped fill in the blanks.

  Rossi's ex-wife Kathryn Heckendorn recognised a pair of pyjamas he wore to one court appearance

  Nicholas Rossi was born Nicholas Alahverdian in 1987. Rossi was the name of his stepfather, who at the time was Rhode Island's premiere Engelbert Humperdinck impersonator. As a teenager he spent time in care and, years later, enjoyed a degree of local fame as a child welfare campaigner. When reports of Alahverdian's death emerged in 2020, politicians paid tribute from the floor of the Rhode Island State House. According to an online obituary his last words were: "Fear not and run towards the bliss of the sun." But it didn't take long for this deception to begin unravelling. A priest who had been asked to arrange a memorial mass was warned by a detective not to go ahead because "Nicholas isn't dead". Instead, the authorities suspected Rossi was somewhere in the UK, having fled after discovering that the FBI were investigating an alleged credit card fraud.

  The legal process dragged on in the Scottish courts

  It was his online footprint that ultimately led police to his hospital bedside in Glasgow – ironically as the fugitive was recovering from a genuine near-death experience in the shape of Covid. At one of his early extradition hearings the sheriff commented that advancing the case shouldn't be "rocket science". But the legal process dragged on and on – in large part due to Rossi's antics. There were rambling courtroom monologues, questionable medical episodes and theatrical outbursts which were often directed at his own lawyers as a prelude to sacking them. Sitting in the public gallery, it was rarely dull. Rossi's claim that a corrupt hospital employee called Patrick tattooed him while he was in a coma was one of the more memorable exchanges. In the end the sheriff's conclusion was that the Arthur Knight charade was "implausible" and "fanciful". And yet Rossi stuck to his story – even as his extradition was approved and High Court judges refused his appeal. He stuck to his story as US Marshals bundled him onto a private jet and as prison guards booked him into the Utah County jail. He stuck to his story in a Utah courtroom, until suddenly he didn't.

