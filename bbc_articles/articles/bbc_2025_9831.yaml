  Unravelling the case of a US fugitive who claimed to be the victim of mistaken identity after being traced in Glasgow.

  Nicholas Rossi: How the mask slipped during US fugitive's court saga

  Nicholas Rossi first came to public attention in the UK after his arrest in December 2021

  I first met Nicholas Rossi - or Arthur Knight, as he insisted on being called - in February 2022 in a corridor at Edinburgh Sheriff Court. He was there to fight extradition to the US, where he was accused of rape. Sitting in his electric wheelchair, dressed in a three-piece suit and sporting a wide brimmed hat, the raspy voice behind the oxygen mask was telling anyone who would listen that this was all a terrible misunderstanding. His hands, meanwhile, were hoovering up reporters' business cards. Rossi's departure that day set the tone for what became a familiar scene - a slapstick performance in front of the cameras during which he tipped his wheelchair onto the pavement while trying to manoeuvre into a waiting taxi. Later that evening an unknown number flashed up on my mobile phone and I heard that same raspy voice. "Hello Steven, it's Arthur... do you have a minute?" And so began an exercise in separating fact from fiction that continues three years later, which I have explored in a new podcast as part of the Strange But True Crime series on BBC Sounds.

  Police searching for an American fugitive are grilling Arthur Knight at his hospital bed. Does the ‘Irish orphan’ hold a clue?

  The name Nicholas Rossi first came to wider attention in December 2021 when he was arrested on the Covid ward of a Glasgow hospital. Staff had recognised his mugshot and distinctive tattoos from an Interpol wanted notice. The problem for the American authorities was that the man they were seeking to extradite swore blind he was the victim of mistaken identity. He claimed he was Arthur Knight, an Irish-born orphan who had never been to America - and said he could prove it. A couple of weeks after our first phone-call, "Arthur" was sitting opposite me in a BBC studio, his wife Miranda by his side, telling his tale for the cameras. He said he grew up in care in Dublin and escaped to London as a teenager. There, he sold books with his friends at Camden market, like Del Boy from the comedy Only Fools and Horses. Years later he married Miranda in Bristol before they moved to Glasgow. He showed me their marriage certificate - accompanied by a special licence from the Anglican Church, because "I wouldn't lie to the Archbishop of Canterbury". What he couldn't produce was a birth certificate. Or a passport.

