title: Man, 19 charged after disturbance closed Aberdeen arts venue - BBC News
date: '2024-08-17'
section: NE, Orkney & Shetland
url: http://www.bbc.co.uk/news/articles/c1m0e2em7mko
content: |-
  Police Scotland said specialist officers attended the incident near the Lemon Tree.

  The Lemon Tree venue was closed after the incident

  A 19-year-old man has been arrested and charged following a disturbance which forced an arts venue to close in Aberdeen city centre. Police Scotland said specialist officers attended the incident, which happened at about 16:55 on Friday in the Shoe Lane and Queen Street area. Officers were stationed outside the Lemon Tree performing arts centre but there were no reported injuries. The venue said it had cancelled Friday evening's gig due to "unforeseen circumstances", but gave no further details about the incident.

  The force said there was not believed to be any risk to the wider public. Hip-hop event Between the Lines had been due to be held at the venue. The Lemon Tree said ticket-holders would be contacted. The man is due to appear at Aberdeen Sheriff Court on Monday.
