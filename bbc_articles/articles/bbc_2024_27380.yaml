title: Mary Ward murder accused Ahmed Abdirahman is denied bail - BBC News
date: '2024-11-01'
section: General
url: http://www.bbc.co.uk/news/articles/cr5m27r7y62o
content: |-
  A 31-year-old man charged with the murder of Mary Ward has been denied bail in Dublin.

  Mary Ward was found dead at her home in Melrose Street on 1 October

  A 31-year-old man charged with the murder of Mary Ward has been denied bail. A Dublin court heard today that Ahmed Abdirahman and Mary Ward had a "tumultuous relationship". The 22-year-old mother of one was found dead at her home in Melrose Street, south Belfast on 1 October with a laceration to her neck. A broken glass stained with blood was found at the scene.

  Ahmed Abdirahman, originally from Somalia, was arrested in Dublin on 9 October and the case against him will be heard in Dublin. Ms Ward's body was found by police officers who went to her house on 1 October - but it is believed she was killed on 25 September. Mr Abdirahman travelled to Dublin on 26 September and attended the Mater Hospital for an arm injury from broken glass and an injured leg that day. He told healthcare staff he had fallen on broken glass the night before. Cloverhill High Court heard on Friday that there was CCTV, mobile phone, DNA and finger print evidence allegedly linking Mr Abdirahman to the crime. He was arrested in Dublin city centre after using a Revolut bank card linked to his phone, which was allegedly found at the crime scene in Belfast. Messages downloaded from the phone displayed "a tumultuous relationship" and ongoing conflict between the couple, the court heard.

  When he was first charged Mr Abdirahman told gardaí (Irish police) he was "not guilty". Mr Abdirahman, who came to Ireland in 2019, has no previous convictions in either jurisdiction. He has previously also lived in Kenya. Detective Sergeant James King told the court that gardaí had concerns Mr Abdirahman would leave the jurisdiction if granted bail. Mr King also noted that Ms Ward's phone had not yet been recovered and there were concerns it had been destroyed or would be if Mr Abdirahman were released on bail. Ms Judge Caroline Biggs said the "evidence is extremely strong" against the accused. She refused bail noting: "On the balance of probability (the accused) may seek to evade justice. "I am refusing bail in this circumstances."
