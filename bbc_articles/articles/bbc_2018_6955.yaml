title: How police foiled Khalid Ali's Westminster terror plot - BBC News
date: '2018-06-26'
section: General
url: http://www.bbc.co.uk/news/uk-44623809
content: |-
  How fingerprints on bomb parts in Afghanistan led to the capture of a would-be attacker in Whitehall.

  A British plumber has been convicted of planning a terror attack in Westminster and making bombs for the Taliban.

  Khalid Ali, 28, was arrested on 27 April 2017 in Parliament Street, where he was caught carrying three knives.
