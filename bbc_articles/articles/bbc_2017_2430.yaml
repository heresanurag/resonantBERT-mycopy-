title: 'South Africa v Sri Lanka: Bees stop play in third ODI - BBC Sport'
date: '2017-02-05'
section: General
url: http://www.bbc.co.uk/sport/cricket/38868267
content: |-
  A swarm of bees stop play midway through Sri Lanka's innings in the third one-day international against South Africa in Johannesburg.

  Last updated on .From the section Cricket

  A groundsman uses a fire extinguisher to disperse the bees at the Wanderers A swarm of bees stopped play midway through Sri Lanka's innings in the third one-day international against South Africa in Johannesburg. The bees disrupted play twice - sending players diving to the ground - before the game was officially stopped in the 27th over, with Sri Lanka on 117-4. A groundsman used a fire extinguisher to try to disperse the bees, before a beekeeper was called to the Wanderers. Play restarted over an hour later and South Africa won by seven wickets.
