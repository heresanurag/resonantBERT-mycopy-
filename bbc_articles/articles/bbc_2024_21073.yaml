title: 'Newspaper headlines: ''Shamed on TV'' and ''Taylor terror alert'' - BBC News'
date: '2024-08-08'
section: The Papers
url: http://www.bbc.co.uk/news/articles/c3vxlknrerro
content: |-
  A range of stories on Friday's papers including a terror scare which led to three Taylor Swift gigs being axed.

  Sadiq Khan has urged the government to revisit new social media rules, saying disorder in the last week shows imminent regulations are "not fit for purpose"

  A warning from the mayor of London that the UK's laws to counter misinformation are "not fit for purpose" is the lead in the Guardian, external. It quotes Sadiq Khan as saying ministers should revisit the Online Safety Act "very, very quickly" as, he says, the spread of online falsehoods contributed to the recent riots. The Daily Mail, external leads with details of some of the people convicted yesterday of taking part in the unrest. The paper says they include brothers who looted a library and a 69-year-old grandfather who's believed to be the oldest rioter to be jailed so far. In other news, the Times, external reports that Britain's levels of immigration have fallen "significantly" with curbs on visas leading to a decline in foreign workers and students coming to the UK. A Labour councillor being suspended is the lead for the Daily Express, external. The paper says Ricky Jones has been arrested after allegedly calling for the throats of anti-immigration protesters to be cut. Google and Meta made a secret deal to target under-18s with ads that promoted Instagram on YouTube, disregarding the search engine’s own rules around ad delivery to minors, says the Financial Times, external.

  Metro, external leads with news from Vienna after Austrian authorities foiled an alleged terror plot which had targeted Taylor Swift's tour and led to the cancellation of three concerts. The Daily Mirror , externalalso splashes on the "machete and bomb plot on Taylor Swift fans" - it says there is a Wembley safety review ahead of more gigs in London next week. The i newspaper, external focuses on the financial challenges facing Chancellor Rachel Reeves. It says ministers will be ordered to come up with ways to make cuts in the coming months - with the Ministry of Defence and Department for Transport among the departments that have already begun cost-cutting. The Daily Telegraph, external reports supermarket chain Asda is putting more staff on checkouts in what it describes as a "scramble" to tempt customers back, after admitting self-service technology has reached its limit. Finally, the Daily Star, external says many men now go to the beach or swimming pool in complete fear, and it's all down to the amount of body hair and building bellies which sees a lot of blokes avoiding going into the water.

