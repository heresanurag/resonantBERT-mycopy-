content: |-
  At least 20 people are killed and many more injured in a mass shooting in the Texas city of El Paso.

  At least 20 people have been killed and many more injured in a mass shooting in the Texas city of El Paso.

  Governor Greg Abbott described it as "one of the most deadly days in the history of Texas".

  The massacre happened at a Walmart store near the Cielo Vista Mall, a few miles from the US-Mexican border.
