title: Edgware landlord fined over 18 people housed in three-bed home - BBC News
date: '2025-02-19'
section: London
url: http://www.bbc.co.uk/news/articles/cgm177x0j3mo
content: |-
  Charles Egbiremolen operated eight bedsits without a licence in a converted three-bedroom house.

  Children were among the 18 people living in the overcrowded property

  A landlord has been ordered by a court to pay £37,000 after 18 people were found living in a terraced house in north London. Charles Egbiremolen, 57, was operating eight bedsits without a licence in a converted three-bedroom terraced house in Fairmead Crescent, Edgware. Egbiremolen was found guilty of nine offences at Willesden Magistrates' Court on 25 November and sentenced at the same court on 5 February. A spokesperson for Barnet Council said they would "not tolerate landlords who flout the rules".

  The property had no safe means of escape in case of fire, inspectors said

  The council was called to the property following neighbour complaints about noise, antisocial behaviour and overcrowding. Council inspectors and the police entered the property with a warrant and found extreme overcrowding, with one room being shared by six people including babies. Another room of 83.9 sq ft (7.8 sq m) was occupied by two tenants, the council said. The back garden was filled with building waste, mattresses and other debris and there was a kitchen in a separate structure in the garden, inspectors said. They added there was disrepair throughout the property, it failed to meet safety standards, had an inadequate fire alarm system, and no safe means of escape in case of fire. Egbiremolen was found guilty of a range of offences including failing to licence the property, management and safety offences, and failure to supply statutory information to the council. He was fined £15,000, along with a £2,000 victim surcharge and £20,000 contribution to the council's costs. "It is the responsibility of every landlord to make sure that their properties comply with the law and their tenants are safe," a spokesperson for the council said.
