title: Liverpool FC parade crash injured rises to 109 - BBC News
date: '2025-06-02'
section: Liverpool
url: http://www.bbc.co.uk/news/articles/c2d51kdpzk3o
content: |-
  Police say the number of people injured when a car drove into crowds in Liverpool has risen.

  The number of people injured in the crash has now risen from 79 to 109

  The number of people injured when a car drove into a crowd during Liverpool FC's Premier League title parade has now increased to 109, police have confirmed. At about 18:00 BST on 26 May police were called to Water Street after a car crashed into crowds of Liverpool fans celebrating the team's homecoming. A nine-year-old was among the youngest victims of the incident in Water Street. Paul Doyle, 53, appeared at both Liverpool Magistrates' Court and Liverpool Crown Court on Friday, where he faced seven charges including wounding with intent, causing grievous bodily harm (GBH) with intent, attempting to cause GBH with intent, and dangerous driving.

  The court heard that the dangerous driving charge related to Mr Doyle's home street of Burghill Road, Water Street, and other roads in between. A pram carrying a baby boy was sent several metres down the street when it was struck, but the child was not hurt. The former marine and father-of-three will next appear in court on 14 August for a plea hearing. Police had previously confirmed a total of 79 people were injured in the city centre on Monday evening.

  The number has increased after police became aware of people with minor injuries admitting themselves to hospital, the force confirmed. In a statement, they said its teams were still "working through" and "assessing those reporting being injured". They are continuing to urge anyone with information on the crash to come forward "as a matter of urgency".

