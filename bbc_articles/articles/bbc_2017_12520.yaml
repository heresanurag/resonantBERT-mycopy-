  It is not known what contact was made between the account @zanu_pf and the Zanu-PF party.

  In a surreal turn of events, the unverified account was accused of being a fake in 2016 by a parody account mocking Zimbabwean President Robert Mugabe.

  In the post the fake Mr Mugabe claimed the "official party account" was @ZANUPF_Official.

