title: Organised crime gang members jailed over nationwide prostitution ring - BBC
  News
date: '2025-04-25'
section: England
url: http://www.bbc.co.uk/news/articles/c2ewv443dx3o
content: |-
  Women were trafficked to the UK from Romania and lived with their "controllers" at rented properties.

  Valentin Badica (from left), Ionica Badica and Cristian Damaschin were all jailed for their roles in the gang

  Members of a "dangerous" organised crime group have been sentenced for their part in a prostitution ring trafficking women into the UK from Romania. The "nationwide enterprise" saw 14 women aged in their 20s and 30s being brought in as sex workers in South Yorkshire, London and Norfolk, Sheffield Crown Court heard. The women were advertised online and driven to locations to meet clients, with payments made to those running the network. Five men and two women, all Romanian nationals, previously pleaded guilty to conspiracy to control prostitution for financial gain.

  Valentin Badica, 39, Cristian Damaschin, 35, Ionica Badica, 34, Mihaela Matei, 28, Ionut-leonard Bahica, 38, Adrian Cioroaba, 33 and Iuliana Mavroian, 41, were sentenced at the hearing on Friday. Judge Peter Hampton said: "The purpose of the whole business was to make money. "You all, in differing degrees, financially benefited from your control of women in the sex industry." The court heard the head of the conspiracy was a man who had since died, with the seven defendants having differing roles in the gang. Flights were paid for the women to come from Romania between 2016 to 2019, with those involved subsequently met at airports. They were then taken to houses and lived "with their controllers", the court heard. Valentin Badica along with his brother Ionica Badica managed the Doncaster franchise, the judge said, and rented three properties in the city. The court heard Valentin paid £3,000 in travel costs for women to come to the UK and would sometimes accompany them on flights. His partner Mihaela Matei worked as a receptionist for the business and was an "essential connection between clients and the women", the court heard. Damaschin was responsible for managing the Ilford franchise, while his partner Iuliana Mavroian worked alongside him as a receptionist.

  Bahica and Cioroaba worked as drivers taking women to clients, the sentencing was told. The nature of the women's work left them open to physical and sexual abuse, the court heard. Valentin Badica, of Ellesmere Road, Newcastle, and Damaschin of Colston Street, Newcastle, were each jailed for two years and eight months. Ionica Badica, of Farndale Road, Newcastle, was jailed for two years and two months. Bahica, of Leazes Park Road, Newcastle, and Cioroaba, of Hillwood Close, Sheffield, were both given a jail term of 11 months, suspended for two years. Matei, of Ellesmere Road, Newcastle, was sentenced to one year and 10 months in prison, suspended for two years. The gang's actions were uncovered following an investigation involving multiple police forces together with Romanian authorities. Det Sgt Rachael Smith, of South Yorkshire Police, said: "This has been an extensive investigation that has led to the successful shut down of a dangerous organised crime group. "Everyone deserves to live their life free from harm and control, but these individuals chose to exploit the vulnerability of their young victims with no care for the damage they caused."

