title: Duncan Ferguson sacked as Inverness Caledonian Thistle manager - BBC News
date: '2024-10-23'
section: Scotland
url: http://www.bbc.co.uk/news/articles/c0mzn1wk1pgo
content: |-
  The former Scotland international has been let go along with two coaches after the club entered administration.

  Manager Duncan Ferguson has been working for free as the club fights for survival

  Duncan Ferguson has been sacked as the manager of Inverness Caledonian Thistle. The club is fighting for its survival after entering administration due to a financial crisis. Ferguson, who had been working for free, said he and two coaches had been let go by the club. Other players and staff are expected to hear if they still have jobs on Thursday. Administrators BDO said they were working to "secure the long term future" of the Highland team.

  Earlier, Ferguson told BBC Scotland News he had "always been against administration". After being let go, the former Scotland international said: “I’ve done the very best I can for my club and for my players. "I’ve always tried to support my players behind the scenes and they all know that. And that’s the most important thing for me.” He described the process of administration as “brutal”, but said that he had enjoyed his time at the club.

  The club confirmed that Ferguson, assistant manager Gary Bollan and goalkeeping coach Stuart Garden had left with immediate effect. In a statement, it said: "The club would like to place on record our thanks to Duncan, Gary and Stuart for their efforts and wish them the very best in the future. "Scott Kellacher, first team coach, is stepping up to take over as first team head coach with immediate effect."

  Inverness have had 15 points deducted as a result of administration, meaning they face potential relegation from League 1. They now sit bottom, on -3 points. Regardless of what division they are in next season, they will start on -5 points. Ferguson joined Inverness last September following the sacking of Billy Dodds, with the club sitting bottom of the Championship at the time. Caley Thistle were later relegated in a play-off against Hamilton Accies. A former Dundee United, Rangers, Everton and Newcastle United player, Ferguson was appointed to his first full managerial role at Forest Green Rovers last year.

  Former chairman Alan Savage says he is confident the club can be saved

  Administrators are attempting to find new owners to rescue the club. If that fails, assets could be sold and the money raised distributed to creditors. Investor Alan Savage, a former club chairman, told BBC Scotland News he would give it his "best shot" to help save the club. Asked if he was confident it could be saved, he replied: “Of course I am yeah.” Savage pledged to help anyone who lost their job to find a new one. Asked about his own potential role at the club if it survives administration, he said: "It’s a step by step process and until we’ve gone through those steps it’s a bit early to say.”
