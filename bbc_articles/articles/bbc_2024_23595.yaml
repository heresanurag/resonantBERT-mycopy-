content: |-
  Britain's Jack Draper retires from his quarter-final against France's Ugo Humbert because of injury.

  Jack Draper had never been beyond the second round of a Grand Slam before he reached the US Open semi-finals

  British number one Jack Draper is out of the Japan Open after retiring from his quarter-final. The 23-year-old lost the first set 7-5 and trailed 2-1 in the second against France's Ugo Humbert in Tokyo. World number 20 Draper took a medical time out early in the second set to receive treatment on his abdominal area. He tried to continue before retiring. Humbert will play the Czech Republic's Tomas Machac on Monday for a place in the final. Denmark's Holger Rune will face Frenchman Arthur Fils in the other semi-final after overcoming Kei Nishikori 3-6 6-2 7-5.

  Draper reached his first Grand Slam semi-final at the US Open this month, when he lost in straight sets to world number one Jannik Sinner. After vomiting on court three times during the match, he said he would "really look into" his sickness issues, although it is not known whether the problem in Tokyo is related. Draper was also sick immediately after his Australian Open first-round victory in January, which he said was because of "psychological stress". World number three Carlos Alcaraz will face Russia's Karen Khachanov in the quarter-finals of the China Open. Spaniard Alcaraz beat Dutchman Tallon Griekspoor 6-1 6-2 in the last 16 in Beijing.
