  • None The three-bedroom house has been listed with a guide price of between £12,000 and £15,000
  • None The house is a stone's throw away from Blackpool Promenade Slide 1 of 5 , A living space with several pieces of furtniture, all with pigeons sat upon them. The furniture is covered with pigeon droppings , Images from June 2023 show the pigeon infestation

  A three-bedroom house is going under the hammer for just £12,000 after a warning that any new owners will have to rid the home of a pigeon infestation. The terraced house on Haig Road in South Shore, Blackpool, is a stone's throw away from the promenade but the auctioneers warned it would require a "strip out and re-fit". Network Auctions said it could not offer viewings due to the internal condition of the property and staff had not inspected it. Images from June 2023 show several birds inside the derelict property, which is littered with pigeon droppings.

  The property is due to be auctioned on 5 December with a guide price of between £12,000 and £13,000.
