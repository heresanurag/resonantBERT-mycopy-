content: |-
  A photographer captures spectacular footage of lightning near Everton FC's new stadium.

  A photographer has captured spectacular footage of lightning near Everton FC's new stadium at Bramley-Moore Dock in Liverpool.

  Paul Madden filmed the strike from his flat in the city at about 19:30 GMT on Saturday.

  The 49-year-old amateur landscape and cityscape photographer has also caught other weather events including the Aurora Borealis and cloud inversions, when temperatures near the ground are lower than temperatures higher in the air.

  Wind warnings have been issued for Scotland, Northern Ireland, Wales, and northern and western England.

