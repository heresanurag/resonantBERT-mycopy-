title: 'Blackpool fire: Parents killed and two kids hurt in house blaze - BBC News'
date: '2024-07-18'
section: Lancashire
url: http://www.bbc.co.uk/news/articles/cl5yz4e3g19o
content: |-
  Police probe the cause of a fire which has killed a man and a woman and put two children in hospital.

  Parents killed and two children hurt in house fire

  The fire started in the early hours of the morning, police say

  A man and a woman have died and their two children have been injured in a house fire in Blackpool. The blaze broke out on Peter Street in the town shortly before 02:40 BST, Lancashire Police said. Neighbours have described a “wildfire” and “dangerous flames” at the home where the couple, both in their 20s, and their children lived. One of the children is in a “very poorly condition” in hospital, police said.

  Locals say a young boy was pulled out of the house by a neighbour

  The mother died at the scene, while the father was taken to Blackpool Victoria Hospital but he was pronounced dead a short time later. Kara-Marie Pearson, who lives on the street, has told how her partner saved a young boy from the flames after smashing a glass panel in the front door with a bat. She said she had heard an "almighty bang" and looked out of her bedroom window and saw "the whole downstairs was literally in flames" so the pair had run out to help. "You couldn't even see it, it was pure orange," she said, adding it "was like a wild fire". She said once the boy had been pulled out of the house she had taken him to a neighbour's house with "cuts and burns on him". "He's only four years old. He fell to the ground," she said. "We could only get that little boy out. Mum, dad and the baby, we couldn't get out - it was too dangerous."

  Some other properties were evacuated while police investigate

  Ms Pearson's sister-in-law, Jade Hartill, who also lives nearby told BBC North West Tonight she "keeps crying" since witnessing the fire. "It's something you can't forget," she said. "We couldn't help because the fire was absolutely crazy. It's just tragic."

  Detectives, who have not yet released details of the ages of the children, are working with the fire service to establish the cause of the blaze. The force said it was keeping an "open mind" at this stage about how it started and added there had been no arrests. A small number of homes have been evacuated while the investigation is carried out. Officers will leave "absolutely no stone unturned" in the inquiry, Ch Supt Mike Gladwin said. He said his thoughts were with the family's loved ones at this "extremely distressing time".

  Flowers have been left outside of the family's home

  Ch Supt Gladwin said the "tragic news will be met with great sadness in the local community and people will want instant answers" but he warned against "unhelpful and upsetting speculation". “There are grieving loved ones still trying to come to terms with this devastating news," he said. He appealed for anyone with information or who captured anything on their CCTV, doorbell or dashcam to contact the force.

