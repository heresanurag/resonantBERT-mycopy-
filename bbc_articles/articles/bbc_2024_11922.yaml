content: |-
  Jacqueline Mounsey faces two charges and is due to appear at Carlisle Crown Court later this month.

  Woman accused of attempting to murder man and child

  A woman appeared in court charged with attempted murder following an incident in Carlisle this week

  A woman has appeared in court accused of attempting to murder both a man and a child. Jacqueline Mounsey, aged 53, faces two charges. One alleges that she attempted to murder a man in Carlisle on 10 June. A second charge alleges that Ms Mounsey also attempted to murder a female child on the same date. Ms Mounsey appeared in the dock at Carlisle Magistrates’ Court on Saturday.

  During a five-minute hearing she spoke to confirm her name, date of birth and address, at Whernside in the city. No pleas were entered to either of the charges she faces. A brief outline of the allegations was provided by prosecutor Peter Conroy, who told magistrates that the man and child had each suffered stab injuries to their necks. The case was adjourned by magistrates and she is next due to an appear at Carlisle Crown Court for a plea and trial preparation hearing on 24 June. No bail application was made and Ms Mounsey has been remanded in custody until her next court appearance.
