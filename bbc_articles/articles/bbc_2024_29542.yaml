content: |-
  John McGinn is one of six regulars returning to the Scotland squad for the Nations League matches against Croatia and Poland, while there is a first call for goalkeeper Cieran Slicker.

  This video can not be played To play this video you need to enable JavaScript in your browser.

  Scotland welcome back a host of regulars, including "big character" John McGinn, for Nations League matches against Croatia and Poland. There is a first selection for Ipswich Town goalkeeper Cieran Slicker, who has 17 caps at under-21 level, and uncapped Rangers midfielder Connor Barron retains his place after a late call up for the 0-0 draw at home to Portugal. Che Adams is included despite limping out of Torino's defeat by Fiorentina on Sunday. "He'll be scanned and assessed by his club," said manager Steve Clarke who has no plans to draft in another forward if Adams is ruled out. Croatia visit Hampden on 15 November, with the campaign ending in Warsaw three days later. Scotland prop up Group A1 with one point from four matches, three behind Poland who won 3-2 in Glasgow in the the opening round of games. McGinn was one of many to miss the October double-header, but the Aston Villa captain has started the last four games for his club after a hamstring problem. The 30-year-old midfielder has 18 goals in 71 Scotland appearances. "He's obviously a big character in the camp and a big player on the pitch as well, so it’s nice to have John back," said Clarke. "Over the four games we've played, the performances have been pretty good. We haven't had the points reward we wanted and hopefully this month we can add a few more." James Forrest drops out, along with Liam Lindsay, Andy Irving, Jon McCracken and Jack MacKenzie, who was another late call for the October matches. Kieran Tierney, Aaron Hickey, Angus Gunn and Kevin Nisbet are currently out with injuries. Lewis Ferguson is not included, having only just returned to the Bologna first team after a six-month lay-off. The same applies for Nathan Patterson, who is back in the Everton squad but yet to feature this season. "When you look at the long-term injuries, it's better that they get minutes with their clubs to build up robustness," said Clarke.

  Slicker, 22, has only ever played two matches for Ipswich - in last season's League Cup. "It's a chance to see him up close and personal in the camp," said Clarke. "I've been rotating the goalkeepers around the squad a little bit so we can see different people. "Cieran is now out of the under-21 group, so it's a chance for me and my coaches to have a look. "I think it's important for everybody to recognise that there's a pathway from the under-21s into the senior squad. "I've always tried to show that you can do that, and he's another one on the list, along with Connor Barron, Ben Doak and Tommy Conway. We need to look out for the next generation as well."
