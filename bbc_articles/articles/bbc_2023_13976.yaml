title: Young child dies after being struck by vehicle in New Cumnock - BBC News
date: '2023-09-18'
section: Glasgow & West Scotland
url: http://www.bbc.co.uk/news/uk-scotland-glasgow-west-66847789
content: |-
  Emergency services were called after the child was knocked down on the A76 in New Cumnock on Monday.

  A young child has died after being knocked down in a village in East Ayrshire.

  It is understood the child was struck by a vehicle in the Castle area of New Cumnock at about 12:35 on Monday.

  A number of local clubs and organisations announced on social media that they had cancelled events due to the "the tragic event".

  Cumnock Juniors Girls Football Club said all training had been cancelled following the incident.

  The A76, which passes through the village, was closed for several hours for investigation work.

  Linda McAulay Griffiths, chief education officer at East Ayrshire Council said: "Our thoughts are with all involved at this very sad time.

  "We will be working closely with the school and together we will do all we can to help and support those affected in the coming days."

  Local football team Glenafton Athletic announced they would be holding a minute's silence at their upcoming game against Irvine Meadow at the weekend.

  The New Cumnock Development Trust said on Facebook: "In light of the tragic event in our community today, all NCDT activities over the coming week are now cancelled."

  A Police Scotland spokesperson said: "Around 12.35 on Monday, 18 September, police were called to a road crash at Castle Place, New Cumnock."
