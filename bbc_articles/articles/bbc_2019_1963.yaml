title: 'Cadet''s mum: My son''s life was not in vain - BBC News'
date: '2019-02-11'
section: Newsbeat
url: http://www.bbc.co.uk/news/newsbeat-47197616
content: |-
  The rapper's mum urges fans not to keep "pent up anger" inside them at a tribute event for her son.

  Cadet's mum has urged his fans not to keep "pent up anger" inside them at a tribute event to his life.

  Fans gathered in Hyde Park in central London to release balloons to celebrate the 28-year-old on Sunday.

  The rapper was the passenger in a taxi when he died in a car crash on Saturday morning.

  His mum said her son's life was "not in vain" and she was proud that he'd been able to influence so many people to achieve their goals.

  Speaking to the crowd, she said: "I'm so proud that his music has touched you in whatever way, enough for you to come out.

  "It gives me so much pleasure."

