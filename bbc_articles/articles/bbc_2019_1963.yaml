  "I am so glad that me and him were able to resolve our situation before this happened," he said.

  "If I didn't it would've eaten me up for the rest of my life."

  Cadet's kindness has been brought up my many of his friends.

  In a tribute on Instagram, Stormzy wrote: "This man exudes love. I can't even explain how clean-hearted you are, look what you mean to everyone.

  "No-one will ever forget you big bro, words can't do anything justice right now."

  Cadet's most recent single Advice, with Deno Driz, was released in October and peaked at number 27 in the UK chart.

  He was due to perform at Wireless Festival in the summer and organisers say his slot will now include a tribute to his life.

