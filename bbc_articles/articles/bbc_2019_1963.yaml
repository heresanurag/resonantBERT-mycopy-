  The rapper from south London, whose real name was Blaine Cameron Johnson, was on the way to a gig at Keele University in Staffordshire when he died.

  His mum said her son had been able to touch people's lives and "influence you to do and achieve whatever you want to".

  She added: "I need you men to express yourselves, express your feelings. If it's not to your mothers, to somebody.

  "Don't keep pent up anger inside you. It's not good. You become anger and anger portrays others things. Release it, even if it's in tears or whatever.

  Cadet's cousin Krept - of rap duo Krept and Konan - also spoke at the memorial and urged fans to resolve any issues they have with loved ones.

  He and Cadet had fallen out when they were younger but had made up and had recently worked together.

