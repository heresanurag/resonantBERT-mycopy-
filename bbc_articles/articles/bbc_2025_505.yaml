title: Mystery of photos on 100-year-old-camera 'solved' - BBC News
date: '2025-02-10'
section: General
url: http://www.bbc.co.uk/news/videos/c4gx033n6pno
content: |-
  It is believed that the crowd in the photo welcomed home a mum who delivered quadruplets in 1948.

  The mystery of 70-year-old photographs, that came to light after a local man bought a Kodak camera at Salisbury Antiques Market, could have been solved.

  The black and white photos show a large crowd gathered in what appears to be Chipping Sodbury.

  History buffs and social media users were quick to guess what had drawn such a crowd, following an article about the photographs.

  And now it looks like the mystery may have been solved.

