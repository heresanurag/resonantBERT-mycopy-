id: bbc_2024_19652
title: Bodycam shows officer spotting Trump attacker before shooting - BBC News
date: '2024-08-22'
section: General
url: http://www.bbc.co.uk/news/videos/c70j44vwk85o
content: |-
  Bodycam footage is released showing the minutes before a man attempted to assassinate the former president on 13 July.

  The Butler Township Police Department has released bodycam video showing the moments before an assassination attempt on former president and Republican candidate Donald Trump on 13 July.

  The footage shows a police officer being hoisted up to a roof near where the attacker is stationed. The unarmed officer quickly jumps down, saying he saw the gunman. He then runs to his vehicle for a firearm.

  Minutes later, the footage shows the officer return to the roof. By that time, the gunman had been killed.

  Law enforcement, including the Secret Service, have faced questions about how the gunman was able to get access to the rooftop and open fire.

  Trump was shot in the ear and one person was killed.
