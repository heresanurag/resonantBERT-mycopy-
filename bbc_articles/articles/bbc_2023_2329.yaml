  Four-time NBA champion James is in his 20th season in the NBA, having been drafted first overall by hometown team the Cleveland Cavaliers in 2003. The forward joined the Miami Heat in 2010, winning two titles, before returning to lead Cleveland to the only NBA title in their history in 2016. He has been with the Lakers since 2018 and helped them win the 2020 title, which was also the fourth time he has been named NBA finals MVP. Two-time Olympic champion James has won four regular season MVP titles and appeared in the NBA Finals 10 times. Abdul-Jabbar played in the NBA for 20 seasons with the Milwaukee Bucks and Lakers, during which he won six titles, six regular season MVP crowns and was named finals MVP twice. Asked after the game whether he is the best NBA player of all time, James said: "I'll let everybody else decide who that is or just talk about it, but it's great barbershop talk. "Me personally, I'm going to take myself against anybody who's ever played this game. But everyone's going to decide who their favourite is."

  Many thought this was an insurmountable milestone, but it's finally been surpassed. Lebron 'The King' James has added a new jewel to his crown. For two decades he has been the dominant force in the NBA - playing for his home town team Cleveland Cavaliers, Miami Heat and now LA Lakers - winning a championship with each. Amongst all his achievements, this may be considered the greatest yet. He'd already overtaken superstars like Michael Jordan and Kobe Bryant, but for some, breaking Kareem Abdul-Jabbar's long-standing record cements James' status as the best ever. Lebron is still performing at the very top level. He still averages 30 points a game. So the big question now is how much longer can he continue? As he celebrates this achievement with his loved ones, James has made no secret of the fact he wants to stick around long enough to pay with - or against - his eldest son Bronny, 18. And who would bet against him?

  James holds the records as the youngest player to reach every significant points tally from 5,000 to 35,000. He passed six-time NBA champion Jordan into fourth overall in March 2019 and late Lakers great Bryant to move into third all-time in January 2020. James then surpassed Karl Malone into second overall in March last year, a month after he beat Abdul-Jabbar's record for the most combined regular season and play-off points. The NBA's official all-time scoring list only takes into account regular season points. James, a 19-time All-Star, scored 23,119 points in 849 games for the Cavaliers during 11 seasons across two spells. He scored 7,919 points for the Heat in 294 games over four seasons and now has 7,314 points in 266 games over five seasons for the Lakers. James is also in the top-10 all-time lists for assists, steals, defensive rebounds, field goals made and three-pointers made.

