  "Everybody that has ever been a part of this run with me the last 20-plus years, I want to say thank you so much because I wouldn't be me without all you. You all helped. Your passion and sacrifices helped me to get to this point," he said. "And to the NBA to Adam Silver, to the late great David Stern, thank you very much for allowing me to be a part of something I always dreamed about. I would never in a million years dreamt this to be even better than what it is tonight." Abdul-Jabbar ceremoniously handed over the ball to James to recognise his new record in front of a cheering crowd that included tennis legend John McEnroe, music stars Jay-Z, LL Cool J and Bad Bunny, boxer Floyd Mayweather Jr and actor Denzel Washington. "I thought it had every chance of being broken. It just had to have someone that the offense focused on continually," said Abdul-Jabbar, who retired in 1989. "LeBron's career is one of someone who planned to dominate this game. You have to give him credit for just the way he played and for the way he's lasted and dominated."

