title: LeBron James breaks NBA all-time scoring record - BBC Sport
date: '2023-02-08'
section: Basketball
url: http://www.bbc.co.uk/sport/basketball/64563131
content: |-
  LeBron James becomes the NBA's all-time leading scorer, passing Kareem Abdul-Jabbar's 39-year-old record.

  This video can not be played To play this video you need to enable JavaScript in your browser.

  LeBron James has become the NBA's all-time leading scorer, passing Kareem Abdul-Jabbar's long-standing record. Los Angeles Lakers star James hit 38 points in a 133-130 defeat by the Oklahoma City Thunder to surpass Abdul-Jabbar's mark of 38,387, set in 1989. Abdul-Jabbar initially broke the scoring record in April 1984, eight months before James was born. "To be able to be in the presence of a legend and great as Kareem, it means so much to me," said James. The 38-year-old, who needed 36 points to break the record, did so with a fadeaway jumper at the end of the third quarter and he finished the match with a career total of 38,390. An emotional James rose both arms in celebration while 75-year-old Abdul-Jabbar, who was at the match at the Lakers home court, stood and applauded. There was a brief break in play for a ceremony to mark the achievement, with James taking a microphone to make a speech on court.

