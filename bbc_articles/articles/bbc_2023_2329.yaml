  US President Joe Biden: "LeBron, congratulations. With your whole heart and soul you broke a hell of a record. You elevated the game. More than that, like Kareem, Bill Russell and others who came before you, you challenged and inspired the nation to be better, do better and live up to our full promise." Los Angeles Lakers great Magic Johnson: "I never thought that Kareem's scoring record would be broken by anybody. It means more to myself and to our fans because you're wearing that purple and gold and broke it as a Laker. This historic moment is so special because we will never see another LeBron James." NBA Commissioner Adam Silver: "It's a towering achievement that speaks to his sustained excellence over 20 seasons in the league. And quite amazingly, LeBron continues to play at an elite level and his basketball history is still being written." Golden State Warriors guard Stephen Curry: Your sustained level of play for 20 years, reaching this pinnacle of scoring in basketball, it is unbelievable. Way down the road, when we're reflecting back on our careers, we'll be able to be at that level knowing what it was like to battle at the highest level." Brooklyn Nets forward Kevin Durant: "It's even funny to just even say that, you know coming from where you have come from, how hard you grinded for this long. It's been an inspiration since day one. Much love and keep setting the bar high."

  26 June 2003 - drafted number one by the Cleveland Cavaliers 30 October 2003 - makes debut aged 18 against the Sacramento Kings, recording 25 points, nine assists, six rebounds and four steals 20 February 2005 - makes All-Star Game debut, the first of 19 appearances 7 June 2007 - first NBA Finals appearance for Cleveland, who go on to lose to San Antonio Spurs 24 August 2008 - wins Olympic gold with the USA at Beijing Games 4 May 2009 - wins the first of his four regular season MVP titles 8 July 2010 - joins the Miami Heat after seven seasons with the Cavaliers 21 June 2012 - wins first NBA championship with the Heat and claim first of four Finals MVP titles 20 June 2013 - becomes back-to-back NBA champion with the Heat 11 July 2014 - returns to Cleveland after four seasons in Miami 19 June 2016 - leads the Cavaliers back from 3-1 down against the Golden State Warriors to win their first NBA Championship 9 July 2018 - signs for the Los Angeles Lakers after four years during second stint in Cleveland 11 October 2020 - claims fourth NBA title by beating the Miami Heat, also becoming first player to win Finals MVP for three different teams

  LeBron James' fallaway jumper shot with 10.9 seconds left of the third quarter sees him become the NBA's all-time leading scorer

  James then saluted the crowd who roared in celebration

  The game was paused for Kareem Abdul-Jabbar to ceremoniously hand over the ball to James, who became emotional as he addressed the crowd

  James was then joined on court by his family, including mum Gloria, wife Savannah and daughter Zhuri

  Boxer Floyd Mayweather Jr was among the celebrities courtside to congratulate James

