  Ms Weitzmann inherited her love of classic cars from her late father. Like him, she said, she likes "proper cars, cars that you can open the bonnet and actually see what's there".

  Ms Weitzmann's Triumph Fury, built as a prototype in Italy, is the only one of its kind in the world

  Her collection includes a sports car made in Italy by Michelotti and brought to the UK in 1965 as a prototype for Triumph - the Fury. "Triumph couldn't afford to put it into production," Ms Weitzmann explained. "So, this is the only one in the world."

  The Iso Grifo - whose seat was once occupied by John Lennon - is one of Ms Weitzmann's favourite cars

  However, one of her favourite vehicles is the Italian-made Iso Grifo. "At [the 1967 British International Motor Show], John Lennon came along and sat in this car," explained Ms Weitzmann. "He actually didn't buy a Grifo, he bought a Rivolta - but he sat in it. "So his bum has been on the seat."

  Ms Weitzmann described her Fiat Gamine as a "Noddy car"

  Ms Weitzmann said the cars are a joy to drive: "Fabulous. Much better than most of the modern cars. The modern cars are brilliant, but they're soulless. "You get people look at you, wave to you. Over there we have a Fiat Gamine in Noddy colours, so it's a Noddy car really. "And when you drive past in that grown men will stand at the side of the road and wave."

  Ms Weitzmann said her hobby had become her "passion"

  Ms Weitzmann acknowledges her hobby is expensive, but said the vehicles do tend to appreciate in value - and she has no plans to stop collecting just yet. "I will never rule out getting another one," she explained.

