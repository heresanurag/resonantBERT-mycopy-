title: Worcestershire woman celebrates her 50-strong classic car collection that includes
  a Lamborghini, BMW and an F1 car - BBC News
date: '2025-01-04'
section: Hereford & Worcester
url: http://www.bbc.co.uk/news/articles/cn4x5q383exo
content: |-
  Jane Weitzmann has a collection of 50 classic cars at home and freely admits it's an obsession.

  'Modern cars are soulless - these cars have soul'

  Jane Weitzmann has a collection of 50 classic cars in a garage at her South Littleton home

  Jane Weitzmann admits she has an obsession - and it's all down to a Jaguar Mark X. Bought in the 1980s, the classic car has led her to buy "just" the 49 more, and they are all stored at her home in the village of South Littleton, Worcestershire. Ms Weitzmann's collection includes BMWs, Ferraris, Lamborghinis, and a Vanwall - a 1950s Formula 1 car, and the only one of its type in the world. "I think my older son thinks I'm slightly mad," she said. "My younger son goes along with me, because I think he enjoys them too."

  "But generally, they encourage it. It's my passion, they know that," she continues. "And they're very happy for me."

