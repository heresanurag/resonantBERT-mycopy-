title: 'Hugo Lloris: Former France captain on Argentina Copa America song race row
  - BBC Sport'
date: '2024-07-18'
section: Football
url: http://www.bbc.co.uk/sport/football/articles/cw4yvp32dm1o
content: |-
  Hugo Lloris says the controversial song sung by some Argentina players was an "attack on French people" - but he hopes it was a mistake the players involved learn from.

  Goalkeeper Hugo Lloris was France captain for their 2022 World Cup final defeat by Argentina in Qatar

  Former France captain Hugo Lloris has described the controversial song sung by some Argentina players as an "attack on French people" but hopes it was a mistake that the players involved will learn from. Chelsea midfielder Enzo Fernandez is facing sanctions from the Premier League club after posting a video on social media that the French Football Federation said included alleged "racist and discriminatory language". World governing body Fifa is also investigating the video, in which several members of the Argentina squad - celebrating their 1-0 win over Colombia in the Copa America final - take part in a song originally sung by Argentina fans questioning the heritage of France's black and mixed-race players. Fernandez has since issued an apology on social media. Lloris, France's most capped player and their captain when they won the 2018 World Cup, said he was shocked by the behaviour. "It doesn't matter if you are in a moment of euphoria because you have won an important trophy," he said. "It demands even more responsibility when you are a winner. "You don't want to hear or see this kind of thing in football. We all stand against discrimination and racism. "I just think and hope it is a mistake. We all make mistakes sometimes and hopefully they will learn from it." Former Tottenham captain Lloris, 37, signed for Major League Soccer outfit Los Angeles FC in December and was in the United States as Argentina won the Copa America in Miami. He was on the losing side in the 2022 World Cup final as France lost on penalties to Argentina. "They [Argentina] are the face of football right now, in South America, in the world. They deserve a lot of credit for what they have done on the field for the last four or five years," Lloris said. "But when you win, you are an example for others, especially kids. "It was a proper attack about the French people, especially for the French people who have some African origin and family."

  Former head of player engagement at anti-discrimination group Kick It Out, Troy Townsend, has questioned whether football is progressing in the fight against racism. He feels the game needs to finally grasp the opportunity to prove a strong anti-discrimination stance. "I know the industry inside out and I felt it has not dealt with situations similar to this very well. I don’t see two steps forwards, I only see backwards," he told BBC Sport. "This is a moment the industry – whether it’s on a global scale through Fifa, in England through the FA and Chelsea – where it needs to show strength towards this zero tolerance approach we supposedly have towards racism and discrimination. "It’s something football has to deal before these situations, once again, get out of hand." Paul Canoville - Chelsea's first black player, having joined the club in 1981 - said there is "no room for discrimination", while also offering to help in any "restorative process". "I aim to help people learn through the lens of my experiences before, during and after the abuse I received while playing football, including being able to offer forgiveness where deserved," said Canoville. Meanwhile, The Professional Footballers' Association has also contacted the club to offer its assistance.

  Former Argentina midfielder Javier Mascherano defended Fernandez and said "everything has been taken out of context". In an interview with Ole, external, Mascherano, who won 147 caps, said: "If there is something that we Argentines are not, it is racists, far from it. "If there is something that we are as a country, it is totally inclusive. In Argentina, people from all over the world live and we treat them as they should be treated." Fernandez has been unfollowed on Instagram by Chelsea team-mates Wesley Fofana, Benoit Badiashile, Lesley Ugochukwu, Christopher Nkunku, Axel Disasi, David Datro Fofana, Romeo Lavia and Malo Gusto. Former Liverpool, West Ham and Barcelona player Mascherano, who is now Argentina Under-23s manager, said: "I know Enzo. He's a great guy and he has no problem with that. "You have to understand the culture of each country and know that sometimes what we perceive as a joke can be misinterpreted in other places." Victoria Villarruel, the vice-president of Argentina, launched a staunch defence, external of her country on social media and said: "No country will intimidate us."
