title: 'Barcelona: Champions League win built off youngsters Pedri, Fermin Lopez and
  Marc Casado - BBC Sport'
date: '2024-10-24'
section: European Football
url: http://www.bbc.co.uk/sport/football/articles/cx2ngrd4g67o
content: |-
