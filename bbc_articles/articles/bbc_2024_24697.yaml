content: |-
  Daniel Khalife asked Iranian contacts if he should travel to Iran or Lebanon to train, prosecutors say.

  Alleged spy 'talked about going to Iran for training', court hears

  A former British army soldier who is accused of being a spy for Iran and escaping from Wandsworth Prison last year offered to go for training in Iran, a court heard. The jury at his Woolwich Crown Court trial heard the recording of a conversation that the prosecution said was between Daniel Khalife and two Iranian contacts in November 2021. Mr Khalife, now 23, is accused of gathering information for Iran, compiling a list of special forces soldiers, perpetrating a bomb hoax and escaping prison. He denies all the charges.

  In the recording, Mr Khalife apparently discusses with the two men whether he should travel to Iran or to Lebanon. One of the men, who seems to be the more senior, suggests that Lebanon is the better option. Mr Khalife then says: "I wanted to have some training from you guys, and I think the best training for me is inside of Iran." But the man, speaking with a strong Iranian accent, says Lebanon is better: "Yes, there we can train you and because we have a safe place there - yes." "Your safety and healthiness is much important for us," he says. The man adds: "We don’t want any dangers for you and the planning for Lebanon. If this is better, if this is good we can plan a safe meeting here." Mr Khalife says he is about to have a month’s holiday starting in mid-December. His Iranian contact asks: "This is not sensitive for you travelling to Lebanon?" Mr Khalife says: "It is sensitive. I have to plan. I can’t pay with my credit card. So what I have to do is pay in cash. I will use the money that you gave me." The prosecution said the recording of the conversation was recovered from Mr Khalife’s own iPad. There is no evidence that Mr Khalife ever travelled to Iran or Lebanon. Earlier, the jury were read transcripts of two conversations Mr Khalife had with MI5 call handlers after he phoned their publicly available phone number. In the first call, he said he had been approached by an Iranian man and that he had started sending them fabricated documents. He said that he had collected a sum of money in £20 notes in a dog poo bag from Mill Hill Park in North London, and said a year later he had collected £1,000 pounds from under a pot in a cemetery in Kensal Green in West London. In the next call, he questions why he has not received a call back.

  In court yesterday, prosecutors said Mr Khalife - whose role in the Royal Corps of Signals gave him access to highly sensitive information - had offered to work as an agent for Iran in messages to Iranian intelligence handlers. The court also heard that he won a cup for Best Junior Soldier in his squadron, and was recommended for promotion to Lance Corporal aged just 20.

  The jury has heard that Mr Khalife was first arrested in January 2022, and charged in January 2023. He is alleged to have escaped from Wandsworth prison eight months later by strapping himself to the underside of a food delivery van before being recaptured after three days.
