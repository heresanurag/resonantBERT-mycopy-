content: |-
  Visitors will soon be given the chance to climb inside the 98ft tall structures near Falkirk.

  The Kelpies have been a feature of the landscape near Falkirk for the past 10 years.

  But soon visitors will be given the chance to climb inside the 98ft (30m) tall structures and view the surrounding area, as if from the animals' perspective.

  But as Catriona Renton reports, it may not be for the faint-hearted.
