content: |-
  Swearing in of new MPs concludes as ex-PM Tony Blair weighs in on how Labour should react to its election defeat.

  One of the more obvious campaign metaphors saw the PM drive through a wall to denote breaking Parliament's deadlock over Brexit Image caption: One of the more obvious campaign metaphors saw the PM drive through a wall to denote breaking Parliament's deadlock over Brexit

  Boris Johnson has written the diary for the Christmas edition of the Spectator - the magazine he used to edit.

  You can read the whole thing on the Spectator's website , but here's a particularly interesting section, where the PM references some of the stranger moments of his general election campaign...

  "Perhaps I should mention especially the media team, who had to explain such mysteries as why I chose to shut myself in a giant fridge and what exactly I was thinking when I confiscated a TV reporter’s mobile live on air."

  Here are the moments the PM is referring to, in case you need reminding:

  Mr Johnson also extends his thanks to "the ‘ops’ team" who "basically manage your life".

  "They tell you when to get up, what to wear, where to stand, and they organise brilliantly vivid metaphors for the political points you are trying to make.

  "In the space of 24 hours they had me driving a JCB through a Styrofoam wall to symbolise breaking the parliamentary deadlock; delivering milk on the doorstep, to denote delivery of our domestic agenda; baking an oven-ready pie to show that we have a ready-made withdrawal agreement with the EU; and working in a wonderful Welsh wrapping-paper factory - to show that we could get it ‘wrapped up’ by Christmas (more or less).

  "Some said these metaphors were clunking, but in a general election campaign, clunking is what you need."

  One of the PM's final stops on the election campaign trail involved delivering milk "to denote delivery of our domestic agenda" Image caption: One of the PM's final stops on the election campaign trail involved delivering milk "to denote delivery of our domestic agenda"
