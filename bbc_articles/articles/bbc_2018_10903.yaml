title: 'Brexit: UK not rejecting global co-operation, says May - BBC News'
date: '2018-09-26'
section: UK Politics
url: http://www.bbc.co.uk/news/uk-politics-45660639
content: |-
  Theresa May tells Donald Trump she wants a "big and ambitious" trade deal with the US after Brexit.

  Brexit does not mean the UK will be turning its back on international co-operation, Theresa May has insisted.

  She told the UN General Assembly that, outside the EU, the UK would still work with allies to uphold shared values.

  The Brexit vote, she argued, was a "clear demand" from voters for greater accountability in decision-making and their wishes must be delivered.

  The prime minister later discussed the scope for a "big and ambitious" US trade deal with Donald Trump.

  No 10 said she met the US President on the sidelines of the annual UN gathering, and agreed the UK's exit from the EU on 29 March 2019 was a "wonderful opportunity" for a far-reaching trade agreement with the US.

  Although negotiations could theoretically begin immediately upon the UK's withdrawal from the EU, subject to the final terms of any transition arrangement, a deal with Washington is likely to take many years to achieve.

  During his visit to the UK in July, Mr Trump backtracked on claims he was said to have made in a newspaper interview that Mrs May's Brexit strategy made doing a trade deal harder - reports he described as fake news.

  Mr Trump has questioned the role of institutions like the UN, saying the "ideology of globalism" had run its course, and the US under his leadership was pursuing a "doctrine of patriotism".

  But in her speech to the UN, Mrs May sought to reassure those who fear the UK's departure from the EU next March will see the country turning in on itself and disengaging from pressing international problems.

