  In Pictures: Sporting photos of the week

  A selection of some of the most striking sports photographs taken around the world in the past seven days:

  Nerea Marti of Spain and Campos Racing drives on track during F1 Academy Testing at Lusail International Circuit on 12 November in Qatar

  Jockeys ride horses around the first bend of the William Thomson Dunkeld Cup, which was won by Jack Hill riding Rhinoceros on 16 November in Dunkeld, Australia

  An aerial view of people swimming laps at night at Hampton Pool on 14 November in London, England

  Mike Tyson and Jake Paul fight at AT&T Stadium on 15 November in Arlington, Texas

  Brazilian fighters Karine Silva and Viviane Araujo trade hits in a strawweight contest during the UFC 309 event at Madison Square Garden on 16 November in New York City

  England's Taylor Harwood-Bellis celebrates scoring his team's fifth goal during the Nations League win against the Republic of Ireland at Wembley Stadium on 17 November in London

  Port Adelaide's Ashleigh Saint and Ella Boag celebrate winning the AFLW semi-final match against Hawthorn Hawks at Ikon Park on 16 November in Melbourne, Australia

  Desak Made Rita Kusuma Dewi of Team Indonesia (L) and Jimin Jeong of Team South Korea during Speed Climbing Women's Qualification on day 11 of the Neom Beach Games on 13 November in Neom, Saudi Arabia

  Tasmania Jackjumpers' Sean Macdonald drives to the basket during the round nine NBL match against Brisbane Bullets at MyState Bank Arena on 15 November in Hobart, Australia

  Ramy Saghadani El Ouariachi of Spain performs an overhead kick while under pressure from Tim Nicolas Kaufmann of Germany in the third-place match at the Neom Beach Games on 16 November in Saudi Arabia

  Australia's Max Jorgensen is tackled by Wales' Max Llewellyn during the Autumn Nations Series match at Cardiff's Principality Stadium on 17 November

  Carson Beck and Dylan Fairchild of the Georgia Bulldogs celebrate after a touchdown during the second quarter against the Tennessee Volunteers at Sanford Stadium on 16 November in Athens, Georgia

  All photographs licensed by Getty Images and subject to copyright. Take a look at last week's gallery and come back next Tuesday for more great sport photos of the week.
