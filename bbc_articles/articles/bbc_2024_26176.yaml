  "Everything she does now is tactical," he said. "The imperative was to make sure as many voters as possible know about what Kelly said." The vice-president’s latest remarks come on the heels of a multi-week strategy by her campaign to appeal to independent voters and moderate Republicans who could be open to supporting the Democratic ticket. Polls suggest the race is extremely tight, with neither candidate having a decisive lead in any of the battleground states. The suburbs around the biggest cities in key battleground states – Philadelphia, Detroit, Milwaukee and Phoenix, for instance – are populated by college-educated professionals who have traditionally voted for Republicans but who polls indicate have doubts about returning Trump to the White House. "Her case for how she wins this thing is to create as broad a coalition as possible and bring over disaffected Republicans - people who just don't feel that they can vote for Trump again," Mr Bennett said.

  Former White House chief of staff John Kelly listens to then-President Donald Trump in 2018.

  Devynn DeVelasco, a 20-year-old independent from Nebraska, is one of those who had already been convinced by the long list of senior Republicans who worked for then-President Trump but now say he is unfit for office. Although she hopes some Republicans will join her in supporting Harris, she worries there is fatigue around the claims made about the former president. "When these reports [about Kelly’s comments] came out I wasn't shocked, it didn't change much," Ms DeVelasco told the BBC.
  • None AMERICAST: Why Trump supporters queue for hours to see him Republican strategist Denise Grace Gitsham said voters have been hearing similar rhetoric about Trump since 2016, so any new allegations were unlikely to move the dial. "If you're voting against Donald Trump because you don't like his personality, you're already a decided voter," she told the BBC. "But if you're somebody who's looking at the policies and that matters more to you than a vibe or a personality, then you're going to go with the person who you felt you did best under while they were in the White House." Both Harris and Trump have been sharpening their barbs in recent days. During a swing through Midwest battleground states on Monday, Harris repeatedly warned of the consequences of a Trump presidency – on abortion rights, on healthcare, on the economy and on US foreign policy.

  On Friday, she will hold a rally in Texas – the state she has said most dramatically represents the anti-abortion future if Trump is back in power. Next Tuesday, she will shift focus to Washington DC, with a rally reportedly planned by the National Mall, where Trump spoke before some of his supporters attacked the US Capitol. Trump, meanwhile, has continued his drumbeat of attacks on his Democratic counterpart. At a town hall forum in North Carolina, he said Harris was "lazy" and "stupid" and only became her party nominee because of her ethnicity and gender. He also issued his own warning, saying that "we may not have a country anymore" if Harris wins. None of these lines are a particular departure for Trump, however, as he has spent most of his campaign attacking Democrats and sticking to his core message on immigration, trade and the economy. Harris’s closing pitch, meanwhile, directed toward winning over anti-Trump Republicans and independents, isn’t without its risks, said Democratic strategist Bennett. "You are always shorting one thing to try to help promote something else," he said. "The candidate’s time and the time spent on advertising are the two most precious commodities. And how you spend those matters." Trump has been a polarising figure in American politics for more than eight years now. Most Americans have strongly held, and deeply ingrained, opinions about the man by now. If anti-Trump sentiment puts Harris over the top on election day, her latest strategic emphasis will have paid off. If not, the second-guessing will come fast and furious.

