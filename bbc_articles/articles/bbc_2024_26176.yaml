  The shift in message is a bid to win over moderate Republicans - but the former president accuses her of peddling lies.

  Why Harris moved from 'joy' to calling Trump 'a fascist'

  This video can not be played To play this video you need to enable JavaScript in your browser. Watch: Harris says she thinks Donald Trump is a fascist

  On Wednesday afternoon, Kamala Harris stood in front of the vice-presidential residence in Washington DC, and delivered a short but withering attack on her Republican presidential opponent. Calling Donald Trump "increasingly unhinged and unstable", she cited critical comments made by John Kelly, Trump’s former White House Chief of Staff, in a New York Times interview. The vice-president quoted Kelly describing Trump as someone who "certainly falls into the general definition of fascists" and who had spoken approvingly of Hitler several times. She said her rival wanted "unchecked power" and later, during a CNN town hall event, was asked point-blank if she believed he was a "fascist". "Yes, I do," she replied. Shortly after the town hall finished, Trump posted on X and Truth Social that Harris's comments were a sign that she was losing. He said she was "increasingly raising her rhetoric, going so far as to call me Adolf Hitler, and anything else that comes to her warped mind". In the home stretch of political campaigns - particularly one as tight and hard-fought as the 2024 presidential race - there is a natural tendency for candidates to turn negative. Attacks tend to be more effective in motivating supporters to head to the polls and disrupting the opposing campaigns. For Harris, however, the heavier hand toward Trump stands in contrast to the more optimistic, "joyful" messaging of the early days of her campaign. While she did warn at the Democratic convention of a Trump presidency without the guardrails, Harris largely stepped back from President Joe Biden’s core campaign message that Trump posed an existential threat to American democracy. According to political strategist Matt Bennett of the centrist Democratic group Third Way, however, it is clear why Harris was quick this time to amplify Kelly’s dark portrait of Trump as a man with authoritarian tendencies.

