title: Supreme Court sceptical of Mexican lawsuit against US gunmakers - BBC News
date: '2025-03-04'
section: World
url: http://www.bbc.co.uk/news/articles/cgm1jr9pzw4o
content: |-
  Mexico accuses US firms of practices that help arm gangs, but the US gun trade association denies wrongdoing.

  Supreme Court wary of Mexico's fight against US gunmakers

  Mexico says a "flood" of illegally-obtained US guns is driving cartel violence in the country

  The US Supreme Court appears likely to block a lawsuit by Mexico against US gun manufacturers - who are accused of putting vast arsenals of weapons in the hands of drug cartels. In the long-running lawsuit, Mexico's government argues that the "flood" of illegal guns across the border is a result of "deliberate" practices by US firms. The gun industry's trade association has denied any wrongdoing and blamed Mexico's government for failing to control crime. The flow of guns from the US to Mexico has recently emerged as a bargaining chip in talks over the implementation of tariffs on Mexican goods entering the US.

  During oral arguments on Tuesday, liberal and conservative justices alike expressed scepticism about Mexico's claims that US guns contribute to criminal networks. "What you don't have is particular dealers, right?" liberal Justice Elena Kagan told the lawyer representing Mexico. "Who are they aiding and abetting in this complaint?" The lawsuit, which was first filed in 2021 in a federal courthouse in Massachusetts - where several of the companies are based - argued that the manufacturers knew that guns were being sold to traffickers fuelling violence in the country. It has since become the focus of years of legal wrangling and appeals.
  • None Mexico's fight to sue US gun manufacturers for $10bn According to Mexican authorities, tens of thousands of US-manufactured guns are trafficking south across the border each year and into the hands of drug cartels, which use them to fight each other and the Mexican government alike. Some estimates put the total at over half a million weapons each year. The gun manufacturers, along with support groups such as the National Rifle Association (NRA), have argued that they are legally protected and that a lawsuit would undermine gun rights for Americans. "Mexico has extinguished its constitutional arms rights and now seeks to extinguish America's," the NRA wrote in a legal brief filed to the Supreme Court. "To that end, Mexico aims to destroy the American firearms industry financially." At the heart of the gun manufacturers case is a federal law known as the Protection of Lawful Commerce in Arms Act, or PLCAA. The law, enacted in 2005, is designed to protect gun companies from being held liable for the misuse of their weapons by criminals. The Supreme Court case marks the first time the highest court in the US will consider the law. In court on Tuesday, liberal Justice Ketanji Brown Jackson said she thought it was likely the PLCAA means that "we don't want the courts to be the ones to be crafting remedies that amount to regulation on this industry". The Mexican lawsuit also suggests that some weapons are being manufactured and decorated specifically to the tastes of cartel members - such as a gold-plated gold pistol known as the "Super El Jefe", Spanish for "the boss". "Those are all things that are not illegal in any way," conservative Justice Brett Kavanaugh said of the argument. "There are some people who want the experience of shooting a particular type of gun because they find it more enjoyable than using a BB gun." Kavanaugh also expressed concerns that penalising companies for the misuse of their products could ultimately impact other industries, such as pharmaceuticals. The issue of US weapons in Mexico recently emerged as part of last-minute diplomatic manoeuvring over US President Donald Trump's threats to impose 25% tariffs on goods coming from Mexico. As part of a last-minute deal to avoid the tariffs coming into effect on 3 February, Mexican President Claudia Sheinbaum said the US had agreed to increase measures to prevent the trafficking of high-powered US weapons into Mexico. On 14 February, however, Sheinbaum warned that the lawsuit against manufacturers could be expanded if the US designated Mexican cartels as foreign terrorist organisations - a move the administration took just days later. Trump's tariffs on goods from Mexico - and from Canada and China - ultimately came into effect on 4 March. At least 25,000 people were murdered last year in Mexico, which has extremely restrictive gun laws. The country is home to only one gun shop, housed in a Mexico City military complex. Statistics from the US Bureau of Alcohol, Tobacco, Firearms and Explosives (ATF) show that between 2017 and 2022, nearly half of all weapons recovered from crime scenes in Mexico were manufactured in the US.
