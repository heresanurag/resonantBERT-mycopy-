  Portstewart Promenade remained closed to traffic on Monday due to structural damage caused by heavy rain, but pedestrian access had been reinstated.

  Mayor of Causeway Coast and Glens Richard Holmes said rainwater had backed up in the pipes under the promenade and could "not get away fast enough".

  The promenade has reopened to pedestrians

  He said work had been carried out overnight and it was hoped the road would be repaired later on Monday, and businesses were open as normal.

  Businessman Damian Morelli said the road had broken up and lifted in places, following a thunderstorm at about 18:00 on Sunday evening.

  The Mayor of Causeway Coast and Glens said he hopes the road will be resurfaced later on Monday

  "Basically the water started to lie on the promenade, run down the promenade, and then all of a sudden, the surface of the road started to break up in places," he said.

