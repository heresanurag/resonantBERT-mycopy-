title: O'Doherty's coffin makers fire 'caused by lightning' - BBC News
date: '2021-07-05'
section: Northern Ireland
url: http://www.bbc.co.uk/news/uk-northern-ireland-57718799
content: |-
  The blaze broke out at O'Doherty & Sons in Strabane on Sunday as storms hit the north west.

  This video can not be played To play this video you need to enable JavaScript in your browser. The fire broke out at O'Doherty's on Railway Street in Strabane

  A large fire which destroyed a coffin makers in Strabane, County Tyrone, was caused by lightning, NI Fire and Rescue Service has said.

  The blaze broke out at O'Doherty & Sons on Railway Street on Sunday afternoon as storms hit the north west.

  At the height of the fire, 80 firefighters, 10 fire engines and four special appliances fought the flames.

  Manus and Charles O'Doherty said the fire had destroyed their "much loved family business".

  There was "catastrophic damage" to the building, said Northern Ireland Fire and Rescue Service.

  "We have concluded our investigation now and we are satisfied that it [the fire] was due to the lightning storm at the time, given the time it occurred, given the video footage we have seen and from just the evidence of the fire," NIFRS Assistant Group Commander Kevin McLaughlin told BBC News NI.

  "It is quite unusual - a single-storey building in the middle of the town, you wouldn't expect it."

  Smoke from the fire could be seen across the town

  O'Doherty & Sons Ltd has been based on Railway Street since 1908.

  "We've been part of the fabric of Strabane town," said the family in a statement. "It's therefore a sad day for us to see so much of our family history destroyed by this fire."

  "As a family we are absolutely devastated that a fire has destroyed our much loved family business."

  The businessmen thanked the fire service and the "employees, customers, suppliers, the public, and local businesses for their many messages of support at this tough time".

  West Tyrone MLA Daniel McCrossan said his thoughts were with the family.

  "This is a family who have been on this street for 113 years," said Mr McCrossan.

  "I cannot get out of my mind today the impact this has had on this family and on the community. It hits very hard for people, this is one of the oldest longest surviving businesses in this town."

  A number of the businesses' 27 employees were at the building on Monday morning to see how they could help, he added.

  Firefighters working to bring the fire under control

  Mr McCrossan had earlier told BBC News NI he had heard an "explosion" on Sunday afternoon and said there had been a very loud lightning strike in the area.

  Derry City and Strabane District Council had warned the public to be cautious of flooding across the area on Sunday as storms hit.

  The Western Trust said part of its new waiting area in the Emergency Department at Altnagelvin Hospital had to be closed due to minor flooding.

  A number of homes and businesses in Londonderry were badly affected, said DUP Foyle MLA Gary Middleton.

  "We are still assessing the overall damage. Two of the families we were with yesterday afternoon have had to go to alternative accommodation," he told BBC Radio Foyle.

  Claudia Kassova and Daniel Fray, whose home was damaged by the flooding, returned to their Waterside home on Sunday afternoon to find a burst manhole behind their house.

  Claudia said the burst manhole saw water gush through the downstairs of their Waterside home.

  "The water just came out of nowhere and was gushing through. We just couldn't stop it. There was nothing we could have done," Ms Kassova told BBC News NI.

  "When the manhole burst, everything was just coming up."

  The couple said everything on the ground floor of the house had been ruined.

  On Sunday, the lower deck of the Craigavon Bridge in Londonderry was obstructed from the Duke Street direction by a car in flood water.

  The council's mayor, DUP councillor Graham Warke, tweeted a picture showing flooding on the lower deck.

