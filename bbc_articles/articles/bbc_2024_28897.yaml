content: |-
  Head coach Warren Gatland will today lead his adopted country for the 149th time when Wales host world champions South Africa.

  Gatland's Wales innings to be tested by Springboks

  Warren Gatland led British and Irish Lions on three tours as head coach

  Coverage: Live on S4C, BBC Radio Wales, Radio Cymru, live text and commentary on the BBC Sport website and app

  Head coach Warren Gatland will today lead Wales for the 149th time. Whether the New Zealander raises his bat for an unbeaten 150 in Paris for the Six Nations opener against France next January is up for debate. As usual, the Wales coach will travel to the game with his squad on the bus that drives through the 'Gatland Gates' on the way into the Principality Stadium. Double world champions South Africa are the opponents. Hardly ideal when Wales have lost a record 11 consecutive internationals, Gatland's side are facing an 11th defeat in a so far winless calendar year when they have slipped to 11th in the world. Wales' doubters fear a cricket score against the Springboks and hope South Africa might declare. Eternal optimists hope Wales can somehow defy the form guide by producing a minor miracle and help alleviate the dark days of Welsh rugby.

  It has been a strange week following the record 52-20 loss against Australia in Cardiff last Sunday. A waiting game to see what might happen but nothing has. Speculation about Gatland's position intensified, after the man who had the highest winning streak in Welsh rugby history of 14 games in 2018 and 2019, was now responsible for the longest losing sequence. In the bowels of the Principality Stadium after the Wallabies drubbing, Gatland looked forlorn as he said he would resign if it was in the interests of Welsh rugby and could not answer whether he would be in charge this weekend, let alone for next year's Six Nations. But he is still there and there has been an element of business as usual over the last few days. There has been more defiance from the Wales coach as he reiterated he wants to carry on and raised questions whether bringing somebody else in would change results. Gatland has runs on the board from his first Wales innings that lasted 12 years and ended in 2019 with three Grand Slams, two World Cup semi-finals and an overall record of 70 wins in 125 games, a success rate of 56%. In cricket's Test match arena, the second innings is often more challenging and Gatland's rugby return has been no exception. Six victories and 17 losses in 23 matches, a sorry win rate of 26% and no Test victory since October 2023 demonstrates the contrasting fortunes.

