  There appear to be two schools of thought on Gatland's Wales future. One opinion is the sport has moved on from his first spell of being Wales' most successful coach and his style is outdated. Former Wales captain Gwyn Jones has accused Gatland of already "checking out", saying his "race is run". The conflicting view is Gatland is still the man to turn Wales around with no other coach being able to achieve results with such an inexperienced group of players. Gatland insisted this week the squad had received public support which has helped the squad cope in the latest crisis. Wales assistant Rob Howley called his boss the best coach in the world and confidently asserted he would not leave his role. That is an opinion you would expect from somebody who has worked with Gatland for 20 years for Wasps, Wales and the British and Irish Lions, but it is also a view shared by others. There has also been external support from South Africa head coach Rassie Eramus and captain Siya Kolisi. Five years ago, Gatland's team almost defeated the Springboks in a World Cup semi-final. In 2022, Wayne Pivac's side became the first Wales men's team to win a Test in South Africa. Things have changed considerably and today's teams are poles apart in terms of depth and experience. The Springboks have 963 caps in their matchday 23 while Wales only muster 334, including just 61 internationals in the home seven-man starting backline. South Africa's second-row duo of Eben Etzebeth and Franco Mostert have 207 caps, two more than Wales' starting side.

  While opinion on Gatland is polarised, what cannot be debated is that Welsh rugby is in disarray. The Welsh Rugby Union (WRU) is much-maligned. The governing body is the custodian of the game in Wales which has failed in its duties in recent years. Whether you think Gatland is the right man to continue in the Wales role, he has fronted up to the barrage of bouncers bowled at him in recent days. In contrast, the WRU bosses have been hiding in the pavilion, looking for a night-watchman to take on the chin music, rather than stride to the wicket to face the deliveries thrown down. WRU executive director of rugby Nigel Walker positioned himself at the back of Gatland's press conference last weekend to listen to events. Walker also has questions to answer alongside chair Richard Collier-Keywood and chief executive Abi Tierney. Welsh rugby's governing body has significant decisions to make. Not just about Gatland's future where there will be concerns over the financial implications over his departure, with the man himself this week stating there is no break clause in his contract. There are also a plethora of other issues to be solved. Conspicuous by their absence for most of the year, the WRU hierarchy will at least be under the microscope when they face the clubs at the annual general meeting on Sunday morning. That occasion takes place at the same venue and roughly the time that Wales players and coaches will be checking out following another international campaign. Whether Gatland will be checking back in next January remains to be seen. Dismissed for 149 or soldiering on for another milestone next year? Events in Wales' final match of a horrendous 2024 might just determine the answer.
