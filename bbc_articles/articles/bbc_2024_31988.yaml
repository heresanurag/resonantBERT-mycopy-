content: |-
  Astronauts on the International Space Station send a festive message from orbit, some 250 miles (400km) above Earth.

  This is the moment astronauts on the International Space Station sent a festive message from orbit, some 250 miles (400km) above Earth.

  Two of the astronauts - Sunita Williams and Barry Wilmore - have been stranded on the space station for more than six months, having only originally expected to stay for a week.
