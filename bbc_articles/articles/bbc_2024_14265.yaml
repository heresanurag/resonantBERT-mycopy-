title: Doorbell camera films Amazon driver taking parcel on doorstep - BBC News
date: '2024-06-07'
section: Nottingham
url: http://www.bbc.co.uk/news/articles/c1rrlqz4434o
content: |-
  The Nottingham residents have posted the footage online after their parcel went missing.

  This video can not be played To play this video you need to enable JavaScript in your browser.

  A doorbell camera captured an Amazon delivery driver dropping off a parcel in Nottingham, then leaving with a package left on the doorstep earlier that day. Amazon says it is investigating the incident, which happened in a cul-de-sac in Sneinton in May. A mobile phone bought from Ebay for £225 had been left out of sight of the street by Royal Mail in the morning, but went missing after an Amazon driver left a parcel that afternoon. Resident Rosa Vasa shared the footage of the theft captured by her Ring doorbell online in a bid to warn other people.

  She told the BBC: “I think sometimes people need money to support their own problems. “It’s heart-breaking, my son worked hard to get the money for the phone. “We shared the video, and people have been supportive, the community has been really helpful. I think people will be more alert now.”

  The phone had been bought by her son, 18-year-old student Nahum Brodskis, using money earned working alongside his studies. He has been in contact with Amazon over the missing package. He said: “It’s been frustrating. You get in contact and speak to one person, then you have to speak to another. "But they have been cooperative, and they are investigating it. “I’d like them to do more background checks when they hire their drivers, it might help stop these sorts of petty crimes.” An Amazon spokesman said: “We have very high standards for the delivery service providers we work with and how they serve customers. Follow BBC Nottingham on Facebook, external, on X, external, or on Instagram, external. Send your story ideas to eastmidsnews@bbc.co.uk, external or via WhatsApp, external on 0808 100 2210.
