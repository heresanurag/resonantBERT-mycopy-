title: 'Luigi Mangione: Who is the suspect in the shooting of UnitedHealthcare CEO
  Brian Thompson? - BBC News'
date: '2024-12-10'
section: US & Canada
url: http://www.bbc.co.uk/news/articles/cp9nxee2r0do
content: |-
  The 26-year-old was allegedly detained with a gun, bullets, fake IDs, cash and a handwritten "manifesto".

  The scion of a prominent Maryland family who came top of his class at an elite private school before graduating from an Ivy League college, Luigi Mangione seemed to have everything going for him, according to friends. They have been left stunned by the 26-year-old's arrest for the murder of UnitedHealthcare's chief executive Brian Thompson, who was fatally shot last week in New York City. Mr Mangione will plead not guilty, his lawyer says. According to a law enforcement bulletin seen by US media, Mr Mangione was allegedly motivated by resentment at what he called "parasitic" health insurance companies. He had spent time in a surfing community in Hawaii, but left owing to debilitating back pain, say those who remember him. It is unclear, however, to what extent his own health troubles shaped his views of the medical industry.

  Mr Mangione is currently being held without bail and is fighting extradition to New York, where he has been charged with first-degree murder and two counts of second-degree murder, one count that described the CEO's slaying as an act of "terrorism". He was charged in Pennsylvania with forgery, carrying firearms without a licence, tampering with records or identification, possessing instruments of crime and providing a false identification to police. He was arrested five days after the attack, at a McDonald's in Altoona, Pennsylvania, and was allegedly in possession of a gun, bullets, multiple fake IDs and cash. Mr Mangione also had a handwritten document that expressed "ill will" towards corporate America and included passages such as "frankly, these parasites had it coming", according to police. Investigators say the words "deny", "defend" and "depose" were written on shell casings found at the scene of Mr Thompson's murder. Law enforcement sources say this may be a reference to the "three Ds of insurance" - tactics used by companies to reject payment claims by patients. Mr Mangione comes from a prominent family in the Baltimore area who are known for businesses including country clubs, nursing homes and a radio station according to local media.

