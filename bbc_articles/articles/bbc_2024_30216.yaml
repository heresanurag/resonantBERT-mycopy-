  Friends have told US media he had surgery on his back. The background image on an X account believed to belong to Mr Mangione shows an x-ray of a spine with hardware in it. On a Reddit account that appears to have belonged to him, Mr Mangione reportedly posted about his struggles with chronic back pain and brain fog. A former roommate, RJ Martin, told the BBC that while Mr Mangione "never complained", his back pain at times "prohibited him" from doing "many normal things", such as surfing or playing volleyball. Mr Martin - who eventually lost contact with Mr Mangione - said that he believed his former friend "would have never conceived of hurting someone else". "There's no making sense of it," he added.

  The gun found with Luigi Mangione when he was found in Pennsylvania

  A person matching his name and photo had an account on Goodreads, a user-generated book review site, where he read two books about back pain in 2022, one of them called Crooked: Outwitting the Back Pain Industry. He also gave four stars to a text called Industrial Society and Its Future by Theodore Kaczynski – also known as the Unabomber manifesto. Starting in 1978, Kaczynski carried out a bombing campaign that killed three people and injured dozens of others, until he was arrested in 1996. In his review, Mr Mangione acknowledged Kaczynski was a violent individual, but also described him as a political revolutionary. Mr Mangione's mother reported him missing in November to San Francisco authorities, telling them she had not heard from her son since July. After police began searching for the shooting suspect in Thompson's murder, the missing person report Mr Mangione's mother filed was flagged to authorities, New York Police Department Chief of Detectives Joseph Kenny told reporters on Tuesday. Police contacted Mr Mangione's mother, who did not identify her son as the suspect but said "it might be something that she could see him doing".
