title: Batman and Robin costumed police make Westminster Bridge arrests - BBC News
date: '2025-04-13'
section: General
url: http://www.bbc.co.uk/news/videos/c5yg6q0861ro
content: |-
  Two Met officers launched the "superhero mission" to tackle illegal Westminster Bridge gambling.

  Two Metropolitan Police officers have gone undercover in unconventional fashion by dressing as Batman and Robin to tackle illegal gambling on Westminster Bridge.

  They donned the unusual uniforms to target suspects familiar with their usual patrols, the Met said.

  On 15 February, Insp Darren Watson (Batman) and sidekick PC Osman (Robin) carried out a "superhero mission" that led to the conviction of two men.

  Insp Watson said the unusual tactic had proven "highly effective".

  He added: "I remembered that I had Batman and Robin costumes to hand which could come in useful."

  Insp Watson said he was "thrilled" to see the unusual crime fighting tactic work to "take these people off the street and protect tourists and Londoners from being fleeced".

