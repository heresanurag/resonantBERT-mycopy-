title: Biden lashes out at CNN reporter - BBC News
date: '2021-06-17'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-57507237
content: |-
  The president snaps at a female correspondent before apologising later on for being "a wise guy".

  The president snaps at CNN’s chief White House correspondent after she asks about his summit with Mr Putin.

  "If you don't understand that you're in the wrong business," Mr Biden told Kaitlan Collins.

  The US president later apologised on the tarmac for being "such a wise guy".
