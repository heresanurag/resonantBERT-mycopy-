content: |-
  The film director was honoured just days before the release of his latest movie, Beetlejuice Beetlejuice.

  Film director Tim Burton was honoured with a star on the Hollywood Walk of Fame in Los Angeles just days before the release of his latest movie, Beetlejuice Beetlejuice.

  Cast members Michael Keaton and Winona Ryder joined Burton at the ceremony, held outside his favourite childhood costume and toy shop.

  Burton is the 2,788 person to receive a Hollywood Walk of Fame star.
