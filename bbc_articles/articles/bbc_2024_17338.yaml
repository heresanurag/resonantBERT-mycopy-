title: Huw Edwards charged with making indecent images of children - BBC News
date: '2024-07-30'
section: Culture
url: http://www.bbc.co.uk/news/articles/crgr49q591go
content: |-
  The former BBC News presenter will appear in court on Wednesday.

  Former BBC News presenter Huw Edwards has been charged with three counts of making indecent images of children. The offences are alleged to have taken place between 2020 and 2022 and relate to 37 images that were shared on a WhatsApp chat, according to the Metropolitan Police. The broadcaster was arrested last November and charged last month, the force revealed on Monday. He is due to appear in court in London on Wednesday.

  A Metropolitan Police spokesperson said: "Huw Edwards, 62, of Southwark, London has been charged with three counts of making indecent images of children following a Met Police investigation. "The offences, which are alleged to have taken place between December 2020 and April 2022, relate to images shared on a WhatsApp chat. "Edwards was arrested on 8 November 2023. He was charged on Wednesday, 26 June following authorisation from the Crown Prosecution Service. "He has been bailed to appear at Westminster Magistrates' Court on Wednesday, 31 July. "Media and the public are strongly reminded that this is an active case. Nothing should be published, including on social media, which could prejudice future court proceedings." Mr Edwards is accused of having six category A images, the most serious classification of indecent images, on a phone. He is also accused of having 12 category B pictures and 19 category C photographs. A conviction at Crown Court could lead to a prison sentence of several years. According to the CPS website, "making indecent images can have a wide definition in the law and can include opening an email attachment containing such an image, downloading one from a website, or receiving one via social media, even if unsolicited and even if part of a group.” He was previously the corporation’s most high-profile and best-paid news anchor, one of the main presenters on BBC One's Ten O'Clock News, and was often chosen to front coverage of major national events.
