title: 'Worksop explosion: Man killed in blast that destroyed houses - BBC News'
date: '2025-04-13'
section: Nottinghamshire
url: http://www.bbc.co.uk/news/articles/c9djg62ye25o
content: |-
  The blast in Worksop, Nottinghamshire, has destroyed homes and led to evacuations on Saturday evening.

  The man died at the scene, police said

  A man has died in a house explosion that wrecked multiple properties and led to dozens of evacuations. Homes in John Street, Worksop, Nottinghamshire, were evacuated and emergency services were called to the scene just before 20:00 BST on Saturday. The terraced home where the explosion happened was destroyed and two neighbouring houses had partially collapsed, with eight other properties and 20 cars damaged by debris. On Sunday, police confirmed the body of a man, in his 50s, had been found in the wreckage while another person was taken to hospital with minor injuries and later discharged.

  Nottinghamshire Police said emergency services treated the man but were unable to save him and he died at the scene. The explosion was declared a major incident by emergency services on Saturday evening. Everyone else who may have been in the area at the time has been accounted for, police added.

  Police said it would remain at the scene overnight on Sunday and into Monday morning

  An investigation to establish the cause of the explosion continues, police said. A total of 35 properties in the area have been evacuated, with 48 residents needing alternative accommodation, said Julie Leigh, leader of Bassetlaw District Council. She said the council had provided alternative accommodation at the nearby Crown Place Community Centre, while others have been staying with family and friends. Ch Insp Clive Collings said: "This is an extremely serious incident that has led to a man's untimely death. "The man's family have been informed and are being supported by specially trained officers. "I have no doubt that this incident will have come as a shock to the community in Worksop." Anyone with concerns is encouraged to contact the force or speak to an officer at the scene, he added. Nottinghamshire Fire and Rescue Service (NFRS) said specialist urban search and rescue teams were called in to search the area after the blast.

  Residents said emergency services were quickly on the scene

  Later, demolition workers - including a cherry picker vehicle - attended the scene after midday on Sunday. Residents, who live near John Street, described "chaos" in the wake of the explosion. They said they had heard a loud crashing sound, which immediately prompted a large number of people to rush out into the street. One resident told the BBC there was thick black smoke in the street as some people ran towards the wrecked house to try to help. Bryony Wilkinson, who lives in John Street and was in her house at the time of the explosion, said: "It started off with a really loud bang and afterwards the whole house felt like it was shaking. "It put me into shock and I froze for five seconds. I could hear a commotion outside and saw the black smoke outside."

  On Sunday afternoon, a police spokesperson at the scene told the BBC that firefighters had ended their search operation. Meanwhile, demolition company Elite Group Demolition said it was waiting for permission to remove a dangerous wall. A Cadent gas van also passed though the cordon. Purvi Srikenthan, who runs the Today's Local shop on nearby Sandy Lane, said she had been helping provide free food to families who were staying at the community centre. The 43-year-old said: "We are here to help local people because we are part of the community. "There's a lot of families and children affected so we thought we might be able to help them and provide food. "I only just heard the news that a man has died which is really sad. I feel so sorry for that family and all of the people who are affected."

  Purvi Srikenthan donated snacks and other items to affected people

  Crews from fire stations in Warsop, Worksop, Mansfield and Clowne arrived at the scene soon after the explosion. Andy Wade, 59, says he lives 2.5 miles (4km) away but arrived at the scene because he knew the man who died. He said he "kept himself to himself most of the time". "I just heard a bang and I thought that's loud," Mr Wade said. "About 20 minutes later it all started appearing on Facebook and everyone got in touch with me to say there's been an explosion on John Street. "When the photos started coming through I knew whose house it was. I don't know the circumstances but I'm obviously very upset."

