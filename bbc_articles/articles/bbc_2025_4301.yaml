title: 'Lewis Crocker v Paddy Donovan: Belfast fighter wins chaotic fight via disqualification
  - BBC Sport'
date: '2025-03-02'
section: Boxing
url: http://www.bbc.co.uk/sport/boxing/articles/cqjd41g0ee4o
content: |-
  Belfast's Lewis Crocker wins a dramatic IBF eliminator against Paddy Donovan after his opponent is disqualified for delivering a punch after the bell at the end of the eighth round.

  Lewis Crocker celebrates winning his IBF eliminator in his native Belfast

  A hugely dramatic night in Belfast ended in chaotic scenes as Lewis Crocker was awarded the win in his IBF world title eliminator after opponent Paddy Donovan was disqualified at the end of the eighth round. Crocker's unbeaten professional record survived after referee Marcus McDonnell called time on a thrilling contest because Donovan landed with a big right hand delivered after the bell. The sudden conclusion came just after the Limerick fighter had sent Crocker down with a huge shot. Donovan earlier had points deducted in rounds six and eight for use of the elbow and head. The dramatic finish resulted in confusion as Donovan initially thought he had secured the knockout before realising McDonnell had disqualified him. "The crowd is ferocious in here. They say I hit him after the bell, but I thought I hit him on the bell," Donovan told DAZN. "You can see Lewis was a beaten man and I won the fight fair and square. The ref took my dreams away tonight." Donovan added: "We're going to appeal the decision and I want an automatic rematch right on the spot."

  Belfast fighter Crocker spent most of the opening round marching forward with his hands high and tight, his elbows tucked, with southpaw Donovan looking for separation to let his fast hands go and its was the latter who was the busier. The contest began to open up in the second as they both got through with shots on the inside, but Crocker was more economical as he seemed determined not to waste anything by throwing for the sake of it, yet this was allowing Donovan to get into a flow although he was forced to work non-stop. A cut appeared over Crocker's right eye in the third with referee McDonnell signalling it came from a punch and it was becoming a gruelling battle as the boxers traded up close. Donovan seemed to use downstairs as his target with Crocker bringing the uppercut into play but he would find himself with a huge welt under the left eye by the end of the fourth. These were visible signs that 'The Real Deal' was making a dent - his speed was hugely effective as he was first to land when they were at middle distance. Donovan had been warned on a couple of occasions for use of the elbow and in the sixth, it was once too many as a point was deducted. Still, there was a sense that Donovan was in the lead on the cards and Crocker needed something to get a bit of momentum to bring his crowd back to life. A couple of shots did that in the seventh, but Donovan's use of the head saw him on the end of another scolding and perhaps fortunate not to lose another point. His response was to up the pace as he threw in flurries, closing out the round in good style and he seemed to be on top in the eighth as he marched forward, but did ultimately lose that second point for use of the head. Again, he upped the pace and a shot into the mid-section had Crocker down. The Belfast man rose and threw some wild shots as they heard the bell, but Donovan wasn't done and inexplicably threw well after the bell on a vulnerable Crocker who was down and there was no option but to call it. What happens next is difficult to predict as Crocker moves to 21-0 and Donovan is now stuck with a first loss. As it stands, it is the Belfast man moving on to a welterweight title shot, although a rematch may not be out of the question.

  Referee Marcus McDonnell disqualified Donovan at the end of the eighth round

  On the undercard, Padraig McCrory suffered an eighth-round loss to Craig Richards as a body shot from the Londoner closed the show. Kurt Walker improved his record to 12-0 as the Lisburn featherweight came through an all-action battle against former Anthony Cacace foe Leon Woodstock to win via majority decision (97-93, 96-94, 95-95). Steven Ward claimed the bragging rights in his all-Belfast clash against Tommy McCarthy with a sixth-round stoppage. McCarthy was down from a big left at the end of the second and then again from a right in the sixth - this time unlocking the door to the finish as the follow-up assault saw referee Hugh Russell Jnr step in. In another local derby at super-bantamweight, Ruadhan Farrell settled the argument with a 79-73 points win over Gerard Hughes after the pair drew at the same venue in late 2023. Earlier in the night there were points wins for Jack O'Neill and Aaron Bowen, but Tipperary's Shauna Browne was sensationally blasted out by Elif Nur Turhan after just 43 seconds of their WBC lightweight eliminator.
