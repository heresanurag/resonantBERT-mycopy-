  Members of the public added names of women they admire to the textile artwork

  The best-selling author has been criticised for her views on gender identity and for arguing trans women should not be allowed into female-only spaces. Her comments have drawn both support and criticism in recent years on social media and from public figures. Visitors of all ages contributed names to the dress, which was created by artist Layla Khoo in association with University of Leeds and National Trust. The artwork was officially put on display in November.

  JK Rowling's name was added to the artwork multiple times

  Ms Hatchet posted on X that she had removed "hateful stitching", external and called on the Trust to "apologise to women immediately"., external In a post on X, external last month, the Trust said: "Any contributions to the piece have been made by those who chose to take part. "None of the views expressed or actions taken by participants represent the views of the National Trust, the artist or the University of Leeds."

  Other names included in the art work included novelist Agatha Christie, philanthropist Elizabeth Fry and nurse Edith Cavell.

  The artwork was inspired by a missing embroidery owned by Bess of Hardwick in the 16th Century. She had commissioned five embroideries for her stately home which were all made using recycled fabrics. They depicted women she thought would reflect her virtues, importance, wealth, education and values. While four of these remained at Hardwick Hall, a fifth featuring Cleopatra with Justicia and Fortitudo did not survive. Instead of recreating the missing original, Ms Khoo instead created a piece that was the same size and scale. Members of the public were then invited to add names of people that could reflect important virtues and values today. The National Trust had said the new piece would be on display throughout 2025.
