title: National Trust cover up tampered artwork in Derbyshire featuring JK Rowling
  - BBC News
date: '2025-06-05'
section: Culture
url: http://www.bbc.co.uk/news/articles/c2d5867e61go
content: |-
  A campaigner removed stitching on an artwork which covered the Harry Potter author's name.

  An activist unpicked stitching covering JK Rowling's name on the artwork

  The National Trust has covered up a piece of art featuring the name of author JK Rowling, after it was tampered with by a member of the public. Between April and November 2024 visitors to Hardwick Hall in Derbyshire were invited to stitch names of women they felt should be celebrated on to a textile display called Virtuous Woman. During this time, a participant stitched over the Harry Potter author's name. Last week, this stitching was removed by feminist campaigner Jean Hatchet., external The National Trust, who manage the property, said: "The artwork was open to contributions for eight months and closed in November when the piece was finished and put on public display."

  "We ask visitors not to tamper with any art on display," they added. "The piece has been taken off display while we investigate the damage caused and consider next steps."

