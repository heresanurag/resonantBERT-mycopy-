title: Taylor Swift stops security from ejecting fan mid-concert - BBC News
date: '2023-05-17'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-65617626
content: |-
  When the singer noticed security removing a fan during her concert, Swift came to the fan's defence.

  A fan filmed Taylor Swift as she stopped singing during her hit song Bad Blood to stop a security guard from ejecting a woman from her Philadelphia concert,.

  Primary school teacher Kelly Kelly was at the show on the weekend, dancing in front row seats with her sister and friends. She told the Good Morning America show, broadcast on ABC, that a security guard, "Just kept telling me to stop, he kept telling me to calm down and, like, not to dance...and I guess she noticed."

  "She yelled at him to leave me alone, and that I wasn't doing anything wrong."

  Kelly also revealed she received free tickets to see the show in Philadelphia again.
