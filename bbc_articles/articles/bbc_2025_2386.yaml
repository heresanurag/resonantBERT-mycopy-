content: |-
  Keir Starmer hands the US president an invitation letter as the pair meet at the White House.

  This video can not be played To play this video you need to enable JavaScript in your browser.

  US President Donald Trump has been invited to the UK for a second state visit by the King. Prime Minister Sir Keir Starmer used his trip to the White House to present Trump with the invitation letter from King Charles. Sir Keir said the president's last state visit in 2019 had been a "tremendous success" and that the invite for a second visit was "truly historic" and "unprecedented". Speaking to reporters in the Oval Office after reading the letter, Trump said he accepted the invite and that it would be an "honour" to visit the "fantastic" country. He added that King Charles was a "beautiful man, a wonderful man".

  Traditionally second-term US presidents are not offered a state visit and have instead been invited for tea or lunch with the monarch at Windsor Castle. King Charles' letter proposed a meeting to discuss details of the state visit at either Dumfries House or Balmoral, both in Scotland, a country to which Trump has connections. His mother was born and brought up on the Hebridean island of Lewis. This year he is planning to open a new golf course in Aberdeenshire, to be named after his mother. The letter, which Trump showed to the cameras, read: "Quite apart from this presenting an opportunity to discuss a wide range of issues of mutual interest, it would also offer a valuable chance to plan a historic second state visit to the United Kingdom. "As you will know this is unprecedented by a US president. That is why I would find it helpful for us to be able to discuss, together, a range of options for location and programme content. "In so doing, working together, I know we will further enhance the special relationship between our two countries of which we are both so proud." Trump joked that he would have to check if the signature was real.

  Donald Trump was hosted by the late Queen during his three-day state visit in 2019

  At a joint news conference later, Trump said a trade deal between the US and UK could happen "very quickly" and could see the UK avoiding the kind of tariffs the president has been threatening on other countries. Sir Keir said the two countries would begin work on a new economic deal which would be centred on the potential of artificial intelligence. During his visit Sir Keir also hopes to influence Trump as he seeks to reach a peace deal between Ukraine and Russia. Speaking on the plane to the US, Sir Keir told reporters that a deal would not stop Vladimir Putin from invading Ukraine again, unless the US were able to provide security guarantees. Asked if the US could offer such support, Trump said a proposed deal with Ukraine over access to critical minerals would provide "a backstop". "We are a backstop because we will be over there, we will be working in the country," he said. Since becoming prime minister, Sir Keir, who had previously been critical of the president, has sought to build a close relationship with Trump. However, he did feel compelled to contradict the US president when he accused Volodymyr Zelensky of being a dictator. Asked about his dictator comments, Trump said: "Did I say that? I can't believe I said that. Next question." Pressed over whether he would approve the UK's potential deal to hand over the Chagos Islands to Mauritius, Trump said: "We're going to have some discussions about that very soon, and I have a feeling it's going to work out very well. "I think we'll be inclined to go along with your country," In an interview after arriving in the US on Wednesday, Foreign Secretary David Lammy said the controversial deal would not go ahead unless the US supported it. Under the proposal, the UK would cede sovereignty of the Chagos archipelago to Mauritius but would still be able to use one of the islands, Diego Garcia, which includes a UK-US military airbase.
