title: Doctor told to apologise to Lucy Letby in 2016 over murder claim - BBC News
date: '2024-10-08'
section: England
url: http://www.bbc.co.uk/news/articles/c5y34qplygxo
content: |-
  The doctor denies knowing who Lucy Letby was until he was asked to apologise to her seven months later.

  Lucy Letby, 34, from Hereford, is serving 15 whole-life orders in prison

  A doctor was told by hospital bosses to apologise to Lucy Letby over claims he called her a murderer more than two years before she was eventually arrested, a public inquiry has heard. Obstetrician Dr Jim McCormack was said to have made the remark during a meeting between medics and senior nursing staff after the sudden and unexpected deaths of two triplets at the Countess of Chester Hospital's neonatal unit in June 2016. Giving evidence earlier at the Thirlwall Inquiry, which is examining how the nurse was able to murder and attack babies at the hospital, the now-retired doctor denied naming Letby. He said he did not know who she was until he was asked seven months later to apologise to her.

  Dr McCormack said senior paediatricians had called a "very unusual" 07:30 meeting with obstetricians and senior neonatal nursing staff in response to the triplet deaths. He said neonatal lead consultant Dr Stephen Brearey told those gathered there was "a concern that a nurse was causing intentional harm to babies upon the unit". Dr McCormack said: "I said: 'Are you saying that a nurse on the unit is a murderer?' And he replied: 'Yes.' "We were absolutely shocked at this stage. Everybody was taken aback, certainly from an obstetric point of view." The first he said he knew there had been any concern at what he had said in the meeting was when he received a phone call from medical director Ian Harvey to go to his office. "I walked into his office, sat down with him and he (Mr Harvey) said: 'You are going to have to make an apology to Lucy Letby.' "Now, I didn't even know who Lucy Letby was. At that meeting of the paediatricians Steve Brearey didn't say the name of the person, nor whether it was male or female."

  The inquiry is being chaired by Lady Justice Thirwall

  The inquiry heard Mr Harvey informed him that his reported remark had been documented in an HR report related to a grievance procedure Letby took out over her removal from the neonatal unit in July 2016 to non-patient duties. Dr McCormack said: "I told Mr Harvey that's not the case, it's definitely not the case. I said: 'You know, this isn't right that this is down in an official document."' The inquiry, chaired by Lady Justice Thirwall, has previously heard that seven consultants had already signed a joint letter of apology to Letby after hospital chief executive Tony Chambers told them they had "upset" the nurse by linking her to increased number of deaths on the unit. Dr McCormack said Mr Harvey told him Mr Chambers had "insisted" that he should also apologise in writing. He told the inquiry: "I was in the position where the paediatricians had apologised and it had already been documented in an HR report so I'm not going to be able to be in a position to get out of this." On 8 March 2017 he wrote to Letby: "I have been reported to have made an inappropriate comment during meetings with the consultants and senior nursing staff when discussing events related to the neonatal unit issue. "I wanted to apologise to you if this caused you any distress. "I am only aware recently that your first name is Lucy and I have specifically avoided knowing your identity or name to try and afford you some anonymity when you return to work in the neonatal unit. "I have made no specific derogatory reference personally about yourself." Counsel to the inquiry Rachel Langdale KC asked: "At the time, did you think you should have to be sending that letter?" Dr McCormack said: "No, I didn't. Not at all. "I was surprised she accepted it because I was really saying nothing. I didn't actually apologise for calling her a murderer. In my letter I was very careful what I wrote."

  Lucy Letby was a neonatal nurse at the Countess of Chester Hospital

  He added it was "extremely disappointing" the hospital's HR department did not check with him whether there was any truth in the alleged comment about Letby. Dr McCormack said: "I couldn't understand it. I asked Ian (Harvey) if he could he go back and address that with the HR team because there seemed to be something amiss... because I hadn't had an opportunity to discuss the situation in which the remark was made." Cheshire Police were not called in to investigate the increased mortality rate at the Countess of Chester until May 2017 as Letby continued to work there until her arrest in July 2018. Letby, 34, from Hereford, is serving 15 whole-life orders after she was convicted at Manchester Crown Court of murdering seven infants and attempting to murder seven others, with two attempts on one of her victims, between June 2015 and June 2016. The inquiry is expected to sit at Liverpool Town Hall until early next year, with findings published by late autumn 2025.
