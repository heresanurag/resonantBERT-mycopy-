title: 'Londonderry: Thousands enjoy Halloween festival finale - BBC News'
date: '2024-11-01'
section: Northern Ireland
url: http://www.bbc.co.uk/news/articles/c93q8p5jvl9o
content: |-
  The four-day programme of events came to a close with a parade and riverfront fireworks display.

  This video can not be played To play this video you need to enable JavaScript in your browser. Thousands lined the banks of the River Foyle to watch the parade and fireworks

  Thousands of people have taken part in the finale of the annual Halloween festival in Londonderry, with about 600 of them parading through the city. Billed by organisers as the largest Halloween event in Europe, the four-day festival culminated in a parade and fireworks display on Thursday. The festivities in Derry have grown to global renown since the first official Halloween celebrations in 1986 and it is now regarded as among the world's premier destinations for Halloween. Derry City and Strabane District Council say the festival draws tens of thousands of people to the city.

  The council's Aideen McCarter said the 2024 festival had been "bigger and better than ever". "We have had a fantastic few nights," she said. "It brings millions of pounds into the local economy and we see well over 100,000 visitors here if not more – these visitors are coming back year after year."

  Organisers say the celebrations in Derry are the biggest in Europe

  The main Halloween parade left Queens Quay Car Park at 19:00 GMT on Thursday along Queens Quay to Strand Road, Harbour Square roundabout, Foyle Embankment. Water Street, Harbour Square roundabout, Queens Quay and back to the car park. Queens Quay, Upper Strand Road and the Peace Bridge closed to accommodate the parade.

  The festival is billed by organisers as the largest Halloween event in Europe

  Translink put on additional bus and rail services on Halloween night. These included extra Foyle Metro, Ulsterbus and Goldliner services from Foyle Street Bus Station. At the North West Transport Hub train station, additional capacity has been added to the 21:38 train departure to Belfast Grand Central Station, followed by an additional rail service at 22:38 to Coleraine Station. A special coach service also operated from Belfast Grand Central Station on Halloween at 15:00, making its return journey from Foyle Street Bus Centre at 21:00. A full list of rail services for people to get to and from the parade can be found here, external.

  This video can not be played To play this video you need to enable JavaScript in your browser. The event last year was hailed as a huge success by organisers

  The celebrations featured the return of the Awakening the Walled City trail within Derry city centre from Monday until Wednesday. Speaking to BBC Radio Foyle's North West Today programme earlier this week, festival organiser Aisling McCallion said there was something on offer for everyone. "We have programming right across the four days for people of all ages," she said. "We have storytelling, arts and crafts, shows and loads of live performances. "Personally, I am very excited we can welcome people back on the walls this year to see a variety of performances. "There will be a queuing and one-way system in operation for people to see the attractions on the walls in a safe and managed way."

  Ms McCallion said there were many events on offer and people were able to go around three designated zones in Derry and also see a variety of attractions in Strabane this year.

  Thousands of people are taking to the streets for the parade and fireworks display

  She said highlights of the programme this year included a witchy wonderland on the City Walls, projections on the Austins building and Bishop Street courthouse and Rodafonio - a travelling street theatre act created by renowned American designer and musician Cesar Alvarez. A full list of events on offer this year can be found here, external.

  Emily McCorkell, from Lo & Slo food truck, fed hungry festival-goers with American BBQ style delicacies at the Haunted Harvest Halloween market at Guildhall Square. She said she loved Halloween and that the festival was a "terrifyingly busy" time for traders involved in the Legenderry Food Network.

  Emily McCorkell will be at the Lo & Slo food truck in Guildhall Square

  Gary Moran from Umi restaurant in the city centre said they had been “flat-out with bookings” throughout the festival. “We have got people coming here for the very first time to try it, which is great to see and then from word of mouth we can then hopefully then get additional bookings from that."

  Mohamed Ali from Maiden Heaven Coffee and Ice Cream Parlour has said they have been really happy with the amount of footfall in the city centre throughout the week. “It’s been steadily busy throughout the day and then it’s been unbelievably busy in the evening," he said. “We’ve had to increase our hours actually, we definitely had to increase them and we are working a bit longer over Halloween. “We usually open until six o’clock but we are now staying open until about ten in the evening now."

  Selina Horshi, the managing director of White Horse Hotel in Campsie, said many of the city's hotels were fully booked for Halloween. “Halloween is one of our busiest times and while a lot of our guests would be from the island of Ireland, we do get people travelling from all over the world to stay specifically to enjoy the sights and sounds of Derry Halloween,” she said. “It really has become such a huge international event."

  Many people from all over the world are staying in the White Horse Hotel in Campsie for Halloween, Selina Horshi says

  Selina said hotels, bars and restaurants all really benefitted from the huge uplift in footfall and that the four-day festival was a massive boost to the local economy. “Because we are based just on the outskirts of the city, we also benefit from a lot of people stopping on their way into and out of the city to get a bite to eat or drink for the Halloween festival,” she added. “I was in the city last night and every bar and every restaurant was jam-packed and that is exactly why these council-run events are so important for so many business owners and traders.”
