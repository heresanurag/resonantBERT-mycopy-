title: 'Watch: Dancing crowds in Aleppo celebrate end of Assad regime - BBC News'
date: '2024-12-13'
section: General
url: http://www.bbc.co.uk/news/videos/czd4y41pv0go
content: |-
  The BBC's Hugo Bachega sees Syrians dancing, waving flags and making peace signs in Aleppo.

  Syrians made peace signs, waved flags and danced at a rally in central Aleppo to celebrate the end of the Assad regime, which was witnessed by the BBC's Middle East correspondent Hugo Bachega.

  Mass rallies are taking place across the country to mark the end of five decades of authoritarian rule, after former President Bashar al-Assad fled to Russia.

  Aleppo witnessed, and was ravaged by, intense fighting between the opposition and government forces during the civil war.

  Earlier this month it became the first major city to be captured by Islamist-led rebels.
