content: |-
  King Charles shares a message for patients, carers and campaigners on Thursday's front pages.

  'King's cancer message' and 'No way... Not hymn'

  Because of guidelines for the local elections in England not all of Thursday's front pages can be displayed. King Charles III's "cancer message of hope" headlines the front page of Metro. "Being a statistic has shown me the very best of humanity," it quotes the King as saying, as he "hails patients, carers and charities". The Sun writes that the message of "rebellious hope" from King Charles was inspired by "Bowel-babe Dame Deborah James", the late journalist and cancer campaigner. A teary-eyed Percy Pig also features on the front page, as the paper bemoans "cyber crooks" who "gummed up" M&S supplies. "Take risks" and "love deeply" headlines the Daily Mirror, sharing the King's message in an echo of Dame Deborah. A smiling Catherine, Princess of Wales, also appears on the Mirror's front page with the caption "well, isle be", as she continues her trip with the Prince on the Western Scottish island of Mull. In the Daily Express, it is the King's "gratitude" for the "community of care" defying cancer that makes the top spot. A picture of him holding hands with a patient at University College Hospital in London accompanies the story. Donald Trump joked this week that he would "like to be Pope" when asked by reporters whom he would like to see as the new head of the Roman Catholic Church. "No way... not hymn" the Daily Star begs, over a mock-up of Trump in papal garb. "No one wants an orange pontiff," the paper, well, pontificates.

