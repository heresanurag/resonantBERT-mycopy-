title: Sturgeon predicts independence and united Ireland in UK 'shake-up' - BBC News
date: '2024-09-17'
section: UK
url: http://www.bbc.co.uk/news/articles/cj04j2mnr6qo
content: |-
  Ten years after the Scottish independence referendum, the former first minister predicts a "very healthy realignment" of the UK in years to come.

  This video can not be played To play this video you need to enable JavaScript in your browser.

  Nicola Sturgeon has predicted Scotland will become independent as part of a "wider shake-up" of UK governance, including Irish reunification. The former first minister also suggested further devolution for Wales in the coming years as part of a "very healthy realignment of how the nations of the British Isles are governed and co-operate together”. Speaking to BBC Scotland News to mark the 10-year anniversary of the 2014 independence referendum, the ex-SNP leader said she believed a Yes victory was "within grasp" on the eve of the vote. Former Scottish Tory leader Ruth Davidson also claimed Sturgeon lost her opportunity to secure a second referendum by making her call "so fast, so hard and so early" after the 2016 Brexit vote.

  Although the Yes side lost the referendum, the SNP enjoyed unprecedented electoral success in the decade since. But it has also been rocked by the loss of 39 seats in July's general election, a public fallout between Sturgeon and her mentor Alex Salmond and an ongoing police investigation into party finances. Asked about her future hopes for independence, Sturgeon said: “I believe that, perhaps as part of a wider shake-up of UK governance, the reunification of Ireland, perhaps, more autonomy in Wales, that I think we will see Scotland become an independent country. "I'll certainly campaign and advocate for that for as long as I've got breath in my body.” She declined to predict whether she thought Irish reunification or Scottish independence would come first, adding: “It's not a matter for me, obviously, just as Scottish independence is not a matter for people in Ireland. But I do think that will happen." In May 2022, 10 months before she stepped down as first minister, Sturgeon met Sinn Féin vice president Michelle O'Neill at her official Bute House residence in Edinburgh to discuss Brexit.

  Sturgeon said at the time that the departure from the EU had "brought to the fore some very fundamental questions" over governance in the UK. O'Neill became Northern Ireland's first nationalist first minister in February, fuelling debate about the possibility of a border poll. The 1998 Good Friday Agreement says that "the people on the island" should be able to exercise "their right of self-determination on the basis of consent, freely and concurrently given, North and South, to bring about a united Ireland", subject to the principle of consent in Northern Ireland. The Northern Ireland Act 1998 states, external that “if at any time it appears likely" that a majority of those voting in a border poll would "express a wish that Northern Ireland should cease to be part of the United Kingdom and form part of a united Ireland”, the secretary of state will consent to a border poll. It is not clear exactly how this process would come about. Prime Minister Sir Keir Starmer said last year that an Irish unity referendum was "not even on the horizon".

  Nicola Sturgeon says she was "unusually" optimistic about the result of the referendum

  Speaking to BBC Scotland News, Sturgeon described herself as a natural pessimist but said that was not the case come polling day, 18 September 2014. "Unusually for me, in the final days, I was really optimistic," she told BBC Scotland News. "I definitely felt that victory was within grasp.” The then deputy first minister had a leading role in the Yes campaign and spent the summer touring around Scotland. She returned to her home constituency of Glasgow Southside in the days before the referendum. “The mood on the streets of Glasgow gave me perhaps a bit of an overly optimistic view of how the campaign was going right across the country," Sturgeon said. The No side ultimately won by 55.3% to 44.7%. Sturgeon described the campaign as the "best of times and the worst of times". “What I remember most about the campaign was just the energy, the sense of political awakening and in engagement that seemed to grip Scotland," she said.

  Asked about any regrets, Sturgeon said she questioned whether the Yes campaign could have done some things differently. She cited a united front from Westminster parties in opposition to proposals for a currency union, and described as a "disaster" the first TV debate between Salmond and Better Together chairman Alistair Darling. Darling was thought to have got the better of that exchange in early August 2014 after pressing Salmond on a plan B on currency plans. Sturgeon added: "Because these things didn't lead to a haemorrhaging of Yes support, I think we comforted ourselves that they hadn’t done any real harm. "Looking back, I think these were moments that probably slowed down what was quite a steady shift of opinion from soft No undecided voters to the Yes side.” Later in August, Salmond was widely considered to have outperformed his opponent in the second televised debate.

  Alistair Darling and Alex Salmond faced off at the BBC debate in Glasgow's Kelvingrove Art Gallery and Museum

  Two years after the independence referendum, the UK voted to leave the EU - despite Scotland voting in favour of Remain by 62% to 38%. The SNP's subsequent demands for a second referendum were thwarted by Westminster, leading to criticism from within the Yes movement of Sturgeon's leadership. The ex-SNP leader admitted she “didn't get everything right, far from it". She said she "fervently" wished the SNP had made further progress on independence in the past decade.

  Sturgeon insisted while it may not feel like the Yes campaign was “motoring forward”, levels of support were stable, and especially high among young people. The former first minister added: “I came up against a brick wall of Westminster democracy denial in refusing the right of the Scottish people to choose their own future. "Do I wish I had found a way around that? Yes, but that was the situation I faced. “Had that right to choose been secured, I believe Scotland would have voted Yes.” Prof Sir John Curtice, president of the British Polling Council, told BBC Scotland News that support for independence had stabilised at just under 50%, external, and had been unaffected by the SNP's recent issues. According to YouGov polling, external published on Tuesday, four in 10 (39%) of 16 to 24-year-old respondents said they would back Yes, with three in 10 (31%) in favour of No. Yes was also more popular than No among 25 to 49-year-olds, although there was a majority for the union in older age groups.

