  In the immediate aftermath of the Brexit vote, Sturgeon had declared a fresh ballot on independence was “highly likely” - prompting her then deputy, John Swinney, to raise concerns about that strategy. Former Scottish Conservative leader Ruth Davidson, who campaigned for Better Together a decade ago, said Sturgeon "probably" had an opportunity at that time to move towards securing a second independence referendum. “Her appetite to go so fast, so hard and so early took that opportunity away from her," she told BBC Scotland News. She suggested Sturgeon should have “put party politics aside” and tried to work with the UK government to “salvage” what it could from Brexit. “And then maybe six months down the line said, you know what, I can’t work with these people, Scotland has another opportunity, it has another choice, I think things could have been materially different," Davidson said.

  The former Tory leader said that while she would have argued against a second referendum, it would have been "incredibly hard" if Sturgeon adopted a different approach. Davidson claimed people who may have supported Sturgeon's call for another vote were "turned off by the idea that she wanted to use Brexit to immediately jump to this other thing". Swinney, who succeeded Humza Yousaf as first minister in May, will address independence campaigners in Edinburgh to mark the anniversary of the referendum. He is expected to say that while he was "devastated" by the result, he is "in no doubt" the referendum left "an overwhelmingly positive legacy" on Scotland.
