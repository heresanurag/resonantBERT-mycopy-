title: 'Newspaper headlines: Hunt looks for £9bn and German leaks on Ukraine - BBC
  News'
date: '2024-03-04'
section: The Papers
url: http://www.bbc.co.uk/news/blogs-the-papers-68464778
content: |-
  The chancellor's efforts to fund his budget and leaked intelligence on Nato operations lead the papers.

  Plans are reportedly still being worked on for the King to make an official visit to Australia later this year despite his cancer diagnosis

  Expectations for Wednesday's Budget continue to lead many of the papers.

  The i says Jeremy Hunt has fuelled "Tory jitters" of an election budget light on tax cuts after stressing the need to be prudent. The Daily Telegraph notes that the Chancellor made clear in his broadcast interviews yesterday he was "not in a position to give details" about any measures in the Budget, and says that his aim instead was to "manage expectations of tax cuts and paint a broad picture of a fiscal strategy".

  The Daily Express says Mr Hunt "desperately" wants to make cuts to personal taxes but has found himself "hamstrung by gloomy economic forecasts". But the paper does ask whether the chancellor might still be able to pull a rabbit out of the hat.

  According to analysis by the Daily Telegraph, no burglaries have been solved in almost half of all neighbourhoods in England and Wales in the past three years. The finding has prompted policing experts and victims' campaigners to warn the offence has effectively been decriminalised. The National Police Chiefs Council's lead for burglary, Alex Franklin-Smith, is quoted as saying forces are working to make further improvements when it comes to tackling the crime.

  The Telegraph also reports on the accidental leak of British military intelligence by the head of the German air force, Ingo Gerhartz, who was heard in a call intercepted by Russia discussing the operations of a number of Nato countries in Ukraine. The paper says Mr Gerhartz, who made the call using off-the-shelf video phone technology, was heard describing the different methods used to deliver missiles to Ukraine and saying that British troops were "on the ground" in the country.

  The Times gives more details on plans by ministers to broaden the definition of extremism as part of what the paper calls the government's "clampdown" on people and groups undermining Britain's values. Whitehall sources say an announcement is expected this month. Plans are also being worked on for a unit responsible for providing leadership and training across government departments to better identify signs and instances of extremism.

  Some of the papers report that plans are still being worked on for the King to make an official visit to Australia later this year, despite his recent cancer diagnosis. Sources say the visit is likely to be in October. The Express says that, although the King has postponed his public-facing duties while he receives treatment, he's "toiling behind the scenes".

  Tensions within Formula One's Red Bull team are featured on many of the back pages of the papers, after further allegations of inappropriate behaviour by their team principal, Christian Horner, emerged last week. The team has insisted that it remains united after the father of star driver Max Verstappen claimed it was in danger of being torn apart if Horner, who has denied wrongdoing, remains in his role. The Guardian says the crisis is "causing a rift". The Sun's headline reads: "Bull fighting".

  And the Times says a new study has found a well chosen analogy could be the key to making footballers "run like the wind". Researchers said improvements were instant when coaches at Tottenham Hotspur's youth academy encouraged teenage players with certain phrases, such as telling a striker to to "sprint like a jet plane taking off into the sky ahead".

  Those who worked on the study, which was led by Essex University, said it was key to give player's instructions which focus on a player's external environment rather than their own body. They also said the findings might also be useful in schools to encourage children to get the most out of any type of sport.

