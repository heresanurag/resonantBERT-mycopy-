content: |-
  Footage shows clouds of dark coloured smoke and ash billowing from the volcano on the Mediterranean island.

  Footage shows huge plumes of earthy coloured smoke and ash billowing from Mount Etna in Sicily.

  The volcano on the eastern coast of the Mediterranean island is one of the world's most active, with eruptions taking place several times a year.

  Video captured on Monday comes after Italy's National Institute of Geophysics and Volcanology said Etna was experiencing "explosions of growing intensity".
