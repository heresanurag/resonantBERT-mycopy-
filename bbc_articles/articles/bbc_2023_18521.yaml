id: bbc_2023_18521
title: '''I''m helpless'' - Gaza doctor tells of desperate situation - BBC News'
date: '2023-12-07'
section: General
url: http://www.bbc.co.uk/news/world-middle-east-67644334
content: |-
  Dr Ahmed Moghrabi told the BBC there's a scarcity of food, water, medicine and he cannot operate on patients.

  He works in Nasser Hospital in Khan Younis which is one of few hospitals still operating in southern Gaza.

  Dr Moghrabi said they don't have anaesthesia and doctors are "collapsing" and "helpless".
