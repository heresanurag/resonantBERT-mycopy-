title: Co-op admits unlawfully blocking rival store openings - BBC News
date: '2025-03-05'
section: Business
url: http://www.bbc.co.uk/news/articles/c5y2gwwnd0wo
content: |-
  The grocer admits breaching an order aimed at giving shoppers choice and access to the cheapest prices.

  The Co-op has admitted breaching rules to prevent rival supermarkets from opening nearby more than 100 times. The UK's competition watchdog found Co-op had breached an order which limits supermarkets' ability to prevent nearby land being used by rival retailers across England, Scotland and Wales. Blocking other grocers from opening nearby hits competition between supermarkets and means shoppers have less choice when trying to get cheaper prices, the Competition and Markets Authority (CMA) said. A spokesperson for Co-op said: "This is a matter we take very seriously, and we have taken all necessary action to ensure this issue is resolved and does not happen again."

  The Co-op admitted 107 breaches of the Groceries Market Investigation (Controlled Land) Order 2010. It has re-written 104 agreements and agreed to resolve three others, the CMA said. It released a list of the 107 locations, external and in an open letter to the Co-op, the CMA said it was "concerned by the very large number of breaches". The Co-op's spokesperson added: "As a business that is committed to operating fairly, we recognise this is extremely disappointing." The Co-op owns almost 2,400 stores across the UK and holds a 5.2% market share in the UK's £190.9bn supermarket industry, according to the CMA. The chain said the number of breaches amounted to "less than 2% of transactions" across its property portfolio, which includes its supermarkets and funeral directors.

  Many of the UK's biggest supermarkets have also breached the land order in recent years, but not to the extent that Co-op was found to in the CMA's latest action. Last year Morrison's had the highest number of breaches of the order at 55. The order bans new restrictive covenants which prohibit land being used for a supermarket. It also bans exclusivity arrangements which prevent landlords from allowing stores to compete with an existing supermarket which were over five years long.

  Daniel Turnbull, senior director of markets at the CMA said: "Restrictive agreements by our leading retailers affect competition between supermarkets and impact shoppers trying to get the best deals." Lee Tiso, 57, from Scotland said the lack of choice where he lives means he struggles to shop around to save money. He said: "I live in Lochgilphead, which is a remote area of the Argyll. Co-op and Tesco have small stores here. "The nearest Aldi and Lidl are 40 miles away in Oban and the nearest Poundland or Home Bargains is on the outskirts of Glasgow and 68 miles away. "We are forced to pay whatever Co-op charges." It's a similar issue for Maureen Loftus who moved to the Isle of Skye in Scotland. She said the only stores nearby are a Co-op supermarket, a Co-op convenience store and a Spar. "I don't know why other supermarkets aren't here considering the consumer demand?" she said. She added Tesco, Asda and Morrisons make daily deliveries to a small number of click and collect points on the island - but the "slots are so in demand" that to get an easy slot she has to travel to another village. "About 10,000 people live permanently on Skye and the number of visitors to the island is huge," she added. "Many are in campervans, self catering accommodation or camping which means the Co-op regularly runs out of fresh foods by 16:00 during the holiday season." Rising food prices have put pressure on household budgets in recent years. Last month, on average, the cost of buying groceries was still 3.3% more expensive than it was a year ago. Campaigners argue it is ever more important for consumers to have the ability to choose between a number of retailers to get the best deals. People who cannot travel to large supermarkets rely on convenience stores and can end up paying far more. This is because some retailers charge higher prices in smaller stores for the convenience of being able to buy them locally.

