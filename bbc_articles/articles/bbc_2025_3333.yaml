title: Birmingham bin strike brings out rats as indefinite walkout starts - BBC News
date: '2025-03-11'
section: Birmingham & Black Country
url: http://www.bbc.co.uk/news/articles/c07zd4z2x2yo
content: |-
  An indefinite strike by bin collectors starts in Birmingham, affecting more than 1.2 million people.

  'The rubbish is alive' - rats feast as Birmingham bin workers strike

  Bins have been overflowing in Birmingham for several weeks

  Overflowing wheelie bins and black bags piled high have become commonplace in Birmingham in recent weeks. It's because refuse collectors have been striking on and off since January - and it shows. Many streets are littered with the contents of the bins, with rubbish strewn everywhere as animals have clawed their way into them. Rat infestations have been reported in parts of the city as the rodents have enjoyed feasting on the fallout of the row, which is over plans to downgrade some staff and reduce their pay. On Tuesday an indefinite all-out strike gets under way, prompting fears over the scale of the vermin plaguing some areas. The council said it had made a "fair and reasonable" offer to the union Unite, whose members have staged the series of one-day walkouts.

  Unite members have staged a series of one-day walkouts since January

  Rats are "coming out to lunch every day", according to residents

  In some parts of the second city, residents said bins had not been collected since mid-February. Abu Shah, a shop owner in Ward End, described the situation as "terrible". "People are leaving their bins anywhere and everywhere," he said. "Rats are slowly getting into them and opening them up. You can see nappies coming out the bags.

  "It's just going to get worse and worse. Someone needs to do something about it and come to an agreement." Teddy Smith, who has lived in Digbeth for 15 years, said it was "horrific". "There's already a rat infestation around here now. They are coming out to lunch every day," he said. "[The rubbish] is alive at night, completely alive. If it is left like this... I don't know what the future holds. It's going to get even worse."

  Shop owner Abu Shah said people in Ward End had no choice but to leave their bin bags on the streets

  Teddy Smith said the bins had been left overflowing for three weeks

  Pest control specialists have seen a spike in calls since the one-day walkouts started. William Timms, owner of WJ Pest Solutions, said his had gone up 75%.

  "There are rats in front gardens, back, and gaining access because of the bins being left out. "We're going to be inundated with them. It's unbelievable at the moment. The all-out strike is going to make it worse." He urged people to keep their rubbish bags high off the ground and away from walls so rats can't get on them.

  Residents are asking if piles like this will still be collected when the strike is over

  Pest control specialist William Timms said his calls had increased by 75% since the start of the strikes

  Unite has claimed 70 staff could lose up to £8,000 a year each, which its national lead officer Onay Kasab described as an "absolute abomination" and "appalling". "We don't want to be out on strike but it doesn't have to be this way," he said. "Our members are out on strike because we want to get to an agreement." The council, whose finances have been overseen by government commissioners since the authority declared itself effectively bankrupt in 2023, said only 17 staff would be affected by changes and none would lose as much as the union suggested. A spokesman added: "This escalation of industrial action will mean greater disruption to residents - despite the fair and reasonable offer that the council made to Unite. "To the small number of workers whose wages are impacted ongoing by the changes to the service (of whom there are now only 40) we have already offered alternatives. "Our door is still open, and we would encourage Unite to come back to the table."

