  Aimee Cannon was found seriously injured at a property in West Lothian on Saturday.

  Aimee Cannon was found seriously injured at a property in West Calder on Saturday

  A man has been charged in connection with the death of a 26-year-old woman in West Lothian.

  Aimee Cannon was found seriously injured at a property on Learmonth Crescent, West Calder, at around 18:35 on Saturday.

  She was pronounced dead at the scene. An inquiry is being led by Police Scotland's major investigation team.

  Police said a 25-year-old man had been arrested and charged. He will appear at Livingston Sheriff Court on Wednesday.

  Officers have asked that anyone with information about the incident submit it to a dedicated website or contact the force.
