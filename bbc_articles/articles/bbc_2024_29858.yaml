  Part of Thompson's remit was trying to keep young Wallaby prospects in the XV-player game. Suaalii was on the books of South Sydney Rabbitohs before switching to the Roosters, where he made the NRL's team of the year in 2022, while still a teenager. If he was an instant hit on arrival, Suaalii took some dents on departure. As well as picking up a four-game ban for a high hit in the State of Origin showpiece, Suaalii was criticised by some for deserting league. Peter V'landys, Australian Rugby League Commission boss, accused him of chasing easy money and predicted a swift return to the 13-man code. However, Anderson is sure that Suaalii, stronger and faster for his time in league, can find his feet quickly in union. "Oh, 100% yeah, he'll definitely make the transition and he'll be a world class player," Thompson said. "He's a very special talent and he is still very young. “If you look at the way rugby league play on the edge, most rugby union teams are pretty similar now. "I'm not hands on anymore so I don't know how [Wallabies coach] Joe Schmidt's got his attack, but you can assume he's going to get plenty of football whatever position he plays." Suaalii is going to get plenty of the spotlight too.
