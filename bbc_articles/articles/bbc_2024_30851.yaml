  The trailer was aired during the Strictly final, and Ruth Jones also made a cameo appearance as Nessa.

  Gavin and Stacey fans treated to cameo and trailer on Strictly

  This video can not be played To play this video you need to enable JavaScript in your browser. Watch the trailer for 'Gavin & Stacey: The Finale'

  The first clips from the final episode of Gavin and Stacey were shown during the Strictly Come Dancing finale on Saturday night. The trailer appeared to centre around the key characters coming together for a weekend. It was a double treat for fans, as before the trailer was aired, Ruth Jones also made a cameo appearance as Nessa. Fans wondering "what's occurring?" won't have to wait much longer, with the episode due to air on BBC One on Christmas Day.

  The last fans saw of Nessa and Smithy, played by James Corden, was in the 2019 Christmas special, where Nessa went down on one knee, asking Smithy to marry her. The trailer aired on Saturday night did not make it clear whether the couple has since tied the knot.

  This video can not be played To play this video you need to enable JavaScript in your browser.

  But one of the show's biggest mysteries - what happened during Uncle Bryn and Jason's fishing trip - may finally be revealed in the show's Christmas special. We heard one character, thought to be Gwen (Stacey's mother) saying: "Thirty years ago you two went on a fishing trip that almost tore this family apart," suggesting fans may find out why. All the recurring characters were seen in the clips, including Gavin and Stacey (played by Mathew Horne and Joanna Page), who got married in the first season of the show in 2007. The trailer ends with the characters dancing and knocking back a round of shots.

  Nessa, Stacey, Gwen, Bryn, and Gavin head to Essex for one final episode

  Meet some of Gavin and Stacey's most memorable cult characters and find out where they are now.

  Fans took to social media after the trailer dropped, with one X user writing: "This looks so so good." "Strictly, you're killing me here!," wrote another. "I can't wait to watch it but I'm not ready for it to be completely over," a third commented. During her cameo as Nessa, Jones explained the terms and conditions of voting for Strictly's winners, and told host Claudia Winkleman: "I see you're copying my hairstyle still, tidy." She added: "Please don't try and vote if you're watching on demand, you'll just make a fool of yourself." The hit TV series, co-created by Corden and Jones, aired between 2007 and 2010, and returned in 2019 with a one-off festive special
