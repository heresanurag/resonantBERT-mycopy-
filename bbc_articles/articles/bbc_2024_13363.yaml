content: |-
  Ravenglass and Eskdale Railway and the Ullswater Steamers introduce annual "Rover" dog tickets.

  Last year, Ravenglass and Eskdale Railway welcomed more than 6,000 dogs

  Dogs are being offered boat and rail season tickets to ease their path to walkies in the Lake District. Ullswater Steamers and the Ravenglass and Eskdale Railway have introduced £20 annual "Rover" season tickets, which include a 10% donation to animal charities. The cost for a standard doggie day ticket is £2.50 for the railway and £1 for a boat trip. Operator Lake District Estates said it saw more than 6,000 dog railway tickets purchased in 2023, with over 10,000 taking journeys by water.

  The season ticket includes a year’s worth of train or boat rides, a natty bandana and a charitable donation. Funds raised from rail sales will go to The Dog’s Trust and money from Ullswater 'Steamers' tickets will be donated to Eden Valley Animal Rescue and Oaktrees Animal Sanctuary in Wetheral.

  Dogs will also receive a branded bandana with their season ticket

  The Ravenglass and Eskdale Railway is one of the oldest and longest narrow-gauge railways in England and takes passengers from Ravenglass to Dalegarth. Meanwhile, Ullswater Steamers carry passengers to walking routes including the Ullswater Way, Aira Force waterfall and the William Wordsworth daffodils at Glencoyne Bay. Rachel Bell from Lake District Estates said Cumbria is a "very popular dog-friendly destination", adding: "Every dog deserves to join in with family days out."
