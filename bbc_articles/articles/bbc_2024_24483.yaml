  Beckham says he was "excited and proud" to help raise money for the London Air Ambulance service.

  The ex-footballer David Beckham has explained how he was "excited and proud" to help Prince William raise money for the London Air Ambulance service.

  The pair met the staff and crew at RAF Northolt and they climbed aboard the life-saving helicopters and David Beckham spoke to broadcasters about his involvement.
