title: Amputee bride walks down the aisle - BBC News
date: '2018-08-16'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-45201764
content: |-
  Against all odds, Amanda Flores not only walked down the aisle on her wedding day, but also danced.

  Amanda Flores had her hands and legs amputated after getting an infection. But against all odds, she walked down the aisle on her wedding day.
