content: |-
  One person is in a critical condition after the First Bus crashed into a railway bridge in Glasgow city centre.

  Eight injured after bus roof torn off in railway bridge crash

  This video can not be played To play this video you need to enable JavaScript in your browser. Bus crashed into the bridge on Cook Street

  Eight people have been injured, including one person in a critical condition, after a double-decker bus crashed into a railway bridge in Glasgow city centre. Part of the roof of the 4A First Bus was torn off, with the vehicle wedged under the bridge on Cook Street at the junction with Commerce Street. Five people were taken by ambulance to Queen Elizabeth University Hospital for treatment after the crash at about 18:00 GMT on Saturday, while three others were assessed at the scene and attended hospital. Spike Turner, a passenger who was third from the front of the bus, said the driver had taken a wrong turn and crashed "straight into the bridge".

  The street is one-way and the bridge, near the O2 Academy, is located shortly after a turn - though is clearly marked for vehicles under 3.8 metres (12.5 ft).

  The bus became wedged under the railway bridge after travelling in the wrong direction

  Mr Turner said: "I was fine, the lady in front of me might have been concussed. The bridge itself wasn't high enough to hit anyone's heads but parts of the bus exterior have swung down. "The man in the front seat was in a really, really bad state. He's got a lot of blood and a massive gash on his head." A number of roads were closed in the area but have now reopened after the bus was removed. First Bus earlier said it was aware of numerous injuries. A spokesperson said: "We have launched an immediate investigation and are also assisting Police Scotland with their inquiries." ScotRail closed a number of lines due to the crash but services resumed later in the evening. In May last year, 10 people were taken to hospital after a bus crashed into the same railway bridge.

  Police have sealed off several streets

  Network Rail said a team had inspected the bridge and found there was no structural damage - but that rail passengers had experienced "unnecessary delays". A spokesperson said: "The incident caused significant disruptions and cancellations to train services. "Bridge strikes like this cost taxpayers millions of pounds each year and are entirely preventable. "We urge drivers to always consider the height and size of their vehicles, including any loads they are carrying, and to carefully plan their routes to avoid incidents that put our infrastructure at risk."
