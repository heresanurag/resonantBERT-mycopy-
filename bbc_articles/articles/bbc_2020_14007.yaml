title: Erdington murder probe after man 'deliberately' driven at by car - BBC News
date: '2020-12-26'
section: Birmingham & Black Country
url: http://www.bbc.co.uk/news/uk-england-birmingham-55453338
content: |-
  A murder inquiry begins after the man suffered fatal head injuries in Erdington, Birmingham.

  The 28-year-old died after being struck by a car in Erdington, Birmingham

  A man was killed when a car was deliberately driven at him in Birmingham, police say.

  Police have launched a murder inquiry after the victim was found with serious head injuries on Coton Lane in Erdington shortly before 06:00 GMT.

  Detectives believe the 28-year-old was deliberately hit by the car that then left the scene.

  West Midlands Police have appealed for witnesses as officers piece together what happened.

  "A family have lost a loved one and we need to find out what took place and who is responsible," Det Sgt Nick Barnes said.

