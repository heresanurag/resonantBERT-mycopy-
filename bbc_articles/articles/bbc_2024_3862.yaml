title: 'Indian Wells: Britain''s Cameron Norrie loses to Gael Monfils in third round
  - BBC Sport'
date: '2024-03-11'
section: Tennis
url: http://www.bbc.co.uk/sport/tennis/68537399
content: |-
  British number one Cameron Norrie loses to Frenchman Gael Monfils in the third round at Indian Wells.

  British number one Cameron Norrie suffered a third-round loss to Frenchman Gael Monfils after a gruelling three sets at Indian Wells. Former champion Norrie, 28, took the first set in a tie-break but eventually fell to a 6-7 (5-7) 7-6 (7-5) 6-3 defeat after more than three hours. Monfils, 37, has now won all four matches he has played against Norrie. He will face Norwegian ninth seed Casper Ruud or French teenager Arthur Fils for a place in the quarter-finals. Norrie, who struggled with illness following his previous tournament in Rio in late February, made a dominant start and broke his opponents' serve in the opening game on his sixth break point. But he failed to take any of his nine break points in Monfils' second game, and the world number 54 responded to level the set at 3-3.

  Monfils - who saved 18 of the 20 break points he faced in the first set - ensured another twist as he broke back for a second time with Norrie serving for the set, but it was the Briton who eventually prevailed in a fittingly unpredictable tie-break. Norrie repeated his fast start with an early break of serve to establish a 3-0 advantage in the second set, but Monfils again battled back to force a tie-break - this time edging it to force a decider. And it was Monfils who struck the decisive blow eight games into the third set before serving out the match to love to complete an epic comeback after three hours and 12 minutes. "It was pretty gutting to lose it having so many chances," said Norrie. "But I think looking back, five or six days ago I probably wasn't even going to play the tournament so it's nice to be feeling healthy again. "I actually felt good out there. Physically in the third set I was not as good as the start of the match, and I think it was a small difference." Later on Monday, men's world number one Novak Djokovic faces Italian 20-year-old Luca Nardi, a lucky loser in the main draw.
