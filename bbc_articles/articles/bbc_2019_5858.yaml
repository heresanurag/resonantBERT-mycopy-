title: Russia's President Putin falls on ice after hockey match - BBC News
date: '2019-05-11'
section: General
url: http://www.bbc.co.uk/news/world-europe-48235984
content: |-
  The Russian president was in the midst of a victory lap when he tripped and fell.

  Russian President Vladimir Putin was in the midst of a victory lap after a hockey match when he tripped and fell.
