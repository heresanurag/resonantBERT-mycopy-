  But the foreign secretary says the UK has not been asked "specifically" to supply additional vaccine doses to India.

  Retail experts in Scotland say the first week of shops reopening there has been a success, following a hard four-month lockdown.

  The Scottish Retail Consortium (SRC) says the country's stores have performed better than those in England and Wales since they reopened on Monday - two weeks after England.

  Ewan Macdonald-Russell from the SRC says: "It's been a positive start for Scotland and figures have been better than England and Wales. It was up 167% on the week before and nearly in line with what we'd have expected to have seen in 2019 before the pandemic started.

  "So, it's really positive that customers have come out and we hope sales will reflect that."

  Natalie MacCallum says her venue's outdoor space was buzzing with activity Image caption: Natalie MacCallum says her venue's outdoor space was buzzing with activity

  Natalie MacCallum, manager of Sloans bar in Glasgow city centre, told BBC Scotland that within six minutes of its online booking system going live, it had thousands of bookings for its outdoor space.

  "Hospitality has been battered over the course of the pandemic so we had no idea what to expect when bookings went live, but we have been very lucky. The customers have been just so happy to see us open," she says.

  But, she adds: "What would help us more is a lot of the restrictions being lifted."

  You can read about how other businesses in Scotland are finding the easing of restrictionshere.
