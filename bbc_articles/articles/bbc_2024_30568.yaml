title: Animal rights activists sentenced for milk spill stunts in London - BBC News
date: '2024-12-12'
section: London
url: http://www.bbc.co.uk/news/articles/cm2vejejrk7o
content: |-
  The pair stole milk and caused damage in Fortnum & Mason and Selfridges on 7 October 2022.

  The pair caused damage in both Fortnum & Mason and Selfridges on 7 October 2022

  Two animal rights activists have been sentenced to community orders over milk-pouring stunts at two high-end department stores in central London. Sofia Fernandes Pontes, 28, and Stephen Bone, 42, who are members of the Animal Rising protest group, were sentenced at Southwark Crown Court on Thursday. The pair stole milk from Fortnum & Mason and Selfridges on 7 October 2022, before damaging display shelves and a carpet at the first store and a cheese display at the second. They admitted two charges of theft and two charges of criminal damage at an earlier hearing.

  Fernandes Pontes, from Islington, was sentenced to a one-year community order and to carry out 40 hours unpaid work. Bone, from Essex, was handed a two-year community order with 100 hours unpaid work. They were both also ordered to pay £655 in compensation, with Bone having to pay an additional £488 in prosecution costs.

  Bone and Fernandes Pontes entered Fortnum & Mason on Piccadilly at 11:35 BST, took milk from the shelves and emptied it on to the floor of the shop. A video showed them then being escorted towards the exit by security staff. They then entered Selfridges on Oxford Street at about 12:30 and were filmed pouring milk over a cheese display.

  Sentencing the pair, Judge Adam Hiddleston said: "Your actions caused that damage as well as considerable inconvenience to both the store owners and members of the public. "In addition, the security cameras in the food hall at Selfridges had to be focussed on the area where you were involved and thus did not cover other areas, presenting a risk to the health and safety of the staff and members of the public." He added: "I have no doubt that none of this was of any concern to either of you." In a statement provided by Animal Rising, Fernandes Pontes said: "I don't want to see children stuck in a world full of suffering thanks to extreme weather, food shortages, and the destruction of nature. "Transitioning to a plant-based food system is absolutely essential if we want to see a better world for everyone, and we need to make sure that farmers are given adequate support to move into profitable and sustainable plant-based production."
