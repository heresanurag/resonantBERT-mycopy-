  Olivia Colman and Christian Bale were amongst the winners at this year's Golden Globes Awards in Los Angeles hosted by Sandra Oh.

  Oh also won best actress in a TV drama for her part in the BBC's Killing Eve, and Richard Madden took the award for best actor in a TV drama for his role in Bodyguard.
