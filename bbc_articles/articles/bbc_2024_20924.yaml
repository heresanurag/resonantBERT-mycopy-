content: |-
  Thames Water, Northumbrian Water and Yorkshire Water face fines for repeated sewage leaks.

  Water firms to be punished for years of sewage leaks

  Thames Water, Yorkshire Water and Northumbrian Water face £168m fines by the industry regulator over historic sewage spills. The proposal will now go to public consultation and is part of Ofwat's largest ever investigation into water company performance. The announcement comes amid growing public anger over the environmental and financial performance of some water companies. Sewage spills into England's rivers and seas more than doubled last year.

  Ofwat's investigation has looked into whether the three companies have been providing customers with the level of service they are entitled to under the law. It has found the three companies failed to adequately invest in and maintain their networks, leading to repeated releases of raw sewage into the country’s waterways. On Tuesday it proposed fines of £47m for Yorkshire Water and £17m for Northumbrian Water. For Thames Water it is proposing the largest fine on record of £104m. The regulator's chief executive, David Black, said: “Ofwat has uncovered a catalogue of failure by Thames Water, Yorkshire Water and Northumbrian Water in how they ran their sewage works and this resulted in excessive spills." This announcement follows a BBC investigation earlier this year that revealed sewage had potentially been released illegally 6,000 times in 2022 by England's water companies in breach of their permits. Releasing raw sewage has the potential to significantly damage the environment and poses a risk to human health for those swimming in a river or sea where sewage is being discharged. Ofwat can fine companies up to 10% of their annual sales. In the case of Thames Water, the proposed fine is 9% of sales, which Mr Black told the BBC "reflects the severity of the offences". The regulator found that more than two-thirds of Thames Water's wastewater treatment works had operational issues, and that most of Yorkshire Water's wastewater treatment works had regularly spilled sewage into the environment since 2018 pointing to a "systematic issue". A Thames Water spokesperson said: "We take this matter very seriously and have cooperated at every stage of Ofwat’s investigation. We regard all untreated discharges as unacceptable, even when they are permitted." Yorkshire Water and Northumbrian Water said they were disappointed by Ofwat's decision. Ofwat continues its investigations into a further eight water and wastewater companies in England and Wales for similar issues, with further updates expected in the coming year. "For too long, failure to invest in our vital water infrastructure has been unchecked," said Tessa Wardley, director of advocacy at environmental charity Rivers Trust. "It seems highly likely that there is more to come when investigations into the other eight water companies is concluded."

  Thames Water has recently completed the £5bn tideway super sewer but may now need to make further infrastructure upgrades

  Water companies have been proposing to raise customer bills by more than 44% over the next five years to pay for improvements in water infrastructure. Thames has argued for an increase of £191 over the next five years but Ofwat has only agreed to £99. But there has been concern from environmental campaigners that the money from customers’ bills is not being sufficiently invested in upgrades and they have called for a ban on executive bonuses. The government is currently consulting on plans to ensure that money earmarked for upgrades cannot be used to pay salaries or dividends. On Tuesday, Environment Secretary Steve Reed said: “I welcome Ofwat’s action today. The unacceptable destruction of our waterways should never have been allowed - and it is right that those responsible for illegally polluting our rivers, lakes and seas face the consequences.

  The threat of fresh fines will raise questions about how much some companies can afford to invest in infrastructure upgrades. Thames Water has been struggling with debts of £14.7bn. It announced last month it only had enough cash to fund operations until the end of May 2025 - and was already at risk of having the credit rating of its debts downgraded. Colm Gibson, a former water industry executive, and now managing director at consultancy Berkeley Research Group told the BBC: "Thames is in a particularly precarious financial position and it’s trying to negotiate for more equity to come in to sort itself out. "And if it has to pay this fine on top of all the others, that just makes the task harder, and its already a difficult task." The companies can appeal, and Ofwat can reduce the fine if the water firms demonstrate they are taking measures to tackle sewage discharges.
