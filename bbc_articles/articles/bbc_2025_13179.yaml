  Sir Keir Starmer has announced the findings of a "root and branch" review of the UK's defence capabilities

  Prime Minister Sir Keir Starmer has set out the government's defence strategy for the next decade.

  The so-called "root and branch" review of the UK's defence capability, external, led by former UK defence secretary and Nato secretary general Lord Robertson, looked at everything from equipment to personnel to future threats.

  The government says they will implement all of the review's 62 recommendations.

  Here is a summary of the government's response to the review.
