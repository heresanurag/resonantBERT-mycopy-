title: 'UK weather: Scenes of Storm Emma meets Beast from the East - BBC News'
date: '2018-03-04'
section: In Pictures
url: http://www.bbc.co.uk/news/in-pictures-43256148
content: |-
  Sub-zero conditions and blizzard-like conditions have been causing disruption across the UK.

  As the snow begins to thaw, these are some of the scenes from across the country.

  Heavy snowfall affected large parts of the UK, as seen here in Ripponden, Yorkshire

  Cars and lorries were stuck on the A1 in Northumberland on Friday, as drivers faced difficult conditions on the roads

  Many drivers were also stuck on the A303 near Ilminster, as well as the M62 near Rochdale

  Airports have been heavily disrupted, with flights subjected to delays and cancellations

  People have worked hard to clear snow, such as here near Blackstone Edge in the Pennines

  Snowy conditions also persisted in Larbert, near Falkirk

  Local residents provided a mountain rescue crew with hot drinks as they enforced a road closure in Delph, Greater Manchester

  The Severn Bridge was barely visible as snow continued to fall in south Wales and south-west England

  Meanwhile in Farnborough, Hampshire, some people took advantage of the snow to go sledging
