title: 'Women''s World Cup 2023: England announce arrival with 6-1 win over China
  - BBC Sport'
date: '2023-08-02'
section: General
url: http://www.bbc.co.uk/sport/football/66375630
content: |-
  England's performance against China makes a statement to their rivals and dispels doubts around their Women's World Cup campaign.

  Last updated on .From the section Women's World Cup

  The 'ole' chants had kicked in before 40 minutes had been played and the same fans were rocking out to Van Halen at half-time. England had arrived at the Women's World Cup. The party atmosphere evolved throughout England's scintillating 6-1 victory over China, confirming their place in the last 16 as group winners. The Lionesses swept aside China with slick, unpredictable and entertaining football in one of the best performances in the tournament so far. It was a display that sent a statement to England's rivals in Australia. The European champions mean business and have finally shown their quality. When half-time arrived, England were in cruise control at 3-0 up - a goal and two assists already in the bag for Chelsea sensation Lauren James.
