content: |-
  Chris Eubank Jr successfully weighed inside the limit at a second weight-check for Saturday's middleweight contest with Conor Benn at the Tottenham Hotspur Stadium.

  Eubank weighed in behind closed doors on Friday morning, in front of fans for a ceremonial weigh-in on Friday evening, then for a second official weigh-in on Saturday

  Chris Eubank Jr weighed inside the 12st 1lb limit at a second weight check for Saturday's middleweight contest with Conor Benn at the Tottenham Hotspur Stadium. Eubank was fined £375,000 after missing the weight at the first weigh-in on Friday by just 0.05lb. Both British fighters were bound by a rehydration clause that prohibited them from weighing more than the 12st 1lb limit on Saturday morning. But Eubank weighed 0.6lb below the limit and avoided a second fine. Benn, who hit the scales at 11st 2lb on Friday, added 9lb. Eubank is the bigger of the two men and normally fights two weight classes higher than Benn, who is a natural welterweight. Eubank, 35, and Benn, 28, meet over 30 years after their fathers' rivalry in the 1990s. The sons were scheduled to face each other in 2022 but the fight was cancelled because Benn failed a drugs test. Benn, who has denied intentional doping and has been cleared to fight by anti-doping authorities, is unbeaten in 23 pro fights. Eubank, who has won 34 and lost three, has paid more than £500,000 in fines and payments to undercard fighters before he has stepped in the ring. Both men are expected to earn a seven-figure purse for the fight.

