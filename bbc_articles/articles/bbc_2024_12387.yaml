  Scotland's back line was exposed repeatedly by the Germans on Friday. Centre-half Ryan Porteous will be missing through suspension, so what about the right side of the defence? Crichton: Clarke is renowned for being loyal and consistent with his team selection, so again I don't see too much changing. Grant Hanley will come in and replace Ryan Porteous. Potentially you might see a change at right-wing-back because there's been a lot of noise made about that. Through no fault of his own, but I don't think Anthony Ralston has played enough games this season to merit playing back-to-back games. So you might get James Forrest going in there, which I'd not object to. Ross McCrorie may be a similar gamble to Ralston, but he's a good athlete. McCann: I'd bring Hanley into the middle, move Jack Hendry to the right, and Kieran Tierney to the left of the back three. On the right, I'd go quite aggressive. I've done it myself and used a winger as a wing back. You can do it if you've got guys in the right centre-back position who are good enough and quick enough to cope with playing a slightly more aggressive forward player. For me, that right wing-back is Forrest. He's better coming inside, but if we can have him having a go at Michel Aebischer, who scored and created a goal against Hungary... he's a left-footed right wing-back. If we can get Forrest going at him on his left foot on the outside, it might give us ammunition. Thompson: I would change the formation and go with a four if it was up to me, but clearly it isn't. And quite right, too! I'd go with McCrorie, Hendry, Tierney and Andy Robertson.

