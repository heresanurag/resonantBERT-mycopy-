  There have been wild cries for Billy Gilmour to be starting in Cologne after his presence was missed in midfield in Munich. Crichton: Billy Gilmour will come in and I think Ryan Christie will drop out. That's how you solve that. McCann: I actually left Billy out of my selection for Germany because I thought we needed Christie to give us more going forward. I did feel Stevie would go pretty deep with the formation - and we all know what happened. But I thought we missed Billy's composure and bravery on the ball - and taking risks to get us forward. I'd play him and Callum McGregor in a deeper position and move Scott McTominay forward with McGinn like a box. Thompson: I'd play a 4-2-3-1 with Gilmour and McGregor as the two. I think Gilmour will play. There were a lot of people who said he should have played against Germany, but I understand the reasons why he didn't. But, without a doubt, I think he'll play here.

  Scotland failed to register a shot on target against Germany - their goal was an own goal - with Che Adams up front. He had little service to be fair, but should Lawrence Shankland come in? Crichton: I think they'll back Che Adams, although I'd love Lawrence Shankland to start with McGinn and McTominay supporting. Whether that'll happen, I'm not entirely sure. That's no disrespect to Adams. He had no service, no supply and it was basically a running exercise. He was off at half-time, but not because of him. Sometimes in big games chances are at a premium, but Lawrence's goal return tells me he may just take one. His general link-up and all-round play is fantastic. He's played under an enormous amount of pressure with Hearts as a link man as well as being a goal threat. Thompson: It's maybe a bit unfair on Adams as he was sacrificed at half-time because of the sending off on Friday. But I feel we need goals and to create chances. If we're talking about goals-to-games ratios, Shankland is the best in the squad. If there were opportunities, I'd rather Lawrence was on the end of them.

