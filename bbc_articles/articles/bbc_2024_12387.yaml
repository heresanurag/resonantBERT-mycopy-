title: 'Scotland v Switzerland: Will Gilmour and Shankland start? - BBC Sport'
date: '2024-06-19'
section: Scotland Men
url: http://www.bbc.co.uk/sport/football/articles/cp99w8zkgyeo
content: |-
  BBC pundits suggest Billy Gilmour, Lawrence Shankland and James Forrest could start for Scotland in Wednesday's Euro 2024 game against Switzerland.

  Scotland manager Steve Clarke has much to ponder before Wednesday's game against Switzerland

  There is no room for error now. Scotland take on Switzerland in Cologne on Wednesday knowing something other than another defeat must be salvaged to realistically keep their Euro 2024 dream alive. There were so many talking points as to where it all went wrong in the 5-1 hiding by Germany on matchday one and BBC Sport Scotland's pundits have tried to answer them...

  Angus Gunn came in for criticism for some of the goals conceded at the Allianz Arena on Friday night, with some pundits and fans suggesting a switch with either Zander Clark or Liam Kelly may be on the cards Leanne Crichton: The goalkeeper situation doesn't change in my opinion. I don't think you change it after the first game, regardless of how you feel about the performance. I don't think Zander Clark or Liam Kelly would be a huge difference, simply because Gunn has been Scotland's number one in the qualifying campaign. There has to be a bit of belief instilled in Gunn and that can come from one moment, a big save or something early in the game. I don't see any reason to change, although I clearly have been critical of Angus for the first, his part in the third, and for not being better for the fifth goal on Friday. But I wouldn't change him. He's earned the right through qualification. I still think he's the best goalkeeper in the squad, although Zander Clark is pushing for that. Steven Thompson: It wasn't Angus Gunn's best game on Friday by a long stretch, but he's the number one and I don't think [manager Steve] Clarke will change it. We've got good alternatives. I just think he won't change it so early in a tournament. That's not a part of the pitch we need to be messing with at this moment.

