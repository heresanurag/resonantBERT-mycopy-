title: Gyms to display cancer message stickers - BBC News
date: '2024-08-30'
section: Health
url: http://www.bbc.co.uk/news/articles/cvg31exqzqro
content: |-
  The NHS initiative, promoting body awareness, aims to get more people diagnosed early.

  Gym-goers will soon see special stickers on mirrors at their local leisure centres reminding them to look out for potential signs of cancer. It is part of an NHS initiative around body awareness to get more people diagnosed early. The messaging that will appear at hundreds of Better leisure centres in the UK, advises "know what's normal for you" when it comes to your body. An unusual lump, skin change, unexplained weight loss or bleeding, for example, is something to talk about with a doctor.

  While not all changes will be cancer, it is important to check. The NHS has already partnered with several supermarkets to warn about early signs of cancer, putting messaging on products such as underwear and toothpaste. Finding cancer early saves lives, says Prof Peter Johnson, National Clinical Director for Cancer at NHS England. Cancer that is diagnosed early, when it is not too large and has not spread, is more likely to be treated successfully. "We need people who have new symptoms to come forward as soon as they spot them. This is why it's vital that people are aware of their bodies, take notice of any change from what is normal for them, and get it checked out immediately," he said.

  David Bateson, who is 49 and from Bedfordshire, was diagnosed with skin cancer after going to his GP about a bleeding spot on his scalp. He is now free of his cancer - melanoma. He said: "I am living proof that early diagnosis is so important. Although I never dreamt that this spot on my head would end up being skin cancer, it turned out to be one of the most aggressive types. I dread to think what would have happened if I’d not gone to my doctor when I did. "I think these stickers are a great idea. I play football at my local leisure centre, and – when you’re in the changing room or showering – it’s the perfect place to think about changes in your body, so it’s the ideal setting to remind people to be aware."
