content: |-
  Wednesday's coverage of coronavirus pandemic developments, including the green light to resume driving lessons.

  Not all care workers visiting people's homes will be routinely tested for coronavirus, the health minister says.

  There have been calls to test all domiciliary carers who look after people in their own homes, regardless of whether they have symptoms, as happens with staff in care homes.

  Domciliary carers are only tested when they have symptoms.

  Vaughan Gething said some would receive anitbody tests, which show if people have had the disease, as part of a new surveillance plan.

  “The evidence that we have had and published today doesn't support testing the whole sector as the right approach,” he said.

  “It does underpin though, as I've said, everyone who has symptoms should get a test and self-isolate.

  “It also underpins actually the importance of a move from the UK government on statutory sick pay or supportive pay where people are advised by the contact tracing service to self-isolate as they have in Germany.

  Speaking ahead of his press conference, opposition parties called for domiciliary carers to receive more testing.

  Conservative shadow social care minister Janet Finch Saunders said the service had “gone under the radar”.

  “If you work in domiciliary care, social care, district nurse, occupational therapy, physiotherapy – anybody going to somebody’s home receiving care in the community, I think you should be tested,” she said.

  Age Cymru’s chief executive Victoria Lloyd said: “We have been clear about the need for adequate and practical access to fast testing for all social care staff to support infection control measures.

  "As such we would support a programme of regular testing for domiciliary care staff."
