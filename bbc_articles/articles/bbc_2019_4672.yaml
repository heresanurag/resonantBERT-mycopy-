title: 'Lisa Dorrian: ''Large scale search'' under way in County Down - BBC News'
date: '2019-04-01'
section: Northern Ireland
url: http://www.bbc.co.uk/news/uk-northern-ireland-47779452
content: |-
  The 25-year-old Bangor woman disappeared after a party at a caravan park in Ballyhalbert in 2005.

  Lisa Dorrian was last seen alive at a County Down caravan site on 28 February 2005

  A large-scale search operation is under way for Lisa Dorrian at the Ballyhalbert caravan park where she was last seen alive in 2005.

  The search also includes a disused airfield behind the caravan park, and will take in a number of other areas.

  Ms Dorrian, 25, disappeared after a party at the site and police believe the Bangor shop assistant was murdered.

  Police have pursued more than 3,500 lines of inquiry and carried out almost 400 searches.

  A fresh appeal for information about her murder was made on the BBC's Crimewatch programme last year.

  No-one has been charged with Ms Dorrian's killing

  Police have not said why they have returned to the County Down caravan park to conduct the new searches.

  Det Supt Jason Murphy, who is leading the investigation, said: "The determination of the PSNI to bring those who killed Lisa Dorrian to justice is as strong today as it has ever been.

  "The purpose of the search operation is two-fold: Firstly I want to recover Lisa's body and allow the Dorrian family to finally put Lisa to rest. And secondly I am looking for evidence relating to her disappearance."
