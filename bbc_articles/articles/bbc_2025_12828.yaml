content: |-
  Daniel Anjorin was attacked with a sword while he was on his way to school in north-east London.

  Man guilty of murdering boy with sword in Hainault

  To play this video you need to enable JavaScript in your browser. This video can not be played The court was shown footage of Marcus Monzo unboxing a sword he had bought online

  A man has been found guilty of murdering 14-year-old schoolboy Daniel Anjorin with a samurai sword in Hainault last year. Marcus Monzo, 37, has also been found guilty of three counts of attempted murder, wounding with intent and possession of an offensive weapon. He gave no reaction in court as the verdicts were read out and the judge said he would face a life term when he returns to court for sentencing on Friday. Daniel's father, who was in court to hear the verdict, did not react as Monzo was found guilty of murdering his son.

  The series of attacks started at 06:45 BST on 30 April 2024, when Monzo drove a van into a 33-year-old pedestrian and then chased him, slashing him in the neck. He then turned his attention to Daniel, who was walking down the residential street he lived on, wearing his school PE kit and headphones, unaware of Monzo's presence. Witnesses described the former Amazon delivery driver screaming "in delight" and smiling after fatally wounding Daniel with the 60cm (24in) sword.

  Monzo, of Satanita Close, Canning Town, then entered a nearby home where a couple and their four-year-old daughter were asleep. He demanded to know if they believed in God and slashed a man on the arm before leaving the property. He was cleared of one count of attempted murder in relation to this attack, but was found guilty of the lesser offence of wounding with intent to cause grievous bodily harm. The series of attacks took just 20 minutes.

  Daniel Anjorin was walking to school with headphones on when he was approached from behind by Monzo

  Monzo had gone into a cannabis-induced psychosis before the attack, and had killed and skinned his pet cat before heading to Hainault, north-east London, the court was told. Afterwards, Monzo likened events to the Hollywood film The Hunger Games and claimed to have an alternative persona of a "professional assassin". Giving evidence at his trial, he said he had no memory of what happened and claimed his mental state had diminished his responsibility for the crimes. However, the prosecution argued that psychosis brought on by self-induced intoxication was no defence for murder.

  To play this video you need to enable JavaScript in your browser. This video can not be played A compilation of CCTV and body-worn camera footage of the attack as it unfolded

  Monzo, a dual Spanish-Brazilian national, who was living in Newham, east London, had liked posts on X that praised Nazi leader Adolf Hitler. Over a year, Monzo's X account also liked references to various antisemitic conspiracy theories and misogynistic Incel material. At his Old Bailey trial, Monzo had told jurors he believed the world was flat and that the 9/11 terrorist attack in New York was "probably" a conspiracy theory. In a reference to another conspiracy, Monzo posted: "I live in London. Here everybody will agree that the city is GREY. And the reason is BECAUSE they spray the sky ALL DAY, EVERY DAY."
