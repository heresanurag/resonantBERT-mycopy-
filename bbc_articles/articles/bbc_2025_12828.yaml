  Speaking outside the court, Ch Supt Stuart Bell from the Met Police said: "First in our thoughts is Daniel Anjorin - a talented, gentle, bright young man. "A much-loved son and brother, brutally murdered simply walking to school at what should have been the start of a normal day at the start of a promising life. "There are no words, really, to express how sorry we are for [the Anjorin family's] loss or how much admiration we have for your courage and dignity. "It is hard to comprehend the unimaginable pain that you must have suffered in the last year. "I can only hope today's verdict brings some semblance of justice and relief, and you are now able to grieve in some peace. "Our thoughts remain with all those who have been impacted by this terrible incident."

  Monzo will be sentenced on Friday, with the judge having told him to expect a life term

  Ch Supt Bell said Monzo had a clear intention to kill: "It didn't matter who they were and sadly, he targeted Daniel in a cowardly and brutal attack. "A number of other local people were also attacked, seriously injured and threatened that day – and I would like to acknowledge their bravery and resilience in giving evidence in this case. "As we heard in court, police officers and paramedics were on the scene within minutes of Monzo assaulting Daniel. "I am in no doubt that the actions of those officers who arrived to pursue and attempt to detain Monzo saved lives and prevented more harm. "I commend them for their extraordinary bravery – some setting out to deal with that call before their shift had even begun."

  Kirsty O'Connor, from the Crown Prosecution Service, said their "hearts go out" to Daniel Anjorin's family and friends who have suffered "his unimaginable loss in horrific circumstances". "Our thoughts remain with all of the victims who continue to recover from their injuries and trauma," she said. She also paid tribute to the police officers and emergency workers who put their own personal safety at risk in the line of duty. "The courage shown undoubtedly prevented further loss of life. "We all owe them a debt of gratitude."
