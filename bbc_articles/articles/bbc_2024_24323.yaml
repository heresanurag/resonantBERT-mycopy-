title: 'Las Vegas: Judge recounts moment defendant attacked her in court - BBC News'
date: '2024-09-09'
section: General
url: http://www.bbc.co.uk/news/videos/cy4lk37ljemo
content: |-
  The judge was attacked by a defendant when she was sentencing him in court, in January.

  Judge Mary Kay Holthus was sentencing a man as part of a battery case in January, when she was attacked by the defendant.

  Speaking in court yesterday, Judge Holthus recounted the moment Deobra Delone Redden leapt across the desk and attacked her.

  In a statement at the time of the attack in Las Vegas, Nevada, Judge Holthus said she "experienced some injuries".

  The attacker pleaded guilty, but mentally ill to the attempted murder charge.
