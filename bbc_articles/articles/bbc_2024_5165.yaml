title: 'Lora Fachie: Para-cycling champion says becoming a mother has presented big
  challenges - BBC Sport'
date: '2024-03-20'
section: Disability Sport
url: http://www.bbc.co.uk/sport/disability-sport/68266862
content: |-
  Two-time Paralympic cycling champion Lora Fachie says becoming a mother has challenged her as an athlete in new ways.

  Neil and Lora Fachie both enjoyed gold-medal success in Tokyo in 2021

  Two-time Paralympic champion Lora Fachie says becoming a mother has challenged her as an athlete in new ways. Fachie, who is married to fellow Para-cyclist and Paralympic champion Neil, gave birth to son Fraser in November 2022, and told BBC Sport that motherhood is the hardest thing she has ever done. "Pushing your body to the limit in training is hard and painful, but you are the one in control," said the 35-year-old. "As a parent, you aren't necessarily in control and babies don't come with a manual so you are constantly having to adjust and reassess and change plans. "I was an athlete who likes a plan and sticks to it and I am quite a logical thinker and babies don't do that, so it tests you, especially in the early days." Both Lora and Neil will be hoping for more success at the Para-cycling Track World Championships which start on Wednesday in Rio de Janeiro, Brazil, where they will be watched by Fraser. They will be part of a 27-strong British team, which also includes Jody Cundy, Kadeena Cox and Jaco van Gass with all of the riders bidding to put in strong performances to help earn selection for this summer's Paris Paralympics. The Fachies, who both have visual impairments, provided one of the memorable moments of the Tokyo Games in 2021 when they both won gold within the space of an hour - first Neil and sighted pilot Matt Rotherham claimed victory in the B 1,000m time trial before Lora and Corrine Hall won the B 3km individual pursuit. But those celebrations seemed a long way away in the early days of parenthood with challenges around Fraser's birth and struggles around breastfeeding which prompted Lora to speak out - a move which helped open up a wider conversation around the subject. "I wish I could go back to me of 12 months ago and say it will all be fine, but when you are living with it and caught up in it, it's very hard, but things are definitely much better now," she reflects. "I don't deal with failure very well, I know that, so it was just one knock after another and it took me to take a complete step back from it and change how we fed Fraser. Sometimes change is good and after that both of us started to thrive." Neil says: "For Lora to speak out was incredible. It was really heart-warming to hear all the stories from others who got in touch, some who were struggling, others who had gone through it but it was a community coming together. "We thought it was a really important message to put out there. It was raw, it was hard but I think it helped Lora to process it. It certainly helped me to speak about it." As well as motherhood, Lora also had to deal with returning to training and competition and she made her comeback to action at last year's World Championships in Glasgow, just eight months after giving birth.

  Hall and Fachie have been riding together since 2013

  She won a silver medal in the B individual pursuit with Hall, but was critical of British Cycling's treatment around her return, saying she felt, external she had been "punished" for having a baby and had been left "isolated" and with a "lack of support". The organisation referred itself to an independent investigation, but before this year's events in Rio and Paris, Lora says she has seen positive changes. "British Cycling have supported me around travelling out to Rio so I can stay close to Fraser and I can still see him whenever and help out if necessary," she says. "It is with the aim of preparing both of us - me more so than Fraser, because he will be with his grandparents and will have a great time - for Paris where I might not get to see him as much as I would like because of security. "The Paralympics is a very different experience and I want to make sure if I go to Paris, I am in the best shape I can be. "Sometimes you have to be a little bit selfish. But knowing that he is happy and thriving with my parents is important so I can focus and do what I need to do. "I would love to win gold in Rio but I just want to make sure I secure my place on the team for Paris." The couple are awaiting an official diagnosis to confirm that Fraser has a visual impairment. Lora says that there is no guarantee that he will follow his parents on to the back of a tandem in the future. "People ask me if we have got Fraser a bike yet. We have got him a trike but I don't want him to be a cyclist - I want him to be his own person," she says. "I don't want him to have to live in the shadow of Neil and I. I want him to find his own way. If it is cycling I will support him but I would rather he found his own thing - sport or music or whatever it is that makes him happy. "He is becoming his own little person and developing his own personality. He is so funny and having that to come home to is so refreshing. I've never laughed as much as I do now, even when you are doing the most stupid things just to get a laugh from him. "It is the best drug in the world."

