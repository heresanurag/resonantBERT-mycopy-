title: EuroMillions £83m jackpot finally claimed after 13 days - BBC News
date: '2025-02-06'
section: UK
url: http://www.bbc.co.uk/news/articles/c30d2dpdz6qo
content: |-
  The National Lottery's operator says it is "delighted" the prize money has been claimed after 13 days.

  A EuroMillions jackpot of more than £83.4m has been claimed after 13 days without the winner making themselves known, operator Allwyn has confirmed. The ticket for the prize draw on 24 January worth £83,474,081.80 was purchased in the UK. The prize winner matched all five main numbers - 02, 11, 19, 30 and 49 - as well as the Lucky Star numbers, which were 03 and 08. Andy Carter, senior winners' adviser at National Lottery operator Allwyn, said it was "absolutely incredible news" that someone had come forward. Their claim needs to be verified before they receive a payout.

  "Everyone dreams of that huge win when they buy their EuroMillions ticket - and for this lucky ticket-holder this dream has become a reality," he said, adding: "Imagine all the possibilities that are now within their grasp." Once the EuroMillions ticket has been validated and paid, the ticket-holder will then decide whether they wish to disclose their identity. Unless they decide to go public, there will be no information on where the ticket was purchased, nor whether they were an individual or syndicate winner, Allwyn said. The National Lottery said the jackpot was number 23 on their list of the "most spectacular" wins - ie the largest - of all time. In July 2022, an anonymous UK ticket-holder scooped the record EuroMillions jackpot of £195m. That same year, Joe and Jess Thwaite, from Gloucester, won a then record-breaking £184,262,899 with a Lucky Dip ticket for the draw on 10 May. The UK's third biggest win came after an anonymous ticket-holder claimed the £177m jackpot in the draw in November last year. According to the National Lottery, there are still nine EuroMillions prizes yet to be claimed by UK ticket-holders, with the largest standing at £1m. Ticket-holders have 180 days from the day of the draw to claim their prize.
