title: Coronavirus in Scotland - Holiday accommodation reopens - BBC News
date: '2020-07-03'
section: Scotland
url: http://www.bbc.co.uk/news/live/uk-scotland-53179694
content: |-
  Self-contained holiday homes can now be used and the five-mile travel limit is lifted.

  Quote Message: The Scottish government is perfectly entitled to take its own position on these matters, because quarantine handling – health and policing - are determined by Scotland. Nicola Sturgeon said the UK government was changing its mind daily, on the list and plans, describing their decision-making process as shambolic. She said it was completely unacceptable to expect Scotland just to sign up to it without any notice or discussion or serious thought. It is possible there could be a different list of countries for England and Scotland but I really think that is unlikely. It will be so complex and difficult for people to understand, and I wonder whether it could be policed in any case. I would expect Nicola Sturgeon to make an announcement pretty rapidly. She wants to align, but she wants to look at the detail first. It is causing a pretty big row. The first minister says she’s entitled to draw attention to the fact they were asked to sign up with half an hour’s notice to a completely different list of names at a meeting on Wednesday. This is causing a rammy, frankly, between the two governments."

