title: People in Scunthorpe fear for the future if blast furnaces close - BBC News
date: '2025-03-27'
section: Lincolnshire
url: http://www.bbc.co.uk/news/articles/czjer8yerp4o
content: |-
  Up to 2,700 jobs at Scunthorpe's steelworks could go following a British Steel consultation.

  Kelly Christmas and Sean Robinson fear the closure of the blast furnaces would have dire consequences for Scunthorpe

  British Steel is launching a consultation that could result in the closure of Scunthorpe's two blast furnaces, putting up to 2,700 jobs out of a total of 3,500 at risk. BBC News sought reaction from the town. Children from a Scunthorpe primary school are being given a lesson on the town's steelmaking at North Lincolnshire Museum, as Sonia Weber rests on a bench outside. The youngsters are learning how Scunthorpe and the surrounding villages of Ashby, Brumby, Crosby and Frodingham grew rapidly following the discovery of iron ore here in 1859. Outside, Ms Weber, 65, the daughter of a German immigrant who came to work in the Lincolnshire town's steelworks after World War Two, says she fears for their future. "So many people, so many families – the children – are going to suffer," she says, gesturing towards the museum's front doors. "The works have been here for many, many years."

  Among the museum's exhibits are maps from 1889, 1908 and 1938. The area's growth is clear. Earlier, British Steel said the blast furnaces were "no longer financially sustainable" due to tough market conditions, the imposition of tariffs and higher environmental costs. The BBC understands British Steel was expecting a £1bn injection of government money to keep the business going, but was instead offered £500m. "My father, Hans, was very proud to work at the steelworks," says Ms Weber, telling of her own connection with the works, which loom over the town. "He was a strong man. It was a very difficult job. A dangerous job." An engraved, heptagonal shield commemorating the loss of 11 men in an incident involving the town's Queen Victoria blast furnace on 4 November 1975 is testimony to that. Like many, Ms Weber – who grew up hearing stories of blood, sweat and tears – is dismayed at the news.

  British Steel says its two blast furnaces at Scunthorpe could close as soon as June

  It is hard to find anyone in Scunthorpe without a link, past or present, to the steelworks. "I have friends who work there," says Kiran Hotchin, 23, a father-of-two. "Scunthorpe is known for its steelworks. "A lot of jobs are at stake. I expect a lot of people here are going to end up losing their homes." There are nods to steelmaking everywhere. Even the shopping centre is called The Foundry.

  How Scunthorpe grew as a result of the discovery of iron ore in the mid-19th Century

  Kelly Christmas, 29, a support worker at the town's hospital, says her mother and stepfather were both employed as cleaners at the works. "Wow, that's a lot of people," she tells me, responding to the expected job losses. "It's going to be awful for people, especially those with kids." Her friend Sean Robinson, 44, adds: "Scunthorpe is going to be like a ghost town. Nobody care about us. The government is talking about getting people off benefits but 2,500 people could be out of work soon." Ayanda Nyongwana, 43, arrived in the town from South Africa a year ago, and he says the looming towers and chimneys of the steelworks immediately made an impression. "Scunthorpe is steelmaking," the support worker tells me, as we walk down the High Street. "I believe money circulates, and if 2,500 are going to be out of work that is going to affect a lot of businesses – big and small."

  Ayanda Nyongwana says businesses in the town will suffer

  Others, though, appear nonchalant. Shane Kirk, 51, owns a garage in the shadow of the works. "That place has been closing for the past 30 years," he says, between mouths of lasagne. "But it's still open. They just keep cutting back and cutting back. Quite a few companies round here rely on the steelworks." Tom Kirkby, 76, agrees there is "a lot of disillusionment" in the town, with many people seeing wave after wave of job cuts over recent decades. "There used to be a lot of good, well-paid jobs here," he says. "I can see people leaving Scunthorpe to find work elsewhere." Back in the museum, glass cabinets display physical, personal links to those who helped build the town. Among them are a pair of brown size-10 boots, complete with a completed British Steel Corporation "application to purchase safety footwear" receipt. Ms Weber says no-one has any idea who will fill the boots if the shutters come down on the works for good.

  A pair of boots worn by a British Steel worker at the company's Scunthorpe works

