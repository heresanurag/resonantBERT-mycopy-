title: 'Josh Ward-Hibbert: From junior Grand Slam champion to basketball trophy-gatherer
  - BBC Sport'
date: '2025-04-07'
section: Sport
url: http://www.bbc.co.uk/sport/articles/c62x962xd0po
content: |-
  Josh Ward-Hibbert was a Grand Slam tennis winner as a junior and is now chasing European basketball glory with Newcastle Eagles.

  Josh Ward-Hibbert in the Boys Single at Wimbledon in 2012 and on the basketball court for Great Britain

  Few of us sports enthusiasts can claim to have mastered one sport. Josh Ward-Hibbert has conquered two. The man himself refutes that idea, preferring to describe himself as "blessed", but the evidence is clear. A Grand Slam tennis champion as a junior, Ward-Hibbert has gone on to become a Great Britain international at basketball. Now 31, Ward-Hibbert is a key part of the Newcastle Eagles basketball team aiming to conquer new ground in Europe, thrilled at what life has given him.

  "There are lots of super-talented people who play some sports and you hear commentators say, 'That kind of athleticism, they could be good at this or this.' "My parents and coaches made it possible for me to do both." On Tuesday, Ward-Hibbert's sporting journey has him to Bratislava in Slovakia as the Eagles compete in the European North Basketball League Final Four. Newcastle play Polish side Dziki Warsaw in the semi-final, with the chance to face either Inter Bratislava or Romanian side CSO Voluntari in the final. Both the Eagles and Ward-Hibbert have a raft of domestic winners' medals, but winning a European trophy is a new frontier, and they are determined to add to their legacy. It is further proof of how the Mansfield-born athlete has been excelling since he was young. Growing up, Josh's life was packed with sport. Parents Michael and Shelley would be ferrying him from tennis practice to the basketball court most nights a week. They did not pressure him to pick one over the other, while coaches worked to accommodate each sport. He had been part of the England Under-16 basketball team, but when the time came to choose, he opted for tennis.

  Liam Broady (left) and Josh Ward-Hibbert after winning the 2012 Australian Open junior doubles title

  Close friendships were formed as Ward-Hibbert travelled the world playing tennis, and in 2012 he reached the pinnacle as he teamed up with Liam Broady to win the Australian Open junior doubles title. Ward-Hibbert turned professional and won one singles title and 13 doubles titles on the ITF Futures circuit, including five with Broady and four with Lloyd Glasspool, another who is now a regular on the main ATP doubles circuit. But he struggled to progress beyond that, and at 22 he decided to step away from tour life to go to Loughborough University to further his education. "There were a few things that happened in my personal life, and I had a little injury that kept recurring and was not going away how I wanted it to," he said. "Everything just combined to put me to a tipping point. "Tennis is a super-tough sport, physically and mentally. You are always travelling, you are constantly living out of a suitcase. "No matter where it is, you have got to live it. It's difficult, it's very much a lifestyle, 45, 50 weeks of the year." But Ward-Hibbert would not be without his tennis career. "It is an amazing sport. There were so many highs, it taught me so much as a person, and the kind of person I am today is from the journey I had. "I'm definitely glad I had that journey. It would be remiss not to say I wish I had got to world number one, but that wasn't in my path. "I got to win a Grand Slam with one of my closest friends still to this day. That is a memory I am never going to forget."

  Ward-Hibbert had not played any basketball for a few years, but while at university, his love was rekindled. From playing a few games for Derby Trailblazers to getting his eye back in with a friend who had come over from America, he was recruited by the Leicester Riders in the British Basketball League. "I just wanted to figure out my next move and the basketball thing just fell," he said. "I picked up the ball and just ran with it, and I've been running ever since. I kept having opportunities and big decisions to make and a lot of positive things have happened from that. "I love basketball the same as I love tennis, so it was going from one love to another love." From that point, success and Ward-Hibbert, who measures 6ft 5in (1.96m) in height, have gone hand in hand. He picked up seven trophies with the Riders and then three more from a stint with London Lions before heading north to join the Eagles in 2023. "I always believed in myself as a basketball player," he said. "I believed I had good ability, kept working hard and doing the best thing I could whilst also studying, and a lot of great things happened. "I've represented my country, I've got a lot of accolades and trophies in the British game, and hopefully there are plenty more to add, too."

  Josh Ward-Hibbert is aiming to deliver a first European trophy for Newcastle Eagles

  In January, Ward-Hibbert helped Newcastle win the SLB Trophy, beating Bristol Flyers in the final for the club's first piece of silverware since 2021. It was a 28th trophy for the most successful British club, but now they want European glory. And with the city's football team ending a 70-year wait to win a cup final at Wembley last month, the basketball team are determined to ride that wave. "The legacy of Newcastle Eagles doesn't need to be spoken about, it's massive," added Ward-Hibbert. "But we feel as a team, we are trying to establish our own legacy. We are paving the way this season, winning the cup, adding another trophy to the organisation. "We've won the group in the European North Basketball League, the first British team to ever top a group in a European competition. "We're already setting legacies in that regard, but to come away with the trophy is something that we are striving to get to. "All the players and staff want to come back to Newcastle and say we won that trophy. "We want to bring something back, the same way the football team did."

  Ward-Hibbert's love for both sports is clear. And when basketball takes a break in the summer, he will still be tempted to pick up a tennis racket and send down a few serves. But which is better? Winning as an individual or being part of a winning team? "Winning something amazing and celebrating in the locker room with all the guys in basketball is an unbelievable feeling," he said. "That is special, but then you have a long, gruelling tennis match and the second after winning that last point to win the match, that feeling is pretty unrivalled. "Tennis is an individual sport but there is so much camaraderie in it with your coach, physio, strength and conditioning coach, other players you are travelling with. "Regardless of what was happening, if I wasn't playing, I always wanted to see my friends do well and I am pretty sure it was vice versa. "There was so much camaraderie and a real team aspect to it. It's the same with basketball, but on the flip side, a lot of players have probably been on teams where there is not a lot of camaraderie and felt solo and isolated. "It's an interesting debate, but for me it's completely situational."
