title: 'Brexit: UK wants £1bn back from EU if it is excluded from Galileo - BBC News'
date: '2018-05-24'
section: UK Politics
url: http://www.bbc.co.uk/news/uk-politics-44232269
content: |-
  The UK steps up its war of words with the EU over being shut out of new satellite navigation system.

  The Galileo system was conceived to give Europe an independent sat-nav capability

  The UK wants the EU to repay £1bn if it is excluded from the Galileo satellite navigation system after Brexit.

  David Davis's Brexit department is also warning the scheme could cost the EU an extra €1bn (£876m) without the UK's continued involvement.

  The row could harm wider post-Brexit security co-operation, the department says in a new paper.

  UK ministers are angry about the EU's decision to limit access to Galileo, an alternative to the US GPS system.

  The UK played a major role in developing satellites for Galileo, which is expected to be fully operational in 2026.

  But Brussels has cited legal issues about sharing sensitive information with a non-member state for its decision to shut British firms out of the project. Brussels has also said it will restrict access to encrypted signals from Galileo.

  In its position paper, the UK government repeats its threat to build its own satellite navigation system - which has been estimated would cost up to £5bn - as a rival to Galileo.

  The paper registers the UK's "strong objection to its ongoing exclusion from security-related discussions" about Galileo, which it says "risks being interpreted as a lack of trust in the United Kingdom".

  Downing Street said the UK has held "constructive discussions" with the European Commission on staying in the Galileo satellite navigation project.

  But the BBC's Brussels reporter Adam Fleming said the EU had not accepted UK proposals for continued participation in the technology behind Galileo, nor co-operation on security and data protection.

  Asked if the EU would repay the £1bn already invested in Galileo if the UK was excluded from work on the project, European Commission spokesman Margaritis Schinas said: "This issue is being discussed with our British partners, negotiations are ongoing, these are precisely the sort of issues we need to address."

  The UK government has also threatened to block Galileo satellites from using ground tracking stations in British overseas territories, such as the Falklands.

  The European Commission says the UK will have to apply to use the Public Regulated Service (PRS), a key element of the Galileo system, like any other non-EU country after its March 2019 departure.

  A navigation and timing signal intended for use by government agencies, armed forces and "blue light" services, PRS is designed to be available and robust even in times of crisis.

