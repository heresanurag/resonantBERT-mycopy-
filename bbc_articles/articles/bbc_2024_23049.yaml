title: 'AFC Wimbledon: More than 100,000 litres of water pumped out of flooded stadium
  - BBC Sport'
date: '2024-09-24'
section: Wimbledon
url: http://www.bbc.co.uk/sport/football/articles/c1m9eg0e7z1o
content: |-
  More than 100,000 litres of water have been pumped out of AFC Wimbledon's flooded Plough Lane stadium.

  This video can not be played To play this video you need to enable JavaScript in your browser.

  More than 100,000 litres of water has been pumped out of AFC Wimbledon's flooded Plough Lane home after the "entire stadium" was left under water, says the club's managing director. The pitch at the Cherry Red Records Stadium has suffered "significant damage" after the nearby River Wandle broke its banks on Sunday night, James Woodroof told BBC Radio London. Tuesday's Carabao Cup third-round match against Newcastle United has been postponed and will instead be played at the Premier League club's St James's Park ground on 1 October. The Dons' League Two home game against Crewe Alexandra, originally scheduled for that day, has in turn been postponed, while the club are hoping to stage Saturday's league game against Accrington Stanley at another venue in south London, Woodroof said. The club's next home game after that is against Carlisle United on Saturday, 12 October and he said it is their "real intention to fulfil that fixture". "I woke up to images from my stadium team. I thought it was AI [artificial intelligence]," he said. "The entire stadium, the concourse and ground floor, was under water. It was horrendous. The pitch has significant damage. "We filled four tankers, which house 27,000 litres each – over 100,000 litres." With a running tap estimated to use nine litres a minute, 100,000 litres is the equivalent of a tap being left on continuously for around a week.

  Parts of central and southern England experienced more than a month's worth of rain on Sunday and Monday morning. It is the first time the River Wandle has broken its banks since the 1960s, Woodroof said. Damage to the pitch shows several areas of exposed sand close to one of the corner flags. Woodroof said he expected diggers to be brought into the stadium on Wednesday to begin excavating the damaged pitch. "We are deep in investigation mode into what has happened here. Essentially it's a natural disaster," he said. "The River Wandle was full. There was too much water and nowhere for it to go, and the pressure has been so enormous that this area of the pitch has been the unfortunate victim. "We really need to understand what the damage has been beneath that surface."

  Wimbledon supporter Graham Stacey's JustGiving page has raised more than £50,000 to help the club repair the damage caused by the flooding

  Wimbledon have made a strong start to the season and sit fifth in League Two, with 13 points from their first six matches. They are undefeated in five home games in all competitions. A JustGiving page, external has been set up by Wombles fan Graham Stacey to raise funds to help Wimbledon repair the damage, with a target of £100,000. Their cup opponents Newcastle are among those to help, pledging £15,000. "We are really thankful for all the support," Woodroof added. "It typifies the spirit of this football club, this relentless resilience and community spirit is extraordinary. "Time after time this football club has defied naysayers. We have another obstacle in our path and I've no doubt we'll be back and I'm hopeful it's sooner rather than later." Woodroof later confirmed to BBC Radio 5 Live that the club has insurance for the stadium and pitch, and were working closely with their insurers. He also urged Magpies fans to buy tickets for the rearranged tie, adding: "There’s a revenue share, so we get 45% of the gate. If you live in Newcastle please come down - by supporting your team you are supporting us." He said switching Saturday's League Two game to Accrington was "sadly not possible" and added: "We are speaking to local clubs about whether they can lend us their ground for the day. "We are working with the EFL and Accrington on a solution, but we don’t have one yet."
