title: Sycamore Gap tree felling trial delayed by illness - BBC News
date: '2024-12-09'
section: England
url: http://www.bbc.co.uk/news/articles/czr3l06rd0jo
content: |-
  One of two men accused of illegally felling the landmark tree is unwell and unable to stand trial.

  The tree at Sycamore Gap on Hadrian's Wall was a world-renowned landmark

  The trial of two men accused of illegally chopping down the world-renowned tree at Sycamore Gap has been delayed as one of the defendants is unwell. The tree, which had been valued at more than £620,000 and was owned by the National Trust, was discovered lying across Hadrian's Wall in Northumberland on 28 September 2023. The much-photographed landmark had previously been named England's best tree and became known globally after appearing in the 1991 film Robin Hood: Prince of Thieves. Daniel Graham, 39, and Adam Carruthers, 32, both from Cumbria, deny criminal damage with their trial due to be held at Newcastle Crown Court.

  The tree was felled in September 2023

  The court heard Mr Graham was unwell and unable to stand trial, with Judge Mrs Justice Lambert saying it was "highly desirable" and "strongly" in the public interest the men be tried together. A hearing is due to be held in January to determine a future court date.
