title: 'Ask for Angela: Jess Phillips MP went undercover to test scheme - BBC News'
date: '2024-12-18'
section: London
url: http://www.bbc.co.uk/news/articles/c3wex407p0jo
content: |-
  The Labour MP says she conducted her own undercover tests before she became "too well known".

  Safeguarding Minister Jess Phillips went undercover to test safety scheme until becoming "too well known"

  A government minister has revealed she covertly tested the Ask for Angela safety scheme at venues across the UK until she became too well-known to continue the undercover checks. The scheme, launched in 2016 and named after Angela Crompton who was killed by her husband, allows people to discreetly signal they need help by using a code word at participating venues. Jess Phillips, minister for safeguarding and violence against women and girls, disclosed her secret visits after a BBC investigation found more than half of participating venues failed to implement the scheme properly. Phillips says she found the response in the pubs and bars she checked herself wholly unsatisfactory.

  The Ask for Angela scheme was launched in 2016

  "I have tested the Ask for Angela system a number of times, not just in London, but around the country and where I see it," Phillips told the BBC. "And I have to say, I have always found the response wanting." Phillips added that she "likes to test" safety systems like Ask for Angela, but has become too well known now to continue. Her comments came after BBC undercover researchers posed as a couple on a date, with a female researcher approaching bar staff appearing distressed and asking for Angela. The investigation found widespread confusion among staff. At more than half of the 25 London venues tested, staff were completely unaware of what the emergency codeword meant despite their venues displaying Ask for Angela posters. The BBC received similar reports from around the UK.

  BBC undercover researchers tested 25 London venues that advertised they were part of the Ask for Angela scheme

  Phillips praised the BBC's investigation, saying she felt "really grateful to the good work done by BBC London in highlighting that". The minister, who previously worked developing services for victims of domestic abuse at Women's Aid in the West Midlands, emphasised that safety schemes were "meaningless if you don't implement things properly on the ground". She said: "None of these schemes are ever fit for purpose if they are not trained properly. "New laws, things written down on fancy scrolls that sit in the basement of the House of Commons." Her comments come after the government announced new training initiatives around spiking. Phillips stressed the importance of maintaining ongoing training rather than venues by simply displaying posters. She said this was a type of "pink-washing" where a venue marketed itself as being supportive to women's rights but in practice did not take any positive action or measures. The term can also refer to breast cancer campaigns and LGBTQ+ rights.

  Following the BBC investigation, Cambridgeshire, West Midlands and Hertfordshire police forces announced they had conducted spot checks. The BBC findings mirror similar failures in the scheme's implementation reported by women's safety groups across other parts of the UK. Staff at large chains including Greene King and JD Wetherspoon were among those who did not recognise the code word. Greene King said it was concerned by the BBC's findings and pledged to review how the scheme was communicated to its teams, while JD Wetherspoon said it would provide additional training if necessary. Westminster City Council currently makes participation in the Ask for Angela scheme a key factor when deciding to grant alcohol licences. Hundreds of thousands of pounds of public money has been spent promoting the initiative by police and local councils. The safety scheme has since spread to other countries including Canada and the Netherlands.

