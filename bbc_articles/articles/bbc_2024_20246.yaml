title: '''Mind-blowing'': Thousands bathe in tomato sauce at La Tomatina - BBC News'
date: '2024-08-29'
section: General
url: http://www.bbc.co.uk/news/videos/cjrdz9p0g13o
content: |-
  Partygoers gather near Valencia for the yearly tomato hurling festival.

  Swimming in tomato sauce, throwing tomatoes at one another and even making "tomato angels".

  These are some of the activities thousands got involved in during Spain's La Tomatina Festival.

  Held in Buñol, near Valencia, the event was capped at 22,000 people this year.

  Food waste is not a problem, as the tomatoes used as ammunition are not fit for consumption by humans.
