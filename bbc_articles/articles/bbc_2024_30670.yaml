content: |-
  The 36-year-old singer announced on Instagram that he would be spending Christmas in hospital.

  The Wanted star Max George in hospital with heart 'issues'

  Max George, a member of boyband The Wanted, has announced he will spend Christmas in hospital after tests found he has "some issues" with his heart. The 36-year-old posted a picture of himself on Instagram giving a thumbs-up while lying in a hospital bed, saying he was taken into hospital on Wednesday after feeling "really unwell". He did not detail what the health problems were, but said he was awaiting "a lot more tests to determine the extent of the problems" and "what surgery I will need". "Although this is a huge shock and no doubt a set back, it's something I'll take on with all I've got," he said.

  The singer and Strictly Come Dancing star said it will be a "difficult few weeks/months", and that "Christmas in a hospital bed wasn't exactly what I had planned". He added that he was "surrounded with love and support" from his "wonderful" partner, actress Maisie Smith, and his family and friends. "I count myself very lucky that this was caught when it was," he said. Fellow The Wanted bandmate Siva Kaneswaran offered his support on George's social media post, commenting: "Here for you brother. Rest up and get well soon." JLS stars Marvin Humes and JB Gill also commented, with Humes saying George is "strong and will fight through" and Gill writing he was "wishing you better soon". George rose to fame as part of The Wanted in the early 2010s with bandmates Kaneswaran, Nathan Sykes, Jay McGuiness, and Tom Parker. The group announced a break in 2014 before George and Kaneswaran relaunched the group as a duo in 2022. Parker died from brain cancer at the age of 33 in March 2022.
