  Also on Sunday morning, US Vice-President JD Vance - a Roman Catholic who converted as an adult - had a brief private meeting with the Pope. Vance arrived in Rome on Friday, and on Saturday met with the Vatican's Secretary of State and Secretary for Relations with States and International Organisation. During "cordial talks" on Saturday, the parties expressed satisfaction with "good existing bilateral relations" and a "common commitment" to protect freedom of religion, the Vatican said in a statement. "There was an exchange of opinions on the international situation, especially regarding countries affected by war, political tensions and difficult humanitarian situations, with particular attention to migrants, refugees, and prisoners," the statement read.
