title: Pope wishes worshippers Happy Easter after serious illness - BBC News
date: '2025-04-20'
section: Europe
url: http://www.bbc.co.uk/news/articles/ckg291ngq7qo
content: |-
  Pope Francis, who has been recovering after his release from hospital, appeared in St Peter's Square on Easter Sunday.

  This video can not be played To play this video you need to enable JavaScript in your browser.

  Pope Francis has appeared at the Vatican's St Peter's Square to wish "Happy Easter" to thousands of worshippers. The Pope, 88, came out in a wheelchair and waved from the balcony of St Peter's Basilica to cheering crowds below, saying: "Dear brothers and sisters, Happy Easter." His traditional Easter address was delivered by a clergy member. After the blessing, the Pope was driven around the square. As he passed through the crowds, his procession paused a number of times as babies were brought over for him to bless. His appearance on Easter Sunday had been highly anticipated. Last month, he was discharged from hospital after five weeks of treatment for an infection that led to double pneumonia.

  The Pope's Easter blessing, delivered by a clergy member as the pontiff sat looking frail beside him, said: "There can be no peace without freedom of religion, freedom of thought, freedom of expression and respect for the views of others." "What a great thirst for death, for killing we see in the many conflicts raging in different parts of the world," the Pope said in the address. The Pope remembered the people of Gaza, in particular its Christian population, as the conflict "causes death and destruction" and creates a "deplorable humanitarian situation".

  "I express my closeness to the sufferings... for all the Israeli people and the Palestinian people," the message said. "Call a ceasefire, release the hostages and come to the aid of a starving people that aspires to a future of peace." The Pope also encouraged all parties involved in the Ukraine war to "pursue efforts aimed at achieving a just and lasting peace."

  Prior to Sunday's celebrations, the Pope had been seen out twice this week. Tens of thousands of Catholics had gathered in Rome for Easter Mass during this special jubilee year, which takes place every 25 years and sees millions of pilgrims descend on the city. The jubilee year kicked off with the Pope opening the usually bricked-up Holy Door at St Peter's Basilica on 24 December. For the first time since becoming pope in 2013, he had missed the majority of Holy Week events, including Saturday's Easter vigil at St Peter's Basilica, where he delegated his duties to cardinals. But, during a brief appearance inside the basilica on that day, he prayed and gave sweets to children. When he was discharged from hospital in March, his doctors had said he would need at least two months of rest at his residence. The pontiff had presented "two very critical episodes" where his "life was in danger" while in hospital, according to one of the doctors who took care of him. Dr Sergio Alfieri added that the Pope was never intubated and always remained alert and oriented in hospital. Pope Francis, who is from Argentina, has suffered a number of health issues throughout his life, including having part of one of his lungs removed at age 21, making him more prone to infections.

