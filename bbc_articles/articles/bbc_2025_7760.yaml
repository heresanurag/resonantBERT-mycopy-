title: Michael Sheen to portray 'iconic' Welsh prince Owain Glyndwr - BBC News
date: '2025-04-03'
section: Wales
url: http://www.bbc.co.uk/news/articles/c5yr8y5exgpo
content: |-
  Michael Sheen will star as Owain Glyndwr, the last Welsh-born Prince of Wales, in a new stage play.

  Sheen to take on another real-life role as 'iconic' Welsh prince

  Michael Sheen will star as Owain Glyndŵr in one of the first productions from his new theatre company, Welsh National Theatre

  Actor Michael Sheen has said he will star as Owain Glyndŵr, the last Welsh-born Prince of Wales, in a new theatre production. Owain & Henry will tell the story of Glyndŵr's rebellion against English rule in Wales during the 15th Century, in one of the first productions announced by Welsh National Theatre, Sheen's own theatre company. Glyndŵr became a figurehead for Welsh nationalism and there are statues, monuments, pub and street names across Wales commemorating him. Sheen, who previously said the Royal family should give up the Prince of Wales title, said as Glyndŵr he would portray "the iconic Welsh prince".

  "Owain & Henry is one of the origin stories of our nation, as relevant in today's complex world as it was when Glyndŵr declared Wales an independent nation six hundred years ago," said Sheen, who is from Port Talbot in south Wales.

  The play will be performed at Wales Millennium Centre in Cardiff in November 2026, who are co-producing. Sheen, who as an actor is best known for transforming into characters including Prince Andrew, David Frost and Tony Blair, said he was "incredibly excited". "It's the play that tells the exact story that I want this national theatre company to be able to tell, on the second biggest stage in Europe," Sheen told BBC News.

  Owain Glyndŵr instigated a 15-year revolt against the rule of King Henry IV and claimed the title Prince of Wales, before Wales was reconquered by the English. More than a hundred years earlier, Llywelyn ap Gruffydd - the last prince of an independent Wales - had been killed in battle and his head sent to Edward I, the English king. Edward I then invested his son Edward II as the Prince of Wales, and since then the title has customarily - though not always - been given to the heir apparent. In 2020, Sheen told newspaper columnist Owen Jones that when the time came for the Prince of Wales title to be handed down from Charles to William, "it would be a really meaningful and powerful gesture for that title to no longer be held in the same way as it has before".

  When King Charles bestowed the Prince of Wales title upon Prince William in 2022, thousands signed a petition calling for it to be scrapped

  Owain & Henry is believed to be the first time the story of Glyndŵr has been tackled by a dramatist for a largscale production, with the prince as the main character. The play's writer, Gary Owen, said when he began to write the story Sheen was his "dream casting" - but he had never imagined it becoming a reality. "I've been saying for years that we need to do these big shows here in Wales. We need to connect with a big audience," said Owen. "And now I have to actually do it. So it's some pressure but it's very welcome pressure." Sheen said he had been a "huge fan" of Owen's work for years, calling him "one of the greatest writers Wales has ever produced". "There'll be people who come along to this who have never heard of Owain Glyndŵr before, have no idea what the history is, the importance of that moment in our culture. "And it starts a conversation, you know, it starts a national conversation."

  Sheen recently portrayed Prince Andrew in the TV drama A Very Royal Scandal

  Sheen announced that he was funding the Welsh National Theatre in January, to fill the gap left by the folding of National Theatre Wales. The company, which has received £200,000 in transition funding from Arts Council Wales, has also announced a Welsh spin on the classic American play Our Town, with Doctor Who writer Russell T Davies as a creative associate. Our Town, co-produced with the Rose Theatre in Kingston-upon-Thames, will tour Swansea, Mold, Llandudno and Kingston-upon-Thames between January and March 2026. Welsh National Theatre said it had also commissioned four Welsh writers to create plays of "national significance", and created a network of talent scouts to find and develop new Welsh talent. "When I used to play football on a pitch by the side of the A48 in Port Talbot, I always knew that there was the possibility that there might be someone standing on the touch line," said Sheen. "Local people who were the eyes and ears of the big clubs. There was always the potential you could end up at Man United or Liverpool. "And I've always thought, why isn't there a similar system for the arts, for the theatre? So I'm trying to create that and using the Welsh National Theatre company as the kind of engine for that."

  Sheen received a letter of support addressing him as a "brilliant actor"

  Sheen said "lots of people have been getting in touch" to support Welsh National Theatre since it was announced - including fellow Hollywood Welsh-born actor Matthew Rhys. "I had a lovely message from Matthew," said Sheen. He said people had also shown support in other ways, including through a surprise donation sent to his parents. "The envelope just said 'brilliant actor Michael Sheen'. And it got to my parents. And inside it said 'what you're doing with the Welsh National Theatre - think it's brilliant. Would love to support it'. "And I keep [the cheque] in my pocket," said Sheen. "I walk around with it now."
