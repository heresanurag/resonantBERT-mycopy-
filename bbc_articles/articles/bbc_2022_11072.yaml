  Det Ch Supt Mark Kameen said a gunman shot through the door and hit Olivia Pratt-Korbel and her mother.

  Detective Chief Superintendent Mark Kameen has given a detailed breakdown of how a 9-year-old was shot in Liverpool on Monday night.

  Speaking to the press, he said a gunman shot through the door and hit Olivia Pratt-Korbel and her mother.

