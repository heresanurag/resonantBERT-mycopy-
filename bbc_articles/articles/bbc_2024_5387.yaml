title: West Mersea murder suspect practises false personality - trial - BBC News
date: '2024-03-22'
section: General
url: http://www.bbc.co.uk/news/uk-england-essex-68470912
content: |-
  Prosecutors release a recording which they say features the defendant impersonating a woman.

  Prosecutors in a murder trial have released an audio recording which they say features the defendant practising one of his false identities.

  Carol, 64, and Stephen Baxter, 61, were found dead at their home in West Mersea, Essex, on 9 April.

  Luke D'Wit, 34, of Churchfields, West Mersea, is accused of murdering them using the opioid painkiller fentanyl.

  Chelmsford Crown Court has heard he created several false identities to "manipulate" Mrs Baxter.

  Mrs Baxter had a thyroid condition, Hashimoto's, and prosecutors said he sent her messages pretending to be a doctor and also another Hashimoto's sufferer.

