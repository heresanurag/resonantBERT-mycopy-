title: Metropolitan Police to review No 10 quiz decision after Boris Johnson photo
  leak - BBC News
date: '2022-02-09'
section: UK Politics
url: http://www.bbc.co.uk/news/uk-politics-60319602
content: |-
  The Met reviews its decision not to investigate the December 2020 gathering after photo of PM emerges.

  The Metropolitan Police will review its decision not to investigate a Christmas quiz in No 10 after a picture of Boris Johnson was leaked to the press.

  The photo, published by the Daily Mirror, showed the PM standing next to a bottle of bubbly alongside staff.

  The newspaper said the photo was taken on 15 December 2020 - while Covid restrictions were in place - during a No 10 "virtual" Christmas quiz.

  But it is not one of the parties currently under police investigation.

  The Met said its inquiry into alleged breaches of Covid-19 regulations in Downing Street and Whitehall has been named Operation Hillman.

  Officers will send formal questionnaires to more than 50 people, starting by the end of this week, in relation to eight dates that are being investigated between 20 May 2020 and 16 April 2021.

  "This document, which asks for an account and explanation of the recipient's participation in an event, has formal legal status and must be answered truthfully," the Met said.

  In most cases the questionnaire will be sent by email and must be answered in seven days, the force said.

  Labour MPs called on Mr Johnson to refer the virtual quiz to the Met after the photo surfaced, but the PM said the force had already examined the event as part of their investigations.

  The prime minister's spokesman later insisted to reporters that the gathering in the picture was a "virtual quiz".

  But the police then released a statement, saying: "The [Met] previously assessed this event and determined that on the basis of the evidence available at that time, it did not meet the threshold for criminal investigation.

  "That assessment is now being reviewed."

  The Met is currently investigating 12 parties in Downing Street and Whitehall over the course of the pandemic - some of which the PM attended - to see if Covid regulations were broken.

  But the event on 15 December 2020 is not one of them, having previously not been considered by the force to have reached the threshold.

  It was looked into as part of the independent inquiry into the parties by senior civil servant Sue Gray, who has only published her initial findings while the Met carries out its work.

  No 10 was unable to say whether the photograph had been submitted to Ms Gray in evidence, adding: "I'm not going to get into precise evidence but she obviously had access to all the evidence she needed."

