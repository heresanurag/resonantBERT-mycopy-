content: |-
  Great Britain claim Olympic triathlon mixed team relay bronze after a photo finish decides a thrilling final leg in Paris.

  This video can not be played To play this video you need to enable JavaScript in your browser. Team GB seal bronze after initially being announced as silver medallists in triathlon mixed team relay

  Great Britain claimed Olympic triathlon mixed team relay bronze after initially being announced as silver medallists following a photo finish on a thrilling morning in Paris. The quartet of Alex Yee, Georgia Taylor-Brown, Samuel Dickinson and Beth Potter had jostled with Germany for the lead throughout the race. They held a five-second lead going into the final stage but Potter was caught on the cycle leg by Germany's Laura Lindemann and American Taylor Knibb. Roared on by the British team down the iconic Pont Alexandre III, Potter could not match Lindemann's final kick but she and Knibb crossed the line almost in tandem. Britain were initially announced as having won silver but, following a review by race officials, it was confirmed just before the medal ceremony that the United States had finished second, with Britain third. Britain and the United States both finished with the same time of one minute 25.40 seconds, just one second behind champions Germany. British Triathlon performance director Mike Cavendish told BBC TV they would not appeal against the result. "I've seen the photo - when you zoom in, it's relatively clear," he said. Yee said he was "amazingly proud" of the team. "We did absolutely everything we can for Team GB and I couldn't be prouder of these guys and the performance we put on today," Yee added. "An amazing day out and an amazing day for the sport as well."

  Great Britain's Beth Potter and United States' Taylor Knibb could barely be separated on the line

  It is a third triathlon medal for Team GB at these Games after individual gold for Yee and bronze for Potter. Great Britain were defending champions in the event, during which athletes complete a 300m swim, 7km cycle and 1.8km run. There had been concerns the event would not go ahead because of poor water quality in the Seine, which has been a running thread throughout the Games. However, it got under way on Monday morning as planned, despite a request from teams to delay the competition to allow for more athlete preparation time after the familiarisation swims were cancelled. On a beautiful morning, Yee gave Britain a superb start, roared on by the packed crowds that lined the bridges and Parisian streets. An excellent bike leg and trademark strong sprint meant Yee gave Britain an early lead, before Taylor-Brown produced an outstanding performance on the bike. But she was caught on the line by Germany's Lisa Tertsch to trail by one second going into the third leg. Lasse Luehrs kept on the pressure, running right on the heels of Britain's Dickinson on the final stretch. Dickinson withstood the pressure and tagged in Potter with a lead. But the thrilling finish featured Potter, Lindemann and Knibb jostling for first. The trio sprinted for the finish line, with Potter and Knibb barely separated in the photo. While it is not the silver Team GB initially thought they had won, they will leave Paris with a medal in every triathlon event, which will be of some comfort. "I really don't think Beth Potter could have given any more," former British triathlete Annie Emmerson said on BBC TV. "I just think the fatigue from winning the bronze medal in the individual was too much for her. "You could see how fatigued she was when she crossed the line."
