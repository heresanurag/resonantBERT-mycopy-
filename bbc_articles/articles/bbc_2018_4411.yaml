title: 'Windrush: More than just coincidental errors - BBC News'
date: '2018-04-18'
section: UK Politics
url: http://www.bbc.co.uk/news/uk-politics-43804308
content: |-
  A big part of the Windrush fiasco has been how the Home Office has applied the policy set by ministers.

  The Windrush generation are named after the Empire Windrush ship which brought workers from the West Indies to Britain in 1948

  As in every walk of life, mistakes happen in politics and policy.

  And mistakes can happen by accident, sometimes out of negligence, or sometimes because no-one could quite have imagined the consequences of actions that they decided to take.

  But what's unravelled in the last few days - where the government has been embarrassed, and the prime minister herself had to say sorry about how people whose home is Britain have been treated - is more than just a series of coincidental errors.

  The home secretary and the prime minister herself have now both apologised for the Windrush fiasco. Without question a big part of the problem has been how the Home Office has applied the policy that was set by ministers.

  Incompetence is an occasional feature of any enormous government department. It's not exactly unheard of for the Home Office to be not quite up to its enormous task.

  In fact, almost any MP will tell you about the kind of delays and frustrations they hear from some of their constituents about the Home Office's handling of immigration cases, affecting all sorts of different nationalities.

  But officials respond to and operate within the policies, and the climate set by their political masters. And to understand what's gone here it's worth remembering that the rules that now seem overly draconian and unnecessarily burdensome were conceived in a particular political climate.

  In the days of the coalition, the government's target of getting net immigration down to below 100,000 seemed pretty much unachievable. But the then Prime Minister, David Cameron, had told voters in 2010 that he would cut immigration or deserve to be kicked out.

  He was determined to stick to the aim, despite a myriad of warnings that it was unrealistic and misleading to suggest the government had any hope of hitting it.

  Theresa May was the politician charged with trying to meet what seemed an impossible goal.

