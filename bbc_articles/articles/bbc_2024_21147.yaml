content: |-
  Botswana's Letsile Tebogo claims a surprise 200m gold as American Noah Lyles is denied an Olympic sprint double at Paris 2024.

  This video can not be played To play this video you need to enable JavaScript in your browser. Tebogo wins gold in men's 200m final as Lyles comes third

  Botswana's Letsile Tebogo claimed a surprise Olympic 200m gold medal as Noah Lyles was denied a sprint double at Paris 2024. Tebogo, 21, stormed clear of his rivals to clock an African record of 19.46 seconds and finish ahead of American Kenneth Bednarek, who crossed the line in 19.62. Lyles, crowned the world's fastest man by five-thousandths of a second in a historically quick 100m final on Sunday night, was unable to compete at the head of the race and matched his Tokyo bronze in 19.70. It emerged after the race that Lyles had tested positive for Covid and the 27-year-old had to be helped off the track in a wheelchair. Having burst out on to the track to huge cheers before the race, Lyles was seeking to become the first man since Usain Bolt in 2016 to complete a 100m and 200m double at an Olympic Games. But Tebogo had other ideas. A world bronze medallist over the distance last year, Tebogo also took 100m silver in Budapest as Lyles completed a golden treble. That was a dazzling return for Tebogo at his first senior global championship, but it was nothing compared to his achievement at the Stade de France as he marked his first Olympics with a gold. Tebogo, sixth in the Paris 100m final, lined up with a 200m personal best of 19.50 – notably down on the favourite's 19.31. Showman Lyles made his entrance to huge excitement, seemingly ready to seize his moment with the eyes of the world fixed upon him, but he remained third throughout following a slow start. Bednarek held out to equal his silver of three years ago in Tokyo - a medal he also won at the 2022 World Championships - but could not overhaul Tebogo, who sprinted clear to win Botswana's first ever Olympic gold medal.

  Letsile Tebogo won his first senior global title and Botswana's first ever gold medal at the Olympics

  Tebogo dedicated Olympic gold to his mother Seratiwa, who died in May of this year after a brief illness, and held up his spikes, displaying her date of birth, to the camera following his victory. "It's basically me carrying her through every stride that I take inside the field," Tebogo said. "To take her [with me], it gives me a lot of motivation. She's watching up there, and she's really, really happy." Having ended Lyles' 26-race winning streak over the distance in the semi-finals, Tebogo announced himself on the global stage as he repeated that victory over the man who has long been tipped as Bolt's heir apparent. Tebogo entered the home straight with an advantage and, as his rivals threatened to pull alongside, he surged away in the closing stages to clinch an emotional – and hugely significant – triumph.

