  Lyles, the fastest man over 200m this year before this race and a three-time reigning world champion over the distance, produced his usual theatrics before the serious business began. But this performance in his favoured event was not at his usual world-beating standard and it soon became apparent why as news broke of the American's illness. Bolt, the fastest man in history and winner of eight Olympic gold medals, completed the sprint double at three successive Games in Beijing, London and Rio – and he remains the only man to ever enjoy such a dominant streak. Lyles had targeted a remarkable four golds in Paris, including both the 4x100m and 4x400m relays, but it remains to be seen whether he will be fit to contest those finals.

  Noah Lyles was taken away in a wheelchair after the 200m final
