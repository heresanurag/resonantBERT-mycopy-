  A memorable week for Kartal continued as she became the second British woman to reach the third round as a qualifier in the Open era, and the first since Karen Cross in 1997. Kartal previously said she thought she would be unable to take to the tennis court for the rest of this year after a serious health scare, but she recovered to come through qualifying. The Brighton-born player powered through the first set and led by a break in the second. However, Burel - ranked 253 places above Kartal - fought back to force a decider, her confidence rising as she unleashed some brilliant backhand passes. Kartal composed herself and broke in the fifth game of the final set when a forehand clipped the net cord and landed on Burel's side, with a volley sealing another break and the victory. "Today is a really special day for me," Kartal said. "Monday was a high but I've topped that today."

  Britain's Dan Evans complained about authority figures in "fancy jackets" allowing his first-round match to continue late on Tuesday night after he lost when it resumed on Wednesday. The 34-year-old was beaten 6-2 7-5 6-3 by Chilean 24th seed Alejandro Tabilo. Evans, ranked 60 in the world, wore heavy strapping on his knee after slipping at the back of the court on the grass at Queen's Club on 18 June. Initially Evans feared he would miss Wimbledon, but the injury was a "bad strain" and he recovered in time for his home Grand Slam. After losing to Tabilo, Evans expressed his displeasure at playing on a court at Wimbledon that he did not deem to be "safe". "It's sort of the second time it's happened over the grass where I've ended up going on pretty late because of the weather, which has been frustrating. It's just part and parcel of it," said Evans. "Obviously, my first concern is to be safe after what happened. Obviously, that grass court wasn't safe where I slipped I don't think. "I didn't think the court was playable last night for the large majority of the time we were on court. "The powers that be in the fancy jackets didn't agree with me and we carried on."
