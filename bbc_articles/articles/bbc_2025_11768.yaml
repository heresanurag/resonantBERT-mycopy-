content: |-
  Fiona Hutchings toasts success after finding Essex's first forester moth since 1974.

  Rare moth spotted for first time in 50 years

  Fiona Hutchings was "amazed" to find the forester moth while doing a botany recording

  A wildlife enthusiast popped open the bubbly after finding an extremely rare moth last seen in Essex more than 50 years ago. Fiona Hutchings, 47, said jaws around her dropped when the "flash of green" that flew past turned out to be a forester moth. She had been carrying out surveys with the Essex Field Club at a farm in Alphamstone, near Halstead, on Thursday. "To find something so rare was just amazing," Ms Hutchings added.

  The discovery left members of the Essex Field Club staggered

  The last sighting of a forester in Essex was in 1974, according to the field club, external, but they have been spotted elsewhere since. They have a wingspan of up to 2.9cm (29mm) and prefer damp grassland, chalk downland and woodland areas.

  Describing the moment she saw one, Ms Hutchings said: "I was walking along a footpath area and I saw this green flash go past. "I caught it in a net and when I looked in the net I knew what it was the moment I saw it." The enthusiast, from Wimbish, near Saffron Walden, took her find to fellow club member Rob Smith. "His mouth opened and his eyes went so wide. He said, 'That's a forester'," Ms Hutchings added.

  Mr Jones came across a second forester later in the day and photographed it

  The pair photographed the moth before releasing it back into the wild and logging the find in a database. They were amazed to discover another forester during their surveys later on. Ms Hutchings said: "I bought a bottle of bubbly the other day for a special occasion. "After finding the forester I thought 'You know what, this is a special occasion' and I had a glass of bubbly."

