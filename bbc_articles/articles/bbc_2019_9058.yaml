title: 'Netball World Cup 2019: Australia beat South Africa in thrilling semi-final
  - BBC Sport'
date: '2019-07-20'
section: General
url: http://www.bbc.co.uk/sport/netball/49057223
content: |-
  Australia will defend their Netball World Cup crown on Sunday after coming through 55-53 in a thrilling semi-final against South Africa.

  Last updated on .From the section Netball

  Coverage: Watch live on BBC TV, BBC iPlayer, Connected TVs, BBC Sport website and app from 15 July; Follow daily live text commentaries online.

  Australia reached their eighth successive Netball World Cup final after edging a 55-53 win against South Africa in Liverpool.

  The 11-time winners squandered an eight-goal half-time lead as the Proteas stormed back to within one with four minutes remaining.

  But the Diamonds held on to reach Sunday's gold-medal match.

  Australia now play New Zealand in Sunday's final as they bid to win their fourth consecutive title.

  The Kiwis beat England 47-45 in the other semi-final on Saturday.

  "I'm proud of them. They're a bunch of fighters. They played smart when we needed it and that's exactly what we have to do in pressure games," said Australia coach Lisa Alexander.

