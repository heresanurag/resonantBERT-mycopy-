title: 'White Hart Lane: Tottenham immediately begin stadium redevelopment - BBC Sport'
date: '2017-05-16'
section: General
url: http://www.bbc.co.uk/sport/football/39920354
content: |-
  Redevelopment of White Hart Lane begins less than 24 hours after Tottenham said an emotional farewell to their home of the past 118 years.

  Redevelopment of White Hart Lane starts less than 24 hours after Tottenham said an emotional farewell to their home of the past 118 years with a 2-1 win over Manchester United.

  They plan to have a new 61,000-seater stadium, built on the same site, ready for the 2018-19 season.

  In the meantime, the club will play home games at Wembley, which they have used in the Champions League and Europa League this season.

  The new stadium is expected to cost £750m but will create about 3,500 jobs in the area when it is finished, according to the club.

