title: Barnaby Webber family donate to girl with rare skin disease - BBC News
date: '2024-08-21'
section: UK
url: http://www.bbc.co.uk/news/articles/cz7311pxwwwo
content: |-
  The family of the student killed in the Nottingham attacks make a first donation in his memory.

  This video can not be played To play this video you need to enable JavaScript in your browser. Family of Barnaby Webber make first donation through charity set up in his name

  The family of a teenager killed in the Nottingham stabbings have made a donation in his memory to a teenage girl with a rare skin condition. Barnaby Webber, 19, from Taunton, Grace O'Malley-Kumar, 19, and Ian Coates, 65 were killed by Valdo Calocane in the city in June 2023. The Webber family have since set up The Barnaby Webber Foundation, with money raised going to young people in need. The first recipient is 16-year-old Isla Grist, who has a rare skin condition called Epidermolysis bullosa (EB).

  The first recipient of the Barnaby Webber Foundation is 16-year-old Isla Grist

  Emma Webber, Barnaby's mum, made the announcement live on BBC Breakfast with former Liverpool and Rangers footballer Graeme Souness. Ms Webber said the family wanted to make the first donation from Barnaby's foundation to "somebody who is facing challenges in their life". "That could be anyone, that could be Charlie, he's facing challenges because he lost his brother and how it happened," Ms Webber added. She told Ms Grist: "Every day, you're facing all the stuff you have to go through and we would like to make our very first donation to you because you're so special. It's really difficult, life, sometimes."

  Barnaby Webber, 19, from Taunton, was killed by Valdo Calocane in 2023

  Ms Grist, from Black Isle, near Inverness, has had her condition since birth and has to be wrapped in bandages. She said she would use the donation to buy a new wheelchair "that's not heavy". She added she has to "fight for everything" because her condition is not that well known. Ms Webber added: "I think things happen for a reason sometimes. I watched you on BBC Breakfast quite a few times and I was so inspired by what you did. "We've had the most horrible year. Suddenly I thought it would be perfect if we were able to meet you. "We are really proud of how brave you are. You're an inspiring young lady."

