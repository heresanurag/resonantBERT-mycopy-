  A 50-year-old directive that policed students' hairstyles was found to be unconstitutional.

  Students now free to choose their hairstyles, Thai court rules

  Schools in Thailand have traditionally associated short hair with tidiness - but students have been fighting for change

  After years of wrangling with authorities, students in Thailand can now let their hair down. Literally. On Wednesday, Thailand's Supreme Administrative Court annulled a 50-year-old directive by the education ministry, which had previously set out rules on hairstyles for school students: short hair for boys and ear-length bobs for girls. In practice, hairstyle rules have been gradually relaxed across many schools. But some still used the 1975 junta-issued directive as a guideline, and would cut the hair of students who didn't adhere. The 1975 directive violated individual freedoms protected by the constitution and was out of touch with today's society, the court said.

  The court decision this week came in response to a petition, filed by 23 public school students in 2020, which argued that the 1975 directive was unconstitutional. Student activists have long campaigned for hairstyle rules to be relaxed, saying it infringes on their human dignity and personal freedom over their bodies. One of them is Panthin Adulthananusak, who recently graduated from university. "In the eyes of kids like us back then... even though it seemed impossible, we wanted to do something," he told the BBC. "If no student in Thai history rose up to challenge the power of the adults that suppressed us, it would be a lifelong embarrassment." In response to such campaigns, the education ministry in 2020 allowed students to have longer hairstyles - but there remained some restrictions. Boys' hair could not cover the nape of their necks, while girls with long hair had to tie it up. Those regulations were revoked in 2023, with then education minister Trinuch Thienthong announcing that students, parents and school authorities should negotiate their own common ground on what is acceptable for hairstyles in their schools. But through all these changes, some schools continued to follow the standard laid out in the original 1975 directive. Schools have traditionally associated short hair with discipline and tidiness - an argument that has been repeated by many social media users this week. But in recent years reports of schools banning bangs or dyed hair have sparked public outcry across Thailand. In some parts of the country, teachers are known to shoddily cut students' hair during morning assembly to punish them for flouting hairstyle rules. Such practices have continued even as education authorities warned teachers against it. In January, the Ministry of Education reiterated that it had repealed restrictions on hair length for all students, saying it recognised the "importance of promoting diversity and fairness in all aspects of education". Wednesday's court decision, which also says that schools' hairstyle rules should consider the freedom and dignity of students, reaffirms the official push to leave hair choices up to students themselves. But Panthin said the revoking of the decades-old directive "still leaves a hole for schools to set their own rules". In cases where schools have more conservative management, he suggested, restrictions could remain in place. Nonetheless, Panthin said he "felt glad that what I had seen and fought all along was acknowledged and there was a tangible progress". "I hope this court's ruling will set a new standard for the understanding about basic human rights at the school."
