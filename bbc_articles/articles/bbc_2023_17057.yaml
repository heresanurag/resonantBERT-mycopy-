  Honouring the South Korean state visit, the military band surprised tourists by switching to K-pop.

  The changing of the guard outside Buckingham Palace had an unexpected change of style on Wednesday - when the military band switched to K-pop.

  Honouring the South Korean state visit, the band surprised tourists with a rendition of Gangnam Style by Psy and Ddu-Du, Ddu-Du by Blackpink.

  The K-pop medley was part of the red carpet being rolled out for the South Korean president.

  It follows the state banquet on Tuesday night, when King Charles name-checked K-pop stars such as Blackpink and BTS.
