title: 'Sarah Mayhew killing: Body parts still missing, Old Bailey hears - BBC News'
date: '2024-04-11'
section: London
url: http://www.bbc.co.uk/news/uk-england-london-68788058
content: |-
  A man and a woman are accused of murdering Sarah Mayhew, whose remains were found in a London park.

  Sarah Mayhew's remains were discovered in a park in Croydon

  The remains of a woman found in a south London park have not been fully recovered, the Old Bailey has heard.

  Police were called to Rowdown Fields, New Addington, last week where Sarah Mayhew, 38, from Croydon, was found.

  Gemma Watts, 48, appeared at the Old Bailey via video-link earlier charged with her murder.

  Steven Sansom, 44, is also accused of Ms Mayhew's murder and appeared at the same court via video-link later on Thursday.

  They are also charged with preventing her lawful and decent burial.

  Ms Watts, from New Addington, Croydon, appeared by video-link from HMP Bronzefield, speaking only to confirm her identity.

  Both she and Mr Sansom, from Sutton in south London, are alleged to have killed Ms Mayhew at a residential property on the night of 8 March.

  The court heard Ms Mayhew's body was then cut up and dumped in the park.

  Prosecutor Tom Little KC said there was an "ongoing investigation in relation to the whereabouts of the entirety of the deceased's body".

  "The deceased's body was certainly cut up in parts with use of power tools," he told the court.

  Mr Sansom appeared in court via video-link from Belmarsh Prison.

  He also faces three separate charges of making indecent images of a child.

  Judge Philip Katz set a plea hearing for 27 June, and a provisional four-week trial from 17 February.

  Both defendants have been remanded into custody.

  Ms Mayhew was last seen in Sutton, south-west London, on the evening of 8 March. The cause of her death has not yet been confirmed.

  Police had been called to Rowdown Fields after a dog walker saw his animal had uncovered a human bone.

  Other body parts were then found nearby and identified as belonging to Ms Mayhew by her DNA.

  Police are continuing to search for remaining body parts, the Old Bailey heard.

