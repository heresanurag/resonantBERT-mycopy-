content: |-
  Scotland's Eilidh Doyle wins 400m hurdles silver, while England's Kyle Langford also comes second in the men's 800m at the Commonwealth Games.

  This video can not be played To play this video you need to enable JavaScript in your browser.

  Scotland's Eilidh Doyle won 400m hurdles silver, while England's Kyle Langford also came second in the men's 800m at the Commonwealth Games. England's Zharnel Hughes was denied a maiden senior gold medal as he was disqualified from the men's 200m final. England's Shara Proctor and Luke Cutts got bronze in the women's long jump and men's pole vault respectively, and Sophie Hahn won T38 100m gold. Wales' Olivia Breen was third behind England's Hahn, while Northern Ireland's Leon Reid was promoted into bronze after Hughes' men's 200m disqualification. Asher-Smith, 22, dipped ahead of double Olympic champion Elaine Thompson of Jamaica to take third by a hundredth of a second in 22.29 seconds in a race won by the Bahamas' Shaunae Miller-Uibo.

  This video can not be played To play this video you need to enable JavaScript in your browser.

  It is Asher-Smith's first individual major championship medal after finishing fourth at the World Championships in London in 2017 and fifth at the Rio Olympics in 2016. Doyle, who achieved the same result at Delhi 2010 and Glasgow 2014, finished 0.47 seconds behind Jamaican winner Janieve Russell. "That meant so much - I knew this would be the hardest Games to win a medal," said the 31-year-old. Langford, 22, ran a superb personal best of one minute 45.16 seconds as he finished fast behind Kenyan winner Wycliffe Kinyamal, who tied up dramatically as he approached the line. Scotland's Jake Wightman finished in fourth with defending champion Nijel Amos of Botswana out of sorts and eighth. Paralympic and world champion Hahn, 21, won the T38 100m title in 12.46 seconds while Breen clocked 13.35. It was Hughes' disqualification in the penultimate race of the evening that set the Carrara Stadium abuzz. The 22-year-old finished just ahead of Jereem Richards - with both men timed at 20.12 seconds - but Hughes was judged to have impeded his Trinidad and Tobago rival, who was awarded the gold. It was only after completing a lap of honour that Hughes was informed of his disqualification by an official. Team England's appeal against the decision was rejected. Procter - competing at a Commonwealth Games for the first time since representing Anguilla as a teenager at Melbourne 2006 - took long jump bronze with a leap of 6.75m, while Canada's Christabel Nettey won with 6.84m. Cutts placed third in the pole vault having cleared 5.45m, beating fellow Englishman Adam Hague to bronze on count-back. Australia's Kurtis Marschall thrilled the home crowd by taking gold with a clearance of 5.70m.

