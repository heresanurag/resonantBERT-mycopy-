  Meanwhile, England's Katarina Johnson-Thompson leads after the first day of the heptathlon after a 23.56sec 200m took her back into top spot in the overall standings following a poor shot put. The competition concludes with the long jump, javelin and 800m on Friday. Kyron McMaster won the British Virgin Islands' first gold in Commonwealth Games history in the men's 400m as he powered home in a world-leading 48.25 seconds. The result is some redemption for the 21-year-old after he entered the World Championships in London last summer as favourite, but was disqualified for a lane infringement in the heats. England's Jack Green finished fourth, missing a medal by just two hundredths of a second. Earlier in the day, England's Tiffany Porter and Alicia Barrett qualified for the 100m hurdles final. England's Alexandra Bell ran a personal best to reach the women's 800m final as the second-fastest qualifier behind South Africa's Olympic champion Caster Semanya but Scotland's 2014 silver medallist Lynsey Sharp missed out.

