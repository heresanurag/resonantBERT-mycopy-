  Meanwhile, McIlroy says he is looking forward to getting "back on the horse" in the PGA Championship at Wentworth this week. McIlroy, 35, was denied victory at the Irish Open on Sunday when Denmark's Rasmus Hojgaard fought back to win by one shot in a dramatic final round at Royal County Down. Overnight leader McIlroy led by four shots early in the round but dropped shots at 15 and 17 proved costly. "I think there may be a misconception that it hit me harder than it maybe did," said the world number three. "You know, I didn't really feel like I necessarily lost the tournament. I felt like Rasmus went out and won it. "Obviously I'm trying to look for the positives in all of it but I'm happy to be here. There are not many better places to be."
