  Asked about reports that her son had been hitting his wife, she said: "Only the police know what happened, what do we know? We are continents away." She added she did not know what to do, now her only son is caught up in a murder investigation. "We are completely finished. We are now left with no support," she said. She also said she did not know there had been allegations of violence and abuse, as reported by Harshita and her family. When asked by the BBC, Northamptonshire Police did not answer if they are in contact with authorities in India, where Mr Lamba is believed to be. Indian police have said they have not been able to launch an investigation as the crime took place in the UK. Mr Lamba had been living on a student visa in the UK. He and Harshita had an arranged marriage and were wed in March in India before moving to the UK in April.
