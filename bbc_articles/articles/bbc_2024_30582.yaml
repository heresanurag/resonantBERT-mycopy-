title: 'Harshita Brella: Mother of murder suspect ''cannot believe'' he killed wife
  - BBC News'
date: '2024-12-13'
section: Northamptonshire
url: http://www.bbc.co.uk/news/articles/crmn3mp81yxo
content: |-
  Sunil Devi says she thought Harshita and her son, Pankaj Lamba, were "happy in their lives".

  Police believe Harshita was fatally strangled in Corby, Northamptonshire, on 10 November

  The mother of the man police suspect murdered Harshita Brella has said she "cannot believe" he would have killed his wife. Sunil Devi told the BBC she spoke to the couple on 10 November - the day police believe Harshita was fatally strangled in Corby, Northamptonshire - and they seemed "happy". Harshita's body was discovered in a car boot in east London four days later. Ms Devi's son, Pankaj Lamba, is the prime suspect in the murder investigation. He had already been known to police, having been arrested on 3 September and was the subject of a domestic violence protection order.

  The order, which had barred him from harassing or intimidating Harshita, ended on 1 October. "I don't know anything but I cannot believe this," Ms Devi told the BBC from her home in a small village in Haryana, India. She hid her face during the interview because of the shame this case has brought to her family. She said her son and daughter-in-law had sent her photos of food they had cooked on the 10 November and she had thought they were "happy in their lives". But earlier this week Harshita's family told the BBC she feared for her life and believed Mr Lamba "was going to kill her". Her family also said Harshita had a miscarriage in the weeks before her death. They believe Mr Lamba is in India, but said police there were "not listening" to them. Local police have told the BBC that UK authorities have not requested for them to intervene. Ms Devi said she does not know where her son is, or if he is even alive. "Some people even say he's been killed. We don't know what people are saying. I can't understand anything. We've left it to God," she said.

