title: England fans celebrate reaching Euro 2024 semi final - BBC News
date: '2024-07-08'
section: General
url: http://www.bbc.co.uk/news/videos/cw4y099mp49o
content: |-
  Three Lions supporters cheered in delight as England won a penalty shootout against Switzerland.

  It was a nail-biting night for England football fans as the national team secured their spot in the semi-final of Euro 2024 after a penalty shootout on Saturday.

  The match went to penalties after the Three Lions came from behind to equalise with Switzerland.

  England then went on to beat the Swiss 5-3 on penalties, and will face the Netherlands next in the semi final at 20:00 BST on Wednesday.
