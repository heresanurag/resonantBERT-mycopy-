content: |-
  Christina McKelvie, the Scottish drugs and alcohol policy minister, is undergoing treatment for secondary breast cancer.

  Christina McKelvie was diagnosed with secondary breast cancer in June

  Scottish government minister Christina McKelvie is to take medical leave while she receives cancer treatment. Ms McKelvie, the drugs and alcohol policy minister, announced she is undergoing treatment for secondary breast cancer. The SNP MSP recovered from breast cancer in 2021 after having treatment at the Beatson West of Scotland Cancer Centre, but was diagnosed with secondary breast cancer in June. Her ministerial duties will be covered by the health secretary, Neil Gray, and Jenni Minto, the public health minister.

  Ms McKelvie said: “In 2021 I was pleased to be able to ring the bell at the Beatson cancer centre to mark the end of my treatment for breast cancer. "Unfortunately, in June I was diagnosed with secondary breast cancer and started treatment in July, again at the Beatson. “For the past month, I have been able to carry out my duties as minister for drugs and alcohol policy, however following medical appointments today, it is clear to me that I need to take a period of leave to focus on my treatment and recovery." She thanked the Beatson and wider NHS staff who had been "caring for me so well during this period and have done since my first diagnosis in 2021", and reminded women to make regular checks and attend screening appointments. Ms McKelvie, 56, has been MSP for Hamilton, Larkhall and Stonehouse since May 2011 and was previously MSP for Central Scotland. She took a break from her job as minister for equalities and older people in 2021 when she was first diagnosed with cancer. In a message on X, external, formerly Twitter, First Minister John Swinney said: "I wish Christina well as she faces her health challenges and have encouraged her to prioritise her own wellbeing. "I look forward to welcoming her back into ministerial work when the time is right."
