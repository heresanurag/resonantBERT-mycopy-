content: |-
  CCTV footage shows Logan Burnett, 27, chasing his victim, and then fleeing after fatally stabbing her.

  Police have released CCTV footage of a murderer chasing his victim, and then fleeing after fatally stabbing her.

  Twenty-seven-year-old Logan Burnett, from Ipswich, was given a life sentence for stabbing to death his ex-partner Courtney Mitchell, a mother of three, in front of her friends.

  Footage from Suffolk Police shows Burnett walking in the town before the attack, which took place in broad daylight on 6 August 2024. Ms Mitchell, 26, and her friends are seen running after they spot Burnett coming towards them.

  Burnett, who was described in court as "motivated by excessive jealousy", gives chase. He is then seen fleeing the scene of the killing. The footage ends with Burnett's arrest.
