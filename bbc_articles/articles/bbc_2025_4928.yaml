title: 'Potholes: Publish progress or lose cash, Starmer tells England councils -
  BBC News'
date: '2025-03-25'
section: Business
url: http://www.bbc.co.uk/news/articles/c0eg39e01w8o
content: |-
  A red, amber and green rating system is being produced for English councils on pothole maintenance.

  Pothole fixing progress by councils to be ranked

  English councils will be ranked according to their pothole fixing progress under government plans, with those who fail to publish updates losing out on millions in funding. The Department for Transport (DfT) said local authorities' road maintenance pot would be boosted by £500m from mid-April, but councils must publish annual reports detailing progress on potholes or lose a quarter of that extra funding. The prime minister told the BBC this would produce a rating system "so we know who is the best and who is not the best". The Local Government Association (LGA), which represents councils, said the government should focus on preventative measures rather than "reactively" fixing potholes.

  Clearing the country's backlog of road repairs would take more than a decade and cost almost £17bn to fix, the LGA said, citing a survey from the Asphalt Industry Alliance. According to data from the RAC, there are six potholes for every mile of road in England and Wales. All English local authorities will get 75% of the extra cash promised, but if a council does not publish a report on road maintenance, including details on pothole filling progress, the remaining 25% will be withheld. The held back funding will be given instead to councils the DfT believes have made proven progress. The policy will only apply to English councils as funding for Scottish, Welsh, and Northern Irish local authorities is a devolved matter. Prime Minister Sir Keir Starmer told the BBC a RAG (red, amber, green) rating system would be produced for councils on pothole maintenance. He said that "until now, nobody has known how many potholes are being filled and where they're being filled". "We all have the experience of driving from one place to the next and we know some places are better than others," he said, adding that the RAG system will help to avoid "the lottery that we have now".

  However, Lucy Nethsingha, leader of Cambridgeshire County Council and chair of the LGA's Liberal Democrat group, said the amount of money was "nowhere near the amount that is needed". "The implication that we are not spending it well is not helpful," she said, adding that the government was announcing "stuff that was already announced several times over and that doesn't help increase people's faith in politics". "It's not clear that there is extra money coming as a result of this announcement. There is extra red tape and I don't think that's going to be helpful," she said. She added in order to fix the roads in Cambridgeshire alone, the council had a shortfall £410m while the money the government was "re-announcing" for the whole of England was £500m. "Our roads are like a worn out pair of trousers, you can keep fixing the holes, but what you actually need is a new pair of trousers - or in this case a proper resurfacing." But the prime minister said "any council that says to me it's not enough money, I'd say come back to see me in June when you've actually filled these potholes in with your RAG rating and then we'll see if we can release more money to you". "Don't start the exercise complaining that you haven't got enough money." Transport Secretary Heidi Alexander said she was "not pretending that the money we're making available will fill every pothole". Asked whether withholding cash from some councils would just make things worse for drivers in some areas, she said she expected most local authorities would be able to "comply with these requirements". "We want councils to be open and honest about how they are using that money so that the public can go onto their local council's website and see what action is being taken," she said. Under the government's rules, councils must say how much they are spending, how many potholes have been filled and detail long-term road maintenance plans in reports that have to be published by the end of June. By the end of October, councils must also demonstrate that communities have been consulted on where repairs should take place. The DfT added that councils who "fail to meet these strict conditions" will see 25% of the funding withheld. During the election campaign, Labour pledged to repair up to a million potholes a year in England.

  The LGA said it was in "everyone's interests to ensure that public money is well spent". "This includes the government playing its full part by using the Spending Review to ensure that councils receive sufficient, long-term funding certainty, so they can focus their efforts on much more cost-effective, preventative measures rather than reactively fixing potholes, which is more expensive," it added. Shadow transport secretary Gareth Bacon described the government's announcement as a "pothole sticking plaster". He said: "Labour like to talk a big game on fixing roads but they are more interested in chasing headlines." The Liberal Democrats transport spokesman Paul Kohler called for a "more sustainable approach" to repairs, saying fixing individual potholes was welcome but did little to address a "crumbling road infrastructure".

