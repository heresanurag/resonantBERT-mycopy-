  In newly released audio featured in a documentary, Manson appears to speak about previously unknown killings.

  Charles Manson spoke of more killings in prison tapes

  Manson's followers, known as the Manson Family, killed nine people in 1969

  A new recording has emerged of notorious cult leader Charles Manson appearing to admit to additional killings. Manson's followers, known as the Manson Family, killed nine people in 1969. The cult leader directed the killings in the hope they would start a race war. He died in prison in 2017. In newly released audio recorded while he was in jail and featured in a new documentary, Manson appears to speak about previously unknown killings.

  “See, there’s a whole part of my life that nobody knows about,” Manson is heard saying in one of the tapes, which feature in a new documentary series Making Manson., external “I lived in Mexico for a while. I went to Acapulco, stole some cars. I just got involved in stuff over my head, man. Got involved in a couple of killings. I left my .357 Magnum in Mexico City, and I left some dead people on the beach.” Associates of Manson, as well as his former cellmate, Phil Kaufman, are also interviewed. “Charlie was very good at being evil and not showing it,” says Mr Kaufman in the series teaser. “Anything that detracted from his game plan at that time, he would squash it, but he did it with velvet gloves.” In the series, Manson "recounts the early crimes that led to the murder spree in the summer of ‘69", according to the Peacock streaming service.

  Manson died of natural causes behind bars in 2017

  The Manson Family killed nine people including the heavily pregnant Hollywood actress Sharon Tate, wife of Roman Polanski. One of Manson's young followers, Susan Atkins, stabbed Tate to death and scrawled "PIG" on the home's front door with the actress's blood. Four other people at Tate's home were brutally stabbed to death. The next day, a wealthy couple in Los Angeles, Leno and Rosemary LaBianca, were also killed by the clan. The killings became known collectively as the Tate-LaBianca murders. Separately Donald Shea, a Hollywood stuntman, and Gary Hinman, an acquaintance of the group, were killed by members of the Manson Family. Manson was not at the scene of the killings, but was nonetheless convicted of murder for directing his followers in seven of the killings. He died of natural causes behind bars in 2017.
