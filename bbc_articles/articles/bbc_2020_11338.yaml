title: Covid circuit breakers 'doomed to fail', says disease expert - BBC News
date: '2020-10-14'
section: General
url: http://www.bbc.co.uk/news/uk-wales-54537153
content: |-
  It comes as the Welsh Government says a short lockdown is under consideration in Wales.

  Covid circuit breakers are "doomed to fail", according to a disease expert.

  It comes as Health Minister Vaughan Gething said a circuit lockdown was being "actively considered" for Wales.

  The short-term measures could include closing pubs and restaurants.

  But Dr Roland Salmon, former director of communicable diseases at Public Health Wales, said: "I simply don't think a circuit breaker will work."
