title: BBC reporter sees disbelief among Seoul protesters - BBC News
date: '2024-12-03'
section: General
url: http://www.bbc.co.uk/news/videos/c30nlqvn030o
content: |-
  The BBC's Jake Kwon said people protesting against President Yoon's martial law announcement 'cannot seem to believe' it.

  People protesting against the South Korean president's declaration of martial law "cannot seem to believe" what's happened, according to a BBC reporter outside the parliament building in Seoul.

  Standing among the chanting crowd, the BBC's Jake Kwon said the overwhelming mood at the protest is one of "incredulity" that martial law could be declared in the democratic country.
