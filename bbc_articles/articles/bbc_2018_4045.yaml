  In a scintillating competition on the Gold Coast, Leeds-born Wilson began as favourite in the absence of reigning all-around Commonwealth champion Max Whitlock. England's Whitlock chose to sit out the event to focus on the individual floor and the pommel titles, and watched from the stands as his England team-mate took his title. Wilson made slow and steady progress up the leaderboard after modest performances on the floor and the pommel - a routine that had to be adapted to accommodate his injury. He was pushed all the way after a fine outing from Hall, and the English pair went into the final rotation with just 0.025 points between them, with Georgiou, who had led throughout, also matching Wilson's score. Georgiou was a surprise contender for the title after a series of falls in the qualification round, but all three nailed their high bar routines in a tense finale. And it was Olympic medallist Wilson who came out on top - much to the delight of his dad, who celebrated madly when he won. "There were some tears from my dad," Wilson added. "He pointed at me and said 'you're gifted, boy' and that got me. My family are the reason I do what I do. I just want to thank everyone back home."
