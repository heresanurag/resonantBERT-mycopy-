content: |-
  England's Nile Wilson wins his second gold medal of the 2018 Commonwealth Games with victory in the men's all-around final.

  This video can not be played To play this video you need to enable JavaScript in your browser.

  England's Nile Wilson won his second gold medal of the Commonwealth Games in the men's all-around final as his team-mate James Hall took silver. Hall and Wilson won gold in the men's team final on Thursday and the two gymnasts continued their fine form in a closely fought competition. Despite nursing a wrist injury, Wilson, 22, posted 15.100 on the horizontal bar to steal victory. England's Alice Kinsella also claimed bronze in the women's all-around final. The 17-year-old registered a combined total of 53.150 to finish third. "I could have done a lot better today, my beam performance was quite wobbly, the floor landing was the same thing. So yes, I could have done better but I'm still proud of what I achieved," said Kinsella.

  Nile Wilson went into the final rotation in joint-first place with Marios Georgiou of Cyprus, but maintained his composure to secure the title. "That was one of the most incredible experiences I've ever had," said Wilson.

  Alice Kinsella was part of the England team who won women's team gymnastics silver on Friday

  "It was a battle on the high bar. You can't write it, to finish the way like it did. That was one of the best high bars I have put together." Wilson, the 2016 Olympic bronze medallist on the horizontal bar, finished with a final score of 84.950 to better his third place in Glasgow four years ago as Georgiou took the bronze. Hall, 22, had temporarily moved into the gold medal position before Wilson pipped his team-mate on the final routine as England celebrated a deserved one-two. Scotland's Frank Baines finished just outside the medals in fourth, with his compatriot Hamish Carter in sixth. Northern Ireland's Rhys McClenaghan was 10th, Wales' Josh Cook came 13th and another Northern Irishman, Ewan McAteer, called up as a late reserve, came 18th.

