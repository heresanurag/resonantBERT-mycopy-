title: 'Overdrafts: A guide to your changing bank fees - BBC News'
date: '2020-02-07'
section: General
url: http://www.bbc.co.uk/news/newsbeat-51399436
content: |-
  It's the biggest change in overdrafts in a generation and could mean you paying double.

  Arranged overdrafts are most often used by 18 to 24-year-olds, according to the Financial Conduct Authority. With 44% having dipped into theirs during the past 12 months.

  But on 6 April, overdrafts are changing. Radio 1 Newsbeat reporter, Rick Kelsey, has been finding out how and why these changes could leave you paying almost double.

  Listen to Newsbeat live at 12:45 and 17:45 weekdays - or listen back here.
