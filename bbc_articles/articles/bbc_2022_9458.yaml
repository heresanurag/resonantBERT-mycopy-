title: 'The Open: Rory McIlroy makes strong start at St Andrews Old Course - BBC Sport'
date: '2022-07-15'
section: General
url: http://www.bbc.co.uk/sport/golf/62163731
content: |-
  The early starters took advantage of benign conditions as the Old Course is left largely defenceless on the opening morning of the 150th Open Championship.

  -8 -6-5 -4 B Brown (Eng*), K Kitayama (US), L Westwood (Eng), B Kennedy (Aus), V Hovland (Nor), S Scheffler (US), D Johnson (US) Selected: -3 -2E P Mickeslon (US), T Fleetwood (Eng), J Thomas (US), C Morikawa (US), S Lowry (Ire)

  Rory McIlroy took advantage of benign conditions as the St Andrews Old Course was left largely defenceless on the opening morning of the 150th Open Championship.

  The pre-tournament favourite shot a six-under-par 66 to finish two behind American first-round pacesetter Cameron Young, who hit a bogey-free 64.

  Australian Cameron Smith, who won the Players Championship in March, is at five under and was joined on that mark by England's Robert Dinwiddie who finished his round with a birdie in near darkness at 22:10 BST.

  English amateur Barclay Brown is keeping good company at four under with Norway's Viktor Hovland and LIV Golf trio Lee Westwood, Dustin Johnson and Talor Gooch.

  World number one Scottie Scheffler was among the later starters and battled strengthening winds and lightning-quick fairways to also reach four under par.

  Two more LIV rebels, American Bryson DeChambeau and England's Ian Poulter, are a shot further back with 2016 Masters winner Danny Willett.

  Three-time winner Tiger Woods slumped to a six-over 78, while England's US Open champion Matt Fitzpatrick signed for a 72 after crawling round the Old Course together in six hours nine minutes.

  The pace of play is notoriously slow because of how compact the course is and players criss-crossing each other, or waiting for greens to clear on driveable par-four holes.
