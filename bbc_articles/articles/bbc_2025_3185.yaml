title: Angie Stone, veteran R&B singer-songwriter, dead in car crash - BBC News
date: '2025-03-01'
section: US & Canada
url: http://www.bbc.co.uk/news/articles/c1d4r2nk4yyo
content: |-
  The Wish I Didn't Miss You singer was involved in a collision in Alabama following a performance.

  Grammy-nominated R&B artist Angie Stone has died after a car crash, aged 63, her daughter says. "My mommy is gone," her daughter, Diamond Stone, wrote in a Facebook post. Stone was fatally injured when a van she was travelling in overturned in Alabama early on Saturday following a performance, according to media reports. The artist, who was behind songs like No More Rain (In This Cloud) and Wish I Didn't Miss You, was nominated for three Grammys over her career. She started out in the 1970s as a member of the female hip-hop trio The Sequence.

  The group's most popular song, Funk You Up, peaked at 15 on Billboard's Hot Soul Singles. Her daughter, who is also a musician and goes by the nickname Ladi Diamond, said on Facebook that she was "numb". Hours earlier, she had asked for prayers for her family and said she was on the road. A spokesperson for the artist told the BBC that her family had travelled to Montgomery, Alabama, and planned to release more information soon. Guy Todd Williams, known as Rahiem in the hip-hop group Grandmaster Flash and the Furious Five, said about nine other passengers were in a van with Stone at the time of the crash. "She left her indelible mark on the music industry initially as a member of the legendary rap group Sequence," Williams said. He said she was the sole fatality in the crash. The BBC has contacted police in Montgomery for details. Along with her music career, Stone also had some success in film. She made her movie debut with a role in The Hot Chick, a 2002 hit starring Rob Schneider, Rachel McAdams and Anna Faris. She also starred in The Fighting Temptations in 2003 with Cuba Gooding Jr and Beyonce.
