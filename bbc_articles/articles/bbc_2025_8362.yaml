content: |-
  Foreign Minister Abbas Araghchi says Iran will "never accept coercion" ahead of Saturday's talks in Oman.

  Iran says it is ready for nuclear deal if US stops military threats

  A mural on the wall of the former US embassy in Tehran depicts the Iranian government's view of negotiations with the US

  Iran is ready to engage with the US at talks on Saturday over its nuclear programme "with a view to seal a deal", its Foreign Minister Abbas Araghchi has said. But US President Donald Trump must first agree there can be no "military option", Araghchi said, and added that Iran would "never accept coercion". He also insisted the negotiations in Oman would be indirect, contradicting Trump's surprise announcement on Monday that they would be "direct talks". Trump, who pulled the US out of a 2015 nuclear deal between Iran and world powers during his first term, warned that Iran would be in "great danger" if talks were not successful.

  The US and Iran have no diplomatic ties, so last month Trump sent a letter to Iran's supreme leader via the United Arab Emirates. It said he wanted a deal to prevent Iran from acquiring nuclear weapons and to avert possible military strikes by the US and Israel. Trump disclosed the upcoming talks during a visit to the White House on Monday by Israeli Prime Minister Benjamin Netanyahu, who said on Tuesday that both leaders had agreed "Iran will not have nuclear weapons" and added "the military option" would happen if talks dragged on. Iran insists its nuclear activities are entirely peaceful and it will never seek to develop or acquire nuclear weapons. However, Iran has increasingly breached restrictions imposed by the existing nuclear deal, in retaliation for crippling US sanctions reinstated seven years ago, and has stockpiled enough highly-enriched uranium to make several bombs.

