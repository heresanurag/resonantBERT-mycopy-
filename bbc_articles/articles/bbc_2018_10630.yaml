  The US actress also thanked their "incredible surrogate mother" and said she feels "so blessed that we live in a world which makes this possible".

  Williams and Field are already parents to Teddy, six and Charlton, four.

  Field ended her Instagram post by saying: "As with Teddy and Charlie, we ask that you respect Coco's privacy and allow us to grow into our new team of 5! #TeamWilliams"

  In 2014, when Charlton was born, the former Take That singer documented every stage of Ayda's labour by posting videos and pictures of the birth on Twitter.

  His commentary included him singing Let It Go from Disney's Frozen and dancing next to his wife as she lay in the hospital bed.

  The couple haven't given any further details about why they used a surrogate for their third child.

