  Meanwhile, Williams has also spoken about the fact he will miss some of The X Factor's live shows because some episodes clash with his tour.

  "I'm gutted that I've got to go. Genuinely, genuinely gutted," he said, adding that the tour was booked before he signed up for The X Factor.

  "I'm going to go off and do a few gigs in South America," he told ITV's Lorraine.

  "I'm looking forward to going down there... But if I'd have known [about X Factor] it wouldn't be happening... I'm going to miss the show."

