  • None Go straight to all the best Southampton content Sorry Saints sink into second tier Ruben Selles - 'Southampton will bounce with or without me' Prime Minister Rishi Sunak, a Saints supporter, was among those in attendance on Saturday but the clumps of empty seats before kick-off at St Mary's suggested many fans had already conceded the game was up. Their fears were proven right and those vacant chairs numbered thousands at the final whistle, with some of the few who stayed behind voicing their displeasure at interim boss Ruben Selles and his players. Southampton have collected just three points from the past 33 available, slipping into freefall just as a number of their relegation rivals had begun to produce important and, in some cases, unexpected results. Much of the damage was done long before that run, however - Southampton slipped into the relegation places on 6 November after a 4-1 home loss to Newcastle and have remained there ever since. Prime Minister Rishi Sunak was among the Southampton fans in attendance for the game against Fulham They sacked Ralph Hasenhuttl a day after that drubbing but the subsequent ill-fated appointment of Nathan Jones as his successor yielded worse results than the Austrian had overseen. The former Luton boss lost seven of his eight league games in charge - the only glimmer of light a 2-1 win at Frank Lampard's then equally hapless Everton. Jones, quickly on thin ice with supporters following home defeats by Brighton and relegation rivals Nottingham Forest, was dismissed after a 2-1 loss to 10-man fellow strugglers Wolves on 11 February. By that time, Saints had hit rock-bottom, sinking to 20th after the Boxing Day defeat by Brighton and staying rooted to the table virtually ever since. Two wins in Selles' first three games in charge - both 1-0 victories, at Stamford Bridge against misfiring Chelsea and at home to fellow drop candidates Leicester - provided a glimmer of hope. But key losses to West Ham, Bournemouth and Nottingham Forest, as well as letting a 3-1 lead after 88 minutes slip to draw 3-3 at then leaders Arsenal, put paid to any hopes of a great escape. Southampton have spent more than three times as long at the foot of the Premier League in 2022-23 as any other club Southampton's previous absence from the Premier League, after relegation in 2005, lasted seven years and included a two-season dip into League One - both things they will hope to avoid this time. They will almost certainly have to rebound without inspirational skipper James Ward-Prowse, who will have suitors aplenty - although it is a damning indictment on their season and, perhaps, summer recruitment, that it is difficult to pick out too many other obvious saleable assets. Saints could take inspiration from Fulham, twice relegated from the top flight in the past four years but showing signs they can shed that yo-yo tag under Marco Silva. This win lifted last season's Championship title-winners to ninth and all but assured the Cottagers a top-half finish, a deserved reward for the entertaining and attacking brand of football they have produced. While Southampton were enduring a club-record 24th league loss of the season and failing to improve on their all-time low home haul of 10 points, from 54 available so far, Fulham were setting happier milestones. This was their 15th Premier League win of the campaign - a record high for the club, as was a seventh top-flight away victory, and they also equalled their highest goal tally of 52 from 2003-04 and 2004-05.
