title: Aftermath of Paris 'Islamic State' attack - BBC News
date: '2018-05-13'
section: General
url: http://www.bbc.co.uk/news/world-europe-44097443
content: |-
  A man kills a passer-by before being shot dead by police in an attack claimed by Islamic State

  Police rushed to the Opéra area of central Paris where a man killed a passer-by on Saturday night.

  The attacker - who so-called Islamic State claimed as one of its "soldiers" - was shot dead by officers.
