title: 'Eden Hazard: Chelsea midfielder to have surgery on broken ankle - BBC Sport'
date: '2017-06-05'
section: General
url: http://www.bbc.co.uk/sport/football/40155011
content: |-
  Last updated on .From the section Football

  Chelsea winger Eden Hazard will have surgery after breaking his right ankle on Sunday while on international duty with Belgium.

  It is understood the 26-year-old is now back in Chelsea's care.

  Hazard will miss Belgium's friendly on Monday against the Czech Republic and their World Cup qualifier against Estonia on 9 June.

  The extent of Hazard's injury has not been revealed but it has been reported he will miss the start of next season.

  The Belgian Football Association had confirmed on Twitter that the playmaker twisted his ankle and subsequent scans revealed a fracture.

  Hazard was instrumental as Chelsea won the Premier League last season, scoring 16 goals in 36 games.

  He still has three years to run on his contract at Stamford Bridge but has been linked with a move to Real Madrid.
