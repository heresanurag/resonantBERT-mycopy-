title: Explaining the US measles outbreak - BBC News
date: '2019-03-27'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-47727287
content: |-
  According to officials there are 314 cases of measles currently reported in the US.

  A county in New York state has declared a state of emergency following a severe outbreak of measles, but what's behind the rise in the number of cases?

  The announcement in Rockland County follows other outbreaks of the disease in Washington, California, Texas and Illinois.

  Vaccination rates have dropped steadily in the US with many parents objecting for philosophical or religious reasons, or because they believe discredited information that vaccines cause autism in children.

  According to the Centres for Disease Control and Prevention, there are 314 cases of measles currently reported in the US.

  BBC Health correspondent Smitha Mundasad looks the reasons behind the increase.
