title: 'Chris Mason: Boris Johnson''s authority is draining away - BBC News'
date: '2022-07-06'
section: UK Politics
url: http://www.bbc.co.uk/news/uk-politics-62068584
content: |-
  Westminster is a postcode defined by power and tonight it is shifting, the BBC's political editor says.

  And then there are days like today.

  Sitting in the Press Gallery in the House of Commons, watching Prime Minister's Questions, you could feel and hear Boris Johnson's authority draining away.

  I was watching the faces and demeanour of Conservative MPs during the session.

  Tribalism is measurable in decibels in Westminster, but today the Conservative benches sat in near silence.

  The noise came from the opposition benches, in what was Boris Johnson's toughest PMQs since the general election. And it was still only lunchtime.

  By early afternoon, the letters of resignation and no confidence were tumbling in, and even Mr Johnson's most loyal supporters privately - and often bluntly and colourfully - acknowledged the game was up, it was over.

  "Yes I fear so. It's hours and days," came the reply.

  Then, one after another, cabinet ministers texted me saying they were heading to see the prime minister this evening to tell him explicitly he had to go.

  Westminster is a postcode defined by power. And tonight it is shifting.
