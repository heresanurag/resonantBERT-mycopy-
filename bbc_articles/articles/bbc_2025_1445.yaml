title: 'Thornton Heath: Janice Nix accused of killing Andrea Bernard - BBC News'
date: '2025-02-19'
section: London
url: http://www.bbc.co.uk/news/articles/cy05r8dw2z7o
content: |-
  Five-year-old Andrea Bernard went to hospital after she was assaulted in Thornton Heath, in 1978.

  A 66-year-old woman has been charged with manslaughter over the death of a young girl in south London in 1978.

  Janice Nix is accused of killing five-year-old Andrea Bernard, who was assaulted in Thornton Heath on 6 June 1978, the Metropolitan Police said.

  Andrea, who police say was known to Ms Nix, died from her injuries in a specialist burns unit on 13 July of that year. The Met said a report was made in September 2022 and an investigation was launched.

  Ms Nix, from Clapham, has also been charged with child cruelty in relation to alleged offences involving another child, who was aged eight at the time. The 66-year-old is due to appear at Uxbridge Magistrates' Court on Wednesday.
