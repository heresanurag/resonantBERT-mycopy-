id: bbc_2022_12055
title: President Biden references Queen in 9/11 remembrance speech - BBC News
date: '2022-09-11'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-62870071
content: |-
  The president pays tribute to the thousands of people who died 21 years after the attacks on US soil.

  President Biden has paid tribute to those who lost their lives on the 21st anniversary of the September 11 attacks on US soil.

  In his speech, Mr Biden referenced a message sent from the late Queen Elizabeth II at the time.
