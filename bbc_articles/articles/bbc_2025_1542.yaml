title: 'Newspaper headlines: ''New doubt over Letby guilt'' and ''crackdown on AI
  child abuse'' - BBC News'
date: '2025-02-02'
section: The Papers
url: http://www.bbc.co.uk/news/articles/c87dre3840qo
content: |-
  Fresh concerns raised in the Lucy Letby case and government plans to stop AI child abuse are on the front of Sunday's papers.

  'New doubt over Letby guilt' and 'crackdown on AI child abuse'

  The Sunday Telegraph, external says the government is watering down laws which were introduced by the Conservatives to prevent migrants arriving in small boats obtaining citizenship. It says the small print of a border security bill published last week shows the measures are being repealed, along with a rule that anyone refusing to submit to scientific age checks will be classed as an adult. Government sources argued the Tories had made "such a mess" of introducing the powers, that they were never used. The paper's editorial says scrapping them is a "retrograde step". The Shadow Home Secretary, Chris Philp, calls the action a total capitulation to people smugglers. With Sir Keir Starmer preparing for a summit with EU leaders this week, several papers consider whether he should face towards Brussels or Washington. The Sun on Sunday, external wants the UK to be "straining every sinew to strike a trade deal with a booming US" instead of "cosying up with the floundering EU". The Telegraph says if the Prime Minister can capitalise on Donald Trump's affection for this country, and use the freedom for manoeuvre provided by Brexit to strike a US trade deal, "we may even emerge ahead".

  Lucy Letby killed babies while working in the Countess of Chester Hospital's neonatal unit

  The Mail on Sunday, external says police notes on the Lucy Letby case have raised new doubt about her guilt. The nurse was jailed for murdering seven babies, and trying to murder seven more. But The Mail on Sunday says the previously undisclosed documents raise "serious questions" about whether the jury was misled, because they say she was off duty for a third of the deaths. The Sunday Times, external has spoken to an expert who believes his research was "misused" to convict her and will this week publicly challenge how his work was presented. It says Dr Shoo Lee is preparing to make "a significant intervention" in her case, by presenting a new review of all the deaths on behalf of Letby's legal team. The Observer, external says Rachel Reeves is facing criticism after it was confirmed that a report she cited as support for a third runway at Heathrow was commissioned by the airport. During her speech in Oxford about growth, the Chancellor quoted the report by Frontier Economics as saying the project could increase potential GDP. The firm says its work was entirely independent and unbiased. The Sunday Times, external reveals that Kensington Palace will no longer release details of the outfits worn by the Princess of Wales, when she carries out engagements. A source tells the paper Catherine wants to focus on issues, rather than style. The Mail on Sunday says the news will inevitably cause "dismay", and asks "isn't there room for both?" But the former editor of Vogue, Alexandra Shulman, weighs in on the Princesses' side in the paper, saying "the royals are not paid to be mannequins". Catherine has today issued a call for society to prioritise social and emotional skills for children. The Sunday Mirror seizes on that, calling her "a breath of fresh air in an increasingly unkind world".

