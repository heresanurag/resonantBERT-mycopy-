title: 'Primary league tables: How did your school do? - BBC News'
date: '2019-12-13'
section: Family & Education
url: http://www.bbc.co.uk/news/education-50749093
content: "The league tables aim to hold primary schools to account\n\nNew primary\
  \ school league table data for England has been published by the Department for\
  \ Education.\n\nThe tables are based on how 11-year-olds in each school performed\
  \ in national curriculum tests - or Sats - taken at the end of primary school.\n\
  \nThey provide a snapshot of how well each school is performing and tracks pupils'\
  \ progress.\n\nThe aim is to hold schools to account and to give parents a way of\
  \ comparing schools in their areas.\n\nSorry, your browser does not support this\
  \ tool. \n\n Please visit the Department for Education. Compare schools in your\
  \ area on the Department for Education website by entering your postcode or council\
  \ in the box below The BBC uses the postcode you enter here to create a web link\
  \ to the Department for Education website. The BBC is the data controller of the\
  \ data you enter here. Please be aware that when you leave the BBC website you will\
  \ be subject to the Department for Education’s privacy policy. If you have any questions\
  \ about how the BBC process data, please read our Privacy and Cookies Policy. Department\
  \ for Education website\n\nThis year was the fourth time children sat the government's\
  \ tougher tests, introduced in 2016.\n\nData published by the government in September\
  \ showed 65% of pupils met the expected standard across all tests: reading, writing\
  \ and mathematics - up from 64% last year.\n\nThe statistics also show the gap between\
  \ girls and boys has widened, with girls continuing to outperform boys across all\
  \ subjects at the expected standard.\n\nIn 2019, 70% of girls reached the expected\
  \ standard in reading, writing and maths, compared with 60% of boys - a gender gap\
  \ of 10 percentage points, up from eight in 2018.\n\nThis video can not be played\
  \ To play this video you need to enable JavaScript in your browser.\n\nThe information,\
  \ which was published by the Department for Education at 09:30 GMT on Friday, takes\
  \ those results down to the school level.\n\nReaders can check how schools in their\
  \ area have performed through the BBC News postcode search tool."
