  Sheila Keen-Warren pleaded guilty to murdering her husband's first wife while wearing a clown costume.

  US woman in 1990 'killer clown' case released from prison

  A women who pleaded guilty in the 1990 murder of her husband's previous wife in Florida has been released from prison. Sheila Keen-Warren, 61, spent 18 months in prison over her involvement in the infamous "killer clown" case. Last year, Keen-Warren agreed to plead guilty to second degree murder charges. Authorities said she shot Marlene Warren while dressed up in a clown costume more than 30 years ago. After years of mystery and intrigue surrounding the killing, investigators tied Keen-Warren to the case and arrested her in 2017, though she maintains her innocence.

  Keen-Warren was sentenced to 12 years in prison in 2023. Her release was not unexpected - Florida law offered her credit towards an early release for good behaviour. "Sheila Keen-Warren will always be an admitted convicted murderer and will wear that stain for every day for the rest of her life," Palm Beach County State Attorney Dave Aronberg said in a statement Saturday to the Associated Press. Keen-Warren took the plea deal because she would be released quickly and might otherwise have faced a life sentence if the case went to trial, Greg Rosenfeld, Kenn-Warren's lawyer, told the Associated Press. "We are absolutely thrilled that Ms. Keen-Warren has been released from prison and is returning to her family," Mr Rosenfeld told the news outlet. "As we've stated from the beginning, she did not commit this crime." The son of the victim, Joseph Ahrens, told authorities the doorbell rang at their family home and his mother answered the door to a person dressed as a clown. The person handed her some balloons and then shot her in the face. Authorities said that Keen-Warren was having an affair with the victim's husband but it wasn't until DNA testing improved that investigators connected Keen-Warren to the crime.
