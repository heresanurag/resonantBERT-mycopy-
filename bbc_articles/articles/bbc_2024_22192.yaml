title: Oldham man, 87, bundled into car and dumped 15 miles from home - BBC News
date: '2024-09-17'
section: Manchester
url: http://www.bbc.co.uk/news/articles/cg566l3n267o
content: |-
  Police say he was dumped 15 miles from home, suffering serious injuries in the "terrifying ordeal".

  Man, 87, bundled into car and dumped 15 miles away

  Police believe the man was pushed out of the car near the Turnpike pub

  An 87-year-old man was attacked and dragged into a car by two men, before being driven away and dumped 15 miles from his home, police have said. Greater Manchester Police (GMP) said the man was walking home from Oldham Central Mosque between 20:00 and 21:30 BST on Sunday when he was "forced" into a car. The force said he was believed to have been blindfolded in the car and "threatened repeatedly, while being attacked and having his clothing ripped". Det Insp Emma Hulston said the seriously injured man was later pushed out of the car in Rishworth, West Yorkshire, and left with "torn clothes in the middle of a dark road in unfamiliar surroundings, and with no means of communication".

  A force representative said a black car pulled up beside the man as he walked away from the mosque and past garages and workshops on Lee Street. They said two men got out and forced him inside the vehicle. They said the man told officers he was threatened and attacked and left to wander for an hour in a location he did not know before he found help at a house on Oldham Road in Rishworth at about 22:40 BST. They added that it was believed he may have been abandoned near the Turnpike pub.

  The man was grabbed as he walked home from Oldham Central Mosque

  GMP said they wanted to speak to two men who were "described as being Asian and potentially Bangladeshi", due to them "speaking the victim's language". They said the men were aged approximately 25 to 30 years old, wearing T-shirts and were "seen drinking alcohol from the bottle". Det Insp Hulston said it was an awful attack on an elderly man who was "simply walking down the street". She said it was a "disturbing act that we are fully investigating". "The victim, who suffered serious injuries during the incident, endured a terrifying ordeal in which he was taken from close to his home, before being left with torn clothes in the middle of a dark road in unfamiliar surroundings - and with no means of communication," she said. "We are fortunate we are not talking about a potentially more serious, or even fatal, outcome."
