title: Eight arrested and building burned during Sunderland unrest - BBC News
date: '2024-08-02'
section: Wear
url: http://www.bbc.co.uk/news/articles/cnl0lkrxgvxo
content: |-
  Three officers were injured after facing "serious and sustained levels of violence", Northumbria Police said.

  Police officers injured and building set on fire in Sunderland unrest

  Police officers faced "serious and sustained levels of violence" after hundreds of people rioted in Sunderland on Friday night. Northumbria Police said three of its officers were injured during the unrest and needed hospital treatment. Eight people have been arrested after a police building was ransacked and a Citizens Advice premises next door to it was set alight. Beer cans and bricks were thrown at riot police outside a mosque and cars were set on fire during the disorder. It is the latest episode of unrest to break out in towns and cities across England following the killing of three young girls in Southport on Monday.

  Northumbria Police Ch Supt Helena Barron said officers had been met with "serious and sustained" levels of violence, which was "utterly deplorable". She said a full investigation was under way to identify those responsible for any criminal behaviour. "I want to make it absolutely clear that the disorder, violence and damage which has occurred will not be tolerated," Ch Supt Barron added. Of the three injured police officers, one has been discharged and two remain in hospital for further treatment, she said.

  This video can not be played To play this video you need to enable JavaScript in your browser. Watch: BBC reports from Sunderland as rioters cause chaos

  Some members of the crowd could be heard shouting Islamophobic slurs and chanting in support of far-right activist Tommy Robsinson, founder of the now disbanded English Defence League (EDL). Mr Yaxley-Lennon's X account has promoted false claims that the alleged Southport attacker had been an asylum seeker who recently arrived in the UK by boat. Lewis Atkinson, Labour MP for Sunderland Central, said: "Last night one of the flags on the street bore the reference to the North East Infidels, which is a Nazi offshoot from the North East chapter of what was the EDL." Mounted police were deployed to Sunderland's city centre to push back demonstrators, some of whom were in masks. Officers also had beer barrels thrown at them, as young men shouted: "Whose streets? Our streets". Home Secretary Yvette Cooper said criminals attacking the police would "pay the price for their violence and thuggery".

  Tyne and Wear Fire and Rescue Service confirmed it had been called out to the fire near the Sunderland Central Police office. Rail and bus services were halted with Tyne and Wear Metro operator Nexus saying it had been asked by British Transport Police to close Sunderland Rail Station at around 22:15 BST. The Omniplex cinema in the city was also forced to close during the evening in the interest of public and staff safety, it said. Residents said they could still hear police helicopters in the sky past midnight.

  Mayor of the North East Kim McGuinness said rioters have caused "significant damage" to the city. "They've set fire to a police station, to cars, they've looted shops, they've abused people in the street, they've attacked police officers and Sunderland will be feeling the effect of that," she told BBC Breakfast. "These people do need to be dealt with, with the full force of the law - you cannot use other people's grief to commit crime and violence".

  Sunderland AFC posted on social media: "Tonight’s shameful scenes do not represent our culture, our history, or our people. "Our great city is built on togetherness and acceptance, and Sunderland will forever be for all. We are stronger as one community." Sunderland Central MP Lewis Atkinson said the police had his full support in response to the criminal "thuggery".

  A crowd of about 200 anti-racist protesters also gathered outside the Abdullah Quilliam Mosque in Liverpool on Friday night after rumours of a far-right protest there. The group chanted: "Say it loud, say it clear, refugees are welcome here". Director of Public Prosecutions Stephen Parkinson said extra prosecutors had been called into work this weekend to deal with the disorder. "We have deployed dozens of extra prosecutors who are working round the clock this weekend, supporting the police, and ready to make immediate charging decisions so that justice is swiftly delivered," he said.

  Towns and cities including London, Hartlepool, Manchester, and Aldershot have seen protests descend into violence following the Southport knife attack. In response, Prime Minister Sir Keir Starmer announced a new national violent disorder programme to help clamp down on violent groups by allowing police forces to share intelligence. In a televised speech on Thursday, Sir Keir said: "These thugs are mobile, they move from community to community, and we must have a police response that can do the same." He also condemned "violent disorder, clearly whipped up online". "We will take all necessary action to keep our streets safe", the PM said. The BBC has identified at least 30 demonstrations being planned by far-right activists around the UK over the weekend, including a new protest in Southport.

