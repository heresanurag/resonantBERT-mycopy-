title: 'Leandro Trossard: Arsenal midfielder''s red card against Manchester City was
  correct, says KMI panel - BBC Sport'
date: '2024-09-25'
section: Premier League
url: http://www.bbc.co.uk/sport/football/articles/czxg0gxdwwdo
content: |-
  Referee Michael Oliver was right to send off Leandro Trossard in Arsenal's dramatic 2-2 draw at Manchester City, says the Key Match Incidents panel.

  Leandro Trossard was sent off against Manchester City for delaying the restart

  Referee Michael Oliver was right to send off Leandro Trossard in Arsenal's dramatic 2-2 draw at Manchester City, the Key Match Incidents panel has said. The midfielder was dismissed in first-half injury time after kicking the ball away following a foul on Bernardo Silva on Sunday. It was the second time the Gunners have had a player dismissed for delaying the restart after Declan Rice was sent off in the 1-1 draw against Brighton this month. The panel, which reviews all key refereeing decisions in the Premier League each week, wrote: "Trossard clearly delays the restart by kicking the ball away." It was not unanimous though, and one panellist thought the "split-second nature of the kick away was enough of a mitigating factor". Arsenal were 2-1 ahead at Etihad Stadium at the time, but John Stones rescued a point for City in the 98th minute of second-half stoppage time to move them back to the top of the Premier League.

