id: bbc_2017_12529
title: Children join people with dementia in interactive light game - BBC News
date: '2017-11-16'
section: General
url: http://www.bbc.co.uk/news/uk-england-essex-42005497
content: |-
  The game sees images projected on to a table that residents and children can interact with.

  School children have been playing a new light game system with people with dementia at a care home in Saffron Walden, Essex.

  It is called the Tovertafel Magic Table and projects images on to a table that people can interact with.
