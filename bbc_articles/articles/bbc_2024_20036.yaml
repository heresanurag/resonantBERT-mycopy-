title: 'Worcester: Car park solar panel plan rockets in price - BBC News'
date: '2024-08-27'
section: Hereford & Worcester
url: http://www.bbc.co.uk/news/articles/cj08n4rv26no
content: |-
  It means the proposal designed to save a council money could be put on ice.

  The panels were to be installed on the top of St Martin's Gate car park

  Plans for solar panels to be added to the roof of a car park may go on hold after the project was estimated to cost £140,000 more than expected. Worcester City Council said installing panels on the roof of its St Martin's Gate car park on City Walls Road would generate enough electricity to power lifts, lights and electric vehicle charging points at the site. But a report going before the authority estimated the cost of the project had jumped from £463,250 to £604,365. The council is expected to meet on 3 September with a view to putting the plans on ice.

  Members of the council’s Policy and Resources Committee had backed the project in October, with a planning application submitted this summer. It was suggested by the council that the project could cut bills by up to £58,000 every year and increase the amount of energy produced by nearly 450%. But a new report said: “Despite factoring in the increased electricity tariff now paid by the council... the net return on investment is 0.5%. “Committee approved the outline business case in October 2023 on the basis of a net return of 2.5%.” Council officers have considered closing the top floor of the car park to avoid building panels on steel frames and reducing the cost of the installation. The original plan meant 38 spaces would be lost from the 700-space car park.

  This news was gathered by the Local Democracy Reporting Service which covers councils and other public service organisations.
