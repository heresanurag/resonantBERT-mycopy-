title: Sara Sharif suffered daily living hell, court hears - BBC News
date: '2024-11-21'
section: Surrey
url: http://www.bbc.co.uk/news/articles/ced949z9j0lo
content: |-
  Sara's death happened amid a "culture of violence" that was "normalised" at home, a court hears.

  Sara Sharif's body was found at her home in Woking on 10 August last year

  Sara Sharif suffered a “daily living hell” and died from the cumulative effects of violence during many months, the Old Bailey heard. Prosecutor Bill Emlyn Jones KC told the court all three defendants were responsible for the 10-year-old's death, which happened amid a "culture of violence" which was "normalised" in the family household. Sara’s father Urfan Sharif, 42, stepmother Beinash Batool, 30, and uncle Faisal Malik, 29, have denied murder and causing or allowing her death at their family home in Woking, Surrey, in August 2023. The court previously heard that Sara's body was found with dozens of injuries, and that she had been hooded, burned and beaten during more than two years of abuse.

  In a closing speech, Mr Emlyn Jones KC said that despite Ms Batool and Mr Malik’s decision not to give evidence, it was a “formidably strong case” against them by “the fact they lived with Sara as she was gradually being beaten to death”. He said it was “inconceivable” that one of the defendants could have done it without the complicity and encouragement of the others. None of Sara's injuries were reported or shown to a doctor, and steps were taken to hide the abuse, he added.

  Urfan Sharif, Beinash Batool and Faisal Malik are each facing two charges relating to the death of Sara Sharif

  Mr Emlyn Jones KC said: “If you know it is happening you do something to prevent it. "None of them did because they were, and are, all responsible for her death and they all are guilty of her murder.” He said jurors would have to be sure that when Mr Sharif, by his own admission, beat Sara, he meant to cause her “at least serious harm”. In the case of Ms Batool and Mr Malik, he said they would have to consider if they played a part by their own acts of violence or by “assisting or encouraging” others.

  A post-mortem examination found Sara had suffered injuries including "probable human bite marks", an iron burn and scalding from hot water before she died on 8 August 2023. Mr Emlyn Jones KC previously said a bloodstained cricket bat, a rolling pin with Sara’s DNA on it, a metal pole, a belt and rope were found near the family’s outhouse. Under cross-examination, Mr Sharif previously accepted “full responsibility” for Sara's death, but later denied intending to kill her. He admitted beating Sara, but denied biting or burning her. The court previously heard Mr Sharif, Ms Batool and Mr Malik travelled to Islamabad, Pakistan, on 9 August 2023, the day before her body was found. The defendants have also denied an alternative charge of manslaughter.

