title: 'Watch: Left alliance supporters react as vote projection revealed - BBC News'
date: '2024-07-08'
section: General
url: http://www.bbc.co.uk/news/videos/cg3enqwdz74o
content: |-
  Preliminary results showed France's left-wing alliance, New Popular Front, led the polls.

  Supporters of the France Unbowed (LFI) party burst into cheers when preliminary results showed France's left-wing alliance, New Popular Front, led the polls.

  France now looks set for a hung parliament.
