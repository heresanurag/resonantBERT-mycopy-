  The head of the US central bank, Jerome Powell, offered assurances in a speech last week, noting that sentiment had not been a good indicator of behaviour in recent years. "Despite elevated levels of uncertainty, the US economy continues to be in a good place," he said. But the US economy is currently deeply linked to the rest of the world, warned Kathleen Brooks, research director at XTB. "The fact that tariffs could disrupt that at the same time that there were signs that the US economy was weakening anyway ... is really fuelling recession fears," she says.

  The unease in the stock market isn't all about Trump. Investors were already jittery about the possibility of a correction, after big gains over the last two years, driven by the sharp run-up in tech stocks fuelled by investor optimism about artificial intelligence (AI). Chipmaker Nvidia, for example, saw its share price jump from less than $15 at the start of 2023 to nearly $150 in November of last year. That type of rise had stirred debate about an "AI bubble" - with investors on high alert for signs of it bursting, which would have a big impact on the stock market, regardless of the dynamics in the wider economy. Now, with views of the US economy darkening, optimism about AI is getting even harder to sustain. Tech analyst Gene Munster of Deepwater Asset Management wrote on social media this week that his optimism had "taken a step back" as the chance of a recession increased "measurably" over the past month. "The bottom line is that if we enter a recession, it will be extremely difficult for the AI trade to continue," he said.
