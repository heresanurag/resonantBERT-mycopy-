  It has been a great week for Barry Ferguson, too. Having been in the managerial wilderness after unimpressive stints at Clyde, Kelty Hearts and Alloa Athletic, he has guided Rangers past Fenerbahce into a Europa League quarter-final and a first win at Celtic Park since October 2020. He is the first Rangers manager to win his opening derby at Celtic Park since Walter Smith in 1991. It still feels early for Rangers to be making decisions on who will be their next permanent manager, particularly with a potential takeover looming. However, Ferguson made the bold call to change the formation to a back three for the first leg in Turkey, and it has paid off in the last week. Away from the pitch, he has cut a calm figure in front of the camera and has been clear in his messaging. While his predecessor Philippe Clement often pointed to a congested schedule and managing minutes, the former Ibrox captain named 10 of the same 11 which started the energy-sapping midweek triumph and was clear tiredness was no excuse.

  'Make no mistake, Ferguson wants this job long term'

  There is so much more to managing Rangers or Celtic than understanding the nature of football in Glasgow, but it counts for something in this unique rivalry. "I knew there was a good team here," Ferguson told BBC Scotland. "They were just missing a bit of self-belief, and had to be driven on a bit more. "The boys listen, they tune in, and over the past 10 days you've certainly seen the benefits of that." Ferguson continues to insist come the end of the season he will be "away on a family holiday" and is "not even thinking" about staying on beyond his interim contract. But it will not stop others considering it, particularly if he gets more consistency from this squad. "It's a huge win for Barry and his staff," Arfield said. "He's making a big challenge to get the job [full-time]. He's got Rangers to the quarter-finals of the Europa League and now won at Celtic Park. "You need to know what you're doing to outsmart this Celtic team and it's been evident today."

