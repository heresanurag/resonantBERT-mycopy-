title: 'Celtic 2-3 Rangers: Raskin leads way as Ferguson stakes claim - BBC Sport'
date: '2025-03-16'
section: Rangers
url: http://www.bbc.co.uk/sport/football/articles/cr7219zpz18o
content: |-
  Nicolas Raskin leads the way with a peerless midfielder display as Barry Ferguson enhances his credentials to be a longer-term Rangers manager.

  As the Rangers players celebrated in the corner after their first win at Celtic Park for nearly five years, the camera zoomed in on Nicolas Raskin. The midfielder pointed to match-winner Hamza Igamane and mouthed the Moroccan's name after his stunning strike clinched a second Old Firm win in a row. But the foundations of this victory were built on Raskin's performance. Not only did he score the first goal and set up the second, but his all action-display allowed Rangers to throttle Celtic and best them on their own patch. It was no wonder he was named player of the match. "It was amazing to make the stadium a bit calmer, but I'm just happy for the win," the Belgian said afterwards. "The gaffer just wanted us to go aggressive and put the pressure [on]. The team has done very well, we were quite high up the pitch and got the two goals."

  By half-time Rangers were 2-0 up and in control, with Raskin having a huge hand in their success. After four minutes his desire to get across the front post and above Jeffrey Schlupp - despite his diminutive stature - from a corner and glance the ball into the net gave Rangers the perfect start. Then his brilliant, clever run from deep and cushioned header teed up Mohamed Diomande to sweep home the visitors' second. Off the ball, he was everywhere. With Luke McCowan replacing injured Celtic captain Callum McGregor in midfield, Raskin smelled a weakness. Any time Celtic tried to build up from the back he was right on McCowan's back, snapping at his heels and preventing him from getting turned and playing forward. When Celtic did manage to get the ball out to winger Nicolas Kuhn, Raskin joined with his defenders to shut the space down immediately. He ended the game having been in 16 duels, winning 10 of them, and getting the ball back for Rangers six times. All of those were the most of any of his team-mates, as was his ranking for tackles made. Only James Tavernier touched the ball more often for Rangers as well.

  Nicolas Raskin's heat map shows he was constantly across to help shut down Nicolas Kuhn on Celtic's right-hand side

  "Rangers are winning the midfield battle," former Rangers striker Steven Thompson said at half-time on BBC Scotland's Sportsound programme. "You talk about McCowan, [Arne] Engels and [Reo] Hatate, they are not getting on the ball at all and whenever any one of them does, they are put under massive pressure from [Connor] Barron, Raskin and [Mohamed] Diomande." That pressure unsettled Celtic and forced them to give the ball away in dangerous areas, which Rangers ought to have taken advantage of further before the break.

  And Raskin's touch map shows how he appeared all over on the pitch to influence the game

  In the second half, Celtic's undoubted quality - and perhaps Rangers' exertions from Thursday's penalty shootout win against Fenerbahce - started to take their toll as the league leaders roared back to 2-2. However, with Celtic Park rocking and the momentum with the home side after Hatate's equaliser, Rangers' discipline kept them from being opened up regularly as they had done on their last five losing visits to their bitter rivals' stadiums. "The box in the middle of the pitch was so pivotal," former Rangers midfielder Scott Arfield said on Sky Sports. "Nico Raskin is so important but don't underestimate the work Connor Barron does beside him. "Nico walked away with the man of the match award and rightly so because he was fantastic. The workload those two got through is so important for this team." A call up for the Belgium national side, a match-winning contribution in a derby win, and progression in the Europa League - it has been a special week for Raskin.

