  Confused by Brexit jargon? Reality Check unpacks the basics.

  There's been a lot of talk about free trade in the Brexit debate, but what exactly is a free trade agreement and how does it differ from what the UK has had with the EU? Reality Check's Chris Morris unpacks the terminology.
