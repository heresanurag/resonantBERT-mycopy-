title: Boy killed himself after mistakenly shooting his friend - BBC News
date: '2024-06-28'
section: Birmingham & Black Country
url: http://www.bbc.co.uk/news/articles/clmyng12gmpo
content: |-
  Jaydon Beckford was found dead by the side of a canal, five days after shooting his friend.

  A boy who was found dead by a canal in Birmingham, shot himself after mistakenly killing his friend, an inquest has heard. Jaydon Beckford, 17, was found in wasteland off a canal towpath near Lighthorne Avenue, in Ladywood, on 10 November. It is believed that Jaydon inadvertently shot his friend Diego Henry five days prior in the flat Jaydon shared with his mother. Diego, 16, died later in hospital. On Thursday, Jaydon's aunt Nadine Beckford told Birmingham Coroner's Court that her nephew was "an amazing person".

  Describing the day Jaydon was found, she said: "We all died that day." Diego Henry and Jaydon Beckford were good friends, the inquest heard, and it was said there was no animosity between them. On 5 November, the pair had been with another friend at Jaydon's home in Lighthorne Avenue. In a statement read to the inquest, Jaydon's mother Leah Hussain said she heard laughing and chatting before she fell asleep. She was later woken by a bang at about 12:30 GMT, which she initially thought may have been a neighbour setting off a firework until she heard the other friend shout "phone an ambulance". The hearing was told Jaydon was then seen on CCTV running with his hand in his right pocket, towards the city's canal system, away from the city. He was then found dead on the 10 November. While it cannot be confirmed, it is believed the same gun was used. The third friend was bailed over Diego's death and was not arrested in connection to Jaydon's. He also told police what happened to Diego was an accident and he was "not in custody, control or possession of the firearm". The inquest heard how the gun may have been given to Jaydon by "elders" for protection. On Monday, Det Sgt David Newson of West Midlands Police, told the inquest into Diego's death that the "working hypothesis was that it was accidental discharge". Diego died in hospital from a bullet wound to his head.

  It is believed that Diego Henry was accidentally shot by Jaydon Beckford, at his home in Lighthorne Avenue in Ladywood

  At Jaydon's inquest, Coroner James Bennett said it could not be known for sure when the 17-year-old died as it could have been some time between 5 November and 10 November. Recording a verdict of suicide, Mr Bennett said he had to register the date of death as 10 November as that had been the day he was found. During the hearing, Ms Beckford questioned the police's conduct in searching for Jaydon after 5 November, saying the police had been more interested in finding a weapon than Jaydon himself. "That's what hurts," she told the coroner's court. A spokesperson for West Midlands Police said: "We were greatly concerned about Jaydon's safety after the tragic death of Diego, and we made every effort to try to find him and ensure his welfare. "This was a tragic incident resulting in the loss of two young lives, and our thoughts remain with the families and friends of both boys."

  Jaydon's body was found by a canal on 10 November 2023
