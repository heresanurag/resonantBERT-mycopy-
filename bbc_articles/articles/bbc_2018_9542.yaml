  The singer says she and Laura have been friends since they were teenagers and her song My Same, from the album 19, is about her.

  Laura is a poet, author, illustrator and short story writer, and she went to the same school as Adele - the Brit School of Performing Arts in Croydon.

  In her blog post she talks about a "horrific" labour which her doctor believes might have triggered the illness.

  After coming home with her son, Laura describes feeling like "I had pushed out my personality as well as a baby".

  Laura and Adele have been friends since they were teenagers

  She says she had suicidal thoughts.

  "I was begging my sister to let me go, I was begging my mum to let me go.

  "I have never had those thoughts before in my life and no history of mental illness, this completely took me by surprise and threw me against the rocks."

  Laura says that her skin went pale, she couldn't eat or drink and she started getting severe anxiety attacks.

  As things got worse, Laura needed her partner Hugo to send her photos of herself with friends and family to remind her who she was.

  "Even though postnatal depression and the psychosis are both treatable, even when my doctor said I would 100% recover I remember thinking, 'Maybe others do but not me, this is me forever'."

  Laura was hospitalised and spent two weeks away from her son.

  She now describes herself as recovering more and more each day and is "happy, confident and strong" after getting support from family and a psychiatrist, as well as using medication.

  But she also says talking about her psychosis has been a "huge" part of her recovery.

  "I was constantly searching for any stories that offered me hope or salvation in this dark and testing time so that's why I've shared this," she says.

  Vivien Waterfield from the charity Home Start praised Laura for speaking up.

  "It's often very difficult for mums to talk about the difficulties they're having," she said.

  "Anyone in the public eye brave enough to talk about this publicly helps mums realise they are not alone."

  A few years back, Kathryn Grant's postpartum psychosis was used as the inspiration for an EastEnders storyline - when Lacey Turner's character Stacey had the condition.

  She told Newsbeat that she had a horrendous birth and ended up not sleeping for ten nights.

  "I knew I needed to go to A&E because I had a feeling something was about to go terribly wrong.

  "By the time James was taken from me and being cared for by the staff there, I descended into full blown psychosis."

  Kathryn says during her psychotic episode she was seeing things that weren't there and believing things that weren't true.

  "I believed I was being tortured and punished because I had caused an apocalypse and killed most people in the world and the remaining survivors were torturing and trying to cremate me alive," she said.

  "The reality was I was in an ambulance being taken from the psychiatric hospital to a regular hospital to be treated for sepsis."

  For help and support with postpartum psychosis, take a look at the NHS page on the condition.

