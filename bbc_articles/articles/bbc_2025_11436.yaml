title: Race Across The World winners cross the finish line in final leg - BBC News
date: '2025-06-12'
section: Culture
url: http://www.bbc.co.uk/news/articles/ckg4x142p35o
content: |-
  The duo will share a cash prize of £20,000 after racing through China, Nepal and India.

  Warning: This article reveals the winners of Race Across the World.

  Four teams made it to the final of Race Across of the World

  Mother and son Caroline and Tom Bridge have crossed the finish line first to become the winners of the fifth series of Race Across The World. The BBC One show saw five pairs race a distance of about 8,700 miles (14,000km) between the Great Wall of China, north of Bejing, and Kanniyakumari, the southernmost tip of India. Caroline said: "We must never doubt ourselves again, ever, ever, ever." Tom added: "It's a really good feeling. I'm lost for words. I can't believe it: 51 days racing through countries that I never thought I'd go to, and never thought we'd come this far, and never thought we'd achieve so much. And I've never been prouder of my mum."

  The winning duo will share a cash prize of £20,000. Teams had to pass seven checkpoints in China, Nepal and India on their route to the finish line. As usual, all pairs were banned from travelling by air, and instead were given a budget of £1,140 per person for the journey - the cost of a one-way plane ticket. They could not use their smartphones or bank cards while seeking out their own transport, food and accommodation.

