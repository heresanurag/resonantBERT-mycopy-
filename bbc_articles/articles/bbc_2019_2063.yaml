id: bbc_2019_2063
title: 'Londonderry: Two men shot in separate incidents - BBC News'
date: '2019-02-01'
section: Foyle & West
url: http://www.bbc.co.uk/news/uk-northern-ireland-foyle-west-47097135
content: |-
  The Northern Ireland Ambulance Service was called to the scene shortly after 20:00 GMT.

  Two men have been shot in separate incidents in the Ballymagroarty area of Londonderry on Friday evening.

  The Northern Ireland Ambulance Service (NIAS) was called shortly after 20:00 GMT, following reports a man had been shot in the legs and hands.

  While at the scene, a paramedic was made aware of another shooting incident a number of streets away in which a second man was injured.

  Both men have been taken to the Altnagelvin hospital for treatment.

  In a statement the Western Trust said both men were in a stable condition.

