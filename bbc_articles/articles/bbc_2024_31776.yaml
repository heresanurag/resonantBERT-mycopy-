  In a video posted on X by a CBS reporter in Fort Lauderdale, Florida, a gate agent announced a flight to Philadelphia was going to start boarding. "The system is slowly coming back," the agent announced from a gate. In July, American Airlines, among other major operators, grounded flights across the US due to communication issues caused by a global IT crash. That failure - which also affected banks and emergency services - was caused by a faulty software update from cybersecurity firm Crowdstrike.
