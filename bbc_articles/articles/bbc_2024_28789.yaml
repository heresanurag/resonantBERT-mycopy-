title: 'Super League fixtures: Wigan to start 2025 season at home to Leigh - BBC Sport'
date: '2024-11-21'
section: Rugby League
url: http://www.bbc.co.uk/sport/rugby-league/articles/c206ypw649vo
content: |-
  Wigan Warriors are looking to win a third successive Super League Grand Final after beating Hull KR 9-2 in this year's showpiece

  Super League champions Wigan Warriors will start the 2025 season with a home game against Leigh on Thursday, 13 February. Beaten grand finalists Hull KR welcome Castleford the following evening and promoted Wakefield travel to Leeds Rhinos on the Saturday. BBC Sport will show St Helens' home game against Salford later on Saturday afternoon, while Catalans Dragons welcome Hull FC on the Friday night and Warrington Wolves travel to Huddersfield in the weekend's final match on Sunday, 16 February. It was announced earlier this week that Magic Weekend, when all 12 teams play at the same venue over one weekend, will be held at Newcastle United's St James' Park on 3-4 May.

  Wigan, who are looking to win a third successive Super League title, will face Warrington in Las Vegas on 1 March. Easter Weekend, which had traditionally seen teams play twice across the four days until 2022, will feature the first Rivals Round of the season, with those fixtures reversed in round 25 at the back-end of the campaign. The final round of matches will be played between 18 and 21 September and the elimination play-offs will take place the following weekend. The Grand Final will be held at Old Trafford on Saturday, 11 October.

  “We have worked closely with the Super League clubs and our broadcast partners to produce a better spread of matches across each weekend in 2025," Rhodri Jones, managing director of Rugby League Commercial, said. "It means a return to regular Thursday night Super League, with matches spread across the clubs and confirmed for the duration of the season to provide certainty to clubs and fans."
