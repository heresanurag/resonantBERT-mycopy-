  Brazil's all-time leading goalscorer Marta walks off the pitch in tears after being shown a straight red card during their 2-0 defeat by Spain in the Olympic women's football tournament.

  Brazil great Marta goes off in tears after red card

  This video can not be played To play this video you need to enable JavaScript in your browser.

  Brazil's all-time leading goalscorer Marta walked off the pitch in tears after being shown a straight red card during their 2-0 defeat by Spain in the Olympic women's football tournament. Marta, who will retire from international football this year, was sent off for narrowly missing Olga Carmona's head with a dangerous high-footed tackle during the Group C match in Bordeaux. Her hopes of appearing again in the tournament now rest on whether Brazil make it through their quarter-final tie against hosts France, after the Selecao advanced as one of the best third-placed sides. Brazil were level when Marta was sent off just before half-time, with Spain, scoring in the 68th minute and then the 17th minute of second-half injury time - an extension prompted by multiple injury delays - to maintain their 100% record. Marta, 38, won Olympic silver at Athens 2004 and Beijing 2008, losing to the United States on both occasions. She is the all-time leading scorer in World Cups, men's or women's, with 17 goals in 23 appearances across six tournaments.

