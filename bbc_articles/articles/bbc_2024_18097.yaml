  The United States maintained their perfect start to the competition with a 2-1 victory over Australia to top Group B and set up a meeting with Japan in the quarter-finals. Goals either side of half-time by Trinity Rodman and substitute Korbin Albert put Emma Hayes' side firmly in control, although a late Alanna Kennedy effort ensured a nervy finale. The US, who are record four-time gold medallists in the competition will face Japan in a repeat of the final from London 2012, at the Parc des Princes, Paris on Saturday at 14:00 BST. Japan finished second behind Spain in Group C after beating Nigeria 3-1 in Nantes. Reigning Olympic champions Canada also qualified for the knockout stage with a 1-0 win over Colombia, despite losing an appeal for a six-point deduction. France topped Group A with a 2-1 victory over New Zealand.
