title: UK reaffirms Ukraine support on war anniversary - BBC News
date: '2024-02-23'
section: UK
url: http://www.bbc.co.uk/news/uk-68388542
content: |-
  Saturday marks two years since Russian President Vladimir Putin launched his full-scale invasion.

  Rishi Sunak said the UK would do "whatever it takes" for Ukraine to achieve victory

  Political leaders in the UK have reaffirmed their support for Ukraine on the second anniversary of Russia's full-scale invasion.

  Prime Minister Rishi Sunak said Britain was prepared to do "whatever it takes" and pledged almost £250m towards producing artillery shells.

  King Charles praised the strength of Ukrainians, who continue to endure "tremendous hardship".

  It comes a day after the UK announced further sanctions against Russia.

  Mr Sunak, who visited Kyiv last month to sign a new security agreement and announce £2.5bn of military aid to Ukraine over the coming year, said "we must renew our determination" on this "grim anniversary".

  "This is the moment to show that tyranny will never triumph and to say once again that we will stand with Ukraine today and tomorrow," he said.

  "We are prepared to do whatever it takes, for as long as it takes, until they prevail."

  Bolstering the UK government's message of support further, Defence Secretary Grant Shapps insisted that it is "absolutely committed" to supporting Ukraine.

  He emphasised that ammunition is what Ukraine "needs desperately at the moment" and said Parliament remains united in its support: "Parliament can be divided over all sorts of things, but we are not over our support of Ukraine".

  Mr Shapps warned there would be "fatal" consequences if Western countries give up on Ukraine, adding: "The world won't be safe unless we stop a tyrant like [Russian President Vladimir] Putin".

  Labour leader Sir Keir Starmer said President Vladimir Putin's "cowardice and barbarity" would not prevail.

