title: 'UK weather: Met Office''s warning for floods and storms - BBC News'
date: '2024-07-15'
section: UK
url: http://www.bbc.co.uk/news/articles/cy685q21v3eo
content: |-
  Parts of England and Wales are covered by the warning which will be active on Monday.

  Thunder and lightning has also been forecast on Monday by the Met Office

  A weather warning has been issued for parts of England and Wales ahead of forecast "heavy rain". The Met Office's yellow warning for rain is in force from 08:00 to 23:59 BST on Monday. It covers Devon, Cornwall, Somerset, Bristol and Wales, along with parts of the north west of England. Met Office bosses said up to 40mm of rain could fall in the space of three hours, and there is the possibility of flooding, thunder storms, power cuts and travel disruption.

  The Met Office weather warning covers parts of England and Wales

  "Outbreaks of rain, some heavy and thundery, will spread steadily north across the area during Monday," the Met Office said. "Some torrential downpours are likely in places with 15 to 20mm falling in less than an hour and as much as 30 to40 mm in three hours. "This is likely to lead to localised flooding, slower travel times and a small chance that homes and businesses could be flooded."

  The Met Office's warning said the following can be expected during the weather warning for rain on Monday:
  • None There is a slight chance of power cuts and loss of other services to some homes and businesses.
  • None There is a small chance that homes and businesses could be flooded, causing damage to some buildings.
  • None Where flooding occurs, there is a slight chance of delays or cancellations to train and bus services.
  • None Spray and flooding could lead to difficult driving conditions and some road closures.
  • None There is a small chance of fast flowing or deep floodwater causing danger to life.
