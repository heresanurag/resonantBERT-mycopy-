  Without naming individuals, political consultant Cathy Owens said it would be difficult for someone "involved with some of the shenanigans" and some of the "acrimony" to be Welsh Labour leader. Ms Owens, who advised the late first minister Rhodri Morgan, said Labour needed a Marks & Spencer candidate, as "it's not anybody’s favourite shop" but nobody hates it. She said the next leader is going to have to "unite their party whilst also negotiating with the opposition".

  Mr Michael, who led the Labour administration in the Welsh assembly from 1999 to 2000, told BBC Radio 4's The World Tonight: "A lot of people are very angry and frustrated about the fact that Vaughan has been in effect forced out."

  Vaughan Gething has been mired in controversy since before he was appointed in March

  Andrew RT Davies, leader of the Welsh Conservatives in the Senedd, said an interim cabinet needed to be appointed as people "rightly want to know how those ministers’ portfolio responsibilities will be carried out while a new first minister is selected". Plaid Cymru claimed Labour was now "rudderless" and repeated calls for a Senedd election. Plaid's Llyr Gruffydd said: “Today is the last day of the parliamentary term before summer recess. The first minister must come to the Senedd and set out his plans to ensure a functioning government at the very least.

  In Wednesday's cabinet reshuffle, Jack Sargeant joined the government for the first time as minister for social partnership. Ken Skates, who is already transport secretary, will take on Jeremy Miles' former portfolio as economy secretary as an additional responsibility. Jayne Bryant, the Newport West MS, will be promoted to be cabinet secretary for local government and housing. Sarah Murphy will move to be minister for mental health and early years. Jane Hutt's job will expand to cover Lesley Griffiths' former role. As well as chief whip, she will be cabinet secretary for culture and social justice. Mick Antoniw's job as counsel general has not been replaced as of yet. Mr Gething will retain oversight on discussions with Tata Steel, he said.

  On Tuesday, Mr Gething announced he was resigning as first minister and that a new leader would be in place in the autumn. It came after four cabinet members all quit their positions simultaneously and demanded he follow suit. He will carry on leading the Welsh government until his successor is chosen. Mr Gething has been dogged by questions over the £200,000 campaign donation from Dauson Environmental Group. He has also been criticised over the sacking of former minister Hannah Blythyn for allegedly leaking to the media, which she denies. In his resignation speech, Mr Gething denied any wrongdoing, saying: "I regret that the burden of proof is no longer an important commodity in the language of our politics. "In 11 years as a minister, I have never ever made a decision for personal gain. "I have never ever misused or abused my ministerial responsibilities."

  Mr Michael, who resigned from Labour's top job in Wales in 2000, said he was a friend of Mr Gething’s and had spoken to him on Tuesday. "He’s very sad and he’s very regretful that he hasn’t been provided with the support that he needed," he said. Mr Michael said there were "good people in the Senedd" who could be leadership contenders, including Ms Morgan and Mr Irranca-Davies. The ruling body of Welsh Labour will meet at the weekend and is expected to set out a timetable for the leadership campaign.
