  All the latest news as the British Isles prepares for the remnants of Hurricane Ophelia.

  HSE in Ireland back to normal in 'a few days'

  Ireland's health service says to expect delays while its clinics catch up on a backlog of cancelled appointments. HSE cancelled all appointments on Monday due to the storm but hopes to "gradually return to normal services over the next few days". For more details and the latest hospital news, follow its website.
