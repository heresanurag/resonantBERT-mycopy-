  Wales in first finals 'proudest moment' for Fishlock

  This video can not be played To play this video you need to enable JavaScript in your browser. Republic of Ireland 1-2 Wales: Highlights as visitors make history in Dublin

  Wales’ most-capped player and record goalscorer Jess Fishlock says qualifying for a major tournament with her country is “the proudest moment of her life". Goals by Hannah Cain and Carrie Jones mean that after years of near misses, Wales’ women have qualified for a first major tournament in their history thanks to a smash-and-grab 2-1 win in Dublin which secured a 3-2 aggregate victory. The 37-year-old made her Wales debut as a 16-year old and has seen all the highs and lows on Wales’ journey to major tournament football. She could only watch on as Wales finally got over the line, having left the field with a hamstring injury and in tears, midway through the second half at the Aviva Stadium. "I can't put it into words. This is 20 years in the making. I wouldn't change a second of it,” Fishlock told Match of the Day Wales. "The ups and downs are part of the process and the journey. It all led to this moment with this group of girls. "This is by far the proudest moment of my life. My hamstrings are shot, but that doesn't matter right now."

  This video can not be played To play this video you need to enable JavaScript in your browser. I could not be more proud of this group - Fishlock after Wales qualify for Euro 2025

  Wales boss Rhian Wilkinson says the achievement will “change everything” for Welsh football. "This team found a way. They never broke for each other, they stayed strong. I've never been prouder of a team,” she said. "This is a special team. My staff are another level and this team, how they don't quit... they never do things the easy way. "This team stands on the shoulder of giants who came before, and now they've proven how good they are. "They're better than they think and they just have to see it and live it and experience it. "Those boys and girls back home are seeing a generation of football that's going to change everything." Wales’ goalscorer Cain, who has recovered from two knee surgeries after ACL tears, admits she struggled to contain her emotions. "Honestly, I've got no words. There's nothing that will ever compare to this feeling,” she said. "You can see what it means to everyone. I was crying when I scored. "It's pretty emotional. I'm glad to be back doing that. I'm not going to lie, I was a bag of nerves. But this is what dreams are made of.” Former Wales defender Danny Gabbidon believes qualification for a first major tournament can be a seismic moment for sport in Wales. Gabbidon says the impact of the win can be similar to 2016 when Wales’ men reached the Euros, their first major finals in 58 years. "It's amazing. It's taking me back to 2016 when the lads did it,” he added. “It's that same kind of feeling. "We have had so many disappointments so for us to be in that draw, for little old Wales... we are going to showcase Wales.”
