title: 'Labour and customs union: Evolution not revolution - BBC News'
date: '2018-02-23'
section: UK Politics
url: http://www.bbc.co.uk/news/uk-politics-43163354
content: |-
  BBC political correspondent Iain Watson on Labour's Brexit policy 'evolution'.

  Labour's Brexit sub-committee have been going through party policy

  It had been billed as an away day to thrash out Labour's policy on Brexit - a kind of shadow of the Chequers gathering.

  In the end when Labour's Brexit sub-committee met this week, it wasn't "away" from Westminster and it wasn't a day. A paper was tabled but not formally endorsed.

  But I'm told that nuances have been ironed out and it has all but got the approval of the party leadership. It will form the basis of Jeremy Corbyn's Brexit speech on Monday.

  What is he likely to say? Labour insiders favour the word "evolution" to describe any change. Contrary to speculation, there won't be a seismic shift in policy but it will move forward.

  In the summer, under pressure from some of his MPs, unions and his shadow Brexit secretary Mr Corbyn signed up to a policy of staying both in the single market and the customs union for any "transitional" period after Brexit.

  The Labour position has been to argue that "a" customs union was "a viable option" and that the government should "keep all options open".

  What we are likely to see on Monday is wording that makes plain that "a" not "the" customs union would have distinct benefits and is the most logical way to solve the thorny issue of the Irish border.

  It won't just be a viable option but a viable end point. And the policy is likely to evolve in another way too.

  Currently Labour recognises that when we are out of the EU, we are out of the single market.

  So it is arguing that it wants to retain the same benefits as single market membership - such as tariff-free trade.

  I'm told the same formulation could be applied to "a" customs union, that in the long term a future Labour government could sign up to one, if the UK got the exact same benefits as it gets from "the" customs union - frictionless trade and a say over the external tariff on imported goods.

