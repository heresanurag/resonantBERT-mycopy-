  France, fourth in the world rankings, are the last team to beat the Red Roses in the competition back in 2018. However, their losing run against the champions has extended to 13 games and they will need to show big improvements to mount a title challenge this year. Under co-head coaches Gaelle Mignot and David Ortiz, Les Bleues struggled at WXV1, losing heavily to Canada and New Zealand. Wing Marine Menager is likely to be the team's leading light once again. The 28-year-old scored two tries against the Red Roses last year and made five line breaks across the campaign.

  Italy, after only one win in last year's championship and two wins at WXV2, decided to change head coach and brought in Fabio Roselli to take over from Giovanni Raineri. Full-back Vittoria Ostuni Minuzzi, despite her diminutive stature, was ranked fourth for metres gained (344.9m) in last year's Six Nations and can carve up any defence with her nimble footwork. Openers do not get much harder for Roselli, with his side away to champions England in York on Sunday.

