  Ireland backed up their third-place finish in the championship last year with a remarkable win over New Zealand at WXV1 in October. Since Scott Bemand's appointment as head coach in 2023, Ireland have gone from a side who missed out on the World Cup in 2022 to being ranked sixth in the world after five wins last year. "It had been 10 years since Ireland's women had beaten the Black Ferns before that," said Bemand. "We need moments, we need things that people can anchor onto. "The confidence of the group is starting to thrive and they've started to get some experiences; they know they can bounce back from a tough half-time team talk or a loss, they've got evidence." Their resurgence has coincided with the rise of number eight Aoife Wafer, who scored six tries across nine Tests last year to be named Ireland women's player of the year. Leinster's Wafer, who turns 22 three days after the team's opening match of the championship, is one of the most explosive ball-carriers in women's rugby and scored twice in the historic victory over New Zealand. However, Ireland will be without injured co-captain Sam Monaghan.

  Scotland are one place below Ireland in the world rankings and were defeated by Australia in their WXV2 title decider in October. Bryan Easson has been bold in his squad selection, naming nine uncapped players, with form and "a wider player base to pick from", external his reasoning for selection. "The uncapped players are in because of their performances week on week," said Easson. "That's where we're changing a little bit - myself, my coaches and management are not picking on legacy any more, it's not picked on what you've done previously, it's on week-to-week performances in PWR and the Celtic Challenge." Evie Willis returns to the squad following the nasty anterior cruciate ligament (ACL) injury she suffered in August 2023 and will be looking to add to her three caps after featuring regularly at centre this season for Leicester Tigers.

  "There is a definite sense this is a Scotland team moving forward and their ambitions have risen accordingly. "The big guns of England and France will almost certainly occupy the top two spots, therefore Scotland's goal is to finish third, something they have managed only twice in the history of the Women's Six Nations, most recently in 2005. "Scotland have finished fourth in the past two campaigns. They finished bottom of the table in eight of the 12 Six Nations that came before, so there is clear evidence of the team becoming more competitive. "Wales, Ireland and Italy are all operating at a similar level to Scotland, and given they host all three in Edinburgh this time around, there is an opportunity to enjoy a very positive campaign that can act as a springboard towards the Rugby World Cup. "The experienced heads of captain Rachel Malcolm, Jade Konkel, Chloe Rollie and Lisa Thomson are all still key figures, but whereas in previous teams they would be required to drag some of the lesser lights along with them, the dawn of professionalism in the women's game in Scotland has started to bear fruit, and now the new faces in the squad are arriving better prepared for Test rugby. "Francesca McGhie, 21, has brought pace and finishing power to an exciting back-three that already boasts proven international performers such as Rollie and Rhona Lloyd. "Back-row Alex Stewart was Scotland's breakout star in last year's tournament, the then 19-year-old producing some dominant displays to mark her out as not only a star of the future, but one for here and now. "There looks to be an excellent blend of youth and experience in this Scotland squad, one that could produce a big year if they can generate some precious momentum in this Six Nations."

  Ioan Cunningham stood down as head coach in November following an underwhelming year of results for Wales. After finishing the Six Nations with the Wooden Spoon - only managing one narrow win over Italy - Cunningham's side achieved a solitary victory against Japan in their WXV2 campaign. Sean Lynn, newly recruited from Gloucester-Hartpury, has taken charge. Lynn said: "My values as a coach are three words; caring, challenge and passionate. Everything I brought into Gloucester-Hartpury was about togetherness and making sure we were all aligned. "My big value coming from Wales is how passionate and caring the family is and that's what I wanted to bring into this environment - the family and the future family that we've got in this pathway, which is super exciting." Captain Hannah Jones, fresh off the back of a third successive PWR title with Lynn, will be a danger in the midfield with her hard running lines. With excitement building around the new era, more than 10,000 tickets have already been sold for England's visit to Principality Stadium on 29 March, breaking the previous record home attendance for the team. However, a big loss for Wales is the absence of destructive prop Sisilia Tuipulotu, who will miss the tournament with a hamstring injury.
