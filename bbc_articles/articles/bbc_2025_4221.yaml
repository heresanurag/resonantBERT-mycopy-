  England start as favourites as they target a seventh Women's Six Nations title in a row, but how are other nations shaping up and can anyone challenge the Red Roses?

  This video can not be played To play this video you need to enable JavaScript in your browser. Best tries of the 2024 Women's Six Nations

  Coverage: Watch every match live - coverage on BBC television, iPlayer, the BBC Sport website and the BBC Sport app.

  The Women's Six Nations gets under way on Saturday, with England looking to make it seven titles in a row before a home Rugby World Cup in August. The Red Roses won their third successive Six Nations Grand Slam by comfortably beating France in Bordeaux last year. England therefore are the firm favourites as the trophy hunt begins, but are they in good shape? And what about the other nations who aspire to challenge them? The coaches of England, Scotland, Wales and Ireland spoke to the BBC's Rugby Union Weekly podcast before the tournament.

  John Mitchell's side are on a 20-game winning run and added a second WXV1 title by beating Canada in October. Lock Zoe Aldcroft will captain the side after head coach Mitchell opted for a change of leadership from Saracens flanker Marlie Packer, who skippered England for nearly two years. "We've got into rugby work in this camp and she [Aldcroft] goes about it in her own way, but her actions are so consistent when it comes to rugby," said Mitchell. "If I was a team-mate, I would follow her, definitely." Given England's vast and high-quality player pool, Mitchell will want to win his second Six Nations title but could also use the tournament to further widen his options ahead of the World Cup. Mitchell added: "Our depth is a strength I'm grateful for. I'm not working with the Six Nations on a separate island, I've got the end [the World Cup] in mind." World player of the year Ellie Kildunne is the one to watch after bagging nine tries and gaining over 300 metres more than any player in last year's tournament.

