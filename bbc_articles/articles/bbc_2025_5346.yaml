title: 'Six Nations: Will Carling questions quality of England coaches - BBC Sport'
date: '2025-03-04'
section: England
url: http://www.bbc.co.uk/sport/rugby-union/articles/cdrx352jzkko
content: |-
  Former captain Will Carling questions the quality and experience of England's current coaching set-up, suggesting it is preventing the team reaching their full potential.

  Carling, left, had a part-time mentoring role with England when Eddie Jones, Borthwick's (right) predecessor, led the team

  Coverage: Live audio commentary via the BBC Sport website and app

  Former captain Will Carling has questioned the quality and experience of England's current coaching set-up, suggesting it is preventing the team reaching their full potential. England recovered from an opening-round defeat by Ireland with dramatic one-point wins over France and Scotland, but have still been criticised for their style of play so far in the Six Nations. "We do have some talented players there's no doubt and maybe we're seeing a slightly restricted version of them," Carling told BBC Radio 4's Today programme., external "You look at the calibre of the England coaching team and you have got to question whether that's the best we can put out there. "Some of them are learning, some of them are very young and maybe lack the experience at Test level. Maybe that's what we're seeing impact on the players."

  Tom Harrison, Steve Borthwick, Kevin Sinfield and Richard Wigglesworth all worked together with Leicester before linking up with England

  England head coach Steve Borthwick is leading an international team for the first time, having previously worked as an assistant with England and Japan. He also led Leicester to the Premiership title in 2022. When he took charge of England, Borthwick recruited Richard Wigglesworth and Kevin Sinfield – both of whom are less than a decade into their coaching careers - from his Tigers backroom. Defence coach Joe El-Abd is working in international rugby for the first time and splitting his time between England and second-tier French side Oyonnax until the end of the season, while, at 33, scrum coach Tom Harrison is younger than hooker Jamie George. Felix Jones, who was part of the coaching team that won back-to-back Rugby World Cups with South Africa, left England's set-up in August after only seven months in his post. Jones has now returned to work with the Springboks once more.

  Ellis Genge said criticism of England after back-to-back wins "blew his mind"

  "I still think we're way off the potential of this team and let's just hope we start seeing that," added Carling, who had a part-time mentoring role with England under Borthwick's predecessor Eddie Jones. England vice-captain Ellis Genge said last week former players such as Carling were "out of touch" in their criticism of the team, failing to give them due credit for turning around a run of six defeats in seven Tests earlier in the year. "I wouldn't necessarily agree with him," Carling said. "A lot of ex-players are hugely experienced and have a lot of knowledge. "But I understand that when you're a current player you're highly sensitive. "You're trying as hard as you can to win games [and] they've had a tough run. Let's be honest, we're talking a tough run for three or four years now. That's where players have to understand people will have opinions. "I remember all these times we had some very ugly wins and you watch the reaction of the media and the fans. "It is a bit frustrating but you have to take a deep breath and accept that's part and parcel of it." Carling captained England 59 times, leading them to three Grand Slams and a Rugby World Cup final during the 1990s.

