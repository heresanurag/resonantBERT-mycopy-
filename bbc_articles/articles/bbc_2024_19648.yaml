title: Rochdale karate kids return home with 100-medal haul - BBC News
date: '2024-08-22'
section: General
url: http://www.bbc.co.uk/news/videos/c985l5081njo
content: |-
  A group of young martial artists from Rochdale are celebrating after a pan-European tournament.

  A group of young karate students have been revelling in their success after taking home more than 100 medals at a recent competition.

  The group, from Rochdale's Dojo Karate Centre, were taking part in a pan-European tournament held with other competitors in London.

  More than 30 children went as part of the team who represented Team GB for the British Karate Federation, returning with a collection of gold, silver and bronze medals.

  Teacher Irfan Ansari said it was an "outstanding achievement" for the students who come from across Rochdale, Oldham and Middleton.

