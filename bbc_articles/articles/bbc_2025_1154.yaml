title: British couple held in Iran named as family urge safe return - BBC News
date: '2025-02-16'
section: Middle East
url: http://www.bbc.co.uk/news/articles/c626p6pz7xlo
content: |-
  Craig and Lindsay Foreman were travelling through Iran as part of a motorbike trip across the world.

  This video can not be played To play this video you need to enable JavaScript in your browser. Before being detained, the Foremans shared videos of their travels in Iran

  The family of a British couple in custody in Iran say they are united in their determination to secure their safe return. Craig and Lindsay Foreman were arrested in January, but news of their detention emerged on Thursday when state-run Iranian media reported they were being held on unspecified security charges. The couple, both aged 52, had been on a motorbike trip across the world, and had planned to be in Iran for only five days. A statement issued by the Foreign Office on their family's behalf said: "This unexpected turn of events has caused significant concern for our entire family, and we are deeply focused on ensuring their safety and wellbeing during this trying time."

  The family called it a "distressing situation", adding: "We are actively engaging with the British government and relevant authorities, working diligently to navigate the complexities of this matter." They said the "emotional burden of this situation weighs heavily on us", and "the outpouring of support from friends, family, and the community" had "provided us with strength and encouragement as we face this ordeal". Mr and Mrs Foreman were heading for Australia on their journey across the globe. They had crossed into Iran from Armenia on 30 December and had planned to be in Pakistan by 4 January. After staying in the cities of Tabriz, Tehran and Isfahan, accompanied by a tour guide, they travelled on to Kerman, in east-central Iran, but never checked into their hotel there. In a series of social media posts before they were detained, the couple described their joy at being in Iran. Lindsay Foreman, a life coach with a doctorate in psychology, said she was "having an amazing time". Her husband Craig, who is a carpenter, spoke of the "lovely people" of a "lovely country". Mrs Foreman posted a picture of herself on 3 January meeting a cleric in the town of Isfahan. Writing on Instagram, she said: "Travel continues to teach me that humanity's core is shared: kindness, humility, and respect for one another." On Facebook that day she wrote: "Despite differences in culture, language, and traditions, we've seen something beautifully universal: kindness, humour, hospitality - and a shared love of good food!" The Iranian authorities have not said what the couple are accused of.

  Craig and Lindsay Foreman crossed into Iran in December and planned to be in neighbouring Pakistan five days later

  The pair moved from East Sussex to start a new life in Andalucia, Spain, in 2019 and had appeared on an episode of Channel 4's A New Life in the Sun in 2022 to showcase their lives as expats. Mrs Foreman is reported to have been carrying out a research project on their journey to Australia, asking people what it means to be human and what constitutes a good life. She was due to present her findings at a conference on positive psychology in Brisbane in July. Posting on Instagram, she acknowledged travelling to the Iran, against Foreign Office advice, and to Pakistan was risky and "slightly scary". "Yes, we're aware of the risks," she wrote. "But we also know the rewards of meeting incredible people, hearing their stories, and seeing the breathtaking landscapes of these regions could far outweigh the fear." She added: "From the vast deserts of Iran to the towering peaks of Pakistan, we hope to share the beauty, hospitality, and humanity that often go unnoticed." The Foreign Office says it is in contact with the local authorities in Iran, and is providing the couple with consular assistance. A photograph of the couple, with their faces blurred, meeting the British ambassador Hugo Shorter at the public prosecutor's office in Kerman was published on Wednesday. The Foreign Office currently advises British nationals to avoid all travel to Iran. "British and British-Iranian dual nationals are at significant risk of arrest, questioning or detention," advice says. "Having a British passport or connections to the UK can be reason enough for the Iranian authorities to detain you." Over the past few years, dozens of foreign and dual nationals have been arrested in Iran on vague security-related charges. Human rights groups say they are often used by the Iranian authorities for political leverage.
