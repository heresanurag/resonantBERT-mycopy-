id: bbc_2019_10643
title: Batman fans celebrate 80th birthday of DC Comics superhero - BBC News
date: '2019-09-22'
section: General
url: http://www.bbc.co.uk/news/entertainment-arts-49790933
content: |-
  The "Bat-Signal" has been beamed on buildings across the world to mark the anniversary.

  Batman fans around the world have marked the 80th birthday of the "Caped Crusader".

  Many dressed up as the DC Comics superhero for the occasion and took part in activities such as fun runs.

  The first Batman comic book was published in 1939 in New York.
