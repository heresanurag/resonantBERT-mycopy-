  Gauld takes the midfield spot vacated by Callum McGregor, who retired from international duty earlier this month. The head coach cited his disappointment at losing the Celtic captain, but said he "respects his decision". Clarke added "no one else has indicated their retirement, everyone is determined to go and be more successful". Right-backs Nathan Patterson and Aaron Hickey remain unavailable through injury, while centre-backs Jack Hendry and Liam Cooper are also left out of the squad. Hendry missed Al Ettifaq's Saudi league opener, and Cooper is without a club following the expiry of his contract with Leeds United. Two other unattached players - midfielders Ryan Jack and Stuart Armstrong - are also left out, having been at the Euros. However, Tommy Conway - who signed for Middlesbrough from fellow English Championship side Bristol City this summer - joins Doak as another youthful attacking option.

  Alistair: Clarke has been totally loyal to a group of players which is fair until the group runs out of steam. Sadly this happened at the Euros. Time to move on with some new blood. Four new caps in this squad; hopefully one or two more in the near future. Marc: About time Scotland's mini-Messi got a call up. For far too long he has been overlooked. Anon: Typically too conservative from Clarke. This should be the start of building for the next World Cup; instead he is tinkering around. There should be no place for Hanley, Dykes or Ralston as they just aren't good enough. See what Connor Barron, Lennon Miller and David Watson can do and use the Nations League as a development opportunity. Stephen: Ridiculous it's taken this long for Gauld to be acknowledged. Not saying he's our saviour but he's an attacking threat and we're in desperate need of them. Glad to see Morgan back in and hopefully we'll see Doak get minutes too. Iain: We don't have a great deal to choose from but Gauld deserves a chance. Not your typical battling midfielder, but he's matured and is a great passer, puts in a good shift and usually chips in with a few goals. Forget the Scottish Messi, him and Gilmour could become the Scottish Xavi and Iniesta instead. Eric: Great to see some new players in the squad, but that will only matter if they actually get on the pitch. We had some very tired looking senior players in the Euros, so hopefully they will now be refreshed, and ready to support the young talent. I'm looking forward to a fresh start. Andrew: I think this is a great post-Euros squad. The team did brilliantly to qualify but seemed to peak too early and by the time of the competition were on a big downward trend. This refreshes things. The new players (and the re-introduction of Gauld) will certainly help. The rebuild starts now.
