  'Different type' Gauld earns first Scotland call-up in 10 years

  Ryan Gauld is yet to make a senior appearance for Scotland

  Scotland will get the benefit of a "slightly different" type of player after Ryan Gauld received his first call up in a decade for next month's Nations League games. The Vancouver Whitecaps captain, who was included in the senior squad in 2014 but did not feature under then-head coach Gordon Strachan, could make his international debut against Poland or Portugal next month. Clarke, who was speaking for the first time since Scotland's dismal Euro 2024 campaign, revealed the 28-year-old "was in my thoughts before the tournament". "He has chosen a different path in his career, left Scotland as a young man, and on a round-about journey ended up in Vancouver, where he has been one of the best players and is one of the most valuable players," the head coach said. "He is a creative player, slightly different to the type we have got, and it will be nice to have a look at him up close and personal.” Gauld moved to Sporting in 2014 after breaking through at Dundee United as a 16-year-old, and spent much of his career in Portugal until moving to MLS in 2021. He has shone in Canada since, scoring 32 goals in 102 appearances and earning the captaincy at Whitecaps.

  Sturm Graz defender Max Johnston and Liverpool forward Ben Doak could also win their first caps, and Rangers' John Souttar returns, as Clarke opted to "freshen up a little for this campaign". Kilmarnock's Robby McCrorie is preferred to Hearts' Craig Gordon and Liam Kelly of Rangers in the goalkeeping department. Scotland play Poland at Hampden on 5 September, before travelling to Lisbon to take on Portugal on 8 September in the first games since the Euros. Reflecting on that disappointing campaign, Clarke said "it wasn't our tournament". “Lots of little things go into making a team in a finals and a lot of things didn’t fall our way and you end up with disappointment," he added. "There were too many little things that didn’t come together."

