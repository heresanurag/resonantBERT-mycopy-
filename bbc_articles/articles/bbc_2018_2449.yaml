content: |-
  Marie Martinod says her silver medal sends an inspirational message, as Cassie Sharpe wins the women's ski halfpipe final in Pyeongchang.

  This video can not be played To play this video you need to enable JavaScript in your browser.

  France's Marie Martinod celebrated a Winter Olympic medal with the message: "You can be a woman, you can have kids and you can win Olympic medals." Martinod took silver behind Canada's Cassie Sharpe in the women's ski halfpipe final in Pyeongchang, adding to her second place at Sochi 2014. The 33-year-old says it means she made a good decision to return to the sport after giving birth in 2009. "I've been working hard and I could do it at the right times," said Martinod. "It means I'm leaving this industry with a great message to all the girls: that you can push hard, you can push for a long time, and if you take care of yourself you can do it until you're 33 at least. "And it means, and this is most important, that you can be a woman, you can have kids and you can do it, feel good about it, and come back."

  Canada's Sharpe proved just too strong as she topped qualifying on Monday and posted the best score in each of the first two runs of the final, the 25-year-old's best clocking in at 95.80 second time down. Martinod earned a second straight Olympic silver with 92.60, while USA's Brita Sigourney claimed bronze with 91.60. The American won the inaugural women's halfpipe gold at Sochi 2014 but failed to put down a run in the Pyeongchang final. Cheshire put a score of 75.40 on the board in her first run but failed to better that as she fell on her other two runs.

