content: |-
  Davy Keenan has lived on water for more than 50 years and now spends his time aboard 'Little Gem'.

  Davy Keenan has lived on water for more than 50 years and now resides with his dog JoJo aboard 'Little Gem'.

  The craft is a World War Two tug boat, one of only four left globally.

  The vessel holds a fascinating history, playing a role in the D-Day landings bringing supplies to the Mulberry harbours.

  "Nice and comfortable, nice and relaxing, can't beat it, no neighbours," Davy says of his nautical bolthole on the Cumbrian coast.

