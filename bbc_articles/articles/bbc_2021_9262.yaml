title: 'Kyle Patrick Walley: Tribute to Rhosymedre man found dead - BBC News'
date: '2021-07-12'
section: Wales
url: http://www.bbc.co.uk/news/uk-wales-57803080
content: |-
  Police have arrested an 18-year-old man on suspicion of the murder of Kyle Patrick Walley.

  Mr Walley's family said he would be greatly missed

  The family of a 19-year-old found dead in a house in Wrexham say he had "so much to look forward to".

  Kyle Patrick Walley was found by police officers after they were called to an address in Eglwysfan, Rhosymedre, on Sunday.

  His family said he had the "biggest smile and sense of humour", they were devastated by his death and he would be greatly missed by many.

  An 18-year-old has been arrested on suspicion of murder.

  In a statement, Mr Walley's family said he was loving and kind and they were devastated by his death.

  "You made us laugh, made us smile, you had so much to look forward to: college apprenticeship in September and so much more," they said.

  Police have warned of highly graphic footage being circulated on social media and urged people not to share it.

  Det Ch Insp Alun Oldfield said that the incident and footage had affected many young people in the community.

  "As such, school liaison officers and the neighbourhood policing team are working closely with colleagues at Wrexham council to offer the appropriate support and reassurance to the local community," he said.

  Wrexham council said school staff and social care workers were ready to provide emotional support to any children and young people affected.

  On Sunday, the force issued a brief statement saying it had been called to an incident just after 17:00 BST and that there was "no on-going risk to members of the public".

