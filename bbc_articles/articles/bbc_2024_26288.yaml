title: Paddington Bear shut away from children in Cardiff by bad behaviour - BBC News
date: '2024-10-25'
section: Wales
url: http://www.bbc.co.uk/news/articles/cm208kyke37o
content: |-
  Children are let down as a statue of Paddington is locked in a garden for much of the time.

  The statue is one of 23 across the UK and Ireland as part of the upcoming release of the new Paddington film

  Children have been left disappointed after trying to visit a statue of Paddington Bear, only to find the garden where he sits has been locked up. The statue of Peru's most famous duffel coat-wearing marmalade sandwich lover is on a bench in the centre of Cardiff to promote the new Paddington film. One father said he found many parents waiting in vain for the gates to open. But St John's Gardens are locked from late afternoon six days a week and all day Sunday, which Cardiff council said was to “prevent issues with anti-social behaviour”.

  It has been popular on social media, and Gareth Evans took his two children, Anni, nine, and Dafydd, six, to see Paddington on a Sunday, expecting it to be open. “When we got to the gate there were lots of parents there with their children, we waited around for a while expecting it to open but it didn’t."

  This video can not be played To play this video you need to enable JavaScript in your browser. Cardiff shoppers are not happy about the opening hours to see Paddington Bear

  Mr Evans, from Cardiff, said they heard people come from as far as Tenby in Pembrokeshire - some 95 miles (150km) - to see Paddington, but were let down. “It’s an attraction for families and Sundays are when kids don’t have school so I think they need to make it a bit more flexible.” he said.

  FOR Cardiff, the business organisation working with the film production company, said discussions were under way to see if Paddington can be moved. Karen and Graham from Llantwit Major, Vale of Glamorgan, took their daughter Orla to see Paddington. “It would be lovely to see it open longer: it’s a shame things like anti-social behaviour lead to the restricted times, but it is for the kids so to have it somewhere that’s protected I think is a lovely idea,” said Karen.

  Parents like Karen and Graham - with their daughter Orla - are calling upon the council to make visiting times more flexible

  Ffion Jones, deputy head teacher of Caradog Primary School in Aberdare, Rhondda Cynon Taf, said they were lucky to take a group of children from the school during school hours. “If this closes at 4pm our children from Aberdare wouldn’t be able to come down and see it after school so we’ve been fortunate today to be on a school trip so they can come and see it in the day time.” Cardiff council said the gardens were routinely locked at approximately 16:00 BST from Monday to Saturday to prevent anti-social behaviour, before being re-opened at about 10:00. "However these times can vary slightly, subject to circumstances within the city centre," a spokesperson added. The gardens remain locked all day on Sunday, according to the council, but due to popularity, the gardens were opened for an extra day last Sunday. The council also confirmed it was working with FOR Cardiff to explore possibly finding Paddington a new home in the Welsh capital.
