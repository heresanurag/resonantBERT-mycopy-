content: |-
  Ulster back row Cormac Izuchukwu and Leinster hooker Gus McCarthy are handed their Ireland debuts with Sam Prendergast given a first start at fly-half for Saturday's game against Fiji.

  Izuchukwu will start alongside the experienced Josh van der Flier and Caelan Doris in the back row

  Coverage: Listen on BBC Radio 5 Sports Extra and BBC Sounds, live text and commentary on the BBC Sport website and app

  Ulster back row Cormac Izuchukwu and Leinster hooker Gus McCarthy will make their Ireland debuts in Saturday's Test against Fiji, with Sam Prendergast handed a first start at fly-half. Izuchukwu, 24, is named at blind-side flanker with Tadhg Beirne moving into the second row, while 21-year-old Leinster front row McCarthy replaces Ronan Kelleher. Prendergast, 21, will make his full debut after replacing Jack Crowley for the final 20 minutes of last week's narrow win over Argentina. Also in the backs, Jamie Osborne replaces Hugo Keenan at full-back, Bundee Aki returns in midfield, Craig Casey is named at scrum-half and Ulster's Jacob Stockdale is recalled to the left wing as Farrell makes seven changes to face Fiji, who beat Wales in Cardiff earlier this month. "There were signs of improvement last weekend and this week has been about building and embracing the challenge of a talented Flying Fijian side who will be coming over to Dublin full of confidence after their recent displays," said Farrell.

  Izuchukwu, who can operate in the second and back rows, was named in Farrell's squad for the summer's two-Test tour of South Africa but did not make either matchday panel. But having impressed for Ulster and on his second Emerging Ireland tour earlier this autumn, he will make his Test bow in a strong back row that includes 2022 world player of the year Josh van der Flier and captain Caelan Doris. Izuchukwu's Ulster team-mate Stockdale has been rewarded for a strong start to the season which has yielded three tries in five United Rugby Championship appearances. Stockdale, 28, last started for Ireland in the World Cup warm-up match against Samoa in August 2023. McCarthy, who captained Ireland Under-20s to a Six Nations Grand Slam in 2023, has been promoted to the line-up in place of Leinster team-mate Kelleher, who started against the All Blacks and Argentina. Prendergast, one of the stars of that under-20s side, has been rewarded for a steady debut off the bench against Argentina. His older brother Cian, who has three caps, has been named on the bench. Aki also returns to the line-up after being dropped following the defeat by New Zealand, while Tom O'Toole is recalled to the replacements after missing the Argentina game with a head injury he sustained against the All Blacks. O'Toole's Ulster team-mates Iain Henderson, Rob Herring and Stuart McCloskey are also on the bench, but there is still no place for prop Tadhg Furlong despite a positive fitness update earlier this week. Crowley, James Lowe, Jamison Gibson-Park, Peter O'Mahony, Garry Ringrose and James Ryan are among those rested by Farrell. Finally, Cian Healy must wait another week for a record-breaking 134rd cap - having drawn level with Brian O'Driscoll against Argentina - after the prop was left out of the 23.
