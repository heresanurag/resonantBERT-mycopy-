  Gaining nearly 100 new councillors, the Liberal Democrats said they have proved they can benefit from Conservative difficulties. The Green Party just missed out on its target of taking over Bristol Council, but continued to gain ground winning 66 new seats. Meanwhile, Reform are averaging 12% of the vote in wards where they are standing, and came third in the Blackpool by-election, 117 votes behind the Tories. Despite the poor results, there is no sign of an internal revolt against the prime minister's leadership. There are only two MPs who have publicly called for a change of leader - and no-one new voices joining that band in response to these results. Holding on to the Tees Valley mayoralty may have provided Mr Sunak with a lifeline. But as leading elections expert Sir John pointed out, Lord Houchen's success was "heavily personal" and the results unreliable indicators of Conservative prospects in a general election. MPs have reported to the BBC's chief political correspondent Henry Zeffman that seeing a popular independent-minded local incumbent defy a national trend is compelling. Many MPs believe they have strong personal votes - even if there is little academic evidence for that. The results from the remaining votes could still prove to be pivotal to the two leading parties. Sir John said the Tories could be on course to lose 500 councillors - making it "one of the worst, if not the worst" performances by the party in 40 years. Five council elections are still to come in, with but all eyes will be on the remaining seven mayoral races due to be announced by the end of Saturday - they include London, Greater Manchester, Liverpool City Region, Salford, West Yorkshire, West Midlands and South Yorkshire. The outcomes in London and Greater Manchester - currently held by two of Labour's biggest national figures in Sadiq Khan and Andy Burnham - will be crucial for gauging the party's public support.
