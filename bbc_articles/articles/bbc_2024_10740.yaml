title: Tories hit by big council losses in last pre-general election test - BBC News
date: '2024-05-04'
section: UK Politics
url: http://www.bbc.co.uk/news/uk-politics-68953088
content: |-
  Labour wins a by-election and string of councils from the Tories, who retain the Tees Valley mayoralty.

  The Conservatives have endured one of their worst local election results in a decade in the last big test of public opinion before a general election. The Tories lost nearly half the seats they contested, with only a handful of council and mayoral results pending. In contrast, Labour won key councils, regional mayors and a decisive victory in the Blackpool South by-election. The PM called the results "disappointing" but denied Labour was on track for a general election win. In a rare bright spot for the Tories, Ben Houchen was elected for a third term in Tees Valley, with a much reduced majority. Speaking at Teesside International Airport, Mr Sunak said the results showed at the general election election voters "are going to stick with us". Mr Sunak said Labour "knew they have to win here in order to win a general election", but said voters know "the Conservatives are building a brighter future for Teesside and a brighter future of Britain".

  In total, the Conservatives lost 10 councils and more than 400 councillors in England. Labour emerged as the main beneficiary, gaining 169 new councillors and making advances in areas the party claim point toward a general election victory. The party also won all three of the newly created regional mayors in the East Midlands, North East and York and North Yorkshire. Speaking at Northallerton Town Football Club in North Yorkshire, Labour leader Sir Keir Starmer said the result was a "historic victory" for Labour in "the heart of Tory territory". He said: "We've had a positive campaign here and I am very, very proud to stand here as leader of the Labour Party to celebrate this historic victory. "And it is a historic victory - these are places where we would not have usually had a Labour Party success but we've been able to create that success and persuade people to vote for us." The local election results so far yielded a wealth of results for the parties to pore over with around 2,600 seats contested across 107 councils, 37 police and crime commissioners, and 11 local mayors. Results will continue to come in on Saturday and Sunday. Research by Sir John Curtice for the BBC estimates that, if the whole country had had an election on Thursday and behaved in a similar manner to those places that did, the outcome would be Labour on 34% and the Conservatives on 25%. Meanwhile, national polling puts Labour on as much as 20 points ahead of the Conservatives in general election intentions. Both Labour and the Liberal Democrats are now calling for Mr Sunak to call for a general election.

