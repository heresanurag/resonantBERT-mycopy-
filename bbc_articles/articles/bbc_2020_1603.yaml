title: 'Oscars 2020 pictures: The best of the ceremony - BBC News'
date: '2020-02-10'
section: In Pictures
url: http://www.bbc.co.uk/news/in-pictures-51294945
content: |-
  The ceremony saw history being made as the first non-English language film won the main award.

  Singer-songwriter Janelle Monae kicked off the ceremony with a performance of A Beautiful Day In The Neighborhood, the title song from the film of the same name. The film stars Tom Hanks, who was nominated for best supporting actor.
