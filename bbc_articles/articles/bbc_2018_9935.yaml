content: |-
  Rooftop camera captures moment car crashes into barrier outside Parliament.

  A rooftop camera captured the moment a car crashed into a security barrier outside Parliament.

  The crash happened just after 07:30 BST on Tuesday morning. One man has been arrested on suspicion of terror offences.

  Several people were injured in the incident.
