  Watch the moment diplomats in Geneva turned their backs on Sergey Lavrov as he spoke via video link.

  Watch the moment when diplomats at the UN walked out as Russian Foreign Minister Sergey Lavrov made a speech via video link on Tuesday.

  As Mr Lavrov spoke to the UN Human Rights Council, officials left the room, with Ukrainian representative Yevheniia Filipenko holding her country's flag outside.
