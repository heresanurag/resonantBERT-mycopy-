title: Man charged after Thames Valley Police officer hurt in crash - BBC News
date: '2025-05-27'
section: England
url: http://www.bbc.co.uk/news/articles/clynkzqw3nwo
content: |-
  Simranjit Kajla is charged with attempted murder after the suspected hit-and-run.

  Thames Valley Police said PC Christopher Miller, 38, suffered very serious injuries

  A man has been charged with attempted murder after a police officer was critically injured when he was struck by a car. PC Christopher Miller, 38, has been in hospital with life-threatening injuries since the incident on the B416 in Stoke Poges, Buckinghamshire on Thursday night. Thames Valley Police arrested two men, aged 28 and 38, from Slough, Berkshire, on suspicion of attempted murder and causing serious injury by dangerous driving. Simranjit Kajla, 28, has now been charged with attempted murder, the force confirmed on Tuesday.

  He has also been charged with causing serious injury by dangerous driving, driving whilst disqualified and using a motor vehicle on a road without insurance. Mr Kajla is scheduled to appear at Reading Magistrates' Court on Tuesday. Another man from Slough, 38, was arrested on suspicion of attempted murder and causing serious injury by dangerous driving. Officers were granted a warrent of further detention while investigations took place but he has since been released on police bail. A man, 43, also from Slough, was arrested on suspicion of assisting an offender and perverting the course of justice but has been released under investigation.

