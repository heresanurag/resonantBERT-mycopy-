title: Eagle eyes spot kestrel chicks in jet plane exhaust - BBC News
date: '2021-07-27'
section: Wales
url: http://www.bbc.co.uk/news/uk-wales-57992207
content: |-
  The young birds "lucky to be alive" after found hiding in exhaust of an Airbus plane during repairs.

  The birds were found in the exhaust pipe of a power unit on the Airbus A320 plane

  A pair of kestrel chicks are "lucky" to be alive after they were found nesting in a jet plane's exhaust system.

  The birds had not eaten for several days when engineers spotted them in the Airbus A320 undergoing repairs in the Vale of Glamorgan.

  RSPCA Cymru later rescued them before they were sent to Gower Bird Hospital for rehabilitation.

  RSPCA Insp Simon Evans said: "I have no doubt they were rescued just in the nick of time."

  He added: "Kestrels are less common than a lot of people think - but rescuing any animal from an aircraft is certainly a new one on me."

  Kestrel numbers declined in the 1970s, with about 46,000 breeding pairs now in the UK.

  The chicks had not eaten for days when they were discovered, the RSPCA said

  "We're just so very lucky mechanics hadn't started the aircraft's engine or this would have ended in disaster," said Insp Evans.

  The passenger aircraft had been on a runway at St Athan's Bro Tathan business park for almost a year, and had been brought into a hangar for repairs.

  During maintenance work technicians Umit Atas and Luciano "Lucky" Ferriera spotted two pairs of eyes from inside the exhaust of an auxiliary power unit.

  The birds have since been nicknamed Umit and Lucky - after their rescuers.

