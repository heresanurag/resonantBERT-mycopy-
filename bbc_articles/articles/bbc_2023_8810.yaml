  Robert Jenrick says that taxpayers must come first - but denies conditions for asylum seekers are poor.

  It's time US writers asserted their rights - Cox

  Laura is chatting to the panel about what we've just heard - and actor Brian Cox says he "absolutely" agrees with Tom Hollander that striking writers in the US should "go for it". Cox says: "They are the prime forces of what we do - we can't do anything without the writers". He adds: "Unfortunately producers are the ones who behave rather badly, they are the ones who are the manipulators and sometimes the writers get pushed to the tap end of the bath. "It's time they asserted their rights," he says. The huge successes of The White Lotus and Succession is down to the writers, he says - "they're the ones who have done it." On the wealth and opulence depicted in these shows he says "everybody loves to hate and these are extremely hateful people".
