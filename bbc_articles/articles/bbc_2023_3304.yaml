content: |-
  Newcastle manager Eddie Howe says he has "not sought any assurances" after fresh questions are raised about the club's ownership.

  Eddie Howe: Newcastle United manager has 'not sought any assurances' after fresh questions over ownership Last updated on .From the section Newcastle

  Howe has not sought assurances on Newcastle United owners Newcastle manager Eddie Howe says he has "not sought any assurances" after fresh questions were raised about the ownership of the club. The Premier League approved the takeover by Saudi Arabia's Public Investment Fund (PIF) after receiving "legally binding assurances" that the Saudi state would not control the club. But in a US court case this week, Newcastle chairman Yasir Al-Rumayyan has been described as "a sitting minister of the government" with "sovereign immunity". Human rights group Amnesty International has since urged the Premier League to "re-examine the assurances" made in the Newcastle takeover. "It was always stretching credulity to breaking point to imagine that the Saudi state wasn't directing the buyout of Newcastle with the ultimate aim of using the club as a component in its wider sportswashing efforts," said Peter Frankental, the group's UK economic affairs director. The Premier League has declined to comment.
