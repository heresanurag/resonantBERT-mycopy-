  • None A year on from Newcastle United takeover, what has the impact been? Howe says he has had "very open communication" with "various people connected to the board" since being appointed in November 2021, a month after the PIF's takeover. "But my conversations with them are all football-related," he added on Friday. "At no stage has it ever gone political. "That's not my area, I don't want it to be my area, I want to concentrate on how I can improve the team. "Now obviously, if I felt there was a time I needed to ask a question, I could. But I haven't done that. "For me, my job is training the players. The minute I deviate from that is the minute I go into dangerous waters. "The focus comes on me because I am sat here every week. It's not a conversation for me to brief on these matters because I'm not qualified to do it. "I've not given it too much time. I'm aware of the headlines, but I haven't really invested in the details behind them." The statements have been made by lawyers representing LIV Golf, owned by the PIF, which also has a controlling stake in Newcastle. Why was the PIF's takeover approved? The PIF initially withdrew from its takeover bid for Newcastle in July 2020 as a result of an "unforeseeably prolonged process", before the deal was revived. The takeover was only approved in October 2021 after the Premier League received "legally binding assurances" that the Kingdom of Saudi Arabia would not have any control over the club. The dispute had centred over who would have controlling influence at Newcastle, and would therefore be subject to the league's owners' and directors' test. Premier League chief executive Richard Masters told the BBC in November 2021 that if his organisation found evidence there was state involvement in the running of Newcastle "we can remove the consortium as owners of the club". Premier League CEO Richard Masters talks to BBC sports editor Dan Roan about the Newcastle United takeover However, lawyers representing LIV Golf have said during US court proceedings that Al-Rumayyan is "a sitting minister of the Saudi government". A San Francisco court has approved the PGA Tour's request to include Al-Rumayyan and the PIF as defendants in its lawsuit against LIV and ordered them to produce documents in the case. However, the PIF is challenging the order, arguing the fund and its governor Al-Rumayyan "are not ordinary third parties subject to basic discovery relevance standards". A court document reads: "The order is an extraordinary infringement on the sovereignty of a foreign state that is far from justified here. "They are a sovereign instrumentality of the Kingdom of Saudi Arabia and a sitting minister of the Saudi government, and they cannot be compelled to provide testimony and documents in a US proceeding unless their conduct - not LIV's or anyone else's - is truly the 'gravamen' of the case." The PIF has declined to comment while Newcastle have been contacted.
