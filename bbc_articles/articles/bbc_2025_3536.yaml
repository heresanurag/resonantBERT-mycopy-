title: 'Elianne Andam murder: Hassan Sentamu jailed for life - BBC News'
date: '2025-03-13'
section: London
url: http://www.bbc.co.uk/news/articles/ckg8ly1wr8ro
content: |-
  Hassan Sentamu repeatedly stabbed the 15-year-old with a kitchen knife outside a shopping centre.

  Hassan Sentamu attacked Elianne while she was on her way to school

  A teenager who repeatedly stabbed 15-year-old Elianne Andam in a row over a teddy bear has been ordered to spend at least 23 years in prison for her murder. Hassan Sentamu, then 17, attacked her with a kitchen knife outside a shopping centre in Croydon, south London, in September 2023. Giving him a life term at the Old Bailey, Mrs Justice Cheema-Grubb said: "The pain of her loss to her parents and younger brother is indescribable. She will always remain just 15 - she will never realise the potential of her life." The court heard that Sentamu, who had a history of attacking girls and carrying knives, killed the popular schoolgirl in front of other children, shoppers and commuters.
  • None 'There are many angry boys like my cousin's killer'

  He had admitted manslaughter but was found guilty of murder after a jury rejected his claim that his autism affected his ability to exercise self-control. The trigger for his actions was his "short temper and aggressive tendencies", while he had also made a "deliberate decision to carry a knife", the judge said at the sentencing hearing, which was televised. As Sentamu was sent down, there were angry shouts from the public gallery.

  The shocking story of Elianne Andam who was stabbed to death at a bus stop outside a shopping centre in a row about a teddy bear.

  Elianne Andam was repeatedly stabbed while trying to stand up for her friend

  Earlier, Elianne's family described their "living nightmare" in a series of statements read to the court. Mother Dorcas Andam said: "Elianne was my world, she was the kindest most loving daughter I could have asked for; she was vibrant, creative and purposeful. "She loved deeply, loved to sing, to braid hair always practising new style. Our home was full of her music, laughter and energy. There was always warmth and joy when Elianne was there. "Now the music has stopped, the laughter has gone - all that is left is a deafening silence that echoes through my life."

