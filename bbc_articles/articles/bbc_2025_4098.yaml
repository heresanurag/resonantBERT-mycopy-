  Aston Martin have invested a lot of money in people, facilities and resources. Does money guarantee success in F1? - Anil Money is required to succeed in F1, but it does not guarantee success. The example always held up on this subject is Toyota's F1 programme, which ran from 2002-9. It is widely regarded to have had the biggest budget ever, but the team failed to win a single race. There were a bunch of reasons for this - and never having a true top-level driver was certainly one of them. But most would agree the fundamental issue was that corporate Toyota was too involved in the team, with too many layers and strictures of management, depriving it of the dexterity and fleet-footedness required of any F1 team operating at the highest level. At its heart, F1 success is about finding the right people, putting them in the right places, and empowering them to produce the best of themselves. An approach perfectly demonstrated by McLaren's rise from backmarkers to world champions in the last couple of years. As Alonso said in Australia, Aston Martin now have all that is required for success. They have a state-of-the-art new factory - including a driver-in-the-loop simulator, and a wind tunnel that has just become operational - and have signed Adrian Newey, the sport's greatest ever designer, to lead an expensively assembled technical team. But now they have to put all that together and prove they can compete with teams that have been at the front for years. "The package is completed now," Alonso said. "We will need time. This is not football. Football is very easy - you take the best pitch, the best manager, the best players and eventually you win maybe the next match. "In F1, you can have the best facilities, the best people, but you still need time to put the ingredients together and win, and we have so many examples in F1 history."

