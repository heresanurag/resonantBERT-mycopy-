title: 'Tokyo Olympics: Elaine Thompson-Herah last woman standing as epic boils down
  to duel - BBC Sport'
date: '2021-08-01'
section: Olympics
url: http://www.bbc.co.uk/sport/olympics/58042056
content: |-
  The 100m royal rumble never emerged. Instead it was a whole lot less global and whole lot more personal as Elaine Thompson-Herah overhauled Shelly-Ann Fraser-Pryce.

  This video can not be played To play this video you need to enable JavaScript in your browser.

  The same city, the same distance, but a different script. Thirty years ago, Tokyo saw perhaps the greatest 100m race of all time. Under the lights, in front of a capacity crowd, the globe stopped spinning for slightly less than 10 seconds as American great Carl Lewis won the world title in a world record time.

  Carl Lewis wins the 1991 World Championships in a world record time of 9.86 seconds

  Behind him, a tenth of a second covered a top six who hailed from three different continents. It was a finish-line crowd scene with a character for everyone. A month ago, it seemed the women's race at this Tokyo Games might match it.

  In one corner, the brash 21-year-old American newcomer Sha'Carri Richardson. In the other, the eternal golden oldie Shelly-Ann Fraser-Pryce. The great British hope Dina Asher-Smith, the injury-ravaged defending champion Elaine Thompson-Herah, the wildcard 400m convert Shericka Jackson, the in-form Nigerian Blessing Okagbare. A tangle of storylines and a blizzard of sub 11-second times.

