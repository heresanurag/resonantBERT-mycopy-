  In the end, we got our drama. Just not the one we expected. As Thompson-Herah lay on her back and her shrieks of delight rang around the empty Olympic Stadium stand, it was the final twist in a slimmed-down two-hander. The sprawling epic never emerged. It turned out personal, rather than global. The cast list had begun to be whittled down long before the final destination of the finish line. Richardson's threat was blunted a month ago by a positive test for cannabis. A day before the final, Okagbare was removed for failing a test for human-growth hormone. A couple of hours before, Asher-Smith revealed a hamstring problem had nobbled her chances. And five seconds into the final, it was down to two.

  This video can not be played To play this video you need to enable JavaScript in your browser.

  Thompson-Herah's golden locks flying in her wake, Fraser-Pryce's tequila sunrise dye-job streaking through the humid air and clear daylight back to the rest of the field. Gold hung in the balance. But only for a moment. Thompson-Herah's shoulders stayed loose and her stride stayed long. Fraser-Pryce's frame tensed and her chance of a third Olympic 100m title slipped over the horizon. Fraser-Pryce's time of 10.74 would have won all but two previous Olympics finals, but it was never going to be enough in Tokyo. Thompson-Herah was comfortable enough in the final few strides to point to the clock, showing a time matching the second-fastest in history, and salute the finish-line photographers. Her celebrations were socially distanced. Fraser-Pryce and Jackson completed a Jamaican clean sweep, but seemed in no hurry to congratulate their compatriot. Tensions that have simmered on the domestic scene were laid open for an international audience. Fraser-Pryce split from long-term coach Stephen Francis last year, taking up with Reynaldo Walcott. Thompson-Herah stayed with Francis, turning from stable-mate into rival. Thompson-Herah's post-race comments were heavy with that history. "I see all the bad comments, I take all of my losses, all of my defeats and I use them as my motivation," she said.

  The two will likely renew their rivalry down the same stretch of track in Tuesday's 200m final. They will attempt to put it all to one side when relay medals are up for grabs on Friday. That event may be Fraser-Pryce's last hurrah at a major championship. She turns 35 later this year. Her son Zyon turns four. She has a foundation to run., external A degree to put to use. But into the void, comes a new generation. Asher-Smith claims, before injury, she was in a shape to beat the fastest in the world. Richardson, banned for just a month, has been tweeting trash from the sidelines. Jackson is 27, but in only her first year concentrating on the 100m.

