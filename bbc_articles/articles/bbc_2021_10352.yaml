  All, along with 29-year-old Thompson-Herah, will be back for more. In the World Championships in Oregon in a year's time. In Paris, for another Olympics, in three. The rivalries will match Tokyo 1991. Thompson-Herah suggested, like Lewis, she could yet break the world record. "I'm still working on it. It's a work in progress. Anything is possible," she said of the prospect of claiming Florence Griffith-Joyner's 33-year-old mark of 10.49 seconds. And maybe in the super-spike era it is. Maybe this event could even be the one to drag athletics back towards the golden age it enjoyed in the early 1990s. That really would be something.

