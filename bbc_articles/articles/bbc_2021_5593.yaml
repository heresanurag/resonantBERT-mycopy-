  • None Villarreal have reached the final of a major European competition for the very first time, having been eliminated from each of their previous four semi-finals - Uefa Cup/Europa League in 2003-04, 2010-11, 2015-16 and Champions League 2005-06.
  • None Having progressed from each of their first six semi-finals in major European competition, Arsenal have been eliminated from three of their four appearances at this stage in Europe since (2008-09 Champions League, 2017-18 & 2020-21 Europa League).
  • None Since the competition's rebranding in 2009-10, Unai Emery has reached the final of the Europa League on more occasions than any other manager (5 - 2013-14, 2014-15, 2015-16, 2018-19 & 2020-21) - indeed, the Spaniard has won the competition on three of the previous four occasions he has reached the final.
  • None Arsenal have failed to reach the final of a major European/domestic cup competition for the first time since 2015-16 (reaching the 2016-17 FA Cup, 2017-18 League Cup, 2018-19 Europa League & 2019-20 FA Cup finals since).
  • None Villarreal remain unbeaten in 14 games in European competition (W12 D2), last suffering defeat in April 2019 (0-2 v Valencia in the Europa League quarter-final 2nd leg).
  • None Arsenal have failed to score in 10 home matches within a single season in all competitions for the first time in the club's history.
  • None This was Villarreal's first goalless draw in Europe in 21 matches, since a stalemate against Rangers in November 2018.
  • None Arsenal have failed to win in three consecutive home matches in Europe (D2 L1) for the first time since September 2003 (a run of six).
