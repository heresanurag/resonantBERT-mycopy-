  Firefighters believe all have been started deliberately, and police are asking for video footage.

  Arson alert after four vehicle fires in four days

  Firefighters tackled this car fire early on Saturday in Rhosllanerchrugog

  Police have appealed for video footage after fires in four vehicles in four days in nearby north Wales villages. Firefighters said all were thought to have been started deliberately. They happened in the Ruabon and Rhosllanerchrugog areas of Wrexham county. The latest was early on Sunday in Ruabon, and North Wales Fire and Rescue Service said it managed to stop the flames spreading to two other vehicles parked close by.

  The fire service said it responded quickly early on Sunday and stopped flames spreading to two other vehicles near this one in Ruabon

  Johnstown Fire Station posted on Facebook after the third incident shortly after midnight on Saturday that the owner of the car had CCTV and "hopefully the police will be able to identify the culprit". North Wales Police urged anyone with footage to "review around the time of the incident and report anything suspicious".
