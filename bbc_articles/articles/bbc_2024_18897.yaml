  The incident happened on Thursday evening at Renmore Barracks in County Galway.

  The incident happened at Renmore Barracks on Thursday evening

  A teenage boy has appeared in court in Galway charged in connection with the stabbing of an Irish army chaplain at Renmore Barracks. The 16-year-old, who cannot be named for legal reasons, appeared before Galway District Court on Saturday afternoon. He is charged with assault causing harm in relation to the incident on Thursday evening. The victim, Fr Paul Murphy, who is in his 50s, is recovering in hospital after an operation for serious but not life-threatening injuries.

  An Garda Síochána (Irish Police) stated in court that there could be further charges as the investigation continues and objected to an application for bail due to the seriousness of the offence. A detective also told the court that the accused was believed to be a flight risk. Judge Gerard Furlong refused bail on the basis of the seriousness of the case and the strength of the evidence outlined. The teenager was remanded in custody at Oberstown Children Detention Campus, and is expected to appear in court again on 20 August.
