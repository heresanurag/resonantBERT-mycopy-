title: 'Venezuela protests: Statue toppled and armed police deployed - BBC News'
date: '2024-07-30'
section: General
url: http://www.bbc.co.uk/news/videos/cjm9x3ggwgzo
content: |-
  Videos show opposition protesters in multiple locations taking to the streets.

  Thousands of Venezuelans have taken to the streets of Caracas and elsewhere, after President Nicolás Maduro claimed victory in the country's disputed election.

  Videos show crowds gathered in the Venezuelan capital as riot police faced off with demonstrators, while in Coro a statue of former president Hugo Chávez was toppled.

  he opposition has disputed Mr Maduro's declaration of victory, deeming it fraudulent and saying its candidate Edmundo González won convincingly with 73.2% of the vote.
