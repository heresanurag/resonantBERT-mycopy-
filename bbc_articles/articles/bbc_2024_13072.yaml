title: 'Wales tour to Australia: Regan Grace included in 34-strong squad - BBC Sport'
date: '2024-06-24'
section: Welsh Rugby
url: http://www.bbc.co.uk/sport/rugby-union/articles/c4nnnkr7rk3o
content: |-
  The rugby league convert is a surprise inclusion in Wales' 34-strong squad along with fellow uncapped pair Efan Daniel and Josh Hathaway.

  Regan Grace could make his professional rugby union debut against Australia

  Regan Grace is a surprise inclusion in Wales' 34-strong squad to tour Australia in July. The rugby league convert was only called into the training squad last week as a replacement for injured Keelan Giles. The 27-year-old switched codes in 2022 but serious Achilles injuries have delayed his competitive rugby union debut - which could now come against the Wallabies. Grace is among three uncapped players named by head coach Warren Gatland, including Cardiff hooker Efan Daniel and Gloucester wing Josh Hathaway. Dewi Lake has been named captain, despite the return of Six Nations skipper Dafydd Jenkins, after impressing against South Africa. But Wales have been hit with a front-row injury crisis following the loss of Henry Thomas, Keiron Assiratti and Elliot Dee.

  Wales, who have lost their last seven Tests, have not beaten the Wallabies in Australia since 1969 but Gatland remained upbeat. "I’m excited about this Wales squad. We’re expecting two fiercely contested Test matches but we are relishing the challenge," he said. "We are focusing on getting better as a group. This is a young squad that’s still learning at this level. "There are lots of positives that we can build on from the weekend and there are also areas that we will be working hard to address over the next few weeks."

  This video can not be played To play this video you need to enable JavaScript in your browser. Josh Hathaway: Gatland keen to see what Gloucester back has to offer Wales

  Grace, Hathaway and Daniel look set to become the latest new Wales caps this summer. Gatland handed Test debuts to scrum-half Ellis Bevan, centre Eddie James, fly-half Jacob Beetham and lock James Ratti against South Africa on Saturday. Port Talbot-born Grace spent six hugely successful seasons in rugby league with St Helens where he won three Super League Grand Finals and the Challenge Cup, and represented Wales. He joined French rugby union side Racing 92 in 2022 but was sidelined by injury before signing with Bath in February. Aberystwyth-born Hathaway, who has represented Wales and England at under-20 level, offers options at full-back and wing. Daniel joins fellow Cardiff hooker Evan Lloyd in the squad having been called up just a day after Sam Parry controversially walked out of camp.

  Gatland's resources in the front row have taken a battering in the past week. Having overlooked experienced Ospreys prop Nicky Smith, he lost Thomas to a foot problem in training and now Assiratti to a back injury in Saturday's loss to South Africa. Dillon Lewis, a veteran of 57 caps, is included but Archie Griffin and Harri O'Connor have just three Test appearances between them. It is a similar story at hooker with Ryan Elias rested and Parry departing the squad last week having been told he was a fringe player in the original squad. But the loss of Dee to an ankle injury means captain Lake is supported by Cardiff pair Daniel and Lloyd, who also have just three caps between them. Lewis is among a handful of senior players returning to bolster Wales having missed the South Africa match played outside the official Test window. Exeter pair Jenkins and Christ Tshiunza, Leicester flanker Tommy Reffell and Saracens centre Nick Tompkins are all likely to return to the starting Test team. However, Wales are still without key players, Jac Morgan, Taulupe Faletau, Tomos Williams, Adam Beard, Will Rowlands, Josh Adams and Gareth Anscombe either through injury or being rested. The 34-strong squad features ten players from Cardiff, the largest contingent from one club. But with Ratti's exit, the group includes just three players from the Ospreys, the only Welsh side to qualify for the knock-out stages of both the United Rugby Championship and Europe this season.
