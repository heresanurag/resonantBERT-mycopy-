  But several mayors express frustration at not having the power to make it compulsory.

  The UK's vaccine drive has been a success - but many challenges remain

  With two out of three UK adults now fully vaccinated against Covid, the UK is one of the most vaccinated countries in the world - but many challenges still remain. The spread of the Delta variant and a sharp rise in cases as restrictions are lifted means vaccinating as many people as possible before the onset of autumn is now urgent. A third of adults, mostly people in their 20s and 30s, are not yet fully protected. But there are other communities where uptake is low, for example some ethnic minorities, particularly people from black backgrounds, those living in some poorer areas and working in certain jobs, who have not yet been jabbed. Convincing them to come forward and get a vaccine will help increase the height of the wall of immunity which is going to help hold back the tide of hospital admissions come the winter. Every adult in England has been offered at least one dose, but only 87% have had one. That gives an indication of the scale of challenge ahead. Even with one of the fastest vaccination programmes on the planet, the UK is not out of the woods yet.
