id: bbc_2018_164
title: Man dies after wife robbed at Saltcoats newsagent - BBC News
date: '2018-01-13'
section: Glasgow & West Scotland
url: http://www.bbc.co.uk/news/uk-scotland-glasgow-west-42674572
content: |-
  A man dies suddenly after hearing that his wife was caught up in a robbery at a newsagent.

  A 71-year-old man has died after running to the aid of his wife who was being robbed at a shop in Ayrshire.

  Police said the robbery happened at Wylie's Newsagent in Springvale Street in Saltcoats at about 15:40 on Friday.

  A man entered the store and threatened the 63-year-old shop worker with a knife before demanding money and fleeing with a small amount of cash.

  It is understood the worker's husband heard about the robbery and ran to the shop, where he collapsed.

  He was taken to Crosshouse Hospital, but pronounced dead a short time later.

  Police said the woman was uninjured but left very distressed.

  A post-mortem examination to determine the cause of the 71-year-old man's death is due to take place and a report will be submitted to the procurator fiscal's office.

  The suspect who robbed the shop is described as white, 5ft 8in tall, with a medium build. He was wearing a blue rain jacket with the hood up, blue jeans and a black scarf covering his face.

  Det Insp Fraser Normansell said: "This was a very traumatic experience for the 63-year-old shop assistant who not only suffered the ordeal of the robbery itself but also witnessed the elderly man collapsing in the aftermath of the incident.

  "It is vital that we trace the culprit and stop him from causing any further harm and distress and as such I urge anyone who was in the vicinity of Springdale Street in Saltcoats around 15:40 hrs on Friday 12 January 2018 and may have seen the suspect hanging around the area to contact police at Saltcoats immediately."

  He added: "I also appeal to any drivers who were in the area to check their dash cams as they may have captured the suspect on their camera. If so, I ask that they also contact police urgently."
