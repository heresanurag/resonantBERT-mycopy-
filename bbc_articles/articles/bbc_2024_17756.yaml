title: 'Hathras stampede: Event organiser surrenders to police - BBC News'
date: '2024-07-08'
section: Asia
url: http://www.bbc.co.uk/news/articles/c725dxwdx19o
content: |-
  Nearly 121 people died in a crush at a religious gathering in the northern Indian state of Uttar Pradesh.

  Family members of stampede victims mourn outside a hospital in Hathras, Uttar Pradesh

  The chief organiser of a religious gathering in northern India where 121 people were killed in a crush has surrendered to police, his lawyer says. The incident in Uttar Pradesh state last week is one of the deadliest such disasters in the country in more than a decade. Nearly all those killed were women and children who were attending the satsang - a Hindu religious gathering. Chaos broke out at the end of the event as many in the crowd rushed towards the preacher leading the overcrowded congregation as he was about to leave in his car. The tragedy has sparked outrage in India, leading to questions about lapses in safety measures and crowd management. On Thursday, police said they had arrested six people who were part of a group that organised the event in Hathras district.

  More than 120 people were killed in a crush at the religious event

  On Friday night, police said they had arrested Devprakash Madhukar, the main organiser of the event, in the Najafgarh area of the capital, Delhi, and handed him over to police in neighbouring Uttar Pradesh state. However, AP Singh, a lawyer for the preacher Bhole Baba who led the congregation, later said Mr Madhukar had surrendered to the police. "We told you that we would surrender Devprakash Madhukar, take him in front of the police, interrogate him, participate in the investigation, and take part in the inquiry," he told ANI news agency. "We have handed him over to the special investigation team and the Uttar Pradesh police. Now a thorough investigation can be done." Mr Madhukar was produced before a local court and sent to 14 days in judicial custody. He is a key suspect in the police complaint and is facing charges of attempted culpable homicide. The complaint said officials had given permission for 80,000 people to gather, but some 250,000 people turned up to the event.
  • None What we know about the India crush that killed 121 The police report says thousands of devotees ran towards the preacher's vehicle as he was leaving and began collecting dust from the path in an act of devotion. Mr Singh, however, denied blame and told the BBC the crush occurred "due to some anti-social elements". He blamed a "criminal conspiracy hatched against" his client. He also denied reports that security guards at the festival had triggered panic by pushing away people who tried to get Bhole Baba's blessing. A three-member judicial inquiry commission has been established to investigate the incident.
