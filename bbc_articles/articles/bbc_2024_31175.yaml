title: Eddie Howe grants dying Newcastle United fan's wish - BBC News
date: '2024-12-18'
section: General
url: http://www.bbc.co.uk/news/videos/crmn4g47lyzo
content: |-
  Steven Hunter says it is "an absolute pleasure" to have met the Magpies' boss.

  Newcastle United manager Eddie Howe has made a dying fan's wish come true.

  Steven Hunter, who has terminal cancer, was invited to meet Howe at St James' Park following a press conference, and described it as "an absolute pleasure".

  He also took the opportunity to give the Premier League side's boss some pointers, urging him to start Sandro Tonali in Wednesday's fixture against Brentford.

