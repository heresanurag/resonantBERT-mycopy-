title: Netball winner jokes that praise from Beckham 'better than gold' - BBC News
date: '2018-04-22'
section: Newsbeat
url: http://www.bbc.co.uk/news/newsbeat-43783221
content: |-
  The coach of the England netball team tells Newsbeat how one of her star players reacted to winning gold at the Commonwealth Games.

  Helen Housby is mobbed by team mates after scoring the winning goal for the England netball team at the Commonwealth Games

  The coach of the England netball team has told Radio 1 Newsbeat how one of her star players reacted to winning gold at the Commonwealth Games.

  Tracey Neville's team won gold for the first time after a last-second goal by Helen Housby.

  Tracey says the shooter told her David Beckham commenting on her Instagram was "actually better than winning gold".

  If you look down the comments on Helen's feed, you can see David Beckham's "congratulations".

  Helen Housby described David Beckham's comments as "better than winning gold"

