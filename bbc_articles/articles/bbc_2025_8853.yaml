content: |-
  Nottingham Forest striker Taiwo Awoniyi undergoes surgery on a serious abdominal injury suffered in last Sunday's Premier League match with Leicester.

  Taiwo Awoniyi has scored 19 goals in 83 appearances in all competitions for Forest

  Nottingham Forest striker Taiwo Awoniyi has had "urgent" surgery on a serious abdominal injury sustained in Sunday's Premier League match with Leicester. The Nigeria international, 27, collided with the post in the 88th minute of the 2-2 draw at the City Ground as he attempted to get on the end of a cross from Anthony Elanga. He received treatment on the pitch and was able to continue but was visibly struggling when the match restarted. "The club can confirm Taiwo Awoniyi has undergone urgent surgery following an abdominal injury sustained during Sunday's match against Leicester City," said a Forest statement., external "Everyone at Nottingham Forest sends their best wishes to Taiwo. The club will provide further updates when appropriate."

  To play this video you need to enable JavaScript in your browser. This video can not be played 'Owners should not be the central characters'

  Awoniyi, who joined Forest from Union Berlin in June 2022, had only been on the pitch for five minutes having come on as a late substitute for Ibrahim Sangare. Forest owner Evangelos Marinakis indicated in an Instagram, external post that his decision to march on to the pitch at the full-time whistle had been in part due to his view on how the injury suffered by Awoniyi had been handled. "Everybody - coaching staff, players, supporters and including myself - we were frustrated around the injury of Taiwo and the medical staff's misjudgement on Taiwo's ability to continue the game," Marinakis said. "This is natural, this is a demonstration of the passion we feel for our club." Awoniyi, who was at Liverpool between 2015 and 2021 but never made a senior appearance, has scored once in the Premier League for Forest this season.
