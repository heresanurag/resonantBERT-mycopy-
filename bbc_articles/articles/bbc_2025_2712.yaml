content: |-
  The president will soon have to decide whether to match his trade rhetoric with action or shelve his tariff plans.

  Trump faces moment of reckoning on trade after delaying tariffs

  This video can not be played To play this video you need to enable JavaScript in your browser. Watch: 'We're not treated well by Canada' - Trump on tariff negotiations

  For the first week of Donald Trump's presidency, tariffs - a favourite talking point during last year's presidential campaign - were the dogs that didn't bark. Trade seemed to take a back seat while the new administration pressed ahead on immigration enforcement, pardons of Capitol riot convictions, a fossil-fuel energy policy and federal workforce upheaval - among a range of other disruptive new measures. That all changed this past weekend when Trump announced sweeping 25% tariffs on US allies Canada and Mexico, along with 10% duties on Chinese imports. And while he has since delayed imposing those tariffs on his North American neighbours for a month after both countries agreed new border measures, the president still faces a moment of reckoning in which he will ultimately have to decide whether to match his rhetoric with action. Trump often talks of the trade deficits between the US and its two neighbours as a key source of his dissatisfaction. If that's the case, then no amount of new border security or drug seizures - whatever the metrics or specific demands - will make the president fully abandon his tariff threats. Trump has also said he views tariffs not just as a tool to achieve policy objectives, but as a permanent source of US revenue and a means to fund government programmes and reduce the budget deficit. And if that is his ultimate objective, then tariffs on America's largest trading partners may be the only effective answer. Global financial markets reeled at this prospect on Monday, as the US appeared on the brink of waging a multi-front trade war with some of its closest economic partners.

  This video can not be played To play this video you need to enable JavaScript in your browser. Watch: 'I'm getting angry and anti-American' - Canadians on tariff threat

  Then, after conversations with Mexican President Claudia Sheinbaum and Canadian Prime Minister Justin Trudeau, Trump put the tariffs on pause. While the new duties on China have gone into effect - and have prompted retaliatory measures from Beijing - markets have viewed those US moves as less disruptive and smaller in scope. By contrast, if US had engaged in an escalating series of tariffs with Canada and Mexico, which accounted for more than $1.57tn (£1.24tn) in goods in 2023, the global economic effect could have been catastrophic. That possibly dire development has been averted, for now, with Trump and his administration declaring at least a partial victory. The details of what Canada and Mexico conceded, however, paint a more complicated picture. While Canada agreed to form a joint anti-crime strike force with the US and appoint a "fentanyl tsar", the concrete steps it detailed were all part of a border-security package Canada had previously announced. Mexico pledged stepped up drug enforcement and 10,000 troops to patrol the US-Mexico border - but those numbers mirror the deployments the nation made in 2019 and again in 2021 In a month's time, Trump will again have to decide if Canada and Mexico are doing enough to satisfy his demands - or whether the delayed tariffs will go into effect. Solid figures demonstrating progress, however, may be hard to come by.
