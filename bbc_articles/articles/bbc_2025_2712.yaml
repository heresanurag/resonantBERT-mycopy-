  Global financial markets have calmed considerably since Monday morning's tariff-inspired disruption. Investors, it seems, have concluded that on trade Trump is more bluster than action. The president may be able to extract more concessions from Canadian and Mexican leaders in a month's time, but they may also conclude at some point that Trump doesn't have the will to follow through on his threats. Despite claims of success, his sabre-rattling on trade could ultimately produce diminishing returns. At that point, the president would have a decision to make. Does he shelve his most sweeping tariff plans for good? Were his dreams of returning the US to late-19th century trade policy - which he has said was a golden age of American economic power - unrealistic? Or does he press ahead with his vision of a new, more America-focused global trade order despite the risk of at least short-term economic pain? That moment of reckoning has been delayed. But it is coming.

