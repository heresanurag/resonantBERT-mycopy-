  • None Who won and lost as Trump's trade war is delayed - for now By the administration's own measures, US immigration officials only seized 43lbs (19.5kg) of fentanyl and caught 193,540 people crossing at the US-Canada border in 2024. The numbers are much higher for the US-Mexico border, but undocumented crossings - and drug seizures- are down there, as well.

