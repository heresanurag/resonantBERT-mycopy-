  Elsewhere, world number one Iga Swiatek won bronze in the women's tournament. The Pole was left in tears on Thursday after her 25-match winning streak on the Paris clay was ended by China's Zheng Qinwen. That defeat meant Swiatek missed out on the gold-medal match. However, she was back in action on Friday, breezing past Slovakia's Anna Karolina Schmiedlova 6-2 6-1 in just 61 minutes to add Olympic bronze to her five Grand Slam titles. It is Poland's first Olympic medal in tennis. Czech pair Katerina Siniakova and Tomas Machac won the mixed doubles gold, beating China's Wang Xinyu and Zhang Zhizhen 6-2 5-7 10-8. Canadians Felix Auger-Aliassime and Gabriela Dabrowski beat Demi Schuurs and Wesley Koolhof of the Netherlands to take the bronze.
