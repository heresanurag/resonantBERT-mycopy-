content: |-
  Newcastle United striker Alexander Isak becomes the seventh-fastest player to reach 50 Premier League goals.

  'What he's done is amazing' - Isak reaches landmark to join elite list

  Alexander Isak has scored 50 goals in the Premier League

  Newcastle United's thrilling 4-3 victory against Nottingham Forest was significant for several reasons, not least that Alexander Isak joined an elite group of players. Isak's two goals on Sunday, while certainly not vintage, took him to 19 Premier League goals this season. Three more and it will be his best campaign at the club. The Sweden striker's second goal against Forest was also his 50th in the Premier League, a tally achieved in just 76 top-flight games. Only six players in the competition's history have joined the 50 club quicker, which is testament to how good Isak has been. "What he has done is amazing. In the modern game, he is right up there as one of the top strikers anywhere, not just in the Premier League," former England goalkeeper Joe Hart told BBC Match of the Day. "He's so fit and so quick and he is always such a threat because he scores all sorts of goals. "He's different to all of those players above him on that list [of quickest to 50 Premier League goals] and that is part of what makes him so hard to stop. "What I really love about him is that it's not just in front of goal where he looks good. He's clinical of course, but he is a team player too. "He's a gem for Newcastle and at 25 he is still young, still hungry and he can still get even better." So who scored 50 Premier League goals in fewer games than Isak? BBC Sport takes a look at the names on that elite list.

  Not content with breaking the record for the most goals in a single Premier League season (36) during his first campaign with Manchester City, Erling Haaland scored 12 in his next 12 matches before reaching the half-century point after just 48 games. He obliterated the previous record for the number of games taken to score 50 Premier League goals that had stood for 28 years. It will take some beating.

  Andy Cole set that record while playing for Manchester United. In March 1995 United became the first team to score nine goals in a Premier League game with a 9-0 demolition of Ipswich, with Cole scoring five of them. Remarkably Cole had scored just five goals in his previous 19 league games, but his fifth of the afternoon took him to 50 in his 65th game. The first player to score five goals in a Premier League match, Cole went on to score 187 goals in the competition.

  It should come as no surprise that the Premier League's all-time leading goalscorer was fast out of the traps. It took 66 games for Alan Shearer to score the first 50 of his 260 Premier League goals. He reached 100 in just 124 games in the competition, which is 17 games quicker than any other centurion in Premier League history. That said, Haaland is on track to beat him.

  Ruud van Nistelrooy comes in at fourth, taking 68 games to score 50 Premier League goals. The Dutchman reached his half-century in August 2003 thanks to a goal against Newcastle, also the 10th successive Premier League game in which Van Nistelrooy scored. That set a new competition record until Leicester's Jamie Vardy scored in 11 successive Premier League games in 2015. Van Nistelrooy, now managing Vardy at Leicester, went on to score 95 goals in 150 Premier League appearances.

  Fernando Torres was incredible during his first three Premier League campaigns, and he reached reached the 50-goal landmark in just 72 outings. He ended his Liverpool career with 65 goals in 102 league appearances when he completed a £50m transfer to Chelsea in January 2011. Unfortunately for the Spaniard he could not replicate that form in London, scoring just 20 times in 110 Premier League appearances for Chelsea.

  Mohamed Salah equalled Torres' 72-game record with two goals in Liverpool's 4-3 comeback win over Crystal Palace in January 2019. The Egyptian reached 50 goals in just 5,374 minutes, the fastest in terms of minutes played. Then Haaland came along and reached 50 in 3,827 minutes.
