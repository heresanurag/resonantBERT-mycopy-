title: LA vehicle swept into ocean as rain hits fire ravaged area - BBC News
date: '2025-02-14'
section: General
url: http://www.bbc.co.uk/news/videos/cdd98qedy4vo
content: |-
  Debris and mud flow pushes a fire department car into the Pacific as a rainstorm lashed LA county.

  Large debris and mud flow pushed a Los Angeles Fire Department (LAFD) vehicle into the Pacific Ocean in Malibu on Thursday.

  The LAFD member was able to leave his car and went to hospital with minor injures, fire officials said.

  The storm brought torrential rain to LA County, affecting fire-ravaged neighbourhoods and causing mandatory evacuation orders.
