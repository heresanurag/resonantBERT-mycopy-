  Bringing you the latest news from across England about the coronavirus pandemic.

  'Up to 10% of UK population may have been infected'

  Oxford University's Prof Christophe Fraser told the BBC's Andrew Marr between three and 10% of the population was predicted to have contracted coronavirus by this stage - up to six million people. Prof Fraser is working on developing an app which would allow for tracing people who had been in touch with those with Covid-19. Prof Fraser said the app helps deal with the problem of 50% of transmissions taking place from people who are infected but not yet showing symptoms. He said with the software, people could be alerted if they had come into contact with a person with symptoms, in which case they should observe stronger social-distancing, or a confirmed case which would mean going into isolation.
