title: 'Watch: Thousands celebrate Ipswich Town Premier League promotion - BBC News'
date: '2024-05-07'
section: General
url: http://www.bbc.co.uk/news/uk-england-suffolk-68964860
content: |-
  Blue smoke and cheers fill the air as people line the streets to greet their newly promoted heroes.

  Tens of thousands of people lined the streets to cheer Ipswich Town players on a parade to celebrate promotion to the Premier League.

  Video showed blue smoke from flares, singing and chanting as the open-top bus made its way through a packed town to Christchurch Park.

  The Tractor Boys secured promotion on Saturday with a 2-0 win over Huddersfield.
