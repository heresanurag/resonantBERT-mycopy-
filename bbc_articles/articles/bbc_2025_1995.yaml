  It's worked, too, at least commercially. According to Billboard, external, Apple Music confirmed $ome $exy $ongs 4 U's release broke first-day R&B streaming records on the platform. In Friday's official UK charts, the album came in at number three. Three of its songs also made up the top 40 - including Gimme A Hug. Critical reception, meanwhile, has been mixed. Vulture described it as, external "yearning pre-beef star finding his footing", with a sound "conscientiously re-establishing" his earlier aesthetic. Rolling Stone's Jeff Ihaza, in a three-and-a-half-star review, external, spoke of a "return to form from an artist whose back was truly against the wall". Pitchfork's Alphonse Pierre, external, however, was scathing, lambasting "a desperate album from one of rap's most notorious narcissists". Regardless, Borkowski is clear on the strategy - Gimme A Hug, like the album, isn't a response track, it's an abdication from the fight. A recognition that Drake can still win, just on a different rap turf.

  So, where is Drake headed if he's conceding the rap battlefield? The answer is the nostalgia play. Weeks before the release of this new album, Drake opened his Australian tour by coming out on stage in a vest with smoking bullet holes. He closed the show by declaring: "My name is Drake, I started in 2008, I came all the way from Toronto, Canada. The year is now 2025, and Drizzy Drake is very much still alive."

