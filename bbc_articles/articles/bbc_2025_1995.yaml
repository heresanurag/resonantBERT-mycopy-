  For music and culture journalist Manu Ekanayake, the new album revisiting his early 2010s era, when he "sounded confident in what he was trying to do", mirrors this. But, he warns, "after three recent albums of being the least convincing tough guy in town, can he really go back to being the singing party boy?". He's certainly going to try. Days after the album drop, Drake announced an unprecedented three-night takeover of London's Wireless Festival this summer, with each night's set focusing on a different part of his career. Organisers confirmed the dates sold out in record time. For Borkowski, this is a "masterclass in reframing". "Drake is curating his own legacy, reminding people of his longevity, and shifting the conversation away from defeat and back to dominance." Ekanayake is less sure of the long-term potential: "Now at 38, it all sounds very different from when he was in the first flush of success in his 20s. "What seemed before like a young artist giving hip-hop a new approach for a new generation, now sounds like it's the end of something."

  Drake's upcoming Wireless takeover is a "masterclass in reframing" says Borkowski

  But, ultimately, Borkowski goes back to the bottom line. "His fans aren't music purists, they're Drake fans - here for the lifestyle, the vibes, and the brand. And as long as he delivers that, nothing truly sticks." The true power move? Securing Live Nation for his rebrand, says Borkowski. "It's about staying relevant, ensuring the hits don't stop and keeping the machine running. In today's music industry, perception is currency, and despite the setbacks, Drake is still cashing in." Good thing too, as Lamar's Not Like Us shows no signs of slowing down on both sides of the Atlantic. The Compton star's already made US history by becoming the first rapper to have three albums in the Billboard top 10 - with his latest release GNX also number one. The battle may be over, but the chart war has just begun.
