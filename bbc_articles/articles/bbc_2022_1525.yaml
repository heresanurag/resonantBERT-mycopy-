  On Wednesday the Met Office said Storm Dudley would bring 70mph winds (110km/h) to Ceredigion, Conwy, Denbighshire, Flintshire, Gwynedd, Anglesey, Powys and Wrexham.

  It warned of damage to buildings, tree falls and power cuts.

  By 17:00, Snowdonia's Capel Curig had experienced gusts of up to 81mph (130km/h).

  Met Office forecaster Greg Dewhurst said: "Exposed areas in Scotland, Northern Ireland, parts of Wales and northern England have seen wind speeds largely between 60 and 70mph, but the worst affected areas have reached and even surpassed 80mph this afternoon."

  Natural Resources Wales also has flood alerts in place in south, mid and north Wales.

  The M48 Severn Bridge has been closed in both directions, between junction two on the A466 Wye Valley Link Road at Chepstow and junction one on the A403 at Aust, due to the strong winds.

  Traffic is believed to be coping well since the closure at 12:00. A diversion is in place via the M4 Prince of Wales Bridge.

  Transport for Wales said a trampoline was blocking the line at Cardiff East, affecting services to and from Cardiff Central.

  Gwent Police warned a tree was "completely blocking" the A4043 at Blaenavon shortly after 16:00.

  At Tesco on Cardiff's Western Avenue, part of the roof was damaged and some of the car park fenced off.

  Almost 600 homes were without power in Ystradgynlais on Wednesday afternoon, though this had dropped to 100 by 16:15.

  Western Power also reported a number of other power cuts.

