title: 'Storm Eunice: Wales set to be hit by 100mph winds - BBC News'
date: '2022-02-17'
section: Wales
url: http://www.bbc.co.uk/news/uk-wales-60399539
content: |-
  Storm Eunice could bring power cuts and a "very rare" red warning, forecasters say.

  This video can not be played To play this video you need to enable JavaScript in your browser. Wales was battered by heavy winds following the arrival of Storm Dudley

  Winds of up to 100mph could batter parts of Wales on Friday, with people warned to stay indoors.

  Storm Eunice is predicted to cause power cuts, damage to homes, coastal flooding and travel chaos.

  The Met Office has issued an amber warning for Friday because of strong winds, with the possibility of a "very rare" red warning for some areas.

  It comes after Storm Dudley caused power cuts, felled trees and blew a trampoline on to rail lines at Cardiff.

  Train firm GWR said: "The 14:22 Swansea to Paddington service struck an object on the line near Cardiff just after 16:00."

  Looking ahead to Friday, BBC weather presenter Sabrina Lee warned there could be winds of up to 100mph (160km/h) in coastal areas.

  This could cause flying debris, large waves and falling trees, with Ms Lee saying Friday is "not a day to venture out".

  She added: "We're still keeping an eye on the track of the storm. There is the potential for some areas to be included in a red wind warning. These sorts of warnings are rare."

  An amber warning has already been issued for Friday

  Natural Resources Wales warned there was potential for "many" flood warnings across all coastal areas.

  Duty tactical manager Ross Akers said: "Forecasted high winds could cause a storm surge and large waves which could lead to the overtopping of flood defences along the coast.

  "We are monitoring the situation very closely, but we are concerned that if the forecast does materialise, then we are likely to see significant flooding impacts in many places along our coastal areas.

  "Keep a safe distance from coastal paths and promenades as large waves can sweep you off your feet or you can be hit by debris."

  A yellow "be prepared" warning is already in place from 13:00 GMT Wednesday until 06:00 Thursday, covering parts of north-east, north-west and mid Wales.

  Storm Eunice is expected to affect all of Wales from 03:00 until 21:00 on Friday.

  Ms Lee added: "For inland areas there is the potential for gusts 60-70mph, possibly up to 90-100mph for some coastal locations."

