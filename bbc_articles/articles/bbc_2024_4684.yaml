content: |-
  The Pittsburgh Steelers trade for Chicago Bears quarterback Justin Fields - just a day after signing former Super Bowl winner Russell Wilson.

  Justin Fields is one of the most elusive quarterbacks in the NFL

  The Pittsburgh Steelers have traded for Chicago Bears quarterback Justin Fields - just a day after signing former Super Bowl winner Russell Wilson. After leaving Denver, Wilson, 35, was set to be Pittsburgh's new starter after they traded the incumbent Kenny Pickett to the Philadelphia Eagles. But now the Steelers have also brought in Fields, the Bears' starter since being a first-round draft pick in 2021. "Ready for this next chapter," the 25-year-old said on X., external "Can't say thank you enough to the city of Chicago for taking me in and embracing me." A mobile quarterback, Fields showed flashes of his athleticism during his first two years with Chicago, although some questioned whether he relied too much on his legs to escape pressure. After just three wins in 2022, Chicago had the first pick of last year's draft but kept faith in Fields by trading that pick to the Carolina Panthers for receiver DJ Moore and several draft picks. Those included Carolina's first-round pick this year, which turned out to be the first overall as the Panthers finished last season with the NFL's worst record.

  The Bears did improve to a 7-10 record and Fields leaned more on his passing game in 2023, throwing for 2,562 yards and 16 touchdowns, while his rushing yards almost halved from 1,143 to 657. But this time Chicago decided to move on from Fields - and that they could not pass up on that first overall pick a second time - especially with several quarterbacks being among the most highly-rated prospects in this year's draft class. "Thank you to the entire Bears organisation and ownership for allowing me the opportunity to be part of such a historic franchise," Fields added. "But most of all thank you to all my brothers that I played with. You all were the reason I attacked each day the way I did. I wish each one of you nothing but success." Pittsburgh, who have not had a losing season in 17 years under coach Mike Tomlin and were knocked out of the first round of last season's play-offs, have now overhauled their quarterback roster during free agency. As well as bringing in two of last season's starting quarterbacks, they have let go of Pickett and his back-ups Mitchell Trubisky (Buffalo Bills) and Mason Rudolph (Tennessee Titans), who both started games after Pickett suffered an ankle injury in December.

