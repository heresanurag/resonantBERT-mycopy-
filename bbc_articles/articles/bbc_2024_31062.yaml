  Forty years since the release of Last Christmas by Wham, Andrew Ridgeley reflects on the loss of his friend and song partner.

  Forty years since the release of Last Christmas by Wham, Andrew Ridgeley reflects on coming to terms with the loss of his friend and song partner, George Michael.

  He was speaking to BBC Breakfast's Sally Nugent and Jon Kay about a new documentary, looking at the story behind the song.
