title: University of Sussex fined £585,000 in transgender free speech row - BBC News
date: '2025-03-25'
section: Sussex
url: http://www.bbc.co.uk/news/articles/cn9vr4vjzgqo
content: |-
  The university is fined by the higher education regulator for failing to uphold freedom of speech.

  The University of Sussex has been fined £585,000 by the higher education regulator, the Office for Students (OfS), for failing to uphold freedom of speech. The OfS investigation started with the case of Prof Kathleen Stock, who left the university in 2021 after being accused of transphobia for her views on sex and gender issues. The OfS said the university's policy statement on trans and non-binary equality, including a requirement to "positively represent trans people", could lead to staff and students preventing themselves from voicing opposing views. The University of Sussex plans to legally challenge the OfS findings, vice-chancellor Prof Sasha Roseneil said.

  Describing the judgement as an "unreasonably absolutist definition of free speech", the university said the ruling would leave institutions "powerless to prevent abusive, bullying and harassing speech". The OfS, it added, had pursued a "vindictive and unreasonable campaign" against it. Universities UK, which represents 141 institutions, said it would be writing to the OfS to clarify what would represent a breach of freedom of speech rules. Chief executive Vivienne Stern said the University of Sussex ruling raised concerns about how universities can balance freedom of speech with other legal duties, like preventing harassment and hate speech. Education Secretary Bridget Phillipson said free speech and academic freedom were "non-negotiables" in universities. "I have been clear that where those principles are not upheld, robust action will be taken," she said. "If you go to university, you must be prepared to have your views challenged, hear contrary opinions and be exposed to uncomfortable truths. "We are giving the OfS stronger powers on freedom of speech so students and academics are not muzzled by the chilling effect demonstrated in this case." The OfS was given the power to issue fines where freedom of speech was not upheld at a university in January. Arif Ahmed, the OfS director for freedom of speech and academic freedom, said the decision to fine the university had followed a thorough investigation. It found, he said, that the policy had meant staff feared disciplinary action and that Prof Stock had changed the way she taught her course as a result. Dr Ahmed added that the OfS was "concerned that a chilling effect may have caused many more students and academics at the university to self-censor". The regulator said the Trans and Non-Binary Equality Policy Statement issued by the University of Sussex was looked at in the context of existing legal duties on freedom of speech, as well as the European Convention on Human Rights. In its report, the OfS found four elements of the policy to be "concerning". These included a requirement for course materials to "positively represent trans people and trans lives" and an assertion that "transphobic propaganda... [would] not be tolerated".

  Kathleen Stock has required security guards to ensure her safety

  Another part of the policy highlighted by the regulator said "transphobic abuse" would be a serious disciplinary offence for staff and students. It also looked at the management and governance of the university around freedom of speech. Prof Stock faced protests on the university campus after she published a book questioning whether gender identity was more "socially significant" than biological sex. Posters were put up on the campus calling for her to be sacked, and students turned up with placards at an open day. Prof Stock rejected accusations that she was transphobic and described the experience to the BBC as a "surreal anxiety dream". She resigned from her university post in 2021 and was awarded an OBE for services to education. The fine is the largest issued to a university and is likely to be seen as an intention to hold the line over the expression of legal views. In a strongly worded statement, the University of Sussex said the regulator had been determined to make an example of its case and "entrench an extreme libertarian free speech position". It added there had been no "substantive engagement" other than via written correspondence, and it accused the regulator of pursuing a "vindictive and unreasonable campaign". The policy at the heart of the investigation had been adapted from a template, according to the university, and had since been changed.

