title: 'As it happened: Care homes welcome plans to allow visitors - BBC News'
date: '2021-02-20'
section: UK
url: http://www.bbc.co.uk/news/live/uk-56137180
content: |-
  Regular visits will be allowed in care homes in England and Scotland from early March.

  Les and Audrey have been married for 66 years Image caption: Les and Audrey have been married for 66 years

  Relatives with loved ones in care homes have been reacting to news that they will be able to make visits from early March.

  In England, one designated visitor will be allowed, while in Scotland two will be permitted.

  Les Wood's wife Audrey, who has vascular dementia, has been in a care home for 14 months.

  "We haven’t so much as touched fingertips in a year," he tells the BBC.

  He says the care home where his wife lives has been "very strict right from the start, putting the safety of the residents first".

  "Their rules have normally been more restrictive than the government guidelines for which I have been grateful," says Wood, who lives in Deal in Kent.

  But he's hoping he will be able to visit her next month under the new rules.

  "I hope that Audrey’s care home will be able to follow the new guidelines from next month," he says.

  "If they don’t, I will be very disappointed but also supportive.

  "It’s horrendous for me. I feel totally cut off. I barely exist.”
