  Reeves also used her speech to announce new measures to target tax dodgers and help close the £39.8bn shortfall between the amount of tax owed and that which has actually been collected. The plans include recruiting 5,000 more tax officials over the next five years, with 200 new compliance officers set to start at HMRC in November.

  Labour's leadership team has also come under fire from one of their own MPs over accepting donations of clothes despite their six-figure salaries. Speaking ahead of her speech, Reeves said she could "understand why people find it a little bit odd that politicians get support for things like buying clothes". She said that while shadow chancellor a friend had given her clothes to wear on the campaign trail and for big speeches. She added that the donations had been declared but that she would not continue to accept such donations while a government minister.
