title: 'Mercury Prize: Indie band English Teacher win with debut album - BBC News'
date: '2024-09-06'
section: Culture
url: http://www.bbc.co.uk/news/articles/c8jlngl2wk4o
content: |-
  The Leeds band are the first act from outside London to win the prize for a decade.

  Indie band English Teacher have won the Mercury Prize for their debut album This Could Be Texas. The quartet, who formed while studying at the Leeds Conservatoire in 2020, are the first act from outside London to win the prize since Young Fathers in 2014. Judges said their album stood out "for its originality and character" and displayed a "fresh approach to the traditional guitar band format". On stage, lead singer Lily Fontaine thanked her mum, who created the artwork for the album.

  But otherwise, the band were seemingly lost for words. "We didn’t really plan this far," said Fontaine, as her bandmates looked on in disbelief.

  This video can not be played To play this video you need to enable JavaScript in your browser. English Teacher perform The World’s Biggest Paving Slab on Later... with Jools Holland.

  The group were one of three acts from Leeds on the shortlist, alongside jungle artist Nia Archives and singer-songwriter Corinne Bailey Rae. Fontaine said the band owed their career to the encouragement they'd received from local venues like the Hyde Park Book Club and the Brudenell Social Club, whose owner was thanked in the band's acceptance speech. "There's real support for musicians in Leeds at the moment," she said. "Venues are willing to take on new artists and I think that's integral to the health of the scene." "Without the support of the people in that scene, we wouldn't be here," added guitarist Lewis Whiting. Asked about the Mercury Prize's nine-year streak of rewarding Londoners, Whiting said: "It's kind of ridiculous. "There's so much going on outside London. Plenty of places in the north have thriving scenes and produce amazing bands. It's crazy it's been going on for so long." "Musicians from outside London don't really have the same opportunities," agreed Fontaine, "but if you look back over music from this country, Yorkshire in particular has thrown out some of our most prolific songwriters."

  English Teacher's prizewinning album is steeped in Fontaine's upbringing in Colne, East Lancashire - addressing social deprivation and political mismanagement, alongside themes of identity, love, loss and celebrity. "There was a lot of racism, but then a lot of beautiful landscapes. It's a really inspiring place, and there's a lot of places like that in the UK that never really get focused on, so it's nice for it to see the limelight," she told BBC News. Musically playful, the album combines Fontaines's partially spoken vocals with dreamy, Smiths-like guitar lines and complex polyrhythms, with the gorgeous The Best Tears Of Your Life building to a head-spinning wall of sound. Judges praised its "winning lyrical mix of surrealism and social observation", saying it had a "subtle way of wearing its musical innovations lightly". They added: "This Could Be Texas reveals new depths on every listen - the mark of a future classic."

  Charli XCX had been the bookmakers' favourite to win the prize

  The Mercury Prize, given to the best British or Irish album of the year, comes with a cash prize of £25,000. Aside from English Teacher, this year's nominees included: pop star Charli XCX with her club-centric, headline-grabbing album Brat; indie newcomers The Last Dinner Party for their debut Prelude To Ecstasy; Scottish dance act Barry Can't Swim; and East London rapper Ghetts. Eight of the shortlisted albums were debuts, including the first solo album by Beth Gibbons, who won the prize 29 years ago as part of Portishead. This year’s ceremony was held at the world-famous Abbey Road Studios in London and broadcast live on BBC Four and Radio 6 Music. The show typically takes the form of a live concert, featuring performances from each of the nominated acts, but it was scaled back after the prize lost its sponsor, the taxi company Freenow. "Despite efforts to match up with a suitable new partner, in what is clearly a tough arts funding environment, we weren’t able to secure one within the timeframe," said Dr Jo Twist, chief executive of the BPI, which organises the award. It is hoped the ceremony will return in full next year.

  Last year's award went to jazz band Ezra Collective. Previous winners also include Pulp, Elbow, PJ Harvey, Skepta, Dizzee Rascal and Wolf Alice

  Artists submit themselves for the prize, making it impossible to know whether acts who failed to make the shortlist were snubbed or simply declined to participate. Some of the records that didn't make the cut this year included Blur's comeback The Ballad Of Darren, The Pet Shop Boys' critically-acclaimed Nonetheless and PinkPantheress's trend-setting debut, Heaven Knows.
