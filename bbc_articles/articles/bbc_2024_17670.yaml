  Voters have turned out in large number to produce a shock result, writes the BBC's Hugh Schofield.

  French people reject the far right - again

  France's left-wing rejoiced when the first projections were published.

  The French have said it again: they do not want the far right in power. They gave them a big win in the European elections; they gave them a big win in the first round of this parliamentary election. But when it came to a vote that really counted, just as in the presidentials, they drew back from the brink. This surprise upset which has reduced the National Rally (RN) to third place – with perhaps 150 seats compared with predictions a week ago of nearly 300 – is due entirely to voters turning out in large numbers to stop them.

