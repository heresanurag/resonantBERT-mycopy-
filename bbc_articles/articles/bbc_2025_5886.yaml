title: Milton Keynes police shoot man dead at railway station - BBC News
date: '2025-04-01'
section: Beds, Herts & Bucks
url: http://www.bbc.co.uk/news/articles/c30qlrl8vvpo
content: |-
  Officers say they confronted a man who was carrying a knife outside the station.

  Officers said they did not believe there was further risk to the public "at this time"

  Police have shot a man dead outside a railway station after reports he was carrying a firearm. Officers were called to Milton Keynes Central Station at 12:55 where they say they challenged a suspect carrying a knife before shots were fired at him. A man who was nearby said he had heard a "very loud" shot, then seen armed officers giving medical assistance to the man on the ground. A Thames Valley Police (TVP) spokesperson said "life-saving actions" had been taken immediately but the man had been pronounced dead at 13:44.

  "There is not believed to be any further risk to the public at this time," the spokesperson added. The Independent Office for Police Conduct (IOPC) said it had sent investigators to the railway station after being notified by TVP. "TVP armed officers responded and challenged a white man who was carrying a knife outside the station," the police force said in a statement shared later in the day. "He moved at speed towards officers with the knife before a shot was fired by police."

  Co-op store worker Barentina Corredor said the incident was "quite shocking"

  Eyewitnesses told the BBC they had heard screaming between the police and suspect, and the man had refused to drop to the ground. Hever Marin said he had been on a phone call in the station building when he had heard the "very loud" shot. "So we went out to see and the next thing we saw was two armed cops trying to get some medical equipment to resuscitate the guy," he said. "They tried for at least 10 minutes. But the guy wasn't reacting." A picture, seen by the BBC, shows armed police providing medical aid to a man who is lying on the pavement close to the Pret A Manger cafe. Mr Marin continued: "It was very distressing because, we were just here... and any loose bullets could have impacted us." Co-op store worker Barentina Corredor said that when she had heard the noise, she had "thought we had to find a place where we could hide - I was scared". "They were trying so hard on CPR - it was quite shocking to be honest," she recalled.

  An IOPC spokesperson said it would review the actions and decisions made by officers

  Residents of flats above the station reported hearing a single loud noise before a large police presence arrived about 10 minutes later. Edith Brockbank, 67, said: "There was all sorts of activity trying to get people back, there was somebody trying to film it, the police were trying to tell them to go back." Shazna Muzammil, a councillor and Conservative group leader at Milton Keynes City Council, said she was "deeply shocked" by what had happened. "Our thoughts are with all those there and affected by it," she posted on X, external. "Very thankful to the police and emergency services for their swift response in keeping everyone safe." TVP is leading on the investigation and British Transport Police said officers would remain at the station overnight to reassure passengers and give assistance.

  Passengers are being ushered around a large police cordon outside the railway station

  However, barriers were put up obscuring some station exits, with pick-up and drop-off zones closed. Passengers could still access a taxi rank and buses. Crowds were, at times, being staggered entering and leaving the station. An IOPC spokesperson said it would "independently investigate all of the circumstances" of the shooting, including "the actions and decisions taken by the police". The police watchdog added: "It is in its very early stages and no further information is available at this time."

