content: |-
  More than 57,000 new cases were reported in the last 24 hours - the highest daily total to date.

  Is the UK now at the limit of easing lockdown?

  This is it. We are now, give or take, at the absolute limit of how much we can reopen society without a resurgence of coronavirus. This realisation at the heart of government is about more than delaying the opening of bowling alleys, it will define our lives for months to come - and probably until we have a vaccine. And I'm sorry to break it to parents, but the biggest question mark now is around the reopening of schools. Read more from James here.
