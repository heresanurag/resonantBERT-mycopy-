title: UN health chief at Yemen airport during Israeli air strikes - BBC News
date: '2024-12-26'
section: Middle East
url: http://www.bbc.co.uk/news/articles/clyj88rye1jo
content: |-
  Israel claimed responsibility for the strikes, saying it had targeted Houthi "military infrastructure".

  This video can not be played To play this video you need to enable JavaScript in your browser.

  The head of the World Health Organization (WHO) and other UN staff were at Yemen's international airport in Sanaa on Thursday during Israeli air strikes which are reported to have killed at least six people. WHO Director General Tedros Adhanom Ghebreyesus said they were about to board a plane when the attacks began. Houthi-run Saba news agency said three people were killed at the airport and 30 injured. It said another three people were killed and 10 wounded in the western Hodeidah province. The Iran-backed rebel group described the attacks - which also hit power stations and ports - as "barbaric". Israel's military said it carried out "intelligence-based strikes on military targets".

  Dr Tedros said he was unhurt after the bombardment

  It is unclear whether the fatalities were civilians or Houthi rebels. In a statement on X, Dr Tedros said he was in Yemen "to negotiate the release of UN staff detainees and to assess the health and humanitarian situation" in the country. He provided no further details about who the UN detainees were. Referring to the strikes on Sanaa's airport, he said: "The air traffic control tower, the departure lounge - just a few meters from where we were - and the runway were damaged. "We will need to wait for the damage to the airport to be repaired before we can leave," Dr Tedros added. "I regret the recent escalation between Yemen and Israel, and remain deeply concerned about the risk of further escalation in the region." he wrote on X. In a statement, the Israel Defense Forces (IDF) said its "fighter jets conducted intelligence-based strikes on military targets belonging to the Houthi terrorist regime on the western coast and inland Yemen". It targeted "military infrastructure" at Sanaa's airport as well as the Hezyaz and Ras Kanatib power stations, and sites in the Al-Hudaydah, Salif and Ras Kanatib ports on the west coast, the IDF said. In comments shortly after the strikes, Israel's Prime Minister Benjamin Netanyahu said it would "continue to cut off the terror arm of the Iranian axis of evil until we complete the job", adding "we are only just starting with [the Houthis]". Early on Friday, the IDF reported that one missile fired from Yemen was intercepted before crossing into Israeli territory. Mohammed Ali al-Houthi, head of the Houthis' supreme revolutionary committee, called Thursday's strikes on Yemen "barbaric" and "aggressive". He said that "confrontations with American and Israeli arrogance" will continue until the conflict in Gaza stops. Several people injured by the strikes at the airport in Sanaa told Houthi-run broadcaster Al Masirah that the runway was struck three times before the airport's control tower was also hit. One man, who identified himself as Dr Abbas Rajeh, said the police hospital he works in treated 10 patients after the attacks - one had already died, another was in critical condition, and others had minor injuries or broken bones.

  Iran described the strikes as a "clear violation of international peace and security". Houthi rebels have been attacking Israel since the first months of the Gaza war, which began in October 2023. A Houthi missile strike injured more than a dozen people in Israel last week. Israel has carried out intermittent strikes against Houthis in retaliation. Earlier this week, Israel's defence minister said the country was preparing to "strike hard" at the Houthis, warning it would "decapitate" the group's leadership. The Houthis are an armed political and religious group backed by Iran. The group has ruled large parts of western Yemen, including the capital Sanaa, since ousting the internationally recognised government in 2015.
