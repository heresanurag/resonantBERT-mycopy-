id: bbc_2025_12686
title: 'Newspaper headlines: ''Ceasefire agreed with Iran'' and ''war games'' - BBC
  News'
date: '2025-06-24'
section: The Papers
url: http://www.bbc.co.uk/news/articles/cgjg2l64e2yo
content: |-
  Trump's declaration of a ceasefire with Iran after its missile strikes in the Middle East makes front page news.

  The first editions of this morning's papers were published before US President Donald Trump's ceasefire announcement - but many of the American news websites have been following developments.

  President Trump has told NBC, external that he expects the ceasefire to "go forever", saying that he doesn't believe Iran and Israel "will ever be shooting at each other again".

  He says he has "got the job done" with a truce, which the New York Times reports even caught some senior members of his own administration by surprise, external. An official tells the outlet that the US bombings of Iranian nuclear sites at the weekend "set the conditions" for ceasefire talks.

  A source quoted on the website Axios says that once Iran had responded with an attack on an American air base, officials in Tehran notified the White House -through Qatar - that they would not carry out any further strikes, external.

  The unnamed insider says the Trump administration then agreed not to retaliate and said it was ready to negotiate. An American official tells the Washington Post that the Iranians "made it clear" to the US that they would be willing to re-enter talks on their nuclear programme.

  The Financial Times casts doubt on the White House's claims that the programme has been "obliterated" - reporting that it may have been "pushed into smaller, secret facilities which are harder to find".

  An Iranian insider tells the paper that "the enriched uranium is untouched" despite the US attacks.

  The Guardian publishes satellite images of Iran's main nuclear facility in the days before the strikes, which it says appear to confirm that some material had been "preemptively removed".

  The i Paper focuses on the UK's response to the situation in the Middle East - pointing out that the government has "hardened" its language against Iran.

  But the Sun highlights calls for the prime minister to get off the "moral fence". The Daily Mail says his failure to publicly back the US strikes at the weekend puts him at risk of being "marginalised on the world stage".

  "So whose side are you on, Sir Keir?" asks its headline.

  The Times reports that the Home Office believes that Iran could be funding - through proxies - the campaign group, Palestine Action.

  The paper says government officials are investigating the source of its donations, because of concerns about where the group is raising "the significant sums it requires for its legal costs".

  Palestine Action did not respond to a request for comment.
