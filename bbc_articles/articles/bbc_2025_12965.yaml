content: |-
  The festival's first full day of music is packed with rock stars, pop icons and surprise guests.

  Glastonbury gears up for The 1975, Alanis Morissette and more

  Matty Healy and his band The 1975 will headline Glastonbury for the first time on Friday night

  After two days of build-up, Glastonbury will open its main stages on Friday with performances from music stars including Alanis Morissette, Wet Leg, Rizzle Kicks, Denzel Curry, PinkPantheress, Loyle Carner and Busta Rhymes. The day will reach its climax when rock band The 1975 headline the Pyramid Stage at 22:15 BST, giving their only concert of the year. The band, fronted by Matty Healy, have reportedly spent four times their festival fee on a "specially designed set" for the show. Meanwhile, there's fevered speculation over the mystery acts on this year's bill, with Lewis Capaldi rumoured to be making a return to live music at the festival after a two-year hiatus.

  Lewis Capaldi has been dropping hints that he'll make his return to the stage at the festival

  The singer stepped out of the limelight in 2023 after a difficult performance at Glastonbury, where a combination of anxiety and Tourette's caused him to lose his voice. With a new single, Survive, which was released at midnight, the star is the presumed frontrunner to play the Pyramid Stage's "TBA" slot at 16:55. New Zealand singer Lorde opened the festival with an unannounced pre-lunchtime set to a packed crowd in the Woodsies tent.

  The 1975 will top the main stage bill on Friday, with fans hoping for a glimpse of their forthcoming sixth album, tentatively titled GHEMB (God Has Entered My Body). "It's such a big gig, and it's the only show that we're playing this year," their manager Jamie Oborne recently told the Money Trench podcast., external "Matty thought doing it in isolation would be a really powerful thing. I obviously agreed with him, as I often do."

  Tickets for the festival sold out in just 40 minutes last November, before the line-up had been announced. The majority of festivalgoers arrived for the gates opening on Wednesday, and were treated to an opening ceremony featuring theatre and circus performers in front of the Pyramid Stage that evening. Others started their festival with a "ravers to runners" 5k race on Thursday morning, braving a torrential downpour as they circled the site. And thousands of revellers spent Thursday night sampling the festival's nightlife, as the dance stages opened with DJ sets from acts like Confidence Man, Eliza Rose and BBC news analysis editor Ros Atkins.

  Watch the action from Glastonbury on the BBC

  This year's festival is expected to have a political dimension, too, with performances and talks addressing political upheaval, conflict in the Middle East, the climate crisis, and the rise of the far right. Among the speakers is former Match of the Day presenter Gary Lineker, who will take part in a panel called "Standing Up for 'Getting Along' in a World that's Being Pushed Apart". He told the festival's on-site newspaper The Glastonbury Free Press, external that the talk was inspired by the idea that "everything is done to try and divide us". "And I think if people can pull together - because I think most of us are decent human beings - then just a bit more kindness in the world would go a long way at the moment."

  A spectacular circus show served as the opening ceremony for this year's festival

  Festival founder Michael Eavis said he stood by the event's left-leaning ethos - which sees a share of profits go to organisations including Oxfam, WaterAid and Greenpeace. "I think the people that come here are into all those things," the 89-year-old told the Free Press. "People that don't agree with the politics of the event can go somewhere else."

