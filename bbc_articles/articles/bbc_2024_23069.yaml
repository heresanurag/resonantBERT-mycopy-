content: |-
  New Zealand centre Jordie Barrett injures the medial collateral ligament in his left knee and is a doubt for the start of their tour of the northern hemisphere.

  Barrett is the youngest of three brothers, along with Scott and Beauden, to represent the All Blacks

  New Zealand centre Jordie Barrett has injured the medial collateral ligament in his left knee and is a doubt for the start of the All Blacks' tour of the northern hemisphere. The 27-year-old, who will join Irish side Leinster in December on a short-term deal, limped off at half-time during New Zealand's 31-28 win over Australia on Saturday. "Jordie Barrett is out for this weekend and will be reassessed before the northern tour," said an All Blacks spokesman. New Zealand play England on 2 November before matches against Ireland, France and Italy on the following three weekends. The All Blacks conclude their Rugby Championship campaign against the Wallabies on Saturday.

  Barrett has had another impressive campaign, with the joint-fourth highest number of carries of any player in the tournament and only South Africa's Jesse Kriel managing more clean breaks. New Zealand are out of contention for the Rugby Championship, with South Africa and Argentina playing out a title decider in the South African city of Mbombela. Barrett was wearing a knee brace as he boarded a plane in Sydney at the weekend. Recovery from a media collateral ligament tear is usually around six weeks - a timeline that would take his return to action right up to the meeting with England at Twickenham's Allianz Stadium - although more severe tears can take longer. New Zealand have called up Crusaders' uncapped back Chay Fihaki as a replacement.
