title: 'Swansea: High-speed off-road bikes chased through city - BBC News'
date: '2024-07-04'
section: General
url: http://www.bbc.co.uk/news/uk-wales-68799256
content: |-
  Officers catch three motorcyclists racing through Swansea using "stinger" tyre puncture devices.

  A high-speed police chase involving three off-road bikers moving at dangerous speeds through city streets was captured on body-worn police cameras.

  Joshua Miller and Fraser Saunders, both 20, and Keiron Paton, 18, were given prison sentences and driving disqualifications.

  South Wales Police brought the chase, in the Mumbles area of Swansea on 27 January 2023, to an end using tyre puncture traps called stingers.
