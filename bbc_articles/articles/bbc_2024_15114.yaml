title: Boy, 13, arrested after stabbing incident in Witham, Essex - BBC News
date: '2024-07-14'
section: Essex
url: http://www.bbc.co.uk/news/articles/clkyln17d0no
content: |-
  Paramedics treat a child at the scene after an altercation involving several teenagers.

  A 13-year-old boy was arrested after a child was stabbed during an altercation involving several teenagers, police said.

  Officers from Essex Police were called to Collingwood Road, Witham, at 17:05 BST on Saturday.

  "It was reported one of the teenagers sustained an injury to their leg in the altercation, which was treated at the scene by paramedics," the force said.

  The 13-year-old boy was arrested on suspicion of attempting to cause grievous bodily harm, a spokesman added.
