content: |-
  Slovak PM Robert Fico is was shot a number of times in what officials call an assassination attempt.

  Slovak Prime Minister Robert Fico is in hospital after being shot a number of times in what officials are calling an assassination attempt.

  He is in a life-threatening condition and receiving treatment in hospital.

  Video shows him being wheeled into Banska Bystrica hospital after being airlifted there.
