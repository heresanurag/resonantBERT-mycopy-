title: 'Leo Gormley: Burns survivor smiles with brother''s help - BBC News'
date: '2018-02-03'
section: General
url: http://www.bbc.co.uk/news/uk-england-tees-42890074
content: |-
  Leo Gormley was left with life-threatening injuries following the fire in a shop.

  A man who suffered life-threatening burns in a fire has spoken of his fight to stop prejudice around disfigurement.

  Leo Gormley, from Sedgefield, County Durham, suffered the injuries at the age of 14, and had to endure people staring at him in the street.

  But help from his big brother Aidan convinced him to change his life.
