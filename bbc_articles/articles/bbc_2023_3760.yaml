title: Heavy snowfall causes disruption across Northern Ireland - BBC News
date: '2023-03-10'
section: Northern Ireland
url: http://www.bbc.co.uk/news/live/uk-northern-ireland-64903813
content: |-
  More than 200 schools are closed and many homes are without power after heavy snowfall overnight.

  That's it for our coverage of the disruption caused by heavy snow in Northern Ireland.

  Thanks for following along.

  While the cold weather is set to continue - with a yellow warning for ice continuing into Saturday morning - hopefully we've seen off the worst of it.

  Stay warm, stay safe and enjoy your weekend - we will leave you with this beautiful picture sent in by Deborah Anderson from Newcastle framed by the Mournes.
