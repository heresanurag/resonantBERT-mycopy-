content: |-
  Deborah Burns says she is unable to return to work at the hospital after the death of her son, William Hewes.

  Doctor 'betrayed' over son's death at her hospital

  William Hewes died of sepsis less than 24 hours after he arrived at hospital

  A doctor who rushed her seriously ill son to the east London hospital where she worked, and where he later died of sepsis, says she feels "betrayed" by the way her family were treated. William Hewes, 22, died within 24 hours of being admitted to Homerton University Hospital after his meningitis developed into sepsis in January 2023. Dr Deborah Burns said she had repeatedly queried the speed of his treatment and has since been unable to "go back and work for an organisation that doesn't acknowledge its errors and learn from them". A coroner has criticised the hospital but said she could not conclude if earlier treatment would have saved Mr Hewes. The hospital said it would learn from what happened.

  Mr Hewes became unwell at about 13:30 GMT on 20 January and said he felt cold and had a headache. His condition deteriorated during the afternoon and he got up after going to bed that night to tell his mother he felt very unwell and had bruising on his belly. Suspecting meningococcal sepsis, his mother rang the hospital emergency department to warn them she and her son were on the way.

  William Hewes (r) was the youngest of his siblings, Theo, Edward and Emily

  While at the hospital Dr Burns – who was a specialist in paediatrics at Homerton University Hospital – said she had asked staff on eight separate occasions if they had given him antibiotics. "I wasn't clock-watching but I knew they were not given straight away," she said. "I thought the nurse was prioritising other things, medication to treat his symptoms. It wasn't medication that was going to change the outcome of what he had." Giving evidence during the inquest, the medical staff who treated Mr Hewes said they did not recall Dr Burns asking for antibiotics eight times. Senior coroner Mary Hassell said she accepted Dr Burns' evidence on this point, although she believed hospital staff were not being deliberately untruthful but had not heard an instruction from the registrar to administer antibiotics and fluids, as well as medication for his symptoms. She added that Mr Hewes did not receive the antibiotics and fluids "with the urgency that he should have". Nevertheless, while delivering a narrative verdict she said the 22-year-old was already very unwell when he arrived at the hospital and it was not clear if would have survived had he been treated quicker.

