  Following her son's death, Dr Burns was told that Homerton University Hospital was going to investigate what happened. But months later she learned they had decided against an inquiry, as "there were no delays, there weren't any concerns about his treatment". She told the BBC she "couldn't understand why no investigation had been done... and also why I hadn't been informed of the outcome". Dr Burns added she had been unable to return to work as she had planned, due to the way she says the hospital has treated her family since her son's death. "I am now much more aware of the deeply ingrained, defensive culture within the NHS. I trusted them, I felt betrayed," she said. "It has been totally unnecessary. If it can happen to me, then I really worry for the general population." She now has a diagnosis of complex grief. "I haven't been able to walk away from this in the last two years," she explained. "And it's all deeply meshed with the loss of my very much adored youngest son."

  A coroner concluded Mr Hewes (l) did not receive antibiotics "with the urgency that he should have"

  The coroner said she would issue a prevention of future deaths report to Homerton University Hospital, calling on it to share the changes it had made since Mr Hewes' death. Solicitor Deborah Nadel, who represented Dr Burns during the inquest, said: "The coroner has made it very clear yet again how concerned she is about catastrophic errors in sepsis care. "How many more times must a coroner flag their concerns about hospital practices around sepsis, and how many more times must a lawyer flag the terrible impact on families for things to change?" A spokesperson for Homerton Healthcare NHS Foundation Trust said Dr Burns had "told us that our policies and processes for this situation are inadequate and detached and we are determined to learn from her experience. "This work will ensure a more personal response for staff members or members of their family who are patients here." The trust added an action plan had been drawn up after Mr Hewes' death, with changes introduced including making sure an intensive care doctor attends the bedside of a patient with suspected sepsis and delivering further training on recognising sepsis symptoms.
  • None a rash that does not go away when you roll a glass over it (non-blanching)
  • None finding it hard to breathe or breathing very fast
  • None feeling confused or finding it harder to talk that normal
  • None a weak, high-pitched cry that's not like normal
  • None being sleepier than normal or difficult to wake If you think you or someone you look after has symptoms of sepsis, call 999 or go to A&E.
