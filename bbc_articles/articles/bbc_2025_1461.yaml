title: Mystery over upturned campervan in Brittany - BBC News
date: '2025-02-19'
section: Europe
url: http://www.bbc.co.uk/news/articles/cx20evr9jnjo
content: |-
  Police are trying found out how the vehicle ended up with its bonnet in a ditch and its back in the air.

  Police in western France are investigating how a campervan ended up in an unusual position by the side of a road. Officers were shocked to find the abandoned vehicle with the bonnet in a ditch and the back against overhead power lines near the city of Saint-Malo on Saturday. In Facebook post, external later that day, they said they "sincerely hope [the driver and any passengers] are OK". Ouest-France newspaper quoted eyewitnesses as saying the driver and two other people left the scene after the accident. On Sunday, the driver reported to police and was unhurt, the report adds. Officers told the BBC that prosecutors had launched an inquiry.

  On the day of the accident, the driver of the tow truck that was called in to remove the campervan told the Ici news website: "I've never seen anything like it in my 22-year career." The BBC has approached Saint-Malo prosecutor's office for comment.
