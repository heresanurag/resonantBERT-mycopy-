content: |-
  "I see the highlight videos, but I'm never satisfied", says Crystal Palace midfielder Adam Wharton about his recent good form.

  'I see the highlight videos, but I'm never satisfied'

  Adam Wharton signed for Crystal Palace in last season's January transfer window

  Crystal Palace's current run of form was a distant dream at the beginning of the season. The Eagles have lost just two of their past 16 games and had a five-game winning run end with a 1-1 Premier League draw at Southampton on Wednesday, while they are also in the FA Cup semi-finals. Before that match at St Mary's Stadium, 12th-placed Palace had won six consecutive away games without conceding a goal. Head coach Oliver Glasner put the poor run of form at the start of the season down to several reasons, including key players being involved in major tournaments, late signings and the loss of Michael Olise to Bayern Munich in the summer. Another factor in that slow start may have been the fitness of midfielder Adam Wharton. The 21-year-old signed for the Eagles in February 2024 and hit the ground running, playing a crucial part as Palace won six of their final seven games in the Premier League and securing a place in the England squad for Euro 2024. However, Wharton was managing a groin issue at the beginning of this season which then required surgery, keeping him out for two months and missing 14 Premier League games. "I'm still not where I want to be fitness-wise. I haven't played a full 90 minutes since I have been back," Wharton told BBC Sport. "I'm getting there each game but feeling better within myself and feeling like I can move more freely."

  Wharton played a key role in Palace's 3-0 win over Fulham in the FA Cup quarter-finals

  Wharton says that although results at the beginning of the season did not go Palace's way, he always believed the Eagles would improve. "We knew that if we kept at it the results would start turning," he says. "We thought the confidence would then get better and better. "We have the togetherness as a group. We know that if we play how we can play then we can beat any team." Since his return Wharton has produced a number of eye-catching performances and it is common to see edits of his best moments - such as a pirouette against Fulham - on social media. His friends enjoy sending him highlight reels, too. "You can't get too ahead of yourself with them," he adds. "It's easy to take from a 90-minute game two minutes of good things or two minutes of bad things. "You just have to keep level-headed and go into every game as though nothing has happened and it's a fresh start. "I've never really come out of a game thinking '[I'm] satisfied with my performance'. I've not had a perfect performance, I probably never will. "Sometimes you might think 'I've done pretty well', but then I always think 'I could have done this better, I could have done that'. "I will watch them and it's usually just the good clips so it's pretty good to watch. I always know that there's somewhere I have not done the right thing."

  Wharton trained with the England senior squad during the recent international break

  When Wharton was selected for England's Euro 2024 squad, manager Gareth Southgate said the midfielder was the type of player the Three Lions had missed "for seven or eight years", and praised his forward-thinking game. "[It's] just the way I play football," says Wharton. "When I was younger I used to play as more of a 10 - more of an attacking midfielder - so I probably know how you play that position. "But if I have got the ball and the striker is an option then I'm going to pass to him as he's the one that scores the goals. "If I can pass it forward to a player that can be effective, score goals, create chances, get assists then I don't see why I shouldn't pass it to them. "I'm not going to dribble through five people and put it in the top corner, that's just not my game." The former Blackburn Rovers player was in the England Under-21s squad for the recent international break, but trained with the senior squad under new England manager Thomas Tuchel, who has been a frequent visitor at Selhurst Park to watch Palace. "It is obviously good to be involved with the senior team. It's good to try and leave an impression and train with the best players in the world," says Wharton. "He [Tuchel] was speaking to me more in general, just about how it has been coming back from injury and things like this. It was good to be there but now I'm just focusing on playing more games and helping the team."
