title: Police officer with PTSD teaches therapy dog to surf - BBC News
date: '2020-09-08'
section: General
url: http://www.bbc.co.uk/news/uk-54079887
content: |-
  Kirsty Coy-Martin says teaching her therapy dog, Scooter, to surf has helped her deal with PTSD.

  Kirsty Coy-Martin has recently been diagnosed with post-traumatic stress disorder (PTSD) after 23 years serving as a police officer, including many years on a child abuse investigation team.

  She says teaching her therapy dog, Scooter, how to surf has changed her life.

  She now hopes to bring surf therapy to the emergency services.

