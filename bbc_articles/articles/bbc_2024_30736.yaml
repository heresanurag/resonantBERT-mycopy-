  The EU has condemned, external the "brutal, unlawful force from the police" and foreign ministers are due to consider measures against the government when they meet on Monday. The US state department has already imposed visa restrictions, external on Georgian officials, including government ministers and police. Protesters have called on the international community to impose sanctions on top government officials as well as Bidzina Ivanishvili, Georgia's most powerful man. Pro-government groups have also waged a campaign of harassment towards civil society activists, beating them outside homes, and carrying out arbitrary arrests.

  "There is systematic torture, inhuman and degrading treatment of citizens," said former public rights defender Nino Lomjaria. Theatre workers who joined the protests on Friday chanted: "The police are everywhere, justice is nowhere."
