  Kendall also announced work capability assessments, which are used to determine whether someone is fit to work and if they can receive additional benefits payments because of a health condition or disability, would be scrapped in 2028. She said the assessments were "complex, time-consuming and often stressful for claimants", as well as being based "on a binary can-can't work divide". In the future, financial support for health conditions will only be available through the Pip assessment, based on the impact of someone's health condition rather than their capacity to work. Reassessments to determine whether someone is still eligible for benefits will increase, although those with the most severe conditions that will never improve will not be reassessed.

  From April next year the extra amount of universal credit for a health condition or disability will be frozen for existing claimants until 2029/30 and cut by almost half for new claimants. There will be an additional premium for people with severe, lifelong conditions that mean they will never work. Meanwhile, there will be a permanent, above-inflation rise to the standard allowance of universal credit – equivalent to a £775 annual increase in cash terms by 2029/30. The government will also introduce a "right to try" to guarantee that people who try out a job will not lose their existing benefits if it does not work out.

  The Disability Benefits Consortium, which represents more than 100 charities and organisations, said: "These immoral and devastating benefits cuts will push more disabled people into poverty, and worsen people's health." The SNP said the measures would "harm the most vulnerable" and "mark the start of a new era of austerity cuts". Debbie Abrahams, the Labour MP who chairs the Commons work and pensions committee, argued there were "more compassionate ways to balance the books rather than on the back of sick and disabled people". However, other Labour MPs agree with the government that there is a moral case for reforming the welfare system to encourage people into work. The Conservatives said the changes were "too little, too late" and needed to be "tougher". Shadow work and pensions secretary Helen Whately asked why the government was only planning to save £5bn annually, when the total bill for health and disability benefits is forecast to rise to more than £100bn a year by 2029/30. Liberal Democrat work and pensions spokesman Steve Darling said: "If the government was serious about cutting welfare spending it would get serious about fixing health and social care and the broken Department of Work and Pensions." Some of the changes will require new legislation, raising the prospect of a rebellion by some Labour MPs during votes in Parliament. However, the size of the government's majority limits the threat from a vote.

