title: Benefits crackdown unveiled with aim to save £5bn a year by 2030 - BBC News
date: '2025-03-18'
section: Politics
url: http://www.bbc.co.uk/news/articles/c89y30nel59o
content: |-
  Measures include restricting eligibility for disability payments and cutting benefits for health conditions.

  Benefits crackdown unveiled with aim to save £5bn a year by 2030

  The government has unveiled sweeping changes to the benefits system, aimed at saving £5bn a year by 2030. Work and Pensions Secretary Liz Kendall said the overhaul would create a more "pro-work system" to encourage people to take up jobs, while protecting those who cannot work. The changes will make it harder for people with less severe conditions to claim disability payments. Extra benefit payments for health conditions will also be frozen for current claimants and nearly halved for new applicants. And people aged under 22 could be prevented from claiming universal credit top-up payments for health conditions.

  The government has not given a precise breakdown of the forecast savings but the bulk are expected to come from changes to eligibility for disability payments. The overall benefits bill will continue to rise - but Kendall told the BBC the changes would put welfare on a more "sustainable footing" by getting people into work. Spending on health and disability-related benefits has ballooned since the Covid pandemic, and has been forecast to increase from £65bn a year currently to £100bn by 2029. The proposals, external are the result of months of work but they have become more urgent with the worsening economic backdrop, which has made it more difficult for the government to meet its self-imposed rules on borrowing and spending.

  Charities and some Labour MPs are worried benefit cuts will push disabled people into poverty. The government responded to their concerns by scrapping plans to freeze personal independence payments (Pips), which provide extra living costs for people who have a long-term physical or mental health condition. But Kendall said eligibility for Pips - the main disability benefit in England, Wales and Northern Ireland - would be tightened from November 2026. It will become harder to qualify for the daily living component of Pip, which is for people who need help with everyday tasks and starts at £72.65 a week. There will be no change to the mobility component, for those who need help getting around. Kendall told the BBC details on how many people would be affected would be set out alongside Chancellor Rachel Reeves' Spring Statement next week. The Resolution Foundation think tank has estimated between 800,000 and 1.2 million people could lose support because of restrictions on claiming Pip.

