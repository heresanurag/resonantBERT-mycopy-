  At one point, it felt like the fear of being in the war zone was blunted by her grief. “I didn’t care any more... You just understand that there are many more people waiting for you in the next world, if it exists, than there are here with you.” The Ukrainian soldiers at Azovstal finally surrendered on 20 May. Valeria found herself among the 900 prisoners of war forcibly taken by the Russian military out of Mariupol. “We stared through the windows of the bus at those buildings we loved, at those streets we knew so well. They destroyed and killed everything I loved – my city, my friends, and my husband.” Valeria survived 11 months of Russian captivity, and has told of torture and abuse. Andriy often appeared in her dreams.

  In April last year, she was released as part of a prisoner exchange, and is now back in Ukraine. It is difficult to to say how many people were killed as a result of the Russian shelling of Mariupol, but local authorities say the number exceeds 20,000. According to the UN, 90% of residential buildings were damaged or destroyed, and bodies are still in the rubble. As far as Valeria knows, her husband's body remains at the Azovstal steel plant in the now-occupied city. Sometimes, she says, she looks to the sky and speaks to him.
