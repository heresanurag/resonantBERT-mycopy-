title: Hardy Suffolk swimmers enjoy a Christmas Day dip - BBC News
date: '2024-12-25'
section: Suffolk
url: http://www.bbc.co.uk/news/articles/cjr2zlp15gqo
content: |-
  Felixstowe, Lowestoft, and Southwold swimmers are drying off after braving the chilly North Sea.

  The Christmas Day dip in Felixstowe, Suffolk raised money for St Elizabeth Hospice

  Hundreds of hardy swimmers braved the teeth-chattering temperatures of the North Sea as they took part in fundraising festive swims across Suffolk. The Christmas Day dippers, including some in fancy dress outfits, dived headfirst into the waters off the coast of Felixstowe and Lowestoft. Held in aid of St Elizabeth Hospice, the 20th anniversary of Felixstowe's swim saw swimmers charge into the sea before heading home to tuck into their turkey. Everyone Active's Lowestoft swim, meanwhile, celebrated its 45th anniversary, as it once again aimed to raise thousands for local charities.

  Hundreds of people took part in Christmas Day swims, including in Lowestoft, Suffolk

  Some of the swimmers in Lowestoft were in fancy dress

  Donna Taylor, Everyone Active's general manager at Waterlane Leisure Centre, in Lowestoft, said: "It was fantastic to play our part in this amazing community event, which raises money for brilliant charitable causes as well as getting people of all ages active. "There was a lovely, friendly atmosphere generated by the participants and those who came down to support them, and our congratulations go to everyone who took part.”

  Organisers said more than 650 people took part in the Felixstowe event

  Father Christmas costumes were popular among many of those taking part in Felixstowe

  James Fox-Golding, of St Elizabeth Hospice, based in Ipswich, said: "A massive well done and thank you to all our incredible dippers who take part in this year's Christmas Day Dip – which saw a record number of dippers braving the chill for the hospice."

  Penguin costumes combined with tinsel were also on display

  Volunteers ensured the event in Felixstowe could go ahead, with a record turn out this year

  Elsewhere in the county, Southwold also hosted a Christmas Day swim, with all participants receiving a medal. Since 2012, the event has raised more than £38,000 for local charities.

