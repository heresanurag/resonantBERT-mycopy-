title: Mae Muller gets surprise call from Ringo Starr! - BBC News
date: '2023-05-12'
section: General
url: http://www.bbc.co.uk/news/entertainment-arts-65572099
content: |-
  Before the ex-Beatle rang her, a choir burst into song with her Eurovision entry, I Wrote A Song.

  UK Eurovision entrant Mae Muller has had a double surprise on the streets of Liverpool ahead of the Eurovision Song Contest final.

  During an interview with the BBC, a choir burst into song with her Eurovision entry, I Wrote A Song.

  Then one of Liverpool's most famous sons sent her a good luck message.
