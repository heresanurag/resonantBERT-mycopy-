id: bbc_2024_8170
title: BBC Verify examines video from Israel's attack on Iran - BBC News
date: '2024-04-19'
section: General
url: http://www.bbc.co.uk/news/world-middle-east-68859774
content: |-
  Footage showing explosions in the sky over Iran has been analysed by BBC Verify.

  Israel has launched strikes on Iran, according to US officials. This follows Iran’s attack on Israel a week ago.

  BBC Verify has analysed videos sent to BBC Persian which show a succession of flashes in the sky.

  The explosions are said to be above the Iranian city of Isfahan.
