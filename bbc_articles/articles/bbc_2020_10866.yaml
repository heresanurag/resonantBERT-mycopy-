title: 'Coronavirus: New local lockdown in Wales - BBC News'
date: '2020-09-16'
section: Wales
url: http://www.bbc.co.uk/news/live/uk-wales-54176265
content: |-
  Details and reaction as extra restrictions are announced for Rhondda Cynon Taf.

  Thanks for following our live coverage of the Welsh Government's press briefing on the coronavirus pandemic.

  Today, another 240,000 people will be preparing for restrictions to their daily lives, as a local lockdown begins in Rhondda Cynon Taf at 18:00 BST on Thursday.

  The measures mean no one will be allowed to enter or leave the area without reasonable excuse, while pubs and bars will have to close at 23:00 BST every night from tomorrow.

  The restrictions will be reviewed in two weeks' time.

  What we also learned today:
  • There have been no new deaths with coronavirus in Wales for the 15th day running, but there have been 199 new cases
  • A number of pubs and bars have been closed in Rhondda Cynon Taf after breaching coronavirus regulations
  • Up to five extra mobile testing centres will be deployed this week to cope with local hot spots
  • There will be an extra 5,000 NHS beds - half in field hospitals - to cope with winter pressures, and any second wave of coronavirus
  • Health Minister Vaughan Gething decided not to include his own mother in his so-called bubble, due to the risk he posed to her as he meets so many people

  We'll keep you updated on the coronavirus situation in Wales via the BBC Wales News website and social media channels.
