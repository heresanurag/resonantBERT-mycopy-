title: Long-lost siblings' emotional meeting at Dublin Airport - BBC News
date: '2024-05-18'
section: General
url: http://www.bbc.co.uk/news/uk-northern-ireland-69028103
content: |-
  Long-lost siblings - one from Londonderry, one from Canada - meet for first time in Ireland.

  Given up for adoption, Billy Scampton didn't know he had a sister.

  But the Derry man was overjoyed to meet Shannon Leet from Ontario earlier this month.

  “I can’t believe I have my sister here in Ireland, sitting in my house in Derry. It is just beyond the stuff of dreams.”
