title: Search for presenter Michael Mosley continues for fifth day - BBC News
date: '2024-06-09'
section: Europe
url: http://www.bbc.co.uk/news/articles/c3gg127nkdwo
content: |-
  Presenter and journalist Dr Michael Mosley has not been seen since vanishing on the Greek island of Symi on Wednesday.

  Search for Michael Mosley continues for fifth day

  The search operation for missing TV and radio presenter Michael Mosley is continuing for a fifth day on the Greek island of Symi. The 67-year-old vanished on holiday after setting off on a walk on Wednesday. Searches for the presenter have focused on a rocky area north of the village of Pedi where he was last spotted. On Saturday, his wife Dr Clare Bailey Mosley said "we will not lose hope".

  She said in a statement it has been "the longest and most unbearable" time for her family" and thanked Greek authorities and the people of Symi for their efforts. "We will not lose hope," she said. Dr Bailey Mosley has been searching the island assisted by friends. The couple's four children have also arrived on Symi to help. Michael Mosley went missing on Wednesday after leaving his wife on Agios Nikolaos beach to set off on a walk about 13:30 local time (11:30 BST). His wife later reported Dr Mosley, who was without his phone, missing.

  This video can not be played To play this video you need to enable JavaScript in your browser. New CCTV appears to show Michael Mosley walking towards rocky hills

  BBC News obtained new CCTV footage showing one of the last-known sightings of man believed to be Dr Mosley walking with an umbrella next to the marina in the village of Pedi at about 14:00 local time (12:00 BST) on Wednesday. The video showed him walking along a path towards rocky hills. This is where Greek police, firefighters tourists and local volunteers are searching for Dr Mosley. On Sunday morning, a rescue official in Symi told BBC News he and a sniffer dog were being sent back to Athens. His dog, Scar, had become exhausted with rocks burning his paw in the hot conditions, an indication of the weather Dr Mosley would have experienced. The search operation has also involved drones, a helicopter, boats and divers looking in the water. Symi's mayor Eleftherios Papakaloudoukas previously said the search will continue until Dr Mosley is found.

  Before moving into TV, Dr Mosley studied medicine in London and qualified as a doctor but for the last couple of decades has been working as a presenter, documentary maker, journalist and author. He has appeared on BBC One's The One Show and ITV's This Morning. Dr Mosley is also columnist for the Daily Mail and his TV programmes also include Channel 4 show Michael Mosley: Who Made Britain Fat? and BBC show Trust Me, I'm A Doctor. His wife is also a doctor, author and healthy living advocate.

  Wednesday 1330 local time (11:30 BST) - Dr Michael Mosley leaves his wife Clare on Agios Nikolaos beach and sets off on a walk 1350 - Man carrying umbrella is seen on CCTV in Pedi 1357 - Same man is seen again at Pedi's marina heading north-east Thursday 1115 - Police are unable to find the presenter, so they inform Athens and request assistance from the Greek fire department 1400 - Greek fire services, with six firefighters and a drone team, arrive in Symi Friday - Divers join the search in the water around Symi 1400 - His wife Clare says the Mosley family "will not lose hope" and thanks those involved in the search
