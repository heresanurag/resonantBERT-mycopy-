title: Banksy's final work in series appears on London Zoo gates - BBC News
date: '2024-08-13'
section: London
url: http://www.bbc.co.uk/news/articles/c623qjpgew4o
content: |-
  The image of a gorilla appearing to release animals from London Zoo is Banksy's final work of the series.

  This creation on the shutters of London Zoo is Banksy's ninth animal artwork to pop up in the capital in as many days

  An artwork appearing on the shutters of London Zoo has been confirmed as the latest and final image in Banksy's surprise animal art trail across the capital. It shows a gorilla lifting the shutter to release a sea lion and birds, while other animals appear to look on from the inside. It is the ninth Banksy to appear in as many days in London and follows images that have popped up each morning since 5 August of a goat, elephants, monkeys, a wolf, pelicans, a cat, piranhas and a rhinoceros. A London Zoo spokesperson said it was "absolutely brilliant" and said the work would be preserved.

  People have gathered to photograph the mural from behind a barrier that has been installed

  Daniel Simmonds, London Zoo's animal operations manager, said: "Banksy has become part of the London scene and it’s really nice to share his iconic status with, ultimately, one of the most iconic zoos in the entire world. "We’re quite honoured he's chosen to use our front shutters this morning to put one of his incredible artworks. He said staff had no idea Banksy was planning the work at this location. "That's part of the amazing enigma of Banksy and that’s why it’s so exciting to come in this morning," Mr Simmonds added.

  Security guards have been brought in to secure a barrier that has been put up around the mural.

  Mr Simmonds said the shutter would remain closed today and two others used instead, so that visitors could look at the work. "It’s really important we share this with everybody." He added he was expecting extra people to visit on Tuesday in addition to the thousands who had already booked. "It's going to be a busy day." Mr Simmons later confirmed that the artwork would be protected. "We'll definitely preserve it. We might even look at putting some perspex around it. "The last thing we want with typical London weather, having just come through one of the worst winters ever, is to see this damaged by the weather." He added it was likely to remain in the same location for the immediate future but might then be relocated to elsewhere on the site.

  The Nissan Micra and traffic cone that formed part of this Banksy artwork in Charlton have been removed

  The pledge to protect the latest image follows the removal or partial defacing of several other works in the series. Banksy's depiction of a rhinoceros mounting a Nissan Micra with a traffic cone on its bonnet in Charlton was seen being sprayed with a white dollar and "v" sign on Monday, soon after it was unveiled. Royal Borough of Greenwich said it was "a real shame that a mindless vandal has defaced the mural, which has already drawn visitors and brought so much joy to many. "The council is now considering what would be reasonably possible for the future of the artwork and will be closely monitoring it." A worker has since been seen installing a protective cover over the mural on Westmoor Street. The car and traffic cone have been removed. However, it is not known why or who was responsible.

  Last week, a satellite dish with a picture of a howling wolf on it - the fourth image in the series - was apparently stolen from a garage roof in Peckham. And a disused billboard in Cricklewood that featured Banksy's image of a stretching cat - the sixth image of the series - was taken down for safety reasons.

  The BBC has been told by Banksy's team the latest work is the final piece of the series, which has captured the attention of Banksy followers for more than a week. The artist appears to have installed the works overnight at each occasion. Crowds have been seen gathering after passers-by have spotted the works each morning, with many posting photos on social media. Typically, Banksy has confirmed he is behind the creations at 13:00 BST each day, however, he announced the latest work on his Instagram, external page on Tuesday morning.
