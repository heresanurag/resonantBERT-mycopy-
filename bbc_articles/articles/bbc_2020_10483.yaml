id: bbc_2020_10483
title: Hong Kong's dolphins make pandemic comeback - BBC News
date: '2020-09-15'
section: General
url: http://www.bbc.co.uk/news/world-asia-china-54157254
content: |-
  Travel restrictions have cut down maritime travel, bringing vulnerable dolphins back to the waters around Hong Kong.

  Restrictions during the coronavirus pandemic mean there are hardly any boats and ferries around Hong Kong.

  The vulnerable Chinese white dolphin is making a comeback as a result, with sightings up about 30%.
