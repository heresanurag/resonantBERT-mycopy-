title: 'Newspaper headlines: ''Biggest NHS reform ever'' after ''damning'' report
  - BBC News'
date: '2024-09-11'
section: The Papers
url: http://www.bbc.co.uk/news/articles/cdjw11wdwm7o
content: |-
  Most of the newspapers focus on the major report into the state of the NHS being published on Thursday.

  The report into the NHS covers the state of the health service - from hospitals to GPs

  The US presidential election debate between Kamala Harris and Donald Trump also looms large this morning. The Guardian leads with, external "Trump in damage control mode". The Financial Times says, external Trump's campaign is reeling in the wake of what it calls his poor performance. The paper says the former president's allies were left exasperated and thought he had been unprepared, outplayed and had had delivered erratic messages to voters. The Daily Telegraph says, external there are reports of Republican donors reconsidering their campaign contributions, while the Daily Star says Trump, external has gone bonkers after he claimed illegal immigrants were eating America's pets. In other news, the Times says, external the UK and the US are on the verge of allowing Ukraine to use British and American long-range missiles against targets inside Russia. The Foreign Secretary David Lammy and his American counterpart Anthony Blinken have been discussing the issue with Volodymyr President Zelensky in Kyiv. The paper says they will now take what they learned back to their respective leaders. The Financial Times is reporting that, external the Treasury is refusing to give key details of the £22bn fiscal black hole that the government says was inherited from the Conservatives. The FT says officials rejected its Freedom of Information Act request for a breakdown of the figure, saying they need time to ensure the information is accurate. The paper says this will fuel doubts about the government's transparency. And the Sun goes big, external on the results of last night's National Television Awards, with the headline "Strictly still cha cha champs". The paper says BBC One's Strictly Come Dancing shook off a summer of scandal to win its ninth consecutive victory in the Talent Show category. The Sun says it shows the public still backs the programme despite months of allegations of inappropriate behaviour behind the scenes.

