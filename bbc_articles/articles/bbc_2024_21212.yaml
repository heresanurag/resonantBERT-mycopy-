title: Rapper Travis Scott released without charge in Paris - BBC News
date: '2024-08-09'
section: Newsbeat
url: http://www.bbc.co.uk/news/articles/cnvyj7d4n8do
content: |-
  The US artist had been held in custody for 36 hours after a fight with his bodyguard.

  Travis Scott had earlier been seen at the Team USA v Serbia basketball semi-final

  Rapper Travis Scott has been released from custody in Paris without charge, French authorities have said, after fighting with his bodyguard. The 33-year-old US star was alleged to have attacked a security guard who attempted to break up the two men at the five-star George V hotel on Friday morning. Mr Scott was held in custody for 36 hours before being released by police. French prosecutors confirmed he had been let go and the case had been dropped because the offence had been "insufficiently established".

  On Thursday evening, Mr Scott, real name Jacques Bermon Webster, was photographed at Team USA's Olympic basketball match against Serbia. He was pictured next to American businessman Michael Rubin and fellow rapper Quavo, former frontman of hip-hop group Migos. Earlier this year, Mr Scott was arrested in Miami in relation to an argument on a private yacht. Showbiz news site TMZ has reported that prosecutors dropped a charge of disorderly intoxication, external against him, but he still faces a count of trespassing.

  Mr Scott is a 10-time Grammy Award nominee and one of the biggest hip-hop acts in the world. He was previously in a relationship with Kylie Jenner and the pair have two children together. In 2021, 10 fans died in a crowd surge at his Astroworld festival in Houston, Texas. He did not face criminal charges over their deaths, but remains involved in civil cases alleging that organisers were at fault. Last year, he scored his first UK number one album with Utopia, which was released a week after a planned show in front of Egypt's pyramids was cancelled.

