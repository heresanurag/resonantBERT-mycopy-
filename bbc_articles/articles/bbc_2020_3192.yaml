title: 'Coronavirus: Thieves steal oxygen from Manchester hospital - BBC News'
date: '2020-03-23'
section: Manchester
url: http://www.bbc.co.uk/news/uk-england-manchester-52011664
content: |-
  Police say three men cut a lock to steal eight canisters of oxygen and nitrous oxide and fled in a car.

  Withington Community Hospital was targeted by the thieves in the early hours of Saturday morning

  Thieves have stolen oxygen from a community hospital in Manchester, police said.

  Greater Manchester Police said people would "quite rightly share our disgust" at the theft during the coronavirus pandemic.

  Three men were seen getting out of a black BMW outside Withington Community Hospital on Saturday at 03:30 GMT.

  They cut a lock on a metal unit before stealing eight oxygen and nitrous oxide canisters.

  The south Manchester hospital is not believed to be treating any coronavirus patients.

  Insp Andrew Hughes said: "We're determined to find those responsible for this crime, and I'd appeal to anyone with information or who may be able to assist us with dash-cam footage to come forward as soon as possible."
