title: Canada wildfires force thousands to evacuate - BBC News
date: '2024-05-17'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-69024951
content: |-
  Several fires are burning across the country, with a few dangerously close to towns and cities.

  Officials say higher than normal temperatures may lead to another active wildfire season for parts of Canada.

  As of Friday, there were several fires burning across the country, with a few dangerously close to towns and cities.

  Thousands of residents from Alberta and British Columbia have been forced to evacuate to safer ground.
