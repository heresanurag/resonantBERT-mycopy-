  Christmas fears for pubs and restaurants in Wales

  Tighter Covid restrictions in Wales before Christmas would be "incredibly difficult" for the hospitality sector, the industry is warning. It comes after Health Minister Vaughan Gething said new rules could be introduced if infection rates "move in the wrong direction". The Welsh Government's cabinet is meeting on Friday to discuss its latest response to the pandemic. "It's been a year of great struggle - a year of stop-start - mostly stop," said Simon Wright, who runs a restaurant in Carmarthen. "We are approaching the time of year when people would anticipate being at their busiest. We weren't anticipating this post-firebreak, not being able to trade before Christmas. "If something like that happens, it is going to be a huge blow."
