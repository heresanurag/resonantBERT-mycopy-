title: 'Iceland volcano: On board coastguard helicopter as seismic activity assessed
  - BBC News'
date: '2023-12-21'
section: General
url: http://www.bbc.co.uk/news/world-europe-67783952
content: |-
  Iceland's coastguard is assessing the seismic activity on the Reykjanes peninsula and preparing for future eruptions.

  The intensity of volcanic activity on the Reykjanes peninsula has reduced since the spectacular eruption at the beginning of the week, but Iceland's experts are still uncertain there is more to come.

  To help assess the situation, the coastguard is conducting flights over the area, and practising helicopter evacuations in case of a sudden eruption.

  The BBC's Nick Beake joined the coastguard team in their helicopter flight.
