  Kamen's former girlfriend Amanda de Cadenet also posted a tribute, along with "one of the sweetest" photos she took of him with her daughter Atlanta.

  "Any notoriety you gained, was something you never embraced," she wrote. "It almost embarrassed you. My experience of you, and our time together was that you spent much of your days making art, cooking, travelling, and chanting."

