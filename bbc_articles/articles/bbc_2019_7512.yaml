title: D-Day anniversary events in northern France - BBC News
date: '2019-06-06'
section: In Pictures
url: http://www.bbc.co.uk/news/in-pictures-48539923
content: |-
  D-Day veterans are joined by world leaders in northern France to mark the 75th anniversary of the Normandy invasion.

  The annual parade marks the founding of the Royal Hospital by King Charles II in 1682. The Duke of Sussex said: "To all who are on parade today, I can only say that you are a constant reminder of the great debt we owe those who have served this nation"
