  PMQs: Kemi Badenoch calls on PM to resign

  Sir Keir Starmer is questioned by Tory leader Kemi Badenoch at Prime Minister's Questions.

  During their exchange, Badenoch called on the prime minister to resign whilst also referencing an online petition calling for a general election.

  The prime minister responded that there was a "massive petition on the 4th of July".
