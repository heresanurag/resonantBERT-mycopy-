  England are in control of Group C and avoiding defeat against Slovenia on Tuesday (kick-off 20:00 BST) will guarantee progression to the last 16. Kane said England would have taken this scenario before the tournament "for sure" with their four points almost certain to be enough for one of the best third-placed spots should they lose to Slovenia and Denmark beat Serbia. “We can be honest with ourselves that we haven't played the way we want to play but the good thing is we have still got results without doing that,” Kane said. “But Tuesday is important for the feeling of the group, we want to finish top and take the momentum into the knockout stages and just all round have a better feeling coming off the pitch and take that into the rest of the tournament.”
