title: 'Scotland v South Africa: Darcy Graham to miss Test with concussion - BBC Sport'
date: '2024-11-05'
section: Scottish Rugby
url: http://www.bbc.co.uk/sport/rugby-union/articles/cx2lre3xejlo
content: |-
  Scotland winger Darcy Graham will miss Sunday's autumn Test with South Africa because of a concussion sustained during his four-try performance against Fiji. The 27-year-old was making his first Scotland appearance in 12 months after a series of injuries ruled him out of the Six Nations and summer tour. He scored half of Scotland's eight tries in the 57-17 win at Murrayfield on Saturday and elevated himself to second in Scotland men's all-time top try-scorers list, one behind team-mate Duhan van der Merwe. However, Graham was taken off after 65 minutes and has failed head injury assessment (HIA) protocols in the build-up to the South Africa game.

  "He'll do nothing for the next three days, then he starts the graduated return to play," head coach Gregor Townsend confirmed. "If everything goes well and he's feeling good, he'll be available for Portugal [on 16 November]." Scotland were already without Kyle Steyn, but Townsend did reveal that Kyle Rowe's hamstring injury - which forced the winger off against Fiji - is not as bad as originally feared. "He's a chance for this week," Townsend said. "We all felt after the game that could be him missing the next few games, but he's recovering well." The squad will also be bolstered by the availability of Toulouse full-back Blair Kinghorn and Sale Sharks winger Arron Reed, as well as vice-captain Finn Russell.
