title: Met Police officer tackles petrol station knifeman - BBC News
date: '2025-02-26'
section: General
url: http://www.bbc.co.uk/news/videos/c4gm9qngejqo
content: |-
  The moment a lone police officer took down a man wielding a knife at a petrol station in London.

  A petrol station knifeman who was wrestled to the ground by a policeman has been jailed for 30 months.

  Fitzgerald Carty, 66, approached a man while wielding a knife, in Lewisham, south London. Seconds later, PC Morgan Younger restrained Carty, disarming and arresting him.

  The 23-year-old officer was on patrol when he stopped at the petrol station to buy a drink, the Met Police said, and saw Carty grab the victim by the throat.

  The reason Carty was waving the knife was because of a previous dispute with the man, who was not injured in the 25 January attack, the Met said.

  At Woolwich Crown Court on Monday, Carty admitted illegal possession of a knife and attempting to cause grievous bodily harm with intent, and was jailed.

