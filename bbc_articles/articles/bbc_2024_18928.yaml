title: 'David McCord: Police search for on-the-run prisoner - BBC News'
date: '2024-08-17'
section: Northern Ireland
url: http://www.bbc.co.uk/news/articles/clygzvl8k3yo
content: |-
  The 54-year-old was last seen on the Castlereagh Road at around 16:30 BST on Friday.

  Police have appealed for a prisoner who is on the run to hand himself in. David McCord, who is serving a life sentence for murder, was in the custody of prison staff at a property on the Crumlin Road in north Belfast on Friday. The 54-year-old was last seen on the Castlereagh Road in east Belfast at about 16:30 BST and was wearing a green jacket, black tracksuit bottoms, and was carrying a red carrier bag. The Prison Service said McCord escaped from a facility where prisoners nearing the end of their sentences work out from.

  McCord was sentenced to life imprisonment in 2004 for the murder of his girlfriend, 26-year-old Nichola Dickson, in Ballycarry. Police are appealing to anyone who has seen him or who knows of his whereabouts not to approach him, but to contact 101, and quote reference number 607 of 16/08/24. Members of the public can also contact the independent charity Crimestoppers on 0800 555 111.

  Police are also still trying to locate another convicted killer - Dean Michael Woods - who has been "unlawfully at large" from Tuesday 13 August. Woods, who is 46 and of slim build with brown hair and eyes, was on pre-release testing. He has a heart tattoo on his chest and a tribal line tattoo on his upper left arm. Woods, then 18, was convicted of murdering Brian Peden, 26, on 10 December 1995.
