title: 'Valencia fire: Moment fire crews rescue two people from deadly tower block
  blaze - BBC News'
date: '2024-02-22'
section: General
url: http://www.bbc.co.uk/news/world-europe-68375765
content: |-
  A fire in two residential buildings in Valencia has killed at least five people, with several still missing.

  Five people have been killed by a fire in two tower blocks in the Spanish city of Valencia.

  More than 20 fire crews are attempting to contain the blaze.

  In video captured by a camera crew at the scene, two people can be seen being rescued by fire crews in a cherry picker.

  Several people are being treated for burns and smoke inhalation, including members of the emergency response teams.
