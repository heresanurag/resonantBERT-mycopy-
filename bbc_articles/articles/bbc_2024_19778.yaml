content: |-
  Britain's Brendan Loughnane beats Kai Kamaka III by split decision in Washington DC to reach the PFL Finals and the opportunity to fight for $1m (£756, 880).

  Loughnane has won 12 of his 14 PFL fights since joining the promotion in 2019

  Britain's Brendan Loughnane beat Kai Kamaka III by split decision in Washington DC to reach the PFL Finals and the opportunity to fight for $1m (£756, 880). Loughnane was narrowly out-struck by American featherweight Kamaka in a highly technical contest but was the more efficient fighter, landing the more damaging shots throughout. The 34-year-old will fight for his second PFL featherweight title after triumphing in 2022 to become the only Briton to win a belt in the promotion. He will face Russian Timur Khizriev in the final after he beat Brazil's Gabriel Braga by unanimous decision. The 2024 PFL Finals will take place later this year, with the date and venue yet to be confirmed.

  Following a close opening few minutes where the pair traded leg kicks and rapid punch combinations, Manchester's Loughnane took control with a spinning back kick to the body which hurt Kamaka. The shot forced the 29-year-old back away, but Loughnane closed the distance, dropping him with a number of knees from the clinch before being saved by the bell. That moment proved to be the most significant of the fight in a close contest where the pair traded multiple combinations. Kamaka did his best work with his hands, stepping in to land quick one-twos, while Loughnane excelled with his feet, continuing to attack with spinning back kicks and damaging the American's calves with repeated strikes. Two of the judges scored the fight 29-28 apiece, before Loughnane raised his arm in victory, guessing correctly he would be announced as the winner when hearing the third judge had ruled it 30-27 in his favour. Victory gave Loughnane the 30th win of his 35-fight career and ended Kamaka's five-fight win streak. He is the second Mancunian to reach the 2024 PFL Finals after Dakota Ditcheva beat Jena Bishop earlier this month to reach the women's flyweight showpiece. Ditcheva can become Britain's first female MMA world champion with victory, while Loughnane could become the nation's first two-time PFL world champion.
