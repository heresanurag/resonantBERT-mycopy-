  Rachel Simpson's body was discovered in a garage beside a property on the Castlereagh Road on Friday.

  Man in court over mother's murder in Belfast

  A 21-year-old man has appeared in court charged with the murder of his mother in east Belfast on Friday. The body of 43-year-old Rachel Simpson was discovered in a garage beside a property on the Castlereagh Road. Nathan Simpson, of Castlereagh Road in the city, appeared at Belfast Magistrates' Court on Monday. In a short court hearing, Mr Simpson spoke only to confirm he understood the charges.

  Flowers left at the scene where Rachel Simpson's body was found

  No application for bail was made. Defence solicitor Chris McCann did not seek bail for his client due to the lack of any suitable address. "This case highlights a broader issue in relation to accommodation being available for prisoners [after] custody," he told the court. "Mr Simpson had been released from prison seven days before [this incident]." Mr McCann claimed the authorities had months to prepare, but attempts to locate alternative accommodation had "proved fruitless". Mr Simpson was remanded in custody until 14 October.
