title: 'Ryan Adams: Fans demand money back ahead of UK tour - BBC News'
date: '2019-02-26'
section: Entertainment & Arts
url: http://www.bbc.co.uk/news/entertainment-arts-47322821
content: |-
  Ticket-holders are demanding their money back ahead of his upcoming UK tour.

  Fans of singer-songwriter Ryan Adams are demanding their money back ahead of his upcoming UK tour.

  Following accusations of sexual misconduct, some fans say they don't want to go to his concerts until the allegations are proven or discounted.

  In a recent report, several women also accused him of psychological abuse.

  The FBI is looking at whether he sent explicit text messages to an underage teenager, something Adams has said he "unequivocally" denies.

  Adams' forthcoming album has been put on hold but tickets for his UK dates are still on sale.

  This has left some fans taking to social media to demand a refund from music venues and ticket companies.

