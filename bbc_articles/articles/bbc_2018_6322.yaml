title: 'Mars exploration: Nasa to send helicopter to red planet - BBC News'
date: '2018-05-12'
section: General
url: http://www.bbc.co.uk/news/science-environment-44092559
content: |-
  The US space agency says it will be the first test of a heavier-than-air aircraft on another planet.

  Nasa is sending a helicopter to Mars, joining the Mars rover when it launches in 2020.

  The US space agency says "the idea of a helicopter flying the skies of another planet is thrilling".
