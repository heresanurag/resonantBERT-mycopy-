title: London Tube passengers smash windows to escape smoke-filled carriage - BBC
  News
date: '2023-05-06'
section: General
url: http://www.bbc.co.uk/news/uk-england-london-65503344
content: |-
  Video shows people smashing windows to try to escape at Clapham Common station.

  There was panic on a Tube train at Clapham Common station on Friday as passengers smashed windows to escape a smoke-filled carriage.

  Transport for London said the London Fire Brigade confirmed there was no fire on board, and that it was investigating the cause.

  In a tweet, British Transport Police said that there were no reported injuries and that the incident was now resolved.
