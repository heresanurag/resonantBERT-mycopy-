  After two matches against Belgium in the Women's Nations League, which Lionesses helped their case for Euro 2025 selection?

  Which Lionesses helped their Euro 2025 case - and who didn't?

  Teenager Michelle Agyemang is on loan from Arsenal at Brighton

  England produced two very different performances in their double header with Belgium in the Women's Nations League - but who stood out? Time is running out before Sarina Wiegman selects her squad for Euro 2025, with England's first game against France on 5 July. With several key players out with injury, this month's international break was an opportunity for others to shine. A 5-0 victory in their first game against Belgium at Ashton Gate was the perfect start but they were humbled by a disappointing 3-2 defeat in Leuven days later. Competition is high for places in Switzerland, so here are three players who helped their case and three who may have fallen down the pecking order...

  This video can not be played To play this video you need to enable JavaScript in your browser. It's April now, I'm not concerned - Wiegman after England defeat

  Aggie Beever-Jones (left) and Michelle Agyemang have both progressed from England's youth teams

  Michelle Agyemang, 19, will not forget this week any time soon. She scored for England's Under-19s in a 5-1 win against Austria on Saturday, earned a first call-up to the senior squad on Sunday and scored within a minute of her debut on Tuesday. The on-loan Brighton forward, who replaced the injured Alessia Russo in the squad, controlled a long ball, swivelled and volleyed it into the top corner to make it 3-2. "I don't know if I have ever seen anyone make as big an impact in a football game. That is brilliant and it has made my night," said former England striker Ian Wright on ITV. While the goal did not prevent defeat, Wiegman said afterwards it was still worth celebrating. "She is an absolute talent and is a very good number nine but this is the first time she came into the squad," added Wiegman, when asked if Agyemang could be considered as a back-up number nine to Russo. "She had one training session with us and then came on. I thought she could do something good and she did. Of course we will keep an eye on her. "It's too early to say now. Up front, when players come back and are fit, then I think the competition for places is very high. In the longer term, it is exciting." But Agyemang was not the only forward who impressed. Chelsea's Aggie Beever-Jones, with eight goals in the Women's Super League this season, came into the international break in good form. She has often been overlooked by Wiegman but was rewarded for patience when she scored her first England goal as a substitute in Friday's victory. That earned her a first start in Leuven, where she played a full match, switching positions in the second half. The versatile 21-year-old seems to have nudged herself above Tottenham's Jess Naz in the pecking order. Meanwhile, Manchester City midfielder Jess Park, a scorer at Ashton Gate, continues to be given game time by Wiegman. Like Beever-Jones, she was rewarded with a start in Belgium, given the nod ahead of experienced duo Fran Kirby and Ella Toone. While others in midfield struggled during the two matches, Park continues to show consistency and is trusted by Wiegman.

  Nikita Parris (right) had not played for England for two years when she returned in February

  The success of Agyemang and Beever-Jones, as well as further demonstration of Beth Mead's blossoming partnership with Russo in Bristol, will not have helped Naz's case. The 24-year-old forward has struggled for form at Tottenham this season and was left out of the squad originally by Wiegman. With Lauren Hemp, Chloe Kelly, James and Russo all still to return, Naz has a big job to win a Euro 2025 place. She is not the only one as Brighton's Nikita Parris, who earned a recall to the squad after two years in February, did not capitalise on her opportunity to impress. Parris earned praise from Wiegman for her hold-up play and her game management skills in slowing playing down during February's 1-0 win over Spain and was trusted to fill Russo's shoes in the number nine position against Belgium as a result. But Parris came off after an hour, having struggled to implement England's press and having barely had a sniff at goal. While Parris was given an opportunity and did not take it, Manchester United captain Maya Le Tissier was again overlooked. Despite consistently impressing for United, who have the best defensive record in the WSL this season, it was not Le Tissier who Wiegman turned to when England were being carved open in Belgium. Instead, Esme Morgan and Jess Carter came on as half-time substitutes. There are still opportunities to impress Wiegman but time is running out - and following this topsy-turvy double header with Belgium, the England manager has plenty to think about.
