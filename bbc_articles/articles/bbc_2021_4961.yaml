title: 'Covid: Welsh government update 1 April 2021 - BBC News'
date: '2021-04-01'
section: Wales
url: http://www.bbc.co.uk/news/live/uk-wales-56589418
content: |-
  First Minister Mark Drakeford and Chief Medical Officer Dr Frank Atherton give a briefing.

  Wales' opposition parties have responded to the Welsh Government's plans for the latest easing of lockdown restrictions.

  Welsh Conservative Senedd leader Andrew RT Davies said it was “good to see” Mr Drakeford “had bought into the idea of a roadmap”.

  “Although it's very late in the day,” he told Wales Today.

  He said it was “unfortunate” that further funding had not been made available to the hospitality sector.

  “What’s really dumbfounding is that despite his mental health ministers' assurances that gyms will be one of the first facilities to open, they are now not going to open until May.”

  He said outdoor hospitality should be opening on 12 April - in line with plans in England.

  Plaid Cymru’s Adam Price said the government should move faster with easing restrictions.

  “We've also been calling for a much more accelerated timetable in terms of reopening gyms, because of their importance in terms of mental and physical well-being.

  "So, I think it's disappointing to see that being delayed until May the 10th,” he told Wales Today.

  “There are dangers of course in moving too fast but there’s an equal danger of being over cautious”.

  Rodney Berman, of the Welsh Liberal Democrats, said: “I think we are broadly satisfied with the pace.”

  He welcomed the planned move to alert level three.

  “The fact that we've got a bit of a roadmap here, that we've got a bit more clarity for various sectors - hospitality, gyms, I think, is to be welcomed.

  “[But] you’ll be able to go into a beer garden before you'll be able to take part in even an outdoor exercise class.

  “The important thing is that we do now have a roadmap for when different things are going to open up, but we maybe do need to look at the level of financial support to businesses that aren't quite able to open yet.”
