id: bbc_2017_2724
title: 'Brexit: When MPs voted to back Article 50 bill - BBC News'
date: '2017-02-01'
section: General
url: http://www.bbc.co.uk/news/uk-politics-38833593
content: |-
  MPs argued for and against, then voted, by a majority of 384, to allow Theresa May to get Brexit negotiations under way.

  MPs have voted by a majority of 384 to allow Theresa May to get Brexit negotiations under way.

  They backed the government's European Union Bill, supported by the Labour leadership, by 498 votes to 114.

  But the Scottish National Party and the Liberal Democrat leadership opposed the bill, while 47 Labour MPs and Tory ex-chancellor Ken Clarke rebelled.
