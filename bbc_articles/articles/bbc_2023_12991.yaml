content: |-
  We were live on day one from the seaside airshow with the Red Arrows and the coveted Twilight Display.

  Catch up on our live coverage from day one of the 30th Clacton Airshow on the BBC iPlayer or by pressing play on the video above.

  Our stream started at 14:00 BST on Thursday.

  Highlights include the Battle of Britain Memorial Flight towards the start of the stream, the Merlin Formation featuring a Spitfire and Mustang at about one hour in, and the Red Arrows took to the air about two hours into our broadcast.

  The Twilight Display then started about 19:45 BST on Thursday... scroll to about five hours and 45 minutes in to see the spectacular Firebirds with fireworks and Otto the helicopter.

  You can enjoy day two of the Clacton Airshow with BBC Essex.
