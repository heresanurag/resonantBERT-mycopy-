content: |-
  Footage of the weather phenomenon was captured in both Essex and Cambridgeshire.

  This video can not be played To play this video you need to enable JavaScript in your browser. The drama was caught on camera in Essex and Cambridgeshire

  Dust devils, initially believed to be "mini-tornadoes", have been spotted in the East of England. They took shape on Saturday in Essex and Cambridgeshire. Several people were said to have minor injuries after the column of air uprooted tents and gazebos during the Four Colnes Horticultural Society Programme, Essex. Another dust devil was filmed travelling a short distance in a field in Wistow, between Cambridge and Peterborough.

  According to the Met Office, external, although they resemble mini-tornadoes, dust devils are nowhere near as powerful or destructive. They travel across the ground and they can also carry loose debris. Unlike tornadoes, dust devils grow upwards from the ground rather than down from clouds, and they last for only a few minutes.

  Susan Freear, manager at the Earls Colne Recreation Ground, said the gust of wind "came from nowhere" and lifted gazebos and tents into the air. "It made a dramatic scene and some people sustained minor injuries but thankfully nothing major," she told BBC Look East. "It was a bit of carnage with people holding down gazebos. We had a few cuts to heads and a lot of people were shocked." Amanda Jerrom, who filmed the dust devil in Cambridgeshire, said: "The wheat which had been cut appeared to be blown about and across the road by a mini tornado. "We’ve lived in the village for 24 years and never seen anything like it. It was about 2pm and the weather was lovely."

