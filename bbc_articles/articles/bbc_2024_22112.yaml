title: Police surround car near Trump golf course - BBC News
date: '2024-09-16'
section: General
url: http://www.bbc.co.uk/news/videos/cjr33l75ry3o
content: |-
  Police can be seen surrounding a car near the site of what the FBI has described as an apparent assassination attempt on former US President Donald Trump.

  In the footage, taken by bystanders, there are long lines of traffic stuck behind a number of police cars that are sprawled across the road.

  Authorities said a suspect has been arrested, after an AK-47-style weapon was spotted by a Secret Service agent poking out of bushes on a golf course where the former president was playing.
