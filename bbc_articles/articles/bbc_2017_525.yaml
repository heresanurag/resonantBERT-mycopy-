title: Jeremy Corbyn on Brexit, immigration and a maximum wage - BBC News
date: '2017-01-10'
section: General
url: http://www.bbc.co.uk/news/uk-politics-38570490
content: |-
  The full interview between Labour leader Jeremy Corbyn and BBC political editor Laura Kuenssberg.

  Labour leader Jeremy Corbyn told BBC Political Editor Laura Kuenssberg that he does not believe that immigration to the UK was too high.

  But he said that he wanted to end exploitation of workers under freedom of movement laws, a move which he believed would "probably" see a fall in the numbers moving to the UK.

  In this full video of the interview, he also set out his thinking on the idea of a cap on maximum wages and his response to a suggestion by senior union leader Len McCluskey that he would be willing to consider his position if Labour's poll ratings remained low in 2019.
