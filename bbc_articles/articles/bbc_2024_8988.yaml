  David Wails, Joe Ritchie-Bennett and James Furlong were stabbed to death in Reading in June 2020.

  'I know there is still work to do' - police boss

  Speaking on behalf of Counter Terrorism Policing South East and Thames Valley Police, ACC Tim Metcalfe said both organisations acknowledged the Judge Coroner's conclusion today. He said: "Much has already been done to address these issues, but let me be clear, I know that there is still work to do. We are unrelenting in our commitment to learn, change and improve where required. "We will continue to work with other agencies locally and nationally to ensure learning from this terrible attack is shared and acted upon. "While the conclusions delivered by the Judge Coroner today bring an end to the legal proceedings around this case, I am all too aware that the pain and trauma for the families of those who died, and everyone else who was affected by this incident, does not end today. "We must now fully review and reflect on the conclusions from the Judge Coroner and ensure we do all we can to strengthen our efforts to keep our communities and our country safe."
