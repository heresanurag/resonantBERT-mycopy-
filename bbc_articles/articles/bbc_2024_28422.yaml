  Federer teamed up with Nadal for the final match of his career when the pair - affectionately nicknamed 'Fedal' - played together in the doubles for Europe against the Rest of the World at the Laver Cup. Both players were in tears as Federer bowed out of the game. "Sharing the court with you that night, and sharing those tears, will forever be one of the most special moments of my career." He added: "Rafa, I know you're focused on the last stretch of your epic career. "We will talk when it's done. For now, I just want to congratulate your family and team, who all played a massive role in your success. "And I want you to know that your old friend is always cheering for you, and will be cheering just as loud for everything you do next." Women's world number two Iga Swiatek said on X that watching Nadal become emotional during the national anthem before his loss to Botic Van de Zandschulp on Tuesday was "too much". Aryna Sabalenka, the top-ranked women's player, also wore Nadal's branded clothing in a photo on Instagram. In Paris, the city where Nadal won a record 14 French Open men's singles titles, images of the Spaniard were projected into the night sky at the Trocadero against the backdrop of the Eiffel Tower.
