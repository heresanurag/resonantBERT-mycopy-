title: Barack Obama endorses Kamala Harris for president - BBC News
date: '2024-07-26'
section: US & Canada
url: http://www.bbc.co.uk/news/articles/c3g32y8j772o
content: |-
  Barack and Michelle Obama say Ms Harris has the "strength that this critical moment demands".

  Kamala Harris and Barack Obama have known each other for 20 years

  Barack Obama has endorsed Vice-President Kamala Harris to be the Democratic presidential nominee, ending days of speculation over whether he would support her. Former President Obama and ex-First Lady Michelle Obama said in a joint statement that they believe Ms Harris has the "vision, the character, and the strength that this critical moment demands". Mr Obama was reportedly among more than 100 prominent Democrats Ms Harris spoke to after President Joe Biden announced last Sunday he was dropping out of the race. In a statement at the time, Mr Obama praised Mr Biden's exit, but stopped short of endorsing Ms Harris.

