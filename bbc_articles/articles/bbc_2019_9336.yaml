title: 'Article 370: Kashmir protests over loss of special status - BBC News'
date: '2019-08-07'
section: General
url: http://www.bbc.co.uk/news/world-asia-india-49261752
content: |-
  Protests break out in Indian-administered Kashmir after the government revoked its special status.

  People have begun protesting, throwing stones at Indian armed forces in some parts of Indian-administered Kashmir, days after the government revoked the region's special status.
