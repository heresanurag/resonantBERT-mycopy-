content: |-
  The footage shows the lorry crashing into a car on the side of a dual carriageway.

  This was the moment a lorry driver, who was distracted by his phone, crashed into a car on the A55 at Tal-y-Bont, Gwynedd.

  The footage shows Raymond Catterall, 44, crashing into a stationary broken down car, as well as almost hitting three people and a dog standing on the grassy verge.

  Catterall pleaded guilty to dangerous driving and using a handheld mobile phone whilst driving.

  He was given an eight-month suspended prison sentence, 150 hours of unpaid work, a three-month curfew and a 12-month driving disqualification at Caernarfon Crown Court on Friday.
