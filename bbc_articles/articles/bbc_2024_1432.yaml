title: Rishi Sunak sees off Conservative rebels as MPs back Rwanda bill - BBC News
date: '2024-01-17'
section: UK Politics
url: http://www.bbc.co.uk/news/uk-politics-68009249
content: |-
  The legislation will now head to the House of Lords where it is expected to face stiff opposition.

