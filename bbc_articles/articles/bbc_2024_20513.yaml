title: 'Eddie Nketiah: Crystal Palace sign Arsenal striker for £30m on deadline day
  - BBC Sport'
date: '2024-08-30'
section: Football
url: http://www.bbc.co.uk/sport/football/articles/cx2l4wzdn3do
content: |-
  Arsenal and England striker Eddie Nketiah joins Crystal Palace for a fee in the region of £30m on transfer deadline day.

  Arsenal striker Eddie Nketiah has joined Crystal Palace for a fee in the region of £30m. The 25-year-old has signed a five-year deal with the Eagles. The South London-born player is the club's fifth signing of the summer transfer window, and follows the deadline-day arrival of French defender Maxence Lacroix, who signed for £18m. "It's amazing to sign for Crystal Palace – I'm excited to get going," said Nketiah. "Every time I come back to South London, it always puts a smile on my face, so it's good to be back home." Palace chairman Steve Parish added: "It's brilliant to welcome Eddie, a senior England international, back to South London. We are delighted he has signed for Crystal Palace. I am confident that his energy, talent and hunger to succeed will endear him to his new team-mates and supporters alike." Nketiah moved to Arsenal aged 14 from Chelsea's youth set-up and went on to score 38 goals in 168 games for the Gunners.

  Palace also confirmed the signing of goalkeeper Matt Turner from Nottingham Forest late on transfer deadline day. The 30-year-old former Arsenal shotstopper has joined on a season-long loan. Turner, a USA international, joined Forest from Arsenal last summer and played 21 times for the club. "I'm really excited to be here and I'm ready to get to work," said Turner. "I've heard a lot about [goalkeeping coach] Dean Kiely from Wayne Hennessey, and obviously Dean [Henderson] and Remi [Matthews] have got a lot of experience, so it'll be great to get to know them, learn how they work, support them in whatever ways I can, but also push them to be the best versions of themselves."
