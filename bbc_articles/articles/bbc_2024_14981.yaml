  Princess Anne has carried out her first public engagement since receiving a minor head injury and concussion thought to be caused by a horse last month. She visited the Riding for the Disabled Association (RDA) National Championships in Gloucestershire to present awards and meet winners. The visit is understood to be part of a phased return to public duties after she was admitted to hospital in June. The Princess Royal has been recovering from her injuries at her Gatcombe Park home in Gloucestershire, which is where the incident happened.

  While recovering, she missed the state banquet with the visiting Emperor and Empress of Japan and a trip to Canada was postponed. On 23 June, the Princess Royal was injured when walking out on her estate and horses were nearby. It was understood at the time she could not recall the details of what happened due to her concussion. The 73-year-old was admitted to Southmead Hospital in Bristol on 24 June and spent several nights there to receive treatment for a minor head injury. Her medical team said in June her injuries were consistent with a potential impact from a horse's head or legs. Concussion can be the result of a "temporary injury to the brain caused by a bump, blow or jolt", according to the NHS. It can cause forgetfulness, tiredness and a lack of concentration and can take a couple of weeks before a full recovery.

  On Princess Anne's visit, the RDA's chief executive Michael Bishop said the association was "delighted that she has chosen to join us as she returns to royal duties". The King's sister became patron of the RDA in 1971 and then its president in 1986. Mr Bishop said: "As our president, the princess holds a very special place in the hearts of the entire RDA community and has helped us celebrate many significant milestones and provided invaluable support for over five decades." Princess Anne is the third working royal to temporarily step back from public duties this year because of health issues. The King and Princess of Wales stepped back from public engagements at the start of the year. Both were diagnosed with cancer. Princess Catherine made her first appearance since her diagnosis at the Trooping of the Colour in June after saying she was making "good progress".

  King Charles returned to public duties in April and on Friday met Prime Minister Keir Starmer, and actor Idris Elba to hear young people talk about challenges they face in modern day Britain. The meeting included discussions on how the King's charity, The Prince's Trust, can continue to support young people and create initiatives that tackle youth violence. "It seems to me that the great ambition now should be to join up all the dots and bring everybody involved in to find the right solution," the King said. The event at St James's Palace also involved holding up England football shirts in support of the team at the final of the European Championship in Berlin on Sunday.

  The King and Idris Elba have shown their support for the England football team ahead of the Euros final on Sunday
