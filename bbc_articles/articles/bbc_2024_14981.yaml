  The Princess Royal is gradually returning to her duties, following her recent hospital admission.

  • None Princess Anne has been out of the public eye recently while recovering from a minor head injury
  • None She has been attending an equestrian event in Hartpury, Gloucestershire
  • None The Princess Royal presented awards at the event
  • None Princess Anne was in good spirits when meeting winners and attendees
