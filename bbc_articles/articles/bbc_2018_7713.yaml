title: The deadly trade killing Mexicans and Americans - BBC News
date: '2018-07-03'
section: General
url: http://www.bbc.co.uk/news/world-latin-america-44688334
content: |-
  A smuggler bringing drugs into the US shows the BBC how he returns to Mexico with a car full of guns.

  The BBC spoke to an American drug smuggler as he brought narcotics into the US from Mexico. But what he returned across the border with was potentially even more deadly.

  Reporting by Clive Myrie, filmed by Darren Conway for BBC News at Ten, edited by Franz Strasser.
