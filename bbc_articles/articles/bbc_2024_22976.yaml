title: Woman, 40, and girl, 8, found dead in Salford home - BBC News
date: '2024-09-24'
section: Manchester
url: http://www.bbc.co.uk/news/articles/cy43lx5qpvzo
content: |-
  The two bodies were discovered in Salford following reports of concerns for their welfare, police say.

  The woman and girl were found dead in a house in a residential area of Salford

  A 40-year-old woman and an eight-year-old girl have been found dead at a home in Greater Manchester. Police said they were investigating the circumstances after the two bodies were found in South Radford Street, Salford. Emergency services were called to the area at about 10:30 BST following reports of concerns for their welfare. Greater Manchester Police said officers were not looking for anyone else in the investigation.

  The force added that "all known next of kin" had been informed and were being supported by specialist officers. Det Sup Simon Moyles said: “We are working hard as a team to establish what happened here this morning. “While we are not actively looking for anyone else in relation to this investigation, I understand the news of their deaths and the large police and emergency services presence at the address will most likely cause some concern. “I want to reassure them that we believe this to be an isolated incident with no wider threat in the community."

  A cordon has been put in place along the street and officers were continuing to patrol in and around the area. A Salford City Council representative said: “We are aware of the terribly sad news this morning and our thoughts and prayers go out to the family and friends of those who have tragically lost their lives. "We’re working closely with Greater Manchester Police and assisting them with their ongoing investigation. "Our teams will be supporting both local residents and council staff who have no doubt been greatly affected by the events today.”
