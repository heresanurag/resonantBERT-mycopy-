title: Henry Long admits PC Andrew Harper manslaughter - BBC News
date: '2020-01-07'
section: Berkshire
url: http://www.bbc.co.uk/news/uk-england-51019534
content: |-
  Henry Long pleads guilty to the manslaughter of PC Andrew Harper in Berkshire, but denies murder.

  PC Andrew Harper was married four weeks before he was killed

  A teenager has admitted killing a police officer who was dragged along the road by a vehicle after being called to reports of a break-in.

  PC Andrew Harper, 28, died in August in Berkshire, four weeks after he had married.

  Henry Long, 18, from Mortimer, Reading, pleaded guilty to manslaughter at the Old Bailey but denies murder.

  The Thames Valley Police officer from Wallingford, Oxfordshire, died from multiple injuries.

  A 17-year-old co-defendant, who cannot be identified, entered not guilty pleas to PC Harper's manslaughter and conspiracy to steal.

  Another 17-year-old boy denied the same charges at an earlier hearing.

  A fourth defendant, Thomas King, 21, from Basingstoke, has admitted conspiracy to steal a quad bike.

  Long, who is alleged to have been driving the vehicle, also admitted conspiracy to steal a quad bike.

  The three teenagers are due to face a six-week trial at the Old Bailey from 9 March.

  Police officers lined the streets for PC Harper's funeral in October

  In a Facebook post written on New Year's Day, PC Harper's widow Lissie said she missed him "more than anyone could ever imagine".

  She wrote: "You were loved by so many but by no one more than me. You loved so many but it was me you gave your heart.

  "I used to tell you I knew you better than you knew yourself, you used to smile and say I probably did."

  Mrs Harper said she hoped to "go forward with hope...surrounded by friends new and old" in 2020.

  A fundraising page for PC Harper's family raised nearly £328,000 after it received 14,100 donations.

