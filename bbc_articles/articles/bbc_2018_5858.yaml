  \ cookie policy, external and privacy policy, external before accepting. To view\
  \ this content choose ‘accept and continue’. The BBC is not responsible for the\
  \ content of external sites.\n\nLast year, Hampshire Police called for the minimum\
  \ entry age to the festival to be increased after reports of sex assaults, drug\
  \ use and fighting.\n\nThe force urged Portsmouth City Council to ban anyone under\
  \ 18 in an effort to reduce crime.\n\nIt followed reports that children as young\
  \ as 13 were being allowed to attend.\n\nOrganisers said there had been \"revised\
  \ entry procedures\" for this year's event.\n\nDizzee Rascal, Craig David and Sean\
  \ Paul are among the big names at the event ending on Sunday.\n\nThe best way to\
