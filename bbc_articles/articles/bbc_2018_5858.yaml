id: bbc_2018_5858
title: 'Portsmouth Mutiny Festival: Two die after falling ill - BBC News'
date: '2018-05-27'
section: Hampshire & Isle of Wight
url: http://www.bbc.co.uk/news/uk-england-hampshire-44269798
content: "An 18-year-old, named locally as Georgia Jones, and a man died in separate\
  \ incidents at Mutiny Festival.\n\nGeorgia Jones, 18, has been named locally as\
  \ one of those who died\n\nTwo people have died and another person is in a critical\
  \ condition after falling ill at a dance music festival in Hampshire.\n\nAn 18-year-old\
  \ woman, named locally as Georgia Jones, and a 20-year-old man died in separate\
  \ incidents at Mutiny Festival. Police said the deaths were not being treated as\
  \ suspicious.\n\nTwo others remain in hospital after 15 people were admitted overnight.\n\
  \nA Queen Alexandra Hospital spokesman said some of the people treated presented\
  \ with \"drug-related\" symptoms. It could not confirm if all 15 illnesses were\
  \ related to drugs.\n\nA statement on Facebook read: \"The safety of our amazing\
  \ customers has always been paramount to us and so to keep everyone safe and in\
  \ respect to those who have passed, we have taken the decision not to open today.\"\
  \n\nOrganisers announced on Facebook that the festival had been cancelled on Sunday\
  \ \"as a safety precaution\"\n\nThis video can not be played To play this video\
  \ you need to enable JavaScript in your browser. Mutiny Festival safety adviser\
  \ Ian Baird said organisers were liaising with police following two deaths at its\
  \ site in Portsmouth\n\nThe decision \"was not taken lightly\" and had been supported\
  \ by \"the local statutory authorities,\" it added.\n\nEarlier, the festival at\
  \ King George V Playing Fields in Cosham had issued a \"harm prevention alert\"\
  \ apparently warning about the use of drugs.\n\nThe message to festivalgoers described\
  \ a \"dangerous high-strength or bad-batch substance on site\".\n\nThis Twitter\
  \ post cannot be displayed in your browser. Please enable Javascript or try a different\
  \ browser. View original content on Twitter The BBC is not responsible for the content\
  \ of external sites. Skip twitter post by Mutiny Festivals This article contains\
  \ content provided by Twitter. We ask for your permission before anything is loaded,\
  \ as they may be using cookies and other technologies. You may want to read Twitter’s\
  \ cookie policy, external and privacy policy, external before accepting. To view\
  \ this content choose ‘accept and continue’. The BBC is not responsible for the\
  \ content of external sites.\n\nLiam Blair said he was shocked to hear about the\
  \ deaths\n\nFestivalgoer Liam Blair, from Southampton, was one of thousands of revellers\
  \ making their way home early after the event's cancellation.\n\nHe said closing\
  \ the festival early was a \"respectful\" decision and that there was an atmosphere\
  \ of \"shock\" as news of the deaths spread.\n\n\"You just don't expect that to\
  \ happen to people so young,\" he said.\n\nSophie Wilkinson said many at the festival\
  \ were \"annoyed and upset\" by the decision to cancel Sunday's events\n\nSophie\
  \ Wilkinson, 17, said many festivalgoers had been left \"annoyed and upset\" by\
  \ the decision to close the festival early.\n\n\"The mood has just dropped,\" she\
  \ added.\n\nPolice were alerted to the woman falling ill at 19:10 BST on Saturday,\
  \ and the man was found collapsed about 20 minutes later.\n\nBoth were taken to\
  \ the Queen Alexandra Hospital, Portsmouth, where they later died.\n\nMore than\
  \ 30,000 people were expected to attend the festival, which has been running since\
  \ 2013, over the weekend.\n\nOrganisers said on social media that they were \"devastated\"\
  \ about the deaths.\n\nMany revellers at the Mutiny Festival have been camping\n\
  \nThousands of people have been leaving the festival site after its cancellation\n\
  \nIn a statement, Hampshire Police said: \"The deaths are being treated as separate\
  \ incidents at this stage. They are not being treated as suspicious but inquiries\
  \ are being made to determine the circumstances of what happened in each case.\"\
  \n\nThe force said next-of-kin had been informed and relatives were being supported\
  \ by specialist officers.\n\n\"Inquiries are being made into the circumstances of\
  \ what has happened, but we must reiterate our advice to all our customers to responsibly\
  \ dispose of any substances,\" the statement added.\n\nThis Twitter post cannot\
  \ be displayed in your browser. Please enable Javascript or try a different browser.\
