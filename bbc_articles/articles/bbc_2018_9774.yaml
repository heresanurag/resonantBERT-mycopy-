id: bbc_2018_9774
title: Cows help cops catch car chase suspect - BBC News
date: '2018-08-08'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-45120994
content: |-
  A herd of cows provided Florida police with a "big assist" in capturing a woman who was on the run.

  Following a car chase, police in Florida arrested one suspect but another ran into a nearby field – before being chased by cows.

  Officers say the cows were a "big assist" in eventually capturing the woman.
