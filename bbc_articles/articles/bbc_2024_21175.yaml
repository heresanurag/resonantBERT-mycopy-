title: 'Newspaper headlines: ''Boarded up'' and ''rioters face football ban'' - BBC
  News'
date: '2024-08-08'
section: The Papers
url: http://www.bbc.co.uk/news/articles/c1d75033rvwo
content: |-
  Thursday's papers have images of police as thousands of officers appear to have quelled further street violence.

  A protester wearing an England flag turned out in Finchley, north London on 7 August

  Several of the front pages carry pictures of the thousands of anti-racism protestors who took to the streets on Wednesday including the Daily Mail, external which calls it the "night anti-hate marchers faced down the thugs". According to the Guardian, external the paper says some formed human shields to protect asylum centres in towns, cities and areas across England. Metro, external leads on a report Russian users of the messaging app Telegram have been infiltrating far-right channels, where the violence has been discussed. On the front of the Times, external the paper says thousands of anti-racists outnumbered and "scared off far-right extremists" on Wednesday night. The Daily Express, external says a "war of words" has erupted over allegations of "two-tier policing", when it comes to managing the disorder. The head of the Metropolitan Police, Sir Mark Rowley, has dismissed allegations of bias as "complete nonsense."

  Those involved in the street violence could be barred from attending football matches, the i newspaper, external says adding police are looking into links with hooliganism. In other news, the Daily Telegraph, external reports on a study by academics in Poland, that suggests there could be health benefits to eating ice cream made with milk from horses, rather than cows. The Financial Times, external leads with a move by asset manager H2O to pay investors €250m in order to avoid a Financial Conduct Authority fine. Finally, the Daily Star, external splashes on a report that cats have been misunderstood and are not as aloof and standoffish as thought.

