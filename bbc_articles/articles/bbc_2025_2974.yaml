title: Southport families say Axel Rudakubana sentencing should not have been televised
  - BBC News
date: '2025-02-08'
section: Liverpool
url: http://www.bbc.co.uk/news/articles/cwy705r1y1yo
content: |-
  The parents of murdered Bebe King and Elsie Dot Stancombe speak publicly for the first time.

  Southport families 'try to find light in the dark'

  Bebe King had an "innate kindness", her mum says

  The parents of two children murdered in the Southport knife attack last summer have told of how they are "trying to find light in the dark", as they speak publicly for the first time. Six-year-old Bebe King's parents, who cannot be named for legal reasons, and Jenni and David Stancombe, parents of seven-year-old Elsie Dot, have spoken to the Sunday Times, external about the girls. They describe their daughters as confident, happy and affectionate. The families also said the sentencing of the man who killed them should not have been televised as they wanted the girls to be remembered for their personalities not what happened to them.

  Elsie Dot's parents have set up a charity in her memory

  Axel Rudakubana was given a life sentence with a minimum term of 52 years – one of the highest minimum terms on record – for murdering Bebe and Elsie and Alice da Silva Aguiar, nine, on 29 July. Elsie's uncle Chris Stancombe and Bebe's father said there was too much detail about the girls' injuries during the sentencing hearing, which was broadcast live on news channels including the BBC. Court proceedings are rarely televised in the UK but in recent years the judge's sentencing remarks are shown in some high-profile trials. "The sentencing shouldn't have been televised," Mr Stancombe said. Bebe's father added: "We know it has to be heard in court but why did the whole nation need to see it on television?" The parents reflected on their daughters' personalities and how they wanted them to be remembered. "Everyone says it, don't they?," Ms Stancombe, 35, said, "That they're one of a kind. But she truly was." Her mother told the Sunday Times: "She had this power to connect with people and the relationships she had with all her family members were different but very special. "She had this innate kindness. She had a spark." The parents discussed their daughters' excitement for the dance class, which was run by Leanne Lucas, who was also stabbed. They recalled the horrifying moment they discovered what had happened in the Hart Space. Just before midday, Ms Stancombe got a call from a mother of one of the other children at the class who told her "something awful" had happened, adding: "Somebody's stabbed the kids." Ms Stancombe said she "just ran". "I left the whole house open and got in the car." Bebe's dad said: "I got down Hart Street and saw straight away there were ambulances all over the place."

  The Princess of Wales met both Elsie and Bebe's parents as well as the emergency services

  Rudakubana also attempted to kill eight other children, who cannot be named for legal reasons, Ms Lucas and businessman John Hayes. The families told of how the tragedy had impacted their other children, including Elsie's younger sibling. Mr Stancombe said: "You know you say to your kids every day, every night, 'I won't let anything happen to you'? "How could I say that to [Elsie's sibling] now?" In October, the Prince and Princess of Wales visited Southport to deliver messages of thanks to the victims' families and the emergency workers. The couple met both Elsie's parents along with Bebe's parents. It was the Princess of Wales' first public appearance since she finished chemotherapy.

  "That meant so much to Jenni," Mr Stancombe said. "Because it was her first public appearance. "I won't say what they said to us, but what they shared with us was really, really powerful, and it was a powerful message and heartfelt, and it meant a lot." The families welcomed plans, announced on 21 January by Home Secretary Yvette Cooper, for a public inquiry into the stabbings. None of the parents have been able to return to work since the stabbings, the Sunday Times reported.

  Elsie's parents have set up a charity, Elsie's Story, to help children in need. Ms Stancombe said: "Everything she did was pure enthusiasm. It could be the most boring thing - even, like, David taking the bins out - and it was like, 'I'll come'. "She was grateful for life." Bebe's parents said they would try to live as full a life as they could for their daughter. Her mother said: "She was the most positive, bubbliest girl and we have to honour that. "We have to live for Bebe. And honour her. And find light in the dark."

