title: 'Alfie Phillips murder trial: Toddler died with 70 injuries - BBC News'
date: '2023-10-04'
section: Kent
url: http://www.bbc.co.uk/news/uk-england-kent-66995210
content: |-
  Jack Benham and Sian Hedges are accused of murdering 18-month-old Alfie Phillips during lockdown.

  Alfie Phillips died with a "myriad of bruises" a jury is told

  A toddler died with 70 visible injuries after his mother and former partner meted out "aggressive, violent 'discipline'" on him, a court heard.

  Jack Benham, 34, and Sian Hedges, 26, are accused of murdering 18-month-old Alfie Phillips in a caravan in Kent during lockdown in 2020.

  Alfie died with a "myriad of bruises" and traces of cocaine in his body, Maidstone Crown Court heard.

  Prosecutor Jennifer Knight KC said: "It is clear that Alfie was deliberately injured on more than one occasion, culminating in an assault perpetrated during the night that led to his death."

  Ms Hedges, Alfie's mother, and her then boyfriend Mr Benham are accused of murdering him at Mr Benham's caravan in Hernhill, near Faversham on 28 November 2020.

  The court heard how he died with fractures to his ribs, arms and leg, and signs of smothering.

  Traces of cocaine were found in Alfie's blood and urine samples, and doctors examining Alfie suggested it could have been passive inhalation of crack cocaine or from external contact with the drug on the night of his death.

  Ms Knight said that during police interviews Ms Hedges and Mr Benham admitted taking cocaine that night, and both said they had been drinking whisky and Coke while Alfie was asleep in the caravan.

  She told the court: "Had either defendant not been joining in with the assaults, that defendant, who was not part of it, would have stopped the attack and removed Alfie Phillips from the caravan, and from the presence of the other who was carrying out these attacks.

  "The fact that this did not happen can only be because both defendants agreed that the assaults should take place ... they both agreed in meting out some sort of aggressive, violent 'discipline' to Alfie that night which resulted in his death."

  Jurors were told the pair had exchanged text messages the month before Alfie's death, where Mr Benham appeared to suggest Ms Hedges bite Alfie back after he had bitten her. Ms Hedges said she did not want to do that.

  In other messages, Mr Benham called Alfie a "cry baby" and "your little sod", saying he was going to "poke him in the ear" after he turned off his caravan heater.

  Ms Knight said Alfie's post-mortem examination revealed 70 separate bruises and injuries on his body, and found his death came about by "unnatural means as a result of the action of another or others".

  The leading pathologist said the final cause of death was "not clear" due to the numerous injuries that could have led to Alfie's death.

  The jury heard Mr Benham told police he woke up on the morning of Alfie's death to find him by his knee, and that he believed Alfie had died because he had been lying on him.

  The pair could not explain Alfie's injuries during police interviews, the court was told.

