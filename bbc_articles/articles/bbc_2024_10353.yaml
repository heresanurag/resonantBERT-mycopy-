title: Lawmakers hurl insults after 'fake eyelashes' comment - BBC News
date: '2024-05-19'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-69004633
content: |-
  The fiery exchange began when Republican Marjorie Taylor Greene criticised Democrat Jasmine Crockett.

  A clash ensued between congressional lawmakers on Thursday after Republican Marjorie Taylor Greene made a comment about Democrat Jasmine Crockett.

  "I think your fake eyelashes are messing up what you are reading", said Ms Greene. Left-wing New York congresswoman Alexandria Ocasio-Cortez quickly intervened.

  The House Oversight Committee was debating to hold US Attorney General Merrick Garland under contempt.
