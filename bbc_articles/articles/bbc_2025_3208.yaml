  Russia has been making slow gains on the battlefield for months. In the north-eastern Ukrainian city of Kharkiv, officials said that 12 people, including two children, were injured in a "massive" overnight drone strike, a short while after Zelensky left the White House. The casualties included four female patients at a hospital in the city centre. Residential buildings, pharmacies, cafes and shops were also been damaged, the Ukrainian prosecution service said. Friday's conversation soured after the US Vice-President JD Vance - who was sitting alongside other politicians in the room - told Zelensky that the war had to be ended through diplomacy. Zelensky responded by asking "what kind of diplomacy?", referencing a previous ceasefire deal in 2019, agreed three years before Russia's full-scale invasion when Moscow was supporting and arming separatist fighters in Ukraine's east. The vice-president then accused Zelensky of being disrespectful and "litigating" the situation in front of the media.
