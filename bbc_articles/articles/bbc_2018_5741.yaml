content: |-
  The Kilauea volcano in Hawaii started erupting on 3 May and has so far destroyed 26 homes.

  The Kilauea volcano in Hawaii started erupting on 3 May and has so far destroyed 26 homes and forced almost 2,000 people from their homes.

  Kilauea is one of the most active volcanoes in the world.
