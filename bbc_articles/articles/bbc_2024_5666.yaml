title: 'Barnsley crash: Woman, 85, and man, 75, killed and seven injured - BBC News'
date: '2024-03-24'
section: Sheffield & South Yorkshire
url: http://www.bbc.co.uk/news/uk-england-south-yorkshire-68650132
content: |-
  A 65-year-old man was arrested and has since been bailed in connection with Saturday's crash.

  The junction at Barugh Green has been shut for several hours following the crash

  Two people have been killed and seven more seriously injured after a number of vehicles crashed at a crossroads.

  Police, the fire service and ambulances were called to Barugh Green in Barnsley at 14:00 GMT on Saturday.

  A man, aged 75, and a woman, aged 85, died at the scene.

  South Yorkshire Police said seven more people received hospital treatment for serious, but not life-threatening, injuries. A 65-year-old man was arrested and has since been bailed.

  Officers said a white Suzuki and a grey Range Rover collided, with multiple other vehicles also being involved.

  The junction, which includes Cawthorne Road, Barugh Green Road and High Common Road, shut for several hours while investigations took place but has now reopened.

  South Yorkshire Police appealed for witnesses to the crash and for anyone with dashcam footage to come forward.

