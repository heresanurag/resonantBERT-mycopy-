title: Man charged over alleged threat to MP Joanna Cherry - BBC News
date: '2021-02-04'
section: Edinburgh, Fife & East Scotland
url: http://www.bbc.co.uk/news/uk-scotland-edinburgh-east-fife-55930824
content: |-
  The 30-year-old was arrested after the SNP MP reported the incident to Police Scotland on Monday.

  A man has been charged in connection with alleged threats made against SNP politician Joanna Cherry.

  The Edinburgh South West MP reported the incident to officers on Monday.

  This was the same day Ms Cherry was dropped from her justice role on the SNP's frontbench team at Westminster.

  Police Scotland said a 30-year-old man had been charged with a communications offence and a report would be submitted to the procurator fiscal.
