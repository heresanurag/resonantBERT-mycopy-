title: 'Hornchurch: Woman killed by registered XL bully dogs named - BBC News'
date: '2024-05-21'
section: London
url: http://www.bbc.co.uk/news/uk-england-london-69043371
content: |-
  The two dogs were seized by armed officers after being contained in a room at an east London home.

  Two XL bully dogs were seized by armed officers at the home

  A woman who died after she was attacked by two registered XL bully dogs at a house in east London has been named locally as Angeline Mahal. Armed police went to the home of the woman, aged in her 50s, in Cornwall Close, Hornchurch, on Monday afternoon but she died at the scene. Her family is being supported by officers, the Metropolitan Police says. It is believed to be the first fatal attack by XL bully dogs that were known to have been registered under new laws. Investigating officers and forensic teams can be seen removing items from the property. Neighbours have described hearing "a lot of of barking" and seeing paramedics administer CPR to the victim in her front garden.

  A woman, who has asked to remain anonymous, said: "I came out of the house and looked to see what had happened. We hadn't heard anything but saw a helicopter overhead and loads of police. "I stood by the road and saw a paramedic administering CPR. That poor woman. It's shocking."

  Items have been removed from the home

  Sejal Solanki, a neighbour of Ms Mahal, told BBC News the death was "very, very sad," adding: "The fact that that's happened with her own dogs is scary." "We have children and they're playing in the field there, near her house, and it could happen to anybody really." The area's MP, Julia Lopez, said the community was "in shock" over the "deeply distressing" death. She told BBC Radio London that while it may "provoke debate", it was her understanding the dogs were licensed under new rules for XL bullies so the woman was "complying with the law". Another woman, who also did not want to be named, said she heard barking during the attack and had previously warned her child about going near the XL bully dogs.

  XL bully dogs are now banned in England and Wales unless owners have an exemption certificate

  From 1 February, it became an offence in England and Wales to own an XL bully without an exemption certificate. Anyone who owns one of the dogs must have the animal neutered and microchipped,, external and keep it muzzled and on a lead in public, among other restrictions.

