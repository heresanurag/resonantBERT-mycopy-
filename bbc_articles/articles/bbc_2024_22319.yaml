  Having batted at number seven against England, Kamindu was promoted to number five against the Black Caps and came to the crease at 69-2 when Angelo Mathews retired hurt after being hit on the finger. The hosts were soon 106-4 but Kamindu shared a partnership of 72 with the returning Mathews and 103 with Kusal Mendis, who was the next highest scorer with 50. Kamindu was eventually dismissed in the penultimate over of the day when he attempted to cut a spinning delivery from Ajaz Patel and was caught off the glove. Kamindu scored 61 against Australia in his one Test innings in 2022 but has hit sparkling form since being recalled to face Bangladesh in March this year. He followed a 102 in the first innings of the first Test with 164 in the second innings and made 92 not out a week later. Against England he scored 113 in the first Test at Old Trafford, 74 at Lord's and 64 in the series finale at The Oval.
