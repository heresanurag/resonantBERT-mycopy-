content: |-
  Kamindu Mendis continues his remarkable start to Test cricket by scoring his fourth century on day one of the first Test against New Zealand.

  Kamindu hits another ton to near Bradman mark

  Kamindu has scored 809 runs in 11 innings in Tests

  Kamindu Mendis continued his remarkable start to Test cricket by scoring his fourth century on day one of the first Test against New Zealand in Galle. The 25-year-old left-hander, who scored a hundred and two fifties in the recent series against England, dragged Sri Lanka to 302-7 with 114 from 171 balls. He now has four centuries in his first seven Tests and eight scores of 50 or more in his 11 innings. The knock took his average to 80.90 with only the legendary Australian Sir Don Bradman's mark of 99.94 better among batters to have played a minimum of 10 innings. Were Kamindu to score 50 or more in the second innings he would join India great Sunil Gavaskar on nine 50+ scores - the most by any batter in his first seven Tests. Only three players - Bradman, plus West Indies duo George Headley and Everton Weekes - have scored five hundreds in their first seven Tests. England's Harry Brook made a similarly impressive start to his career when he scored four hundreds in his first six Tests after his debut in 2022.
