title: Hold your heads high, King tells Southgate and team after final - BBC News
date: '2024-07-14'
section: Culture
url: http://www.bbc.co.uk/news/articles/c3gw54p1jeno
content: |-
  He added that it was a "really great achievement in itself" to have reached the final.

  Sir Keir Starmer, Prince George and Prince William react during the game

  The King has urged manager Gareth Southgate and his team to "hold your heads high" in a letter after England's painful defeat to Spain in the final of Euro 2024. He added it was a "really great achievement in itself" to have reached the final and the team to should look to "the many triumphs which I have no doubt lie ahead". Meanwhile, the Prince of Wales, who attended the final in Berlin with son Prince George, said "this time it just wasn't meant to be" in a post on X. William, 42, and George, 10, watched the match alongside Prime Minister Sir Keir Starmer and Culture Secretary Lisa Nandy. The British royals were joined by Felipe VI, King of Spain and his daughter, Princess Sofia of Spain. Posting on X, external after England's 2-1 defeat, Prince William wrote: "This time it just wasn’t meant to be. We’re all still so proud of you. Onwards @England. W." Harry Styles, Piers Morgan, Olly Murs and Louis Tomlinson were also in attendance, as celebrities joined thousands of ticket-holders at the game.

  Felipe VI, the King of Spain, and his daughter, Princess Sofia of Spain watched on

  King Charles' full letter, addressed directly to Southgate, read: "Although victory may have eluded you this evening, nevertheless my wife and I join all my family in urging you and your support team to hold your heads high. "All those who have participated in sporting activities at any level will know how utterly despairing such a result can feel when the prize was so near - and will join me in sending heartfelt sympathy, even as we congratulate Spain. "But please know that your success in reaching the European Championship final is a really great achievement in itself, and one that brings with it the pride of a nation which will continue to roar for the Three Lions today - and in the many triumphs which I have no doubt lie ahead." Sir Geoff Hurst, who played for England's World Cup-winning 1966 team - which remains the last time the men's team won a major tournament - said it was "bitterly disappointing to lose the game", but he described Spain as "the best team at the tournament". Speaking to BBC Breakfast, he said that he was "very positive" and said Southgate had done an "absolutely brilliant" job managing England. "We're almost there," he added. Southgate and the England team were pictured leaving their hotel in Berlin on Monday morning.

  Gareth Southgate has said "now is not the time" to speak about his future as England manager

  England captain Harry Kane said losing to Spain in the final will "hurt for a long time"

  Peter Crouch, Arsène Wenger and Gareth Bale were some of the famous footballing faces at the game. Piers Morgan, 59, posted a picture of him and his two sons at the game on X, with the caption: "Come on England - bring this thing home!" In a post after the game, Morgan said the "best side" won, adding that the "long painful wait" for the Three Lions to lift a trophy continues. Meanwhile on Instagram, popstar Murs had been documenting his journey to Berlin. When the match was over, he posted a picture of himself in the stands with his head in his hands. Others at the game included Ed Sheeran, who also attended the semi-final on Wednesday in Dortmund, and Formula One drivers Lando Norris and George Russell. Russell posted a picture with his Spanish girlfriend, Carmen Montero Mundt, on Instagram with the caption: "Special to have both of our countries in the @euro2024 final. One of us will be happy tonight."

  Comedian Rob Beckett had been documenting his journey to the Olympiastadion. On Instagram, he explained to his followers that he was on holiday in Greece with his family but has "just left my wife and children" to attend the final. Romesh Ranganathan, Ellie Goulding, Little Simz, Stephen Fry and Sir Patrick Stewart had sent messages of support to the team ahead of the final. Pop star Adele was spotted earlier in the week at the semi-finals where England beat Netherlands by two goals to one. Others who wished England the best of luck before the game included American singer Katy Perry who posted “It’s coming home” on X. However fans were quick to point out that she accidentally used the British flag emoji rather than the England one.

