title: 'Iceland volcano: Spectacular aerial footage shows scale of eruption - BBC
  News'
date: '2023-12-20'
section: General
url: http://www.bbc.co.uk/news/world-europe-67781301
content: |-
  Drone footage shows lava and smoke spewing into the air weeks after waiting on the seismic activity.

  The eruption on the Reykjanes peninsula has been seen across the world, with spectacular aerial shots showing the scale of the volcanic activity.

  The intensity has diminished on its second day but nearby communities remain off limits for at least a week.

  It spewed lava and smoke more than 100 metres (330 feet) into the air after weeks of waiting on the seismic activity.
