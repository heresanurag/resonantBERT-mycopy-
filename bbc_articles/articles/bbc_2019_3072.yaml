title: Shoreham Air Show pilot Andy Hill acquitted of causing 11 deaths - BBC News
date: '2019-03-08'
section: General
url: http://www.bbc.co.uk/news/uk-england-sussex-47498746
content: |-
  Pilot Andy Hill has been cleared of the manslaughter of 11 men, who died when his jet crashed at the Shoreham Airshow.

  Pilot Andy Hill has been cleared of 11 counts of manslaughter after the Shoreham Airshow crash.

  Eleven men died when Mr Hill's jet crashed onto the A27 in August 2015.

  After the verdicts Mr Hill read a statement outside court.
