  Dan Jones talks about his recovery after ripping his patellar tendons while carrying 80kg in a race.

  Horror injury strongman 'may never compete again'

  Dan Jones was injured in a competition at the beginning of September

  A strongman whose horrific injury went viral on social media has said he might have run his final race. Dan Jones ripped both patellar tendons when he raced with 80kg during a strongman contest in Southport at the beginning of September. He has spent weeks in hospital, missing his daughter's first day of nursery and her learning to crawl. Having undergone surgery and been discharged from Leighton Hospital in Crewe on Friday, Mr Jones said: "My biggest goal is to get home and be a dad. If I can train and compete after that, that's a bonus."

  Mr Jones described the moment of the injury on 1 September, which has been viewed on TikTok more than 2.6 million times. He said it had felt like he was "on fire".

  Mr Jones described the feeling of his kneecaps "shooting up into his thighs" while competing

  "It was horrendous," Mr Jones said. "Every time I looked down I felt sick because you could see the kneecaps about two or three inches higher than they should have been. "I'd have probably been better off breaking a leg." He said the doctors had been baffled as to how the injury occurred. "We still don't know why the first one went. It's crazy. This was actually the lightest event and the safest one," he said, having picked up a car and pulled a truck earlier that day. "Possibly it's a wear and tear from the rest of the day."

