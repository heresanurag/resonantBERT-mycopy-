  Some US strongmen who have previously suffered the same injury have contacted Mr Jones, explaining they were in casts and could not walk for three months. "I'm doing pretty good considering I only got operated on three-and-a-half weeks ago," he said. He has since celebrated taking his first steps after the injury, but added being in hospital had reminded him how important training and family time was for mental health. "My 11-month old daughter - I'll have missed her first day of nursery, I've missed her crawling, I've missed her trying to pull herself up," he said. "It's very sad but it's such a hard thing to get my head around. It's been very hard on the brain." He now looks forward to getting home and celebrating his daughter's first birthday.
