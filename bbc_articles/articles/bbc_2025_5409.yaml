title: 'Cat Burns: ''I never had music for queer girls'' - BBC News'
date: '2025-03-05'
section: Newsbeat
url: http://www.bbc.co.uk/news/articles/cdxerx9rkpzo
content: |-
  The Go singer says she's entering a "new era" where she's comfortable sharing her love for women.

  Cat Burns: 'I never had music for queer girls'

  Cat Burns couldn't be clearer about what's on her mind in her new track. Called - you guessed it - Girls! she says it marks a shift from her more "serious" records and is her shot at writing music she didn't have access to growing up. "I feel like I never had a song like that for me," she says. "Especially for all the queer girls." She says she's leaning into a new era where she feels increasingly confident celebrating her sexuality. The singer, 24, has enjoyed in meteoric rise in the past few years. Her single Go, first released in 2020, became a viral hit on TikTok in 2023 - rising to number 2 in the charts, propelling Cat on to a Brits Critics' Choice award nomination later that year. She tells BBC Newsbeat having songs like that is "super important", especially growing up and figuring out who you are. "It's nice to know that people like you exist and exist freely," she says. "And I think the 'fun-ness' of the song can show people who aren't lesbian or queer or bi or whatever that we are just normal human beings who like just so happen to like the same sex."

  In the past year, the charts have been dominated more than once by queer women writing openly about gay relationships. Chappell Roan's Good Luck, Babe! tells the story of being in love with a woman struggling to come to terms with their sexuality and spent 16 weeks in the UK top 10. And after Billie Eilish claimed she was "outed" by Variety magazine in 2023, she followed up with her album Hit Me Hard and Soft, including the single Lunch which explored her desire for women. Billboard described the track, which peaked at number two in the UK chart, as "a glorious queer awakening". , external Before that though, there's been slim pickings for mainstream pop songs that celebrate authentic lesbian relationships. Take, for example, Katy Perry's 2008 debut I Kissed A Girl. It's "a brilliant pop song", Cat says, but doesn't go any deeper than the first stage of exploring sexuality. "I think it's always good when we make room and allow space for lesbian and queer artists to speak about it whilst we're further into our journey," she says. "Where it's less curiosity and trying... and it's more like: 'No, I'm into it now and really delving to my experience as a queer woman'."

  And the more voices that add to that, the better, Cat says. "The more representation and more space for different types of queer artist, it can just help paint a more vivid picture of what the community's actually like and who exists within that community. "Having people like Reneé Rapp and Chappell Roan and, hopefully, someone like myself, we're starting to show people that we're not a monolith and we vary across the spectrum." Cat, who's previously spoken about her ADHD and autism spectrum disorder (ASD) diagnoses, says she "falls into so many different groups" and wants to celebrate differences. "I just want to continue to show people that we're just not all one way," she says. "What you know of something might not always be true."

  As for why it seems more artists are getting comfortable writing about their sexuality, Cat credits social media as well as other artists that have gone before. "Social media has allowed more queer artists to be queer loudly," she says. "Safety-wise, before it was harder. There's so many icons that have paved the way. "I'm really happy that I was able to make a song like Girls!, for it to be received the way it has been and for me to be so able to be open about what it's about." With more artists loudly celebrating the LGBT community, Cat says the fan base now has the opportunity to be loud back in their support. "The LGBTQ + community, we're a very hard fan base," she says. "We love our favourite artists down and will do forever. "We champion and love loads of straight artists, which is great. "But I think it's nice that, in the last five to 10 years, we're now getting queer artists being able to be championed and loved by our own community."

