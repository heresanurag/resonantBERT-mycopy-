  Ever since the original decision, Labour MPs have grumbled they've been taking heat for it.

  Labour hope to put winter fuel misstep behind them

  The final act in this slow motion U-turn has played out. The arc of this row runs to almost a year. It was late July last year when I was among a bunch of reporters called into the Treasury to question the then new chancellor about her out-of-the-blue policy to take the Winter Fuel Payment from millions of pensioners. Rachel Reeves limited the payment to only those pensioners in receipt of pension credit or other means-tested benefits – around 1.5 million – saving up to £1.5bn a year.

  Ever since Labour MPs have grumbled they've been taking heat for it. The issue sat like a giant toad on the political news agenda all summer, hundreds of those newly elected Labour MPs deluged with complaints. And it never really went away. At the local elections in England and the parliamentary by-election in Runcorn in Cheshire last month, it came up repeatedly on the doorstep. Then we got the U turn, in three parts. Two-and-a-half weeks ago, the prime minister said the threshold would be moving. Last week, the chancellor said the new recipients would get it this coming winter. We now know who will qualify and who will have to pay it back. A couple of thoughts: could the government have done this in the first place? Others say there was genuinely real concern in the Treasury about the state of the books and they felt compelled to do something to reduce so-called in year costs.

  Secondly: once they decided to move, they have moved pretty quickly, albeit announcing the U-turn in iterative steps, one week after another. We are not being kept waiting until the Budget in the autumn, or even the Spending Review on Wednesday - here we have it, the new threshold. So, how will the government pay for it? It is projected to cost £1.25bn. Ministers say there won't be a "permanent" increase in borrowing. So how much borrowing will there be, and for how long? And which other budgets may be squeezed as a result? Or which taxes may have to rise? For many within Labour, this whole debacle was the single biggest misstep of the party's first year in office. It both emboldens those hoping for a watering down of wider benefits cuts but, outwardly, limits the scope for doing so. In the medium term, expect growing questions about the so-called triple lock, which guarantees that the state pension will increase by the highest of inflation, average earnings growth, or 2.5%. Ministers are committed to it, but the escalating cost will surely, in time, lead a government in future to tweak it, if it dares. As for the winter fuel payment, it will forever likely to remain in the biography of this government - with questions asked of Rachel Reeves about it. Attention now turns to the Spending Review on Wednesday - where Labour folk will hope there are no other hostages to fortune that cause them quite so much grief as this has.

