title: Strand crash victim, student Aalia Mahomed, a 'beautiful soul' - BBC News
date: '2025-03-20'
section: London
url: http://www.bbc.co.uk/news/articles/cvg5djgqp58o
content: |-
  Aalia's family have paid tribute to her, calling her a "beautiful soul", after her death on Tuesday.

  Aalia Mahomed died in a collision on Tuesday on the Strand

  The family of a woman who died after being hit by a van in central London have described her as a "bright, kind and beautiful soul". Aalia Mahomed, 20, was pronounced dead at the scene at the Strand, near the King's College London campus, on Tuesday, in a collision that also left three injured. Ms Mahomed was in her second year studying for a BSc in physics and philosophy at King's College London (KCL). A 27-year-old woman, also confirmed to be a KCL student, remains in hospital in a serious condition and a 23-year-old man, who was also injured, has been discharged, the Metropolitan Police said.

  The force added that the driver of a van, a 26-year-old man, arrested at the scene on suspicion of causing death by careless driving and drug-driving offences has been bailed while investigations continue. The collision happened at about 11:40 GMT, when a van hit pedestrians close to King's College London and Somerset House, Aldwych.

  The statement from Ms Mahomed's family added: "She was a ray of sunshine in our lives, and will be deeply missed by all her family and friends. "Her light will always live on in our memories and her smile will be our strength as we get through this difficult time." Her family are being supported by specialist officers.

  Flowers and tributes have been left by mourners

  Tributes have been left for Ms Mahomed on post-it notes and flowers reading: "Rest in peace", "I'm so sorry you were taken away so soon", and "heartbreaking". Prof Shitij Kapur, the university's vice-chancellor and president, said: "A senseless tragedy struck our campus on Tuesday - a tragedy that has led to the loss of life of one of our students, Aalia Mahomed. "Aalia's family has asked that we respect their privacy as they mourn the loss of their daughter. "Another of our students is still in hospital and is in our thoughts. We are in touch with their family to ensure they feel supported." He added: "Words often bring little comfort at these difficult times when what has happened cannot be reversed – but I hope that in supporting our students and staff, and honouring and remembering what has been lost, we will find a way forward."
