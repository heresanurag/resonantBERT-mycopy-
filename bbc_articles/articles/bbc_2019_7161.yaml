id: bbc_2019_7161
title: 'Young Conservative: ''Party girls can do politics'' - BBC News'
date: '2019-06-05'
section: General
url: http://www.bbc.co.uk/news/stories-48478088
content: |-
  Emily Hewertson is an aspiring politician who wants to change the perception that you need to smarten up your social media to get there.

  The young politicians of tomorrow are growing up with social media today - so should they be filtering what they post to suit their political futures?

  Emily Hewertson doesn't think so. She's 19, and like many girls her age she likes clubbing and Instagram - but she's also a member of the Conservative party, an influencer for right-wing group Turning Point UK and an aspiring politician.

  She went viral after appearing in the audience of a BBC Question Time election special where many viewers were quick to point out that she doesn't look like your "typical politician".

  This page has been amended to include that Emily is an influencer for Turning Point UK
