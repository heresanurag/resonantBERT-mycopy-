title: Moment England basketballers get engaged - BBC News
date: '2018-04-09'
section: General
url: http://www.bbc.co.uk/news/uk-43689111
content: |-
  Georgia had "no idea" the proposal was coming until Jamell got down on one knee at the Commonwealths.

  England basketballer Georgia Jones said she had "no idea" this proposal was coming.

  After the nation's women's and men's sides both won their matches at the Commonwealth Games, Jamell Anderson's teammates stood aside, to reveal he was down on one knee.
