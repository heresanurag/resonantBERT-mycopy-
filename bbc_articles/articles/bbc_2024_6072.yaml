title: Police chase in Earsham crop field ends in fatal crash - BBC News
date: '2024-03-27'
section: General
url: http://www.bbc.co.uk/news/uk-england-norfolk-68661837
content: |-
  The footage shows the driver enter a field of 6ft-high maize (1.83m) during a police pursuit.

  Footage has been released of a drink driver trying to evade police by entering a field of maize, before causing a fatal crash.

  Marcin Jablonski, 44, was being pursued by police cars and a police helicopter along the A143 in Norfolk on 13 August, after failing to stop for officers earlier in the day.

  The pursuit ended when he crashed his stolen Land Rover into another car at Earsham, killing 28-year-old Aisatou Mballow-Baldeh.

  Jablonski, from Carlton Colville near Lowestoft, admitted causing death by dangerous driving and other offences and was jailed at Norwich Crown Court for 12 years.

  His son Thomaz Urbaniak, 26, of Newmarket, Suffolk, who was a passenger in the car, was jailed for two years after admitting aggravated vehicle taking and burglary of a commercial premises.
