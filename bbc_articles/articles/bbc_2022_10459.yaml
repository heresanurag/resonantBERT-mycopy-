  Nadhim Zahawi says the government knows it has to "do more" but Labour says it is "missing in action".

  What happens to those of us on a fixed price tariff?

  Judy Power, from Staffordshire, wants to know if customers who've signed up to a two-year fixed price tariff with their energy supplier will see their bills increase after Ofgem's announcement today. Anyone on an existing fixed rate tariff will not see their bills rise until that deal ends. But as soon as it does, expect to be shifted onto a variable rate tariff, which is pegged to the price cap. In other words, if you’re not paying higher energy bills now, soon enough you will be. Once your deal ends, you only have two options, and neither of them are great. You can either stick to the price cap and hope that it falls sooner rather than later or pay a massive premium for a new fixed rate tariff from your existing supplier. The one advantage of the second option is that you would have certainty about how much your bills would cost. But even if you can afford the enormous mark up, you would be gambling on the possibility that energy prices won’t come down over the term of that tariff. The best thing to do is to keep an eye on energy price cap predictions and whether they lead to more reasonable fixed tariffs coming through. If so, you may have to snap them up quick.
