title: Darren Millar elected Welsh Conservative leader unopposed - BBC News
date: '2024-12-05'
section: Wales
url: http://www.bbc.co.uk/news/articles/czr3mdvzl8ro
content: |-
  Millar is confirmed as the party's Senedd leader after being backed by all 15 other MSs.

  Darren Millar was supported by all of his Welsh Tory colleagues

  Darren Millar has been elected unopposed as the new leader of the Tories in the Welsh Parliament. He faced no opposition after all the party's Members of the Senedd (MSs) and all his potential rivals endorsed their chief whip for the job. Millar has promised to unify his group of 16 Welsh Conservatives after Andrew RT Davies dramatically quit on Tuesday. He is the third Welsh leader to be elected without a ballot of their respective parties in two years, after Eluned Morgan for Labour and Rhun ap Iorwerth for Plaid Cymru.

  Former Welsh Secretary and ex-Monmouth MP David TC Davies will be Millar's chief of staff. Conservatives in the Senedd had just over 48 hours to nominate candidates for the contest to find the new leader, after Davies quit at lunchtime on Tuesday. All potential rivals had ruled themselves out well before Thursday's 1700 GMT deadline. Davies decision to go - which followed a vote of confidence that he narrowly won - came after months of pressure over the direction of the party, and calls for the Welsh Conservatives to offer more of an alternative to Labour. Millar told BBC Wales he is aiming to be the first Tory first minister at the next election in 2026. "Wales is broken, and we'll develop a plan to fix it and present that to the public in advance of those elections in 2026," he said. "I believe in freedom of choice, personal responsibility, and these are the things which I will campaign with a platform on." Asked if he was a sticking plaster candidate, he said: "Absolutely not." "I've been involved in politics for many years," he said. "I've always ploughed my own furrow, and that is what I intend to do going forward". The former Westminster candidate for this year's general election said he was "absolutely committed" to the Senedd. Unlike in Scotland, Millar is only heads the party's MSs and is not leader of all Welsh Conservatives. It would be a decision for the UK party to change it, but Millar said he had always been of the view that the Senedd group leader should be the "de facto Conservative leader in Wales". Millar will be leader of the opposition, and will face Eluned Morgan weekly in first minister's question time in the Senedd.

  Millar, 48, was chief whip under Davies, in charge of Tory discipline in the Senedd. Brought up in Towyn, Conwy, he is married with two grown-up children and now lives in Kinmel Bay. He is arguably the most senior Welsh Conservative still in office who is not the outgoing leader and is known for making robust contributions in the Senedd, particularly on the Welsh NHS when he was the party's health spokesman. His website says Millar worked as a manager for an international charity supporting persecuted Christians before he joined Cardiff Bay politics. The MS suffered a setback in late 2020, when he temporarily quit his front-bench after he and three other Senedd members were seen drinking on Welsh Parliament premises during a pandemic pub alcohol ban. Millar returned as chief whip after the May 2021 Senedd election and the four politicians were cleared of breaking the Senedd's code of conduct.

  Andrew RT Davies narrowly won a confidence vote before resigning the same morning

  Millar will face questions about where to take the party next as the Welsh Conservatives prepare for the 2026 Senedd election, and after a disastrous general election where they lost all their MPs. A recent opinion poll put the Tories in fourth, behind Plaid Cymru, Labour and Reform. Davies' downfall was prompted by concerns in the Senedd and elsewhere in the Tories about the party's direction. Supporters of Davies believed he should head into more of a Reform-style direction. His detractors wanted to see him offer a broader alternative. Stories about disputed claims Davies had made about halal meat in a school, and a social media message where he asked if people thought the Senedd should be abolished - the party has officially supported devolution for many years. Some of the Tory's MSs allegedly told Davies to quit last week. In response he called a vote of confidence, which he won only narrowly. Former Downing Street communications director to Boris Johnson, Guto Harri, said the challenge for the Conservatives was "not to swap one leader for another", but "to position the party to offer itself as an alternative government in Cardiff to Labour". "Let's get back to what it is to be a Conservative. It's not to be an eccentric crowd pleaser, or a lobbyist for farmers, though they're part of the mix. "It's to go back to advocating a small state that takes less of your money." He said Millar needed to bring forward "a lot of talent", including former Tory MPs. "I wouldn't waste Stephen Crabb, I wouldn't waste David TC Davies," he said. But one Conservative source said they thought Millar's election showed "lack of ambition that the Senedd group has for Wales". "If Darren Millar is the answer, what was the question?"

  Darren Millar's approach is likely to be different to his predecessor. Expect plenty on what he thinks Wales would look like if the Conservatives were in power – what he would call a more positive message. Expect him to do all he can to end 25 years of Welsh Labour in power. Mr Millar says he believes he can become first minister, and is also open to a deal with any of the other political parties in the Senedd to make sure there is no Labour FM after the 2026 election. Significantly he has also appointed a man who has sat at the top Conservative table before - former Welsh secretary David TC Davies is his most senior adviser. First impressions on day one are that Millar means business.

  A Welsh Labour spokesperson said: "Voters have already rejected Darren Millar and his colleagues at the general election. Instead of trying to understand why, they are papering over the cracks." Reform UK Wales spokesman, Oliver Lewis, said: "The simple fact is, Darren Millar has been an MS since 2007 and has been nothing but ineffective in opposition, just like every other Welsh Tory." Plaid Cymru leader Rhun ap Iorwerth congratulated Millar but said he takes the job "at a time of chaos and infighting in his party, and with the Tories having failed to offer any credible solutions to the challenges facing Wales". A Welsh Liberal Democrat spokesperson added: "In July Welsh voters delivered their devastating verdict on the Conservatives, booting out every single Tory MP in Wales. Re-arranging the deckchairs in their Senedd group isn't going to make anyone forget their record of incompetence, sleaze, and failure."
