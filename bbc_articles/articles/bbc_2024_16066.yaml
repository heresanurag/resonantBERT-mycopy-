  A snap is heard and Trump flinches. More snaps, and Trump clutches his right ear and begins to duck beneath the podium. A shout of "DOWN DOWN DOWN GET DOWN" is heard as confused screams well up from the crowd. Within seconds the former president is mobbed by four Secret Service agents as yet more shots echo around the grounds. Shocked crowd members duck in their seats - there is nowhere to go. They know nothing of the condition of the former president now under a scrum of security. To the left of the stage, a loudspeaker rig appears to have been hit by a bullet, gas escaping from the hydraulics as the speakers begin falling to the ground. Confused screams become ever louder. A video posted to the TMZ website shows Crooks on the roof around this time, the air filled with the sounds of gunfire and the yells from people below. "What is he doing?" screams one woman, as a man warns "he's turning this way, guys". But Crooks has only seconds to live. Secret Service counter-snipers acquire him as a target within 11 seconds of his first shot. Fifteen seconds after that he is dead, CBS quoted security sources as saying.

  Trump, with blood pouring from an ear wound, is hurried off the stage

  "I heard about four or five shots and everyone was running," said Mr Smith afterwards. "I stood by the tree and watched him get shot in the head by the Secret Service. They took him out but... security failure, 100%." Back on the stage, Trump is buried under even more agents. "Hold, hold are you ready? On you," says one of the guards as his words are picked up by the podium microphone. "Move! Move!" Officers in combat gear then take up positions around them, their assault rifles at the ready. "Shooter's down, we're clear," an agent shouts and Trump is hoisted back into view. Blood covers his ear and there are spatters on his face and shirt collar, but he tells the agents, "let me get my speaker, let me get my shoes.... wait wait wait." He then repeatedly punches his fist into the air and mouths the words "fight, fight, fight", before being hauled away by agents still using their bodies as cover. Shouts of "USA! USA!" rise up as Trump is led off the stage, approximately one minute and 10 seconds after the first shot.

  People at the rally expressed their shock

  While the former president survived without serious injury, others had not. Some of Crooks' bullets missed Trump but struck the crowd. Mr Comperatore, the volunteer firefighter, was hit in the head as he shielded his family. A doctor seated behind the stage, James Sweetland, tried to help. "Someone over there was screaming, 'He's been shot, he's been shot'," Dr Sweetland told the BBC. "The guy had spun around [and was] jammed between the benches. There was a lot of blood." He couldn't do anything to help. Mr Comperatore was dead. Two other people, David Dutch, 57, and 74-year-old James Copenhaver, were critically injured, but survived. A few hours later, back at home, Mr Smith recalled watching the "terrifying" aftermath on television. "There were a lot of kids up there with us, terrified. They're still terrified. My kid was terrified, crying and begging me to take him home. "I can't accept that there is ever a reason for something like this to happen." The would-be assassin was dead, Trump had survived, but answers are yet to be given about how this could have happened so easily.
