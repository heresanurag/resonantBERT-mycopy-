  The A12, which connects Lowestoft in Suffolk to London, is ranked as the worst A-road in England.

  The A12, which connects Lowestoft in Suffolk to London, via Essex, has been ranked as the worst road in England by road users in a survey by Transport Focus.

  The watchdog created the questionnaire to give National Highways and the government an idea of people's experiences on major roads and motorways, and to show where improvements were needed.

  Jordan Sargeant, manager for Transport Focus, said the reason why the A12 had such negative feedback was the volume of roadworks.

  Here is a sped-up video showing what it is like to drive along.
