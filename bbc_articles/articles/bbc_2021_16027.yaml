title: Police probe theft of Glasgow copper pine cone bollards - BBC News
date: '2021-12-15'
section: Glasgow & West Scotland
url: http://www.bbc.co.uk/news/uk-scotland-glasgow-west-59670618
content: |-
  Nine of the sculptures are missing in Glasgow's Gorbals after two were reported stolen on Monday.

  Two pine cones were reported stolen from McNeil Gardens on Monday

  A number of public artworks in the shape of pine cones have disappeared from the Gorbals in Glasgow.

  Police discovered nine of the 2ft (0.6m) copper bollards were missing after two were reported stolen.

  Officers heard that two men put two of the pine cones from McNeil Gardens into a vehicle and drove off at about 00:45 on Monday.

  It is thought they may have been stolen for the copper coating, however inquiries are ongoing.

  Officers are reviewing CCTV footage from the area and have appealed for any witnesses to contact Police Scotland via the non-emergency line.

  Sgt Gary Bone said: "We believe the items may have been stolen so they can be stripped of their copper coating.

  "I am appealing to people in the local community to get in touch with us as we work to establish what has happened to these structures."

  The copper pine cones were installed alongside bollards in housing areas in the Gorbals

  Created by Gorbals Art Project and artists Cathy Keay and Liz Peden, the original 16 bollards were installed by New Gorbals Housing Association (NGHA) as part of traffic calming work in 1998.

  They were made by Edinburgh firm Powderhall Bronze in Granton, who have now been asked for nine replacements.

  The NGHA said the bollards have been targeted and replaced before, but that nine were stolen over the weekend and another damaged in an attempt to remove it.

  A spokesperson said they are "extremely heavy" and would require specialist equipment to remove.

  Director Fraser Stewart said: "This is a theft of community public art that not only enhanced our streets but made them safer.

  "The pine cones were a feature of McNeil Street and Moffat Street, adding to the character of the neighbourhood.

  "We urge anyone who may have any information to contact Police Scotland, as we are anxious to see their safe return to their rightful place in the community."

