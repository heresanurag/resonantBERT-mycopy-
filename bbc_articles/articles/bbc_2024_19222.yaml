title: 'Newspaper headlines: Southport suspect ''unmasked'' - BBC News'
date: '2024-08-02'
section: The Papers
url: http://www.bbc.co.uk/news/articles/c2e404mdj1yo
content: |-
  Friday's front pages continue to be dominated by the Southport knife attacks.

  Southport suspect 'unmasked' and Starmer 'takes on far right'

  The Daily Telegraph, external leads with Sir Keir Starmer blaming the far right for organising violent protests that have broken out across the country since the multiple stabbings in Southport. The paper says the demonstrations have been fuelled by online speculation about the attacker's motives, including false claims he was an asylum seeker. The Daily Mirror, external says the prime minister has promised to take on the "far-right thugs". It reports that under the bid to stamp out what it calls "the mob violence plaguing Britain" - known agitators will be stopped from travelling, in a similar way to how football banning orders stop hooligans attending matches. Police have been urged to step up patrols outside mosques and asylum seeker accommodation, according to the Guardian, external. It says at least 19 far-right rallies are being planned across England in the coming days. It says community leaders are increasingly fearful after attacks on mosques in Southport and Hartlepool and because of the actions of "intimidating" activists. The Daily Express, external and The Metro, external picture the 17 year-old accused of murdering the three girls at a children's dance class after a judge ruled he could be named. Both use headlines declaring he has been "unmasked".

  The Times, external is one those to report that prisoners serving whole life terms will be banned from getting married under a fast-tracked law. The paper has been told it has been brought in by the justice secretary to stop an application by the serial killer Levi Bellfield for a civil partnership. Bellfield, who murdered three people including 13 year-old Millie Dowler, had previously won a case to be allowed to marry, but the wedding was called off. The first cut in interest rates in four years is the lead story in the Financial Times, external. It says the decision came in a "knife-edge vote" that marks a boost to the Labour government's promise to kick-start economic growth. It adds that the move is the latest sign of growing confidence among central banks that the "post-Covid price jump has been vanquished". The i, external notes that the interest rate cut will lead to a £3bn drop in the government's own debt repayments. But economists have told the paper the move comes too late to ease the chancellor's plans for a spending squeeze. "Say Goodbye to your doctor's appointment" is the headline in the Daily Mail., external It claims that patients face "months of misery" after GPs launched industrial action that will see some doctors drastically reducing their appointments. It says the move means "potential health risks for vast swathes of the population". A spokesperson for the doctors' union, the BMA, tells the paper GPs are "at the end of their tether". And there are plenty of tributes to Sir Andy Murray, whose defeat with Dan Evans at the Paris Olympics marks the end of his career. The Daily Telegraph, external says there "wasn't a dry eye in the house" as he made an emotional farewell at Roland Garros. The Sun, external has "It all ends in Paris tears for Andy". The Daily Mirror, external's caption is "Thank You Andy, it's been ace". The Daily Express, external asks "When will we see his like again?" and the Daily Mail, external sums it up simply with "Farewell Legend".

