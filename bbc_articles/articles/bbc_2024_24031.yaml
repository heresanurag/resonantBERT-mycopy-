  Home hope Jessica Pegula will face title favourite Aryna Sabalenka in Saturday's US Open final after an electric night in New York.

  Pegula fights back to set up US Open final against Sabalenka

  Jessica Pegula is into her first Grand Slam singles final

  Home favourite Jessica Pegula staged a stunning comeback to set up an enticing US Open final against world number two Aryna Sabalenka. American Pegula came back from a set, break and break point down to see off Karolina Muchova 1-6 6-4 6-2 and reach a first major singles final. She will now face Sabalenka, who powered into the final for the second year in a row with a 6-3 7-6 (7-2) victory over American Emma Navarro 6-3 7-2. The Belarusian is the first women's player since the great Serena Williams in 2019 to reach back-to-back singles finals at Flushing Meadows.

  Sabalenka will be greeted by a wall of noisy support for New York-born Pegula on Saturday - but she already has experience in that area, having jokingly admonished the crowd for cheering for Navarro. "Well now you're cheering for me, it's a bit too late," Sabalenka said as she began her post-match interview. "It really means a lot and even though you guys were supporting her still I had goosebumps for you cheering." Having previously promised to buy the crowd drinks if they cheered for her, Sabalenka joked: "Margaritas for everyone!" Pegula had previously lost her past six major quarter-finals before beating world number one Iga Swiatek on Thursday, and she followed that up with a battling victory over Muchova. "I came out flat but she was playing unbelievable, she made me look like a beginner," Pegula said. "I was about to burst into tears because it was embarrassing, she was destroying me. "I don't know how I turned that around, honestly."

  Aryna Sabalenka has reached the final of the past four hard court Grand Slams

  Poland's Swiatek is the player at the top of the world rankings, but arguably Sabalenka is the best hard-court player in the world. Always a powerful player, Sabalenka struggled for years with her serve, ultimately deciding to work with a biomechanics expert to cut down the number of double faults. That helped her win two Australian Open titles, but this year she has moved up a gear mentally, being able to block out the crowd noise and shrug off errors and momentum swings better than usual. Her easy power was on show against Navarro - she hit 34 winners to the American's 13 - but she also made the same amount of unforced errors. The two traded early breaks before a pounding Sabalenka forehand gave her a 4-2 lead and, after seeing off a break back point, she served out the first set. She was merciless on Navarro's second serve, again going an early break up, but as the finish line came into sight, Sabalenka's nerves showed and she was broken when serving for the match. However, her quality showed in the tie-break, with the second seed reeling off seven points in a row to see off Navarro. Afterwards, Sabalenka said she thought back to last year's final, where she was visibly distracted by the noisy support for Gauff. "I had really tough lessons here in the past. I wasn't ready, then I got emotional, then I just couldn't handle the crowd," Sabalenka said. "I'm still hoping to hold that beautiful trophy."

  Jessica Pegula won the Canadian Open in the build-up to her home Grand Slam

  Pegula has ground her way up the rankings over the past few years, culminating in her reaching a much-wanted Slam final. It has not been easy - she has been asked questions for years about her quarter-final struggles, having previously reached the last eight of every major but failing to kick on in six attempts. She split with long-term coach David Witt at the start of the year before struggling with injury, with a neck and back problem disrupting her clay-court season. Pegula has also had little joy at the Slams, missing the French Open and losing in the second rounds of the Australian Open and Wimbledon. She was superb against an off-colour Swiatek earlier in the week to put her quarter-final hoodoo behind her - but she started terribly against Muchova, much to the shock of the crowd. Watched by her family, including her father Terry who owns the Buffalo Bills NFL franchise, Pegula sprayed errors around the court, with Muchova winning 19 of the final 23 points to rattle through the opener. It looked as though the Czech, a beautifully deft player, would rout Pegula when she broke serve in the first game of the second set and backed it up for a 2-0 lead. Pegula then found herself 30-40 down on serve and staring at a double break deficit, before Muchova missed a routine volley and momentum swung back towards the American. Urged on by the crowd, the two traded breaks, before Muchova produced her worst tennis of the match to be broken and send proceedings to a decider. Although Muchova upped her level, Pegula was dialled in, rarely missing from the baseline, and she claimed a crucial early break before advancing as her opponent speared a shot long.
