  But simultaneous evacuation could mean residents have to look after themselves.

  The average fire service response time is around seven minutes, but lives can still be at risk, according to evacuation expert Elspeth Grant. "It can take 20 minutes for firefighters to begin systematic rescues in a tower." Those 20 minutes could be fatal, she says.

  The inquiry recommended nearly two dozen improvements to firefighting, the management of tall buildings and planning for evacuations. The government has yet to implement many of them, though a fire safety order will be issued this autumn and enacted next year.

  But in one highly controversial area, ministers say it is not practical to do more.

  It is a horrifying fact that 15 of the 37 people with disabilities living at Grenfell Tower did not get out. As a result, the public inquiry recommended any vulnerable person living in a tower be assessed and given a personal emergency evacuation plan, or Peep.

  This can involve safety checks to ensure there are, for example, handrails or that the edges of stairs are clearly marked. Peeps can recommend that an evacuation chair is made available, a specialist device capable of rolling down stairs. They also include designated "buddies", either family members or neighbours, to help a vulnerable person in an emergency.

  Many British tower blocks have only one stairwell which will be used by fire fighters as well as people fleeing

  Prof Ed Galea, from the Fire Safety Engineering Group, has been studying evacuations for decades, including rail and air disasters, the World Trade Center attack, as well as Grenfell. He is a strong defender of Peeps.

  He says that for every disabled person in Grenfell Tower, there were five residents who could have provided them with potentially life-saving assistance.

  "No-one needed to have died at Grenfell. It's possible to have got every single person out. It's doable, it's achievable." He believes a close-knit community like Grenfell would have wanted to protect the vulnerable.

  For Georgie Hulme, who lives in a Manchester tower block with safety issues, her evacuation plan provides "huge peace of mind".

  Without it, Georgie, who uses a wheelchair, says: "I would need to wait to be rescued by the fire service. Why should disabled people be expected to remain in their flat, whilst their neighbours who can, are told to evacuate immediately?"

  Georgie Hulme speaks for people with mobility issues living in high-rise flats

  But the government says it can't recommend the widespread introduction of Peeps, and it looks likely this recommendation of the Grenfell Inquiry will not be fully delivered.

  In a statement to the House of Lords, fire safety minister Lord Greenhalgh said: "How can you evacuate a mobility-impaired person from a tall building before the professionals from the fire and rescue service arrive?

  "How much is it reasonable to spend to do this at the same time as we seek to protect residents and taxpayers from excessive costs?

  "How can you ensure that an evacuation of mobility-impaired people is carried out in a way that does not hinder others in evacuating, or the fire service in fighting the fire?"

  Georgie Hulme's response: "It felt like a real kick in the teeth." She and others told the BBC of their outrage after being described as a "hindrance" to firefighters.

  The government estimates that on average 11 people in each tower block is mobility impaired. It says Peeps are not practical.

  It believes "buddies" could not be relied upon to be there in an emergency and respond adequately. They would need to be trained and there could be legal consequences for their actions, or lack of action, according to a government consultation. They could be held responsible if anything went wrong.

  It estimates that building owners would end up employing staff to facilitate evacuations. Dozens might be needed, and each could cost up to £21,900 per building, per month to provide 24/7 cover.

  Instead of personalised evacuation plans, the government's proposals are less ambitious. They involve risk assessments for vulnerable people, and providing information to the fire service so that they can be rescued.

  That has an important implication, highlighted by many critics.

  Currently the legal onus is on the building owner to keep its residents safe. These changes would subtly move the duty to the fire service to carry out rescues. Disabled residents are now taking legal action against the government.

  A government spokesperson said: "Our fire reforms will go further than ever before to protect vulnerable people as we are determined to improve the safety of residents whose ability to self-evacuate may be compromised."

  Georgie Hulme's group, Claddag, representing residents living with mobility issues in buildings with safety flaws, has launched a judicial review claiming the government has ignored evidence, as well as equality and human rights legislation.

  In a legal letter to ministers, shared with the BBC, the group says: "It is difficult to convey the degree of upset, outrage and betrayal felt by affected disabled persons, bereaved, survivors and residents of Grenfell."
