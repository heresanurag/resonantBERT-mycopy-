title: 'Grenfell''s legacy: Should I ''stay put'' if there''s a fire in my tower block?
  - BBC News'
date: '2022-06-14'
section: UK
url: http://www.bbc.co.uk/news/uk-61724372
content: |-
  After it failed at Grenfell, why are people still being told to "stay put" in tower block fires?

  As Grenfell Tower burned, residents were told to stay in their flats and 72 people died. Five years on, "stay put" remains the policy for fires in most high-rise buildings.

  In the early hours of 14 June 2017 on the 9th floor of Grenfell Tower, Hanan Wahabi's 16-year-old son Zak made a crucial decision. The building had a policy - to "stay put" if there was a fire.

  "He decided we weren't going to stay put," Hanan says. "He went out, checked that it was safe for us to leave, came back, took his sister and we followed." She admits she was panicking. Zak became the parent. The family escaped.

  But on the 21st floor Hanan's brother Abzulaziz had a different view. "If the emergency services told him to stay put, he'd trust them," Hanan says. Abdulaziz, his wife Faouzia and their children Yasin, Nur Huda and Mehdi remained in their flat. They all died.

  The El-Wahabi family, Faouzia and Abdulaziz and their children Nur Huda, Mehdi and Yasin, died in the fire

  Stay put was repeatedly criticised at the Grenfell Tower public inquiry as the wrong advice for people in enormous danger.

  So why, five years on from Grenfell, is it still a policy the government believes is safe?

  Residential tower blocks are designed so that each flat is a concrete box. If a fire breaks out inside one flat, the theory is the occupants can escape, but their neighbours remain safe, because concrete doesn't burn.

  Many British blocks only have one staircase. The stay put policy aims to avoid a situation where people trying to escape prevent arriving firefighters reaching the blaze.

  Fire services don't rely on long ladders when tackling fires in tall buildings. They enter the tower and set up what's called a "bridgehead" - a safer area - two floors below the fire.

  From there they can connect their hoses to the building's internal water pipes, and head upstairs to tackle the flames.

  Inevitably this means propping open fire doors to the stairwell to run hoses, allowing smoke to spread, making the stairs an even riskier escape route.

  Watch Grenfell: Has Anything Changed? on iPlayer.

  But at Grenfell, the fire spread across the outside walls. In the few minutes it took Hanan Wahabi to escape, flames raced from the 9th floor where she lived to the 17th.

  So one of the disaster's biggest lessons is that sometimes "stay put" needs to be "get out".

  Prof Jose Torero, an expert adviser to the Grenfell Tower Inquiry, has gone further. This week, he concluded the risk of flames spreading in a fire is too difficult to predict. He said - in the short term at least - abandoning stay put for high rise residential was "essential".

  The hundreds of buildings that still have fire safety defects, or unsafe cladding, now have a policy of "simultaneous evacuation" - this is where residents leave as, or ideally before, firefighters arrive.

  But Grenfell has changed attitudes. Now people in a fire are not prepared to sit it out even if they are told to do so.

  When flames swept across the top of Michael Rudling's block in Deptford, south-east London, in April, thankfully he wasn't there. But if he had been, he'd have got out, despite the building's stay put policy.

  "I would have seen it on Twitter before anything else," he says. "People over the road were showing pictures with a big fire on the roof. If I'd seen that I would have thought, 'I'm not going to hang about.'"

  The public inquiry into the Grenfell disaster recommended the government and the fire service come up with strategies, that would apply in England, to handle a simultaneous evacuation.

  The London Fire Brigade has been practising that scenario. Incident commanders are using new tablets running an app to help them with the mass of information during a major incident.

