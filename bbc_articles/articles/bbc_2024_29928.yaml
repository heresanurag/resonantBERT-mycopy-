title: Fake paramedic Jamie Kadolski guilty of Tinder date rapes - BBC News
date: '2024-11-08'
section: Norfolk
url: http://www.bbc.co.uk/news/articles/c3rxppqynypo
content: |-
  Call handler Jamie Kadolski, 24, put stickers over his work ID card to hide his real role.

  Kadolski met his victims on the dating app Tinder

  A man who pretended to be a paramedic has been found guilty of raping and sexually assaulting women he met on an online dating website. Jamie Kadolski, 24, of Ladysmith Road, Norwich, was found guilty of committing nine sexual offences over an 18-month period. During the trial at Norwich Crown Court he denied the charges made by four different women, who he met on Tinder. Det Con Claire Floyd from Norfolk Police described Kadolski as "predatory and remorseless".

  Kadolski worked in the medical sector but never as a paramedic

  The court previously heard how the former East of England Ambulance Service call handler had told the women he was a paramedic. The prosecution told the jury that he used stickers on his work ID card to hide his more junior role. Kadolski was accused of 15 sexual offences, but on two charges the jury was told that he had no case to answer. He was found guilty of three counts of rape and three sexual offences against one woman, and a total of three sexual offences against two others. Det Con Floyd paid tribute to the "courage" shown by Kadolski's victims. "[I] hope that today's verdict will bring a small measure of comfort that justice has been delivered," she said. "I also hope it encourages anyone else who is a victim of this type of offence to have the confidence to come forward. "I don't underestimate the strength it takes to report sexual offences – but today's verdict shows we do take these reports seriously, and that we are dedicated to bringing predatory and remorseless offenders like Kadolski before the courts."

  Det Con Claire Floyd paid tribute to the "courage" shown by Kadolski's victims

  The jury had previously heard that when questioned by officers Kadolski said he would not be able to pin someone down as he had been “sexually abused as a child”. The jury heard Kadolski had three interviews with the police and when asked by officers if there were arguments with one of the complainants he said "no". He said that he remembered her crying once and told officers, "I'm not the best with empathy or sympathy."

  Kadolski will be sentenced in February

  Judge Anthony Bate adjourned sentencing until 7 February to allow preparation for a pre-sentence report. He also requested a psychological risk assessment to be carried out on Kadolski. "He seemed to be displaying traits of a personality disorder," Judge Bate added.

