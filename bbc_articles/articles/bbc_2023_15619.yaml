  The BBC's Fergal Keane reports on the young lives shattered by violence.

  The BBC's Fergal Keane reports on the impact the Israel-Gaza war is having on children in Gaza.

  The territory's Hamas-run health ministry says more than 2,300 children have been killed since the latest conflict began.
