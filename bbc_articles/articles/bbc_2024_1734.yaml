content: |-
  Georgia Ball was approached by a male golfer who "mansplained" the sport to here, while she was filming a video for TikTok.

  Professional golf player Georgia Ball said the encounter behind her viral "mansplaining" TikTok was "awkward".

  In a video with more than 10 million views, Ms Ball captured the moment a male golfer critiqued her technique. Many social media users have been sharing their reactions to his advice.

  "I'm glad I can laugh about it now," she told BBC Newsbeat.
