title: Reality TV star Stephen Bear guilty of sex tape offences - BBC News
date: '2022-12-14'
section: Essex
url: http://www.bbc.co.uk/news/uk-england-essex-63911965
content: |-
  Stephen Bear shared footage of himself having sex with a woman that ended up on the OnlyFans website.

  Stephen Bear had previously arrived in court in a white, chauffeur-driven Rolls-Royce

  A reality TV contestant has been found guilty of disclosing a private sexual film after a video of him having sex with a woman was published on OnlyFans.

  Stephen Bear, 32, shared a CCTV video of himself and Georgia Harrison, 27, effectively selling it for money.

  Bear, of Bryony Close in Loughton in Essex, denied voyeurism and two counts of disclosing private, sexual photographs and films.

  Ms Harrison said she had been through "absolute hell" since 2020.

  The 2016 Celebrity Big Brother winner was found guilty of all charges after more than eight and half hours of deliberation.

  The jury reached unanimous verdicts on both counts of disclosing private sexual photos and films with intent to cause distress. It returned a majority verdict of 10 to two on the count of voyeurism.

  Bear and Ms Harrison were recorded on CCTV in his garden in August 2020, the trial at Chelmsford Crown Court heard.

  Ms Harrison, who has appeared on reality shows The Only Way Is Essex, Love Island and Olivia Meets Her Match, said she did not know they were being filmed.

  Georgia Harrison, who waived her right to anonymity, said she had felt "ashamed, hurt, violated, even broken at times"

  She said that when Bear showed her the footage she told him "never to send" it to anyone and "made it plain how upset she would be if he did", said prosecutor Jacqueline Carey KC.

  Ms Harrison, who has waived her right to anonymity, also said she saw Bear send the footage to someone on WhatsApp and later became aware of it circulating online.

  Ms Carey said the defendant uploaded the footage "either himself or had it uploaded to OnlyFans and profited financially".

  Bear had told jurors he deleted the video in August 2020 and had not sent it to others.

  In a statement issued after the verdicts via Essex Police, Ms Harrison said the last two years had been "absolute hell".

  "Bear's behaviour was completely unacceptable and those who choose to commit such crimes should and will be prosecuted," she said.

  "I hope me taking a stand gives other men and women who have fallen victim to revenge porn the courage to seek justice and most importantly show them that they have absolutely nothing to be ashamed of.

  "I have felt ashamed, hurt, violated, even broken at times but today I stand here feeling empowered, grateful and a huge sense of unity with all of those who have reached out to support me throughout this ordeal."

  After the verdicts, Stephen Bear said it was "never a fair trial"

  Bear has been bailed until 31 January to return to the same court for sentencing after a report has been prepared about him.

  After the verdicts were returned he told the court he thought it was "never a fair trial, what the press said against me".

  "I was fighting a losing battle and it is what it is," he said.

  Judge Christopher Morgan told the defendant: "Thank you for that observation."

  Assistant Chief Constable Rachel Nolan praised Ms Harrison for her bravery throughout the case

  Assistant Chief Constable of Essex, Rachel Nolan, said: "This man thought he could treat women and girls like they were on a reality show. He thought he could commit appalling crimes in Essex and get away with it. He was wrong.

  "You can't try to shame and manipulate people to satisfy yourself. You can't pretend that taking intimate videos and sharing them without consent is OK. It's not. And if you try to get away with it in Essex, you won't, regardless of who you are."

  She thanked Ms Harrison for her bravery.

