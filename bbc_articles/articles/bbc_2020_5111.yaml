  The latest updates on the coronavirus pandemic in Scotland.

  The grandson of the seventh resident of a Skye care home to die after contracting Covid-19 has called her his "best friend and guiding light".

  Ina Beaton was 103 when the virus took her life at Home Farm in Portree on 11 May.

  Born Hectorina Matheson, she was a well known figure on the island and lived in her own home in Balmaqueen until just two years ago.

  Ina lived through the Great War, the Spanish flu of 1919 and moved to Glasgow during the war years where she worked as a conductress on the trams, surviving the Clydebank Blitz.

  Ailean Beaton thanked the staff at Home Farm care home who he said "had been through a lot".

  Quote Message: She was my best friend and guiding light, and we loved each other very much. If you know me, you know how much she meant to me. But the loss is shared across the entire island, especially the north end where she was mum, granny, friend to more than just the Beatons. Her crystal memory and broad experience of life in Skye over several generations meant that she contributed to our shared knowledge of the place we're from, its language and culture. At 103 years old, her perspective is literally irreplaceable. I never could have tired of her company . She was the first person I wanted to visit any time I travelled home. from Ailean Beaton Grandson of Ina Beaton She was my best friend and guiding light, and we loved each other very much. If you know me, you know how much she meant to me. But the loss is shared across the entire island, especially the north end where she was mum, granny, friend to more than just the Beatons. Her crystal memory and broad experience of life in Skye over several generations meant that she contributed to our shared knowledge of the place we're from, its language and culture. At 103 years old, her perspective is literally irreplaceable. I never could have tired of her company . She was the first person I wanted to visit any time I travelled home.
