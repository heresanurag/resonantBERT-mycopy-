title: 'Watch: Mount Etna night eruption caught on camera - BBC News'
date: '2023-08-14'
section: General
url: http://www.bbc.co.uk/news/world-europe-66497094
content: |-
  The most active volcano in Europe, located on the island of Sicily, erupted on Sunday night.

  Sicily's Mount Etna, the most active volcano in Europe, erupted on Sunday night, with the spectacle caught on camera.

  Italian authorities said that the volcano had entered a "pre-alert" phase, moving its warning level from F0 to F1.

  The volcano frequently erupts, but its activity rarely results in significant damage.
