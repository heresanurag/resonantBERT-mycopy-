content: |-
  The former Daily Mirror editor again insists he "never hacked a phone or told anyone else to hack a phone".

  Key Mirror execs knew about hacking - and covered it up

  The judge says two executives concealed hacking from Mirror board. We have already reported the judge's ruling that Piers Morgan knew about and was involved in hacking - but what did he say about other top figures at the Mirror Group? Justice Fancourt said two directors knew before the end of 2011: Paul Vickers, group legal director, and Sly Bailey, the chief executive officer. “The board as a whole was not told about it,” the judge told the court. “That was because the editors of the three newspapers, the editorial managers of the company and Bailey and Vickers did not report what they knew, or suspected, to the board. "I have found that Mr Vickers certainly knew about phone hacking from about the end of 2003, but quite possibly before then. "Ms Bailey knew or – what in law amounts to the same thing – turned a blind eye to it from about the end of 2006. "The likelihood of extensive illegal activity should have been investigated properly. "Instead, it was concealed from the board, from Parliament in 2007 and 2011, from the Leveson Inquiry, from shareholders, and from the public for years - and the extent of it was concealed from claimants in the Mirror Newspapers hacking litigation and even from the court at and before the trial in 2015."
