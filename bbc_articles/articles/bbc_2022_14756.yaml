title: 'Hurricane Nicole: Florida residents prepares as storm approaches - BBC News'
date: '2022-11-10'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-63579897
content: |-
  A rare November hurricane is expected to hit south-eastern or east central Florida.

  Residents in Florida are preparing for Hurricane Nicole, which is expected to hit south-eastern or east central Florida early on Thursday.

  Videos show residents in Daytona Beach boarding up the windows of their homes and businesses as the hurricane approaches from the state's Atlantic coast.

  Nicole has already grounded flights and shut theme parks and schools ahead of its projected landfall.
