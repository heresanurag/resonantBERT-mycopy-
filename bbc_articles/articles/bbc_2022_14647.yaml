title: 'Cristiano Ronaldo: Manchester United forward says he feels ''betrayed'' by
  club - BBC Sport'
date: '2022-11-14'
section: General
url: http://www.bbc.co.uk/sport/football/63619074
content: "Cristiano Ronaldo says he feels \"betrayed\" by Manchester United, does\
  \ not respect manager Erik ten Hag and is being forced out.\n\nLast updated on .From\
  \ the section Man Utd\n\nManchester United forward Cristiano Ronaldo says he feels\
  \ \"betrayed\" by the club, does not respect manager Erik ten Hag and is being forced\
  \ out.\n\nRonaldo, 37, promised in August he would give his version of life at Old\
  \ Trafford after failing to secure a move to a club playing in the Champions League,\
  \ as he had hoped.\n\nHe has now spoken out in an interview with Piers Morgan for\
  \ TalkTV.\n\nA Manchester United statement said the club had \"noted the media coverage\"\
  .\n\nIn extracts from the wide-ranging interview - published in the Sun, Ronaldo\
  \ said:\n• None People at the club were trying to force him out.\n• None There had\
  \ been \"no evolution\" at the club since Sir Alex Ferguson's departure in 2013,\
  \ and the Scot agreed United were \"not on the path they deserve to be\".\n• None\
  \ The club showed a lack of \"empathy\" when his young daughter was hospitalised\
  \ in July.\n• None He had \"never heard\" of previous manager Ralf Rangnick.\n•\
  \ None He did not know why former team-mate Wayne Rooney criticised him, adding:\
  \ \"Probably because he finished his career and I'm still playing.\"\n\nThe interview\
  \ will be shown over two nights on Wednesday and Thursday.\n\nAsked by Morgan if\
  \ United's hierarchy were trying to force him out, Ronaldo said: \"Yes, not only\
  \ the coach, but another two or three guys around the club. I felt betrayed.\"\n\
  \nPushed as to whether senior club executives were trying to oust him, he added:\
  \ \"People should listen to the truth. Yes, I felt betrayed and I felt like some\
  \ people don't want me here, not only this year but last year too.\"\n\nThe Red\
  \ Devils, who beat Fulham 2-1 on Sunday, are fifth in the Premier League in Ten\
  \ Hag's first season as manager.\n\n\"The club will consider its response after\
  \ the full facts have been established,\" United said in a statement on Monday.\n\
  \n\"Our focus remains on preparing for the second half of the season and continuing\
  \ the momentum, belief and togetherness being built among the players, manager,\
  \ staff and fans.\"\n\nRonaldo says he has no 'respect' for Ten Hag\n\nRonaldo has\
  \ not played because of an unspecified illness since he captained United in their\
  \ 3-1 defeat at Aston Villa on 6 November.\n\nHe was dropped for the Premier League\
  \ game at Chelsea last month by Ten Hag after refusing to come on as a substitute\
  \ against Tottenham three days earlier.\n\n\"I don't have respect for him because\
  \ he doesn't show respect for me,\" Ronaldo said. \"If you don't have respect for\
  \ me, I'm never gonna have respect for you.\"\n\nRonaldo also spoke about the loss\
  \ of his baby son in April and how touched he was by a tribute paid to him by Liverpool\
  \ fans at a game against United at Anfield in the days afterwards.\n\nThe whole\
  \ interview is 90 minutes long but Morgan has written a version for the Sun in which\
  \ it is clear the contempt Ronaldo has for how he has found United since he returned\
  \ to the club amid huge fanfare in August 2021.\n\n\"I think the fans should know\
  \ the truth,\" he said. \"I want the best for the club. This is why I come to Manchester\
  \ United.\"\n\nRonaldo said he had seen \"no evolution\" at the club since former\
  \ manager Sir Alex Ferguson retired in 2013.\n\n\"Nothing had changed,\" he said.\
  \ \"I love Manchester United. I love the fans, they're always on my side. But if\
  \ they want to do it different... they have to change many, many things.\"\n\nRonaldo\
  \ said his view of the club was shared by Ferguson, who was pivotal in his return\
  \ to Old Trafford from Juventus when it appeared he might join Manchester City.\n\
  \n\"He knows better than anybody that the club is not on the path they deserve to\
  \ be,\" added Ronaldo.\n\n\"He knows. Everyone knows. The people who don't see that...\
  \ it's because they don't want to see; they are blind.\"\n\nRonaldo had not 'heard'\
  \ of Rangnick\n\nRonaldo's former team-mate Ole Gunnar Solskjaer was United manager\
  \ when the Portuguese returned to the club before he was succeeded by Ralf Rangnick\
  \ and then Ten Hag.\n\nRangnick left his role as head of sports and development\
  \ at Lokomotiv Moscow to take up the job. He had previously built his reputation\
  \ during his time in Germany, with Liverpool boss Jurgen Klopp and former Chelsea\
  \ manager Thomas Tuchel speaking highly about their compatriot.\n\nOn Rangnick,\
  \ Ronaldo said: \"If you're not even a coach, how are you going to be the boss of\
  \ Manchester United? I'd never even heard of him.\"\n\nRonaldo also responded to\
  \ criticism from former United team-mate Wayne Rooney about his behaviour this season.\n\
  \n\"I don't know why he criticises me so badly... probably because he finished his\
  \ career and I'm still playing at a high level,\" said Ronaldo.\n\n\"I'm not going\
  \ to say that I'm looking better than him. Which is true...\"\n\n'An interview that\
  \ is his version of the truth' - reaction\n\nMatch of the Day 2 pundits Jermaine\
  \ Jenas and Jermain Defoe both criticised Ronaldo for his comments.\n\n\"We have\
  \ seen nothing but petulance throughout the season, with the walking down the tunnel,\"\
  \ Jenas said.\n\n\"\uFEFFHe's a frustrated player, whether he feels like he's been\
  \ lied to or what, today just doesn't feel right to me. It's not going to help him\
  \ and he has to be done at the club.\"\n\nD\uFEFFefoe added: \"I think it's quite\
  \ disappointing to be honest, he has nothing to prove so I can't understand why\
  \ he would want to put his point across. Maybe his ego is dented a little bit.\"\
  \n\nFormer England defender and Sky Sports pundit Jamie Carragher said the majority\
  \ of United fans would side with Ten Hag.\n\n\"He wants to be sacked, I think that's\
  \ obvious,\" he told Sky Sports News.\n\n\"I think he's disrespecting Man United\
  \ and Erik ten Hag. I think he's now basically trying to be sacked or allowed to\
  \ leave on a free by the club because that's the only way he's going to get out.\"\
  \n\nAndy Mitten, editor of United We Stand magazine, told BBC Radio 5 Live: \"He's\
  \ not been forced out. He wanted to leave in the summer and thought he was leaving,\
  \ but there was a shortage of suitors.\n\n\"He has done an interview that's his\
  \ version of the truth and there's often more than one version of the truth in life.\n\
  \n\"I don't think United fans would be hugely concerned if he didn't play for the\
  \ club again.\"\n• None All the latest Manchester United news, analysis and fan\
