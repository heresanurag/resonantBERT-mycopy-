title: 'Hainault sword killing: Daniel Anjorin was attacked from behind, court hears
  - BBC News'
date: '2024-05-07'
section: London
url: http://www.bbc.co.uk/news/uk-england-london-68968817
content: |-
  Marcus Arduini Monzo allegedly ran up behind Daniel Anjorin and slashed him in the neck and chest.

  Marcus Arduini Monzo, wearing a grey tracksuit, confirmed his name and age

  A man has appeared at the Old Bailey accused of murdering a boy by running up behind him and slashing his neck and chest with a samurai sword. Marcus Arduini Monzo, 36, allegedly attacked 14-year-old Daniel Anjorin as he walked to school in Hainault, north-east London, on 30 April. Four other people - including two police officers - were seriously injured in separate attacks, all within 20 minutes. A trial is set to begin in February. On Tuesday, Mr Monzo, a dual Spanish-Brazilian national living in Newham, east London, confirmed his name and date of birth as he stood in the dock. Judge Mark Lucraft KC set a timetable for the case with a plea hearing on 23 July and a provisional three-week trial at the Old Bailey from 3 February.

  Mr Monzo seen in 2016 after winning medals at a jiu-jitsu tournament

  Just before 07:00 BST last Tuesday, Mr Monzo allegedly crashed a van into a fence in Laing Close, hitting member of the public, Donato Iwule. He then allegedly attacked Daniel from behind, slashing his neck and stabbing him in the chest as he lay on the ground. Prosecution barrister Tom Little KC told the court that Daniel was "largely decapitated" in the attack. A post-mortem examination found the cause of death was "sharp-force trauma to the head". When police officers went to help the teenager, Mr Monzo allegedly appeared from a bush. The court heard he attacked PC Yasmin Margaret Mechem-Whitfield, causing her "significant injuries".

  People left flowers and cards at the scene

  The defendant then allegedly made his way across a number of gardens before entering the home of a couple who were asleep with their four-year-old child. Mr Monzo allegedly attacked the father, Henry De Los Rios Polania, in the bedroom, causing injuries to his neck and arm. A second officer, Insp Moloy Elec Campbell, tried to stop the defendant and was also stabbed with the sword, it is alleged. The defendant was eventually Tasered and arrested.

  Mr Monzo is accused of Daniel's murder, the attempted murder of Mr Iwule and PC Mechem-Whitfield, and causing grievous bodily harm with intent to Mr De Los Rios Polania and Insp Campbell. He has also been charged with aggravated burglary and possession of a bladed article.

  Daniel Anjorin's parents say they cannot process the idea Daniel is gone

  On Saturday, Daniel's parents issued a statement paying tribute to their "loved and amazing son". They said: "We as a family are devastated by the loss of our beloved son Daniel. "It is difficult for us at this time to process what has happened to him and that he will never come home. Daniel had left the house for school and then he was gone. "Our children have lost their loving and precious brother and we have lost the most loved and amazing son." The family sent "best wishes" for the other victims of the "unthinkable incident" and thanked the local community for their support. On Sunday, more than 300 people gathered at a vigil to pay tribute to Daniel.

