content: |-
  Thursday's front pages are dominated by a phone call between Donald Trump and Vladimir Putin.

  Putin 'peace talks' and a 'game of no halves'

  In what's described by the Daily Mirror, external as a "conflict breakthrough", much is made of President Trump's call with Vladimir Putin. The Guardian says the "rapid entry", external into talks to end the war in Ukraine will have "set alarm bells ringing" in Kyiv and across Europe that the Trump administration will "offer minimal resistance to Putin's demands in order to cut a deal as soon as possible". According to the Daily Telegraph, there are also fears that Ukraine and Europe are being "frozen out of the negotiations", external because Trump has pledged to visit Russia as well as inviting President Putin to Washington. The Sun, external draws comparisons with Neville Chamberlain's "peace for our time" declaration in 1938, after it was announced negotiations over Ukraine would begin in the same city, Munich, on Friday. The talks in 1938 involved concessions for Adolf Hitler a year before he invaded Poland, triggering the Second World War. One defence analyst tells the newspaper that he fears "history is repeating itself with potentially terrifying consequences". "Will peace deal betray Ukraine?" asks the Daily Mail., external The paper says any agreement is expected to include Russia keeping territory it has annexed since 2014. A land warfare expert quoted in the Times, external suggests that for any peacekeeping force to be a "credible deterrent" it would require at least 100,000 troops on the ground. The Daily Telegraph notes that Ukraine will likely get a "grim deal", external but points out that if it can remain free and become prosperous then the Ukrainian people can be said to have won. The i leads on speculation that the prime minister is planning his first cabinet reshuffle, external as part of attempts to "jumpstart" his administration. The Education Secretary, Bridget Phillipson, is reportedly "at risk" with No 10 officials dismayed by her handling of Ofsted reforms and the introduction of VAT on private school fees. Another "in peril", is Culture Secretary Lisa Nandy because some in Downing Street claim she cannot be relied on to show up at events. A No 10 source has flatly denied that any plans for a reshuffle are already in motion. "Badenknocked" is the Daily Mirror's verdict on the Conservative leader's performance at Prime Minister's Questions on Wednesday. The paper says Kemi Badenoch was left "on the hop" as Sir Keir Starmer "batted away" questions about immigration. The i's Kitty Donaldson describes Mrs Badenoch as "under prepared, ill-briefed and stuttering through her questions", external. But Quentin Letts of Daily Mail draws attention to the "crazed braying", external of Labour MPs, suggesting for a party that thinks Badenoch is "useless", it seems "queerly agitated about her". And a "golden Goodison goodbye" is how the Times describes the 2-2 draw between Everton and Liverpool in the final Merseyside derby to be played at Goodison Park. The match saw Everton equalise in the 98th minute - an ending the Sun, external says would have been dismissed as "too outrageous" if a scriptwriter had pitched it. The Daily Mail's football editor, Ian Ladyman, describes the match as "fractious and full of meaning". It was, he concludes: "just like any argument between neighbours".

