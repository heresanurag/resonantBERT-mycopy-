title: 'Huw Edwards: BBC to resume inquiry and Sun faces questions - BBC News'
date: '2023-07-13'
section: UK
url: http://www.bbc.co.uk/news/live/uk-66174146
content: |-
  The corporation's director general says the case remains very complex and the internal inquiry will follow due process

  We're bringing our coverage of this story to a close now

  Today we've heard a number of media experts give their thoughts on how the story has unfolded, and we've heard from some friends and colleagues of Huw Edwards too. Meanwhile, the BBC has resumed its investigation into the presenter's conduct, and we now know senior BBC figures will be asked to talk about their handling of the story during a pre-existing Parliamentary committee session next week. You can find further coverage on this story here. Lastly, a reminder that as this story contains a lot of distressing and difficult themes - organisations offering help and support with a host of issues are listed at BBC Actionline. Thanks for joining us, have a good afternoon.
