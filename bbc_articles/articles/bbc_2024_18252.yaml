title: 'Harry Kane Tottenham return: Striker gets standing ovation in Bayern friendly
  - BBC Sport'
date: '2024-08-11'
section: European Football
url: http://www.bbc.co.uk/sport/football/articles/cvg56l0yel3o
content: |-
  Bayern Munich striker Harry Kane is given a standing ovation at former club Tottenham as the German side beat Spurs 3-2 in a pre-season friendly.

  Bayern Munich striker Harry Kane was given a standing ovation at former club Tottenham as the German side beat Spurs 3-2 in a pre-season friendly. Kane came on as a late substitute on his first trip back to the London club who he left to join Bayern last summer in a deal worth £86.4m plus add-ons. The England captain was applauded when he came on and also when he went on a solo lap of honour at the end of the game. Kane said he "probably shouldn't have been playing" as he only returned to training on Friday, having helped England reach the final of Euro 2024, but he "was always going to play 10 minutes and it was good". He added: "Everything was really rushed through last year, so we didn't have a chance [to say goodbye], but it was great way to say thank you to all of them. "The reception I got was amazing and great to clap them around the pitch after, those who stayed behind, and I will always be thankful for every Spurs fan for the support they've given me through my whole career. It's been incredible. "I just appreciate them seeing me and me seeing them again." Kane and Eric Dier, who left Tottenham to join Bayern in January, were also given gifts by Spurs prior to kick-off for their services to the club. Tottenham also introduced new signings Dominic Solanke, Archie Gray and Lucas Bergvall to their fans before the game started. When the action got under way, Dejan Kulusevski put Spurs in front only for goals from Dayot Upamecano, Serge Gnabry and Thomas Muller to give Bayern a 3-1 lead. Kulusevski grabbed a second to reduce the deficit but the Bundesliga club, managed by Vincent Kompany, held on. Following the exit of Solanke, Bournemouth managed a 3-2 win against Girona. The Cherries went ahead through a Justin Kluivert penalty only for Christian Stuani and Joel Roca to put the Spanish club 2-1 in front. Luis Sinisterra equalised for Bournemouth before Daniel Jebbison converted a close-range finish for the winner.

  Aston Villa ended their pre-season schedule witha 2-0 defeat at Borussia Dortmund in front of a 81,365 crowd. Argentina keeper Emiliano Martinez and England defender Ezri Konsa returned for Villa after their respective returns from international duty at the Copa America and Euro 2024. Konsa conceded a spot-kick for a challenge on Karim Adeyemi, with Emre Can scoring from the penalty spot to give last season's beaten Champions League finalists the lead before they quickly added a second through Julian Brandt. Forwards Ollie Watkins and Jhon Duran were not in the squad for Villa, who open their Premier League campaign at West Ham on Saturday, 17 August. Brazil midfielder Lucas Paqueta, who has been charged by the Football Association over betting breaches, played for West Ham for the first time in pre-season as they hosted Celta Vigo and won the game on penalties after a 2-2 draw. Jarrod Bowen gave the Hammers the lead before Mihailo equalised for the Spanish side. Paqueta then put the home side back in front only for Pablo Duran to level again for Celta Vigo. Summer signings Niclas Fullkrug and Crysencio Summerville came on for West Ham in the second half before they went on to win on penalties at a London Stadium where the attendance was impacted because of a boycott by fans over changes to ticket concessions this season for Under-21s and pensioners. A Harvey Barnes strike gave Newcastle United a 1-0 win against Brest, while Everton striker Dominic Calvert-Lewin scored an equaliser for his side as they drew 1-1 with Roma, who took the lead through Lorenzo Pellegrini. Wolves were beaten 1-0 by Rayo Vallecano, while Leicester City were on the end of a 3-0 loss at Lens in France. Brighton made it four wins from four in their pre-season campaign as they beat Villarreal 4-0. Joao Pedro gave the Seagulls the lead before goals from Danny Welbeck and Yankuba Minteh. Brighton, who appointed Fabian Hurzeler as manager in the summer after the exit of Roberto de Zerbi, scored their fourth when Welbeck added his second with a late penalty. New Fulham signing Emile Smith Rowe, who joined the Cottagers from Arsenal, scored with a shot from a tight angle as his side beat Hoffenheim 2-0 in Germany. Adama Traore added a second for Fulham, who start the Premier League season with a game against Manchester United on Friday, 16 August.
