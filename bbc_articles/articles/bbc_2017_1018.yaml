title: SpaceX rocket successfully lifts off - BBC News
date: '2017-01-15'
section: General
url: http://www.bbc.co.uk/news/science-environment-38624812
content: |-
  SpaceX successfully launches a rocket, its first mission since an explosion in September.

  The SpaceX company has successfully launched a rocket, its first mission since one of its vehicles exploded in September.

  The unmanned Falcon 9 rocket took off from Vandenberg Air Force Base on the California coast.
