  In response, Doug Ford, the premier of the province of Ontario, accused Trump of "shifting goalposts and constant chaos, putting our economy at risk" in an online post. Canada's steel production is concentrated in Ontario. Canadian political adviser Catherine Loubier said she believed Trump's threats were real, but said there could be a solution because of how connected the two economies are. "Hundreds of thousands of jobs in the US are linked to the steel and aluminium input from Canada into the US economy," she told the BBC's Today programme. "I think there's a lot at stake and nobody's winning with these tariffs, that's for sure."

  The EU said it had not received any official notification of new tariffs from the US, but added that it saw "no justification" for any such tariffs on its exports. "We will react to protect the interests of European businesses, workers and consumers from unjustified measures," it said. Australian Prime Minister Anthony Albanese said he push for an exemption to the tariffs - something the country got during Trump's first term. Trump's comments caused shares in major South Korean steel and car makers to fall. South Korea is a major exporter of steel to the US. The price of gold - often seen as a haven for investors in difficult economic times - rose on Monday to hit a record high of $2,903.08 an ounce.

  Trump took part in a meet and greet, including with family members of the victims from the New Orleans truck attack earlier this year

  Tariffs are a central part of Trump's economic vision - he sees them as a way of growing the US economy, protecting jobs and raising tax revenue. The result has been a flurry of announcements since his inauguration.
  • None Earlier this month, Trump threatened to impose import duties of 25% on Canadian and Mexican products, but later later delayed that plan for 30 days.
  • None He also brought in new US levies of 10% on all Chinese goods coming into the US.
  • None Beijing retaliated with its own set of tariffs which took effect on Monday.
  • None These included controls on imports of US coal, oil, gas, agricultural machinery, large-engine cars, and controls on exports of 25 rare metals needed for electric and military equipment.
  • None Earlier this month, Trump said that tariffs on the EU would come "pretty soon", but suggested the UK could avoid them.
  • None Trump has also said the US will introduce reciprocal tariffs on "Tuesday or Wednesday" on all countries that tax US imports, which will match the tariff rates levied by each country. "It'll be great for everybody, including other countries," he said. Chinese government spokesperson Guo Jiakun said: "There are no winners in a trade war or tariff battle. What is harmed are the interests of the people of both countries." He urged the US to "correct its erroneous approach and stop politicising and weaponising economic and trade issues". Victor Gao, a Chinese diplomat and economist, told the BBC that China's move to put controls on rare metal exports were "in direct retaliation against the US imposition of policies denying Chinese access to semiconductor chips and many other AI developments". "And this is truly tit-for-tat because China wants to have free trade for all of these things." However, he added that China would not be affected too much because of US shoppers' demand for cheap Chinese goods. "[Chinese goods] are very much affordable and competitive even with a 10% tariff," he said.

  On the trip to New Orleans, Trump also signed an proclamation designating 9 February "Gulf of America" day to celebrate his order renaming of the Gulf of Mexico, as his plane crossed the body of water. Mexico argues the US cannot legally change the Gulf's name because UN rules dictate that an individual country's sovereign territory only extends up to 12 nautical miles out from the coastline. Trump also repeated his unlikely suggestions that the US could take over Canada and the Gaza Strip, saying Canada would fare better as the "51st state" and that he was "committed to buying and owning Gaza".
