title: Schoolboy cyclist outpaces pros on Tour of Britain - BBC News
date: '2021-09-13'
section: Glasgow & West Scotland
url: http://www.bbc.co.uk/news/uk-scotland-glasgow-west-58503012
content: |-
  Xander Graham was watched on live TV as he raced alongside riders on the Tour of Britain near Edinburgh.

  Xander Graham could be seen flying ahead of professional cyclists during the Tour of Britain near Edinburgh

  A 12-year-old cyclist who outstripped professionals during a major British race on Saturday has been "shocked and amazed" at the reaction to his feat.

  Xander Graham raced alongside riders on the Tour of Britain near Edinburgh before being handed a water bottle from Dutch cyclist Pascal Eenkhoorn.

  The impromptu meeting was broadcast live to TV audiences around the world.

  A video posted on the race's social media accounts had more than a million views within 24 hours.

