  World indoor champion Molly Caudery, 24, qualified safely for Monday evening's women's pole vault final, where she will seek to win the first major outdoor title of her career. Caudery, the top-ranked women's pole vaulter in 2024 as she prepares for her first Olympic Games, cleared 4.50m with her opening attempt of the competition as she coasted through to the 12-athlete final. "I was really, really happy to save some energy, do one jump and have my best preparation for the final," Caudery said. However, hampered by a back issue, team-mate and Olympic bronze medallist Holly Bradshaw did not progress after failing at 4.25m. Amy Hunt, 22, has made it through to the women's 100m semi-finals which, along with the final, take place on Sunday night. She clocked 11.26 for second place in her heat. Jake Norris, making his senior debut, sealed his place in the men's hammer final on Sunday by qualifying in fifth overall with a best throw of 75.73m. Mark Pearce will contest the men's 3,000m steeplechase final on Monday after finishing eighth in his heat in eight minutes 34.46 seconds, but Zak Seddon missed the cut in 8:28.50 after suffering a mid-race fall in his heat.
