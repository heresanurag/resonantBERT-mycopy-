  Team-mate CJ Ujah, who made a winning return to major international competition following a doping ban in his heat on Friday, did not qualify for the men's 100m final. The 30-year-old, who was cleared of intentionally doping after his positive test cost Team GB Olympic men's 4x100m relay silver in Tokyo but served a 22-month ban, finished fifth in his semi-final in 10.24.. Tade Ojora was unable to make the men's 110m hurdles medal race with a time of 13.76 in the semi-finals, with that event later won by Italy's Lorenzo Simonelli in 13.05. Also competing in the men's 5,000m were Britons James West (seventh in 13:24.80) and Jack Rowe (17th in 13:31.77) after an early fall. British team captain Elliot Giles secured his place in Sunday's men's 800m final, finishing second in his semi-final in 1:46.50, but Thomas Randolph (1:49.18) missed out. Elsewhere, Nafi Thiam clinched her third straight European heptathlon title in dominant fashion. The Belgian, 29, showcased her form before targeting a third successive Olympic gold by beating Jessica Ennis-Hill's Championship record with 6,848 points, setting a personal best of 2:11.79 in the concluding 800m to win by 213 points. Jade O'Dowda, the only remaining British heptathlete following Katarina Johnson-Thompson's withdrawal due to a "small niggle" on Friday, finished seventh with a personal best tally of 6,314. Sandra Elkasevic of Croatia made history as the 33-year-old won a record seventh consecutive gold in the women's discus with a best mark of 67.04m. Sweden's Perseus Karlstrom took victory in the men's 20km race walk in one hour 19 minutes 13 seconds, as Briton Callum Wilkinson placed ninth (1:21:34).

