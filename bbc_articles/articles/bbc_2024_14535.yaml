title: 'European Athletics Championships 2024: George Mills & Romell Glave medal as
  Lamont Marcell Jacobs defends 100m title - BBC Sport'
date: '2024-06-09'
section: Athletics
url: http://www.bbc.co.uk/sport/athletics/articles/cw00x60z32go
content: |-
  George Mills wins men's 5,000m silver and Romell Glave claims men's 100m bronze for Great Britain at the European Athletics Championships.

  This video can not be played To play this video you need to enable JavaScript in your browser.

  Great Britain's George Mills won European 5,000m silver and Romell Glave clinched bronze in the 100m, as Olympic champion Lamont Marcell Jacobs successfully defended his sprint title on a golden night for hosts Italy in Rome. Mills, 25, clocked 13 minutes 21.38 seconds to finish runner-up to Norwegian star Jakob Ingebrigtsen, who proved too strong in the closing stages to win in 13:20.11. Glave ran 10.06secs to make the men's 100m podium as the British team won its first two medals on day two of the European Athletics Championships. Home favourite Jacobs' 100m triumph in 10.02 delivered table-topping Italy's third gold medal of the night - and fifth in the opening two days as a stunning start for the hosts continued. Mills' impressive run for silver - his first major international medal - followed three fourth-placed finishes for British team-mates, as 100m hurdler Cindy Sember, long jumper Jacob Fincham-Dukes and shot putter Scott Lincoln each fell narrowly short of a podium place. Mills, son of former England footballer Danny, was denied gold only by 23-year-old Ingebrigtsen, who having sealed a third successive European 5,000m title, will now aim to complete a third straight golden double at the championships in the 1500m. Mills said: "It is what I expected of myself. It is back to work now, I’ve got the rest of the season to prepare for. It's progress, but we want more." Sprinter Glave, 24, then held on for 100m bronze behind an Italian one-two, with Jacobs followed across the line by compatriot Chituru Ali (10.05). Jacobs handled the expectation in front of his home crowd to deliver a golden finale for the hosts as he builds towards an attempt at defending his Olympic title in Paris, following an injury-disrupted period since his surprise triumph in Tokyo in 2021.

  It was beginning to look like a night of near-misses for the British team, after Sember, Fincham-Dukes and Lincoln had gone close to medals. Sember clocked 12.56 for fourth in the women's 100m hurdles final, won by 23-year-old French athlete Cyrena Samba-Mayela - who ran 12.31 to break a 38-year championship record. In the men's shot put final, Lincoln registered a best throw of 20.88m to finish six centimetres short of a medal, as Italy's Leonardo Fabbri produced a championship record of 22.45m for gold. Fincham-Dukes finished fourth with a best attempt of 8.12m in a men's long jump final dominated by Olympic and world champion Miltiadis Tentoglou. The Greek star, 26, clinched his third successive European title - and the 10th major championship gold of his career - by producing a championship record 8.65m leap with his penultimate attempt, which he then replicated with his final jump. But Mills, who looked relaxed as he stalked Olympic favourite Ingebrigtsen, ensured he ended Britain's wait for a medal with a superb silver, before Glave - who in 2017 became the world's fastest 17-year-old - added to that achievement. Glave said: "I am grateful to be here and get the opportunity to showcase my abilities against the best in the world. That is one of my goals this year, competing against the best so I can go on to better things."

