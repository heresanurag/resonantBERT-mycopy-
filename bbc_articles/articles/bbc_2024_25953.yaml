  As we left the hospital as an Israeli drone circled overhead in the sunshine. Israel says its air force is “monitoring the compound but it will not strike the hospital itself.” For now, Al Sahel remains closed, but doctors want to get back to treating the sick. “We are an institution helping people,” said Dr Walid Alameh, the medical director, and a cousin of Dr Mazen. “The founder of this hospital is my father,” he said, becoming emotional. “This is my home. Hopefully tomorrow we will open." But Israel is imposing its own wartime schedule here. This afternoon it bombed Beirut again, a short drive from the hospital, and on Hezbollah’s doorstep. A spokesman for the armed group had called a rare press conference. As it was underway, the IDF issued a warning, telling residents of two nearby buildings to leave as they were “located near Hezbollah facilities.” Half an hour later two more multi story buildings vanished from the skyline in seconds, reduced to dark clouds of smoke and ash. In homes, and in hospitals here, many are stricken by fear.
