  At the hospital today management and doctors gathered to deny “Israel’s false allegation” and give us a tour, including the two floors below ground. The hospital is in the southern suburbs, a Hezbollah stronghold, but staff insist strongly that it is not linked with any group. “It's really shocking to say that Sahel Hospital is affiliated with any party in Lebanon,” says Dr Alameh. “It's a private hospital. It's a teaching hospital for doctors, physicians and other medical students." He dismissed Israel’s claim of a hidden bunker. “The hospital was founded 40 years ago on an old house,” he said. “It’s impossible to have any tunnel or infrastructure underneath. Any person in the world can come here and see everything they want.” We were encouraged to check in every corner. Nowhere was off limits, not even the morgue. Bundles of surgical scrubs, and packets of surgical instruments were opened to show there was nothing concealed. After the tour, we were allowed to move around freely. We saw empty wards and anxious staff, but no hint of a bunker. Israel claimed the entrance was in a neighbouring building. We went there too and had free access to the parking lot underneath. If there was an entrance to a secret bunker, we did not find it. The only door we saw led to a lift, which we could not open. But that door was not concealed, and seemed an unlikely access point to a hidden chamber full of gold.

