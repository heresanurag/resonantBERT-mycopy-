title: Trial of man accused of suitcase murders collapses - BBC News
date: '2025-05-15'
section: England
url: http://www.bbc.co.uk/news/articles/cvgv41v40ego
content: |-
  Yostin Andres Mosquera was on trial for the murders of Albert Afonso and Paul Longworth.

  Yostin Mosquera (left) with Albert Alfonso (centre) and Paul Longworth on a boat in Colombia

  The jury in the trial of a man accused of murdering two men in London before dumping some of their remains in suitcases in Bristol has been discharged. Yostin Mosquera, 35, denies murdering Albert Alfonso, 62, and Paul Longworth, 71, on or before 11 July 2024 and was on trial at London's Old Bailey. Parts of their bodies were found in Shepherd's Bush, while some were discovered in a suitcase left near Clifton Suspension Bridge. The prosecution opened its case on 30 April but trial judge Mr Justice Bennathan discharged the jury earlier. Justice Bennathan said there had been problems identifying the accurate times of searches made by Mr Mosquera on his laptop, which had been used as evidence.

  He told jurors the trial "simply cannot continue". "We simply have to resolve this before we have a fair trial," he added. The judge thanked jurors for their service and said he was sorry for where the trial had "ended up". Mr Mosquera has admitted the manslaughter of Mr Alfonso by way of loss of self-control, but denies both charges of murder. There is due to be a pre-trial review hearing for Mr Mosquera at the Old Bailey on 13 June and provisional retrial date has been set for 30 June at Woolwich Crown Court.

