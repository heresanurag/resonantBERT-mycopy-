content: |-
  The Gromit Unleashed 3 trail follows the new Wallace and Gromit film, released this Christmas.

  The people behind Wallace and Gromit have revealed the first sculptures for an upcoming character trail for charity.

  Aardman characters Wallace, Gromit and Feathers McGraw will be joined by a brand-new character sculpture called Norbot on the streets of Bristol from 30 June 2025.

  The trail, Gromit Unleashed 3, will come after Aardman’s new Wallace and Gromit feature film - Vengeance Most Fowl - is released this Christmas.

  It will raise money for The Grand Appeal, the Bristol Children’s Hospital Charity.

