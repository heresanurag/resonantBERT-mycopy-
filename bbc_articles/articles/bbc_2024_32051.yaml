title: 'Boxing: Moses Itauma - how Slovakian-born Briton became heavyweight prospect
  - BBC Sport'
date: '2024-12-27'
section: Boxing
url: http://www.bbc.co.uk/sport/boxing/articles/cpdnzwe4zjxo
content: |-
  Rising heavyweight hope Moses Itauma reflects on his journey from a small Slovakian town to being tipped for boxing greatness.

  Moses Itauma won all 20 amateur fights before making his pro debut in 2023

  "The way I see it, I'm a modern-day gladiator. I just get into the arena and have to fight." Tipped by many as the future of the heavyweight division, 19-year-old Moses Itauma is already an imposing figure with an impressive record. On 21 December, he stopped Demsey McKean in one round to register the 11th win in an explosive fledgling professional career which includes nine knockouts. Under the lights in Saudi Arabia - on the undercard of Tyson Fury and Oleksandr Usyk's rematch - Itauma had come a long way from the "cold" climes of Slovakia, his mother's home nation, where he spent the first few years of his life. "It's part of my identity, it's not something I would change, but we weren't treated the same way as everyone else," Itauma, whose father is of Nigerian heritage, says. "We would stand out because we were the only African Slovak people, but I am proud of my heritage. "I think I got the best of both worlds, that Slovak toughness, mentality, and I'm strong physically from my Nigerian side." Speaking to the BBC from his gym in Essex, Itauma - who turns 20 on 28 December - reflects on his journey from the small Slovakian town of Kezmarok to becoming one of the hottest properties in boxing's glamour division.
  • None Who can be Britain's next heavyweight superstar?

  Itauma followed brother Karol (right) in signing with Frank Warren's Queensberry Promotions

  The family moved to Chatham in Kent when Itauma was just three. He began boxing at the age of nine and - although he admits he hated his first session - he enjoyed the social side of being with his gym friends and persevered. During his teenage years, his talent became apparent with tournament wins around the world. "Where I lived there were a lot of amateurs on the scene, and I was always in and around boxing - I had it good at school and grew close with my friends because I'd see them in class and two hours later I'd see them at the gym," he says. Before his 16th birthday, Itauma was sparring with ex-cruiserweight world champion Lawrence Okolie. His talent was noticed by those in the know. When Itauma's elder brother, Karol, signed with Frank Warren's Queensberry Promotions, it wasn't long before he did the same. The promoters preferred the heavyweight's middle name, Moses, to his given forename of Enriko. Eager to do whatever he could to propel his budding career, Itauma agreed to go by his middle name. "Karol said Moses sounded strong for a heavyweight, so we decided to go with it," he said.

  Itauma famously said he wanted to beat Mike Tyson's record as the youngest heavyweight world champion at 20, but - while a shot at the title is closer than ever before - it is unlikely to come quick enough. He would need to become world champion by 19 May 2025 to surpass Tyson's record. "I wanted to gun down the Tyson record but I'm doing as much as I can on my side and if I can't get it over the line it's not going to be my fault," he says. Itauma says he has learned the harsh realities of the sport with more established fighters refusing to give him an opportunity through a fear of losing to the prospect. "When I turned professional, I thought if you are good enough to become world champion, you'll become world champion, but that's just not it," Itauma says. "People who have already made it wouldn't want to fight me because that's a lose-lose situation. "Whoever the opponent is, that's picked by the crowd and picked by the promoters, that's not picked by me."

  Itauma's trainer Ben Davison knows a thing or two about heavyweights, given his stable includes two-time world champion Anthony Joshua and British champion Fabio Wardley. Davison also oversaw the return of Tyson Fury - who Itauma has sparred on several occasions - after a hiatus from the sport. "I asked him, if the opportunity presents itself [a title shot], would you take it with me, and he said yes, but obviously you need to be in the position to get that shot," Davison says. "It's great to be around world champions, but obviously they don't get in the ring for you - at the end of the day, it's you who has to fight." Davison's ambitions seem to match the high hopes of Moses, who he described as talented, coachable, hungry, and willing to fight anyone in the division. "If he keeps his mind on the job, he has the potential to mark himself as one of the best heavyweights that there's ever been," Davison adds.
