content: |-
  Grades have been purposefully lowered from levels seen during the pandemic - when pupils were teacher-assessed.

  Three things to do if your grades aren't what you wanted

  You've opened the envelope or email containing your A-level, BTec or T-level results and they're not what you expected. Don't panic - there are things you can do next. It's always worth double checking with your university if you can still attend, despite not getting the grades you needed. If you applied for university but just missed the mark, some universities may still have a place for you thanks to clearing. So, if you still want to go to university, visit the Ucas website to see the universities that have available places. Find a university you like? As soon as you can, phone the admissions contact number for the university which you applied for. Tell them the grades you got and see if they will allow you to enrol as a student. If clearing doesn't work out and you think your grades are incorrect, you could potentially appeal your exam results and pay to have your papers remarked. This needs to be done as soon as possible so don't wait around!
