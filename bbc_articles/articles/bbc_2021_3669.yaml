  The chief medical officer says that means those not vaccinated could become ill, go to hospital, or die.

  The Northern Ireland executive will try to ensure all children in the region can return to school as "quickly as possible", Finance Minister Conor Murphy says.

  The youngest pupils returned to school on Monday for the first time since before the Christmas break.

  Children in primary one to primary three (aged four to seven) and those in nursery and pre-school went back to face-to-face learning. But under current plans, they will return to remote learning on 22 March.

  The staggered approach is to allow the return to school of post-primary pupils in years 12 to 14 until the start of the Easter holidays.

  However, Education Minister Peter Weir has argued for a "continuity of learning" and says he will bring a specific proposal to the executive for those year groups to continue to be in the classroom.

  He said health officials would need to consider this proposal and his suggestion that other primary school year groups - P4-P7 - also return to classes this month.

  It will need to be approved when ministers meet on Thursday.

  Mr Murphy said he would be guided by health advice.

  About 90% of Northern Ireland's 350,000 children have been learning remotely for more than two months.

  Pupils in primaries four to seven and years eight to 11 in post-primaries do not yet know when they will return to school.

