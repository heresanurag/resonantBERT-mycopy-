title: Ros Atkins on... the India-Canada murder row - BBC News
date: '2023-09-19'
section: General
url: http://www.bbc.co.uk/news/world-66861766
content: |-
  The BBC's analysis editor looks at why India and Canada have entered a diplomatic spat over the murder of a Sikh activist.

  The escalating row over the murder of a Sikh separatist leader has the potential to derail years of close relations between Canada and India - two key strategic partners on security and trade.

  The BBC's analysis editor Ros Atkins examines how things reached this point and why the case is putting the relationship between Justin Trudeau and Narendra Modi on ice.
