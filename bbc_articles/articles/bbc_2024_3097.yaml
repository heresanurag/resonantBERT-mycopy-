title: Four-month-old baby boy dies after Leeds Ring Road crash - BBC News
date: '2024-02-15'
section: Leeds & West Yorkshire
url: http://www.bbc.co.uk/news/uk-england-leeds-68306524
content: |-
  The crash, involving a van and a taxi, happened on Leeds Ring Road near Rodley on Monday evening.

  A number of roads were closed following the collision near Rodley on Monday

  A four-month-old boy has died after the taxi he was travelling in was involved in a collision in Leeds, police said.

  The head-on crash between a Vauxhall Vivaro van and a Toyota Auris taxi happened on the A6120 Ring Road near Rodley just before 17:00 GMT on Monday.

  The boy was taken to hospital but died on Wednesday, police confirmed.

  The van driver, a man aged 54, was arrested on suspicion of causing serious injury by dangerous driving and was bailed on Wednesday, police said.

  The man, as well as two female occupants of the taxi also involved in the crash, had all received hospital treatment, according to West Yorkshire Police.

