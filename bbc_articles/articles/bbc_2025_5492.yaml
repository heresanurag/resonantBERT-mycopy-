title: Boy, 15, dies after being found seriously injured on Glasgow street - BBC News
date: '2025-03-06'
section: Glasgow & West Scotland
url: http://www.bbc.co.uk/news/articles/c2ernn4e1r8o
content: |-
  Police in Glasgow are treating the death of the teenager as suspicious.

  Boy, 15, dies after being found injured on street

  A teenage boy has died after being found seriously injured on a street in Glasgow. Emergency services were called to Clarendon Street near St George's Cross subway at about 22:30 on Wednesday. A 15-year-old boy was pronounced dead at the scene. The cause of death has not yet been established - a post-mortem examination has still to take place. Police Scotland said the death was being treated as suspicious and inquiries were ongoing.

  Det Supt Cheryl Kelly said: "Whilst formal identification has yet to take place, we have spoken to the family of the boy and will continue to provide them with specialist support at this distressing time." She added that police were reviewing CCTV and would be carrying out door-to-door inquiries. She added she believes "the answers lie with the local community", and urged anyone with information to contact Police Scotland via a Major investigations Public Portal., external

  A large police cordon has been set up at Clarendon Street in the west end of Glasgow

  Later at a press conference, Det Supt Kelly continued: "I would also be very keen to hear from anyone who was in the area at the time and anyone who has dash cam, private CCTV or doorbell footage around the time of the incident. "Police and the Scottish Ambulance Service were called at 22:30 however whoever is responsible for this and indeed the 15-year-old boy will have been in the area prior to that so I would urge anyone who was in the local area preceding this time to come forward as well. "I am confident that with the assistance of the local community we will begin to understand what has taken place last night and has led to the really tragic death of this 15-year-old boy."

  A police cordon has been erected and a large number of officers remain present at the scene. Police confirmed they believe the death to be an isolated incident and are keeping an "open mind" to all motives. The force said this is a "major investigation that is fast moving and at the very early stages". There is not thought to be any further risk to the community.
