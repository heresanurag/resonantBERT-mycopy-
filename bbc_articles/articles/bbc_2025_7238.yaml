title: 'In pictures: Pope Francis lies in open coffin in Vatican chapel - BBC News'
date: '2025-04-23'
section: Europe
url: http://www.bbc.co.uk/news/articles/clyqg50gzevo
content: |-
  The Vatican has released photos of Pope Francis in an open coffin, dressed in a red robe with the papal mitre on his head and a rosary in his hands.

  In pictures: Symbolism on show as Pope Francis lies in open coffin

  The Vatican has released several photographs of Pope Francis lying in an open coffin in the chapel of the Casa Santa Marta, his former residence. We've taken a look at who was in the chapel and some of the symbolism on show in the images.

  The most notable figure in the room is Irish-American Cardinal Kevin Farrell, who is the Pope's "camerlengo" or chamberlain and runs the Vatican until a new Pope is chosen. The cardinal - in red mozzetta and cassock - is shown blessing the body of the late Pope during the rite of the declaration of death. Pope Francis is dressed in red robes, holding a rosary and wearing the papal mitre - the large white ceremonial headdress. He is also wearing a simple silver ring.

  During his inauguration, Pope Francis was given the Fisherman's Ring - a symbol of his office - which Cardinal Farrell has the responsibility to destroy so it cannot be used by anyone else. Pope Francis sometimes used this ring during ceremonies but was more often seen using the simple silver ring adorned with a cross.

  One of the significant changes in tradition is the coffin that Pope Francis will be buried in. The coffins used for previous papal burials consisted of three nesting coffins made of cypress, lead and oak - but Pope Francis asked to be buried in a simple wooden casket. He will remain in the open coffin for the lying in state, whereas other popes have been laid out resting on cushions on a platform.

  Pope Francis (left) chose a wooden coffin while Pope Benedict XVI (right) was on cushions

  The chapel itself is nestled within the Casa Santa Marta, a residential building containing more than 100 simple rooms that was built in 1996.

  Triangular shapes are present throughout the chapel, in the construction of the ceiling and on the floor tiles, representing the Holy Trinity - a key belief in Christianity where God exists as the Father, the Son and the Holy Spirit. On the ceiling behind the coffin is an inscription in Latin, which translates as "Come Holy Spirit, fill the hearts of your faithful".

  The Pope's body is guarded by members of the Vatican's Swiss Guard. They have protected the Pope since 1506, when Julius II first hired Swiss mercenaries for his personal protection.

  Pope Francis will stay in the chapel until Wednesday morning, when his body will be transferred to St Peter's Basilica in a procession starting at 09:00 local time. From then, he will lie in an open casket in the basilica, where mourners can pay their respects ahead of his funeral on Saturday.
