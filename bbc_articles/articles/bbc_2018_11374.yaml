title: Sesame Workshop says Bert and Ernie are 'best friends' and not gay - BBC News
date: '2018-09-19'
section: US & Canada
url: http://www.bbc.co.uk/news/world-us-canada-45566451
content: |-
  A writer says he sees the puppet pair as a gay couple, but Sesame Workshop calls them "best friends".

  Bert, left, and his roommate of 49 years, Ernie

  The organisation behind Sesame Street has denied co-habiting duo, Bert and Ernie, are gay, following comments by one of the show's writers.

  Mark Saltzman said his writing about the room-mating couple was based on his relationship with film editor Arnold Glassman.

  Sesame Workshop then issued a statement saying the pair "do not have a sexual orientation".

  Bert and Ernie may look human, but the pair "remain puppets", it said.

  "They were created to teach preschoolers that people can be good friends with those who are very different from themselves."

  It broadly repeats past statements the non-profit organisation has made about the stripy-clothed duo when questions arose about their relationship.

