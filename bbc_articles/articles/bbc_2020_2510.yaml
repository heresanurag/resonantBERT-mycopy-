id: bbc_2020_2510
title: 'Larne: Toddler dies and two others injured in stabbing - BBC News'
date: '2020-03-03'
section: Northern Ireland
url: http://www.bbc.co.uk/news/uk-northern-ireland-51708178
content: |-
  A toddler dies and a woman and a baby are seriously injured in a stabbing in County Antrim.

  Police are at the scene of the incident on the Bankhall Road

  A toddler has died and a woman and a baby have been seriously injured in a stabbing in County Antrim.

  The alert was raised on Monday morning at an isolated house in Bankhall Road, Magheramorne, near Larne.

  It is understood the injured woman is the mother of the children.

  The incident is being treated as domestic. Neighbours reported hearing a police helicopter at about 10.30 GMT and emergency services were called to the scene.

  Police have confirmed the woman, who is in her 30s, and the baby are being treated in hospital.

  A spokesman said officers were not looking for anyone else in connection with the incident.

  Forensics officers have been at the scene

  The house has been cordoned off as a police operation continues.

  Gordon Lyons, a DUP assembly member from the area, said it was clear "something horrific" had happened.

  "It is absolutely awful when you hear of anybody suffering in this kind of way but when young children are involved it is particularly horrific," he said.

  "My thoughts and prayers and the thoughts and prayers of everybody across east Antrim will be with the family."
