title: Ursula von der Leyen 'honoured' to be elected president - BBC News
date: '2019-07-16'
section: General
url: http://www.bbc.co.uk/news/world-europe-49008882
content: |-
  Germany's Ursula von der Leyen is voted in by MEPs as the head of the EU Commission.

  Germany's Ursula von der Leyen has been narrowly elected president of the EU Commission following a secret ballot among MEPs.

  The centre-right defence minister will replace Commission President Jean-Claude Juncker on 1 November.
