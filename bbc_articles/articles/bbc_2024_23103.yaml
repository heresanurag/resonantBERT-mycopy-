content: |-
  It's the fourth house to fall down in only five weeks in the area of Rodanthe as a result of coastal erosion.

  A vacant beach house collapsed into the ocean in Rodanthe, North Carolina on 24 September. Video shows the stilts of the house slanting before the home eventually falls into the water.

  This collapse is the fourth of its kind in the area in the past five weeks as a result of coastal erosion. The house was scheduled to be demolished this week.
