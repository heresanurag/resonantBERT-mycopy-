  When They See Us, Ava DuVernay's drama series about the wrongfully-convicted Central Park Five, was announced as Netflix's most-watched series in the US following its May release.

  But Netflix measured that using a different method - saying it had been the most watched series every day since its premiere - which is different to the Stranger Things "households" number.

  Stranger Things - which follows a group of kids in a fictional 1980s Indiana, with lots of supernatural goings on - has been one of Netflix's most critically and culturally-acclaimed original series since its 2016 release.

  It's helped launch the careers of Millie Bobby Brown and Finn Wolfhard, and introduced a new audience to Winona Ryder.

  With its numbers seemingly so high, and fans emotional over how the third series ended, don't be surprised if there's still a lot more to come from the town of Hawkins.

