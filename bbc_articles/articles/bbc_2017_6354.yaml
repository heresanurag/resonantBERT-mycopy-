title: Man and woman found badly hurt at Longniddry property - BBC News
date: '2017-06-24'
section: Edinburgh, Fife & East Scotland
url: http://www.bbc.co.uk/news/uk-scotland-edinburgh-east-fife-40392827
content: |-
  Police Scotland say they are not looking for anyone else in connection with the incident.

  Two people were found with serious injuries at a home in East Lothian.

  The 34-year-old man and 51-year-old woman were found after officers were called to a property in Main Street, Longniddry.

  The incident took place at about 21:15 on Friday. No details were available about the condition of the injured people.

  Police Scotland said officers were not looking for anyone else in connection with the incident.

