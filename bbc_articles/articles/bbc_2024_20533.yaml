content: |-
  Matthew O'Toole had been named by some as a possible successor to Colum Eastwood.

  Matthew O'Toole leads his party's official opposition at Stormont

  The SDLP's most senior politician at Stormont has endorsed Claire Hanna for the role of party leader. Matthew O'Toole had been named by some as a possible successor to Colum Eastwood, who announced his resignation as leader of the SDLP on Thursday. However, Mr O'Toole, who is the leader of the opposition in the Northern Ireland Assembly, told the BBC's Good Morning Ulster programme that Claire Hanna is the "best person" for the job. Ms Hanna is yet to confirm that she is standing. Nominations for the leadership bid opened on Friday and close on 6 September at noon.

  This video can not be played To play this video you need to enable JavaScript in your browser. SDLP's Stormont leader has endorsed Claire Hanna for the role of party leader.

  Writing on social media on Thursday, she said she would "have more to say in the coming days after speaking to my family and team".

  Taking questions following his resignation speech, Colum Eastwood said that Ms Hanna would be "far and away the best option for members". That sentiment was echoed by Mr O'Toole on Friday morning. He said Ms Hanna is an "extraordinary leader" and an "extraordinary politician". He added that she was the "best person to broaden that support to help us make the case and build a coalition for that kind of inclusive new Ireland that we want to see". Mr O'Toole said that nobody in the party was "under any illusion about the electoral challenges that we have faced more recently". However, he added that "if you look at what Claire has been able to achieve more recently electorally it is remarkable". Ms Hanna was recently re-elected as MP for South Belfast and mid Down, albeit on a reduced share of the vote from what she achieved in 2019. Mr O'Toole said that he was "not aware" of anyone planning to challenge Ms Hanna for the leadership, but said that it was for other people in the party to make their own minds up.

  Claire Hanna looks nailed on to be the next leader of the SDLP

  From where I’m sitting, Claire Hanna appears to be nailed on as the next leader of the SDLP. She isn’t saying anything for the moment. Who knows - she could always come out and say: ‘It’s not where I want to be at the moment,’ - but I would be surprised if she does that. She is MP for South Belfast, the most diverse constituency in Northern Ireland. I think she gathers votes from right across the traditional divisions, including some from unionists. I saw her and some supporters this week posting on X in Sandy Row - that’s loyalist working class. She is able to go into these areas and she appeals to people of all areas. That’s a vision for the SDLP going forward, although it will be pretty difficult to replicate everywhere.
