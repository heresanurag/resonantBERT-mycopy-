content: |-
  The band reunite to play of Losing My Religion as they are inducted to the Songwriters Hall Of Fame.

  REM perform for the first time since 2007

  REM backstage at the Songwriters Hall of Fame (left to right): Peter Buck, Mike Mills, Michael Stipe and Bill Berry

  Earlier this week, rock group REM joked it would take "a comet" to bring the band back together on stage. They must have spotted one in the night sky - because the quartet reformed to play a surprise acoustic rendition of Losing My Religion at the Songwriters Hall of Fame ceremony in New York on Thursday. It marked the first time all four members had performed in public since their induction into the Rock and Roll Hall of Fame in 2007. Formed in Athens, Georgia, REM went from cult indie band to one of the biggest-selling rock acts of the 1990s, with hits including Everybody Hurts, The One I Love and Man On The Moon.

