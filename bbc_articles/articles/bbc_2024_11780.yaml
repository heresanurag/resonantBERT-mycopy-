  Drummer Bill Berry left the band in 1997 after suffering a brain aneurysm while performing on stage. The group continued as a trio until 2011 before parting ways. "At that point, there wasn’t anything we could agree on really, musically - what kind of music, how to record it, are we gonna go on tour," guitarist Peter Buck told CBS News this week. "We could barely agree on where to go to dinner. And now we can just agree on where to go to dinner." Asked if the band would ever reform, he called it a bad idea, insisting "it would never be as good". But they relented on Thursday, playing their biggest hit to an audience that included fellow Hall Of Fame inductees Steely Dan and Timbaland.

  Michael Stipe paid tribute to his bandmates before performing

  Accepting their honour, singer Michael Stipe spoke on behalf of the entire band. "Writing songs and having a catalogue of work that we’re all proud of that is out there for the rest of the world for all time is hands-down the most important aspect of what we did," he said. "Second to that is that we managed to do so all those decades and remain friends. And not just friends, dear friends. "We are four people that very early on decided that we would own our own masters and we would split our royalties and songwriting credits equally," he continued. "All for one and one for all."

  In the CBS News interview, the band said being inducted to the Songwriters Hall Of Fame was a major milestone. "We lived or died on the strength of our songs," Buck said. "So this is a huge honour." "It is the hardest thing that we do," added bassist Mike Mills, "and it is the thing that we worked on the very most from the beginning."

  The group also discussed the surprise success of Losing My Religion. Released in 1991, the mandolin-powered ballad helped the group sell 18 million copies of their seventh album, Out Of Time, turning them into global superstars. "I loved the song, but we never thought it was gonna be a hit," said Stipe. "It's like a bumblebee," added Mills. "They shouldn't be able to fly. That song shouldn't have been a hit." And Berry reflected on the illness that prompted his departure from music. "That thing in Switzerland – brain aneurysm and successful surgery - it may have lowered my energy level. And I just didn't have the drive I once did," he told reporter Anthony Mason. After leaving REM, the drummer moved back to Georgia and worked on his hay farm. "I didn't regret it at the time," he said. "Um, I sort of regretted it a little later."

  REM were inducted to the Songwriters Hall Of Fame by country star Jason Isbell, who preceded them on stage with a rendition of the tongue-twisting hit It's The End Of The World As We Know It (And I Feel Fine). "I’ve never said that many words that quickly in my whole life," he joked afterwards. Missy Elliot inducted her longtime writing partner and producer Timbaland, who has also created hits for Justin Timberlake, Aaliyah, Ginuwine, Nelly Furtado and Jay-Z. "Timbaland literally changed the cadence of the time, because he also treated hip-hop records like R&B records," she said. "He would take the hooks and put a different sound." The producer, whose real name is Timothy Mosley, dedicated his award to Aaliyah, who died in a plane crash in 2001. "I want to thank baby girl, rest in peace, I hope you’re watching," he said. Steely Dan's Donald Fagen likewise dedicated his award to his late bandmate Walter Becker. "I’d like to thank my partner Walter Becker, wherever he may be," he said in his acceptance speech.

  Rainbow Connection writer Paul Williams presented Diane Warren with the Johnny Mercer Award, the highest honour bestowed by the Hall Of Fame, and joked that artificial intelligence "worries about Diane Warren". Warren is one of the most successful songwriters of her generation, creating hits like Aerosmith's I Don't Want To Miss A Thing, Cher's If I Could Turn Back Time and LeeAnn Rimes's How Do I Live. "I have to thank my mom for being the first one I had to prove wrong," Warren said. "Songwriting isn’t something I do, it is who I am." Nile Rodgers presented forthcoming Glastonbury headliner SZA with the Hal David Starlight Award for "gifted young songwriters who are making a significant impact in the music industry." Also inducted were Nashville hitmaker Hillary Lindsey, who wrote songs like Girl Crush for Little Big Town, and Jesus, Take the Wheel for Carrie Underwood; and Dean Pitchford, who co-wrote 80s pop anthems like Footloose, Fame and Holding Out For a Hero.
