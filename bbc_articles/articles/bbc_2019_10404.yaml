title: Stratford vet tries to save orangutan shot 130 times - BBC News
date: '2019-09-21'
section: General
url: http://www.bbc.co.uk/news/uk-england-coventry-warwickshire-49741285
content: |-
  Paul Ramos was in Borneo to film the work being done to save the orangutan population.

  Film footage has been released showing the moment a vet tried to save the life of an orangutan that had been shot 130 times.

  Paul Ramos, from Stratford-upon-Avon, was in Borneo to see the work of animal charities. The injured orangutan was found clinging to a branch in a river.

  The wildlife vet said he wanted to raise awareness about the plight of the great ape.

