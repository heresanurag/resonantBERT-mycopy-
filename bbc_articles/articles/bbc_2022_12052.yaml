title: Queen's coffin leaves Balmoral Castle - BBC News
date: '2022-09-11'
section: General
url: http://www.bbc.co.uk/news/uk-62867783
content: |-
  The Queen's coffin travels from Balmoral Castle to Edinburgh before flying to London on Tuesday.

  The Queen has left Balmoral for the final time as her coffin is making its way to Edinburgh.

  Thousands of people are expected to line the route as the late monarch's body is driven to The Palace of Holyroodhouse.
