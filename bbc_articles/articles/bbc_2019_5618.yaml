title: Reaction to UK European election results - BBC News
date: '2019-05-26'
section: UK Politics
url: http://www.bbc.co.uk/news/live/uk-politics-48417378
content: |-
  Brexit Party gains 29 seats, with the Lib Dems second, while Tories and Labour suffer losses.

  'Clear majority' who want to stop Brexit - Cable

  Liberal Democrat leader Sir Vince Cable says the party's "next big task" is to work with others to prevent the UK from "crashing out of the European Union by accident". He says it is "very clear" that there is a "clear majority in the country who want to stop Brexit". "We've had a brilliant result, we've got a lot now to build on," he adds. He says he was "pleasantly surprised" at the results overnight, although it was "clear that we had momentum". "The only way now to resolve the issue is to go back to the public," he says. Sir Vince adds that "Jeremy Corbyn's position is now very weak" and Labour's results were "almost humiliating". He says he would be surprised if both Labour and the Conservatives "survive intact" during the next general election. Turning to the upcoming Liberal Democrat leadership race, he says he does not have a preference for who takes over.
