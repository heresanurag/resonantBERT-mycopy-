  Despite the risks, India had initially said it wasn't considering a law for AI. This March, however, it sprung into action after a furore over Google's Gemini chatbot response to a query asking: "Is Modi a fascist?" Rajeev Chandrasekhar, the country's junior information technology minister, said it had violated the country's IT laws. Since then, the Indian government has asked tech companies to get its explicit permission before publicly launching "unreliable" or "under-tested" generative AI models or tools. It has also warned against responses by these tools that "threaten the integrity of the electoral process". But it isn't enough: fact-checkers say keeping up with debunking such content is an uphill task, particularly during the elections when misinformation hits a peak. "Information travels at the speed of 100km per hour," says Mr Chinnadurai, who runs a media watchdog in Tamil Nadu. "The debunked information we disseminate will go at 20km per hour." And these fakes are even making their way into the mainstream media, says Mr Kodali. Despite this, the "election commission is publicly silent on AI". "There are no rules at large," Mr Kodali says. "They're letting the tech industry self-regulate instead of coming up with actual regulations." There isn't a foolproof solution in sight, experts say. "But [for now] if action is taken against people forwarding fakes, it might scare others against sharing unverified information," says Mr Qureshi.
