title: Former army head General Sir Mike Jackson dies - BBC News
date: '2024-10-16'
section: UK
url: http://www.bbc.co.uk/news/articles/c8djnnel017o
content: |-
  Sir Mike helmed the army during the invasion of Iraq and also served in Northern Ireland and Bosnia.

  The former head of the British Army, General Sir Mike Jackson, has died aged 80, the army confirmed. He led the army during the US-led invasion of Iraq in 2003 after serving in the Balkans and Northern Ireland. In 1999, he famously refused an order from his US commander to intercept Russian forces when they entered Kosovo without Nato's agreement. "I'm not going to start the Third World War for you," he is reported to have told General Wesley Clark. Announcing his death, the British Army said he would be "greatly missed, and long remembered".

  The father-of-three died on Tuesday surrounded by his family, the army said in a statement posted on X, external. Sir Mike was a much-loved and respected soldier - not just to those in the army but among the wider public too. He was instantly recognisable by the heavy bags under his eyes and his rich, gravelly voice – fine-tuned by whisky and cheroots. Born into a military family on 21 March 1944, he joined the army at the age of 19 before graduating from Birmingham University in 1967. At the height of the Cold War he learnt Russian in the Intelligence Corps. In 1970 he transferred to the Parachute Regiment, serving in Northern Ireland at the height of the Troubles. He was on the ground when members of the regiment opened fire on protesters, killing and injuring many in what became known as Bloody Sunday. He later attended the Ballymurphy inquest, where he denied there was a "cover-up" over the shooting of 10 people in Belfast. Sir Mike rose to command the regiment's First Battalion between 1984 and 1986. Between 1995 and 1996 he commanded the UN peacekeeping force in Bosnia. During the Kosovo campaign he was awarded the Distinguished Service Order for leadership. He became head of the British Army just a month before the Iraq war began, replacing Gen Sir Michael Walker. Sir Mike, or Jacko as he was known, also had the unenviable task of merging old regiments but he will still be remembered fondly as a charismatic straight-talking general. He is survived by three children from two marriages and four grandchildren. Paying tribute to his memory, the Parachute Regimental Association said he had been a "great leader of men" who would be "missed by many".

