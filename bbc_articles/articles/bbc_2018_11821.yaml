id: bbc_2018_11821
title: 'Brexit: Commons vote must be ''unequivocal'', says Raab - BBC News'
date: '2018-10-17'
section: UK Politics
url: http://www.bbc.co.uk/news/uk-politics-45893881
content: |-
  Ministers suggest MPs will have a straight choice between whatever deal is on the table and no deal.

  The decision on whether MPs approve or reject any Brexit deal must be "unequivocal", ministers have said.

  Brexit Secretary Dominic Raab said the outcome of the "meaningful vote" due to take place in Parliament must be "clear to the British public".

  In a letter to MPs, he suggests they will have to choose between whatever deal is on the table and no deal - and no other options will be offered.

  Shadow chancellor John McDonnell said it was an attempt to "fix the vote".

  And pro-European Conservative MPs also reacted with dismay, former education secretary Nicky Morgan saying it "appears to be an attempt by the executive to frustrate our sovereign Parliament" while Anna Soubry urged MPs "to stand up to this outrage".

  The former chancellor Kenneth Clarke told the BBC's Newsnight it was a "silly tactic" and Parliament would "insist on using its proper authority" to keep a variety of options open.

  The BBC's political editor Laura Kuenssberg said this was a "big fat row waiting to happen".

  No 10 sources, she said, were insisting the Commons motion on any final Brexit deal would be amendable but "what is not clear is whether amendments will be voted on before after the vote on the deal".

