  Leinster's winning run to start the season reaches 11 games in all competitions with a bonus-point victory over fierce rivals Munster in Thomond Park.

  Four-try Leinster too good for Munster in derby

  Leinster's winning run to start the season reached 11 games in all competitions with a bonus-point victory over fierce rivals Munster in Thomond Park. The visitors scored two tries in each half, with captain Caelan Doris securing the key fourth score with seven minutes remaining to extend their lead at the top of the United Rugby Championship [URC]. Munster, who failed to capitalise when Tommy O'Brien was sent to the sin-bin in the first half, have not beaten Leinster in Limerick since 2019. Both sides will now take a break from domestic action with no games next weekend, followed by a pair of Champions Cup contests.

  Munster enjoyed an even share of possession and territory during the first half, and displayed better discipline than their opponents, but as they deal with a long injury list made too many mistakes against a side as efficient as Leinster. An overthrown line-out saw one early opportunity go begging and the miscue loomed larger when Billy Burns kicked the ball dead when trying to poke a grubber through into the Leinster backfield. The Leinster pack forced a scrum penalty out of their Munster counterparts against the head and moments later Luke McGrath scampered through a gap with the hosts not leaving a pillar defender to the side of the ruck. Munster responded with a period of pressure that saw their opposition reduced to 14 men but, to their frustration, would not find a try during the sin-bin period. Tommy O'Brien carried the can for Leinster's ill-discipline when the wing was shown a yellow card after the visitors' fourth penalty in quick succession. Munster could not double the punishment, however, as Tadhg Beirne was held up over the line off the five-metre tap. In contrast, when Leinster got down the other end of the pitch, they displayed a ruthless streak. In possession after another Munster line-out error, the forwards drew the defence narrow before the ball was spun out to Prendergast who showed good acceleration to nip through a gap for the second try.

  Josh van der Flier celebrated his 150th appearance in Leinster colours with their third try

  Leinster's discipline issues continued into the second half with a series of penalties giving Munster access to their 22. With five minutes played after the restart, and Leinster flirting with a second yellow card, this time Munster did make them pay from a five-metre tap when flanker Thomas Ahern powered his way over from close range. But while Munster had to work so hard just to get on the board, Leinster continued to make the most of their openings. With French tight-head Rabah Slimani causing havoc at the scrum, his side were able to march up the field and, when Munster again failed to defend the fringe of the ruck, this time it was Josh van der Flier who crashed over. Seven minutes from time, and again from close range, Doris ensured it would be a full five-point haul and moved his side 11 points clear at the top of the table before the chasing pack in the URC play over the remainder of the weekend.
