  Protesters tear down a statue of President Bashar al- Assad's father, the former president Hafez al-Assad, in a suburb of Damascus.

  Protesters have toppled a statue of President Bashar al- Assad's father, the former president Hafez al-Assad, in a suburb of Damascus.

  The incident happened in the Jaramana neighbourhood of the capital.
