title: 'Barking: Murder investigation launched after man in his 30s shot - BBC News'
date: '2024-10-14'
section: London
url: http://www.bbc.co.uk/news/articles/cn037z4d3keo
content: |-
  A man, believed to be in his 30s, was pronounced dead at the scene, said police.

  A man was found with a gunshot wound on Linton Road in Barking, said police

  A murder investigation has been launched after a man was fatally shot in east London. The Metropolitan Police was called to reports of a man injured in Linton Road, Barking, at about 04:35 BST on Sunday. Officers and the London Ambulance Service found a man, believed to be in his 30s, with a gunshot injury. He was pronounced dead at the scene. No arrests have been made, the force said, and the road has been closed while a crime scene remains in place.

  The force appealed for anyone with information that could assist the investigation to contact police

  The man's next of kin have been informed and enquiries into the circumstances continue, the force added.

  Acting Det Ch Supt Lewis Basford said: “I understand the shock and concern local residents will be feeling following this incident. "But I want to reassure them that a team of experienced detectives are already working diligently to piece together the events that has led to this shooting and identify who is responsible. “Local residents will see increased police activity in and around the Linton Road area and I would ask them for patience while officers carry out vital work." He appealed for anyone with information that could assist the investigation to contact police.
