content: |-
  Max Verstappen won in Japan with a weekend of the sort of rare perfection that comes only from drivers of the very highest quality, says Andrew Benson.

  How Verstappen stole Suzuka with McLaren stuck in 'rabbit hole'

  Max Verstappen has won the past four Japanese Grands Prix from pole position

  Max Verstappen stole the Japanese Grand Prix from McLaren with a weekend of the sort of rare perfection that comes only from drivers of the very highest quality. Verstappen's Red Bull was not the fastest car around Suzuka, but the four-time champion converted his stunning pole position on Saturday into his fourth consecutive win at the track. His drive on Sunday - under pressure from the McLarens all race, albeit knowing that overtaking was next to impossible in cars with relatively closely matched performance - was flawless. But his weekend was made with a qualifying lap that drew superlatives from all over the F1 paddock. Verstappen's engineer Gianpiero Lambiase described it as "insane". Aston Martin driver Fernando Alonso, a friend and fan of Verstappen, said it was "magical" and that "only he can do that". Verstappen himself called it "very rare". It gave Verstappen pole from McLaren's Lando Norris by just 0.012 seconds. Knowing that if he retained the lead at the start, the race was a long way to being won, Verstappen did exactly that. With overtaking so difficult, McLaren's one chance to beat him was by stopping Norris for fresh tyres before Verstappen. But they did not take that opportunity, and once Verstappen won the race out of the pits after he and Norris stopped on the same lap, all he had to do was keep it clean and mistake-free. The McLarens were always there, right behind, ready to pounce on any error. But Verstappen being Verstappen, none came.

  Verstappen's qualifying lap "came out of nowhere", Red Bull motorsport adviser Helmut Marko told BBC Sport. "First corner - unbelievable the speed he was going in," Marko said. "It's like his body doesn't feel G-forces. When the car is to his liking, he can drive 110%. Every corner absolutely on the limit and, like in races, he doesn't make mistakes." Overlaying their laps, Norris and Verstappen were neck and neck until the final chicane. Verstappen nailed it, Norris lost some time, and pole was decided. Norris' team-mate Oscar Piastri, on provisional pole after the first runs in final qualifying, made a mistake early in his last effort, and slipped back to third. McLaren team principal Andrea Stella said: "I'm sure our two drivers will have commented themselves that their qualifying laps were not the best laps in qualifying in their careers. "Clearly, when Max elevates the game so much, you need to nail laps in qualifying and you need to bring home any possible millisecond. "Yesterday it was indeed a matter of milliseconds, with 43-45 milliseconds between P3 and P1. Ultimately, I think the qualifying laps in Q3 were even more of a determining factor than anything that happened today in the race."

  Max Verstappen and Lando Norris came close to contact on the pit-lane exit

  McLaren's one chink of light in the race was the pit stops. Norris was about 1.5 seconds behind Verstappen as they neared, just about within theoretical range of the 'undercut', where a driver gains a position by stopping first and using the time gained on fresh tyres to be ahead by the time his rival exits the pits. But McLaren were undone by an unfortunate set of circumstances. They 'dummied' a stop with Norris on lap 18, with a fake radio message telling him to pit. Red Bull ignored them. Then Mercedes stopped George Russell on lap 19. His pace on new tyres threatened to undercut him ahead of Piastri. And that meant McLaren had to pit Piastri on lap 20 to be sure of retaining his position. Although the McLaren was faster than the Mercedes, the difficulty of overtaking meant they did not believe Piastri would have been able to pass Russell on track. That gave the game away to Red Bull, who realised Norris would come in next time around. So they stopped Verstappen. Keeping Norris out would not have worked - he'd have lost more time on his old tyres. So he had to pit, too. Even then, McLaren fashioned a sliver of a chance. Norris' stop was a full second faster than Verstappen's and the Briton was halfway alongside the Red Bull when they exited the pits. But Verstappen was entitled to keep his line, and he did. The narrowing track meant Norris' trajectory took him on to the grass. He had to back off, and the lead stayed with Verstappen. "Maybe we could have tried more with strategy," Norris said. "We'll discuss that. "Could we have gone earlier? Yes. But then you're at risk of safety cars. If you box three laps earlier and the safety car comes out, you look stupid." Stella said it was "unclear" whether the undercut would have worked. He said they would "review" the data. But on Sunday evening he was not prepared to say that this was a race that got away, as McLaren subsequently said about their strategy choices at Canada and Silverstone last year. Although the McLaren was the fastest car, other circumstances of Suzuka played against them once Verstappen was on pole. Their car has a tyre-wear advantage and that is traditionally high at Suzuka. Last year, that might have meant their pace advantage would have grown through the stints, creating an overtaking possibility. But the first sector of the lap had been resurfaced and that led to degradation being low, so they had lost one of their theoretical advantages over their rivals. "So, once, for instance, you nail the qualifying laps like Max did yesterday," Stella said, "then it gets a little bit difficult to get out of the rabbit hole."

  Verstappen's performance underlined just how significant a threat he remains to the title hopes of McLaren, Norris and Piastri despite Red Bull's somewhat difficult start to the season. Not least because, in what seems to be in ultimate terms the third fastest car in F1, he is now only one point behind Norris in the championship. "I know how good he is," Norris said. "I know what he's capable of doing. So I would say nothing is a surprise any more. But yeah, I still believe that we're going to have some good races and we can go toe-to-toe and that some days he'll come out on top and others I will." As for Verstappen, he said his performance over the Japan weekend felt as special to him as it did to those looking in from the outside. But he added: "It also means I really care even though it has not been the easiest start to the year for us. We are not where we want to be in terms of performance. "This weekend has been just really, really nice. Sometimes you have those kind of moments when you get some really great laps out of it." But if the weekend was a reminder to McLaren what they are up against in the shape of Verstappen - and Stella insisted, too, that they still felt a threat from Mercedes and Ferrari, that the season was still in a "transient phase" where relative performance was dictated by circuit variability - so also were there warning signs for Red Bull. Alonso says that Verstappen's performance at the weekend reminded him of his 2012 season, when he fought valiantly but ultimately unsuccessfully for the title with Ferrari against a much faster Red Bull in the hands of Sebastian Vettel, in what he regards as his finest season. "I have been fighting for world championships with the third, fourth fastest car," the Spaniard said. "So at the end it is difficult, as it was difficult for me to beat Vettel. I hope for him he can fight until the end but they need to improve a little bit the car. "He won four, so he can fight with a little bit less competitive car. It is hard and I think people don't realise how difficult it is, and how you need to make perfect every weekend. And he's doing that so far." There is a degree of irony in the fact that Alonso's race engineer at Ferrari at the time was Stella. "Max at the moment is somehow making the difference himself," the Italian said, "but it's very difficult to keep up for 24 events in a season if you don't have the best car."

  McLaren are leading the constructors' championship by 36 points from Mercedes with Red Bull in third, 50 points behind
