title: 'Ammanford: Husband found stabbed teacher in ‘pool of blood’ - BBC News'
date: '2025-05-13'
section: General
url: http://www.bbc.co.uk/news/videos/c787654n1jpo
content: |-
  John Hopkin said his wife was worried “people aren’t listening” when it comes to school safety.

  The husband of a teacher stabbed at a school in south-west Wales said he found her in a "pool of blood" on the morning of the attack.

  Liz Hopkin, as well as fellow teacher Fiona Elias and a pupil, were stabbed at Ysgol Aman in Ammanford, Carmarthenshire, by a 13-year-old student who has been given a 15-years sentence for attempted murder.

  John Hopkin, also a teacher at the school, said his wife was worried "people aren't listening" on school safety, accusing the Welsh government of inaction.

  The Welsh government will discuss the findings of a recent violence and safety in schools round table at a behaviour summit this month, while Carmarthenshire council said a multi-agency review was under way.
