id: bbc_2018_12896
title: Rockslide in French Alps forces villagers to hire helicopter - BBC News
date: '2018-10-20'
section: General
url: http://www.bbc.co.uk/news/world-europe-45922131
content: |-
  With their only road destroyed, fuel, food and cars are airlifted in to the cut off residents.

  A rockslide in the French Alps left two villages cut off in April, with their only road destroyed.

  Now residents in Beroulf and Sainte Sabine have employed the help of a helicopter to provide food and fuel.

  They have also used it to be reunited with their cars.

  Two thirds of the 3,000 euro cost was borne by the locals clubbing together, with the remainder paid for by the local authorities.

  A new road should be finished by the spring.
