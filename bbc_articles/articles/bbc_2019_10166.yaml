content: |-
  The boy was on holiday with his family at La Croix du Vieux Pont in the Berny Riviere area.

  The boy was on holiday with his family at La Croix du Vieux Pont in the Berny Riviere area, near Paris

  A 12-year-old boy from Hull has died at a campsite in France.

  The boy was on a family holiday at La Croix du Vieux Pont in the Berny Riviere area, about 50 miles (80 km) north-east of Paris.

  A spokeswoman for site owner the European Camping Group confirmed the boy died on Thursday afternoon.

  Tour operator Venue Holidays said: "Our hearts go out to the family concerned at this awful time. We will help the family in whatever way is possible."

  It added: "We would request that their privacy is respected at this difficult time."

  The European Camping Group said it had been "deeply touched" and shocked by the "tragedy".

  It said it was offering psychological support, and was collaborating with investigating authorities.

  The Foreign Office said it was "supporting the family of a British child who has died in France".

