id: bbc_2023_9993
title: Sussex PCSO investigated over refusal to attend assault - BBC News
date: '2023-07-03'
section: General
url: http://www.bbc.co.uk/news/uk-england-sussex-66088898
content: |-
  A member of the public asked the PCSO to go to a supermarket where a fight had broken out.

  A Police Community Support Officer has been filmed refusing to respond to an alleged assault in a supermarket.

  Sussex Police has apologised and said it was reviewing the incident.

  The force added: "A police officer attended the incident as an emergency. The PCSO also then attended the scene."
