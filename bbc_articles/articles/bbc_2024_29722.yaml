title: 'Newspaper headlines: ''Hope and fear'' and ''Bigly trouble'' - BBC News'
date: '2024-11-06'
section: The Papers
url: http://www.bbc.co.uk/news/articles/c8jy1l4940mo
content: |-
  The US presidential election dominates Wednesday's front pages as the world waits to hear who won.

  The Times, external carries a photo of both US presidential candidates during the final hours of their campaigns. "World awaits America's fate" is its headline. The Guardian , externalcarries only a photo of a smiling Kamala Harris under three words - "Hope... and fear". "Tinderbox America on a knife edge" says the Daily Mail, external's headline above a picture of Donald Trump and his wife Melania campaigning on Tuesday in Florida. The Financial Times, external simply says, "America decides". The Times reports that farmers are plotting a strike, external to disrupt the food supply system in a protest against the proposed 20% inheritance tax on some farms announced in last week's Budget. The paper says it is being driven by around ten "farming influencers" who will pick a number of days this month to urge farmers to hold back produce to cause shortages in the shops. It quotes Olly Harrison, an arable farmer from Merseyside, whom it describes as the "unofficial spokesman for the plotters", as saying that the planned tax has "made every farmer in the country angry". The Telegraph has a warning from suppliers, external that the proposed tax threatens to "erode domestic food production". It has been speaking to Nigel Murray, the managing director of the supermarket Booths, who says there is increasingly little incentive for farmers here to produce food, which will ultimately lead to a reliance on produce from overseas. The Treasury says the tax will affect only a very small number of farms.

  The cost of housing is the focus for the Daily Express, external which quotes a leading estate agent - Savills - as saying that property prices will surge over the next five years. It predicts an increase of 4% or £14,500 in the next year alone for the average property because of decreased monthly mortgage costs. The i, external carries the story of a wayward Emperor penguin which has come ashore in Australia 2,000 miles from its home in Antarctica. The penguin - which is less than a year old - is thought to have been able to swim so far because it was carried by a current.

