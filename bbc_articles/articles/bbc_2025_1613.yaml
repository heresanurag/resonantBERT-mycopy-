title: 'Six Nations 2025: Champions Ireland grind through gears against England before
  finding groove - BBC Sport'
date: '2025-02-02'
section: Irish Rugby
url: http://www.bbc.co.uk/sport/articles/cn4m0wymznpo
content: |-
  Ireland spent the autumn searching for momentum, but the two-time reigning Six Nations champions eventually looked back to their best against England.

  Ireland get into the groove as England suffer

  This video can not be played To play this video you need to enable JavaScript in your browser. 'Is this the moment they win the game?' - Beirne scores Ireland's third try

  It took just one game of their 2025 Six Nations campaign for Ireland to rediscover a quality that had eluded them through all of last autumn - the ability to work themselves into a rhythm. After stumbling out of the blocks in their November opener, a sobering defeat to the All Blacks that cast a long shadow over the remainder of the month, there was a sense that Ireland never found their groove even in subsequent victories against Argentina, Fiji and Australia. Mistakes felt contagious as the harder Andy Farrell's side tried to turn things around, the more they seemed to struggle. In their 27-22 victory over England on Saturday, in contrast, the most pleasing aspect of a marked turnaround by the home side was their ability to problem-solve in real time. Handed a blockbuster fixture to kick off their championship, Ireland started and finished poorly. Yet the team led by interim head coach Simon Easterby were so superior in between that there was a feeling the five-point margin flattered the visitors. In the opening quarter of the Test match, Easterby's side had struggled to get to grips with an English plan designed to slow their ball and knock them from their attacking rhythm. Few at that stage would have predicted they would hold a 17-point lead going into the closing stages. "We kicked on," said Easterby, who has stepped in while Andy Farrell spends much of the year on British and Irish Lions duty. He was referring to the 35-minute stretch directly after half-time that yielded 22 unanswered Irish points. "We were a bit smarter in the way we played early in the second half," Easterby said, "and that continued for a good chunk of that second half, resulting in a lot of the scores off the back of that."

