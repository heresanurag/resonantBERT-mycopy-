  Switching to the national side from playing for Leinster, as 11 of Ireland's starting side do in their provincial careers, has perhaps not required such a change in style since before Joe Schmidt first pitched up in Dublin 15 years ago. Initially at least, it looked as if going from blue to green was again producing something of a shock to the system. Before his short-term promotion, Easterby served as Ireland's defensive specialist. He cannot have been pleased to see such gaps appearing across the Aviva Stadium pitch through the period that saw Cadan Murley's debut try give the Red Rose a deserved lead. That is not to dismiss England's contribution to Ireland's early struggles. Steve Borthwick's tactic of deploying three fetchers in his back row wreaked havoc on the hosts' breakdown, and England's line speed in defence contributed to the errors that brought several promising attacks to abrupt conclusions. "The first half felt like the first round of a Six Nations, which is always tough," said Easterby, whose side trailed 10-5 at the break. "There's so much at stake. Everyone has a lot of energy and enthusiasm. "It was tough going, because we felt at times we didn't make the most of the opportunities that we had. They defended well at times and stopped us getting momentum."

