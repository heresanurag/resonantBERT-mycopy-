id: bbc_2018_1494
title: 'Holland Park flat fire: Man dies - BBC News'
date: '2018-02-07'
section: London
url: http://www.bbc.co.uk/news/uk-england-london-42970369
content: |-
  Neighbouring properties were evacuated as the blaze was seen spreading to a second floor.

  Twelve fire engines were called and eight neighbouring properties were evacuated as a precaution

  A man has died in a fire at a flat in west London.

  At its height, 80 firefighters were called in on Tuesday night to tackle the fire at the first-floor flat in the four-storey converted house in Holland Park Gardens.

  Paramedics said the man died at the scene despite resuscitation efforts.

  Eyewitnesses described how the fire, at about 21:45 GMT, spread to a second floor. Eight neighbouring properties were evacuated.

  The fire was brought under control shortly after 02:00 GMT.

  Photos on social media showed flames and smoke coming from the building.

  Photos on social media showed flames and smoke coming from the building

  Witnesses described how the fire spread to a second floor

  George Nicolas, who lives opposite the flats, said on Twitter the fire appeared to have spread to the second floor of the building before being contained.

  It said the cause of the fire was under investigation.

  LFB added crews from Hammersmith, Kensington, North Kensington and other stations had attended.

