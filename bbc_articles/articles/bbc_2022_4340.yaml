title: Smoke rising in Ukrainian port city Odesa after strikes - BBC News
date: '2022-04-03'
section: General
url: http://www.bbc.co.uk/news/world-europe-60972351
content: |-
  Smoke is seen after explosions are heard in the strategic southern port city of Odesa on the Black Sea coast.

  Thick black smoke has covered the skies over the Ukrainian port city of Odesa after missiles hit the area.

  A Ukrainian military official has said that there are no known casualties so far.

