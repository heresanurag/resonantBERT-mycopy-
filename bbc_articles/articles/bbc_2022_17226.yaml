title: '''Major'' emergency services operation underway at Solihull - BBC News'
date: '2022-12-12'
section: General
url: http://www.bbc.co.uk/news/uk-63937966
content: |-
  A number of people are in a critical condition after being pulled from a lake in freezing temperatures, police have said.

  The BBC's Sophie Madden is in Babbs Mill Park, where emergency services are at the scene of the incident. She says a drone was spotted flying over the water.
