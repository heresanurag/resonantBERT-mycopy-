  The 15-year-old's body was recovered from the lake in Beckenham Place Park on Friday night.

  Boy, 15, dies after going swimming in London lake

  The boy's body was recovered from the lake in Beckenham Place Park in Lewisham

  A teenage boy has died after getting into difficulty while swimming in a lake in south-east London. The Metropolitan Police confirmed that the 15-year-old's body was recovered from the lake in Beckenham Place Park in the borough of Lewisham at about 22:40 BST on Friday. The police had been called at about 15:00 to reports of the boy "going missing after getting into difficulty in the water," the Met said in a statement on Saturday. "Specialist diving teams were in attendance alongside the London Ambulance Service and London Fire Brigade." The boy, who has not been named, was taken to hospital where he was pronounced dead. His family have been informed.

  The Met said his death was being treated as "unexpected" but was not believed to be suspicious. The police originally said the boy was 16, but have since confirmed his age as 15. A Lewisham Council spokesperson said Beckenham Place Park had reopened but the lake would remain closed with security in place "until further notice". The spokesperson added: "We send our thoughts and deepest condolences to his family and friends. "We are working closely with the police in order that their investigation establishes the full facts of what's happened." On Monday, 11-year-old Kaliyah Coa went missing in the River Thames. A "recovery mission" is under way to find her, the Met said.
