title: 'Coronavirus: Mess left at beauty spots ''unacceptable'' - BBC News'
date: '2020-07-17'
section: Wales
url: http://www.bbc.co.uk/news/uk-wales-53439091
content: |-
  Snowdonia National Park says visitors have left litter, dog mess, and excrement on paths.

  Rubbish has been left strewn on Snowdon, including this found outside the cafe at the summit

  People are being urged to respect the countryside after "widespread" reports of visitors leaving litter and using beauty spots as toilets.

  At the height of lockdown, Wales' three national parks - Brecon Beacons, Snowdonia, and Pembrokeshire Coast - were closed, in a bid to help curb the spread of coronavirus.

  Since reopening on 6 July, dog mess and litter has been left on Snowdon.

  The national park authority said the behaviour was "unacceptable".

  It said a "small minority of people" hiking up Snowdon since restrictions were eased had left litter, dog mess and human excrement behind.

  "This is a emerging widespread issue not just in the mountains but also at lakeside locations, and across the national parks and visitor destinations in Wales," it said in a statement, adding similar problems were being seen in England.

  With toilets closed at the summit of Snowdon, human excrement has been found

  Walker Arwel Griffiths said he was disgusted to find food and drink waste, bottles, cans and even blankets and items of clothing on the mountain.

  "It was all the way from the bottom of the mountain to the top and outside the cafe by the doorwell," he said.

  "It's disgusting, heartbreaking. The mountain was getting greener again and flowers were growing with lack of use during lockdown. Now there's gloves, socks, blankets, bottles, cans and lots of wipes thrown around.

  "I'm going up there with a litter picker - it needs to be done."

