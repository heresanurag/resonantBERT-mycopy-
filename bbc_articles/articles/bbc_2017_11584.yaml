title: Wigan's Ryan Colclough subbed for son's birth after scoring twice - BBC News
date: '2017-11-22'
section: Manchester
url: http://www.bbc.co.uk/news/uk-england-manchester-42078126
content: |-
  Wigan's Ryan Colclough scored twice and made it to his son's birth - in full kit - with 30 minutes to go.

  This video can not be played To play this video you need to enable JavaScript in your browser. Ryan Colclough's told BBC Radio Manchester he was 'overwhelmed' by his unique hat-trick

  A footballer who scored twice before being subbed to see the birth of his son says he got there "just in the nick of time".

  Wigan Athletic's Ryan Colclough made a double strike against Doncaster before a nod from his father watching in the stands indicated his partner's waters had broken.

  He said he raced down the tunnel and made it to the birth - in full kit - with 30 minutes to spare.

  He said: "It was a great feeling."

