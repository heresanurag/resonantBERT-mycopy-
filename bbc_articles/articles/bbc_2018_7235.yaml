title: Urgent appeal after Bournemouth food bank trashed - BBC News
date: '2018-06-23'
section: Dorset
url: http://www.bbc.co.uk/news/uk-england-dorset-44586993
content: |-
  Burglars made off with a month's worth of food and other goods meant for families in need.

  Claire Matthews said the charity needed urgent donations of non-perishable goods

  A food bank in Bournemouth is appealing for emergency donations after burglars stole a month's worth of goods intended for families in need.

  Volunteers at Hope For Food said the site was trashed, causing £3,000 of damage, and 90% of food, clothes, toiletries and toys were taken.

  More than 400 families will be affected following the burglary on Friday.

  Founder Claire Matthews said: "We've got beans and soup but the rest of it has gone. It beggars belief."

  She added: "It's going to have a huge impact on our families. One family we needed to get food to yesterday, but we didn't have any.

  "A van was supposed to go out tomorrow but there's nothing to go into the van. They've [the burglars] taken a good month's worth of food.

  "Families are going to get a meagre offering of the basics instead of the normal hamper we give out."

  The organisation, based on the West Howe Industrial Estate, has appealed for urgent donations of non-perishable goods such as tins of food, pasta, biscuits, sauces in jars and squash.

  Thieves stole nearly all the toiletries stored on shelves

  Dorset police officers were at the scene investigating the burglary and the vandalism, which includes smashed windows and fridges left open, with ready meals thrown on the floor.

  Ms Matthews said: "We just can't believe people would do such a cruel thing."

