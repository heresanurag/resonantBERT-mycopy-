  Last December, when Vijay Nambiar, the UN Special Representative to Myanmar, urged Aung San Suu Kyi to visit Rakhine state, he was rebuffed.

  As one member of her inner circle put it to me: "She will never ever be seen to do what Nambiar tells her to do."

  Nor will she ever concede that the Rohingya Muslims are being subjected to ethnic cleansing, not even when tens of thousands are being burned from their homes amid widespread reports of killing and sexual violence.

  This is not the first time she has faced criticism over the Rohingya.

  It was the same story five years ago during a campaign that displaced more than 100,000 Rohingya.

