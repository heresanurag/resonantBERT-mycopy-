  Daw Suu, as she is known, did not visit the area or speak out in defence of the persecuted minority.

  While her government has moved to tackle hate speech by Buddhist extremists, she has not made the kind of public gestures in support of Muslims made by her hero Mahatma Gandhi and his colleague Jawaharlal Nehru during the violence of India's partition.

  Gandhi paid with his life and the leaders did not succeed in ending the slaughter. But both men laid down a marker about the values of the India they wished to see emerge from partition.

  Jawaharlal Nehru (L) and Mahatma Gandhi publicly condemned violence against Muslims during India's partition

  The memory of Nehru wading into Hindu mobs to prevent sectarian violence is one of the 20th Century's defining acts of personal courage.

  Nobody expects this of Aung San Suu Kyi, but it is the absence of even rhetorical intervention that disturbs many former supporters.

  The suffering of the Rohingya is a tragedy in itself. But the palls of smoke from Rakhine state is indicative of a military that feels it can carry on in the old brutal way, whatever the world says.

  Tens of thousands of Rohingya have fled violence in Myanmar's Rakhine state

  The action unleashed now against the Rohingya will be familiar to the residents of other ethnic areas in Myanmar such as Shan state, or in the war against the Karen.

  Aung San Suu Kyi does not control the military and they do not trust her. But her refusal to condemn well-documented military abuses provides the generals with political cover.

  It goes further than silence.

  Her diplomats are working with Russia and the UN to prevent criticism of the government at Security Council level, and she herself has characterised the latest violence as a problem of terrorism.

  Stubbornness in the face of what she feels is unfounded criticism is part of the equation.

  But there is a more troubling question: is her long-declared commitment to universal human rights partial, a concern that does not and never will embrace the beleaguered Rohingya Muslims in this Buddhist majority country?

  She may yet answer that question by pressing the military to end its brutal crackdown. At this moment there is little sign of that happening.
