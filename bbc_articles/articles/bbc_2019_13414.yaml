  Updates and reaction as the parties continued trying to win over voters around the country.

  BBC Wales debate: What are you doing to restore our faith in politics?

  For the last question, Patrick Jones asks: what will the panel will do to restore our faith in politics and politicians? David TC Davies for the Conservatives says that to restore trust "we must carry out our promises". He says that it is outrageous that people are saying the Tories would sell off the NHS. The Brexit Party's James Wells says the party slogan of "change politics for good" is why he got involved in politics. But the audience member Mr Jones is unimpressed. "Stop lying to us, don't insult our intelligence," he says. Unlike her party leader earlier tonight, Labour's Nia Griffith says: "We need to apologise to the whole of the Jewish community." She says she is "very, very ashamed" of anti-Semitism in the party. Lib Dem Jane Dodds says: "We have to trust each other, if we say we're going to do something, we have to do it. We have to work together." Plaid's Liz Saville-Roberts says people are fed up with "soap-opera slogan politics". "As a society we have to look at politics is for, politics is how we live together," she says.
