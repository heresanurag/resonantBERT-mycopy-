title: 'Afghan attack: Kabul clinic cares for babies after attack - BBC News'
date: '2020-05-13'
section: General
url: http://www.bbc.co.uk/news/world-asia-52650759
content: |-
  A children's hospital in the Afghan capital takes in 19 babies who survived a horrific attack.

  A children's hospital in the Afghan capital Kabul has taken in 19 babies who survived a horrific attack by militants on a maternity ward at another clinic.

  It was not immediately known how many of the infants' mothers were among the dozens killed in Tuesday's gun and bomb assault. No group has said it carried it out.
