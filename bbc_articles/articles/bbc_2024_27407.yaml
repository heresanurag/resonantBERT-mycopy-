  The comic's hearse will travel through Edinburgh and on to Glasgow before her funeral on 30 November.

  Comedian Godley to go on 'final tour' before funeral

  Godley died on 2 November while receiving palliative care for terminal cancer

  The funeral of comedian Janey Godley will take place over two days across two cities as part of a “final tour” of Scotland. A hearse will travel through Edinburgh on 29 November in tribute to her “beloved festival home” before returning to Glasgow on 30 November for the ceremony. The funeral for the comic, who died on 2 November aged 63 after receiving palliative care for terminal cancer, will take place at St Mary’s Cathedral in the city’s west end. Her daughter, Ashley Storrie, confirmed the arrangements on social media.

  Godley, who found viral fame with her dubbed parodies of then Scottish first minister Nicola Sturgeon's coronavirus news briefings during the pandemic, revealed she had ovarian cancer in November 2021. She had been due to embark on a tour entitled “Not Dead Yet,” but was forced to cancel it after her condition worsened. Godley was given the all-clear in 2022 but later that year announced another scan had shown signs of the disease in her abdomen. In the social media post her daughter said: "Here's the details of Janey's final tour, thank you for all the love and kindness in this past week. "For the past few years of Ma's life, it was important to her that she shared her journey with everyone, to offer support for others on the same path and to highlight the symptoms of Ovarian Cancer - all of course in her very singular Janey style, with laughter and candour. "So many of you who have travelled with us on this journey wish to bid her a final farewell, so here's the details of my mum's final tour, in the two cities she loved with all her heart."

  The hearse will travel along the Royal Mile and Lawnmarket in Edinburgh with a "pause for reflection" at St Giles' Cathedral before travelling along Cockburn Street, Market Street and on to Glasgow. After the funeral on Saturday there will be a private service at a crematorium. Ms Storrie said her mother asked that instead of traditional funeral attire, those who wish to do so should wear bright colours to celebrate her life. She also asked that no flowers be sent but said people were invited to contribute to the Prince and Princess of Wales Hospice or any charity of their choice. Godley won the inaugural Sir Billy Connolly Spirit of Glasgow Award at the Glasgow International Comedy Festival. She died peacefully in the Prince and Princess of Wales Hospice in Glasgow, surrounded by her loved ones, her management company said last weekend.
