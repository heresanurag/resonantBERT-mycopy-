title: Hardest Geezer Russ Cook finishes running length of New Zealand - BBC News
date: '2025-05-22'
section: Sussex
url: http://www.bbc.co.uk/news/articles/c0k37zrpx53o
content: |-
  Russ Cook, nicknamed Hardest Geezer, has run more than 2,500km in 73 days across New Zealand.

  Russ Cook, from Worthing, has run the full length of New Zealand

  A man who ran the entire length of Africa has completed his latest challenge – running the full length of New Zealand. Russ Cook, nicknamed Hardest Geezer, has run more than 1,553 miles (2,500km) in 73 days. "We took a few dings on the way through, but made it out the other side," he said. The 28-year-old, from Worthing, West Sussex, completed his previous endurance challenge of running the entire length of Africa in April last year after 352 days.

  He begun the latest challenge at Stirling Point in Bluff - the southern tip of New Zealand's South Island - and ran northbound to the finish line in Cape Rēinga, in Northland. Upon completion, he said: "Running the length of New Zealand - completed it mate. "Massive thank you to the people of this country, your kindness, hospitality and mad scenery made this one unforgettable. "We did it, boys. What a ride. Back to training."

  Russ Cook finished the challenge at Cape Rēinga, in Northland

  But he also clocked his fastest ever 100km time, of 11 hours. "New Zealand gave me a proper hiding at times, brutal trails, wild weather, and more than a few wobbly moments, but it's also one of the most welcoming, stunning places I've ever run through," he added. "From the mountains to the coast, it's got some serious variety, and the people made it even better. I hope everyone that's after a bit of adventure can come and experience it here."

  Russ Cook raised more than £1m for charity during his previous challenge

  He added that he had gone through seven pairs of shoes during the challenge, eaten hundreds of pies and climbed "a bucket load of mountains". Prior to the challenge, Mr Cook told the BBC he expected to climb the equivalent of approximately 10 Mount Everests in elevation across about 10 weeks of running. Mr Cook raised more than £1m for charity during his previous challenge in Africa, despite complications with visas, health scares, geopolitical issues and an armed robbery. The extreme challenge began at South Africa's most southerly point on 22 April 2023 and finished more than 10,190 miles (16,400km) north in Tunisia.
