  John Humphrys pays tribute to Trainspotting with his own version of Ewan McGregor's famous 'Choose Life' monologue

  The sequel to Trainspotting is in cinemas this week. "T2" updates Ewan McGregor's famous "Choose Life" monologue from the first film in which he rails against the trappings of modern life.

  In honour of the 1990s film, the Today programme decided to run its own tribute to that iconic monologue.
