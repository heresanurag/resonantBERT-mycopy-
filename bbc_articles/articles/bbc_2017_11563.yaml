title: Mugabe resignation sparks dancing in the street - BBC News
date: '2017-11-22'
section: Africa
url: http://www.bbc.co.uk/news/world-africa-42071935
content: |-
  People dance in the streets as the resignation of Robert Mugabe as president of Zimbabwe is announced.

  This video can not be played To play this video you need to enable JavaScript in your browser. There were scenes of celebration on the streets of the capital, Harare

  News that Robert Mugabe has resigned as the president of Zimbabwe has spread quickly across the streets of Zimbabwe. This is how people are celebrating.

  The celebrations started with MPs in parliament reacting to the resignation letter from Mr Mugabe being read out:

  Where people couldn't get up on tables. they got up on cars:

  People waved down traffic with their flags:

