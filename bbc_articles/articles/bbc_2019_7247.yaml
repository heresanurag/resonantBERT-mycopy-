title: The solar-power charged electric cars making money - BBC News
date: '2019-06-11'
section: General
url: http://www.bbc.co.uk/news/science-environment-48530488
content: |-
  The new cars being tried out in Porto Santo can sell solar power electricity back to the island grid.

  Electric cars are being used to help power a small Portuguese island in the Atlantic.

  Porto Santo Island has begun testing a scheme in which the batteries in electric vehicles are charged by solar power during the day but at night return spare energy to the grid to power people's homes.

  Some experts say this form of energy storage could become a global trend.
