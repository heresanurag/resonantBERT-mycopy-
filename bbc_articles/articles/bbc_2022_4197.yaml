title: 'Ukraine conflict: Mum in Poland takes in fleeing families - BBC News'
date: '2022-03-02'
section: General
url: http://www.bbc.co.uk/news/world-europe-60593201
content: |-
  Joanna is opening her home in Poland to Ukraine refugees seeking shelter after reaching the border.

  The United Nations says more than a million people have left Ukraine since the Russian invasion began.

  Most of the tens of thousands crossing into Poland stay with relatives or move on to other countries, but others have nowhere to go.

  Some people living near the border are opening their homes to those who need shelter. The BBC's Mark Lowen met Joanna, a mother of three, as she welcomed Anna and her five-year-old daughter, Milena, after they had fled from Kyiv.
