content: |-
  Matt Jones walked the Llangollen Round twice carrying 37kg in honour of his late wife.

  A man has completed a 70-mile hike over more than 15,000ft in elevation gain with a 37kg fridge-freezer on his back.

  Matt Jones walked the Llangollen Round twice in 34 hours, raising money for children's hospice Hope House Ty Gobaith, in honour of his wife Vicky, who died just before Christmas.

  He made a bet with his wife in September after having a hip replacement, which he needed after getting injured while completing the walk in his hometown in 2018.

  After the surgeon told him he needed to slow down, Vicky joked: "This madman will do the Llangollen Round with a fridge on his back next time."

  He said he would carry a fridge freezer instead and do it twice, to which his wife replied: "You've got yourself a bet, Mr Jones."

  But what started as a joke became reality by the end of January when the father-of-four said he needed "a focus".

  "I started to believe that the mountains were my church," he told BBC Radio 5 Live.
