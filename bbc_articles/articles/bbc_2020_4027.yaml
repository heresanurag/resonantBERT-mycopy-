content: |-
  A round-up of events as Wales' first minister defended delay in online booking for Covid-19 tests.

  Foreign Secretary Dominic Raab says the prime minister is "raring to go" as he is due to return to work tomorrow.

  Asked by the BBC's Andrew Marr if he had relished standing in during Boris Johnson's treatment for symptoms of coronavirus, Mr Raab said his job had been to "step up just like the rest of the country".

  "When your prime minister is stricken with the coronavirus, and particularly when we knew it was touch and go, you're thinking very much personally of him but also the role of leading the government," he said.

  "I also think of the country, and the position it's in. And like all of those key workers, like the rest of the country, my job is just to step up to the plate."
