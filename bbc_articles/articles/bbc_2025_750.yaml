content: |-
  James Lee Williams shot to fame performing as drag queen The Vivienne in RuPaul's Drag Race UK.

  RuPaul's Drag Race UK star The Vivienne was found dead in the bathroom of their home, an inquest has heard. The body of 32-year-old James Lee Williams was found in Chorlton-by-Backford, near Chester, on 5 January. Police confirmed there were no suspicious circumstances surrounding the death, the inquest opening at Cheshire Coroner's Court in Warrington heard. Noting that a post-mortem examination revealed an "unnatural cause of death", area coroner Victoria Davies said further investigation was required and adjourned the inquest until 30 June.

  Hundreds attended a vigil for The Vivienne in Liverpool last month

  The Vivienne's body was identified by their father, Lee Williams, the inquest heard. Ms Davies said: "Given the unnatural cause of death identified on post-mortem testing it is appropriate for me to formally open the inquest into the death of James Lee Williams." Williams, who grew up in Colwyn Bay in north Wales before moving to Liverpool, won the first series of RuPaul's Drag Race UK in 2019 and came third in the 2023 edition of Dancing On Ice.

  James Lee Williams was laid to rest at St Margaret's Church in Bodelwyddan, Denbighshire

  Hundreds gathered for a vigil on the steps of St George's Hall in Liverpool city centre last month to pay their respects to the star. The landmark was lit up in green to reflect The Vivienne's stage role in Wizard of Oz and crowds swayed with their phone torches shining to a moving rendition of Somewhere Over the Rainbow. "As a family we are completely overwhelmed by the outpouring of love for James, The Vivienne," the family said in a statement read by The Vivienne's friend Bobby Musker. The family paid tribute to a "son, brother, uncle and true icon". Williams' funeral in Denbighshire was attended by RuPaul's Drag Race UK contestants Tia Kofi, Baga Chipz and Cheryl along with Steps singer Ian "H" Watkins, TV personality Kim Woodburn and Coronation Street actress Claire Sweeney.

