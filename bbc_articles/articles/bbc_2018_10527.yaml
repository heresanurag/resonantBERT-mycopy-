  An additional challenge, the IFG points out, is that "until a full Withdrawal Agreement is locked down in legal text", government preparations for no deal have to continue.

  In the event of no deal, of course, Parliament will have to scramble to pass all sorts of legislation for sudden change in a whole host of policy areas.

  "There is a real risk," the IFG argues, "that this will not be in place, and the UK will face a legal hiatus."

  The risks are reflected in the traffic lights: if there is a deal they are green for most legislation, except for the Withdrawal Agreement Bill, which would still need to be passed and is flashing amber.

  With no deal, again there is some green, indicating that plans are already in place. But there are plenty of pieces of legislation coloured amber, suggesting uncertainty, and on the future rights of citizens in the event of no deal, the lights remain red.

  An awful lot depends on the next few weeks - as negotiations with the EU on a Withdrawal Agreement, the terms on which the UK will leave, reach their final phase.

  The two sides also need to agree a political declaration on the future relationship - and persuade the UK and European parliaments to accept it all.

  The IFG's negotiation traffic lights have a lot in green, including a financial settlement, citizens, and agreement in principle on the transition period. Officials say the deal is at least 80% done.

  "We make progress every week and a deal is within our sights," Brexit Secretary Dominic Raab told the House of Commons this month.

  But the IFG also designates some amber issues - including governance (the role of the European Court of Justice), and the status of Gibraltar; while the toughest part of all - avoiding a hard border in Ireland - is still flashing red.

  The other red light in this section refers to the fraught process of ratification in the UK Parliament, while the government also needs to renegotiate hundreds of agreements with other countries - on trade and other issues - to replace those it has been part of as an EU member.

  Brexit, the IFG concludes, is likely to lead to "unprecedented levels of change across huge swathes of policy simultaneously".

  That is one of the reasons why many people are campaigning for a People's Vote or second referendum, once the details of any deal to leave are revealed.

  That, of course, is not government policy.

  But with six months to go, the whole process remains highly uncertain.

