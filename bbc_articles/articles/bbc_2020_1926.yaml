title: 'US election: A family split over Bernie Sanders - BBC News'
date: '2020-02-11'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-51439102
content: |-
  Quincy says she's in "hot water" with her father as they spar over which Democrat can beat Donald Trump.

  Quincy is all-in for Bernie Sanders and that's put the 23-year-old at odds with her father, Ron. He's backed Elizabeth Warren in New Hampshire's Democratic primary.

  This kind of generational battle between ideology and pragmatism is nothing new - but it could be a key factor as Democrats decide who has the best chance of beating Donald Trump in November's presidential election.
