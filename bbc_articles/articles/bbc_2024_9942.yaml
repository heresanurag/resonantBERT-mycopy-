id: bbc_2024_9942
title: 'Rhondda: Buses filmed mounting kerbs and driving on pavement - BBC News'
date: '2024-05-10'
section: General
url: http://www.bbc.co.uk/news/uk-wales-68791457
content: |-
  CCTV footage shows buses mounting the kerb and driving close to the front doors of properties.

  CCTV footage has captured buses mounting kerbs and driving on the pavement on a Valleys street.

  A mum-of-two who lives on East Road in Tylorstown, Rhondda Cynon Taf, has claimed that "someone is going to get killed" if it continues.

  Alana Sargent added that she has almost been run over whilst stepping out of her front door.

  The bus operator, Stagecoach, said it will launch a full investigation.
