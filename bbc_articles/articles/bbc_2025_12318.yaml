title: 'NBA Finals: Pacers level series against Thunder to set up game seven decider
  - BBC Sport'
date: '2025-06-20'
section: Basketball
url: http://www.bbc.co.uk/sport/basketball/articles/cn7dmrgxm5xo
content: |-
  The NBA Championship Finals goes to game seven for the 20th time in its history after the Indiana Pacers beat the Oklahoma City Thunder to level the series.

  To play this video you need to enable JavaScript in your browser. This video can not be played

  The NBA Finals will be decided by a winner-takes-all game seven for the first time in nine years after the Indiana Pacers defeated the Oklahoma City Thunder 108-91 in game six to level the series. A fine attacking display from the Pacers, which included 20 points for Obi Toppin off the bench, stopped the Thunder from claiming the Championship in Indianapolis. Star player Tyrese Haliburton, who struggled in game five becauase of a calf injury, passed a late fitness test before tip-off and managed 14 points, five assists and two steals in 22 minutes of play. "We just wanted to protect our court," Haliburton said.

  "We didn't want to see those guys celebrate a championship on our home floor. Backs against the wall, we just responded. "So many different guys chipped in. It was a whole team effort. I'm really proud of this group." The victory means the NBA finals will go to game seven for the first time since 2016, when the Cleveland Cavaliers won their first Championship with a 4-3 series win against the Golden State Warriors. The Thunder will host game seven on Monday (01:00 BST) but will need a much improved performance to win their first Championship in Oklahoma City. Their only previous NBA title came as previous incarnation, the Seattle Supersonics, in 1979. Shai Gilgeous-Alexander, the newly-crowned Most Valuable Player, top scored for the Thunder with 21 points. "Credit Indiana," Thunder coach Mark Daigneault said. "They earned the win. They outplayed us for most of the 48 minutes. They went out there and attacked the game." Monday's game will mark the 20th time the NBA Finals have gone to game seven, with the home side in the decider triumphing 15 times.

