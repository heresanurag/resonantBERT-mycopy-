title: Suffolk MP Patrick Spencer is charged with two sexual assaults - BBC News
date: '2025-05-14'
section: Suffolk
url: http://www.bbc.co.uk/news/articles/c0lnggjj9gko
content: |-
  Central Suffolk and North Ipswich MP Patrick Spencer will appear before magistrates in June.

  Patrick Spencer will appear in court next month

  An MP has been charged with two counts of sexual assault that allegedly took place at London's Groucho Club, the Metropolitan Police have said. Central Suffolk and North Ipswich MP Patrick Spencer is accused of two attacks on two separate women in August 2023 - before he was elected. The 37-year-old, who became a Conservative MP at the 2024 general election, will appear at Westminster Magistrates' Court on 16 June. Mr Spencer's lawyers say he "categorically denies the charges" against him and "will defend the allegations robustly in court".

  The Crown Prosecution Service (CPS) said it had authorised charges relating to "two alleged incidents involving two separate women" at the private members' club. "On 13 March 2025, a man attended a voluntary interview at a London police station," the Met Police said. "Patrick Spencer has since been charged with two counts of sexual assault and will appear at Westminster Magistrates' Court on Monday, 16 June."

  Frank Ferguson, head of the special crime and counter terrorism division at the Crown Prosecution Service (CPS), said: "Following a review of the evidence provided by the Metropolitan Police Service, we have authorised two counts of sexual assault against Patrick Spencer MP. "The charges follow two alleged incidents involving two separate women at the Groucho Club in central London in August 2023." The Groucho is a private members' club in Soho's Dean Street. It opened in 1985 and became a well-known haunt of celebrities and media figures.

  On his website, Spencer says he lives in Suffolk with his family. He was not an MP at the time of the alleged attacks. A Conservative Party spokesman said Spencer had been suspended from the party following the news of the charges. He is now listed as an independent on the UK Parliament website. The spokesman said in a statement that the Conservative Party "believes in integrity and high standards". "We have taken immediate action," he added. "Patrick Spencer MP has been suspended from the Conservative Party, and the whip withdrawn, with immediate effect. "The Conservative Party cannot comment further on an ongoing legal case." It is understood that Spencer was asked not to attend the parliamentary estate by the Tories' chief whip while police carried out their investigation. MPs face being barred from attending Parliament if they are arrested for serious sexual or violent offences after changes last year. It can decide on a range of measures including exclusion from the parliamentary estate and a ban on Commons-funded travel, although its conclusions are kept confidential.

  Spencer was elected as the MP for Central Suffolk and North Ipswich in July 2024 with a majority of 4,290. Before he entered the Commons, he worked in finance for the private equity firm IPGL, a company chaired by his father, former Conservative Party treasurer Lord Michael Spencer. He later took a job at the Centre for Social Justice think tank and then became a senior adviser at the Department for Education. Spencer made his maiden speech in July during a debate on the MPs' code of conduct relating to second jobs. He said then that the "most important thing to the people across my constituency" was "restoring a sense of moral probity and public spiritedness to our political system".
