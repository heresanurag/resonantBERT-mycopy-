title: 'Rugby Championship: Argentina stun New Zealand in Wellington - BBC Sport'
date: '2024-08-10'
section: Rugby Union
url: http://www.bbc.co.uk/sport/rugby-union/articles/c89wv9pn117o
content: |-
  Veteran hooker Agustin Creevy scores the decisive try as Argentina stun New Zealand 38-30 in Wellington.

  Argentina outscored New Zealand four tries to three

  Veteran hooker Agustin Creevy scored the decisive try as Argentina stunned New Zealand in Wellington as the All Blacks began their Rugby Championship title defence with a shock defeat. It is the South Americans' third win against New Zealand - following victories in Sydney in 2020 and Christchurch in 2022 - and their 38-point tally is the most the All Blacks have conceded at home. Former Sale forward Creevy, 39, crossed the line 10 minutes from time to give the visitors a five-point lead and Santiago Carreras made sure of a famous victory with a late penalty. New Zealand started brightly and Damian McKenzie kicked the first of his 15 points with an early penalty before setting up lock Sam Darry to score on his Test debut with a superb chip-and-chase. The Pumas responded with a try through centre Lucio Cinti before McKenzie restored the advantage for new coach Scott Robertson's side by setting up centre Anton Lienert-Brown to score.

  Winger Mateo Carreras brought Felipe Contepomi's Argentina to within five points at half-time when he pounced on a defensive error to touch down. The Pumas moved into the lead for the first time two minutes into the second half when lock Franco Molina scored his first Test try by powering over following a line-out. Wing Mark Telea restored the All Blacks' five-point lead but fly-half Carreras' penalty moved the Pumas to within two points. Iconic forward Creevy, capped 109 times by his country, then burrowed over and Carreras converted to put the visitors five points ahead. The three-time world champions scrambled for a response but they made too many errors and Carreras' late penalty put Argentina out of sight. The teams meet again in Auckland on 17 August.
