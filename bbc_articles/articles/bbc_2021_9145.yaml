title: 'Georgia: Tbilisi Pride cancelled as far-right protesters burn rainbow flags
  - BBC News'
date: '2021-07-06'
section: General
url: http://www.bbc.co.uk/news/world-europe-57727887
content: |-
  LGBT activists cancel a Pride event after violent far-right protests in Georgia's capital Tbilisi.

  LGBT activists in Georgia's capital Tbilisi have cancelled a gay rights event after their office was stormed by far-right protesters, who were filmed tearing up and burning rainbow flags.

  There were also clashes between the police and far-right protesters, with at least 20 journalists reportedly injured.
