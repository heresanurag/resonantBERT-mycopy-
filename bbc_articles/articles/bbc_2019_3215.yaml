  Mr Sandison said that if anyone was "abused" by the tweet it was Oliver Mundell, based on his public speaking.

  He said: "That statement about Oliver Mundell wasn't based on his sexuality, it's nothing to do with his sexuality. Was David Mundell then abused because of his sexuality? I say absolutely not."

  He added that Ms Dugdale's comment was "not fairly made" and claimed it was motivated in part by her "ill feeling" towards the blogger because of articles he had written about her.

  On Tuesday, Ms Dugdale told the court that she had a responsibility as a gay politician to "call out" homophobia, and that it remained her "honest view" that the tweet was homophobic.

  Her lawyer, Roddy Dunlop QC, described the Lothian MSP as "entirely credible and reliable" and said the true question in the case was whether someone was entitled to view the tweet as homophobic.

  He said: "The pursuer (Mr Campbell) quite clearly does not like the defender. He has been extremely rude about her on multiple occasions and on the one occasion she calls him out, he sues her.

  "When he publicly tweets about two public figures, he is exposing himself to public comment and he has to thole that. There is a plain irony in the pursuer, a master of calumny, suing for defamation in this particular context.

  "This is someone who has entered the political arena of his own volition, armed with a quiver of poisoned arrows which he will fire at anyone he chooses. He should not complain when an arrow is fired back."
