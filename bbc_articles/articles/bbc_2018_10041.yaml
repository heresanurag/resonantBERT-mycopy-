id: bbc_2018_10041
title: CCTV shows joyriders crashing stolen bus - BBC News
date: '2018-08-01'
section: General
url: http://www.bbc.co.uk/news/uk-england-gloucestershire-45025042
content: |-
  CCTV shows two drunk teenagers shouting as they drove the vehicle for nine miles before crashing it.

  A bus was written off by two drunk teenage joyriders who stole the vehicle, drove it nine miles and then crashed it.

  A CCTV camera recorded Harry Atley, 19, and Thomas Bloomfield, 18, shouting and swearing as they drove it from Tetbury in Gloucestershire to Malmesbury in Wiltshire, last November.

  The pair were given suspended sentences and banned from driving for two years at Gloucester Crown Court.
