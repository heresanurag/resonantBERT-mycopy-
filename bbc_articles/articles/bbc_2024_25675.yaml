title: Princess Beatrice announces pregnancy with second child - BBC News
date: '2024-10-02'
section: UK
url: http://www.bbc.co.uk/news/articles/c3e977358vdo
content: |-
  The child is due next year and is set to become 11th in line to the throne.

  The second child of Princess Beatrice and husband Edoardo Mapelli Mozzi will be born 11th in line to the throne

  Princess Beatrice is pregnant with her second child, Buckingham Palace has announced. The 36-year-old princess, Elizabeth II's granddaughter, and husband Edoardo Mapelli Mozzi, are preparing to welcome their new child in early spring. King Charles III has been informed and both families are “delighted”, the Palace said on Tuesday. The baby will be born 11th in line to the throne, with Beatrice’s younger sister Princess Eugenie moving down to 12th place.

  The couple, who married in 2020, have a three-year-old daughter named Sienna, who was born at the Chelsea and Westminster Hospital. Mr Mapelli Mozzi has an eight-year-old son named Wolfie, from a previous relationship.

  Princess Beatrice is the eldest daughter of the Duke of York and Sarah Ferguson, Duchess of York. A statement released by the Palace read: "Her Royal Highness Princess Beatrice and Mr Edoardo Mapelli Mozzi are very pleased to announce that they are expecting their second child together early in the new year; a sibling for Wolfie and Sienna. "His Majesty The King has been informed and both families are delighted with the news." Buckingham Palace released two photos alongside the announcement, one of Beatrice and Mr Mapelli Mozzi, and one showing Mr Mapelli Mozzi alongside Wolfie and Sienna. The new baby will become the 14th great-grandchild of the late queen, and the second to be born since her death in 2022, after Beatrice's nephew, Ernest, was born last year. The happy news comes during a tough year for the royals, with the King, the Princess of Wales and Beatrice's mother Sarah, Duchess of York all being diagnosed with cancer.

  The Duchess of York posted her congratulations on social media and said: "Becoming a granny again fills my heart with so much happiness and gratitude."
