  Olivia Pratt-Korbel's mother speaks to reporters after Thomas Cashman's jailed for 42 years.

  Thomas Cashman, 34, has been jailed for 42 years for the murder of nine-year-old Olivia Pratt-Korbel in Liverpool.

  Her mother, Cheryl Korbel, has been speaking to reporters after the court hearing in Manchester.

  The judge said the murder was "chilling" and that Cashman had shown no remorse and had not acknowledged responsibility.
