title: Low Fell teen shoplifters target store with multiple thefts - BBC News
date: '2025-03-18'
section: General
url: http://www.bbc.co.uk/news/videos/c778m7r388po
content: |-
  The future of a Gateshead shop is at risk due to increasing levels of shoplifting, its owner says.

  "Brazen" shoplifters are putting the future of a shop at risk, according to its owner.

  Captured on CCTV, teenagers are seen helping themselves to alcohol in Socketts Post Office and Convenience Store in Gateshead.

  On one occasion, one of the culprits can be seen removing his face covering, seemingly to taunt staff.

  The Low Fell shop has been in business for more than 100 years, however owner Paul Banning says increasing rates of shoplifting are having a "huge impact" on its future.
