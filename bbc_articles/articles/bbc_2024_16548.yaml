title: Man charged on 'unrelated matter' after M8 crash - BBC News
date: '2024-07-25'
section: Glasgow & West Scotland
url: http://www.bbc.co.uk/news/articles/cx821vv2l71o
content: |-
  A police officer and two men remain in a critical condition after the collision in the east end of Glasgow.

  Man, 27, arrested again after M8 crash with unmarked police car

  The collision involved an unmarked police car and two other vehicles

  A man has been arrested for an "unrelated matter" after seven people, including two police officers, were injured in a serious crash on the M8 in Glasgow. The 27-year-old had previously been arrested for road traffic offences then released pending further inquiries. A Mercedes A45 collided with an unmarked police Volvo and another Mercedes on the hard shoulder, near junction 13, at about 13:10 on Wednesday. A 38-year-old police officer has been discharged from hospital, however a 48-year-old officer remains in a critical condition.

  Two men, aged 43 and 39, also remain in a critical condition, and a 33-year-old man is being treated for serious injuries. A 31-year-old man has also been discharged from hospital following treatment. The 27-year-old man was treated for minor injuries. He is being held in custody and is expected to appear at Glasgow Sheriff Court on Friday.

  The eastbound carriageway of the M8 was closed for around 12 hours to allow investigations to be carried out at the scene. The three men, aged 27, 33 and 39, had been travelling in the Mercedes A45 at the time of the collision. The 27-year-old and 39-year-old left the scene of the incident but were traced nearby a short time later. An online portal, external has been set up for people to send information directly to the investigations team. Police Scotland said the incident has also been referred to the Police Investigation & Review Commissioner as "standard procedure". Ch Supt Hilary Sloan, head of road policing, said: "Our thoughts remain with our colleagues and members of the public who were injured in this incident. "The collision occurred on a busy part of the M8 during the middle of the day. "I am appealing to anyone who saw what happened or has information, and has not already spoken to officers, to please come forward, external."
