  Power was cut from the area for several hours, affecting traffic lights and leaving dozens of businesses and homes without electricity.

  Scottish Power Energy Networks said the emergency shutdown, which affected properties in Admiral Street and the surrounding area, was requested at 08:28 by the emergency services and ended shortly before 18:00.

  The fire is the third serious blaze near the centre of Glasgow within a week. Last Monday dozens of flats in the Lancefield Quay area were evacuated and about 40 firefighters tackled a blaze in Pitt Street in the early hours of Sunday.

  Investigations into all three are ongoing. They are not being linked.
