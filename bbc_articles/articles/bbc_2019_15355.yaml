title: Disruption continues after 'challenging' Glasgow fire - BBC News
date: '2019-12-16'
section: Glasgow & West Scotland
url: http://www.bbc.co.uk/news/uk-scotland-glasgow-west-50805902
content: |-
  The blaze in the Kinning Park area of Glasgow has closed roads and "devastated" shops and restaurants.

  This video can not be played To play this video you need to enable JavaScript in your browser.

  Roads remain closed after a major blaze "devastated" shops and restaurants in Glasgow's southside.

  About 60 firefighters and 12 appliances tackled the fire in Seaward Street, in the Kinning Park area, after the alarm was raised just after 03:30.

  At the height of the fire a huge plume of smoke could be seen from across the River Clyde.

  Seaward Street was closed to traffic between Paisley Road West and the M8 eastbound off-slip to Scotland Street.

  The Scottish Fire and Rescue Service said there were no reported casualties.

  The traffic disruption hit drivers both during the morning and evening rush hours.

  Garry Mackay, area commander at the fire service, said the "challenging" fire had been contained by crews.

  BBC journalist Linda Sinclair said the roof of the large building had collapsed. There are fears the front of the building might also give way.

  The affected properties on Seaward Street include a furniture and flooring showroom, a locksmith, a function suite and a Middle Eastern restaurant.

  In a Facebook post, Modish Furnishing said: "A fire tore through the buildings on our street in Kinning Park in the early hours of this morning. Unfortunately our showroom has been devastated."

  The Dojo, a martial arts centre on Seaward Lane, is one of the buildings closed by the fire.

  Instructor Mike McCusker tweeted: "Although the Hokushin Honbu Dojo is untouched by this incident the road remains closed and we will not have access today. We should be back to normal tomorrow."

  Mr MacKay said: "This was a complex and challenging incident with significant fire spread and crews worked hard to prevent further spread to neighbouring properties.

  "We are now confident we have contained the blaze and are scaling back our response."

  He said the fire service was working with police to manage traffic.

