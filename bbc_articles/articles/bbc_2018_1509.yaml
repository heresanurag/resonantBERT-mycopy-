title: 'Taiwan quake: Residents rescued from tilted building - BBC News'
date: '2018-02-07'
section: General
url: http://www.bbc.co.uk/news/world-asia-42968489
content: |-
  Rescuers are pulling out people trapped inside a partially collapsed quake-hit building in Taiwan.

  A 6.4-magnitude earthquake in Taiwan has left many buildings in Hualien city severely damaged.

  The Yunmen Cuidi building collapsed partially and is now tilting at a dangerous angle. Rescue workers have rushed to pull out residents trapped inside.

