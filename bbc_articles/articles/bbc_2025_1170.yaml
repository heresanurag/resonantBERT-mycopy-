title: 'Michael O''Sullivan: Irish jockey dies after Thurles fall - BBC Sport'
date: '2025-02-16'
section: Horse Racing
url: http://www.bbc.co.uk/sport/horse-racing/articles/cg5yr9e42jro
content: |-
  Irish jockey Michael O'Sullivan has died aged 24 after a fall at Thurles earlier this month.

  Michael O'Sullivan was one of the rising stars of the sport

  Irish jockey Michael O'Sullivan has died after a fall during a race earlier this month. The 24-year-old had been in an induced coma in intensive care at Cork University Hospital since the incident at Thurles in the Republic of Ireland on 6 February. "Michael sadly passed away in the early hours of Sunday morning surrounded by his loving family in Cork University Hospital," said the Irish Horseracing Regulatory Board's (IHRB) chief medical officer Dr Jennifer Pugh. "We extend our appreciation to the multi-disciplinary teams who provided the best of medical care to Michael, both on the racecourse and in Cork University Hospital. "Michael's family would like to reiterate their gratefulness for all the support they have received in the last couple of days and express their appreciation to the local community and racing family. The O'Sullivan family have asked for privacy at this time."

  O'Sullivan had been riding Wee Charlie for Gerard O'Leary when he was one of three fallers at the final fence in the two-mile Racing Again February 20th Handicap Chase. He was treated on the track at Thurles before being transferred by air ambulance to hospital. The meeting was abandoned following the incident. His first win under rules came at Cork in 2018 and he turned professional in September 2022. O'Sullivan shot to prominence the following year when winning the Supreme Novices' Hurdle on the opening day of the Cheltenham Festival aboard Marine Nationale before claiming the Fred Winter later that day with Jazzy Matty, while he also became champion conditional in Ireland. He rode 95 winners in Ireland and Britain over his career, including 14 in Ireland and two in Britain this season.

  IHRB chief medical officer Pugh added: "Michael's family took the decision to donate his organs at this incredibly difficult time, but in doing so made a choice that will make a real difference to the lives of other patients and their families. "I have had the privilege of knowing Michael through his amateur and professional career and his dedication, modesty and kind nature always made him a pleasure to be around. "Michael's success and humility will have inspired many and I share the feeling of loss today with all those who knew him."

  Darragh O'Loughlin, chief executive of the IHRB, said: "Michael was an exceptionally talented young rider who was always popular in the weighroom and will be deeply missed by everyone in racing who had the pleasure of knowing him. "Our hearts go out to Michael's family, especially his parents Bernadette and William and his brother Alan, who will feel his loss most keenly." As a mark of respect, Sunday's fixture at Punchestown and the point-to-point fixtures in Ireland have been cancelled.

  O'Sullivan had enjoyed big-race success with the Willie Mullins-trained Embassy Gardens at Tramore on New Year's Day and had also finished second for Mullins on Westport Cove at Thurles on his final afternoon of racing. "It's dreadful news which puts all our problems into context. He will be much missed here and there is a real sadness here," said the trainer. "He was here two mornings a week and was very much a part of the team and his part here was only going to get bigger. He was such a natural rider who was very modest, friendly and understated. "He had a great understanding of horses and racing and given the horse, he was the man. "I think Closutton will be a much poorer place without him and we, as a family, will miss him. He will be much missed in the yard and we have his family in our thoughts and our prayers are for them now."

  Marine Nationale's trainer Barry Connell said that everyone in racing was 'stunned' by the news of O'Sullivan's death. "He was a bright, rising star as a jockey and we were lucky to have had a very close association with him," he said. "Everybody in the yard is devastated. He was such a lovely personality to have around the place, he fitted in really well. He was widely liked by his colleagues and everyone who met him. "I think everyone in racing is stunned today. "I think his legacy will be that he was an inspiration to a lot of the younger lads coming behind that somebody with the talent like his can, given the opportunities, rise to the top. I think that's a brilliant legacy for him to have."

  Twenty-time champion jockey AP McCoy: "Absolutely devastated to hear the sad news of Michael O'Sullivan's passing. A dedicated and very talented young man taken far too young. Sending my deepest condolences to his family and friends at this heartbreaking time." British jockey Harry Skelton: "Absolutely devastating news to hear Michael O'Sullivan has passed away. My thoughts are with his family, friends. "When you go through that door to race you all want to come back in it together - his peg now sits empty for all the wrong reasons. Thinking of all the Irish weighing room." Irish trainer Gordon Elliott: "Sending our deepest condolences to the family, friends and colleagues of Michael O'Sullivan. Rest in peace." Irish Jockeys Association secretary Andrew Coonan: "Jockeys face the risks of race riding every day, but it is only when a tragedy like this befalls us that those full risks are truly realised. "Michael was not only a highly talented rider but also a great friend and colleague to many in the weighroom. We are all the richer for having known him, even though his time with us was far too short." British trainer Ben Pauling: "Just the worst news to wake up to. Quite clearly a huge talent within our sport and will be sorely missed by so many. Our thoughts are with his family and friends. Fly high Michael." British champion jump jockey Harry Cobden: "Absolutely devastating news about Michael O'Sullivan. Sending my deepest condolences to his family and friends. Rest in peace." British Horseracing Authority acting chief executive Brant Dunshea: "I was devastated to learn of the death of Michael O'Sullivan and speak for all involved in British racing when I say that our thoughts and deepest condolences are with his family and friends at this awful time. "The bonds between the British and Irish racing communities are deep and this unspeakable tragedy will doubtless have a profound impact on many people on both sides of the Irish Sea." Taoiseach (Irish prime minister) Micheal Martin: "Deeply saddened to learn of the tragic death of jockey Michael O'Sullivan. A talented rider who inspired many. My sincere sympathies go to Michael's family, his friends and colleagues in the racing world."
