title: 'Migration: Conservatives plan to cap visas available to migrants - BBC News'
date: '2024-06-04'
section: Politics
url: http://www.bbc.co.uk/news/articles/cxwwxpwx7ymo
content: |-
  MPs would get an annual vote on visa numbers, under Conservative proposals.

  The number of visas available to migrants would be reduced each year under a new Conservative government, the prime minister has promised. For the first time, MPs would get a vote on annual government proposals aimed at regularly reducing numbers, which would be based on recommendations from the expert Migration Advisory Committee (MAC). Although no figures were suggested for a possible cap, Rishi Sunak said his was the only party willing to take "bold action to reduce immigration" if elected on 4 July. Labour's Yvette Cooper, shadow home secretary, pointed to net migration trebling and accused the Tories of "rehashing failed announcements".

  The announcement came as Nigel Farage announced he was returning to lead the Reform Party, with its focus on reducing immigration, which has heaped further pressure on Mr Sunak. Some Conservatives have been unhappy at immigration levels, with control over the UK's borders and reducing immigration figures seen as a key battleground between Labour and the Tories this election. With a head-to-head debate due on Tuesday where Mr Sunak will face off with Labour leader Sir Keir Starmer, the PM is trying to draw a dividing line, with this new policy forming a central plank of his manifesto. Mr Sunak said putting the decision in the hands of MPs would give voters confidence their views would be respected and reflected.

  "The plan is working but migration levels are still too high, so we are going further," he said. The PM claimed Labour would "make the UK a global magnet for illegal immigrants", suggesting they had "no plan to reduce net migration". “The Conservatives are the only party that is willing take the bold action needed to cut immigration figures,” he continued. The cap would apply to worker and family visas and would exempt temporary work routes, such as Seasonal Agricultural Workers. The MAC's remit would prioritise the economy, with explicit orders to look at the economic costs of migration, including the impact on public services, wages and productivity. Successive Tory governments have attempted to limit visas, under Theresa May, David Cameron and Rishi Sunak in last year’s Illegal Migration Act.

  Ms Cooper said: “This is a meaningless announcement from a Tory party which has trebled net migration since the last election despite promising to bring it down. “All they are doing now is rehashing failed announcements from David Cameron and Theresa May, while doing nothing to tackle the skills shortages and their failures in the economy and immigration system which have pushed net migration up." She added Labour’s plan to bring net migration down would link the immigration system with new mandatory training and workforce plans for British workers, and stop rogue employers hiring from abroad. Immigration levels last year were about three times higher than in 2019, when the Tories won the last election with a promise to slash migrant numbers, although they were lower than in 2022. More than 300,000 work visas were given in the year ending March 2024, which is more than double the number granted in 2019, according to official statistics. A new ban on international students and social care workers bringing dependent family members and a hike in the minimum salary for skilled worker visas were introduced this year. While the tightened regulations led to a huge decline in the number of health and social care visa applications in May, care providers have warned that the sector is struggling to fill tens of thousands of vacancies. Nigel Farage, who has taken over as leader of Reform UK, said "our quality of life in this country is being diminished by the population explosion". Reform have pledged to create "net zero immigration" - meaning the number entering the UK to live and work should equal the number emigrating, keeping the population stable. Mr Farage said that the UK should admit far fewer unskilled immigrants, saying: “We don’t need any - we literally don’t need any.” This would create job "shortages," Mr Farage said, which would "mean that wages would go up and we would start to encourage people to learn skills rather than heading off to university". Speaking to BBC Radio 4's today programme, Mr Farage appeared to ditch Reform’s policy to move asylum seekers to British overseas territories. He said the idea was not “terribly practical,” adding: “I took over yesterday, give me more than 12 hours and I’ll sort a few things out.”

