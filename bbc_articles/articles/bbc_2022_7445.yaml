title: Prince Charles meets Rwandan Genocide survivors - BBC News
date: '2022-06-22'
section: UK
url: http://www.bbc.co.uk/news/uk-61889895
content: |-
  The Prince of Wales and Duchess of Cornwall are in the country for a summit of Commonwealth leaders.

  The Prince of Wales and the Duchess of Cornwall laid a wreath at the Kigali Genocide Memorial, as part of their visit to Rwanda

  The Prince of Wales has met survivors and perpetrators of the Rwandan Genocide ahead of a summit of Commonwealth leaders.

  Prince Charles and the Duchess of Cornwall visited a memorial and church outside the capital Kigali where the remains of victims are buried.

  In 1994, ethnic Hutu extremists slaughtered hundreds of thousands of members of the Tutsi community.

  The trip marks the first royal visit to Rwanda.

  The Prince of Wales and the Duchess of Cornwall arrived in Rwanda on Tuesday night - one of a minority of nations the Queen has not visited.

  Prince Charles is representing the Queen, the head of the Commonwealth, at the summit of Commonwealth leaders, which was postponed in 2021 and 2020 because of the pandemic.

  He was encouraged to visit the National Genocide Memorial and museum at Gisozi by former Rwandan footballer Eric Murangwa.

  He is the founder of the organisation Football For Hope, Peace And Unity, and was sheltered from the killings by teammates. The Prince of Wales made him an MBE in recognition of his efforts raising awareness of the genocide against the Tutsi.

  The royal couple later held a meeting with Rwanda's President Paul Kagame.

  British Prime Minister Boris Johnson has confirmed that he will also travel to Rwanda to attend the summit.

  The royal couple also met Rwanda President Paul Kagame and First Lady Jeannette Kagame

  The Prince of Wales and the Duchess of Cornwall arrived in Rwanda on Tuesday night

  Prince Charles' visit comes after it was reported that the prince privately criticised the UK's plan to send asylum seekers to Rwanda.

  According to claims reported in the Times earlier this month, the heir to the throne was said to believe the policy was "appalling".

  The first flight due to take asylum seekers from the UK to Rwanda was cancelled last week, minutes before take-off, following legal rulings by Europe's human rights court.

  Prince Charles and Camilla were greeted on their arrival in Rwanda by a small group of dignitaries.

  Among those greeting the royal couple at the steps of the plane were the UK's High Commissioner to Rwanda, Omar Daair, Rwanda's High Commissioner to the UK, Johnton Busingye, special adviser Yamina Karitanyi and the prime minister's special representative on the Commonwealth, Lord Ahmad.

  Special adviser ambassador Yamina Karitanyi greeted the Prince of Wales and the Duchess of Cornwall

  Ahead of the Commonwealth Heads of Government Meeting (Chogm), Prince Charles said the partnership had the "potential" to make a difference on issues like climate change and providing opportunities for young people.

  The Commonwealth can be "an unparalleled force for good in our world", he said.

  Prince Charles last represented the Queen at Chogm in Sri Lanka in 2013, and in 2018 he was appointed the monarch's designated successor as head of the Commonwealth.

  The event is usually held in a different country every two years.
