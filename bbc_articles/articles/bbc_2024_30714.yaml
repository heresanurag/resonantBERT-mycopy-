  Photographs shared on X by club staff showed a lavish arrangement with dining tables bathed in red light and the Liverpool club crest projected on to the cathedral's inner walls. A Liverpool FC statement said: "We do not condone or tolerate the use of illegal substances at any of our sites or events. "We thank the events team at the venue for their swift action and professional response to the medical emergency which was unrelated. "'The member of staff is recovering well."

  Liverpool Cathedral is the largest cathedral in Britain and fifth largest in the world

  Liverpool Cathedral, the largest in Britain and fifth largest in the world, said it hosts such events to help keep the site open and free to enter for the public. A representative added: "During an event in the last week, an incident occurred that was not in line with our core values. "The team on duty followed the correct procedures to bring the event to an early close. "We want to thank our staff and Liverpool FC for the swift actions taken and partnership working, and will continue to review our procedures and mitigation measures for future events."
