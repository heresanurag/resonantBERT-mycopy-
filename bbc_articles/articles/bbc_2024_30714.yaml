content: |-
  Liverpool FC said it does "not tolerate the use of illegal substances" at any of its events or venues.

  Liverpool FC said it does "not tolerate" illegal substances at any of its events or venues

  A Liverpool FC staff Christmas party in the city's Anglican cathedral was shut down early amid reports that suspected drugs paraphernalia were found. The football club confirmed an "incident" had taken place on Thursday night, adding: "We do not condone or tolerate the use of illegal substances at any of our sites or events." None of the club's players or first team manager Arne Slot were in attendance at the event, which was held for non-footballing staff. The party was ended by staff at the cathedral, which said in a statement that an incident occurred "that was not in line with our values".

  The details emerged in newspaper reports, which said a search was prompted by one of the attendees suffering a "medical episode". Liverpool FC said the staff member was "recovering well" after hospital treatment and the medical incident was "unrelated" to the other concerns.

