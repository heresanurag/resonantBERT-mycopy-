title: Rare Pokémon card collection could sell for £25k - BBC News
date: '2024-05-07'
section: Nottingham
url: http://www.bbc.co.uk/news/uk-england-nottinghamshire-68945112
content: |-
  The sets include some which feature not only every card but every variant of every card.

  The cards were collected during the 1990s and 2000s

  A collection of rare Pokémon cards is expected to sell for more than £25,000 at an upcoming auction. The Japanese multi-media franchise is based around competing animals with special powers. The collection, put together by a Nottinghamshire-based enthusiast, dates from the late 1990s to the early 2000s. It includes 10 complete sets - those with every card from a set - and five master sets - those with every variant of every card.

  Auctioneer Richard Winterton said some sets were bought to secure a single card

  Auctioneer Richard Winterton said: "Some of these cards are so sought after that collectors would potentially acquire the whole set just to secure that one card. "My team of Pokémon experts highlight the Skyridge master set, the last set by Wizards Of The Coast, and one which will especially excite the Pokémon world. "We're expecting the whole total for the collection to be around £25,000 but they could far exceed this on the day." Pokémon feature in films, TV series and online gaming but Trading Card Games (TCG) have a huge following. TCG regularly sees 'expansions' - where new adventures and Pokémon are added to the existing fictional world. The master sets are from the Skyridge, Aquapolis, Expedition, Legendary Collection and EX Ruby & Sapphire expansions. Complete sets come from the Neo Destiny, Neo Revelation, Neo Discovery, Neo Genesis, Gym Challenge, Gym Heroes, Team Rocket, Base Set 2, Fossil and Jungle expansions. The collection goes under the hammer in Richard Winterton Auctioneers' Antiques & Home Sale on 7 May at The Lichfield Auction Centre, Staffordshire.

