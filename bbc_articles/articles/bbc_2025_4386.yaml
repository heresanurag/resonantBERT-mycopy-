  Soon after she was sworn in, McMahon sent the department's 4,400 employees a memo titled "Our Department's Final Mission", a possible reference to Trump's aim to close it. "This is our opportunity to perform one final, unforgettable public service to future generations of students," she wrote. "I hope you will join me in ensuring that when our final mission is complete; we will be able to say that we left American education freer, stronger, and with more hope for the future." Earlier reports suggested Trump would look to end some of the department's programmes and send others to different departments, such as the Treasury, something that still may happen but wasn't made clear in his executive order. America's largest teachers' union recently decried Trump's plans, saying he "doesn't care about opportunity for all kids". In its statement, the American Federation of Teachers said: "No-one likes bureaucracy, and everyone's in favour of more efficiency, so let's find ways to accomplish that. "But don't use a 'war on woke' to attack the children living in poverty and the children with disabilities." For more than 40 years, conservatives have complained about the department and floated ideas to abolish it. Just two years after it was established by Democratic President Jimmy Carter, his Republican replacement, Ronald Reagan, led calls to undo it. It is the smallest agency in the president's cabinet and takes up less than 2% of the total federal budget. Some of those staff have already been affected by the Trump administration's sweeping workforce cuts, led by the Department of Government Efficiency (Doge). Nearly 2,100 people at the agency are set to be placed on leave from Friday. Efforts by Doge to slash federal spending and radically restructure - or simply abolish - many government agencies have been overseen by tech billionaire Elon Musk.
