  One dead and six taken to hospital after car crash

  Emergency services were called to the crash at a set of crossroads between St Tudy and St Breward

  A man has died and six people have been injured after a late night car crash. Emergency services were called to reports of a collision involving two black Seat Ibizas at a set of crossroads between St Tudy and St Breward in Cornwall at about 23:15 GMT on Friday. A 19-year-old man, who was a front seat passenger in one of the cars, was pronounced dead at the scene, with six other people taken to hospital with minor injuries. An 18-year-old man, from Bodmin, has been arrested on suspicion of causing death by dangerous driving and causing death by careless driving while unfit through drink or drugs. He has been released on bail, pending further inquiries.

  Officers from Devon and Cornwall Police's roads policing team carried out at an investigation at the scene and are appealing for any witnesses who may have seen the collision, or have dashcam footage, to contact the force.
