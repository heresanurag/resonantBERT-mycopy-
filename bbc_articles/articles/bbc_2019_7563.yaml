  Paul Smyth was found dead in the living room of his house in Lisburn on Friday.

  Paul Smyth was found dead in the living room of his house in Coulson Avenue on Friday

  Detectives investigating the murder of Paul Smyth in Lisburn have confirmed that he was shot.

  Mr Smyth, 50, was found dead in the living room of his house in Coulson Avenue at about 20:45 BST on Friday.

  A 49-year-old man, arrested on suspicion of murder on Saturday, has been released unconditionally.

  Two men, aged 28 and 32, and a 28-year-old woman have been released on bail pending further enquiries.

  Police carried out two searches and items were taken away for examination. They have appealed for information.
