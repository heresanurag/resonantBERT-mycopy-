id: bbc_2017_12679
title: Pontiac Silverdome stadium fails to implode near Detroit - BBC News
date: '2017-12-03'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-42216297
content: |-
  Detroit's Pontiac Silverdome stadium is still standing after Sunday's planned demolition didn't go to plan.

  The planned partial-demolition of the Pontiac Silverdome stadium near Detroit has failed.

  The stadium, once home to the Detroit Lions NFL team, has been empty for a decade.

  Its staged demolition was due to begin with an implosion on Sunday, but while footage showed plumes of smoke rising, the building remained standing.

  Local media quoted officials as saying the stadium was "built a little too well".
