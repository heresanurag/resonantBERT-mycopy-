title: Lightning and heavy rain temporarily stop Germany v Denmark Euro 2024 game
  - BBC Sport
date: '2024-06-29'
section: European Championship
url: http://www.bbc.co.uk/sport/football/articles/cyj4d2010rro
content: |-
  The Euro 2024 last-16 game between Germany and Denmark at Dortmund's Westfalenstadion is suspended because of a major thunderstorm.

  The Euro 2024 last-16 game between Germany and Denmark at Dortmund's Westfalenstadion was temporarily suspended because of adverse conditions during a huge thunderstorm.

  Referee Michael Oliver halted play at 0-0 in the 36th minute, with the players leaving the pitch as lightning flashed in the sky.

  Heavy rain then drenched the pitch, with water cascading down one corner of the stadium roof close to the Denmark supporters.

  "Due to adverse weather conditions, the match has been suspended. Further information will follow shortly," a notice on the stadium screens read.

  The match was suspended for about 25 minutes before continuing and people gathered in the city's fan zones were evacuated.

  Police said public viewing in the Peace Square and Westfalenpark areas of Dortmund had been cancelled.
