title: 'Sara Sharif: Vigil held in Woking to remember ''shining star'' - BBC News'
date: '2024-12-16'
section: Surrey
url: http://www.bbc.co.uk/news/articles/ce90x40r327o
content: |-
  A representative of the local mosque says Sara's death is "heartbreaking".

  Candles were lit and tributes were laid at the vigil

  Hundreds of people have attended a vigil held for 10-year-old Sara Sharif who was murdered by her father and stepmother. The vigil, held in Woking, Surrey, on Sunday, aimed to remember Sara for the "shining star" she was, according to one organiser. Sara's father, Urfan Sharif, 43, and stepmother, Beinash Batool, 30, were found guilty of her murder after an eight-week trial at the Old Bailey. Her uncle, Faisal Malik, 29, was convicted of causing or allowing a child's death. Sentencing is expected to take place on Tuesday.

  A vigil was held in Woking to remember Sara Sharif

  Kawther Hashmi, representing the Shah Jahan Mosque in Woking, told BBC Radio Surrey at the vigil: "It's just heartbreaking that something like this could happen on our doorstep." She said emotions had been high throughout the trial and that the evening's vigil, which included a two-minute silence, was particularly poignant. Sara was hooded, burned and beaten during a campaign of abuse before her body was found with dozens of injuries at the family's home in last year. There have been calls for answers from Prime Minister Sir Keir Starmer, and the Children's commissioner Dame Rachel de Souza said Sara's murder highlighted "profound weaknesses in our child protection system". Ms Hashmi said: "No child should have to suffer in silence like Sara did."

  Woking's MP Will Forster said hundreds of people were at the vigil, adding that the focus had previously been on the trial and on what must happen next. He said: "Tonight was about one 10-year-old girl who had her life taken away from her and it was very much focused on her. "I think that's completely right and very moving." One of the vigil organisers, Ikram, said: "As a community we are feeling very helpless, just [want] to come together and think of the shining star Sara for the beautiful little girl she was, and is, and may she remain, shining bright forever."

  The Woking MP said hundreds of people had attended

