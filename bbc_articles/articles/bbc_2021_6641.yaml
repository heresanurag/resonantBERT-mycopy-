content: |-
  But the PM plays down suggestions the government might relax travel quarantine for the double-jabbed.

  Rachel Godiff has to cancel her honeymoon in Edinburgh after Scotland imposed travel restrictions Image caption: Rachel Godiff has to cancel her honeymoon in Edinburgh after Scotland imposed travel restrictions

  In his criticism of Scottish First Minister Nicola Sturgeon's ban on travel to and from Manchester and Salford, Mayor Andy Burnham stressed the impact on individuals in the region.

  One of them is Rachel Godiff, from Salford, who had previously cancelled her honeymoon in Greece due to travel restrictions and now has to cancel her alternative plans in Edinburgh.

  The bride-to-be, 31, tells BBC Radio Manchester: "We are getting married in Salford on Saturday and we have nowhere to go.

  "It's just one thing after another. It feels like nothing is going to plan.

  "Everything we want to do is being changed. We were really excited about it and then suddenly find out we are not able to go."

  She says it seems unfair, especially when she has had both vaccine doses and her partner has had his first.
