title: 'The Mall blaze: Walthamstow shopping centre ''extensively damaged'' - BBC
  News'
date: '2019-07-22'
section: London
url: http://www.bbc.co.uk/news/uk-england-london-49069512
content: |-
  One woman was taken to hospital after the fire broke out at The Mall in Walthamstow, east London.

  This video can not be played To play this video you need to enable JavaScript in your browser. The Mall shopping centre has 66 stores on one level and restaurants on another level

  Firefighters spent more than four hours tackling a blaze that has left an east London shopping centre badly damaged.

  One woman was taken to hospital after the fire broke out at the Mall shopping centre in Selborne Road, Walthamstow.

  Up to 150 firefighters were sent to the scene of the fire, which police declared a "major incident" after it broke out at 07:40 BST.

  London Fire Brigade (LFB) said the fire - which is under investigation - was brought under control by about 12:15.

  Firefighters remain at the scene "damping down" and people have been told to continue avoiding the area.

  Smoke could be seen rising from the Mall in footage recorded in Canary Wharf

  Sabrina said her store was "gone"

  A manager of one of the shops in the Mall, who only gave her name as Sabrina, told BBC Radio London: "I can see my store is already on fire, it's gone.

  "So there's nothing for me to go back to. I'm really upset."

