title: Australian police find 'up to' five bodies in a house in Perth - BBC News
date: '2018-09-09'
section: Australia
url: http://www.bbc.co.uk/news/world-australia-45463799
content: |-
  Police say a man led them to the address in a Perth suburb, where dead women and children were found.

  Up to five bodies have been found in a house in suburb of Perth, according to police in Western Australia.

  The dead include women and children. Assistant commissioner Paul Steele said the incident was "tragic" but that there were no ongoing safety concerns.

  He said officers made the discovery on Coode Street in Bedford after a man attended a regional police station.

  The man, who is in his 20s, is in custody. It is not yet known if the victims were related.

