  Strictly has been at the centre of controversy after complaints about Pernice as well as Di Prima. On Tuesday, TV star Zara McDermott, who was partnered with Di Prima last year, said she was involved in incidents in the Strictly training room that she now finds "incredibly distressing" to watch back. Di Prima's spokesman Mark Borkowski said the news agenda has focused on an isolated incident the dancer deeply regrets and has apologised for. "There is never a time when kicking, or any sense of that is right," Mr Borkowski told BBC News. "And he knows that." But McDermott's spokesman said on Thursday: "Zara has already confirmed in a statement released on her social media earlier this week that the reported conduct was not a singular incident." Both Pernice and Di Prima have been left out of this year's Strictly line-up.

  Broadcaster Rev Richard Coles, who appeared on the show in 2017, told BBC Breakfast he was "not surprised" by the revelations. "At the heart of the Strictly experience is this intense relationship you have with your dancer, and much of that [happens] unobserved," he said. "It gets very intimate, and it gets very physical in ways which I think sometimes surprise people." Like Rihanoff, he welcomed the move to introduce chaperones. "I think that's good for contestants. I also think it's good for dancers," he said. Hosting Good Morning Britain on Thursday, TV presenter Richard Madeley stated that people he knows who are involved in the show "all talk about these issues, and they say that they have all known about them for years and years and years". He added that "the lid has been kept on it but now the lid is coming off".

  Talent agent Sue Ayton, who represents celebrities like Angela Rippon, who appeared on last year's series, said the BBC's duty of care measures had been "exemplary". However, she told BBC Radio 4's Media Show both she and Rippon understood "the relentless training, the hard work. So we went into it with our eyes wide open. We've both worked with dancers, we know how hard it is. "We know, in a short period, they've got to turn people into, for all intents and purposes, professional dancers in a very short time." Former BBC One controller Lorraine Heggessey, who commissioned Strictly, told BBC Radio 4's Today programme it was "very sad" that "clearly a line has been crossed". "But I think what's important is that the BBC is dealing with it swiftly, and putting in place measures to make sure that these things don't happen again." The allegations have cast a shadow over the series in its 20th anniversary year, with the celebrity line-up for this year's series expected to be revealed in the coming weeks. "I think Strictly can get over this," Heggessey said. "I think we should hang on to all the positives, address the issue and move on." In a statement, Kate Phillips, BBC’s Director of Unscripted, said: "Whilst we know our shows have been positive experiences for the vast majority of those who have taken part, if issues are raised with us, or we’re made aware of inappropriate behaviour, we will always take that seriously and act. "Concerns that have arisen have been fundamentally related to training and rehearsals. The decisive steps we have taken and are announced today, act to further strengthen the welfare and support in place for everyone involved with this production."

