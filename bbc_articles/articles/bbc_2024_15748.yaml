title: 'Strictly: Life inside rehearsals amid Zara McDermott and Graziano Di Prima
  fallout - BBC News'
date: '2024-07-19'
section: Culture
url: http://www.bbc.co.uk/news/articles/c720lwkr18wo
content: |-
  Kristina Rihanoff thinks stars will feel 'more comfortable' after the BBC introduced new welfare measures.

  Rihanoff said the new measures were "better now than never"

  Former Strictly Come Dancing professional Kristina Rihanoff has welcomed the BBC's decision to give stars chaperones during rehearsals, after complaints about two fellow dancers on the show. Speaking to BBC News, she said she thought celebrities would now "be feeling a little bit more comfortable" to sign up to the show. Rehearsals were often "frustrating" and "pressurised," she said, adding that celebrities would feel "at ease that there will be somebody watching and observing the situations". Strictly has been hit by a string of damaging allegations concerning former dancers Giovanni Pernice and Graziano Di Prima. Pernice has denied "any suggestion of abusive or threatening behaviour". On Thursday, Di Prima's spokesman admitted he made a "mistake" by kicking celebrity partner Zara McDermott once during rehearsals.

  Earlier this week, as more revelations came to light, the BBC announced it would put a member of the Strictly production staff in all future rehearsals, and that there would also be two new dedicated welfare producers. It insisted it would always take any issues seriously and act when made aware of inappropriate behaviour.

  Rihanoff, who was on the show between 2008-15, said the new measures were "better now than never". Cameras were "the answer to everything, really, because it's there and you can't get away from that". During her time on the show, Rihanoff was partnered up with celebrities including the political broadcaster and author John Sergeant, boxer Joe Calzaghe, Blue singer Simon Webbe, Australian actor and singer Jason Donovan and rugby player Ben Cohen. Reflecting on her time on Strictly, she described it as "wonderful" but also "a challenge". Rehearsals were exhausting, and dancing partners sometimes needed to "walk away from each other" in frustrating moments, she said. The pressure ramped up the closer couples got to the finals, she said.

  Kristina Rihanoff, seen here with Jason Donovan dancing the Samba in 2011

  "You have to learn several different dances and you're already exhausted and your celebrity partner is exhausted, and you just feel the heat," Rihanoff said. "It's a really, really pressurised environment and a lot of dancers struggle with mental health." She said she thought it needed to be explained to celebrities that the show was "not a walk in the park". But she added that there was "never an excuse for violence". "We all feel frustrated," she said. "It's a normal feeling, we can't deny we have them, but it's how you deal with that frustration. "You shouldn’t really get onto your celebrity. You can just say, OK, let's take a moment. Let's walk away from each other, have a cup of tea, and just restart in a couple of minutes." She added that dancers needed to "remain professional" as they prepared celebrities for their Saturday night performances.

