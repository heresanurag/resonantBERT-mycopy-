title: 'Paris 2024: Katie Ledecky makes US Olympic history, Leon Marchand reaches
  another final - BBC Sport'
date: '2024-08-02'
section: Olympic Games
url: http://www.bbc.co.uk/sport/olympics/articles/cd1xwd8742ko
content: |-
  Katie Ledecky becomes the United States' most decorated female Olympian as Great Britain's women finish fifth in the 4x200m freestyle relay - and France's Leon Marchand reaches yet another final.

  Katie Ledecky (right) has won a gold, silver and bronze in Paris so far

  Katie Ledecky became the United States' most decorated female Olympian and France's Leon Marchand reached yet another final on a boisterous night of swimming in Paris. The USA - with Ledecky swimming the third leg - claimed silver in the women's 4x200m relay in seven minutes 40.86 seconds at La Defense Arena. It takes Ledecky's Olympic tally to 13 medals - eight golds, four silvers and one bronze. The 27-year-old retained her 1500m freestyle title with impressive ease on Wednesday. She also took 400m freestyle bronze and on Saturday will bid to secure yet another gold in the 800m freestyle. Australia set an Olympic record to take gold in 7:38.08, with China third with 7:42.34. Great Britain's women finished fifth, with the quartet of Freya Colbert, Abbie Wood, Freya Anderson and Lucy Hope clocking 7:48.23.

