content: |-
  Bashar al-Assad's regime is gone, but it remains unclear what Syria's new order will eventually look like, writes Lyse Doucet.

  HTS leader not only player in Syria's fast-changing future

  "They arrived here worried about the Islamists," is how one source described the mood of Arab foreign ministers who flew into Doha on Saturday evening for urgent talks aimed at averting a collapse into chaos and bloodshed in Damascus. Within hours, the powerful Islamist group driving the rebels' rise to power reported they had reached the centre of the Syrian capital. The leader of Hayat Tahrir-al Shams, Abu Mohammad al-Jolani, triumphantly announced "the capture of Damascus". Now he's using his real name, Ahmed al-Sharaa, rather than his nom de guerre as a sign of his sudden rise to a much greater national role. He's certain to play a decisive part in defining Syria's new order after this sudden stunning end to a half century of repressive rule by the Assad family. But the leader of an organisation proscribed by the UN as well as western governments is not the only pivotal player on Syria's fast shifting scene.

  "The story is not written yet," cautions Marie Forestier, senior Syria advisor for the European Institute of Peace. She, and other informed observers who happened to be attending the annual Doha Forum, point out that it was another rebel group, recently named as the Southern Operations room, working with people living in the city, who surged into the capital. The ranks of this force are dominated by fighters from the former Free Syrian Army (FSA), who worked closely with western powers at the start of Syria's 2011 uprising, "The game starts now," is how Ms Forestier describes the start of this momentous new chapter marked by an explosion of celebration in the streets, but also critical questions about what emerges next. As the Islamist Hayat Tahrir-al Shams (HTS) pushed forward with astonishing speed, facing scant resistance, it sparked a rush by rebel forces in other regions of Syria as well as a surge of armed local groups keen to play a part in their own areas. "Fighting the Assad regime was the glue that kept this de facto coalition together", says Thomas Juneau, Middle East expert at the University of Ottawa's Graduate School of Public and International Affairs, who is also in Doha. "Now that Assad has fled, continued unity among the groups that toppled him will be a challenge," he says. The groups include an umbrella alliance of Turkish-backed militias known as the Syrian National Army who, like the HTS, dominated a corner of northwest Syria. In the northeast, the mainly Kurdish Syrian Democratic Forces (SDF) groups have also gained ground and will be determined to hold on to their gains. But HTS's ambitious high-profile leader has seized the spotlight. His rhetoric and record are now under scrutiny by Syrians, as well as in neighbouring capitals, and far beyond. The commander whose militia first emerged as an Al-Qaeda affiliate broke ranks with the jihadist group in 2016 and has been trying to polish his image since then. For years, he's sent conciliatory messages abroad; now he is reassuring Syria's many minority communities they have nothing to worry about.

  HTS leader al-Jolani has been polishing his image since breaking ranks with Al-Qaeda in 2016

  "There is a cautious welcome to his messages," maintains Ms Forestier. "But we cannot forget the past eight years of his authoritarian rule and his background." The rule of HTS, both a political and paramilitary organisation, in the conservative province of Idlib was marked by the establishment of a working administration called the Salvation Government, which included limited freedom of religion, but was also marked by repressive measures. In Syria's second city of Aleppo, the first urban area seized by HTS in its lightning advance, its fighters have been trying to prove they are fit to rule. The group has also been sending reassuring messages to countries like Iraq that the war would not spill across their borders. Other neighbours, including Jordan, worry that Islamist successes next door could galvanise disgruntled militant groups within their borders. Turkey, certain to play a key role, has its own worries. It regards the SDF as a terrorist group linked to Turkey's proscribed PKK Kurdish group and will not hesitate to intervene militarily and politically, as its done for years, if its own interests are threatened.

  In the hours after the regime fell, the mood on Damascus streets was jubilant

  Russia's foreign minister, Sergei Lavrov, had told the Doha Forum on Saturday that it was "inadmissible" that a group he called terrorists, a clear reference to HTS, could take control in Syria. By the evening, the UN's Special Envoy for Syria, Geir Pederson, told me there was a "new understanding of a new reality." Regional foreign ministers, including President Assad's former staunch allies Iran and Russia, left wrong-footed by this spectacular turn of events, are still calling for efforts to forge an inclusive political process. That's echoed by Mr Pedersen. "This dark chapter has left deep scars, but today we look forward with cautious hope to the opening of a new one—one of peace, reconciliation, dignity, and inclusion for all Syrians", he said after his meetings here in Doha, where halls packed with senior diplomats, scholars, and officials from the world over are buzzing with the latest news from Syria. Many observers here seem reluctant to draw quick conclusions about what kind of rule will emerge in a country known for its diversity of Christian and Muslim sects. "I don't want to go down that line of thinking yet," said one Western diplomat asked about any concerns regarding a harsh Islamist-dominated order. "We're just getting started with HTS, who have led a bloodless coup." Juneau agrees. "For now, it is good to simply appreciate the truly historical collapse of one of the most brutal regimes of the past decades," he said.
