  Sir Keir Starmer has faced concerns from Labour backbenchers who have expressed anger at proposals.

  Charities and MPs warn Starmer over benefits changes

  Sir Keir Starmer is facing continued pressure from MPs and charities, as the government prepares to announce changes to the welfare system this week. The government will outline plans to reduce spending on health benefits on Tuesday, but is facing accusations vulnerable people could lose out. Ministers are looking at tightening criteria to qualify for Personal Independence Payments (PIP), one of the key disability benefits, but have abandoned plans for a one-year freeze to PIP payments, after disquiet from MPs. But while ministers insist changes are necessary, there is significant unease among Labour MPs about the cuts, spreading beyond Sir Keir's usual internal opponents.

  More than 3.6 million people currently claim PIP - which is designed to help compensate those with disabilities and long-term health conditions for higher living costs such as the purchase of a wheelchair or having to take more taxis to get around. It had been initially reported that the government would consider not increasing PIP payments in line with inflation for a year. But that idea could be withdrawn after many usually loyal Labour MPs voiced strong opposition. MPs were invited into Downing Street for briefings last week, so the government's thinking could be conveyed to backbenchers. After attending a private meeting of Labour MPs last week, one MP told the BBC that freezing PIP would be "unforgivable". "Some people have very complex disabilities. Part of the social contract is they are supported," they said. Another MP, a usual supporter of the prime minister, told the BBC: "Most of us broadly agree that there are lots of people who don't work but should, and have no problem with getting them into work. "But punishing those who are especially vulnerable and have severe disabilities is unacceptable." Backbenchers have also expressed frustration at a lack of communication from ministers. But on Monday, Treasury Minister Emma Reynolds asked Labour MPs to wait for the official announcement, adding: "Some colleagues are jumping to conclusions about our plans before they've heard them. "We'll set out further details, but the severely disabled and the most vulnerable will always get support, and there will always be a safety net," she told BBC Radio 4's Today programme. And support has come from sections of the party, such as the Get Britain Working group of Labour MPs, who said the government has a "moral duty" to help long-term sick and disabled people to work if they can.

  The reason reform of the benefits system is being announced now is because the cuts form part of the Spring Statement on 26 March. Initially this was expected to be a pared-back parliamentary moment with Rachel Reeves only required to formally acknowledge new economic forecasts produced by the Office for Budget Responsibility (OBR). Over recent weeks, however, it has become clear that the OBR has told Rachel Reeves that the £9.9bn "headroom" she had at the time of her October Budget has since been wiped out by the rising cost of government borrowing – requiring savings. This was the buffer Reeves had against meeting her own borrowing rules. There are some Labour MPs, including ministers, who believe that instead of responding by pursuing severe spending cuts, Reeves and Sir Keir should consider changing those rules so that the government can borrow more money, or increasing tax. On the Today programme, veteran Labour MP Diane Abbott echoed calls from others on the left of the party for additional taxation of wealth. Reeves' allies, though, argue that further tax or borrowing would spook the financial markets and result in the cost of borrowing going up even further. On tax, the chancellor is constrained by commitments Labour made during the general election not to increase income tax or VAT.

  The government is facing a towering disability welfare bill. Total spending on health and disability benefits is forecast to rise from £64.7bn in 2023-24 to £100.7bn in 2029-30. The biggest contributor to this would be from welfare spending on working-age adults, according to the Office for Budget Responsibility. PIP is the second-largest element of the working-age welfare bill, with spending on this projected to almost double to £34bn by 2029-30. And claimant numbers, for PIP and Universal Credit payments, have increased significantly in the four years since the pandemic- about 37% over the past four years. There are now about 4 million people getting at least one of the disability benefits - about 10% of the working age population, said Tom Waters from the Institute of Fiscal Studies. Just under half of these claim for mental health problems, said the analyst, adding that "a majority of the increase" was from people claiming mental and behavioural problems as their main condition.

  During his appearance on the BBC's Sunday with Laura Kuenssberg programme, Health Secretary Wes Streeting was asked if he agreed with experts that warn of an overdiagnosis of mental health conditions. The health secretary said he wanted to "follow the evidence and I agree with that point about overdiagnosis". "Here's the other thing, mental wellbeing, illness, it's a spectrum and I think definitely there's an overdiagnosis but there's too many people being written off," he said. The health secretary's comments prompted the mental health charity Mind to warn it was important to be "extremely careful" with the language around diagnoses to avoid stigmatising people. Streeting also said the government "wants to support people who need help the most, and we've got to make sure that there is a wide range of support and that everyone's playing their part."

  Shadow Education Secretary Laura Trott accused the government of being "all over the place and divided" over welfare reform. When asked if the Conservatives would back the welfare changes, she said her party supported the "principle of welfare reform" but "we're not clear on the plan". The SNP has urged the prime minister to scrap the "cuts to disabled people". The party's Westminster leader Stephen Flynn said the Labour government had "boxed itself in with its Tory austerity rules" on public spending.

  Speaking to BBC Radio 4's Westminster Hour, the chief executive of charity Citizen's Advice said the government was "pulling the quick and easy lever" by taking "money out of the system". Dame Clare Moriarty also accused the government of "not having done all the work to make sure that people can actually be supported into work". Writing in the Times, external on Monday, Greater Manchester mayor Andy Burnham said he recognised the need for reform of the system, but urged "caution" on benefit changes. He said: "It would trap too many people in poverty. And to be clear: there is no case in any scenario for cutting the support available to disabled people who are unable to work."

