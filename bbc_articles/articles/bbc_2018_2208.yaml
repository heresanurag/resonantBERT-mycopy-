title: Rio Carnival's last dance? - BBC News
date: '2018-02-09'
section: General
url: http://www.bbc.co.uk/news/world-latin-america-42998269
content: |-
  Why there are fears funding cuts could take the shine off Brazil's world famous festival.

  Rio de Janeiro's samba schools are worried about the future of the city's famous carnival amid funding cuts.

  The city's mayor has said he will use the money saved to pay for children's meals at public day-care centres.
