title: Lottery win means couple can marry after 30-year engagement - BBC News
date: '2017-12-03'
section: General
url: http://www.bbc.co.uk/news/uk-england-essex-42207620
content: |-
  A £1m Lotto win not only saved a couple's house, it allowed them to get married.

  A couple who have been engaged for 30 years can finally marry after a £1m lottery win.

  Tony Pearce, 66, and Deb Gellatly, 58, from Southend, have never been able to afford the cost of a wedding.

  The Lotto raffle prize means they can clear their debts and finally get married.
