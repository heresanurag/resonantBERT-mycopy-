title: 'Bronson Battersby: Boy found with dead father died of dehydration - BBC News'
date: '2024-06-07'
section: Lincolnshire
url: http://www.bbc.co.uk/news/articles/crgge4d724qo
content: |-
  The two-year-old was found between the legs of his 60-year-old father.

  Bronson Battersby was found dead between the legs of his father, Kenneth Battersby

  A two-year-old boy who was discovered with his dead father died from dehydration, an inquest has heard. Bronson Battersby was found between the legs of 60-year-old Kenneth Battersby at a property in Prince Alfred Avenue, Skegness, on 9 January. The inquest opening took place at Myle Cross Centre in Lincoln, where coroner Paul Smith heard Bronson "appeared to be quite malnourished". Mr Smith described the investigation as "thorough and sensitive" and adjourned the hearing until 10 December.

  Det Insp Claire Rimmer, based in Boston, told the inquest that police received a call from a neighbour at 15:25 GMT on 9 January after they noticed a smell coming from the flat. A social worker then attempted to gain access to the property with help from the landlady at 16:19. They were unable to push the living room door as Mr Battersby's body was blocking it from the other side. A malnourished dog was also found locked in the kitchen and was still alive. At 16:31, police then received a call from paramedics to confirm the death of a 60-year-old man and two-year-old boy.

  A rapid review was launched following the discovery of their bodies. At the time, it was revealed the family was known to children's services and the local authority confirmed a social worker "had contact" with Mr Battersby on 27 December and had arranged a home visit for 2 January. But when that appointment was missed the police were contacted, the social worker also tried to make contact on 4 January and followed it up again five days later.
  • None 27 December 2023: A social worker "has contact" with Mr Battersby and a home visit is arranged.
  • None 2 January 2024: The social worker arrives at the property but there is no response at the door. She tries to locate Bronson at other addresses and unable to find him, speaks to her manager and the police.
  • None 4 January: A second attempt at a home visit is made. Again, there is no response. The social worker informs police.
  • None 9 January: A third attempt is made and the social worker alerts Mr Battersby's landlady. Entry is gained and the bodies of both father and son are found.
  • None 15 January: LCC notifies the Child Safeguarding Practice Review Panel (CSPRP) of a serious incident that meets the criteria for rapid review.
  • None 17 January: LCC confirms a review is under way and Lincolnshire Police says it has referred itself to the IOPC.
