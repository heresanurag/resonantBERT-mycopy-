title: Pope absent from St Peter's Square for third week running - BBC News
date: '2025-03-03'
section: Europe
url: http://www.bbc.co.uk/news/articles/c2kgqdkx9jxo
content: |-
  Pope Francis is unable to deliver his traditional Angelus prayer in person, with the Vatican publishing a text.

  Pope absent from St Peter's Square for third week

  Rome's Gemelli hospital, where the Pope is receiving treatment, has a mural depicting him

  For the third week in a row, Pope Francis has been unable to deliver his traditional Angelus prayer in person, with the Vatican publishing his written comments instead. Vatican officials said the text, sent from his hospital room in Rome, had been written "in the past few days". In it, the Pope thanked people for their prayers and thanked his medical team for their care. "I feel in my heart the 'blessing' that is hidden within frailty, because it is precisely in these moments that we learn even more to trust in the Lord," he wrote. "At the same time, I thank God for giving me the opportunity to share in body and spirit the condition of so many sick and suffering people."

  The Pope usually makes his address from a window of the official Vatican appartments, drawing a crowd below on St Peter's Square. Many Catholics come specially for the chance to see him but this is now the longest Pope Francis has been out of the public eye since he was elected. Each evening on the square, a group of cardinals lead people in prayers for his health. In his latest written address, the Pope told Catholics that he felt their "affection and closeness" and felt "carried and supported by all God's people". The Vatican said he remained stable on Sunday, although doctors still describe his overall condition - with pneumonia - as "complex" and the risk of another infection is high. After 16 days in hospital, they are still giving no prognosis. The medical team has not spoken directly to journalists for over a week, and all updates are coming via Vatican officials. On Sunday, they said the Pope no longer required "non-invasive mechanical ventilation, only high-flow oxygen therapy". He does not have a fever and was able to participate in mass in a chapel on the 10th floor of Rome's Gemelli hospital where he is being treated.
  • None In pictures: Prayers for the Pope around the world The Pope also received two visitors - Vatican Secretary of State Cardinal Parolin and his deputy Monsignor Pena Parra. They are the first to be mentioned by the Vatican in almost a week. There are no details about the length of time the men spent with him or what was discussed. The latest details do suggest that the Pope has rallied somewhat since Friday, when he suffered a second breathing "crisis" which doctors had worried might have a lasting impact. It was the second time the word "crisis" had been used since he was admitted to hospital on 14 February. By Sunday, though, Vatican sources were more reassuring. "The Pope woke, had breakfast with coffee, continued his therapy and read the newspapers as he usually does," they told journalists. In his Sunday Angelus, the Pope prayed for peace, including in "tormented Ukraine, Palestine, Israel", adding: "From here, war appears even more absurd." Always outspoken against war, some of the Pope's previous comments on Ukraine have nevertheless created controversy. He suggested that Russia's full-scale invasion was "somehow provoked" and on one occasion agreed that Kyiv should show "the courage of the white flag" and negotiate for peace.
