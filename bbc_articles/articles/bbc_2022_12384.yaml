title: Last mourners file past as lying-in-state ends - BBC News
date: '2022-09-19'
section: General
url: http://www.bbc.co.uk/news/uk-62928805
content: |-
  After almost five days, the Queen's lying-in-state ended on the morning of Monday 19 September.

  With the last of the members of the public being admitted to Westminster Hall, the doors closed at 0630 in preparation for the procession to Westminster Abbey where the state funeral service will take place.

  After seven decades of constancy, a door swings shut
