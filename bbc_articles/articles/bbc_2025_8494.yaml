  A warning was issued to pet owners after increased sightings of the venomous snake.

  A warning has been issued after increased sightings of the UK's only venomous snake.

  Hiker Lorraine Flower captured this footage of a large adder while out walking on the Blorenge mountain, near Abergavenny, Monmouthshire, on Wednesday morning.

  The sighting comes two days after South Wales Police issued a warning following increased sightings of adders in Port Eynon and near Worm's Head in Gower, Swansea, urging dog owners to keep their pets on leads.

  Adders are most active from spring to October and pose a particular risk to dogs between April and July.
