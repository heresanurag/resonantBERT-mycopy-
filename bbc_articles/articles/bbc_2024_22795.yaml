title: 'Manchester City 2-2 Arsenal: ''Streetwise Arsenal show they are the real deal
  in Man City draw'' - BBC Sport'
date: '2024-09-22'
section: Premier League
url: http://www.bbc.co.uk/sport/football/articles/c7v6z73973qo
content: |-
  Streetwise Arsenal show they are the real deal despite being denied a famous win at Etihad Stadium, says chief football writer Phil McNulty.

  Arsenal were left desperately disappointed as John Stones' 97th-minute equaliser denied them a famous victory at Manchester City

  Arsenal manager Mikel Arteta and his players could not hide their pain in the pouring Mancunian rain as a statement win they would rate higher than any other was snatched away at the death. The clock read 97 minutes and 14 seconds – those 14 seconds crucial to the chaotic conclusion – when John Stones rewarded Manchester City’s increasingly desperate efforts with an equaliser. City manager Pep Guardiola led celebrations that smacked of victory rather than a point claimed at the last, this in itself a testimony to the tortuous experience this increasingly mature and steely Arsenal put them through. Arsenal were heartbroken but when the bitter disappointment disperses they can look back on this brilliantly organised and brave performance, laced, it must be said, with high levels of gamesmanship, as further compelling evidence that they are the real deal. This was billed as the clash of the Premier League heavyweights, the opportunity to inflict early psychological blows with City and Arsenal primed for a title race to the finish. For once, the hype and high expectations were justified, with even the weather obliging with biblical conditions and black clouds overhead that set a mood of foreboding.

