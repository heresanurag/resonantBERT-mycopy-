  It is a measure of Arsenal’s defensive discipline that they could spend so much time without the ball against a side of City’s quality and survive for so long, although not quite long enough. They retreated into their area but such was their organisation, courage, numbers and willingness to throw themselves in front of anything, that seconds ticked down to what would have been their first victory here since January 2015 and Guardiola's first home loss in the league since Brentford won in November 2022. The champions got their goal - but only just. City managed only one shot on target against Arsenal in March’s goalless draw at the Etihad. Plenty more came in here but keeper David Raya confirmed his growing stature and importance with confident command of his area and an ability to use all parts of his anatomy. Arteta was rightly proud amid the pain, insisting his side had performed "a miracle" in holding out for so long. "Absolutely I am proud," he said. "The way the players performed in normal conditions was excellent. "It was difficult, which is why they have not lost here for 40-something games. Then there is the context that we are thrown into playing with ten men for 55 minutes. That tells you the story and the character of our players." It was a display of defiance that would have brought tears to the eyes of those old Arsenal warhorses Tony Adams and Martin Keown, not to mention the suspicion among City fans that the dark arts of delay were being utilised as play was interrupted by injury breaks to Raya and others, infuriating the home support. The time is coming to end the regular questions about the Gunners' mettle, character and stomach for the fight. Arsenal’s early fixture list handed them three hazardous assignments away to Aston Villa, Tottenham and Manchester City. The first two were won in gritty fashion while they were only seconds away from what they could have rightly regarded as a landmark triumph in the third. The Stones scramble prevented Arteta's side claiming top spot in the Premier League and ensured City returned to the summit but everything on show here should give the Gunners, if it were needed, further confidence and self-belief that the ability to make the leap to champions is within their grasp. It remains to be seen what wider significance that late concession of two points to the side they are trying to eclipse assumes for Arsenal but, in extremis, they showed again there is much to admire in what Arteta is building.

