  Erling Haaland, with inevitability, crowned a ferocious City start after nine minutes with his 100th goal in 105 starts – but that was as good as it got for the champions until Stones stepped in. City’s peerless midfield man Rodri, who had already been pole-axed by Kai Havertz’s shoulder seconds after kick-off, limped away 21 minutes later following an awkward tangle with Thomas Partey at a corner. Seconds later Arsenal were level, Italy defender Riccardo Calafiori making amends for letting Savinho escape too easily for Haaland’s opener, with a sumptuous finish that left Guardiola in a rage, kicking his seat in frustration at referee Michael Oliver allowing a quick free-kick and his players for being caught by it. Gabriel repeated the treatment meted out to Tottenham by heading Arsenal ahead from a corner at the far post in first-half stoppage time before the moment that shaped the rest of this gripping game.

