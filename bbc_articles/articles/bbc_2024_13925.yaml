title: Mexico elects Sheinbaum as first woman president - BBC News
date: '2024-06-04'
section: Latin America
url: http://www.bbc.co.uk/news/articles/cp4475gwny1o
content: |-
  Claudia Sheinbaum has beaten her rival, Xóchitl Gálvez, by a landslide to become Mexico's next leader.

  This video can not be played To play this video you need to enable JavaScript in your browser.

  Claudia Sheinbaum has been elected as Mexico's first female president, in a historic landslide win. Mexico's official electoral authority said preliminary results showed the 61-year-old former mayor of Mexico City winning between 58% and 60% of the vote in Sunday's election. That gives her a lead of about 30 percentage points over her main rival, businesswoman Xóchitl Gálvez. Ms Sheinbaum will replace her mentor, outgoing President Andrés Manuel López Obrador, on 1 October.

  The election of a woman to the highest office was an emotional moment for some

  Ms Sheinbaum, a former energy scientist, has promised continuity, saying that she will continue to build on the "advances" made by Mr López Obrador, further building on the welfare programmes which have made the outgoing president very popular. But in her victory speech she also highlighted what has set this Mexican election apart from previous ones. She told cheering voters: "For the first time in the 200 years of the [Mexican] Republic, I will become the first woman president of Mexico." She said it was an achievement not just for her but for all women. "I've said it from the start, this is not just about me getting [to the top office], it's about all of us getting here." Ms Sheinbaum also thanked her rival, Xóchitl Gálvez, who has conceded victory.

  Prior to running for president, Ms Sheinbaum was mayor of Mexico City, one of the most influential political positions in the country and one that is seen as paving the way for the presidency. Ms Sheinbaum, whose Jewish maternal grandparents immigrated to Mexico from Bulgaria fleeing the Nazis, had an illustrious career as a scientist before delving into politics. Her paternal grandparents hailed from Lithuania. Both of her parents were scientists and Ms Sheinbaum studied physics before going on to receive a doctorate in energy engineering. She spent years at a renowned research lab in California studying Mexican energy consumption patterns and became an expert on climate change. That experience and her student activism eventually earned her the position of secretary of the environment for Mexico City at the time when Andrés Manuel López Obrador was mayor of the capital. In 2018 she became the first female mayor of Mexico City, a post she held until 2023, when she stepped down to run for president.

  Supporters of Claudia Sheinbaum gathered at the Zócalo to celebrate

  The election, which pitted Ms Sheinbaum against Ms Gálvez, has been described as a sea change for women in Mexico. Edelmira Montiel, 87, said that she was grateful to be alive to see a woman elected to the top office. "Before, we couldn't even vote, and when you could, it was to vote for the person your husband told you to vote for. Thank God that has changed and I get to live it," she told Reuters news agency, referring to the fact that women were only allowed to vote in national elections in 1953. While the fact that the two front-runners were women was widely celebrated, the campaign was marred by violent attacks. As well as a new president, voters were also electing all members of Mexico's Congress and governors in eight states, the head of Mexico City's government, and thousands of local officials. And it was local candidates in particular who were targeted in the run-up to the vote. The government says more than 20 were killed across Mexico, although other surveys put the total at 37. Ms Gálvez harshly criticised the government and her rival in the presidential race for the violence which blights large parts of Mexico. She promised to be "the bravest president, a president who does confront crime" if elected, but failed to provide many details about how she would tackle the powerful criminal cartels which are behind much of the violence. After Ms Sheinbaum's lead became unassailable, Ms Gálvez called her. "I told her I saw a Mexico with a lot of pain and violence. I wished that she could solve the severe problems our people have,” Ms Gálvez said of the call.

  How to tackle Mexico's violent cartels is going to be one of the many challenges facing Ms Sheinbaum when she takes up office. She has said that it is important to tackle what she says are the roots of the violence and has promised to invest in welfare programmes to prevent poor young Mexicans from being recruited by criminal groups. On relations with Mexico's northern neighbour, the United States, which at times have been testy under her predecessor in office, she said she would ensure there would be "a relationship of friendship, mutual respect and equality". But in a reference to the many Mexicans living and working in the US, she promised to "always defend the Mexicans who are on the other side of the border”. Relations between the US and Mexico suffered under Mr López Obrador, who has been in power since 2018. The outspoken leader was barred from running for a second term under Mexico's constitution, which limits presidents to a single six-year-term. He threw his weight behind Ms Sheinbaum instead. Having the backing of the popular president, who has an approval rate of close to 60%, gave Ms Sheinbaum's campaign a huge boost. Many of those voting for her said they backed her and Mr López Obrador's party programme to alleviate poverty and wanted to see it continued. With additional reporting by BBC Monitoring in Miami.
