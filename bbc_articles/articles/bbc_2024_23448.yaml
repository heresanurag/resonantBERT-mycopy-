title: Man arrested over rail station wi-fi terror messages cyber hack - BBC News
date: '2024-09-27'
section: UK
url: http://www.bbc.co.uk/news/articles/c1jd5k8x4y4o
content: |-
  A man who works for the company which provides some wi-fi services has been arrested.

  Nineteen railway stations were affected by a cyber-attack, Network Rail said

  A man has been arrested on suspicion of computer misuse offences after railway stations across the UK suffered a cyber attack. Public wi-fi services were suspended at 19 railway stations managed by Network Rail on Wednesday after messages about past terrorism attacks appeared on people's devices. British Transport Police (BTP) said the man held is an employee of Global Reach Technologies, which provides internet access to some Network Rail stations. The force said the man has been arrested on suspicion of computer misuse act offences and malicious communications.

  The network is run by a third party, Telent, with the actual internet service provided by Global Reach. Commuters noticed unusual activity after connecting to the service at stations around the UK. The BBC has seen screenshots posted to social media after some passengers reported being directed to content listing terrorist attacks in Europe. It is understood that no other rail systems or data have been breached. Network Rail said it acted quickly to suspend public wi-fi services while the suspicious content was being investigated. The station operator and and its suppliers said they were confident that w-fi services would be restored by the weekend.

  Chris Dyson, 53, from Leeds, saw an unusual message on Wednesday afternoon when he connected his device to the wi-fi at Birmingham New Street. It gave details of Islamist-related terror attacks in the UK and Europe, alongside pictures taken from news reports about the incidents. "The screen lit up with bizarre security alerts and dodgy pop-ups," he told the BBC. "I started to panic slightly—what if this was a sign of something more sinister?"
  • None In the South East, Reading and Guildford
  • None In the North West, Manchester Piccadilly and Liverpool Lime Street
  • None In the West Midlands, Birmingham New Street
  • None In the West and South West, Bristol Temple Meads

  Network Rail said it believed other organisations, not just railway stations, had been affected. "This service is provided via a third party and has been suspended while an investigation is under way," the spokesperson said.

