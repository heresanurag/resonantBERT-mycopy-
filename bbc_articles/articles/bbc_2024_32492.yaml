title: Ofsted 'alarmed' by school absence and 'flexi-schooling' - BBC News
date: '2024-12-06'
section: Family & Education
url: http://www.bbc.co.uk/news/articles/cy7kd5km5jlo
content: |-
  Ofsted's chief inspector says he is worried about the number of pupils who are partly home-educated.

  The “alarming” level of children missing school has become a “stubborn and damaging issue”, according to the chief inspector of Ofsted, England's schools regulator. Sir Martyn Oliver said he was also worried about a rise in "flexi-schooling", where parents educate their children at home for part of the week. It is not clear how many children are taught in this manner. The Department for Education (DfE) said the government was putting education "back at the forefront of national life".

  Ofsted's annual report said attendance issues had "deepened" since the pandemic. Around 158,000 children missed at least half of their classes in the autumn and spring terms of the last academic year, it said, citing the latest DfE figures. In Knowsley, more than a quarter of pupils were classed as persistently absent - meaning they missed 10% of the school calendar, or more. Blackpool, Bradford, Middlesbrough, Sunderland, Bristol, Torbay and Plymouth followed Knowsley with the next highest rates of persistent absence - with between 23% and 25% of pupils missing significant periods of school.

  Ofsted's report also said education had "become fractured and fragmented for too many children".
  • None Home education, where parents teach their children. This is how an estimated 92,000 children learn. The report said many will receive a good education, but they were still part of a significant number who had "been opted out of more orthodox patterns of education".
  • None Part-time timetables, which involve children going into school for part of the week and spending the rest of the time at home, although they are not necessarily home-educated. Around 34,000 children are thought to be educated in this way. Sir Martyn said this could be an effective temporary measure to help get children back into school after illness or school refusal, but this hybrid style of education was "not an excuse to avoid full-time schooling throughout school years".
  • None Flexi-schooling, where children attend school on some days of the week and are educated by their parents on others. Ofsted said only a "small number of schools" allowed this but, because it is often recorded as an authorised absence, it is not clear how many pupils are in this situation.
  • None "Hybrid" education where children learn through a mix of online and in-person lessons. Ofsted said this was "increasingly used" for children with Special Educational Needs and Disabilities (Send), or those with behaviour or health needs.

  Julian Francis, a parent from north London, told the BBC his Year 8 child had autism and ADHD and struggled to attend school, even on a reduced, part-time timetable. April – who uses they/them pronouns – has not fully attended school since the pandemic. The 12-year-old has found it challenging to learn in classrooms with other students since lockdown measures were lifted – especially when there is lots of noise. Mr Francis said April's transition to Frederick Bremer School was "well-managed". "As schools go, it's like the area's flagship autism school. You probably couldn't get any better in mainstream," he said. "That's the reason why we picked it." But even with support from teachers, and fewer hours in school, April has struggled. "The other week, I had to go and pick them up and they were in complete distress," said Mr Francis. "They couldn't talk to me for 20 minutes until they had calmed down. "They can't even express how it feels - it's just this complete overwhelming sense that they can't deal with everything."

  Julian Francis wants April to be learning in school with friends, but knows they find it too hard

  Mr Francis and his wife work full-time, so, although they help April with homework, the couple cannot be at home all the time to provide for home-schooling. April reads a lot at home and recently finished The Great Gatsby – but Mr Francis is concerned that it won't necessarily help them in exams because it's not on the syllabus. "If you talked to them, you'd say they had great general knowledge [and] they're a well-educated child. "But the fact is they're not going get any qualifications because they're not on the pathway." Mr Francis said his experience of Frederick Bremer School was positive, and the issues were with the nation-wide Send system. The BBC has contacted Frederick Bremer School for comment on the issue of part-time schooling.

  Education Secretary Bridget Phillipson recently announced £740m to increase the number of places for pupils with Send in mainstream schools. Asked about the government approach to Send on BBC Radio 5 Live, she said: "We just need to look afresh at the system as it stands. Parents have lost confidence, the outcomes for children are not good, and sadly we are spending ever rising amounts." Ofsted added it made it more difficult for children to receive a coherent education. In a briefing with journalists, Sir Martyn accepted that the shift to parents working from home since the pandemic had not helped attendance - particularly on Fridays, an issue which was flagged by England's children's commissioner last year.

  Ofsted also warned a shortage of skilled staff, from early years onwards, remained a challenge, as new figures show that teacher recruitment targets in England have been missed for a fourth consecutive year. Concluding Ofsted's annual report, which focused on a broad range of issues including attendance, Sir Martyn said: "There are no silver bullets (and there will never be enough silver to go around), but many of the problems can be mitigated through joined-up thinking and partnership working." A DfE spokeswoman said: "As the report highlights, education is fundamental to the future success of this country - that’s why we are putting it back at the forefront of national life once again." She added the government was working with Ofsted to introduce school report cards, which would "give parents a more complete picture of school performance" and help improve standards.

  Meanwhile, a report from Sport England suggests that the pandemic has had "a fundamental impact" on exercise habits among children. It found the percentage of Year 7 pupils who could swim 25 metres without any help stood at 70% in the most recent data, down from 77% six years ago. Girls are less likely to be active than boys, it suggests, as well as black and Asian children and those from the least affluent backgrounds. Tim Hollingsworth, Sport England's chief executive, said: "The data shows that, for the children whose impressionable early years were defined by lockdowns and lack of activities, attitudes towards sport and physical activity are distinctly negative." Clarification 13th December: We have amended this article to more clearly set out the different types of school absence considered by the Ofsted report and to make clear that Mr Francis' child was attending school on a part-time timetable, that they have had an overall positive experience of the school and that his comments about his experiences relate to the overall education system.

