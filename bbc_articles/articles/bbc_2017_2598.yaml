title: 'Jackson Page: 15-year old schoolboy progresses to third round of Welsh Open
  - BBC Sport'
date: '2017-02-15'
section: Wales
url: http://www.bbc.co.uk/sport/wales/38984875
content: |-
  Fifteen-year-old Welsh schoolboy Jackson Page reaches the third round of the Welsh Open after knocking out a player ranked 78 in the world.

  This video can not be played To play this video you need to enable JavaScript in your browser.

  Fifteen-year-old Jackson Page says it will be "great to miss more school" after reaching the Welsh Open last 32. Page beat world number 78 John Astley on Wednesday, having already overcome world 123 Jason Weston in the first round of his debut professional event. "No English, most importantly, and no history," said the Ebbw Vale teenager. "I am doing GCSEs, but the school know this could be a career for me." Page has already won £3,500 and will play world number four Judd Trump next.

  "I remember watching Judd Trump when I was a kid, he was at Newport and played Ronnie O'Sullivan on one of the TV tables," Page told BBC Wales Sport. "I knew I could come here and get far and I looked at the draw and saw Judd and knew I could play him so my eyes were on that."

  Page, who attends Ebbw Fawr Learning Community in Blaenau Gwent, won £2,500 for reaching the second round and another £1,000 for progressing to the third. Another win to reach the last 16 would earn him £6,000. Page trailed Weston 3-1 in round one, but recovered to win a tense deciding frame. The youngster also held his nerve superbly to beat Astley with a break of 36 in the decisive frame. "I am over the moon with the win," Page said. "It is good to beat a player ranked so highly. But I just focus on potting the balls."

  When I saw Jackson play, it reminded me of when I was 15 years of age and how I thought about playing. He just loves to be there. He takes on shots that other people turn down because he's excited at that age and to win two matches as he has done is exceptional. He's a tremendous potter, he's got no fear at all. Sign up to My Sport to follow snooker news and reports on the BBC app.

