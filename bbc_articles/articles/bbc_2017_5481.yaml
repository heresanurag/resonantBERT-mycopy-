id: bbc_2017_5481
title: BBC News at Ten stops for four minutes over technical fault - BBC News
date: '2017-06-21'
section: UK
url: http://www.bbc.co.uk/news/uk-40350006
content: |-
  Presenter Huw Edwards was left on air as the broadcaster switched to an emergency back-up system.

  A technical fault temporarily halted the BBC News at Ten, leaving presenter Huw Edwards sitting in silence in the studio.

  Many people expressed alarm on social media when the "Breaking News" logo flashed up 11 times during the show.

  BBC News at Six and Ten editor Paul Royall said a "technical systems crash" caused the four-minute delay.

  Edwards later tweeted a photo of a can of beer, saying he was "going to enjoy this little beauty" after the bulletin.

  He told BBC Radio 4's The Media Show he had not initially known he had been on air - even though he had suspected he might be.

  Explaining what had happened, he told presenter Amol Rajan the studio's software system had "gone slightly crazy" moments before the programme had been due to start.

