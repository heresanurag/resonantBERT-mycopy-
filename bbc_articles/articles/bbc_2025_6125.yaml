  The three teenagers have been named by police as 17-year-old Star Tomkins, 18-year-old Harley Woods and 17-year-old Jimmy Savory

  Tributes for teens killed in crash near Heathrow

  Star Tomkins, Harley Woods and Jimmy Savory died after a car and a bus were involved in a collision near Heathrow Airport

  The family of one of the three teenagers killed in a crash involving a car and a bus near Heathrow Airport on 31 March, have said they are "completely devastated" at their loss. They have been named by police as 17-year-old Star Tomkins, 18-year-old Harley Woods and 17-year-old Jimmy Savory. Metropolitan Police officers found both the car and the bus alight when they were called to Bedfont Road, Feltham just before midnight. A fourth person in the car was taken to hospital, as well as two bus passengers. Their condition is not known. Other bus passengers were treated at the scene.

  The family of Harley Woods said in a statement: "We are completely devastated by the loss of Harley. "We ask if we can be left in peace to grieve and find a way through this." A fundraising page for Star Tomkins' funeral costs states: "It is with very heavy hearts that we share the unexpected passing of Star Tomkins." "She was a beloved daughter, sister, granddaughter, niece and best friend. She had a heart of gold and will be deeply missed by many." A police investigation into the collision is still ongoing.
