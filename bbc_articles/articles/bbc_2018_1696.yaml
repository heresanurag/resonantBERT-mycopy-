content: |-
  Students, police and politicians react after 17 people were shot dead at a high school in Florida.

  Seventeen people have been killed and many more injured in a shooting at Marjory Stoneman Douglas High School in Parkland, Florida. Several people are in a critical condition.

  Footage captures the aftermath of the attack
