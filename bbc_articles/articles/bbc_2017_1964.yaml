title: 'Sean Spicer: ''I don''t think the President owns a bathrobe'' - BBC News'
date: '2017-02-07'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-38899342
content: |-
  The New York Times has referred to President Trump wearing a bathrobe but his press secretary Sean Spicer has come out to refute that.

  The New York Times has referred to President Trump wearing a bathrobe and his press secretary Sean Spicer has come out to refute that, calling it 'fake news'.

  Social media, meanwhile, has been flooded with photos of a younger Mr Trump clad in a robe.
