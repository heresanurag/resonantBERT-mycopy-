title: Idris Elba's surprise marriage proposal - BBC News
date: '2018-02-11'
section: General
url: http://www.bbc.co.uk/news/entertainment-arts-43019334
content: |-
  The actor popped the question to his girlfriend at a cinema screening in east London.

  Actor Idris Elba went down on one knee at a screening of his new film Yardie, at a cinema in east London.

  Idris and his girlfriend Sabrina Dhowre have reportedly been dating since early 2017.
