  Meanwhile, former Labour Prime Minister Gordon Brown has told the BBC he is calling for the UK to seek an extension to the Article 50 process, under which the UK is due to leave the European Union on 29 March.

  Mr Brown suggested a year-long extension would allow further consultation with the British people. Any extension would require the unanimous agreement of the EU.

  He suggested citizens' assemblies could be used - as they were in Ireland ahead of a referendum on abortion - to consult people further on the issues in the absence of any clear majority for a way forward.

  "Parliament has proved itself incapable of solving this problem," he said.

  "I respect the job that legislators try to do but the country is fed up that Parliament hasn't found an answer. I think the only way that we can get unity in this country is by involving the people in trying to find the solution."

  In the Commons, Andrea Leadsom said in the "deeply regrettable case" that the deal is rejected, she will make another statement on Tuesday, to allocate time for the promised votes on leaving without a deal or deferring the UK's exit from the EU beyond the scheduled date of 29 March.

  Mrs May is pinning her hopes on getting changes to the backstop that will prevent the UK from being tied to EU customs rules if no permanent trade deal is agreed after Brexit.

  Critics say that - if the backstop were used - it would keep the UK tied to the EU indefinitely.

  Conservative backbencher Theresa Villiers, a Brexiteer who voted against the withdrawal deal in January, told BBC Radio 4's World at One: "As things look at the moment, I don't see that there is a new revised deal coming back from the European Union which implements significant enough changes to the draft withdrawal agreement to change the result [of the Commons vote on the deal]."

  Negotiations between British ministers and the EU officials over the past 24 hours have been described as "difficult", with the EU insisting there has been no breakthrough.

  Diplomats from the 28 member states were told on Wednesday that Mrs May could meet European Commission President Jean-Claude Juncker on Monday if progress was made.

  But the BBC's Europe reporter Adam Fleming said talk of a deadline for new proposals and a weekend of negotiations was "a notional timetable" and that more flexibility could be possible.
