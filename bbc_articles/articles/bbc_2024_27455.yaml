  He said the losses were "for tiny increments of land". "There is no doubt that Russia is making tactical, territorial gains and that is putting pressure on Ukraine," he said. But he added that Russia is spending more than 40% of its public expenditure on defence and security, which he said was "an enormous drain" on the country. While allies of the US's president-elect Donald Trump insist that Ukrainian President Volodymyr Zelensky may have to cede territory to bring the conflict to an end, Sir Tony insisted that Western allies would be resolute for "as long as it takes". "That’s the message President Putin has to absorb and the reassurance for President Zelensky," he told the programme.
