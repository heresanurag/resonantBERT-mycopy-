  US Secretary of Defence Pete Hegseth has said the helicopter's crew were "fairly experienced" and taking part in an annual night flight training session. Speaking to CNN, Cedric Leighton - a retired US Air Force colonel - said it was normal for that type of military aircraft to be training at night in the area, particularly to make sure pilots are proficient with using instruments needed to fly in the dark. He said one of the unit's duties is to transport high-ranking personnel around the capital - though none were on board at the time of the crash as it was a training flight. The unit's pilots are expected to be proficient at flying in DC's busy airspace and "train in order to avoid incidents like this", he added. Mr Butterworth-Hayes said only experienced pilots would be able to train in such a busy section of airspace. "Whether it's training for new systems or equipment, we need to know what systems the pilot had turned on in the helicopter and whether they had all the safety systems on board, or whether they were trying a new procedure or new route."
