title: Disaster happened in 'world's most controlled airspace' - BBC News
date: '2025-02-01'
section: US & Canada
url: http://www.bbc.co.uk/news/articles/cpdx6le5l27o
content: |-
  Experts say the deadly incident poses grave questions about how a collision was able to happen over the US capital.

  This video can not be played To play this video you need to enable JavaScript in your browser. LISTEN: Audio of air traffic controllers seemingly directing the helicopter to avoid the plane

  The aviation world is struggling to understand how a deadly mid-air collision between a passenger plane and military helicopter was able to happen in what one expert described as "the most controlled bit of airspace in the world". A US Army Black Hawk helicopter with a crew of three collided with an American Airlines jet carrying 64 people seconds before the passenger aircraft was due to land at Washington National airport. Both aircraft were sent careering into the icy Potomac River on Wednesday night. The exact cause of the crash remains unknown. Officials will release a preliminary report within 30 days, according to the National Transportation Safety Board (NTSB) - which is leading the investigation. Crews were able to recover flight data recorders - known as the black boxes - from the wreckage on Thursday, according to the BBC's US news partner CBS. The devices can help investigators pinpoint what led up to a crash.

  This video can not be played To play this video you need to enable JavaScript in your browser. Watch: Rescue efforts as passenger jet and helicopter collide in DC

  Airspace over the District of Columbia is heavily restricted to protect both national security and the buildings that house core aspects of US government. Commercial planes are prevented from flying over the Pentagon, the White House and other historic landmarks. Yet the area sees a lot of air traffic, Aviation attorney Jim Brachle, who has handled numerous litigation matters related to jets and Reagan airport, told the BBC. There is commercial traffic but also private aviation and helicopters that fly around the city, often carrying high-ranking officials and politicians between sensitive locations.

  "You got these really narrow pathways in and out and you've got a lot of congestion and extra airplanes, so you're putting a lot of aircraft in a really confined space," he said. Jeff Guzzetti, a former aircraft accident investigator for the Federal Aviation Administration (FAA) and the NTSB, told BBC Newshour that it seems the helicopter was in communication with the control tower before the accident. The air traffic controller pointed out the American Airlines flight to the helicopter, he said. "The helicopter pilot indicated he had the airplane in sight and was going to visually separate from it – and then the accident happened shortly thereafter - so there's going to be a lot of questions about exactly what did the helicopter pilot see?" Mr Guzzetti said.

  Todd Inman, part of the five-member NTSB board, said that DC is also a "unique environment" because of helicopters and specific zones they're allowed to fly. "If you look at DC, you see a lot of helicopters going down into this area so there's a very well-defined system in that regard," he said. Mr Inman could not provide any specifics on altitude of the helicopter before it collided with the American Airlines flight. Mr Brachle, who has handled numerous litigation matters related to jets and Reagan airport, told the BBC the question that remains is how two aircraft ended up in the same airspace. "What's really unique about Reagan is right there on the river. There's also a helicopter route that crosses right through that final approach and that's at or below 200 feet," he said. Brachle said the routes for both helicopters and the approach for aircraft intersect. "You're putting potentially two different aircraft in a really small space with hardly any separation," he said. "If you get one that's maybe a little too low, one that's a little too high, you end up being in the same spot."

  Aviation consultant Philip Butterworth-Hayes said the incident occurred at the "nexus of different aviation systems", including civilian and military systems, as well as procedures specific to the airport. "You are at the border of three or four aviation systems here - and it's at those borders where most accidents tend to happen," he added. But UK-based aviation expert John Strickland said the amount of commercial air traffic in the area cannot fully explain why the deadly collision was able to happen. As well as Washington National close to the city centre, he notes, there is the international gateway, Washington Dulles, and also Baltimore Airport a little further away.
