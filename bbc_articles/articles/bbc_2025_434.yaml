  • None Watch: The scene in DC after moment of impact "There has to be management of traffic flows to keep separation. It's much like we have in London where you have to manage traffic flows between Heathrow, Stansted, Gatwick and London City. "So DC is not different in that sense to London or New York... it's not totally unusual." Mr Butterworth-Hayes continued: "This is the most controlled bit of airspace in the world. You have both US government and civilian systems - Ronald Reagan airport is even owned by the government, it's one of the very, very few like that. "This really is the most secure - and should be the safest - airspace in the world, given the number of security and civilian safety organisations working in that area."

  This video can not be played To play this video you need to enable JavaScript in your browser. BBC Verify analyses the moments before the Washington DC plane crash

  The last fatal crash on a comparable scale involving a commercial plane in the US was in February 2009. Officials and experts alike have stressed that this type of incident is incredibly rare due to tight safety restrictions on all types of flights. Footage obtained from an air traffic control source by CBS News, the BBC's US news partner, showed the two aircraft which appear to have been involved in the crash clearly visible on radar systems accessible to controllers. Audio sourced by BBC News appears to confirm the helicopter was in contact with air traffic control on the ground at the airport. The helicopter was asked if it had the passenger plane "in sight" and to "pass behind" it. In the audio that follows, controllers appear to realise there has been a collision and can be heard directing other planes in the air to neighbouring airports. Mr Butterworth-Hayes said an in-air collision like this requires a number of things going wrong. He said that in order to fly in civilian airspace, the military helicopter would have needed to be fitted with a transponder alerting surrounding aircraft to its position. That means both aircraft should have been able to see each other, he says, plus there would have been instructions from air traffic control and an aircraft protection safety device that operate separately from each other. "On this occasion, you have these two different systems and both should have been able to keep these aircraft separate." The Black Hawk helicopter was part of B Company, 12th Aviation Battalion. It left Fort Belvoir, a military base in Virginia, and was taking part in a training exercise.

