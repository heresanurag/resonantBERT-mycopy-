title: West Mersea murder suspect calls 999 after bodies found - BBC News
date: '2024-03-22'
section: General
url: http://www.bbc.co.uk/news/uk-england-essex-68301945
content: |-
  The trial of Luke D'Wit, who denies murdering a couple, is played footage of him talking to police.

  The trial of a man accused of murdering a couple has been played recordings of him talking to police and calling 999 after their bodies were found.

  Luke D'Wit denies murdering Stephen Baxter, 61, and Carol Baxter, 64, who were discovered unresponsive at their home in West Mersea, Essex on 9 April.

  During the call, the couple's daughter is heard screaming while Mr D'Wit tells the call handler the couple were sitting in their chairs "stiff cold".

  Chelmsford Crown Court heard he poisoned them with the opioid painkiller fentanyl and rewrote their will. The trial continues.
