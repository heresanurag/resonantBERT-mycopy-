  Second place brought Biles her sixth Olympic medal, and she also won 19 world titles between 2013 and 2019. She has reached all five individual finals in Tokyo and is undecided on whether she will compete in her next event on Thursday, when she will attempt to become the first woman to retain the Olympic all-around title since 1968. "We're going to see," she said. "We're going to take it a day at a time and see what happens." Jordan Chiles, 20, replaced Biles in the women's team final, and said: "That was a huge thing. Those were definitely some big shoes that I had to fill and I'm very happy that I was able to do that. "Yes, she is the GOAT. I was able to show the world that not only can you fill amazing people's shoes but we also did this together as well." Team-mate Sunisa Lee, 18, added: "We were all so stressed. We honestly didn't know in that moment. She's freaking Simone Biles. She carries the team basically. "When we kind of had to step up to the plate and do what we had to do, it was very hard and stressful. But I'm very proud of us because we did that."

  After returning to the arena, Simone Biles cheered on her team-mates and celebrated USA's silver medal with her replacement Jordan Chiles

  Former Olympic champion and retired US gymnast Aly Raisman said: "I feel sick to my stomach. It's horrible. I know that all of these athletes dream of this moment for their whole entire lives so I'm just completely devastated and just hoping Simone's OK. "It's just so much pressure, and I've been watching how much pressure has been on her in the months leading up to the Games - and it's just devastating. "Just a friendly reminder: Olympic athletes are human and they're doing the best they can. It's really hard to peak at the right moment and do the routine of your life under such pressure."

  Messages of support for Biles also came from other athletes - and figures outside sport. Boxer Manny Pacquiao said "once a champion, always a champion", while US alpine skier and two-time Olympic gold medallist Mikaela Shiffrin added: "Keep whipping out that smile of yours cause it is undeniably golden." Karl-Anthony Towns of NBA side Minnesota Timberwolves sent "nothing but love and positivity", while retired US figure skater Adam Rippon said: "I can't imagine the pressure Simone has been feeling. Sending her so much love. It's easy to forget she's still human." Jen Psaki, the White House press secretary, said: "Gratitude and support are what Simone Biles deserves. Still the GOAT and we are all just lucky to be able to see her in action." Unicef USA tweeted: "Thank you for being a role model and showing the world it's OK to prioritise your mental health."

