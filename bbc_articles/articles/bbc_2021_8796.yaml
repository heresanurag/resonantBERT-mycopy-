content: |-
  American gymnast Simone Biles is praised for prioritising "mental wellness over all else" after pulling out of the Olympic women's team final.

  This video can not be played To play this video you need to enable JavaScript in your browser. Tokyo Olympics: Biles says 'put mental health first' after withdrawing from team final

  American gymnast Simone Biles was praised for prioritising "mental wellness over all else" after pulling out of the Olympic women's team final. The head of the US Olympic team, many gymnasts, and other sportspeople were among those to praise Biles' decision. The 24-year-old withdrew from the event after her vault, saying: "I have to focus on my mental health." "You've made us so proud," said Sarah Hirshland, chief executive of the US Olympic and Paralympic Committee. "We applaud your decision to prioritise your mental wellness over all else and offer you the full support and resources of our Team USA community as you navigate the journey ahead."

  The US were favourites for gold after winning five successive world titles - in 2011, 2014, 2015, 2018 and 2019 - in addition to back-to-back Olympic gold medals in London and Rio. After scoring 13.766 - her lowest Olympic vault score - Biles left the arena, but returned to support her team-mates as they took silver behind the Russian Olympic Committee, with Great Britain claiming bronze. Biles is a 30-time Olympic and World Championship medallist, and needs four podium finishes in Tokyo to become the most decorated gymnast - male or female - in history. She is widely referred to as the 'GOAT' (Greatest Of All Time).

  This video can not be played To play this video you need to enable JavaScript in your browser.

  Jamaica gymnast Danusia Francis said: "Don't know about you but I think Simone Biles just empowered everyone to put their mental wellbeing above everything else. What a queen. GOAT in more ways than one." Former Great Britain gymnast Beth Tweddle, a bronze medallist in 2012, said on BBC One: "Since 2013 she's been undefeated in the all-around so every competition she goes in, everyone expects her to be perfection, and it's just not possible. "She was strong enough to say: 'I'm just not right today and I've got the belief in the rest of the girls. They know they can step up, that they can do their routines.' "And she went back in, she was their chief cheerleader, and she was getting the chalk for them. That shows how much of a leader she is, to be able to make that decision.

  This video can not be played To play this video you need to enable JavaScript in your browser. 'It all came crashing down' - Mears on his post-Olympic depression

  "We have got to make sure that the health and wellbeing of every athlete is the main priority."

  France gymnast Melanie de Jesus dos Santos said: "We are not used to seeing Simone Biles like this. I would like to say that it is not easy because she is Simone Biles and everyone is watching her. It's so difficult psychologically for her." Japan gymnast Mai Murakami added: "This is very unusual for her, but if you're under a lot of pressure it can affect your body."

