title: 'CES 2018: LifeFuels smart bottle thirsts for drinking data - BBC News'
date: '2018-01-08'
section: General
url: http://www.bbc.co.uk/news/technology-42600887
content: |-
  A smart bottle is on show at CES that adds nutrients to water and tracks how much is consumed.

  A smart bottle, which adds vitamins and nutrients to water and then tracks how much is consumed, is on show at the CES tech show in Las Vegas.

  The $149 (£110) product is being pitched as a means to improve owners' health.

  But the BBC's Chris Foxx asked whether consumers really want another device to recharge.

