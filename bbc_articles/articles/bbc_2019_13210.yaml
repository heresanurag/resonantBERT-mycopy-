title: 'Election 2019: Nicola Sturgeon challenged over Scottish independence plans
  - BBC News'
date: '2019-11-22'
section: General
url: http://www.bbc.co.uk/news/technology-50525374
content: |-
  The SNP leader was asked whether she would back a confirmatory vote on a Scottish independence deal.

  SNP leader Nicola Sturgeon has been challenged about whether she would back a confirmatory vote on any Scottish independence deal.

  She made the comments while taking part in a BBC Question Time Leaders' Special.
