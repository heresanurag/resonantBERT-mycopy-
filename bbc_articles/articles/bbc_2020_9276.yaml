title: Chicago imposes restrictions after night of unrest - BBC News
date: '2020-08-11'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-53731032
content: |-
  More than 100 people were arrested for looting, battery against police and other charges. Crowds gathered following reports of a police shooting involving a 20-year-old man.
