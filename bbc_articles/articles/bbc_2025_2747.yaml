  This isn't the first time he has seen a foreign policy problem as a business opportunity, writes Anthony Zurcher.

  Trump's real-estate instincts clash with his America First worldview

  This video can not be played To play this video you need to enable JavaScript in your browser. Can Trump really take ownership of Gaza?

  When a real-estate developer becomes the US president, don't be surprised if American foreign policy includes a heavy helping of real-estate development. That's probably the biggest conclusion to draw from Donald Trump's stunning proposal for the US to take over Gaza and turn it into a resort for all the people of the world to enjoy – a "Riviera of the Middle East", in his words. It also presents the latest iteration of a question that has persisted as long as Trump has been involved at the highest level of American politics. Should Trump's Gaza development plan, which includes the resettlement of more than two million Palestinians and US "ownership" of the contested lands be taken literally or seriously? Both, or neither? Trump's proposal flies in the face of the deeply held wishes of the Palestinian people and has been summarily rejected by the Arab nations that would have to play an integral part in resettling those displaced from war-torn Gaza. It has also triggered howls of protest from the international community, as well as the president's domestic critics in the Democratic Party. "Developing war-torn land like a Trump golf resort isn't a peace plan, it's an insult," said Democratic Congressman Troy Carter of Louisiana. "Serious leaders pursue real solutions, not real estate deals."

