content: |-
  The collision involving a black cab happened shortly before 14:00 on Union Street in the city centre.

  Four taken to hospital after taxi hits pedestrians

  Emergency services were alerted at about 13:50 on Saturday after the taxi collided with pedestrians

  Four people have been taken to hospital after a taxi struck a group of pedestrians in Glasgow city centre. Police said the collision, which involved a black cab, happened at about 13:50 on the city's Union Street on Saturday. Two women, aged 60 and 61 and the male cab driver, 62, were taken by ambulance to the Queen Elizabeth University Hospital. Another 61-year-old woman was taken to Glasgow Royal Infirmary, and a 50-year-old woman was assessed at the scene by paramedics.

  Several roads were closed after the collision for investigation work. The fire service was also called to assist, and plastic sheets were erected while the injured were initially treated at the scene. The cab could be seen at the scene on Saturday afternoon on a paved area at the junction of Union Street and Gordon Street.

  The black cab could later be seen on a paved area at the scene of the collision

  Police have appealed for anyone who witnessed the collision to contact them., external Sgt Christopher Hoggans from Road Policing said: "Our enquiries are ongoing to establish exactly what happened. "I am appealing to anyone who was in the area at the time to contact us with any information they may have. "I would also ask anyone with recording equipment to check the footage as it could assist us in our ongoing investigation."
