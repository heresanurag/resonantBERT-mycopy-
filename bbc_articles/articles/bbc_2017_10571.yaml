title: 'Sputnik: How the Soviet Union spun the satellite launch - BBC News'
date: '2017-10-05'
section: Science & Environment
url: http://www.bbc.co.uk/news/science-environment-41498083
content: |-
  For the Soviet Union, the launch of the satellite was a triumph not just for science. but socialism.

  The launch of Sputnik, the first man-made satellite, 60 years ago kicked off the space race between the Soviet Union and America.

  The satellite was a success not just in terms of scientific advancement but in terms of providing a propaganda opportunity for the socialist state.

  Early reports detailed a wealth of technical information about the launch of the "Earth satellite", such was the general interest in it.

  One news correspondent described seeing the satellite appear "like a flashing spark over the horizon" and the Communist Party's main newspaper, Pravda, wrote that "all the world heard the announcement of the launching of the artificial moon".

  But reports by the state news agency Tass also mentioned its orbital velocity of about 8km a second, the fact that it was travelling at up to 900km above the surface of the earth, and that Sputnik was making one complete revolution in an hour and 35 minutes.

  Sputnik was just 58cm in diameter and weighed 84kg

  Russian media also detailed the frequencies and wavelengths on which Sputnik was emitting regular beeps, saying its transmitters were powerful enough for amateur radio operators to be able to receive them.

  Later, radio broadcasts to America touted the fact that the Soviet magazine Radio was offering "special prizes" for radio hams who submitted reports of the signals.

  Special broadcasts listed the places and times the satellite was expected to pass over.

  BBC Monitoring, a unit of the World Service, recorded Soviet broadcasts about Sputnik's movements

  The day after its launch, Tass and Russian radio reported world reaction to it, noting how major media outlets like AFP, the Daily Mail and the BBC had reported it and how "some US radio stations interrupted their programmes in order to broadcast the satellite's signals".

  On Soviet radio, various scientists, such as jet propulsion expert Professor Kirill Stanyukovich, called it "a great victory not only for Soviet science but also for the Soviet order".

  "I think that the very fact that this has been achieved in our socialist country must not be regarded as mere chance," another academic told listeners. "That we are not as rich as America is no secret to us. Why then has it happened that we have been capable of solving these most advanced and difficult scientific and technical problems ahead of Americans?"

  Several digs at America made their way into reports.

  "For 40 years they closed their eyes to the enormous successes of Soviet industry and agriculture," one radio broadcast said. "Now the most reactionary personalities in the USA are trying to raise some doubts about the tremendous value and great significance of this new success of Soviet science."

  BBC Monitoring, a unit of the World Service which monitored Soviet broadcasts at the time, notes that "Leading officials were quoted by Tass as showing reluctance to accept the news; and Moscow radio told the home audience on the 7th that the United States Information Agency had adopted a policy of minimising the military and scientific significance of the achievement. US scientists, on the other hand, were given as expressing pleased congratulations."

  Komsomolskaya Pravda described Sputnik as "the victory of Soviet power"

  Today, the name Sputnik is also associated with an international news agency, which has a presence on the web and radio, and is one of the main media outlets through which Russia influences global opinion.

  Sputnik tends to seek audiences on the political margins - whether it's supporters of the Front National in France, or the Democrat Bernie Sanders in the US.

  Its political stances include the idea that NATO is a menace to world peace, criticism of what it sees as US hegemony, and the general decadence of Western democracies and their institutions, especially in the face of the challenges posed by Islamist terrorism and migration into Europe.

  Sputnik is still potent force for Russian influence, just in a different sort of space now.

