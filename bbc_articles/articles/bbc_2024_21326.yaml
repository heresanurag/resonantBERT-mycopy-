title: 'Oasis tickets: Hundreds lodge complaints over dynamic pricing - BBC News'
date: '2024-09-01'
section: Culture
url: http://www.bbc.co.uk/news/articles/c20r26p7d0ro
content: |-
  The UK advertising watchdog gets 450 complaints, as the government pledges to look at dynamic pricing.

  Hundreds of Oasis fans have made official complaints about how tickets for the band's reunion tour were advertised, as the government pledged to look into the use of "dynamic pricing". The system led the prices for many tickets to shoot up by more than £200 during the day after they went on sale on Saturday, leaving some fans out of pocket and others forced to give up. Ministers have now said they will include dynamic pricing in a consultation into ticket resale websites, which had already been announced by the government and will start in the autumn. Speaking on BBC Radio 5 Live, Prime Minister Sir Keir Starmer said "there are a number of things that we can" and "should do".

  "Because otherwise you get to the situation where families simply can't go or are absolutely spending a fortune on tickets," he said. He added the government would be consulting on the future of the law, which "may well mean adjustments". "There are a number of techniques going on here where people are buying a lot of tickets, reselling them at a huge price," he said. "And that's just not fair - it's just pricing people out of the market." Before he became prime minister, Sir Keir backed a move to introduce a cap on prices for resold tickets and limits to how many tickets a person can resell. On Sunday, Culture Secretary Lisa Nandy said she wants to end "rip-off resales" and ensure tickets are sold "at fair prices". On Ticketmaster, the cost of some Oasis tickets rose to more than £350 - up from £135 when the sale began on Saturday. Ticketmaster said the prices were set by the "event organiser", who "has priced these tickets according to their market value". Dynamic pricing is not a new phenomenon and is allowed under consumer protection laws. Some tickets were also quickly listed on resale websites for thousands of pounds. Ms Nandy said it was "depressing to see vastly inflated prices excluding ordinary fans" from gigs. Outlining the government review's scope, she said ministers would look at "issues around the transparency and use of dynamic pricing, including the technology around queuing systems which incentivise it".

  Fellow minister Lucy Powell, leader of the House of Commons, was among those hit by dynamic pricing over the weekend. She eventually forked out more than double the original quoted cost of a ticket for an Oasis show. She told BBC Radio 5 Live that she did not "particularly like" surge pricing, but that "it is the market and how it operates". On Monday, the Advertising Standards Authority said it had received 450 complaints saying the adverts for what tickets would cost and how many were available were misleading. "We're carefully assessing these complaints and, as such, can't comment any further at this time," an ASA spokesperson said. "To emphasise, we are not currently investigating these ads.”

  One fan, Jamie Moore, told the BBC he had never felt "so let down by a website" in his life. Oasis and the band's promoter have not responded to the complaints. However, Twickets, one of the band's official face value resale websites, has announced it has cut its charges after an outcry when screenshots circulated showing it charging more than £130 in booking fees alone. The company said it had cut its fees from 14% to 10% - with a further 1% on top to cover bank charges - up to a maximum of £25 per ticket for the Oasis shows. Twickets founder Richard Davies said: "Twickets is a small business and by focusing on resale only doesn’t sell the volume of tickets that the major ticketing agencies do. "Our booking fee goes towards the costs of running the platform, paying our team and ensuring that Twickets is a viable and sustainable business doing the right thing for fans."

  Schellion Horn, competition economist at accounting firm Grant Thornton, told the BBC's Today programme that dynamic pricing was about setting the price around supply and demand. That means as demand for tickets goes up, then the price rises to match that. Ms Horn suggested there was a "realisation that actually the tickets were under priced" when the sale first started on Saturday, given there was so many people in online queues. People were "clearly willing to pay prices of £300-£400", she added, otherwise they would not have parted with their money. But she said the problem was people were not aware that dynamic pricing was in operation and so there was a lack of transparency. "We see it all the time, whether it's Uber or airline tickets or holidays or train tickets, so we're very very used to dynamic pricing... but I think this was the first time we've really seen it for concert tickets in the UK and people just weren't expecting it and I think that's where the issue came in," she said. Meanwhile, ticketing websites were praised for coping with the "enormous demand" for Oasis tickets by Jonathan Brown, chief executive of the Society of Ticket Agents and Retailers, who insisted prices would have been set by the band.
