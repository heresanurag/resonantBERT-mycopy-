  MSPs back the general principles of the Transport (Scotland) Bill.

  MSPs debated the Transport Bill for the first time Image caption: MSPs debated the Transport Bill for the first time

  That's all from Holyrood Live on Thursday 4 April 2019.

  MSPs backed the general principles of the Transport Scotland Bill.

  MSPs inevitably asked about Brexit and also somewhat inevitably ScotRail during FMQs, while subject choice at schools was also raised.

  Earlier this morning a woman told the Scottish Parliament she felt "turned away and abandoned" after being refused help eight times in the week before her partner took his own life.

  Karen McKeown, from Bellshill, North Lanarkshire, took her fight for a review of mental health services the Public Petitions Committee, with a powerfully emotional appeal.

