  He says judges were "wrong" to rule Parliament's suspension unlawful and accuses opposition MPs of trying to block Brexit.

  Labour MP calls for review of 'limits of language' in Parliament

  Labour MP Seema Malhotra asks the Speaker whether there is any capacity for a "formal review about the limits of language" that can be used about MPs in the chamber. "Experience has shown that raising it again and again in the chamber is not enough," she says. "And yet if we can have other rules about how we conduct ourselves, could you advise the House as to whether there is any capacity to review the language used so that we can create other ways in which calling a colleague a traitor could be ruled out of order?" Mr Bercow replies that he was not aware of the word "traitor" being used in the chamber, and that he would already regard that as "unparliamentary" language.
