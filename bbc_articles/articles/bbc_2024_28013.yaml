content: |-
  Ireland respond to a first home defeat in more than three years with a 22-19 win over Argentina at the Aviva Stadium despite twice being reduced to 14 men.

  Ireland scored all 22 of their points in the first half

  Ireland responded to a first home defeat in more than three years with a 22-19 win over Argentina at Aviva Stadium despite twice being reduced to 14 men. After losing to New Zealand to start their autumn campaign last week, the hosts scored two tries in the opening five minutes and three across the first half, while Argentina answered through a trio of penalties from number 10 Tomas Albornoz before the break. The visitors scored all 10 points in the second half, including a fabulous try from Juan Cruz Mallia, but never led on the night that prop Cian Healy equalled Brian O'Driscoll's Irish cap record from the bench. On a night they will rue their inability to make the most of Irish ill-discipline, they spent the final moments of the contest camped in the opposition 22 but knocked on to end the game. The Pumas will finish their northern hemisphere tour with a visit to France next Friday night while, a day later, Ireland host Fiji in the third of their four autumn internationals.

  Having had their 19-game winning streak in Dublin halted by the All Blacks a week before, Ireland would have sought a quick start to ease any pressure built through seven days of scrutiny. While they got just that through a pair of tries in the opening five minutes, the visitors will be left wondering what might have been had Matias Moroni not been sent to the sin bin in the second minute, the first of two cards for each side. The Argentina centre had crossed the line just moments before being shown the yellow, his high tackle on Jack Crowley bringing the double blow of a disallowed score and 10 minutes on the sidelines. Ireland were quick to take advantage, crossing the line twice as the centre watched on. The first came directly from the subsequent penalty, Crowley darting across after Ronan Kelleher had been stopped short, with the second arriving only moments later from an attack launched directly from the subsequent restart. With centres Robbie Henshaw and Garry Ringrose both carrying well, the ball was spread to Tadhg Beirne whose popped pass inside to Mack Hansen saw Ireland open up a two-score lead. Argentina got on the board when Albornoz punished a Henshaw offside but as Moroni returned his side trailed 12-3. The centre quickly played his part in dislodging the ball from Beirne's hand as he tried to ground for the score. To conclude a frantic opening 17 minutes, it was Ireland then reduced to 14 when Finlay Bealham was sent to the bin for a croc roll on his fellow prop Joel Scalvi but the visitors could not take advantage as Ireland had previously. Albornoz kicked another pair of penalties during the Connacht man's absence but, with a Crowley drop-goal in between, Ireland were still 15-9 ahead when restored to 15. McCarthy's try, again started from the line-out, edged Farrell's side further ahead but their discipline remained an issue. Having been whistled too frequently against the All Blacks, they conceded six penalties in the first half, including three in quick succession in the final minute of the half, but Argentina could not make them pay.

  Jack Crowley scored 12 points during his hour on the pitch

  If Argentina started the second half in need of inspiration, it was provided by Toulouse full-back Juan Cruz Mallia whose superb solo try was capped by a brilliant step on Hansen, while Ireland continued to struggle with their discipline. After the flurry of penalties inside their 22 to end the first half, when McCarthy strayed offside during another spell of Argentine pressure, the lock was the second Ireland player sent to the bin. With a penalty count that hit double digits as early as the 54th minute, Ireland were living dangerously but, as McCarthy returned, the effort from the tee that had immediately followed the yellow card was all Argentina could muster in his absence. The failure to press home their numerical advantage for a second time seemed to take the steam from the visitor's charge with Farrell turning to bench that included both ends of the spectrum in terms of experience. Prop Thomas Clarkson and fly-half Sam Prendergast made their debuts as replacements across the final half hour, while Healy's record-equalling cap was his 133rd. When, with five minutes remaining, Francisco Gomez Kodela was shown the game's fourth yellow card, Ireland's efforts to see out were aided but the win was not sealed until an Argentinian knock-on deep in the opposition 22 with 82 minutes on the clock.
