title: 'Poppy Atkinson: Football clubs across country honour girl - BBC News'
date: '2025-03-08'
section: England
url: http://www.bbc.co.uk/news/articles/cd92ynq47p4o
content: |-
  Manchester United Women are one of the clubs remembering the 10-year-old in their matches this weekend.

  Poppy Atkinson was described by her family as a "force of nature"

  Football clubs of all levels are paying tribute to a 10-year-old girl who was fatally struck by a car on a sports pitch. Poppy Atkinson was attending a football training session at Kendal Rugby Club in Cumbria on Wednesday evening when she died in the incident. A 40-year-old man from Lancaster, who was arrested on suspicion of causing death by dangerous driving, has been released, but Cumbria Police say investigations are continuing. Manchester United Women paid tribute to Poppy in their FA Cup victory earlier, with dozens of clubs from across the country remembering her as part of a social media campaign, external started by South Shields-based Team Grassroots.

  A number of county associations, including Essex County Girls Football League, Sussex County FA and Notts County FA, are also backing the campaign and are encouraging their members to observe a minute's silence.

  Poppy was at a football training session when she was fatally injured after being struck by a vehicle

  Poppy's family say she wanted to be a professional footballer, and messages of condolence have been sent from some of the Lionesses, including Barrow's Georgia Stanway. Manchester United Women, who faced Sunderland in the FA Cup quarter-finals earlier, paid tribute to United fan Poppy with captain Maya Le Tissier holding up a shirt with her name on it after their first goal.

