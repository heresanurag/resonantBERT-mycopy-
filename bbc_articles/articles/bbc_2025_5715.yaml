  At the time of Poppy's death, police said there was "no indication to suggest that this incident was a deliberate act". An eight-year-old girl, also from Kendal, was taken to hospital for treatment, but her injuries were not life-threatening.

  James Pattison, CEO of Westmorland County FA, said: "We fully support the minute's silence for Poppy Atkinson this weekend, and have asked it is held before all of our County Cup semi-finals happening over the weekend." "As a County FA, we have been working closely with all of our member clubs to provide support and advice where necessary, and will continue to do so, following the tragic events of Wednesday evening."

