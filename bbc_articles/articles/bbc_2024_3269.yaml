title: Chancellor Jeremy Hunt denies Rishi Sunak made trans joke at PMQs - BBC News
date: '2024-02-08'
section: General
url: http://www.bbc.co.uk/news/uk-politics-68231999
content: |-
  Jeremy Hunt says claims Rishi Sunak joked about trans people, while Brianna Ghey's mother was due in the Commons gallery, are being “taken out of context".

  Jeremy Hunt said claims Rishi Sunak joked about trans people, while Brianna Ghey's mother was due in the Commons gallery, were being “taken out of context".

  The chancellor added the PM “could not have been clearer” about his respect for Esther Ghey.

  Mr Hunt said Labour leader Sir Keir Starmer could not make up its mind and “changed its position by the day” on key issues.

  BBC political editor Chris Mason said there were questions for Labour, but repeatedly asked Mr Hunt if Mr Sunak should apologise for his comments at PMQs.

  Rishi Sunak faces calls to apologise over trans jibe to Starmer at PMQs
