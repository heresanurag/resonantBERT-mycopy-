  The second day of Glastonbury saw people doing workouts, dressing like lobsters and tying the knot. Joe Wicks led a workout session from the stage at Glastonbury, while performers took part in a parade to celebrate the Stag Beetle. Sian Barklem, 25 and Johnjo Smith, 24, got engaged at Glastonbury last year and held a handtying ceremony at this year’s festival, which they said is their “favourite place on Earth”. Michael Eavis, co-creator of the festival, took to the stage to speak to the crowd.

