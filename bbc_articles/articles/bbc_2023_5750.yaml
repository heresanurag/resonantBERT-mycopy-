title: Microsoft defends $69bn Activision deal - BBC News
date: '2023-04-27'
section: Technology
url: http://www.bbc.co.uk/news/technology-64717453
content: |-
  Opponents, including Sony, challenged the proposal at an EU hearing held behind closed doors.

  Microsoft has defended its proposal to buy Activision Blizzard - the maker of Call of Duty and Candy Crush - at an EU competitions hearing.

  Microsoft says it believes the $68.7bn (£56.8bn) deal will bring more choice to more gamers.

  But rival Sony, which also attended the hearing, says the merger would give Microsoft too much control over some of the world's most popular games.

  Microsoft president Brad Smith described the EU hearing on Tuesday as "an important day".

  He also rejected concerns voiced by Sony that Activision Blizzard games - specifically Call of Duty - might become restricted to Xbox users if the merger goes ahead.

  "This has never been about spending $69bn so we could acquire titles like Call of Duty and make them less available," he said after the hearing.

  "That's not a great way to turn a $69bn asset into something that will become more valuable over time."

  In a statement, Activision Blizzard said: "We are confident regulators will find that our proposed merger will enhance competition and create greater opportunities for workers and better games for our players."

  Chip designer Nvidia and Google were also understood to be present, although the hearing was not open to the press or public.

  Nvidia and Microsoft have announced a partnership which would enable both Xbox PC games and Activision Blizzard titles to become available via Nvidia's cloud-streaming platform GeForce Now.

  The tech firm has to convince regulators around the world that the deal - the largest in gaming history - would not harm its competitors. Today was Microsoft's final chance to put forward its case in Europe before the commission makes its decision.

  Some countries - including Chile, Brazil and Saudi Arabia - have already approved it.

  The UK's competition watchdog recently said it was opposed to the deal, although it has yet to announce its final ruling, and the European Commission ordered an investigation.

  One suggestion made by the UK Competition and Markets Authority was that Call of Duty could be sold off separately.

  Microsoft has pledged to make all current Activision Blizzard games available on Nintendo, Sony and Steam platforms for at least the next 10 years, but Sony has so far rejected this deal.

  Games companies previously acquired by the firm include Minecraft maker Mojang and Fallout creator Bethesda. It has already announced that Bethesda's new game Starfield will start off as an Xbox exclusive when it launches.

