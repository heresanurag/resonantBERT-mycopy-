title: 'Bianca Williams: Bodycam footage shows moment sprinter handcuffed - BBC News'
date: '2023-10-25'
section: General
url: http://www.bbc.co.uk/news/uk-england-london-66955342
content: |-
  Bianca Williams and her partner were stopped and searched by police in west London in July 2020.

  A sprinter who was stopped by police in west London has told a misconduct hearing she had "nothing to hide" during the search.

  Bianca Williams and her partner Ricardo dos Santos had their three-month-old baby in the car when they were searched in Maida Vale in July 2020.

  Police bodycam footage played at the hearing showed Ms Williams being handcuffed.

  Five Met Police officers have denied accusations of gross misconduct.
