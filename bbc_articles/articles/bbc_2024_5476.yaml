title: 'Henry Diltz: Rock''s ''accidental photographer'' wins lifetime achievement
  prize - BBC News'
date: '2024-03-22'
section: Entertainment & Arts
url: http://www.bbc.co.uk/news/entertainment-arts-66817901
content: |-
  Henry Diltz, who shot some of rock's most iconic images, will be honoured at Abbey Road on Thursday.

  "I said to the band, 'Quick! Run in there!' And they did. There was none of that, 'You need to move to the left, you guys should trade places'. They just got behind the window. I took one roll of film and got out of there before they could stop us!"
