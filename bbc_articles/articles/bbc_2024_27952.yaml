  Tamzin Hall, 17, was hit by a car after leaving a police vehicle she was being transported in.

  Girl who died after leaving police vehicle on M5 named

  Tamzin Hall, 17, died after being hit by a car on the M5 on Monday

  A teenage girl who died when she was hit by a car after leaving a stationary police vehicle on the M5, has been named. Avon and Somerset Police said Tamzin Hall, 17, from Wellington, Somerset, was hit by a car travelling southbound between junction 24 for Bridgwater and junction 25 for Taunton, shortly after 23:00 GMT on Monday. She had got out of a police vehicle that had stopped on the northbound side while transporting her moments before the incident, police added. "Our thoughts and sympathies go out to Tamzin’s family for their devastating loss," the force said.

  There were long delays on the M5 after the closure between junctions 24 for Bridgwater and 25 for Taunton

  The force referred itself to the Independent Office for Police Conduct (IOPC), which is investigating the incident. "A specially-trained family liaison officer remains in contact with them to keep them updated and to provide support. "The family have asked for privacy at this difficult time," the force added. Speaking on Tuesday, Jon Cummins, Avon and Somerset Police's Assistant Chief Constable, shared a statement, calling it a "hugely distressing incident" and "one that will no doubt cause great shock amongst the public".

