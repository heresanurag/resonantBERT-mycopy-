  The IOPC said the teenager was being taken from an address in Taunton to a custody suite in Bridgwater in a police car by two officers. The police car stopped on the northbound carriageway of the motorway, between junctions 25 and 24 just before 23:00. At this point, the teenager got out of the car and shortly afterwards was involved in a collision with a member of the public's car on the southbound carriageway, the IOPC said. An ambulance was called and paramedics attended within a few minutes but Tamzin died at the scene.

  IOPC director David Ford said the police watchdog's role was to "independently investigate all the circumstances surrounding this incident". "This was a truly tragic incident and my thoughts are with Tamzin's family and friends and everyone affected by the events of that evening. "We are contacting her family to express our sympathies, explain our role, and set out how our investigation will progress. We will keep them fully updated as our investigation continues." Mr Ford said the IOPC had taken accounts from officers involved and were obtaining statements from several witnesses. He added that the coroner had been informed and a post-mortem examination had been carried out on Thursday afternoon.
