content: |-
  The roaring wind can be heard, as debris flies past the windows of the Mississippi property.

  A resident in Tylertown, Mississippi, filmed the moment a tornado tore past his home.

  Six deaths were reported in the state, with a total of at least 34 people killed in the south-east of the US.

  The deadly tornadoes flipped vehicles and destroyed homes, leaving more than 250,000 properties without power.

  Flood warnings, including flash flooding, were issued in a number of states, with the National Weather Service saying there was a risk to life.

