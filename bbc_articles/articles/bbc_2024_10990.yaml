title: 'Met Gala: BBC Verify examines fake Katy Perry AI-generated image - BBC News'
date: '2024-05-08'
section: General
url: http://www.bbc.co.uk/news/world-68973448
content: |-
  Fake pictures of Katy Perry and other artists at the Met Gala went viral on social media.

  An AI-generated image of Katy Perry at the Met Gala has been going viral on social media.

  The singer wasn't at the red carpet event in New York but thousands of fans - and even Ms Perry's own mother - fell for the picture, believing it was real.

  The BBC’s disinformation and social media correspondent, Marianna Spring, looks at the fake picture in detail, explaining why this matters beyond the red carpet event.
