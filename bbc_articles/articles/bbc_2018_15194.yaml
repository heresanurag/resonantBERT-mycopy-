title: 'Christmas traffic: ''So far, so good'' for Christmas Eve getaway - BBC News'
date: '2018-12-24'
section: UK
url: http://www.bbc.co.uk/news/uk-46669182
content: |-
  Half of all motorists were expected to take to the roads but so far there have been no major problems.

  Traffic building on the M25 in Kent on "frantic Friday" - ahead of more busy roads on Christmas Eve

  Drivers setting out on Christmas Eve are being warned they could face severe delays, but it's a case of "so far, so good" according to the RAC.

  Spokesman Pete Williams said the busiest time for traffic had passed, but the roads in and around London, the M4 and the M6 were particularly busy.

  He said traffic levels had been "pretty steady" over the past few days.

  Meanwhile, many rail passengers across the country are facing disruption because of planned engineering work.

  Network Rail said vital upgrades would be carried out over the festive period.

  According to the AA's live traffic reports, vehicle accidents and a burst water main caused problems for people trying to leave central London by car.

  Mr Williams said there had earlier been congestion in the north, around Leeds and Bradford, because of cold weather.

  He advised travellers to check their oil, coolant level, tyre pressure and tread depth, and to buy some good screen wash before setting off.

  The RAC and Inrix, which provides traffic information, had predicted the stretch of the M1 northbound between junction 21 (Coventry/Leicester) and junction 26 (Nottingham/Ripley) would be the worst for delays.

  Fewer commuters than usual were expected to travel on Christmas Eve - many having booked the day off work.

  But far more leisure journeys than usual were expected - as many as 2.5 million - with the AA predicting half of all motorists would take to the UK's main roads.

  The RAC says the number of leisure journeys over the festive season is likely to peak on Boxing Day with an estimated 6.8 million individual trips.

