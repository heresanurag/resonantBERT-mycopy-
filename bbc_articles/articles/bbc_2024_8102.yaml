content: |-
  How do people say they will vote in the UK general election? Our poll tracker measures the trends.

  Tap party name to highlight its polls in the chart

  You need a modern browser with javascript enabled to view the interactive content in this page. A scatter plot showing an average percentage of people who said they would vote for each party (excluding those who didn't know or wouldn't vote) in each poll taken since January 2020. The chart shows the Conservative party started off leading but Labour took the lead in late 2021 with the gap widest in autumn 2022. The chart also shows that Reform UK are currently in third place and the Lib Dems are in fourth. The Green Party is in fifth place. The SNP and Plaid Cymru are also shown in sixth and seventh place on Great Britain vote share but these parties only stand in Scotland and Wales.
