  • None Belgium are the first team to come from two or more goals down to win a World Cup knockout stage match within 90 minutes since Portugal beat DPR Korea in the 1966 quarter-final (0-3 down, 5-3 win).
  • None Belgium have reached the World Cup quarter-finals in successive tournaments for the first time.
  • None Belgium have never kept a clean sheet in their 12 World Cup knockout round matches, shipping 28 goals in total.
  • None Japan have scored six goals at Russia 2018, their highest ever tally in a single World Cup tournament.
  • None There were just four minutes and 16 seconds between Japan's two goals, and just four minutes and 30 seconds between Belgium's brace to level the scores.
  • None There have now been nine 90th-minute winning goals in the 2018 World Cup. There were just 10 in the previous five tournaments combined.
  • None Eden Hazard has been directly involved in 19 goals in his 18 games for Belgium under Roberto Martinez, scoring 10 and assisting nine.
  • None Takashi Inui is only the third player to have scored multiple goals in a World Cup tournament for Japan, after Junichi Inamoto in 2002 (2) and Keisuke Honda in 2010 (2).
  • None Both of Marouane Fellaini's World Cup goals for Belgium have been headers.
  • None Nacer Chadli scored his first goal in 11 games for Belgium, his previous effort coming against Estonia in June 2017.
