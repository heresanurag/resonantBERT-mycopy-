title: Excited Lioness superfan Tess attends the Euros final - BBC News
date: '2022-08-01'
section: General
url: http://www.bbc.co.uk/news/uk-62377048
content: |-
  She went viral after enthusiastically dancing to Sweet Caroline when England won their semi-final match.

  Eight-year-old Tess Dolan made her way to the Euros final at Wembley after being given tickets by the BBC.

  The England fan went viral on social media for enthusiastically singing and dancing to Sweet Caroline when England won 4-0 against Sweden in the semi-finals.

  After Tess's mum revealed they didn't have tickets to the final, the BBC arranged for them to go.
