title: '''Fake pills'' leave several seriously ill in Swansea hospital - BBC News'
date: '2021-07-08'
section: Wales
url: http://www.bbc.co.uk/news/uk-wales-57750448
content: |-
  It is thought tablets are being sold as Valium and Xanax, prompting a warning from health officials.

  The health board said it believed fake tablets were being sold as Valium and Xanax

  Fake prescription anti-anxiety pills are thought to have left several people seriously ill in hospital.

  Swansea Bay health board said they were taken to Morriston Hospital after overdosing on Wednesday.

  It said it believed the tablets were being sold illegally as Valium and Xanax in Swansea and Neath Port Talbot.

  South Wales Police said it was contacted by the health board on Wednesday evening and was carrying out an extensive investigation.

  It comes as a report warned of the number of fake pills being seen by health experts.

