title: 'Rotherham: Conspiracy theorist jailed over hotel riot - BBC News'
date: '2024-08-22'
section: South Yorkshire
url: http://www.bbc.co.uk/news/articles/cy8x5x51l3vo
content: |-
  Grandfather Peter Lynch is sent to prison after taking placard to protest and shouting abuse.

  A "conspiracy theorist" who abused police when an anti-immigration protest turned violent has been jailed. Grandfather Peter Lynch, 61, went to the Holiday Inn Express in Manvers, Rotherham, on 4 August with a placard which called police officers, MPs and the media "corrupt". He shouted "racist and provocative remarks" towards officers and called asylum seekers in the hotel "child killers", the Recorder of Sheffield Judge Jeremy Richardson KC told Sheffield Crown Court during his sentencing. Lynch pleaded guilty to a charge of violent disorder and was jailed for two years and eight months on Thursday.

  "Family man" Lynch, who recently had a heart attack, had gone to protest at the hotel against immigration, his defence barrister said. He had "a general conspiracy theory against anyone and any form of authority", and his placard referenced the "deep state" and space agency Nasa.

  Lynch was photographed with a placard which called some groups of people corrupt

  Video played to the court showed Lynch "revving up" the situation before it turned violent, the judge said. He was filmed calling the police "scum". His sign and protest was not unlawful, but his verbal abuse towards police officers during the "racist incident" crossed the line, the judge added. Lynch, of Burman Road, Wath-upon-Dearne, was a "full participant" in the disorder, the court was told. "You were unquestionably endeavouring to rev up the situation the best you could," Judge Richardson added. The placard stated that police chiefs, reporters, civil servants, judges and the Environment Agency were all "corrupt". Listen to highlights from South Yorkshire on BBC Sounds, catch up with the latest episode of Look North or tell us a story you think we should be covering here, external.
