title: Firefighters tackle wildfire on Chobham Common in Surrey - BBC News
date: '2020-08-07'
section: General
url: http://www.bbc.co.uk/news/newsbeat-53701645
content: |-
  Aerial footage from the area shows the scale of the fire.

  More than 20 emergency vehicles have been sent to tackle a wildfire on Chobham Common in Surrey.

  Local roads have closed to allow access for emergency vehicles.
