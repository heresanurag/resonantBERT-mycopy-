title: 'Canterbury: Homeless portraits form part of arts festival - BBC News'
date: '2024-10-08'
section: Kent
url: http://www.bbc.co.uk/news/articles/cpdqyd48d79o
content: |-
  Jason Knott's photos of Touching Lives charity go on display as part of Canterbury Festival.

  Clients, staff and volunteers at Catching Lives charity were snapped by Jason Knott over a year

  Portraits giving an insight into the lives of people experiencing homelessness are about to go on display in Kent as part of an arts festival. Photographer and filmmaker Jason Knott has spent a year with clients, staff and volunteers of the charity Catching Lives in Canterbury. His work for the Beyond The Margins exhibition will go on display as part of the Canterbury Festival, external from Friday for three weeks. Mr Knott said he was "slowly let into their worlds and heard each of the very individual journeys people had taken on their way to becoming homeless".

  He said: “To engage with the clients on this level - seeing them relax, smile, and noticing them hold eye contact for the first time - was such a huge moment for me, as trust is such a big issue. "The whole subject got under my skin."

  Beyond The Margins exhibition is on display as part of the Canterbury Festival

  Miriam Ellis, arts and activity coordinator at the charity, said: “His sensitive approach and patience have produced a series of compelling images that illustrate the lives of those who use our services and the volunteers who support us.” The exhibition will be shown at Rock Paper Scissors shop in Canterbury until 2 November.
