title: Trump tariffs booed in Canada as Trudeau calls for national unity - BBC News
date: '2025-02-02'
section: US & Canada
url: http://www.bbc.co.uk/news/articles/c3348gk8my0o
content: |-
  Canadians have begun booing the US anthem at sports games, signalling the depth of anger at steep tariffs issued by Trump.

  This video can not be played To play this video you need to enable JavaScript in your browser.

  A few hours after President Donald Trump announced that he would impose steep tariffs on Canada, hockey fans in the capital Ottawa booed the Star-Spangled Banner during a National Hockey League game against a visiting US team. On Sunday, during a National Basketball Association game between the Toronto Raptors and the Los Angeles Clippers, it happened again, continuing throughout the song and almost drowning out the 15-year-old singer's arena performance. The vocal displeasure from usually respectful fans is a clear sign of Canadians' deep dismay at Trump's move to hit its nearest ally with punitive taxes, which threaten to spark an unprecedented trade war on the North American continent. The 25% tariffs imposed by Trump on all Canadian imports into the US - with a lower 10% levy on energy - are set to take effect on Tuesday. And they come as President Trump doubles down on his push - no longer dismissed as a joke - for Canada to join America and become the 51st state.
