title: 'Brexit: Amber Rudd says she is committed to avoiding no deal - BBC News'
date: '2019-01-24'
section: UK Politics
url: http://www.bbc.co.uk/news/uk-politics-46991042
content: |-
  Cabinet minister doesn't rule out resigning over the issue but is backing the PM's deal as "best outcome".

  This video can not be played To play this video you need to enable JavaScript in your browser. Amber Rudd said there were "lots of moving parts" in Westminster at the moment

  Cabinet minister Amber Rudd has told the BBC she is "committed to making sure we avoid" a no deal Brexit and would not rule out resigning over it.

  The work and pensions secretary said she was "going to wait and see" whether the prime minister allowed MPs a free vote on potential options next week.

  Labour MP Yvette Cooper has tabled an amendment to delay Brexit if no deal is reached by the end of February.

  MPs heavily rejected the deal Theresa May agreed with the EU last week.

  The UK is due to leave the EU at 23:00 GMT on 29 March and the prime minister has faced repeated calls to rule out the prospect of leaving without a deal, if no agreement can be reached.

  She says it is not within the government's power to rule it out - but various backbench MPs will try to move amendments to postpone Brexit if no agreement can be reached, when the Commons votes on a way forward next Tuesday.

  This video can not be played To play this video you need to enable JavaScript in your browser. WATCH: John McDonnell: PM trying to 'blackmail' MPs on Brexit

  Ms Rudd returned to the cabinet in November, less than seven months after quitting as home secretary in April 2018 over the Windrush scandal.

  She told the BBC's Newsnight that she wanted MPs to get a free vote on the various amendments - but would not say if she would resign her ministerial post to back an amendment from Labour's Yvette Cooper.

  The amendment would give time for a bill to suspend the Article 50 process for leaving the EU to the end of the year, if a new deal has not been agreed with Brussels by the end of February.

  Ms Rudd said the "best outcome" was for MPs to support Mrs May's deal and "every day in Parliament we hear about MPs who voted against the withdrawal agreement who are reconsidering".

  Pressed on whether she would quit to block no deal, she said: "I think it's too early for anyone to make those sort of commitments because at the moment there is a lot of change going on.

  "I have called for a free vote for the amendments on Tuesday and we'll see what position the government takes."

  Meanwhile, Chancellor Philip Hammond told an audience of business people on Thursday: "In the 2016 referendum, a promise was made to the majority who voted for Brexit - that they were voting for a more prosperous future.

  "Not leaving would be seen as a betrayal of that referendum decision.

  "But leaving without a deal would undermine our future prosperity, and would equally represent a betrayal of the promises that were made."

  The chancellor, who like Ms Rudd campaigned for a Remain vote during the 2016 EU referendum, said: "The only sustainable solution is a negotiated settlement with the EU."

