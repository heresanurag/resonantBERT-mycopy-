content: |-
  Comments from Sir Keir Starmer on the public finances ahead of Labour's annual conference are among stories on the front of Sunday's newspapers.

  'No more austerity' and 'Sir Shameless at it again'

  Prime Minister Sir Keir Starmer and Deputy Prime Minister Angela Rayner arrive ahead of the Labour Party conference in Liverpool

  Images of Sir Keir Starmer feature on several of Sunday morning's front pages as Labour prepares to hold its first conference in government for 15 years amid reports of infighting at Downing Street and a row over political donations. The Sunday Telegraph, external has spoken to an unnamed senior Whitehall source who claims the Prime Minister has four weeks to prove his government is not "fundamentally dysfunctional". The Sunday Express, external says allies of Sir Keir have urged him to sack his chief-of-staff, Sue Gray, to end what it calls the "turf war" raging in Number Ten. With the headline, "Sir Shameless Is At It Again!", the Mail on Sunday, external says the prime minister enjoyed free corporate hospitality at Tottenham's Premier League game last weekend against Arsenal - just hours after allegations emerged about clothes he and his wife had accepted from the Labour donor, Lord Alli.

  The PM became embroiled in a freebies row after it emerged he and his wife had accepted free clothing from the Labour donor, Lord Alli.

  The Sunday Times, external claims the deputy prime minister, Angela Rayner, may have breached parliamentary rules by failing to declare that a friend joined her on a "personal holiday" funded by Lord Alli. She declined to comment when approached by the Times. Writing in the Sun on Sunday, external, former Labour minister Lord Blunkett warns "perception is everything in politics". He goes on to say the prime minister is "at serious risk of being far too funereal" -- and calls on him to "weave a compelling story about a better Britain under Labour". In an interview with the Observer, external Sir Keir says the central purpose of his conference speech will be "to answer that very question". The paper says the PM also had a reassuring message for those who fear deep cuts to government spending - insisting he will protect public services from fresh austerity. Elsewhere, the Sunday People, external claims bosses at Britain's biggest cancer charity are reviewing their relationship with Mohamed Al Fayed's foundation, after numerous sexual assault allegations were made against the late billionaire.

