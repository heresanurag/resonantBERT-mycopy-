title: Pollster explains why Iowa poll suggests Kamala Harris is leading - BBC News
date: '2024-11-04'
section: General
url: http://www.bbc.co.uk/news/videos/c2dlen5w91zo
content: |-
  Ann Selzer spoke to BBC News about why Harris's lead may be attributed to women voters.

  A new poll of voters in Iowa suggests that Kamala Harris is leading with 47% over Donald Trump's 44%.

  The survey was released by the highly regarded pollster Ann Selzer, who regularly carries out surveys for the Des Moines Register newspaper, and it questioned 808 likely voters in the state.

  Harris's lead, driven by women and independent voters, is still within the margin of error, 3.4 percentage points.

  "You'll note that neither of the major candidates gets to 50%, so there's still a little squishiness in what could actually happen come Tuesday," Selzer told BBC News.

  Trump won Iowa by nearly 10 points in each of the last two elections.
