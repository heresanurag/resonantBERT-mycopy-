  But for now, for them, it is a nice conundrum to have, after a near decade of near irrelevance. They will make the most of this moment and perhaps little wonder. In the last 15 years, the four biggest parties in UK politics have all experienced the highest of highs and the lowest of lows. Labour went from their biggest defeat since 1935 in 2019, to a stonking majority in July. The Conservatives went from a huge win in 2019 to the worst in its parliamentary history. The Scottish National Party had 56 MPs in 2015, every seat bar three in Scotland. And the Liberal Democrats went from coalition government in 2010, to near wipe out in 2015, to Himalayan political altitude now. Who knows what is around the corner for any of them. They all conclude it’s worth smiling when you can.
