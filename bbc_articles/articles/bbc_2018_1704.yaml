id: bbc_2018_1704
title: Two bodies found on Malltraeth beach in Anglesey identified - BBC News
date: '2018-02-10'
section: North West Wales
url: http://www.bbc.co.uk/news/uk-wales-north-west-wales-43003604
content: |-
  Police have confirmed the men found at Malltraeth in Anglesey are not from the north Wales area.

  The bodies of two men found on an Anglesey beach on Friday morning have been identified and are not from the north Wales area, police have said.

  Officers were called to the beach at Malltraeth at about 11:45 GMT and North Wales Police are now in the process of contacting their next of kin.

  Police think it may be linked to the discovery of a human foot on a beach near Bangor on Wednesday.

  Officers are currently treating the deaths as "unexplained".

  Det Insp Gerwyn Thomas of Caernarfon CID says police are carrying out an "investigation to establish the circumstances" of the deaths.

  The Irish Police have confirmed there are no reports of missing people off the Irish coast in the last week.

  Human remains found at Y Felinheli beach on Wednesday morning are understood to be the right foot of a man.

  The Anglesey discovery may be linked to another find on a beach near Bangor on Wednesday
