title: 'France floods: 1,600 forced to evacuate - BBC News'
date: '2018-08-10'
section: General
url: http://www.bbc.co.uk/news/world-europe-45139167
content: |-
  The floods caused the evacuation of around 1,600 people, most of them campers.

  Heavy floods have forced the evacuation of 1,600 people - most of them campers - in southern France, officials say.

  A 70-year-old German man who was helping to supervise children at a summer camp is missing.
