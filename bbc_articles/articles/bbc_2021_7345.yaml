title: 'Covid Victoria: ''Swab dogs'' spread joy in Melbourne lockdown - BBC News'
date: '2021-06-05'
section: General
url: http://www.bbc.co.uk/news/world-australia-57340316
content: |-
  Tiffany White runs a popular Instagram account documenting the dogs that visit Covid testing sites.

  Pathology worker Tiffany White works at drive-through Covid testing centres across the city of Melbourne, Australia. She noticed people bringing their dogs along for the ride and started taking their pictures.

  Those photogenic pooches make up the popular Instagram account "Swab Dogs". It's bringing a little bit of joy to the workers - and plenty of others - as they battle through the city's latest Covid outbreak and yet another lockdown.
