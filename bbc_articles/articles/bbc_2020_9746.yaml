title: 'In pictures: Europe swelters under near-record temperatures - BBC News'
date: '2020-08-02'
section: Europe
url: http://www.bbc.co.uk/news/world-europe-53626012
content: |-
  Heat wave alerts were issued in several countries as temperatures rose to 40C this weekend.

  Much of Europe has been basking in a mini-heat wave since Friday, and countries like the UK, France and Spain have experienced near-record temperatures.

  But with lockdowns and social distancing measures in place across the continent, this is a summer like no other.

  In Spain's capital, Madrid, face masks are compulsory due to an outbreak of cases - and coverings must be worn even during the heat

  A woman refreshes herself in the Spanish city of Córdoba where temperatures reached 40C

  People sunbathing while social distancing in London, UK, where temperatures hit 34C on Friday

  Locals have also been enjoying the beaches in Nijmegen in the Netherlands

  Residents have been finding creative ways to stay cool in Paris. France put 13 eastern areas of the country on alert due to the heat

  The authorities in Rome warned the elderly and children not to go out at the hottest times of the day because of dangerous temperatures

  People have been taking advantage of fountains to stay cool in Rome

  People have been diving into the sea in Barcelona, Spain, where authorities issued an orange alert for temperatures of up to 40C

  A heat wave alert was also issued for areas of southern Switzerland, including Geneva
