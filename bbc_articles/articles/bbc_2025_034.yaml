  Onlookers line the Embankment in central London for a fireworks spectacular.

  The traditional bongs of Big Ben have ushered in 2025 as onlookers lined the Embankment in central London for a fireworks spectacular.

  Paddington Bear made a cameo appearance at the London Eye to play his part in the UK's celebrations for the new year.

  For more, follow the BBC's live coverage as UK ushers in new year despite bad weather hitting major events.

  Also, take a look at images of New Year 2025 celebrations from around the world.
