  A number of properties were also evacuated as a precaution, emergency services said.

  This video can not be played To play this video you need to enable JavaScript in your browser. One man was taken to hospital for treatment after the incident in Dunfermline's Dewar Street.

  A number of homes have been evacuated in Fife following a suspected gas explosion.

  Firefighters were called to tackle a blaze at one property on Dewar Street, Dunfermline, at about 13:50.

  Police confirmed one man had been taken to St John's Hospital for treatment and a number of properties had been evacuated as a precaution.

  The street was closed while inquiries were carried out.
