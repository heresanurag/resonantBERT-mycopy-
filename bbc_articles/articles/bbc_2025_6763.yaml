  For Canadians tuned in to issues facing the country beyond Trump and his tariffs, the debate offered substantive policy discussions on topics from housing to crime to immigration. It was clear that Canadians have starkly different choices before them. Poilievre frequently championed his vision of a small government that would keep taxes low to drive up economic growth and affordability for Canadians, and that would be tough on crime.
  • None 'My home is worth millions but my kids can't afford to live here' Singh, meanwhile, pushed for stronger social programmes in Canada, including expanding the country's national dental care and pharmacare programmes and other healthcare spending. Carney stuck close to the centrist point of view of his party. "Government can play a role, but its role has to be catalytic," he said during a segment on strong leadership in a crisis.

  Canada's political system, similar to that of the UK, has several political parties - the centrist Liberals, the right-leaning Conservatives, the left-leaning New Democrats, and the Bloc, which only runs candidates in Quebec. There is also the Green Party, which was disqualified at the last minute from the debate for not running enough candidates. But polls suggest that in this election, the bulk of Canadians are opting to support either the Conservatives or the Liberals. This has left the third-place parties fighting for survival. National polls have Singh's New Democrats polling at 8.5% - which could roughly translate to just five seats out of 343, a major loss from their current 24 seats. Singh pushed to make his voice heard, repeatedly interrupting both Poilievre and Carney in a bid to set his party apart as the choice for left-wing voters. "You can't entrust all the power to Mr Carney," Singh remarked. Meanwhile, Bloc leader Blanchet inserted issues relevant to the French-speaking province at every opportunity. His party, too, stands to lose at least a dozen seats in Quebec, according to current polling.

  Despite the frequent crosstalk, the tone overall was rather cordial. The general sense of decorum was apparent when the leaders were discussing the housing crisis. In a rebuttal to Poilievre, Carney appeared to stop himself before laying into his opponent. "A misunderstanding... ," Carney said as he paused mid-sentence, adding: "I'll be polite." Even after some heated exchanges, Carney and Poilievre were filmed shaking hands and laughing afterwards. Not only was it strikingly different to some recent presidential debate cycles in the US, it was even friendlier than some past Canadian federal debates.
