  The leaders were asked about how they would negotiate with Trump and respond to his tariffs on Canada. The US president has implemented blanket 25% tariffs on goods from Canada, with an exemption on products covered by the USMCA - a North American free trade deal. Canada is also hit with global US tariffs on steel and aluminium and cars. The president has also publicly spoken about Canada becoming the 51st US state. Canada's government has previously said its position is to implement "dollar-for-dollar" tariffs with the aim of inflicting maximum pain on the US economy.
  • None What Trump really wants from Canada But during the debate, the leaders appeared to concede it is ultimately not an equal fight. "We've moved on from dollar-for-dollar tariffs," Carney said, acknowledging that the US economy is more than 10 times the size of Canada's. The Liberal leader said the focus would shift to targeted tariffs designed to maximise pain on the US and hurt Canada as little as possible. Trump appears to have softened his language on Canada in recent weeks. After a phone call with the US president in late March, Carney said Trump "respected Canada's sovereignty" and that their conversation was "constructive". Canada and the US are expected to start talks on trade and security after the 28 April election.

