content: |-
  There were two ghosts in the room during Canada's federal election debate - Justin Trudeau and Donald Trump.

  This video can not be played To play this video you need to enable JavaScript in your browser.

  The leaders of Canada's four major federal parties have squared off in their second and final debate ahead of this month's general election. But it was someone off stage who stole much of the spotlight - US President Donald Trump. A big question heading into the two-hour forum was whether Liberal leader Mark Carney, who has been leading in the polls, would stumble. Carney, the former governor of the Bank of England, managed to survive Wednesday's French debate despite being less proficient in the country's second-most spoken language. On Thursday, he found himself placed on the spot repeatedly by his three opponents: Conservative leader Pierre Poilievre, New Democratic Party leader Jagmeet Singh and Bloc Québécois leader Yves-Francois Blanchet. How to respond to Canada's ongoing trade war with the US was a theme, but the debate also saw clashes on affordability, crime and the environment. Here are five big takeaways from Thursday's primetime showdown:

  Carney's opponents were quick to focus on the mistakes of his unpopular predecessor, former Prime Minister Justin Trudeau. Conservative leader Poilievre made references to the "lost Liberal decade", talking about the last 10 years when the Liberal party has been in power. He cited issues like housing affordability and the high cost of living to drive his point home. "How can we possibly believe that you are any different?" Poilievre asked Carney. Blanchet also threw down the gauntlet to Carney. "You claim you are different - you need to prove you are better." Carney was forced to defend himself multiple times, noting that he has only been in the prime minister's chair for one month despite sharing the same party banner as Trudeau. "I am a very different person than Justin Trudeau," Carney said.
