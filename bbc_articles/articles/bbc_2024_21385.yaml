  Who has made Troy's Premier League team of the week?

  After every round of Premier League matches this season, BBC football pundit Troy Deeney will give you his team and manager of the Week. Here are this week's choices. Do you agree? Give us your thoughts using the comments form at the bottom of this page.

  Alisson (Liverpool): He was the only goalkeeper to keep a clean sheet. Liverpool were all over Manchester United from start to finish.

  Lamare Bogarde (Aston Villa): I've gone a bit different at the back. He made his debut for Aston Villa and handled himself very well. Virgil van Dijk (Liverpool): He got a clean sheet and was a monster once again. He was a colossal force at the back. He oozes quality and Liverpool need to tie him down on a new contract. Nathan Collins (Brentford): Was very good for Brentford and assisted the goal that was given to Yoane Wissa. He was good in both boxes. Andy Robertson (Liverpool): He had a really good game in a dominant Liverpool performance.

  Jean-Ricner Bellegarde (Wolves): He scored an absolute screamer if you have not seen it! Amadou Onana (Aston Villa): I was at this game and he was miles better than anybody else. He ran through people. When he came off, Aston Villa looked like they could lose the game. He had been running away from people and putting in massive tackles. Eberechi Eze (Crystal Palace): I've put him in as my number 10 because he was brilliant. What a hit for his goal too!

  Mohamed Salah (Liverpool): He got a goal and two assists. His second assist was a great pass inside. He caused Manchester United problems all day. It was a lovely finish for his goal to top off what has been a fantastic season so far. Erling Haaland (Manchester City): The main man up front. I tried to find someone else but you can't score back-to-back hat-tricks and not get in the team of the week. Luis Diaz (Liverpool): The two Liverpool wingers tormented Manchester United. Diaz got two goals and was excellent.

  Arne Slot (Liverpool): He has been a monster. He handled the game really well and Liverpool dominated Manchester United from start to finish I thought.

