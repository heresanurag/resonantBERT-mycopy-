  Surrey’s Atkinson was made to wait for his Test bow, carrying the drinks for the entire series in India earlier this year, but since getting his chance against the Windies, he has become a fixture in the England team. His 12-106 are the fourth-best bowling figures by a Test debutant and set him on the way to being man of the series. Now, strokeplay fitting of a player higher in the order means Atkinson has a five-wicket innings, 10-wicket match and a century inside only five days of Test cricket at this famous venue. Overall, he became just the sixth man to earn a place on all three Lord’s honours boards. The first ball of the day, bowled by Kumara, was clipped fine by Atkinson for four. The next ball was driven on the up for four. The third delivery was given lbw, only for the review to show it missing leg stump and bring a relieved cheer from the expectant crowd. On 99, Atkinson fiddled nervously at Kumara and could have given an edge. He followed up with a drive through mid-off for four to bring up three figures in 103 deliveries, the sixth-fastest Test hundred on this ground. A stand of 85 with Potts was ended when Potts edged Asitha Fernando behind for 21, then came Rathnayake’s flying catch running back toward the mid-wicket rope to hold Atkinson’s top-edge. Stone was caught at fine leg to give Fernando his fifth wicket and conclude England’s innings, the hosts having added 211 runs from their 216-6 on Atkinson’s arrival at the crease.

  This video can not be played To play this video you need to enable JavaScript in your browser. Stone bowls Karunaratne for his first Test wicket since June 2021

  In the rebuilding of England’s pace attack, this is their first Test at Lord’s without one of James Anderson or Stuart Broad for 17 years. In their absence, a new-look foursome were superb. Each of Atkinson, Potts, Stone and Chris Woakes held a full length to ask questions the Sri Lankans had no answer to. Nishan Madushka chopped on off Woakes, while Dimuth Karunaratne did similar to Stone’s seventh delivery back in Test cricket. In the same Stone over, Pathum Nissanka tamely turned to leg slip. Potts produced the best delivery of the day, nipping down the slope to trim Angelo Mathews’ off stump and three balls later had captain Dhananjaya de Silva held at second slip. When Dinesh Chandimal was caught on the leg side off Atkinson, Sri Lanka were in tatters. Left-hander Kamindu, though, is another who has made a superb start in Test cricket and seems too low in the order at number seven. He marshalled partnerships of 31 with Rathnayake, 35 with Prabath Jayasuriya and 42 with Kumara, of which Kumara scored none. As Stone tested him with bouncers, Kamindu hooked two sixes and top-edged another maximum that struck a spectator in the pavilion. Kumara was run out by Pope’s direct hit from the next delivery, then Kamindu miscued Atkinson to mid-off.

