  England bowler Gus Atkinson, speaking to BBC Test Match Special: "It's very surreal! I've always thought of the Lord's honours board growing up and pictured myself up there for my bowling, so it's incredible to see myself up there with the bat! I couldn't ask for more." Former England spinner Phil Tufnell: "A fabulous day of Test cricket, it had it all. "It is a day Gus Atkinson will remember for the rest of his life." Former England captain Michael Vaughan: "Every shot Atkinson played was perfection. He must be a brilliant poker player as he gives absolutely nothing away. "As good a hundred I have ever seen." Ex-Sri Lanka all-rounder Russel Arnold: "A very tough day. Atkinson piled on the agony this morning and you could see the Sri Lankans getting frustrated in the field, which then translated into the batting."

