content: |-
  Gus Atkinson continues the sensational start to his career with a maiden century as England utterly dominate the second day of the second Test against Sri Lanka at Lord’s.

  This video can not be played To play this video you need to enable JavaScript in your browser. Watch highlights of England v Sri Lanka on day Two of second Test

  Second Test, Lord's (day two of five)

  Gus Atkinson continued the sensational start to his career with a maiden century as England utterly dominated day two of the second Test against Sri Lanka at Lord’s. Atkinson, who took 12 wickets on debut against West Indies on this ground last month, became the first England number eight to make a Test ton in 11 years, before joining a pace quartet that laid waste to the Sri Lanka top order. The 26-year-old, playing only his fifth Test, needed 22 deliveries on Friday morning to move from an overnight 74 to his first century in professional cricket. Only two England number eights have made more than Atkinson’s 118 in Tests and it took a breathtaking diving catch by Milan Rathnayake to dismiss him as part of the home side's eventual 427 all out. In blameless conditions, Sri Lanka should have made England work hard, only to fold in the face of some relentless pace bowling. Olly Stone took two wickets in an over in his first Test for more than three years, while Matthew Potts repeated the dose in a calamitous spell when Sri Lanka crashed from 83-3 to 87-6. Resistance came from Kamindu Mendis, who followed up his century in the first Test with a defiant 74. His was the last wicket to fall to leave Sri Lanka 196 all out, 231 behind. England opted against the follow-on and Dan Lawrence felt aggrieved to be caught behind for seven. Ollie Pope joined Ben Duckett and England closed on 25-1, a lead of 256.

