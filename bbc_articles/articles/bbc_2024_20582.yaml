  England are racing towards their fifth successive Test win and an unassailable 2-0 lead in the series. For Sri Lanka, this was a chastening day, one that left them ruing their decision to bowl first. The tourists battled hard before being beaten in the first Test, yet had little stomach for the fight on this second afternoon at Lord’s. Atkinson and Kamindu proved that run-scoring could be straightforward on a placid surface, but Sri Lanka were left wanting by England’s ability to find just enough movement. Even as Kamindu counter-punched, stand-in England captain Ollie Pope’s biggest decision was whether or not to bat again. The last time England enforced the follow-on, against New Zealand in Wellington last year, they suffered a historic and thrilling one-run defeat. Pope’s choice gave another chance to makeshift opener Lawrence and his inside edge off Lahiru Kumara was correctly detected on review. That brought the skipper to the crease for his opportunity to prove he can combine leadership with runs at number three.

