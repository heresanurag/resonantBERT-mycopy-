title: First British tourists allowed back into North Korea tell BBC what they saw
  - BBC News
date: '2025-03-02'
section: Asia
url: http://www.bbc.co.uk/news/articles/c0jggdnej0do
content: |-
  Travellers enter a mini capitalist enclave far from Pyongyang, on a tightly controlled visit.

  First British tourists allowed back into North Korea tell BBC what they saw

  The local guides have to follow a strict, pre-approved schedule - which on this tour included a visit to a new, fully stocked pharmacy

  Don't insult the leaders. Don't insult the ideology. And don't judge. These are the rules tour guides read out to Western tourists as they prepare to drive across the border into North Korea, arguably the most secretive and repressive country in the world. Then there is the practical information. No phone signal, no internet, no cash machines. "The North Koreans aren't robots. They have opinions, goals, and a sense of humour. And in our briefing we encourage people to listen to and understand them," says Rowan Beard, who runs Young Pioneer Tours, one of two Western companies which resumed trips to the country last week, after a five-year hiatus.

  Rowan and a handful of other tour leaders have been allowed to restart operations

  North Korea sealed its borders at the outset of the pandemic, shutting out diplomats, aid workers and travellers, and making it nearly impossible to know what was happening there. Since then, it has further isolated itself from most of the world, relying on support from Russia and China. Many doubted whether Westerners would ever be allowed back. But after years of cajoling and several false starts, Rowan and some other tour leaders were given the green light to restart operations. He pulled together a group of eager travellers in just five hours, desperate to not miss the opportunity. Most were vloggers and travel addicts, some wanting to tick the final country off their list, along with the odd North Korea enthusiast. Last Thursday the tourists, from the UK, France, Germany and Australia, drove over the border from China into the remote area of Rason for a four-night trip.

  Tourists from the UK, France, Germany and Australia drove over the border for a four-night trip

  Among them was 28-year-old British YouTuber Mike O'Kennedy. Even with its reputation, he was startled by the extreme level of control. As with all trips to North Korea, the tourists were escorted by local guides, who followed a strict, pre-approved schedule. It included carefully choreographed trips to a beer factory, a school, and a new, fully stocked pharmacy. Ben Weston, one of the tour leaders from Suffolk, likened visiting North Korea to "being on a school trip". "You can't leave the hotel without the guides," he said. "A couple of times I even had to let them know when I wanted to use the bathroom," said Mike. "I've never had to do that anywhere in the world."

  Despite the chaperoning, Mike was able to spot snippets of real life. "Everyone was working, it didn't feel like anyone was just hanging out. That was kind of bleak to see." On his trip to the school, a group of eight-year-olds performed a dance to animations of ballistic missiles hitting targets. A video of the spectacle shows girls and boys with red neckties, singing, while explosions flare on a screen behind them.

  Mike saw a group of eight-year-olds performing a dance to animations of ballistic missiles

  For now, tourists are being kept well away from the capital Pyongyang. Greg Vaczi from Koryo Tours, the other tour company allowed back in, admits the current itinerary lacks the "big-hitting monuments" of Pyongyang. He suspects authorities have chosen Rason as their guinea pig because the area is relatively contained and easy to control. Set up as a special economic zone, to trial new financial policies, it operates as a mini capitalist enclave inside an otherwise socialist state. Chinese businesspeople run joint enterprises with North Koreans, and can travel in and out fairly freely. Joe Smith, a seasoned North Korea traveller and former writer for the specialist North Korea platform NK News, was there on his third trip. "I feel like the more times you visit the less you know. Each time you get a little peek behind the curtain, which just leaves you with more questions," he said. Joe's highlight was a surprise off-agenda visit to a luxury goods market, where people were selling jeans and perfumes, along with fake Louis Vuitton handbags and Japanese washing machines, probably imported from China. Here, the tourists were not allowed to take photos - an attempt to hide this consumer bubble from the rest of the country, they suspected. "This was the only place people weren't expecting us," Joe said. "It felt messy and real; a place North Koreans actually go. I loved it."

  But according to the experienced tour leaders, the group's movements were more restricted than on previous trips, with fewer opportunities to wander the streets, pop into a barbershop or supermarket, and talk to locals. Covid was often cited as the reason, said Greg from Koryo Tours. "On the surface they are still concerned. Our luggage was disinfected at the border, our temperatures were taken, and about 50% of people are still wearing masks." Greg cannot work out whether the fear is genuine, or an excuse to control people. It is thought Covid hit North Korea hard, though it is difficult to know the extent of the suffering. Local guides repeated the government line that the virus entered the country in a balloon sent over from South Korea, and was swiftly eradicated in 90 days. But Rowan, who has been to North Korea more than 100 times, sensed that Rason had been impacted by the tough Covid regulations. A lot of Chinese businesses had closed, he said, and their workers had left. Even Joe, the experienced North Korea traveller, commented on how dilapidated the buildings were. "Places were dimly lit and there was no heating, apart from in our hotel rooms," he said, noting a trip to a cold, dark and deserted art gallery. "It felt like they opened the doors just for us."

  Some tourists thought Rason - the area they visited - looked dilapidated, with "awful" roads and run-down buildings

  The regime's photographs might make North Korea look clean and shiny, Joe said, but in person you realise "the roads are awful, the pavements are wobbly, and the buildings are weirdly constructed". His hotel room was old-fashioned and filthy, he said, resembling "his grandma's living room". The whole window was cracked. "They've had five years to fix things. North Koreans are so sensitive about what they show tourists. If this is the best they can show, I dread to think what else is out there", he said. Most of the country is kept well hidden, with more than four in 10 people believed to be undernourished and needing help.

  Joe said his hotel room resembled "his grandma's living room"

  One of the few chances tourists in North Korea get to interact with local people is through their guides, who sometimes speak English. On these recent trips they were surprisingly well-informed, despite the regime's intense propaganda machine and information blockade. This is probably because they speak to the Chinese businesspeople who come and go, said Greg. They knew about Trump's tariffs and the war in Ukraine - even that North Korean troops were involved. But when Joe showed a photo from Syria, his guide was unaware President Assad had been toppled. "I carefully explained that sometimes when people don't like their leader, they rise up and force them out, and at first he didn't believe me." Such conversations need to be delicately handled. Strict laws prevent North Koreans from speaking freely. Ask or reveal too much and the tourists might put their guide or themselves at risk.

  Mike said that conversations with the guides about international politics had to be handled carefully

  Mike admits there were times this made him nervous. On a trip to a North Korea-Russia Friendship House, he was invited to write in the visitors' book. "I went blank and wrote something like 'I wish the world peace.' Afterwards my guide told me that was an inappropriate thing to write. That made me paranoid," he said. "Generally, the guides did a great job of making us feel safe. There were just a couple of moments when I thought, this is bizarre." For Greg from Koryo Tours, these interactions bring a deeper purpose to North Korea tourism: "North Koreans get the chance to engage with foreigners. This allows them to come up with new ideas, which, in a country this closed, is so important." But tourism to North Korea is contentious, especially as travellers have been allowed back before aid workers and most Western diplomats, including the UK's. Critics, including Joanna Hosaniak from the Citizens Alliance for North Korean Human Rights, argue these trips mainly benefit the regime. "This is not like tourism in other poor countries, where local people benefit from the extra income. The vast majority of the population don't know these tourists exist. Their money goes to the state and ultimately towards its military," she said. One conversation has stuck in YouTuber Mike's head. During his trip to the school, he was surprised when a girl, after meeting him, said she hoped to visit the UK one day. "I didn't have the heart to tell her that her chances were very, very slim," he said.
