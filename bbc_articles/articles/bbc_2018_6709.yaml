  "Be careful there son - the last time I let a fan put themself in my shoes, they just took off running & sold them on Ebay," Hamill wrote.

  Boyega attended the Met Gala with his friend Letitia Wright, who stars in Black Panther

  Boyega's most recent post reads: "EP 9 loading... see ya!" - referring to the fact he's working on the new Star Wars film.

