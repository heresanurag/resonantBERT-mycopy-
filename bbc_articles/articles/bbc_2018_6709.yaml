  Kelly Marie Tran, who played Rose Tico in 2017's The Last Jedi, suffered racist and sexist abuse on social media. She later deleted all her Instagram posts.

  But Boyega replied to a message asking why Tran had deleted Instagram by writing: "Kelly is an adult and has made her decision. I haven't spoken to her so I am just as clueless. Just accept that you don't know, as I have."

  Ridley quit the platform in 2016 after being criticised for a post about gun violence in the US.

