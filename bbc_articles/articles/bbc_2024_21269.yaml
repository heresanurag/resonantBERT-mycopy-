title: 'Greater Manchester disorder: Twenty-two people police want to find - BBC News'
date: '2024-08-09'
section: Manchester
url: http://www.bbc.co.uk/news/articles/c74jl82445xo
content: |-
  Greater Manchester Police issues images of people they want to trace in connection with violent disorder.

  Twenty-two people police want to find over disorder

  Greater Manchester Police have issued images of a number of people over disturbances

  Police have released images of people detectives want to speak to over violent disorder in Greater Manchester. Greater Manchester Police want to talk to five people over a disturbance in the city centre's Piccadilly Gardens on Saturday, as well as six men in relation to a riot on Mosley Street, also in the city centre. The force has issued images of 10 people following disorder in Bolton town centre on Sunday. It has also released a picture of a man they want to speak to after disorder on Oldham Road, Newton Heath, on 31 July.

  Detectives have appealed for anyone who knows the people in the images to contact the force

  Disturbances broke out in Manchester city centre on Saturday when following anti-immigration and anti-fascism demonstrations. In Bolton, fireworks, bottles, tiles and eggs were thrown as rival groups clashed on Sunday. Rioting was sparked by misinformation online that the suspect in the fatal stabbing of three girls in Southport on 29 July was a Muslim asylum seeker.

  An image of a man police want to trace over disorder in Newton Heath has also been released

  GMP has made about 50 arrests in connection with disorder. Smoke bombs and other missiles were thrown during unrest in Bolton town centre on Sunday, with lines of police separating two groups, one including mainly Asian men and the other waving England flags. Police have released 10 images of people they would like to identify as part of the investigation.

  GMP would like to identify these people in relation to the Bolton disorder

  About 300 people attended an anti-immigration protest outside Bolton Town Hall on Sunday when about 300 people with their faces covered, some of them shouting "Allahu Akbar", an Arabic phrase meaning God is greatest, ran towards them.

  Images of two men police would like to speak to in relation to the Bolton unrest

  Rabnawaz Akbar from the Manchester Council of Mosques said he wanted to reassure people that those who "feel diversity is a strength far, far outnumber those who seek to divide". Bishop of Salford, John Arnold, whose diocese includes Bolton, also said violence on the streets came from a "small, vocal minority".

  Four more CCTV stills police have released in connection with the Bolton disorder

  Mounted police and officers in riot gear were seen keeping rival protesters and other groups apart at protests across Manchester. Demonstrations were held in Piccadilly Gardens in Manchester on Saturday, which saw the force make five arrests. GMP has released five images of people they would like to identify in relation to disorder which broke out in Piccadilly Gardens.

  Police would like to identify these two men in relation to disorder in Piccadilly Gardens

  Chief Constable Stephen Watson said he expected further arrests, adding that while some people had attended for "peaceful protest", others had set out to "cause trouble" in the gardens.

  Three men police would like to identify following violent protests in Piccadilly Gardens

  Mr Watson said those arrested came from "all political and cultural backgrounds". Lawbreakers would face "consequences for inciting hate and causing damage", he added. Meanwhile, the force praised peaceful protesters who they said showed "great defiance to disorder and intolerable behaviour" in demonstrations on Wednesday evening.
