  Gareth Barry made his 633rd Premier League appearance on Monday, breaking Ryan Giggs' record. But how much do you know about him?

  Gareth Barry: 633 Premier League games, but how much do you know about him? Last updated on .From the section Football

  Gareth Barry's Premier League career has spanned more than 7,000 days From starting out in the Aston Villa back three to winning the title with Manchester City, Barry has racked up the miles and the milestones. But how well do you know his career? Take our quiz and find out.
