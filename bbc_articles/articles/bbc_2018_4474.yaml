title: 'Commonwealth Games: Nick Miller and Olivia Breen win gold medals - BBC Sport'
date: '2018-04-08'
section: Commonwealth Games
url: http://www.bbc.co.uk/sport/commonwealth-games/43687706
content: |-
  England's Nick Miller and Wales' Olivia Breen secure Commonwealth golds on the opening day of athletics at Gold Coast 2018.

  Mark Dry and Nick Miller were two of six home nations athletes competing in the hammer final

  England's Nick Miller and Wales' Olivia Breen secured Commonwealth golds with new Games records on the opening day of athletics at Gold Coast 2018. Miller, 24, initially struggled before following up a 76.48m throw with a huge 80.26m effort that set a new British record as well as shattering the 12-year-old Games mark by 2.73m. Breen sealed gold with a superb 4.86m leap on her sixth attempt. The 21-year-old's victory is Wales' third gold of the Games. It follows Elinor Barker's points race win in the velodrome and weightlifter Gareth Evans' success. Elsewhere England's Asha Philip won her women's 100m semi-final in 11.21 seconds with team-mate Adam Gemili also booking his place in Monday's men's final with a run of 10.11. Gemili chased home Yohan Blake, the second-fastest man of all time and fastest man into the final, as the Jamaican won their semi-final in 10.06.

