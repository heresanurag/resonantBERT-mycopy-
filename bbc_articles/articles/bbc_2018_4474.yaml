  But on the opening afternoon of athletics action, Miller's gold was the world-class performance. He had extended his British record this season with a world-leading throw of 78.29m in the United States in March. His latest milestone underlines his credentials as one of Britain's brightest medal prospects for this year's European Championships, next year's World Championships and the Tokyo Olympics. Only three-time world champion Pawel Fajdek and fellow Pole Wojciech Nowicki managed better during 2017. After identifying an 80m-plus throw and a Commonwealth gold as his twin goals for 2018, Miller will now have to reassess where he aims his efforts next. "It is just incredible to win the gold," he said. "Things got a little more serious last year. I got married and that changed my perspective on things. "Everything seems to be slotting in to place and this result is the end of a lot of effort over the past year." Elsewhere, Breen repeated her London 2017 victory over Australia's Erin Cleaver in the T38 long jump. She beat Cleaver to gold at the World Para-athletics Championships in London by 20cm, and the victory was more conclusive this time with a personal best on the last round giving her a winning margin of half a metre. The Guildford-born athlete, who contracted a meningitis-type illness at birth and was diagnosed with cerebral palsy aged two, overcame a hamstring tear at the end of last year as she prepared for the Games.

