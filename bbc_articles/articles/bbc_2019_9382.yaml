  'A freak', 'incredible', 'extraordinary' - what they said

  Player of the match Ben Stokes on BBC Test Match Special: "It hasn't quite sunk in. I know we've won the game but I'm pretty tired. A great day.

  "We came in to the day with a chance but it's never over until it's over. At nine down with 70 left it was obvious what was to be done. I only got nervous when we were down below 10 needed but I had my pitching wedge at a perfect length.

  "I couldn't look when Jack Leach was batting. I was just waiting for the reaction of the crowd! It's amazing."

  England captain Joe Root on TMS: "Ben Stokes is a freak; he's incredible. To win a game on your own from there is just amazing.

  "That will not sink in for a while. We've still got two Tests to play after this! It's crazy."

  England's Stuart Broad on Sky Sports: "It was one of those 'I was there' moments. It was absolutely spectacular. I don't think anyone in this ground will see a better innings. It had everything.

  "The bloke has got the heart of a lion. Everything he does is for the team. He is the perfect team-mate. He's an incredible cricketer and an even better bloke."

  England's record Test run-scorer Alastair Cook on TMS: "That is the most extraordinary Test innings ever played by an England batsman. To do that after the World Cup final... those are once-in-a-lifetime innings. And he's done two in six weeks."

  Former England captain Michael Vaughan on TMS: "Something extraordinary has just happened. That shouldn't happen. You shouldn't be able to do that.

  "I have seen great Test match innings. But in an Ashes series, when your team is gone, the urn is practically in the Australia dressing room, to do that is something else."
  • None This is England's highest fourth-innings total to win a Test; the previous highest was 332-7 against Australia at Melbourne in 1928-29.
  • None It is the 10th highest successful chase in Test history.
  • None This is the third time a team has been bowled out for under 70 in their first innings and gone on to win the Test - the other two instances also occurred in the Ashes, but in 1882 (Australia 63 all out) and 1887 (England 45 all out).
  • None Ben Stokes and Jack Leach's stand of 76 is the third-highest 10th wicket partnership in the fourth innings to win a first-class match.
  • None This is only England's fourth Test victory by one wicket and first since against South Africa at Cape Town in 1923.
  • None Headingley is the first venue to see four fourth-innings totals over 300 to win a Test.
