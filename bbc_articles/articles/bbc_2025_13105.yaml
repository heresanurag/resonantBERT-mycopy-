title: Jodie Marsh wins lemur fight against Uttlesford District Council - BBC News
date: '2025-06-03'
section: Essex
url: http://www.bbc.co.uk/news/articles/c0j76z86e9eo
content: |-
  The former glamour model cries in court as a judge rules in her favour and awards her £19,641.

  Jodie Marsh wins fight with council to keep lemurs

  Jodie Marsh was a person "passionate about the care and treatment" of her animals, a judge said

  Jodie Marsh should be allowed to keep lemurs at her private animal sanctuary, a judge has ruled. The former glamour model fought Uttlesford District Council in court after it refused her application for a wild animal licence in July 2024. Concerns had been raised about her taking a meerkat from her farm near Braintree, Essex, to the pub, but Ms Marsh insisted she was being targeted by online trolls. District Judge Christopher Williams said the 46-year-old was "someone who very much cares for animals".

  He ordered the local authority to pay her £19,641 in costs at Chelmsford Magistrates' Court. Neighbours of Fripps Farm, which Ms Marsh founded in Lindsell in 2020, attended several hearings to voice their opposition against her. Judge Williams said there was "considerable animosity" between all involved. Speaking to the BBC outside court, Ms Marsh said: "I hope that shuts my trolls up once and for all."

  The ring-tailed lemurs Ms Marsh wanted to adopt have been rehomed elsewhere, the court heard

  Ms Marsh, who appeared in the ITV series Essex Wives in 2002, took the council to court after it did not allow her to adopt eight ring-tailed lemurs. She already cared for alpacas, emus and reptiles at the 3.5-acre (1.4ha) site and wept in court as the judge ruled in her favour.

  Judge Williams said: "There is no evidence she has mismanaged any animals or caused any animals harm." He criticised the council for providing "completely contradictory" views and going against reports stating Ms Marsh was a suitable keeper. The judge said Dr Stephen Philp, a vet hired by the authority to make a report, had relied on photographs sent to him of the farm, with no certainty they had not been edited. He also questioned why the authority said the lemurs would be too noisy, despite it admitting this was "impossible to measure". "The decision of Uttlesford District Council was wrong and, in light of evidence, it continues to be wrong," Judge Williams added. He said Ms Marsh was "passionate about the care and treatment of the animals in her care".

  Ms Marsh said she was "over the moon" with the ruling

  Ms Marsh told the BBC she was "so happy and so grateful" with the ruling. "I'm just really sad that it has to come to this - It's a complete waste of time and effort," she said. "As the judge said, the decision was wrong in the first place. "I am just over the moon. He categorically proved in there I am a suitable person to rescue animals and that all I care about is the safety and health and wellbeing of the animals." An Uttlesford District Council spokesperson said councillors refused to allow Ms Marsh a wild animal licence after "careful consideration". They added: "Whilst we are disappointed with the ruling today, the court has taken a fresh look at it and reached a different conclusion, which we fully accept."

