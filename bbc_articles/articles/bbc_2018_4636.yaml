id: bbc_2018_4636
title: Petrol bomb is thrown at police vehicle in north Belfast - BBC News
date: '2018-04-15'
section: Northern Ireland
url: http://www.bbc.co.uk/news/uk-northern-ireland-43774679
content: |-
  A police vehicle is struck by a petrol bomb in the Ardoyne area of north Belfast.

  Police said the incident happened close to Rosapenna Street in the Ardoyne area of north Belfast

  A petrol bomb has been thrown at police in the Ardoyne area of north Belfast.

  Police said officers were responding to reports of a suspicious vehicle on Ardoyne Avenue at about 01:00 BST on Sunday when they were attacked by a crowd of stone throwers.

  The officers' vehicle was then struck by a petrol bomb close to Rosapenna Street.

  They were not injured and later located the suspicious vehicle and seized it.

  A 19-year-old man was arrested on suspicion of a range of driving offences.

  PSNI Inspector Tommy Fairfield said it was "unacceptable that police officers simply trying to do their job should be attacked", but he was "pleased with how professionally the crew conducted themselves, continuing to pursue their enquiries and keep people safe in the face of such an attack".
