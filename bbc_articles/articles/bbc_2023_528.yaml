  Swimming pools, leisure centres and gyms are at risk of closure unless the UK government offers more support to tackle soaring energy costs, a fitness industry trade body warns.

  Leisure services at risk without further support for energy bills, UK government warned Last updated on .From the section Sport

  UKactive believes leisure services should be classes as 'intensive' energy users requiring more bespoke support Swimming pools, leisure centres and gyms are at risk of closure unless the UK government offers more support to tackle soaring energy costs, a fitness industry trade body has warned. The government is scaling back its energy support scheme from April to focus on heavy energy-using sectors. That currently does not include the leisure sector, something UKactive said was a "significant oversight". It warned of "severe" effects on the industry unless the scheme is reviewed. "Communities will see the loss of local services - including swimming lessons for children, mental health services, bespoke programmes for older citizens, ethnically diverse communities and disabled people - and long-term health programmes including cancer rehabilitation, musculoskeletal support and type 2 diabetes," said UKactive chief executive Huw Edwards. "This will impact millions of people of all ages, abilities and backgrounds. "Tragically, the impact of the scheme and more facility closures will damage further our national health, our NHS and our economic growth." UKactive warned that even under the current energy relief scheme 74% of council areas are already classified as "unsecure", meaning there is risk of the closure of leisure centres or reduced services before March 2024. The scheme is mainly used by businesses, but is also for charities and public sector organisations such as schools and hospitals. The government first launched the package last September after prices were driven up in the wake of the pandemic and the war in Ukraine. Wholesale gas prices are now below the level they were before Russia's invasion, but still three to four times higher than their long-term average. In its announcement, the government said it was scaling back the energy subsidies for the next financial year to £5.5bn, warning that the current level of help was too expensive. Swim England chief executive Jane Nickerson said: "This decision by the government to not provide additional support to swimming pools and leisure centres is a hammer blow and flies in the face of previous statements from the government about the importance of physical activity and reducing pressures on the NHS. "The government must review this decision immediately. "With bills routinely tripling in price and energy costs typically being the second highest expense for swimming pool owners and operators, they have been consistently warning that without support pools and leisure centres will have to close. "Sadly, we have already seen a number shutting in recent weeks and in light of [this] decision we will likely only see more and more pools disappearing across all parts of the country - each one a devastating loss for the local community." Councillor David Renard, energy spokesman for the Local Government Association, said that while it is "good" the government will continue to help the public sector, the LGA remain "deeply concerned about the risk to some council services". He added: "Libraries and museums will be eligible for extra support, as energy-intensive industries, but leisure centres and swimming pools will not be equally protected from high energy prices. "These valuable public facilities are at risk of reduced hours or even closure due to unsustainable and increasing costs. "If the government is serious about reducing pressure on the NHS, as well as meeting its other targets on physical activity and sports participation, it must continue to support our leisure centres and public swimming pools which help people stay active, healthy and out of hospital. "Councils need support with their energy bills for all their local services, so they can stay open and provide a safe haven for residents during this unprecedented cost-of-living crisis."
