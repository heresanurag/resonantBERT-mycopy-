  Others included Jessica Holroyd, who had flown to the city from Bristol. "I found out the news when I was in the airport, and I had a bit of a cry in the airport toilets," she said. "It's all quite emotional. I've been a fan since I was 15 and I'm 32 soon, so it's just quite devastating, really." Ms Holroyd said the gigs were "such a momentous occasion for loads of people". "It feels like it might be the only opportunity to see her, particularly the Eras tour, so it just feels like a huge loss." However, she said she thought Austrian police had "handled it really well". "And as sad as it is, it seems like the best decision for everyone's safety - the fans and the crew and Taylor, of course. It's not worth the loss of life."

  Fans also traded friendship bracelets, some restaurants and coffee shops gave away free food and drink, several museums offered free admission, and a church opened its doors and played Swift songs all day. "The way Vienna is responding to this and embracing Swifties is so, so, so incredibly beautiful," wrote one fan on X., external "I know it doesn’t erase the sadness and fear from having the concerts cancelled for the reason they were cancelled, but by God is it a rainbow amidst this nasty storm."

