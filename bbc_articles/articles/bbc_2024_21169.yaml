  Natascha Strobl, an Austrian political scientist and author, was planning to go to two of the three gigs, and said she was "absolutely devastated" they were cancelled. "I was looking forward to it for over a year, and made bracelets and planned outfits and planned the whole day," she told BBC News. "There are people sitting in hotel rooms who don't know what to do, people who are supposed to fly over who don't know what to do now. They're in shock. There's a lot of crying, of course." But she agreed that there could be "no debate when it comes to security". "If it's not safe, it's not safe," she said, explaining that no-one could risk the prospect of a repeat of previous "devastating and shocking" atrocities like at Manchester Arena, when 22 people were killed in a suicide bombing at an Ariana Grande concert in 2017. Last week, three young girls were killed in a knife attack on a Taylor Swift-themed dance class in Southport. "Of course, safety is paramount," Ms Strobl said. "But still, we're allowed to feel absolutely terrible about it."

  Swift is due to bring her tour back to London next week

  Two suspects, aged 19 and 17, have been arrested. The head of Austria's domestic intelligence service, Omar Haijawi-Pirchner, told a news conference the 19-year-old had planned to carry out an attack using explosives and knives. "We have seized these weapons and he considered either possibility and his goal was to kill himself and a large number of people either today or tomorrow at the concert," Mr Haijawi-Pirchner said. Austrian Interior Minister Gerhard Karner said: "The situation was serious, but a tragedy had been prevented."

  Swift had been due to play at the Ernst Happel Stadium

  Swift said in a 2019 interview that an attack on one of her gigs was "her biggest fear". "After the Manchester Arena bombing and the Vegas concert shooting [also in 2017], I was completely terrified to go on tour this time because I didn’t know how we were going to keep three million fans safe over seven months," she told Elle at the time., external "There was a tremendous amount of planning, expense, and effort put into keeping my fans safe." She has not yet commented on the Austrian plot and cancellations.

  The next concerts in the singer's schedule are in London, with five nights at Wembley Stadium from next Thursday. A spokesman for the city's Metropolitan Police said it worked "closely with venue security teams and other partners to ensure there are appropriate security and policing plans in place". They added: "There is nothing to indicate that the matters being investigated by the Austrian authorities will have an impact on upcoming events here in London. "As always, we will continue to keep any new information under careful review."

  Chris Phillips, former head of the National Counter Terrorism Security Office, said the incident was "another reminder if we need it that terrorism and Islamic terrorism in particular is still an issue". However, fans going to the UK gigs should be "no more [worried] today than you were yesterday", he told BBC 5 Live. "There's an enormous amount of work behind the scenes which you'll never hear about, and you don't even see the results because a success is when nothing happens," he said. "I imagine as well that Taylor Swift, after the recent events in Southport, would be particularly sensitive to anything like this happening, and so would her management team. "So maybe that's the rationale behind cancelling these, particularly if they've arrested the two suspects."
