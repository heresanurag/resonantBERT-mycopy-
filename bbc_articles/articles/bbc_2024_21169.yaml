title: Taylor Swift fans take to Vienna streets after foiled attack plot - BBC News
date: '2024-08-08'
section: Culture
url: http://www.bbc.co.uk/news/articles/cp35wxendego
content: |-
  Hundreds of Taylor Swift fans gather in Vienna after a plot to attack her concerts there was foiled.

  Defiant Swifties take to streets after Vienna plot

  About 200,000 fans had been due to watch Taylor Swift in Vienna this week

  Taylor Swift fans came out in force on Vienna's streets to sing her songs and show their defiance, a day after her concerts there were cancelled because of a plot to attack them. Hundreds of Swifties staged an impromptu open-air gathering to overcome the disappointment of not seeing the US superstar on her record-breaking Eras tour. They also said they understood the decision to cancel the stadium shows on Thursday, Friday and Saturday, and were grateful to the police. Austrian authorities said they had foiled a plan by a supporter of the Islamic State group to carry out a suicide attack.

  One British fan called Becky said she felt "sombre but also excited by the atmosphere" on Corneliusgasse, a road whose name resembles Cornelia Street in New York, after which Swift named a song. "It's a really strange situation and I think the ultimate thing we feel is just grateful that we're safe and that everyone else is safe," she told BBC News. "A bit of a mixed bag of emotions." She said the cancellation made her feel "probably the most disappointed about anything I've ever been in my life", but she agreed the decision had been made "for the right reasons". She was one of almost 200,000 fans who were due to attend the three concerts.

