title: Car crash cuts internet for hundreds in Goole area - BBC News
date: '2025-03-18'
section: General
url: http://www.bbc.co.uk/news/videos/cx2ge0ejg08o
content: |-
  Telecoms firm KCOM said the incident caused significant damage and it was working to fix the issue.

  Hundreds of people were left without an internet connection after a car struck a telecoms cabinet in an East Yorkshire town.

  About 800 residents were affected by the incident in Stanhope Street, Goole, on Sunday, the Hull-based firm KCOM said.

  Humberside Police said it was believed a black Mini hit the cabinet at about 22:55 GMT, before being driven away in the direction of Rawcliffe Road.

  KCOM said the incident caused "very significant damage" to the cabinet and it was working around the clock "to get services up and running as soon as possible".

