content: |-
  Police and fire officers launch a probe into the deaths of three people at the New County Hotel.

  Manju Prasanna fled the blaze with his wife and four-year-old daughter

  A guest at a Perth hotel where three people died in an early-morning blaze has told of his family's escape from the fire.

  Manju Prasanna, his wife, and their four-year-old daughter were woken by a guest at the New County Hotel shouting that his room was on fire.

  The family fled outside where they watched the incident unfold on Monday morning.

  Police and fire officers have launched an investigation into the fire's cause.

  Mr Prasanna, who is from Sri Lanka, was visiting his wife, who is studying at Dundee University.

  He said the family were in their room on the first floor of the hotel, the floor below the area where the fire broke out.

  The 38-year-old said he heard a guest shouting that his room was on fire.

  Mr Prasanna left the building with his wife and child and saw flames coming from the second floor window.

  "I waited here, me my daughter and my wife - my daughter was afraid and she was crying loudly," he said.

  At its peak 60 firefighters were sent to the scene

  Forensic teams have been working at the scene

  The alarm was raised at about 05:10, leading to a huge response from the emergency services, with 21 ambulance crews, 60 firefighters and nine fire appliances at the scene at its peak.

  About 16 hotel guests and two people from neighbouring flats were evacuated.

  Eleven people were treated at the scene by the Scottish Ambulance Service.

  The fire was extinguished at about 06:30 and three bodies were discovered in a subsequent search.

  A dog also died in the blaze, according to the Scottish Fire and Rescue Service (SFRS).

  Police Scotland said officers were conducting a joint investigation with the fire service.

