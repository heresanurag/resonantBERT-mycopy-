title: What happened at Diddy sex-trafficking trial opening statements? - BBC News
date: '2025-05-15'
section: General
url: http://www.bbc.co.uk/news/videos/c5y8rmekgejo
content: |-
  Prosecutors allege the rapper used fame and violence to sexually abuse women, while the rapper's attorneys defended his "swinger" lifestyle.

  Opening statements at Sean "Diddy" Combs' sex-trafficking trial in New York began with details of alleged assault and video evidence.

  Federal prosecutors have accused Combs on five charges, including racketeering conspiracy, sex trafficking and engaging in prostitution. The rapper has denied all of them.

  So, were the so-called "freak-off" sex parties forced or consensual?
