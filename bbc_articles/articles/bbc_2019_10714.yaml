id: bbc_2019_10714
title: 'Saudi oil plant fire: Blaze rages in Abqaiq after drone attack - BBC News'
date: '2019-09-14'
section: General
url: http://www.bbc.co.uk/news/world-middle-east-49699489
content: |-
  State media say drones have struck two major oil facilities, including Abqaiq.

  Drone attacks have set alight two major oil facilities run by state-owned Aramco in Saudi Arabia, state media say.

  One was at Abqaiq, which has the world's largest oil processing plant.
