title: 'As it happened: Boris Johnson continues reshuffle - BBC News'
date: '2021-09-16'
section: UK Politics
url: http://www.bbc.co.uk/news/live/uk-politics-58583440
content: |-
  Junior and mid-ranking ministers started to find out if they were keeping their roles.

  Appointing Michael Gove as the government’s ‘levelling-up’ chief in the cabinet reshuffle will help people to understand the phrase, the chairman of the Northern Research Group of Tory backbenchers has said.

  Jake Berry said the challenge was to “bring some definition” to the term that “means all things to all people”.

  “And we also need to be able to point out to people how we are getting on and doing it.”

  The Rossendale and Darwen MP said the next election could be in 2023 and he reckoned Mr Gove would “relentlessly focus on shovels in the ground, demonstrating how levelling up is changing people’s lives".

  One task for Mr Gove is the big issue of planning reform. Some Tory MPs in southern England fear the plans could lead to mass house building.

  But Mr Berry was more receptive, adding: “Frankly, in many parts of the north of England people are quite keen to see more houses built. I understand that’s not the same across the country, and it’s not the same all parts of the north of course.

  “The planning system needs reform, in my view it is a clog on economic activity, particularly the time it takes, so I do hope he will take the opportunity to look at that."

  And as Boris Johnson continues to appoint junior ministers, Mr Berry called on him to recruit more northern MPs into ministerial roles.
