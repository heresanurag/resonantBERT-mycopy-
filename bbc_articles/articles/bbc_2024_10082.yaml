title: Duke students walk out ahead of Jerry Seinfeld graduation speech - BBC News
date: '2024-05-13'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-69004628
content: |-
  Pro-Palestinian students booed the comedian who has been a vocal supporter of Israel during the war in Gaza.

  During a graduation ceremony at Duke University, pro-Palestinian students staged a walk out and booed Jerry Seinfeld head of his speech at the ceremony. The veteran comedian has been a vocal supporter of Israel during the war in Gaza.

  Many students stayed to listen to the speech, with some chanting their support.

