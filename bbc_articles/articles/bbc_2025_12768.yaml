title: 'Watch: Video shows aftermath of Israeli strikes on Iran - BBC News'
date: '2025-06-24'
section: General
url: http://www.bbc.co.uk/news/videos/c8xvqje77ygo
content: |-
  Footage has emerged showing smoke billowing over Tehran and the city of Karaj, west of the capital.

  Footage has emerged online showing the aftermath of Israeli strikes across Tehran and the nearby city of Karaj, west of the Iranian capital.

  The Israeli army said it targeted the headquarters of internal security forces and Islamic Revolutionary Guard Corps (IRGC) units in the Tehran area.

  Iran's health ministry says around 500 people have been killed by Israeli strikes on Iran since Israel's 13 June attack on the country, although one human rights group has put the death toll at 950.

  The two nations have exchanged daily missile fire ever since, with Israeli authorities saying Iranian strikes have killed 24 people in Israel.
