content: |-
  Local schools were asked to monitor the 14-year-old after online threats about a school shooting in 2023, the FBI says.

  US school shooting suspect, 14, questioned about threats last year

  This video can not be played To play this video you need to enable JavaScript in your browser. "I saw a kid with a gun" - How Georgia school shooting unfolded

  A boy accused of killing four people at his high school in Georgia was interviewed last year by police about anonymous online threats, the FBI has said. Colt Gray, 14, denied to police in May 2023 he was behind internet posts that contained images of guns, warning of a school shooting. The suspect opened fire on Wednesday at Apalachee High School in the city of Winder, killing two teachers and two pupils, investigators say. Eight students and one teacher were injured. He was arrested on campus. Gray was charged with four counts of murder on Thursday and will face court on Friday, the Georgia Bureau of Investigation said.

  Police have identified the victims as teachers Christina Irimie and Richard Aspinwall and 14-year-old students Mason Schermerhorn and Christian Angulo. In a news conference, Georgia Bureau of Investigation director Chris Hosey said the gun used was an "AR-platform style weapon".
