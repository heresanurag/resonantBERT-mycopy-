title: 'Adam Jones: Boston Red Sox apologise for racial abuse of Baltimore Orioles
  outfielder - BBC Sport'
date: '2017-05-03'
section: Baseball
url: http://www.bbc.co.uk/sport/baseball/39785407
content: |-
  The Boston Red Sox apologise to Adam Jones after the Baltimore Orioles outfielder was racially abused by fans at Fenway Park.

  The Boston Red Sox have apologised to Adam Jones after the Baltimore Orioles outfielder was racially abused by fans.

  Jones, a five-time All Star, said he had a bag of peanuts thrown at him and was taunted with racist slurs during Baltimore's 5-2 win at Fenway Park.

  The Red Sox said on Tuesday that they have "zero tolerance for such inexcusable behaviour".

  "Our entire organisation and our fans are sickened by the conduct of an ignorant few," their statement read., external

  The Red Sox said they will continue to review Monday's events, while Boston mayor Marty Walsh said the comments are "not who we are as a city"., external

  Major League Baseball commissioner Robert Manfred condemned the abuse, adding that any fans behaving in an offensive fashion would be removed from the stadium, external and subject to further action.

  Jones told USA Today he had suffered similar abuse at Fenway Park before, but Monday's was the worst he had experienced.

  "It's unfortunate that people need to resort to those type of epithets to degrade another human being. I'm trying to make a living for myself and for my family," he added., external
