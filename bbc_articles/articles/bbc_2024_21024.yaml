  51-year-old skateboarder Andy Macdonald represents Team GB in the Olympic park competition.

  Skateboarder Andy Macdonald, 51, represents Team GB in the Olympic park competition, scoring 77.66 on his final run - not enough to qualify for the eight-man final.

