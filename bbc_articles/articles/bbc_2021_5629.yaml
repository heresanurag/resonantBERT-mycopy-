id: bbc_2021_5629
title: Sri Lanka navy rescue crew following chemical fire on cargo ship - BBC News
date: '2021-05-25'
section: General
url: http://www.bbc.co.uk/news/world-asia-57244173
content: |-
  All 23 members of the Singaporean X-Press Pearl's crew were evacuated.

  The crew of a container ship off the coast of Sri Lanka had to be evacuated after a chemical fire caused an explosion.

  Two sailors from the Singaporean X-Press Pearl were taken to hospital with injuries.
