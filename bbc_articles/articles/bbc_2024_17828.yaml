title: 'Carmarthen: Welsh anthem send off for new MP Ann Davies - BBC News'
date: '2024-07-08'
section: General
url: http://www.bbc.co.uk/news/videos/cyj48zxz38ko
content: |-
  The new MP for Caerfyrddin, Ann Davies, was serenaded by supporters at the railway station.

  Supporters of a newly-elected Welsh MP sang the national anthem in a railway station as she made her first trip to Westminster since last week's UK general election.

  Ann Davies won in the new seat of Caerfyrddin, beating the former Conservative minister Simon Hart.

  She is the second Plaid Cymru member to represent the area, 58 years after Gwynfor Evans became the party's first MP in 1966.

  Ms Davies spoke to those who gathered at Carmarthen station before leaving on the train to the accompaniment of Hen Wlad Fy Nhadau.
