title: 'Aaron Ramsey: Wales captain returns for Euro 2024 play-offs - BBC Sport'
date: '2024-03-13'
section: General
url: http://www.bbc.co.uk/sport/football/68553195
content: |-
  Last updated on .From the section Wales

  Captain Aaron Ramsey is a surprise inclusion for Wales' Euro 2024 play-offs despite recent injury issues. Ramsey, 33, has been limited to only two appearances for club side Cardiff City - totalling 72 minutes - since a knee injury in September. A calf strain meant he was expected to miss the play-offs, but he has made a quicker than expected recovery. Wales boss Rob Page has named a 28-man squad for Wales' semi-final with Finland and possible play-off final. Wales face Finland at Cardiff City Stadium on Thursday, 21 March with a potential final against Poland or Estonia to follow five days later, also in Cardiff, for a place in this summer's European Championship. The return of Ramsey - who missed the last group qualifiers in October and November - is a major boost for Wales after Cardiff boss Erol Bulut initially ruled him out of the play-offs. "It's not been ideal for Aaron, he's had a few setbacks but if there was a chance of having him in the squad I was going to take it," Page said. "He's back on the grass and his rehab has gone to plan. To have someone of his stature involved is beneficial for us. "When you have someone of his quality, if there is a chance to get him in I'll take it." Page says Wales have been monitoring Ramsey's fitness at the training base they share with Cardiff City and are keen to assess how involved he can be in the play-offs. "We have eyes on him every day," he said. "If it's a bit-part of the game we can use him for, we will take it. "If he has the potential to give us some minutes off the bench we will use him. "Aaron knows his body and knows exactly what he needs to do to get himself fit." Aaron Ramsey's return to fitness comes before Cardiff visit rivals Swansea City in the Championship this weekend Leeds United pair Ethan Ampadu and Daniel James will both win their 50th Wales caps if they are selected to face Finland. Page has also recalled two Scotland-based midfielders in Rabbi Matondo of Rangers and Hibernian's Dylan Levitt. Joe Low, Rubin Colwill and Charlie Savage, the son of former Wales and Manchester United midfielder Robbie, are also included as they step-up from under-21s duty. It is the first time Colwill has been picked since the 2022 World Cup. Page says he feels Wales' squad is a good place with a number of players - such as Colwill, David Brooks and Kieffer Moore - seeing increased game time for their clubs. "I have picked a bigger squad than normal as we have the two games," Page added. "All the outfield players are getting minutes, so we are in a far healthier position than we have been in. "At the top of the pitch we've got good problems. "There are some real selection headaches for me, it's a good problem to have. "It's probably the healthiest position we have been with in terms of players playing and playing well." Niall Huggins, Joe Morrell and Tom Bradshaw all miss out with injury, while Luton Town captain Tom Lockyer is not included as he continues his recovery from the cardiac arrest he suffered during a Premier League match in December. Wales squad: Wayne Hennessey (Nottingham Forest), Danny Ward (Leicester City), Tom King (Wolverhampton Wanderers), Adam Davies (Sheffield United); Ben Davies (Tottenham Hotspur), Joe Rodon (Leeds United, on loan from Tottenham Hotspur), Joe Low (Wycombe Wanderers), Chris Mepham (Bournemouth), Ben Cabango (Swansea City), Neco Williams (Nottingham Forest), Jay DaSilva (Coventry City), Connor Roberts (Leeds United, on loan from Burnley), Wes Burns (Ipswich Town); Ethan Ampadu (Leeds United), Josh Sheehan (Bolton Wanderers), Dylan Levitt (Hibernian), Jordan James (Birmingham City), Charlie Savage (Reading); Harry Wilson (Fulham), Nathan Broadhead (Ipswich Town), Aaron Ramsey (Cardiff City), Rabbi Matondo (Rangers), David Brooks (Southampton, on loan from Bournemouth), Daniel James (Leeds United), Liam Cullen (Swansea City), Rubin Colwill (Cardiff City), Brennan Johnson (Tottenham Hotspur), Kieffer Moore (Ipswich Town, on loan from Bournemouth).
