title: TV's Blind Date couple renew wedding wows 33 years on - BBC News
date: '2024-10-21'
section: Birmingham & Black Country
url: http://www.bbc.co.uk/news/articles/c98yz7875y2o
content: |-
  Alex and Sue Tatham were the first couple to get married after meeting on Blind Date in the 1980s.

  The pair have celebrated their 33rd wedding anniversary

  A couple who got married after meeting on the TV show Blind Date have renewed their wedding vows. Alex and Sue Tatham, from Pelsall, Walsall, became the first couple to tie the knot after meeting on the classic dating programme in 1988. The pair have celebrated their 33rd wedding anniversary and renewed their vows on Sunday at the village's St Michael & All Angels Church – where they wed on 19 October 1991. Blind Date, hosted by the late Cilla Black, ran on ITV between 1985 and 2003. The presenter and her husband Bobby attended the wedding.

  Alex and Sue Tatham met on popular dating show Blind Date and married in 1991

  Mrs Tatham said she had gone on the programme after a friend first applied on her behalf. She and her husband were sent for a first date in Ireland where she said they had "got on straight away" and "laughed a lot". "We just went for it, we were chaperoned around and had a very lovely time," she said.

  The couple were pictured inside the church before Sunday's ceremony

  Mr Tatham said: "They took very good care of us. The joy of Blind Date is you get to see [each] other again because you're forced to watch that bit on the sofa a week later. "It was absolutely the show of the moment. I guess it would be like applying to be on Who Wants To Be A Millionaire or Love Island."

  St Michael & All Angels Church marked its 180th anniversary on Sunday

  The church where the couple got married has celebrated its 180th anniversary this weekend, with a wedding fair and service of celebrations. It was "totally coincidental" the anniversary happened to fall on the pair's wedding anniversary, Mr Tatham said. "It's been offering fantastic marriages for 180 years," he said. "Pelsall is a wonderful community and you can really feel the energy of the whole village as it comes out to support that church. I think it's wonderful."

