title: 'Versace: Donatella steps down as creative director, Dario Vitale to take over
  - BBC News'
date: '2025-03-13'
section: Culture
url: http://www.bbc.co.uk/news/articles/c5ym22preydo
content: |-
  Versace is facing a creative shift as Prada looks to potentially buy the Italian fashion house.

  Donatella Versace pictured last week at the Vanity Fair Oscars party

  Donatella Versace is to step down from her creative director role at fashion house Versace, after nearly 30 years. She has held the position since 1997 and took over after the murder of her brother Gianni. Versace has overseen hundreds of fashion campaigns for the Italian brand, also designing hotels and cars. The 69-year-old will be replaced by Dario Vitale, who is a former design director for Miu Miu, and take on a new brand ambassador role.

  It comes amid speculation that the Prada Group is interested in buying Versace from the Capri Holdings group, who paid €2bn (£1.67bn) for the fashion house in 2018.

  Donatella Versace on the runway at her first show as the fashion house's creative director in 1998

  In a statement issued on Thursday, external, Capri Holdings said Versace would now "dedicate herself to the support of Versace's philanthropic and charitable endeavours and will remain an advocate for the brand globally". It added that the announcements were part of "a thoughtful succession plan" and credited Vitale as a "strong design leader" whose "talent and vision will be instrumental in Versace's growth". The company statement also thanked Versace for everything she had done for the brand and for playing "an integral role in the company's global success". Versace also posted her own statement on Instagram, external to her 12 million followers, saying it was "the greatest honour of my life to carry on my brother Gianni's legacy". "Versace is in my DNA and always in my heart," she said. "Championing the next generation of designers has always been important to me. I am thrilled that Dario Vitale will be joining us, and excited to see Versace through new eyes."

