  Donatella Versace has dressed some of the world's biggest stars - including Madonna, Beyoncé and Lady Gaga. She famously designed the green jungle dress for Jennifer Lopez in 2000 and Michelle Obama's dress for her 2016 final state dinner. Versace is also considered an embodiment of the fashion house she has built - always seen in brightly coloured prints that are synonymous with the brand and platinum blonde hair that ensures she always stands out. Versace, which was first founded in Milan in 1978 by Donatella and her brothers Santo and Gianni, was sold to the Michael Kors group in 2018, which was then folded in to Capri Holdings in 2019.
