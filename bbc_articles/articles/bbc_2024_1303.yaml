id: bbc_2024_1303
title: 'Aberystwyth: Car crashes into Bronglais hospital - BBC News'
date: '2024-01-08'
section: Wales
url: http://www.bbc.co.uk/news/uk-wales-67915597
content: |-
  The vehicle appeared to go down a grass verge and smash through a brick wall.

  The driver of the car was treated for possible injuries

  A large hole has been left in the wall of a hospital after a car crash.

  Emergency services were called after the car appeared to drive down a grass verge and into the brickwork at Bronglais General Hospital in Aberystwyth just after 08:00 GMT on Monday.

  Part of the building had to be cleared as a result, although no-one inside was thought to have been hurt.

  The driver of the car was treated for possible injuries.

  The building was assessed for any structural damage, and the crash affected some services at the hospital, in particular those at the Leri Day Unit.

  Those with appointments were advised to allow more time to be seen and warned that the car park was out of use while the scene was being cleared.
