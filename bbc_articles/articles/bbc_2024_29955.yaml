content: |-
  Footage shows a truck crash and almost hit a highway worker on the side of an Interstate in New York.

  Dashcam footage released by the New York State Department of Transportation on November 7 shows a truck crashing into a parked vehicle on the side of a New York Interstate, narrowly missing a highway worker. No serious injuries were reported, according to the department.
