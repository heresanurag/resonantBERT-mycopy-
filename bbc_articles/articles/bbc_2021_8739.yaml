  US-led forces ousted the Taliban from power in Afghanistan in October 2001. The group had been harbouring Osama Bin Laden and other al-Qaeda figures linked to the 9/11 attacks in the US.

  President Biden has said the American pull-out is justified as US forces have made sure Afghanistan cannot become a base for foreign jihadists to plot against the West again.

  Afghan President Ashraf Ghani, meanwhile, insists that the country's security forces are fully capable of keeping insurgents at bay, but many believe the withdrawal risks casting the country back into the grip of the Taliban.

  Twenty years of conflict in Afghanistan – what happened when? From 9/11, to intense fighting on the ground, and now full withdrawal of US-led forces, here’s what happened. Al-Qaeda, led by Osama Bin Laden in Afghanistan, carries out the largest terror attack ever conducted on US soil. The World Trade Centre is reduced to rubble Four commercial airliners are hijacked. Two are flown into the World Trade Centre in New York, which collapses. One hits the Pentagon building in Washington, and one crashes into a field in Pennsylvania. Nearly 3,000 people are killed. A US-led coalition bombs Taliban and al-Qaeda facilities in Afghanistan. Targets include Kabul, Kandahar and Jalalabad. The Taliban, who took power after a decade-long Soviet occupation was followed by civil war, refuse to hand over Bin Laden. Their air defences and small fleet of fighter aircraft are destroyed. The Northern Alliance, a group of anti-Taliban rebels backed by coalition forces, enters Kabul as the Taliban flee the city. Coalition-backed Northern Alliance fighters ride tanks into Kabul as the Taliban retreat By the 13 November 2001, all Taliban have either fled or been neutralised. Other cities quickly fall. After protracted negotiations at a “loya jirga” or grand assembly, the new Afghan constitution is signed into law. The constitution paves the way for presidential elections in October 2004. Hamid Karzai led anti-Taliban groups around Kandahar before becoming president Hamid Karzai, the leader of the Popalzai Durrani tribe, becomes the first president under the new constitution. He serves two five-year terms as president. British troops arrive in Helmand province, a Taliban stronghold in the south of the country. Soldiers of the Parachute Regiment lead the first UK deployment to Helmand Their initial mission is to support reconstruction projects, but they are quickly drawn into combat operations. More than 450 British troops lose their lives in Afghanistan over the course of the conflict. US President Barack Obama approves a major increase in the number of troops sent to Afghanistan. At their peak, they number about 140,000. US troops in intense combat operations in the south of the country The so-called “surge” is modelled on US strategy in Iraq where US forces focussed on protecting the civilian population as well as killing insurgent fighters. Bin Laden is traced to a compound located less than a mile from a Pakistani military academy The leader of al-Qaeda is killed in an assault by US Navy Seals on a compound in Abbottabad in Pakistan. Bin Laden’s body is removed and buried at sea. The operation ends a 10-year hunt led by the CIA. The confirmation that Bin Laden had been living on Pakistani soil fuels accusations in the US that Pakistan is an unreliable ally in the war on terror. The founder of the Taliban, Mullah Mohammed Omar, dies. His death is kept secret for more than two years. The Taliban leader is believed to have suffered a shrapnel wound to his right eye in the 1980s According to Afghan intelligence, Mullah Omar dies of health problems at a hospital in the Pakistani city of Karachi. Pakistan denies that he was in the country. At a ceremony in Kabul, Nato ends its combat operations in Afghanistan. With the surge now over, the US withdraws thousands of troops. Most of those who remain focus on training and supporting the Afghan security forces. The Taliban launch a series of suicide attacks, car bombings and other assaults. The parliament building in Kabul, and the city of Kunduz are attacked. Islamic State militants begin operations in Afghanistan. Afghan President Ashraf Ghani says more than 45,000 members of his country’s security forces have been killed since he became leader in 2014. The figure is far higher than previously thought. The US and the Taliban sign an “agreement for bringing peace” to Afghanistan, in Doha, Qatar. The US and Nato allies agree to withdraw all troops within 14 months if the militants uphold the deal. The deal lays out a timetable for full withdrawal US president Joe Biden announces that all US troops will leave Afghanistan by 11 September 2021. In just over a month, the Taliban sweep across Afghanistan, taking control of towns and cities all over the country, including Kabul. Afghan security forces collapse in the face of the Taliban advance.
