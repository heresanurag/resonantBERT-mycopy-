title: Could assisted dying be coming to Scotland? - BBC News
date: '2024-05-07'
section: Scotland
url: http://www.bbc.co.uk/news/uk-scotland-68674769
content: |-
  MSPs will get the chance to make Scotland the first part of the UK to let people legally end their lives.

  MSP Liam McArthur hopes his bill will be voted on in 2025

  Scotland could become the first UK nation to provide terminally-ill people with assistance to end their lives if a bill that has been introduced at Holyrood is approved. Supporters of the legislation say it would ease suffering. Opponents worry that some terminally-ill people could feel under pressure to end their lives. Assisted Dying for Terminally Ill Adults (Scotland) Bill is drafted by the Lib Dem MSP, Liam McArthur. He expects it to be debated this autumn. The bill was published on Thursday, external and will potentially be voted on next year.

  The Scottish government says ministers and SNP backbenchers will not be instructed how to vote, as the matter is an issue of individual conscience. First Minister Humza Yousaf has indicated that he is likely to vote against the bill, which is also opposed by, external the Church of Scotland, the Catholic Church in Scotland, and the Scottish Association of Mosques. Under the proposals, a patient could only request medical assistance to end their life if they had a terminal illness and had been ruled mentally fit to make the decision by two doctors. Mr McArthur says "the terminal illness would need to be advanced and progressive" and the medics would have to ensure there was "no coercion." In addition, the patient must be aged 16 or over, a resident of Scotland for at least 12 months, and must administer the life-ending medication themselves.

  In Scotland, it is not illegal to attempt suicide but helping someone take their own life could lead to prosecution for crimes such as murder, culpable homicide or offences under the Misuse of Drugs Act 1971. In England and Wales, the Suicide Act 1961 makes it an offence to encourage or assist the suicide or attempted suicide of another person. In 2015, the House of Commons decided against changing the law by 330 votes to 118. In Northern Ireland, a similar offence is set out in the Criminal Justice Act 1966. A number of countries have legalised some form of assisted dying - Dignity in Dying says more than 200 million people around the world have access. This includes Switzerland, perhaps best known for its Dignitas facility, Australia, Canada, Spain, Colombia and 11 states in the US where it is known as "physician-assisted dying". Laws vary by country.

  This will be the third time that the Scottish Parliament has considered the issue. In 2010, MSPs rejected Margo MacDonald's End of Life Assistance Bill by 85 votes to 16. The independent MSP, who had Parkinson's Disease, died in 2014 and the cause was taken up by Patrick Harvie of the Scottish Greens. The following year, his Assisted Suicide Bill was rejected by 82 votes to 36. The title of Mr McArthur's bill — Assisted Dying rather than Assisted Suicide — reflects a change in approach from campaigners. Critics such as Dr Fiona MacCormick of the Association for Palliative Medicine (APM) say the new terminology is "harmful and unhelpful," adding, "they've used very euphemistic language to talk about suicide."

