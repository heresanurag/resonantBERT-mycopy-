id: bbc_2019_14467
title: 'Hirwaun crash: Aberdare woman, 84, dies after two-car crash - BBC News'
date: '2019-12-22'
section: Wales
url: http://www.bbc.co.uk/news/uk-wales-50877219
content: |-
  A 25-year-old man is arrested and released as investigations continue into the crash on Friday.

  An 84-year-old woman has died after a crash between two cars on Friday afternoon.

  The collision, involving a grey Peugeot and a red BMW, happened on Rhigos Road, Hirwaun, Rhondda Cynon Taff, on Friday, at about 15:00 GMT.

  A 25-year-old man, from Hirwaun, was arrested on suspicion of death by dangerous driving and has been released under police investigation.

  The family of the woman, from Aberdare, is being supported by officers.

