title: Giovanni Pernice wins Italian dance show Ballando Con Le Stelle - BBC News
date: '2024-12-22'
section: Culture
url: http://www.bbc.co.uk/news/articles/cx2ndv85lmvo
content: |-
  Giovanni Pernice wins Ballando Con Le Stelle after the BBC partly upheld complaints by Amanda Abbington.

  Bianca Guaccero and Giovanni Pernice were partners on Ballando Con Le Stelle - the Italian answer to Strictly

  Giovanni Pernice has won the Italian version of Strictly Come Dancing months after a BBC internal investigation into complaints about his behaviour on the show. Professional dancer Pernice said his Ballando Con Le Stelle victory with partner Bianca Guaccero, who is also his girlfriend, was a dream, adding: "After a difficult year I'm back". In September, the BBC upheld complaints of harassment and verbal bullying made against him by his 2023 partner Amanda Abbington, but cleared him of allegations of physical aggression. It had been confirmed in June that Pernice would not be featuring in this year's Strictly.

  Pernice and Guaccero, who is an actress and singer, won the 19th season of Ballando Con Le Stelle after performing dances including the Argentine Tango and the Charleston. The pair had recently confirmed their status as a romantic couple. Italian-born Pernice shared several posts on Instagram about his win and thanked UK fans for their support. The BBC apologised to Pernice's former partner Amanda Abbington in September. Abbington, who played Mary Morstan in Sherlock, has since said she felt vindicated and that she had "no regrets" after making the complaints. In response to the BBC's findings, Pernice said he was "relieved" allegations he was threatening and abusive were found not to be true. He said he was a "strict teacher" but not a bully in a TV interview in October, admitting frustration is commonplace for both contestants and the professionals with the pressure "to perform perfectly on the Saturday night".

  Giovanni Pernice and Amanda Abbington during a live Strictly performance in October 2023

  On Instagram on Sunday, Pernice said: "We did it!! WE ARE THE CHAMPIONS !! after a difficult year." He added: "It felt amazing to be in the final again doing what I love - and then to win as well was a dream and definitely something I will never forget!" On Saturday he had addressed his "dear friends in the UK, saying he and his partner could tell where the votes for the show were coming from as it is "all about likes on social media". Pernice wrote: "We just want to say a massive thank you, because realistically, we couldn't do anything without you. "We can totally see which part of the votes are coming from the UK and you are being unbelievably amazing."
  • None BBC apologises to Abbington but her claims only partly upheld
