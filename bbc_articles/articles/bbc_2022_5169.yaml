content: |-
  Hundreds attend vigils on Friday evening in memory of Michael Snee and Aidan Moffitt.

  People attending a vigil in Sligo, where Aidan Moffitt and Michael Snee were found dead in their homes

  A number of vigils have taken place across the island of Ireland on Friday in memory of two men who were killed in Sligo town earlier this week.

  Aidan Moffitt and Michael Snee were found dead in their own homes on Monday and Tuesday night.

  A 22-year-old man was remanded into custody on Thursday after being charged with their murders.

  More than 30 events took place in towns and cities on both sides of the border, with many organised by LGBT groups.

  In Belfast, a vigil took place at Belfast City Hall which was later lit up in rainbow colours.

  Large crowds gathered outside Belfast City Hall against the killings of Aidan Mofitt and Michael Snee

  Events also took place at Guildhall Square in Londonderry, outside Dáil Éireann (the Irish Parliament) in Dublin and at the town hall in Sligo.

  Tributes have been paid to both victims by their friends and neighbours in Sligo.

  Danielle Roberts from Here NI, which supports lesbian and bisexual women, helped organise the vigil in Belfast and said it was important people in Northern Ireland had the chance to pay their respects to the victims.

  She said their deaths were shocking and troubling.

  "Hopefully people will take away some hope from the event as well but ultimately we were remembering Michael and Aidan," she added.

  Danielle Roberts and Jude Copeland (centre) were among those who attended the vigil in Belfast

  Gay rights activist Jude Copeland said the deaths of Mr Moffitt and Mr Snee have the potential "to have a real chilling affect on LGBT people".

  He also praised the people of Northern Ireland for coming together and showing love and solidarity for "two people they do not know".

  Sligo parish priest Fr Noel Rooney told BBC News NI that he first met Mr Moffitt when he was a child growing up in Lisacul.

  He described him as a hardworking businessman and a "nice, decent, honourable guy".

  Fr Rooney has also been ministering to Mr Snee's family and said they had been left extremely upset by his loss.
