content: |-
  The Lib Dems' success vindicated a strategy the party pursued since well before the election was called, writes Hannah Miller.

  Stunts and substance saw Lib Dems win in Tory heartlands

  Ed Davey now leads a Liberal Democrats party with a record number of MPs

  It has been a record-breaking night for the Liberal Democrats as they smashed through Conservative heartlands. Taking the seats of two former prime ministers - David Cameron and Theresa May - were symbolic victories that demonstrate the depths of dissatisfaction among long-standing Conservative voters. Their success relied on the crumbling Conservative vote. But it is also a win of their own - the vindication of a strategy the party has pursued with since well before the election was called. We all saw the stunts - Ed Davey paddleboarding, bungee-jumping, driving a JCB. But that was the easy bit. Designed to make you watch, to make you laugh, to make the campaign more interesting for everyone involved. The real substance lay beneath that style, with a campaign on the ground to make the party proud. Liberal Democrats are famous for their local activists being deeply embedded in local communities. They often do well in local elections. This time around they targeted their resources into seats where they had previously come second. They eyed up not their national vote share, but their canvas returns in seats where they had a hope of winning. As a result Sir Ed now leads a party with a record number of MPs, even though their vote share (around 12%) has barely changed since 2019. It was almost twice as high as that when party went into coalition government in 2010.

  The Lib Dem leader's stunts made the campaign more interesting

  We are already hearing Reform UK talk about how unfair it is that they got a slightly higher vote share (14%) but far fewer seats. The Lib Dems know from experience what that feels like. It is a harsh reality that has been inflicted on smaller parties by the First Past The Post system for decades. They even agree with Nigel Farage that the system should change. But rather than complaining, this time the Liberal Democrats figured out how to work with the system as it exists. In seats where they won, they won big. They didn’t try to replicate that across the country. And in the coming years their strategy will have to adapt. But this success did not happen by accident.
