title: Actor Orlando Bloom meets children affected by Ukraine war and visits Zelensky
  - BBC News
date: '2023-03-27'
section: General
url: http://www.bbc.co.uk/news/world-europe-65085212
content: |-
  The Lord of the Rings star, who is a goodwill ambassador for Unicef, also met President Zelensky.

  Actor Orlando Bloom has visited a centre in Kyiv which provides support to children affected by the war in Ukraine.

  The Lord of the Rings star, who is a goodwill ambassador for the UN children's organisation Unicef, also met with Ukraine's President Volodymyr Zelenskiy, and praised the strength of the Ukrainian people as "awe-inspiring".
