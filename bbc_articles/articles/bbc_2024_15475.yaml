title: Fire breaks out at shopping centre in China's Sichuan province - BBC News
date: '2024-07-17'
section: General
url: http://www.bbc.co.uk/news/videos/cn081g6182po
content: |-
  At least 16 people have died in the mishap at the 14-storey building.

  At least 16 people have died following a fire at a shopping centre in the city of Zigong in China's Sichuan province, according to state media.

  Thirty people were saved on Wednesday evening, reports said. The fire has been extinguished and the rescue efforts ended overnight.

  While the specific cause of the blaze is still unclear, preliminary investigation suggests it was started by construction work at the building.

  Footage broadcast by China's state media and on social media showed thick black smoke towering above the 14-storey building.
