title: 'Sunak: American XL bully dogs banned by end of year - BBC News'
date: '2023-09-15'
section: General
url: http://www.bbc.co.uk/news/uk-politics-66821925
content: |-
  The PM says experts and police will work together to "accurately define the breed" and powers will be used in the Dangerous Dogs Act.

  The PM said experts and police will work together to "accurately define the breed" and powers will be used in the Dangerous Dogs Act.

  Rishi Sunak said it was clear the American XL bullies were "a danger to communities" and a ban was needed.
