  Dr Youssef Abu al-Rish, undersecretary of the Hamas-run health ministry in Gaza, told Gaza Lifeline that Rafah's remaining medical facilities would no longer able to save the lives of many seriously wounded or ill patients. "Rafah governorate does not have real medical services after the Abu Youssef al-Najjar hospital went out of service and people were unable to reach the European Gaza Hospital," he said. "There are many field hospitals, but they cannot provide all these services as they do not have the necessary infrastructure or capabilities... For instance, they do not have dialysis services, oxygen-generating stations, intensive care departments or blood banks." He added: "The Kuwaiti Hospital is a small non-governmental hospital that cannot provide emergency services. But we are trying to enhance its capabilities." Medical aid group Project Hope said on Thursday that all of its clinics and mobile medical points in Rafah were closed, and that almost all of its staff had been evacuated, with many fleeing to Khan Younis and Deir al-Balah. "Most aid services were based in Rafah. Now that people are further north, there is nearly no help. As long as the violence continues and the Rafah border crossing remains closed, more and more people will die from preventable causes," said Moses Kondowe, its Gaza team lead in Rafah.

  Field hospitals have been set up in Rafah but they have limited resources to treat patients

  Mr Kondowe said he expected to see malnutrition, pregnancy complications and other health conditions like Hepatitis A and cholera increase. Hundreds of thousands of children sheltering in Rafah are already injured, sick, malnourished, traumatized or living with disabilities. Médecins Sans Frontières said on Wednesday that its teams had begun to discharge patients from Rafah Indonesian Field Hospital, where they helped provide post-operative care, and had suspended activities at its clinic in al-Shaboura - a move it described as "catastrophic". The medical group also said it was handing over its activities at the Emirati maternity hospital to the Gaza health ministry. Dr Abu al-Rish said the closure of the Rafah crossing with Egypt, which Israeli troops seized on Tuesday, meant patients who had been due to be sent abroad for medical treatment were now stranded. Haitham, a teenage boy who has already had three operations for a bullet wound that punctured his lung, is one of those waiting to leave. "I feel helpless," he said. "The world is powerless to open the border. The hospitals here can no longer help me." Zeina, a nine-year-old girl who has epilepsy, was also scheduled to be transferred abroad by the end of this week. "She went to the hospital for hepatitis and her liver function tests where very high and she fell into a coma," her mother told Gaza Lifeline.

  Zeina's mother said she could not walk or hold anything after she awoke from a two-week coma

  "After 14 days, Zeina woke up and her nerve cells had been affected and she couldn't... walk or move or hold anything. Her hands were often shaking so they started giving her medication and then put her up for transfer." Israeli military spokesman Rear Admiral Daniel Hagari said on Thursday night that its troops were continuing to operate against "terror targets and the smuggling of weapons in the area of eastern Rafah". "This activity supports the intelligence we had [that] Hamas used the area of the Rafah Crossing for terrorism," he added. "We found several terrorist tunnel shafts in the area, which we are currently investigating and scanning, and so far, our forces have eliminated approximately 50 terrorists in this area during encounters and air strikes, and also during scans in the area." The Israeli military also said it had reopened the nearby Kerem Shalom goods crossing for humanitarian aid on Wednesday, but the UN has said the fighting has made it impossible for it to pick up supplies there. And unless they receive deliveries of fuel in the next few days, the World Health Organization has said all hospitals in Rafah and elsewhere in southern Gaza may soon have to halt services.
