  It will be difficult for Ukraine to hold back Russia's advances without the same scale of support provided by Washington during Joe Biden's administration. While Russia is losing large numbers of troops in the conflict, the country's commanders are prepared to throw everything at Ukrainian front lines. Russia is also now spending more on defence than the whole of Europe combined, according to figures from The Military Balance, an annual comparison of the strengths of armed forces around the world. Earlier this week, Ukrainian President Volodymyr Zelensky said he was ready to negotiate a peace deal with Russia but wanted his country to do so from a "position of strength". Speaking to the Guardian, external, Zelensky said if Trump was able to get Ukraine and Russia to the negotiating table, the Ukrainian president planned to offer Russia a straight territory exchange, giving up land Kyiv has held in Russia's Kursk region since the launch of a surprise offensive six months ago. "We will swap one territory for another," he said, but added that he did not know which part of Russian-occupied land Ukraine would ask for in return.
  • None Zelensky gives 'victory plan' a hard sell in the US - did it fall flat? Zelensky also said he would offer US firms lucrative contracts to rebuild Ukraine, in an apparent attempt to get Trump onside. In November last year, he and the US president spoke following Trump's election victory. Zelensky said he had a "constructive exchange" with the then president-elect and that he was certain the war with Russia would "end sooner" than it otherwise would have once Trump became president. But Trump's Democratic opponents have accused him of being too close to Russian President Vladimir Putin and say his approach to the war amounts to surrender for Ukraine, which would in turn endanger all of Europe. It also remains unclear whether a diplomatic solution to the war could be reached anytime soon that would be acceptable to both sides.
