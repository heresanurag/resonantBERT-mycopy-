title: Tracy-Ann Oberman to return to EastEnders as Chrissie Watts - BBC News
date: '2024-07-04'
section: Culture
url: http://www.bbc.co.uk/news/articles/cd17dg7wj4zo
content: |-
  The actress has already started filming for the scenes, which will air in autumn.

  Chrissie Watts will return to the soap later this year

  Tracy-Ann Oberman is returning to EastEnders as Chrissie Watts – after almost two decades. Chrissie Watts was last seen in the show in December 2005, when she went to jail for murdering her husband "Dirty Den" Watts, played by the late Leslie Grantham. Chrissie made plenty of enemies during her 18 months on Albert Square, mainly Den’s adopted daughter, Sharon, played by longstanding cast member Letita Dean. Since her time on the soap, Oberman has featured in shows such as Doctor Who and After Life, and as Auntie Val in Friday Night Dinner. Oberman is also an experienced theatre actor, and most recently starred as Shylock in retelling of Shakespeare play The Merchant of Venice 1936, which went on a national tour.

  The actress has already started filming for her EastEnders return, although the scenes won’t air until autumn. Oberman said she "jumped at the chance" to return to Albert Square. "Chrissie Watts was such a great character to play - a victim or a villain," she said. "She is a real fan favourite so, when [executive producer] Chris Clenshaw asked me to come back and revisit her and see what has happened in the last 19 years, I jumped at the chance. "The scripts are fantastic and I hope the viewers enjoy her as much as I am enjoying playing her again." EastEnders’ executive producer Chris Clenshaw said he wouldn’t reveal plotlines, but promised "it’s never quiet when Chrissie Watts is around". "Although the character hasn’t been seen on screen for almost 20 years, Chrissie is cemented in EastEnders’ rich history for her murder of Walford’s most infamous villain, and Sharon’s beloved father, Dirty Den. "I’m keeping tight-lipped on the exact circumstances relating to her return for the time being."
