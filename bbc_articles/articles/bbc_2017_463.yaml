title: Aston Martin DB4 GT production to resume at Newport Pagnell - BBC News
date: '2017-01-14'
section: General
url: http://www.bbc.co.uk/news/uk-england-beds-bucks-herts-38618338
content: |-
  Production of the iconic model is to begin again after a decade-long gap.

  Production of the Aston Martin DB4 GT is to resume at Newport Pagnell, Buckinghamshire, after a decade-long gap.

  BBC reporter Mike Cartwright went along to see the plant.
