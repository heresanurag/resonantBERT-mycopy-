  Police bodycam footage released by the CPS shows the moment Derek Drummond hit a police officer.

  Police bodycam footage released by the Crown Prosecution Service shows the moment Derek Drummond hit a police officer.

  Derek Drummond, 58, was given a three-year sentence for the attack, which took place during violence in Southport.

  Drummond, of Pool Street, Liverpool, admitted the offences which occurred on 30 July, as he walked towards a mosque in Southport with a large crowd of people.

  Liverpool Crown Court was shown clips of Drummond kicking and attacking officers as they tried to form defensive lines with shields.
