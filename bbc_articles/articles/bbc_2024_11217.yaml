title: Bull spotted galloping down New Jersey train tracks - BBC News
date: '2024-06-10'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-67723281
content: |-
  Morning commuters were met with delays after the long-horned animal made an appearance on the tracks.

  New Jersey Transit train commuters were met with delays after a bull appeared on the tracks on Thursday morning.

  It is still unclear how the bull may have ended up on the tracks, though a local CBS news station reported it likely escaped from a nearby slaughterhouse. Multiple law enforcement agencies eventually wrangled the bull, sedated it and transported it to an animal sanctuary.
