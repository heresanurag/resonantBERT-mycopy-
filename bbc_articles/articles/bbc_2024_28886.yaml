title: Trafalgar Square Christmas tree is felled in Norway - BBC News
date: '2024-11-22'
section: London
url: http://www.bbc.co.uk/news/articles/c5y3z94l100o
content: |-
  A Norwegian spruce is sent from Oslo every year to thank Britain for its support during World War Two.

  Lord Mayor of Westminster, Robert Rigby (left) and the Mayor of Oslo, Anne Lindboe with the tree in Oslo

  A Norwegian spruce, which is sent to London every year for Christmas, has been felled in a traditional ceremony. To make the tradition more environmentally friendly, this year the tree is travelling part of the way to the capital by electric truck and a new tree has been planted in Oslo, to replace it. A tree is sent from Norway each year as token of thanks for Britain's support during World War Two. Once in the capital, the 56-year-old, 20m high tree will be erected in Trafalgar Square.

  "It isn’t Christmas in the UK until the Trafalgar Square tree arrives"

  Organisers described the spruce as "one of the world's most famous Christmas trees" representing "friendship between cities and countries, peace, and solidarity." It will be decorated with energy-efficient lightbulbs, hanging vertically in traditional Norwegian fashion. The British ambassador to Norway, Jan Thompson, said: "It isn’t Christmas in the UK until the Trafalgar Square tree arrives." She added that the tree had "brought joy to generations of Londoners", and said: "For many people visiting London it is as essential to see the Norwegian tree as to go Christmas shopping in Oxford Street or catch a show in the West End."

  For the first time, a replacement tree was planted in the forest in Oslo

  Oslo's mayor Anne Lindboe said the tree's meaning - of gratitude, friendship, and peace - was "just as significant today as it was 77 years ago." The Lord Mayor of Westminster, Robert Rigby, thanked Norway for the tree and said: "They have done a tremendous job as ever - it looks majestic." The tree lights will be switched on on 5 December.
