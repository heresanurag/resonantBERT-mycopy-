id: bbc_2017_3113
title: Berkeley student anger at right-wing speaker invitation - BBC News
date: '2017-02-02'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-38837395
content: |-
  A talk by Trump supporter Milo Yiannopoulos is called off amid protests at the Berkeley campus.

  The University of California at Berkeley has cancelled a talk by the editor of the right-wing Breitbart News website, Milo Yiannopoulos, after hundreds of students protested against his visit.

  Mr Yiannopoulos is an outspoken supporter of President Donald Trump.

  At least one fire was started and police fired tear gas, as the campus was put on lockdown.
