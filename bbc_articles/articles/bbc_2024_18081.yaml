title: 'Lola James: Missed chances before girl murdered by mum''s partner - BBC News'
date: '2024-08-01'
section: Wales
url: http://www.bbc.co.uk/news/articles/cn38drpzrpno
content: |-
  The mum of two-year-old Lola James repeatedly refused health visitor check-ups, a report finds.

  This video can not be played To play this video you need to enable JavaScript in your browser. Lola James's mum rang 999 after her partner brutally attacked her daughter, claiming she had fallen down the stairs

  There were "missed opportunities" to intervene before a toddler was murdered by her mother's boyfriend, a review has found. Children’s services at Pembrokeshire council were "overstretched and morale was low" prior to the death of two-year-old Lola James, a child practice review said. The toddler died from "catastrophic" brain injuries in July 2020 after being attacked by Kyle Bevan at the family home. Pembrokeshire council said its safeguarding duties were taken "extremely seriously" and had developed an action plan.

  Such a review is held when abuse or neglect is known or suspected and the child dies or suffers serious harm. It looks at the role of a number of agencies and bodies. Kyle Bevan, 31, was jailed for life in April 2023 for Lola's murder, while her mother Sinead James, 30, was sentenced to six years for causing or allowing her daughter's death at her home in Haverfordwest. Lola was left with 101 injuries on her body and Bevan tried to convince the jury she had fallen down the stairs after tripping over the family dog. The report, commissioned by Cysur, external, the safeguarding board for mid and west Wales, covered the 17-month period leading up to her death.

  Sinead James and Kyle Bevan were jailed in April 2023 over the death of Lola

  It outlined seven "learning points" for the agencies involved and 11 action points. An assessment of Lola by children's services in March 2020 "lacked detail and analysis", partly because her social worker was off sick. The team leader acknowledged the assessment team was "struggling under the pressure of the relentless workload”. The last home visit by a health visitor was on 15 February 2020, five-and-a-half months before her murder.

  James repeatedly declined requests for visits, including two days before Lola’s murder, when she instead had a phone call with the team. Welsh government guidance at the time stated health visitors should prioritise face-to-face contact for vulnerable families with safeguarding concerns, but the report said James's decision "was not challenged or probed" by the health visitor. Independent reviewer Emma Sutton KC concluded the health visitor could have taken "further steps to seek agreement for a home visit", calling it a "missed opportunity". A home visit may have revealed "concerning home conditions" and been an opportunity to see if Bevan was living there. Ms Sutton said it was only when all the different agencies involved were around the table that the chronology "became particularly clear". "Had a true picture of everybody’s organisations and what they were doing been there, then the circumstances and the level of risk would have been a lot clearer and different steps could have been undertaken," she said. She added that the risk assessment process in Lola's case was "inappropriate". "There absolutely is a need to not just accept at face value that matters are being dealt with. You need to be able to get through the front door," she said. Hywel Dda health board said during the review that a health visitor at the time had an average caseload of 250 children and there were significant staff shortages and sickness due to Covid.

  The reports suggests a home visit may have revealed "concerning home conditions"

  There was also a lack of "information sharing" between agencies. Lola's older sister told her teacher about home life, but there was no "ability to share sibling information between the respective educational settings". Bevan was known to the police after domestic incidents relating to his mum, as well as substance misuse. He made a report to police in June 2020 that a threatening letter had been delivered to him at James's home and Dyfed-Powys Police knew three young children were living there, but the "dots were not joined by police" and a referral was not made to social services. Ms Sutton said it was vital there were "adequate staffing levels and resources" and the children's services assessment team was able to "respond to and fulfil safeguarding responsibilities" going forward. The report said several requests were made for more resources to be allocated for several years, "including for the recruitment and retention of social workers".

  Kyle Bevan was known to police, but Lola's mum only disclosed that a "friend" was living at the property

  But it added the situation was now "more positive", with an extra £611,640 made available during June and July 2024. It suggested professionals should be supported in asking "probing questions of families" and not simply accept what is being said. Police should also establish a "flagging mechanism" for specific addresses where there is a wider history of safeguarding concerns. Cysur said it hoped the report would "contribute to wider ongoing learning and improvement in relation to a number of key safeguarding issues across all agencies with safeguarding responsibilities". The council’s cabinet member for social care, Tessa Hodgson, said safeguarding was the authority's "key priority" and an action plan had been developed to deal with the issues in the review. NSPCC Cymru said the findings highlighted "yet again the need for greater investment in children’s services in Wales to provide comprehensive support to any child at risk of harm and to be better equipped to prevent a tragedy such as this happening again". The Welsh government said: "A single unified safeguarding review system is being developed which will ensure the findings from all child and adult practice reviews are captured, shared and acted upon. "We are also developing a national practice framework to promote best practice and raise practice standards across services for children in Wales."
