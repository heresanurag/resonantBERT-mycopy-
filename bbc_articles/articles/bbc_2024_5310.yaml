id: bbc_2024_5310
title: 'Watch: Russia launches large missile attack on Kyiv - BBC News'
date: '2024-03-21'
section: General
url: http://www.bbc.co.uk/news/world-europe-68623563
content: |-
  Video shows burning debris falling from the sky, as people take shelter in subway stations.

  Russia has launched a large missile attack on Kyiv, Ukrainian officials say.

  Video shows burning debris falling from the sky and smoke billowing in the background, as people took shelter in a subway station.

  Several explosions were also heard as Ukraine's anti-missile defence systems were activated.

  It is the largest Russian attack on the capital in weeks, and follows a vow from Moscow for revenge over recent attacks by Ukraine on its border regions.
