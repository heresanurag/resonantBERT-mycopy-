content: |-
  The Italian food is at the heart of a project to give young people "focus and a bit of purpose".

  How Peebles is becoming a hotbed of pizza making

  The Food Punks project is aimed at helping young people learn cooking skills and build confidence

  It is a long way from the bustling backstreets of Naples to the more sedate main thoroughfare through Peebles. However, a food which is synonymous with the Italian city is now helping to offer an opportunity to young people in the south of Scotland town. An empty building on the High Street has been converted into a pizzeria and training academy. Food Punks - part of Tweeddale Youth Action (TYA) - is a chef-led catering organisation that is teaching cooking and catering skills.

  Dave Hodson says catering played a big part in putting his life on the right track

  The organisation has been running for more than a decade - doing outside catering and pop-up events - but the new pizzeria provides a precious permanent base. Former chef Dave Hodson, TYA locality manager, knows from personal experience the difference the trade can make. "I had turbulent teenage years, you know, I went to several high schools and left school with no qualifications," he said. "I was not always making good decisions. I was running with a crowd I probably shouldn't have been running with. "I think the catering industry saved my life really. "When I was 15, I got a job working washing up at a local Italian restaurant and things just sort of moved from there."

  An empty building on Peebles High Street has been converted for the project

  He said it was about more than just learning to make pizza, even though that is an art form in itself. "It's around food and it's around cookery skills, but it's not necessarily geared towards spitting out chefs," he explained. "We've seen young people coming through who've built on their own confidence and they've built on their interpersonal skills. "We've given some focus and a bit of purpose." He said being part of a kitchen crew and being involved with the project could be "really quite powerful" for the staff aged between 16 and 25.

  Among their number is musician Alex Church, 22, from Innerleithen. He had worked with Food Punks before and has just returned to the area from Edinburgh. "I'm a musician and you don't necessarily make a lot of money," he said. "I missed the work, I missed the team, I love hospitality and making pizzas. "It was kind of fate to be able to come back here and work with people I know, people I like and do something new and exciting." He said the young people involved loved being part of it and having a new permanent home made a big difference. "They want to get involved and get their hands dirty and it's the perfect way to do so," he said. "So having this place - it's just taking that to another level."

  Kieran Schaedler got involved in the project after leaving school

  Kieran Schaedler is 17 and from Peebles itself and got involved after he finished school in January. Now he works making the pizzas and is involved in food preparation. "It is good, I quite enjoy it," he said and added that it could be something he would considered as a career. "It could be, it is really just see what happens in the next coming months." And does he make a good pizza? "I like to say so - I have only heard good things," he said.

  Rachel Allan has always enjoyed working in kitchen environment

  Rachel Allan is 16 and from Cardrona and also got involved after leaving school. "I am the baker, I make all the cakes and stuff," she said. "I have always really liked being in the kitchen so it is definitely a career that I would want to be in. "Everyone likes pizza and there are cakes and salads - it is just a good combo to have here."

  Kieran Schaedler said he had "only heard good things" about his pizza making abilities

  The project has been supported by a wide range of groups including South of Scotland Enterprise, Scottish Borders Council, the National Lottery and the Scottish government. And, if you close your eyes and eat the pizza, you could just about imagine you were in the heart of southern Italy.
