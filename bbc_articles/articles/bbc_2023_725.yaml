title: 'WATCH: Kyiv helicopter crash blaze filmed through flat windows - BBC News'
date: '2023-01-18'
section: General
url: http://www.bbc.co.uk/news/world-64316963
content: |-
  Some residents in Brovary filmed the devastating fire through their windows.

  As a helicopter carrying top officials crashed near a kindergarten in Brovary, near Kyiv, some residents filmed the aftermath through their flat windows.

  Brovary is a commuter town and saw fierce fighting in the early days of Russia's invasion, before Moscow's forces were pushed out of the capital area.

