  Keir Starmer tells BBC being PM “tougher than anything I've done before" but also "much better”.

  PM says he's faced 'choppy days' since getting the job

  This video can not be played To play this video you need to enable JavaScript in your browser. Budget aims to put NHS "back on its feet" - says Starmer

  Sir Keir Starmer said he had faced “choppy days” in his first three months as prime minister. In an interview with BBC's Newscast to mark 100 days in office, he said so far his new job had been “much tougher than anything I've done before, but much better”. Looking ahead to this month's Budget he said the central focus would be on living standards, the health service and rebuilding Britain. He highlighted how as PM he had been buffeted by "side winds" in rows about his ex-chief of staff, Sue Gray, and gifts from donors, and pointed to the government's early achievements, like settling health service pay disputes.

  Last weekend his former chief of staff Sue Gray resigned, after weeks of infighting and rows in Starmer’s senior team. The PM also repaid thousands of pounds he had received in gifts and hospitality after a row lasting weeks about ministers accepting freebies. Speaking to Chris Mason and Adam Fleming on Friday, the prime minister said "there is always going to be choppy days, choppy moments". He added: "I have been through this before [as leader of the Opposition]. You get these days and weeks when things are choppy, there is no getting around that. That is in the nature of government." “When I look at what it was I wanted to achieve in the first 100 days and ask myself, have we done what I wanted us to do, what I planned for us to do, the answer is yes.” Claire Ainsley, chair of the Building Back Britain Commission and a former director of policy to Starmer, told BBC Radio 4's Today programme that it was "daft to deny" the government had seen choppy moments. But she argued that "some of the big judgement calls I think they have got right" - pointing to Starmer's international diplomacy efforts and "honest" assessment of the state of the public finances. Asked about the budget later this month, Starmer said that it would focus on things Labour had made "promises" on, including living standards and making people better off, getting the NHS "back on its feet," including tackling waiting lists and "rebuilding Britain". He said he wanted a health service "fit for the future that we can look back proudly [on] in generations to come". Nick Hulme, who oversees the NHS in east Suffolk and north Essex, told the Today programme that the combination of meeting winter needs and processing the patient backlog was providing "a real sense of pressure to staff". While the NHS has had to cope with winter pressures in previous years, he said the waiting list for elective care was "a real challenge that perhaps we haven't faced in the past". Matthew Taylor, chief executive of NHS Confederation, said the health service had not been able to invest additional funds in meeting winter needs - leaving it with "high levels of risk". He said he would welcome more government funding, but that he understood the pressures on government funding.

  Starmer also publicly rebuked his Transport Secretary Louise Haigh after she described P&O ferries as “cowboy operators” who she has been boycotting in recent years. Her criticism of the firm stems from its decision in 2022 to sack 800 seafarers and replace them with cheaper workers. It insisted this was necessary for the ferry operator's survival. Crucially, Haigh also encouraged others to boycott the firm. It has been reported by Bloomberg that P&O’s parent company, DP World, postponed announcing a major £1bn port investment in the UK, external in the light of the remarks. The company's boss is now thought to no longer be attending an investment summit organised by the government next week - where DP World was expected to unveil the expansion. The BBC understands discussions between the government and the company are ongoing to try to tempt them to turn up on Monday, with the investment hanging in the balance. When asked if his transport secretary had been wrong to describe the company as cowboys and suggest a boycott, Starmer said: "Well, look, that's not the view of the government." It is the first time since Labour came to power that the prime minister has publicly taken issue with remarks from one of his cabinet ministers. Senior figures were incensed at the suggestion from a senior minister of a boycott – at just the point they are trying to claim they lead a “pro business” government. Starmer added that he believed the investment summit was evidence of a growing confidence from companies in the UK’s economy. Asked what might seal the deal for firms in choosing the UK, he said: “I think what will convince them is that we have listened to what they've told us about economic stability.” He claimed they had been put off in recent years because of “a lack of confidence in the last government". "Prime ministers were changing frequently. Ministers were changing frequently. There was no clarity of strategy and those sticking to the strategy." Starmer also reflected on how his life has changed since he moved into No10. “We're living in a flat in Downing Street above the shop, and that's not very normal. Everybody who wants to come and see you has to come through an armed guard. This is odd.” He said the job meant he saw less of his family than he would like and that he “didn't have kids to sort of visit them when they're grown up and find out what they're really like. I had kids because I want to be with them, enjoy their company.” Starmer said, though, there had been one unforeseen benefit of living in Downing Street: “When our children come back from school about four-ish, they pop down to my office in Downing Street, and if I'm around, I can see them for 5 or 10 minutes. "That would never have happened before because they would have gone back home in Kentish Town, I'd have been in Westminster or wherever.” The Conservative Party said: "From defence to pensions, health to education, Labour have let the country down. The next 100 days are set to be even worse."
