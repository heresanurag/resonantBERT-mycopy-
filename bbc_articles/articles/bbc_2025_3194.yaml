  Davina McCall made an appearance on the red carpet in a breathtaking all-black outfit - just weeks after revealing she had undergone surgery for a benign, but rare tumour. The broadcaster has something to celebrate on Saturday night, as she's just announced a new BBC dating show.

  Stella Quaresma, Renee Downer and Jorja Douglas make up the British girl group FLO, who were nominated for best R&B act. The group told the BBC they have been busy in recent weeks preparing for their tour, working with Beyoncé's dance captain Amari Marshall. "We've been running and singing and holding the plank and singing," Downer says. Just hearing that has made me break out into a sweat.

  Rapper and YouTuber KSI opted for an all-black leather look. His song Thick Of It, which features Trippie Redd, was nominated for song of the year - despite being something he was "clowned for". He told the BBC about his very busy schedule, which he is currently "winging". "I've got a fight at the end of the month, I'm making music, BGT [Britain's Got Talent], YouTube videos," he said. Hopefully he left room for partying at the Brits in his calendar.

  The Last Dinner Party - made up of Aurora Nishevci, Emily Roberts, Abigail Morris, Georgia Davies and Lizzie Mayland - also made their way onto the red carpet. Winners of last year's rising star award - they were nominated for four awards this evening, including album and group of the year.

  CMAT's stage name is pretty simple when you think about it, it's simply an abbreviation of her name - Clara Mary-Alice Thompson. The Irish singer-songwriter wasn't up for any awards at this evening's event - but her outfit certainly deserves some recognition.

  All-black outfits have certainly been a theme at this year's event - why didn't I get the memo? Ife Ogunjobi, TJ Koleoso, Femi Koleoso, Joe Armon-Jones and James Mollison of Ezra Collective looked too cool for the red carpet - complementing their outfits with some shades to block out the photographer's flashes.

  Did Ezra Collective and Bring Me The Horizon get a group discount on their outfits for tonight? If so that's smart decision making on their part. The Sheffield band were last year's best alternative/rock act and were up for best group at this evening's awards.

  Fresh from promoting her new single Crush with AJ Tracey, Jorja Smith was on the red carpet in leather-look black and blue dress.

  Presenter and former footballer Alex Scott and singer Jess Glynne were couple goals on the Brits red carpet. The pair recently made a couple of appearances at London Fashion Week and these looks certainly wouldn't have been out of place on the catwalk.

  Its been a busy week for Stranger Things star Millie Bobby Brown - from attending the SAG Awards and promoting her new film The Electric State at its Los Angeles premiere. But it's great to see she found the time to come back home to the UK to enjoy a night of musical performances.

  "I'm not being a mad man in shades," said Stormzy on stage, explaining he was wearing sunglasses inside the O2 because he had "mashed up my eye" while playing padel. It was game, set and match to the best rap act who won his fourth Brit award.
