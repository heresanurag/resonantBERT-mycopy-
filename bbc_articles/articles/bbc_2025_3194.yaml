content: |-
  The world's biggest artists were on the red carpet at London's O2 Arena ahead of the ceremony.

  Red carpet in pictures: Teddy Swims and Sabrina Carpenter arrive at the Brits

  The Brits Awards red carpet was as vibrant as ever, with some amazing musical talent making an appearance for the UK's biggest night in music. Sabrina Carpenter, Jade Thirlwall and Teddy Swims stole the show with their outfits. Teddy, whose track Lose Control was nominated for international song of the year stayed true to his name by turning up to the red carpet covered in teddy bears and toys. It was chilly at the O2 Arena this evening so it was a pretty smart choice from the US singer.

  Sabrina Carpenter walked the red carpet as a winner already - she was the recipient of the Brits Global Success award and the first international artist to receive the accolade. The Please Please Please singer opened tonight's show and will be embarking on a tour of the UK and Ireland over the next few weeks.

  There was no Brat green for Charli XCX on the red carpet this evening. The Essex-born singer won big at tonight's Brits - taking home five awards.

  Jade Thirlwall appeared in an incredible gown, which she described as a "denim wedding dress". She told the BBC she was "very grateful" to have received two nominations for best pop act and song of the year. Her song Angel of My Dreams is an honest assessment of her "toxic relationship with the music industry" and aims to show how "fame has come at a price" for Thirlwall. The 32-year-old has navigated the music industry as a solo artist in the last year, after her group Little Mix went on hiatus in 2022.
