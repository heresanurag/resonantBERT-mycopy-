title: Police bodycam released after New Jersey beach punch video - BBC News
date: '2018-06-01'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-44325727
content: |-
  Police video shows the moment officers tackled the woman on a beach in New Jersey.

  A video of Emily Weinman being tackled to the ground by officers was widely shared.

  Now police bodycam of the moment has been released.
