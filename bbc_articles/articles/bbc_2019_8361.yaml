title: 'Ilhan Omar: ''Send her back'' chants at Trump rally - BBC News'
date: '2019-07-18'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-49034885
content: |-
  US congresswoman Ilhan Omar responds to chants of "send her back" at a Trump rally in North Carolina.

  US Democrat congresswoman Ilhan Omar has responded after crowds at a presidential rally chanted "send her back".

  The Minnesota representative said: "We are Americans as much as everyone else."

  Donald Trump was cheered at Wednesday's rally in North Carolina after continuing his attacks on the four non-white Democrat congresswomen, known as "The Squad".

  The chanting resembled the words that Mr Trump's supporters shouted about Hillary Clinton during his presidential campaign in 2016.
