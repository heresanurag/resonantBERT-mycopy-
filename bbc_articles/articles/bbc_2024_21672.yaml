title: 'Ryder Cup 2025: Jon Rahm of LIV contests DP World Tour fines - BBC Sport'
date: '2024-09-12'
section: Golf
url: http://www.bbc.co.uk/sport/golf/articles/cp3d3n9rwr9o
content: |-
  Jon Rahm improves his chance of playing in next year's Ryder Cup by appealing against the fines imposed on him by the DP World Tour.

  Rahm was a pivotal player in last year's Ryder Cup victory for Europe in Italy

  Jon Rahm has improved his chances of playing in next year's Ryder Cup by appealing against the fines imposed on him by the DP World Tour. The Spaniard either had to pay his fines or appeal against them to be allowed to play in the three DP World Tour events he needs to retain his membership of the European-based tour and therefore be eligible for the Ryder Cup. Rahm, 29, said on Wednesday he did "not intend to pay the fines". But with Thursday's 12 noon deadline approaching for entries to the Spanish Open, which begins on 26 September, he appealed against the fines. A DP World Tour spokesman told BBC Sport: "Jon Rahm has a pending appeal against sanctions imposed on him and in accordance with the DP World Tour's regulations, he is eligible to participate in the Open de Espana." By contesting the fines, Rahm has followed his Ryder Cup and LIV team-mate Tyrrell Hatton, who was able to play in the British Masters earlier in September. They were among several players fined for playing Saudi Arabian-funded LIV Golf tournaments that conflicted with DP World Tour events without requesting permission from the European-based circuit. Players must play four DP World Tour events a year to retain their membership, with Rahm's participation in the Paris Olympics counting as one. He has also entered next month's Dunhill Links Championship in Scotland and the Andalucia Masters at Sotogrande in Spain. The Ryder Cup between Europe and the United States will be played at Bethpage Black in New York next September.

  Europe's captain Luke Donald welcomed the news of the appeal by Rahm, who claimed three points in Europe's commanding 161⁄2-111⁄2 victory at Marco Simone last year. "I'm very happy to hear he made that decision - I know he was sitting on the fence a little bit," Donald said after finishing his opening round at the Irish Open. "Very glad he's done that to allow him to play and create some time for things to hopefully figure themselves out," the Englishman added in reference to the talks between the PGA Tour, DP World Tour and Saudi Arabia's Public Investment Fund that funds LIV Golf. Those discussions have been ongoing since the organisations signed a "framework agreement" in June last year. "We're all being very patient right now," Donald added. "It's been frustrating for a lot of the players to see how slow everything's going. I've heard in the last couple of weeks there's been a little bit more progress."
