content: |-
  England's two-point defeat by New Zealand on Saturday should not be considered George Ford's fault, says Marcus Smith.

  England's defeat 'nothing to do with Ford' - Smith

  On Saturday against New Zealand, George Ford was unable to find the form that brought him three successful drop-goals against Argentina at the World Cup last year

  England's two-point defeat by New Zealand on Saturday was not entirely George Ford's fault after his crucial missed kicks, says fellow fly-half Marcus Smith. Smith, 25, scored 17 points and set up England's only try before being replaced in the final quarter by 97-cap Ford, who missed a potential match-winning penalty and last-gasp drop-goal. At the time of Smith's departure, England had an eight-point advantage. But a try by wing Mark Tele'a, who shrugged off Ford's attempted tackle, and five points from replacement Damian McKenzie put the All Blacks ahead with three minutes left at Allianz Stadium. Ford was handed opportunities to swing the match back England's way but could not find the clinical kicks required as New Zealand clung on for a 24-22 victory. "Sometimes that's the life of a kicker, we've all experienced that. It's part and parcel of the job," said Smith, who struggled off the tee in the first Test defeat by New Zealand in July. "I've learned so much off George. He's an unbelievable kicker, both off the tee and out of hand. It was one of those days. "It's nothing to do with him why we didn't win the game. It's a team effort. Every kicker in the world has experienced that." Following McKenzie's brilliant touchline conversion from Tele'a's try, Anton Lienert-Brown mistimed a tackle to give Steve Borthwick's home side a chance to reclaim the lead. Ford's penalty struck the post and was dropped by New Zealand, giving England an unexpected second chance to snatch the game, but Ford was unable to convert the drop-goal with the clock in the red. In March, Smith landed a final-play drop-goal from a slightly closer spot to defeat Grand Slam-chasing Ireland. "As kickers we always practise the drop-goal, but it's very different when you're out there in front of 80,000 people and the All Blacks shouting 'Drop-goal! Drop-goal!'," Smith added. "It's an extremely tough kick. Fordy is a master of that drop-goal kick. We go through that scenario week-in, week-out. "We practise it as kickers every single day, but sometimes it doesn't go for you. We're all human and people miss."

  Saturday marked the first time since 2022 that Smith has started four straight Tests at fly-half, following injuries to Ford and former captain Owen Farrell's decision to rule himself out of international selection by moving to French club Racing 92. While three narrow defeats by New Zealand have come in those matches, the 25-year-old Harlequin believes there is still plenty of time to follow New Zealand fly-half Dan Carter in guiding his team to World Cup glory. "It's not a coincidence that people win towards the end. Dan Carter played his first World Cup final [in 2015] at 33, sometimes it's life," added Smith. "International rugby is very different to the Premiership and the experiences we're experiencing now are very painful, but we'll be better for them. "Keep the faith. We've fallen again on the wrong side of the result, but we'll learn from it 100%. "These experiences will tighten us as a group and it will be worth it in the long run. We will be better for it."
