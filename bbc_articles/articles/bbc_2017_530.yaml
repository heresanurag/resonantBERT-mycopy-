  CCTV has revealed the moment a man opened fire at Fort Lauderdale airport on Friday, as a suspect appears in court charged with killing five people and injuring six others.

  CCTV has revealed the moment a man opened fire at Fort Lauderdale airport on Friday.

  Suspect Esteban Santiago, 26, is appearing in court charged with killing five people and injuring six others.
