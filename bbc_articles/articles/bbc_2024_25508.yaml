  Harry Styles, Louis Tomlinson, Liam Payne, Zayn Malik and Niall Horan of One Direction with their award for Best British Single in the press room at the 2012 Brit Awards at The O2 Arena, London

  US singer Charlie Puth, a co-writer on Payne's 2017 song Bedroom Floor, said he was in "shock" after Payne's death. Charlie posted images of the pair working together, alongside the caption "Liam was always so kind to me". The Wanted star Max George described his death as "absolutely devastating news". "Over the last few years I had the pleasure of getting to know him personally and spent some treasured time with him," he said on Instagram. "Liam was absolutely wonderful in terms of support when Tom [Parker] fell ill, performing at the Royal Albert Hall with us for Stand Up To Cancer. "He supported me a lot personally after Tom passed. I will never forget that. "He was one of the first major artists I got to work with. I cannot believe he is gone... I am so upset right now, may he rest in peace."

  Liam Payne and his ex-partner Cheryl attending the Brit Awards at the O2 Arena in 2018

  Ronan Keating shared a picture of him with Payne, along with the caption "bloody heartbreaking".

  The X Factor said they were "heartbroken" by his passing and were thinking of Payne's loved ones and all who loved him. "He was immensely talented and, as part of One Direction, Liam will leave a lasting legacy on the music industry and fans around the world." On X, Rylan Clark, who was also a X Factor contestant, said the death was "so tragic" , while Jedward sent their condolences to Cheryl, his son Bear and "all the One Direction family". Football team West Bromwich Albion were "saddened" by the passing of "Baggies fan" Payne, and sent their thoughts to his loved ones. Mcfly sent their love to Payne's friends and family, and said they were "shocked and extremely sad to wake up to the news" of his death. Liam Gallagher from Oasis, wrote on X: "Life is precious kids and you only get to do it once go easy." DJ and music producer Zedd, who featured alongside Payne on the 2017 song Get Low, called the singer's death "absolutely heartbreaking". Boyband Backstreet Boys said: "Words can not express the emotions we are collectively feeling right now, and it seems like the rest of the world is in the same boat." American singer and rapper Ty Dolla Sign said he would "miss" Payne, captioning videos and pictures on his Instagram story: "Just talked to you two days ago my guy."
