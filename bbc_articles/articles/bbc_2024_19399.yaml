title: Immigrant limits could shut care homes, says Care Forum Wales - BBC News
date: '2024-08-21'
section: Wales
url: http://www.bbc.co.uk/news/articles/cx2n9675651o
content: |-
  A group representing care homes in Wales says more could shut after changes to immigration rules.

  This care home in Pentrefoelas, Conwy county is "dependent" on employing workers from abroad

  More care homes in Wales could close due to changes to the UK government's immigration rules, a body representing homes has said. Care Forum Wales (CFW) is concerned about a tightening of immigration rules in March that make it more difficult for people who move to the UK to work in the care sector to bring their families with them. One care home said a lack of local interest in care sector jobs meant it had to rely on foreign workers. The UK government said it was committed to reducing "historically high" immigration levels with the aim of "training more workers" in Britain.

  The number of people applying for a UK visa to work in the care sector fell by 80% in the first quarter of 2024, the latest official figures indicate. Since March, most people moving to Britain to work in the care sector can no longer bring their families with them, as the government aims to reduce immigration numbers. Statistics show that the number of people applying for a UK visa to work in the care sector fell by 80% in the first quarter of 2024.

  Recruiting local staff is difficult, says the home's manager Meryl Welsby

  Cartref Bryn yr Eglwys, a care home in Pentrefoelas, Conwy county, said it was "dependent" on overseas staff. Carers from 10 different countries look after the home's 30 residents. "We've been trying to recruit locally for years, but no-one applies for the jobs," said its manager Meryl Welsby. "No-one wants to work weekends, nights, and it’s not attractive." She said the new restrictions for foreign care workers and their families made staffing the home even more challenging. "It’s easy for the government to say, 'Oh well, you can’t recruit from abroad, to bring our numbers down,' but the thing is, where are we going to recruit from? "There’s nowhere else and nothing else we can do." Care Forum Wales said it feared the changes to the rules could lead to major problems. "It’s going to be a big concern in the coming years," said Kim Ombler, a care home owner on Anglesey and spokesperson for Care Forum Wales.

  The care sector is affected by changes to immigration rules, says CFW spokeswoman Kim Ombler

  "If we can’t get workers from abroad and also can’t get local workers to fill the gap, there’s a big worry that homes could close because of this." There are also difficulties with the processes around sponsoring care workers to come to the UK, she added. The Labour UK government said it had a clear plan to reduce "high numbers of legal immigration". "By combining immigration, the labour market and skills system we ensure that the workforce can be grown" in the UK, it added. A Welsh government spokesperson said that "recruiting and retaining staff in social care remains a significant challenge." It expressed concerns about the previous Conservative government’s announcement to limit dependents coming to Britain. However, it said that "there isn’t enough data yet to show solid evidence" of the trend and welcomed the UK government’s commitment to better engage with devolved administrations.
