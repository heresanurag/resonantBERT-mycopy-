content: |-
  Arsenal manager Jonas Eidevall discusses how his home nation Sweden could hurt England in their Euro 2022 semi-final.

  Euro 2022: How Sweden can hurt England in semi-final Last updated on .From the section Women's Euro 2022

  England's Beth Mead (left) has five goals and two assists in the tournament, while Sweden's Fridolina Rolfo has one goal and one assist While England are considered favourites to book their place at the Euro 2022 final, standing in their way is the highest-ranked team in the competition. Sweden, ranked second in the world behind the United States, have reached back-to-back Olympic finals and won bronze at the 2019 World Cup in France. Peter Gerhardsson's team also have history on their side, with the Lionesses winning just three of their 26 meetings in all competitions. So what do England need to be wary of? Arsenal's Swedish manager, Jonas Eidevall, takes a closer look for BBC Sport at how the teams match up before Tuesday's semi-final.
