id: bbc_2022_11522
title: 'As it happened: Liz Truss appoints more ministers on first full day as PM
  - BBC News'
date: '2022-09-07'
section: UK Politics
url: http://www.bbc.co.uk/news/live/uk-politics-62812442
content: "Former Housing Secretary Robert Jenrick and leading Brexiteer Steve Baker\
  \ are among the new appointments.\n\nToday was the first glimpse of a new politics\
  \ - a reconfigured national conversation.\n\nAfter a summer of public tussles within\
  \ one party, this was the return of party politics - but with a different feel,\
  \ a different tone.\n\n\uFEFFIt felt less personal, much less theatrical and more\
  \ ideological.\n\nGone were the linguistic gymnastics of Boris Johnson.\n\nGone\
  \ was the personal venom between the Conservative and Labour leaders.\n\nInstead,\
  \ the instinctive dividing lines between the Tories and Labour seemed sharper; Sir\
  \ Keir's demand for a windfall tax on energy companies, the prime minister's resistance\
  \ to the idea.\n\nMeanwhile, the prime minister has continued to colour the canvas\
  \ of her government beyond the foreground.\n\nHer top team was dubbed an \"Abba\
  \ cabinet\" - the winner takes it all, her supporters in near total domination.\n\
  \nAppointments this afternoon to junior ranks included a smattering of supporters\
  \ of Rishi Sunak, including the former cabinet minister Robert Jenrick and former\
  \ Leader of the House Mark Spencer.\n\nTomorrow will see the new government's first\
  \ big moment: its plan to help with energy bills.\n\nIt is likely to define its\
  \ early time in office."
