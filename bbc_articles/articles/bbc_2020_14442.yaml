title: 'As it happened: Brexit trade talks end without decision - BBC News'
date: '2020-12-09'
section: UK Politics
url: http://www.bbc.co.uk/news/live/uk-politics-55245664
content: |-
  UK PM Boris Johnson and European Commission President Ursula von der Leyen agreed a firm decision should be taken by Sunday.

  Quote Message: The prime minister and President von der Leyen met for dinner in Brussels this evening. The leaders had a frank discussion about the state of play in the negotiations. They acknowledged that the situation remained very difficult and there were still major differences between the two sides. They agreed that chief negotiators would continue talks over the next few days and that a firm decision should be taken about the future of the talks by Sunday. The prime minister is determined not to leave any route to a fair deal untested, but any agreement must respect the independence and sovereignty of the UK. from Downing Street spokesman

  The prime minister and President von der Leyen met for dinner in Brussels this evening. The leaders had a frank discussion about the state of play in the negotiations. They acknowledged that the situation remained very difficult and there were still major differences between the two sides. They agreed that chief negotiators would continue talks over the next few days and that a firm decision should be taken about the future of the talks by Sunday. The prime minister is determined not to leave any route to a fair deal untested, but any agreement must respect the independence and sovereignty of the UK.
