title: 'FA Cup draw: MK Dons to host rivals AFC Wimbledon in first round - BBC Sport'
date: '2024-10-15'
section: FA Cup
url: http://www.bbc.co.uk/sport/football/articles/c206y0x71ggo
content: |-
  MK Dons will host rivals AFC Wimbledon as one of 40 ties in the FA Cup first round.

  Elsewhere, League One Northampton Town will play sixth-tier neighbours Kettering Town.

  The lowest-ranked side left in the competition, Hednesford Town, will face Gainsborough Trinity at home after they beat Gateshead 3-1 in Tuesday's fourth-round qualifying replay.

  Seventh-tier side Harborough Town, making an appearance in round one for the first time, will be looking to extend their run after being drawn at sixth-tier Tonbridge Angels.

  MK Dons and AFC Wimbledon, who are both in League Two, have been rivals since Wimbledon FC relocated to Milton Keynes in 2003 and subsequently changed their name to MK Dons in the summer of 2004.

  South London side AFC Wimbledon were formed as a phoenix club and have risen through the divisions in the 22 years since they were founded.

  Meanwhile, League One leaders Birmingham City have an away tie against National League side Sutton United and second-placed Wrexham will face League Two's Harrogate Town.

  The ties will take place over the weekend of 2 and 3 November.
