  An emotional President Joe Biden took to the stage on opening night of the Democratic National Convention.

  President Joe Biden has given an emotional keynote speech on the opening night of the Democratic National Convention in Chicago.

  He appeared teary-eyed as he took to the stage and gave a lengthy speech defending his legacy and praising Kamala Harris, saying choosing her as his running mate was the "best decision" of his career.

