content: |-
  A review found numerous failings, including that the concerns of Valdo Calocane's family were not always listened to.

  We owe an apology to killer's family, NHS boss says

  Ifti Majid said the NHS trust could have taken on feedback from Valdo Calocane's family

  The chief executive of an NHS trust that admitted multiple failings in the care of a man who stabbed three people to death in Nottingham has said he owes an apology to the killer's family. Valdo Calocane, who has paranoid schizophrenia, was sentenced to a hospital order in January 2024 for stabbing to death students Barnaby Webber and Grace O'Malley-Kumar and school caretaker Ian Coates on 13 June 2023. On Wednesday, a major review into the NHS and his care under Nottinghamshire Healthcare NHS Foundation Trust found numerous failings, including that the voice of Calocane's family "was not effectively considered to support the dynamic evaluation of risk". Ifti Majid, of the NHS trust, told the BBC there were ways the trust could have received feedback from Calocane's family about how he was progressing.

  The report - commissioned by NHS England and carried out by Theemis Consulting - said numerous concerns from Calocane's family were not always acted upon. Calocane was sectioned four times in less than two years. After being sectioned for a second time, a psychiatrist observed "there seems to be no insight or remorse and the danger is that this will happen again and perhaps Valdo will end up killing someone". But two weeks after this entry was made, Calocane was discharged.

  According to the report, his family "felt this was a real missed opportunity to fully understand [Calocane's] diagnosis, risk and to get to grips with a treatment plan that [Calocane] was concordant with". In addition, in the fourth discharge, there was no evidence of the family voice in the decision-making process. By this point, Calocane had requested his family not be involved in his care, but the trust's discharge policy says "the involvement of family members is essential, even if this is against the patient's expressed wishes". The report also highlighted an absence of risk management, a lack of communication between teams caring for Calocane and missed opportunities to take "more assertive action" in relation to his care. This included inpatient teams taking on board Calocane's reasons for not wanting to take injectable anti-psychotic medication, "which included him not liking needles". After being discharged due to lack of engagement, Calocane then had no contact with mental health services or his GP for about nine months prior to the killings.

  Former University of Nottingham student Calocane first came into mental health services in May 2020, the report said

  Mr Majid apologised to the families of all those affected by the missed opportunities he said the organisation was responsible for. He added: "I think I do - we do - owe an apology to Valdo Calocane's family. "We've met members of the family, we had some of these conversations. "I think that the Theemis report, whilst it does say that we did engage with the family, we didn't do that consistently." Mr Majid also said even though Calocane had withdrawn permission for the trust to speak to his family about his care, there were ways it could have taken on feedback about how he was progressing from the family. At a press conference in London, the families of Calocane's victims demanded greater accountability and repeated their calls for a statutory public inquiry - in which witnesses can be called upon to give evidence - into the case.

