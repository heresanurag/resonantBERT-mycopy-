  Barnaby Webber's mother Emma called the report a "horror show", and added: "I do think it's time now that we get the opportunity to meet with the prime minister." Grace O'Malley-Kumar's father, Dr Sanjoy Kumar, said: "This report published highlights the failures of the mental health trust, but it fails my wife and I, as clinicians working at the NHS, for the failure to treat Valdo Calocane appropriately. Ian Coates's son James, a Nottingham resident, said people in the city had been "failed and will continue to be failed until changes are made". The government has since repeated its commitment to a public inquiry into the attacks, with work ongoing to establish its scope.

  Calocane's mother Celeste and brother Elias say there were a series of missed opportunities over three years to prevent the tragedy

  When asked if it was a mistake to discharge Calocane to the care of his GP from mental health services in September 2022 - one day after a warrant was issued for his arrest - Mr Majid said even the report did not give a straightforward answer to the question. "I believe that the Theemis report is right in that there were a number of decisions that we should have thought in more detail about," he said. He added: "I believe it suggests it was a missed opportunity." In a statement following the release of the report, Calocane's family said they were "deeply sorry" for this "horrific tragedy" and called for intervention in the mental healthcare system. "The report confirms what we and many others have known for a while: the mental healthcare system is in crisis and in need of immediate intervention, which we believe must come from the government," they said. Mr Majid also told the BBC the trust would be investigating whether anyone should be facing disciplinary action as a result of the latest report. He added that the trust had already made "significant changes" in its mental health care and had not waited for the report to come out to do so. Among those, he said, was a "nine-point" discharge system which had not been in place during the care of Calocane, who was discharged due to non-engagement. "As an organisation it's really important that we learn from tragic circumstances such as this that we understand where errors were made to understand where opportunities were missed and we bring about changes to do all that we can to make sure that a tragedy like this doesn't happen," he said. The review is one of many to have taken place in the wake of the killings, including a rapid review of the NHS trust, published by the Care Quality Commission (CQC) in August, which found "a series of errors, omissions and misjudgements" by mental health services.

