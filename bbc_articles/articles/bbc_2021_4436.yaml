  Mohammed Leily says he was "thrilled" to meet "the man himself" at one of Philip's final presentation events before he retired from royal duties in 2017.

  "He went around and had a chat with each group," says Mohammed, who is still in touch with the friends he made through the programme. "I remember he told us to make sure we are as active as we could possibly be, and to make sure we made use of our youth now while we have the energy."

  Mohammed arrived to the UK from Syria as a refugee in 2013, aged 17, and decided to sign up for the bronze award as a way of meeting new people and improving his English. He revelled in the opportunity to volunteer for the Red Cross and help other refugees and asylum seekers settle into new homes.

  He credits his gold award with helping him to get a place to study medicine at the University of Southampton - and says he still can't believe he got to meet Prince Philip. "When I left Syria I would never have imagined I'd do that, or see him."

  One of the best things for Mohammed Leily was volunteering for the Red Cross, where he helped other refugees

  As of early 2021, more than 3.1 million Duke of Edinburgh's Awards had been achieved by people like Mohammed, Lauren, James and Nathan. The international arm of the scheme means more than a million people more are currently taking part in programmes in more than 130 countries.

  But if the numbers have grown dramatically, the ideas remain simple. "One of the perpetual problems about human life is that young people of every generation have to discover for themselves what life is all about," the duke said in 2010.

  "These experiences teach more general lessons and serve as a practical demonstration of what can be achieved through determination and persistence."

  Back in Darlington, those lessons have certainly been learned by James and Nathan. Neither has reoffended since completing their bronze award. "It makes you happy knowing you're pal's all right and doing well for himself," says Nathan. "And it makes us happy knowing that we've both changed together."

