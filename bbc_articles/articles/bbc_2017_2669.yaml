id: bbc_2017_2669
title: Footage released of Harrison Ford's plane near-miss - BBC News
date: '2017-02-23'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-39048670
content: |-
  An airport in California has released video of a plane, being flown by the actor Harrison Ford, mistakenly flying low over an airliner.

  Ford's single-engine plane landed on a taxiway instead of a runway at John Wayne airport in Orange County earlier this month.
