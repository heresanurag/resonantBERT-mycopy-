  Italy, where several more people are missing, and France were hit with extreme conditions linked to the storm.

  A partially submerged car is seen in a car park in Leatherhead, as flooding continues in the aftermath of Storm Ciaran Image caption: A partially submerged car is seen in a car park in Leatherhead, as flooding continues in the aftermath of Storm Ciaran

  As we've heard, Storm Ciarán has eased but more heavy rain and winds will continue to affect the UK this weekend. And the threat of flooding remains high.

  As well as the more than 50 flood warnings in place across the south of England, a further 190 flood alerts - meaning flooding is possible - stretch up through the country.

  Floods Minister Rebecca Pow warned of high river levels, large waves at the coast and saturated ground.

  In England, you can check for flood warnings in your area on the Environment Agency website .

  In Scotland, there are six flood alerts, with more information from the Scottish Environment Protection Agency .

  Natural Resources Wales is currently issuing one severe warning for flooding on the River Ritec at Tenby.

  And you can find out more about the flood risks in Northern Ireland here after it has been dealing with flooding from one of its wettest months on record.
