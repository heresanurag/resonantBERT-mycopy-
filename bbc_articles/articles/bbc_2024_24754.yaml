title: Man killed in Alloa flat explosion named as Graham Green - BBC News
date: '2024-10-11'
section: Tayside & Central Scotland
url: http://www.bbc.co.uk/news/articles/c77x5ry1xd0o
content: |-
  A 50-year-old man who died in an explosion at a flat in Clackmannanshire has been named as Graham Green.

  Graham Green died in the explosion on Sunday evening

  A 50-year-old man who died in an explosion at a flat in Alloa, Clackmannanshire, has been named as Graham Green. Mr Green was inside the property in Kellie Place when the blast happened on Sunday evening. He was pronounced dead at the scene. Two men, aged 72 and 19, and a 49-year-old woman were injured in the explosion. A spokesperson for gas distribution company SGN confirmed that the incident was "not related to our gas network."

  The gas network comprises outside pipes and pipelines that lead to individual properties' gas meters. It is understood that gas may still be the reason for the explosion, but not in relation to these external pipes.

  A family tribute posted on Facebook said: "It is with great sadness we announce the passing of Graham Green (Greenie). "We want to thank all of the emergency services involved during this tragic event." The post added that the family "would also like to thank everyone for their overwhelming support and condolences at this difficult time".

  An investigation into the cause of the explosion is continuing

  Police Scotland and the Health and Safety Executive (HSE) are continuing their investigations into the cause of the blast. Police Scotland said they were alerted at about 18:00 that a building had been badly damaged. Eleven vehicles were sent including specialist units, the Scottish Fire and Rescue Service said. A rest centre which was set up at Alloa Town Hall after the incident has now closed, with those affected having found accommodation with friends and family. Mr Green's death is currently being treated as unexplained. Ch Insp Kat Thompson said: “Our thoughts remain with the family and friends of Graham and all those affected at this difficult time. “Our inquiries, alongside partner agencies, to establish the full circumstances of what happened remain ongoing. “A police presence will remain in the area and I would like to thank the local community for their understanding and support.”
