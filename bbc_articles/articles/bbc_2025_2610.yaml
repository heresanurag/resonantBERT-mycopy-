content: |-
  BBC Australia reporter Simon Atkinson visits Townsville, which was hit by severe rainfall over the weekend.

  Severe flooding in Queensland has forced thousands of people to evacuate, cut power to homes and washed away sections of a vital highway.

  In Townsville, one of the hardest-hit cities in the region, people are bracing themselves for further flooding.

  As the rain eased up on Monday evening, BBC reporter Simon Atkinson joined locals surveying the damage so far.
