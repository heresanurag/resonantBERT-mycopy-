title: Video shows Bashar al-Assad residence stormed - BBC News
date: '2024-12-09'
section: General
url: http://www.bbc.co.uk/news/videos/cwypw11qnppo
content: |-
  Syrians enter an Assad residence in the capital city after the fall of the president.

  Syrians enter a residence of Bashar al-Assad in the capital Damascus after the fall of the president.

  Objects and furniture were seen strewn across the empty rooms.

  Russia has confirmed President Assad left the country and claimed he had resigned from government. His current whereabouts is unknown.
