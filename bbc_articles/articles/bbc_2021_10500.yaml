title: 'Afghanistan: Child handed over Kabul airport wall as chaos continues - BBC
  News'
date: '2021-08-19'
section: General
url: http://www.bbc.co.uk/news/world-asia-58267756
content: |-
  Afghans try to scale airport walls and shots are fired as crowds keep trying to flee the Taliban.

  There has been continuing chaos at Kabul airport as Afghans carry on with their attempts to escape from the Taliban.

  A child was filmed being handed over the wall to a US soldier.

  Taliban fighters have also fired in the air, and US soldiers have used tear gas to control the crowds of people.
