title: 'West Belfast: Murder inquiry after man stabbed - BBC News'
date: '2022-10-15'
section: Northern Ireland
url: http://www.bbc.co.uk/news/uk-northern-ireland-63268686
content: |-
  A woman has been arrested after 54-year-old Tony Browne was stabbed on Friday evening.

  Police remain at the scene of the incident at Woodside Park in west Belfast

  A woman has been arrested in connection with the murder of a 54-year-old man in west Belfast.

  Tony Browne was stabbed at a property in Woodside Park in Poleglass at about 22:05 BST on Friday.

  A 33-year-old woman is being questioned by police on suspicion of murder and possession of a Class B controlled drug.

  Det Ch Insp Neil McGuinness said Mr Browne was taken to hospital but died from his injuries.

  "I am appealing to anyone who believes they may have information which could assist detectives with their investigation to contact us," he added.

  Sinn Féin Cllr Danny Baker told BBC News NI the community was "in shock" after what had happened.

  "This community is a tight-knit community and they are devastated by the news," he continued.

  "My thoughts and prayers are with everybody involved."
