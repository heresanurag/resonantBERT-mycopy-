title: 'Archive: Man ''laid to rest'' in Stevenage bank building roof - BBC News'
date: '2025-01-03'
section: General
url: http://www.bbc.co.uk/news/videos/c1ln1yq7v7jo
content: |-
  A TV report from 1975 explains how a coffin ended up in the rafters of a NatWest branch.

  Archive footage showed a coffin in a bank building's roof that had apparently been there for more than 250 years.

  The BBC Nationwide report from 3 January 1975 explained how Henry Trigg made a will in 1724 requesting he be laid to rest in the rafters of the property in Stevenage, Hertfordshire, which he then owned.

  He wanted to avoid his body being exhumed by grave robbers and, when he died a few weeks later, legend has it his wishes were followed.

  A Hertfordshire County Council archive webpage, external said it was reported NatWest, who later owned the building, demanded the removal and reburial of his bones in 1999 but a blue plaque was installed to tell the story.

