title: 'EastEnders: Michelle Ryan returns as Zoe Slater after 20 year gap - BBC News'
date: '2025-06-18'
section: Culture
url: http://www.bbc.co.uk/news/articles/cx23epyq0d4o
content: |-
  The actress returns in the first episode from new executive producer Ben Wadey.

  Zoe Slater has not been seen on the soap since she left in 2005

  Actress Michelle Ryan has returned to play Zoe Slater in EastEnders after being away from the soap for 20 years. According to Barb, 2.2 million people watched her shock appearance on the BBC One soap, which unusually had not been made available on iPlayer earlier in the day. The character is best remembered for the 2001 cliffhanger in which she screamed at her sister Kat Slater "you ain't my mother!" who fired back with the iconic twist: "Yes I am." Ryan described returning to the show as feeling "like coming home".

  Ryan was revealed to viewers at the end of the episode, making a dramatic reunion with step-father Alfie Moon and cousin Stacey Slater just before the credits. It is the first episode produced by the show's new executive producer Ben Wadey who said the character was on his wish-list of returnees before stepping into the role. He said: "I was absolutely delighted when Michelle agreed to return, and I'm thrilled to welcome her back to Walford." Although it was the second most watched programme in its time slot, a slightly larger audience had tuned in to both Emmerdale and Coronation Street on ITV. The viewing figures do not include catch-up viewing or people who watched the episode on tablets, phones or other smart devices.

  In October 2001 Zoe learnt the woman she believed to be her sister was actually her mother
  • None Dirty Den (Leslie Grantham) - the original landlord of the Queen Vic was a major star of the BBC soap from 1985 to 1989. After being killed off, he miraculously returned from the dead, emerging from the shadows in nightclub Angie's Den, greeting daughter Sharon with the classic line: "Hello, Princess."
  • None Speaking of which, Letitia Dean, who played Sharon, one of the show's original characters, left in 1995 but was back six years later. She left again in 2006, returning again in 2012 after fleeing from her wedding to her fiancé John Hewland (Jesse Birdsall).
  • None Sharon's mum Angie (Anita Dobson), who last appeared in the soap more than 37 years ago, returned for the recent 40th anniversary episode. She visited Sharon Watts as she drifted in and out of consciousness while trapped under rubble after an explosion.
  • None Janine Butcher (Charlie Brooks) just can't leave EastEnders alone! Having first arrived in 1999, she left in 2004 after her character pushed husband Barry (Shaun Williamson) off a mountainside. She then returned for a guest stint four years later but ended up staying until 2014. Janine left the Square and headed to Paris to be reunited with daughter Scarlett. She then returned in 2021, leaving at Christmas 2022 having been involved in the dramatic storyline which saw the demise of Danny Dyer's character, Mick.
  • None Michelle Collins - the star who plays Cindy Beale has also had a couple of stints in the long-running soap in the late 80s and early 90s. Like Dirty Den, she was supposed to have been killed off (while in jail during childbirth) but came back from the dead 25 years later. It was revealed that Cindy never died but was placed under a witness protection programme after informing on cellmate.
  • None Another original cast member, Kathy Beale (Gillian Taylforth), left the show in 1998. She was also supposedly killed off-screen (in a car crash). She miraculously re-appeared in 2015.
  • None Phil Mitchell (Phil McFadden) joined the soap in 1990, departing briefly in 2003 before returning for good two years later. He's been involved in many big storylines over the years including an affair with his brother's wife Sharon and struggles with alcoholism and his mental health.

  EastEnders at 40: Behind the Scenes As Zoe returns, take a look behind the scenes as Eastenders celebrates 40 years of being on our screens.

  After leaving the soap in 2005, Ryan made appearances in BBC One shows Merlin, Doctor Who and Jekyll. She was also cast as the lead in a remake of the 1970s programme The Bionic Woman, which was cancelled by US broadcaster NBC after eight episodes. The actress revealed that the invitation to return to Elstree Studios arrived at a time she had been reflecting on her time on the BBC soap with old castmates. She said: "It all happened at the right time. I'd already been thinking about a return because I'd met up with Kacey Ainsworth and Kim Medcalf and we were reminiscing our fond memories of the show. "It just so happened that at the same time, EastEnders had announced a new Exec who was keen to explore the potential of a return as he was such a massive fan of Zoe and the Slaters. "I can't say too much as there is a lot of drama to come, but Zoe is a mess. She's not the girl that left Walford twenty years ago, and she's been really struggling on her own."
