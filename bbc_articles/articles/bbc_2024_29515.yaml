title: Ex-Gwent Police officer John Stringer jailed for sexually abusing girl - BBC
  News
date: '2024-11-04'
section: Wales
url: http://www.bbc.co.uk/news/articles/cg4lv527zzro
content: |-
  John Stringer is sentenced to 10 years after being found guilty of five counts of sexual abuse.

  John Stringer will serve a minimum of five years in prison after being found guilty of five counts of sexual abuse

  A former police officer who sexually abused a girl under the age of 13 has been sentenced to 10 years in prison. John Stringer, 43, from Cardiff, was found guilty of five counts of sexual abuse at a trial at Cardiff Crown Court in September. The court heard the victim suffered "severe psychological harm" as a result of Stringer's abuse. After his conviction, Stringer was dismissed from Gwent Police and barred from policing for life.

  Judge Daniel Williams told the sentencing in Newport that Stringer's attempts to convince a jury of his innocence were "odious and cynical". He also said he was a "high risk to female children". Stringer was found guilty of two counts of sexual assault by touching and one charge of causing or inciting a child to engage in sexual activity. He was also found guilty of causing or inciting a child to engage in sexual activity and causing a child to watch a sexual act.

  In a personal victim statement, the court was told the abuse had left a "lasting negative, painful memory" of a large part of the girl's childhood. The statement, read by prosecution lawyer Ian Wright, said the girl started self-harming after the abuse and was "desperate to remove the feeling" of Stringer's hands on her body. Her family said "no matter how many times we told her she was loved, she won’t believe us". The court heard she also had suicidal thoughts and had been taken to accident and emergency on many occasions, with the family scared she would take her own life. The statement added: "She has built her barrier high, she doesn't trust people, has no self esteem and blames herself."

  A judge said John Stringer used his status as a police officer to conceal his offending

  Sentencing Stringer, Judge Williams said in relation to one aspect of the abuse "she told you she did not want to do it, but you kept on and on at her demanding she did". He said the abuse was getting worse when Stringer was arrested. Judge Williams said it had been "heartbreaking" for the court to hear of the impact the abuse had on the girl. Stringer was told "your status as a police officer enabled you to conceal your motives and offending". Judge Williams told the family of the girl "it is clear to me that she is a kind, caring, intelligent and honest girl. She is to be commended for her courage in coming forward and her honesty in coming forward".

  Det Sgt Annalisa Bartley from South Wales Police, the investigating force, said she hoped the outcome of the trial will help the victim "continue the process of recovering from this ordeal". "The victim in this case was incredibly brave and stoic in speaking out and helping to bring John Stringer to justice," she said. Chief Constable Mark Hobrough, from Gwent Police, said Stringer was "dismissed from our services due to his sickening actions" and "despicable crimes". He said: "Stringer has not only broken the oath of a police officer, but he has also betrayed his colleagues and the community he was meant to serve. "I know this case will impact the confidence that victims of sexual assault feel in coming forward to report to us. "Stringer's actions do not reflect the values of our staff, many of whom work tirelessly to support victims and bring perpetrators of child sexual abuse to justice." Stringer will serve a minimum of five years in prison.
