  After every round of Premier League matches this season, Troy Deeney gives you his team of the week. Do you agree with his choices?

  Who has made Troy's Premier League team of the week?

  After every round of Premier League matches this season, BBC football pundit Troy Deeney will give you his team and manager of the week. Here are this week's choices. Do you agree? Give us your thoughts using the comments form at the bottom of this page.

  Alphonse Areola (West Ham): He put in a massive performance in the win at Arsenal. I thought West Ham were great. I know everyone wants to talk about Arsenal not having a striker but I thought West Ham did a real good number on them.

  Aaron Wan-Bissaka (West Ham): He's been excellent since he left Manchester United, found his feet and got his confidence back. He did a really good job against Arsenal, looked like he was back to his best defensively and offered a bit going forward as well. Ibrahima Konate (Liverpool): I think it's his first time in my team of the week. He was a beast, a monster, in the win at Manchester City. I was going to put Virgil van Dijk in but I think I give him too much love. Liverpool were excellent against that City team. Well-marshalled and saying 'come and break us down if you can' - but they never did. Daniel Munoz (Crystal Palace): Munoz scored a wonderful goal in Palace's 2-0 win but he was just solid against a really good Fulham team, and he's been a part of this team that has gone four unbeaten. I think he's been excellent. Djed Spence (Tottenham): He scored a deflected shot against Ipswich but it's more for the weeks of being so consistent when that Spurs team were struggling and loads of players were out. Him and Archie Gray were the two that stood out consistently.

  Jack Hinshelwood (Brighton): I know they played Southampton and I know I say Southampton are terrible - because they are - but he's been excellent over a period of time as well. Even when they were overrun in that 7-0 defeat against Nottingham Forest, he never stopped and I think he deserves to be in the team of the week because he has been exceptional for a few weeks. Mikkel Damsgaard (Brentford): He got a couple of assists in the win at Leicester. Again, I am aware they played Leicester and they are terrible as well. He did well and kept the ball moving. Lewis Miley (Newcastle): Player of the weekend. Yes, he scored against Forest but he was excellent. At 18 years old it was a coming-of-age performance - he was mature, kept the ball well and ran over people. He made a few mistakes but that was fine, he carried on going and didn't let anything affect him.

  Bryan Mbeumo (Brentford): Just a cut above. Brentford will do well to keep hold of him. The worry for a lot of people is if Mohamed Salah moves on, he could be going to Liverpool and they could be unbelievably good. He looks like he's got another gear to go. Brennan Johnson (Tottenham): Timely for him to be back with two good goals. Tottenham have missed his direct play and obviously that goal threat that he carries. Spurs are looking a lot more like the real attacking threat we know they can be. Jean-Philippe Mateta (Crystal Palace): He got an assist at Fulham and looked like a real powerhouse as always, but unfortunately didn't score. Now he's being consistent and hopefully takes that main-man role. He's been excellent and probably could have been in the team the past couple of weeks.

  Eddie Howe (Newcastle): Newcastle have been on a good run and have won 13 of their past 16 games in all competitions. When they had that massively disappointing second half when they lost to Brentford in December, he spoke about having a chat with the group. Really cleared the air, really honest, probably cut-throat I would imagine, but then to go on and win as many as they have is massive. He orchestrated a Newcastle team that has moved potentially into the top four. They're closing down Forest who are third, and closing down Manchester City. You wouldn't bet against them finishing in the top four, and potentially beating Liverpool in next month's Carabao Cup final.

