title: Redditch learner driver failed theory test nearly 60 times and spent £1,400
  - BBC News
date: '2024-07-04'
section: Hereford & Worcester
url: http://www.bbc.co.uk/news/articles/c8978vy2wnjo
content: |-
  The learner, who finally passed, notched up the highest number of fails for a single person in 2023.

  The candidate, who has not been named, notched up the highest number of failed theory test attempts in 2023

  A learner driver spent nearly £1,400 and about 60 hours in trying to pass their driving theory test. The candidate, from Redditch, notched up the highest number of unsuccessful attempts made in 2023 for one person, 59, before finally passing the test. New government figures also show a total of 93,204 UK practical driving tests taken in the year to the end of March, were at least a candidate's sixth attempt to pass. Figures were released as it was revealed that driving test fees could increase for learners who have failed multiple times.

  The RAC Foundation said it would encourage them to wait until they were ready to pass, easing the "unacceptable" test backlog, which often forces candidates to wait "many months for a slot". The success rate for those taking at least their sixth test was 41.4%, compared with an average pass rate across all tests of 47.9%. AA Driving School said the average wait time for a practical driving test was more than 18 weeks. Coronavirus lockdowns had prohibited driving tests taking place, resulting in a backlog of candidates that is still being addressed.

  RAC Foundation director Steve Gooding, said as learners continue to wait for a test their ability to drive will decline in quality.

  "In part, these jams are being caused by people who have failed multiple times and come back to take a test that might be their fourth, fifth or sixth attempt, or even greater," Mr Gooding said. "An improved pass rate would help drive down the understandable backlog, and if you incentivise people to pass first time there is also a case for adding a modest premium to the test fee for those who have already failed on several occasions." Mr Gooding said the introduction of higher fees would deter people from throwing themselves back into tests without being ready. "A higher fee might persuade them not to resit their test until they are more likely to pass," he said. "If you can improve the pass rate, this means more learners avoiding the financial and time costs associated with repeated disappointments at the test centre." Last year, the Driving Standards Agency (DVSA) increased the the length of time candidates who fail the practical test have to wait before rebooking, from 10 to 28 days, in the hope of encouraging them to wait until they are ready to pass.
