  Alberta Obinim, 43, died in the attack in Manchester on Sunday while two others were seriously injured.

  Suspect in woman's stabbing placed under Mental Health Act

  A man arrested on suspicion of the stabbing murder of a 43-year-old woman in Manchester has been detained under the Mental Health Act. Alberta Obinim was stabbed to death at a house on Barnard Road in the Gorton area of the city at about 23:20 BST on Sunday. Two others - a 64-year-old man and a 17-year-old girl - were also left with life-threatening injuries. The 22-year-old suspect has now been placed under the detention of mental health professionals, Greater Manchester Police said.

  The force said all of those involved "were known to one another". The injured man remains in a critical condition while the 17-year-old girl is now stable, it added. Extra patrols remain in the area and an appeal is continuing, with anyone with information urged to contact police.
