content: |-
  Craig Bellamy believes the way he uses his squad in the Nations League will boost Wales' chances of reaching the 2026 World Cup.

  Wales head coach Craig Bellamy believes the way he has been able to use his squad in the Uefa Nations League will boost their chances of qualifying for the 2026 World Cup. Monday's 1-0 victory over Montenegro made Bellamy the first Wales boss to avoid defeat in his first four games, winning two of them. He made seven changes to his team in Cardiff, some enforced by injury and suspension, others by his desire to experiment and assess his options before World Cup qualifying starts in March. "We need a big squad," said Bellamy. "The Nations League is brilliant, really competitive and it allows you to utilise the squad. "There were loads of positives from that. There were some players who did really well. Surely a squad really gives you a better chance of being able to qualify for a major tournament. "The games are so quick, you play Friday, you play Monday. It really suits the bigger nations with the bigger squads so we have to utilise our squad the best we can to give us the best chance to qualify for a major tournament."

  Having squandered a 2-0 half-time lead to draw in Iceland on Friday, Bellamy had said he would make several changes against Montenegro to manage his squad's workload and give some fringe players a chance. Oxford United forward Mark Harris earned his first senior international start, while Bolton Wanderers midfielder Josh Sheehan and Swansea City forward Liam Cullen were also in the line-up. Despite the changes, Wales dominated much of the game and won thanks to a first-half penalty by the outstanding Harry Wilson. "We just have to keep improving," added Bellamy. "Whatever the outcome today, the performance, it is just about keeping improving. "I like building a library of being able to change, so today we moved into three different shapes, so that's great, that the players can seamlessly do that at the minute. "The next games against good opposition will test us again. It gives you the platform to improve."

