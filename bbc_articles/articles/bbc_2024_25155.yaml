  Turkey remain top of Group B4 – two points ahead of Wales – following their 4-2 comeback victory in Iceland. Wales can still finish first as they have two matches left in November, away to Turkey, then home to Iceland. Two wins and two draws – and, perhaps equally as important, a progressive new playing style – represent an encouraging start to life under Bellamy in the former Wales captain's first senior management role. "I'm such a rookie, I really am," he said. "You're just getting a feel, you're getting moments. It's enjoyable, it really is. "But when you're shouting and no-one can hear you, it's really annoying. I'm just trying my best to enjoy it. "And learning about myself, I try to do that on a daily basis. Football is just a small part really for me. I strive to be the best person I can be. "There's moments I don't quite get it right, but I'm really conscious that I'm trying to improve because it's so important to me. I'm just trying to be calm and making sure the players get to see that as well." Bellamy, who signed a four-year contract in July, added: "The players are the most important. How can we give them every opportunity to be the best we can be? The amount of work we do, it's to get all those details right. "You know the solutions, now go and enjoy yourself. I hope they're able to come off and feel that they've enjoyed themselves."
