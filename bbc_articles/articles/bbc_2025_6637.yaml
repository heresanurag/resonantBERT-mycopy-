  There has been no official confirmation from Downing Street, but if confirmed, the visit will be seen as an important way to strengthen relations with Washington, amid its ongoing trade war. Starmer - who is looking to complete a trade deal with the US and remove recently imposed tariffs on the UK - previously said the invite for the second visit was "truly historic" and "unprecedented". During the UK prime minister's visit to the White House in February, Trump showed cameras the contents of the King's letter. It read: "Quite apart from this presenting an opportunity to discuss a wide range of issues of mutual interest, it would also offer a valuable chance to plan a historic second state visit to the United Kingdom. "As you will know this is unprecedented by a US president. That is why I would find it helpful for us to be able to discuss, together, a range of options for location and programme content. "In so doing, working together, I know we will further enhance the special relationship between our two countries of which we are both so proud."
