content: |-
  One story dominates Saturday's papers: Volodymyr Zelensky's row with Donald Trump at the White House.

  'The Fight House' and 'Meltdown in Oval Office'

  The meeting between Donald Trump, JD Vance and President Zelensky at the White House on Friday is reported to have "started out smoothly". But the Daily Telegraph reports "the mood in the room soured", external when Zelensky called for US security guarantees that went beyond what was in the draft minerals deal. The paper says Trump "took umbrage at the live negotiating style". The Daily Express, external and the Daily Mirror, external say the row has left hopes of a Ukraine peace deal "in tatters". The Mirror accuses Trump of making "petty points" and launching into a "childish rant". The Times reports that "none of this had been expected" after French President Emmanuel Macron and Sir Keir Starmer had gone to the White House "as the groundwork was laid" for a deal. The Guardian notes that as Zelensky arrived at the White House, Trump sought to "physically dominate" him., external He told reporters that Zelensky was "all dressed up" in his black turtleneck. The Daily Mail says he "came under attack", external for his attire - with one reporter calling his combat clothes "disrespectful" to the Oval Office. According to the Mail, a US official predicted there would be problems. "I know that's his thing" they're quoted as saying, "but this moment is different".

