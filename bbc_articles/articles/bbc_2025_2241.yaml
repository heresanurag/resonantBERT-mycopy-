  After October's Euro 2025 play-off victory over Croatia, when Lauren Wade scored an extra-time winner, NI could not build on that winning moment against European giants Norway as they missed out on reaching this summer's tournament. But this time, they will be favourites against Romania and have a real opportunity to carry the momentum and feeling from Tuesday's game into that window. Magill believes the resilience shown by Northern Ireland can be "the springboard" for Oxtoby's youthful team going forward. The Birmingham City striker will get the headlines, and rightly so after her heroics, but there were others who played their part. The 30-year-old praised 18-year-old striker Kascie Weir, making her first start, defender Mason, who provided the two late assists, and substitute Emily Wilson, who was impressive with her aggressive approach on the wing. "It's how we reacted after that, that's what I'm really proud of. "We've spoken a lot about the growth of this team, and it would have been really easy to go into our shell and not chase after the game to go and get something. "When we scored the equaliser, we ran straight back to get the ball to go again. It's a credit to everyone that we got the win."
