content: |-
  Northern Ireland match winner Simone Magill admits there was "complacency" as the captain netted in injury-time to down Bosnia-Herzegovina.

  'Relief and joy as leader Magill saves hot and cold NI'

  Simone Magill turned and punched the air as the final whistle blew at Inver Park. Northern Ireland's captain and talismanic striker, Magill was the hero with two late goals to stun Bosnia-Herzegovina. Despite a dominant opening 45 minutes from Northern Ireland, they were staring in the face of a fourth consecutive defeat after the Bosnians hit a quickfire double after a restart. But up stepped Magill, who produced a captain's performance with two late goals. In the 89th minute, she headed Ellie Mason's long ball into the bottom corner to drag her side level. The same combination worked again in the 93rd minute as Magill controlled Mason's pass and tucked the ball into the bottom corner.

  She had rescued her side from the brink, and there was joy and relief around the ground in equal measure. "To win a game like that, that's why you play the game and love football so much," Magill said after the game. "I'm extremely happy now but we didn't make that easy on ourselves. "I'm so proud of the character of the group, not only did we come back but we didn't settle for a draw. "We pushed on for the three points. To do that, and the way that we did it, I'm really happy."

  It was a strange game for Northern Ireland, who went from being in complete control to looking shell-shocked in the space of five minutes after half-time. Tanya Oxtoby's side took a deserved first-half lead through Brenna McPartland's header, but they allowed Bosnia into the game. First of all, less than 60 seconds after the restart, Emina Ekic was allowed to run unchallenged from her own half to slot home the equaliser. Three minutes later, a poor clearance by Rachel Dugdale was punished when Marija Milinkovic fired home a stunning 20-yard effort off the post. While Tuesday's game had a happy ending, not being able to string a full 90-minute performance together can be a frustration when you see what Northern Ireland are capable of in fits and starts. Another worrying trend is the quickfire concession of goals, which also happened against Poland on Friday and again in the first leg of the Euro 2025 play-off with Norway before Christmas. Magill admits there was an "element of complacency" after dominating the first half, and her side must learn from that heading into April's double-header with Romania. "That's what we were going after, we wanted to be in control of the game," Magill said. "I think with control comes an element of complacency, and if we look at the second half that's exactly what did happen. "Ultimately, we do need to learn from those moments at the start of the second half. That can't happen again."

