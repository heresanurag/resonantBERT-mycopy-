content: |-
  Ukraine and Trump's rare rebuke of Putin dominate the front pages of Friday's papers.

  Ukraine 'too risky' and 'Will only work for 40k'

  Several front pages reflect the situation in Ukraine and the attempts to reach a peace deal with Russia. The Financial Times has a photograph of a ballistic missile exploding in Kyiv during an attack on Thursday which killed at least 12 people. The Guardian shows the aftermath of the strikes, with the image of a woman covered in blood being rescued from a block of flats. The words of President Trump, "Vladimir, stop!", make up part of the paper's headline. Speaking to The Daily Telegraph, the prime minister says negotiations to end the fighting are at an "intense stage". But in what the paper describes as a "challenge" to Donald Trump's stance, Sir Keir Starmer has insisted that Ukraine must be allowed to decide the terms of any peace deal with Russia. According to the Times, any agreement will not involve thousands of British troops in Ukraine because the risks have been described by one source as "too high". The Daily Mail is among the papers to report on the "massive" security operation ahead of the funeral of Pope Francis tomorrow. Army anti-drone units will join police officers with machine guns patrolling the route of the funeral procession. The Daily Express says a "ring of steel" has been set up, with mourners being searched and snipers taking up rooftop positions. Under the headline, "Welcome to the... raking it inn", the Sun reports that a hotel chain was paid £700m in one year to house asylum seekers. Accounts for Stay Belvedere Hotels for the 12 months to September 2022 show it made a pre-tax profit of £62.6m. A Labour source says changes have been made to save taxpayers billions. "Justice for Jill" the Daily Mirror demands as it reports on calls for a police review into the murder of former BBC presenter Jill Dando in 1999. The paper says it has found new evidence linking someone it describes as a "ruthless Serbian assassin" to the case. Scotland Yard says no unsolved murder is ever closed and detectives would consider any new information.

