id: bbc_2023_18584
title: Crowds flee after gunman opens fire in Prague - BBC News
date: '2023-12-22'
section: General
url: http://www.bbc.co.uk/news/world-europe-67795375
content: |-
  Fourteen people are killed and dozens more injured following the shooting at Charles University.

  Fourteen people have been killed and dozens more injured after a gunman opened fire at a university in the Czech capital of Prague.

  Police said the shooter had been "eliminated" after the attack at Charles University, located on Jan Palach Square.

  Footage gathered by someone caught up in the attack shows a crowd fleeing through the streets to try and escape.
