title: Boy, 11, shot and his father injured in Upminster - BBC News
date: '2020-05-01'
section: London
url: http://www.bbc.co.uk/news/uk-england-london-52511481
content: |-
  Police found the pair injured at a property in Upminster.

  The incident happened at a property in Kerry Drive, Upminster

  A boy aged 11 has potentially life-changing injuries after being shot in east London, police have said.

  Police found the boy and his father, aged in his 40s, injured at a home in Kerry Drive, Upminster, at 21:30 BST.

  The man had cuts to his head but it unclear what had caused his injuries. The boy's injuries were said to be "not life-threatening".

  A number of people fled the scene before officers arrived. No arrests have been made.

  Police have appealed for any witnesses to contact them.

  The incident happened at about 21:30 BST on Friday

  A 53-year-old local resident said she was "pretty shocked".

  "It's not the sort of area that this goes on in," she said. "This is a really, really quiet, lovely area. I know all my neighbours up and down on this road."

  An 82-year-old local resident said: "I've lived here 32 years and I've never heard of anything like this before."

