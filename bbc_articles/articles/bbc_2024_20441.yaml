  GB win team jumping gold for first time since 2012

  This video can not be played To play this video you need to enable JavaScript in your browser.

  Great Britain won Olympic team jumping gold for the first time since London 2012 with a near-faultless performance in Paris. The British trio of Ben Maher, Harry Charles and Scott Brash picked up just two time penalties to top the standings at the stunning Chateau de Versailles, with the United States second and France in third. Their medal comes 12 years after Maher, Brash and Charles' father Peter won team jumping gold at the London Olympics alongside Nick Skelton - 60 years after Great Britain's previous gold in the event in Helsinki in 1952. Charles had just turned 13 when his father stood atop the Olympic podium but now joins him in the history books. He, Maher and Brash secured Team GB's ninth gold medal at the Paris Olympics.
  • None Brash takes moment to make memories by winning second Olympic gold

  The first of those nine also came in equestrian - in the team eventing. Maher, on Dallas Vegas Batilly, was first up for Britain, and the Tokyo 2020 individual gold medallist picked up just a solitary time penalty to lead the standings after the opening round. Charles, now 25 and at his second Games, backed that up with a clear round on Romeo 88. Great Britain's final combination - Brash on Jefferson - were the last to jump. Cool and collected, they brushed a couple of fences but went clear with just one time penalty to their names. "I knew when Scott went in we had the best man to do it," Maher, 41, told BBC Sport. "But we didn't leave him the margin. If he'd had a fence down that could have been expensive. Honestly they were two of the best riding rounds I have seen in a very long time. "All of our horses didn't knock a jump down all day so I am very proud of the team." Brash, 38, added: "There is pressure on all of us when it's only a three-man team. Every score counts. "I was fortunate to be in that position. The guys rode unbelievably to get me into that position and I wanted to deliver for them."

  Peter Charles with his Olympic gold medal in 2012, and Harry Charles with his in 2024

  Charles made his Olympic debut at the postponed Tokyo 2020 Games - nine years after his father's success in London - in what was his major championships debut. In Paris, he was riding with a strapped arm after breaking it in July. The sport runs in the Charles family, with Harry's sisters Scarlett and Sienna also showjumpers. Asked if his father's gold medal had put more pressure on his shoulders, he said: "It's no extra pressure. Our family has a lot to thank Ben and Scott for. "They were on the podium with my dad in London and now I get to share a podium with them. "I've looked up to them since I was a kid. Now to win a gold medal alongside them is beyond my dreams." Brash joked: "Me and Ben feel like the old veterans now. "Harry's only 25 but he's very experienced already. He rode in Tokyo, had a little warm-up there, and then delivered today." Peter Charles, who is working behind the scenes with the GB team in Paris, told BBC Sport: "The dream is to win an Olympic gold medal but to do it so young, at his age, with two guys I rode with in London, that's surreal. "I haven't had a moment to reflect on it." On his son's round, he added: "Brilliant. Nick Skelton came up to me and said: 'At that age, I couldn't have done that.' He said: 'That was absolutely brilliant.' Harry's got many more opportunities if, please God, everything goes right. "It's a wonderful moment to enjoy, to showcase the sport, how beautiful it is." Individual jumping qualifying takes place on Monday, with the final on Tuesday.
