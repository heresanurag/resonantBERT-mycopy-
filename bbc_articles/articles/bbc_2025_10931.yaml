title: Boy, 14, locked up for five years for killing Glasgow gang rival - BBC News
date: '2025-05-08'
section: Glasgow & West Scotland
url: http://www.bbc.co.uk/news/articles/cy5e43rx3r4o
content: |-
  The boy killed a 16-year-old gang rival in a fight over £50 at a park in Glasgow

  Boy, 14, locked up for five years for killing gang rival

  Kory McCrimmon, 16, died after being stabbed in the heart

  A 14-year-old boy has been locked up for five years for killing a gang rival in a fight over £50. The boy stabbed 16-year-old Kory McCrimmon in the heart at Greenfield Park in Glasgow's east end, following threats on social media. The boy, who cannot be named due to his age, pleaded guilty at the High Court in Glasgow to culpable homicide while acting under provocation. Judge Lord Mulholland told him he had "devastated many lives" with his actions in May last year.

  A large group of Kory's family and friends were at court to see his killer sentenced. One yelled "monster" at the boy as he left the dock.

  The court heard that Kory and his attacker were known as "rivals", with both boys being associated with different gangs. Advocate depute Greg Farrell said the pair had been on "good terms" before a "falling out" over £50. The killer, who was 13 at the time, refused to pay Kory back and an argument broke out via social media. Threats were made on an Instagram page used by different gang members and the pair arranged to meet in Greenfield Park for a "confrontation".

  The killer posted: "Kory, wee man, you will actually get decapitated." The lawyer stated there was a "significant amount of bravado and posturing on both sides" ahead of the planned fight. Kory - who had played for Easterhouse Football Academy - had no previous convictions. The court heard a large number of boys and girls assembled that night and many had been drinking. The killer was part of a gang who entered the park wielding batons, bats and bladed weapons and challenged Kory and his friends to a fight. Mr Farrell said: "During the confrontation, the 14 year-old struck out with a knife stabbing Kory once on the chest." Kory fell to the ground while his attacker and others fled. He died at Queen Elizabeth University hospital in Glasgow from a single stab wound to the heart and major internal bleeding.

  His attacker had initially faced an allegation of murder, but his KC John Scullion offered a guilty plea to the reduced charge, which was accepted. He said the case represented "a tragic waste of human life" and his client now had "insight to the devastating consequences" his actions had caused. The killer will remain in detention at Kibble Secure Unit in Paisley, Renfrewshire. Lord Mulholland told the court the killing was "utter madness". He said he had taken into consideration the guidelines for the sentencing for young people and cut the term from seven-and-a-half years due to the guilty plea. The judge said: "Social media can be a force for good, but in the lead-up to this, it was not. "It was used as a means for threats of violence culminating in the gang fight at Greenfield Park. "You have devastated many lives as a result of what you did."
