content: |-
  Manchester United goalkeeper Andre Onana is left out of Sunday's Premier League game at Newcastle following two costly mistakes against Lyon this week.

  Andre Onana has kept 10 clean sheets in 43 games for Manchester United in all competitions this season

  Manchester United goalkeeper Andre Onana has been left out of Sunday's Premier League game at Newcastle. Onana was at fault for both Lyon goals in his side's 2-2 draw in the Europa League on Thursday - a day after he had been called "one of the worst goalkeepers" in United's history by former Red Devils player Nemanja Matic. Sources confirmed Onana has been omitted from Ruben Amorim's squad for the game at St James' Park to allow the Cameroon international to "rest and disconnect". "You have to see the context," Amorim told Sky Sports. "Sometimes you have to push the player and sometimes you have to disconnect. "Tomorrow he will be in training. I think he was OK [with the decision] because I explained. You don't need to like [it], but you understand. "The mental aspect is important. It's just one game, tomorrow is new life." It is expected he will be in contention to face Lyon in the return leg of the quarter-final tie at Old Trafford on Thursday and has been assured the change is not regarded as permanent. Newcastle manager Eddie Howe will miss Sunday's match after he was admitted to hospital having "felt unwell for a number of days", the club has said.
  • None How does Onana compare to other Man Utd keepers after Matic criticism?

  Turkey's Altay Bayindir is expected to deputise for Onana at Newcastle in what would be only his sixth appearance of the season and his first Premier League game. He has not featured since January, having played only in cup games this season. Since the start of last season Onana has made eight errors leading to goals in all competitions, the most of any keeper playing for a Premier League club. Amorim defended the 29-year-old after the performance against Lyon, saying he had made more mistakes this season than Onana.

  This video can not be played To play this video you need to enable JavaScript in your browser. Onana given vote of confidence by Amorim after errors against Lyon on Thursday

  Onana has struggled to live up to his £47m transfer fee since his arrival from Inter Milan in 2023 but has played all 69 Premier League games since he joined the club. Former United manager Erik ten Hag ditched popular first-choice David de Gea, believing Onana was better with the ball at his feet. However, Onana has made a series of mistakes, with the first goal in Lyon, when he dived to push a routine shot away from goal but inexplicably missed it, a prime example. Aside from Onana's on-field issues, he has also had to deal with off-field problems. His wife Melanie Kamayou was robbed as she left a restaurant in Cheshire last month.

  Former England, Tottenham and Blackburn goalkeeper Paul Robinson on BBC Radio 5 Live I think the situation has been coming. A lot of United fans have been frustrated with him and there is a time where you do need to take a goalkeeper out of the firing line, because the pressure does become too much. When you're in front of the opposition fans you're reminded of your poor form every time you touch the ball and actually, sometimes, you do need a rest. It's good man-management, put your arm around him, say 'look you're still my number one goalkeeper but at the moment you're not playing at the levels I want you at'. The problem he's got is if [Altay] Bayindir comes in and plays extremely well then it would be very difficult to leave him out on Thursday, because of how poor Onana's been playing. As an outfield player when things aren't going right you can make up with hard work, running around the pitch, get involved and make tackles, and get yourself into a game, but the problem as a goalkeeper is you can't go chasing the game. If you do that then that's when you're going to make mistakes.
