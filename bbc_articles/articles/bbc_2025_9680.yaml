title: Stoke Ferry piano prodigy invited to Royal Academy of Music - BBC News
date: '2025-05-20'
section: Norfolk
url: http://www.bbc.co.uk/news/articles/c8rekvx8r0do
content: |-
  Harvey is invited to a top music school after teaching himself in just five months.

  To play this video you need to enable JavaScript in your browser. This video can not be played Harvey, 11, said he found playing and performing "therapeutic"

  An 11-year-old boy who taught himself to play the piano in five months by watching YouTube videos has been invited to a prestigious music school. Harvey, from Stoke Ferry, near Downham Market, Norfolk, only started playing at the end of last year, but has already reached the advanced grade eight standard, according to his teacher. Videos of him playing have been posted online by his mother Jen and have gained thousands of views. The Royal Academy of Music, external has invited him in for an induction day, to spend time with professionals to explore what he can do with his talent.

  Harvey's mum Jen said she was very proud of what he had achieved in such as short time

  Harvey said he started to play the piano because he found learning the music "satisfying". He has performed at the care home where his mother works and on public pianos at railway stations. "It is really nice when you get applause from people. It makes you feel like your performance has been accepted," he said. Jen said he had not inherited his ability from her, joking that while she could play "Chopsticks", she would not describe herself as musical. "He's taught himself off YouTube," she said. "[He has] just decided 'Yes, that's what I want to play' and since then, he's on there for hours a day". Jen said she was very proud of Harvey and keen to explore what his musical talent might mean for his future. Previously he had been very interested in computers and design but she said his pivot to playing music was a surprise.

  Harvey has just started lessons at formal lessons at The Norfolk Academy of Music. His teacher Bekki Smith said Harvey was already playing at the top Grade Eight level. Ms Smith said: "My first reaction was 'Wow, we've got something special here' and yes, playing to that standard after only a few months is rather amazing. "He has brilliant dexterity for his age and his capability is amazing." Ms Smith said she would be working with Harvey on filling in some of the gaps in his knowledge that came from learning online. She said practice was key to progress like his. "Harvey does at least two hours of practice a day and is very keen to learn which makes a huge difference from a lot of pupils that 'don't have the time' or can only play for 10 minutes a day. "Sadly, a lot of pupils will find hours for social media but not for practice."

