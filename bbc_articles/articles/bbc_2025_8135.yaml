title: Bradford visitors queue around block to see TV portraits - BBC News
date: '2025-04-07'
section: Bradford
url: http://www.bbc.co.uk/news/articles/cjdxny0n51yo
content: |-
  Thousands flocked to see artwork from the BBC show Extraordinary Portraits.

  Visitors queue around block to see TV portraits

  Lisa and her daughter Mia visited the Loading Bay on Duke Street after watching the Extraordinary Portraits show

  Thousands of art fans have queued around the block in Bradford to see an exhibition of portraits of extraordinary members of the public. The BBC show Extraordinary Portraits, hosted by comedian Bill Bailey, pairs people who have a notable achievement with an artist to have their portrait painted. Portraits featured in the TV show were exhibited at the Loading Bay on Duke Street until Sunday. Comedian and TV presenter Bailey came to Bradford to open the exhibition alongside former England goalkeeper-turned-artist David James, who had a painting on show.

  The queue spilled on to Dale Street as people waited to get into the exhibition

  On a sunny Friday afternoon, the queue was snaking around the block from Duke Street on to Dale Street. Among those queuing was Susan Ross, from Wharfedale, an artist and art teacher herself. "I saw the series by Bill Bailey on the television and I found it intriguing," said Susan, 73. "I was very surprised to know we were getting all the paintings that were on the television in Bradford. "I thought it was worth the effort to come and see those original paintings."

  Susan Ross, an art teacher, is a big fan of the show

  Just behind Susan was mother and daughter duo Lisa and Mia Coe. Mia, 25, said: "I had heard my mum talk about it quite a lot, so I thought I'd come out with her." They had been queuing for almost half an hour by the time they could see the Loading Bay entrance. Lisa, 66, said she was "surprised" how popular the exhibition had been. "My neighbours went yesterday and they said they queued for about an hour," she said. "I was pleasantly surprised because that means other people are coming along to watch it and have a look at the paintings. "It's fantastic that it has resonated so much with the people here." The exhibition was part of the Bradford City of Culture 2025 celebrations - a 12-month festival of creativity, culture and arts. The City of Culture competition awards the title to a UK a city once every four years to boost cultural investment and regeneration, with Bradford awarded the 2025 programme.

  Ian and Carol Atkinson, from Bingley, were ready to get their second City of Culture event under their belts with what they thought would be a quick visit. "We thought it's a Friday afternoon, there will be nobody here so we'll just bob in and have a look," said Ian, 68. "We didn't expect half the queue." The pair enjoyed the TV show and 63-year-old Carol said: "I thought they had some fantastic portraits and they were all very different. "It's the City of Culture and we've got to embrace it."

  Some people queued for an hour to get into the exhibition

  Caroline Bond, 60, she had been visiting Bradford more since the City of Culture year started, adding: "We've come from Leeds to visit Bradford, which is exactly what they want us to do. "I think it's great it's having an impact on infrastructure. As well as events, it's the places that are being invested in." Organisers said almost 8,000 people had visited the gallery since it opened three weeks ago. Series 4 of Extraordinary Portraits is available to watch on BBC iPlayer.

