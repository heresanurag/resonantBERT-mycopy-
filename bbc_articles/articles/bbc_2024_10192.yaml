  A tornado sent debris flying through the air when it touched down in the US state of Pennsylvania on Saturday.

  A tornado sent debris flying through the air when it touched down in Venetia, Pennsylvania on Saturday.

  Local media reported that the storm knocked down trees and prompted people to take shelter.
