title: 'Omarosa: The secretly recorded audio tapes - BBC News'
date: '2018-08-14'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-45177005
content: |-
  The former Trump adviser has released what she says is a tape of a phone call from the US president.

  Former Trump adviser Omarosa Manigault Newman has released what she says is a tape of a phone call from the US president after her dismissal last year.

  She also recorded White House Chief of Staff John Kelly dismissing her.
