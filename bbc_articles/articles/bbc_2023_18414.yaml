title: Silver Roman ring found in Cotswolds declared treasure - BBC News
date: '2023-12-13'
section: Gloucestershire
url: http://www.bbc.co.uk/news/uk-england-bristol-67692133
content: |-
  An expert from the British Museum dates the artefact between 100 and 300 AD.

  The ring, which was found in the Cotswolds, has been declared as treasure

  A silver ring found in the Cotswolds that dates back more than 1,700 years to Roman times has been declared treasure.

  Gloucestershire Coroners Court was told that an expert at the British Museum has dated the ring between 100 and 300 AD.

  It was found in 2021 in Temple Guiting - close to Stow-on-the-Wold.

  The Corinium Museum in Cirencester has expressed an interest in acquiring the ring, the court heard.

  The ring has a rectangular bezel which is decorated with a central raised panel design with two cross saltires formed from two inside lines and a transverse line forming an open V shape. The shoulders are decorated with notches.

  The British Museum stated that as this ring pre-dates 1721 and is made of silver, it qualifies as treasure.

  The assistant coroner for Gloucestershire Roland Wooderson confirmed that was his finding and formally declared the ring to be treasure, meaning it comes under rules established in the 2023 Treasure Act.

