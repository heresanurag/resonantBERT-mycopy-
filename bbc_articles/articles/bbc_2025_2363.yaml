title: 'Newspaper headlines: ''Putin will strike again'' and Starmer heads to DC -
  BBC News'
date: '2025-02-27'
section: The Papers
url: http://www.bbc.co.uk/news/articles/cjevxep9jnpo
content: |-
  The prime minister's upcoming talks with US President Donald Trump dominate the front pages on Thursday.

  'Putin will strike again' and Starmer heads to DC

  "He'll strike again" is the headline in the Daily Mirror, external, which leads with Sir Keir Starmer's warning about Vladimir Putin. The Times says the prime minister will appeal to Donald Trump to "hold back" Russia, as he arrives in Washington at what the Guardian, external calls "the most precarious moment for European stability in decades". The i newspaper, external says the UK's "top Trump card" will be raising the prospect of a state visit to London, hosted by King Charles III. The Daily Mail, external reports the "historic White House summit" will also include discussions about the UK's plans to hand sovereignty of the Chagos Islands to Mauritius. The Sun, external calls on Trump to veto the "inexplicable and insane deal". According to the Daily Telegraph, external, American officials are also expected to bring up concerns about a "Chinese mega-embassy" planned for London. Analysis by the Financial Times, external suggests that nearly half of the newly reduced aid budget is on track to be spent on housing asylum seekers in the UK. One Labour backbencher describes it as a "horrendous waste of taxpayer money", while another official tells the paper that "the actual figure spent on aid is going to be really, really small". A job advert for an NHS doctor to care for "older people stuck in A&E corridors" is highlighted in the Telegraph, external. It reports that the ad says corridor care is "now normal" at the Royal Sussex County Hospital in Brighton. But health leaders tell the Times, external the listing is a "frightening and worrying indictment of how bad things have become". The front page of the Daily Star, external features screenshots from what it calls a "bonkers" AI-generated video shared online by Trump, which the paper says depicts Gaza as a "glitzy Dubai-style paradise". The video shows a giant gold statue of Trump, as well as a shirtless Israeli prime minister enjoying a cocktail on a beach. The Daily Express, external says the post has "sparked fury" - with the president's own supporters describing it as being "in very poor taste". The Times, external reports the government is carrying out a pilot in which wind turbines will be painted black, to try to reduce the number of birds killed by their blades. Officials are said to have pointed to studies which suggest the change could bring down bird collisions by 70%.

