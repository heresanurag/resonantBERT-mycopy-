content: |-
  Kansas City Chiefs tight end Travis Kelce says it will be "pretty cool" and an "honour" to play in front of US president Donald Trump in Super Bowl 59.

  Playing in front of President Trump will be 'an honour' - Kelce

  Travis Kelce will play in his fifth Super Bowl on Sunday

  Kansas City Chiefs tight end Travis Kelce said it will be "pretty cool" and an "honour" to play in front of US president Donald Trump in Super Bowl 59. Trump will become the first sitting president of the US to attend a Super Bowl as the Chiefs face the Philadelphia Eagles in New Orleans on Sunday. Kelce's girlfriend, music superstar Taylor Swift, has previously criticised Trump and endorsed the Democratic candidate Kamala Harris as Trump was re-elected last year. Swift will also be attending Sunday's game at the Superdome, where security measures had already been bolstered following the New Year's terror attack which killed 14 people on Bourbon Street. Kelce will aim for a fourth Super Bowl ring, with the Chiefs hoping to become the first team to win three straight Super Bowls. "It's a great honour I think, no matter who the president is," Kelce said on Wednesday. "I'm excited because it's the biggest game of my life, you know, and having the president there - it's the best country in the world so it'd be pretty cool."

  Kansas City quarterback Patrick Mahomes also said it will be "cool" to play in front of President Trump. The Chiefs are playing in their fifth Super Bowl in six years and have won three of them so far. Speaking earlier this week, Trump declined to pick a winner, saying: "I don't want to say, but there's a certain quarterback that seems to be a pretty good winner." In response, Mahomes said: "It's always cool to be able to play in front of a sitting president, someone that is in the top position in our country. "I didn't see that clip but it's cool to hear that he's seen me play football and respects the game that I play." Offensive lineman Trey Smith, who has won two Super Bowl rings with the Chiefs, added: "It's one of the greatest sporting events, not only in America but the world, so we know there'll be even more eyes on us. But it'll be a really cool and unique experience at the same time."

