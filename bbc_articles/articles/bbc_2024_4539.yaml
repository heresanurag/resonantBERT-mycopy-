content: |-
  Economy Minister Gething will be first black man in the post when he replaces Mark Drakeford, who steps down next week.

  Nothing will have prepared Gething for the top job

  Vaughan Gething is probably best known for being health minister during the pandemic, responsible for the NHS and how Wales reacted. The UK Covid inquiry in Wales heard last week that there was "sloth-like urgency" within Wales, so there are questions for him to answer on that. Gething then moved to be the economy minister, which he technically still is right now. In his acceptance speech, Gething spoke about his three decades within the Welsh Labour movement. He also spoke about how the colour of his skin was significant, how he had suffered taunts as a teenager and encountered racism, so he's very proud of being not the only first black first minister of Wales but also first democratically elected leader within Europe who is black. He also spoke of a reset, acknowledging the work of Mark Drakeford before him and speaking to the generation ahead. It's a generation that has grown up with devolved power. The amount of power has grown over the years and Gething's been an important figure in making that happen and using that power. But nothing will have prepared him for the top job, where he will have the overall responsibility for decisions made here in Wales.
