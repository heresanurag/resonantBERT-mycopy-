title: 'Bhim Kohli: Police given more time to hold murder suspect, 14 - BBC News'
date: '2024-09-04'
section: Leicester
url: http://www.bbc.co.uk/news/articles/czrgxvgj360o
content: |-
  A 14-year-old boy remains in custody over the death of 80-year-old Bhim Kohli.

  Police given more time to hold murder suspect, 14

  Bhim Kohli had been near the park's Bramble Way entrance when he was seriously assaulted

  Detectives have been given more time to question a 14-year-old boy who was arrested on suspicion of murder after an 80-year-old man died following an attack. Bhim Kohli was walking his dog at Franklin Park in Braunstone Town, Leicestershire, on Sunday evening when he was assaulted. He died later in hospital. A 14-year-old boy remains in police custody being questioned on suspicion of murder. Four other children have been released without further action. Police say a post-mortem examination confirmed Mr Kohli died as a result of a neck injury.

  Mr Kohli, from Leicester, was taken to hospital following the park assault but died on Monday

  Detectives say they are continuing their inquiries to establish the circumstances surrounding the incident and have been given until 22:00 BST to hold the suspect. They continue to appeal for anyone who was in the area of the park or Bramble Way between 18:00 and 18:45 to come forward. Det Insp Emma Matts said the circumstances surrounding Mr Kohli's death were "extremely tragic and upsetting", not only for his family and friends but also the wider community.

  She added: "We continue to offer support to the family through our family liaison officers, and the local policing teams are in the area to provide reassurance and discuss any issues or concerns. "The family are aware of the significant public interest in the death of their loved one and would like to thank people for their kind words and sympathy. "At this stage, the family are asking for privacy at this extremely difficult time. “Our investigation into the assault on Mr Kohli remains ongoing. "We continue to keep an open mind around the circumstances surrounding the incident as we work to establish what occurred in the park on Sunday evening. I would continue to urge anyone who can assist our investigation to come forward."

  Tributes have been left at an allotment used by Mr Kohli

  The police cordon in the park has now been lifted. Because of prior police contact with the victim, Leicestershire Police made a voluntary referral to the Independent Office of Police Conduct (IOPC). Following further contact with the IOPC, the force has now made a mandatory referral. An IOPC spokesperson said: "We can confirm that we have received a referral from Leicestershire Police in relation to this matter. "We will carry out an assessment to decide what further action may be required from us." Meanwhile St Crispin's Church, in nearby Edward Avenue, has confirmed it will be open from 09:00 to 11:00, and from 15:00 to 17:30 on Wednesday for anyone who wishes to light a candle in memory of Mr Kohli. Tributes have also been left at the allotment where he spent much of his time. Another allotment holder told the BBC: "Mr Kohli was a lovely, kind, gentle man. He loved his family and his allotment. "He spent many hours on that allotment – even to the point his wife had made his dinner and he still hadn't come home."
