content: |-
  Prime Minister Keir Starmer appoints Labour MPs to cabinet positions after landslide election victory.

  The country's new Prime Minister Keir Starmer has appointed 22 Labour MPs and peers to key cabinet positions - including a record 11 women - after the party's landslide election victory.

  Explore our guide for short biographies of each member of the new cabinet and ministers who will be able to attend its meetings.
