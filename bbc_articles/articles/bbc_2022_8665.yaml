title: 'MoD fire on Salisbury Plain: helicopter will be used to tackle flames - BBC
  News'
date: '2022-07-13'
section: Wiltshire
url: http://www.bbc.co.uk/news/uk-england-wiltshire-62153403
content: |-
  Three small fires are burning on Salisbury Plain after being sparked by army exercises on Monday.

  The MoD apologised after the fires spread smoke over a large area of Wiltshire

  The Ministry of Defence (MoD) will use a helicopter to drop water onto fires caused by army training on Salisbury Plain.

  Three small fires are still burning after being sparked during a live firing exercise on Monday.

  MoD staff and Dorset & Wiltshire Fire and Rescue Service (DWFRS) have been working to prevent the fires spreading.

  "A helicopter will begin dropping water around the periphery of the impact area", an MoD spokesperson said.

  "They cannot drop water directly over the impact area as it requires low flying, which would put the crew at risk if unexploded ordnance were to be set off by the heat.

  "More water will be dropped tomorrow and this may continue into Friday," added the MoD.

  Soldiers from the Second Parachute Regiment and Royal Artillery have joined firefighters in attempts to tackle the fires.

  The fires began during army pre-deployment training on Monday

  Fire crews remain on site to dampen down the area and ensure there is no risk to the public or property.

  There are two fires in the northern area of the plain and one in the southern area, said the MoD.

  "Only three small fires remain and we have reduced the amount of smoke," said an MoD spokesperson.

  "Yesterday evening both defence personnel and Dorset & Wiltshire Fire and Rescue Service worked to reduce the impact of the fires and this has made a massive difference," they added.

