  Business groups line up to warn that the Brexit vote delay is yet another blow for UK Plc.

  Are further US rate rises on hold?

  Goldman Sach's chief economist thinks further rises in US interest rates are on hold until the middle of next year. Tougher financial conditions and trade uncertainties are likely to dampen any Federal Reserve rate hike in the very near term. "We think the probability of a move in March has now fallen to slightly below 50%," Goldman's Jan Hatzius wrote in a research note. But "we see a return to quarterly hikes in June that last through the end of 2019".
