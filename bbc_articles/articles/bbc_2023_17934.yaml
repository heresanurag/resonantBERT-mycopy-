title: Police bodycam captures traffic stop marriage proposal - BBC News
date: '2023-11-24'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-67517667
content: |-
  Officers helped with staging the surprise proposal, pulling over the couple in Wisconsin.

  Police officers helped a man propose to his girlfriend by staging a traffic stop in the city of Eau Claire, Wisconsin.

  Bodycam footage shows what looks like a routine traffic stop turning into a surprise marriage proposal by Troy Goldschmidt to his shocked girlfriend Moriah Prichard.

  Eau Claire Police Department told local media Mr Goldschmidt had asked for their assistance in organising the proposal, and they obliged.

  Police released the footage on social media with the caption: "You never know what's going to happen on a traffic stop."
