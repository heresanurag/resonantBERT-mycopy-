  Police have released without charge a man in connection with the death of a woman on board a ferry.

  Man released without charge after woman found dead on ferry

  Gardaí and emergency services boarded the ship when it docked in Rosslare Harbour

  Gardaí (Irish police) have released without charge a man who was arrested in connection with the death of a woman on board a ferry sailing from Wales to Ireland. The incident occurred on Tuesday, on the 14:00 GMT Stena Line sailing from Fishguard to Rosslare in County Wexford. Gardaí and emergency services attended the scene after being alerted to what police described as "an unexplained death" shortly after 17:00 local time. They then boarded the ship. The woman was later pronounced dead. A post-mortem examination has been completed but the results "are not being released for operational reasons", gardai said.

  The ferry docked at Rosslare in County Wexford after travelling from Fishguard in Wales

  Irish broadcaster RTÉ reported that the ship's captain made an emergency call about half an hour before the ship docked. On Tuesday evening, the 19:00 outbound Stena sailing from Rosslare to Fishguard was cancelled with passengers being accommodated by Irish ferries on the 20:45 sailing from Rosslare to Pembroke, according to the company. Wexford councillor Ger Carthy said locals reacted with "shock and sadness" at the "tragic events". "What transpired here last night and the response that was given by the gardaí and the state agencies was second to none," he added.

  In a statement, Stenaline said: "We can confirm that An Garda Síochána is investigating an incident that occurred on the 14:00 ferry crossing from Fishguard to Rosslare on Tuesday February 25. "In order to assist with the Garda investigation, last night's 19:30 and 01:30 Stena Nordica sailings were cancelled. Today's 08:30 sailing from Rosslare and return from Fishguard at 14:00 have also been cancelled." The ship departed for its journey to Fishguard from Rosslare at 19:30 local time on Wednesday.
