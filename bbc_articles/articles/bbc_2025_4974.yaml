  Using a Signal chat to share highly classified information and accidentally including a reporter on the discussion could raise the possibility of violations of federal laws such as the Espionage Act. It can be a crime to mishandle, misuse or abuse classified information, though it is unclear whether such provisions might have been breached in this case. Mara Karlin, who served under six secretaries of state and was assistant secretary of defence, told the BBC the leak is "stunning" and "not normal". Karlin said these types of conversations should take place in a secure space, in the Pentagon or in the Situation Room in the White House, not in a Signal group chat. Sensitive government communications are required to take place in a sealed-off room called a Sensitive Compartmentalised Information Facility (Scif), where mobile phones are generally forbidden. The US government has other systems in place to communicate classified information, including the Joint Worldwide Intelligence Communications System (JWICS) and the Secret Internet Protocol Router (SIPR) network, which top government officials can access via specifically configured laptops and phones. Karlin says she expects both allies and adversaries to pay attention to this, saying they will ask: "Can the US government keep sensitive information in a secure manner?" Inspector general investigations and congressional investigations will be carried out, Karlin predicts. "This is historic," she adds. Samar Ali, a professor of politics and law at Vanderbilt University who worked on counter-terrorism with the homeland security department in the Obama administration, said of the leak: "It's baffling. It's shocking. It's dangerous." The text chain shows "a clear violation of our national security laws", she told the BBC. Prof Ali wonders what accountability the Trump team might face, and notes that she would have lost her job and security clearance if she committed any of these violations. The White House has denied any classified information was shared on the chat.

