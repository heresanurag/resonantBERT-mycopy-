  Some of the Signal messages National Security Adviser Michael Waltz sent to the chat were set to disappear after one week, Jeffrey Goldberg reported in his article for the Atlantic. If confirmed, that would raise questions about two federal laws that require the preservation of government records: the Presidential Records Act and the Federal Records Act. "The law requires that electronic messages that take place on a non-official account are preserved, in some fashion, on an official electronic record keeping system," said Jason R Baron, a former director of litigation at the National Archives and Records Administration. Such regulations would cover Signal, he said. Official government communications are supposed to be either automatically archived, or the individuals involved are supposed to forward, copy or preserve the messages. "The open question here is whether these communications were automatically archived," Baron told the BBC. "It's not clear whether that occurred." It was also unclear whether the individuals in the chat had taken other steps to preserve the records. "We should all be concerned about the use of these electronic messaging apps to evade federal record keeping requirements," Baron said.
