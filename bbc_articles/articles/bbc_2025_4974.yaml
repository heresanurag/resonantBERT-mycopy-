content: |-
  US officials' use of an unsecured chat app presented potential problems even before a journalist was added to the group, analysts say.

  Why is it a problem if Yemen strike plans shared on Signal?

  This video can not be played To play this video you need to enable JavaScript in your browser.

  The leak of classified information by President Donald Trump's national security team on an unsecured chat app may have broken three basic rules, according to analysts. Atlantic editor-in-chief Jeffrey Goldberg reported that he was accidentally included in the 18-member Signal group and saw details of imminent American strikes on Houthi rebels in Yemen. The White House has acknowledged the messages reported by the Atlantic appear to be authentic. Here are three basic issues with using Signal to share high-level information, experts told the BBC.

  Signal has gone from a platform favoured by dissidents to the unofficial whisper network of Washington officialdom. Privacy and tech experts say the popular end-to-end encrypted platform is more secure than conventional texting. The app is open-source, meaning its code is available for independent experts to scour for vulnerabilities. But like any messaging app with high-value targets, state-backed hackers try to find a way into Signal chats. Google Threat Intelligence Group has noticed increasing efforts to compromise the platform by individuals of interest to Russia's intelligence services. The app is not banned outright by the US government. Under President Joe Biden, some officials were allowed to download Signal on their White House-issued phones. But they were instructed to use the app sparingly and never to share classified information on it, former national security officials who served in the Democratic administration told US media. Pentagon regulations state that messaging apps "are NOT authorized to access, transmit, process non-public DoD information", reports CNN. Signal is used for communications by militaries around the world, the app's president Meredith Whittaker told BBC News in December. But a cybersecurity expert tells the BBC that using Signal to communicate sensitive communications of this nature is risky. "The channels that are generally used for communications within government systems are monitored and well-secured from a usage standpoint," said John Wheeler of Wheelhouse Advisors, a cybersecurity consultancy. With outside tools, he said, it appears there may be no authorisation protocols in place. "Something of this sensitive nature should really require some very strict protocols in terms of communications," Wheelhouse told the BBC. "I was very surprised that they would be using this sort of solution." He added that this incident might make US partners abroad think twice before communicating sensitive information to American officials.
