title: 'Local elections: Reform and Greens aim high in volatile mayoral contests -
  BBC News'
date: '2025-04-18'
section: England
url: http://www.bbc.co.uk/news/articles/c4g2d6881rro
content: |-
  Smaller parties are looking to cause an upset in mayoral contests in Hull and the West of England.

  Voters appear to be in a restless mood as Labour faces its first electoral test since its landslide general election victory. Reform UK is surging in the polls and the Liberal Democrats and Greens are also seeking to capitalise on voters' apparent disenchantment with Labour and the Conservatives in English local elections. But can they turn their poll ratings into real power on 1 May? We tested the waters in two mayoral contests in very different parts of the country. In the spring sun the mood in Hull does not scream political drama. Families out in busy shops and cafes, a salty breeze from the Humber cutting through the heat rising from the cobblestones. But beneath the calm, the race to become the first mayor of Hull and East Yorkshire combined authority is on a knife's edge. And the result is likely to tell us a lot about the febrile and fractured state of British politics in 2025.

  The political map of the Hull and East Yorkshire Combined Authority (Heyca) is a patchwork, covering around 600,000 people on the north side of the Humber estuary. Labour dominates in the city - with all three of its MPs - but the council has been run by the Lib Dems for the past three years. The Conservatives remain strong in the market towns and villages of the East Riding of Yorkshire - returning all the areas MPs and making up the largest group on the council.

  Conservative leader Kemi Badenoch has warned the party of "extremely difficult" local elections, but local Tory candidate Anne Handley is confident. Handley, who leads East Riding of Yorkshire Council under minority rule, admits the Conservatives "have had a bad press" after a record defeat in the general election last year. "But people are looking at the person rather than the politics in this," she argues.

  The seat is also a major target for Reform UK. It has selected local golden-boy Luke Campbell, Olympic champion bantamweight boxer at London 2012, as its candidate. As a self-styled political outsider born-and-bred in Hull, Campbell says he can "bridge the gap" between government and an area that's "being ignored". Campbell says he hopes to echo some of Donald Trump's success in the US, capitalising on a strong sense of voter disillusionment in the area. "We need to make Britain great again," he says.

  Reform UK has chosen Luke Campbell, a political novice but Olympic boxing champion, as their candidate for the new mayor of Hull and East Yorkshire

  Local artist Nelly Richards says he believes Reform could take the mayoralty. Mr Richards, who owns a shop on Hull's main shopping parade framed by empty units, says people want to "send a message" to the major parties. Put off by Labour's record in government, life-long Labour voters Jill Cook and Jane O'Neil from Hessle say they may vote Reform for the first time. Mrs O'Neil says she has been hit by the Winter Fuel Payment cuts and Labour rejecting any compensation for women hit by changes to the state pension age. "I keep thinking, we haven't got enough money to do everything for everybody," Mrs O'Neil said, adding that "maybe we need to pull up the drawbridge, even if just for a little bit".

  Jill Cook and Jane O'Neil are considering voting Reform UK for the first time after becoming disillusioned with Labour's record in power

  There is a definite sense of an "anyone but Reform" vote mobilising as well. Keith Whiles, a 78-year-old retiree, sums up the sentiment of many: "Luke Campbell - what does he know about politics?" The lifelong Labour voter says he will use his vote to get "someone who's a bit more experienced" into office. Hull was once rock-solid Labour territory - and their candidate Margaret Pinder would have been the natural home for voters looking to block Reform. But after less than a year in government, Labour's grip is loosening. Alfie Appleton, who owns Hull's independent clothing shop the Chinese Laundry said "Labour aren't my best friends at the moment". He is politically homeless after his natural party Labour "kicked us in the teeth with the budget this year" by raising National Insurance contributions while, cutting small business rate relief and raising minimum wages.

  Mike Ross, the Liberal Democrat leader of Hull City Council and candidate for mayor believes his party is best placed to scoop up votes. "There's a lot more people who are against Reform than pro. "Given how well we do across the patch in the local elections, we are probably the best placed party to stop Reform winning."

  LIb Dem Leader of Hull City Council Mike Ross hopes to capitalise on the "anyone but Reform" vote in the area

  The new mayor was established under the previous Tory administration in 2023, external to push powers out of Westminster, copying the blueprint of London Mayor Sadiq Khan and Greater Manchester Mayor Andy Burnham. Labour plan to expand the programme to every English region to simplify local government and boost economic growth. The Heyca mayor will be given a £13.3m a year budget, with key responsibilities to oversee, external local transport and growth plans. Rowan Halstead says his party, the Yorkshire Party, are the only group "not shackled" by national allegiances so would put this money and people in the region first. Whoever becomes mayor will have big economic challenges to tackle. Hull is one of the most economically deprived areas, external in England. East Riding has one of the fastest growing economies in the country, but Analysis by the Institute for Government, external has found the productivity across the whole region still remains below the national average.
