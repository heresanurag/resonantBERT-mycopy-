  A 150 miles away, in the West of England region, the political terrain looks different but just as volatile. Labour make up the majority of local MPs. But the party is reeling from rape and child abuse allegations against incumbent Dan Norris - who was elected as a Labour candidate but has been expelled from the party while police investigate.

  Even before news of Norris' arrest broke, Labour's candidate Helen Godwin was pitching herself as a clean break from a previous regime that put West of England Combined Authority (Weca) in special measures due to infighting. Godwin, a former cabinet lead on Bristol City Council, told the BBC: "I would be operating an authority that is inclusive, lots of discussion and room for disagreement - but actually getting the hard work done." Despite some "tough decisions", Godwin says she does not see "a great shift away from Labour" since last July's election.

  The Liberal Democrats and Greens both sent MPs to parliament from constituencies in the area. Lib Dem Oli Henman and Green Party candidate Mary Page see themselves as the closest challengers to Labour. In 2021, Page stood to be the Lib Dem candidate for Mayor of Bristol - a role she later campaigned to abolish - before joining the Greens in 2023. She argues her shift to the Greens reflects a journey many voters have been on. "I'm having people telling me all the time 'I was a Labour supporter but now I'm joining the Greens'," she said. "Not just voting but actively saying they're joining." One of these is new mother Pheobe Bracewell, who says she wants "to see more focus on sustainability of the planet".

  Mary Page believes her political swing towards the Green Party is matched by many voters

  Arron Banks - famed for his £1m pound donation to Nigel Farage's UKIP and his prominent role in the 2016 Brexit referendum - has attracted attention with his decision to stand for Reform UK. Independent councillor Ian Scott has, meanwhile, told the BBC there is "an appetite" in the independent-minded West of England for someone outside the party system.
  • None Full details of all the candidates running for mayor of Weca can be found here. The west of England is the most productive region outside London, according to Weca's own analysis., external But while the economy looks good on paper, workers in the area contend with wages that have flatlined over the last 15 years while house prices increased to ten times average earnings. Plans for trams and underground trains in Bristol - one of the largest cities in Europe not to have a mass transit system - fell apart last year amid political bickering. Anger over slow buses and gridlocked roads is palpable when you talk to voters.

  "The bus service is awful and the price of this is exorbitant," NHS traffic marshal Craig Wimblin says. While he supports Reform, he plans to use his vote to oust the Green Party, who he blames for clogging the streets through a low traffic scheme in the east of the city. The Greens now face blowback from the voters over choices made by their councillors, the biggest group on Bristol City Council - including dropped plans to collect black waste bins every four weeks.

  Craig Wimblin says poor bus services are making it hard for anyone to work in Bristol

  Political disengagement is another major factor in this election. The main response to questions about the mayoral race was a shrug of the shoulders. Turnout for the last Weca mayor was 36% and not expected to improve this time given there are no other local elections in the area this year. Council election in Hull last year saw a turnout of just 21%. Election experts Prof Colin Rallings and Prof Michael Thrasher argue low turnout is creating a chaotic political landscape - potentially handing power to small but driven groups of voters.

  The results of these contests could ripple beyond mayors actual powers over local transport or training budgets. The mayoralty will give the winners a platform, visibility and momentum to shape the political debate in the years before the next general election These races could be an up-close look at where national politics goes next.
