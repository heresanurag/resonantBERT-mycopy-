title: Plane makes emergency landing on US highway - BBC News
date: '2020-12-04'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-55184326
content: |-
  A light aircraft is forced to make an emergency landing on an interstate in Minnesota, but no injuries are reported.

  A light aircraft was forced to make an emergency landing on an interstate in Minnesota.

  The single-propeller plane appeared to have suffered an engine failure, the Ramsey County Deputy's Federation said on Facebook.

  Nobody was injured in the accident.
