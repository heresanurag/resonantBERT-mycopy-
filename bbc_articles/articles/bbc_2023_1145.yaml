id: bbc_2023_1145
title: 'Australia flood crisis: ''Once in a century'' - BBC News'
date: '2023-01-09'
section: General
url: http://www.bbc.co.uk/news/world-australia-64206297
content: |-
  Heavy rain brought by a tropical cyclone has hit Western Australia, leaving communities stranded.

  Western Australia has been experiencing heavy rain, causing communities to be stranded and leaving hundreds of people in need of evacuation.

  An emergency services minister said it was "the worst flooding Western Australia has had in its history".

  The crisis in the Kimberley region started last week after the severe weather system Ellie, a former tropical cyclone, brought heavy rain.
