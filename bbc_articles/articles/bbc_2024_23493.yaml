  Turning up late, even by a minute, to see Brentford in the Premier League is not advised - given their knack for early goals.

  'A world record?' What is the secret to Brentford's first-minute goals?

  This video can not be played To play this video you need to enable JavaScript in your browser. Thomas Frank on the secret to Bees' goalscoring record

  Turning up late - even by a minute - to see Brentford in the Premier League is not advised. The Bees have achieved the remarkable feat of scoring in the opening 40 seconds in each of their past three Premier League fixtures. It began on 14 September against Manchester City when Yoane Wissa netted after 22 seconds. Bryan Mbeumo has been responsible for keeping the trend going - scoring after 23 seconds against Tottenham and 37 seconds against West Ham. "I can't tell you [the secret]," Brentford manager Thomas Frank said after the 1-1 draw against West Ham. "Is it just the Premier League? There are lots of leagues. I need to know if it's a world record or not. "It must be a world record, three games in a row under 40 seconds - it's unbelievable." Frank, like the rest of us, was keen to learn whether Brentford's quickfire endeavours this month have set a world record. The answer is possibly, but neither we - or BBC's data providers Opta - can say for sure. What we are certain of, though, is Brentford are the first team in Premier League history to score in the opening minute in three consecutive games. The west London club are also the second in Premier League history to score a goal in the opening minute in three different matches in a single season, after Everton in 1998-99.

  Bryan Mbeumo (left) has scored five goals in six Premier League games this season

  From the kick-off, the ball is played back to goalkeeper Mark Flekken, who then hits it long as Brentford players push up towards the Manchester City box. The Bees are first to loose balls and eventually able to work the ball to Kristoffer Ajer on the right. Ajer crosses to the far post to Keane Lewis-Potter, who heads back across the face of goal. Brentford get a touch of fortune as John Stones fails to clear from under the crossbar and Yoane Wissa heads in. Just as they did against Manchester City, Brentford play the ball back to goalkeeper Flekken from the kick-off and he again hits it long as his team-mates push up into the Spurs half. Brentford are again first to the loose ball and work it to the left to Lewis-Potter, whose cross to the front post is volleyed in by Mbeumo. Once again Brentford kick off but in a slight variation the ball is only played back to a defender. It is, however, still hit long towards the opposition box and again Brentford are first to loose balls. As one cross is half cleared, Ajer sends the ball back in, the Hammers continue to struggle to clear their lines before Fabio Carvalho nods on for Mbeumo to volley in.

  So is it just luck, or are Brentford putting extra effort into trying to make a quick start? Frank has suggested it is a bit of both. "Of course there is planning that goes into it," Frank said. "We have a kick-off strategy and we tweak it from game to game. And as a mindset and philosophy, we like to get straight on the front foot and be positive. "There are some margins going our way of course, but I want to give credit to the coaching staff and the players." After pulling it off against Spurs and Manchester City, West Ham had braced themselves for an early assault on their goal from Brentford. "We have to be embarrassed," West Ham midfielder Tomas Soucek said. "We saw how they scored those two goals [against Tottenham and Manchester City] and they did it against us. "We all prepared very well for it and we still conceded." Former Arsenal and England winger Theo Walcott told BBC Match of the Day: "We talk about quick starts, it is like a rugby start. "They commit numbers forward, and what is important is the second balls they pick up. They are committing defenders, putting the balls into areas. You can see the numbers moving up the field."
