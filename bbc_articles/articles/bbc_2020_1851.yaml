title: 'Iderval da Silva death: Three jailed for killing Uber Eats driver - BBC News'
date: '2020-02-05'
section: London
url: http://www.bbc.co.uk/news/uk-england-london-51388637
content: |-
  Iderval Da Silva, 46, was beaten to death as he tried to stop a group of teenagers stealing his moped.

  Iderval Da Silva was beaten to death in Battersea in May last year

  Three teenagers have been jailed for killing an Uber Eats delivery driver when he tried to stop them stealing his moped.

  Brazilian national Iderval Da Silva, 46, was beaten to death in a "cowardly attack" in Battersea, west London, on 25 May.

  Jadan Richards, 19, was sentenced to life for murder and must serve at least 12 years, the Old Bailey heard.

  Tay Clovey, 16, was also jailed for 11-and-a-half years for murder.

  Tay Clovey and Jadan Richards were found guilty of murdering Iderval Da Silva

  A 17-year-old boy convicted of manslaughter was given a four-year term.

  The group spotted Mr Da Silva's unattended moped outside a Battersea cafe and one of them tried to snatch it, the court heard.

  When Mr Da Silva tried to stop them he was set upon in a "momentary explosion of short-lived violence".

  His son Caique Keven Silva said in a statement: "I find it very difficult to explain how not having my dad here is affecting me.

  "Part of me still thinks that this hasn't really happened, that it is only a nightmare from which I will wake up at any time."

  He added: "My dad was there for people, never thinking of himself. No-one deserves to lose their father in the way I lost mine."

  Iderval Da Silva was attacked when he tried to stop a group of teenagers stealing his moped

  Sentencing, judge Mark Dennis QC told the defendants: "There is no reason to think that any of you were immature for your age at that time, nor that you would not have known that such an unnecessary and cowardly assault was both wrong and wholly unjustified."

  Following the trial Jasire Frazer, 18, from Wandsworth, and a 17-year-old were cleared of murder and the alternative charge of manslaughter.

  Another 17-year-old boy was cleared on the judge's direction midway through the trial.

