content: |-
  The president also appeared to threaten civilians in Gaza, saying they would be "dead" if they held hostages.

  Trump issues 'last warning' to Hamas as US confirms direct hostage talks

  US President Donald Trump has issued what he called a "last warning" to Hamas to release the hostages being held in Gaza. "I am sending Israel everything it needs to finish the job, not a single Hamas member will be safe if you don't do as I say," Trump said in a lengthy post on his Truth Social platform. Hamas accused the US president of encouraging Israel to break the ceasefire deal currently in effect between the two sides. Trump's statement came just hours after the White House confirmed it was holding direct talks with Hamas over the remaining hostages.

  Washington has until now avoided direct engagement with the group, and there is a longstanding US policy against having direct contact with entities it lists as terrorist organisations.

  In his social media post, Trump said there would be "hell to pay" if the hostages were not released, while not specifying the nature of the support he was sending Israel. "Release all of the hostages now, not later, and immediately return all of the dead bodies of the people you murdered, or it is OVER for you," he added. "For the leadership, now is the time to leave Gaza, while you still have a chance." He also appeared to issue a wider threat: "Also, to the People of Gaza: A beautiful Future awaits, but not if you hold Hostages. If you do, you are DEAD!" Hamas spokesman Hazem Qassem said in a statement that such threats "complicate matters regarding the ceasefire agreement and encourage the occupation [Israel] to avoid implementing its terms". It's not the first time Trump has threatened Hamas. In December, he said there would be "all hell to pay" if hostages were not released by the time he took office. The post came after Trump met with a group of hostages in the White House who had been recently released under the ceasefire. Meanwhile, White House press secretary Karoline Leavitt confirmed the US has been negotiating directly with Hamas to try to secure the release of the hostages. Israel had been consulted prior to the talks, she added. President Trump believed in doing what was in the best interest of the American people, Leavitt told reporters. The work of the special envoy for hostages, Adam Boehler, work was a "good faith effort to do what's right for the American people", she added. "Two direct meetings" have taken place between Hamas and a US official, "preceded by several communications", a Palestinian source told the BBC. News of the talks was first reported by Axios, external, which said the two sides were meeting in Qatar to discuss the release of US hostages as well as a wider deal to end the war. The Israeli military launched a campaign to destroy Hamas in response to an unprecedented cross-border attack on 7 October 2023, in which about 1,200 people were killed and 251 were taken hostage. At least 48,440 people have been killed in Gaza since then, according to the territory's Hamas-run health ministry. Israel says there are still 59 hostages being held in Gaza, with up to 24 believed to be alive. Five US citizens are among the captives. One of them, Edan Alexander, is believed to be alive and the other four are presumed dead.

