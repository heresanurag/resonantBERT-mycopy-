  A former US deputy Assistant Secretary of Defence for the Middle East said the US needs to be "more proactive" about getting its citizens back. Mick Mulroy, who is also an ex-CIA paramilitary officer, added that "it could complicate the Israelis' ability to get their citizens back if not tightly coordinated".

  Israel's prime minister's office said in a statement it has "expressed its position" regarding the direct talks, but did not provide any further information. According to reports, Boehler met with Hamas representatives in the Qatari capital, Doha, in recent weeks. Hamas has had a base in Doha since 2012, reportedly at the request of the Obama administration. The small but influential Gulf state is a key US ally in the region. It hosts a major American air base and has handled many delicate political negotiations, including with Iran, the Taliban and Russia. Alongside the US and Egypt, Qatar has also played a major role in talks to broker a ceasefire between Israel and Hamas in Gaza.

