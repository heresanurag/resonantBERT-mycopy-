title: Are anti-bacterial hand gels worth it? - BBC Three
date: '2017-04-19'
section: General
url: http://www.bbc.co.uk/bbcthree/item/383ea168-f3e7-45ac-b4d3-ffaa2c7938a0?intc_type=promo&intc_location=news&intc_campaign=handgel&intc_linkname=bbcthree_fac_vidclip1
content: |-
  If you worry about germs on the train, in the office or at the gym, you might resort to covering your hands in gel to put your mind at rest. But could they be less effective than we think?
