title: PMQs gives taste of political mud-slinging to come - BBC News
date: '2024-01-24'
section: UK Politics
url: http://www.bbc.co.uk/news/uk-politics-68082750
content: |-
  With an election looming, expect the personal attacks from Rishi Sunak and Keir Starmer to continue.

  Some Conservatives may be trying to force a change of leader, but at Prime Minister's Questions we got a taste of the political cut and thrust we will see until the election, assuming Rishi Sunak remains in place.

  Sir Keir Starmer darted around different issues, using each of them as an opportunity to land personal attacks on Mr Sunak.

  The Labour leader targeted Mr Sunak's wealth and background, repeating a charge from earlier this month that the prime minister "doesn't understand" Britain.

  His previous career also came under fire, with a claim that he was "making millions betting the misery of working people during the financial crisis".

  But Sir Keir's primary focus was on splits within the Conservatives.

  He accused Mr Sunak of being "bullied" by his own party, after former minister Sir Simon Clarke called for him to be replaced as PM.

