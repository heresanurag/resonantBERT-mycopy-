  In turn the prime minister went after Labour's green policies, claiming the party's £28bn investment pledge would mean tax rises.

  He also attacked Sir Keir for his legal career, pointing out for the second week in a row that he did legal work for Hizb-ut Tahrir, which the government proscribed as a terrorist organisation last week.

  And he labelled the Labour leader "the human weathervane" for his changing positions over the years.

  It may seem like tedious political mud-slinging, or you may think these are the crucial questions of character which prime ministers and potential prime ministers must answer.

  Either way, get used to it.

  This video can not be played To play this video you need to enable JavaScript in your browser. Labour MP Tahir Ali: PM has "blood of thousands of innocent people on his hands"

  Meanwhile Sir Keir saw his boast that he had "changed my party" flung straight back at him when Mr Sunak faced questions about the situation in Gaza.

  MPs on the Labour frontbench looked angry to say the least as Tahir Ali, the MP for Birmingham Hall Green, claimed that Mr Sunak had "the blood of thousands of innocent people on his hands" because of the government's position on the conflict, as he called for "an immediate ceasefire".

  That is not Labour's official position.

  The Labour leader stared straight ahead, motionless, as Mr Sunak hit back to raucous cheers: "That's the face of the changed Labour Party."
