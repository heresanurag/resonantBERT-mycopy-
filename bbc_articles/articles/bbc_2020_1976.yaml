content: |-
  Communities across the UK face more disruption following the torrential rain brought by Storm Dennis.

  Clean-up in Pontypridd: 'Everything is covered in mud'

  5 Live's Rory Carson has been speaking to people in Pontypridd, where he says the clean up operation is well under way. Geraint Day is chair of Clwb Y Bont - a club that promotes Welsh language and culture in the centre of the town. "Sunday night was the time it was really bad," he said, "looking in the function room now it's covered with mud. The ceiling has stayed up but the rest of the club is a complete mess, the bar, everything is covered in mud... there's not a hope of saving anything electrical. "Anything with soft furnishing is going to be covered with flood mud and contaminated with sewage as well." Mr Day said he has "no idea" how much it will cost to repair. "Because it's an area of high risk flooding, despite the flood walls, we can't get insurance for flood protection so we'll have to do it ourselves." He said they're appealing for donations, and relying on volunteers: "We'll pull together and reopen I'm sure."
