  • None Eintracht Frankfurt have played 11 Europa League games at home, winning eight and drawing three. They haven't been behind for a single minute in those games.
  • None Just one of the six teams to draw the first leg of a Europa League semi-final away from home has been eliminated, Celta Vigo in 2016-17 (knocked out by Manchester United).
  • None Chelsea have scored the most goals (31) and had the most shots (217) in the Europa League this season.
  • None Pedro has been directly involved in seven goals in his last six starts for Chelsea in the Europa League (four goals, three assists).
  • None Jovic scored his ninth goal in this season's Europa League, only Olivier Giroud (10) has scored more.
