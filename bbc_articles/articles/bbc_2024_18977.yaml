content: |-
  Habiba Naveed, 34, is charged with murder over the death of Christopher Brown in Polsted Road.

  Woman charged with murder of man, 72, in Lewisham

  Christopher Brown's body was discovered at a house in Polsted Road

  A woman has been charged with murder after the body of a man was found at a house in Lewisham in south-east London. Habiba Naveed, 34, of Polsted Road, was charged on Friday after a man was found at a residential address on the same road in the early hours of Thursday. The Metropolitan Police has named the victim as Christopher Brown, 72, from Lewisham. A post-mortem examination found the cause of Mr Brown's death to be blunt force trauma.

  The force said the victim and suspect were known to each other and that it was not currently seeking anyone else in connection with the incident.
