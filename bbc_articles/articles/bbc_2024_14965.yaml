  Rybakina had fast become the favourite for the women's singles title at Wimbledon following a flurry of high-profile exits earlier in the tournament. After Paolini and Vekic played out the longest women's semi-final at Wimbledon, it looked like the 25-year-old would make quick work of Thursday's second match on Centre Court when she raced to a 4-0 lead before snapping up the first set. But Krejcikova struck back in the second and, with the crowd behind her, she needed just a single break of serve to take control of the decider. The 31st seed shot her arms into the air in celebration when fourth seed Rybakina fired long on the first match point. "I am so proud about my game and my fighting spirit today," Krejcikova said. Asked if she ever believed she would reach a Wimbledon singles final, she said "no, never" before paying tribute to 1998 Wimbledon champion Jana Novotna, who coached Krejcikova before she died in 2017 at the age of 49. "I am fighting for every ball and I am sure that is what she would want me to do," she added. It is the first time Krejcikova - a doubles specialist - has reached a Wimbledon singles final, and her first at a Grand Slam since she triumphed at the French Open in 2021. It marks a remarkable return to form for the 28-year-old, who had a far-from-perfect build-up to Wimbledon - winning just three matches in the five months before the Championships after struggling with a back injury and illness.
