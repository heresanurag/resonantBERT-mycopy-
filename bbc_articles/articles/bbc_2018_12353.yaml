title: Elvis act, 15, takes tribute shows by storm - BBC News
date: '2018-10-27'
section: General
url: http://www.bbc.co.uk/news/uk-england-bristol-45995145
content: |-
  Emilio Santoro has admired the legend since he was four and is now taking part in tribute shows.

  Emilio Santoro has an unusual dream for someone of his age - the 15-year-old wants to become a professional Elvis Presley impersonator.

  The teenager, from Weston-super-Mare, has had a love of the legend's music since he was four.

  And now he has become one of only 15 invited this year to perform at Benidorm's Elvis Festival.

  BBC Inside Out West's report can be seen on BBC One in the West at 19:30 GMT on Monday 29 October, and afterwards on the BBC iPlayer.
