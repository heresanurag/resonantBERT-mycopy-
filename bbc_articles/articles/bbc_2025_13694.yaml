title: 'Harry Potter TV show: Katherine Parkinson, Johnny Flynn and more join cast
  - BBC News'
date: '2025-06-09'
section: Culture
url: http://www.bbc.co.uk/news/articles/cz70d7gy77zo
content: |-
  Katherine Parkinson will play Molly Weasley, with eight more actors announced.

  Katherine Parkinson is the new Molly Weasley

  The actors who will play Draco Malfoy, the Dursleys, Molly Weasley and more key characters in the new Harry Potter TV series have been revealed. Johnny Flynn, known for Netflix's Ripley and films like The Dig, will play Lucius Malfoy with young actor Lox Pratt, star of BBC's Lord of the Flies, as his son Draco - Harry's classmate and nemesis. The Morning Show's Bel Powley will join Daniel Rigby, who won a Bafta Award for playing comedian Eric Morecambe in Eric and Ernie, as Harry's Aunt Petunia and Uncle Vernon Dursley. Fellow Bafta winner Katherine Parkinson, known for shows like The IT Crowd and Rivals, will play Ron's mother Molly Weasley, portrayed by Julie Walters in the films.

  Johnny Flynn played Dickie Greenleaf in Netflix's Ripley and David Bowie in 2020 film Stardust

  Bertie Carvel, who has played roles including Tony Blair in The Crown, will be the new Cornelius Fudge. And a string of newcomers have been cast as Hogwarts students - Leo Earley as Seamus Finnigan, Alessia Leoni as Parvati Patil, and Sienna Moosah as Lavender Brown. They join a crop of other names on the show's growing cast list including the child actors who will play Harry, Hermione and Ron, as well as John Lithgow as Dumbledore, Nick Frost as Hagrid and Paapa Essiedu as Severus Snape. The TV version of JK Rowling's books, being made by HBO, is expected to reach screens in late 2026 or early 2027.
