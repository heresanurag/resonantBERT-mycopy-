content: |-
  Judy Chu says the city of Monterey Park is "resilient" and will recover after 10 people were killed.

  Congresswoman Judy Chu has said it was horrible the mass shooting in Monterey Park occurred during a time of celebration as the Lunar New Year was rung in.

  She said the Californian city was "resilient" and that the community would get through it together.

  At least ten people were shot dead at a ballroom dance studio.
