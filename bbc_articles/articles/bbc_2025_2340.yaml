url: http://www.bbc.co.uk/news/articles/cd65487lezxo
content: |-
  The band, whose hits include Slam Dunk (Da Funk), haven't toured as a five-piece since 2001.

  Boy band Five to reunite with all original members

  Five sold more than 20 million records in the space of four years

  After 25 years apart, all five original members of the British boyband Five are reuniting for a massive UK arena tour. The group sold more than 20 million records in the late 1990s and early 2000s with tracks such as When The Lights Go Out, If Ya Gettin' Down and Slam Dunk (Da Funk). The group - Sean Conlon, Ritchie Neville, Scott Robinson, Abz Love and Jason "J" Brown - haven't performed as a five-piece since they broke up in 2001, amid burnout, mental breakdown and backstage fights. "This has been a long time coming and it really does feel right for all of us now," said Scott in a statement. "I know I speak for all the boys when I say we can't wait to do this all over again. Hope you're ready!"

  The reunion announcement lands on the 25th anniversary of the band winning best pop act at the 2000 Brit Awards. "We really can't wait to get back on stage together & see the fans, it's gonna go off!" said Abz.

  This video can not be played To play this video you need to enable JavaScript in your browser. Scott, Ritchie and Sean recount the moment they were signed by RCA Records - from the BBC documentary Boybands Forever

  Five were formed in 1997, in a gruelling audition process that saw more than 3,000 aspiring singers - including a pre-fame Russell Brand - audition for former Spice Girl managers Bob and Chris Herbert. The group came together relatively naturally, however, after the members formed a unit during rehearsals and convinced record label executives with their chemistry. "I remember Simon Cowell was there and he said, 'You're the band, I'm signing you to RCA Records on a five-album deal, this is happening very soon," Scott told journalist Michael Cragg in his book about the 2000s pop era, Reach For The Stars. The group were quickly moved into a shared council house in Surrey to begin the process of bonding - but it didn't go entirely to plan. "They wanted a band with edge and that's what they got," Ritchie said in Reach For The Stars. "None of us are people that will be bossed around. So if you put five of those people together all the time and then they start annoying each other... eventually there's going to be eruptions."

  The band, photographed this month, have not performed together as a quintet since 2001

  Despite those initial tensions, the group achieved huge commercial success. Their first song, Slam Dunk (Da Funk), went to number 10 in the UK; and the follow-up, When The Lights Go Out, achieved the same ranking on the US Billboard chart. One of the first bands to utilise the talents of Swedish hitmaker Max Martin, they famously turned down the opportunity to record ...Baby, One More Time before Britney Spears turned it into an era-defining smash. Undeterred, they had further chart success with see-sawing song titles such as Everybody Get Up and If Ya Gettin' Down, and opened the 2000 Brit Awards by performing We Will Rock You with rock legends Queen. For three consecutive years, they were named best band at the Smash Hits Poll Winners Party, while Scott picked up a hat-trick of best haircut awards. Meanwhile Ritchie's relationship with fellow teen star Billie Piper made them a permanent fixture in the tabloids and teen music magazines.

  In 2001, Five played to half a million fans at Brazil's Rock In Rio festival, but the band was disintegrating due to a relentless touring schedule and personal conflicts. Sean walked out during an interview to promote the 2001 single Let's Dance and never came back. His absence from the music video was officially explained as glandular fever but, in reality, he had suffered a mental breakdown. His departure was formally announced later that year and, after releasing a greatest hits album, the band officially split up. Scott said he decided to leave after being pressured to perform on TV while his young son was in a hospital's intensive care ward. "I was crying in the corridor and I think [Ritchie] looked at the boys and said, 'This is done'," he later recalled. In the recent BBC documentary Boybands Forever, Cowell cited Five as the band that "got away", saying they had come tantalisingly close to becoming a major act in the US. "The band ended before we really cracked America, and I honestly think we could have done that," former manager Chris Herbert agreed.

  The group were one of the first British boybands to mix elements of hip-hop into their music

  Five reformed without Sean in 2006, but plans to record a new album were shelved after they failed to secure a record deal. A second reunion occurred in 2012, this time without "J" Brown, who declined to take part for "privacy reasons". After appearing in the ITV documentary The Big Reunion, the group toured with fellow 2000s pop survivors Atomic Kitten, Liberty X and B*Witched - until Abz abruptly quit in 2014. "As of today I am no longer a member of @itsfiveofficial Thank you to all the fans who support us, I love you all," he wrote on social media at the time,. The news apparently took his bandmates by surprise "Wow what a way to find this out!" replied Scott. Abz, who was born Richard Breen, announced he had rejoined the band earlier this week, with fans speculating his return could lead to a full reunion. The news was confirmed by BBC Radio 2's Scott Mills on this morning's Breakfast Show. Five's 12-date tour will kick off in Brighton on 31 October 2025, with tickets on sale from Friday, 7 March.
