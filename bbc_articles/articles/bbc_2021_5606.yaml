title: Philippines Covid surge throws country into disarray - BBC News
date: '2021-05-07'
section: General
url: http://www.bbc.co.uk/news/world-asia-57004926
content: |-
  A second Covid surge is putting renewed pressure on the country's healthcare and economy.

  In the Philippines, a second surge in Covid-19 cases is putting renewed pressure on the healthcare system.

  The country currently has the second highest number of cases in South East Asia behind Indonesia.

  And with one of the longest and hardest lockdowns in the world, a crippling recession has forced thousands on to the streets in search of food.
