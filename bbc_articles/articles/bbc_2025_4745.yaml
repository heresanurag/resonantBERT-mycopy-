content: |-
  Scotland's alarming defeat by Greece in the Nations League play-off leaves head coach Steve Clarke with much to ponder, writes Tom English.

  'A return to Scotland's worst of times under Clarke'

  This video can not be played To play this video you need to enable JavaScript in your browser.

  With 17 minutes left to play at Hampden, Greece manager Ivan Jovanovic added insult to Scottish injury when calling ashore two of his best players, the duo who had done more than anybody else to put his team into an unassailable lead. The game was long done by then; 3-0 going on more. Scotland had been as wretched as Greece had been classy. Part of Hampden was exasperated, part of it was angry, another part was on its way home, fed up. Giannis Konstantelias had scored Greece's first and assisted the second. No need to exert him any more, not when there was not a scintilla of a threat of a comeback from Scotland. Konstantinos Karetsas, the teenage sensation, had scored that brilliant second goal. He came off, too. Job done. Another mortifying reflection of Greece's dominance.

  Scotland didn't have a whole load of composure from the start, but at a painfully early stage they lost the bit they had. Lewis Ferguson clothes-lined an opponent and got a yellow card. George Hirst went yapping to the referee and he got booked as well. As the savage reality of their own inadequacies was hitting them right between the eyes, Kieran Tierney had possession 20 yards into the Greek half. In front of him, a barren landscape. No movement, no options. He turned and booted it back to Craig Gordon and Hampden let him have it. Boos rang around the national stadium and it was fair enough. A few moments later, Grant Hanley played an agricultural hoof down the park, the ball careering out of play with no Scotsman in sight. Cue another visceral response from the home fans. Shortly after that Gordon knocked a clearance straight to Greek substitute Giorgos Masouras. Slapstick stuff. "Embarrassing" as John McGinn described the performance, later on. And it was. Embarrassing and unsettling.

  Ryan Christie expressed his frustration, "especially with how well the first leg went". We could revisit that now. The bottom line of Athens last Thursday was, indeed, amazing, but there were warning signs. Scotland won the game through a penalty they should never have got and a defensive display that was always going to be hard to repeat. Jovanovic learned a lot about how to attack this Scotland team. They tore them apart with their speed of thought and speed of movement, the accuracy in their passing and the ruthlessness in their finishing. We could go on and on in highlighting Scotland's failings. We could document their shocking lack of accuracy and their dismal habit of affording Greece all the time and space they needed to build their lead, but it would take too long. What you were left with at the end was a feeling of despondency at how poor Scotland actually were. If there was hope, and belief, that this type of performance was maybe behind them, then this was the rudest of rude awakenings. It was a return to the worst of times under Steve Clarke - the World Cup exit to Ukraine, the horrible loss in Dublin that followed it, the soul-destroyer against Hungary in Germany. It was only one bad day amid a recent upturn, yes, but it felt worse than that. Seeing practically all of Scotland's go-to men fail was quite something. Just when you had trust in them again after three excellent victories in a row, they go and do this.

