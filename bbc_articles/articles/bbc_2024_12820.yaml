title: James Morrison's ex-partner took own life, inquest hears - BBC News
date: '2024-06-21'
section: Gloucestershire
url: http://www.bbc.co.uk/news/articles/cpeekq1v29vo
content: |-
  The inquest into the death of Gill Catchpole comes to an end at Gloucestershire Coroner's Court.

  Gill Catchpole, 45, was found dead by James Morrison at her home

  The former partner of singer James Morrison took her own life after suffering mental health difficulties, an inquest has heard. Gill Catchpole, 45, was found dead by Mr Morrison at her home in Whitminster, Gloucestershire, on 5 January. Police and paramedics were called and she was pronounced dead at 9:37 GMT. Area coroner Roland Wooderson recorded a conclusion of suicide at Gloucestershire Coroner’s Court on Thursday.

  Det Sgt David Kania, who investigated the sudden death, ruled out any third-party involvement, the inquest was told. He added: “There were no signs of a disturbance or third-party involvement." If you have been affected by the issues raised in this report, help and support is available via the BBC Action Line. In a written statement, GP Dr Emma Basker said Ms Catchpole had suffered from “reoccurring mental ill-health”, including anxiety and PTSD, and had received medication, counselling and psychological therapy. Toxicology tests found an alcohol level of 190mg of alcohol per 100ml of blood. The legal drink drive limit is 80mg per 100ml of blood. The inquest heard the toxicologist was unable to determine “whether or not or the degree” to which the use of alcohol had impacted upon Ms Catchpole’s state of mind at the time of her death. Delivering his conclusion to the inquest, Mr Wooderson said: “It is quite clear to me that, sadly, at the relevant time Gill was in a difficult place mentally." “Having reviewed the evidence I have, it seems to me sadly that the appropriate conclusion on the balance of probabilities I will record a conclusion of suicide,” he said.
