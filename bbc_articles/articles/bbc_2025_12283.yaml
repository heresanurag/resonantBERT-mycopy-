title: Footage shows aftermath of Russia bridge collapse - BBC News
date: '2025-06-02'
section: General
url: http://www.bbc.co.uk/news/videos/c861y3gx977o
content: |-
  Fire crews were called to the scene after a road bridge came down in Bryansk.

  Two bridges have collapsed overnight in separate incidents in Russian regions bordering Ukraine, killing at least seven people and injuring dozens more.

  Footage from Reuters shows the aftermath after a road bridge came down in Bryansk, bringing several heavy trucks on to a moving passenger train late on Saturday, the regional governor said.
