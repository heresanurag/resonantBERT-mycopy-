title: All children injured in Southport attack out of hospital - BBC News
date: '2024-08-09'
section: Liverpool
url: http://www.bbc.co.uk/news/articles/c24p34l9v51o
content: |-
  The last remaining child injured in the Southport knife attack is released from hospital.

  All children injured in Southport attack out of hospital

  Floral tributes and balloons have been left near the scene of the attack

  All children injured in the knife attack in Southport have been discharged from hospital, police have said. Three girls were killed when a knifeman entered a Taylor Swift-themed holiday club on 29 July and began stabbing those inside. Ten people, including two adults, were also seriously injured and taken to hospitals across the North West. The last remaining injured girl, who was being treated at Royal Manchester Children’s Hospital, was released from hospital earlier and will now continue her recovery at home, Merseyside Police said.

  Bebe King, six, Elsie Dot Stancombe, seven, and Alice da Silva Aguiar, nine, were killed during the attack in a studio in Hart Street.

  Elsie Dot Stancombe, Alice da Silva Aguiar and Bebe King were killed in the Southport attack on 29 July

  Yoga teacher Leanne Lucas, 35, who had arranged the workshop, was severely wounded. Her cousin Chris Rimmer called her a "hero" and said she had "shielded two girls". Jonathan Hayes, who runs a business next door, was also stabbed in the leg after rushing to help. The family of the girl discharged earlier expressed their "heartfelt gratitude" to the hospital for its "unwavering support and extraordinary care they provided to our beloved daughter during this challenging time". They also gave their "deepest thanks" to the air ambulance team who airlifted her from the scene. "We know that their intervention saved her life," they said. The family also spoke out about the outbursts of violent disorder in Southport, Liverpool city centre and Walton in the days that followed the knife attack. More than 80 police officers were injured responding to the violence, and Merseyside Police Chief Constable Serena Kennedy said some officers had told her they feared they would not make it home to their families.

  Leanne Lucas, a yoga teacher who had arranged the dance workshop, was injured as she tried to shield the young girls from the attack

  They said they were "deeply saddened by the recent disorder and the attacks on our police force". "It is important to highlight that when the horrific events unfolded, our police officers were the first on the scene. "We are immensely grateful to the officers who stood by our daughter’s side, providing assistance and support until she was safely transported to the hospital." They said: "This has been an incredibly difficult time for our nation, especially for the families affected by these tragic events. "We appreciate the continued support and compassion from everyone during this challenging period." They added that while they were "relieved" their daughter was on the path to recovery, "our hearts go out to the families of Bebe, Alice, and Elsie during this immensely painful time". Axel Muganwa Rudakubana, 17, has been charged with three counts of murder and 10 counts of attempted murder. Rudakubana, from Banks, is next due to appear at Liverpool Crown Court on 25 October for a pre-trial preparation hearing.
