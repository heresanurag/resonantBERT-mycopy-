title: 'Louise Smith: Murder inquiry after body found in Havant - BBC News'
date: '2020-05-24'
section: Hampshire & Isle of Wight
url: http://www.bbc.co.uk/news/uk-england-hampshire-52788973
content: |-
  The body of 16-year-old Louise Smith was found in woodland in Havant on Thursday.

  Louise Smith was described as a "lovely girl with a heart of gold" by a friend

  The death of a teenager whose body was recovered from woodland is now being treated as murder.

  Louise Smith was found dead in Havant, Hampshire, on Thursday. The 16-year-old, who was from the Leigh Park area, had been reported missing on 8 May.

  Det Ch Supt Scott MacKechnie said: "This is now a murder investigation and our priority is to identify who is responsible.

  "Our thoughts are with Louise and her family at this really difficult time."

  CCTV footage showed Louise entering the Tesco Metro on Greywell Road shortly before 19:30 BST on the day before her disappearance.

  Her body was discovered nearby in Havant Thicket.

  CCTV footage shows Louise in a Tesco Metro the day before her disappearance

  There are reports she was seen at midday the following day, which was VE Day, in Somborne Drive.

  "Please focus your mind on this day," said Det Ch Supt Scott MacKechnie, appealing to the local community.

  "This was a historic day for the country and many of you may have been celebrating out on your front gardens."

  He asked people to save any dashcam and CCTV footage from 7 and 8 May for officers to review.

  He also appealed to dog walkers, drone operators, and cyclists with helmet cameras or Go Pros, who had been in Havant Thicket and Staunton Country Park on VE Day, to come forward.

  Louise was last seen in Somborne Drive on 8 May

  Louise had not been in touch with her friends or family since being seen in Somborne Drive.

  Hampshire Police forensic officers carried out searches of a flat in the street and blacked out the property's windows.

  Neighbours previously said it was believed Louise had been staying with a couple at the flat.

  A man and a woman, both aged 29, had previously been arrested on suspicion of kidnapping and released on bail.

  A police map indicates where Louise was staying, and the place where her body was found

  A post-mortem examination has taken place, but police have not released any of its findings yet.

  "The circumstances in which we found Louise's body would indicate this is a murder investigation," Det Ch Supt MacKechnie said.

  Forensic searches in Havant Thicket "will continue for some days", he added.

  Det Ch Supt Scott MacKechnie said the priority was finding Louise's murderer

  The teenager's body was discovered in Havant Thicket on Thursday

