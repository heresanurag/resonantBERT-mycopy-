  Salvatore Schillachi has died aged 59. The Italian icon spoke to BBC Sport about his life back in 2014.

  When 'Toto' Schillaci's stare was the star

  Italian icon Salvatore Schillaci, the top scorer at the 1990 World Cup, has died aged 59. Schillaci, better known as 'Toto', scored six goals to win the Golden Boot at the 1990 World Cup on home soil. In 2014, BBC Sport spoke to the Italian about the tournament and his life. This is a version of the interview published back then.

  Salvatore Schillaci ended the 1990 World Cup as the most popular man in Italy. But he started it being attacked by 3,000 angry fans who trapped him in his car, spat at the windows and kicked the bodywork. That was his welcome to the Azzurri's pre-World Cup training camp in Florence, when he unwittingly drove into a riot sparked by his club side Juventus signing Fiorentina's star striker Roberto Baggio. Schillaci, who had to be rescued by police, was the wrong man in the wrong place at the wrong time. Things could not have been more different later that summer, as he scored goal after opportunistic goal. That he was in the Italy squad at all was unlikely enough. The swarthy Sicilian striker, who never went to school and grew up in poverty on the streets of Palermo's slums, had started his career nine years previously earning £1.50 per goal for a local amateur side. True, he was now a £3m striker - the fee Juventus had paid Messina to sign him in 1989 - and had won the Uefa Cup and Coppa Italia, but he was still relatively unknown. He had just played his first season in Serie A at the age of 25 and his first international call-up was for the finals.

