  Schillaci had done it the hard way, but the man better known as 'Toto' - a shortened version of his Christian name - would make Italy's World Cup his own. Six goals gave him the Golden Boot as the tournament's top scorer, the Golden Ball as the best player and hero status, despite the hosts falling in the semi-finals. In 2014, Schillaci discussed the four weeks defined his life, the fall-out from his spectacular rise from nowhere to become one of the most famous footballers in the world, and what happened next. He was surprised and amused to learn a charismatic champion Australian thoroughbred racehorse was named after him. "Ha, that is new to me. I've heard about a lot of things but never the horse!" the 49-year-old told BBC Sport. "In that period I know a lot of people in Italy named their dog 'Toto' though." It was not the only way his name came into popular usage. "When people arrived in Italy around that time the first thing they would say to the border police was, 'Toto Schillaci'," he added. "And a lot of Italians have told me that when they went abroad, the first thing people said to them when they found out they were Italian was my name. That makes me very happy." His stint as an unofficial ambassador was brief. Injuries and a loss of form meant he scored only one more goal for his country after the World Cup, and he was discarded during an unsuccessful qualifying campaign for the 1992 European Championship. His legacy has lasted a lot longer.

  "There have been times when people have just burst into tears when they meet me," Schillaci said. "It is great that when I meet people I see a big smile on their faces, they are so happy to meet me. "I think success is hard won so it is nice when people still remember you. The tough thing is when people no longer appreciate you. So I don't mind the attention at all." The fact it was his only moment in the sun means Schillaci belongs to Italia '90 as much as Italia '90 belongs to him. And, wherever he is in the world, he knows the request that is coming as soon as he is recognised. "The eyes, the eyes. Every time I meet people they always want me to do the 'wild eyes'," Schillaci said with a laugh. "It was an instinctive gesture that has stuck in people's minds, and I have done it many, many times." Whether he was pleading for a penalty or greeting another goal, that dark Schillaci stare would become a familiar sight on his ever-expressive face, starting straight after he came on in Italy's first game against Austria.

  "I had got the last place in the squad so I did not even expect to be on the bench," Schillaci recalled. "I thought I would be watching from the stands. "So, late in the game, with the score 0-0, when the manager Azeglio Vicini called me over and told me to get warmed up because I was coming on, I could not believe it. I asked him, 'do you mean me?'. Sitting next to Schillaci was goalkeeper Stefano Tacconi, his Juventus team-mate, who told him to "go on and score a header like John Charles" and, emulating the Wales and Juve legend, he did just that with a bullet finish that, remarkably, was the first goal with his head all season. "When I scored, I just started running and did not stop until I got to the bench, where I hugged Tacconi because of what he had said to me," Schillaci explained. "It was an immense joy." Another substitute appearance followed in a narrow win over the United States, this time a fruitless one, before Vicini bowed to popular opinion and played Schillaci from the start, partnering him with Baggio against the Czech Republic. They both scored in a 2-0 win and Italy's World Cup was finally up and running. 'Italy in delirium with Schillaci-Baggio', read the headline on the front of Gazzetta Dello Sport, 'How beautiful you are'. Two more goals followed to sink Uruguay in the last 16 and Republic of Ireland in the quarter-finals, cementing Schillaci's hero status. He was seen as the saviour of the nation. Even Magic Nights - the official song of the World Cup - became his personal anthem.

