title: Moment truck explodes while driving through Chicago suburb - BBC News
date: '2025-05-27'
section: General
url: http://www.bbc.co.uk/news/videos/c4grjnd1dveo
content: |-
  The driver was taken to hospital with non-life threatening injuries.

  A man was injured and four homes were damaged after a small lorry exploded on Saturday morning in a Chicago suburb.

  The blast in Addison scattered debris, including clothing and furniture, across the street and in front of homes.

  One home was left temporarily uninhabitable after part of the lorry struck a load-bearing wall, authorities said.

  A leaking propane tank in the back of the lorry caused the explosion, local media reported.

  The driver was taken to hospital with non-life-threatening injuries.
