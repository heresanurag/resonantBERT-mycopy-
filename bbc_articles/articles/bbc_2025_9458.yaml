title: Anfield Cemetery flower pot vandalism branded 'disgusting' - BBC News
date: '2025-05-19'
section: General
url: http://www.bbc.co.uk/news/videos/cy4e81jmmk1o
content: |-
  Footage shows gravestone flowers "strewn about everywhere", with people calling it "disrespectful".

  Vandalism at a cemetery in Liverpool has been branded "disgusting" after video footage showing gravestone pots and flowers "strewn about everywhere" was widely shared online.

  The destruction was filmed and shared by local photographer Dave Wood who said about seven rows of gravestones were affected at the cemetery on Priory Rd.

  A Liverpool City Council representative said the authority was "saddened that anyone would deliberately cause damage to graves at our cemeteries as it is hugely upsetting for those affected".

  Mr Wood told his social media followers about the find, calling it "disgusting", while people commented describing it as "horrible, disrespectful and disgraceful".

  Merseyside Police confirmed officers had visited the site but said no damage to gravestones was found.

