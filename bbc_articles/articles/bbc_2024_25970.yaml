  Who has made Troy's Premier League team of the week?

  After every round of Premier League matches this season, BBC football pundit Troy Deeney will give you his team and manager of the Week. Here are this week's choices. Do you agree? Give us your thoughts using the comments form at the bottom of this page.

  Emi Martinez (Aston Villa): He made a big penalty save to deny Andreas Pereira, which proved the turning point in the match against Fulham. The save came when the game was at 1-1. The Argentine keeps coming up with big saves and big moments to keep Aston Villa rolling.

  Ashley Young (Everton): At 39 years of age, Young was brilliant at right-back against Ipswich. Not once did he get beaten one-on-one, he kept on running and running, playing the whole 95 minutes. A performance that was testament to the way that he looks after himself to keep playing at the top level at his age. Joel Veltman (Brighton): He just oozes class and calmness. When he was out injured a few weeks ago, Brighton struggled without him. He helped his side to another clean sheet away at Newcastle. Michael Keane (Everton): He has received a fair bit of criticism from Everton fans in the past few years. Away to Ipswich he was excellent: not one bad tackle, not once out of position, and what a goal. An unbelievable finish with his weaker left foot. Josko Gvardiol (Manchester City): Every time I watch this guy he just gets better and better. Six feet tall, solid defender, strong on both feet and loves tackling. He has started adding goals to his game, too. At Wolves he produced a wonderful right-footed effort into the top corner exactly when his side needed it.

  Mario Lemina (Wolves): He was excellent in a really spirited performance against champions Manchester City. The captain led by example, getting forward and making some great tackles in the heart of midfield. His effort and desire should serve the side well as they continue searching for that first win of the campaign. Curtis Jones (Liverpool): He won the penalty for Liverpool's first goal against Chelsea and followed it up by making a superb run and touching in the second-half winner. In Liverpool's biggest game of the season so far he was the shining light in the centre of midfield. Facundo Buonanotte (Leicester City): His side struggled in the first half at Southampton but Buonanotte stood out for his bravery. He gave the Foxes a much-needed spark and belief throughout and was pivotal in turning the game around.

  Mohamed Salah (Liverpool): He always scores in the big games for Liverpool and Salah once again showed great composure to get them off the mark from the penalty spot at Anfield, taking no notice of Nicolas Jackson's mind games. He was a menace for the Chelsea defence all game, and showed that he still has plenty of pace and the power in his play. Son Heung-min (Tottenham): In a game that could easily have got away from his side after West Ham took the lead, the Spurs captain delivered the final goal to ensure they claimed all three points. He was full of positive running throughout and got a good 65 minutes under the belt on his return from injury. Chris Wood (Nottingham Forest): The big man just keeps on scoring for Forest. It is good to see an 'old-fashioned number nine' making the difference for his side in the Premier League.

  Steve Cooper (Leicester City): I genuinely believe that had Leicester lost at Southampton their manager would have been sacked. Cooper made changes at half-time, like he did at Arsenal, and in a few other games, and his team brought themselves back into it. It was a massive performance from his side in the second half to come from 2-0 down to win - a monstrous task that they took on with broad shoulders. Simply excellent.

