id: bbc_2024_7139
title: Strong winds jolt Italy ski lift with passengers on board - BBC News
date: '2024-04-01'
section: General
url: http://www.bbc.co.uk/news/world-europe-68695712
content: |-
  Video shows chairlifts in Italy violently swinging, hit by winds of over 100km/h (62mph).

  Footage shows chairlifts at an Italian ski resort being violently shaken by winds of over 100km/h (62mph).

  At least one of the lifts had passengers on board, who all reached their destination safely, according to resort operator Cervino Spa.

  The facility in Breuil-Cervinia, at Italy's northern tip, had already been closed to the public due to bad weather conditions, and those on the lift were the last skiers making their way to the upper station.
