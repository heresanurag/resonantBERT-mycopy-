  HM Coastguard and lifeboat crews launched a search on the Firth of Clyde.

  Search called off after person goes overboard from Clyde ferry

  Coastguard teams have called off a search the Firth of Clyde after a person fell overboard from a ferry. HM coastguard crews, a helicopter, lifeboats and several private vessels joined the operation between Dunoon and Gourock on Sunday afternoon. The person was reported overboard from Western Ferries' Sound of Shuna at about 12:30. The search was called off at about 20:30. Western Ferries and CalMac suspended sailings on the route, with the CalMac vessel MV Ali Cat also assisting in the search.

  Police Scotland and the Scottish Ambulance Service were in attendance. Coastguard members searched on foot along the Gourock waterfront, while police officers were posted at the nearby ferry terminal.
