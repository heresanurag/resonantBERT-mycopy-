  A selection of readers' photographs on the theme of 'arches.'

  Your pictures on the theme of 'arches'

  We asked our readers to send in their best pictures on the theme of "arches". Here is a selection of the photographs we received from around the world.

  Kirsty Hiseman: "Driftwood arch on the beach at Lee-on-the-Solent."

  Jason Shrubb: "The viaduct at Chappel and Wakes Colne. Beneath each large arch lies a string of supporting arches. Nearby is the charming East Anglia Railway Museum."

  Carrol Brown: "Reflection of my hotel vanity lights and a plane landing at YVR (Vancouver International Airport)."

  Chris Bowe: "I took this on a frosty, but sunny day, in Inverclyde whilst out walking my dog, Max."

  Gordon Stewart: "Viaduct to carry water over to sugar mill in Andalusia, Spain. There are 25 arches visible with more hidden by vegetation."

  Erika Valkovicova: "Milky Way through Double Arch in Arches National Park, Utah. A friend was helping to paint the arch with a torch. This was definitely a bucket list shot."

  James Scott: "The sea arch of Stac a' Phris battles Atlantic waves on the Isle of Lewis in the Outer Hebrides, Scotland."

  Roger Smith: "The view of Mt Taranaki taken through the arches of Te Rewa Rewa Bridge, near New Plymouth, New Zealand."

  Jo Anderson: "On a family holiday to New York, watching the 4th July fireworks over the Hudson through the archway of a fellow spectator's arms."

  Ray Goti: "My study of reflections of the beautiful arches of the road bridge and railway viaduct over the River Tweed in Berwick."

  Mike Finn: "A particularly precarious arch of pebbles on the beach in Camaret-sur-Mer, Brittany."

  Tom Reynolds: "The area of Shoreditch in London is full of graffiti art that changes regularly by the constant flow of street artists. Is it art or is it vandalism? We can decide for ourselves."

  Erika Meister: "Gateway Arch, St Louis, Missouri, with remnants of clouds from distant Hurricane Helene rainbands."

  Alan Smith: "Captured my son 'using the Force' to summon a double-arched rainbow with his lightsabers."

  The next theme is "in the air"; the deadline for entries is 15 October 2024. The pictures will be published later that week and you will be able to find them, along with other galleries, on the In Pictures section of the BBC News website. You can upload your entries directly here or email them to yourpics@bbc.co.uk. Further details and themes are at: We set the theme, you take the pictures.
