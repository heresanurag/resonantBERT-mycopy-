  Mr Trump's criminal trial is uncharted territory, and there is no playbook for how members of a political party should handle their former president - and their current presumptive presidential nominee - sitting in the criminal dock. In the early days of the trial, few Republicans showed up. But after Senator Scott attended last week, a trickle has turned into a flood, only further blurring the lines between the political and the legal in the New York courthouse. If there was ever any doubt that Mr Trump's trial would turn into a political spectacle, that question has now been firmly answered - and the proceedings are far from over.
