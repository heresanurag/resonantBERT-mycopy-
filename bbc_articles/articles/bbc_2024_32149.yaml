title: 'Alana Armstrong: Murder arrest after mum rammed off e-bike - BBC News'
date: '2024-12-03'
section: Derby
url: http://www.bbc.co.uk/news/articles/cy8n8xdwjl6o
content: |-
  Alana Armstrong died when an e-bike was struck by a 4x4 vehicle in Pleasley, Derbyshire.

  Alana Armstrong, 25, was the mother of a six-year-old boy

  A man has been arrested on suspicion of murder after the death of a mother who was rammed off an e-bike in a hit-and-run crash. Alana Armstrong, 25, died at the scene when a 4x4 pursued and then struck the bike on which she was a passenger in Pleasley, Derbyshire, on the evening of 26 November. The rider - a man in his 20s - was taken to hospital where one of his legs had to be amputated below the knee after their bike was struck by the dark-coloured vehicle on a country lane. Derbyshire Police said a 23-year-old man was arrested in Mansfield, Nottinghamshire, in the early hours of Tuesday.

  Det Insp Steve Shaw said: "We are now nearly a week on from Alana's death and the response from the public has been nothing short of fantastic. "We have received information from dozens of people which has been absolutely crucial to bringing about this arrest. "We still want to hear from anyone who has not already come forward with information that can assist our investigation which you can do in confidence to the force, or completely anonymously to independent charity Crimestoppers."

  The crash happened in Batley Lane, Pleasley, on 26 November

  Officers previously said Ms Armstrong was riding on the back of one of two bikes that were pursued by the vehicle before it was rammed in Batley Lane at about 20:00 GMT. A £20,000 reward has been offered by Crimestoppers for key information about Ms Armstrong's death. A woman in her 30s, from the Pleasley area, was arrested and subsequently bailed, while a man and woman previously arrested in connection with the incident were later released without charge. Over the weekend, police said officers had found the offending vehicle, a blue Land Rover Discovery, and it has been forensically examined. The force said the rider remained in hospital following his surgery.

