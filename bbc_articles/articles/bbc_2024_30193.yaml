title: Nitazenes are spreading like wildfire, drug charity warns - BBC News
date: '2024-12-01'
section: UK
url: http://www.bbc.co.uk/news/articles/cdrjzzye7xpo
content: |-
  Grieving siblings in Essex are raising awareness of nitazines after their father's death.

  'Synthetic opioid was a death sentence for our dad'

  Alex and Keeley lay flowers on their dad's grave following his death in July 2023

  Siblings Alex and Keeley regularly visit their dad's grave in a peaceful Essex cemetery to remove weeds and lay new flowers. Although their father had been a drug and alcohol user for most of his adult life, they had both believed he was "on the up" with the help of a local treatment service. But on 2 July 2023, they got a devastating call to say he had died from an overdose after he was found unresponsive at home. They later learned the drugs taken included a new and highly toxic compound, one of several synthetic opioids called nitazenes, which are many times stronger than heroin. Their father is one of 179 people in England recorded as having died from nitazenes in the past year, with the highest number of deaths occurring in the East of England.

  Alex and Keeley say their dad was a "larger than life" character

  Their dad's heroin addiction had meant there were periods when Alex and Keeley, who asked for their real names and their father's name to be withheld, had little contact with him. Despite this, they both retain positive memories. "He was extremely funny and would make light of any bad situation" said Keeley. "He was one in a million. You won't find anybody else like him again." Alex speaks of his father's passion for Manchester United. "I remember as a kid watching the football together," he said. "He absolutely loved it."

  An investigation into the growing illicit trade in a new type of lethal drug called nitazenes.

  As adults they now recognise he had serious mental health problems and used drugs and alcohol as a means of escape. With the support of the Essex-based service Open Road, their father had started a journey to recovery, reducing his drugs and alcohol consumption. He had just turned 50, was in stable housing and, Alex thought, "things were starting to improve". Keeley saw her dad less than a fortnight before his death and Alex spoke to him by phone the previous day. "It's just weird to think we'll never get to speak to or see Dad again," Alex said, "or have a laugh and a joke with him." What has complicated their grief is that the drugs he took had been mixed with a nitazene, a synthetic opioid that can be lethal even in small doses. It is unlikely he would have known about this substance or the effect it would have. An inquest found the former electrician died from multiple drug misuse including synthetic opioids.

  Open Road, a drug and alcohol recovery service gives training on how to use naloxone kits, which can reverse the effects of an opioid overdose

  The siblings had never heard of nitazenes before his death. When they started to research it, all they could find was "things that happened in America, not in England". "Unfortunately because of the toxicity of the drugs, we [weren't] able to say a proper goodbye", said Keeley. She was told if she wanted to see him she would "have to wear a mask and gloves". "My dad was essentially treated as a crime scene," she said. It also meant his body could not be embalmed, as the family had wanted. The pair want to raise awareness of the risks these new substances pose. Keeley said her father "was handed a death sentence as soon as he was sold [the drugs]". "As soon as you're anywhere near that substance, it's lethal," she said. Alex would like to see drug testing kits more readily available to drug users. He said: "If [dad] knew there were some bad substances going around he would have been able to test and then he wouldn't have died as a result."

  This video can not be played To play this video you need to enable JavaScript in your browser. The number of deaths from super strength synthetic opioids are at an all-time high.

  Nitazenes are a type of high strength synthetic opioid - drugs which have a similar effect to heroin, but made in laboratories rather than from poppy seeds. Originally developed by the pharmaceutical industry in the 1950s as a painkiller, clinical trials were abandoned amid concerns about their harmful effects. These compounds are dangerous because they can be 50 to 100 times stronger than heroin, so drug users have no idea of the potency of what they are taking. The drugs supress the respiratory system, so people can die because they stop breathing, but the symptoms of an overdose can be reversed by taking an antidote called naloxone.
