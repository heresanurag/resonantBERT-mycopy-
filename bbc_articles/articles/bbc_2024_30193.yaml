  There were 179 deaths after taking nitazenes in England between June 2023 and 2024, according to data collected by the Office for Health Improvement and Disparities. Earlier this year, the UK government amended the Misuse of Drugs Act, external and brought 14 nitazenes under the highest band of drug classification, Class A. Guidance has been issued to councils, external on how to prepare for an increase in incidents linked to potent synthetic opioids. The National Crime Agency believes nitazenes entering the UK market come from illicit labs in China. A previous BBC investigation found such drugs were being advertised on the social media platform X and music streaming service SoundCloud.

  Claire Beacham says the drug and alcohol service she works for has seen a "rise in people overdosing and using contaminated drugs" in the past year

  Claire Beacham, regional manager for the Essex-based charity Open Road, has seen the rise of nitazenes first hand in recent months. She said: "They’ve spread like wildfire really because opioids aren’t getting into Europe anymore, so people are making their own which is where the synthetics come in." She said it was particularly "dangerous" and "frightening" because nitazenes were being mixed with a wide range of illicit drugs, not just heroin and other opioids. "People are taking recreational drugs or party drugs and its contaminated with nitazenes, and there’s different types, but some are 100% stronger than street heroin," she said. The charity gives out naloxone antidote kits and training on how to administer it to drug users, as well as their friends and family, night time venues and on the organisation's SOS buses. Claire and her team work with local health bodies, the police, housing services and anyone in direct contact with drug users to pass on intelligence they receive about contaminated batches of drugs. She said publicly available drug testing was needed to combat the problem, a move that would require "trust" and "breaking down barriers" to give drug users the confidence to come forward.

  Detective Superintendent Gary Biddle said police were "working relentlessly" to catch those dealing controlled substances

  "There's never been a more dangerous time to take drugs", said Det Supt Gary Biddle, of Essex Police. "We simply do not know what they contain." Synthetic opioids are having a "devastating effect" in the county, he said. Despite the successes of police operations - such as Raptor and Orochi - to target county lines drug gangs, Det Supt Biddle said the issue of synthetic opioids was "just not something we can arrest our way out of". Within three days of the death of Alex and Keeley's father, the contaminated batch involved was seized and four people involved in supplying him the drugs were arrested and charged. All four admitted their role in supplying the drugs, and are due to be sentenced on 31st January 2025.

