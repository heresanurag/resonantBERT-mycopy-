  BBC Sport's Gary Rose, at Leipzig's Red Bull Arena, said: "In his pre-match press conference on Thursday, France boss Deschamps spoke in positive light about Mbappe's recovery in recent days. "He said his captain had been feeling better and he certainly looked in good spirits when he emerged for training later in the evening. "Mbappe, initially without his mask, was laughing and joking with his team-mates, before putting it on as the squad went through their drills. "He adjusted it a couple of times as he got used to it, but in the 15 minutes open to the media there was little to indicate that he will be unlikely to take his place in the side against the Netherlands."

  Mbappe is playing in his fourth major tournament for France
