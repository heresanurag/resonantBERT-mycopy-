title: Prince Harry announces birth of baby boy - BBC News
date: '2019-05-06'
section: General
url: http://www.bbc.co.uk/news/uk-48177949
content: |-
  Prince Harry says he and Meghan are "absolutely thrilled" with the birth of their first child.

  The Duke of Sussex said he was "absolutely thrilled" with the birth of his first child – but is yet to announce a name.

  He said the Duchess of Sussex is also doing well.
