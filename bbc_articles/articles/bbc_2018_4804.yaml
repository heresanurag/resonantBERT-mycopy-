content: |-
  England's Nile Wilson secures the horizontal bar title for his third gold of the Commonwealth Games as team-mate Alice Kinsella wins the women's beam.

  This video can not be played To play this video you need to enable JavaScript in your browser.

  Nile Wilson secured the horizontal bar title to win his third gold of the 2018 Commonwealth Games as England team-mate Alice Kinsella won the women's beam. James Hall took silver behind Wilson while Kelly Simm won beam bronze. Latalia Bevan ensured Wales did not leave the gymnastics arena empty-handed with silver on the floor. Wilson also won parallel bars silver with Scotland's Frank Baines clinching bronze, while Courtney Tulloch and Dominick Cunningham won vault medals.

  This video can not be played To play this video you need to enable JavaScript in your browser. Alice Kinsella takes gold and Kelly Simm bronze for England on the individual beam final.

  A third gold marked 22-year-old Wilson's fifth medal of the Games, having won all-around and men's team gold as well as rings silver behind Tulloch, also 22. "I was struggling the last couple of days," said Wilson. "I am very, very exhausted right now. It has been amazing and a massive stepping stone for the future. It's been one of the greatest experiences I've ever had. "I'm just happy to get through the last two days and do amazing gymnastics once again. It's been an amazing week for Team England. We absolutely smashed it." Gold was 17-year-old Kinsella's third medal of the Games on Australia's Gold Coast following women's team silver and all-around bronze. She scored 13.700 to take top spot on the beam with Simm, 22, only missing out on silver by 0.033 points - edged out by the final competitor, Australia's Georgia-Rose Brown. "I'm still quite speechless. I don't really know what to say," said Kinsella. "I went out quite confident because I came second in qualifications. I thought if I go clean a medal was possible. But when I got the gold I didn't know what to do." England finished the artistic gymnastics competition top of the medal table with 16, including six golds.

  Alice Kinsella won her third medal of the Gold Coast Games with gold on the beam
