id: bbc_2018_10901
title: President Donald Trump gets unexpected laugh at United Nations - BBC News
date: '2018-09-26'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-45644975
content: |-
  The US president was speaking to the UN general assembly about the achievements of his administration.

  US President Donald Trump has made the delegates at the UN general assembly laugh - seemingly without attempting to do so.

  Mr Trump told the assembly he was sharing the "extraordinary progress" of his administration, two years after taking office.
