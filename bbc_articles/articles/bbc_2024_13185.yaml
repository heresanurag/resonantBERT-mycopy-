title: Willington house explosion captured on doorbell camera - BBC News
date: '2024-06-25'
section: General
url: http://www.bbc.co.uk/news/videos/c7222xvwq0yo
content: |-
  Footage from a doorbell camera captures the moment of a house explosion in County Durham.

  Emergency services were called to Coronation Terrace in Willington, at about 01:30 BST.

  Durham Police said nearby residents were told to leave their homes "as a precaution", with the affected property cordoned off.

  A man has been seriously hurt in the explosion and was taken to hospital for treatment.

  Police have advised people to avoid the area.

