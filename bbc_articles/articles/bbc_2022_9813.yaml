title: Nasa reveals new images of distant cosmos - BBC News
date: '2022-07-12'
section: Science & Environment
url: http://www.bbc.co.uk/news/live/science-environment-62137963
content: |-
  New pictures from the James Webb telescope reveal details of a "stellar nursery", a sphere of gas around a dying star and a "cosmic dance" between a group of galaxies.

  Nasa has been revealing breathtaking new images of the early universe, taken by the James Webb Space Telescope.

  Four more images have been released today after the first full-colour picture was unveiled yesterday.

  Nasa have said this picture which was released yesterday is the deepest, most detailed infrared view of the Universe to date Image caption: Nasa have said this picture which was released yesterday is the deepest, most detailed infrared view of the Universe to date

  The second picture unveiled by Nasa identifies water vapour on a giant planet Image caption: The second picture unveiled by Nasa identifies water vapour on a giant planet

  Next up was the Southern Ring, or “Eight-Burst” nebula - a giant expanding sphere of gas and dust that’s been lit up by a dying star in the centre Image caption: Next up was the Southern Ring, or “Eight-Burst” nebula - a giant expanding sphere of gas and dust that’s been lit up by a dying star in the centre

  About 290 million light-years away, Stephan’s Quintet is located in the constellation Pegasus Image caption: About 290 million light-years away, Stephan’s Quintet is located in the constellation Pegasus

  The final picture shows the Carina Nebula, which is one of the largest and brightest nebulae in the sky Image caption: The final picture shows the Carina Nebula, which is one of the largest and brightest nebulae in the sky
