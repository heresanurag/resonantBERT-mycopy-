title: 'Keir Mather: The youngest MP starts work - BBC News'
date: '2023-09-07'
section: General
url: http://www.bbc.co.uk/news/uk-politics-66736440
content: |-
  Keir Mather, 25 years old, is the youngest member of parliament after being sworn in on Monday.

  The youngest MP in the House of Commons started work this week. Keir Mather is 25 and is the new MP for Selby and Ainsty in North Yorkshire.

  He was sworn in on Monday and given the keys to his new office in Parliament.

  The BBC caught up with him to see how he was settling in.
