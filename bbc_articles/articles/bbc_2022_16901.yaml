id: bbc_2022_16901
title: Spectacular scenes as Hawaii volcano erupts - BBC News
date: '2022-12-01'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-63814130
content: |-
  Aerial footage shows Mauna Loa, the world's largest active volcano, spewing lava into the air.

  Lava can be seen spewing into the air and flowing across the volcano's surface.

  It started erupting on Sunday, for the first time since 1984.
