title: 'The debate: We need new homes, where should they go? - BBC News'
date: '2024-09-19'
section: BBC InDepth
url: http://www.bbc.co.uk/news/articles/cdrjd04466go
content: |-
  BBC Home Editor Mark Easton hosts a debate with three experts asking whether we should build on the green belt.

  England has a housing crisis. Very few disagree. There are simply not enough safe, affordable, decent homes where people want to live.

  Homelessness is at record levels with 150,000 children living in totally unsuitable temporary accommodation. Millions cannot afford to buy their first home.

  The new Labour government believes the key is to build more houses. It has promised an extra 1.5 million in England across the five-year Parliament. But where will they all go?

  To discuss this question and the implications of housebuilding on a scale not seen for 50 years, I hosted a debate between three housing experts on WhatsApp to unpick what Britain should do about housing. What follows is an edited version of their conversation.
