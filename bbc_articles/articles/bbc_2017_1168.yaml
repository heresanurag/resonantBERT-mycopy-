title: McGuinness - 'No return to status quo' - BBC News
date: '2017-01-09'
section: General
url: http://www.bbc.co.uk/news/uk-northern-ireland-38564067
content: |-
  Martin McGuinness says there will be "no return to the status quo" as he quits as Northern Ireland's deputy first minister over the handling of a botched heating scheme.

  Martin McGuinness has resigned as Northern Ireland's deputy first minister in protest against the handling of a botched heating scheme that could cost taxpayers £490m.

  He spoke to reporters at Stormont Castle on Monday afternoon.
