title: 'Boris Johnson: ''I want to find a Brexit deal'' - BBC News'
date: '2019-09-10'
section: General
url: http://www.bbc.co.uk/news/uk-northern-ireland-politics-49634566
content: |-
  Boris Johnson told Leo Varadkar a no-deal Brexit would be "a failure of statecraft".

  Prime Minister Boris Johnson says he wants to find a Brexit deal.

  He was speaking ahead of talks with Irish Prime Minister Leo Varadkar in Dublin.
