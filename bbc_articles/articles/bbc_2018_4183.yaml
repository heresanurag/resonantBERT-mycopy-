title: Officer treated for overdose after inhaling unknown powder - BBC News
date: '2018-04-14'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-43635082
content: |-
  An Ohio officer was treated for an overdose after he inhaled an unknown powder during an arrest.

  A drug-related arrest turned into a medical emergency when a Columbus, Ohio police officer inhaled an unknown powder while collecting evidence. He was treated with the overdose reversal drug Narcan after police suspected the powder to be fentanyl.
