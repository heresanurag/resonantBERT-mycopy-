title: 'Coronavirus lockdown: Gyms to reopen from July 25 - BBC News'
date: '2020-07-09'
section: General
url: http://www.bbc.co.uk/news/uk-53356009
content: |-
  The culture secretary announces that gyms will reopen later in July with extra safety measures.

  Speaking at a special Coronavirus news conference in Downing Street Oliver Dowden announced gyms will reopen from 25 July. Safety measures to include timed entry, extra cleaning and smaller class sizes.
