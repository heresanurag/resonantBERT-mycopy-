title: Ellie Scotney claims second super-bantamweight belt, Rhiannon Dixon beats Karen
  Elizabeth Carabajal - BBC Sport
date: '2024-04-13'
section: Boxing
url: http://www.bbc.co.uk/sport/boxing/68808375
content: |-
  Ellie Scotney claims her second world super-bantamweight title as she overpowers Segolene Lefebvre, after fellow Briton Rhiannon Dixon completes her journey from pharmacist to world champion.

  Ellie Scotney (left) fought Segolene Lefebvre in Manchester with the IBF and WBO super-bantamweight titles on the line

  Ellie Scotney claimed her second world super-bantamweight title as she overpowered Segolene Lefebvre on a great night for British women's boxing at Manchester Arena. Scotney added the WBO belt to her IBF title as she dominated her French opponent over 10 rounds, winning on the judges' scorecards 99-91, 97-93, 96-94. The London-born fighter has now won all nine of her professional bouts, with Lefebvre suffering her first loss in 19 fights. Earlier, Rhiannon Dixon completed her journey from pharmacist to world champion as she beat Karen Elizabeth Carabajal to claim the WBO lightweight belt. In the headline event, Zelfa Barrett delighted his home Manchester crowd by stopping Jordan Gill to claim the WBA international super-featherweight title. Barrett dropped Gill to the canvas twice in round 10 with body shots, before a succession of blows to the head led to the referee waving off the fight.

  Scotney, despite being significantly shorter than her opponent, weighed in three pounds heavier and made that count with punches more powerful than those of Lefebvre. She also had greater stamina, the French fighter tiring from round three onwards - although she stuck to her task and made the fight closer on the scorecards than it appeared in the ring. Scotney started to land heavier blows as the contest wore on - a huge body shot in the fifth and a stunning right in the sixth. Lefebvre attempted to find a haymaker, knowing she was behind, but for every shot landed was being hit by three. She also earned a warning in round eight for a naughty jab at Scotney after the referee had called a pause. Nothing could stop the rapid-fire Scotney however, with the 26-year-old once again proving why she is one of the toughest contenders in women's boxing. She has still not yet won a professional bout by knockout, with her world-title-winning fight against Cherneka Johnson and the first defence against Laura Soledad Griffa both going the distance - and the marathon woman was victorious over the distance again to become unified champion.

