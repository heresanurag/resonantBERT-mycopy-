title: JD Vance heads to Rome - could he meet Pope Francis? - BBC News
date: '2025-04-18'
section: World
url: http://www.bbc.co.uk/news/articles/cdxn21l37d7o
content: |-
  The US vice-president will meet Italy's prime minister but an audience at the Vatican could also happen, the BBC learns.

  Could JD Vance meet the most famous Catholic of them all?

  JD Vance converted to Catholicism in 2019 at the age of 35.

  When US Vice-President JD Vance comes to Rome on Friday, he is set to meet Italy's prime minister and the Vatican secretary of state. But one of his main objectives is not on the official schedule - to be seen alongside Pope Francis. According to four sources familiar with the matter, the vice-president, a devout Roman Catholic, is hoping for at least a brief encounter with the 88-year-old pontiff, which would become the focal point of his visit. Such a moment would carry powerful symbolic weight, politically and personally, particularly over Easter, the most important celebration in the Catholic calendar, said a source familiar with his thinking. It could also signal a thaw in relations between the Vatican and Washington after months of tension over issues such as moral leadership and migration, with the Pope having previously said that mass deportations of people fleeing poverty or persecution damaged "the dignity of many men and women, and of entire families".

  "Pope Francis and JD Vance are today's most prominent Catholics, one at the head of the Church and the Catholic hierarchy, the other a layman who is now vice-president of the United States," said Father Roberto Regoli, professor of history of the Church at the Pontifical Gregorian University. "A meeting between the leaders of two global powers of this calibre would have immense symbolic significance." The White House and the vice-president's office did not respond to questions from the BBC about Vance's trip, and the Vatican has not confirmed any formal or informal meeting with Vance. Pope Francis has been in poor health following a five-week hospital stay for double pneumonia. Since returning to the Vatican a month ago, he has cancelled most of his official appointments.
  • None How JD Vance sees the world - and why that matters However, as his condition improves, Pope Francis has begun making surprise appearances - last week, he briefly met King Charles III and Queen Camilla during their official visit to Italy. "A photo with Pope Francis would be a major win for JD Vance, and it would also reflect Pope Francis's inclusive approach - his willingness to welcome and meet anyone, even those with differing visions or values," said David Gibson, director of the Center on Religion and Culture at Fordham University, the Jesuit university of New York. But if there is no encounter, he adds, there will inevitably be speculation about a snub or the Pope's health.

