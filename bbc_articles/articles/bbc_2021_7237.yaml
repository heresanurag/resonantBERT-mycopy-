  A selection of your pictures of Scotland sent in between 11 and 18 June.

  It's a bat, man: "My daughter Kelly and I were on a stake-out to see if we could see any activity of the otters that are frequently in the waters below Skipper's Bridge in Langholm", says Nichola Paul. "So, you can imagine my surprise when viewing the pictures to find that I had actually caught this bat mid-flight".
