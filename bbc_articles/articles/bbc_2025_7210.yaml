title: Santorini volcano probed for clues about next big explosion - BBC News
date: '2025-04-22'
section: Europe
url: http://www.bbc.co.uk/news/articles/cm25lz56rezo
content: |-
  Scientists are investigating for the first time how dangerous the island's next big one could be.

  A huge eruption in 1600 BCE left the crater rim and central depression that formed Santorini

  Perched on top of Santorini's sheer cliffs is a world-famous tourist industry worth millions. Underneath is the fizzing risk of an almighty explosion. Now scientists are investigating for the first time how dangerous the next big one could be. BBC News spent a day on board the British royal research ship the Discovery as they searched for clues.

  The RRS Discovery is a world-class scientific research vessel based in Southampton

  Just weeks before, nearly half of Santorini's 11,000 residents had fled for safety when the island shut down in a series of earthquakes. It was a harsh reminder that under the idyllic white villages dotted with gyros restaurants, hot tubs in AirBnB rentals, and vineyards on rich volcanic soil, two tectonic plates grind in the Earth's crust. Prof Isobel Yeo, an expert on highly dangerous submarine volcanoes with Britain's National Oceanography Centre, is leading the mission. Around two-thirds of the world's volcanoes are underwater, but they are hardly monitored. "It's a bit like 'out of sight, out of mind' in terms of understanding their danger, compared to more famous ones like Vesuvius," she says on deck, as we watch two engineers winching a robot the size of a car off the ship's side. This work, coming so soon after the earthquakes, will help scientists understand what type of seismic unrest could indicate a volcanic eruption is imminent. Santorini's last eruption was in 1950, but as recently as 2012 there was a "period of unrest", says Isobel. Magma flowed into the volcanoes' chambers and the islands "swelled up".

  Isobel Yeo says the work will forecast hazards from underwater volcanoes globally

  "Underwater volcanoes are capable of really big, really destructive eruptions," she says. "We are lulled into a sense of false security if you're used to small eruptions and the volcano acting safe. You assume the next will be the same - but it might not," she says. The Hunga Tunga eruption in 2022 in the Pacific produced the largest underwater explosion ever recorded, and created a tsunami in the Atlantic with shockwaves felt in the UK. Some islands in Tonga, near the volcano, were so devastated that their people have never returned. Beneath our feet on the ship, 300m (984ft) down, are bubbling hot vents. These cracks in the Earth turn the seafloor into a bright orange world of protruding rocks and gas clouds.

