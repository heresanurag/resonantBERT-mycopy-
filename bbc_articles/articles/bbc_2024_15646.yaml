  "Who would live in a house like this?" - Sutton Coldfield Police Station includes holding cells and a custody suite

  A police station is among the latest "prime opportunities" to hit property listings website Rightmove, and with holding cells and a custody suite boasted in the specs, incarceration seems to have replaced location as a desirable feature. With a reception area also included at what one may consider a unique doer-upper, the scale of Sutton Coldfield Police Station is hardly bijou - 39,737 sq ft (3,692 sq m). The Lichfield Road building has gone on the market after being deemed "too large for the needs of front line policing". According to the office of the West Midlands Police and Crime Commissioner (PCC), police would remain in the town, locating to a more "appropriate, proportionate and fit-for-purpose base".

  The four-storey property, on Lichfield Road, also includes offices and a reception area

  A PCC spokesperson said: "We want to reassure residents that the Public Contact Office, neighbourhood and response officers will relocate to their new base, before the current site is sold." The decision to dispose of the station was taken in March 2018, they explained, saying the move would reduce operating costs. The property is one of a number of police stations across the region set to close as part of a number of changes announced last year. Listed as a "prime development opportunity", the building also has locker rooms, storage facilities and parking spaces. No price is quoted, however, with interested parties advised the building is listed on a POA basis.
