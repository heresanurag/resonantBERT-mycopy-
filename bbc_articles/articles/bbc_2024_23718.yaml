content: |-
  Great Britain's Jonnie Peacock fades in the final 50 metres to finish fifth in the men's T64 100m final in Paris.

  Jonnie Peacock won T44 gold at London 2012 and in Rio four years later

  Great Britain's Jonnie Peacock said "2017 Jonnie is the guy he needs to find" to compete with the world's best after finishing fifth in the men's T64 100m final in Paris. The two-time Paralympic champion made a fine start out of the blocks, but was overtaken in the latter stages of the race and eventually crossed the line in 10.91 seconds. Costa Rica's Sherman Guity took gold with a Paralympic record time of 10.65. Italian Maxcel Amo Manu finished second, with Germany's Felix Streng taking the bronze medal. "It's frustrating but 2017 Jonnie would have wiped the floor with all of them," Peacock told Channel 4. "I ran 10.64 slowing down [at the 2017 World Para Athletics Championships in London] and that's what a lot of people seem to have forgotten. "They count me out because they think these guys are fast, and they are, they are fast. But 2017 Jonnie was very fast and that's the guy I need to find." Peacock, 31, won T44 gold at London 2012 and in Rio four years later, before taking bronze in the T64 event in Tokyo three years ago. Recently he has been affected by injures and issues with his technique, finishing fifth in last year's World Championships. There was also disappointment for David Weir, who finished sixth in his heat and failed to qualify for the men's T54 1500m final, but fellow Briton Nathan Maguire will be in Tuesday's final after ending third in his heat.

  Jonnie Peacock (right) finished 0.26secs behind winner Sherman Guity (not pictured)

  Speaking after his race, Peacock asked for the help of World Athletics president Lord Coe to make para-athletics more "visible" as he called for his event to be included on the programme of future Diamond League meets. World Athletics are a separate entity to World Para Athletics, while the schedules for Diamond League meetings are down to individual operators. "This is a race that I think people want to see," said Peacock. "And this is a race that I think is exciting. It's a race that chops and changes. "Seb Coe, I need you, we need you. And we need you to put us in the actual Diamond Leagues. Not a cheerleader event, not five minutes before the cameras turn on, but when the cameras are on. We need to be visible. "Paralympics, we need to stop letting it die. We've let it die over a few years. So much of the media at the moment would argue about visibility representation. "Well, then, where are we? Where are we in the Diamond Leagues? I've been calling on this for how many years now? 12 years? Not once in 12 years have we been in the programme. Why? "I want to go into the Diamond Leagues. And I think it's about time."
