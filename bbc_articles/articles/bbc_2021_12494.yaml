title: 'Covid-19: PM sorry for losses suffered by UK families, says Tory chairman
  - BBC News'
date: '2021-10-13'
section: UK
url: http://www.bbc.co.uk/news/live/uk-58886986
content: |-
  Oliver Dowden says the PM is sorry to bereaved families, after a report criticised the UK's Covid handling.

  The World Health Organization (WHO) has put forward a list of 26 experts to advise on high-threat pathogens that could jump from animals to humans, sparking the next pandemic.

  Several of those named served on the WHO mission to Wuhan, China, to try to find out how coronavirus started.

  The WHO made a public call for experts to join the new Scientific Advisory Group for the Origins of Novel Pathogens (Sago) last August. There will now be a two-week period of public consultation before the members are confirmed.

  Dr Tedros Adhanom Ghebreyesus, the WHO director general, says that while Covid-19 is "the latest such virus, it will not be the last”.

  “Understanding where new pathogens come from is essential for preventing future outbreaks with epidemic and pandemic potential, and requires a broad range of expertise," he adds.

  Selected from over 700 applications, the 26 proposed Sago members have expertise in areas ranging from epidemiology to biosecurity and public health.

  They reflect “geographic and gender diversity”, says the WHO.
