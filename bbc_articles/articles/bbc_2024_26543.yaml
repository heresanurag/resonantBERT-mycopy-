title: Laura Kuenssberg 'embarrassed' by Boris Johnson email error - BBC News
date: '2024-10-03'
section: Culture
url: http://www.bbc.co.uk/news/articles/cpdq2944d2no
content: |-
  The presenter's scheduled interview with Johnson was pulled after she accidentally sent him her notes.

  BBC presenter Laura Kuenssberg's scheduled interview with Boris Johnson has been cancelled, after she accidentally sent the former prime minister her briefing notes. Boris Johnson: The Laura Kuenssberg Interview was due to be broadcast on Thursday evening on BBC One. However, the BBC's former political editor said, external it was "not right for the interview to go ahead" after sharing notes with him which had been intended for her colleagues. Kuenssberg described it as "embarrassing and disappointing", but said "red faces aside, honesty is the best policy".

  The BBC said it had agreed with Johnson's team that cancelling the interview was "the best way forward". Johnson is currently taking part in media interviews to promote his new memoir, which has also been recently serialised in a newspaper.

  Boris Johnson (pictured in 2022) is currently doing interviews to promote his memoir

  Presenters usually work with a team of researchers to prepare a brief ahead of a major interview. The process usually includes gathering biographical material about the subject, highlighting controversies, and coming up with suggested lines of questioning. In a statement posted on X late on Wednesday, Kuenssberg explained: "While prepping to interview Boris Johnson tomorrow, by mistake I sent our briefing notes to him in a message meant for my team. "That obviously means it’s not right for the interview to go ahead." She continued: "It’s very frustrating, and there’s no point pretending it’s anything other than embarrassing and disappointing, as there are plenty of important questions to be asked. "But red faces aside, honesty is the best policy. See you on Sunday," she added, referring to her regular Sunday morning politics programme which will go ahead as normal.

  In a statement, the BBC said:, external "[Thursday's] interview with Boris Johnson won’t be going ahead. "As Laura has explained, interview briefing notes meant for colleagues were inadvertently shared with him. This makes an interview tomorrow untenable. "Under the circumstances, both the BBC and Mr Johnson’s team have agreed this is the best way forward." Kuenssberg had said on her programme at the weekend that her interview with Johnson would be his "first on his time in office since his dramatic departure from Downing Street". The BBC said it had moved EastEnders back to its usual slot of 19:30 BST in Thursday's schedule in place of the interview. Johnson is still due to be interviewed by another BBC journalist, Matt Chorley, on 5 Live on Tuesday.
