  Dame Christine's recommendations include staff training for Ofsted's top officials and board members to improve communications to staff and schools, in crisis situations, and for Ofsted's board to promote an improved culture of openness. She also said new training, for inspectors to spot when school staff are distressed or anxious, should be expanded, and "very specifically designed to reflect the unique power dynamic of inspection". Ofsted said it would build on inspectors' mental health awareness with a new Ofsted Academy. Ofsted published research on Tuesday suggesting strong support for school inspections from parents, many of whom use them to inform decisions about their children's education - but there was mixed support for single-word judgements. Sir Martyn said Ofsted had done "much great work", but that his consultation had uncovered "much criticism". Speaking to BBC Breakfast, he added: “We don’t want a change for change’s sake... but we can make a better framework, we can give more information to parents, and we can – really importantly – reduce that pressure out there to the hardworking people in schools, colleges and early years providers everywhere.”
  • None From this month - pausing the publication of inspection reports when safeguarding concerns are identified in an otherwise high-performing school, until inspectors revisit the school within three months. This is to give the school a chance to fix the issues without intervention from the Department for Education
  • None Under consultation - bringing in a new inspection framework, focused on pupil outcomes, but with various measures to reduce anxiety for staff being inspected
  • None Under consultation - increasing focus on how providers are meeting the needs of vulnerable or disadvantaged children, with a specific focus on "inclusion" in report cards
  • None Work in progress - Liaising with government to introduce new annual safeguarding, attendance and off-rolling reviews for schools.
  • None Trying out this term - reducing pressure on staff and improving consistency. Inspectors will tell schools about inspections on Mondays, and inspect on Tuesdays and Wednesdays. Education Secretary Bridget Phillipson told BBC News that Dame Christine's review was "deeply concerning", and that she was "determined" to drive change alongside Sir Martyn.

  Pepe Di'Iasio, general secretary of the Association of School and College Leaders (ASCL), welcomed the actions, saying there had been a “sea change” in Ofsted’s openness since Sir Martyn took on the role in January. “Head teachers up and down the country will welcome... the idea that we’re going to see a better future,” he added. The BBC has put several of the report’s findings to Amanda Spielman, who was chief inspector when Mrs Perry died. Ms Spielman declined to comment. Dame Christine welcomed Ofsted's pledged actions, but said there was “some cynicism” about whether they would lead to "fundamental change". Prof Waters told BBC Breakfast the "damning" review "does not fill me with confidence that reform of Ofsted's going to be easy or quick". "Martyn Oliver has a massive, possibly impossible task ahead of him, to put that culture right." The alterations announced by Ofsted only affect schools in England. Inspections in Wales are carried out by Estyn, external, in Scotland by Education Scotland, external, and in Northern Ireland by the Education and Training Inspectorate., external
