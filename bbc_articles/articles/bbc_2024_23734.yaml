title: Ofsted defensive and complacent after Ruth Perry's death - review - BBC News
date: '2024-09-03'
section: Family & Education
url: http://www.bbc.co.uk/news/articles/cy0rd785z99o
content: |-
  One of many criticisms is that the regulator did not tell all its staff what had happened to Ruth Perry.

  Primary school head teacher Ruth Perry took her own life after an Ofsted inspection which downgraded her school

  Ofsted's response to a head teacher's suicide following a school inspection was "defensive and complacent", a major review has found. Dame Christine Gilbert's independent review was commissioned after an inquest last year concluded that a critical Ofsted inspection "contributed" to Ruth Perry's death. Ofsted chief inspector, Sir Martyn Oliver, accepted most of the review's findings and said it shone a light on "the power dynamic between the inspector and those being inspected". The findings come after the government scrapped the practice of inspectors issuing an overall grade for a school - either Outstanding, Good, Requires Improvement or Inadequate.

  Ofsted inspects and reports on anywhere that provides education for young people in England, including schools, nurseries and childminders. Mrs Perry took her own life in January 2023 after learning her school, Caversham Primary in Berkshire, was set to be deemed Inadequate. Despite senior Ofsted staff being told about her death that month, many staff and board members said a BBC News report two months later was the first time they had heard about it. Dame Christine's damning review said Ofsted did not attempt to contact the school or Mrs Perry's family in the following months, and could have shown empathy by seeking to speak to them straight away.
  • None What is Ofsted and and how will the new school ratings work?

  Ofsted acted with a "lack of awareness" when it did release a statement in March that "seemed to imply that Ofsted had little to learn from the tragedy", the review said - adding that inspectors had been given the impression that the regulator had "done nothing wrong". "Ofsted’s initial response appears defensive and complacent rather than reflective and self-critical," Dame Christine wrote, adding that inspectors and schools had described Ofsted as "unwilling to respond constructively to criticism". She said Ofsted's own Big Listen consultation, with thousands of teachers, parents and children, found:
  • None Ofsted’s culture creates feelings of stress, anxiety and apprehension among leaders and staff
  • None Schools think inspectors should give more advice on how they can improve, instead of just descriptive reports
  • None They want better collaboration from Ofsted, and consistency between inspections Mrs Perry's sister, Prof Julia Waters, told BBC News that Dame Christine's review was "evidence of a completely dysfunctional organisation". "Ofsted saw the death of my sister as a threat to their reputation, as a problem that had to be dealt with and they absolutely refused, at least externally, to admit that they could have done anything wrong. "It is utterly hypocritical that they hold schools to such high levels of accountability when refusing to be held accountable themselves."

