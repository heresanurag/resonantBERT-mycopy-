content: |-
  The stubborn figure means interest rates are likely to rise again - an announcement is due on Thursday.

  Getting inflation down could mean cranking up interest rates

  Speaking to MPs, from ministers to backbenchers and across all the parties, and inflation is the big topic. Back to the present, if you like, after 10 days of Westminster being consumed by looking at Boris Johnson’s conduct in the rear view mirror. The government is in a bind: it is desperate to get inflation down, and yet it is stuck. It is desperate to be able to point to a sense of people feeling better off. But getting inflation down will make many people feel worse off - because the Bank of England cranking up interest rates is a key way to do it. Those timeless trade offs of economics and politics never go away. What is different this time — courtesy of the government’s colossal interventions in the last few years around Covid and soaring energy bills due to the war in Ukraine — is there is arguably a greater expectation ministers can or should intervene again. This expectation, or hope, extends to some Tory MPs. The former party chairman Sir Jake Berry has called, for instance, for the return of Mortgage Interest Tax Relief at Source - a Conservative policy in the 1980s and 90s. The Chancellor has rejected this idea. Privately, some ministers and Conservative MPs are exasperated, arguing that not only does there have to be a limit to what government can do and can afford, but a large scale intervention would make inflation worse.
