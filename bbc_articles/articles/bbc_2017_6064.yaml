  Rudd: We must ensure a tragedy like Grenfell never happens again

  Home Secretary Amber Rudd has urged people "not to rush to judgement" over the Grenfell Tower disaster. Hailing the UK for having "some of the most rigorous fire safety regulations in the world", she stressed: "We need to establish how such a tragedy could have occurred in a major capital in the early 21st century." Writing in the Evening Standard , she said: "Of course we need to know more about how this tragedy could have happened and there will be a full investigation. "But at this early stage, with firefighters still picking their way through the debris, I would urge everyone not to rush to judgement. If there are lessons to be learned we will learn them." She praised the bravery of the emergency services and conceded "these are challenging times" for Londoners, with "heartbreaking images of suffering" filling TV screens. "My heart goes out to every person affected by this tragedy..." she said. "We have to dig deep inside ourselves in order to keep going. But even in its darkest days, the spirit of London prevails." Expressing her "deepest condolences" to those suffering "unimaginable grief", she writes that "history has shown us how strong London is". "The shadow of this tragedy will stay with us forever — we will stay strong for everyone affected and not be afraid to ask vital questions to ensure this can never happen again."
