title: Sister vows to keep searching for Columba and other Disappeared - BBC News
date: '2024-11-03'
section: Northern Ireland
url: http://www.bbc.co.uk/news/articles/clydwn5kle3o
content: |-
  Sister vows to keep searching for Columba and other Disappeared

  The sister of a man murdered and secretly buried by the IRA almost 50 years ago has vowed to keep searching for him and others like him. Dympna Kerr's brother Columba McVeigh was one of 17 murder victims known as The Disappeared. Four of those listed by the commission that was set up to find them remain missing. Mrs Kerr and other family members took part in an annual walk at Stormont to remember them.

  Dympna Kerr (holding wreath), the sister of Disappeared victim Columba McVeigh was joined at Stormont by other families of the Disappeared on Saturday

  "We will come here every year until we've found them," she told BBC News NI. "It mightn't be me that'll be coming. I might run out of time. But we have kids who will follow in our footsteps, and there will be families coming here until every last member on that list has been found." Other victims still to be located are Joe Lynskey, Seamus McGuire and Army officer Captain Robert Nairac. A search for the remains of Captain Nairac at Faughart near Dundalk in the Republic of Ireland ended last month without success. Mr McVeigh, from Donaghmore, in County Tyrone, was 19 years old when he disappeared in 1975.

  Family members took part in an annual walk at Stormont to remember their loved ones known as the Disappeared on Saturday

  Multiple searches have been carried out over the years, concentrating on Bragan Bog near Emyvale in County Monaghan. The searches have been undertaken by the Independent Commission for the Location of Victims' Remains (ICLVR). Mrs Kerr appealed for anyone with information on the whereabouts of her brother and the others to come forward. "Somebody out there has that information," she said. "They might think it's irrelevant or somebody else will tell them. Anybody, and I mean anybody with the smallest bit of information, it's not for them to decide if it's relevant or not - get it to the commission. "Let the commission make that decision. Because I'm telling you now, if the commission get the information, they'll find them."

  A wreath is laid at the steps of Stormont to remember The Disappeared

  Family members said a prayer and walked to the steps of parliament buildings where they lay a black wreath with five white lilies. Four of the lilies represented each of the four remaining of The Disappeared, and one was for missing Lisa Dorrian. It's been nearly 20 years since she was last seen at a party at a caravan park in Ballyhalbert, County Down. Police believe she was murdered. No-one has ever been convicted and despite many land and sea searches her body has never been found.

  Her father John Dorrian told BBC News NI that joining other families brought some comfort. "Coming here to this walk, it helps us to meet other people who are in the same circumstances and we try to support each other," he said. "We feel as a family sorry for the people who also have got people missing because we know how they feel. I know these people have been missing since the 70s. It must be dreadful."

  No-one has ever been convicted for the disappearance of Lisa Dorrian

  Anne Morgan, whose brother Seamus Ruddy was one of The Disappeared and whose remains were recovered in 2017, also attended the walk. "We have found that being together has helped us to be heard," she said. The walk is organised by Wave Trauma Centre, which has supported families of The Disappeared since the mid-1990s. The organisation's chief executive officer Dr Sandra Peake said: "One of the evil aims of those behind disappearing people was to literally remove every trace of them from the face of the earth as if they never existed. "Until all The Disappeared are home the families will not rest nor will they be silent."
