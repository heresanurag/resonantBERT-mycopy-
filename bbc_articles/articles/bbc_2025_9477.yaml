title: Boy waiting for life-changing drug meets Hibs football heroes - BBC News
date: '2025-05-19'
section: General
url: http://www.bbc.co.uk/news/videos/c74nzy3zkmpo
content: |-
  Eight-year-old Sam is battling to get access to a drug that could help keep him walking for longer.

  A boy with a muscle-wasting disease fulfilled his dream by leading his footballing heroes onto the pitch at Hibernian FC's Easter Road stadium.

  Superfan Sam Millar, from Edinburgh, has Duchennes' Muscular Dystrophy and is battling to get access to a drug that could help keep him walking for longer.

  NHS Lothian, which provides the drug, says the extra clinical care and monitoring required for patients to receive the drug safely has not been funded.
