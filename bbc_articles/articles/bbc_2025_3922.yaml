title: The young musician aiming to preserve a Black Isle dialect - BBC News
date: '2025-03-16'
section: General
url: http://www.bbc.co.uk/news/videos/cg5dn7101nlo
content: |-
  Musician Grace Stewart-Skinner is creating a music album to celebrate the fishing heritage of a Black Isle village

  Musician Grace Stewart-Skinner, 25, is creating a music album to celebrate the fishing heritage of Black Isle village, Avoch.

  Grace, who plays the Clàrsach, recorded interviews with "Avochies" - local people - speaking in their dialect and combined these with her own musical compositions to create Auchies Spikkin' Auchie.

  The Avochie dialect combines elements of Scots and Gaelic.

  Grace was inspired to create the album by her late boba - which means grandad - and the poems he wrote in the dialect.

  Grace said: "The vast majority of Avochie speakers are of my boba's generation and we are so lucky to have recorded him before he passed away.

  "Since conducting the interviews, one of the fishermen has passed away. His passing really brought home the fragile position the dialect is in and that I want to complete this project as soon as possible."

  Grace and her four-piece band recorded the album in Fortrose in February.

  Auchies Spikkin' Auchie is set to be released in the summer.
