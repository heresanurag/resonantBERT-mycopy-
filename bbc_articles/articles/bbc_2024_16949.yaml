title: 'GAA All-Ireland SFC 2024 final: Armagh 1-11 Galway 0-13 - Orchard County claim
  second ever Sam Maguire Cup - BBC Sport'
date: '2024-07-28'
section: Gaelic Games
url: http://www.bbc.co.uk/sport/articles/c0vejxz8rr2o
content: |-
  Armagh claim just the second All-Ireland Football title in the county's history with a 1-11 to 0-13 victory over Galway in a nail-biting decider at a raucous Croke Park.

  Aidan Forker followed in his manager Kieran McGeeney's footsteps by captaining Armagh to All-Ireland glory

  Armagh claimed just the second All-Ireland Football title in the county's history with a 1-11 to 0-13 victory over Galway in a nail-biting decider at a raucous Croke Park. Level at 0-6 apiece at half-time, full-back Aaron McKay's 46th-minute goal proved crucial as Armagh capitalised on Galway's wayward shooting to finish strongly and capture Gaelic football's most coveted piece of silverware. Armagh went three points up late on, and while Galway clawed two of them back, they squandered opportunities to force extra-time as the Tribesmen fell at the last hurdle for the second time in three years after losing the 2022 final to Kerry. But while Galway - who last triumphed in 2001 - fell to their knees in devastation, there was an almighty outpouring of joy from Armagh as Kieran McGeeney's players joined the heroes of 2002 as the only All-Ireland winners the county has produced. McGeeney captained that 2002 team and has achieved a rare double by leading the class of 2024 to an All-Ireland title that looked most unlikely after they lost this year's Ulster final to Donegal on penalties. That was Armagh's fourth penalty shootout defeat in the past three seasons. While that would be enough to break some teams, the Orchard men have used that pain to fuel a run to a second All-Ireland triumph.

