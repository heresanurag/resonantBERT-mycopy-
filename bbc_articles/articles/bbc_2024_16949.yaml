  When these sides last met in Croke Park in the 2022 quarter-finals, it was a game that sent shockwaves through the GAA, for both its nerve-shredding drama and the unsavoury scenes that broke out at the end of normal time. Galway eventually won that one on penalties, and while Sunday's first half lacked that encounter's thrills, it proved another tightly-contested affair with Armagh's ability to subdue Galway's heavy hitters in attack a key takeaway from the opening 35 minutes. Prior to throw-in, Galway lost captain Sean Kelly to injury, and while Shane Walsh and Damien Comer were both fit enough to start, they were frustrated by the Ulster county's disciplined and diligent defensive unit. Indeed, neither Comer or Walsh scored in the opening 35 minutes with Walsh missing two presentable frees. And with the always-impressive Rob Finnerty succumbing to injury after just 10 minutes - having already clipped over a free - Galway boss Padraic Joyce cut a troubled figure on the sideline. Luckily for the Connacht champions, Paul Conroy brought his shooting boots, the wily midfielder firing over two fine points with his midfield partner Cein D'Arcy - who came in for Kelly - also chipping in with an effort from play. D'Arcy's score ended a 13-minute scoreless period for Galway after having scored three of the game's first four points inside six minutes. But after scoring Armagh's opener, Oisin Conaty scored their second before Ben Crealey knocked over the first of his two first-half points. Excellent efforts from Orchard skipper Aidan Forker and Barry McCambridge - one of Armagh's breakout stars from this year - also kept the Orchard men's scoreboard ticking over. However, like Walsh, Conor Turbitt was guilty of missing a straightforward free with Joe McElroy also unable to convert a mark after being found by Rian O'Neill who, for the most part, was expertly shadowed by Liam Silke.

  Shane Walsh scored 0-9 in the 2022 final but endured a difficult afternoon this time around

  Having failed to catch fire in the first half, Galway showed renewed purpose after the restart with the excellent Conroy notching his third before Cillian McDaid put Galway 0-8 to 0-6 up. Armagh quickly reeled Galway in through Conaty and Rian O'Neill, and while Walsh finally opened his account with an expert left-footed strike on the turn, Tiernan Kelly's immediate reply added to the Connacht side's frustrations. The critical moment arrived 10 minutes into the second half. Seconds after Walsh nailed a free to put Galway 0-10 to 0-9 up, McGeeney introduced Stefan Campbell and Ross McQuillan, two players who have been hugely effective off the bench throughout the championship. Indeed, within seconds of entering the play, Campbell surged forward on the left, spotted an unmarked McKay in front of the Galway goal and teed up the defender to palm the ball past Connor Gleeson, prompting a huge roar from the Armagh supporters. After Armagh forward Rory Grugan was forced off with injury following a lengthy stoppage, D'Arcy brought Galway back to within one before he and Walsh fired wides to raise tension in the Galway ranks. Walsh kicked 0-9 in the 2022 final but he looked out of sorts at times here, following up that wide by dropping a mark short into Blaine Hughes' hands. Another Galway wide - from McDaid - was sandwiched between Niall Grimley and Oisin O'Neill scores, the latter a titanic effort that put Armagh three up but proved to be their last score. It was ultimately enough. While D'Arcy and McDaid raised Galway hopes with scores, Walsh dropped a free short before Dylan McHugh's effort went wide after clattering the outside of the post. Galway ended the game with 13 points from 25 shots (nine wides, three dropped short), their profligacy dashing their hopes of ending a 23-year wait for Sam.

