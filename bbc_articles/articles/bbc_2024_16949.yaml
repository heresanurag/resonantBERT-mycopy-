  In the dying seconds, Armagh nerves intensified when Niall Grimley's effort came back off the post. However, Joe McElroy's diving block on Conroy denied Galway a possible last-gasp equalising score in a frenetic and heart-stopping finale. It paved the way for historic scenes at the full-time whistle as the Armagh players became icons of their county, completing their arc from the devastating lows of penalty trauma to Gaelic football's ultimate high. Amidst the euphoria, Jarly Og Burns sprinted up the steps of the Hogan Stand to embrace his father, GAA president Jarlath Burns, as an Armagh party that will go on for weeks erupted at Croke Park. Subs: R McQuillan for Kelly ('45), S Campbell for Turbitt ('45), O O'Neill (0-1) for Grugan ('50), J Og Burns for Mackin ('59), J Duffy for Forker ('70+5). Galway: C Gleeson; J McGrath, S Fitzgerald, J Glynn; D McHugh, L Silke (0-1), S Mulkerrins; P Conroy (0-3), C D'Arcy (0-3); M Tierney, J Maher (0-1), C McDaid (0-2); R Finnerty (1f), D Comer, S Walsh (0-2, 1f). Subs: J Heaney for Finnerty ('10), S Kelly for Glynn ('44), T Culhane for Comer ('65), D O'Flaherty for Tierney ('65), K Molloy for Heaney (70+4).

