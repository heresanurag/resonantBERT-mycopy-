title: Who were the victims of the deadly New Orleans attack - BBC News
date: '2025-01-02'
section: US & Canada
url: http://www.bbc.co.uk/news/articles/c5ygrvveye0o
content: |-
  An American college football player, a young aspiring nurse and a mother of a four-year-old are among the victims.

  Who were the victims of the New Orleans attack?

  (Left to right) Nikyra Cheyenne Dedeaux, Nicole Perez and Martin 'Tiger' Bech

  A well-known American college football player, a young aspiring nurse, a young mother and a British national were among the victims of the New Year's day attack in New Orleans in which 14 people were killed. Their names are being released by families and relatives before authorities complete post-mortem examinations. The suspect was shot dead by police.

  Martin "Tiger" Bech, who was in his late twenties, was a former football player at Princeton University. His death was confirmed in a statement by the university. "There was no more appropriate nickname of a Princeton player I coached," Princeton football coach Bob Surace said in a statement. "He was a 'Tiger' in every way - a ferocious competitor with endless energy, a beloved teammate and a caring friend." "Love you always brother!" he wrote. "You inspired me everyday now you get to be with me in every moment. I got this family T, don't worry. This is for us." Saint Thomas Moore Principal Marty Cannon, Mr Bech's coach senior year of high school, said he was special. "I don't think there was, there's ever been anybody like Tiger," he said. "We could go on and on about how great of an athlete he was, but he was way more than that. He was a complete guy and he was a, he was a stand-up guy that we really respected and honored, and we really liked." Mr Bech was a member of the 2016 and 2018 Ivy League Championship teams.

  The 18-year-old was an aspiring nurse. Her death was confirmed by her mother, Melissa Dedeaux, on social media. "I lost my baby just pray for me and my family pleaseeeeee!!! God I need you now!!," the mother pleaded, along with a photograph of her daughter wearing a red graduation cap and gown from this year. Ms Dedeaux - who is also a nurse - told local media outlet Nola that her daughter had been due to start her nurse training later this month. She added that Nikyra had snuck out with a cousin and friend, who both survived. Nikyra's school friend, Dante Reed, told the New York Times he had received a frantic call from her cousin, saying they had run when they heard gunshots, and that she - Nikyra - was missing. Her grandmother, Jennifer Smith, told the paper "she was a joy for the little time we had her." "I'm very proud of all of my grandchildren, and that one especially."

  Edward Pettifer, of Chelsea, London, suffered fatal "blunt force injuries" in the attack, according to a preliminary cause of death given by the New Orleans coroner. The 31-year-old's stepmother is Alexandra Pettifer, previously known as Tiggy Legge-Bourke, who cared for Prince William and Prince Harry in the 1990s, the Prince of Wales said. Prince William said: "Our thoughts and prayers remain with the Pettifer family and all those innocent people who have been tragically impacted by this horrific attack." In a statement, Mr Pettifer's family said: "The entire family are devastated at the tragic news of Ed's death in New Orleans. He was a wonderful son, brother, grandson, nephew and a friend to so many."

  The death of the store manager and father of two was confirmed to CBS News, the BBC News' US partner, by his cousin Shirell Robinson Jackson. Ms Jackson described him as "full of life", and said the 37-year-old had messaged the family minutes after midnight to wish them a Happy New Near. He was with another cousin who was injured in the attack. Mr Hunter's younger sister, Courtney Hunter, told the NY Times her brother loved to be around the family and was competitive when it came to playing games.

  Mr Badawi said: "We ask Allah Almighty to shower his mercy on him, and give us patience and strength to overcome this". "We belong to Allah, and to him we shall return", he added in an expression commonly recited by Muslims when hearing of another Muslim's death. Last year, a Facebook post by Mr Badawi congratulated Kareem after he graduated from high school. Kareem was a student at the University of Alabama, whose president, Stuart R Bell, said: "I grieve alongside family and friends of Kareem in their heartbreaking loss." Mr Bell's message - which was shared by the faculty on Facebook - also asked people to "take a moment to pray for those impacted by this tragedy."

  The 21-year-old's death has been confirmed by his former high school, Archbishop Shaw, on social media. "We are asking the entire Archbishop Shaw family to pray for the repose of Hubert's soul, his family and friends during this difficult time, and all those affected by this tragedy. "Eternal rest grant unto him, O Lord, and let perpetual light shine upon him. May the souls of all the faithful departed, through the mercy of God, rest in peace."

  Kimberly Usher Fall, Ms Perez's friend and boss at the deli store she managed, called her a dedicated, smart and a "good-hearted person", according to CBS. "She was beautiful and full of life," she wrote on an online fundraiser she set up for her friend. The 27-year-old was also a mother to a four-year-old boy. Ms Usher Fall said Ms Perez used to bring her son into work on his days off from school. She used to teach him mathematics and the alphabet in the deli's storage room in between work, Ms Usher Fall told The Washington Post newspaper. "She really was a good kid, man, she really was," she said, adding "she was just getting everything going, and she's gone, just gone."

  The 25-year-old audio-visual technician at New Orleans' Superdome had a "laid-back spirit and infectious laughter" that brought joy to those around him, according to a fundraiser his family set up in his name. His mother Cathy Tenedorio, told US broadcaster NBC News, she last saw her son alive at 21:00 local time on New Year's Eve, adding she remembered hugging and kissing him. Mr Tenedorio's cousin, Christina Bounds, told the BBC his family "begged him not to go" to the Bourbon Street area on New Year's Eve, concerned by the size of the crowds and potential dangers. He had been at his family's home in the town of Slidell earlier in the evening. He decided to go to celebrate, and when the attack took place was separated from his friends. The family believe he was killed in the exchange of gunfire between police and the suspect - but have not been able to get any answers from authorities or the police. "We couldn't get any information when my aunt [Tenedorio's mother, Cathy] showed up at the hospital," she said. "There has been no information from doctors, hospitals, or cops. Nobody." "They have zero information, and that's the part that's pissing everybody off. We don't even know what happened," Bounds added. "Was he carried out by the EMS? Was he in an ambulance? Did he die instantly?" These answers, she added, would "help people accept" what happened. "But now it's like total shock," she added. "It's not registering."

  Auburn University in the US state of Alabama said Drew Dauphin, who graduated from the institution in 2023, was among the victims in a post to social media on Thursday. "Words cannot convey the sorrow the Auburn Family feels for Drew's family and friends during this unimaginably difficult time," said its president Christopher B. Roberts in a statement. "Our thoughts are with the Dauphin family and the families of all the victims of this senseless tragedy."

  A spokesperson for broadcasting company Audacy, where Mr DiMaio worked as an account executive in New York, confirmed to CBS that he was among the victims. "Beyond his professional achievements, Billy will be fondly remembered for his unwavering work ethic, positive attitude, and kindness," they said in a statement. "He was a true asset to the Audacy team, and his contributions and presence will be deeply missed." A local newspaper in Holmdel, New Jersey, said the 25-year-old went to Holmdel High School before graduating from Chestnut Hill College in Philadelphia where he played lacrosse. In a Facebook post, Holmdel High School Boys Lacrosse said: "Our Lacrosse community has suffered an unimaginable loss. "Billy was a remarkable young man on and off the field. All of us in the Holmdel community are devastated by this sad news."

  New Orleans native Terrence Kennedy, 63, was among those killed in the attack, his family confirmed to CBS News. His wife, Jacqueline, told the outlet that her husband was killed. Other family members described trying to reach him as news of the attack spread. Kennedy's niece, Monisha James, told CBS that their family couldn't get a hold of him and tried calling various hospitals in the area. She said officials confirmed he was killed in the attack on Thursday. In a Facebook post, Monisha said her uncle was known as "Terry" and was a nice, quiet man who enjoyed sports and loved his large New Orleans family, CBS reported.

  Elliot Wilkinson, 40, was among those killed, a coroner confirmed to CBS News. "To my little brother Elliot wilkinson you was loved and you will truly be missed. I know life was hard for you at times," Mr Wilkinson's brother Cecil posted on Facebook. "But I wasn't expecting to get the phone call this morning you was one of them that got hit in New Orleans in the French Quarter."

  Brandon Taylor, 43, was also killed in the attack, a coroner confirmed to CBS News. The Harvey, Louisiana, local was "unique in every way", his partner Heather Genusa posted in a Facebook tribute. "I never met another human like you," she wrote on Facebook. "No words could bear the pain I'm in from losing you."
