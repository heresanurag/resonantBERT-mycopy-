content: |-
  Priscilla Thompson tells the BBC how a "horrendous crash" woke her in the middle of the night.

  A woman who lives near the collapsed Baltimore Key Bridge has told the BBC about how her whole house "shook" when a container ship collided with the bridge during the night.

  The bridge collapsed, resulting in a vast search and rescue team being launched by emergency services.

  Priscilla Thompson said a "horrendous crash" woke her up.
