title: 'Greenwich: Urgent search for missing six-year-old girl in London - BBC News'
date: '2024-07-30'
section: London
url: http://www.bbc.co.uk/news/articles/ce58e7mjlxko
content: |-
  The girl was last seen on CCTV on Monday at about midday wearing light pink clothing.

  The Metropolitan Police has launched an urgent appeal for a six-year-old girl who went missing in Greenwich, south-east London, on Monday. The force said it was "extremely concerned" for Eudine who was reported missing from the Thamesmead Estate at 22:40 BST. The Met said she was seen alone on CCTV at about midday. The force has asked people in the Thamesmead area to check gardens, sheds and CCTV and doorbell footage. Police believe Eudine walked out of her house, the BBC has been told.

  The girl is between 3ft 6in and 4ft (1.09m to 1.21m) tall and she is thought to be wearing light pink pyjamas. She also had a white shoulder bag with a daisy design with her. "We are extremely concerned for her welfare and officers are carrying out urgent enquiries to find her," the force said in a statement. Anyone with any information on where Eudine may be is asked to call 999.
