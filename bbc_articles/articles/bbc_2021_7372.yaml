title: 'Covid in Scotland: What level is your area in? - BBC News'
date: '2021-06-05'
section: Scotland
url: http://www.bbc.co.uk/news/uk-scotland-57076243
content: |-
  Many Scottish council areas saw restrictions ease earlier this month, but some remained at the same level.

  Many council areas in Scotland moved from level two to level one or to level zero on 5 June, allowing more people to meet outdoors, and in pubs, cafes and restaurants. Glasgow moved from level three to level two - but there were no changes in many parts of central Scotland due to high case numbers. First Minister Nicola Sturgeon paused any further easing of restrictions and said the current levels would stay in place until 19 July. It is hoped that is when all parts of Scotland can move to level 0. Find out which council is currently in which level.

  Island communities which are reporting an extremely low number of new cases are in level zero. In this tier hospitality operates "almost normally" - subject to rules on physical distancing, limits on numbers and other rules, such as table service.

  Many parts of Scotland where cases are low or broadly stable are in this level, which allows six people from three households to meet inside and stay overnight. There is no need to physically distance from family and friends in a private home. Meanwhile, eight people from three households can meet indoors in a public place, like a restaurant. Travel around Scotland is permitted and you can also travel to other parts of the UK as long as you follow their rules. Shops and leisure attractions are open, including soft play and funfairs, but nightclubs and adult entertainment remain closed.

  A large number of council areas across the central belt of Scotland are in level two. It allows six people from three households to meet inside and stay overnight. There is no need to physically distance from family and friends in a private home. Travel around Scotland is permitted and you can also go to other parts of the UK as long as you follow their rules. Shops and leisure attractions are open, but soft play, funfairs and nightclubs remain closed.

  No Scottish local authority is in this level. Under these rules, six people from two households can gather at an indoor public place such as a cafe or restaurant. Groups of up to six from six households can meet outdoors, but there is no indoor visits to private homes. Going inside someone's living accommodation is only permitted for essential purposes or if you are in an extended household. Shops and many leisure facilities can open, but cinemas, theatres, nightclubs, concert halls and stadiums cannot. People should only travel in or out of the areas for permitted purposes.

  No Scottish local authority is in this level. The rules say that four people from two households can meet outdoors in a private garden or a public place, but they would not be able to travel outside their area, unless for an essential reasons. Indoor activity can only be for essential purposes and not for socialising. Essential shops would be open, plus places of worship which can follow social distancing rules. Hospitality venues would remain closed along with indoor visitor attractions, gyms and swimming pools.
