content: |-
  Mark Cavendish says that he would be unlikely to be a professional cyclist if he was starting his career now.

  I wouldn't make it as a pro now - Cavendish

  Mark Cavendish finished his career on a winning note in Singapore

  Mark Cavendish says he would be unlikely to be a professional cyclist if he was attempting to start now "because it is completely based on how strong you are". The 39-year-old rode in his final race last weekend, winning the Tour de France Criterium in Singapore. In July, Cavendish won a record-breaking 35th stage of the Tour de France, beating Eddy Merckx's total. He also won the road world title in 2011, 17 stages in the Giro d'Italia and three in the Vuelta a Espana. He finished his career with 165 race wins over 19 years. "I would not be a professional now. [But] if so many people just look at the scientific part it leaves a gap open for someone who looks tactically minded at things," he told BBC Radio 5 Live. Cavendish was famed during his career for beating younger and stronger riders to the line based on the timing of his attacks and how long he could hold on to high levels of power. Former British Cycling Academy boss and Team Sky coach Rod Ellingworth worked with Cavendish across his career. "Is he the most powerful? No. Not by a long way," he told BBC Sport. "However, for his size and everything else, he can punch above his weight. "Timing is essential, and knowing the right line to follow and the feel for the group. "His actual bike-handing skills when they're going 70kph and his vision of where he needs to be - all that combines really well. "He sees it in slow motion. He sees all the detail and it's quite unique." On the track Cavendish claimed omnium silver at the 2016 Olympics and was a three-time madison world champion. In June he was knighted in the King’s Birthday Honours.

  Cavendish added: "Everything is quantifiable - the power you put out, the weight you are, and that makes it harder for someone who is tactically minded. "Even when I was younger and not as scientific, I didn't quite 'hit the numbers' so I shouldn't be a professional. "If so many people just look at the scientific part you can never shine through - it leaves a gap open for someone who looks tactically at things. If everyone looked tactically, it would have made my job a lot harder. "I never neglected my physical training but it is as important to train your mind to read a situation - to look at results, look at tactics of other teams. I did that and others didn't." Cavendish delayed his retirement for a year to beat the Tour de France stage record but is happy with his decision to end his professional career. "I was fortunate to get some extra years out of my career and complete cycling, I guess. The majority of athletes will never get to go out on a fairytale ending," he added. "The people I turned pro and raced with have all retired, their sons have also retired. That makes me feel old. There is nobody competitive at this age. "I'm lucky I had the support of my team and family who believed in me because of my tactical side rather than the physical ability."
