content: |-
  Footage verified by the BBC shows the extent of the damage following a military strike by Russia in the city of Poltava in Ukraine.

  Footage verified by the BBC shows the extent of the damage following a military strike by Russia in the city of Poltava in Ukraine, which killed at least 51 people and injured 200.

  President Zelensky said two missiles hit the Institute of Communications, which is a military institute in the city, and a hospital.
