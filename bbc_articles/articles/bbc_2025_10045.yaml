content: |-
  Brandon Williams admits driving up to 99mph in a 70mph zone before a crash in Cheshire in 2023.

  Former Manchester United star Brandon Williams has received a suspended prison sentence for dangerous driving after he reached nearly 100mph (161km/h) before a crash. The 24-year-old footballer was spotted driving at high speeds and erratically in an Audi A3 on the A34 near Handforth, Cheshire, on 20 August 2023. His car was then in collision with a Ford Fiesta before crashing into the central reservation. Chester Crown Court also heard Williams and his female passenger appeared to have yellow balloons in their mouths. Williams, who admitted dangerous driving and driving without insurance, was sentenced to a 14-month jail term, suspended for two years.

  The judge, Recorder Eric Lamb, also banned Williams, who later signed on loan at Ipswich Town, from driving for three years and ordered him to complete 180 hours of unpaid work as part of a community order. The court heard that the full-back, who was contracted to Manchester United at the time of the incident, had a female passenger. Crash investigators concluded that, four seconds before impact, Williams was driving at 99mph in a 70mph zone. A female motorist travelling behind Williams on the dual carriageway shortly before 18:00 BST thought the footballer was not in control of his vehicle. The court was told Williams was braking heavily and dropping back to leave a small gap. Max Saffman, prosecuting, said the woman noticed the Audi occupants appeared to have yellow balloons in their mouths, and she was "scared" they would collide with her vehicle. The Audi overtook and swerved in front of her, in what she said was a "needless manoeuvre". Williams was then in collision with the Ford Fiesta, leaving both vehicles extensively damaged. The Fiesta's driver and her two female passengers all described Williams's driving as "too fast and erratic". In victim impact statements, one said she thought she was going to be killed. They sustained various physical injuries, including whiplash and bruising, and all have suffered psychologically. Williams was treated in hospital for several injuries and then taken to Middlewich custody suite.

  The court was told that Williams's "prolonged episode" of dangerous driving took place over five miles and, although he was not under the influence of Class C drug nitrous oxide at the time, he had assisted his front-seat passenger to use her balloon. Richard Littler KC, defending, said: "This episode of dangerous driving, he says himself, was underpinned by a lack of maturity, stupidity and, moreover, trying to be ostentatious. "He was driving like an idiot well in excess of the speed limit and was showing off." Mr Littler said his client was "genuinely remorseful" and wanted to get his life back on track and "improve his physical and mental wellbeing". Williams, who was scouted by Manchester United as a seven-year-old, was released by the Red Devils at the end of the 2023-24 season and has been without a club ever since. The court heard he had been working with two fitness coaches in the hope of landing a new contract this summer. Mr Littler said: "One of those coaches, Sean O'Shea, is of the opinion that he had too much money, too soon and the inability to deal with all that brings." He added: "In the last few years, Brandon Williams has had to live with significant mental health and neurological issues. "He is in a better shape mentally and physically right now. "Knowing the harm he caused to others and the pressure of these proceedings coming have weighed heavily on his shoulders. "This is a defendant who is trying his level best to get his career back on track and improve his physical and mental wellbeing." The judge noted references Mr O'Shea and fellow football coach Wayne Richardson, as well as Williams's work with homelessness charity Shelter. Mr Lamb told him: "There is a different side to your character." Williams was supported in court by his parents and two close friends.

