id: bbc_2017_11567
title: Ratko Mladic removed from war crime court after outburst - BBC News
date: '2017-11-22'
section: General
url: http://www.bbc.co.uk/news/world-europe-42078286
content: |-
  The former Bosnian Serb commander has been found guilty of genocide in the 1990s Bosnian war.

  Former Bosnian Serb commander Ratko Mladic has been found guilty of genocide for some of the worst atrocities of the 1990s Bosnian war.

  The 74-year-old shouted at the judges reading his verdict at the UN tribunal, before he was removed from the courtroom.

  He was sentenced to life in prison.
