content: |-
  A main square, theatre and university building in Chernihiv were reportedly damaged in the attack.

  Oleksandr Lomako, acting mayor of Chernihiv, has told the BBC that Russia’s attack on this town today is a “terrorist attack” and “a war crime against civilians”.

  “You can see it’s the centre of the city. There were many people, it was midday," he said. "Today is a religious holiday and people were at the service.

  “There is no other way to interpret it than a war crime against civilians, yet another Russian war crime.”

  Mr Lomako, who has announced three days of mourning here in the wake of the attack, addressed reports about Russia targeting a drone exhibition in the city.

  “I understand that their aim was a military event taking place in the building of the drama theatre and that it was their target,” he said.

  “But it is clear that the Russians launching those missiles and those giving them orders in the middle of the day to the civilian city realised that the victims will be primarily civilians.”
