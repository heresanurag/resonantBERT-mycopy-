title: 'Covid-19: BBC''s Fergal Keane revisits St Mary’s and Charing Cross Hospital
  10 months on - BBC News'
date: '2021-01-17'
section: General
url: http://www.bbc.co.uk/news/uk-55656218
content: |-
  As the UK records its highest death toll, Fergal Keane has been to see the strain the NHS is under for the second time.

  Boris Johnson has said there is still a very substantial risk of intensive care units in hospitals being overwhelmed by the spread of the coronavirus.

  It comes on a day when the UK has recorded the highest number of deaths in a single day in Europe.

  Fergal Keane last visited the Imperial Healthcare Trust’s St Mary’s and Charing Cross hospital in London last April.

  He's been back to see how they're coping.
