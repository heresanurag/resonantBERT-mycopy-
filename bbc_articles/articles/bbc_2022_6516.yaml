title: Tory MP Lee Anderson branded out of touch for food bank remarks - BBC News
date: '2022-05-11'
section: UK Politics
url: http://www.bbc.co.uk/news/uk-politics-61414951
content: |-
  Lee Anderson said, rather than needing the centres, people needed to learn to cook and budget.

