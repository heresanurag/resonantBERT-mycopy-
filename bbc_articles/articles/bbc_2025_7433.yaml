title: 'Maddy Cusack: Inquest into death of Sheffield United footballer delayed -
  BBC Sport'
date: '2025-04-24'
section: Women's Football
url: http://www.bbc.co.uk/sport/football/articles/c75dklyyqy7o
content: |-
  The inquest into the death of Sheffield United footballer Maddy Cusack is delayed until July at the earliest - and may not take place until the end of the year.

  The inquest into the death of Sheffield United footballer Maddy Cusack has been delayed until July at the earliest. The midfielder, who was the first player to reach 100 appearances for United, died in September 2023 at the age of 27. The inquest had been due to take place last week in Chesterfield but was postponed. During a pre-inquest review hearing on Thursday, the Cusack family's lawyer criticised a "perceived lack of transparency" regarding the disclosure of material. This included requesting an unredacted version of a Football Association (FA) report following the investigation it launched in January last year into the circumstances that led to Cusack's death.

  Maria Mulla, appearing remotely on behalf of the Cusack family, told the hearing: "One of the concerns is a perceived lack of transparency, particularly in relation to documents that are being provided to them [the family]. I am told the FA report in particular has missing pages and appears with a large number of redactions, whole pages." She later added: "The scope of this inquest is very much a work in progress. The family wants some transparency." However, coroner Sophie Cartwright said that disclosure had been made under "the Worcestershire principle", which permits redactions according to matters such as relevance. Ms Cartwright added that while she was given "full, unfettered access", both the FA and Sheffield United had sought redactions before onward disclosure, and she had considered additional ones necessary. Legal representatives for both the FA and Sheffield United said they had acted in accordance with those principles. However, Ms Cartwright did issue an apology to the Cusack family for the length of time it had taken to collate the disclosure bundle, which extends to more than 700 pages and was sent to them earlier this week. "I apologise to the family, you have been waiting a long time for disclosure that is important to you," she said. Shortly after Cusack's death, her family complained about "processes and conduct" at Sheffield United, including the conduct of former women's team manager Jonathan Morgan. An investigation commissioned by the club found no evidence of wrongdoing. But the FA launched its own investigation to establish whether "further action is required under our jurisdiction within football". At a previous hearing, the FA's legal counsel said the organisation would file a report to the coroner by the middle of January. It is understood this took place. Mr Morgan attended the hearing alone, while the FA's legal counsel Stephen Walsh and head of integrity David Matthews were also present. A fourth pre-inquest hearing has been scheduled for 3 June. The earliest date for the inquest is late July, but the coroner indicated it might not take place until the end of the year.
