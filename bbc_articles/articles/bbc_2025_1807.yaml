title: Passengers on crashed Toronto plane offered $30,000 each - BBC News
date: '2025-02-21'
section: US & Canada
url: http://www.bbc.co.uk/news/articles/cg5d6dq44e7o
content: |-
  The gesture to the affected travellers - all of whom survived - comes with no strings attached, the airline says.

  This video can not be played To play this video you need to enable JavaScript in your browser.

  Delta Air Lines is offering US$30,000 (£23,792) to each person on board a plane that crash-landed in Toronto on Monday - all of whom survived. As it landed in the Canadian city, the plane skidded along the runway in flames before flipping over and coming to a halt upside down. Passengers described their amazement as most of them walked away without injuries. It remains unclear what caused the incident, which is under investigation. There were 76 passengers and four crew on the flight, which had travelled from the US city of Minneapolis before making its crash-landing in Canada. A spokesperson for Delta said the money offer had no strings attached and did not affect customers' rights.

  Toronto law firm Rochon Genova says it has been retained by certain passengers and their families over the crash-landing. Lawyer Vincent Genova said the group expected a "timely and fair resolution", highlighting that his clients "suffered personal injuries of a serious nature that required hospital attention". In an email to the BBC, Mr Genova said the $30,000 compensation is an "advance" payment meant to assist plane crash victims with short-term financial challenges, and the airline will seek to deduct it from any later settled claims. There is precedent to these types of payments, like in 2013, when Asiana Airlines offered passengers of a San Francisco plane crash $10,000 in initial compensation. Last year, Alaska Airlines offered a $1,500 cash payment to passengers after mid-air door-plug blowout on a flight from Portland. Following this week's incident in Toronto, the plane crew and emergency responders were praised for their quick work in removing people from the wrecked vehicle. The plane's various safety features have also been credited for ensuring no loss of life. All of the 21 passengers who were taken to hospital had been released by Thursday morning, the airline said. Delta's chief told the BBC's US partner CBS News that the flight crew were experienced and trained for any condition. The airline's head Ed Bastian told CBS the plane crew had "performed heroically, but also as expected", given that "safety is embedded into our system". He said Delta was continuing to support those affected. Several theories about what caused the crash have been suggested to the BBC by experts who reviewed footage, including that harsh winter weather and a rapid rate of descent played a role. One passenger recalled "a very forceful event", and the sound of "concrete and metal" at the moment of impact. Another said passengers were left hanging upside down in their seats "like bats".

