  The cockpit voice recorder and flight data recorder have been recovered from the wreckage. The investigation is being led by Canada's Transportation Safety Board (TSB), supported by US officials. On Wednesday evening, the wreckage was removed from the airport runway. The accident was the fourth major air incident in North America in a space of three weeks - and was followed on Wednesday by a crash in Arizona in which two people lost their lives when their small planes collided. Experts continue to insist that air travel is overwhelmingly safe - more so than other forms of transport, in fact. That message was emphasised by US Secretary of Transportation Sean Duffy, who told CBS on Wednesday there was no pattern behind the incidents, each of which he said was "very unique".
