title: Peter Murrell arrives home after embezzlement charge - BBC News
date: '2024-04-19'
section: General
url: http://www.bbc.co.uk/news/uk-scotland-68851702
content: |-
  Nicola Sturgeon's husband was taken into custody on Thursday morning and was questioned by detectives.

  The husband of former First Minister Nicola Sturgeon has been charged in connection with the embezzlement of funds from the Scottish National Party.

  Peter Murrell, 59, was taken into custody at 09:13 on Thursday and was questioned by Police Scotland detectives.

  He was previously arrested as a suspect on 5 April 2023 before being released without charge.

  Mr Murrell has since been released from Falkirk Police Station, where he was being questioned, and was later filmed returning to his home near Glasgow.
