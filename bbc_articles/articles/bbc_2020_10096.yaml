id: bbc_2020_10096
title: 'Coronavirus: West of Scotland household visits ban extended - BBC News'
date: '2020-09-14'
section: Scotland
url: http://www.bbc.co.uk/news/uk-scotland-54151593
content: |-
  More than 1.75m people are covered by the tougher lockdown restrictions in Glasgow and the surrounding area.

  Stricter restrictions barring household visits in the west of Scotland have been extended for another week.

  The measures cover 1.75 million people living in and around Glasgow.

  First Minister Nicola Sturgeon urged everyone living in the areas to follow the rules in a bid to "get more control over the virus".

  The restrictions apply in Glasgow city, East and West Dunbartonshire, North and South Lanarkshire, Renfrewshire, and East Renfrewshire.

  People living in the seven areas are not allowed to host others inside their home, or visit anyone else's home anywhere in Scotland.

  The announcement comes on the same day that lockdown restrictions across the country were tightened, with gatherings now restricted to a maximum of six people from two households.

  The Scottish government said reported cases of Covid-19 were higher than average in the seven council areas, although an "early assessment" had suggested the tougher measures were "working to slow the increase in cases".

  The first minister said it was "clearly regrettable" that the restrictions would have to continue, but said "we must act to get more control over the virus in these areas".

  Ms Sturgeon said: "I would ask everyone in the affected areas to continue being extra vigilant, to follow all guidance and to isolate and book a test if they have any symptoms. Do not lose ground now."

  The only exception to the bar on indoor meetings is for those in extended households, while only essential indoor visits are being permitted in hospitals and care homes.

  People from two different households are still allowed to meet up outdoors and in hospitality settings, as long as groups do not exceed six and wider guidance around hygiene and physical distancing is followed.

  The local restrictions will be reviewed again on Tuesday 22 September.

  The rules, which had already covered Glasgow city, East and West Dunbartonshire, Renfrewshire, and East Renfrewshire, were extended to cover Lanarkshire on Friday.

  On Saturday, those seven areas had the highest rates of new Covid-19 cases in Scotland. The seven-day rate is calculated by adding up all the new cases over the previous week, then dividing it by the total population of the area.
