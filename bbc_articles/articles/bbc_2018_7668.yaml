id: bbc_2018_7668
title: 'London Bridge attack: Father ''left out'' of memorial - BBC News'
date: '2018-06-02'
section: General
url: http://www.bbc.co.uk/news/uk-44339861
content: |-
  James McMullan's father says he was not consulted on plans for the memorial of the London Bridge attack.

  Simon McMullan, father of the only British victim of London Bridge attack, says he was not involved in preparations for Sunday's commemoration service.

  He also wanted to put up a plaque to his son, James McMullan, but wasn't given permission.

  Southwark Council says it has tried to arrange a "thoughtful and fitting" commemoration with "limited resources".
