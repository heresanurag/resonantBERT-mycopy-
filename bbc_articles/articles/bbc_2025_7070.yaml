title: Home Secretary Yvette Cooper calls damage to statues 'disgraceful' - BBC News
date: '2025-04-21'
section: London
url: http://www.bbc.co.uk/news/articles/crkx78zlm4po
content: |-
  Graffiti is found on seven statues of historic figures in Parliament Square following a trans rights protest.

  A statue of former South African prime minister Jan Smuts was targeted by vandals

  Home Secretary Yvette Cooper has called the vandalism of several statues in Parliament Square, including one of women's votes campaigner Dame Millicent Fawcett, "disgraceful". Transgender campaigners gathered on Saturday in front of Parliament to protest against the Supreme Court ruling that biological sex defines a woman for the purposes of the Equality Act. Cooper said she welcomed the Metropolitan Police's investigation and that the government would strengthen the law "to better respect and protect important memorials". The force said seven statues were damaged and they are investigating the incidents as criminal damage. No arrests have been made.

  Graffiti on the statue of Dame Millicent Fawcett in Parliament Square

  A statue of former South African prime minister Jan Smuts was graffitied with the words "trans rights are human rights". "Criminal damage like this, including to statues of men and women who fought for freedom and justice like Winston Churchill, Nelson Mandela and Millicent Fawcett, is disgraceful - it is right the police are investigating," Cooper said. "We are strengthening the law to better respect and protect important memorials. Freedom of speech and protest are important in our democracy, but this kind of criminal damage is completely unacceptable." The Met said its officers were in the area policing Parliament Square "but did not witness the criminal damage take place as the area was densely populated with thousands of protestors and it was not reported at the time". It confirmed it is investigating the graffiti as criminal damage and has asked anyone with information, footage or pictures to come forward. The Greater London Authority plans to remove the graffiti but this requires specialist equipment and "we are confident this will be done shortly," the Met added. On Wednesday, the Supreme Court ruled unanimously that the terms "woman" and "sex" in the 2010 Equality Act "refer to a biological woman and biological sex" rather than "certificated sex". Protests against the ruling also took place on Saturday in Reading, Edinburgh and Glasgow.

  The statue of the women's votes campaigner was unveiled in 2018

  Ch Supt Stuart Bell, who was leading the policing operation for the protest, said: "It is very disappointing to see damage to seven statues and property in the vicinity of the protest today. "We support the public's right to protest but criminality like this is completely unacceptable." A spokesperson for Women and Equalities Minister Bridget Phillipson, speaking on the damage to Dame Millicent's statue, said she "utterly condemns the appalling defacement of such an important national monument to the fight for women's rights". "There is no excuse for this disgraceful criminal damage." The Met confirmed it is also dealing with a number of complaints from the public about signs and images shared on social media that were reportedly displayed at the protest yesterday and "action will be taken if there are signs displayed that breach of the law". The statue of Dame Millicent by artist Gillian Wearing is the only statue of a woman in Parliament Square, where others honoured include international statesmen like Nelson Mandela and Mahatma Gandhi, and former prime ministers Sir Winston Churchill and David Lloyd-George. Unveiled in 2018, it is also the only statue by a female artist in the square, and was erected following a campaign and petition by the feminist activist Caroline Criado Perez.

  Correction: This article originally said that the ruling means that transgender women with a gender recognition certificate (GRC) can be excluded from single-sex spaces if "proportionate". However, this is inaccurate and so this line has been removed from the story.
