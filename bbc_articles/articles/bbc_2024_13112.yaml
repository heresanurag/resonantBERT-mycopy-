title: Man hurt and dog killed in Willington house explosion - BBC News
date: '2024-06-24'
section: England
url: http://www.bbc.co.uk/news/articles/c722294wyqzo
content: |-
  People in the County Durham village living near to the house have spoken of their shock.

  Man seriously hurt and dog killed in house explosion

  A man has been seriously hurt and a dog has been killed in a house explosion. Emergency services were called to Coronation Terrace in Willington, County Durham, at about 01:30 BST. Durham Police said a man in his 40s suffered "serious injuries" and was taken to the Royal Victoria Infirmary (RVI) in Newcastle for treatment.

  This video can not be played To play this video you need to enable JavaScript in your browser.

  Nearby residents were told to leave their homes "as a precaution", with the affected property cordoned off. Police confirmed most residents have been allowed to return to their homes on Monday evening. People are being advised to avoid the area. "A cordon remains in place around the scene while police and fire investigators work to establish the cause," a spokesperson said. The force also appealed for anyone with information to contact police, and asked people not to speculate on the circumstances.

  The explosion happened during the early hours of Monday

  Residents have spoken of their shock at the blast, which destroyed the house. Next-door neighbour Hannah Wright said she woke up to the sound of "a massive explosion". "The house was gone," she told the BBC. "Just horrendous. We had to get the children out... because there was gas leaking."

  Hannah Wright and Andrew Green woke up to the sound of a "massive explosion"

  The explosion will be investigated "in due course", the fire service said

  County Durham and Darlington Fire and Rescue Service said an investigation would take place "in due course". Group manager Chris Williams said: "Our crews will remain in the area today alongside colleagues from Durham Constabulary, Durham County Council and Northern Gas Networks to assess the site and ensure it is structurally safe."

  Neighbours said the house was "gone"
