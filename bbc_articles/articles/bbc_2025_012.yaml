  Woman missing for 52 years found alive and well

  Sheila Fox, who disappeared from Coventry in 1972, is living in another part of the country

  A woman who went missing 52 years ago has been found alive and well. Sheila Fox, who disappeared from Coventry in 1972 when she was 16 years old, is safe and living in another part of the country, West Midlands Police said. The force published a fresh appeal to help find Ms Fox in December and released a photograph of her from around the time of her disappearance on their website and social media. Within hours of the appeal, members of the public contacted the police with information that helped the force resolve one of its longest running missing person investigations.

  Det Sgt Jenna Shaw from the cold case investigation team said the force was "absolutely delighted" to find Ms Fox after more than five decades, "having searched through every piece of evidence to find a photo of Sheila". Det Sgt Shaw added: "Every missing person has a story, and their families and friends deserve to know what happened to them and, hopefully, be reunited with them."

