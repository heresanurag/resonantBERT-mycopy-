  Diving tours and sea cruises are a huge attraction for tourists visiting the Egyptian Red Sea resorts. Marsa Alam, where the boat had departed from, is a popular destination among European visitors, due to its clear waters, sunny weather and magnificent marine life. According to the local council in Marsa Alam, the tourists on board were from Belgium, the UK, China, Finland, Germany, Ireland, Poland, Slovakia, Spain, Switzerland and the US. Among the missing are two Polish tourists, according to the foreign ministry in Warsaw. A UK Foreign Office spokesperson said they were providing "support to a number of British nationals and their families following an incident in Egypt". The Chinese embassy in Egypt said two of its nationals were "in good health" after being rescued.
