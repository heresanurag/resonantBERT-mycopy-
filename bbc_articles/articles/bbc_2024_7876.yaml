title: 'Paris Olympics 2024: ''Unprecedented'' security operation will be in place,
  says Games chief - BBC Sport'
date: '2024-04-16'
section: Olympics
url: http://www.bbc.co.uk/sport/olympics/68831181
content: |-
  Paris 2024 chief Tony Estanguet says the Games will protected by an "unprecedented" security operation, and that preparations are "in good shape".

  This video can not be played To play this video you need to enable JavaScript in your browser. Paris Olympics 2024: We want to showcase the best of France - Paris chief Estanguet

  Paris 2024 chief Tony Estanguet says the Games will be protected by an "unprecedented" security operation, and that preparations are "in good shape". But with 100 days until the start of the Olympics, he said organisers will "keep some humility, because we know in this kind of event anything can happen in the last stretch". Estanguet added he was "very satisfied with where we stand at this moment". He told BBC Sport: "My message is you can have confidence with this event." Amid mounting concerns over safety, Estanguet said "I would like to reassure that it's non-negotiable. Security is the priority." "It's the biggest event that France has ever organised, and we want to showcase the best of France. So definitely we are determined to be ready. "We are looking forward to welcoming the world in Paris." "When I discussed this with [London 2012 chief] Seb Coe, he told me...in the last 100 days, there will be more criticism, more people worried. It's exactly what is happening. My role is to remain calm, remain focused on what is very important to deliver. "The venues are ready, the budget is balanced. We have very good ticket sales, the level of ambition is very high."

  The Seine is set to host the opening ceremony, marathon swimming and the swimming leg of the triathlon at the Paris Olympics

  The opening ceremony is set to be the first to be held outside a stadium, with more than 10,000 athletes expected to sail along a 6km stretch of the Seine on 160 barges. However, this week the French President Emmanuel Macron said it could be relocated to either the Trocadero square or the Stade de France if the security risk is deemed too high. There are concerns that wars in Ukraine and Gaza could increase the threat. "I trust in the system in place to secure this opening ceremony" said Estanguet, the president of the organising committee. "It's the first time ever the objective is to have the maximum of people enjoying this moment. It's five times more than what happened in a stadium before...So it's a great opportunity." Organisers had originally planned to accommodate some 600,000 people to watch the ceremony from riverbanks, but that has now been scaled down to 300,000. Tourists will not be given free access to watch the ceremony, as was originally planned. Instead, tickets will be by invitation only, not via open registration.

  France raised its security threat level in October, when a teacher was killed in a knife attack in a school in Arras. In December, a German man died and two others were injured in a knife and hammer attack on a street in central Paris. European security officials have warned of a growing risk of attacks by Islamist militants amid the Israel-Gaza war. Concerns have also been heightened following the threats by the Islamic State group (IS) to Champions League quarter-final football matches including in Paris. Last week, a post was shared by Al-Azaim Foundation, a media channel responsible for spreading messages from the IS-K branch of the Islamist militant group. IS-K also claimed responsibility for the deadly attack on Crocus City Hall in Moscow last month. "We should not be too naive" said Estanguet. "We know that people would try to benefit from this international media exposure. But again, it's up to us to remain calm to and to promote and defend what is most important in this event. And for me, it's sport. "We are working also with different countries around the world to make sure it will be a safe place during the games. And there is strong co-operation. So, we can be confident."

