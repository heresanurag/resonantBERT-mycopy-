title: 'Smoking: Prof Sir Chris Whitty backs tobacco phase-out plan - BBC News'
date: '2023-10-05'
section: General
url: http://www.bbc.co.uk/news/uk-67015821
content: |-
  The chief medical officer says as a doctor he sees people in hospital desperate to stop smoking.

  Prof Sir Chris Whitty, the chief medical officer (CMO) for England, has welcomed Rishi Sunak's plan to raise the legal age of smoking every year by a year so that eventually no-one can buy tobacco.

  He told the BBC: "As a doctor I've seen many people in hospital desperate to stop smoking because it's something that is killing them."
