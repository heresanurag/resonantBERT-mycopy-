  Ms Petito's body was eventually discovered in Wyoming on 19 September. A coroner ruled last week that she had been strangled to death and left for weeks before her body was found.

  Mr Laundrie was not charged with crimes relating to Ms Petito's killing. However, the FBI issued a federal arrest warrant and charged him with fraudulently using her debit card after her death.
