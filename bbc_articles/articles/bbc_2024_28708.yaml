title: Storm Bert set to cause flooding in parts of Wales this weekend - BBC News
date: '2024-11-21'
section: General
url: http://www.bbc.co.uk/news/videos/ce3ye0gv19no
content: |-
  The Met Office issues a yellow warning that runs between 05:00 and 19:00 GMT on Saturday.

  Snow and ice has caused disruption across the UK this week, but it's all about to change as Storm Bert arrives.

  This weekend could see flooding and strong winds.

  The Met Office, external has issued a yellow wind warning for mid and north Wales between 05:00 and 19:00 GMT on Saturday.

  Disruption to transport and road delays are expected as heavy rainfall hits the areas.

  BBC Wales' weather presenter Sabrina Lee runs through what to expect before making plans this weekend.

  Video filmed by Erin Lister and edited by Tink Llewellyn.
