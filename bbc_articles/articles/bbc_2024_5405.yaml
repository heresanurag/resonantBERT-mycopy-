content: |-
  Choose your top three selections from a list of 10 defining sporting moments of the past 30 years.

  To celebrate its 30th anniversary, BBC Radio 5 Live will be taking listeners through the 30 defining sporting moments of the three decades it has been on air.

  That long list has been narrowed down to a shortlist of 10 by a panel of 5 Live Sport broadcasters including Eleanor Oldroyd, John Murray, Katie Smith, Chris Jones and Alistair Bruce-Ball - and now it's your chance to get involved.

  You can listen to all of the moments below - and pick your top three selections from the list. The results will be revealed as part of 5 Live Sport's Anniversary Show on Thursday, 28 March.

  Voting closes at 12:00 GMT on Monday, 25 March. Please read the terms and conditions and privacy notice before voting.

  If you are viewing this page on the BBC News app please head here to vote.

  In the space of 10 days, Manchester United won the Premier League, the FA Cup and the Champions League. First they secured their fifth Premier League title in seven years with a 2-1 victory over Tottenham at Old Trafford, then they swept aside Newcastle 2-0 to win the FA Cup for the 10th time. The best was yet to come as they completed an unprecedented Treble with a scarcely believable 2-1 win over Bayern Munich at the Nou Camp.
