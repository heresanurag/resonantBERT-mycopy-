content: |-
  The president made a partial reversal this week - here's a look at where it leaves five of his key ambitions.

  Trump had five tariff goals - has he achieved any of them?

  This video can not be played To play this video you need to enable JavaScript in your browser.

  Donald Trump announced a massive tariff plan last week that would have upended the global economic order as well as long-established trading relationships with America's allies. But that plan - or at least a significant part of it - is on ice after the president suspended higher tariffs on most countries for 90 days while leaning into a trade war with China. So with this partial reversal, is Trump any closer to realising his goals on trade? Here's a quick look at five of his key ambitions and where they now stand.

  WHAT TRUMP SAID: For decades, our country has been looted, pillaged, and plundered by nations near and far, both friend and foe alike Trump's original trade plan packed a big punch that landed around the world, with a flat 10% baseline tariff on everyone (including some uninhabited islands) and additional "reciprocal" tariffs on the 60 countries that he said were the worst offenders. It sent allies and adversaries scrambling, as they stared down the prospect of a debilitating blow to their economies. The White House has been quick to boast about all the world leaders who have reached out to the president to make deals and offer trade concessions – "more than 75", according to Treasury Secretary Scott Bessent. Although the administration hasn't released a list of all the countries that Trump said on Tuesday were "kissing my ass" and promising to do anything, the US has announced it is in negotiations with South Korea and Japan, among others. THE TAKEAWAY: America's trading partners have 90 days to strike some sort of agreement with Trump, and the clock is ticking. But the fact that talks are happening indicates that the president has a good chance of getting something for his efforts.
