  • None What does the tariff pause mean for global trade?

  WHAT TRUMP SAID: Jobs and factories will come roaring back into our country...We will supercharge our domestic industrial base. Trump has said for decades that tariffs are an effective way of rebuilding America's manufacturing base by shielding it from unfair foreign competition. While some factories may be able to increase production in current facilities, more substantive efforts take time. And for business leaders to pull the trigger on "reshoring" their production lines and investing in new US factories, they will want to know that the rules of the game are relatively stable. The president's on-again, off-again tariff moves over the past week are inherently unstable, however. For the moment, it's difficult to predict where the final tariff levels will land and which industries will receive the greatest protections. It could be car manufacturers and steel producers today, and high-tech electronics companies tomorrow. THE TAKEAWAY: When tariffs are applied and removed seemingly at the president's whim, it's much more likely that companies – both in the US and abroad – will hunker down and wait for the dust to settle before making any big commitments.

