  WHAT TRUMP SAID: I have great respect for President Xi of China, great respect for China, but they were taking tremendous advantage of us. After Trump's tariff about-face on Wednesday, several White House officials – including Treasury Secretary Bessent - were quick to say that Trump's goal was to drop the hammer on the real villain, China. "They are the biggest source of the US trade problems," Bessent told reporters, "and indeed they are the problem for the rest of the world. If Trump wanted a battle of wills with China, testing each side's tolerance for economic and political pain, he got one – even if the president and his aides have hinted that they are looking for an exit ramp. On Wednesday, Trump said that he blamed past US leaders, not China, for the current trade dispute. The prior day, White House press secretary Karoline Leavitt said the president would be "incredibly gracious" if China reaches out to make a deal. THE TAKEAWAY: Even if this showdown is one Trump wants, picking a fight with the second-largest economy in the world, with military power to match, comes at enormous risk. And along the way America may have alienated the allies it needs most in such a confrontation.
  • None Why Trump is hitting China - and what might happen next

  WHAT TRUMP SAID: Now it's our turn to prosper, and in so doing, use trillions and trillions of dollars to reduce our taxes and pay down our national debt, and it'll all happen very quickly. During last year's presidential campaign, Trump regularly touted that his proposed tariffs would bring in vast sums in new revenue, which the US could then use to shrink its budget deficit, fund tax cuts and pay for new government programmes. A study last year by the nonpartisan Tax Foundation estimated that a 10% universal tariff – which is what Trump has landed on for at least the next 90 days – would generate $2tn in new revenue over the next 10 years. To put that in context, the tax cuts Congress recently included in its non-binding budget blueprint would cost approximately $5tn over the next 10 years, according to the Bipartisan Policy Center. THE TAKEAWAY: Trump wanted more tariff revenue, and if he sticks with his baseline tariffs, plus the additional levies on certain imports and larger ones on China, he's going to get it – at least until Americans switch to more domestic production, when the tariff money gusher could turn to a trickle.
  • None Is the US making $2bn a day from tariffs?

  WHAT TRUMP SAID: Ultimately, more production at home will mean stronger competition and lower prices for consumers. This will be indeed the golden age of America. Analysts and experts have offered a grab bag of other explanations about why Trump made such an aggressive move on trade last week. Was he trying to drive down interest rates, or devalue the US dollar or bring the world to the table for a new, global agreement on trade? The president himself hasn't spoken much about those kinds of elaborate schemes. One thing he has talked about relentlessly, however, is his desire to lower costs for American consumers - and he has promised that his trade policy will help address this. While energy prices dipped in the week since Trump announced his tariff plan, that may have been a result of fears that the trade wars could trigger a global recession. The consensus among economists is that new tariffs will drive up consumer prices, as tariffs are tacked on to the price of imports and, eventually, when there is less competition for US-made products. Last year, the Tax Foundation estimated that a 10% universal tariff would increase costs for American households by an average of $1,253 in its first year. Economists also warn that lower-income Americans will be hardest hit. THE TAKEAWAY: An increase in prices is an arrow moving in the wrong direction – and it represents an enormous potential liability for both Trump's political standing and his party's future electoral prospects.

