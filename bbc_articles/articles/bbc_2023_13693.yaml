title: Man arrested as police hunt for missing mum and children - BBC News
date: '2023-09-22'
section: London
url: http://www.bbc.co.uk/news/uk-england-london-66885093
content: |-
  Police are "extremely concerned" for Jamie-Leigh Kelly, her newborn baby and three-year-old daughter.

  Jamie-Leigh Kelly is missing with her newborn son and three-year-old daughter

  A man has been arrested on suspicion of child abduction, as a hunt was launched for a missing mother and two children.

  Jamie-Leigh Kelly, 31, left a centre for vulnerable mothers and children in Colindale, north-west London, with her newborn son and three-year-old daughter on Tuesday, the Met Police said.

  The children are under care orders and were taken from the centre against the wishes of staff.

  Ms Kelly got into a blue Ford Fiesta which then sped off, the force said.

  Police believe the driver of the vehicle was a woman and said neither the driver nor the car had yet been located.

  The blue Ford Fiesta was driven off at speed, police say

  A man in his 50s was arrested in connection with the investigation on Wednesday.

  He was held on suspicion of child abduction and conspiracy to kidnap and remains in police custody for questioning in Essex.

  Ms Kelly is described as white with green eyes, slim and about 5ft 4ins (1.6m) tall.

  She was wearing a white long sleeved top, jogging trousers and trainers when she left the centre.

  Det Supt Lewis Basford said he was "extremely concerned" for the welfare of Ms Kelly and her children.

  Her baby boy was born in mid-September and is "extremely vulnerable" as a newborn, the force said.

  Officers believe Ms Kelly is "being assisted" and has urged members of the public to call 999 immediately with any live sightings.

  She has links to Thurrock in Essex and Havering, east London.

