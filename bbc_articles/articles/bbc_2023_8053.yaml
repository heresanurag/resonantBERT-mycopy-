content: |-
  Sam Altman, CEO of OpenAI, testified to the US Senate that artificial intelligence regulations are needed.

  What are the regulations in Europe?

  Witness Christina Montgomery is speaking about Europe's AI Act - but what is it? The act, which is due to be voted on by lawmakers soon, is strict. It proposes a complete ban on facial recognition tech in public places, and varying levels of rules depending on the impact of the tool in question – so for example an email spam filter would face less scrutiny than a tool for diagnosing a medical condition. The US, on the other hand, has so far opted for guidelines and recommendations rather than bans. The UK is trying to position itself somewhere in between. In the early days of social media, tech firms insisted they could regulate themselves and didn’t need government intervention. We all know how that turned out. But that lesson has been learned and I think we will now see both lawmakers and tech firms wanting to avoid the mistakes of the past and their unintended, but toxic, consequences. OpenAI – backed, lets not forget, by billions of Microsoft dollars – will be lobbying hard to try to influence the incoming rules in a way which benefits the industry.
