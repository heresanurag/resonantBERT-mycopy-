title: Tory donor comments on Abbott 'racist and sexist' - Kwarteng - BBC News
date: '2024-03-14'
section: General
url: http://www.bbc.co.uk/news/uk-politics-68546206
content: |-
  Former Chancellor Kwasi Kwarteng has strongly criticised comments from the Tory's top donor about Diane Abbott.

  Former Chancellor Kwasi Kwarteng has condemned comments from Frank Hester, the Tory party's biggest donor, about MP Diane Abbott, who sits as an independent.

  Kwasi Kwarteng said the reported remarks from 2019 were “clearly racist, and clearly sexist” as well as “very stupid” and “totally unacceptable”.

  He added he had not heard what was said, and there “may be a context” that was not widely known.

  Mr Hester has apologised for making "rude" comments about the ex-shadow home secretary but added they "had nothing to do with her gender nor colour of skin".
