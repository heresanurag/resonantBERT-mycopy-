content: |-
  Entire villages were levelled after a 6.3-magnitude earthquake struck the province of Herat in Afghanistan.

  Entire villages were levelled after a 6.3-magnitude earthquake struck the province of Herat in Afghanistan on Saturday. Over 1,000 people were killed.

  The UN says villagers continue to use shovels and bare hands to search for the more than 500 people who are still missing.
