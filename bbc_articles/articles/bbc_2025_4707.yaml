title: 'World Rally Championship: Elfyn Evans wins Safari Rally Kenya to extend overall
  lead - BBC Sport'
date: '2025-03-23'
section: Motorsport
url: http://www.bbc.co.uk/sport/motorsport/articles/cx2ezed056vo
content: |-
  Wales' Elfyn Evans recorded back-to-back WRC victories for the first time by winning Safari Rally Kenya and extending his Championship lead to 36 points.

  Elfyn Evans is the first British driver to win the Safari Rally since Colin McRae in 2002

  Welshman Elfyn Evans won Safari Rally Kenya to extend his World Rally Championship (WRC) lead to 36 points after three rounds. The 36-year-old Toyota driver recorded back-to-back victories for the first time, finishing more than a minute ahead of Estonian Ott Tanak. Hyundai's Tanak led the race before breaking a driveshaft on Friday, while Evans' Toyota team-mate Kalle Rovanpera retired after a string of problems. It was Evans' first victory in Kenya but a fifth Safari success in a row for Toyota. "A huge well done to the team, they did a great job and I'm proud to be a very small part of Toyota's history at this special rally," said Evans who has established the largest championship lead ever recorded after three rounds of a WRC campaign. "I want to say thank you to everyone in Kenya for a very warm welcome and an amazing rally."

  Having won Thursday's opening stage and two on Saturday, Evans and co-driver Scott Martin took a lead of just under two minutes into Sunday. However, given the attritional nature of the rally, the Toyota Gazoo Racing duo opted for a safety first approach to the final five stages. They ceded 47 seconds on the final day but still finished one minute 9.9 seconds ahead of Tanak, with Thierry Neuville a further two minutes 22 seconds adrift. It meant Evans collected only two Sunday points, but with 25 for the rally victory it took his total to 88, following victory in Sweden last month and a runners-up spot in January's season-opening Rallye Monte Carlo. Last year's championship winner Neuville has moved up from fourth place to second on 52 points, with Tanak third on 49. Toyota's Takamoto Katsuta was on course for a fourth-place finish but damage sustained during a roll on the final stage prevented him from reaching the finish, promoting Great Britain's Gus Greensmith - who won the WRC2 classification - into sixth. Northern Ireland's Josh McErlean enjoyed mixed fortunes in the third race of his first WRC season. He lost 29 minutes on Saturday's opening run after breaking a steering arm on his Ford M-Sport Puma. However, McErlean and co-driver Eoin Treacy went on to deliver their best performance in a Rally1 car with the second-best time on stage 15. They placed 10th in Kenya and picked up two Super Sunday points but drop to 12th spot overall. Round four of the 14 race calendar is the Rally Islas Canarias from 24-27 April.
