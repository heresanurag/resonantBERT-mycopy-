  • None The Three Lions have kept seven consecutive clean sheets for the first time in their history. They have not conceded for 662 minutes.
  • None This was Ukraine's joint-biggest defeat in a match at a major tournament, equalling their 4-0 defeat by Spain in the group stages of the 2006 World Cup.
  • None Raheem Sterling has been involved in 22 goals in his past 21 games for England (15 goals, seven assists), while Harry Kane has been involved in 27 in his past 26 for the Three Lions (18 goals, nine assists).
  • None Sterling has provided six assists for Harry Kane for England in all competitions, more than any England player has assisted another in the 21st Century.
  • None Luke Shaw's assist for Harry Maguire was the first time two Manchester United players have combined for an England goal at a major tournament since David Beckham assisted Paul Scholes against Portugal at Euro 2000.
  • None England keeper Jordan Pickford has kept five clean sheets at Euro 2020 - no keeper has ever kept more in a single staging of the competition before.
