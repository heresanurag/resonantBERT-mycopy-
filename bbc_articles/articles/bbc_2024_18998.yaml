content: |-
  TikTokers are changing the tempo of songs for short viral moments - but for artists, making a hit tune might have just got a lot harder.

  TikTokers are speeding up songs - but are we forgetting the originals?

  Fan-made sped-up versions of RAYE’s single Escapism helped the artist climb the charts

  Some music fans now know 15-second sped up snippets of songs better than the real thing. It’s thanks to an emerging trend on social media, particularly TikTok, of creators changing the tempo of popular songs by 25-30%, to accompany short viral videos of dances or other themes. These versions are even helping some artists climb the official singles charts. In November 2022, fan-made sped-up versions of RAYE’s single Escapism, external helped the artist to achieve her first ever number one on the UK Official Singles Chart, nearly three months after its original release. An initial trend developed based around the lyric: “The man that I loved sat me down last night and he told me it was over, dumb decision." Users swiftly posted about their own “dumb decision” over sped-up versions.

  The phenomenon presents a very modern challenge - how can singers create the next hit tune when the one people actually listen to might sound so different? Sped-up listening emerged in the early 2000s as “nightcore”, launched by a Norwegian DJ duo of the same name, who sped up a song’s pitch and speed. This is now commonplace on our social media apps, where the speed of podcasts, voice notes, movies and more can be increased so that we can consume them in less time. Take Spotify, for example, where in 2023 more than a third of listeners in the US sped up podcasts and nearly two-thirds played songs at a quicker tempo. The streaming service confirmed to the BBC that it was currently testing a new, more widespread, feature that could potentially allow us to remix the tempo of songs and share them. Dr Mary Beth Ray, an author focused on digital music culture, says short-form video platforms like TikTok “constrain our ways of listening” into snippets - but those constraints also let you “experience a track in a new way”. “Short clips provide a quicker line to that dopamine rush social media wants us to feel - so there is an addictive element which we’re pushed towards.”

  Carpenter's single Espresso received “Double Shot” and “Decaf” releases, which got millions of streams

  BBC Radio 1 DJ Maia Beth feels it's now become hard for established labels and musicians to ignore this trend because “it can sometimes feel like if they don't release the [sped up] version, then someone else will”. Beth, who admits she can't imagine sitting and listening to a sped-up version of a song the whole way through, believes the trend shouldn't necessarily be a major distraction for musicians though. “Sped-up versions of tracks can help artists break through or go viral, although that initial success may not last,” the Radio 1 Anthems host said. Unofficial sped-up or slowed down tunes are different to a professional remix - they are far shorter and can be easily made by anyone, including on TikTok, Instagram Reels and other apps. But some of our biggest popstars are embracing them.

