  TikTok says it has noticed an increase in the number of sped-up and slowed down versions of catalogue tracks taken off the platform, then become officially released. These official changed-tempo releases are now grouped together with the original song in the UK Official Singles Chart, along with remixes, acoustic and live versions, helping artists to climb the ranks. That said, not everyone is happy with the trend. The popularity of speed altered versions can make it harder to distinguish original from remix while distorting an artist's intended pacing, mood and tone. In March, speaking on the A Safe Place Podcast, Lil Yachty said he was so embarrassed when additional versions of his song "A Cold Sunday" were released that he asked for them to be taken down. In October 2022, following one of Steve Lacy's shows as part of his Give You The World Tour, the audience appeared to not sing along to much of his hit Bad Habit. Some people shared videos of this online and suggested that a popular sped-up snippet version of the track was more recognisable to some of those in the audience. While some artists like them and others less so, it seems they are here to stay. For 23-year-old artist and producer, tonka._.b, from London, adjusting speed and tempo is all part of her creative process. “I like listening to my song, three times over - sped-up, slowed and normal,” she says, “as each gives a totally different feel, each opening the door to new audiences.”
