  In 2022, Summer Walker released the first completely sped-up album, a remixed version of her 2018 record Last Day of Summer, which came after a dance trend on TikTok. Billie Eilish has also released official fast and slow versions of songs, while Sabrina Carpenter’s record-breaking UK number one hits Please Please Please and Espresso received similar treatment.

