title: 'Haverfordwest paddleboard deaths: Ex-police officer in court - BBC News'
date: '2024-12-03'
section: Wales
url: http://www.bbc.co.uk/news/articles/cjr23349w90o
content: |-
  Nerys Bethan Lloyd, 39, is charged with gross negligence manslaughter after four people died.

  Nicola Wheatley, Morgan Rogers, Paul O'Dwyer and Andrea Powell died in the incident in 2021

  A former police officer and ex-paddleboard tour company owner has appeared in court charged with gross negligence manslaughter after the deaths of four people three years ago. Nerys Bethan Lloyd, 39, of Jersey Quay, Port Talbot, was released on unconditional bail to appear at Swansea Crown Court on 3 January. Paul O’Dwyer, Andrea Powell, Morgan Rogers and Nicola Wheatley died following an incident in the River Cleddau, in Haverfordwest, Pembrokeshire, in 2021. District Judge Mark Layton said Haverfordwest Magistrates' Court could not deal with the case, as the charges were too serious.

  Nerys Lloyd, wearing a dark coat and on the right, outside Haverfordwest Magistrates' Court

  Ms Lloyd, former owner of Salty Dog, the company operating the tour, has also been charged with one offence under the Health and Safety at Work Act. Mr O'Dwyer, 42, from Port Talbot, Ms Rogers, 24, from Merthyr Tydfil, Ms Wheatley, 40, of Pontarddulais, died in the incident. The fourth paddleboarder, Ms Powell, 41, from Bridgend, died a week later in hospital.
