title: Laurence Fox charged over Narinder Kaur upskirting image - BBC News
date: '2025-03-25'
section: UK
url: http://www.bbc.co.uk/news/articles/c62zy07d60ro
content: |-
  Actor will face court in April after sharing an intimate image of the broadcaster on social media.

  Fox was charged following a one-month investigation by police

  Laurence Fox has been charged with a sexual offence after allegedly sharing an intimate image of TV star Narinder Kaur without her consent on social media. The actor-turned-politician is said to have shared the 'upskirting' image of Kaur, a broadcaster who appears on Good Morning Britain and GB News, on social media in April 2024. At the time, Kaur, 52, described the incident as "unimaginably mortifying" in a post on X. The following day, Fox apologised to Kaur before adding it wasn't his "fault" that the compromising photo of Kaur had been taken more than 15 years ago.

  Fox, from Peldon in Essex, did not create the image of Kaur. Police have charged the 46-year-old after a month's investigation. He is due to appear in court next month. A spokesperson for the Metropolitan Police said: "A man has been charged with a sexual offence following an investigation by the Metropolitan Police. "Laurence Fox, 46, will appear at Westminster Magistrates' Court on April 24 charged with an offence contrary to section 66A of the Sexual Offences Act 2003. "The charge relates to an image that was posted on a social media platform in April 2024." Offenders found guilty of upskirting face up to two years in prison for taking an image or video under somebody's clothing in order to see their genitals or underwear. It is also against the law to share upskirting photographs taken by other people.
