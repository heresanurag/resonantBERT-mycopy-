title: Towie star James Argent sentenced for gender violence in Spain - BBC News
date: '2025-05-15'
section: Essex
url: http://www.bbc.co.uk/news/articles/cwyj4kd42gzo
content: |-
  Argent admitted the offence and is given a six-month prison sentence by a Spanish court.

  James Argent was sentenced in Spain for targeting his partner Nicoline Artursson

  Reality TV personality James Argent has been handed a suspended prison sentence for a gender violence offence against his partner while holidaying in Spain. The ex-The Only Way is Essex (Towie) star, 37, was on a getaway with former Miss Sweden, Nicoline Artursson, in Mijas, near Malaga, on 5 May. Argent admitted the offence and was given a six-month prison sentence, suspended for two years, court records shared with the BBC revealed. He was banned from contacting Ms Artursson, 32, during this period. Argent's representatives have been approached for comment.

  Argent, known as Arg, rose to fame on the ITV reality show, becoming one of its most prominent characters between 2010 and 2018. Spanish police said he was arrested on 5 May for "an alleged crime of domestic violence". Argent appeared before the Court of Violence against Women, in Fuengirola, later that day.

  The incident happened in the Spanish town of Mijas

  A spokesman for the Spanish Ministry of Justice said Argent "acknowledges the facts and admits the penalty". He said the crime was "ill-treatment in the field of gender violence" and that Argent must complete a gender violence rehabilitation course as part of his sentence. "The suspension would be lifted if [Argent] fails to comply with the measures imposed," the spokesman added. The victim, Ms Artursson, is a fashion model who was crowned Miss Sweden in 2011.

