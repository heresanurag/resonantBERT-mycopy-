  In just a few weeks, the club is organising the World Figure Skating Championships taking place in the city in March. "It all requires a lot from us, not just in running this club, not just in running the World Championships, but now also in managing grief," Zeghibe said when I asked him how they would cope. The event will be a chance to honour the lives lost, not only from this club. A total of 14 members of the figure skating community were killed in the crash. "I think looking to the future is part of the emotional healing process," he said, "and it's good to have things to focus on that are positive for the sport." "We're going to take it day by day, be there for our members as much as possible, and then figure out: How do we move forward?"
