  A BBC correspondent visited the Skating Club of Boston, which had connections to six crash victims.

  'On the cusp of greatness': Ice skating club reels from US plane crash deaths

  No one at the Skating Club of Boston had any doubt that 13-year-old Jinna Han and 16-year-old Spencer Lane would go far in a sport they had fallen in love with. Even at a club that has produced countless elite-level skaters - where the competition is as tough as it gets - the two stood out. "They had been sought out and identified as the future of the sport," the club's CEO Doug Zeghibe told me while standing alongside the rink where the two athletes trained day in and day out. "So, to see such promising talents snuffed out, it's hard. They really, truly were on the cusp of greatness and really, finally hitting their goals of representing not just the Skating Club of Boston but representing their country." That talent, on full display in videos that show them both performing with a strength and maturity beyond their ages, was why they were invited to the High Performance Camp that followed the US National Figure Skating Championships in Wichita, Kansas, this week. After the camp, they boarded an American Airlines regional jet on Wednesday evening, planning to fly home to Massachusetts via Washington DC. They were among the 60 passengers killed when the jet had a mid-air collision with a helicopter and fell into the Potomac River. Their mothers, Christine Lane and Jin Han, and the club's star coaches Vadim Naumov and Evgenia Shishkova, were also on board, meaning that six of the crash victims were all connected to the world-renowned skating club.

