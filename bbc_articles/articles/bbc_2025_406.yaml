  Skating at such a high level demands a huge commitment, with schoolwork being carried out online after hours on the ice each day. Inevitably, close relationships develop among coaches and club members alike and, in the face of such a disaster, the clubhouse is a natural place to gather. Just a few days ago, club members Alisa Efimova and Misha Mitrofanov won the US pairs title in Wichita before taking an earlier flight home. "They were just two sunshines that you get the energy from as soon as you see them," Efimova told me. "Every time I would walk into this ice rink, I would see them in the morning tying their skates, saying, just saying 'hello,' seeing their faces lit up." "Spencer was a firecracker, that's the best way to put it," Mitrofanov added. "He started skating fairly later than other skaters, but because of his amazing talent, he progressed so quickly." At the end of a hard day's training, they told me, the two would take their skates off and head upstairs to begin catching up on academic work. Now, in the club's entrance, photographs capturing them in motion on the ice are surrounded by tributes and flowers. Jinna has her arms outstretched. Spencer maintains a look of deep focus on his face. "You don't expect it," Mitrofanov said. "And when it happens, it breaks you."

  Tragedy in the skies - how a deadly mid-air collision between a passenger plane and military helicopter unfolded.

  Coaches Naumov and Shishkova, originally from Russia, were the 1994 world pairs skating champions. They leave a 23-year-old son, Maxim, another promising talent from Boston who finished fourth in the men's competition in Wichita. In its more than 100 years of history, the club has seen before how success can be quickly overshadowed by tragedy. It was home to 10 of the 18 members of the US figure skating team killed in a plane crash on the way to the 1961 world championships in Prague. CEO Zeghibe immediately thought of that crash as he watched the unfolding news on Wednesday night. "My first thought was this can't be happening again," he told me. "And I was just like, how can lightning strike twice?"
