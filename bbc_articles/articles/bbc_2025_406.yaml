  One of the club's many well-known alumnus, Nancy Kerrigan has also been at the club to show her solidarity and mourn the loss of the six lives. Before her 1994 Winter Olympics silver medal, an assailant struck her knee with a baton after a practice session. It was later revealed the attacker was hired by the husband of Kerrigan's rival, Tonya Harding. "The community stood behind me and I was grateful for that," she said. "And so, it's my turn now to hopefully be here. I'm not sure what it is to do. Maybe get a cup of coffee or hug. I'm here for hugs. I don't know, it's just I want to be able to give back what I feel like I got."

