  The top of the 850-year-old Kutubiyya mosque looks precarious after a 6.8 magnitude earthquake hit Marrakesh

  Dust can be seen around the minaret of the Kutubiyya mosque in Marrakesh after a deadly 6.8 magnitude earthquake hit the city.

  The video posted on X, formerly known as Twitter, prompted fears it could collapse.
