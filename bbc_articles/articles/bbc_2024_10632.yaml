title: Kenyan lion takes dog from family home, CCTV reveals - BBC News
date: '2024-05-27'
section: General
url: http://www.bbc.co.uk/news/world-africa-69060451
content: |-
  Jaci the rottweiler had been with the family for nearly two years and leaves her twin Laser behind.

  In a suburb on the outskirts of the Kenyan capital, Nairobi, a family is processing the news that their pet was taken by a lioness during the night.

  CCTV footage reveals the animal jumping up across the house gate, later leaving the same way while clutching a Rottweiler in her mouth.

  The BBC caught up with the pet's owners who are still shocked that their beloved animal was snatched away.
