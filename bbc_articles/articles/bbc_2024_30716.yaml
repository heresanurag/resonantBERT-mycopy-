title: Fearne Cotton announces split from husband Jesse Wood - BBC News
date: '2024-12-14'
section: Culture
url: http://www.bbc.co.uk/news/articles/c2dx5r3g6yzo
content: |-
  The pair have been married for 10 years and have two children, who she says will remain "their priority".

  Fearne Cotton and her husband Jesse Wood have split after 10 years of marriage. In an Instagram post on Friday, the TV and radio host, 43, said: "It is with a heavy heart that I let you all know that Jesse and I are ending our marriage." She added that their priority "will always be" their children. Cotton married Wood - son of Rolling Stones guitarist Ronnie Wood - in 2014, a year after announcing their engagement.

  The pair have a son, Rex, and a daughter Honey. Wood also has two children from a previous relationship. In her Instagram post, Cotton added: "We please ask that you respect the privacy of our family at this time."

  Last week, Cotton shared a health update after undergoing an operation to remove two benign tumours from her jaw. In an Instagram post, she said she was "very grateful they're benign" and added she was going to "be resting to get better before Christmas". Cotton started out in television in the 1990s presenting children's shows. She joined BBC Radio 2 in 2016 where she is known for presenting the network's Sounds Of The 90s show. In 2017, she revealed her struggle with depression in a new book, Happy. In an interview at the time, she also gave some practical advice for coping with it - and admitted it was a far cry from the life she portrays on social media. She currently hosts the Happy Place podcast where she has interviewed celebrities including film and TV star David Tennant.
