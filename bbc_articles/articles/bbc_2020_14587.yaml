title: Newborn baby found dead in Weston-super-Mare garden - BBC News
date: '2020-12-12'
section: Somerset
url: http://www.bbc.co.uk/news/uk-england-somerset-55289093
content: |-
  A woman believed to be the baby's mother has been found following an appeal, and taken to hospital.

  A member of the public found the body at a property in Victoria Quadrant

  A newborn baby has been found dead in a garden.

  The body was discovered by a member of the public in a private garden of a property in Victoria Quadrant, Weston-super-Mare, at about 08:50 GMT.

  A woman police believe is the mother was found following an appeal - she has been taken to hospital where she is receiving "expert medical attention".

  Police are treating the baby's death as unexplained. Det Ch Insp Mike Buck said it was "very sad and distressing".

  Part of Victoria Quadrant was sealed off

  He added: "During the course of our enquiries, information has been received which has helped us locate who we believe is the baby's mother.

  "This woman has been taken immediately to hospital where she'll receive the expert medical attention and professional support she needs."

