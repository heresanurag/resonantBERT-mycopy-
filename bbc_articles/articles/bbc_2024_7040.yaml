id: bbc_2024_7040
title: 'Watch: United Airlines plane loses tyre during take-off - BBC News'
date: '2024-03-09'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-68508958
content: |-
  The Tokyo-bound Boeing-777 was diverted to Los Angeles, where it made a safe emergency landing. No one was injured.

  Video shows one of the tyres from the plane’s main landing gear falling off seconds after the flight took off from San Francisco airport on Thursday.

  Debris landed in an airport staff car park, where at least one car appeared to have been damaged.
