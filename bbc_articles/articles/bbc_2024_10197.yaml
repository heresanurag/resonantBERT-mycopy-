  Eight people are dead and dozens more are injured after a bus carrying farm workers overturned.

  Eight people are dead and dozens more are injured after a bus overturned on a highway in Florida.

  Florida officials said the bus was carrying around 50 people on their way to work at Cannon Farms, in Dunnellon.
