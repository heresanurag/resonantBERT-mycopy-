content: |-
  Nicola Sturgeon says she cannot rule out re-imposing restrictions as a new daily high of 4,323 positive cases is recorded.

  'We need to up our game' against the virus

  Nicola Sturgeon ends by saying that the situation is much better than it was previously thanks to vaccination. But she says we must remember the virus is circulating around us. She says it is a moment where we need to "up our game" and make sure we are providing as much resistance to the virus as possible.
