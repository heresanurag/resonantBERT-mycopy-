content: |-
  Starmer's majority is down significantly from 22,766 in 2019 to 11,572 tonight.

  Labour leader Sir Keir Starmer has won his seat in Holborn and St Pancras in London.

  He won with 18,884 votes - with pro-Palestinian activist, independent Andrew Feinstein, in second place.

  His majority is down significantly from 22,766 in 2019 to 11,572.
