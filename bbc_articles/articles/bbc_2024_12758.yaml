  As a local councillor, Ross Clark has also been underestimated because of his age and experienced online abuse. At 21 he was the youngest member of South Lanarkshire Council when he was elected two years ago, while studying sports coaching at university. "You feel you need to prove yourself a bit more to be taken seriously," Ross says. "Sometimes when I walk in the council building people think I'm an intern." Now 23, he's standing for the Scottish National Party in a seat where he has lived all his life. He first became interested in politics during the 2014 Scottish independence referendum, when he was "raging" he was too young to vote. But it was after seeing the difference politicians could make to people's lives as a councillor that he decided to run to be an MP. Ross is well aware of the challenges that could lie ahead if he wins Hamilton and Clyde Valley. He cites the experience of the SNP's Mhairi Black, who was 20 when she was elected in 2015 and is standing down at this election. She blamed social media abuse and the "toxic" working environment of Westminster for contributing to that decision. Despite this, Ross is still determined to give this his best shot. "[Young people] aren't just our future, they're also our present, and they need to be involved in that decision-making process."
