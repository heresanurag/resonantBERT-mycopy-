  As a trans woman, Rebecca is well aware of the abuse being in the public eye can bring

  Rebecca Jones has just finished her degree in politics and is standing for the Liberal Democrats. She says many politicians don't understand the concerns of young people like her. She worked part-time in a cinema alongside her studies to be able to afford her rent. Now full-time, she says more than 60% of her wages go on housing. The 21-year-old wants to see maintenance grants brought back to help students cover living costs, as well as action to tackle unaffordable rents. Although she was only 13 when the UK voted to leave the European Union, it was the impact of Brexit on young people that got her into politics. By the age of 16 she had joined the Lib Dems and leafleted for the party at the 2019 general election. In 2022 she ran to be a local councillor in London, and the following year stood in Devon, where she grew up. She was "gutted" to discover she was only 18 votes short of being elected, but was determined to run again - this time to be an MP in Hackney North and Stoke Newington. As a trans woman, Rebecca is well aware of the abuse being in the public eye can bring. But she's encouraged by the support of other young people, particularly from the LGBT community. "If I get 10 votes or 10,000 votes, just having the knowledge that I've enabled somebody to get more involved in the democratic process makes every single bit worth it.”
