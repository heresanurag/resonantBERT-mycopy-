content: |-
  An 18-year-old who hasn't had his A-levels results yet is among those standing in the general election.

  Meet five of the youngest election candidates: 'I haven’t got my A-level results yet'

  They’re all under 30 and determined to make a difference - here, five of the youngest candidates tell the BBC why they’re standing in next month's general election. Last Thursday, Pedro Da Conceicao sat his final A-Level exam - but instead of celebrating with friends he was straight back out on the campaign trail. At 18 years old, Pedro - who is running as an independent in west London - is thought to be the youngest candidate standing in this year's election. He’d wondered about politics as a potential future career - but it was only when the general election was called at the end of May that he decided he would run to be an MP. "My mum thought I was joking when I first told her," he says. Born in Portugal, Pedro moved to the UK with his mother when he was baby, and says it was the underrepresentation of young people in Parliament which motivated him to stand. He cites his mother, an NHS nurse, as an influence on his politics. "I saw my mum come to the UK as an immigrant and work really, really hard," he says. "I saw first hand the benefit of immigrants and how they could help our economy."

  Pedro hopes to inspire other young people to get into politics

  Pedro also wants to see more investment in public services and efforts to tackle knife crime. He's seen some of his peers turn to drugs and gangs to make money to support their families. But, he says, many politicians are out of touch with his reality. "How can you expect people that have been privately educated or are way older to solve an issue that they can't relate to?” Running as an independent, without financial backing or a team behind him, has been a challenge. He covered the £500 deposit to stand - which is returned if a candidate gets 5% of votes cast - through a crowdfunder, as well as using earnings from his part-time restaurant job. "But hopefully I can inspire more young people to get involved in politics."
