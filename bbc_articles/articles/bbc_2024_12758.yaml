  The average age of MPs has remained around 50 for the past 45 years. Political journalist Michael Crick says while "there's always been young candidates", it's possible more could be elected this time. He points to a number of Labour candidates in their 20s who are running in seats which are potentially winnable. And if current polls are accurate, he says there could be a big turnover of MPs - with lots of new Labour faces. That, combined with the large number of experienced MPs standing down, could mean a drop in the average age of the new Parliament.

  Martha is 26 - the same age as the youngest MP in the last Parliament

  Labour candidate Martha O'Neil is hoping to be one of those fresh faces. The 26-year-old is standing in a new Welsh seat. Martha grew up in Ammanford, a former mining town, and was raised by her mum after her dad died when she was 10. It was her family's reliance on state support that inspired her to get into politics. Using her education maintenance grant to buy the books she needed to prepare for university, Martha won a scholarship to Cambridge and went on to work as a civil servant. She believes young people have a unique perspective they can bring to politics, and that's what she hopes to do in Caerfyrddin. "Making sure that we platform young voices is critical to make sure that we have a democracy that truly represents the UK as a whole."
