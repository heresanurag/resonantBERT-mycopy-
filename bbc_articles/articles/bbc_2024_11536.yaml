title: Death of fentanyl killer Luke D'Wit's relatives under review - BBC News
date: '2024-06-12'
section: Essex
url: http://www.bbc.co.uk/news/articles/ckrr72kr47mo
content: |-
  Detectives are exploring whether double-murderer Luke D'Wit also killed his father and grandfather.

  Luke D'Wit returned to the scene after he murdered Stephen and Carol Baxter at their home in West Mersea, Essex

  Detectives are reviewing the deaths of a convicted murderer’s father and grandfather in case he killed them and avoided detection, the BBC understands. Luke D'Wit, 34, was jailed for a minimum of 37 years in March after he used the opioid painkiller fentanyl to poison married couple Stephen and Carol Baxter in West Mersea, Essex. Police are now exploring whether D'Wit was responsible for the death of his father, Vernon, who had been prescribed fentanyl before he was found dead at his home in 2021. Officers "will not hesitate to act" if they uncover fresh evidence, an Essex Police spokesman said.

  Due to the subtle nature of poisoning, police are keen to establish if D'Wit killed anyone else before he was caught and jailed. As part of their review, detectives have also been re-examining how D’Wit’s grandfather came to die.

  Stephen and Carol Baxter were found dead in their armchairs by their daughter on Easter Sunday 2023

  Det Supt Rob Kirby previously told the BBC he had "absolutely no doubt" D'Wit would have committed further murders had he not been caught. He said he could not rule out the possibility D'Wit had already killed others before being convicted of murdering the Baxters. Det Supt Kirby described the killer as "one of the most dangerous men" he had seen during his career.

  Vernon D'Wit was found dead in a chair at the family home in West Mersea in 2021. Mr Baxter, 61, and Mrs Baxter, 64, were also discovered unresponsive in their armchairs at their Victory Road home on Easter Sunday 2023. Motivated by a "desire to control" them, D'Wit had manipulated the couple for two years before he laced their medication with a fatal dose of fentanyl and rewrote their will. He had extracted the fentanyl from patches originally prescribed to his father, the trial at Chelmsford Crown Court heard.

