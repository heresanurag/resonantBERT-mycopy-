  Mr Justice Lavender said following the death of D'Wit's father, the murderer had retained the drug "in abundance". A haul of the powerful opioid painkiller was found in a backpack at the home D'Wit shared with his mother in Churchfields, West Mersea. "Up to the conviction and sentence of Luke D'Wit, our determined focus has been securing justice in relation to the murders of Carol and Stephen," the police spokesman said. "As with any investigation of this magnitude, everything we have uncovered is being reviewed and should anything suggest this has been the case we will not hesitate to act."

  The trial heard D'Wit had befriended the Baxters after Mrs Baxter employed him for her shower mat business Cazsplash. He went on to create more than 20 personas to manipulate her into drugging herself with medication she was told would help her better manage the autoimmune illness she had been diagnosed with, Hashimoto's disease. However, the medication contained strong doses of promethazine and repeated use over two years left Mrs Baxter with dementia-like symptoms not associated with Hashimoto's. D'Wit later administered a lethal dose of fentanyl to both Mr and Mrs Baxter on Good Friday that year and watched them die via hidden cameras.

  A CCTV camera on the Baxters' house showed D'Wit leaving the property after administering lethal doses of fentanyl

  The judge said it was the conclusion of a "cruel and senseless" campaign fuelled by control. Reading her victim impact statement at court, the couple's daughter, Ellie Baxter, said "it was like my insides were on fire" when she discovered her parents' bodies. She described D'Wit as "a man so manipulative he hacked his way into our lives over a decade ago, schemed and thoroughly planned my parents' demise". Speaking to the BBC in March, Det Supt Kirby said D'Wit's downfall was “the arrogance that existed within him”. He said once the fentanyl link was established following toxicology tests of Mr and Mrs Baxter's bodies, the trail led straight back to D'Wit. “D’Wit went to great lengths to cover up his tracks. He deceived everyone who knew him,” he added.

  Luke D'Wit was jailed for 37 years after a jury found him guilty of murdering the Baxters
