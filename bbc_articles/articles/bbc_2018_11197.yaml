title: 'Vuelta a Espana 2018: Simon Yates set to win his first Grand Tour - BBC Sport'
date: '2018-09-15'
section: General
url: http://www.bbc.co.uk/sport/cycling/45535153
content: |-
  British cyclist Simon Yates is set to win the Vuelta a Espana, his first Grand Tour, after finishing third on stage 20.

  Britain's Simon Yates will win a first Grand Tour after finishing third on the Vuelta a Espana's penultimate stage.

  Yates leads stage 20 winner Enric Mas by one minute 46 seconds with Sunday's processional race to Madrid to come.

  Tradition dictates the race leader is not attacked on the final stage so he just needs to cross the line to win.

  It is the first time Britons have won all three Grand Tours in the same year with Chris Froome's Giro d'Italia title and Geraint Thomas' Tour de France win.

  Only twice before have riders from the same country won all three races in a season, but this is the first time it has been done by different people.

  And Yates' victory will be the fifth Grand Tour triumph in a row for Britain after Froome also won last year's Tour and Vuelta.

  "I think it's sinking in," said Yates. "I'm incredibly proud, and incredibly proud of the team also - they carried me through the entire three weeks. It's the first Grand Tour win for the team - it's unbelievable."

  The 26-year-old Mitchelton-Scott rider came close to winning one of the sport's three-week races in May when he led the Giro going into stage 19. However, he was undone by Froome's stunning solo ride as the Team Sky rider won a sixth Grand Tour.

  But there was to be no repeat at the Vuelta as Yates coolly kept the red jersey with a solid ride through Andorra.
  • None Read more: How 'battle-hardened' Yates learned from bitter Giro experience

  Saturday's stage featured six categorised climbs and more than 4,000m of ascending in a 97.5km race.

  Yates was content to sit in the peloton in the early stages as a group of 15 riders broke clear, with Thomas de Gendt the chief aggressor as he picked up points in his successful quest to win the King of the Mountains jersey.

  The first significant attacks came on the second ascent of the Coll de Beixalis with Miguel Angel Lopez, who started the day more than two minutes behind Yates, jumping clear.

  However, Yates, who was being superbly paced by twin brother and team-mate Adam, refused to chase, preferring to climb at a more steady rate and all the favourites reached the summit together.

  Nairo Quintana, the 2016 Vuelta champion, attacked on the descent and was joined by Lopez on the subsequent ascent of Coll de la Comella. However, the Colombians were unable to build a decisive lead and when Simon Yates attacked with 17km remaining, he was able to also drag Mas over to make a leading quartet.

  When asked why he attacked at that stage, Yates said his brother "was running out of legs".

  He added: "I knew that Lopez and Quintana were up the road, and Lopez especially had something to gain, so I knew he'd maybe work with me.

  "As they say, sometimes attack is the best form of defence. I gave it everything I had and thankfully it was enough."

  Alejandro Valverde, who won this race in 2009 and was second going into Saturday's stage, was unable to keep pace and ultimately lost his place on the podium, dropping to fifth overall.

  Quintana dropped back to try to pace Movistar team-mate Valverde, leaving Yates, Mas and Lopez at the front.

  While 23-year-old Mas and Lopez realised the need to push on in an effort to secure a podium spot, Yates seemed content to let them go and ride his own tempo to the finish.

  He crossed the finish line 23 seconds back after Mas beat Lopez to the line and also to second place overall.

  After a solid opening time trial, so often his Achilles heel in stage races, Yates showed his intent on stage four - the first mountain stage. He had lost a few seconds on stage two but got them back and more by finishing eighth at the top of the Puerto de Alfacar to climb up to third overall.

  He took control of the red jersey in rather fortuitous fashion on stage nine. He had slipped 14 seconds behind Valverde after the 38-year-old Spaniard won stage eight. But Yates finished ninth on a day when Ben King won out of the breakaway to move ahead of Valverde by one second and take the lead.

  The jersey was lost on stage 12 in what appeared to be a planned move with Yates saying his Mitchelton-Scott team "decided not to really chase anyone".

  He reclaimed it with victory on the climb of La Camperona on stage 14. Though the margin was only a couple of seconds, with bonuses applied he opened up a lead of 20 seconds over Valverde and 25 on the Spaniard's Movistar team-mate Quintana.

  The time trial on stage 16 threatened to be a stumbling block but Yates was the quickest of all the general classification contenders, taking another seven seconds out of Valverde.

  His 25-second lead over the 2009 Vuelta champion may have looked in threat but fears of a Giro-style meltdown were quashed on stage 19 when he attacked on the final climb to beat Valverde by more than a minute.

  And he cemented his place at the top of the standings with another assured ride on Saturday's final mountain stage.

