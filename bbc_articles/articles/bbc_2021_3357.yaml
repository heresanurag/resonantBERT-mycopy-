title: Meghan and Harry air criticisms of Royal Family - BBC News
date: '2021-03-08'
section: UK
url: http://www.bbc.co.uk/news/live/uk-56271580
content: |-
  The interview with Oprah Winfrey reveals their struggles with life inside the Royal Family.

  Harry: We asked for help but couldn't get it

  Harry says his biggest concern while living in Canada was that their security was going to be removed and people knew their location. He adds in a jibe at the Daily Mail newspaper at this point - saying that people knew their exact location "courtesy of the Daily Mail". He says the Palace's justification for removing security was "a change in status"- but Harry says he "pushed back" and asked whether there had been a change of threat or risk, to which the Palace said no. They decided to move to California because they felt they were not safe in Canada. Oprah asks them what was the tipping point to their decision to step back as senior royals. "It was desperate," says Harry. "I went to all the places which I thought I should go to to ask for help, we both did, separately and together. Oprah asks: "So you left because you were asking for help but couldn't get it?", "Yeah, basically," says Harry. "But we never left," he says. "We never left the family," adds Meghan, saying they only wanted to have a type of role that already exists - a non-senior royal. Harry says they wanted to "take a breath" from this "constant barrage".
