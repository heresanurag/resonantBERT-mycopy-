  Buzz continuing to grow around Raducanu - and she shows why

  Raducanu was supposed to face American 13th seed Jennifer Brady on Arthur Ashe Stadium - the world's biggest court - in her opening match, but there was a late change of plan for the Briton when the Australian Open finalist withdrew because of a knee injury.

  Instead she faced 128th-ranked Vogele on court 17 and, while facing an opponent with less pedigree was perhaps a piece of good fortune, she showed her ability to easily adapt to the situation.

  "I was very up for my match against Brady, I was looking forward to playing on such a big stage. I had to prep last minute but I had to focus on my game and what I could control," she said.

  Backed by a vocal crowd interested in seeing first hand why she has emerged as Britain's best young talent, Raducanu delivered with another superb performance.

  She showcased her heavy weight of shot, range of skills and improved athleticism since pulling out of her fourth-round match at Wimbledon with breathing difficulties and dizziness.

  "As long as she keeps her right head, the right people around her, the discipline, the work ethic, she will be in the top 10 in no time," Daniela Hantuchova, the former world number five and now an analyst, said on Amazon Prime.

  Raducanu did have a few problems sealing victory, though. After being unable to convert five match points as 31-year-old Vogele rallied, she showed more nerves with a double fault on her sixth match point.

  A brilliant reverse overhead volley set up a seventh opportunity, the execution of such a tough shot at a tense stage even drawing laughter from the Briton, who clinched victory when Vogele went long.

  Having not dropped a set at Flushing Meadows this week, and looking physically stronger, she now has the chance to avenge her recent defeat by Zhang.

  "I think I have improved in the last few weeks," Raducanu said. "Playing at this level week in week out you adapt and if you don't you're going to lose.

  "I've come quite far in maintaining the consistency of the high level and the longer points. As the weeks have gone on and I've played more matches I feel very confident in my game and taking the game to the opponent."

  Boulter - who like Raducanu came through qualifying to reach the main draw - failed to match the power of Samsonova and the world number 52's early break put her 3-1 up in the first set.

  The Briton, 25, immediately had four break-back points but failed to convert any of them and, although she saved three set points in the next game, Samsonova's impressive serving helped her close out the set.

  The 22-year-old Russian came out confidently at the start of the second and immediately broke world number 190 Boulter, who was playing with heavy strapping on her right arm.

  Samsonova kept hold of the momentum and continued to threaten before a second break gave her a chance to serve for the match and she slammed down a forehand at the net to seal her place in the second round.
