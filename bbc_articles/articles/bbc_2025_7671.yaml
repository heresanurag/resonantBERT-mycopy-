  Sir Ed also told the programme lots of people were confused and anxious about the guidance, for example over which toilet a trans man (biological woman) should use. The Lib Dem leader said his party accepted the Supreme Court ruling but there needed to be more debate in Parliament to reach a clear solution that "respects people's rights". The EHRC, which enforces equalities law and provides guidance to policymakers, public sector bodies and businesses, is expected to launch a two-week consultation to seek views from those affected in May. The watchdog is then aiming to provide an updated code of practice to the government for ministerial approval by the end of June. A spokesperson for the EHRC said: "The law is as set out in the Supreme Court's very readable judgment and is effective immediately. "Employers, service providers and others with duties under the Equality Act must follow the law and should take appropriate specialist legal advice where necessary. "But we know many people have questions about the consequences of the judgment and what it means for them, which is why we issued this [guidance] in the interim." The spokesperson added: "We remain committed to promoting equality and tackling discrimination in all its forms."

