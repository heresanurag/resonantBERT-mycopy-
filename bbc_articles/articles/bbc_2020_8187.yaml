  Bringing you the latest news from across England about the coronavirus pandemic.

  New cases down in Leicester but still way ahead

  The latest weekly report from Public Health England shows the rate of new coronavirus cases in Leicester was 116 per 100,000 in the week to 5 July, down from 141 per 100,000 the week before. Rochdale is now a distant second in England as Bradford's rate of new cases has fallen faster, putting it in third place. The figures now include both Pillar 1 and Pillar 2 tests. Pillar 1 tests are those done in hospitals or involving healthcare workers and until last week were the only ones where the data was broken down locally. Pillar 2 tests are those done in the community and it was these that surged in Leicester during June, leading to the local lockdown.
