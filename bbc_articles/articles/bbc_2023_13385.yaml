title: 'Concrete crisis: Headteachers in weekend dash to make schools safe to open
  - BBC News'
date: '2023-09-03'
section: UK
url: http://www.bbc.co.uk/news/uk-66695610
content: |-
  Many are altering timetables and seeking new classrooms after having to shut unsafe concrete buildings.

  Head teacher Caroline Evans and her staff sit in a temporary staffroom in the corridor of Parks Primary School in Leicester

  Headteachers in England are in a race this weekend to find ways to reopen their schools after being told to shut buildings made with unsafe concrete.

  Many from the 104 affected schools are busy rejigging timetables, seeking alternative classrooms and trying to rent temporary toilets.

  Frustrated parents are being emailed last-minute plans for home learning and moving children to other schools.

  The government said affected parents should have been informed by now.

  It said it would publish a full list of schools with buildings known to contain reinforced autoclaved aerated concrete (RAAC), but wanted to wait for headteachers to make initial contact.

  The Department for Education (DfE) told 104 schools and colleges in England to partially or fully shut buildings at risk and introduce safety measures, just days before the start of a new academic year.

  In Scotland, RAAC has been detected in 35 schools but First Minister Humza Yousaf said he has no plans to close any schools at this stage.

  The building closures across England are set to have far-reaching consequences for children and their teachers.

  Sarah Skinner, who is in charge of three schools in Suffolk and Essex built using the concrete that has been likened to an Aero bar, told the BBC the late notice was "incredibly challenging".

  The CEO of Penrose Learning Trust said one school has 12 classrooms out of use, another has 16 classrooms, a gym and toilet closed, and a third has 10 classrooms shut.

  "It just seems very late in the day, and that's what's created the problem to now be finding temporary accommodation, temporary toilets, marquees on fields, our kitchens are out action. There are a lot of things beyond finding a classroom we have to consider," she told BBC Radio 4 Today programme.

  "We've been on the phone all day to temporary classroom companies... we have a very little playground [in one school] so actually getting 10 classrooms in there is going to be a challenge, and then there's the logistics of getting electricity run to it safely."

  A headteacher at a special needs school in Essex has been calling parents individually to break the news.

  Louise Robinson, of Kingsdown School, said: "Instead of preparing to welcome our students back to class, we're having to call parents to have very difficult conversations about the fact the school is closed next week.

  "We're hoping that a solution can be found that allows us to open the school, at least partially, but that entirely relies on ensuring the safety of our pupils and staff, and approval by DfE."

  At one primary school, children will have to be served their school dinners in their classrooms, rather than the dining hall, and at a west London secondary school, students will need to bring in packed lunches while its canteen is out of action.

  The DfE said it was grateful to headteachers working at pace to ensure disruption is kept to a minimum and that it expected "rarer cases where remote learning is required" to be "for a matter of days not weeks".

  Education Secretary Gillian Keegan would inform Parliament next week "of the plan to keep parents and the public updated on the issue", it added.

  Writing in the Sun on Sunday newspaper, Ms Keegan said the government had "no choice" but to close schools, and that it was not a decision it had taken lightly.

  "I want to reassure families that this is not a return to the dark days of school lockdowns," she said.

  Labour will try to force the government to publish a full list of schools which are impacted when the Commons returns from its summer recess on Monday.

  The government has said it will release a full list "in due course" but has not provided a timetable. BBC News has been compiling its own list.

  The closure of schools at late notice will come as a headache to many parents who will have to take leave from work or arrange childcare for younger school children.

  One parent told BBC Essex she could have cried when she was told her child's school would be shut until at least mid-September as temporary classrooms were needed.

  "Literally I work Monday to Friday, so to try and find childcare has been a bit of a mission," Hayley, who did not give her surname, said.

  "To turn around and say 'Reece, you're not starting school this week' has been quite heart-breaking."

  She described the timing of the school closures as "rubbish" considering the issues around RAAC had been previously known.

