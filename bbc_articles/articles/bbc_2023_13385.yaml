  There were warnings on Saturday this could be just the tip of the iceberg, with concerns about the state of other public buildings like hospitals and courts.

  Dame Meg Hillier, chair of the Common's Public Accounts Committee, told BBC Radio 4's PM programme that seven hospitals were "totally built" with aerated concrete and around £1bn was being spent making them safe.

  The Labour MP also said she had visited one hospital where heavy patients had to be treated on the ground floor because of the risk of roof failure.

  She described the costs of working around the problem using props to support existing structures and surveying RAAC-affected areas as "eye-watering" and harder to absorb for small schools already facing tight budgets.

  Teachers' union NASUWT wants ministers to publish the list of affected buildings.

  "It could be years before all the schools are rectified. They may be able to put up props, conduct surveys and so on, but those are interim measures," said national negotiating official Wayne Bates.

  The government says it has been aware of RAAC in public sector buildings, including schools, since 1994 and has advised schools to have "adequate contingencies" in place since 2018.

  However, after a beam, which had been thought to be safe, collapsed last week, the matter of the safety of these buildings was given further attention by the government.

  On Thursday, the DfE said any space or area in schools, colleges or nurseries with confirmed RAAC should no longer be open without "mitigations" in place.

  Every case of suspected RAAC that has been reported to the DfE has been allocated a surveyor and will be visited "imminently", the BBC has been told.

  Schools in Scotland, Wales and Northern Ireland are also being assessed for the material.

  RAAC is a lightweight "bubbly" form of concrete used widely between the 1950s and mid-1990s - usually in the form of panels on flat roofs, as well as occasionally in pitched roofs, floors and walls.

  It is less durable than standard concrete and has a limited lifespan of about 30 years.

