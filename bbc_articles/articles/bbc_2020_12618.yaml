title: Covid makes Brazil's president Bolsonaro a hero to some - BBC News
date: '2020-11-22'
section: General
url: http://www.bbc.co.uk/news/world-54989189
content: |-
  President Jair Bolsonaro is seeing his approval ratings rise in the north-east of Brazil.

  Despite widespread criticism of how he has handled the Covid-19 pandemic, Brazil’s right-wing president Jair Bolsonaro is seeing his approval ratings rise in the north-east of Brazil, a region where he used to be hated.
