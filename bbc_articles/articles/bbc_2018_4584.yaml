  Earlier Pearson pipped India's Varsha Varman by a single target to take bronze. She revealed she will likely retire, with no shooting events at the Birmingham Games in 2022. "Probably at my age, 54, I'm going to retire from Olympic disciplines," she told BBC Sport. "So I think this will be it for me."

  In the lawn bowls, Scotland's Irene Edgar and Robert Barr, alongside directors Sarah Ewing and David Thomas, missed out on a bronze medal in the B2/B3 mixed pairs, with Wales edging it 13-12 with the last shot of a tie-break. The women's pair of Lesley Doig and Claire Johnston had a mixed day, enjoying a 36-10 victory over Cook Islands but losing 18-11 to Malaysia. The men's fours of Ronnie Duncan, Derek Oliver, Paul Foster and Alex Marshall defeated England 12-8 in round three. Scotland suffered a 57-37 defeat to Uganda in the netball. Lennie Waite was in the 3000m steeplechase final, but finished outwith the medal positions. A 2-0 win for Kirsty Gilmour over Aurelie Allet of Mauritius moved her into the last 16 of the women's badminton singles, however Kieran Merrilees missed out after a 2-1 loss to Kean Yew Loh of Singapore.
