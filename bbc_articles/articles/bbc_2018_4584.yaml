title: 'Commonwealth Games: Scotland beat overseas Games medal target - BBC Sport'
date: '2018-04-11'
section: Commonwealth Games
url: http://www.bbc.co.uk/sport/commonwealth-games/43722524
content: |-
  Scotland surpass their previous best overseas Commonwealth Games with at least 34 medals guaranteed after shooting and boxing success.

  This video can not be played To play this video you need to enable JavaScript in your browser.

  Scotland surpassed their previous best tally at an overseas Commonwealth Games with 34 medals guaranteed. David McMath, 21, won Scotland's seventh gold of the Games in double trap shooting after Linda Pearson, 54, earlier won a bronze in the women's version. And Maria Lyle won silver in the women's T35 100m final. It means Scotland have won 32 medals with two more to come in boxing, beating the previous best of 29 medals at Melbourne 2006.

  Heatly, 20, finished third behind England's Jack Laugher and Australia's James Connor in the 1m springboard. He became Scotland's first Commonwealth diving medallist since his grandfather, Sir Peter Heatly, won gold in 1958, one of five medals he won. Lucas Thomson also reached the final, but was well off the medal positions. McMath, a civil engineering student, came 10th in the World Championships last year but clinched Scotland's 30th medal overall.

  With Heatly's bronze, their current tally now stands at 31 - seven gold, 10 silver and 14 bronze - with boxers McFadden and Docherty guaranteed at least bronze medals. Scotland's highest ever medal tally at a Commonwealth Games came on home soil in Glasgow in 2014, when they won 53 medals. McFadden, 22, won an unanimous decision against Pakistan's Syed Muhammad Asif in the 52kg class and next fights on Friday against Northern Ireland's Brendan Irvine for a chance to progress to a gold-medal deciding bout. Docherty, 20, won a split decision against England's Benjamin Whittaker to reach the 75kg semi-finals and now goes up against Wilfried Ntsengue of Cameroon. Nathaniel Collins was unable to make it three out of three when he lost to Australia's Harry Garside.

