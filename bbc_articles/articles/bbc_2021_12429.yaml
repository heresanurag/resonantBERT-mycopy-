title: Westfield Stratford closed after fire in first floor shop - BBC News
date: '2021-10-17'
section: London
url: http://www.bbc.co.uk/news/uk-england-london-58938824
content: |-
  The complex in east London was evacuated after the discovery of the small fire in a first-floor shop.

  Firefighters brought the small blaze on the first floor under control

  Westfield in east London was closed due to a fire inside a shop.

  Witnesses said the concourse of the shopping centre, in Stratford, "filled with smoke" as the centre was evacuated just after 10:00 BST.

  The small fire, within a shop on the first floor, had been brought under control by about 11:45 BST.

  The centre was closed to staff and shoppers for five hours but has since reopened. Car park users would not be charged for the morning, bosses said.

  About 60 firefighters were at the scene at one point, the London Fire Brigade said.

  Crews from a number of stations were sent to the scene, fire bosses said

  Crews from Stratford, Leytonstone, Leyton, Plaistow and other surrounding fire stations went to the scene.

  Only "a small part" of a shop was damaged, the brigade said, and the cause of the fire is not yet known. No-one was injured.

