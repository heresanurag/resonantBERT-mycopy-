  Tennis star Sir Andy Murray says he still feels "like Andy" after being given a knighthood in the New Year Honours list.

  Tennis star Sir Andy Murray said he still feels "like Andy" after being given a knighthood in the New Year Honours list.

  He ended 2016 with a win over Milos Raonic at the Mubadala World Tennis Championship.
