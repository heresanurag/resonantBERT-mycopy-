title: 'Storm Eunice: People urged to only travel ''if absolutely necessary'' - BBC
  News'
date: '2022-02-16'
section: England
url: http://www.bbc.co.uk/news/uk-england-60403455
content: |-
  Cornwall Council is warning people to only travel "if absolutely necessary" this Friday.

  The Environment Agency is advising households to protect themselves from possible flooding and urging people to stay away from the coast on Friday

  People in Cornwall are being urged to only travel "if absolutely necessary" this Friday as Storm Eunice is set to cause disruption.

  Cornwall Council, which issued the warning, said people across the county were "being urged to take precautions".

  Those living in flood-risk areas along the north coasts of Cornwall, Devon and Somerset have been told to prepare for possible flooding.

  People are advised to stay away from the coast.

  The Environment Agency said strong winds, large waves and tidal surges were likely to cause wave-overtopping and floods during high tide on Friday.

  An amber weather warning for wind is in place across most of England from 03:00 GMT until 21:00 on Friday.

