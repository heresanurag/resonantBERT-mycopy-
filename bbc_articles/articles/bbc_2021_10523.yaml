content: |-
  Team GB cyclist Matt Walls is crowned Olympic champion on his debut with a dominant performance in the men's omnium.

  This video can not be played To play this video you need to enable JavaScript in your browser. Tokyo Olympics: GB's Matt Walls wins the gold medal in the men's omnium

  British cyclist Matt Walls was crowned Olympic champion on his debut with a dominant performance in the omnium. The 23-year-old finished on a total of 153 points, 24 more than silver medallist Campbell Stewart of New Zealand, while Italy's defending champion Elia Viviani took bronze. His victory earns Team GB's first track cycling gold medal at the Tokyo Games. Walls adds an Olympic medal to his world championship bronze and European title in the event. "I managed to get a good lead coming into the end. It's been a hard day but I came into that points race with a bit of a lead and breathing room," he told BBC Sport. "Thank you to all my family and friends. I wouldn't be here without them, especially my parents." Walls' medal was Team GB's 50th of the Tokyo Olympics, and the 16th gold. Oldham's Walls is Great Britain's first male Olympic champion in the omnium, after Mark Cavendish's silver at Rio 2016 and Ed Clancy's bronze at London 2012 - when the event was first included on the Olympic programme. Laura Kenny is the two-time defending champion in the women's event, which takes place on Sunday. Elsewhere on Wednesday, Jack Carlin reached the sprint semi-finals but two-time defending champion Jason Kenny is out. Kenny was beaten in the quarter-finals by Dutch world champion Harrie Lavreysen, ending his nine-year reign. Katy Marchant saw her keirin campaign cut short in the quarter-finals after she was caught up in a crash.

