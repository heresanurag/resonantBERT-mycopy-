title: Hundreds run into sea for Boxing Day swim in Cromer and Aldeburgh - BBC News
date: '2024-12-27'
section: General
url: http://www.bbc.co.uk/news/videos/c1el990nq20o
content: |-
  Aerial footage captures the moment hardy swimmers take the plunge as part of the festive tradition.

  Aerial pictures captured the moment hundreds of hardy swimmers ran into the North Sea at traditional Boxing Day dips.

  Many were dressed in festive jumpers and hats as they took the plunge at Cromer for the North Norfolk Beach Runners' Dip, which was also combined with a 20-minute fun run.

  Meanwhile, more brave souls were taking part in the Aldeburgh Boxing Day Swim in Suffolk, which was founded in 1988 and was this year raising money for the RNLI and Make A Wish foundation.

  One of the organisers Paul Rosher said it was always an enjoyable event despite the cold: "People were absolutely lit up. It's a great day and we raise a huge amount of money for charity."
