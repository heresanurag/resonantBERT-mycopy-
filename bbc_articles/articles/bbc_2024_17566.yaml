title: 'Newspaper headlines: ''Change begins'' as Labour PM will ''fight until you
  believe again'' - BBC News'
date: '2024-07-05'
section: The Papers
url: http://www.bbc.co.uk/news/articles/cz9dnnrg22vo
content: |-
  Saturday's front pages lead on Labour's historic election win, as Sir Keir Starmer becomes the UK's next prime minister.

  'Change begins' as Labour PM will 'fight until you believe again'

  The Daily Mail likens it more to a civil war, external, as one former cabinet minister tells the paper the Conservatives "were left vulnerable by a Boris-shaped hole in their defences, through which Reform was able to stroll unchallenged". In his column in the paper, Boris Johnson sets out a 10-point plan on how the Tories can return to government as soon as possible, after what he calls "the atomic bomb that has detonated over the British political landscape". But the Tories will need to find a new leader first and according to the Daily Mirror, external the former home secretary, Suella Braverman, has already fired the starting pistol in a leadership race. The Guardian names, external the former business secretary, Kemi Badenoch, as another "near-certain contender". It claims her run "would most likely be characterised by her apparent ability to turn the most innocuous exchange into an argument". The Times adds James Cleverly, Dame Priti Patel, Victoria Atkins and Tom Tugendhat to the list of Tories said to be weighing up a leadership run, while the Sun says the former immigration minister, Robert Jenrick, could launch his bid on the Sunday morning political shows. But, whoever is running, one moderate Tory warns the Financial Times, external that "the leadership contest will be dominated by one question: how do you beat Reform?". Reflecting on what it calls the SNP's "hammering at the polls", the Scotsman, external says John Swinney has been "forced into rethinking" his party's approach to independence. The paper says he will have to "steer the Scottish National Party in a new direction, with a much-reduced crew". The National claims the result presents, external "an opportunity for a new start". It recommends the SNP refreshes the arguments for a new generation of independence voters. And, the front page of the Daily Express, external praises Rishi Sunak for displaying "warmth, generosity of spirit and true graciousness" as he stepped down, while also acknowledging that his successor is "undoubtedly decent and sincere".

