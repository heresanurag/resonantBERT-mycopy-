title: Haunting skies over the UK feature rare asperitas clouds - BBC Weather
date: '2022-04-12'
section: General
url: http://www.bbc.co.uk/weather/features/61084324
content: |-
  These wave-like asperitas clouds are seen so infrequently they were only added to the official global cloud atlas five years ago. Simon King explains.

  These wave-like asperitas clouds are seen so infrequently they were only added to the World Meteorological Organisation's International Cloud Atlas five years ago. BBC Weather forecaster Simon King explains more.
