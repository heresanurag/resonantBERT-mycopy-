title: A third of teachers reported pupil misogyny last week - survey - BBC News
date: '2025-04-09'
section: Family & Education
url: http://www.bbc.co.uk/news/articles/c5yr0zw65lro
content: |-
  Teachers also told a survey commissioned by BBC News they feel ill-equipped to tackle the issue.

  A third of teachers reported misogyny among pupils last week, survey suggests

  More than a third of secondary teachers have reported misogynistic behaviour from pupils at their school in the last week, a survey commissioned by BBC News suggests. About 40% of the teachers who responded also said they felt ill-equipped to handle such conduct. The BBC asked 6,000 secondary teachers about their experiences of misogyny in the classroom, using the survey tool Teacher Tapp. The government says it has published guidance for teachers on dealing with extreme ideologies and will protect children online.

  It comes as teachers and parents say they are increasingly worried about the misogynistic and violent content that children - especially boys - are being exposed to online. Misogyny can take many forms, but is commonly characterised as prejudice against or objectification of women. Beacon Hill Academy, a secondary school in Dudley, has a "zero tolerance" approach to derogatory language in the classroom, and takes tough action before it leads to more serious behaviour. Head teacher Sukhjot Dhami says the Netflix drama Adolescence has raised awareness among parents, but misogynistic views in schools "have always been there". "We've always combated those views, and we've always worked with young people - and that's the same for racist views and homophobic views," he says. After Adolescence aired, Mr Dhami sent a letter to Beacon Hill parents explaining some of the emojis used by incels, or "involuntary celibates" - a type of misogynistic online culture - and a guide to some of the language to look out for. He says he's "extremely worried" about the access young people now have to spaces online where hate is normalised. "We've done parental sessions in school," he says, "and we're emphasising to parents that they really have to get control of what their child is seeing and doing at home."

  Head teacher Sukhjot Dhami says it's important children are protected from harmful online content both at school and at home

  Beacon Hill Academy uses data gathered in classrooms to identify safeguarding issues early. If a pupil says something sexist in class, or types something offensive on a school computer, it will be logged so the school has a joined-up view of the pupil's behaviour. The safeguarding team can then intervene before a more serious incident happens. Year 10 pupil Adam, 14, says he was negatively affected by online videos promoting harmful ideologies which he would see every day - and which still pop up regularly on his feeds. "You'll see videos saying, 'You have to be a man', and that if you talk about how you feel then you're not a man at all," Adam says. "That's how manipulative it is - it indoctrinates you."
  • None Who is Andrew Tate? The self-proclaimed misogynist influencer Watching this type of content was affecting Adam's mental health, but he says starting counselling at school has really helped. He says he now knows "it's not wrong to speak about how you feel", but used to think that as a teenage boy he would always have to "laugh it off - no matter how bad the comment is".

