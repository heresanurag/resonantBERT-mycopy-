  BBC News commissioned a survey of more than 6,000 secondary school teachers in England through the survey tool Teacher Tapp to get a sense of how significant a problem misogyny is in classrooms.
  • None More than a third (39%) of secondary school teachers said they are aware of at least one incident of misogynistic behaviour from a pupil in the last week
  • None One in 10 secondary school teachers said they were aware of more than three incidents of misogyny by pupils in the last week
  • None A majority of teachers who have been teaching for at least five years (61%) said they had seen increases in misogynistic behaviour among pupils since they started teaching
  • None Nearly half of teachers surveyed (45%) want more guidance from the government on tackling misogyny
  • None A significant proportion of teachers surveyed (40%) weren't aware of what the current government guidance is on tackling misogyny While boys have largely been the focus of recent discussions around misogyny, their female classmates are often the ones most impacted by it. A recent study by researchers at University College London (UCL) found teenage girls in England are significantly less likely to feel safe in school than their male peers since the Covid-19 pandemic. Theresa, 15, who is also in Year 10, says teenage girls regularly hear sexist comments outside of school. "Outside of school some boys will be like, 'Oh it's the chuzz group, it's the ugly girls,' and this and that," she says. "They did do an assembly about how to treat women and not to objectify them."

  The government has recently published specific guidance for secondary teachers on how to deal with pupils showing signs of extreme misogyny in the classroom, particularly around incel culture. But teachers say wider guidance on misogyny is needed in relationships, health and sex education (RHSE), which has been compulsory in all schools in England since 2020. The government says its RHSE curriculum is currently under review and they will "ensure young people learn about healthy relationships, boundaries and consent from primary school". A spokesperson said more online protections outside of the classroom were also being brought in as part of the Online Safety Act. Beacon Hill PE teacher Karl Quiney says he is worried about the numbers of teenage boys who are being exploited by online misogyny at a difficult time in their lives. "We see a range of emotions amongst the young lads as they are growing into young men," Mr Quiney says. "There are certain signs of vulnerability - that feeling of self worth, needing that feeling of belonging." He says teachers need to counteract the online influencers promoting toxic masculinity. "If they're shown celebrity status with lots of money and fast cars, that's a really powerful message for young men who look around them and haven't got those material things," Mr Quiney says. "Our role as teachers is to provide them with positive role models."

