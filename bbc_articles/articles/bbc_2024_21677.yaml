content: |-
  Tom Sisley says his family is angry and fearful over the decision to release his sister's killer.

  Man who killed ex to be released after appeal denied

  Gemma Sisley was killed by her former partner when she went to get some of her belongings

  The family of a woman killed by her ex-partner have had an appeal against his release refused. Jason Burrows was jailed for a minimum of 15 years in 2009 after strangling Gemma Sisley in Milton Keynes while she was collecting her belongings after ending their relationship. In July, the Parole Board recommended Burrows' release, despite the family's concerns he still posed a danger to them and the public. The family have been told he will likely be released in October, in the week of the 16th anniversary of Ms Sisley's murder.

  The family appealed the Parole Board's decision but was told there were no grounds for the case to be reviewed. Tom Sisley, who was 17 when his sister was killed, said the 22-year-old was "the corner pin of our family". He said the family felt angry and frustrated - and feared for their safety when Burrows is released. "We are angry because he's still got half his life left to live and he's robbed Gemma of 70 to 80 years," he said. "There's also a bit of fear."

  Tom Sisley said the parole system did not consider victims and their families enough when making decisions

  Mr Sisley said he was worried that, despite licence conditions, Burrows would be able to target his family and Gemma's friends. He said: "He's got licence conditions but it feels like no-one would recognise him, it's been 15 years. "He can be walking around the street and people won't know his story or what he's capable of. He's clearly capable of brutal and evil acts. "We don't think he's been rehabilitated or is safe to be out in public."

  Mr Sisley said Burrows had robbed his sister of 70-80 years and given his family a life sentence

  Mr Sisley said he continued to believe the parole system was "not fit for purpose". "It feels really biased in favour of this life criminal," he said. "He's done a horrible, heinous crime, ruined our family and affected Gemma's friends."

  Burrows is due for release the week beginning 14 October, the same week that marks the 16th anniversary of Ms Sisley's death, which Mr Sisley said feels "like a kick in the teeth". "Where's the thought for the family, the victims, who have a life sentence?" he said. The Parole Board's original decision, seen by the BBC, said Burrows had completed accredited programmes before being moved to an open prison, where it said he had complied well with the regime and reintegration into the community. A HM Prison and Probation Service spokesperson said: “We know this will be incredibly difficult time for Gemma Sisley’s family and our sympathies remain with them. “We thoroughly examined the Parole Board’s decision and concluded there were no grounds to ask them to reconsider their decision. "Jason Burrows will remain on licence for the rest of his life and can be recalled to prison if he breaks the terms of his release.”

