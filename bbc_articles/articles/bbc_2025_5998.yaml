content: |-
  Actor Mickey Rourke gets a formal warning for "offensive and unacceptable" language about JoJo Siwa.

  Rourke warned over 'homophobic' remarks to Siwa in Big Brother

  Mickey Rourke is known for films like 91⁄2 Weeks, Year of the Dragon and The Wrestler

  Hollywood actor Mickey Rourke has been given a formal warning for using "offensive and unacceptable" language towards JoJo Siwa in Celebrity Big Brother. The Oscar-nominated star entered the ITV reality show on Monday alongside the 21-year-old TV and social media personality, and 11 other celebrities. Siwa accused Rourke, 72, of being "homophobic" for saying he was "going to vote the lesbian out real quick" and making other comments about her sexuality. As a result, Big Brother told him: "Further language or behaviour of this nature could lead to you being removed from the Big Brother house."

  Rourke later apologised to JoJo Siwa after the exchange, which airs on ITV on Wednesday

  Rourke later apologised to Siwa, and told the housemates he "didn't say it out of meanness". According to a transcript released by ITV ahead of Wednesday evening's episode, Rourke first asked Siwa if she liked boys or girls. She replied: "Girls. My partner is non-binary." He then told her: "If I stay longer than four days, you won't be gay any more." She responded: "I can guarantee I'll still be gay and I'll still be in a very happy relationship." He then made the comment about voting her out, and apparently referred to an earlier conversation about the smoking area when he said: "I need a fag," before gesturing to Siwa and adding: "I'm not talking to you." After being told he couldn't say that by former Love Island star Chris Hughes, Rourke claimed: "I know. I was talking about a cigarette."

  The US actor was called into the diary room, where Big Brother told him his "language was offensive and unacceptable" and gave him the formal warning. He responded: "I apologise. I don't have dishonourable intentions - I'm just talking smack, you know. I wasn't taking it all so serious. I didn't mean in it any bad intentions and if I did, sorry." After going back into the main house, Hughes told him Siwa "was very upset earlier", and she informed Rourke it was "not an acceptable word". He told her: "I want to apologise. I've got a habit of having a short fuse. And I don't mean nothing by it. I do mean it [sorry]. If I didn't, I wouldn't say it to you."
