content: |-
  Danni Wyatt-Hodge and Nat Sciver-Brunt guide England to an impressive seven-wicket win over South Africa at the Women's T20 World Cup.

  This video can not be played To play this video you need to enable JavaScript in your browser. Watch the best shots from England's victory over South Africa

  A much-improved batting performance saw England seal a seven-wicket win over South Africa at the Women's T20 World Cup. On a more batter-friendly surface than the previous encounters at Sharjah, Danni Wyatt-Hodge's 43 and Nat Sciver-Brunt's unbeaten 48 helped England reach their target of 125 with four balls to spare. The pair rode their luck, with several chances falling short of fielders or into gaps, but were ultimately rewarded for taking calculated risks and smart running between the wickets - in stark contrast to the one-dimensional approach against Bangladesh. Opener Maia Bouchier struggled as South Africa dominated the powerplay, before Alice Capsey - who was dropped on nought - added a dynamic 19 to take the sting out of the Proteas' attack, before the experienced duo's match-winning partnership of 64. South Africa, who knocked England out of the previous T20 World Cup in 2023, were restricted to 124-6 after another stellar performance from England's spinners. Proteas captain Laura Wolvaardt hit 42 but England squeezed the rest, with left-armer Sophie Ecclestone delivering an impeccable 2-15 and Linsey Smith, Charlie Dean and Sarah Glenn claiming a wicket each. All-rounder Marizanne Kapp threatened to finish the innings explosively before she was bowled by Ecclestone for a 17-ball 26, but Annerie Dercksen's 20 from 11 balls secured a total over a run a ball, which have been hard to come by throughout this tournament. England are in a promising position to finish top of Group B, and South Africa are still in contention for a semi-final spot as both teams take on winless Scotland next, with the Proteas playing on Wednesday and England on Saturday.

