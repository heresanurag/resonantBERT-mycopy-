  While the sluggish pitches and slow outfields at Sharjah have bamboozled many batters so far – including England's – they have certainly played into the hands of the enviable array of spinners that Heather Knight has at her disposal. The opening match against Bangladesh was a rare wicketless day for Ecclestone but she responded with a sublime spell on a pitch that offered just enough to aid the extra bounce from her height. But there are still areas of concern for England. The spinners salvaged an uncertain batting effort against Bangladesh and here they had to make up for a shabby fielding performance, with four dropped catches. Brits was dropped twice and Wolvaardt was put down on 22 as the pair continued their fine form following unbeaten half-centuries against West Indies in their first outing. South Africa reached 37-1 after the powerplay, a decent score considering the tournament's low-scoring trends, but England's quartet of spinners turned the screw, with only 17 runs added between overs seven to 10. Anneke Bosch stuttered her way to 18 from 26 balls, while the explosive Kapp and Chloe Tryon waited in the dugout, which aided England's cause. Ecclestone reaped the rewards, drawing a shot of frustration from Wolvaardt in the 16th over before Kapp, whose added impetus was vital but came too late, was bowled in a critical 19th over that included just four runs scored. In a World Cup that is so far dominated by low scores and spinners, England are blessed and an in-form Ecclestone could prove to be the cheat code.

  This video can not be played To play this video you need to enable JavaScript in your browser. 'Really good win' - Sciver-Brunt hits the winning runs as England beat South Africa

  Experienced opener Wyatt-Hodge was the one batter to look close to comfortable against Bangladesh's spinners and she followed suit against South Africa's seam-heavy attack. With Bouchier struggling at the other end, Wyatt-Hodge absorbed the pressure and quelled her natural attacking instincts. Both her innings so far have been a masterclass in adapting to surface and situation. Capsey clubbed three fours in her 16-ball knock, with her proactive approach putting South Africa on the back foot after England fell behind the required rate in the powerplay. Both Capsey and Sciver-Brunt pulled and swept to throw the bowlers off their lengths, with the latter seeing England home by whacking Khaka over cover in style for the four runs that were required from her final over. However, neither would have been able to play in such a manner without Wyatt's gritty innings.

