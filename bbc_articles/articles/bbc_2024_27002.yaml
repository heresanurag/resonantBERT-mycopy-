  England captain Heather Knight: "It was a really controlled win, we really restricted them. It's tricky to chase out here. “We controlled that chase brilliantly, kept a calm and level head. That partnership of Nat Sciver-Brunt and Danni Wyatt-Hodge was brilliant to watch." South Africa captain Laura Wolvaardt: "Obviously very disappointed with the result, 10 to 20 more runs could have made it interesting and obviously we didn't take our chances in the field either." Player of the match, England spinner Sophie Ecclestone: "It's always great to do it against the world's best and to get those two big wickets in Laura Wolvaardt and Marizanne Kapp, I was happy. "I am very lucky to have four spinners in the team. All of them are high-class players and we work well as a unit so I am absolutely buzzing to play alongside them.”
