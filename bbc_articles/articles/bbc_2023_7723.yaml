title: Russia's 'nervous' Victory Day parade... in 78 seconds - BBC News
date: '2023-05-09'
section: General
url: http://www.bbc.co.uk/news/world-europe-65535468
content: |-
  The BBC's Will Vernon in Moscow explains why recent events are casting a shadow on celebrations.

  Events have been held in Russia to mark Victory Day, an annual holiday which commemorates the Soviet victory over Nazi Germany in World War Two.

  But this year's celebrations were somewhat muted, with some events scaled back over security concerns.

  The BBC's Will Vernon in Moscow explains.
