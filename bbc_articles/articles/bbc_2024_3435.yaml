title: '''Frozen'' alligators still alive in icy cold waters - BBC News'
date: '2024-02-20'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-68077687
content: |-
  Video shows how reptiles undergo brumation, a state of inactivity, to survive in low temperatures.

  To survive extremely cold temperatures, some reptiles undergo brumation, which is a state of inactivity equivalent to hibernation in mammals.

  These alligators in The Swamp Park in Ocean Isle Beach, North Carolina and in Gator Country in Beaumont, Texas show us how they conserve energy, with their noses lifted above freezing water to avoid suffocation.
