  Man charged after car driven at police in Fintona

  The incident happened on the Tattymoyle Road in Fintona on Saturday evening

  A 28 year-old man has been charged after a car was driven towards police officers in Fintona, County Tyrone. The incident happened shortly before 21:00 BST on Saturday. Police Service of Northern Ireland (PSNI) officers were performing duties at a parade on the Tattymoyle Road when the driver of a black BMW car ignored instructions from officers and swerved the car towards them. A police officer was forced to jump out of the way of the car while another officer successfully deployed a stinger device to puncture its tyres. The car left the scene but was located a short distance away. A man matching the description of the driver was located hiding in a hedge by officers from the PSNI's Air Support Unit, who provided support to officers on the ground.

  The man has been charged on suspicion of a number of offences, including attempting to cause grievous bodily injury by dangerous driving, failing to stop for police, driving with excess alcohol in breath and no driving licence. He will appear at Enniskillen Magistrates Court on Monday. A 29-year-old woman was also arrested in connection with the incident on suspicion of assault on police and resisting police and a report will be forwarded to the Public Prosecution Service. “Thankfully none of our officers were injured as a result of this reckless attack on them," Ch Insp Beverlie Reid said. "Police officers do not deserve to be targeted in this manner for simply doing their job.”
