title: 'England v West Indies: Zak Crawley expecting response from tourists at Trent
  Bridge - BBC Sport'
date: '2024-07-16'
section: Cricket
url: http://www.bbc.co.uk/sport/cricket/articles/cn0975ql388o
content: |-
  With 45 Test caps, Zak Crawley has the fourth-most of the current England squad, behind Joe Root, Ben Stokes and Chris Woakes

  Opener Zak Crawley says England are expecting a strong response from West Indies in the second Test after hammering the tourists in the series opener last week. England went 1-0 up with an innings-and-114-run win at Lord’s and can seal the three-match series at Trent Bridge, beginning on Thursday. But West Indies have form for producing shock results, in particular a stunning defeat of Australia in Brisbane earlier this year. “They’ve got some really, really good players in that team, so we're going to have to perform well to beat them. "We don't take anyone for granted. We have to be sharp and perform like we did at Lord's. It was a really good performance and we want to back that up again.” Nottingham will be England’s first Test since the retirement of James Anderson, who ended his legendary international career at Lord’s. England’s all-time leading wicket-taker has joined the coaching staff as a bowling mentor and was part of a rain-shortened training session on Tuesday.

  Mark Wood has been added to the hosts’ squad for the second Test and is vying with Matthew Potts and the uncapped Dillon Pennington to take Anderson’s place in the XI. “He’s going into his new role pretty seamlessly,” said Crawley of Anderson. “It's normal and he's the same bloke. “I always found he was really helpful to my game anyway, talking to him about how he bowled at me and certain things like that.” West Indies’ wicketkeeper Joshua da Silva was the 704th and final wicket of Anderson’s Test career when he edged behind in the closing stages of the first Test. “I tried my hardest not to be one of those wickets but unfortunately I got a good Jimmy seed,” said the 26-year-old. “I told him after the game I was trying really hard, and he had a good laugh. What a legend he is, and I’m happy I don’t to have to see him again.” Da Silva was part of the West Indies team that pulled off the victory over Australia at the Gabba, one of the all-time great surprise results to seal a 1-1 series draw. West Indies also bounced back from a huge defeat by England on their tour of 2017 when they secured a memorable victory at Headingley. “Brisbane is something we can look at. We came back and we won the Test. If we can replicate that, all of us will be really happy,” added Da Silva. “It’s not going to be easy again. We need to do the right thing, bat for long periods of time and take wickets.” West Indies are hopeful Shamar Joseph will be fit for the second Test after the pace bowler struggled with a left hamstring problem at Lord's.
