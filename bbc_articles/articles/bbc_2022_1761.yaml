content: |-
  Trees have been toppled, properties had roofs torn off and the rail network ground to a halt.

  Storms over the last week have wrought havoc across Wales and there are warnings of more bad weather to come.

  Trees have been toppled, properties had their roofs torn off and the rail network ground to a halt on Friday.

  But why has mid Wales been particularly affected by storms Dudley, Eunice and Franklin?

  BBC Wales' weather presenter, Sabrina Lee, explains what has been going on.
