title: City-wide hunt for XL Bully missing after Sheffield shooting - BBC News
date: '2025-04-06'
section: South Yorkshire
url: http://www.bbc.co.uk/news/articles/cy0xpynk0jpo
content: |-
  Police say they have contacted all veterinary practices in the city in a bid to locate the animal.

  The XL Bully went missing after officers were called to reports of a shooting in Daniel Hill Street

  Officers hunting for an XL Bully which escaped when police marksmen opened fire on the animal say they have contacted all veterinary practices in Sheffield in a bid to trace it. Armed police tried to shoot the dog after it became "aggressive" while officers were investigating reports of a gun being fired at a property in Daniel Hill Street, in Hillfoot, on Thursday. A police spokesperson said it was believed the animal had been injured before fleeing the scene. The force has urged people not to approach the dog but to call 999 immediately, saying it has "the ability to show aggression and cause harm".

  A police spokesperson said: "Shooting a dog is never a decision taken lightly by our armed officers. "During what was already a challenging incident, and the risk posed, the decision was made to shoot the dog to progress finding a suspect and weapon and protecting our communities. "We now believe the dog to have suffered injuries and are urging the public to be vigilant for a loose XL Bully, but also one that may have succumbed to its injuries or been taken somewhere for treatment. "We have contacted all veterinary practices as part of our enquiries but continue to ask anyone who has received a dog into their care [which] they believe could be this dog to come forward. "If you see the dog, we continue to urge you not to approach it, as we believe it has the ability to show aggression and cause harm."

  A 39-year-old man has been charged with firearms offences

  South Yorkshire Police were called to Daniel Hill Street on Thursday night after shots were fired at a house and the windows of a car were smashed. A few hours later, in the early hours of Friday, officers attended a crash involving a motorbike and a silver VW Golf in Liberty Drive, Stannington, after receiving reports shots had been fired at a man. The force said 39-year-old Marcus Ned, from Sheffield, had since been charged in connection with the incidents and was due to appear at the city's magistrates' court on Monday. He faces two counts of possession of a firearm with intent to cause fear of violence, possession of a firearm, possession of ammunition without a certificate and attempt to cause grievous bodily harm with intent. A 39-year-old woman arrested on suspicion of possession of a firearm and a 36-year-old man arrested on suspicion of theft of a motor vehicle have been released on bail. Meanwhile, police said a 35-year-old man had been arrested on suspicion of affray and released on police bail.

