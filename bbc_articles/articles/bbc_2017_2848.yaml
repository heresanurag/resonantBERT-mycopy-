title: 'France election: Hard-left candidate Melenchon appears by hologram - BBC News'
date: '2017-02-06'
section: General
url: http://www.bbc.co.uk/news/world-europe-38875197
content: |-
  One of the candidates in the French presidential election doubles his audience with a hologram.

  One of the candidates in France's presidential election, Jean-Luc Melenchon, has launched his campaign as a hologram.

  The veteran hard-left politician took to the stage in the flesh in Lyon while his three-dimensional image spoke simultaneously to another delighted audience in Paris, 500km (310 miles) away.

  Mr Melenchon promotes the use of new technology as part of his "citizen revolution".

  "Melenchon killed it for innovation in political communication this year," French radio station Europe 1 tweeted (in French).
