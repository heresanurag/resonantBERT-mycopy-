title: 'Aziz Ziriat: Family ''heartbroken'' after his body is found in Dolomites -
  BBC News'
date: '2025-06-02'
section: London
url: http://www.bbc.co.uk/news/articles/c5ygq4py4ylo
content: |-
  Aziz Ziriat went missing on 1 January while hiking in the Dolomites with his friend Sam Harris.

  Aziz Ziriat "lived every moment with optimism, good humour and humility", his family said

  The family of a London hiker who died on an Italian mountain range have said they are "heartbroken" after his body was discovered on Saturday. Aziz Ziriat, 36, went missing while hiking in the Dolomites with his friend Sam Harris on New Year's Day. His remains were found by a specialist search team lying in a rocky crevice about 400m (1,300ft) below where Mr Harris's body was discovered almost five months ago. Mr Ziriat's family said: "Whilst we are relieved to have finally found him, there are no words to describe how heartbroken we are to lose our beloved Aziz."

  The family said the past few months had been "incredibly difficult for everyone who knew and loved him". "But we have been comforted by the overwhelming love we have received - we will be eternally grateful for everyone's support," they added.

  Aziz Ziriat, left, and Sam Harris were last heard from on New Year's Day

  They also expressed "heartfelt thanks and deepest gratitude" to the alpine rescue team, the firefighters, police and volunteers who had "all worked tirelessly, in challenging and dangerous conditions" to find his body. The family added: "Being with Aziz was to witness his deep connection with and appreciation of life. "He lived every moment with optimism, good humour and humility; he was, and still is, loved by so many."

  The friends had not been heard from since 1 January and they did not check in for their flight home on 6 January. Their last known location was near a mountain hut called Casina Dosson, close to the town of Tione Di Trento, near Riva Del Garda on Lake Garda. Mr Ziriat's body was found on Saturday in the Passo di Conca area by specialist search teams including a canine unit, Trentino Alpine and Speleological Rescue confirmed. A spokesman said the rescuers "lowered themselves down the wall below the base of the slope, where the dog finally signalled the missing man's body in a rocky crevice, where it had been covered by snow". The Palace for Life Foundation - the official charity of Crystal Palace Football Club where Mr Ziriat worked - said they were "deeply saddened" by the news. In a statement the charity said: "Aziz was an incredible person with an infectious love for life. Throughout his time here Aziz formed close friendships throughout the local community. "He was a compassionate, kind and generous individual who brought warmth and positivity to everybody met. He is deeply missed by all of us here at Palace."
