  Find out who won the golden statuettes at this year's Academy Awards.

  Best supporting actress Laura Dern with best actress Renee Zellweger

  This year's Academy Awards have taken place in Los Angeles. Here's the full list of winners and nominees.

  Joaquin Phoenix, Renee Zellweger and Brad Pitt posed with their trophies

  Parasite won best picture, best international film, best director and best original screenplay

  Jeff Reichert, Julia Reichert and Steven Bognar won best documentary feature for American Factory

  Sir Elton John performed before he and lyricist Bernie Taupin won

  Roger Deakins has won his second Oscar in the past three years

  British costume designer Jacqueline Durran won for her work on Little Women

  Anne Morgan, Kazu Hiro and Vivian Baker triumphed for the film Bombshell

  Elena Andreicheva and Carol Dysinger with their Oscars for Learning to Skateboard in a Warzone (If You're a Girl)

