content: |-
  A cafe owner in Sydney has transformed his bar into Australia's unofficial Wrexham supporters' club.

  How an Australian bar was saved by Wrexham's rise

  York Lane has been the unofficial spot for Wrexham fans in Sydney for the past three years.

  Wrexham's fairy tale success story under their Hollywood owners has seen the football club gain fans across the Atlantic. And that success has also helped a struggling Australian bar change its fortunes after being inspired by the story. York Lane, a bar in Sydney's Central Business District (CBD), adopted a Wrexham AFC theme three years ago, and even serves Wrexham Lager. It has now become an unofficial home of the club's Aussie supporters ahead of the club's summer tour to the country this year.

  "It's down to my friend Mike," said Dieter Steinbusch who owns the bar. He recommended the hit television series, Welcome To Wrexham, and the storyline "mirrors what I've tried to do with my bar", he said. Mike Roberts has lived in Australia for 57 years, after moving from Wrexham when he was 10-years-old as a "10 Pound Pom", a term used to describe British citizens who migrated to Australia and New Zealand after the Second World War. "Three years ago if I mentioned Wrexham, people would just look at you and they wouldn't have a clue," said Mike. "Now, I'm not joking one in three people not only know of the team, they actually follow the team, and it's just stunning."

  Mike (left) and Dieter watch their beloved Wrexham with other fans in the bar

  The bar boasts a mural of Wrexham's Hollywood owners Rob McElheney, Ryan Reynolds and club memorabilia . When Wrexham secured their third successive promotion to the Championship Dieter offered his customers free Wrexham Lager. "My punters like it," said Dieter, "it's like Aussie beer, but, I think it's better and it goes down very well." He said Wrexham fans in Sydney always visit the bar before they return home. "When they come to visit, not that I've ever met them in my life, it's just like a family. It's brilliant," he said.

  Dieter says he was inspired after watching Wrexham in the series "Welcome to Wrexham"

  Wrexham will play three pre-season fixtures against A-League opposition during a summer tour of Australia and New Zealand. Phil Parkinson's side will take on Melbourne Victory at Marvel Stadium on 11 July before facing Sydney FC at Allianz Stadium four days later. The north Wales side will then play Wellington Phoenix at the Sky Stadium on 19 July. "We're going to Melbourne and we're going to go to Sydney," said Mike, adding: "but all of my friends, every single one of them, are going as well because they just love this thing." Mike believes there is no other football team in the world that has "done what Wrexham's done". Dieter said the last time he felt this excited about a sporting event was watching Cathy Freeman win a gold medal for Australia in 2000 Sydney Olympics. "I'll say this now is one of the biggest things besides that," he added.

  Dieter and The Turf's landlord Wayne Jones have shared customers over the years

  Dieter has built a friendship with Wayne Jones, the landlord of The Turf, which sits just outside Wrexham's stadium. Their customers have taken some items, such as a the York Lane t-shirt, from one landlord to another as the bond has grown. "It's great to be so far away yet so so close," said Dieter. In previous series of Welcome to Wrexham, Rob and Ryan have popped in to the Turf for a few pints. With the fourth season on the horizon, Dieter and Mike are hoping they might make an appearance at York Lane in the near future. "It's hard to find because it's down a little unique lane in Sydney," said Mike. "It's not the sort of place you'd pass if you didn't know where it was." Dieter said Rob and Ryan would be "very, very welcome" adding that the Wrexham fans will always have a special place in his heart. "Just come and find us. There will always be a welcome for you here."
