  Daniel Cooke, a construction site manager from Somerset, has taken a second job to pay rising energy bills.

  Daniel Cooke, a construction site manager from Somerset, has taken a second job to pay his family's rising energy bills. Many families will face higher bills now that the energy price cap has been lifted.
