title: Church risks further crisis if it doesn't act, says child abuse inquiry chair
  Alexis Jay - BBC News
date: '2025-02-11'
section: UK
url: http://www.bbc.co.uk/news/articles/cvg48jgdppgo
content: |-
  The Church's national assembly is voting on options to radically change its safeguarding processes.

  Church risks further crisis if it doesn't act, says ex-child abuse inquiry chair

  The Church of England risks further crisis if it fails to adopt a sweeping new independent system to keep people safe, the former head of a national inquiry into child sexual abuse has said. The Church's national assembly will vote later on Tuesday on options to radically change its safeguarding processes. One of the systems being considered is based on a model proposed by Prof Alexis Jay, who was asked by the Church for her input. But some members of the Church have cast doubts about the system that comprehensively hands the process for dealing with abuse allegations to an outside organisation.

  The resignation of the former Archbishop of Canterbury Justin Welby over his handling of a prolific abuser and questions about Archbishop of York Stephen Cottrell's handling of another case have added a sense of urgency to make changes.
  • None I know I have made mistakes, says under-fire archbishop At the Church's General Synod, two models are being put to the vote on Tuesday, both involving some measure of independence. The first involves creating an independent central safeguarding team for the Church - but with diocesan and cathedral safeguarding officers continuing in the same roles. The second would also make the Church's safeguarding officers around the country part of that independent body.

  Both options would see safeguarding work scrutinised by a second external body, but a 66-page document published last month, external said it would take "a minimum of two years to legislate for a scrutiny body as a statutory body". After years of the Church of England being accused of failing to "mark its own homework", Prof Jay, a respected figure in child protection, feels only the second model goes far enough. "I think it's absolutely necessary because church safeguarding as it stands falls below the standards of secular organisations, and I do not think that can continue when it has also led to such serious weaknesses," she told the BBC. In October 2022, Prof Jay finished a seven-year inquiry into the countless ways children had been sexually abused in England and Wales with her team investigating abuse in churches, schools, custodial institutions, political parties, religious groups, and children's homes.

  In summer 2023, Prof Jay was asked by Archbishop Justin Welby to advise on how the Church could "outsource" safeguarding. She said she was not asked to investigate whether the Church needed safeguarding that was independent of the Church. "I'm glad the General Synod is going to be debating a model that largely reflects what I was asked to do in the report I published last year, a model of full independence," she said. Prof Jay said there would be dire consequences if Synod members did not vote for the more complete model of independence. "I think that not adopting that version would mean it would be a matter of time before yet more safeguarding crises occurred, and there would be a renewed calls for radical action to be taken," she said. Some within the Church have raised concerns about Prof Jay's preferred option because they fear it is too radical a model and not a well-tested one. "Whether or not there are precedents is absolutely not the point," she said. "There is also the option for the Church to commission an existing charity with a track record in care and support for children and vulnerable adults to ask them to carry out this work." Prof Jay also dismissed suggestions that making the system independent would mean that some within the Church would no longer feel safeguarding was their responsibility too. But she said choosing the correct system to deal with abuse allegations would only resolve part of the problem, saying cultural issues - like deference to authority figures in the Church - were also hampering progress. Some within the Church have questioned Prof Jay's understanding of the way in which the institution works but she said it was criticism she expected. "I was asked to do a piece of work. I did it. I knew quite well that it would be problematic for some, but the Church must face up to its responsibilities and do what they need to do," she said. If it is voted through, the fully independent model should then be delivered by a team committed to its success, she added. It is estimated that could yet take around three years. Dame Jasvinder Sanghera was a survivor advocate on the Church of England's independent safeguarding board until the panel was sacked in June 2023 when the church said relations between board members and bishops had "broken down". "The church can no longer be trusted to manage safeguarding. The current system fails to prevent abuse and cover up," she told Radio 4's Today programme. She said the Church needed "independent oversight that stands up to scrutiny, not a design designed by the Church of England where they have their hand over it - it has to be a regulatory body that is independent from the church". Asked on the programme if she believed that there are many other bishops and archbishops that if they had to submit to this sort of scrutiny would find themselves having to stand aside from their positions, she said: "Yes I do, actually, I do." "From what I'm hearing in relation to how bishops are given different treatment, to what I'm hearing from survivors in relation to complaints that they have put forward, there are individuals who remain within that organisation that really should be stepping aside," she said. A spokesperson for the Church of England said the Church is "committed to making safeguarding as robust and independent as possible" and the Synod will decide between two proposed models that significantly strengthen the independence of safeguarding structures while ensuring effective oversight and scrutiny". "Both models involve the creation of a new external body to scrutinise safeguarding work, and both take into account the recommendations of independent reviews, including those by Prof Alexis Jay and Sarah Wilkinson. "The proposals have been developed through extensive consultation, including with victims and survivors, and represent a significant step forward in strengthening safeguarding across the Church. "We recognise the deep and lasting impact of abuse and are committed to ensuring that safeguarding in the Church is independent, transparent, and accountable. "It is right that Synod now considers these proposals and determines the best way forward."
