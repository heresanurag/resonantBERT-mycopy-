title: Two arrested as Newbury's stolen Paddington statue recovered - BBC News
date: '2025-03-03'
section: England
url: http://www.bbc.co.uk/news/articles/cd7egx029l9o
content: |-
  The sculpture was damaged and taken from his seat in Paddington creator Michael Bond's home town.

  All that is left of the statue on his bench in Paddington creator Michael Bond's home town

  Two men have been arrested after a Paddington Bear statue was damaged and stolen from a bench, police have said. The sculpture was taken from his seat in Northbrook Street, Newbury, at about 02:00 GMT Sunday morning, according to Thames Valley Police. The force said on Sunday evening it had recovered the statue, adding that Paddington was "heading to Newbury police station for a much-needed marmalade sandwich". Two 22-year-old men, both from Basingstoke, were arrested on suspicion of theft and criminal damage and remain in police custody.

  Insp Alan Hawkett said: "The Paddington Bear statue is a beloved part of Newbury so we have been doing everything we can to locate it and the offenders." The force said it would keep the sculpture safe and support its restoration.

  A tent has been placed around Paddington's bench in Northbrook Street while police investigate

  The statue of the Peruvian bear, holding one of his beloved marmalade sandwiches, was unveiled in the home town of Paddington creator Michael Bond in October. It was one of 23 celebrating the children's character placed across the UK last year as part of the Paddington Visits trail, ahead of the StudioCanal film Paddington in Peru. Residents in the Berkshire town earlier expressed their dismay at the theft, saying he was "a lovely addition to Newbury".

  Mayor of Newbury Andy Moore officially unveiled the statue in October

  Christopher Gibbins said he had seen the damaged remains of the statue at about 08:00 GMT on Sunday while out on a walk. "Very sad to see it had happened as he made a lot of people in the town very happy," he said. Many locals took to social media, sharing pictures they had taken with Paddington. "To some it may not seem like a big deal but he was such a little ray of sunshine, walking to work or taking my small kids into town, he just brought a smile to people," Whitney Burnett wrote. Juliet Curtis said: "I find it especially sad as Newbury is the home town of the author Michael Bond. How upset he would have been."

  Residents have been sharing their pictures taken with Paddington

