  Andrew Marr is joined by Stephen Barclay MP and Baroness Shami Chakrabarti.

  Andrew Marr is joined by Brexit secretary Stephen Barclay MP, shadow attorney general Baroness Shami Chakrabarti and Arturs Krišjānis Kariņš, Prime Minister of Latvia. Plus music from Blossoms.

  Andrew Marr is joined by Brexit secretary Stephen Barclay MP, shadow attorney general Baroness Shami Chakrabarti and Arturs Krišjānis Kariņš, Prime Minister of Latvia. Plus music from Blossoms. The newspapers are reviewed by LBC presenter Iain Dale, professor John Curtice of Strathclyde University and Plaid Cymru Westminster leader Liz Saville Roberts MP.
