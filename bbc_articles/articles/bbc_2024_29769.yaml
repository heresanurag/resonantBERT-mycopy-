  The president-elect delivered an ordinary speech in an extraordinary moment, writes Gary O'Donoghue.

  Jubilation in the room as Trump delivered victory speech

  This video can not be played To play this video you need to enable JavaScript in your browser. Trump thanks American people for making him 47th president

  The words in Donald Trump's victory speech were nothing out of the ordinary - but the moment itself was truly extraordinary. Flanked by family and key supporters such as the world's richest man, Elon Musk, the 45th - and soon to be the 47th - president of the United States strolled on stage and revisited many of the themes and anecdotes I have become so familiar with, as I followed around in this campaign. But this time, the circumstances - a near-certain victory and a return to the White House - meant everything took on a new significance. He spoke of an actual programme that could become reality. Around me, hundreds of enthusiastic supporters were delirious with happiness over his success - some in tears, others hugging complete strangers.

  In truth, the liquor had been flowing for several hours before the teetotal Trump appeared after 02:00 EST (07:00 GMT). But the joy of his supporters, dressed in their MAGA uniforms, symbolised something far bigger than the alcohol-fuelled highs of a good night out. Unusually for Trump, the speech did promise unity, and that he would govern for all - a tone that has largely been absent from the campaign trail. Much will depend on whether Republicans can retain control of the House on top of successfully flipping control in their favour of the Senate. If they do that, then their control of both chambers of Congress plus the White House - a rare thing in US politics - will open up at least two years of incredible political freedom. Trump failed to really capitalise on the so-called trifecta of the presidency, House and Senate in his first term - but his advisers will not allow him to make such a mistake again. They will also want him to be a lot more organised than last time around when it comes to picking a cabinet and key administration staff. Those on stage in the early hours of Wednesday may serve as a hint of what’s to come.

  Musk, for example, has said he believes $2tn (£1.55tn) can be cut from the federal budget through efficiencies. It’s been suggested that the billionaire could head some kind of department of "government efficiency" to do it. Not on stage, but in the VIP pen just in front of it, Robert F Kennedy Jr has also been touted by Trump as someone who could have a big role in healthcare in his administration. That's a prospect that has been greeted with horror by many – given RFK Jr’s views as a vaccine sceptic and someone who has campaigned against fluoride in water – a staple of public healthcare for decades. And not forgetting the family. Trump's second son, Eric, and his wife Lara - both right up there tonight - have increasingly taken centre stage as key lieutenants. What could be in store for them?
