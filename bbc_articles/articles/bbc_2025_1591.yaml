title: Doorbell cameras capture moment of Philadelphia jet crash - BBC News
date: '2025-02-02'
section: General
url: http://www.bbc.co.uk/news/videos/c3e1dv7wxngo
content: |-
  A small plane crashed into several buildings on Friday evening, killing all six people on board and one person on the ground.

  Doorbell cameras captured the moment a small medical transport plane crashed in a Philadelphia neighbourhood on Friday evening, killing all six people on board and one person on the ground.

  Videos of the incident show the plane coming down quickly and sparking a huge fireball.

  Flight logs show the plane was in the air "for only a minute" before it crashed, Philadelphia Mayor Cherelle Parker said in a statement.
