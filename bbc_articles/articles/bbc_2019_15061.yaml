title: 'Election 2019: Boris Johnson pressed over Andrew Neil interview - BBC News'
date: '2019-12-01'
section: General
url: http://www.bbc.co.uk/news/uk-politics-50620692
content: |-
  Andrew Marr asks Boris Johnson about his refusal to commit to an interview with the BBC's Andrew Neil.

  In his interview on the Andrew Marr Show, the Conservative leader Boris Johnson was questioned about his refusal to commit to an interview with the BBC's Andrew Neil.

  He is the only main party leader not to so far have agreed to an interview with the presenter.

  You can watch the full interview on The Andrew Marr Show on the BBC iPlayer.
