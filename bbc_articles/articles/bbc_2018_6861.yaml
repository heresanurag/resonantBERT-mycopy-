id: bbc_2018_6861
title: 'Storm Hector: Lucky escape for driver hit by falling tree - BBC News'
date: '2018-06-14'
section: General
url: http://www.bbc.co.uk/news/uk-scotland-44486235
content: |-
  A van is crushed by a falling tree in Strathearn Road, Edinburgh.

  A Scottish Gas worker had a lucky escape when a tree fell in front of his van in Edinburgh.

  The driver braked hard when he spotted the hazard in Stathearn Road, and while the windscreen was shattered he avoided serious injury.
