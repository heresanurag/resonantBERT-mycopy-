  After a three-year break from cycling, the Tour de France winner is joining amateurs on a ride-along.

  'The second coming' of Sir Bradley Wiggins

  The 50-mile ride raised money for charity and Sir Bradley Wiggins said it was also about "letting go of the past"

  Sir Bradley Wiggins has broken his three-year absence from cycling having associated the sport with "bad things" and "childhood traumas." The eight-time Olympic medallist had taken a break due to mental health "trials and tribulations" and said he had deliberately "isolated himself from the world." He said he had now emerged the other side as he took part in a 50-mile ride-along with keen amateurs around Stafford. "I'm in a really good place now," he said, "It's been nice to remember just how many friends I've got in this sport."

  Despite winning five gold medals in cycling, Wiggins said he had fallen out of love with the sport he excelled in, peaking in 2012 when he became the first Briton to win the Tour de France. Since his retirement in December 2016, he has spoken about his father's jealousy and being groomed by a coach as a child.

