  In June 2024, Wiggins was declared bankrupt. The news was picked up by many of the national newspapers, who linked it to financial difficulties with his businesses. "I blamed cycling for a long time," he said. "I don't see it like that any more. Cycling has been a big part of my life and it still is to this day. "With having that break from cycling the last few years, I kind of feel like it's a second coming, from a cycling point of view."

  Wiggins led a team of 80 cyclists from Sandon Hall in Stafford

  Many of those who took part were from local cycling clubs

  Speaking before the event, the 44-year-old said he was unsure how he would feel when he got back in the saddle, but described the build-up to Sunday's ride as positive. He said he was relishing "being able to let go of the past and the elite side of the sport and really see it for the social element of it". The event was organised by Pau, which runs a free cycling academy for riders aged 13-18.

  A portion of all proceeds went to cancer charities

  Wiggins said he was concerned the sport had become too expensive for youngsters and that was part of the motivation to get involved in Project Pau. Pau Managing Director Paul Ball said it would be "an unforgettable weekend with Bradley and our community of cyclists". On Saturday, a meet-and-greet session took place at Trentham Shopping Village for fans to rub shoulders with their cycling hero. A portion of all proceeds from the ride-a-long was going to a several cancer charities.
