title: Nasa astronauts Butch and Suni face further delay in homecoming - BBC News
date: '2024-12-18'
section: Science & Environment
url: http://www.bbc.co.uk/news/articles/c30nze6e4geo
content: |-
  Nasa says that the astronauts stuck on the space station will have to wait even longer to get home.

  Astronauts Suni Williams (left) and Butch Wilmore were supposed to have stayed on the space station for eight days

  Nasa says that the astronauts stuck on the International Space Station will have to wait even longer to get home. Butch Wilmore and Suni Williams were due to be back after just a week when they blasted off in June. Their stay was extended to February next year because of technical issues with the experimental spacecraft, Starliner, built by Boeing. Now - following a delay in launching a new capsule to the ISS - the pair won't be back until late March or possibly April. Nasa said the delay posed no risk to the astronauts. In a statement Nasa stated: "The International Space Station recently received two resupply flights in November and is well-stocked with everything the crew needs, including food, water, clothing, and oxygen. The resupply spacecraft also carried special items for the crew to celebrate the holidays aboard the orbital platform."

  Most space station missions last six months, with a few reaching a full year. So the extension to Butch and Suni's already overdue stay in space should not be a problem, according to Dr Simeon Barber, from the Open University. "I'm sure that they are already disappointed that they were going to miss Christmas back home with the folks. But this is only another two months on an already quite long mission, and I'm sure if you ask them, I'm sure they would tell you that the space station is where they love to be," he said. A new crew needs to launch before Wilmore and Williams can return and the next mission has been delayed by more than a month, according to the space agency. Nasa's next crew of four for the ISS was supposed to have been launched in February 2025. The capsule carrying that crew was due to be the one bringing Butch and Sunni home, as well as NASA astronauts Nick Hague and Roscosmos cosmonaut Aleksandr Gorbunov as part of the normal crew rotation. But there has been a delay by the private sector firm SpaceX in preparing a brand-new Dragon capsule for the mission. That is now scheduled for flight readiness no earlier than late March. Nasa said it considered using a different SpaceX capsule to fly up the replacement crew to keep the flights on schedule. But it has now decided the best option is to wait for the new capsule to transport the next crew.
