title: 'Trump impeachment inquiry: Schiff on future of presidency - BBC News'
date: '2019-11-13'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-50399142
content: |-
  The Chairman of the Intelligence Committee, overseeing the inquiry, gives opening statement.

  Adam Schiff, the Democratic Chairman of the Intelligence Committee overseeing the impeachment inquiry, began laying out the questions they seek to answer during the hearings.

  He described the precedent for the future of how presidents act in office.
