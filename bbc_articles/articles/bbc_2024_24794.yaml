title: Drone footage shows Hurricane Milton damage in Florida - BBC News
date: '2024-10-12'
section: General
url: http://www.bbc.co.uk/news/videos/cwy9251pg82o
content: |-
  Video captured across the state shows the scale of destruction to homes and structures.

  Drone footage captured in St. Lucie County, Palm Beach Gardens, St. Petersburg, and Siesta Key shows damage to homes and structures after Hurricane Milton and multiple tornadoes tore across the state.
