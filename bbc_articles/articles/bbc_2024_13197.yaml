title: 'Newspaper headlines: Princess Anne hurt and Willoughby murder plot - BBC News'
date: '2024-06-25'
section: The Papers
url: http://www.bbc.co.uk/news/articles/c4nnn6lldd6o
content: |-
  Princess Anne being injured by a horse and the start of a trial over an alleged Holly Willoughby kidnap plot are among Tuesday's front page stories.

  The Daily Telegraph leads on claims, external by what the paper calls a "source close to the Cabinet Office", that they suspect Scotland Yard of having leaked the identities of Conservatives being looked into by the Gambling Commission. The Metropolitan Police has told the BBC the allegations are "simply untrue" and a "poor distraction". The Telegraph also reports that a further five police officers are being looked at by the Gambling Commission in relation to alleged bets on the date of the election; the BBC understands that a "handful" are involved.

  The front page of the Times highlights, external warnings about Labour's manifesto commitment, to introduce a full ban on conversion therapy.

  The Financial Times says, external the Institute for Fiscal Studies (IFS) issued a "scathing verdict" on Monday, when it said the Conservatives and Labour had ducked tough choices on tax, borrowing and spending, in their manifestos.

  Elsewhere, the i newspaper highlights, external 10 taxes that - according to the IFS - neither party has ruled out putting up; these include fuel, alcohol and tobacco duty, air passenger duty and green taxes.

  In its lead story the Guardian says, external two reports have laid bare a "crisis of poverty" in the UK. One, by the TUC, says 900,000 children in working households have been pushed into poverty, partly because of low growth in wage since 2010.

  The concussion suffered by Princess Anne is the main story for the Daily Express, external. It says people living near her Gatcombe Park estate "feared the worst" when they saw an air ambulance hovering overhead.

  The Daily Mirror leads, external on the trial of Gavin Plumb, who denies planning to kidnap, rape and murder the TV presenter Holly Willoughby.

  Jurors in Chelmsford were told during the trial's opening on Monday that Mr Plumb had made previous attempts to kidnap and imprison women, resulting in convictions that he boasted about online, according to the Daily Mail, external.
