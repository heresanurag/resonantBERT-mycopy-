content: |-
  Harlequins miss the chance to go top of the table as Bristol Bears claim victory to strengthen their grip on fourth place in the Premiership Women's Rugby table.

  Harlequins missed the chance to go top of the table as Bristol Bears claimed victory to strengthen their grip on fourth place in the Premiership Women's Rugby table.

  Bears took an early lead at Twickenham Stoop with a strike move from a well-executed line-out as Phoebe Murray crashed through in midfield.

  Quins hit back on the half-hour mark as Lucy Packer tapped a quick penalty before kicking through for England's Ellie Kildunne to gather and score.

  Bristol regained the lead with another pre-planned line-out move, but this time they threw to the front for Alisha Joyce-Butchers to waltz through the Quins defence.

  The hosts were improved after the interval and Kildunne started the initial break close to the touchline before gliding through the white Bristol shirts to score her 13th league try of the season.

  Bristol were not to be undone, though, as Sarah Bern powered over from close range to take an unassailable lead.

  The prop added the finish tough to a flowing team move, in which Illona Maher carried hard and kept the ball alive.

  Quins remain in second spot, three points behind leaders Gloucester-Hartpury, while Bears extend their lead to seven points over fifth-placed Exeter Chiefs, who have two games in hand.
