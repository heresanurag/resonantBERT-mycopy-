  Another trophy slips away from Chelsea

  Sunday's second semi-final was a repeat of last year's final in which Chelsea's Sam Kerr scored the only goal to beat United in front of 77,390 spectators at Wembley.

  The outcome means Chelsea, who at one stage were eyeing a quadruple, could still end this campaign empty-handed.

  They lost after extra time to Arsenal in the League Cup final a fortnight ago to end hopes of a trophy clean sweep, and now another chance of winning silverware has disappeared.

  The Blues have won this competition five times, including the past three years in a row, and will feel they should have reached their eighth final in 13 seasons.

  Chelsea dominated the second half, with the match statistics ending heavily in their favour. They had 70% of possession, 26 shots to United's five, and eight shots on target to two by their opponents.

  The Blues also had nine corners, compared to none from the hosts and were left aggrieved at not being awarded a penalty in two separate incidents, once when the ball appeared to hit Katie Zelem's hand and another when Niamh Charles seemed to be fouled by Williams.

  But an inspired performance from Earps kept Chelsea from scoring an equaliser that would have taken the game to extra time. Aggie Beever-Jones hit the side netting in the sixth of eight added minutes at the end as Chelsea could not find a second.

  The Blues could still secure a double as they are three points behind Manchester City in the Women's Super League, but have a game in hand, and they take on Barcelona in a two-leg Champions League semi-final later this month.

  It has been a tough season for United after they were runners-up to Chelsea in both the WSL and FA Cup last term.

  An early exit from the Champions League against Paris St-Germain ended European prospects, and hopes of winning the WSL also faded.

  United sit fourth in the WSL, six points behind third-placed Arsenal - who have played one fewer game and occupy the final Champions League qualifying spot.

  But this cup win gives Marc Skinner's side a chance to salvage something special from their campaign.

  They will be confident of claiming the team's first major trophy in the May final as they convincingly won 4-0 away against Tottenham in December.

  Next up for United is a rehearsal for the final as they entertain Spurs in the WSL at Leigh Sports Village next Sunday.
