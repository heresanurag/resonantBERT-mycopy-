title: '''Hard to imagine'' Biden serving full term, says Michael Douglas - BBC News'
date: '2024-07-11'
section: General
url: http://www.bbc.co.uk/news/videos/cp3865k05ppo
content: |-
  Two-time Academy Award winner and Democrat fundraiser Michael Douglas speaks to the BBC about President Biden.

  Actor Michael Douglas has said it would be "hard to imagine" President Biden serving his full term as president if he is re-elected.

  Mr Douglas, who has previously fundraised for the president, said he was disappointed at his "inability" to "challenge all the lies" of Donald Trump during the first debate.

  His comments follow an op-ed written in the New York Times by George Clooney, who is a major fundraiser for the Democratic party, calling for President Biden to stand aside.
