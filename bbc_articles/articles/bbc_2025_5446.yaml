content: |-
  New Zealand power into the Champions Trophy final with a 50-run win over South Africa after centuries from Rachin Ravindra and Kane Williamson.

  This video can not be played To play this video you need to enable JavaScript in your browser.

  New Zealand powered their way into the Champions Trophy final with a thumping 50-run win over South Africa after centuries from Rachin Ravindra and Kane Williamson. The Black Caps opted to bat first in Lahore and posted a tournament-record 362-6 in a superbly paced one-day innings. It was built on a 164-run partnership for the second wicket between Ravindra and Williamson, who registered their fifth and 15th ODI hundreds respectively. Despite both falling shortly after reaching three figures, New Zealand kept going and plundered 110 runs from the final 10 overs thanks to the big hitting of Daryl Mitchell, who made 49 from 37 balls, and Glenn Phillips, who finished unbeaten on 49 from 27. Facing a daunting total, albeit on a pitch that could hardly have been friendlier to the batters, South Africa attempted to mirror the Kiwis' approach. The chase started well, with Proteas skipper Temba Bavuma and Rassie van der Dussen putting on 105 for the second wicket. However, unlike Ravindra and Williamson, they were unable to kick on, with New Zealand captain Mitchell Santner dismissing them both - and the dangerous Heinrich Klaasen - in a brilliant spell during the middle overs. With the required run-rate climbing quickly, South Africa had to keep attacking but the wickets kept tumbling and, despite David Miller bringing up a 67-ball century from the last ball of the match, they finished well short on 312-9. New Zealand will now travel to Dubai to face India in Sunday's final, hoping to win the trophy for a second time, 25 years on since they won their only ICC white-ball title.

