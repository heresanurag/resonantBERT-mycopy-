  New Zealand captain Mitchell Santner: "The platform we were able to set was vital. We were happy with 360 but with the power that South Africa have, we knew it would be a challenge. "What we speak about as a group is about applying pressure, keep being aggressive with the ball and trying to take wickets. In a chase like that, if you don't get them out, they are going to catch up." Player of the match, New Zealand's Rachin Ravindra: "It's always a great feeling to contribute to the team. To get an emphatic win on the semi-final stage like this, I couldn't be happier." South Africa captain Temba Bavuma: "From a batting point of view, we didn't get those partnerships. There were one or two there but we needed either myself or Rassie van der Dussen to emulate their top four."
