  This video can not be played To play this video you need to enable JavaScript in your browser. Rachin Ravindra brings up 'superb' century for New Zealand

  New Zealand's approach to a 50-over innings is about as traditional as it gets. Build a base over the first 35 or 40 overs, leaving enough wickets in hand to launch an almighty assault in the latter part of the innings. A simple strategy that, if executed well, can be hard to stop. In Lahore, New Zealand did so near perfectly. Of course, it requires players with both the technique and the temperament to go through the gears, knowing when the time is right to accelerate and which bowlers to target. It is a role Williamson has excelled in for more than a decade and, while the 34-year-old is showing no signs of slowing down, New Zealand look to have a natural successor in Ravindra. Throughout the 26 overs the pair were together at the crease, New Zealand dictated proceedings. When they wanted to tick over quietly with ones and twos they did so, while remaining ready to put away the bad ball, then acknowledging the quality surface they upped the ante and seamlessly turned five or six-an-over into sevens and eights. Elegant left-hander Ravindra was in control throughout his innings and while he was the more aggressive in his stand with Williamson, he was fairly consistent in his scoring rate - his first fifty coming up in 47 balls, the second in 46. Ravindra's swift scoring meant the Black Caps could afford for Williamson to make a relatively slow start, confident he would be able to catch up. It took South Africa giving him a life on 56 to do so - Klaasen put down a catch behind the stumps, diving to his right - and Williamson made them pay. Having reached his half-century from 61 balls, he needed just 30 more to get to his ton as he pushed on after Ravindra's dismissal, combining his usual classical strokes with some imaginative scoops and ramps. By the time Williamson departed in the 40th over, New Zealand were ready to launch. Given such a solid foundation, the power hitters did not disappoint.

