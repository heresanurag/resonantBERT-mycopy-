  If New Zealand highlighted the positives of building an innings towards a big finish, South Africa's showed that getting it right - especially in a chase - is far easier said than done. For more than 20 overs of the chase, all signs pointed towards a thrilling finish as the Proteas stayed right alongside where New Zealand had been at the same stage. However, just when the time came to start increasing the run-rate, Bavuma and Van der Dussen found themselves up against Santner. The New Zealand captain was as disciplined as ever with his left-arm spin, finding a probing line and length and subtly varying his pace. Bavuma was undone by a flighted delivery that dipped late and turned enough to find a leading edge that looped to backward point, while Van der Dussen was bowled by a flatter ball darted in at leg stump that straightened to hit middle and leg. Santner had Klaasen caught at long-on in his next over and from game on in the 23rd over, it was game over in the 29th. Spin continued to do the trick for the Black Caps, with Ravindra getting Aiden Markram caught and bowled before Phillips and Michael Bracewell also picked up wickets with their off-spin. Miller was impressive in bludgeoning his way to three figures but by the time he got going, the game was lost.

