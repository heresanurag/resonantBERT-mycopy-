content: |-
  Haydock Park officials are investigating after a mass brawl involving about 50 people broke out among spectators at the racecourse.

  Last updated on .From the section Horse Racing

  Haydock Park officials are investigating after a mass brawl broke out among spectators at the racecourse.

  About 50 people were involved in the fight before and during the eighth and final race of the day. A woman and toddler were caught up in the disturbance.

  A spokesman said Haydock took a "zero tolerance position" on fighting and that those involved were "ejected".

  One man was arrested over a public order offence.

  Racing has been on high alert over on-track fighting after incidents at Goodwood, Ascot and Hexham in 2018.

  The spokesman said Haydock was "continuing to work with the police on this matter".

  Merseyside Police said: "A 26-year old male was arrested on suspicion of affray and possession of a controlled drug.

  "No complaints were made and there have been no reports of any injuries at this time."
