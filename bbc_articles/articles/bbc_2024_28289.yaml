  Frivolity only gets a team so far, though. Having a Grand Slam champion like Raducanu ready to work in tandem with Boulter, a top 25 player, has been a difference-maker. Raducanu led Britain into the 12-nation knockout stage by winning both her matches in April's qualifier against France, Boulter providing the other point with one victory. In Malaga, neither has dropped a set in the best-of-three wins over Germany and Canada. "The more I play Billie Jean King Cup, the more I enjoy it, the more I feel like the stakes are so high - but in a really relaxed and exciting way," said Raducanu, who had not played for two months because of a foot injury before this event. Against Slovakia, Raducanu and Boulter will again face lower-ranked opponents, meaning Britain are favourites to set up a final against Italy on Wednesday. Even if they lose, it has been a credible run given they were the second lowest-ranked team and the uncertainty over Raducanu's fitness. "Being able to captain this team is a huge privilege for me," said Keothavong. "But the job is far from over."
