  The Biden administration sued Idaho over its near-total abortion ban in 2022, with Department of Health and Human Services Secretary Xavier Becerra saying that "women should not have to be near death to get care". Idaho countered, saying that the federal law - known as Emergency Medical Treatment and Labour Act or Emtala - cannot supersede state law. In a statement in April, the prominent anti-abortion group Susan B Anthony Pro-Life America called the Biden administration's lawsuit a "PR stunt" to spread "abortion lobby misinformation". "The Emtala case is based on the false premise that pregnant women cannot receive emergency care under pro-life laws," said the organisation's public affairs director, Kelsey Pritchard. “It is a clear fact that pregnant women can receive miscarriage care, ectopic pregnancy care and treatment in a medical emergency in all 50 states," she added. The court's nine justices appeared divided during earlier arguments on the case in April. In the document leaked on Wednesday, most of the court's conservative justices suggested that they were sympathetic to Idaho's case that doctors could not be compelled to break state law because of Emtala. The three liberal justices - Sonya Sotomayor, Elena Kagan and Ms Jackson - on the other hand, all seemed doubtful that Idaho could, under Emtala, deny abortions to pregnant women facing serious health concerns. In April, the Associated Press reported that at least six pregnant women had to be airlifted out of the state for emergencies since the law came into effect in January. In 2023, by comparison, one patient required a similar emergency airlift. In a separate ruling earlier in June, the Supreme Court unanimously rejected an effort to restrict access to the abortion pill mifepristone. The decision, which came two years after the court rescinded the nationwide guarantee to an abortion, was welcomed by pro-choice activists.
