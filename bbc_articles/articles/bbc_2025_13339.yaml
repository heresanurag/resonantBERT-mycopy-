title: Meghan shares pregnant dance video to mark Lilibet's birthday - BBC News
date: '2025-06-05'
section: UK
url: http://www.bbc.co.uk/news/articles/cewd79ey270o
content: |-
  The Duchess of Sussex releases a video of her dancing while pregnant with Princess Lilibet in 2021.

  The Duchess of Sussex has shared photos of Lilibet to mark her fourth birthday

  The Duchess of Sussex has posted a video of her dancing while pregnant with Princess Lilibet four years ago to mark her daughter's birthday. The video features Meghan and the Duke of Sussex dance and gyrate in a hospital room. The couple were recreating a TikTok challenge which sees pregnant women and their partners dance to a song called Baby Mama Dance. She wrote on Instagram: "Four years ago today, this also happened. Both of our children were a week past their due dates... so when spicy food, all that walking, and acupuncture didn't work - there was only one thing left to do!"

