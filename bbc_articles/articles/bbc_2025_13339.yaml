  It is not known if the dance challenge, created by comic Cameron Henderson in 2013 and includes the lyrics "been pregnant for way too long", did indeed induce Meghan's labour. The post came after a series of posts by the duchess sharing intimate family photos of four-year-old Princess Lilibet. Meghan shared a black-and-white snap of her cuddling her daughter, who is sitting on her lap, with the pair both sporting windswept hair, appearing to be on a boat. The second image shows Meghan tenderly cradling the princess as a newborn following her birth in 2021. Meghan wrote: "Happy birthday to our beautiful girl! Four years ago today she came into our lives – and each day is brighter and better because of it.

  "Thanks to all of those sending love and celebrating her special day!" The duchess also released an image of a newborn Princess Lillibet looking up at her father. Another image shows the duke and his daughter in a dress walking bare feet in the sand, with their backs turned to the camera, surrounded by palm trees. "The sweetest bond to watch unfold," she said of the pictures. "Daddy's little girl and favourite adventurer. Happy birthday Lili!" Meghan usually only shares photos of the princess pictured from behind to protect her privacy, but in one of the newly released photos you can see Lilibet's eyes and top half of her face, with the bottom half covered by Meghan's arms as she hugs her daughter. The princess - the youngest child of the Duke and Duchess of Sussex - was born on 4 June 2021, a year after her parents stepped back from being senior royals and moved to the US. She became a princess when her grandfather the King became monarch. The couple also share Prince Archie, aged six.

  On Tuesday, Meghan said she wondered about launching a future business with her daughter as she chatted to Beyonce's mother Tina Knowles on her podcast Confessions Of A Female Founder. "I wonder if one day I'll be in business with Lili and we'll be building something," the duchess said, with Knowles adding: "That's the best." Last week, the duchess shared a clip of her and the princess beekeeping in protective suits, writing: "Like mother, like daughter; she's even wearing my gloves." Lilibet is named after her great-grandmother Queen Elizabeth II. The nickname was coined when then-Princess Elizabeth was a toddler and could not pronounce her own name properly. Her grandfather King George V would affectionately call her Lilibet, imitating her attempts to say her name. It stuck and came to be used by close relatives.

