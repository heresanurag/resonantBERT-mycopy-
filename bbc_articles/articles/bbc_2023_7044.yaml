title: Unfazed officer delivers a baby on the highway - BBC News
date: '2023-05-04'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-65477869
content: |-
  Having grown up birthing calves, this Florida officer was ready for action when needed.

  Master Deputy Daniel 'Red' Jones grew up birthing cows and was therefore ready for action when a roadside emergency resulted in a new born baby in his hands.
