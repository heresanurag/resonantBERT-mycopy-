  Kent Fire and Rescue Service and five South East Coast Ambulance Service crews also attended the scene.

  Det Ch Insp Chewter said: "We believe there are likely to be further casualties who perhaps left the club during the panic and we would like to hear from them."

  He also urged anyone who was in the club at the time or anyone with photos or original video footage to get in touch.

  Kent Police said it was not being treated as a terror-related incident.
