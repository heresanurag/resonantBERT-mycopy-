  Several bills are going up at the start of April - but there are some things you can do about it.

  What you can do about the seven bills going up this week

  The start of April means several bills are going up, putting extra pressure on household finances. For some payments, such as energy, water or broadband, there are things you could do to reduce the impact of price rises. Here are seven ways you could be affected by this week's increases.

  Water bills for households in England and Wales are going up by £10 per month on average. However, there's a lot of variation depending on your supplier, external. For example, the annual Southern Water bill is jumping 47% to £703, while Anglian Water customers are paying 19% more, or £626. The increases are being front-loaded for the next five years, meaning the biggest rise is coming this year. How much your bills will rise depends on a range of factors including whether households have a meter and how much water they use. Water companies in England and Wales have said the increases are needed to invest in creaking infrastructure, including sewage, and to build more reservoirs. In Scotland, water bills are rising by almost 10%. Scottish Water said spending was needed to cope with periods of "drought and intense rainfall" brought on by climate change. Domestic customers in Northern Ireland are not billed for water. Read more: There are a number of ways you can cut your water bill, from taking showers instead of baths to checking your bill for unexplained increases.

  The annual energy bill for a household using a typical amount of gas and electricity is going up by £111 a year to £1,849 from April. Regulator Ofgem increased the energy price cap because of higher wholesale costs and inflation. The cap is set every three months and limits the amount suppliers can charge for each unit of gas and electricity, but not the total bill, so if you use more, you will pay more. It covers 22 million homes in England, Wales and Scotland. Standing charges - fixed fees to connect to a gas and electricity supply and vary by region - are rising again for gas but dropping for electricity, but the amount you pay depends on where you live. Ofgem is suggesting households may consider switching to a fixed tariff for a bit of stability. Read more: Fixed-price deals are not affected by the energy price cap and offer certainty for a set period. But if energy prices drop when you are on the deal, you could be stuck at a higher price.

  It is likely the tax you pay to your local authority is going up. In England, local authorities with responsibility for delivering social care can increase council tax every year by up to 4.99% without triggering a referendum or local vote. Smaller councils without social care duties can increase bills by up to 2.99%. For 2025-26, the government is allowing Birmingham, Bradford, Newham, Somerset, Trafford, and Windsor and Maidenhead to bypass the 4.99% cap, meaning residents face larger increases. Council tax rates in Scotland have been frozen or had limited increases since 2007, but they are are also going up, in some cases by more than 10%. The Scottish government says it is offering local authorities an extra £1bn in 2025-26 to help reduce the scale of any rise. In Wales, council tax rates are jumping by as much 15% in some areas. Local authorities were given £253m by the Welsh government in its draft budget, but council leaders say more money needed. Northern Ireland uses a domestic rates system, external instead of council tax. All of Northern Ireland's councils have reported district rate increases for the next year. Read more: There are some exemptions and discounts, for example for someone living alone and homes occupied only by students. You can also check your council tax band.

  House buyers in England and Northern Ireland will start paying stamp duty on properties over £125,000, instead of over £250,000. First-time buyers currently had paid no stamp duty on homes up to £425,000, but this is dropping to £300,000. A host of homebuyers had been trying to beat the deadline to avoid paying the higher rate. Read more: The amount of stamp duty you pay depends on the cost of the property, whether you will live in it, and whether you own any other property.

  Rule changes introduced by the telecoms regulator earlier in 2005 mean that mobile and broadband providers must now tell customers "in pounds and pence" about any price rises, as well as when they occur. The new rules typically only apply to new customers, so any price rise will depend on when you took your contract out, but prices often increase at this time of year. For instance, under the new rules, someone with a mobile sim-only contract with EE will see their bill go up by £1.50 a month, or £18 a year. But the majority of EE customers who took their contract out before 10 April 2024, will face an increase of 6.4%, which is based on the December 2024 inflation rate plus an additional charge. Similarly, most Virgin Media broadband customers will face a 7.5% rise in bills, but anyone who took out a contract after 9 January 2025 will see their monthly bill go up by £3.50. The cost of a TV licence is also going up by £5 to £174.50. The cost for a black and white TV is going up by £1.50 to £58.50.

  The standard rate of tax for cars registered after April 2017 is rising £5 to £195 a year. According to the RAC,, external you may pay less or more if your car was first used before 2017. The exact amount for your vehicle excise duty will depend on the year your car was registered and the type of fuel it uses. One big change is that electric vehicles (EVs) will no longer be tax exempt. EVs registered from April 2025 will pay the lowest rate of £10 in the first year, then move to the standard rate. The standard rate will also apply to EVs first registered after April 2017.

  The government has kept in place the freeze on tax thresholds on income tax and National Insurance until 2028, a policy brought in by the previous government. This is often dubbed a stealth tax because of a process called "fiscal drag", which sees more people "dragged" into paying higher rates of tax as wages rise. The new tax year begins on 6 April. According to the government's financial watchdog, external, the frozen thresholds mean that by 2028-29, nearly four million additional people will be expected to pay income tax - and three million more will have moved to the higher rate. Read more: What are income tax and National Insurance and what do they pay for?

