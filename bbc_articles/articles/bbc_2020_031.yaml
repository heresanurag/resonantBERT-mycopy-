id: bbc_2020_031
title: Troops called in amid record Canada snowfall - BBC News
date: '2020-01-21'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-51200459
content: |-
  The Canadian province of Newfoundland and Labrador was hit with more than 70cm of snow.

  The Canadian province of Newfoundland and Labrador was hit with more than 70cm (27in) of snow in a record breaking blizzard.

  The military has been called in to help with recovery efforts.
