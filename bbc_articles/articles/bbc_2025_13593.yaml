title: 'Inheritance fraud: Mum''s shown no remorse, daughter says - BBC News'
date: '2025-06-08'
section: General
url: http://www.bbc.co.uk/news/videos/c3e5y2qnn2jo
content: |-
  Jessica Thomas reflects on how her mother spent £50,000 in inheritance money left to her and sister.

  "She showed no remorse for anything that she did," says a tearful Jessica Thomas while reflecting on how her mother spent £50,000 in inheritance money left to her own daughters.

  On Monday, Katherine Hill, 53, was ordered by a court to repay the money left to sisters Gemma and Jessica Thomas by their grandmother Margaret Hill in 2014 to be accessed when they reached 25.

  Hill, from Alltwen in Pontardawe, Neath Port Talbot, and her father Gerald Hill, 93, from Fairwood in Swansea, were found guilty of fraud by abuse of power after a trial last year.

  "She wasn't upset when the victim statements were read out," recalls Jessica Thomas in an interview with BBC News while looking back on how her mother had paid for holidays and other things like a hot tub.
