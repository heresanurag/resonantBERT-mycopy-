content: |-
  Captain Suzann Pettersen says she does not “have any regrets” as Europe fall to a 151⁄2-121⁄2 defeat to the United States and relinquish their five-year hold on the Solheim Cup.

  Pettersen has 'no regrets' after Solheim Cup loss

  Suzann Pettersen also captained the European team that retained the Solheim Cup in 2023

  Captain Suzann Pettersen says she does not "have any regrets" after Europe were beaten 151⁄2-121⁄2 by the United States, relinquishing their five-year hold on the Solheim Cup. Having trailed to a record 6-2 opening-day deficit on Friday, Europe produced a gutsy display to win Sunday’s single matches 61⁄2-51⁄2 and, at one point, appeared capable of reaching the 14 points required to claim the trophy for an unprecedented fourth successive occasion. However, Norwegian Pettersen then came under scrutiny for her selections, having chosen to leave Ireland's Leona Maguire - a star of the previous two editions - out of Saturday's foursomes and fourballs matches where the spoils were shared and the US held a 10-6 advantage before the final day of action.

