  Look at some of the striking photos taken as strong wind and rain brought big waves and disruption.

  Storm Barra has caused heavy rain and strong winds across Northern Ireland.

  Here are some striking pictures from the day.

  The crashing waves also made conditions difficult for drivers

  The festive decorations at Stormont were a casualty of the strong winds

  A splash of colour amid the crashing waves in Whitehead

  Strong winds forced scaffolding down and damaged a car in Londonderry

  Umbrellas were out in force as the weather worsened in Belfast city centre

  A wall collapsed at Ballywalter Harbour due to the conditions

  Water lay on some surfaces like the Braniel Road in Belfast
