  Hamas leader Sinwar was killed in my ruined house, Gaza man tells BBC

  Yahya Sinwar, pictured in June 2021, was killed by Israeli forces on 16 October

  A Palestinian man from Gaza has told the BBC that the house the former Hamas leader Yahya Sinwar was killed in was his home for 15 years before he had to flee in May. Ashraf Abo Taha said he was "shocked" as he identified the partially destroyed building in Israeli drone footage of the incident as his home on Ibn Sena street in Rafah, southern Gaza. Sinwar, the key figure behind the 7 October attacks on Israel, was killed by Israeli troops on Wednesday. The Israeli military released drone footage that it said showed Sinwar in a partially destroyed house before he was killed.

  This video can not be played To play this video you need to enable JavaScript in your browser.

  Mr Abo Taha told BBC Arabic's Gaza Lifeline that he had left his home in Rafah for Khan Younis on 6 May, when Israel ordered evacuations and began its military offensive in Rafah, and had not received any news of his house until now. Mr Abo Taha said his daughter first showed him the footage purportedly capturing Sinwar's last moments on social media, saying it depicted their house in Rafah. He initially didn't believe her, he said, until his brother confirmed the house was indeed his. "I was like 'yes this is my house' and I saw the pictures and here I was shocked", Mr Abo Taha said. He said he had no idea why Sinwar was there or how he got there. "Never ever did me and my brothers and sons have anything to do with this," he said. The BBC has verified that pictures and videos provided by Mr Abo Taha of his home match imagery of the house where Sinwar was killed. BBC Verify compared and matched images of the home's window archways, external decorations on doorways, shelves, and armchairs from the footage. The BBC cannot independently verify that Mr Abo Taha owned the home.
