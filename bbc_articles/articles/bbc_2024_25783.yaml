  The tiles around the doorway from the house Mr Abo Taha says is his are similar to those from the partially destroyed building where Israeli troops said they killed Yahya Sinwar.

  The footage of Sinwar's killing was analysed by the BBC, and the house in which he was last seen was one of the few partially destroyed buildings in a neighbourhood with extensive damage. The Israeli assault on Rafah in May was met with strong international criticism, and triggered the exodus of more than a million Palestinians, according to the UN. Many had been forced to move for a second or third time, as they had been sheltering in and around Rafah after being displaced from other parts of Gaza. Mr Abo Taha said he had built his home in Rafah himself with the help of his siblings. It had cost some 200,000 shekels (£41,400) and had been in good condition when he left, he said. He described his home's orange sofas and an orange casserole dish, remembering the last time he saw them as he fled his home. "These are memories because some of these were brought by my mum and they are very precious to me," he said. "What happened has saddened me a lot, the house that I built and all my payments are gone," he said. "Only God can compensate us."
