  Thousands of spectators have taken to the streets of the City of London to watch the 2024 Lord Mayor's Show procession. The parade, which dates back to the 13th Century, featured about 7,000 people, 250 horses and 150 floats, from Guildhall to the Royal Courts of Justice on Saturday. The procession marks the first public engagement for the new Lord Mayor of the City of London, Alastair King. Mr King, the 696th Lord Mayor, must travel to the Royal Courts to swear allegiance to the Crown before taking up his role. You can watch the Lord Mayor's Show on the BBC iPlayer.
