title: 'UFC 309: Jon Jones stops Stipe Miocic with spinning kick to retain heavyweight
  title - BBC Sport'
date: '2024-11-17'
section: MMA
url: http://www.bbc.co.uk/sport/mixed-martial-arts/articles/cgj7zdzveedo
content: |-
  Jon Jones cements his status as one of the best MMA fighters of all time as he stops Stipe Miocic with a spinning kick to retain his heavyweight title at UFC 309.

  Jon Jones made the first defence of his heavyweight title

  Jon Jones cemented his status as one of the best mixed martial artists of all time as he stopped Stipe Miocic with a stunning kick to retain his heavyweight title at UFC 309. Jones dropped fellow American Miocic with a thudding spinning back kick in the third round at New York's Madison Square Garden to make the first defence of his belt. Jones, 37, said he plans to continue his UFC career, but did not confirm if his next fight will be against Britain's interim champion Tom Aspinall. "As far as my future in the octagon, I decided that maybe I will not retire," said Jones. "I'll have some conversations and we have some negotiating to do and if everything goes right, maybe we'll give you guys what you want to see." Former two-time heavyweight champion Miocic, 42, confirmed his retirement after defeat. "It sucked I lost. I knew he was one of the best of all time. Came strong. I felt good. I was blocking and he caught me in the ribs," said Miocic. "I'm done. I'm hanging them up. I'm retiring, thank God." Former light-heavyweight champion Jones' win was his record-extending 16th in title fights - and 22nd overall in the UFC. Miocic, meanwhile, leaves the sport with the record for most heavyweight title defences (four) and widely considered the division's greatest champion. The prestige of the event was amplified by American president-elect Donald Trump, who sat octagon-side after arriving to a rousing reception alongside tech billionaire Elon Musk, musician Kid Rock and UFC supremo Dana White. Trump waved to fans, who chanted "USA" as he walked to the octagon, before soaking in applause and dancing as the UFC played footage celebrating his election victory. White was a key ally and campaigner for Trump during the election, as the UFC continue to face legal challenges to the way it operates through lawsuits from former fighters.

