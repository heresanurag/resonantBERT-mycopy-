content: |-
  England forward Beth Mead is named the player of the tournament at Euro 2022 after winning the Golden Boot as top scorer.

  Last updated on .From the section Women's Euro 2022

  England forward Beth Mead was named Euro 2022's best player after winning the Golden Boot award given to the tournament's top scorer.

  Mead edged Germany's Alexandra Popp in the scoring stakes, despite both players finishing on six goals.

  Arsenal's Mead claimed the prestigious award as she had more assists than Popp, with the England player laying on five goals for her team-mates.

  Germany captain Popp pulled out of Sunday's final with England injured.

  On a historic day, Mead's side beat Germany 2-1 after extra time to win Euro 2022.
  • None 'Women's football will never be the same again'

  It was a first major trophy for the Lionesses - and first for a senior England team since the men won the 1966 World Cup.

  Mead, 27, scored in four of England's six games at the home tournament, including a hat-trick against Norway in the group stage on 11 July.

  Meanwhile, Popp, 31, scored in all five of Germany's matches before the final, including both goals in the 2-1 semi-final win over France. But she had no assists in the tournament.

  Mead's success is all the more remarkable after she was left out of the Team GB squad for the Tokyo Olympics a year ago.

  "I can't believe it," she told BBC Sport. "Sometimes football puts you down, but bouncing back is the best way. I'm speechless, I can't take it all in... I'm in shock.

  "I've had a good cry with my mum and dad. I am so proud of this team, I love this team and I love this country!"

  Germany's 20-year-old midfielder Lena Oberdorf was named the tournament's best young player.
