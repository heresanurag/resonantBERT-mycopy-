  Author Bernardine Evaristo explains how her husband surprised her with a novel he'd secretly written.

  When author David Shannon's debut novel was accepted by a leading literary agent, it came as a big surprise - not just to him, but also to his wife, the Booker Prize winner Bernardine Evaristo.

  She knew he'd spent hours in their study but thought he was up to something else...

  Listen to the full interview on BBC Radio 4's Today programme.
