title: 'Cambridge Analytica: PM quizzed over Conservative links - BBC News'
date: '2018-03-21'
section: UK Politics
url: http://www.bbc.co.uk/news/uk-politics-43486054
content: |-
  The SNP puts Theresa May on the spot over the controversial firm at Prime Minister's Questions.

  Theresa May has been challenged to explain alleged Tory links to firms at the centre of a dispute over the harvesting and use of personal data.

  The SNP's Ian Blackford said SCL, the parent company of Cambridge Analytica, has been run by a chairman of Oxford Conservative Association.

  He also claimed its founding chairman was a former Tory MP and a director had donated over £700,000 to the party.

  The PM said she was not aware of any current contracts with the firms.

  The prime minister's official spokesman later said that three government departments had had contracts with the SCL Group in the past.

  Political consulting firm Cambridge Analytica is facing questions over whether it used the personal data of millions of Facebook users to sway the outcome of the US 2016 presidential election and the UK Brexit referendum.

  The company has suspended its CEO, Alexander Nix, who was filmed as part of a Channel 4 investigation giving examples of how the firm could swing elections around the world with underhand tactics such as smear campaigns and honey traps.

  Facebook founder Mark Zuckerberg has admitted the company "made mistakes" in its dealings with Cambridge Analytica and a "breach of trust" had occurred between the social media giant and its users.

  In a statement, he promised to strengthen the way users' data is protected to prevent "harvesting".

  And he said app developers that misused personally identifiable information would be banned from accessing the platform.

