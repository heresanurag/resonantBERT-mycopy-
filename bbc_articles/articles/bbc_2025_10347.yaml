  Crews fought the fire on East Beach, Undercliff Drive, on the Bournemouth seafront

  Seven beach huts have been destroyed and two others damaged in an overnight blaze. Crews were called to East Beach on Bournemouth seafront at about 01:20 BST where flames had engulfed several huts and part of the cliff. The fire was out by 03:00 BST and an investigation into the cause is under way. Bournemouth, Christchurch and Poole (BCP) Council said it was now possible to pass the site but urged people to stay away from the huts while work continues.

  Westbourne Fire Station said the incident was "generating a lot of smoke"

  One of the partially damaged huts is the UK's first council-owned beach hut, which is adorned with a blue plaque. The traditional-style hut, 500 ft (150m) east of Bournemouth Pier, was built in 1909 by F P Dolamore - the borough engineer at the time. BCP Council said only one of the huts was being rented by a customer and it was working with them to find an alternative solution. BCP's head of seafront, Anthony Rogers, said the fire had "sadly resulted in a loss of seven huts, with two further adjacent huts and a small area of the cliff sustaining some damage". "Beach Hut 2359, the site of the first municipal beach hut, was one of these adjacent huts," he said. Mr Rogers said the council was reviewing CCTV and would work with the fire service on the investigation. "We thank the fire service for their swift response, as well as residents and visitors for their understanding and cooperation with the safety measures in place around the site of the fire," he added.

  One damaged hut has a blue plaque commemorating the country's first council-owned beach hut

  Dorset & Wiltshire Fire and Rescue Service said the fire covered a 25m by 15m (82ft by 49ft) area. It warned the incident was "generating a lot of smoke" and advised residents to keep doors and windows closed. It said: "The scene was handed over to BCP Council, and investigations will continue today into what caused the fire." Officers from Dorset Police were also in attendance during the operation.

