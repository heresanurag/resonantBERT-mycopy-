id: bbc_2019_164
title: Brixton Hill 'hit-and-run' crash victim dies - BBC News
date: '2019-01-13'
section: London
url: http://www.bbc.co.uk/news/uk-england-london-46849453
content: |-
  Police hunt a driver after the woman, aged in her early 20s, died at the scene in Brixton Hill.

  The driver of a dark-coloured VW car is being hunted after the crash early on Saturday

  A woman has been killed in a suspected hit-and-run crash in south London.

  The victim, aged in her 20s, was struck by a car "travelling at speed" on Brixton Hill in the early hours, the Met said.

  Detectives are hunting the driver of a dark-coloured VW - possibly a Golf - after the crash at about 00:30 GMT, at the junction with New Park Road.

  Paramedics tried to revive the woman but she was declared dead at the scene.

  The Met said the woman was struck by a car "travelling at speed"

  "The driver of the vehicle, which was travelling at speed, did not stop at the scene and inquiries are under way to trace it," the Met said.

  The force added the car might have a damaged bonnet.

  An appeal for witnesses has been issued.

