title: US truck driver slides down icy road - BBC News
date: '2017-01-14'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-38622002
content: |-
  A US truck driver slides his jack-knifed vehicle down an icy road after his brakes locked.

  A US truck driver has been forced to slide his jack-knifed vehicle down an icy mountain road after his trailer's brakes locked.

  California Highway Patrol officers closed the road and escorted the truck down, making it to a safe place 20 minutes later.
