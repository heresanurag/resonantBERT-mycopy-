content: |-
  Danika Priim, who has appeared on the BBC and Sky, will appear before Leeds Crown Court next month.

  Danika Priim has previously appeared on the BBC and Sky

  A rugby league pundit who has featured on the BBC and Sky Sports has been charged with sexual assault. Danika Priim is accused of sexually touching a woman at Horsforth Cricket Club, in Leeds, on 22 July 2022. The 40-year-old appeared before magistrates last Thursday and is due to appear before Leeds Crown Court on 13 March. No pleas were entered during the previous hearing. Ms Priim, of Annie Street, Keighley, played in the Women's Super League for Bradford Bulls and Leeds Rhinos during her playing career, and also represented England at the 2017 World Cup.

  She retired from playing in 2021 and became the vice-president of the Rugby Football League (RFL) earlier this year. A spokesperson for the RFL said Ms Priim would voluntarily stand down from her role as vice-president while legal proceedings took place. They said the organisation would make no further comment until completion of the legal proceedings. Ms Priim has worked as a pundit the BBC and Sky on a freelance basis, including during the BBC's coverage of the 2022 Rugby League World Cup. Listen to highlights from West Yorkshire on BBC Sounds, catch up with the latest episode of Look North or tell us a story you think we should be covering here, external.
