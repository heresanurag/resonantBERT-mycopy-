  Aaron Webb was taken to hospital but died a short time later

  A 12-year-old boy has died after he was struck by a van in County Antrim.

  Aaron Webb, who was a pedestrian, was knocked down on the Lisburn Road in Glenavy at about 15:30 GMT on Friday.

  The boy, who was from the greater Lisburn area, was taken to hospital but died a short time later.

  Police want anyone who witnessed the collision or who may have dashcam footage of it to contact them.
