  Police appeal for information after the attacks at the home of Hampshire cricketer James Vince.

  England cricketer's home and cars hit in two attacks

  Hampshire cricket captain James Vince and his family were inside their home at the time, the BBC understands

  Police are investigating two incidents of criminal damage at the home of England cricketer James Vince. The Hampshire captain's property, near Southampton, was targeted in the early hours of 15 April and 11 May. On both occasions two cars were damaged and the front room windows were smashed. Vince, 33, told The Telegraph, external he believed the attacks were a case of mistaken identity.

  Officers have released CCTV images of the people they would like to speak to in relation to the damage.

  This video can not be played To play this video you need to enable JavaScript in your browser.

  One of the men in the footage is described as wearing a grey hooded top, with Gym King written across the back of the shoulders, grey tracksuit bottoms and black trainers. The BBC understands Vince and his young family were inside the property on both occasions when the perpetrators carried out the damage. Vince has been a regular for Hampshire since 2009, making his England debut in 2015 and going on to play 13 tests and 25 One Day matches for the international side. He was also part of the England squad that won the 2019 Cricket World Cup.

