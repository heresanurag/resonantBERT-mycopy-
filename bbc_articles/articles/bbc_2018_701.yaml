title: 'Kabul bomb attack: Crowds run after deadly blast in Afghan capital - BBC News'
date: '2018-01-27'
section: General
url: http://www.bbc.co.uk/news/world-asia-42843648
content: |-
  Dozens of people are killed and injured in a suicide attack in Afghanistan's capital, officials say.

  Dozens of people have been killed and injured in a suicide bomb attack in the centre of Afghanistan's capital, Kabul, officials say.

  There are reports that an ambulance was used to hide the bomb.

  The Taliban has said it carried out the attack.
