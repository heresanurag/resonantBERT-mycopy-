id: bbc_2024_537
title: 'England floods: Helicopter footage captures three days of chaos - BBC News'
date: '2024-01-06'
section: General
url: http://www.bbc.co.uk/news/uk-67893992
content: |-
  Aerial video shows horses being rescued and cars, lorries and homes under water as river banks burst.

  A week of heavy rainfall and a powerful storm has lead to mass flooding in parts of England.

  Near Loughborough, horses had to be rescued by boat after they were stuck on a flooded field.

  Several rivers burst their banks, including the Trent in Nottinghamshire and the Severn in the West Midlands and West of England.
