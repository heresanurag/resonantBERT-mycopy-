id: bbc_2018_1273
title: John Worboys judicial review 'not appropriate' - BBC News
date: '2018-01-20'
section: General
url: http://www.bbc.co.uk/news/uk-42747722
content: |-
  Justice Secretary David Gauke has announced he will not seek a judicial review in the case of serial rapist John Worboys.

  The former London black cab driver, 60, was granted release in November last year.
