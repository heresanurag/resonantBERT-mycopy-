title: 'United Cup: Coco Gauff and Taylor Fritz guide US to title - BBC Sport'
date: '2025-01-05'
section: Tennis
url: http://www.bbc.co.uk/sport/tennis/articles/c3wevn18pezo
content: |-
  Coco Gauff and Taylor Fritz clinch victory for the United States over Poland in the United Cup final in Sydney.

  Gauff will be hoping to win her second Grand Slam title in Australia

  Taylor Fritz got the better of Poland's Hubert Hurkacz in a third-set tie-break to clinch victory for the United States in the United Cup final in Sydney. The 6-4 5-7 7-6 (7-4) success for the world number four followed a straight-set win for Coco Gauff over Iga Swiatek in the opening women's singles match. It is the second win for the US in the mixed team event after they took the inaugural title in 2023. Gauff, the world number three, claimed a second successive win over Swiatek after beating the former world number one on her way to the WTA Finals title in Riyadh in November. The Pole, who is now world number two, took a medical timeout at 5-4 down in the second set to have strapping put on her left thigh, which has bothered her all week, and after the 6-4 6-4 defeat she left the court in tears, walking gingerly. The win continued a perfect week for Gauff, 20, who had won all six of her previous singles and doubles matches at the event as she continues her preparations for the Australian Open, which begins on 12 January in Melbourne.

  "I think I have the belief that I am one of the best players in the world, and when I play good tennis, it's hard for me to be beaten," said Gauff, who has not lost a singles match since a defeat in October by world number one Aryna Sabalenka in the Wuhan semi-finals. "Today I think I played great tennis, and I'm happy to get a point for my team on the board," she said. "It was tough today. I'm not gonna lie." The second rubber proved tense but Fritz raised his level at 3-3 in the tie-break of the decider to see off his opponent and spark celebrations.
