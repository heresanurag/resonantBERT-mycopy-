title: Memorial service marks 40 years since Bradford City fire - BBC News
date: '2025-05-12'
section: England
url: http://www.bbc.co.uk/news/articles/cx27k0zwewvo
content: |-
  The disaster killed 54 Bradford City and two Lincoln City supporters, while injuring hundreds more.

  The service took place at the Bradford City Fire Memorial sculpture in Centenary Square on Sunday

  Relatives and friends of those who died or were injured in the Bradford City fire were among the crowd of people who attended a 40th anniversary memorial service. The service took place at the Bradford City Fire Memorial sculpture in Centenary Square at 11:00 BST. The City of Bradford Brass Band played You'll Never Walk Alone, before the City Hall bell tolled 56 times to mark the number of people who died. A wreath was also laid on behalf of King Charles III. Mayor of Bradford Beverley Mullaney said the service was set up to help people "come together to pay tribute".

  She added: "It is important to the city and district that we take time to remember those who were affected and those who continue to be affected by the tragic events on 11 May 1985." The service also included Canon Pastor Oliver Evans, who is the Bradford City AFC club chaplain, giving a welcome speech. And Reverend Andy Bowerman, Dean of Bradford, also gave a short reflection. The rendition of You'll Never Walk Alone was chosen because of the song's association with the tragedy. Within days of the disaster, a supergroup including Gerry Marsden, Rick Wakeman, the Who's John Entwistle, Phill Lynott, Motorhead and the Nolans joined a number of TV and sports stars on a new version of the classic terrace anthem. It reached number one in the charts and proceeds were donated to the families of those affected by the fire. After the memorial service finished, the City Hall opened for a short while for fans and visitors to view a memorial bell at the top of the civic staircase in the hall.

  Crowds gathered to listen to the service and pay tribute to those who died or were injured

  The bell, which came from the first fire engine to arrive on the scene on 11 May 1985, was donated to the city by the West Yorkshire Fire and Rescue Service. Bradford City were playing Lincoln City in their last home match of the season when a fire ripped through the Valley Parade stadium with 11,000 fans watching. Fifty four Bradford City supporters died, along with two travelling Lincoln supporters, as well as injuring more than 260.

