  The message, which Mr Oranchak described as "more of the same attention-seeking junk from Zodiac", consists of rows of capital letters and symbols. The code-breaking team, who used human ingenuity and software to decipher the message, dedicated their efforts to the killer's victims and their relatives.

  Confirming the code-breaking achievement, the FBI said it continued to seek justice for those killed.

