title: Colombian military loses millions of bullets, says president - BBC News
date: '2024-05-01'
section: Latin America & Caribbean
url: http://www.bbc.co.uk/news/world-latin-america-68931217
content: |-
  Military personnel have been selling weapons to arms traders, says President Gustavo Petro.

  Colombia's president Gustavo Petro blamed military corruption for huge losses of arms and ammunition at two bases

  Colombia's military has lost millions of bullets, thousands of grenades and several missiles, the nation's president has said. Gustavo Petro said the disappearance of the items had come to light during recent inspections of military bases. He blamed it on internal corruption, saying military personnel sold weapons to arms traders. His defence minister said investigations into the disappearances were under way. "The only way to explain this type of lacking [inventory] is that there have existed, for a long time, networks of people in the armed forces and civilians dedicated to mass commercialisation of arms, using legal arms from the Colombian state," Mr Petro told a news conference on Tuesday. He said the discovery that many items were missing had been made during surprise visits to two military bases - Tolemaida and La Guajira - on 12 February and 1 April, respectively. At Tolemaida, there was a shortfall of more than 808,000 bullets and nearly 10,000 fewer grenades than the inventory listed on official records. Meanwhile at La Guajira, the discrepancies included nearly 4.2 million bullets and more than 9,300 grenades. Mr Petro also said the base had lost two Spike missiles, 37 Nimrod missiles and 550 rocket-propelled grenades. He told reporters that the military supplies would have been passed on to armed groups within Colombia, but could have been smuggled to Haiti or sold on the international black market. "The saddest thing about this is that these same munitions end up wounding and killing the same members of the military forces," the Colombian president said.

  Colombia has suffered from decades of conflict involving government forces, left-wing guerrilla groups and right-wing paramilitary forces, in which more than 450,000 people have been killed. At the same time, members of its military forces have been convicted on a number of corruption and human rights abuse charges. Defence Minister Iván Velásquez told the same news conference that investigations into the missing items had begun and that some officials had been moved from their posts. He added that further inspections of military bases across the country were being planned. The Colombian military is one of the best equipped in the region. It has received billions of dollars from the United States to tackle drug cartels.
