title: '''Supermodel'' Chloe wins film role and fulfils fashion dream - BBC News'
date: '2018-09-24'
section: Glasgow & West Scotland
url: http://www.bbc.co.uk/news/uk-scotland-glasgow-west-45560004
content: |-
  The little girl who captured hearts with her "wear odd socks" video has beaten non-disability actors to a film role.

  On the catwalk: Chloe was proud of herself for getting through a tricky plan

  The girl who won hearts with her "wear odd socks for Down's syndrome" video has landed her first film role.

  Five year-old Chloe Lennon's video clocked up millions of hits back in March when she set out to raise awareness for the condition.

  Since then she has started working with a model agency and has been proving there is nothing she cannot do.

  After shooting campaigns for two high-street fashion stores, she has just been signed up for a film.

  Chloe, from Irvine in North Ayrshire, is preparing to perform in a Scottish short film this month.

  The casting call did not specify any disability and Chloe beat all the other candidates to the role.

  Chloe modelled in a show featuring the designs of former Girls Aloud singer Kimberley Walsh

  Her mum Jade told the BBC: "Last Monday I got an email saying her agent took a chance with it.

  They were specifically looking for a little Scottish girl. No mention of disability or a disabled model or Down's syndrome.

  "I had to send a video of her reading a bit of the script."

  Just two days later, Jade was told Chloe was booked for the job.

  She said: "The agency were so chuffed at another breakthrough for disability - because they hadn't asked for a disabled actor.

  "So of all the Scottish five-year-olds, they picked Chloe, not on tokenism but on credit. They liked the way she acted."

  "It'll be another new experience for her - filming over two or three days. She calls it her 'pretending'.

  "I can't wait for everyone to find out all about it when we are able to reveal the details."

  After starting school in August, Chloe has been fitting modelling assignments into her spare time.

  Chloe took to the model life

  She walked the runway at London Fashion Week in the Mini-Mode children's fashion show.

  Her mum said she worked hard to be ready.

  "Five minutes a day after school we practised her walk," she said. "Chloe has low muscle tone because of her Down's syndrome and so we practised to make sure she was happy."

  And it was just as intense as any fashion show.

  "It was hectic, outfits flying around, children running about, hair and make-up going on," Jade said..

  "But it was brilliant. Chloe loved it. She knows her model walk, she stands up straight and looks forward with her model face on.

  "After she came off she ran up to me and said she'd done so well."

