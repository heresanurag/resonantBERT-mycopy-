  She added; "She knows what's going on, she did everything like she was supposed to, stopped, turned the same way. She knew she had achieved something. She was very proud of herself."

  Chloe will become a familiar face when her two fashion campaigns go live.

  And she is getting more confident by the day.

  Chloe has done several photo shoots now

  Chloe is impressing the designers who are booking her

  She has spent the last six months taking part in photoshoots to give her experience, and according to Jade, she has transformed.

  She said: "Chloe has always been sociable but with being in this industry she has just blossomed and it is through getting used to meeting different people.

  "And it's helped her speech - I can't explain how much it has helped her. From doing little audition videos, it has helped her in so many other ways in her development."

  Chloe's agency - Zebedee models - thinks she has what it takes to be a massive success.

  Director Zoe Proctor said: "She has the most adorable personality. She is an open, sweet and very charming little girl.

  "In this industry you have got to have personality and take direction well and Chloe has everything going for her. That's why she keeps getting snapped up for things."

