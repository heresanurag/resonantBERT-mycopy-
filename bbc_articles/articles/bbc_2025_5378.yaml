title: Reeves's proposed cuts will trigger big political arguments - BBC News
date: '2025-03-05'
section: General
url: http://www.bbc.co.uk/news/articles/c9degwx4p4jo
content: |-
  The briefing that Rachel Reeves will make large spending cuts this month is very significant.

  The government briefing that Rachel Reeves will make large spending cuts this month is very significant, in several different ways. First, it confirms what had been rumoured - that the Office for Budget Responsibility (OBR), the independent forecaster, believes that the chancellor's 'headroom' has been eliminated. This is the £10bn worth of leeway which, as of last October, the OBR believed the government had before breaking its self-imposed borrowing rules. Why has that headroom disappeared? The government's clear view is that this is because of global factors - tariffs being imposed by President Trump, broader uncertainty emanating from the new US administration, persistent inflation in the UK and elsewhere, and the rising cost of government borrowing. But there will be a big political argument about this. The Conservatives will contend that the cost of government borrowing was rising even before President Trump took office and that the tax rises in Reeves's Budget in October were a major factor, as well as in stunting growth.

  Relatedly, it is worth stressing that this month was not meant to be a big economic moment for the government. Over recent years, a fiscal rhythm has developed where there is one Budget a year and then a second (spring or autumn) statement which also contains significant tax and spend measures and is akin to a mini-budget. Reeves wanted to end that, with an autumn Budget and then a much more limited event in spring at which the OBR published updated forecasts but the government did not respond with major economic measures. Government sources say that this will not be a fiscal event because it will not include tax rises, only spending cuts. Yet the Charter for Budget Responsibility, recently updated by the Labour government, said that it was committed to one major fiscal event a year in order to "give families and business more certainty" not only about tax but "spending changes" too. The government did reserve the right to change that approach "in the case of an economic shock". Does that mean the government believes the effect of President Trump has been an economic shock? There are clear political sensitivities in where the cuts are likely to fall. The Labour Party has many factions and ideological nuances but all of its MPs are committed to a generous welfare state and many will be antsy at the prospect of welfare cuts. Those in government are adamant, though, that the numbers - which are rising fast - of claimants and the amount being spent by government are simply unsustainable. There will be reform as well as cuts - Reeves has identified what she sees as "perverse incentives" in the system. In a preview of the potential rows to come, one Labour MP, speaking on the condition of anonymity, was critical, saying: "There is always money for war, yet none left for the most vulnerable to lift them out of hardship." "Austerity is a choice. Poverty is a political choice," they added. However others, including from the left of the party, said they recognised the welfare system was "old fashioned" and needed reform. "We have people who can work but don't just automatically because the system is inflexible," one said. Notably the next target for cuts appears to be the civil service. Privately ministers and officials have been dismayed by the quality of the Whitehall machine. The government is expected to demand major reductions in the numbers of civil servants, though this is unlikely to take the form of a specific numerical target. Ministers are also understood to have discussed major changes to the machinery of government, namely how government departments are organised, though this work is considered unlikely to come to fruition this month.
