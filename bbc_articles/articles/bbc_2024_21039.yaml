  GB's George Mills confronts France's Hugo Hay as he is one of multiple runners to fall in the final straight of the first 5,000m heat.

  GB's George Mills confronts France's Hugo Hay as he is one of multiple runners to fall in the final straight of the first 5,000m heat at the Paris Olympics.

  Mills was later advanced to the next round by the race referee.

