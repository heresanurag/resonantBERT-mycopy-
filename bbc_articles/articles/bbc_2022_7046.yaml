title: Plan to reverse European Court Rwanda rulings - BBC News
date: '2022-06-21'
section: UK Politics
url: http://www.bbc.co.uk/news/uk-politics-61887933
content: |-
  Ministers could ignore injunctions on asylum seekers set by European judges, under new proposals.

  Grounded: The Rwanda removals flight that never took off

  The European Court of Human Rights block on sending asylum seekers to Rwanda could be overturned by ministers under new proposals.

  The plan, being introduced to Parliament, would allow ministers to ignore the court's injunctions.

  It is an addition to planned changes to the Human Rights Act, and could also affect future cases involving migrants.

  Critics say the proposals are confusing and would create two tiers of rights that hand more power to ministers.

  But Deputy Prime Minister and Justice Secretary Dominic Raab said his proposed Bill of Rights fixed problems with the Human Rights Act without abandoning it altogether.

  Unveiling the plans, Mr Raab confirmed the government would not quit the European Convention on Human Rights, a set of legal safeguards allowing ordinary people to challenge what they say is unfair treatment by the government.

  The Human Rights Act came into force in 2000. It introduced into UK law rights contained in the Convention - a treaty largely written by British civil servants and lawyers after World War Two and agreed by almost every nation in Europe.

  The Bill of Rights also includes measures proposed last year:

  The most significant new proposal - to ignore ECHR injunctions - follows last week's row over the Home Office's abandoned flight to Rwanda.

  The European Convention on Human Rights is enforced by judges in Strasbourg

  The Strasbourg court, which is nothing to do with the European Union, issued an injunction blocking the home secretary from putting an asylum seeker on the flight, despite earlier decisions by judges in London not to intervene.

  That decision triggered other appeals and ultimately the cancellation of the flight.

  Under the government's proposed Bill of Rights, ministers would be able to ignore such injunctions, known as Rule 39 orders, because they are not technically part of international law.

  Mr Raab, who is responsible for changes to constitutional laws, said: "The Bill of Rights will strengthen our UK tradition of freedom, whilst injecting a healthy dose of common sense into the system.

  "We will be very clear in domestic law that Rule 39 interim orders do not bind UK courts or indeed public bodies or officials."

  The government's proposals, unveiled in December, have been criticised by lawyers as confusing and arguably unnecessary, because British courts can already ignore rulings from Strasbourg.

  Mr Raab described his proposals as a "very British approach, a UK-wide approach to human rights".

  He told the BBC the UK Supreme Court would not be "subordinated to Strasbourg but has the last word on interpretation of law".

  He added: "The rule of law applies universally but the idea that human rights shouldn't be reformed and any change to the human rights act is unimpeachable, not even Labour politicians at times said that."

  Asked whether the first flight due to take asylum seekers from the UK to Rwanda, that was cancelled last week after legal rulings, would have gone if a UK Bill of Rights was in place, Mr Raab said: "It is flawed that rule 39 orders from Strasbourg can have an injunctive effect, for example stopping those planes taking off. That's something our bill of rights will address."

