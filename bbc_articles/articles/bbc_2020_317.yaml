  • None Only at Selhurst Park (22) have there been fewer Premier League goals scored at a single stadium this season than at Bramall Lane (24), with the Blades netting just 13 and conceding 11.
  • None Manchester City have won three consecutive away league games against Sheffield United for the first time since a run of four between 1905 and 1908.
  • None Sheffield United have won just one of their last 16 league games against reigning top-flight champions (D3 L12), losing their last six in a row without scoring.
  • None Kevin De Bruyne is the first player in Premier League history to provide 15+ assists in three different campaigns (15 in 2019-20, 16 in 2017-18 and 18 in 2016-17).
  • None Sergio Aguero has been directly involved in 43 goals in 43 Premier League appearances against newly-promoted teams (35 goals, 8 assists).
  • None Manchester City's Gabriel Jesus has failed to score three of his five Premier League penalties (60%) - of all players to have taken at least five in the competition, no-one has a worse success rate than the Brazilian (level with Stewart Downing and El Hadji Diouf).

  Sheffield United travel to Championship side Millwall on Saturday, 25 January (15:00 GMT), while Manchester City host Fulham on Sunday, 26 January (13:00 GMT).
