  Alexander-Arnold has made 353 appearances for Liverpool in all competitions, scoring 23 goals. He has helped them win two Premier League titles, the Champions League, the FA Cup and the League Cup, and Salah believes he deserves the best send-off possible given what he has helped the club achieve. "I really love him," he added. "I think he deserves the best farewell leaving the club. He has done a lot for the city and done a lot for the club and he's one of probably the best players in the club's history. He gave it all." Salah, who signed a new two-year deal at Liverpool last month, said he talked with Alexander-Arnold about his decision, but did not try to convince him to stay. "I think he needed a new challenge," Salah said. "He spoke to me about it. It's his decision for sure. He's won it all twice or three times - what more can he have done? "It's his decision - I did not try to convince him to stay because I know 20 years in a club is not easy, it's so tough."
