title: 'Trent Alexander-Arnold: Mohamed Salah criticises ''harsh'' boos of departing
  Liverpool player - BBC Sport'
date: '2025-05-16'
section: Liverpool
url: http://www.bbc.co.uk/sport/football/articles/cy75g77lgyyo
content: |-
  Trent Alexander-Arnold, right, has been at Liverpool since joining the academy in 2004

  Mohamed Salah says Trent Alexander-Arnold did not deserve to be booed by some Liverpool fans after the defender announced he will leave his boyhood club this summer. The right-back, 26, will depart the newly crowned Premier League champions when his contract expires at the end of June, and is expected to join Real Madrid. Alexander-Arnold was born in Liverpool and came through the club's youth system before making his professional debut in 2016. He played for the first time since confirming his impending exit when he appeared as a substitute in the 2-2 draw against Arsenal on Sunday and received jeers from some supporters. "I think somehow the fans were being harsh with him," Salah told Sky Sports., external "I think he didn't deserve it at the time, he deserved the fans to treat him the best way possible because he gave it all to the fans. "We shouldn't act this way with anyone who always appreciates the people, who came here even for six months. "Imagine someone who gives you his all for 20 years. It's shouldn't be like this. I hope that will change next game, against Brighton or in the last game of the season, because he deserves the farewell."

