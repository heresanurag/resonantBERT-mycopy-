  An emotional Jack Grealish dedicates his first Premier League goal in almost 16 months to his younger brother Keelan on the 25th anniversary of his death.

  'That was for you, Keelan' - Grealish dedicates goal to late brother

  This video can not be played To play this video you need to enable JavaScript in your browser.

  An emotional Jack Grealish dedicated his first Premier League goal in almost 16 months to his younger brother Keelan on the 25th anniversary of his death. On his first league start since December, the Manchester City midfielder scored a second-minute opener in the 2-0 win against Leicester at Etihad Stadium. As he celebrated, it seemed Grealish was simply happy at marking a rare start with an even rarer league goal, ending a long wait since the 2-2 draw with Crystal Palace on 16 December 2023. It was only after the final whistle he revealed the poignant family anniversary he was marking. Grealish was four years of age when brother Keelan died in April 2000, aged just nine months due to Sudden Infant Death Syndrome (SIDS). The England midfielder spoke about the anniversary of Keelan's death when talking to BBC Sport after the game. "My little brother passed away 25 years ago today," he said. "This day is hard on the family. "My mum and dad were here, so to score and to win was brilliant." Grealish later paid a tribute on Instagram, external, writing: "With me always especially this day ... that was for you Keelan." City manager Pep Guardiola said he was unaware of the anniversary but paid tribute to Grealish's compassionate nature. The 29-year-old has a sister, Holly, 21, who has cerebral palsy. "Jack is an incredible human being," said Guardiola. "He is incredibly generous. "I didn't know that and I can't imagine how tough it can be with mum and dad and sister. It is good they remember him, this day. I am sure they remember him every single day. But it is good to score."

  It remains to be seen whether Grealish's selection in the number 10 role was because Guardiola was resting key players - such as Phil Foden and Kevin de Bruyne - for Sunday's Manchester derby at Old Trafford when City will look to avenge United's victory at the Etihad in December. However, this was a useful opportunity for Grealish to push his claims for a regular starting spot in a team that has misfired badly this season and is now facing at least five weeks without its main goal threat in Erling Haaland, who is injured. The belief is that Grealish, who has two years left on his contract, will decide his future in the summer as Guardiola prepares for another extensive recruitment campaign, potentially either side of the Club World Cup in June and July. Guardiola did not feel Grealish played at the same level against Leicester in the number 10 position as he did in his usual left-side role against Championship strugglers Plymouth in the FA Cup fifth round last month. "He is comfortable playing on the side but he likes to play in the middle because he used to play free," said the City boss. "He has ability to control the ball and pass between the lines. "I know it is not easy when you don't play regularly. He was really good against Plymouth, much better than today, but I am happy for him. It is not easy for the people in the middle when they defend low."
