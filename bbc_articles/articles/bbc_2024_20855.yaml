  James Nelson, 19, is handed a two-month jail term after pleading guilty to causing criminal damage.

  First person jailed after clashes over Southport attack

  James Nelson, 18, of Victoria Road, Horwich, Bolton, is thought to be the first person to receive a prison sentence after widespread unrest

  A man who caused criminal damage during disorder in Greater Manchester has been jailed. Clashes broke out between rival groups in Bolton town centre with fireworks, bottles, tiles and eggs thrown as the disorder spread around the town centre on Sunday. James Nelson, 18, of Victoria Road, Horwich, Bolton, is thought to be the first person to receive a prison sentence after widespread unrest in relation to the Southport attack which saw three young girls killed. At Manchester Magistrates' Court, Nelson was jailed for two months after pleading guilty.

  Liam Powell, 28, of Hendon Court, Buckshaw Village, Chorley, received a 12-month community order after admitting to being in possession of cocaine during the disorder in Bolton.
