content: |-
  La Liga strugglers Valencia appoint West Bromwich Albion boss Carlos Corberan as their new head coach.

  Carlos Corberan won 47 of his 107 games in charge of West Bromwich Albion

  La Liga strugglers Valencia have appointed West Bromwich Albion boss Carlos Corberan as their new head coach. Valencia paid a release clause, believed to be between £3-4m, in the 41-year-old Spaniard's contract to allow him to leave Championship club Albion. Corberan has signed a deal until the end of the 2026-27 season with the Spanish club, who sacked head coach Ruben Baraja on Monday after just two wins in 17 league matches this season. In a statement,, external Albion said Corberan was leaving "with the club's gratitude and best wishes". Coaches Chris Brunt, Damia Abella and Boaz Myhill will take caretaker charge of the Baggies while they search for a new coach.

  Following confirmation of his appointment by Valencia, Corberan said on social media that the decision to leave Albion had been "the hardest of my life". "There will always be a place in my heart for this special club and I hope one day I can return to thank you all for your incredible support," he said.

  Former Huddersfield Town boss Corberan was appointed by the Baggies in October 2022, leading them to a ninth-placed finish in his first season and fifth last term, as they lost to Southampton in the play-off semi-finals. He has guided Albion to seventh place in the Championship table this season, just outside the play-off places on goals scored, despite claiming his playing budget had been reduced by 30%. Corberan had been linked with the recent managerial vacancy at Premier League side Southampton, but Saints chose Ivan Juric to replace the sacked Russell Martin. Valencia, Corberan's hometown club, are four points from safety, sitting second-bottom of La Liga. In Baraja's final game as manager, they drew 2-2 with Alaves on Sunday to move off the bottom of the table on goal difference. They face reigning champions Real Madrid in their next league game on 3 January.

  West Bromwich Albion left it late to deliver their Christmas Eve bombshell that Carlos Corberan was leaving to take over at Valencia. Santa Claus was well into his round when the announcement came at just 20 minutes to midnight. But where does it now leave the club? And their now former head coach. Going back to Spain to manage Valencia may prove to be a risk for 41-year-old Corberan. Just ask one of his predecessors in the job, Gary Neville! The men from the Mestalla are in the relegation zone, have had financial difficulties and, since current Aston Villa boss Unai Emery left in 2012, only one manager has lasted longer than two years in charge. But then there's Albion's own financial situation. Corberan's hands have been tied for most of his 26-month reign. He was appointed as Steve Bruce's successor in October 2022 when chairman Guochuan Lai was still officially at the helm, but in name only, with presence and financial support completely non-existent. Yet Corberan organised a team who went from the relegation zone to just missing out on a 2022-23 Championship play-off place. The following season, he did achieve a place in the top six, losing in the semis to Southampton, with whom he was also linked last week - again without a single penny for his recruitment team to spend. But his coaching qualities came to the fore as he turned cast-offs such as Cedric Kipre and Alex Mowatt into vital members of his starting XI, which he has done again this season with Karlan Grant. Despite American businessman Shilen Patel's February takeover, the club's financial restrictions remain ongoing. Only last week it was revealed that the decreased wage budget back in the summer was actually as much as 30%, forcing the loss of several players. For the Baggies, it's a blow in the short term – particularly the timing of it with three games to come in six days over the festive period. But it may be a move that suits all parties. Corberan gets to finally test himself in the top flight of an elite league, he gets a move close to his family and that vocal minority of Albion fans who've become tired of his football will get to see something different. However, that comes with a side warning of 'be careful what you wish for' because the job he has done in stabilising the club on the field during a period of utter turmoil cannot be understated and they're definitely in a better place compared with two years ago. He should leave with the well wishes of the majority of Baggies supporters - and definitely will with those he worked with at the training ground because, as well as being a top coach, most importantly, he is a decent man.
