  The victors' prerogative, though, is to point to the scoreline. And England will do just that. For 154 years of past rivalry, recent episodes of enmity and the three weeks ahead of these sides, that is what mattered in this fixture. "It's always personal," said England captain Maro Itoje in the week. It certainly looked it when the words stopped and the action started. For a long time, Scotland captain David Sole's slow walk to the 1990 Grand Slam was dredged up to inject some sting into a clash that was rarely much of a contest. You don't need Ryan Wilson's 2018 tunnel trash talk. Or even Russell's post-try taunting of Owen Farrell on Scotland's last trip to Twickenham., external Scottish hackles had been raised enough by the suggestion that they - winners of the past four meetings - would be bullied out of the game. Duhan van der Merwe was, once again, seismic. White shirts seem to act like red rags to the rampaging wing. He helped set up Scotland's first two tries, celebrating in the face of former Worcester team-mate Ollie Lawrence after Huw Jones has crossed, before scoring their third. His pack met England at the gainline again and again. Scotland were never outfought, but perhaps they were ultimately out-thought. Itoje was a menace around the breakdown, turning over ball and putting a spanner in Scotland's attacking spokes as the referee let play flow.

  In the second half, England stemmed the flow of deep kicks that fed Van der Merwe, Blair Kinghorn and Scottish belief. Itoje's decision to keep the scoreboard ticking over, rather than kicking to the corner was, just about, proven right as England rode their narrow cushion home. Fin Smith's judgement in taking responsibility for England's decisive long-range shot at goal was also spot on. England's kick-heavy tactics weren't always to Twickenham's taste. There were audible groans at points as Fin Smith and Alex Mitchell took to the skies, rather than spin wide. Had Russell's late conversion dropped the other way, there was little in their style that would have been much consolation. "Is it the type of game we want to play? No," said England coach Steve Borthwick afterwards. "But there are two teams out there and Scotland are a very good team and we have to find a way to win." "There is loads for us to get better at," admitted Itoje. "Scotland probably played more than us but we were more clinical than we have been. "There is a feeling we are going to score, so we just need to find ways of being there more and then we will execute more." As well as bringing the game's most extravagant bit of tableware back to the Twickenham trophy cabinet, that is what this win does. It keeps England in the room. It buys them time. It gives them another shot. It takes their title challenge to another week. Moving day is done and they are not.
