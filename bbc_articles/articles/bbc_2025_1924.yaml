content: |-
  England's grinding win over Scotland opens up a route to a potentially glittering prize.

  England find a way to win to stay in title mix

  This video can not be played To play this video you need to enable JavaScript in your browser. Scotland miss late kick to win as England hold on to win Calcutta Cup

  In golf, round three is "moving day". It's a tournament's watershed, where contenders rise and pretenders are washed away. You can't win the title on moving day, they say, but you can certainly lose it. Round three duly proved to be where England and Scotland's Six Nations fortunes diverged dramatically. With leaders Ireland wobbling to a win in Cardiff, France Dublin-bound and the prospect of Italy and Wales to come - both distinct bonus-point birdie chances - England are in the title mix. It is a big difference decided by margins of a single point and few millimetres. England have spent much of the past six months on the wrong side of those final quarters and narrow scorelines. Now, after shocking France at Twickenham a fortnight ago, they have found a happy habit of finding a way to win as the match teeters, nerves strain and muscles stiffen. There were other similarities to a fortnight ago. Scotland, like France, moved the ball with dexterity and speed that England aspire to, but seldom achieve. The visitors dominated the attacking stats. They had more possession and territory. They made 13 trips to the opposition 22m, compared to England's four. They made nine line breaks to two. Nearly 200m more metres with ball in hand. Thirty-five defenders beaten compared to 10. You could go on. And doubtless some Scotland fans will as they pick over the pieces of another defeat in which their endeavour and good intentions went to waste. Frenchman Pierre Brousset's refereeing of the breakdown, where England won seven turnovers, and the scrum - where the hosts picked up three penalties - might also be part of the inquest. Finn Russell's screwy kicking performance, in which three potentially decisive conversion shots slipped by, won't escape unnoticed either.

