title: Bone-building drug recommended to women past the menopause - BBC News
date: '2024-08-07'
section: Health
url: http://www.bbc.co.uk/news/articles/ckg22prg9y0o
content: |-
  Abaloparatide protects against the bone-thinning condition osteoporosis and is approved for NHS use.

  Tens of thousands of women who have gone through the menopause might benefit from a new bone-strengthening drug, says the medicines watchdog National Institute for Health and Care Excellence (NICE). Abaloparatide can protect against the bone-thinning condition called osteoporosis, which causes a high risk of broken bones in older age. It will become available on the NHS in England within the next three months, says NICE. The injection, which comes as a pre-filled pen that people can self-administer at home once a day, encourages cells to make new bone.

  Other osteoporosis treatments are already available, but this new one is an alternative for people who have not responded to, or who cannot tolerate, those. Alison Smith, who was diagnosed with osteoporosis in 2011, told BBC R4's Today programme the new treatment would make a "big difference" to many patients who are "reluctant" to take medication currently available "because of side effects". The new drug is "a very well-tolerated treatment" for most people, according to Dr Nicky Peel, a clinical trustee at the Royal Osteoporosis Society and metabolic bone physician based in Sheffield. Speaking on the Today programme, Dr Peel said while some people experience nausea, headaches and palpitations - often during the early stages of treatment - Abaloparatide is suitable for most people at high risk of bone fracture. However, she warned the "challenge" is to ensure patients have access to "appropriate diagnostic services" that would identify their need for the drug. People will be offered drug treatment if doctors think they are at a high enough risk of breaking a bone. Theramex, which makes the medication, has agreed an undisclosed price with the NHS. By the time people are in their mid-20s, bone strength will have peaked. From then, it naturally declines. If bone loss is severe though, they can easily fracture even after a minor bump or fall. Getting enough vitamin D and calcium is also important for bone health. Hormone replacement therapy (HRT) around the time of menopause can help too. Women are more at risk of developing osteoporosis than men because of hormone changes that happen with the menopause. Oestrogen levels drop, which can weaken the bones. Prof Jonathan Benger, chief medical officer and deputy chief executive at NICE, said: "The independent committee heard from patients about how debilitating osteoporosis can be. "Our focus is on enabling access to care that improves quality of life while offering value to the taxpayer." More than three million people have osteoporosis in the UK. The prevalence increases markedly with age - about 2% of women aged 50 have it compared with almost half of women who are 80, says NICE., external More than one in three women and one in five men will sustain one or more osteoporotic fractures in their lifetime.
