content: |-
  One of the most decorated cyclists in the world was speaking Welsh to Aberystwyth's Stevie Williams.

  This is the moment one of the world's most successful cyclists speaks Welsh to a fellow rider.

  Mark Cavendish, who has won a record 35 stages at the Tour de France, was seen sharing a joke with Aberystwyth cyclist Stevie Williams.

  "Oh Stevie, sut wyt ti heddiw," he was seen shouting in Williams's direction, which translates as: "Oh Stevie, how are you today?"

  Speaking after the end of Sunday's final stage, Cavendish, nicknamed the Manx Missile, revealed it would be his final race.
