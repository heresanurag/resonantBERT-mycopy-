content: |-
  The alleged offences are said to have happened in 2013, the force says.

  The alleged offences were said to have taken place when Elliot Butler was a special constable in the Met

  A Metropolitan Police officer has been charged with an attempted rape which was allegedly committed 10 years ago, the force said.

  Sgt Elliot Butler has also been charged with causing a male to engage in sexual activity.

  The alleged offences were said to have taken place in 2013, when he was a Metropolitan Police special constable.

  Sgt Butler had been suspended from duty and was due at Westminster Magistrates' Court on Monday, the force said.

