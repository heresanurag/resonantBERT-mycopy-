title: London Tube strikes called off after Aslef talks with TfL - BBC News
date: '2024-11-05'
section: London
url: http://www.bbc.co.uk/news/articles/cly0zezx3ejo
content: |-
  London Underground drivers were due to walk out on 7 and 12 November.

  Tube services will run as originally planned after industrial action was suspended

  Planned strikes on the London Underground have been suspended following talks over pay between the Aslef union and Transport for London (TfL). Industrial action was due to begin on Thursday and a walkout was also planned for next Tuesday. Aslef said it had been given a "significantly improved" pay offer by London Underground management and it would discuss that offer with union members on Thursday. Claire Mann, from TfL, said: “We believe we have made an offer to our trade unions that is fair, affordable, good for our colleagues and good for London and we urge our trade unions to continue working with us.”
  • None Tube strikes by RMT staff called off after talks

  Finn Brennan, from Aslef, said the union was "pleased" strike action had been averted at this time. He said he was unable to reveal any further details until after Thursday's meeting. On Friday, the RMT union called off its planned strike following a pay offer from TfL.
