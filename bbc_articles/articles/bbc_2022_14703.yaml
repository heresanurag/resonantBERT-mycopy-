  In a Twitter update the local police said the body had been found "in the face of an intense search" by the team.

  "We are sorry to deliver this sad news and express our condolences to his family and friends," it said.

  Prof Marsh's family had travelled to northern Chile to follow the search operation, local media reported.

  Provost of the University of Warwick, Prof Chris Ennew, said: "This is deeply distressing news for Tom's family and our thoughts are of course with them, along with his colleagues and our wider community.

  "And we realise it's particularly difficult while people are waiting for formal identification to take place."

