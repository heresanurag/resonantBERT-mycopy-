  The latest updates as Scotland spends its eighth weekend under lockdown.

  Borussia Dortmund superfans Ian and Alison Fraser were among Scots to welcome back the Bundesliga on TV Image caption: Borussia Dortmund superfans Ian and Alison Fraser were among Scots to welcome back the Bundesliga on TV

  It is "too early" to talk about football resuming at the end of July in Scotland, national clinical director Professor Jason Leitch has told BBC Radio Scotland.

  Scottish Professional Football League chairman Murdoch MacLennan said on Tuesday that it "must do everything humanly possible" to do so.

  While Scotland's professional football is suspended until 10 June, the German Bundesliga today became the first major top-flight division to return.

  Prof Leitch stressed there were no dates set for a return in Scotland but said: "It'll be interesting to see what happens in Germany. They've opened a number of things in the last few weeks and then closed them down again, so this is not a smooth journey."

  It is still "too early" to talk about football resuming at the end of July, says the Scottish government's clinical director Professor Jason Leitch.
