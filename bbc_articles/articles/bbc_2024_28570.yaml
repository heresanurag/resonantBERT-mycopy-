content: |-
  Wales fly-half Sam Costelow will start and Blair Murray switches to full-back as Warren Gatland makes six personnel changes to face South Africa.

  Wales recall Costelow and make two late changes

  Sam Costelow has been in and out of favour during Warren Gatland's second stint as Wales coach

  Coverage: Live on S4C, BBC Radio Wales, Radio Cymru, live text and commentary on the BBC Sport website and app

  Wales fly-half Sam Costelow will start and Blair Murray switches to full-back as Warren Gatland makes six personnel changes to face world champions South Africa in Cardiff on Saturday. Costelow replaces Gareth Anscombe, while Murray moves from wing to full-back with Rio Dyer returning and Cameron Winnett dropping out of the squad. In the forwards, Exeter lock Christ Tshiunza replaces the injured Adam Beard, while number eight Taine Plumtree is recalled for Aaron Wainwright. Wales were forced into two late further changes with wing Josh Hathaway and prop Nicky Smith replacing the injured Tom Rogers and Gareth Thomas. Gloucester lock Freddie Thomas is set to win his first cap from the replacements' bench. It will be the first time New Zealand-born Murray has started a professional game at full-back. Murray arrived at the Scarlets for the beginning of the 2024-25 season and has made six starts on the wing.

  "We felt Aaron has done well but with a six-day turnaround, we wanted to freshen up some legs, which we've done with Taine Plumtree," said Gatland. "It’s an opportunity for Rio Dyer to come into the side and push Blair Murray to full-back, where he’s played a lot of rugby. "It's not an unfamiliar position for him so we want to see how he goes there. "Gareth has had two starts at 10 and with Sam there, we want to make sure he continues to get rugby."

  The 23 players in Wales' matchday squad have 334 caps between them, while South Africa's replacements alone have played a collective total of 431 international games. In all, the Springboks' matchday 23 have 946 caps between them. South Africa are overwhelming favourites to inflict defeat on Wales, who have lost their past 11 Test matches. Speculation continues about Warren Gatland's future as Wales head coach in the wake of last weekend's defeat 52-20 against Australia. Gatland has won just six games from 23 Tests since returning for a second stint as head coach in December 2022. The 11-match losing run is a new record for Wales. "Last week's result hurts and we are just as disappointed by it as the fans," said Gatland. "Our focus now is on training and preparing well for our final game of this Autumn Nations Series. "There were good elements that we can definitely build on going into Saturday but we have to improve our accuracy. "We know what a quality side South Africa are and the physicality they bring. This week we need to show real courage and front up against the world champions."
