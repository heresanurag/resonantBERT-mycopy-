title: Sparks fly as tornado rips through Fort Lauderdale - BBC News
date: '2024-01-08'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-67917068
content: |-
  A tornado moved through downtown Fort Lauderdale Saturday evening hitting power cables and buildings.

  Video from Fort Lauderdale shows a small tornado creating sparks as it hit power lines on Saturday evening. There were no injuries reported and only minor property damage.
