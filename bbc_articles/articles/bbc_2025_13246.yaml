title: Family of Boulder suspect detained by immigration officers - BBC News
date: '2025-06-04'
section: US & Canada
url: http://www.bbc.co.uk/news/articles/c8re438k6p8o
content: |-
  The wife and five children of Mohammed Sabry Soliman have been taken into custody by immigration authorities.

  Mr Soliman allegedly told police that he wanted to kill all Zionists and targeted the group

  Immigration authorities have in custody the wife and five children of the man suspected of carrying out Sunday's incendiary attack on Jewish demonstrators in Boulder, Colorado, US Homeland Security Secretary Kristi Noem said. Mohamed Sabry Soliman, 45, has been charged with attempted murder, assault and possession of an incendiary device after a dozen people were injured at a march calling for the release of Israeli hostages. He also faces a federal hate crime charge. "We are investigating to what extent his family knew about this heinous attack, if they had knowledge of it, or if they provided support to it," Noem posted on X. Officials say the suspect shouted "Free Palestine" as he threw two petrol bombs into the crowd.

  The White House said in a post on X: "The wife and five children of illegal alien Mohamed Soliman - the suspect in the antisemitic firebombing of Jewish Americans- have been captured and are now in ICE custody for expedited removal." It added in all capital letters that the family could be deported as soon as Tuesday night. "Six One-Way Tickets for Mohamed's Wife and Five Kids. Final Boarding Call Coming Soon," the White House added in another post. Homeland security is responsible for enforcing immigration laws, but the FBI, justice department and local police typically carry out investigations into possible criminal activity. Twelve people, including four men and four women between the ages of 52 and 88, were taken to hospital, with injuries ranging from minor to serious. The eldest of the victims is a Holocaust survivor, Rabbi Israel Wilhelm, the Chabad director at the University of Colorado Boulder, told the BBC's US partner CBS News. In an affidavit, police said Mr Soliman had admitted carrying out the attack and that he had been planning it for a year.
  • None What we know about the attack in Colorado Homeland security officials have said that Mr Soliman arrived in the US on a tourist visa in August 2022. That visa expired the following year, but he made an asylum claim in September 2022. According to police documents, the suspect told officials that he "never talked to his wife or his family" about his plans, and that he had left a phone in a desk drawer with messages to his wife and children. His wife turned the phone in to authorities.

