content: |-
  The R&B star was dressed in a jumpsuit in a Chicago court when his lawyer entered the plea.

  This video can not be played To play this video you need to enable JavaScript in your browser. Kelly has faced, and denied, accusations about abuse for decade

  R. Kelly has pleaded not guilty to 10 charges of aggravated criminal sexual abuse against four women, three of whom were minors at the time.

  His lawyer entered the plea for the R&B star, who appeared in the Chicago court dressed in an orange jumpsuit.

  The 52-year-old turned himself in to authorities on Friday after an arrest warrant was issued.

  He has faced decades of sexual abuse claims without being convicted, and has denied all previous allegations.

  His court appearance and plea comes weeks after the documentary series Surviving R. Kelly aired. It contained allegations of abuse from many women including the star's former wife.

  He is being tried for sexual assaults alleged to have happened since 1998. He met one of the four women at a restaurant on her 16th birthday, and another - who was also 16 - when she asked for his autograph.

  The court ordered the singer, whose real name is Robert Sylvester Kelly, to surrender his passport and to have no contact with anyone under the age of 18.

  He has reportedly struggled to pay the $100,000 bail payment required to leave Cook County Jail.

  Later on Monday, high-profile attorney Gloria Allred said in a news conference that she is now representing more than six women who allege the singer abused them.

  R. Kelly is next scheduled to appear in court on 22 March.
