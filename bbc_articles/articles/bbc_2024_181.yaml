  Luke Littler loses chance to become youngest world darts champion after being beaten by Luke Humphries.

  Teenage darts sensation Luke Littler lost the chance to become the youngest darts world champion, after losing the PDC World Darts Final against Luke Humphries.

  Family, friends and fans gathered at St Helens Darts Academy to watch the 16-year-old take on the world number one, after a remarkable run to the final in London's Alexandra Palace.
