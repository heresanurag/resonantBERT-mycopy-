content: |-
  Takayo Nembhard's parents say they stand in solidarity with other victims of violence at the Notting Hill Carnival.

  'Our son's killer should have been caught by now'

  This video can not be played To play this video you need to enable JavaScript in your browser. Vincent and Sandra Nembhard hope their son's killer will still be brought to justice

  The parents of a man murdered at Notting Hill Carnival two years ago say they had hoped "somebody would have paid for what they have done by now". Takayo Nembhard, 21, known as "TKorStretch" in the Bristol music scene, died from a fatal stab wound on 29 August 2022. His parents, Sandra and Vincent Nembhard, said they warned police more violence could erupt at the event if their son’s killer was not brought to justice. Despite the arrest of eight suspects, all have been released under investigation. The Metropolitan Police said the investigation was ongoing.

  Last month’s Notting Hill Carnival saw eight people stabbed, one of whom later died. Another person died after an assault. Cher Maximen, 32, was stabbed on 25 August when she tried to intervene in a fight. She died in hospital six days later. On 26 August, 41-year-old Swedish chef Mussie Imnetu was found unconscious, near the carnival, after being attacked. He died in hospital four days later. In both of these cases, people have been charged with murder.

  Takayo was mostly known by his artist name, TKorStretch

  In a recent video posted on TikTok, external, Mr and Mrs Nembhard said they stood in solidarity with the families of victims affected by violence at the latest carnival. "Our condolences go out to the family of the victims, because we know it's not easy because we are going through the same pain," Mr Nembhard said. He told the BBC, the fact no-one had been caught for what had happened to their son meant "others just feel like they can go around carnival and do what they want". Mr Nembhard said: "When we spoke to the police, we said to them that if they don’t find the people who murdered our son and charge them, this could happen again. Then, two years later, same thing happened. "When someone goes into carnival and takes someone's life, they [the police] have to be quick on the mark to try and find that person and bring them to justice." The Metropolitan Police said it would be inappropriate to comment on the incidents at this year's carnival, as legal proceedings were active. Notting Hill Carnival organisers previously told the BBC they were "shocked by these tragic deaths".

  Eight people were stabbed and 334 arrested at Notting Hill Carnival in 2024, police said

  For Takayo’s parents, the lack of progress in the investigation into their son's death feels like an open wound. "We were hoping that somebody would have paid for what they have done by now," Mr Nembhard said. "But at the end of the day, I am not the police. I can't do their job for them. So, I have to believe in what they told us and where they are with the investigation." The family expressed their frustration that no-one had been charged and their fears violence could escalate. Speaking directly to the person who took his son's life, Mr Nembhard said: "Rest assured, the police will get you one day."

  Takayo after his first public performance at Love Saves the Day in 2021

  Takayo had built a significant following in Bristol's music scene, where he was known for his unique style and charisma. "He was fun, he liked to joke around, he was thoughtful and wise beyond his years," recalled Mrs Nembhard. Mr Nembhard added: "He loved music. He had music licensed through Warner Music Group, and big labels were looking at him." Takayo’s promising future was cut short though, leaving behind two children born after his death. Since then, his parents have sought positive ways to honour his memory, including releasing one of his tracks in a music video and unveiling a mural painted by artist Nick Halahan in their back garden. They recently hosted a barbecue to celebrate Takayo's life, gathering friends and family to keep his legacy alive.

  A mural has been painted on the Nembhard's back garden wall in honour of Takayo

  The Nembhards have called for stronger measures to prevent further violence at the carnival, urging authorities to introduce metal detectors at the event's entry points and implement harsher sentences for knife crimes. "We love carnival, it's part of our culture" said Mr Nembhard. "But there are a few bad apples that are going in and spoiling it for everyone."

  Despite the lack of closure, Takayo's parents continue to demand justice. "We’re not going to give up," Mrs Nembhard said. "As sad as we are, we’re going to hang in there until the very end. "We need justice for our son, and we don’t want to see anyone else get hurt." They urge anyone with information to come forward so that no other family has to endure the pain they have suffered.

