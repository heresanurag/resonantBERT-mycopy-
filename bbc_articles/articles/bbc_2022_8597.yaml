title: The hard choices Sri Lankans must make now - BBC News
date: '2022-07-17'
section: Asia
url: https://www.bbc.co.uk/news/world-asia-62191735
content: |-
  They have chased out their reviled president. Now the country faces some difficult decisions.

  "No time for Gota 'cos we are the champions... of the world!"

  It is a hot afternoon at Galle Face Green, the epicentre of Sri Lanka's fledgling protest movement. Above the sea of tents at the protest village floats the voice of a woman, singing her unique take on a Queen song.

  For months, these protesters have been at the forefront of the millions-strong Aragalaya movement - named after the Sinhalese word for "struggle" - calling for the resignation of reviled president Gotabaya Rajapaksa.

  Sri Lankans hold him and his elder brother, former president Mahinda, chiefly responsible for their country's economic ruin.

  Defying all expectations, the protesters won a victory last week - Gota, as he is popularly known, quit and fled.

  But now comes the hard part: grappling with the political aftermath of Mr Rajapaksa's departure and making some very difficult decisions.

  With Mr Rajapaksa gone, protesters have turned their sights on Ranil Wickremesinghe, the unpopular former prime minister - and now the new president.

  He is seen as someone with close ties to the Rajapaksas, a powerful dynasty that ruled Sri Lanka for nearly two decades.

  As acting president, Mr Wickremesinghe had little legitimacy in the eyes of the people, having failed in previous presidential campaigns and lost his own seat in parliament in 2020. He is seen as having got the top post by sheer circumstance, after Mr Rajapaksa appointed him caretaker leader while making his hasty exit.

  But Mr Wickremesinghe has vowed to follow the constitutional process, and remained in power until parliament voted him in as new president on Wednesday. He won with the support of the Rajapaksas' ruling Sri Lanka People's Front party (SLPP) who dominate parliament.

