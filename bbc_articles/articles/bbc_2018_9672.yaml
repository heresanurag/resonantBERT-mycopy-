title: 'Papal visit: Pope speaks out on Catholic Church abuse - BBC News'
date: '2018-08-26'
section: General
url: http://www.bbc.co.uk/news/world-europe-45308879
content: |-
  Pope Francis and Taoiseach Leo Varadkar addressed the child sex abuse scandal in the Catholic church.

  Pope Francis and Taoiseach Leo Varadkar have given speeches in which they both addressed the child sex-abuse scandal in the Catholic Church.

  They spoke to an audience at Dublin Castle, on the first day of Pope Francis's visit to Ireland this weekend.
