  Bringing you the latest on the coronavirus pandemic's impact around England.

  A police officer was kicked and bitten as she tried to break up a party that had breached coronavirus rules.

  Officers were called after a gathering attended by people from different households in Sherbourne Court, Prestwich, Greater Manchester, at about 16:00 BST on Saturday.

  After asking the guests to leave, the police officer was attacked and bitten on the hand, but her injury is not serious, Greater Manchester Police said..

  The officer was attacked at a party in Sherbourne Court Image caption: The officer was attacked at a party in Sherbourne Court

  Two people have been charged with assault on an emergency worker. They are due to appear at Manchester and Salford Magistrates' Court on 2 June.
