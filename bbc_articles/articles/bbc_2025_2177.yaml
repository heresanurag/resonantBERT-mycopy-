  England fly-half Fin Smith backed up his player-of-the-match performance in round two with another assured display. The Northampton Saint is 10 years younger than Russell and stepped up to kick a pressure penalty from halfway to continue his bid for a spot as one of Farrell's fly-halves. Ireland fly-half Sam Prendergast, who recently turned 22, is the least experienced contender and won only his sixth cap in Cardiff. Ireland remain on course for a Grand Slam after Prendergast, who kicked 17 points, helped guide them through a tricky spell when Garry Ringrose was given a 20-minute red card in the 34th minute. A particular standout moment came when he spiralled a 50-22 over the head of replacement Wales fly-half Jarrod Evans. The execution was "utter filth", according to Barclay. Having backed up his player-of-the-match performance against Scotland, Warburton believes Prendergast has edged into top spot. "Without putting too much pressure on him, I see a world-class top-level 10," Warburton told Rugby Union Weekly. "You just watch him play and you think 'he is Test level'. There are still imperfections, but what he is displaying at 22, with how calm and composed he is, is that level."

