  England captain Maro Itoje led from the front by producing crucial turnovers to help his side win back the Calcutta Cup for the first time since 2020. The 30-year-old second row took over as skipper from Jamie George before the Six Nations and is a two-time Lion with six appearances in Tests. Former England scrum-half Matt Dawson told Rugby Union Weekly that Itoje, who in 2021 was voted by his team-mates as player of the series in South Africa, has "some super-human tendencies" which could make him a Lions captain. "All of a sudden it feels like he has become the player we all thought he was going to be when he has got the armband on," Dawson added. Number eight Caelan Doris missed his side's win over Wales because of injury, but given Farrell made him Ireland captain in November is in a strong position. Warburton says any of Doris, Itoje or Wales captain Jac Morgan would make a strong Lions captain, but is leaning towards Itoje. "Doris is definitely captaincy-worthy but the number one criteria for your captain has got to be that he is a banker to start, and I think there are some really good number eights," Warburton added. "On form, who is inked in and who has worked with Farrell on Lions tours before? There is a relationship there which is important - that is why Maro is edging it for me."

  * both teams based on performances in round three

