content: |-
  The battle to earn selection for the British and Irish Lions squad continued in the third round of the Six Nations, but who staked their claim?

  This video can not be played To play this video you need to enable JavaScript in your browser. 'Monster' kicks, singing and plenty of tries - best moments from Six Nations week three

  We are now more than halfway through the tournament that will help decide the bulk of the British and Irish Lions touring party. With all the home nations facing off against each other, it was the perfect Six Nations weekend to stake a claim. Ireland overcame Wales in Cardiff and England squeezed past Scotland at Allianz Stadium. BBC's Rugby Union Weekly pundits have had their say on who Lions head coach Andy Farrell will be keeping his eye on. Former Lions captain Sam Warburton also gives his thoughts on who should be the squad's captain. Pick your Lions XV in the comments section below.

  The Calcutta Cup - a fixture Scotland fly-half Finn Russell has lit up in recent years - was seen as a perfect opportunity for the two-time Lion to restate his credentials as the starting fly-half. Russell, especially in the opening half, looked back to his old self as he helped pick apart England's defence with his wide passing game. However, Gregor Townsend's side failed to capitalise on their dominance and came up short 16-15, with Russell missing all three kicks he had at goal - including a last-gasp match-winning conversion from the corner. Despite kicking at 38% in this year's Six Nations, former Scotland captain John Barclay is not concerned and still backs 32-year-old Russell to start. "I still think Finn Russell [is in pole position]," Barclay told Rugby Union Weekly. "I am not bothered about his kicking. His kicking last year and across the season for Bath has been great. He is a good kicker. "It was the best he has played in the championship. Look at how he got Scotland's backline moving with his passing game. And his kicking game was good too."

