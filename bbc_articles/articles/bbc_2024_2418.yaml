title: Man jailed after admitting manslaughter of friend in house fire - BBC News
date: '2024-02-07'
section: Northern Ireland
url: http://www.bbc.co.uk/news/uk-northern-ireland-68228270
content: |-
  Jimmy Thompson died in the house fire near Newry, which Gary Magee admitted deliberately starting.

  Andrew James Thompson, known as Jimmy, died in the fire

  A 44-year-old man has been sentenced to seven years for the manslaughter of his friend in a deliberate fire in 2021.

  Newry Crown Court heard that Andrew James Thompson, known as Jimmy, died as a result of the deliberate fire in his Parkview Home in Cloughogue.

  Magee, whose address was given as HMP Maghaberry, was told he would spend half his sentence in prison and half on licence.

  In a statement following the sentencing, Mr Thompson's brother, Colin Thompson, said it had been a "sad and truly difficult" two-and-a-half years for the family.

  "We've all suffered: Jimmy's partner, his friends, and the whole family," he said.

  Magee's sentencing would "help to bring some closure", Colin Thompson said.

  "But it won't bring Jimmy back. Nothing will change."

  He added the family were "left with an emptiness" and missed Mr Thompson every day.

  "We'll continue to grieve for the loss of our brother for a long time to come," he added.

  He also thanked the investigating team and the emergency services on behalf of Mr Thompson's family and partner.

  This video can not be played To play this video you need to enable JavaScript in your browser. A statement from Colin Thompson was read by Det Ch Insp Anthony Kelly

  The court heard that on the evening of the fire - 21 May 2021 - the two men had been drinking and smoking cannabis together in Mr Thompson's terraced bungalow.

  At 23:30 BST a neighbour saw smoke coming from a bedroom window.

  The emergency services were called and the fire service arrived 18 minutes later.

  Mr Thompson, who was 62, was found in a seated position on a bedroom floor while Magee was found seated at the back kitchen door.

  The court heard Mr Thompson died as a result of smoke inhalation in connection with other ailments including COPD and asthma.

  Both fires had been deliberately started in three locations in the house and testing later confirmed that cigarettes could not have started the fires.

  There was no evidence of a falling out or aggression between the two men.

  Forensic officers investigate the scene of the fire in May 2021

  The court heard Magee maintained he had no recollection of the fire and that his last memory was drinking with Mr Thompson at about 23:00.

  The prosecution barrister had previously told the court that there was a burn mark on an item of clothing connected to Magee and also an injury to his hand.

  Magee had said he suffered the hand injury a day earlier.

  Magee has 115 previous convictions - for violence, drugs and public order offences.

  Madam Justice McBride said victim impact statements from Mr Thompson's family recalled a much-loved man who was houseproud and had been in a relationship for 15 years.

  She said his death left "unanswered questions and anguish they experience on a daily basis. This senseless and cruel act has brought much pain and anguish to the entire family circle."

  Following the sentencing, Det Insp Anthony Kelly said it had been proven Magee started three fires, at various locations within the property, "by the direct ignition of combustible material".

  "I'm deeply mindful that nothing will take away the family's sorrow. This was a deliberate and senseless act, which has resulted in unimaginable loss," he said.

  "It leaves behind a grieving partner and loving family who remain truly heartbroken. My thoughts, and that of the team, are with them."

  Det Insp Kelly acknowledged first responders from the police, fire and ambulance service who attended the scene.

  He also thanked neighbours who raised the alarm and went on to help with the investigation.
