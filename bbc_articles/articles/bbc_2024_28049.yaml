content: |-
  Music fans still have a chance to purchase standard tickets which go on sale at 09:00 GMT on Sunday.

  First Glastonbury tickets sell out in 30 minutes

  The first batch of Glastonbury 2025 tickets sold out within 30 minutes

  The first group of tickets for Glastonbury Festival 2025 sold out in 30 minutes, organisers have confirmed. Festival-goers had to navigate a new booking process when the sale for coach travel tickets opened at 18:00 GMT on Thursday. Fans were "randomly assigned a place in a queue" rather than having to refresh the holding page when the tickets went live. A statement from the official festival X account, external announced at 18:32 that tickets had sold out, alongside a note on its website.

