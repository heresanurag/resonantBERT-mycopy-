  See Tickets later said, external that "confirmation emails are going out now to everyone who got @Glastonbury coach tickets this evening" in a post on X. The sale of standard tickets will take place on Sunday at 09:00. It comes a week after the world-famous festival announced it had changed the way fans would join its booking process. The change came after a spotlight was shone on various issues within online ticket selling including the use of dynamic pricing and tickets being resold by touts. The subject made headlines after the release of Oasis tickets in September prompted the government and the UK's competition watchdog to pledge they would look at the use of prices surging in line with demand.

  Glastonbury Festival 2025 will take place from 25-29 June

  In a bid to prevent touting, Glastonbury customers have to register in advance to buy tickets for the event, which will take place at Worthy Farm in Somerset from June 25 to 29. Tickets for Glastonbury 2025 cost £373.50 plus a £5 booking fee, which is a £18.40 rise from the 2024 price of £355 plus a £5 booking fee. Last year, coach tickets sold out within 25 minutes while standard tickets were all bought within an hour. Festival organiser Emily Eavis has previously said 2026 will be a fallow year for Glastonbury, to allow the land to rest and recover, but she is already in talks with acts to headline in 2025. The 2024 festival was the first year the event has featured two female headliners on the Pyramid Stage, Dua Lipa on Friday and SZA on Sunday. On the Saturday, Coldplay made history as the first act to headline the festival five times.

