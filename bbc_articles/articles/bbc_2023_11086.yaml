  Ministers hoped to stop further unrest, but reports of violence are coming from several cities.

  Busy night for cab drivers after shutdown of public transport

  Taxi drivers here in Paris and across France are having a busier night than usual, following the nationwide suspension of bus and tram services. People leaving Paris Gare du Nord are frantically trying to book Ubers, while others have been jumping in taxis waiting outside the station. The bus stops are empty. When I approach a driver and ask to go to Nanterre, the epicentre of the protests, he looks at me in shock. “Nanterre! Too dangerous.” I then head towards a group of drivers, who laugh - with one saying he’ll take me there for €250 (£215). Eventually one agrees to take me for a (far) more reasonable price. The 30-minute journey is quiet - the only sign of the protests is a burnt vehicle on the side of a road, and police cars driving past us, heading further into the district.
