title: 'Covid: Welsh government update 18 June 2021 - BBC News'
date: '2021-06-18'
section: Wales
url: http://www.bbc.co.uk/news/live/uk-wales-57525313
content: |-
  Details and reaction as First Minister Mark Drakeford explains why major changes are being delayed.

  Wales' vaccination programme will "switch into a new emphasis on double doses" over the next four weeks, First Minister Mark Drakeford says.

  He said the focus would be on people in their 50s and 60s, as full vaccination rates for people even older was now high.

  Mr Drakeford said health boards would be targeting parts of their areas where there were infection hotspots.

  The other "big task", he said, was to get better information on the extent to which vaccination prevents hospitalisation.

  "The detail on that is not sufficiently strong for us to be able to plan confidently for what the health service may have to deal with, and the extent to which we might still be able to lift restrictions, beyond the next four weeks," the first minister said.

  "We'll be gathering data from England and Scotland on that because they are further down this course of time than than we are."
