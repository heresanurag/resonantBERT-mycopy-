title: 'Mo Salah and Virgil van Dijk: Liverpool players look set to sign new deals
  - BBC Sport'
date: '2025-04-10'
section: Liverpool
url: http://www.bbc.co.uk/sport/football/articles/cn5xx0ypv9eo
content: |-
  As Mohamed Salah looks set to sign a new contract at Liverpool, it appears Virgil van Dijk is also close to a new deal.

  First Salah, now 'growing expectation' Van Dijk will stay

  There is a growing expectation at Liverpool that captain Virgil van Dijk will join forward Mohamed Salah in signing a new contract in the not-too-distant future. Following months of discussions, it is understood Van Dijk is extremely close to signing what would be a new two-year contract. Salah, too, is in advanced negotiations over a similar contract. It's important to stress that, as things stand, neither deal is complete but at this juncture it would take a remarkable turn of events for Van Dijk or Salah not to be Liverpool players at the start of next season. These are two very significant pieces of further good news for Liverpool, who are 11 points clear at the top of the Premier League.

  There is an importance to both contracts being two years in length. The first, and most obvious, benefit to Liverpool is they get to keep two of their most important players. But it also means they can avoid a repeat of the unsettling narrative that has clouded Arne Slot's first season as manager for at least another year. Liverpool, barring what would be a remarkable capitulation, are set to win their 20th league title - yet the achievement has come against the backdrop of Van Dijk, Salah and defender Trent Alexander-Arnold approaching the end of their contracts. The club's hopes of retaining Alexander-Arnold have waned in recent weeks, with the right-back in talks with Real Madrid over a free transfer in the summer.

  Van Dijk re-signing would ease one of the key recruitment issues facing the club heading into the summer. Should the 33-year-old have left, Liverpool were likely to enter the market for a new starting central defender. Recruitment staff had already begun identifying potential targets, who are primarily left-footed or have experience of playing left-sided centre-back. Crystal Palace captain Marc Guehi was among those analysed, but the extent of the interest was unclear. Bournemouth's Dean Huijsen has also been watched. The plan they put together may never now be executed, though Van Dijk's central-defensive partner Ibrahima Konate is entering the final 12 months of his contract so Liverpool may have to make a decision on his future if an agreement is not reached before the new season. It also remains to be seen whether Jarell Quansah and Joe Gomez remain on Merseyside. Nevertheless, the continued presence of Van Dijk eases the necessity for Liverpool to sign an elite - and thus costly - central defender this summer. The benefit of retaining Salah is equally clear. With seven games to play, the 32-year-old has already made 54 goal contributions - scoring 32 times - this season. Prior to news of the breakthrough in Salah's talks with Liverpool, sources close to the Saudi Pro League held strong hopes of luring the Egyptian. With Liverpool having kept their finances largely intact last summer, they are expected to be active once the market reopens - with a central striker top of their priorities. As is the case for most of Europe's elite clubs, Newcastle forward Alexander Isak would be towards the top of their list - but the prospect of him leaving St James' Park is unlikely. Liverpool are also expected to be in the market for at least one new new full-back given Alexander-Arnold's talks and lingering doubts over Andy Robertson's long-term role in Slot's team. Bournemouth's Milos Kerkez and Fulham's Antonee Robinson are among the players they have been linked with.
