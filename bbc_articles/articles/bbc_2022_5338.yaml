title: 'Lviv missile strike: ''I saw missiles hitting buildings'' - BBC reporter -
  BBC News'
date: '2022-04-19'
section: General
url: http://www.bbc.co.uk/news/world-europe-61139108
content: |-
  BBC reporter Dan Johnson describes seeing a missile strike in the Ukrainian city of Lviv.

  The Ukainian city of Lviv has been the target of Russian missile strikes.

  The BBC's Dan Johnson reports from the scene, where he witnessed "missiles streaking across the sky and hitting buildings".
