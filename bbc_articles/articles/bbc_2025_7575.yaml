title: Original Coronation Street star Philip Lowrie dies - BBC News
date: '2025-04-26'
section: Manchester
url: http://www.bbc.co.uk/news/articles/c0782k15yg5o
content: |-
  The actor, who was seen as a national heartthrob thanks to his roguish role, dies ages 88.

  Philip Lowrie played Dennis Tanner in the ITV soap who went on to marry Rita Sullivan played by Barbara Knox

  Lowrie, who appeared in the first episode of the ITV soap in 1960 as the original bad boy Dennis Tanner, died on Friday, his publicist Mario Renzullo said. "My client and very dear friend, Philip Lowrie, the beloved actor renowned for his role as Dennis Tanner on Coronation Street, passed away yesterday," he said. "His death marks the end of an era for the world's longest-running soap, where he became a cornerstone of its storytelling."

  Philip Lowrie (top row fourth left) with the original cast of Coronation Street in 1960

  When the soap started more than six decades ago, Lowrie's character was seen as a national heartthrob thanks to his roguish role. Dennis was introduced as the son of Elsie Tanner, and moved in with his mother after being released from prison. Lowrie had originally auditioned for the role of Ken Barlow prior to the show's launch, and appeared in the first episode at the age of 24. William Roache was soon cast as Ken for the beginning of the soap and became a regular sparring partner for Dennis. He left the Street in 1968, when he married Jenny Sutton and moved to Bristol, and did not return until 2011.

  According to Mr Renzullo, Lowrie was presented in September 2011 with a certificate by the Guinness World Records for being the person with the longest gap between television appearances as the same character in the same show. Dennis soon got back in touch with newsagent Rita Sullivan (Barbara Knox), who was his sweetheart when she first appeared in the show in 1966, and they tied the knot when he came back. He left the soap again in 2014 and was later killed off without making another appearance on screen.

  Lowrie's mother saved for his fees to go to the Royal Academy of Dramatic Art (Rada) in London after he left school. After graduating three years later, he soon received his first parts in the West End, appearing with Dame Margaret Rutherford and Peggy Mount in the play Farewell, Farewell, Eugene. He also appeared on Victoria Wood's comedy shows, such as Victoria Wood's All Day Breakfast, Victoria Wood, Pat and Margaret, Live In Your Own Room, and We'd Quite Like To Apologise. His later stage lead roles in the 2000s and 2010s included being in Dame Agatha Christie's The Mousetrap, The Case Of The Frightened Lady and The Lady Vanishes.

