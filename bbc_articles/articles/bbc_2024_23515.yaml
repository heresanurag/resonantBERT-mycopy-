title: Zelensky gives his Ukraine 'victory plan' a hard sell in the US - did the pitch
  fall flat? - BBC News
date: '2024-09-28'
section: World
url: http://www.bbc.co.uk/news/articles/c2lnerd17wyo
content: |-
  Ukraine's president met Donald Trump, Kamala Harris and Joe Biden as he bid for Western help to end the war.

  Zelensky gives his 'victory plan' a hard sell in the US - did the pitch fall flat?

  Zelensky during a meeting with Biden in the Oval Office

  It was billed as a decisive week for Ukraine. A chance for President Volodymyr Zelensky to present his boldly named "victory plan" to America’s most powerful politicians, during a visit to the US. But it’s unclear if Kyiv is any closer to getting any of the key asks on its wish list.

  Zelensky told the New Yorker magazine he believed Trump "doesn't really know how to stop the war", while he described his vice-presidential running mate JD Vance as "too radical". His remarks about Trump and Vance were a "big mistake", says Mariya Zolkina, a Ukrainian political analyst and research fellow at the London School of Economics (LSE). Separately, Zelensky's visit to meet top democrats at an ammunition factory in the swing state of Pennsylvania was labelled as election interference by a senior congressional Republican. The backlash to the visit came as a "big surprise" to Zelensky’s team, adds Ms Zolkina – an operation normally known for its slick PR. Zelensky’s much-hyped visit was carefully timed to try and secure crucial support for Ukraine's war effort from President Joe Biden, who has just months left in office. But that also meant walking straight into a highly-charged US election campaign – a tightrope act. After reports that Trump had decided to freeze Zelensky out, the pair did eventually meet on Friday at Trump Tower in New York City. Standing side by side in front of reporters it was, at times, an awkward encounter. Trump declared he had a "very good relationship" with both Zelensky and Russia’s Vladimir Putin – an equivalence that is painful to Ukrainian ears. Zelensky gently interjected to say he hoped relations were better with him than with Putin - a remark laughed off by Trump.

