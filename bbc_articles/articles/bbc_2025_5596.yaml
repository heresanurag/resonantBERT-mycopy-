title: 'Poppy Atkinson death: Man released under investigation - BBC News'
date: '2025-03-07'
section: Cumbria
url: http://www.bbc.co.uk/news/articles/crlxz41jxw2o
content: |-
  Poppy Atkinson, 10, was fatally struck by a car while attending a Kendal football training session.

  Poppy Atkinson was determined to be a professional footballer, her family said

  A man arrested after a 10-year-old girl was fatally struck by a car on a sports pitch has been released under investigation. Poppy Atkinson was attending a football training session at Kendal Rugby Club in Cumbria on Wednesday evening when she died. Cumbria Police said a 40-year-old man from Lancaster, who was arrested on suspicion of causing death by dangerous driving at the time, had been released, but investigations were continuing. Tributes have poured in for the promising young footballer, including from Lionesses Ella Toone and Georgia Stanway, who said Poppy would "always play a special role" in the sport.

  At the time, police said there was "no indication to suggest that this incident was a deliberate act". An eight-year-old girl, also from Kendal, was taken to hospital for treatment but her injuries were not life-threatening. Her family said Poppy was determined to be a professional footballer and idolised Stanway, as well as Manchester United and England players Ella Toone and Kobbie Mainoo.

  Stanway, who is from Cumbria, said on X the news of Poppy's death was "devastating". "Sending all my love and condolences to the family and all affected," she said. "The football world will miss you Poppy. You will always play a special role." In a post on social media, Ella Toone said: "Heartbreaking. Sending all my love to the family at this sad time."

  Poppy was fatally struck by the vehicle while attending a football training session

  Kendal United described her as "our much loved player". "Poppy's love for football shone through to all who met her and she was an inspiration to her teammates," a spokesperson said. Morecambe FC said she would "always remain part of the Shrimps' family". "Poppy's passion for the beautiful game shone through, and her unwavering talent impressed those lucky enough to watch her play."

  Poppy Atkinson (pictured with her brother Edward) was a force of nature, her family said

  Poppy's family said their lives revolved around her love for football. "Many who know her, and who know her determination to improve and win, had no doubt she would achieve her goal to one day to play for Manchester United," they said. "She was a force of nature. She was so special, she was too good for this world." In response, Manchester United said: "On behalf of Ella, Kobbie and everyone at Manchester United, we send our heartfelt condolences to Poppy's family and friends for their devastating loss.

  A number of clubs have already agreed to hold a minute-long silence for Poppy ahead of this weekend's games as part of a campaign launched on social media by South Shields-based Team Grassroots.

