title: Sturgeon shared 'private' email address with Covid expert - BBC News
date: '2024-01-23'
section: Scotland
url: http://www.bbc.co.uk/news/live/uk-scotland-68055242
content: |-
  The UK Covid inquiry hears that the former first minister told an adviser she could contact her using an SNP email address.

  'I got death threats for talking about the pandemic'

  Prof Sridhar says she went online to communicate honestly with people. She says she knew experts were moving their families to remote areas and pulling their children out of school to protect them. "That message was not reaching the general public," she says, adding that governments were underplaying the risks. "I felt they deserved the same information we had and the same chances of protecting their loved ones." Prof Sridhar says she had death threats and online abuse as she became a well-known face talking about the pandemic. "It has been rough...racism, sexism, homophobia, xenophobia...I've taken it because I think the bigger idea is that we try to help each other and do good." She says 75% of her university team are young women and they do not want to go near government service or the media. "I've done my tour of duty," she says, "But who is going to step up next time?"
