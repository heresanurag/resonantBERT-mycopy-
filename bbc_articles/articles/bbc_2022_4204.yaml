id: bbc_2022_4204
title: 'Ukraine invasion: Videos show locals confronting Russian forces - BBC News'
date: '2022-03-02'
section: General
url: http://www.bbc.co.uk/news/world-europe-60558621
content: |-
  Videos from social media show tanks retreating and locals telling soldiers to go back to Russia.

  Videos from social media have emerged showing people in Ukraine standing up to Russian troops.

  People in different parts of the country have stopped tanks from entering towns and cities, while others have angrily confronted soldiers face to face.
