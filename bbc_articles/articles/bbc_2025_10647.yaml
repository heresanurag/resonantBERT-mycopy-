title: Hundreds cycle through Bristol for drum and bass bike ride - BBC News
date: '2025-05-05'
section: General
url: http://www.bbc.co.uk/news/videos/ckgelg331pmo
content: |-
  People follow Dom Whiting while he DJs drum and bass music on his own bike.

  Huge crowds brought parts of a city centre to a standstill earlier as hundreds of people joined a drum and bass bike ride.

  DJ Dom Whiting has hosted the Bristol Drum & Bass Bike Ride for the last four years.

  Each year, it has brought thousands of music lovers of all ages out into the city centre.

