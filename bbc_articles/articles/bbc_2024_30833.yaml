  I want to bring big-time boxing back to Wales - Price

  This video can not be played To play this video you need to enable JavaScript in your browser.

  WBA welterweight world champion Lauren Price says she wants to "bring big-time boxing back to Wales" after her devastating win over Bexcy Mateus. In the first defence of her title, the 30-year-old secured a second stoppage win of her undefeated eight-fight professional career. Price now looks set to take on IBF and WBC champion Natasha Jonas, who beat Ivana Habazin in Saturday's main event. It is understood a fight between Price and Jonas has been agreed and contracts signed, with the contest expected to be in March and London suggested as the likely host city. The winner would then be just Mikaela Mayer's WBO title away from being the undisputed welterweight champion. "I believe I am the best at 147lbs," Price told Sky Sports after her victory. "Fight by fight I keep learning, I have so much more to come. "I want to bring big-time boxing back to Wales."

  Price has already fought in Wales once previously, when she beat Jessica McCaskill in May 2024 to become world champion for the first time. Although her next fight with Jonas could take place outside of Wales, the Ystrad Mynach fighter made it clear she wants to face her fellow Brit next. "For the British fans I would love to fight Tash," Price continued. "It's one hell of a fight for British fans and boxing in general. "In this pro game you have to call the shots. If you're a world champion and you have titles you should fight anyone. "I have a few years in me but next year I want to be chasing belts. I want to be an undisputed world champion."

  Speaking to BBC Radio 5Live after Jonas' win later on Saturday evening, Price was quick to give her prediction for the proposed bout. "I'm in my prime, she's coming towards the end of her career," said Price. "I respect that, but I believe I win that fight. "If it was down to me, we would have been fighting here tonight. "But she [Jonas] doesn't want the fight, I get it."

