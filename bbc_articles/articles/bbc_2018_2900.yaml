title: Trump inspects border wall prototypes in California - BBC News
date: '2018-03-14'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-43389449
content: |-
  On his first visit to California, the US president discusses what type of wall he would like to see.

  On his first visit to California as president, Mr Trump examined border wall prototypes and talked about his preferences for what it should look like.

  He said that some undocumented immigrants "are like professional mountain climbers", suggesting they would attempt to find a way over the wall.
