content: |-
  The man was found injured in Islington on Thursday and died the following day in hospital.

  Three teenage girls charged over death of man, 75

  Three teenage girls have been charged with manslaughter over the death of a 75-year-old man. The victim - identified as Fredi Rivero, 75 - was attacked on Seven Sisters Road, Islington, north London, at about 23:35 GMT on Thursday and died the following day in hospital. The girls, aged 14, 16, and 17, were initially arrested on Thursday on suspicion of GBH by the Metropolitan Police. Police added Mr Rivero's family were being supported by officers.

  A post-mortem examination will be arranged in due course. The girls, who cannot be named because of their ages, are due to appear at Highbury Magistrates' Court on Monday. Police previously said the victim was thought to be Bolivian. Supt Annmarie Cowley earlier said she knew the death would cause "shock and very real concern" in Holloway and the wider Islington area. "I share those concerns, and I want to assure local people that a thorough police investigation is under way," she added. She said there were additional police patrols in the area over the weekend and urged residents to speak to officers if they had information or concerns.
