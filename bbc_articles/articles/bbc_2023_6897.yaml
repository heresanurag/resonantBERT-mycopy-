title: 'Watch: Fire ravages historic Manila post office building - BBC News'
date: '2023-05-22'
section: General
url: http://www.bbc.co.uk/news/world-asia-65668067
content: |-
  A massive blaze tore through Manila’s historic Central Post Office late Sunday.

  Several firefighters have been injured while battling a large fire at the Philippines’ Central Post Office. The blaze was brought under control after seven hours, but not before it gutted the historic neoclassical building.
