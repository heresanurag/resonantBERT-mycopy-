content: |-
  Lucia Lucas is playing a male role suited to her baritone voice at English National Opera.

  Lucia Lucas has entered into the history books by becoming the first transgender singer to perform with the English National Opera in London.

  She will make her UK operatic debut playing Public Opinion in Orpheus in the Underworld, on Saturday 5 October at the London Coliseum.
