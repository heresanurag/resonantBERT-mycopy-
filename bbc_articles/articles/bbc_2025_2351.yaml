title: UK asylum claims hit highest level since 1979 - BBC News
date: '2025-02-27'
section: UK
url: http://www.bbc.co.uk/news/articles/c62zzxeeveeo
content: |-
  More than 108,000 people claimed asylum in the UK in 2024, according to new statistics.

  The number of people claiming asylum in the UK in 2024 has reached its highest level since records began in 1979, Home Office figures show. According to data published on Thursday, 108,138 people claimed asylum in the year to December 2024 - an increase of 18% on 2023 and almost twice the number in 2021. The Home Office said the previous recorded peak was in 2002. The new high follows an uptick in recorded small boat arrivals in recent years. The number of small boat arrivals also increased in 2024 - 25% higher than in 2023 - but the figure was 20% lower than in 2022.

  The UK now receives the fifth largest number of asylum seekers in the "EU plus" area at a time when the government is under pressure to cut the asylum decision backlog. These figures, which cover the end of the Conservative government and the start of Labour, show the number of asylum cases awaiting an initial decision fell by 5% last year - with more than 90,600 cases, relating to around 124,800 people, pending a decision as of the end of 2024. The number remains higher than before 2022. The UK also sent more people into immigration detention last year, with that figure increasing by 12%. Meanwhile, the UK returned 2,251 people to another country who had arrived by small boat last year, a 10% increase compared to 2023. There has also been a sharp increase in people granted citizenship - with the figure standing at more than 269,600 in 2024.

  The prime minister's deputy official spokesman said there were "no quick fixes" to the "global" problem of illegal migration, but the government had a "serious long-term plan to restore order to the asylum system". Border Security and Asylum minister Angela Eagle criticised the previous government for a "broken asylum system", saying Labour inherited a "huge backlog" of claims. "We are beginning to get some order to the system but it will take time to make certain that we can get a grip and start making the system work again." Asked why claims are so high, Eagle said "many people want to come here", further referring to those coming on work and student visas and then claiming asylum. She underlined "we have to be much tougher" dealing with visa overstayers. Shadow home secretary Chris Philp described the figures as "no surprise," saying there was "no deterrent". Philp added that the blame for the numbers "lies firmly at Labour's feet, who have been slow to act to tackle the crisis unfolding on our border".

  The British Red Cross's policy, research and advocacy director Mubeen Bhutta called for the government to create "more safe routes" to prevent people taking dangerous journeys to the UK. "Behind today's numbers are real men, women and children who have been forced to flee their homes. Too many are making perilous journeys to find safety, because they have no other option," Bhutta said in a statement. "For the vast majority of people, there is no way to claim asylum in the UK without already being here." New guidance issued for visa and immigration staff earlier this month set out that anyone entering the UK illegally having made a dangerous journey to do so, including those already here, will normally be refused citizenship. The measure was criticised by the Refugee Council as well as some Labour MPs. The Refugee Council said on Thursday it was "encouraged" the government continued to work on the "broken asylum system" during its first six months in power. However, it called for further efforts to cut the backlog of asylum applications to avoid people "stuck in hotels, trapped in limbo and unable to work". The government's use of hotels to house asylum seekers has continued to rise, with more than 38,000 in hotels at the end of December. That figure was still lower than the peak of 56,000 hit in September 2023. The government has pledged to stop this practice by the end of the parliament. The government is legally obliged to provide accommodation to asylum seekers who cannot afford to support themselves while their claims are being considered. But the number of people seeking asylum in the UK has hit record levels, leading to a shortage of spaces in existing accommodation.

  While irregular arrivals rose last year, the number of work and study visas - which account for a majority of arrivals, not including visitors and transit, examined by the Home Office - dropped. The previous Conservative government introduced measures to reduce legal migration with changes to visa processes – including an increase to the minimum salary for a UK skilled worker visa. The Conservatives also banned health and social care workers and most international students from bringing family to the UK. The number of people coming to the UK on work visas last year fell by about 250,000. This was almost evenly split between fewer people coming for work (down by more than 125,000) and fewer family members coming with them (down by nearly 120,000). Both falls were largely driven by trends in the health and care worker route.

  The previous government introduced a special visa to bring people into the sector. This led to huge rises in visas issued - especially since people coming to work in care tend to bring more family with them than people coming on other work visas. But Rishi Sunak's government tightened the rules late in 2023, leading to falls in people coming on this visa throughout last year. In September 2024, the current Labour government announced further measures including stronger rules around visa sponsorship of migrant workers. A White Paper is due to be published this year setting out a plan to reduce legal migration.

  Dr Ben Brindle, researcher at the Migration Observatory at the University of Oxford, referred to a "boom and bust" in some visa categories over recent years. "The large declines in visa grants have been possible primarily because the number of visas previously being issued in the post-Brexit immigration system was so high," he said. "Despite the declines, overall visa grants to non-EU citizens remain well above pre-Brexit levels."
