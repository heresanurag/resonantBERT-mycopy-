  Nottinghamshire Police is warning horse owners to be vigilant after the "heartless assault".

  Police are warning horse owners to be vigilant after the attack on Alfie

  Police are investigating a "sickening, heartless assault" on a horse, which was found dead and mutilated in a field. Nottinghamshire Police said Alfie, a 16-year-old traditional tri-coloured cob, was found at a property off Owday Lane, Carlton-in-Lindrick, Worksop, at about 10:30 BST on Thursday. Alfie was last seen fit and well at about 19:00 on Wednesday, when his owner rode and bathed him before he turned him out in a field, officers said. Ch Insp Clive Collings said it was "the epitome of a senseless and violent attack" and warned horse owners to be vigilant.

  "Alfie’s owner had been left distraught by his cruel death," said Ch Insp Clive Collings

  The force said officers had checked CCTV footage, looked at forensic opportunities, and carried out house-to-house inquiries. Mr Collings, Nottinghamshire Police's rural and wildlife crime lead, said: “Although it's difficult to believe, all of the evidence shows that this was a sickening, heartless assault on a defenceless animal. "I would urge anyone with information about what happened to get in contact with us as soon as possible. “Alfie’s owner had been left distraught by his cruel death and wants justice for him." He said they were asking people in the area if they had any CCTV or doorbell camera footage which could help, or if they recalled seeing any suspicious activity between 19:00 on Wednesday and 10:30 on Thursday. “We are also warning horse owners in the area to be extra vigilant, given the appalling nature of this crime,” he added. Follow BBC Nottingham on Facebook, external, on X, external, or on Instagram, external. Send your story ideas to eastmidsnews@bbc.co.uk, external or via WhatsApp, external on 0808 100 2210.
