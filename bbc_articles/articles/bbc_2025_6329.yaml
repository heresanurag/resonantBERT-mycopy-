content: |-
  Tai Woffinden, from Scunthorpe, was involved in a serious collision during a race last month.

  Speedway champion 'on the mend' after crash

  Tai Woffinden in June last year at the British Speedway Championship Final in Manchester

  A motorcycle speedway world champion who was involved in a serious crash in Poland last month has said he is "on the mend". Tai Woffinden, from Scunthorpe, had been racing for his club Rzeszow on 30 March when he was involved in a collision with a team-mate. Woffinden suffered multiple fractures and an injury to his chest and was put into a medically induced coma. In a post on social media he said: "Turns out my injuries and an induced coma ain't no joke. I just need a little more time to rest."

