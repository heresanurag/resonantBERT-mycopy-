  Woffinden had only recently made a comeback to the sport after he suffered a broken elbow in June which ended his 2024 season. "Please know how much I appreciate all the love and support from all over the world," he added, and promised further updates on his condition later in the week. The sportsman is one of the country's most decorated racers after winning three Grand Prix world titles in 2013, 2015 and 2018. He also finished runner-up in 2016 and 2020. The 34-year-old was born in Scunthorpe, the son of speedway rider Rob Woffinden, but grew up partly in Australia before returning to the town to race for the Scunthorpe Scorpions. Listen to highlights from Lincolnshire on BBC Sounds, watch the latest episode of Look North or tell us about a story you think we should be covering here, external.
