title: 'Six Nations: England braced for return of France to Twickenham - BBC Sport'
date: '2025-02-08'
section: England
url: http://www.bbc.co.uk/sport/rugby-union/articles/c4g9v36y5qmo
content: |-
  England suffered a record defeat on France's last visit to Twickenham, but the hosts hope to have struck on a winning fly-half formula in Fin Smith.

  Fin Smith, who steered Northampton to the Premiership title at Twickenham, makes his first Test start against France

  Coverage: Listen on BBC Radio 5 Live and BBC Sounds and follow live text commentary and highlights on the BBC Sport website and app.

  England came to Allianz Stadium in November in search of some home comfort. Before then, Steve Borthwick's reign had been a roadshow. Of England's previous 15 games, only two had been at Twickenham. The jet-set itinerary had included a third-place finish at the Rugby World Cup, wafer-thin away defeats by New Zealand and France and performances of much promise. The two home stop-offs – against Wales and Ireland – had both been wins. A return to their rebranded headquarters was where England were to consolidate and kick on. "We want to make sure this is a place that our players enjoy playing, that our fans enjoy coming, because they're seeing an England team performing and an England team winning," said Borthwick. Instead, the autumn kicked them in the teeth. A southern-hemisphere stampede of Kiwis, Wallabies and Springboks delivered three straight home defeats. A loss to Ireland in Dublin last weekend took the tailspin to six in seven matches. And now England return to Twickenham to face a French team who ransacked a record 53-10 scoreline on their last visit. The hope of home advantage has morphed into the fear of home carnage. In 2023, after France had run in seven tries and fans had darted for early exits, Borthwick was clear about the long-term task. "There is a lot of work to do," he said. "We have to make sure we are using each day to try and close this gap. That gap is there and evident for everyone to see." Two years on, that gap remains frustratingly unbridgeable. England seem trapped, like a tortoise and an ancient athlete,, external in some logic snare; for every advance they claim to make, the opposition always stay just out of reach.

  Fin Smith is the man tasked with delivering a quantum leap forward. The 22-year-old, with seven replacement appearances, totalling 122 minutes of Test action, to his name, starts at fly-half against the Six Nations favourites. Smith made his debut for Worcester at 18, lost his first 10 games for Warriors and then saw the club go bust at the end of his second season. Since then he has twice steered Northampton into the play-offs, winning the Premiership title last season. Still it is a bold call. Marcus Smith was the future once too. Now, after eight straight starts in the 10 jersey, the Harlequins playmaker is shuffled back into his unfavoured and unfamiliar full-back role. Fin Smith is a more conventional 10, playing flat to the line and finding holes with his selection of pass and breadth of vision, rather than Marcus' hot-stepping individual brilliance. It is hoped he will give centres Henry Slade and Ollie Lawrence more of a platform. With fellow Saints Alex Mitchell at scrum-half and Tommy Freeman and Ollie Sleightholme on the wings, Northampton connections should help the team click. Against a French team that kick for distance, rather than to set up aerial duels, Marcus Smith's ability to pick his way through a broken field will be either a deterrent or a weapon. Elsewhere the back row is beefed up with the inclusion of Tom Willis, and the bench, which had won a cumulative total of only 81 caps against Ireland, has the experience of former captain Jamie George, with 97, and Elliot Daly, with 69, to guard against England's customary last-quarter fade. Whether it survives contact with France's mix of the balletic and the brutal though is another thing. Captain Antoine Dupont's game appears to have been elevated to yet another level by his time with France's Olympic gold-winning Sevens team. Last weekend's win over Wales was the mercurial Toulouse star's 24th straight victory as a starting scrum-half in the 15-a-side game – a run stretching back to France's quarter-final defeat by South Africa in October 2023. Matthieu Jalibert is a fly-half with devil to his game and a point to prove after being overlooked. Full-back Thomas Ramos has been dead-eyed off the tee. Wings Damian Penaud and Louis Bielle-Biarrey have bullet pace.

