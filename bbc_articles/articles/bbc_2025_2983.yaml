  Their pack is anchored by Uini Atonio and Emmanuel Meafou, both up near 23 stone, and number eight Gregory Alldritt was at his rampaging best against Wales last weekend. The bookmakers have made up their minds. France are clear favourite to raid the fortress once more. If they are right, England's most noticeable progress will be past some unwanted markers. It would be the first time France have won four straight games against England in the tournament in nearly 50 years. England would have lost four times in their past seven Six Nations games at Twickenham, as many as they had suffered in their previous 30 such fixtures. The fixture list has served up the stiffest of Six Nations starts for England. Scotland and Italy at home on successive weekends before a final-round trip to Cardiff means Borthwick's side are working through last year's table in descending order. This weekend though won't be about home comforts. This Twickenham test, against the form team in Europe, will deliver some home truths about the distance between where England are and where they aspire to be.

