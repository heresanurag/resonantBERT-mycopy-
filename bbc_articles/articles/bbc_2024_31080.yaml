  Canada's next federal election must be held in October, at the latest. Laura Stephenson, chair of the political science department at Western University, told the BBC that it was not clear that a change in leadership would affect the current US-Canada dynamic. "I have no confidence that Trump will react any differently to Poilievre than he does to Trudeau," she said. After nine years in power, Trudeau has faced growing calls to resign over concerns he is a drag on his party's fortunes. The Liberal leader's approval rate has plummeted from 63% when he was first elected to 28% in June of this year, according to one poll tracker. Opinion polls also suggest the Liberals could face a devastating loss to the Conservatives if an election was held today. Some Liberal members of parliament have been pressuring Trudeau for months to step down - eight MPs publicly expressed this sentiment on Monday, Canadian newspaper The Globe and Mail reported. In a meeting with his caucus following Freeland's resignation on Monday, Trudeau reportedly heard some of those calls for him to quit directly. Others also expressed their concerns and reservations about his leadership. Trudeau addressed them by saying he is not immediately stepping down, but that he will reflect on the day's events, according to sources who spoke to Canadian media about the meeting.

  Chrystia Freeland, the former finance minister and deputy prime minister, was long a close ally of Justin Trudeau

  Trudeau did not take questions on his way to the fundraiser in Ottawa, but he told the crowd he was "damn proud" of his government's accomplishments. In brief remarks, he said working for Canadian values was "at the core of what makes us Liberals". "That's why we show up here, even on the toughest days as a party." Trudeau has defied previous calls to step aside and has said repeatedly that he plans to run in the next federal election. Also on Monday, the leaders of Canada's provinces and territories met in Toronto to address Trump's tariff threat. "It's chaos right now up in Ottawa", said Ontario Premier Doug Ford. Ford said the premiers will "make sure that we tell the world there is stability here, there is certainty here in Canada".
