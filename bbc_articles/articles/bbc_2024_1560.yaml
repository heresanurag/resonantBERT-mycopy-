title: 'Wimbledon: Electric double-decker bus catches fire during London rush hour
  - BBC News'
date: '2024-01-11'
section: General
url: http://www.bbc.co.uk/news/uk-67943798
content: |-
  No injuries have been reported but a critical incident was declared, police said.

  Footage posted on social media shows an electric double-decker bus on fire during the morning rush hour in south-west London.

  The Met Police said emergency services were called about the incident on Wimbledon Hill Road/Alwyne Road in Wimbledon shortly after 07:20 GMT.

  No injuries have been reported but a critical incident was declared, officers said.

