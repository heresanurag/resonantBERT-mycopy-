  The 122 seconds that turned the tie around
  • None Where does this rank with greatest Champions League comebacks?
  • None Liverpool have reached their ninth European Cup/Champions League final - only Real Madrid (16), Milan (11) and Bayern Munich (10) have reached more.
  • None They are the first English side to reach back-to-back Champions League finals since Manchester United (2008 and 2009).
  • None This was just the fourth time a team has overturned a three-or-more goal deficit from the first leg of a Champions League (not European Cup) knockout tie to progress. Barcelona were also on the receiving end the last time (against Roma last season).
  • None Barcelona have now been eliminated from three of their past four Champions League semi-final ties.
  • None La Liga's current champions suffered their heaviest-ever defeat against an English side in all European competitions.
  • None Full-back Trent Alexander-Arnold has provided 14 assists in all competitions this season, more than any other Liverpool player.
  • None Divock Origi scored his first Champions League goals, and in doing so became the 50th different player to score in the competition for Liverpool (excluding own goals).
  • None Georginio Wijnaldum is the first Liverpool player to score twice from the bench in a Champions League game since Ryan Babel against Besiktas in 2007. He is also the first substitute to score twice in a single game against Barcelona in the competition.
  • None Lionel Messi either attempted (five) or created (three) all eight of Barcelona's shots against Liverpool in this match.

  Liverpool will seek another success against the odds when they return to Premier League action on Sunday. They host Wolves in their final game of the season (15:00 BST) hoping results go their way to turn around a one-point deficit and take the title from Manchester City, who are at Brighton.
