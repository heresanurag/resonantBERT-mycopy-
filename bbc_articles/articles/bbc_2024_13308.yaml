title: Taylor Swift fan gifted star's hat at Wembley during Eras tour - BBC News
date: '2024-06-26'
section: General
url: http://www.bbc.co.uk/news/videos/cd11xk696dvo
content: |-
  Watch the emotional moment Taylor Swift gave a superfan her hat at London's Wembley Stadium.

  This is the moment Elsie was given Taylor Swift’s hat when the star's Eras Tour came to London's Wembley Stadium.

  The Swift superfan, who helps look after her sister who is registered as blind, was taken to the front of the stage after being spotted by Taylor’s team dancing in the stadium on Sunday.

  The 11-year-old from south-east London was “crying with happiness” after getting to meet the star and receiving the signed hat, which is now - according to her father, -the “most valuable thing in our house”.

