  • None Chelsea (19) have scored the first goal of the game more times than any other Premier League team this season and have yet to lose (W16 D3).
  • None Burnley have never won a Premier League encounter against Chelsea (D2 L4).
  • None Pedro has now scored nine times in all competitions for Chelsea this season, surpassing his total of eight in 2015-16.
  • None Robbie Brady is the first Premier League player to score a direct free-kick v Chelsea (in the PL) since Rickie Lambert in March 2013.
  • None Brady is the third Burnley player to score on his first Premier League start for the club alongside Scott Arfield v Chelsea in August 2014 and Daniel Fox v West Ham in February 2010.
  • None Diego Costa has failed to score in three consecutive Premier League appearances for the first time since April-May 2016.

  After hosting non-league Lincoln City in the FA Cup fifth round on Saturday [12:30 GMT], Burnley begin a run of four away games in a row when they travel to Hull City on 25 February.

  Chelsea are also in FA Cup action at the weekend. They travel to Championship side Wolves [17:30] on Saturday before hosting Swansea in the Premier League the following weekend.
