title: Iconic Piccadilly lights turned off for site renovations - BBC News
date: '2017-01-16'
section: General
url: http://www.bbc.co.uk/news/uk-38640368
content: |-
  The iconic billboard lights are switched off for renovations and will stay off until autumn.

  The iconic billboard lights at Piccadilly Circus have been switched off for renovations and will stay off until autumn.

  The billboard, which has displayed electrical advertisements for more than a century, went dark at 08:30 GMT for work to take place.
