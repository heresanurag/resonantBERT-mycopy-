title: Moment cat interrupts royal historian mid-BBC interview - BBC News
date: '2023-06-06'
section: General
url: http://www.bbc.co.uk/news/uk-65816316
content: |-
  Fleur the cat stole the limelight as her owner answered questions about Prince Harry live on BBC News.

  An unexpected feline guest surprised royal historian Marlene Koenig as she was being asked questions about the Duke of Sussex's hacking court case.

  Fleur the cat was eager to make her TV appearance and jumped up on to her owner's lap mid-interview, much to presenter Sally Bundock's surprise.

  Ms Koenig tells the BBC her two-and-a-half-year-old rescue cat is "the queen of the house".

  "Going viral was not on my bingo card today," she adds.
