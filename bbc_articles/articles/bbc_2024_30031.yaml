  On Wednesday Police Scotland confirmed that 19 arrests had been made over disruption across Halloween and Bonfire Night. Six people have been charged under the Fireworks and Pyrotechnic Articles Act and 26 further charges have been made for related criminal behaviour. The force said residents in Edinburgh and Glasgow were "terrified" by targeted disorder and inquiries were continuing to identify those responsible. The Scottish Fire and Rescue Service (SFRS) received 1,000 emergency calls from across the country on Tuesday on an evening. Both firefighters and police officers were attacked, though incidents of serious disorder had fallen compared to last year, according to police statistics. Anyone with information on Bonfire Night disorder in the city has been urged to supply any evidence through a public portal, external.
