title: Boy charged over £20,000 damage at Edinburgh Macklin Motors - BBC News
date: '2024-11-09'
section: Edinburgh, Fife & East
url: http://www.bbc.co.uk/news/articles/cwyge3grg7lo
content: |-
  Several vehicles on an Edinburgh forecourt had windows smashed and body work scratched during widespread disorder.

  A number of cars were damaged at the Macklin Motors dealership on Calder Road

  A 13-year-old boy has been charged over vandalism at a car dealership in Edinburgh that resulted in £20,000 worth of damage. Several vehicles at Macklin Motors on Calder Road had windows smashed and body work scarred during widespread disorder on Bonfire Night. Police Scotland said the boy would appear in court on Tuesday. Officers have also charged two other men, 38 and 40, over separate incidents involving fireworks.

  The 38-year-old was arrested after fireworks were set off in a common stair in Dunsyre House North in the city's Wester Hailes on Tuesday evening. Police also launched an investigation after a group of young people were spotted taking a quantity of fireworks from a vehicle that same night. The pyrotechnics were then used during disorder and antisocial behaviour in Gracemount. The 40-year-old man was arrested during efforts to trace the driver of the vehicle. He will appear in court on Tuesday. Det Ch Insp George Calder said the force had been "unrelenting" in their pursuit of those responsible for disorder that had put communities "in a state of alarm" on Bonfire Night. He said the three arrests were the first of many, adding: "You might think you have evaded arrest, because we’ve not yet come to your door, but we will be doing so imminently."

