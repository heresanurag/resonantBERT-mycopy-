title: How does Labour want to tackle poverty? - BBC News
date: '2024-06-28'
section: BBC InDepth
url: http://www.bbc.co.uk/news/articles/ce9319prplxo
content: |-
  The political parties have been laying out how they would address poverty.

  “We’re not talking about poverty,” says Rosie Duffield, who is standing to be re-elected as a Labour MP in Kent. Ms Duffield now speaks with almost unique candour amongst Labour candidates, the after-effect of her very public tangle with Keir Starmer on transgender issues.

  She adds: “We should be aiming to eliminate it, particularly child poverty, as soon as we possibly can. We are scared of promising too much that might harm our poll lead, but we have to be the change the country needs.”

  In 2009-10, the Trussell Trust handed out just under 41,000 emergency food parcels. In the last financial year – 2023-24 – that figure had increased to 3.1 million, a record high. The British Social Attitudes Survey shows 73% of people believe there is “quite a lot” of real poverty in Britain, the highest recorded level in almost four decades of asking the same question.

  The Labour manifesto pledges to ”develop an ambitious strategy to reduce child poverty," including introducing free breakfast clubs in every primary school. It also says it wants “to end mass dependence on emergency food parcels" but does not specify how.

  “We were encouraged to see that commitment,” says Helen Barnard, director of policy at the Trussell Trust, the country’s largest provider of food banks. She says the party’s promises to build social housing and strengthen job security has the potential to reduce poverty. But “what we need to see is fast action about how they’ll tackle hardship, and in their very first budget (if they win the election)”.

  The party’s manifesto in 2019 had an entire section on tackling poverty and inequality, but in the 2024 manifesto the party’s focus on making people better off is framed round the more general goal of kickstarting economic growth. This is not a one-off - in the four party conference speeches Mr Starmer has made as leader, he has never talked about tackling poverty and inequality specifically.
