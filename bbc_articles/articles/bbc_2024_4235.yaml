title: 'Indian Wells: Iga Swiatek and Caroline Wozniacki win to set up quarter-final
  meeting - BBC Sport'
date: '2024-03-13'
section: Tennis
url: http://www.bbc.co.uk/sport/tennis/68551843
content: |-
  World number one Iga Swiatek defeats Kazakhstan's Yulia Putintseva 6-1 6-2 to set up a quarter-final with Caroline Wozniacki, who beats Angelique Kerber 6-4 6-2.

  Iga Swiatek (left) beat Caroline Wozniacki in their only previous meeting at the Canada Open in 2019

  World number one Iga Swiatek eased through to the quarter-finals at Indian Wells with a straight sets win over Kazakhstan's Yulia Putintseva. Poland's Swiatek needed one hour and 12 minutes to seal a 6-1 6-2 win. The 22-year-old will next play former world number one Caroline Wozniacki, who beat Angelique Kerber 6-4 6-2. For Wozniacki, who came out of retirement last year, it will be a first WTA 1,000 quarter-final since 2019. Wozniacki retired in January 2020 but returned last August after giving birth to her two children. "I don't take anything for granted," said the 33-year-old Dane. "I took a long time off, more than three and a half years - for me to be back here on this court and playing against the best players in the world is a special feeling. "I'm just enjoying myself and I'm just thrilled that I get another match in front of all of you guys."

  Wozniacki added that she will have to play her "best tennis to compete" with Swiatek. "I think I have obviously commentated some of her matches," she said. "I know how she's playing. Obviously she's playing good tennis, playing powerfully. "I practised with her as well a few times after I have come back, during the US Open as well. I know how she plays, but it's one thing knowing how she plays and also playing against her in a full match."

  Also in California, 16th seed Elina Svitolina lost 6-1 4-6 6-3 to American Emma Navarro, while her Ukrainian compatriot Marta Kostyuk reached the last eight with a 6-4 6-1 over Russia's Anastasia Pavlyuchenkova.
