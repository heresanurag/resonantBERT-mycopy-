  However, detecting any trends or patterns behind the 2018 homicides is as arduous as it is to solve.

  The killings were not clustered in certain areas - instead they were spread across London.

  Sorry, your browser cannot display this map

  The average age of a homicide victim in 2018 was 35. Teenagers made up 17% and a quarter of killings this year are thought to have been related to domestic violence.

  Although the issue of knife crime took centre stage this year, only 59% of 132 homicides stemmed from fatal stabbings.

  Motives and circumstances behind killings varied - as did the age and gender of the victims.

  Youth violence is an undeniable issue in the capital. However, criminologist Simon Harding explained the true reasons behind each death were not always plain to see.

  "It is much more layered than the screaming headlines lead you to believe," he said.

  "What we are seeing with gang killings is more of a stab-on-sight mentality which has seemingly unnerved members of the public.

  "There is also a doughnut effect - a ring around inner London boroughs where poverty and inequality is more prominent.

  "Every year you are sadly going to have a certain percentage of domestic violence murders. There are also always spontaneous flashes of violence which can happen on a night out and often fuelled by alcohol."

  The surge in killings over the last 12 months has arguably plagued London's reputation and infected it with a notoriety of being a violent city.

  But, data shows the 2018 homicide rate was significantly lower than it was at the start of the 21st Century - and London's population has risen since then.

  Measures have still been taken during 2018 in attempts to halt hikes in homicides - usually in reaction to a batch of violent deaths over a couple of days.

  After London endured a spree of killings in April, the Home Office published a new Serious Violence Strategy and ploughed £40m into it.

  Prevention and early intervention were said to be "at the heart" of the government's action plan.

  This video can not be played To play this video you need to enable JavaScript in your browser. How the community and local police are trying to make Croydon safer

  Additionally, as the capital's homicide rate reached 100 in September, London Mayor Sadiq Khan described the issue as "a disease infecting communities".

  Known as the "public health approach" it sees police officers working with teachers, councils and NHS staff to bring together knowledge of people involved in a criminal cycle.

  The mayor set about mirroring methods used to cut Glasgow's homicide rate by creating a Violence Reduction Unit (VRU).

  In November, Sadiq Khan warned London's violent crime problem could take a generation to solve

  Despite being unveiled months ago, a director to lead London's VRU is yet to be appointed and details of the idea remain vague.

  The true influence of these political approaches will have to wait until well into 2019 - perhaps even later.

  But, as friends and families of the 132 homicide victims come to terms with new abiding traumas, 2018 is already a year too late.

