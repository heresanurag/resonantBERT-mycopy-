title: PM condemns 'far-right thuggery' after Rotherham hotel violence - BBC News
date: '2024-08-04'
section: South Yorkshire
url: http://www.bbc.co.uk/news/articles/crg44dx9lz9o
content: |-
  Sir Keir Starmer warns those involved in violence at a Rotherham hotel on Sunday will "regret" it.

  This video can not be played To play this video you need to enable JavaScript in your browser.

  The Prime Minister has condemned "far-right thuggery" after masked individuals attacked police and forced their way into a hotel, which has been used to house asylum seekers. Trouble flared outside the Holiday Inn Express in Rotherham as missiles were thrown at officers and a bin fire was started next to the building, which was then entered by a number of people wearing balaclavas. South Yorkshire Police described the violence as "nothing short of disgusting" and said at least 10 of its officers had been injured, including one who had been knocked unconscious. Sir Keir Starmer said he would do "whatever it takes to bring these thugs to justice".

  Protesters smashed windows and set fires at the Holiday Inn Express in Rotherham

  Violence erupted after a planned demonstration by anti-immigration protesters outside the hotel escalated over the course of Sunday afternoon. A rival protest from an anti-racism group had also started outside the hotel about the same time, but that group was ushered away by a police escort after quickly becoming outnumbered and surrounded by the other cohort. Objects were then thrown at both officers and the hotel and officers soon became overwhelmed by a large group of masked individuals, some of whom forced their way inside the building after shattering a number of ground-floor windows. Chants of "get them out" and "we want our country back" were heard.

  The Prime Minister described the scenes in Rotherham as "far-right thuggery"

  Flames from a bin fire, started as the demonstration grew increasingly ugly, were later put out after a short time but police officers were pelted with glass bottles and sprayed with fire extinguishers. Fence panels ripped from the properties of nearby residents were also among the missiles thrown at police, as the crowd was later pushed into a retreat away from the hotel. Riot police managed to regain control of the hotel and continued to shepherd the crowd away from the area, although masked individuals were seen attacking the line of officers into the evening. One woman, who lives locally and joined the anti-immigration protest, earlier told the BBC's Navtej Johal the scenes at the hotel are “absolutely barbaric", adding "this is not what we’re here for".

  Several hotel windows were smashed as police were overwhelmed

  South Yorkshire Police said no hotel staff or residents were reported to be injured and it would maintain a strong presence around the building for the rest of the day and into Monday. One person has been arrested on suspicion of public order offences. Assistant Chief Constable Lindsey Butterfield said: “The mindless actions of those today have achieved nothing other than sheer destruction and leaving members of the public and the wider community in fear. “While it was a smaller number of those in attendance who chose to commit violence and destruction, those who simply stood on and watched remain absolutely complicit in this." ACC Butterfield added that people spreading misinformation and hate online "also need to take responsibility for the scenes today," adding: "This was not a protest, just angry people, reacting to a false narrative who have their own motivations for doing so."

  Officers continued to be attacked into the evening as the crowd was shepherded away from the hotel

  Speaking to reporters from Downing Street, Sir Keir Starmer said those involved would feel the "full force of the law". "You will regret taking part in this," he told those involved in the unrest. "There is no justification for taking this action. "I won't shy away from calling it what it is - far-right thuggery." He added that the "violent mob do not represent our country" and said: "If you target people because of the colour of their skin or faith, that is far-right and I’m prepared to say so. "Our police deserve our support as they tackle any and all violent disorder that flares up."

  The Prime Minister said those involved in the violence would "regret" it

  The Home Office announced a new "rapid response" security scheme for mosques "at risk of violent disorder". Home Secretary Yvette Cooper said: "As a nation we will not tolerate criminal behaviour, dangerous extremism and racist attacks that go against everything our country stands for." Writing on X earlier, Ms Cooper had said: "The criminal, violent attack on a hotel housing asylum seekers in Rotherham is utterly appalling. "Deliberately setting fire to a building with people known to be inside. South Yorkshire Police have full Government support for the strongest action against those responsible."

  Several windows across the hotel's ground floor were smashed

  In a statement, the region's mayor, Oliver Coppard, said he was "appalled" by the violence. He said: "What we’re seeing is not a protest, it is brutal thuggery directed against some of the most vulnerable people in our society. "The people carrying out these attacks do not represent the beautiful, brilliant place and people I know. "We will come after those carrying out this violence with the full force of the law."

  Labour MP for Rotherham Sarah Champion also condemned the disturbance. She said: "The people causing damage do not represent our town and I am disgusted by their actions. "This is criminal disorder and intimidation - not protest."

  The violence escalated as individuals wearing masks threw missiles at officers

  A spokesperson for IHG, which owns the Holiday Inn Express brand, said: "The safety and security of our guests and colleagues is always our priority. "Any further questions should be directed to the Home Office."
