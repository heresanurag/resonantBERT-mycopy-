title: 'Portadown: Murder investigation launched after man''s body found - BBC News'
date: '2021-10-27'
section: Northern Ireland
url: http://www.bbc.co.uk/news/uk-northern-ireland-59064933
content: |-
  A man is arrested following the discovery of a body at a property in Portadown, County Armagh.

  The body was found in the Whitesides Hill area of Portadown

  A murder investigation has been launched following the discovery of a man's body in Portadown, County Armagh.

  The man, named locally as Stephen Barriskill, was found at a house in the Whitesides Hill area of Portadown just after 12:00 BST on Wednesday.

  A man has been arrested on suspicion of murder.

  Police said the investigation was at an early stage, and have appealed for anyone with information to contact them.

  It is understood the victim had lived in the area for some time and was well known.

  Local residents are "bewildered" by the murder, according to councillor Lavelle McIlwrath from the Democratic Unionist Party (DUP).

  "They can't believe that something like this has happened in this locality. It's a quiet, rural farming community," he said.

  "It's a lovely area and they're shocked at the news today."

  The house was sealed off as forensics officers carried out an examination

  Upper Bann Assembly member Dolores Kelly, from the Social Democratic and Labour Party (SDLP), expressed her sympathy.

  "My thoughts go out to the family and friends of the man who was found dead today and to the community in Whitesides Hill who will be shocked that this has happened within their community," she said.
