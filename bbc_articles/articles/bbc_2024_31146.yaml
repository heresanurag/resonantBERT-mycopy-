title: Sam Fender cancels Glasgow and Newcastle shows - BBC News
date: '2024-12-18'
section: UK
url: http://www.bbc.co.uk/news/articles/ckg9444enpro
content: |-
  The North Shields-born musician says he is "heartbroken" but risks "lasting damage" if he performs.

  Sam Fender has cancelled his remaining shows for 2024

  Sam Fender has cancelled his remaining shows for 2024 after damaging his vocal cord. The singer-songwriter was due to play Glasgow later and Newcastle on Friday in the final stint of this year's UK tour. In a social media post, the North Shields-born musician said he recently had the flu and investigations revealed he had haemorrhaged his right vocal cord. Fender said he was "absolutely heartbroken", but two separate doctors had said if he performed he would be "risking lasting damage".

  The singer said he had been advised to go on vocal rest and not use his voice for a "prolonged length of time until it heals". Fender is due to kick off the US leg of his tour in February, before performing across Europe in the spring. In June, Fender is due to return to London and Newcastle for his UK stadium tour, selling out three nights at St James' Park.

  Sam Fender has sold out three nights at St James' Park in June

  The 30-year-old has had trouble with his vocal cords previously, cancelling his 2019 tour when he had laryngitis and was concerned he could haemorrhage one of them. "I've done everything by the book this tour living like a monk, it's so unlucky," he wrote on Instagram. "This has been the best tour so far and all I want to do is get up and sing again for you all tonight. "I'm so, so sorry to all of you who are on your way tonight." Fender added he and his team were trying to find a way to reschedule the dates.
