title: Boiling water instantly turns to snow in frigid Montana - BBC News
date: '2022-12-23'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-64083144
content: |-
  Even boiling water is freezing as dangerously cold temperatures sweep large parts of the US.

  Want to get a sense of how cold it is in the US state of Montana?

  Watch this person toss a pot of boiling water into the air and see it immediately transform into snow.

  Large parts of the US and Canada have seen temperatures plummet as a bomb cyclone sweeps across North America.
