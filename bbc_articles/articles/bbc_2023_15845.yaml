  Calls are made for moves to keep bullocks that graze near residential properties under better control.

  Calls have been made for moves to keep bullocks that graze on a common near residential properties under better control.

  People in Biggleswade said action needed to be taken as each year they keep getting into people's gardens and causing damage.

  Town councillor Andy Skilton told BBC Three Counties Radio he had been unable to reach Fen Reeves, the common's owners, so shared footage online to raise awareness of the issue.

  Fen Reeves said in a statement it had been in touch with concerned residents and the issues raised had been discussed.
