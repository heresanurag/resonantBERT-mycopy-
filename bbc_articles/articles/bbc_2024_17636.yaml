title: Cyclist Julien Bernard fined for kissing wife during Tour de France - BBC News
date: '2024-07-06'
section: Europe
url: http://www.bbc.co.uk/news/articles/c3g9vwvy430o
content: |-
  Cycling's governing body says the fine is for "unseemly or inappropriate behaviour".

  French cyclist Julien Bernard has given a light-hearted apology after being fined for kissing his wife during a Tour de France time trial. The Lidl-Trek rider was made to pay 200 Swiss francs ($223; £174) by the International Cycling Union (UCI) for stopping briefly during stage seven of the race. The governing body said the fine was for "unseemly or inappropriate behaviour during the race and damage to the image of the sport". Writing on social media, Bernard apologised to the UCI for "having damaged the image of sport" but said he was willing to pay the fine "every day and relive this moment".

  Stage seven of the Tour de France is a short course of 23.3km (14.5 miles) and is one of two time trials in the race - where cyclists race against the clock for the best time. The climb takes place in the famous wine region of Burgundy. According to Cycling News, Bernard was just 30 minutes from where he lives when he was met by his supporters. As he reached the top of a climb, friends ran towards him holding signs and his wife stepped forward - at which point she gave him a quick kiss, holding their son who was dressed in a replica cycling kit. A fine for the same amount and for breaking the same rule was given earlier in the race to Italian cyclist Davide Ballerini, after he stopped to watch Britain's Mark Cavendish sprint to a record-breaking 35th Tour de France stage victory.

  Julien Bernard said he was happy to pay the fine for the moment he had with his wife

  In a television interview following the stage, Bernard said the encounter with his loved ones had been a unique moment in his career and he had pushed hard earlier in the stage so he would have enough time to do so. "It was really incredible. My wife has been organising this with some friends for a few weeks now and she did a really, really good job," he said. "On a time trial, you have time to enjoy yourself. It's these moments that keep me going and cycling."
