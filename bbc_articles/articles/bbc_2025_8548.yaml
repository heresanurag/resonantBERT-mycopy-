title: 'Madeleine McCann suspect: Brückner faces a new unrelated charge - BBC News'
date: '2025-05-10'
section: Europe
url: http://www.bbc.co.uk/news/articles/c071err0079o
content: |-
  Christian Brückner is the prime suspect in Madeleine McCann's disappearance in Portugal in 2007.

  Christian Brückner was acquitted in 2024 of carrying out five offences in Portugal between 2000 and 2017

  The prime suspect in Madeleine McCann's disappearance faces a new unrelated charge, the BBC has been told. Christian Brückner is due in court next week accused of insulting a member of prison staff. The precise details of the allegation have not been made public. If found guilty, it could potentially extend his current jail term that is due to end in September, according to a court official. Brückner, 48, is behind bars in Germany for raping a 72-year-old American tourist in Portugal in 2005. He has never been charged in the McCann case and denies involvement.

  Three-year-old Madeleine McCann vanished from a holiday apartment in Praia da Luz, in Portugal's Algarve region, in 2007. It has become one of the highest-profile, unsolved missing person cases in the world. Brückner was not identified as a suspect in her disappearance until 2020. However, no charges have ever been brought against Brückner, in the McCann case, and the full details of the alleged evidence have never been released. A convicted child sex offender, Brückner is a German national who has a history of sex, forgery, drug, and theft offences. A drifter, he lived in Portugal's Algarve region, on and off, for years. Now prosecutors are working against the clock as Brückner is scheduled to walk free in September 2025. Investigators fear that Brückner, as a free man, will skip Germany and disappear. A ruling, last year, paved the way for his release when he was acquitted of five other sex offence allegations. In October 2024, judges cleared Brückner of three counts of rape and two counts of child sex abuse – charges dating back to between 2000 and 2017 in Portugal. Prosecutors have launched an appeal, but a decision on any potential retrial may yet take months. Brückner is due in court on Thursday morning in Lehrte, Lower Saxony, to face the charge of insulting a prison staff member, a court official told the BBC. If found guilty, Brückner could face either a fine or up to an additional year in jail. Interest in Brückner's legal battles continues to be high due to his name being linked, by the authorities, to the disappearance of Madeleine McCann. Prosecutor Hans Christian Wolters told the BBC he was aware of the upcoming, unrelated trial at Lehrte District Court, but that it is being handled by a different office. He also reiterated there are still no plans to charge Brückner over the McCann case. In 2020, Mr Wolters told the BBC the public would reach the same conclusion as his team had, about Brückner's alleged involvement, if they "knew the evidence we had". The BBC has approached Christian Brückner's legal team for comment.
