title: 'Pembrokeshire: Investigation into unexplained death of infant - BBC News'
date: '2024-10-18'
section: Wales
url: http://www.bbc.co.uk/news/articles/c1m94pzkee5o
content: |-
  The police received a call concerning the welfare of an infant on Friday afternoon.

  Police are investigating the death of an infant in Pembrokeshire.

  Dyfed-Powys Police attended a call from the Wales Ambulance Service Trust concerning the welfare of an infant at an address in Clynderwen at around 13:45 BST on 18 October.

  The infant died at the scene and the death is currently being treated as unexplained, police confirmed.

  Wales Air Ambulance Service were also called to the scene.
