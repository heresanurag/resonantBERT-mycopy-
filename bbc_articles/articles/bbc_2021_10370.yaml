title: 'Tokyo Olympics: Max Whitlock and Charlotte Worthington land gold on day nine
  - BBC Sport'
date: '2021-08-01'
section: Olympics
url: http://www.bbc.co.uk/sport/olympics/58045115
content: |-
  Charlotte Worthington wins a dramatic BMX park freestyle Olympic gold as Max Whitlock retains pommel horse title.

  This video can not be played To play this video you need to enable JavaScript in your browser.

  Max Whitlock retained his Olympic pommel horse title and Charlotte Worthington won a thrilling women's BMX park freestyle final to take Great Britain's gold medal tally to 10 in Tokyo on Sunday. Team GB also made history in the pool, clinching the men's 4x100m medley relay silver for their eighth swimming medal of the Games. Duncan Scott was part of a quartet including Adam Peaty, Luke Greenbank and James Guy who were pipped to the title by the USA. The 24-year-old, who signs off with a gold and three silvers, has now won more medals at a single Olympics than any other British competitor. In a dramatic BMX final, Worthington fell on her first run but landed a ground-breaking 360-degree backflip on her second to score 97.50. Declan Brooks then took bronze in the men's event to claim GB's fourth BMX medal.

  British boxer Ben Whittaker also guaranteed himself at least a silver medal by beating Imam Khataev, of the Russian Olympic Committee, to reach Tuesday's 81kg final. Pat McCormack will also fight for gold in the men's welterweight division after Ireland's Aidan Walsh pulled out of their semi-final with an ankle injury, while Frazer Clarke reached the super-heavyweight final after France's Mourad Aliev was disqualified. GB's sailing team have guaranteed two more medals to add to the bronze they have already won. John Gimson and Anna Burnet are second overall in the mixed Nacra 17 class with one race to go, while defending champion Giles Scott leads the men's Finn class and cannot now drop lower than third.

