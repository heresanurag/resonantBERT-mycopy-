  Meanwhile, American Xander Schauffele won the men's golf gold medal on a dramatic final day that saw Slovakia's Rory Sabbatini take silver and Taiwanese golfer CT Pan earn bronze in a seven-way play-off. Ireland's Rory McIlroy, Great Britain's Paul Casey and Japan's Masters champion Hideki Matsuyama made the shootout before Pan won it on the fourth play-off hole from American Collin Morikawa.

  In the men's tennis, Alexander Zverev won gold to become the first German player to win an Olympic title in the singles since Steffi Graf in 1988. He defeated Karen Khachanov of the Russian Olympic Committee 6-3 6-1. But it was heartbreak for Britain's men's hockey players, as they lost 3-1 to India in the quarter-finals.

