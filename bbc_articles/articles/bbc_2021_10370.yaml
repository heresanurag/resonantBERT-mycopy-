  Britain's eventers are well placed for team and individual success after impressive cross-country displays, with world number one Oliver Townend, Laura Collett and Tom McEwen leading the team event ahead of Australia and France. Townend tops the individual standings with Collett third and McEwen sixth. One round of showjumping at 09:45 BST on Monday will decide team medals, followed by the leading individual contenders jumping again at 12:45.

