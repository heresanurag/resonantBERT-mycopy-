  Showing the confidence that makes him the world's best, Whitlock went out first and delivered a near-perfect routine that earned him a score of 15.583. It was then a nervous wait for the the 28-year-old, but he had done enough to deliver his third career Olympic gold and second in the pommel horse. That, alongside two World Championship titles, makes him the all-time most successful gymnast in the event. He also becomes the seventh British competitor to win at least six Olympic medals, after Scott also achieved the feat in the pool earlier on Sunday. They pull level with Steve Redgrave and Charlotte Dujardin, while only Bradley Wiggins (eight) and Chris Hoy and Jason Kenny (both seven) have more. "I feel absolutely lost for words, I can't even describe the feeling and I feel completely overwhelmed - it feels surreal," said Whitlock. "Team GB have been doing absolutely incredibly. The gold medals have been flowing in and I just wanted to do the same thing. "To come out here and get my own, I feel very proud."

