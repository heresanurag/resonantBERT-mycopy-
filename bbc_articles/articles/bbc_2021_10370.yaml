  Worthington said she was trying to find a "big banger trick" to deliver Olympic gold but an unprecedented 360-degree backflip left her on the floor during run one. Undeterred, the 25-year-old went on to execute the move in her second run, becoming the first woman to land it in competition, and registering a score of 97.50. "It was incredible," said Worthington, who watched on as four rivals - including hotly tipped American Hannah Roberts - failed to usurp her mark. "I've not been doing that trick for so long but we've been trying to find that big banger trick and when we did we thought, 'this is the one'. If it wasn't for Hannah Roberts, we wouldn't be doing these tricks or be this far." It was the culmination of years of hard work for Worthington, who was a late convert to BMX and had been working as a chef "sweating it out in the kitchen for over 40 hours a week" before concentrating on the sport. "It's a lot of hard work paid off. On the bike, yes, it's physical hard work but I feel like the work on myself has paid off," she added. Having watched that drama unfold, Brooks added Britain's fourth BMX medal - after Bethany Shriever and Kye Whyte in the racing - to cap an incredible Games. "I've just cried for the last couple of minutes," 25-year-old Brooks told BBC Sport after his bronze was confirmed.

