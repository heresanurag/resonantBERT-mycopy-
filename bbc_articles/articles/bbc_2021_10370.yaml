  Earlier, Venezuela's Yulimar Rojas smashed the women's triple jump world record, which had stood since August 1995 - two months before she was born. With her final jump, and with gold already secured, she leapt 15.67m to smash the previous best by 17cm. "I'm lost for words, I can't describe this feeling and this moment," said the 25-year-old. "Gold medal winner, with an Olympic record, and a world record - wow. It is a fantastic night."

