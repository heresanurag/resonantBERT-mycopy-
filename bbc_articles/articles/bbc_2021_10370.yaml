  There was no shortage of drama at the Olympic Stadium on a night to remember for Italy. It started in the men's high jump, which saw Qatar's Mutaz Essa Barshim and Italy's Gianmarco Tamberi share the gold medal. After an exhausting two-hour competition, the pair couldn't be split, having recorded best clearances of 2.37m. They were offered an opportunity to take part in a jump-off, but in a moment of sportsmanship, they agreed to share the title. Soon after, Lamont Marcell Jacobs claimed a shock gold in the 100m final to make it two Olympic athletics titles in quick succession for Italy. Jacobs, who only switched away from long jump in 2018, streaked clear to win in 9.80 seconds, 0.04 clear of American Fred Kerley with Canada's Andre de Grasse taking bronze.

