  Regular visits to the podium at the Tokyo Aquatics Centre this Games have seen Britain establish themselves as one of swimming's powerhouses in Japan. They may still be a distant third on the medal table to the USA and Australia, but an eighth trip to the podium marks the nation's most successful Olympics in the sport. The American team needed a world record time of three minutes 26.78 seconds to beat the British quartet to the men's 4x100m medley relay title. But a silver medal rounded off a superb Games in the pool for Britain, who finish with four swimming golds, three silvers and a bronze - having earned a solitary gold at Rio five years ago. It also capped a record-breaking Olympics for Scott, whose four medals are record haul for a Briton at a single Games and take him to six overall. "I have a lot of good team-mates," Scott told BBC Sport. "I'm very fortunate to be part of some excellent relay teams." The US victory means American superstar Caeleb Dressel joins compatriots Michael Phelps, Mark Spitz and Matt Biondi, as well as East Germany's Kristin Otto, as the only swimmers to win five golds at a single Olympics. Meanwhile, Australia's Emma McKeon made history as the first female swimmer to win seven medals at an Olympics, claiming four golds and three bronze.

