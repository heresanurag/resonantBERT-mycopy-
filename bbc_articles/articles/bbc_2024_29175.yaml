  Who has made Troy's Premier League team of the week?

  After every round of Premier League matches this season, BBC football pundit Troy Deeney will give you his team and manager of the week. Here are this week's choices. Do you agree? Give us your thoughts using the comments form at the bottom of this page.

  Andre Onana (Manchester United): I know they drew, but he made some massive saves to keep them in the game at Ipswich. I think he is growing a lot.

  Aaron Wan-Bissaka (West Ham): He obviously got his goal but he was excellent defensively against Newcastle. He did brilliantly to shut down Anthony Gordon and there are really good signs of the guy that was signed for such big money from Crystal Palace all those years ago. Ben Davies (Tottenham): He was excellent against Manchester City. I, like many others, thought he would be the weak link against City, and expected Erling Haaland to get away from him and score. But that wasn't the case - he was excellent, excellent, excellent. Max Kilman (West Ham): He is growing week by week. An absolute monster. Pedro Porro (Tottenham): I'm not usually a big lover of this guy, I think he is a massive luxury. But defensively he was good and he had the goal and assist.

  Tomas Soucek (West Ham): Holding midfielder, he got the goal at Newcastle with a really good header. You could see this happening. It was miles better by West Ham. Mikel Merino (Arsenal): I would pick him as the other holding midfielder. He looks comfortable in the Premier League. He does a lot of the ugly stuff and passes the ball really well. James Maddison (Tottenham): I pick him as the 10. He got a couple of goals and was excellent. There was loads of pressure on him, lots of fans started to turn on him and he showed why we think so highly of him.

  Mohamed Salah (Liverpool): Obviously. He was a shining light at Southampton in what I thought was a bad game for Liverpool. He gets better and better and carries Liverpool through games sometimes. Matheus Cunha (Wolves): He is the reason they are going to stay up single-handedly. His goals and the manner of goals he scores are unbelievable. Nicolas Jackson (Chelsea): A goal and an assist at Leicester. He scored an unbelievable finish but I love his perseverance for the goal. He put so much pressure on.

  Ange Postecoglou (Tottenham): With all the pressure that is on him, no style of play change and he got back to what Spurs do. It was a massive 4-0 win at Manchester City.

