id: bbc_2023_16236
title: Night-time footage of raid targeting animal traffickers - BBC News
date: '2023-10-19'
section: General
url: http://www.bbc.co.uk/news/world-europe-67159848
content: |-
  More than 400 animals, mainly cats and dogs, were seized from a trafficking network in Spain.

  Infrared footage has been released showing the moment officers detained suspects linked to a huge animal smuggling ring.

  It was part an operation that saw more than 400 animals, mainly cats and dogs, seized from a trafficking network in Spain in September.

  Pet shops, veterinary centres and homes were raided and 13 people were arrested on charges including animal abuse, fraud and money laundering.

  The gang is suspected of illegally importing animals into Spain from eastern Europe via Andorra, before selling them on to make a profit.
