id: bbc_2020_13370
title: Injured military dog Kuno given 'animal Victoria cross' - BBC News
date: '2020-11-24'
section: General
url: http://www.bbc.co.uk/news/uk-55063866
content: |-
  Kuno lost a paw after being hit by bullets in Afghanistan and is now being honoured for his bravery.

  A military dog who served alongside British soldiers in Afghanistan has been awarded the animal equivalent of the Victoria Cross.

  During a raid, Kuno charged through enemy gunfire and tackled a gunman to save the lives of British soldiers fighting al-Qaeda. He was hit by bullets in both back legs, and lost one of his paws, becoming the first UK military dog to get custom-made prosthetics.

  The four-year-old has been given the Dickin Medal from vet charity the PDSA.
