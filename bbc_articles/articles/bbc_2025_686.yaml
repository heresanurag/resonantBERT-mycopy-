id: bbc_2025_686
title: Bodycam footage shows man being rescued from burning flat - BBC News
date: '2025-02-11'
section: General
url: http://www.bbc.co.uk/news/videos/c9376wgprx9o
content: |-
  Officers forced their way into the flat and rescued a disabled man from the blaze.

  Footage of the moment a disabled man was saved from a fire has been released by police.

  Officers forced their way into the flat in Radford Road, Nottingham, where they found a "severely bedbound" man in his 60s resting next to a bedroom table that was on fire, police said.

  PC Jak Walker and PC Aaron Mulcahy used buckets of water to put out the flames and then ventilated the property.

  The man was taken to the Queen’s Medical Centre but was not seriously injured in the 7 November fire, which police said was caused by a cigarette.

  Sgt Dean Reynolds, based at Radford Road Police Station, said: “If it wasn’t for the quick-thinking actions of these two police officers there is no doubt that the man would have died."
