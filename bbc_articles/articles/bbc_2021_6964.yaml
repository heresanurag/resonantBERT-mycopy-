title: 'Covid: Welsh government update 25 June 2021 - BBC News'
date: '2021-06-25'
section: Wales
url: http://www.bbc.co.uk/news/live/uk-wales-57600319
content: |-
  First Minister Mark Drakeford confirmed lockdown rules would remain in place at Friday's briefing.

  People living in Wales who have received the Covid vaccine will be able to access their vaccination status online from today to generate an NHS Covid Pass for urgent outbound international travel.

  Digital passes showing proof of vaccination can be downloaded for display on a person's phone, tablet or laptop.

  Paper vaccine certificates have been available in Wales since May for those who need to urgently travel internationally and provide proof of their vaccination status, with certificates being sent in the post.

  The Welsh government is advising people to register to download the digital pass at least two weeks before they are due to travel abroad.

  People are reminded to check entry requirements for the destination country, and to follow travel rules such as pre-departure testing.

  Health Minister Eluned Morgan said she was "pleased that people in Wales can now access their vaccination status via the NHS Covid Pass if they need to travel urgently and have completed their vaccine course".

  “It’s important to remember that the Welsh Government advice on travel hasn’t changed, and people should only consider international travel if absolutely essential,” she added.

  Work is ongoing to allow people in Wales to use England’s NHS App to show proof of their vaccination status.
