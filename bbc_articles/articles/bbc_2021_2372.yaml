content: |-
  How are families spending their time with the February half-term break under way?

  Homeschooling has been paused for the half-term holiday in Northern Ireland.

  But for those navigating school days at the kitchen table, it'll be a week off that may look very similar to a week on.

  So how are we managing mid-term when tight coronavirus restrictions are in place?

  BBC News NI speaks to families about their plans.
