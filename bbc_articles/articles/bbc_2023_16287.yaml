content: |-
  Emergency crews sprang into action as the plane skidded along the tarmac in the US state of Tennessee.

  Emergency teams sprang into action as a FedEx plane skidded across the tarmac at Chattanooga Metropolitan Airport, in the US state of Tennessee.

  They praised the crew for pulling off the landing and avoiding a “disaster”. The plane’s landing gear was not working, according to the Hamilton County Emergency Medical Services.

  No-one was seriously injured.
