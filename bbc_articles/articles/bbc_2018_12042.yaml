title: 'Brexit: David Davis calls for cabinet rebellion over PM''s plan - BBC News'
date: '2018-10-14'
section: UK Politics
url: http://www.bbc.co.uk/news/uk-politics-45853384
content: |-
  The former Brexit secretary says Theresa May's plans will prevent the UK striking new trade deals.

  David Davis has been a persistent critic of the PM's plans since quitting in July

  Cabinet ministers should "exert their collective authority" and rebel against Theresa May's proposed Brexit deal, ex-Brexit Secretary David Davis has said.

  The prime minister has suggested a temporary arrangement for the whole UK to remain in the customs union while the Irish border issue is resolved.

  Brexiteers fear this may be indefinite, limiting the ability to do trade deals.

  But Health Secretary Matt Hancock said there were "different ways" to ensure any commitments were time-limited.

  Asked whether any deal would include a date at which the UK would no longer be bound by the rules of the customs union, he told the BBC's Andrew Marr show, "I certainly hope so".

  "There are different ways you can make sure something is credibly time-limited and that is what I want to see ", he said.

