title: 'Ukraine war: Demonstrator disrupts Russia''s flagship evening news broadcast
  - BBC News'
date: '2022-03-15'
section: General
url: http://www.bbc.co.uk/news/world-europe-60745212
content: |-
  Russia's flagship evening news broadcast on Channel One has been disrupted by an anti-war demonstrator.

  The placard she held read: “Stop the war, don’t believe propaganda, they’re lying to you”.

  The demonstrator, identified as Marina Ovsyannikova, reportedly an editor at Channel One, also released a statement on her actions.
