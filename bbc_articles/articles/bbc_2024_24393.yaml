content: |-
  England go down to their worst defeat under Brendon McCullum as Pathum Nissanka’s magnificent century guides Sri Lanka to a famous win at The Kia Oval.

  This video can not be played To play this video you need to enable JavaScript in your browser.

  Third Test, The Kia Oval (day four of five)

  England went down to their worst defeat under Brendon McCullum as Pathum Nissanka's magnificent century guided Sri Lanka to a famous win at The Kia Oval. England had the opportunity to earn a 100% home summer record for the first time in 20 years but instead paid the price for a careless display. Though Sri Lanka lose the series 2-1, this ends a 10-match winless streak against England and, realistically, gives a measure of success to what was always likely to be a tough tour. Below-par displays on days two and three left England up against it at the beginning of day four, when Sri Lanka resumed on 94-1, needing another 125 to reach their target of 219. Kusal Mendis was bounced out for 39 by Gus Atkinson thanks to Shoaib Bashir's brilliant catch. Another 111 runs were still required, but any England hope was snuffed out by the composure of Nissanka and Angelo Matthews. Nissanka had already passed three figures when Bashir missed a half-chance to catch him at third man. By then, the game had gone. Nissanka ended unbeaten on a quite brilliant 127, Mathews on 32. Their unbroken partnership of 111 gave Sri Lanka victory by eight wickets and only a fourth Test victory in this country. England end the summer with series wins against West Indies and Sri Lanka, though also with a sense of what might have been. Their next Test series, in Pakistan, begins in less than a month, albeit with doubts over the schedule because of renovation works at a number of venues in the country. An unrelenting international calendar continues on Wednesday when an almost entirely separate England squad begins a T20 series against Australia in Southampton.

  This video can not be played To play this video you need to enable JavaScript in your browser. Pope 'disappointed' in defeat but proud of summer results

  This was a low-key end to England's summer of evolution. On a grey day in front of a meagre crowd, England did not have the potency to halt the determined Sri Lankans. Much has been made of the changes England have made, pretty much all of them necessary and most with success. Jamie Smith, Atkinson and Bashir have a foundation to build towards the Ashes in 2025-26. To go with the new personnel, injuries to Ben Stokes, Zak Crawley and Mark Wood meant only four of this England XI survived from their previous Test at The Oval, against Australia last year. If this adds a hint of mitigation for England's failure to secure a second successive 3-0 clean sweep, there are few excuses for the way the hosts frittered away this Test.

