  From 261-3 in the first innings, they collapsed to 325 all out. On the second evening they were happy to give Sri Lanka some low-pressure runs against spin, when a more sensible option would have been to bowl pace to bring the close because of bad light. The way England batted to be 156 all out in only 34 overs in their second innings was amateurish. It is difficult to win every Test in a home summer. In seasons of five Tests or more, England have only done it on two previous occasions though, with respect to Sri Lanka and previous opponents West Indies, they should have done it this time. This is only the ninth Test England have lost since McCullum became head coach and comes in the week he also took over the white-ball team. Defeats can be accepted but, given the opposition and the manner, this should give England pause for thought.

  This video can not be played To play this video you need to enable JavaScript in your browser. Nissanka hits the winning runs as Sri Lanka win by eight wickets

  This target could have been problematic for Sri Lanka, only for Nissanka to attack on the third evening and take a chunk out of the chase. By the time he resumed on 53 on Monday, he had become the first batter to make two half-centuries at faster than a run a ball in the same Test in England. The home side needed early wickets and Atkinson, battling a quad injury, was fit to bowl. In the fifth over the day, Mendis hooked to fine leg where Bashir took a superb diving catch. The door was open. Swinging the ball under lights, Chris Woakes tested new man Angelo Mathews, repeatedly going past the outside edge. Mathews survived, Nissanka remained and England's weapons were neutralised. Debutant left-armer Josh Hull and off-spinner Bashir could provide neither control nor threat, while Nissanka tucked in when Olly Stone was too short. Nissanka reached his second Test century, off 107 balls, with a back-foot punch off Atkinson and the game was within Sri Lanka's grasp. England had one more chance to remove Nissanka, via a cut at a Stone bouncer, only for the ball to fall through the hands of the diving Bashir at third man. Still, by then England were already beaten and was fitting that Nissanka hit the winning runs, cutting Bashir for four.

