  Flight MH370 took off from Kuala Lumpur in the early hours of 8 March 2014. It lost communication with air traffic control less than an hour after take-off and radar showed that it deviated from its planned flight path. Investigators generally agree that the plane crashed somewhere in the southern Indian Ocean - though it is unclear as to why it happened. Pieces of debris, believed to be from the plane, have washed up on shores of the Indian Ocean in the years after the disappearance. A host of conspiracy theories have sprouted up around the aircraft's disappearance, from speculation that the pilot had deliberately brought down the plane to claims that it had been shot down by a foreign military. A 2018 investigation into the aircraft's disappearance found that the plane's controls were likely deliberately manipulated to take it off course - but drew no conclusions about who had been behind it. Investigators said at the time that "the answer can only be conclusive if the wreckage is found".
