title: Thailand closes land crossings during border dispute with Cambodia - BBC News
date: '2025-06-24'
section: Asia
url: http://www.bbc.co.uk/news/articles/c2ezgjlzggyo
content: |-
  Thailand has banned land travel into Cambodia as the two countries remain locked in a bitter dispute.

  Tourists in Thailand will not be allowed to enter Cambodia after heightened restrictions at checkpoints

  Thailand has imposed restrictions on citizens and tourists heading into Cambodia via land, as the two countries remain locked in a bitter border dispute. The measures apply to vehicles or people trying to cross into Cambodia through checkpoints from several Thai provinces. Foreign tourists are also banned from leaving Thailand for gambling in border towns, and those traveling by air to Siem Reap in Cambodia for gambling will also face restrictions. Bilateral relations between the two countries are at their worst in more than a decade, after armed clashes along the border in May left one Cambodian soldier dead.

  The military said in a statement on Monday that the new restrictions "matched the current security situation". Since May, the two countries have imposed punitive measures on each other. Cambodia has banned imports from Thailand, ranging from fruit and vegetables to electricity and internet, as well as Thai dramas and films. Exemptions to the latest travel ban may be granted on humanitarian grounds - such as for students or medical patients - at the discretion of officials at the checkpoints, Thai authorities said. The restrictions would also help to counter illegal scam operations in Cambodia, according to the military. On Monday, Thai Prime Minister Paetongtarn Shinawatra vowed to crack down on scam operations in Cambodia, with measures including suspending internet services used by Cambodian security agencies. Thailand previously implemented similar measures on neighbouring Myanmar, which is also home to thriving scam networks that have entrapped thousands of foreigners. The dispute between Thailand and Cambodia has plunged Paetongtarn Shinawatra's government into the throes of a political crisis, after a leaked phone call between her and Cambodia's strongman ex-leader Hun Sen. In the phone call, Paetongtarn was heard calling him "uncle" and telling him to ignore a Thai military commander who "just wanted to look cool". Paetongtarn defended her demeanour as a "negotiation technique", but critics said she undermined Thailand's politically influential army. A key coalition partner of her Pheu Thai party has since left the alliance. Tensions between the two countries date back more than a century, when the borders were drawn after the French occupation of Cambodia.
