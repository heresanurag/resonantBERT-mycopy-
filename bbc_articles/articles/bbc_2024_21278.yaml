  They also revealed that the main suspect - an Austrian citizen who was born there but who had Macedonian parents - had recently changed his appearance and "adapted it to Islamic State propaganda", and had been consuming and sharing Islamist propaganda online. A second suspect - a 17-year-old Austrian of Turkish or Croatian heritage - was employed at a company which would have "provided services" at the stadium where Swift was to perform. The 19- and 17-year-olds have been remanded in custody. A 15-year-old, who was "in the area" of the stadium at the time, is being questioned. Despite officials saying that they were not looking for any more suspects, a third - an 18-year-old Iraqi citizen - was arrested in Vienna on Thursday evening, Interior Minister Gerhard Karner said. The man is also believed to have sworn an oath of allegiance to IS. Speaking at the briefing on Thursday, Mr Karner said "a tragedy was averted", and the attack was foiled with the help of international intelligence as Austrian law does not allow censorship of messenger applications.
  • None Defiant Swifties take to streets after Vienna plot

  "The terrorist threat has intensified throughout Europe and Austria was and is no exception," he said, adding that major concerts are "often a favourite target of Islamist attackers". Coldplay are due to perform seven concerts in Vienna from 21 August as part of their Spheres World Tour. Mr Haijawi-Pirchner said there was no information suggesting a specific threat to upcoming events in Austria, but security measures remain high. Swift's Vienna concerts were part of the European leg of her Eras Tour, which began in Paris in May. The tour has made stops in a number of countries including Sweden, the UK, Ireland, the Netherlands, Italy, Germany and Poland. Swift is set to head to London to perform five shows at Wembley Stadium next week. UK policing minister Diana Johnson said Scotland Yard would look at intelligence ahead of the Wembley Stadium dates. London Mayor Sadiq Khan has told Sky News that the city will "carry on" and that the police will work with City Hall and councils to ensure the concerts take place safely. Correction 3 September 2024: This article was amended after we mistakenly said the main suspect's parents were North Macedonian. This has been changed to say that they are Macedonian.
