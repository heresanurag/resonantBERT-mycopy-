title: 'John Cooney: Family ''devastated'' at loss of boxer - BBC News'
date: '2025-02-11'
section: Northern Ireland
url: http://www.bbc.co.uk/news/articles/cn8yn64xlpwo
content: |-
  The family of a man who died a week after a title fight in Belfast say they are "touched" by condolences.

  This video can not be played To play this video you need to enable JavaScript in your browser. Cousin Julieanne Acciaressi and aunt Georgina Ivors spoke at the Ulster Hall

  The family of the boxer who died a week after a title fight in Belfast has said they are "just devastated". Irish boxer John Cooney, 28, suffered an intracranial haemorrhage and had surgery to relieve pressure on his brain following the bout at the Ulster Hall. His death was announced on Saturday. Speaking at the Ulster Hall, where a book of condolence has opened, his aunt Georgina Ivors said: "The people are just amazing and we're very touched." The family also thanked the staff at the Royal Victoria Hospital in Belfast.

  Mr Cooney's manager Mark Dunlop said he "can't blame anybody"

  His cousin, Julieanne Acciaressi, said: "He fought hard all week and they were fantastic." Speaking to BBC News NI, Mark Dunlop, Mr Cooney's manager said he "can't blame anybody" and Mr Cooney's family "don't blame anybody". "They loved their son and they came up here to support him," he added. "It's devastating, it's just surreal that we are coming here to pay our respects to a guy that was like a family member to me. "Really we shouldn't be here mourning him, we should really be celebrating him," Mr Dunlop said. "John knew the dangers, the family know the dangers... everyone involved in boxing know that it carries a risk. "But if you look at the worldwide boxing scene, the number of fatalities is minute". Mr Dunlop said he will remember Mr Cooney for his "cheeky smile", his "dedication" and how he "lived" for the sport. "It will take me my lifetime to forget him, he is now up there with the greats," he added.

  Mr Cooney passed away a week after a title fight in Belfast

  Northern Ireland's Sports Minister Gordon Lyons described what had happened as a "tragic event". He paid tribute to Cooney in the Stormont Assembly, saying his thoughts were with his friends, family and all those in the boxing world who knew and loved him. "I want to commend the medical team at the Ulster Hall and all of the staff at the Royal Victoria Hospital for their work," he added.

  A book of condolence is open at The Ulster Hall until 21:00 GMT on Monday

  Former double WBO European champion Conrad Cummings said Cooney's fellow boxers were "absolutely devastated" by his death. "It's a big blow to the boxing community and he'll be remembered greatly for the champ that he was," he said. A statement from the Ulster Hall said: "We're sending heartfelt condolences to John Cooney's family and friends and the wider boxing community." Belfast boxer Anto Cacace, the IBF world super-featherweight champion, told BBC News NI that Cooney was a "credit to the sport of boxing". "He was an up-and-coming star on the Irish and British boxing scene with talent in abundance." The governing body of professional boxing in the UK, the British Boxing Board of Control said it was "deeply saddened to learn of the tragic passing of John Cooney". Tributes were also paid from Cooney's native city. In a statement, Galway Amateur Boxing Association said the announcement of his death was "the worst possible news" following a "torturous week" in hospital. The book of condolence will remain open until 21:00 GMT on Monday.
