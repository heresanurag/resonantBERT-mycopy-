content: |-
  As the president hosted the parade to mark 250 years of the US Army, anti-Trump protests took place throughout the US.

  Washington DC celebrated the US Army's 250th birthday with a military parade, which coincided with President Donald Trump's 79th birthday. The event featured thousands of soldiers, an array of tanks, dozens of aircraft and other military vehicles.

  This is the first military parade on US soil since 8 June 1991, which celebrated the end of the Gulf War.

  On the same day, 'No Kings Day' protests against Trump took place in cities across the US. Some protests in Minnesota, though, were called off after the assassination of a Democratic lawmaker.
