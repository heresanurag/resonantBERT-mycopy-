title: 'Kelly Mary Fauvrelle: Man filmed running from killed woman''s home - BBC News'
date: '2019-07-03'
section: General
url: http://www.bbc.co.uk/news/uk-england-london-48851369
content: |-
  Kelly Mary Fauvrelle was eight months pregnant when she was stabbed to death on Saturday.

  Footage of a man seen running away from a house where a heavily pregnant woman was stabbed to death in south London has been released by police.

  The CCTV, recorded on two cameras, shows a figure walking towards Kelly Mary Fauvrelle's Croydon home at about 03:15 BST on Saturday, then running away just over 10 minutes later.

  Ms Fauvrelle, 26, died at the scene. Her baby was delivered by paramedics but died in the early hours of Wednesday.

  Det Ch Insp Mick Norman said officers "need to identify the man shown in the images urgently, even if only to eliminate him from our inquiries".
