title: Inflation falls to 4.6% as government says pledge met early - BBC News
date: '2023-11-15'
section: UK
url: http://www.bbc.co.uk/news/live/uk-67423724
content: |-
  The government pledged to halve inflation in 2023, from a figure of 10.7% at the end of 2022.

  That's it for today's live page on inflation, brought to you by James FitzGerald, Owen Amos and me.

  If you'd like to brush up more on inflation - and frankly, why wouldn't you? - here's our explainer on what it is and how it affects your everyday life.

  Or if you'd like to work out what the new inflation figure means for your household finances, the BBC and the ONS have put together a calculator to help you.

  And finally, check out today's report on inflation - with more reaction to today's figure and an overview of what it could mean for the future. As to whether the government can claim credit - there's more here.

  See you next time.
