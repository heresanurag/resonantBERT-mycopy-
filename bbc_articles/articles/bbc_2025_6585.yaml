  I want Arsenal to win it and they are certainly capable of going all the way. They will be favourites now, after going to the Bernabeu and beating Real Madrid, but there is something about Inter Milan that worries me. The way they defend makes me think they have a real chance too. It is still so open, though, and I can't even call either semi-final right now, let alone the final - it's too hard to say who will win it with any certainty.

  As I look at the two ties left now, I think it's going to be one of the first-time winners, so either Arsenal or PSG, whoever comes through their semi-final. That's a shame for one of them because they are the two best teams in the competition. It's very hard to choose between the two but I am going to go for Arsenal. Beating Real Madrid, even if this isn't the best version of Real Madrid is one thing, but to go to the Bernabeu with all the talk about a comeback and be so robust, showed they have what it takes. Overall, in terms of how they are prepared to defend and suffer, and still have a threat in attack, I would argue they are the most complete team left in the competition.

