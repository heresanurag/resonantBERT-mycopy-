title: 'Champions League 2025 winner predictions: Who do BBC Sport pundits and journalists
  think will win? - BBC Sport'
date: '2025-04-16'
section: Champions League
url: http://www.bbc.co.uk/sport/football/articles/c367kj3lrd6o
content: |-
  BBC Sport predict who will win the 2024-25 Champions League as Arsenal, Barcelona, Paris St-Germain and Inter Milan book their semi-final spots.

  The Champions League final takes place in Munich on 24 May

  Arsenal, Inter Milan, Barcelona and Paris St-Germain have booked their spots in the semi-finals of this season's Champions League. Now the final four has been decided, it's time to have a look at who could lift the trophy in Munich next month. BBC Sport journalists and pundits have had their say - and PSG appear to be the favourites. Who do you think will come out on top? You can vote for your winners below.

  They have everything. Control, structure, counter, quality, a player of genius but submitted to the group, they all think the same way. The only way to beat them is if they have to defend a lot in their own box. Barcelona could do that. If that's the final, it's a final for our times. Two Pep Guardiola disciples showing where football is going.

  I went for them at the start of the competition – admittedly because I wanted someone different to win it – and I am not going to change now. They are durable defensively, creative in midfield and have the X-factor in attack. They have not won the trophy since Lionel Messi's time. They will do this season.

  On the evidence of Arsenal's brilliant win over two legs against holders Real Madrid it will be a classic Champions League semi-final against PSG - but I am going with the best team I've seen in the competition this season. PSG wobbled against Aston Villa in the second leg, but they have a strong team - with emphasis on team - and a world-class attack in the shape of Ousmane Dembele, Khvicha Kvaratskhelia and a choice of brilliant teenager Desire Doue or Bradley Barcola.

  I know Arsenal have been very impressive against Real Madrid but the team who appear to have gone under the radar to reach the semi-finals for me are Inter Milan. The Italian champions have the best defensive record in the competition, nobody has kept more clean sheets than keeper Yann Sommer. They have a solid platform and a real goal threat in Lautaro Martinez. It's the second time in three seasons Inter have reached the semi-finals and I just think they could prove to be stubborn opposition for Barcelona.

  It's easy to change opinion once you get through another set of games but I'm going to stick with my gut feeling of PSG to win the competition. I think they've been standout performers all the way through. They had a real tough spell at Aston Villa and they survived. This side has a grit about it that I've not seen in any other PSG team.

  I'm going with Arsenal as Mikel Arteta's side have faced a lot of adversity this season and have found their stride in the Champions League. Defensively, they are excellent and with the attacking threat of Bukayo Saka, the Gunners have the quality to hurt any team left in the competition.

  Luis Enrique has built a team without egos, without the stardust, but look stronger for it. Lionel Messi, Neymar and Kylian Mbappe have gone - but this new-look PSG side represents a triumph for work ethic, togetherness and structure. They made Liverpool look mere mortals over two legs in the last 16 - that's no mean feat. Expect the Parisians to lift their first Champions League.

  I think they are such a well-balanced team. They've got rid of all the big hitters now. They've got Ligue 1 wrapped up already so they can concentrate on the Champions League and they just ooze class and quality.

