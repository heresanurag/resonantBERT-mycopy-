title: Wallace and Gromit creator reacts to Feathers McGraw tattoo trend - BBC News
date: '2025-02-23'
section: General
url: http://www.bbc.co.uk/news/videos/cwyjly7r984o
content: |-
  Nick Park describes fans having tattoos of Wallace and Gromit characters as "an accolade".

  Wallace and Gromit creator Nick Park has described the trend of fans getting Feathers McGraw tattoos as an "accolade".

  The Oscar-winning filmmaker's comments came at a ceremony unveiling a new 4ft (1.2m) sculpture of the villainous penguin in his home city of Preston, Lancashire.

  Speaking to the BBC, Park said people had been getting tattoos of Wallace and Gromit characters for "quite a while now", while joking that the craze was "unnerving".

  He added: "It's great to have people who love the characters so much that they would actually want it on their body forever."
