title: 'Alaska: Moment house collapses into river during flood - BBC News'
date: '2023-08-07'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-66426385
content: |-
  Glacial floods in Juneau, the capital of Alaska, caused a house to collapse into the Mendenhall river.

  A house has fallen into the Mendenhall river in Alaska's capital, Juneau after record glacial flooding in the city.

  The subsidence prompted city officials to issue evacuation orders for residents on one street.

  Glacial flooding occurs when trapped water makes its way through thinning ice.
