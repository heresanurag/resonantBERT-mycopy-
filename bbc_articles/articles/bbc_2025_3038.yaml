  Friday's ruling by Judge Nichols came in response to an emergency petition by the American Foreign Service Association and American Federation of Government Employees - two unions representing employees of the agency. During the hearing, Judge Nichols - who was nominated by Trump during his first term - did not seem likely to grant other requests as part of the lawsuit, including to restore grants and contracts or reopen USAID buildings. The legal action argued that the president was violating the US Constitution and federal law by attempting to dismantle the agency. "Not a single one of defendants' actions to dismantle USAID were taken pursuant to congressional authorization," it said. "And pursuant to federal statute, Congress is the only entity that may lawfully dismantle the agency." Representing the Trump administration, justice department official Brett Shumate told the judge that the president "has decided there is corruption and fraud at USAID".

  Hours after Trump took office on 20 January, he signed an executive order halting all foreign assistance until such funds were vetted and aligned with his "America First" policy. That led to a stop work order at USAID, which runs health and emergency programmes in around 120 countries, including in the world's poorest regions. "USAID IS DRIVING THE RADICAL LEFT CRAZY," Trump posted on his Truth Social platform. "THE CORRUPTION IS AT LEVELS RARELY SEEN BEFORE. CLOSE IT DOWN!" But Samantha Power, who was USAID chief under former President Joe Biden, wrote in a scathing New York Times opinion piece: "We are witnessing one of the worst and most costly foreign policy blunders in US history." The US is by far the biggest single provider of humanitarian aid around the world. USAID's budget amounts to around $40bn - about 0.6% of total US annual government spending of $6.75tn. The head of the United Nations' programme for tackling HIV/AIDS told the BBC the cuts would have dire impacts across the globe. "AIDS related deaths in the next five years will increase by 6.3 million" if funding is not restored, UNAIDS executive director Winnie Byanyima said.
