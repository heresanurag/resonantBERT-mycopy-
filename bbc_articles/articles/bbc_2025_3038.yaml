content: |-
  A last-minute lawsuit means Trump's efforts to dismantle the overseas aid agency have been put on hold.

  Judge blocks Trump plan to put thousands of USAID staff on leave

  A judge has temporarily blocked President Donald Trump from placing 2,200 workers at the US Agency for International Development (USAID) on paid leave, hours before it was due to happen. Judge Carl Nichols issued a "limited" temporary restraining order,, external in response to a last-minute lawsuit filed by two unions trying to save the agency. The order will remain in place for a week, until 14 February at midnight. Trump has argued that USAID, the overseas aid agency, is not a valuable use of taxpayer money and wants to dismantle it - with plans to put nearly all of the agency's 10,000 employees on leave, except 611 workers.

  Some 500 staff had already been put on administrative leave and another 2,200 were due to join them from midnight on Friday (05:00 GMT). But the last-minute lawsuit on Friday argued the government was violating the US Constitution, and also that the workers were suffering harm. Judge Nichols sided with the unions, saying they would suffer "irreparable harm" if the court did not intervene, while there would be "zero harm to the government". The order also reinstates the 500 staff already placed on administrative leave. "All USAID employees currently on administrative leave shall be reinstated until that date, and shall be given complete access to email, payment, and security notification systems until that date, and no additional employees shall be placed on administrative leave before that date," Nichols wrote. The judge will also consider a request for a longer-term pause at a hearing on Wednesday. It is unclear from the court order what will happen to the agency's remaining staff. As the ruling came, officials had been removing and covering USAID signs at the organisation's headquarters in Washington DC. The agency's website, external is also inaccessible, leading only to a landing page about the personnel cuts.

  USAID is the world's biggest aid donor - with much of its budget spent on health programmes around the world. Two-thirds of its 10,000 staff work overseas. It is one of many federal agencies his administration is targeting as it works to slash federal spending in the US. The Republican campaigned on overhauling the government and formed an advisory body named the Department of Government Efficiency (Doge) - led by tech billionaire Elon Musk - to slash the budget.

