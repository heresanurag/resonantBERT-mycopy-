title: 'Australian election 2022: Anthony Albanese leads Labor to victory - BBC News'
date: '2022-05-21'
section: Australia
url: http://www.bbc.co.uk/news/live/world-australia-61532469
content: |-
  Anthony Albanese will be the new PM after Scott Morrison's coalition fails to win enough seats.

  Morrison took to the stage amid chants of "Scomo, Scomo" Image caption: Morrison took to the stage amid chants of "Scomo, Scomo" More on Morrison's concession speech - he said he was quitting as the leader of the Liberals, following their unsuccessful outing at the polls. Morrison, who led the country through bushfires and a pandemic, also gave thanks for "the miracle of the Australian people". "What Australians have endured over these past few years has shown a tremendous depth of character and resilience and strength," he said. "It has been the Australian people under the strong support of a strong government that's enabled all of us to come through to where we are today, and that's something that all Australians can give thanks for as we move forward.” He added that his party was handing over a country that was "in a stronger position... than we inherited it when we came to government those years ago under Tony Abbott". “We leave government having secured our borders many years ago. And we leave government having restored our nation's defences.” A huge roar - the biggest of the night - erupted as Morrison ended his speech saying he "looks ahead to victory" in the next election, reports the BBC's Phil Mercer who was at the scene. Morrison was mobbed by television crews as he left the stage.
