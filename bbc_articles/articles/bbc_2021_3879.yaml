content: |-
  Details and reaction as First Minister Mark Drakeford outlines changes to lockdown rules in Wales.

  Wales' first minister said he did not “change” his mind on the timetable for reopening non-essential retail.

  Mark Drakeford said at the last lockdown review that discussions would be had with the sector “to see how we might begin” the reopening of shops.

  “Three weeks ago I said that I hoped today we would be able to begin to reopen non-essential retail and that is exactly what we have been able to do,” he said.

  “Supermarkets and other shops that are already open will from the 22nd of March be able to sell the full range of essential and non-essential goods.

  “For many people that will mean that they will be able to purchase things that they’ve had to manage without for many, many weeks.

  “Those shops who are not already open will now have a definite timeframe to do all the things that they will need to do in order to be able to reopen successfully.

  “People need to be able to bring staff back from furlough, they need to be able to restock so that they can open with their shelves with things on them for people to buy, they will need to demonstrate that they are able to meet the new standards, the legally required standards that we have put in place here in Wales in response to the new variant of coronavirus,” he added.
