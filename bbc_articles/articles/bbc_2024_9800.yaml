  The questions about how the sport might look in future come at a time when Great Britain are enjoying success on the slopes, with Ryding saying the next 20 years "looks really good" for the team, particularly in slalom. Ryding has finished on the podium in a World Cup race at least once in the past four seasons, securing his seventh this season with a third-place finish in Madonna di Campiglio, Italy in November. He finished a career-best joint seventh in the overall slalom standings in his 15th World Cup season. The success has come despite a cut in funding for the British alpine team by UK Sport following the 2022 Winter Olympics in Beijing for the next four-year Olympic cycle. Ryding and the others set up crowdfunding to continue their careers and are paying back their supporters with results. Slalom team-mates Billy Major, 27, and Laurie Taylor, 28, have also enjoyed their best results this season - while behind them is Olympic Youth champion Zak Carrick-Smith - and Ryding thinks the team are proving they are "100% investible again". "I never looked back with 'what ifs' but, certainly, I'm out there to prove myself and to prove those people wrong, whether they deemed me unfundable," he said. "I really want to prove them wrong, to keep trying to show that I am worthy and I am still capable of doing these great results even though I am 37 now." And how is even he managing that at 37? "I don't really know, but I guess it's something in the Northern grit," said Ryding, who is from Chorley, Lancashire. "And just staying motivated, keeping on top of my body health-wise and I've done that for 20 years now, so maybe that's paying off more so than, say, other athletes that haven't taken care of themselves over the years as well as I have."

  Ryding, who has competed at four Winter Olympics, has previously said he wanted to "shrivel up and cry" if he thought about training for another Olympic cycle. But with less than two years before the Milan-Cortina 2026 Games, he strikes a very different note. "I've got over the hump now of the Olympic cycle," he said. "I've done two years, it's actually less than two years now to the Olympics. I'm still able to do seasons that are better than ever I've ever done before. "If everything goes to plan, I'll be there."
