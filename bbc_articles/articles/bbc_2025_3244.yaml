title: Plastic surgeon Jonathan Peter Brooks tried to kill colleague, court told -
  BBC News
date: '2025-03-10'
section: Nottinghamshire
url: http://www.bbc.co.uk/news/articles/c3d8nymg12zo
content: |-
  The defendant has denied the attempted murder of Graeme Perks in Halam, Nottinghamshire.

  Jonathan Peter Brooks did not appear in court for the trial

  A plastic surgeon broke into the house of a colleague before pouring a "highly flammable liquid" over the floor and stabbing him, a trial has heard. Jonathan Peter Brooks is accused of attacking Graeme Perks at his home in Halam, Nottinghamshire, on 14 January 2021. A trial at a court in Loughborough was told Dr Brooks "hated" Mr Perks, who was a witness in disciplinary hearings against him. The 61-year-old has denied two counts of attempted murder, one of attempted arson with intent to endanger life and one count of possession of a bladed article.

  The court heard the defendant - who despite being a surgeon had asked to be referred to as Dr Brooks, against usual conventions - is a consultant surgeon with a specialisation in burns and plastics, and was a colleague of Mr Perks. Tracy Ayling KC, opening the prosecution, said he left his house on his bicycle "in the early hours of a cold snowy morning" and went to his colleague's home. "The defendant was dressed in full camouflage jacket, trousers and hat," she said. "He had a head torch. He got on his bike armed with a crowbar, cans of petrol, matches and a knife. "His intention was, say the Crown, to break into Mr Perks's house, set fire to it and if necessary, stab Mr Perks. "In short, he intended to kill Mr Perks by either or both those means." Ms Ayling said Mr Perks was woken by the defendant breaking in through the conservatory and initially mistook the defendant for his son. She said Dr Brooks stabbed him in the abdomen and, having already spread the liquid around the ground floor of the house, he "made his escape". Mr Perks's wife and son "raised the alarm" after being woken, and he was transferred to hospital where he underwent surgery and was not discharged for more than a month. "Because of quick action and amazing surgical skill, [Mr] Perks lives," said Ms Ayling. Jurors were told the victim required three operations before being moved to critical care, and he remained in a medically induced coma after sustaining incision wounds to his liver and pancreas.

  Police were called to the family home on 14 January 2021

  In the days before, which were during a Covid pandemic lockdown, the court heard disciplinary proceedings against Dr Brooks had been taking place in online hearings. Statements from Mr Perks formed part of the evidence against him, the trial heard. Ms Ayling said the defendant "was clearly frustrated" by the hearings and wanted his colleague "out of the way". "The prosecution does not have to prove a motive for any crime, however, it is clear that the defendant hated Graeme Perks," she said. Dr Brooks was found sleeping on a bench on a patio outside a house in Southwell at about 08:05 GMT on 14 January, when an ambulance was called. Ms Ayling said his wife reported him missing to police later that morning after she "reported finding an amount of blood in their garage". He was found at King's Mill Hospital "receiving treatment for hypothermia and injuries to his right hand". He was arrested soon afterwards and his clothing and a black rucksack found in his possession was taken for analysis.

  Mr Perks was attacked in his home, the court heard

  Ms Ayling said forensic evidence found a flammable liquid was "thrown up the stairs, in the hall and in the conservatory", which she argued showed the defendant's motive. "It was in the middle of night, [and] the only exit point for those sleeping upstairs would have been the stairs," she said. "The purpose must have been to kill the occupants of that house and to stop them escaping." Jurors were played a recording of the 999 call made by Mr Perks's son, in which he said: "He's been stabbed in the house. We need the police involved. There's been an intruder in the house." Bodyworn camera footage was also shown featuring the victim receiving medical attention near the bottom of his staircase. During the opening of the trial, Judge Edward Pepperall addressed jurors about the absence of the defendant and barristers on his behalf. He told jurors not to "speculate about the reason that Dr Brooks is not here", and noted he had been offered the chance to be represented. "The combination of these circumstances is highly unusual," he said. "His absence is not evidence against him." The trial, expected to last 14 weeks, continues.

