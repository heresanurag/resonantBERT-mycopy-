title: Salford murder inquiry after human torso found in woodland - BBC News
date: '2024-04-05'
section: Manchester
url: http://www.bbc.co.uk/news/uk-england-manchester-68738817
content: |-
  Police believe the remains wrapped in plastic may have been there for "a matter of days".

  A forensic tent was set up and police could be seen combing the area

  The discovery of a human torso in a secluded woodland has sparked a murder investigation.

  Police said the alarm was raised when a passer-by spotted the "unknown item" in Kersal Wetlands, Salford, on Thursday.

  Detectives and a pathologist confirmed human remains were found wrapped in plastic.

  Police are searching the rest of the woodland for other body parts, it is understood.

  Greater Manchester Police (GMP) said it believes the victim was an adult, but there are no identifying marks on the remains and no indication of an age.

  A post-mortem examination is to be carried in the hope of identifying the victim.

  But officers are not expecting the examination to reveal a cause of death because the full body has not been found.

  GMP said efforts to identify the remains had so far been unsuccessful and no arrests had been made.

  Police said they would be patrolling the area and providing reassurance to residents

  A member of the public spotted the remains wrapped in plastic, police said

  Speaking at a press conference at the reserve on Friday, Superintendent Tony Creely urged the public to come forward with any information surrounding the discovery.

  He said: "From forensic inquiry so far, we believe that these remains are likely to have been here for a matter of days.

  "It really is a tragic case.

  "Our priority now is establishing who this person is, and ensuring that we carry out a diligent and respectful investigation on behalf of that person and their family, whoever they may be."

  He said that the force's forensic teams and detectives will be in the area "for some time".

  Supt Creely added: "We're speaking to those locals in the area, dog walkers, passers-by, or anyone else who may have the smallest bit of information.

  "We need to make a breakthrough in this case and we urge anyone with any information whatsoever to contact the police without delay."

  He said that a cordon around a large area of woodland was likely to remain in place "for some time".

  He appealed for anyone who "witnessed something suspicious in the Kersal Dale area over the last few days" to contact police.

  Det Supt Lewis Hughes said: "I want to assure the local community that although this is a disturbing and unsettling find, we have a large visible presence in the area to complete enquiries, provide reassurance and to listen to any concerns.

  "The victim has not yet been identified, but we know that behind this discovery there will be a family who have lost a loved one, and we want to make sure they are supported as quickly as possible."

