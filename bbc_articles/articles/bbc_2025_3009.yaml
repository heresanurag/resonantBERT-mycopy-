  James was deployed to the east of the country as he and comrades sought to halt the grinding Russian advance spreading northwards from the occupied Donetsk region. Graham says his son was on his first mission in July when he was killed running between two trenches in a field with no cover. They had spoken just the previous night. "He seemed OK. He did say at some point 'I don't think I'm going to be here as long as what I might be. It's a little bit different to what I thought'. "I said: 'It's up to you. If anything goes wrong or pear-shaped I'll come and get you'. That was always an option if he decided he didn't want to be there." According to the International Legion website, volunteers, who are paid for their service, can terminate their contract after six months. "The mission he went on, he didn't have to go. But because his best mate at the time was going he decided 'well I'm going as well'. "Given the circumstances I would have probably done exactly the same."

  Graham says his son had ambitions of joining the British Army after school

  In December, Ukrainian President Volodymyr Zelensky admitted his country had suffered 43,000 fatalities as a result of the war with another 370,000 soldiers wounded. The death toll of Russian forces was estimated at about 200,000. Neither of these figures has been independently verified. Graham made the 1,800-mile trip to Ukraine for his son's funeral. Reflecting on his death, he says James died "doing something he felt strongly about". "It's very, very sad and unfortunate that he didn't get to make as much difference as he would have liked. "What happened to James unfortunately will probably be happening to someone else in the middle of a field in eastern Ukraine. "It's time people back home actually realised what it's like out there." Back at the home Graham and James shared in Lindley, life is "quiet". "He grew up to be a nice young man and he would get on with anybody. "I'll go home tonight and he's not sat there playing Playstation, it's weird. "We were great. We would sit there and have something to eat and talk about all sorts of stuff. There wasn't anything, as far as I know, that he wouldn't tell me, which is why he was open with me when he decided what he was doing." The night before James left he had spent the night with his father "laughing and joking" and drinking beer in front of the TV. "It's just so draining. You try not to think about it, you are sort of OK then something comes up and it sets you going again. "He was possibly a younger version of me. Maybe if I was him at a younger age I would have probably done the same thing." Listen to highlights from West Yorkshire on BBC Sounds, catch up with the latest episode of Look North or tell us a story you think we should be covering here, external.
