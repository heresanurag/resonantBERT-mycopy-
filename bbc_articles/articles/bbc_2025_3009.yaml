title: '''My son was 18, British and killed fighting for Ukraine'' - BBC News'
date: '2025-02-08'
section: West Yorkshire
url: http://www.bbc.co.uk/news/articles/cwy7gp341j0o
content: |-
  James Wilton, from Huddersfield, volunteered to fight so he could make a difference, says his father.

  'My son was 18 and went to Ukraine as cannon fodder'

  Volunteers from the International Legion who served with James Wilton in Ukraine with his father

  James Wilton was just 18 years old when he volunteered to fight for Ukraine months after finishing college. It was a decision he made with conviction and passion - but it was one which led to his death. The teenager from Huddersfield was killed in a drone attack in the village of Terny on the eastern front. "He had his whole life in front of him," says James' father, Graham. "I would swap places with him tomorrow just so he could be sat at home having a pint and watching the darts. "I'm 52, I have lived my life. He was 18, who knows what he could have done? He didn't have a life, that's the worst part of it."

  Graham Wilton's 18-year-old son James was killed while fighting in Ukraine

  According to Graham, James had wanted to join the British Army when he left Royds Hall High School aged 16. Instead he chose to enrol on a course in animal land care at Kirklees College. Aged 17 and nearing the end of his education, Graham says James began to discuss wanting to go to Ukraine to help with the war effort. Neither Graham, James' mother, or his older sisters Sarah, 21, or Sophie, 22, had wanted the youngest member of the family to go, but they were unable to convince him to change his mind. "I sat down with him and had various conversations about why he wanted to do it, what I thought about it, and in the end he decided it was something he wanted to do," says Graham, who lived with his only son. "I suppose he thought it was a bit of an adventure and he was going out there to help and hopefully make a difference." Graham says he reluctantly supported James, adding: "If I hadn't have done it I would have woken up one morning and he would have gone. "Hindsight is a wonderful thing. Could I have changed his mind? No."

  James Wilton travelled to Ukraine to fight Russian forces after leaving college

  Graham dropped James off at Manchester Airport on 28 April. From there he caught a flight to Krakow then boarded a bus to Ternopil, where he joined up with the International Legion and underwent a basic training programme lasting about four weeks. Speaking ahead of the third anniversary of the start of the war later this month, Graham says his son and his comrades, who hailed from all over the world and had varying degrees of military experience, were "totally ill-equipped" and used as "cannon fodder". In response, a spokesperson for the International Legion said the strategy of the Ukrainian Armed Forces is "based on the intelligent use of resources, tactical planning, and technological advantages". "Every offensive or defensive operation is planned based on intelligence and detailed risk analysis," they added. The spokesperson said their units receive the same standardized equipment as the Ukrainian Army and are supplied with "modern weapons". "The situation with supplies today is fundamentally different from the first months of the full-scale invasion." Still, Graham is unaware of James having any regrets about his decision during their regular telephone conversations, which he says were part of his son's desire to hold on to some "normality". "He met some wonderful people and he would have had a lot of lifelong friends should he have survived."

