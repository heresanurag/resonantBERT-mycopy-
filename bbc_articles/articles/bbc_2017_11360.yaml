id: bbc_2017_11360
title: TV channel live on air during Iraq-Iran earthquake - BBC News
date: '2017-11-13'
section: General
url: http://www.bbc.co.uk/news/world-middle-east-41967091
content: |-
  A Kurdish channel was live on air when Sunday night's earthquake hit the northern border regions of Iraq and Iran.

  At least 200 people were killed and hundreds more injured in the 7.3-magnitude quake.
