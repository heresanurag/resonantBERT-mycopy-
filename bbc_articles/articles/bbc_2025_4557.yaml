content: |-
  The Prince of Wales has visited troops at a strategically important army base on Russia's border

  The Prince of Wales has taken a ride in a tank while visiting UK troops on the Estonia-Russia border.

  During his two-day-trip to the region, Prince William visited Ukrainian refugees as well as some of the 900 troops - in what is now the British Army's biggest operational deployment overseas, defending the Baltic state from the threat of Russia.

  He was given a tour of the military training grounds at Tapa Camp – which is a strategically-important army base on Nato's eastern flank.
