content: |-
  People chanted "scum" and a lager can struck Smith's car before a derby match at Portman Road.

  This video can not be played To play this video you need to enable JavaScript in your browser.

  Norwich City co-owner Delia Smith said she was "saddened" Ipswich Town had not apologised after her car was hit by a can of lager outside their ground.

  People chanted "scum" and a can struck the bonnet as the celebrity cook arrived for a derby match at Portman Road on 16 December.

  In a statement, the 82-year-old thanked opposition fans for their messages of support but appeared to criticise the club for not speaking out.

  Ipswich Town said it would not comment.

  Other missiles appeared to be flung towards the BMW as it made its slow approach to the ground, while flanked by police and security.

  Ipswich fans had gathered outside the stadium to greet the arrival of the coach carrying the home team's playing and coaching staff.

  Smith followed in the car soon after the coach had passed through the crowds.

  Suffolk Police made two unconnected arrests at the Championship league game, which ended in a 2-2 draw.

  Smith and her husband, Michael Wynn Jones, made their first comment on the incident in a joint statement released on Friday.

  "Delia and Michael would like to thank all the Ipswich Town supporters who are still sending messages of support, and even flowers, after the event to apologise for what took place at the derby match," it said.

  "There has been a very good relationship with Ipswich Town during our tenure of 28 years, and we are saddened that we are yet to receive a public apology."

  The couple are Norwich City joint majority shareholders alongside Milwaukee Brewers owner Mark Attanasio, who first joined the Norwich City board in September 2021.

