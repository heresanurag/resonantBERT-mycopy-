content: |-
  Scotland basks in the sun on the warmest day of the year so far - and the hottest June day since 1995.

  This video can not be played To play this video you need to enable JavaScript in your browser. Warmest day in Scotland for five years

  Scotland is basking in its warmest June day in more than two decades - and its hottest single day for five years.

  Temperatures reached 31C in Aviemore at 14:00 on Wednesday afternoon.

  Forecasters said they could climb higher before the end of the day - far exceeding the previous record of 29C hit in June 1995.

  BBC Scotland weather presenter Gillian Smart said it could be a similar story on Thursday, with the mercury set to hit 31C in Glasgow.

  These groups show there is more than one way to enjoy a sunny day at the seaside

  The highest June temperature ever recorded was 32.2C at Ochertyre, Perth and Kinross, on 18 June 1893.

