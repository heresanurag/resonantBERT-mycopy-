content: |-
  The girl is likely to go undergo plastic surgery as a result of her injuries, the court is told.

  Ioan Pintaru is alleged to have stabbed an 11-year-old girl eight times

  A 32-year-old man has appeared in court charged with attempted murder after an 11-year-old girl was stabbed in London’s Leicester Square on Monday. Ioan Pintaru, a Romanian national with no fixed address, is also charged with possession of a bladed article. The prosecutor told the court that Mr Pintaru allegedly placed the girl into a headlock and stabbed her eight times. She was taken to hospital with serious injuries. Westminster Magistrates' Court remanded Mr Pintaru in custody. He is due to appear at the Old Bailey in September.

  The court heard that Mr Pintaru allegedly approached two tourists - the girl and her mother - in Leicester Square at about 11.30 BST. The girl sustained injuries to her face, shoulder, neck and wrist during the attack, the court was told. She remains in hospital and is likely to undergo plastic surgery as a result of her injuries, the court heard. Mr Pintaru only spoke, via an interpreter, to confirm his name, date of birth, and that he had no fixed address.

  Police were called to the busy tourist attraction following reports of a stabbing on Monday morning
