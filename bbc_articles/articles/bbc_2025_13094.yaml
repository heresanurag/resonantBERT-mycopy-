title: Intruder arrested for breaking into Windsor Castle ground - BBC News
date: '2025-06-03'
section: Berkshire
url: http://www.bbc.co.uk/news/articles/cx2qw3jzvzeo
content: |-
  A man in his 30s is arrested on suspicion of trespass on a protected site in Windsor, police say.

  An intruder has been arrested close to the home of the Prince and Princess of Wales

  An intruder has been arrested for breaking into restricted grounds at Windsor Castle, police have said. Thames Valley Police said the man allegedly entered "restricted grounds" at the royal residence at just after 13:00 BST on Sunday. The force said he was "quickly challenged" by Metropolitan Police officers and did not enter the inner grounds of the castle. The Met said the man, aged in his 30s, was arrested on suspicion of trespass on a protected site and possession of class A drugs.

  Thames Valley Police said the man had been bailed and an investigation was ongoing. A spokesperson said: "At just after 1pm on Sunday, a man entered restricted grounds at Windsor Castle. "He was quickly challenged by Met police officers and arrested. He did not enter the inner grounds of Windsor Castle." It is a criminal offence to trespass on a protected site under the Serious Organised Crime and Police Act.

