title: Man, 84, dead after explosion destroys neighbour's house in Edinburgh - BBC
  News
date: '2023-12-02'
section: Edinburgh, Fife & East Scotland
url: http://www.bbc.co.uk/news/uk-scotland-67599945
content: |-
  Police say two people aged, 43 and 54, were also taken to hospital following the blast in Edinburgh.

  The house was completely destroyed in the blast

  An 84-year-old man has died after an explosion destroyed his neighbour's house in Edinburgh.

  A 43-year-old woman and a man, 54, were also taken to hospital following the blast in the Baberton area of the city.

  Police Scotland said the alarm was raised on Baberton Mains Avenue at about 22:25 on Friday.

  A force spokesperson said: "There are no suspicious circumstances and we are continuing to work alongside our partner agencies."

  The 84-year-old man was named locally as James Smith.

