title: Baby elephant interrupts Kenyan TV report - BBC News
date: '2022-11-15'
section: General
url: http://www.bbc.co.uk/news/world-africa-63644365
content: |-
  Watch as Kenyan journalist Alvin Kaunda's reporting is interrupted by an inquisitive trunk.

  Kenyan journalist Alvin Kaunda was filming a piece to camera from a baby elephant orphanage in the capital Nairobi when he felt an inquisitive tap on his shoulder.

  Mr Kaunda was reporting on the way baby elephants at the orphanage were being looked after during a drought for Kenya's Broadcasting Corporation (KBC).

  Watch as a baby elephant came up behind him and put his trunk on his shoulder and face.
