title: 'Neil Foden: Judge''s comment on paedophile head''s minimum jail term was ''incorrect''
  - BBC News'
date: '2024-12-11'
section: Wales
url: http://www.bbc.co.uk/news/articles/cz0r3jpk7rpo
content: |-
  Judge "incorrect" to say Foden spending at least 11 years in prison, says Crown Prosecution Service.

  Neil Foden was given a 17-year sentence following his abuse of four girls over a four-year period

  The judge in the case of paedophile headteacher Neil Foden was "incorrect" to say he would spend at least 11 years in prison, according to the Crown Prosecution Service. In a letter sent to Plaid Cymru MP Liz Saville Roberts, the CPS said Foden can in fact be released after serving just half his sentence. Foden was jailed for 17 years in July for sexually abusing four girls over a four year period. Saville Roberts has asked the UK government to look at the case, saying victims "live in fear" of his early release.

  Neil Foden, 66, from Old Colwyn in Conwy county, was convicted of 19 charges in total, including 12 counts of sexual activity with a child and two counts of sexual activity with a child while he was in a position of trust. The teacher joined Ysgol Friars in Bangor, Gwynedd, as a deputy head in 1989, becoming headteacher in 1997. He was also strategic head of Ysgol Dyffryn Nantlle secondary school in Penygroes. Sentencing him at Mold Crown Court in July, Judge Rhys Rowlands said he was "depraved", "arrogant", and a "bully". In the letter to Saville Roberts, seen by BBC Wales, CPS deputy chief crown prosecutor in Wales Huw Rogers said: "During the sentencing hearing, the judge said that Mr Foden would serve two thirds of his sentence in custody before he would be released. "This was incorrect. Mr Foden will serve half of his sentence in custody, at which point he will be released on licence." The letter goes on to explain that only offences with a maximum sentence of life imprisonment are kept in prison for two thirds of their sentence, while "defendants sentenced for offences which have a maximum sentence less than life imprisonment are released after half of their sentence."

  Raising the issue in Westminster, the Dwyfor Meirionnydd MP said: "Four school girls suffered sexual abuse by their headteacher, Neil Foden, who was sentenced in July to 17 years with a two thirds tariff. "The CPS now tell me Foden will instead spend half his sentence in prison." Ms Saville Roberts asked the Justice Minister, and Pontypridd MP, Alex Davies Jones if she would meet her "to discuss how to safeguard the victims, who's abuser was in a position of trust, because they live in fear of his early release". Responding for the UK government's Ministry of Justice, Alex Davies-Jones said she was aware of the "appalling" case and that "sentencing is a matter for the independent judiciary, but I will look at the case and meet with her to discuss it further". BBC Wales has asked the Courts and Tribunals Judiciary for a response. Last month, North Wales Police said it was investigating two new grooming and sexual abuse cases involving Foden, but the CPS said it had not been contacted about these.
