title: Jane's Addiction apologise for Perry Farrell and Dave Navarro's Boston on-stage
  fight - BBC News
date: '2024-09-16'
section: Culture
url: http://www.bbc.co.uk/news/articles/cy5y45pw5dpo
content: |-
  The band cancelled an upcoming gig after Perry Farrell threw a punch at David Navarro.

  Dave Navarro and Perry Farrell performing together in happier times

  Jane's Addiction have apologised after they cancelled an upcoming show following an on-stage brawl in Boston. On Friday night, the American band cut short their gig after frontman Perry Farrell threw a punch at guitarist David Navarro. They were due to play in Bridgeport, Connecticut on Sunday as part of their reunion tour but this has now been pulled. "We want to extend a heartfelt apology to our fans for the events that unfolded last night," the band wrote on Instagram on Saturday.

  "As a result we will be cancelling tomorrow night's show in Bridgeport." The band insisted that fans would be reimbursed.

  Footage on social media showed Farrell shouting at Navarro, 57, and punching him. The 65-year-old rocker was then restrained by staff and taken off stage at Boston's Leader Bank Pavilion. Jane's Addiction formed in Los Angeles in 1985. The band consists of Farrell, Navarro, drummer Stephen Perkins and bassist Eric Avery. They have reunited after more than a decade, and are due to play a string of dates in the coming months throughout the US and Canada. There has been no confirmation as to whether those shows will still go ahead. The band released four albums together: Nothing's Shocking (1988), Ritual De Lo Habitual (1990), Strays (2003), and The Great Escape Artist (2011). Their hits include Been Caught Stealing, Strays and The Great Escape Artist. The rockers were honoured with a star on the Hollywood Walk of Fame in 2013.
