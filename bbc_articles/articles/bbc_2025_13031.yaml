  "I am scared they might attack again, " Ashraf Barghi tells me when we meet in the emergency department of the Taleghani General hospital where she works as head nurse. "We don't trust this war has ended" she says, in a remark reflecting the palpable worry we've heard from so many people in this city. When Israel bombed the threshold of the nearby Evin prison on 23 June, the casualties, both soldiers and civilians, were rushed into Nurse Barghi's emergency ward.
  • None What we know about the Iran-Israel ceasefire "The injuries were the worst I've treated in my 32 years as nurse," she recounts, still visibly distressed. The strike on the notorious prison where Iran detains most of its political prisoners was described by Israel as "symbolic". It seemed to reinforce Israeli Prime Minister Netanyahu's repeated message to Iranians to "stand up for their freedom". "Israel says it only hit military and nuclear prison but it's all lies," insists Morteza from his hospital bed. He had been at work in the prison's transport department when the missile slammed into the building. He shows us his injuries in both arms and his backside. In the ward next door, soldiers are being cared for, but we're not allowed to enter there.

  Nurse Ashraf Barghi fears that Israel will attack Iran again

  Across this sprawling metropolis, Iranians are counting the cost of this confrontation. In its latest tally, the government's health ministry recorded 627 people killed and nearly 5,000 injured. Tehran is slowly returning to life and resuming its old rhythms, at least on the surface. Its infamous traffic is starting to fill its soaring highways and pretty tree-lined side streets. Shops in its beautiful bazaars are opening again as people return to a city they fled to escape the bombs. Israel's intense 12-day military operation, coupled with the US's attacks on Iran's main nuclear sites, has le so many shaken. "They weren't good days, " says Mina, a young woman who immediately breaks down as she tries to explain her sadness. "It's so heart-breaking, " she tells me through her tears. "We tried so hard to have a better life but we can't see any future these days." We met on the grounds of the soaring white marble Azadi tower, one of Tehran's most iconic landmarks. A large crowd milling on a warm summer's evening swayed to the strains of much-loved patriotic songs in an open air concert of the Tehran Symphony Orchestra. It was meant to bring some calm to a city still on edge.

  Residents of Tehran have been assessing damage and clearing debris following Tuesday's ceasefire announcement

  Supporters and critics of Iran's clerical rulers mingled, drawn together by shared worry about their country's future. "They have to hear what people say," insists Ali Reza when I ask him what advice he would give to his government. "We want greater freedoms, that's all I will say." There's defiance too. "Attacking our nuclear bases to show off that 'you have to do as we say' goes against diplomacy," says Hamed, an 18-year-old university student. Despite rules and restrictions which have long governed their lives, Iranians do speak their minds as they wait for the next steps by their rulers, and leaders in Washington and beyond, which carry such consequences for their lives. Lyse Doucet is being allowed to report in Iran on condition that none of her reports are used on the BBC's Persian service. This law from Iranian authorities applies to all international media agencies operating in Iran.
