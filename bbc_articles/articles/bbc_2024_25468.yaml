title: Baby dead and 65 rescued in Channel sinking - BBC News
date: '2024-10-18'
section: Europe
url: http://www.bbc.co.uk/news/articles/cly50n1v420o
content: |-
  Officials said the overloaded boat carrying migrants started sinking off the French coast at Wissant.

  A baby has died after a boat attempting to cross the English Channel sank on Thursday night, French authorities said. Officials said the overloaded boat carrying migrants started sinking off the coast of Wissant in northern France. Rescuers called to the scene saved dozens of people, including some who were in the water. Searches to find more people at sea found an unconscious baby boy, who was later declared dead, officials said.

  Boulogne-Sur-Mer prosecutor Guirec Le Bras said the child was believed to be of Iraqi-Kurdish nationality, and had been on the boat with his parents and two other children. Giving an update on the situation, he said: "The group of migrants of 68 people included 52 men, 12 women and four children. "Among them, the lifeless body of a four-month-old baby was found. "They were mainly of Iranian, Iraqi, Albanian and Eritrean nationality." He said the city's public prosecutor's office has opened a criminal investigation. The local prefecture said earlier that when rescuers first arrived at the scene they found a heavily-loaded boat in difficulty, with some people in the water. As the rescue was under way, a search of the area was carried out to find anyone who may be stranded at sea, and it was then that the baby was discovered, the prefecture said. A French navy patrol boat and a helicopter were used during the rescue and recovery operations. 2024 is already the deadliest year for migrant crossings of the English Channel since 2018. Dinghies often now carry 50 or more migrants, far more than in previous years. Many do not wear life jackets for the dangerous crossing. On 3 September, six children and a pregnant woman were among 12 people who died after a boat carrying dozens of people sank off the French coast. A month later, four people, including a two-year-old boy, died after seemingly being "trampled to death" on two separate boats. The latest sinking brings the total number of deaths from migrants attempting to cross the Channel this year to at least 53. UK Prime Minister Keir Starmer has said he is "absolutely determined" to tackle the smuggling gangs facilitating the crossings. Refugee Council chief executive Enver Solomon said: "We are heartbroken that a baby has died in yet another devastating and depressingly preventable tragedy in the Channel. "People who make the crossing are fleeing war, conflict and persecution and simply want to be safe. "Seeking to disrupt the smuggling gangs alone will never be enough" he said, adding that the government should provide "safe and legal routes" for refugees. According to Home Office figures, more than 26,000 migrants have arrived in Britain on small boats since the start of the year. The International Organisation for Migration (IOM) has said deaths in the Channel are "preventable".
