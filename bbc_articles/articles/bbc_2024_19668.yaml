  Squadron Leader Henry Prince was a pilot in the team when it was launched in 1964.

  Red Arrows to carry founding pilot's name in tribute

  Sqn Ldr Henry Prince was a pilot in the team when it launched in 1964

  One of the original RAF Red Arrows display team has died at the age of 90, according to BFBS Forces News., external Sqn Ldr Henry Prince was a pilot in the team when it was launched in 1964. As a mark of respect, Mr Prince's name will be carried on a Red Arrows' jet for the remainder of the 2024 season. Wing Cdr Adam Collins, the team's commanding officer, said it will recognise "his outstanding contribution to British aviation, the Royal Air Force and entertaining millions of people as an original Red Arrow".

  Originally as the Yellowjacks, due to the colour of the Gnat trainer aircraft they flew, they were soon painted red. Mr Prince told the BBC in 2014 that the aircraft were repainted as "yellow wasn't a very good colour on a grey day". "So they went for red," he said. "They repainted the aeroplanes over the winter and we started flying with the red aeroplanes in early February of 1965." The unit was established at the No 4 Flying Training School at RAF Valley in Anglesey. Mr Prince said the team started with seven aircraft, but when the squadron was established full-time in 1968 it was expanded to nine.

  The Red Arrows have performed almost 5,000 displays in 57 countries over their 60 years

  Paying tribute, Wing Cdr Collins said: “As a founding team pilot, Henry Prince has left a lasting mark on the type and style of display still flown by the Red Arrows to this day. “The thoughts of the entire Royal Air Force Aerobatic Team are with Henry’s family and friends following his passing." Wing Cdr Collins said Mr Prince had helped to shape "the distinctive, dynamic, precision display", which has been "the hallmark" of the Red Arrows from the team's very first outing. He added that during a visit to help launch the 60th anniversary celebrations in March, Mr Prince had been as "sharp, witty and still with a keen eye on the details" as ever. Now based at RAF Waddington in Lincolnshire, the Red Arrows fly the Hawk training aircraft at air shows across the world. The squadron had flown almost 5,000 displays in 57 countries by the beginning of 2024, the team's 60th season. Follow BBC Lincolnshire on Facebook, X (formerly Twitter), external, and Instagram. Send your story ideas to eastyorkslincs.news@bbc.co.uk, external
