  Who has made Troy's Premier League team of the week?

  After every round of Premier League matches this season, BBC football pundit Troy Deeney will give you his team and manager of the Week. Here are this week's choices. Do you agree? Give us your thoughts using the comments form at the bottom of this page.

  Jordan Pickford (Everton): He made some massive saves and stopped Arsenal in their tracks. Everton have been under the cosh a lot this year and it's good to see him step up. See, just as much as I hammer him, I can also be nice...

  Djed Spence (Tottenham): I don't understand why he hasn't been playing, that's a question for Ange Postecoglou. It looked like it wasn't going to work out for him last year, but he's come back in in the summer and worked hard and been patient. Again, he was excellent and solid and looked like he had been playing all season. Nikola Milenkovic (Nottingham Forest): He has been really good for Forest and it's back-to-back games now where he has been scoring from set-pieces. He's been colossal at the back. A lot of people love Murillo next to him, but he is that calm head. Archie Gray (Tottenham): The way he has acquitted and handled himself, I think he's done really well. He was put in at centre-back against Southampton and impressed. He also came through the game at Rangers in midweek with his head held high. Marc Cucurella (Chelsea): I can't deny he's been playing really well for Chelsea this year. He stupidly got sent off at the end of the game but even so he is performing above expectation. When Chelsea first signed him I wasn't so sure. But he's since been a really consistent performer, to the point where Chelsea will probably end up selling Ben Chilwell. That just shows how good the lad has been doing. And he had a great finish as well.

  Pape Matar Sarr (Tottenham): He's been good for a couple of weeks and this was the kind of game where he gets a goal and he shows his level of class and composure. This time I'm going to stick him in - even if it was only against Southampton. Manuel Ugarte (Manchester United): He has really, really surprised me. I know it's still early days under the new manager, but Ugarte has a bit of bite about him. He's a bit horrible and even at 1-0 down he was making important tackles, blocks and getting attacks started. I thought he was the catalyst as to why they went on to win. I thought if it wasn't for him they wouldn't actually be in the game. An underrated performance that only his team-mates will appreciate.

  Amad Diallo (Manchester United): It's been really difficult to pick the forwards this week but Amad Diallo is the only one who is a no-brainer. He was excellent, flipped the Manchester derby on its head. As a young man he just seems to be growing better and better. All that noise around Alejandro Garnacho and Marcus Rashford, Diallo just seems to be going about his business and delivering on a regular basis, and that's what it's all about. Ismaila Sarr (Crystal Palace): When I played with him at Watford he was a winger, but at Palace they're playing him as a 10 and he's going to show people just how good of a footballer he is. He is also the quickest person I've ever played with and for his second goal he made up five yards on Lewis Dunk and then for his finish was about 15 yards ahead. Unbelievable finish and great to see him off the mark and flying at Palace. Jacob Murphy (Newcastle): If I'm being totally honest, I never thought I'd do a Team of the Week where we'd be talking about Jacob Murphy. That's probably the best compliment I can give him, he's playing that well I have to put him in. Two goals at the weekend, excellent performance. Alexander Isak (Newcastle): The best striker in the Premier League at this moment in time. Yes I've said it and yes I stand by it. He's the complete striker. Unreal. Every time I watch him I keep thinking, how haven't Arsenal signed him? He's a really good player and finisher. He's a poacher but he's also such a silky player. You don't see many silky poachers.

  Ruben Amorim (Manchester United): I'm not giving this for Manchester United's win, the winning is separate. I'm giving it for the Rashford and Garnacho decision. It was a huge tone-setter for what he is doing at Manchester United. At one point, with Manchester United losing, I thought he might have to back off that decision because all the chat if they'd have lost would have been about what if those two had played. But he gets the win and no-one is talking about it which is how it should be. Standards are set and he is saying this is what you've got to do and I see and hear everything. You have to make sure you're a Manchester United player with a high level of standard and application otherwise you won't be there.

