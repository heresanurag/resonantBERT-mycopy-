title: 'East Belfast: Kathryn Parton found dead and murder inquiry begins - BBC News'
date: '2024-05-16'
section: Northern Ireland
url: http://www.bbc.co.uk/news/uk-northern-ireland-69020059
content: |-
  Kathryn Parton, 34, who suffered serious head injuries, was discovered in an east Belfast house.

  The body of Kathryn Parton was found in a house on Madrid Street in Belfast

  A murder investigation has begun after a woman with serious head injuries was found dead in the bedroom of an east Belfast house. Kathryn Parton - known as Kat - was discovered in the house in Madrid Street on Wednesday afternoon. The 34-year-old was pronounced dead at the scene and three people were arrested. Police are continuing to question a woman aged 43 and two men aged 22 and 23 on suspicion of murder.

  Forensics officers arrived at the east Belfast property to conduct further examinations of the scene on Thursday. PSNI Det Insp Michelle Griffin said her "thoughts at this time are first and foremost with Kathryn's family, who are left trying to come to terms with their loss". "Our investigation is at an early stage and enquiries are ongoing to establish the exact circumstances," she added. Police have appealed for anyone who may have information to contact them.

  Belfast East MP Gavin Robinson described the incident as heart-breaking.

  "It is shocking for the local community, a very tight-knit community, and a very good community," he said. "My thoughts are very much with the family and those so deeply affected at this time." Extending its "deepest sympathies to the families and friends of Kathryn" on social media, the charity Women's Aid said Ms Parton was the 19th woman to be killed in Northern Ireland since 2020. "Please know our thoughts are with you all at this incredibly challenging time. We cannot fathom the depth of your pain at losing your loved one," it added.
