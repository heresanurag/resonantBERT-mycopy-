  Rhode’s comments come after 16-time WWE world champion John Cena talked up the possibility of the biggest show in wrestling being hosted outside of the US, and London Mayor Sadiq Khan held talks with WWE Chief Content Officer and former wrestler Paul “Triple H” Levesque earlier this year. Rhodes said: "When the greatest of all time, as we like to call John [Cena], goes out there and says it, it almost wills itself into existence. "I'm very much looking forward to watching that situation unfold." The son of wrestling legend the "American Dream" Dusty Rhodes, Cody won his first undisputed WWE Championship at WrestleMania 40 in April, after defeating Roman Reigns in a main event match that included appearances from the likes of Dwyane "The Rock" Johnson and The Undertaker. Rhodes departed the WWE in 2016 and competed on the independent circuit and with rival-promotion All Elite Wrestling, only to return to the WWE and “complete his story” by winning the top title two-years later. “If you look at it now, it feels like it was destined to be, but I never looked at it that way,” he said.
