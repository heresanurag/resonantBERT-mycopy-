content: |-
  The "American Nightmare" thinks Manchester or London have venues perfect for hosting the event.

  Cody Rhodes believes fans would jump at the chance to attend WrestleMania in Manchester or London

  The current undisputed WWE Champion Cody Rhodes says he hopes wrestling bonanza WrestleMania will be hosted in the UK within the next five years. The 39-year-old, known as the "American Nightmare" in the wrestling world, told BBC 5Live: "If I’m aiming, it would be cool to get it [in the UK] in the next five years." WrestleMania is usually held in the US over two nights between mid-March and mid April and is the longest running wrestling event in professional wrestling history. Rhodes said: “There’s some really big venues over here that could host a WrestleMania," adding, "I think American fans would jump at the chance to come to a WrestleMania [overseas], whether that that be in Manchester or London, I think they’d go nuts for it."

