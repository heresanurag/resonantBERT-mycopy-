content: |-
  Craig Bellamy is proud of his first Wales win with a match in Montenegro played in what he describes as the “toughest conditions" he has ever faced.

  This video can not be played To play this video you need to enable JavaScript in your browser.

  Craig Bellamy spoke of his pride after celebrating his first Wales victory in a match in Montenegro played in what he described as the “toughest conditions" he had ever encountered. Early goals from Kieffer Moore and Harry Wilson secured a 2-1 Nations League win in Niksic, where torrential rain ruined the pitch and made it difficult for players to simply stay on their feet, never mind play football. However, Wales dug in to earn Bellamy a maiden victory to go with last Friday’s promising goalless draw with Turkey in his opening match. “I’m extremely proud. I love this group, I really do,” said Bellamy. “These are the toughest conditions I’ve been in. Nothing about coming here has been easy. You could have had a lot of excuses about this trip. The change of venue, the travel here, a bus driver who took his time, the conditions, but sometimes you learn from it. “There is a reason why this group have qualified for major tournaments. It wasn’t a football match. The conditions weren’t going to allow it. I couldn’t even wear trainers here. My summer bomber jacket is gone! “We saw after five minutes the pitch tore up and then it becomes about who can win the battle. It was close at times. If it was a boxing match, there were two teams out on their feet and we came out on top. Sometimes you take more pride from these wins.”

  Former captain Craig Bellamy scored 19 goals in 78 games for Wales

  Bellamy has already revitalised Welsh football just two games into his tenure. Players have been glowing in their praise for the new head coach, while fans were singing his name throughout Monday’s game in Niksic. While the draw with Turkey demonstrated how exhilarating Bellamy’s team could be in a footballing sense – tactically and stylistically – the win over Montenegro was an illustration of this squad’s mental fortitude and determination to secure victory in testing conditions. The match was meant to have been played at the Podgorica National Stadium but, as the pitch there was deemed unplayable, the fixture was switched to Niksic, 53km away, just two weeks before kick-off. Heavy rain fell constantly on Monday, causing the pitch to cut up badly and hamper both teams in what turned into a chaotic encounter. But despite a nervy end to the game, Wales were able to repel Montenegro’s attempts to snatch a late equaliser and hold on for a valuable three points. “This camp has been incredible. Last night I was really excited about the game but also sad as it ends tomorrow,” said Bellamy. “Even with the squad of people, they’re all going to leave me and I don’t want them to go. It’s been such an incredible 10 days. “I really couldn’t be more proud of them. I love them. They’re such a great group and I’ve learned a lot off them as well. Tonight was all heart.”
