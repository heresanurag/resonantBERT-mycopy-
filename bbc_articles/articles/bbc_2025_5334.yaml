title: 'Stockwell Tube: Teenage boy shot dead near station - BBC News'
date: '2025-03-04'
section: London
url: http://www.bbc.co.uk/news/articles/ckgd6lyqlvno
content: |-
  A 16-year-old boy is found dead after being shot in south London on Tuesday afternoon.

  A 16-year-old boy has died after being shot in an "enormously shocking incident" in south London, the Metropolitan Police has said. The teenager was pronounced dead at the scene in Paradise Road near Stockwell Tube station, after police were called at about 14:30 GMT on Tuesday to reports of a shooting. Officers are working to identify the victim and contact his family. No arrests have been made. Supt Gabriel Cameron said: "Our thoughts are with the young boy's family at this devastating time."

  He added: "This is an enormously shocking incident which I imagine will cause huge distress to the local community." "Local officers are on the scene gathering CCTV and speaking to witnesses to piece together what has happened." Florence Eshalomi, MP for Vauxhall Camberwell Green, said she was "very sad" to hear of the fatal shooting and described it as "a life wasted". A police cordon and road closures remain in place following the third homicide in the capital of someone aged under 25 this year.
