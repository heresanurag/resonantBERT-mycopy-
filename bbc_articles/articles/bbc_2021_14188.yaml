content: |-
  The world's two biggest emitters make a joint declaration saying they recognise the "urgency of the climate crisis".

  Progress, ambition and 1.5C - what did Boris Johnson say?

  He admits whether we can keep to the 1.5C temperature rise target is "in the balance". During his speech, and in answers to journalists, he also says:
  • there still needs to be more ambitious and credible plans to tackle climate change
  • there is a big gap between where we are and where we need to be
  • the 2015 Paris Agreement was ultimately a pledge of action still to come The PM says it is frustrating "to see countries that have spent six years conspicuously patting themselves on the back" for signing that agreement now "quietly edging towards default". But Johnson adds that, as seen in Glasgow, the world is closer than it has ever been to signalling the beginning of the end of anthropogenic climate change. "It is now within reach," he says. He concludes by saying: "So my question to my fellow world leaders as we enter the last hours of COP26 is: will you help us do that? Will you help us grasp the opportunity or will you stand in the way?"
