content: |-
  The Labour leader has pledged to discuss "all tactics available" with opposition parties.

  This video can not be played To play this video you need to enable JavaScript in your browser. Sir Keir said Tuesday's meeting was about finding "a unified approach"

  Jeremy Corbyn has met other opposition party leaders to discuss ways of averting a no-deal Brexit.

  The Labour leader had outlined a plan to become caretaker PM after defeating the government in a no-confidence vote.

  But in his invitation letter, he pledged to discuss "all tactics available" to stop the UK leaving the EU on 31 October without a deal.

  Tory Party chairman James Cleverly said Mr Corbyn was offering "chaos, delay and uncertainty".

  The SNP, Liberal Democrats, Change UK, Plaid Cymru and Green Party all accepted the invitation to meet Mr Corbyn and discuss his proposals.

  The Labour leader also invited five Conservative MPs opposed to a no-deal exit, but none said they would be attending.

  One of them, former Attorney General Dominic Grieve, said he was not able to make it, but was willing to meet Mr Corbyn at another time.

  Brexit Party leader Nigel Farage criticised those attending, saying they were "very out of touch with public opinion" and leaving the EU without an agreement was now "the only acceptable deal".

  Mr Corbyn has said if he wins a no-confidence vote, he will delay Brexit, call a snap election and campaign for another referendum.

  The Liberal Democrats, and some potential Tory allies opposed to a no-deal exit, have indicated they won't back a plan that leads to him in No 10.

  Ahead of the meeting, Lib Dem leader Jo Swinson told BBC Breakfast a plan involving Mr Corbyn as interim leader was less likely to succeed.

  Shadow Brexit secretary Sir Keir Starmer said Tuesday's meeting would be "a pretty frank discussion" about the options available.

  "Today is about, can we get a unified approach that we agree? There'll have to be give and take, but we must have a plan that everybody can coalesce around and that we implement as soon as we can next week," he told BBC Radio 4's Today programme.

  As well as Mr Corbyn's no-confidence plan, MPs will also discuss taking legislative measures to block a potential no-deal, Sir Keir said.

  "I think they're direct, I think they're effective. I want something with a legal edge."

  MPs previously passed a law in April to force former PM Theresa May to request an extension of the UK's EU membership beyond the original Brexit deadline of 29 March.

  Repeating that approach would require them to first take control of the parliamentary timetable to make time for the law to be debated.

  Speaking on Tuesday, SNP Westminster leader Ian Blackford said one way to do that would be to amend a motion debated as part of an emergency debate in the Commons.

  Emergency debate motions - topical matters added to business at short notice - are normally considered unamendable, meaning Speaker John Bercow may have to give a ruling that one is.

  If successful, Mr Blackford told the BBC, this strategy would allow MPs to pass a law compelling the prime minister to seek a Brexit delay at a summit of EU leaders in mid-October.

  Ahead of the meeting, Change UK leader Anna Soubry said passing legislation was the "immediate solution" for avoiding a no-deal exit.

  This video can not be played To play this video you need to enable JavaScript in your browser. Jo Swinson said she favoured passing legislation to stop a no-deal exit

  On Monday, PM Boris Johnson said he was "marginally more optimistic" about striking a new Brexit deal with the EU.

  Asked at the end of the G7 summit in France about the possibility of MPs thwarting plans to leave the EU at the end of October, Mr Johnson said: "I think it's the job of everybody in Parliament to get this thing done.

  "I think it's what the people want, I also think, by the way, it's what our friends and partners on the other side of the Channel want - they want it over."

  Mr Johnson says he wants to leave with an agreement, but the UK must leave the EU by the latest deadline of 31 October "do or die".

  Although Boris Johnson only has the most emaciated of majorities, the opposition seems to be divided on tactics and outcome.

  Mr Corbyn wants to be a caretaker prime minister, he wants to call a general election and campaign for another referendum. But Jo Swinson wants to know, does he really want to stop Brexit? Or whether, in a referendum, he would have a Labour version of leave on the ballot paper?

  More crucially, she says the only way for Mr Corbyn to become caretaker leader is to win a vote of no confidence against Mr Johnson. And if Tory rebels won't support Mr Corbyn, she wants to know if he would stand aside for a veteran parliamentarian such as Ken Clarke or Harriet Harman.

  Already her attitude has been described as petulant by a senior Labour frontbencher so that doesn't necessarily augur well for today's talks.

  The most likely outcome is that MPs will try to seize the parliamentary agenda and legislate against a no deal, but that in itself isn't a watertight solution.

  There are two weapons in Mr Johnson's armoury. He has ruled out suspending Parliament in September, but hasn't ruled it out entirely ahead of the 31 October deadline. If he does that, that stops them trying to block no deal at the last minute.

  On the other hand, if MPs tell him 'you're going to have to legislate to extend Brexit,' he can say 'I refuse to do it' and call an election.

  Writing in the Independent, Mr Corbyn pledged to discuss all options with other party leaders to "stop this no-deal disaster in its tracks".

  He said: "[No-deal Brexit] won't return sovereignty, it will put us at the mercy of Trump and the big US corporations dying to get their teeth into our NHS, sound the death knell for our steel industry and strip back our food standards and animal welfare protections."

  Green Party MP Caroline Lucas, who attended Tuesday's meeting, tweeted: "Boris Johnson's intentions are clear: suspending Parliament, a crash out Brexit and blaming MPs for the chaos".

  "We will not be bullied. We will not surrender parliamentary sovereignty to the right wing cabal in No 10. MPs must unite to stop this abuse of executive power."

  Former Tory MP Nick Boles - who rejected Mr Corbyn's invitation to talks - tweeted that he would not "countenance" a no-deal exit, or "any undemocratic steps to frustrate the will of Parliament".

