  Meanwhile, MPs from different parties are later expected to sign a declaration pledging to set up an alternative assembly if the PM prorogues - or suspends - Parliament.

  Mr Johnson says he has no plans to do this, but has not ruled out such a move to make sure the UK leaves the EU by the end of October.

  Responding to Mr Corbyn's newspaper article, Mr Cleverly said: "The alternative to delivering Brexit is Jeremy Corbyn in Downing Street, a man who would wreck the economy, break up our Union, is soft on crime and won't stand up for Britain."

  He insisted only Mr Johnson and the Conservatives could provide the leadership needed to deliver Brexit by 31 October, "whatever the circumstances".
