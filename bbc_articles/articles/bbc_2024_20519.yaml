date: '2024-08-30'
section: US & Canada
url: http://www.bbc.co.uk/news/articles/cy4yw3d2p3zo
content: |-
  He survived stormy weather and multiple falls after reaching a Colorado mountain summit on his own.

  Hiker rescued after workmates left him on mountain, says search crew

  Chaffee County Search and Rescue posted images of the response teams at work

  A hiker was rescued from a mountain in the US state of Colorado after being apparently left behind the previous day by his colleagues during an office retreat. The unnamed man got lost and found himself without phone signal after being left by colleagues who went ahead without him, the Chaffee County Search and Rescue team said. He endured stormy weather and multiple falls before being found in a "large search effort" the next morning. He was stabilised and taken to hospital, but there has been no further update on his condition. The officials suggested the incident "might cause some awkward encounters at the office in the coming days and weeks".

  The drama unfolded on Friday as a 15-strong group from the company - which has also not been named - ventured along a trail up Mt Shavano, which is 14,000ft (4,300m) high. In their statement, officials said the hiker was left to reach the summit on his own at about 11:30 local time (17:30 GMT). Evan Brady, the public information officer for Chaffee County Search and Rescue South, told the New York Times the man had stopped for a break while his co-workers continued on the route. "He's lucky to be alive," Mr Brady said. The man became disoriented on the descent, "finding belongings left in the boulder field to mark the descent by the previous group having been picked up as they hiked down". Concerned, he sent a pin drop to colleagues, who are said to have told him that he was on the wrong route, and suggested that he climb back up to the right trail. Shortly after sending them a second message, a strong storm passed through the area, bringing "high winds and freezing rain" and leaving him without a signal. Chaffee County Search and Rescue received an alert at 21:00 that evening, dispatching two teams and a drone pilot who were thwarted by the bad weather. A helicopter was also sent, but despite tracing the man's last known movements, the rescuers could not find him. He was wearing dark clothing. Extra help was summoned from multiple agencies in neighbouring areas on Saturday morning, resulting in what the officials called a "large search effort". Eventually, the missing man recovered enough phone signal to make an emergency call, and he was located in a gully. He reported that he had fallen at least 20 times and was left unable to get up. His rescue ultimately involved technical rope lowers and "phenomenal cooperation and teamwork", the officials added. Mr Brady also told the New York Times that the suggestion the hiker had been abandoned by colleagues was overblown. The man's health remains unknown after being taken for hospital care. The BBC has contacted Chaffee County Search and Rescue for further comment. In their statement, they warned people never to hike alone, and to pack bright clothing and essential supplies. "This hiker was phenomenally lucky to have regained cell service when he did, and to still have enough consciousness and wherewithal to call 911," they said.
