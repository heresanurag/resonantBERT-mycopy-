title: Last-ditch effort to get Belfast toddler out of Lebanon fails - BBC News
date: '2024-10-03'
section: Northern Ireland
url: http://www.bbc.co.uk/news/articles/c89l11v4k8wo
content: |-
  Fresh orders were granted by the High Court on Wednesday in an effort to get the Belfast toddler home.

  Emergency deal fails to get toddler out of Lebanon

  David has been in Lebanon with his father for the past two years

  An emergency deal to get Belfast toddler David Nahle on a UK evacuation flight out of war-torn Beirut has failed. The High Court has agreed to drop an arrest order against David’s father, Dr Mustapha Nahle, if he allows the child to board a flight to the UK. But a special mediator who flew to the Lebanese capital to try to bring David home says Dr Nahle has so far refused to accept the arrangement. The mediator, Miceál O’Hurley, called on the British and Irish prime ministers to make a direct appeal to their Lebanese counterpart.

  Catherine Flanagan last saw her son in person when he was ten months old

  Dr Nahle has kept David, who turns three next week, in Beirut since 2022. David travelled there with his mother Catherine Flanagan on a British passport, but Dr Nahle refused to let him leave again and as a result is a fugitive from UK authorities. He has refused to obey a UK court order for David’s return, saying a Lebanese court has granted him custody. As violence in Lebanon escalated this week, the High Court in Belfast granted an urgent order which offered to stay a charge of contempt against Dr Nahle if he allowed David to evacuate. Mr O’Hurley flew to the Beirut on Wednesday and had secured a seat for the Belfast-born child on a plane carrying evacuees on Thursday – but that flight took off without him.

  Mr O’Hurley told BBC News NI he was in phone contact with Dr Nahle but he has so far rejected the deal. “I regret that I was unable to evacuate David from Beirut,” Mr O’Hurley said. “The cooperation required to see David home was not forthcoming by his father in Lebanon. “Still, I pray to God another opportunity to evacuate David will arise.”

  Because David is a citizen of the UK, Ireland and Lebanon, Mr O’Hurley called on the prime ministers of the three countries to become involved. “We’ve asked that Prime Minister Starmer and an Taoiseach Simon Harris telephone their counterpart, Najib Mikati to request his assistance with David’s evacuation.” A spokesperson for the Foreign, Commonwealth and Development Office said it was providing consular assistance and was in contact with local authorities in Lebanon. The Irish Department of Foreign Affairs said it is aware of the case and has provided advice and guidance. BBC Spotlight tracked down David’s father in Beirut last month and he told the programme he did not intend to allow his son to leave Lebanon. The latest development comes days after Israel launched an invasion of Lebanon. Attacks in southern Beirut, where it is believed David is living with his father, killed nine people overnight. Israel has warned people in dozens of places in southern Lebanon to evacuate.

  Spotlight: My Son In A Warzone is available to watch on the BBC iPlayer.
