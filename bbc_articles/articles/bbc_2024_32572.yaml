content: |-
  With French politics in turmoil, Macron hopes to benefit from the reopening of the cathedral.

  Emmanuel Macron plans to use the reopening of the cathedral for a political boost

  A gravely weakened President Emmanuel Macron hopes to win a new lease of political life from Saturday's ceremonial reopening of Notre Dame. Joined by US President-elect Donald Trump, Prince William and other international figures, including Ukrainian President Volodymyr Zelensky, Macron will seek to present the renovated cathedral as a symbol of France's inner reserves of creative strength. In a speech marking the occasion, he will urge the world to see beyond the country's current political crisis and admire the determination, organisation and hard graft that have rescued one of France's most famous buildings in just five years. The long-awaited event comes just as France enters a period of deep uncertainty triggered by the fall of Prime Minister Michel Barnier's government on Wednesday. A replacement has yet to be named. Five-and-a-half years after the devastating fire, Macron had planned to make the cathedral's reopening the optimistic climax of 2024 – a year also marked by the Paris Olympic Games. But while he seeks to capitalise on the project's undoubted success, a contrast is unavoidable between the depressed state of the country as a whole, and the soaring achievement of fixing this magnificent Gothic cathedral.

  Five and a half years after the devastating fire, Notre Dame is set to reopen

  The ceremony marks the moment that the Catholic Church retakes possession of the cathedral, ahead of the first Mass to be celebrated on Sunday. Archbishop Laurent Ulrich will knock on the front portal using a staff made from one of the rescued roof-timbers. Answered by the choir, which will already be inside, he will enter the cathedral and bid the organ "ring forth praises of God". Macron had originally intended to make an address inside the cathedral, but was advised that this would contravene France's strict rules on secularity. As a compromise, he visited the cathedral eight days ago to thank hundreds of craftsmen and women – a televised tour which allowed the world a first glimpse of the stunningly rejuvenated interior. The evening's religious ceremony will be followed by a concert featuring Chinese pianist Lang Lang and Canadian singer Garou. Sunday's Mass – which the president will attend – will be conducted by Archbishop Ulrich in the presence of 170 French bishops and priests from 106 Paris parishes. The first Mass for the public is on Sunday evening, but booking was required – as it is for all the Masses planned for the week ahead.

  The first mass for the public is on Sunday evening, after the cathedral reopens

  One dignitary who will not be attending is Pope Francis, though he has sent a message that will be read out on Saturday. The Pope's relations with France are cordial rather than friendly. He is reported to have been angered by French policies to cut immigration, and by Macron's decision to put the right to abortion in the constitution. In the French press, the Pope is said to be more interested in the younger and growing Christian communities of the southern hemisphere than the medieval Churches of Europe. The fire on 15 April 2019 destroyed the medieval roof-timbers, the spire and three sections of stone vaulting. An appeal for donors raised €850m ($897m; £704m), and 2,000 masons, carpenters, art-restorers, engineers and architects worked on the project. "The moment I looked inside on the day after the fire, I knew that everything would be all right. The damage was nothing like as bad as I had feared," said cathedral chief architect Philippe Villeneuve, who disputes the widespread theory that Notre-Dame came close to total collapse. "Apart from replacing the roof and spire, the main task was decontamination. Everything was covered in lead oxide powder. But that meant we could restore and clean – which explains why the cathedral looks so beautiful today." Before the fire, the cathedral was already deemed to be in a state of severe disrepair, and scaffolding was in place to renovate the spire and other external parts much damaged by corrosion. Some 12 million people per year were visiting the cathedral, a number which is now expected to rise. A new route around the building has been devised to cope with the 100 visitors a minute expected to come here at the height of the tourist season.
