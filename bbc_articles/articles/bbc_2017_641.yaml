title: Trump 'will handle US-UK trade talks' - BBC News
date: '2017-01-26'
section: General
url: http://www.bbc.co.uk/news/uk-38763689
content: |-
  President Trump says he will handle UK trade talks himself, as he waits for Senate to approve his commerce secretary.

  US President Donald Trump has said he will handle trade discussions with the UK himself, ahead of a meeting with the British prime minister.

  The president said he would have to deal with the talks because his chosen commerce secretary, Wilbur Ross, has yet to be officially confirmed by the Senate.
