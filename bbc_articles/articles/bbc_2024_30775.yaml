  Since the BBC reported on Miss Hudson's case, we have been contacted by numerous other people who have been threatened with legal action for the same reason. These included Garry Kay, who parked at the same car park as Miss Hudson - the Copeland Street car park in Derby. Excel Parking demanded £255 from Mr Kay, but he found out the case had been discontinued shortly before he was due to defend himself in court. Mr Kay had received only one PCN from Excel Parking while Miss Hudson had received 10. She paid the first one but decided to challenge the car park operator when she received more through the post. Neither Mr Kay nor Miss Hudson have received any explanation from Excel Parking about why their cases were discontinued.

  Garry Kay was ready to defend himself in court when he found out his case had been discontinued

  Miss Hudson encouraged other people to challenge their PCNs, as she and Mr Kay did. "Even if you receive letters that are warning you of debt recovery and taking you to court, I would still persevere," she said. "I would recommend getting legal advice and persevering. Don't give in to the car parking bullies." DCB Legal, which represents Excel Parking, has donated £60 to the Teenage Cancer Trust at Miss Hudson's request, in lieu of the first PCN she paid. Miss Hudson has also made a donation in return for free legal advice she received from a solicitor, who contacted her following the publicity. She said the charity meant a lot to her. "I lost my dad to cancer a couple of years ago and that was unbearable, but to know that a younger generation are going through such horrible diseases, I can't imagine," she said.

  Miss Hudson was sent 10 parking charge notices for parking at this car park in Derby

  Although Miss Hudson has won her case, she said it had caused a huge amount of stress over the past 21 months. "I struggle daily with getting anxious and worried about things," she said. "This heightened it, so this made me feel 10 times worse. It's that dread of waking up in the morning and seeing another letter. "It's not nice having that hang over you, I wouldn't wish it on anybody and I certainly hope that the rules change so that this doesn't happen again." Miss Hudson would ultimately like the five-minute payment rule to be "banished" and for private car park operators to follow stricter rules, and she hopes to meet Catherine Atkinson, the Derby North Labour MP who raised the matter in the House of Commons. But in the meantime, Miss Hudson feels she can finally continue with her life as normal. "I can use that money towards a deposit for a house I'm looking at buying with my partner," she said. "We're getting married in February next year, so I feel like that money will go towards our future."

