title: 'Parking fines: Excel Parking drops woman''s £1,906 charge - BBC News'
date: '2024-12-15'
section: Derby
url: http://www.bbc.co.uk/news/articles/c627zp5d0qeo
content: |-
  Rosey Hudson was being taken to court for what an MP described as a "five-minute rip-off charge".

  Excel Parking has discontinued its claim against Rosey Hudson

  A car park operator has dropped its £1,906 court claim against a woman who took more than five minutes to pay for parking. Rosey Hudson was among numerous people being taken to court by Excel Parking due to its five-minute payment rule - which has seen drivers sent Parking Charge Notices (PCNs) for not paying within that time. But following publicity about the case - and an MP describing the PCNs as a "five-minute rip-off charge", external - the claim against Miss Hudson has been dropped. The BBC contacted Excel Parking and asked why the case was dropped, but it has not responded.

  Miss Hudson, who is 31 and lives in Leicestershire, said she felt "so relieved". "I've basically won without having to go to court, which is incredible, and I feel like I've had a weight lifted off my shoulders," she said. "I won't have that anxiety of thinking I don't want to pick the post up this morning because I'm worried it's another PCN fine or another debt collector letter." However, Miss Hudson said she wanted to "continue fighting for other people that are going through the same thing".

