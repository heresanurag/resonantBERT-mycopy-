  Beyoncé took home three Grammy Awards in Los Angeles on Sunday night, including best album.

  The star was recognised for her eighth album, Cowboy Carter, which celebrates and contextualises the black roots of country music.

  She also won the Grammy for best country album - to her evident surprise - in an announcement from Taylor Swift.

  Her haul of 35 trophies, won over more than two decades, makes her the most decorated artist in Grammy history.
