title: Liz Hatton, Harrogate teen with cancer who inspired Kate, dies - BBC News
date: '2024-11-27'
section: North Yorkshire
url: http://www.bbc.co.uk/news/articles/clyj0013n1po
content: |-
  Photographer Liz Hatton, 17, from Harrogate, died on Wednesday, her mother confirms.

  The Princess of Wales hugs Liz Hatton at Windsor Castle in October

  A teenage photographer who inspired Catherine, Princess of Wales, after pursuing a photography bucket list while facing a rare form of cancer, has died. Liz Hatton, 17, from Harrogate, North Yorkshire, died in the early hours of Wednesday morning, her mother Vicky Robayna announced on social media. On X, formerly Twitter, Ms Robayna said that Liz had "remained determined to the last" and was still making plans for her future on Tuesday. "We are so very proud of the kindness, empathy and courage she has shown in the last year," she wrote.

  Liz attending an exhibition of her work hosted by British Land and Getty Images at 2 Kingdom Street, Paddington Central, last week

  Liz began a photography bucket list appeal in January after being diagnosed with an aggressive desmoplastic small round cell tumour and was given between six months and three years to live. She was pictured being hugged by Catherine at Windsor Castle in October after being invited to take pictures of the Prince of Wales at an investiture. Catherine, who herself was treated for cancer this year, and William, in a personal message, described Liz as a "talented young photographer whose creativity and strength has inspired us both".

  Liz and her family saw the Prince and Princess of Wales at a private meeting

  Ms Robayna said on X that Liz "was not only a phenomenal photographer, she was the best human and the most wonderful daughter and big sister we could ever have asked for". "No-one could have fought harder for life than she did," she said. "There is a gaping Liz-shaped hole in our lives that I am not sure how we will ever fill." Ms Robayna offered her thanks to those who helped the teenager fulfil her dreams in her final months and those who liked and supported her work, adding: "You ensured Liz's last two months were her very best. She flew high until the end." She asked people to share one of Liz's photos in tribute and also to support the family's mission to fund research into desmoplastic small round cell Tumour, which has no charity specialising in the disease in the UK. Just a few weeks before she died, Liz had worked with one of her photography heroes, Rankin, at a photoshoot with professional models. After the shoot model Fifi Anicah said the pictures the teenager took were among some of her "favourite pictures of all time". As part of her bucket list, Liz also went on to photograph comedian Michael McIntyre, circus performers, the Royal Ballet, models from the Storm Model Agency, the London Air Ambulances from a helipad, hotel doormen and the red carpet at the MTV Europe Music Awards. Only last week she attended an exhibition of her work hosted by British Land and Getty Images in London. Listen to highlights from North Yorkshire on BBC Sounds, catch up with the latest episode of Look North or tell us a story you think we should be covering here, external.

