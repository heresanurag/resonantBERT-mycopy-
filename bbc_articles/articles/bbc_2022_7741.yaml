  His first race was at the Bishopscourt short circuit in 1993 but it was racing on public roads that became his primary passion. Among his greatest career achievements were a 250cc win at the North West 200 in 2005 and two victories in the same class at the Ulster Grand Prix in 2012 and 2017. Although he was very much associated with those two-stroke bikes, he was also accomplished on the larger capacity 600c and Superbike machines. The Saintfield racer won the Senior Manx Grand Prix in 2004 and also enjoyed success on numerous Irish national road race courses and at the Southern 100 on the Isle of Man. He competed at every TT since making his debut in 2002 and Monday's Supersport race was his 80th start. His TT career included a seventh-place finish in the 2006 Senior TT and a career-best fifth position in the 2008 Lightweight TT. His best lap around the TT Mountain Course was at an average speed of 125.134mph which he set in the 2010 Senior TT. Davy had recorded 49 finishes which included 25 top-twenty results, and his previous performances had earned him 14 Silver Replicas and 30 Bronze Replicas.
