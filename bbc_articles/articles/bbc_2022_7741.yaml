content: |-
  Northern Ireland rider Davy Morgan is killed in a crash during the Supersport race at the Isle of Man TT.

  Northern Ireland rider Davy Morgan has been killed in a crash during the Supersport race at the Isle of Man TT. The County Down rider crashed at the 27th Milestone on the third and final lap of Monday morning's event. Morgan, 52, from Saintfield, is the third competitor to lose his life at this year's TT. Welsh rider Mark Purslow died in a practice crash last week while sidecar driver Cesar Chanal suffered fatal injuries in an accident on Saturday. A statement issued by the race organisers it was "with a heavy heart" that they confirmed Morgan's death. "The Isle of Man TT Races pass on their deepest sympathy to Davy's partner Trudy, his family, loved ones, and friends," continued the statement. Morgan was an extremely experienced competitor who was a regular fixture in racing paddocks across Ireland, the Isle of Man and at the Macau Grand Prix for almost three decades.

