  Ms McAllister made nine recommendations, including a call for staff to have improved risk identification training and an insistence that all staff were "made aware of and understand their responsibilities during medical emergencies". The prison subsequently moved the first night centre from its location at the time of Ms McDonald's death to an internal wing to allow for greater nursing support. An MoJ representative said it was "recruiting more specialists to better support women in custody with complex needs and staff training on suicide and self-harm has been improved". "Our thoughts remain with the friends and family of Christine McDonald," they added.
