  The health minister says this shows why there is "urgency in terms of getting people vaccinated".

  That brings an end to this afternoon's live page after the Welsh government set out how it plans to carry out a booster programme amid fears the Omicron variant could become the dominant variant over the winter months. Here are some of the main points from today
  • All adults to be offered a booster jab by the end of January
  • Up to 200,000 people a week to be jabbed
  • People will be prioritised based on their age and medical vulnerability
  • People are being asked to attend their jab appointments as a priority
  • There could be some reductions to planned NHS care, but GP appointments should not be affected
  • Retired medics, the military and charities such as St John Ambulance could be drafted in to help For all the latest on the Omicron variant, click here
