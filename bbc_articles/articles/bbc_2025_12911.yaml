title: 'West Bank: Three Palestinians killed during Israeli settler attack - BBC News'
date: '2025-06-26'
section: Middle East
url: http://www.bbc.co.uk/news/articles/cz9knl5w529o
content: |-
  Israel's military says its forces returned fire after being shot at by Palestinians, but the Palestinian foreign ministry blames settlers for the deaths.

  Three Palestinians killed during Israeli settler attack on West Bank village

  Funerals were held on Thursday for the three Palestinian men killed in Kafr Malik

  Three Palestinians have been shot dead after dozens of Israeli settlers attacked a Palestinian village in the occupied West Bank, Palestinian authorities say. Video footage from Kafr Malik, external, near Ramallah, on Wednesday night showed a car and a home on fire and Palestinians running away as gunfire is heard. The Israeli military said forces deployed to the scene found settlers and villagers throwing stones at each other. It added that several "terrorists" opened fire and threw stones at the forces, who returned fire and identified hits. They also arrested five Israelis. The Palestinian foreign ministry said settlers fired at villagers in their homes during what it called their "terrorist assault".

  The ministry also said Israeli forces prevented ambulance crews from reaching the wounded and obstructed fire crews from entering the village for several hours. Another villager, a 13-year-old boy, was shot dead - reportedly by Israeli troops - earlier in the week. Israel has built about 160 settlements housing some 700,000 Jews since it occupied the West Bank and East Jerusalem - land Palestinians want, along with Gaza, for a hoped-for future state - in the 1967 Middle East war. An estimated 3.3 million Palestinians live alongside them. The vast majority of the international community considers the settlements illegal under international law - a position supported by an advisory opinion of the International Court of Justice (ICJ) last year - although Israel disputes this.

  A poster showing the three dead Palestinian men - Murshid Nawwaf Hamayel, Mohammed Qaher al-Naji and Lutfi Sabri Bearat - was on display in Kafr Malik

  "What do you expect us to do when our homes are being attacked by settlers with petrol bombs?" asked one elderly man, sitting quietly with hundreds of other mourners on Thursday after the funerals of the three men who were killed - Murshid Nawwaf Hamayel, Mohammed Qaher al-Naji and Lutfi Sabri Bearat. Kafr Malik has been attacked numerous times in recent weeks by settlers increasingly emboldened by Israeli government ministers who often support their actions and who have endorsed the building of many more settlements. "They think they can take my land and force me to leave, but I'm not going anywhere," said Hamdallah Bearat, a retired professor of engineering who has lived in Kafr Malik for most of his life. For many younger Palestinians, though, the realities of an increasingly restrictive occupation and its economic consequences make life here more difficult by the day.

  Hamdallah Bearat said he would resist attempts to force him to leave his home

  Shortly after the incident in Kafr Malik, there was another attack in the Palestinian community of Dar Fazaa, near the village of Taybeh. Israeli human rights group B'Tselem said three people were injured and three cars were torched. It posted CCTV footage showing a group of at least 10 masked men setting one car on fire and throwing stones. "The settler violence and rampage, under the protection of the occupation army, is a political decision by the Israeli government, implemented by the settlers," Palestinian Vice-President Hussein al-Sheikh wrote on X. "The Israeli government's behaviour and decisions are pushing the region toward an explosion. We call on the international community to urgently intervene to protect our Palestinian people."

  Since Hamas's attack on southern Israel on 7 October 2023, which triggered the war in Gaza, more than 900 Palestinians have been killed by Israeli forces in the West Bank - a period in which more than 20 Israelis have also been killed. There has also been a sharp increase in the number and severity of settler attacks in the West Bank over the same period. The UN says there were 487 attacks by settlers resulting in casualties or property damage in the first four months of this year, including 122 in April. At least 181 Palestinians were reportedly injured by settlers in the attacks. Human rights organisations and witnesses say the Israeli military and police frequently stand by while settlers attack Palestinian towns and villages.

  Israeli settlers set fire to cars and other property in Kafr Malik

  Since the right-wing, pro-settler governing coalition headed by Prime Minister Benjamin Netanyahu took office in late 2022, it has decided to establish 49 new settlements and begin the legalisation process for seven settler outposts which were built without government authorisation, according to the Israeli anti-settlement watchdog Peace Now. Last month, Israeli ministers said 22 new settlements had been approved across the length and width of the West Bank, hailing it as a move that "prevents the establishment of a Palestinian state that would endanger Israel". In a separate incident on Wednesday, a 15-year-old Palestinian boy was shot and killed by Israeli forces in the town of al-Yamoun, near Jenin, the Palestinian health ministry said. The Israeli military said "terrorists" threw explosive devices at its forces during an operation there. Afterwards, they approached while holding additional explosives and the forces responded by opening fire, it added. In January, Israeli forces launched a large-scale operation against Palestinian armed groups in Jenin and two other governorates in the northern West Bank, which Netanyahu said aimed to "defeat terrorism". The UN's human rights chief said in April that the operation had destroyed entire refugee camps and makeshift medical sites, and displaced more than 40,000 Palestinians, who had been told not to return to their homes for a year.
