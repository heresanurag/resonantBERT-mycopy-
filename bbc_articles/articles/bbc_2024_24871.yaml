title: Bradford driver ran over victim in 'revenge attack' - BBC News
date: '2024-10-12'
section: Bradford
url: http://www.bbc.co.uk/news/articles/cr75ppnd00po
content: |-
  Shamrez Razaq is jailed for more than seven years after breaking the man's ankle with his car.

  Shamrez Razaq was jailed at Bradford Crown Court on Friday

  A driver who broke a man's ankle after running him over in a "revenge attack" has been jailed. Shamrez Razaq, 28, used his car to knock his victim to the ground then drive over him on 5 January, Bradford Crown Court heard. The man, aged 19, was then attacked by Razaq and four others, who kicked him as he lay injured in the street. Judge Ahmed Nadim sentenced Razaq, of Fairbank Road, Bradford, to seven years and six months imprisonment after he pleaded guilty to causing grievous bodily harm with intent, dangerous driving and assault.

  The judge told Razaq, who had no previous convictions, he would have to serve two-thirds of his sentence before being considered for release. Razaq was also banned from driving for seven and a half years.

  The attack began in Hoxton Street, Bradford, on 5 January

  The court heard Razaq initially drove into his target and another person in the Hoxton Street area on 5 January. When the man ran off, Razaq pursued him in an Audi along with other accomplices and drove into his victim again when they caught up with him in a nearby cul-de-sac. Razaq struck the man again with the car and broke the complainant’s ankle when he drove over him. The court heard Razaq then got out of the car and joined in with at least four others in kicking the complainant while he was on the ground. It is thought the attack was in response to something that had happened to a relative of Razaq. Judge Nadim said Razaq had engaged in planned violence and showed little regard for other members of the public who got caught up in it. Passing sentence, the judge said: “You engaged in this violence out of revenge and the violence was persistent in its nature." Listen to highlights from West Yorkshire on BBC Sounds, catch up with the latest episode of Look North or tell us a story you think we should be covering here, external.
