id: bbc_2019_11293
title: Sri Lanka elephant runs amok in religious procession - BBC News
date: '2019-09-09'
section: General
url: http://www.bbc.co.uk/news/world-asia-49632026
content: |-
  At least 17 people were injured at a religious procession when two elephants reportedly ran amok.

  At least 17 people were injured at a religious procession in Kotte, Sri Lanka when two elephants ran amok, according to local reports.

  Footage captured by a local news outlet showed one of the elephants running down a street.
