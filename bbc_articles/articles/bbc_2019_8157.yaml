  The weather looks good for Sunday's World Cup final. Although it may start out cloudy with a little light drizzle first thing in the morning, rain isn't likely to cause any interruption to play at all. Most of the day should be dry, with sunny spells breaking through by the afternoon. The wind will be light and temperatures will climb to around 20C.
  • None England have won seven of their past nine ODIs against New Zealand, including a 119-run victory in the group stage of the World Cup.
  • None Before England's triumph over New Zealand in this tournament, they had not beaten the Black Caps in the World Cup since 1983, suffering five consecutive defeats.
  • None This will be England's seventh World Cup match at Lord's. They have won four of their previous six games but lost their solitary fixture at this venue in this World Cup (a 64-run defeat by Australia).
  • None England have played one more match than New Zealand at this year's World Cup (India v New Zealand in the group stage was abandoned), yet England have still hit more than 1,000 more runs than the Black Caps, including 100 more fours and 53 more sixes.
  • None The team winning the toss have lost four of the past five World Cup finals, Australia's win over Sri Lanka in 2007 the exception.
