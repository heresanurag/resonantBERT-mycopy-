  Walsall Council earlier confirmed the source of the spillage had been identified and stopped. Wildlife experts said the spillage's impact would be devastating while a couple on a narrowboat said they had been trapped on the canal since Monday as they had not been able to pass through locks due to the water testing. "We’re testing all points of that affected area currently and we’ll be reviewing those results as they come through," Walsall Council's interim director of public health, Nadia Inglis, said. "We’ll be removing those restrictions and hopefully reducing the size of that potentially affected area where we are confident there isn’t a risk to health." The exclusion zone markers run from the Walsall lock flight to lock flights at Rushall/Ryders Green in the borough and Perry Barr in Birmingham.

  People were still being urged to avoid a 12-mile stretch of the canal network on Wednesday morning following the spill

  Sodium cyanide dissolves in water and can have serious adverse health effects if people or pets come into direct contact with it, the council advised. Anyone exposed to the water who felt unwell should seek medical advice through the NHS 111 service or phone 999 in an emergency, a spokesperson for the authority added. People living on boats on the canal in the affected area were being made aware of the spill, the Canal and River Trust said. Dr Inglis added: “Our primary aim has been to keep the public safe and to protect their health and wellbeing. "Given the nature of the substance, we’re taking a cautious approach to protecting our public until we know it’s safe to open those canal towpaths again.”

  Walsall Council leader Garry Perry said on Tuesday it was too early to speculate on how the cyanide got into the canal
