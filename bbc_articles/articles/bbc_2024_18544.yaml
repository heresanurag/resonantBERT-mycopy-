content: |-
  A major incident is declared in Walsall after sodium cyanide spilled into the canal network.

  A major incident was declared on Tuesday as the leaked chemical was confirmed to be sodium cyanide

  A "chemical incident" resulted in a toxic spillage affecting a 12-mile stretch of canals in the West Midlands, the firm involved said. Anochrome Ltd, which deals in surface coatings and sealing, said the incident "regrettably" released chemicals into the Walsall waterway in the early hours of Monday. Marc Lidderth, the Environment Agency's (EA) West Midlands area director, said the release of sodium cyanide into the water was "unacceptable" and strong action would be taken if there was any wrongdoing. People have been urged not to go near a long section of the canal network from the middle of the borough to Birmingham and connected waterways in Wednesbury, Tipton and West Bromwich.

  Anochrome Ltd on Reservoir Place, Walsall said it was focused on limiting the impact of the spill

  Sodium cyanide, which can cause seizures, vomiting and loss of consciousness, was confirmed as the chemical spilled into the waterway in Walsall. Anochrome said it had immediately notified the EA and Severn Trent Water following the incident. "Our senior management team has been – and remain - on-site working collaboratively with all relevant authorities and agencies to minimise and contain the spill," it said.
  • None Canal cyanide spill: Where is it and what are the dangers

  The company added it had made all facilities available to the authorities and agencies, including inhouse laboratory testing facilities. "The safety of our community and the environment is our top priority. We are focused on limiting the impact of this incident and will provide further updates as they become available," it added. Speaking to BBC Midlands Today, the EA's Mr Lidderth said Anochrome Ltd, which describes itself as an "environmentally aware organisation" on its website, was regulated by the EA. He said sodium hydroxide and "possibly zinc" were also thought to have entered the canal. "It is unacceptable that this has entered the watercourse and we're doing investigations into what has actually caused that and why it has escaped from their site into the canal system," he added.

