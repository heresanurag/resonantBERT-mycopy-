  Dr Delia Garratt, chief executive of Birmingham and Black Country Wildlife Trust said the spillage would have a devastating impact on wildlife. She added she hoped those responsible would face the full force of the law. "Environmental watchdogs must be empowered and sufficiently resourced to ensure they can monitor and inspect polluters, and enforce penalties upon those who break the law," she said.

  Daisy Hampshire said news of the spillage had made her emotional

  Boater Daisy Hampshire, 55, who spends her summers on the canals, said she was angry and sad. “It’s part of our heritage. It’s been here 200 years and it’s still here after 200 years," she said. “As long as someone’s held accountable - floaters as a community are amazing, we will club together and we will start again.” She was in the area for the Brownhills Canal Festival this weekend, not currently affected by the spillage. However, the Narrow Boat Trust, which was due to have two historic boats at the festival, has decided not to attend, citing the difficulty of getting there and back in time due to the canal exclusion zone.

  Bruce Crook and his wife Lauris have been unable to pass through the locks on the canal in Rushall, Walsall

  Bruce and Lauris Crook, 72 and 70, originally from New Zealand, have been unable to pass through the locks on the canal in Rushall, Walsall, since Monday. "We registered with the Canal and River Trust as an interested party and they'll let us know when they're happy that the boats start moving again," Mr Crook said.

