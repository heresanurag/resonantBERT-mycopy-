  • None Meanwhile, the Crown Prosecution Service (CPS) said it has charged close to 400 people in connection with the disorder following the fatal stabbing of three girls in Southport
  • None And Home Office minister Jess Phillips admitted she made a "mistake" in her response to a video showing masked men confronting a reporter last week On Wednesday evening, Staffordshire Police said it had arrested five men and a teenage boy in connection with violent disorder in Stoke-on-Trent and Tamworth. The six, aged 17-54, remained in custody on Wednesday evening. Two men from Tamworth had also been charged in relation to violent disorder in the town, added the force. Simon Orr, 38, is accused of violent disorder and assault by beating of an emergency worker, while Martin McCluskey, 60, faces one charge of violent disorder and two of assault by beating of an emergency worker. In Sweeney's case, the prosecution told the court the Facebook group she posted in usually carries items about local events and lost and found items, and has just over 5000 members. Sarah Badrawy, prosecuting, accepted Sweeney’s post was made out of anger and was reckless rather than genuinely intended to put people in fear. John Keane, for the defence, argued his client was the primary carer for her husband, and had lived a "quiet, sheltered life in Cheshire". Sweeney had never been in trouble before and was genuinely remorseful, Mr Keane added.

  As he jailed her, Judge Stephen Everett said: "You should have looked at the news with horror, like right minded people. "Instead, you chose to take part in stirring up hatred. It was a truly terrible threat." The judge said no-one had suggested Sweeney would have taken part in any violence, but "so called keyboard warriors like her, have to learn to take responsibility for their inflammatory and disgusting language". Sweeney wiped away tears as she was jailed and said "thank you, your honour", before she was taken down.

  Following the hearing, Cheshire Police said people may think posting hateful messages on social media offered them some sort of anonymity, but they were wrong. "As this case demonstrates, there is nowhere to hide," said a spokesperson.
