title: Mosque explosion threat woman jailed over Facebook post - BBC News
date: '2024-08-15'
section: England
url: http://www.bbc.co.uk/news/articles/cz6x105wgz5o
content: |-
  Julie Sweeney, 53, had suggested the Southport mosque "should be blown up with the adults inside."

  Julie Sweeney was arrested after posting on a community Facebook page

  A woman who called on Facebook for a mosque to "be blown up with the adults inside" has been jailed for 15 months. Julie Sweeney, 53, of Cheshire, admitted a charge of sending a communication threatening death or serious harm, when she appeared at Chester Crown Court. Sweeney, from Church Lawton near Alsager, posted the comment after riots flared across England in the wake of the killings of three young girls in Southport, last month. The court heard she was responding to an online post picturing people helping to repair the mosque in Southport after it was damaged during violent disorder that followed the stabbings.

  The court was told Sweeney wrote: "It’s absolutely ridiculous. Don’t protect the mosque. Blow the mosque up with the adults in it." She was one of a number of people appearing in courts across England on Wednesday following widespread riots.
