title: 'Gulf of Oman tanker attacks: US video shows ''Iran removing mine'' - BBC News'
date: '2019-06-14'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-48633166
content: |-
  The BBC's Frank Gardner looks at the evidence the US says proves Iran's involvement in Thursday's attacks in the Gulf of Oman.

  The US has released footage showing what it says are Iranian forces removing an unexploded limpet mine from the side of a ship in the Gulf of Oman.

  The US also released images of the Japanese tanker apparently showing the unexploded mine before it was removed.

  The BBC's security correspondent Frank Gardner looks at the evidence the US says proves Iran's involvement in Thursday's attacks.
