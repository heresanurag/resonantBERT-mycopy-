  Fr Michael Meade, chief celebrant at the funeral Mass, talked of how Ashling's family had been "robbed" of a precious gift - a term that succinctly summed up the callous nature of the 23-year-old's death.

  Pupils from Ashling Murphy's class held photographs and roses outside St Brigid's Church in Mountbolus

  The rural, local nature of the area was encapsulated by the farmer who opened his fields to mourners in cars and buses, as gardaí (Irish police) marshalled them in.

  His fields have held the overflow from funerals before, but never for one like this.

  Ahead of the funeral, Fr Meade spoke of the fact that "something powerful" would come out of this, reflecting on the outpouring of grief and support from around the world.

  Bishop Tom Deenihan, Bishop of Meath, told mourners that the "chink of light" was that wave of sympathy, manifested by the vigils in Ashling's honour and the support to her family over recent days.

  "Community is needed to overcome evils such as this," he said.
