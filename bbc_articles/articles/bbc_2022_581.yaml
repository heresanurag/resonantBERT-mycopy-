title: 'Ashling Murphy: ''Community is needed to overcome such evil'' - BBC News'
date: '2022-01-18'
section: Europe
url: https://www.bbc.co.uk/news/world-europe-60040080
content: |-
  Mourners say "nothing is going to be the same again" after the killing of Ashling Murphy.

  Ireland's president and taoiseach (prime minister) were among the mourners at Tuesday's funeral mass

  The children, neat and sombre in their navy school uniforms, strained to catch a glimpse as the flashing blue lights of the police motorcycles heralded the arrival of the funeral cortege.

  Each clutched a graduation photo of Ashling Murphy and a single red rose, their innocence contrasted with the tragic backdrop.

  They were there to pay tribute to a beloved young primary school teacher and talented musician, attacked and killed as she exercised along a nearby canal in the small, rural Irish community less than a week earlier.

  Her death has sparked anger, shock and revulsion across these islands and further afield, prompting a national discussion on how to end violence against women.

  Dave Plunkett walks every day on the canal path.

  "Everyone feels a real connection to her. It just feels like nothing is going to be the same again," he said.

  And for the many, many people who knew and loved Ms Murphy in this County Offaly community, that is the case.

  For them, this is raw and visceral. They're confronting the unimaginable. In the six days since the killing, they have struggled to comprehend the violence that has been brought to their quiet community.

  Hours after Ms Murphy's funeral, Irish police said they had arrested a man in his 30s on suspicion of her murder.

  The night before the funeral, local resident Mary Givan brought fresh batteries for the fairy lights on a makeshift memorial to Ms Murphy along the Grand Canal, and cleared spent tea lights.

  Her daughter was in the same year as Ashling at school.

  "This is a mother's fear now," she said. "If you let your daughters out, they can't go out on their own. We can't either.

  "To keep the light burning for her, that's all we can do."

  Ashling Murphy's boyfriend Ryan Casey was hugged by Irish President Michael D Higgins outside the church

  The area is not accustomed to public expressions of heartbreak and sorrow, although there were elements of both outside St Brigid's Church in Mount Bolus on Tuesday.

