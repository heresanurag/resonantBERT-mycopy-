id: bbc_2020_1078
title: 'Australia bushfires: The race to save animal casualties - BBC News'
date: '2020-01-12'
section: General
url: http://www.bbc.co.uk/news/world-australia-51082887
content: |-
  Wildfires have wreaked devastation to wildlife on Australia's third largest island.

  Vets have been joined by volunteers to help with the treatment of animals injured in the bushfires on the wildlife haven of Kangaroo Island, Australia.

  Two people and tens of thousands of animals were killed as fires swept through valued habitats, destroying areas it's estimated cover up to half of the island.
