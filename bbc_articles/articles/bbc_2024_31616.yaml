title: Archbishop of York 'regrets' that abuse scandal priest David Tudor was reappointed
  twice - BBC News
date: '2024-12-22'
section: UK
url: http://www.bbc.co.uk/news/articles/cz7qpdl4jdyo
content: |-
  Stephen Cottrell knew former priest David Tudor had paid compensation to a woman who says Tudor abused him as a child.

  Archbishop of York 'regrets' that abuse scandal priest had role renewed twice

  A Church of England priest at the centre of a sexual abuse case was twice reappointed to a senior role in his diocese during the Archbishop of York's time as Bishop of Chelmsford, the BBC can reveal. A BBC investigation previously revealed how David Tudor remained in post nine years after Stephen Cottrell was first told of concerns about him. New information shows Tudor's contract as area dean in Essex was renewed in 2013 and 2018, at which times Mr Cottrell knew he had paid compensation to a woman who says she was abused by him as a child. The Archbishop of York said he regrets his handling of the case, with a spokesperson saying "he acknowledges this could have been handled differently".

  They added that "all the risks around David Tudor were regularly reviewed" and that was the "main focus". The pressure on Mr Cottrell comes at a time of turmoil in the Church of England following a damning report into how it covered up prolific abuse by the barrister John Smyth. The report led to the resignation of the Church's most senior figure, Archbishop of Canterbury Justin Welby. Mr Cottrell will take over his role temporarily for a few months in the New Year. Rachel Ford, who told the investigation she was groomed by Tudor as a child, said the renewal of his contract as area dean was "an insult to all of his victims". Ms Ford added that if responsibility for that lay with Mr Cottrell, it strengthened her feeling that he should resign. The BBC investigation showed Mr Cottrell was briefed in his first week as Bishop of Chelmsford about serious safeguarding issues surrounding Tudor. These included that Tudor was convicted of indecently assaulting three underage girls and was jailed for six months in 1988, although the conviction was quashed on technical grounds. Mr Cottrell would also have known Tudor served a five-year ban from ministry. By 2012, Mr Cottrell also knew Tudor had paid a £10,000 settlement to a woman who says she was sexually abused by him from the age of 11. In 2018, the Church of England issued an apology and a six-figure pay-out to another alleged victim. Yet the priest was suspended only in 2019 when a police investigation was launched after another woman came forward alleging Tudor had abused her in the 1980s.

  David Tudor after being presented with a certificate signed by Bishop Stephen Cottrell making him an honorary canon of Chelmsford Cathedral in 2015

  When first responding to the BBC's investigation, the Archbishop of York said he was "deeply sorry that we were not able to take action earlier", insisting he had acted at the first opportunity that was legally available to him. Mr Cottrell also said he had been faced with a "horrible and intolerable" situation and that it was "awful to live with and to manage". When Mr Cottrell became bishop in 2010, Tudor was into the second year of a five-year term as an area dean, a role overseeing 12 parishes in Essex. His appointment to that post, under a different bishop, happened despite him working under a safeguarding agreement that barred him from being alone with children and entering schools. The title was renewed twice under Mr Cottrell - in 2013 and 2018 - and he lost the title only when the term of office expired in 2020. It was not taken from him. A spokesperson for the Archbishop said he "accepts responsibility for David Tudor remaining as area dean". "No-one advised him that David Tudor should not continue as an area dean," said the Archbishop's office.

  Bishop of Newcastle Helen-Ann Hartley posted on X that Mr Cottrell's expressions of regret did not "square" with his actions. "I don't know how you can find a situation 'horrible and intolerable' and then square that with what is reported here. "Answer is, you can't and be expected to be a credible voice as the leadership of the Church of England."

  The Reverend Lucy Winkett, Rector of St James's Piccadilly, told the BBC that the Church's credibility is "in serious trouble". "The credibility of the church, yes it's in... we're in serious trouble in terms of our credibility, but the job of the leaders in the church like me is to keep reminding ourselves who we're here for", she told BBC Radio 4's The World This Weekend on Sunday. The programme also spoke to the Bishop of Gloucester, the Right Reverend Rachel Treweek, who said she felt "shock and dismay" upon hearing the latest findings about the Archbishop of York. Pushed for a direct answer on whether she supports Mr Cottrell's role in Church, she said: "I want the proper process to take place, in order that we shape ourselves as the right sort of Church going forward, and that for me is the big question".

  Another of Tudor's victims, who does not want to be identified, said she was "shocked and disappointed" to hear his tenure as area dean was twice renewed during Mr Cottrell's time as Bishop of Chelmsford. "These are not the actions of a bishop dealing with a situation that was intolerable to him, in fact, quite the opposite. I call on him to do the honourable thing for the sake of the Church and resign," she says. In 2015, under Mr Cottrell, Tudor was also made honorary canon of Chelmsford Cathedral. The Archbishop's office insisted it happened because of a change in Church policy during Mr Cottrell's time as Bishop of Chelmsford, meaning area deans were automatically made honorary canons. It was "not a promotion and not a personal reward". However, a social media post from Tudor's Canvey Island parish in July 2015 suggests it was seen there as a reward. Tudor's "hard work, determination and commitment to this place have been recognised by the diocese and this new position in the Church is very well-deserved," it said.

  The BBC has also seen evidence - in leaked minutes from internal Church meetings in 2018 and 2019 - that Tudor's titles of area dean and honorary canon were discussed and there had been a suggestion Mr Cottrell could immediately have taken them away. In October 2018, a meeting at Church House - the London headquarters of the Church of England - heard that Chelmsford diocese took the view that if Tudor "can be a parish priest, he can undertake the other roles". A bishop from another diocese said "the Bishop of Chelmsford could remove DT's [David Tudor's] canon and area dean titles straight away". But in a follow-up discussion in November 2018, Chelmsford diocese advised it would not be appropriate because of "the difficulty of removing those titles without explaining why." We asked Mr Cottrell's office why he had not followed the suggestion to remove Tudor's titles. We were told "it would not be appropriate to comment on any notes or decisions from a core group process which are confidential". The investigation also highlighted the significant role played by former Archbishop of Canterbury George Carey in the case. We revealed Lord Carey had agreed to Tudor's return to priesthood after being suspended in 1989, and had also agreed to have Tudor's name removed from the list of clergy that had faced disciplinary action. He had also advocated for the priest. After the BBC put this information to the former Archbishop of Canterbury, he wrote to give up his "permission to officiate", ending more than 65 years of ministry in the Church of England. Lord Carey made the announcement on Tuesday. In October 2024, Tudor admitted sexual misconduct and was sacked by the Church. At no point has he responded to the BBC's attempts to speak with him.
