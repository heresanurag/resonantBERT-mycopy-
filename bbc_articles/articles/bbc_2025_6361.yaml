title: 'Newspaper headlines: ''Blast chance saloon'' and ''Katy roars into space''
  - BBC News'
date: '2025-04-14'
section: The Papers
url: http://www.bbc.co.uk/news/articles/cz0195g4512o
content: |-
  Many of Monday's front pages cover the government's "race against time" to keep British Steel's furnaces burning.

  The government's next steps after taking control of British Steel's Scunthorpe plant dominated Monday's front pages

  The Guardian says, external British Steel is understood to be looking at offers of help from more than a dozen businesses, including rivals, as it tries to find the raw materials needed to keep its Scunthorpe plant open. It says the firm's management is in a race against time, with help from government officials, after ministers took over control of the struggling company at the weekend. The i Paper reports, external that China may be blocked from critical UK sites in the future, after accusations of sabotage were levelled against Scunthorpe's Chinese owners. The Times says, external government insiders believe Jingye intended to stop the UK producing steel from scratch, to force it to rely on imports from China. The Financial Times leads, external with the latest twist of the American tariffs drama, saying technology firms such as Apple and Microsoft - who thought they had got a reprieve - have had their hopes dashed. It says US President Trump's commerce secretary, Howard Lutnick, has insisted the exemption for smartphones and computers will be brief. He has said separate tariffs will come in soon for semi-conductors.

  Several papers still focus on the attack on prison officers by Hashem Abedi, the brother of the Manchester Arena bomber. The Daily Mirror's front page, external headline asks "why on earth did he have boiling oil?". It says prison staff are calling for rapid action to protect them, while the Daily Mail says, external MPs think it is "time to stop appeasing extremists in our jails". The decision to bring in Army planning experts to tackle the Birmingham bin strike is described by The Daily Telegraph, external as "desperate". The paper says the move also risks inflaming tensions between Labour and unions, after one of the city's Labour MPs accused Unite of holding one-point-two million residents "to ransom". The headline in the Times, external is dismissive of the military's role, saying the Army is to "tackle the bin strike... from the office". And the American pop singer, Katy Perry, is pictured on many of the front pages, ahead of her trip to space on the Blue Origin rocket, owned by Amazon's Jeff Bezos. The Daily Express, external says she is "Popping off to space". The Telegraph calls her, external a "rising star".

