  • None Harvey Weinstein timeline: How the scandal has unfolded The retrial in New York centred on two women who brought allegations against Weinstein during his 2020 trial, Ms Mann and Ms Haley. It also included new allegations from Ms Sokola, a Polish former model and actress, who accused Weinstein of sexually assaulting her when she was 19. The jury on Wednesday found him not guilty in that assault. Reacting to the verdict, Ms Sokola said she was “relieved that Harvey Weinstein will be held accountable for some of his crimes”. “Coming forward was the hardest thing I've ever done. I owed it to myself, and to the other women who survived him, to make sure that the world knows what kind of man Harvey Weinstein is. “Speaking out was an act of power and it allowed me to reclaim the pride and confidence he tried to take from me,” she added in a statement. The three women testified for days about the sexual abuse they alleged they endured at the hands of Weinstein. All three said they met Weinstein when they were young and looking for work opportunities in the entertainment industry. He then forced himself on them during private meetings at hotels and his homes, the women alleged.

  His legal team argued that his sexual encounters with the women were all consensual and a sort of "friends with benefits" arrangement. Weinstein's attorneys attempted to chip away at the credibility of the women, showing warm messages some of the women exchanged with the film mogul after the alleged assaults. In total, Weinstein has been accused of sexual misconduct, assault and rape by more than 100 women. While not all reports resulted in criminal charges, the California conviction means he is likely to spend the rest of his life in prison. The decision by his accusers to come forward, and his subsequent conviction in New York, galvanised the #MeToo movement against sex abuse by powerful men. Before the allegations against him emerged, Weinstein and his brother Bob were among Hollywood's ultimate power players. Weinstein co-founded Miramax film studio, whose hits included Shakespeare in Love, which won best picture at the Academy Awards, and Pulp Fiction. Weinstein has also faced a number of civil lawsuits, including from a group of women who accused him of sexual harassment and rape. The case resulted in a $19m (£14.2) settlement in 2020.
