  People in the US describe their feelings about going to Donald Trump's inauguration in Washington DC

  US President-Elect Donald Trump will be inaugurated on January 20.

  People are travelling from near and far to see history being made in Washington DC.

  Here, Mr Trump's supporters, who will be making the journey to the capital, share their excitement about the event.
