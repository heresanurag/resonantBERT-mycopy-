title: Twiglet back home after dognapping caught on camera - BBC News
date: '2024-04-22'
section: General
url: http://www.bbc.co.uk/news/uk-66343709
content: |-
  Video of the dachshund being abducted from her home by a burglar went viral on social media.

  Twiglet the dachshund has been safely returned home after being stolen by a burglar who broke into her owner's property.

  Jo Vindis spoke to the BBC, saying she was elated that her pet had been found.

  Security camera footage showed the animal being captured by a man holding a hammer. Police shared the video online and it was widely circulated, which contributed to the dog's return.

  Essex Police said inquiries were ongoing and no arrests had been made.
