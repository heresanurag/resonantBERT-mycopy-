title: 'PMQs latest: Rishi Sunak to face Keir Starmer as strikes grow and pressure
  piles on Raab - BBC News'
date: '2023-02-01'
section: UK Politics
url: http://www.bbc.co.uk/news/live/uk-politics-64483811
content: |-
  The Labour leader accuses the PM of being too weak to sack the deputy PM over bullying allegations, but Mr Sunak says he is following the correct procedures.

  No strike talk from Labour leader - instead a focus on cabinet controversies

  Ethics and Rishi Sunak’s leadership were the focus of Sir Keir Starmer’s attacks. Strikingly there was no strike talk from the Labour leader. Instead he sought to focus attention on how much Rishi Sunak did know, or should have known, before he appointed both Nadhim Zahawi and Dominic Raab to his cabinet. Labour is trying to build a narrative that Sunak is “weak” and ineffective. What was noticeable was that Sunak read his carefully worded responses - that he took action as soon as he was aware of “new information” - and that he then tried to turn the tables with political attacks on the Labour leader, for his links to Jeremy Corbyn and repeating criticism of Labour voiced by one of its MPs, Rosie Duffield. It was Sunak who raised the issue of strikes and Labour’s links to the unions. The Labour leader’s reply was that seeking to blame his party for strikes after 13 years of Conservative government was “rank pathetic”.
