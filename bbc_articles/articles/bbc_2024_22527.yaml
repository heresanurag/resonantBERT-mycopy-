  PM: State of flats owned by Labour MP 'unacceptable'

  Sir Keir Starmer has said that the condition of rental flats owned by a Labour MP is "unacceptable".

  The BBC found flats owned by Jas Athwal, the Labour MP for Ilford South, contained dirty communal areas, lights that did not work and fire alarms hanging loose from the ceiling.

  Mr Athwal said he was "shocked and sickened" by the state of the flats and has since sacked the agency which manages his rental flats.
