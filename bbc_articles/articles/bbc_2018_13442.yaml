title: HMP North Sea Camp absconded rapist found in Sleaford - BBC News
date: '2018-11-26'
section: Lincolnshire
url: http://www.bbc.co.uk/news/uk-england-lincolnshire-46339806
content: |-
  Wayne Jones, who is serving a life sentence, went missing from HMP North Sea Camp on Sunday.

  A convicted rapist who absconded from an open prison has been found in a town 25 miles away.

  Wayne Jones, who is serving a life sentence at HMP North Sea Camp near Boston in Lincolnshire, was arrested in nearby Sleaford earlier.

  The 39-year-old was reported missing from the Category D open prison on Sunday evening.

  In July, HMP North Sea Camp was criticised for referring to its inmates as "residents" rather than prisoners.

  But an Independent Monitoring Board report said the policy "seemed to be working well with a polite and calm atmosphere being created".

