title: Former One direction singer Liam Payne dies in hotel balcony fall - BBC News
date: '2024-10-16'
section: Culture
url: http://www.bbc.co.uk/news/articles/c1wnxp970pdo
content: |-
  The singer fell from the third floor of a hotel in Buenos Aires, Argentina, police say.

  This video can not be played To play this video you need to enable JavaScript in your browser.

  Liam Payne, the former One Direction star, has died aged 31 in Argentina after falling from the third floor of a hotel in Buenos Aires, police say. In a statement, police said they discovered Payne's body after an emergency crew responded to an call in the upscale neighbourhood of Palermo on Wednesday. On Thursday, police in Buenos Aires said a preliminary autopsy suggests Liam Payne died from external and internal bleeding injuries. The police inspected the area where Payne fell, and found items including alcohol and a phone. Medication was found in his room. Payne had risen to global fame as part of the much-loved boyband created on the X Factor TV show in 2010, along with Harry Styles, Louis Tomlinson, Niall Horan and Zayn Malik.

  According to police in Buenos Aires, officers at the scene were initially responding to reports "of an aggressive man who may have been under the effects of drugs and alcohol". When they arrived at the hotel, officials were told a loud sound had been heard in an interior courtyard. Soon after, they discovered the body there. A police investigation was then launched. Emergency medical services director Alberto Crescenti told local media that Payne had suffered "serious injuries" and that an autopsy will be carried out. Mr Crescenti declined to answer questions about the circumstances of Payne's fall from the balcony. The star's body has been transferred to a morgue in the city.

