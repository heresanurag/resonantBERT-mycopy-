  Police in Buenos Aires confirmed on Thursday that an inspection of the scene where Payne fell has been carried out on the hotel’s ground floor. They said that a bottle of whiskey, a lighter, and a mobile phone were found. Police said "everything indicates that the musician was alone when the fall happened", and that he had died at the scene and there were no injuries that suggested a third party had been involved. In the hotel room where Payne was staying, staff found “total disorder” including “various items broken.” They said this included several packets of medication, including Clonazepam, external, as well as over-the-counter medications. A notebook and passport were also found at the scene.

  Evidence and finger prints have been collected and the room’s balcony has also been inspected to establish access to it. Five witness statements were taken by the police on the night, three from hotel employees and two from women who had been in the room with Payne earlier on, but were not there at the time of the fall. Payne posted on Snapchat just hours before the incident, saying: "It's a lovely day here in Argentina" but the video was from earlier in the week where he had spent time with his girlfriend Kate Cassidy.
