title: 'Ballymena: Man dies after multiple-vehicle crash - BBC News'
date: '2024-10-02'
section: Northern Ireland
url: http://www.bbc.co.uk/news/articles/cm2yz70xyelo
content: |-
  Police say the Crankill Road remains closed after a man has died after a multiple-vehicle collision.

  A man has died following a collision involving a number of vehicles in County Antrim, police have said.

  The crash happened on the Crankill Road dual carriageway, outside Ballymena, on Tuesday evening.

  The road remained closed on Wednesday morning with diversions in place but has since reopened.
