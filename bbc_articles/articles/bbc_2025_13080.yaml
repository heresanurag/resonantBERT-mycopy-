title: Wales must learn from painful Italian lesson - boss Wilkinson - BBC Sport
date: '2025-06-03'
section: UEFA Women's Euro
url: http://www.bbc.co.uk/sport/football/articles/c5ykvdj13nzo
content: |-
  Rhian Wilkinson tells her Wales side to learn from painful lessons after likening the firsst-half of their 4-1 defeat by Italy to "a punch in the face".

  To play this video you need to enable JavaScript in your browser. This video can not be played

  Wales head coach Rhian Wilkinson has told her side to learn from painful lessons after likening the first-half of their Nations League defeat by Italy to "a punch in the face". In their final fixture before this summer's European Championships, Wales suffered their heaviest defeat under Wilkinson at the worst possible time. But despite warning her side that "hard moments are coming", Wilkinson said they will be better for the loss having taken heart from an improved second-half showing. Wales were four down at half-time as their defence crumbled in Swansea and Wilkinson said: "The first-half felt like a punch in the face. "Games in this campaign have been really tight, but we haven't had a heavy defeat like this - so that first half was important because who do we want to be? "That second-half is more indicative of the Welsh team we all know. We're going to look back on it as an important moment for us."

  Wilkinson's side had been defensively impressive for most of their League A campaign, but before a summer in which they will face the Netherlands, France and England in their Euro 2025 group, the former Canada international said Wales were shown what happens when you "tune out". "Italy punished us for every mistake and we have to react faster," Wilkinson said, who included herself and her coaching staff in accepting they needed to learn lessons. "Hard moments are coming; this is a hard thing we're about do, the Euros are going to be very difficult. "We're going to have to be at our best and what we have learned is any mistake will be punished." Wales rallied after the interval to give Wilkinson belief there will be no scarring heading towards Switzerland. She added: "I told the players at the end we can't say this was a good performance and what happened to us wasn't good. "But you do get to choose how you react to adversity. Good teams turn into great teams with how you react. How we finished is something I can be happy and proud of."

  Wales' fans in Swansea were lifted by a wonder goal from Jess Fishlock, a record-estending 47th goal in an unmatched 162 appearances for her country. Striking home from 35 yards, Wilkinson repeated her appeal to fans to appreciate the 38-year-old while she still wears her country's shirt. "With magic moments like that, I hope the Welsh public is aware of the special talent they have and don't take it for granted," Wilkinson said. "Whenever she's on the field something's happening."

  Fishlock gained important match minutes off the bench after a recent injury lay-off, while Wilkinson will now wait for news on defenders Rhiannon Roberts (groin) and Mayzee Davies (knee) before naming her squad for Switzerland on 23 June. But the Wales boss played down concern over goalkeeper Olivia Clark who left the field after a second blow to the head in as many games. "She had a significant black eye from the Denmark game and we the did proper protocols for concussion, and we were positive she was in a good spot," said Wilkinson. "But when you hit your head again, you don't take risks. Two head hits in a week is not good so we decided to pull her. She will be assessed appropriately."
