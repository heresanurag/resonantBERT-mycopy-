  However, the band's lead singer, Guillermo Novellis has explained that a fan called Fernando Romero wrote new lyrics celebrating Argentina's road to the final of the 2021 Copa America. Novellis and his band then recorded that version and released it before the World Cup.

  The opening line in the new edition explicitly references Argentina's two biggest footballing icons: "I was born in Argentina, land of Diego and Lionel, of the kids from the Falkland Islands, whom I'll never forget."

  It's no wonder then that Messi and his team-mates are fans. Messi himself claimed earlier this year on Argentine television this was his favourite football chant.

  Following Argentina's victory over Mexico in Group C, the squad were captured dancing around the dressing room, chanting La Moscas' anthem at the top of their lungs.

  When Argentina subsequently progressed past Australia in the last 16, La Moscas posted a video to their own Instagram account, showing fans at the Ahmad bin Ali Stadium blaring out their song.

  And these were the scenes in the Argentina dressing room after that fixture.

  Argentina face Croatia on Tuesday for a semi-final tie at the Lusail Iconic Stadium. They haven't won a World Cup since Maradona inspired his nation to victory in 1986.

  If they do manage to go all the way this time, we already know what the soundtrack will be.
