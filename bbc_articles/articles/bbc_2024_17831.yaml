  Woakes also plays his first Test since last summer after being overlooked for the tour of India despite being named player of the series in the Ashes. Perhaps most importantly for England, captain Ben Stokes looks set to be able to play a full part as a bowler after being plagued by a long-term left-knee injury. The all-rounder had surgery in November and tentatively returned to bowling in India before accelerating his rehab in three County Championship matches for Durham. Stokes bowled a substantial spell in the nets at Lord's on Monday, with England able to practice outside despite the mixed weather in London.
