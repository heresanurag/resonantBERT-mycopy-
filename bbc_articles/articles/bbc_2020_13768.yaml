id: bbc_2020_13768
title: 'Hayabusa-2: Japan asteroid sample lands safely on Earth - BBC News'
date: '2020-12-07'
section: General
url: http://www.bbc.co.uk/news/science-environment-55206621
content: |-
  Material from a space rock called Ryugu could provide an ''exciting key'' to the origins of the Solar System.

  A space capsule containing the first significant quantities of rock from an asteroid has arrived safely on Earth after being launched from Japanese spacecraft Hayabusa-2.

  The container with material from a space rock called Ryugu parachuted down near Woomera in South Australia, amidst excitement and applause.
