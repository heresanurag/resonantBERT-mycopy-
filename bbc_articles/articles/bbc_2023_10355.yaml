title: 'Watch: Man catches Florida''s longest-ever Burmese python - BBC News'
date: '2023-07-14'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-66197675
content: |-
  A Florida hunter has wrestled and caught a 19-ft Burmese python, the longest ever documented in the state.

  A local hunter has wrestled and caught the longest Burmese python ever to be documented in Florida. The record was confirmed by a local environmental organisation, which said the animal measured 19ft (5.7m) and weighed 125lb (56 kg).

  The Burmese python is an invasive species in southern Florida, believed to be responsible for the decline of native mammal populations. It is legal for them to be captured and humanely killed when found in the state.
