  Nwaneri was joined in the starting XI by his team-mate from the academy Myles Lewis-Skelly and the 18-year-old also impressed despite being withdrawn in the first half to avoid him getting sent off. Lewis-Skelly, who had been booked earlier, put in a late tackle on Richard Ledezma and although he was unpunished, Arteta substituted him moments later. "They play like they have been here for many years," captain Odegaard said. "So much quality and confidence, they're ready for it. I'm not worried about them, we enjoy having them in the team and they have a great attitude." Odegaard, who himself started playing senior football at 15 years old, believes that Lewis-Skelly can use his early withdrawal as a learning experience. "He took that really well," he added. "He knew it was a tricky position to be in. He was on a yellow and had a tough challenge too. He took it well and we're all there to support and I'm sure he will learn from that too."
