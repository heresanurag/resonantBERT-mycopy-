title: Three seriously injured in Edinburgh rickshaw crash - BBC News
date: '2021-05-02'
section: Edinburgh, Fife & East Scotland
url: http://www.bbc.co.uk/news/uk-scotland-edinburgh-east-fife-56963067
content: |-
  A 25-year-old man has been charged in connection with the incident which happened in Edinburgh.

  A man has been charged after three people were seriously injured in a rickshaw taxi crash.

  Police were called to a report of a collision, involving the rickshaw and a car, on the West Approach Road, Edinburgh, at about 22:35 on Saturday.

  Three people - the rider and passengers of the rickshaw - were taken to the Royal Infirmary of Edinburgh with serious injuries.

  A Police Scotland spokesman said a 25-year-old man had been charged.

  He is due to appear at Edinburgh Sheriff Court on Monday.

  Anyone with information, dashcam footage or private CCTV footage that could help inquiries should contact police.

