title: Queen tours Chelsea Flower Show in golf buggy - BBC News
date: '2022-05-23'
section: General
url: http://www.bbc.co.uk/news/uk-61558839
content: |-
  This year's show includes Platinum Jubilee floral tributes to the monarch's 70 year reign.

  The Queen has used a a golf buggy to tour the annual Chelsea Flower Show in London, which includes a Platinum Jubilee floral tribute to the monarch's 70 year reign.

  A Buckingham Palace spokesperson said, "adjustments have been made for the Queen's comfort".

  After cancelling a series of events earlier this year, the Queen has been much more visible in recent weeks.
