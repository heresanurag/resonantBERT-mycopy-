title: 'Caerphilly crash: Two women die, boy, 3, in hospital - BBC News'
date: '2022-07-20'
section: Wales
url: http://www.bbc.co.uk/news/uk-wales-62237284
content: |-
  The women, aged 30 and 79, were travelling with the boy when the crash happened.

  The crash was on Fochriw Road, Pontlottyn, on Tuesday

  Two women have died and two others, including a three-year-old boy, were hurt in a collision.

  The women who died were aged 30 and 79, and were travelling in a blue Citroen C3 with the young boy.

  Gwent Police said they collided with a white Ford Ranger on Fochriw Road, near the quarry above Pontlottyn, Caerphilly county, at about 10:15 BST on Tuesday.

  The boy and a 22-year-old man who was driving the Ford Ranger are in hospital in a stable condition.

  Officers are appealing to members of the public for information.
