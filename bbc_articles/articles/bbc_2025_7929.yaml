  It has the largest collection of Brontë items in the world. Director Rebecca Yorke added: "We're also delighted that some filming has taken place at nearby locations and hope that this will attract new visitors to the area and to the Brontë Parsonage Museum." There have been at least 10 film and television adaptations of Wuthering Heights, Emily Bronte's only novel. One of the most well-known was the 1939 version starring Merle Oberon as Cathy and Laurence Olivier as Heathcliff. It was nominated for the Academy Award for Best Picture.

  Rebel Wilson said she was 'loving it' in Yorkshire

  Other high-profile actors who have played Heathcliff over the years include Ralph Fiennes, Tom Hardy and Richard Burton. Meanwhile, North Yorkshire was also the filming location for a Christmas film starring Rebel Wilson and Kiefer Sutherland. Tinsel Town will be released in December 2025 and was shot in Knaresborough. Wilson, 45, said at the time she "loved" the area and had been practising her Yorkshire accent. In 2021, Tom Cruise surprised locals of Pickering when he touched down in a helicopter to shoot scenes for Mission: Impossible at a heritage railway. The owner of a local B&B said in a Facebook post they had been walking the dog when they "bumped into" the Hollywood megastar. Listen to highlights from North Yorkshire on BBC Sounds, catch up with the latest episode of Look North.

