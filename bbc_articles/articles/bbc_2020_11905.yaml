id: bbc_2020_11905
title: Royal Ballet back on stage with social distancing - BBC News
date: '2020-10-09'
section: General
url: http://www.bbc.co.uk/news/entertainment-arts-54474630
content: |-
  After seven months, the Royal Ballet company is back on stage at the Royal Opera House in London.

  The performances will be different to before - with social distancing on stage and off.
