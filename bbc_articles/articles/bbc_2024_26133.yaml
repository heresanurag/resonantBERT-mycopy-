title: Woman in critical condition after Cleat Hill house explosion - BBC News
date: '2024-10-23'
section: Beds, Herts & Bucks
url: http://www.bbc.co.uk/news/articles/cnvdvly4986o
content: |-
  Emergency services remain at the scene of the incident in which a man died on Saturday.

  The house damaged by the explosion and fire is behind a police cordon

  A woman injured in an explosion at a house in which a man died was in a critical condition, a council said. Emergency services were called to the property in Cleat Hill, Bedford, at about 07:00 BST on Saturday. Bedford Borough Council said investigations into the cause of the explosion and subsequent fire were under way and police were patrolling the area. The authority added it continued to provide emergency accommodation and support for residents who have been unable to return to their homes.

  A spokesperson said: "For safety reasons, we remain unable to arrange further visits to homes at present, but the authorities are prioritising the creation of an action plan to resolve this issue to enable residents to safely return to their premises to gather essential items." Mayor Tom Wootton said: "We are working closely with the emergency services and other partner organisations to provide any assistance needed, both at the scene and to residents who have been impacted. "We will continue to offer support as the emergency response progresses." Bedfordshire Police said "increased" levels of gas had been found in the area, which were believed to be naturally occurring from an underground source, not from a gas pipe network.

