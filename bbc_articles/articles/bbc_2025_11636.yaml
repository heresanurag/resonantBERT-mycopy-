  That may be just fine with some key members of the Republican Party - exposing what could be a growing divide between conservative pro-Israel foreign policy hawks in Congress and the America First, isolationist sympathies of many in the Trump administration. "How does the America First foreign policy doctrine and foreign policy agenda... stay consistent with this right now?" Charlie Kirk, a conservative activist and vocal Trump supporter, asked during an internet livestream that was broadcasting as the Israeli strikes began Thursday evening, Politico reported. At about the same time, more bellicose Republicans were celebrating the attacks on social media. Senator Lindsey Graham of South Carolina took to X to post: "Game on. Pray for Israel". "Israel IS right - and has a right - to defend itself!" Republican Speaker of the House Mike Johnson wrote. Within the White House, many of the more vocal advocates for military action against Iran have been sidelined in recent months, including former National Security Advisor Mike Waltz, who reportedly had consulted with Israel on Iran attack plans before Trump requested his resignation in early May. The president's most senior advisers, including Vice-President JD Vance, have been wary of allowing America to be pulled into new conflicts – or becoming overly involved in foreign policy concerns that they view as removed from core US interests. "Previously, it seems that those advocating for restraint were ascendant in the administration, but I think ultimately, this comes down to President Trump alone," said Todman. "The statements that we saw from him this morning seem to indicate that he's open to providing more support to Israel, depending on how the next few days play out." With American forces based across the Middle East, involvement may be unavoidable. Just five months into his second term in office, the peacemaker president could have a new war on his hands.
