  According to Daniel Byman, from Georgetown University's School of Foreign Service, Israel's move represents a new willingness to go against American preferences in the region. For a more traditional American administration, such open defiance would be a significant affront. But for Trump, his grab-bag of comments after Israel's attack illustrates how different rules apply - and that while Israel is clearly operating according to its own schedule and agenda, that may not lead to a clear break between the two longtime allies. "He doesn't feel bound by any of his past statements," Byman said. As Iran assesses the damage – including more than 90 dead, explosions in its capital city Tehran, and what the Israel Defense Force described as significant damage to the Natanz nuclear facility - Israel is activating tens of thousands of its soldiers and continuing what its officials say will be a two-week military campaign. The prospects for peace seem dimmer by the hour. Trump's strategy, at the moment, appears to be hoping that the military action jolts Iran into making new concessions – a delicate dance of distancing the US from Israel's actions while still trying to use them to gain advantage at the negotiating table.
  • None How attack on Iran could hit oil prices By his own acknowledgement, however, key Iranian leaders have been killed in the strikes - and Iran is currently focusing its diplomatic efforts on appeals to the United Nations Security Council, where it has labelled Israel's action an "act of war". "I think that Netanyahu just torpedoed the nuclear talks for the time being," said Sina Azodi, assistant professor of Middle East Politics in George Washington University's School of International Affairs. "You cannot beat up a guy and then say come and negotiate with me." The US still plans to hold scheduled talks with Iranian officials in Oman on Sunday. Will Todman, a senior fellow in the Middle East programme at the Center for Strategic & International Studies, said a US-Iranian deal, if it were to happen, would have a "dramatic impact" on Israel's strategy going forward. "Israel would be much more constrained in the approach that it can take to its efforts to downgrade Iran's nuclear programme, but also its military capabilities," he said, adding that any kind of deal was unlikely to happen at this point.

