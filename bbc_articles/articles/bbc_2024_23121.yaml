content: |-
  Mohammed Shabir and Calum Sunderland deny murdering Bryonie Gawith and her three children in Bradford.

  Bryonie Gawith and her three children died in the house fire in Bradford

  Two men have pleaded not guilty to murdering a mother and her three children in a house fire in West Yorkshire. Bryonie Gawith, 29, and her children Denisty Birtle, nine, Oscar Birtle, five, and 22-month-old Aubree Birtle all died following the fire in Westbury Road, Bradford, on 21 August. Mohammed Shabir, 44, and Calum Sunderland, 25, appeared at Bradford Crown Court via a video link on Wednesday, and denied four counts of murder and the attempted murder of Ms Gawith's sister, Antonia Gawith. Judge Jonathan Rose told Mr Shabir and Mr Sunderland, both of Keighley, they would remain in custody until the trial on 4 March.

  A court sketch of the two men, Mohammed Shabir (L) and Calum Sunderland (R) appearing in court on Wednesday

  The court heard a man arrested at the scene of the fire, who was described as the "main suspect", was "still unconscious" in hospital and would not be ready for trial "even if he does wake up". West Yorkshire Police previously confirmed the man in hospital was the ex-partner of a woman who was visiting the family. Ms Gawith died at the scene and the three children died from their injuries in hospital. Listen to highlights from West Yorkshire on BBC Sounds, catch up with the latest episode of Look North or tell us a story you think we should be covering here, external.
