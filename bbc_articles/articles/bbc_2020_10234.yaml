title: 'Croydon police shooting: Tributes paid to killed officer - BBC News'
date: '2020-09-26'
section: London
url: http://www.bbc.co.uk/news/uk-england-london-54294666
content: |-
  Colleagues, mourners and well-wishers pay their respects to a police officer shot dead in Croydon.

  Police colleagues and members of the public have left flowers and paid tribute to an officer who was killed in the early hours of Friday. He was shot at Croydon Custody Centre and died in hospital.

  The officer has not been officially named.

  A 23-year-old man is in a critical condition in hospital. It is thought he turned the gun on himself after shooting the officer.

