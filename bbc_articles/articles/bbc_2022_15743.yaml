title: 'Snowdonia: Walker found dead after mountain fall - BBC News'
date: '2022-11-20'
section: Wales
url: http://www.bbc.co.uk/news/uk-wales-63690071
content: |-
  The man in his 50s left a youth hostel on Wednesday and was reported missing the next day.

  The man was found dead on Glyder Fach after setting off on a walk on Wednesday

  A walker was found dead after falling as far as 200ft (60m), mountain rescuers have said.

  The man, left Snowdon Pen-y-Pass hostel, Gwynedd, on Wednesday and was reported missing at about 07:00 GMT on Thursday.

  Ogwen Valley, Llanberis and RAF Valley mountain rescue teams and the coastguard helicopter recovered the body from Glyder Fach's Bristly Ridge.

  After being found his body was stretchered down the mountain.

  An Ogwen Valley mountain rescue spokesman said: "The thoughts of the team are with the casualty's family and friends."
