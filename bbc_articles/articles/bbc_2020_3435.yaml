id: bbc_2020_3435
title: 'Michel Roux: French restaurateur and chef dies aged 78 - BBC News'
date: '2020-03-12'
section: Berkshire
url: http://www.bbc.co.uk/news/uk-england-berkshire-51856312
content: |-
  Roux passed away at his home in Bray, Berkshire, following a long battle with a lung condition.

  Michel Roux was born in Charolles, Burgundy, in 1941

  He passed away on Wednesday night surrounded by his family at home in Bray, Berkshire, after battling a long-standing lung condition.

  Roux and his brother Albert made gastronomic history when their London restaurant, Le Gavroche, became the first three Michelin-starred restaurant in Britain in 1982.

  His son Alain and daughters, Francine and Christine, on behalf of the family, said he was "a father figure inspiring all with his insatiable appetite for life and irresistible enthusiasm".

  "We are grateful to have shared our lives with this extraordinary man and we're so proud of all he's achieved," they added.

  "A humble genius, legendary chef, popular author and charismatic teacher, Michel leaves the world reeling in his wake.

  "But above all, we will miss his mischievous sense of fun, his huge, bottomless heart and generosity and kindness that knew no bounds. Michel's star will shine forever lighting the way for a generation of chefs to follow."

  Michel Roux published 15 books that sold more than 2.5 million copies worldwide

  There will be a private family funeral followed later in the year by a "celebration of life event".

  As well as Le Gavroche, the Roux brothers' Waterside Inn in Bray was awarded three Michelin stars in 1985.

  Roux also opened Skindles in Taplow in 2018 with his son.

  TV chef James Martin led tributes from the culinary world on social media, writing that he was "broken and so sad" that "we have lost a legend".

  Chef Raymond Blanc called the Roux brothers "pioneers" who changed the world of gastronomy in the UK, and the official Michelin Guide UK said Roux "inspired a whole generation of chefs".

