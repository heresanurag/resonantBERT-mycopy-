title: 'Mohamed Al Fayed: Protection officer says he warned Palace in 90s - BBC News'
date: '2024-09-26'
section: Wales
url: http://www.bbc.co.uk/news/articles/cp39nl7p031o
content: |-
  More than 200 women say they were raped or sexually assaulted by the former Harrods boss.

  Protection officer says he warned Palace about Fayed

  Dai Davies was in charge of keeping the royals safe from 1994 to 1998

  The former head of Scotland Yard’s Royal Protection Command says he warned Buckingham Palace about Mohammed Al Fayed in the late '90s. Dai Davies, who was in charge of keeping the royals safe from 1994 to 1998, said he was aware of allegations Fayed had "a reputation", and warned royal officials that Scotland Yard’s serious and organised crime group was investigating him. Mr Davies said he also raised concerns about the initial police investigation into sexual allegations made against Fayed and the decision of the Crown Prosecution Service (CPS) not to prosecute.

  More than 200 women have come forward since Fayed's death last year saying they were raped or sexually assaulted by the former Harrods owner. The Metropolitan Police said each allegation was investigated but no charges were brought.

  Speaking to Welsh language news programme Newyddion S4C, Mr Davies said: "There were allegations that he had been, as it were, sexually promiscuous with some of his employees, but as far as I knew it was well outside of my scope of investigation. "Nobody had actually come forward but there were rumours circulating and I was aware of those rumours in the mid 90s. "The rumours were, as I understood it, that he liked young girls who worked at Harrods and that he touched them inappropriately, sexually and so on." Mr Davies said he contacted royal officials to raise concerns the Met was also investigating Fayed for breaking into business tycoon Tiny Rowlands’ safety deposit box at the department store. That claim and others led to Fayed being arrested in March 1998 but he was never charged. In July 1997, Princess Diana went on holiday with Fayed and his wife to their St Tropez home with Prince William and Prince Harry. "I was worried that he was being investigated and that she [Princess Diana] was taking the boys with a man that was quite bad," said Mr Davies. In raising concerns about that investigation, Mr Davies said he was told by royal officials Diana was aware of it. He said he did not raise concerns about sexual abuse allegations with the palace as he had no evidence, and women had not yet come forward.

  He said he warned the palace about Fayed in the '90s

  The CPS said it twice considered bringing charges against Fayed but concluded there was no prospect of a conviction. Mr Davies said questions need to be asked and that could happen in the form of a public inquiry. "There are big questions here for the CPS because I hear far too often in my opinion that there isn’t enough evidence," he said. "We don’t know what the Metropolitan Police are actually considering at the moment, I don’t know at what level someone is deciding if this warrants a further investigation because people knew. "It’s for those in authority and the establishment to decide what's the best formula for actually getting justice for all these women." The Metropolitan Police said it was aware allegations of sex offences against Fayed made over a several years were reported to the force. A spokesman said: "Each one was investigated and, where appropriate, advice from the Crown Prosecution Service was sought. No charges resulted from these investigations." It said if further information came to light it would be investigated accordingly. The CPS said it was "concerning" so many women were coming forward. A spokesman said: "The prosecutors who looked at the files of evidence that were received in 2008 and 2015 concluded at that time that there was no realistic prospect of conviction and no charges were brought. "We are working to build a full picture around these serious allegations and want to reassure the public that alongside our criminal justice system partners, we are determined to secure justice in as many rape and serious sexual offences as possible."
