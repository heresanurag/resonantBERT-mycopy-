title: Four murder arrests after DPD delivery driver dies in Shrewsbury - BBC News
date: '2023-08-22'
section: Shropshire
url: http://www.bbc.co.uk/news/uk-england-shropshire-66576970
content: |-
  A 23-year-old man is confirmed dead in Shrewsbury on Monday afternoon.

  A 23-year-old man was confirmed dead on Berwick Avenue in Coton Hill, Shrewsbury

  Four men have been arrested on suspicion of murdering a DPD delivery driver in Shropshire.

  West Mercia Police said the 23-year-old male was confirmed dead on Berwick Avenue in Coton Hill, Shrewsbury, on Monday afternoon.

  Parcel delivery business DPD said he was part of a two-man crew working for the company.

  Two men aged 22 and 26 and two men both aged 24 have been detained and remain in police custody.

  A spokesperson for DPD said the company was working closely with the police investigation team.

  "We can confirm that a two-person DPD crew was involved in an incident on Berwick Avenue in Shrewsbury [on Monday] afternoon and that sadly one of the two individuals delivering parcels was attacked and subsequently died," they said.

  Police believe the attack happened at about 13:00 BST on Monday.

  The West Mercia force said there would be increased patrols in the area to reassure residents.

  Det Ch Insp Mark Bellamy said: "We understand this incident may be concerning for the local community and I would like to offer my reassurance that we will carry out a full and thorough investigation to establish the circumstances."

  Police say they have increased patrols in the area

  West Midlands Ambulance Service said crews were called on Monday to an assault at 13:12 BST.

  "Upon arrival we found a man with life-threatening injuries," a spokesperson explained.

  "He received advanced life support and advanced trauma care from ambulance staff at the scene but sadly, nothing more could be done to save him and he was confirmed deceased at the scene."

  Nat Green, Liberal Democrat councillor for Quarry and Coton Hill, said he hoped the "deeply upsetting" event was an "isolated" incident" and that "nothing like this ever happens again".

  "The only reaction can be one of shock and horror at this event," he told BBC Radio Shropshire.

  "I can't remember such an event happening in Shrewsbury myself, and in such a close-knit community that I know Coton Hill is. Many residents are going to be feeling extremely unhappy and distressed about this."

  He said the local community was going to wonder about "their own safety and security", adding: "I hope that in the coming days and weeks the police will ensure that there are plenty of patrols and reassurance."

