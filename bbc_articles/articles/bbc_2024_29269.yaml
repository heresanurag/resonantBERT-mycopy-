content: |-
  The Chancellor ruling out more tax rises and the PM's pledge to "overhaul" job centres leads the papers.

  'No more tax rises, insists Reeves' and 'PM in jobs push'

  The Daily Telegraph carries a warning from business leaders that the chancellor's Budget tax rises are "milking" them. The paper says Rachel Reeves "has six months" to win business over, external, with a string of executives warning that Britain is becoming a less attractive place to invest under Labour. The Daily Mail says the chancellor has ruled out further tax rises in a bid to head off a growing business revolt over what it calls her £40bn "tax-bomb"’ Budget., external The paper notes that Reeves was heard "in stony silence by business chiefs", when she addressed the CBI conference on Monday. The i newspaper says public spending cuts are on the way from 2026, external, after the chancellor pledged not to put up taxes again during this Parliament. The paper reports ministers are promising to improve services through reform but goes on to say that schools, prisons and local government may have to make billions in savings between 2026 and the next election, when it says many government departments face real-terms budget cuts. "Britain isn't working, external, admits PM in jobs push," is the headline on the front of the Times. It reports on Sir Keir Starmer's plan to "beat long-term sickness", as the paper puts it. However, it says questions remain about whether the plan will be up to the task of stemming the surging cost of ill health, as reform of the benefits system is put back to next year. The Guardian, meanwhile, says Labour is pledging to ensure that "no young person is left behind"., external The paper says the Premier League and the Royal Shakespeare Company will be part of a scheme to get hundreds of thousands of young people into work or education. It says the government wants to "tackle" the one in eight people, aged from 16 to 24, are not currently in education, employment or training.

