  The Daily Mirror leads on Storm Bert's devastation, external, with the headline: "Mud, sweat and tears." It pictures a young girl, caked in mud, helping with the clear-up in South Wales. The paper says people faced "landslide terror" as hour upon hour of heavy rain sent a muddy mess into the former mining village of Cwmtillery. In an editorial, the Mirror urges insurance companies to "PAY fair". The number of pets being dumped in the run-up to Christmas, external has risen by 50%, according to the Daily Star. It blames the situation on people struggling to make ends meet. A picture of a glum-faced dog stares out at readers, accompanied by the words: "All I want for Christmas is.. YOU." Finally, plans to mark the 80th anniversary of the end of World War Two will include an extra "Bank Holiday thank you", external to the nation's heroes next year, according to the Daily Express. The paper understands the plans include what it calls a "four-day jamboree" next summer. It says no decision has yet been made on which weekend that could be, but moots the idea of a permanent, extra bank holiday as a "lasting tribute".
