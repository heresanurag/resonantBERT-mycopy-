content: |-
  Police say the remains discovered in a west London flat and Bristol belong to the same two men.

  More human remains found as police name suspect

  This video can not be played To play this video you need to enable JavaScript in your browser. Clifton Suspension Bridge: Visiting the scene where bodies were dumped on a bridge

  Human remains have been found in west London by police investigating the discovery of body parts in suitcases in Bristol. Officers believe the remains found on Friday in a flat on Scotts Road, Shepherd's Bush and those found two days ago at the Clifton Suspension Bridge belong to the same two men. The Metropolitan Police have named the suspect they are searching for as Yostin Andres Mosquera, a 24-year-old Colombian national, and have warned the public not to approach him. Both victims are thought to have been known to Mr Mosquera, but have not yet been formally identified. Police say the remains in London are being "sensitively removed", with post-mortems planned as soon as possible. A cordon was in place on Scotts Road on Friday afternoon. Officers and forensic investigators were seen entering a property at the junction with Devonport Road, while helicopters circled overhead.

  Police are looking for Yostin Andres Mosquera, 24

  A 36-year-old man who was arrested in connection with the investigation on Friday in Greenwich has since been released without charge. The Met's Deputy Assistant Commissioner Andy Valentine said: “This is a fast-moving enquiry with detectives in London and Bristol actively pursuing a number of lines of enquiry. “Locating Yostin Andres Mosquera, however, is the priority and I appeal to anyone with information on his whereabouts to get in touch.”
  • None Remains of two men were in suitcases dumped at bridge

  Just before midnight on Wednesday, Avon and Somerset Police received a report of a man with a suitcase acting suspiciously on the Clifton Suspension Bridge. Officers arrived within 10 minutes, but the man had left, leaving the suitcase behind. A second suitcase was found nearby. One witness described a cyclist pursuing the suspect as they shouted at each other. Another witness, Giles Malone, told the BBC he had been waiting for an Uber near The Mall pub when he saw two men carrying suitcases across the road. He said: "A man came across the street with another man, carrying a very heavy suitcase. They then did that a second time and put the suitcases down right by us, on the pavement. "We asked them 'Those suitcases look very heavy. What have you got in there, bodies?' And they didn't say anything to that." He said that the two men - one black and one white - were accompanied by a white woman.

  Forensics teams have been searching an address in west London

  Police say the named suspect had travelled to Bristol from London on Wednesday, before taking a taxi to the suspension bridge. The taxi driver's vehicle was seized by police. Officers released two images of the man they were searching for - now confirmed as Mr Mosquera - on Friday afternoon. He was described as black with a beard and wearing a gold earring. He also had a black Adidas baseball cap, black jeans, a black jacket, black trainers with thick white soles and a black backpack, police added. Anyone with information is being asked to call the police on 101, quoting the Met Police reference CAD 306 12JUL.
