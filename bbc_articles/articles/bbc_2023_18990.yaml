title: Watch Ukraine's Zelensky having animated chat with Hungary's Orban - BBC News
date: '2023-12-11'
section: General
url: http://www.bbc.co.uk/news/world-67680558
content: |-
  The Ukrainian president met the Hungarian PM at the inauguration of Argentina's new president.

  Ukrainian President Volodymyr Zelensky can be seen having an intense-looking conversation with Hungarian Prime Minister Viktor Orban inside Argentina's Congress.

  The moment was captured by the Senate of Argentina's video feed as the two politicians met at the inauguration of Argentina's new president on Sunday.

  Mr Zelensky said he had a frank discussion with Mr Orban, "focused on our European affairs."

  Mr Orban has threatened to block European Union plans to begin formal accession talks with Ukraine.
