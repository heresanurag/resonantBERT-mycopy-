id: bbc_2022_16204
title: Scottish worker dies after incident on Qatar rig - BBC News
date: '2022-12-14'
section: Scotland
url: http://www.bbc.co.uk/news/uk-scotland-63975373
content: |-
  Three men were believed to be involved and one has been detained by the Qatari authorities.

  A man understood to be from Scotland has died following an incident on an offshore oil platform in Qatar.

  The incident, which was not work-related, involved three British nationals all believed to be Scottish.

  One of the men was also injured and is believed to be heading home to the UK after treatment. A third man has been detained by the Qatari authorities.

  The men were working for the part Qatari state-owned North Oil Company.

  All three were contracted to Film-Ocean and were on the platform when one of the men was "fatally wounded", at about 01:40 Arabia Standard Time on Monday.

  The Ellon-based company said it was liaising with the Foreign, Commonwealth and Development Office (FCDO) and others to establish the full circumstances surrounding the incident.

  Qatar's Ministry of Interior confirmed one person had died and another received hospital treatment but was later released.

  A spokesman for the UK FCDO said: "We are supporting the family of a British man who has died and a man who has been injured in Qatar and are in contact with the local authorities."
