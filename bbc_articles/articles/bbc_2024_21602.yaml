  South Wales Police added the road was likely to remain closed for some time and asked anyone who witnessed the attack to contact the force. Local people have said they saw an air ambulance landing nearby earlier in the day, while police cars and vans continue to come and go from the road.

  Police investigations are ongoing at the scene of the serious assault
