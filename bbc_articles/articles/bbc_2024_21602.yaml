content: |-
  Police were called to Cwm Road in Swansea after a report of an injured man on Wednesday afternoon.

  Four arrests after man injured in serious assault

  The residential road is likely to remain closed for some time, police have said

  Four men have been arrested following a serious assault which has closed a Swansea street. Officers were called to Cwm Road, in the Hafod area of the city, shortly after 12:00 BST on Wednesday following a report of an injured man. Four men from Swansea - a 31-year-old from Waunwen, a 49-year-old from Gendros, a 37-year-old from Strand and a 39-year-old from Morriston - have been detained. Residents have said they are unable to return to their homes due to the ongoing police investigation.

