title: Flooding risk remains high in parts of Scotland despite rain easing - BBC News
date: '2023-10-08'
section: Scotland
url: http://www.bbc.co.uk/news/uk-scotland-67041995
content: |-
  River levels are continuing to rise and the ground is saturated, increasing the risk of flooding.

  This video can not be played To play this video you need to enable JavaScript in your browser. Heavy rainfall has caused flooding across parts of Scotland

  Parts of Scotland remain at risk of flooding despite the rain easing off.

  River levels are continuing to rise and the ground is saturated, increasing the risk.

  All Met Office yellow warnings have now been lifted but a further yellow warning for rain has been issued for parts of western Scotland for Tuesday.

  Two severe flood warnings were still in place at 06:00 on Monday for parts of Perth and Aviemore.

  The warning covered the North Inch area of Perth and the Dalfaber area of Aviemore.

  The Scottish Environment Protection Agency (Sepa) said basements and properties in low-lying areas of North Inch were at risk of flooding.

  The Aviemore warning covers Dalfaber Road, Inverdruie, The Old Bridge Inn, Speyside Leisure Park and the sewage treatment works.

  ScotRail said it was expecting to run a full service across most of the network on Monday morning including the central belt.

  But service delivery manager David Simpson said routes from Stirling to Perth and from Perth to Inverness were still affected by floodwater.

  The Stonehaven to Arbroath route is also awaiting the completion of safety inspections, he added.

  Apart from the two severe weather warnings, Sepa had more than 30 flood warnings and several flood alerts still in place at 10:00 on Monday.

  The Craigie area of Perth was flooded after the Craigie burn burst its banks

  Hours of heavy and persistent rain on Friday and Saturday caused major disruption around the country with some areas continuing to experience problems on Sunday.

  Work has begun to clear the A83 after seven landslips blocked the vital road to Argyll and the Inner Hebrides on Saturday.

  About 2,000 tonnes of debris fell on the road.

  Ten people had to be airlifted from their vehicles on the A83 at the height of the bad weather.

  Saturday's rain has brought floods and landslips along the A83

  This video can not be played To play this video you need to enable JavaScript in your browser.

  The area around the Rest and Be Thankful saw a month's worth of rainfall, about 160mm (6in) fall over 36 hours. Bear Scotland said the catch pits and fences it installed had ensured that only a small amount of debris reached the road itself.

  Road closures are in place between Inveraray and Tarbet due to landslides both sides of Dunoon junction. The diversion via A819/A85/A82 at A85 Dalmally is open.

  The Western Ferries route from Gourock to Dunoon is running.

  The Met Office said Tyndrum, west Perthshire, experienced the most rainfall on Saturday, with 112.6mm (4.4in) falling on the small village.

  The clear-up has begun on the A83 after it suffered seven landslips

  Police said on Saturday there had been no reports of injuries but they were treating the persistent heavy rain in parts of the west of Scotland as a "major incident".

  In Aberfoyle, a warning was issued by NHS Forth Valley after a lorry overturned, spilling kerosene/diesel into the watercourse. It said kerosene had also leaked into the general floodwater which poses a potential threat to public health.

  Health protection experts urged people to be extra careful if floodwater had entered their homes as there could be "significant health risks" to certain groups such as pregnant women, children, the elderly and those living with heart and lung conditions.

  The River Spey burst its banks at the Old Bridge Inn at Aviemore

