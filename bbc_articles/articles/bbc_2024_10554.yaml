title: Tories 'terrified' of Reform Party - Richard Tice - BBC News
date: '2024-05-23'
section: General
url: http://www.bbc.co.uk/news/uk-politics-69053160
content: |-
  The Reform Party leader says Rishi Sunak "bottled it" over calling a surprise general election for July.

  The Reform Party leader said Rishi Sunak "bottled it" over calling a surprise general election for July.

  Richard Tice told his party's election launch that Reform UK was going up in the polls, while the Tories were “sinking”.

  He described the “utter incompetence” of Rishi Sunak’s election launch, and that he was pleased former leader Nigel Farage would help out in the election campaign.
