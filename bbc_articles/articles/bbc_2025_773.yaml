content: |-
  Donald Trump's plans for tariffs risk raising prices for items from cars to canned food.

  Three American goods that could rise in price due to metal tariffs

  A 25% tax is set to be imposed on all imports of steel and aluminium into the US , ending exemptions from the rules for goods from major trade partners including Canada, Mexico, Brazil, as well as the European Union. The expanded tariff measures announced by President Donald Trump, expected to go into effect next month, will mean many US businesses wanting to bring the metals into the country will have to pay more. But there is a risk that the companies will pass on the added costs, or some portion of it, to consumers. Since steel and aluminium are key components in many goods, what items could get more expensive?
  • None What are tariffs and why is Trump using them?

  About 70% of the steel used in the US to make cans for food is imported today, coming in from countries such as Germany, the Netherlands and Canada, according to the Can Manufacturers Institute (CMI), a business group representing can-makers. After Trump ordered tariffs on steel in 2018, many can-makers won "exclusions" from those import taxes, over the objections of steelmakers, given the limited production of the type of steel used to make cans in the US. Since then, steel manufacturers have cut production further, pushing up prices, warned the CMI, which sent a letter to the Trump administration earlier this month signed by big food companies including General Mills, Del Monte and Goya. Robert Budway, president of the CMI, said without exemptions for can manufacturers to import steel tariff free, grocery prices for canned foods made in the US are likely to rise. "While the president may believe that these tariffs are protecting the steel industry, they certainly are undermining our food security and our supply resiliency for American canned food, which Americans rely on every day," Mr Budway said. When it comes to aluminium, brewers and makers of fizzy drinks, such as Coca-Cola, have also warned the move will add costs and could lead to higher prices for customers. "We control enough variables that we can adapt and mitigate our way through what is happening," Coca-Cola chief executive James Quincey told investors this week. Trump has said there will be no exemptions from the rules this time, either for individual products or for particular countries, however some sectors are hoping he will row back from that position.

  After Trump imposed tariffs on steel and aluminium during his first term, carmakers including Ford and General Motors warned the measures would add about $1bn to each of their costs. For customers, Morningstar estimated the tariff costs back then would result in a roughly 1%, or a $300 price rise for customers. David Whiston, an analyst at Morningstar, warned Ford could be facing a similar cost increase this time, but said it was unclear how consumers will be affected. Affordability pressures in a market where sales have yet to return to 2019 levels could limit how much of the costs companies choose to pass on, according to Michael Wall, an auto analyst at S&P Global Mobility. But he said it was still "realistic" to expect some of the costs from the metals tariffs to trickle down to buyers. However he noted that Trump's announcement of tariffs on all goods imported from Canada and Mexico, currently on hold until March, would have a much bigger impact for buyers. At a business conference, Ford chief executive Jim Farley warned Trump's recent moves were causing "a lot of cost and a lot of chaos" for his industry. TD Economics has estimated cars could go up in price by about $3,000 if blanket tariffs on goods from Mexico and Canada came into force.

  The construction industry as a sector is one of the single biggest users of steel, which developers and homebuilders need for everything from building frames to appliances. Carl Harris, chairman of the National Association of Home Builders, said the decision to impose tariffs on steel and aluminium ran "totally counter" to Trump's stated goal of making housing more affordable, warning it would raise costs and deter development and rebuilding. "Ultimately, consumers will pay for these tariffs in the form of higher home prices," he warned. The National Association of Home Builders has urged the president to exempt building materials from the proposed tariffs. After Trump imposed steel tariffs in 2018, appliance maker Whirlpool faced an unexpected $350m jump in costs it said was driven by the increase in steel prices. Companies unable to absorb such costs would likely pass them on through higher prices in the shops.
