title: Tearful Barack Obama pays tribute to Michelle - BBC News
date: '2017-01-12'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-38582651
content: |-
  President Barack Obama has paid tribute to his wife and daughters in his farewell speech in Chicago.

  The country's first black president, now 55, was first elected in 2008 and will be replaced by Donald Trump, who will be sworn into office on 20 January.
