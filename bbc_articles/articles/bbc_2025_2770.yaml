  Santorini is on what is known as the Hellenic Volcanic Arc - a chain of islands created by volcanoes - but the last major eruption was in the 1950s. Greek authorities have said the recent tremors were related to tectonic plate movements, not volcanic activity. Scientists cannot predict the exact timing, size or location of earthquakes. But there are areas of the world where they are more likely to occur, which helps governments prepare. Earthquakes are the result of movement of tectonic plates in the earth's crust. Sometimes these plates lock together when they meet, which is called a plate boundary or a fault line. Santorini and the other Greek Islands are near such a line.
