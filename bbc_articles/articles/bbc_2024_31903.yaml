title: Russia warns against 'hypotheses' in Azerbaijan Airlines crash - BBC News
date: '2024-12-26'
section: Europe
url: http://www.bbc.co.uk/news/articles/cvgp3qx0q7wo
content: |-
  The Russia-bound passenger plane went down in Kazakhstan with the loss of 38 lives.

  This video can not be played To play this video you need to enable JavaScript in your browser.

  The Russian government has cautioned against promoting "hypotheses" about the cause of the crash of a Russia-bound passenger plane that killed 38 people in Kazakhstan on Wednesday. Some aviation experts suggested that the Azerbaijan Airlines plane had been hit by air defence systems over the Russian republic of Chechnya and pro-government media in Azerbaijan quote officials as saying a Russian missile was responsible. Before it went down near the Kazakh city of Aktau, the plane was diverted across the Caspian Sea, from its destination in Chechnya to western Kazakhstan. Twenty nine of the 67 people on board survived. Azerbaijan held a national day of mourning on Thursday for the victims of the crash.

  The Embraer 190 caught fire and split apart as it landed

  "This is a great tragedy that has become a tremendous sorrow for the Azerbaijani people," President Ilham Aliyev said on Thursday. In Moscow, Kremlin spokesman Dmitry Peskov said: "It would be wrong to put forward any hypotheses before the investigation's conclusions. We, of course, will not do this, and no-one should do this. We need to wait until the investigation is completed." The chief prosecutor in Kazakhstan said later that the investigation had not yet come to any conclusions. But some commentators in Azerbaijani media say that Azerbaijan expects Russia to admit shooting down the plane. Several TV channels, which are under strict control of the Azerbaijani government, on Thursday started broadcasting interviews with experts who have openly spoken about the possibility that Russia was responsible. AnewZ channel said a preliminary investigation had concluded that the plane had been hit by shrapnel from a surface-to-air missile from Russia's Pantsir-S defence system. Another pro-government website, Caliber, quoted government sources as saying that no-one was claiming the plane had come under attack intentionally, but that Baku expected an apology from Russia. When asked about the reports, the chief prosecutor's office in Baku told the BBC that every version was being investigated. As they try to avoid annoying Russian President Vladimir Putin, it will be very difficult for the Azerbaijani government to blame Russia directly unless it admits to shooting down the plane. It seems that the investigation committee comprised of Azerbaijani and Kazakh officials possibly already have evidence for this, but they are waiting for Russia to announce it first. Moscow will then have to answer questions such as why Russia did not close its airspace if there was military activity, and why it did not let the plane land as soon as possible - instead of directing it towards Aktau for landing.

  Are you in the area? Did you witness the crash? Only get in touch if it is safe to do so.

  The Embraer 190 aircraft took off from the Azerbaijani capital Baku on Wednesday morning. It was due to fly to Grozny in Chechnya but it was diverted because of fog, the airline said. A surviving passenger told Russian TV he believed the pilot had tried twice to land in dense fog over Grozny before "the third time, something exploded... some of the aircraft skin had blown out". The plane was redirected to Aktau airport, some 450km (280 miles) to the east. Footage shows the aircraft heading towards the ground at high speed 3km (1.9 miles) short of the runway, before bursting into flames as it lands. Kazakh authorities have recovered the flight data recorder and an investigation is under way. Shortly after the crash, reports from Russian state-controlled TV said the most likely cause was a strike from a flock of birds. But that kind of collision typically results in the plane gliding towards the nearest airfield, aviation analyst Richard Aboulafia told Reuters news agency. "You can lose control of the plane, but you don't fly wildly off course as a consequence," he said. Justin Crump of risk advisory company Sibylline said the pattern of damage inside and outside the plane indicated that Russian air defence active in Grozny may have caused the crash. "It looks very much like the detonation of an air defence missile to the rear and to the left of the aircraft, if you look at the pattern of shrapnel that we see," he told BBC Radio 4.

  Chechnya has already been hit by Ukrainian drone strikes this month and authorities in neighbouring Ingushetia said the Russian region had been targeted for the first time since the war in Ukraine began. A shopping centre was hit when a drone was shot down in nearby North Ossetia, killing one woman, reports said. Those on board were mostly Azerbaijani nationals, but there were also some passengers from Russia, Kazakhstan, and Kyrgyzstan. Video footage showed survivors crawling out of the wreckage, some with visible injuries. The injured were taken to hospital. On Thursday, Azerbaijan's Azertac news agency said seven were in a good enough condition to fly back to Baku. Azerbaijan Airlines told reporters that the plane had been fully serviced in October and had no technical malfunctions. Embraer, a Brazilian manufacturer and a smaller rival to Boeing and Airbus, has a strong safety record.
