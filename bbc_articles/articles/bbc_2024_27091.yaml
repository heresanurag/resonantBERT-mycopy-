content: |-
  A shark sighting during a Farne Islands boat tour brings joy to passengers.

  People on a Farne Islands boat tour were surprised to see a shark swimming alongside them.

  CEO of Northumberland Trust Mike Pratt said the sighting should be regarded as something to celebrate, rather than something to fear.

  Basking sharks are usually seen on the west coast, and not in the North East, he added.
