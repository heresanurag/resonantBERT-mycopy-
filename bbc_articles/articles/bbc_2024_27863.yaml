content: |-
  Paul Mescal, Denzel Washington, Pedro Pascal, and director Sir Ridley, walked the red carpet ahead of King Charles.

  Stars of Gladiator II, including Paul Mescal, Denzel Washington, Connie Nielsen and Pedro Pascal, and director Sir Ridley walked the red carpet ahead of the King for the premiere of the film in London.

  King Charles had earlier hosted members of the film and TV industry at a reception at Buckingham Palace.

  Gladiator II, a highly anticipated sequel following the 2000 epic, centres on Commodus's nephew Lucius (played by Paul Mescal), who made a brief appearance in the first film as a young boy.

  The film will be released in the UK on 15 November.
