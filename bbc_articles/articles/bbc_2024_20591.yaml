content: |-
  A rape survivor criticises a prison after she received seven letters from her attacker.

  A rape survivor has spoken about the trauma she experienced when her jailed rapist sent her multiple letters from prison.

  Rieve Nesbitt-Marr, 21, waived her right to anonymity to tell the BBC that she had been pleading with authorities to take action.

  "The first thing I did was call the prison, not one person has apologised, and the letter have kept coming," said Ms Nesbitt-Marr.

  HMP Parc in Bridgend, which is run by G4S, expressed sympathies for the “immense distress” caused by the letters.

  It said it takes public protection “extremely seriously” and it has taken action, including reporting the letters to police and disciplining John Harding and two other prisoners.
