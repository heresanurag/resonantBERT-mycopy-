title: 'Mohamed Salah contract: Liverpool forward not distracted by contract talks
  - Slot - BBC Sport'
date: '2024-11-26'
section: Liverpool
url: http://www.bbc.co.uk/sport/football/articles/cx2n8w046lgo
content: |-
