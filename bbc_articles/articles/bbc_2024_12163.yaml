title: Labour accuses Tories of planning unfunded tax cuts - BBC News
date: '2024-06-17'
section: Politics
url: http://www.bbc.co.uk/news/articles/cyxxv0wdrn0o
content: |-
  Jeremy Hunt suggested key manifesto promises on welfare cuts had been announced by the government last year.

  Labour has accused the Conservatives of proposing unfunded tax cuts after Jeremy Hunt suggested key manifesto promises on welfare cuts had already been announced. The Conservative manifesto is funded in large part by proposed cuts to spending on benefits, which the party says are not currently government policy. But the chancellor wrote in a newsletter to constituents last week that the tax cuts in the Conservative manifesto would be funded by savings from "an enormous back to work programme (which I announced in the Autumn Statement last year)". Labour seized on his comments as evidence that the welfare cuts “are not new” and “the money has been spent”. However, Prime Minister Rishi Sunak said it was not true that the projected savings on welfare were already factored into economic forecasts.

  Sir Keir Starmer said Mr Hunt's comments were “truly extraordinary”, and amounted to an admission that the Conservatives’ flagship welfare cuts involve “money that is already accounted for”. Sir Keir added: “The money isn’t there and that’s the major problem.” The Conservatives said Labour were in “complete denial” about the rise in the benefits bill and insisted that the savings they intend to use to fund tax cuts will come from new policies. Government spending on health and disability-related benefits has risen by £20bn in real terms since 2019, and a further £11bn increase is forecast over the next five years, making this a significant policy challenge for whichever party wins the general election. It is especially crucial for the Conservative Party because they have said they would cut £12bn a year in government spending on benefits compared to forecast levels by 2029. Those savings make up around two-thirds of the money being used to fund manifesto pledges on tax cuts and increased defence spending. But if the policies are already factored into government plans, as Labour claim, then the savings would be much smaller and unable to fund tax cuts. Asked by the BBC what new policies were included in the measures the Tories estimate will save £12bn a year, Mr Sunak said: “We are going to find savings in the welfare budget, it’s not true to say they’re already in the forecasts. "Fit note reform is not in there, ESA [Employment and Support Allowance] transition is not in there, reforms to PIP [Personal Independence Payment] are not in there, I could go on.” Mr Hunt, who has acknowledged he faces a tough battle to win his constituency of Godalming and Ash on 4 July, writes a newsletter for constituents twice a week. At the start of the campaign he told recipients: “I write them myself so what you read will be my own views."

  In an edition on Thursday, two days after Mr Sunak had launched the Conservative manifesto, the chancellor wrote: “Our biggest problem (economically) is that post-pandemic we have too many people out of work on benefits when it would be much better for them, for the economy and for taxpayers if they were back in work. “So we are funding an enormous back to work programme (which I announced in the Autumn Statement last year)." He continued that if the Conservatives won the election they would be “using the savings” to fund a 2p cut to national insurance for workers and the abolition of national insurance for the self-employed, the flagship measures in Mr Sunak’s manifesto. Labour argue that this passage is effectively an admission from Mr Hunt that parts of the Conservatives’ plans are already government policy, meaning that they have already been factored into government budgets and spending plans. They say this means that the savings will be lower than £12bn and that as a result the tax cuts are “unfunded”. Darren Jones, the shadow chief secretary to the Treasury, said: “This private admission from Jeremy Hunt that the Conservatives’ welfare cuts are not new, the money has been spent, and their plans are therefore unfunded drives a coach and horses through his party’s manifesto, which is no longer worth the paper it is written on. “Rishi Sunak lied about Labour’s plans and we now have the evidence he is lying about his own - from his chancellor. "It’s time Sunak 'fessed up and admitted his manifesto is a desperate wish list of unfunded promises that risks crashing the economy”.

  The Conservatives insist their measures to reduce welfare spending have been announced since Mr Hunt’s Autumn Statement, which was in November last year, or will be announced in the future. Their claims about welfare savings have also been questioned by the independent Institute for Fiscal Studies (IFS) think tank, which said that it was “far from clear” that the they could save the required amount. The IFS said that was because “many of the policies that they plan to set out in their manifesto were previously announced by the government and have therefore already been incorporated” into government budgets. Much of the Conservatives’ drive for savings from the welfare bill would come from halting the surge in claims for disability benefits, primarily the Personal Independence Payment (PIP). The government launched a consultation on ways to reform PIP in April. The Conservative campaign points to a further suite of measures that were all announced after Mr Hunt’s Autumn Statement, such as increased mental health support, a call for evidence on reforms to fit notes, faster rollout of Universal Credit, and tougher powers to remove benefits from people who refuse work.

