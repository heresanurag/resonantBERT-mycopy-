title: Mary Earps wax figure is a first for female footballers - BBC News
date: '2024-08-14'
section: Nottingham
url: http://www.bbc.co.uk/news/articles/cqjldy9dnx1o
content: |-
  Mary Earps will be the first professional female footballer to have a figure at Madame Tussauds.

  Mary Earps was part of the Lionesses' successes at the 2023 Fifa Women's World Cup and Women's European Championships in 2022

  England star Mary Earps has become the first professional female footballer to have a wax figure at Madame Tussauds in London. The 31-year-old goalkeeper played a key part of the Lionesses winning the European Championships in 2022 and reaching the World Cup final in 2023. She was put forward for the waxwork honour following a public vote. Earps, who grew up in Nottingham, said she hoped the new figure would help to "break barriers and push boundaries".

  Earps says it is "a great feeling" to be recognised with the figure

  "It's a special feeling to be a trailblazer. I think it's something that means a lot to me," she said. "I'm a very ambitious person, a very hard-working person, and I think to try and push boundaries and try and be a pioneer for change, in many ways, is something that I really enjoy doing, and hopefully I can do for the rest of my career." The Lioness said it was "a bizarre one" that members of the public had voted for her, but hopes the rest of her teammates would soon have their own wax figures at Madame Tussauds London to help inspire others. "As Lionesses, one of the things that really sets us apart from other teams is how strong we are in our values and what we stand for," she added. "I think we're really big on trying to inspire as many people as possible - young, old, all ages, all genders - and I think this is another extension of that, and we're constantly trying to break barriers and push boundaries."

  Earps moved from Manchester United to Paris Saint-Germain last month

  She is most excited for her family to see her wax figure for the first time, particularly her grandmother who she joked might feel uneasy seeing a different version of Earps. "I think that will be a real special moment for [my gran]. I'm not sure how she'll feel about there being two of me in the world, but we're about to find out," she said. Earps, who was awarded an MBE for her services to football in May, said she hopes her eyes, eyebrows and lashes are "on point". Jo Kinsey, studio manager at Madame Tussauds London, said "it was truly delightful" having the opportunity to work with Earps for her first ever figure, which will be put on display in the autumn. Follow BBC Nottingham on Facebook, external, on X, external, or on Instagram, external. Send your story ideas to eastmidsnews@bbc.co.uk, external or via WhatsApp, external on 0808 100 2210.
