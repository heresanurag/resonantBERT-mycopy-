  Glastonbury 2025 is here! Thousands of people are heading to Worthy Farm ahead of a weekend of music.

  Thousands of people are heading to Worthy Farm ahead of this weekend's Glastonbury festival.

  Ticket holders have queued through the night to be among the first to enter the festival as the gates open.
