title: Stunning 'reverse waterfall' filmed near Sydney - BBC News
date: '2020-08-11'
section: General
url: http://www.bbc.co.uk/news/world-australia-53733550
content: |-
  Wild weather on the New South Wales coast in Australia has blown waterfalls upstream.

  High winds and torrential rain on the New South Wales south coast in Australia have resulted in a spectacular sight - waterfalls in the Royal National Park being blown in reverse.
