  First Minister Nicola Sturgeon says lockdown is working and will continue for at least another three weeks.

  'No changing of our vote on the day', say Dundee

  Dundee, who have been at the centre of the SPFL vote saga, insist their delayed approval has delivered the "best deal possible out of a situation that was going to be bad for us in any iteration that was being proposed". The Championship club's intended 'no' vote failed to arrive in time for Friday's suggested deadline, leaving them with the decisive say in the motion to call an end to their division as well as League One and League Two. A 'yes' vote was cast yesterday, making it 35 out of 42 clubs in favour of the measures proposed to help deal with the coronavirus crisis. Dundee say they submitted their vote and issued yesterday's statement "simultaneously", adding: "There was no changing of our vote at any time that day as has been reported in some channels." With talks on league reconstruction beginning soon, the latest statement from Dens Park concludes: "From a very poor situation we have gotten the best result for Dundee FC and for Scottish football as a whole."
