content: |-
  The move follows talks between Maduro and a Trump envoy that led to the release of six US detainees.

  Trump says Venezuela will accept migrants returned from US

  Venezuelan state media said Maduro's discussions with Grenell had been respectful

  Donald Trump said in a Truth Social post on Saturday that Venezuela had agreed to take back migrants who had come to the United States illegally. The announcement came after a meeting between President Nicolás Maduro and a senior Trump administration official, Richard Grenell, that led to the release of six US detainees held in Venezuela. "Venezuela has agreed to receive, back into their Country, all Venezuela illegal aliens who were encamped in the U.S., including gang members of Tren de Aragua," Trump wrote. "Venezuela has further agreed to supply the transportation back." Venezuela has not independently announced the deal.

  The BBC has contacted Venezuela's mission to the United Nations for comment.

  A statement issued by the Venezuelan government said that migration was among the topics discussed by Grenell and Maduro, according to the Venezuelan state-sponsored broadcaster TeleSUR. The earlier release of the six US detainees was announced on social media by Trump and Grenell. Their names have not been made public. Grenell did not name the six men, who were seen dressed in light blue outfits used by the Venezuelan prison system. At least nine people with US citizenship or residency are believed to be among more than 2,200 detained by Venezuelan authorities following nationwide protests over the disputed July 2024 election results, in which Maduro claimed victory. His re-election was widely rejected by the opposition and international community, including the US. He was sworn in for his third term last month. "We are wheels up and headed home with these 6 American citizens," Grenell posted on X. "They just spoke to @realDonaldTrump and they couldn't stop thanking him." Trump hailed the move in a separate post, saying Grenell was bringing the six "home from Venezuela". Venezuelan state media said the discussions with President Trump's envoy had been respectful. After the meeting, Maduro said the talks had had "zero agenda" and that he sought a "new beginning in bilateral relations" with the US. However, White House press secretary Karoline Leavitt said earlier on Friday that Grenell's visit did not mean US recognition of Maduro as Venezuela's legitimate leader.
