content: |-
  Aaron Donald, one of the NFL's greatest defensive players, announces his retirement with immediate effect.

  Aaron Donald helped the Los Angeles Rams win the Super Bowl in their own stadium in 2022

  Aaron Donald, one of the NFL's greatest defensive players, has announced his retirement with immediate effect. The defensive tackle, who turns 33 in May, spent 10 seasons in the NFL, all with the Los Angeles Rams franchise. He helped them win the Super Bowl in 2022 and is one of three men to be named the NFL's Defensive Player of the Year three times. "Cheers to what's next," he said on X., external "Extending a big thank you to the Rams and all of the fans for your support." Donald hinted he was contemplating retirement during the Super Bowl run in 2022, before returning with the Rams, but his announcement on Friday came as a surprise. NFL teams are currently in the free agency period and are beginning to shape their rosters for the 2024 season, which begins in September.

  Donald was the 13th overall pick by the Rams in the 2014 draft and he spent two seasons with them in St Louis, winning the 2014 Defensive Rookie of the Year award, before the team relocated to LA. They reached the Super Bowl in 2019, losing 13-3 to the New England Patriots, but Donald was able to add a Super Bowl ring to his accomplishments after the Rams beat the Cincinnati Bengals 23-20 in their own stadium in LA. "Throughout my career, I have given my everything to football both mentally and physically - 365 days a year was dedicated to becoming the best possible player I could be," he added. "I respected this game like no other and I'm blessed to be able to conclude my NFL career with the same franchise that drafted me. Not many people get drafted to a team, win a world championship with that team and retire with that team. I do not, and will not, take that for granted." Donald finishes his career with 117 sacks, two of them coming in the Rams' Super Bowl win. He became the fastest defensive tackle to reach 100 sacks in NFL history and was an eight-time All-Pro selection. Rams owner Stanley Kroenke, who also owns Premier League club Arsenal, said: "We are so grateful for Aaron's dedication to greatness and for leading our franchise on and off the field for the past decade. He has left his mark on generations of football fans." General manager Les Snead said simply "there will never be another Aaron Donald", while head coach Sean McVay added: "he's an exceptional team-mate who inspires everyone around him to be the best version of themselves. "As great of a player he is, he's an even better person. He epitomises everything that's right about sports."

