title: How to share your questions, stories, pictures and videos with BBC News - BBC
  News
date: '2024-10-10'
section: Have Your Say
url: http://www.bbc.co.uk/news/10725415
content: |-
  Have you got a good story? BBC News wants to hear from you.

  Every day BBC News brings you the latest stories from across the globe but what we want to hear are the issues that matter to you. The part you play in making the news is very important. Whether it is breaking news or a featured item, your contribution can make a difference. Have you seen or been involved in a news event? Is something significant, bizarre or unusual happening where you live? Have you got a story to tell or is there something you think we should follow up? Are there topics you want to get the world talking about? On what do you want to comment? Or do you want to find out what others are talking about? Terms of use for sending contributions to the BBC and the BBC's privacy policy.

  If you have a story, picture or video you wish to share, here are the different ways to send in your contributions: We may use your tweets displaying your Twitter username on BBC output.

  You can send a picture, video or message to our WhatsApp account +44 7756 165803, external. In some cases your text, as well as your images, may be used on BBC output. We will publish your name as you provide it (unless you ask us not to) but we will never publish your mobile phone number. We aim to read all of your messages but due to the numbers we receive each day it is not always possible to reply to everyone individually.

  We aim to read all of your emails but due to the numbers we receive each day it is not always possible to reply to everyone individually. In some cases your images or audio may be used on BBC output. If we use your material on BBC programmes or online we will publish your name as you provide it (unless you ask us not to) but we will never publish your email address.

  You can also upload, external your video or pictures. In some cases your images may be used on BBC output. We will publish your name as you provide it, unless you ask us not to.

  Is there a story you would like us to investigate? Use this form to let us know.

  If you are reading this page and can't see the form you will need to visit the mobile version of the BBC website to submit your story or send them via email to haveyoursay@bbc.co.uk, external. Please include your name, age and location with any question you send in.
