  What the pundits said

  Former Scotland scrum-half Andy Nicol: "I don't know how to feel. Am I elated we got back in or am I gutted we got into a winning position and didn't make it? There were clearly system errors in the first half and the body language wasn't great but they turned it around and the positives definitely outweighed the negatives."

  Former England scrum-half Matt Dawson: "I'm chuffed how the Scots got back into it. I'm frustrated as an Englishman because I have never seen a side get so far ahead and almost lose it."

  Former England fly-half Paul Grayson: "I feel Owen Farrell's job spec is so big. The full captaincy on his own is a massive ask. When England got into trouble against Wales and Scotland, he has got so much on his plate that maybe he loses himself."

  BBC rugby union correspondent Chris Jones: "There are so many questions that remain about England. However brilliant they look when they are good, when they are off it, they can look like the wheels are falling off."

