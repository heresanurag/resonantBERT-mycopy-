content: |-
  Surrey pace bowler Tom Curran will make his England Test debut against Australia on Boxing Day, replacing the injured Craig Overton.

  Last updated on .From the section Cricket

  Coverage: Ball-by-ball Test Match Special commentary on BBC Radio 5 live sports extra, Radio 4 LW, online, tablets, mobiles and BBC Sport app. Live text commentary on the BBC Sport website and app

  Surrey pace bowler Tom Curran will make his England Test debut against Australia on Boxing Day.

  The 22-year-old replaces the injured Craig Overton for the fourth Ashes Test at the Melbourne Cricket Ground.

  "He's a feisty character and he gets the ball to move around a bit," said England captain Joe Root.

  "He's always in the contest. At no point will he hide away from any challenge. If times become hard he will give it everything."
