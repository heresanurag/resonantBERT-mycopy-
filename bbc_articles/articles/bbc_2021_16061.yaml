  The comments are the actor's first public attempt to address the allegations at length.

  Asked how he could have been unaware of the potential for power dynamics between a teacher and student to skew the concept of consent, Franco responded: "At the time, I was not clear-headed."

  "I was in recovery before for substance abuse. There were some issues that I had to deal with that were also related to addiction," he continued.

  "And so I've really used my recovery background to kind of start examining this and changing who I was."

  If you have been the victim of sexual misconduct, there is help available via the NHS website.
