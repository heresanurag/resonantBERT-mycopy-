title: Euromillions €250m lottery winner in Ireland comes forward - BBC News
date: '2025-06-19'
section: Europe
url: http://www.bbc.co.uk/news/articles/cedg0pjjng1o
content: |-
  The Irish National Lottery says the winning ticket was sold by a retailer in County Cork.

  The EuroMillions jackpot is capped once it reaches €250m

  The holder of the winning ticket for a EuroMillions jackpot of €250m (£213m) has come forward, the Irish National Lottery has said. It said the winning ticket was sold by a retailer in County Cork. It added that the name of the shop which sold the winning ticket would be announced on Friday. It is said to be the largest ever EuroMillions jackpot to be won in Ireland.

  The winning numbers were 13, 22, 23, 44, 49, Lucky Stars 3 and 5. "We are absolutely thrilled to have heard from our EuroMillions winner," Irish National Lottery spokesperson Emma Monaghan said. "At this point, our priority is to give them the necessary time and space to make arrangements and let this life-changing news sink in." The company said no other details will be revealed at this stage. The EuroMillions jackpot is capped once it reaches €250m.
