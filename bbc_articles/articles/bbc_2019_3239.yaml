  The Worldwide Threat Assessment report, presented to the Senate in January, also highlighted the continuing dangers of the group.

  While IS will probably not immediately aim to take new territory, the report assesses its militants will try to "exploit Sunni grievances, societal instability and stretched security forces to regain territory in Iraq and Syria in the long term".
