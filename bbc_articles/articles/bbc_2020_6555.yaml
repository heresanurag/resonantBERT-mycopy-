id: bbc_2020_6555
title: 'Coronavirus: The body collectors of Brazil - BBC News'
date: '2020-06-05'
section: General
url: http://www.bbc.co.uk/news/world-latin-america-52870073
content: |-
  Brazil has seen high numbers of coronavirus deaths and ordinary people are trying to help cities cope.

  Brazil's confirmed death toll from coronavirus has surged past 34,000 to become the third-highest in the world, according to official figures.

  Its death rate has now surpassed Italy and only the US and UK have recorded more fatalities.

  President Jair Bolsonaro has consistently played down the outbreak, although the country has the world's second-highest number of cases.

  In places like Manaus, ordinary people are taking on extraordinary roles in order to help their cities cope.
