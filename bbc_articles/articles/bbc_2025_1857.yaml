content: |-
  Police say the body, believed to be a man in his 40s, has been identified and next of kin informed.

  M4 and M48 reopens after body found on carriageway

  Traffic built up on the M4 westbound after the motorway was closed on Saturday

  The M4 has reopened in both directions after a body was found on the carriageway. Police were called to reports of something in the road between junction 20 (Almondsbury interchange) and junction 22 (Awkley) on Saturday at 18:40 GMT. Avon and Somerset Police said human remains had been found and they were investigating how they had come to be on the motorway. Officers have since been able to identify the body - which is believed to be that of a man in his 40s - and have informed his next of kin.

  The eastbound carriageway of the M4 and the M48 between the Severn Crossing and junction 21 of the M4 was closed, but reopened at approximately 01:30 GMT on Sunday, with the westbound closures removed at around 03:00. Anyone travelling along the motorway at the time of the incident, with information or dash cam footage is asked to contact police.
