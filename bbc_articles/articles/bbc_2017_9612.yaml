title: Wildlife park visitor snaps perfectly-timed tiger selfie - BBC News
date: '2017-09-23'
section: Highlands & Islands
url: http://www.bbc.co.uk/news/uk-scotland-highlands-islands-41365225
content: |-
  Donna Martin captured her image as Amur tiger Marty put a paw on the protective glass behind her.

  Donna Martin took her image at the Highland Wildlife Park at Kincraig, as tiger Marty put a paw on a pane of protective glass behind her.

  Marty is one of two Amur tigers held in the collection at the Royal Zoological Society of Scotland's park in the Cairngorms near Aviemore.

  Ms Martin let the park's staff know of her close encounter with the big cat.

