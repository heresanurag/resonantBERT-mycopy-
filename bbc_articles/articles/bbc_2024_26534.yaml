title: England v New Zealand - Holly Aitchinson returns for Red Roses - BBC Sport
date: '2024-10-03'
section: English Rugby
url: http://www.bbc.co.uk/sport/rugby-union/articles/c3rljzln2q4o
content: |-
  England recall Holly Aitchison at fly-half for their WXV meeting with world champions New Zealand on Sunday.

  England have recalled Holly Aitchison at fly-half for their WXV meeting with world champions New Zealand on Sunday. She played in England's two warm-up wins for the tournament, but Zoe Harrison was preferred for last weekend's victory over the United States. Aitchison is part of an experienced backline with Tatyana Heard and Helena Rowland in midfield and Jess Breach, Abby Dow and full-back Ellie Kildunne forming the back three. "We went with both [Aitchison and Rowland] because of the cohesion they have got and we have also got the ability to change it up as they are very versatile," England forwards coach Louis Deacon said. "You saw last week that Holly [Aitchison] moved to 12, Scaz [Emily Scarratt] can also play 12. "We chose that particular combination as that is the best mix." Morwenna Talling, who can also play at second row, keeps her place at blindside flanker with Maddie Feaunati on bench.

  Prop Hannah Botterman, one of 10 changes to the starting line-up, wins her 50th cap in the front row. "To reach 50 caps by the age of 25 and the way she is playing at the moment, I take my hat off to her [Hannah]," Red Roses captain Marlie Packer said. "She has had a few knockbacks in her career and picked up some big injuries, but she has taken that all in her stride and has really grown." England won 2023's inaugural WXV title with victory over New Zealand, as well as their most recent meeting with the Black Ferns, 24-12 at Twickenham's Allianz Stadium last month. However, New Zealand are the last team to beat the Red Roses, with a dramatic comeback win in the Rugby World Cup final in 2022. The Black Ferns come into the fixture off the back of a shock 29-27 defeat by Ireland in their WXV1 opener. "We have a few things that we need to fix up from playing them [last month]," Packer added. "It is great that we have the opportunity to play the world champions again within a few weeks. "You don't often get that opportunity, so it is one myself and the squad are really relishing. "There are no better matches than the Red Roses against the Black Ferns and they will be wanting to put a few things right."
