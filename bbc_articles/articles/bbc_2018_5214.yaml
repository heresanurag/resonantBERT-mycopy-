title: Kew Gardens will reopen the world's largest Victorian glasshouse - BBC News
date: '2018-05-03'
section: General
url: http://www.bbc.co.uk/news/science-environment-43982036
content: |-
  The Temperate House at Kew Gardens, which was built in 1863, is home to some of the world's rarest plants.

  Temperate House, the world's largest Victorian glasshouse reopens on 5 May 2018.

  It houses a collection of some of the rarest plants from all around the world.
