content: |-
  The chancellor hopes expanding free childcare to include younger children will make it easier for more parents to work.

  'From the most competitive to the middle of the pack'

  Delestre now moves on to talking about corporation tax. He says there has been a long-term pattern of rate cutting in the UK over the years, but with the planned rise from 19% to 25%, the country is now moving from being one of the most competitive in the world to the "middle of the pack" - though still lower than any other G7 country. He says the revenue corporation tax will create as a percentage of GDP will reach the "highest ever level" by the end of the forecast period. He notes that with planned rises to corporation tax there will be concerns that it could dampen investment in the UK. Delestre adds Hunt has countered this by introducing a temporary increase to tax allowance on investments for the largest companies.
