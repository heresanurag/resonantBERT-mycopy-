title: 'Jude Bellingham: ''Iconic Euro 2024 goal will go down in England history''
  - BBC Sport'
date: '2024-07-01'
section: England Men
url: http://www.bbc.co.uk/sport/football/articles/cg3ej1gd172o
content: |-
  Jude Bellingham pulled Gareth Southgate's side clear of the precipice with one of the finest goals scored by anyone in an England shirt, writes Phil McNulty.

  'Bellingham goal will go down in England history'

  This video can not be played To play this video you need to enable JavaScript in your browser.

  The clock timer inside the giant Arena AufSchalke had ticked around to 94 minutes 34 seconds when Jude Bellingham took to the air to produce an iconic moment that will take its place alongside the great England goals. England had only 86 seconds to spare themselves from the humiliation of a defeat against Slovakia that would sit uncomfortably in the chamber of sporting horrors alongside the loss to Iceland at Euro 2016. Failure to do so would surely have signalled the end of Gareth Southgate’s time as England manager - it may still come soon irrespective of their fate in Germany - and a wide-ranging inquest into everything surrounding a mystifying failure to show up at Euro 2024. And then came Bellingham. In a flash of genius that will be replayed and talked about for years, Bellingham took off in an audacious show of athleticism and individual skill to send a stunning overhead kick past Slovakia keeper Martin Dubravka. Think David Platt’s acrobatic hooked finish in the last seconds of extra time against Belgium at this same last-16 stage of Italia 90. Think Paul Gascoigne’s left-foot flick over Colin Hendry and volleyed right-foot finish against Scotland at Wembley in Euro 96. Think the 18-year-old Michael Owen's dazzling slalom run and finish into the roof of Argentina's net in the last 16 at the France 98 World Cup. Bellingham’s goal was at least the equal of those as he somehow found the agility to rise and get on the end of Marc Guehi’s headed flick after 90 gruelling minutes when he had again struggled to make his usual impact. He turned away, appearing to mouth “who else?” to the joyous England fans. Who else indeed?

