  Bellingham celebrated his 21st birthday on Saturday and now he had given his own belated gift to those suffering, disgruntled England supporters. England’s fans were betraying their feelings with silence in those closing moments, resigned to defeat while bracing themselves to dish out the toxic treatment that has become the soundtrack to their past two performances against Denmark and Slovenia. Southgate’s name was even booed before kick-off when it was announced. England’s players were roundly jeered at half-time - and they would have known something much worse was coming had Slovakia closed out the win. Instead, those same supporters can now say they were present to see one of the most dramatic goals and escapes in recent history, Bellingham’s goal England’s first shot on target and their latest strike in normal time at any major tournament. It may have been 94 minutes 34 seconds of torture and torpor before but it was worth every second of the wait and more besides. There was mayhem on the touchline among England’s substitutes and backroom team as Bellingham was swamped. Its impact on Slovakia was instant and profound as their broken players slumped to the turf in the face of this magic, perhaps knowing that the battle was lost, as indeed it was when Harry Kane scored England’s winner early in extra time. England were on the way out - and then they were on their way into a quarter-final meeting with Switzerland on Saturday in Dusseldorf.

