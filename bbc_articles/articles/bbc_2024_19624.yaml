title: 'Claudiu-Carol Kondor: Second arrest over delivery driver murder - BBC News'
date: '2024-08-22'
section: West Yorkshire
url: http://www.bbc.co.uk/news/articles/cn5reg7vvkqo
content: |-
  A 24-year-old man is arrested on suspicion of murdering Claudiu-Carol Kondor in Leeds.

  Claudiu-Carol Kondor was described as a "beloved colleague, friend and confidant"

  A second man has been arrested on suspicion of the murder of a delivery driver who died in Leeds. Claudiu-Carol Kondor, 42, from Sheffield, died as he tried to stop a thief stealing his van when out delivering parcels on Tuesday evening. Eddie Hampshire, 24, from Belle Isle, was arrested on Thursday after a public appeal, while a woman was held on suspicion of assisting an offender, West Yorkshire Police said. Another man, aged 32, was arrested on Wednesday night on suspicion of Mr Kondor's murder and remained in custody, police had earlier said.

  Mr Kondor died after the suspect drove the Ford Transit away with the courier "partly inside" the passenger door, according to West Yorkshire Police. Officers were called to Heights Drive at about 18:50 BST on Tuesday, to reports of a seriously injured man in the road. Mr Kondor was thought to have been delivering Amazon parcels in the area, for a third-party contractor, when his van was targeted by a thief. After a struggle, he was left lying in the road when the vehicle collided with two parked cars. He was given emergency treatment by ambulance staff but was pronounced dead at the scene a short time later.

  The stolen van was recovered in Highlands Walk, Belle Isle, police said

  Mr Kondor's colleagues at SP Transport Group have set up a fundraiser for his family which has raised over £12,700. Mr Kondor was described as a "beloved colleague and confidant" by the company. Mike Neill, operations manager of SP Transport Group, wrote the "unimaginable loss" had left everyone "devastated". "Claudiu was a dedicated and cherished member of the SP Transport Group family who tragically lost his life on 20 August 2024 during a struggle that occurred in the midst of a van theft," he said. "Claudiu was more than just a colleague - he was a friend, a confidant and a valued member of our team. "His commitment to his work and the camaraderie he brought to the workplace will never be forgotten." Mr Neill added that Mr Kondor's death extended "far beyond the workplace" and would affect all who knew him.

  Police at the scene in Heights Drive on Wednesday morning

  "While no amount of money can fill the void left by Claudiu's passing, we hope to provide some comfort and support to his loved ones," Mr Neill said. Listen to highlights from West Yorkshire on BBC Sounds, catch up with the latest episode of Look North or tell us a story you think we should be covering here, external.
