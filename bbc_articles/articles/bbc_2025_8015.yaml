title: 'Watch: Chris Packham says off-lead dogs endanger birds - BBC News'
date: '2025-04-06'
section: General
url: http://www.bbc.co.uk/news/videos/cly1gq58q0ro
content: |-
  Birds that are disturbed during breeding season can abandon their nest, nature presenter says.

  "When birds see a dog, they see a predator."

  Naturalist Chris Packham is pleading with dog owners to keep their pets on a lead during bird breeding season.

  The BBC Springwatch presenter told BBC Radio Wales Breakfast that when a dog disturbs a bird on the nest it can abandon its eggs.

  Natural Resources Wales and RSPB Cymru say birds that nest in long grass or on beaches are most vulnerable.
