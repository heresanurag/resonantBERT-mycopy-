title: Defence questions Cohen's credibility at Trump trial - BBC News
date: '2024-05-19'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-68980349
content: |-
  The BBC's Nada Tawfik walks through Michael Cohen's second day on the stand as cross-examination begins.

  Michael Cohen took the stand for a second day in Donald Trump's hush-money trial on Tuesday.

  Cohen, who was once Trump's personal attorney, testified about hush-money payments to adult-film star Stormy Daniels. In its cross-examination, the defence sought to question Mr Cohen's credibility as a witness and attack his motivations.

  The BBC's Nada Tawfik walks through the heated exchanges that happened at court.
