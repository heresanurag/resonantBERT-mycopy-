title: 'Trump on the Iran deal: ''Worst, horrible, laughable'' - BBC News'
date: '2018-05-08'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-41587428
content: |-
  Despite the French president's efforts, the "Art of the Deal" author continues to slam the Iran accord.

  Before an official agreement was even made, Donald Trump was tweeting criticisms of the 2015 Iran nuclear deal. And now the attempts of the French president to dissuade him from ditching the deal look like they may have been in vain.
