title: '''Mini tornado'' spotted over Brisbane River in Queensland - BBC Weather'
date: '2024-11-01'
section: General
url: http://www.bbc.co.uk/weather/videos/cpdve9l4e5jo
content: |-
  Intense thundery rain and gusty winds led to this short-lived 'mini tornado' or waterspout

  Queensland residents captured on video what many believed to be a ‘mini tornado’ blowing across the Brisbane River on November 1.

  It came as a large supercell storm cloud crossed the city during the afternoon bringing intense rain and large hail. Severe weather warnings were issued in the area.

  The strong winds which accompanied the storm cloud began to swirl above the Brisbane River at Kangaroo Point, causing a short-lived waterspout, the name for a tornado over a body of water.
