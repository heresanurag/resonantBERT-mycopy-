title: 'Beirut explosion: Moment blast hit BBC bureau - BBC News'
date: '2020-08-09'
section: General
url: http://www.bbc.co.uk/news/world-middle-east-53662490
content: |-
  BBC Arabic reporter Maryem Taoumi was interviewing a member of the Moroccan Agency for Sustainable Energy from the Beirut Bureau.

  BBC Arabic reporter Maryem Taoumi was interviewing Faisal Al-Aseel, project manager at the Moroccan Agency for Sustainable Energy when the explosion took place.
