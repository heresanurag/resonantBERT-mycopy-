content: |-
  PM tells MPs new lockdown measures could come in to place from Monday.

  Starmer: How on earth did this happen?

  Sir Keir Starmer takes to the despatch box for the third Prime Minister's Questions of his tenure as Labour leader - but first time opposite Boris Johnson. He welcomes the PM "back to his place" and congratulates him on the birth of his son. Sir Keir quotes Mr Johnson on his return to work two weeks ago, when he talked of the "apparent success of the government" dealing with coronavirus. But he says, with the death toll becoming the highest in Europe, "that is not success or apparent success". He asks the PM: "How on earth did it come to this?" Mr Johnson says: "Every death is a tragedy and he is right to draw attention to the appalling statistics, not just in this country but around the world." But he says the data is not yet there to "draw conclusions". The PM adds: "What I can tell him is at every stage as we took the decisions we did, we were governed by one overriding principle - save lives and protect NHS."
