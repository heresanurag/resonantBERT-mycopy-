content: |-
  A trail of destruction was left after multiple tornadoes tore through the state.

  Aerial footage captured in Oklahoma City, Oklahoma shows severe damage to homes and vehicles after multiple tornadoes tore across the state early on Sunday.

  Eleven people required hospital treatment in Oklahoma County, according to local officials.
