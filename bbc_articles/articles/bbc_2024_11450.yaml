title: Prince William jokes about 'Harry Potter' scar on Cardiff visit - BBC News
date: '2024-06-11'
section: Wales
url: http://www.bbc.co.uk/news/articles/cm55x9p7nv1o
content: |-
  The Prince of Wales was eight when he was accidentally hit on the head by a golf club at school.

  Prince William described how he got his injury during a visit to Cardiff

  The Prince of Wales has joked about his "Harry Potter" scar during a visit to Cardiff. William mentioned the childhood accident which left him with a head wound as he met with businesses and organisations which utilise the benefits of seaweed for their products. Gathering at Cardiff Metropolitan University he told the assembled entrepreneurs how he got the injury being whacked with a golf club as a boy. Pointing to a mark above his left eye William also said he has never played the sport since.

  The prince pointed out his scar while meeting patients at a London children's hospital in 2018

  He discussed investment in what was described as the super-power of seaweed by Derek Walker, the future generations commissioner - a role created by the Welsh government to help public bodies change behaviour and "improve social, economic, environmental and cultural well-being". The prince also chatted to Pierre Paslier, co-founder and co-chief executive officer of Notpla, a former category winner in William's Earthshot environmental prize, which supplies seaweed packaging to major UK sport and music venues. Picking up a biodegradable golf tee made from marine algae, William was then asked if he likes to tee off, to which he replied: "No, (this happened) the last time I played golf." He then pointed to the painful reminder of the moment in 1991 when, aged eight, he was accidentally struck with a friend's club, during the time he was at boarding school in Berkshire. It saw him taken to the Royal Berkshire Hospital in Reading for treatment and left him with a scar not unlike the title character of JK Rowling's bestselling boy wizard books.
