  Wales football manager Chris Coleman is revealed as the mystery runner in the annual Nos Galan race.

  Wales football manager Chris Coleman has been revealed as the mystery runner in the annual Nos Galan race.

  Fresh from getting an OBE in the New Year Honours, Coleman joined more than 1,000 other runners in the race in Mountain Ash, Rhondda Cynon Taff.

  The race is held every New Year's Eve.

  Coleman, 46, told BBC Wales it was a "fantastic tradition" and he was "very excited" to take part.

  Nos Galan, founded in 1958, celebrates the life of Welsh runner Guto Nyth Bran, who died in 1737, aged 37.
