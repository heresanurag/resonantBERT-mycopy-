  • None Norway are only the second team in Women's World Cup history to benefit from an own-goal in consecutive games in the competition, after Japan in 2015.
  • None Wendie Renard is the first player to score an own-goal for France at a Women's World Cup tournament.
  • None Eugenie Le Sommer has scored 12 goals in her last 12 international appearances for France, including a goal in both of France's games at the 2019 Women's World Cup.
