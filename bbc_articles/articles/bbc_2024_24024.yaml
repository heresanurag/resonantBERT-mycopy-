title: Sir Terry Wogan's wife Lady Helen dies aged 88 - BBC News
date: '2024-09-06'
section: Culture
url: http://www.bbc.co.uk/news/articles/cwy5l3279gjo
content: |-
  Lady Helen Wogan has died at the age of 88, eight years after the death of her husband Terry.

  Lady Helen Wogan with Sir Terry in 2005, as they collect his knighthood at Buckingham Palace

  Lady Helen Wogan, the wife of broadcaster Sir Terry Wogan, has died aged 88 after a "fantastic life", her son has announced. In a social media post, Mark Wogan said he imagines his parents will be "sharing a vodka martini and hoping we don't make too much of a fuss". Lady Helen, who was born in 1936, was married to Sir Terry for more than 50 years, with the pair spending much of their lives together in the Buckinghamshire village of Taplow. Sir Terry, who hosted his own talk show and Radio 2 breakfast in a long broadcasting career, died of cancer in January 2016 at the age of 77.

