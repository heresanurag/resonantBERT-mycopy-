  Lady Helen was described by her son as "the epitome of style and grace" in an Instagram post, external. "A mother, grandmother and wife, with love and kindness at her core. A strength and a belief that saw her through many of life's trials," he added.

  Lady Helen Wogan pictured at a memorial service for Sir Terry in 2016

  "A sense of humour and a turn of phrase that would have you in fits of laughter," the statement added. "A proper lady in every sense of the word." Wogan also shared a black-and-white picture of his parents with the statement, which was released late on Thursday evening. Lady Helen and Sir Terry shared four children and five grandchildren together. The pair, both born in Ireland, married in a local parish church in Dublin in April 1965. Tributes have been paid by a number of stars, including Jeremy Clarkson, Eamonn Holmes and Tess Daly.
