title: Cristiano Ronaldo statue unveiled in Times Square - BBC News
date: '2025-02-06'
section: General
url: http://www.bbc.co.uk/news/videos/c9d542w04y1o
content: |-
  The 12ft (3.6m) bronze sculpture, created by Sergio Furnari, was revealed on the soccer superstar's 40th birthday.

  A 12ft (3.6m) bronze statue of soccer superstar Cristiano Ronaldo was unveiled at Times Square in New York City on his 40th birthday to celebrate his career and global influence.

  Fans gathered at the unveiling to honour him and shouted Ronaldo's 'Siuuu!' catchphrase.
