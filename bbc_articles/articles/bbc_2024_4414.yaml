  Galopin Des Champs bids to defend the Cheltenham Gold Cup on Friday for record-breaking trainer Willie Mullins as the big race marks its 100th anniversary.

  Can Galopin Des Champs do it again?

  Coverage: Commentaries on BBC Radio 5 Sports Extra, with feature races on BBC Radio 5 Live. Racecards, live text, results & reports on the BBC Sport website and app.

  Galopin Des Champs bids to defend the Cheltenham Gold Cup on Friday as the big race marks its 100th anniversary. Record-breaking Irish trainer Willie Mullins is looking to win the showpiece event for the fourth time in six years. But Hewick, who cost just £800 and won the King George VI Chase, has been ruled out of the contest which boasts prize money of £625,000. Trainer John 'Shark' Hanlon said the rain-softened ground at the Gloucestershire track would not suit his horse's chances.

  Fastorslow, trained by Martin Brassil, has twice got the better of Galopin Des Champs but the reigning champion was on top last time in the Irish Gold Cup. "Galopin des Champs came out of his last race very well and I am very happy," said Mullins, who also won the race with Al Boum Photo in 2019 and 2020. "Anytime you win any race at Cheltenham it's special, to win the Gold Cup in its 100th year would be extra special" Willie's son Patrick, who rode the trainer's historic 100th Festival winner on Wednesday, will be aboard stablemate Monkfish. A fascinating race sees a host of contenders and plenty of question marks. Gentlemansgame has not run since defeating Bravemansgame in the Charlie Hall Chase more than four months ago, but the grey cannot be discounted in the hands of shrewd trainer Mouse Morris. The Real Whacker clocked up a third course victory when edging out Gerri Colombe to win the Brown Advisory Novices' Chase at last year's Festival. They both return along with the 2022 novice chase winner L'Homme Presse. Welsh National victor Nassalam and Rachael Blackmore's mount Jungle Boogie also line up.

  Andrew Thornton, former jockey who won Gold Cup in 1998 on Cool Dawn: Galopin Des Champs on the slow ground for the in-form Mullins team is hard to oppose. Corach Rambler is unbeaten around Cheltenham and has a good each-way chance. Gina Bryce, racing broadcaster on BBC Radio 5 Sports Extra: It's tough to take on last year's winner but Gentlemansgame has bags of potential at a big price and despite his relative inexperience, could improve to play a part.

