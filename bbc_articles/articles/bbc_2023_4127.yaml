title: 'Watch: Shed topples as Hemsby cliff collapses at high tide - BBC News'
date: '2023-03-11'
section: General
url: http://www.bbc.co.uk/news/uk-england-norfolk-64924665
content: |-
  There are fears for homes as a cliff continues to crumble in Hemsby.

  The coastline at Hembsy has been hit by severe erosion in recent weeks, leaving homes at risk of collapse.

  BBC reporter Jon Ironmonger and cameraman Richard Knights captured the moment a shed was lost to the sea on Friday night.
