title: Woman killed in attack by pet dog in Coventry - BBC News
date: '2024-07-22'
section: Coventry & Warwickshire
url: http://www.bbc.co.uk/news/articles/c80x7l511w9o
content: |-
  Police say the woman was treated by paramedics after the attack but died a short time later.

  The incident happened at about midday on Wexford Road in Coventry, police said

  A woman in her 30s has died after she was attacked by a pet dog in Coventry. It happened inside a property on Wexford Road at about 12:15 BST on Monday, the ambulance service said. The woman was found in a critical condition inside the building and, with help from police officers, was quickly taken outside due to "safety concerns", they added. She was given advanced life support by paramedics but died a short time later.

  The dog was seized and the woman's death reported to the coroner for further investigations, West Midlands Police said. The dog's breed was yet to be confirmed but it was not believed to be a banned breed, the force explained. A full assessment will be required before the authorities can confirm this.

  This video can not be played To play this video you need to enable JavaScript in your browser. Two ambulances, a paramedic officer and two air ambulances were sent to the scene, according to West Midlands Ambulance Service

  Ch Insp David Amos said: "We understand that this is a distressing and tragic incident and we would like to thank the local community for their support and to our emergency services colleagues who dealt with this incident. "Our thoughts remain firmly with the family and loved ones of the woman who has sadly died and [we] will be informing the coroner of her death."

  Two ambulances, a paramedic officer and two air ambulances were sent to the scene, with the first ambulance arriving within six minutes of being called, West Midlands Ambulance Service said. A spokesperson added: "With help from police, the woman was rapidly removed from the property due to safety concerns." Despite the best efforts of ambulance staff, nothing could be done to save the woman and she was confirmed dead at the scene a short time later, they added. They said nobody else was hurt in the attack.
