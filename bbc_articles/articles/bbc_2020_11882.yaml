  • None Scotland have gone six games without defeat in all competitions (W4 D2) for the first time since being unbeaten in seven matches under Gordon Strachan in October 2017.
  • None Only one of the game's 29 shots was on target - Eran Zahavi's attempt for Israel in the 72nd minute.
  • None It was the first time Scotland have not had a shot on target at home since the game against Belgium in September 2013.

  Scotland's focus now falls to Sunday's visit of Slovakia to Hampden in the Nations League, then the arrival of the Czechs on Wednesday. Honestly...
