  BBC News at Six presenter George Alagiah also paid his respects in a tweet, saying: "Our newsroom has lost a young journalist of such talent and promise. Our thoughts are with her family and friends."

  Katharine Viner, editor-in-chief at the Guardian, tweeted it was "absolutely terrible news that the talented journalist, and lovely person, Hanna has died".

  Hanna's fellow BBC journalist Sophia Smith Galer said her friend was "invariably the kindest, smartest and most captivating person in the room".

  "We have lost a fierce friend and a force for truth and light which stretched far beyond her journalism to the many lives she touched here at the BBC and beyond," she said.

  "We will make sure her legacy of compassionate storytelling rings loud and clear in the time to come and we are going to miss her so, so much."

  And BBC chief international correspondent Lyse Doucet tweeted: "You left too soon a world where you shone such a bright light."

