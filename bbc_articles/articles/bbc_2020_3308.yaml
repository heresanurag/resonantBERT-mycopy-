title: 'Coronavirus: Singing to raise spirits during isolation - BBC News'
date: '2020-03-19'
section: General
url: http://www.bbc.co.uk/news/uk-wales-51958199
content: |-
  Cor-ona is a social media group where people can post videos of themselves singing while isolated.

  People who are self isolating in a bid to prevent the spread of coronavirus are being encouraged to sing.

  Catrin Angharad Jones started Cor-ona, a social media group where people can post videos of themselves singing.

  Cor is the Welsh word for choir.
