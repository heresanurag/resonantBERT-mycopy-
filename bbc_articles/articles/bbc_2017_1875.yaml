title: Trump welcomes Trudeau to White House - BBC News
date: '2017-02-13'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-38961397
content: |-
  The US president and Canadian prime minister exchange greetings ahead of their first face-to-face talks.

  President Donald Trump has welcomed Canadian Prime Minister Justin Trudeau to the White House.

  The leaders are expected to discuss economic links and women in the workforce.
