  To give you a sense of the scale of the challenge here, both the last government and the new government have had conversations with the Estonian government about the idea of exporting prisoners to serve their sentence there. As extraordinary as this sounds, it wouldn’t be unprecedented – other European countries have struck such arrangements, where prisoners are convicted in one country and jailed in another. The idea was raised again by the Estonian government with the justice secretary, Shabana Mahmood, on a visit there this week. I am told both former Conservative ministers and current Labour ministers independently came to the view that it would be very expensive. But the fact the idea hasn’t been rejected outright tells you something about how willing ministers are to consider novel potential solutions to deal with the problem they confront.
