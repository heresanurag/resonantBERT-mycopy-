title: The moment Bill Cosby leaves prison - BBC News
date: '2021-07-01'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-57646166
content: |-
  It follows the US comedian's sexual assault conviction being overturned by Pennsylvania's Supreme Court.

  Bill Cosby has left prison after his sexual assault conviction was overturned by Pennsylvania's Supreme Court.

  The US comedian, who served more than two years of a three to 10-year sentence at a state prison near Philadelphia, was transported to his nearby residence in a white car.
