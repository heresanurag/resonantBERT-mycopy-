title: Piers Morgan apologises to Jay-Z and Beyoncé for guest's false claims - BBC
  News
date: '2024-10-09'
section: Culture
url: http://www.bbc.co.uk/news/articles/cj4dz49x4wgo
content: |-
  A guest on the host's show made allegations that the couple's lawyers said were "totally false".

  Piers Morgan Uncensored airs on YouTube and was formerly a TalkTV show

  Piers Morgan has apologised to Jay-Z and Beyoncé after a guest on his show Uncensored made allegations they said were "totally false". Last week, he interviewed singer Jaguar Wright about Sean 'Diddy' Combs' recent arrest. She said on the show she had been "screaming" that "Diddy and Jay-Z are monsters" for four years. Morgan said on Tuesday that he had been contacted by Jay-Z and Beyoncé's lawyers, who said the claims were "totally false and have no basis in fact".

  Jaguar Wright is a singer-songwriter who has previously worked with Jay-Z

  The former Good Morning Britain host said Wright would have voiced her opinions regardless of appearing on the show, saying "the reality of the modern world is that pretty much everyone had a platform as long as they have something to say that other people want to hear". He added: "That's why we invited [Wright] on to be interviewed. The people making these claims have an audience with or without shows like mine." But Morgan said that now he had heard from the couple's lawyers, they would edit Wright's allegations out of the show. He then offered a direct apology, saying: "Editing interviews is not something we do lightly at a show called Uncensored. "But like the proverbial cries of 'fire' in a crowded theatre, there are legal limits on us, too. And we apologise to Jay-Z and Beyoncé."

  Lawyers for Jay-Z and Beyoncé asked for Wright's comments to be taken down

  Wright has collaborated with hip-hop group The Roots and appeared as a backing singer for Jay-Z. She has taken grievance with several industry figures in the past, external using her own social media channels. She was invited by Morgan to speak about the ongoing legal action against Mr Combs, who was arrested last month on charges of racketeering and sex trafficking. He denies criminal wrongdoing and is currently in custody after being denied bail. Morgan's show is on YouTube after leaving TalkTV in the UK earlier this year.
