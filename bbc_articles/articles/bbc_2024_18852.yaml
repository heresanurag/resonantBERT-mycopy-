title: 'Newport: Murder accused David Sisman denies killing Lee Crewe - BBC News'
date: '2024-08-16'
section: Wales
url: http://www.bbc.co.uk/news/articles/cy0nxy3y121o
content: |-
  David Sisman denies murdering Lee Crewe, who was found unresponsive in the street.

  Lee Crewe's family said he had "an infectious personality that always lit up a room"

  A 21-year-old man has pleaded not guilty to murder after a man was found stabbed on a city street. Lee Crewe was found unresponsive on Chepstow Road in Newport on 14 May and Merthyr Tydfil Crown Court heard the 36-year-old died from a single stab wound. David Sisman, 21, of Hubert Road, Newport, spoke only to confirm his name during the hearing on Friday. He was remanded in custody ahead of his trial, which is due to start on 28 October.

  In a tribute issued after his death, Mr Crewe's family described him as "lovely, inside and out". "He had an infectious personality that always lit up a room," they added.
