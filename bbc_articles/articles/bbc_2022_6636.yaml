  Weather presenter Carol Kirkwood is spotted with a "giant rock" on her finger as she reveals engagement.

  BBC weather presenter Carol Kirkwood has revealed that she is engaged live on air.

  Her eagle-eyed colleague Sally Nugent spotted Kirkwood's "giant rock" engagement ring during a weather forecast on Monday morning and said she'd been struggling to keep the happy news a secret.

  Watch as Kirkwood describes how the proposal happened.
