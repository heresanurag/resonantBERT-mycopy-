title: 'Newspaper headlines: Sunak criticises Farage and Starmer ''would work with
  Le Pen'' - BBC News'
date: '2024-06-28'
section: The Papers
url: http://www.bbc.co.uk/news/articles/c3gw67wq890o
content: |-
  With days to go until polling day, the general election features on many of Friday's front pages.

  Sunak hits out at Farage and Starmer 'would work with Le Pen'

  The Daily Telegraph leads, external with an attack on Nigel Farage by the Prime Minister. Its headline features a quote from Rishi Sunak describing the Reform UK leader as a "Putin appeaser". The Times splashes, external on Channel 4's Reform UK story - the paper says the revelations come as the party faces fresh claims of widespread sexist and racist behaviour among its election candidates. In other election news the Guardian says, external a Labour government would ban NHS managers who silence whistleblowers. Shadow health secretary Wes Streeting pledges to eradicate a culture of cover-ups in the health service. The NHS also features on the Daily Mirror's front page, external photo - showing an image of a flooded corridor in a hospital in Stockport - evidence, the paper says of the scale of neglect under the Tories. Shadow chancellor Rachel Reeves' first budget would include her pledge to impose a 20% VAT on private schools according to the i newspaper, external. The Daily Express claims, external the BBC spent more than £30,000 of licence fee payers' money to hire audience members for the TV debate between Rishi Sunak and Sir Keir Starmer. The broadcaster said the payments are standard for such events to cover travel costs and time. But, according to the Daily Mail, external a poll by market research and polling company, Redfield and Wilton Strategies, appears to show more than four million voters remain undecided on who to back in next week's election. Moving to other domestic news the Financial Times reports, external the number of people paying the top-rate of income tax is due to pass the one million mark for the first time this year. "TV paramedic murder probe" reads Metro's front page, external. The paper reports on the death of a paramedic who appeared on the Channel 4 reality show "999: On the Frontline", and his girlfriend. It says a double murder investigation has been launched after the bodies of Daniel Duffield, who was 24, and 22-year-old Lauren Evans were discovered at a property in Staffordshire.

