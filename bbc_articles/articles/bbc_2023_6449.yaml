  The show was hosted by Ted Lasso star and three-time Oliviers nominee Hannah Waddingham, who is also going to co-host this year's Eurovision Song Contest in Liverpool. She sang with the casts of various musicals, opening the show with an original song.

  She joked in her opening monologue she would "happily be mauled to death" by Comer in Killing Eve - in which the actress plays a lethal killer.

  Waddingham also used sign language to welcome former Strictly Come Dancing winner Rose Ayling-Ellis, who was nominated for best supporting actress for As You Like It.

  Mescal thanked his co-stars and parents "who never said no" in his acceptance speech, and told his Mum, who has been undergoing cancer treatment: "I hope you get better soon."

  This video can not be played To play this video you need to enable JavaScript in your browser. Watch: Paul Mescal told the BBC in February his Oscar nomination was giving his family a respite after difficult times

  The actor told the BBC afterwards that when he chooses a role, he is "interested in exploring the myriad of different versions of what masculinity is".

  He won for playing the toxic Stanley Kowalski in Streetcar, and was Oscar-nominated for playing the troubled Calum in Aftersun, after getting critical acclaim for playing sensitive Connell in TV drama Normal People.

  "I think creative death for me would be for people to predict what I'm doing next," he added. "I don't want that. So hopefully I'll keep it moving in a direction that surprises people."

  Jodie Comer drew praise for her West End debut in Prima Facie

  In a one-woman show, Comer plays a barrister specialising in defending people accused of sexual assault, who questions the system after being date-raped.

  She said in her acceptance speech: "To any kids who haven't been to drama school, who can't afford to go, have been rejected - don't let anyone tell you it's impossible."

  Comer also joked that she was having a "brain... fart" when her mind momentarily went blank.

  The actress told the BBC afterwards that when she explored the play, she was "actually quite embarrassed" she had not "questioned" how the legal system operates before.

  She researched the role by sitting in on court cases and speaking to barristers, judges and police offers who were "very honest" about how they had to "put aside their own feelings as a woman, to commit to the job that they do".

  Knight did two performances during the ceremony - one for Sylvia, and the other for Sister Act - and gave an emotional acceptance speech, saying: "Just over 100 years ago, Emmeline Pankhurst stood on this stage and said,' I incite this meeting to rebellion'.

  "She told each of the women in the room, 'be militant in your own way' and that was in 1912. The next year they banned the women's Social and Political Union.

  "One hundred later we're stood on this stage - we have reclaimed the power for those women. I want to thank with all my heart the Old Vic for giving us a second bite on this one."

  The Royal Shakespeare Company's Totoro, based on the Studio Ghibli classic animation and staged at the Barbican, is about sisters Satsuki and Mei, whose mother is ill in rural Japan.

  Its playwright Tom Morton-Smith dedicated their win to his stillborn daughter, saying his wife had been pregnant when he wrote the show.

  In a heartfelt speech, he said he wrote Totoro with the joy and expectation of being a new parent but, after his daughter's death, he wanted to keep her memory alive when people watched the play.

  Chris Bush, the writer of Standing at the Sky's Edge, set in a council estate in Sheffield, thanked the city that inspired her, and called for art to be "available and accessible to every single person who wants to see it".

  The show also won best original score or new orchestrations for Richard Hawley, who has played with Pulp and the Arctic Monkeys, and Tom Deering.

  Hawley paid tribute to Pulp's bass player Steve Mackie, his "fallen comrade" who died last month aged 56.

  On Monday, following the show's Olivier wins, it was announced Standing At The Sky's Edge would transfer to London's West End - opening at the Gillian Lynne Theatre in February 2024.

  Arthur Darvill thanked his "inspiring" drama teacher, and called for better teachers' pay

  Sir Derek Jacobi was given the lifetime achievement award, and joked that it would be difficult to talk as he was "already crying".

  Dame Arlene Phillips was given a special award, and the show ended with a performance from Grease The Musical, which she choreographed.

