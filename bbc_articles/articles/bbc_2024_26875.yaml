  With just 31 days to go until Americans vote, polls show Trump and Kamala Harris in a tight race in Pennsylvania - a hotly contested battleground state that could prove pivotal. Data from the New York Times and Siena College, for example, shows the two nearly deadlocked in a tie, 49% to 48% in Harris’s favour. In dozens of interviews with Trump supporters at the rally, most identified the economy - particularly inflation - as their primary concern ahead of the election. “We’re not being taken care of. People can’t afford food. They can barely afford gas [petrol],” said Jessenia Anderson, a voter who was at the rally wearing a red "Latinas for Trump" T-shirt. “I have a family, but I find myself making cheaper [meals], buying cheaper things.” Others - such as rapper Sean Moon, a Tennessee voter - pointed to the US-Mexico border and concern over immigration as the main reason they supported the former president. Migrant crossings over the US southern border hit record levels under the Biden-Harris administration but the numbers have dropped significantly in recent months. “That’s an existential threat for this country,” said Mr Moon, the son of a North Korean refugee, about migrant crossings. The event in Butler, he said, was his 15th consecutive Trump rally. “There are people coming in without being vetted. They tell untruths and get rewarded for it."
