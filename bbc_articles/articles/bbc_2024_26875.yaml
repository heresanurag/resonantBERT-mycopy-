  The former president had fulsome praise for Elon Musk and went out of his way to invite him to the stage. The tech billionaire told the crowd he thought this was "the most important election of our lifetime" and exhorted voters to register and elect Trump. Between 25,000 and 30,000 people were expected at the rally, which snarled traffic to a standstill in the rural town north of Pittsburgh for the entirety of Saturday. Many waited for as many as 10 hours in harsh sun to be let in past a long string of vendors selling Trump-Vance campaign flags, hats, signs and orange wigs meant to emulate the former president. “I certainly admire his willingness to come back here and give the speech he was denied last time,” said Teresa Wilson, a former US Marine who also attended the previous rally on 13 July. “I’d understand if he avoided coming back - I know some spectators who didn’t want to return, and some who were very apprehensive,” she added. “If he can stand in the place of the previous attempt, then we as his constituency can certainly show up to offer our support.”

