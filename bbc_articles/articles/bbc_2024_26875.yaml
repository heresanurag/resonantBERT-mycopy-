content: |-
  Donald Trump invited tech billionaire Elon Musk to the stage to join him attacking his Democratic opponent.

  Time stood still, Trump says at site of assassination attempt

  This video can not be played To play this video you need to enable JavaScript in your browser.

  Nearly three months after an assassin’s bullet came close to taking his life, former President Donald Trump returned to Butler, Pennsylvania - a place of "tragedy and heartache" - to promise his supporters victory in the 5 November presidential election. One person - a volunteer fire chief - was killed in the 13 July shooting, which also left two bystanders seriously wounded and Trump shot in the ear. “For 15 seconds, time stood still,” Trump told the crowd. “This vicious monster unleashed evil... the villain did not succeed in his goal.” For Saturday's rally, though, security was tight - a result of increased scrutiny of the Secret Service in the wake of two attempts on Trump’s life - the second last month at his golf course in West Palm Beach, Florida. Also in attendance were Trump’s running mate, JD Vance, as well as son Eric Trump, daughter-in-law Lara Trump and tech billionaire Elon Musk, who endorsed Trump after the earlier shooting.

  Trump largely stuck to familiar talking points during his speech, railing against the “corrupt system”, promising to bring “respect” back to US foreign policy and vowing to shut the “open border”, which he claims is a source of crime. “You deserve a government that protects and respects its own citizens, and defends your sovereignty, your security, your dignity and your freedom,” he told the thousands gathered at the showgrounds in Butler to large applause. He also struck out at his political opponents, accusing them of “slandering” him and attempting to interfere in the election, and “who knows - maybe even tried to kill me.” “But I’ve never stopped fighting for you,” he added. “Never will.” Trump repeatedly referenced the previous shooting, and the event included a moment of silence for Corey Competore, the volunteer firefighter who was killed in the July shooting. “He’s become somewhat of a folk hero,” Trump added. “Our beautiful Corey.”
