title: 'Golden Globe nominations: Barbie and Oppenheimer lead 2024 contenders - BBC
  News'
date: '2023-12-11'
section: Entertainment & Arts
url: http://www.bbc.co.uk/news/entertainment-arts-67646600
content: |-
  The ceremony honouring the best in film and TV will take place on 7 January in Los Angeles.

  Barbie, starring Margot Robbie and Ryan Gosling, is the biggest box office hit of 2023

  Barbie and Oppenheimer lead the nominations at the Golden Globe Awards, with nine and eight nominations respectively.

  Killers of the Flower Moon and Poor Things are also among the contenders, with seven nominations each.

  Emma Stone, Leonardo DiCaprio, Cillian Murphy and Da'Vine Joy Randolph are among the acting nominees.

  The ceremony will take place in Los Angeles on 7 January.

  Succession leads the TV nominations with nine in total, including best TV drama series.

  Only Murders in the Building, The Diplomat, The Morning Show and The Crown are among other TV shows to be recognised.

  South Korean film Past Lives is the most nominated non-English language film with a total of five nominations.

  Barbie's nine nominations include Margot Robbie as best actress in a musical or comedy, Ryan Gosling for best supporting actor, and Greta Gerwig for best director.

  The feminist satire about the all-conquering line of plastic dolls has received three nominations for best original song - namely Dance The Night by Dua Lipa, I'm Just Ken by Ryan Gosling and What Was I Made For? by Billie Eilish.

  Oppenheimer, directed by Christopher Nolan and starring Cillian Murphy (pictured) has eight nominations

  Oppenheimer is nominated for cinematic and box office achievement - a new category introduced for the 2024 ceremony which aims to give more recognition to films popular with the public.

  Christopher Nolan is nominated for best director, while Emily Blunt has also been nominated for her supporting role in the film.

  Cillian Murphy is one of the six nominees for best actor in a drama for his role in the biographical movie about J Robert Oppenheimer, the inventor of the nuclear bomb.

  Others nominated in the category include Bradley Cooper who plays composer Leonard Bernstein in Maestro.

  Colman Domingo is also nominated for Rustin, the true story of the man who helped Martin Luther King organise the 1963 March on Washington.

  Andrew Scott is one of the nominees in the same category for his role in British romantic fantasy film All of Us Strangers, which is set to be released in January and also stars Paul Mescal.

  Natalie Portman and Julianne Moore are recognised for their performances in May December

  In the TV categories, Elizabeth Debicki in The Crown, Hannah Waddingham in Ted Lasso and Meryl Streep for her role in Only Murders in the Building have all been nominated for best supporting roles.

  With 33 nominations, Streep is the record holder for the most Golden Globe nominations.

  Taylor Swift has also been received her fifth nomination, this time in the new box office category, for Taylor Swift: The Eras Tour. Her previous nominations were all for best original song.

  As well as Oppenheimer, films nominated for box office achievement include summer blockbusters Guardians of the Galaxy Vol 3. and Mission: Impossible - Dead Reckoning Part One.

  The other newly added category for 2024 is best performance in stand-up comedy. Ricky Gervais, Trevor Noah and Amy Schumer are among nominees.

  By distributor, Netflix are leading the nominations with 28 in total, 13 for film and 15 for television shows. HBO l Max have the most TV nominations with 17 in total.

  While many of the expected films and TV series were nominated, a few of this year's big hitters missed out.

  Notably, Ridley Scott's biopic of Napoleon featuring Joaquin Phoenix and Vanessa Kirby received no nominations.

  Phoenix instead sprung a surprise nod for best actor in a comedy or musical for his role in Beau is Afraid, a three-hour long black comedy that split critics, with NME calling it the "most bonkers movie of the year".

  Although musical drama The Colour Purple received two nominations, for best actress in a musical or comedy and best supporting actress, it failed to make the nominees for best picture.

  Saltburn scored two acting nominations for its stars Barry and Keoghan and Rosamund Pike, neither of whom were considered frontrunners.

  Nicolas Cage's nod for Dream Scenario was also unexpected. But Ferrari, another awards favourite starring Adam Driver and Penelope Cruz, was snubbed altogether.

  Netflix's WWII drama All the Light We Cannot See was nominated for best TV series despite critics giving it the thumbs down, with the Guardian calling it "a terrible mess".

  Lily Gladstone and Leonardo DiCaprio are both nominated for Killers of the Flower Moon

  It had looked as if the 81st Golden Globes would not be televised this year, after organisers struggled to find a broadcast partner following recent controversies.

  But producers recently struck a deal with US network CBS, which also broadcasts the Grammy Awards, and the ceremony will also stream on Paramount+.

  The organisation which was behind the Golden Globes, the Hollywood Foreign Press Association (HFPA), attracted controversy in recent years due to allegations of corruption and a lack of diversity within its membership.

  The Globes have introduced changes as a result - membership of the voting body has increased from around 90 to 300 since 2021 and was now significantly more diverse.

  It has not yet been announced who will present the 2024 Globes, but the ceremony has a history of hiring acerbic hosts who make cutting jokes at the expense of the A-list nominees in attendance - much to the delight of audiences at home.

  Previous Globe hosts have included Ricky Gervais, Jerrod Carmichael, Seth Myers, and Tina Fey and Amy Poehler.

  Colman Domingo is among the nominees for his performance in Rustin

  The Golden Globes are traditionally a more light-hearted event than many of the other ceremonies in film awards season.

  Taking place in the first week of January, celebrity guests are usually in a good mood, fresh from their Christmas break.

  In contrast, the Bafta Film Awards and the Oscars are much more formal events - and the prizes more prestigious.

  But a win at the Golden Globes can add significant momentum to an awards campaign, with the recipients given the opportunity to deliver a rousing acceptance speech on TV at a time when Oscar voters are considering their own nominations.

  There is a much higher chance of a Golden Globe nomination than an Oscar nod - the Globes split their film and lead acting categories into drama and musical or comedy, with six slots available in each instead of the Academy's five.
