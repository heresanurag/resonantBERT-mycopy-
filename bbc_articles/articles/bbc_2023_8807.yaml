title: 'Saltburn beach: Body found in sea - BBC News'
date: '2023-06-04'
section: Tees
url: http://www.bbc.co.uk/news/uk-england-tees-65805621
content: |-
  Police say officers were called to the beach by paramedics after reports a body had been seen.

  Cleveland Police said the body of a female was recovered from the sea off Saltburn on Sunday afternoon

  A person has been found dead in the sea off Saltburn.

  Cleveland Police said officers were called to the beach shortly after 13:30 BST by paramedics who had responded to reports a body could be seen in the water.

  The force said the body of a female was recovered shortly after.

  Officers said formal identification had yet to take place, and their thoughts were with the person's family at "this very difficult time".

  Police were unable to confirm if the person who died was a child or an adult.

  They were also unable to say if there had been reports of someone getting into difficulty in the water.

  The force said inquiries into the circumstances of the death were ongoing, and no further details have yet been released.

  Saltburn is famous for its Victorian pier and attracts surfers all year round.

  A North East Ambulance Service spokesperson said: "We received a call to 999 at 13:35 to reports of a body recovered from the water.

  "The coastguard attended the scene and we dispatched two double-crewed ambulances, a specialist paramedic, and the air ambulance."

