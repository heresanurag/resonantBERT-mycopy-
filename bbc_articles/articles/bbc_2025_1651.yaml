title: 'Newspaper headlines: ''Shameful'' Trump attack on Zelensky and ''Tearful Emma''
  - BBC News'
date: '2025-02-20'
section: The Papers
url: http://www.bbc.co.uk/news/articles/cz9nw8dl7g9o
content: |-
  Nearly all of Thursday's papers lead with one story - the deepening row between the US and Ukraine after Donald Trump's new remarks.

  The UK's response to the row is the focus for the Times., external It says Sir Keir Starmer "rebuked" the American president in a "pointed" statement which described Zelensky as Ukraine's "democratically elected leader". The Telegraph says, external President Trump's comments were the clearest signal that he will not support Ukraine in the same way as his predecessor - and it says the prime minister "sided with" Zelensky in the row. The Daily Mirror reports, external the UK is to press ahead with £4.5bn in aid to Kyiv. It sums up Britain's message as: "To Ukraine... with love". The Times says a new study, external has found that hi-vis jackets designed to keep cyclists and pedestrians safe are actually invisible to modern car safety systems. It says tests in the US found cars fitted with automatic braking - which uses cameras and radar to spot obstacles - crashed into dummies wearing reflective strips. The car fims involved said they would examine the results to improve systems. And several papers report on new trials in which comedy is being prescribed on the NHS. The i says the aim is to show whether laughter really is the best medicine, especially for people who are lonely or isolated. The Telegraph says the trial will also see if stand-up can lower the bill for treating mental health problems. The founder of the company behind the scheme says that teaching kids "how to improvise and giggle is surely better than prescribing anti-depressants".

