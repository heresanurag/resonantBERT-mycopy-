content: |-
  England defender Marc Guehi says they have been “doing a lot of work” on penalties as they prepare for the Euro 2024 knockout stages.

  England doing lots of work on penalties - Guehi

  This video can not be played To play this video you need to enable JavaScript in your browser.

  England defender Marc Guehi says the team have been “doing a lot of work” on penalties as they prepare for the Euro 2024 knockout stages. England finished top of their group to reach the last 16 and will play Slovakia on Sunday. Asked if time had been spent on penalties, Crystal Palace centre-back Guehi said: “Yes, we’ve been doing a lot of work. “The work’s been going really well across the team on penalties. It’s important to make sure we’re ready.” England were beaten by Italy on penalties in the final of the last European Championship, having looked like they were improving in shootouts. They beat Colombia on spot-kicks in the last 16 of the 2018 World Cup, while they also won against Switzerland on penalties in a 2019 Nations League third-placed play-off. “It [practising penalties] is something we've been doing anyway, it was regardless of if we went through or not,” added Aston Villa player Ezri Konsa. “It's something that we like to practise anyway. We've been practising them after training, a few players go off and practise penalties. “Look, we're not thinking about going to penalties on Sunday, but if it comes to it, we'll be well prepared.”

  This video can not be played To play this video you need to enable JavaScript in your browser. Penalty advice from former England number one

  Meanwhile, Guehi said England manager Gareth Southgate has the full support of all players in his squad. The England team were booed off following the 0-0 draw in their final group game with Slovenia and some empty cups were thrown at Southgate as he applauded supporters. Guehi was handed his first senior England call-up by Southgate in March 2022 and has 14 caps. He has been Southgate's first-choice centre-back alongside John Stones at Euro 2024. "He has been fantastic for England. If you look at his record, it speaks for itself," 23-year-old Guehi said. "Everyone is behind the manager and we have a really close tight-knit group just focused on the next game. Everyone appreciates him, especially me. "He gave me my debut for England and he’s showed so much confidence in me. I am really grateful and I'm sure the rest of the team is as well."

  Marc Guehi (left) started all three of England's Euro 2024 group games

  Southgate has said the reaction to the team’s performances in Germany is creating an "unusual environment" for the squad, but Guehi says the players are not listening to any outside noise. "I don't think the team is too focused on that," he said. "We are thankful for all of the fan support because they have travelled to see us. "It is a calm and focused camp. Everyone is just focused on the next task at hand." As a result of winning their group, England have a path through the knockouts which avoids many of the other major nations. Spain, Germany, Portugal, France and Belgium are all on the other side of the draw and England cannot play any of them before the final, but Guehi believes there is no easy route to the showpiece in Berlin on 14 July. "Everyone has seen in this competition that I don't think there is a favourable side of the draw," he said. "Every opponent is tough to play against. "We just need to remain calm. We put pressure on ourselves, but it’s a very calm and focused environment. We just need to continue focusing on one thing at a time." Guehi is forming a solid partnership at the back with Manchester City defender Stones and England have conceded only one goal during the three games so far. "I think what builds confidence is togetherness and performances," Guehi said. "We haven't lost a game yet. It’s important for us to control what we can control." England play Slovakia in Gelsenkirchen on Sunday and kick-off is at 17:00 BST.
