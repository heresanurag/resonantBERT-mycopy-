id: bbc_2025_3829
title: 'Newspaper headlines: ''Benefit cut for 1m'' and ''Putin must not play games''
  - BBC News'
date: '2025-03-15'
section: The Papers
url: http://www.bbc.co.uk/news/articles/cg5dnzrd03vo
content: |-
  A mix of stories make up the front of Saturday's papers, with a focus on government spending cuts and the war in Ukraine.

  Several papers lead on Sir Keir Starmer's warning that President Putin is not taking attempts to secure a ceasefire in Ukraine seriously.

  "Putin must not play games" says the headline on the front page of the Guardian, external, quoting the prime minister. The Daily Telegraph says, external Sir Keir is expected to use a meeting with the so-called "coalition of the willing" to call on world leaders to "strain every sinew" to increase pressure on Moscow.

  According to the Times, external, a million people are facing a reduction in their disability benefits as part of the government's "overhaul" of the welfare system. The paper says changes to eligibility criteria are expected. Cost-cutting reforms are due to be set out next week, with the Chancellor Rachel Reeves, saying the government needs to "get a grip" of the "broken" benefits system.

  The Guardian says, external No 10 is facing a "fightback" over plans to freeze some disability payments. The paper says there is a warning that if the government goes ahead with its plans there could be some "frontbench resignations". More broadly on the subject of spending cuts, the FT reports, external that a "large minority" of ministers have raised concerns about planned reductions in their departments.

  The front page of the Daily Mail claims, external that the Commons speaker, Sir Lindsay Hoyle, has recruited as an advisor a former lobbyist who gave him - what the paper calls - "several all-expenses paid junkets". A spokesman for the Speaker has told the paper he rejects "any suggestion or implication of impropriety".

  The Daily Express says, external Dame Esther Rantzen has "applauded" a decision by the Royal College of GPs to end its opposition to assisted dying. The College has switched to a neutral position after a consultation with its members. Dame Esther, who has terminal lung cancer and has been campaigning for a change in the law, called the shift "good news".

  Sales of the Bible in Britain have risen, despite the continued declining interest in organised religion, reports the i Weekend. A Christian publishing group says there was an 87% increase in sales between 2019 and 2024 - saying it could be driven by Generation Z's interest in spirituality.

  The Times reports that, external the Metropolitan Police is giving out leaflets advising burglary victims to plant shrubs in their garden to deter thieves. According to the paper, the pamphlet says planting particular shrubs along garden walls and fences can make it harder for robbers to access a property, or put them off completely.

  A spokesman for the Met says the advice is in addition to the "hard work of officers" who are "cracking down on burglars and organised crime groups".

  And a couple of the papers have picked up on comments by the new England football manager, Thomas Tuchel, about whether he'll sing the national anthem.

  The 51-year-old German told reporters on Friday he felt as though he would have to "earn the right". The Telegraph says, external he wants to wait for England supporters to say "you've got the results, now join in". The Sun sums up the story, external with the headline "It's humming home".
