  Wales captain Gareth Bale urges schools to let children watch their World Cup match against Iran on Friday morning.

  Wales captain Gareth Bale has urged teachers to let children watch their World Cup match against Iran on Friday morning.

  The Welsh government has granted schools permission to cancel lessons so pupils can watch the 10:00 GMT kick-off in Qatar.

  Bale says their participation at the tournament is a "historical moment" for the nation.

