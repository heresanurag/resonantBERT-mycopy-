content: |-
  Mohammad Farooq is also accused of carrying out "hostile reconnaissance" at an RAF base.

  A bomb disposal team was called to the hospital

  A student nurse accused of taking a homemade bomb to the Leeds hospital he worked at has appeared in court.

  Mohammad Farooq was said to have the device outside the maternity ward of St James's Hospital on 20 January.

  Mr Farooq, 27, who was also said to have undertaken reconnaissance outside an RAF base, appeared at Westminster Magistrates' Court accused of preparing a terrorist act.

  He did not enter a plea and is due to appear at the Old Bailey on 3 February.

  Prosecutors allege Mr Farooq, of Hetton Road, Roundhay, Leeds, was found with a pressure cooker bomb outside the ward.

  They also argue that, inspired by radical Islam, he carried out "hostile reconnaissance" of an RAF base on 10 and 18 January after carrying out online research.

  Prosecutors say he chose the target because of online encouragement to carry out a "lone wolf" attack at the site.

  Counter-terrorism police worked with Army specialists during the incident

  Mr Farooq was arrested outside the maternity ward on 20 January.

  It is alleged he had constructed a viable bomb, containing about 30lb (13.7kg) of a homemade low-explosive mixture and a length of pyrotechnic fuse.

  Prosecutors added he also had an imitation firearm on him, a Gediz 9mm PAK semi-automatic pistol, at the time of his arrest.

  His actions at the hospital, where he was due to work a shift, are not alleged to have been motivated by terrorism but by a grudge towards another member of staff.

  The incident prompted part of the hospital to be evacuated.

  The defendant appeared via videolink, speaking only to confirm his name, date of birth and address and did not enter any plea.

  Mr Farooq is charged with one count of engaging in conduct with the intention of committing acts of terrorism between 12 July last year and 20 January.

  Prosecutor Mark Luckett said he allegedly had instructions to assemble a homemade explosive device, bought equipment and made the bomb, researched the RAF base online, and engaged in reconnaissance of the alleged target.

  He is also charged with possessing an explosive substance on 20 January with intent to endanger life or cause serious injury to property.

  He faces a further count of possessing an imitation firearm with intent to cause fear of violence on the same date.

