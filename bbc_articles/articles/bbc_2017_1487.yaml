title: Helicopter rescue for snowbound islanders - BBC News
date: '2017-01-12'
section: General
url: http://www.bbc.co.uk/news/world-europe-38600233
content: |-
  The Greek air force has taken six people trapped in heavy snow on Skopelos in the Aegean to the island's port.

  The Greek air force has taken six people trapped in heavy snow on Skopelos in the Aegean Sea to the island's port.

  The tourist island has been one of the hardest hit by the cold snap, leaving villages cut off and affecting power and water supplies.
