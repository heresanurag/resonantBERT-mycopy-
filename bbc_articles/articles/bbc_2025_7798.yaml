  New head coach Charlotte Edwards will make England players “accountable” for their fitness following criticism during a dismal winter.

  England to be 'accountable' for fitness - Edwards

  This video can not be played To play this video you need to enable JavaScript in your browser. Charlotte Edwards discusses England's future as she becomes head coach

  New head coach Charlotte Edwards will make England players "accountable" for their fitness following criticism during a dismal winter. England were eliminated in the group stage at the T20 World Cup, then humiliated 16-0 in the Ashes in Australia. Head coach Jon Lewis and captain Heather Knight were both sacked last month, with legendary former skipper Edwards confirmed as Lewis' replacement on Tuesday. "There is fitness testing next week and I'll judge for myself where they are at," Edwards told BBC Sport. "I don't want people talking about the fitness of the England women's cricket team. Fitness is a non-negotiable. We should be fit." After England's early exit from the T20 World Cup in October, former spinner Alex Hartley said some players were "letting the team down" in terms of fitness. Athleticism again came into focus during the Ashes clean sweep, but Lewis attributed that to a cultural difference between the UK and Australia. The Lewis regime was also characterised by a more relaxed approach. During the World Cup, some England players attended boat parties in Dubai. "Honesty and hard work are key to any culture," said Edwards, England's all-time leading run-scorer. "If we've got that in place we will move pretty quickly in the right direction. We've got to work hard. That's for me to implement in training. We will talk to our science and medicine teams in terms of what we have to do with our fitness standards."

  Edwards won the Ashes and both World Cups as England captain only to be sacked in 2016 and replaced by Knight. Now Knight has been sacked but has indicated her desire to continue as a player. Edwards, 45, said she was not consulted in the decision to remove Knight. "She sets such high standards, she's the ultimate professional and what we need around the England team right now," said Edwards. "She's playing as well as I've ever seen her play. It was hard to watch the Ashes, because of the toll it was taking on her. Without the captaincy, hopefully she'll be able to go on to bigger and better things as a player." In order to take the England job, Edwards has left all of her roles in domestic cricket, including her post as Mumbai Indians head coach in the Women's Premier League. While he was England coach, Lewis was in charge of UP Warriorz in the same competition. England will appoint a new national selector, as well as a new captain, which Edwards said will be in place for the series against West Indies in May. Knight's vice-captain Nat Sciver-Brunt has previously said she would be interested in the job, while off-spinner Charlie Dean admitted she would not turn it down if approached. Edwards, who captained England on more than 200 occasions, said she is looking for "someone who leads from the front in everything they do, someone who has the respect of the current playing group". She also said England will have one captain, rather than splitting the role across formats.

  Charlotte Edwards played more than 300 times for England in a 19-year career

  Edwards has been appointed after a review into the Ashes led by England director of women's cricket Clare Connor and performance director Jonathan Finch. Connor, herself an Ashes-winning England captain, confirmed Edwards was given the job without a formal process. In 2018, the England and Wales Cricket Board pledged to adopt the Rooney Rule - interviewing at least one applicant from black, Asian or minority ethic backgrounds for all coaching roles in its national teams. It was not used for the appointment of Edwards. "In these particular circumstances, with the criteria in front of me, I did not believe an open recruitment process was needed or would have benefited anyone," said Connor. "I was very, very clear there was one person in the world of coaching who could have filled this role. Charlotte Edwards is the only person on the planet that can tick every box to the degree that she can." Connor also opted against bringing in internal or independent leadership for the review. When asked if that was tantamount to Connor and Finch "marking their own homework", Connor said: "I understand that perspective. I'm accountable to the board for England women's cricket. "I'm very confident in the steps we are taking and the way we are setting the team up for success. That is the job I'm paid to do. "I'm under no illusion the buck does stop with me and I'm accountable for the England women's cricket team and how we perform."
