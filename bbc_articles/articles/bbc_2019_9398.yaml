title: 'Trafalgar Square stabbing: Man injured in central London - BBC News'
date: '2019-08-22'
section: London
url: http://www.bbc.co.uk/news/uk-england-london-49429513
content: |-
  Large sections of the tourist hotspot were sealed off after a man was found with knife injuries.

  Police were called to the scene on Wednesday night

  A man has been stabbed in one of London's busiest tourist hot spots.

  The victim was found with knife injuries in Trafalgar Square at 21:11 BST on Wednesday.

  He was taken to a major trauma centre but his injuries are not believed to be life-threatening, the Metropolitan Police said.

  The force said the attack is not being treated as terror-related and the victim and attacker may be known to each other. There have been no arrests.

  Large sections of the square were taped off, with five squad cars and two police vans at the scene alongside the London Ambulance Service.

  Large sections of Trafalgar Square were cordoned off

