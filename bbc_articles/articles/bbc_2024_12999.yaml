title: Bioluminescent plankton light up the south Wales coast - BBC News
date: '2024-06-23'
section: Wales
url: http://www.bbc.co.uk/news/articles/c0444ekd7r2o
content: |-
  Photographer Lee McGrath waited hours to capture the amazing phenomenon on the south Wales coast.

  He captured some stunning images of the Northern Lights above the south Wales valleys last month. But for his latest shots of amazing natural phenomenon, photographer Lee McGrath did not need to look up at the sky. Instead he stared down at the waves lapping the shores of Dunraven Bay, Vale of Glamorgan, where bioluminescent plankton were lighting the water an incredible electric blue. Captured in the early hours of Friday, it is thought to be the first sighting of this magical occurrence in Wales in 2024 and the kind of shot which features highly on every photographer's bucket list.

  "We are so lucky in Wales; a few steps outside our door and we can capture the Aurora, Milky Way and bioluminescent plankton," Mr McGrath said. "To be able to see all these natural phenomena in our own country is pretty special. "In 2020, we were also able to witness Comet Neowise, external in Wales as well as noctilucent (or night-shining) clouds the very same evening." The light in his latest shots is an ethereal blue that flashes along the edge of a wave as is rolls into shore.

  This video can not be played To play this video you need to enable JavaScript in your browser.

  Bioluminescence is light emitted by living things as a result of chemical reactions within their bodies. Plankton, which are tiny creatures that float in the sea, have the ability to emit bioluminescence when they are disturbed by a predator or motion. The trick is also shared by certain squid and jellyfish species, as well as insects such as fireflies and glow-worms. The result sees hordes of onlookers regularly flock to certain parts of the UK coast each year to witness it first hand during the night-time hours. There are even numerous sites on social media, external where enthusiasts meet to share information with other plankton seekers about the best times and places in which to do so.

  The sight attracts lots of nature enthusiasts to our shores each year

  "Me and a couple of other local photographers have been following the plankton for a few years and have built up a map of where previous sightings have taken place," said Mr McGrath, an NHS worker from Bridgend. "Then it's all about putting in the time to place yourself in those locations and just hope you'll be lucky." He added: "I spent four hours at Dunraven Bay because, from around midnight, I could see slight sparkles starting to appear in the waves. "Then, from about three in the morning, it got stronger and I was able to capture a few images. "We think the warm weather helps as it usually pops up around this time of year, but it can go as late as October sometimes."

  Mr McGrath's recent photos of the Northern Lights from the Bwlch Mountain overlooking Treorchy were equally amazing

  Likening the experience to "meditation" and the kind of thing "that really puts life into perspective," Mr McGrath warned others trying to get similar photos to be careful. "Shooting at night can be tricky and you need to be aware of your surroundings," he said. "The tides can come in quicker than you think and it’s easy to get yourself into a bit of a situation." He added: "One other tip: keep torches to a minimum wherever possible, you will see more bioluminescence using less light."
