  On Tuesday evening, Trump, 78, criticised Nato allies during a campaign rally at his golf club in Doral, Florida. The event was attended by all three of his sons, including his youngest, Barron, who was at his first ever Trump rally, according to his father, and received more applause from the audience than his brothers, Eric and Don. Trump has repeatedly lambasted Nato member states for failing to meet an agreed goal of spending at least 2% of gross domestic product on defence. Many more Nato countries now meet that benchmark since Russia invaded Ukraine. Trump told supporters that these countries were contributing “hundreds of billions of dollars” more because when he was president he had warned them “No, I will not protect you from Russia” unless they paid more to the alliance.

  Trump pretended to swing a golf club at his rally as he challenged Mr Biden to a golf match

  When Trump made similar remarks at a rally in February this year, Mr Stoltenberg said such talk "undermines all of our security". But the Nato chief remained tight-lipped on the Republican candidate as the summit began on Tuesday. Ukrainian President Vlodymyr Zelensky said at an event held elsewhere in Washington DC that the whole world was "waiting for November", when the US general election takes place, and he urged American voters to stand by Ukraine. Mr Zelensky is due to meet Mr Biden on Thursday.
