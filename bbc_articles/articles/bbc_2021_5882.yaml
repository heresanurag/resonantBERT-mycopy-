title: 'Dominic Cummings: How does he now earn a living? - BBC News'
date: '2021-05-26'
section: UK Politics
url: http://www.bbc.co.uk/news/uk-politics-49101464
content: |-
  A profile of Boris Johnson's former right-hand-man, who has turned into his chief tormentor.

  Dominic Cummings was never going to go quietly after being forced out of Downing Street at the end of last year.

  But the number, and seriousness, of his claims about what went on at the heart of government, as ministers battled to get on top of the coronavirus crisis, are unprecedented in modern times.

  Rarely has a former adviser made so many potentially damaging revelations about a sitting prime minister.

  His critics say Mr Cummings is motivated by revenge against Boris Johnson, and will not rest until the PM has been removed from No 10.

  Mr Cummings insists he is driven by a desire to make what he views as a broken and chaotic government machine work better in future.

  He left his Downing Street role following an internal power struggle, amid claims the PM's then-fiancee had blocked the promotion of one of his allies, Lee Cain, after months of internal warfare.

  In his final year at Downing Street, Mr Cummings had a £40,000 pay rise, taking his salary to between £140,000 and £144,999.

  There was speculation that the 49-year-old would seek a post-politics career as the first head of Aria, the UK's new "high risk" science agency, which had been one of his pet projects.

  But he appears to have a different career path in mind.

  In February, he started a technology consultancy firm, Siwah Ltd. He is the sole director of the firm, according to Companies House, and it is registered at an address in his native Durham, in north-east England. This would appear to be a successor to Dynamic Maps, his previous tech consultancy.

  But in recent months, most of his time appears to have been taken up with spilling the beans on his time in government.

  The BBC did not pay Mr Cummings for his exclusive interview with political editor Laura Kuenssberg.

  And he has not yet taken the time-honoured route of selling his story to a newspaper, or signing a book deal.

  But he has found a way of generating income through online platform Substack, where he has launched a newsletter.

  He plans to give out information on the coronavirus pandemic and his time in Downing Street for free, but "more recondite stuff on the media, Westminster, 'inside No 10', how did we get Brexit done in 2019, the 2019 election etc" will only be available to subscribers who pay £10 a month.

  He is also offering his marketing and election campaigning expertise, for fees that "slide from zero to lots depending on who you are / your project".

  This new venture has incurred the wrath of Whitehall watchdog Lord Pickles, who chairs the Advisory Committee on Business Appointments (Acoba), which vets jobs taken by former ministers and top officials.

  In a letter to Cabinet Office Minister Micheal Gove, he says Mr Cummings has sought advice on working as a consultant.

  But he adds: "It appears that Mr Cummings is offering various services for payment via a blog hosted on Substack, the blog for which he is also receiving subscription payments.

  "Mr Cummings has failed to seek the committee's advice on this commercial undertaking, nor has the committee received the courtesy of a reply to our letter requesting an explanation.

  "Failure to seek and await advice before taking up work is a breach of the government's rules."

  There are few repercussions for failing to consult Acoba, however.

  Little was heard from Mr Cummings for several months after his departure from Downing Street - but that all changed in April.

  After being named in media reports as the source of government leaks, he launched a scathing attack on Mr Johnson via a 1,000-word blog post in April.

  As well as denying he was behind the leaks, he went on to make a series of accusations against the PM and questioned his "competence and integrity".

  The following month, Mr Cummings expanded on his criticisms at a seven-hour select committee appearance, declaring Boris Johnson "unfit for the job", and claiming he had ignored scientific advice and wrongly delayed lockdowns.

  He also turned his fire on then-health secretary Matt Hancock, who he said should have been fired for lying.

  This sparked a bitter war of words with Mr Hancock, who flatly denied all of Mr Cummings's allegations.

  It thrust Mr Cummings back into the spotlight for the first time since his now infamous visit to County Durham, four days after the start of the first national lockdown, in March last year.

