title: 'Ireland vs England: Tourists cruise to victory in opening T20 in Dublin -
  BBC Sport'
date: '2024-09-14'
section: Cricket
url: http://www.bbc.co.uk/sport/cricket/articles/c2dpgrln852o
content: |-
  An inexperienced England side, featuring four debutants, take a 1-0 lead in the T20 series against Ireland with a 67-run win.

  Issy Wong finished with 2-14, including her first England wicket since December 2022

  England crushed Ireland by 67 runs in the first T20 in Dublin following a dominant all-round performance. Set their record chase of 177, the hosts slumped to 109 all out as an inexperienced England side, featuring four debutants, took a 1-0 lead in the two-match series. Only Orla Prendergast, with an entertaining 52 from 34 balls, offered any resistance for Ireland, with debutant Charis Pavely claiming 3-19. In a fluctuating innings, England's 176 was set up by Bryony Smith's 58 from 24 balls in a blistering opening stand of 72 in 6.5 overs with Tammy Beaumont. The tourists collapsed from 112-1 to 116-4 before Mady Villiers led the recovery with a 15-ball 35, only for the last five wickets to fall for six runs at the death. Despite the collapses, England's total proved beyond Ireland's unconvincing batting line-up as they crawled to 32-3 after the six-over powerplay and only Prendergast's effort saved them from total capitulation. Ireland also squandered chances to restrict England, dropping Smith on 44 and Beaumont on 16, but fought back with flurries of wickets as Prendergast also led the way in the field with three catches and a run out. Pavely, Georgia Adams and Seren Smale made their international debuts, with this Paige Scholfield's first T20 appearance, adding to the six caps that were handed out during the preceding one-day international series that England won 2-1.

  England were disappointed to lose the final ODI after dominating the opening two matches and responded in style, thoroughly outclassing their opponents. Both teams are inexperienced in this series but England’s professional domestic structure makes all the difference, with their players outside of the first-choice squad looking completely at ease. Smith, playing her first international since September 2022, batted like she had never been away, whacking 12 fours as she equalled Danni Wyatt’s fastest half-century for an Englishwoman from 24 balls. Smith dominated the strike over opening partner Beaumont, who made 27, but both put pressure on Ireland's bowlers with their attacking approach, racing to 65-0 after the powerplay. After the initial collapse, it looked like England could waste their excellent start only for Villiers to take the initiative with a superb, innovative cameo. Her knock meant the second collapse did not really matter, while England's bowlers ensured the total was more than enough, with a particularly pleasing return to form for Issy Wong. Wong took 2-14, including her first international wicket since December 2022 after a difficult couple of years where she has struggled with her rhythm and run-up. Pavely, 19, impressively continued the squeeze with relentless control in the middle overs and when Prendergast was run out in the 13th over, Ireland's hopes faded. The hosts will seek immediate improvement, and less reliance on Prendergast, in the final T20 on Sunday.

  England captain Kate Cross: "Bryony and Tammy were great up front. "Issy's had a really tough couple of years, she's showcased all her skills, the ball that got Gaby [Lewis] was an absolutely amazing bit of bowling. "Everyone smiling has been my favourite element. Charis Pavely looked like she was having the time of her life out there." Player of the match, England opener Bryony Smith: "Buzzing. It was a really good pitch and I tried to keep things simple. It felt good, I was seeing the ball well. "I feel like it is a good chance for me to put my name in the hat."
