title: Caerphilly man Ben Crook found dead on Turkey trip - BBC News
date: '2024-11-07'
section: Wales
url: http://www.bbc.co.uk/news/articles/c36pxgdgd2ko
content: |-
  Ben Crook fought with his partner on their journey to Turkey before going missing, an inquest hears.

  Man escorted off plane in Turkey later found dead

  Ben Crook had travelled to Turkey with his partner and her two children to celebrate his 32nd birthday

  A man who was escorted off a plane after an argument with his partner was later found dead, an inquest opening has heard. Ben Crook travelled to Antalya, Turkey, with his partner and her two children to celebrate his 32nd birthday on 23 September. Gwent Coroner’s Court heard on Thursday that he had been drinking on the journey from his home in Abertridwr, Caerphilly county, to Bristol Airport and continued to consume alcohol there and on the flight. An argument with his partner led to him being escorted off the plane when it landed in Turkey, and he was last seen in Kaleiçi, the old town district of Antalya, before he disappeared.

  The inquest opening heard he had smashed his and his partner’s phones and so there was no way for anyone to contact him. A body was discovered the following day in the Selçuk area, 2km (1.2 miles) from the family’s hotel. Area Coroner Rose Farmer said a post-mortem examination was carried out in Antalya, but she had not yet been provided with its results.

  Ben Crook went missing during a family holiday to Antalya, Turkey and was later found dead

  The hearing was told Mr Crook’s father was informed the body had been found on 4 October and flew out to identify his son. He was told it had been discovered at 18:20 on 24 September on stony ground at the bottom of a drop. Mr Crook’s body was then flown home to Wales where another post-mortem examination was carried out. The cause of death was unknown, but Ms Farmer said it appeared Mr Crook had "fallen from a height and died from injuries sustained, it’s believed, as a result of a fall". The hearing was adjourned for a full inquest to be held on 17 April next year.
