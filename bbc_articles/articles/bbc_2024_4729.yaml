content: |-
  Poland's Iga Swiatek claims another dominant win over Maria Sakkari to clinch her second Indian Wells title.

  Iga Swiatek has won 20 of her 22 singles games since 30 December

  Poland's Iga Swiatek claimed another dominant win over Maria Sakkari to clinch her second Indian Wells title. In a repeat of the 2022 final, the world number one produced an almost identical score, beating Greece's Sakkari 6-4 6-0 in 69 minutes. That secured a 19th career title for Swiatek, 22, and a second of the year having also won in Qatar last month. "It's an amazing thing to be standing here again," she said. "Thank you for really making this feel like home." Sakkari, 28, was playing in her 10th WTA final and hoped for her third title, but Swiatek charged into a 3-0 lead in California. The world number nine broke back, but had to save two break points at 5-4, before Swiatek hit a forehand winner to clinch the first set.

  The four-time Grand Slam champion then breezed through the second set in just 25 minutes, with Sakkari winning just five points. "I'm sorry I couldn't put up a better fight," said Sakkari during the trophy presentation. "It was pretty quick for you guys but credit to Iga. "You're an amazing player, a very good person and an incredible champion. You really do deserve the best. You and your team have created something incredible. I'm really hoping we can play a lot more finals." Swiatek has made a strong comeback since her surprise third-round exit at the Australian Open in January. She now aims to continue that form by winning the Miami Open, where in 2022 she became just the fourth woman to do the 'Sunshine Double' - after Steffi Graf, Kim Clijsters and Victoria Azarenka.
