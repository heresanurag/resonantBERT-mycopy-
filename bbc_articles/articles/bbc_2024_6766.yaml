  On Wednesday, Jeremy Hunt announced the government's tax and spend plans - but what did it all mean?

  How do you work out winners and losers from the Budget?

  An anonymous reader (please include your names!) asks: How do you calculate personal gain/loss from the Budget? Do you include a "cost" for not raising tax thresholds? Yes. When analysing the Budget, the freezing of thresholds is treated as a cost because they reduce your standard of living. Let’s say you earnt £12,500 last year. You didn’t need to pay any tax on that. If you get a salary increase this year that just about keeps pace with rising prices, your living standard is exactly the same, even though your paycheque is bigger. The trouble is your pay rise now puts you over the top for tax-free earnings – you’re going to have to start paying taxes. And so your take-home pay has not kept pace with rising prices. You’re worse off. The government used to move the point at which you started paying tax to prevent this from happening. But they haven’t done that for three years. Official forecasters call it a tax rise, as do independent economists. And it’s set to raise them more than £40bn by 2028.
