  The pair, from Bristol, are due to appear at Cardiff Magistrates' Court on Thursday 19 June.

  Two charged over shooting of 15-year-old boy

  The 15-year-old was shot in Clos y Ffynnon, Pontprennau at around 20:00 BST on Saturday 7 June, but his injuries were not life-threatening

  Two people have been charged over the shooting of a 15-year-old boy at a home in Cardiff. The incident, which left the boy with non-life-threatening injuries happened in Clos y Ffynnon, Pontprennau, at about 20:00 BST on 7 June. Ashley Corbin, 20, and a 17-year-old boy, both from Bristol, are due to appear at Cardiff Magistrates' Court later, charged with owning a firearm with intent to commit grievous bodily harm and causing grievous bodily harm with intent. South Wales Police said four other people have been arrested in connection with the incident, and the investigation was ongoing with support from Avon and Somerset Police.

  The pair were arrested in the Bristol area on 16 June. Police added that an 18-year-old woman from Newport, an 18-year-old man from Cardiff and a 22-year-old man from Newport had also been arrested in connection with the incident and were on bail pending further inquiries into unrelated matters. A 22-year-old man from Bristol has also been bailed in relation to the shooting.

  Det Supt Mark O'Shea from South Wales Police said the investigation remained "complex" and was being led by the force's major crime team. He added: "We have deployed all available detectives into this case, to ensure a robust policing response, reflective of our determination to relentlessly pursue anyone who chooses to bring firearms into our communities." The force was appealing for dashcam footage from drivers who were in the Pontprennau or Pentwyn areas between 19:00 BST and 19:50 BST on 7 June.
