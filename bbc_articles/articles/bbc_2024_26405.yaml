content: |-
  A man is held on suspicion of attempted murder after a woman and two children are attacked.

  Arrest after woman and children, 8 and 2, stabbed

  A woman and two young children were taken to hospital with stab injuries, the Met said

  A man has been arrested on suspicion of attempted murder after a woman and two children were stabbed in east London. The woman, aged in her 30s, and the children - a girl thought to be aged eight and a boy believed to be aged two - were discovered with stab wounds after police were called to First Avenue, Dagenham, at about 17:35 BST on Friday. They were taken to hospital for treatment where they remain. The Met Police said none of their injuries are life-threatening. A man, aged in his 40s, was arrested at the scene, but was then taken to hospital after he became unwell. He has since been discharged into police custody, the force added.

  The Met said it believes the people involved "were known to each other"

  Det Supt Lewis Basford, who is responsible for policing in Barking and Dagenham, said investigators "believe those involved were known to each other and we are not looking for anyone else in connection with this incident". "This is a truly shocking attack and I want to thank local residents for their assistance and patience while we deal with this incident," he added. "A crime scene will remain in place for some time while our officers carry out vital work, and you will see an increased policing presence in the area over the coming days." Police officers, London Ambulance Service and the Air Ambulance attended the scene, the Met continued. It said anyone with information about what happened should call police or contact independent charity Crimestoppers anonymously.
