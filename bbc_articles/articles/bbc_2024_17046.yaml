title: NI health staff ‘should get above inflation pay rises’ - BBC News
date: '2024-07-29'
section: Northern Ireland
url: http://www.bbc.co.uk/news/articles/cprq0lxge23o
content: |-
  Two independent review bodies have recommended pay rises between 5.5%-6%.

  Thousands of workers took part in mass strike action in Northern Ireland in January

  Health service staff in Northern Ireland should get a 5.5% pay rise this year, an independent review body has said. A separate review has recommended a 6% pay rise for doctors and dentists. The health minister is not obliged to follow the recommendation and will need clarity on the size of his budget. Stormont will get extra money as a result of spending decisions announced by the Chancellor on Monday. However, the precise amount is unlikely to become clear for several weeks.

  Stormont’s Department of Health assumes that every 1% on pay will cost roughly £50m. Earlier this year, the department suggested it would not be able to afford any pay raises unless it received a larger budget. Health service workers in NI accepted a 5% pay rise and one of payment of £1,505 for 2023/24. The Executive was only able to afford that due to additional funding provided by the UK government when devolution was restored. In a statement on Monday, Health Minister Mike Nesbitt welcomed the publication of the two reports. Mr Nesbitt says he supports the recommendations "in principle" and will be engaging with his executive colleagues and the government to "confirm the financial implications for NI and to see to secure the additional funding required". "The severe budgetary pressures on health and social care in NI mean I am unable to make an immediate decision on the recommendations," he said. "This is very regrettable, but I can assure staff I will do everything in my power to ensure they are properly rewarded for the great work they do." The recommendation on doctor’s pay is separate from the pay offer being made to junior doctors in England aimed at ending a long running dispute. Junior doctors in Northern Ireland have also been taking part in the industrial action, but it will be down to the Executive to make its own offer to end the dispute.
