title: Gregg Wallace apologises for 'middle-class women' comment - BBC News
date: '2024-12-02'
section: Culture
url: http://www.bbc.co.uk/news/articles/cgkxy2g7py2o
content: |-
  It follows him suggesting claims against him came from a handful of "middle-class women of a certain age".

  MasterChef presenter Gregg Wallace has apologised for suggesting allegations against him came from "a handful of middle-class women of a certain age". The TV host had said on Sunday there had been "13 complaints" from "over 4,000 contestants" he had worked with in 20 years on the BBC cookery show. In a new video posted on his Instagram story, external on Monday, he said: "I want to apologise for any offence that I caused with my post yesterday, and any upset I may have caused to a lot of people. "I wasn't in a good head space when I posted it. I've been under a huge amount of stress, a lot of emotion, I felt very alone, under siege, yesterday, when I posted it."

  He concluded: "It's obvious to me I need to take some time out while this investigation is under way. I hope you understand and I do hope that you will accept this apology." Meanwhile, the BBC has confirmed it will go ahead with the broadcast of the current series of MasterChef. “MasterChef is life-changing for the chefs that take part and the show is about more than one individual," a BBC spokesman said on Monday afternoon.

  One of his accusers said Wallace's suggestion that the allegations had all come from middle-class women of a certain age showed he "clearly hasn't learnt his lesson", while another said he wrongly "seems to be saying he's the victim of classism". Ulrika Jonsson, who claimed she was told that Wallace made a “rape joke” during her time on Celebrity MasterChef, told the Daily Telegraph she felt Wallace's response showed “the arrogance of a man who has zero introspection or self-awareness”. “When he made reference to women of a certain age I was just seething... I was just absolutely wild,” she said. Wallace stepped back from MasterChef last week after allegations were made that he had made inappropriate comments while working on the show. A BBC News investigation heard from 13 people spanning a range of ages, who worked across five different programmes. He has not responded to requests for an interview from BBC News.

  Earlier on Monday, a Downing Street spokesman described Wallace's comments as "inappropriate and misogynistic". “As you know, the BBC is conducting an independent review into workplace culture, which must deliver clear and timely recommendations, and it’s essential that staff and the wider public have confidence that the BBC takes these issues seriously,” a government spokesman said. Asked whether Prime Minister Sir Keir Starmer believed the BBC represented good value for money after another scandal involving one of its presenters, the spokesman replied: “As I say, it’s important that the public have got confidence that the BBC are taking these issues seriously. “It’s right that the BBC are conducting this independent review, and the public would expect to see clear and timely recommendations, followed up on as result of this review.” No 10 has also confirmed Culture Secretary Lisa Nandy held talks with BBC bosses in the wake of the row about Wallace's alleged behaviour.

  MasterChef will continue on BBC One at 21:00 GMT on Monday, with further episodes scheduled for Tuesday and Thursday. All three of this week's episodes have already been made available to watch on BBC iPlayer. A Christmas special is also due to be broadcast later this month. In a press release issued on Friday, the BBC said viewers could "expect fireworks, great Christmas banter and good food". On Monday morning, MP Rupa Huq suggested the BBC consider pausing the series while Wallace’s behaviour is investigated. She told BBC News the broadcast of further episodes of MasterChef "could be massively triggering for the women involved, in fact any woman involved in any type of similar incidents", and said the BBC should consider pausing the series "out of sensitivity". But the BBC confirmed later in the day it would broadcast the series as planned for the sake of the contestants who had taken part. Production company Banijay UK said it has launched an investigation, with which Wallace was co-operating, while the BBC has said it will “always listen if people want to make us aware of something directly”.

  People who have come forward with allegations against Wallace include former BBC Newsnight presenter Kirsty Wark, who said he told stories and jokes of a "sexualised nature" in front of contestants and crew when she was on Celebrity MasterChef. Other allegations we have heard include Wallace talking openly about his sex life, taking his top off in front of a female worker saying he wanted to "give her a fashion show", and telling a junior female colleague he wasn't wearing any boxer shorts under his jeans. BBC News has also spoken to a former MasterChef worker who says he showed her topless pictures of himself and asked for massages, and a former worker on Channel 5's Gregg Wallace's Big Weekends, who says he was fascinated by the fact she dated women and asked for the logistics of how it worked. Another female worker on MasterChef in 2019 says Wallace talked about his sex life; a female worker on the BBC Good Food Show in 2010 says Wallace stared at her chest; and a male worker on MasterChef in 2005-06 says Wallace regularly said sexually explicit things on set. But some workers have spoken of more positive experiences with Wallace. One former worker on Inside the Factory told the BBC he made a lot of "dad jokes" but it never went beyond that. A former MasterChef worker said nothing during her time there was concerning. Another said she didn't feel there was any malice to his comments, although she understood why some people may have felt uncomfortable. Wallace has also re-posted comments on social media from former contestants who said they had positive memories of working with him.

  Have you been affected by the issues raised in this story?
  • None Wallace's response to MasterChef claims was misogynistic, says No 10
