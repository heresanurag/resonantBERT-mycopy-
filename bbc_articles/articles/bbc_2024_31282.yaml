title: 'Newspaper headlines: ''Senseless attack'' and ''stagflation'' fears continue
  - BBC News'
date: '2024-12-19'
section: The Papers
url: http://www.bbc.co.uk/news/articles/c0j1q8xjq6eo
content: |-
  Amie Gray's killer is found guilty of her murder, while financial experts worry over borrowing costs.

  The elections watchdog is urging Sir Keir Starmer to tighten up the rules on political donations

  The elections watchdog has told the Guardian, external that Sir Keir Starmer should tighten the rules on donations to political parties. The paper says it comes amid "rising concerns" that the world's richest man, Elon Musk, is planning to give millions of pounds to Reform UK. Its leader, Nigel Farage, has previously said the billionaire is "not opposed" to giving money to the party, provided it can be done legally through UK companies. The prime minister's spokesperson is quoted as saying the rules are "already clear" and that "work is ongoing to reinforce the existing safeguards". The Financial Times, external says the Tories are attempting to woo Mr Musk out of Reform's arms. The shadow business secretary, Andrew Griffith, tells the paper that those looking to oppose the Labour government should "have a proper look at the full menu before jumping into one particular course". The Daily Telegraph , externalsays the prime minister's chief of staff, Morgan McSweeney, travelled to the US to hold "secret talks" with Donald Trump's senior team earlier this month. It says the decision suggests "anxiety at the heart of the government about the need to build bridges with the incoming US president". A senior Downing Street source is quoted as saying that "Team Starmer is confident the UK is in a good position for a strong bilateral relationship with the new presidency".

  The front page of the "i", external says Labour MPs are warning they are ready to "defy the government over its decision not to compensate millions of women affected by changes to the state pension age". It reports that some MPs are willing to lose the whip if the SNP forces a vote on the issue. Several other papers run editorials on the story. The Daily Mail, external says while the prime minister is right to say the bill for compensation is unaffordable, in opposition he still "led voters to believe Labour would write the cheque." The Daily Mirror, external says it is "not too late to reverse the decision and remind people of the difference Labour can make in power". The front page of the Daily Express, external says Prince Andrew has been "frozen out" of a pre-Christmas lunch for the extended royal family today. He was recently thrust into the spotlight over his relationship with an alleged Chinese spy. The Duke of York says he cut all contact with the man as soon as concerns were raised. Several papers say the prince's ex-wife, Sarah Ferguson, may have persuaded him to skip today's event. The Times , externalsays it understands that the King is "very grateful" to the Duchess of York for her assistance. The news that the restaurant critic Grace Dent will replace Gregg Wallace on Celebrity MasterChef features widely. "Saving Grace taking her MasterChef place" is the headline in the Daily Mirror, external. The Daily Mail, external says Ms Dent is a "part time vegan" who is "more than qualified to deflate celebrity cooks for their soggy soufflés".

