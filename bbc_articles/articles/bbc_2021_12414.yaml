title: Teenage boy dies after incident at railway station - BBC News
date: '2021-10-17'
section: Glasgow & West Scotland
url: http://www.bbc.co.uk/news/uk-scotland-glasgow-west-58942279
content: |-
  A 14-year-old boy dies after an incident at a railway station in Glasgow.

  A 14-year-old boy has died after an incident at a railway station in Glasgow.

  Officers were called to High Street station in the city centre at about 15:45 on Saturday.

  He was taken to the Queen Elizabeth University Hospital, where he was pronounced dead.

  Detective Inspector Iain Nelson said: "This has been a shocking loss of a young life and a significant investigation is under way."

  He added: "Specialist officers are supporting the boy's family at this incredibly difficult time.

  "Enquiries continue to establish the full circumstances and anyone who can help is urged to get in touch as soon as possible."

  ScotRail said High Street station would remain closed on Sunday while the police investigation was ongoing, with no trains running between Bellgrove and Partick stations.

  The area around the station was cordoned off by police on Sunday

