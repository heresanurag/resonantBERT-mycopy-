title: 'Martin Bashir Diana interview: BBC boss Tim Davie accepts ''multiple serious
  failures'' - BBC News'
date: '2021-05-21'
section: General
url: http://www.bbc.co.uk/news/uk-57192908
content: |-
  The BBC's director general Tim Davie says Lord Dyson's report on Martin Bashir is a "very difficult read".

  The BBC's director general has described the corporation's failures around Martin Bashir's 1995 interview with Princess Diana as "very, very serious".

  An independent inquiry by Lord Dyson, a former senior judge, found that the journalist Martin Bashir deceived the princess and her brother, Earl Spencer, and then lied about his actions to BBC managers.

  "If you're an organisation that cares about truthful, honest journalism and proper practice, I think it's a very difficult read," Tim Davie said.
