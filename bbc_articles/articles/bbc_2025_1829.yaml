  Weekly quiz: What did the kayaker feel on his face when swallowed by a whale?

  This week saw the US president appear to blame Ukraine for starting its war with Russia, a Liverpool fan scoring the first goal at Everton's new stadium and the discovery of a pharaoh's tomb for the first time in more than a century. But how much attention did you pay to what else has been going on in the world over the past seven days?

