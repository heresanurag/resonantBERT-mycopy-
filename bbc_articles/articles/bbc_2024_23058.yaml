content: |-
  Carl John Reed was given a 14-year sentence after attacking the elderly woman in her bed.

  Carl John Reed has been jailed after attacking a retired nurse in her bed

  A man who broke into into a retired nurse's home and attacked her as she slept has been jailed. Carl John Reed, 52, got into the Anglesey property at about 21:00 GMT on 24 March 2023. Reed, of no fixed abode, appeared at Caernarfon Crown Court, sitting in Llandudno, on Tuesday after admitting to assault with intent to rob. The woman, now 72, was woken by a noise and sensed someone was in her room.

  The retired nurse turned and saw Reed crouched next to her by her face. Pinning her to the bed with his arms he demanded money and threatened to knife her.

  He punched her in the face and head leaving her with a bleeding mouth after he struck her lip. The woman tried to tell Reed she had no money, but he kept assaulting her and demanding cash. When Reed went into another bedroom, the victim ran out of the house onto the street where she shouted for help. Running into a neighbour's home she told them what had happened and called the police. Investigations found Reed's DNA on items around the victim's home, including on a black crowbar and two blue disposable gloves containing the victim's blood. A footprint was found in the victim's home which matched trainers Reed was filmed wearing by CCTV cameras just hours before the break in. He was sentenced to 14 years of which 10 will be served in jail. Speaking after the case North Wales Police's Det Con Leslie Ellis said the experience was traumatic for the woman. "The victim was a popular member of her community, who served valiantly as a nurse for over 30 years before retiring," she said. "She was fun with a bubbly personality and had a real zest for life, but since the incident her health continues to suffer significantly. "The actions of Carl Reed were immeasurable and cannot be underestimated, it has had a devastating impact on her life."
