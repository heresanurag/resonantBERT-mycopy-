title: French police arrest synagogue blast suspect - BBC News
date: '2024-08-25'
section: Europe
url: http://www.bbc.co.uk/news/articles/c5y3d4v43gjo
content: |-
  The man was shot and injured by police after he opened fire on the officers in southern France, reports say.

  CCTV showed a suspected attacker at the synagogue in La Grande-Motte

  French police say they have arrested a man suspected of setting fires and causing an explosion outside a synagogue in a southern resort. Interior Minister Gérald Darmanin said "the alleged perpetrator" was detained on Saturday. He added that the police had shown "great professionalism". French media reported that the suspect was shot and injured by police after he opened fire on the officers who came to arrest him in the city of Nîmes. Earlier on Saturday, a police officer was injured in the blast outside the Beth Yaacov synagogue in the nearby seaside resort of La Grande-Motte.

  The police officer's injuries are not said to be life-threatening, following the blast between 08:00 and 08:30 local time (07:00-07:30 BST) on Saturday. Five people, including the rabbi, were inside the synagogue at the time, authorities said. The explosion was caused by two cars which were set alight outside Police sources told French media that one of the vehicles contained a hidden gas canister. The suspect - who was seen on CCTV with what French media said was a Palestinian flag around his waist - also set fire to several entrance doors of the synagogue. Jewish community leader Yonathan Arfi said the incident was "an attempt to kill Jews" and seemed to have been timed to target Saturday morning worshippers. President Emmanuel Macron said the incident was "a terrorist act". One eyewitness, who asked to remain anonymous, told the BBC: "Just as we were coming round the last corner, there was a huge explosion - a fireball into the air. "It was surreal, like a film. We didn’t go any further." Prime Minister Gabriel Attal and Mr Darmanin visited the site on Saturday evening. Both had earlier condemned the attack, with Mr Attal calling it "an antisemitic act". "What happened here shocks and scandalises all Republicans in our country," Mr Attat said during the visit. "Because the reality is that once again, French Jews have been targeted, attacked because of their beliefs." Mr Attal said an "absolute tragedy" had been "narrowly avoided" as "there would have been victims" if the synagogue had been full of worshippers. Both Mr Attal and Mr Darmanin said security would be strengthened outside synagogues. "I want to assure our Jewish fellow citizens and the municipality of my full support," Mr Darmanin said earlier in the day.

