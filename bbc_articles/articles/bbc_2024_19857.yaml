  The French Jewish community already live under high security, with many synagogues and Jewish schools under police protection. A January 2024 report by the Council of Jewish Institutions in France (CRIF) said there had been a nearly threefold increase of antisemitic acts in France between 2022 and 2023. In May, police shot dead a man after a synagogue in the north-western city of Rouen was set on fire. In 2015, two days after the attacks on the Charlie Hebdo magazine, four people were murdered in a hostage attack on a kosher supermarket. The explosion comes amid heightened concerns for Europe's Jewish community, after the latest survey from the EU's Fundamental Rights Agency (FRA) published last month found that Jewish people in the bloc continue to face high levels of antisemitism. More than 8,000 Jews in 13 EU countries, including Germany and France, were interviewed. Some 96% said they had encountered antisemitism in their daily lives. There has been widespread condemnation of the attempted arson attack across France's political spectrum. Left-wing politician Jean-Luc Mélenchon called it an "intolerable crime", while the far-right National Rally's Jordan Bardella said it was "a criminal and antisemitic act".
