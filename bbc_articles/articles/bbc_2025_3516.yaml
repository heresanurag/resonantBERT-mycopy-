content: |-
  The Gavin and Stacey finale and The Traitors are also nominated for Bafta's "memorable moment" prize.

  Bridgerton or Strictly? Bafta opens vote on best TV moments of 2024

  Bridgerton fans cheered when Colin (Luke Newton) and Penelope (Nicola Coughlan) got together

  The wedding scene from the Gavin and Stacey finale, Strictly winner Chris McCausland waltzing to You'll Never Walk Alone and the moment Polin (aka Penelope and Colin) got together in Bridgerton have been named among the best TV moments of 2024 by the Bafta Awards. They are three of the six small-screen highlights to have been nominated for the "memorable moment" prize at this year's Bafta TV Awards. The others are naked tennis in Jilly Cooper's Rivals; Diane revealing Ross is her son on The Traitors; and a subpostmistress getting a shock about her predicament in Mr Bates vs the Post Office. The memorable moment is the only Bafta TV Award to have its winner chosen by members of the public, and the vote is open, external until 25 April.

  The moment Diane revealed Ross was her son was a dramatic moment on The Traitors

  Hilary Rosen, chair of Bafta's television committee, said: "The list includes heart-warming and heart-stopping surprises that got us all talking, and speaks to the power of great television to have real and lasting impact."

  Gavin and Stacey: The Finale, broadcast on Christmas Day, has been watched by more than 20 million viewers

  The six memorable moment nominees are:
  • None Gavin and Stacey: The Finale (BBC One) - Neil "Smithy" Smith (James Corden) asks for Mick Shipman's (Larry Lamb) opinion before deciding not to marry Sonia at the altar
  • None The Traitors (BBC One) - Contestant Diane Carson reveals fellow player Ross is her son, after she was suspected of being the mother of another contestant
  • None Strictly Come Dancing (BBC One) - Chris McCausland and Dianne Buswell dance to You'll Never Walk Alone
  • None Mr Bates vs The Post Office (ITV1) - Subpostmistress Jo Hamilton (Monica Dolan) calls the Horizon helpline after being accused of owing money, only to find the amount she is due to pay doubles
  • None Bridgerton (Netflix) - Colin (Luke Newton) admits his true feelings for Penelope (Nicola Coughlan) while in the carriage

  Chris McCausland and Dianne Buswell won last year's series of Strictly

  Some of the nominees may feel old to voters, because the eligibility period spans the 2024 calendar year. Both The Traitors and Mr Bates vs The Post Office were broadcast last January, 14 months ago. Since then, a subsequent series of The Traitors has been broadcast. Nominees in all the other Bafta TV Awards categories will be announced later this month, and the winners will be announced during the ceremony on 11 May.
