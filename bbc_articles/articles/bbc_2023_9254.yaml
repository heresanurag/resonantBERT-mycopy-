id: bbc_2023_9254
title: Louis Tomlinson concert-goers pelted in Colorado hail storm - BBC News
date: '2023-06-23'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-65992577
content: |-
  Around 90 people were treated for non-life-threatening injuries and the concert near Denver was cancelled.

  A Louis Tomlinson concert being held at the Red Rock Amphitheatre near Denver, Colorado, was called off before it started, after fans were injured during an intense hail storm.

  West Metro Fire Rescue department announced that up to 90 people were treated for non-life-threatening injuries, with some suffering broken bones and cuts.

  The former One Direction singer posted on Twitter that he was "devastated" and that he "hopes everyone's ok".
