title: Man at Leamington student club night dies after taking drug - BBC News
date: '2020-02-01'
section: Coventry & Warwickshire
url: http://www.bbc.co.uk/news/uk-england-coventry-warwickshire-51339785
content: |-
  Anyone who has taken a "Red Bull" pill should seek medical advice, police said.

  The 19-year-old man fell ill at the drum and bass night at The Assembly in Leamington Spa

  A man who was at a student club night has died and a woman is seriously ill after taking what police said was MDMA.

  The 19-year-old man fell ill at the drum and bass night at The Assembly in Leamington Spa, Warwickshire, at about 05:00 GMT, and later died in hospital.

  The 22-year-old woman remains seriously ill in hospital and police say others were also admitted after taking "Red Bull" pills.

  Warwickshire Police urged people to check on friends who were at the night.

  Officers said they did not know if the group had bought the drugs at the club.

  Police believe those affected may have taken a pill named "Red Bull"

  Det Supt Pete Hill said they believed all those who were ill had taken the red pills containing MDMA, the active drug in ecstasy.

  He added they were concerned others had also taken it and urged anyone who had to seek medical advice.

  "If others were at the same event last night and are aware their friends took this drug, please check in on them," Mr Hill said.

  In a statement The Assembly, which is in Spencer Street, said: "We take the wellbeing of our customers extremely seriously, we continue to work closely with Warwickshire Police and reiterate our zero policy on drugs in our venue."

  According to its Facebook page, the venue had hosted a sold-out event called DNB All Stars: Leamington on Friday night.

  A spokesman for the University of Warwick said the teenager was not one of its students.

  The university, which has many students living in Leamington Spa, and other local colleges have been asked by police to circulate information about the pills, the spokesman said.

