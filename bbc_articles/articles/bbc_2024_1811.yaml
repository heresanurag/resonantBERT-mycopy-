title: Boy, 8, dies after being hit by lorry in Southall - BBC News
date: '2024-02-24'
section: London
url: http://www.bbc.co.uk/news/uk-england-london-68376913
content: |-
  He died in hospital following the collision in west London on Friday.

  The collision happened in King Street, Southall, on Friday evening

  An eight-year-old boy has died after being hit by a lorry in west London.

  Police received calls about the collision in King Street, Southall, at about 18:20 GMT on Friday.

  The boy was treated at the scene by the ambulance service and taken to hospital, but died later at 21:47.

  Metropolitan Police said the driver of the lorry stopped at the scene and there have been no arrests. The force is appealing for witnesses to come forward and for dash-cam footage.

  The boy's next of kin have been informed, the force said.

  Footage on social media showed people gathering at a police cordon and a number of emergency vehicles at the scene, near a Sikh temple.

