title: 'Storm Bert: EFL and National League postponed because of weather - BBC Sport'
date: '2024-11-23'
section: Football
url: http://www.bbc.co.uk/sport/football/articles/c4gpv7glq74o
content: |-
  Storm Bert affects Saturday's fixture lists in the EFL and National League, with several postponements following pitch inspections.

  Storm Bert has had an impact on Saturday's English Football League programme, with matches at Blackburn, Bradford, Fleetwood and Salford called off.

  Games at AFC Fylde and Rochdale in the National League have also been postponed.

  The Championship meeting between Blackburn Rovers and Portsmouth was postponed following an 11:00 GMT inspection because of a waterlogged pitch.

  Bradford City's meeting with Accrington Stanley in League Two was postponed after a 10:30 GMT inspection of the pitch and the area surrounding the University of Bradford Stadium by referee Michael Barlow.

  A statement on the Bantams' club website said heavy snowfall and rain overnight had made the pitch "unplayable".

  Across the Pennines, MK Dons' scheduled visit to Fleetwood Town's Highbury Stadium was also called off after a 10:30 GMT inspection.

  Fleetwood said the overnight storm waterlogged the pitch and that the decision to postpone was agreed by both clubs as well as the match officials.

  Salford's home game with Bromley was then called off just over an hour before kick-off because of a waterlogged pitch.

  The Ammies said there had been "minimal concerns" on Saturday morning about the fixture going ahead, but that worsening conditions meant the "pitch became unplayable in a short space of time".

  The derby between Rochdale and Oldham Athletic and AFC Fylde's home game with Ebbsfleet in the National League were also victims of the weather.

  Halifax Town v Sutton United was called off on Friday, with The Shay pitch frozen.
