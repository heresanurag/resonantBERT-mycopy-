id: bbc_2024_2967
title: 'Valencia fire: Early videos show how flames spread - BBC News'
date: '2024-02-23'
section: General
url: http://www.bbc.co.uk/news/world-europe-68387970
content: |-
  Experts say highly flammable cladding may have helped the fire spread.

  Video which appeared online shows the early moments of a fire at an apartment block in Valencia, Spain and show how the blaze spread.

  Police say they are no longer looking for any missing people, after 10 bodies were recovered from the ruins.

  Authorities have started investigating the cause of the fire, which spread to an adjoining building as high winds fanned the flames.

  There are fears that highly flammable cladding on the building's facade may have helped the fire spread.

  Spanish Prime Minister Pedro Sanchez visited the site, promising to provide any support needed.
