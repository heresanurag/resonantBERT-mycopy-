title: 'Newspaper headlines: ''Tax the rich'' for winter fuel and Oasis go global
  - BBC News'
date: '2024-09-08'
section: The Papers
url: http://www.bbc.co.uk/news/articles/c79w0rvpg2eo
content: |-
  Sunday's headlines include the latest on cuts to winter fuel payments and Oasis taking their tour stateside.

  'Tax the rich to fund winter fuel', and Oasis go global

  The Sunday Times reports that Great Ormond Street Children's Hospital is conducting an "urgent review" into the cases of 721 children treated by the same surgeon, external. It says some patients were left with life-changing injuries such as amputations and deformities. The Times has seen a leaked report by the Royal College of Surgeons, which criticises the department where the surgeon worked as "dysfunctional". The consultant, who now works in Dubai, has declined to comment. Great Ormond Street has apologised and promised to address the findings of the review. The Sunday Express says Sir Keir Starmer faces a "revolt" by Labour MPs, angry about his decision to cut winter fuel payments, external. The paper quotes the Labour MP Rosie Duffield who told the BBC Radio 4 Today programme the decision was "brutal" and "shameful". The Express says Sir Keir is working to keep a lid on party in-fighting. The report carries a comment from the former Conservative work and pensions secretary, Esther McVey, who warns the move could hurt Sir Keir's reputation in the same way Liz Truss was damaged by her mini-budget.

  The Mail on Sunday has a different warning for the prime minister, saying planned tax rises are putting Britain on the path to destitution, external. Its report focuses on statistics put together by a firm which helps wealthy people move overseas. The data from Henley and Partners suggests a record number of the UK's highest earners, who contribute the biggest tax share to the Treasury, are planning to leave the country in the wake of rumoured levies such as a mansion tax in next month's Budget. The Sunday Telegraph's main story suggests the BBC has breached its own editorial guidelines 1,500 times in coverage of the Gaza war. It says a report - which used artificial intelligence to analyse BBC News output, external - revealed a pattern of bias against Israel. The research was led by a British lawyer based in Jerusalem, Trevor Asserson. A BBC statement questioned the use of AI in the study and insisted that the corporation was achieving due impartiality.

  "Half the world away: Oasis tour to go global" says the Sunday Mirror. Its front page says the brit-pop band are in talks to take their 2025 reunion tour overseas, external, with gigs planned for the US, Mexico and Argentina. The paper says adding the international dates could take the band's profits to more than £500m. The Sun on Sunday says the former Strictly Come Dancing contestant Amanda Abbington is "in a rage with the BBC", external ahead of the corporation's report into the dancer, Giovanni Pernice, who has been accused of bullying. The paper says she has told friends that she expects the BBC to side with Mr Pernice. The Italian - who is not taking part in the upcoming season of Strictly - has always denied any wrongdoing. And the Sunday Telegraph sports section says England's footballers "hit the right notes" in their 2-0 win against the Republic of Ireland - a nod to the new Three Lions boss, Lee Carsley, not singing the national anthem before kick-off. Saturday's edition of the paper took a dim view of Carsley's decision. Its chief football correspondent, Jason Burt, accused him of being naive and said he should not be managing the national side if he did not sing God Save the King. "Car starts with a bang" says the Sunday Express headline. Its back page features a picture of a smiling Carsley, as well as England's goal scorers Declan Rice and Jack Grealish.

