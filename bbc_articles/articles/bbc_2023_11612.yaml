  The Spanish football federation has responded after president Luis Rubiales kissed forward Jenni Hermoso after their World Cup final win.

  Spanish football federation president Luis Rubiales has been criticised after kissing Jenni Hermoso on the lips during Spain's Women's World Cup victory ceremony. The RFEF stated that Hermoso said it was a "natural gesture of affection". Rubiales has since apologised for his actions.

