  Rishi Sunak and Sir Keir Starmer clashed repeatedly on their plans for the country in their final head-to-head TV debate.

  The BBC's chief political correspondent summed up the last leaders' debate ahead of the general election.

  Speaking just after it finished, Henry Zeffman went back over how Sir Keir Starmer and Rishi Sunak came over as their campaigns enter their final eight days.
