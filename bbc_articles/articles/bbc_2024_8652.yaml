title: Dramatic car chase on M6 motorway ends in arrest - BBC News
date: '2024-04-23'
section: General
url: http://www.bbc.co.uk/news/uk-67374645
content: |-
  A black BMW convertible is brought to a stop by a number of police cars, and the driver is arrested.

  A man has been arrested on suspicion of a number of driving and drug offences after a high-speed chase on the M6 motorway in Cheshire.

  Officers tried to stop the vehicle on the A49 near Stretton, Warrington, and gave chase when the driver took off and drove his car into oncoming traffic.

  The 34-year-old man from Manchester was arrested on a number of offences, including suspicion of dangerous driving, failing to stop for police, using a cloned number plate, and driving under the influence of drugs and alcohol.
