content: |-
  The pontiff calls for a "lasting peace" in Ukraine and says he is "deeply hurt" by events in Gaza.

  Pope Leo appeals for no more war in first Sunday address

  To play this video you need to enable JavaScript in your browser. This video can not be played

  Pope Leo XIV appealed for "no more war" in a message to world powers during his first Sunday address at the Vatican. Reflecting on current conflicts, the newly selected pontiff called for a "lasting peace" in the war in Ukraine, a ceasefire in Gaza, and welcomed Saturday's agreement to end recent hostilities between India and Pakistan. He said he was "deeply hurt" by events in Gaza, expressed hope for a "lasting accord" between India and Pakistan, and wished for a "authentic, true and lasting peace" in Ukraine. The Pope also recited the Regina Caeli prayer, in honour of the Virgin Mary, to the crowd in St Peter's Square.

  Pope Leo was chosen as the new leader of the Catholic Church on Thursday following the death of his predecessor, Pope Francis, and a two-day conclave in Vatican City. On Saturday, he visited a shrine outside Rome before praying at Francis' tomb inside the basilica of Santa Maria Maggiore. Pope Leo will be formally inaugurated at a Mass in St Peter's Square next week on 18 May. Three years ago, as Bishop Robert Prevost, he denounced Russia's full-scale invasion of Ukraine as an imperialist war and condemned crimes against humanity he said were being committed there. On Sunday, he restricted himself to echoing his predecessor, Francis, in calling for peace. "I would also like to address the powerful people of the world, repeating the always current call: 'no more war'," he told the crowd from the central balcony of St Peter's Basilica. "The immense tragedy of the Second World War ended 80 years ago...now we're facing the tragedy of a third world war in pieces."
