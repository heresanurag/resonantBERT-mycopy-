title: Russia must pay for Ukraine rebuild, Blinken says - BBC News
date: '2024-05-14'
section: Europe
url: http://www.bbc.co.uk/news/world-europe-69011247
content: |-
  The top US diplomat vows to "seize" Russian assets in the US to fund rebuilding parts of Ukraine.

  The top US diplomat told Ukraine President Volodymyr Zelensky that military aid is "now on its way".

  US Secretary of State Antony Blinken has said that Russian President Vladimir Putin must pay to rebuild what he has destroyed in Ukraine. Speaking in Kyiv, Mr Blinken said Washington has the power to seize Russian assets in the US and will use them to help rebuild Ukraine. He also said that Ukraine is getting "closer to Nato". Earlier, the top US diplomat told Ukraine President Volodymyr Zelensky that military aid is "now on its way". "What Putin destroyed, Russia should - must - pay to rebuild. It's what international law demands. And it's what the Ukrainian people deserve," Mr Blinken said during his speech at Kyiv Polytechnic University. "Our Congress has given us the power to seize Russian assets in the US, and we intend to use it," he said. He added that the G7 group - the UK, France, Germany, Italy, Japan, Canada and the US - can unlock billions of dollars, "and send a powerful message to Putin that time is not on his side". Since the full-scale invasion of Ukraine two years ago, Russian state assets in the EU estimated to be worth almost €211bn (£181bn) have been frozen. Mr Blinken landed in the Ukrainian capital on Tuesday after a nine-hour journey via sleeper train from the Polish border. His visit comes as the country struggles to hold back a major Russian incursion near its second biggest city of Kharkiv. Mr Blinken's arrival also marks three weeks since the US Congress finally agreed a new $61bn (£49bn) aid package for Ukraine. "We are bringing Ukraine closer to and then into Nato," Mr Blinken said in his speech. "We will make sure Ukraine's bridge to Nato is strong."

