  Mr Blinken sought to reassure Ukrainians with a direct-to-camera message: "You are not alone. We are with you today and we will stay by your side". He noted that his visit came at a "critical moment" - amid a fresh Russian offensive which he said had been aided by North Korea, Iran and China. He also touched upon new legislation to help mobilise troops to fight invading Russian forces. The measure is aimed at boosting numbers in the military, which is under severe pressure as Russia continues its advances in the east. Mr Blinken described Ukraine's recent mobilisation reforms as "a difficult decision but a necessary one", lauding all those who have stepped up to serve their country. During Mr Blinken's meeting with President Zelensky, he paid tribute to Ukraine's "extraordinary resilience" and to the Ukrainian president's "strength and leadership". He acknowledged that it was a "challenging time" but that the US assistance was "on the way", which he said would make a crucial difference on the battlefield.
