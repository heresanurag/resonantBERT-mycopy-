title: Fire engulfs Glasgow's Mackintosh building - BBC News
date: '2018-06-16'
section: General
url: http://www.bbc.co.uk/news/uk-44504685
content: |-
  Flames engulfed the world-renowned Mackintosh building for the second time in four years.

  The large fire broke out at the Glasgow School of Art for the second time in four years.

  Flames and plumes of smoke engulfed the world-renowned Mackintosh building in the city centre.
