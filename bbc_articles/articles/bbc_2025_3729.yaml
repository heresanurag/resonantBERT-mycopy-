content: |-
  Shoppers in Selkirk seek better access to cash as they say their ATM regularly runs out of notes.

  Anger as town ATM 'regularly runs out of cash'

  Aileen Firth is regularly frustrated by Selkirk's only ATM being out of money

  Shoppers in a Borders town are demanding better access to cash as they say their ATM regularly runs out of money at weekends. The closure of the Selkirk's banks and main post office has left the historic market town with only one external cash machine. The problem is particularly acute during regular events like the monthly farmers' market when demand for banknotes rises. Local resident Aileen Firth, a human resources officer, said: "Every weekend when you come down the street you will hear the war cry 'there's no money'."

  Although the vast majority of businesses in Selkirk do accept debit and credit cards, there are a few which deal only in cash. The town's branches of the Bank of Scotland and RBS have both closed in the past decade with each removing the adjoining ATM. A further source of banknotes during office hours - the main Post Office - shut at the turn of the year. Mrs Firth said: "Last Friday I was meeting a friend who had suffered a bereavement and we were going to an establishment that only took cash - guess what, neither the ATM on the High Street or the one within the garage on the edge of the town had any money. "I had to drive to St Boswells - 10 miles away - to get some notes. "It's a problem here every weekend. I'm regularly driving to other towns to try to find money. "Selkirk is a busy town and it's ridiculous that you will really struggle at times to find any cash."

  Selkirk shoemaker Colin Turnbull has not accepted cards since taking over the business in 2007

  Selkirk shopkeeper Colin Turnbull has been operating cash-only since opening his shoe repair and engraving business on Selkirk High Street in 2007. He admits the recent drought of banknotes has led to a few issues. Mr Turnbull said: "By not taking cards I don't have to pay the fees, and can keep my prices down. "Most people know I am cash-only and they bring in money with them, but there's been more and more people lately not able to get money from the machine. "I'm fairly trustworthy, so they can either come back and pay me when they do get cash, or in some cases I give them my bank details and they do a transfer when they get home. "Even with the problems, I've no intention of going down the card route."

  Local councillor Caroline Cochrane has written to ATM organisations as well as politicians in a bid to get more access to cash within the town. She said: "The recent farmers' market highlighted what a big problem this is. "Many stallholders - like a few businesses in the town - don't want the additional cost burden of a card machine, yet nobody in the town could access cash last weekend. "There's a limited amount of money that goes into the ATM each week, and when it's gone, it's gone. "I know there are similar problem in other towns in the Borders, and we need to put pressure on the Scottish and UK governments to address this."

  Selkirkshire councillor Caroline Cochrane is lobbying Link for improving access to cash

  A petition has been raised in the coastal town of Eyemouth over its lack of access to cash. Residents claim their only exterior ATM regularly breaks down as well as runs out of money. Berwickshire, Roxburgh and Selkirk MP John Lamont has raised the issue at Westminster and has written to ATM operators Cardtronics and LINK to highlight the ongoing issues in Selkirk and Eyemouth. A spokesperson for LINK said: "We understand the importance of cash access and that it can be frustrating if an ATM is not operating correctly. "LINK does not own or operate any ATMs, but where issues do arise, we can speak to the operators to ensure that they are resolved quickly. "Selkirk and Eyemouth both have two free-to-use ATMs and people can also access cash and everyday banking services at the Post Office." Cardtronics has been approached for a comment.
