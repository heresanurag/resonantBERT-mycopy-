  Afghan national Fayaz Khan is accused of threatening to kill the Reform UK party leader in a TikTok video.

  Man in court accused of threats to kill Farage

  An Afghan man accused of threatening to kill Nigel Farage while he travelled to the UK has appeared in court. Fayaz Khan, 25, is alleged to have posted a video on TikTok in October, where he made a gun gesture and told the Reform party leader he was going to "pop pop", Westminster Magistrates' Court heard. Mr Khan, of no fixed address, is also charged with persistently making use of public communication networks to cause annoyance, inconvenience and anxiety. The accused did not enter a plea when the charges were listed and was remanded into custody to appear at Southwark Crown Court on 13 May.

  The court heard Mr Khan also faces a separate charge of entering the country illegally. He was arrested last year on his arrival to the UK. He is currently detained at HMP Elmley in Kent. David Burns, prosecuting, said Mr Khan posted a video and confirmed he would come to England, where he "states he will find Mr Farage to make him stop talking about him". Mr Burns alleged that Mr Khan used his fingers to imitate a gun and went "pop pop" in this video.
