  The musician, who's known for songs like Read All About It and I Need You Tonight, said the fall happened as he was packing for his tour.

  In further posts, Green said was "extremely lucky" and thanked "our NHS, heroes amongst men (and women)".

  He promised fans he would be back in the winter with another tour.

  A spokesman for the London-born rapper said refunds for all tour dates will be made available at the point of purchase.

  Professor Green was also due to play Birmingham, Glasgow, Newcastle upon Tyne, Manchester, Leeds, Sheffield and Brighton.
