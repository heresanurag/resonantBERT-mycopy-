title: 'Professor Green: Rapper fractures neck during seizure - BBC News'
date: '2019-02-13'
section: Entertainment & Arts
url: http://www.bbc.co.uk/news/entertainment-arts-47219455
content: |-
  The star calls off his UK tour after suffering three seizures just hours before the first show.

  The British rapper Professor Green has fractured vertebrae in his neck, forcing him to cancel his latest tour.

  The 35-year-old artist, whose real name is Stephen Manderson, was due to start a UK tour in Cardiff.

  The star told fans on social media he had had three seizures, resulting in a fall which caused the fractures.

  Green shared a picture of himself strapped onto a stretcher with his head supported and a neck brace, with a tube in his nose.

