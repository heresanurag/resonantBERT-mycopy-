content: |-
  King Charles presents a new award recognising those who died in public service.

  First Elizabeth Emblems for emergency workers who died on duty

  The King presented the inaugural awards at Windsor Castle

  King Charles has presented the first Elizabeth Emblems, recognising public servants such as police and fire fighters who died in the line of duty. The families of more than 30 men and women received the awards at a ceremony at Windsor Castle - some had waited decades for this public recognition. This first group included deaths on duty dating back more than 70 years – with the earliest honouring PC Nathaniel Edgar who was shot in north London in 1948. The design of the award includes a rosemary wreath, which is a traditional symbol of remembrance, and the inscription: "For A Life Given In Service".

  The family of fire fighter Fleur Lombard received an award from King Charles

  Among the fire service personnel remembered was Leslie Marsh from West Midlands Fire Service who died when he fell through the floor of a burning building while fighting a blaze in 1949. The firefighter's children, Robert Marsh, 81, and Carole Henbury, 83, received the award. "I'm so proud to accept it on behalf of my father and my mother. Everybody here, they deserve recognition and it's taken too long to get it," said his daughter Carole. His son Robert remembered a talented and artistic man, beyond his work for the fire service, whose life had been cut short. "This man could play the piano so beautifully that people would stand outside the house and listen to him play, it was just incredible," he said. Their father's early death had meant their widowed mother had to work three jobs to support the family, said Robert.

  The awards have the inscription: "For a life given in service."

  Bryn Hughes and Paul Bone, the fathers of two murdered police officers - Nicola Hughes and Fiona Bone - had campaigned for such a recognition of those who had died in public service. And their daughters, who were killed responding to a call in Greater Manchester in 2012, were among those honoured. "It's been a long arduous campaign but it's been worthwhile in the end, to see so many families here today receiving it after so many years. It's been quite poignant quite, emotional at times," said Mr Hughes after the ceremony. Mr Bone said: "It's nice to be at the end of the process and (to get) recognition finally from the state for people who have lost their lives." Most of this initial group being honoured are from the police and fire services, but it also includes Rebecca Dykes who was killed while working for the Foreign, Commonwealth and Development Office in Lebanon in 2017. Other groups could be eligible, such as NHS workers who died during the pandemic. "We must never forget those who have given their lives to protect others in the line of duty," said Prime Minister Sir Keir Starmer. "While families will never be able to replace their loved ones, the Elizabeth Emblem pays tribute to the sacrifice they have made."
