id: bbc_2018_1264
title: 'Turkey bus crash: Eleven killed in motorway accident - BBC News'
date: '2018-01-20'
section: Europe
url: http://www.bbc.co.uk/news/world-europe-42758188
content: |-
  The bus taking families on a skiing trip crashed in the north-west in reportedly good road conditions.

  The bus crashed into several trees, causing many casualties

  Eleven people have been killed after a bus taking families on a school holiday skiing trip crashed while travelling on a motorway in north-western Turkey, local officials say.

  Some 46 others were injured in the accident, they add.

  The bus was travelling overnight from the capital, Ankara, to the Uludag resort near the city of Bursa.

  It crashed into trees in the region of Eskisehir in what were said to be good road conditions, reports say.

  Eskisehir governor Ozdemir Cakacak, quoted by the Dogan news agency, said it was not clear what caused the accident as the road was not wet or frozen.

  Those injured were currently being treated at three different hospitals, he added.

  It is not known if there are any children among the victims.

  The two drivers, who were slightly injured, have been arrested, and an investigation has been launched, according to Dogan.

  Turkey has a poor track record in road safety, with more than a million accidents in 2016 and 7,300 deaths, according to official statistics, the AFP news agency reports.
