  North Korea's leader will visit other Russian sites before heading home from the cosmodrome summit.

  What does imperialism mean to North Koreans?

  As you may remember, Kim told Putin that they will "remain together in [the] fight against imperialism". But what does imperialism mean this context? For North Korea, it means one thing: the United States. It views the US as an imperialist bully which tries to invade other countries - itself included - to rid the world of dictators with nuclear weapons, all under the guise of creating peace. It dates America’s “imperialist foreign policy” all the way back to the slave trade, and then to the Korean War - in which an estimated 20% of the North Korean population was killed. In reality, the Korean War started when the North invaded the South, and the US came to South Korea’s defence. But successive North Korean leaders have pointed to the intense US bombing campaigns that wiped out scores of cities in the North. At an anti-US rally in Pyongyang this summer, people carried placards adorned with the slogan: “The imperialist US is the destroyer of peace”.
