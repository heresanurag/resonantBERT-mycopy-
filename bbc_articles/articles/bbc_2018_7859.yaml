title: Leeds school uses spoons to help prevent forced marriage - BBC News
date: '2018-07-13'
section: Leeds & West Yorkshire
url: http://www.bbc.co.uk/news/uk-england-leeds-44812530
content: "A school tells pupils to hide the spoons in their underwear to trigger metal\
  \ detectors at airports.\n\nThis video can not be played To play this video you\
  \ need to enable JavaScript in your browser.\n\nA school is attempting to tackle\
  \ forced marriages by handing out spoons to urge students to hide them in underwear\
  \ to trigger metal detectors at airports.\n\nPupils at the Co-operative Academy\
  \ in Leeds have been told to hide the cutlery there if they fear they are being\
  \ taken overseas to be married.\n\nIt will trigger metal detectors at airports,\
  \ allowing them to raise the alarm with security staff privately.\n\nHarinder Kaur,\
  \ from the school, said the spoons can \"save lives\".\n\nShe said that 80% of UK\
  \ forced marriages happened abroad during the summer holidays.\n\n\"In the six-weeks\
  \ holidays we know there is no contact between school and the family and families\
  \ have that opportunity to go abroad, get their child married and come back,\" she\
  \ said.\n\n\"It's a way of making our children aware there is a safety net there.\"\
  \n\nA law making it a criminal offence to force people into marriage came into effect\
  \ in June 2014.\n\nParents who force their children to marry can be punished by\
  \ up to seven years in prison.\n\nIf you or someone you know has been affected by\
  \ forced marriage you can find several organisations that may be able to help here.\n\
  \nThe best way to get news on the go \n\nThe BBC is not responsible for the content\
  \ of external sites."
