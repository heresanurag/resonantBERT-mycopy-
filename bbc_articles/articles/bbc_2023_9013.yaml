content: |-
  Sunnah Khan and Joe Abbess died after being pulled from the sea near Bournemouth Pier on Wednesday.

  Sunnah Khan, a 12-year-old girl from Buckinghamshire, and 17-year-old Joe Abbess from Southampton both died in hospital on Wednesday

  A riptide may have led to the deaths of a girl and a teenage boy off Bournemouth beach, an inquest heard.

  Joe Abbess, 17, from Southampton, and 12-year-old Sunnah Khan, from Buckinghamshire, both died in hospital after the incident on Wednesday.

  An inquest opening at Dorset Coroner's Court heard there was a "suggestion" a riptide had led to the pair drowning.

  Dorset Police said it was keeping an "open mind" about the circumstances that led to the deaths.

  The force said it was considering causes including the impact of weather conditions and the state of the water.

  It has dismissed speculation the pair had jumped from the pier.

  Stephanie Williams (pictured with Sunnah) said she had lost her "beautiful girl"

  Riptides are strong currents running out to sea that can quickly drag people and objects away from the shallows of the shoreline and out to deeper water.

  They can be difficult to spot and are a major cause of accidental drowning on beaches all across the world, according to the Royal National Lifeboat Institution (RNLI).

  Rip currents are often harmless, but around large headlands or piers - like Bournemouth Pier - they can be powerful.

  They tend to flow at 1-2mph but can reach 4-5mph, which is faster than an Olympic swimmer, the RNLI explained.

  In a hearing to open the inquest proceedings at Bournemouth Town Hall, Dorset coroner's officer Nicola Muller said post-mortem examinations identified drowning as the cause of the deaths.

  "The brief circumstances are that emergency services were contacted by members of the public... following suggestion they had been caught in a riptide," she said.

  The inquest in Bournemouth was opened and adjourned for a pre-inquest review hearing on 18 September.

  Joe's family described him as "a fabulous young man", while Sunnah's mother Stephanie Williams has posted on Twitter to pay tribute to her "beautiful daughter".

  Ms Williams tweeted: "No parent should ever have to go through what her dad and I are going through. We love you so much baby girl."

  The beach was cleared as emergency services attended the incident

  The incident involved 10 swimmers on a day when the beach was packed during half-term.

  The Dorset Belle sightseeing boat was impounded by Dorset Police in the immediate aftermath, but the force said this was "just one of several lines of inquiry".

  Det Ch Supt Neil Corrigan said: "We are working with experts from partner agencies to understand all of the factors and this will take time to establish.

  "We continue to support the families of Joe and Sunnah and they are being kept updated by specially trained family liaison officers about our investigation.

  "I would ask that the police investigation is allowed to continue without further unhelpful speculation around circumstances of the incident, and that there is respect for the families of those who have died so tragically."

  Police were at the scene of sightseeing boat the Dorset Belle on Friday

  Tobias Ellwood, Conservative MP for Bournemouth East, said he believed police should have released more information that would have helped "place into context the scale of this major incident".

  "The absence of clarity led to really wild speculation on social media," he added. "Provide clarity early on - just so people can have an assurance of mind on what roughly happened."

  David Sidwick, Police and Crime Commissioner for Dorset, said: "It is the family of Sunnah Khan and Joe Abbess who have to be first in our thoughts both with our condolences and also from the point of view of whatever information comes forth.

  "This is a complex investigation - it includes a number of agencies."

  Mr Sidwick added: "They are working together as fast as they can to find out what happened on that day and I truly believe that they need to be given the time and space to do that fully, thoroughly, professionally without hindrance.

  "At this moment in time we have to understand that this is an immensely complex situation - the police moved to rule out those things which they could rule out when they had enough evidence to be able to do that.

  "What they can't do is say what exactly happened. What is the point of saying to the family it's 'X' or it's not 'Y' if that isn't fully understood - we've got to let all these investigations work through."

  Friends of Joe Abbess (L-R) - Jack, Ben, Leo and Jack - paid tribute to the "much-loved" student

  The force said none of the swimmers were involved in any collision or contact with any vessel in the water.

  It has appealed for witnesses and urged people to send it any photographic footage.

  A man in his 40s, who was "on the water" at the time, was arrested on suspicion of manslaughter. He has since been released while inquiries continue.

  City College Southampton, where Mr Abbess was studying catering, said teachers were "in tears" over his death.

  Curriculum manager Joanne Pengelly said the teenager was a "rare gem... totally reliable, always happy [and] really supportive in the department".

  His friend and fellow student Ben said: "Joe was kind of an inspiration to me. He was obviously very passionate about cooking. Head chef one day, for sure."

  Another student Jack said: "He was definitely the life of the kitchen. Bubbly, happy, trying to spread the cheeriness throughout the kitchen.

  "Now I'm heartbroken. We all loved him so much."

