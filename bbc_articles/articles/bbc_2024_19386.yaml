title: Bristol GP deemed unfit to practice after unlawful protests - BBC News
date: '2024-08-20'
section: Bristol
url: http://www.bbc.co.uk/news/articles/c3vxd9dzgz6o
content: |-
  Dr Diana Warner believes her actions were justified for the sake of public health.

  Dr Diana Warner (second from left) glued herself to the ground as part of an Insulate Britain protest in 2022

  A tribunal has ruled that a retired GP, who was jailed for involvement in climate protests, committed professional misconduct and is "impaired" to practise. Diana Warner, of Filton, Bristol, joined activist group, Insulate Britain. They aimed to disrupt motorists in a bid to draw attention to climate change and rally the government for action. Between September and October 2021, Dr Warner and other activists engaged in non-violent protests which involved blocking traffic on the M25 and surrounding roads. Dr Warner remained “steadfast” in her view that her unlawful actions were justified for the sake of public health, the Medical Practitioners Tribunal Service found.

  The 65-year-old took part in three protests and has been jailed three times for her involvement. The group staged a series of co-ordinated protests around London and the South East, leading to major disruption to motorists and angry confrontations. Police also warned the group's tactics could lead to "serious injury or death". Following on from the protests, the government granted a number of injunctions, external to prevent further action.

  Insulate Britain aimed to disrupt daily life to draw attention to climate change

  Dr Warner told the tribunal that climate change poses a "huge" and "urgent" problem which requires "immediate and authoritative action". As a doctor, she felt it was her duty to act on behalf of her patients and the wider public. "I have always accepted the consequences of my actions. "What I did broke national law and I knew the potential consequences," she said.

  Many protestors were jailed for their involvement

  Although the tribunal found no concerns in regards to Dr Warner's clinical capabilities, it ruled that her decision to act unlawfully may lead to some patients questioning her judgement as a medical professional. The tribunal said: "It is unacceptable for doctors, who are held in high regard, to act in a repeatedly unlawful manner and to make conscious deliberate decisions to put other sections of the public at risk during protests." Ruling Dr Warner's fitness to practise as "currently impaired" is "necessary to protect, promote and maintain the health, safety and well-being of the public," it added.

  General counsel and director of fitness to practise at the GMC, Anthony Omo said they are "required by law to consider all concerns referred to us" including where a doctor has been "convicted of a criminal offence or otherwise broken the law". "She received a custodial sentence following a criminal conviction, this meant an automatic referral to the Medical Practitioners Tribunal Service for a hearing," he said. ‘Doctors, like all citizens, have the right to express their personal opinions on issues, including climate change. ‘However, when doctors’ protesting results in law-breaking, they must understand that it is their actions, rather than their motivations, that will be under scrutiny."

  Climate change is the long-term shift in the Earth's average temperatures and weather conditions. Over the last decade, the world was on average around 1.2C warmer than during the late 19th Century. It has now been confirmed that global warming exceeded 1.5C across the 12 month period between February 2023 and January 2024. That followed 2023 being declared the warmest year on record. The temperature increase was driven by human-caused climate change and boosted by the natural El Niño weather phenomenon.
