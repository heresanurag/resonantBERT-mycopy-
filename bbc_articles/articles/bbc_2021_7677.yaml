  Prime Minister Boris Johnson described the by-election result as "disappointing" and attributed the defeat to local issues.

  But he insisted the government was focused on "uniting and levelling up within regions across the whole country".

  The by-election result was a major boost for the Liberal Democrats after their poor performance at the 2019 general election,.

  It brings their total number of MPs at Westminster to 12.

  This video can not be played To play this video you need to enable JavaScript in your browser. Sir Ed Davey celebrates his party's win in the Chesham and Amersham while breaking down a model blue wall

  Labour had the worst by-election result in the party's history, with 622 votes.

  Following the by-election, Ben Nunn - director of communications for Labour leader Sir Keir Starmer - stepped down from his role. He told the BBC it was a "personal decision".
