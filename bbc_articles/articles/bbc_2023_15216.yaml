title: Shots fired as BBC visits scene of Israel festival massacre - BBC News
date: '2023-10-13'
section: General
url: http://www.bbc.co.uk/news/world-middle-east-67094215
content: |-
  Lucy Williamson visits the site of the Israeli music festival where 260 bodies were discovered.

  The BBC's Lucy Williamson has been to the site of the Israeli music festival where 260 bodies were discovered following an attack by Hamas militants on Saturday.

  Gun shots rang out as journalists were allowed in the area for the first time, accompanied by the Israeli military.
