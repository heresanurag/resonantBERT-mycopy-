  Mr O'Hara said he immediately felt an "excruciating pain" but his visitor told him that was a normal reaction, then left in a hurry. The victim quickly became suspicious when Ms Leung said the visitor was the same height as her son. Mr O'Hara spent five weeks in Newcastle's Royal Victoria Infirmary during which time doctors cut away large pieces of diseased flesh in a desperate bid to stop the the necrotising fasciitis spreading beyond his arm.

  This video can not be played To play this video you need to enable JavaScript in your browser.

  He needed several skin graft surgeries and was left with post-traumatic stress disorder, as well as needing ongoing physiotherapy. Speaking outside court after the sentencing hearing, Mr O'Hara praised NHS staff who saved his life and said justice had been done. Prosecutors believed Kwan used a pesticide called iodomethane, although multiple other poisons, including the ingredients for making ricin, were found at his home along with numerous books, recipes and terrorism manuals about toxins. Detectives also found evidence of a "back-up plan" which involved a fake charity sending free food and wine.

  Thomas Kwan sent his victim a fake letter to set up a home visit on 22 January

  Judge Mrs Justice Lambert said it was an "audacious" and extensively planned scheme to "kill a man in plain sight", which nearly worked. She said Kwan was masquerading as a community nurse so he could "administer a lethal injection" to his victim, and Mr O'Hara had no reason to suspect his visitor was not genuine. The judge said the letters Kwan forged were "sophisticated" and Kwan gained entry to Mr O'Hara's home in "the most calculated and callous way", adding it "struck at the heart of public confidence" in the NHS.

  She said doctors were baffled by Mr O'Hara's symptoms, adding he suffered horrific injuries which needed extensive treatment. "Fortunately he survived although he still suffers from the physical and psychological consequences of your attempt to kill him. "It is clear he has been transformed from the tough stoical person he was before the attack." Mrs Justice Lambert said Mr O'Hara had post-traumatic stress disorder, flashbacks and had broken up with Kwan's mother.

  This video can not be played To play this video you need to enable JavaScript in your browser. Thomas Kwan was 'calculated and callous' in poison attack plan

  The court heard Kwan was born in Hong Kong and moved to the UK to attend boarding school at age 13, going on to study medicine at Newcastle University. Mrs Justice Lambert said Kwan was motivated by a "continual obsession" with his mother's estate, adding: "Your resentment and bitterness towards your mother and Mr O'Hara was all to do with money." She noted Kwan had a "morbid obsession" with poisons, had amassed a "library of materials" and searched the internet for iodomethane 97 times in January. The judge said Kwan was a "dangerous offender" who posed a high risk of serious harm to Mr O'Hara. The GP was told he had shown a "shocking level of distorted thinking, a distinct sense of entitlement and capacity for the most extreme behaviour in order to meet your own needs".
