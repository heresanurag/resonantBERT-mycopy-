  An experienced technician can carry out 15 to 20 repairs per shift, depending on what the damage is. Smashed screens are still the most common issue.

  "We see devices come in that look like they've been run over by a car," said Mr Whitehouse.

  "And when we go back and say 'how did this happen?', there are times when they actually have been run over by a car."

  Then it was my turn to have a go at the company's apprenticeship entrance test. I had to dismantle and then reassemble a smartphone after watching Tudor Ion, head of repairs, do it in front of me.

  It takes a trained technician a few minutes - it took me 45.

  It is not difficult but it is fiddly. There are 15 tiny screws underneath the casing, and a further three, equally tiny but a slightly different size, that attach the motherboard to the frame.

  Phone repair technicians can repair up to 20 devices in a day

  Everything has to be carefully disconnected and removed in the correct order without causing further damage. I also had to wear accessories to prevent electrostatic discharge - because a small amount of accidental static, like the shock you sometimes get from walking on carpet, can destroy the delicate electronics inside the device.

  "You need some practical skills. But I think attitude is the most important because we can teach you how to repair devices. But you need to have the correct attitude," said Mr Ion.

  I think by this he means you have to not be tempted to throw the phone out of the window after doing battle with the world's smallest screws - but perhaps that's just me.

  The rise of the right to repair movement in the US and Europe has seen campaigners pushing the tech sector to help people to fix their devices themselves.

  Apple now does home loans of technical equipment and publishes long instruction manuals for those wishing to do it. But you end up with an invalid warranty if your repair fails.

  There are many accounts online of people who found it more difficult than they expected - including me. But is it still a threat to businesses like TMT First?

  "There are plenty of people that can repair cars. There's plenty of people that might want to tinker with their cars on the weekend. But there's also people who just want their car fixed," said Mr Whitehouse.

  "There's definitely a place for [DIY repair]... but I don't think most people want to fix things themselves."

