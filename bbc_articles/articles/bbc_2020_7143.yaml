content: |-
  An eyewitness describes the stabbing incident he saw unfolding in a park in Reading.

  Three people have died after they were stabbed in a park in Reading in southern England. Three more were injured.

  Eyewitness Lawrence Wort told the BBC he saw a man stab several people in Forbury Gardens in the town.
