content: |-
  Marius Ciolac's sister spoke to the BBC following the conclusion of his inquest.

  Family of fatally shot man 'will never have answers'

  Marius Ciolac died in hospital after being shot in the lower abdomen, the inquest heard

  The sister of a man who was fatally shot at a police station has said she will spend the rest of her life with "questions and doubts" about what happened. An inquest jury concluded Marius Ciolac was lawfully killed when he was shot outside Derby's Ascot Drive police station on the morning of 7 October 2022. Mr Ciolac had arrived holding a knife in one hand and a bag with a live cat in the other, caused damage to the station and then did not respond to officers' commands before numerous attempts were made to stop him prior to the shooting. Speaking in Romanian to the BBC, his sister Andreea Ciolac said: "Everything that happened... no-one will ever be able to explain to us why."

  This video can not be played To play this video you need to enable JavaScript in your browser. Footage showed the moments before Mr Ciolac was fatally shot

  The inquest heard from witnesses who were at the police station that day, including officers who responded. A separate investigation into Mr Ciolac's death, led by the police watchdog, found the officers' use of force was "appropriate in the circumstances". The conclusion was read out in court on Thursday, with Mr Ciolac's siblings - Andreea and Alin - listening in via video-link. They had been sitting through hours and hours of evidence, hoping they would finally be able to understand what happened to their brother three years after the shooting. But his sister fears the motives behind what Mr Ciolac did that day will forever remain unknown. "[Marius's death] is something we will have to live with for the rest of our lives," she said. "Especially when you don't know why, when you don't know what caused it. "It would've been different if it was an accident or if he was sick. "Everything that happened... no-one will ever be able to explain to us why."

  Mr Ciolac and his three other siblings "didn't have the childhood other people had", Ms Ciolac said. He was born in Cernavoda, Romania, and was the only sibling to be taken by his father when the parents separated. The inquest heard Mr Ciolac was the youngest brother in his family, growing up in a "very poor" household with an "abusive" father. "Dad took him because he was the only one who looked like him," Ms Ciolac said. "He had blue eyes like him. He took him because he said it was 'his prince with blue eyes'." Mr Ciolac's family told the inquest he was then sent to an orphanage, while two of his siblings were sent to another, where they stayed for seven years. But they eventually reunited in their 20s after Mr Ciolac found his siblings on Facebook in 2010, while living in Spain. Ms Ciolac told the BBC Mr Ciolac lived in Romania for a while and was getting financial help from their mum, who was working abroad. "We tried to help him but he didn't want to be helped," she added. "Perhaps in his heart he hated me and Alin because we grew up with mum, and he was taking dad's side. "Mum was sending him money from abroad while he was in Romania. "She sent him money for driving lessons. We tried to help him when he needed us. "He suffered just like all of us have."

  Mr Ciolac loved his two cats, which he would often refer to as "my children"

  During his time in England, Marius was telling the family he was doing well and earning good money. He lived in Osmaston Road in Derby and was working as builder, but also had a passion for tattoos. But above all, Mr Ciolac loved his two cats, which he would often refer to as "my children". "He was normal and calm," his sister said. "Maybe I could've done something differently, we could've talked more, and spent more time together. "But unfortunately we can't do that now." Recalling the day she found out about her brother's death, Ms Ciolac said: "We were left in shock and we're very sorry. She said as far as she was aware, Mr Ciolac never had psychological or psychiatric help. "We don't have answers," Ms Ciolac said. "We've watched the video and it's obvious [what happened on that day outside the police station]. "We wanted to find out what he had against the police. We know that a week [prior to the shooting] he had an argument with a guy, but we didn't know much. "A girl who went to get a tattoo done by him said he had a 'surviving kit'. "We heard about a note he had on him, talking about corruption, police, institutions. I don't know what was going on in his head, but it wasn't anything good."

  Ms Ciolac said she made an effort to set up the repatriation of Mr Ciolac's body to Romania, but could not attend the funeral as she was pregnant with her third child at the time. "He's buried where dad is buried," she said. "We took him there because he's now closer to home. "Mum is the most affected by it - he was her child. She doesn't know what was going on in his head. "Now [speaking as a mother myself], I think what mum went through when she lost a child is the worst possible thing. "We've been told clearly that police did what they were supposed to do. We need to make peace with it now."

