title: 'Joe Root Test record: England batter ''felt different'' long before record-breaking
  century - Steven Finn column - BBC Sport'
date: '2024-10-09'
section: England
url: http://www.bbc.co.uk/sport/cricket/articles/cj04dle3jjeo
content: |-
  Joe Root "felt different" from the first time I bowled to him in the nets. It is no surprise he has broken Sir Alastair Cook's record, writes Steven Finn.

  It has been a matter of 'when' not 'if' Joe Root would beat Sir Alastair Cook's England Test run-scoring record. This air of inevitability has been looming for the past 10 years and finally, with a century in the first Test against Pakistan in Multan, he cruised past with plenty left in the tank. I first bowled properly at Joe Root at the old stadium in Ahmedabad in 2012, before the massive Narendra Modi Stadium was built. He was a 21-year-old on his first England tour and I had been in the England side for more than two years. This was the famous series when we beat India 2-1 - the last time they lost at home. I had torn my quad on the first day of a warm-up game in Mumbai and was making my way back to fitness, building up my workload in the nets. The recovery was going well. I was just about up to full pace and decided to pick a ball that would reverse swing as a confidence booster, to take a few wickets and get the bounce in my run-up going. I always felt as though I attacked the crease and committed to the motion of bowling much better when the ball was reversing. I would predominantly swing the ball away from right-handers when the ball was reverse-swinging, to drag them and their head across their crease and to threaten the outside edge, then bowl an effort-ball inswinger when the batter was least expecting it. At the time I was capable of bowling upwards of 90mph and could rush some of the best players in the world. I was dragging Root across the crease, moving his head outside off stump and then tried my first inswinger. He played it with perfect balance, eyes level, under his nose to mid-on as though he had telepathically read what I was trying to do. For such a young player, he just felt different.

