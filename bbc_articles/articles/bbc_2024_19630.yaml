title: 'Diamond League: Jakob Ingebrigtsen beats Olympic champion Cole Hocker, Matthew
  Hudson-Smith & Dina Asher-Smith win - BBC Sport'
date: '2024-08-22'
section: Athletics
url: http://www.bbc.co.uk/sport/athletics/articles/c4gv5e881e5o
content: |-
  Jakob Ingebrigtsen blows away 1500m Olympic champion Cole Hocker with a dominant performance at the Diamond League in Lausanne.

  This video can not be played To play this video you need to enable JavaScript in your browser.

  Jakob Ingebrigtsen blew away 1500m men's Olympic champion Cole Hocker with a dominant performance at the Diamond League meeting in Lausanne. The 23-year-old Norwegian had been the heavy favourite to win gold at Paris 2024, but misjudged the race which allowed Hocker of the United States to claim top spot on the podium. Ingebrigtsen ultimately ended that race in fourth as Great Britain's Josh Kerr and American Yared Nuguse also passed him in the closing stages of the race. There were few signs of a hangover from Ingebrigtsen at Stade Olympique de la Pontaise as he powered to an emphatic victory in three minutes 27.83 seconds. Hocker finished second in 3:29.85 while fellow American Hobbs Kessler came third. "It's been almost two weeks since Paris so there was plenty of time to recover," Ingebrigtsen said. "For me a lot of it has been mental including going home, taking some easy days and then getting back to work. "Tonight's race gave me good answers and I'm looking forward to building on this for the rest of the season."

