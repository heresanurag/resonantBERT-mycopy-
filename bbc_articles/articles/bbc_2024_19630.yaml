  Kenya's Emmanuel Wanyonyi went close to breaking David Rudisha's men's 800m world record at the meeting in Switzerland. Wanyonyi repeated the blistering form that earned him gold at the Olympics as he clocked one minute 41.11 seconds - just 0.20secs off the record set by Rudisha at London 2012. It was the joint second-fastest time ever run, alongside Denmark's Wilson Kipketer. Botswana's Letsile Tebogo ran an impressive 19.64 seconds to win the men's 200m. The 21-year-old, whose 200m triumph in Paris was the first ever gold for his country, had come to Lausanne on the back of eight days of no training - having made a rapturous return to Gaborone. The biggest shock of the evening was in the men's 110m hurdles as Olympic champion and three-time world gold winner Grant Holloway was beaten by Jamaica's Rasheed Broadbell, who won in 13.10 seconds. Dutchwoman Femke Bol won the women's 400m hurdles in 52.55 seconds, having won bronze in Paris. Sunday's Diamond League meeting in Silesia, Poland will be shown live on BBC Two and via the BBC iPlayer from 15:00 BST.

