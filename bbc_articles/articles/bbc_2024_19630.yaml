  George Mills finished last in the men's 1500m - nine seconds behind Ingebrigtsen - but there were some positive results for other British athletes in Lausanne. Matthew Hudson-Smith won the men's 400m with a time of 43.96 seconds. He was set to face-off against Olympic champion Quincy Hall but the American decided to withdraw. Hall pipped Hudson-Smith to gold in the 400m at the Games in Paris by four-hundredths of a second. Hudson-Smith acknowledged his thoughts have already turned to the next Olympics in Los Angeles in 2028. He said: "My goal is to win the Olympic gold and to be mentioned alongside Michael Johnson and Jeremy Wariner. It's all about consistency, winning and never giving up. "I want to consistently be one of the best ever and run consistently under 44 seconds, and maybe breaking the 43-second barrier." Dina Asher-Smith won the women's 100m with a time of 10.88 seconds while fellow Briton Daryll Neita finished seventh. "After the Olympics I took some time to refocus and now I'm just enjoying running, feeling fit and injury free," Asher-Smith said. Asher-Smith returned to the track later in the evening to win the women's 4x100m relay alongside Bianca Williams, Desiree Henry and Amy Hunt. The British quartet finished ahead of the Swiss team in a time of 42.03 seconds. Elsewhere, Olympic 1500m bronze medal winner Georgia Bell finished second in the women's 800m, as Kenya's Mary Moraa won in one minute 57.91 seconds. Her British team-mate Jemma Reekie, who missed out on a place in the 800m final in Paris, came third.

