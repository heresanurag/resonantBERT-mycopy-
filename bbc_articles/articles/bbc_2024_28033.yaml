title: 'Watch: FBI video shows moment man sets US ballot box on fire - BBC News'
date: '2024-11-15'
section: General
url: http://www.bbc.co.uk/news/videos/ckg0k0vv0gvo
content: |-
  The suspect used an “improvised incendiary device” to start the fire in Portland, Oregon, ahead of the US election.

  New footage released by the FBI from 28 October reveals the moment a man set a ballot box on fire with an “improvised incendiary device” in Portland, Oregon.

  The FBI is investigating three fires at ballot boxes that occurred ahead of the US election - two in Vancouver, Washington, and one in Portland, Oregon.

  A reward of up to $25,000 (£19,677) is being offered for information that leads to the identification, arrest, and conviction of those responsible.
