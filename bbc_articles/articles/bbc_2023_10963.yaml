title: 'South Korea: Deadly landslides and floods wreak havoc in South Korea - BBC
  News'
date: '2023-07-15'
section: General
url: http://www.bbc.co.uk/news/world-asia-66209886
content: |-
  Thousands have evacuated their homes amid heavy rain and floods in the country.

  At least 35 people have been killed by deadly flooding in the country, as torrential rainfall continues to batter central regions for a third day.

  The weather has caused rockfalls, power cuts, damage to infrastructure and a major dam in the central North Chungcheong province to overflow.

  Thousands of people have been affected by evacuation orders issued by various local governments.
