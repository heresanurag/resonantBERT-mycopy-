title: 'Alesha MacPhail death: Boy, 16, arrested on suspicion of murder - BBC News'
date: '2018-07-05'
section: Glasgow & West Scotland
url: http://www.bbc.co.uk/news/uk-scotland-glasgow-west-44714577
content: |-
  The teenager was arrested on suspicion of murdering six-year-old Alesha MacPhail on the Isle of Bute.

  A 16-year-old boy has been arrested on suspicion of the murder of schoolgirl Alesha MacPhail.

  The six-year-old's body was found on the Isle of Bute on Monday, just hours after she was reported missing.

  Detectives working on the case said they were still seeking information from the public, especially anyone who was in the Ardbeg Road area where Alesha's body was found.

  The lead detective described the arrest as a "major development".

  Additional police officers were sent to the Isle of Bute to assist with the investigation

  Det Supt Stuart Houston said: "The response to our earlier public appeals has been significant.

  "However... I am still appealing for anyone who was in the Ardbeg Road area of Bute on Sunday night or in the early hours of Monday and who may have information about Alesha's death to contact us.

  "Anyone who has CCTV at their home or business, or indeed any motorists with dashcam footage which might help with our investigation are also urged to get in touch."

  Alesha, who was from Airdrie in North Lanarkshire, had been staying at her grandmother's house on Bute when she was reported missing at about 06:25 on Monday.

  She was a few days into a three-week summer break on the island in the Firth of Clyde, west of Glasgow.

