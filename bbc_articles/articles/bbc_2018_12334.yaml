  Patti tells me that she is sometimes struck by the level of ignorance about disability among officers, but that this simply mirrors the lack of awareness in society as a whole.

  "I have been asked questions like 'You mean they are not all the same?' or 'So they are not out to hurt us?'" she says of officers she has trained.

  Officers often apologise to her when they hear her story and display some degree of shame about what happened, she says.

  But the Frederick County Sheriff's Office, whose deputies were involved in Ethan's death, has not engaged with Patti. It did agree a financial settlement with her but never apologised or admitted any wrongdoing.

  Oklahoma City Police may defend the death of Magdiel Sanchez on his front lawn, but it is clear that the department has tried to make changes since the incident - offering more training to officers on how to approach disabled people.

  The force deploys these specially trained officers to incidents where their skills will be useful.

  One is Sgt Corey Nooner - the same officer who, 15 years ago, says he was forced to shoot and kill a woman with schizophrenia. That experience pushed him to try to understand mental illness better and he underwent a considerable amount of additional training.

  I go out on patrol with him as he is dispatched to a home in an affluent neighbourhood in Oklahoma City.

  A man has called to say that his wife, who has recently been discharged from a medical facility, is having a manic episode and experiencing paranoia and delusions.

  At their home, Nooner patiently listens as the woman talks, visibly distressed, about how she is being watched by government agencies.

  Ultimately, though, after she refuses to accompany him to see a psychiatrist and when she tries to dive into her bedroom, he restrains and handcuffs her.

  Later, he tells me he had feared she might try to arm herself and that his basic police instincts kicked in.

  For many, the nub of the problem is the way police are taught to interact from the very beginning - with so much emphasis on firearms training and personal protection, and relatively little on de-escalating confrontations.

  As things stand, the deaths and injuries of people with disabilities at the hands of the police have left some of the people Candace Coleman works with in Chicago's South Side wondering who might be next, she says. Some of them have made pacts never to call the police under any circumstances, she adds, so worried are they that harm could come to them.

  Coleman says they've also got together in groups to discuss what they can do to protect themselves in any interactions with the police.

  "Extra disability training for police is one thing but is not enough," she says. "We need a cultural shift across the board."

  "The way in which they approach situations needs to change. It shouldn't always be that the immediate reaction is to pull out your gun or your Taser or to yell or scream," she adds.

  Until that happens, some of the most vulnerable people in US society will be left to work things out for themselves.

