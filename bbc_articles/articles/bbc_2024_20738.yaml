id: bbc_2024_20738
title: Judge says Belfast protest violence had 'racist elements' - BBC News
date: '2024-08-05'
section: Northern Ireland
url: http://www.bbc.co.uk/news/articles/cd1dddglpy5o
content: |-
  Four men charged after an anti-immigration protest in Belfast ended in violence are refused bail.

  Police came under attack during sporadic rioting in Belfast on Saturday

  A judge has said violence in Belfast had “racist elements” as he denied bail to four men who were charged in relation to the disorder. Several businesses were attacked and some set on fire after an anti-immigrant demonstration moved from Belfast City Hall to surrounding streets. Three police officers were injured and four members of the public reported that they were assaulted. The four men, aged 53, 46, 38 and 34, have been remanded into custody.

  Rioters set a bin on fire in south Belfast during the disorder

  Appearing at Belfast Magistrates Court was 53-year-old Michael John Coulter from York Park in Belfast. He was charged with three counts of assault on police, resisting police and disorderly behaviour at Shaftesbury Square. A police officer told the court Mr Coulter was part of a group of males who were shouting abuse at police and said the accused is alleged to have hit officers with his crutch. Two children were with him at the time. A defence lawyer said Mr Coulter denies being a participant in any disorder. The lawyer explained their client was drinking in a pub nearby and then went to get a kebab with the two children, who were related to him. The court heard his defence is that he was passing by the area and was put to the ground by police.

  Gary Creighton appeared in the dock charged with possession of an offensive weapon with intent to commit an indictable offence. The 38-year-old, from Inishowen Drive in Belfast, was also charged with possession of fireworks without a licence and riotous and disorderly behaviour at Wellington Place in Belfast. The court heard from a police officer who said Mr Creighton was observed on CCTV throwing fireworks in and around police and members of the public. A defence lawyer said Mr Creighton had admitted that it was him on the footage and had shown remorse.

  Police in riot gear protected the Belfast Islamic Centre on University Road

  Simeon Eric McCullough, who is 46 and from Schomberg Drive in Belfast, was charged with disorderly behaviour and resisting police. A police officer told the court that Mr McCullough was witnessed verbally attacking police and taking part in "civil unrest" in the Sandy Row area of the city, having been warned several times to move on. A defence solicitor told the court that their client had been out walking his dog and had approached officers to raise concerns that his accommodation was in the area.

  Bernard Lavery, who is 34 and from Farnham Street in Belfast, is charged with taking part in an un-notified public procession. The court heard from a police officer who said Mr Lavery was observed at the front of the protest, wearing dark clothing and waving an Irish flag. The officer said he played a "significant" and "pivotal" role in the protests. They also said he was observed pointing and gesturing to hotels in the area.

  Defence council denied that Mr Lavery was a leader and said he was simply taking part in the protest and was responding to a flyer he received with a union flag on one side and an Irish tricolour on the other. He also said Mr Lavery tried to quell disorder. All four men applied for bail but the judge refused, saying that the scenes witnessed on Saturday had "racist elements" and were "disgraceful". He said the court cannot allow the behaviour to be repeated and that the the risk of reoffending in the coming days was too high. The judge added that anyone who engaged in the behaviour seen "would have great difficulty in getting bail". He remanded all four accused into custody to reappear next month.
