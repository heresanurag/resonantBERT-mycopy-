title: Boots recalls paracetamol over labelling error - BBC News
date: '2025-03-05'
section: Health
url: http://www.bbc.co.uk/news/articles/cy7xn5lyxemo
content: |-
  Packaging inside the box incorrectly states the pills are a different painkiller, aspirin.

  The High Street pharmacy chain Boots is asking customers to return packs of 500-milligram paracetamol tablets because a labelling error incorrectly states they are a different painkiller, aspirin. More than 110,000 packs, with the batch number 241005 and expiry date "12/2029" on the bottom, are affected. Boots and the supplier, Aspar Pharmaceuticals Limited, have begun a full investigation.

  The outer cardboard packaging is correctly labelled: "Paracetamol 500mg Tablets" but the inner foil blister pack of pills instead reads: "Aspirin 300mg Dispersable Tablets". The affected packs should not be used or kept, even if the error is known, as this could lead to an incorrect dose. And anyone who has bought this product for someone else should tell them as soon as possible.

  Dr Stephanie Millican, from the Medicines and Healthcare Products Regulatory Agency (MHRA), said: "Patient safety is always our priority. "It is vitally important that you check the packaging of your Boots Paracetamol 500mg Tablets 16s - and if the batch number is 241005, you should stop using the product and return it to a Boots store for a full refund. "If you are unsure which pack you have purchased or have taken Boots Paracetamol 500mg Tablets and experienced any side effects, seek advice from a healthcare professional. "Please report any suspected adverse reactions via the MHRA's Yellow Card scheme. "If you have any questions or require further advice, please seek advice from your pharmacist or other relevant healthcare professional."

  Paracetamol is an effective painkiller for mild or moderate pain. It may be better than aspirin for headaches, toothache, sprains and stomach ache. Aspirin may be better than paracetamol for period pain or migraines, says the NHS, external. Aspirin stops your body making compounds called prostaglandins and this lowers the pain and reduces swelling and high temperature. Ibuprofen - another type of painkiller, known as a non-steroidal anti-inflammatory drug or NSAID - works in a similar way to aspirin.
