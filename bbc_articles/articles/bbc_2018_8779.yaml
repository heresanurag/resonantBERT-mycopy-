id: bbc_2018_8779
title: MP Madeleine Moon in tears in terminal illness speech - BBC News
date: '2018-07-19'
section: General
url: http://www.bbc.co.uk/news/uk-wales-politics-44876123
content: |-
  Madeleine Moon gave an emotional speech in the House of Commons on Wednesday.

  Labour MP Madeleine Moon says that patients who are terminally ill should not spend their last months worrying about how they can pay for food and fuel bills.

  Madeleine Moon's husband Steve died from motor neurone disease, and she has called for a law on accessing benefits to be changed.

  She broke into tears in the House of Commons, saying she could "attest to the mental and emotional chaos of dealing with a terminal condition".
