title: Video shows N Korea teens sentenced for watching K-dramas - BBC News
date: '2024-03-14'
section: General
url: http://www.bbc.co.uk/news/world-asia-68018578
content: |-
  The two teens were publicly reprimanded for watching South Korean TV shows, which is forbidden in the North.

  Rare footage obtained by BBC Korean shows North Korea publicly sentencing two teenage boys to 12 years of hard labour for watching K-dramas.

  The footage, which appears to have been filmed in 2022, shows two 16-year-old boys handcuffed in front of hundreds of students at an outdoor stadium.

  It also shows uniformed officers reprimanding the boys for not "deeply reflecting on their mistakes".

  Access to such footage is rare as North Korea strictly forbids the leakage of internal materials out of the country.

  This video, provided to the BBC by the South and North Development (Sand), a research institute that works with defectors from the North, also hints at authorities coming down harder on such offences.

