content: |-
  Bill Bailey, HRVY, Maisie Smith and Jamie Laing will compete for the glitterball trophy on Saturday.

  Bailey has become the oldest ever winner, while Mabuse is the first pro to win in two consecutive years

  Strictly Come Dancing 2020 concluded on Saturday after a shorter but largely successful series amid the coronavirus pandemic.

  Bill Bailey fended off competition from HRVY, Maisie Smith and Jamie Laing to be crowned this year's winner with his partner Oti Mabuse.

  Aged 55, he has taken the title of the oldest Strictly winner from Joe McFadden, who won in 2017 aged 42. Mabuse also becomes the first professional to triumph two years in a row.

  The final featured music from Robbie Williams and a group performance from the show's professional dancers.

  It has been an eventful and unusual series. Here are seven of the most memorable moments:

  Anton had to be dragged kicking and screaming on to the judging panel

  "After much persuasion, Anton has reluctantly agreed to step in," joked Claudia Winkleman when Motsi Mabuse had to take two weeks off from judging to self-isolate.

  It's no secret that Anton is keen to join the Strictly panel after clocking up more than 15 years as one of the show's pro dancers, but so far he hasn't made the leap.

  That finally changed this year and many viewers were surprised that he was actually rather good, if a little generous with his scores.

