id: bbc_2024_27018
title: Reform UK legal action threat over Manchester Airport incident - BBC News
date: '2024-10-07'
section: Manchester
url: http://www.bbc.co.uk/news/articles/cy94yz3p7xpo
content: |-
  The party also accuses Greater Manchester Police of purposely withholding full footage.

  A mobile phone video clip of an officer kicking Fahir Amaaz went viral on social media

  Reform UK has said it would take legal action against two men following a disturbance at Manchester Airport if they were not charged by the Crown Prosecution Service (CPS). Footage of the incident shared widely online appeared to show a Greater Manchester Police (GMP) officer kicking and stamping on the head of a man as he was being restrained. Further footage, obtained by the Manchester Evening News, emerged days later which allegedly showed the immediate lead-up to the incident on 23 July. The CPS said it was considering material and providing advice in relation to a series of alleged criminal offences at the airport.

  At a party press conference earlier, Reform leader Nigel Farage accused GMP and the CPS of perpetuating "two-tier policing" by not announcing charges following the incident. The Home Office said there was "no such thing as two-tier policing" and it was "right the CPS and the IOPC were able to carry out their investigations independently". The average time between a referral from the police and the CPS reaching a charging decision was 46 days, according to the latest available data. Farage also accused GMP of making a "catastrophic" decision on withholding an earlier video which he claimed gave the public a false impression of what happened. But GMP said it had not released any footage of the incident, adding: "We have avoided providing ongoing commentary on the case, including releasing footage, to ensure that justice can be served without the risk of prejudicing proceedings. "We continue to support the officers involved and are committed to getting them justice." The force said a "comprehensive file of evidence" was sent to the CPS mid-August, and it awaited a "charging decision". Aamer Anwar, a solicitor representing Fahir Amaaz and his brother Muhammed Amaad, said they were awaiting the outcome of the CPS investigation, adding he "doubted very much" the CPS would be "pressured... by Mr Farage and co".

  Nigel Farage was speaking during a press conference on law and order in Britain

  Richard Tice, Reform MP for Boston and Skegness, and Farage said by not releasing footage, police had allowed misinformation to "permeate through the country". Police forces rarely release footage unless there is a "policing purpose", often to identify suspects. In this case the suspects had been arrested. Four men arrested on suspicion of affray and assault remain on bail. GMP conducted its own investigations into the officers before handing over the matter to the IOPC. One officer is under investigation in connection with the arrests of the brothers and he has also been suspended by the force. A second officer has been advised they were also under investigation shortly after two other men were arrested. Tice told reporters 11 weeks after the incident those involved had not been charged, and compared that to the "swift justice shown" to those involved in the summer riots, adding they were "being treated differently". Tice said a letter had been sent to Home Secretary Yvette Cooper, signed by all of the party's five MPs addressing their "genuine concerns". A Home Office spokesman said: "We expect high standards of conduct from police officers and they must equally be able to carry out their jobs without disruption. "It is right that the CPS and the IOPC are both able to carry out their investigations independently, without fear or favour." The CPS added: "We are working with Greater Manchester Police and the Independent Office for Police Conduct while their inquiries continue." Tice said the party had taken initial advice and had a legal team on standby to progress with their own private prosecution when required. Anyone can begin a private prosecution, however in practice they are often taken over by the CPS, and can be discontinued.
