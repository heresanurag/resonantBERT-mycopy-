content: |-
  An independent report into deaths of patients at the Gosport War Memorial Hospital is been released.

  Communications with some families was 'unacceptable', NMC says

  The Nursing and Midwifery Council (NMC) has responded to the Gosport Independent Panel Report. Director of Fitness to Practise, Matthew McClelland, said: "I want to pay tribute to the families who have fought for 20 years to understand what happened to their loved ones at Gosport. "It’s clear that we and others badly let them down and I am very sorry for the role we have played in that. "We will now carry out a careful review of the report to see what action we may need to take and what lessons we can learn. "What we do know is that our communications with some of the families was unacceptable and for some of those who lost loved ones, we added to their distress. "While the way we regulate nurses and midwives has changed significantly and improved in recent years, this report is a stark reminder that patients and their families must always be at the heart of what we do."
