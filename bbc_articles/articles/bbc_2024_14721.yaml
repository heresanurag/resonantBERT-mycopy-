content: |-
  Sir Keir Starmer will have his first face-to-face meeting with US President Joe Biden in the White House today.

  Starmer and Biden to meet for first time on US visit

  Prime Minister Sir Keir Starmer talks to journalists on a plane travelling to a Nato summit in Washington DC

  Sir Keir Starmer will have his first face-to-face meeting with US President Joe Biden in the White House later. The prime minister travelled to the US overnight for a Nato summit, on the 75th anniversary of the North Atlantic Treaty Organisation. Speaking on the plane, Sir Keir told reporters he hopes the bilateral in Washington DC will be a chance to talk about Nato and the so-called UK-US special relationship. “This is obviously a very special relationship we have between the UK and the US,” he said, adding there was “a special aspect when it comes to defence and security for obvious reasons, including our commitment to Nato”. He also told journalists that the UK had a "cast-iron commitment" to spend 2.5% of national income on defence but avoided putting a deadline on when that would be met. A review of defence capabilities, to be ordered by the new government, will set out a roadmap towards reaching the target.

  This video can not be played To play this video you need to enable JavaScript in your browser. When will the UK commit to spend 2.5% on defence?

  Defence Secretary John Healey said the review would help the government "get to grips with the threats we face, the capabilities we need for the future, the state of our armed forces". Pressed on when the target would be met, he said the government had to have "the chance to open the books and get to grips with the terrible state of public finances". He said the defence review could not be done in weeks but would be "done properly" and "done at pace". The Conservatives, who during the election pledged to meet 2.5% by 2030, have said failure to set out a timetable would "cast serious doubt" on the government's commitment to security. Alongside Mr Healey, the prime minister has been joined on his trip by Foreign Secretary David Lammy and minister for European relations Nick Thomas-Symonds. After arriving in Washington, Sir Keir and Mr Thomas-Symonds met German Chancellor Olaf Scholz. Sir Keir reaffirmed his support for Ukraine, saying: "There's a change of government but no change of approach." He told BBC Political Editor Chris Mason he discussed with President Zelensky "what further support he needs" and he said he would use the Nato summit "to make sure that support is agreed". The UK prime minister said he also wanted to send "a message to Putin" about the resolve of Nato, that it was "more united than it has ever been" and "absolutely clear-eyed about the threat of Russian aggression". Mr Zelensky thanked the UK for being "with us from the very beginning of the war".
