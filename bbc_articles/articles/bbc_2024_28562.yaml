content: |-
  The comedian and presenter has denied allegations relating to the period from 2006 to 2013.

  Police send Brand file to CPS to consider charges

  At the height of his career, Brand hosted radio shows on the BBC and fronted television programmes on Channel 4

  Detectives investigating Russell Brand over allegations of historical sex offences have sent prosecutors a file of evidence so they can consider bringing charges. Brand has been interviewed three times by police since an investigation by the Sunday Times, external, the Times and Channel 4's Dispatches in September 2023 revealed allegations of rape, sexual assaults and emotional abuse against the comedian and actor. The incidents are said to have occurred between 2006 and 2013, when Brand held several high-profile jobs, including at Channel 4 and BBC Radio 2. He has previously denied the allegations, calling them "very, very hurtful".

  The Metropolitan Police said in a statement on Saturday it had received a number of reports of sexual offences from women following the original Channel 4 and Sunday Times investigation. As part of its investigation, it said, "a man in his 40s had been interviewed by officers under caution on three separate occasions". "A file of evidence has now been passed to the Crown Prosecution Service (CPS) for their consideration," the force added. The CPS confirmed it has been handed a file by police, so it can consider charges in relation to allegations of historical sex offences by a 49-year-old man. The allegations against Brand come from a seven-year period when he was at the height of his fame - hosting national television and radio programmes, and starring in Hollywood films. Other claims made as part of the investigation relate to Brand's allegedly controlling, abusive and predatory behaviour. The BBC has previously said it received five complaints about the comedian's behaviour while he hosted radio shows at the corporation. Earlier this year Channel 4 apologised for missing a complaint made against Brand in 2009. Production company Banijay UK also apologised, saying informal concerns raised about the presenter while he hosted Big Brother spin-off programmes were "not properly escalated or adequately addressed". Detective Superintendent Andy Furphy, whose team is leading the investigation, said: "We have a team of dedicated officers providing specialist support to the women who have come forward." "We are committed to investigating sexual offences, no matter how long ago they are alleged to have taken place," he added. In an online interview earlier this year, the comedian said it was "very, very painful" to be accused of "what I consider to be the most appalling crimes".
