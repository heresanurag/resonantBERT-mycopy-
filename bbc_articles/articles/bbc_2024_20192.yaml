title: Dogs seized over man's death in Rubery were XL bullies - BBC News
date: '2024-08-28'
section: England
url: http://www.bbc.co.uk/news/articles/c05j0z7yv8lo
content: |-
  Two of the dogs seized after Nicholas Glass's death are the banned breed, police confirm.

  Nicholas Glass was kind-hearted, caring and compassionate, his family said

  Two dogs seized when a man died of bite injuries in a back garden were proscribed breed XL bullies, police have confirmed. On Tuesday, police named the man as Nicholas Glass, 32. He was found dead near a relative’s property on Hereford Close in Rubery, West Midlands, during the early hours of 21 August. It is thought up to four dogs were present at about the time he was attacked. Two animals were seized by police shortly afterwards, with two more found two days later. "Tests have now concluded that two of the dogs were XL Bullies, which are a banned breed. Neither have a certificate of exemption," West Midlands Police said.

  All four dogs remained in secure kennels as inquiries continued, police added. Mr Glass's family paid tribute to him saying they had lost a loving son, brother and uncle who was adored by all of his family and friends. “He was kind-hearted, caring and compassionate and he’d do anything for anyone. We are devastated at his loss and we all miss him desperately," they said. It is thought Mr Glass had been looking after a relative's dogs when he was attacked. One of the dogs was found with an injury to its head. Police said the dogs had been living at the property near to where Mr Glass was found although he had been living elsewhere.

  Since 31 December 2023, it has been against the law to sell, give away, abandon or breed puppies from an XL bully. Since 1 February 2024, it has been a criminal offence to own an XL bully without an exemption certificate.
