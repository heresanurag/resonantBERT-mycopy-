title: How US law professors teach impeachment - BBC News
date: '2019-12-12'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-50665856
content: |-
  We visit a constitution law class a few miles from where the US president faces an impeachment inquiry.

  These students at Georgetown University Law Center in Washington DC are taking a constitution law class, a few miles from the impeachment inquiry of President Donald Trump.

  Professor Susan Bloch takes them through the key legal questions.
