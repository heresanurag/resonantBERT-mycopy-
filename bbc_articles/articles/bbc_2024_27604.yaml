id: bbc_2024_27604
title: 'Westminster: Man arrested over knife incident outside Parliament - BBC News'
date: '2024-11-12'
section: London
url: http://www.bbc.co.uk/news/articles/cn5w15q0velo
content: |-
  A man wearing a red hooded top was seen handcuffed and surrounded by police outside Parliament.

  A 34-year-old man was arrested and taken to a police station

  A man has been arrested after reports that a person was seen carrying several knives outside the Houses of Parliament. Officers were called to the scene in central London at 14:00 GMT on Tuesday where they apprehended the suspect, the Met Police said. The 34-year-old was arrested on suspicion of possession of an offensive weapon in a public place and has been taken to a police station. No injuries have been reported, the force added.

  Police were called to reports of a man carrying several knives

  Police cars were seen parked in front of Carriage Gates - one of the most prominent entrances to the Palace of Westminster - following the incident on Tuesday afternoon. A man wearing a red hooded top was seen handcuffed and surrounded by police. The area was cordoned off during the incident and the entrance was closed.

  The Met Police said there were no reports of injuries

  A spokesperson for UK Parliament: "We are aware of an incident outside Carriage Gates. Parliamentary Security and the Metropolitan Police are present and managing the situation."
