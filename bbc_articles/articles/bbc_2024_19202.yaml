title: 'Aldershot unrest: Seven protesters sought by police - BBC News'
date: '2024-08-02'
section: Hampshire & Isle of Wight
url: http://www.bbc.co.uk/news/articles/cmm2mnq9jq8o
content: |-
  Police in Hampshire are looking for people involved in disruption on Wednesday evening.

  Seven sought by police after Aldershot asylum hotel protest

  Seven people are being sought by police after objects were hurled outside a hotel housing asylum seekers during a protest in Aldershot. A minority of the 200 who protested outside the Potters International Hotel became involved in the disruption on Wednesday evening, Hampshire and Isle of Wight Constabulary said. The force has released images of seven people it would like to identify. The protest follows multiple pockets of unrest across the country after three girls were killed in the Merseyside town of Southport on Monday.

  Bebe King, six, Elsie Dot Stancombe, seven, and nine-year-old Alice Dasilva Aguiar were fatally stabbed at a Taylor Swift-themed dance class. Axel Muganwa Rudakubana, 17, appeared in court charged with three counts of murder and 10 counts of attempted murder, after eight other children and two adults were seriously injured. In Aldershot, a demonstration descended into a "mob-type" protest, according to Hampshire police and crime commissioner (PCC) Donna Jones. One police officer suffered a minor injury.

  Police remained outside the hotel on Thursday morning

  Appealing for witnesses, a Hampshire police spokesman said: "Investigations are under way today to take action against those who sparked disruption in Aldershot last night." He said "the majority of attendees gathered in a peaceful manner" but a minority "got involved in criminal activity, throwing objects and subjecting people to racial abuse". Police have not directly linked the disruption in Aldershot to the Southport attack. Alex Baker, Labour MP for Aldershot, said the situation had been "exacerbated" by people from outside the community. "There is no justification for disorderly behaviour and these scenes do not represent Aldershot and Farnborough," she posted on X. "We all support our shared right to peacefully protest, but we will not stand for people coming to our towns determined to stir up trouble and divide our community." Religious leaders have also called for calm and said they "deplore" the way a minority of people have behaved.

  There has been unrest across the country since the Southport attack, including in Hartlepool

  Imam Monawar Hussein, of the Oxfordshire Faith, Civic and Community Leaders Group, urged people to be cautious when promoting information online. He said: "When you see anything on social media please verify it before you go and re-share it." He also encouraged people to support police and allow them to do their work. "It's been terrible to see the images of the violence done against our police force." he added. Anyone with information on the seven people pictured by Hampshire Police have been urged to contact the force online or call 101, quoting the reference number 44240326041.

  Separately, seven men have been charged after disorder broke out in Hartlepool on Wednesday, Cleveland Police said. Officers were attacked with missiles, glass bottles and eggs in Hartlepool's Murray Street area. An 11-year-old boy was also arrested on suspicion of arson after a police car was set alight in Hartlepool. More than 100 people were arrested in central London on Wednesday as officers clashed with protesters on Whitehall during a demonstration. There was also unrest in Southport on Tuesday, which came hours after a peaceful vigil was attended by thousands to remember the girls who died. Earlier, Prime Minister Sir Keir Starmer said "action will be taken" following the "violent disorder" at a meeting with police chiefs at Downing Street. Speaking in a televised speech afterwards, he laid out plans for forces across the country to increase their co-operation to tackle such incidents.

