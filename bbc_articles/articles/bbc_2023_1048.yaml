title: Starmer tells Sunak to sack Nadhim Zahawi as Tory chairman - BBC News
date: '2023-01-23'
section: General
url: http://www.bbc.co.uk/news/uk-politics-64373335
content: |-
  The Labour leader says Nadhim Zahawi is not going to resign and the PM should sack him.

  Sir Keir Starmer says Nadhim Zahawi is not going to resign and the PM should sack him.

  The Labour leader said "everybody knows it is wrong" that he could not discuss his tax affairs with a body he is running, and that Rishi Sunak "should show some leadership".
