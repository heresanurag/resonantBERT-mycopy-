content: |-
  Derek Richards was later convicted of causing death by driving without due care and attention.

  This was the scene as police arrested Derek Richards after Rhys Dobson died having been hit by his car.

  Within five hours officers found a damaged black Citroen C3 in the centre of Blaenavon, in Torfaen.

  As officers gathered evidence, 38-year-old Mr Richards told officers: “That's my car, I've got nothing to hide.”

  The lorry driver told police he thought he had hit a "wardrobe or a freezer" before driving home.

  He was later convicted of causing death by driving without due care and attention.
