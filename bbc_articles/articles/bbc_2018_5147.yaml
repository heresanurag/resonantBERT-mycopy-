  According to the Met Office, snow in spring is not as unusual it might seem: the average between 1981 and 2010 was for 2.3 days of snowfall in April - more than in November.

  A man takes his dogs for a spring walk through the snow in Allenheads, Northumberland

  Easter Monday sporting fixtures were hit by cancellations, as waterlogged pitches caused the postponement of Nottingham Forest's Championship clash against Barnsley, along with several lower-league matches.

  Horse racing meetings at Market Rasen, Fakenham, Plumpton, Chepstow and Redcar were also abandoned due to heavy rain.

  The weather was also blamed for a sharp fall in visits to the High Street.

  A waterlogged Wimbledon Common in south London didn't stop dog walkers from enjoying an Easter Monday stroll
