  In an interview with the Associated Press, vice-president of Breaking for Gold USA Zack Slusser argued the WDSF didn't have "any real merit" with the breaking community, and that it had failed to organise events that would "contribute to creating an accurate world ranking". Breakers were only performing at WDSF organised events to secure points to qualify for the Olympics, he claimed, adding that they had "no incentive" or "desire" to continue participating in WDSF events post-Paris.
