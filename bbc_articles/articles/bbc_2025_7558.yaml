id: bbc_2025_7558
title: Ecuador earthquake injures 20 and causes widespread damage - BBC News
date: '2025-04-26'
section: Latin America
url: http://www.bbc.co.uk/news/articles/czjnwzdmdywo
content: |-
  The quake damaged homes and public buildings, and caused widespread power cuts.

  A 6.3-magnitude earthquake has injured at least 20 people and seriously damaged multiple buildings in the Ecuadorian port city of Esmeraldas. According to the European Mediterranean Seismological Centre, the quake struck at a depth of 30km (18.64 miles) near the Ecuadorian coast at 6:44 local time on Friday (9:44 GMT). The quake damaged homes and public buildings, caused widespread power cuts, and led to some oil infrastructure being temporarily shut down. President Daniel Noboa said he had deployed all government ministers to the province to coordinate the installation of shelters, deliver humanitarian aid kits and "assist with everything our people need".

  "The government is with you, and that's how we will move forward," he wrote in a post on social media. Andres Mafare, 36, heard a loud crack while he was walking to the port, followed by a strong earthquake. He told the AFP news agency he immediately ran home to try to find his wife and sons. "I ran like crazy, and when I got here saw that my house had been destroyed," he said. About 80% of homes were left without power, according to authorities. Ecuador's national oil company, Petroecuador, said it briefly suspended operations at its refinery in Esmeraldas.

  In 2023, at least 15 people were killed in a 6.7-magnitude earthquake off Ecuador's coast. In 2016, a devastating 7.8-magnitude earthquake killed more than 700 people, and injured several thousand.
