title: BBC Breakfast presenters meet 'Orangu-cam' - BBC News
date: '2017-01-19'
section: General
url: http://www.bbc.co.uk/news/science-environment-38673839
content: |-
  The Breakfast team have been monkeying around with one of the stars of new series 'Spy in the Wild'.

  'Spy in the Wild' uses life-like animatronics to infiltrate the animal world and capture wildlife from a unique perspective.

  BBC Breakfast's Steph and Charlie met one of the stars of the series.
