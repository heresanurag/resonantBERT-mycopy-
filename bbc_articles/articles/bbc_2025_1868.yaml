content: |-
  Four of the men were kidnapped on 7 October 2023, while the two have been held for a decade.

  Six Israeli hostages are now back in Israel after being handed over to the Red Cross in Gaza.

  Avera Mengistu and Tal Shoham were freed by Hamas on Saturday morning, in a highly-choreographed event in Rafah.

  Hours later, in Nuseirat, Eliya Cohen, Omer Shem Tov and Omer Wenkert were handed over amid similar scenes.

  Hisham al-Sayed was released shortly after in Gaza City.

  Mengistu and al-Sayed were seized in 2014 and 2015 respectively, after they crossed into Gaza on their own.

  The others were kidnapped in 7 October 2023, during Hamas' attacks on Israel.

  In exchange for their release, Israel is set to free 602 Palestinian prisoners and detainees, according to the Palestinian prisoners' media office.

