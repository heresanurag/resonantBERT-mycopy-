  Voiceover artist Gayanne says an AI used on ScotRail trains was trained using her voice.

  'Stop using my voice' - New train announcer is my AI clone

  Gayanne Potter claims recordings of her voice were used unknowingly to train an artificial Scottish speaker called Iona

  A woman who believes her voice has been used to create ScotRail's new AI-generated announcement system is calling for it to be removed from trains. ScotRail recently introduced a synthetic Scottish voice to make onboard announcements in place of pre-recorded human announcers. Voiceover artist Gayanne Potter said the artificial announcer - which is marketed as an imaginary character called Iona - was trained by Swedish technology firm ReadSpeaker using her voice. ReadSpeaker told BBC Scotland News it had already addressed Ms Potter's concerns "several times".

  ScotRail said it had no plans to remove "Iona" and the dispute was between the company and the voiceover artist.

