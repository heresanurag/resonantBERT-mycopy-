title: Moment Prime Minister Rishi Sunak calls general election - BBC News
date: '2024-05-23'
section: General
url: http://www.bbc.co.uk/news/uk-politics-69048173
content: |-
  After a day filled with chat and speculation, Mr Sunak confirms an election will take place in July.

  A general election will be held on 4 July Prime Minister Rishi Sunak says.

  The announcement follows a day of speculation on whether a election will be called this afternoon, after two ministers changed travel plans and Chancellor Jeremy Hunt pulled out of a television appearance.

