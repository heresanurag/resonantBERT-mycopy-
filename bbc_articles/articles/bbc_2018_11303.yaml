content: |-
  There is an increase in young people working as officers, through a graduate scheme with a salary of up to £30,000.

  Prisons are seeing an increase in young people working as officers, through an attractive graduate scheme.

  The Unlocked programme offers recruits a salary of up to £30,000 whilst allowing them to continue their studies.
