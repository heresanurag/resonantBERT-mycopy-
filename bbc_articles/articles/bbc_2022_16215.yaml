title: 'World Cup: France fans jubilant as Morocco''s dream ends - BBC News'
date: '2022-12-14'
section: General
url: http://www.bbc.co.uk/news/world-63977885
content: |-
  Celebrations for Les Bleus as Moroccan fans are left in silent despair.

  French football fans were seen celebrating across the country after their 2-0 World Cup semi-final win over Morocco.

  The mood was a lot more sombre among supporters of the North African side.

  France, the reigning champions, will face Argentina in the final on Sunday.
