title: Jesse Eisenberg gets Polish citizenship after directing A Real Pain - BBC News
date: '2025-03-06'
section: Culture
url: http://www.bbc.co.uk/news/articles/c2kg17p2102o
content: |-
  The star wrote and directed a film about two cousins who travel to Poland to honour their grandmother.

  This video can not be played To play this video you need to enable JavaScript in your browser. Watch: 'I am happy to be a European' - Jesse Eisenberg on becoming a Polish citizen

  US actor Jesse Eisenberg has been awarded Polish citizenship by President Andrzej Duda, after telling the story of the Jewish population during World War Two in his Oscar-winning film A Real Pain. Eisenberg wrote, directed and starred in the film, about two American cousins who travel to Poland to honour their grandmother, a Holocaust survivor, who was based on Eisenberg's own great aunt. He told the citizenship ceremony: "While we were filming this movie in Poland, and I was walking the streets and starting to get a little more comfortable in the country, something so obvious occurred to me, which is that my family had lived in this place for far longer than we lived in New York. "And of course, the history ended so tragically."

  Kieran Culkin won an Oscar on Sunday for playing Eisenberg's on-screen cousin in A Real Pain

  He continued: "In addition to that tragedy of history is also the tragedy that my family didn't feel any connection any more to Poland, and that saddened me and confirmed for me that I really wanted to try to reconnect as much as possible. "And I really hope that tonight in this ceremony and this amazing honour is the first step of me, and on behalf of my family, reconnecting to this beautiful country." Eisenberg was inspired to make A Real Pain after the death of his great aunt Doris at the age of 106 in 2019. She grew up in Poland but fled to the US in 1938. Other family members who remained in Poland were killed during the Holocaust. President Duda said: "I am delighted that people from across the ocean acknowledge their heritage, recognise that their ancestors hail from the Republic [of Poland] and seek to forge a connection with our country." Eisenberg was nominated for an Oscar for writing the film, while his co-star Kieran Culkin won the award for best supporting actor.
