content: |-
  Catherine O'Hara and Jenna Ortega arrive in Venice as the sequel kicks off the city's film festival.

  Schitt's Creek star Catherine O'Hara was among the stars wearing Beetlejuice-inspired outfits in Venice

  The stars of Beetlejuice Beetlejuice have arrived in Venice, as the premiere of the big-screen sequel kicks off the Italian film festival. Director Tim Burton has revisited his 1988 cult classic for the reboot, which sees Catherine O'Hara, Winona Ryder and Michael Keaton return to the franchise. They have been joined in the sequel by actors including Wednesday star Jenna Ortega and Oscar-nominated actor Willem Dafoe. Lady Gaga, George Clooney, Daniel Craig, Julianne Moore and Brad Pitt are among the A-listers expected to appear in Venice throughout the rest of the festival, which runs for 10 days.

  O'Hara, Winona Ryder and Jenna Ortega arrived at the Venice Film Festival via water taxi

  The stars and director of Beetlejuice Beetlejuice arrived by water taxi ahead of the sequel's premiere, later signing autographs and posing for photos. Most were dressed in dark, gothic colours, with several wearing black-and-white costumes, a reference to the Beetlejuice aesthetic made famous by the original film. It marks a return to form for the film festival, which hosted a lower-key event last year due to the Hollywood writers' strike. Beetlejuice's sequel sees Keaton reprise his role as the titular chaos-causing ghoul. The film is released in the UK on 6 September. Burton, who has also directed Edward Scissorhands, Charlie and the Chocolate Factory and Alice in Wonderland, said the fantastical venture into the afterlife was a project "from my heart". "In the past few years I got a little bit disillusioned with the movie industry," Burton told journalists ahead of the festival's opening. "For me, this movie was re-energising, kind of getting back to the things that I love doing, the way I love doing it, the people I love doing it with."

  Winona Ryder is returning for the sequel after starring in the 1988 original

  Jenna Ortega shot to fame as the star of the The Addams Family Netflix spin-off Wednesday

  Most of the stars wore appropriately dark, gothic colours, including four-time Oscar nominee Willem Dafoe

  Monica Bellucci also wore black and white, a nod to the Beetlejuice aesthetic

  The film sees Michael Keaton reprise his role as the chaos-causing ghoul
