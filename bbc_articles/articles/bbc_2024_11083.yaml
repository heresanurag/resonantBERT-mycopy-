  Mr Swinney, in a written response, said he was "deeply" appreciative of Ms Robison's offer to "step aside from the role". The cabinet appointments will be formally approved in parliament on Thursday.

  Shona Robison offered to step down as deputy first minister to help bring the party together

  Kate Forbes returns to government after more than a year on the backbenches. She quit government in March 2023 after narrowly losing out to Mr Yousaf in the SNP leadership contest and rejecting a demotion to a rural affairs minister. The Skye, Lochaber and Badenoch MSP had enjoyed a rapid rise following her election to parliament in 2016, aged 26, becoming Scotland's first female finance secretary in 2020. After being named deputy first minister, Ms Forbes said: "This is a moment of extraordinary privilege for me. Having previously served in cabinet, I know the duty that all ministers have to reflect the government's priorities and the missions that drive them." Mr Swinney said Ms Forbes was an "immensely talented politician", adding: "Her new role will prove critical as we focus on our key commitments of eradicating child poverty, investing in public services and supporting economic growth." Greens co-leader Patrick Harvie - who served with Ms Forbes in government for more than 18 months - raised concerns about her return to office. He said "a lot of people will be concerned about the appointment" unless Mr Swinney recommitted his government to "progressive" policies on climate, social rights and taxation. Mr Harvie also posted a "no right turn" sign on X.

