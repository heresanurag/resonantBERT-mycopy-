title: Kate Forbes 'honoured' to become deputy first minister - BBC News
date: '2024-05-09'
section: Scotland
url: http://www.bbc.co.uk/news/uk-scotland-68976320
content: |-
  John Swinney has announced his first cabinet after being officially sworn in as first minister.

  Kate Forbes has also taken control of the economy portfolio

  Kate Forbes has returned to the Scottish government as deputy first minister as John Swinney unveiled an almost entirely unchanged cabinet. She replaces Shona Robison, the only switch from Humza Yousaf's cabinet. Ms Robison, who said she had offered to step down as deputy first minister, has kept her other position as finance secretary. Ms Forbes said she was "deeply honoured" to become deputy first minister. She has also taken control of the economy portfolio - with Net Zero and Energy Secretary Mairi McAllan losing the wellbeing economy brief - as well as gaining responsibility for Gaelic.

  Ms Forbes, who has spent more than a year as a backbench MSP after stepping down from government in March 2023, had been promised a "significant" role in the government after opting not to run against Mr Swinney for the SNP leadership. The first minister made the cabinet appointments at his official residence, Bute House, after being sworn in at the Court of Session. He said: "I have selected a cabinet team that blends experience and energy, with a strong focus on the priorities my government will pursue — eradicating child poverty, driving economic growth, meeting climate obligations and investing in our vital public services."

  Details were later given of 14 non-cabinet ministerial appointments, down from the previous figure of 16, with the role of minister for independence now removed. Jamie Hepburn - who previously held that remit - takes over as minister for parliamentary business from George Adam. Mr Adam is leaving the government to return to the backbenches along with Emma Roddick and Joe Fitzpatrick. Ivan McKee, a key ally of Kate Forbes who quit government in the wake of Nicola Sturgeon's resignation, returns as minister for public finance Earlier, in a statement, Shona Robison revealed she had told Mr Swinney last week she believed her stepping down as deputy leader, in favour of Ms Forbes, would help bring the SNP together. "I told you I believed this would strongly signal that for all of us in government, this is the best approach to showing we are united and ready to serve the people of Scotland," Ms Robison said in a letter to the first minister. "It is also in the best interests of your leadership and for the party; and both of us have always put public duty and the interests of the party over and above any self interest."

