  During the 2023 SNP leadership campaign, Ms Forbes came under fire for her views on gay marriage, abortion and trans rights. A member of the Free Church of Scotland, she said that having children outside of marriage was "wrong" according to her faith. Mr Swinney, also a Christian, said at the time he profoundly disagreed with her comments and questioned whether her views made her "appropriate" to be first minister. Ms Forbes also said she was opposed to the SNP government's power-sharing Bute House Agreement with the Scottish Greens. The collapse of the Bute House deal last month led to Mr Yousaf's resignation. Mr Harvie said the new deputy first minister had expressed "quite startlingly social conservative views" in the last SNP leadership campaign and said he would "welcome" a commitment from the government to a progressive agenda. Scottish Conservative chairman Craig Hoy said the "uninspiring" new cabinet would deliver "more of the same". "The return of Kate Forbes is a desperate attempt by both John Swinney and his new deputy to gloss over the huge splits in the SNP and fixate on independence," he said. Scottish Labour's Jackie Baillie said what the country needed was the chance to choose a new government in an election. "This is a continuity cabinet that cannot be trusted to fix the chaos and instability they have created," she said.
