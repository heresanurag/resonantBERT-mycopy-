  Man bailed over fires at homes linked to PM

  Damage at the private home of Keir Starmer

  A fourth man who was arrested over a series of fires connected to Prime Minister Sir Keir Starmer has been released on bail, the Metropolitan Police has said. The 48-year-old, who has not been named, was arrested on Monday at London's Stansted Airport after initially being stopped by officers under schedule 7 of the Terrorism Act 2000. He was later arrested on suspicion of conspiracy to commit arson with intent to endanger life. On Wednesday, the Met Police said he had been released on bail to a date in July.

  Three men have already been charged in connection with three incidents - a vehicle fire in Kentish Town, north London, a fire at the prime minister's private home on the same street and a fire at an address that he previously lived in Islington, north London. Ukrainians Petro Pochynok, 34, and Roman Lavrynovych, 21, and Ukrainian-born Romanian national Stanislav Carpiuc, 26, are all due to appear at the Old Bailey on Friday. Mr Lavrynovych, of Sydenham, is charged with three counts of arson with intent to endanger life. Mr Carpiuc, of Romford, and Mr Pochynok, of north London, are charged with conspiracy to commit arson with intent to endanger life. In the early hours of 12 May, a fire took place at the home where Sir Keir lived before he became prime minister and moved into Downing Street. A car was set alight in the same street four days earlier on 8 May. The other fire took place on 11 May at the front door of a house converted into flats in Islington.
