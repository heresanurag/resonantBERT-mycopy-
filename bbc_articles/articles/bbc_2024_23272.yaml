content: |-
  Bo Westcombe-Evans and Phoebe Murray will win their first England caps after being picked to start in the team's WXV opener against United States on Sunday.

  England pair to win first caps against USA

  Bo Westcombe-Evans and Phoebe Murray will win their first caps against the United States, who are ranked eighth in the world

  Phoebe Murray and Bo Westcombe-Evans will win their first caps as part of a new-look backline as England take on the United States in their WXV opener on Sunday. Murray forms a midfield partnership with Emily Scarratt, while Loughborough Lightning wing Westcombe-Evans makes her Test debut in place of Abby Dow. After coming off the bench in a 24-12 win over New Zealand earlier this month, flanker Georgia Brock makes her first England start. Number eight Alex Matthews will captain England for the first time, making a 70th appearance for her country, while second row Rosie Galligan returns to John Mitchell's side after thumb and leg injuries had kept her sidelined since the Six Nations. "I am very proud but also shocked," Matthews said of being handed the captaincy. "The conversation I had with Mitch [Mitchell] is that nothing changes, he just wants hard work. "Marlie [Packer] was the first one to come over and congratulate me, offering any support or whatever I want." Zoe Harrison comes in for Holly Aitchison at fly-half, with the Bristol Bears playmaker dropping to the bench. Looking at the changes, Matthews said: "Bo is strong, powerful and goes through the middle and will step up in defence and attack." Of Murray, Matthews said: "I am looking forward to seeing how electric she can be. She has played against us [Gloucester-Hartpury] and caused damage." Brock gets her chance to make an impression, and Matthews saw it coming. "I felt Georgia was going under the radar for a season too long - her performances for Gloucester have been unbelievable," Matthews said. "Credit to her [for getting her first start]; she is a quiet and hard worker."

  England, who won the inaugural staging of the tournament last year, will play New Zealand and Canada to complete their campaign. "We have been building on our game for the past eight weeks towards our WXV opener against USA," said attack coach Lou Meadows. "This group of girls are excited for their opportunity to attack the tournament right from the start for the Red Roses this Sunday. We understand our reality and just want to get playing."
