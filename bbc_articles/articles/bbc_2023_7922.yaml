title: 'Eastbourne: Drunk driver caught on CCTV falling off motorbike - BBC News'
date: '2023-05-24'
section: General
url: http://www.bbc.co.uk/news/uk-england-sussex-65688619
content: |-
  Cameron Dixon was attempting to order food from a McDonald's drive-through in Eastbourne.

  A drink driver has been caught on CCTV falling off his motorbike whilst trying to order food from a drive-through restaurant.

  Cameron Dixon, 28, from Eastbourne, was seen by police riding on the pavement at McDonald's in the seaside town and arrested by an officer who had been on a break inside the restaurant at the time.

  Dixon admitted drink driving and was disqualified from driving for 17 months.
