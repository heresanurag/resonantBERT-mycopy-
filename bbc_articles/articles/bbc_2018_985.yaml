id: bbc_2018_985
title: PM warns Toby Young over language - BBC News
date: '2018-01-09'
section: General
url: http://www.bbc.co.uk/news/uk-politics-42596294
content: |-
  Theresa May is "not impressed" by lewd remarks made by her newly-appointed university regulator.

  Theresa May is "not at all impressed" by lewd remarks made by Toby Young, who has been appointed to the board of the Office for Students.

  The prime minister said if he was to make those comments in public office, "then he would no longer be in public office".
