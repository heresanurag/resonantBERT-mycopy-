content: |-
  Three years after fleeing war, Illia is about to follow in the footsteps of five prime ministers.

  'I fled Ukraine speaking basic English - now I'm off to Oxford University'

  Illia and his mother fled Ukraine in May 2022 and live with a host family in south Wales

  When war broke out in Ukraine 15-year-old Illia Mitiushnikov was forced to flee his home and family, and claim asylum in Wales. Almost three years on, he is about to follow in the footsteps of no fewer than five British prime ministers after securing a place on one of the most prestigious degree courses at the University of Oxford. Philosophy, Politics and Economics (PPE) at Oxford has been described by the Guardian as "the Oxford degree that runs Britain", external. Its list of alumni includes former prime ministers David Cameron, Rishi Sunak, Liz Truss, Edward Heath and Harold Wilson, as well as other British and global political heavyweights such as Tony Benn, Bill Clinton and Aung San Suu Kyi. It is a remarkable achievement for the 18-year-old, who said his English was "not so good" before arriving in the UK.

  Until May 2022, Illia lived in Vinnytsia, central Ukraine, with his parents and their now 11-year-old cocker spaniel Simba. After being accepted onto the Homes for Ukraine Sponsorship Scheme, Illia and his mother packed a suitcase each and made the journey to Wales, taking a train to Poland, a flight to London and a bus to Cardiff where they were met by their hosts. "It was both emotionally hard and physically hard," said Illia, recalling the long journey. They moved in with their hosts, a couple with three young children, in Barry, Vale of Glamorgan. "I was very delighted when I came here," said Illia. "I was really grateful to my host family that they agreed to accept me and my mum because it's quite stressful to just meet completely new strangers and just let them stay in your house." It was his host family who suggested he apply to Westbourne School, an independent school in nearby Penarth, and he was offered a free place under its refugee scholarship scheme.

  Illia had been studying for an International Baccalaureate Diploma Programme at Westbourne School in Penarth

  In the summer of 2023, he sat his GCSEs, achieving 10 A*s. He then began the school's International Baccalaureate Diploma Programme in place of A-Levels. Thoughts of studying at the University of Oxford were prompted by a visit to the city. "That's when the dream started to appear in my mind," he said. Then when on work experience at a bank in London last summer he spoke to graduates and decided to go for it.

  But initially he had doubts he could achieve his ambition. "Part of me was like, 'it's too much for me'... and then another part of me was thinking 'if others can do it, why can't I do it also'." Knowing what people in Ukraine were experiencing drove him to work hard. "I can't let myself have a lot of rest because I know how people are feeling in Ukraine," he said. "I imagine the lives of all the soldiers who fight 24/7 for Ukraine and I can't let myself chill out. "It was like a new goal for me, I just had to do this, I had no other chance."

  Illia was one of six students from Ukraine offered a free place to study at Westbourne

  The day he was accepted was emotional. "I called my family straight away and they were just crying from happiness," he said. He is full of gratitude for his host family and his teachers and is looking forward to receiving an "insanely good" education and making new friends at St Hilda's College, Oxford. And what are his plans for the future? He said he hoped Oxford would give him knowledge he could use to "improve the worldwide situation". But initially he intends to work in banking, "just to stabilise in life, to help my family". Like many of his PPE predecessors he also has his eye on a career in politics. "I would like to help the world, help nations to develop, solve international crises, like the current war with Ukraine and Russia," he said. "I hope it will end before then obviously but there are other conflicts to solve."

  Illia hopes to have a career in politics

  Marie de Tito Mount is global chief executive for Westbourne, which also has schools in Singapore and Sydney. "We see a few students each year that go on to Oxford... but I think there is a particular warmth given Illia's story, given his background, I think we're all immensely proud of him, everyone's rooting for him," she said. "He's seen the opportunities available and has grabbed them with both hands, so that's something any school would be proud of.
