title: George Michael's sister Melanie Panayiotou is found dead on Christmas Day aged
  59 - BBC News
date: '2019-12-27'
section: Entertainment & Arts
url: http://www.bbc.co.uk/news/entertainment-arts-50928067
content: |-
  Melanie Panayiotou was found dead on Christmas Day - precisely three years after her superstar brother.

  George Michael's sister, Melanie Panayiotou, has died aged 59, exactly three years after her brother.

  The family confirmed in a statement that Melanie "passed away suddenly" over Christmas.

  Her brother, pop icon George Michael, died on Christmas Day 2016 at his home in Goring-on-Thames, Oxfordshire.

  Andrew Ridgeley, George's former Wham! bandmate, described Melanie's death as "utterly tragic" and said his thoughts were with her family.

  Melanie and George - whose mother Lesley died in 1997 - are survived by their father Kyriacos, known as Jack, and their oldest sister Yioda.

  In a statement, released through lawyer John Reid, Melanie's family said: "We would simply ask that the family's privacy be respected at this very sad time.

  "There will be no further comment."

  George Michael had hits with Wham! and as a solo artist

  The Metropolitan Police also confirmed the death in a statement, which read: "Police were called by London Ambulance Service at approximately 1935hrs on Wednesday, 25 December to reports of the sudden death of a woman, aged in her 50s.

  "The death is not being treated as suspicious by police."

  Her age was initially reported as 55, but the family's lawyer confirmed she was 59 at the time of her death.

