title: West Midlands firefighter admits sharing photo of dead body - BBC News
date: '2024-08-21'
section: Birmingham & Black Country
url: http://www.bbc.co.uk/news/articles/c1l5j602drlo
content: |-
  Cameron Hancel shared an image of a deceased male while working for West Midlands Fire Service.

  Former firefighter Cameron Hancel hid his face with a baseball cap as he left Wolverhampton Crown Court on Tuesday

  A former firefighter took a photograph of a dead man at the scene of a fatal crash and sent it to others. Cameron Hancel, 33, of Rowley Regis, took the image on his phone at a road traffic incident on 13 March 2023 while working for West Midlands Fire Service. He pleaded guilty to one charge of misconduct in public office at Wolverhampton Crown Court earlier. West Midlands Fire Service said Hancel was dismissed in August 2023 after the matter came to its attention.

  "There is no place in our service for people who undertake such actions," a spokesperson for the fire service said. "His conduct compounded the grief of the victim’s family and loved ones, and they remain in our thoughts." A second charge under the 2003 Communications Act was withdrawn. The court heard how Hancel was of good character and had not been in trouble before. During the hearing on Tuesday, the former firefighter spoke only to confirm his name and enter his plea. Judge Talog Davies accepted a request from the defence to adjourn sentencing for a pre-sentence report to be compiled. Hancel, who was released on unconditional bail, hid his face under a baseball cap as he left the court building about two hours after the hearing had concluded. The case has been adjourned until 4 October.
