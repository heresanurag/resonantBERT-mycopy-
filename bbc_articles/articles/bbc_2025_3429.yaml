  A third woman, Sue, says she was prescribed two different dopamine agonist drugs without being warned of compulsive behaviour side effects on either occasion. She even mentioned recent gambling behaviour when the second drug was prescribed, she says. She went on to rack up debts of £80,000. "The effect on my family was horrific - it was life-changing money to lose," she says. "But at the time I didn't know it was no fault of my own." A class action was brought against GSK in 2011 by four sufferers of Parkinson's disease - the BBC has learned. They said Ropinirole led to gambling debts and broken relationships. They also complained that despite a link between such behaviours and the drug having been established in medical studies as early as 2000, GSK had failed to include any warnings in its product literature until March 2007. The class action was settled but GSK denied liability. Cases of serious side effects have also been reported in other countries, particularly in relation to the use of drugs for Parkinson's disease. In France, a court awarded damages to a father of two who complained that Ropinirole had given him compulsive homosexual urges, while another man without a criminal record began torturing cats. In the US, the American Academy of Sleep Medicine recommends the drugs should only be used for short-term treatment, such as end-of-life care.

  Many of the women the BBC spoke to also complained that prolonged use of the drugs also worsened their underlying RLS. It meant their dosage had been increased which, in turn, had exacerbated their compulsive behaviour - a process known as augmentation. Dr Guy Leschziner, a consultant neurologist, says the drugs still play an important role but he believes that drug companies, health authorities and doctors need to better warn patients of these side effects. "Not everybody knows the kinds of really quite dramatic changes that can occur," he says.
