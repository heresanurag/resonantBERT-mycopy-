  In a statement, GSK told the BBC Ropinirole had been prescribed for more than 17 million treatments and undergone "extensive clinical trials". It added the drug had proven to be effective and had a "well-characterised safety profile". "As with all medicines, [it] has potential side effects and these are clearly stated in the prescribing information," it said. In response to its 2003 research that had found a link with "deviant" sexual behaviour, GSK told us this was shared with health authorities and had informed updates in prescribing information - which now lists "altered or increased sexual interest" and "behaviour of significant concern" as side effects. The current patient information leaflet for Ropinirole, external makes specific reference to changes in sexual interest on five occasions - almost exclusively warning about the frequency or strength of such feelings as potentially "abnormally high", "excessive" or "increase[d]". The UK's Medicines and Healthcare products Regulatory Agency (MHRA), said that while a specific reference to "deviant" sexual behaviour is not included in warnings, such impulses vary and a general warning about activities which may be harmful is included. It also said that it is important for healthcare professionals to explain the possible risk to patients and not all experience these types of side effects. The Department of Health and Social Care declined to comment. Some names have been changed in this article to protect people's identities.
