  Asher-Smith comes into the Games in hot form, having won the British 200m title in a championship record 22.18 seconds and a fifth European gold over 100m earlier in June. She's not the only in-form Briton. Daryll Neita, who like Asher-Smith ran her fastest times this season at the London Diamond League last weekend, plans to "destroy" her team-mate on the track., external Self-taught by watching hours of YouTube videos, 13-year-old Brown won bronze in Tokyo to become Britain’s youngest Olympic medallist. In her second Games having just turned 16, she planned an ambitious double. But narrowly missing out on the surfing event - taking place 9,500 miles away from Paris in Tahiti - could prove a blessing in disguise. A boundary breaker who is equally as happy to inspire as she is win medals. Five years after picking up a barbell for the first time, Campbell became the first British woman to win an Olympic weightlifting medal with silver in Tokyo and is heavily fancied to go one better.

  This video can not be played To play this video you need to enable JavaScript in your browser. Paris 2024: Could you lift like British weightlifter Emily Campbell?

  Similarly to Asher-Smith, KJT is one of the most talented and recognisable athletes of her generation. But the medal which matters most continues to be evasive. Winning a second world title last year bodes well going into her fourth shot at standing on the Olympic podium. An Olympic underdog three years ago, Hodgkinson has evolved into a gold medal favourite in Paris. Breaking Kelly Holmes' 26-year British record clinched silver in Tokyo and even illness could not stop her winning the European title last month. Setting a new national record at the Diamond League meet in London at the weekend further underlined her credentials. Whether haring down a treacherous Tour de France descent, or bunny hopping up sandy terrain, multi-eventer Pidcock is filling the void left by Britain's millennial cycling superstars. Pidcock defends the mountain bike gold he won in Tokyo before switching to the road, where success would make amends for missing this month's Tour after contracting Covid.

  A sign of how impressive 2024 has been is the huge shift of expectation for Caudery. In January, she simply wanted to make the Olympics team. Now, having set a new British women's record last month, and recorded the world's best height of the year, her eyes are firmly on a medal. When asked who could be Team GB's breakthrough athlete in Paris, hurdles legend Colin Jackson picked Dobson. High praise indeed. Grabbing silver at the European Championships, for his first major individual medal, has been a tangible marker.

  Emma Finucane won the women's individual sprint, team sprint and keirin at the Track Nations Cup in March

  The pantheon of British Olympians features several cyclists - including Dame Laura Trott. And she believes Finucane can make history by becoming the first female to win three golds in one Games. That endorsement came after Finucane dominated the Track Nations Cup in March, when she completed a stunning treble. Leaving university in the UK for a new life in the US was not greeted warmly by Hinchliffe's parents. But the move, aimed to prioritise his athletics career and leading to linking up with American Olympic legend Carl Lewis, has been astute. Clocking 9.95secs landed the US collegiate title, before his sensational breakthrough year continued by winning the UK Athletics Championships last month to qualify for Paris.

  Louie Hinchliffe, who began working with nine-time Olympic gold medallist Carl Lewis in August 2023, ran the sixth fastest time by a British man to win the US collegiate title

  "Some say I'm the new Anthony Joshua, but one day I aim to be even better and dominate." Like all boxers, Orie talks the talk. He walked the walk by winning gold as the poster boy of the 2022 Commonwealth Games and plans to do the same in his first Olympics. Since reaching the Olympic final in Tokyo as a 16-year-old, Spendolini-Sirieix has developed into a world, Commonwealth and European gold medallist. Even more impressively, the successes came after she considered quitting because of a "fear of diving". , external

