  A first-time Olympian who was left in a coma as a teenager following a horse riding accident. Brayshaw, who was paralysed down the left side of her body for a year, began rowing in her second year of university. An Olympic medal, which is a strong possibility, would be a remarkable reward for her perseverance after also being overlooked for Tokyo. That bullish quote become Clarke's mantra after the reigning Olympic champion was overlooked for Tokyo 2020, despite being in the form his life. Having moved on from the controversy, he is eyeing the ultimate redemption story. When Hester competed in his first Olympics - at Barcelona 1992 - a large portion of Team GB were not even born. But with age comes more pressure, he says. The oldest member of Team GB helped the nation win a historic first equestrian medal in 2012 and is desperate to stretch the success to a fourth Games.

  Andy Macdonald, whose GB team-mates are 16-year-olds Sky Brown and Lola Tambling, is one of skateboarding's most recognisable names

  In a sport which developed as a youth subculture, and is fronted by a host of hip youngsters, there is a certain irony that a 50-year-old is part of Team GB. Macdonald, born in the US and representing Britain through his Luton-born dad, is no ordinary 50-year-old. The 'Rad Dad' is great pals with Tony Hawk, fronted a MTV show and skated through the White House. Two important dates were circled on Rutter's 2024 calendar. One was the start of the Paris Games. The other was the due date of her first child. Rutter gave birth to son Tommy three months ago and is ready to land the Olympic medal which has so far evaded her. Canoeing provided salvation as Woods endured bullying which led to depression and self-harm. Since coming through therapy between 2016 and 2018, Woods' career has soared and, having won her first individual world title last year, is a medal hope in the "hectic" cross event which is making its Olympic debut.

  Kimberley Woods is looking to improve on her 10th-placed finish at Tokyo 2020
