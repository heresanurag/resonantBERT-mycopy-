  From Olympic golden oldies to fresh-faced debutants, BBC Sport picks out 24 of the Team GB athletes to particularly focus on during Paris 2024.

  The 24 British stars to watch at Paris 2024

  Tom Pidcock, Adam Peaty and Sky Brown are three of the Team GB stars to watch at Paris 2024

  Few things bond a nation like the thrill of triumph at an Olympic Games. Redgrave's return in Sydney. Holmes' double in Athens. Super Saturday in London. Great Britain has witnessed unforgettable moments which have been a unifier. Over the next few weeks, 327 Team GB athletes are heading to Paris and dreaming of creating another culturally-resonant chapter. With the Games starting later this week, BBC Sport has picked out 24 British stars you must set a reminder to watch.

  From fresh-faced teen to knitting-loving veteran, Daley is the first British diver to compete in five Games. The previously-elusive gold medal arrived at Tokyo 2020 and, after being encouraged to come out of retirement by his son Robbie, Daley defends his title alongside Noah Williams. Things tend to come in threes, they say, and Glover knows that more than most. The British rowing legend is a mother of three and in her third comeback - having retired after Rio and Tokyo. Now she is chasing her third Olympic gold medal. Highs of winning back-to-back golds at London 2012 and Rio 2016 were followed by the low of a shock first-round defeat in Tokyo. There was a chance Jones might not be allowed to compete in Paris. She avoided a ban after a doping violation and bids to become the first fighter to win three taekwondo gold medals.

  Andy Murray is the only tennis player to win two Olympic singles gold medals

  Among everything he has achieved, and everything he has seen, Murray ranks the Olympics as one of the most special experiences of his enviable career. Fittingly, the London 2012 and Rio 2016 gold medallist is signing off in Paris before retiring from playing professionally. There was a time when Peaty seemed invincible. Clocking the top 20 times of all-time ensured he dominated his event for nearly a decade. Injuries and personal issues led to a loss of form and a revaluation of what was important. Having come through a "self-destructive spiral", Peaty will challenge for a third successive gold medal. Another iconic British Olympian in one final hurrah before retirement. After planning to quit post-Tokyo, three-time gold medallist Whitlock found the fire in the belly still burned. If he defends the title he won in Tokyo, he will become the first gymnast to win four Olympic medals on the same apparatus.

