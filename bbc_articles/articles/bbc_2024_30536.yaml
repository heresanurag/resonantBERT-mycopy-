  In a scruffy, bustling neighbourhood not far from the grace and beauty of the old city of Damascus, I had a front row seat as some of the pressures facing Syria and its new rulers surged through an excited crowd. They had heard that the man who until less than a week ago was the local boss, the mafia-style godfather of their suburb was going to be executed. The man, known as Abu Muntaja, was one of the military intelligence officers considered responsible for the Tadamon massacre in 2013 of at least 41 local men. The crowd grew until thousands blocked the streets, delighted that a notorious regime killer was going to be executed in in front of them in the main square that he used to swagger across. The atmosphere throbbed with excitement, expectation and anger. Justice meant watching their enemy die, not just because of his crimes, but because of the boundless cruelty of the Assad regime. An elderly women called Muna Sakar, dressed in a neat coat and hat, was there to see him die as a thief as well as a killer. "He stole my house and money. Of course I want to see him dead. I would have done it myself with my own hands. But I couldn't find a way. I wanted to kill him." When rumours flew around that the execution was starting, the crowd surged back and forth, jostling for the best position, phones held high in outstretched arms for the video. No one wanted to miss a thing. When they decided the execution was happening down the street, they stampeded over fences and cars stuck in traffic to get there. In the end there was no execution, at least not yet. It was probably a rumour, that thousands wanted to be true. If Syria's new rulers do not want change to be measured in blood, they will need to control the desire for revenge. When the weight of dictatorship is lifted, powerful forces are unleashed. How Syria's new rulers deal with them will shape what comes next.
