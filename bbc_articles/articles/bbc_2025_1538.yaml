title: 'Cardiff University: ''Welsh universities are not going bust'' - BBC News'
date: '2025-02-02'
section: Wales
url: http://www.bbc.co.uk/news/articles/ceve8p4w1k0o
content: |-
  The group representing universities says it "hasn't seen a financial situation like this in decades".

  'Welsh universities are not going bust'

  Welsh Universities are not close to going bust, according to Universities Wales. However the group that represents all Welsh universities said it "hasn't seen a financial situation like this in decades". Concerns have been raised about other higher education providers in Wales after Cardiff University announced plans to cut 400 jobs, merge some departments and cut others entirely. It comes as Vikki Howells, the Welsh government's minister in charge said there was no more money available for the sector.

  Speaking on BBC Politics Wales, Paul Boyle, chair of Universities Wales and Vice-Chancellor of Swansea University said: "I don't believe we're in the situation where universities are close to going bust, but I have to be honest, I've never seen a financial situation like this in the decades that I've worked in the sector." He added that Universities were facing "the toughest position that we've been in, and as a result, universities were having to take really tough decisions". The Welsh government said it was up to universities to balance the books, but had already raised tuition fees in line with inflation and given an extra £10m to bring the funding of Medr, the body that funds and regulates universities in Wales, up to £200m.

  Minister for Higher Education, Vikki Howells, said: "There wouldn't be any additional Welsh government funding available, unless we were looking to cut back from other areas such as the NHS, education, or public services that we all rely on. Prof Boyle from Universities Wales welcomed the increase in tuition fees by the government, but said: "We, as with many other organisations, saw significant increases in National Insurance, which have effectively wiped out that increase." Ms Howells added she was looking at reforming higher education funding with the UK government. "We will be taking part in their work to look at how we can reform the higher education sector across the UK, so that we can look at issues such as migration, international students, competition law and crucially also HM Treasury rules, which govern student finance arrangements," she said. She said she had had a "positive" conversation with UK government higher education minister Baroness Jacqui Smith. Professor Boyle said that while they are pleased the UK government was keen to review the overall funding system, "this will take time" and it was "not going to solve the financial issues that we are facing at the current time".

  The minister for higher education says there will not be any additional Welsh government funding available

  Economist Dylan Jones Evans said "universities are critical for our health service, critical for our economy, critical for so many aspects of Welsh life, not only now, but over the last 150 years". "They're an integral part of the soul of Wales, and it's time that the Welsh government actually brought the Vice-Chancellors together, sat down with them and said, 'let's create a strategic future for the sector', and, more importantly, the role that the sector can play in the life of the nation."

