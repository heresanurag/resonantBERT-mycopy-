  About 30 people, including current and former students, held a "busk" protest on Sunday over Cardiff University's plans to axe music courses. Eva Morris, a 19-year-old music student, described the news as "awful". "We have two years to go and if the music department gets closed down I can't imagine what those two years are going to be like," she said. Loz Collyer, who graduated from the music School in 2014, said he learned from the "best teachers Wales had to offer" whilst a student. He added: "I learned to how to compose, conduct, how to arrange a band and now I have my own band. Without Cardiff University to for me to foster all of that it would not have happened."

  Katie Martin, a third-year music student, says she feels "blindsided" by the announcement

  Conservative education spokesperson, Natasha Asghar MS said the proposed cuts at Cardiff University were an example of "educational vandalism" and said it was time for the Welsh government to act "rather than be sitting at their desks". She said: "The Welsh Labour government has a responsibility to help and support our universities. "We have a budget coming up, I can't see why on earth they can't shake their magic money tree, which they're quite happy to shake when it comes to bailing out Cardiff Airport, spending on 20mph and spending on other frivolous activities and actually preserve our prestigious Welsh universities." She called on the Welsh government to "revise and rejig" their upcoming budget to save the courses under threat. Cefin Campbell MS, Plaid Cymru's education spokesperson accused the Welsh government of being "asleep at the wheel". He said: "They've seen this coming, but they haven't acted. They should have put plans in place. They should have had a structural and strategic discussions with vice-chancellors to plan a way forward and to have a review with the funding formula. "We need to relook at the budget. I think in the short-term, the Welsh government should step in and support the university sector, and during that process we should have discussions with vice-chancellors to devise a better formula and strategy moving forward."

