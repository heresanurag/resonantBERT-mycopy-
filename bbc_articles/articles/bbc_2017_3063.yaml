id: bbc_2017_3063
title: 'Syria crisis: Footage shows girl ''Aya'' rescue - BBC News'
date: '2017-02-20'
section: General
url: http://www.bbc.co.uk/news/world-middle-east-39031258
content: |-
  Footage released by Syria Civil Defence shows a girl being pulled alive from rubble, apparently in Damascus amid reported air strikes.

  Footage released by Syria Civil Defence - also known as the White Helmets - shows a girl being pulled alive from rubble, apparently in Damascus' Tishreen neighbourhood on Sunday.

  Activists have reported air strikes in two other neighbourhoods, Qabun and Barzeh, over the weekend.
