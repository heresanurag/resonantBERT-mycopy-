title: 'Hurricane Florence: ''Everybody''s frightened'' - BBC News'
date: '2018-09-12'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-45498504
content: |-
  People have left homes and taken precautions ahead of the hurricane.

  Several US states are braced for what could be a catastrophic storm when Hurricane Florence hits the East Coast.

  Mandatory evacuations have been ordered in part of North Carolina, South Carolina and Virginia.
