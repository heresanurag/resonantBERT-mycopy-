title: 'Mike Tyson vs Jake Paul: ''Looked like trash'' - boxing world critical of
  Tyson-Paul fight - BBC Sport'
date: '2024-11-16'
section: Boxing
url: http://www.bbc.co.uk/sport/boxing/articles/c7v3jeddylgo
content: |-
  The divisive bout between veteran Mike Tyson and YouTuber-turned-boxer Jake Paul in Texas did little to win over the boxing fraternity.

  This video can not be played To play this video you need to enable JavaScript in your browser.

  Former world champions Tony Bellew, Terence Crawford and Nicola Adams were among those to criticise the boxing match between Mike Tyson and Jake Paul. The divisive bout between veteran Tyson and YouTuber-turned-boxer Paul in Texas did little to win over the boxing fraternity. There was widespread criticism in the build-up and opinions remained largely the same after a lacklustre spectacle. "I love Mike Tyson, but they [are] giving him too much credit," two-weight undisputed champion Crawford wrote on X. "He looked like trash, to train that long and only throw 97 punches the whole fight is crazy. I’m just glad he didn’t get hurt out there." Paul, 31 years the junior of former heavyweight world champion Tyson, claimed a comfortable points victory at AT&T Stadium. Some fans at the venue made for the exits early as a lack of action failed to inspire, especially in the aftermath of Katie Taylor's gripping defence of her undisputed light-welterweight title against Amanda Serrano. The main event did little to convince those in the boxing world that it was a worthwhile venture. Tyson, 58, landed just 18 punches across the 16-minute contest and looked fatigued after just two rounds. Bellew, a former world champion at cruiserweight, said the public are to blame for the explosion of Paul's boxing career. "We are all to blame for this man [Jake Paul]! We are all talking and watching. We have to stop this fool. Don’t tune into him until he fights someone who is fit, healthy and not a grandfather," Bellew said on X. "Any proper boxing people helping Paul need to look at themselves. This is just sad." The defeat is the seventh in 57 bouts for Tyson, while Paul has won 11 of his 12 fights, having lost against Tommy Fury in 2023. Olympic champion Adams joined the chorus of people insisting expectations should never have been so high for Tyson's return. "I wanted to see Mike Tyson doing what he does but he is 58 years old, in exceptional shape but just not good enough to fight these young up and comers now," Adams wrote on X.

  Mike Tyson (right) has lost his last three professional fights

  With a slap at the weigh-in and then a stale performance in the ring, many observers have questioned the legitimacy of the contest. Boxing expert Steve Bunce joined BBC 5 Live Saturday Breakfast to break down the fight, and dismissed the idea the bout could have been pre-determined. "It was a decent sparring session between a tough, young novice and a very old but once great man, Mike Tyson," Bunce said. "There were rounds where Mike Tyson never threw a punch. It was not the apocalypse but it wasn't very nice. "I don't think it was choreographed but it was borderline choreographed at times."
