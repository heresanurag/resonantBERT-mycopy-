  A selection of your pictures of Scotland sent in between 24 September and 1 October.

  Climbing with the old man: "We had never climbed any mountain before and wanted to try the Old Man of Storr, so me and my son climbed up in pitch dark at 4am to be amazed by the sun rising over the mist and only one other person", says Neil Dethridge. "Truly a magical and amazing place".
