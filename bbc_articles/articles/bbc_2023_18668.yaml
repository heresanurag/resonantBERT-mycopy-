title: I'm A Celebrity winner named after Sam Thompson, Tony Bellew and Nigel Farage
  made final - BBC News
date: '2023-12-10'
section: Entertainment & Arts
url: http://www.bbc.co.uk/news/entertainment-arts-67661729
content: |-
  Sam Thompson, Tony Bellew and Nigel Farage were the last men standing on the reality TV show.

  Sam Thompson said winning was "a dream come true"

  An average audience of 6.6 million watched this year's finale of I'm A Celebrity... Get Me Out of Here!, overnight ratings show.

  Made In Chelsea star Sam Thompson was crowned king of the jungle in the ITV reality show's final on Sunday.

  Thompson held off competition from boxer Tony Bellew and former UKIP and Brexit Party leader Nigel Farage.

  Viewing figures will be significantly higher when those watching later and on other platforms are added.

  Although overnight figures have been lower than last year's, consolidated figures show episodes have generally attracted audiences of well over eight million - making it still one of the most popular programmes ITV makes.

  Of the three finalists, Thompson was the bookmakers' favourite to win. The reality star and DJ, who has ADHD, endeared himself to many viewers with his positive personality and attitude.

  Former heavyweight Bellew was second, with Farage - who was the best-paid campmate with a reported £1.5m fee - in third.

  Figures released by ITV show Thompson won with 56.6% of the vote, to Bellew's 43.4%.

  The earlier vote, before Nigel Farage was eliminated, saw the politician take 25.8% of the vote share, against Bellew's 30.9% and Thompson's 43.3%.

  The three finalists were among 12 celebrities who entered the Australian jungle three weeks ago - although Bellew and Frankie Dettori joined a few days after the launch.

  Thompson said he was "really overwhelmed" by his win, adding: "I didn't think I was even going to be invited onto this show, let alone be sat here [on the winner's throne]."

  He told viewers: "I am so grateful, thank you so much. I've dreamed of doing this show and being invited on for years and years, and you've just made a boy's dream come true."

  Thompson's likeable and enthusiastic personality proved to be a hit with viewers.

  Earlier on Sunday's final, he said being on the show had been "like a dream that I don't even want you to wake me up from".

  "I've had the best time and I'm the luckiest person in the world," he told hosts Ant & Dec.

  That positivity came despite being asked to eat items including a pig's vagina and a camel's penis in the last bushtucker trial.

  Left-right: Sam Thompson, Tony Bellew and Nigel Farage were in the final

  Thompson has improved on his third-place finish on Celebrity Big Brother in 2017. He left Made In Chelsea in 2019 and currently hosts a show on Hits Radio and co-presented the official Love Island podcast.

  Thompson's girlfriend is Zara McDermott, who found fame on Love Island before moving to Made In Chelsea and then this year's Strictly Come Dancing.

  She posted a video of herself with other supporters cheering when Thompson was named the I'm A Celebrity... winner.

