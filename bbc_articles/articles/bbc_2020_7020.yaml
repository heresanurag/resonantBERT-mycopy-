title: 'Pontypool explosion: Man is killed in garage blast - BBC News'
date: '2020-06-24'
section: Wales
url: http://www.bbc.co.uk/news/uk-wales-49072527
content: |-
  Eyewitnesses say a garage door was sent flying across the street in the blast.

