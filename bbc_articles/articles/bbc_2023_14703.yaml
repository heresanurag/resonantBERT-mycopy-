title: Blackpool murder probe launched after woman found with multiple injuries -
  BBC News
date: '2023-09-24'
section: Lancashire
url: http://www.bbc.co.uk/news/uk-england-lancashire-66904227
content: |-
  Lancashire Constabulary say Alison Dodds suffered multiple injuries before she was found on Thursday.

  Police were called to Redcar Road, Blackpool, on Thursday morning

  A murder investigation has been launched after a women in her 50s was found dead with multiple injuries in Blackpool.

  Officers were called to Redcar Road shortly before 11:00 BST on Thursday following a report of an unexpected death. Lancashire Police named the woman as Alison Dodds.

  The force said her death is being treated as suspicious.

  Detectives are appealing for anyone with information to come forward.

