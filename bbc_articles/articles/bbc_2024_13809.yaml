content: |-
  Over 50 people have died in the past three days due to heat-related illnesses.

  Heat kills more than 50 people in India in three days

  A man covers his face with a cloth to protect himself from the heat

  More than 50 people have died in India over the past three days as a brutal heat spell continues to grip parts of the country. Around 33 people died, external in the northern state of Uttar Pradesh over the weekend due to the heat. These included people involved in the general election, including polling officials, security guards and sanitation staff - Saturday was the last phase of voting. In Odisha (Orissa) state, about 20 people died due, external to heat stroke, officials said.

  Every five years, India holds its general election in the summer months of April and May. But this year, the temperatures have been record-breaking, with the country experiencing frequent, more intense and longer heatwaves.

  Many hospitals in India have set up special units to treat heat-related ailments

  The federal health ministry says that there have been at least 56 confirmed, external heat strokes deaths from 1 March to 30 May. About 24,849 heatstroke cases were reported during the period. However, state-wise figures suggest the actual number could be much higher. In Odisha, district authorities reported 99 suspected heat stroke deaths, external in the past 72 hours - of these, 20 cases have been confirmed, the state's Special Relief Commissioner said in a statement. In Uttar Pradesh, Navdeep Rinwa, chief electoral officer of the state, told reporters that the families of deceased election personnel would be given a monetary compensation of 1.5m rupees ($18,000; £14,000). Mr Rinwa said that a man who was standing in the queue to vote fainted because of the heat. “The voter was transported to a health facility, where he was pronounced dead upon arrival,” he said. Suspected heat-related deaths have also been reported from the states of Bihar, Madhya Pradesh and Jharkhand.

  India's National Centre for Disease Control calls heat strokes a "life-threatening" condition with a mortality rate of 40-64%, external. The heat in northern and central India and parts of the west has been unrelenting for the past two weeks, with maximum temperatures hovering around 45-46C for days at a stretch and even climbing up to 50C in some areas. However, India's weather department says that temperatures are likely to fall in the coming days due to the onset on the monsoon. Several regions are experiencing severe water and electricity shortages due to a rise in power consumption. Videos from capital Delhi show people jostling for water from water tankers. Many parts of the capital are also experiencing frequent power cuts.
