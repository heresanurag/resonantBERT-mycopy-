title: Murder investigation after man shot dead in Birmingham - BBC News
date: '2018-04-15'
section: Birmingham & Black Country
url: http://www.bbc.co.uk/news/uk-england-birmingham-43773918
content: |-
  The man was treated by medical staff but declared dead at the scene in Birmingham, police say.

  The man was confirmed dead at the scene

  A 20-year-old man has died after being shot in the early hours of Sunday.

  Police were called to South Holme, near Garrison Lane in the Bordesley area of Birmingham, just after midnight.

  The victim was treated by medical staff but declared dead at the scene, West Midlands Police said.

  Det Insp Jim Colclough said a murder investigation had been launched. He added: "We are in the very early stages of this investigation where a young man has tragically lost his life."

  A cordon along Garrison Lane and South Holme, which is not far from Birmingham City Football Club's ground, remains in place as forensic examinations are carried out.

  Emergency crews were called just after midnight

  The scene is not far from Birmingham City's football ground

