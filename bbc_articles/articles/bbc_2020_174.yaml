title: Ferries cancelled and flood warnings as Storm Brendan hits - BBC News
date: '2020-01-13'
section: Scotland
url: http://www.bbc.co.uk/news/uk-scotland-edinburgh-east-fife-51079834
content: |-
  Severe gales and coastal flooding have affected much of Scotland as Storm Brendan sweeps in from the Atlantic.

  This video can not be played To play this video you need to enable JavaScript in your browser. Footage from Bel Hawson shows waves crashing onto the A83 in Ardrishaig as cars drive along

  Parts of Scotland have been hit by severe gales and flooding as Storm Brendan sweeps in from the Atlantic.

  Ferry routes covering much of the west coast as well as the Northern Isles have been cancelled or disrupted.

  A large tree has fallen at Maybole in South Ayrshire, partially blocking the A77, and may take several hours to clear.

  The Scottish Environment Protection Agency (Sepa) has also issued 32 flood warnings and 16 flood alerts.

  The yellow warning issued by the Met Office covers a 14-hour period from 10:00 until midnight.

  A further warning for snow and ice across Scotland is in place from 01:00 until 13:00 on Tuesday, with up to 6cm (2in) on higher ground.

  A tree crashed into the garden of a house in the Garthdee area of Aberdeen

  Caledonian MacBrayne has cancelled ferries on all 28 of its routes for the rest of the day.

  CalMac operations director Robert Morrison told BBC Scotland it was unusual for a storm to be large enough to affect the whole network, but that it was not unprecedented.

  He said: "We are in the worst of winter weather conditions and will be probably for a few days more.

  "The Met Office forecast was for Storm Brendan to blow through within 14 hours, but the forecast for the coming days is also quite significant and we will have to keep a close eye on that.

  "Our main aim will be to try and offer our services where it's safe to do so, but only where it's safe to do so."

  Northlink Ferries also told passengers there may be disruption on services to Orkney and Shetland.

  The Aberdeen to Lerwick sailing scheduled for 19:00 has also been cancelled.

  The Met Office has warned of a "very windy period" beginning at about 10:00 on Monday.

  In the Garthdee area of Aberdeen one resident thought a branch had blown down when he received a mobile phone alert, triggered by his home CCTV system, at 16:34.

  But when Greg Paluch returned from work he was shocked to discovered a tree had fallen into his garden and landed just short of his front door.

  Mr Paluch, 35, said: "It could have been worse considering the height of the tree. But no one was at home and no one was hurt - that is the main thing."

  Waves have been crashing onto the shoreline in Troon

  The wild weather has also hit Stornoway

  The Met Office said people should expect:

  The lighthouse at Port Ellen in Islay was enveloped by waves

  Stormy seas have been whipped up at Ardrossan in North Ayrshire

  "The strongest winds are expected around exposed coasts and hills," the Met Office said.

  "Here gusts of 60-70mph are likely, with a few sites perhaps seeing gusts to 80mph - especially around Irish Sea coasts and around the west coast of Scotland where the strongest winds are most likely.

  "Gusts will be lower inland with 45-55mph likely. A narrow band of squally, heavy rain moving east, accompanying the strongest winds, may be an additional hazard."

