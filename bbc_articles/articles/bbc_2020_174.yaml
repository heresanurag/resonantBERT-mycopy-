  Floodgates are being delivered to homes and businesses in Stonehaven, Aberdeenshire, ahead of expected localised flooding.

  Doors and windows have been blocked off in the town's High Street as a precaution.

  In Orkney, Kirkwall's harbour front flood gates will be put in place in response to the latest weather forecasts.

  No trains are running through Saltcoats in North Ayrshire, with replacement buses in operation between Kilwinning and Largs via Ardrossan Princes St.

  Storm Brendan's name was picked by the Irish meteorological service Met Éireann.

  In December, Storm Atiyah swept into the UK, leading to power cuts and travel disruption in Wales and the south west of England.

  This year's storm names have already been chosen with Ciara the name for the next storm.

