  Restrictions have been placed on several bridges because of high winds, with the Cromarty, Dornoch, Skye and Kessock bridges among those closed to high-sided vehicles.

  As part of preparations for the storm, Comhairle nan Eilean Siar (the Western Isles council) closed all its schools to pupils for the day.

  Sepa issued its flood warnings and alerts amid concerns about disruption in coastal areas.

