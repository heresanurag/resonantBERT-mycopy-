content: |-
  Lewis Hamilton is preparing for his last weekend with Mercedes and says his final year at the team has been "very emotional".

  Hamilton has struggled to 'handle emotions' in 2024

  Hamilton has won 84 grands prix during his 12 years with Mercedes

  Lewis Hamilton says he has struggled with his emotions during his final season with Mercedes but ultimately wants to end his 12-year career with the team "the right way". The 39-year-old has signed a multi-year deal to join Ferrari in 2025 and will take part in his last race for the Silver Arrows in Abu Dhabi this weekend. Hamilton secured six of his record-equalling seven drivers' championships with the team but has found it difficult to replicate that same form since losing out on a historic eighth title in 2021. "It's been a very emotional year for me and I don't think I've been the best at handling my emotions this year," said Hamilton on Thursday. "You've seen the best of me and the worst of me, but I'm not going to apologise as I'm human."

  Following the controversial climax to the 2021 season at Yas Marina, Mercedes have fallen behind rivals Red Bull, McLaren and Ferrari in the constructors' standings. In Qatar last week, Hamilton commented that he was "definitely not fast any more" after a disappointing performance in sprint qualifying. He did end his winless drought with a stunning victory on home soil at Silverstone in July, but it was 10 races in before he stood on the podium with a third-place finish in Barcelona. The shock announcement that Hamilton would be switching to the Italian team next year was made before the start of the season, with the Briton describing his first meeting afterwards with team principal Toto Wolff as "awkward". "Ultimately I anticipated it would be difficult but massively underestimated how difficult it would be," he added. "Realising these are the last moments with the team, it's hard to describe the feeling - not the greatest of course." However, he says there is much to look forward to as he embarks on a new chapter with the Scuderia. "It's a dream scenario for any driver [joining Ferrari]," Hamilton said. "But it's not an easy step to join a new team, it takes time to build relationships and learn the tools." Hamilton is seventh in the drivers' championship, 24 points behind team-mate George Russell in sixth, and said of this weekend: "These days will be super emotional."
