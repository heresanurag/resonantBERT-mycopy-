title: 'Rugby World Cup: Relive all flashmobs by Wales'' fans - BBC News'
date: '2023-10-13'
section: General
url: http://www.bbc.co.uk/news/uk-wales-67095753
content: |-
  Singers have proved a hit in Bordeaux, Nice, Lyon and Nantes as Wales fans follow their team.

  A roving choral flashmob has been striking in French cities during the ongoing Rugby World Cup.

  The singers have been seen and heard in Bordeaux, Nice, Lyon and Nantes as they follow Wales during the tournament.

  Now fans are being urged to join them in Marseille before the quarter-final against Argentina.

  Organiser, Huw Davies, said he had been "blown away" by the positive reaction.

  He said: "It's what we do. It's part of our soul, singing."
