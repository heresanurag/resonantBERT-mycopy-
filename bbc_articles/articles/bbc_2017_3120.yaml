id: bbc_2017_3120
title: Thailand displays biggest ever haul of pangolin scales - BBC News
date: '2017-02-02'
section: General
url: http://www.bbc.co.uk/news/world-asia-38840930
content: |-
  Thai customs officials have seized their biggest ever haul of smuggled pangolin scales, after a crackdown on illegal wildlife trade.

  The scaly mammals are illicitly transported from Africa to meet demand in Asia for their supposed medicinal value.

  This has led to their numbers falling drastically and all eight species are protected under international law.
