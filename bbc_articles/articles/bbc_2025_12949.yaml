title: Emily Maitlis stalker Edward Vines jailed for further breaches - BBC News
date: '2025-06-26'
section: Nottinghamshire
url: http://www.bbc.co.uk/news/articles/cwyrnd1per9o
content: |-
  The 55-year-old attempted to contact the broadcaster and her family from prison, a court hears.

  Edward Vines has repeatedly breached restraining orders to not contact the Maitlis family

  A man who was jailed for harassing broadcaster Emily Maitlis over several decades has been sentenced for breaching restraining orders while in prison. Edward Vines was found guilty of sending letters to the News Agents podcast presenter and her parents while serving at HMP Lowdham Grange in Nottinghamshire. The 55-year-old - who was representing himself but refused to attend his hearing after disengaging during his trial - was also found guilty of encouraging his brother to get in contact with the Maitlis family. Handing Vines a further five-year sentence at Nottingham Crown Court on Thursday, Judge Mark Watson described his offending as "an extreme case".

  Previous cases involving Vines have heard he developed a "fixation" with the former BBC Newsnight presenter after the pair met when they were students at the University of Cambridge more than 30 years ago. Vines was jailed for eight years in September 2022 after being convicted of eight counts of breaching a restraining order. The new five-year sentence will form an extension to the original term. The court heard more than 20 letters were intercepted over 10 months, which Vines had sent in his efforts to contact Maitlis and her family. He had been interviewed twice by police but still attempted to make contact, and also asked his brother to contact Maitlis's mother. In May he was found guilty of three counts of breaching the conditions of his restraining order, and found guilty of one attempted breach regarding his request to his brother.

