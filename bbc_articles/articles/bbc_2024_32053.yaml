  A selection of some of the most striking sports photographs taken around the world over the past seven days.

  Jake DeBrusk of the NHL's Vancouver Canucks battles in front of the net with Moritz Seider of the Detroit Red Wings for the rebound on a save by Ville Husso during the third period at Little Caesars Arena in Detroit. Vancouver defeated Detroit 5-4 in overtime
