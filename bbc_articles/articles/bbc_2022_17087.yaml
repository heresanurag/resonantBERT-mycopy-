title: Fireworks and flares after historic Morocco win - BBC News
date: '2022-12-06'
section: General
url: http://www.bbc.co.uk/news/world-63879596
content: |-
  The north African team beat Spain on penalties in their World Cup last 16 match.

  Moroccan fans in Doha and elsewhere are celebrating a historic win, after the north African team reached the World Cup quarter-finals for the first time.
