title: 'Australia 36-28 Wales: Wallabies clinch series in Melbourne - BBC Sport'
date: '2024-07-13'
section: Rugby Union
url: http://www.bbc.co.uk/sport/rugby-union/articles/c3gezd4ge5go
content: |-
  Wales suffer a ninth successive international defeat as Australia wrap up the series 2-0 in an eight-try thriller in Melbourne.

  Australia scrum-half Jake Gordon was named player of the match in the Wallabies' first-Test win in Sydney

  Wales suffered a ninth successive international defeat as Australia wrapped up the series 2-0 with victory in an eight-try thriller in Melbourne. Two tries from Filipo Daugunu, further scores from Jake Gordon and Allan Alaalatoa and 13 points from Noah Lolesio's boot helped Australia achieve a successful start to Joe Schmidt's era following the 25-16 win in Sydney last weekend. Wales responded with two tries from inspirational captain Dewi Lake, while wings Liam Williams and Rio Dyer also crossed. Warren Gatland's side rallied from a sluggish start as they slipped to a 17-0 deficit inside 25 minutes, but left themselves with too much work to do. Lake has been the Wales success story of this tour with his tries coming from rolling mauls, which have proved the tourists' most potent attacking threat. Wales produced some encouraging moments but were punished for indiscipline, individual mistakes and not taking opportunities they created in a match played in front of only a crowd of 21,392.

  Gatland will find himself under pressure because of the wretched recent record, with Wales having not won a Test match since the 2023 World Cup pool triumph against Georgia nine months ago. They are now just one loss away from equalling the nation's worst losing sequence of 10, under Steve Hansen between 2002 and 2003. This ninth defeat marks the longest number of matches without a Test win during Gatland's association with Wales, which first began in 2008, ended 11 years later and resumed before the 2023 Six Nations. Gatland has won only six of 21 matches since his return to the top job, with Wales finishing bottom of the Six Nations for the first time in 21 years. They have also slipped to 11th in the world rankings, their lowest ever position. Their miserable record against the Wallabies in Australia has also extended to 13 consecutive defeats, with no victory since 1969. While there is a tour match to follow against Queensland Reds in Brisbane next Friday, Wales do not play another international until Fiji arrive at Cardiff's Principality Stadium in November. That game launches an autumn schedule also featuring games against Australia and world champions South Africa, before Wales embark on a testing Six Nations campaign which begins against France in Paris, one of three away games in the tournament.

  Australia made one change with captain Liam Wright forced out through injury, which allowed number eight Charlie Cale to make his first international start, while Rob Valetini switched to blind-side flanker Wales made two personnel alterations with number eight Aaron Wainwright and wing Josh Hathaway injured. James Botham and Cameron Winnett came into the side as Taine Plumtree moved to number eight and Liam Williams to the wing. Wainwright was Wales' leading performer in his 50th international in Sydney and his absence because of a hamstring injury contributed to Gatland fielding his least experienced pack, who had just 112 caps between them. Australia captain James Slipper came into the game with 135 Test caps, 23 more than the entire Wales pack in Melbourne. After a tense beginning, Australia opened the scoring with a spectacular length-of-the-field try by wing Daugunu. It was started by Andrew Kellaway, who gathered his own chip ahead of Winnett and released Fraser McReight, who calmly found the supporting Daugunu. Lolesio converted and slotted over a penalty before Wales fly-half Ben Thomas missed a simple kick. The tourists created a first attacking chance for Botham, who was tackled into touch, before Plumtree was held up over the Australia line following a lost home line-out. Winnett dropped a high ball to allow Wallabies scrum-half Gordon to cross for an opportunist score with Lolesio converting to open up a 17-point lead.

  Wales responded through a driving maul with Lake powering over and Thomas converting before Lolesio kicked a second penalty. Wales lost prop Archie Griffin to a head injury assessment after he was the victim of a shoulder to the head by Australia lock Lukhan Salakaia-Loto, who was shown a yellow card. Lake turned down a kick at goal to go for the corner to attempt to score a try and he was rewarded for his bravery with Thomas converting. A huge Valetini tackle forced a penalty which Lolesio was successful with to give Australia a nine-point half-time lead. With Griffin returning to the field, Wales rallied after the break with some patient build-up before wing Williams crossed in the opposite corner with Thomas' conversion reducing the deficit to two points. More Wales indiscipline relieved pressure and replacement prop Alaalatoa crossed for his first Test try. Daugunu was gifted a second score after Williams tried to keep the ball in play, only to guide possession into the hands of the advancing Australia wing. Wing Dyer produced a sensational finish to bring Wales back into the game and their hopes improved thanks to Sam Costelow's touchline conversion. Wales had another attacking chance, but their line-out failed them at a crucial time with replacement hooker Evan Lloyd failing to find Cory Hill. Australia's Ben Donaldson kicked a late penalty to ensure it was Slipper lifting the James Bevan Trophy.
