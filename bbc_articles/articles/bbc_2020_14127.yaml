title: 'Covid: Pub alcohol ban sees barrels of beer poured away - BBC News'
date: '2020-12-05'
section: Wales
url: http://www.bbc.co.uk/news/uk-wales-55193395
content: |-
  The new restrictions have been described as "a devastating hammer blow" to the hospitality industry.

  City centre streets were deserted after the ban closed pubs and restaurants

  Barrels of beer are being poured down drains as Wales' hospitality industry prepared for the alcohol ban to come into force.

  Pubs, restaurants and cafes are banned from serving alcohol from Friday evening and must close at 18:00 GMT, other than for takeaway service.

  Businesses said it was "a devastating hammer blow" after going to lengths to keep customers safe.

  They said the restrictions will also significantly impact the supply chain.

