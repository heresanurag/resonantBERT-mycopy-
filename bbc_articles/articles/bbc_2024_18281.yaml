content: |-
  NI's chief constable condemns race hate attacks and trouble in which officers were injured in Londonderry.

  'We will not allow hatred and mindless violence to win'

  Petrol bombs and fireworks were thrown at police lines in Londonderry on Saturday

  People involved in recent violence must not be allowed to win, the Police Service of Northern Ireland (PSNI) chief constable has said. In a statement, Jon Boutcher condemned both trouble associated with anti-immigration protests and violent clashes after a parade in Londonderry. Twenty officers in total had been hurt during the police operations, he added, with a male officer sustaining a broken leg and a female officer needing treatment for a severe facial injury. Ten of them were injured as police were targeted with petrol bombs, fireworks and stones at Nailors Row in Derry on Saturday.

  The trouble involved mostly nationalist youths and lasted for a number of hours following a peaceful Apprentice Boys Relief of Derry demonstration. A 46-year-old man has been charged with disorderly behaviour following the trouble and is expected to appear in court in September.

