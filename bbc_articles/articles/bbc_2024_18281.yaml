  Eileen, who lives nearby, told BBC News NI she was worried about elderly neighbours and explained people in Derry were "angry" at the rioters. "The people I have been talking to today when I have been out, they have been really annoyed about it all," she said. "Like me, they don’t want it. We just don’t need it." In his statement, Mr Boutcher said: "I want to be very clear, this would not be acceptable elsewhere and it is not acceptable here." He added he would be seeking the maximum sentences against those convicted of attacking police. "We will not simply stand here and accept this." Reflecting on race hate violence and attacks on businesses over the past week, he explained: "I have made clear that the intimidation of our diverse communities will not be tolerated and neither will assaults or violence against my police officers." A number of homes and businesses associated with ethnic minorities in Northern Ireland have been targeted since an anti-immigration protest was held in Belfast on 3 August. Twenty-six people are facing charges in connection with the disorder.

  The chief constable's condemnation echoed earlier comments by Northern Ireland's first and deputy first ministers on Sunday. Michelle O'Neill and Emma Little-Pengelly said the incidents, which included a petrol bomb and graffiti attack on a mosque in Newtownards on Saturday, were "wrong, unacceptable and are rejected by the vast majority of our community". They added the attacks were "disgraceful manifestations of criminality and have absolutely no justification". “Our thoughts are with those PSNI officers injured last night and the victims of recent racist attacks. “This senseless violence and intimidation has no place in our society and we would appeal for calm." Ms O'Neill and Ms Little-Pengelly added: "Those responsible should be quickly brought before the courts and we urge anyone with information to provide it to the PSNI.”

  Officers maintained a heavy presence in the area on Saturday evening

  A PSNI statement on Saturday night said the trouble in Londonderry presented "a serious risk to the safety of residents in the area". Up to 50 young people were involved and some of those taking part in the disorder appeared to be young boys. Officers asked parents and guardians to take their children home. The Police Federation for Northern Ireland (PFNI), which represents rank and file officers, also urged parents to ensure their children were not caught up in violent unrest. "What we saw was PSNI vehicles being petrol bombed by children," said its chairman Liam Kelly. “Children should not be taking part in street disturbances. Their parents have a responsibility to keep them safe and away from violent disorder. "What I have to ask is where were their parents?"

  Discarded fireworks and spilled paint are seen close to where the disorder took place in Derry

  BBC News NI's Dean McLaughlin, reporting from the area, said the police helicopter monitored the situation and a public announcement was made asking the crowd to disperse. He added that about 10 PSNI Land Rovers and police dogs were at the scene, while a small fire was started on Nailors Row. Some residents on Bishop Street had to leave their homes during the disorder.

  The Northern Ireland Secretary Hilary Benn said he was "appalled" at the attacks on police. "My thanks to the PSNI for working to keep people safe and our thoughts are with the officers who were injured," he added. Foyle MP Colum Eastwood also described the disorder as disgusting and said that "putting children in this position is nothing short of child abuse". Sinn Féin councillor Sandra Duffy called the attacks on police a "disgrace" and appealed for those involved to stop. "They are in stark contrast to the hugely positive work and positive community events taking place across the Bogside this week," she said.
