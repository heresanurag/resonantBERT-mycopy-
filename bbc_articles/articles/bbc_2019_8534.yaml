id: bbc_2019_8534
title: Violent storm leaves seven dead - BBC News
date: '2019-07-11'
section: General
url: http://www.bbc.co.uk/news/world-europe-48948253
content: |-
  Seven people, including six tourists, have been killed in a violent storm that swept across a region of northern Greece.

  Gale-force winds, heavy rain and hailstorms lashed Halkidiki, near the city of Thessaloniki, late on Wednesday, officials say.

  A state of emergency was declared and more than 100 rescue workers deployed.

  Footage of the storm was filmed as some people took shelter in a bar.
