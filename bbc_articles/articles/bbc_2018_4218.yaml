id: bbc_2018_4218
title: Twenty dead in attempted breakout from Brazil prison - BBC News
date: '2018-04-10'
section: Latin America & Caribbean
url: http://www.bbc.co.uk/news/world-latin-america-43720605
content: |-
  The attempted breakout at a jail in Belem was aided by an armed group which tried to blow up a wall.

  The entrance of the Santa Izabel prison complex

  A number of inmates at a jail in the northern Brazilian city of Belem have died during an attempted mass breakout.

  They were aided by an armed group outside the jail which used explosives against one of the prison walls.

  One guard died, as well as 19 prisoners and those helping them from outside.

  The fighting at the Santa Izabel Prison Complex outside Para's state capital had been as intense as in warfare, the state security service said in a statement.

  Four other guards were injured, including one seriously.

  The security service said the prison guards took on attackers from both inside and outside the prison.

  The authorities are now trying to determine if any of the prisoners managed to escape.

  Last year 56 people were killed in an uprising in a prison in the city of Manaus in Brazil's Amazon region.

  Prison guards took on attackers from both inside and outside the prison.
