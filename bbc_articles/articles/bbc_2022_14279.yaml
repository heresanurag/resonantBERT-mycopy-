title: Biggest interest rate hike in decades as Bank warns of long recession - BBC
  News
date: '2022-11-03'
section: Business
url: http://www.bbc.co.uk/news/live/uk-63431894
content: |-
  The Bank of England raises rates to 3% to tackle soaring inflation, and forecasts a "very challenging" two-year recession is to come.

  The UK’s standing has been damaged by the government's mini-budget, the governor of the Bank of England has told BBC News.

  Andrew Bailey says it is now up him and other policy makers to “roll up our sleeves up and demonstrate UK policy making is back in action".

  Quote Message: It is easier to lose confidence, it takes longer to regain it - the UK’s position was affected. It was very apparent the UK’s position, the UK’s standing had been damaged." It is easier to lose confidence, it takes longer to regain it - the UK’s position was affected. It was very apparent the UK’s position, the UK’s standing had been damaged."

  Bailey adds the British economy, along with other countries, has been "hit by a huge shock" - but also says he believes stability has returned to the financial markets.

  He acknowledges that the less worth off will be hardest hit as they spend a greater amount on essentials like food and fuel.

  The Bank has predicted the unemployment rate would double by 2025.

  Bailey also admitted that to the recovery would not be a quick one and "it is going to be a long haul out" of the poor economic situation.

  He says the UK labour force is now smaller than it was in 2019 but predicts the UK economy will emerge from the predicted recession.

  Quote Message: We will get out of it, that I can assure you – we will bring inflation down, we will restore growth in this country." We will get out of it, that I can assure you – we will bring inflation down, we will restore growth in this country."
