  A vehicle pulling a trailer full of the Christmas dinner vegetable overturned in Queensferry Road in Rosyth.

  This video can not be played To play this video you need to enable JavaScript in your browser. Thousands of Brussels sprouts covered the road and pavement

  A trailer full of Brussels sprouts has spilled over a road and pavement in Fife.

  The vehicle pulling the trailer full of the Christmas dinner vegetable overturned in Queensferry Road in Rosyth at about 10.45.

  Police Scotland said it had closed the road and was urging drivers to avoid the area.

  A spokesman tweeted: "There's been a bit of a BrusselSprouts accident at the roundabout at Admiralty Road."

  The tweet added: "Please avoid the area if possible. Traffic and Christmas dinners may be affected. Apologies for any delays."

  There are not thought to be any injuries.

