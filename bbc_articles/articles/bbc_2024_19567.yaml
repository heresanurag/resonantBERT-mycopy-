title: Influencers swarm DNC as Democrats' election secret weapon - BBC News
date: '2024-08-22'
section: General
url: http://www.bbc.co.uk/news/videos/c9v8d2dxmwgo
content: |-
  Content creators get insider access - and the campaign's message is delivered unchallenged to hard-to-reach voters.

  For the first time, more than 200 content creators have been invited to the Democratic National Convention, where they've been granted exclusive access to the party's biggest names.

  Most of them are young political activists, using social media to reach young voters - often pushing the Harris campaign's message without challenge.

  The BBC's Ione Wells speaks to influencers on the floor of the arena in Chicago.
