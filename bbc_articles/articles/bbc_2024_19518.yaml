  Former First Lady Michelle Obama got a lengthy standing ovation as she told delegates she thought "something magical was in the air".

  Former First Lady Michelle Obama got a lengthy standing ovation as she appeared at the Democratic National Convention.

  "Hope is making a comeback," she told delegates as she urged them to throw their weight behind presidential nominee Kamala Harris.
