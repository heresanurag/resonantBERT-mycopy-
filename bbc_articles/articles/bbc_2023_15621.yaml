content: |-
  Communications go down in Gaza, leaving residents uncontactable. Hamas says clashes are taking place in northern areas.

  As we've reported, communications in the Gaza Strip collapsed earlier this evening.

  But an Al Jazeera reporter in the southern Gazan city of Khan Younis, Tareq Abu Azzoum, has been able to deliver sporadic segments to his TV station via digital satellite.

  Speaking to camera, he said that he couldn't tell whether his producers or the studio could hear him: "We are talking now without having any kind of contact with the newsdesk... We might even lose this contact at any moment."

  Quote Message: "If you can hear us, send out that message to the world - that we are isolated in Gaza. We don't have any phone signal, we don't have any internet connection, we had difficulties even contacting our relatives in different parts of the territory. "If you can hear us, send out that message to the world - that we are isolated in Gaza. We don't have any phone signal, we don't have any internet connection, we had difficulties even contacting our relatives in different parts of the territory.

  Quote Message: What the Gaza Strip is witnessing right now is massive deterioration. We are talking about more than 2.3 million Palestinians now isolated from the world. They are unable to communicate with their relatives or with each other." What the Gaza Strip is witnessing right now is massive deterioration. We are talking about more than 2.3 million Palestinians now isolated from the world. They are unable to communicate with their relatives or with each other."
