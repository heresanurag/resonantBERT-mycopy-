title: Cara Delevingne's LA mansion gutted by fire - BBC News
date: '2024-03-16'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-68584921
content: |-
  The model and actress was not at home at the time, but two other people were injured.

  Two people were injured when a huge fire tore through Cara Delevingne's Los Angeles mansion.

  Emergency services said it took nearly a hundred firefighters two hours to get the blaze under control.

  The model and actress was not at home at the time.
