title: Euro 2024 - England face Slovenia with points to prove - BBC Sport
date: '2024-06-25'
section: England Men
url: http://www.bbc.co.uk/sport/football/articles/cgrrrlpv442o
content: |-
  It is time for England to show why they were the pre-tournament favourites at Euro 2024, writes Phil McNulty.

  Harry Kane scored his first goal of the tournament against Denmark before being substituted

  After eight years in the job, England manager Gareth Southgate has plenty of practice in blocking out the noise and criticism that is currently being aimed in his direction after a mixed start to Euro 2024. He accepts, however, that the contentious conversation provoked by England’s dismal showing in the 1-1 draw with Denmark in Frankfurt will only end if those words are replaced by actions against Slovenia in Cologne on Tuesday. England have already reached the last 16 but can secure top spot in Group C - and avoid a knockout tie against Germany - with victory on Tuesday. However, a convincing performance is also important to stem growing doubts about their status as pre-tournament favourites following a patchy performance in beating Serbia 1-0 then a virtual no-show against the Danes. Southgate says he had not heard the colourful one-word verdict of former England striker Gary Lineker after the Denmark game until told about it when he arrived for media duties before their final Group C game. "I take myself out of it," said Southgate. "I'm oblivious to it. It's not important to me at all. "I don't need to listen to externals because I'm my own biggest critic and I think most of the players are as well."

  The mood in England's camp before meeting the Slovenians was one of calm but also with a definite edge after the fallout from the Denmark draw. England cannot slip up against a Slovenia side ranked 57th in the world. The siege mentality is one of sport's oldest motivational tools but must be backed up with results. England's players can rail at criticism all they want but the best way to silence disapproving noise is to perform as they have shown they can in the past. Southgate recognised as much, saying "I can talk all I like but we have to produce it on the pitch" before adding "I'm expecting we will do that against Slovenia". England's manager and his staff will have had five days to transform his side into one capable of justifying its rating as a pre-Euro 2024 favourite. He is expected to bring in Chelsea’s Conor Gallagher for Trent Alexander-Arnold, ending that brief flirtation with the Liverpool right-back in midfield - an experiment surely better road tested before Euro 2024 than during it. It is likely to be the only change and perhaps not enough to satisfy those calling for a shake-up after Denmark, with Gallagher grateful for the opportunity after failing to make an impact in that game other than picking up a yellow card. If anyone was expecting Southgate to panic and shuffle his pack, they will be sorely disappointed. He appears wedded to his current system, banking on the talent at his disposal to provide solutions.

