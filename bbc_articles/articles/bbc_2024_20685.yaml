content: |-
  A town is "still in shock" a week on from a stabbing that killed three children and injured others.

  A town in mourning - but its spirit is not broken

  Hundreds of people blew bubbles into the air amongst floral tributes left outside the Town Hall in Southport

  Crowds have gathered at a vigil in Southport in remembrance of the three girls killed in a stabbing attack at a children's holiday club. Bebe King, six, Elsie Dot Stancombe, seven, and Alice Dasilva Aguiar, nine – were killed as they attended a Taylor Swift-themed dance class, and ten others were seriously injured. Children blew bubbles and laid flowers, teddies and heart-shaped balloons in a tribute to the victims. Meanwhile, the cousin of Leanne Lucas, the yoga teacher who was critically injured in the attack, has told the BBC he thinks the protests and riots that have followed across the country should stop and are "disgusting".

  The cousin of Leanne Lucas said the riots were "disgusting" and called on the offenders to stop

  Chris Rimmer said: “Why riot? It’s not going to help." Just one week ago, it was a Monday like most others in a quiet seaside town in the north-west of England. For the school children who live in Southport, it was the start of the summer holidays, and one group of young girls were excited to attend the dance workshop in a studio tucked behind a typical residential street. But just minutes before the class was due to end, an incident so horrific was about to occur, that would change the lives of this community forever. Now, a week later, the streets are not filled with children enjoying their summer of fun - the scribbled chalk no longer used for hopscotch. Instead the names of the little girls who just wanted to dance are etched on the streets lined with floral tributes as a bubble blowing event has taken place in their memory and the town comes to terms with its shock and is consumed by grief. Southport has shown its compassion, its kindness and its willingness to come together over the past seven days. Hundreds of flowers, plants, teddy bears, bracelets and messages have been left on Hart Street, where the attack took place. Tributes also lie in front of the Atkinson Theatre on Lord Street as more mourners, united in their collective grief, come to pay their silent respects to the small town.

  Crowds gathered in remembrance of the victims of the stabbing attack last Monday.

  Andrew Brown, who runs community group Stand Up For Southport, said the town had a "massive healing process" to go through with more "trauma" to come. He said the community was still in shock and would be for a "very long time" but the incident was a once-in-a-lifetime event and the community kindness shown over the past week had been "incredible". Mr Brown, a former editor at the Southport Visiter, said: "It is an incredible sight, there's so many nice things because Southport is such a kind town." From neighbours taking in tributes to protect them from the rain, to those tending to the plants and popping bouquets of flowers in water, as well as the children making friendship bracelets and writing messages to all those affected, the town has shown its community spirit is not broken.

  Elsie Dot Stancombe, seven, Alice Dasilva Aguiar, nine, and Bebe King, six, died in the attack

  Mr Brown said: "One woman who lives in the house on Hart Street where all the flowers are outside her home, she lit up her tree pink and its a beautiful memorial." However, he said the town still had a huge amount of trauma to come. "You still have got the court cases, all of these children who are still in Alder Hey Hospital yet to come home, I can't imagine what injuries they have or how long there recovery is going to be. "I can't even bear to think about the funerals of the three children, the inquest, there is so much still to come and I think Southport is still deep in grief. "It's a small town but it's a very friendly town, lots of families, and a lot are finding it hard."

  A community has been left in shock after a knife attack saw three little girls killed

  Floral tributes are continuing to be left following the death of the three school girls

  Mr Rimmer said the community tributes, flowers, vigils and support had given his family "strength" this last week. "It means so much to the family," Mr Rimmer added. "It’s amazing, it’s wonderful to see. It puts a smile on my face every day." Violence erupted on the Tuesday following the attack in the Merseyside seaside town, with police blaming far-right groups, and it has since spread to other towns and cities across England. False claims were spread online that the person responsible was an asylum seeker who had arrived in the UK by boat and a Muslim. Axel Muganwa Rudakubana, from Banks in Lancashire, has been charged with three counts of murder, 10 attempted murders and possession of a curved kitchen knife. The 17-year-old, who was born to Rwandan parents in Cardiff and moved to the Southport area in 2013, has no known links to Islam.

  One children remains in hospital following the knife attack

  Over the past week riots have broken out in towns across the UK, with a number of buildings targeted and assaults taking place in Liverpool over the weekend. Mr Brown said Southport should not be associated with the disorder being shown. "People certainly don't need the rioting, because all that matters is the families of the three children who have died and the families who are in hospital and everyone else who was there".

  Meanwhile, a Warrington-based charity working to resolve conflicts across the UK said, now more than ever, peace building is needed in the country. Colin Parry, OBE, chief executive officer of the Tim Parry Johnathan Ball Foundation - established as a living memorial to two children, Tim Parry and Johnathan Ball, who were killed by an IRA bombing in Warrington in 1993 - said the Southport families would be feeling a "whole mix of emotions".

  Floral tributes are placed in a picture of Elsie Dot Stancombe outside the Town Hall in Southport

  Mr Parry told BBC Radio Merseyside: "There will be a whole mix of emotions from total sadness, to bewilderment that their child should be one of the very unfortunate ones whose life was taken. "Immediate family and friends are so important to wrap around these people, so they don't feel alone." He said he was impressed by the "spirit of togetherness" by the community of Southport but added that the use social media was a rising concern following the recent riots. He said government intervention in the national curriculum was needed so children could learn from an early age that "fighting and falling out over faith, colour, religion, football team, isn't the way to a happy life". Mr Parry said it was the age group of the girls who lost their lives that they hope their charity could make a difference with.

  The bubble blowing event in Southport gave children a chance to "blow kisses to heaven"

  The bubble blowing event being held outside The Atkinson for the community, and in particular for children, to "blow kisses to heaven" in memory of the three girls, Mr Brown said. He added: "Children are going to go back to school in September and their classmates are going to be missing, so it's a hard one to talk about it, which is why these community events are important. "No one wants children to be locked away over the summer holidays. "I've never seen anything like this in my lifetime and I hope to never see it again, you want children and families to feel safe and it is understandable that many won't." Kylie Clift said she organised the event so "our children" can grieve too. She said: “I have been donated hundreds of bubbles from various local shops, arcades, charities and even from families of the victims themselves. “There will be time to take a moment and remember those we’ve lost and those who still continue to fight."
