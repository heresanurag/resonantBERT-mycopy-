title: 'Brexit: Labour seeking to block no deal - BBC News'
date: '2019-06-12'
section: UK Politics
url: http://www.bbc.co.uk/news/uk-politics-48598760
content: |-
  The party is trying to force a vote which would take control of Commons business away from the government.

  This video can not be played To play this video you need to enable JavaScript in your browser. Sir Keir Starmer describes his motion as a "safety valve” in the Brexit process

  Labour has tabled a cross-party motion to try to stop a future prime minister pushing through a no-deal Brexit against the wishes of MPs.

  The party is trying to force a vote to give MPs control of the timetable on 25 June and thereby the power to introduce legislation to avoid no deal.

  Labour's Keir Starmer said it was a "safety valve", but Brexit Secretary Stephen Barclay criticised the plan.

  Some Tory leadership hopefuls have said they would leave the EU without a deal.

  Michael Gove said Labour's plans "must be resisted", as while he would prefer to agree a plan with the EU, "we must not rule out no deal."

