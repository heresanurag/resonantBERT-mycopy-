title: Swansea woman charged with murder of six-year-old boy - BBC News
date: '2024-09-01'
section: Wales
url: http://www.bbc.co.uk/news/articles/cx284j9we0xo
content: |-
  Karolina Zurawska, 41, is due to appear before magistrates accused of murdering Alexander, six, in Gendros.

  Alexander was a kind, helpful and clever boy, his family said

  A 41-year-old woman has been charged with the murder of a six-year-old boy. Karolina Zurawska was arrested on Thursday after officers were called to Cwm Du Close in the Gendros area of Swansea during the evening. South Wales Police confirmed she has since been charged in connection with the death of a boy named as Alexander Zurawski. She has also been charged with attempted murder involving a 67-year-old man earlier on the same date. She will appear at Swansea Magistrates' Court later on Monday.

  The force said it was not looking for anyone else in connection with the incident. It previously said Karolina Zurawska and Alexander lived together. Ch Supt Chris Truscott, divisional commander for Swansea and Neath Port Talbot, said it was "a distressing incident" which had been "a tremendous shock to the local community". He added a police presence would remain in the area over the coming days to provide advice and reassurance.

  Karolina Zurawska has been charged with the murder of a six-year-old boy in Swansea

  Paying tribute to Alexander, his family said he was a "very kind child" who was always well behaved and "never naughty". "He loved playing with his little sister and playing with his dog, Daisy," they said. "He was amazing [and] always helpful. Always eager to assist with cooking and cleaning." They added he was "very clever and mature for his age", with a "great understanding of facts" and spoke both English and Polish. Alexander attended Whitestone Primary School in West Cross, Swansea, where headteacher Bethan Peterson said he was "popular among his peers". “He was an extremely loved and popular boy... with all who knew him," she said. She added he was a "delightful, determined little boy whose tenacity and positive demeanour ensured his success in all he undertook". Ms Peterson said Alexander would be "sadly missed" and the school community was “devastated” by the news of his death. She added that support would be available to children and staff.
