title: 'Whaley Bridge: Farmer held over burglary shooting death - BBC News'
date: '2024-05-03'
section: Derby
url: http://www.bbc.co.uk/news/uk-england-derbyshire-68942085
content: |-
  The man is being detained on suspicion of murder following the shooting, the BBC understands.

  The man who died has been named locally as Marcus Smith

  A farmer is being questioned on suspicion of murder and attempted murder over the shooting of two men during a burglary in Derbyshire, the BBC understands. Derbyshire Police was called to reports of a burglary in Eccles Road, in Whaley Bridge, at 01:20 BST on Wednesday. Officers found a 19-year-old man with fatal gunshot wounds and another teen with a gunshot wound nearby. A man in his 50s was held on suspicion of murder and attempted murder. The man who died has been named locally as Marcus Smith, who lived nearby and played football for a local team. A tribute has been shared on social media by a pub, where he appeared as a DJ. The force said it was keeping an open mind about whether the incident was linked to a reported burglary at the property at about 15:30 BST on Tuesday.

  Police said the investigation would continue for "some time"

  People in the town told the BBC they have been left unsettled by Wednesday's events. Keely Tomlinson, 25, said: "I was shocked - you don't hear about things like that in Whaley. "Everyone is the same, everyone says they are scared. What are our children growing up into? "A lot of people like Whaley because it is a quiet area and not much happens here."

  Officers have been at the scene since early on Wednesday

  Fellow resident Dave Arnfield, 65, said the shooting was "totally unexpected". "Personally, from a resident's point of view, it is very sad someone has lost their life," he added. Simon Barnwell, 60, who lives in Eccles Road, said: "It's a bit of a shock. "It's a pretty quiet town really. You don't expect something of this magnitude anywhere - even in the centre of Birmingham or Manchester. "We had a break-in on Eccles Road but that was 10 years ago now and everyone has alarm systems and video doorbells nowadays." Police said investigations continued at two properties on Thursday.

  Snaking up out of Whaley Bridge, Eccles Road takes you high up along a ridge above the sleepy area and neighbouring Chapel-en-le-Frith, with stunning views. It's no wonder it's usually popular with cyclists, joggers and walkers. But not today, with police vehicles parked up firmly blocking off the single-track road. Officers on the cordon told me they expect this to be the case for several days. Down in the town centre, there is a real mixture of emotions being expressed - shock, sadness, but also a feeling that police will need to unpick what is clearly a complex situation.

  The force said the man arrested on suspicion of murder and attempted murder remained in custody. It said the seriously injured man, in his late teens, had been taken to hospital and arrested on suspicion of aggravated burglary. Another man, in his 20s, was arrested on suspicion of aggravated burglary after the vehicle he was travelling in was stopped on the A6 near Chapel-en-le-Frith on Wednesday afternoon. He remains in custody.

  The force has appealed for witnesses and information

  Divisional commander Ch Supt Dave Kirby said: "We appreciate the impact this incident is having on this small rural community and we'd like to thank local residents for their help with this investigation so far. "We are aware there has been some speculation locally around this and while we are in the early stages of the investigation, we believe this is a targeted incident. "At this stage we don't believe there is any wider risk to the public."

