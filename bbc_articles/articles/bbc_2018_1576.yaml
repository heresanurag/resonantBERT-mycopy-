content: |-
  Bronze medallist Billy Morgan carries the Great Britain flag at the Winter Olympics closing ceremony on Sunday.

  Billy Morgan, 28, was the oldest competitor in the men's snowboarding big air final

  Snowboarding bronze medallist Billy Morgan carried the Great Britain flag at the Winter Olympics closing ceremony on Sunday. Morgan, 28, won bronze in the men's big air on Saturday to take Team GB to their record tally of five medals. "I'm pretty nervous already thinking about carrying the flag but I'm sure it's going to be amazing," Morgan said. "It's an honour to be the flagbearer and I hope everyone is stoked because it's been a great experience out here." By claiming bronze Morgan became the first British man to win an Olympic medal on snow. "I still can't believe yesterday," Morgan said. "I never expected to win a medal before the contest and I keep forgetting I did it so it's nice to relive it now and then, which is pretty cool. "It's been a crazy Games for Team GB, our best ever, so I hope everyone can go home happy. It's been amazing for me and I'm just over the moon"

