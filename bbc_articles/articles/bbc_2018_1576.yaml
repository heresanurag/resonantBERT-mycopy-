  Team GB chef de mission Mike Hay said: "I don't think it was something he expected, or really knew about the protocol, but he's delighted. "I'm slightly worried that he gets the right stadium and carries the flag the right way, but I had a good chat with him and he is very humbled and taking it very seriously." Britain's tally of five medals at the 2018 Games took them past their previous best haul of four medals, achieved in 1924 and 2014. Lizzy Yarnold successfully defended her skeleton title to win GB's only gold while Dom Parsons and Laura Deas won bronze in the same sport. Teenager Izzy Atkin also won bronze in the ski slopestyle, Britain's first Olympic medal on skis.

