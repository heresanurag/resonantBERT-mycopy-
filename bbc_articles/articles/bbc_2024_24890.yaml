title: James Anderson has 'urge' to extend playing career - BBC Sport
date: '2024-10-13'
section: England
url: http://www.bbc.co.uk/sport/cricket/articles/cwylenm0yxpo
content: |-
  James Anderson says he has the “urge” to keep playing but is undecided on how he will extend his career.

  James Anderson played his final Test against West Indies at Lord's in July

  James Anderson says he has the "urge" to keep playing but is undecided on how he will extend his career. Anderson, England’s all-time leading wicket-taker, retired from Test cricket in July and has since been working as the team’s coaching consultant. In August he suggested he may explore franchise cricket, attracting interest from the United States, while the 42-year-old could also continue to play domestically for Lancashire. "I have got a couple of months to make a call on what I do next year but in my head I would like to," said Anderson. "I still feel fit, I still have the urge to get a ball in my hand, so I would like to give it a go. If anyone will take me is a different question altogether." Asked if he still has an "itch to scratch" as a player, Anderson told BBC Sport: "There definitely is for me. Whether someone else would like to scratch that itch for me is another question. "I do miss it and I do feel like I enjoy coming to the nets and getting the ball in my hand." Anderson has not played any white-ball cricket since 2019 and his last T20 match was in 2014. In his only outing for Lancashire in the County Championship last summer he took 7-35 against Nottinghamshire at Southport.

  He said he was not "not sure" if he would prefer to play red-ball or limited-overs cricket, but did confirm he would again be part of England’s coaching team for the Test series in New Zealand in November and December. Anderson joined England’s tour of Pakistan late, arriving for the second day of the first Test after playing golf in the Alfred Dunhill Links Championship. That move caused some debate, and head coach Brendon McCullum was prickly when answering questions about Anderson’s absence on the eve of the first Test, which England won. And Anderson said he was surprised at the attention the issue attracted. "I didn’t accept that invitation before speaking to Baz about it," he said. "I’m not full-time with England, I’m a consultant. He didn’t see an issue with it. "I was still in contact with the bowlers and in the end it didn’t really matter that I wasn’t here. I thought we bowled really well. I’m lucky that Baz is such an understanding fella. "The last few tours I went on we didn’t have a bowling coach. It is good for the lads to take some responsibility. In the end it didn’t matter did it?"
