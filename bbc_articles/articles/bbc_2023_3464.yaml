title: 'Junior doctors strike: A&E departments very busy, says NHS chief - BBC News'
date: '2023-03-13'
section: Health
url: http://www.bbc.co.uk/news/live/health-64934752
content: |-
  A senior manager says people are using hospitals as they would normally, putting pressure on casualty units.

  'A thank you from the government isn’t enough'

  She has helped saved hundreds of lives, attended more than 100 cardiac arrest calls, and works around 70 hours a week. Dr Amanda Baird earns £23 an hour and started working towards becoming a doctor at the age of 14. Now 27, she has completed five years at medical school and nearly five years as a doctor on the front line. She’s worked through Covid. She’s worked in Intensive care, and is now working towards becoming a consultant in Accident and Emergency. This is why she joined around 100 others outside Newcastle’s Royal Victoria Infirmary today, leaving behind her patients and senior doctors – consultants - to do the work of their striking juniors. The hardest part of Dr Baird’s job is when she and her colleagues can’t save the life of critically ill patients, especially when they are children. Working all through Covid too was tough. But she says the best part is when you bring a life back and the patient says “thank you” – it can “save our soul”. The government says the doctors' pay demand is unaffordable but could more recognition for the work they do help? “No” says Dr Baird, “a thank you from government isn’t enough.”
