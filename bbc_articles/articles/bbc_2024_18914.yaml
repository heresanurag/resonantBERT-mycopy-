title: Costa hot chocolate death due to allergy process failures - BBC News
date: '2024-08-17'
section: London
url: http://www.bbc.co.uk/news/articles/cy0ryvk4jj7o
content: |-
  The girl's mother accuses the food industry of treating allergy training as a "tick box exercise".

  Hannah Jacobs was at the dentist when she sipped her drink

  The mother of a girl who died after having a severe reaction to a Costa hot chocolate has accused the food industry of treating allergen safety training like a "tick-box exercise", after a coroner concluded she died because of a "failure to follow processes". "Vivacious and affectionate" Hannah Jacobs, 13, who had a severe dairy allergy and lived in Barking, east London, died within hours of sipping the drink bought by her mother on 8 February 2023. Assistant coroner Dr Shirley Radcliffe also found there had been "failure of communication" between the coffee shop staff and Hannah's mother Abimbola Duyile. Ms Duyile said there needed to be "better awareness" of allergies as the "consequence... is that my daughter is no longer here".

  Costa Coffee said: "The loss of Hannah is a tragedy, and our heartfelt thoughts remain with her family and friends."

  This video can not be played To play this video you need to enable JavaScript in your browser. Watch: A statement was read out on behalf of Hannah Jacobs' mother following the inquest

  In a statement, Ms Duyile said: "My beautiful Hannah only had 13 years on this earth when she should have had many, many more. "Hannah loved life. She was a vivacious, caring, affectionate, outspoken and energetic child with a strong sense of right and wrong." Ms Duyile continued: "Having heard all the evidence over the last week it is clear to me that although the food service industry and medical professionals are required to have allergy training, this training is really not taken seriously enough. "Better awareness is needed in these industries and across society of the symptoms of anaphylaxis." She added: "I have always been extremely diligent in managing Hannah’s allergies and she had never suffered a serious allergic reaction prior to this incident."

  East London Coroner's Court heard that on the day of her death neither Hannah nor her mother were carrying an EpiPen that had been prescribed. They had visited the Costa Coffee branch in Station Parade, Barking, owned and operated by a franchisee, to buy two soya hot chocolates before Hannah attended the dentist, which she had an appointment to visit before going to school. After getting to the dentist, Hannah "abruptly got up and went to the toilet and shouted 'that was not soya milk'", her mother told the inquest. The court heard standing up while having an allergic reaction could be detrimental and there would have been a need to lie the child down. Ms Duyile instead rushed Hannah to a nearby chemist as her "lips and mouth were very swollen and she was itchy". Hannah collapsed in the chemist and the pharmacist gave her an paediatric dose of an EpiPen injection in her leg. The inquest also heard there was a general shortage of EpiPens and that Zeenat Panirwala, a customer in the chemist who tried to resuscitate Hannah, also had allergies and had an EpiPen. Pharmacist Santokh Kahlon said he would "definitely" have used the extra EpiPen if he had known there was one. He told staff to look around to see if there were any EpiPens but none could be found. Attempts were made to resuscitate her and an ambulance was called, but she was declared dead by 13:00 GMT.

  A post-mortem examination found Hannah died after suffering from a hypersensitive anaphylactic reaction triggered by an ingredient in her hot chocolate that caused an allergic response. Barista Urmi Akter had told the inquest when she took the order from Ms Duyile she had repeated to her the request for a jug be washed out, but had also pointed out that hot chocolate is made from milk. The inquest also heard at the time of Hannah's death, allergen training for new Costa staff involved a series of online modules that could be accessed at home and a quiz that trainees had to pass. Concluding the inquest, Dr Radcliffe said: "The root cause of this death is a failure to follow the processes in place to discuss allergies combined with a failure of communication between the mother and the barista."

  Hannah Jacobs had a "a strong sense of right and wrong", her mother said

  The parents of a 15-year-old girl who died following a severe allergic reaction to a Pret a Manger baguette containing sesame have called for "urgent" government action to "improve understanding" of allergies across schools, businesses and society generally. Nadim and Tanya Ednan-Laperouse, co-founders of The Natasha Allergy Research Foundation, a food allergy charity, said: "We need urgent government action to improve understanding within schools, businesses and society that food allergies can be a serious, unpredictable health condition, not a lifestyle choice, and ensure people with allergies have access to joined up and timely NHS allergy care. "Today, along with Hannah's grief-stricken mum Abi and on behalf of other parents who have lost children to food allergies, we once again urge the government to appoint an allergy tsar - a national champion for the one in three people who live not just with food allergies, but all types of allergic disease including asthma and eczema."

  Hannah's mother bought the drink at the Costa Coffee branch on Station Parade in Barking

  A Costa Coffee spokesperson said: "Understanding how this awful situation occurred is in the interest of everyone - our franchise partners, our customers, our team members, and the communities of which we are a part. "We have listened to everything the coroner has said this week and will carefully consider her comments together with any report she may issue and respond appropriately." A Department of Health spokesperson said: "Our deepest sympathies are with the family and friends of Hannah Jacobs, and all those impacted by this case. "Department officials have been in ongoing discussions with the Natasha Allergy Research Foundation about improving support for people with allergies and ministers will carefully consider their views and any recommendations made by the coroner."
