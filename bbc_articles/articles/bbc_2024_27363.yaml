title: Voting ends for new Conservative Party leader - BBC News
date: '2024-11-01'
section: Politics
url: http://www.bbc.co.uk/news/articles/cx2dqzqx2y1o
content: |-
  Tory members have been choosing between Kemi Badenoch and Robert Jenrick to replace Rishi Sunak.

  Voting has ended in the marathon contest to replace Rishi Sunak as Conservative leader. The ballot of party members closed at 17:00 GMT. The winner will be announced on Saturday morning, almost four months after the Tories' crushing general election defeat which triggered Sunak's resignation. Conservative members have been choosing between former Business Secretary Kemi Badenoch and ex-immigration minister Robert Jenrick, after four other candidates were eliminated in a series of votes by the party's MPs. Badenoch is the favourite to win, but Jenrick insisted the contest was "close", saying "we're chasing down every vote". He also told the BBC the turnout had been low.

  Appearing on the Politics Live programme, he said he wanted "whoever is elected to have a mandate from the membership". Earlier this week, Badenoch also suggested there had been a low turnout, telling the BBC's Newscast podcast: "I'm doing more media this week specifically because people aren’t turning out to vote as much as we would have expected." Immigration, the economy, and how the Conservatives can rebuild trust with voters have been debated at length through the campaign. The party suffered its worst general defeat in its history in July as it was reduced to a record low of 121 seats in the House of Commons, with under 24% of the vote.

  Priti Patel, Mel Stride, Tom Tugendhat and James Cleverly spent the summer campaigning alongside the final two, after they put their names forward for leader. Patel and Stride were eliminated in September, followed by Tugendhat and Cleverly after the party conference in Birmingham. Cleverly was regarded as having performed best at the conference and topped the third MPs' ballot. But he was surprisingly knocked out when Tory MPs voted for the final time 24 hours later. Badenoch secured 42 votes, Jenrick 41 and Cleverly 37. A survey of Tory members by the ConservativeHome website last week suggested, external Badenoch led Jenrick by 55% to 31%, with a further 14% undecided. Jenrick, who resigned from Sunak's government in protest at its approach to tackling migration, put the issue at the centre of his leadership bid. He has called for a legally-binding cap on net migration, and for the UK to leave the European Convention on Human Rights which he argues has made it "impossible to secure our borders”. He has also repeatedly criticised Badenoch for refusing to set out detailed policies during the campaign. Jenrick told GB News the Conservatives "lost four million voters to Reform at the last election" and it was "going to take a lot" to persuade them to come back. “That's why I say we're going to have to change the party fundamentally, and this time actually deliver, because we didn't deliver on some of those big questions. “I think just saying that we will think this through, we'll come forward with policies in the months or years to come, isn't going to cut it." Badenoch has called for a return to core Conservative values, arguing the previous Tory government "talked right but governed left".

  She backs a smaller state with government doing "fewer things" but doing them better. And she has countered Jenrick's criticism of her by arguing that the party needs to first decide what it stands for. She told GB News: “We need to get back to first principles. We ended up talking about policy without rooting it in principles." Badenoch also condemned the Budget as one that would destroy jobs and lower wages. She described the government as “Jeremy Corbyn’s Labour with Keir Starmer fronting it”.

  Jenrick told Politics Live the Budget was "disgraceful" and voters were "furious" with its "dishonesty" after Labour's election promise not to increase taxes for working people. "Rachel Reeves is a compulsive liar," he said. In the same interview, Jenrick also hit back after Sir Keir Starmer warned MPs, including the Tory leadership candidates, they “can either support the police in their difficult work” on the Southport attack or “undermine” them. On Tuesday, it emerged that 18-year-old Axel Rudakubana, who is accused of murdering three young girls in the attack, had also been charged with production of the poison, ricin, and possession of a military study of the Al Qaeda training manual, an offence under terrorism legislation. Counter Terrorism Police are currently not treating the attack as a terrorist incident. On Tuesday, Jenrick suggested information about the attack had been "concealed", while Badenoch said the government, police and prosecutors had "questions to answer". Speaking on Politics Live, Jenrick said it was "quite wrong, anti-democratic that he [the PM] was able to make a political statement about this case, but those of us in Parliament, in opposition, were not able to question him". Sir Keir needed to say when he had learnt this information and, if it was months ago, to explain why he had not been "more open and honest about it", he added. "I'm merely asking the question. What I'm worried about here is permanent erosion in public trust in policing and the criminal justice system. And I'm worried we're in that place right now." Meanwhile, the two candidates have declared a further £112,500 in donations to their campaigns. Badenoch received £82,500, according to the latest register of MPs' interests, external, including £40,000 from billionaire Alan Howard. Jenrick declared two donations totalling £30,000. Over the course of the campaign, Jenrick has received a total of £480,000 while his rival has received £422,500.
