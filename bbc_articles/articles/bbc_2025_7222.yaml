  On Saturday, President Putin said there would be an end to all hostilities from 18:00 Moscow time (15:00 GMT) on Saturday until midnight on Sunday. Kyiv said it would also adhere. "For this period, I order all military actions to cease," Putin said in his announcement. "We assume that the Ukrainian side will follow our example. At the same time, our troops must be ready to repel possible violations of the truce and provocations from the enemy, any of its aggressive actions." However, Ukraine's President Volodymyr Zelensky said late on Sunday there had been a total of 1,882 cases of Russian shelling, 812 of which involved heavy weaponry, according to a report from Commander-in-Chief of the Armed Forces of Ukraine Oleksandr Syrskyi. The president said the heaviest shelling and assaults were in eastern Ukraine near the besieged city of Pokrovsk, a key logistics hub in the Donetsk region. "The nature of Ukrainian actions will continue to be mirrored: we will respond to silence with silence, our strikes will be to protect against Russian strikes," Zelensky said. Earlier on Sunday, he said "there were no air raid alerts today", referring to Russia's daily drone and missile strikes against Ukraine. He proposed "to cease any strikes using long-range drones and missiles on civilian infrastructure for a period of at least 30 days, with the possibility of extension". Zelensky also said Putin's declaration of a truce amounted to a "PR" exercise and his words were "empty". He accused the Kremlin of trying to create "a general impression of a ceasefire". "This Easter has clearly demonstrated that the only source of this war, and the reason it drags on, is Russia," the president said. The Russian defence ministry insisted its troops had "strictly observed the ceasefire". Meanwhile, Russian Foreign Ministry spokeswoman Maria Zakharova accused Ukraine of using US-supplied Himars missiles during the ceasefire. The surprise ceasefire announcement came shortly after Trump threatened to "take a pass" on brokering further Russia-Ukraine peace talks. However, a state department spokesperson said on Sunday Washington remained "committed to achieving a full and comprehensive ceasefire". "It is long past time to stop the death and destruction and end this war," the spokesperson added.
