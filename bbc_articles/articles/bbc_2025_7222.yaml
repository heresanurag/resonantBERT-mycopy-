title: Ukraine reports many Russian drone attacks after truce ends - BBC News
date: '2025-04-22'
section: Europe
url: http://www.bbc.co.uk/news/articles/cy5r9yppykeo
content: |-
  Air raid alerts are issued for Kyiv and other regions as blasts are reported in Mykolaiv, a southern city.

  Ukraine's military has reported Russian drone attacks on several regions overnight, just hours after the end of a 30-hour "Easter truce" declared by Moscow. Air raid alerts were issued by Ukraine's air force for the Kyiv region, as well as Kherson, Dnipropetrovsk, Cherkasy, Mykolaiv and Zaporizhzhia. In the southern city of Mykolaiv, Mayor Oleksandr Senkevych said "explosions were heard". It was not immediately clear whether there were any casualties. Russia's defence ministry confirmed it has resumed fighting, adding that its military had "strictly observed the ceasefire and remained at the previously occupied lines and positions".

  The truce declared by President Vladimir Putin expired at midnight on Sunday Moscow time (21:00 GMT). Both sides accused each other of violating the ceasefire thousands of times. Early on Monday residents in several Ukrainian cities, including the capital Kyiv, were urged by local authorities to go immediately to nearby shelters due to the threat of drone strikes. In the Kyiv region, local officials said air defence forces were "working on targets". Ukraine's air force also reported a "rocket danger" for central regions, and said Russian aircraft were "active in the north-eastern and eastern directions". In an update on Telegram, the air force said Russia launched 96 drones overnight, as well as striking the southern region of Mykolaiv two missiles and Kherson with a third missile. In Mykolaiv, regional head Vitaliy Kim said shortly afterwards that the city had been attacked by missiles. "There were no casualties or damage," he added. Several hours before the truce expired, Kremlin spokesman Dmitry Peskov said Putin had not given an order to extend it, Russia's state-run news agency Tass reported. The BBC has not independently verified the claims by Ukraine and Russia. US President Donald Trump - who has been pushing for an end to the war - said late on Sunday that "hopefully Russia and Ukraine will make a deal this week". He gave no further details.
  • None Rosenberg: Is Putin's 'Easter truce' cause for scepticism or chance for peace? Russia launched a full-scale invasion of Ukraine on 24 February 2022, and currently controls about 20% Ukraine's territory, including the southern Crimea peninsula annexed by Moscow in 2014. It is estimated that hundreds of thousands of people - the vast majority of them soldiers - have been killed or injured on all sides since 2022. Last month, Moscow came up with a long list of conditions in response to a full and unconditional ceasefire that had been agreed by the US and Ukraine.

