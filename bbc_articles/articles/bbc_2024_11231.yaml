title: Welsh Water fined for waste discharges into River Wye - BBC News
date: '2024-06-10'
section: Hereford & Worcester
url: http://www.bbc.co.uk/news/articles/ce77e65w741o
content: |-
  Welsh Water Ltd is found to have breached the legal waste limit three times in a 12-month period.

  Sewage waste was found to exceed the legal limit on three occasions between 2020 and 2021.

  A water company has been fined for polluting the River Wye. Welsh Water Ltd was ordered to pay £90,000 after the Environment Agency (EA) found water waste levels near Hereford exceeded the legal limit three times in one year in 2020 and 2021. Environmental rules state the company must not discharge concentrations of pollution over the regulated limit more than twice in a 12-month period. At Worcester Crown Court, the company was also ordered to pay costs of £14,085.

  On 8 August 2020 the levels from the Kingstone and Madley Sewage Treatment Works were recorded at 13 milligrams per litre and in May 2021 it was 74 milligrams per litre. On 19 June 2021 levels were recorded at 41milligrams per litre despite the legal limit being seven milligrams per litre. The court was told that it was extremely unusual to have this many breaches in a 12-month period. An EA report concluded that this showed "either poor operational management, inadequate asset provision or a mixture of both". Welsh Water said on the first two occasions they could not identify a "root cause" for the permit breaches. On the third occasion, the company said the breach had occurred during a "significant storm". Adam Shipp, for the Environment Agency who led the investigation, said: "Incidents like this are preventable and are completely unacceptable. "Water companies are aware that their activities have the potential for serious environmental impacts, and they know that we will take action when they cause pollution." A Welsh Water spokesperson said: “We take our responsibility for protecting the environment in our care seriously but on this occasion, we recognise we fell short and for this we are very sorry. “We self-reported the issue to the Environment Agency and we were fully open and transparent during their investigation. “We always do our best to minimise our impact on the environment by monitoring our assets and also investigating other sources of pollution whenever we identify them or they are reported to us.”
