content: |-
  The chief scientist on Nasa's InSight mission, Bruce Banerdt, says our understanding of Mars' interior is fuzzy.

  The chief scientist on Nasa's InSight mission, Bruce Banerdt, says our understanding of Mars' interior - its crust, mantle and core - is uncertain. He spoke with our correspondent Jonathan Amos.
