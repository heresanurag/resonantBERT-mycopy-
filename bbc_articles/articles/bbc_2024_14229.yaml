title: 'Newspaper headlines: ''Eternally in their debt'' and ''Camilla''s tears''
  - BBC News'
date: '2024-06-06'
section: The Papers
url: http://www.bbc.co.uk/news/articles/c2xxe202zg4o
content: |-
  Coverage of the D-Day commemoration dominates the front of Thursday's papers.

  'Eternally in their debt' and 'Camilla's tears'

  Several front pages feature the Queen with tears in her eyes during the commemoration of D-Day in Portsmouth. "Tears for our heroes" is the Sun's headline., external In an editorial the Express says the UK could have easily been crushed, external in World War Two by an evil empire that sought to enforce its will on the whole of Europe and beyond. The paper says the defeat of Nazi tyranny was only possible because of the courage and determination of those who fought against it. The Mirror says among the veterans returning to France for the anniversary is 100- year-old Brendan Morgan, who learned, on the voyage, that he'd become a great-grandfather again, external. The paper says his great-grandson is part of a new generation which will owe an eternal debt of gratitude.

  Writing in the Daily Telegraph, Jeremy Hunt says he is throwing down the gauntlet to the Labour leadership, external, in the form of a "Family Home Tax Guarantee". A Labour spokesman tells the paper these are "desperate claims" from Rishi Sunak and the Conservatives cannot be trusted on tax. The Daily Mail declares that the Tory election campaign has burst into life with Labour firmly on the "back foot", over taxes, external. The editorial claims that a Labour government at Westminster could follow the example of the Labour administration in Wales, which has, according to the paper, embarked on a shake-up of council tax "that could send bills spiralling for many." The Guardian and the Financial Times highlight Labour's accusation that Sunak lied when he said, in the TV debate on Tuesday, that Labour would increase taxes by £2,000 for working households. According to the Guardian, some Labour insiders were horrified at how slow Sir Keir Starmer was to challenge the claim, external. The FT says his allies say Starmer is a "polite, respectful man" and his approach came from a desire to "stick to the rules" of the debate and not talk over Sunak or the host Julie Etchingham. On its front page the Times says Sunak is to pledge the biggest overhaul of homicide laws in a generation, external, to ensure tougher sentences for domestic abusers. The paper says the Conservative manifesto will promise to increase from 15 to 25 years the minimum sentence for murders in the home. The changes could include the creation of US-style first and second degree murder charges. The Guardian highlights a study which suggests that conditions for the creation of life may have existed since close to the dawn of time. Observations from the James Webb space telescope are said to have found evidence that huge quantities of the element carbon were released, when the first stars exploded, three hundred million years after the Big Bang. The study's authors tell the paper it's a massive discovery, implying life emerged very early in the age of the universe. And finally the "I" says it's created a manifesto to rescue the UK's rivers and seas from sewage and other pollution, external, and it's asking all political parties to support the plan. The five key pledges include cutting sewage spills, giving regulators greater powers to punish water companies and funding farmers to improve water quality.

