  Speaking from the Vatican balcony just after being unveiled as the new pontiff, he paid tribute to his predecessor and called for unity.

  Speaking from the Vatican balcony just after being unveiled as the new pontiff, Pope Leo XIV paid tribute to his predecessor and called for unity.

  Robert Prevost, 69, was chosen following a two-day conclave in Vatican City, and is the first American to lead the Catholic Church.

  "Help us, and help each other, build bridges," he told the crowd of more than 40,000 people in St Peter's Square.

