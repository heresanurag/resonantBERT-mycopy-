content: |-
  Police appeal for more information after four people die at the scene of the crash.

  Four dead after vehicle crashes into building

  All four victims died at the scene on Saturday

  Four people have died after the vehicle they were in collided with a building. Police were called to Magdalen Street in Colchester at about 04:40 GMT to reports of a "serious" crash. Other emergency services attended and the road was closed throughout the day while the vehicle was recovered and inquiries were carried out. Temporary Assistant Chief Constable, Stuart Hooper, said: "My thoughts, and those of everyone at Essex Police, is with the friends and families of the four people who died this morning."

  Essex Police are appealing for more information about the crash to the south-east of the city centre

  The four victims died at the scene. Their families had been informed and would be supported by specialist officers, police said. Magdalen Street has reopened but some buildings were being assessed for structural damage.

  The fatal crash happened at about 04:40 GMT on Saturday

  Mr Hooper said: "I want to thank the businesses and residents in the Magdalen Street area for their support and understanding today in what has been a really difficult and tragic situation. "I always want to pay tribute to emergency services personnel who have worked diligently, professionally, and compassionately to ensure the dignity of those who have died. "Our inquiries to establish what led up to the collision are ongoing and I need anyone with information to contact us."

  Tributes have been left at the scene

  In a statement,, external Pam Cox, the Labour MP for Colchester, said she was "deeply shocked and saddened to hear the awful news". She said: "My heartfelt thoughts are with all those who knew and loved them."

