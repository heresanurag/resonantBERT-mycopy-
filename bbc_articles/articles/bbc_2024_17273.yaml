  The River Seine's water quality is being tested daily

  The men's triathlon was due to start at 07:00 BST on Tuesday, with the swimming leg taking place in the River Seine. But after swimming training for triathletes was cancelled on Sunday and Monday, tests revealed the water quality still did not reach the required standard. Heavy rainfall in Paris on Friday and Saturday has caused the water quality to diminish and the men's race has been put back to Wednesday at 09:45 BST. The women's event is due to start at 07:00 BST, but organisers say both races only have a 60% chance of going ahead. Friday remains a back-up date for both races and, as a last resort, organisers say the event could be contested as a duathlon - just the cycling and running legs. The Olympic surfing is being held in Tahiti, French Polynesia, but that has also been affected by bad weather, with Tuesday's sessions postponed because of adverse conditions.

  Team GB won medals in five of the six equestrian events at Tokyo 2020 but their preparations for Paris were jolted last week after a video emerged that showed Dujardin "excessively" whipping a horse. Britain's joint-most decorated female Olympian pulled out of the 2024 Games and was replaced by Moody, who made the most of her opportunity by topping her group with a score of 74.938 to qualify for Sunday's individual final. She is likely to be joined by fellow Briton Carl Hester, who missed out on automatic qualification by coming third in his group with a score of 77.345, but is well placed to make it through as one of six athletes with the next highest overall scores. Charlotte Fry - the world number three - starts her campaign as qualification continues on Wednesday at 10:00 BST. Team GB currently sit second behind Denmark in the team standings and are in strong contention to qualify for Saturday's final.
