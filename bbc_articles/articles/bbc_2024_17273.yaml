  British tennis great Murray has confirmed he will bring his magnificent career to a close following the Games and for the second consecutive match found himself one point away from retirement. Murray, 37 and partner Evans, 34, saved two match points in overcoming Gille and Vliegen to reach the quarter-finals - two days after saving five in their first-round win. After missing two match points of their own in the second-set tie-break, the British pair took their third in a see-saw first-to-10 match tie-break as Evans stuck away a volley. The pair jumped for joy before an elated, elongated embrace as Murray broke down in tears afterwards. They will be joined by Spanish Grand Slam-winning pair Carlos Alcaraz and Rafael Nadal in the last eight after they defeated the Netherlands' Tallon Griekspoor and Wesley Koolhof, while in the women's doubles Britain's Heather Watson and Katie Boulter won their first-round tie. Team GB's hopes are over in the men's singles, however, after Jack Draper lost 6-7 (3-7) 6-3 6-2 to American seventh seed Taylor Fritz in the second round.

  This video can not be played To play this video you need to enable JavaScript in your browser. 'Fabulous' Biles floor routine wraps up the gold for Team USA

  Biles is one of the true global stars at the Paris Olympics with her status underlined by the celebrities who were in attendance to watch her at the packed Bercy Arena, including fellow sporting greats Serena Williams and Michael Phelps. The 27-year-old went into the event as the world's most decorated gymnast, with 37 world and Olympic medals, before adding to her total with a dazzling performance across each rotation. She delivered excellent bars and beam routines before a crowd-pleasing floor display that sealed her fifth Olympic gold and eighth Games medal in total to help the USA finish ahead of Italy in silver and Brazil in bronze. Great Britain came an agonising fourth, just 0.234 of a point behind Brazil. There is reason for optimism for Team GB, however, after they completed their routines free of any major faults in a performance that will give them great confidence going into the individual finals.

