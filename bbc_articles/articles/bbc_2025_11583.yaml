content: |-
  Watch the moment a paving stone recognising Idris Elba was revealed outside of his old college.

  A commemorative paving stone honouring Idris Elba has been revealed outside a north-east London college.

  The slab at Barking and Dagenham College is part of Mobo's Paving the Way Award, which celebrates cultural pioneers who have made a lasting impact while giving back to the communities that shaped them.

  It reads: "Don't get labelled, labels are for cans."

  Elba chose his former college for the tribute, as it is where the acclaimed actor, musician, and activist first studied and began his creative journey.

