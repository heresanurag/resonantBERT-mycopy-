title: 'Bristol: Arrests after man stabbed near Rawnsley Park - BBC News'
date: '2024-07-26'
section: England
url: http://www.bbc.co.uk/news/articles/cqv51g5dq46o
content: |-
  Police are appealing for anyone with information or footage of the incident to come forward.

  Police officers will be carrying out extra patrols in the area

  Two teenagers are among five people under arrest on suspicion of attempted murder after a man was stabbed. Avon and Somerset Police said the attack happened at about 21:30 BST on Thursday near Rawnsley Park in Bristol. The victim, a man in his 30s, is in hospital with injuries not believed by police to be life-threatening. The five males who were arrested - aged 16, 19, 26, 27 and 55 - remain in custody.

  Goodhind Street reopened to traffic at midday on Friday and police remain at the address where they were arrested. Police said the injured man was not at the scene when officers arrived, seven minutes after being called. They were later told he had made his own way to hospital.

  Acting Ch Insp Tom Gent said: “We understand this serious assault is likely to cause concern among the local community and we want to reassure them that it’s being thoroughly investigated. “At this time, we are treating this as an isolated incident that is not connected to any other police investigation." Officers will be carrying out extra patrols in the area, he added. Anyone with information or footage relating to the incident that can help is urged to call the police.

