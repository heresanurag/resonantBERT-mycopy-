  Duplantis has now won the past seven global men's pole vault golds on offer and the 25-year-old's reign of dominance shows no sign of relenting anytime soon. The two-time Olympic champion, who has already won every major gold available to him, broke the world record for the 11th time in his career by clearing 6.27m last month. Surpassing a record-extending 100 career clearances over six metres, Duplantis was made to work harder than usual as Emmanouil Karalis applied pressure. But the Greek could not respond after his Swedish rival cleared 6.15m to clinch gold.

  This video can not be played To play this video you need to enable JavaScript in your browser. 'He's gone and done it again!' - Ingebrigtsen wins first indoor world title

  Ingebrigtsen completed the first phase of his bid to replicate the European indoor 1500m and 3,000m double he achieved - for a third time - last month. The Norwegian, 24, was put under intense pressure by Ethiopia's Berihu Aregawi but proved too powerful in the final straight, taking the title in seven minutes 46.09 seconds. A first world indoor gold leaves a world 1500m title – indoor and outdoor - as the only gap on Ingebrigtsen's extensive list of honours, which now includes 18 international golds, and he is strong favourite to end that wait on Sunday. American Grant Holloway remains unbeaten in the men's 60m hurdles in 11 years, with his 92nd consecutive indoor victory since March 2014 delivering the 27-year-old's third successive world indoor gold.

