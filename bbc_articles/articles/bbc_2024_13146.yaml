title: 'Heathrow Introducing: Airport launches live music stage - BBC News'
date: '2024-06-25'
section: England
url: http://www.bbc.co.uk/news/articles/cz55rllpdmko
content: |-
  Heathrow says those performing on the stage have "access to an audience bigger than Glastonbury".

  The music stage is a partnership with music events company Sofar Sounds

  Heathrow Airport has launched a live music stage to give up-and-coming acts the chance to impress industry executives flying into London for the festival season. Based in Terminal 5, the first show on Monday night featured performances from acoustic rock band China Bears, folk singer-songwriter The Halfway Kid and R'n'B artist Olivia Nelson. Heathrow said those performing on the stage have "access to an audience bigger than Glastonbury", as it expects 30 million passengers to travel through its terminals this summer. The airport believes Sunday will be the busiest day in its history, with 264,000 passengers - up 6% on last year.

  "The Heathrow Introducing stage isn't just about providing entertainment, it's about propelling careers to new heights," said Karoline Komolafe, of music events company Sofar Sounds, which has partnered with Heathrow. "It's a game-changer for those aiming to break into the industry, especially with festival season at its peak, offering exposure to execs travelling through. "I think Heathrow passengers are going to have a brilliant time at the gigs."

  Heathrow Airport expects 30 million passengers to travel through its terminals this summer

  Heathrow director of services Tonia Fielding said: "We're proud that we're providing people from around the globe the chance to experience the best of Britain's emerging musical talent and a taste of UK culture from the moment they reach the airport. "We're gearing up for the busiest summer on record, meaning we can give artists on the Heathrow Introducing stage massive audiences to play to." Two more shows on the music stage will be held, on 12 and 24 July.
