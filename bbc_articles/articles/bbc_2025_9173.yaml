title: 'Benidorm death: Last footage of Nathan Osman before body found - BBC News'
date: '2025-05-16'
section: General
url: http://www.bbc.co.uk/news/videos/c057l3434gvo
content: |-
  Nathan Osman's body was discovered the following morning at the foot of a remote cliff.

  This is the last known footage showing Nathan Osman after he arrived in Spain on holiday with friends in September 2024.

  The 30-year-old from Pontypridd, Rhondda Cynon Taf, was found dead at the foot of a remote cliff on the outskirts of Benidorm the following morning.

  His family were not satisfied with the initial response by Spanish police and carried out their own investigation, in which they found this CCTV footage showing Nathan walking at night in the direction of his hotel.

  His death is now being treated as a potential homicide, according to the family.
