id: bbc_2018_7942
title: San Fermín bull festival has explosive start - BBC News
date: '2018-07-07'
section: General
url: http://www.bbc.co.uk/news/world-europe-44738547
content: |-
  Spain's famous bull-running festival kicked off on Friday as thousands took to the streets of Pamplona.

  The world-famous San Fermín festival, known for its running of the bulls, has begun in Pamplona with its traditional firework starting signal.

  As the firework - the Chupinazo - burst, thousands of assembled partygoers erupted in celebration.
