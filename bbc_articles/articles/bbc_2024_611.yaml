title: 'Watch: US church steeple collapse caught on camera - BBC News'
date: '2024-01-26'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-68108552
content: |-
  Emergency crews evacuated the area following the incident in New London, Connecticut.

  This is the moment a church roof and steeple collapsed in New London, Connecticut.

  There was not a service taking place at the time and no deaths or injuries were reported.

  The cause of the collapse was not immediately known, Mayor Michael Passero said.
