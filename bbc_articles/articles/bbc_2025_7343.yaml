  Despite public objections to more warehousing, the industry has been growing largely due to a shift in people's spending habits. Official figures, external show internet sales as a percentage of total retail has risen steadily over the past 20 years and now stands at about 27%, with consumers expecting ever quicker deliveries or returns. Clare Newton, commercial director at Warehouse Space, external, a storage rental service, says people need to get used to warehouses. "What human beings have got to appreciate is if they're buying stuff online and want it tomorrow, then guess what, it's going to a warehouse near you. "Eight per cent of the UK population is employed in logistics, and all of them are running around to make people's lives cheaper and easier."

