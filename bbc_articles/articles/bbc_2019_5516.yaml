id: bbc_2019_5516
title: Daredevil completes highest Base jump recorded in Wales - BBC News
date: '2019-05-10'
section: General
url: http://www.bbc.co.uk/news/uk-wales-48231628
content: |-
  Josh Beinn says he has made the highest recorded jump in Wales after leaping from 2,500ft up Snowdon.

  Most people walk down the highest mountain in Wales, while many take the Snowdon Mountain Railway.

  But for Base jumper Josh Beinn, there was only one way he was going to descend 2,500ft - by leaping from the side of the mountain.

  This is the moment the daredevil made what he says is the highest Base jump in Wales.

  "It was exhilarating," said the 29-year-old after he had touched down safe.
