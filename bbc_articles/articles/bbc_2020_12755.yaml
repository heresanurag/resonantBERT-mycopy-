title: 'US Election 2020: Biden makes statement in Delaware - BBC News'
date: '2020-11-04'
section: General
url: http://www.bbc.co.uk/news/election-us-2020-54806497
content: |-
  Democratic presidential candidate Joe Biden told supporters in Delaware to "keep the faith".

  Speaking to his supporters in his home state of Delaware, the Democratic presidential candidate Joe Biden has said he believes he is on track for victory.

  The former vice president thanked his supporters and told them to "keep the faith".
