  Hundreds of dachshunds gathered in London during a charity event to scoop a Guinness World Record.

  Hundreds of dachshunds gathered in London during a charity event to scoop a Guinness World Record

  Hundreds of diminutive dogs have scooped the Guinness World Record for the Largest Dachshund Dog Walk. The 342 dachshunds gathered during a charity event at Marble Hill House in Twickenham, south-west London, beating the required number of 250. After the record was confirmed, some of the wagging winners posed for photos alongside the official certificate of their achievement. Guinness World Records said the owners were "a truly devoted bunch".

  Dachshunds of all shapes and sizes came together for the record-breaking walk

  A chorus of excited barks filled the air as dogs, and their owners, waited near the start line for the walk.

  Contenders were keenly listening out for the start of the walk

  Held by pet insurer Agria in partnership with English Heritage and supported by The Kennel Club, the event raised funds for animal rescue and rehoming centres.

  These participants wanted to put their best bow forward for any available best-dressed prize

  Among those attending were dogs in cones, bows, colourful harnesses and even puppy pushchairs.

  Dozens of dachshunds took part in record attempt at the event at Marble Hill House

  Checks and procedures were in place for Guinness World Records officials, with blue wristbands used for those who wanted their dogs to be counted in the challenge.

  Officials were hopeful they'd reached the magic number before it was confirmed later in the day

  Fundraising events also took place in two other English Heritage locations as well as in Denmark, Finland, France, Germany, Norway and Sweden.

  The excitement proved too much for this pushchair pup

  A total of £20,000 will be given to the centres from funds raised at the events.

  The London event was also attended by model and campaigner Jodie Kidd whose dachshund Sausage was helping drum up donations

  Vicki Wentworth from Agria said it was a "pleasure to watch so many passionate people and pups come together"

  Vicki Wentworth, chief executive at Agria, said: "We're absolutely thrilled to have won the Guinness World Records title." "It's an incredible achievement, and it was an absolute pleasure to watch so many passionate people and pups come together to help support a great cause," she said. Guinness World Records adjudicator Juliet Dawson said: "It was a pleasure to adjudicate this attempt and meet all the wonderful dachshunds and their owners, who are a truly devoted bunch. "A brilliant day was had by all."

