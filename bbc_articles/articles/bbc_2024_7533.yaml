title: Video shows Sydney stabbing attack suspect in mall - BBC News
date: '2024-04-13'
section: General
url: http://www.bbc.co.uk/news/world-australia-68805655
content: |-
  The footage appears to show a man confronting the knifeman on an escalator with a pole.

  A video posted on social media and verified by the BBC shows a knifeman who killed six people and injured several others at a mall in Sydney.

  The video also appears to show a member of the public confronting the suspect on an escalator.

