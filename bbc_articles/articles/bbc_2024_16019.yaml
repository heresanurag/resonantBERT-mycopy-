content: |-
  James Corden says he and Ruth Jones have finished the script for final Gavin And Stacey episode.

  Corden says Gavin and Stacey finale is written

  What's occurin'? Smithy (James Corden), Stacey (Joanna Page), Gavin (Matthew Horne) and Nessa (Ruth Jones) reunite for a final time on Christmas Day

  James Corden has revealed that he and Ruth Jones have finished the script for Gavin And Stacey's last ever episode. Corden announced in early May - along with the show co-creator Jones - that the beloved comedy series would make a comeback on Christmas Day. The BBC comedy programme, which aired between 2007 and 2010 before returning in 2019 for a festive episode that ended on a cliff-hanger with Nessa, played by Jones, getting down on one knee to propose to Smithy, played by Corden. Corden said the writing duo had completed a script a "while back" but it was too long so rewrites were needed.

  "Writing is really fun because you can just go 'anything can happen'," he added. "But when you rewrite stuff, you're dealing with a lot of logistics and 'well look we might not be able to shoot that, or this needs to be in this location, is there any way this can change?' And, frankly, it's too long. "What we have been doing the last few weeks really is just trying to make it as economical as possible. And we finished it [the script] yesterday."

  The story follows the lives of Gavin and Stacey and their family and friends

  The comedy, set in both Essex and Wales, has has become a cult classic. It follows the lives of Essex boy Gavin, played by Matthew Horne, and Barry girl Stacey, played by Joanna Page, and their best friends Smithy and Nessa - played by co-creators Corden and Jones. "We will never write anything that Pam says again," Corden told Chris Evans on his Virgin Radio breakfast show. "We will never come up with an interesting thing that Bryn has done." Reflecting on the show, Corden told Evans he feels "very emotional by all of it". "To even have the luxury of deciding to end it and to be in a position where people still care. "It's inconceivable to us - all of it," he said.
