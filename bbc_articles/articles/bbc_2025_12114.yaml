  "Jess [Fishlock] is going to be the face, the name of Wales, she knows that," said Wilkinson. "But equally there is a group of senior players who have come through the whole thing, they have seen it all, been through it all and fought the fights. "To get the team over the line at what may be the end of their careers... it's one of those things as a coach you are really proud of, to help deliver that." In a squad that Wilkinson revealed from the summit of Yr Wyddfa (Snowdon), Poppy Soper gets the nod as the third goalkeeper behind established pair Olivia Clark and Safia Middleton-Patel. In attack, 37-year-old Kayleigh Barton is selected despite ending her playing career at Charlton Athletic earlier in June to take on a head coach role at Saltdean United Women. Leicester City's Hannah Cain, Elise Hughes of Crystal Palace, Carrie Jones - who plays in Sweden for IFK Norrköping - and Bristol City's pacey Ffion Morgan are the other forward options. Defender Lily Woodham is the third Seattle player in the squad, while Charlie Estcourt also plies her trade across the Atlantic for DC Power in the USL Super League (USLS). Midfielder Alice Griffiths, who spent the second half of the season on loan from Southampton at fellow Championship side Durham, and Newcastle United defender Lois Joel also get the nod. "It's a really great mix in this squad which is exciting for me," said Wilkinson. "The older players have been really, really good with our young players. "We said from the beginning that if our young ones didn't feel equally as a part of this journey, we wouldn't qualify. "I think this is a great mixture of experience and less experience, but equally the characters as well."

  Knee injuries have deprived Wilkinson of three players, with Mayzee Davies ruled out of Euro 2025 after the 18-year-old Manchester City defender ruptured her ACL in the Nations League defeat by Denmark at the end of May - a result that saw Wales relegated from League A. Wales are also without forward Megan Wynne, who suffered an ACL injury in Perth Glory's final game of the season in April. Gwalia United goalkeeper Laura O'Sullivan-Jones is another ruled out with an ACL injury, although Wilkinson has said the 33-year-old, capped 59 times, will travel with the squad to help their preparations.

  Wales, who have qualified for a women's major tournament for the first time, will face holders England in Switzerland as well as 2022 Euro semi-finalists France and 2017 champions the Netherlands in the group stage. After a week-long training camp in Portugal, Wales will arrive in Switzerland on 29 June where the team will be based Lipperswil and Weinfelden in the canton of Thurgau. Wilkinson's side will kick-off their campaign against the Netherlands in Lucerne on 5 July, before two games in St Gallen - on 9 July against France before rounding off their Group D fixtures against domestic rivals England on 13 July. The two top-placed sides in the group will then progress to the quarter-final stage and Wilkinson dismissed suggestions Wales will be also-rans. "Outside Wales people can think whatever they want," she said. "Our goal is to show up and deliver to the best of our ability. "We have seen in the Nations League that when we deliver to our standards, we can compete with the best teams."

