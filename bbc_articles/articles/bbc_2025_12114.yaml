title: 'Euro 2025: Sophie Ingle defies injury to win Wales squad selection - BBC Sport'
date: '2025-06-19'
section: Wales Women
url: http://www.bbc.co.uk/sport/football/articles/cg758zej8r7o
content: |-
  Key midfielder Sophie Ingle is included in Wales' squad for the 2025 Women's European Championship despite not having played a competitive game this season due to injury.

  Sophie Ingle has been included in Wales' 23-player squad for the 2025 Women's European Championship despite not having played a competitive game this season. The 33-year-old midfielder, who has been released by Chelsea, tore her anterior cruciate ligament (ACL) in a pre-season friendly against Feyenoord last September. But the 141-cap former Wales skipper has shown enough in training to persuade head coach Rhian Wilkinson that she merits a place in Switzerland. "We needed to make sure that Sophie Ingle was in a good place, she's still on her path to full fitness but she's in a position now where she can contribute which is important for us," said Wilkinson, who would not be drawn on what role Ingle will be able to play. "I don't want to get into that specifically," she added, "because Sophie's pushing, she's looking really good in training." Angharad James will captain a Wales squad that includes Seattle Reign midfield team-mate Jess Fishlock, Wales' record cap-holder and goalscorer. Fellow cap centurion Hayley Ladd is also included alongside other veterans Rachel Rowe, Gemma Evans, Kayleigh Barton and Rhiannon Roberts.

