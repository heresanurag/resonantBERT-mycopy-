title: California airport engulfed by wildfires - BBC News
date: '2024-07-09'
section: General
url: http://www.bbc.co.uk/news/videos/cpd91llve2no
content: |-
  Firefighters used a variety of aircraft to douse a wildfire that raged around Placerville Airport in California.

  Firefighters in El Dorado County, California tried to put out a wildfire that surrounded an airport, as the heat wave continues across the west coast state.

  Fire crews could be seen dropping water and fire retardant powders from planes and helicopters in a bid to stop the fires from spreading.

  A record-breaking heatwave has already caused large wildfires in western US states is set to continue next week, according to reports.
