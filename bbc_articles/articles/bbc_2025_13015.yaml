title: Terminally ill Caerphilly woman renew vows after donated wedding - BBC News
date: '2025-06-27'
section: Wales
url: http://www.bbc.co.uk/news/articles/crmvjpdgx20o
content: |-
  Trasi and her husband originally planned to have a ceremony next year, but had to bring it forward.

  Trasi Coghlan brought forward plans for a wedding vows renewal by a year after getting a terminal cancer diagnosis

  A terminally ill woman was left "overwhelmed" after businesses donated a venue, wedding dress and flowers for her to renew her vows. Trasi Coghlan, 62, who has had cancer three times, was planning a vow renewal with husband Mark, 65, on their 40th wedding anniversary in 2026, but they brought the date forward after her diagnosis. The couple's first wedding was a "sad day" as Trasi's mother died from cancer the day before. An innocuous Facebook post from the Caerphilly couple's daughter led to offers to help, resulting in a ceremony on Thursday which gave their children and grandchildren "something special to remember".

  The couple's daughter posted on Facebook asking for venue ideas and "within the hour", she got a phone call from Ridgeway Golf Club. This was followed by other businesses offering to donate her wedding dress, flowers and make-up, which she said was "overwhelming".

  Trasi said there was "no end of people ringing up, offering to help and contribute. It's really blown our minds with with how kind people have been". "It was amazing the amount of family and friends who came. The whole thing from start finish was perfect," she added. Speaking on Radio Wales Breakfast before the wedding, Trasi said: "Our original wedding day wasn't very nice. "My mum passed sadly with cancer the day before so we never really enjoyed our day." She said they had "always wanted to have another wedding day" and planned to do one on their 40th anniversary. "But obviously, with the diagnosis and everything, my husband said, 'right, we'll, we'll do it now'," Trasi said.

  Trasi and Mark said their vow renewal was happy but emotional

  One of Trasi's close friends married the couple and Bells & Whistles, a wedding company, provided the photography and donated a dress. The couple said while it was a "happy occasion", it was "very emotional because of the circumstances". "The chemo and the treatments have been extremely tough and it's been hard for my family, watching me go through this," said Trasi. "I really appreciate everything my family and all my friends are doing to support me... and keep me going on the bad days."

  Trasi and Mark Coghlan had their first wedding 39 years ago

  She said chemotherapy and genetic treatment try to "slow the cancer down to give me more time". But "it absolutely knocks me for six", she said. "I can't manage a shower on my own. I struggle just to even get out of bed some mornings, it's a massive thing for me."

  Trasi said her diagnosis has been tough for her family and friends
