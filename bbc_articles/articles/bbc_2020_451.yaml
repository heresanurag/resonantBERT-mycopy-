id: bbc_2020_451
title: Fermanagh police officer attempted murder suspect released on bail - BBC News
date: '2020-01-04'
section: Northern Ireland
url: http://www.bbc.co.uk/news/uk-northern-ireland-50981588
content: |-
  The officer was confronted by a man armed with a shotgun at his home in Kesh, County Fermanagh.

  The off-duty officer answered the front door of his County Fermanagh home when the incident happened

  A 37-year-old man has been released on bail after being arrested over the attempted murder of an off-duty police officer on Thursday.

  The officer was at home near Kesh, County Fermanagh when he was confronted at his front door by a masked man with a shotgun at about 02:00 GMT.

  Police said the officer had noticed movement outside his property and went to the front door to investigate.

  The attacker reportedly pointed the gun at the officer but it failed to fire.

  Police said "organised criminal elements may be responsible".

  Det Ch Insp Julie Mullan said the officer was traumatised by the incident

  Det Ch Insp Julie Mullan said they "firmly believe that this disturbing incident was a failed attempt to kill a local police officer".

  The suspect, described as being dressed entirely in black, fled on foot across nearby fields after the attack.

  Det Ch Insp Mullan said the attack has had a huge impact on the officer and his family.

  She added: "He's being supported by his colleagues and ourselves and his family but he's traumatised by the incident."
