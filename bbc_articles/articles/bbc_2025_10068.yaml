title: 'Radio 1''s Big Weekend: Sam Fender caps off Saturday in Liverpool - BBC News'
date: '2025-05-24'
section: Newsbeat
url: http://www.bbc.co.uk/news/articles/cdd23rnp3lvo
content: |-
  The Seventeen Going Under singer finishes off a day which saw Ed Sheeran make a surprise appearance.

  Fireworks from Sam Fender caps off Saturday at Big Weekend

  Headliner Sam Fender closed out the Saturday at Radio 1's Big Weekend with confetti and fireworks. His performance, which had some technical issues, contained crowd favourite hits Seventeen Going Under and Hypersonic Missiles which had fans chanting into the night. Part way through his set the singer, from North Shields, told the crowd - which had many donned in Newcastle United kits, a nod to Fender's favourite team - it was "the most nervous I've ever been and I have no idea why". Fender followed Tom Odell, Sugababes, Myles Smith, Blossoms and Wolf Alice who also performed on the Main Stage at Sefton Park.

  In the audience, fans celebrated the "unreal good vibes" of Fender's set as they danced and sang along to his catalogue of hits. One fan, Charlene, told Newsbeat: "It's amazing, I've always wanted to see him, I'm so glad he's in Liverpool - our city." For many, the highlight of the day came at the very start with a surprise set from Ed Sheeran. He was on the New Music Stage, and said he chose that because he'd "never played it before" and felt the tent had "the best energy". There was disappointment for some fans with access having to be temporarily paused after reaching maximum capacity.

  Ed Sheeran was a surprise for fans at Big Weekend

  Other performances on that stage included Good Neighbours, Artemas, Jordan Adetunji and Aitch, who was on back-to-back with good friend AJ Tracey. Aitch, a Manchester United fan and AJ Tracey, a Tottenham Hotspur fan, told Newsbeat before their set there was "no bad blood" between them after Spurs beat United in the Europa League final. "It's hard to make friends in music, so when you do, it's a good feeling," AJ Tracey said.

  The crowd was bouncing during the Sugababes set

  Girl group Sugababes also produced an energetic set earlier in the day and praised the crowd as "so amazing". And on the hit Push the Button, which was released 20 years ago, they told Newsbeat if it was released present day, "it would still be very current". More than 100,000 fans are expected to attend Big Weekend in Liverpool, which will have about 100 acts performing across four stages. The last day of the festival will see Mumford & Sons headline on Sunday evening. Tate McRae, Lola Young, Jorja Smith, Wet Leg and HAIM will also be hitting the Main Stage.

