id: bbc_2019_9638
title: Didcot cooling towers demolished in a controlled explosion - BBC News
date: '2019-08-18'
section: General
url: http://www.bbc.co.uk/news/uk-49386167
content: |-
  Thousands of homes lost power shortly after the three remaining cooling towers of Didcot power station near Oxford came down in a controlled explosion.

  Didcot A's 375ft (114.3m) high towers were brought down using explosive charges at 07:00 BST.

  Minutes later, people in the area said they had suffered a power cut and an online tracker showed more than 2700 postcodes were affected.

  The coal-fired station was turned off in 2013 after 43 years in service.
