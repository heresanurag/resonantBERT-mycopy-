title: 'Virgil van Dijk: Liverpool captain signs new deal - BBC Sport'
date: '2025-04-17'
section: Liverpool
url: http://www.bbc.co.uk/sport/football/articles/c2dl92y7l5go
content: |-
  Liverpool captain Virgil van Dijk follows Mohamed Salah in signing a new deal with the club.

  Liverpool captain Virgil van Dijk has signed a new two-year contract with the club. The 33-year-old centre-back's previous contract had been set to expire at the end of the season. But the Dutchman has joined forward Mohamed Salah, who signed a two-year extension last week, in committing his future to the club. "It was always Liverpool," said Van Dijk, who had been linked with a move to Paris St-Germain. "That was the case. It was always in my head, it was always the plan and it was always Liverpool." The Dutchman, who has made 314 appearances for the Reds, was named Liverpool captain in 2023 following Jordan Henderson's departure. "There wasn't any doubt in my head that this is the place to be for me and my family," said Van Dijk. "I'm one of Liverpool. Someone called me the other day an adopted Scouser - I'm really proud to hear these things, it gives me a great feeling. "It's a proud feeling, it's a feeling of joy. It's just incredible. "The journey I've had so far in my career, to be able to extend it with another two years at this club is amazing and I'm so happy."

  Van Dijk has been with the club since joining for £75m from Southampton in January 2018. Since then, he has helped Liverpool win the Premier League, Champions League, FA Cup, Club World Cup and EFL Cup twice. Under Liverpool manager and fellow Dutchman Arne Slot, who is in his first season in the role, Van Dijk has been key in helping the Reds close in on a record-equalling 20th English league title. Van Dijk said in March that he had "no idea" if he would remain at Anfield. But earlier this month, he said that there had been "progress" in negotiations with the club over a new contract. With new deals confirmed for Salah and Van Dijk, the future of defender Trent Alexander-Arnold remains unresolved. The England defender, who returned to Liverpool training on Wednesday after a month out because of injury, is out of contract in July and has been heavily linked with a move to Real Madrid.

  It's big news for the club and the Premier League that one of the division's most iconic players is staying put. For so long, there has been huge uncertainty over Van Dijk and Salah's futures at Liverpool given their previous contracts were set to expire at the end of the season. The perspective is far rosier now - though the future of fellow out-of-contract star Trent Alexander-Arnold, who has held talks with Real Madrid, remains hugely uncertain. In the end, the numbers made sense for Liverpool. Replacing Salah and Van Dijk like-for-like would probably cost towards £200m in transfer fees, let alone wages. Identifying those players would have been a risky task. Both players are in their mid-30s, but neither has shown signs of slowing down, so keeping Salah and Van Dijk - on similar salaries to what they were on previously - appears the most economical decision, particularly when you look at their performances this season. Van Dijk staying will lessen the necessity for Liverpool to sign a new central defender this summer, although strengthening in that area of the field will likely depend on how talks develop with Ibrahima Konate over a new deal. The France international is entering the final 12 months of his contract and is yet to reach an agreement with Liverpool over an extension. Among the centre-backs Liverpool have watched are Bournemouth's Dean Huijsen and Crystal Palace's Marc Guehi. If an agreement with Konate isn't reached, then Liverpool may have to make a decision over his future this summer in order to avoid the prospect of the central defender leaving on a free transfer in 2026.

  We asked for your views on Van Dijk's contract extension. Here are some of your comments: Andy: Hopefully another trophy-winning season. Virgil is an inspirational captain, a cool, calm defender who emits an aura of control that enables the rest of the team playing to fulfil their potentials. Two of our greatest players showing a loyalty that fans respect to a great club. Hopefully more successful seasons to follow in the near future. Thank you Virgil and Mo for staying with us. Yusuf: We need him, he has been the best centre-back this club has seen since Ron Yeats. And particularly as this will be a big summer, hopefully with the new signings he can help their development and continue to help Quansah and Konate to develop. If we want to win the Premier League and Champions League he is the one person who will lead us to them. Will: Absolutely over the moon with this new deal. The contract extensions of Salah and Van Dijk have provided the team with a degree of certainty for the upcoming season, and takes some of the pressure off the upcoming transfer window. Graham: An absolute bargain and clever business, we'd have had to pay in excess of £100m to get a centre-back of his quality! Dax: There was never really any doubt. Anyone who's been out and about around Liverpool will know that VVD and his family belong in Liverpool just as much as Salah and his family. The culture at the club doesn't just embrace you as a player but also embraces you as a human being and there is no more welcoming place than at an organisation like Liverpool Football Club to make you feel worthy. I'm sure at some point in the next few days VVD will say that it's more than just a footballing decision. Ryan: Brilliant news. Will soften the blow of losing Trent, and his leadership and his experience cannot be underestimated. He's respected in the game by fans, fellow players, and he can hopefully help pave the way for Ibou and maybe another CB to pick up the amazing foundations he's helped build. His dominance at the back is so assuring for the rest of the team - mistakes he makes are magnified because of the colossus that he is. He's a true legend, a giant of a man and exactly what you want from a Liverpool captain. Great news!
