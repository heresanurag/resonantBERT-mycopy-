id: bbc_2018_2635
title: Frustrated passengers walk on tracks near Lewisham - BBC News
date: '2018-03-03'
section: General
url: http://www.bbc.co.uk/news/uk-43265182
content: |-
  Southeastern rail services have been disrupted after passengers grew frustrated at delays near Lewisham, south London, and began walking down the tracks.

  Southeastern said they were then forced to turn the power off to stop the trespassers from being killed, delaying trains further.

  Piers Hanson was on board the train, and walked down the tracks after receiving what he says was 'clearance from police'.
