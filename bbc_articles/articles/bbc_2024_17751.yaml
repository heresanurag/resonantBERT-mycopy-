title: Two charged with murdering 14-year-old girl in Darlington - BBC News
date: '2024-07-08'
section: Tees
url: http://www.bbc.co.uk/news/articles/ce58gmk3238o
content: |-
  A man and woman are due to appear before magistrates accused of killing the girl on Friday.

  Police were called to Geneva Road in Darlington on Friday night

  A man and woman have been charged with murdering a 14-year-old girl. Police were called to a house in Geneva Road, Darlington, at about 23:00 BST on Friday and the girl was pronounced dead at the scene. Simon Vickers and Sarah Hall, both of Geneva Road, are due to appear at Newton Aycliffe Magistrates' Court on Monday. Det Supt Craig Rudd, of Durham Police, said the girl's death was "tragic" and the force's thoughts were with her family and friends.

  He added: "I would like to thank the local community for their patience and co-operation while investigative work is still being carried out at the scene, and to reassure residents that we believe this to be an isolated incident."
