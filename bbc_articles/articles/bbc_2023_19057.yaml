title: Hyde Park gun attack plotter Edward Little lunges at detective - BBC News
date: '2023-12-15'
section: General
url: http://www.bbc.co.uk/news/uk-67731987
content: |-
  Edward Little has been sentenced to 16 years, after admitting preparing to commit acts of terrorism.

  Police have released video footage of a man, who has since been convicted of plotting a gun attack in Hyde Park, lunging at a detective during a police interview.

  Edward Little was arrested on his way to south London to buy a gun.

  On Friday, he was sentenced to 16 years in prison, after admitting preparing to commit acts of terrorism.
