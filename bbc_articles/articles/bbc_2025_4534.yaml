content: |-
  Wolves forward Matheus Cunha is given a further one-match ban and a £50,000 fine for his red card in the FA Cup defeat at Bournemouth.

  Forward Matheus Cunha has been banned for an extra game and fined £50,000 for his actions at the end of Wolverhampton Wanderers' FA Cup defeat at Bournemouth.

  The Brazil striker admitted a charge of acting in an improper manner after he was sent off for clashing with Cherries defender Milos Kerkez in the final minute of extra time.

  The 25-year-old lashed out at the Hungary left-back three times and had to be escorted down the tunnel after he was sent off.

  Cunha's straight red card for violent conduct meant he was already suspended for three games and will now miss a fourth - the Premier League match at Ipswich Town on 5 April.

  He will now next be available for the visit of Tottenham Hotspur on 13 April.

  Cunha was suspended for two games in January after clashing with a member of Ipswich's security and grabbing his glasses from his face following the visitors' 2-1 win at Molineux in December.
