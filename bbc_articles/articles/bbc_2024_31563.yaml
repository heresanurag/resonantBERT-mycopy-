title: Family left 'in tears' after Sikh man's beard cut - BBC News
date: '2024-12-21'
section: London
url: http://www.bbc.co.uk/news/articles/c8ewy7581xgo
content: |-
  The man's family say "everyone's belief systems need to be respected".

  The family say they are committed to spreading awareness about respect for religious beliefs

  A family have been left feeling "devastated" after a hospital breached a 91-year-old Sikh man's religious beliefs by cutting his beard without their consent. The incident happened at a major hospital in west London on Thursday morning during a routine sponge bath. The vulnerable patient had a mini stroke leaving him unable to communicate or sometimes be aware of his surroundings, his family said. In a statement, the hospital which cannot be named due to safety concerns, said: "We are deeply sorry and are taking this matter very seriously, this was a genuine mistake and are now working closely to support the patient's family."

  In the Sikh religion, hair is considered to be sacred, with the Rehat Maryada or Sikh code of conduct forbidding the cutting or shaving any body hair for initiated Sikhs. Keisha Sethi, a family member from west London, said she was "gobsmacked" when she saw her grandfather. She said her auntie was in tears, her dad was "frustrated" and she said if her grandfather could react he would be "furious". The man has been in hospital for four weeks and family members visit every day. Ms Sethi said she felt "so helpless" and wanted to spread awareness that "everyone's belief systems need to be respected and the same level of care needs to be provided no matter what the person's ethnic background is". She added that the area was ethnically diverse, and expected staff to be educated about the religious beliefs.

