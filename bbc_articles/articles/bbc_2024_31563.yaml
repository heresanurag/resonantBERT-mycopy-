  Another family member, who wanted to remain anonymous, said they were "devastated" and "hurt" after learning this happened to the man who kept his hair for more than 90 years. They said "absolutely no" to cutting the hair when nurses had asked to trim it before. The family were outside the room in the corridor when the incident took place and were told his beard was cut as food was caught in it. Doctors and staff have apologised and the family understands they "tried to do the right thing", but "because of our beliefs and our culture, it was the worst thing they could have done". The family added: "Awareness needs to be out there and staff need to go through training before they're put on the floor dealing with ethnic minorities."
