id: bbc_2024_2322
title: 'Paris: Chaos as farmers'' anger erupts at trade show - BBC News'
date: '2024-02-26'
section: General
url: http://www.bbc.co.uk/news/world-europe-68393316
content: |-
  Clashes erupt between security forces and farmers protesting at the presence of President Macron.

  There have been chaotic scenes at the opening of the annual agricultural show in Paris as farmers broke through security barriers and had to be kept back by riot police.

  They were angry at the presence of President Macron at the event.

  Farmers have been protesting across France and elsewhere in Europe saying agriculture is at crisis point because of falling incomes and increasing regulation.
