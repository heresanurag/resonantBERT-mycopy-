title: 'Craigavon: Dissident republicans ''attempt to kill police'' - BBC News'
date: '2019-07-27'
section: Northern Ireland
url: http://www.bbc.co.uk/news/uk-northern-ireland-49138877
content: |-
  PSNI officers were the target of a viable device found in the Tullygally Road, police say.

  Dissident republicans tried to murder police officers during an attack in Craigavon, County Armagh, the Police Service of Northern Ireland (PSNI) has said.

  At about midnight on Friday, a loud bang was heard in the Tullygally Road area of the town.

  Police said they believe the attack was set up to target officers responding to a call from the public.

