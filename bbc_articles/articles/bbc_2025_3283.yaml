  Wales' defeat by Scotland registered their 16th loss in a row. Late scores helped improve what was starting to become a heavy scoreline at Murrayfield as Wales continue to show fighting spirit under interim head coach Matt Sherratt With the clock in the red, Max Llewellyn's try was converted by Jarrod Evans as Wales recovered from 27 points down to grab two losing bonus points for scoring four tries and finishing within a score. They host England on Saturday and will hope the emotion of their home crowd can help them cause an upset. "Everything points to England as they are a better side and Wales are on a disastrous losing run," Davies added. "It is the last game and it is in Cardiff. It will be crazy there. The Welsh boys will get up for it. "If they get to the intensity they did against Ireland and play like they did, then Wales will be in with a shout."
