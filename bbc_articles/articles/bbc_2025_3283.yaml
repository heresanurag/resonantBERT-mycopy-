  Scotland bounced back from a disappointing loss to England to register a 35-29 victory over Wales at Murrayfield. Full-back Blair Kinghorn enhanced his British and Irish Lions credentials with two tries in a player-of-the-match performance. Gregor Townsend's side looked to be cruising to a comfortable victory only for the the visitors to threaten a late comeback by grabbing three unanswered tries. Townsend's side need a miracle in the final round to win the championship but can take heart from their 2021 triumph in Paris when a last-gasp Duhan van der Merwe try sealed victory. "I know it was in Covid but Scotland have gone and won in Paris," former Scotland number eight Johnnie Beattie told BBC's Rugby Union Weekly. "That means there is a belief they can do it, but it is a different beast than taking on Wales in terms of organisation, strategy and physicality. "If France have an average game and Scotland fire out shots and are clinical then we can challenge them." If England or Ireland are going to win the title, they will need a favour from their Celtic rivals, and Scotland's dangerous backs might just fancy their chances in an open game.

  This video can not be played To play this video you need to enable JavaScript in your browser. England keep alive Six Nations title hopes with seven-try win

  Despite promises of fast-paced, attacking rugby by head coach Steve Borthwick, England reverted back to their kicking game in their third-round win over Scotland. But on Sunday, the hosts delivered by scoring seven tries in a comfortable 47-24 victory over Italy at Allianz Stadium to stay in the title hunt. Borthwick's side kicked the least amount of times from hand (31) this championship - five times fewer than last time out against Scotland - and made the most carries so far this campaign (145) - 67 more times than in their previous outing. Central to England's attack this championship has been Bath centre Ollie Lawrence, who went off early on with an Achilles injury and is set to undergo scans to determine the severity of his lay-off. "He was really coming into his own in this England set-up and playing well for Bath, which is really frustrating for him," Zebo added. "He is in sensational form this year and would have a very good chance of making the [British and Irish Lions] plane to Australia in the summer." England are undefeated since their opening round defeat by Ireland, but will need Scotland to defeat France in Paris if they are to snatch the title with a win over Wales.

