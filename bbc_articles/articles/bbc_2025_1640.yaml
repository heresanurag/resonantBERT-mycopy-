  Gatland's second reign as head coach ended on the back of the dire display in Rome which was an eighth successive Six Nations defeat to equal Wales' worst record in the tournament. It was Wales' 14th successive Test loss and within 72 hours Gatland had gone - with Cardiff boss Sherratt appointed on an interim basis for the remaining Six Nations fixtures against Ireland, Scotland and England. Wales have dropped to a lowest position of 12th in the world rankings and have not won a Test match since October 2023. They have lost seven successive internationals at the Principality Stadium since defeating England in a World Cup warm-up game in August 2023. In contrast, Ireland are ranked second in the world and bidding to create history by winning a third consecutive Six Nations title. They remain on course for a Grand Slam having defeated England and Scotland in the opening rounds of this tournament and can clinch their 14th Triple Crown in Cardiff by beating Wales this weekend. With Andy Farrell away with the British and Irish Lions, Ireland also have an interim head coach in Simon Easterby, who has been linked with the Wales top job.
