content: |-
  Scarlets wing Ellis Mee will make his Wales debut against Ireland while Gareth Anscombe and Max Llewellyn return for Saturday's Six Nations match.

  Ellis Mee (left) Max Llewellyn (centre) and Gareth Anscombe are the three Wales backs brought in to start by interim head coach Matt Sherratt against Ireland

  Coverage: Watch on BBC One and S4C. Listen live on BBC Radio Wales, BBC Radio Cymru, BBC Sounds; text commentary and highlights on BBC Sport website and app.

  Scarlets wing Ellis Mee will make his Wales debut against Ireland while fly-half Gareth Anscombe and centre Max Llewellyn return for Saturday's Six Nations match in Cardiff. Interim head coach Matt Sherratt, who will be in charge for his first game following Warren Gatland's departure earlier this month, has made eight personnel changes from the side that lost against Italy along with two positional alterations. Mee, 21, who signed for Scarlets this season from Nottingham and qualifies for Wales through his mother from Newport, replaces the injured Josh Adams. Mee is selected after playing just 10 professional competitive games for Scarlets. Anscombe, 33, will make his first Six Nations start since inspiring Wales to a Grand Slam victory against Ireland in Cardiff six years ago. He is selected less than a week after being one of two fly-halves called into the squad by Sherratt alongside Harlequins' Jarrod Evans, who is named on the replacements bench.

  Anscombe and Evans had previously been left out by Gatland. The former head coach had named only one specialist fly-half in his initial squad in Ospreys number 10 Dan Edwards, who is not involved against Ireland. Cardiff centre Ben Thomas started the defeats against France and Italy in the unfamiliar fly-half role. Anscombe's Gloucester team-mate Llewellyn also come straight back into the starting side and will partner Thomas in midfield. There is a new-look starting front-row trio of Nicky Smith, Elliot Dee and WillGriff John, who will make his Six Nations debut and play his first international for three-and-a-half years. Exeter lock Dafydd Jenkins returns from illness, while Tommy Reffell joins fellow flanker and captain Jac Morgan alongside number eight Taulupe Faletau in the back row. Morgan switches to blind-side with Reffell wearing seven. Adams, Eddie James, Nick Tompkins, Gareth Thomas, Evan Lloyd, Henry Thomas, Freddie Thomas and James Botham drop out of the starting side.

  Sherratt outlined why he had changed more than half the side. "There are numerous reasons," said Sherratt. "There were a couple of little injury doubts and then probably just in general, my mindset coming in was just to make sure I enjoy it and try to do things my way, with the way I think the game should be played. "Some of the selections are geared towards that. It was important to pick a team that had some familiarity. "I don't feel playing Ireland is a time to experiment, so just having those combinations together, who have got relationships and can talk to each other on the field and pick up each other's habits, is important." Sherratt stated the return of Gloucester duo Anscombe and Llewellyn would compensate for the loss of experienced injured pair Liam Williams and Owen Watkin. "I felt we needed some players who have relationships with each other and play with each other every week," said Sherratt. "I've coached Gareth and Max so they know my style of play. That was an advantage. "Gareth is very good at driving the week. With Tomos (Williams) and Gareth, I've got relationships with them and knew they'd grab what I was trying to do and spread it through the team. It's just that familiarity." On the other end of the scale Sherratt was not afraid to blood Mee. "I'm sure his family are proud of him and to see his face after selection was part of the reason you coach."

