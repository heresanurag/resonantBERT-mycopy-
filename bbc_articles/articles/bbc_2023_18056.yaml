title: Amy Dowden's Strictly hopes dashed after breaking foot - BBC News
date: '2023-11-16'
section: Wales
url: http://www.bbc.co.uk/news/uk-wales-67445354
content: |-
  The dancer is "absolutely gutted" as her hopes of a Strictly appearance are ended by the injury.

  "Not the week I was hoping for since finishing chemo," says Amy Dowden after breaking her foot

  Strictly Come Dancing star Amy Dowden's hopes of returning to the show this year have been dashed by a broken foot.

  The dancer posted a snap on Instagram of herself pointing at the large plastic boot she now has to wear.

  The 33-year-old from Caerphilly, who has been undergoing cancer treatment, last week celebrated her final round of chemotherapy.

  Amy said she was heartbroken by the injury, adding: "2023 is certainly not my year. Roll on 2024 I say!"

  "Not the week I was hoping for since finishing chemo," she wrote on Instagram, after she "unfortunately gained a boot for a fractured foot".

  "Absolutely gutted and heartbroken, as this means the plans for me to dance in the Strictly ballroom this year are no longer possible," she said.

  "This is what has kept me going the past few months."

  Amy discovered a lump in her breast in April, a day before she was due to fly on her honeymoon to the Maldives with her husband Ben.

  She has been spreading awareness of breast cancer throughout her treatment explaining how she was prompted to check herself ahead of a trek with the breast cancer charity Coppafeel!
