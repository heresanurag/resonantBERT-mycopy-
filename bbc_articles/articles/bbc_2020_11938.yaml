  All household mixing will be banned and non-essential shops and leisure services must close.

  Can I eat out with someone from a different tier? And other questions

  We've been answering more of your questions about what new regulations in place across the UK mean for you. They include one from a reader who lives in a tier two area who wants to know if they can have dinner with their sister at a tier one restaurant, indoors. The answer is no, as you can't mix with anyone indoors if you live in a tier two area, as it's under high alert. You can meet outside though, as long as there aren't more than six of you. There are also questions on whether you can stay at a partner's house if you live in areas under different regulations (in short - it depends where you live, whether you have formed a bubble and whether there's childcare to take into consideration), and on the job support scheme. Read more here - and click or tap here if you want to send in a question yourself.
