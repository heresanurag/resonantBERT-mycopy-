title: Patients of disgraced surgeon call reports a ‘whitewash’ - BBC News
date: '2024-12-06'
section: Health
url: http://www.bbc.co.uk/news/articles/ce3219pp7wgo
content: |-
  Families of children operated on by Yaser Jabbar say independent reports into their care are a "whitewash".

  Families of children operated on by a disgraced surgeon have labelled independent reports into their care as a "whitewash" and a "final insult". Yaser Jabbar, a former surgeon at London's Great Ormond Street Hospital (GOSH), carried out procedures including leg lengthening and straightening. He also operated on children with complicated disorders. But some cases linked to him resulted in harm, including life-long injuries and amputation. Mr Jabbar left the hospital in 2023 after a report by the Royal College of Surgeons (RCS) found some of the surgery had been "inappropriate" and "incorrect".

  Following the RCS report, GOSH said each of Mr Jabbar's 723 patients would receive an independent report to conclude what level of harm they had suffered. The reviews, which are being carried out by specialist surgeons who did not work at GOSH, are based on patient notes provided by the hospital. Families have started receiving reports about the care their children received. BBC News has now spoken to four families - and had indirect contact with 12 more - who say the reports do not reflect their children's experiences and often raise more questions than they answer. Many of the reports were concluded without any interviews or interaction with the family or patient, they say. Parents describe the reports as part of a "culture of cover-up", telling the BBC that GOSH has "failed their children", leaving them physically and mentally damaged. One mother told us: "Mr Jabbar was known for not writing up records or keeping notes correctly, but these reviews have been based on hospital notes. My daughter's report doesn't reflect her journey at all." A GOSH spokesperson said the hospital was deeply sorry and wanted "every patient and family who comes to our hospital to feel safe and cared for". "We commissioned an independent review of patient care, which is in line with the NHS England guidelines," they added.

  Yaser Jabbar has not had a licence to practise medicine in the UK since January

  Dean Stalham's daughter, Bunty, was born with a rare bone disease. Over a 15-month period, Bunty underwent a number of operations which all failed, leaving her in agony and taking strong pain relief for months. In Bunty's report, the physical impact on her was deemed "moderate" - but her father says it is "simply wrong". "It says she had six procedures. I can count 10," Mr Stalham says. "Not a single one of Bunty's surgeries worked, and none of them were of any benefit to her whatsoever. When they were trying to lengthen her leg they ended up shortening it by about eight inches." Other parents are angry the reports graded their child's psychological harm as "none" or "mild". "How can it say she has no psychological harm when they haven't even spoken to the child?" Claire Osborne says of her daughter, Ella. Ella has Shwachman Diamond Syndrome II, causing her knees to bend inwards and causing severe pain. Ella was referred for psychological support in 2022, after a failed operation to realign her knees was carried out by Mr Jabbar. "She cried herself to sleep each night," her mother says. "She was in a wheelchair and constant agony for years. She has nervous ticks now. She didn't have them before Jabbar."

  Bunty underwent multiple surgeries and her lower left leg was eventually amputated

  When Mansur's mother Hindiya Omar first met Mr Jabbar in 2018 at GOSH, she says she was reassured, describing him as charismatic and attentive. She felt certain her son was in safe hands. "I felt lucky my boy was being seen by the best in the world," Ms Omar says. "I didn't question what was being recommended because I trusted them entirely." At the time, Mansur was complaining of a sore knee. After two operations carried out by Mr Jabbar, Mansur suffered nerve damage resulting in foot drop, which can cause difficulty lifting or moving your foot and can affect the way you walk. Mansur's knee is now deformed and he is unable to bend it, while his leg growth has been stunted. "They have destroyed his leg, he complains of being in agonising pain every day," Ms Omar says. "I can't trust anyone now – especially not the hospital for letting this happen."

  Mansur has been left with a deformed leg and muscle wastage, meaning he has to use a wheelchair to move any significant distance

  She says the last time she saw Mr Jabbar was in 2022. After that, she says she was told the surgeon was away, but at no stage did the hospital say Mr Jabbar was being investigated. Ms Omar says this meant Mansur's care was further delayed and three appointments with Mr Jabbar were booked, then cancelled and rearranged. A GOSH spokesperson says families were told in August 2022 that Mr Jabbar was on sabbatical leave. A GOSH spokesperson says: "Assessing psychological harm is, however, complex due to many factors, and so we will always discuss concerns families may have and will do our best to ensure patients get the care and support they need going forward." In February, Ms Omar received a phone call telling her that Mansur's years of pain and life-altering surgeries were being investigated. The independent review into Mansur's care concluded that he suffered "moderate harm" through his treatment from Mr Jabbar. Mansur was five years old when he first saw Mr Jabbar. He is now 12 years old and awaiting more surgery. He will never bend his knee, can only walk short distances and now uses a wheelchair. "To say that a boy who has lost his childhood to this man has suffered 'moderate harm' is just the final insult for me," Ms Omar says.

  Ella has Shwachman Diamond Syndrome II which causes her knees to bend inwards causing her severe pain.

  In a statement GOSH said: "We are deeply sorry to the patients of this surgeon who we have let down", adding: "Patient safety is our core purpose and we have a range of measures to ensure all our services are safe." In response to the BBC's report, the hospital responded ; "We completely appreciate that for families who have experienced pain and distress these findings may never feel adequate. We will always discuss concerns families may have and will do our best to ensure patients get the care and support they need going forward." Mr Jabbar worked at four other London hospitals, including three in the private sector - St John and St Elizabeth, the Cromwell and the Portland. St John and St Elizabeth says Mr Jabbar carried out three adult procedures there between October 2020 and January 2023. It said no concerns had been raised about his practice. Cromwell Hospital said Mr Jabbar had operated on 12 adults and six children when he worked there and it has not received complaints. "Since the concerns around Mr Jabbar came to light, we have proactively contacted all patients directly and are continuing to stay in close contact while this investigation proceeds." The HCA group, of which the Portland is part, confirmed 43 surgeries were carried out at its sites by Mr Jabbar. He was also an orthopaedic consultant at Chelsea and Westminster Hospital prior to joining GOSH in 2017. The BBC has approached Mr Jabbar for comment.

