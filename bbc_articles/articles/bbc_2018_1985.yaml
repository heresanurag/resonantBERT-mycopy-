title: 'Winter Olympics: Men''s downhill postponed because of high winds - BBC Sport'
date: '2018-02-11'
section: Winter Olympics
url: http://www.bbc.co.uk/sport/winter-olympics/43020921
content: |-
  The men's downhill at the Winter Olympics is postponed because of high winds at the Jeongseon Alpine Centre.

  The men's downhill was the opening event of the Alpine skiing programme in Pyeongchang

  The men's downhill in Pyeongchang has been postponed because of high winds at the Jeongseon Alpine Centre. The decision was taken with gusts of up to 45mph expected to continue throughout Sunday. The event, due to begin at 02:00 GMT, will now take place on Thursday at 02:00 GMT. There is no British interest in the men's downhill but it is the traditional 'blue riband' event of the Winter Olympics.

  Austria's Matthias Mayer is defending champion while Switzerland's Beat Feuz and Norwegian veteran Aksel Lund Svindal are among the contenders. With the severe weather forecast to continue, the men's alpine combined downhill training run, scheduled for Monday, has also been cancelled. With the men's downhill now taking place on Thursday, the men's super-G has been rescheduled for Friday at 02:00 GMT. The women's slopestyle qualification event was also called off because of high winds, with all the athletes progressing to the final on Monday.

