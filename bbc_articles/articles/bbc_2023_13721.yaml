  In his letter on Wednesday, Dr Hilton, who previously worked at Morriston Hospital in Swansea, said the medical profession was "brutal and demanding".

  "Bullying happens. Sexually inappropriate comments and actions do occur," he said.

  "All I can say is that if they want to make a success of this rewarding career then they should toughen up. Perhaps four A*s at A-level are not the answer to all the problems they will face."

  The letter was heavily criticised on social media and was described by some women doctors as "odious" and "abhorrent".

  A group of 55 consultants from Swansea Bay health board - some of whom worked with Dr Hilton - signed a letter calling his views "repulsive".

  "Medical students are not selected solely on the basis of 4A*s at A-level, but a range of academic and non-academic measures - none of which include or imply acceptance of misogyny or sexual harassment," they said.

  "Far from being snowflakes, our young doctors are lively, interested, savvy and dedicated to their careers. Expecting that they'll be treated with respect by their colleagues is the bare minimum, and we strongly support them in this demand.

  "Dr Hilton's dismissal of bullying, sexism and sexual harassment as mere workplace inconveniences is out of step with the profession in the 21st Century."

