  It was always going to be a challenge for Crystal Palace to stay in the WSL and they are realising that. The club backed manager Laura Kaminski in the transfer window but they still struggled to compete with the significant increase in budgets from the second tier. Key defender Brooke Aspin suffered an anterior cruciate ligament injury which was a major blow and they missed captain Aimee Everett for a few weeks. But performances have given supporters hope. They have shown patches of quality and have been able to compete but they must pick up results soon.
