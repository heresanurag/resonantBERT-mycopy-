  Tottenham boss Robert Vilahamn has insisted his side will continue to play "brave"

  Spurs were the surprise package last season in manager Robert Vilahamn's first campaign in charge, reaching the FA Cup final and finishing sixth. A fairly underwhelming transfer window meant expectations were lower this season and Spurs have not always found it easy. Heavy defeats by Manchester United, Chelsea, Manchester City and Arsenal led to questions over Vilahamn's stubborn attacking style. But despite concerns over their defensive stability, Spurs have picked up valuable points against teams around them and are starting to climb the table.

  One win in nine matches was a poor return for Villa having spent record fees in the transfer window and backing new boss Robert de Pauw. It meant De Pauw was sacked by the club after just six months in charge with a refresh needed immediately. A crucial victory over West Ham last weekend under interim manager Shaun Goater helps their position with points tight in the bottom half of the table. But Villa have plenty to rectify if they want to match their ambitions of finishing inside the WSL's top five this season and they need to find a new manager.

  Liverpool have overachieved in recent seasons in the WSL under manager Matt Beard, raising expectations and ambitions. Having beaten Manchester United to fourth place last season, Liverpool hoped to mount a challenge on the WSL's top three. However, an underwhelming transfer window due to operating on a lower budget than their rivals has left Liverpool's squad depth weak. Disappointing results against Leicester City, West Ham, Everton and Crystal Palace mean they are nine points off where they were at this stage last season. Injuries have not helped but performances must improve in 2025 if Liverpool are to move up the table.

