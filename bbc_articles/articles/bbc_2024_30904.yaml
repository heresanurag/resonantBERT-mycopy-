  Having missed out on the title by goal difference last season, City's intentions were clear for 2024-25 - they want to win the WSL. They got off to a strong start, performing well, seeing off European champions Barcelona in the Women's Champions League and leading the WSL for a while. Top scorer Khadija Shaw has been a standout performer once again but a knee injury for England international Lauren Hemp in November was disruptive. Further injuries have followed and City's squad depth suddenly looks thin. A shock defeat by Everton in their final match before the Christmas break was damaging and they now have work to do in the new year to catch up Chelsea.
  • None Greenwood injury 'not as serious as feared' - Taylor

  Arsenal's season has been a rollercoaster so far. A run of one win in six matches in all competitions at the start of the campaign led to the departure of manager Jonas Eidevall. It pushed Arsenal out of the early title chase and left them with work to do in the Women's Champions League. But under interim manager Renee Slegers they have bounced back, secured their spot in the European knockout rounds and have climbed up to third in the WSL. Their revival is not fully complete and they are still searching for a permanent manager but Arsenal's position is not far off where they should be now.

  Like Arsenal, Manchester United have faced challenges this season with manager Marc Skinner coming under intense scrutiny. They went nine games unbeaten in all competitions but that included three successive draws against Brighton, Arsenal and Aston Villa prior to defeat by Chelsea. A strong defensive record but a lack of creativity going forward has left supporters craving more from United. They are on course to finish inside the WSL's top four - an improvement on last season - but there were hopes they could challenge higher up and that has not transpired so far.

  After an impressive summer transfer window, Brighton's ambitions were clear. They wanted to put pressure on the WSL's top four and they have certainly done that, putting in good displays and creating a six-point gap to their challengers in sixth place. New manager Dario Vidosic has not taken long to implement his style and to get the most out of his attack-packed squad. They still need more consistency but having undergone plenty of changes in the past two years, it has been a very strong start to the season by Brighton.
