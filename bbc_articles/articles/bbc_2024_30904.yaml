  Everton manager Brian Sorensen has had to manage another injury-hit squad while the club await the completion of a takeover. They survived relegation last season and fans expected another tough ride in 2024-25, which is what they have endured. But surprise results against Liverpool, Arsenal and Manchester City have given them a real boost. Considering the challenges they have faced, Everton can be happy with their position going into a crucial winter transfer window.

  Without a win since February - a sequence spanning 15 games - West Ham were struggling near the relegation zone yet again. However, a crucial victory over Leicester City was backed up with three points against Crystal Palace which has improved their position considerably. With the teams at the bottom sitting so tightly together, West Ham know matches against their rivals could be season-defining and so far they have capitalised. It is likely to be another precarious five months in the new year but West Ham have given themselves a platform to build on towards survival.

  Like Villa and Brighton, Leicester City appointed a new manager this summer and had impressed in pre-season. Manager Amandine Miquel has certainly shown glimpses of her style and new signings have made a difference. But injuries, again, have impacted them heavily. They have scored just three goals in 10 matches and have only one win to show for their efforts but an impressive draw against Chelsea on Saturday shows they are on the right track.
