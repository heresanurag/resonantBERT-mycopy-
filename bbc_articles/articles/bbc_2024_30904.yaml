  Chelsea continue to lead the way in the Women's Super League - but how has each team performed so far this season?

  How have clubs fared so far this season in WSL?

  Chelsea have won 14 of their 15 matches under new manager Sonia Bompastor

  There have been sackings, shock results and goals aplenty in the first half of the Women's Super League, but reigning champions Chelsea once again lead the way heading into the winter break. WSL newcomers Crystal Palace sit bottom after 10 matches, while Arsenal and Aston Villa are without permanent managers. There are no WSL fixtures now until 17 January so BBC Sport assesses how teams have fared so far and whether they are living up to expectations.

  Chelsea remained the team to beat as the campaign kicked off but it was expected to be the toughest defence of their title yet. Under new management in Sonia Bompastor, the Blues could have been forgiven for an adjustment period. But they hit the ground running and won every single match in all competitions prior to their 1-1 draw with Leicester City on Saturday. Still unbeaten, they lead WSL rivals Manchester City by six points and look formidable. Chelsea can look forward to the return of several injured stars in the new year that will add more strength.

