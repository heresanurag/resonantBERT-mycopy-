  Simon Le Bon from Duran Duran called Hollis "one of music's great innovators".

  "Talk Talk, which he co-founded and fronted, were on tour with us in 1982," he wrote on Twitter. "It made for a tremendous and very entertaining bill.

  "Mark was the main songwriter of some truly great songs, including It's My Life and Such a Shame."

  Spandau Ballet's Gary Kemp said: "His influence upon music was immense and far reaching. A great presence in the modern era who took his bow far too early but has left us so much still to be moved by."

