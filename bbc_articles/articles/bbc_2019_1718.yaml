  Singer Mari Wilson said Talk Talk's third album, The Colour of Spring, "should be held up there with all the greats".

  And Adele's producer Paul Epworth said hearing the band's fourth album Spirit of Eden - a solemn, ambient record that was hailed a "masterpiece" despite its lack of commercial appeal - had directly inspired his career.

