  Gary Lineker and Micah Richards go head-to-head over Micah's claim that Dejan Stankovic's volley for Inter Milan against Schalke in 2011 is not only the greatest goal in Champions League history, but the greatest of all time.

  Gary Lineker and Micah Richards go head-to-head over Micah's claim that Dejan Stankovic's volley for Inter Milan against Schalke in 2011 is not only the greatest goal in Uefa Champions League history, but the greatest of all time in any competition, full stop.

  But is Micah correct, or was Gary actually on the pitch to witness a goal which beats even Stankovic's incredible effort?

