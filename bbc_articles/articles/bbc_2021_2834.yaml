  Details and reaction to a briefing on the pandemic by Health Minister Vaughan Gething.

  Never mind the zebra crossing - where's the goat crossing? Image caption: Never mind the zebra crossing - where's the goat crossing?

  One unexpected side effect of the coronavirus pandemic has been an outbreak of frisky goats in a north Wales resort.

  The Kashmiri goats of the Great Orme mountain in Llandudno hit the headlines last year after they were filmed wandering the deserted streets of the town during the first lockdown, looking for food.

  The goats are occasional visitors to the town even without a pandemic in place.

  Now, thanks to a delay in giving them their usual contraception shots to keep the numbers under control, their numbers have boomed, and they are back on the streets in the search for food, and roaming further than usual.

  However much people might enjoy the sight of the horned (and horny?) visitors, there are fears for their safety as the amount of traffic on the roads rises with the easing of the current lockdown.

  Louise Emery, Conwy councillor for the Great Orme ward, said: "There seems to be a rogue herd of goats that have wandered across the town into a completely new area where they have never been.

  "It's a great concern at night time, actually, because they tend to wander more at night and the roads have been very quiet.

  "Drivers can literally come round the corner and be faced with eight or nine goats in the road."
