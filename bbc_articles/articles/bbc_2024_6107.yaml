content: |-
  Additional traffic camera footage captured the moments just before the collapse of the Baltimore bridge.

  Authorities released drone video of the Francis Scott Key Bridge crash site on Thursday. New traffic camera footage also showed a different angle of the moments just before the bridge's collapse on Tuesday.

  In the video, investigators from the National Transport Safety Board (NTSB) can be seen on board the ship that collided with the bridge as they survey the damage.
