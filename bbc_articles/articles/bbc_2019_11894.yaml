title: 'Brexit deal: NI firms must declare goods heading to rest of the UK - BBC News'
date: '2019-10-22'
section: Northern Ireland
url: http://www.bbc.co.uk/news/uk-northern-ireland-50137320
content: |-
  The Brexit secretary says there'll be no forms to fill in - then reverses his position shortly afterwards.

  This video can not be played To play this video you need to enable JavaScript in your browser. 'The Brexit minister didn't really know the answer'

  Firms in Northern Ireland will have to submit declaration forms for goods heading to the rest of the UK, under the government's Brexit deal.

  Brexit Secretary Steve Barclay was forced to make the admission after initially denying it was the case.

  This followed previous assurances that Northern Ireland-GB trade would be "unfettered".

  However, Boris Johnson has since told MPs there will only be "light-touch checks" between NI and Great Britain.

  Meanwhile, a government risk assessment has warned the new Brexit deal could mean a reduction in business investment, consumer spending and trade in Northern Ireland.

  Giving evidence to the House of Lords Exiting the EU committee on Monday, Mr Barclay had initially said he did not believe exit forms would be necessary for trade between Northern Ireland and the rest of the UK.

  But he later conceded: "The exit summary declarations will be required in terms of NI to GB."

  The minister's admission came after questions from Labour peer Lord Wood, who later tweeted:

