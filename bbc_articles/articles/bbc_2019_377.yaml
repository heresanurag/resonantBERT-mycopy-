id: bbc_2019_377
title: Is Brexit-voting Llanelli changing its mind? - BBC News
date: '2019-01-14'
section: General
url: http://www.bbc.co.uk/news/uk-46843833
content: |-
  The Welsh town voted for Brexit, but as a major employer leaves the area, how do residents feel now?

  The Welsh town of Llanelli overwhelmingly voted for Brexit in the 2016 referendum.

  But now major employer, a German-owned factory, has decided to leave the town. So what do residents make of Brexit now?

  Correction 21 March 2019: An earlier version of this article referred to a recent poll suggesting that the town would now vote to remain by a small margin. This was not a poll but a projection from an analytics company, based on existing polling data, and so this line has been removed.
