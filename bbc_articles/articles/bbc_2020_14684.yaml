id: bbc_2020_14684
title: 'Coronavirus tier 4 restrictions: Aerial footage shows queues and empty streets
  - BBC News'
date: '2020-12-20'
section: General
url: http://www.bbc.co.uk/news/uk-55385939
content: |-
  London and large parts of the south of England face their first day of tougher coronavirus restrictions.

  Aerial footage filmed on the first day of new restrictions in England shows queues, full car parks and quiet streets.

  Millions of people had their Christmas plans disrupted after tier four was announced for London and parts of east and south-east England on Saturday.

  The government changed the plans in an effort to stop the spread of a new coronavirus variant.
