title: Wigan woman thrilled to become Flatpack World Champion - BBC News
date: '2025-05-04'
section: Manchester
url: http://www.bbc.co.uk/news/articles/c4g2132y2ylo
content: |-
  Hayley McAuley assembled a bedside table in nine minutes and 33 seconds, winning the golden hex key.

  Hayley McAuley says she is "a bit of a machine" when it comes to flatpack furniture

  A woman who took just over nine and a half minutes to build a bedside table has said she was "thrilled" to become the first person to be crowned Flatpack World Champion. The inaugural Flatpack World Championships saw eight competitors battle it out to build flatpack furniture as speedily as they could, at the opening of Grand Designs Live at ExCel London. Hayley McAuley from Wigan said it had been a "rollercoaster" but after taking a mere nine minutes and 33 seconds to build a bedside table, she proved she had the speed and determination needed to become a champion. She said she was keen to take part in the race as she had always been "a bit of a machine" when it came to flatpack furniture.

  The contest was split into two rounds and involved participants making bookcases and bedside tables. "It's been a rollercoaster of a morning, and I am absolutely thrilled to have been crowned Flatpack World Champion," Ms McAuley said. "When I first heard about the competition I jumped at the chance to enter as I've always thought I'm a bit of a machine when it comes to building flatpack furniture. "Everyone truly did a fantastic job."

  Ms McAuley took just over nine minutes to assemble a bedside table in the "hugely entertaining" competition

  Ms McAuley was awarded with a golden hex key medal and was congratulated by Kevin McCloud, who was the host of the event and is best known for presenting Grand Designs on Channel 4. McCloud said: "This was great fun and hugely amusing. "It was wonderful to see who took this seriously, and who accidentally sabotaged their own attempts to win. "We had a really spectacular audience who found it hugely entertaining." The furniture pieces are to be donated to the charity British Heart Foundation.

