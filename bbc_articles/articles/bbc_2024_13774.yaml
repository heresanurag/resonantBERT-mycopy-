  The message to be used only after his death was recorded for a new BBC documentary.

  An inspirational final message from Rob Burrow has been released as part of a new BBC documentary.

  "In a world full of adversity, we must still dare to dream," he says in the video.

  The Rugby League legend recorded the message, to be used only after his death, especially for There’s Only One Rob Burrow.

  Rob was involved in the making of the programme and had viewed it before he passed away on Sunday aged 41.

  The Leeds Rhinos player was diagnosed with motor neurone disease (MND) in 2019, just two years after his retirement.

  He dedicated the last few years to fundraising to help others with the condition.

  There’s Only One Rob Burrow is available on BBC iPlayer.

