  Indie rock band The Cribs also tweeted their support, saying: "These are the sort of places that cities cannot afford to lose, the platform they give young musicians is invaluable."

  Sheffield Labour MP Louise Haigh said she would "fight all the way to save this historic Sheffield landmark", voicing her support alongside comedian Nish Kumar and Charlatans frontman Tim Burgess.

  The BBC spoke to people outside the club, who were saddened to hear the Leadmill might disappear.

  Student Kitty Horne, 20, said she had worked at the club at her mum's urging.

  "My mum came to university here as well and she said 'go get a job there because the Leadmill is great'," she said.

  "It was great, I made some really good friends working there and I've been back for club nights, back for gigs.

  "I think it's quite a big part of the city. It was how my parents met."

  Arctic Monkeys frontman Alex Turner auctioned a black Fender Stratocaster in aid of the Leadmill in 2020

  The Leadmill is not just a music venue, but a place of fond memories for thousands who have caught the biggest artists of the day, before they went on to arenas and superstardom.

  It has been many a students' first night out, the site of blossoming romances and where countless revellers have been showered in beer as their favourite band struck the first note.

  As a former employee during my degree, I had the task of keeping schtum while helping to prepare a secret gig for Arctic Monkeys on the launch of their second album. Naturally, being held in Sheffield.

  And just in the space of a year, I and many others managed to catch acts including Happy Mondays, Graham Coxon, local lads Reverend and the Makers and Milburn, Enter Shikari, Imogen Heap, Biffy Clyro, Lily Allen, Plan B, and many, many more.

  If the venue disappears for good, it would be devastating not just for music fans, but for the staff, DJs, sound engineers, hospitality and trades that rely on it for their income.

  The club has launched a social media campaign - #WeCantLoseLeadmill - urging fans to help them make the case against closure.

  Music Venue Trust, a charity which acts to protect grassroots music venues, said it was aware of the situation and working with the venue to try and ensure its survival.

  Bosses at the Leadmill have previously spoken about the venue's struggles during the pandemic.

  An Arts Council grant of £241,571, and £128,544 from Arctic Monkeys singer Alex Turner - who auctioned off a guitar in aid of the club - helped it to stay afloat.

