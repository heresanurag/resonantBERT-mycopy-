  Harshita Brella's loved ones have released a new photo and a tribute to their sister and daughter.

  Family say Harshita Brella will not be forgotten

  The family of Harshita Brella released a new photo of her as part of their tribute

  The family of Harshita Brella, whose body was discovered in the boot of a car, has said she will never be forgotten. Ms Brella, 24, from Corby, Northamptonshire, was found dead in a silver Vauxhall Corsa in Ilford, east London, on 14 November. Ms Brella's husband, Pankaj Lamba, 23, of Sturton Walk, Corby, is being treated by police as a prime suspect and is believed to have fled the country. Her family said: “Harshita, you left this world but you are still with us in our hearts and will always be there. We will never forget you till our last breath. Always stay with us."

  “We miss you in every moment of our life,” they added. The family had previously spoken to the BBC about their grief following Ms Brella's death. Her father, Satbir Brella, said: "I want my son-in-law to be brought to justice and I want my daughter's body brought home." Her sister said she and Ms Brella were "inseparable". "She was a part of me and I was a part of her," she said. "I now feel like I can't do anything in life without her."

  Ms Brella was made the subject of a domestic violence protection order (DVPO) at Northampton Magistrates' Court in September. On 13 November Northamptonshire Police visited Ms Brella's home on Skegness Walk, Corby, over concerns for her welfare. When officers could not locate her, a missing person investigation was launched, which led to the discovery of her body in the boot of a car on Brisbane Road, Ilford. Earlier this week, police released images of Mr Lamba in the Ilford area and appealed for information from anyone who may have interacted with him. His current whereabouts is unknown. On Thursday detectives investigating Ms Brella's death released a CCTV image of her walking with Mr Lamba on the night they believe she was killed. The picture shows the pair walking together near Corby's boating lake on 10 November. Det Ch Insp Johnny Campbell, from the East Midlands Major Crime Unit, said searches were being carried out in the area.

