title: 'iPhone 16e: Apple gambles on AI features at lower price - BBC News'
date: '2025-02-20'
section: Technology
url: http://www.bbc.co.uk/news/articles/cvgw30dr0w3o
content: |-
  Apple is hoping its latest, lower cost iPhone model will boost sales of its flagship device.

  Apple gambles on new iPhone with AI features at lower cost

  Apple has announced a new iPhone which brings artificial intelligence (AI) features at a lower cost than its flagship handsets. The iPhone 16e has the same processor as the more expensive iPhone 16, Apple said, with similar storage options, though a lower spec elsewhere, including fewer cameras. Apple has been struggling to find a new product that excites consumers - sales of iPhones dropped at the end of last year. It will be hoping that bringing enhanced AI functionality to a less expensive phone will address that - however analysts have been cautious about the sales boost such tools bring.

  Its name is clearly a nod to its iPhone SE series, which were released from 2016 to 2022, and were also lower priced. Apple said the iPhone 16e would be available for pre-order from 21 February in 59 countries. It will launch in the UK for £599, which is £200 less than the iPhone 16 - but more than double the price of the original iPhone SE went for when it launched in 2016. "This now becomes one of the most affordable powerful iPhones now on the market," industry analyst Paolo Pescatore told BBC News. "The move should help accelerate adoption and especially its foray into AI with Apple Intelligence." However other experts have questioned how much value consumers put on AI - an area Apple has spent $189bn (£150bn) on in the last decade. "All we have to show for that is the HomePod and $3,500 ski goggles," said Cory Johnson, Epistrophy Capital Research chief market strategist, referring to Apple's Vision Pro headset, which has not sold many units. "AI should be right in Apple's wheelhouse. But Apple fanboys, fangirls, and investors are right to be disappointed so far," Mr Johnson added. Meanwhile, tech influencer Marques Brownlee said in a post on X, external (formerly Twitter) that the "most lowkey interesting thing" about the iPhone 16e was its new C1 modem. It is the first time Apple has used its own modem design for the iPhone, having previously relied on Qualcomm and Intel's chips to provide cellular connectivity. This also meant paying costly licensing fees to those chip giants - something Apple has previously wrangled over with Qualcomm in court. Adopting its own modems would also help the tech giant realise a vision laid out by chief executive Tim Cook in 2009 of owning and controlling the tech powering its products.

  Much of the conversation around the new handset will probably centre around its power, with Apple electing to use the same A18 chip behind its more expensive devices. This means the 16e will be capable of playing the same games and running the same apps as other iPhones - though AI is almost certainly at the heart of this decision. Mr Cook said in the announcement the new model featured "the performance, intelligence and privacy" Apple fans "expect" from the firm. And he said the Apple Intelligence features on the device would "help you save time, quickly get more things done, and express yourself in new ways". The firm introduced its spin on the tech - Apple Intelligence - with this series of devices, which includes new tools for writing and incorporating OpenAI's chatbot ChatGPT into Siri. It hasn't always gone well, with the firm at one point suspending its AI-generated news alerts after they created false headlines attributed to news organisations including the BBC. It now presents the summaries in italics. Apple said its new phone is "built for Apple Intelligence", and pointed to certain features of the tech, like an easy way to clean up photos or search your image library.
