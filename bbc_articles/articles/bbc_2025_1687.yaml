  • None DeepSeek: The Chinese AI rival that has the world talking Other phone manufacturers have similar features on their devices - though the iPhone 16e will be by far the cheapest way to access AI on an Apple handset. "The iPhone 16e generates a new revenue stream for Apple, and this will be particularly noticeable in key markets like India, where iPhones are out of reach for most people," said Forrester principal analyst Dipanjan Chatterjee. "There is also a second-order effect of cheaper devices like the iPhone 16e, bringing new customers into the Apple ecosystem," he added. The tech giant also appears to aiming its new handset at owners of older models, in the hope of boosting upgrades. A graphic on its website says "there's never been a better time to upgrade" and allows users to compare the iPhone 16e's specs to models dating back to 2019. "We've seen a limited appetite among many of the installed base to upgrade from previous versions, but the new phone reduces the cost hurdle of joining the Apple Intelligence bandwagon," said Mr Chatterjee.
