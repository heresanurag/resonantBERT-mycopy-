title: Moment slackliner conquers highline walk between Dubai towers - BBC News
date: '2025-04-16'
section: General
url: http://www.bbc.co.uk/news/videos/cdjd3rgdxj2o
content: |-
  The world champion slackliner crossed the 100m-long highline walk set up at a height of 224m between the towers.

  Footage shows three-time world champion slackliner, Jaan Roose, completing a 100m-long highline in Dubai. The walk was set up at a height of 224m between the Jumeirah Emirates Towers. Speaking about his performance, Roose says he still feels fear despite slacklining for 15 years.
