  On Tuesday, Israel's Prime Minister Benjamin Netanyahu said it had "resumed combat in full force" and any ceasefire negotiations would now take place "under fire". Air strikes continued on Wednesday, but the initial bombardment marked the heaviest since a fragile ceasefire and hostage exchange deal came into effect on 19 January. Israel and Hamas failed to agree how to take the ceasefire beyond the first phase, with negotiations expected to have started six weeks ago. Hamas did not agree to a renegotiation of the ceasefire on Israel's terms, although it did offer to release a living American hostage (and four bodies), to extend the current arrangement. Israel blocked all food, fuel and medical supplies entering Gaza at the beginning of March in order to put pressure on Hamas. Now, Israel is demonstrating its willingness to also use its troops and severe military force to push Hamas into signing the renegotiated ceasefire deal it is proposing with the United States. The 7 October 2023 attack by Hamas on Israel saw about 1,200 people killed and the capturing of 251 hostages - 25 of whom were released alive during the first phase of the ceasefire. Israel responded with a massive military offensive, which has killed more than 48,500 Palestinians, the Hamas-run health ministry says, as well as causing large-scale destruction to homes and infrastructure.
