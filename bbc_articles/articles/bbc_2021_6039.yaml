title: Super 'blood' Moon treats stargazers around the world - BBC News
date: '2021-05-27'
section: General
url: http://www.bbc.co.uk/news/world-57269272
content: |-
  Two rare celestial events have coincided as the Moon appears larger during a lunar eclipse.

  The Moon turned orangey-red in colour and appeared larger in the sky across parts of the world on Wednesday.
