title: 'Selena Gomez: Emilia Pérez was the ''most nervous'' audition ever - BBC News'
date: '2024-11-04'
section: Newsbeat
url: http://www.bbc.co.uk/news/articles/c62987ve81zo
content: |-
  Critics suggest Spanish-language musical Emilia Pérez could become Netflix's first Oscar-winning film.

  Selena Gomez was 'more nervous than ever' for new musical role

  Selena Gomez stars as the wife of a Mexican Cartel boss in Emilia Pérez

  Selena Gomez says preparing for her latest role was "the most nervous I’ve ever been for an audition". The Lose You To Love Me singer plays Jessi Del Monte in the Spanish-language musical Emilia Pérez, directed by French filmmaker Jacques Audiard. The film, which has already been tipped for success at the Oscars, follows a Mexican Cartel leader who fakes his own death and starts a new life as a woman. Speaking to BBC Radio 1, Selena says when she first saw the script she wasn't sure how it would work but put her faith in Audiard.

  The Grammy-nominated artist admits she had "never really properly done a musical" before. "When I read it and understood it I was like, 'How on earth are they going to make this movie? "But we never doubted him ever."

  Selena won Best Actress at the Cannes Film Festival alongside co-stars Karla Sofía Gascón and Zoe Saldaña

  In the film, which also stars Zoe Saldaña, Karla Sofía Gascón and Adriana Paz, Selena plays the wife of the Cartel leader who becomes Emilia Pérez, played by Karla. "Jessi is the wife, she’s a mother, she’s struggling with confusion - losing the love of her life and all the confusing parts of it," Selena tells Radio 1 Breakfast Show's Greg James. "You’d think it’s a crime thriller," says Zoe, who stars as Rita - a lawyer tasked with arranging Emilia's gender reassignment surgery. "But in reality, it’s a journey of four women trying to find their authentic selves and their versions of freedom and love." Zoe says before her transition, Emilia is an "unredeemable character" but audiences have a "yearning for her redemption".

  Emilia Pérez is set to be released in cinemas and on Netflix in the UK later this month but has already had generally positive reviews. Selena, Zoe, Karla and Adriana have already bagged the prize for best actress at Cannes Film Festival and Variety suggests the film could be the streaming platform's first to win best picture, external at the Oscars. However, Slant, external says the film "tries to be a lot of things, only to end up being about very little" and it's also been accused of using "tropes of trans stories" by Empire, external. Karla, who is a trans actress, told Deadline, external that she felt "a lot of responsibility... for this movement around me". "I’ve done a lot of trying to educate people, to make them respect me." Selena was personally praised as a "welcome surprise" by Entertainment Weekly, external, which said she has "shed any remaining hints of her Disney Channel origins". The 32-year-old's breakthrough role came on Disney Channel's Wizards of Waverly Place in 2007 but she has continued acting and was recently nominated for awards for her role in Only Murders In The Building. "I knew I had to embody this other person," Selena says about playing the role of Jessi. "It all had to come from her. I couldn’t be the pop star - as cheesy as that sounds." Despite her success in both acting and music, Selena says she still felt the nerves. "Because I was so honoured and I knew Jacques [Audiard] was such a visionary and I just wanted to be a part of it."

