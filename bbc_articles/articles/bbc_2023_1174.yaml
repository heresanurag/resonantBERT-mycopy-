title: Harry claims media connections made Camilla 'dangerous' - BBC News
date: '2023-01-09'
section: General
url: http://www.bbc.co.uk/news/uk-64206300
content: |-
  Camilla needed to rehabilitate her image and forged press connections, Prince Harry says in a CBS interview.

  Prince Harry has said his father's wife Camilla forged connections with the British press in order to rehabilitate her image after she married into the Royal Family in 2005 - which alarmed him given his own distrust of the media

  In an interview with CBS, which aired hours after his ITV interview and ahead of the official publication of his memoir Spare, he describes how he believed this made Camilla, who is now the Queen Consort, "dangerous".
