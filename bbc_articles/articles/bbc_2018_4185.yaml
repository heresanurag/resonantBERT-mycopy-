title: Western powers strike Syria targets after suspected chemical attack - BBC News
date: '2018-04-14'
section: Middle East
url: http://www.bbc.co.uk/news/live/world-middle-east-43710303
content: |-
  Russia decries the air strikes, as do Syria and Iran, but Western allies receive support.

  US has 'blatant disregard' for law, says Russia

  Vassily Nebenzia adds that Russia "condemns in the strongest possible terms" the military action in Syria. "The US panders to the terrorists and the current situation is destructive," he said. "The US and its allies continue to demonstrate blatant disregard for international law." He said it was "shameful that the US constitution was cited as a reason to launch military action. "It's interesting what the UK and France will think when they realise they have broken international law while citing the US constitution."
