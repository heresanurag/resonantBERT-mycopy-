  Rohit's absence resulted in Rahul being promoted to open but he chipped Mitchell Starc to square leg for four in the fifth over. Nathan Lyon had Rohit's replacement in the XI, Shubman Gill, caught at slip on the stroke of lunch but the rest of Australia's damage was done by the quick bowlers who were all impressive. Boland nicked off Yashavi Jaiswal in the eighth over and Australia thought the seamer had dismissed Kohli with his next ball as an edge was scooped up by Steve Smith at second slip and grasped by Marnus Labuschagne. However, the third umpire deemed the ball was grounded as Smith took the initial catch - a decision which left the former Australia captain perplexed. Ultimately, it cost only 17 runs. Kohli's difficult run since a century in the first Test continued as he became Boland's second victim, departing to a catch behind the stumps for the sixth innings in succession. Boland did not concede a boundary until his 18th over – evidence of his accuracy and India's tentative batting – while his dismissal of Reddy was his 50th wicket in 13 Tests. All-rounder Beau Webster, making his debut in place of the out-of-form Mitchell Marsh, bowled nicely for figures of 0-29 in 13 overs but India could have shown more intent against the tall seamer. When the aggression did come it first came from Bumrah's bat and it gave the tourists a hint of momentum - and he followed that with the ball, claiming the wicket of Khawaja, his 31st of the series. With good weather forecast for Saturday, however, Australia will still know they are on top, especially as the surface could be at its best for batting on day two.

