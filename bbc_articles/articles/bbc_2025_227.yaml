  Former Australia coach and batter Darren Lehmann on ABC: "India missed a trick. They should have been a little more aggressive. I was disappointed with the way they played. "On the flip side Australia bowled very well and controlled the game. Boland was outstanding. "Australia will be more aggressive. If they bat 70 overs they will be 250/260 and that will be the difference in the game." Australia all-rounder Beau Webster: "It was great to have a few family members here. It all happened pretty quickly. "There was plenty of seam movement – almost too much at times. It will be a real grind with the bat to put some totals on the board."
