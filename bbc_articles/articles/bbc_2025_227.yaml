content: |-
  Australia dismiss India for 185 on day one of their series decider but a fired-up Jasprit Bumrah strikes with the final ball of the day to boost the tourists late on.

  Bumrah strikes in feisty finale but Australia on top

  This video can not be played To play this video you need to enable JavaScript in your browser.

  Australia dismissed India for 185 on day one of the fifth Test but a fired-up Jasprit Bumrah struck with the final ball of the day to boost the tourists late on. Bumrah had opener Usman Khawaja caught at second slip for two and turned to celebrate in the face of 19-year-old Sam Konstas, with India thinking both batters were wasting time in what proved to be the last over. The tourists, who trail 2-1 in the best-of-five series and need to win to retain the Border-Gavaskar trophy, had earlier tentatively edged to their total on a lively Sydney pitch. They left out struggling captain Rohit Sharma but the move did little to improve the fortunes of their top order as Scott Boland took 4-31. India were 72-4 when Boland dismissed Virat Kohli for 17 and 120-6 when Rishabh Pant, who top scored with a cautious 40, and Nitish Kumar Reddy fell to the seamer in consecutive balls. But Bumrah, captaining India in Rohit's place, hit three fours and a six in a 17-ball 22 to lift the total and his dismissal left time for India to have three overs at Australia before the close. The hosts looked to have survived with Bumrah accusing Khawaja of wasting time in the final over, before exchanging words with Konstas as Australia ran the clock down to ensure there was not time for another over. However, Bumrah had the last laugh as he dismissed Khawaja for a sixth time this series, the left-hander poking an edge to KL Rahul, who took a fine low catch. It left Australia, who need only a draw to regain the trophy, 9-1. India need a win to remain in contention to qualify for the World Test Championship final later this year.
  • None The making of Konstas - Australia's new batting star

  After the build-up to this series-finale was dominated by doubts over whether Rohit, who has scored just 31 runs across five innings the series, would keep his place he was duly dropped and India attempted to cautiously counter Australia's bowlers on a pitch offering bounce and seam movement. Just 57 runs were scored in the morning session and only another 50 for the loss of Kohli in the afternoon. Pant, heavily criticised for throwing away his wicket in Melbourne, was repeatedly hit on the body and when he was tempted to finally miscue a pull India were in the 57th over with only 120 runs on the board. But if their batting was unusually subdued, the finale in the evening gloom was anything but. Bumrah was initially irked by Khawaja holding play up by backing away and claiming he was not ready to face a delivery. He offered words from the top of his run-up and Konstas, who had already charged his first ball while playing in just his second Test, responded with some of his own from the non-striker's end, to the point the umpire had to step between the pair. Konstas then walked down the wicket to bump gloves with Khawaja, as Australia further ran the clock down. Khawaja left the following delivery alone but when Bumrah straightened his line for the last the left-hander awkwardly poked forward. After the catch was taken, Bumrah immediately turned to Konstas, although checked his celebration as his India team-mates rushed in to congratulate him – an indication they remain up for the fight despite rumours of unrest in the camp beforehand.

