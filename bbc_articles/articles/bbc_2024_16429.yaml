title: New footage shows US officer standing over Trump gunman's body - BBC News
date: '2024-07-24'
section: US & Canada
url: http://www.bbc.co.uk/news/articles/c2lk2jdewdvo
content: |-
  Bodycam video shows the immediate aftermath of the Trump shooting on the rooftop where the gunman was killed.

  Graphic footage shows US officers standing over body of Trump gunman

  One rallygoer was killed in the shooting

  Bodycam footage captured shortly after the attempted assassination of Donald Trump shows Secret Service and local law enforcement officers near the lifeless body of the gunman. A trail of blood can be seen near the body of the deceased gunman, identified as 20-year-old Thomas Matthew Crooks, who was able to fire at the former president from a roof overlooking the outdoor rally in Pennsylvania 10 days ago. One audience member, Corey Comperatore, 50, was killed and two others - David Dutch, 57 and James Copenhaver, 57 - were badly wounded but are in a stable condition. The new footage emerged hours after US Secret Service director Kim Cheatle resigned over security failures surrounding the assassination attempt.

  The bodycam video captured by Butler County Emergency Services Unit was posted on X by the office of Republican Senator Chuck Grassley. "A Beaver County sniper seen and sent the pictures out, this is him," one Secret Service agent can be heard saying in the video, referring to the shooter's body.

