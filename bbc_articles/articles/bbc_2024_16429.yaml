  "I don't know if you got the same ones I did?" an officer asks the agent of the photos. "I think I did, yeah, he's [the shooter] got his glasses on," the agent replies. The officer adds the sniper "sent the original pictures, and seen him (the shooter) come from the bike, and set the book bag down, and then lost sight of him".
  • None What we know about Trump gunman The agent also asks about whether an abandoned bike that was found in the area belonged to the shooter. "We don't know," an officer replies. Discussions can also be heard about "victims in the crowd" and "people detained who were filming".

  Senator Grassley is one of many members of Congress demanding a full investigation into the incident. Lawmakers questioned Ms Cheatle about security preparations ahead of the campaign rally during a six-hour House of Representatives Oversight Committee hearing on Monday. Ms Cheatle said she took responsibility for the security lapses, but during the hearing she pushed back on calls to resign. She called the shooting "the most significant operational failure at the Secret Service in decades".

  This video can not be played To play this video you need to enable JavaScript in your browser. Trump rally witness tells BBC he saw gunman on roof

  Witnesses reported seeing a suspicious man - suspect Crooks - with a rifle on a rooftop at the rally minutes before shots were fired. Crooks was killed by a counter-sniper shortly after getting a volley of shots off. Trump was injured in the right ear. He later said he felt the bullet "ripping through the skin". Blood was visible on Trump's face as protection officers rushed him away. On Tuesday night, Ms Cheatle resigned in a letter sent to staff saying as director she took "full responsibility for the security lapses".
