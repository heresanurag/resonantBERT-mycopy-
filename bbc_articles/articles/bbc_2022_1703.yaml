  'I should not go, I will not go'

  The Russian Grand Prix is closely associated with Putin, who was instrumental in it being established in 2014 in the Black Sea resort town of Sochi, where he has a palace.

  The event is due to move to a purpose-built facility outside St Petersburg, Putin's hometown, from 2023, but the event's future in F1 must now be in serious doubt.

  On Thursday, four-time champion Sebastian Vettel said he would not race in Russia if the race went ahead.

  The German said: "I should not go, I will not go. It is wrong to race in the country.

  "I am sorry for the innocent people who are being killed for stupid reasons and a very strange and mad leadership."

  His thoughts were echoed by world champion Max Verstappen, who said: "When a country is at war it is not right to race there."

  What have other drivers said?

  Pierre Gasly (Alpha Tauri): "I am really pleased this decision was made. It is completely the right one, knowing they are in war. It's really sad to see what's happening.

  "We know how powerful Russia is. It's an unfair fight and I am just very sorry and feeling very sad for all these families out there. I am also personally affected, having some people close to me in Ukraine.

  "It's a very difficult situation and very scary because they don't know if they are going to be able to make it out and see their relatives. I don't see us going to Russia with the decisions they have taken lately. We are not the only sport to make such a statement and take these decisions."

  Lando Norris (McLaren): "This is a very good decision from Formula 1. Russia is not a place I would want to be going right now and I'm very sad to see what's going on and the innocent lives that are being taken.

  "There is no reason we should live our lives normally and go and have a normal race in that country when those things are going on. I definitely wouldn't want to go."

  Alexander Albon (Williams): "I think it's the right step. It's really saddening. There are much bigger things out there than racing."

  Carlos Sainz (Ferrari): "I would have found it very difficult to catch a plane and land in a country that is at war, so I am happy everything has been cancelled for the moment and now we can just hope and pray that everything is going to be solved soon."

  Lance Stroll (Aston Martin): "It's terrible what is going on in the world right now. For innocent people just lose their lives, you have to put everything in perspective.

  "It's very scary times and we definitely have to pray and hope things will be OK. But it is very hard to watch. F1 has made the right decision. We can't be going to Russia right now."

  What about Haas and Mazepin?

  Haas are owned by the US billionaire Gene Haas, who welcomed Mazepin's money before last season to reduce his own investment in the team.

  Mazepin has been an underwhelming performer, and Putin's decision looks likely to end his F1 career.

  Asked about the Mazepins' involvement, Steiner said: "It needs to be resolved. There are governments involved and I have no power over them and we need to see how the situation develops in Ukraine."

  And referencing the decision to remove the stickers advertising Mazepin's father's company and the colour scheme on the car, which echoed the Russian flag, Steiner said: "We made a decision yesterday with our team partners.

  "I need to work on the rest next week. There is no setback for the competition side of the team, none at all. We just have to go through the commercial issues.

  "The team are not affected by this. I told them there is nothing to worry about. We took the right decision to send a message to everyone."
