title: MSC Virtuosa cruise ship murder investigation victim named - BBC News
date: '2025-05-08'
section: Hampshire & Isle of Wight
url: http://www.bbc.co.uk/news/articles/cr7zrv5l2v0o
content: |-
  The death of James Messham was reported about two-and-a-half hours after the ship left Southampton.

  The cruise ship left Southampton at 18:00 BST on Saturday

  A man who died following an altercation on a cruise ship has been named. The death of James Messham, 60, from West Sussex, was reported about two-and-a-half hours after MSC Virtuosa departed Southampton on Saturday evening. Winchester Coroner's Court confirmed it has been informed of the death but said "inquest proceedings have yet to be opened". A 57-year-old man from Exeter, Devon, was arrested on suspicion of murder and he was released on bail on Tuesday afternoon, Hampshire and Isle of Wight Constabulary said.

  Police said investigations are ongoing and have asked to hear from anyone who was aboard the ship to contact them. The vessel left Southampton at 18:00 BST on Saturday bound for a two-night voyage to Bruges, Belgium, returning at 06:00 on Monday. The MSC Virtuosa is operated by MSC Cruises and has capacity for 6,334 guests.

