title: Police officer dressed as the Grinch leads drug raid in Peru - BBC News
date: '2024-12-22'
section: General
url: http://www.bbc.co.uk/news/videos/c1wq9g3v80ro
content: |-
  An officer in Peru smashed a suspected drug dealer's door in, while clad as Dr Seuss' famous character.

  An undercover police officer wearing a Grinch costume has carried out a drug raid in Lima, Peru.

  Video distributed by the national police agency shows officers smashing a door in before entering a house.

  Three people were arrested and several small packets of cocaine were found during the raid, police said.

  The police unit in Lima is renowned for using costume-clad agents.

  An officer dressed as a teddy bear pounced on a suspected drug dealer during a Valentine's Day operation earlier this year.
