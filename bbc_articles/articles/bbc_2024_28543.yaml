  • None What is Nato and which countries are members? Overall the US has more than 100,000 military personnel deployed in Europe. Last time he was president, Trump threatened to withdraw some of those forces. If elected he could do the same again. Many Republicans believe Europe should look after itself. That's certainly the view of Elbridge Colby, a senior Pentagon official in the last Trump administration. He says the US should "withhold" its forces from Europe to focus on the threat posed by China. The election will also have an impact on US military aid to Ukraine - America is by far its biggest military backer. But a senior Nato official, who did not want to be named, recently told the BBC "regardless of who wins the share of America's contribution to Ukraine will probably decrease in relative terms". Europe, he said, can't expect the US to continue giving an "outsized" contribution.

  The reality is that America's military focus has already been shifting east to the Indo-Pacific region and the rise of China. The Pentagon identifies China as its greatest security challenge. China now has a larger navy than the US. It's building a fleet the size of the entire Royal Navy every two years. The sailors and pilots on board the carrier recognise there's a pivot east too. Cdr Bernie Lutz has spent much of his naval career flying F-18s off a US carrier in the Pacific and Middle East. He recognises why they're now sailing in European waters. "There's a lot going on," he says. But he adds, "I think the Pacific theatre is the bigger, overarching long-term goal". Like the rest of the 5,000-strong crew of the carrier, he has not yet been told where they'll be sailing next - but it's been widely reported that the USS Harry S Truman will soon be on its way to the Middle East. That region, too, will remain a challenge for whoever's president next. Capt Dave Snowden says he's happy to carry the banner of de-escalation or deterrence or even sail into harm's way - wherever the carrier's sent. But the lack of serious foreign policy debate in the election reflects a reluctance to get directly involved in more wars. America will still remain the world's most pre-eminent military power. The question is how will the next president use it.
