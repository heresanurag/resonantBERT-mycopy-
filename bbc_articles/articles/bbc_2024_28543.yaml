title: 'Nato: US military presence in Europe - a lot or little less? - BBC News'
date: '2024-11-02'
section: US & Canada
url: http://www.bbc.co.uk/news/articles/c3de8r2327go
content: |-
  US military power has helped protect Europe for 75 years, but for how much longer?

  A US carrier strike group - a major fleet of warships - is a potent symbol of American military power and a signal that it's willing to defend allies and deter enemies. So the presence of such a force in the North Sea over the past few weeks is meant to reassure European allies, despite the political uncertainties back home. American military power has helped protect Europe for the past 75 years - but the US presidential election raises the question: for how much longer? Military commanders do their best to avoid politics. But among a group of journalists invited on board the USS Harry S Truman, the US presidential race was high on the agenda. The question was: will America still have Europe's back? Rear Adm Sean Bailey said: "What I can tell you is we are firmly committed to our alliance, firmly committed to Nato."

  But he's not the one who will be deciding US foreign policy, and nor is his answer likely to assuage doubts. Germany's Defence Minister, Boris Pistorius, knows change is in the air. Asked about the likely impact of the US election on Europe last week, he said it was a question of whether America does "a lot less, or a little bit less". He didn't mention names, but it's Donald Trump who's likely to do a lot less. USS Harry S Truman proudly bears the name of the president who helped establish Nato 75 years ago. But a second Trump term could once again shake the alliance to its very core. The Truman doctrine of giving military, economic and political support to democratic nations under threat is very different to Trump's policy of America First. He recently said Russia can "do whatever the hell they want" to allies who don't spend enough on defence.

  Any US withdrawal from Europe would leave a large hole. The USS Harry S Truman is proof of what America brings in sheer size and numbers - with 5,000 crew and more than 60 aircraft. The Royal Navy's carrier, HMS Prince of Wales, sailing nearby, provided a reminder of Europe's more modest defences. The British carrier was sailing with an air wing of a few helicopters and eight F-35 jets - a pale reflection of US military clout.
