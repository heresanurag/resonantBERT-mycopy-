  Scotland add Leah Bartlett and welcome back Rachel Malcolm and Leia Brebner-Holden as they end the Six Nations at home to Ireland.

  Scotland aim to 'finish on high' against Ireland

  Scotland are hoping to finish the tournament with a second win in Edinburgh

  Coverage: Watch live on BBC Scotland, iPlayer & online, follow live text and watch video highlights on BBC Sport website & app

  Captain Rachel Malcolm and scrum-half Leia Brebner-Holden return as Scotland look to finish their Six Nations campaign on a winning note when they host Ireland on Saturday. The pair missed last weekend's heavy defeat to England after suffering concussions in the previous loss to Italy. Leah Bartlett also comes into the team at loosehead, replacing Anne Young, who drops to the bench along with Becky Boyd, while there is no place for scrum-half Caity Mattinson as Rhea Clarke continues to offer cover at number nine. To accommodate Malcolm taking her usual place in the back row, Jade Konkel moves into the second row, her third different starting position of the tournament. Ireland are on 10 points and need one more in Edinburgh to be sure of third place following wins over Italy and Wales.

  Scotland are six points behind the visitors, having lost three in a row since beating the Welsh on the opening weekend. "This weekend is about finishing on a high," said head coach Bryan Easson. "It's about everything coming together post some really good performances and some really difficult stages in games. "We've learned a lot about ourselves and now have an opportunity to put together those learnings on the pitch." Scotland finished one point in the table behind the Irish in 2024, losing 15-12 in Belfast. "Ireland are a very physical side and we have to fight fire with fire," added Easson. "I see it being tight - last year was a difficult one for us to take. "We believe we can put Ireland under pressure if we get our processes right." Scotland open their World Cup campaign against Wales in late August and will also meet Fiji and Canada, with matches taking place in Manchester and Exeter. "We don't have long before we come back in for World Cup preparation," said Easson. "I think we're on track. We've capped seven players in this Six Nations, we're working hard on growing the base around the squad."
