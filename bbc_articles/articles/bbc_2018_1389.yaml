id: bbc_2018_1389
title: How two gay penguins inspired a children's play - BBC News
date: '2018-02-03'
section: General
url: http://www.bbc.co.uk/news/entertainment-arts-42840340
content: |-
  The story of two male penguins who fostered a baby penguin has inspired a new show.

  The story of two male penguins, who fell in love at Central Park Zoo and went on to foster a baby penguin, made headlines in New York in the 2000s.

  Now, it has inspired a theatre and dance production by the Birmingham Repertory Theatre, which is aimed at young children.
