content: |-
  Andrew Griggs is accused of murdering his pregnant wife, who went missing in Deal 20 years ago.

  Debbie Griggs has not been since 5 May 1999

  A man has been charged with murder over the disappearance of his pregnant wife 20 years ago.

  Andrew Griggs, 56, is accused of killing Debbie Griggs, 34, in May 1999.

  The mother-of-three was pregnant with her fourth child when she went missing from Walmer in Deal on 5 May. Her car was found a week later.

  Police have issued repeated appeals for information in the years after Mrs Griggs went missing, but her body has not been found.

  Det Supt Paul Fotheringham, of Kent Police, said: "Despite extensive searches and appeals for information detectives were unable to locate Debbie, who was a devoted mother of three young children and expecting her fourth child."

  Mr Griggs, of Ringwood Road, St Leonards, Dorset, has been remanded in custody and is due to appear at Maidstone Crown Court on 14 March.

