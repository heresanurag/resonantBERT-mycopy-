  Fiona Wood, from Kinross, won after correctly identifying "lassitude" as the final conundrum.

  Fiona Wood, from Kinross, won after correctly identifying "lassitude" as the final conundrum

  A forensic accountant from Scotland has become the first woman to be crowned Countdown champion in 26 years. The long-running numbers and words game show has had five other female champions since its launch on Channel 4 in 1982, but none in the 21st Century. Friday's final match between Fiona Wood, from Kinross, and Chris Kirby, went right down to the wire, but the accountant prevailed after correctly identifying the final conundrum as "lassitude", meaning a state of physical or mental weariness. Wood said: "I have absolutely no regrets about applying and would encourage other women to give it a go."

  She is the sixth woman to be named champion of Countdown, which has been broadcast by Channel 4 since 1982, the year the network launched. The first ever series of Countdown was won that year by crossword compiler Joyce Cansfield. Since then, four more women have won the series - Hilary Hopper (in 1987), Liz Barber (1990), Verity Joubert (1995) and Kate Ogilvie (1998). Wood explained she had decided to apply after host Colin Murray appealed for older contestants, and lexicographer Susie Dent encouraged more female applications. Following the appeals from Murray, Dent and mathematician Rachel Riley, Channel 4 said applications from women had soared.

  Fiona held off competition from Chris Kirby in Friday's final

  "Fiona delighted us all and gave us one of the very best moments in our 42-year history," said Dent, who has appeared in the show's dictionary corner since 1992. "This series also reminded us how much Countdown is a show for everyone, and we would encourage anyone who loves the game to apply." Murray took over as permanent host of Countdown last year, following the departure of the former Weakest Link host Anne Robinson. Adapted from the French TV series Des Chiffres Et Des Lettres (Numbers and Letters), Countdown was originally hosted by Richard Whiteley, with Carol Vorderman as co-presenter. Nick Hewer, Des Lynam, Des O'Connor and Jeff Stelling have also served as presenters.
