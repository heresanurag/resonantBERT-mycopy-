title: Jeremy Kyle 'may have caused or contributed to' guest Steve Dymond's death
  - BBC News
date: '2020-11-21'
section: Hampshire & Isle of Wight
url: http://www.bbc.co.uk/news/uk-england-hampshire-55018602
content: |-
  Steve Dymond died days after taking a lie-detector test on the Jeremy Kyle Show.

  Steve Dymond was found dead at his home days after he took a lie-detector test on the Jeremy Kyle Show

  TV presenter Jeremy Kyle "may have caused or contributed" to the death of a man who was found dead after filming an episode of his ITV show, a coroner has said.

  The body of Steve Dymond, 63, was discovered at his home on 9 May last year, days after he took a lie-detector test on the programme.

  The show was axed shortly afterwards.

  Hampshire coroner Jason Pegg has made Jeremy Kyle an "interested person" for the inquest.

  During a pre-inquest review in Winchester, he said the presenter "may have caused or contributed" to Mr Dymond's death.

  "It might seem ludicrous not to have Mr Kyle to give evidence to give his take on the situation," Mr Pegg said.

  Lawyers for Mr Kyle and ITV argued that Mr Dymond's "upsetting experience" on the show was "established fact" and the scope of the inquest should not be a "detailed top to bottom inquiry into the Jeremy Kyle Show, its selection, treatment and aftercare of participants".

  "It would not be required to call for evidence from ITV employees involved in his appearance to get to that starting point," Neil Sheldon QC said.

  The Jeremy Kyle Show was axed following Mr Dymond's death

  Mr Dymond died of a morphine overdose and left ventricular hypertrophy, which is when the left chamber of the heart is not pumping properly, at his home in Portsmouth.

  Seven days earlier he took a lie detector test on the programme to show whether he had cheated on his ex-fiancee Jane Callaghan, who is from Gosport.

  Counsel for Mr Dymond's family, Caoilfhionn Gallagher QC, told the hearing Mr Dymond became "distressed" after he failed the lie detector test.

  She said Mr Dymond had gone on the show to "prove his fidelity", and had said: "I pushed and pushed but it all went wrong."

  After the result was announced during filming, the audience "booed and jeered" at him and he was "called a failure by the presenter", Ms Gallagher said.

  She said Mr Kyle was "in his face" and even when he was "at the point of collapsing, he was still being heckled".

  Ms Gallagher said his state of mind was known by the crew on the show, with a message sent on a WhatsApp group stating: "Just so you know, he's still crying, he has just said he wishes he was dead. Just giving you the heads up."

  The hearing was told Mr Dymond was originally turned down to appear on the show but was accepted as a guest after gaining a letter from his doctor.

  He had been receiving mental health care from Southern Health NHS Foundation Trust, the inquest heard.

  Coroner Mr Pegg said the inquest would "not be an inquiry into the show generally" and would not be held in front of a jury.

  "What was in his [Mr Dymond's] mind, it seems to me, what happened on the show and how he was treated was relevant to how he came by his death," he said.

  Ms Gallagher said it was "still unclear" as to whether all the recorded footage of the programme had been released by ITV.

  She said the family was concerned about something happening on the studio stage that attracted the attention of the audience but was not seen in the footage.

  The coroner gave ITV six weeks to confirm that all recorded material had been handed over.

  The full inquest, which is expected to last about a week, is not expected to be held before May next year.

