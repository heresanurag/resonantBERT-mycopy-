content: |-
  The gunman is said to have shot the employees and then himself at a school in Sanski Most, north-western Bosnia.

  Bosnian police say three high school employees were shot dead by a co-worker

  Three members of staff at a secondary school in north-western Bosnia have been killed during a shooting by a co-worker, local media is reporting. Bosnian police say the gunman used an automatic rifle to kill the school's employees before shooting himself, adding that he is in hospital in a critical condition. Initial reports by local media suggest the gunman was a caretaker at the Sanski Most school. The shooting took place during Bosnia's summer holiday period.

  Police say they received reports that a man had opened fire at the school at around 10:00 local time (08:00 GMT). Adnan Beganovic, police spokesman for the region, told reporters the shooter had tried to take his own life and was seriously injured. Police did not elaborate on whether there was a motive, but reports by Bosnian media suggest the employee had been suspended and fired shots during a school committee meeting. He was taken to a hospital in the town of Banja Luka. Bosnian media say the school's dean, secretary and English teacher were killed in the attack.
