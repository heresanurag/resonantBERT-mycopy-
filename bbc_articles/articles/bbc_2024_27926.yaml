  • None Who Trump has appointed to his top team so far According to CBS News, Gaetz had asked Trump for a pre-emptive pardon for any related crimes prior to the president leaving office in January 2021. All this makes him an unlikely choice for a position that typically goes to more senior politicians, well versed in law. Gaetz, 42, has a law degree and worked for a Florida law firm before his eight years in Congress. Joe Biden’s attorney general, Merrick Garland, was a senior federal appellate court judge. Trump in his first term picked US Senator Jeff Sessions, and later Bill Barr, who had decades of experience in Republican presidential administrations. The Senate will be responsible for confirming Gaetz’s nomination, and the Florida congressman has ruffled more then a few feathers in that chamber – including among Republicans. While his party has a majority, it would only take four “no” votes, joined by unified Democratic opposition, to sink his chances. Gaetz himself said last year that he would love to be attorney general while acknowledging it was unlikely. “The world is not ready, probably,” he told Newsmax in an interview. “Certainly Senate confirmation wouldn’t be, but you know, a boy can dream.” For the moment, however, Trump’s closest supporters are celebrating his pick. “The hammer of justice is coming,” Elon Musk posted about Gaetz on X. Regardless of the ultimate outcome of Gaetz’s bid to be attorney general, Trump has fired a warning shot across the bow of US government. While his second term in office may be more organised than his first, it may end up being even more confrontational.

