content: |-
  Picking the outspoken congressman for attorney general is Trump laying down a challenge, writes Anthony Zurcher.

  This video can not be played To play this video you need to enable JavaScript in your browser.

  Donald Trump’s nomination of congressman Matt Gaetz to be his attorney general has arrived like a thunderclap in Washington. Of all the president-elect’s picks for his administration so far, this is easily the most controversial - and sends a clear message that Trump intends to shake up the establishment when he returns to power. The shockwaves were still being felt on Thursday morning as focus shifted to a looming fight in the Senate over his nomination. Trump is assembling his team before he begins his term on 20 January, and his choice of defence secretary, Fox News host Pete Hegseth, and intelligence chief, former Democratic congresswoman Tulsi Gabbard, have also raised eyebrows. But it is Gaetz making most headlines. The Florida firebrand is perhaps best known for spearheading the effort to unseat then-Republican Speaker of the House Kevin McCarthy last year. But he has a history of being a flamethrower in the staid halls of Congress. In 2018, he brought a right-wing Holocaust denier to the State of the Union, and later tried to expel two fathers who lost children in a mass shooting from a hearing after they objected to a claim he made about gun control. His bombastic approach means he has no shortage of enemies, including within his own party. And so Trump's choice of Gaetz for this crucial role is a signal to those Republicans, too - his second administration will be staffed by loyalists who he trusts to enact his agenda, conventional political opinion be damned. Gasps were heard during a meeting of Republican lawmakers when the nomination for America's top US prosecutor was announced, Axios reported, citing sources in the room. Republican congressman Mike Simpson of Idaho reportedly responded with an expletive. “I don't think it's a serious nomination for the attorney general,” Alaska Republican Senator Lisa Murkowski said. “This one was not on my bingo card.”
