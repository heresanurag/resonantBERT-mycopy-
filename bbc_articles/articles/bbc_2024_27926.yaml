  • None Seven things Trump says he will do in power Gaetz does have some allies on Capitol Hill who share an unwavering loyalty to Trump. The Florida lawmaker has been one of the president-elect's most aggressive and relentless defenders - at congressional hearings, in press conferences and during television appearances. On Wednesday, House Speaker Mike Johnson, another devoted Trump loyalist, called Gaetz an "accomplished attorney". "He's a reformer in his mind and heart, and I think that he'll bring a lot to the table on that," said Johnson. In a social media post, Trump spelled out how he intends to use Gaetz as a wrecking ball to radically change the US Department of Justice, which he has regularly blamed for his multiple legal troubles. “Matt will root out the systemic corruption at the DOJ, and return the department to its true mission of fighting crime and upholding our democracy and constitution,” he wrote. During the campaign, Trump promised retribution for the numerous investigations launched against him. Now, it appears, Gaetz will be at the frontlines of Trump’s efforts to bring the justice department to heel. The department also investigated Gaetz himself. Last year, it declined to bring charges over allegations he violated sex-trafficking laws during a trip he took to the Bahamas with paid escorts. He was the subject of an ongoing ethics investigation in the House of Representatives into allegations of sexual misconduct, illicit drug use and misuse of campaign funds.

  This video can not be played To play this video you need to enable JavaScript in your browser. What a Republican trifecta means for Trump's second term

  But on Wednesday evening, reportedly just two days before a highly critical House report, external on the investigation, Johnson said Gaetz had resigned as a lawmaker, effectively ending the House probe since the committee only investigates members. On Thursday, top Senate Democrat Dick Durbin asked the House committee to preserve and share the findings of that report, saying the sequence and timings of the resignation raised questions. "Make no mistake: this information could be relevant to the question of Mr Gaetz’s confirmation as the next Attorney General of the United States." Gaetz has denied all the allegations against him.
