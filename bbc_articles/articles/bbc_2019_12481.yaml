title: Boris Johnson rejects leaks over Irish border plan - BBC News
date: '2019-10-01'
section: General
url: http://www.bbc.co.uk/news/uk-politics-49891319
content: |-
  Mr Johnson told BBC Breakfast he was "not going to be producing now what we are going to be tabling" to the EU.

  The prime minister told BBC Breakfast he was "not going to be producing now what we are going to be tabling" to the EU.

  He rejected leaked claims overnight that the government has proposed "customs clearance zones" to tackle the Irish border issue.
