content: |-
  BBC tennis correspondent Russell Fuller writes about his experience of getting to know Andy Murray throughout his career.

  'Compelling on and off court' - a decade on tour with Murray

  When Great Britain won the Davis Cup in 2015, Andy Murray secured 11 of their 12 points - in singles and doubles - across four matches

  What is Andy Murray really like? It is a question I am frequently asked. Driven, passionate, emotional, resilient and potty-mouthed are all adjectives regular Murray watchers could turn to. Mischievous, funny, loyal, polite and indecisive are words I would add, having been lucky enough to develop a professional relationship with him over the past 11 years.

  As I travelled home from Wimbledon one autumn afternoon, a message flashed up on the screen in my car. It was from Murray's long-time agent Matt Gentry, informing me Andy had just contacted him to say I had cut him up on a slip road on to the A3. I am still (well, 95%) sure I had not - and was only too aware of his sense of humour - but my pulse still quickened a little when I turned off the A3 and was followed for the next 20 minutes by an expensive-looking car. I never got a clear look at the driver's face as he was a lot lower to the ground than I was, but the journey home became more relaxing once the car in question had turned left. I got off much more lightly than Britain's Davis Cup winner Dom Inglot, who was dropped in it from a great height by Murray when he suggested, in a live television interview, that Inglot had met a new woman while in Glasgow on national duty. A frantic call home reassured his then partner that Andy was just being Andy.

