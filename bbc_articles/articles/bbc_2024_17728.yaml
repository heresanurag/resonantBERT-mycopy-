  Murray truly loves tennis and cares about the progress of other British players. He was the guy who would watch streams of Challenger matches on his laptop, and I vividly remember him sitting in a draughty stand late one night at the 2016 Australian Open to watch Dan Evans in qualifying. At that same tournament, at 1am on the morning of the singles final against Djokovic, Murray appeared in the Rod Laver Arena players' box to take photos and videos of his brother Jamie, who had just won his first Grand Slam men's doubles title. It is amazing to think he made it this far, given his right hip handed in its notice seven years ago. He was still world number one then, and even though his thirties have been dogged by injury, just think of the extra memories he is leaving us with. Winning the 2019 European Open in Antwerp with a metal hip; playing mixed doubles with Serena Williams at Wimbledon; an epic singles match against Thanasi Kokkinakis that lasted until 4:05am at the Australian Open. All after having survived what he billed as probable retirement in Melbourne in 2019. "I wouldn't be so sure," was coach Ivan Lendl’s take after that emotional news conference. He knew his man very well. Lendl showed no emotion when rising stress levels got the better of Murray on the court. The way he verbally abused his team during matches was, frankly, appalling. He was not proud of it and tried, unsuccessfully, to change his ways.

  Andy Murray thought his career was about to end going into the 2019 Australian Open but a hip resurfacing operation allowed him to play for another five years

  When I began this job, Murray was already an Olympic, US Open and Wimbledon champion - but the story was only half-told. My favourite memories are of the man who won all 11 matches he played as Britain won the Davis Cup for the first time in 79 years. There was the pivotal Sunday singles against France's Gilles Simon in the quarter-finals at Queen's. Murray found himself a set, a break and break point down, sinking to his knees in exhaustion after losing one 35-stroke rally. He was in floods of tears by the end as he helped Britain into the semi-finals for the first time in 34 years. Having given very serious thought to pulling out of the lucrative ATP Finals to prioritise clay-court practice for the final, he secured the cup for his country with a victory over David Goffin, courtesy of that now famous top-spin lob. He was in Belgrade the following July to support, rather than play, for his country in a tie with Serbia. This was just a week after he had won Wimbledon, in what turned out to be arguably the greatest year of his career. A second Olympic gold followed in Rio a month later and he would win his last 24 matches of the season to become world number one for the first time. Heady days which all too quickly turned sour - but he was at least able to make a last Wimbledon appearance this year, albeit in doubles rather than singles, and appear for his final tournament at the Paris Olympics alongside Dan Evans. What a body of work, and what a mark Murray has made on British life, as well as British sport. A version of this piece was first published on 6 July 2024.
