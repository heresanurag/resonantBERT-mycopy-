content: |-
  Mike Tyson slapped Jake Paul during their final face-off after both men made weight for their heavyweight fight on Friday.

  This video can not be played To play this video you need to enable JavaScript in your browser. Follow live text commentary of Mike Tyson v Jake Paul from 03:00 GMT on Saturday, 16 November on BBC Sport website & app

  Mike Tyson slapped Jake Paul at a charged weigh-in for Friday's controversial heavyweight fight in Texas. Novice boxer Paul, 27, will take on 58-year-old Tyson at the AT&T Stadium in Dallas. After both men had weighed in, Paul crawled across the floor before rising up to Tyson's eyeline for the traditional final head-to-head. Tyson had refused to engage with Paul's goading for much of fight week, but slapped his opponent across the face, prompting security and team members to rush in to separate the fighters. "Talking's over," Tyson said and walked off stage. Paul, meanwhile, was smiling before sitting down and appearing to meditate. "I didn't even feel it. He's angry. He's an angry little elf," Paul said of the slap. "Mike Tyson, I thought that was a cute slap, buddy, but tomorrow you're getting knocked out." Two-time world champion Tyson – who last competed professionally in 2005 - had just weighed in at 16st 4lb with Paul a pound lighter.
