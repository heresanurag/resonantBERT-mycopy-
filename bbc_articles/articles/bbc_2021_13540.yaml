title: Molly Russell's father meets Facebook whistleblower Frances Haugen - BBC News
date: '2021-10-24'
section: General
url: http://www.bbc.co.uk/news/uk-59032290
content: |-
  Molly, 14, died after viewing graphic content on Instagram, which is owned by Facebook.

  Facebook whistleblower Frances Haugen will give evidence to MPs on Monday as part of government plans for social media regulation.

  Ms Haugen, an American data scientist, worked at Facebook for two years and leaked documents that she said proved Facebook repeatedly prioritised growth over users' safety.

  She met the campaigner Ian Russell, whose 14-year-old daughter died by suicide after viewing disturbing content on Instagram, which is owned by Facebook.
