title: Pontins owner charged with corporate manslaughter after grandmother death -
  BBC News
date: '2025-04-15'
section: Somerset
url: http://www.bbc.co.uk/news/articles/cm2xkdmjyx0o
content: |-
  Wendy Jones died in hospital about six months after being injured at Pontins Brean Sands, in Somerset.

  Wendy Jones, pictured with two of her grandchildren, died after a visit to Pontins Brean Sands

  The owner of Pontins holiday parks has been charged with corporate manslaughter after an air conditioning duct fell on guests at a resort. Eighteen people were injured at Pontins Brean Sands, Somerset, when a section of the ceiling and ducting inside its entertainment centre, called The Fun Factory, collapsed in February 2019. Among them was grandmother Wendy Jones, 68, from Hereford. She spent the final six months of her life in hospital before she died on 4 August 2019. Pontins' parent company, Britannia Jinky Jersey, will appear in court next month. Pontins is part of the Britannia Hotels group. The BBC has contacted Britannia for comment.

  In addition, contractor Stephen Bennison, 58, from Farington in Lancashire, has been charged with an offence under Section 3 of the Health and Safety at Work Act 1974. A BBC News special report into the incident last year highlighted the concerns from a former employee about the installation of insulation on top of the ceiling and ducting in 2015.

  About 100 people were in the entertainment hall about to play bingo when part of the ceiling and the ducting collapsed

  Devon and Somerset Fire and Rescue said in 2019 that the incident involved the collapse of approximately 40m (131ft) of structural ducting and ceiling sections, exposing live damaged electrics. About 100 people were in the entertainment hall about to play bingo when the collapse happened. The charges follow a joint investigation by Avon and Somerset Police and Somerset Council. Ch Supt Roger Doxsey, senior investigating officer, said: "First and foremost our thoughts are with the family of Wendy Jones. "This has been a complex investigation and we're grateful for the support of Somerset Council and other partners to reach this stage." The defendants are due to appear at Bristol Magistrates' Court on 6 May.

