title: Julian Assange freed on US plea deal and starts journey home - BBC News
date: '2024-06-25'
section: General
url: http://www.bbc.co.uk/news/videos/ckrrgv31d5zo
content: |-
  The WikiLeaks founder is due to return to Australia, after signing a US deal that will see him plead guilty to criminal charges and go free.

  Julian Assange has started his journey home to Australia, after agreeing a US plea deal.

  The WikiLeaks founder has left prison in the UK, and is flying via Bangkok to the Northen Mariana Islands to finalise the deal.

  Assange was charged with conspiracy to obtain and disclose national defence information, after the Wikileaks site published secret US military records.
