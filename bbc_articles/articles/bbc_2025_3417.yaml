title: 'Talbot Green shooting: Joanne Penney named as victim - BBC News'
date: '2025-03-11'
section: Wales
url: http://www.bbc.co.uk/news/articles/cz61nv49872o
content: |-
  The 40-year-old died at the scene of the shooting in Rhondda Cynon Taf on Sunday.

  Joanne Penney has been named as the woman shot dead in Talbot Green on Sunday evening

  A woman shot dead in a block of flats has been named as Joanne Penney. The 40-year-old was killed at a property on Green Park in Talbot Green, Rhondda Cynon Taf, on Sunday evening. A 42-year-old man from Talbot Green has been arrested on suspicion of murder and is in custody. South Wales Police remain at the scene and are investigating the incident.

  The force said formal identification was yet to take place, but it believed the woman to be Joanne Penney and her next of kin had been informed. A number of crime scenes have been set up in the area as inquiries continue and road closures remain in place as officers gather evidence.

  A cordon is in place outside the flats in Talbot Green where Ms Penney was shot dead

  Det Ch Supt Ceri Hughes said: "I want to reassure the local community that a team of experienced detectives and specialist staff are continuing to work at pace to piece together the events of last night including recovering CCTV. "I understand that those living in Talbot Green will be concerned and residents will see an increased police presence in the area both as part of the investigation and to reassure the community." Local councillor Sarah Jane Davies said recent events in the area had caused "concern and alarm" in the community.

  Police remain at the scene in Talbot Green on Monday

  Calum Williams, who lives just a few houses from the incident, said he heard the gunshot. "It's terrible. I live just two doors down from where it happened. I was making a bottle for the baby and I heard a gunshot. "It's pretty frightening, especially with the baby." Carolyn Pugh, who lives nearby, said she heard the police helicopter hovering last night. "It was scary. Within seconds, they [police] were everywhere," she said. "You didn't know what was happening but you knew there was something bad. "I've been here about 28 years and it was never like this."

  Talbot Green, close to Llantrisant, is in Rhondda Cynon Taf county and about 10 miles north-west of Cardiff

  Local resident Anthony Dando, 59, also said he was shocked by the incident. "We've had trouble around here before but never with a gun. It's frightening that sort of thing happens so close to your front door," he said. "It's shocking to hear what happened to the girl. It's so sad for her family and our thoughts are with them."

  This video can not be played To play this video you need to enable JavaScript in your browser. The BBC's Stephen Fairclough is at the scene of the fatal shooting

  There is shock here that a member of this community has been shot and killed at a home on a very ordinary street, just a stone's throw away from Talbot Green's popular out-of-town retail park. The police outer cordon stretches across the road between a sheltered housing complex and a detached house. Behind the cordons, scenes of crime officers and South Wales Police's scientific unit are examining a number of locations on the maisonette-lined cul-de-sac. Police are signing residents in and out of the taped off area. Some say this is a quiet area without any trouble. Others have said there are drug problems and have been fights. All say, however, they never expected a gun to be used here.
