content: |-
  Captain Ben Stokes says Shoaib Bashir "has shown the world what he can do" after bowling England to victory in the second Test against West Indies.

  Bashir 'showed the world what he can do' in England win

  This video can not be played To play this video you need to enable JavaScript in your browser.

  Captain Ben Stokes said Shoaib Bashir had "shown the world what he can do" after the off-spinner bowled England to victory in the second Test against West Indies at Trent Bridge. Bashir took 5-41 as the home side dismissed the tourists for 143 in the final session of the fourth day to win the match by 241 runs and claim an unassailable 2-0 series lead. At 20 years and 282 days, Bashir became the youngest England bowler to take a five-wicket haul in a home Test and the first spinner to take five in an innings at Trent Bridge since 2006. "He has got so much talent and he's got an unbelievable desire to get better," said Stokes. "It's really good for a young guy to put in a performance that wins England a Test. He was pretty emotional at the end. It's a pretty cool day for him." Bashir was a surprise choice for England's winter tour of India - called up after playing only six first-class matches. However, he has now taken three five-wicket hauls in five Tests, and in one of those matches - the heavy defeat of West Indies in the first Test at Lord's last week - he was not required to bowl.

  "He has shown the world what he can do," added Stokes. "His intent is to always take wickets and never just to hold an end up." England have opted for Bashir over Jack Leach, despite the latter being first-choice for their county Somerset. Bashir even had to spend time on loan with Worcestershire earlier this summer in order to play in the County Championship. Stokes and coach Brendon McCullum have identified Bashir’s height as one of his key attributes. At 6ft 4in, Bashir says he is "still growing". His release point of 2.35m is third-highest recorded by a spinner, meaning he is likely to gain more of a slow bowler's key weapon: bounce. All-rounder Stokes continued: "The decisions we make are all based around not only how far we think talent can take a player, but if we think they're good enough for international cricket straight away. "'Bash' showed what he could do in India with conditions in his favour, but the pitch this week didn't really offer much for spin and he has taken seven wickets in the match. I don't want to sound like it's an 'I told you so' kind of thing, but it sort of is."

  This video can not be played To play this video you need to enable JavaScript in your browser.

  Stokes first spotted Bashir in a video posted on X, formerly Twitter, bowling in his first-class debut in June of last year to England's all-time leading run-scorer, Sir Alastair Cook. Stokes then shared the video in a WhatsApp group with McCullum and England managing director Rob Key. "The ceiling for Bashir is so high," Cook told Test Match Special. "You've got to bowl to learn your craft, but what we're seeing is him learning on the job and still delivering the goods. "He's nowhere near the finished article, and what will be funny is in 10 years' time, if he's still playing, he'll look back and think 'cor, I wasn't very good then', and yet he's still doing the job for England." Bashir's 24-wicket haul is the third-most in the first five Tests by an England spinner since World War Two, behind Nick Cook and Graeme Swann. Bashir himself had not been to Trent Bridge before he played for England in Nottingham. After England set West Indies 385 to win or four sessions to bat for a draw, Bashir spearheaded the tear through the tourists, who were bowled out in 36.1 overs after tea on Sunday. "It was the first time I have bowled for England in England and it was so special to finish it in a session," Bashir told Test Match Special. "I'm the youngest in the group, everyone gets around me. I’m still trying to soak everything in, that innings went so quickly." England have named an unchanged squad for Friday’s third Test at Edgbaston, where they will aim for a 3-0 clean sweep.

