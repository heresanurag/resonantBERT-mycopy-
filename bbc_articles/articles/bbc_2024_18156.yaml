title: 'Belfast: Anti-racism protesters rally in city centre - BBC News'
date: '2024-08-10'
section: Northern Ireland
url: http://www.bbc.co.uk/news/articles/cm2n0lxjmrzo
content: |-
  An anti-immigration rally and a counter protest in Belfast end with both groups peacefully dispersing.

  More than 1,000 anti-racism protesters gathered in Belfast city centre

  An anti-immigration protest and a counter protest in Belfast city centre have ended, with both groups peacefully dispersing. Over the past week, sporadic violence had broken out across the city and homes and businesses had been targeted in racially motivated attacks. More than 1,000 anti-racism protesters gathered at Belfast City Hall on Friday to oppose an anti-immigration protest at the same location. About 200 people gathered for it and police land rovers were moved into the middle of the road to separate the two groups.

  There was a significant police presence in the area. Police announced over loudspeaker that face coverings must be removed and failure to do so could result in arrest and prosecution. Earlier, Ass Ch Cons Melanie Jones told a news conference that "from today [Friday] our officers may have additional powers to stop and search or require the removal of face coverings". She was referring to existing powers available to police within the Public Order (Northern Ireland) Order 1987. Under section 23b, external, they have stop and search capabilities “in anticipation of violence”. BBC News did not see police officers exercising those powers in the city centre.

  About 200 people gathered for an anti-immigration protest

  A number of businesses around Belfast city centre announced early closing times in anticipation of potential disorder. Some shut their doors shortly after midday. The grounds of Belfast City Hall were closed and its gates locked. Libraries across Belfast also announced early closures, and Queen's University Belfast closed its buildings. The areas around City Hall, Chichester Street, Donegall Square North, West and East in Belfast have now reopened to traffic.

  President of the Belfast Chamber Gavin Annon said it was "completely unacceptable" that so many businesses decided to close early because of the threat of violence. "These businesses are the heartbeat of our city, and the hard-working owners and staff should not have their livelihoods impacted while trying to carry out their jobs," he continued. He also added that the closures projected "a very poor and inaccurate impression of our city" during peak tourism season.

  Some shops in Belfast City Centre closed early on Friday

  Translink warned passengers that services will be subject to delay and disruption today due to protests. A number of services have put diversions in place, external and Translink have said they will "liaise closely with the PSNI and continue to follow their guidance - and any diversionary routes in place".

