  ACC Jones encouraged those protesting to do so peacefully and to follow police advice. “Our officers will have all the appropriate tactics to tackle disorder and criminal behaviour the likes of we have seen in the past week," she said. ACC Jones said police are investigating who is causing this disorder and “we will be bringing them to justice". “It is time for our communities to call this out for what it is, it is not acceptable. “The scenes we have seen over Belfast over the past week are a disgrace." In total police said 27 arrests have been made and 22 people have been charged to date. On Friday, the PSNI charged a 61 year old man with rioting. He is due to appear before Belfast Magistrates' Court on Saturday. ACC Jones said Police Scotland will send additional officers to boost the Police Service of Northern Ireland ( PSNI) next week. "The initial deployment will give us four extra units, which is in the region of 120 additional officers deployed onto our streets," she said. She said 10 officers have been injured so far. Police will have a “significant visible policing operation” in place across Northern Ireland to ensure everyone is kept safe, she said.

  On Thursday night, bricks and masonry were thrown at police dealing with race-related hate crimes in Belfast. A car was set on fire on Benburb Street and the windows of a number of houses were smashed on Kilburn Street, both in south Belfast. In east Belfast, bins were set on fire on Castlereagh Street. A group of masked men attacked police on Flora Street, but no officers were injured.

  Windows were smashed and a bins were set on fire on the streets of Belfast

  It follows several nights of disorder in Belfast, including racially motivated attacks. A number of businesses were targeted after an anti-immigration protest at Belfast City Hall on Saturday. There were further incidents in Belfast on Monday when a man was left in a serious condition after his head was stamped on. Police described it as a racially motivated hate crime.

  Windows of a house were smashed on Kilburn Street, south Belfast

  On Tuesday, an overseas nurse spoke to BBC News NI over their fear of coming into work because of the racist violence. On Wednesday, a healthcare worker's home, which she shares with her eight-year-old daughter, was attacked in Ballyclare.

  There has been widespread disorder across the UK - which erupted after the fatal stabbing of three girls in Southport - with unrest fuelled by misinformation online.
