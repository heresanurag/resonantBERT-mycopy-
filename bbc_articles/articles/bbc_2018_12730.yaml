title: Meghan's message of female empowerment in Fiji - BBC News
date: '2018-10-24'
section: General
url: http://www.bbc.co.uk/news/45965195
content: |-
  The Duchess of Sussex spoke in Fiji about the importance of women getting university education.

  Meghan, Duchess of Sussex, is touring Fiji with Prince Harry.

  In her maiden speech on the tour, she spoke about how important it is for women to access higher education.
