title: 'VE Day: 101-year-old WW2 codebreakers reunite for anniversary - BBC News'
date: '2025-05-03'
section: Wales
url: http://www.bbc.co.uk/news/articles/cvgqyqmy7qqo
content: |-
  The two women from south Wales relocated to London during the war to work at Bletchley Park.

  Kath (left) and Gwenfron worked at Bletchley Park together during the war but only met last year at a joint birthday party

  Two 101-year-old former codebreakers at Bletchley Park have reunited ahead of the 80th anniversary of VE day. Kath Morris, from Neath, and Gwenfron Picken, from Port Talbot, have been celebrated for their contributions to breaking Germany's secret codes during World War Two. Despite growing up in the same area, they did not know each other until they met at a joint 100th birthday party last year. The pair sat down with First Minister Eluned Morgan as she talked to the veterans, which Gwenfron called a "pleasant surprise".

  Gwenfron was 18 when she was called for an interview in the Port Talbot Labour Exchange where she was asked how she would support the war effort. She wanted to be a nurse, but was told she was too slight for the role. This led her to London - a city she had never been to before - where she was assigned to Bletchley Park. Gwenfron said she was "proud" of her service and even got promoted while working there from 14 August 1944 to 26 September 1945. At a time when fears about German spies were heightened, you could only talk to people you "worked with, or you lived with," according to Gwenfron. She said she never heard the air raid siren go off at Bletchley Park which contrasted with her time in Wales. "They kept away. At home it used to go off quite often. Especially when they were going over Swansea," she said.

  Workers were bound by the Official Secrets Act to not share what they were doing at Bletchley Park

  Kath left school at the age of 14 and attended commercial college before beginning secretarial work. She started out as a fire watcher in the war, which involved patrolling rooftops to identify fires started by enemy aircrafts dropping bombs. At 18 she received a letter to go to the Foreign Office for an interview in London, where she was given a typing test. Two weeks later she received a letter telling her to attend Bletchley Park despite having little idea what she would be doing there. "I decoded Morse code and passed it to the next person," she said. "I was a small cog in a big machine. I didn't even tell my husband about my job until years later."

  Both women said it has been "fantastic" to look back on their time at Bletchley Park during the last year. It has made them realise how much respect people have for the codebreakers who helped to win the war, they added. "Did I really contribute that much? People think so much of the people that worked at Bletchley Park," said Kath. "You didn't think you were going to be so important. It's all come as a surprise," added Gwenfron. Despite being so young, the women understood that you were "called up to do war service, and you just did it," according to Gwenfron.

  Eluned Morgan sat down with the codebreakers during an award ceremony in Neath

  After the war Kath and Gwenfron went back to their normal lives working in local council and insurance respectively. Gwenfron said it has made her "more cautious" and a "bit suspicious" after working at Bletchley Park. "Maybe when I was young I wouldn't give it a second thought, but I think it does change your attitude," she added. Kath said the war made her think "what could I have done to make things better".

  Kath received a certificate thanking her for her service during the war

  The 101-year-olds are members of the Mother's Union and discovered through the church network that their paths had crossed during the war. Gwenfron said they are not planning too far ahead and will "take life as it comes". The First Minister, who joined the pair at St David's Church in Neath, said it was an "honour to meet these extraordinary women". "Their story reminds us of the many unsung heroes who served in silence for decades," she said. "Kath and Gwenfron represent the very best of Welsh contribution to the war effort."
