title: 'Rouen fire: Major fire breaks out in French city - BBC News'
date: '2023-10-01'
section: General
url: http://www.bbc.co.uk/news/world-europe-66975480
content: |-
  A huge fire tears through two disused buildings in the French city, with flames and smoke rising high into the sky.

  A huge fire tore through two disused buildings in the French city of Rouen on Saturday, causing them to collapse.

  The buildings were located in the Saint-Julien neighbourhood, and were already scheduled to be destroyed.

  Two firefighters were injured in the operation to bring the blaze under control.
