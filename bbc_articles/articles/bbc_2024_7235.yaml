  This is a very different Real Madrid team to the all-conquering sides which dominated the tournament this century.

  Their general shape, often with 11 men behind the ball, showed City a lot of respect, and perhaps vulnerability on the back of last season's chastening defeat in Manchester.

  However, their solid defensive shape allowed them to exploit one of the few weaknesses City have.

  At the back Guardiola's side lack pace, especially with the continued absence of Kyle Walker, and that allowed Rodrygo to get in down the City right for the second Madrid goal.

  It was a weakness that Madrid, who are top of La Liga and had nine days off coming into the game, continued to target but Vinicius Junior, Jude Bellingham and Rodrygo all saw efforts saved or go wide.

  It is a tactic they are likely to use at the Etihad in eight days' time, but last season Ancelotti's side struggled to gain possession in the second leg against a fired-up City, so opportunities may be few and far between.

  It will be fascinating to see if Guardiola's team, who are one point off top spot in the Premier League and into the FA Cup semi-finals, can do it again and continue their march towards another Treble.
