title: Ros Atkins on... The German military intelligence leak - BBC News
date: '2024-03-10'
section: General
url: http://www.bbc.co.uk/news/world-europe-68517913
content: |-
  Ros Atkins looks at Germany's week of uncomfortable questions, after top-secret discussions were made public.

  This week, Germany faced uncomfortable questions after a security lapse allowed a top-secret military discussion to be intercepted - then made public by Russian state media.

  Officers from the German air force were heard talking about weapons aid to Ukraine, and the conversation also included sensitive details about UK military activities.
