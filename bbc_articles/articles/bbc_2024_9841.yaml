title: 'Watch: Cocaine haul found after high-speed boat chase off Colombia - BBC News'
date: '2024-05-01'
section: General
url: http://www.bbc.co.uk/news/world-latin-america-68675774
content: |-
  Colombian authorities seize over three tonnes of cocaine following a chase at sea, their largest haul of 2024.

  Footage released by Colombian armed forces show them chasing a boat laden with tonnes of cocaine off the coast of San Andres island.

  Five people were detained in what was the country's largest shipment of cocaine seized this year.

  According to local authorities, the cargo was valued at $113m (£89m).
