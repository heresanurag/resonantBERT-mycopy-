  Paul Dales, chief UK economist at research company Capital Economics, said the faster growth rise in GDP in early 2024 was "mainly due to upward revisions to consumer spending". The ONS said there was increased spending on recreation and culture, as well as housing and food, but added household disposable incomes had continued to rise in early 2024 as workers secured wage increases. Mr Dales said this meant household saving rates rose from 10.2% at the end of last year to 11.1%, which was the highest rate since mid 2021 when savings were boosted during the Covid pandemic. He added the new figure suggested "whoever is Prime Minister this time next week may benefit from the economic recovery being a bit stronger". "It’s the tiniest sliver of improvement but when it comes to UK GDP growth, every little really does help," said Danni Hewson, AJ Bell head of financial analysis. "Growth has been front and centre of party manifestos, even if they differ on the details of how that growth can be achieved. A growing economy creates wealth, puts more money in people’s pockets and ups the amount of tax delivered to the Treasury’s depleted coffers."

  While the UK has emerged from the economic recession it entered in the final months of 2023, many households may not be feeling better off, with budgets having been stretched by rising prices in recent times. Interest rates are currently at their highest for 16 years at 5.25%, meaning people are paying more to borrow money for things such as mortgages and loans, although savers have also received better returns. The latest figures on the economy show it failed to grow in April after particularly wet weather put off shoppers and slowed down construction. The Bank of England, which sets interest rates, has opened the door to cutting them in August in what would be the first drop in borrowing costs for more than four years. But many mortgage holders have already refinanced at higher costs, and about three million more households set to see their repayments rise in the next two years as fixed-rate deals come to an end. Sophie Lund-Yates, lead equity analyst at Hargreaves Lansdown, said while "hotter-than-expected growth doesn’t help those looking for a faster route to cutting interest rates, it does help to boost overall optimism". "The deep-seated productivity problems in the UK are overall a bigger concern than the immediate interest rate outlook," she added.
