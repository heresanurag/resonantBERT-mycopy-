title: Vaccine passports in Scotland remain for now - BBC News
date: '2022-02-01'
section: Scotland
url: http://www.bbc.co.uk/news/live/uk-scotland-60214538
content: |-
  First Minister Nicola Sturgeon also tells parliament that older children will need to continue wearing masks in the classroom.

  The first minister says there are three further issues she wants to highlight today, starting with the sub-type of Omicron - known as BA.2 - which was recently designated as a variant under investigation.

  Ms Sturgeon reminds MSPs that a PCR test would use the absence of what's known as the S Gene to identify the Omicron variant.

  However, she notes in BA.2 cases the S Gene shows up.

  She says: "In the last week, the proportion of PCR tests with an S Gene dropout - which indicates the main Omicron variant - has declined, with a corresponding increase in the proportion of tests showing S Gene positive results."

  The first minister adds this could be accounted for by Delta cases - which also show positive S Gene results - or it may indicate "increasing transmission" of the BA.2 sub variant.

  Genomic sequencing is being used to investigate this further but, so far, Ms Sturgeon says 26 cases of BA.2 have been confirmed in Scotland.
