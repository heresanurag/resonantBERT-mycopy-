content: |-
  Billionaire Alisher Usmanov makes a £1bn bid to wrest control of Arsenal from majority shareholder Stan Kroenke, who has rejected it.

  Last updated on .From the section Football

  Uzbek-born Russian billionaire Alisher Usmanov has made a £1bn bid to wrest control of Arsenal from majority shareholder Stan Kroenke.

  But with Kroenke showing no interest, the bid has in effect been rejected, though Usmanov is yet to receive written confirmation.

  The Financial Times reported Usmanov made the offer last month, and that Kroenke has yet to formally respond.

  He is, though, not part of the board or decision-making at the club.
  • None Read more: Arsenal need Usmanov, says legend Wright
  • None From the archive: Who is Alisher Usmanov?

  Usmanov said in April that Kroenke must "bear huge responsibility" for the club's failures on the pitch.

  Arsenal need other teams to slip up in Sunday's final round of matches to avoid missing out on Champions League qualification for the first time in 21 years.

  Arsene Wenger, who has been manager since 1996, has been the target of protests from some of the club's fans.

  The Frenchman's future at the club will be decided at a board meeting after Arsenal meet Chelsea in 27 May's FA Cup final.

  Alisher Usmanov has wanted control of Arsenal for some time.

  A long-standing critic of the current board, he has attempted to curry favour with fans by calling for greater investment by Stan Kroenke. He believes the team should be performing at a much higher level.

  Now, with questions swirling over Arsene Wenger's future and with a lack of Champions League football next season looking inevitable, he has made his move.

  However, he has been rebuffed.

  The big question is whether this was a final throw of the dice by Usmanov? And, with seemingly no prospect of Kroenke selling, will he turn his purchasing power towards another Premier League club?
