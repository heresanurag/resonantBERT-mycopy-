  Earlier this year, the Northern Ireland Audit Office said the latest estimated date for completion of the final phase of the maternity hospital is June 2025. "The original cost estimate was £57m, with costs now expected to be £97m," it said in a report. The committee also heard about other issues, including fire alarms and nurse call buttons, which have been addressed and were no longer being treated as red flag rated issues which could delay opening. The BBC understands almost £200,000 was spent on the fire alarm problems, which was not fully tested before the handover. Nurse call alarms which had also been faulty are now working. The department officials and trust executives said they were not aware of any other major problems with the maternity hospital but said no project could ever be guaranteed to be problem-free.

  Clarification 10 December 2023: This article was updated following clarification from the Belfast Trust that Ms Edwards had accepted the handover of the maternity hospital and not Cathy Jack.
