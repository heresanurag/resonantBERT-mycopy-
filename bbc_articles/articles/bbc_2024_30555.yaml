title: Comic Duncan Norvelle, famed for 'chase me' catchprase, dies at 66 - BBC News
date: '2024-12-12'
section: Culture
url: http://www.bbc.co.uk/news/articles/c77jn31nxmdo
content: |-
  A familiar face on 80s TV, he was on shows such as Surprise Surprise, Wogan and the Keith Harris Show.

  Comedian Duncan Norvelle, known for his trademark "Chase me" catchphrase, has died at the age of 66, his agent has said. His management team paid tribute in a statement, saying: "Duncan was a comedy genius and British icon ahead of his time who loved showbusiness." A familiar face on British TV in the 1980s, Leicestershire-born Norvelle appeared on various TV shows including Surprise Surprise, Wogan and the Keith Harris Show. Norvelle's partner, Lynn Trevallion, said he was "probably the last of the legends of true variety comedy", adding that he was also a "private person" who enjoyed gardening, cricket, golf, and snooker.

  He rose to fame on the ITV variety show Saturday Royal in the early 80s, and was seen more recently on a Come Dine with Me special and Pointless Celebrities. The comedian's management team added: "We managed Duncan and re-released his album Music From My Life, but more than anything he became a good friend and will be truly missed in the entertainment world." Trevallion described him as a "gentle comedian, [who] never swore on stage, he was a clean act", adding that comedian Sir Ken Dodd "loved Duncan". "His type of comedy doesn't happen anymore, he's probably the last of the legends of true variety comedy, so many have passed now," she said of Norvelle's performances. Speaking about his return to the stage following a stroke in 2012, Trevallion said he "proved to everyone that he could still get a standing ovation every single time he did a show". A post on Duncan's Facebook page, signed by her on Thursday, said: "Duncan passed peacefully with myself and daughter Yasmin. Rest in peace our comedy legend, so deeply loved and will be so very missed." It added that funeral arrangements would be announced in due course. Tributes have begun to come in from fellow comics including Jim Davidson, who wrote on X: "Rest in peace Duncan. You were, and always will be, a Proper Comedian." Comedian Jimmy Cricket wrote: "Duncan was a charismatic performer who thrilled audiences up and down the country with his style of humour and hilarious impressions, he was also a man of indomitable spirit! RIP old friend." Norvelle was admitted to Pilgrim Hospital in Boston two weeks ago.
