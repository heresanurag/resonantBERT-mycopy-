  In his first day on the job, Lord Peter Mandelson says "we have to respect and understand what drives" the US president.

  UK must respect Trump's mandate, new ambassador to US Mandelson tells BBC

  This video can not be played To play this video you need to enable JavaScript in your browser. Watch: Lord Peter Mandelson speaks with the BBC's Sarah Smith on first day as US ambassador

  The UK must respect President Donald Trump's "strong and clear mandate for change", the new UK ambassador to the US has told the BBC on his first day in the role. Lord Mandelson said the UK would not necessarily agree with every detail of Trump's agenda, but added: "We have to respect and understand what drives him, what his mandate is to do, and how his allies need to adjust sometimes." The 71-year-old spoke to the BBC on Monday, the same day he presented his diplomatic credentials to the US State Department and officially became the ambassador to Washington. During the interview, he said his past criticisms of Trump were "ill-judged and wrong" and was pressed on the differences between the UK and US on Middle East policy.

  Asked how he would approach the position of US ambassador, Lord Mandelson said there was already a "strong relationship between our government and a very warm personal relationship between [Trump] and our prime minister". "Each of us wants to grow our economies," he said. "I think that what we need to do is to build a technology and investment relationship between the US and the UK that's fit for the 21st Century. That's where I want to focus." Last week, Trump told the BBC that tariffs on EU goods could happen "pretty soon" - but suggested a deal could be "worked out" with the UK. US allies are also waiting nervously for possible tariffs on steel and aluminium, which could upend markets around the world.
