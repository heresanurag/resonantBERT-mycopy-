title: 'Free school meals: Rising food prices ''harming Wales plan'' - BBC News'
date: '2023-05-12'
section: Wales
url: http://www.bbc.co.uk/news/uk-wales-65557956
content: |-
  There are calls for extra funding for caterers so they can deliver better food for pupils.

  A payment of £2.90 per child per meals is no longer viable, says Prof Kevin Morgan

  The increasing cost of food means school caterers are struggling to deliver the Welsh government's plan for universal free school meals.

  School food expert Prof Kevin Morgan said the government needs to look at increasing the price per meal given to local councils.

  Education Minister Jeremy Miles said it is looking at the unit price.

  It was set with "an assumption about possible increases in costs", Mr Miles said.

  He added: "The world has obviously moved on and we are doing a review."

  At the moment, Welsh councils get about £2.90 per child per meal for primary school meals.

  This price was set before the new universal school meals policy was started last September.

  Prof Morgan told the BBC's Wales Live "that £2.90 is no longer a viable rate in my view".

