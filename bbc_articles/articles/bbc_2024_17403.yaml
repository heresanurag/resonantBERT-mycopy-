title: 'Rochdale dog attack: Two charged over death of three-year-old boy - BBC News'
date: '2024-07-04'
section: Manchester
url: http://www.bbc.co.uk/news/articles/c0krqp0eg8do
content: |-
  Two people are charged with gross negligence manslaughter over the fatal dog attack on Daniel Twigg.

  A man and a woman have been charged over the death of a three-year-old boy who was attacked by a dangerous dog.

  Daniel Twigg died after sustaining injuries from the dog on Tunshill Lane, Milnrow, Rochdale, on 15 May 2022.

  Mark Twigg, 42, of King Street, Radcliffe, Greater Manchester, and Joanne Bedford, 36, of the same address, have been charged with gross negligence manslaughter.

  They are due to appear at Manchester Magistrates' Court on 31 July.
