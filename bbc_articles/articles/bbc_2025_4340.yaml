  Why did Jared Leto open his red carpet interview by trying to teach us an English accent? To find out, you'd have to ask Jared Leto and, frankly, we're too scared.

  Sabrina Carpenter was the night's biggest star - opening the show with a cheeky wink, a phalanx of bearskin-wearing guards and a vaudevillian mash-up of Espresso, Bed Chem and... er, Rule, Britannia. But was the decision to hand her the "global success" award a thinly-veiled ploy to tempt her back on to the stage? The prize was originally created in 2013 to recognise British acts who had sold millions of records and concert tickets abroad. The previous recipients were One Direction (2013-14), Sam Smith (2015), Adele (2016-17) and Ed Sheeran (2018-19). Six years ago it was abandoned altogether... until they needed something to honour Sabrina. To be fair, the singer racked up an incredible 21 weeks at number one in the UK singles chart last year - more than anyone has ever achieved in a single calendar year - so her trophy wasn't entirely undeserved.

  A lot of viewers were left perplexed when Jack Whitehall sat down with Danny Dyer and what appeared to be his date: A woman with a horse for a face (we're not being unkind, see above for proof). Well, it turns out that Danny's neighbour was a German DJ who goes by the name of HorsegiirL and keeps their identity hidden behind a mask. Sort of like Deadmau5, but with fetlocks. Maybe next year she can come back to do a duet with Foals.

  Ezra Collective made history by becoming the first jazz band to win the Brit Award for best group - beating previous title-holders like Coldplay, The Cure and Bring Me The Horizon. Taking to the stage, frontman Femi Koleoso had a few words to say about cuts to music education, and the lack of funding for youth clubs like Tomorrow's Warriors - where his band got their start. "I'll bang this drum a bunch of times and I'll continue to do so until the entire country gets it", he said. "This moment right here is because of the great youth clubs, and the great teachers and the great schools that support young people playing music. "The reason we continue to bang this drum is because so many of the problems that face greater society in the UK... we're unsure of how to fix it, but the solution lies with giving a young person a trumpet, the solution lies in giving a young person a saxophone. "Because when you do that, you give them a dream, an aspiration and a goal." To prove his point, he invited the London youth group Kinetika Bloco onto the stage of the O2, to blast through Ezra Collective's infectiously upbeat jazz anthem Shaking Body.

  This year's Brit Award trophies, designed by Gabriel Moses, were cast in bronze... And they were heavy. Weighing 1.6kg each, you could break a toe if you dropped one. And Charli had to pick up four of the things for her winner's photo. It took approximately six people to arrange them in her arms ("don't push them between my boobs", she squealed at one point) before she was ready for the flashbulbs. "Is this lame?" she asked at the last moment. "It feels lame." Then she dropped them all and fell to the floor in a fit of giggles.
