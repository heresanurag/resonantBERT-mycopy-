title: 'Brit Awards 2025: The real winners and losers - BBC News'
date: '2025-03-02'
section: Culture
url: http://www.bbc.co.uk/news/articles/cqx04vrlqn0o
content: |-
  From Jade's problematic dress, to Stormzy's eye injury - here's what really went down at the Brits.

  Nudity, swearing, petulance, club anthems, more nudity and a woman dressed as a horse - the 2025 Brit Awards had it all. Charli XCX was the big winner, taking home five prizes in all - including best artist, best album and song of the year. US star - and the BBC's Sound of 2025 - Chappell Roan picked up two awards; while Ezra Collective, The Last Dinner Party, Fontaines DC and Stormzy got one apiece. But no-one's only interested in all that. Here's what really went down at the 2025 ceremony at London's O2 Arena.

  Listen, this was never going to be anything other than Charli's night. The pop star's seventh album, Brat, captured the cultural zeitgeist in a way that few artists ever manage. Released in June, the record combined abrasive dance-floor beats, soaring hooks and meme-friendly artwork; as the 32-year-old assessed her place in the music industry, the real and imaginary rivals she's accumulated along the way, and whether or not to leave it all behind to have a baby. In the star's own words, the album was "chaos and emotional turmoil set to a club soundtrack". Just as everyone was absorbing that, she hired a bunch of guest stars - Billie Eilish, Ariana Grande, Lorde, Addison Rae, Bon Iver - and re-recorded an entirely new, sometimes superior, version of the album. Critics called it "pop music for the future" and praised the way its "painfully relatable" lyrics captured Charli's coming of age. Knowingly trashy, yet surprisingly deep, it was easily the best British album of the last 12 months - and one that proved Charli's detractors wrong. "I feel like dance music, electronic music, gets a really bad rep because everyone is like, 'It's not that deep, is it? And I kind of feel it is," she said after collecting her second award. "This genre of music, for me, is euphoric, it allows me to escape, it allows me to feel on such a deep level."

  Teddy Swims, swimming in teddy bears. We see what he did there.

