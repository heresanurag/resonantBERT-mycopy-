  Jade Thirlwall was the last of the Little Mix crew to launch a solo career, but she's been giving it her all. As well as winning best pop artist at Saturday's ceremony, she put on one of the night's highest-concept performances - a five-act melodrama about the cruelty of the music industry and her creative rebirth. Over the course of the night, she wore six different outfits. But she chose the wrong one for climbing the stairs to pick up her trophy. Thank goodness the Sugababes were there to help.

  Jack Whitehall made a welcome return as the ceremony's host, after four years away. As ever, his jokes were close to the bone... including a passing reference to allegations surrounding some presenters on Brits broadcaster ITV. "ITV had so many of its presenters cancelled this year that they had to come crawling back to an ex, and what an honour it is to be hosting again the biggest night in British music," he joked. Later, he described Youtuber-turned-musician KSI as "an inspiration". "Because you listen to Kendrick Lamar and you're like, 'I couldn't do that in a million years'. Then I listen to your song and I'm like, 'Oh, I could do this'." Speaking before the show, Whitehall revealed a sneaky secret: He uses a fake script during rehearsals. "Previously I used to do the actual script in rehearsal, and then you'd have an hour of people from record labels and publishers coming and knocking on the dressing room door going, 'You can't say this, you can't say that'," he told Heart radio. "So now I just do this fake script, which if you heard it, you'd be like, 'This is the lamest script ever', because it's all me just complimenting everyone and going, 'Oh, our next award is the best musician I've ever heard. They're great.'"

  "I'm wearing shades because I mashed up my eye playing padel [ball]," said Stormzy, as he accepted the prize for best rap/hip-hop artist. "I've got a very sore eye. I've got a bruised cornea. "My eye's sore under here, I'm not being a mad man with shades on inside."

  Charli XCX gave a speech in a see-through top, with no bra. One of Jade Thirlwall's dancers mooned at the camera. Danny Dyer uttered one of the English language's most offensive swear words. I'd guess that ITV's responses to Ofcom are going to make an interesting read. Word of the censor's concerns even filtered through to the arena during the show, much to Charli's annoyance. "I heard that ITV were complaining about my nipples," she said from the podium. I feel like we're in the era of free the nipple though, right?" As fans applauded, the singer grimaced: "They put the clap track on, cool. Thanks for being on my side."

  The Brits were set up in 1977 to celebrate the British Music Industry, and they are run by the BPI - an organisation funded by, and representing, the biggest record labels in the country. But lots of the winners on Saturday used their speeches to criticise the way they are being treated. "Are we building careers, or are we just chasing moments - because moments fade and careers take time," said Myles Smith. "So please stick with artists past a viral hit." Chappell Roan, who won best international artist, had a similar plea. "I had to write a lot of bad songs to get to the good ones - and artists deserve that freedom, to explore horrible concepts, and to flop, and rise, and not be pressured into making music based off of what's trending." Charli XCX's multiple victories proved their point. Signed at the age of 14, she had to fight to make the music she wanted - after years of being told her songs were too abrasive and uncommercial. "It feels really nice to be recognised on this album, when I haven't made any sacrifices," she said. "I've been doing my own thing in my own corner of the industry - and I guess, this time, culture caught up with us."
