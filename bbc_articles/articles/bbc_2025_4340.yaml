  Myles Smith has had an incredible 12 months. After giving up his job to pursue music, his feel-good pop anthem Stargazing went viral. So viral that it ended up as the best-selling British song of 2024. Asked about the moment he realised it had taken on a life of its own, he told us: "I got new wi-fi the other day, and they put me on hold... and it was Stargazing. "And that said two things. One: This is like, the most irritating thing. But at the same time, I had made it to hold." "Did you sing it for the operator when they picked up?" we asked. "No, I was passed to seven more people." See? Being a pop star doesn't give you any shortcuts in the world of broadband service provider call centres.

