id: bbc_2018_2357
title: 'Oxfam: Haitians ''angry'' over handling of sex claims - BBC News'
date: '2018-02-12'
section: General
url: http://www.bbc.co.uk/news/uk-43039677
content: |-
  BBC world affairs correspondent Will Grant says locals believe aid agencies have enjoyed "impunity".

  Speaking from Haiti, BBC world affairs correspondent Will Grant talks of the anger expressed by locals over claims of sexual abuse in the country in 2011.

  He also said senior government sources have told him an investigation into Oxfam's conduct in Haiti has been widened to include other aid agencies operating there.
