title: Giant wave overturns yacht during dramatic US rescue - BBC News
date: '2023-02-04'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-64526480
content: |-
  Video shows the vessel capsizing in rough Pacific seas as the man on board is rescued.

  A wave overturned a boat in rough seas off the Pacific coast of the US, as the coastguard was attempting to rescue a person on board.

  The boat was about six miles (10km) from land, at the mouth of the Columbia River in the north-west of the country.
