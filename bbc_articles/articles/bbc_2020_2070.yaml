title: 'Thailand shooting: Soldier''s deadly rampage - BBC News'
date: '2020-02-09'
section: General
url: http://www.bbc.co.uk/news/world-asia-51429020
content: |-
  A soldier has gone on a shooting spree in a city north-east of the capital Bangkok.

  A soldier has gone on a shooting spree in the Thai city of Nakhon Ratchasima.

  Reports say at least 20 people have been killed and many others injured.

  The gunman is still on the loose.
