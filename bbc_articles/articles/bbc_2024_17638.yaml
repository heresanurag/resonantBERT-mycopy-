  BBC Sport readers rate Bukayo Saka as their man of the match in England's win against Switzerland at Euro 2024.

  Saka is your man of the match against Switzerland

  This video can not be played To play this video you need to enable JavaScript in your browser.

  We asked you to rate the players during England's win against Switzerland on penalties in the Euro 2024 quarter-finals. You rated England's Bukayo Saka as your man of the match, being given an average mark of 8.64 out of 10. Cole Palmer was the Three Lions' second-best player with a score of 7.80.

