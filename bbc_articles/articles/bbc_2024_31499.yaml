  At another house, a few miles across the city, there's more CCTV footage from earlier that same night. At the home of Kodi Wescott - the 17-year-old ringleader - home security cameras pick up his home being pelted with bricks. In retaliation, he gathers his older cousin, fellow defendant Tolliver, and two other teenagers, setting into motion a terrible chain of events that result in a horrific case of mistaken identity. Those same CCTV cameras were still recording when Wescott and the 16-year-old emerged from a car, swords in hand, and shortly afterwards ran back into the house, not long after killing Max and Mason. Wescott's house also has cameras covering the back garden, which show his older brother, Bailey Wescott, lighting a fire and burning the boys' clothes to try to destroy the evidence. In the hurry to burn the clothes and hide the knives, no-one thought to turn off the cameras. The police found the footage a few days later, while still having the four boys in custody refusing to speak.

  In the hours before sentencing, the defence barristers told the court about the killers' "bleak and desolate" upbringings. We heard the 15-year-old had been thriving since he was remanded into custody, that he now had enough food and so was growing in both height and had gained two shoe sizes. We heard how 18-year-old Tolliver had only started to read and write since being in custody. He had written a short letter addressed to the judge and the families saying: "I would like to say how deeply sorry I am. I should have never got into the car and I will carry this for the rest of my life." The judge certainly felt his remorse was genuine and was the only one of the teenagers to remain in court and listen to the judges' sentencing remarks. The court heard the other three teenagers were just as sorry, but their behaviour told different stories. Wescott could be seen fist bumping the 15-year-old, who was sitting next to him and, as he left court, he turned to wave to both victims' families. At the end of the sentencing hearing, the judge, the honourable Mrs Justice May, thanked the defence teams who had had a difficult time representing the killers. It was surprising, however, that Max and Mason's families, who had sat through the trial with such dignity and restraint, were not mentioned.

  This video can not be played To play this video you need to enable JavaScript in your browser. Ms Justice May: "No sentence can lessen the sense of loss and grief to these families."

  Court days were kept short to make allowances for the young defendants, often shorter than a school day to ensure the teenage killers could cope. Due to the age of the defendants, the victims' families were not allowed in court but had to watch from the public gallery.

  And so not to overwhelm the young defendants, restrictions were put on the number of victims' family members allowed in, meaning Max's mum was unable to sit next to her partner. When the prison van left the court taking the boys away they could be heard inside kicking and screaming from the van driver's video feed. They were also seen making obscene gestures. Yet, in spite of all this, Max and Mason's family did not react. They showed restraint and, if anything, continued to hope these boys might one day change. Chloe's last words to them as she held up her brother's remains in court were: " I hope your 'sorrys' are genuine, I hope you don't forget Mason because he didn't deserve any of this."

