title: 'Max and Mason: How boys'' mistaken identity murders broke hearts - BBC News'
date: '2024-12-21'
section: Bristol
url: http://www.bbc.co.uk/news/articles/ce3lxle15qvo
content: |-
  BBC Social Affairs Correspondent Fiona Lamdin sat through the case that often stunned the courtroom.

  Chloe Rist told her younger brother's four teenage murderers how Mason had not deserved to die

  Teenage best friends Mason Rist and Max Dixon died after a brutal attack that lasted 33 seconds - cut down by machetes in a case of mistaken identity, yards from Mason's front door. Five people - four teenagers and a 45-year-old man - have been detained for their parts in the murders. Riley Tolliver, 18, and 17-year-old Kodishai Wescott, who was identified on Thursday for the first time after reporting restrictions were lifted during sentencing, were told they would each be detained for a minimum of 23 years. A 15-year-old boy and a 16-year-old boy, who cannot be named for legal reasons, were detained for life with minimum terms of 15 and 18 years respectively. The murders have left many shattered hearts in their wake, not least Mason's older sister Chloe Rist, who left those in the courtroom stunned with her emotional impact statement while holding aloft her brother's ashes and a lock of his hair.

  Warning: This article contains some distressing details

  A few days before we were due back in court for the sentencing hearing, Chloe told me she had a plan. But she told absolutely no-one about the actual detail. Chloe is in the dock, when she turns to face the killers, thrusting a small plastic pouch into the air, long streaks of mascara reaching down her face, she sobs, "these are Mason's ashes". Before anyone has time to compute that she's actually holding human remains, she's now lifting another small clear bag. In it is a tuft of Mason's hair and she then shows everyone his handprints, made following his death.

  Max Dixon, 16, (left) and Mason Rist, 15, (right) had been friends since nursery

  Max and Mason were killed after being wrongly thought to be responsible for bricks thrown at a house in Hartcliffe earlier that evening on 27 January. The four teenage defendants spotted the two best friends while being driven around Knowle West by a fifth defendant, Anthony Snook, 45, looking for "revenge", the court previously heard. All five were convicted of two counts of murder last month following a six-week trial at Bristol Crown Court. Snook was later jailed for life and ordered to serve a minimum of 38 years. During the trial, the jury was told there had been a long-standing rivalry between Knowle West and Hartcliffe, and there had previously been incidents involving people from "both postcodes".

  A shocking story of two teenage boys from Bristol, Max and Mason, who went out for pizza and never came home. They were killed in a case of mistaken identity.

  Chloe tells me how she had been worried court security might have mistaken his ashes for drugs. She was also worried that if anyone got wind of her plan they might have tried to stop her. It worked - she certainly grabbed the attention of the four teenage defendants, Riley Tolliver, Kodi Wescott, the 15 and the 16-year-old, who have been sitting behind glass for much of this trial with blank faces. During Chloe's account, they appear engaged and listen to her tell of the pain they've put the two families through.

  Kodishai Wescott, 17 (left) and Riley Tolliver, 18, are the two teenagers detained for life who can be identified

  This was a case that revolved heavily around CCTV footage. Firstly, there are the cameras at Mason's home, which picked up almost everything. They caught the moment Max turned up at Mason's house, smiling as his best friend came to the door. It's a hard watch, seeing the pair amble out through the gate on to their street - not a care in the world - but, watching with hindsight, you know they are about to be subjected to a terrifying attack. The attack itself lasts for little more than half a minute.

  I've been a journalist for more than two decades, and this is the most distressing footage I've ever had to watch, and what is seen cannot be unseen. Max and Mason being hunted like animals, running scared for their lives as the teenagers chase them with swords and machetes. Mason's mum Nikki Knight could not bring herself to watch it. Fingers in her ears, she had her head down in her lap when it was shown in court. Nikki told me it was Mason's dad, Shayne, who had insisted their home was covered in CCTV. He died from Covid-19 two years earlier but she wonders if Mason's dad somehow knew this would happen, and it was his way of ensuring the family got justice, even in his absence.

