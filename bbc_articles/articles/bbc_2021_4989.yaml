title: Twin sisters, 13, safe after Met Police search - BBC News
date: '2021-04-09'
section: London
url: http://www.bbc.co.uk/news/uk-england-london-56683274
content: |-
  Poppy and Lily Myers had not been seen since leaving their home in Twickenham on Saturday.

  Poppy and Lily Myers, 13, were last seen in Twickenham on 3 April but were both found safe and well six days later

  Police have found 13-year-old twin sisters who went missing from their home in west London nearly a week ago.

  Poppy and Lily Myers were last seen on Egerton Road, Twickenham at about 14:00 BST on Saturday, 3 April and were reported missing later the same day.

  The twins were believed to have links with the Northwood area of Hillingdon.

  The Met's South West Area Command Safeguarding Unit led the search for the sisters, who are said to be "safe and well".

