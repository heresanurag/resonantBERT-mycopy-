title: Convicted gang member bragged about wealth in music videos - BBC News
date: '2021-08-27'
section: General
url: http://www.bbc.co.uk/news/uk-england-nottinghamshire-58357528
content: |-
  Akeem Chand, 27, rapped about the money he was making through illicit activities.

  A man who has been found guilty of drugs and firearms offences boasted about his wealth in music videos, a court has heard.

  Akeem Chand, 27, of Melbourne Road in Aspley, who was arrested following a spate of shootings across the Nottingham area, even hired a luxury yacht in the Caribbean to flaunt his drug earnings, Nottingham Crown Court was told.

  Chand, together with seven others, was convicted of involvement in gang-related activity.

