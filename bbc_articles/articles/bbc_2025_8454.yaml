  Lando Norris says he has "no reason to be worried" about this title campaign despite Oscar Piastri outperforming him at the start of the season.

  Norris 'not worried at all' about title challenge

  Lando Norris won his first F1 race last year at Miami

  Coverage: Live commentary of practice and qualifying online and BBC Radio 5 Sports Extra; race on BBC Radio 5 Live and live text updates on BBC Sport website and app

  Lando Norris says he has "no reason to be worried" about this title campaign despite McLaren team-mate Oscar Piastri outperforming him at the start of the season. Norris lost the championship lead to Piastri with the Australian's victory at the Saudi Arabian Grand Prix, his third win in five races this year. Piastri brings a 10-point lead in the championship to Florida after establishing himself as the most consistent performer at McLaren this year, while Norris has struggled to get the best out of the car in qualifying. The Briton, who finished fourth in Jeddah after crashing in qualifying, said before this weekend's Miami Grand Prix: "Not worried at all. He's doing a good job and he deserves it, nothing more than that."

  He added: "I don't believe so much in the momentum stuff. Clearly I've made some mistakes and (am) not at the level I need to be, but I believe I can be at the level soon enough. "No reason to be worried. It's round six of 24. I can't say that forever. I know I need to get a move on, but I'm trying to improve and the speed is there, the race pace is there, it is just one thing I need to tidy up. It's a difficult thing but I am confident I will get it." Norris says there are characteristics of the 2025 McLaren's behaviour on corner entry that is preventing him accessing his highest level as a driver. This mainly revolves around the car lacking front grip at a key part of the corner, where Norris wants it to behave with a sharper turn-in.

  Norris, who won the season-opening race in Australia, said: "There are just certain things that don't allow me to feel what I need to feel and those things are what allow me to drive to the level I can drive at, to get pole positions and drive at the highest level in racing. "We're talking about small things. When we're talking about qualifying at hundredths and thousandths of seconds, that's what I'm complaining about. He is maybe more naturally able to adapt and I also think it is a driver's job to adapt. "It's clear there has been some changes and whether it's suited Oscar or he has done a better job of adapting, that is not for me to waste my time on. "But it has hurt me and I have not been able to be at my best level, the level I was on at the end of last season." Norris said there was a series of upgrades coming to the McLaren car over forthcoming races that should help him. But he added: "I don't just want to rely on that, there are things I am working myself and hopefully that will be a better fix. "It takes time, some of these things, so I just will keep my head down and working on my things."

