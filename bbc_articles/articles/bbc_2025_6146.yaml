title: Woman charged over vandalism at Trump Turnberry - BBC News
date: '2025-04-11'
section: UK
url: http://www.bbc.co.uk/news/articles/cp8vddl0302o
content: |-
  Three people have already appeared in court charged over damage caused to the golf course.

  A 21-year-old woman has been charged over damage caused to Donald Trump's golf course at Turnberry. A green was dug up at the Ayrshire course on 8 March and another had the words "Gaza is not for sale" painted on it. Red paint was also daubed over buildings and walls at the resort. The woman was arrested in Liverpool on Thursday and is due to appear at Ayr Sheriff Court later. Three people have already appeared in court charged with malicious mischief in connection with the damage to the course.

  Ricky Southall, 33, from Wakefield, and Umza Bashir, 55, from Leeds, appeared at Ayr Sheriff Court on Monday. The pair made no plea and were released on bail. On 31 March, 33-year-old Kieran Robson from Galashiels appeared in court. He made no plea and was also released on bail. President Trump sparked concern internationally after saying he wanted to turn Gaza in a resort like the French Riviera - a proposal that would see Palestinians removed to other countries. Last month Trump labelled the people who caused damaged at the resort "terrorists" and said they should be "treated harshly" by authorities.
