title: Prince Harry and Prince William attended uncle's memorial service - BBC News
date: '2024-08-30'
section: UK
url: http://www.bbc.co.uk/news/articles/cqjl989egxro
content: |-
  The memorial service took place on Thursday, close to the royal Sandringham Estate in Norfolk.

  The Prince of Wales and Prince Harry attending Queen Elizabeth's funeral in 2022

  The Prince of Wales and Duke of Sussex both attended a memorial service for their mother’s brother-in-law Lord Robert Fellowes on Thursday. Prince Harry flew from his home in the US to join his brother at St Mary’s Church in Snettisham, Norfolk. The memorial service took place close to the royal Sandringham Estate. A source who attended the service confirmed both brothers were in attendance.

  A church warden, who wished to remain unnamed, told the BBC: “It was wonderful that both princes were able to attend their uncle’s memorial service yesterday at St Mary’s Church. "The service was a lovely family occasion celebrating the life of such a special man. "Many friends were also present and also many members of the St Mary’s Church family." According to the Sun, the brothers "kept their distance" at the service and were not seen to speak to each other. Due to an ongoing "rift" within the royal family, Prince Harry and Prince William have not been seen together in the UK since 2023. The Duke of Sussex previously visited the UK to see his father, King Charles, in February and again for the Invictus Games, an international sport event for wounded and ill members of the armed forces in veterans, in May. Kensington Palace have not commented on the family event. The office of the Duke and Duchess of Sussex has not yet responded to a request for comment.

  Lord Fellowes attended Royal Ascot at Ascot Racecourse in 2017 with Queen Elizabeth II and the then-Prince of Wales

  Lord Fellowes was married to Lady Jane Spencer, Princess Diana’s sister, for more than 40 years. They had three children together and he was uncle to Prince William and Prince Harry. He was also a cousin of Ronald Ferguson, the father of Prince Andrew’s former wife Sarah Ferguson, Duchess of York.

  The service was held as St Mary's Church near the Sandringham estate

  Lord Fellowes worked in Queen Elizabeth II's private office between 1977 and 1999, and spent most of the 1990s as her private secretary - the most senior official in the monarch's household. He helped steer the Royal Family through a turbulent period which saw a fire at Windsor Castle in 1992, Diana and Charles's divorce in 1996, and Princess Diana’s death in 1997. He was portrayed in the fifth and sixth series of the Netflix series The Crown. His cause of death has not been disclosed.
