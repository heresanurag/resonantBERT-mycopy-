title: M5 Motorway lanes closed due to flooding after heavy rain - BBC News
date: '2024-10-08'
section: England
url: http://www.bbc.co.uk/news/articles/c2kd8p32dj0o
content: |-
  The Southbound carriageway is closed as heavy rain hits the West of England.

  Heavy rainfall has caused flooding in parts of East Bristol

  Heavy rainfall has caused disruption on major routes near Bristol and Somerset. There are reports of slow traffic on the M5 southbound between J25 (Taunton) and J26 (Wellington) which was closed earlier due to surface water. One lane is closed because of a two-vehicle accident on the M5 northbound from J22 (Burnham-on-Sea) to Sedgemoor services, and flooding has also affected the M5 southbound between J14 (Thornbury) and J15 (Almondsbury). On the M4, National Highways said there is a lane closed in both directions between J17 (Chippenham) and J18 (Tormarton) following an earlier accident.

  The M5 Southbound was closed for several hours due to flooding

  The Met Office has issued a yellow thunderstorm warning, external for much of the West of England until Wednesday. Elsewhere in the region, Muller Road in Bristol is partially blocked in both directions, with queuing traffic due to flooding at Cottrell Road. In Portishead, there is severe flooding around the two roundabouts outside Gordano School. There are reports of flooding on Blackboy Hill near Frome, with residents taking it upon themselves to try and unblock drains.

  A yellow thunderstorm warning is in place for the region

  Stapleton Road in Easton was closed earlier due to flooding between St Marks Road and Robertson Road. The road has now re-opened. Last month, drivers were left stranded on the M5 between J16 for Aztec West and J14 for Thornbury after "significant flooding" forced the section of the motorway to close.

