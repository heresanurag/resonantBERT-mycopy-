  The former American football star was accused in 1994 of the murder of his ex-wife and a friend.

  In 1994, American football star OJ Simpson was accused of the double murder of his ex-wife Nicole Brown and a friend. The pair were found stabbed to death outside her Los Angeles apartment.

  After a highly-watched trial that gripped America, Simpson was found not guilty.

  Watch the key moments from the infamous 1995 trial.
