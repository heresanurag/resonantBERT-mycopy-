  Now it looks as though he and Nessa's son will be helping out with the "tilin, roofin, plasterin, and feng shui". "Over in Billericay Pam is stressing out at the prospect of playing hostess, not helped by a newly retired Mick practising his golf swings in the living room and there have been more ups and downs in Pete and Dawn's relationship." And, most importantly, the Gavin and Stacey team has teased that we might finally find out what happened on that fishing trip.

  This is the first official image from the Gavin and Stacey finale since filming wrapped in October. The cast delighted fans for several weeks as they took to the streets of Barry, as well as appearing on the seafront at Barry Island to film the upcoming special. The final episode of Gavin and Stacey will air on BBC iPlayer and BBC One on 25 December.

