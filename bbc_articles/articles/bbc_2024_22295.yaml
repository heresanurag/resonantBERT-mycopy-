title: 'Reece Richards: Sex Education actor''s arrest to be investigated - BBC News'
date: '2024-09-18'
section: London
url: http://www.bbc.co.uk/news/articles/cdxrv0xyr22o
content: |-
  Reece Richards was returning home to Fulham when he was pepper-sprayed by Met Police officers.

  Reece Richards has made a formal complaint to the police and the police watchdog about the wrongful arrest

  The wrongful arrest of Sex Education actor Reece Richards by Metropolitan Police officers using pepper spray in west London is to be investigated by a watchdog. Mr Richards, who appeared in the Netflix show and currently stars in the West End musical Hairspray, was returning home from a performance on 4 September when he says he witnessed a car crash and two men fleeing on foot. He says he pointed out to police the direction in which the two men had fled, but that officers kicked and threw him to the ground. The Independent Office for Police Conduct (IOPC) is investigating. The Met previously admitted pepper spray was used and said its directorate of professional standards had been informed.

  Mr Richards said four police officers restrained him as he was returning home after his performance by sitting on him, which worsened existing injuries to his back, ribs and stomach. The Met said officers were pursuing a suspected stolen car with false plates before the incident involving Mr Richards, who has accused the force of "racial profiling".

  This video can not be played To play this video you need to enable JavaScript in your browser. A video, shared on social media by Mr Richards, appeared to show a number of police officers holding an individual to the floor

  Scotland Yard added that before Mr Richards had been de-arrested on Fulham Palace Road in Fulham, "a Taser was pointed but not discharged". Writing on Instagram, Mr Richards said he had complained to the Metropolitan Police and the IOPC about what he called "racial profiling" in the incident, which took place in the early hours. The actor said: "In a flash, I was face-down on the pavement with multiple officers holding me down, forcing my head into the ground. "I couldn't see anything, but I could hear my mum nearby, screaming and crying, begging them to let me go. "That feeling of helplessness will never leave me. The whole experience was embarrassing, deeply upsetting, and exhausting. "I won’t rest until I’ve gotten to the bottom of this and I am deeply saddened for anyone else who has been through this."

  An IOPC spokesperson said: "We have received a voluntary complaint referral this afternoon from Met Police following an incident on Fulham Palace Road, west London on 4 September where a man was arrested and Pava [pepper]-sprayed by police officers before he was de-arrested at the scene." They said it was understood the man had received minor injuries. The spokesperson also said: "The man complained about use of force and the false arrest and also alleges that he was only stopped because he was black, and he didn't fit the description of the suspects. "We will now assess the referral and decide if any further action is required from us."

  The Met said of the car crash that the driver, aged 15, had been arrested at the scene for failing to stop, dangerous driving and burglary. Scotland Yard said two other passengers, aged 20 and 21, had run off but were located nearby. Both were arrested on suspicion of theft of a motor vehicle, while the 20-year-old was also held on suspicion of being in possession of a pointed or bladed article.
