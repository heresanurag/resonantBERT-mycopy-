content: |-
  The diver also opens up about what he's learnt as a parent and inspiring LGBT young people.

  It's one of the most memorable images from the Tokyo Olympics - diver Tom Daley knitting while sat in the stands.

  The Olympic champion talks about his knitting obsession with BBC Breakfast's Sally Nugent - and even lets her try on his now famous Team GB cardigan.

  He also opens up about what he's learnt as a parent (and from his late dad) and inspiring LGBT young people.
