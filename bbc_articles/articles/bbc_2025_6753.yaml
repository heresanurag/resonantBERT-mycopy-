  Polling suggests that immigration is an issue where President Trump enjoys some of his highest approval ratings, with recent Reuters and AP-NORC surveys suggesting about half of US adults approve of action in that area, several points higher than his overall rating. Universities are also being targeted at an institutional level. This week, the White House's task force on combating antisemitism froze over $2bn in funding for Harvard University, after the university refused to agree to a list of demands that it said would amount to "surrendering its independence".
  • None Harvard just stood up to Trump. How long can it last? Trump officials have said that if Harvard doesn't comply with a request for information on certain student visaholders, it will stop granting visas to international students who want to study there. Georgetown professor Nader Hashemi said he believes the government's main goal is "silencing dissent" by intimidating would-be protesters. The Georgetown student says he has asked his parents not to fly from India to the US to see him graduate with a master's degree in just a few weeks. He is still unsure if he will even attend the ceremony.

  An Imam at the Georgetown mosque leads prayers for Palestinians in Gaza

  In addition to checking his email daily to see if he is among the hundreds that have had their visas revoked recently, he has also prepared for the possibility of sudden arrest. "I have cleared my chats across messaging apps, and I have learned how to quickly lock my phone in SOS mode," he said. Georgetown professors have even begun offering spare rooms to students who worry about being visited by immigration agents at their residences, said Prof Hashemi. "This is part of the trauma that I think students are facing," he said. At Tufts University, outside of Boston, Massachusetts, students are waiting to see what happens to Ms Ozturk, who was detained outside her home.

  This video can not be played To play this video you need to enable JavaScript in your browser.

  Video shows her confused and shaking in fear as she is intercepted by agents while headed to a Ramadan dinner celebration. Last year, she had co-authored an op-ed supporting the boycott, divest and sanction (BDS) movement against Israel. Tufts PhD student Anteri Mejr told the BBC that the actions have had a "chilling effect", and that international students she knows who have left the country to visit home or attend conferences are now afraid to return. "There are students working remotely because they're afraid they can't get back in the country," he said. At the University of Texas, rumours about Immigration and Customs Enforcement (ICE) raids on campus have some students terrified. "I'm scared to be out. I'm scared to come to school. I'm scared to go grocery shopping," a master's student there said. "I'm afraid that if I'm walking, I will be approached by agents in incognito clothes and plain disguise," he continued. Despite being a green card holder and having not played a role in pro-Palestinian protests on campus, he says he is still in "crippling anxiety" because he has written things that are critical of the president. "How far does this administration dig through, like, an immigrant's history?" he asked. "What if I did say something and I'm not aware."
