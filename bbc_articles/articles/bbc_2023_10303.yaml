  BBC Sport readers picked one of the Haiti players as the standout performer, despite England winning the Fifa Women's World Cup match between the two sides.

  England v Haiti: Melchie Dumornay comes out on top in Fifa Women's World Cup opener Last updated on .From the section Women's Football

  Melchie Dumornay, right, was the standout player in England's game against Haiti England may have got the win against Haiti to get their Women's World Cup campaign up and running, but it was a player for the tournament debutants who caught the eye. Melchie Dumornay caused the Lionesses numerous problems with her pace and skill and her stand-out performance has been reflected by her rating by BBC Sport readers. The 19-year-old Lyon midfielder's performance was rated 7.25, with Mary Earps earning the highest score for an England player with 6.49. You can see how all the players rated below.
