title: Former Buzzcocks host Lamarr charged with common assault - BBC News
date: '2018-09-15'
section: Entertainment & Arts
url: http://www.bbc.co.uk/news/uk-45532153
content: |-
  The TV and radio host was also charged with false imprisonment, the Metropolitan Police said.

  Mark Lamarr will appear at Uxbridge Magistrate's Court on 2 October

  Former Never Mind The Buzzcocks host Mark Lamarr has been charged with common assault and false imprisonment, the Metropolitan Police has said.

  The TV personality and comedian, born Mark Jones, was charged on 1 September in London.

  The 51-year-old will appear at Uxbridge Magistrates' Court on 2 October.

  Lamarr became famous in the 1990s for presenting shows such as Channel 4's The Big Breakfast, and The Word with Terry Christian.

  He presented Never Mind The Buzzcocks between 1996 and 2005.

  Lamarr also presented a weekly BBC Radio 2 late night show and specialist music series Shake, Rattle and Roll for 12 years, leaving in 2010.
