id: bbc_2021_2665
title: 'Covid and diabetes: My story - BBC News'
date: '2021-02-20'
section: General
url: http://www.bbc.co.uk/news/health-56132391
content: |-
  Around four million people in the UK are living with diabetes - including around a million who have not been diagnosed, according to the charity Diabetes UK.

  And while it's already known that diabetics are more at risk of suffering severe cases of Covid - new evidence suggests the virus could actually be triggering the condition in some patients.

  Jordan Charles went months with undiagnosed diabetes after contracting Covid-19.
