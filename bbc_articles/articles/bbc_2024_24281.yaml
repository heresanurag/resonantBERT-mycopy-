title: Church service marks two years since death of Queen Elizabeth II - BBC News
date: '2024-09-08'
section: Scotland
url: http://www.bbc.co.uk/news/articles/cy9e34e29vpo
content: |-
  Church service marks two years since death of Queen Elizabeth II

  The Royal Family posted a photograph tribute of the late Queen from 2019

  The King and Queen have attended a church service near Balmoral in memory of the late Queen Elizabeth II, two years on from her death. King Charles and Queen Camilla visited Crathie Kirk on Royal Deeside, where the late Queen was a regular worshipper while in Scotland. Charles, 75, waved and was said to be "very gracious" by the small crowd of well-wishers who waited to see him enter the Aberdeenshire church. Guest preacher Rt Rev Dr Shaw Paterson described the anniversary as "particularly significant and poignant for the royal family".

  Dr Paterson, moderator of the General Assembly of the Church of Scotland, said after the hour-long service it was a privilege to have Charles among the congregation, which also included Scotland's first minister John Swinney. He said the King was "well known and liked" in the community around Balmoral and was "very much part of it", just like his mother had been.

  King Charles and Queen Camilla were driven to Crathie Kirk on Royal Deeside

  Many tributes have been paid to the late Queen, with the monarchy's official social media accounts, external posting a photograph of her at a summer Buckingham Palace garden party in 2019. Meanwhile, Prime Minister Sir Keir Starmer hailed the "70 glorious years of her reign". Sir Keir said in a message on social media: "The late Queen's dedication to the UK and Commonwealth taught us that whatever challenges our country faces, the value of service always endures. "She was at the heart of this nation's life. Today we honour her memory."

  The private service was held at Crathie Kirk, where Queen Elizabeth II had worshipped

  In his tribute at Crathie Kirk, Dr Paterson said: "This weekend is particularly significant and poignant for the royal family, indeed for all of us in Scotland, across the wider UK and Commonwealth. "The eighth of September marks the second anniversary of the death of Her Majesty the Queen and His Majesty's accession to the throne." He added: "I remembered the royal family, along with all the people of this parish and the wider nation and Commonwealth in my prayers."

  The service was led by Rev Kenneth MacKenzie, minister of the Parish of Braemar and Crathie and domestic chaplain to the King. Rev MacKenzie ministered the late Queen in her final days and supported the royal family following her death.

  The BBC's Songs Of Praise is broadcasting from Crathie Kirk for the first time to mark the anniversary of the Queen's death. The prerecorded programme features a new hymn tune commissioned by the King, entitled 'Crathie', in honour of the church. The King has been staying at Balmoral, where the late Queen died at the age of 96 on 8 September 2022. The Aberdeenshire residence has been handed down through generations of royals after being bought for Queen Victoria by Prince Albert in 1852. On Saturday, King Charles and Camilla had attended the nearby Braemar Gathering Highland Games.
