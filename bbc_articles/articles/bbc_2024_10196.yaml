title: France prison van ambush gunmen seen from passing bus - BBC News
date: '2024-05-15'
section: General
url: http://www.bbc.co.uk/news/world-europe-69011699
content: |-
  At least two French prison officers were killed in the incident, with the inmate currently on the run.

  Footage shared on social media shows two hooded gunmen in Normandy, France, after a police van was ambushed on Tuesday.

  At least two French prison officers have been killed in the incident. The prisoner - who has been named by prosecutors as Mohamed Amra - was being taken from court to a prison and escaped after the attack.

