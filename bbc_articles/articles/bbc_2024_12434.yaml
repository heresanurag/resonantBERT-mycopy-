content: |-
  BBC correspondents analyse key policies in the SNP manifesto.

  Childcare has been a big theme for the SNP in recent years, following on from devolved policies like the baby box (where all new parents are sent a cardboard box, which can be used as a crib, full of clothing and other baby essentials), the increase to 1,140 hours of funded childcare and the expansion of the Scottish Child Payment.

  Those are parts of the Scottish government’s record that the SNP is putting close to the heart of its election campaign, even though this is a Westminster race.

  The commitments in the manifesto meanwhile are more about what the SNP will pressure UK ministers to do than what they can deliver themselves.

  They want to see maternity pay increase to 100% of average weekly earnings for the first 12 weeks of leave for new mums. Thereafter it would be set at either 90%, or at the statutory minimum allowance - currently £184 per week - for 40 weeks, whichever is lower.

  Confusingly the manifesto says £150, but politicians say that’s a mistake and there will be no cut - the current payment is a baseline they would not fall below.

  And they want shared parental leave to increase from 52 weeks to 64 weeks - with the extra 12 weeks targeted specifically at dads on a “use or lose it” basis.
