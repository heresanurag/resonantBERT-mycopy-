  Shadow culture secretary Lucy Powell MP said that CCDH "does vitally important work tackling hate online and calling out platforms which fail to counter dis- and misinformation on their sites".

  After the company was renamed, X Corp removed the old Twitter sign from its headquarters in San Francisco and replaced it with a new brightly lit and flashing X.

  However, the company has now been ordered to remove the new sign due to complaints.
