  Johnson-Thompson's decision to withdraw was announced shortly before the heptathlon's 200m heats, with the medals to be decided following the long jump, javelin and 800m events on Saturday. Belgian Thiam ended day one on track to win a third successive European title - but came under pressure from compatriot Noor Vidts after four events. Thiam, who ran the 200m in 24.81secs, saw her lead reduced to just 35 points after Vidts clocked 23.85secs, while Italy's Sveva Gerevini is 220 points behind in third. Briton Jade O'Dowda will begin day two in ninth position after crossing the line in 24.82secs. The 24-year-old had climbed to fifth with a shot put best of 12.82m, after earlier running 13.70secs in the 100m hurdles and clearing 1.83m in the high jump.
