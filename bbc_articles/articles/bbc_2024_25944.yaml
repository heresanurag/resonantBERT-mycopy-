title: 'Indonesia: Surfer dies after ''swordfish impales chest'' - BBC News'
date: '2024-10-22'
section: World
url: http://www.bbc.co.uk/news/articles/ckgng8nm416o
content: |-
  Giulia Manfrini, 36, was reportedly struck while surfing off the Mentawai Islands.

  The Mentawai islands, where the incident occured, are considered a surfers' paradise

  Tributes have been made to a surfer who died after reportedly being impaled by a swordfish in Indonesia. Giulia Manfrini, 36, from Turin in northern Italy, had been surfing in the waters of the Mentawai Islands Regency, West Sumatra Province, before the incident on Friday, according to reports. Two witnesses are said to have tried to provide first aid to Ms Manfrini - who was later taken to a medical centre - after a swordfish struck her in the chest. James Colston, who set up a travel agency with Ms Manfrini, said on Instagram: "Even with the brave efforts of her partner, local resort staff and doctors, Giulia couldn't be saved."

  "The information we received from the Head of Southwest Siberut District was that an accident occurred with an Italian citizen while surfing," Lahmudin Siregar, acting head of the Mentawai Islands Regency Regional Disaster Management Agency (BPBD), reportedly told news agency Antara. He added: "Unexpectedly, a swordfish jumped towards Manfrini and stuck her right in the chest".

  Mr Colston said his former colleague had suffered "a freak accident", adding that "we believe she died doing what she loved, in a place that she loved". "Giulia was the lifeblood of this company and her infectious enthusiasm for surf, snow and life will be remembered by all that came in contact with her," he said.

  Fabio Giulivi, the mayor of Ms Manfrini's hometown Venaria Reale, said: "The news of her death has left us shocked and makes us feel powerless in front of the tragedy that took her life so prematurely." He added that surfing and opening a travel agency had been her "double dream".

  Previous research, external has suggested attacks by swordfish are rare but they can be dangerous when provoked.
