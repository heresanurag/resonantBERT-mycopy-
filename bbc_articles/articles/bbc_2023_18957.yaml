  The home secretary makes a new attempt to implement ministers' signature migrant plan after the Supreme Court blocked it.

  Government makes new effort to get signature policy off the ground

  Home Secretary James Cleverly has today inked a new treaty with the Rwandan government - which he says will allow his own ministers to clear remaining legal hurdles with their signature asylum policy. Whether this allays the concerns of judges will be something for the courts to decide. This live page is closing now, but you can head here for our report on today's news, and we have an explainer article here. The reporting on this page was from Owen Amos, Simran Sohal, Jacqui Howard, Barbara Tasch, James FitzGerald and me.
