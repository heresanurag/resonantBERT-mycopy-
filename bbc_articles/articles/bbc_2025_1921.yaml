  • None Are you a federal worker in the US? Get in touch confidentially. In a sign that the OPM email may have come as a surprise to many agencies, a senior figure at the Department of Justice wrote to staff on Saturday evening to say: "Media reports indicate the email was distributed to employees throughout the federal government." The message added that "at this point, we have no reason to believe this message is spam or malicious". Later on Saturday evening, a follow-up email was sent clarifying that the OPM message was "legitimate" and that "employees should be prepared to follow the instructions as requested". The justice department message also came with a warning to staff: "Do not include any sensitive, confidential, or classified information in your response. Should you have any questions about the contents of your response please contact your supervisor. "If we receive additional guidance or information, I will update all employees, as necessary." Agencies such as the Department of Transportation, the Secret Service and the Cybersecurity and Infrastructure Agency also encouraged their staff to comply, reports said. Other departments, including the National Security Agency, the Internal Revenue Service and the National Oceanic and Atmospheric Administration, requested that employees await further guidance. OPM did not immediately respond to the BBC's inquiry about whether some staff might be exempt. The American Federation of Government Employees, the largest union representing federal employees, criticised the message as "cruel and disrespectful" and threatened to sue. It is unclear how the email affects any of the roughly three million federal workers who may not have had access their emails this weekend. Other government employees, such as those at the Consumer Financial Protection Bureau, were placed on leave in the last month. The message came hours after Trump praised Musk's work on social media, adding: "I would like to see him get more aggressive." The Democratic ranking member on the House Committee on Oversight and Government Reform hit out at the directive in a letter to the OPM. Congressman Gerry Connolly of Virginia wrote that the agency should "immediately clarify that federal employees' nonresponse to this ill-conceived, weekend email does not constitute resignation". "This threat is illegal, reckless, and yet another example of the cruel and arbitrary chaos Mr Musk is inflicting on the people's government and its dedicated public servants." Most Republican members of Congress have been defending Musk and his broader efforts. Congressman Mike Lawler of New York told ABC on Sunday that Musk's efforts were a "comprehensive, forensic audit of every department and agency in the federal government". But Senator John Curtis, a Republican representing Utah, criticised Musk's methods, even as said he supported the ultimate goal of Doge. "If I could say one thing to Elon Musk, it's like, please put a dose of compassion in this. These are real people. These are real lives. These are mortgages," Curtis told CBS.

