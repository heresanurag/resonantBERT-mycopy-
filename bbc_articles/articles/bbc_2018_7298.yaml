id: bbc_2018_7298
title: Rise in 'preventable' emergency readmissions to hospital - BBC News
date: '2018-06-01'
section: Health
url: http://www.bbc.co.uk/news/health-44315954
content: "Undiagnosed pneumonia and pressure sores are behind the rise in hospitals\
  \ in England.\n\nIncreasing numbers of people are being readmitted to hospital in\
  \ England with preventable conditions such as pneumonia and pressure sores, according\
  \ to Nuffield Trust research.\n\nBetter care in hospital and at home afterwards\
  \ could have made a difference, it said.\n\nEmergency readmissions, within 30 days\
  \ of discharge, have risen by a fifth over the past seven years.\n\nThe government\
  \ said no-one should endure unnecessary trips to hospital.\n\nIt has committed to\
  \ a long-term funding plan for the NHS to help it manage growing patient demand.\n\
  \nAn analysis by the health think tank, the Nuffield Trust, found that a small and\
  \ growing proportion of emergency readmissions - around 1% - were preventable, affecting\
  \ 185,000 people last year.\n\nBetween 2010-11 and 2016-17, patients readmitted\
  \ to hospital in an emergency with pneumonia rose from 41,003 to 70,731.\n\nEmergency\
  \ readmissions for pressure sores almost trebled to 22,448 while patients readmitted\
  \ with blood clots in a vein (venous thromboembolism) increased by a third to 23,006.\n\
  \nThese were conditions that were not diagnosed during their first hospital visit\
  \ and could have been prevented, the analysis found.\n\nPneumonia is one condition\
  \ which is behind rising emergency readmissions\n\nIt said the findings should raise\
  \ questions about the quality of care during a patient's initial hospital stay,\
  \ how they were discharged from hospital and also the quality of community and social\
  \ care services.\n\nA growing older population with more complex conditions is one\
  \ factor in emergency readmissions rising to 1.38 million over the last seven years\
  \ in England. This is in line with overall admissions.\n\nEmergency readmissions\
  \ account for 8% of total patient hospital stays, up from 7.5% seven years ago.\n\
  \nProf John Appleby, director of research at the Nuffield Trust, said: \"Unnecessary\
  \ trips and overnight stays in hospital put a strain on elderly patients and their\
  \ families.\n\n\"That is why it's concerning that our research shows the number\
  \ of people being readmitted to hospital within 30 days with potentially preventable\
  \ conditions is greater than it was seven years ago.\"\n\nJessica Morris, research\
  \ author and analyst at the Nuffield Trust, said emergency readmissions to hospital\
  \ are \"potentially a warning sign that a patient's quality of care may have been\
  \ compromised\".\n\nShe said local health providers should now focus their attention\
  \ on the three conditions which had seen the most significant rise in readmissions.\n\
  \nA Department of Health and Social Care spokesman said: \"We expect the NHS to\
  \ work closely with local authorities to ensure people are treated in the most suitable\
  \ setting and when they are discharged from hospital they have a care plan in place.\"\
  \n\nLinda Thomas, from the Local Government Association, said adult social care\
  \ needed to be put on an equal footing to the health service.\n\n\"Councils are\
  \ keen to continue to liaise with their NHS partners locally but need urgent funding\
  \ to invest in effective prevention work to reduce the need for people to be admitted\
  \ to hospital in the first place,\" she said.\n\nThe best way to get news on the\
