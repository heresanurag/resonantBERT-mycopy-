title: Humberside Police releases further Operation Snap driving videos - BBC News
date: '2025-02-24'
section: General
url: http://www.bbc.co.uk/news/videos/cq6y2jy4dj5o
content: |-
  Humberside Police has been sent almost 6,000 videos of bad driving from the public since April 2023.

  A U-turn on the Humber Bridge and dangerous overtaking are among the latest video examples of bad driving that have been sent to Humberside Police.

  The footage has been released as part of Operation Snap, which allows members of the public to send dashcam and other video evidence to the force.

  Since April 2023, almost 6,000 examples of bad driving have been submitted with 4,016 leading to further action, external.

  Police said the online uploads had simplified investigations and allowed them to have a "determined and robust approach to policing the roads".

