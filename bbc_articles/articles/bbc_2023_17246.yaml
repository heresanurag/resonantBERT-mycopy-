id: bbc_2023_17246
title: Minister's awkward EU summit kiss causes controversy - BBC News
date: '2023-11-04'
section: General
url: http://www.bbc.co.uk/news/world-europe-67319850
content: |-
  Croatia's foreign minister has apologised saying the greeting was "maybe an awkward moment".

  Croatia's foreign minister sparked controversy by greeting his German counterpart with a kiss, at an EU ministers meeting in Berlin on Thursday.

  Gordan Grlić-Radman shook hands with German Foreign Minister Annalena Baerbock, then leaned forward to kiss her.

  He has been criticised in some Croatian media reports, with women's rights activist Rada Boric describing the incident as "highly inappropriate".

  Mr Grlić-Radman defended the moment as a "warm, human approach to a colleague". He said it was "maybe an awkward moment" and apologised "to whoever took it that way."

  Ms Baerbock has not commented so far.
