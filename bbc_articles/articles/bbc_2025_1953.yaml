title: Civilian jet breaks sound barrier for the first time - BBC News
date: '2025-02-23'
section: General
url: http://www.bbc.co.uk/news/videos/cre8xzxz4g3o
content: |-
  The XB-1 aircraft, manufactured by Boom Supersonic, underwent 11 test flights before Tuesday's over the Mojave Desert in California.

  The XB-1 aircraft, a jet independently developed by Boom Supersonic, has broken the sound barrier during a test flight over the Mojave Desert in California.

  The sound barrier was broken for the first time in 1947 by an Air Force pilot.

  The company's next focus will be on Overture, a supersonic airliner that will "bring the benefits of supersonic flight to everyone," said Blake Scholl, the founder and CEO of Boom Supersonic.
