title: Tory hopeful Liz Truss rules out new taxes if elected PM - BBC News
date: '2022-09-01'
section: UK Politics
url: http://www.bbc.co.uk/news/uk-politics-62746386
content: |-
  The foreign secretary also hints she would look to provide support to help with energy bills.

