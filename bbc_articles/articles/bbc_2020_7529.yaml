content: |-
  Bringing you the latest news from across England about the coronavirus pandemic.

  Staff at Exeter Airport face losing jobs because of the effect of coronavirus on the aviation industry, managers have said.

  The airport said it was changing "operational requirements" but it would "fight to protect every job we can".

  It did not confirm numbers, but it was reported locally 96 posts could be under threat .

  As well as Covid-19, the airport has been affected by the collapse of regional airline Flybe in March, its main carrier, which accounted for about 60% of its passengers.

  The airline also had its headquarters and training facilities nearby.

  The airport - which has about 250 staff and is one of the main air hubs in the South West - said consultation was under way.
