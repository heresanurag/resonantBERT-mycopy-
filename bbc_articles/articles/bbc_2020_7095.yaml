  The unemployment rate for people aged over 16 rose to 4.6%, a 1.1% increase on the previous quarter.

  A donation of £250,000 to help fund women's football in Scotland will be a weight off a lot of people's minds, according to Scotland midfielder Leanne Crichton.

  Edinburgh philanthropist James Anderson gave the cash after his £3m contribution to the men’s game last week.

  The money will go to the Scottish Football Partnership Trust to help sustain the women’s game during the COVID-19 pandemic.

  Quote Message: At the top end of the game we have fought this hard to get there and to stay there is the most difficult part. But there are so many young girls missing football, missing their friends and facing uncertainty with their clubs and resources. I just hope the focus will be on keeping the top end of our game alive but also more importantly making sure exactly what was there for the younger generation will still be there when we get back at it again. from Leanne Crichton Scotland midfielder At the top end of the game we have fought this hard to get there and to stay there is the most difficult part. But there are so many young girls missing football, missing their friends and facing uncertainty with their clubs and resources. I just hope the focus will be on keeping the top end of our game alive but also more importantly making sure exactly what was there for the younger generation will still be there when we get back at it again.
