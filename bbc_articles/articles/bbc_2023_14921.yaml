content: |-
  The chair of the public accounts committee says hospitals are working around the problem of RAAC rather than resolving it.

  Buildings must be surveyed individually to identify RAAC - expert

  The only way to identify the scale of the risk of RAAC is for buildings to be looked at and surveyed individually, an expert has said. Prof Chris Goodier, concrete expert at Loughborough University, tells BBC Breakfast that while there was "no issue with the concept" of using RAAC, there were several factors that increase the likelihood of collapse. "The perfect storm is that it wasn't manufactured properly, it wasn't installed properly and it wasn't maintained. "What we need to do is find out where all [the RAAC] is," he says. But identifying it is not simple since there is no national register that sets out the materials used to construct public sector buildings, Goodier adds. "Every building from the 60s and 70s that was constructed when it was popular, which is of a building type that might have it in, needs to be looked at."
