title: Post-mortem to establish cause of Ipswich baby death - BBC News
date: '2023-12-11'
section: Suffolk
url: http://www.bbc.co.uk/news/uk-england-suffolk-67688530
content: |-
  Two men have been released on bail pending further inquiries, while a female remains in police custody.

  A cordon remains in place at the property in Ipswich where the baby was found

  A post-mortem is taking place later to establish the cause of death of a newborn baby found in Ipswich on Saturday.

  Officers were called to a property on Norwich Road. The body of a baby was found outside and detectives say they are treating the incident as isolated.

  Two men and a "teenage female" were arrested on suspicion of murder.

  The men, aged in their 30s, have been released on bail while the third person is still being questioned, police said.

  As well as police, paramedics were also called to the scene on Saturday, where the baby was pronounced dead.

  Detectives said local residents will continue to see an increased police presence, including uniformed officers.

  Members of the public are encouraged to approach officers and discuss any concerns they may have, Suffolk Police said.
