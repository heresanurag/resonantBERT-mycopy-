content: |-
  A range of stories are on the front of Saturday's papers including a new biography about the royals.

  'King cuts off Andrew' and 'tax blow for care homes'

  The front page of The Times, external is dominated by a photograph of the extraordinary, twisted mass of ruined cars blocking a tunnel entrance in Valencia - bringing home the devastating effect of the recent floods in Spain. Elsewhere, The Daily Telegraph, external reports that Elon Musk has criticised the announcement, in the Budget, that inheritance tax will now apply to some farmers' agricultural land. In a post on X, the world's richest man said: "We should leave the farmers alone". Sticking with politics, the weekend edition of the i newspaper, external says the Conservatives lead in polls for first time in three years after the recent Budget – on what is Rishi Sunak’s last day as leader.

  Pensioners stripped of their winter fuel payment are planning to cut back on food and water, a poll in the Daily Express, external has revealed. According to the Guardian, external, Donald Trump's team already appears to be preparing to challenge the result of the US presidential election if he loses next week. They're said to have filed a lawsuit in the key swing state of Pennsylvania, alleging voter suppression. The wife of the British boxer Tyson Fury has told the Daily Mirror, external about a devastating miscarriage. Paris Fury also spoke about a huge sacrifice she made for her husband. The Daily Mail, external reports the King has ordered Prince Andrew's annual allowance - believed to be around £1m - to be stopped. It says details of the move emerged in an updated biography of the King by Robert Hardman.

