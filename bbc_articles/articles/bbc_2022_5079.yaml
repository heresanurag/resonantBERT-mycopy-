title: 'French election: Macron pledges to create united France - BBC News'
date: '2022-04-11'
section: General
url: http://www.bbc.co.uk/news/world-europe-61061046
content: |-
  Emmanuel Macron says he will unite "all the different convictions and beliefs" if re-elected.

  French President Emmanuel Macron has called on the supporters of his defeated presidential election rivals to back him in a run-off contest against Marine Le Pen.

  Mr Macron pledged to unify France and reflect "all the different convictions and beliefs" if he beats his far-right rival.

  The crucial second round of voting takes place on 24 April.
