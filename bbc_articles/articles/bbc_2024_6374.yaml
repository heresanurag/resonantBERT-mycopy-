title: 'Riyadh Season World Masters of Snooker: John Higgins misses out on ''golden''
  167 break in Saudi Arabia - BBC Sport'
date: '2024-03-04'
section: Snooker
url: http://www.bbc.co.uk/sport/snooker/68475377
content: |-
  John Higgins misses out on a 167 break - and a £395,000 prize - at the inaugural Riyadh Season World Masters of Snooker.

  John Higgins has made 11 maximum breaks in his career and earned almost £10m in prize money

  John Higgins came close to becoming the first player to compile a 167 break - and win £395,000 - as the new golden ball was introduced at the inaugural Riyadh Season World Masters of Snooker. Four-time world champion Higgins, 48, converted 15 reds and blacks but overhit his approach to the yellow. The golden ball has been brought in for the Saudi Arabia event, featuring the world's leading players. If a player completes a 147, they have the chance to make a record 167 break. The golden ball - worth 20 points - sits on the top cushion throughout the frame for as long as a player can still complete the maximum break and is removed when the opportunity is over. On the opening day of the tournament, Scotland's Higgins looked on course to create history in the first frame of his second-round match against Wales' Mark Williams. But the former world number one was unable to cut in the yellow, smiling and shaking his head as he finished with a break of 120. Higgins, who lifted the world title in 1998, 2007, 2009 and 2011, went on to beat Williams 4-2, setting up a quarter-final match against English world number one Ronnie O'Sullivan.

  The event features the world's top 10 players - headed by seven-time world champion O'Sullivan - plus two local wildcards. In the other first-round match played on Monday, England's Ali Carter held off a fightback from China's Ding Junhui to win 4-3 and reach the last eight. Higgins and Ding, ranked ninth and 10th in the world, started in the preliminary round and began with whitewash wins over Omar Alajlani of Saudi Arabia and Qatar's Ali Alobaidli.
