  Ms Brella's older sister Sonia Dabas said she would fight for justice for Harshita

  Police have since released images of Mr Lamba in the Ilford area and the couple walking near Corby's boating lake. Ms Brella had previously been the victim of domestic violence and was made the subject of a Domestic Violence Protection Order (DVPO) in September. Northamptonshire Police referred itself to the Independent Office for Police Conduct (IOPC) because of its previous contact with her. Police suspect Mr Lamba has fled the country, prompting an international manhunt that is still ongoing.

