title: Funeral for murdered Harshita Brella held in India - BBC News
date: '2024-12-03'
section: Northamptonshire
url: http://www.bbc.co.uk/news/articles/c2exkxw8d0po
content: |-
  Ms Brella's family say they are frustrated by the pace of a police investigation into her murder.

  Northamptonshire Police confirmed Harshita Brella's body would be returned to her family in India

  The funeral of Harshita Brella, whose body was discovered in a car boot in east London, has taken place in India. Police believe the 24-year-old was fatally strangled in Corby, Northamptonshire, on 10 November and named her husband Pankaj Lamba, 23, as the prime suspect in its murder investigation. Dozens of people assembled outside Ms Brella's family home in Delhi as her casket was laid to rest eight months after she left for a new life in the United Kingdom. Ms Brella's uncle, Narender Singh, said: "We want justice. We want the murderer to receive the maximum punishment possible."

  Mr Singh, 44, added that the family were frustrated at the pace of the investigation and a perceived lack of information. Ms Brella's older sister, Sonia Dabas, said: "I’ve always protected her but I just can’t understand how she’s no longer here. "I should have been in her place. "I will fight [for justice for Harshita]. I have all the strength to fight. I don’t have any excuse not [to] pursue this fight."

  Ms Brella's uncle Narender Singh said the family were frustrated by the pace of the police investigation

  Ms Brella's family said she and Mr Lamba had entered into an arranged marriage, with a legal wedding held in August 2023. The couple had their traditional Indian ceremony on 22 March this year, before they left for the UK around 30 April, settling in Corby. Officers from Northamptonshire Police visited Ms Brella's home on Skegness Walk, Corby, on 13 November, following concerns for her welfare. When she could not be located, a missing person investigation was launched. Ms Brella's body was discovered in the boot of a car on Brisbane Road, Ilford.
