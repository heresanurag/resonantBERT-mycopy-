title: 'Olisa Odukwe: Police find body in search for missing student - BBC News'
date: '2021-05-05'
section: Bristol
url: http://www.bbc.co.uk/news/uk-england-bristol-56991184
content: |-
  Bristol University student Olisa Odukwe, 20, was last seen leaving his home in the city on Saturday.

  The 20-year-old was last seen leaving his house in Redland on a bicycle on Saturday

  Police searching for a missing university student have found the body of a man in a harbour.

  Bristol University student Olisa Odukwe 20, was last seen leaving his home in the Redland area on Saturday morning.

  Avon and Somerset Police said divers had recovered a body from Bristol Harbour and the death was not being treated as suspicious.

  Formal identification has not yet been carried out but Mr Odukwe's family has been informed.

  Mr Odukwe, who went to Bennett Memorial School in Tunbridge Wells, Kent, was in his second year at the university.

  His friends described his disappearance as "completely out of character".

  Mr Odukwe has been described as "a kind, gentle and funny character"

  Posting a tribute on Instagram, the University of Bristol Association Men's Football Club (UBAFC), said: "In light of new information, we are now grieving the loss of our dear friend Olisa.

  "Olisa was universally loved; a kind, gentle and funny character who brought a smile to the face of whoever he was with.

  "Please keep Olisa's family and friends in your thoughts at this difficult time."

  A spokesperson for the university said that support was available to "all students and staff affected by this".

  "We know this news will be upsetting for many students," they said.

  "Our thoughts are with his friends and family who we are supporting at this incredibly difficult time."

