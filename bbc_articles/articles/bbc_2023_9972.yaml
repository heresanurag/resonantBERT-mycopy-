id: bbc_2023_9972
title: Air strikes as Israel begins Jenin operation - BBC News
date: '2023-07-03'
section: General
url: http://www.bbc.co.uk/news/uk-66083310
content: |-
  A large-scale Israeli military operation is under way, with at least three Palestinians reported to have been killed.

  The Israeli army has launched a massive military operation on the Jenin camp in the north of the occupied West Bank.

  The Palestinian Health Ministry said at least three Palestinians were killed and more than 20 others wounded in the ongoing raid.

  The Israel Defense Forces (IDF) said they were striking "terrorist infrastructure in the Jenin area".

  Footage from the area shows smoke rising over Jenin.
