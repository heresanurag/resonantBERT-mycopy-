title: Plans for memorial statue of Hugo the celebrity West End cat - BBC News
date: '2025-02-27'
section: Edinburgh, Fife & East
url: http://www.bbc.co.uk/news/articles/clyrxvrkjr4o
content: |-
  Locals say the memorial to Hugo The West End Cat would bring the community together and increase visitor numbers.

  Hugo was well known among local people in the west end of Edinburgh, where he was a common sight on its cobbled streets

  A cat that was knocked down by a car in Edinburgh two years ago could be immortalised in bronze, under new plans submitted to the council. Hugo was well known among local people in the west end of Edinburgh, where he was a familiar sight on its cobbled streets. Now locals have commissioned a life-sized statue of the much-missed pet in the hope of bringing the community together and increasing visitor numbers. If it gets planning permission, external it would be the 16th sculpture of an animal in Edinburgh. There are 79 statues of men and eight of women.

  The cat would be secured to a wall in William Street in Edinburgh

  Sculptor Alan Beattie Herriot, who created the statue of Wojtek the Bear in Edinburgh's Princes Street Gardens, has been lined up to take on the commission. It is understood that thousands of pounds have been raised by the community for the sculpture, which they hope to place on a wall in William Street with a plaque. The model would be cast in hot bronze at the capital's Powderhall Bronze Foundry. Hugo, an Arabian Mau, was owned by local woman Jane Rutherford who rescued him from Doha when he was six months old. But during his life in Edinburgh he became well known in the West End of the city, where many people looked after him. He was seven years old when he died in May 2023 after being hit by a car that failed to stop. His death led to calls for a change in the law, requiring drivers to report when they collide with a cat.

  Ms Rutherford, 55, said: "I miss him dreadfully and still look for him on William Street when I'm on autopilot. "So when I see the statue it will make me feel really happy because he was one in a million, he was a proper little character."

  Hugo used to be seen at different shops in Edinburgh's West End

  Paul Hancock, West End community council engagement officer, told BBC Scotland News he failed to see any reason why the statue would not get planning permission. "It's been done in good taste and in keeping with the historic nature of the city centre and world heritage site, so I think it can only be considered an asset. "He is fondly remembered by a lot of people in the West End and our local Facebook page would always have pictures of Hugo in all sorts of random locations - he was a genuine interest in the West End. "We are hoping people will remember him and come through the West End. "We are short of footfall for some of our traders, so it will bring some valued trade to the West End and he will be fondly remembered."

  Alan Beattie Herriot is considered one of Scotland's finest figurative sculptors

  Sculptor Alan Beattie Herriot, who also created the statue of footballer Denis Law in Aberdeen, said he was excited about this latest commission. "He was a well known beastie in the streets of the West End of Edinburgh," he added. "It's really nice for me to be asked and it's nice to do a piece of sculpture. "It's always going to be an added point of interest for visitors to the city and I will make the nicest piece of sculpture that I can. "It's going to be there for a long time, hopefully."

  Alan Beattie Herriot would make the model out of clay before turning it into a mould for the bronze foundry
