title: 4,400-year-old tomb discovered in Egypt - BBC News
date: '2018-02-04'
section: General
url: http://www.bbc.co.uk/news/world-africa-42932591
content: |-
  The tomb is believed to belong to an ancient priestess.

  A 4,400-year-old tomb has been discovered in Giza, believed to belong to a woman with links to royalty.

  The priestess, named Hetpet, is said to have served Hathor, the goddess of fertility.
