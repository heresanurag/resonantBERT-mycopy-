title: Manchester United won't give me the time Mikel Arteta had at Arsenal, says
  Ruben Amorim - BBC Sport
date: '2025-03-07'
section: Man Utd
url: http://www.bbc.co.uk/sport/football/articles/c8d4ev291jlo
content: |-
  Ruben Amorim says he will not get the time at Manchester United that Mikel Arteta was given to transform fortunes at Arsenal.

  I won't get time Arteta had at Arsenal - Amorim

  This video can not be played To play this video you need to enable JavaScript in your browser. I will not have the time that Arteta has had - Amorim

  Manchester United head coach Ruben Amorim says the club will not give him the time that Mikel Arteta was afforded to change fortunes at Arsenal. Spaniard Arteta replaced Unai Emery as Arsenal manager in December 2019 and has helped transform the Gunners into regular title challengers. Arteta won the 2020 FA Cup in his first season but it remains the only piece of silverware he has won since his appointment - and it took him three seasons to return the club to the Champions League. "I will not have the time the Arteta had," said Amorim. However Amorim said he could draw inspiration from the manner in which Arteta dealt with a number of issues during his early days at Arsenal. "I feel that [Arsenal] is a different club," continued Amorim. "It is a different club, in that aspect, the way how Arteta dealt with that [the issues] is an inspiration for everybody."

  Arsenal travel to Old Trafford on Sunday in the Premier League (16:30 GMT) and face a United side without a number of key players including long-term absentees Lisandro Martinez, Luke Shaw and Mason Mount. Amorim said it was unlikely any other injured players would return for Sunday, but did raise hopes that Amad Diallo could be back before the end of the season. "I think it is just Amad [who is out long-term]," said Amorim. "Even Amad, we will see the end of the last month [of the season]. "I have the hope to have Amad before, we will see. "Kobbie [Mainoo] can return. [Harry] Maguire, we have to be careful, Manuel [Ugarte] will return, and I think Mason [Mount] and Luke Shaw can return also."

  This video can not be played To play this video you need to enable JavaScript in your browser. "Our voices will be heard" - United fan explains planned protest

  Arsenal beat PSV Eindhoven 7-1 in the first leg of their Champions League last-16 tie on Tuesday, while United managed a 1-1 draw away at Real Sociedad two days later. Despite being Europe's secondary competition, Amorim says playing in the Europa League impacts Premier League form more than the Champions League. "In the beginning people talked about our rotation in Europe. We were changing all the time and it is because of this," said Amorim. "Europa is so much harder than Champions League. Not the games, but the recovery to play Premier League on the weekend. We have to deal with that."
