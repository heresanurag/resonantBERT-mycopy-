  Bangladesh says its situation is under control - but is it?

  Bangladesh says it will stop providing daily updates on coronavirus infections and deaths in the country from 12 August. Health Minister Zahid Maleque says this is because “we believe the infection rate is decreasing and the situation is getting under control.” In its latest weekly report, the World Health Organization (WHO) says new cases in the country have dropped by 2.5% from the previous week. But the headline figure masks a more complicated reality - reported cases are fluctuating widely, with daily tallies ranging between 900 and 3,000 since the start of August, according to WHO data. This may well be to do with the amount of testing being carried out, which has also fluctuated widely – from around 12,000 a day in July, then down to less than 4,000 in early August and back up to 12,000 again. The authorities attributed the drop in testing to severe flooding in July as well as what they say is the unwillingness of people to get tested due to a lack of trust in medical facilities. And Bangladesh still has a high rate of positive tests - at the end of last week it was nearly a quarter of all tests which suggests that only a small proportion of the true number of infections is being picked up.
