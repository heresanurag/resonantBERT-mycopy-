title: Stephen Chamberlain's son vows to finish his run - BBC News
date: '2024-08-21'
section: Cambridgeshire
url: http://www.bbc.co.uk/news/articles/cpdlj4097y2o
content: |-
  Mr Chamberlain was six miles into his morning run when he was struck by a car in Cambridgeshire.

  Mr Chamberlain was about six miles (10km) into his morning run when he was struck by a car

  The son of Stephen Chamberlain, the co-defendant of British tech tycoon Mike Lynch, says he will complete the run his father was on when he was hit by a car. Mr Chamberlain died in hospital after he was struck by a vehicle while running on the A1123 at Stretham in Cambridgeshire on Saturday. He was Mr Lynch's co-defendant in a US fraud trial in which both men were acquitted following the $11bn (£8.64bn) sale of the software giant Autonomy. The 52-year-old was about six miles (10km) into the morning run, according to data from his Strava account. Commenting on Strava, his son, Teddy Chamberlain, announced plans to complete the run and invited those wishing to pay tribute to finish it with him.

  Mr Chamberlain died in hospital after the crash on the A1123 at Stretham in Cambridgeshire

  He was the former vice-president of finance at Autonomy and prior to his US trial he was the former chief operating officer of British cyber security company Darktrace. Mr Lynch and his daughter are currently missing after a luxury yacht sank off the coast of Sicily on Monday. Mr Lynch had connections to Cambridgeshire after studying Natural Sciences at the University of Cambridge. He was raised near Chelmsford in Essex and more recently had been living in the Loudham Hall estate in Suffolk.

  Mr Chamberlain's family said: "He made a lasting impression on everyone who had the privilege of knowing him"

  Following the crash, the driver of the car, a 49-year-old woman from Haddenham, remained at the scene and was assisting with inquiries, police said. On a public Strava post, Teddy Chamberlain said: "We are planning to complete this run for Dad (after I train of course!). "If any of you would like to pay tribute and run it with us I will keep you updated. "I’m sure we will make a post about the day and time at a later date. He was such an incredible man and the pain we feel is unimaginable." Many people have paid tribute to the keen runner and "strong supporter of local football in Cambridgeshire". Cambridge United director, Graham Daniels, told BBC Radio Cambridgeshire about Mr Chamberlain's time as an unpaid finance director at the club from 2016 to 2018. He said: "A real tragedy. Steve was a Cambridgeshire man; he grew up in Hardwick and was a fantastic footballer. "He very faithfully gave us two years as unpaid finance director just to help us sort the institution out a little bit and tidy things up for the new owners. "He spent hours at the club in those years because there was much to do. "He had a pivotal role in that transition and he volunteered to stand down from his voluntary role during the noise from Autonomy."

  Stephen Chamberlain was previously acquitted with Mike Lynch following a US fraud trial

  Mr Daniels said people were barely able to take in the news that had "deeply hurt hundreds in the Cambridgeshire football community". "He was a winner in all sorts of ways and in sport there is nothing so winsome as someone who is ultra-competitive. He was running miles and miles right to the end of his life. "He cared for people and always knew when to put people first...what you hear about him is true, he was the real deal."

