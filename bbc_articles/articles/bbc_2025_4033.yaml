  Francis, born Jorge Mario Bergoglio, is the first Pope from the Americas. He contracted pleurisy as a young man and had a partial lung removal, which has left him particularly vulnerable to pneumonia. As a result of his long road to recovery, there has been speculation that Pope Francis could choose to follow his predecessor Benedict XVI in resigning the papacy. But friends and biographers close to the Pope have insisted that he has no plans to step down. And, despite his fragile health, the pontiff has continued his work from hospital. This year is a Catholic Holy Year, with 32 million pilgrims expected to travel to Rome.
