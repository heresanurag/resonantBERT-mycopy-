content: |-
  The foreign secretary previously called Trump a "tyrant" and "xenophobic" when he was a backbench MP.

  Lammy dismisses past criticism of Trump as 'old news'

  This video can not be played To play this video you need to enable JavaScript in your browser.

  The foreign secretary has dismissed his previous criticism of Donald Trump as "old news" and insisted he would be able to find "common ground" with the president-elect. When he was a backbench MP in 2018, David Lammy described Trump as a "tyrant" and "a woman-hating, neo-Nazi-sympathising sociopath". But in his first interview since Trump's victory, he told the BBC's Newscast podcast the president-elect was "someone that we can build a relationship with in our national interest". Lammy praised his election campaign as "very well run", adding that: "I felt in my bones that there could be a Trump presidency."

  In the interview, Lammy was challenged over comments he had made about Trump before he was foreign secretary. In 2019, ahead of Trump's state visit to the UK, Lammy also posted that the then-president was "deluded, dishonest, xenophobic, narcissistic" and "no friend of Britain". Pressed over whether he had changed his mind, Lammy said the remarks were "old news" and you would "struggle to find any politician" who had not said some "pretty ripe things" about Trump in the past. "In that period, particularly with people on Twitter, lots of things were said about Donald Trump," he said. "I think that what you say as a backbencher and what you do wearing the real duty of public office are two different things. "And I am foreign secretary. There are things I know now that I didn't know back then." Asked in if Trump brought up his previous comments when the pair met for dinner in New York in September, Lammy said: "Not even vaguely." "I know this is a talking point today, but in a world where there's war in Europe, where there's a tremendous loss of life in the Middle East, where the US and the UK genuinely have a special relationship, where we got someone who's about to become again, the US president, who has experience of doing the job last time round, we will forge common interests," he said. "We will agree and align on much and where we disagree, we'll have those conversations as well, most often in private." Lammy called the incoming president "a very gracious host" who offered him "a second portion of chicken" during their dinner. Sir Keir Starmer sidestepped a call by new Conservative Party leader Kemi Badenoch for Lammy to apologise for his past comments on Trump, at Prime Minister's Questions on Wednesday.

  In his Newscast interview, Lammy was also asked about the potential impact of Trump's policies on UK trade. He described Trump as “warm about the UK,” especially toward the Royal Family, and noted he “loves Scotland”. But during the election campaign, he vowed to dramatically increase taxes, or tariffs, on foreign goods imported into the US. Such a move could hit billions of pounds' worth of British exports, including Scotch whisky, pharmaceutical products, and airplane parts. Asked if the UK would seek a special trade arrangement so there were no extra tariffs on British exports to the US, Lammy said: "We will seek to ensure and to get across to the United States, and I believe that they would understand this, that hurting your closest allies cannot be in your medium or long-term interests." Lammy also said Trump was "correct" in his argument that Europe had fallen short on defence spending. He called for a “clear” pledge from European governments to boosting military spending but could not say when the government would reach its target of spending 2.5% GDP on defence. Lammy argued another state visit for Trump next year would be a "tall order" as they "take a while to organise". State visits are the highest level of diplomatic visit to the UK and traditionally involve a state banquet hosted by the monarch and a carriage parade along the Mall. But Lammy said the government "generally want to be generous with our American friends". Reform UK Leader Nigel Farage, who spent US election night in Florida as Trump’s guest, said it would have been "impossible" for Lammy to "carry on" as foreign secretary if he had stuck by his previous comments. But he warned that the “problems” in Lammy’s relationship with Trump would come from other issues, such as “giving away the Chagos Islands, where there's a very important US naval base”. Farage added he was "supremely confident that with the right negotiation, [the UK] can avoid" trade tariffs threatened by Trump, in an interview with BBC Wales.

