title: Deadly earthquake hits Japan - BBC News
date: '2018-06-18'
section: General
url: http://www.bbc.co.uk/news/world-asia-44516932
content: |-
  At least three people are reported to have been killed when an earthquake hit the city of Osaka.

  Three people are reported to have been killed when a strong earthquake hit the Japanese city of Osaka.

  The magnitude 6.1 quake struck the city during the morning rush hour - bringing train lines to a halt.
