title: 'Haifa: Israel’s underground hospital prepares for attack - BBC News'
date: '2024-08-07'
section: Middle East
url: http://www.bbc.co.uk/news/articles/cg799l4eel1o
content: |-
  The facility, close to the border with Lebanon, is on standby in the event of another war.

  Deep under the northern Israeli city of Haifa, there’s a vast underground hospital. Hundreds and hundreds of beds are lined up within its concrete walls. There are operating theatres, a maternity ward, and medical supplies stacked up in corners. But there are no patients – yet.

  Rambam Medical Centre excavated this bunker after the Israel-Hezbollah war of 2006. It’s normally a multi-storey car park but it can be converted into a hospital in less than three days. It’s been on standby since shortly after the Hamas attacks of 7 October and Israel’s subsequent military campaign in Gaza. The facility has more than 2,000 beds. In the event of a major attack on Israel, it would take in existing patients from the overground medical centre and other nearby hospitals. And there’s room too to treat injured casualties. As the threat of an all-out regional war looms large following the killing of Hamas’ political leader Ismael Haniyeh and Hezbollah senior commander Fuad Shukr last week, doctors here say they’re prepared for a major attack on Haifa.

  "When, when, when is it going to happen? Nobody knows. We talk about it a lot," says Dr Avi Weissman, the medical director of the centre. People, he adds, are anxious. He and his staff just hope that any escalation of violence doesn’t last long.

  Dr Weissman says the threat of an attack preoccupies the minds of staff at the hospital

  Not far from the hospital there’s a stunning viewpoint over the city and its thriving port. Out to sea, ships and tankers glide across the water. But Haifa’s proximity to Lebanon – and Hezbollah’s rockets – leaves it vulnerable. Look out over the shipping lanes and you can see the border. The people who live here are used to emergency drills every few months. School children regularly rehearse what to do in the event of an attack. One young couple we met in the city centre described living with that threat. "It’s like a ticking timebomb," says the woman. "Any minute now it could be an alarm. Will I die? Will I have time to go to my family?" Others are less concerned. In his newly-opened coffee shop, Luai poured a cappuccino and said he had grown accustomed to the situation. "People are afraid. I’m not afraid," he said. But in Haifa City Hall, the mayor admits to sleepless nights. Yona Yahav is in his eighties and the weight of responsibility hoods his eyes. He also ran the city during the 2006 war. "I’m very sad about it," he said. "There is a fork in the Middle East. The leaders are only concerned with destruction, killing, fighting instead of building." Haifa is a so-called "mixed city"; a place where a significant number of Israeli Arabs live alongside Israeli Jews. Mr Yahav says it’s a peaceful community, which makes the current conflict all the more painful. Peace, he insists, is still possible. And international diplomacy continues even as Haifa’s doctors prepare their fortress hospital. There's still hope, perhaps, they’ll never have to use it.
