  Scott Parker celebrates a third promotion to the Premier League with Burnley's season built on a near-impenetrable defence.

  Burnley 'bored our way to Premier League' - Brownhill

  Burnley have secured promotion back to the Premier League at the first time of asking the past three times they've been relegated

  Incredible. Boring. Record-breakers. Special. Those are all the words that have been used to describe Burnley on their way to winning promotion to the Premier League this season. Captain Josh Brownhill himself even joked that Burnley have "bored our way to the Premier League" after the 2-1 win over Sheffield United on Monday evening confirmed their return to the top flight. Brownhill was referencing the fact the Clarets are set to become the best defence in Championship history having conceded just 15 goals this season, smashing the record of 30 goals allowed by Watford in 2020-21 and Preston in 2005-06. They have also kept 29 clean sheets, beating Wigan Athletic's EFL record of 27 in League One in 2017-18. With 12 goalless draws and 15 of their 26 wins by a one-goal margin, Scott Parker's side has been largely built on remarkable defensive stability and consistency. But that takes nothing away from the fact Burnley are on course to reach 100 points and match Reading's record 33-game unbeaten run in the second tier set in 2005-06, should they win their final two games against QPR and Millwall. Top goalscorer Brownhill led by example at Turf Moor against the Blades - as he has done for much of this season - with two goals to help his side to the victory that sealed Burnley's place in the Premier League for the 2025-26 campaign.

  Burnley have only conceded 15 goals in the Championship - 14 fewer than Leeds (29) who have the second strongest defence

  "I'm speechless. All that hard work this season," the 29-year-old told Sky Sports. "We've been written off so many times, people calling us boring. We've bored our way to the Premier League. "It takes a whole team - it's not just a back four, a goalkeeper, it takes everybody. "I don't think a lot of the lads will sleep. I'm so buzzing for the lads that haven't played Premier League football." Head coach Parker said the "ambition and target at the start of the season was to get back to the Premier League". "We've managed to do that so I'm hugely proud of the squad," he told BBC Radio Lancashire. "It's come down to real, pure commitment from every one of the players, their dedication and the sacrifice that they've made, that leads us to this point. "I explained to the lads there is emotion from me because I see the commitment that everyone has brought. "We live in a world where you win or you lose and you get judged and at the end of the season you're either promoted or not and that's how quickly people will judge it. "I'm just delighted that all that work, all that effort, all that sacrifice has been worth it and people can see it. The facts are if you don't get promoted people can see it."

