  Parker was appointed Burnley boss in the summer following 15 months out of management, having been sacked by Belgian side Club Brugge in March 2022 after just 12 games in charge. The 44-year-old said his third promotion as a manager means "everything" and said the journey Burnley have been on is "nothing short of incredible". "This one feels special," he told Sky Sports, having previously won a place in the top flight with Fulham and Bournemouth. "I've had some bumps in the road as a manager, not to make this about me. I decided to take a year out and came back to this, I knew it would be a challenge. "The spotlight often shines on the players and myself but the sacrifices that families make - they fully deserve it." There are only two games of the season remaining but with both Leeds and Burnley tied on 94 points, Parker says they are still aiming to win the title. "We are going to go for it," Parker said. "That's the aim and that's exactly what we are going to do." Burnley chairman Alan Pace described Parker as a "living legend" who has "outperformed anything he could have possibly said" before he was hired.

  Scott Parker has won promotion to the Premier League for the third time as a manager

  "He's shown multiple times that he knows how to handle this league and how to bring a group of men together and accomplish great things," Pace told Sky Sports. "Even when there was negativity at the start of the season from others, it never stopped him. "He's amazing and we are so, so grateful, thankful and blessed to have him here." Midfielder Josh Cullen said promotion feels "absolutely amazing" and added: "This is a day I'll never forget."
