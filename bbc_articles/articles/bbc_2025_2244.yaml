content: |-
  A man allegedly faked a seizure to distract a Colorado pet shop's staff as his accomplice grabbed the puppies.

  A man allegedly faked a seizure to distract pet shop staff in Colorado as his accomplice stole two bulldog puppies.

  The Arapahoe County Sheriff's Office said a third suspect was also involved in the theft of the puppies, priced at $4,299 each.

  One puppy has now been returned to the pet shop.
