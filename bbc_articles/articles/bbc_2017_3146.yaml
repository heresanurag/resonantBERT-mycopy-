title: 'Trump cabinet: Rex Tillerson hails ''extraordinary opportunity'' - BBC News'
date: '2017-02-02'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-38836644
content: |-
  Rex Tillerson has been sworn in as President Donald Trump’s secretary of state.

  Rex Tillerson, the former chairman and chief executive of Exxon Mobil, has been sworn in as President Donald Trump’s secretary of state.

  The 64-year-old was cleared for full Senate approval in a 56-43 vote.
