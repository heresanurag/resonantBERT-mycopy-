title: Tube passenger, 101, dragged down platform by coat stuck in door - BBC News
date: '2024-06-27'
section: London
url: http://www.bbc.co.uk/news/articles/cydvpjz7zpdo
content: |-
  The woman sustained serious injuries in the accident at Archway London Underground station.

  The 101-year-old was with a companion who held onto her as they fell to the ground

  A 101-year-old London Underground passenger was dragged along a platform after her unzipped coat became trapped in a closing door. The woman was left with serious injuries after the incident as she exited a Northern line service at Archway station on 18 February 2023. A Rail Accident Investigation Branch (RAIB) report, external, published on Thursday, said the centenarian had been dragged for about 2m (6.5ft) before she fell to the ground and her coat pulled free. London Underground said it was "extremely concerned" by the incident.

  The train travelled about 20m (66ft) until it was stopped when the driver activated the emergency brake after realising what had happened, the RAIB's report said. It added the woman had been travelling with a companion who held onto the passenger as they fell to the ground, and was uninjured in the incident. The 101-year-old continued to "suffer from the effects" of the accident, it said. Investigators found the driver activated the control to close the doors just four seconds after they opened at the station, meaning they were fully open for six seconds.

  The report also looked into a similar incident at Chalk Farm station on 20 April 2023, in which a passenger's coat became trapped in closing doors as they attempted to board a train. The train then dragged them along the platform for about 20m until the coat became free, as the passenger fell to the ground. RAIB said the passenger sustained minor injuries, but had subsequently experienced psychological distress due to the experience. RAIB recommended actions for London Underground including considering use of technology that detected when thin objects became trapped in doors. London Underground’s Nick Dent said: “The safety of our customers and staff is at the heart of everything we do and we were extremely concerned that two customers were injured". He added it welcomed the RAIB recommendations and was "in the process of implementing them".
