title: 'Texas school shooting: Husband of killed teacher ''dies of grief'' - BBC News'
date: '2022-05-27'
section: US & Canada
url: http://www.bbc.co.uk/news/world-us-canada-61569655
content: |-
  Joe Garcia dies of a heart attack two days after his wife was shot at Robb Elementary.

  Flowers left outside Robb Elementary School in Uvalde, Texas on 25 May

  The husband of one of the teachers slain in Tuesday's mass shooting in Uvalde, Texas, has died of a heart attack.

  Joe Garcia was the husband of Irma Garcia, who taught for 23 years at Robb Elementary School.

  Mrs Garcia was one of two teachers killed by a teenage gunman in the shooting that left 21 people dead - including 19 children.

  The couple - who were married for 24 years - are survived by four children.

  By Thursday night, an online fundraiser for the Garcia family had raised nearly $1.6m (£1.3m) out of an initial modest goal of $10,000.

