title: 'European elections 2019: Nigel Farage hit by milkshake - BBC News'
date: '2024-06-04'
section: General
url: http://www.bbc.co.uk/news/uk-politics-48340113
content: |-
  The Brexit Party leader had just given a speech in Newcastle ahead of the European elections.

  Brexit Party leader Nigel Farage has been hit by a milkshake while campaigning in Newcastle.

  A 32-year-old man has been arrested in connection with the incident.
