title: 'Strictly Come Dancing: Nicola Adams exits after Katya Jones catches Covid
  - BBC News'
date: '2020-11-13'
section: Entertainment & Arts
url: http://www.bbc.co.uk/news/entertainment-arts-54919497
content: |-
  Ex-boxer Nicola Adams is out of Strictly Come Dancing after partner Katya Jones catches Covid-19.

  Nicola Adams and Katya Jones during the launch show of Strictly 2020

  Former boxer Nicola Adams and her Strictly Come Dancing partner Katya Jones have left the BBC contest after Jones tested positive for Covid-19.

  A statement said the programme's "protocols" meant the pair would now self-isolate and would not be able to take part in the rest of the series.

  They made history as the first same-sex couple to take part in the UK show.

  Meanwhile, judge Motsi Mabuse has said she will be self-isolating this weekend after an "urgent" trip abroad.

  Olympic gold medallist Adams said: "I'm absolutely devastated my Strictly journey has come to an end so soon."

