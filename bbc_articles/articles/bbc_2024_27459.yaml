title: 'Wales 19-24 Fiji: Warren Gatland''s equal record losing streak - BBC Sport'
date: '2024-11-10'
section: Welsh Rugby
url: http://www.bbc.co.uk/sport/rugby-union/articles/cx243wyl7l9o
content: |-
  Warren Gatland's Wales equal the country's record losing international streak of 10 successive Test defeats after Fiji triumph in Cardiff.

  Fiji fly-half Caleb Muntz scored as many points (19) as Wales

  Warren Gatland's Wales equalled the country's record losing international streak of 10 successive Test defeats after Fiji triumphed in Cardiff. Fiji fly-half Caleb Muntz scored 19 points as the visitors sealed a first win in Wales, despite wing Semi Radradra receiving a first-half 20-minute red card for a dangerous tackle on full-back Cameron Winnett. An ill-disciplined first half saw French referee Luc Ramos also show yellow cards to Wales flanker Tommy Reffell and Fiji number eight Elia Canakaivata. Wales led 14-10 at half-time through a try for new cap Blair Murray and a penalty try but Muntz responded with a brilliant solo score. Muntz's boot and a try from centre Josua Tuisova stretched the lead, before replacement Ellis Bevan reduced the deficit with a third Wales try. Any hope of a home revival was dashed by Muntz's late kick and Wales spurning a last-minute opportunity.

  Wales have suffered their worst run of results since 2003

  Wales head coach Gatland had indicated he hoped for ecstasy rather than agony this weekend but that was not to be the case and his position will come under scrutiny. Welsh rugby is in crisis on and off the field and that is demonstrated by the record of the men's national side. Sunday represented 400 days since Gatland's side last won a Test when they defeated Georgia in a World Cup pool match in Nantes in October 2023. Nine international defeats have followed including a World Cup quarter-final exit against Argentina, including a Six Nations Wooden Spoon and summer losses against South Africa and Australia. This reversal has seen this Wales crop equal the record low of 10 Test losses on the bounce set in 2002 and 2003 under Steve Hansen. With Wales facing a rejuvenated Australia next Sunday before the arrival of world champions South Africa, Gatland's side face the grim prospect of not winning an international match in a calendar year for the first time since 1937. In that year Wales only played three games, but they will be involved in 11 internationals in 2024. For Fiji, it represented a second international win in 15 games against Wales to follow up the World Cup victory in 2007. Wales missed 32 tackles, conceded 12 turnovers and 12 penalties and, though they managed 18 successful line-outs, they could not quite gain the upper hand on the scoreboard.

  Blair Murray is one of eight Scarlets named in Wales' autumn squad

  The two sides met for the first time since the World Cup thriller in Bordeaux almost 14 months ago which Wales won 32-26. Radradra started along with Tuisova, Jiuta Wainiqolo and captain Waisea Nayacalevu in included in a star-studded Fijian backline after missing the 57-17 defeat by Scotland last weekend. Gatland's side opened the scoring with a clever attacking move to give new wing Murray a dream debut. The New Zealand-born back stepped into the Test match arena after just six games for the Scarlets since arriving for the start of the 2024-25 season. It was a remarkable rise for the 23-year-old who had come through the New Zealand system but qualified for Wales because his mother is from Tonyrefail. After only eight minutes he was a Test try scorer. A strong midfield burst from returning centre Max Llewellyn provided the platform for clever distribution from Gareth Anscombe and Thomas to release Grady and Winnett, to allow Murray to canter in with Anscombe converting. The move demonstrated the benefits of having two playmakers in the backline, with Anscombe returning at fly-half and Thomas switching to inside centre from the number 10 he had occupied for Wales in the summer. The hosts were not able to replicate that much more during the afternoon.

  French referee Luc Ramos brandished three yellow cards in the first half in Cardiff

  Fiji responded with a Muntz penalty before Wales thought they had scored their second try through Winnett. It was ruled out when flanker Reffell was shown a yellow card for a dangerous clearout in the build-up to Radradra's head. Wales retaliated with another driving maul, which forced Fiji to concede a penalty try and led to Canakaivata's yellow card. Gatland was forced into a backline change with Grady forced off injured and Scarlets fly-half Sam Costelow coming on to play out of position on the wing. Wales had taken a selection gamble by only selecting two backs on the bench with no specialist centre or wing replacement. It was 14 against 13 when Radadra was initially shown a yellow card, but Fiji responded despite their numerical disadvantage with a fine individual converted try from Muntz as he evaded five Wales defenders. Fiji received the news Radradra's yellow card was updated to a 20-minute red card after a bunker review, the first time Wales have been involved in this World Rugby trial process. Despite this, Fiji appeared to have taken the lead with an attacking driving maul that had yielded a penalty try but was ruled out for obstruction.

  Fiji had only beaten Wales once before - at the 2007 Rugby World Cup

  The score was chalked off as Wales led 14-10 at half-time before Fiji were restored to 15 men with the arrival of Bayonne centre Sireli Maqala, the leading try-scorer in France's Top 14 league. Muntz reduced the deficit to one point before Wales used four of their six forward replacements at once, with front-row trio Nicky Smith, Ryan Elias and Keiron Assiratti introduced. Flanker Jac Morgan made an impact as he came on for Reffell and took over the captaincy following the departure of hooker Dewi Lake. Muntz gave Fiji the lead for the first time with a penalty before Murray was denied a second score after the pass was deemed forward. Wales turned down penalty kicks at goal despite only trailing by two points before a backline reshuffle led to Cardiff scrum-half Bevan replace Anscombe, coming on to the wing with Costelow switching to fly-half. Tuisova powered over for Fiji's second try before Bevan made an immediate impression as he scored in the right-hand corner but Costelow missed the chance to level the scores with the conversion. Fiji full-back Vuate Karawalevu appeared to have clinched victory before a pass from Muntz was deemed forward. Although the score was disallowed, Muntz slotted over a penalty. Wales had one final opportunity but when replacement hooker Elias spilled possession in the Fiji 22, the visitors could start celebrating.
