title: Chelsea appoint Graham Potter to succeed Thomas Tuchel as manager - BBC Sport
date: '2022-09-08'
section: General
url: http://www.bbc.co.uk/sport/football/62838065
content: |-
  Chelsea appoint Graham Potter as their new manager following the sacking of Thomas Tuchel.

  Last updated on .From the section Chelsea

  Graham Potter had been Brighton manager since May 2019 Chelsea have appointed Graham Potter as their new manager following the sacking of Thomas Tuchel. Potter has left fellow Premier League club Brighton to take up the role and has signed a five-year deal with the Blues. The 47-year-old said he was "incredibly proud and excited to represent Chelsea". Potter's first game in charge will be an away derby with fellow west London club Fulham on Saturday at 12:30 BST. His assistant Billy Reid, first-team coaches Bjorn Hamberg and Bruno, goalkeeping coach Ben Roberts and assistant head of recruitment Kyle Macaulay will join him at the Chelsea, who have paid Brighton in excess of £21m in compensation.
