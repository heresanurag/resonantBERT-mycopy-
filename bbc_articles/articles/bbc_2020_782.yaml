  They said they were "incredibly honoured" to be named alongside the other "incredible" acts who have been recognised, both this year and in the past.

  Brooklyn hip-hop sensation The Notorious B.I.G. - aka Christopher Wallace - made a huge impact on the rap world during his short career.

  The East Coast rapper was shot four times and killed in a drive-by shooting 1997, aged 24, and the case remains unsolved.

  In a recent BBC poll, his track Juicy - from his acclaimed 1994 debut album Ready To Die - held off Public Enemy's Fight The Power and Mobb Deep's Shook Ones (Part II), to be crowned the greatest hip-hop song of all time.

  The ever-changing Doobie Brothers have sold nearly 50 million records thanks to their self-styled "yacht rock" - a mix of West Coast Californian soft rock and country blues - on songs like Listen to the Music, Takin' It to the Streets and What a Fool Believes.

  Finally, Nine Inch Nails will become local and national heroes when they step into the Public Auditorium in their home town of Cleveland to be inducted.

  Frontman Trent Reznor told Rolling Stone he was "pretty freaked out" about receiving the accolade.

  "I'm allowing myself, for a limited period of time, to feel good about this," he said.

  The industrial rockers are perhaps best known for the track Hurt, which was covered to haunting effect by country legend Johnny Cash shortly before his death.

  Reznor and bandmate Atticus Ross are racking up the awards, having picked up Oscars in 2011 for their work on the soundtrack to The Social Network.

