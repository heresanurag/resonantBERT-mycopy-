content: |-
  The government says taxes will have to rise to fix the public finances - but which ones could go up?

  What taxes might be raised in the Budget?

  Chancellor Rachel Reeves has warned that her first Budget will involve "difficult decisions" on tax, spending and benefits. Shortly after Labour took power, Reeves said the government would have to increase taxes to plug what it claimed was a £22bn "hole" in the public finances. Earlier this month, government sources said the chancellor was looking to make tax rises and spending cuts to the value of £40bn in the Budget, which will take place on 30 October. Labour has ruled out raising taxes on "working people", including VAT (value added tax), income tax and National Insurance. So which taxes might go up?

  One option is to use what has been dubbed a stealth tax - a means of raising revenue which is not explicitly labelled or intended as a tax. Paul Johnson, director of the Institute for Fiscal Studies (IFS), believes the most obvious solution would be to focus on tax thresholds - the amount of money you can earn before any tax starts to be paid. Currently the thresholds on income tax and National Insurance are frozen until 2028, a policy brought in by the previous government. The chancellor is now said to be weighing a plan to continue the freeze beyond that. The policy amounts to a tax rise because of a process called "fiscal drag", which sees more people "dragged" into paying higher rates of tax as their wages rise. The Resolution Foundation, a think tank that aims to improve living standards for low-to-middle income families, calculates the current freeze will generate about £40bn of revenue by 2028. Reports suggest extending the freeze could raise an extra £7bn a year.

  While the Labour Party's election manifesto ruled out raising National Insurance (NI) it appears increasingly likely that NI payments made by businesses will rise. The chancellor has given signals that employers will face higher NI contributions, and Prime Minister Sir Keir Starmer has not ruled out the rises either. Employers pay NI at a rate of 13.8% on all employees' earnings above £175 per week, but pension contributions made by employers are currently exempt from the levy. Treasury officials are reportedly exploring NI on employer pension contributions to raise revenue. Businesses have hit out over a potential change, arguing it will make hiring staff and creating jobs harder.
