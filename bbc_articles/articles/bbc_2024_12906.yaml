content: |-
  Elms hosted his first Radio London show in June 1994 and has been celebrating London life ever since.

  On 20 June 1994, Robert Elms pushed up the faders for his first show on BBC Radio London, then called Greater London Radio (GLR).

  While the name of the radio station has changed several times since his first show, the aim has always been the same - to celebrate London life, its history, people and its rich and varied architecture.

  To celebrate 30 years on London's airwaves, Elms revisited one of his favourite London buildings, the iconic Ernő Goldfinger designed brutalist Trellick Tower in north Kensington.

