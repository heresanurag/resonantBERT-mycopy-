title: Police raids over Addiewell prison contraband - BBC News
date: '2019-04-06'
section: Edinburgh, Fife & East Scotland
url: http://www.bbc.co.uk/news/uk-scotland-edinburgh-east-fife-47838763
content: |-
  Officers target Addiewell prison, where there have been concerns about staffing, and addresses in Lanarkshire and West Lothian.

  Police officers have carried out a series of raids in an operation targeting smuggling of contraband into a Scottish prison.

  HMP Addiewell is run by private firm Sodexo and houses about 700 prisoners.

  A recent inspectors' report raised concerns about staffing levels at the West Lothian jail.

  Two members of staff required medical treatment after being exposed to the psychoactive substance Spice at the jail in 2017.

  The latest police action took place at the prison, and at addresses in Lanarkshire and West Lothian.

  A Police Scotland spokeswoman said: "On Wednesday 3rd April, Police Scotland carried out enforcement activity at HMP Addiewell and three addresses in Armadale, Hamilton and Shotts as part of an ongoing investigaion relating to contraband items being brought into the prison.

  A spokeswoman for HMP Addiewell added: "Drugs, mobile phones and other illicit items are an issue across the whole prison estate, and we regularly carry out intelligence-led searches of the prison.

  On Wednesday a planned intelligence-led operation with the support of Police Scotland was carried out at the prison and at a number of locations outside of the prison.

  "The results of the operation will be shared with the Scottish Prison Service and any appropriate action will be taken."
