title: Longleat team captures footage of rare hazel dormouse foraging - BBC News
date: '2025-03-06'
section: General
url: http://www.bbc.co.uk/news/videos/cx2glzpydx2o
content: |-
  The rare creatures are rarely seen as they spent a lot of time sleeping and only come out at night.

  A rare hazel dormouse has been captured on camera foraging for food at Longleat Safari Park in Wiltshire.

  The UK population of dormice has plunged in recent years due to habitat loss, but the majority of the woodland at Longleat is managed to preserve it for wild creatures.

  Conservationists have also conducted a footprint tunnel survey to monitor the species and see how much woodland they use.

  Dr Tom Lewis, the safari park's conservation and research manager, said the team is "so pleased" to have found dormice in almost half of all sites in the area they searched.
