  A coroner suspends the inquest into the boy's death while police continue their investigation.

  A coroner suspended the inquest into Jay Cartmell's death while police continue their investigation

  An eight-year-old boy died from a suspected shotgun injury sustained while on a rabbit shooting expedition, a coroner has said. Jay Cartmell, of Frizington, was shot in the head on 28 September in Warcop, near Appleby in Cumbria. An inquest into his death was formally opened at Cockermouth Coroners’ Court on Thursday. With police still investigating Jay's death, the assistant coroner for Cumbria Dr Nicholas Shaw suspended inquest proceedings to a later date.

  Following the shooting on land close to the A66, a man in his 60s was arrested on suspicion of gross negligence manslaughter and later released on bail. Dr Shaw noted the youngster had been airlifted to Newcastle’s Royal Victoria Infirmary where he died. During a short hearing he said: "The brief circumstances - and and it has been well reported in the press already - are that Jay sadly sustained a serious injury during a rabbit shooting expedition." It was suspected, said the coroner, that he had suffered a shotgun injury.

  A decision will be taken on whether a full inquest will be needed once police enquiries conclude, the hearing was told. Dr Shaw also said evidence of identification in the case had been provided by a funeral director who was also a friend of Jay’s family. Jay, who played for Whitehaven Miners Social Football Club, had been following in his father’s footsteps by taking up speedway at Workington Comets and was said to have loved being outdoors. Last weekend, junior and senior footballers across Cumbria paid tribute to Jay by holding a minute’s applause before matches. In a tribute, heartbroken parents Leigha and James described him as "loving, kind and full of mischief".
