  Fred Dimbleby, editor of Cherwell Online, tweeted footage showing paramedics carrying a stretcher to the scene.

  Members of the public have been warned to avoid the area and the Oxford Tube, and Stagecoach said buses are not stopping on Castle Street.

  Supt Joe Kidman said: "People in Oxford will notice an increased police presence in the area while officers are dealing with the incident, which is contained and taking place at a residential property."

