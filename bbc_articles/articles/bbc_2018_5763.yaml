title: 'Oxford shooting: Police and gunman in standoff - BBC News'
date: '2018-05-08'
section: Oxford
url: http://www.bbc.co.uk/news/uk-england-oxfordshire-44032295
content: |-
  A cordon remains in place in Oxford city centre as officers are locked in a stand-off with the gunman.

  Armed police are locked in a stand-off with a gunman after a shootout in Oxford.

  Thames Valley Police said shots had been fired from a property in Paradise Square and officers returned fire. Officers are currently negotiating with a man.

  One person is being treated for a non-life threatening injury, South Central Ambulance Service said.

  A cordon remains in place around Paradise Square and Norfolk Street.

  Firearms officers were called at 13:15 BST after witnesses reported hearing gunfire.

  On Sunday night police tweeted that officers "remain in Paradise Square working to resolve the incident".

  The force added that some residents were being allowed to return to their homes.

