  Saturday at The Isle of Wight Festival saw a headline set from legendary synth-pop duo the Pet Shop Boys, as well as performances from S Club, Keane and Jessie J on the main stage. Meanwhile, in the big top arena Britpop band Suede and Swedish two time Eurovision song contest winner Loreen entertained festivalgoers. An estimated 50,000 people are in attendance at the Newport based festival.
