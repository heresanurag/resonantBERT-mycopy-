title: 'Antoine Dupont: France captain suffers fractured cheekbone in World Cup win
  against Namibia - BBC Sport'
date: '2023-09-22'
section: General
url: http://www.bbc.co.uk/sport/rugby-union/66887936
content: |-
  France captain Antoine Dupont suffered a fractured cheekbone in Thursday's 96-0 win against Namibia, the French Rugby Federation confirms.

  Last updated on .From the section Rugby Union

  France captain Antoine Dupont suffered a fractured cheekbone in Thursday's 96-0 win against Namibia, the French Rugby Federation has confirmed.

  The 2021 world player of the year was forced off in the 46th minute after Johan Deysel made a head-on-head tackle and was sent off.

  The FFR says Dupont will remain with the squad and will see a specialist to work out how long he will be out for.

  France's final pool match is against Italy on 6 October.

  The quarter-finals are scheduled for the weekend of 14-15 October, the semi-finals the weekend after and the final on Saturday, 28 October.

  "Antoine Dupont has suffered a maxillo-zygomatic fracture. A specialist surgical opinion has been requested to determine the exact length of the player's unavailability. Antoine Dupont remains with the France squad," the FFR said.

  The loss of Dupont would be a severe blow to France's chances of winning the World Cup for the first time.

  As well as being named world player of the year he was also voted Six Nations player of the tournament in 2022 and 2023.

  The 26-year-old is also unbeaten in 14 home Tests as France captain.

  After beating three-time winners New Zealand in the tournament's opening game, Dupont was among 12 players rested for France's second group win over Uruguay.

  He was restored to the side against Namibia in Marseille and helped the hosts into a 54-0 lead before his collision with Deysel.

  The Namibia captain was initially shown a yellow card but that was upgraded to red following a review by the television match official.

  Since the incident, Deysel says he has reached out to Dupont to apologise.

  "I would like to extend my best wishes to Antoine Dupont. Clearly, I meant no harm," said Deysel.

  "Everything happened very quickly and I couldn't get my head out of the way quick enough, resulting in a head clash. I know the rules and immediately knew that I was at fault.

  "I spoke with Fabien Galthie [France head coach] immediately after the match and sent my best wishes and apologies to Antoine, both personally and via the France team doctor.

  "He is a great player and person, and I wish him a speedy recovery."

  Dupont will see a specialist to determine what grade the fracture is, but early estimates are that he is looking at between four and six weeks out.

  Not only is it a desperate blow for France but for the World Cup as a whole. Dupont is the tournament poster boy, the best player in the world by a distance, with this World Cup a chance to cement his legacy as one of the greatest of all time.

  He still might do that - a semi-final will be in five weeks if France get there - but it is touch and go, and it is shades of Dan Carter in 2011, when another all-time great was ruled out of a World Cup on home soil.

  'We can't think too far ahead'

  Dupont's injury leaves France with two fit scrum-halves in Lyon's Baptiste Couilloud, who scored in the team's record win against Namibia, and Bordeaux Begles' Maxime Lucu.

  Lucu, 30, replaced the France captain during their opening victory over New Zealand, indicating he is the likely replacement over the next few weeks.

  France attack coach Laurent Labit stressed Dupont would stay with the squad and that he had not "finished the competition".

  "Antoine stays with us, everyone will be together," Labit said. "We will do as we have always done with short-term injuries in hoping that the opinion of the surgeon is positive for Antoine and us.

  "The specialist will give the verdict and Antoine will make the decision. We will respect that. We can't think too far ahead.

  "The specialist knows who Antoine Dupont is, what competition he is currently playing. It is not an average subject."
