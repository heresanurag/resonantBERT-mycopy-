title: 'UK weather: April set to be frostiest in UK for 60 years - BBC News'
date: '2021-04-27'
section: UK
url: http://www.bbc.co.uk/news/uk-56903882
content: |-
  This month saw 13 days of air frosts in the UK, compared with the previous record of 11 in April 1970.

  This month is provisionally the frostiest April in the UK for at least 60 years, the Met Office has said.

  April 2021 has already seen an average of 13 days of air frosts across the UK, beating the previous record of 11 days reported in April 1970.

  Northern Ireland had eight days of air frosts, while Scotland recorded 16.

  The Met Office says the conditions have been challenging for farmers and growers and are advising gardeners to keep their tender plants indoors.

  The records on frosty days go back to 1960.

