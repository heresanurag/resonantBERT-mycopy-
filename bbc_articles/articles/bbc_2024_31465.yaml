title: Video shows arrest of German Christmas market attack suspect - BBC News
date: '2024-12-20'
section: General
url: http://www.bbc.co.uk/news/videos/c3we9dqjd9lo
content: |-
  Footage from German broadcaster MDR shows police confronting a man lying on the floor by a car.

  Footage from German broadcaster MDR shows police confronting a man lying on the ground by a vehicle after a car drove into people at a Christmas market in the German city of Magdeburg.

  The suspect is believed to be a 50-year-old Saudi Arabian doctor, according to minister president of Saxony-Anhalt, Reiner Haseloff.
