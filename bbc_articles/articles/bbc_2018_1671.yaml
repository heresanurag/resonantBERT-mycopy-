title: Valentine's advice from couples married for 50 years - BBC News
date: '2018-02-14'
section: General
url: http://www.bbc.co.uk/news/uk-england-43033522
content: |-
  Four couples, who've been married for more than 200 years between them, on how to keep love alive.

  Give and take, talking to each other and saying "I love you" are the keys to a long and happy marriage, according to four couples who've become experts on the matter.

  Shirley and Carlton Porter and Uttambhai and Hariganga Bodhani, from Birmingham; and Monica and Ken Bowkett and Jean and David Hobbs, from Worcestershire, have all been married for 50 years or more.
