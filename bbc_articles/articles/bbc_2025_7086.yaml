  All Christians, from Orthodox and western churches, are celebrating Easter on the same day this year.

  In pictures: Easter celebrated around the world from Greece to Iraq

  Pope Francis' delegate Cardinal Giovanni Battista Re presides over the Easter Vigil Mass at St. Peter's Basilica on 19 April in Vatican City, Vatican

  Christians around the world are celebrating Easter. All Christians, from Orthodox and Western churches, are observing the holiday on the same day this year - not often the case because the churches use different calendars. In Greece, the sky lit up with fireworks, while worshippers in Jerusalem lit candles at the church where Jesus is said to have been crucified and buried. Christians believe Jesus rose from the dead, which is remembered at Easter. Here is a look at how some have been celebrating the holiday as days of festivities culminate in Easter Sunday.

  Pope Francis waves to the faithful after the Urbi et Orbi blessing following the Easter Mass in Saint Peter's Square, Vatican City

  Palestinian Christians light candles during the Holy Fire ceremony at the Church of the Holy Sepulchre, which is said to be the place Jesus was crucified and was buried, in Jerusalem's Old City.

  People wait to have their baskets of Easter cakes blessed outside a church in Lviv, Ukraine

  Christian children march in a parade to celebrate Easter amid security measures in Damascus, Syria

  In Kenya's capital Nairobi, members of the Legio Maria Church gather at Africa Church Mission to mark Easter Sunday

  Turkish Christians gather at the Greek Orthodox Church in Mersin for the Easter Sunday service

  Chris Beck and Emily Brown gather outside Saint Patrick's cathedral during the Easter Bonnet Parade on in New York City

  Orthodox faithful attend a Easter Sunday Mass at the Patriarchal Church of St. George in Istanbul, Turkey, on Sunday

  People dressed in traditional clothes remove the covers from Easter baskets during a service in Maramures, Breb, Romania

  A woman dressed in traditional clothes of the Sorbs, a Slavic ethnic minority, sings near the church in Schleife, eastern Germany, on Easter Sunday

  The head of Sri Lanka's Roman catholic church, cardinal Malcolm Ranjith, leads an Easter Vigil at the Cathedral of St. Lucia in Colombo on Saturday

  In Bethlehem, West Bank, Orthodox Christians gather at the Church of the Nativity, where Jesus is believed to have been born

  Nepalese Catholics hold candles as they stand during the Easter Vigil in Lalitpur

  An Orthodox priest delivers a sermon to parishioners during the Easter service before blessing Easter cakes and eggs placed on tables in a St Petersburg church in Russia

  Near Mosul in Iraq, a service in under way at the Mar Yohanna Church

  In France's Notre Dame, the Archbishop of Paris Laurent Ulrich leads the cathedral's first Easter celebrations since it reopened after a fire

  An image of Christ resurrected is carried by women during the Resurrection Sunday procession in Toledo, central Spain

  The Fatima Church in Islamabad, Pakistan saw devotees in prayer for Easter

  In Vrontados, Greece, the sky is lit up with fireworks during a traditional Easter "rocket war"

  Coptic Orthodox Christians in Cairo, Egypt gather at the Monastery of Saint Simon the Tanner
