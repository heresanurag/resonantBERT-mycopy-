title: Could Marine Le Pen win the French elections? - BBC News
date: '2022-04-11'
section: General
url: http://www.bbc.co.uk/news/world-europe-61064426
content: |-
  Marine Le Pen will go head-to-head with President Macron in an election run off in a fortnight.

  The far-right politician obtained her highest result ever at the first round of a presidential elections on Sunday.

  She will now go head-to-head with President Macron in a final vote on 24 April.

  Europe correspondent Nick Beake considers how different France could be with Ms Le Pen in the Elysee Palace.
