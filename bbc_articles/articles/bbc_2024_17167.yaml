content: |-
  Jeremie Tronet tells the BBC about the devastating destruction of the storm on the island where he has lived for 15 years.

  Jeremie Tronet tells the BBC how Hurricane Beryl has destroyed everything he has built in 15 years.

  "I lost my house, my businesses, everything," he says, describing it as "one of the worst hurricanes" the island has ever seen.

  Mr Tronet said the storm has "destroyed the whole island" and has set up a fundraising page to help residents.

