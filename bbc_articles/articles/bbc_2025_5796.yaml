title: Argentine city of Bahía Blanca hit by deadly floods after storm - BBC News
date: '2025-03-09'
section: Latin America
url: http://www.bbc.co.uk/news/articles/c4g07dqep0ko
content: |-
  Eight hours of rainfall hit Bahía Blanca, killing at least 13 people and leaving many areas under water.

  This video can not be played To play this video you need to enable JavaScript in your browser.

  At least 13 people have died in floods in the Argentine port city of Bahía Blanca, following torrential rains. Eight hours of non-stop rainfall destroyed roads and bridges on Friday, flooding buildings and leaving large parts of the city without electricity. More than 1,100 people had to leave their homes and newborn babies were evacuated from a hospital. On Saturday city officials warned that the death toll could rise. The provincial government said it was sending helicopters and ambulances as well as food and water, while the coast guard was helping in the rescue effort.

  Authorities said more than 400mm (15.7 inches) of rain had fallen on Bahía Blanca on Friday. The city normally receives about 600-650mm of rain a year. Images shared on social media showed cars being carried off by raging flood waters. Bahía Blanca, a city with a population of over 330,000, is a major port in the south-western part of Buenos Aires province. Provincial government minister Carlos Bianco told local radio: "We have to rebuild a city. There are people who lost everything."
