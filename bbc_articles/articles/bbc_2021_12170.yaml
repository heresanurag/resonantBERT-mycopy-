  The first people in the UK receive their coronavirus booster jab - as winter Covid preparation begins.

  'Massive increase' in London footfall since May - mayor

  Mayor of London Sadiq Khan says there has been "a massive increase in footfall" in central London, as well "big increases" in the number of passengers on the Tube and buses since early summer. He added: "Our theatres now are incredibly busy, more and more productions are opening." "We’re starting to see the fruits of the Let’s Do London campaign, but we’re not stopping now," the mayor told the Local Democracy Reporting Service. Launched in May, the £6m Let's Do London campaign aims to attract visitors back to London to support the city’s economic recovery following the pandemic. Thursday saw Mr Khan join artist Yinka Illori to unveil 18 new colourful pedestrian crossing designs, as part of London Design Festival. The Mayor highlighted forthcoming events this autumn such as London Fashion Week, London Film Festival, Frieze Masters and Black History Month. "It’s really important that we carry on making the progress that we’ve made so far," he said.
