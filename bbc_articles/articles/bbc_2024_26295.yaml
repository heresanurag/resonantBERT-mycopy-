  Lady Donaldson to appear in court in December

  Lady Eleanor Donaldson is to appear in court in December regarding an application to have two charges against her withdrawn. The hearing at Newry Crown Court is to take place on 17 December. Her husband, Sir Jeffrey Donaldson, who pleaded not guilty to historical sex offence charges, is not required to attend. Lady Donaldson, 58, previously pleaded not guilty to three charges related to aiding and abetting.

  The date for her next appearance was set by Judge Paul Ramsey at a review hearing today, which the couple were not required to attend.

  Former leader of the Democratic Unionist Party (DUP), Sir Jeffrey, is accused of 18 offences, which allegedly occurred between 1985 and 2008. The case facing the former Lagan Valley MP involves two alleged victims. The charges include rape, four counts of gross indecency, and 13 counts of indecent assault. The pair’s trial date is set for March 2025.
