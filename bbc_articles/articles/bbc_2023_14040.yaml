title: Daniel Khalife arrested by police in north-west London - BBC News
date: '2023-09-08'
section: UK
url: http://www.bbc.co.uk/news/live/uk-66749354
content: |-
  The former soldier is recaptured on a canal towpath while riding a bicycle near Northolt, police say.

  How big was the search for Khalife?

  Police were searching for 21-year-old Khalife for four days. Extra security checks at airports and ports led to long delays for passengers, as authorities believed he may have been attempting to leave the country. Officers searched all car boots at the Eurotunnel and at Dover in case he was trying to stow away. But when Khalife was found on Saturday morning, he was in Chiswick, west London - about five miles from Wandsworth Prison. Police had been reviewing CCTV footage and a police helicopter had also been searching parts of west and south-west London in recent days and nights. The Met had sought the public's help, releasing several images of Khalife and asking people to call 999 if they saw him, but not to approach him. Armed officers and police dogs searched parts of west London, as a police boat patrolled on the River Thames. Police stopped and searched vehicles and asked local residents for their identification. The Met Police is yet to give more details on how Khalife was finally found.
