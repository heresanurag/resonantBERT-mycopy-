title: Watch as flaming beacons lit to mark VE Day - BBC News
date: '2025-05-09'
section: General
url: http://www.bbc.co.uk/news/videos/c74nln2wnzko
content: |-
  The flames symbolise the light of peace breaking through the darkness of war.

  Beacons have been lit across the region to mark the 80th anniversary of the end of the Second World War in Europe.

  The flames symbolise the light of peace after the darkness of war and have been lit across Bristol, Somerset, Gloucestershire and Wiltshire.

  All beacons were lit at sunset, at approximately 21:30 BST on Thursday, everywhere from churchyards to the top of prominent hills.
