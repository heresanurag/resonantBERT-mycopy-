id: bbc_2018_10649
title: British Airways boss promises compensation for customers affected by breach
  - BBC News
date: '2018-09-07'
section: General
url: http://www.bbc.co.uk/news/business-45446098
content: |-
  British Airways' chairman and CEO says affected customers will be 100% compensated.

  British Airways' chairman and CEO, Alex Cruz, says customers "financially affected" by a data breach will be "100% compensated."

  The airline has been targeted by hackers, meaning personal and financial details of customers making bookings had been compromised.
