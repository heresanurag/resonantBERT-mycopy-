  • None US coffee shops worried about bitter price hike after tariffs The White House has argued that it is using tariffs as a negotiating tactic to extract more favourable trade terms from other countries. Trump has said his policy will redress unfairness in the global trading system, as well as bring jobs and factories back to the US. However, his interventions have seen massive fluctuations in the stock market and raised fears of a decrease in global trade that could have a knock-on effect on jobs and individual economies.
