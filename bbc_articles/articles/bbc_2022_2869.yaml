id: bbc_2022_2869
title: Pushchair passed over heads in desperate train station scenes - BBC News
date: '2022-03-03'
section: General
url: http://www.bbc.co.uk/news/world-europe-60563045
content: |-
  The BBC's Fergal Keane is in the city of Lviv where refugees are waiting for a train out of Ukraine.

  The BBC's Fergal Keane is at Lviv train station, where refugees are waiting for a train to take them out of Ukraine into Poland.

  In the background, a pushchair can be seen being passed over the heads of people queuing to get onto the station platform.
