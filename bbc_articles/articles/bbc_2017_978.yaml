title: '''Star Wars gibbon'' is new primate species - BBC News'
date: '2017-01-11'
section: General
url: http://www.bbc.co.uk/news/science-environment-38590447
content: |-
  A gibbon living in the tropical forests of China is a new species of primate, scientists say.

  A gibbon living in the tropical forests of south west China is a new species of primate, scientists have said.

  It has been named the Skywalker hoolock gibbon - partly because the Chinese characters of its scientific name - but also because the scientists are fans of Star Wars.
