  Social Care Minister Helen Whately said the care homes themselves should decide on visiting policies.

  "We recognise that every care home has a unique layout, physical environment and facilities, and residents have their own individual health and wellbeing needs, which is why care homes themselves are best placed to decide how to enable visiting safely," she said.

  The report comes a day after new guidance came into force in England allowing care home residents to go on low-risk trips without having to self-isolate for 14 days when they return.

  In Scotland, care home residents are allowed to choose two people to visit indoors once a week, while in Wales, indoor care home visits are allowed for two visitors.

  From Friday in Northern Ireland, care home visits are being increased from one to two a week - each lasting for one hour.
