title: 'Chad Allford: Police used ''reasonable'' force before man''s cocaine death
  - BBC News'
date: '2024-10-25'
section: Derby
url: http://www.bbc.co.uk/news/articles/c93qpkg7qjko
content: |-
  Chad Allford, 23, died after accidentally ingesting cocaine when a bag "exploded" in his mouth.

  The police watchdog launched an investigation after Chad Allford died in hospital following a drugs raid

  Police officers used reasonable force in restraining a man who died after accidentally ingesting cocaine when a bag "exploded" in his mouth, a watchdog has found. Chad Allford, 23, lost consciousness shortly after being arrested on suspicion of drugs offences at his partner's house in Morewood Drive, Alfreton, Derbyshire, on 27 October 2021. An inquest jury ruled that his death was a result of misadventure, adding that he died due to the effects of cocaine consumption. Now the Independent Office for Police Conduct (IOPC) has said it found "no evidence" that officers caused or contributed to his death.

  The IOPC said its inquiry followed a mandatory referral from Derbyshire Police after Mr Allford's death, and a subsequent complaint about officers' use of force during the incident. It added that while officers used reasonable force in restraining Mr Allford, and trying to prevent him swallowing drugs, it did "provide feedback" around the performance of three constables.

  The Independent Office for Police Conduct (IOPC) received a referral from Derbyshire Police and a complaint from a member of the public

  The police watchdog found the officers, which the inquest heard did not activate their bodyworn cameras before they entered the house to arrest Mr Allford, "had not complied with police policy". Its report also highlighted that a sergeant, who had conducted a stop search on a third party, had asked for and taken keys to access the property "without fully communicating to them their rights". IOPC regional officer Derrick Campbell said: "When someone dies either during or following detention, it is important that the circumstances are thoroughly and independently investigated. "From the evidence we gathered, we were satisfied that the force used by officers in trying to arrest and restrain Mr Allford, was necessary, reasonable and proportionate in the circumstances, as was the force used to try to prevent him from ingesting what were believed to be class A drugs."

  The IOPC said the actions of the three officers who did not switch on their cameras would be "addressed through the reflective practice review process". It said the sergeant who conducted the stop search "should undergo reflective practice". On Thursday, coroner Susan Evans said she would write a prevention of future deaths report to Derbyshire Police about the level of knowledge officers needed in similar situations. A spokesperson for the force said: "Our thoughts remain with all those affected by Mr Allford's death - in particular his family and friends. "While the IOPC did find performance issues in relation to the activation of bodyworn video cameras, as well as the stop and search of another individual unrelated to the drugs investigation, none of these points impacted on the circumstances that led to Mr Allford's death. "We will now take the time to carefully consider the outcome of the inquest, along with the prevention of future deaths report when it is received, and make any necessary changes or improvements."

