  Fianna Fáil TD for Cavan-Monaghan Brendan Smith also said it was "unacceptable" that "citizens in Northern Ireland" could not access RTÉ's news programmes. "As a public service broadcaster, RTÉ has a duty to provide comprehensive news coverage to all people across Ireland, regardless of geographical location," he said. Mr Smith called on RTÉ to "address this issue urgently and to communicate their plans for ensuring full accessibility across all 32 counties".
