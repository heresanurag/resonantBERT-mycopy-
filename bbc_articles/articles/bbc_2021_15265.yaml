content: |-
  Eight Championship matches and 16 other EFL games on 26 December are called off because of positive Covid-19 cases.

  Last updated on .From the section Football

  Eight Championship games on 26 December and 16 more across the EFL have been called off because of Covid-19 cases.

  Hull City v Blackburn was postponed hours before it was due to kick off, while games at Cardiff, Millwall, Fulham, Stoke, Peterborough, Preston and Luton had already been postponed.

  Seven games in League One and nine in League Two have also been called off.

  The EFL has confirmed league, Carabao Cup and Papa John's Trophy games can continue "where safe to do so".

  Only two of the scheduled 10 Championship matches on Boxing Day remain on, while five games in the National League have also been postponed.

  Several EFL fixtures on 29 and 30 December have also been postponed.

  League Two leaders Forest Green head the list of six games called off in the fourth tier on 26 December with their trip to Newport off. Their home game against Exeter on 29 December is also postponed.

  Bristol Rovers v Sutton United, Northampton Town v Walsall, Bradford City v Harrogate, Stevenage v Crawley Town, Exeter City v Swindon Town, Leyton Orient v Colchester, Port Vale v Salford and Carlisle v Rochdale are all postponed on Boxing Day.

  Swansea's Championship match against Luton, which was due to be on 29 December, has been called off due to Covid-19 cases in the Swans squad. Birmingham's game with Peterborough has also been postponed with cases among the home side's ranks.

  Bradford's match against Walsall on 29 December is one of three in the division off on that day.

  The League One match between Bolton and Morecambe became the first Boxing Day fixture in the division to be called off on Tuesday - with the Trotters since suspending training until 27 December as 14 players, and manager Ian Evatt, have tested positive for coronavirus - while Portsmouth against Oxford United is also off.

  Sheffield Wednesday against Burton Albion, Wycombe versus Cambridge United, Gillingham against Ipswich, AFC Wimbledon against Charlton Athletic and Crewe versus Wigan are all postponed.

  Cambridge's home game against Doncaster on 30 December is also off.
