title: 'Coronavirus: People making a difference in lockdown - BBC News'
date: '2020-05-18'
section: England
url: http://www.bbc.co.uk/news/live/uk-england-52622273
content: |-
  BBC News brings you a day of live coverage focusing on the positive stories at this challenging time.

  We've been asking you to nominate your lockdown heroes and Maria Walton, from Ilkley, has been in touch to tell us how Claudia Jayne Chesworth's workouts have motivated her.

  Claudia, 19, from Shropshire, came up with a 14-day workout for her family and friends to follow on facebook live.

  But it proved so popular she's kept it up for the last six weeks and has up to 100 people joining in each day from as far afield as Australia and India.

  "I had such great feedback that I decided to open it up to everyone," she said. "We work as a team, everyone supporting each other and there's loads of positivity in the group."

  Maria said: "I have been in isolation in Spain for two months under very strict conditions.

  "Last week was my first time I was allowed out to walk or run for one hour so it’s been very hard mentally. It was too late for my daughters to travel to be with me.

  "I started putting Claudia’s live on to motivate myself to do my workout. She has a natural power that when you really don’t want to do anything that day you just do it which I find extraordinary.

  "She's shared this unique gift to help so many people feel happy and proud of their achievements through this very difficult time. I never want it to stop."
