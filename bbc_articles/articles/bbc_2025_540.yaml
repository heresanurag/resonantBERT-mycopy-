title: Man arrested after 'serious incident' in Stoneybatter area of north Dublin
  - BBC News
date: '2025-02-10'
section: Europe
url: http://www.bbc.co.uk/news/articles/c9d527zg38xo
content: |-
  He was arrested in the Stoneybatter area of the city on Sunday and is currently being detained.

  Man arrested after 'serious incident' in north Dublin

  Gardaí at the scene of the incident in Stoneybatter

  A man has been arrested after three men were injured in a suspected knife attack in Stoneybatter in north Dublin. Irish police said they were called to a "serious incident" on Sunday afternoon, described by Justice Minister Jim O'Callaghan as a "random attack". Two men are described as having serious but not life-threatening injuries, while the third person suffered a less serious injury. The men who are aged from mid-20s to mid-40s have been taken to hospital for treatment, police said. Irish state broadcaster RTÉ News is reporting that those injured suffered "slashing type injuries".

  Micheál Martin wished all those injured a "full recovery" and urged anyone with any information to contact police

  Taoiseach (Irish prime minister) Micheál Martin wished those injured in the "shocking attacks" in Dublin a "full recovery". In a statement on X, he said: "Our thoughts are with the victims of the shocking attacks in Stoneybatter earlier today. "I want to pay tribute to the Gardaí [Irish police] and emergency services for their prompt response. "I wish all those injured a full recovery and urge anyone with any information to contact Gardaí." Sinn Féin president and local TD (member of parliament) Mary Lou McDonald said in a post on X: "My thoughts are with those injured and their families. The community is in a state of shock. "The Gardaí and emergency services are to be commended for their response."

  The man, in his late 20s, was initially detained close to the scene of the incident by an unarmed uniformed police officer. There was a large police presence in the area while emergency teams responded to the incident, which is thought to have happened across several streets in the Arbour Hill area of Stoneybatter. Local Fine Gael councillor Ray McAdam told the PA news agency that residents were told to lock their doors and stay inside during the incident. He said there was a "level of shock, a level of concern" in the community but the "overriding sense here in Stoneybatter is one of hope that those who have been impacted and injured will make a swift recovery". Residents had been reassured by the quick police response, he added. Police said they are continuing to investigate all the circumstances of what happened and added that a number of scenes are still in place in the area. Officers earlier said that there was no ongoing risk to the public. They have also appealed for any witnesses to come forward, in particular those in the area between 14:30 and 15:30 local time who may have relevant video footage.
