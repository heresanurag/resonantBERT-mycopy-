content: |-
  At least 10% of every country's population should be vaccinated by September, Dr Tedros Adhanom Ghebreyesus says.

  Under 30s in Scotland can register for vaccine text alerts

  There's good news for people aged 18 to 29 in Scotland - although they can't yet book their vaccine, they can register to receive details of jab dates by text or email, rather than by letter. Vaccinations for that age group - the final one - are expected to begin in mid-June, but a two-week registration period is now open. It means 18 to 29-year-olds will receive digital alerts so they don't miss an invitation to book. Registration is not compulsory and people who don't sign up will still get a vaccine appointment offered through the post, as long as their GP details are up to date. Scottish First Minister Nicola Sturgeon is urging people to sign up, tweeting: "Please do - it is the best way to protect yourself and others, and get us all back on the path to normality." The announcement comes after about half of people due to get a Covid jab at one of Scotland's largest vaccination centres failed to turn up in recent days, said BBC Scotland's Connor Gillies. It's believed a considerable number of no shows were recorded at the Hydro in Glasgow, on both Saturday and Sunday. Between 4,000 and 10,000 vaccinations can be administered there each day. To find out when you're expected to get the jab, head here.
