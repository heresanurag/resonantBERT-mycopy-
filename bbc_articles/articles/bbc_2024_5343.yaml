content: |-
  Video shows the iconic London landmark getting a lick of paint in time for the new season.

  One of London's most famous landmarks is getting a face-lift in time for spring.

  BBC reporter John Maguire joined an access specialist team to abseil down the Ferris wheel and give it a fresh coat of paint.

  The full paint refresh, which takes place every three years, requires an estimated 5,000 litres to cover the whole of the 135-metre high structure.
