  How much attention did you pay to what's being going on in the world this week?

  This week saw Ukraine mount an audacious drone attack on Russian airfields, Donald Trump ban people in 12 countries from travelling to the US, while Billie Piper returned to Doctor Who. But how much attention did you pay to what else happened in the world?

  Fancy testing your memory? Try last week's quiz, or have a go at something from the archives.
