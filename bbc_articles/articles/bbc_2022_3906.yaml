title: 'Ukraine war: Boris Johnson sparks fury after comparison to Brexit - BBC News'
date: '2022-03-19'
section: UK Politics
url: http://www.bbc.co.uk/news/uk-politics-60809454
content: |-
  But chancellor Rishi Sunak says it was "general observations about freedom", not a direct comparison.

