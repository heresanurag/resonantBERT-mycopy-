title: 'Plymouth crash: Young girl and woman die after being hit by car - BBC News'
date: '2024-03-25'
section: Devon
url: http://www.bbc.co.uk/news/uk-england-devon-68650043
content: |-
  Police say they sustained serious injuries and were taken to hospital, but later died.

  Police have cordoned off a section of Victoria Road in Plymouth

  A young girl and a woman have died after being hit by a car in Plymouth.

  The collision happened on Victoria Road, St Budeaux, at about 09:45 GMT, Devon and Cornwall Police said.

  They sustained serious injuries and were taken to hospital but later died, the force added.

  Police said a 74-year-old woman had been arrested on suspicion of causing death by careless driving, and of driving while unfit through drink or drugs.

  The woman, from Plymouth, remains in custody.

  The road has been closed and officers are carrying out investigations at the scene.

  South Western Ambulance Service said it sent three ambulances, two air ambulances and a rapid response vehicle to the area.

