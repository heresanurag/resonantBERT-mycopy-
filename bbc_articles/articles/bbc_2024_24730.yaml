  Tampa Mayor Jane Castor has voiced relief that her city has not seen the type of storm surge that was feared. But the region saw destruction. In nearby St Petersburg, the Major League Baseball stadium that is home to the Tampa Bay Rays was severely damaged. Wind tore apart the stadium's dome, which shines bright orange when the team wins a home game. A crane also broke apart and collapsed in the middle of downtown St Petersburg, crashing into high rises as the storm blew through. Castor and other officials have spent days urging people in Milton's path to flee their homes or risk death.

