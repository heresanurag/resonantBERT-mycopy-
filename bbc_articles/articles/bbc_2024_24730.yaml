  On Florida's west coast, Maria Bowman, 60, hunkered down in her bright pink mobile home in North Fort Myers to ride out Milton's fierce winds. Her home, 600m from the Caloosahatchee River and at risk of storm surge, was in Evacuation Zone A - the category for the most at-risk areas. She felt her home rattle as Milton came ashore. Her power cut out around 22:00. “It sounded like an explosion,” she told BBC News. “Boom. No electricity.” Ms Bowman, who says she's dealt with numerous hurricanes, says she's ready to leave the state. “It’s too many hurricanes,” she said. “One day you survive it, the next time no. Who knows.” Gov DeSantis warned that flooding remained possible in the coming days. He noted the death toll could continue to rise as the impact of the storm becomes more clear.

