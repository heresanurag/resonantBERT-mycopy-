  Milton made landfall as a category three hurricane on Wednesday evening local time, bringing 124mph (200km/h) winds. Earlier in its life, it was categorised more than once as a category five hurricane - which denotes the most powerful type of storm. The arrival of Milton comes two weeks after the south-eastern US was pummelled by Hurricane Helene, which killed more than 200 people and left many more missing. Clean-up operations are ongoing. Milton, which later diminished into a post-tropical cyclone, travelled onwards over the Atlantic Ocean, north of the Bahamas.

