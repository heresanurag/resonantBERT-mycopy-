title: Rain brings bushfire relief to parts of Australia - BBC News
date: '2020-01-18'
section: General
url: http://www.bbc.co.uk/news/world-australia-51161978
content: |-
  Storms hit parts of Australia's east coast, dousing some fires and giving inhabitants some respite.

  Parts of Australia's east coast have been hit by heavy rain and thunderstorms, dousing some bushfires but also bringing the threat of flooding.

  Some, such as this thirsty koala, have been making the most of the wet conditions.

  Read more: Storms lash some of Australia's fire-hit regions
