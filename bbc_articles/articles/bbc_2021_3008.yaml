title: Huge fire sweeps through Rohingya camp in Bangladesh - BBC News
date: '2021-03-22'
section: General
url: http://www.bbc.co.uk/news/56490348
content: |-
  A huge fire has engulfed a Rohingya camp in Cox's Bazar, destroying shelters and health centres.

  Several people have been killed and tens of thousands have fled the fire.

  The settlement is part of a network of camps in mainland Bangladesh, home to over a million refugees who have fled Myanmar since 2017.
