title: 'Ukraine war: Zelensky tells Moscow ''it''s time to talk'' - BBC News'
date: '2022-03-19'
section: General
url: http://www.bbc.co.uk/news/world-europe-60805271
content: |-
  The Ukrainian president's appeal comes as fierce fighting continues, 23 days after Russia launched its full-scale invasion.

  Ukrainian President Volodymyr Zelensky has called on Russia to meet for talks, saying it was time to restore "territorial integrity and justice" for Ukraine.

  His appeal appeal came as fierce fighting continued, 23 days after Russia launched its full-scale invasion.
