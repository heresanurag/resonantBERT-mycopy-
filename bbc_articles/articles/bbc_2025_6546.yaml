title: 'Newspaper headlines: ''Victory for women'' and ''equity policies in chaos''
  - BBC News'
date: '2025-04-16'
section: The Papers
url: http://www.bbc.co.uk/news/articles/czd3jg60q4no
content: |-
  Thursday's front pages lead on the Supreme Court's ruling that a woman is defined by biological sex under equalities law.

  'Victory for women' and 'equality policies in chaos'

  Many front pages carry a photo of the two co-directors of For Women Scotland - who brought the case - smiling broadly, with their hands in the air

  The Supreme Court's ruling that women are defined by their biological sex dominates the front pages. "Trans women are not women" is the Daily Telegraph's, external headline as it says access to single-sex NHS wards is likely to change. The Daily Mail, external hails the ruling as a "victory...for common sense". The Times, external says equality policies are now "in chaos", reporting that every organisation in England, Scotland and Wales - from hospitals to prisons and businesses - will have to review their policies. For the Daily Express, external author JK Rowling praises the "extraordinary women" that won the legal battle in the Supreme Court.

  The Guardian, external notes that trans women still have equal pay rights as women, and could have the right to be treated as women in some situations. It says campaigners are urging trans people to remain calm. But it also quotes Victoria McCloud who was Britain's first trans-gender judge as saying the ruling would mark the start of a "more intense fight for rights". The discovery from scientists at the University of Cambridge that there are signs of life on a distant planet makes the front page of the Sun, external. The paper quotes a professor who is part of the team who detected traces of a molecule which is produced by plankton on Earth as saying that, "there is no mechanism that can explain what we are seeing, without life". The lead in the Daily Mirror, external is what the paper describes as the "extraordinary gesture" by the mother of Jean Charles de Menezes - who says that she has forgiven the police who shot her innocent son 20 years ago after what it said was a "botched terror operation" at Stockwell underground station. In an interview with the paper Maria de Menezes - who is now 80 - told the Mirror she did not want her final years to be "destroyed by hatred". The Metropolitan police said the shooting was a "matter of deep regret". Finally, the Daily Star, external says that sunburnt cavemen saved themselves by using "prehistoric sunscreen" more than 40,000 years ago.

