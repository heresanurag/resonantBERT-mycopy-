title: Christopher and Amanda Fulton convicted of child cruelty - BBC News
date: '2024-10-10'
section: Northern Ireland
url: http://www.bbc.co.uk/news/articles/c62g4wnelvqo
content: |-
  A couple are found guilty over an assault which left a young boy blind and brain damaged.

  Couple convicted of child cruelty after assault on boy

  Amanda and Christopher Fulton are set to be sentenced in December

  A north Antrim couple have been convicted over an assault which left a young boy blind and with brain damage. Amanda and Christopher Fulton, who are both 35 and from Rockfield Gardens in Mosside near Ballymoney in County Antrim appeared at Newry Crown Court on Wednesday. A jury found Chris Fulton guilty of inflicting grievous bodily harm (GBH) with intent and two charges of child cruelty by wilfully neglecting the young victim. Amanda Fulton was acquitted of GBH with intent and one charge of child cruelty, but unanimously convicted of causing or allowing the child to suffer significant physical harm and a further charge of child cruelty in relation to wilful neglect.

  Judge Peter Irvine KC told the jury the trial had been "very harrowing, I have no doubt, for everyone concerned having to hear the evidence in this case". The jury heard how the child was unresponsive on 7 November 2019. When the boy was seen by a GP later that day, it was obvious to him that “he was a very sick chid". Initially he was taken by ambulance to the Causeway Hospital where a scan uncovered a significant head injury and he was taken to the Royal Belfast Hospital for Sick Children where the extent of his injuries became clear. These included a fractured skull with associated bleeding to the brain and retinal bleeding; 27 rib fractures; fractures to both thigh bones; fractures to both shin bones; fractured wrist and a lacerated liver.

  Amanda Fulton was convicted of causing or allowing the child to suffer significant physical harm

  The jury heard evidence from numerous medical expert witnesses describing the injuries suffered by the child as “severe and significant” and said they were so serious that he would have died without medical intervention. Bail was refused in both cases. They will be sentenced in December.
