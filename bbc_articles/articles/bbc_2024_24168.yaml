  Paying tribute, Ms Morgan said in a statement that her predecessor had made "a truly historic contribution to Wales in some of the toughest of circumstances". "From helping to steer Wales through the pandemic and delivering one of the fastest vaccine rollouts on the planet to landing major investment in our semiconductor industry," she said. "Vaughan has delivered time and again and has advanced the cause of devolution in Wales. "He has always been a team player who has shown me and others kindness and support even at times of enormous pressure in the roles he has carried out for the people of Wales. "I know that Vaughan will go on to make important contributions to our country in the years ahead."

  Eluned Morgan, pictured with Labour leader Sir Keir Starmer, succeeded Vaughan Gething as first minister in August

  Mr Gething worked as a lawyer before he was first elected to the National Assembly for Wales, as it was called then, to represent Cardiff South and Penarth in 2011. He rose through the ranks from backbencher to cabinet member, as it was as Welsh health minister that Mr Gething made the biggest impression, as the Covid pandemic threw unprecedented attention on the Welsh government and increased his profile as a politician. Mr Gething became the first minister of Wales on 20 March 2024, but his campaign itself was marred by controversy over his acceptance of a £200,000 donation from a firm owned by a man previously convicted of environmental offences. Mr Gething insisted that he followed the rules around campaign donations.

  Vaughan Gething marked the 25th anniversary of the Senedd in July, just days before stepping down as first minister

  In May, Mr Gething sacked one of his cabinet ministers - Hannah Blythyn - after messages from the Covid pandemic were leaked to the website Nation.Cymru. The leaked messages showed Mr Gething claiming he would delete all correspondence from an iMessage group of Welsh ministers. But Ms Blythyn denied that she was the source of the leak and Nation.Cymru later said she was not the source of the information. Mr Gething then said that the leaks “could only have been of one member’s phone”. He provided no evidence publicly to support his claim at the time, saying he would “rather not go through this detail in public”. In July, under pressure to produce evidence to support the sacking of Ms Blythyn, the Welsh government published the unredacted messages from two different copies of the group chat. Mr Gething also faced questions from MS and the leaked messages were sent to the Covid inquiry.

  Later in May, Plaid Cymru ended its co-operation deal with Labour in the Senedd, after Plaid's leader Rhun ap Iorwerth said he was "deeply concerned" about the donations Mr Gething had accepted during his leadership campaign. In June, Mr Gething lost a vote of no confidence in the Senedd - when two Labour members were off sick - but insisted he would not resign. Four members of the Welsh government's cabinet resigned at the same time in July, calling for Mr Gething to go. He responded with a statement confirming that he was stepping down as first minister. "It has been the honour of my life to do this job even for a few short months," he said.
