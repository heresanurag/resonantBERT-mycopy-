title: Vaughan Gething to stand down from Welsh Parliament at election - BBC News
date: '2024-09-07'
section: Wales
url: http://www.bbc.co.uk/news/articles/c0k4le21y08o
content: |-
  The ex-first minister told local Labour party members he will not stand for re-election to the Senedd.

  Vaughan Gething says he will leave Welsh Parliament

  Vaughan Gething made history in March when he became the first black man to be elected Welsh Labour leader

  Former first minister of Wales Vaughan Gething has announced he will not be standing for re-election in 2026. In July he stepped down from the top job just four months after getting it. Mr Gething had been embroiled in controversy since taking over in March, and was dogged by questions over a £200,000 campaign donation from a businessman convicted of environmental offences. Eluned Morgan, who succeeded Mr Gething as first minister, paid tribute to him saying he had made a "truly historic contribution to Wales".

  Mr Gething told members of Cardiff and Penarth Labour party on Saturday he will not stand again before he shared a statement on social media. The Senedd member for Cardiff South and Penarth said: "As a Welshman born in Zambia it has been a great honour to serve in the Welsh government for over a decade. "The opportunity to make a difference alongside inspiring people and movements, determined to make change happen, is a special privilege. "One I will always be grateful for and proud of." He said he had spoken to First Minister Eluned Morgan to confirm he would not be seeking a role in government and would support her from the back benches.

