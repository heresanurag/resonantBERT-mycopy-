content: |-
  Macy and Maya put Carol Vorderman's maths to the test on the Pride of Britain red carpet.

  "If you're really good at maths, can you answer this?"

  The tough questions on the red carpet unexpectedly came from Rob Burrow's daughters, Macy and Maya.

  Countdown extraordinaire Carol Vorderman was put on the spot by the duo ahead of the Pride of Britain awards.

  Watch to see how she handled the tricky sum.
