title: Heaven nightclub closed after security guard charged with rape - BBC News
date: '2024-11-15'
section: London
url: http://www.bbc.co.uk/news/articles/c4gz0ygmyl3o
content: |-
  The popular London club has been closed on public safety grounds, say police.

  Popular London nightclub Heaven has been closed on public safety grounds after a rape was reported, the Metropolitan Police said. The force successfully applied to Westminster Council to suspend the licence of the Villiers Street venue until a full hearing can take place. In an initial hearing on Friday, the council was told a woman was allegedly raped in the vicinity of the venue by a member of security staff on 1 November. The Met said a member of security staff was arrested and charged with rape, and is on remand in prison. The suspension will take effect immediately, the Met said, meaning Heaven will be closed from Friday night onwards.

  The hearing was told that when the woman tried to report the attack, other staff allegedly ignored her. A council spokesperson said: “Following a request from the Metropolitan Police, and considering evidence from both the police and the operator, the council’s licensing committee has decided to suspend Heaven’s licence for 28 days. “We recognise this venue’s cultural significance but the committee agreed this step is necessary to prevent serious crime and protect the public. “A full licensing hearing will be held in December where both the police and venue management will have the opportunity to present new evidence. "This case is currently subject of an ongoing police investigation, and we are unable to comment further at this stage." Heaven posted on Instagram to say: "We are sickened by this allegation but can't comment as it is an on going criminal investigation. We can only send out thoughts to the alleged victim."
