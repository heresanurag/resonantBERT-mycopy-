title: Cyclone Fani lashes India's eastern coast - BBC News
date: '2019-05-04'
section: General
url: http://www.bbc.co.uk/news/world-asia-india-48145715
content: |-
  Torrential rain and powerful winds of up to 200 km/h (125mph) cause widespread disruption.

  Cyclone Fani has slammed into India's eastern coastline. More than a million people have been evacuated from the state of Orissa, also known as Odisha.
