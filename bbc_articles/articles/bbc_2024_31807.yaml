title: Arrest after man killed in hit-and-run in Carmarthenshire - BBC News
date: '2024-12-24'
section: Wales
url: http://www.bbc.co.uk/news/articles/c80v178p0gzo
content: |-
  Dyfed-Powys Police say they have located the vehicle believed to be involved in the incident.

  Aaron Jones was killed in an alleged hit-and-run incident while walking his dog

  A 27-year-old man has been arrested after another man was killed in an alleged hit-and-run while walking his dog. The victim, who has been named as 38-year-old Aaron Jones, of Llanpumsaint, Carmarthenshire, was hit by a car near Caer Salem Baptist Chapel between 18:45 GMT and 19:45 on Monday. Dyfed-Powys Police have arrested a man on on suspicion of causing death by dangerous driving He has also been arrested on suspicion on failing to stop for a collision and failing to report a collision.

  Aaron Jones was hit at about 18:45 GMT on Monday near the Caer Salem Baptist Chapel in Carmarthenshire

  Officers have said they have located the vehicle believed to be involved in the incident following a manhunt. They added that the road remained closed and residents would see an increased police presence in the area while the investigation continues. The force said it was still appealing for anyone with dashcam or CCTV footage to get in touch.

  Councillor Bryan Davies, who represents the village on Carmarthenshire county council said the community was in mourning and described the death as "tragic". Llanpumsaint Park posted on Facebook it has cancelled its Santa Parade and extended its "deepest sympathies" to the family and community.
