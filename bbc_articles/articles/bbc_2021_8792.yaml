title: 'Malcolm Turnbull: Australia ex-PM says vaccine rollout ''a colossal failure''
  - BBC News'
date: '2021-07-27'
section: General
url: http://www.bbc.co.uk/news/world-australia-57980530
content: |-
  Ex-PM Malcolm Turnbull tells the BBC he believes Australia's borders won't reopen until early 2022.

  Former Australian PM Malcolm Turnbull tells the BBC that his nation's vaccine rollout is "the biggest failure of public administration I can recall".
