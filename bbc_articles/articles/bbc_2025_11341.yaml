title: 'Ibrahima Seck: Boys appear in court after 14-year-old stab death - BBC News'
date: '2025-06-11'
section: Manchester
url: http://www.bbc.co.uk/news/articles/c1kvxvj4d2wo
content: |-
  Ibrahima Seck had been on his way to play football with his friends and brothers, a court hears.

  Ibrahima Seck, 14, died after being stabbed outside a pub

  Three teenagers have appeared in court charged with murdering a 14-year-old boy who was stabbed while on his way to play football. Ibrahima Seck died in hospital from a single stab wound after he was allegedly attacked by the youths in New Moston at about 17:00 BST on Sunday, Manchester Youth Court heard. The prosecution said Ibrahima had been walking with his brothers and friends to a nearby park. The three accused boys - two aged 14 and the other 16 - have also been charged with murder and possessing a bladed article.

  The court heard that, after he had been stabbed, Ibrahima ran to a nearby house. Despite the efforts of emergency services and staff from an air ambulance, he was pronounced dead in hospital less than an hour later. Two of the accused boys, one aged 14 and the 16-year-old, appeared in the dock in brief hearings.

  Both gave their names and addresses, and the younger boy, wearing a grey tracksuit, had his aunt and uncle in court, sitting alongside lawyers. The older boy, who had his mother and a social worker in court, wore a blue tracksuit. The third youth, wearing a grey tracksuit, was then brought into the dock. His mother and father also attended the hearing. The three boys, who cannot be named for legal reasons due to their age, were all remanded into secure youth custody. They will next appear at Manchester Crown Court on Thursday.

  Ibrahima Seck's head teacher said he "brought joy to students and staff alike"

  Greater Manchester Police said a 37-year-old woman and a 14-year-old girl - both arrested on suspicion of assisting an offender - had been released on bail pending further inquiries. Speaking before the boys' court appearances, Det Ch Insp Tony Platten said: "The last 48 hours has seen an extensive amount of police work, which has seen multiple officers working to help get the answers Ibrahima's family deserve. "Now that we have secured three charges, a new level of proceedings is active, and we will continue to work on our investigation as this progresses. "Ibrahima's family remain at the forefront of our minds and we will be remaining in close contact with them throughout the process." Ibrahima's parents paid tribute to him as a "well-liked young boy" who was "funny, caring and hard-working".

  The 14-year-old was a pupil at Greater Manchester Independent School. Its executive head teacher Louise Hodson described Ibrahima as "a lively, intelligent and engaging young man whose presence lit up every room". She said his "creativity shone particularly brightly in drama lessons and on excursions for The Duke of Edinburgh Award" and that the teenager was also "immensely proud" of his 100% attendance record. Ms Hodson added: "Ibrahima was a happy, compassionate young person, loved by everyone who knew him, and his absence leaves a huge hole in our school community, and he will be missed more than words can say." Officers have continued to appeal for doorbell or dashcam footage and eye-witness accounts from anyone who was in the area at the time.

