  Here's what our main takeaways are from the long-awaited trailer for the gaming blockbuster.

  A trailer for Grand Theft Auto VI has finally been released by game developer Rockstar, after a low-quality copy leaked online.

  BBC Technology reporter Tom Gerken has broken down the trailer to see what the game could have to offer, including the first female protagonist in the franchise since the 1990s.
