title: Giant sketch in field marks Picasso death anniversary - BBC News
date: '2023-04-08'
section: General
url: http://www.bbc.co.uk/news/world-europe-65223575
content: |-
  Dario Gambarin used a tractor to create the portrait on wasteland in Italy.

  Italian land artist Dario Gambarin has used a tractor to create a portrait of Pablo Picasso on wasteland in Castagnaro, Verona.

  Gambarin said he was inspired by Picasso's 1907 self-portrait to create what he says is the largest portrait of the Spanish artist in the world.
