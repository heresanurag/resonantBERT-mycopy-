title: 'In pictures: Donald Trump''s first day in Ireland - BBC News'
date: '2019-06-06'
section: Europe
url: http://www.bbc.co.uk/news/world-europe-48536883
content: |-
  Planes, protests. pints and performances as Mr Trump makes his first Irish trip since taking office.

  Donald Trump has visited the Republic of Ireland for the first time since he became president of the United States.

  He arrived at Shannon Airport in County Clare at about 16:45 local time and held a short meeting with Taoiseach (Irish Prime Minister) Leo Varadkar.

  The pair discussed Brexit and the Irish border, corporation tax and Irish-American trade links.

  Mr Trump then travelled by helicopter to nearby Doonbeg to stay at his golf resort which he purchased in 2014.

  Security was tight as Air Force One touched down at Shannon Airport

  The Trumps arrived on Air Force One in Ireland at about 16:45 local time

  Leo Varadkar welcomed Donald and Melania Trump to Ireland on the tarmac at Shannon Airport

  Donald and Melania Trump signed the visitors book at Shannon Airport

  The president and taoiseach spoke to reporters before holding a private meeting

  Crowds gathered to try and get a glimpse of the American president

  Supporters of the American president came to see his arrival

  Anti-Trump protesters demonstrated against his visit with placards and banners

  Some protesters criticised the US president's stance on climate change and human rights

  The Trumps travelled from Shannon to Doonbeg in the president's helicopter, Marine One

  Gardaí (Irish police) stood guard in Doonbeg as the village awaited the famous guest

  Irish soldiers search fields as part of a security operation near the entrance to Mr Trump's golf resort

  Some Doonbeg residents waved US flags to show their support for the president

  The County Clare village put on a show for their American guests

  Donald Trump's sons, Donald Jr (left), and Eric Trump (right), got behind the bar in Doonbeg

  US First Lady, Melania Trump, meets Irish dancers at a welcome function

  Melania Trump spoke to performers and musicians during her visit to County Clare
