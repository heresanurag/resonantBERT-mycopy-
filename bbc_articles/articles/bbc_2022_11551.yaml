title: 'Labour conference: National anthem sung in tribute to Queen - BBC News'
date: '2022-09-25'
section: General
url: http://www.bbc.co.uk/news/uk-politics-63028128
content: |-
  The national anthem has been sung at Labour conference for the first time in recent memory.

  Labour leader Keir Starmer has led a tribute to the late Queen, with the national anthem sung at the party conference for the first time in recent memory.

  Meanwhile, on the fringes, members are debating the future of the monarchy.
