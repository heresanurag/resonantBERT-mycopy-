  According to Tiffany, Drake's appearance on The Rap Show was all his idea.

  And for a taste of what's to come, she revealed that touring with Drake is like "touring with your nan", when speaking to Greg James on Radio 1 Breakfast.

  "There's nobody else on the planet you'd probably want to tour with.

  "Me and Nick Grimshaw were talking about it the other day, it's like all these fancy candles and pinot grigio. It's like touring with your nan. It's great."

