  Applause heard as Zelensky arrives for Pope Francis' funeral

  Applause was heard as Ukrainian President Volodymyr Zelensky arrived for the Pope's funeral in St Peter's Square.

  President Zelensky was among dozens of leaders and dignitaries - including Donald Trump and Prince William - who joined 40,000 mourners in St Peter's Square.
