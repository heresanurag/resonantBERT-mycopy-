  Poppy McIlroy could barely watch earlier in the round as her dad Rory lined up a putt

  But then she showed them all how to do it on the ninth green, leading to huge celebrations by her dad and Shane Lowry

  The McIlroys were having fun with the Lowrys and Fleetwoods on a sun-drenched Wednesday at Augusta National

  It's all about family in Wednesday's Par 3 Contest at the Masters as the players get to relax with their loved ones

  Scottie Scheffler's son Bennett is enjoying his first trip to the Masters, in the company of Sam Burns' son Bear

  World number one and defending champion Scheffler was certainly getting into the relaxed mood of the day on the eve of the 89th staging of the Masters

  Three more of Europe's Ryder Cup stars teamed up, with Tyrrell Hatton, Bob MacIntyre and Viktor Hovland enjoying a fun couple of hours

  Belgium's Thomas Detry is making his Masters debut this year and said playing the Par 3 Contest with his family made him "feel like a winner already"

  US Ryder Cup captain Keegan Bradley hit one of three holes in one in this year's competition - Tom Hoge and Brooks Koepka were the others - and was also celebrating a putt holed by one of his sons
