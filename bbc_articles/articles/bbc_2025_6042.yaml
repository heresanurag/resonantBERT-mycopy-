title: 'Masters 2025: Par 3 Contest at Augusta National ''cool and unique'' says Jon
  Rahm - BBC Sport'
date: '2025-04-10'
section: Golf
url: http://www.bbc.co.uk/sport/golf/articles/c62zzn3g14qo
content: |-
  The players are in relaxed mood on the eve of the Masters as they tackle the Par 3 Contest with their wives, girlfriends and children.

  This video can not be played To play this video you need to enable JavaScript in your browser.

  Rory McIlroy's four-year-old daughter Poppy holed a 25-foot putt in the Par 3 Contest to steal the show on the eve of the Masters at Augusta National. But while Rory, Shane Lowry and the patrons around the ninth green celebrated the putt as though she'd won the Green Jacket, Poppy was less enamoured and just wanted a comforting hug from dad. Another scene that epitomised the carefree feeling of what Jon Rahm called "the coolest thing we do in professional sport" came when the Spaniard's son Kepa almost kicked the ball into a hole from 30 feet. He'd been a little bored while his mic'd up dad had been talking to the media, so decided he'd try a bit of football before Jon encouraged him to go for goal. "It's so unique and the kids embrace it more and more each year as they get older," added Rahm as the youngster launched himself at his dad. There were three holes in one - US Ryder Cup captain Keegan Bradley jumped for joy alongside his two sons after sinking his tee shot on the sixth. Brooks Koepka later matched him on the same hole, while Tom Hoge aced the fourth. "It was up there with my favourite moments of my golf career, maybe even my life," said Bradley. "It was really fun to be there with my family. It was special. I'll never forget that ever."

  This video can not be played To play this video you need to enable JavaScript in your browser.

  Colombia's Nicolas Echavarria and American JJ Spaun - beaten by McIlroy in the Players Championship play-off last month - finished top of the leaderboard on five under par. But Spaun suffered more misery in a play-off as the 30-year-old Echavarria took the honours. It's a position that would appear to be cursed given no player has gone on to win the Masters in the same year as winning the Par 3 Contest, which was first played in 1960. The score and the competition doesn't matter for most. Spending quality time with friends and family is what Wednesday afternoon at the Masters is all about. England's Aaron Rai was made to carry his own bag from tee to green after his caddie hit the putting surface with her tee shot, while he ended up in the rough. "We're waiting nine months from the last major so to end your preparations with such a fun afternoon is great," said McIlroy. "If you're not ready by now, you don't have a chance. Let's have fun, go home, have dinner and rest and relax for Thursday."

