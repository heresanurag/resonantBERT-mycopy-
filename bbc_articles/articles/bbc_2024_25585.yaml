title: 'Shoreham: Police shoot man with baton rounds after knife reports - BBC News'
date: '2024-10-19'
section: Sussex
url: http://www.bbc.co.uk/news/articles/c4g51v4p2weo
content: |-
  A 36-year-old man from Shoreham is arrested on suspicion of possessing a weapon in a public place.

  A 36-year-old man was taken to hospital and has since been arrested

  Officers shot baton rounds at a man reported to have been "acting erratically with a knife" in West Sussex, police have confirmed. Sussex Police said officers first used a taser and a "distraction device" when they arrived at the scene in Kingsland Close, Shoreham, at about 23:25 BST on Friday. They then fired attenuating energy projectiles, known as baton rounds, at the 36-year-old man, who was taken to hospital, said the force. The man has since been arrested on suspicion of possessing a weapon in a public place and remains in police custody.

  Baton rounds are used as an alternative to traditional bullets as they are "less lethal", according to the College of Policing. A spokesperson for Sussex Police said a knife was recovered from the scene and no-one but the man was injured. The force added that there would be an increased number of officers in the area while their enquiries continues.

