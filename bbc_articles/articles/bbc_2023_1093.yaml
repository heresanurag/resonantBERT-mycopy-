title: 'Wales rugby: Former women''s boss says colleague made rape jibe - BBC News'
date: '2023-01-23'
section: General
url: http://www.bbc.co.uk/news/uk-wales-64353716
content: |-
  The former head of Welsh women's rugby claims a male colleague made the comment in a busy office.

  The former head of Welsh women's rugby has said she considered suicide because of what she claims is a "toxic culture" of sexism at the Welsh Rugby Union.

  Charlotte Wathan also said a male colleague told her, in a busy office, that he wanted to "rape" her.

  Another former female WRU employee, a mum of one, said she wrote a manual for her husband in case she killed herself.

  The Welsh Rugby Union have said that both cases were investigated and proper procedures were followed.
