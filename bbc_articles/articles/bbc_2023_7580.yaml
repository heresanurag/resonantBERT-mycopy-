  The former Leeds Rhino describes the emotional moment her carried his friend over the finish line.

  Former Leeds Rhino Kevin Sinfield has described the emotion he felt as he carried his friend over the finish line of the first Rob Burrow Leeds Marathon earlier this month.

  Burrow was diagnosed with motor neurone disease in 2019, and has campaigned to raise awareness and millions of pounds in the years since, with Sinfield one of his biggest supporters.
