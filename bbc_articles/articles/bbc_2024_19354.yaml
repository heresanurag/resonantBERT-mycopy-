title: Family's search for boy, 2, found dead in Wolverhampton canal - BBC News
date: '2024-08-20'
section: Wolverhampton
url: http://www.bbc.co.uk/news/articles/c4gxdrr047ro
content: |-
  Jayce Olutola's death is recorded as drowning, Black Country Coroner's Court hears.

  Floral tributes were left next to the canal after the Jayce Olutola's death

  A family launched a frantic search for a two-year-old boy, later found dead in a canal, as they prepared to move house, an inquest heard. Police officers pulled Jayce Olutola out of the Wolverhampton waterway on 11 August. Emergency services staff tried to revive him but he was pronounced dead at the scene, the Black Country Coroner’s court heard. The boy lived with his parents on Hendon Avenue, just off the canal in Ettingshall, and the family had been in the process of moving house. A family member had noticed him missing and called emergency services. Senior Coroner Zafar Siddique told the court the cause of death had been reported as drowning and the hearing was adjourned until 15 October.

  Jayce was rescued by police officers from a stretch of canal in Ettingshall on 11 August

  The inquest heard the family member had realised she could not hear Jayce so searched the house for him. She then found the garage door open and had rushed to search the nearby park. Crews arrived at the scene at about 17:30 BST. At the inquest opening the coroner said he would request reports from the hospital and West Midlands Police. Mr Siddique offered his “deep felt condolences” to the family who were not in attendance at the hearing.
