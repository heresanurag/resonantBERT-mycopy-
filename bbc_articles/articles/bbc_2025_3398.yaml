  You can see what that type of total dominance against Italy did for France in their build-up to facing Ireland. What it fixed for France by having an absolute demolition mode in Rome was going to a tough away game in Dublin full of confidence. If England had absolutely demolished Italy, you are then potentially going to Wales with a slightly different mindset. It was a good win, but you could dissect what England were trying to do into 20-25 minutes of the second half. It is just a very subtle difference, but I still truly believe this England squad have the personnel to win trophies and to be able to do that they have to recognise scenarios of dominance. The likes of Ellis Genge might whinge and moan about former pros not understanding what it takes, but unfortunately they do because they have been successful in the past and won trophies. They haven't always been successful, they have had tough times as well but they learned from them and found ways of winning games in different ways, so when it comes to a scenario, they have got that recall to a previous experience and can get themselves out if it.

