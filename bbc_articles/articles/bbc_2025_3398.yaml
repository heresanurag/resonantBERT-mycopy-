  I think there was more cohesion in a backline which included five Northampton Saints players. I loved the first five minutes where Ollie Lawrence and Elliot Daly synced into the Saints way really well. Daly set the tone at full-back and you could feel the way they were trying to play and Italy were not going to survive. The changes they had to make because of Lawrence's injury took the wind out their sails a bit. They regrouped at half-time and had a good 10 minutes to put the game away, but then they just sort of, shut up shop. Twickenham felt a bit flat and that was reflected in how England played in the last 20 minutes. I remember Ollie Chessum making a break from a line-out and then we slow it down and go to the box kick. Four phases of that intensity and England stroll in somewhere for another try, like they did in the first half and like the top teams do. It was a feeling of, we have done enough to win the game, let's lock it up and not give anything away. They had an Italy side on the ropes, lacking in motivation after their pumping by France, before giving the likes of Juan Ignacio Brex, Tommaso Menoncello and some proud Italian players a bit of life to make it a bit awkward.

