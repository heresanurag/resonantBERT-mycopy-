  Selfishly, for Marcus Smith, the Lawrence injury couldn't have worked out any better for him because he got to play most of the game. When you get dropped from the side, it's a tough week. To have started the campaign at fly-half and then be dropped out of the team, it was understandable because of how other people had played but it happens in sport sometimes. He bounced back well and caused Italy problems but I would caveat that with, whether he is at 10 or full-back, he needs to show a bit more control over the game at international level. He can still be electric and beat people one on one but maybe for 5% of his game, he just needs to back off, take stock and really focus on getting the team in the right position and get the balance a bit better along the line. I saw him go for a high ball and he knocked it on or Italy caught it and he was frustrated with himself. Two rucks later he is in trying to jackal for the ball as a full-back because he is annoyed he hasn't caught that kick. I love that enthusiasm but as a 10 or 15 your team needs you on your feet in your position. It's just a tiny tweak to his game that will put him back in that side, no question. It's to play with more control but still with a few spikes of that enthusiasm of beating people like he did for his try, which you never want to quash.

  England are certainly building momentum at Allianz Stadium and have not lost at home in the Six Nations since their record defeat by France in 2023. But those England players who have played in Cardiff will know there is an enormous home factor there as well, and particularly when England are in town. It is notoriously a tricky place for England to play rugby. It was probably my favourite venue to play at outside of Twickenham because you are challenged to the max and it is incredibly intimidating, but also rewarding when you play well. Wales have proven they can score tries and cause problems. In a neutral venue I'm saying England are winning by 10-15 points, but at the Principality, it makes it a one score game either way. The players who have played there before will be advising those that haven't as to what to expect, but you can times that by 10 because Saturday is going to be ferocious. It is fantastic for the Six Nations that three teams are still in the title race, but realistically, for France to lose at home to Scotland after that performance against Ireland, seems like such an impossibility. This tournament is so unique and France showed up to Twickenham and coughed up a few opportunities, so you never know. But I've not seen them play like that for a couple of years. They all tapped into their inner super human powers and it all came together, even with the loss of Antoine Dupont. They have got their mojo back and are set to get themselves back on track towards the World Cup.

