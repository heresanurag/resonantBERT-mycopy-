content: |-
  'England had Italy on the ropes but didn't recreate French demolition job'

  In his BBC Sport column, World Cup winner Matt Dawson reflects on England's thumping Six Nations victory over Italy, and assesses the final-day title race. This England team haven't had much practice of being in the position of dominance they had over Italy. They scored 47 points with seven very good tries and showed some great attacking 'intent', a word they used a lot in the post-match interviews. The victory will be a good experience for the players, and for 60 minutes they can be very pleased with themselves. But some of them may be reflecting on the last 20 and know they could have done a bit more. I found myself getting frustrated when I was commentating. I don't know whether that is because my expectations of this England side are so high because of the talent in the squad, but we didn't do it for longer periods of time. We scored a brilliant first try and then had a lapse of concentration and Italy score back. We score another try and then they hit back again. It felt like England always had Italy at arm's length and it wasn't 'are England going to win this?' It was by how many? But then my expectation was of more accuracy and discipline in how England were going to play. Dotted in amongst all of that there were some brilliant moments.

