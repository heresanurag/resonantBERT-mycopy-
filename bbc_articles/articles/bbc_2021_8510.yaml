content: |-
  Fans celebrate as England head for the Euro 2020 semi-finals after beating Ukraine.

  It's coming home. For the first time in 25 years, England are heading to the semi-finals of the European Championships at Wembley - after a blistering 4-0 win over Ukraine in Rome.

  England supporters may not have been able to travel to Italy because of Covid rules - but that did nothing to stop Three Lions fans from celebrating the victory in fantastic style across the nation.

  The final whistle is heard in London's Trafalgar Square

  The moment confirms England's passage to the Euro 2020 semi-finals at Wembley next week

  Thousands of England supporters took to the streets in London to celebrate the football team's win, with dozens climbing the Shaftesbury Memorial Fountain, in Piccadilly Circus

  Central London sees fans continuing to celebrate into the night, with singing, cheering, chanting and clapping taking place on the capital's streets

  The capital's Leicester Square also became a magnet for ecstatic fans after the match

  South London's Vinegar Yard explodes as Harry Kane scores his second goal of the game - England's third

  Fans in Manchester react with jubilation as Harry Maguire scores England's second goal against Ukraine

  At the official fan zone in London's Trafalgar Square, fans celebrate striker Harry Kane's early goal

  The fan zone is free but the sought-after tickets are allocated through a ballot

  Emotions ran high during the first half of the match

  Earlier in the day, fans gathered in Rome, where the temperature today was 31C (87.8F) - 10 degrees hotter than London's Wembley

  At Rome's Stadio Olimpico, England fans were likely to be outnumbered by Ukraine supporters who face fewer travel rules

  There were big grins for the camera at one bar in Italy's capital ahead of the 20:00 BST kick-off

  UK nationals living in Europe could travel without quarantining as long as they have proof of full vaccination or a negative Covid test

  Supporters from both teams posed for a friendly photo outside the stadium, which has an agreed capacity of 16,000

  In Piazza del Popolo fans cheered for England ahead of the match, which is the Three Lions' first Euro 2020 game not at Wembley

  Italy is currently at its lowest level of coronavirus rules with pubs and bars allowed to open

  Rules still do apply in Italy though - including limits on capacity and no more than six people from different households allowed to sit together indoors

  But there is no limit on the number of people who can meet together outside in pubs in Italy

  Elsewhere in the city, and next to the iconic Colosseum, Ukraine fans posed for a photo

  England fans in Manchester flew the flag ahead of the match

  Fans in Bristol met outside to watch the game

  And in Nottingham, a fan cut a striking figure with his face painted with the St George's flag

  Keep checking back as we'll be updating the gallery throughout the day.

