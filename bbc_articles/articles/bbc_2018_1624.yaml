title: World's longest glass bridge visited by thousands daily - BBC News
date: '2018-02-22'
section: General
url: http://www.bbc.co.uk/news/world-asia-43158243
content: |-
  Chinese tourists celebrate the new lunar year by walking across the world's longest glass bridge.

  The bridge, located in China, is supposed to represent a dragon flying through the valley.It was opened in Hebei province, near Beijing, during December.
