title: 'Ukraine Handzyuk death: Acid victim''s defiant message - BBC News'
date: '2018-11-07'
section: General
url: http://www.bbc.co.uk/news/world-europe-46122999
content: |-
  The funeral is held for Kateryna Handzyuk, who spoke out against corruption before she died.

  The funeral is held for a Ukrainian activist, who spoke out against corruption from her hospital bed before she died in hospital following an acid attack.

  Kateryna Handzyuk, 33, suffered burns over 40% of her body and severe eye damage as a result of the assault on 31 July in the southern city of Kherson.
