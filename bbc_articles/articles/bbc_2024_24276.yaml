content: |-
  Jenny Hastings, wife of ex-Scotland international Scott Hastings, disappeared at a wild swimming spot near Edinburgh on Tuesday.

  Body found in search for missing wife of rugby star

  Jenny Hastings had spearheaded a charity campaign to help people improve their mental wellbeing

  A body has been found in the search for Jenny Hastings, the wife of the former Scotland rugby international Scott Hastings. Police said a woman's body was found in the Hound Point area of South Queensferry on Saturday afternoon. Formal identification has yet to take place, but the Hastings family has been informed. Mrs Hastings disappeared at Wardie Bay, a wild swimming spot near Edinburgh, on Tuesday.

  Police said there did not appear to be any suspicious circumstances and a report would be sent to the procurator fiscal. Hound Point is a rocky outcrop and marine terminal about five miles (8km) west of where Mrs Hastings went missing. HM Coastguard was alerted to a "report of concern" on Tuesday and a number of lifeboats and helicopters were deployed in the search. A statement was later released on behalf of the Hastings family which said she had "struggled with her mental health for a number of years". "The Hastings family are absolutely heart broken," the statement continued. "Jenny and Scott have a huge following of friends from all walks of life including those that work in the media and we ask that at this moment in time we are allowed to grieve privately with family members."

  Scott Hastings (far left) and his brother Gavin (far right) with their wives Jenny and Diane

  Scott Hastings, the younger brother of former Scotland rugby captain Gavin, won 65 caps as a centre for Scotland from 1986 to 1997. Jenny Hastings, 60, had previously spoken openly about her struggles with mental health. She disappeared from the couple's Edinburgh home for 36 hours in March 2017 and walked for miles to the Pentland Hills while she was suffering from depression. She eventually got help by going into a police station and praised the officers for the support they gave her. The couple later spearheaded a charity campaign to keep people active and improve their mental wellbeing. The 100 Streets challenge encouraged people to get out for exercise with friends.
