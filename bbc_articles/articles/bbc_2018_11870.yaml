title: 'Strictly Come Dancing: Seann and Katya return to dancefloor - BBC News'
date: '2018-10-13'
section: Entertainment & Arts
url: http://www.bbc.co.uk/news/entertainment-arts-45821854
content: |-
  Seann Walsh and Katya Jones return to the BBC show for the first time since they were seen kissing.

  It was "all about the dancing" as Seann Walsh and Katya Jones returned to Strictly Come Dancing for their first time since they were pictured kissing.

  The pair were photographed on the birthday of Walsh's now ex-girlfriend.

  But there was no direct reference to the controversy on Saturday's show, which saw a warm crowd reaction for their Charleston - and a score of 28.

  "Strictly", "Seann" and "Katya" were the top three Twitter trends in the UK as the dance was broadcast.

