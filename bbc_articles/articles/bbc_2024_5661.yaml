title: Hungry bears scavenge for food in Romanian town - BBC News
date: '2024-03-24'
section: General
url: http://www.bbc.co.uk/news/world-europe-40845302
content: |-
  The animals have been leaving the mountains to scavenge for food in local homes.

  Romania is home to 60% of Europe's brown bears. Here's what happens when they visit the locals in the central counties of Harghita and Prahova.
