title: Governor Gavin Newsom's sleepy son invades stage during speech - BBC News
date: '2019-01-08'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-46791236
content: |-
  The two-year-old son of Gavin Newsom stole the show during his inauguration speech in Sacramento.

  The son of California's new governor Gavin Newsom stole the show during his inauguration speech in Sacramento.

  Two-year-old Dutch wandered onto the stage, much to the audience's delight.

  And he wasn't going to give up the limelight easily.
