title: 'WSL fixtures: Chelsea host Villa and Man City take on Arsenal on opening weekend
  - BBC Sport'
date: '2024-07-22'
section: Women's Football
url: http://www.bbc.co.uk/sport/football/articles/cz9x4xvllxpo
content: |-
  WSL champions Chelsea host Aston Villa on the opening weekend of the new season.

  Women's Super League champions Chelsea will host Aston Villa on the opening weekend of the new season as the Sonia Bompastor era gets under way.

  Bompastor was appointed Chelsea boss earlier this summer to replace Emma Hayes, who left Stamford Bridge after 12 years at the end of last season.

  The Frenchwoman's first game in charge will be shown live on the BBC.

  Chelsea, the seven-time champions, will once again be the team to beat but Manchester City will be out for revenge after losing last season's title on goal difference.

  City, managed by Gareth Taylor, travel to Arsenal on the opening weekend - which could see Vivianne Miedema make her City debut against her former club following her summer move to the north west of England.

  FA Cup holders Manchester United take on West Ham United, while Leicester City travel to Liverpool.

  Dates and times for the opening weekend fixtures, which will be played over the weekend of 21-22 September, will be announced in the coming weeks.
