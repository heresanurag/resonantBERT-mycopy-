id: bbc_2019_133
title: Pregnant Meghan laughs off 'fat lady' comment - BBC News
date: '2019-01-17'
section: General
url: http://www.bbc.co.uk/news/uk-46896223
content: |-
  The pregnant duchess received an unexpected comment while on a visit to a charity in London.

  Like many pregnant women, the Duchess of Sussex will be accustomed to receiving unexpected comments from members of the public.

  But Meghan laughed when she was affectionately described as a "fat lady" during a visit to animal charity Mayhew in north-west London.

  She became a patron of the organisation last week.
