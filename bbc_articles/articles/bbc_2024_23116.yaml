title: 'Domestic abuse: Survivor says abusers are ''domestic terrorists'' - BBC News'
date: '2024-09-25'
section: Wales
url: http://www.bbc.co.uk/news/articles/c3e9vze538qo
content: |-
  A report warns that violence against women remains "shockingly high" in Wales.

  Rachel Williams was shot by her estranged husband Darren in 2011

  A domestic violence survivor has said perpetrators of abuse and violence are "domestic terrorists". "Domestic abuse and violence is a national emergency," said Rachel Williams, who was shot by her ex-husband in 2011, and has life-changing injuries. Her comments come as a leading Welsh network warn violence against women remains "shockingly high" in Wales. The State of the Nation report from Women's Equality Network (WEN) Wales warns specialist support services are facing unprecedented pressures due to increased demand.

  Ms Williams, 52, from Monmouthshire, said she remembered the day of her shooting as if it was yesterday. She said when her estranged husband, Darren Williams burst into her Newport hair salon and opened fire, her instinct was to "run towards him and grapple for the gun".

  This video can not be played To play this video you need to enable JavaScript in your browser. Rachel Williams was having her hair done when her abusive ex-husband burst in with a gun and shot her

  "Next thing I can remember is being hit with the butt of the gun on the head, falling on the floor. "He looked at me, told me he loved me and pointed the gun at my chest." Williams then shot her, leaving her with life-changing injuries to her leg. Hours after the shooting, he was found hanged. Six weeks later, Rachel's 16-year old son, Jack, also killed himself. "Jack used to say to me 'you've got to leave him'. He was so confused."

  Now a prominent campaigner, Ms Williams said her son is the reason she fights for education around domestic violence and coercion. "I don't want to see another family go through what we went through. "If I can educate the next Jack's and the next Rachel's then I'm going to do that." Ms Williams said she believes domestic abuse and violence should be treated as a "national emergency". "I think if the public accepted them as what they are, they're domestic terrorists, we'd see it as a bigger threat to life in society." Ms Williams said she would tell her former self, stuck in an abusive marriage, that while "the road after leaving" would be tough, there would be hope. "Life is precious but freedom is priceless."

  Violence against women remains "shockingly high", according to a new report about what it is like being a woman in Wales. The State of the Nation report from WEN Wales warns specialist support services are facing unprecedented pressures due to increased demand and a lack of funding. "The numbers are shockingly, shockingly high," said WEN Wales Director, Victoria Vasey. "Violence against women as opposed to men, which does exist, is enormously disproportionate, and I don't think that will be a surprise to anyone." The report added that about three quarters of domestic abuse related offences and over 80% of sexual assaults are committed against women. It also noted that "finding robust" data around gender-based violence and abuse "posed a challenge." Welsh Women's Aid said there had been a "significant rise in referrals" for their services since the Covid-19 pandemic. "Cases are also becoming more and more complex and have been made worse by the cost-of-living crisis and housing crisis," said the charity. The charity added that "sustainable funding" is needed "in order to ensure that survivors continue to receive the support they deserve".

  WEN Wales' direct Victoria Vasey says 2023 was a year of "mixed developments" for gender equality

  Women's Equality Network Wales' annual report also looks at women in the economy, as well as those in leadership and industry. "It's momentous to have a woman as first minister," said Ms Vasey, citing gender equality in politics as a source of hope. She added that the "impressively female cabinet" in Westminster was "exciting" and "something to be applauded". But added that the report suggested that the picture is not "as good" in local government. "Representation by women in local government is notably low, and that's something that we would very much like to see addressed for the future." Ms Vasey added that data being broken down to reflect the different experiences of women from different backgrounds is "important" to "kickstart change". "We need to dig into that data and digging into that data includes looking at the experiences of different groups of women. "If we want to tackle the underlying issues which mean that Wales is not yet gender equal, we need to understand them better."
