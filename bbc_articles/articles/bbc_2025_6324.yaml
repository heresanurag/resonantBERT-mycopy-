  The demolition contractors say they will try to preserve the best stonework features by removing them by hand. When the school closed in 2008, former pupils reminisced on social media about the grand staircase, the comforting smell of wooden floors and favourite teachers. The building is B-listed - meaning it has regional importance. Under the council's original regeneration plan, the frontage would have been retained and the site developed into an energy centre, providing low emission heating. But a fire in 2023 gutted the school and it is now deemed beyond repair.
  • None The huge roof trusses from the church now are now piled up on Robert Street
  • None The church was previously photographed in 2020 when the roof was largely intact Slide 1 of 4 , Large arched roof supports from the church lie on top of each other in a derelict street in front of the old school building. , The huge roof trusses from the church now are now piled up on Robert Street

  Next to the school stands the shell of Clune Park Church, built in 1905 from red sandstone in the late Gothic "Modern Movement" style of architecture. It has an ornate art nouveau-style window and, like the school, is B-listed by Historic Environment Scotland. But the building's decay is now so far advanced, permission has been granted for demolition. The roof is long gone and huge timber roof trusses that once supported it have been stacked up in the street outside. The Clune Park tenements are unusual in the west of Scotland in that they have flat concrete roofs which the council says are suffering from "corrosion swelling". Inverclyde Council leader Stephen McCabe says back in the 1990s refurbishment was considered but no funding was available and a complete rebuild was thought better value.

  Council leader Stephen McCabe says a "war of attrition" has taken place to buy up the flats

  But he says the council has faced a long "war of attrition" to identify owners and buy up the properties, with valuations often coming in at just a few thousand pounds. Ultimately the plan is to replace the 430 flats with 165 new affordable homes with the investment coming from a social landlord. "The start of the demolition will be a real sign that we're getting there and we will ultimately demolish all of those properties," said McCabe. "That will be a day for celebration". But with around 100 flats still in private hands there's no clear timescale for when that will happen. The demolition contractors expect to start taking down the first buildings later this month. While it marks the beginning of the end for "Scotland's Chernobyl" it may be some time yet before a new Clune Park rises from the rubble.
