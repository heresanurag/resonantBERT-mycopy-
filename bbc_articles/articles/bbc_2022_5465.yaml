title: 'France election: Le Pen concedes defeat in presidential vote - BBC News'
date: '2022-04-24'
section: General
url: http://www.bbc.co.uk/news/world-europe-61211789
content: |-
  Marine Le Pen addresses her supporters as she concedes in France's presidential vote.

  Emmanuel Macron has beaten far-right candidate Marine Le Pen to win the French presidency, projections have shown.

  French media say Macron has taken 58% of the vote, to Le Pen's 42%.

  Addressing supporters, Marine Le Pen said she remained committed to France and its people.
