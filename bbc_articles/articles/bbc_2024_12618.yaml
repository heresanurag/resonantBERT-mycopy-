title: Sofa-surfing 66-year-old in Norfolk speaks about being homeless - BBC News
date: '2024-06-20'
section: Norfolk
url: http://www.bbc.co.uk/news/articles/c8002dk9nxqo
content: |-
  Freda Wellington says she is struggling to sleep properly after a no-fault eviction.

  Freda Wellington is currently sleeping on a friend's sofa after being evicted

  A homeless woman has spoken about how tough it has been sleeping on a friend's sofa since she retired. Freda Wellington lived in Great Yarmouth, Norfolk, until she was served a no-fault eviction. The 66-year-old said losing her home had left her feeling like a "nervous wreck". Research for the homeless charity Shelter showed that private renters over the age of 55 are hit with a no-fault eviction notice every 16 minutes in England.

  Ms Wellington, a mother-of-two, moved into a one-bedroom home in Great Yarmouth nine years ago after a relationship breakdown. In March 2023 the landlord said he wanted to increase the rent. The retired telephone support worker asked if she could renegotiate the £50 a month increase, but was later sent an eviction notice. "I was a good tenant, didn't miss any payments at all, that is what hurt." She was served a no-fault eviction, which allows landlords to repossess their properties even if there has been no problem with the tenant. She said during that time she felt like a "nervous wreck", not knowing where she would live.

  The 66-year-old said she may need to return to work to survive

  After staying in a hotel paid for by the council, Ms Wellington is now sleeping on a friend's sofa. She described her relief at being able to clean her clothes for the first time in six weeks, which she said "was hard" as she was "a very clean person". She said she was glad that she had somewhere to stay but was "tossing and turning" and awake most of the night on the sofa. "It's not a good feeling when you've worked hard all your life to be in this situation." She said she understood that landlords were running a business, but that they needed to be more accommodating to elderly renters. "I was looking forward to my retirement and I didn't expect this to happen," she added. The government had promised to abolish no-fault evictions before the general election, but that did not become law before the dissolution of Parliament on 30 May.

  Shelter's research has shown that 400,000 older renters live in fear of being evicted by their landlord. The charity said private renters over the age of 55 were hit with a no-fault eviction notice every 16 minutes in England. Polly Neate, the chief executive of Shelter, said instead of being able to finally enjoy retirement, people are "living with the constant fear of homelessness hanging over them". “With private rents rocketing and no-fault evictions rife, too many older people are being forced into homelessness because there aren’t enough social homes available and private renting is just too expensive." The latest government figures show there were 9,700 people over the age of 55 who were assessed as being owed a prevention or relief duty, external, more commonly known as at risk of homelessness or homeless. In Great Yarmouth there are currently 956 households on the waiting list for social housing in the borough and a further 902 new requests that need to be assessed. Ms Wellington was offered accommodation by Great Yarmouth Borough Council, but turned it down as she said it was not suitable due to her health issues. A spokesperson for the council said it had a legal obligation to support those who are homeless and applicants’ medical details are considered to ensure a suitable property offer is made.
