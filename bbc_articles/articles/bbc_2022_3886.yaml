title: 'Ukraine war: Man rescued from Kharkiv rubble after shelling - BBC News'
date: '2022-03-19'
section: General
url: http://www.bbc.co.uk/news/world-europe-60807896
content: |-
  A man is pulled alive from the rubble of a teaching building in Ukraine, after Russian shelling.

  A man was rescued from the rubble of a teaching building in the north eastern city of Kharkiv, after it was shelled by Russia on Friday.

  The attack killed one person and wounded several others, according to Ukrainian authorities.
