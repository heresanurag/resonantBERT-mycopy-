id: bbc_2024_26544
title: PSNI chief disputes prejudice claim over Michael McMonagle - BBC News
date: '2024-10-03'
section: Northern Ireland Politics
url: http://www.bbc.co.uk/news/articles/c0e1xdxv802o
content: |-
  Jon Boutcher said he did not want the police to get involved in a political 'tit-for-tat'.

  Michael McMonagle pleaded guilty to a series of child sex offences last week

  Warning a charity about a potential police investigation into former Sinn Féin press officer Michael McMonagle would not have prejudiced the investigation, the chief constable has said. McMonagle, of Limewood Street in Londonderry, admitted to a series of child sex offences last week, including attempting to incite a child to engage in sexual activity. He had worked for the party until his arrest in 2021, when he was suspended. His contract of employment later ended. He then took up a position with the British Heart Foundation in 2022, for which he received references from two other former Sinn Féin press officers. Sinn Féin has been criticised for not alerting the charity to the fact McMonagle was under police investigation for child sex offences.

  At a meeting of the Policing Board on Thursday, DUP MLA Trevor Clarke asked PSNI chief Jon Boutcher if the police had provided Sinn Fein with any information highlighting their potential responsibility to consider forwarding information shared with them in relation to the McMonagle case. He also asked if sharing that information could prejudice a potential police investigation. Boutcher told the Policing Board he did not want the PSNI to get involved in a political “tit-for-tat”. But, he added that he did not see how a police investigation would have been prejudiced. "I know you want to try and drag the PSNI into this," he said. "If the question is would that prejudice an investigation - the answer is and I don't know the detail - I don't see how it would prejudice an investigation," added Boutcher.

  Michael McMonagle (highlighted far left) attended the same event as Michelle O'Neill (in pink jacket with her back to the camera)

  On Tuesday, Sinn Féin's Economy Minister Conor Murphy was asked why the party did not raise issues with the British Heart Foundation about McMonagle’s subsequent employment, which involved attending events at Stormont. He said they could not do anything which could “potentially be prejudicial” to the police investigation. Speaking after the meeting of the board, Trevor Clarke said it was important public representatives made factual comments on issues about safeguarding children. "Conor Murphy’s extraordinary claims about prejudicing the PSNI investigation now lie in tatters," he said. "Conor Murphy should now apologise and make it clear that he accepts what he said was wrong.” After McMonagle was first arrested in August 2021, he informed Sinn Féin and was suspended from his job. Later his contract of employment ended. He then took up a position with the British Heart Foundation in September 2022. The British Heart Foundation said neither of the job references "raised a concern about his [McMonagle's] suitability for employment or referenced an ongoing police investigation or suspension from his previous employment".

  On Wednesday, First Minister Michelle O'Neill said she was "aghast and horrified" after learning about the references provided for McMonagle. O'Neill also denied knowing that McMonagle had taken up the new job with the charity, despite the pair attending the same event to support organ donation at Stormont in 2023. “I was not aware that Michael McMonagle was at that event," she told reporters. “We go into the hall with a number of people, he was not on my radar at all from we took disciplinary action. “I am confident to say that I did not know anything about Michael McMonagle’s whereabouts – I was there to support the campaign and the legislation."
