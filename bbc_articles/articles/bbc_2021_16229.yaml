title: Monkey offered cocaine and flushed down loo recovering - BBC News
date: '2021-12-19'
section: General
url: https://www.bbc.co.uk/news/av/uk-wales-59667079
content: |-
  Milly is recovering and even has a fellow marmoset as a companion after life with an abusive owner.

  A pet monkey who was offered cocaine and flushed down a toilet by her owner is now on the mend, according to an animal sanctuary.

  Vicki Holland, of Newport, was banned from keeping animals for life earlier after police found phone footage of her abusing Milly the marmoset.

  Milly was rescued by the RPSCA and rehomed at the Monkey World Sanctuary in Dorset.

  Dr Alison Cronin, of Monkey World, said Milly had been "very, very traumatised" when she first arrived but when she mixed with other marmosets it was like a "light switched on".

  She has even found a close companion in fellow marmoset Moon.
