title: 'Russian troop build-up: View from Ukraine front line - BBC News'
date: '2021-11-25'
section: General
url: http://www.bbc.co.uk/news/world-europe-59402658
content: |-
  BBC correspondent Abdujalil Abdurasulov visits eastern Ukraine as soldiers watch Russia's nearby movements.

  Nato and the United States are worried about a build-up of Russian troops on its border with eastern Ukraine which has led to speculation over an invasion.
