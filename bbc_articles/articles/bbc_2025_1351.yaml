  • None Did you witness the plane crash? Contact us, external Toronto was hit by a major snow storm over the weekend, but authorities said the runway was dry at the time of landing and that there were no cross-wind conditions. Cross-wind conditions refer to when wind blows opposite to the direction of travel which could affect vehicles and aircraft by pushing them sideways and requiring corrective action to maintain control. Before the crash, authorities said snow had stopped and "frigid temperatures and high winds [were] moving in". Audio recording from Pearson's air traffic control tower, reported on by the Canadian Press, shows the flight was cleared to land shortly after 14:00 on Monday, and that the tower had warned the pilots of a possible air flow "bump" in the glide path from a plane in front of it. Analysts say it is possible the plane may have struck an item on the runway such as a light when it landed. The crash is at least the fourth major aviation incident in North America in the past month, including an American Airlines plane in Washington, DC, that collided with a US Army helicopter, killing all 67 people on board.

