title: Investigators probe cause of Toronto Delta plane crash - BBC News
date: '2025-02-18'
section: US & Canada
url: http://www.bbc.co.uk/news/articles/c4gpdzep6x4o
content: |-
  Officials say it is "not the time" speculate on the cause of the crash, which all 80 people on board survived.

  This video can not be played To play this video you need to enable JavaScript in your browser.

  Investigators are looking into what made a Delta plane crash land and flip over at Toronto's Pearson Airport on Monday, an incident all 80 people on board survived. Airport CEO Deborah Flint said investigators will be reviewing the aircraft on the runway for the next 48 hours, adding that this was "not the time" to speculate on the cause of the crash. The Delta Air Lines flight from Minneapolis skidded along the runway with flames visible before it came to a halt upside down. Twenty-one people were injured, of which 19 have been released from the hospital, authorities said on Tuesday. The two patients do not face life-threatening injuries.

  There were 76 passengers and four crew on board the 16-year-old CRJ900 aircraft, made by Canada's Bombardier company. Injuries at the time of the crash ranged from head injuries to back sprains, and nausea and vomiting due to jet fuel exposure, a representative for Peel Regional Paramedic Services said. Experts told the BBC it was miraculous that everyone survived the crash, adding that the swift response of flight attendants and emergency crews helped save people, as well as plane safety improvements. Passengers on board said they were hanging upside down in their seats and had to release themselves, falling on to the ceiling before clambering out on to the snow-covered tarmac. Firefighters quickly came to the rescue. "We were upside down hanging like bats," passenger Peter Koukov told CNN. A child was among the injured but was in good condition as of Tuesday morning, the Hospital for Sick Children in Toronto told the BBC's US partner CBS News. Although the airport had been experiencing "extreme" weather conditions, Monday was categorised as a "clear day" for operational recovery following prior disruption, officials said. Two runways remained closed on Tuesday as the Transportation Safety Board of Canada continued its investigation into the crash.
