title: UK needs black culture museum, says architect Sir David Adjaye - BBC News
date: '2019-02-02'
section: UK
url: http://www.bbc.co.uk/news/uk-47101108
content: |-
  Sir David Adjaye believes such an initiative would help empower generations of people in Britain.

