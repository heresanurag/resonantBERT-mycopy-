content: |-
  A decade on from Scotland's independence referendum, take a look back at key moments from the campaign.

  "Should Scotland be an independent country?"

  It's a decade since voters across Scotland went to the polls to answer that very question - in the end voting against independence by 55% to 45%.

  From mass street rallies to ice bucket challenges, take a look back at some of the key moments from the 2014 campaign.

  Read more: The agony and ecstasy of the 2014 independence referendum
