  Three dead after fire in elderly ward at Hamburg hospital

  The fire at the Marienkrankenhaus in Hamburg was reported shortly after midnight

  Three people have died after a fire broke out overnight at a hospital ward caring for elderly people in Hamburg. The north German city's fire brigade said they were unable to reach the three victims during the rescue effort. They died at the scene. The fire at the Marienkrankenhaus was reported shortly after midnight. Around 220 emergency workers were dispatched to tackle the blaze and treat patients. More than 35 people were injured.

  Two people were taken to another hospital in the city for treatment. One person has life-threatening injuries, said the fire brigade. They added 18 others had suffered serious injuries and another 15 people had minor wounds. Some of the injured were treated in the Marienkrankenhaus's emergency room by hospital staff. When the first firefighters arrived, a ground floor room at the hospital was already ablaze and the fire was threatening to spread to the room above. Patients in other rooms came to their windows to tell firefighters they were unable to leave due to the smoke. The building has four floors. The fire brigade said they used turntable and portable ladders to rescue patients, several of whom were elderly and had mobility issues. Other patients were helped out through corridors with the aid of fire escape hoods, a breathing apparatus used by fire brigades in smoke-filled environments. Firefighters were able to stop the flames spreading to other rooms in the hospital. The cause of the fire is not yet known.
