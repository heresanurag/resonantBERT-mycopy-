content: |-
  Boris Johnson announces tougher Plan B measures to combat the Omicron variant and allow time for more boosters, including Covid passes for large venues.

  PM emphasises his trust in the people - but is it mutual?

  Armed with a hastily arranged inquiry and the resignation of his former spokesperson Allegra Stratton, the prime minister could demonstrate at his press conference that that he wasn't hiding from questions on the Downing Street party of last year. There were caveats to his "guidance was followed" mantra - such as "as far as I am aware" - and he was pushed to broaden the remit of the cabinet secretary's inquiry. But in replying to Laura Kuenssberg's question on trust, he emphasised his trust in the British people rather than fully addressing whether they could trust him. As many of the Plan B measures won't be introduced until next week, questions will inevitably be asked about whether the public health message would have landed with more impact had the press conference been held on a different day. His critics - and that includes some Conservatives - say he was indulging in a "dead cat" strategy to divert attention from whatever had been going on behind the black door of Downing Street. But it seemed at this press conference that the feline was still alive and prowling around the prime minister.
