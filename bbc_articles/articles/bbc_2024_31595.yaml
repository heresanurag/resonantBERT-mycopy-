content: |-
  The undercover policeman showed up at the house of an alleged drug dealer, bearing a fake gift.

  An undercover policeman in a teddy bear costume showed up at the house of an alleged drug dealer, bearing a fake gift, as part of an operation on Valentine's Day in Lima, Peru.

  Footage supplied by the national police agency shows one woman leaving the house, before she is pinned down by police. Police find a bag containing what are alleged to be drugs under a mattress inside. Two women are arrested at the end of the raid.
