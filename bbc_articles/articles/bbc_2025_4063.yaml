content: |-
  Joanne Penney was found seriously injured on 9 March and died at the scene.

  Six appear in court after woman shot dead

  Tony Porter, Marcus Huntley and Joshua Gordon appeared at Cardiff Crown Court in connection with the murder of Joanne Penney

  Six people have appeared in court charged in connection with the murder of a 40-year-old woman at a block of flats. Joanne Penney was found seriously injured on Green Park in Talbot Green, Rhondda Cynon Taf, on 9 March and died at the scene. The six defendants, five of whom have been charged with murder and one with assisting them, were remanded in custody ahead of a trial, which could last between six and eight weeks. It is expected to be held at the end of October and a provisional date for a plea and trial preparation hearing was set for 7 July.

  Police are continuing to investigate the death of Joanne Penney

  Melissa Quailey-Dashper, 39, from Leicester, is charged with murder, appeared via videolink at Cardiff Crown Court from HMP Eastwood Park and confirmed her name and date of birth. Joshua Gordon, 27, from Oadby, Leicestershire, is charged with murder, and spoke only to confirm his name and date of birth. Tony Porter, 68, from Braunstone Town, Leicestershire, is charged with murder and participating in the criminal activities of an organised crime group. He spoke only to confirm his name and date of birth. Kristina Ginova, 21, from Oadby, Leicestershire, who is charged with assisting an offender appeared via videolink and a bail application was rejected by Judge Tracey Lloyd-Clarke. Jordan Mills-Smith, 32, from Pentwyn, Cardiff, is charged with murder, and appeared via videolink. Marcus Huntley, 20, from St Mellons, Cardiff, is charged with murder and spoke only to confirm his name and date of birth. Prosecutor Jonathan Elystan Rees KC told Cardiff Crown Court that more than a thousand documents and thousands of exhibits had been obtained which needed to be reviewed.
