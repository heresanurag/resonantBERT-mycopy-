  Tony Adams - Campbell's former Arsenal team-mate and captain - wrote on X: "Super Kev: a goal machine, a giant of a man, with an even bigger heart. "An intensely private and a truly wonderful human being. I'm devastated for his loved ones, and all of us. Love you Super Kev, Skipper." "We thought he was getting a little bit better," ex-Gunners defender Lee Dixon told ITV. "I spoke to him three of four weeks ago and it seemed he was going to be able to come out of hospital but it wasn't to be. "Really shocking news and it's really difficult to speak about it right now. Super Kev will be missed." Campbell's former Arsenal strike partner Alan Smith told Sky Sports News it was a "tragic day". "He was ambitious and driven because he wanted and to do well," said Smith. "You see the photos with his big smile and that was his personality. He was warm-hearted and popular with all the boys." Smith said Campbell never took his status as a footballer for granted. "He was a South London boy who made good and always appreciated it," he added. "He carried his work ethic throughout his whole career. "When you have played with him and shared a dressing room with him, you will not forget him. There will be a lot of ex-team-mates of his who will be very sad today." "Absolutely devastated to hear the news about Kev," former Everton team-mate and ex-England captain Wayne Rooney posted on social media. "Thinking of all his family and friends. Kev was a great team-mate but more importantly a brilliant person who helped me a lot in my earlier years."

  Forest said they were "deeply saddened" to hear of Campbell's death, and said their thoughts were with his friends and family. Former Forest goalkeeper Mark Crossley, who played alongside Campbell, said: "Life can be so cruel at times. "Absolutely devastated with news of my ex-Forest team-mate Kevin Campbell's passing. A true gentleman, a great player, a shining light of a dressing room, fun-loving guy. Thoughts are with all his family and friends. RIP mate." The official England X account posted: "We are devastated to learn that Kevin Campbell has passed away aged 54. "Kevin won four caps for our under-21s and represented our B team in the early 1990s. Our thoughts are with Kevin's family, friends and loved ones." The Professional Footballers' Association said: "RIP Kevin Campbell, who was loved by so many across football and beyond. Our thoughts today are with his family and friends." Campbell was a member of the Black Footballers' Partnership, which works to increase the voice and influence of black footballers. "Our condolences to his family and the people of Brixton, Lambeth who have lost one of their greatest sons," they said. "Kevin meant so much to so many fans across the country - especially Arsenal, Everton, Nottingham Forest and Cardiff City who he played for in his stellar career. "We are going to miss him dearly. May he rest in eternal peace. We love and will miss you Kevin."

  Campbell scored 83 Premier League goals - the most by any uncapped player

  Campbell played for West Brom during the latter part of his career
