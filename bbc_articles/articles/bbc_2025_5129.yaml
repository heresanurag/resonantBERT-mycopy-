title: OnlyFans fined over user age-check information failings - BBC News
date: '2025-03-27'
section: Technology
url: http://www.bbc.co.uk/news/articles/cr42g1lprw5o
content: |-
  The site - which is known for hosting explicit material - gave inaccurate information about age verification.

  OnlyFans' parent company has been fined £1.05m after giving inaccurate information about the measures it had in place to check the age of its users. The platform - which is known for hosting sexually explicit material - says people who visit it must be at least 18 years old. It uses facial age estimation technology - provided by a third party - where a selfie is analysed to work out how old a prospective user is. The platform's owner, Fenix, said it was set to flag anyone who appeared to be under the age of 23, who would then be asked to provide an extra form of ID. However, it later disclosed the tech's target age had in fact been set to 20.

  Ofcom has concluded that meant Fenix contravened its legal duty to provide accurate information, so levied the fine. "Receiving accurate and complete information is fundamental for Ofcom to do its job as a regulator and to understand and monitor how platforms are operating," said Suzanne Cater, Ofcom's Enforcement Director "We will hold platforms to high standards and will not hesitate to take enforcement action where we find failings." The proceeds of the fine - which has been reduced by 30% because it has been accepted by Fenix - will be passed to HM Treasury. In a statement, OnlyFans said: "OnlyFans recognises the importance of providing Ofcom with accurate and timely information. "We welcome the conclusion of this process and Ofcom's previous decision to close their investigation into our age assurance measures."
  • None How can you keep your child safe online?

  Yoti, the company which provides the age estimation technology, said the decision to set the challenge age at 20 rather than 23 had been Fenix's. "The threshold is always set by the business, rather than by Yoti," it told the BBC in a statement. The regulator made its initial enquiries in June 2022 and June 2023 using powers that pre-date the Online Safety Act (OSA). The OSA - which is coming into force fully this year - places greater responsibilities on tech firms to protect people, including the young, from harmful content online. Critics say it does not go far enough, with the government conceding it is "uneven." Taking tougher action on age assurance is a key requirement of the act. Sites, including OnlyFans, have been told they will need to have "robust" measures in place by July 2025. The platform is best known for hosting adult content, with users paying a subscription to view explicit material, but also offers content from musicians and celebrities.
