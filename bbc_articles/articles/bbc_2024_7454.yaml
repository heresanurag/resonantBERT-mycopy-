title: Bird mimicking police siren at Bicester station confuses officers - BBC News
date: '2024-04-12'
section: General
url: http://www.bbc.co.uk/news/uk-england-oxfordshire-68785461
content: |-
  The call was so similar to the two-tone siren that officers thought their cars were faulty.

  A bird's impression of a police siren was "so accurate" it left officers believing their cars were faulty.

  Thames Valley Police's roads policing team, based at Bicester police station, were left "a little bit confused" by the two-tone impression.

  Posting on social media, a team spokesperson promised it was "100% real and NOT a late April Fools joke".

  Followers on X, formerly known as Twitter, replied asking if the bird was part of "special branch" or the "flying squad".

