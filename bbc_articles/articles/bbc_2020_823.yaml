  Live coverage after the US Senate clears Donald Trump of abuse of power and obstruction.

  Live coverage from Washington DC, as President Donald Trump's impeachment trial continues in the Senate.

  The impeachment is in its final stages as senators prepare to cast their final vote on Wednesday, with acquittal almost certain.
