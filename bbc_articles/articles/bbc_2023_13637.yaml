title: 'Actors'' strike: Hollywood prop shop hit by halt to filming - BBC News'
date: '2023-09-25'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-66305982
content: |-
  The actor and writer strikes have brought the film-making industry to a stand-still.

  The dual actor and writer strike, which advocates for better wages, residuals and AI regulations, has brought the film-making industry in Los Angeles to a standstill.

  The owner of a rental shop said his business has about a month before he'll be forced to auction off the thousands of props he rents out to movies and television.
