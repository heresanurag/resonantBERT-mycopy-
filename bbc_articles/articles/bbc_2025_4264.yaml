title: 'Sir Keir Starmer: ''I''m clear Trump wants lasting peace'' - BBC News'
date: '2025-03-02'
section: General
url: http://www.bbc.co.uk/news/videos/cpwd75kxjnvo
content: |-
  Sir Keir Starmer has said he believes US President Donald Trump "wants lasting peace" in Ukraine.

  Prime Minister Sir Keir Starmer has said it is not in the UK's "national interest" that the war in Ukraine continues

  Speaking on the Sunday with Laura Kuenssberg programme, Starmer said US President Donald Trump "wants lasting peace" in the eastern European country - adding that Ukraine's President Volodymy Zelensky "agrees" with Trump.

  "Nobody wants this conflict to go on, least of all the Ukrainian," Starmer said.

  His comments came after an Oval Office meeting between Trump and Zelensky descended into a row on Friday, with the two leaders engaging in a robust back and forth which also included the US Vice-President JD Vance.
