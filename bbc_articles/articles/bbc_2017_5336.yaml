  • None Chelsea won their sixth top-flight title and fifth in the Premier League era. Only Manchester United (13) have won more Premier League titles.
  • None Chelsea are the first club to win the English top-flight title on a Friday since Arsenal at Anfield in 1989.
  • None Conte is the fourth Italian manager to win the English top-flight title after Ancelotti, Roberto Mancini and Claudio Ranieri.
  • None Chelsea scored with their 23rd shot of the match at West Brom.
  • None A Belgian player has scored the title-deciding goal in each of the past three Premier League seasons (Batshuayi v West Brom in 2016-17, Eden Hazard v Tottenham in 2015-16 and v Crystal Palace in 2014-15).

  Chelsea still have two games to play in their title-winning season. They host Watford on Monday (20:00 BST) before receiving the trophy in their final game against relegated Sunderland at Stamford Bridge on Sunday, 21 May (15:00 BST). They then have the FA Cup final on 27 May.

  West Brom travel to Manchester City on Tuesday, 16 May before finishing their season at Swansea the following Sunday (15:00 BST).
