content: |-
  A look at who is playing, and when, to help plan your weekend of music at the UK's biggest festival.

  Glastonbury is UK's biggest festival, attracting the equivalent of more than two Wembley Stadiums' worth of fans

  Glastonbury Festival is in full swing, with 200,000 revellers at Worthy Farm for a weekend of music, comedy, poetry, dance and theatre. Dua Lipa, Coldplay and SZA are headlining the Pyramid Stage, with other highlights including Shania Twain, Jungle, Disclosure, Avril Lavigne, Fontaines DC, Peggy Gou, The National, Burna Boy, Janelle Monae, Jessie Ware and Charli XCX. If you don't have a ticket, you can follow all the action on BBC television, radio, iPlayer and BBC Sounds - with more than 90 hours of live coverage over the weekend. To help you plan, here is the full line-up and set timings across Glastonbury's 10 biggest stages.
  • None This Is The Kit: 16:30 – 17:30

  The full line-up, which runs to more than 100 stages and over 2,000 acts, can be seen on the official Glastonbury website, external.

  The famous Pyramid Stage has been lit up with fireworks
