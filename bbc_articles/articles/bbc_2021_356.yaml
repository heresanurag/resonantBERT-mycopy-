title: Your pictures of Scotland 15 - 22 January - BBC News
date: '2021-01-22'
section: Scotland
url: https://www.bbc.co.uk/news/uk-scotland-55705764
content: |-
  A selection of your pictures of Scotland sent in between 15 and 22 January. Send your photos to scotlandpictures@bbc.co.uk. Please ensure you adhere to the BBC's rules regarding photographs that can be found here.

  Please also ensure you follow current coronavirus guidelines and take your pictures safely and responsibly.

  Conditions of use: If you submit an image, you do so in accordance with the BBC's terms and conditions.

  Hot dog: Ann Baldwin thinks it looks warm enough for a swim in this shot looking towards Inchcolm Island and Arthur’s Seat from the sailing club in Dalgety Bay, Fife, 10 minutes before sunrise.

  Little sucker: Tessa McAndrew helped this beautiful octopus back into the water after finding him clinging to driftwood on the beach at Lower Largo.

  Windswept: Bad hair day for these trees in the Pentland Hills Regional Park in Edinburgh. Claire Dunbar took this picture during one of the many recent snow dumps in the area.

  Intricate web: The sun was making an attempt to defrost this frozen spider web in Colin Sergeant's back garden in Motherwell.

  Hindsight: David Fox thinks this roe deer fawn that he captured on his camera at Strathbraan in Perthshire will be "a future Monarch of the Glen".

  True snowman: Only Gordon Brandie knows what this Highland fling snowman is wearing under his kilt and peg sporran in Faskally, Perthshire.

  Still life: Artistic beauty found when looking through a drainage hole in the Arbroath sea wall.

  Blurred lines: Sunrise on top of Falkland Hill in the early hours of the morning, taken by Jordan Moreham.

  Stick together: Judith McIntyre spotted these wooden friends huddling to keep warm this winter in Kingston, Moray.

  Howling wind: Three-year-old Poppy enjoying a very windy afternoon walk on Craiglockhart Hill in Edinburgh with her mum, Sophia Lyons.

  Collectivism vs Individualism: Victor Tregubov took this shot of birds in countryside near Glasgow.

  Strike a pose: Colin Little on the bank of the River Lossie in Elgin, said: "This otter posed for a couple of shots before diving under again."

  Black and white: Derek Brown took this snowy scene in Stow just outside Galashiels in the Scottish Borders.

  Ebb and flow: Michelle Moggach said it was "Baltic but beautiful" at Aberdeen Beach while she gazed at the sea.

  Alan Kemp said about 100 fieldfares descended on his pink berry Rowan trees in Murthly, Perthshire and devoured the lot in one sitting.

  Mindfulness: Shirley Faichney captured a zen moment during a recent sunrise at West Wemyss beach in Fife.

  Bridge to nowhere: Rachel Abbie was left puzzled as to where her walk was leading at Belhaven Beach in Dunbar.

  Winter wonderland: The path for Ross McKellar looks bright in High Blantyre in Glasgow.

  Autumn meets winter: Agnes Neal observed a sole woman walking through this peaceful scene in Queen's Park in Glasgow.

  Squirrel Nutkin: David Doogan loves it when this bushy-tailed friend joins him for a picnic in his garden in Glencoe, Argyll.

  Top of the world: ...well it was for Katie Gillingham and her friends on Goatfell on the Isle of Arran this week.

  Ethereal moonlight: Arletta Babicz thought there was a "magical vibe" when he took this shot of the most photographed tree in Scotland at Loch Lomond.

  Follow the herd: Christopher Barrow thought it was funny when this flock of sheep kept following him while he was out skiing in Almondbank, Perthshire.

  Pillars of the community: Poll nan Crann pier, known locally as Stinky Bay due to the large amount of seaweed blown onto the beach by storms which then rots in the sun. Seonaidh MacInnes took this picture at night on the Isle of Benbecula.

  Rising above the herd: Jim Clark thought this beast could have been thinking outside the box when he captured this shot at Glanderston Dam, Barrhead.

  Virgin powder: Dan Price-Davies enjoyed Alpine conditions at Clashindarroch Forest while Nordic skiing with his son, Lestin, this week.

  Cloud inversion: Steve Mitchell took in this stunning view overlooking a snowy drystone dyke at the top of the Cairn o' Mount (B974) road between Banchory and Fettercairn.

  Winter Washingland: Louise Harper took this picture of colourful plastic pegs with no job to do during heavy snow in Motherwell.

  The Night Walker: Tamar Lewis thought there was an eerie glow in the sky as she took an evening stroll through Pollok Country Park.

  Stripped bare: This dead-looking tree brings life to Dave Cullen's picture of the Cramond landscape in Edinburgh.

  Duck down: All but one mallard enjoying the food thrown to them at St Fillans in the snow, taken by Kenn Begley.

  Winter coat: Glen Tanar cleansed in white, near the summit of Baudy Meg in Aberdeenshire, taken by Neil Marchant.

  Fyrish sunrise: It's as if Sir Hector Munro ordered his monument to be put in the best light possible for Laura Steel who took this picture in Evanton near Alness.

  Sun and shadows: Michal Markowski took this eye-catching picture in West Linton using a drone.

  Hair ice: Jane Tweedie noticed this rare phenomenon while out walking at Craigellachie, Moray. It is also known as ice wool or frost beard and is a type of ice that forms on dead wood and takes the shape of fine, silky hair.

  Udderly mootiful: Izabela Bodzioch took this picture of cows admiring the view of Ben Cruachan covered in snow.

  Ice bath: Jan Overmeer said he changed his mind about going for a swim in Loch Carron when he was greeted by this frozen scene.

  Jack Frost: Graeme Mackay was mesmerised by the patterns Mother Nature had made on the sunroof of his car in Aberdeen.

  Swan Lake: Bob Smart captured the sheer power and might of this magnificent bird at Townhill Loch in Fife.

  Fine sunset: James MacArthur captured the fresh breath of brightness burning the last corner of Loch Fyne as the sun dropped below the skyline.

