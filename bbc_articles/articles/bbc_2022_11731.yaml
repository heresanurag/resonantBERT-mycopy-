title: 'In pictures: Sydney darkens opera house as world mourns Queen''s death - BBC
  News'
date: '2022-09-10'
section: US & Canada
url: http://www.bbc.co.uk/news/world-us-canada-62841762
content: |-
  Condolences pour in from around the globe following news of the British monarch's death.

  In Australia an image of the Queen is projected onto the sails of a darkened Sydney Opera House in tribute

  Condolences have poured in from around the world following the death of Queen Elizabeth II.

  A portrait of the Queen draped with black ribbon sits alongside books of condolences at Queen's Park Legislative Assembly, Ontario, Canada

  Crowds have gathered to mourn and leave flowers in the Queen's memory.

  In Moscow a mourner pays tribute before a portrait of the Queen that has been set up at an Anglican church in the Russian capital

  Candles burn in memory of the Queen in Prague, Czech Republic

  In Tokyo, Japan a woman pays her respects before a tribute to the Queen that appeared outside the British embassy

  Art students in Mumbai paint commemorative portraits marking the end of the Queen's reign

  The city council in Benidorm, Spain, installed a flagpole with a union flag at half mast

  In the 56 nations of the Commonwealth, national leaders broke the news and paid tribute to the Queen. President Nana Akufo-Addo of Ghana praised her role in overseeing "the dramatic transformation of the Union".

  Newspapers in Nairobi, Kenya, paid tribute to the Queen

  The UK's longest-serving monarch died at Balmoral aged 96, following a 70-year reign.

  Mourners remembered the Queen at a waterfront ceremony in Nice, France on the Promenade des Anglais

  On the outskirts of Amritsar, in India, a paper artist holds up a model of London's Tower Bridge adorned with a special tribute

  European energy and climate ministers observe a minute of silence in the Queen's memory before meeting in Brussels, Belgium

  Books of condolence have been open around the world for dignitaries and members of the public to sign.

  An entry handwritten by South Korean President Yoon Suk-yeol in a book of condolence at the British embassy in Seoul

  A sculpture created by Sudarshan Pattnaik at the Bay of Bengal Sea's Puri beach, India

  Items left by the public outside the British embassy in Berlin, Germany
