  Will the policy shift stick? Schools have historically struggled to find a balance between safety and limiting the siren call of social media. Ken Trump, the president of the National School Safety and Security Services, said that policies would not work without strong community consensus and consistency in enforcement. "There’s a lot more to it than the average parents or other person looking from afar would think. It’s a wicked problem, there are a lot of complexities to it,” said Mr Trump. In Los Angeles, board members voted on Tuesday to ban the devices from next year. But how the policy will work is still not clear. Alyssa, an 18-year-old from Los Angeles where many schools have thousands of pupils, told the BBC she could not imagine being in high school without a phone. “We have huge campuses – no one can monitor all that,” she said. “There are tons of areas where you can go and not be seen.”
