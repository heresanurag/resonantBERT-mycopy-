content: |-
  Chloe Ferris, who died in a Belfast club on Sunday, is described as "bubbly, bright and beautiful".

  Chloe Ferris died in Lux nightclub in the early hours of Sunday

  Chloe Ferris, who died at a Belfast nightclub in the early hours of Sunday, has been described as "bubbly, bright and beautiful" in tributes after her sudden death. The emergency services were called to Lux nightclub in the city centre at about 02:20 GMT after reports that two women had fallen unconscious. Ms Ferris, who was in her 20s, had died by the time police had arrived. The other woman who lost consciousness in the nightclub was taken to hospital where she is undergoing treatment.

  A death notice for Ms Ferris described her as a "beloved daughter" and "much loved" sister aunt, niece, and cousin. It added she was part of the “Sister Squad” and a friend to many.

  Emergency services were called to the venue at about 02:20 GMT on Sunday

  Ms Ferris was a former pupil of St Clare's Primary School in west Belfast. The school issued a statement saying she always had a smile on her face and will not be forgotten. "Chloe is fondly remembered by her teachers... as a warm, positive and bubbly girl," they said. The school also commented on how Ms Ferris had "shone on stage" in a production of Grease. Replying to the school's tribute on Facebook, one mourner wrote: "I had the privilege to teach Chloe. She was such a bubbly, bright and beautiful girl." Another Facebook user said Ms Ferris had a "beautiful, genuine soul with the biggest heart and personality I have ever met". In a statement, a spokesperson for Lux nightclub said: "Our thoughts and sympathies are with the parents and family during this very difficult time."
