content: |-
  No-one was injured in the incident, which occurred during heavy rains in Bihar state.

  A video shows a two-storey building collapsing into the overflowing Ganges river in the northern Indian state of Bihar. No-one was injured in the incident, which occurred earlier this week in Bhagalpur district.

  At least 10 people have died in Bihar after heavy rainfall caused flooding in several parts of the state. Relief and rescue teams have been deployed to the affected areas.
