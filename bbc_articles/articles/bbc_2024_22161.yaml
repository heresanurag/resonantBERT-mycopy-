content: |-
  A woman, 26, and man, 25, have been arrested on suspicion of murder after a baby died.

  A man and woman were arrested after a baby died in a property on Sherwin Road, Stoke-on-Trent

  Two people have been arrested on suspicion of murder after a baby died in Stoke-on-Trent. Police and the ambulance service were called to Sherwin Road, Burslem, shortly after 09:00 BST on 27 August following the death of a baby boy. A woman, 26, and man, 25, were arrested on 30 August on suspicion of causing or allowing the death of a child. The pair, from Stoke-on-Trent, were further arrested on suspicion of murder on Tuesday, Staffordshire Police said.

  A spokesperson for the force said specialist officers were supporting the baby's family. Det Insp Gina Pope said officers were working to establish the circumstances surrounding the child's death and urged people not to speculate on social media. “This is a distressing incident which will have shocked the local community," she said.

