title: Princess Charlotte joins Duke and Duchess at Commonwealth Games - BBC News
date: '2022-08-02'
section: Birmingham & Black Country
url: http://www.bbc.co.uk/news/uk-england-birmingham-62400110
content: |-
  The Duke and Duchess of Cambridge were in the crowd for swimming, hockey and gymnastic events.

  The family visited Sandwell Aquatics Centre to watch the men's 1,500m freestyle event

  Princess Charlotte joined her parents the Duke and Duchess of Cambridge on a visit to the Commonwealth Games.

  The trio watched swimming, hockey and gymnastics while in Birmingham.

  They also paid a visit to SportsAid, which supports young athletes, where Princess Charlotte placed a medal on its medal board.

  The Earl and Countess of Wessex and their children, Lady Louise and James, Viscount Severn, also attended the Games on Tuesday.

  England's women went on to win the hockey game 3-1

  Before Prince William and Katherine's arrival, Prince Edward, who is vice patron of the Commonwealth Games, spoke with former prime minister Theresa May as he entered Sandwell Aquatics Centre during the men's 1,500m freestyle heats.

  The royals cheered and applauded alongside the crowd for England 1,500m freestyle hopeful Luke Turley.

  He won the second heat in 15:35.65, with Northern Ireland's Daniel Wiffin just under two seconds behind in second place, meaning both qualify for the final.

  Prince William posed for photgraphs with spectators during the swimming event

  In the afternoon, the duke and duchess watched the hockey as England's women took on India at the University of Birmingham's Selly Oak city campus.

  The team went on to win 3-1, making it three wins out of three in their competition so far.

  The family were later seen at the Arena Birmingham, which was hosting the artistic gymnastics, where England's Jake Jarman won fourth gold medal to become the most successful English male gymnast at a single Games.

  Princess Charlotte placed a medal on a Team England medal chart while on a visit to Sport Aid

  His teammate Alice Kinsella also took gold in the floor event.

  England finish the Games with 16 gymnastics medals, 10 of which are gold.

