title: Scottish tourist Grant Paterson dies after Rome holiday explosion - BBC News
date: '2025-04-01'
section: Glasgow & West Scotland
url: http://www.bbc.co.uk/news/articles/c0el15pj9z1o
content: |-
  Grant Paterson was on a break in Rome when the B&B in the city's Monteverde area collapsed on 23 March.

  Grant Paterson was described as a "true gentleman" by his employer CalMac

  A Scottish tourist has died from his injuries after his holiday home was destroyed in a suspected gas explosion. Grant Paterson, from East Kilbride, was on a break in Rome when the B&B in the city's Monteverde area collapsed on 23 March. The 54-year-old, who worked for ferry operator CalMac as a senior catering rating, was understood to have suffered burns on 75% of his body after the explosion. His employer described him as a "true gentleman" and said colleagues were "distraught" at his death.

  Mr Paterson had arrived in Rome a few days before the building collapsed.

  Diane Burke, CalMac's Chief Operating Officer, said: "Everyone at CalMac is distraught that Grant has passed away. He was a true gentleman and a credit to MV Clansman, the vessel he served aboard. "During a distinguished 12-year career with us, he embodied the very best of CalMac and, with his larger-than-life character, he was much-loved by colleagues and passengers alike. "Our thoughts are with Grant's friends and family at this extremely difficult time." In a statement the mayor of Rome, Roberto Gualtieri, said the news "saddens all of Rome". He added: " I want to express my personal condolences and those of the entire city to his loved ones and fellow citizens. I sincerely hope that the investigations into the incident will swiftly shed light on this terrible accident." Mayor Gualtieri had already ordered an investigation into the collapse. At the time of the incident he said the burns suggested an "explosion caused by gas, which also causes flames." He added: "It was a very loud explosion, a building collapsed and the wall of Villa Pamphili was also damaged." Social media posts show Mr Paterson visited famous sites such as the Colosseum and the Pantheon before the explosion. A fundraiser, external organised by a friend of Mr Paterson and aimed at raising funds for him and his daughter had raised over £12,000. A spokesperson for the Foreign Office said: "We are supporting the family of a British man who died in Italy and are in touch with the local authorities."
