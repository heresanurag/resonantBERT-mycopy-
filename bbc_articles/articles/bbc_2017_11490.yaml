title: Five hurt as car crashes into New Romney pub - BBC News
date: '2017-11-25'
section: Kent
url: http://www.bbc.co.uk/news/uk-england-kent-42122108
content: |-
  The driver had to be cut free from the wreckage after a car crashed into the Cinque Port Arms.

  This video can not be played To play this video you need to enable JavaScript in your browser. Five people were hurt when the car crashed into the pub on Friday night

  Five people have been injured and a man arrested after a car hit a pub in Kent.

  Four of those hurt were customers at the Cinque Port Arms and police said the fifth was the vehicle driver.

  Emergency crews were called to the crash at the busy New Romney pub at about 22:00 GMT on Friday.

  Pub owner Kevin Gibbons said a man had been escorted off the premises and subsequently got in his car which then crashed into the front of the building, injuring patrons and staff.

  Mr Gibbons said the man, in his 20s, was unknown to pub staff.

  He said customers and children upstairs had to be evacuated from the building.

  "We have had builders working throughout the night to make the pub structurally safe and will be carrying on with business as usual sometime today," he said.

  Mr Gibbons, describing the Cinque Port Arms as a community pub in the heart of New Romney, said it was a "one-off" incident.

  He said he could not comment further because of the ongoing police investigation.

  Customers and children upstairs were evacuated from the building

  Of those injured, three people who were at the pub - patrons and staff - and the driver, needed hospital treatment. None of their injuries were life-threatening.

  The fourth person injured did not need hospital treatment.

  Work took place overnight to make the pub structurally safe

  Kent Fire and Rescue Service said the driver of the car had to be cut free from the wreckage after the crash in the High Street.

  A 24-year-old man from New Romney has been arrested on suspicion of assault and remains in custody.
