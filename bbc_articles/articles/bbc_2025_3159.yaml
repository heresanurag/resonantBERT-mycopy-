date: '2025-03-01'
section: UK
url: http://www.bbc.co.uk/news/articles/c4gd8l1945eo
content: |-
  Police say they want to say more about cases when accusations of a cover-up could result in violence.

  Police want power to release more details on some cases

  Police want the freedom to release more details of some investigations in an effort to prevent misinformation that could result in threats to public safety or national security. In a submission to a review of contempt of court laws, three national policing bodies have said that they should be allowed to say more when a "tipping point" is reached and accusations of a cover-up could result in violence. It follows the Southport knife attack in July, when misinformation about the attacker snowballed on social media, which Merseyside Police did not initially counter, leading to riots across the UK. Current laws prevent certain details in ongoing criminal cases being published before a trial, so that it does not prejudice the jury.

  Merseyside Police was criticised for not giving early details of Axel Rudakubana, the man later convicted of the murders of three young girls in Southport, when posts on social media falsely suggested he was an asylum seeker and potentially an Islamist extremist. The early police communications strategy was based on advice from prosecutors, the force's chief previously said. Now, there is a review examining Britain's strict laws on what can be published during an ongoing criminal investigation and how the justice system should respond to breaches. In its submission to the review, the National Police Chiefs' Council, College of Policing and Counter Terrorism Policing said the criminal justice system should reach a "collective view" of how to balance the need for a defendant to get a fair trial and the need to maintain public order. "We would welcome recognition of the role unchecked misinformation and disinformation about high profile criminal incidents, that rightly concern the public, can have in creating a febrile environment where the risks of disorder breaking out is higher," the submissions stated. "We would like the legal framework to acknowledge that this risk exists. "We do believe there is room to offer stronger reassurance in cases where a tipping point has been reached and where releasing information that could help counter misinformation and disinformation to address public safety risks would be helpful. "Flexibility is required to mitigate the clear risks to public safety." The police submission points out that in other countries more information is made public. In August 2024, Austrian police disrupted a plot to attack a Taylor Swift concert in Vienna.
  • None Details of chemical substances and devices found in the main suspect's home
  • None Details of the arrest and that one of the suspects did not resist arrest
  • None A summary of what the suspects had said when interviewed by police, including discussing their plans to kill and that they had uploaded to the internet an oath of allegiance to ISIS
  • None Details of the authorities' views on the suspects' mindset and ideology that had inspired them "When the public in the UK look at media reporting of cases like this and see that the Austrian public is being given information that policing in this country would say cannot be shared at that stage in order not to prejudice a trial - they have every right to wonder if this is true," the submission said.

  In the Southport case, when the killer was arrested, very little information was given. False online rumours spread online hours after the attack that the perpetrator had been an asylum seeker and potentially an Islamist extremist, and a violent protest took place close to the scene the following day. Riots, in which mosques and hotels housing migrants were attacked, soon spread around the country. In a press statement at 17:25 on 29 July 2024, the day of the murders, the police said only that a "17-year-old male from Banks" had been arrested in connection with the murders. The Merseyside Chief Constable Serena Kennedy wanted to reveal the suspect's religion to counter suggestions that what had happened had been a terrorist attack by an Islamic extremist. She told the Home Affairs Select Committee on Tuesday that she explained to the deputy regional prosecutor for the Crown Prosecution Service: "I need to help my colleagues out, my fellow chief constables. Some of the streets of the UK are on fire and I need to help them as much as I can." But she said the CPS were concerned that including the detail about the suspect's religion could interfere with a future criminal case. Later the national CPS said it was happy to include the religion detail, but it was too late. Ms Kennedy told MPs: "By that time, we were downstairs and we were preparing for the press conference so that was not seen by ourselves." The police submission to the Law Commission review also calls for a tougher line to be taken with "individuals with significant public profiles, some in elected office" who use their platform to "fuel narratives of conspiracy and cover-up".
