content: |-
  There are many unanswered questions on what exactly led to a deadly multiple train collision in India.

  This video can not be played To play this video you need to enable JavaScript in your browser.

  There are many unanswered questions on what exactly led to a deadly multiple train collision in India on Friday evening that killed at least 288 people and injured more than 800.

  Two express passenger trains and a freight train were involved in a "three-way accident" near a small station in eastern state of Odisha, according to reports. One of them collided with the stationary freight train, and its coaches flipped over to a third track, causing an incoming train to derail. A preliminary report indicates that the accident was the result of signal failure.

  Only a comprehensive inquiry will help uncover the truth behind the incident. Yet it has once again ignited fresh concerns regarding railway safety in India.

  India's expansive railway system - one of the world's largest - carries some 25 million passengers every day across a countrywide network of tracks spanning more than 100,000km (62,000 miles). Some 5,200km of new tracks were laid last year, according to Railway Minister Ashwini Vaishnaw. Also 8,000km of tracks were being upgraded every year, the minister said.

  Mr Vaishnaw recently revealed in an interaction that the majority of the tracks were undergoing upgrades to accommodate trains running at speeds of up to 100 km/h, a substantial portion was being enhanced for speeds of up to 130km/h, and a significant segment was being prepared for the high speeds of up to 160km/h.

  Clearly, this is part of the government's plans to run faster trains across the country - a genuinely high-speed line is separately being built between the financial capital of Mumbai and the city of Ahmedabad.

  Yet, derailment continues to be a "bugbear for the railways", a former Railway Board chairman, Vivek Sahai, told me. A train can derail for a number of reasons - "a track could be ill-maintained, a coach could be faulty, and there could be an error in driving".

  The Coromandel Express derailed and flipped over into the adjacent track where it was hit by an oncoming train

  A government railway safety report for 2019-20 found derailments were responsible for 70% of the railway accidents, up from 68% the previous year. (Train fires and collisions came next, responsible for 14% and 8% of the total accidents respectively).

  The report counted 40 derailments involving 33 passenger trains and seven freight trains during the year under review. Of these 17 derailments were caused by track "defects" - this could include fractures and subsidence of tracks.

  Only nine incidents of derailments were caused because of defects in trains - engines, coaches, wagons - according to the report.

  Railway tracks, composed of metal, undergo expansion during the summer months and contraction in winter due to the fluctuations in temperature. They require regular maintenance - tightening loose track components, changing sleepers, and lubricating and adjusting switches, among other things. Such track inspection is done on foot, by trolleys, locomotives and rear vehicles.

  India's railways recommend that track-recording cars meticulously evaluate the structural and geometrical integrity of tracks designed to sustain speeds ranging from 110km/h to 130km/h at least once every three months.

  A report on derailments by federal auditors between April 2017 and March 2021 had some disturbing findings:

  There has been a lot of talk about anti-collision devices to be installed on Indian trains, but the system is now only being installed on two major routes - between Delhi and Kolkata and between Delhi and Mumbai - according to a railway official. It is also not clear how such a system would have helped in the event of a derailment or a "freak" collision.

  In 2010 more than 150 people were killed when a passenger train derailed and collided with a an oncoming freight train in West Bengal

  In 2010 more than 150 people were killed when a passenger train derailed and collided with an oncoming freight train in West Bengal. Investigators said Maoist rebels had sabotaged the track causing the Kolkata-Mumbai passenger train to derail, throwing five of its carriages into the path of the oncoming good trains. There has been no hint of sabotage yet in Friday's accident.

  According to the railways, there were 34 "consequential rail accidents" - collisions, derailments, fire or explosion in trains, road vehicles colliding with trains at level crossings - during 2021-22, up from 27 such accidents during the previous year. The Hindu newspaper reported on 31 May that the number of such accidents had risen to 48 in 2022-2023.

  Presciently, the report said the railway authorities were worried about the increase in accidents, and had asked their senior manager to "critically analyse long working hours of crew especially in East Coast Railway and South East Central Railway, and take corrective action urgently". Friday evening's accident happened in the busy East Coast Railway zone.

