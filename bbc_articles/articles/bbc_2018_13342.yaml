title: The long battle against California wildfires - BBC News
date: '2018-11-10'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-42346176
content: |-
  Fire crews continue to battle one of the largest and most destructive wildfires in the state's history. The Thomas fire in Santa Barbara and Ventura counties is only 30% contained as it enters a second week.
