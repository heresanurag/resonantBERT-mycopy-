  Gordon Ramsay and Adam Peaty get together before the Paris Olympics to chat about everything from food to fame.

  In this in-depth interview, Peaty opens up about his difficult journey to the Games, his return to form and how he has found happiness away from the pool.

  Follow the Paris 2024 Olympics across the BBC from Friday, 26 July.
