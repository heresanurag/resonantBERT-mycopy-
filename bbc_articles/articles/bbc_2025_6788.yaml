  Bodies are seen on the street after the shooting which reportedly happened outside a Birmingham hookah lounge.

  Four people were killed and 17 others injured in a shooting in the US city of Birmingham, Alabama, on Saturday night.

  Footage shows chaos on the street immediately after the incident, which reportedly happened as patrons queued to enter a hookah and cigar lounge.

  Police are still looking for a suspect and rewards for information leading to an arrest now total $100,000.

