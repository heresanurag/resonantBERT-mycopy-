content: |-
  The latest updates on the coronavirus pandemic in Scotland.

  SNP leader at Westminster Ian Blackford: "Boris Johnson's breathtaking arrogance sends out the message that there is one rule for the Tory government and another for the rest of us.

  "There is no question that Dominic Cummings broke the rules the minute he chose to drive to Durham. He is fatally undermining the public health message and must go."

  Scottish Conservative leader Jackson Carlaw: "I've heard what the Prime Minister has said and it is a situation for him to judge. He has reached a conclusion and we must all now focus on continuing to beat this dreadful pandemic.

  "The Scottish Conservative focus will be on challenging the Scottish government and demanding that promises both to protect care homes and isolate the disease are kept.”

  Scottish Greens co-leader Patrick Harvie: "In failing to sack Dominic Cummings, Boris Johnson has once again proven himself to be completely unfit for office.

  "He has recklessly chosen to defend his adviser at the cost of undermining vital public health guidance and in breach of his government’s own regulations at a time when the overwhelming majority of people across the UK are making huge sacrifices for the greater public health good."
