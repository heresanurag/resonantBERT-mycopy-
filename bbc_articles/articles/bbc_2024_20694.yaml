content: |-
  The majority of Monday's front pages lead with stories on the violence over the weekend.

  'Far right on rampage' and 'Tommy Robinson in Cyprus'

  In Rotherham, hundreds clashed with riot police before storming a Holiday Inn Express hotel housing asylum seekers

  Photographs of the disorder across parts of England dominate the front pages of Monday's morning papers. "Shame on you" is the headline on the front of Metro, external, alongside a photo of a man wearing a Union Flag face mask. The Daily Mirror, external features a picture, taken from behind a police line, of a mob throwing objects at the officers - the headline reads "under siege". Writing in The Times , externalthe home secretary says the government has increased the number of prosecutors, put courts on standby and made prison places available, in preparation for the "many more" arrests which will follow in the coming days. The paper says Yvette Cooper points out those who "whip up" hatred online will face the same "reckoning" as those involved in the clashes.

  In the Guardian, external, the spokesman for senior police on public order, Chief Constable Ben-Julian Harrington, said a range of criminal offences were being investigated for those involved, saying social media is being used in the "incitement and encouragement" of violence. He says people in foreign countries are putting out disinformation, and that the former English Defence League leader Stephen Yaxley-Lennon, also known as Tommy Robinson, is "one among many". The Daily Mail, external features a photo of Tommy Robinson on holiday in Cyprus. "Stoking race riots from his sunbed," reads the headline. The paper says he posted more than a hundred times on X over the course of the weekend, with millions of views. In other news, the Daily Telegraph, external reports Royal Navy ships and RAF helicopters have been put on standby in the Middle East. It says military personnel have been deployed to embassies in the region, as fears mount of a wider regional conflict. It says officials in the region believe an attack by Iran could come as early as today. Finally, the editorial in the Daily Star, external strikes a wistful note; "these may not be the cuddliest of critters, but we rely on them far more than we perhaps realise."

