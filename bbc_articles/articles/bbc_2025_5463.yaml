content: |-
  The BBC's analysis editor takes a look at President Trump's history with Ukraine - and how it set the stage for this week's events.

  Volodymyr Zelensky has pledged to "make things right" after Donald Trump paused military aid to Ukraine following a tense meeting in the Oval Office.

  But that heated exchange between President Trump and President Zelensky is by no means the first time the two men have crossed paths. In 2019, President Trump faced an impeachment inquiry over a call with the newly elected President Zelensky.

  The BBC's analysis editor Ros Atkins takes a look at the wider context.
