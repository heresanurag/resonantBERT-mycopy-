title: Jennifer Lopez surprises drag queen performing as her - BBC News
date: '2024-06-01'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-68039034
content: |-
  Jo Lopez, a drag artist in California, had just finished his show when the real-life superstar snuck onto the stage behind him.

  Drag artist Jo Lopez had just finished performing the song "Can't Get Enough" when the real-life Jennifer Lopez snuck onto the stage, surprising the packed crowd at the iconic West Hollywood gay bar The Abbey.
