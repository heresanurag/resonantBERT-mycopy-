title: Bumblebee spotters asked to help Royal Parks - BBC News
date: '2024-02-23'
section: General
url: http://www.bbc.co.uk/news/uk-england-london-68369259
content: |-
  Warming conditions are forcing queen bees to emerge from hibernation earlier than usual, experts say.

  Queen bumblebees are emerging earlier from hibernation due to increasing temperatures, experts say. However, this premature awakening can put their lives at risk as many flowers are not in bloom and future cold snaps can be fatal.

  To combat this, the Royal Parks charity is asking visitors to photograph any bumblebees they across its eight parks and to register the findings. The scheme is funded by the People's Postcode Lottery and runs from 21 February to 1 March.
