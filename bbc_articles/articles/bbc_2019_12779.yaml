  The probe was assembled in Stevenage, UK, by Airbus (Britain has invested €220m in the €1.5bn project), with the past year spent here at the IABG facility in Ottobrunn, Germany, for testing.

  The spacecraft has cleared its checks and will now ship out to Florida to be mated with the United Launch Alliance Atlas rocket that will hurl it towards the Sun in early February.

  SolO was first conceived in the late 1990s with the industrial contract to produce it awarded in 2012.

  A key challenge has been to mature technologies that can protect a probe that flies to within 43 million km of our star.

  Temperatures at this proximity will get up to 600 degrees.

  SolO's plan to survive these conditions involves hiding behind a large titanium shield, and cooling itself with a complex series of radiators.

  Sophisticated fault-recovery systems will also ensure SolO stays out of trouble.

  "If we de-point, we very quickly run into difficulty thermally," explained Airbus project manager Ian Walters.

  "Our requirement is to make sure we recover under any failure scenario within 50 seconds and actually our spacecraft will go back to normal pointing in 22 seconds, all autonomously."

  The heatshield has peepholes to allow the telescopes to see the Sun

  But the probe still needs to observe the star and to do that it must use peepholes in the shield.

  These will briefly open to allow the telescopes to grab their observations before closing shut again.

  The pictures and movies that come back will be unprecedented in their fine resolution.

  Features as small as 70km across will be visible.

  "It's amazing; every time we get better resolution we see more and more," said Holly Gilbert, the US space agency's deputy project scientist on the mission.

  "The interactions between the Sun's plasma (energetic gas) and its magnetic field are incredibly dynamic, not just on the large scales but on the very, very small scales.

  "When the magnetic fields interact in a very explosive process called reconnection - that's a very small region.

  "And to see how that leads to eruptions, we need to see the small stuff that's happening."

  One of the major differences between this mission and all previous such ventures is that SolO will get to take the first close-up images of our star's polar regions.

  The high latitudes are known to be significant locations for magnetic behaviour and the generation of the fastest outflows of particles.

  "We've never seen the solar poles directly because from Earth we just have a very grazing view," said Frédéric Auchère, a mission principal investigator from the Institut d'Astrophysique Spatiale, Orsay, France.

  "But these regions are very important because they are the source of the very fast solar wind and we also know that in the solar interior things are happening at the poles that may be the key to understanding solar activity and the solar cycle."

