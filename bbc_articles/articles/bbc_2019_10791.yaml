title: Destiny's Child songwriter LaShawn Daniels dies at 41 - BBC News
date: '2019-09-04'
section: Entertainment & Arts
url: http://www.bbc.co.uk/news/entertainment-arts-49580870
content: |-
  He co-wrote songs like Destiny's Child's Say My Name and Lady Gaga's Telephone.

  LaShawn Daniels, the US songwriter who co-wrote such hits as Destiny's Child's Grammy-winning Say My Name and Lady Gaga's Telephone, has died aged 41.

  Daniels, who was known as Big Shiz, also worked with artists including Whitney Houston, Michael Jackson, Brandy and Toni Braxton.

  He died in a car crash in South Carolina, his wife April confirmed.

  Tributes came from the likes of singer Kehlani, who wrote on Twitter that "your legacy will never be forgotten".

  In a statement on Instagram, April Daniels wrote: "It is with deep and profound sadness that we announce the passing of our beloved husband, father, family member and friend Lashawn Daniels, who was the victim of a fatal car accident in South Carolina.

  "A Grammy Award-winning producer and songwriter, Daniels was a man of extraordinary faith and a pillar in our family. We would like to express our sincere appreciation for the continuous outpouring of love and sympathy."

  Dawn Richard, a former member of the groups Danity Kane and Dirty Money, said he was "one of the funniest people with the best heart".

