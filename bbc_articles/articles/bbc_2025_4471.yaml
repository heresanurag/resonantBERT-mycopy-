title: Prince William sends message from tank near Russian border on Estonia trip
  - BBC News
date: '2025-03-21'
section: Europe
url: http://www.bbc.co.uk/news/articles/c70eyg099j5o
content: |-
  Prince William joins a training exercise by soldiers in Estonia guarding Nato's eastern border with Russia.

  This video can not be played To play this video you need to enable JavaScript in your browser.

  If royal visits are about sending a message, then the picture of the Prince of Wales in a tank near the Russian border must be one of the most direct. Prince William has come to Estonia to support UK troops in what is now the British Army's biggest operational deployment overseas, defending the Baltic state from the threat of Russia. On Friday, in a freezing cold, mud-churned military training area, the prince saw the soldiers and military equipment guarding Nato's eastern flank. The prince, in camouflage uniform, peering from a Challenger 2 tank and then an armoured fighting vehicle, was sending a signal about the UK's commitment to deter any aggression from Russia.

  The Prince of Wales took his seat in a Challenger 2 tank during a visit to Tapa Camp

  During his two-day trip to Estonia, Prince William visited some of the 900 British troops in this multinational force, including soldiers of the Mercian regiment of which the prince is colonel-in-chief. He was given a tour of the military training grounds at Tapa Camp - part of Operation Cabrit which is the UK's contribution to secure Nato's "collective security and defence" in this vulnerable Baltic region. The prince, who was wearing a Nato badge on his uniform, was shown field training for this battlegroup, meeting Estonian and French troops too. He asked soldiers about their deployment in terms of the "context of being so near to Russia" and wondered whether this felt more real than previous training. This is what deterrence to Russia looks like on the ground - and the base shows how much the balance of power can shift.

  The prince was on board a Warrior tracked armoured vehicle during field training

  Before Estonia regained its independence in 1991, this had been a base for Soviet air defences, with MIG fighter planes poised to take on the West. Now the positions are reversed, with Estonian troops and their Nato allies located here to prevent a Russian incursion. The strategically-important army base has been expanding, with the icy streets lined with military vehicles. As well as riding in a Challenger 2 tank, the prince saw a Warrior armoured vehicle, a French Griffon fighting vehicle, a multiple launch rocket system, a Trojan vehicle for clearing obstacles and he drove an Archer mobile artillery system.

  Prince William was given a warm welcome by local people in Tallinn

  The war in Ukraine has shown how fast the technology of combat is changing and on Thursday the prince saw a hydrogen-powered drone, on a visit to designers in Estonia's capital Tallinn. At the Tapa army base he asked soldiers about the new "drone threat" facing modern armies and "the change of tactics" that would require. Around the base there were warning signs saying: "Report drone sightings." The visit also focused on the wellbeing of service men and women who are posted here. Prince William asked whether there was still a stigma when it comes to talking about mental health problems in the armed forces. "It's going in the right direction," welfare officer Amy-Jane Hale replied. While touring the facilities, the prince managed to try his hand at pool and table football. That quickly became a game between his team Aston Villa and a supporter of their rivals Birmingham City. On Thursday, hundreds of local Estonians waited in the cold to meet the prince in Tallinn, lining the railings to shake his hand or to take a selfie. He was warmly welcomed to this small, tech-savvy country, which increasingly relies upon its allies. Estonia has been a strong supporter of Ukraine, sharing a border with Russia and having been under Soviet rule in the past. All around the capital there are Ukrainian flags flying alongside the Estonian blue, black and white tricolour. Many Ukrainian families have taken refuge in Estonia. During a visit to a school in Tallinn for Ukrainian child refugees, Prince William praised Ukraine's strength. "The Ukrainian resilience is everywhere," Prince William told the students. "You have a very good spirit, very good souls, it's very important."
