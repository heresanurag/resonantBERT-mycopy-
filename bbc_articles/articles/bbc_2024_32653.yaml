content: |-
  How to share your questions, stories, pictures and videos with BBC News

  BBC News brings you the latest stories from across the globe but we also want to hear about the issues that matter to you. The part you play in making the news is very important. Whether it is breaking news or a featured item, your contribution can make a difference to our coverage. Have you seen or been involved in a news event? Is something significant, bizarre or unusual happening where you live? Have you got a story to tell or is there something you think we should follow up? Are there topics you want to comment on or get the world talking about? Here are our terms of use for sending contributions to the BBC and the BBC's privacy policy.

  If you have a story, picture or video you wish to share, here are the different ways to send in your contributions:

  Send your stories to our email address: haveyoursay@bbc.co.uk, external In some cases your images or audio may be used on BBC output.

  You can send a picture, video or message to our WhatsApp account +44 7756 165803, external In some cases your text, as well as your images, may be used on BBC output.

  X, formerly known as Twitter, external We may use your posts displaying your X username on BBC output.

  You can also send us videos you have recorded and pictures you have taken to illustrate on the BBC News website and on BBC Television.

  Is there a story you would like us to investigate? Use this form to let us know. We aim to read all of your messages but due to the sheer volume of communications we receive daily, it is not always possible to reply to everyone individually. If we use your material on BBC programmes or online, we aim to publish your name and location as you provide them (unless you ask us not to) but we will never publish your mobile-phone number or other contact details.
