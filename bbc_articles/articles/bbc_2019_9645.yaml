title: '''We survived!'' Collapsing glacier soaks kayakers - BBC News'
date: '2019-08-18'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-49389883
content: |-
  Chunks of falling glacier caused a massive wave that came straight at a pair of kayakers in Alaska.

  Some kayakers got wetter than expected when they paddled near a glacier in Alaska.

  Huge chunks fell off, causing a massive wave that came straight at them.
