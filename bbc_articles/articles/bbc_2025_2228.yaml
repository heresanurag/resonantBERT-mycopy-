content: |-
  Exercise Cobra Warrior involves a number of nations' air forces.

  Turkish F-16 fighter jets have flown into an RAF base ahead of a major military exercise.

  Cobra Warrior, with its main hub at RAF Waddington, brings together participating nations from around the world and attracts aircraft enthusiasts from across the country.

  France, Turkey and Saudi Arabia are based at the Lincolnshire station for the exercise which started on 24 February and finishes on 14 March.

  Lt Col Faisal, deputy commander of the Royal Saudi Air Force group, said: "Seeing all of the participating countries working hand-in-hand, wing tip to wing tip, is really great."

