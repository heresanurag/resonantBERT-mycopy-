title: 'Waymo v Uber: Who stole what? - BBC News'
date: '2018-02-05'
section: General
url: http://www.bbc.co.uk/news/technology-42936448
content: |-
  A legal battle between Waymo and Uber over the theft and use of the former's self-driving car technology is underway.

  Waymo, the self-driving car company spun out of Google, is locked in a legal battle with Uber, alleging the cab company stole its key technology.

  The legal battle could have big implications for the future of the self-driving car industry, as Dave Lee explains.
