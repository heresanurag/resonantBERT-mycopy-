title: See how OJ Simpson's notorious 1994 car chase unfolded - BBC News
date: '2024-04-12'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-68793085
content: |-
  Archive video shows the police pursuit of a white Ford Bronco carrying Simpson as he fled in Los Angeles.

  Archive video shows the June 1994 pursuit of OJ Simpson as he fled Los Angeles police in a white Ford Bronco after failing to turn himself in. Simpson, a former star football player, had become the main suspect in the murder of his ex-wife, Nicole Brown Simpson.

  Millions of Americans watched the lengthy chase and standoff on live television, which ended when he surrendered to police outside his home.

  Simpson was later acquitted of the murder after a trial in 1995.
