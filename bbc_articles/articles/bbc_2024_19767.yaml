  Are these sports in the Olympics, Paralympics or both?

  Paris 2024 is the first time the same logo has been used for the Olympics and the Paralympics

  At Tokyo 2020, ParalympicsGB finished second in the medal table behind China, winning 124 medals, including 41 golds, across a record-breaking 18 different sports. The Paris 2024 Paralympics will feature 213 athletes competing in 19 sports for the British team between 28 August and 8 September. Before the competition, test your knowledge on how well you know the sports featured in the Paralympic and Olympic programmes. Once you've completed it, challenge your friends, and share how you did on social media.
