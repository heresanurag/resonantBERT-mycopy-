  Hollywood director David Lynch reveals lung disease but ‘will never retire’

  David Lynch has revealed he’s been diagnosed with emphysema, a chronic lung disease, from “many years of smoking”. The Hollywood film director, who was behind the hit mystery TV series Twin Peaks, said that despite the diagnosis, he is in “excellent shape” and will “never retire”. In an interview with the British film magazine Sight and Sound, external, the 78-year-old said the condition affects his mobility which means he will only be able to direct films remotely in future. Lynch has now posted on X, formerly Twitter, saying his diagnosis is the “price to pay” for his smoking habit but revealed he quit two years ago.

  Emphysema is a form of COPD or Chronic obstructive pulmonary disease. It occurs when there is damage to the air sacs in the lungs. The main symptoms are shortness of breath, a persistent chesty cough, frequent chest infections and wheezing. The breathing problems tend to get gradually worse over time. The main cause of COPD is smoking, although the condition can sometimes affect people who have never smoked.

  “I have to say I enjoyed smoking very much” he wrote “but there is a price to pay for this enjoyment”. Emphysema is a condition which causes shortness of breath and a persistent cough. But despite living with it he says he is “filled with happiness” and has thanked fans for their concern. Lynch has directed 10 feature films including the Oscar-nominated Mulholland Drive, Blue Velvet and The Elephant Man. His last major project was Twin Peaks: the Return, which was broadcast in 2017 and continued the TV series which ran for two seasons in the early 1990s.
