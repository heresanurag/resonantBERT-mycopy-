content: |-
  Chelsea are set to add an eighth goalkeeper to their squad as they agree a £17m fee with Genk for Mike Penders.

  Chelsea are set to add an eighth goalkeeper to their squad after agreeing a £17m fee with Genk for Mike Penders.

  The 19-year-old will sign a long-term deal at Stamford Bridge and is then expected to go back on loan to the Belgian club for the forthcoming season.

  Chelsea signed Filip Jorgensen from Villarreal last month for £20.7m and have seven keepers listed in their first-team squad, including last season's number one Robert Sanchez and Kepa Arrizabalaga, who is back after a year on loan at Real Madrid.

  Penders made his senior debut in July, becoming the third-youngest goalkeeper to play in the Belgian Pro League.

  The 6ft 7in Belgium Under-19 player will become Chelsea's 10th summer signing and will take spending beyond £150m - with Atletico Madrid striker Samu Omorodion expected to join imminently for a £34.5m.
