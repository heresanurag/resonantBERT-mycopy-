title: Marjorie Taylor Greene booed in bid to oust House speaker - BBC News
date: '2024-05-19'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-68973270
content: |-
  The Republican lawmaker motioned on Wednesday for a vote to oust House Speaker Mike Johnson.

  Republican congresswoman Marjorie Taylor Greene was booed in the House of Representatives after bringing forward a motion to vacate the seat of Speaker Mike Johnson. Greene accuses Johnson of aligning with the Democrats and said no speaker had aligned with the minority group in the chamber since the 1990s.

  Johnson was elected Speaker of the US House of Representatives last October after the a handful of Republicans joined the Democrats to oust Kevin McCarthy.
