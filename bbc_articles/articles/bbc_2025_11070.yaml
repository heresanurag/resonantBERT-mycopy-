  Maresca also enjoyed the most successful part of his playing career at Betis's fierce rivals Sevilla, winning two Europa League trophies and a Super Cup, so expects to face crowd taunts. "I played four years for Sevilla, that is a big derby against Betis," he said. "We also won the derby 1-0, and I scored a goal. I know that they don't like me, they don't love me. "I met my wife in Seville, she's from Seville. My first son born in Seville. I played for Seville, but no doubt that I want to win the final." Chelsea will want to finish the job in Wroclaw, Poland on 28 May, three days after the Premier League season finishes. Maresca continued: "For me personally, it's very important, especially because we can give the chance to this club and these fans to be the first club in Europe to win all the competitions [having previously won the Champions League and Europa League]. "The Conference League is a starting point to build a winner mentality, and then to try to win more things and more titles."
