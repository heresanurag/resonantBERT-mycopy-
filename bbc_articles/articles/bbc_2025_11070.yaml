  Chelsea manager Enzo Maresca says he is excited to face his "professional dad" after Manuel Pellegrini-managed Real Betis qualified for the Conference League final. Midfielder Kiernan Dewsbury-Hall scored as Chelsea won 1-0 on the night against Djurgarden and 5-1 on aggregate while Spanish club Betis needed extra time to beat Fiorentina 4-3 on aggregate over both legs. The results have led to Maresca facing a manager he has both played under and worked alongside having been a member of Pellegrini's squad at Malaga before later becoming his assistant at West Ham. Maresca admitted he was late for the press conference because he was watching Betis win in extra time and said of the result: "I'm happy to face Betis, especially because of Manuel Pellegrini. He is like my professional dad. So we'll be very happy. "I had him four years, two as a player and two I was his coach, assistant coach. So I know exactly how he thinks about players, but the most important thing is that he's honest, he's a good person, he always tries to be honest with the player. "And I try, personally, I try to learn a lot about his way."

