title: Australia's Steve Smith retires from ODI cricket after Champions Trophy exit
  - BBC Sport
date: '2025-03-05'
section: Australia
url: http://www.bbc.co.uk/sport/cricket/articles/cx2x01728x4o
content: |-
  Steve Smith retires from one-day international cricket following Australia's Champions Trophy defeat by India.

  Steve Smith made his ODI debut for Australia in 2010

  Steve Smith has retired from one-day international cricket following Australia's semi-final exit from the Champions Trophy. The 35-year-old made 170 appearances for Australia in his 50-over career, hitting 12 centuries and winning the ODI World Cup in 2015 and 2023. Smith captained the side in Pat Cummins' absence during his final ODI appearance on Tuesday, when Australia suffered a four-wicket loss to India in Dubai in the Champions Trophy. The former Sussex batsman will remain available for Test and T20 selection for his country. "There have been so many amazing times and wonderful memories. Winning two World Cups was a great highlight along with the many fantastic team-mates who shared the journey," said Smith, Australian men's ODI player of the year in 2015 and 2021. "Now is a great opportunity for people to start preparing for the 2027 ODI World Cup so it feels like the right time to make way. "Test cricket remains a priority and I am really looking forward to the World Test Championship final, the West Indies in the winter and then England at home. I feel I still have a lot to contribute on that stage."

  Smith hit the winning boundary as Australia beat New Zealand in the 2015 ODI World Cup final at the MCG. He also played a key role eight years later as Australia upset hots India to win the tournament for a sixth time. Smith finishes his ODI career with 5,800 runs, at an average of 43.28. His highest score of 164 came against New Zealand at the SCG in 2016.

  Smith gave no hint at retirement in his news conference after defeat by India, but this decision is no surprise. He will be 38 by the time the next 50-over World Cup comes around in 2027. He will go down as one of the great cricketers of his era, although still probably more for his Test exploits despite being a two-time World Cup winner. A recent resurgence in red-ball cricket suggests he can continue there for a few years yet, beyond this winter's Ashes against England. This retirement will give an early hint at the future of the Australia after their current crop - Mitchell Starc, Glenn Maxwell and Josh Hazlewood are 34 or older - move on. Expect 21-year-old Cooper Connolly, who came in against India after injury to Matt Short, to be given opportunities.
