content: |-
  The family of 80-year-old Bhim Kohli describe him as "a loving husband, dad and grandad".

  Bhim Kohli's family described him as "the joker" who "always loved to outsmart us with a smile"

  The family of a 80-year-old man who died after being assaulted in a park have said "our hearts have been completely broken". Bhim Kohli was walking his dog Rocky at Franklin Park in Braunstone Town, Leicestershire, on Sunday evening when he was assaulted. He died later in hospital. A 14-year-old boy remains in police custody being questioned on suspicion of murder. Four other children have been released with no further action. In a statement, his family called him "a loving husband, dad and grandad".

  Police have said public safety in the area is "a priority"

  In a statement issued through Leicestershire Police, they said: "Bhim was a loving husband, dad and grandad. He was also a son, brother and uncle. "One of his great passions was his allotment, he would go every day to tend to his plots and was so proud of them. He also enjoyed walking the family dog Rocky on the park many times a day. "Bhim loved to laugh. He was always very happy and talkative, the joker of the family and always loved to outsmart us with a smile. "Our hearts have been completely broken.

  "Our family have lived in the same house in Braunstone for 40 years, so he was very well known in the community – we have been overwhelmed by the messages and support from many who knew him." Responding to questions over public safety, Supt Dwight Barker said: "We are aware of reports in the media of concerns in relation to anti-social behaviour in the area. "The death of Mr Kohli is an extremely traumatic and upsetting incident and has understandably caused concern. "While we cannot go into specific details due to ongoing investigations, we do want to reassure that preventing and addressing anti-social behaviour and ensuring the safety of residents is a priority for us."

