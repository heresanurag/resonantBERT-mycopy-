title: 'Newspaper headlines: ''Farewell Liam'' and ''UK defies Putin'' - BBC News'
date: '2024-11-21'
section: The Papers
url: http://www.bbc.co.uk/news/articles/cdrdpv6dmnlo
content: |-
  Thursday's papers are led by Liam Payne's funeral and Ukraine firing UK-supplied missiles into Russia.

  The Times, external describes the first use by Ukraine of British-made Storm Shadow missiles on targets inside Russia as a "marked intensification" of UK involvement in the conflict. The paper's front page has a grainy photo which it says shows a command post in the Kursk region being hit. It argues that the move - and the use of American ATACMS missiles - shows Moscow "that Ukraine's western allies remain determined to supply Kyiv with the systems necessary to defend the country".

  "UK defies Putin", external is the headline for the i. In an analysis piece, it suggests that the use of the missiles is "a bold, dangerous stroke - intended to break the spine of Russia's operations inside Ukraine". It mentions Vladimir Putin's recent threat to retaliate with nuclear weapons if Russian sovereignty was threatened with arms supplied by the West. But it suggests that the prospect of Donald Trump returning to the White House may have persuaded governments that Moscow would be less likely to launch weapons of mass destruction.

  The Daily Telegraph is concerned that the Storm Shadow missile strikes have happened when the British military is facing "£500 million worth of cuts"., external Its leader argues that plans to phase out the Army's primary drone system - along with several Navy ships and older RAF helicopters - are "madness" at a time of heightened global tensions.

  The Mail agrees, suggesting in its opinion column, external that the move - announced yesterday by Defence Secretary John Healey - will "leave a gaping hole in Britain's ability to project power, when we are at the forefront of a global fight for freedom".

  There's a picture on the front page of the Financial Times, external of a Chinese bulk carrier ship, which is being closely monitored by a Danish military patrol vessel, days after two fibre-optic data cables in the Baltic Sea were severed. The paper says shipping data suggests the Yi Peng Three was in the area when the cables were damaged. Swedish police say they are also interested in the ship. China says it always requires its vessels to abide by relevant laws and regulations.

  The Guardian reports that Labour MP Diane Abbott has joined forces with Conservative Sir Edward Leigh, external to express concern about the Assisted Dying Bill. There is due to be a free vote in the Commons on the measure - which would allow terminally-ill people to end their lives in certain circumstances - a week on Friday. But Abbott and Sir Edward, the Mother and Father of the House, argue that there has been insufficient scrutiny of the Bill. They want Parliament to focus instead on better health and care services.

  Several front pages concentrate on the funeral of pop star Liam Payne. The Sun, external has photos of his former One Direction bandmates, and his ex-partner Cheryl, at the ceremony. The headline is: "All for one". The Mirror, external's is simply: "Farewell Liam".
