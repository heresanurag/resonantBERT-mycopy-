title: Crews are likely to be at Hull cargo ship fire into the night - BBC News
date: '2025-06-27'
section: Hull & East Yorkshire
url: http://www.bbc.co.uk/news/articles/cvgwpv7qgv3o
content: |-
  Firefighters at Albert Dock are dealing with the blaze on a cargo ship laden with scrap metal.

  Crews likely to be at Hull ship fire into the night

  To play this video you need to enable JavaScript in your browser. This video can not be played Five fire engines and an aerial platform are tackling the fire on a vessel at Albert Dock in Hull

  An operation to tackle a cargo ship fire at a Hull dock will be "prolonged" and is likely to continue into the night. Humberside Fire and Rescue was called to Albert Dock at about 10:20 BST after a fire started in a cargo hold containing 3,500 tonnes of scrap metal. All those on board have been accounted for, the fire service said. Five fire engines, an aerial platform and fire crews trained in marine response are involved in the operation, which has caused road closures and a plume of smoke across the city centre. Residents and businesses have been advised to keep their windows and doors closed.

  Dominic Purchon, the incident commander with the fire service, described the blaze as "deep-seated" and said access to the cargo hold had been difficult. He said: "The fire is contained in the vessel so our tactic involves removing the cargo and extinguishing it on the dockside. At the same time we're spraying water into the hold. "There are other residual materials in there. We're still very much in the firefighting operation but, once it is out, specialist investigators will work to establish the cause."

  Crews from Humberside Fire and Rescue, HM Coastguard and Humberside Police are on the scene

  Associated British Ports, which runs Albert Dock, said: "We are currently aware of a fire on a vessel in the location of a tenanted area, and we are assisting the fire service with the response." Dale Baxter, a BBC reporter at the scene, identified the vessel as the Altay – a bulk carrier which has been docked in the city since 23 June. He said: "It is quite remarkable. There is an enormous plume of smoke pouring from the ship. "It looks like it is coming from near the bridge and the wind direction is pushing it towards the city centre. The smell is awful." According to Vessel Finder, a website that tracks the status of ships, Altay was built in 2006 and flies under the flag of the Marshall Islands.

  The fire service said the blaze started in the cargo hold

  Humberside Police said English Street, Wellington Street, Humber Dock, Kingston Retail Park, the Marina and Jackson Street have been closed. Tina Riches, managing director of HVM Van Hire, said her business had been closed after she heard "sirens going off and a warning alarm at the dock". "We've had to contact our customers [and tell them] they won't be able to get here, and the police say we might have to be evacuated," she said. BBC reporter Charlie O'Loughlin, who lives a few streets away from the marina, said there was "really thick smoke" more than five hours after the incident started. She added: "The smell of burning rubber is super-strong inside my house."

  Toni Wheat described seeing a "ball of flames" when the fire started

  People living on boats in Hull Marina said they were concerned about the impact of the smoke on their properties. Toni Wheat said she had seen a "big ball of flames and smoke" when the fire started. "I can smell [smoke] in the boat. We've closed all the windows and doors but it's still there," she said. Brian Worship, who lives and works in the area, added: "It's really smelly but we can't do anything about it. "I'd hope they'd have evacuated us if there was anything dangerous but it's just another bonfire as far as I'm concerned." The impact of the blaze is also being felt in the city centre. Proceedings at Hull Combined Court and Hull Magistrates' Court have been halted,with both buildings being temporarily closed. A spokesperson for HM Courts and Tribunals Service said: "Cases due to be heard at the court have either been adjourned or moved online." Hull City Council confirmed the site of The Big Malarkey Festival in East Park had been evacuated as a precaution. The children's literary festival had been holding sessions for schoolchildren ahead of public events on Saturday and Sunday.

  Residents and businesses are being advised to keep their windows and doors closed

  The fire service says everyone on board the ship has been accounted for

  Police have closed roads in the vicinity of the fire

  Shops at Kingston Retail Park have been closed because of the smoke
