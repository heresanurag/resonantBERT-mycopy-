title: Inverclyde Council leader quits after assault allegations - BBC News
date: '2024-11-15'
section: Glasgow & West Scotland
url: http://www.bbc.co.uk/news/articles/cr4lk7d2gweo
content: |-
  Stephen McCabe denied claims he shouted at and assaulted a woman at a home in Inverclyde.

  Inverclyde's council leader has stepped down after appearing in court charged with assault and threatening behaviour. Labour’s Stephen McCabe resigned from his position at Inverclyde Council following his appearance at Greenock Sheriff Court on Friday. The 60-year-old denied shouting and acting in an aggressive manner towards a woman and a second charge of assaulting her at a home in Kilmacolm by seizing her on the body and pushing her on 27 October this year. A statement from the local authority confirmed Mr McCabe, who has led the council since 2011, had “stepped back” from his role.

  Mr McCabe was released on bail with special conditions not to contact or approach the complainer or enter a specified address in the area. It is understood he has been administratively suspended by Labour pending the outcome of any investigation. In a statement, Inverclyde Council said: “We can confirm today that Councillor McCabe has indicated that he has decided to step back from his role as leader of Inverclyde Council. "Deputy leader Councillor McGuire will continue to deputise, following existing governance arrangements until a new leader is appointed. "Leadership of the council is determined by the council's elected members. The next meeting of Inverclyde Council will take place on 5 December.”
