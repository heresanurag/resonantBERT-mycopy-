title: Dave Ryding wins Britain's first gold in alpine skiing World Cup - BBC Sport
date: '2022-01-23'
section: Winter Sports
url: http://www.bbc.co.uk/sport/winter-sports/60097540
content: |-
  Dave Ryding wins Britain's first alpine skiing World Cup gold medal with victory in the Kitzbuhel slalom.

  This video can not be played To play this video you need to enable JavaScript in your browser.

  Dave Ryding has won Britain's first alpine skiing World Cup gold medal with victory in the Kitzbuhel slalom. Ryding, 35, was on Friday named in Great Britain's squad for the Beijing Winter Olympics - his fourth Games. His two runs clocked in at one minute and 41.26 seconds, 0.38 seconds ahead of Lucas Braathen, with fellow Norwegian Henrik Kristoffersen third. Ryding sat sixth after his first run of 51.40 seconds but claimed gold with a brilliant second effort of 49.86. "You know, I'm 35 now, but I never stopped believing, I never stopped trying, and to bring the first victory for Great Britain in a World Cup, in Kitzbuhel... I mean, I don't know if dreams are made better," he said.

