  The Prince and Princess of Wales have shared new photos of Prince William with George, Charlotte and Louis.

  Prince and Princess of Wales share new photos for Father's Day

  The Prince and Princess of Wales have shared new photos of Prince William with their three children to mark Father's Day. One is a portrait shot showing the prince standing with his arms around Prince George, 11, and Princess Charlotte, 10, while seven-year-old Prince Louis stands in front of him - the other is a landscape image in black and white showing the four lying on the grass laughing in an embrace. The two photos, shared on the couple's official social media account, are accompanied with the caption "Happy Father's Day, Papa (before and after!) We love you! G, C & L" along with a heart emoji. It comes as the family attended Trooping the Colour on Saturday celebrating the King's official birthday.

  A family photo from Saturday's event was shared on the same Instagram account featuring Prince William dressed in uniform, Catherine and Charlotte in blue dresses with George and Louis in suits with red ties.

  The Father's Day photos shared on Sunday were taken in Norfolk by Josh Shinner who has taken pictures of Prince William and Catherine's family before, including their Christmas card for 2023. Last year's Father's Day photo was taken by Catherine. It featured the prince standing with his three children, their arms around each other, looking out to sea. The King and Queen have also wished a Happy Father's Day "to all Dads everywhere" posting photos of them with their own fathers.

  A black and white image posted on their official Instagram account shows the late Prince Philip holding a swing playing with a young Charles and Princess Anne. A second photo has also been shared of Camilla with her late father Major Bruce Shand arm-in-arm on the day of her wedding to Charles in 2005.
