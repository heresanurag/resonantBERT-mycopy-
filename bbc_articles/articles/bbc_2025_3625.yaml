title: Angry response to how transgender lawmaker Sarah McBride introduced - BBC News
date: '2025-03-13'
section: General
url: http://www.bbc.co.uk/news/videos/cx20yl895ryo
content: |-
  A Democrat clashed with a Republican who introduced the only transgender member of US Congress as "Mr McBride".

  A US congressional hearing was abruptly adjourned after Texas Republican Keith Self twice called Delaware Democrat Sarah McBride "Mr McBride", sparking a heated confrontation.

  She is the only openly transgender member of Congress. Massachusetts Democrat Williams Keating challenged Self, asking if he had "any decency".
