title: Nottinghamshire police catch fence-vaulting motorcyclist - BBC News
date: '2023-07-16'
section: General
url: http://www.bbc.co.uk/news/uk-66212199
content: |-
  Footage from police shows officers chasing the biker through gardens before his arrest.

  Nottinghamshire Police have released footage of the moment officers caught a speeding motorcyclist.

  The video from April 2022 shows the biker trying to evade arrest by running through gardens and jumping fences in Kelham village. Officers were guided to his location by the force's aircraft.

  The 23-year old biker, who was driving without insurance, has been handed a nine month prison sentence suspended for two years.

  PC Sarah Clifton said: “This was an appalling display of riding that could easily have ended in tragedy."
