title: 'Belfast City Cemetery: Seamus Conlon, 70, dies after car hits people - BBC
  News'
date: '2019-08-04'
section: Northern Ireland
url: http://www.bbc.co.uk/news/uk-northern-ireland-49218967
content: |-
  Two other men are in a serious condition after being struck on the Whiterock Road on Saturday.

  The incident happened shortly after midday on Saturday

  An elderly man has died following a crash outside Belfast City Cemetery on Saturday.

  Seamus Conlon, 70, was one of three men struck by a stolen Vauxhall Vectra on the Whiterock Road, in the west of the city, shortly after 12:00 BST.

  PSNI Ch Insp Gary Reid said the two other men are in hospital, where their conditions are described as serious.

  A 32-year-old man has been arrested on suspicion of a number of driving offences and remains in custody.

  The incident took place just after a funeral in the cemetery.

  Fr Patrick McCafferty said the incident was "unbelievable"

  Fr Patrick McCafferty was leaving the cemetery when the collision took place.

  "People were standing around in shock, people are stunned," he said.

  "They're bewildered something like this could happen, just literally after the funeral had been completed. It's unbelievable."

  Police have asked people to avoid the area

  Sinn Féin Councillor Micheal Donnelly described the scene as one of "sheer devastation".

  "My thoughts are with those caught up in today's incident", he said.

  The Whiterock Road has reopened to traffic.
