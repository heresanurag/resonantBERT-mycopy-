content: |-
  Aston Villa complete the loan signing of Manchester United forward Marcus Rashford.

  This video can not be played To play this video you need to enable JavaScript in your browser. 'Now or never' - Walcott on Rashford's move to Aston Villa

  Aston Villa have completed the loan signing of Manchester United forward Marcus Rashford. The 27-year-old has joined on a deal until the end of the season, which includes an option to buy for £40m. United sources said the terms mean a minimum of 75% of Rashford's wages will be covered. Villa are not paying a loan fee. Writing on Instagram Rashford said: "I would like to thank Manchester United and Aston Villa for making this loan deal happen. "I was lucky to have a few clubs approach me but Aston Villa was an easy decision - I really admire the way that Aston Villa have been playing this season, and the manager's ambitions. I just want to play football and am excited to get started. "I wish everyone at Manchester United all the best for the rest of the season."
