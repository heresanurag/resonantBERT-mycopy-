  This video can not be played To play this video you need to enable JavaScript in your browser. Jones - Rashford "needs to feel the love"

  Speaking after he was dropped for the Manchester derby in December, England international Rashford said he was "ready for a new challenge". Villa are also close to signing Spain midfielder Marco Asensio on loan from Paris St-Germain. On Saturday, Villa boss Unai Emery said the club "need new players" following their 2-0 defeat at relegation-threatened Wolves. They have already signed Spanish full-back Andres Garcia from Levante and Netherlands forward Donyell Malen from Borussia Dortmund in January. But Villa sold Colombia striker Jhon Duran to Saudi Pro League side Al-Nassr in a £71m deal and centre-back Diego Carlos to Fenerbahce for around £8.45m. However, England striker Ollie Watkins went off injured on Saturday and the Villans have been forced to play central midfielder Boubacar Kamara in the centre of defence following injuries to Pau Torres and Tyrone Mings. Villa said on Monday that 19-year-old defender Kosta Nedeljkovic has joined RB Leipzig on loan for the rest of the season. Nedeljkovic has started only two games for Villa since arriving from Red Star Belgrade in January 2024.
