title: 'Luton shooting: Man who murdered family planned school attack - BBC News'
date: '2025-02-25'
section: Beds, Herts & Bucks
url: http://www.bbc.co.uk/news/articles/ce342g0xz15o
content: |-
  Nicholas Prosper's loaded shotgun with more than 30 cartridges was found in a bush, police say.

  Juliana Falcon, 48, Kyle Prosper, 16, and Giselle Prosper, 13, were found dead at their home

  A man who killed his mother and two siblings was also planning to commit a mass shooting at his former primary school, police have confirmed. Nicholas Prosper shot dead Juliana Falcon, 48, Kyle Prosper, 16, and 13-year-old Giselle Prosper at their home in Luton in September. The 19-year-old intended to carry out an attack at the school and a loaded shotgun with more than 30 cartridges was found in a bush after his arrest, police said. He pleaded guilty to three counts of murder at Luton Crown Court on Monday.

  Det Ch Insp Sam Khanna, from Bedfordshire Police, said "fortunately Prosper was apprehended before he could cause any further harm". "This was a truly tragic and shocking case in which three innocent members of the same family have been brutally killed by their son and brother," said Det Ch Insp Khanna. "What was subsequently uncovered during our investigation left no doubt as to his intentions to carry out an attack at a school." Speaking outside court, he added that his team was in "shock and disbelief" when they learned of his plans to target St Joseph's Catholic Primary School in Luton.

  Prosper answered guilty to all six charges at Luton Crown Court

  Assistant Chief Constable John Murphy said Prosper planned to cause maximum harm to the "wider community". "We are extremely grateful to our officers who stopped him and prevented him from going through with his plans." Mr Murphy said police were working with the council to give support, assistance and guidance to schools and parents. At a press conference he added that "comprehensive inquiries demonstrate that this was a single perpetrator acting in isolation". Maureen Murphy, the head teacher at St Joseph's, said in a statement that all the children from the family had attended the school and had been a "cherished part" of its community. She said parents could be reassured there was no threat to the school and that "robust" safety systems were in place. "We are proud to be a multicultural Catholic school where the safety of children will always be our number one priority and this will never be compromised," said Ms Murphy. The leader of Luton Council, Hazel Simmons MBE, said the council had recently asked schools to conduct a security review following the fatal knife attack in Sheffield - but said all of them would be asked to conduct a further review.

  Flowers and cards were left at the entrance to the Leabank block of flats shortly after the murders

  Officers were called to the family flat in Leabank, off Wauluds Bank Drive, at about 05:30 BST after a concerned neighbour said they heard a disturbance. An inquest at Bedford Coroner's Court in October was told that all three of the victims died from gunshot wounds to the head. Speaking previously Det Supt Rob Hall, from the region's major crime unit, said officers who arrived at the scene were "met with such awful circumstances". Prosper was arrested shortly after and the firearm was found in the bushes during a search of the surrounding area. Shortly after the murders, Kyle's most recent school in Luton said it was "deeply saddened" by his death. "This is devastating news to all those who knew and loved Kyle and it will take some time to come to terms with the profound sense of loss," the school said. The head teacher at Giselle's secondary school said in a statement: "Giselle was a beautiful soul and a model pupil. "She excelled in all her subjects and will be sorely missed, particularly by her friends in Year 9."

  Police said they found the victims in "such awful circumstances" at the Leabank block

  Prosper is on remand at HMP Peterborough, but he appeared for the hearing which lasted less than 10 minutes. He wore a black t-shirt, dark trousers and black rimmed glasses as he entered his pleas. The 19-year-old sat with his arms folded when he entered the dock. As well as admitting the three murders, he pleaded guilty to purchasing or acquiring a shotgun without a certificate, possessing a firearm with intent to endanger life and possessing an article with a blade or point. He is due to be sentenced on 5 March.

