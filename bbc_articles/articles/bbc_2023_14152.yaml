content: |-
  Drone footage shows people leaving the festival after heavy rain caused a mud bath.

  People were finally able to leave Burning Man festival in Nevada on Monday, after wet conditions eased.

  Heavy rain had caused a mud bath, with rainfall near the end of last week thought to have been the heaviest since the festival began more than 30 years ago.

  Drone footage shows huge queues of people heading away from the festival.

  Read more about the boggy conditions at Burning Man here.
