title: Universal theme park for Bedfordshire confirmed by Starmer - BBC News
date: '2025-04-08'
section: Beds, Herts & Bucks
url: http://www.bbc.co.uk/news/articles/cz95n2837vgo
content: |-
  The company says the new site is expected to create 28,000 jobs and generate £50bn for the economy.

  This video can not be played To play this video you need to enable JavaScript in your browser. What can we expect from Europe's first Universal theme park?

  The first Universal theme park in Europe will be built in the UK, the government has promised. The attraction is planned for the site of a former brickworks near Bedford and could create an estimated 28,000 jobs before opening in 2031. Universal estimated the 476-acre complex could attract 8.5 million visitors in its first year. Sir Keir Starmer said the multibillion-pound investment by the company would "see Bedford home to one of the biggest entertainment parks in Europe, firmly putting the county on the global stage".

  The prime minister joked that his children, aged 14 and 16, were uncharacteristically interested in the news. "They don't take that much interest in the announcements I'm making every day, I have to admit, but this one has really caught their eye," said Starmer, speaking on a visit to Kimberley College in nearby Stewartby.

  Sir Keir Starmer examined maps and an artist impression of the site with chancellor Rachel Reeves

  Universal, which has made films including Minions and Wicked, has theme parks in Orlando and Los Angeles in the US, as well as in Japan, Singapore and China. The site - which is the former Kempston Hardwick brickworks - will be "one of the largest and most advanced" theme parks on the continent once complete, the production company says. A full planning proposal will be submitted to the UK government, with construction expected to start in 2026. Universal had previously given its name to the PortAventura resort in Spain, but it is understood the UK attraction will be the first in Europe it has designed and built from scratch. Universal Destinations and Experience said 80% of those employed in the new jobs would be from Bedford, central Bedfordshire, Luton and Milton Keynes. Culture Secretary Lisa Nandy hailed the "landmark investment" as "fantastic news" for the economy. "This is not just about bringing great American creations to Britain, this is also about showcasing great British creations to the world," she told BBC Breakfast. "These are things like James Bond, Paddington Bear, these are things like Harry Potter. We've got so much to be proud of."

  Sir Keir Starmer, pictured here with Comcast Corporation President Mike Cavanagh, said the park would strengthen the UK economy

  Universal's Orlando resort in Florida brought in 9.75 million visitors in 2023, while its Hollywood resort saw 9.66 million the same year - according to the Theme Index Report, external. In 2016, NBCUniversal agreed to a seven-year deal with Warner Bros. That meant it had television rights to show the Harry Potter films and the Fantastic Beasts franchise. The prime minister said the theme park would create jobs across construction, artificial intelligence and tourism. Chancellor Rachel Reeves said the government had agreed with Universal that British steel would be used "where possible" on the project. "That's the case with HS2, with Heathrow, and with this private investment here in Bedfordshire," she said.

  According to plans from Universal Destinations & Experiences, the UK site would include a theme park, a 500-room hotel and a retail complex. Universal has already bought 476 acres for the project, but could buy more land to increase the plot to about 700 acres - which would improve transport links. Residents living in surrounding villages have responded positively to the plans, though some are concerned infrastructure will not be enough to support the amount of expected visitors. Universal said it had surveyed more than 6,000 local people and organisations, and 92% of those supported the project.

  Universal has parks all over the world including the latest, Epic Universe, in Orlando

  Universal said it would make upgrades to the Wixams railway station and build a new station on the East West Rail line near the resort. It would also add dedicated slip roads to the A421, which flooded in October after heavy rainfall. On Thursday, Secretary of State for Transport Heidi Alexander approved expansion plans at the nearby London Luton Airport. Universal previously described the Bedford site, external as "an ideal location with convenient, fast rail links to London and London Luton Airport". Nandy also said the government's commitment to improve local transport infrastructure had helped secure the deal with Universal. Shadow business secretary Andrew Griffith said the previous Conservative administration worked closely with Universal Studios to "secure the land" and "bring forward the plans". "We're pleased that, despite Labour's economic mismanagement, Universal Studios has committed to investing in Bedfordshire," he added.

  Universal Destinations and Experiences confirmed it purchased Bedfordshire land in December 2023

  Mike Cavanagh, the president of Comcast Corporation, which owns Universal, said he was excited to expand the parks brand into Europe. The company said it would work with Bedford Borough Council on the project. The local authority was one of six councils to support the plans last year, alongside Central Bedfordshire, Luton, Milton Keynes, north Northamptonshire and west Northamptonshire councils. Mayor of Bedford Tom Wootton told BBC Breakfast it was the "best news" for the town in "a very long time". "Some of the brightest and most fantastic people at Universal are working on [the infrastructure]," he said.

  Margaret Wilson, 85, from Elstow, believed the theme park would be good for young people

  Bedford residents had mixed thoughts on the plans when asked on Wednesday. Margaret Wilson, 85, from Elstow, said she would not visit the theme park but believed her grandsons, aged 19 and 16, would enjoy it. But she said: "It will be four years until anything is built. Who knows what will happen in four years?"

  Maria Perez, a warehouse worker in the area, said the theme park would be "really great" for families and young people. "It will be good for the economy, for the town and for the people. People will invest more." She said it would not be good for rent prices, but overall felt it would be positive for Bedford.

  Jagdeep Singh from Kempston shared his worries about the number of visitors coming to the area to visit the theme park

  While he believed the theme park would drive businesses and bring jobs, he feared the number of visitors could have a negative effect. "I worried a bit about traffic on the bypass - what's going to happen to our hospitals if there's any accidents?" he added. The proposals remain subject to a planning decision from the Ministry of Housing, Communities and Local Government.

