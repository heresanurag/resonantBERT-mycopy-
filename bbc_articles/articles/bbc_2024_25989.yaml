content: |-
  Entrepreneurs James and John run a cleaning firm, but take it to the next level in their spare time.

  Twin brothers from south London have taken on the task of cleaning places nobody asked them to.

  James and John Makanjuola, 23, from Croydon run a cleaning firm - but in their spare time they clean up some of London's less-loved spaces.

  The twins say they love people's reactions to their work on social media, and want to start a cleaning movement, encouraging more people to clean up their local spaces.

