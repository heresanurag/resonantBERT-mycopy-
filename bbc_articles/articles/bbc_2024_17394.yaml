  'Spain won't relax now people think we're favourites'

  Spain have conceded only once in their four games at Euro 2024

  Spain "won't relax" at Euro 2024 now people are regarding them as "favourites", says forward Mikel Oyarzabal. They topped Group B before beating Georgia 4-1 to set up Friday's quarter-final against hosts Germany (17:00 BST). Oyarzabal says Spain's performances at the European Championship have changed people's perceptions - with previous doubters now backing them to go the distance. "They say it now, but three weeks ago nobody said that about us," the Real Sociedad forward said. "We're sticking to the same idea and keeping on going in the same way, trusting ourselves, knowing we can compete against anyone." Spain had gone 44 years without a major trophy before winning Euro 2008 - which was the first of three in a row, as they then triumphed at the 2010 World Cup and Euro 2012. Their first trophy since then came when they won the Nations League in 2023 with a team who have impressed in Germany, and Oyarzabal says Spain are "capable of competing against anyone".

  "For me and for any us here, we've got the best national team possible," said Oyarzabal. "We've got the best players, the best team-mates. We're all for one, there are no divisions within the team, we all feel important." If Spain are to find a path to the final, they will first have to get past a "tough" Germany side who won their group and beat Denmark in the last 16. "Germany are a great team, you don't need me to tell you that. They've started the tournament really strong, it's going to be a tough game," said the 27-year-old, who started their 1-0 group-stage win against Albania. Oyarzabal said his side are remaining focused to prepare as best as they can for their tricky quarter-final. "Just because people believe we are more or less favourites, it does not mean we are going to ease up," he added. "We're relaxed, working hard and trying to prepare as well as possible for Friday."
