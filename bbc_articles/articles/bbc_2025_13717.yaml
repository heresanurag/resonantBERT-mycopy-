  Ed the zebra was on the loose since May 31 when authorities captured the pet and airlifted it to a waiting animal trailer.

  Ed the zebra was on the loose since May 31 when authorities captured the pet in a Tennessee pasture and airlifted it to a waiting animal trailer.

  According to the Rutherford County Sheriff's Office, the zebra was first reported missing a day after arriving in its new home on 30 May.
