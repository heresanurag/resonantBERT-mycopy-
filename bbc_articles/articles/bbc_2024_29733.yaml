  Last month, around 10 million people in Cuba were left without power following a blackout caused by maintenance issues and a lack of fuel to run power stations. That blackout also coincided with Hurricane Oscar, a less powerful category one storm that left a trail of destruction along the island's north-eastern coast. The worst-affected area was the eastern province of Guantánamo, where more than 1,000 homes were damaged by heavy rains and strong winds.
