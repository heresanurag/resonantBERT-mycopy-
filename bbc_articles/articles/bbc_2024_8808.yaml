title: London Marathon runner completes race after tasting 25 glasses of wine - BBC
  News
date: '2024-04-24'
section: General
url: http://www.bbc.co.uk/news/uk-68884596
content: |-
  Professional wine seller Tom Gilbey drank 25 glasses of wine during the 26.2-mile route.

  A London Marathon runner tasted a different glass of wine each mile of the race.

  Tom Gilbey, who is a professional wine seller, drank 25 glasses of wine during the 26.2-mile route, while also trying to guess the country of origin, producer and year.

  He was able to guess seven wines perfectly, and on 14 occasions he was partially correct.

  Despite stopping to sample the wine at every mile, he still completed the race in less than five hours.

  Mr Gilbey was raising money for the Sobell House Hospice Charity in Oxfordshire, where his mother Caroline was nursed during her last days.
