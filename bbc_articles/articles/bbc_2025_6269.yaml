  • None Iran says it is ready for nuclear deal if US stops military threats The US president told reporters in the Oval Office on Monday it would "be a very bad day for Iran" if the talks were unsuccessful. Iran insists its nuclear activities are entirely peaceful and that it will never seek to develop or acquire nuclear weapons. However, since Trump pulled out of the 2015 agreement - which expires later this year - Iran has increasingly breached restrictions imposed by the existing nuclear deal in retaliation for crippling US sanctions reinstated seven years ago, and has stockpiled enough highly-enriched uranium to make several bombs. Under the terms of the 2015 deal, Iran agreed to only enrich uranium up to 3.67% purity for the next 15 years. In February, the International Atomic Energy Agency (IAEA) nuclear watchdog reported that Tehran had stockpiled uranium enriched to 60% purity and could swiftly move to 90%, which would be weapons-grade. The 2015 nuclear deal took nearly two years of intensive negotiations. At the start of this new effort to reach an agreement, Iran's programme is far more developed and complex, and the wider region is far more volatile.
