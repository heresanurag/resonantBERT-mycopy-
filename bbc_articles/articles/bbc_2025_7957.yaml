content: |-
  The US president, who has vowed to remake the global trade order, dismissed concerns, noting the US jobs market is strong.

  Worst week for US stocks since Covid crash as China hits back on tariffs

  Stock market turmoil deepened on Friday, as China hit back at tariffs announced by US President Donald Trump, raising the likelihood of an extended trade war and damage to the global economy. All three major stock indexes in the US plunged more than 5%, with the S&P 500 dropping almost 6%, capping the worst week for the US stock market since 2020. In the UK, the FTSE 100 plunged almost 5% - its steepest fall in five years, while Asian markets also dropped and exchanges in Germany and France faced similar declines. Trump, who has vowed to remake the global trade order, dismissed concerns about the market shock, noting that the US labour market is strong.

  "Hang tough," he urged his followers on social media. "We can't lose." The global stock market has lost trillions in value since Trump announced sweeping new 10% import taxes on goods from every country, with products from dozens of countries, including key trading partners such as China, the European Union and Vietnam, facing far higher rates. Analysts say the moves, some of which are due to go into effect as soon as Saturday, amount to the biggest tax increase in the US since 1968. They expect the measures to lead to a contraction in trade, and have warned they could drive many countries into an economic recession.

  China responded to Trump on Friday by hitting US goods with import taxes of 34%, curbing exports of key minerals and adding American firms to its blacklist, describing Trump's actions as "bullying" and a violation of international trade rules. Other countries appear to be hoping they will be able to negotiate deals, despite conflicting signals from the White House about its appetite for talks. Maroš Šefčovič, the trade commissioner for the EU, which has been planning to retaliate, said on Friday that he had had a "frank" two-hour exchange with US officials, and wrote on social media the trade relationship needed a "fresh approach". "The EU's committed to meaningful negotiations, but also prepared to defend our interests," he said. "We stay in touch."

