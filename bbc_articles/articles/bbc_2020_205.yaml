id: bbc_2020_205
title: 'Carrickfergus: Glen Quinn death now murder investigation - BBC News'
date: '2020-01-07'
section: Northern Ireland
url: http://www.bbc.co.uk/news/uk-northern-ireland-51005614
content: |-
  Two men and a woman, rearrested on suspicion of the murder of Glen Quinn, are released on police bail.

  Police maintained a cordon at the scene of the incident

  The death of a man in Carrickfergus, County Antrim, is now being treated as murder, police have said.

  Glen Quinn's body was found in Ashleigh Park in the Woodburn area on Saturday.

  Two men, aged 38 and 39, and a woman aged 47, earlier arrested in connection with Mr Quinn's death, were rearrested on suspicion of murder on Monday night.

  They were later released on police bail pending further enquiries. Police said forensic examinations and further investigations were ongoing.

  Det Supt Jason Murphy said he was aware of speculation circulating that the death "is in some way related to the activities of South East Antrim UDA".

  "The investigation remains at a very early stage and it is not yet possible to be definitive about the motivation for this man's murder but the potential for it to be linked to those associated with paramilitary organisations will form part of our investigation," he said.

  "Rumour and speculation within the community is likely to be unhelpful as we seek to establish the circumstances surrounding this man's death and I would appeal to the community to contact us."

  Mr Quinn, who was in his 40s, was found dead on Saturday night.

  Investigators in forensic suits examined the scene of Mr Quinn's death

  On Sunday, police maintained a cordon around a block of six flats in the area.

  One neighbour told the BBC that Mr Quinn lived alone and had only recently moved into the area.
