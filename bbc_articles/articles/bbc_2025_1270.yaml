title: Deadly storm hits south-eastern US and Canada - BBC News
date: '2025-02-17'
section: General
url: http://www.bbc.co.uk/news/videos/c74e4wgg71wo
content: |-
  At least 13 people have died after a storm hit south-eastern parts of the US.

  At least 13 people have died after a powerful storm caused flash flooding and toppled trees across south-eastern states of the US.

  Kentucky Governor Andy Beshear said 11 people died in his state, after making an emergency disaster declaration.

  One person also died in Georgia, where a man lying in his bed was struck by an uprooted tree that crashed into his home. Another died in West Virginia, Governor Patrick Morrisey said.

  Kentucky, Georgia, Alabama, Mississippi, Tennessee, Virginia, West Virginia and North Carolina were all under storm-related alerts over the weekend.
