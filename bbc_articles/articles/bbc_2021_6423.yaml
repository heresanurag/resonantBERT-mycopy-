id: bbc_2021_6423
title: Belarus government accused of hijacking plane to arrest journalist - BBC News
date: '2021-05-24'
section: General
url: http://www.bbc.co.uk/news/world-57224416
content: |-
  Ryanair boss Michael O'Leary said it appears there were KGB security agents on the flight.

  Belarus has been condemned for diverting a plane, in order to arrest Belarusian opposition journalist Roman Protasevich.

  Fighter jets were sent to take down the plane after claiming there was a bomb threat, which witnesses on the flight said "wasn't true".

  Ryanair boss Michael O'Leary also suggested there were KGB security agents on the flight.
