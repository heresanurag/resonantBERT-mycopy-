  Ex-Met Police officer David Carrick will appear in court on 17 October after being charged with eight sexual offences

  A former Met Police officer has been charged with eight sexual offences against two women. David Carrick from Stevenage, Hertfordshire, has been charged with five counts of indecent assault, two counts of rape and one count of sexual assault, the Crown Prosecution Service said. Hertfordshire Constabulary has also charged him with one count of coercive and controlling behaviour. The 49-year-old will appear at Westminster Magistrates' Court on 17 October.

  Mr Carrick previously served with the Parliamentary and Diplomatic Protection Command within the Metropolitan Police.

  Det Ch Insp Iain Moor, from Hertfordshire Constabulary's major crime unit, led the investigation. He said: "The charges come in the wake of an extensive and complex investigation conducted over a period of several months."

