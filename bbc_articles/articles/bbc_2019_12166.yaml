title: 'In full: Laura Kuenssberg grills Johnson on Brexit deal - BBC News'
date: '2019-10-18'
section: General
url: http://www.bbc.co.uk/news/uk-politics-50103948
content: |-
  The prime minister urges MPs to "come together" and vote for his Brexit deal on Saturday.

  Prime Minister Boris Johnson has urged MPs to "come together" ahead of a crucial vote on his Brexit deal on Saturday.

  In an interview with BBC political editor Laura Kuenssberg, Mr Johnson said he wanted the country to "move on" from Brexit.
