title: 'Mabli Hall death: Woman admits hospital crash dangerous driving - BBC News'
date: '2024-09-20'
section: Wales
url: http://www.bbc.co.uk/news/articles/c0jw10jzn3jo
content: |-
  Mabli Cariad Hall died in hospital four days after a car hit her pram outside a hospital.

  Eight-month-old Mabli died four days after the crash outside Withybush Hospital

  A 70-year-old woman has admitted causing the death by dangerous driving of an eight-month-old baby in a crash outside a hospital. Mabli Cariad Hall, from Neath, died four days after a car hit her pram outside Withybush Hospital in Haverfordwest, Pembrokeshire, in June 2023. Bridget Curtis, from Begelly, Pembrokeshire, pleaded guilty at Swansea Crown Court to causing death by dangerous driving. She is due to be sentenced on 22 November.

  Judge Geraint Walters disqualified Curtis from driving and said psychiatric and pre-sentence reports would take place before the hearing. "You will probably have understood already that the granting of bail and the asking of reports can't carry any indication of the sentence that could be passed upon you," he told her. "You can have your bail until the day of sentence." John Dye, representing Curtis, said his client was 70 and had a full, clean driving licence and no previous convictions. He told the court: "She is absolutely devastated to be here." Mr Dye said Curtis, who was charged with causing death by dangerous driving in July, had voluntarily surrendered her driving licence.

  Mabli's father, Rob, was also injured in the incident. He was present alongside Mabli's wider family in court on Friday.

  The family described the past year as the most horrendous time of their lives in a statement. They said: "Every day is a day of pain for us, even now, but as parents we still have to give the love and support our other children need as they are still trying to come to terms with losing their baby sister." Following Mabli's death, they said: "Our family life has been changed forever and to this day we are still trying to come to terms with what has happened. "We will never forget that love and support shown to us and for the memory of our precious angel, Mabli Cariad." In June, the family laid flowers at the spot where Mabli was fatally injured, exactly a year since it happened.
