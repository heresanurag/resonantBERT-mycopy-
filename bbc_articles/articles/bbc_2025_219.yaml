id: bbc_2025_219
title: Israel confirms it is holding Gaza hospital chief Abu Safiya - BBC News
date: '2025-01-03'
section: Middle East
url: http://www.bbc.co.uk/news/articles/cj30deeggd7o
content: |-
  The IDF had earlier told a local NGO it was unaware of his case, sparking concern.

  The hospital director was detained during an Israeli raid last Friday

  Israel has confirmed it is holding Gaza hospital director Dr Hussam Abu Safiya after earlier telling a local NGO that it was unaware of his case, sparking concern for his well being. The Israel Defense Forces (IDF) statement said he was "currently being investigated by Israeli security forces" in person. The statement did not offer an explanation for the confusion but repeated that he was suspected of being a "terrorist" and for "holding a rank" in Hamas, the armed Palestinian group at war with Israel in Gaza. Dr Abu Safiya was arrested as the Israeli military forced patients and medical staff to leave Kamal Adwan hospital in northern Gaza last Friday, alleging the facility was a "Hamas terrorist stronghold".

  On Thursday the IDF told Physicians for Human Rights Israel (PHRI) that it had "no indication of the arrest or detention of the individual in question". The PHRI filed a petition with the Israeli High Court of Justice on Thursday, demanding Dr Abu Safiya's location be disclosed. It said the court had given the IDF a week to comply. Meanwhile Amnesty head Agnès Callamard said Israeli authorities must "urgently disclose his whereabouts". She said Israel had detained "hundreds of Palestinian healthcare workers from Gaza without charge or trial" and said they had been "subjected to torture and other ill-treatment and been held in incommunicado detention". Dr Abu Safiya's family previously told BBC Arabic they believe he is being held at Sde Teiman military base in southern Israel, where Israeli forces have taken many detainees from Gaza for interrogation. Whistleblowers have previously told the BBC and other international media of extremely harsh conditions for detainees there. Israel has said all detainees there are kept "carefully and appropriately". The IDF ordered everyone inside Kamal Adwan hospital to leave last Friday morning, giving the hospital about 15 minutes to move patients and staff into the courtyard, medical staff told the BBC. Beit Lahia, where the hospital is located, has been under a tightening Israeli blockade imposed on parts of northern Gaza since October. The UN has said the area has been under "near-total siege" as the Israeli military heavily restricts access of aid deliveries to an area where an estimated 10,000 to 15,000 people remain.

  On Saturday, the IDF said it apprehended 240 combatants at Kamal Adwan and said Dr Abu Safiya was among medical staff taken for questioning. Video footage showed him walking towards an Israeli armoured vehicle before being taken for interrogation. An Israeli military spokesperson confirmed the arrest that same day, saying the doctor had been transferred for questioning. Dr Abu Safiya was previously arrested by Israeli forces during an earlier raid on the hospital in October, but was freed shortly afterwards. During that Israeli operation Dr Abu Safiya's 15-year-old son was killed in a drone strike. Footage from later that day showed him leading funeral prayers for his son in the hospital courtyard. On Tuesday the UN Human Rights Office says Israeli attacks on and around hospitals have pushed Gaza's healthcare system to "the brink of total collapse" and raised serious concerns about war crimes and crimes against humanity. Israel's mission in Geneva said Israeli forces operated in accordance with international law and would "never target innocent civilians".

  Israel launched a campaign to destroy Hamas in response to the group's unprecedented attack on southern Israel on 7 October 2023, in which about 1,200 people were killed and 251 others were taken hostage. More than 45,580 people have been killed in Gaza since then, according to the territory's health ministry.
