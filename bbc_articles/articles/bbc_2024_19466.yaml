  Trial of Lucy Letby to be focus of TV documentary

  Letby was convicted of murdering seven babies and attempting to murder six others

  A new TV documentary is set to follow the trial of child serial killer Lucy Letby. The 34-year-old was convicted of murdering seven babies and attempting to kill six others at the Countess of Chester Hospital between June 2015 and June 2016. Her case will be examined in the two-part Channel 4 series currently titled The Trial Of Lucy Letby, which is yet to be given a release date. Letby was sentenced to 15 whole-life orders, making her only the fourth woman in UK history to be told she will never be released from prison.

  Her trial ran for 10 months from October 2022 to August 2023, with a retrial ordered after a jury was unable to reach a verdict on one count of attempted murder of a baby girl. A re-trial on that charge found her guilty of the attacking the new-born infant during a February 2016 night shift at the hospital. A public inquiry into how Letby was able to commit her crimes on the neo-natal unit is set to begin at Liverpool Town Hall on 10 September. Channel 4 said the documentary, directed by Emmy award-winning and Bafta-nominated filmmaker Daniel Bogado, is in "pre-production".
