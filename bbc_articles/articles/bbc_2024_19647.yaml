title: Christchurch man charged with attempted murder after child stabbed - BBC News
date: '2024-08-22'
section: Dorset
url: http://www.bbc.co.uk/news/articles/c17gn48j5lvo
content: |-
  Jordan Wilkes, who is 28 and from Christchurch, is charged with attempted murder.

  The girl remains in hospital where she is receiving treatment

  A man has been charged with attempted murder and possession of an offensive weapon after a nine-year-old girl was stabbed. Officers received a report at 17:45 BST on Tuesday that a child had sustained stab wounds at an address in Glider Close, Christchurch, Dorset Police said. Jordan Wilkes, who is 28 and from the town, appeared at Poole Magistrates' Court on Thursday and has been remanded in custody. He will appear at Bournemouth Crown Court on 5 September. The victim is still in hospital receiving treatment to injuries that are not life-threatening, the force said.

  A local woman aged in her 50s, who was arrested on suspicion of assisting an offender, has been released without charge and will not face any further action, according to the force spokesperson.

  Det Ch Insp Aimee Schock, of BCP CID, said: “After inquiries carried out by detectives, we liaised with the Crown Prosecution Service who authorised the charges. “There will continue to be an increased policing presence in the coming days and we would urge anyone to approach an officer with information or concerns. “I would like to thank the community for their ongoing support.”

