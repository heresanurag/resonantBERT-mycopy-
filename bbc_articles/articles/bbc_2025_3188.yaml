title: Multiple arrests after boy stabbed near Nottingham Castle - BBC News
date: '2025-03-01'
section: Nottinghamshire
url: http://www.bbc.co.uk/news/articles/cdel2rr2xd9o
content: |-
  A 17-year-old boy has been taken to hospital with "serious injuries", police say.

  Access to Nottingham Castle has been blocked due to ongoing police inquiries

  Police have made five arrests after a boy was stabbed near Nottingham Castle. Emergency services were called to Hounds Gate in Nottingham city centre at 23:42 GMT on Friday and a 17-year-old boy was taken to hospital with serious injuries, police said. Nottinghamshire Police said a second boy, 17, and a 16-year-old girl were also injured at an incident believed to have happened during a party at a flat. An 18-year-old man and four 17-year-old boys have been arrested on suspicion of affray and remain in custody, the force added.

  Forensic officers were carrying out inquiries in Hounds Gate and inside the castle gates

  Cordons were put in place in Hounds Gate, Maid Marian Way, Standard Hill and Lenton Road. Nottingham Castle was closed throughout the morning while an investigation continued in the area but has since reopened. Forensic officers were at the scene on Saturday morning with police activity taking place inside the castle grounds and in Hounds Gate.

  Police said the injuries of the boy taken to hospital were "not believed to be life-threatening". Det Insp Chris Berryman said: "We believe this incident happened during a party at a flat and we are working to understand events in the moments before, during and after what happened. "We particularly want to hear from anyone who was inside the flat, or who witnessed people running from the scene shortly afterwards." The force is urging witnesses to get in touch.

