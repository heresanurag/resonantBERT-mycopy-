title: Bushey crossbow murder suspect yet to be questioned - BBC News
date: '2024-07-18'
section: Beds, Herts & Bucks
url: http://www.bbc.co.uk/news/articles/c2e46642m8qo
content: |-
  Kyle Clifford, 26, remains under arrest in hospital on suspicion of murdering three women on 9 July.

  Carol Hunt and her daughters Louise and Hannah were killed in the attack

  A man suspected of killing a mother and two of her daughters in a crossbow attack will remain in hospital for "some time", police have said. Carol Hunt, 61, Hannah Hunt, 28, and Louise Hunt, 25, died at their home in Bushey, Hertfordshire, on 9 July. Kyle Clifford, 26, was found injured just under 24 hours later in the Hilly Fields area of Enfield, north London. He was arrested on 11 July on suspicion of three counts of murder. Hertfordshire Police says he remains under arrest and "will continue to receive treatment for some time".

  Kyle Clifford, 26, has been arrested and is in a serious condition in hospital

  The force previously said because Mr Clifford was in hospital, "the custody clock has not yet started". Police can typically hold suspects for 24 hours in custody, or longer for the most serious offences.

  A police spokesperson said: "He remains under arrest and will continue to receive treatment for some time. "We are not able to put a specific timeframe on this and will be guided by healthcare professionals." "Despite this, detectives from our Major Crime Unit continue with their investigation."
