  It comes as the executive's plans to curtail church services due to Covid-19 have been criticised by a series of MLAs.

  Paul Givan the DUP MLA for Lagan Valley said the decision put people of faith in a conflicted place.

  Mr Givan wondered whether some large churches could remain open with social distancing in place.

  There was "real anger" that churches were closed, according to DUP MLA William Humphrey said.

  SDLP MLA Justin McNulty said he was worried about what effect closure would have on the mental health of church goers.

  The Health Minister Robin Swann said such decisions were "not taken easily".

  Mr Swann said he would be in favour of churches opening for private worship if "social distancing is followed".
