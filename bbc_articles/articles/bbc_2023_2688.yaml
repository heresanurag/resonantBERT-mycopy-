id: bbc_2023_2688
title: Trump repeatedly invokes Fifth Amendment in deposition - BBC News
date: '2023-02-01'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-64394860
content: |-
  The former president, accused of inflating property values, refused to answer questions at his deposition.

  In August, Donald Trump was deposed for a lawsuit where he's accused of inflating property values. In a video released by the New York Attorney General's Office, the former president invoked the Fifth Amendment over and over again.
