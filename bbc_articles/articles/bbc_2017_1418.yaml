title: 'Brexit: Supreme Court''s Lord Neuberger announces decision - BBC News'
date: '2017-01-24'
section: General
url: http://www.bbc.co.uk/news/uk-politics-38729019
content: |-
  Supreme Court President Lord Neuberger says Parliament must vote on whether the government can start Brexit.

  "The government cannot trigger Article 50 without an Act of Parliament authorised by law," he said.
