title: 'Storm Leslie: Portugal hit by hurricane-force winds - BBC News'
date: '2018-10-14'
section: Europe
url: http://www.bbc.co.uk/news/world-europe-45853847
content: "The remnants of Hurricane Leslie leave 300,000 homes without power after\
  \ striking overnight.\n\nThis video can not be played To play this video you need\
  \ to enable JavaScript in your browser. About 1,000 trees have been uprooted by\
  \ the hurricane-force winds\n\nHurricane-force winds have struck central and northern\
  \ Portugal, leaving 300,000 homes without power.\n\nThe remnants of Hurricane Leslie\
  \ swept in overnight on Saturday, with winds gusting up to 176km/h (109mph).\n\n\
  Civil defence officials said 27 people suffered minor injuries, with localised flooding,\
  \ hundreds of trees uprooted and a number of flights cancelled.\n\nThe storm, one\
  \ of the most powerful to ever hit the country, is now passing over northern Spain.\n\
  \nThe worst-affected areas in Portugal were around the capital, Lisbon, and in the\
  \ districts of Coimbra and Leiria. Aveiro, Viseu and Porto in the north also suffered\
  \ damage.\n\nAbout 1,000 trees have been uprooted, officials say. The main A1 motorway\
  \ was among the roads temporarily blocked.\n\nThe storm wreaked havoc throughout\
  \ Portuguese towns and cities\n\nSome 1,900 incidents were reported to emergency\
  \ services, although civil defence commander Luis Belo Costa said \"the greatest\
  \ danger has passed\".\n\nHundreds of people remained in an arts centre in Figueira\
  \ da Foz after a concert because of the high winds.\n\nA resident of the town told\
  \ SIC television: \"I have never seen anything like it, The town seemed to be in\
  \ a state of war, with cars smashed by fallen trees. People were very worried.\"\
  \n\nThe city centre of Figueira da Foz also took damage\n\nHeavy rainfall from storm\
  \ Leslie in a market in Pamplona in Spain\n\nThe roof blew off a stadium hosting\
  \ the European final of the women's roller hockey competition, halting the event,\
  \ AFP news agency reported.\n\nIt is rare for an Atlantic hurricane to reach the\
  \ Iberian peninsula, with only five such events recorded.\n\nHurricane Leslie had\
  \ formed on 23 September but was downgraded to a tropical storm before it made landfall.\
  \ However, it retained gusts of hurricane strength.\n\nThe Spanish Meteorological\
  \ Agency (Amet) said Leslie was moving north-east through the peninsula.\n\nGusts\
  \ of almost 100km/h were recorded near the city of Zamora early on Sunday, but winds\
  \ have now lessened.\n\nAmet said that on Sunday morning large areas of Asturias,\
  \ Castille and León and Cantabria would be affected, with north-eastern areas hit\
  \ in the afternoon.\n\nFour departments in southern France have also been put on\
  \ alert for storms and flooding.\n\nHurricanes are violent storms that can bring\
  \ devastation to coastal areas, threatening lives, homes and businesses. Hurricanes\
  \ develop from thunderstorms, fuelled by warm, moist air as they cross sub-tropical\
  \ waters. \n\nWarm air rises into the storm. Air swirls in to fill the low pressure\
  \ in the storm, sucking air in and upwards, reinforcing the low pressure. The storm\
  \ rotates due to the spin of the earth and energy from the warm ocean increases\
  \ wind speeds as it builds. When winds reach 119km/h (74mph), it is known as a hurricane\
  \ - in the Atlantic and Eastern Pacific - or a typhoon in the Western Pacific. \"\
  Everybody has a plan until they get punched in the face. Well, we're about to get\
  \ punched in the face.\" \n\nFlorida Mayor Bob Buckhorn, ahead of Hurricane Irma\
  \ (2017) The central eye of calmer weather is surrounded by a wall of rainstorms.\n\
  \nThis eyewall has the fastest winds below it and violent currents of air rising\
  \ through it. A mound of water piles up below the eye which is unleashed as the\
  \ storm reaches land. \n\nThese storm surges can cause more damage from flooding\
  \ than the winds. \"Urgent warning about the rapid rise of water on the SW FL coast\
  \ with the passage of #Irma's eye. MOVE AWAY FROM THE WATER!\"\n\nTweet from the\
  \ National Hurricane Center The size of hurricanes is mainly measured by the Saffir-Simpson\
  \ scale - other scales are used in Asia Pacific and Australia. Winds 154-177km/h\n\
  \nRoofs and trees could be damaged. \n\nStorm surge +1.8m-2.4m Hurricane Sandy (2012)\
  \ caused $71bn damage in the Caribbean and New York Hurricane Ike (2008) hit Caribbean\
  \ islands and Louisiana and was blamed for at least 195 deaths \"For everyone thinking\
  \ they can ride this storm out, I have news for you: that will be one of the biggest\
  \ mistakes you can make in your life.\" \n\nMayor of New Orleans Ray Nagin ahead\
  \ of Hurricane Gustav, 2008"
