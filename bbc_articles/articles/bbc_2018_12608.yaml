title: Was Jean-Claude Juncker mocking Theresa May's moves? - BBC News
date: '2018-10-09'
section: General
url: http://www.bbc.co.uk/news/world-europe-45788593
content: |-
  The president of the European Commission gave a wiggle as he came on stage. Coincidental or intentional?

  The European Commission President, Jean-Claude Juncker, did a wiggle as he got on stage at an event in Brussels.

  It came the week after Theresa May's Dancing Queen arrival for her Conservative Party conference speech.

  So was it just a coincidence or was it intentional?
