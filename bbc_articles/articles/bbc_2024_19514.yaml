  Chris Woakes is targeting a place on England’s winter tours after assuming the role of attack leader following the retirement of James Anderson. The 35-year-old has not played an away Test in more than two years and his bowling average of 51.88 abroad pales in comparison to an excellent 21.57 at home. Woakes would look a natural fit for conditions for three Tests in New Zealand in December, but may be less effective on the three-match tour of Pakistan in October. “I’ll play for England where I’m picked to play for England. I certainly wouldn’t rule myself out,” he said. “The selectors will have their plans, but I’m certainly not going to turn down a tour if selected. We shall see.”

  Woakes last played away in the Caribbean at the end of Joe Root’s captaincy in 2022. He has not been taken on the tours of Pakistan, New Zealand or India since captain Ben Stokes and coach Brendon McCullum took charge. Without Anderson and Stuart Broad, who retired last year, Woakes has become England’s senior seamer. His three wickets on the first day of the first Test against Sri Lanka took his tally to 14 wickets in four matches this summer. “The more Test cricket you play, you pick up new skills and have more experience to fall back on,” said the Warwickshire man. “I haven’t played an away Test for a little while, but that might be a good thing because it can give you a fresh look on things. I wouldn’t shy away from it.”

