title: What will climate change look like in your area? - BBC News
date: '2020-12-07'
section: General
url: https://www.bbc.co.uk/news/resources/idt-d6338d9f-8789-4bc2-b6d7-3691c0e7d138
content: "The BBC and the Met Office have looked at the country's changing climate\
  \ in detail.\n\nWhat will climate change look like near me?\n\nHow high might temperatures\
  \ climb and how much rain might fall in your area and how? The BBC and the Met Office\
  \ have looked at the UK's changing climate in detail to find out.\n\nTemperatures\
  \ in the UK exceeded 40C for the first time on record earlier this summer, and extreme\
  \ weather events are likely to become even more frequent.\n\nThe Met Office climate\
  \ projections cover different levels of global warming. When, or if, these levels\
  \ are reached will depend on the concentration of greenhouse gases in our atmosphere.\n\
  \nThe data is measured in 12km-square (7.5-mile-square) grids across the UK. The\
  \ results for your postcode represent an average for the grids closest to you and\
  \ the mid-point of a range of future possibilities, which come from the Met Office’s\
  \ most recent major climate modelling data.\n\nHow could the climate change near\
  \ you?\n\nDon't feel under the weather because you can't play with our interactive.\
  \ Upgrade your browser or enable JavaScript to have a go!\n\n. Button active, text\
  \ has been loaded below The hottest summer day in the 30 years from 1991 to 2019\
  \ near you was {{beginHighlight}}{{current_hottest_day}}C{{endHighlight}}. If global\
  \ average temperatures increase 2C above pre-industrial levels, the hottest summer\
  \ day could be about {{beginHighlight}}{{medium_hottest_day}}C{{endHighlight}}.\
  \ If global temperatures rise by 4C, it could be about {{beginHighlight}}{{high_hottest_day}}C{{endHighlight}}.\
  \ The warmest winter day in the 30 years from 1991 to 2019 near you was {{beginHighlight}}{{current_hottest_day}}C{{endHighlight}}.\
  \ If global average temperatures increase 2C above pre-industrial levels, the warmest\
  \ winter day could be about {{beginHighlight}}{{medium_hottest_day}}C{{endHighlight}}.\
  \ If global temperatures rise by 4C, it could be about {{beginHighlight}}{{high_hottest_day}}C{{endHighlight}}.\
  \ The hottest day recorded in the UK came in July 2022, with 40.3C measured in at\
  \ Coningsby in Lincolnshire. Human activity has increased carbon dioxide (CO2) emissions\
  \ and caused rising temperatures worldwide since the growth of industrialisation\
  \ in the 19th Century. If global average temperatures rise by 2C above pre-industrial\
  \ levels, days at least as hot the 2019 record could be more frequent and widespread.\
  \ And with a 4C rise, parts of the UK could see temperatures above 42C. Urgent cuts\
  \ in emissions are needed to keep the rise in global average temperatures in check.\
  \ The Glasgow Climate Pact, reached at the COP26 summit in 2021, agreed countries\
  \ will meet this year to pledge further cuts to emissions of carbon dioxide (CO2).\
  \ This is to try to keep temperature rises within 1.5C - which scientists say is\
  \ required to prevent a \"climate catastrophe\". Current pledges, if met, will only\
  \ limit global warming to about 2.4C. In the the 30 summers from 1991 to 2019, there\
  \ were {{beginHighlight}} {{current_summer_days}} days{{endHighlight}} above 25C\
  \ per month on average. If global temperatures rise by 2C, there could be {{beginHighlight}}{{medium_summer_days}}\
  \ days{{endHighlight}}. With a 4C rise, there could be {{beginHighlight}}{{high_summer_days}}\
  \ days{{endHighlight}}. The World Meteorological Organization (WMO) defines any\
  \ day with a maximum temperature above 25C as a \"summer day\". In the 30 summers\
  \ from 1991 to 2019, even the warmest places in the UK, located in the South, had\
  \ no more than seven days a month above 25C on average. If global average temperatures\
  \ rise by 2C, southern parts of the country could see more than 11 days per summer\
  \ month go beyond 25C. If the rise is 4C, those places could have 20 or more summer\
  \ days per month, and higher likelihood of hot spells triggering public-health warnings.\
  \ The cooler, northern parts of the UK, which may not see many days above 25C even\
  \ with a 4C rise, can nonetheless expect average daytime temperatures in summer\
  \ to increase by at least 2.5C. Enter your postcode above to reveal how hot it could\
  \ get near you The average daytime temperature in the UK in summer currently ranges\
  \ from about 14C in northern Scotland to 22C in southern England.\n\nBut summers\
  \ have been getting warmer, with four of the 10 hottest summers up to 2019 recorded\
  \ in the past two decades. Even if countries cut emissions and the world warms by\
  \ 2C, the whole UK could see higher summer temperatures.\n\nIn some northern locations,\
  \ the increase could be small. In southern areas, average summer temperatures could\
  \ reach 24C. If emissions continue to increase and average global temperatures rise\
  \ by 4C, summers will be even hotter.\n\nNearly a third of the UK could see average\
  \ summer temperatures above 25C. The Met Office climate projections for the UK indicate\
  \ significant temperature rises in the decades ahead for both winter and summer,\
  \ with the greatest increases in the already warmer South. Extreme weather could\
  \ become more frequent and intense. Not every summer will be hotter than the last\
  \ – but temperature records are expected to be regularly broken, while heatwaves\
  \ are likely to be longer and happen more often. . Button active, text has been\
  \ loaded below In the 30 years from 1991 to 2019, there were {{beginHighlight}}\
  \ {{current_rainy_days}} rainy days{{endHighlight}} on average per month in summer.\
  \ If global average temperatures rise by 2C, this could be {{beginHighlight}}{{medium_rainy_days}}\
  \ days{{endHighlight}} per month. At a 4C rise it could be about {{beginHighlight}}{{high_rainy_days}}\
  \ days{{endHighlight}}. In the 30 years from 1991 to 2019, there were {{beginHighlight}}{{current_rainy_days}}\
  \ rainy days{{endHighlight}} on average per month in winter. At both 2C and 4C rises,\
  \ the number of rainy days per month could be roughly the same. As the world warms,\
  \ fewer rainy days in summer are expected. Currently, over a quarter of the UK has\
  \ 20 or more days without rain each summer month. This could grow to more than half\
  \ the country if we reach 4C global warming. Winter rains could remain as likely\
  \ as they are now. The number of days will vary from year-to-year, but rainy days\
  \ in a warmer future could be wetter than today with total rainfall expected to\
  \ rise. . Button active, text has been loaded below In warmer winters the heaviest\
  \ rains are likely to get more intense. If global average temperatures rise by 4C\
  \ above pre-industrial levels, half the country could expect at least 20% more rainfall\
  \ on the wettest winter days. Summer rains may also become heavier in many places,\
  \ although total rainfall is expected to decline. Of course, not all of the heaviest\
  \ rains will necessarily fall in these two seasons. The current wettest day on record\
  \ was 3 October 2020, when enough rain fell across all four nations to fill Loch\
  \ Ness. Scroll up and enter your postcode above to see how rainy it could get near\
  \ you Currently, the wettest areas of the UK dominate the west coast, with nearly\
  \ all of Wales and western Scotland receiving most rain in winter months. So how\
  \ much will change in future winters? With a 2C rise, very little compared to what\
  \ we've seen recently. \n\nBut winters over the past 30 years have been rainier\
  \ on average than previously, and the pattern of wetter winters could continue.\
  \ The exact amount of change in rainfall at 2C global warming will vary across the\
  \ country. Most places could have slightly wetter winters than in the 20th Century.\
  \ If global average temperatures were to rise by 4C, more than half the country\
  \ could see at least 10% more rain over the winter months. The UK climate projections\
  \ suggest increases in winter rainfall in most parts of the country, as well as\
  \ drier summers. Not every winter will necessarily be rainier than the one before,\
  \ and not every summer will be dry, but both trends could have big impacts.\n\n\
  As the world warms, the UK is likely to have hotter, drier summers and warmer, wetter\
  \ winters, according to the Met Office.\n\nExtreme weather events such as heatwaves\
  \ and heavy downpours could become more frequent and more intense. Many scientists\
  \ are concerned.\n\n\"I think it’s really frightening,” says Dr Lizzie Kendon, a\
  \ senior Met Office scientist. “It's just a wake-up call really as to what we’re\
  \ talking about here.”\n\nWe are already seeing the impacts of climate change, but\
  \ the level of global warming we reach and by when will depend primarily on the\
  \ concentration of greenhouse gases in the atmosphere.\n\nTo some, warming weather\
  \ may not seem like such a big deal. But even the smallest incremental changes in\
  \ climate can have far-reaching effects.\n\nTemperatures above 30C for two or more\
  \ days can trigger a public-health warning. In the 1990s, this happened about once\
  \ every four years for locations in the South. By the 2070s, projections suggest\
  \ it could be as frequently as four times per year - 16 times more often, if we\
  \ do not curb our emissions.\n\nThe Met Office projects rainy winters, which keep\
  \ the soil wet into spring, and dry summers of infrequent rainfall will become the\
  \ norm.\n\nSummer rain is likely to become less frequent but could be heavier. Without\
  \ regular rainfall, the ground has a harder time absorbing water when it finally\
  \ does come, leading to a greater risk of flash flooding.\n\nFloods will likely\
  \ become a staple of warming winters as well.\n\nSteady rain, which is currently\
  \ a feature of winter months, will probably continue, and total rainfall is expected\
  \ to increase.\n\nWhen the ground is already saturated, waterways tend to rise.\
  \ Bridges and sewers designed for historical rainfall levels may come increasingly\
  \ under pressure.\n\nWarming temperatures could also mean cold spells become less\
  \ frequent.\n\nAnd snowy UK winters could become thing of the past as climate change\
  \ affects the UK, according to Met Office analysis shared with BBC Panorama.\n\n\
  Temperatures below freezing during the day and areas with considerable amounts of\
  \ snow on the ground may be limited to parts of Scotland by the end of the century\
  \ if emissions continue to rise."
