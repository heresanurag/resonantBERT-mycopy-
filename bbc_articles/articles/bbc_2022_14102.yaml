content: |-
  Sources planning ex-PM's possible campaign say he has 100 MPs behind him, but Rishi Sunak's supporters call for proof.

  It's not the right time for Johnson to return - Jenrick

  We've been hearing from more and more Tory MPs in the last few hours as they declare who they are backing. Health minister Robert Jenrick - a Sunak backer - told followers it was "not the right time" for Boris Johnson to return. Johnson's former housing secretary said while "there may be another time for Boris", "the stakes could not be higher" for the UK, and Sunak was the best person to provide "serious, competent leadership". "We should not forget that 43 days ago the party removed Boris Johnson as serious issues engulfed his premiership," he said. "Some of these remain unresolved." It echoes a warning this weekend from Dominic Raab, who served as Johnson's deputy PM and is also a prominent backer of Sunak. Raab said while he respected and liked Johnson, an MP-led inquiry into whether the former PM misled Parliament over the partygate scandal would hang over him. "We’d be back in the sort of Groundhog Day of partygate. We've got to have the country and the government moving forward," Raab told Times Radio. Johnson could be suspended from Parliament or even lose his seat if the Privileges Committee investigating the matter rules against him.
