title: Trespasser causes severe rail disruption for partygoers - BBC News
date: '2022-06-04'
section: England
url: http://www.bbc.co.uk/news/uk-england-61693183
content: |-
  Services to and from London Kings Cross were brought to a standstill after a trespasser got on the tracks.

  LNER, Grand Central and Thameslink services are among the affected routes

  More than 100 trains were delayed and at least 20 cancelled on the line connecting London and Edinburgh after a trespasser got on to the tracks.

  Services on the East Coast mainline came to a standstill on Saturday.

  The disruption threatened to add to crowding and queues as people headed to big events including Jubilee celebrations and Liam Gallagher's concert in Knebworth.

  The trespasser was eventually found hiding in a tree in Hertfordshire.

  Trains were stopped while British Transport Police used a helicopter and dog teams to help search for the person in the Potters Bar area, said Great Northern which operates some services on the line.

  LNER, Grand Central and Thameslink services were also affected.

  It is understood the trespasser avoided capture for some time before being found in the tree.

  A Network Rail spokesperson said: "Services from London King's Cross have been severely disrupted this afternoon owing to a trespass incident in the Potter's Bar area.

  "The individual has been safely removed from the railway and services are up and running again, however, passengers should check the status of their journey before travelling as delays are likely to continue through the afternoon.

  "Anyone travelling to an event such as Slam Dunk in Hatfield or to Stevenage for Liam Gallagher should be aware that due to the earlier disruption, a significantly disrupted service is expected on Saturday evening with queuing at stations."

