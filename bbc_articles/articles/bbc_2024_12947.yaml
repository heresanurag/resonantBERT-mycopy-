title: Max Verstappen wins Spanish Grand Prix from Lando Norris to extend championship
  lead - BBC Sport
date: '2024-06-23'
section: Formula 1
url: http://www.bbc.co.uk/sport/formula1/articles/c722212ngedo
content: |-
  Red Bull’s Max Verstappen prevails in a tense, strategic battle with McLaren’s Lando Norris to win the Spanish Grand Prix.

  Verstappen holds off Norris to win in Spain

  Max Verstappen has won the past three Spanish Grands Prix

  Red Bull’s Max Verstappen prevailed in a tense, strategic battle with McLaren’s Lando Norris to win the Spanish Grand Prix. Verstappen’s seventh victory in 10 races this year hinged on a decisive opening phase of the race from the Dutchman. Verstappen was in the lead by lap three while Norris stayed stuck behind Mercedes’ George Russell for 15 laps. It left Norris too much to do and Verstappen was able to measure his pace to control the McLaren behind. Lewis Hamilton took his first podium finish of the year for Mercedes in third, ahead of Russell, as Britons finished second, third and fourth. Charles Leclerc was fifth, leading home Ferrari team-mate Carlos Sainz. The race underlined the fact that Red Bull have lost the massive advantage they held over the first five races of the season, but also that Verstappen is operating at a level of consistent excellence in the cockpit and will be tough to beat - not only for the championship, on which he has a stranglehold, but also on individual race weekends. McLaren have been on Red Bull’s pace since the Miami Grand Prix in early May, and Verstappen has not taken a pole position since the Chinese Grand Prix in April. Even so, Verstappen has won three of the past five races and consolidated his championship advantage. Norris has moved ahead of Leclerc into second place but is 69 points behind Verstappen after 10 of 24 races. "I should have won it," Norris said. "I got a bad start, as simple as that. The car was incredible today, we were for sure the quickest, I just lose it in the beginning. "Disappointed but a lot of positives. One negative and that kind of ruined everything. I know that I can just work on it for next time."

  George Russell jumps into the lead at the start but Verstappen was in front by lap three

  Verstappen grabbed the race by the throat with a brilliant opening few laps at the Circuit de Barcelona-Catalunya. He made a slightly better start than Norris and was able to get his front wing inside the McLaren on the run to the first corner. Norris defended robustly, even forcing Verstappen on to the grass, but was able to fend off the Red Bull. Verstappen passed Norris on the inside as Russell took advantage of their tussle to pass both to grab the lead from fourth on the grid. Verstappen then passed Russell at the start of lap three in a decisive and committed move around the outside of Turn One, while Norris was stuck behind the Mercedes for a further 12 laps. The Dutchman said this phase "made the race for him". It forced Norris and McLaren into an off-set strategy, trying to run longer and then come back at Verstappen on fresher tyres. But it left him too much to do and he had to settle for second behind the Red Bull driver, who yet again proved himself the class of the field. Verstappen had a four-second advantage when he made his first stop on lap 17, and McLaren decided to leave Norris out, waiting a further seven laps before his stop. He had to fight his way back past first the Ferrari of Carlos Sainz and then the Mercedes of Russell and Hamilton before closing in on Verstappen. Norris got to within 4.7 seconds of the Red Bull before Verstappen peeled in for his final stop on lap 44, and was 6.8secs adrift after emerging from his own final stop three laps later. Norris edged closer to Verstappen over the final stint but he had been left with too much to do and crossed the line two seconds behind. Hamilton’s third place - thanks to some decisive overtaking moves, including a very aggressive one on Sainz - confirmed Mercedes’ emergence as contenders after a series of upgrades, while fifth and sixth on the grid and in the race was a disappointing result for a Ferrari team who had a major upgrade for this race. Leclerc was on Russell’s tail on the final lap but the Mercedes managed to hold him off. McLaren’s Oscar Piastri moved up from 10th on the gird to finish seventh, while Red Bull’s Sergio Perez passed Pierre Gasly’s Alpine late on to take eighth. The second Alpine of Esteban Ocon took the final point in 10th place.

  The triple-header continues next week with the Austrian Grand Prix at the Red Bull Ring. The event in Spielberg will host the third of six sprint weekends this season.
