title: Young vulnerable people receive vaccine - BBC News
date: '2021-02-26'
section: General
url: http://www.bbc.co.uk/news/health-56105574
content: |-
  Nearly 200,000 extremely clinically vulnerable young people have been offered their vaccine.

  The focus of the vaccine rollout so far has largely been on older people. But it has also included nearly 200,000 younger people across the UK who are classed as extremely clinically vulnerable and who’ve been shielding for much of the past year.

  Jobs, education, social lives and relationships have been severely restricted for them during the pandemic.

  Hope Stevens, 22, and Adetutu Ojo, 30, both have received their first vaccines.
