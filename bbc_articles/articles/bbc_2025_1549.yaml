content: |-
  Saturday's handover was less chaotic than the exchange a few days ago, after concerns were expressed over safety.

  Three Israeli hostages and dozens of Palestinian prisoners released

  This video can not be played To play this video you need to enable JavaScript in your browser. Watch: Three more Israeli hostages released by Hamas

  Three Israeli hostages being held by Hamas in Gaza were released from captivity on Saturday, in exchange for 183 Palestinian prisoners held by Israel. Yarden Bibas, 34, Ofer Kalderon, 54, and Keith Siegel, 65, were handed over to the Red Cross - the latest hostages to be released as part of a ceasefire deal struck last month. Palestinian prisoners were taken in buses to Gaza and the West Bank, many of them coming from the nearby Ofer prison. The tone of the exchange sat in stark contrast to Thursday's chaotic handover, during which surging crowds pressed in on hostages, eliciting concern for their safety and prompting Israel to delay that day's release of Palestinian prisoners.

  Yarden Bibas, a hostage held in Gaza, waves from a stage in Khan Younis

  Saturday's release was more orderly, but retained the presentational elements that sought to project that Hamas remains the governing force in Gaza. Lines of armed fighters kept crowds at bay, while the men who were released were flanked by more armed and masked fighters. A banner behind them bore the images of killed Hamas leaders. Officials from the Red Cross signed certificates of release for Mr Kalderon and Mr Bibas, who were then made to hold them as they waved to the crowd in Khan Younis. As Mr Siegel, a US-Israeli dual national, appeared on stage in Gaza City, a crowd gathered in Hostages Square in Tel Aviv erupted into cheers, some chanting: "He's a hero, he's a hero." One woman described feeling "pure happiness".

  Red Cross officials signed certificates of release for two of the hostages

  Mr Siegel's wife, Aviva, said "there's no one happier than me" as she was filmed getting into a car to go and meet her husband. The family of French-Israeli Mr Kalderon said in a statement that they were "overwhelmed with joy, relief, and emotion after 484 long and difficult days of unbearable waiting". They added that he "endured months in a nightmare", holding onto the "hope of embracing his children again". But others, like Liz Domsky, had mixed feelings. "They all need to come home," she said while watching the proceedings from Hostages Square. Mr Siegel's niece, Tal Wax, told the BBC: "We're all very, very excited to have Keith back home but very worried to see the state that he came back to us in. Although we can see that he is able to walk and talk, we see that he has lost a lot of weight." She added: "Obviously our family are very excited for Keith but it's still a very bitter moment. [The other families] have to have this moment just like us." There was a similar complexity of emotion in Israel over the release of Mr Bibas, whose wife, Shiri, and two young sons, Ariel and Kfir, were also kidnapped during the 7 October 2023 attack by Hamas. Hamas claimed that they had been killed by an Israeli air strike early on in the ensuing war - but they were then named in a list of hostages it said in January it was willing to free. Holding up an image of Kfir, who was just nine months old when he was taken, Andrea Wittenberg remarked: "They are children. They should be at home. It is impossible for them to be in Gaza." She added: "I don't want to give up." Israeli President Isaac Herzog described Mr Bibas's return as "simply heartbreaking", saying his country remained "deeply concerned" about their fate. "As an entire nation we hold them in our hearts," he wrote. Herzog added that each released hostage "deserves the time to rehabilitate and rebuild their lives, and every one of the hostages deserves to come home soon".

