  In Ramallah, in the occupied West Bank, buses of freed Palestinian prisoners were met by large and jubilant crowds. "Today we were born again...we left the narrowness of the graves to the spaciousness of the world," Nasrallah Muammar, who was released after 17 years in prison, said in his first statement, according to Palestinian media. "I feel joy despite the journey of pain and hardship that we lived," Ali Al-Barghouti, who was serving two life sentences, told Reuters. A majority of the prisoners were held on what Israel calls "administrative detention" - what critics say is imprisonment without charge. Some had been found guilty of serious crimes. The Palestinian Prisoners' Association said 54 had received long sentences and 18 were serving life in prison.

  A freed Palestinian prisoner embraces children after being released, in Khan Younis, Gaza.

  Saturday's hostage release was more organised than the one on Thursday, when two Israelis and five Thai nationals were led through cheering crowds, who at times had to be pushed out of the way. Efrat Machikawa, the niece of 80-year-old Gadi Moses, among those released, said her uncle thought it was the "end of his life" as the crowd surrounded him, and praised the "brave" Red Cross workers who had facilitated his release. Described as "shocking scenes" by Israeli Prime Minister Benjamin Netanyahu, Israel demanded - and received assurances - that they would not be repeated. International Committee of the Red Cross President Mirjana Spoljaric had urged that security around the handovers be improved and they "take place in a safe and dignified manner".
  • None What we know about the deal According to the Hamas-run Gaza health ministry, nearly 47,500 people have been killed in the territory since Israel invaded in the wake of the 7 October 2023 attack, in which around 1,200 Israelis were killed and 251 taken hostage. A ceasefire and hostage release agreement between Israel and Hamas began on 19 January, with the first stage to see 33 hostages and 1,900 prisoners released, as well as hundreds of lorries carrying humanitarian aid being allowed into Gaza each day. The Rafah crossing between Gaza and Egypt - a key humanitarian corridor - was also reopened on Saturday, after eight months of being closed. The Gaza health ministry said 50 patients had left via the crossing to access medical care in Egypt. Hundreds of thousands of displaced Palestinians have also been allowed to return to their homes in northern Gaza this week. But Ashraf al-Dous, among them, said that some, including his father, have gone back to the south after seeing the scale of the destruction caused by Israeli air strikes. "It's really a mess," he said. "The situation is catastrophic." Most of the floors in his apartment building in northern Gaza City have been destroyed, he said. "I didn't expect the situation to be like this - it's too much."
