title: Robert De Niro shows "love and support" for transgender daughter - BBC News
date: '2025-05-01'
section: Culture
url: http://www.bbc.co.uk/news/articles/c8dg3pn24z0o
content: |-
  "I don't know what the big deal is," says the US Hollywood actor.

  Robert De Niro's latest movie, the biographical crime drama Alto Knights, was released in March

  Hollywood star Robert De Niro has said he is showing "love and support" for his daughter Airyn, after she came out as transgender. In a recent interview with LGBTQ+ publication Them, external, Airyn De Niro spoke about "stepping into this new identity". Airyn's famous father told Variety, external in a statement: "I loved and supported Aaron as my son, and now I love and support Airyn as my daughter. "I don't know what the big deal is," he added. "I love all my children."

  The Goodfellas actor's daughter, 29, noted how she began to transition last year because, as a transgender woman, "there's a difference between being visible and being seen. "I've been visible. I don't think I've been seen yet." Airyn, daughter of De Niro and US actress and model Toukie Smith, also said the actress and LGBTQ advocate Laverne Cox had been an inspiration; and that she now hoped to help expand trans visibility and to honour her black queer ancestors. "Trans women being honest and open, especially [in] public spaces like social media and getting to see them in their success... I'm like, you know what? Maybe it's not too late for me." And with regard to the experience of being one of seven De Niro children, she went on say that "no parent is perfect, but I am grateful that both my parents agreed to keep me out of the limelight. "They have told me they wanted me to have as much of a normal childhood as possible."

