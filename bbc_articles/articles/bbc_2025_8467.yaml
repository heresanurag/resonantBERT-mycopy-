  Transgender women in the UK have come under scrutiny in recent weeks, after judges at the Supreme Court unanimously ruled a woman is defined by biological sex under equalities law. Now the UK's only ever judge to publicly say they are transgender is planning to take the government to the European Court of Human Rights over the ruling which she said violated her human rights. Judge Lord Hodge said the ruling should not be seen as a triumph of one side over the other, and stressed that the law still gives protection against discrimination to transgender people.
