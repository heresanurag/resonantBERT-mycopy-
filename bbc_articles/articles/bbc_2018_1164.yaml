content: |-
  Reporter's shock caught on camera as truck ploughs through cycle race finish line in Australia.

  The moment a truck driver in Australia ploughed through an inflatable finish line marker has been caught on camera.

  Australian Broadcasting Corporation reporter Sarah Hancock was covering the Santos Tour Down Under cycling race when the lorry carrying hay passed by.
