title: WW2 bomb explodes on Clacton beach - BBC News
date: '2025-05-01'
section: General
url: http://www.bbc.co.uk/news/videos/cglxjd06yn7o
content: |-
  HM Coastguard says it was a "loud detonation".

  Bomb disposal experts detonated a World War Two shell on a beach after it washed ashore.

  The ordnance was found about 500m (1,640ft) from the pier in Clacton-on-Sea, Essex, on Monday afternoon.

  It was taken to nearby Holland Haven and exploded on the sand "with a successful and loud detonation", HM Coastguard said.

  A spokesman added: "We would like to thank the public for their cooperation and for respecting the cordons."
