id: bbc_2017_879
title: 'Stillbirth campaign: ''I want recognition baby existed'' - BBC News'
date: '2017-01-27'
section: General
url: http://www.bbc.co.uk/news/uk-38767821
content: |-
  Sarah Henderson's daughter was stillborn at 23 weeks and 4 days, but did not qualify for a birth certificate.

  She has launched a petition to allow certificates for babies stillborn before 24 weeks.
