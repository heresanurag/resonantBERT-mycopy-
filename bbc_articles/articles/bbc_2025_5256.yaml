title: Two people dead after car drives into crowd in Mannheim, Germany - BBC News
date: '2025-03-04'
section: Europe
url: http://www.bbc.co.uk/news/articles/cvge70y4q91o
content: |-
  Several more people have been injured, police say, and one suspect, a German man, has been arrested.

  Two dead after car drives into crowd in Germany

  Two people - an 83-year-old woman and a 54-year-old man - have been killed after a vehicle drove into a pedestrian area in the city of Mannheim, western Germany. Five people were seriously injured and another five suffered minor injuries in the incident, investigators said. Authorities arrested a lone suspect, a 40-year-old German man, who is not believed to be linked to extremism but shows "concrete indications of mental illness". The suspect, who prosecutors said was a landscape gardener, remains in hospital in a stable condition after shooting himself with a gun loaded with blanks.

  The incident occurred at around 12:15 local time (11:15 GMT), Mannheim police said. Images from the scene showed police inspecting the car, a small black Ford, which had sustained heavy damage to its front. The images show the car missing a hub cap on its front left wheel. In the CCTV footage, the front left hub cap also appears to be missing. Thomas Strobl, interior minister of Baden-Württemberg, said the man used the vehicle "as a weapon". "This act is one of several crimes in the recent past in which a car was misused as a weapon," Mr Strobl said, but added that there is no evidence to suggest the incident is connected to the Easter carnival taking place in the city. Police are investigating two counts of murder and several of attempted murder, Mannheim chief public prosecutor Romeo Schluessler told reporters.

