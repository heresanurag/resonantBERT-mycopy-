  Mannheim's mayor described the incident as "abhorrent and "inhumane". "Our thoughts are with the dead and injured, their families and friends," Mayor Christian Specht said. Olaf Scholz, Germany's outgoing chancellor, thanked the emergency services and wished "strength" for eyewitnesses in Mannheim to "process what they have experienced". "We mourn with the relatives of the victims of a senseless act of violence and fear for those injured," he said in a social media post. The incident comes at a time of heightened security as outdoor carnivals linked to Easter celebrations are held across Germany. There was a parade through the Mannheim city centre on Sunday, with major events scheduled for Tuesday. A market has now been closed and a street carnival in the city centre will not take place. Carnival events in the nearby suburbs of Feudenheim, Neckarau and Sandhofen have also been cancelled.
