  Chapecoense football club player Neto is one of six survivors of a plane crash that killed 71 people in Colombia last November.

  Chapecoense footballer Neto is one of six survivors of a plane crash that killed 71 people in Colombia last November.

  Almost two months after the accident, the BBC's Julia Carneiro met him at the Conda Arena in the city of Chapeco.
