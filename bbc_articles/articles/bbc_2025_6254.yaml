title: One dead, two badly hurt as car hits pedestrians in Crawley - BBC News
date: '2025-04-13'
section: Sussex
url: http://www.bbc.co.uk/news/articles/c985w9w9n63o
content: |-
  Two of the woman's relatives, including her 12-year-old sister, were seriously injured, police say.

  One dead, two badly hurt as car hits pedestrians

  Part of London Road was closed while emergency services worked at the scene

  A 25-year-old woman has died and two others have been seriously injured after a car hit pedestrians outside a leisure park. The pedestrians were struck by a grey BMW 3 Series in London Road, outside Crawley Leisure Park, at about 20:35 BST on Saturday, police said. The woman's 12-year-old sister and their cousin, a 19-year-old woman, both local to the area, were taken to hospital with serious injuries. A 33-year-old man, from Crawley, was arrested at the scene on suspicion of causing death by dangerous driving and driving while unfit through drugs and remains in police custody.

  All three pedestrians were local to the area. The 25-year-old's next of kin have been informed and are being supported by specialist officers, Sussex Police said. Ch Insp James Davidson said: "Our thoughts are with the victims' family at this difficult time and we ask that the public respect their right to privacy. "We swiftly arrested a suspect in connection with this tragic incident, and our enquiries are ongoing to establish the exact circumstances." He said it was a "well-populated area" and urged anyone who saw what happened or captured any relevant mobile, dash cam or CCTV footage to get in touch.
