content: |-
  Donkeys Dora and Nora went from Kentish Town City Farm to a school in Camden.

  Rescue donkeys Dora and Nora from Kentish Town City Farm have been taking part in an unusual job - gardening at Parliament Hill School.

  Walking through the streets of Camden, north-west London, they arrived at the school to help clear grass, and bed in a seed mixture for a flowering meadow.

  This effort is part of a broader plan to boost biodiversity on the school grounds.

