title: 'Esther Dingley: Partner informed of ''remains'' find in Pyrenees - BBC News'
date: '2021-07-25'
section: Tyne & Wear
url: http://www.bbc.co.uk/news/uk-england-tyne-57954180
content: |-
  Esther Dingley disappeared on a solo walk near the France-Spain border in November.

  In 2014, Esther Dingley and Dan Colegate swapped their life in Durham for an open-ended campervan tour of Europe

  Human remains may have been found close to where hiker Esther Dingley went missing in the Pyrenees mountains, her family have been told.

  The 37-year-old had been walking alone near the Spain-France border and was last seen on 22 November.

  Charity LBT Global, which has been representing the family, said the family were "urgently seeking clarification" on the latest discovery.

  It added any developments were expected to take "days or even weeks".

  Earlier this month, Dan Colegate, Ms Dingley's partner of 20 years, told the BBC he would never give up the search for the "love of his life".

  The couple swapped their life in Durham for an open-ended campervan tour of Europe in 2014.

  Mr Colegate was house-sitting at a French farmhouse on 22 November, when Ms Dingley went missing on a solo hike.

  She last spoke to him via a WhatsApp video call from atop the Pic de Sauvegarde on that date.

  Esther Dingley's partner Dan Colegate has been told of possible "remains" found near where the hiker disappeared

