title: 'Len Goodman: Strictly judge to get public memorial in Dartford - BBC News'
date: '2024-08-28'
section: Kent
url: http://www.bbc.co.uk/news/articles/c78538lnl60o
content: |-
  Late TV star Len Goodman is set to be immortalised outside a dance studio in Dartford town centre.

  Former Strictly Come Dancing head judge Len Goodman died in 2023 at the age of 78

  Former Strictly Come Dancing head judge Len Goodman is to be the subject of a public artwork in Kent. Dartford Borough Council has said the memorial of the professional ballroom dancer, who died in April 2023, will be a celebration of his life and contribution to the town centre. Artist Adrian Riley will create the tribute outside The Goodman Dance Academy in Market Street, which the TV personality opened in the 1970s. Goodman’s wife Sue Barrett and son James said: “We are excited by Adrian’s vision of how he intends to capture Len’s wit and charm."

  They added: “Our dance studio has been teaching people to dance in Dartford for just over 50 years and to now have this wonderful tribute outside our school is incredible, and Len would have been truly bowled over by it.”

  Council leader Jeremy Kite added: “When I met with representatives of Len’s family to see Adrian’s proposals we couldn’t help smiling. Goodman was the first head judge the BBC One hit show, joining the cast in 2004 and remaining a judge until 2016. He also fronted US show Dancing With The Stars from 2005 to 2022, when he retired to spend more time with his family in the UK. The Kent-born dancer found fame aged 60 when he was a last minute addition to the Strictly Come Dancing judging panel. When one judge pulled out, professional dancer Erin Boag suggested Goodman to producers. "He's just a dance teacher from Dartford, but he's a bit of a character,” she said. The council has not revealed what the artwork will look like but has said it will include a nod to Goodman’s famous catchphrase "seven". Scarborough-based artist Mr Riley has previously made word-based art for the NHS, National Trust and RSPB across the UK.
