title: Footage shows landslide at Shetland wind farm - BBC News
date: '2024-05-09'
section: General
url: http://www.bbc.co.uk/news/uk-scotland-north-east-orkney-shetland-68978378
content: |-
  No-one was hurt but work near a section of the project has been suspended while the extent of the damage is investigated.

  Work has stopped near a section of the Viking Wind Farm site in Shetland after a landslide.

  SSE said the peat slip happened in an area of hillside at Upper Kergord in the centre of the islands on Tuesday afternoon.

  As a safety precaution the energy company said all work had been stood down and an investigation was under way to assess the extent of damage to the hillside.

  Nobody was injured in the incident.
