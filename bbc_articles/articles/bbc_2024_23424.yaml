title: Sunderland man first to be jailed on riot charge - BBC News
date: '2024-09-27'
section: Wear
url: http://www.bbc.co.uk/news/articles/cg7859z8mx5o
content: |-
  Kieran Usher, who threw missiles at police in Sunderland, is jailed for four years and four months.

  Kieran Usher pleaded guilty to riot following disorder in Sunderland

  The first adult in England to be charged with riot following widespread disorder last month has been jailed for four years and four months. Kieran Usher, 32, of Sunderland, pleaded guilty after being filmed working with a group of at least 20 people "to rain missiles on to attending police officers" in the city, the Crown Prosecution Service said. Judge Gittens told Newcastle Crown Court Usher’s actions had brought "shame on the city of Sunderland and shame on the union flag he was wearing". Hundreds of people were involved in a night of violence on 2 August, during which police officers were repeatedly attacked, a building was set ablaze and businesses looted.

  Video footage played to the court showed a masked Usher holding a phone in one hand with a can of lager in the other. The court heard he played "a leading role escalating the disorder", picking up missiles, throwing them at police officers and beckoning others in the crowd towards the police line.

  Usher was caught on CCTV throwing missiles at police

  Usher's defence said he did not associate with the far right and wore the flag to fit in with the people who were there. In his sentencing remarks, Judge Gittens said right-thinking members of the community were left "shocked, distressed and in fear" by the violence on display. The judge took into account that Usher, who has learning difficulties, made full admissions to police and pleaded guilty at the first opportunity. Northumbria Police Chief Constable Vanessa Jardine has said the cost of policing the riots ran to more than £1m.
