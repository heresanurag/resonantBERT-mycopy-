  Two further men charged in violent disorder probe

  Police say they are working to identify all those involved in the Bordesley Green disorder

  Two men have been charged over disorder that broke out in Birmingham last month. Disturbances broke out in the Bordesley Green area of the city on 5 August, with pockets of further disorder emerging into the evening in surrounding parts of the city. Haris Ghaffar, 19, has been charged with violent disorder and Muhammed Ali, also 19, has been accused of the same offence as well as racially aggravated criminal damage. Mr Ghaffar appeared before Birmingham Magistrates Court on Saturday and was remanded in custody, West Midlands Police has said.

  Mr Ali is due to appear in court on Monday. Adam Said, 19, and a 17-year-old boy - who cannot be named because of his age - were both previously charged in connection with the disturbance. Shehraz Sarwar, 46, from Wright Road, Saltley, has pleaded not guilty to possession of an offensive weapon and is due to face a trial on 23 September. A spokesperson for West Midlands Police said: "We’re working to identify all those involved in disorder and continue to appeal for anyone with information to contact us."

