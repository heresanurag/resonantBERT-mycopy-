content: |-
  Marcus Smith drops to bench with Daly at 15 against Italy

  Marcus Smith has been England's starting full-back for their past two matches - wins over France and Scotland

  Coverage: Listen to full match commentary on BBC Sport website and app; follow live text commentary online; watch on ITV1

  Elliot Daly will start ahead of Marcus Smith at full-back for England's match against Italy on Sunday, with the Harlequins playmaker dropped to the bench. Fraser Dingwall, who won his last England cap more than a year ago, comes into the centres alongside Ollie Lawrence, with Henry Slade left out of the matchday 23. Dingwall's inclusion means five of the seven backs are from Northampton, with Alex Mitchell and Fin Smith continuing their half-back partnership. Jamie George starts at hooker as he becomes the seventh player to reach a century of caps for the England men's team. George will make his first Test start since losing the captaincy before the start of this year's Six Nations and England head coach Steve Borthwick praised the 34-year-old's attitude since the "disappointing" news. "Jamie has been for such a long time, and continues to be, such an incredible player for English rugby," Borthwick told BBC Sport. "His impact off the bench in the last couple of games has been there for everyone to see. "Jamie was clearly very disappointed by that news and there is never a good time for a player to receive that. I have also been in that situation. "It's immense credit to Jamie the positive influence he has had around the squad since he has recovered from injury and then rejoined the squad." Leicester scrum-half Jack van Poortvliet, who scored in England A's win over Ireland's second string last month, is preferred to Harry Randall as the scrum-half cover among the replacements. England have won all 31 of their previous meetings with Italy but took only a narrow 27-24 victory in Rome last year in the Six Nations. Borthwick's side lie third in the Six Nations table, one and four points respectively behind France and Ireland, who meet in Dublin on Saturday (14:15 GMT).

  Marcus Smith's shift to the bench represents a dramatic downsizing of his role in just a few months. Initially afforded an opportunity by injury to George Ford, he started all three matches in England's summer tour of Japan and New Zealand at fly-half and continued in the role throughout the autumn. However, he was shifted to a full-back role after England's opening Six Nations defeat, with the hope he could combine his dangerous broken-field running from back field with the ability to step in as an additional playmaker alongside novice fly-half Fin Smith. Daly scored the decisive late try with a well-timed run in England's win over France and appeared off the bench again in the victory over Scotland, but has not started a match at full-back for his country in four years. "I'm looking forward to seeing Marcus enter the field when there are potentially some tiring defenders and maybe a bit of space," said Borthwick. "We had a conversation about the role I was asking him to play this week and he has trained wonderfully well. "It's a sign of the calibre of person and the character Marcus is. He is a brilliant rugby player and I've talked about him being a game-changer. "I'm looking forward to seeing him come on and break open some part of Italy's defence. "Elliot Daly has done well and had a real positive impact off the bench in the last couple of games and he has been terrific in training. "Now it's Elliot's time with Marcus coming from the bench and it's a really good position to be in." Lawrence and Slade have been England's 12-13 combination for the past 13 games - a run that stretches back to Dingwall's last start against Wales in February 2024 - however both play the majority of their club rugby at outside centre. Dingwall has been deployed in both roles but was Northampton's first-choice inside centre in their run to the Premiership title last season.

