content: |-
  The group of teenagers were travelling on the M65 in Lancashire in the early hours.

  Girl, 17, killed and three hurt in motorway crash

  The M65 was closed for several hours after the crash

  A 17-year-old girl has been killed and three other teenagers seriously injured in a motorway crash in Lancashire. Emergency services were initially called to reports of a "serious collision" involving a Seat Ibiza on the M65 near Burnley at about 03:40 BST. Police later confirmed only one vehicle was involved and two had stopped to help, but no further details of precisely what happened have been released. The girl was a passenger and was pronounced dead in hospital, Lancashire Police said.

  The male driver, also 17, and two girls aged 17 and 19, were seriously injured and remain in hospital. The group are all from the Darwen area. The motorway was closed for several hours but has since reopened and police are continuing to appeal for witnesses.

  The M65 is closed between junction 8 and 10

  Det Sgt Martin Wilcock said: “Very sadly a young girl has lost her life and three other young people have been very badly injured and my thoughts are with the loved ones of all of those involved." "Our investigation is ongoing into the circumstances, and I would appeal to anyone who either saw what happened or who has any dashcam or mobile footage to get in touch."
