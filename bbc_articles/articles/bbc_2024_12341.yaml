  Jamal Musiala: Bayern Munich's 21-year-old forward caught the eye in Germany's opening-day rout of Scotland. Musiala, who represented England at youth level having spent much of his childhood in the country, was likened to Kaka by Arsenal legend Ian Wright post match. Florian Wirtz: Another Germany youngster who took centre stage on Friday night. The 21-year-old Bayer Leverkusen forward became the youngest player to score for Germany at a European Championship. Lamine Yamal: The Barcelona 16-year-old became the youngest man to play at the European Championship as he played a key role in Spain's 3-0 win against Croatia on Saturday. Yamal made a mockery of his age by dazzling Croatia defenders as his country make a real statement in their Euro 2024 opener. Jude Bellingham: England's 20-year-old, who plays for Real Madrid, is the first European player to make an appearance at three major international tournaments before turning 21. The midfielder scored the Three Lions' winner against Serbia.
