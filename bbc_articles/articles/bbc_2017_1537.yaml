id: bbc_2017_1537
title: House destroyed by explosion in Blackley, Manchester - BBC News
date: '2017-01-16'
section: General
url: http://www.bbc.co.uk/news/uk-england-manchester-38642089
content: |-
  Two people have been taken to hospital following an explosion at a house in north Manchester.

  The blast was in an end terrace in Cecil Road, Blackley, at about 12:40 GMT, and reduced much of the property to rubble.

  A man with "major trauma" injuries was taken to Salford Royal Hospital and another person was taken to Wythenshawe hospital.

  Three people were treated at the scene for minor injuries.

  The cause of the explosion is not yet known.
