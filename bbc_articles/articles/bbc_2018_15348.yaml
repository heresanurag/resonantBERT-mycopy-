title: Elon Musk launches high-speed underground tunnel - BBC News
date: '2018-12-20'
section: General
url: http://www.bbc.co.uk/news/technology-46622582
content: |-
  The prototype underground tunnel is designed to transport cars at speeds of up to 150mph.

  Elon Musk has unveiled a prototype underground tunnel in Los Angeles designed to transport cars, at high speed, around the city.

  The goal is a network of tunnels to alleviate chronic traffic congestion.
