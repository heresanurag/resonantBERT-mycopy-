title: Lost Lionesses play 'is coming home' to Bedfordshire, writer says - BBC News
date: '2025-04-14'
section: Beds, Herts & Bucks
url: http://www.bbc.co.uk/news/articles/cx2w7p0glwro
content: |-
  It tells the story of the rebellious, unofficial side that competed in the 1971 Women's World Cup.

  The Lost Lionesses is being performed in Bedford after a successful run in London

  A theatrical production about the rebellious, unofficial England side that competed in the 1971 Women's World Cup was "coming home", its playwright said. Nicole Lockwood-West was inspired to write The Lost Lionesses by her aunt Christine Lockwood, part of the unsanctioned team that played in front of 90,000 football fans in Mexico before being banned on their return. "The Lionesses won in such an iconic way, it changed the course of women's football but I wanted to remember the pioneers of the game," she said. Following a successful run in London, the play comes to The Place, Bedford - in the county many of the players were based - from 15-19 April.

  Nicole Lockwood-West (right) was inspired to write the story by her aunt Christine Lockwood (left)

  It is a tribute to manager Harry Batt, who was banned from English football after forming the team despite opposition from the Women's Football Association, and has since passed away. The play ends on a positive note, showing how the game has come full circle with the Lionesses winning Euro 2022. Ms Lockwood-West said: "I always thought it was a great story, I always grew up with my mum and aunty telling me about it. "It's a piece of local history that had been forgotten about. It's time to bring it home, it's coming home."

  Manager Harry Batt, depicted here by an actor, was banned from English football after falling out with the Women's Football Association

  Christine Lockwood said she was happy to leave the script to her niece. "I didn't want to poke my nose in. When I saw it, I thought this was brilliant. You don't even have to like football, it's so uplifting." Jan Emms, 73, from Bedford, who was 19 when she played in the side, said she was thrilled they were "finally getting the recognition we thoroughly deserve". "I'm absolutely delighted with what's happened now, 53 years after the story was hidden away. "If you had said to me, all those years ago, there would be a book, a film and a play about us, we would have laughed our heads off."

