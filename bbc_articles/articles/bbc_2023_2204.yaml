title: Two bodies found in search for missing tug crew off Greenock - BBC News
date: '2023-02-26'
section: Glasgow & West Scotland
url: http://www.bbc.co.uk/news/uk-scotland-glasgow-west-64769605
content: |-
  A major operation was launched after the vessel sank in East India Harbour, Greenock on Friday.

  Police divers were out on the water on Saturday afternoon

  Two bodies have been recovered following a major search operation for the missing crew of a tug after it overturned off Greenock in Inverclyde.

  Emergency crews were called to East India Harbour at about 15:30 on Friday.

  A Police Scotland marine unit was seen out on the water on Saturday morning while divers later joined the search.

  The force confirmed the bodies were discovered at about 13:40.

  Officers said formal identification had yet to take place but the next of kin of both missing crew members had been informed.

  Ch Insp Damian Kane said: "Our thoughts are with the families and friends of the men at this difficult time and I would ask that their privacy is respected.

  "I would like to thank the local community for their patience and support as searches were ongoing and as we continue to carry out our inquiries."

  The tug capsized on Friday afternoon on the River Clyde

  Clyde Marine Services said it was "deeply saddened" by the loss of the two crew members.

  A spokesman said: "Our thoughts are with the family and loved ones of the two men at this most difficult of times.

  "The company is fully co-operating with the official investigations which are ongoing."

  Eyewitnesses told BBC Scotland they had seen the tug escorting the Hebridean Princess cruise ship into the harbour at about 15:30 when it was apparently pulled over.

  Images from the scene showed rescue teams in inflatables and a police boat surrounding the capsized tug while a helicopter hovered overhead.

  Daniel McBride said the tug had capsized "pretty instantaneously".

  He added: "At that point I contacted the coastguard and was asked to go and keep eyes, so I parked up and watched.

  "Within 12 minutes the first coastguard vessel came. At that point the boat was still capsized with a hull visible in the water.

  "I witnessed them bashing on the hull, I guess trying to see if there was any signs inside. Unfortunately then the boat went down a short time afterwards."

  HM Coastguard said rescue teams from Helensburgh and Greenock, a lifeboat from Helensburgh RNLI and the coastguard helicopter from Prestwick were involved in the search on Friday.

  Multiple vessels on the Clyde also responded, including a Ministry of Defence Police boat.

  Police confirmed a multi-agency investigation into the incident was under way.

  Scottish Greens West Scotland MSP Ross Greer said: "This is devastating news. All of our thoughts and prayers are very much with the family, friends and colleagues of those involved.

  "I also pay tribute to the coastguard, RNLI and all those who assisted with the search and rescue effort.

  "Investigators should now be given the space needed to look into the circumstances of this terrible incident."
