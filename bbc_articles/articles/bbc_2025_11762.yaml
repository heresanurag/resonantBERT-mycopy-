title: Minnesota police find car of suspect Vance Boelter in shootings of two lawmakers
  - BBC News
date: '2025-06-15'
section: US & Canada
url: http://www.bbc.co.uk/news/articles/c23m31ly3vko
content: |-
  Police broaden their search for the 57-year-old man to nearby South Dakota as a $50,000 reward is issued.

  Minnesota police find car of suspect in shootings of two lawmakers

  Police hunting the alleged gunman behind deadly attacks on two Minnesota lawmakers say they have found his car, as stunned neighbours grappled with a suspected political assassination on their doorstep. Melissa Hortman - the top Democratic legislator in the statehouse - and her husband, Mark, were shot and killed early on Saturday morning. State Senator John Hoffman, and his wife, Yvette, were shot multiple times at their home, but survived. Police say Vance Luther Boelter, 57, wore a latex mask and posed as a police officer when he shot the victims at their homes in suburban Minneapolis. He exchanged gunfire with police at one crime scene before managing to flee on foot.

  On Sunday, officers said they had found an unoccupied car linked to the suspect in Sibley County, about 50 miles (80km) from the murder scene. The discovery of the black sedan was alerted to local residents' mobile phones in a message that said: "Suspect not located. Keep your doors locked and vehicles secured." A cowboy hat, similar to what Boelter was believed to have been wearing, was found lying on a road nearby. Police also said on Sunday that Boelter's wife had been detained in a traffic stop along with three relatives in a car in the city of Onamia, more than 100 miles from the family home, on Saturday morning. Jenny Boelter was released without being taken into custody, reports Minnesota ABC News affiliate KSTP. Police have extended the search over state lines to South Dakota and the FBI have added Boelter to their most wanted list, issuing a $50,000 reward. Both targeted lawmakers belonged to Minnesota's Democratic–Farmer–Labor Party, which is affiliated with the national Democratic Party. Hoffman and his wife are awake after undergoing surgery, and are expected to issue a statement when able. Authorities said from another vehicle used by the suspect they recovered a target list containing the names of state Democratic politicians. Minnesota Governor Tim Walz, congresswoman Ilhan Omar, Minnesota's two US senators, Amy Klobuchar and Tina Smith, and state Minnesota Attorney General Keith Ellison were reportedly on the list. "Clearly, this is politically motivated," Klobuchar told NBC News' Meet the Press on Sunday morning. President Donald Trump, a Republican, told ABC News on Sunday the attack was "a terrible thing". Investigators say Boelter was disguised as a police officer when he carried out the attacks. He had a vehicle that looked like a police car equipped with flashing emergency lights, officials said.

  Police issued images of the suspect as the manhunt continued

  The gunman first targeted Hoffman and his wife, Yvette, shooting them both multiple times at their home in Champlin at around 02:00 local time on Saturday, authorities said. Soon afterwards, Hortman and her husband, Mark, were shot and killed at their home in Brooklyn Park, eight miles away. Officers arrived at the Hortmans' home and exchanged gunfire with the suspect at around 03:35. The suspect managed to flee, leaving behind his car, authorities said. A Facebook post from someone identifying himself as a nephew of Yvette Hoffman said she had thrown herself on their daughter during the assassination attempt, "using her body as a shield to save her life". According to Boelter's CV, he has a background in security and military training. The city of Brooklyn Park was still and silent on Sunday morning as the neighbourhood came to terms with the deadly attack. A police car was parked outside the Hortmans' house, and bright yellow caution tape surrounded the property. Taha Abuisnaineh, who lives across the street, said he and his wife had known the family for more than 20 years. "They were very nice neighbours in a very quiet neighbourhood," he told the BBC. "You don't see police activity in this neighbourhood. We are very shocked." Two other nearby residents who did not want to be named said this suburban community was reeling. "My next-door neighbour heard the shots," said one. "We've all been texting back and forth." She and her husband described how they received an annual Christmas card from the Hortmans - and recounted how Hortman got along with local Republican politicians. "What a big loss for Minnesota," she said. In Sibley County, where the suspect's car was found, local resident Brian Liebhard also told the BBC of his shock. "This guy needs to get caught," he said. "I don't agree with everything they [the two politicians] vote for, but this is sad - the guy went wacko."
