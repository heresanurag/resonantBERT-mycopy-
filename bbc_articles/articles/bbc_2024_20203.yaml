  Detectives had begun a murder investigation after Brodie MacGregor's body was found at a flat in Springburn.

  Man arrested over death of woman in Glasgow

  Brodie MacGregor, 23, was found dead inside a flat in Springburn on Monday

  A 52-year-old man has been arrested in connection with the death of a woman in Glasgow. Brodie MacGregor, 23, was found dead inside a flat on Elmvale Street, Springburn, at about 10:15 on Monday. Police had launched a murder investigation the results of a post-mortem examination. Detectives earlier set up an online major incident public portal (MIPP), external and encouraged members of the public to submit information.

  There was an increased police presence in the area following Ms MacGregor's death

  They said they were particularly keen to speak to anyone who was in the area between 04:30 and 10:30 on Monday 26 August and saw anything suspicious. Det Ch Insp Lynsey Watters of the major investigation team said an increased police presence would remain in the area while inquiries continue. She added: “Our thoughts remain with Brodie’s family and friends at this very difficult time. “We are providing them with support as our investigation continues to establish the full circumstances of what happened. “We would again urge anyone who may have any information to get in touch. Any information, no matter how small, could be vital in establishing what happened to Brodie." Police Scotland can also be contacted on the non-emergency number, external.
