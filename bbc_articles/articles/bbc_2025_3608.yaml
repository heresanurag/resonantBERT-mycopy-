  Experts say the growing trade dispute threatens economic stability for both countries. On Wednesday, Canada's central bank cut interest rates to 2.75% from 3% to prepare the country's economy for disruption. Canadian Finance Minister Dominic Leblanc told a news conference that the country was still seeking to de-escalate. "If you're racing to the basement, there's no real prize for the first person to get to the basement," he said. On Thursday, Ontario Premier Doug Ford, along with federal representatives, will meet US Commerce Secretary Howard Lutnick. Lutnick told Fox Business that at the meeting he plans to try to "level set" things between the two nations. Mark Carney, who was elected leader of the governing Liberal Party on Sunday, is set to be sworn in as prime minister, replacing Justin Trudeau. He has promised to win the trade war against Trump, following his landslide victory. With reporting from Jonathan Josephs and Lisa Lambert
