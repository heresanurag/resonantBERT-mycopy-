title: 'London Marathon: London woman to run for Samaritans - BBC News'
date: '2024-04-12'
section: General
url: http://www.bbc.co.uk/news/uk-england-london-68789084
content: |-
  Saskia Patel is running the London Marathon on 21 April in memory of her dad who took his own life.

  In 2010, when Saskia Patel was just 11, her "charismatic, energetic, lively" father Viren took his own life.

  The 24-year-old from south-west London is now set to run the London Marathon on Sunday 21 April in his memory for Samaritans, a charity that provides support for people in emotional distress.

  Saskia said: "The power of conversation is just incredible so I wanted to do something to show support for what they do, spread the word and try and encourage open conversations."
