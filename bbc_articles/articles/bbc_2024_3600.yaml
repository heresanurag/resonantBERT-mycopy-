title: 'South Kensington fire: Eight police among 11 people hospitalised - BBC News'
date: '2024-03-01'
section: London
url: http://www.bbc.co.uk/news/uk-england-london-68443968
content: |-
  About 160 people were evacuated from their homes as firefighters tackled the South Kensington blaze.

  About 160 people were evacuated from the building and neighbouring properties

  Eight police officers were among 11 people who were taken to hospital after a fire broke out at a five-storey building in London.

  About 160 people were evacuated from Emperor's Gate, in South Kensington, after the fire spread from a ground-floor flat just after midnight.

  An eyewitness described seeing police officers "running about" helping before London Fire Brigade (LFB) arrived.

  Arnis Altens said he saw the "whole building ablaze" within 14 minutes.

  LFB said the blaze, which had spread to the roof of the building, was brought under control by about 05:30 GMT.

  It said the people taken to hospital were treated for the effects of smoke inhalation.

  LFB, which told the BBC that police were often first to arrive to a fire, said it received the initial report at 00:31 and was at the scene four minutes later.

  A total of 14 calls were made by police officers and residents, it said.

  Fifteen fire engines and about 100 firefighters arrived to find half of the ground floor of the building alight, LFB said.

  Two people were rescued from a second-floor flat, one person was helped from a first-floor flat and another two from a flat on the fourth floor.

  Five people were rescued from the building

  Borough commander Ben King described the fire as "incredibly challenging" to tackle.

  "Our crews have acted with, as you would expect and as London rightfully deserves, utmost professionalism as they have conducted a number of rescues," he said.

  The flames became "very significant" and it was a "dynamic incident" for the service to deal with, Mr King explained.

  Borough commander Ben King said the roof of the building was "significantly damaged"

  Crews worked extremely hard to stop the fire spreading to adjacent buildings, LFB said.

  Mr King said the roof of the building was "significantly damaged" and the ground floor and an adjoining property had also suffered damage.

  LFB said some of the evacuated residents had been able to return to their homes.

  The cause of the fire is not yet known.

  Arnis Altens saw the fire spread from the ground floor

  Mr Altens, who was one of the people evacuated, described the fire as "pretty scary".

  The 58-year-old said he saw a "small fire" on the ground floor, which people were trying to put out using extinguishers.

  "They broke the window and after that the fire spread rapidly... the blaze came out of the window," Mr Altens explained.

  "In 14 minutes the whole building was ablaze," he told the BBC.

  The blaze spread from a ground-floor flat just after midnight on Friday

  It's bucketing it down with rain here in south Kensington.

  Firefighters using a turntable ladder continue to battle the blaze which is now under control.

  There's a heavy police presence too with road closures in every direction and buses on diversion.

  Dozens of tired looking firefighters have been accepting hot drinks from a Salvation Army van a street away.

  The Royal Borough of Kensington and Chelsea said council staff provided assistance and shelter at a nearby hotel for those affected.

  Its deputy leader Kim Taylor-Smith thanked the emergency services for "the incredible job they have done in very challenging conditions" and council staff, "who have sprung into action in the middle of the night".

  A website has been set up by the council for residents to get help and information: Kensington Flat Fire.

