title: 'Matija Sarkic: Millwall announce death of goalkeeper aged 26 - BBC Sport'
date: '2024-06-15'
section: Millwall
url: http://www.bbc.co.uk/sport/football/articles/cv22z9lgdlxo
content: |-
  Millwall and Montenegro goalkeeper Matija Sarkic dies at the age of 26.

  Millwall goalkeeper Matija Sarkic has died at the age of 26. Sarkic, a Montenegro international, joined the Championship club from Wolves in August 2023 and made 33 appearances last season. He last played for his country in a 2-0 friendly defeat by Belgium on 5 June. The Montenegro Football Association (FSCG) said Sarkic died suddenly on Saturday morning, with local media reporting he collapsed at his apartment in Budva. The FSCG described Sarkic as a "beloved member" of the national squad and an "eternally smiling guy". "His untimely death has caused great pain to the Sarkic family," it added. Millwall said they were "completely devastated". "Everyone at the club sends their love and condolences to Matija's family and friends at this immensely sad time," the Lions said. Sarkic, who was born in Grimsby, played youth-team football for Belgian side Anderlecht before joining Aston Villa. He had loan spells with Wigan, Stratford Town, Havant & Waterlooville and Livingston before a permanent move to Wolves in 2020. Loans at Shrewsbury Town, Birmingham City - where he made 23 appearances on loan during the 2021-22 season - and Stoke City followed before his move to Millwall. Villa said on X: "Everyone at Aston Villa is deeply saddened. "Matija joined our academy in 2015 and spent five years with the club, during which time he made his full international debut for Montenegro, before departing in the summer of 2020. "The thoughts and condolences of all at the club are with his family and friends at this incredibly sad time." BBC pundit Micah Richards was at Villa when Sarkic was in the academy. "He was a young lad coming through at Aston Villa, trained with the first team and when I got the news I was absolutely devastated," the former defender said. "Just 26 years of age, gone way too soon. I have been a little bit down all day, thinking about it. I just want to send my condolences to his family." The Football Association, the Professional Footballers' Association and the English Football League also offered their condolences to Sarkic's family and friends.

  Sarkic was named man of the match for his performance in his final game for Montenegro against Belgium

  Sarkic joined Millwall last summer and for both him and the club it was seen as an opportunity to move forward. At the time, the Montenegro international had played most of his games as a loanee, having been on the books at Aston Villa and Wolves. Joining the Lions provided the chance to secure a regular number-one spot at a club who were looking to find a long-term replacement for Bartosz Bialkowski. Matija made an immediate impact with a clean sheet on debut but was rocked back by injury just a month into the season, which kept him out until December. When he returned there was a new manager in charge, Joe Edwards, and a feeling the club were to take a new direction on the pitch. Sarkic and his team-mates then welcomed their third boss of the season when Neil Harris returned to the Den and the stopper conceded just seven goals in the last 10 games of the season. They finished with a flourish, saving a penalty and shutting out Swansea in the last game of the season, with the run provoking positive feelings for the next campaign. Despite only being with the Lions for one season, Matija made an impact with his performances and personality. Former captain Paul Robinson summed things up by posting about his devastation on X, adding: “What a lovely fella we have lost.”

