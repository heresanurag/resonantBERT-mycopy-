  Ollie Pope says England will be "ruthless" with their run-scoring in the final Test against West Indies and reckons they can score 600 in a day.

  Pope says 'ruthless' England can make 600 in a day

  England batter Ollie Pope made his Test debut against India in August 2018

  Ollie Pope says England's batters will be "ruthless" with their run-scoring as they eye a Test series whitewash against West Indies - and reckons they could even score 600 in a day. England are 2-0 up after they followed up victory by an innings at Lord's with a comprehensive 241-run win at Trent Bridge last week. The win in Nottingham was the first time England scored 400-plus in both innings of a Test match with totals of 416 and 425. The third and final Test between England and West Indies starts on Friday at Edgbaston. Vice-captain Pope promised their will be no let up with their approach even though England have already wrapped up the series and won back the Botham-Richards Trophy. "There’s a real hunger - there always is a hunger - but now there's an extra bit in that batting line-up," Pope said. "We want to be as ruthless as we can as a batting unit, but still play the way we do because that's our natural game. Obviously being ruthless is being part of Test cricket as well."

