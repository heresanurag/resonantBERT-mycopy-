title: 'European elections 2019: Polls close across the UK - BBC News'
date: '2019-05-23'
section: UK Politics
url: http://www.bbc.co.uk/news/uk-politics-48372665
content: |-
  UK voters electing 73 Members of the European Parliament from 12 constituencies.

  The polls have closed in the UK for the European Parliament elections.

  Seventy-three members, known as MEPs, will be elected in nine constituencies in England, and one each in Scotland, Wales and Northern Ireland.

  Each region's number of representatives is based on its population - from three MEPs in north-east England and Northern Ireland to 10 in south-east England.

  The results will be announced once all EU nations have voted, expected to be completed by 22:00 BST on Sunday.

  The Netherlands also voted on Thursday while voting in other EU nations will take place at various times over the next three days.

  Voters had to be registered to vote, be 18 years old or over on 23 May, be a British, Irish or qualifying Commonwealth citizen or a citizen of an EU country.

  They had to be resident at a UK address (or a British citizen living abroad who has been registered to vote in the UK in the last 15 years) and not be legally excluded from voting.

  MEPs are elected in the order listed by their party, based on the total share of the vote in each region.

  In the nine English regions, Wales and Scotland, the number of MEPs is calculated using a form of proportional representation known as the D'Hondt formula, and each voter can choose one party or individual to back.

  The process is slightly different in Northern Ireland, where the Single Transferable Vote (STV) system is used, allowing voters to rank the parties standing in order of preference.

