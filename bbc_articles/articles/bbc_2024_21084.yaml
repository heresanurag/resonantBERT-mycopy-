  Wales and Dragons hooker Bradley Roberts retires at the age of 29 because of a back injury.

  Bradley Roberts played for RGC in north Wales before joining Ulster

  Wales and Dragons hooker Bradley Roberts has retired at the age of 29 because of a back injury. The South Africa-born player joined Dragons from Ulster in 2022 having previously played for Sharks in Durban. Roberts said: "My career has been short but very sweet and I look back at this chapter with massive pride and astonishment. "I have no doubt it will leave me in good stead for whatever life has in store for. If my life so far is anything to go by, I’m sure it will be very exciting."

  In between leaving South Africa and joining Ulster, Roberts played a season at RGC in the Welsh Premiership. After joining the Ulster province, his powerful ball-carrying ensured his ancestry qualification was of interest to Wales. Roberts won the first of five Wales caps against South Africa in the autumn of 2021. Dragons head coach Dai Flanagan said: "Bradley has always given his absolute all to the cause - something that has seen fans of every club he has represented take him to their hearts - and it is that belief, drive, and talent that has seen him play successfully at the very highest level. "We look forward to seeing what the next chapter holds for him and welcoming him back to Rodney Parade in the years to come."

