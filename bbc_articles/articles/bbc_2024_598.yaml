title: 'Norfolk: Laser shone at air ambulance helicopter over Attleborough - BBC News'
date: '2024-01-09'
section: General
url: http://www.bbc.co.uk/news/uk-england-norfolk-67926839
content: |-
  Video shows a bright green flashing at the aircraft, an offence officials say could endanger lives.

  An air ambulance service has released video of a laser being shone at its helicopter, an offence which it says could endanger lives.

  "Short-term effects include temporary flash blindness and potential distraction at a critical stage of flight, while long-term effects could include permanent damage to the eye," said the East Anglian Air Ambulance.

  The incident happened as it flew over Attleborough in Norfolk at 02:30 GMT on 27 December.

  Norfolk Police said it was investigating and appealed for information.
