content: |-
  Between January 2023 and December 2024, there were 13 incidents involving masts in west Belfast, the NIFRS said.

  A series of arson attacks on 5G masts in west Belfast have had an impact on customers getting their medication, a pharmacy has said.

  Between January 2023 and December 2024, there were 13 incidents involving masts in the area, according to the Northern Ireland Fire and Rescue Service.

  Noleen Power, a dispenser at McGrath's Pharmacy on the Glen Road said the signal "can come on and off" meaning that customers aren't able to order their medication.
