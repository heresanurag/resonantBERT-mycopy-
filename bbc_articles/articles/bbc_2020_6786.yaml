title: 'Cookham: Police search for man missing in River Thames - BBC News'
date: '2020-06-23'
section: Berkshire
url: http://www.bbc.co.uk/news/uk-england-berkshire-53159696
content: |-
  The man has not been seen since he entered a stretch of the River Thames in Cookham, police say.

  Emergency services were seen at a stretch of the river in Cookham

  Police are searching for a man who is feared to have drowned in the River Thames.

  Emergency services, including the air ambulance, were called to a stretch of the river in Cookham, Berkshire, at about 18:30 BST on Tuesday.

  Thames Valley Police said it was reported that a man had entered the water.

  "Officers are working to locate the man, who was not seen to get out of the water," the force said in a tweet.

  Pictures from the scene appear to show rescue workers, including fire crew rescue teams, in boats on the river.

