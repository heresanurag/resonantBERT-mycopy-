title: Services resume on Glasgow to London train line after tree damage - BBC News
date: '2025-06-03'
section: UK
url: http://www.bbc.co.uk/news/articles/cn4q3801p1qo
content: |-
  Avanti West Coast services through Lockerbie and Carstairs were affected by a fallen tree.

  Network Rail staff have now repaired the overhead lines near Beattock

  Trains between Glasgow and London are running again after hours of disruption caused by a tree falling on overhead lines in southern Scotland. Network Rail said work to repair the lines damaged near Beattock in Dumfries and Galloway has been completed and they are working with train operators "to get services moving", but disruption may still impact services from Glasgow and Edinburgh to Carlisle until 19:00. Avanti West Coast said lines between Lockerbie in Dumfriesshire and Carstairs in South Lanarkshire had reopened and their services were now operating as normal. Some services scheduled to start in Glasgow earlier began in Preston, Lancashire, with passengers experiencing delays.

  National Rail said a fault with the signalling system caused further disruption. Liverpool Lime Street and Manchester Airport services to Glasgow and Edinburgh had also been affected by the closed line. Passengers waiting overnight on the Caledonian Sleeper service, including BBC political editor Chris Mason, were told in the early hours of the morning that they had still not left Glasgow Central because a tree had come down on the line.

