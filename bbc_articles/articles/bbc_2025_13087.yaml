  A statement from Avanti West Coast said: "Lines have now reopened north of Carlisle, after earlier damage to overhead electric wires caused by a fallen tree. "Trains to and from Glasgow Central and Edinburgh may still be delayed or revised while the service recovers, so please still check before you travel." Ticket holders were advised that they could travel on alternative services on the East Coast Main Line, external for no extra cost, or get a refund. Tickets for journeys with delays of more than 15 minutes are eligible for compensation, external or refunds. The Aberdeen to Inverness railway line was also closed earlier because of a fallen tree between Dyce and Kintore, as Scotland faced a band of wind and rain moving eastward from the Atlantic overnight.

  BBC weather presenter Christopher Blanchett said there were gale-force gusts of up to 55mph (89km/h) around Lockerbie on Monday night caused by a deep area of low pressure to the north of Scotland. "The peak of the winds across South Lanarkshire, Dumfriesshire and the Borders was between 21:00 and midnight," he said. "During the early hours, a gale force gust of 49mph was also recorded at Dyce in Aberdeenshire. "With trees in full leaf at this time of year, they act like a sail and are more easily caught and toppled in high winds. "Gales were also recorded at many exposed coastal locations in the west, as well as the Hebrides and the Northern Isles."

  Have you been affected by this morning's disruption? Tell us your story.
