title: Blinken and Xi had 'robust conversation' during Beijing meeting - BBC News
date: '2023-06-19'
section: Asia
url: http://www.bbc.co.uk/news/live/world-asia-65920024
content: |-
  The top US diplomat met China's president at a time when both sides have acknowledged relations are poor.

  China and the US have interests that are destined to clash

  Even while the American side was celebrating what they view as a successful resumption of high-level contact with the Chinese, they acknowledged that there are larger, more intractable differences between the two nations. Taiwan, without a doubt, is the biggest area of contention – and the one that has the highest potential of escalating from a war of words into a shooting war. Chinese top diplomat Wang Yi said it is an issue on which there is “no room to compromise”. On a wider scale, China has ambitions to become the dominant regional power and global player equal to the US. The US continues to have its own agenda in world affairs – as the leader in what Joe Biden has described as an era-defining global struggle between democracies and autocracies. The US has said that it’s policy toward China is one of de-risking – avoiding the possibility of crisis and conflict – rather than containment or decoupling from China. But the US efforts to organise regional allies – Australia, Japan, South Korea, the Philippines and India – is viewed by the Chinese as a containment in deed if not in word. Meanwhile, on the economic front, the Biden administration has placed an emphasis – backed by hundreds of billions of dollars of government support – on boosting the US computer-chip manufacturing sector. At the same time, they have limited exports of advanced computer technologies to China. The Chinese consider this, along with Trump-era tariffs, as opening shots in a trade war. The Americans, on the other hand, think its a measured response to decades of Chinese subsidies of their key industries. Biden and US officials have said they view the Chinese as rivals and competitors and not adversaries. It is a fine line to walk, however, as the competition – both militarily and economically – heats up. And while the US and the Chinese both appear interested in normalising and stabilising their relationship, the cold reality is that the two global powers have interests that are destined to conflict. How they manage these differences in the end will determine what kind of future the two nations shape.
