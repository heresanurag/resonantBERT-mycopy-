  Hodgkinson's improved personal best has taken her to within 1.33secs of Czech athlete Jarmila Kratochvilova's 41-year-old women's 800m world record. It is the current longest standing mark in athletics. But, following that London performance, Hodgkinson said she now felt that record was beatable. Given the rate or her progress from a personal best of more than two minutes four years ago, it is not unrealistic to think she may have achieved that historic feat when the Los Angeles 2028 Games come around. And, when it does, she will be the defending champion. “Keely had this date etched in her mind since Tokyo," Radcliffe said. "This is by no means the pinnacle for Keely Hodgkinson. She still has a huge, huge long way to go. "She could be back at the Olympics in four years, still only 26, and still an absolute force to be reckoned with." It had long felt a case of when, not if, Hodgkinson would take her place at the pinnacle of the sport. With that series of near-misses put to rest in dominant fashion in Paris, the world is now at the young Briton's feet.
