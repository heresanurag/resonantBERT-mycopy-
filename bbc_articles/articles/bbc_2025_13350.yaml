title: Tommy Robinson pleads not guilty to harassment of journalists - BBC News
date: '2025-06-05'
section: Beds, Herts & Bucks
url: http://www.bbc.co.uk/news/articles/crk2pjlmp8mo
content: |-
  The activist is charged with harassment causing fear of violence towards two Daily Mail reporters.

  Tommy Robinson spoke outside Westminster Magistrates' Court ahead of his court appearance

  Political activist Tommy Robinson has pleaded not guilty to two charges of harassing two Daily Mail journalists. The 42-year-old from Luton, whose real name is Stephen Yaxley-Lennon, appeared at Westminster Magistrates' Court charged with two counts of harassment causing fear of violence towards two reporters in August. The defendant is alleged to have harassed MailOnline journalists Andrew Young and Jacob Dirnhuber through his X social media account between 5 and 7 August last year. He has elected to have a trial by jury and was released on bail by senior district judge Paul Goldspring with his next appearance due to be at Southwark Crown Court for a pre-trial hearing on 3 July.

  Supporters of the anti-Islam activist were outside the courthouse on Marylebone Road

  Mr Yaxley-Lennon arrived at the court in central London and was surrounded by photographers and reporters, with dozens of his supporters also present. In court, he spoke to confirm his date of birth and stated his name as Stephen Lennon. The judge said: "Mr Lennon I have decided that if you wanted, you can have your case at this court as the powers are sufficient, but you have elected to have a jury trial as is your right. "You are free to go, Mr Lennon." Wearing a cream jacket, blue jeans, with a bag across his body, he smiled after he was bailed. As he left court, his supporters chanted his name. Some of them sported Union flags while others held purple placards that read: "Stephen Yaxley-Lennon is the man. Tommy Robinson is the movement." On conviction, the harassment offence has a maximum sentence of six months in prison or an unlimited fine.

  Supporters of the defendant also wore clothing with slogans on such as "Don't trust the mainstream media"

  Mr Yaxley-Lennon is facing a separate trial in October next year over an accusation that he failed to provide the Pin code for his mobile phone when stopped by Kent Police in Folkestone in July 2024.

