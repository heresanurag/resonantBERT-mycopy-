title: Can TikTok's owner afford to lose its killer app? - BBC News
date: '2024-05-08'
section: China
url: http://www.bbc.co.uk/news/world-asia-china-68681786
content: |-
  Sell or be banned - TikTok's US operations, by some estimates, could fetch up to $100bn.

  The US is TikTok's largest market, with its 170m users accounting for about 17% of its global users

  TikTok has filed a lawsuit to try and block the US from banning it if its Chinese parent company does not sell its stake in the social media app. Fears that data about millions of Americans could land in China's hands drove Congressional efforts to try and split TikTok from the Beijing-based company ByteDance, TikTok has said ByteDance "is not an agent of China or any other country". And ByteDance insists it's not a Chinese firm, pointing to the many global investment firms that own 60% of it. But the app's extraordinary success in the US has made it yet another flashpoint between Washington and Beijing. Some 170 million Americans use TikTok every month. That includes about six in 10 teenagers, a fifth of whom say they are on it "almost constantly", according to Pew Research Center. More than 40% of US users say it's their regular source of news. A ban on TikTok was challenged by the company on Tuesday. In the lawsuit, the social media company called the attempted ban an "extraordinary intrusion on free speech rights" and its millions of American users. A total ban would be difficult to police. While forcing ByteDance to sell the app is seemingly simpler, that option also faces obstacles. For one, analysts say Beijing will try its best to scupper a sale. But who will buy TikTok's US operations, which, by some estimates, could fetch up to $100bn (£80.2bn)? And the biggest question of all: Would ByteDance sell its most successful app?

  Founded in 2012 by Chinese entrepreneurs, ByteDance first hit the jackpot with short video app Douyin in China. A year later, it launched TikTok, an international version. TikTok was banned in China but gained a billion users in five years. It is now run by a limited liability company based in Los Angeles and Singapore but is essentially owned by ByteDance. While its founders own only 20% of ByteDance, it's the controlling stake in the company. About 60% is owned by institutional investors, including major US investment firms such as General Atlantic, Susquehanna and Sequoia Capital. The remaining 20% is owned by employees around the world. Three of its five board members are American.

  Some believe a ban will spark public outcry, especially in an election year

  But Beijing's grip over private companies in recent years worries the US about how much control the Chinese Communist Party has over ByteDance, and the data it holds. These concerns are not unfounded. Last year, a former ByteDance employee alleged in a lawsuit that Beijing had accessed TikTok user data in 2018 to spy on pro-democracy protesters in Hong Kong - ByteDance dismissed this as "baseless".

  The US has been cracking down on China's massive footprint on its soil as intelligence officials increasingly warn of espionage, surveillance and hacks. In 2022, Washington banned the sale and import of communication devices from five Chinese companies, including Huawei and ZTE. Now, the suspicion has spread to infrastructure such as Chinese-made cranes that are common in US ports, including those used by the military. Beijing has dismissed these concerns as American paranoia and has warned that a TikTok ban will "inevitably come back to bite the US". Since 2022, TikTok has been routing all US users' data through Texas-based technology giant Oracle to address security concerns. TikTok has stressed US data will be ringfenced and stored on Oracle servers in the US. TikTok's Singaporean CEO Shou Zi Chew was grilled by Congress twice in less than a year, and downplayed the app's connection - and his personal links - to Chinese authorities. His repeated reminders that he is Singaporean and not Chinese went viral. And he said after the House vote, external that TikTok "will continue to do all [they] can, including exercising [their] legal rights" to protect US users' access to the app. TikTok pointed to his statement in response to the BBC's queries.

