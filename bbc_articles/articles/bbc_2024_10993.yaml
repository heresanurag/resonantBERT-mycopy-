  Despite ByteDance's attempts to reassure Washington, the US House of Representatives voted in March to give ByteDance six months to sell TikTok to non-Chinese owners, or have the app blocked in the US. Last month, the House and the Senate approved the same measure - except this time it's bundled with other bills that promise aid to Ukraine, Israel and Taiwan. President Joe Biden later signed the bill into law. The newer version gives ByteDance nine months to decide TikTok's fate - if the chances for a sale look promising, Mr Biden can further extend the deadline by another 90 days.

  As a privately-owned company, it does not release financial details, but reports estimate its US revenue stood between $16bn, external to $20bn, external in 2023, making up as much as 16% of ByteDance's revenue. "In a normal market, it won't be hard to fetch a $100bn valuation. However, under the current political risks and lack of liquidity, the valuation would take a big hit if a transaction does happen," said Li Jianggan, who runs Singapore-based venture capital firm Momentum Works. In other words, it would be akin to a distress sale, a further blow for ByteDance's bottom line.

  TikTok's US business is its most lucrative

  And arm-twisting ByteDance will not work, analysts say. "It will just shut down [in the US] rather than make a few billion dollars," said Ling Vey-Sern, an adviser for Asia technology at Swiss private bank Union Bancaire Privée. A ban would still allow it to return "when circumstances change, while a sale means a more definite outcome", Mr Li said. The US wouldn't be the first to block TikTok - India banned the app in 2020, citing security concerns. But TikTok survived that ban because the Indian market, which was then about as big as the US market is now, wasn't as profitable, said Jayanth N Kolla, founder of technology advisory firm Convergence Catalyst. The US is now TikTok's largest market, accounting for about 17% of its total users, and its most lucrative. "If TikTok were to lose its US operations, it is not just losing the user base, but a large portion of its revenue pie. That's an immense loss," Mr Kolla said.

  For one, not many companies can afford to buy TikTok. And those with deep enough pockets, such as Meta or Alphabet, could be stymied by anti-competition laws. The other major obstacle is whether the deal will include TikTok's so-called recommendation engine. The AI-driven secret sauce that feeds content to users is crucial to the app's success. When the US last tried to force a sale in 2020, ByteDance said the addictive algorithm, which it owns, was not on the table. But selling TikTok without the algorithm would neither allay Washington's concerns nor attract buyers.

