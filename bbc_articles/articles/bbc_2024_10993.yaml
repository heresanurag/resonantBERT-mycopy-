  The algorithm is the "most contentious" part of any deal, Mr Li said. "Any potential acquirer just buying TikTok's user base and content will probably be looking for a heavy discount." And replicating it is hard because analysts say companies that operate in China are far better at targeting users. They have a huge market to tap into, which means AI models have more information and practice to get better. Companies can also mine more data because regulation is weak and the Communist Party itself runs a sophisticated surveillance state. A sale also leaves open the question of how a US-owned TikTok interacts with the app elsewhere. "Imagine if TikTok [users from outside the US] want to send TikToks to the US," said Anupam Chander, a law professor specialising in global tech regulation at Georgetown Law. "How do we know that isn't Chinese propaganda? Do we now have to prevent foreign accounts from being seen by Americans? That begins to sound a lot more like what China did a quarter-century ago."
