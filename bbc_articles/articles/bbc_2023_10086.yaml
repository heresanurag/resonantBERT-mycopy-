  Stars from the hotly-anticipated film attend its premiere in London's Leicester Square.

  The hotly-anticipated Barbie movie had its premiere on Wednesday night in London's Leicester Square.

  The film stars Margot Robbie as Barbie and Ryan Gosling as Ken, and follows the pair as they leave Barbie Land behind and travel to the human world.

  It was directed by Greta Gerwig, and will be out in cinemas on 21 July.
