title: 'Labour MP Rupa Huq: Suspicious package ''part of a pattern'' - BBC News'
date: '2018-03-13'
section: General
url: http://www.bbc.co.uk/news/uk-politics-43392916
content: |-
  Labour's Rupa Huq says security must be improved after she and other MPs from Muslim backgrounds were targeted.

  Labour's Rupa Huq tells the BBC's Iain Watson that security in the House Commons needs to be improved after she and other MPs from Muslim backgrounds were sent suspicious packages.
