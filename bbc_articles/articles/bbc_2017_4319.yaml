  Anthony Joshua calls on Wladimir Klitschko to "stand up to the power" after he is branded just "a puncher" in the run up to their heavyweight bout.

  Last updated on .From the section Boxing

  Coverage: Live commentary on BBC Radio 5 live from 21:00 BST and text updates on the BBC Sport website and app from 20:00 BST.

  Anthony Joshua has challenged Wladimir Klitschko to "stand up to the power" after the Ukrainian branded him only "a puncher" in the run up to Saturday's bout.

  Klitschko, who is entering his 29th world title fight, revealed he has made a video of his prediction for their heavyweight bout.

  That has been saved on a memory stick which will be sewn into his robe.

  "It's strategy," said Joshua, 27. "An attempt at a mind game."

  He added: "I didn't take it the way he wanted to express it."

  Former heavyweight champion Klitschko, 41, will auction his robe - and its contents - for charity after the Wembley Stadium super fight for Joshua's IBF title and the vacant WBA belt.

  At a news conference free of the antics seen at many pre-fight gatherings, he told BBC Radio 5 live: "Don't ask me what's on the stick. Only one person will know about it. If that person wants to put it on social media, then the world will know."
