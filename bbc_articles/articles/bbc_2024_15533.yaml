title: Dog missing for a week rescued on cliff edge in Highlands - BBC News
date: '2024-07-17'
section: Scotland
url: http://www.bbc.co.uk/news/articles/cx92nv2p9l7o
content: |-
  Loki the Cane Corso survived only on rainwater across the seven days he was missing.

  Loki was rescued from the cliff with the help of some dog treats

  A dog who had been missing for a week has been rescued from a cliff ledge in the Highlands, after surviving on rainwater. Loki, a two-year-old cane corso mastiff, ran away while his owners were setting up camp near Kinlochbervie. They feared the worst when they could not find him, despite extensive searches, and assumed he had run off a cliff edge or fallen in to the water. But, seven days after he went missing, Loki was found by a passer-by who heard him barking and he was rescued by the Assynt mountain rescue team. Loki's owner Christine Mcdonald, from Hamilton in South Lanarkshire, said it was a "miracle" he was alive.

  Loki pictured on the cliff edge, with his lead still attatched

  Her husband, Robert, had taken their children and Loki to Sheigra beach campsite to wild camp on Sunday 7 July. At about 20:00 while Robert was trying to carry camping equipment, Loki got loose with his lead still attached and ran away. Speaking to BBC Radio's Good Morning Scotland programme, Ms Mcdonald said it was a "very nervous time" and the family had worried for Loki's safety. The mountain rescue team was called out by Police Scotland on Sunday 14 July to rescue Loki, after a passer-by heard him barking. In a post on Facebook, the Assynt Mountain Rescue Team said: "Miraculously, the dog appeared to be uninjured and in reasonable condition, given he had only had rainwater to survive on for the past 170 hours." Ben Dyson, the team leader for Assynt mountain rescue, said the situation was "very unusual".

  Loki was rescued around half past midnight on Sunday

  At first, the team were informed that the rescue could be difficult due to the steep ground surrounding the ledge. A small group of team members were sent to the area, where they met Clive, the man who had located Loki. Mr Dyson said: "Fortunately, when the guys got to the scene they could see the ground wasn’t as steep as it looked and two of our team members, along with Clive, were able to get down to Loki via a different route. "Over a short period of time, they gained his confidence with a bag of dog treats." A builder's rubble sack was used to winch Loki, who weighs about 60kg, to safety at about 00:30. Ms Mcdonald said it was "incredible" hearing Loki had been found. "Words can’t describe to be honest," she said. "We’re absolutely delighted and so thankful for everyone that helped us."
