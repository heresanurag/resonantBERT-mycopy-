content: |-
  Bhim Kohli died on Monday after being attacked in a Leicestershire park on Sunday.

  Bhim Kohli was walking his dog Rocky on Sunday evening when he was attacked

  A 14-year-old boy has been charged with the murder of an 80-year-old man in a park. Bhim Kohli died on Monday after an attack at Franklin Park in Braunstone Town, Leicestershire, while walking his dog on Sunday. The youth, who cannot be named for legal reasons, has been remanded into custody. He is due to appear at Leicester Youth Court, sitting at Leicester Magistrates' Court, later.

  Mr Kohli died on Monday after an attack in Franklin Park on Sunday

  A number of floral tributes have been laid at the scene. Paying tribute earlier on Wednesday, Mr Kohli's family said "our hearts have been completely broken".

  They added: "Bhim was a loving husband, dad and grandad. He was also a son, brother and uncle. "He adored his grandkids with all his heart and loved spending time with them. He really was such a loving, caring person whose life was centred around his family. "He has always been a very hardworking man and even at the age of 80 he was still very active. "One of his great passions was his allotment, he would go every day to tend to his plots and was so proud of them. He also enjoyed walking the family dog Rocky on the park many times a day. "Bhim loved to laugh. He was always very happy and talkative, the joker of the family and always loved to outsmart us with a smile." Four other children who were arrested in connection with the attack were released with no further action. Andrew Baxter, deputy chief crown prosecutor for the Crown Prosecution Service, said: "The Crown Prosecution Service has reviewed a file of evidence from Leicestershire Police and has authorised a charge of murder against a 14-year-old boy in relation to the death of Bhim Sen Kohli. "The Crown Prosecution Service reminds all concerned that criminal proceedings against this defendant are now active and that the youth has a right to a fair trial. "It is extremely important that there should be no reporting, commentary or sharing of information online which could in any way prejudice these proceedings."

