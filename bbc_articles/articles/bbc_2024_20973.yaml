content: |-
  The reallocated team figure skating medals from the 2022 Beijing Winter Olympics are finally handed out in Paris.

  Wednesday's ceremony ended a two-and-a-half-year wait for athletes to receive their medals

  The reallocated team figure skating medals from the 2022 Beijing Winter Olympics were finally handed out in Paris on Wednesday at the end of a lengthy doping saga. Skaters from the United States and Japan were given their medals after Russia were dropped from gold to bronze following Kamila Valieva's four-year ban for doping. Canada were left fourth after failing in an appeal to be promoted to third. The USA were awarded gold, with Japan promoted to silver. The Russian Olympic Committee was not represented at the ceremony because of its ongoing suspension by the International Olympic Committee (IOC). The IOC decided to wait until Valieva's case had been resolved before handing out the long-awaited medals, with the legal battle leaving the outcome uncertain for two and a half years. Valieva, 18, was banned in January after the Court of Arbitration for Sport upheld an appeal by the World Anti-Doping Agency.

  American Madison Chock said it was "almost surreal" to finally receive her gold. "We got our medals, and I turned around and I saw the Eiffel Tower, and I was just blown away," she said. "It took my breath away." Team-mate Vincent Zhou - a member of the US team who previously said the system was "failing athletes" - said he "almost got used" to not having the medal. "To actually have it around my neck now, I don't know how to process it," Zhou said.
