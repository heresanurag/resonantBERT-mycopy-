  France begin the Women's Six Nations with a 27-15 win over Ireland in Belfast despite a 20-minute red card for Gabrielle Vernier.

  France survive red card to beat Ireland in Six Nations opener

  This video can not be played To play this video you need to enable JavaScript in your browser. France survive red card to beat Ireland in Women's Six Nations opener

  France began the Women's Six Nations with a 27-15 win over Ireland in Belfast despite a 20-minute red card for Gabrielle Vernier. The centre opened the scoring with the game's first try but had her 45th-minute yellow card for a high tackle upgraded by the Television Match Official (TMO) bunker. Scott Bemand's side drew within two points in the closing stages at Kingspan Stadium but, in a game in which both teams scored three tries, France grabbed the contest's final 10 points thanks to Emilie Boulard's late score and five points from the tee for Mor­gane Bourgeois. The French full-back kicked 12 points in total with those efforts proving to be the difference in a game where number eight Aoife Wafer crossed twice for Ireland.

  This video can not be played To play this video you need to enable JavaScript in your browser.

  Across an otherwise even opening half, the French power proved decisive as the visitors made more of their trips to opposition territory. Their work in contact was especially strong and it was a typically big carry from Madoussou Fall that opened up the gap for Vernier to charge through and mark her 50th cap with a try. Ireland responded well, with one break from Aoife Dalton bringing the home crowd to their feet, but there was a second French score seven minutes later. This time it was an offload from flanker Charlotte Escudero that engineered the space for Marine Menager to take Bour­geois' pass in her stride and go over in the corner. A clever line-out to Erin King at the front quickly transferred to a charging Wafer got Ireland on the board and they will have been heartened by a pair of defensive stands on their own tryline even if Bourgeois added a penalty. While the hosts looked to close the gap before the turn, their attack lost some shape and the half ended with a knock-on from hooker Neve Jones.

  France and Ireland scored three tries each at Kingspan Stadium

  Five minutes into the second half, Vernier was sent to the sidelines for a high tackle on Eve Higgins with the yellow card shown on the field, then upgraded to a 20-minute red. Ireland took immediate advantage of their numerical advantage when, from the subsequent kick to the corner, an impressive rolling concluded with Jones over the whitewash. Dannah O'Brien missed the testing conversion from the touchline and Ireland could not bridge the gap any further before France were restored to 15. But, just as Axelle Berthoumieu came on to replace the dismissed Vernier, Ireland got over for their second maul try, and third off a line-out, with Wafer again credited with the score. O'Brien again could not add the extras and France remained in a two-point lead entering the final quarter of an hour. The reliable boot of Bourgeois stretched that advantage to five with another penalty eight minutes from time. Bourgeois was centrally involved in the try that made the victory safe for France, her mazy run across the field preceding replacement Emilie Boulard adding their third score from close range in the 75th minute. Ireland will travel to Italy in round two next weekend with France hosting Scotland.

  Emilie Boulard's 75th-minute try ended hopes of an Irish victory
