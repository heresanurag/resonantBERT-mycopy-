id: bbc_2018_3207
title: 'Russia fire: CCTV shows families fleeing deadly mall fire - BBC News'
date: '2018-03-27'
section: General
url: http://www.bbc.co.uk/news/world-europe-43547036
content: |-
  Parents and children are seen fleeing as thick black smoke quickly engulfs the camera.

  CCTV footage captures the moment fire engulfed a mall in the Siberian city of Kemerovo, sending parents and children fleeing for their lives.

  The footage shows thick smoke pouring through the blaze - taking just seconds to cover the CCTV camera.
