content: |-
  Video shows the moment a deputy responded to the emergency call - and what he taught the boy.

  Video shows the moment a deputy responded to a 911 call from a young boy who wanted a hug. The officer gave the boy a hug but also took a moment to teach him the importance of the emergency line.
