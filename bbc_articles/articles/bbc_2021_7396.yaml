  • None Wales are the first team to receive two red cards in a single edition of the European Championship since Russia and Switzerland in 2004.
  • None Denmark are the first team to score 4+ goals in consecutive matches in European Championship history.
  • None Mikkel Damsgaard has been involved in seven goals in his six appearances in all competitions for the Danes
  • None Denmark have registered consecutive wins within a single major tournament for the first time since the 1986 World Cup.
  • None Kasper Dolberg became the second Denmark player to score two goals in a knockout game at a major tournament after Henrik Larsen v Netherlands at Euro 1992.
