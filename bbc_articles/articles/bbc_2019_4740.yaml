content: |-
  Police release CCTV footage showing the person suspected of firing the shots that killed the journalist.

  Police have released CCTV showing the person suspected of firing the shots that killed Lyra McKee.

  The journalist, 29, can be seen at the beginning of the footage, standing by a police van as she took pictures.

  The suspected attacker is then seen. PSNI is urging people to come forward with information about what happened on Thursday night.

  This video has no sound.
