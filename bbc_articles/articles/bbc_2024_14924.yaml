content: |-
  Tony Blair and Boris Johnson were among guests to arrive at the wedding of a billionaire's son.

  Former UK prime ministers Boris Johnson and Tony Blair arrived at Anant Ambani and Radhika Merchant's lavish wedding celebration in Mumbai, India on Friday.

  The two politicians joined an all-star roster of guests, including Bollywood actors, athletes and musicians from around the world.

  The extravagant four-day ceremony will cap a string of elaborate parties the Ambani family has hosted since March to celebrate the marriage.

  Anant Ambani is the son of Reliance Industries chairman Mukesh Ambani, Asia's richest man.

