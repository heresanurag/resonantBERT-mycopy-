  What you need to know about Red Nose Day 2025

  Rylan Clark, Alison Hammond, AJ Odudu, Davina McCall, Joel Dommett, Alesha Dixon, Jonathan Ross and Tom Allen will present the live show

  Red Nose Day is celebrating 40 years of comedy and entertainment this year, marking the occasion with a night of live TV. Broadcast on Friday night from Salford, the show will feature sketches and live performances in aid of the Comic Relief charity. Shows getting the Red Nose Day treatment include Strictly Come Dancing, Gladiators and Beyond Paradise. The evening will be hosted by a team of presenters including Davina McCall, Rylan Clark and Alison Hammond.

  Jamie Laing ran five ultra-marathons in five days for Comic Relief

  Other famous faces who will be up on the stage include AJ Odudu, Joel Dommett, Alesha Dixon and Tom Allen. The live show will be broadcast from 19:00 GMT on BBC One and 22:00 GMT on BBC Two, but fundraising activities have been taking place all week involving famous faces. BBC Radio 1 presenter Jamie Laing has been running from London to Salford, completing an ultra-marathon every day , externalfor five days. Morning Live presenters Gethin Jones and Helen Skelton also took part in a 24 hour roller disco., external A documentary film also aired on Thursday evening featuring Billy Monger, who took on an Ironman challenge to raise money for the charity, for his bid to become the youngest double leg amputee to complete the world championship.

  Chabuddy G is stepping into the Gladiator arena for Comic Relief

  The Red Nose Day live event is also famous for its comedy sketches, with two BBC shows combining for the first time - Not Going Out and Beyond Paradise. It will star Sally Bretton, who plays both Lee's wife Lucy in Not Going Out and DI Humphrey Goodman's wife Martha Lloyd in Beyond Paradise - so will see both worlds collide. This year's show will also feature a People Just Do Nothing and Gladiators mash-up as Chabuddy G attempts to join the athletic cast of the BBC One show. Rachel Parris and Russell Kane will face a similarly athletic challenge as they attempt to join the Strictly Come Dancing professional lineup as a pair of amateurs. Fans of The Inbetweeners will also be treated to a reunion of stars James Buckley and Joe Thomas, as they parody Gallagher brothers Liam and Noel and document their journey to Oasis fame. Buckley told the BBC: "I had such a fun time with Joe making this sketch for Comic Relief, and was honoured to be asked to be a part of it. And, of course, being a huge Oasis fan, getting to be Liam for the day was a dream come true."

  James Buckley plays Liam Gallagher and Joe Thomas plays Noel in an Oasis sketch

  Comic Relief raises money for local communities in both the UK and the rest of the world. Donations have been used to fund baby banks, community food centres and local youth centres among many other good causes. The show will reflect the work the charity does with a selection of short films, whilst there will also be an EastEnders special on mental health. It will focus on Phil Mitchell (Steve McFadden) who has been battled with depression and psychosis as part of an ongoing storyline. In the five-minute episode, Phil, who tried to take his own life on the show, will make friends with a patient in the mental health unit he is being treated in.
