title: 'Gorseinon: Girls arrested after crash into opticians - BBC News'
date: '2022-03-19'
section: Wales
url: http://www.bbc.co.uk/news/uk-wales-60806993
content: |-
  A 15-year-old girl has also been arrested on suspicion of drink-driving, police say.

  This is the damage caused when a car reversed into a shop window in Gorseinon on Friday evening

  Two teenage girls aged 15 and 16 are being held in custody after a car reversed into a shop front.

  South Wales Police was called at 22:52 GMT on Friday after a car drove into Gorseinon Eye Centre, High Street, Gorseinon, Swansea.

  Both girls have been arrested on suspicion of aggravated vehicle taking.

  The younger girl has also been arrested on suspicion of driving a motor vehicle while over the legal alcohol limit.

