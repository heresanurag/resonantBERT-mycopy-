content: |-
  A man is charged on suspicion of murder after the death of a woman who walking her dog.

  Anita Rose died following an incident in Brantham while she was walking her dog in July

  A man has been charged with murder after the death of a woman who was walking her dog. Anita Rose, 57, was found seriously injured by a member of the public in Brantham, Suffolk on 24 July and later died in hospital. Police said Roy Barclay, 55, of no fixed abode, had been charged with murder and was due to appear before Ipswich Magistrates’ Court on Wednesday. Ms Rose left her home with her dog at about 05:00 BST on 24 July and was discovered unconscious at 06:25 near the Anglian Water sewage works and railway line off Rectory Lane.

  She was taken to Addenbrooke’s Hospital in Cambridge with serious head injuries and died four days later. Suffolk Police said a male cyclist called for an ambulance after finding her lying on a track road. Her jacket was missing and she was wearing leggings and trainers, with her dog Bruce’s lead wrapped around her leg. The animal was not harmed. A picture of Ms Rose, wearing the pink jacket she was last seen in, was released by detectives at the start of the inquiry A force spokesperson said: "On Monday, 21 October officers arrested a 55-year-old man on suspicion of murder. "He was taken to Martlesham Police Investigation Centre for questioning. "Roy Barclay, 55, of no fixed abode, was charged tonight [Tuesday] with murder."

