title: 'Thomas Rainey: Murdered woman''s children saw their mum in flames - BBC News'
date: '2023-07-05'
section: Northern Ireland
url: http://www.bbc.co.uk/news/uk-northern-ireland-66107149
content: |-
  Katrina Rainey's husband has been jailed for 18 years for murder of wife he set fire to.

  Katrina Rainey, a mother-of-six, died after being trapped inside a car that was engulfed in flames outside her home

  A woman who was murdered by her husband after being set on fire said she was "so sorry" some of her children saw the attack, a court heard.

  Mother-of-six Katrina Rainey was preparing to go to work when Thomas Rainey opened her car door, threw petrol over her and set her alight.

  He will spend at least 18 years of his life sentence in prison.

  Mr Justice O'Hara said Mrs Rainey's children saw "something they would never forget - their mother in flames".

  Rainey, of Quarry Road in Knockloughrim, County Londonderry, had previously pleaded guilty to his wife's murder.

  The 61-year-old was handed the minimum tariff at Belfast Crown Court, where he sat with his head bowed.

  The judge said he recognised a minimum of 18 years was a significant sentence for a man of Rainey's age.

  He added: "Given the horror of what he did to his wife, it's the least he deserves."

  Mrs Rainey had got into her car and turned on the ignition when her husband opened the passenger door, threw the petrol over her and set her on fire in October 2021.

  Her children were woken from their sleep by their mother's screams.

  When the emergency services arrived at the scene, Mrs Rainey was being tended to by her children

  When fire crews arrived at the scene, they witnessed Mrs Rainey's children placing wet towels on her as she lay on the ground.

  She was spoken to by emergency services before being sedated and taken to the Royal Victoria Hospital in Belfast where she later died.

  Mrs Rainey said: "I never thought he would do this. My mother said, 'be careful'.

  "I'm just so sorry my children have seen this. I love them so much."

  She also thanked the emergency personnel helping her.

  The police had asked Mrs Rainey if she knew why her husband had done what he did.

  The court heard Mrs Rainey had wanted to leave her husband. She had been to see a solicitor, who had written to Rainey twice.

  Mr Justice O'Hara said: "At the time of the murder, [Rainey] was facing divorce, which may have led to the sale of the family farm to which he was especially attached."

  "She told police she wanted him out of the house and had been to a solicitor," the prosecution said.

  The judge noted that while Rainey had a history of mental health issues, including depression, it was not so severe as to have impaired his conduct.

  He said: "The defendant planned this murder to the extent that he put petrol in the bucket, he had the bucket to hand as his wife went to drive off to work and he threw the petrol over her.

  "He also had a lighter to hand which he used to start the fire in the confined space of the car which she was strapped into."

  The judge noted that Rainey had initially denied setting fire to his wife and was heard at the scene telling her: "I wouldn't do that, I love you."

  He later admitted murdering her.

  Speaking after the sentencing, Det Insp Hazel Miller described Mrs Rainey, 53, as "a loving and very, very caring mother".

  She said her children and family circle had experienced "unimaginable grief and anguish", and were still trying to come to terms with losing a loved one in such devastating circumstances.

  She described Rainey's actions as "deliberate and shocking", which had left a family "absolutely shattered".

  "While today's sentencing signifies the end of the judicial process, I know that Katrina's family will be walking away with the heaviest of hearts," she added.

  Mrs Rainey's mother Sandra Heasley spoke of how her life has changed since October 2021. She described her daughter as a "gentle, sincere, beautiful girl that made time for everyone".

  She also expressed concern that her grandchildren witnessed their mother's harrowing death.

  Mrs Rainey's son Alan spoke of the loss his mother's death has had on the family.

  At the tariff hearing last week, the defence said there were a number of mitigating factors in the case, including the fact Rainey had a "long history of mental health problems".

  The defence also pointed out the accused and his wife had experienced the death of one of their children in a "tragic accident" in 2002.

  The defence accepted Mrs Rainey's murder had been premeditated, but it was "not significant premeditation" as it was "minutes rather than hours or days".

  He described the murder as "the ultimate act of domestic violence".

  He added: "It was witnessed by the children who heard the screams and ran out to see something they will never be able to forget - their mother in flames."
