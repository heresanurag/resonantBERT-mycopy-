title: 'Queensway: Top chef beaten to death by ''monster'', court told - BBC News'
date: '2025-02-05'
section: London
url: http://www.bbc.co.uk/news/articles/clynz1qvy4xo
content: |-
  Mussie Imnetu worked under Gordon Ramsay and Marcus Wareing and was in the UK on a business trip.

  Mussie Imnetu was found unconscious with a head injury and died in hospital

  A self-confessed "monster" attacked a top chef near Notting Hill Carnival and left him dying in the street to go clubbing, a court has heard. Omar Wilson, 31, punched and kicked Mussie Imnetu, 41, during a row outside Dr Power restaurant in Queensway, west London, on the evening of 26 August 2024, the Old Bailey was told. Mr Imnetu, who worked under Gordon Ramsay and Marcus Wareing, was taken to hospital and died four days later, never having regained consciousness, jurors heard.

  In the aftermath of the attack, Mr Wilson allegedly told an associate that he "crossed the line". In a message, he allegedly said: "There's a monster in me, man, and it's just like sometimes it comes out. "And I think I've messed up now, I've messed up, everything's finished." Asked how the carnival was going, he replied: "Can't lie. I did the hands ting (sic) and I think it's a manslaughter," jurors heard. Prosecutor Jacob Hallam KC told jurors that at the end of the attack as Mr Imnetu was dying on the ground, the defendant went clubbing in the Ministry of Sound. The incident was caught on CCTV and began when Mr Wilson approached Mr Imnetu and headbutted him, Mr Hallam said. About a minute later, Mr Wilson punched Mr Imnetu five times in the head causing him to fall to the floor.

  Mr Wilson continued to punch Mr Imnetu repeatedly and proceeded to kick him in the head, jurors heard. Mr Hallam said: "The defendant had, by that point, struck him to his head more than a dozen times. Mr Imnetu had struck the defendant not once." As nearby police moved to help Mr Imnetu, Mr Wilson walked away having dropped his sunglasses and keys at the scene, jurors were told. Following his arrest on 28 August, Mr Wilson told police he had struck the victim in "self defence". He claimed Mr Imnetu was behaving erratically, harassing girls and had a bottle. On being shown CCTV of Mr Imnetu being assaulted on the ground, Mr Wilson said it "seems excessive now", jurors were told. The Old Bailey trial has been adjourned until Wednesday.
