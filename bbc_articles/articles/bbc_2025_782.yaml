title: 'Swansea homelessness: Couple give two homes to The Wallich - BBC News'
date: '2025-02-12'
section: Wales
url: http://www.bbc.co.uk/news/articles/c7vd48y710mo
content: |-
  A retired couple who say they "have enough money" have given two homes to The Wallich in Swansea.

  'We gave our two houses to the homeless'

  Retired professors Valerie and Chris Norris donated two four-bedroom homes to a homeless charity

  A retired couple who bought a new home together after meeting online have donated their previous homes to a homelessness charity. Valerie Norris, 71, and Chris Norris, 77, handed over the four-bedroom houses to The Wallich in Swansea, which said more than 11,000 people in Wales are living in temporary housing. "We're both comfortably off, not wealthy by current standards, but we have more than enough to live on," said Chris, a poet, novelist and retired professor. Mike Bobbett, a director at The Wallich, described Valerie and Chris as "shining examples of the good in people," and said he hoped they would inspire others to use what they have to end homelessness in Wales.

  "We have enough money to do the things we want to do still," Valerie, also a retired professor, told BBC Radio Wales Breakfast. After first leasing the homes to The Wallich for free, Valerie said: "We thought why don’t we just bite the bullet and give these houses. "That was going to be our intention in our wills so we thought why don’t we just give them now." Chris said their family members are working and have all been positive about the donation. "It seemed just a sensible thing to do really, no sacrifice, and I think quite a lot of people, if they reflected on their situation and current social needs, [they] might reach the same decision." He hopes similar donations will become "a more frequent occurrence".

  The homes will be used as an alternative to bed and breakfast accommodation for people in need in Swansea

  The couple have a long history of working for social good: Chris raises money for charity as a singer in the socialist street choir Cor Cochion, while Valerie has been volunteering with Cruse Bereavement Support for 21 years. Chris said he and his wife were very aware of the acute need for overnight housing in Swansea when they made their decision to donate. "They are lovely people and to be doing the work they do is quite amazing," said Valerie of The Wallich. "Both of us have done a whole load of travelling in our careers, too much really, and so we don't want to do that anymore," she added.

  The donation has been described as 'extraordinary'

  "We are quite content to just live a quiet life, eat out now and again, and we've got everything we need." "A donation of two houses is extraordinary," said Mr Bobbett. "Valerie and Chris are brilliant." "They care about people, and they are shining examples of the kindness of people in the world. We're overwhelmed by their generosity," he added. The houses, Mr Bobbett said, will become part of the safety net for people in Swansea. "With more than 11,000 people living in temporary accommodation in Wales, and few places to move people into long-term, meeting the community's basic needs is becoming more challenging," he added.
