  Mr Jarvis KC, told the court Mr Burgess was suffering from a urinary tract infection on the day of the incident, a condition that can make a person confused, agitated, or even aggressive. He told the jury Mr Burgess was asked to hand over the knife after he had used it to flick food and poke a member of staff in the stomach. Mr Jarvis said managers had spent 30 minutes trying to get him to put the knife down. Mr Burgess, who suffered from multiple health conditions including diabetes and carotid artery disease, had been a resident at the home since 2018. He had not been diagnosed with dementia, but the care home specialised in support for people with the condition.

  The court was told that one minute and 23 seconds elapsed between the officers arriving and Mr Burgess being Tasered. In the body-worn camera video PC Smith can be heard repeatedly asking Mr Burgess, who was a right leg amputee, to put down the knife. When he doesn't move, PC Smith sprays him with Pava, before using his baton and 12 seconds later, Mr Burgess can be seen crying out in pain when PC Comotto uses her Taser gun. PC Smith then takes the knife from Mr Burgess. Mr Burgess was taken to hospital after the incident and later contracted Covid. He died 22 days later. Mr Jarvis told the jury: "I want to make it clear – these defendants are not responsible for his death. "He was an elderly gentleman who was unwell." But he added: "The force used was unnecessary and excessive in the circumstances. The trial was adjourned until Tuesday.
