title: PC Tasered St Leonards amputee, 92, in wheelchair, court hears - BBC News
date: '2025-05-19'
section: Sussex
url: http://www.bbc.co.uk/news/articles/cp8dv60dygro
content: |-
  Donald Burgess, who had one leg and was in poor health, was also pepper sprayed in his care home.

  Donald Burgess was resident in a home in St Leonards-on-Sea, East Sussex

  A 92-year-old care home resident in a wheelchair was sprayed in the face with synthetic pepper spray before being Tasered and hit with a baton by police officers, a jury has been told. PC Stephen Smith emptied almost a full can of pepper spray into Donald Burgess's face when he refused to drop an item of cutlery similar to a butter knife, Southwark Crown Court heard. Mr Burgess, who had one leg, was then Tasered by PC Rachel Comotto, police body-worn camera footage shown to jurors appeared to show. PC Smith, 51, denies two counts of assault by using Pava spray and a baton, and PC Comotto denies one charge of assault by discharging her Taser.

  Mr Burgess was a resident at a home in St Leonards-on-Sea, East Sussex, when staff called police on 21 June 2022 after they failed to persuade him to hand over the knife, which had a specially adapted handle. Paul Jarvis KC, prosecuting, told jurors the officers made no attempt to talk to staff, and instead approached Mr Burgess, trying to interact with him. He said instead of trying to calm the situation down they inflamed it, using force that was unjustified and unlawful. Jurors were told there was nobody within arm's reach of Mr Burgess at the time, and that it should have been clear he was not mobile. "It ought to have been obvious by the fact he had one leg that this was a man who wasn't going to be mobile," Mr Jarvis said. "This was an elderly, vulnerable man who may not have understood what was going on. "Rather than being met with understanding and sympathy, he was confronted by irritation and annoyance on the part of the defendants."

