content: |-
  Biden is the first sitting US president to stand on a picket line as he joins striking car-workers in Michigan.

  'Whoever is fighting to help my job be better, I will support'

  Tony Branner, 38, said he felt the strike was necessary to reclaim ground lost by the union during the 2008 financial crisis, including pay adjustments to reflect an increasing cost of living. “It’s been hard ever since we gave that up,” he said. Branner said he didn’t vote for either Trump or Biden in 2020 and welcomed support for the striking workers from whichever politician wanted to give it. “I hope it helps,” he said. He said he had not been paying much attention to their political positions to date, but he expects to remember what the candidates do now during the strike when the 2024 election arrives. “It’s about next year so let’s see what you’re going to do for us,” he said. “Whoever is fighting to help my job be better, I will support.” Biden visited the picket line today and former president Trump will speak tomorrow in Michigan, instead of attending the second Republican debate.
