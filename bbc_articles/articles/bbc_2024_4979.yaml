title: 'Olympic Games 2024: Nicole Yeargin focused on Paris despite tough time - BBC
  Sport'
date: '2024-03-19'
section: Athletics
url: http://www.bbc.co.uk/sport/athletics/68522202
content: |-
  Nicole Yeargin says a disappointing indoor season left her considering her future - but now she is focused on getting to this summer's Olympics.

  Yeargin helped Scotland claim bronze in the 4x400m relay at the 2022 Commonwealth Games

  Nicole Yeargin admits a disappointing indoor season left her considering her future in athletics - but says she is now fully focused on the "dogfight" of securing a place in Team GB's squad for this summer's Olympics in Paris. The 26-year-old Scottish athlete has won World, European and Commonwealth Games bronze medals in the 4x400m relay. But she endured a frustrating start to the year, with a disappointing showing at the British Indoor Championships followed by missing out on the World Indoor Championships in Glasgow. "When I came off the indoor season I was a little bit like 'what is going on, shall we hang these [spikes] up? I don't know if I have got it in me'," she told BBC Sport Scotland. "But then I talked with my coach and realised what went wrong and if we can change it, I have full confidence I can make it back. "One day you can be on top and one you can be on the bottom, athletics is very unforgiving. "It sucks to know what I wanted to run and to know what I opened up with last year - 51.0 seconds. That was my goal this indoor season and it did not happen. "I was a bit confused and it does kind of hit you in the heart - this is what you do, this is your career. "So it was upsetting to run a slow time over and over again, when I know I could do better. I think that would go through anyone's head. "I don't want to waste anyone's time, so if it was my time to go it was my time to go. But I came back to practice the next Monday and I was ready to train. I am still here." Yeargin, who only took up athletics eight years ago, made her Olympic debut at the last Games in Tokyo and competed in the women's 400m as well as the women's 4x400m and mixed 4x400m relays. Born and based in the United States, Yeargin - who qualifies to race for Scotland and Great Britain through her Scottish mum - believes she is now a more mature athlete.

  (L-R) Nicole Yeargin, Laviai Nielsen, Amber Anning and Ama Pipi claimed bronze in the 4x400m relay at the 2023 World Athletics Championships

  "I feel like I am definitely an adult now," she added. "I was fresh out of college and think I got hit down by life a couple of times. "But I am still determined. This is my job now, we didn't just make the team for fun. This is a job - we are here to get paid and put our names in some [history] books. "People have been waiting for me to take that next step and really dive into my talent. There is just more pressure now. I am not the youngster, I know everybody now - I know what time everybody is running. "Obviously the 400m girls are my friends so I have just got to find that 'yes you are my friend but I am still going to beat you today' mentality."

  The two-time British 400m silver medallist, who changed her coach towards the end of last year, believes the sprinting landscape in Team GB circles has altered since the Tokyo Games, but remains confident she can secure her seat on the flight to Paris. That depth was shown when Lina Nielsen, Laviai Nielsen, Ama Pipi and Jessie Knight set a new British record time as they claimed bronze in the 4x400m relay final at the World Indoor Championships in Glasgow earlier this month. "We have got so much stronger in the last three years," Yeargin said. "You have got Amber Anning running fast, you have got the collegiates, you have got the professionals - a lot of them running fast - so it is going to be a dogfight this year. "I make my own schedule, that is the maturity of knowing what I can and can't do and when I should do something and I when I shouldn't. "Last time in Tokyo it was all planned out for you, this year I plan out my schedule - when I want to race, what I want to do, how I can improve. That is helpful."

