title: 'UK snow: Travel disruption still expected as snow begins to thaw - BBC News'
date: '2018-03-03'
section: UK
url: http://www.bbc.co.uk/news/live/uk-43202018
content: |-
  Latest updates as travel disruption is expected after days of heavy snowfall.

  Network Rail warns of flood risks, urges passengers not to travel

  Network Rail's latest statement makes clear that the extreme weather is continuing to cause major problems. It says: "Our teams are putting in a huge amount of work to keep the railway running and passengers on the move. "However, there has been, and continues to be, significant snow in many areas and strong winds are causing it to drift, which is presenting a real challenge for workers on the ground." The company says that, with temperatures expected to rise, it will be looking at its areas of flood risk, including checking bridges. Network Rail reiterates its advice to passengers not to travel unless "absolutely necessary".
