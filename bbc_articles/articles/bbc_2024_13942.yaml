content: |-
  Helicopter overflight of Hawaii's Kilauea volcano after eruption.

  The Kilauea volcano, one of the most active in the world, began erupting on Monday in an area that last erupted a half-century ago, according to the US Geological Survey's Hawaiian Volcano Observatory.

  The fissure system spewing lava extends approximately .6 miles (1 km) in length. The USGS described the eruption as having a 'low in eruptive volume' and taking place in a remote location, posing no immediate threat to human life or critical infrastructure.
