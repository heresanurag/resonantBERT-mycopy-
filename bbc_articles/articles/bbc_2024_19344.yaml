  Eight of those rescued are receiving treatment in hospital, the Italian coastguard said. The UK Foreign Office said it is supporting a number of British nationals and their families following an incident in Sicily. Britain's Marine Accident Investigation Branch is also sending a team of inspectors to conduct a "preliminary assessment" into the sinking of the UK registered-boat.
