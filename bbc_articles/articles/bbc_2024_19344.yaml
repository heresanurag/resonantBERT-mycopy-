  On Monday, specialist fire and rescue divers, trained to work in tight spaces, flew in from Rome and Sardinia, but a first search of the wreck some 50 metres below the sea surface failed. "Access was limited only to the bridge, with difficulty due to the presence of furniture obstructing passage," the Italian fire department posted on social media.

  Mike Lynch was given an OBE honour for services to enterprise in 2006

  Mike Lynch, one of the missing passengers, is known by some as "the British Bill Gates". He co-founded software company Autonomy, before selling it to American computing giant Hewlett-Packard (HP) in 2011 for $11bn (£8.6bn). But an intense legal battle following the high-profile acquisition loomed over Mr Lynch for over a decade. He was acquitted in the US in June on multiple fraud charges, for which he had been facing two decades in jail. There are reports that Mr Lynch had invited members of his legal team onto the yacht to celebrate his acquittal. The sinking of the yacht came on the same day that Mr Lynch's co-defendant in the fraud case, Stephen Chamberlain, was confirmed by his lawyer as having died after being hit by a car in Cambridgeshire on Saturday.

  Chris Morvillo pictured with his wife Nada in New York in 2018

  Lawyer Chris Morvillo has also been listed among the missing. He also worked on the criminal investigation surrounding the 2001 terrorist attacks on the World Trade Center, as an assistant US attorney for the southern district of New York from 1999 to 2005. Morgan Stanley International chairman Jonathan Bloomer is also one of the six people who remain missing. The 70-year-old Briton is also chair of insurance company Hiscox.

  The Bayesian's registered owner is listed as Revtom Ltd. The superyacht can accommodate up to 12 guests in six suites. The yacht's name is understood to be based on the Bayesian theory, which Mr Lynch's PhD thesis was based on. Mr Lynch's wife Angela Bacares is named as the sole legal owner of Revtom, which is registered in the Isle of Man. Ms Bacares was one of the 15 people rescued. A British mother and her one-year-old daughter also survived. The mother, named locally as Charlotte Golunski, later described how she was holding her baby above the surface of the sea to save her from drowning. She told Italian newspaper La Repubblica her family survived because they were on deck when the yacht sank. She said they were woken by “thunder, lightning and waves that made our boat dance”, and it felt like "the end of the world" before they were thrown into the water. “For two seconds I lost my daughter in the sea then quickly hugged her amid the fury of the waves,” the paper quoted her as saying. Survivors said the trip was organised by Mr Lynch for his work colleagues. In the initial aftermath, a nearby Dutch-flagged vessel rescued survivors from the waves, tending to them until emergency services arrived. After the storm had passed, Captain Karsten Borner said his crew noticed the yacht that had been behind them had disappeared. "We saw a red flare, so my first mate and I went to the position, and we found this life raft drifting," he told Reuters. That life raft was carrying 15 survivors, three of whom were "heavily injured", he said.

