content: |-
  Meanwhile the Russian president insists his invasion is "going to plan", despite only taking one major city.

  Putin's KGB friends and former judo partner among those targeted by new US sanctions

  President Biden was pretty blunt in announcing the new package of sanctions on Russia. He said its oligarchs were lining their pockets with the Russian people’s money while Ukraine and its people were hiding in subways to protect themselves from Russian missiles. Biden added that sanctions against President Putin and those around him were already having a “profound impact”. The additional list of eight names of those to be sanctioned by the US is interesting. They include former friends of Putin during his time in the KGB in East Germany and one of his former judo training partners. They also include the Kremlin press secretary who, the Americans say, is a "top purveyor of Putin’s propaganda". And we’re told a lot of these Russians have houses and other major assets in the US. Earlier on Thursday, the White House also told us that President Biden had no plans to talk to, or meet, President Putin to discuss ways of halting the invasion.
