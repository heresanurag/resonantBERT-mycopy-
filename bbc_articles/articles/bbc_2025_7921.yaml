  A table showing all the new US tariffs announced by President Trump on Wednesday

  See the Trump tariffs list by country

  President Donald Trump announced a 90-day pause on Wednesday for countries hit by higher US tariffs - except China - whose tariffs he raised to 145%. In a dramatic change of policy, Trump said all countries that had not retaliated against US tariffs would receive a reprieve – and only face a blanket US tariff of 10% – until July. Here is a look at the full list of tariffs briefly imposed – and the new updated rate by country. Those with the highest share of US imports are at the top.
