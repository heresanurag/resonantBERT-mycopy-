title: Nazanin Zaghari-Ratcliffe says she's missed holding her seven-year-old daughter
  - BBC News
date: '2022-03-22'
section: General
url: http://www.bbc.co.uk/news/uk-politics-60821935
content: |-
  Nazanin Zaghari-Ratcliffe says she has missed holding her seven-year-old, and brushing her hair.

  Nazanin Zaghari-Ratcliffe has said she's been spending time catching up with her daughter, in her first media appearance after being held in Iran for six years.

  She said it has been "lovely" to catch up with seven-year-old Gabriella, and added she's missed holding her, and braiding her hair.

  Asked about a return to Iran, she said she would be "cautious".
