id: bbc_2023_6095
title: 'Pakistan: Lorries crushed and buried in deadly landslide - BBC News'
date: '2023-04-19'
section: General
url: http://www.bbc.co.uk/news/65317716
content: |-
  At least two people died as dozens of vehicles were engulfed while en route to Afghanistan.

  At least two people were killed when a landslide buried dozens of lorries at the Torkham border crossing in Pakistan.

  Vehicles were waiting to cross into Afghanistan when the incident happened before dawn.
