title: Beijing subway crash leaves 102 with broken bones - BBC News
date: '2023-12-15'
section: China
url: http://www.bbc.co.uk/news/world-asia-china-67724238
content: |-
  The impact of the collision, which occurred during heavy snowfall, caused some carriages to detach.

