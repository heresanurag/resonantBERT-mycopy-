title: 'Storm Eunice: Deaths and damage as high winds cause havoc - BBC News'
date: '2022-02-18'
section: UK
url: http://www.bbc.co.uk/news/live/uk-60421388
content: |-
  Storm Eunice leaves three people in the UK dead and brings record wind speeds and huge waves.

  Storm Eunice has been causing travel chaos, with hundreds of flights cancelled, rail lines blocked and road bridges closed.

  A rare "do not travel" alert was issued earlier across Britain's railways and more than 430 flights due to take off or land at UK airports have been cancelled.

  Seven train operators suspended all services this afternoon - c2c, Chiltern Railways, Great Western Railway, Greater Anglia, South Western Railway, Southeastern and Transport for Wales.

  Network Rail has closed all routes in Kent, while every line in south-east London has been blocked by trees.

  Transport for Wales said its train services would resume tomorrow - but disruption to rail travel is likely to continue early on across the UK.

  Quote Message: Starting tonight and carrying on through the weekend we will be working round the clock to fix the damage that the storm has done to the railway, but passengers should be checking their journeys over the weekend as we carry out these repairs." Starting tonight and carrying on through the weekend we will be working round the clock to fix the damage that the storm has done to the railway, but passengers should be checking their journeys over the weekend as we carry out these repairs."
