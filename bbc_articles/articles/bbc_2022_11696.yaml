id: bbc_2022_11696
title: Camping overnight to see Queen's lying-in-state - BBC News
date: '2022-09-14'
section: General
url: http://www.bbc.co.uk/news/uk-62902930
content: |-
  Hundreds of people braved wet weather to be among the first people to see the Queen's coffin.

  The first groups of people arrived at Albert Embankment on Monday and number have been growing.

  The BBC's Kristian Johnson spent the night camping with people queuing.
