  In speeches, Vance regularly argues that "America is not just an idea... America is a nation." He couples this statement with an anecdote about his family's ancestral graveyard in Kentucky, where he says he, his wife and their children will one day be buried, arguing that family and homeland are more important than some of America's traditional core ideas. In Vance's view, the Trump administration's priority should be to make life better for Americans who have been in the country for generations, and yet have little of the nation's vast wealth. Rod Dreher, a conservative American writer who is also a friend of the vice-president, said Vance's thinking arises from a belief that "moderate normie Republicans... failed to offer anything to stop the so-called forever wars, and they also failed to offer anything to ordinary Americans like where he comes from, who are suffering economically from globalism and from the effects of mass migration and fentanyl". "He got red-pilled, so to speak, by Donald Trump," Dreher told BBC Radio 4's Today Programme this week. "Red-pilled" is internet slang for suddenly waking up to a supposedly hidden truth, as featured in The Matrix movies. It's commonly used by those on the right online who believe they have special access to reality and that people with liberal, centrist or establishment views are uncritical thinkers.

  Vance is a vice-president who, more than his boss, seems extremely plugged into internet culture. He's an enthusiastic user of X, often jumping directly into arguments rather than using it, as many politicians do, as a platform for announcements. His appearances on fringe right-wing podcasts, while he was trying to drum up support for a Senate run, provided fodder for his opponents, as did provocative trollish comments such as that the US was being run by "childless cat ladies". Married to the daughter of Indian immigrants, he has rejected and been rejected by members of the alt-right even if he does echo some of their views. However, he does have friends and allies both at the top of Silicon Valley and in some of its lesser known corners. After graduating from Yale Law School, he was brought into the world of venture capital by influential Silicon Valley conservative Peter Thiel, who later funded his US Senate campaign. He has cited people like the blogger Curtis Yarvin, a key guru in the "neo-reactionary" movement which dreams up fantasies of technologically-assisted, hyper-capitalist societies led by powerful monarchs. His familiarity with the internet's fringes was further demonstrated when he spread false rumours about immigrants eating pets and an allegation about Ukrainian corruption - which the BBC traced back to Moscow.
