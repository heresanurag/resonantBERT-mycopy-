  "He sort of stews in this online world," said Cathy Young, a writer for the conservative, anti-Trump media outlet The Bulwark. At the same time, Young said, his anecdote about family graveyards and homeland suggests another political tendency - a "disturbing undertone of nativism". "That bothers some people and rightly so," she said. "Part of the American legacy is that we are a nation of immigrants. [Former Republican President] Ronald Reagan talked about that, about one of the distinctive things about this country is that anyone can come here from any part of the world and become an American." Vance's "Americans First" thinking clearly extends to the issue of the war in Ukraine. When he was a senator, he was often critical of America's involvement in the war and the huge sums spent on it, his former Senate colleague Josh Hawley, a Republican from Missouri, recalled. "His position then was very much like what it is now... that the conflict must end," Hawley told the BBC. "It needs to end in a way that's maximally advantageous to the security of the United States and it needs to end in a way that gets our European allies to take increased responsibility." Vance regularly accused the Biden administration of being more interested in Ukraine than in stemming illegal immigration. Writing in 2022, during his Senate campaign and after the Russian invasion, he said: "I will be damned if I am going to prioritise Ukraine's eastern border right now when our own southern border is engulfed by a human tsunami of illegal migrants." His views burst out into the open during that dramatic argument with President Zelensky in the Oval Office. Vance accused Zelensky of lacking respect, of sending politicians on a "propaganda tour" of Ukraine and of being insufficiently thankful for US aid.

  "Offer some words of appreciation for the United States of America and the president who's trying to save your country," he told the Ukrainian president. The argument left European leaders scrambling to defend Zelensky, while also trying to maintain negotiations over a possible peace deal. Vance then prompted widespread outrage from allies when he poured scorn on the idea of security guarantees in the form of troops "from some random country that hasn't fought a war in 30 or 40 years". He later denied he was talking about the UK or France, the only two European countries that have publicly stated their willingness to send peacekeepers to Ukraine. But the vice-president's willingness to step on the toes of allies reflect a world view which, in his words, has little time for "moralisms about 'this country is good', 'this country is bad'". "That doesn't mean you have to have a complete moral blind spot, but it means that you have to be honest about the countries that you're dealing with, and there's a complete failure to do that with most of our foreign policy establishment in this country," he told a New York Times columnist last year. His tone has shifted from the two years he spent in the US Senate before being picked by Trump. Democrat Cory Booker remembered Vance as "very pragmatic and thoughtful". "That's why some of this stuff surprises me," Booker told the BBC.

  Others detect the same disconnect. David Frum, now a writer for The Atlantic magazine, said that Vance's views have changed significantly from when he first commissioned the former marine, who was attending Ohio State University at the time, to write for his website on conservative politics more than 15 years ago. "He was not in any way the culture warrior that he is today," Frum said. Frum, a former George W Bush speechwriter and staunch critic of Trump, said that Vance's view of Russia represented "ideological admiration". In Munich, as he spoke about free speech, the vice-president cited cases involving conservatives and Christians in Western countries but avoided any mention of Russia's harsh clampdowns on expression. Vance and his allies reject that he is sympathetic to Putin. "I've never once argued that Putin is a kind and friendly person," Vance, then an Ohio senator, said in a speech at the 2024 Munich Security Conference. "We don't have to agree with him. We can contest him and we often will contest him," he said. "But the fact that he's a bad guy does not mean we can't engage in basic diplomacy and prioritising America's interests." The BBC has asked the White House for comment on Vance's stance in relation to Ukraine and Russia. A quick end to the conflict in Ukraine is, in Vance's view, not only about putting a stop to billions of dollars being spent thousands of miles away. He himself has said that there are bigger issues for the US and its friends to focus on than Ukraine, namely the threat of China, which he has called "our most significant competitor... for the next 20 or 30 years". Vance's views on Ukraine and his willingness to publicly air them provided a dramatic moment in the early days of Trump's second presidential term. But it also offered a vivid illustration of the vice-president's ideology, his prominence in the Trump administration and how he views America's place in the world. With reporting by Rachel Looker and Anthony Zurcher in Washington and Lily Jamali in San Francisco

