  In a speech to allies and in that infamous Oval Office row, the vice-president came out punching - but what is he fighting for?

  How JD Vance sees the world - and why that matters
  • None Listen to Mike Wendling read this article on BBC Sounds An argument in the White House tore apart the US alliance with Ukraine, shook European leaders and highlighted JD Vance's key role in forcefully expressing Donald Trump's foreign policy. The vice-president has come out punching on the global stage - so what is it that drives his worldview? Vance's first major foreign speech, at the Munich Security Conference in mid-February, caught many by surprise. Rather than focusing on the war raging in Ukraine, the US vice-president only briefly mentioned the bloodiest European conflict since World War Two. Instead, he used his debut on the international stage to berate close US allies about immigration and free speech, suggesting the European establishment was anti-democratic. He accused them of ignoring the wills of their people and questioned what shared values they were truly banding together with the US to defend. "If you are running in fear of your own voters, there is nothing America can do for you, nor for that matter is there anything you can do for the American people," he warned. It was a bold and perhaps unexpected way to introduce himself to the world - by angering European allies. But days later he was back in the news, at the centre of a blistering row with Ukrainian President Volodymyr Zelensky, whom he accused of being ungrateful. For those who have been studying the rise of Vance, these two episodes came as no surprise.

  The vice-president has come to represent an intellectual wing of the conservative movement that gives expression to Trumpism and in particular how its America First mantra applies beyond its borders. In writings and interviews, Vance has expressed an ideology that seems to join the dots between American workers, global elites and the role of the US in the wider world. On the campaign trail with Donald Trump last year, Vance spent much of his time sharply criticising Democrats - the usual attack-dog duties that traditionally get dished out to running mates - and sparring with reporters.
  • None The 'hillbilly' Maga loyalist who became vice-president
  • None Vance took the lead attacking Zelensky. Why? And while Elon Musk's outsized and unconventional role in the Trump administration initially overshadowed him, that Munich speech and the Oval Office showdown have raised the profile of Trump's deputy.

