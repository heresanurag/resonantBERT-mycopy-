  It's also led to questions about the winding ideological journey he's made during his years in the conservative movement - and what he truly believes now. "He's much more of a pragmatist than an ideologue," said James Orr, associate professor of philosophy of religion at the University of Cambridge and a friend whom Vance has described as his "British sherpa". "He's able to articulate what is and is not in the American interest," Orr said. "And the American interest is not the interest of some abstract utopia or matrix of propositions and ideas, but the American people." Vance has repeatedly returned to this "America First" - or perhaps "Americans First" - theme in speeches, drawing a line between what he castigates as Washington's economic and foreign policy orthodoxy abroad and the struggles of the left-behind American working class at home. At the Republican National Convention last summer, for example, he lamented how in small towns across the US "jobs were sent overseas and children were sent to war". And he attacked then-President Joe Biden, saying: "For half a century, he's been a champion of every single policy initiative to make America weaker and poorer." But Vance is also someone who, after a tough upbringing in an Ohio family with Appalachian roots and sudden fame on the back of a bestselling memoir, Hillbilly Elegy, has tried out many different views. Not only is he a former "Never Trumper" who described the US president in 2016 as "reprehensible" and "an idiot", his book places much of the blame for the plight of the rural poor squarely on the choices made by individuals. More recently he's shifted that blame to elites – a group he's variously defined as Democrats, conventional Republicans, liberals, corporate leaders, globalists and academics.

