id: bbc_2018_5446
title: Woman drives car through half marathon in Plymouth - BBC News
date: '2018-05-22'
section: General
url: http://www.bbc.co.uk/news/uk-england-devon-44200961
content: |-
  Plymouth MP Luke Pollard said it was "very silly" in light of terror attacks where cars were used as weapons.

  A woman drove her car into the path of runners at the Plymouth Half Marathon, saying she had a workshop to get to.

  The move was widely criticised by onlookers and on social media.
