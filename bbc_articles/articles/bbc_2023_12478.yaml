id: bbc_2023_12478
title: Thousands at Scout camp move into hotels after S Korea heatwave - BBC News
date: '2023-08-05'
section: UK
url: http://www.bbc.co.uk/news/uk-66407392
content: "Over 4,000 UK Scouts are withdrawing from a World Jamboree over extreme\
  \ heat and worries about facilities.\n\nBritish Scouts have started arriving at\
  \ a hotel in Seoul after being taken by coach from the campsite\n\nUK Scouts are\
  \ being moved to hotels in Seoul after an international event in South Korea was\
  \ hit by extreme heat.\n\nHundreds have fallen ill at the outdoor World Scout Jamboree,\
  \ which is attended by more than 40,000 young people from around the world, amid\
  \ 35C (95F) heat.\n\nThe British group of 4,500, the largest in attendance, is moving\
  \ from a camp site at Saemangeum to Seoul, the Scout Association confirmed.\n\n\
  The US and Singaporean teams are also pulling their members out of the event.\n\n\
  South Korea's government said it was sending 60 more medics and 700 service workers\
  \ to maintain the toilets and showers, with many countries staying at the site for\
  \ the next week.\n\nThe jamboree, described as the world's largest youth camp, gathers\
  \ Scouts from around the world every four years, each time in a different country.\n\
  \nMost of those attending are aged between 14 and 18, and 155 countries are represented\
  \ in South Korea.\n\nThis is the first jamboree since the pandemic and is due to\
  \ run until 12 August.\n\nCoaches of British teenagers have started arriving back\
  \ in Seoul - about 120 miles (197km) from the campsite - and they will spend the\
  \ next week in hotels.\n\nThe UK Scout Association said young people and adult volunteers\
  \ had begun \"settling into their accommodation\" and the Jamboree experience would\
  \ continue in the city before returning to the UK on 13 August as planned.\n\nThe\
  \ BBC has been told that some scouts are sharing five to a room, while up to 250\
  \ are sleeping in the ballroom of one Seoul hotel due to a lack of available accommodation.\n\
  \nOne of the UK team told BBC's Seoul correspondent Jean Mackenzie the decision\
  \ to pull out was not based just on the extreme heat but was also down to the facilities\
  \ and food.\n\nThey described the campsite toilets as a \"health risk\" and said\
  \ children's dietary needs were not being met.\n\nThe UK team monitored conditions\
  \ for a number of days, they said, giving the organisers the opportunity to improve\
  \ them, but had lost confidence they could keep everyone safe.\n\nMany of the parents\
  \ the BBC has spoken to have said their children spent years preparing to attend\
  \ the event, often raising thousands of pounds to do so.\n\nThunderstorms are forecast\
  \ for the region in which it is taking place, while temperatures will feel hotter\
  \ than 40C due to high humidity, according to AccuWeather.\n\nThe World Organization\
  \ of the Scout Movement (WOSM), the largest international Scouting organisation,\
  \ said it had asked the Korean Scout Association, which is hosting the event, to\
  \ consider ending early.\n\nThe movement said that the host \"decided to go ahead\
  \ with the event\" and assured participants that it was doing \"everything possible\
  \ to address the issues caused by the heatwave\".\n\nUK Scouts, the country's largest\
  \ scouting organisation, said its volunteers and others had worked to give members\
  \ \"enough food and water... shelter from the unusually hot weather... and toilets\
  \ and washing facilities appropriate for an event of this scale.\"\n\nThe UK and\
  \ US teams have the money and resources to relocate thousands of people at short\
  \ notice but there are plenty of countries at the event which do not.\n\nBuses at\
  \ the camp site of the 25th World Scout Jamboree in Buan, South Korea\n\nThe US\
  \ is taking its participants to Camp Humphreys army base in Pyeongtaek, citing safety\
  \ concerns.\n\nParents of children at the campsite told the BBC that no activities\
  \ were taking place due to the heat.\n\nOthers have defended the event, saying their\
  \ children were disappointed that they had to leave.\n\nOne mother from north-east\
  \ England said what was meant to be a \"great life experience\" had turned into\
  \ a \"survival mission\" for her 16-year-old daughter.\n\n\"She knew it would be\
  \ hot but not as hot as it is. They cannot cool down, their tents are too hot,\"\
  \ said the mother, who did not wish to be named.\n\nHer daughter had told her that\
  \ the showers and toilets were \"appalling and unsafe\", with \"floating rubbish,\
  \ plasters and hair\" blocking drains.\n\nAnother parent said the situation was\
  \ so bad they put their daughter on a plane back to the UK on Friday.\n\nHowever\
  \ Peter Naldrett told the BBC that his two children were \"frustrated, upset and\
  \ angry\" about having to leave.\n\n\"My kids have said that the toilets are a bit\
  \ grim but it's manageable,\" he said.\n\nShannon Swaffer, whose 15-year-old daughter\
  \ is at the event, said the children were \"all devastated that it's ended early\"\
  .\n\n\"By all accounts the heat is intolerable and adults and kids alike can't continue\
  \ there,\" she said, adding that her family were \"lifelong Scout people\" and that\
  \ the leaders had been \"absolutely phenomenal\".\n\nRebecca Coldwell said her 17-year-old\
  \ daughter had received \"outstanding\" medical care for an infected wound, and\
  \ that she was \"heartbroken\" about having to move to hotels.\n\nKristin Sayers\
  \ from Virginia in the US, paid $6,500 (£5,100) for her 17-year-old son Corey to\
  \ go to the jamboree but said his dream had turned into a \"nightmare\".\n\n\"He's\
  \ very aware of how much money that is and the sacrifices we made as a family to\
  \ send him. We could've done so much with that money,\" she told Reuters news agency.\uFEFF\
  \n\nSome Scouts from Spain, Belgium, and France, told the BBC they were happy to\
  \ still be at the campsite and disappointed the British had left.\n\nBlanca, a 16-year-old\
  \ from Spain, said her sister was taken to hospital on the first day because of\
  \ the heat, but she has recovered and so have the conditions.\n\n\"Now the situation\
  \ is better. They give us cold water and fans and let us go inside places to get\
  \ shade,\" she said.\n\n\"I am sad the British didn't stay. They're really cool\
  \ people and I enjoyed spending time with them,\" she added.\n\nThe event has been\
  \ described as the world's biggest youth camp\n\nSouth Korea's authorities have\
  \ issued the country's highest hot weather warning for the first time in four years.\n\
  \nSouth Korean Prime Minister Han Duck-soo announced that aid was being sent to\
  \ the site amid criticism from some that authorities failed to plan for extreme\
  \ heat.\n\n\"The government will use all its resources to ensure that the jamboree\
  \ can end safely amid the heatwave,\" he said.\n\nAir-conditioned buses, water trucks\
  \ and medical staff were being dispatched.\n\nAre you or your relative at the World\
  \ Scout Jamboree? Email your experiences: haveyoursay@bbc.co.uk.\n\nPlease include\
  \ a contact number if you are willing to speak to a BBC journalist. You can also\
  \ get in touch in the following ways:\n\nIf you are reading this page and can't\
  \ see the form you will need to visit the mobile version of the BBC website to submit\
  \ your question or comment or you can email us at HaveYourSay@bbc.co.uk. Please\
  \ include your name, age and location with any submission."
