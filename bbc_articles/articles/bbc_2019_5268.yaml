title: 'Australia election: Fines, donkey votes and democracy sausages - BBC News'
date: '2019-05-13'
section: General
url: http://www.bbc.co.uk/news/world-australia-48210783
content: |-
  The threat of a $20 fine and the lure of "democracy sausages" mean almost all Australians vote in elections.

  More than 90% of eligible Australians are expected to vote in the election on 18 May - because it's one of the few countries to have compulsory voting.

  The BBC's Australia correspondent Hywel Griffith explains how this works - and whether people like it.
