content: |-
  Sophia Dunkley is recalled to England's one-day international squad for the three-match series against New Zealand which starts on 26 June.

  Sophia Dunkley was left out of the England white-ball squads for the series against Pakistan in May

  Sophia Dunkley has been recalled to England's one-day international squad for the upcoming series against New Zealand. Top-order batter Dunkley, 25, was left out of both white-ball squads for the series against Pakistan last month after a lean run of form. But she has since excelled in domestic cricket, leading the run-scoring charts in the Rachael Heyhoe Flint Trophy for South East Stars. The right-hander has 293 runs in five innings, averaging 97.66 with the Stars third in the table. "Sophia has done exactly what we asked her to do, which I am very pleased about," said England head coach Jon Lewis. "She has worked incredibly hard. From what I can see in domestic cricket, she has tempered her aggression a little but the weight of runs has earned her place back in. "Her batting rhythm looks good and that's incredibly exciting because we've always believed in her ability and the way she can impact games." The three-match ODI series against the White Ferns starts in Durham on 26 June and is followed by five T20s. Heather Knight's England side are favourites for both legs after beating the same opponents in both formats away from home in March and early April, and following the clean sweep of Pakistan which started their summer.

  Dunkley is likely to be competing with Maia Bouchier for the second opening spot alongside Tammy Beaumont, with Bouchier claiming the role after an impressive series in New Zealand, though Lewis emphasised Dunkley's adaptability to be able to bat in the middle order if necessary. But she did not pass 50 in five innings against weaker opposition in Pakistan which, combined with Dunkley's sparkling form, has opened competition for the place. Kate Cross will lead the pace attack alongside Lauren Bell, with fast bowler Lauren Filer also included. All-rounder Nat Sciver-Brunt made a gradual return to bowling during the Pakistan series after a knee injury, and Lewis said her workload will continue to be managed carefully throughout the series. Sophie Ecclestone, Charlie Dean and Sarah Glenn form the spin options but whether they all fit in the XI could depend on Sciver-Brunt's bowling availability.
