title: Crowds gather at Peaky Blinders' Tommy Shelby lookalike contest - BBC News
date: '2024-11-24'
section: Birmingham & Black Country
url: http://www.bbc.co.uk/news/articles/cp3n07224elo
content: |-
  More than a dozen lined up to take part in the contest in Birmingham on Saturday.

  Joe Freeman with James and Arthur Dunley, who all took part in the contest

  They came in their flat caps, waistcoats and with an ice-cool stare - all hoping to be crowned the best lookalike of Peaky Blinders' Tommy Shelby. The contest took place on Saturday in Birmingham city centre and follows the craze of celebrity doppelganger competitions currently sweeping the globe. Over 100 spectators gathered outside the Bullring to watch participants step forward with their best impression of Cillian Murphy's character. Based on levels of applause and a judges' opinions, 66-year-old Derek Brennan was named the winner.

  Derek Brennan said he thought he'd be too old to be crowned the winner

  "My looks and my personality won me the competition, I can't help but be the best," Mr Brennan joked. Speaking to the BBC, he said he thought of himself as too old to be called a lookalike but friends had always said he resembled the hero of Steven Knight's hit series. "People would tell me I look like him [Cillian Murphy] but I always thought I'd be too old so I joke and say I could be his dad."

  Student Joe Freeman braved the rain and donned a suit after hearing about the contest on Instagram. He was so committed he got his hair cut the day before. "I really love the Peaky Blinders and my auntie who is American always says I look like Thomas Shelby - I was going all out and here to win."

  A prize of a £500 shopping spree was up for grabs

  James Dunley, 22, and his dad Arthur travelled from Telford, Shropshire, to take part. James said being amongst fans made the event exciting. "I'm Irish so I share that connection with Cillian and I'm told that I have similar features as him as well," he said. "I'm more here for the fans, the excitement and just meeting everybody. "I became a huge fan of the show after people kept telling me I looked like Tommy." The series, which ran from 2013 to 2022, followed the escapades of a Birmingham crime gang in the years after World War One. Now a Peaky Blinders film is coming to Netflix, with Oscar winner Murphy set to step back into his role as everyone's favourite Brummie gangster.

