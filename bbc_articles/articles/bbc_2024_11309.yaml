  “I don’t see myself as a hero, I was only doing what I thought was the right thing at the time. What I’ve demonstrated is that an ordinary person can also do these things.” He believes that if his account shuts down, “naturally a new Teacher Li will appear”. The thought of getting arrested scares him, but giving up is not an option. “I feel I am a person with no future... until they find me and pull me back to China, or even kidnap me, I will continue doing what I’m doing.” By going public with his allegations, he hopes to expose the Chinese government’s tactics. But it’s also because he believes they crossed a line by escalating their repression, and wants to fight back. “I post something you don’t like, so you crush me, that is the process of a mutual fight. But doing all these things to my parents, I really don’t understand it.” Now, he is making defiant plans to expand his operations, perhaps recruiting others to join his mission, or posting in English to widen his influence. The Chinese government “is really afraid of outsiders knowing what China is really like... [Posting in English] is something they are even more afraid of. “They may feel they have a lot of tactics, but I actually have a lot of cards I can play.”
