title: Man killed couple then froze remains in west London, court hears - BBC News
date: '2025-05-01'
section: England
url: http://www.bbc.co.uk/news/articles/cd6j9n3xn6po
content: |-
  A man is on trial charged with murdering a couple and taking their dismembered bodies to the Clifton Suspension Bridge.

  Yostin Mosquera, 34, Albert Alfonso, 62, and Paul Longworth, 71, pictured on a boat in Colombia

  A man murdered a couple, decapitated and dismembered them, froze some of their remains, stole from their bank accounts and packed the rest of their bodies in suitcases before taking them to the Clifton Suspension Bridge in Bristol, a court has heard. Yostin Mosquera also filmed himself having sex with and stabbing Albert Alfonso, 62, having earlier killed Paul Longworth, 71, and hidden his body in under-bed storage, the Old Bailey was told. Mr Mosquera, 35, denies the murder of both men at their flat in Shepherd's Bush, west London. He admitted the manslaughter, by way of loss of self-control, of Mr Alfonso - which the prosecution rejected - and said Mr Alfonso caused Mr Longworth's death.

  This article contains material that some people may find distressing.

  A court drawing of Yostin Mosquera and an interpreter at the Old Bailey

  The prosecution alleges Mr Mosquera murdered both men on 8 July 2024, killing Mr Longworth first with a hammer to the back of his head. He and Mr Alfonso, who had been repeatedly stabbed, were in a long-term relationship and a year before their death had entered into a civil partnership together, the prosecution told the jury.

  Prosecution barrister Deanna Heer KC said Mr Mosquera "could hardly deny" killing Mr Alfonso, as the attack took place while the defendant and Mr Alfonso were having sex and that the whole event was filmed. Mr Mosquera was also recorded singing and dancing in the aftermath of the attack, the Old Bailey heard, which the prosecution said indicated he was in complete self-control.

  Paul Longworth and Albert Alfonso entered into a civil partnership a year before their death

  The court heard Mr Alfonso liked "extreme sex" - which Mr Longworth knew about and accepted, but had "nothing to do with". Jurors were told Mr Mosquera visited the UK more than once and spent time with Mr Alfonso and Mr Longworth, engaging in sex acts with Mr Alfonso in exchange for payment, and that the couple also visited the defendant in his home country of Colombia. Mr Alfonso paid the defendant and another man, known under a pseudonym as James Smith, to perform degrading sexual acts which were often filmed and posted online, jurors were told.

  Ms Heer told the court that the trio "seemed to enjoy one another's company" and described how Mr Alfonso arranged a guest membership for Mr Mosquera at the gym where he worked and asked for him to be included in the staff five-a-side football WhatsApp group. On Mr Mosquera's claims over the death of Mr Longworth, Ms Heer said Mr Alfonso had no reason to kill his "lifelong friend and partner". "Their relationship was undoubtedly unconventional but whatever you may think about the way that Albert Alfonso conducted his sex life, the evidence also suggests that they accepted one another and that they cared for one another," she said.

  Detectives searched the couple's flat and found more body parts

  The court heard that after the attacks, Mr Mosquera used the computer in Mr Alfonso's room to steal from him. An examination of it showed Mr Mosquera had created a PowerPoint document of the couple's banking information, accessed a spreadsheet which contained their passwords for online banking, and had attempted to access Mr Alfonso's different accounts to transfer money - including trying to send £4,000 to his own account in Colombia, the court heard. He made several cash withdrawals from Mr Alfonso's different bank accounts, obtaining at least £900 before the transactions started getting declined, the court was told.

  Mr Mosquera took the men's remains in a suitcase and trunk to Clifton Suspension Bridge, the court heard

  Mr Mosquera is also said to have messaged Mr Alfonso's manager the morning after the killing from the victim's phone to say he was flying to Costa Rica for a family emergency and planned to stay for about eight weeks. At about 23:30 BST on 10 July, a cyclist making his way across the Clifton Suspension Bridge spotted Mr Mosquera standing next to a large red suitcase, the prosecutor said. The defendant told a cyclist he had car parts inside the suitcase and a large silver trunk, the court heard. Ms Heer told the court the suitcases contained the decapitated and dismembered bodies of Mr Longworth and Mr Alfonso. The luggage had an address label on it, which led detectives to the couple's home in Shepherd's Bush, where other body parts were found in a chest freezer.

  Mr Mosquera, a Colombian national, wearing a white shirt and blue jeans, sat in the dock and listened to proceedings with the help of an interpreter.
