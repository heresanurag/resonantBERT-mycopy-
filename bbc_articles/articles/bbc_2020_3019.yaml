title: Dead baby boy found in Hampshire woodland - BBC News
date: '2020-03-05'
section: Hampshire & Isle of Wight
url: http://www.bbc.co.uk/news/uk-england-hampshire-51763103
content: |-
  Officers are trying to trace the mother after the newborn was discovered near Southampton.

  Police remained at the scene on Shore Road in Hythe on Friday morning

  A baby boy has been found dead in an area of woodland in Hampshire.

  Police are trying to trace the mother of the newborn, who was discovered close to Shore Road in Hythe, near Southampton, just after 14:00 GMT.

  The death is being treated as unexplained and anyone with dash-cam footage of the area at the time is asked to contact officers.

  Det Ch Insp Ross Toms said their priority now was to find the mother of the child.

  "I have no doubt this will have been a very distressing experience for the mother of this baby," he said.

  "Our priority right now is to ensure she receives the care and assistance she requires.

  "I want to make a direct appeal to her.

  "You may be very frightened right now and it is vitally important that you make contact with us or someone else."

  Three police vehicles and a van are parked next to the woods being searched on Shore Road.

  A small generator is running by the road, powering floodlights that have been used to assist police as they combed the area overnight.

  Officers are very concerned for the mother's wellbeing and have asked for anyone who may have recently seen a heavily-pregnant woman in the area to get in touch.

