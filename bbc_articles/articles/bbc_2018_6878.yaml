title: Prince Charles meets Sinn Féin leaders in Cork - BBC News
date: '2018-06-14'
section: Europe
url: http://www.bbc.co.uk/news/world-europe-44474996
content: |-
  The royal couple are in the Republic of Ireland following a two-day visit to Northern Ireland.

  The prince took time to flick through the Great Book of Ireland at University College Cork

  The Prince of Wales has held a private meeting with the leadership of Sinn Féin on Thursday.

  Sinn Féin president Mary Lou McDonald and vice president Michelle O'Neill met with the prince in Cork.

  The prince and his wife Camilla are on a two-day visit to the Republic of Ireland.

  Ms McDonald said she was "glad to avail of the opportunity to extend the hand of friendship to those in Ireland who identify as British".

