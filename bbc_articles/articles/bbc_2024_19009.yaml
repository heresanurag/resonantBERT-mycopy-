content: |-
  The families have been informed, Derbyshire Police confirms.

  Five motorcyclists die in two crashes near same town

  The A53 remained closed on Sunday evening, hours after the crash

  Five motorcyclists have died in two separate crashes near the same Derbyshire town. Three Ducati motorbikes, a van and a car were involved in the first crash on the A53 near Buxton at about 09:45 BST on Sunday. The bikers, all men in their 50s, were pronounced dead at the scene. Then, at about 10:20, two motorcyclists died at the scene of a crash with a car on the A6 near Tom Thorn, between Buxton and Dove Holes.

  A Derbyshire Police spokesperson said: "Their families are aware and our thoughts with them at this time." After the A53 crash, the driver of the van, and two people from the car, were taken to hospital. Their injuries were not thought to be life-threatening, said the force. Police have appealed for witnesses in both cases, and drivers who may have relevant dashcam footage. Follow BBC Derby on Facebook, external, on X, external, or on Instagram, external. Send your story ideas to eastmidsnews@bbc.co.uk, external or via WhatsApp, external on 0808 100 2210.
