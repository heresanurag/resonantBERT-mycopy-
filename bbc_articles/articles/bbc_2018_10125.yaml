id: bbc_2018_10125
title: Police and council sorry for 'victim-blaming' tweet - BBC News
date: '2018-08-19'
section: Liverpool
url: http://www.bbc.co.uk/news/uk-england-merseyside-45232993
content: |-
  Merseyside Police and Liverpool Council advised women not to become vulnerable to a sex attack.

  The tweet has since been deleted

  Merseyside Police and Liverpool City Council have apologised after tweeting that people should "step in" to prevent women becoming vulnerable to sex assaults on a night out.

  Social media users criticised the post, shared on Friday, for "victim-blaming".

  Jo Wood, from Merseyside Rape and Sexual Abuse centre (RASA), said the tweet should have put the "focus of blame on the rapist".

  Both the police force and council have apologised and deleted the posts.

  The tweets had included a video, which was part of a campaign, encouraging "friends to look after each other on a night out to prevent someone becoming vulnerable or separated from the group", a spokesperson for Citysafe - Liverpool's community safety partnership - said.

  The organisation's statement, shared by the police and council, said: "It was not our intention to blame anyone who has been subject to sexual assault, rape or any other crime."

  The "only person ever responsible" is the rapist, the statement continued.

  "We apologise for not making that clear in our posts on social media."

