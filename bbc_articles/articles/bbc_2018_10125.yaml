  The statement said the video had been based on assaults that had been reported by survivors, where "predatory men have targeted women they perceive to be vulnerable in some way".

  Ms Wood said RASA worked with the campaign, thinking it was a training exercise for door and bar staff.

  However, she said the organisation did not support the message that "if your friends did not stop you going outside, then it's their fault you got raped and if you went outside after you had been drinking, it was your fault that you got raped."

  "What the problem here is that it's not actually putting the focus of blame for what actually happens on the rapist themselves," she said.

  A Citysafe spokesperson said sexual violence support services and students had been consulted.

  "No one consulted felt that the campaign blamed victims, but when viewed in isolation the tweet has been perceived in that way and we are sorry for any distress caused."

