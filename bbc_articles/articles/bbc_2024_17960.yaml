  The three-day festival in Preston features sets from BBC Radio 2 presenters including Sara Cox and Rylan.

  DJ line-up announced for BBC Radio 2 in the Park

  Sara Cox said she was "so excited to be joining our brilliant listeners"

  A host of BBC Radio 2 DJs are set to hit the decks to play sets at BBC Radio 2 in the Park in Preston this September. For the first time, the festival will span three days, opening with a Friday night "pre-party" featuring sets from an array of BBC Radio 2 presenters including Sara Cox, Vernon Kay and Rylan. "Let's start the weekend as we mean to go on," Scott Mills said. "I need everyone dancing - no excuses." The event takes place in Preston's Moor Park from 6-8 September and features headliners The Pet Shop Boys and Sting.

  Vernon Kay will play a Dance Sounds of the 90s set

  The festival will also see performances from the Manic Street Preachers, Sugababes, Craig David, Snow Patrol, Travis and Sister Sledge.
  • None Romesh Ranganathan's For The Love of Hip Hop

  BBC Radio 2 presenters will also be introducing artists on stage and broadcasting live from an on-site studio - which will look out to thousands of revellers on Saturday and Sunday. Some shows and sets will be available live plus on demand on BBC Sounds and BBC iPlayer across the weekend and for 30 days afterwards. Tickets are on sale with some still available.
