title: Woman charged with killing five-year-old in 1978 bath scalding - BBC News
date: '2025-02-20'
section: London
url: http://www.bbc.co.uk/news/articles/c07ze2djrjvo
content: |-
  Janice Nix is accused of manslaughter over the death of five-year-old Andrea Bernard in 1978.

  Janice Nix was charged on Tuesday over a child's death in 1978

  A 66-year-old woman has appeared in court accused of killing a child by scalding her in a hot bath nearly 50 years ago. Janice Nix is charged with manslaughter over the death of five-year-old Andrea Bernard, who was taken to hospital after suffering burns in Thornton Heath, south London, in June 1978. She was transferred to a specialist burns unit in East Grinstead, West Sussex, but died from her injuries in July of the same year, the Met Police said.

  The court heard that on 6 June 1978, Andrea had been forced into a very hot bath which scalded 50% of her body. Ms Nix is also accused of cruelty to Andrea's brother Desmond Bernard between 1 October 1975 and 6 June 1978, when he was aged five to eight. The defendant was aged between 16 and 19 at the time of the alleged incidents. At the short hearing, Ms Nix spoke only to confirm her name, age and address. A Met spokesperson said the force launched an investigation into Andrea's death in September 2022, when the incident was reported by Mr Bernard. Ms Nix was freed on bail with conditions including to surrender her passports and not to travel to any international travel hubs. She is due at Isleworth Crown Court on 19 March.
