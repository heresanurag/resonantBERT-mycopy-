title: 'Greenwich: Missing six-year-old girl found - BBC News'
date: '2024-07-30'
section: London
url: http://www.bbc.co.uk/news/articles/c0kre9vz54ro
content: |-
  Police confirm that a girl who went missing from Greenwich, London, has been found safe and well.

  A six-year-old girl who went missing in London has been found safe and well, police said.

  The girl, named Eudine, had gone missing from the Thamesmead area in Greenwich, south-east London, the Met Police said.

  Police said she was seen alone on CCTV at about midday on Monday and reported missing at 22:40 BST.

  "We are pleased to confirm that Eudine, six, who was reported missing from Thamesmead yesterday has been found safe and well," the force said.
