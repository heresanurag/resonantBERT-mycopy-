title: 'Ballymoney: Brothers Des and Sam Holmes die after crash - BBC News'
date: '2024-10-27'
section: Northern Ireland
url: http://www.bbc.co.uk/news/articles/c7v36p8qq16o
content: |-
  Brothers Des and Sam Holmes were travelling in a car that was involved in a collision with a lorry.

  Brothers Des and Sam Holmes died after the crash on Frosses Road on Friday

  The family of two brothers, who died in a crash in County Antrim have said they are heartbroken over their deaths. Des, 82, and Sam Holmes, 75, were described as "best friends" in a family statement. Police received a report of a two-vehicle collision between a car and a lorry on Frosses Road, Ballymoney, at about 13:10 BST on Friday. The driver of the car died at the scene and the car passenger died in hospital a short time later.

  In their statement, the family described Des Holmes as a proud father, loving husband and devoted grandad. They added Sammy was a much loved dad and grandad. "We are truly grateful to the local community for its support, the emergency responders who did everything they could to save Des and Sam, and the PSNI for their care and compassion," the statement said.

  North Antrim MP Jim Allister, leader of the Traditional Unionist Voice (TUV) party, said the deaths had added "to the tragic toll on this road". "I wish to convey condolences on behalf of myself and the wider community to the families of the two elderly brothers who died," he said. "Once more great grief has been caused by deaths on this section of road adjacent to Ballymoney."

  Councillor Darryl Wilson said the loss of two lives was devastating for the families. "The entire community is shocked and saddened by this," he told BBC News NI. The crash is the latest in a series of collisions on the busy Frosses Road, Wilson said. It was closed for a period of time, has since reopened to traffic. Officers have asked for those with information or footage which could help with enquiries to contact them.
