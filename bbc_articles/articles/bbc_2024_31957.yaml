title: 'Christmas TV: Gavin and Stacey finale tops ratings - BBC News'
date: '2024-12-26'
section: Culture
url: http://www.bbc.co.uk/news/articles/c86wy4ev7g3o
content: |-
  More than 12 million viewers tuned in to watch the finale of Gavin and Stacey on Christmas Day.

  The Gavin and Stacey finale attracted an average of 12.3 million TV viewers - the largest Christmas Day audience in more than a decade, overnight data shows. The new Wallace and Gromit film also attracted a large audience on BBC One, with more than 9 million viewers tuning in to watch the animated duo's latest adventure. Nearly 7 million people watched the King's Christmas message on the BBC, ITV and Sky News. All figures are based on "overnight" TV ratings - which do not include viewers who watch Christmas specials on catch-up services during the rest of the festive period.
  • None Did Smithy say yes to Nessa in Gavin and Stacey special?

  The finale of Gavin and Stacey was the most watched show on Christmas Day since 2008. An average of 14.3 million viewers tuned in to watch Wallace and Gromit in A Matter Of Loaf And Death that year. This year's new Gavin and Stacey episode followed on from an incredible cliffhanger which saw Nessa, played by Ruth Jones, get down on one knee in front of Smithy, played by James Corden, and ask him to marry her. Millions of viewers had been left wondering if he said yes since the previous Christmas special in 2019. The hit BBC sitcom attracted huge viewing numbers that year, with 11.6 million people watching the episode on Christmas Day.

  More than 9 million viewers enjoyed watching Wallace & Gromit: Vengeance Most Fowl

  Charlotte Moore, the BBC's Chief Content Officer, said Jones and Corden created a "magical finale that fans will treasure forever." "Their exquisitely written comedy creation is a show all about family, love and joy and it proved to be the unmissable TV event of the year," she added. This year's viewing figures were a success for the BBC - it was the first time that all 10 most watched Christmas Day shows were screened on BBC One.

  Despite well-loved Coronation Street character Gail Platt bidding farewell after 50 years, the ITV soap failed to make the top 10, attracting 2.41 million viewers in the overnight ratings. However, the programme had been released on ITVX for viewers who wanted to watch the episode earlier in the day, which is likely to have impacted numbers. BBC soap EastEnders split its Christmas Day into two episodes, recording more than 8 million viewers and reaching fifth and eighth in the ratings list. Perennial favourite Call the Midwife came in fourth place. Doctor Who, Strictly Come Dancing's festive edition, the animated film Tiddler and a special of the Weakest Link also featured in the top 10.
