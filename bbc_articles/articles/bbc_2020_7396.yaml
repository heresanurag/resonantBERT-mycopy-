id: bbc_2020_7396
title: Central and southern China hit by heavy flooding - BBC News
date: '2020-07-13'
section: General
url: http://www.bbc.co.uk/news/world-asia-china-53381544
content: |-
  The country's flood response alert has been raised to the second highest level.

  Areas of southern and central China have been hit by heavy flooding, and the country's flood response alert has been raised to the second highest level.

  Levels in Poyang lake have reached a record high, with thousands of soldiers dispatched to shore up its banks.
