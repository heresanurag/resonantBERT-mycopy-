title: Skiers jump from speeding lift in Georgia - BBC News
date: '2024-12-17'
section: General
url: http://www.bbc.co.uk/news/world-europe-43422186
content: |-
  Several people were injured when the out of control lift started going backwards fast, in Georgia.

  Several people were injured when the out of control lift started going backwards fast, at the Gudauri ski resort.

  Some skiers jumped and others were flung from the chairs, which jammed together at the bottom of the slope.
