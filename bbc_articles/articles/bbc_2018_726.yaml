title: Families return to mudslide-hit Montecito - BBC News
date: '2018-01-11'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-42645025
content: |-
  Residents of the hillside community went back to their homes to salvage pets and belongings.

  At least 17 people were killed in the deluge and rescuers are searching the rubble of more than 100 destroyed homes for survivors
