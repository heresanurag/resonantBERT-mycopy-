content: |-
  A murder investigation began after Wenjing Xu, 16, died at a restaurant in Ynyswen on Friday.

  Wenjing Xu died at the Blue Sky Chinese restaurant in Ynyswen on Friday

  Police investigating the murder of a 16-year-old girl in Rhondda Cynon Taf have appealed for dashcam footage.

  A murder investigation began after Wenjing Xu died at the Blue Sky Chinese, in Ynyswen, on Friday.

  Two men, who were seriously hurt, were later arrested and remain in hospital in a stable condition.

  South Wales Police asked motorists who were driving in Baglan Street between 11:50 GMT and 12:15 to check their dashcam footage for any evidence.

  "We have a dedicated team of officers who have been carrying extensive inquiries in the area and I would like to thank all those who have got in touch so far," said Det Ch Insp Mark Lewis, of the force's Major Crimes Investigation Unit.

  "We know that the incident occurred at a very busy time of the day when lots of cars will have driven past the Blue Sky premises which is at the centre of our enquiries, and it is likely that a number of those people will have dash cam footage which may help us."

  Wenjing Xu's family are being supported by officers

  He said officers were continuing to support Wenjing's family, and urged people to avoid fuelling "speculation and rumour" online.

  "We are monitoring open source platforms and anybody who commits offences will be robustly dealt with," added Det Ch Insp Lewis.

  Evidence can submitted through the force's online public portal, it added.

