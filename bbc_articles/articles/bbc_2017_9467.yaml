title: Hunt for man entering Liverpool nursery 'carrying gun' - BBC News
date: '2017-09-27'
section: Liverpool
url: http://www.bbc.co.uk/news/uk-england-merseyside-41414554
content: |-
  Police say the wanted man approached another man inside the nursery before fleeing on a motorbike.

  The man thought to have a gun was believed to have approached another man inside Childsplay Nursery

  Officers are searching for a man who walked into a Liverpool nursery carrying what appeared to be a gun.

  The man went into Childsplay Nursery in Heathfield Road, Wavertree, shortly after 08:10 BST.

  Police said he approached a man in the nursery before fleeing on a motorbike with a second man.

  No-one is reported to have been injured and there was "no suggestion a firearm was discharged", Merseyside Police said.

  Det Ch Insp John Webster said he believed what happened was "targeted" and the two wanted men had been "looking for a man who was in the nursery at the time who was not a member of staff".

  Police have stepped up patrols in the area and are conducting a forensic examination

  He added: "I'm sure the vast majority of people in the community will be appalled to find that two men have walked into a nursery reportedly carrying a firearm when children and their parents were arriving at the start of the day".

  Merseyside Police said officers remained at the nursery and a forensic examination was taking place.

  Police are also making house-to-house inquiries and have appealed for witnesses or anyone with information to contact them.

  Local councillor Andrew Makinson said: "In an area like this it's very unusual, and for it to happen in a nursery, it's utterly shocking for the local community.

  "I'm sure the nursery will be reviewing its security, as will other nurseries across the city. There probably isn't a great deal they can do against these sorts of one-off incidents, but anything they can do, they will be looking at.

  "It's the sort of thing that really does frighten people. It does cause a great deal of concern for people."

