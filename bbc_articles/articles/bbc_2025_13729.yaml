content: |-
  The Londoner was jailed in December for a sexual relationship with a 17-year-old British girl.

  Teen jailed in Dubai over sex with girl makes plea

  Marcus Fakana handed himself in to the authorities in December to begin a one-year jail sentence

  A British teenager jailed in Dubai for having sex with a 17-year-old girl has pleaded with the authorities for clemency. Marcus Fakana, 19, of Tottenham, north London, was sentenced in December to a year's imprisonment after a consensual relationship with the girl, who is also British, while on holiday in the United Arab Emirates (UAE). The age of consent in the UAE is 18. The girl's mother reported Fakana - who was aged 18 at the time - to the UAE authorities after seeing messages between the two when she had returned to the UK. Fakana has written to Sheikh Mohammed bin Rashid Al Maktoum, the ruler of Dubai, from Al Awir Prison asking to be released.

  Radha Stirling, founder of Detained in Dubai said: "This has been the most traumatic and life-altering experience imaginable for Marcus. "He is barely an adult himself, and never intended to break any law. What happened was legal in the UK and consensual. But now he is facing permanent damage to his mental health and future prospects because of it." Detained in Dubai said Fakana was only able to call his family sporadically for short periods, adding that the isolation had been mentally and emotionally devastating for both him and his loved ones. His parents have been urgently appealing to Foreign Secretary David Lammy, the Foreign, Commonwealth and Development Office (FCDO) and the British Embassy in Dubai for assistance in advocating for his release. "If Marcus could go back in time, he would. He has shown remorse and fully respects the laws of the UAE. He only hopes the government will show compassion and allow him to return home to rebuild his life," Ms Stirling added. "He's very young and this is a heart-breaking way to begin adulthood."

  "Parents need to be aware that teens can be charged in the UAE for behaviour that would not be considered criminal at home, whether that's a relationship, social media activity, or even drinking alcohol," Ms Stirling added. Detained in Dubai warned that the case highlighted the need for increased awareness and diplomatic protections for citizens abroad. "Marcus is struggling, and this experience will leave a permanent scar," Ms Stirling said. "We implore Sheikh Mohammed and the government of Dubai to hear his pleas and let him come home." The government of Dubai previously said: "Under UAE law, the girl is legally classified as a minor and, in accordance with procedures recognised internationally, her mother - being the legal guardian - filed the complaint." It added: "Dubai's legal system is committed to protecting the rights of all individuals and ensuring impartial judicial proceedings." An FCDO spokesperson said: "We are supporting a British man in the UAE and are in contact with his family."
