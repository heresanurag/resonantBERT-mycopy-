title: 'Coronavirus: New restrictions across Wales - BBC News'
date: '2020-09-11'
section: Wales
url: http://www.bbc.co.uk/news/live/uk-wales-54108088
content: |-
  How the first minister explained the reasons for new rules on face masks and indoor gatherings.

  Wales' first minister says he's "reluctant" to give a date for when the new restrictions could be lifted.

  Mark Drakeford said the situation will be reviewed and measures will be eased if they are "no longer proportionate to the problem".

  But he stressed: "If it remains necessary it will remain in force and if that does take us to the rest of this year, and regrettably, that is what we will have to do."

  Mr Drakeford added families should still be able to get together over Christmas under the measures announced today.

  "As far as Christmas in Wales is concerned, it's important to just identify another difference between our position and that across our border, which is that the figure of six does not include young children in Wales children under the age of 11 are not included", he said.

  "So family gatherings where children, parents and sometimes grandparents will work together to get together for Christmas will still be allowed in Wales."
