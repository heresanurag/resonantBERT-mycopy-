content: |-
  The Ohio senator spoke on the third day of the Republican National Convention in Milwaukee, Wisconsin.

  Ahead of JD Vance's primetime speech at the Republican convention, the stage became a family affair with Trump's relatives flocking to the mic.

  The ex-president's eldest granddaughter Kai made her first public address before her father Donald Trump Jr spoke at the convention.

  Usha Vance, the wife of Trump's VP pick, introduced JD Vance before his speech which reflected a lot on his upbringing.
