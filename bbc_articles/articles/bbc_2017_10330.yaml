title: Leah Dixon and Jasmine Agnew traced in Falkirk - BBC News
date: '2017-10-14'
section: Glasgow & West Scotland
url: http://www.bbc.co.uk/news/uk-scotland-glasgow-west-41623309
content: |-
  Leah Dixon and Jasmine Agnew were reported missing after failing to return to their homes in Renfrewshire.

  Two schoolgirls who had been reported missing have been found "safe and well".

  Leah Dixon, 14, and Jasmine Agnew, 12, were reported missing on Friday night after failing to return to their homes in Renfrewshire.

  Police said they believed they may have travelled to the Falkirk area. Officers said they had been found there.

  Leah's mother Pauline Dixon appealed on Facebook for help in tracing her daughter.

  Police Scotland thanked the media for their help in tracing the girls.
