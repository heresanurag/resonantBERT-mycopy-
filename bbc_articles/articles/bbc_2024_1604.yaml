title: Donald Trump launches own-brand shoes after $355m fraud fine - BBC News
date: '2024-02-18'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-68329886
content: |-
  The ex-president promoted gold-coloured shoes priced at $399 at a sneaker convention in Philadelphia.

  Former US President Donald Trump has launched his own line of Trump-branded shoes at Sneaker Con - a convention for sneaker fans in Philadelphia.

  His appearance was met with loud boos as well as cheers after he presented a pair of the gold-coloured shoes being sold online for $399.

  His move comes a day after a judge ordered him to pay nearly $355m (£281m) to New York state for lying about the values of his properties.

  Trump is widely expected to be the Republican candidate in November's US presidential election.
