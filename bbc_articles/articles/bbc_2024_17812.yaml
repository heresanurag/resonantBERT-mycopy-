  The Conservatives now have only 121 MPs - the lowest number in the party's history - after losing 251 seats in a Labour landslide. Mr Sunak has vowed to stay on as leader until arrangements for selecting his successor are in place. The timetable for this remains unclear and no Tories have confirmed they will run to replace him yet. Party grandees are expected to meet next week to decide the process by which the party will choose the next leader. Other figures tipped to run include former Home Secretary Suella Braverman, who blamed the Tory defeat on an "idiotic" campaign strategy, external, as well as high taxes and immigration. Speaking to GB News on Sunday, she refused to say whether she would run in the upcoming leadership contest, saying there was no "urgency" to install a new leader as the party had "the luxury of being an opposition". Others mentioned as possible leadership contenders include former ministers Kemi Badenoch, James Cleverly, and Tom Tugendhat. The pool of potential candidates has been reduced by the Tories' disastrous election performance, with mooted contenders Grant Shapps and Penny Mordaunt among 12 cabinet ministers losing their seats. Two-time previous candidate Jeremy Hunt, who served as Mr Sunak's chancellor and narrowly held his seat, is reportedly not thinking of running again.
