content: |-
  After returning from Balmoral, Liz Truss addresses the UK for the first time from Downing Street.

  After returning from Balmoral on Tuesday, Liz Truss addressed the UK for the first time from Downing Street.

  She pledged to get "Britain working again", deal with the energy crisis and make sure people could get GP and NHS services "on a firm footing".
