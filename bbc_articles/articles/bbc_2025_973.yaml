  Couples of all ages renew their vows in a special Valentine's Day ceremony at Coventry Cathedral.

  A total of 80 couples have reaffirmed their love in a mass vow renewal at Coventry Cathedral to celebrate Valentine's Day.

  The event, organised by BBC Radio CWR, also featured a wedding disco and a surprise performance by singer Pixie Lott.

  Couples - some of whom have only been married for a year, others together for decades - simultaneously re-pledged their love on Friday, as family members watched on.

