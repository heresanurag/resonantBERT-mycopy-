  Film maker who is just 22 has created documentary about the impact of knife crime on families.

  New knife crime film to be shown to schoolchildren

  A still from Sam Teale's new film about the dangers of knife crime

  A new film based on the true stories of knife crime victims in West Yorkshire has been released to raise awareness of the dangers of carrying blades. Award-winning film maker Sam Teale's latest production, Knives Claim Lives, is inspired by families in Kirklees whose lives have been ruined by violence. The project secured funding from Safer Kirklees and the West Yorkshire Violence Reduction Partnership and will be shown to schoolchildren. Mr Teale said he originally planned to make a documentary, but settled on a drama after meeting people who had been affected by knife crime.

  Mr Teale told the BBC: "A few years ago I met with some incredible people who have been impacted by knife crime. They shared their stories and I left the room feeling totally in awe of their strength. "Hopefully, it can make children think a little bit differently when it comes to carrying knives."

  The film was originally intended to be a documentary

  The film tells the story of two friends, external after one is led down a path towards crime due to the influence of a family member. The script explores the impact of the issue on individuals, families and entire communities. Mr Teale said he hoped audiences could "relate" to the characters and situations, and that the subject matter would resonate with young people.

  The film maker himself is only 22 and said he worked with a "young and passionate" team at his production company. "Many of us have heard at first hand stories about the devastating effects of knife crime. "Being able to use our talents to make a positive impact is incredibly rewarding. "We are truly honoured to have received the support needed to bring this important idea to life."

  The project has been backed by West Yorkshire's elected mayor, Tracy Brabin, who said she was also keen to support the region's creative sector. She added: “This short film is a great example of how our local talent can help influence children and young people on themes such as knife crime and prevent them from becoming involved. “Addressing serious violence sits at the heart of our plans for a safer, fairer West Yorkshire and we want people to have their say on that as part of the ongoing consultation.” Listen to highlights from West Yorkshire on BBC Sounds, catch up with the latest episode of Look North or tell us a story you think we should be covering here, external.
