content: |-
  Marcel Ciolacu told his colleagues their government had no credibility after presidential elections.

  Romanian PM resigns and pulls out of coalition after nationalist vote win

  Marcel Ciolacu's government has only been in power for a matter of months

  Romanian Prime Minister Marcel Ciolacu has resigned and his Social Democrat party is to leave the government after a right-wing nationalist candidate won the first round of the presidential election. George Simion, a eurosceptic who has promised to put Romania first, won 40.9% of Sunday's vote and is expected to win a run-off vote on 18 May. He will face liberal Bucharest Mayor Nicușor Dan, who narrowly defeated the Social Democrat (PSD) candidate. Sunday's result plunged Romania - an EU state on Nato's eastern flank - into further political turmoil. Ciolacu told colleagues that as their coalition had failed to meet its objective and "has no legitimacy", they should pull out of the government.

  Ciolacu, 57, only came to power in a pro-EU coalition after elections in 2024, although George Simion's far-right party along with two other groupings had attracted a third of the vote. The parties in that coalition had been holding emergency meetings on Monday to decide on their next steps. Simion's victory on Sunday was largely driven by popular frustration at the annulment of presidential elections late last year. His likely success on 18 May is awaited nervously in European capitals, as well as in Kyiv. He has said he wants an EU of strong, sovereign nations and his party has opposed supply weapons to Ukraine. Ciolacu submitted his resignation to interim president Ilie Bolojan on Monday evening. Bolojan appointed Ciolacu's liberal coalition partner Catalin Predoiu as caretaker prime minister on Tuesday to lead the government until a new cabinet could be formed. Bolojan himself took on the role of interim president last February because of the scandal surrounding the annulment of the presidential vote. "Romania faces up to 45 days of political instability following Marcel Ciolacu's resignation," warned Elena Calistru of independent Romanian monitoring group Funky Citizens. "This creates a dangerous power vacuum precisely when Romania needs steady leadership most."

  Ciolacu's party was part of a three-party coalition and the prime minister told his colleagues they had come together with the aim of having a joint presidential candidate and a parliamentary majority. "One of these two objectives has failed," he explained. "I've seen the vote from yesterday, and that tells us the current coalition no longer has legitimacy in this form." "In any case, the new president would have replaced me – that's what I've seen and heard from the media. A new coalition will form to govern." Meanwhile, the Social Democrat mayor of of Buzau, to the north-east of Bucharest, was highly critical of his party leaders: "We've embarrassed ourselves, and that's partly because of poor decisions taken over time by the leadership."

