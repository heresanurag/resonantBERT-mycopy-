  George Simion, 38, has cast himself as an admirer of US President Donald Trump. He became presidential frontrunner earlier this year when far-right pro-Russian candidate Calin Georgescu was barred from running Georgescu had won last November's first round, which was annulled by the courts after allegations of Russian interference on social media and campaign fraud. Simion cast his vote on Sunday alongside Georgescu, having told voters the election was "about every Romanian who has been lied to, ignored, humiliated, and still has the strength to believe and defend our identity and rights". He has called for restoring Romania's old borders and has been banned from entering Moldova and Ukraine. Political analyst Radu Albu-Comanescu told Romania public radio that Sunday's result was "a radical manifestation of hostility towards the current political establishment". Simion did particularly well with Romania's diaspora voters, polling more than 73% in Spain and almost 65% in the UK among a broadly blue-collar electorate. Public resentment at Romanian financial support for Ukrainian refugees has been a central plank in Simion's campaign, though he denies he is pro-Russian. "Russia is the biggest danger towards Romania, Poland and the Baltic states, the problem is this war is not going anywhere," he told the BBC. Elena Calistru said Romania was witnessing a remarkable political reset as both Simion and Nicușor Dan had positioned themselves as anti-establishment candidates with wildly different solutions. "The outcome will reveal whether anti-establishment sentiment necessarily translates to anti-European positioning, or if Romania can channel its desire for change into constructive democratic renewal," she told the BBC.
