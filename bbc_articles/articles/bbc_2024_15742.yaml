  Microsoft has also said that several reboots may be required, with some users reporting that as many as 15 could be needed before the problem is fixed. Also, tech experts say CrowdStrike's fix will have to be applied separately to each and every device affected. Questions are likely now to be raised about CrowdStrike's influence as one of the largest operators in the cyber-security market and the wisdom of having such a crucial part of the industry controlled by just a small number of companies. CrowdStrike's shares fell by around 12% on Friday, at the expense of rivals SentinelOne and Palo Alto Networks. The problems were first noticed in Australia, and possibly felt most severely in the air travel industry. Airports saw delays, with long queues as flights were cancelled or delayed, aircraft grounded and passengers stranded. Some saw extra staff drafted in to check in passengers manually. By 18:00 GMT, aviation data from Cirium suggested that more than 4,000 flights - or 3.9% of the total - had been cancelled so far on Friday, though the figure may also include flights cancelled for other reasons. Payment systems, banking and healthcare providers around the world were affected. It is thought the outage may also have a longer term effect as companies struggle to pay wages to staff, particularly where payments are made on a weekly basis. Some railway companies warned of delays, and broadcasters Sky News and ABC Australia both experienced outages.

