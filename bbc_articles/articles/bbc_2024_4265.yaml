content: |-
  Two horses part-owned by Manchester United boss Sir Alex Ferguson win at the Cheltenham Festival before Harry Redknapp enjoys a victory too.

  Sir Alex Ferguson, with Monmiral, had a day to remember

  Coverage: Commentaries on BBC Radio 5 Sports Extra, with feature races on BBC Radio 5 Live. Racecards, live text, results & reports on the BBC Sport website and app.

  Former football bosses Sir Alex Ferguson and Harry Redknapp both saw their horses win at the Cheltenham Festival on Thursday. Monmiral, trained by Paul Nicholls, gave the part-owner a first win at the meeting and it was followed by Ryanair Chase victor Protektorat. Then Shakem Up'Arry, owned by a delighted Redknapp, triumphed for trainer Ben Pauling. Protektorat beat 2023 winner Envoi Allen to seal a Thursday double for trainer Dan Skelton and his jockey brother Harry, who earlier took the Turner Novices' Chase with Grey Dawning. "I've waited 20 years and now had two winners in 40 minutes," said Ferguson. Favourite Teahupoo, ridden by Jack Kennedy, won the Stayers' Hurdle to give trainer Gordon Elliott his first win of the week. The seven-year-old held off the 2021 and 2022 winner Flooring Porter, with Home By The Lee in third.

  Ferguson has been a long-standing racing fan and owner and finally realised his ambition of a Festival winner - not once, but twice. "It's unbelievable, isn't it? It's a special place. This is like the Derby or the FA Cup final," said the 82-year-old after 17-2 shot Protektorat followed 25-1 chance Monmiral's victory in the Pertemps Hurdle. "Of course it's not the same as winning at football, that was my life, I was immersed in that, this is what I do for pleasure so it's a different feeling. I don't have to worry about it, I leave that to the trainer." He is one of four owners of both horses, alongside Ged Mason and John and Lisa Hales. Ferguson celebrated the first victory with another former football boss, Sam Allardyce, and ex-United captain Bryan Robson was among those to offer congratulations. "He used to ban me from going to Haydock races after training but he has done a U-turn and is worse than me now," Robson told BBC Radio 5 Sports Extra. "They have had a lot of runners over the years and had some close calls but today the horses have done him justice."

  Ferguson jumped for joy but tempered his celebrations having broken a rib, external when saluting his win with Spirit Dancer in Bahrain last year. Protektorat was providing the Skeltons with their fourth victory of the week following a Wednesday double with Langer Dan and Unexpected Party. It was among five British-trained winners to stem the tide of Irish triumphs led by dominant trainer Willie Mullins. "It's remarkable how things are going, I'm very proud of the whole team," said Skelton.

  Redknapp joked: "My wife Sandra thinks I only have one horse, she doesn't know about the other 25"

  Former Tottenham and West Ham manager Redknapp was the next to taste victory when Shakem Up'Arry won the Trustatrader Plate. The horse was named after a spectator who offered advice when he was in charge at the Hammers. "I used to have a guy stand behind me at West Ham when I was manager," said Redknapp. "For 90 minutes, he'd shout right behind my dugout: 'Shake 'em up, 'Arry, shake 'em up, 'Arry.'" Redknapp was shook up and overjoyed after his horse won at odds of 8-1 under Ben Jones. "Oh my God, get in there! How good was that? He jumped for fun. What a performance," he said. "My nan got me into racing, she was a bookie's runner back in the day. She'd get locked up in Poplar Police Station in the East End of London, because it was illegal in those days. "I love the horses, I love the Festival, I love the people. It means so much."

  There was much talk of Irish domination going into the third day, as they led the home team by 10 victories to three, largely thanks to six triumphs for Willie Mullins. But the score was pegged back to 12-8, with Inothewayurthinkin a second Irish winner in the Fulke Walwyn Kim Muir Chase after Elliott's Stayers' Hurdle success. Derek O'Connor guided the 13-8 favourite to an eight-length victory for Gavin Cromwell and owner JP McManus. The fifth British victory of the day came courtesy of Golden Ace under Lorcan Williams to give Somerset trainer Jeremy Scott his first Festival success. Golden Ace, a relatively cheap purchase at £12,000, beat Irish hotpots Brighterdaysahead and Jade De Grugy in the Ryanair Mares' Novices' Hurdle. And Cheltenham said a fond farewell to Paisley Park, the 2019 Stayers' Hurdle winner who was retired after finishing 10th in his sixth appearance in the race. Paisley Park, named after the late singer Prince's home and recording studio, won 11 of his 31 races for trainer Emma Lavelle and owner Andrew Gemell, who has been blind since birth. "I don't know what is next for him, Andrew would like to keep him in his garden," said Lavelle.

