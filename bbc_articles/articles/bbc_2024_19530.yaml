title: Kiernan Hughes-Mason left toddler with brain damage, court rules - BBC News
date: '2024-08-22'
section: Essex
url: http://www.bbc.co.uk/news/articles/c7v5l0vdpnyo
content: |-
  The two-year-old girl needs 24-hour care following the attack and has severe brain injuries.

  Kiernan Hughes-Mason has been convicted after a toddler was left with life-changing brain injuries

  A former footballer has been convicted of violently assaulting a two-year-old girl who has been left with life-changing brain injuries. Kiernan Hughes-Mason was found guilty of causing grievous bodily harm with intent and child cruelty after the girl was found with serious injuries at an address in Westcliff-on-Sea in January 2020. The 32-year-old had been managing Enfield Borough Football Club before being sacked following Wednesday’s conviction. Det Sgt Ellie Nudd, from Essex Police, said: "This little girl will never recover from the injuries she sustained from this violent attack."

  Hughes-Mason was looking after the girl who was two years old at the time of the attack. In the days leading up to the incident, he sent messages to friends stating how angry caring for the girl made him, saying "she’s actually getting on my nerves", and "I’m gonna hit her". He called paramedics to the address after claiming to have heard a loud bang from her bedroom, Basildon Crown Court heard. The defendant said the girl had fallen on a doll's house which left her unconscious. The East of England Ambulance Service took her to Southend General Hospital, where she was placed in an induced coma because her injuries were so severe, police said. Doctors identified 17 different injuries on her legs, back, face and chest that could have occurred between October 2019 and the assault which took place in January 2020, the court heard. She remained in a coma for two weeks and suffered life-changing brain injuries which means she now needs 24-hour care. Experts told the court that the child's injuries were consistent with having been "vigorously shaken... with her head likely being hit against a hard surface".

  Following his conviction, Enfield Borough FC released a statement saying it had decided to "relieve" him from his duties as manager. "Enfield Borough FC is committed to maintaining the highest standards of integrity and accountability, and we believe that this action is necessary to uphold these values," the club added. Hughes-Mason began a 15-year playing career at Millwall and later played for Hashtag United in Aveley in Essex. Hashtag United released a statement, external saying the news was "deeply shocking" and the crimes were "frankly sickening". "We can categorically say that the club had no knowledge whatsoever of these events until today," it said. "Some serious flaws have been exposed in procedures as we'd received confirmation from the relevant authorities that he was clear to coach as part of standard background checks." Det Sgt Ellie Nudd added: "The doctors were clear about the extent of the injuries – they were equivalent to a high-speed crash, and would have to be the result of a violent assault. "Hughes-Mason refused to admit what he had done and subjected the family of this little girl to weeks of details of the injuries he allowed or inflicted." Hughes-Mason is set to be sentenced on 10 September at Basildon Crown Court.

