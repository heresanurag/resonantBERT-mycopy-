content: |-
  Campbell Scott was attending a conference in Nairobi when he was last seen on 16 February.

  Campbell Scott was last seen by his colleagues on 16 February

  A Scottish businessman who disappeared in Kenya has been found dead. Campbell Scott, from Fife, was attending a conference at the JW Marriott Hotel in Nairobi when he was last seen by colleagues on 16 February. The 58-year-old was a senior director at credit scoring firm Fico. His employer confirmed to the BBC on Monday that local police had identified his body. A spokeswoman for the firm said staff were "devastated" by the news.

  She added: "Campbell was a leader in our international Scores business. "He joined FICO in 2014 and was instrumental in introducing Scores to new markets and growing our business with existing partnerships. We mourn his passing and will miss his humour and kindness. "Our thoughts are with Campbell's family and friends. We ask that the media respect their privacy."

  Campbell Scott was staying at the JW Marriott in an affluent district of Nairobi, Kenya

  Mr Scott studied at Woodmill High School in Dunfermline and Kirkcaldy Technical College, going on to work for a number of companies before joining Fico. The JW Marriott hotel is located in the Nairobi's Westlands district, an affluent business area. Police launched a search following his disappearance and were assisted by Interpol, according to newspaper reports. The UK Foreign Office has been approached for comment.
