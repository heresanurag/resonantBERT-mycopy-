id: bbc_2019_6775
title: Man, 23, dies at Gower Beer Festival, Llanrhidian - BBC News
date: '2019-06-22'
section: Wales
url: http://www.bbc.co.uk/news/uk-wales-48729703
content: |-
  Police say they were called to reports of a medical emergency at the Gower Beer festival.

  Gower Beer Festival is being held at Weobley Castle Farm

  A man has died at a beer festival on the Gower peninsula.

  South Wales Police said it was called to Weobley Castle Farm, Llanrhidian at about 18:35 BST on Friday where the Gower Beer Festival was taking place.

  The force said it was called to reports of a "medical emergency" but despite efforts to save the 23-year-old, he died at the scene.

  His death is not being treated as suspicious and the coroner and his next of kin have been informed.

  "We were really fortunate to have first responders from [first aiders] Cariad on the scene who tried to help but unfortunately a young man died.

  "There's a real sombre atmosphere here now."

