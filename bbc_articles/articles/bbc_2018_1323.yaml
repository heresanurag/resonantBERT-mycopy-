title: North Korea shows off icy replica of Hwasong-15 missile - BBC News
date: '2018-01-02'
section: General
url: http://www.bbc.co.uk/news/world-asia-42538713
content: |-
  A replica of North Korea's long-range missile Hwasong-15 was the star of Pyongyang's ice festival.

  A frozen replica of North Korea's long-range missile Hwasong-15 was the star of an ice sculpture festival in Pyongyang.

  North Korean state television released this footage of the festival, which was held as part of new year festivities.

  It came as leader Kim Jong-un warned that a nuclear launch button was "always on my table" in a new year speech.
