title: 'Colin Gibb: Black Lace singer and Eurovision entrant dies aged 70 - BBC News'
date: '2024-06-03'
section: Culture
url: http://www.bbc.co.uk/news/articles/c0ddlwj4y7vo
content: |-
  The pop band were best known for the 1984 hit Agadoo and also represented the UK at Eurovision.

  Colin Gibb (left) with fellow Black Lace member Alan Barton, who died in 1995

  Colin Gibb, the longest-standing member of pop band Black Lace, has died at the age of 70. The group were best known for their 1984 novelty hit Agadoo, which reached number two in the UK. Black Lace also represented the UK at the Eurovision Song Contest in 1979, finishing in seventh place with the song Mary Ann. Gibb's bandmate Dene Michael confirmed his death to the BBC, describing it as "awful news". Michael also posted a tribute on Twitter, external with a picture of himself and Gibb, writing: "Rest in peace my friend, God bless you x." In a Facebook post, Gibb’s wife Sue Kelly said, external it was "heartbreaking" to tell fans her "dearest husband" had died. "I love you Colin, [we] spent 22 years living your Agadoo dream, we were due to retire to Spain on Thursday, you were so happy, so looking forward to our new life, now you’re gone. "As we used to say, always love you forever."

  Black Lace came seventh out of 19 countries at Eurovision in 1979

  Black Lace were also known for songs such as Do the Conga, Superman, Hokey Cokey, Wig-Wam Bam and I Am the Music Man. But Agadoo was their biggest success, selling more than a million copies worldwide and becoming a staple of school discos and wedding parties. The band underwent several line-up changes over the years, and Gibb himself occasionally took breaks from performing with the group. But cumulatively, Gibb spent more time in the band than any other member, his time with the group spanning several decades. A statement from the group's management Now Music to the PA news agency said: "Unfortunately Colin passed away unexpectedly yesterday afternoon. "He'd recently announced his departure from the entertainment industry and was looking forward to enjoying his retirement with his with wife Susan. "We are all deeply shocked and saddened by the news. Colin was the founder member of Black Lace, together with Alan Barton and they had huge hits through the 80s. "Colin was a great friend and will be sadly missed." Last month, Gibb wrote on Facebook, external of his plans to retire, telling fans: "All good things must come to an end." He said his final show would be that same week, at a beach hotel in Tenerife. "Thanks to all of you that have supported Black Lace over the years, and the thousands of friends I have met during that time, since we set out in 1975," he said. The official Black Lace account said Gibb would be "truly missed by everyone who knew him".
