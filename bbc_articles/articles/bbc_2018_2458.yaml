title: Do male strip dancers feel objectified? - BBC News
date: '2018-02-20'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-43120177
content: |-
  Where does the #MeToo movement leave male strip dancers? Newsnight's Emily Maitlis finds out.

  ITV's Piers Morgan told the BBC's Emily Maitlis that the #MeToo movement had double standards, and suggested she see "how women behave when they're at the Chippendales show."
