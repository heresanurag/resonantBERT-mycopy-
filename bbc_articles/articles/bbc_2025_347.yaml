title: Statue worth £60k stolen from artist Anne Curry's Arkesden home - BBC News
date: '2025-01-05'
section: Culture
url: http://www.bbc.co.uk/news/articles/cgrwv8gz449o
content: |-
  Essex Police says it is pursuing a number of targeted lines of inquiry.

  The work by Anne Curry showed the seed pod of Iris Foetidissima, the artist's webite said

  A bronze sculpture valued at about £60,000 has been stolen from the home of the world-renowned artist who created it. Essex Police said the work, called La Promesse, was taken from Anne Curry Sculpture, at Newland End, Arkesden, near Saffron Walden, between 5 and 6 December. It has a manufacturing value of about £20,000 and a sale price of about £60,000. The large work of art, 1.57m (5ft) high, 1.25m (4ft) wide and 1.55m (5ft) long, is signed by the artist and was designed to be placed in a canal or pond, the artist's website said.

  The force said no arrests had been made and that it was pursuing a number of targeted lines of inquiry. PC Glenn Simons, who is investigating, said: "I do not underestimate the impact this theft has had on the victim, and we will work determinedly to pursue all reasonable lines of inquiry." He urged anyone with information to come forward.

