  One X user, @Sianz, wrote: "Dear @SportsDirectUK can you maybe spell Cymru correctly". While @PaddyMOliver mentioned the sports retailer and asked for a recall of the incorrectly spelt hat. "@SportsDirectUK no such country as Cyrmu... time for a recall I reckon..."

