title: Piccadilly Circus lights turned off for site renovations - BBC News
date: '2017-01-16'
section: London
url: http://www.bbc.co.uk/news/uk-england-london-38610332
content: |-
  The lights of Piccadilly Circus are switched off for the longest period since World War Two.

  The iconic billboard lights at Piccadilly Circus have been switched off for renovations and will stay off until autumn.

  The billboard, which has displayed electrical advertisements for more than a century, went dark at 08:30 GMT for work to take place.

  It is the first time since World War Two the lights have gone off, except for power cuts and special events.

