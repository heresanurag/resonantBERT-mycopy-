  • None Is Ricky Gorman the next Tyson Fury? However, Fury then said he would not sign any deal that included a rematch clause - leading to a conference call on Sunday morning between all parties. Warren said "six or seven" outstanding issues were ironed out and he had managed to convince Fury to accept a rematch. The WBC champion agreed and the call ended with Team Fury optimistically preparing an official statement to announce the fight. Warren teased on Twitter on Sunday that news was imminent, but the two sides again clashed over the proposed terms of a rematch. According to Warren, Fury was against an immediate rematch in part as he did not want to be tied into two fights against Usyk as he was with Deontay Wilder, which meant he could not fight British rival Anthony Joshua. The purse splits for a proposed rematch appear, however, to be the key unresolved issue to unlocking Fury v Usyk. 'Why are we even talking about rematches?' Usyk, the WBA (Super), IBF, WBO and Ring magazine champion, would like a proposed rematch to happen in November or December, but there are fears among Team Fury that the four belts would have fractured by then. WBC president Mauricio Sulaiman contacted the Fury camp on Wednesday to say the governing body could not guarantee its support for an immediate rematch. Usyk, 36, wants a rematch clause like the one Joshua activated when they fought in 2021. The Briton was given the chance to immediately regain the titles and Usyk would want the same opportunity if he was beaten by Fury. But if the Ukrainian overcame Fury in their first fight, he would also expect an improved purse split in a rematch. There has not been an undisputed heavyweight champion since 1999 when Lennox Lewis beat Evander Holyfield - and never been one in the four-belt era.
