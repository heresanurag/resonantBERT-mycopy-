  West Bengal Chief Minister Mamata Banerjee called the attack a "heinous act" and a shame on democracy.

  The Students Federation of India said it would stage rallies in Delhi on Monday in protest at the "barbaric attack" at the JNU.

  A police spokesman said university authorities had asked for their assistance.

  "We were informed that there was a clash between two groups of students," a statement said.

  "After we received written request from the JNU administration, we entered the campus and restored peace."
