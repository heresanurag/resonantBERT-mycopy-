content: |-
  President Donald Trump was among the world leaders attending D-Day commemorations in Portsmouth.

  An actor read out an extract from the journal of Royal Navy electrician R G Watts as he left Southampton for Normandy in June 1944: "The troop landing craft was packed to full capacity. There was no cover for the Army, just standing or sitting, exposed to the elements"
