title: Donald Trump denies rape accusation by E Jean Carroll - BBC News
date: '2023-05-09'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-65505189
content: |-
  The former president says that, although politically incorrect, his accuser is "not his type".

  Former President Donald Trump has said in his deposition that he did not rape E Jean Carroll. He repeatedly denies Ms Carroll's allegations by claiming she is "not my type".
