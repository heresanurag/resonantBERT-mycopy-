id: bbc_2017_2534
title: CCTV captures moment slurry tank crashes through garden wall - BBC News
date: '2017-02-11'
section: General
url: http://www.bbc.co.uk/news/uk-northern-ireland-38938615
content: |-
  CCTV shows the dramatic moment a slurry tank crashes through the garden wall of a house in County Antrim.

  It missed the house itself, in Glenavy, by less than a metre.

  The homeowner, who was in the property at the time, said he was just glad no-one had been hurt.

  The Belfast Road was closed for a time while the car, tractor and slurry tank involved in the crash were removed.

  Oil also had to be cleaned up - but the road has reopened.

  The homeowner said he now wants a reinforced wall to protect his family home.
