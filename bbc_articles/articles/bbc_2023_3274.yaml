content: |-
  Behind the courtly air of a country lawyer born to power and privilege, lurked a cold-blooded killer.

  The heir to a powerful southern legal dynasty has been convicted of murdering his wife and son.

  What we know about the disgraced lawyer from police body cam footage to courtroom testimony.
