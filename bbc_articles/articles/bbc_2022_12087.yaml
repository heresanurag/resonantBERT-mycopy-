  Laura Kuenssberg interviews Liz Truss, Rishi Sunak and Ukraine’s first lady Olena Zelenska

  Laura Kuenssberg speaks to Conservative leadership candidates Liz Truss and Rishi Sunak, and hears from Ukraine’s first lady Olena Zelenska. On the panel with Laura are Labour frontbencher Emily Thornberry, comedian Joe Lycett and former No 10 deputy chief of staff Cleo Watson.
