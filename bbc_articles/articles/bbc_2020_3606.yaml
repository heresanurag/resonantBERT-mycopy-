  Bringing you the latest news from across England about the coronavirus pandemic.

  A five-year-old girl has raised hundreds of pounds for a children's hospice by "climbing" one of Yorkshire's tallest peaks, using a step ladder.

  Esther Windass from York scaled the equivalent 2,277 ft (694 m) - the height of Pen-y-ghent - outside her home to raise money for the Martin House hospice.

  Unlike some similar climbing feats completed indoors with people trudging up and down stairs, Esther has had to get creative as she lives in a bungalow.

  Her mum Sarah Windass said: "She's quite tired this morning - she's had quite a big lie in."

  Esther climbed the ladder 456 times and has raised more than £400 for the charity.
