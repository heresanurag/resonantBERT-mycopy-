id: bbc_2019_6602
title: 'Jo Brand acid joke: BBC edits out remark from catch-up service - BBC News'
date: '2019-06-13'
section: Entertainment & Arts
url: http://www.bbc.co.uk/news/entertainment-arts-48628007
content: |-
  The broadcaster says it regrets any offence caused by the remark about throwing acid at Nigel Farage.

  The BBC said it regretted "any offence we have caused"

  The BBC has removed a Jo Brand joke about throwing acid from its catch-up service after it was suggested that it condoned violence.

  The comedian made the joke during a broadcast of Radio 4 satirical show Heresy on Tuesday night.

  She was accused by Brexit Party leader Nigel Farage, who has had milkshakes thrown at him by protesters, of "inciting violence".

  In a statement, the BBC said it regretted "any offence we have caused".

  In the episode, Brand told presenter Victoria Coren Mitchell that people who attacked Mr Farage and far-right political figures with milkshakes were "pathetic".

  Appearing later at Henley Literary Festival, Brand said: "Looking back on it I think it was a somewhat crass and an ill-judged joke," according to the Henley Herald.

  She added: "Nigel Farage tweeted the first bit that I said without the second bit when I apologised and said it was a joke and not something I would encourage.

  "The current situation is I'm being chased around England and being asked if I feel I should apologise. I felt I apologised for it as I did it on the night. I'm a human being and people make mistakes. I apologise to all the people who I have offended."

  The Sun added that she said: "I don't think it's a mistake. If you think it is I'm happy to accept that.

  "Female politicians and public figures are threatened day in, day out, with far worse things than battery acid... rape, murder and what have you.

  "At least I'm here and trying to explain what I did. I don't think I have anyone to answer to. Nigel Farage wasn't even mentioned by me on the night so why he has taken it upon himself I don't know."

  Mr Farage has been targeted by protesters

  Prime Minister Theresa May's spokesman had said the BBC should explain why the joke was "appropriate content" for broadcast.

  The Metropolitan Police has also confirmed it has "received an allegation of incitement to violence that was reported to the MPS on 13 June".

  A BBC statement released on Wednesday said panellists on Heresy - a long-running comedy programme - often said things which were "deliberately provocative and go against societal norms but are not intended to be taken seriously."

  But on Thursday, the broadcaster said: "We carefully considered the programme before broadcast. It was never intended to encourage or condone violence, and it does not do so, but we have noted the strong reaction to it. Comedy will always push boundaries and will continue to do so, but on this occasion we have decided to edit the programme. We regret any offence we have caused."

  The prime minister's spokesman said Mrs May has been clear that politicians should be able to go about their work and campaign without harassment, intimidation or abuse.

  Speaking about the comments on his LBC show on Thursday, Mr Farage said: "This sort of behaviour is completely and utterly disgusting.

  "Could you imagine if I was to tell a story like that about somebody on the other side," he added.

  "The police would be knocking on my door within 10 minutes."

  The Sun newspaper said Brand had refused to apologise for the comment after confronting her at her London home earlier.

  She is reported to have added: "I think if they [critics] want an answer there have been plenty of explanations by the BBC and Victoria Coren."

  When asked if she would continue working with the BBC, she is reported to have replied: "I'm not employed by the BBC, so how can they sack me?"

