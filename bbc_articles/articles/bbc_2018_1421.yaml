title: 'Winter Olympics: Marit Bjorgen ties medal record as Norway win women''s 4x5km
  relay - BBC Sport'
date: '2018-02-17'
section: Winter Olympics
url: http://www.bbc.co.uk/sport/winter-olympics/42981026
content: |-
  Marit Bjorgen becomes the joint most decorated Winter Olympian of all time after leading Norway to victory in the women's 4x5km relay.

  Norway have won the women's 4 x 5km relay at the last two World Championships

  Marit Bjorgen has become the joint most decorated Winter Olympian of all time by leading Norway to victory in the women's 4x5km relay. Bjorgen, 37, battled it out with Sweden's Stina Nilsson over the final leg before winning by just two seconds - in a time of 51 minutes 24.3 seconds. It was Bjorgen's third medal at these Games and she now has 13 overall, level with compatriot Ole Einar Bjorndalen. The Olympic Athletes from Russia (OAR) quartet took bronze ahead of Finland. Norway, Sweden and Finland have finished as the top three in the past two World Championships - in that order - but Team OAR broke up their dominance by finishing third, 43.3 seconds behind Norway.

  In the 4x5km relay, each team comprises four athletes who ski two legs in the classic style, followed by two in the freestyle technique. Charlotte Kalla clinched gold for Sweden ahead of Germany and Finland in a dramatic finish at Sochi 2014 and, like Bjorgen, she came into this event having already won two medals in Pyeongchang. This time, Kalla skied the second leg, dragging Sweden back into medal contention at the halfway point. They trailed OAR by 1.7secs, with Norway 29.8secs behind in fourth. Ragnhild Haga, who won the 10km freestyle gold, then hauled Norway back into it during the third leg - before Bjorgen anchored them to victory, claiming her seventh Olympic gold. Bjorndalen won eight golds in biathlon, but Bjorgen has become the most successful cross-country skier in Olympic history. She can now surpass Bjorndalen and go clear as the most decorated Winter Olympian of all time when she skies in the 30km classical event on Sunday, 25 February.

