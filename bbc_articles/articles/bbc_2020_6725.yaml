title: Queues and social distancing as shops reopen in England - BBC News
date: '2020-06-15'
section: In Pictures
url: http://www.bbc.co.uk/news/in-pictures-53053236
content: |-
  Non-essential retailers open their doors with strict safety measures.

  As lockdown measures are relaxed across England on Monday, high street shops have reopened with safety measures in place, including plastic screens at the tills and floor markings for social distancing.

  Some shoppers took protective precautions to stop the spread of Covid-19

  A shop worker prepares to serve customers from behind a screen in a sweet shop in York

  Some chose to wear face shields, like this florist in York

  A customer enters a Brighton gift shop - which has face coverings on display

  Shoppers get excited as they queue to enter a Primark store in Brighton

  In Southampton, shoppers mill around the high street

  Customers in Loughborough - next to a sign reminding them to stay safe

  Monday also marked the day that zoos in England were allowed to open

  Customers follow barriers to safely social distance outside the Potteries Shopping Centre in Stoke-on-Trent
