title: India to launch 104 satellites in single space mission - BBC News
date: '2017-02-14'
section: General
url: http://www.bbc.co.uk/news/world-asia-38959676
content: |-
  India is set to launch a record 104 satellites into space in a single mission.

  India is set to launch a record 104 satellites into space in a single mission on 15 February.

  Although there is no direct space rivalry between China and India some analysts have compared it to the US-Soviet "space race".

