  The actors who play Ian, Cindy, Tracey and Alfie glance back through 40 years of TV history.

  EastEnders has seen its fair share of dramatic twists and cliffhangers over its 40 years on air.

  We caught up with the actors who play Ian, Cindy, Tracey and Alfie to ask them about their most defining moments from the show's history.

  More on the EastEnders anniversary here.
