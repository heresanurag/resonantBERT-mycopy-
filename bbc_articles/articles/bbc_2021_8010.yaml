title: Heatwave reveals World War Two plane propeller in Snowdonia - BBC News
date: '2021-07-21'
section: General
url: http://www.bbc.co.uk/news/uk-wales-57921985
content: |-
  The four people on the plane were killed in the crash in 1944.

  A propeller from a plane that crashed into a Snowdonia lake 76 years ago has been seen following a week of hot weather.

  In 1944, a US Air Force Dakota aircraft crashed, killing its four passengers.

  The recent high temperatures mean the propeller is visible at Llyn Dulyn.
