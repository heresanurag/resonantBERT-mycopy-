title: Criticism after Thornaby FC drops women's team - BBC News
date: '2024-06-10'
section: Tees
url: http://www.bbc.co.uk/news/articles/cevv80k0grno
content: |-
  Lioness Beth Mead is among those who condemn the club's decision to disband its female teams.

  Thornaby FC Women's manager said players and coaches could not return to the club for their end of season presentation evening

  A football club has come under fire after it dropped its entire women's section. Thornaby FC's committee announced on Sunday it had voted to continue without its female teams, leaving 100 players without a club. It said its future was in doubt after a "difficult year" and progressing without the women was the only way to continue. First team manager Abbey Lyle said players had been "floored" by the decision, while England player Beth Mead said she was "disgusted". Board member Philip Genery, who voted against the decision along with chairman Garry Morris, told the BBC six other board members had now stepped down and a new "more diverse" board would be established, including representatives from the women's team.

  Lioness Mead, who grew up near Whitby, North Yorkshire, was among those to offer support. "The women's game is on the up but we still have committees making these horrible decisions," she wrote on X, formerly Twitter, external. "It's not good enough, these women deserve better."

  Lioness Beth Mead said she was "disgusted" by the decision

  All of the Teesside-based club's female teams - from the under-7s up to its women's team - are affected by the decision, which was announced following an emergency meeting. A statement from Thornaby FC, posted on Facebook, said the future of the club had been discussed following "events of the last 12 months" and highlighted "very low" staffing levels.

  Ms Lyle told the BBC there had been an outpouring of support for the women and girls following the announcement, with sponsorship and new clubs offered. "Our main focus is trying to keep these teams together, we don't want to split them up," she said. "It's been a tough few days and we did warn of the potential backlash." She said the women's teams were self-sufficient and had sponsors, adding any suggestion of the club's decision being financially motivated was a "cop out". "We've got girls who have really progressed this season, we were looking forward to presentation night but now we don't have a venue to host it at as we're not allowed to go to the ground," she added.

  The women's teams have been inundated with offers of help since the decision was announced

  Thornaby FC's chairman Garry Morris, said he and another member of the committee had voted against the decision. Mr Morris said he had asked the club to reconsider and to "consider their positions on the board as patrons and trustees of the football club". He said: "We are empowered by the fans of the club to make the right decisions for the future of the club, and all those who show their unwavering support to both the male and female teams of all age groups deserve better. "I firmly believe this decision made yesterday does not do that, and will be making this clear to the remaining members of the board." The BBC has attempted to contact the club's committee for further comment.

