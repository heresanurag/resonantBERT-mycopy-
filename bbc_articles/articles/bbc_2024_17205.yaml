content: |-
  Lauren Mundy describes getting the call that Joey was alive and well as "surreal".

  This video can not be played To play this video you need to enable JavaScript in your browser. Joey kept a widower company during the pandemic after going missing in October 2019

  A woman has spoken of her "disbelief" after her cat was found almost five years after going missing. Lauren Mundy's pet, Joey, did not return after leaving their house in Springbourne, Bournemouth, in October 2019. But two weeks ago she received a call from Cats Protection saying he was still alive and had been looked after by an elderly man living just three miles (5km) away in the neighbouring suburb of Kinson.

  Ms Mundy said she adopted Joey before her son Riley was born

  Ms Mundy and her family were reunited with Joey on Sunday. Her son, Riley, was just three at the time and was distraught. "We'd had him since he was born," she said. "He was missing his buddy." Despite the years passing, Ms Mundy said she "didn't stop worrying about [Joey] or thinking about him". Then, on 18 June, she got an unexpected call from Cats Protection. "She said a family had found him... I was just shocked, [in] disbelief," she said. "My son burst into tears... it was just so surreal."

  The charity put Ms Mundy in contact with a woman whose grandfather had taken Joey in. The cat lived with him for several years, becoming the man's companion throughout lockdown and after the death of his wife. When the man was taken into hospital to receive end of life care, his granddaughter decided to have Joey scanned. "We were both crying on the phone," said Ms Mundy. "I always said, 'I hope Joey's just found an old man or an old dear and he's keeping him company, just living his best life'." Joey is already settling back in at home. "We brought him in and he just sat where he always sat on the computer chair," said Ms Mundy. Now, Joey is "doing well" and turns 11 next week. "He came home in time for his birthday," Ms Mundy added.
