title: Saliva test may turn tide on prostate cancer claim scientists - BBC News
date: '2025-04-10'
section: Health
url: http://www.bbc.co.uk/news/articles/c98gg9qjn6ro
content: |-
  Analysing DNA in saliva can identify men at the greatest risk of prostate cancer

  The at-home test would not require a visit to the GP, and appeared to perform better than current testing methods according to the study

  A saliva test may help "turn the tide" on prostate cancer, UK scientists claim. It analyses men's DNA to work out who was born with the greatest risk of developing the disease. Targeting them for prostate biopsies and MRI scans discovered some aggressive cancers that would otherwise have gone unnoticed. However, the test has not yet been proven to save lives and experts say it will be "years" before such tests could be used routinely.

  Around 12,000 men in the UK die from prostate cancer every year. Calls for the routine testing of healthy men - known as screening - have grown louder since Olympic cyclist Sir Chris Hoy announced he had terminal prostate cancer. Screening has been rejected in the past because using the current test - which looks for levels of prostate specific antigen (PSA) in the blood - risks causing more harm than good, external.

  This saliva test does not look for signs of prostate cancer inside the body. Instead it looks for 130 mutations in men's DNA, each of which can increase the risk of prostate cancers developing. In the study, scientists tested men aged 55-69 and calculated their risk. Men in the top 10% of scores were invited for further investigations. This included a biopsy and an MRI scan. The study, published in the New England Journal of Medicine, showed:
  • None Out of 745 men with a high score, 468 were prepared to have the extra tests
  • None 187 were found to have prostate cancer
  • None 103 were higher risk tumours that needed treatment, 74 of these would not have been discovered at this stage with current tests "With this test, it could be possible to turn the tide on prostate cancer," said Prof Ros Eeles, from the Institute of Cancer Research, London. "We can identify men at risk of aggressive cancers who need further tests and spare the men who are at lower risk from unnecessary treatments," she added

  Dheeresh Turnbull (right) with his brother.

  Dheeresh Turnbull, who is 71 and from Brighton, took part in the trial. He discovered he was in the highest risk category despite having no family history of prostate cancer. Further examination showed he had cancer. "I was completely shocked, I would never have been diagnosed at this stage if I hadn't joined the trial." His younger brother was then invited to take part in the study and also discovered he had an aggressive tumour. "It's incredible to think that because of this study two lives have now been saved in my family," Dheeresh said.

  However, the test is not ready to be rolled out. Prof Dusko Ilic, from King's College London, said it was "promising" but improved cancer detection "only modestly" when used alongside current risk factors such as age, PSA levels and MRI scans. And he said there was still "no direct evidence" of it improving survival or quality of life, which meant more studies were needed. The research also focused people of European ancestry and work is still under way to adapt it for people from other backgrounds. Black men are thought to have double the risk of prostate cancer, external. The research team also say there are questions around cost-effectiveness, potential harms and the best time to analyse the risk. The saliva test will become part of the pivotal Transform trial, external which is trying to discover the best way of introducing prostate cancer screening in the UK. Prof Michael Inouye, from the University of Cambridge, said he believes we will look back on this study "as a landmark" that made the case for using genetics to assess risk. But he added: "This is a big step along the path to clinical implementation, but it is still a long road." He said it will "likely be years" before the NHS used such a test.

