title: 'Newspaper headlines: Potential ''autumn tax raid'' after ''£20bn hole in finances''
  - BBC News'
date: '2024-07-25'
section: The Papers
url: http://www.bbc.co.uk/news/articles/c0w420w2153o
content: |-
  A mix of stories lead Friday's papers, including a look ahead to a big speech by the chancellor on Monday.

  Assisted dying campaigner Dame Esther Rantzen has given her reaction to the formal introduction in the House of Lords of a bill to legalise the practice in England and Wales

  The Daily Telegraph says, external the chancellor is preparing to reveal a £19bn shortfall in the public finances. The paper says Rachel Reeves is laying the ground for an autumn tax raid. The Guardian has the same lead story., external It quotes a Labour source accusing the former chancellor Jeremy Hunt of "presiding over a black hole and still campaigning for tax cuts". The Financial Times says, external the wealthy are likely to be in the line of fire. It says higher levies on capital gains and inheritances are among the options open to Ms Reeves. The i newspaper says, external the chancellor has been urged not to target tax relief on pensions to help address the shortfall. It says some Treasury officials want to lower the amount of relief that higher rate tax payers would be eligible for. The paper points to projections that show the change would affect seven million savers by the end of the Parliament. A Treasury spokesperson is quoted as saying they've begun "fixing the foundations" to grow the economy, and keep taxes "as low as possible".

  Rachel Reeves is set to give a major speech on the economy on Monday

  The Daily Mail says, external Labour has been accused of lying about a pledge to cut annual energy bills by up to £300 by the next election. The paper says the Energy Secretary Ed Miliband refused to make the guarantee when pushed by reporters. It quotes the shadow energy secretary, Claire Coutinho, as saying the government's plans for renewable power will "heap huge costs on struggling families". The Daily Mirror says, external Sir Keir Starmer has renewed his vow to cut energy bills within five years. The shadow home secretary, James Cleverly, has given his first interview since launching his Tory leadership bid. He tells the Times, external he's looking to make sure the Conservatives "once again are a mass appeal party". The paper says he is positioning himself in the centre ground. He's quoted as saying that "being small and ideologically pure" is not what the Tories exist to do. The Daily Express leads, external on the reaction of the assisted dying campaigner, Dame Esther Rantzen, to the formal introduction in the House of Lords of a bill to legalise the practice in England and Wales. Dame Esther, who has stage four cancer, says there are many in parliament who oppose the change, for reasons including religious belief or due to concerns about the impact for disabled people. But she says the vote brings her hope of a dignified end on her own terms. "Zara danced with a fractured leg" is the headline in the Sun., external It says the Strictly Come Dancing contestant, Zara McDermott, was unaware that she broke a leg bone while training, and danced on "in pain". The paper says the BBC has endured a "deeply uncomfortable two months over the show". The corporation's director general, Tim Davie, has apologised for any duty of care breaches, and says new protocols are in place to protect contestants. According to the Times,, external Formula 1 team bosses have been told to ensure drivers mind their language during races. The paper says the warning follows an expletive-filled outburst on team radio by the world champion, Max Verstappen, during the Hungarian Grand Prix. The sport's authorities have apparently said drivers are role models - and should act accordingly.

