  John Curtice examines the latest opinion polls ahead of the 4 July general election.

  Polling expert Sir John Curtice examines this week's movements in the opinion polls ahead of the 4 July general election.

  While it's good news for Reform and the Liberal Democrats, he suggests Conservative PM Rishi Sunak "must be beginning to doubt his decision to call the election early".
