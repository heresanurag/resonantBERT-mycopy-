content: |-
  Striker Khadija Shaw says Manchester City want to be "unstoppable" after her hat-trick helps the Women's Super League leaders thrash Tottenham at Etihad Stadium.

  Shaw wants WSL leaders Man City to be 'unstoppable'

  Khadija Shaw has scored seven goals in as many WSL matches this season

  Khadija Shaw says Manchester City want to raise their level to be "unstoppable" after comfortably beating Tottenham at Etihad Stadium. The Jamaica forward scored a hat-trick - her third against Tottenham - as City cruised to a 4-0 win to extend their lead at the top of the Women's Super League (WSL) table. Shaw's first goal came after just 24 seconds when she pounced on an error by Tottenham defender Clare Hunt, and her hat-trick was complete in the 67th minute. "I just pride myself in trying to work for the team, because I know with the players I have around me I'm going to get opportunities," Shaw told Sky Sports. "I'm quite a confident player and I know what I can do on the pitch, and Tottenham is no different. I'm just scoring against them - what can I say? "Once we go at every game on the front foot from the first whistle, we're really good. "We have to keep going and see where we can raise the level even better, so when we get to that level, we're unstoppable."

  There was a hat-trick of assists for England international Lauren Hemp, who provided the crosses for Shaw's second and third goals - and the City forwards have built a strong bond on and off the pitch. "We've got a great relationship. It helps. It shows with the connection we've got on the pitch. It definitely is like that off the pitch," said Hemp. "She's a great laugh and I feel like we've got such a good connection. If I put a bad ball in, she will be the first to tell me. "If she didn't finish one of my crosses, I will be the first to tell her, which is what you need in this squad. We've got a mutual respect. "I always know she's going to be there. Sometimes I don't even need to look up and I know she's going to be there." Hemp and Shaw top the tables for most assists and goals respectively in the WSL this season and they do not look like slowing down. City captain Alex Greenwood says Shaw "scores when she wants" and that it is great to see her combining with Hemp so well. "When I stand at the back and I watch them, it's obviously really enjoyable," she added. "They speak a lot, they work on things, it's something they talk about quite a lot. They've got a great connection and it showed tonight."

  Tottenham have won just two of their opening seven WSL games

  While it was an enjoyable evening for Manchester City, it was a night to forget for Tottenham as they were comfortably beaten. There was a catalogue of individual errors, and they were perhaps fortunate not to have conceded even more goals, particularly in the first half. Spurs boss Robert Vilahamn says the early goal by Shaw "killed momentum" and his side struggled to recover. "Mentally it's really hard - you can see the self-confidence of the players is lost for a while before they come back into the game," he told Sky Sports. "We just need to understand how good [City] are in the second half and that we don't give away any more [goals]. "It's a mixture of quality as well. The mistakes is something we need to develop - we need to do better actions in some of these situations. "We need to find ways to not concede these goals so easily. Self-confidence is a mixture of performances, so it's a mix of things." Defender Molly Bartrip said the goal was the worst possible way to start against City and they were then facing an uphill battle. But she added it is on the players to "question each other" about why they are making so many errors, which she insisted is "not good enough". "Our identity is going to be playing out from the back and it’s something we want to do. I don't think we will change our game in that way," she added. "Of course, there’s a time and place for it. If we're not doing it well, then we have to start going longer and stretch the game. "But we are conceding goals way too easily and it's something we need to address. "We have to start analysing it and questioning each other on why these goals have gone it. It's obviously not good enough."
