title: Terminal MND cyclist completes Cairngorms ride - BBC News
date: '2022-08-14'
section: Edinburgh, Fife & East Scotland
url: http://www.bbc.co.uk/news/uk-scotland-edinburgh-east-fife-62540974
content: |-
  Davy Zyw completed the gruelling 265-mile ride to raise money for the Doddie Weir Foundation.

  Davy Zyw is living with MND and has raised £200,000 for charity

  A man who was given a terminal diagnosis of motor neurone disease (MND) four years ago has completed a gruelling bike ride on Scotland's highest roads.

  Davy Zyw and his support team rode the 265-mile route through the "high five" roads in the Cairngorms.

  The mission has raised cash for rugby international Doddie Weir's charity.

  Mr Zyw, 34, from Edinburgh, said the 20-hour challenge "pushed us to the edge of our capabilities".

  Since being diagnosed with MND in 2018 Mr Zyw had raised £150,000 for the My Name'5 Doddie Foundation, set up by former Scottish rugby union international Weir who also has the condition, with £50,000 pledged towards the high five challenge.

  Mr Zyw's team included his twin brother Tommy Zyw, brother Sorley Richardson, and friends Craig Paul, Dan Elswood, Malcolm Holwill, George Besant, Chris Asquith, Murray Buchan and Ryan Brennan.

  Davy is living with MND in Edinburgh with his wife Yvie and his son Alek

  Mr Zyw, who still works as a wine expert and author, trained for up to 10 hours at a time for the challenge.

  His fingers now unable to operate regular gears, he used an adapted bike with electric gears.

  Speaking after completing the ride, he said: "We are battered but not broken, after close to 20 hours in the saddle cycling 265 miles across the toughest terrain Scotland had to offer.

  "The high five takes in the highest road climbs - over 19,000 feet - this physical challenge pushed us to the edge of our capabilities.

  He added: "The road was long, and many of the hours were dark, but it was the climbing which stretched us, the Lecht in 31C was particularly taxing."

  "But wow, we were sustained and fuelled by our dedication to this cause and the incredible support we have received.

  "The high five is complete but my battle against MND continues, fortified by the steadfast support of so many who believe, like me, that this disease isn't incurable, but underfunded."
  • None Epic challenge for MND cyclist who has defied the odds
