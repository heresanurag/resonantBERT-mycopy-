title: RFK Jr apologises to family over Super Bowl ad - BBC News
date: '2024-02-12'
section: US & Canada
url: http://www.bbc.co.uk/news/world-us-canada-68275635
content: |-
  The advertisement, aired just before halftime, spliced images of the candidate into a 1960 JFK ad.

