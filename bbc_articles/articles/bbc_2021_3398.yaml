  The NSA and GCHQ continue to divide up tasks - GCHQ for instance monitors the hackers of Russia's GRU military intelligence agency and passed intelligence to the US when they saw them hacking into the Democratic National Committee during the 2016 US Presidential election.

  The relationship remains close with staff from each side travelling over the Atlantic to work in the other side's agency and is far more intimate than that of MI6 and CIA, which deal with human, as opposed to signals intelligence.

  But the relationship has not always been smooth. Intimacy creates risks. In the early Cold War, there were fears that the other side might be "leaky".

  In Britain this came after revelations about the Cambridge Five showed individuals within British intelligence had betrayed secrets to the Soviet Union. The UK also has worried about showing it was contributing enough, especially given US resources dwarf its own (although expertise in code breaking has often made up for this).

  More recently, there was tension after a GCHQ whistleblower, Katharine Gun revealed an NSA memo that showed plans to spy on the UN in the run up to the Iraq War in 2003.

  And former NSA contractor Edward Snowden revealed to the world the extent to which the two allies had built a vast capability to intercept global communications with almost no public awareness and little oversight.

  Former NSA contractor Edward Snowden revealed much about the close relationship between US and UK intelligence gathering

  Other countries have sometimes suggested they wanted in on the deal. Germany made noises about a "no spy deal" in the wake of the Snowden revelations which showed the US spying on it. But Five Eyes is not simply an intelligence sharing alliance but an intelligence production alliance where members are expected to contribute and this appeared to be an obstacle.

  Recently, Western intelligence agencies have focused more on China, making Australia's role increasingly important.

  The sensitives were also on display when the US warned about limiting intelligence sharing if the UK continued to use Chinese telecoms Huawei in its new 5G network (the UK changed its position in 2020 to exclude the company).

  The changing focus has also led to talk about Japan and perhaps others in Asia joining Five Eyes.

  Officials say this is unlikely even though they do expect closer co-operation. The reality is that the alliance still remains one rooted in the trust and personal connections first forged during the WW2.
