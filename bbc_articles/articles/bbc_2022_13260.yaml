id: bbc_2022_13260
title: 'As it happened: Village left devastated by explosion - BBC News'
date: '2022-10-10'
section: Europe
url: http://www.bbc.co.uk/news/live/uk-northern-ireland-63186530
content: |-
  Reports from a County Donegal village where a petrol station blast killed 10 people.

  I have spent all weekend in the area.

  Creeslough is a tiny village. It had one shop. It doesn't have that anymore - and that in a way pales.

  But in the ordinary rhythm of life here, it was a hub where people gathered and met. That's gone.

  Over and above that, is the loss of so many lives, the concerns for the injured, concerns for the families and the wider community.

  This community is deeply traumatised. It's been struggling to comprehend the sheer enormity of what has happened.

  Many of the people I spoke to over the weekend couldn't compute it - and how could they?

  I am from Donegal and would have travelled throughout the county playing football, including against St Michael's, Creeslough.

  Once you come to a place and spend some time there you have an abiding empathy with it.

  From an early stage all across Donegal sporting and other events were being called off.

  People have lost the heart to do anything but think of Creeslough.

  The people in the area will need support in the days weeks and months ahead.
