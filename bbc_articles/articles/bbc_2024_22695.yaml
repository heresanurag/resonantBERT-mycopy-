content: |-
  Footage shows the 88-year-old Red Bridge in Kamloops, British Columbia, engulfed in flames.

  An 88-year-old bridge connecting the Canadian city of Kamloops to the Tk'emlúps Indian Band Reserve collapsed on Thursday.

  Local authorities have described the fire as "suspicious" and are investigating.

  The Indigenous community chief, Kúkpi7 Rosanne Casimir, said in a statement that the loss of the bridge brought "many emotions, critical conversations and new challenges".
