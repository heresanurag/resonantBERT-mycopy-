id: bbc_2020_327
title: 'Storm Gloria: Sea foam engulfs streets of Spanish town - BBC News'
date: '2020-01-22'
section: General
url: http://www.bbc.co.uk/news/world-51207955
content: |-
  Marine foam brought ashore by Storm Gloria floods streets in Tossa de Mar.

  As a result of Storm Gloria battering the Catalan coast, marine foam has been blown ashore.

  Sea foam is created by the agitation of the organic matter in seawater.
