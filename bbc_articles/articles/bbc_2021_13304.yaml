title: Record-breaking ferris wheel opens in Dubai - BBC News
date: '2021-10-23'
section: General
url: http://www.bbc.co.uk/news/world-middle-east-59024669
content: |-
  The massive wheel was opened in Dubai with a lavish fireworks display to mark the occasion.

  Dubai officially opened the world's largest and tallest ferris wheel on Thursday, as part of an initiative to bolster the city's status as a major tourism hub. It's known as the "Dubai Eye" and stands at 250m.
