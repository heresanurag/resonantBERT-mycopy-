url: http://www.bbc.co.uk/news/articles/cn4z410dk2ko
content: |-
  The actress's career has enjoyed a recent resurgence thanks to a role in the film The Last Showgirl.

  Pamela Anderson on missing out on Oscars, ditching makeup and 'innocence' of Baywatch

  Pamela Anderson has had her fair share of ups and down over her career. So that might explain why she's so stoic about missing out on an Oscar nomination for her role in The Last Showgirl. “The win is the work,” the Canadian actress told BBC News. “You couldn't have told me I'd be here a decade ago, so this is very exciting for me, to even be in the conversation.” Anderson, 57, did manage to score nominations at the Golden Globes and Screen Actors Guild Awards for her part in Gia Coppola’s film about a fading Las Vegas dancer. But she is not in the running for the Academy Awards, which take place this Sunday in Los Angeles. “I just wish everybody well,” she said. “I think anybody, any actor, realises that all of this is about having another chance to be able to perform and share your talent with the world.”

  Pamela Anderson stars in The Last Showgirl, a film about an ageing Las Vegas dancer

  Anderson rose to prominence on the 1990s TV series Baywatch. The lifeguard drama became the most-watched television show in the world at the time, and it's still the role she's best known for. But in the three decades since she first ran along the California beaches, fans and critics have become acquainted with different parts of Anderson's life story including Playboy covers, a leaked sex tape and many marriages. In 2022, Hulu series Pam & Tommy told the story of how Anderson and now ex-husband Tommy Lee's sex tape was stolen and illegally distributed in the mid-90s. Anderson later criticised the series in an interview with Variety, external, describing it as "shocking" and calling for the people behind it to apologise to her. Now, she's starring in a new film which is also about second chances. In The Last Showgirl, the lead character Shelly, played by Anderson, must plan for her future after her show abruptly closes. Plenty of critics have drawn parallels with Anderson’s own life in the spotlight, and she doesn't dispute this. “I think that’s what drew me to the project, that it was so relatable on so many levels,” Anderson said of the film. She added that its central theme, of struggling to make your career work as a woman in later middle age, was something "many generations of women" had faced.

  Pamela Anderson, pictured in 2016 with sons Brandon (left) and Dylan (right), said the film's portrayal of motherhood was relatable

  In the film, Shelly is portrayed as having a strained relationship with her daughter Hannah. Shelly's career as a showgirl means she often works late, causing her to miss important moments like bedtime with Hannah. That, too, is something that Anderson says she can relate to. She shares two sons, Brandon Thomas, 28, and Dylan Jagger, 27, with her ex-husband, Mötley Crüe drummer Tommy Lee. She said that for all working mums, there's "no proper way" to be a parent while also following your dreams and pursuing your career. “So this movie is, I think, in a very vulnerable space. “And it was an interesting role to play with all her imperfections and selfishness and selflessness. And it was a lot of layers and nuances to the character that I could really relate to.”

  The Last Showgirl has received a mixed reception from critics, though most have praised Anderson's performance. The New York Times called it, external "sensitive and beguiling" and described Anderson as "dazzling". But the Guardian, external awarded it just one star, calling it "a big disappointment" (although a later review bumped that up to three stars, external). Many have also described the role as Anderson's "comeback". She doesn't reject the term, but says she prefers to see it as "a new chapter". "I've always been fascinated with the craft of acting," she said. "[But] my personal life kind of took me off course, and I raised two beautiful boys." She's not the only actress to be back in the spotlight this season. Demi Moore is nominated for best actress at the Oscars for her role in The Substance, a body horror which has revitalised her career. "I'm really happy for Demi," Anderson said. "I think she's earned her place. And you have to earn it. You have to fight for it." With so many strong female protagonists in this year's films, I'm curious what Anderson now thinks of Baywatch. The show has long been criticised for its portrayal of its female characters, who, many argued, were sexualised and denied meaningful plot lines. "I didn't see it like that at all. I thought it was quite innocent and wholesome and, and fun to watch," she said. "I always felt like I was surrounded by such incredible people, lifeguards that were also firemen or firewomen. It was really, really, empowering."

  Anderson has always been seen to embody a look that rose to prominence in the 90s - skinny, blonde, and enhanced by plastic surgery. But in recent years, she has been sporting a "no-makeup" look, choosing instead to embrace her natural appearance. "My beauty routine is rest. And so that's more important to me these days," she told me. She said it's not that she's against makeup, but more that she thinks "there's a time and a place" for it. "This chapter, for me, has been about self-acceptance and finding out who I am. What are my original thoughts? What do I have to give?" she said. "I know I have a lot more to give in this world, in this industry too, and I feel like even I have to remember who I am to start with and then hopefully, play characters in films and not in my personal life."
