title: 'Newspaper headlines: Israel-Hezbollah clash is not over - BBC News'
date: '2024-08-26'
section: The Papers
url: http://www.bbc.co.uk/news/articles/c70j90p74kjo
content: |-
  The papers focus on rising Middle East tensions, and Labour facing pressure on winter fuel payments.

  Israel-Hezbollah clash 'not the end', and winter fuel payment 'concerns'

  Around 10 million pensioners in England and Wales will lose their winter fuel payments under plans announced by the chancellor

  Several front pages lead on the escalating conflict between Israel and Hezbollah. The Financial Times, external pictures a Hezbollah drone exploding over northern Israel. The Times, external says the White House has ordered two US aircraft carrier groups to remain in the Middle East, to try to prevent the flare-up from escalating further. The Guardian, external is reporting that the UK's attorney general has intervened over the sale of British arms to Israel - arguing that he can’t approve a ban without knowing if their use would breach international law. The Daily Telegraph, external's front page focuses on the letter written by the Conservatives to Cabinet Secretary, Simon Case asking if the PM - or his chief of staff, Sue Gray - signed off the Downing Street pass for Labour donor Lord Alli. The paper quotes the letter's author John Glen, as saying it's "time Labour came clean on all the people they've parachuted into the top civil service and the donors they've returned favours to". Labour insists the pass was temporary and was given back several weeks ago. The Daily Mail , externalsays Lord Alli has paid for thousands of pounds of suits and spectacles for the prime minister. The paper's headline says Sir Keir is embroiled in a "Passes for Glasses Sleaze Row". The i, external says Labour MPs fear a voter backlash over the Chancellor's decision to restrict winter fuel allowance payments. They tell the paper the issue is coming up on the doorstep, in emails and letters - one MP is quoted as saying "there's a lot of bad feeling about the decision". But the paper says Rachel Reeves has indicated there'll be no U-turn on the policy. The Daily Express, external says the shadow home secretary, James Cleverly, has condemned Labour for taking the action without a “democratic mandate” to do so. The Guardian predicts that teachers returning to work next month face a post-Covid peak of bad behaviour, as children who were most severely affected by the pandemic reach the teenage years renowned for classroom disruption. The paper says the warning from school leaders in England follows evidence that children of primary school age during the pandemic - when schools were closed to most pupils - have been accruing exclusions and suspensions at a record pace since moving to secondary school. The Times says a photograph of Prince Andrew, after he gave the Newsnight interview about his friendship with paedophile Jeffrey Epstein, could go on display in the National Portrait Gallery. The paper says the gallery confirmed the image was being considered, after being offered as a gift by the only photographer - who was invited to take pictures that day. The Daily Star quotes a royal expert as saying that having the image on display would be a "symbol of his disgrace" - but the paper notes it could also embarrass the Princess of Wales, who is the gallery's royal patron. The Mirror, external addresses rumours of an Oasis reunion - by quoting a source close to the feuding brothers saying; "it's happening". The paper claims frontman Liam Gallagher, and his brother Noel are "on speaking terms again", after their fallout 15 years ago. The Sun, external believes the Gallaghers have decided to launch a £400m comeback with huge live concerts across the UK next year expected to be confirmed this week. "Definitely No Maybes" is the headline.

