content: |-
  Ukraine won the Eurovision song contest 2022, with the UK coming second, its best result since 1998.

  Ukraine has won the Eurovision song contest 2022, with the Kalush Orchestra coming out on top with a huge show of support for their song Stefania.

  The UK's Sam Ryder came second place for his performance of Spaceman, landing the UK's best result since 1998.

  Along the way these top acts competed against some strong competition from the likes of Norway's SubWoolfer and Sweden's Cornelia Jakobs.

  Here are the highlights of the night.
