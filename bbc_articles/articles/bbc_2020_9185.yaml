content: |-
  Hurricane Laura makes landfall shortly after midnight local time (05:00 GMT) near the district of Cameron, in Louisiana.

  Hurricane Laura made landfall shortly after midnight local time (05:00 GMT) near the district of Cameron, in Louisiana.

  Laura has strengthened rapidly from category three to category four, gaining 70% in power in just 24 hours.

  It is now close to becoming a category five storm.
