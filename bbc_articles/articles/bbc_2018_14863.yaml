content: |-
  The remarkable story of Lev Yashin, the greatest goalkeeper of all time and a hero of the Soviet Union.

  The greatest goalkeeper of them all, Lev Yashin revolutionised his position and became a hero of the Soviet Union.

  BBC Sport tells the remarkable story of a man who went from making bullets in a factory to winning football's highest individual honour, the Ballon d'Or.
