title: Scott Morrison lists Taylor Swift albums in farewell speech on daughters' request
  - BBC News
date: '2024-02-27'
section: General
url: http://www.bbc.co.uk/news/world-australia-68411764
content: |-
  Scott Morrison finishes his stint in politics by playing Taylor Swift bingo, naming albums in his speech.

  Scott Morrison accepted a challenge by his two daughters, Abbey and Lily, to play Taylor Swift bingo during his farewell speech.

  The former Australian prime minister is retiring from politics after a 17-year career defined by pragmatism, conservatism and numerous controversies.

  Before he quit, his children asked him for one more thing in parliament - to name as many Taylor Swift albums as he could. Watch to see how many he managed to squeeze in.

  Read more: The rise and fall of Scott Morrison
