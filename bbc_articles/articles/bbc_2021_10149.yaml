title: 'Coronavirus: Travel changes are not enough, say industry bosses - BBC News'
date: '2021-08-05'
section: UK
url: http://www.bbc.co.uk/news/live/uk-58097508
content: |-
  France is moving to the amber list as part of widespread changes to the traffic light system.

  UK travel rules must be simplified, says travel chief

  Willie Walsh, director general of the International Air Travel Association, says "a simpler [international travel] system is definitely what is required to avoid confusion in the case of consumers". Speaking to BBC Radio 4's World At One programme, he said it would also provide some form of certainty for people who are wanting to travel - and in some cases "absolutely need to travel". Walsh also said the market for PCR tests was "in many cases unregulated", with tests being advertised online for £20 but actually costing £150. A Covid test is needed three days before returning from an amber country, and a PCR test two days after arriving. Those arriving from Spain are being asked to use a PCR test for the first of those two tests. "This expensive and unnecessary testing I think needs to be challenged and I think the government should demonstrate why they require it," Walsh said. "I think there is a valid reason and a concern, and I would accept that maybe for some of these high-risk countries that have been identified you can make the argument that some form of testing should be done." But, referring to the number of PCR tests he said had been taken by travellers since 25 February, he added: "I don't think you can justify requiring 2.2 million people to undertake PCR tests when only 8,000 of those are subsequently sequenced."
