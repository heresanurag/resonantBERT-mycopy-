title: 'Coronavirus: Health minister gives Northern Ireland update - BBC News'
date: '2020-11-18'
section: Northern Ireland
url: http://www.bbc.co.uk/news/live/uk-northern-ireland-54979819
content: |-
  Coverage of Health Minister Robin Swann's latest coronavirus briefing.

  Dr McBride has said the current restrictions are "having an impact" and "slowing the spread of infection", "however not enough nor sufficient to take us through the challenges of the next few months".

  He thanks the public for the contribution they have been making, also stressing the importance of people looking after their mental health.

  "It is important to know that others are there and will understand - none of us, absolutely none of us are alone," he adds.

  He says it is also important to acknowledge in these "challenging times" that there "is hope".

  "Hope for a better and different future," he adds.

  Dr McBride notes the announcements with regard to a number of potential vaccines which "are yet to be approved for use in the United Kingdom".

  "However, there is now a very real prospect that we will be in a different place by the spring or summer and almost certainly by next year."
