title: 'Real Madrid 2-1 Chelsea: Dani Ceballos and Brahim Diaz consign Chelsea to
  another defeat - BBC Sport'
date: '2024-08-07'
section: Chelsea
url: http://www.bbc.co.uk/sport/football/articles/c6288g02dx4o
content: |-
  The Blues have only won one of their five pre-season matches amid defensive concerns that need resolving before the new season.

  Brahim Diaz netted a wonderful goal against Chelsea in the United States

  Chelsea manager Enzo Maresca says he "trying to solve" his side's "habit" of conceding too many goals after a 2-1 defeat by a young Real Madrid side in Charlotte, in the final match of their United States tour. First-half goals from Dani Ceballos and Brahim Diaz were enough for Madrid despite Noni Madueke's header as the Blues again looked vulnerable at the back. They have conceded 12 goals across five pre-season games in America, going 4-0 down in two of those matches and winning just one. Maresca said he addressed the "very high" defensive line with his players in one of his first meetings, which he said is a habit "from last season". Ceballos followed in a deflected Lucas Vazquez shot to finish in the 19th minute. And in the 27th minute Diaz rounded new goalkeeper Filip Jorgensen to score from a tight angle past the Dane, who made his first start at the Bank of America Stadium. Chelsea pulled one back as Madueke headed in Enzo Fernandez's cross at the far post in the 39th minute. Maresca made no substitutes at half-time but his tweaked team looked more solid as they played out a drab goalless second half where the best opportunity was a spurned one-on-one chance for Christopher Nkunku. Carlo Ancelotti's side were still without a host of star players, but wide attacker Vinicius Jr excelled in the absence of Jude Bellingham and Kylian Mbappe, who are expected to train as early as tomorrow as both sides flew back to Europe immediately after the match. Chelsea next face Inter Milan in their final friendly at Stamford Bridge on Sunday before their Premier League opener at home against champions Manchester City on 18 August. Madrid next face Atalanta in the Uefa Super Cup in Warsaw on Wednesday 14 August, which pits the Champions League winners against the Europa League winners, as a curtain-raiser for European competitions.

