title: 'Covid: Pubs reopen in Scotland and Wales as lockdown eases - BBC News'
date: '2021-04-26'
section: World
url: http://www.bbc.co.uk/news/live/business-56884594
content: |-
  Pools, gyms, all shops and restaurants are also opening in Scotland for the first time since December.

  Alan Thompson had played bowls for 30 years but played his last game just a day before he had a stroke in 2018 Image caption: Alan Thompson had played bowls for 30 years but played his last game just a day before he had a stroke in 2018

  The easing of restrictions in Wales from today means Alan Thompson, 74, will be able to step back on the bowling green for the first time in over three years after recovering from a stroke.

  While playing was banned, Alan, from Llantrisant, had been taking part in virtual games hosted by Sport Wales.

  "I honestly didn't think I'd ever be able to play bowls again, but playing virtual bowls helped me ease back into it and I've found my confidence again," he says.

  "I've done the rehearsal and now it's time for the real performance out on the green."

  Meanwhile, in county Conwy, Nick Jackson's zoo is preparing to open its doors again to visitors.

  He said he was "over the moon" to reopen and staff had been working "frantically".

  He says: "We're so pleased to be opening and getting income back, but it still hangs over our heads the worry as to what the future holds."

  However, he thinks many of the zoo's animals - including primates and monkeys - will "enjoy the company of the visitors coming in" because they find them entertaining and amusing, he says.
