title: Royal Marines Band surprise veteran for his 100th birthday - BBC News
date: '2024-08-22'
section: South Scotland
url: http://www.bbc.co.uk/news/articles/ckg53nyqx3jo
content: |-
  Jim Churm was so moved by the band's playing at a D-Day event, they decided to surprise him for his birthday.

  A veteran who celebrated his 100th birthday this week was given a surprise performance by the Royal Marines Band.

  Jim Churm, from Crossmichael in Dumfries and Galloway, had attended a D-Day concert at Edinburgh's Usher Hall in June, where he was moved by the band's rendition of Heart of Oak - the official march of the Royal Navy.

  His son sent the musicians a letter telling of his father's appreciation - they said they were "humbled" by his words.

  The band decided to surprise him outside his local pub on Tuesday, with a rendition of Happy Birthday.
