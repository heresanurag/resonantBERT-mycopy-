title: 'Discovery Cove: Cardiff girl Anna Beaumont dies on family holiday in Florida
  - BBC News'
date: '2024-06-02'
section: Wales
url: http://www.bbc.co.uk/news/articles/cv229zdklw5o
content: |-
  "Talented" rower Anna Beaumont was found unresponsive in a pool at an Orlando resort.

  Anna Beaumont, from Cardiff, was found unresponsive in a pool at Discovery Cove in Orlando, Florida on Tuesday

  A 13-year-old girl has died while on a family holiday in the US. Anna Beaumont, a "talented" rower from Cardiff, was found unresponsive in a pool at Discovery Cove in Orlando, Florida, on Tuesday. Local police reported that she was transported to hospital in a critical condition, but died the next day. In statement, Orange County Sheriff’s Office said: "We are sorry to report that on May 29, 2024, 13-year-old Anna Beaumont was pronounced deceased at the hospital.

  "Any information about the cause and manner of her death will need to come from the Medical Examiner’s Office." On the Discovery Cove website, it is described as an "all-inclusive day resort" which offers opportunities to swim with dolphins and snorkel among tropical fish.

  Anna Beaumont was a Year 8 pupil at Radyr Comprehensive school in Cardiff

  Trevor Wing, the chair of Llandaff rowing club where Anna was a member, said she was "a keen rower who had been training hard all winter and was enjoying the recent water sessions". "She was a lovely and talented young lady and will be greatly missed," he said. "All the junior section and the rowing club wish to express their heartfelt condolences to Anna’s family." Andrew Williams, headteacher of Anna's school, Radyr Comprehensive, said: "The very thought of losing a child is an unimaginable journey and I know I speak on behalf of the whole school community when I say that our thoughts are with Anna’s family as they try to come to terms with their loss. "Anna was a cherished member of our school family, and her absence will be profoundly felt by pupils, staff and all who had the privilege of knowing her. "Her spirit, kindness and presence touched so many lives." In an email to parents, the school said it would be briefing staff on how best to support pupils in the coming weeks, and urged them to "listen and encourage them to talk about their feelings".

  The Foreign Office said: “We are in touch with the family following the death of a child in the United States, and are providing consular support during this difficult time.”
