content: |-
  Crowds gathered outside the National Assembly loudly cheered at the announcement.

  Protesters gathered outside South Korea's National Assembly on Saturday celebrated as they heard that MPs had voted to impeach President Yoon Suk Yeol.

  They loudly cheered the announcement, and some appeared to be crying.

  Yoon has now been suspended, with the prime minister serving as acting president.

  You can follow our live coverage of the story.
