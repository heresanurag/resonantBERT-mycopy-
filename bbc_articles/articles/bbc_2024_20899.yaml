  The lioness celebrates after watching her school friend win gold in the Olympic 800m final on Monday.

  Lioness Ella Toone has shared a video of herself celebrating after her school friend Keely Hodgkinson won gold in the Paris Olympics.

  The footballer cheered as she watched her friend run across the finish line in the Olympic 800m final in one minute 56.72 seconds.
