content: |-
  A look back at The Galleries' 34 year history in Bristol after its demolition was announced.

  Plans to demolish The Galleries Shopping Centre in Bristol city centre have prompted memories of the day it opened 34 years ago.

  The three-floor shopping centre has been a feature of the city since its grand opening in 1991, which saw none other than Rowan Atkinson as Mr. Bean welcoming excited shoppers to the shiny new mall.

  Unfortunately, the excitement was short-lived as larger and more modern retail spaces such as Cribbs Causeway and Cabot Circus opened, effectively consigning The Galleries to the history books.

  The building will soon be replaced by a 450 home development that features a 23 storey skyscraper and accommodation for 750 students.

