title: 'Local election results 2018: Labour loses Nuneaton seats - BBC News'
date: '2018-05-04'
section: Coventry & Warwickshire
url: http://www.bbc.co.uk/news/uk-england-coventry-warwickshire-43999204
content: |-
  The Conservatives won 10 of the 17 wards on Nuneaton and Bedworth Council.

  Conservatives councillors claimed seven seats from their Labour rivals

  Labour has lost control of Nuneaton and Bedworth Borough Council by one seat.

  The Conservatives won 10 out of the 17 wards available, a gain of eight seats since the last election in 2014 but not enough for a majority.

  Conservative party deputy chairman James Cleverly said the success was "down to local party workers".

  Labour previously had 25 seats, but now has 17 with the Conservatives close behind with 16.

  In Coventry, Labour celebrated winning back Earlsdon, which it has not held for 20 years

  Neither party was able to secure a majority in Nuneaton, where 18 seats were required in the 34-seat council.

  Tory MP for Nuneaton, Marcus Jones, said Labour lost "crucial marginal seats" and that seats won at Labour's expense were a "great result."

