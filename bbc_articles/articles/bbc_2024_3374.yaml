  His harsh treatment reflected the fact that Mr Putin and his regime feared the influence that Navalny's campaigns had been gaining, Prof Nina Khrushcheva, the great-granddaughter of former Soviet leader Nikita Khrushchev and international affairs experts, told the BBC at the time.

  "Putin doesn't even mention his name, anybody in the Kremlin can't his mention name," she said, drawing a comparison with the fictional Harry Potter character Voldemort - who is also referred to as "He-Who-Must-Not-Be-Named".

  "Navalny is a threat to Putin's personal power, Putin's personal reputation of himself. And Putin doesn't really treat his enemies lightly and Navalny unfortunately took this - as they say in Russian - this ticket to be Putin's personal enemy."

  Yet despite the confinement of his last years, Navalny became one of the leading domestic voices against the war in Ukraine.

  During a court appearance in May 2022, he accused Mr Putin of starting a "stupid war" with "no purpose or meaning". And in September, he accused Russian elites of having a "bloodthirsty obsession with Ukraine" in an article for the Washington Post.

  His foundation also continued to oppose the government throughout his imprisonment, speaking out against the mobilisation of some 300,000 civilians to fight in Ukraine and pledging to be a "partisan underground" movement inside Russia.

  Navalny told the BBC that the best thing Western states could do for justice in Russia was to crack down on "dirty money".

  "I want people involved in corruption and persecution of activists to be barred from entering these countries, to be denied visas."

  The news of his death on 16 February was immediately greeted by a wave of tributes from around the world.

  He had made the "ultimate sacrifice" in his fight "for the values of freedom and democracy", said the European Union Council president Charles Michel, while French foreign minister Stéphane Séjourné said he had "paid with his life for his resistance to a system of oppression".

  However, exactly how - or why - he died has yet to be established. He leaves behind his wife, Yulia, and two children.

  According to his team, they had not been informed directly of his death when it broke in newspapers across the world.

  "I don't know whether or not to believe the news, the terrible news", Yulia Navlanaya said at the Munich Security Conference, hours after news of her husband's death broke.

  "You all know this - we can't believe Putin and Putin's government. They're always lying," she added.

  "But if this is true, I want Putin and all of his entourage, Putin's friends and his government to know that they will be held accountable for what they have done to our country, to my family and to my husband."

  She left the stage to a standing ovation.

