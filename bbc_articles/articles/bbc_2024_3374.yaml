  But Navalny was not a simple hero, battling against a powerful regime. He has been accused of xenophobia.

  In videos dating back to 2007, he is seen appearing to compare ethnic conflict to tooth decay and likened immigrants to cockroaches. He also said the Crimea peninsula "de facto belongs to Russia", despite international condemnation of Russia's 2014 annexation of the Ukrainian territory.

  The comments led - controversially - to Amnesty International revoking his status as a "prisoner of conscience" in February 2021, before conceding it had been subjected to an "orchestrated campaign" to "delist" him and then reversing its decision.

  Meanwhile, the Russian government continued to punish Navalny. In March 2022, his sentence was increased by nine-years after he was found guilty on new charges of embezzlement and contempt of court. He was moved to a new penal colony at Melekhovo, around 250km (150 miles) east of Moscow.

  In June 2022, his allies raised the alarm after they discovered he was no longer in that prison. Federal prison authorities later admitted he had been moved to a penal colony with a tough reputation, the IK-6 prison, more than 155 miles (249km) east of Moscow, where he said he was repeatedly placed in solitary confinement.

  His last sentence, handed down by judges in August 2023 and which extended his jail term to 19 years, saw him moved to a maximum security penal colony usually reserved for Russia's most dangerous criminals.

