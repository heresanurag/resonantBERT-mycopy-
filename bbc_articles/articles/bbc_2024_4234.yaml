  • None In the BBC Sport app you can now set notifications for Scottish rugby, ensuring you never miss any of the news, views and conversation around Scotland at the World Cup. The notifications are easy to add - head to the My Notifications section of the menu and then choose Scottish rugby news. Ireland score a huge percentage of their tries off lineout starter plays. Scotland need to cause chaos on that front. Look at the Ben Earl try last weekend. An Irish lineout disrupted, an Earl surge downfield, Peter O'Mahony scrambling back and getting binned amid the mayhem. And then Earl scored in the phases that followed. It was frenetic stuff. The English blitz defence shut Ireland down save for the two brilliant tries they scored, both originating with lineouts. When they get into that kind of rhythm they deliver masterclasses, as Scotland witnessed at the World Cup. England were having none of it. Scotland can't allow Ireland to settle, can't give them easy footholds and soft shoulders, They have to cause total bedlam for 80 minutes, if that's possible. In this column, before the World Cup game, I remember talking about the different shots that Scotland needed to fire and I'm saying it again now. Scotland's carriers need to be unrelenting. Everything they do needs to be close to perfect. Did Scotland go off script in Rome reverse? Rome was maddening for everyone. When looking at the stats we see that there was a big shift in either the pre-planned strategy compared to rounds 1-3 or an on-field deviation from the game plan by players. With the pressure on did they have a collective rush of blood to the head in going away from the script? Only Gregor, the coaching staff and the players will know the answer to that question. Was this an intentional shift away from what they did in the first three games or was it just the players going off piste? What I mean is this - Scotland went from a kicking game to a passing game. In rounds 1-3 their average number of passes per match was 120. Against Italy it was 244. They kept ball in hand to manipulate and overpower Italy and for half an hour it worked. And then it really, really didn't. Scotland's total passing metres in rounds 1-3 was 741, in Italy it was more than 1,500. In-play kicks in rounds 1-3 were an average of 37. In Italy that came down to 22. The kicking dropped and the passing rose. I know that's a lot of numbers to get your head around, but they illustrate a different way of playing in Rome compared to what we saw in the two wins and the near-win that went before it. Finn Russell and Ben White kicked more ball in the first three games than any other players from any other country. That kicking game had served them well whereas in Rome, either pre-game or mid-game, they decided they had the power and technical ability to take the game to Italy with ball in hand. In the early minutes they were ruthless but as the game went on we saw the unforced errors, the little bits that fell apart in the heat of the contest. As a Scotland fan, will we ever get that consistency of performance? That's the eternal question. I still say we have a small player pool and we manage to bang out incredible performances. We long for the days when we knock over the titans all in one season, but there's an acceptance that we'll fall off the horse from time to time. I still feel that this team is evolving and improving, but this competition is tough. England beat Ireland who beat France who beat Scotland who beat England who beat Italy who beat Scotland. I'm wary of wading into the Scottish boys because they were a bad refereeing call away from being three from three going to Rome and I think Rome was one that got away. It's a horrible feeling. The infuriating nature of that result means that Scotland can still finish fifth. They can also finish first (I know, I know...) or second. It's desperately tight. Scotland can't, and won't, wallow in the what-might-have-beens of Rome. They have a chance, and they're massive underdogs, to finish with a historic flourish in Dublin. Would you call it redemption? Maybe. It would certainly be sensational. One last push. One more chance to show that they can mix it with the very best, an opportunity to end the campaign on a high and with a Triple Crown. Nothing in this competition is harder than the mission that awaits Scotland on Saturday.
