title: '2024 Six Nations: ''Every facet has to be spot on'' for Scotland in Dublin
  - Johnnie Beattie - BBC Sport'
date: '2024-03-13'
section: General
url: http://www.bbc.co.uk/sport/rugby-union/68552647
content: |-
  It will take a near perfect display to upset the hurting champions, writes former Scotland forward Johnnie Beattie as Gregor Townsend takes his team to Dublin for the final Six Nations weekend.

  2024 Six Nations: 'Every facet has to be spot on' for Scotland in Dublin - Johnnie Beattie Last updated on .From the section Scottish Rugby

  Coverage: Live text on BBC Sport website and app, BBC Radio Scotland & BBC Five 5 Live commentary There will be an emotional reaction from Scotland in Dublin, a willingness to scrap, a realisation that a strong finish and a first Triple Crown since 1990 is still possible. None of the current squad were born the last time Scotland managed that feat. Coach Gregor Townsend was only 16-years-old. The issue is that we're up against a side that saw a possible Grand Slam go south when whipped by England. They won't be lacking in motivation themselves. Win the game and Ireland are champions again. In front of their own crowd. After a massive disappointment against England. On Paddy's Weekend. They'll be as psyched for this as Scotland will be. Ireland have won nine in a row against Scotland and we don't need to look too far back to find the last one - the World Cup pool game at Stade de France. Ireland were cruelly comfortable with our attack that night. It was a humiliation for Scotland who need to use the memory of it as a driver. It was one-way traffic in Paris. For the story to change this time then Scotland will need to mix up their game. Instead of flashing the ball along the face of Ireland's defensive line they need to tap into some of what England did on Saturday. Physicality, variation in attack, a flawless kicking game that applies constant pressure, excellent discipline, tempo, power. Every facet has to be spot-on.
