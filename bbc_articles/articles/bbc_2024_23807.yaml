content: |-
  All residents were evacuated safely and the blaze is under control, says London Fire Brigade.

  No injuries in high-rise flats fire, says brigade

  The London Fire Brigade was called to the fire at flats on Rosenthal Road in Catford at 12:51 BST

  A fire broke out at a high-rise block of flats in south-east London, with its cause now under investigation. The London Fire Brigade (LFB) sent about 70 firefighters and 10 fire engines to the flats on Rosenthal Road in Catford at 12:51 BST, after receiving more than 50 calls. By 14:15 the brigade said the fire was under control, all residents were safely evacuated and there were no reports of injuries. Witnesses reported seeing someone waving from one of the windows and described the flames coming from two flats on the ninth and 10th floors as "massive".

  Staff at nearby Catford Food Centre, who did not want to be named, said: "It's a big apartment block and old. "The flames were massive. Everyone was on the road watching and taking videos." A resident, who asked to remain anonymous, said they watched events from below. They said: "Someone was waving from a window on one of the upper floors and we were all shouting 'there's a fire, a fire.' "It was mad. It was crazy."

  This video can not be played To play this video you need to enable JavaScript in your browser. The cause of the fire is now under investigation

  Pictures of the block show the blackened windows of three apartments on the top three floors at the south-east corner of tower - homes which appear to have sustained serious damage. Directly below them is another apartment where the window seems to have been burnt out. Both sides of the street remained lined with fire engines early on Wednesday evening and crowds of locals remained gathered round as they tried to take in what happened.

  Flats wrecked by the fire were left blackened by smoke and flame

  Fire crews from Forest Hill, Greenwich, Deptford, Lee Green and surrounding fire stations attended the scene. Rushey Green is closed between Rosenthal Road and Honley Road, according to LFB's website.
