title: Jackie Weaver 'chuffed' to be meeting Strictly star - BBC News
date: '2021-02-06'
section: General
url: http://www.bbc.co.uk/news/uk-55962653
content: |-
  Jackie became an internet sensation after a video recording of her parish council meeting went viral.

  Jackie Weaver, who became an internet sensation after a recording of a parish council meeting went viral, says tensions from her now-famous video call haven't "settled yet".

  But she told BBC Breakfast she had received some exciting news amid the publicity – an opportunity to meet one of the stars of Strictly Come Dancing.
