  She noticed that US fans who accessed a pre-sale through Beyoncé's "Beyhive" fan club often ended up paying more than those who went through pre-sales for sponsors like Mastercard and Verizon. "The Beyhive sale had a lot of panic buying and/or increased dynamic prices from Ticketmaster/SeatGeek - I think both," she says. "They see someone is willing to buy a $100 (£80) ticket for $1,000 (£800), so they offer up that price again and again, and it gets snatched up," she theorises. Fekkai hopes fans will use her data to keep track of prices when the general sale begins, and avoid paying too much in the rush to secure tickets.

  Beyoncé's tours have become increasingly spectacular over the years

  But why are concerts suddenly so pricey? Ticketing expert Tim Chambers says the expense of touring has exploded over the past couple of years. As Beyoncé sings on her latest album, it takes 16 Carriages, external to ferry her show around the world - and the cost of fuel, accommodation and work visas have all rocketed. The star also employed 304 people on her last tour, all of whom had to be paid a living wage, even on days she wasn't performing. "There's also a certain amount of recuperation from the lost years of Covid," Chambers says. "Artists were forced to take a couple of years out, because no-one could tour, but they still had living expenses and lifestyle expenses. So apart from the increase in costs, you're looking to capture what you can from the live experience."

  However, he notes that artists like Ed Sheeran and Coldplay have made deliberate efforts to keep their shows affordable. Tickets to see Coldplay at Wembley Stadium this summer start at just £20, with 10% of the total proceeds going to the Music Venues Trust to help young bands at the start of their careers. But most artists, he says, are "lazy". "I mean this in the nicest way, but they want to do as little as possible and get as paid as much as possible."

  Increased costs are also exerting a downward pressure on the rest of the concert industry. "Every time a major artist announces tickets at £200 or £300, the consumer doesn't necessarily have that additional amount in their wallet, so they look to cut back in where they can," says Chambers. "There is an increasing level of evidence to show that the mid-market and the grassroots market are being squeezed by the success of the top tier." Michael Rapino, CEO of concert promoters Live Nation, says high prices are here to stay - but argues that musicians will never match what sports teams charge. "In sports... somehow it's a badge of honour that if you spend $7,000 (£5,600) for a Lakers ticket, it's OK," he told Bloomberg last year., external "But Sally from the Valley believes that she should see Olivia [Rodrigo] at $79 (£63) because, you know, she broke up with her boyfriend to that music. "So where do [artists] find that line where it's accessible, the fan feels connected to them [but] they don't feel like they're over-gouging?" No-one knows, he said, but "it's slowly moving up over time".
