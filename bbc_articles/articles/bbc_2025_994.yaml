title: Beyoncé, Black Sabbath and Kendrick Lamar fans braced for ticket scramble -
  and high prices - BBC News
date: '2025-02-14'
section: Culture
url: http://www.bbc.co.uk/news/articles/cm23605y1p5o
content: |-
  Tickets for Beyoncé's latest UK dates go on general sale on Friday, with prices reaching up to £950.

  Ticket sales for Beyoncé's highly-anticipated Cowboy Carter tour seem to have gone without a hitch, with many fans expressing surprise at how easy the process was. In contrast to the chaos surrounding Oasis and Taylor Swift's tours, online queues were kept to a minimum, and most people found the tickets they were looking for. "I was in straight away, only 600 in front of me," wrote one fan on Reddit. "I was able to find floor tickets for London even 30 min[utes] after general sale opened," added Shivam Arora on X, external. "Not bad, to be honest." Beyoncé's six UK dates at Tottenham Hotspur Stadium in London in June will be her first shows since 2023's record-breaking Renaissance Tour.

  Ticketmaster said prices ranged from £71 to £950, but cheaper tickets were also available direct from the stadium's own website. The BBC was able to access Ticketmaster's page shortly after tickets went on sale at 12:00 GMT on Friday; and found tickets available in almost every section. The stadium map slowly greyed out as seats were snapped up - but prices remained static, suggesting that "dynamic pricing" was not in place. None of the dates were completely sold out at the time of writing, although in some cases only single seats remained.

  Kendrick Lamar's tour is also expected to sell out quickly on Friday morning

  Beyoncé's tour launched on a massive day for concertgoers - with tickets also becoming available for Ozzy Osbourne's final gig with Black Sabbath plus Kendrick Lamar & SZA, Patti Smith, Beck, Morrissey, Mumford & Sons, Razorlight and Smashing Pumpkins. One fan told the BBC they were willing to pay up to £2,000 to attend Black Sabbath's charity concert in Birmingham, which will also feature performances from Metallica, Pantera, Anthrax, Gojira and members of Guns N' Roses. "This really is Ozzy's final show with Sabbath," said Alex Woodford. "I know it sounds crazy but I would be willing to pay silly money for it because it's going to be a once-in-a-lifetime show." British Beyoncé fan Ben Archer, who has attended all of her concerts since 2014's Mrs Carter World Tour, was among those who secured tickets. "She is the one artist I'm determined to see every time she tours," he told the BBC. Eleven years ago, he paid £60 for a standing ticket. This year, he paid almost four times that. "If tickets had always been this expensive I wouldn't have been able to see her as often as I have," he said. "I wonder if the increase in price leads to only the diehard fans (myself included!) attending at the expense of 'recruiting' potentially new/casual fans who may be willing to take a punt if it was cheaper."

  Taylor Swift's Eras tour broke box office records - with ticket receipts in excess of $2 billion

  Going to major gigs is an increasingly expensive pursuit. Before the pandemic, the cost of getting into a concert was increasing by 3% to 4% a year, according to Billboard Boxscore, which tracks ticket prices. That number more than doubled when touring resumed, with prices increasing by an average of 9.9% annually. The last time Beyoncé played in London, the cheapest ticket cost £56.25, while £2,400 VIP packages bought you a seat on the stage itself. An average ticket cost £139, according to figures from Pollstar, external. For this summer's shows, Ticketmaster says "tickets have been priced in advance for the tour, ranging from £71.60 to £950 (including fees)", but that doesn't include VIP packages. In this week's pre-sales, regular standing tickets were offered at £224.85 - but standing places in small areas closest to the stage were £858.10. For some tours, including Beyoncé's last one, prices go up as they are adjusted, based on demand, due to Ticketmaster's "dynamic pricing" scheme. That means fans logging on to claim a seat often don’t know what they’ll be charged.

  One person trying to combat the uncertainty is Fredrica Fekkai, a Beyoncé fan from Washington, DC, who has been crowd-sourcing data on prices for the star's new tour. She said some people who had accessed a fan pre-sale in the US had paid well over the odds - sometimes by hundreds of dollars - but most seats in the UK were within the advertised ranges. Fekkai decided to collate the data after buying her own tickets for the Cowboy Carter tour. In her city, the ticket seller didn't have to advertise the base price or mark-ups, and she found the process overwhelming. "I was on the page for hours, wondering what was a good deal," she tells the BBC. "I saw online [that] there was a lot of discussion on who was paying what, but of course, nothing was organised. I've worked in business consulting for years, so I'm used to finding the takeaways in messy information." After putting out a call on Reddit and TikTok,, external she received more than 1,000 responses from fans - and plotted the results on a graph, external to show the variance in price.

