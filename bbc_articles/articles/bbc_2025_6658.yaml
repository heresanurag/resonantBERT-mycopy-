title: 'Ceredigion: Dangerous driver involved in ''shocking'' crash - BBC News'
date: '2025-04-17'
section: General
url: http://www.bbc.co.uk/news/videos/cn4wj7198lpo
content: |-
  Swansea Crown Court heard that Peter Gilmore had 44 previous convictions for 104 offences.

  A van driver who seriously injured another road user after driving "erratically" has been jailed for two years and four months.

  Peter Gilmore, 51, was "flying" on the B4337 in the Talsarn area, in Ceredigion, when he took a corner on the wrong side of the road.

  Gilmore crashed straight into another vehicle in an incident the judge called "truly disturbing".

  He added that it was "pure luck" that Gilmore had not killed the driver of the other car.
