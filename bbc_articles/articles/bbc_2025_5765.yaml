title: Body found in search for Valentine's Day shooting suspect - BBC News
date: '2025-03-09'
section: England
url: http://www.bbc.co.uk/news/articles/cedl5enw27yo
content: |-
  Lisa Smith suffered serious injuries in a shooting in the car park of the Three Horseshoes pub.

  Lisa Smith was found dead outside the Three Horseshoes pub in Knockholt on 14 February

  A body has been found in the search for a suspect after a woman was killed in a shooting on Valentine's Day. Edvard Stockings is suspected of shooting his wife, Lisa Smith, in the car park of the Three Horseshoes pub in Knockholt, Kent, on 14 February. Police said they believed Mr Stockings then drove to the Queen Elizabeth II Bridge, near Dartford, and entered the Thames. Officers have now said a body was found in the river near Rainham, Essex, at roughly 15:45 GMT on Friday. The body has not been formally identified but the man's family have been informed.

  Mr Stockings is alleged to have shot Ms Smith, 43, from Slough, at about 19:00 before fleeing the scene. CCTV footage captured the sound of three gunshots, followed by shouting and screaming. Mr Stockings called his friend Leslie Thompson at 20:50 and told him: "She's dead, I love you. I'll see you on the other side." Mr Thompson said the call had convinced him Mr Stockings shot his wife after having a breakdown. A car and gun, both linked to the suspect, were found "next to the Dartford crossing", police said. They added that the car was found on the bridge.
