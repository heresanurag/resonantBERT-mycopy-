title: Shooting victim 'prevented from travelling for treatment' - BBC News
date: '2025-02-27'
section: Northern Ireland
url: http://www.bbc.co.uk/news/articles/c5yxxx8z258o
content: |-
  Sean O'Reilly's solicitor claims his client was denied travel to Scotland for treatment under anti-terrorism legislation.

  Shooting victim 'prevented from travelling to Scotland for treatment'

  Sean O'Reilly was shot twice while sitting in a taxi in the Bell Steel Manor area of Dunmurry

  The victim of a suspected republican feud shooting in Northern Ireland has been prevented from travelling to Scotland for surgery, his solicitor has claimed. Sean O'Reilly, 49, was shot twice in an attack in the Bell Steel Manor area of Dunmurry on Sunday. Mr O'Reilly's solicitor alleged he was denied travel under anti-terrorism legislation. The Police Service of Northern Ireland (PSNI) has said it was not its decision.

  Mr O'Reilly's solicitor said that they will be taking legal action "to establish who is responsible for the decision". Mr O'Reilly is currently believed to be under armed guard at the Royal Victoria Hospital in Belfast for his own safety. He has undergone surgery to remove a bullet from his collarbone. A scan showed he had also suffered a severed nerve in his left bicep and arrangements were made for specialist surgery in Glasgow. The PSNI contacted Police Scotland so it could arrange to manage the risk to him while in Glasgow. However, it is believed the hospital was then unwilling to admit him. Mr O'Reilly's solicitor Peter Corrigan said a surgeon said he requires treatment before Saturday "or the nerves will die".

  Peter Corrigan, Mr O'Reilly's solicitor, said that they are "not accepting" what is being said in the statement by the PSNI

  Speaking to BBC Radio Ulster's Evening Extra programme, Mr Corrigan said: "We're pursuing a judicial review against the trust, the PSNI, MI5 and the Scottish authorities to establish who is responsible for the decision not to give my client the emergency medical attention that he requires." He claimed that Mr O'Reilly's human rights were being violated by denying him emergency care. Mr Corrigan said that they are "not accepting" what is being said in the statement by the PSNI. "The time is ticking about who is responsible. I would urge the authorities, including the Scottish authorities, to provide him with the emergency care that he needs". Mr Corrigan said it was an "arbitrary, unlawful decision" which restricted his client's freedom of movement and that "there is no lawful basis to prevent my client" from travelling to Scotland. Republican Network for Unity, a small political group with links to the dissident organisation Óglaigh na hÉireann, has said Mr O'Reilly is one of its members.
