content: |-
  Sophie Ellis-Bextor is put on the spot about whether she'd be up for being next year's UK entry.

  Sophie Ellis-Bextor has addressed rumours she's been shortlisted to be the UK's Eurovision entry for 2024.

  She was put on the spot by BBC Breakfast presenters about her willingness to create Murder on the Dancefloor.

  Here's what she had to say.
