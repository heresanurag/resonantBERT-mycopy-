  Find out the results in your area in the Holyrood election.

  Polls have closed in the Scottish Parliament election, with counting taking place over Friday and Saturday.

  Search below to find the result in your area.

  A modern browser with JavaScript and a stable internet connection is required to view this interactive. More information about these elections Who won in my area? Enter your postcode, or the name of your English council or Scottish or Welsh constituency to find out. Eg 'W1A 1AA' or 'Westminster' A really simple guide to the 2021 elections

  In Scotland, voters choose 129 Members of the Scottish Parliament (MSPs). The party that wins the most seats will form the Scottish government.

  The vote came at the same time as elections for the Welsh parliament, mayoral elections in 13 of England's biggest city areas, council elections across England and Police and Crime Commissioner votes in England and Wales.
