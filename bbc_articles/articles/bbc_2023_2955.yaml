title: 'Ukraine war: UN condemns Russian invasion ahead of anniversary - BBC News'
date: '2023-02-24'
section: Europe
url: http://www.bbc.co.uk/news/world-europe-64748349
content: |-
  The resolution is approved by 141 countries, with just seven - including Russia - opposing it.

