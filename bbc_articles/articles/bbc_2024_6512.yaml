id: bbc_2024_6512
title: Transparency tool launched by BBC Verify - BBC News
date: '2024-03-05'
section: General
url: http://www.bbc.co.uk/news/world-68474465
content: |-
  BBC Verify has introduced a new feature to show audiences how we know what we know.

  BBC News has introduced a new ‘content credentials’ feature, which confirms where an image or video has come from and how its authenticity has been verified. It also uses new technology to embed this information within the image or video itself – helping to counter disinformation when the content is shared outside the BBC.

  This is the work done day in day out by BBC News teams, but this is the first time it’s been explained to audiences in this way.

  Correction 28 March: We constantly review our verification. In the original video showing the cemetery incident in Haiti you could hear gunfire - it has since been drawn to our attention that some of this was misleadingly edited in from an older unrelated video by a social media user. In line with our commitment to transparency, we have reviewed the video and muted the relevant passage of audio. We have also updated our commentary on the video to reflect those changes.
