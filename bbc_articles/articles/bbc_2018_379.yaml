  Sony shows off its robot pup at the CES tech expo to highlight its artificial intelligence skills.

  Sony's relaunched robot dog Aibo is winning plaudits for its maker at the CES tech show.

  And as the firm's chief executive Kaz Hirai explained to the BBC's Rory Cellan-Jones, it highlights its expertise at marrying together hardware and artificial intelligence.

