id: bbc_2023_14548
title: 'Watch: Police smash car window to save man trapped in flood - BBC News'
date: '2023-09-19'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-66847675
content: |-
  Video footage shows an officer wading through waist-deep water and using a baton to smash a window.

  A police officer in Atlanta, in the US, waded through waist-deep water to rescue a motorist trapped in floodwater.

  Officers had been dealing with a string of emergencies caused by the heavy rain, one of which occurred when the officer came across a partially submerged sedan with the driver still inside.

  The water was so deep that the vehicle was being lifted off the ground and that the doors could not be opened, the Atlanta Police Department said.

  The police officer used his baton to break the driver's side window and he and a fire department rescuer were able to take the driver to safety.
