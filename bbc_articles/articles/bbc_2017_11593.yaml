  The man hoping to turn Flyboarding into a full-time job after finishing second in his first competition.

  Flyboarder James Prestwood is able to soar above the water with the aid of a jet ski and a lengthy hose.

  He recently finished second in his first Flyboarding competition in Italy and now he's hoping to turn his hobby into a full-time job.
