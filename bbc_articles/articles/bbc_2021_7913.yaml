id: bbc_2021_7913
title: Girl, 13, dies after falling from roof of Largs building - BBC News
date: '2021-06-20'
section: Glasgow & West Scotland
url: http://www.bbc.co.uk/news/uk-scotland-glasgow-west-57546342
content: |-
  Police said there were no suspicious circumstances surrounding the girl's death in Largs on Saturday night.

  The girl fell off a roof in Aitken Street

  A 13-year-old girl has died after falling off the roof of a building in Largs.

  The accident happened on Aitken Street, Largs, at about 23:45 on Saturday.

  Emergency services attended but the girl was pronounced dead at the scene.

  Police said inquiries were ongoing but there did not appear to be any suspicious circumstances surrounding the teenager's death.
