title: Gareth Southgate lookalike cop serenaded by England fans - BBC News
date: '2024-07-11'
section: General
url: http://www.bbc.co.uk/news/videos/ckvgljxvqdxo
content: |-
  England supporters surrounded the bemused officer, singing "Southgate you're the one".

  England fans in Dortmund have praised Gareth Southgate for his apparent ability to moonlight as a police officer, as well as guiding England to the Euro 2024 final.

  Ahead of the Netherlands v England semi-final, the tourists spotted a police officer who bore a strong resemblance to the Three Lions' coach.

  Singing the fan-favourite adaptation of Atomic Kitten's Whole Again, the fans told the bemused cop that football was "coming home again".

  The video, filmed by Rob Toone from Derby, was shared widely on social media, including by the German Embassy in London.

