  The Royal couple will meet First Minister Vaughan Gething at the Senedd ceremony.

  King and Queen to visit Wales for Senedd's birthday

  King Charles III and Queen Camilla will visit Wales on Thursday to mark 25 years of the Senedd

  King Charles III and Queen Camilla are set to visit Wales to mark 25 years of the Welsh Parliament. Thursday's visit will see the King at the Senedd for the first time since his tour of the UK following his accession. The royal pair will receive a guard of honour from the Royal Welsh before they are greeted by primary school children from across Wales. They will then meet First Minister Vaughan Gething and other party and parliamentary leaders in Wales.

  Once inside, the King and Queen will hear a performance from Mared Pugh-Evans, the King's new harpist, in her first performance in the position. After a performance from a choir from a local primary school, Ysgol Treganna, King Charles will give a speech marking the 25th anniversary of the Senedd. Before leaving, the King and Queen will have the opportunity to meet members of the community and members of Senedd staff who have worked at the parliament for 25 years. In his last visit to Senedd, the King - formerly the Prince of Wales for 64 years - gave his first address in Welsh as Monarch. In it, he said Wales had a "special place" in the heart of his mother, Elizabeth II.
