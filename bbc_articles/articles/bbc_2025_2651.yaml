  Trump's first major remarks on Middle East policy shattered decades of US thinking on the Israeli-Palestinian conflict. "The US will take over the Gaza Strip, and we will do a job with it too," he told reporters at the White House on Tuesday night, alongside the visiting Israeli prime minister. "We'll own it and be responsible for dismantling all of the dangerous unexploded bombs and other weapons on the site, level the site, and get rid of the destroyed buildings." Trump said Palestinians living in Gaza would have to be relocated to achieve his vision of creating "the Riviera of the Middle East", and that they would be housed in Jordan, Egypt and other countries. When asked whether the refugees would eventually be allowed to return, he said that "the world's people" would live in Gaza, before adding "also Palestinians". Trump also brushed aside previous objections from Jordan and Egypt's leaders to taking in refugees, insisting that they would eventually "open their hearts and will give us the kind of land that we need to get this done". Netanyahu later said there was nothing wrong with idea of "allowing the Gazans who want to leave to leave" the territory. "They can leave, they can then come back, they can relocate and come back. But you have to rebuild Gaza," he told Fox News on Wednesday. A unnamed senior Israeli official was also quoted as saying that Trump's ideas surpassed all his "expectations and dreams". Far-right Israeli Finance Minister Bezalel Smotrich said the proposal was "the real answer to 7 October" and pledged to "definitively bury... the dangerous idea of a Palestinian state".

  Secretary of State Marco Rubio has characterised the plan as a "generous offer" to rebuild Gaza, not as a hostile takeover. And Defense Secretary Pete Hegseth praised Trump's "outside the box" thinking and said the Pentagon was "prepared to look at all options" related to the enclave.

  The Palestinian leadership condemned the plan in a statement issued on Wednesday. "These calls represent a serious violation of international law," Abbas said, adding that "peace and stability will not be achieved in the region without the establishment of a Palestinian state". Abbas leads Hamas rivals Fatah and governs parts of the Israeli-occupied West Bank. He declared that Palestinians would not "give up their land, rights, and sacred sites" and that the Gaza Strip was an "integral part of the land of the State of Palestine, along with the West Bank and East Jerusalem". The head of the Palestinian mission to the UK, Husam Zomlot, told the BBC: "It's a call for ethnic cleansing, for the forced displacement and expulsion of a people from their native land. It is immoral, it is illegal, and it is dangerous." Hamas - which is proscribed as a terrorist organisation by Israel, the US, the UK and other countries - said in a statement that Trump was "aiming for the United States to occupy the Gaza Strip". It warned that his proposal was "aggressive to our people and cause, won't serve stability in the region and will only put oil on the fire". Palestinians in Gaza also said the plan was completely out of the question. "We have endured nearly a year and a half of bombings and destruction, yet we remain in Gaza," one man told BBC Arabic. "We would rather die in Gaza than leave it. We will stay here until we rebuild it. Trump can do as he pleases, but we firmly reject his decisions."

