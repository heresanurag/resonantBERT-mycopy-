  Palestinians also fear a repeat of the "Nakba", or "catastrophe", when hundreds of thousands fled or were driven from their homes before and during the war that followed the creation of the State of Israel in 1948. Many of those refugees ended up in Gaza, where they and their descendants make up three quarters of the population. Another 900,000 registered refugees live in the West Bank, while 3.4 million others live in Jordan, Syria and Lebanon, according to the UN. Israel withdrew its troops and settlers from Gaza in 2005, though it retained control of its shared border, airspace and shoreline, giving it effective control of the movement of people and goods. Saudi Arabia's foreign ministry said the kingdom "unequivocally rejected" Trump's proposal and said it would continue its efforts to establish an independent Palestinian state. Egypt's foreign minister said he had agreed with the Palestinian Authority prime minister on the importance on moving forward with "early recovery projects" without Palestinians leaving Gaza. While Jordan's King Abdulla said he rejected any attempts to "annex land or displace Palestinians", Turkish Foreign Minister Hakan Fidan said it was "absurd to even consider" the relocation of Palestinians from Gaza. Western governments also expressed alarm about any forced displacement. France's foreign ministry said it would mean a "serious violation of international law" an attack on the Palestinian aspirations and would represent a "major obstacle to the two-state solution". UK Prime Minister Sir Keir Starmer said Palestinians "must be allowed home". "They must be allowed to rebuild, and we should be with them in that rebuild on the way to a two-state solution," he told Parliament.
