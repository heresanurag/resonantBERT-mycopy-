title: Palestinians and Arab states reject Trump's Gaza takeover plan - BBC News
date: '2025-02-05'
section: World
url: http://www.bbc.co.uk/news/articles/c4gw89x8x11o
content: |-
  The Palestinian president, Hamas and neighbouring countries condemn the idea of resettling Gazans abroad.

  Most of Gaza's 2.1 million population has been displaced by the 15-month war between Israel and Hamas

  The Palestinian president has said he strongly rejects President Donald Trump's proposal for the US to take over Gaza and resettle the 2.1 million Palestinians living there. "We will not allow the rights of our people... to be infringed on," Mahmoud Abbas stressed, warning that Gaza was "an integral part of the State of Palestine" and forced displacement would be a serious violation of international law. Hamas, whose 15-month war with Israel has caused widespread devastation, said Trump's plan would "put oil on the fire" in the region. The idea has been rejected by countries in the region such as Jordan and Egypt, and key US allies, while the UN issued a warning against "any form of ethnic cleansing".

  UN Secretary General Antonio Guterres said Gaza was an integral part of a future Palestinian state, telling a meeting in New York the rights of Palestinians to live as human beings in their own land was slipping further out of reach. The world, he said, had "seen a chilling, systematic dehumanisation and demonisation of an entire people". Saudi Arabia said Palestinians would "not move" from their land and it would not normalise ties with Israel without the establishment of a Palestinian state. But Israeli Prime Minister Benjamin Netanyahu said Trump's proposal could "change history" and was "worth paying attention to". Later on Wednesday, the White House sought to clarify President Trump's proposal, with spokeswoman Karoline Leavitt telling journalists the president was committed to rebuilding Gaza and "temporarily" relocating its residents. Trump said on Tuesday the displacement would be permanent. She also said the president had not committed to sending US troops to Gaza. Trump's comments come two weeks after the start of a fragile ceasefire in Gaza, during which Hamas has released some Israeli hostages it is holding in exchange for Palestinian prisoners in Israeli jails. The Israeli military launched a campaign to destroy Hamas in response to an unprecedented cross-border attack on 7 October 2023, in which about 1,200 people were killed and 251 were taken hostage.
  • None 'We won't go out of Gaza': Palestinians express shock and defiance
  • None Why does Trump want to take over Gaza and could he do it?
  • None Trump's Gaza plan will be seen as flying in face of international law More than 47,540 people have been killed and 111,600 injured in Gaza since then, according to the territory's Hamas-run health ministry. Most of Gaza's population has also been displaced multiple times, almost 70% of buildings are estimated to be damaged or destroyed, the healthcare, water, sanitation and hygiene systems have collapsed, and there are shortages of food, fuel, medicine and shelter.

