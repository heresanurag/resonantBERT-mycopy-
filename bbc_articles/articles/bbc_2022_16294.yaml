  Bukayo Saka is rated the best player as England lose to France in the Fifa World Cup quarter-final in Qatar.

  World Cup: Bukayo Saka rated best player as England lose to France Last updated on .From the section World Cup

  Bukayo Saka was rated player of the match by BBC Sport users as England bowed out of the World Cup with a 2-1 quarter-final defeat by France. Saka won the first penalty of the game which Harry Kane converted to level after Aurelien Tchouameni's opener. But Kane then missed a second attempt from the spot after Olivier Giroud had restored France's lead in Qatar. Theo Hernandez, who gave away his side's second penalty, was France's lowest-scoring player with 4.73.
