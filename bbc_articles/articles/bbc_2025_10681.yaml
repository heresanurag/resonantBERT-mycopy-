title: Plymouth acid attack victim dies in hospital - BBC News
date: '2025-05-05'
section: Devon
url: http://www.bbc.co.uk/news/articles/ckg2kw1n9kzo
content: |-
  Danny Cahalane, 38, was described as an "outstanding father and son" by his family.

  Nine people have been charged in connection with the attack on Danny Cahalane

  A man who was attacked with acid in his own home has died in hospital, police have said. Danny Cahalane, 38, who was described as an "outstanding father and son", was at home with his daughter when he was attacked in Lipson Road, in Plymouth, on 21 February. He died on Saturday, Devon and Cornwall Police said. Mr Cahalane's family said in a tribute: "As a family, we are struggling to come to terms with Danny's passing. He is well loved by his family and friends and as a family we cherish his love and memories." Nine people - seven men from London and two women from Plymouth - have been charged in connection with the attack.

  Police officers were called to the property on Lipson Road at about 03:55 GMT on 21 February

  Six of the men and both women have been charged with conspiracy to murder and conspiracy to kidnap. Another man has been charged with applying a corrosive fluid with intent to burn, maim, disfigure or do grievous bodily harm, aggravated burglary, possession of an offensive weapon, and drug offences. Four of the men have also been charged with laundering the proceeds of crime. Eight of the defendants are due to appear at Plymouth Crown Court on 12 May and another is due to appear before the same court on 16 June. Mr Cahalane's family asked for "privacy and respect during this time". Senior investigating officer, Det Supt Ben Davies, said: "Our thoughts are with Danny's family and friends at this sad time."
