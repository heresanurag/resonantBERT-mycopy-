id: bbc_2025_8169
title: Myanmar fighting continues despite post-earthquake ceasefires - BBC News
date: '2025-04-07'
section: Asia
url: http://www.bbc.co.uk/news/articles/cp31wk21zveo
content: |-
  The UN received reports that Myanmar's military had conducted attacks, while the military accused rebels of the same.

  Buildings collapsed in the hardest-hit city of Mandalay

  Fighting has been reported in Myanmar despite the military junta and a rebel group alliance announcing temporary ceasefires to support earthquake relief. As of Friday, the military had carried out at least 14 attacks since the ceasefire, according to reports received by the UN Human Rights office. The military accused two rebel groups in the alliance that declared a ceasefire of carrying out attacks. One group said fighting broke out in response to "offensives" by the military. Maj Gen Zaw Min Tun, military council spokesman, issued a general statement saying "we will respond if military bases are attacked without reason". An army spokesman did not respond to BBC Burmese's request for comment.

  UN High Commissioner for Human Rights Volker Türk urged "a halt to all military operations" and a focus "on assisting those impacted by the quake, as well as ensuring unhindered access to humanitarian organisations" following the 7.7 magnitude quake on 28 March. A civil war has been ongoing between the junta - which seized power in a 2021 coup - and ethnic militias and resistance forces across the country. The military council declared a 20-day ceasefire on 2 April, after the alliance made up of three rebel groups had announced one. The official death toll from the earthquake in Myanmar rose to 3,564 on Monday, according to state media. Another 5,012 people were injured and 210 people remain missing.

  People sleep outside after the earthquake in Mandalay

  More than a week after the earthquake, rescue workers were recovering bodies from the rubble of collapsed buildings in Mandalay over the weekend, state media reported. Rain also fell over the weekend, which aid groups said could hamper relief efforts. The UN Human Rights office said on Friday that while humanitarian efforts had progressed in areas where access had been granted, "longstanding limitations imposed by the military on humanitarian operations and access" meant that multiple badly affected areas "have remained inaccessible to humanitarian emergency assistance – except for what can be organised locally by residents". UN humanitarian chief Tom Fletcher said in a video filmed in Mandalay on Saturday that people "need food. They need water. They need the power back on. They're telling me that they need shelter". Aftershocks continue, with a 4.9 magnitude earthquake recorded over the weekend, and people are "living with that trauma", he said. Before the earthquake, almost 20 million people were already in need in this community, he added. "So it's a compounding crisis. It's earthquake, on top of conflict, on top of huge existing need," he said.
