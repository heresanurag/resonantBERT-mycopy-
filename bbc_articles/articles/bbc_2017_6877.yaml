  Bringing you the latest news, sport, travel and weather from across the North East on Friday 14 July 2017.

  That's all for the day and for this week - thank you for joining us.

  To keep up with what's happening over the weekend, head to BBC Tees, BBC Newcastle, Look North, and online.

  You can tweet your photos to @BBCNewsNE , email them, or contact us via our Facebook page .

  We'll be back on Monday from 08:00.

  Our coverage today has been dominated by the funeral of Bradley Lowery. We'll leave you with this video of his school friends celebrating his life.
