title: 'Jordan Pickford: Police investigate alleged incident involving England goalkeeper
  - BBC Sport'
date: '2019-04-01'
section: General
url: http://www.bbc.co.uk/sport/football/47779510
content: |-
  Northumbria Police is investigating an alleged incident involving England goalkeeper Jordan Pickford.

  Last updated on .From the section Everton

  Video published on social media appears to show the Everton player, 25, involved in a fracas on a street.

  "At 12:19am (Monday), police received a report of a disturbance involving a large group of individuals on Tunstall Road, Sunderland," a spokesperson said.

  "Enquiries are ongoing to determine the circumstances surrounding the incident and locate those involved."

  They added: "Nobody is believed to have been seriously injured and no arrests have been made."

  Everton had earlier confirmed that they are also investigating. The FA is aware of the incident but it is seen as a club matter.

  "The club has been made aware of an alleged incident involving one of our players and we are looking into the matter," Everton said.

  Pickford played on Saturday as the Toffees beat West Ham 2-0 at London Stadium.

  He became the most expensive British goalkeeper in history after Everton paid £25m to sign him from Sunderland in June 2017.

  Pickford won the first of his 17 England caps in November 2017 and went on to secure the number one shirt.

  At the 2018 World Cup he played a starring role as England reached the semi-finals for the first time since 1990.

  His save from Carlos Bacca against Colombia in the last-16 match helped England win a World Cup penalty shootout for the first time.
