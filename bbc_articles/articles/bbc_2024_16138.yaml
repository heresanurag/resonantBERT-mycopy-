title: Former South Pelaw Post Office worker returns home after 16 years - BBC News
date: '2024-07-22'
section: General
url: http://www.bbc.co.uk/news/videos/c4ng0702d22o
content: |-
  Former Post Office worker Stephanie Gibson says she felt driven to leave South Pelaw.

  A former Post Office clerk wrongly accused of theft has returned to her village for the first time after being shunned by the community in 2008.

  Stephanie Gibson was found not guilty amid the Post Office Horizon scandal, but was targeted with bricks through her window and paint stripper was poured on her car in South Pelaw.

  She said she felt compelled to move her family out of the area.

  Sixteen years later, she has returned as part of a BBC iPlayer documentary that explores the impact of the scandal.

  The Post Office said it was sorry for the suffering caused to many people. It adds it is committed to "transforming today's Post Office".

