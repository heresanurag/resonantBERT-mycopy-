title: 'Alan Hawkshaw: Grange Hill and Countdown composer dies aged 84 - BBC News'
date: '2021-10-16'
section: Entertainment & Arts
url: http://www.bbc.co.uk/news/entertainment-arts-58942671
content: |-
  As well as his TV career, Alan Hawkshaw was in the Shadows and toured with the Rolling Stones.

  Alan Hawkshaw - pictured backstage at Top of the Pops while in The Shadows - composed the music for 35 films and "countless" television shows

  The musician who wrote the theme tunes for Grange Hill, Countdown, and Channel 4 News has died aged 84.

  Alan Hawkshaw was also a member of The Shadows, toured with the Rolling Stones, and was sampled by Jay-Z.

  He was admitted to hospital this week with pneumonia and died in the early hours of Saturday, his agent said.

  His wife Christiane said: "It was heartbreaking to say goodbye to Alan, my husband of 53 years and the love of my life."

  She added: "We spent the last few hours gazing at each other with love, holding hands, no need for words.

  "I told him he and I were forever, and even though he has been unable to speak for the past two months, he managed a few 'forevers' and I knew he was at peace."

  Hawkshaw wrote the music for more than 35 films and "countless" television programmes, his website said.

