content: |-
  The family of Harvey Willgoose share pictures and tributes following his death on Monday.

  Stabbed teen's family say 'our hearts are broken'

  Harvey Willgoose died following a stabbing at a school in Sheffield on Monday

  The family of a 15-year-old boy stabbed to death at school have spoken of their heartbreak. Harvey Willgoose died following an incident at All Saints Catholic High School in Sheffield on Monday. Sister Sophie said her heart had been "broken into a million pieces". A 15-year-old boy, who was arrested on suspicion of murder, remained in police custody, South Yorkshire Police said.

  In a post on Facebook, accompanied by two pictures of her brother, Sophie wrote: "I love you so much Harvey. "Hug your loved ones a little tighter tonight cos I wish I could." Harvey's mother Caroline shared posts with her 56,000 followers on TikTok to express her loss. In one, she wrote, "our Harvey, no words" with broken heart emojis and a montage of images of them together. In another, she wrote: "My Harvey, life is never gunner be the same. Love you so much."

  Police remain at the scene at All Saints Catholic High School in Sheffield on Tuesday morning

  Shocked parents and pupils continued to leave flowers and cards outside the closed school gates on Tuesday. The school shut its doors on Monday afternoon in the aftermath of the stabbing, which took place at about 12:17 GMT. Lines of parents gathered at the school, which instituted a lockdown procedure, to collect their children as police shut off a section of the road outside. Parent Katie said she waited for over two hours for her 13-year-old daughter Gracie. "It was the worst two and a half hours of my life," she said. "She couldn't use her phone, I couldn't get in touch with her personally, it was just going on what her teacher told me. "I was told she was safe and that she was calm but I wanted to speak to her and talk to her."

  Gracie said the school had also previously gone into lockdown on 29 January. A message sent to parents from the school said this was due to "threatening behaviour between a small number of students where threats were made of physical violence". When it happened on Monday, she said she had been on her way to get food with a friend when she heard shouting about a knife and "just ran". "I can't remember much else about what happened afterwards," she said. "At first it had shocked me. When I was with my teachers it felt OK and I felt more calmed down, and then I saw my mum." Gracie said while she was not close friends with Harvey, he seemed like "a proper nice boy". "Whenever you'd see him around school, he'd always have a smile on his face," she said. "He had such a bubbly personality."

  Police officers near a cordon inside All Saints Catholic High School on Tuesday

