title: Bad weather brings rise in insurance claims - BBC News
date: '2024-08-11'
section: Business
url: http://www.bbc.co.uk/news/articles/c4glpz587q5o
content: |-
  Payouts hit a high but homeowners faced hikes in premiums and providers face further criticism.

  Storms and heavy rain all contributed to the highest property insurance payouts for at least seven years, insurers say. A total of £1.4bn was paid out to homeowners and businesses between April and the end of June, the Association of British Insurers (ABI) said. This was up 5% on the previous three months, and the highest quarterly figure since comparable records began in 2017. But billpayers have faced sharp rises in premiums and a consumer group said some insurers were still stalling on payouts.

  Data shows that the late autumn, winter and early spring months brought a deluge of rain to the UK. Total rainfall between October 2023 and March 2024 was the UK's second wettest period on record.

  The ABI said the continuing adverse weather meant April to June was the fifth consecutive quarter that weather-related claims had been above £100m. Claims for damage to homes from storms, heavy rain and frozen pipes reached £144m, with weather the leading factor for domestic payouts. Other issues including subsidence added to the insurers' total payouts. Providers have faced their own rising costs, when the rate of inflation was high, but billpayers saw the average combined home and contents premium rise by 19% in the second quarter of the year compared with a year earlier. And Sam Richardson, from the consumer group Which?, said insurers still had criticisms to answer. "Good quality home insurance is increasingly important, yet customers with these products face some of the lowest claims acceptance rates," he said. "While some home insurers' prices are going up, research has found that some are prolonging customers' ordeals by failing to deal with claims in an appropriate manner. “Some home insurance customers who can't afford to pay for cover in one annual lump sum, and instead pay monthly, are also being hit by huge rates of interest." Louise Clark, policy adviser at the ABI, said providers were doing all they could to provide "competitively priced cover". She also called on the government to take action on tackling the causes and impact of flooding. The average payout for a home insurance claim rose 16% on the first three months of the year to £5,284 in the April to June period.
