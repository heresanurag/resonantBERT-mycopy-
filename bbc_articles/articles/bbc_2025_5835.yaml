  Palmer is on a nine-game goalless run in all competitions, extending back to his last goal on 14 January against Bournemouth. The last time he registered an assist stretched back even longer to 1 December, these being his longest barren runs since joining Chelsea. But there are numbers behind these two headline statistics that reveal more about this run in the league. In chasing that elusive goal, Palmer is shooting more with 4.2 shots per game in matches since he last scored compared to 3.6 beforehand, though his shots inside the box remain the same at 1.9 per match. He is also averaging 5.2 touches in the opposition box since his last goal which is up from 4.0 but, despite being up on certain metrics, his expected goals, excluding penalties, has dropped to 0.39 from 0.46, which suggests the quality of chances that he is being presented with are worse. Palmer remains Chelsea's top goalscorer in the Premier League on 14 goals this season. However, despite certain metrics increasing on shots taken, Palmer's creative stats are down in the league. He is down from 2.8 chances per 90 minutes created since his last assist on 1 December to 2.5 - and chances created from open play (excluding set-pieces) is down from 2.5 to 1.8. The quality of the chances he has created, however, is up to 0.30 per game from 0.22. The expected assists, the ranking which ranks how likely a player is to score from a chance that is created, is 4.73 which suggests that his team-mates should have scored at least four goals from his passes and crosses since the start of December.

  It still does not feel like Chelsea are fully back to form despite back-to-back wins for the first time since between November and December. On Sunday, Chelsea supporters again booed players who passed the ball backwards and, after Cucurella's goal, Maresca turned to supporters and told them to pump up the volume. When addressing the situation in his post-match comments, the Italian added: "People have to understand this is our way, our style, and this is the way we are going to play. When a team creates the number of chances we created today you have to be happy. "It's not easy. Leicester until minute 83 were 0-0 against Arsenal. The same thing happened against [Manchester] City. If you think football is just PlayStation and you win easy? No way. Every game is difficult." The Blues had looked like title contenders while in second place December and the fans were chanting "we've got our Chelsea back" during a win at home to Brentford. However, they then went on a run of just two wins in 10 matches and the chants of "we want our Chelsea back" returned from last season. But victory, even if unconvincing, sees Chelsea leapfrog Manchester City and move back in fourth place with Champions League qualification back in the club's sights for the first time under this new ownership. Arsenal and Tottenham are up next for Chelsea, with fixtures against Liverpool, Newcastle and Manchester United also to come in their final 10 league matches.
