  A firefighter dressed as Santa abseils down a bridge in Guatemala City to give gifts to children.

  A firefighter dressed as Santa Claus abseiled down a bridge in Guatemala City to give gifts to children.

  Municipal firefighter Hector Chacon donned the red robes and beard, and with the help of his colleagues descended 70m to greet dozens of children waiting for him below.

  Mr Chacon, 78, has done this for 27 years and says the stunt is to spread festive cheer to children from low-income families.

  "I believe all children deserve to have a toy for this time of the year," he said.
