content: |-
  Sofia Brizio left her "very inaccessible" hometown in search of a more independent life at 18.

  Sofia Brizio, who lives with cerebral palsy, calls swimming her "freedom"

  Sofia Brizio left her "very hilly, very old and very inaccessible" hometown of Bergamo in Italy in search of a more independent life at 18.

  The 26-year-old, who lives with cerebral palsy, left behind her family and friends to work, train and study in Cardiff, while travelling back to Italy to compete.

  "Swimming is my freedom," said Sofia.

  Her first lessons in the pool, however, are not fond memories.

  She described how she used to "hate" lessons with coaches who separated her from other children.

  At the age of 14 she found a para-swimming group that "became a habit I couldn't do without".

  Sofia competes nationally for a team in Italy despite living in Wales

  But as a teenager she said she longed for more independence, recalling how she was unable to get a ramp for her home because it was in a historic building.

  "The only thing that gave me that sense of independence was swimming, but that wasn't really enough I guess. So I decided that I was going to study in the UK, because I was under the impression that I would get better support there than I would in Italy," she added.

  Sofia, who freelances as a teaching associate, writer and translator alongside her studies and training, said it was "a lot easier" to juggle her demanding schedule.

  "I wouldn't change a thing to be honest because I like the teaching, the translating, I like the writing, but I also like the swimming... and it is a great catalyst for my work," she said. "I've written entire articles when I was swimming, you know, in my head."

  Sofia trains alone by memorising sets sent to her by her coach in Italy on the messaging service WhatsApp.

  It means the rare occasions when she gets to train with her Italian team PHB Polisportiva Bergamasca in person can be problematic.

  "When I go back to Italy and train with my coach, sometimes I have to ask her to repeat what she just said, because I'm no longer used to listening to someone give me instructions," she laughed.

  Sofia says swimming has been "lifesaving" for her

  She said her discipline had helped her on days when she did not want to swim.

  "I had years where I struggled a lot with my mental health, so I would just wake up in the morning and feel like I want to cry," she explained. "But then I still got up and went swimming because I had a set there ready for me to do."

  It is this "lifesaving" power of sport that Sofia wants to share by making a short documentary.

  Along with director Alexia Barrett, she is crowdfunding to try to make the Power of the Current project a reality.

  Director Alexia Barrett says she is inspired by Sofia as a "regular person doing amazing things"

  The pair met through mutual friends in Cardiff and "got chatting over coffee".

  "She casually mentioned she might not be around because she was doing some swimming, I thought she meant as a casual thing," Alexia said.

  Inspired by Sofia's drive, the filmmaker said she wanted to tell the story of "a regular person doing amazing things" at film festivals all over the world.

  The 24-year-old is raising money to help pay for kit hire, archive race footage and travel costs.

  "We want it to be shot high-end, glossy, some nice 4k slow-mo shots," she added. "We want her to look like the star that she is."

  But Sofia, who can be camera-shy, said she would rather share the spotlight.

  "I want it to be a story of passion and determination and friendship as well," she said.

  "Because I wouldn't be able to do all the things that I do if I didn't have the people that I have supported, my family, my coach, my teammates and my friends in Cardiff," she added.
