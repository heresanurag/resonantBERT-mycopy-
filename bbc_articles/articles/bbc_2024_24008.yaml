title: British woman dies in flash floods on Majorca - BBC News
date: '2024-09-05'
section: Europe
url: http://www.bbc.co.uk/news/articles/cj62g0e9kg6o
content: |-
  A British man who was hiking with her is missing, police on the Spanish island say.

  Rescue teams searching the area in Majorca by helicopter

  The body of a British woman has been found in Majorca, with a man still missing, after the pair were caught up in flash floods, police on the Spanish island say. Rescue services had been looking for the two in the Torrente de Pareis canyon area since Monday. Spain’s Civil Guard say the two were hiking on a trail from the canyon to the Mediterranean Sea. Ten other tourists trapped by the floods were rescued. Strong winds and heavy rain have been forecast in the area.

  The Civil Guard released footage of a search-and-rescue team helping a group of hikers stuck in the area. The head of the Mountain Rescue Group brigade in the Balearic islands said the 10 rescued had been "were surprised by the storm". "They were the ones who told us that they had seen two people who had been swept away by the water," Juan Carlos Rodriguez said. Local authorities had warned of "very intense storms" and urged people to avoid outdoor activities. Police said on Wednesday that the search had been paused because of poor weather conditions.
