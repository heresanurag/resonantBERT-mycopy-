content: |-
  Missed today's coverage? Here are some of the most important moments from the last 24 hours.

  Millions of voters have cast their ballots in local, mayoral and police and crime commissioner elections in England and Wales.

  Labour have won key councils and regional mayors in England, with the Conservatives losing six councils and more than 400 councillors.

  Labour has gained over 160 council seats, taking control of eight councils, including Milton Keynes and Nuneaton, where there are traditional bellwether seats for general elections.

  The results are still continuing to come in but here's a selection of key moments so far.
