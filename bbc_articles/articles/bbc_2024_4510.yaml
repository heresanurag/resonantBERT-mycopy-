title: 'Cheltenham Gold Cup 2024: Galopin Des Champs wins again for Willie Mullins
  - BBC Sport'
date: '2024-03-15'
section: Horse Racing
url: http://www.bbc.co.uk/sport/horse-racing/68536701
content: |-
  Galopin Des Champs defends the Cheltenham Gold Cup to crown a historic week for trainer Willie Mullins.

  Galopin Des Champs is already being lined up for a shot at a third Gold Cup by his trainer Willie Mullins

  Galopin Des Champs defended the Cheltenham Gold Cup to crown a historic week for trainer Willie Mullins. The 10-11 favourite, ridden by Paul Townend, won in style from Gerri Colombe with Corach Rambler third. It was a fourth Gold Cup victory in six years for Mullins, who reached 100 Cheltenham Festival wins on Wednesday. In the race's centenary year, he is the first trainer to win twice with two different horses after also scoring with Al Boum Photo in 2019 and 2020.

  Galopin Des Champs had to contend with the attentions of loose horse Fastorslow, who had earlier unseated JJ Slevin, but Townend kept his cool to become only the second jockey after Pat Taaffe to win the Gold Cup four times The winner had always been prominent and secured victory by three and a half lengths from Gerri Colombe (13-2) with Grand National winner Corach Rambler a further nine and a half lengths behind. "I think he just put himself into the superstar category, to do what he did and the way he did it with the loose horse," said Mullins. "We will come back and try to win it for a third time. He has the ability to do it." Townend said of his mount: "What makes him a champion? His heart probably. We had to go through reserves which only special horses have. "I don't even remember my thought process in dealing with the loose horse to be honest. All you are doing is reacting in a split second, so it's kind of instinct and luck."

  Willie Mullins has now won four Gold Cups

  It was a return to normal business for Mullins at Cheltenham after a blank day on Thursday as he took Friday's opening two races. Majborough claimed the Triumph Hurdle for the trainer's seventh victory of the week. The 6-1 winner, ridden by Mark Walsh for owner JP McManus, led home a Mullins 1-2 with Kargese in second. Absurde, a 12-1 chance who won last year's Ebor Handicap on the Flat before finishing seventh in the Melbourne Cup, claimed the County Hurdle under Townend. That sealed the leading trainer title at the Festival for the 11th time in the last 14 years. Gordon Elliott, the last man other than Mullins to top the standings in 2018, took the Albert Bartlett Novices' Hurdle with 33-1 chance Stellar Story as jockey Sam Ewing secured his first Festival win. It denied former football manager Harry Redknapp another winner with his horse The Jukebox Man, trained by Ben Pauling, just edged out. Redknapp savoured success 24 hours earlier with stablemate Shakem Up'Arry. Sine Nomine, ridden by John Dawson, took the Hunters' Chase for trainer Fiona Needham. Needham, clerk of the course at Catterick, had also won the race in the same colours as a jockey 22 years ago on Last Option, owned, trained and bred by her father Robin Tate. Mullins was denied in the Paddy Power Mares' Chase as Dinoblue was edged out by Limerick Lace (3-1), who won for jockey Keith Donoghue and trainer Gavin Cromwell in a 1-2 for owner JP McManus. The concluding Martin Pipe Hurdle went to Elliott and rider Danny Gilligan with Better Days Ahead.

