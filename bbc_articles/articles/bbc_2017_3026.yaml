title: 'Redrawing women: Tackling sexism in comic books - BBC News'
date: '2017-02-16'
section: General
url: http://www.bbc.co.uk/news/entertainment-arts-38985566
content: |-
  Women are fighting back against sexism in an industry steeped in a history of hyper-sexualised female characters.

  Some in the comics community aren't happy with this push for gender parity in the work place, online and on the page but one way or another, the industry is changing.

  This video can only be viewed in the UK for copyright reasons.

  Thanks to Thought Bubble in Leeds and Gosh! Comics in London.
