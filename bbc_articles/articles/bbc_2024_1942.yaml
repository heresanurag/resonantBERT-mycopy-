content: |-
  Liz Truss faces questions on a range of topics, including claims she made in a US speech.

  Liz Truss faces questions on a range of topics, including her remarks at a US conference.

  The former prime minister spoke at the Conservative Political Action Conference (CPAC) last week, claiming her efforts to cut taxes were “sabotaged” by “the deep state”.

  Ms Truss later took part in an interview with Steve Bannon, Donald Trump's former chief strategist, and remained silent as he called Tommy Robinson a “hero”.

  Both Labour and the Liberal Democrats accused Ms Truss of spreading "conspiracy theories".

  She was also asked for her views on former Tory MP Lee Anderson's comments.
