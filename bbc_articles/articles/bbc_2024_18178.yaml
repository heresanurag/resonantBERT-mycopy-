id: bbc_2024_18178
title: Anti-racism campaigners march in central Belfast - BBC News
date: '2024-08-10'
section: Northern Ireland
url: http://www.bbc.co.uk/news/articles/c8xljlezljvo
content: |-
  Several thousand gather in Belfast city centre for another demonstration following a week of disorder.

  Crowds of campaigners lined the street in front of Belfast City Hall

  Several thousand anti-racism protesters gathered in Belfast city centre on Saturday for another demonstration following a week of disorder and racist attacks. The rally was organised by a collective of organisations, including the trade union movement, United Against Racism and End Deportations Belfast. United Against Racism said the event was intended to be a "peaceful response to racist violence of recent days". "These are our streets, and we will not concede them to the racist forces who want to divide us," said the campaign group's chair, Fiona Doran.

  The demonstration began in Writers' Square at noon on Saturday

  Those attending Saturday's rally gathered in Writers' Square at noon before marching to the front of Belfast City Hall. Placards with 'Ulster says no to racism' and 'Ulster says yeo to diversity' were among those waved by campaigners. “Today was an amazing celebration of all that is good about our diverse city,” Ms Doran said. “Now more than ever, we are determined to make Belfast an anti-racist city that prides itself on diversity. "We will continue to fight to overcome the racist policies of the government, which punishes migrants, asylum seekers and refugees for coming here, and demonises people from religious and ethnic minority backgrounds." Organisers said about 15,000 people took part in the rally.

  Shortly after the rally began, the Police Service of Northern Ireland (PSNI) gave an update on their response to the upsurge in racially-motivated hate crimes. They confirmed they are investigating an attempted petrol bombing of a mosque in Newtownards, County Down. The device failed to ignite when it was thrown at the mosque on Friday, but racist graffiti was daubed on the building. To date, 32 people have been arrested for offences linked to the recent disorder and racist attacks.

  Mairead Sullivan and her daughter Nora joined the anti-racism protest

  One protester taking part in Saturday's march said the event was about "reclaiming our streets". As they marched down Royal Avenue, the crowds chanted "Whose streets? Our streets" and "Belfast is anti-racist". Mairead Sullivan and her daughter Nora also attended the parade and said they would protest every week if they needed to. "I always taught my kids to respect everybody and treat them how you'd want to be treated, and we have to put our words into actions," she told BBC News NI. Mairead was born in Belfast but her family moved to the United States to escape the Troubles. She returned 12 years ago with her own family and said she does not want to see a return to “the dark days”. Nora said the large turnout made her "proud" of Belfast. "I think its so important that we stand up and support each other and we're here for the other members of our community," she added. "We're all people. We're all just trying to have the best life we can and its important that we're here and make our voices are heard."

  United Against Racism helped to organise Saturday's march and rally

  A number of politicians were also present at Saturday's rally. Claire Hanna, South Belfast and Mid Down MP, said she hoped the large turnout will be "uplifting and comforting" for those who feel fearful in the community. "This was people from every community, every part of this city, saying very clearly that they do not want people to be attacked and scapegoated," she said. "If people are claiming to defend their communities, they need to hear that message loud and clear." Sinn Féin assembly member Deirdre Hargey called for those responsible for the violence minorities have faced to stop and be held accountable. "This is the city of emancipation, of civil rights, and we need to work with communities to ensure that we do build an inclusive society which doesn’t hate on other communities, particularly our minority communities."

  Sinn Féin MLA Dierdre Hargey was among politicians at the United Against Racism rally

  People Before Profit MLA Gerry Carroll said the rally was a "powerful demonstration" of diversity within the city and society. "I hope that it sends a message of support to those people who have been the target of the last week and the last period of time," he said.

  Saturday's rally was the second large gathering of anti-racism campaigners within two days in the centre of Belfast. On Friday more than 1,000 people gathered outside Belfast City Hall to oppose an anti-immigration protest at the same location. The anti-racism activists outnumbered the anti-immigration protesters by about five to one. The PSNI ensured the opposing sides were kept apart and both groups dispersed peacefully after Friday's demonstrations.
