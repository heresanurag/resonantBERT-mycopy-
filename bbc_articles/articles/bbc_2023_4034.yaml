title: DR Congo man uses bare hands to rescue trapped gold miners - BBC News
date: '2023-03-27'
section: General
url: http://www.bbc.co.uk/news/world-africa-65095295
content: |-
  Authorities say nine men survived the incident in the Democratic Republic of Congo.

  Following heavy rain, a tragedy was narrowly averted at a collapsed gold mine in the Democratic Republic of Congo after nine miners emerged from the rubble.

  Footage shows the men crawling out of the narrow entrance after a man used his bare hands to clear away debris.

  A lack of safety procedures and proper equipment are factors often blamed for issues at local mines. Incidents like this are considered quite common in South Kivu province, which is peppered with informal, often-hazardous mining sites.
