  Kylie Jenner, the youngest of the Kardashian-Jenner siblings, rose to prominence through the TV series Keeping Up with the Kardashians, along with her sister Kendall and half-sisters Kourtney, Kim, and Khloé Kardashian.

  She is the daughter of the Olympics decathlon winner Caitlyn Jenner and TV personality Kris Jenner.
