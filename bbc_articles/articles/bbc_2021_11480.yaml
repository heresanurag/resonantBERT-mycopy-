title: 'Your pictures of Scotland: 10 - 17 September - BBC News'
date: '2021-09-18'
section: Scotland
url: https://www.bbc.co.uk/news/uk-scotland-58516551
content: |-
  A selection of your pictures of Scotland sent in between 10 and 17 September.

  Send your photos to scotlandpictures@bbc.co.uk. Please ensure you adhere to the BBC's rules regarding photographs that can be found here.

  Please also ensure you follow current coronavirus guidelines and take your pictures safely and responsibly.

  Conditions of use: If you submit an image, you do so in accordance with the BBC's terms and conditions.

  Jasmine Caulfield sent in husband Pardeep Chand's image of Glasgow's Barrowlands. Jasmine said: "The photo was taken at an Arab Strap gig. I think it perfectly represents the return of Glasgwegian nightlife post-lockdown and captures the atmosphere brilliantly. The sign looks like it is bursting out of the night."

  Linsey Wright said: "My daughter Harriet delighted to finally be on her first trip to Edinburgh Zoo, postponed because of Covid."

  An image from Neil Brown's day exploring around the Isle of Arran.

  Derek Brown came across Star Wars' droids C-3PO and R2D2 on Orkney.

  Sunrise at Kyleakin, Skye, in a picture from Gosia Karczewska.

  Carole McCarthy, from Bishopbriggs, took this image of Highland cattle on Skye.

  Janina Dolny said of this snap: "I was lucky enough to capture this picture of the sunset over the Forth Road Bridge and Queensferry Crossing while crossing the Forth Bridge on a fast-moving train."

  Ryan Hartley's shot of the ferry MV Loch Seaforth arriving at Ullapool on a misty morning.

  Joanne MacAskill took this image while on a trip to Skye. Joanne said: "The evening light was beautiful. Our dogs are called Mara and Millie and they are with my wife Evonne."

  The abandoned Little Cumbrae lighthouse on the Firth of Clyde in a picture from Gordon Stewart, from Irvine.

  Bill Main, from Gourock, took his picture in Roseisle Forest, near Burghead. Bill said: "Conditions were very damp with webs draped from everything that grew."

  Fiona Daily's daughters Isla and Freya playing in the sea at Ayr while the sun set.

  Westies Martha, Mollie and Monty looking to see who is coming up the path in a picture from Heather Powell, from Lhanbryde.

  Kevin Davidge took this shot on the West Highland Way. He said: "Even a particularly long, wet and arduous scrabble along the shore of Loch Lomond didn’t detract from its beauty. We were, however, delighted to reach the end and look back on what we’d achieved."

  Rhona Ferrier said she came across this "ropey-looking" figure overlooking Calgary Bay on Mull.

  A picture from Adam Smith's family holiday to Skye. Adam said: "We took a boat trip into the Sound of Rasaay to look for wildlife and came up trumps. Pods of dolphins playing around the boat including a mother and baby, and sea eagles as well."

  Dave Stewart said of his image: "The three wrecks of Salen, Mull, just as the drenching rain started."

  David Meikle said of his image: "When clearing the dead leaves from our strawberry hanging baskets, I found two vine weevil. I only managed to photograph this one - the other was too quick."

  Judith Cruikshank was impressed with the level of detail inside the Priory Doocot in Crail.

  Brian Scott, of Perth, said: "I had a great morning walk with Ellen in part of Scotland's rain forests at Reelig Glen with its amazing tall trees."

  Margaret Howie, of Ayr, captured this kingfisher looking for its breakfast. She said: "I was walking along the seafront near Doonfoot in Ayr and spotted it sitting on the rocks at the mouth of the River Doon looking for fish in the early-morning sunlight."

  Cameron Pagan's photograph from Craig Notman and Joanna Main's wedding in Gatehouse of Fleet. The bride's dad arranged for the couple's dog, Winnie, to make a surprise guest appearance. She was wearing socks to ensure any excited jumping did not ruin any outfits.

  Slains Castle by Cruden Bay in a picture taken by Colin MacDougall from East Linton.

  Stephen Lipton, of Glasgow, sent in a selection of images from his adventures around Scotland, including this one of a gannet which he took from a boat just off Troup Head in Aberdeenshire.

  Jean McAllister, from Campbeltown, sent in this photo of a rainbow over Davaar Island while on a walk. She said: " Was definitely worth getting a bit wet."

