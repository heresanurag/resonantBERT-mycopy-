content: |-
  Stuart Everett's remains were found at a nature reserve and two men were later charged with his murder.

  The family of man whose severed torso was discovered at a nature reserve have described him as a "unique character" who "didn't deserve to die". Stuart Everett's remains were found at wetlands at Kersal Dale in Salford on 4 April, prompting a murder inquiry. Further body parts were found in later searches and two men have been charged with the 67-year-old's murder. Paying tribute, his family said they were "united in grief" and wanted to thank people for their support. "He was a unique and endearing character who always put his family and many friends first," they said. "We as a family are united in our grief over the devastating news of Stuart's untimely death and the manner in which he died. "He loved his food, his garden, his music and a flutter on the horses. We have been overwhelmed with the messages of support and are thankful that so many people thought so much of him. "He did not deserve to die the way he did and will be eternally missed. RIP."

  The remains were found at Kersal Dale in Salford on 4 April

  A huge search of the area was started after the torso was found near a bunker. Further remains were found at Linnyshaw Colliery Woods and Blackleach Reservoir in Salford last weekend. Another search took place at an industrial lock-up in Bury, while more remains were discovered close to a railway line near Worsley Road in Eccles. Detectives said they were "grateful for the public's patience" and were "continuing to receive details that may assist our searches". Michal Jaroslaw Polchowski, 68, and Marcin Majerkiewicz, 42, appeared at Tameside Magistrates' Court on Monday and were remanded in custody ahead of an appearance at Manchester Crown Court on 21 June. A provisional date for a trial has been set for March 2025.
