title: Ancient human skull discovered in River Thames - BBC News
date: '2019-02-24'
section: General
url: http://www.bbc.co.uk/news/uk-england-london-47299563
content: |-
  A Neolithic human skull has been discovered in the Thames by a mudlark. It is about 5,600 years old and is now on display in the Museum of London.

  A Neolithic human skull thought to be 5,600 years old has been discovered in the River Thames by a mudlark.

  It is now on display to members of the public inside the Museum of London.
