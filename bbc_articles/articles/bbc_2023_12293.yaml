content: |-
  The 11 coaches say Rubiales "offered a story that does not reflect in any way what was felt by Jenni Hermoso".

  Thanks for joining us, that's all for today

  After a particularly busy day, we're going to pause our coverage of the Hermoso kiss row. It was a busy day, with major developments including that Luis Rubiales was suspended by Fifa pending the outcome of its disciplinary proceedings. Spain's entire coaching staff from their World Cup win - except for the manager - also resigned over the controversy. If you want to read more about what happened, head to our story here. Today's page was brought to you by Jamie Whitehead, Ali Abbas Ahmadi, Antoinette Radford and Nathan Williams.
