content: |-
  The bus full of college students was seen crashing into a river on Thursday morning.

  Dashcam video footage has shown the moment a college bus swerved through traffic before crashing into a river.

  The double-decker was carrying 19 students when it left the carriageway and plunged into the water off Bishopstoke Road in Eastleigh, Hampshire, shortly before 10:00 BST on Thursday.

  Witnesses hailed the driver as a "hero" after he told rescuers the accelerator had jammed and the brakes failed to work.

  Police said the driver and one of the students suffered serious injuries. An investigation is ongoing.

