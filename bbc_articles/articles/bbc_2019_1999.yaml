id: bbc_2019_1999
title: Italian farmers spill milk in protest at low prices - BBC News
date: '2019-02-11'
section: General
url: http://www.bbc.co.uk/news/world-europe-47199286
content: |-
  Thousands of litres of milk are spilled in Sardinia's streets as farmers protest against low prices.

  Farmers in Sardinia are pouring thousands of litres of sheep milk into the streets, rather than sell it for prices they consider too low to live off.
