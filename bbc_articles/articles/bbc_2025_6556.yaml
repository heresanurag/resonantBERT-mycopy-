content: |-
  With billions in the balance, the battle may just be starting between the US government and universities.

  Harvard just stood up to Trump. How long can it last?

  This video can not be played To play this video you need to enable JavaScript in your browser. Watch: 'It's not right' - Students react to Trump freezing Harvard's federal funding

  Harvard University says it will not acquiesce to US President Donald Trump's demands - whether it continues to get federal funding or not. "No government - regardless of which party is in power - should dictate what private universities can teach," Harvard's president Alan Garber said in a letter posted on the university's website. Not long after Harvard refused to agree to the White House's sweeping list of demands - which included directions on how to govern, hire and teach - the Trump administration froze $2.2bn (£1.7bn) of federal funds to the institution. "Everyone knows that Harvard has 'lost its way,'" Donald Trump wrote on social media on Wednesday morning. "Harvard is a JOKE, teaches Hate and Stupidity, and should no longer receive Federal Funds." Many students and alumni lauded the university's decision to stand its ground, despite the consequences. Former President Barack Obama, an alumnus himself, called Trump's move "ham-handed" and praised Harvard as "an example for other higher-ed institutions". In response to Harvard's decision to refuse the government's demands, the education department accused the university of a "troubling entitlement mindset that is endemic in our nation's most prestigious universities and colleges – that federal investment does not come with the responsibility to uphold civil rights laws". With billions in the balance, the battle for the higher ground in the case of Harvard may just be the opening salvo in a war of attrition between the federal government and higher education.

  Trump's attacks on Harvard are not isolated - the government's antisemitism task force has identified at least 60 universities for review. Nor did the latest move come out of the blue. Trump and his Vice-President JD Vance have long railed against higher education institutions. In 2021, Vance gave a speech that described universities as the "enemy". Trump pitched a funding crackdown on universities in his presidential campaign, painting them as hostile to conservatives. Almost a year before the present conflict in Gaza began in October 2023, he introduced a free speech policy initiative that promised to "shatter the left-wing censorship regime" - in part targeting campuses. Polling by Gallup last summer suggested that confidence in higher education had been falling over time among Americans of all political backgrounds, partly driven by a growing belief that universities push a political agenda. The decline was particularly steep among Republicans. At issue now, Trump's team says, is last year's pro-Palestinian campus protests, which roiled colleges across the country. During the demonstrations and sit-ins, some Jewish students said they felt unsafe and faced harassment. Others joined the protests against Israel's military action in Gaza and US support for it. Last month, Columbia University agreed to many of the administration's demands in the wake of the protests - after the government cut $400m in funding. Harvard, too, made concessions. It agreed to engage with the administration's task force to combat antisemitism. The school dismissed the leaders of its Center for Middle Eastern Studies and suspended its Religion, Conflict, and Peace Initiative over accusations of anti-Israel bias. And in January, Harvard settled two lawsuits brought by Jewish students alleging antisemitism. It did not admit any wrongdoing, and said the settlement showed its commitment to supporting its Jewish students and staff. But the university drew the line at the White House's list of demands on Friday.

  Harvard student Sa'maia Evans, who is an activist and member of the university's African and African American Resistance Organization, said the university's decision to take a stand was a long time coming. "Harvard will only do that of which it is held accountable to," she told the BBC. She pointed to campus protests in the past few weeks - and the widespread criticism of Columbia's agreement with the Trump administration - as helping to put pressure on university officials. "They know the public - they would experience public backlash" if they capitulated, Ms Evans said. "It would be atypical (for) Harvard to do anything outside of what would be in its own interest." With a $53.2bn endowment - a figure that is larger than the GDP of some small countries - Harvard is uniquely able to weather the storm. But experts say it is still left in a crunch. "Most policymakers think of endowments as a chequing account, a debit card where you can withdraw money and use it for any purpose," said Steven Bloom, the spokesperson for American Council on Education. "But it's not." While Harvard's endowment is eye-popping, it says 70% of the money is earmarked for specific projects - which is typical for educational endowments, according to Mr Bloom. Harvard has to spend the money the way the donors have directed, or it risks legal liability. And Harvard's expenses are huge - its 2024 operating budget was $6.4bn. About a third of that was funded by the endowment - with 16% coming from the federal government, often to help with things that are supposed to create good for the whole of the US, such as biomedical research. Mr Bloom said the golden rule for endowment finance was that universities should not spend more than 5% of their total endowment each year. Making up for a $2bn loss means the school will need to boost its endowment by $40bn. "You can't find 40 billion dollars under a rock," Mr Bloom said. And that pain will only increase if Trump is able to make good on his threat to remove Harvard's tax-exempt status. That status helps the school avoid paying taxes on its investments and properties. Harvard has campuses all over the Greater Boston area, and is estimated by Bloomberg to have saved $158m on its property tax bills in 2023. In his latest comments on the university, early on Wednesday, Trump attacked the "radical left" Harvard leadership and said the institution could "no longer be considered even a decent place of learning".

  The realities of the situation have made some students sceptical about how long it can go on. "There's more the government can do if it wants to attack Harvard, and I'm not optimistic that it's going to stop after cutting $2.2 billion," Matthew Tobin, the academic representative on Harvard's student council. Mr Tobin said the idea that the Trump administration was making these demands to help Harvard is "malarkey". "Its a total bad-faith attack," he told the BBC. "The funding cuts have to do with Trump attacking an institution that he views as liberal, and wanting to exercise more control over what people teach and how students learn and think." With additional reporting from Isabella Bull in London
