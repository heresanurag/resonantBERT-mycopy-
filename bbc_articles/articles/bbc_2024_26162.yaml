title: Polar bears face higher risk of disease in a warming Arctic - BBC News
date: '2024-10-24'
section: Climate
url: http://www.bbc.co.uk/news/articles/c1e7pl3evd0o
content: |-
  Climate change and sea ice loss leaves polar bears exposed to more diseases, research suggests.

  In a warming Arctic, polar bears are spending more of their time on land

  As the Arctic warms, polar bears face a growing risk of contracting viruses, bacteria and parasites that they were less likely to encounter just 30 years ago, research has revealed. In a study that has provided clues about how polar bear disease could be linked to ice loss, scientists examined blood samples from bears in the Chukchi Sea - between Alaska and Russia. They analysed samples that had been gathered between 1987 and 1994, then collected and studied samples three decades later - between 2008 and 2017. The researchers found that significantly more of the recent blood samples contained chemical signals that bears had been infected with one of five viruses, bacteria or parasites.

  Wildlife biologist Karyn Rode (here with a sedated wild polar bear) and her colleagues collected blood samples from wild bears to monitor the animals' health

  It is difficult to know, from blood samples, how the bears’ physical health was affected, but wildlife biologist Dr Karyn Rode from the US Geological Survey said it showed that something was changing throughout the whole Arctic ecosystem. The researchers tested for six different pathogens in total - viruses, bacteria or parasites that are primarily associated with land-based animals but have been recorded before in marine animals, including species that polar bears hunt. The study covered three decades, Dr Rode said, “when there had been a substantial loss of sea ice and there’s been increased land use in [this population of polar bears]". “So we wanted to know if exposure had changed - particularly for some of these pathogens that we think are primarily land-oriented.” The five pathogens, as disease-causing agents are collectively called, that have become more common in polar bears, are two parasites that cause toxoplasmosis and neosporosis, two types of bacteria that cause rabbit fever and brucellosis, and the virus that causes canine distemper. "Bears in general are pretty robust to disease," explained Dr Rode. "It's not typically been known to affect bear population, but I think what it just highlights is that things [in the Arctic] are changing."
  • None There are about 26,000 polar bears left in the world, with the majority in Canada. Populations are also found in the US, Russia, Greenland and Norway
  • None Polar bears are listed as vulnerable to extinction by the International Union for Conservation of Nature, with climate change a key factor in their decline
  • None Adult males can grow to be around 3m long and can weigh close to 600kg
  • None Polar bears can eat up to 45kg of blubber in one sitting
  • None These bears have a powerful sense of smell and can sniff out prey from up to 16km away
  • None They are strong swimmers and have been spotted up to 100km offshore. They can swim at speeds of around 10km per hour, due in part to their paws being slightly webbed

  Studies with collar cameras have revealed what polar bears eat during the ice-free summer, as well as capturing surprising social interactions

  In the US, polar bears are classified as a threatened species; scientists say the biggest threat to their future is the continuing loss of sea ice habitat, which they depend on as a platform from which to pounce on their marine prey. Previous research using collar cameras on bears has shown that, as they spend more of the year on land - when there is no available sea ice to hunt from - the bears are unable to find enough calories. Dr Rode explained that polar bears are top predators: “Our study suggested that they're getting their exposure to some pathogens primarily through their prey species. “So what we saw as changes in pathogen exposure for polar bears is indicative of changes that other species are also experiencing.” The findings are published in the scientific jou, externalrnal PLOS One, external.

