  Trump has attacked judges in the past, frequently targeting those who oversaw his criminal and civil cases before he returned to the White House. Since becoming president, he has criticised many of the judges who have blocked his administration's policies and has joined some of his political allies - such as tech billionaire Elon Musk - in calling for their impeachment. The president has also praised judges that he has viewed as favourable towards him. He has often complimented US District Judge Aileen Cannon, who oversaw and ultimately dismissed his criminal case over alleged mishandling of classified documents. Since Justice Roberts backed Trump's presidential immunity challenge, the president has also acted warmly towards the Supreme Court judge. The ruling held that presidents had immunity from criminal prosecution for official acts conducted while in office, greatly expanding the power of the presidency. The decision also gave Trump additional leverage in the four simultaneous criminal cases he faced in 2024, only one of which went to trial and resulted in a conviction. At Trump's January inauguration, Roberts administered the oath of office, and Trump shook his hand and pointed at him. Trump also appeared to personally thank Roberts at his 4 March address to Congress. Though the Supreme Court justices have ideological leanings ranging from liberal to conservative, members attempt to maintain a distance from partisan politics. Roberts' statement was a rare rebuttal to a political statement made by a president about the role of the judicial system. The US Supreme Court is expected to ultimately take up some legal challenges to Trump's early actions, as the lawsuits make their way through the federal courts.
