title: 'Coronavirus: Spain and Italy applaud health workers - BBC News'
date: '2020-03-15'
section: General
url: http://www.bbc.co.uk/news/world-europe-51895386
content: |-
  Residents in the locked-down countries show their gratitude to health personnel treating the virus.

  Residents in Spain and Italy have shown their gratitude to health personnel on the coronavirus frontline by applauding from their windows.

  The nationwide events were coordinated in the locked-down countries through social media.

  BBC News has also been contacted via comments on our Instagram page to report the same thing happening in Portugal, an hour after Spain.

