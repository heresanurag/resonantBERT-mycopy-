  Last bank holiday weekend the Welsh Ambulance Service warned non-urgent 999 calls were taking up valuable resources, with people calling for paramedics after losing a toenail and gashing their shin.

  "My tolerance was really low," said Ms Partington.

  Ms Partington said her hearing had become acute due to having to focus on all the different noises while in the helicopter and she now struggled in certain situations

  Ms Partington, who now helps people with mental health issues, said she still lived with anxiety attacks, struggled to be in crowded places, and was triggered by some noises, like helicopters and fire alarms.

  "It completely transformed my life, I still cannot work a full week," she said, "but not every day is a bad day."

  She said she had since met up with former soldiers she had treated in the helicopter, including Paralympians, and she felt embarrassed when their families thanked her for saving their children.

  "It is hard, there are a lot who had injuries and lives that are going to be changed, some people that we saved did not want to live, they said 'do not let me live like this'. To know they realise they still have a life, is amazing," she said.

  Ms Partington said she had spoken to other veterans about Afghanistan

  She said, while it was not surprising that the area had fallen back under the Taliban's control, it was shocking to see the speed at which it had happened.

  "[The women] had about 20 years of relative freedom, to be who they wanted to be, to go to school and work, and now they are going to go back, it's really, really sad," she said.

  While some veterans and families who have lost loved ones during tours of Afghanistan have spoken of their anger, Ms Partington, said she had to focus on the good things she and her colleagues had achieved during their tours, rather than the crisis.

  "We saved so many lives, and it's people that wouldn't have necessarily survived if we didn't have medical expertise out on the ground," she said.

  "I think if I get too involved in what's happening now it could be detrimental to my own personal recovery. If I focus on the problems, I could go into a dark spiral."
