id: bbc_2018_13775
title: 'Raab: Proposed Brexit deal ''worse'' than EU membership - BBC News'
date: '2018-11-23'
section: General
url: http://www.bbc.co.uk/news/uk-politics-46318315
content: |-
  Former Brexit secretary says Parliament will vote down Theresa May's proposed Brexit deal.

  The former Brexit secretary says that Theresa May's proposed Brexit deal is worse than staying in the EU under current terms.

  Dominic Raab, who recently resigned from the post, told Today that Parliament will vote down the deal.
