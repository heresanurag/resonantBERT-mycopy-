content: |-
  Olympic champion Imogen Grant says the row between Oxford and Cambridge over selection for the Boat Races is "very unfair".

  Imogen Grant won the Boat Race in 2017, 2018 and 2022

  Olympic gold medallist Imogen Grant says the row between Oxford and Cambridge University Boat Clubs over selection for this year's Boat Races is "very unfair". The row involves the banning of PGCE students from competing because the qualifications are not "degree level", which means three Cambridge rowers are unable to race. The three rowers ruled out are Matt Heywood - a former under-23 world champion - Molly Foxell and Kate Cowley. Each year, crew names and details are exchanged between clubs and the rules were agreed by both teams. However, Oxford University raised objections about the three students on PGCE courses, claiming they were "certificates" and not degrees.

  The final decision was made by an independent interpretation panel. "Nothing has changed in the joint agreement. PGCE students were racing before - it's written down," said Grant, who won gold in the lightweight double sculls at Paris 2024 and is a three-time Boat Race winner with Cambridge. "It's the interpretation which has changed. The fact that it is so close to the Boat Race is very unfair. "It upsets me because the Boat Race is iconic, because it's a massive showcase, an age-old rivalry. "It only stays exciting if you have the best crews racing and we are getting tied down in semantics. "We want to see the best race. That's why we watch, not quibbling whether a degree counts or not." The annual Boat Races take place on 13 April. Cambridge have seven consecutive women's titles and have five wins in the past six years in the men's event.

  Annamarie Phelps, chair of the Cambridge University Boat Club, said: "There is no question academically about the standing of the PGCE course, which is highly valued and operates at a postgraduate level. "This decision comes despite the university's advice on the PGCE's standing and despite the precedent set by PGCE students from both Oxford and Cambridge being allowed to race in preceding years." The Boat Race Company, which runs the contest on behalf of the clubs, said: "This is an extremely competitive process and there are strict (publicly available) eligibility criteria for being considered for a place in a crew. "Those criteria are jointly agreed by the two competing clubs, with no involvement from any third party. "Similarly, both clubs agree to the existence and ultimate authority of an independent interpretation panel to provide rulings on any disputes, or to clarify rules where necessary. "The clubs are signatories to a joint agreement and agree to be bound by a ruling of the interpretation panel with no further recourse."
