  Kristina Roth, of Amnesty International USA, said in a statement it was "tremendous news for all who fought to abolish the death penalty in Washington".

  "Now that Washington has become the 20th state to end the ultimate cruel, inhuman, and degrading punishment, other states should follow suit," she added.

  "The court ruled that the death penalty is imposed in an arbitrary and racially biased manner and is invalid. The death penalty is the ultimate denial of human rights, it does not deter crime or improve public safety, and it should be ended once and for all."

  Advocates for capital punishment argue it should be available for those who commit the worst crimes.
