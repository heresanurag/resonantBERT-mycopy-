content: |-
  The boy was taken to hospital but did not survive his injuries, said police.

  Boy, 8, dies after falling from window of house

  An eight-year-old boy has died after he was reported to have fallen from the window of a house in Nottingham. Police said officers were called to Costock Avenue, Sherwood, at 19:15 BST, by East Midlands Ambulance Service. The boy was taken to Queens Medical Centre in Nottingham but did not survive his injuries, police said. Ch Insp Jon Scurr, of Nottinghamshire Police, said: “This is a tragic and devastating loss of life, and our thoughts are with the boy’s family and loved ones."

  Officers were called to Costock Avenue in Sherwood, Nottingham, at 19:15 BST on Wednesday

  Residents expressed their sadness on Thursday at the boy's death. One witness, who asked to remain anonymous, was visiting his father when the incident happened. He called an ambulance and a neighbour performed CPR on the boy, he said. “We was first on the scene,” he said. “It’s traumatising...all of it. It’s just a kid, isn’t it, you can’t get that out of your head.” Ibnu Habbas, a father-of-four, who lives in the neighbourhood, said: “I saw someone shouting, we came outside and saw the child lying with someone doing first aid. Everyone came out into the street and stayed until the ambulance came. "It’s really sad for this to happen to an eight-year-old.”

  Ibnu Habbas said he was proud of the Sherwood community

  Mother-of-two Jodie Bower, 39, who lives nearby, said: “I’m really so sorry for their loss. It was tragic, and it’s scary how quickly something like this can happen. “I heard all the sirens, and when I looked out, I saw quite a few ambulances, I knew something serious had happened. “We all pulled together last night and helped each other. “It’s such a high fall from the top bedroom. I was always petrified when my children were small, that they would fall from there, so I always would lock the windows. “Something needs to be put in place to make sure this never happens again.”

  Officers remain at the scene investigating the circumstances, said the force.

  Ch Insp Jon Scurr, of Nottinghamshire Police, said: “I would like to thank those that have already reported information to us, and would urge anyone who hasn’t yet done so, to please make contact as soon as possible. “We are acutely aware that incidents of this nature are incredibly distressing for all concerned and are felt by the entire community. “If you need help, or recognise that someone does, please access support through the NHS website or call 111.” A Nottingham City Council spokesperson added: "This is an absolutely tragic incident and our thoughts are with the child’s family at this very sad time. "We will be liaising with the police to understand the full circumstances and what support the family may need." Police asked anyone with information, or who may have captured dashcam footage of this incident, to get in touch. If you've been affected by the issues in this story, help and support is available via the BBC Action Line.

