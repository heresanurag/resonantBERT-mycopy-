content: |-
  Kevin Rowland is one of 40 artists who signed an open letter supporting Kneecap and freedom of expression.

  'Shutting Kneecap down is an overreaction'

  The frontman of Dexys Midnight Runners has said people trying to "shut down" Kneecap is an "overreaction". Kevin Rowland, whose band's hits included the 1982 number one hit Come On Eileen, said the controversy over the last week shows that freedom of expression is "under threat". Footage of a member of the rap trio Kneecap calling for MPs to be killed is being assessed by counter-terrorism police, and they have faced a slew of concert cancellations, with growing calls for Glastonbury to cancel their appearance there next month. Rowland is one of the 40 artists that signed an open letter supporting Kneecap and freedom of expression through both bands' label Heavenly Recordings.

  Kevin Rowland said freedom of expression is 'under threat'

  He said: "This is about freedom of speech and artists' freedom of expression." The independent record label said in the caption: "These artists support the right to freedom of expression. This is an ever-expanding list. If you are an artist who wishes to be added please DM us." Speaking to BBC's Good Morning Ulster programme, Rowland said he is not a "representative of Kneecap" and is not defending what they have said but added: "If you only allow free speech for people to say what you want, it's not free speech, is it?"

  Daniel Lambert, Kneecap's manager, said the band were willing to talk to Katie Amess, the daughter of murdered MP Sir David Amess. Speaking on Newstalk's The Pat Kenny Show, external, Mr Lambert said: "The lads are happy to talk to that lady. "The lads are happy to apologise to that lady; Kneecap has not hurt anybody. "There was a hurt here that was caused to someone emotionally." She also said she would be prepared to meet the band and have a conversation with them. They subsequently apologised to the Amess family and the family of Labour MP Jo Cox, who was murdered in 2016.

  A number of politicians have called for the Irish rap band to be uninvited from some UK gigs. On Thursday a Cabinet minister said the rap group should not be allowed to perform at Glastonbury festival, where they are listed for the Saturday. Commons Leader Lucy Powell said that although the final decision would be for the festival organisers, she believed "no-one in this House" would want to see the group at Glastonbury, adding: "We'll all continue to say so loud and clear." Asked about whether Glastonbury should uninvite Kneecap over the band's statements, Rowland said; "I hope they don't take them off, I think it would look pretty poor if they did. "We've had rappers playing at Glastonbury saying all kinds of things. Loads of rap music talks about killing, why aren't they banned?"

  Other artists who have signed the joint statement on Instagram, external in support of Kneecap include Fontaines DC, Annie Mac, Bicep, Massive Attack, Pulp, Paul Weller and Christy Moore. The independent record label said in the caption: "These artists support the right to freedom of expression. This is an everexpanding list. If you are an artist who wishes to be added please DM us."

  Artists that have signed the label's statement have also posted their own statements for the west Belfast trio. Massive Attack, posted on Instagram, external that "Kneecap are not the story. Gaza is the story. Genocide is the story". In a post on Instagram, external, Irish singer and songwriter Damien Dempsey described the band as "three young peaceful warrior poets".

  Manchester United legend Eric Cantona also showed support for Kneecap as he re-posted the message of support from the band's label on his Instagram story on Thursday.

  MP Colum Eastwood, whose constituency covers the area Kneecap member DJ Provaí is from, said artists "should be entitled to express their opinion" and there was a "mass hysteria from some elements of politics and the media around this". "It just seems to me that when that opinion is opposing what is happening in Gaza the response is much more vigorous," he said. To pull the rap trio from the Glastonbury line-up, the Foyle MP said, would "be a very strange thing to do". Speaking to BBC Radio Foyle's North West Today programme Eastwood added that Kneecap's comments had been "deeply stupid and wrong". Eastwood said: "You can't say MPs should be killed and people shouldn't be expressing support for Hezbollah and Hamas, that is absolutely clear. "It is totally abhorrent and totally wrong." "The idea that this is the major issue unfolding in the world really is quite difficult for people to see when children are being bombed in their houses and their schools and in their hospitals in Gaza. That, I think infuriates people."

  The group go by the stage names of Mo Chara, DJ Próvaí and Móglaí Bap

  Kneecap are an Irish-speaking rap trio who have courted controversy with their provocative lyrics and merchandise. The group was formed in 2017 by three friends who go by the stage names of Mo Chara, Móglaí Bap and DJ Próvaí. The film won a British Academy of Film Award (Bafta) in February 2025.
