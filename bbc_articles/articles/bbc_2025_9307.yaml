title: Former Little Mix singer Jesy Nelson gives birth to twins - BBC News
date: '2025-05-18'
section: Culture
url: http://www.bbc.co.uk/news/articles/c628x34pwqvo
content: |-
  The former Little Mix singer says the two girls are "healthy and fighting strong" after being born prematurely

  Former Little Mix singer Jesy Nelson gives birth to twins

  Jesy Nelson said her and her partner Zion Foster were 'so blessed'

  Former Little Mix singer Jesy Nelson has announced the birth of her twin daughters. In a post on Instagram, the 33-year-old said that two girls were born prematurely at 31 weeks on Thursday but said they were "healthy and fighting strong". Nelson said her and her partner Zion Foster were "so blessed" and had "never felt more in love", sharing pictures of them holding the girls in hospital. They have been named Ocean Jade and Story Monroe Nelson-Foster.

  Nelson wrote: "So, our beautiful baby girls decided to come at 31 weeks plus five days. "It all happened so quickly, but we are so blessed that they are here with us, healthy and fighting strong. We've never felt more in love." Nelson previously revealed she had experienced rare complications during the twin pregnancy, which was first announced in January. In March, she said she had undergone a "successful" operation to prevent complications related to twin-to-twin transfusion syndrome (TTTS). The condition is caused by abnormal connecting blood vessels in the twins' placenta which leads to an imbalanced blood flow from one twin, known as the donor, to the recipient twin, leaving one baby with a greater blood volume than the other.

  Nelson left Little Mix in 2020, saying she needed to protect her mental health

  According to the NHS website, it affects 10% to 15% of identical twins who share a placenta, and can have serious consequences. Shortly after the surgery in March, Nelson said: "The TTTS has cleared up, the operation was a success, which is just absolutely incredible. We are so, so lucky to have the most amazing doctors." She also revealed that her twins were monochorionic diamniotic (MCDA), meaning they share a single placenta but have their own separate sacs. Nelson left Little Mix in December 2020, saying she needed to protect her mental health. She later explained that online abuse - an issue she explored in a 2019 BBC Three documentary - had left her at "breaking point". Since leaving the band, Nelson has released music as a solo artist, including the single, Boyz, featuring Nicki Minaj, in 2021. Little Mix, also featuring Leigh-Anne Pinnock, Perrie Edwards and Jade Thirlwall, formed on the X Factor in 2011. The group went to record multiple UK top 10 albums and five number one singles, with hits such as Wings, Black Magic and Shout Out to My Ex. In 2021, they announced they would be taking a break after their 2022 tour but insisted they were not splitting up permanently.
