title: TikTok profiting from sexual livestreams in Kenya involving children, BBC told
  - BBC News
date: '2025-03-03'
section: Africa
url: http://www.bbc.co.uk/news/articles/cedl8eyy4pjo
content: |-
  Young women in Kenya tell the BBC they have used TikTok to sell sexual content since they were teenagers.

  TikTok is profiting from sexual livestreams performed by teens as young as 15, the BBC has been told. We spoke to three women in Kenya who said they began this activity as teenagers. They told us they used TikTok to openly advertise and negotiate payment for more explicit content that would be sent via other messaging platforms. TikTok bans solicitation but the company knows it takes place, moderators have told the BBC. TikTok takes a cut of about 70% from all livestream transactions, we have previously found. TikTok told the BBC it has "zero tolerance for exploitation". Livestreams from Kenya are popular on TikTok - each night over the course of a week, we found up to a dozen in which women performers danced suggestively, watched by hundreds of people around the world.

  A blurred screenshot of a TikTok livestream - some performers (right) take it in turns to twerk and dance suggestively on the main screen (left)

  It's two o'clock in the morning in Nairobi, and the TikTok Lives are in full flow. Music blasts, and users chat over each other, as a woman turns her camera on to twerk or pose provocatively. Emoji "gifts" then fill the screen. "Inbox me for kinembe guys. Tap, tap," the performers say on repeat. "Tap, tap," is a phrase commonly used on TikTok, calling for viewers to "like" a livestream. "Kinembe" is Swahili for "clitoris". "Inbox me" instructs the viewer to send a private message over TikTok with a more explicit bespoke request - such as to watch the performer masturbating, stripping or performing sexual activities with other women. In some of the livestreams we watched, coded sexual slang was used to advertise sexual services. The emoji gifts act as payment for the TikTok livestreams and - because TikTok removes any obvious sexual acts and nudity - also the more explicit content sent later on other platforms. The gifts can be converted into cash. "It's not in TikTok's interest to clamp down on soliciting of sex - the more people give gifts on a livestream... [the] more revenue for TikTok," says a Kenyan former moderator we are calling Jo - one of more than 40,000 moderators TikTok says it employs globally, external.

  On TikTok live streams, girls as young as 15 are selling sexual content. BBC Africa Eye investigates to find out who is profiting.
  • None If you are outside of the UK, watch Liked, Lured, Livestreamed: The Dark World of Digital Brothels, external on YouTube
  • None Or listen to TikTok and the digital pimps: Eye Investigates - from BBC World Service

  We discovered that TikTok is still taking about a 70% cut from livestream gifts. The company denied it took such a large commission after we established the same cut in a 2022 investigation. TikTok has long been aware of child exploitation in its livestreams - having run its own internal investigation in 2022 - but ignored the issue because it "profited significantly" from them, according to the claims of a lawsuit brought by the US state of Utah last year, external. TikTok responded that the lawsuit - which is ongoing - ignored the "proactive measures" it had made to improve safety. Kenya is a hotspot for this abuse, says the charity ChildFund Kenya, compounded by a young demographic and widespread internet usage. The African continent as a whole also has poor online moderation compared to Western countries, the charity added.

  Payment on TikTok, usually for activities such as make-up tutorials, is made via emoji "gifts" which can be exchanged for money

  Jo, who worked for Teleperformance - contracted by TikTok to provide content moderation - says moderators are given a reference guide of banned sexual words or actions. But this guide is restrictive, says Jo, and does not take into account slang or other provocative gestures. "You can see by the way they are posing, with the camera on their cleavage and thighs [for example], that they are soliciting sex. They may not say anything, but you can see they are signposting to their [other platform] account, but there's nothing I can do." Another content moderator for Teleperformance, who we are calling Kelvin, says moderation is also limited by TikTok's increasing reliance on artificial intelligence (AI), which he says is not sensitive enough to pick up on local sexual slang. Jo and Kelvin are among seven current and former content moderators working on TikTok content who told us their concerns. Jo says about 80% of livestreams flagged in content moderators' feeds were sexual, or advertising sexual services, and TikTok is aware of the scale of the issue.

  Anonymous whistleblowers from a company providing TikTok with content moderation spoke to the BBC

  ChildFund Kenya and other charities have told the BBC that children as young as nine are taking part in these activities. We have spoken to teenage girls and young women who say they are spending up to six or seven hours a night on the activity and making on average £30 a day - enough to pay for a week's food and transport. "I sell myself on TikTok. I dance naked. I do that because that's where I can earn money to support myself," says a 17-year-old we are calling Esther. She lives in a poor Nairobi neighbourhood, where 3,000 residents share toilet facilities. She says the money helps her buy food for her child, and support her mother who has been struggling to pay the rent since Esther's father died. She says she was 15 years old when she was introduced to TikTok Lives by a friend, who helped her bypass the age restrictions - only over-18s can use a Live. Users also need at least 1,000 followers to go live. So TikTok users with a big following can act as digital pimps - hosting the livestreams selling sexual content. Some of them have back-up accounts, indicating they have been banned or suspended by TikTok in the past. They appear to know how to evade detection by TikTok's content moderators, while generating the right amount of sexual teasing to pique customers' interest. "When you're dancing, move away from the camera, otherwise you'll get blocked," shouts a pimp to a woman twerking on screen. In return for being hosted, the women give pimps a cut of their earnings. The relationship can quickly turn exploitative, says Esther. She says her digital pimp knew she was under 18, and "he likes using young girls". He put pressure on her to earn more - meaning she needed to livestream more frequently - and took a larger cut of her earnings than she expected, she says. "So if an emoji is sent which is 35,000ksh (£213), he takes 20,000ksh (£121) and you only get 15,000ksh (£91)." Working for him was like being in "handcuffs" she says. "You are the one hurting because he gets the biggest share and yet it is you who has been used." "Sophie", not her real name, who says she was also 15 when she started livestreaming on TikTok, says she got requests from men in Europe for services on third-party platforms, including from one a German user who would demand that she caress her breasts and genitals for money. Now 18, she regrets her online sex work. Some of the videos she sent to users via other platforms were then uploaded to social media without her consent, she says. Her neighbours found out, and warned other young people not to associate with her, she told the BBC. "They brand me as a lost sheep, and young people are told that I'll mislead them. I am lonely most of the time." Some of the girls and women we spoke to said they had also been paid to meet TikTok users for sex in person, or had been pressured into having sex with their pimps.

  TikTok is keen to establish itself in African markets, but is not employing enough staff to effectively monitor content, the content moderators in Kenya told us. Kenya's government has shown signs of acknowledging the issue - in 2023, President William Ruto held a meeting with TikTok's CEO Shou Zi Chew to call for better content moderation on the platform, external. The government said the company had agreed to tighter regulation, with a TikTok office in Kenya to help co-ordinate operations. But the moderators we spoke to said, more than 18 months later, neither had happened. Teleperformance replied that its moderators "work diligently to tag and flag user-generated content based on community standards and client guidelines" and that its clients' systems are not set up to allow Teleperformance to remove offending material or report it to law enforcement authorities. "TikTok has zero tolerance for exploitation. We enforce strict safety policies, including robust Live content rules, moderation in 70 languages, including Swahili, and we partner with local experts and creators, including our Sub-Saharan Africa Safety Advisory Council to continually strengthen our approach."

