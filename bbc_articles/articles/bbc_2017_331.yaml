title: Lego copycats fool China boss - BBC News
date: '2017-01-25'
section: General
url: http://www.bbc.co.uk/news/business-38729557
content: |-
  Lego now has a factory in China, but there are fears about copyright violation there.

  Lego - the toy loved by children around the world - now has a factory in China.

  And some of them are so convincing even the boss can't tell them apart.
