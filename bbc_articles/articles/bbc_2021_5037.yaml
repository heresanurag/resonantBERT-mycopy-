title: Moment Nasa reacts to successful Ingenuity flight - BBC News
date: '2021-04-19'
section: General
url: http://www.bbc.co.uk/news/science-environment-56802505
content: |-
  The space agency is celebrating the first powered, controlled flight by an aircraft on another world.

  The American space agency, Nasa, has successfully flown a small helicopter on Mars.

  The drone, called Ingenuity, was airborne for less than a minute, but Nasa is celebrating what represents the first powered, controlled flight by an aircraft on another world.

  This was the moment the data came through that proved its flight was a success.
