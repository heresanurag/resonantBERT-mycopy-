title: Man who had ears sliced off in Blackburn street attack dies - BBC News
date: '2018-12-14'
section: Lancashire
url: http://www.bbc.co.uk/news/uk-england-lancashire-46564974
content: |-
  Sajed Choudry also suffered a fractured skull during a "large scale disturbance" in the street.

  A man who had his ears sliced off in a street attack has died.

  Sajed Choudry also suffered a fractured skull in what police said was a "large-scale disturbance" on Rhyl Avenue in Blackburn on the night of 27 November.

  The 43-year-old father of four had his ears reattached in hospital but died on Thursday, Lancashire Police said.

  A 13-year old boy and three men - Rafaqat Ali, 38, Fazal Ilahi, 62, Sadaqat Ali, 36, from Blackburn - were earlier charged with attempted murder.

  They are due to appear at Preston Crown Court on 17 December.

  A post-mortem examination is due to be held to establish Mr Choudry's cause of death.

  A 24-year-old man was also seriously injured during the disturbance and was recovering, police said.

  Mr Choudry's family has asked for their privacy to be respected.

