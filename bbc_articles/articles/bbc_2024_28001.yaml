  Trump said in a statement he was "thrilled to announce" Kennedy's nomination. Speculation had grown that Trump planned to hand his former rival a key healthcare role. He told supporters at his election night victory party that Kennedy wanted to "help make America healthy again". "For too long, Americans have been crushed by the industrial food complex and drug companies who have engaged in deception, misinformation, and disinformation when it comes to Public Health," Trump said in his statement on Thursday. "Mr Kennedy will restore these Agencies [Health and Human Services] to the traditions of Gold Standard Scientific Research, and beacons of Transparency, to end the Chronic Disease epidemic, and to Make America Great and Healthy Again!"

  The nominee hails from one of the most famous families in Democratic politics as the son of US Attorney General Robert F Kennedy and nephew of President John F Kennedy, both of whom were assassinated in the 1960s. Now aged 70, the environmental lawyer ran for president this year as an independent after initially launching a Democratic primary bid, but he eventually suspended his own campaign, endorsing Trump. He is known for his criticism of childhood vaccines, claiming in an interview last year: "I do believe that autism comes from vaccines." According to the Centers for Disease Control and Prevention, external, America's national public health agency which is one of the bodies the US health secretary oversees: "Many studies have looked at whether there is a relationship between vaccines and ASD [autism spectrum disorder]. To date, the studies continue to show that vaccines are not associated with ASD."

