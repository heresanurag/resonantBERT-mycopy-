  Kennedy, who was addicted to heroin for 14 years in his youth, has also talked about wanting to help tackle America's substance abuse crisis. 'We're now seeing an epidemic of addiction, alcoholism," he told the Daily Mail last year, external. "But also just loneliness, despair, disassociation, alienation." During his campaign for the White House, tales of Kennedy's personal life more often caught the news than any major policy proposals. His admission that he had suffered from a brain worm, and a separate story about his dumping of a dead bear in New York's Central Park, dominated headlines for days. Democrats have been quick to condemn the pick, with Senator Patty Murray calling the choice "catastrophic" and labelling Kennedy a "fringe conspiracy theorist". Republican Senator Susan Collins said she had found some of Kennedy's "statements to be alarming" but said she would grant him a fair hearing during confirmation proceedings. Trump has been selecting his top team since winning the US election last week. His party is projected to win the House of Representatives, meaning the Republicans will run the White House and all of Congress.

  Marco Rubio has been nominated for secretary of state and former Democrat Tulsi Gabbard for director of national intelligence. But his decision to nominate controversial Florida Congressman Matt Gaetz has raised eyebrows on Capitol Hill. Long an outspoken ally of Trump's, Gaetz was the subject of an ongoing ethics investigation in the House of Representatives into allegations of sexual misconduct, illicit drug use and misuse of campaign funds. Senator Dick Durbin, the sitting chairman of the Senate Judiciary Committee, has asked for the findings of the report into the allegations to be published. Gaetz is also divisive figure within his party after he forced out House Speaker Kevin McCarthy last year. Lisa Murkowski, a moderate Senate Republican, said Gaetz was not "a serious nomination for the attorney general". Meanwhile, Trump offered new details on the role Elon Musk will play in his administration, in his first public address since his election night victory speech. The president-elect said Musk's new Department of Government Efficiency would issue a series of reports in the coming weeks to streamline the US government.
