title: 'Kenya: Bus passengers rescued from flood waters - BBC News'
date: '2024-04-11'
section: General
url: http://www.bbc.co.uk/news/world-africa-68767976
content: |-
  The bus was travelling to Nairobi when it was swept off the road.

  Passengers were rescued from a river in Kenya after a bus they were on became trapped in deep flood waters overnight.

  While some passengers managed to escape through the windows, others were stuck on top of the bus overnight awaiting rescue.

  The bus was on the way to Kenya's capital Nairobi when it was swept off the road by a strong current.

  Local police said all 51 passengers and crew were safely evacuated.
