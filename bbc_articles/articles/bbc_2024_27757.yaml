  Wales slumped to a record-equalling 10th successive Test match defeat last weekend, with the current sequence matching a run of failures in 2002 and 2003 under Gatland's fellow New Zealander Steve Hansen. Gatland's side have not tasted international success since beating World Cup pool stage opponents Georgia in October 2023 and have slipped to a lowest position of 11th in World Rugby's rankings. This includes finishing bottom of the Six Nations for the first time in 21 years, summer defeats against South Africa and Australia and now a first loss against Fiji in Cardiff. Since replacing Wayne Pivac and returning for a second stint as Wales head coach in December 2022, Gatland has won just six out of 22 games. Australia arrive in Cardiff on the back of a spectacular 42-37 success against England and have won nine times from their last 11 visits to the Welsh capital.
