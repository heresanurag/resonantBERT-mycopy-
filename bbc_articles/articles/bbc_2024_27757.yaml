content: |-
  Wales scrum-half Tomos Williams is ruled out of the Autumn Nations Series match against Australia on Sunday.

  Williams out as Wales change four for Australia

  Coverage: Listen to live commentary on BBC Radio Wales, BBC Radio Cymru, BBC 5 Sport Extra and BBC Sounds, follow live text commentary on the BBC Sport website and app.

  Wales scrum-half Tomos Williams has been ruled out of the Autumn Nations Series match against Australia in Cardiff on Sunday. The Gloucester half-back suffered a shoulder injury in the 24-19 defeat against Fiji and is replaced by Cardiff's Ellis Bevan. Head coach Warren Gatland has made four changes as Wales bid to avoid a record 11th consecutive international defeat. Scarlets wing Tom Rogers replaces the injured Mason Grady, while flankers Jac Morgan and James Botham come in for Taine Plumtree and Tommy Reffell. Dragons scrum-half Rhodri Williams, 31, is named on the replacements' bench, more than 10 years since winning his last cap.

  Morgan will make his first international start since leading Wales in the World Cup quarter-final defeat against Argentina in October 2023 in Marseille. The flanker missed the 2024 Six Nations because of a knee problem and the summer tour as a result of a hamstring injury. Morgan, 24, was named on the bench for the defeat against Fiji but made an impression when he came on in the second half. Cardiff back row Botham was also prominent in the latter stages last weekend and comes in for Plumtree, who drops out of the 23-man squad, while Reffell is on the bench. Cardiff wing Grady was ruled out of the autumn series after suffering a first-half injury in the defeat against Fiji, with Rogers preferred to Rio Dyer and Josh Hathaway. Gatland has opted for the more traditional balance of five forwards and three backs on his bench this time after the tactic of six forwards and two backs backfired against Fiji. After losing Grady to injury, Gatland admitted afterwards the wrong replacement had been sent on, with Scarlets fly-half Sam Costelow playing out of position rather than Cardiff scrum-half Bevan, who had been allocated to cover the wing. Scarlets centre Eddie James is named as a replacement against Australia. If Dragons scrum-half Williams takes to the field this weekend, it will set a new record for the longest gap between appearances for Wales. The existing record was established by Newport hooker Bunner Travers who gained his eighth cap against Ireland in March 1939 and his ninth versus England in January 1949. Williams would surpass that by 10 months. As a footnote, the all-time record holder is New Zealand’s Ned Hughes who remarkably went from 1908 to 1921 between caps.

