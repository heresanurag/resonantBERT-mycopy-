title: 'Ballymena riots: Those needing housing will increase, say NIHE - BBC News'
date: '2025-06-13'
section: Northern Ireland
url: http://www.bbc.co.uk/news/articles/clyq72kpy9yo
content: |-
  A family with young children were forced from their home in Coleraine after their house was set on fire.

  Families in emergency accommodation after days of unrest

  Fourteen families have also been provided with emergency accommodation during the disorder.

  About 50 households in Northern Ireland have received assistance since disorder broke out in Ballymena this week, the Northern Ireland Housing Executive (NIHE) has said. Some 14 families have also been provided with emergency accommodation during the disorder. The disorder started on Monday after a peaceful protest over an alleged sexual assault in the County Antrim town. Police said 63 of their officers have been injured over four nights of violence after coming under "sustained attack with heavy masonry and fireworks".

  Stormont's finance minister will bring a proposal to the executive for additional funding for the PSNI, Michelle O'Neill has said. The PSNI Chief Constable has repeatedly raised concerns about resources for the force, and did so again on Thursday following several nights of disorder. Justice Minister Naomi Long said she was "delighted", external that it looks as though the executive would agree a bid of £5m she had submitted to assist the PSNI with the costs of the past week's unrest. "It's a good start but long-term investment is required."

  Police say an attack on a young family in Coleraine could have had "potentially serious consequences"

  A family with children were moved from a house in Coleraine after they were targeted in a racially motivated arson attack, according to the Police Service of Northern Ireland (PSNI). The PSNI said they received a report at approximately 03:00 BST on Friday of a fire at the rear of a property in the Mount Street area of the town. They said an oil tank had been set alight, causing damage to the outside of the property and filling the property with smoke. "A man and woman and their four young children who were inside the house at the time were thankfully able to escape uninjured," a spokesperson said.

  NIHE chief executive Grainia Long says she expects to see the number of those seeking help to rise.

  NIHE chief executive Grainia Long said she expects the number of people seeking help to rise, adding that demand for emergency and temporary accommodation is extremely high. Speaking to the BBC's Good Morning Ulster programme, Ms Long described the last week as "extraordinary", saying there is an "unprecedented number of families locally who feel it is unsafe to stay in their home".

  "Demand is extremely high, and it has been one of those weeks where everyone has had to move very quickly to respond." "We do expect the numbers to increase as households make decisions about what is safe for them."

  Grania Long said the NIHE are "worried about households vulnerable to exploitation, particularly those with children"

  While demand for temporary housing is on the rise, Ms Long said the availability of appropriate housing is an issue. "We don't have any contingency or additional accommodation," she said. "We are working to make sure we have the right numbers of temporary accommodation." She added that NIHE staff "have been out on the ground, supporting communities, working within them and ensuring their safety", as well as "working with older people who are scared and asking questions about their safety". Ms Long told BBC News NI that she is "worried about households that we may lose contact with, those who may be vulnerable to exploitation, particularly those with children".

  The violence continued into a fourth night in Northern Ireland

  There has been disorder in Northern Ireland for four nights in a row, with a lower level seen on Thursday than earlier in the week. Police said that in some instances families hid in attics and wardrobes during the disorder. In east Belfast, police said bricks were thrown through the windows of two houses on Avoniel Road in a racially motivated attack. A small fire was lit at the Manse Road roundabout in Newtownabbey, and reports of anti-immigration "hate graffiti" are being investigated in Newtownards. During the first three days of violence, 41 officers were injured and 15 people arrested. On Thursday evening, about 100 people attended an anti-racism protest in west Belfast.

  Carol Topping says she was "scared" when she heard about the protest in Portadown

  Carol Topping, who is from the Philippines, works in a hospital and had to leave early when she heard about the protest. She said she stayed at home out of fear during the unrest in Portadown. She said: "It's nice to live here. People are nice." But added that on Thursday night, "People were not... thinking straight". "I was thinking whenever they see people from other [countries] they'll just go mad and I don't want to experience that."

  Deimantas Žakevičius, from Lithuania, says he was "worried" when he saw people throwing rocks at police

  Deimantas Žakevičius, from Lithuania, has lived in Northern Ireland for five years. After returning home from work, Deimantas started to hear alarms and looked out of the window to see police in riot gear on one side of the street and people, on the other side throwing rocks. "It was something out of a movie," Deimantas said. He said he was "worried" but started to feel "safe" when police began pushing the rioters back. Deimantas said his neighbours are friendly and Portadown is a nice place to live but he and others were "unsettled" by events on Thursday.

  63 police officers have been injured in the violence

  There is no "crisis" of relations within the executive despite calls for the DUP minister Gordon Lyons to resign over his comments about recent trouble in Northern Ireland, the first minister has said. Michelle O'Neill had accused Mr Lyons of "inflaming tensions" following his social media post about the location of migrant families who fled their homes earlier this week. Lyons, Stormont's housing minister, said he had no intention of resigning and that he had been subject to a "political pile-on". Speaking at the British-Irish Council on Friday, O'Neill said she stood over her comments, but insisted Sinn Fein and the DUP could "still get on with governance". Sinn Féin, Alliance and the Green Party had all called on the minister to consider his position on Thursday.

  Meanwhile, senior health professionals in Northern Ireland have issued a joint statement saying the "appalling and violent scenes of recent days are nothing short of shameful". "We know there will be many of our international colleagues within the committed and dedicated health and social care and independent sector workforce who will be distressed by what has unfolded," the statement adds. "We know that, less than a year after similar scenes on our streets last summer, you are once again left feeling frightened and anxious. "But please know this: You are welcome, you are deeply valued, and you have our full support. We are the better for your presence here."

  Are you in Ballymena? How have you been affected by the issues in this story?
