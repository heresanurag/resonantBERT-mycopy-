title: 'Wales vs England: Marcus Smith returns and Tommy Freeman starts at outside
  centre for visitors - BBC Sport'
date: '2025-03-13'
section: Rugby Union
url: http://www.bbc.co.uk/sport/rugby-union/articles/cy0d70yyyl9o
content: |-
  Marcus Smith returns to England's starting XV at full-back and Tommy Freeman moves to outside centre for the Six Nations finale against Wales.

  Marcus Smith started England's Six Nations campaign at fly-half before moving to a full-back role

  Coverage: Watch on BBC One, BBC Sport website and app, plus S4C via iPlayer. Text commentary and highlights on BBC Sport website and app. Listen live on BBC Radio Wales, BBC Radio Cymru, BBC Radio 5 Live.

  Marcus Smith returns to England's starting XV at full-back and Tommy Freeman moves to outside centre for the Six Nations finale against Wales at the Principality Stadium. Smith is reinstated at 15 after missing out on a starting berth in England's comfortable win over Italy and Freeman, who has made all 19 of his Test appearances on the wing, steps into midfield to replace the injured Ollie Lawrence for Saturday's trip to Cardiff. Head coach Steve Borthwick told BBC Rugby Union Weekly scans of Lawrence's Achilles have shown a "pretty tough injury" and that the Bath centre will have surgery next week, which will keep him out for a "substantial period of time". In a reshuffle to the backline, Elliot Daly moves to the wing, while Tom Roebuck replaces Ollie Sleightholme on the other. Borthwick makes two changes in the forwards as Ben Curry partners his twin Tom on the flank, with Ben Earl switching back to number eight, while Luke Cowan-Dickie will start at hooker. In the front row, prop Will Stuart will win his 50th Test cap.

  England remain in contention to win the title and face a Wales side in search of their first Test win since October 2023. The visitors have opted for a six-two spilt of forwards and backs among their replacements and promising young back row Henry Pollock could make his Test debut from the bench. Veteran fly-half George Ford is also named among the replacements for the first time in this year's tournament, and will win his 99th cap if he comes off the bench. "George has been a fantastic role model and an incredible leader within the squad," Borthwick told Rugby Union Weekly. "It's a privilege to have him in the England squad."

  England are expecting a hostile environment in front of Wales' vociferous home support at the Principality - a venue Borthwick says is one of the "most iconic" in the sport. "The atmosphere will be electric, and we know we'll need to be at our very best to get the result we're aiming for," said Borthwick. On Stuart's milestone, Borthwick added: "Reaching 50 caps is a well-deserved milestone for Will and a testament to the hard work he's shown throughout his career. "We're excited to see him reach this landmark on Saturday and look forward to seeing him continue delivering performances at the highest level."

