  England will win the Six Nations if they beat Wales with the bonus point and France then fail to beat Scotland in the final game of the championship in Paris (20:00 GMT). A victory without the bonus may also be enough for Borthwick's side if France fail to win without a try-scoring bonus, while a draw or defeat could deliver a first title in five years if France and Ireland both lose without claiming bonus points. Wales are rooted to the foot of the table and looking to avoid the Wooden Spoon - awarded to the side that finishes bottom - for a second year running. They are a point behind fifth-place Italy, who face a difficult final-day game with title-chasing Ireland in Rome (14:15).

