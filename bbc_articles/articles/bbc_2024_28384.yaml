title: 'Harshita Brella murder: Family tells BBC they want ''justice'' - BBC News'
date: '2024-11-19'
section: England
url: http://www.bbc.co.uk/news/articles/c7v3q8l7r43o
content: |-
  Ms Brella's family told the BBC she moved to the UK in April after marrying the man suspected of killing her.

  ‘I want justice for my daughter,' says mother of murder victim Harshita Brella

  Harshita Brella was the subject of a domestic violence protection order in the months before her death, police confirmed

  The mother of a woman who police say was murdered before her body was left in a car boot in east London has told the BBC: “I just want justice for my daughter”. Harshita Brella’s mother, Sudesh Kumari, spoke through tears to the BBC from the family home in Delhi. Ms Brella was "very excited" to move to the UK in April after an arranged marriage with Pankaj Lamba, her sister Sonia Dabas said. Northamptonshire Police believe Mr Lamba murdered Ms Brella and then fled the country after transporting the 24-year-old's body by car to Ilford, east London. Ms Brella's father, Satbir Brella, said: "I want my son-in-law to be brought to justice and I want my daughter's body brought home."

  Mr Brella described his daughter as a simple and serious young woman. He said she wanted to be a teacher and would spend her days tutoring children in their home in Delhi, before turning to her own studies. Her sister said she and Ms Brella were "inseparable". "She was a part of me and I was a part of her," she said. "I now feel like I can't do anything in life without her." She added: "We used to chat all day. She had saved my name as 'heartbeat' on her phone. You can now understand what bond we shared." The family said they had last spoken to Ms Brella by phone on 10 November. She told them she had made dinner and was waiting for Mr Lamba to come home, her sister said. Ms Dabas said her sister's phone was off for the next two days and by 13 November they "thought something was wrong" and asked people they knew to file a complaint. Northamptonshire Police said it was contacted on Wednesday regarding concerns for her welfare - and that led to the discovery of her body and the launch of a murder investigation. Ms Dabas explained that her sister and Mr Lamba had entered into an arranged marriage, with a legal wedding held in August 2023. The couple then had their traditional Indian ceremony on 22 March of this year before they left for the UK around 30 April - settling in Corby, Northamptonshire. Mr Lamba was a student in London, she said, and her sister had been working in a warehouse. Ms Dabas said her sister had wanted to be a teacher in India and was achieving things quickly, doing things in two months that others would take years to achieve. However she said she "didn't live a very happy life in London". "She struggled a lot because of her husband," she said. And she said she had said to her sister to "quit and come to India," telling her to come back to them. "We would have just taken her away from that person," she said. She said her sister had previously loved travelling and when her sister had gone to the UK she had asked her why she wasn't taking photos and posting them on Instagram. Later her sister had explained that she was not allowed to do so. "There were restrictions on everything," she said. She described how her sister had told her she was not allowed to wear make-up or wear "nice clothes." Ms Brella's father said that her husband complained to him about her failing to make him food "on time" - and said that she was "talking too much to her mother".

  Police have released a photo of Pankaj Lamba, who they believe fled the country

  At the end of August Ms Brella phoned her father in India to say she had run away, her sister said. "She said he was hitting her and she escaped. She ran out on the streets, he chased after her and hit her there as well," Ms Dabas said. "There was a local who saw this and asked what happened which is why he left her. Harshita called someone she knew who came to pick her up." She was the subject of a domestic violence protection order which was made in early September and lasted 28 days. Police have since confirmed the order had been in place before Ms Brella's death. The force said it had made a mandatory referral to the Independent Office for Police Conduct because there was previous contact with Ms Brella. Her father told the BBC the family hopes her body can be brought home to India so "her soul can get peace and then maybe we will too."
