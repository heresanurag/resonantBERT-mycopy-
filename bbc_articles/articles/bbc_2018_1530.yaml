id: bbc_2018_1530
title: 'Cheddar Man: DNA shows early Brit had dark skin - BBC News'
date: '2018-02-07'
section: General
url: http://www.bbc.co.uk/news/uk-42970067
content: |-
  A scientific reconstruction shows the stone age Briton had dark skin and blue eyes.

  The reconstruction of the stone age "Cheddar Man" is based on 3D scans of the skull and information from the man's DNA.
