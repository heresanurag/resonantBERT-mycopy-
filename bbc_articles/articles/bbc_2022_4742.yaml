id: bbc_2022_4742
title: Zelensky spokesman describes heartbreaking scenes in Ukraine - BBC News
date: '2022-04-04'
section: General
url: http://www.bbc.co.uk/news/world-europe-60973124
content: |-
  A spokesman for Ukraine's President Zelensky describes the discovery of mass graves.

  A spokesman for Ukraine's President Zelensky has told the BBC that mass graves have been discovered in recaptured territory.

  Serge Nykyforov told Clive Myrie on the Sunday Morning programme, the scenes were heartbreaking and described how executed civilians had been found.
