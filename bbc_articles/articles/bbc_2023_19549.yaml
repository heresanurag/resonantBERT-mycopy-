  Aid trucks are being boarded by groups of people while passing through the border city of Rafah.

  That's it from us for now, goodbye

  It's just coming up to 18:00 here in London and 20:00 in Gaza and Israel so we are going to finish our live coverage now. We've been bringing you the updates from the conflict and if you want to read more you can follow the links below:
  • The UK, France and Germany joined calls for a ceasefire in the war
  • We've been keeping across updates from Lib Dem MP Layla Moran, whose family is trapped in a Catholic Church in Gaza City
  • Four shipping companies have halted their routes through the Red Sea after attacks on vessels by the Iran-backed Houthis rebels in Yemen
  • Civilians have been chasing aid trucks, hungry for food and desperate for supplies We realise this coverage often contains distressing content. If you have been affected by anything in this page, go to BBC Action Line. This live page has been brought to you by Andrew Humphrey, Tarik Habte and Gem O'Reilly in London and of course our colleagues in the Middle East. As for further coverage you can read more about the stories from the war here and keep up to date on BBC TV and radio. We will be back to bring you the latest from tomorrow morning.
