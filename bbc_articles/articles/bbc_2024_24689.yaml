title: BBC launches review into preventing abuses of power - BBC News
date: '2024-10-11'
section: Culture
url: http://www.bbc.co.uk/news/articles/c748dldq2ddo
content: |-
  The BBC workplace culture review will focus on "preventing abuse of power" within its workforce.

  Huw Edwards was accused of sending inappropriate messages to colleagues before he left the BBC

  The BBC has announced details of a review into its workplace culture, focusing on "preventing abuse of power and ensuring everyone at the BBC conducts themselves in line with our values". The corporation announced the review in the wake of revelations about Huw Edwards, formerly its most senior news presenter, who committed offences involving child abuse images. Last month, Edwards was given a six-month prison sentence, suspended for two years, after he admitted three charges of making indecent images of children. In an email to staff, BBC chair Samir Shah said it had "taken longer than I had hoped to get to this stage" but he added: "I cannot emphasise enough that I am fully committed to tackling inappropriate or abusive behaviour."

  Some BBC staff members had accused Edwards of sending them flirtatious and "pushy" private messages, and one said he was treated "like this God of news" who was "allowed to feel like he could get away with anything". The internal investigation into Edwards' behaviour towards staff ended when he resigned, and some staff were unhappy the findings were not made public. In August, the BBC board said recent events had "put a spotlight on the question of power imbalances in the workplace". They were "concerned about the potential for inappropriate workplace behaviour, particularly in creative and editorial environments", they said.

  A previous review, carried out in 2013 in the wake of the Jimmy Savile scandal, suggested there was "a strong undercurrent of fear" at the BBC when addressing issues of bullying. That report found some bad behaviour appeared to go unchallenged by senior managers, with certain individuals "seen as being 'untouchable' due to their perceived value to the BBC". Change Associates, which also led that review, will now "assess progress made" on its recommendations, the BBC said. Mr Shah added, while commenting on the delay of the review's launch, that it had been "important to follow due process – and that sometimes takes time". "For most of us it is a joy to work for the BBC and that should be the case for everyone. Nobody working in the BBC should ever feel fear or worry while working here," he said. He added it was clear to him that "we must ensure the BBC is a safe, secure and welcoming workplace for everyone".

  Setting out details of the review on Friday, the BBC said that all organisations have hierarchies and individuals "with power and influence over others". "There is also the potential for individuals with power from a significant public profile, leadership role, or star status to abuse their position," the corporation added. "At the BBC, we have a responsibility to ensure we have the right culture, not only to enable people to do their best work - free from abuse, but to ensure the same values, expectations, and standards apply, regardless of the person involved." The review will come up with "practical steps to prevent abuse of power and further strengthen our workplace culture", its terms of reference said. It will recommend measures to "ensure the consequences of inappropriate behaviour and abuse of power are understood by everyone", and that any significant complaints are dealt with quickly. It will also look at ways to "ensure people feel confident to speak up and for managers and leaders to act decisively". The review will be carried out by Grahame Russell, executive chairman of management consultants Change Associates, and is expected to be completed next year.
