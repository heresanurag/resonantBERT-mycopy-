title: David Bull named new chairman of Reform UK - BBC News
date: '2025-06-10'
section: Politics
url: http://www.bbc.co.uk/news/articles/c3v54d60y6vo
content: |-
  The TalkTV host replaces Zia Yusuf, who quit last week after clashing with Reform UK colleagues.

  TalkTV host David Bull has been named as Reform UK's new chairman, replacing Zia Yusuf who quit last week after clashing with colleagues over calls for a burka ban. A long-time ally of party leader Nigel Farage, 56-year-old Bull has held several roles in Reform and its predecessor the Brexit Party, but is best known for his work as a broadcaster. The appointment of a polished media performer contrasts with multi-millionaire businessman Yusuf, a 38-year-old political newcomer who largely worked behind the scenes as chairman to professionalise the party. Speaking at an event in London, Farage said Bull's job was "not to get involved in the admin" but to "give leadership" to activists.

  Rather than appointing a direct successor, Reform UK is splitting Yusuf's role into multiple posts including a new head of operations and head of treasury - with new further leadership changes in the coming weeks after. Farage said Bull's role would be to "inspire" the party's base and "give leadership to that volunteer army out there". Bull said he was "deeply honoured" to be asked to serve as chairman. However, he said Reform's rapid growth in recent months had led to the party "failing" to "look after the volunteer side of the party". Bull told BBC Radio 5 Live's Matt Chorley "part of my role will be to go around and make sure that I can actually keep morale high". He also said he would act as a "conduit back to the professional party" addressing concerns raised by activists. In a speech announcing his new role, Bull paid tribute to Yusuf, who he said "has done an extraordinary job" and "professionalised the party beyond belief". To take up the job, Bull stood down from his role as a TalkTV weekend breakfast presenter.

  Yusuf resigned suddenly as party chairman on Thursday, shortly after saying it was "dumb" for new Reform MP Sarah Pochin to call on the prime minister to ban the burka - a garment traditionally worn by some Muslim women that covers the face and body. Pochin has since defended her comments, telling BBC Politics Live that burkas are a "barrier to cultural integration" and make it hard for police to identify people.

