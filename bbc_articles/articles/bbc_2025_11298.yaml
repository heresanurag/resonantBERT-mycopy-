  Following the row, Yusuf said working for a Reform UK government was not "a good use of my time". However, two days later he appeared to have a change of heart and said he would continue working for the party, albeit in a different role. Yusuf told the BBC he regretted his social media post about Pochin and that "exhaustion led to a poor decision". He will now lead what the party calls its "Doge team", which is modelled on the Department of Government Efficiency set up by US President Donald Trump and aims to cut "wasteful" spending in councils the Reform now controls. Farage, who credited Yusuf with building Reform's infrastructure, insisted the party was "stronger" for the reshuffle. Farage said he "forgave" Yusuf, who he claimed had been "exhausted" and "lost his rag" under pressure. Since returning to the party, Yusuf has said he is probably in favour of banning face coverings in public, not just the burka. Bull has backed calls to outlaw the burka, and said he would make it party policy "if I have any say in it", linking the garment to "a lack of integration in the West".

  In the 1990s David Bull (right) worked on the BBC's Newsround programme, alongside Matthew Price

  Bull, who qualified as a medical doctor in 1993, began his career as an NHS doctor but no longer practices medicine. Instead, he transitioned into a career as a television presenter, including working on BBC shows Newsround and Watchdog, and fronting reality TV show Most Haunted Live! Bull then entered politics, joining the Conservatives in the early 2000s under David Cameron, but rose to prominence as a Brexit Party MEP for North West England in 2019. He played a key role in the Brexit Party's transformation into Reform UK, previously acting as deputy leader.

  Responding to the announcement, a Labour spokesperson said: "While the faces change at the top of Reform UK, the commitment to end the NHS as we know it stays the same. "David Bull has parroted Nigel Farage's plan for an insurance-based healthcare model which would leave working people paying thousands for routine healthcare treatment." Liberal Democrat deputy leader Daisy Cooper called Bull's appointment part of the "conveyor belt of Trump sycophants appointed by Nigel Farage". "Reform is more interested in advancing Donald Trump's agenda over here, not standing up for the communities that they are supposed to represent," she added.

