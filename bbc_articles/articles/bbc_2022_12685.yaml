title: 'In pictures: Extraordinary photos from the Queen’s funeral - BBC News'
date: '2022-09-20'
section: General
url: https://www.bbc.co.uk/news/resources/idt-2d82cfba-f5ea-4072-ba5e-32c28c749a55
content: |-
  The country says goodbye to Queen Elizabeth II for the final time, in an emotional day full of pomp and ceremony.

  Large crowds gathered in central London on Monday to pay their respects to Queen Elizabeth II as she made her final journey from Westminster to Windsor.

  The coffin, topped with the Royal Standard and Imperial State Crown, was carried to Westminster Abbey on the State Gun Carriage of the Royal Navy, drawn by 142 sailors. King Charles III and other senior members of the Royal Family followed behind on foot. Streets around Westminster were packed with people hoping to catch a glimpse of the procession from Westminster Hall to the Abbey, where the funeral service was held. Some 2,000 guests were inside the Abbey for the funeral service, including wider members of the Royal Family and dozens of world leaders and politicians from across the globe. While the streets of Westminster were packed, other parts of London were eerily quiet with many people using the Bank Holiday to gather round TV screens at home to watch the historic events. Big Ben tolled at one-minute intervals as the procession made its way slowly through the streets of the capital. Gun salutes were also fired every minute from Hyde Park. Among the personal touches was a handwritten message from the King, which was placed with a wreath of flowers cut from the gardens of Buckingham Palace, Highgrove House and Clarence House at his request. It read: "In loving and devoted memory. Charles R." After the coffin was transferred from carriage to hearse at Wellington Arch, it then travelled by road to Windsor Castle. There were further crowds of people along the route and thousands more waiting in Windsor, where there was another short procession. Two of the Queen’s corgis, Muick and Sandy, were also waiting for the procession at Windsor Castle - as was Emma, the late monarch's pony. There was a final ceremony at St George's Chapel in Windsor Castle, where the Imperial State Crown and the Orb and Sceptre were removed from the coffin by the Crown Jeweller. They will eventually be returned to the Tower of London.
