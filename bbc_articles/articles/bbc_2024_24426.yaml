title: Tribute to 'caring and thoughtful' Bury woman found dead - BBC News
date: '2024-09-09'
section: Manchester
url: http://www.bbc.co.uk/news/articles/cp8ng190l3go
content: |-
  Police launch a murder inquiry and say the suspect died after being hit by a lorry.

  Barbara Nomakhosi's family said she was "caring and thoughtful"

  The family of a woman who died of multiple injuries have paid tribute to her "caring and thoughtful" nature. A murder inquiry was launched after Barbara Nomakhosi, a carer, was found in Walnut Avenue, Bury, at 22:30 BST on Friday. Greater Manchester Police (GMP) said the 35-year-old had died earlier that evening. The force said a man in his 40s, who was a suspect in her death, had died in a crash involving an HGV lorry and a pedestrian on the M65 in Blackburn, Lancashire, at 21:00 BST that same night.

  GMP added no other suspects were being sought in connection with Ms Nomakhosi's death. In a statement, her family said: “Barbara was a caring and hard-working person. "She was so thoughtful and always checking up on her family and friends. "Barbara loved her family and enjoyed working as a carer. "We loved Barbara so much and life will not be the same without her."

  Det Ch Insp Mark Davis said: “I know just how much Barbara’s family will miss her and I hope that the memories of her can provide comfort as they begin to come to terms with this heartbreaking loss. “This is a complex investigation which is very much ongoing and we remain in contact with colleagues in Lancashire as they progress their own investigation into the circumstances of the fatal collision." He added the force was doing everything it could to support the victim's family.
