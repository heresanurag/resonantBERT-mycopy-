  The Royal Mint says a coin with the Atlantic salmon and the King's portrait is now the rarest 50p.

  All change as salmon and King 50p top rare chart

  50p coin with the Atlantic Salmon is believed to be the most collectible yet

  A 50p with an Atlantic salmon on one side and the King’s portrait on the other is the rarest such coin in circulation, says the Royal Mint. It has replaced the Kew Gardens coin, which had topped the 50p charts of collectibles for the past 15 years. The official maker of British coins, which is based in Llantrisant, Rhondda Cynon Taf, has published its 2023 mintage figures for UK coins in circulation. It confirmed that just 200,000 of the Atlantic salmon 50p have been released to UK banks and post offices, 10,000 fewer than a Kew Gardens coin.

  Only 200,000 Atlantic salmon 50p coins have been minted, says the Royal Mint

  The 50p is the nation’s most collectible coin and has seen more than 100 different designs appear on its "tails" side. These include special designs for the 2012 London Olympic and Paralympic Games and occasions such as King Charles's coronation. Rebecca Morgan, of the Royal Mint said the release of the figures was "eagerly anticipated" by coin collectors. She said: "2023 marked pivotal changes for the nation’s coinage, including the introduction of coins celebrating King Charles III’s coronation entering circulation. "Finding these special designs, like the Atlantic salmon, in your change is a win for all collectors.”

  Out of the 10 rarest 50ps in circulation, six are related to the 2012 London Olympic and Paralympic Games
