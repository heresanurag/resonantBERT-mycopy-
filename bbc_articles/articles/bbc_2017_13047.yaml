id: bbc_2017_13047
title: Motorway PC stops van falling from bridge in Yorkshire - BBC News
date: '2017-12-04'
section: General
url: http://www.bbc.co.uk/news/uk-england-leeds-42227632
content: |-
  The vehicle was hanging over the bridge on the A1 in Yorkshire.

  A police officer held on to a van to stop it falling from the edge of a motorway bridge.

  PC Martin Willis arrived at the scene on the A1(M) in Yorkshire and the van driver was trapped inside.

  Writing on Twitter, he said he grabbed on to the vehicle to stop it "swaying in the wind".

  PC Willis, known as Motorway Martin to his followers, said he couldn't "begin to describe [his] relief" when firefighters arrived.
