title: 'Storm Dudley: Cardiff trains delayed by trampoline on tracks - BBC News'
date: '2022-02-17'
section: General
url: http://www.bbc.co.uk/news/uk-wales-60410342
content: |-
  Storm Dudley also causes power cuts and trees to fall, with things expected to worsen by Friday.

  As Storm Dudley hit Wales there were power cuts, trees were felled and a trampoline was blown on to railway tracks.

  Now people are being warned to stay indoors on Friday as Storm Eunice threatens to batter parts of the country with winds of up to 100mph (160 km/h) between 03:00 and 21:00 GMT on Friday.

  BBC weather presenter Sabrina Lee said Friday was "not a day to venture out".
