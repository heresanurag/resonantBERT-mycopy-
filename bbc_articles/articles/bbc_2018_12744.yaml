title: Lion cub found in Paris apartment in France - BBC News
date: '2018-10-24'
section: Europe
url: http://www.bbc.co.uk/news/world-europe-45961015
content: |-
  Police in Paris have seized the six-week-old animal and arrested its owner.

  The authorities have warned against treating wild animals as toys or pets (file photo)

  A 30-year-old man has been arrested after a lion cub was discovered in an apartment in the suburbs of Paris.

  According to French media, police were alerted after the suspect tried to sell the six-week-old female for €10,000 ($11,470, £8,835).

  He was discovered hiding in a cupboard at a neighbour's home on Tuesday, while the cub was found on a child's bed.

  The animal is said to be in good health and has been handed to wildlife authorities.

