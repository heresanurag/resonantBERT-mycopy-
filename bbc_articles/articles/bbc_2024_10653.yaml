content: |-
  Work on the site is expected to finish later this year.

  A hospital has said a newly released video shows work on its new building is "really starting to take shape".

  Luton and Dunstable University Hospital is constructing a new block which will include maternity, neonatal and critical care services, as well as operating theatres.

  Work on the site started in 2022 by contractor Kier and was expected to finish by the end of 2024.

  A hospital spokesperson said: "The acute services block and new ward block are really starting to take shape, with the facade now bringing our plans to life."
