  Aldi’s most recent figures, published earlier this month, showed its pre-tax profits more than tripled to a record £536.7m in the year to the end of December 2023, driven by an extra £2.4bn in sales. Price rises and new store openings drove much of the rise in earnings, but it also attracted new customers. However, the chain is now growing at a slower rate than most of its big rivals, including Lidl. This time last year, Aldi was the fastest-growing supermarket, according to industry data, but it has since lost ground in market share as competitors have fought back. It has more than 1,020 stores across the UK and employs 45,000 people.

  Tesco’s Stockwell & Co Chilli Con Carne has 15% beef, while its Aldi comparison product has 27%

  The vast majority of the products Aldi and Lidl sell are own-label. Last year, Giles Hurley, Aldi’s boss in the UK and Ireland, told the BBC products sold under a supermarket's own name now make up more than half of everything shoppers buy, by value. "If you look in volume terms that figure is much bigger and at the moment own-label products are growing at twice the rate of branded goods," Mr Hurley said. "Why would [shoppers] go back?" Meanwhile, Tesco, the UK's biggest supermarket chain, reported in April that its pre-tax profits hit £2.3bn, up from £882m, while sales rose by 4.4% to £68.2bn in the year to 24 February. It has 2,800 stores and employs 330,000 staff.
