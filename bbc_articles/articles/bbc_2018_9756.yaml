  Dina Asher-Smith wins 100m gold with a British record time of 10.85 seconds

  Dina Asher-Smith sets a new British record time of 10.85 seconds for the 100m - equalling the fastest time in the world this year - as she storms away from the field to win gold at the European Championships in Berlin.

