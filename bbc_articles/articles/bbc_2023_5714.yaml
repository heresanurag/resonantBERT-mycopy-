title: Royle Family and Emmerdale actor Peter Martin dies aged 82 - BBC News
date: '2023-04-27'
section: Humberside
url: http://www.bbc.co.uk/news/uk-england-lincolnshire-65411798
content: |-
  Tributes are paid to Mr Martin, from Gainsborough, who also appeared in Emmerdale and Brassed Off.

  Doreen Keogh as Mary Carroll with Peter Martin as Joe Carroll in The Royle Family

  Actor Peter Martin, who starred in The Royle Family and Brassed Off, has died aged 82.

  Mr Martin, born in Gainsborough, was also known for his roles in Emmerdale and the original BBC series of All Creatures Great and Small.

  Ricky Tomlinson, who appeared with Mr Martin in The Royle Family, paid tribute to the actor.

  He said Mr Martin was an "absolute joy to work with and a brilliant actor", adding he would be "sadly missed".

  Roxanne Pallett, playing Jo Stiles, kisses Peter Martin in a scene from Emmerdale in 2005

  Mr Martin starred as neighbour Joe Carroll in The Royle Family, and as Len Reynolds in Emmerdale between 2001 and 2007.

  He lived in Hessle for 25 years and later moved to Barrow upon Humber.

  Mr Martin played Ernie in 1996 film Brassed Off, which also starred Pete Postlethwaite and Ewan McGregor.

  Grimethorpe Colliery Band, which inspired the film, said members were "saddened to hear" of the actor's death.

  In a statement released on social media the group said Mr Martin had an "illustrious career" and added: "Band members say that Peter was exactly like his character, Ernie - dry and always ready with a wise crack. He would have fitted into the band well in real life."

