title: Council tax hikes should be kept to minimum, Shona Robison says - BBC News
date: '2024-12-05'
section: Scotland Politics
url: http://www.bbc.co.uk/news/articles/cj49vn7jlr5o
content: |-
  The finance secretary says a record funding deal should prevent an increase - but the decision will rest with local authorities.

  No need for 'large' council tax hikes - Robison

  Finance Secretary Shona Robison says council's should be "sensible" about tax increases

  Council tax increases should be kept to a "minimum" next year, Finance Secretary Shona Robison has claimed. Her government is planning to end a freeze on local authority levies from April. Robison said a proposed £1bn uplift in funding for councils should prevent them from introducing any "large" tax increases. Ahead of the Budget, council body Cosla warned that increases could be needed to protect "vital services".

  It is yet to issue a full response to the government's spending plans, with council leaders due to meet on Friday.

  Council tax is set, administered and spent by local authorities. The government has previously offered a financial incentive for them to comply with a cap or freeze. Robison told BBC Radio's Good Morning Scotland programme: “The settlement that we are giving to local governments, I think, will mean that they don't have to put large increases to council tax." She added: “I don't think there's any administration of any political colour that will want to look at citizens in the eye, given this settlement, and increase the council tax beyond what is required. "And I'm sure there'll be a sensible outcome in those discussions.”

  Funding for local authorities will exceed £15bn for the first time under the government's Budget plan. Robison said this would include £289m of non-ring fenced discretionary funding in the general revenue grant. That record settlement would still fall short of the £15.4bn Cosla called for ahead of the Budget. A recent survey, external by the Local Government Information Unit found that about a fifth of councils were considering tax rises of at least 10% next year. Perth and Kinross councillors have already voted in favour of proposals that would see tax increases of 10% in 2025 and 2026, and 6% in 2027. The plan will be subject to approval when the local authority agrees its budget in February.

  Since 2007, council tax has generally either been frozen or increases have been capped by Holyrood. According to figures from 2021-22, external, council tax revenue made up about a fifth of local authority funding. The levy was frozen in 2024-25, with the government paying councils more than £200m to cover the cost. A freeze was welcome news for homeowners, but it angered councils desperately short of cash. The move has also been criticised as an inefficient way of helping the worst off, with rates based on property values from 1991. After the Budget, Cosla said it would "spend the coming days analysing the implications for local authorities".

  Scotland’s 32 councils will be doing the sums in the coming days to work out exactly what the Budget means for them. Some of that money will be ring-fenced or tied to particular objectives or projects. The council tax makes up a relatively small amount of each council’s overall budget but it is hugely important as it is paid by every household. But would significant rises be acceptable to local voters? Would they be unhappy about bills rising? Or would they be happy to pay more if they felt local services were being protected? In 2023, while inflation was running high, councils had the freedom to increase council tax by as much as they felt appropriate. Many went for rises of 5% though a few went for more. Individual councils will decide on local council tax increases in around two months’ time.

  The Scottish Conservatives said the government should have used the Budget to reverse "damaging tax increases". Instead Robison proposed changes to lower income tax thresholds, which she said would provide "certainty and stability" for taxpayers. The move would save people with earnings below £30,300 up to £28.27 per year compared to if they lived elsewhere in the UK, according to the Chartered Institute of Taxation. Robison said the income tax measures set out in this Budget would raise an extra £1.7bn for the Scottish government, compared to if the UK system was in place.

  Another key announcement was an extra £2bn in cash terms for the health and social care budget, compared to 2024-25. However David Phillips, associate director at the IFS, said figures published alongside Robison's speech, external suggest the actual uplift will be closer to £1bn. A proposal to effectively scrap the two-child cap on benefits in Scotland was the "rabbit out of the hat" in the SNP Budget. The UK government policy prevents parents from claiming universal credit or child tax credit for a third child, with a few exemptions. Robison said she would aim to provide funding to the families of the 15,000 affected children in Scotland by April 2026 - but did not set out how the government would achieve this. The government estimates that would cost between £110m and £150m in 2026-27. Independent economists say the costs could rise to up to £300m in future years. SNP ministers say Social Security Scotland would get £3m over the next two financial years to build the system required to mitigate the cap, but that they need the UK government to provide data on who is missing out on benefits due to the policy. “I would be astonished if the UK Labour government didn't ensure that the Department of Work and Pensions was approaching this in a sensible, productive way," Robison said. Social Justice Secretary Shirley-Anne Somerville has formally written to the UK government seeking access to eligibility data and cooperation to ensure any extra benefit payments are not clawed back. A UK government spokesperson said it would engage constructively with the Scottish government "where necessary".

  The Scottish government says it wants to provide payments to 15,000 children who miss out on benefits due to the two-child cap

  The two-child cap was introduced by the Conservative UK government in 2017 but has been kept in place by Sir Keir Starmer's Labour administration. At First Minister's Questions, John Swinney said his government wanted to end the "heinous" two-child limit "because the UK Labour government has to date failed to do so". Following a speech setting out his six priorities, Sir Keir said he did not accept that scrapping the cap would be a "silver bullet" to tackling child poverty. "If you're really going to tackle child poverty you've got to look at health, you've got to look at education, you've got to look at so many aspects of a child's life," he said. The Labour leader said he was committed to driving down child poverty and had set up a taskforce to do so.

  Sir Keir Starmer has defended his government's policy on the two-child cap

  In each of the past three years, the Scottish government has been forced to use emergency powers to balance its budget. Announcing cuts of £500m earlier this year, it cited higher than expected public sector pay deals after they exceeded the forecast 3%. For 2025-26, the government has again budgeted for a 3% increase, though it is part of a 9% rise over three years. Robison insisted the government would not have to use emergency measures next year. She also said she would not "settle" for a reported £300m compensation package from the UK government to compensate for a rise in employers' National Insurance payments. Holyrood ministers say the UK-wide tax change could increase public sector staffing costs by more than £500m.

  The UK government spokesperson said the chancellor's Autumn Budget had delivered more money than ever before for Scottish public services. At First Minister's Questions, Scottish Conservative leader Russell Findlay described the SNP Budget as "disastrous". He added: "Instead of reducing tax the SNP have dragged more Scots into paying higher income tax." Scottish Labour leader Anas Sarwar accused SNP ministers of "squandering the opportunity" of record levels of funding from the UK government. He said they had "no plan, no leadership and no vision for Scotland".
