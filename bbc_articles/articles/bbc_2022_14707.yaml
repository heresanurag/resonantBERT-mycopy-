title: 'I''m A Celebrity: Boy George in tears as Matt Hancock enters camp - BBC News'
date: '2022-11-10'
section: General
url: http://www.bbc.co.uk/news/entertainment-arts-63579059
content: |-
  The singer says his mum was in hospital during the pandemic, and he thought she was going to die.

  Boy George was visibly upset when talking about former Health Secretary Matt Hancock’s presence to reality show I'm A Celebrity.

  The singer said his mother was seriously ill in hospital during the pandemic, and indicated he felt uncomfortable "sitting here having fun" with Hancock.

  Boy George added that if his mother had passed away, he would not have been on the show.

  "I don’t want to spoil this experience for myself," he added. "I’m not good at hiding what I feel. Especially when it’s something so strong."
