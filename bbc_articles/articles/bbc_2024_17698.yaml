  Before meeting Mr Swinney at Bute House, Sir Keir spoke at an event with Scottish Labour leader Anas Sarwar. He said he would govern as “changed Labour”. Sir Keir described the general election victory as part one of his party's plan, with part two coming when the next Holyrood election takes place in 2026. The prime minister pledged to govern for everyone in Scotland, including those who did not vote for the party. He said: “I asked people in Scotland, put their trust and faith in Labour. I said if they did so we would deliver for Scotland.” Sir Keir added: “And that’s why I wanted to stand here today, to make good on that promise, to make good on that commitment at the first opportunity.”

  Mr Sarwar also said the new UK government would "reset" devolution. He told BBC Scotland's Sunday Show: "We are always going to put the country first before our own political party. "So we will work with anyone and everyone to deliver for the Scottish people. And that's why Keir Starmer's first visit outside of Downing Street is coming to Scotland."

  This video can not be played To play this video you need to enable JavaScript in your browser. 'We are going to reset devolution', Anas Sarwar says

  Mr Sarwar was asked if the new Labour government would introduce a separate Scottish immigration system to allow workers to come to the country, using a distinct tax code, to address workforce shortages north of the border. He replied: “No. We have to have one UK Border Agency. Of course we need one immigration system.” He added: “But if you have two governments willing to work together, you can find distinct solutions for Scotland.” He cited the example of the Fresh Talent initiative, introduced by the Labour-led Scottish executive 20 years ago, to address a declining population. The scheme encouraged overseas graduates from Scottish universities to stay on working in Scotland.

  For Sir Keir, this is a whistlestop tour to Scotland, Northern Ireland and Wales before meeting English mayors on Tuesday. The message is pretty obvious - to stress the "United" in Kingdom. But the work isn't over - the party now hopes to win control of the Scottish government from the SNP - in the 2026 Holyrood elections. That means delivering the change Labour has promised Scottish voters as quickly as possible. It will be a huge challenge when the party has pledged to stick to Conservative spending plans and some of its welfare polices. The clock is already ticking. In Westminster elections Scotland has now swung dramatically from Labour to the SNP and back again in less than a decade. That has led to some painful soul searching for supporters of Scottish independence. But it’s also a reminder to Labour that voters can change their minds pretty quickly.

