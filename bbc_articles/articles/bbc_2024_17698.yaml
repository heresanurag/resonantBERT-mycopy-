title: Starmer and Swinney to work together on 'common ground' - BBC News
date: '2024-07-07'
section: Scotland
url: http://www.bbc.co.uk/news/articles/c87rk4dzv0do
content: |-
  The new prime minister wants to establish a "different and better" way of working across the United Kingdom.

  Starmer and Swinney to work together on 'common ground'

  Prime Minister Sir Keir Starmer has met First Minister John Swinney for the first time since Labour's landslide election win. Speaking after their meeting, the prime minister said his new government "got a clear mandate for change" in the election, and one thing that needed "reset" was the relationship between the Scottish and UK government. "We are of a joint view that we can work constructively together," he said. The new PM is touring the United Kingdom, and will next visit Wales and Northern Ireland before meeting mayors in England. Mr Swinney said the pair had agreed to improving the relationship between their governments, which had been “very poor” under the last Conservative administration. They committed to working collaboratively on areas of “common ground”, Mr Swinney said, including growing the economy, delivering net zero and improving public services. Mr Swinney said he hoped Sir Keir was able to “fulfil” his commitment to reset the relationship.

  This video can not be played To play this video you need to enable JavaScript in your browser.

  Sir Keir held a meeting with Mr Swinney at the first minister's official residence in Edinburgh. The visit comes days after a dramatic upturn of Labour's fortunes in Scotland. The party now has 37 of Scotland's 57 MPs - up from just one in 2019 - while the SNP's tally fell by 39, leaving them with just nine MPs at Westminster.

  On independence, the prime minister said there were "clearly differences" between them on constitutional issues. Mr Swinney reiterated his support for independence, but acknowledged the SNP had to “reflect” on the result of the election. Asked if the Scottish government still believed it had a mandate for an independence referendum, he said in 2021 the electorate voted "in favour of the objective of Scottish independence and the delivery of that independence through a referendum". "I think the democratic will of the people of Scotland from that election should be respected,” he said.

  A pro-Palestinian protest was held outside the official residence

  Pro-Palestinian protesters staged a demonstration outside Bute House, where the meeting was taking place. The leaders had been expected to pose for a picture at the front door. However, due to the protest the prime minister entered and left via a back entrance. Mr Swinney said they did not discuss the issue of Gaza but said the protest showed the “strength of feeling” on the issue. He called for an immediate ceasefire, arms sales to Israel to end and for Palestine to be recognised as an independent state.

