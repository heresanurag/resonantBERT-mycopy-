content: |-
  John Cowen allegedly attacked man with a knife at a quiz-themed event in Blackpool, a court hears.

  John Cowen appeared for a brief hearing at Preston Crown Court

  A Countdown champion has appeared in court accused of stabbing a fellow former winner at a quiz-themed event. John Cowen, 30, appeared at Preston Crown Court, accused of wounding with intent and two counts of possession of a bladed article. Mr Cowen, who appeared on the TV quiz show in 2017, allegedly attacked Thomas Carey with a knife at the Countdown in Blackpool 2024 event at the Wainwright Club in the town on 14 September. Mr Carey, a Cambridge maths graduate who also won the show, was taken to hospital for treatment to an injury to his arm.

  Mr Cowen was arrested at the event shortly after. The defendant, from Morecambe, Lancashire, spoke only to confirm his identity at the brief hearing before Judge Darren Preston.

  He was remanded into custody at HMP Liverpool until a further hearing on 6 December. The Countdown in Blackpool event is an annual tournament which pits former winners and fans of the Channel 4 gameshow against each other. Mr Cowen scored the third highest total of the whole series he was a contestant on, as well as spotting the nine-letter word "spreading". He went on to appear in a further 11 episodes, winning eight consecutive contests before he was finally defeated.
