title: Who spends $150,000 on a kid's birthday party? - BBC News
date: '2017-02-21'
section: General
url: http://www.bbc.co.uk/news/business-39001801
content: |-
  Children's birthday parties are getting expensive in some countries - but how much would you spend keeping up with the Joneses?

  Children's birthday parties can be an expensive affair.

  In some parts of Asia, where disposable incomes are high, families are happy to fork out a fortune. As part of our Business of Kids series, we met some top-notch party planners cashing in on the opportunity .
