content: |-
  The BBC Radio 1 presenter ran 150 miles for Comic Relief, crossing the finish line in Salford.

  This video can not be played To play this video you need to enable JavaScript in your browser.

  BBC Radio 1 presenter Jamie Laing has completed his Comic Relief Ultra Marathon Man challenge - raising more than £2m for the charity. The former Made in Chelsea star ran five consecutive ultra marathons in five days - 150 miles (241km) in total - from London to Salford, where he crossed the finish line on Friday. He thanked everyone "who's donated, who's supported, who's sent me messages" adding: "That was a wild ride everyone. That was intense at times. That was emotional. I've never cried more in my life." Laing, who claimed to have never run more than 5km (3.1 miles) before taking on the challenge, was met by wife Sophie Habboo and Radio 1 DJs Greg James, Vick Hope and Jeremiah Asiamah.

  Laing said: "At one point I thought I was down and out. Mentally I was gone, physically I was broken. I didn't have anything left in me. "Something pulled me out. The last kilometre was the most euphoric thing I've ever had." It comes as Red Nose Day celebrates 40 years of comedy and entertainment this year, marking the occasion with a night of live TV on Friday. Laing described how running five ultra marathons in five days had changed him. "It's made me more vulnerable, thankful, grateful," he said. "It's made me realise humans are amazing and that life is beautiful."

  The moment Jamie Laing crossed the finish line in Salford

  Radio 1's Greg James joined Jamie's final day of his marathon challenge, in, er, questionable running attire

  Setting off from BBC Broadcasting House in London on 17 March, Laing waved a giant green flag at the starting line, with a crowd of cheering supporters. He was met by 50 lookalikes in Hyde Park, all donning blonde Jamie Laing wigs. On day three after setting off from Market Harborough, Laing told Radio 1 listeners he feared he might "quit". But he went on to say: "I have to get through this... I am just running, it's only temporary." After listeners helped raise £450,000 for Comic Relief, Greg James agreed to run alongside Jamie in a wedding dress on the final day.

  Before Jamie found out he'd raised over half a million on Wednesday, he was actually being sick on the side of a road

  During the challenge, listeners praised Laing for speaking honestly about his previous mental health struggles. He opened up about living with anxiety in his twenties, saying: "I didn't know who to turn to," adding: "I'm running to raise money for people who are affected with loneliness, anxiety, depression, OCD, insomnia, whatever it may be." Fellow presenter Asiamah described Laing as "an example for so many men out there", praising his ability to persevere with the challenge. On crossing the finish line, Laing reiterated the importance of speaking openly about mental health. "It's way braver to talk about it than not talk about it," he said. "This week has made me realise that talking about things is the coolest thing in the world." "Being vulnerable is the greatest thing in the world. Sing it from a rooftop." Comic Relief: Funny for Money, will be broadcast live from 19:00 GMT on BBC One and 22:00 GMT on BBC Two on Friday. To donate any amount online to Comic Relief and to support Jamie's challenge, click this link, external.

  A big tearjerker was when Jamie saw his wife, Sophie Habboo, waiting for him at the finish line on day three

