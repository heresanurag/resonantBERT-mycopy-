content: |-
  The comments come as the Taliban close in on the capital Kabul, with fierce fighting under way.

  How close are the Taliban to Kabul?

  Thousands of civilians fled to the relative safety of Kabul, Afghanistan's capital, as the Taliban took control of city after city.Now the militants are closing in there, too, and there have been reports of US airstrikes on Taliban positions at the gates of Kabul province. The latest US intelligence assessment suggests they could try to advance on the city within 30 days. Their string of captures across the country over the past week have been lightening fast. Yesterday the Taliban captured Pul-e-Alam, capital of Loghar province, 80km (50 miles) from Kabul. Even closer - violent clashes have broken out in Maidan Shar, a provincial capital just 40km (25 miles) from Kabul. The Taliban now control about half of Afghanistan's regional capitals after seizing some of its most important centres, including the country's second-largest city Kandahar. The UN Secretary General Antonio Guterres says the situation in Afghanistan is spinning out of control and civilians would pay the highest price if the conflict continued. Taliban frontline commanders and foot soldiers told the BBC they were determined to re-impose their version of Sharia law, which would include stoning for adultery, amputation of limbs for theft and preventing girls from going to school beyond the age of 12.
