title: 'Southport: ''Community hero'' who hurled bricks at police in riots jailed
  - BBC News'
date: '2024-09-18'
section: Liverpool
url: http://www.bbc.co.uk/news/articles/c870xq13ynjo
content: |-
  Joshua Cropper, who previously won a community award, was caught on video hurling rocks at a police van.

  Joshua Cropper hurled rocks and bricks at a police van with officers inside

  A former community award winner who hurled bricks at a police van during a riot in Southport has been jailed. Joshua Cropper, 31, of Pitt Street, Southport, who was previously given a Pride of Sefton Award, was caught on video launching rocks, bricks and a concrete slab at the van while officers were inside, Merseyside Police said. He was sentenced to two-and-a-half years for violent disorder in the town on 30 July. Meanwhile, a 16-year-old boy from Knowsley, who cannot be named, has been convicted of assaulting a police officer during violent disorder in Liverpool on 3 August.

  Cropper was given a courage award in the 2023 Pride of Sefton Awards for rescuing a number of dogs from a burning house. Awards organisers Stand Up For Southport reported at the time that he was "overwhelmed" to get the award. Speaking to the Stand Up For Southport, external community website at the time, the dad-of-three said: “I believe in karma. It’s good to do things to help other people.” Det Ch Insp Tony Roberts said: “Cropper played a central role in the awful scenes he and others brought to the town that day." He said Cropper had repeatedly smashed the side window of a police van with a rock while officers were inside and picked up a concrete slab which he then used to strike the bonnet a number of times. “While Cropper was topless throughout, he made some attempt to cover his face with a top tied around his neck and he wore a cap," he added, . Sitting on Tuesday, Liverpool Crown Court also heard that the 16-year-old assaulted a police officer by kicking him in the back after he had already been pushed off his motorbike on The Strand. Mobile phone footage of the incident was shared widely on social media.

  Police said Joshua Cropper "played a central role in the awful scenes he and others brought to the town that day"

  The teenager was convicted of violent disorder, criminal damage, assault by beating of an emergency worker and two counts of burglary other than in a dwelling. He was also identified on footage as being at the forefront of a large mob who threw bricks at officers as well as damaging and burgling stores in Clayton Square. A pre-sentence report was ordered and the boy, who also tried to conceal his identity with a face mask, will next appear at Liverpool Crown Court on 1 October. DCI Roberts said the footage of the police officer being assaulted on The Strand was "truly shocking". "A lot of people would have viewed it and been appalled after it was widely shared on social media in the immediate aftermath of the disorder in Liverpool," he said. “Thankfully the officer didn’t sustain serious injuries during this particular incident, but the aggression and violence on display serves as a snapshot of what all of our officers had to deal with during the incidents in Liverpool and Southport." The force continued to identify suspects with more charges expected, he added.
