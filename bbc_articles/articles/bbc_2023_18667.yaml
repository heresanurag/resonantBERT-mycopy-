content: |-
  Tributes are paid to the supporter who died in the stands during Granada's home game against Athletic Bilbao on Sunday, with the game resuming on Monday.

  Last updated on .From the section European Football

  Tributes were paid to the supporter who died in the stands during Granada's home game against Athletic Bilbao as it resumed on Monday.

  The fixture at Nuevo Los Carmenes stadium was stopped after 17 minutes on Sunday as paramedics tried to resuscitate the Granada season ticket holder who had a cardiac arrest.

  It was abandoned an hour later.

  On Monday, a minute's silence was held before the resumption of the game, which ended 1-1.

  A shirt was also placed on the supporter's seat in the stands, while captains Victor Diaz of Granada and Iker Muniain of Athletic Bilbao laid flowers as they paid their respects.

  The fan was named by Granada as Antonio Trujillo Izquierdo.

  Inaki Williams had given the visitors the lead before the game stopped on Sunday, but an Inigo Ruiz de Galarreta own goal earned Granada a draw.

  On Sunday, the hosts had also offered condolences to the fan's "family and friends as well as to the entire Granada family".

  Athletic goalkeeper Unai Simon was applauded by Granada supporters for helping to inform officials of the incident in the stands. Players from both sides left the pitch 20 minutes after the match was initially stopped on Sunday.
