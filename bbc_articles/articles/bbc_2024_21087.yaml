content: |-
  Police say it is "vital" the men and boys pictured come forward after disorder across Merseyside.

  Photos of 14 men released in police appeal over riots

  Police are asking people who recognise those pictured to get in touch

  Police have released photographs of 14 men and boys they want to speak to after riots took place on Merseyside days after the deaths of three girls in Southport. Bebe King, six, Elsie Dot Stancombe, seven, and Alice da Silva Aguiar, nine, were stabbed to death at a holiday club on 29 July. Violent disorder then erupted in Southport, Liverpool city centre and Walton, along with other towns and cities across the UK, causing injuries to officers and widespread damage. Merseyside Police said it was "vital" those pictured in the CCTV images made themselves known "as soon as possible" and appealed to anyone who recognised them to get in touch.

  Some of those in the pictures are wearing caps, sunglasses and covering their faces

  Det Supt Paul Speight said: “The communities of Southport and beyond were disgusted by the violence and damage caused last week and at the weekend. “We are still working our way through information, images and footage as it comes in and we’ll continue to take action to arrest, charge and put before the courts anyone identified." A number of suspects appeared in court earlier in connection with the riots and three men have been jailed for violent disorder, including setting a police van on fire and punching an officer. Meanwhile, a 17-year-old boy from Walton has become the 16th person to be charged in connection to disorder in Liverpool on 3 August. The youth, who cannot be named for legal reasons, has been charged with violent disorder and burglary and was remanded to appear at Merseyside Youth Court on Thursday. Merseyside Police said 42 people had been arrested so far over the riots, 16 charged and three jailed. Anyone who knows the people in the CCTV images is being urged to contact the force.
