  First Minister Nicola Sturgeon tells her daily briefing there has been one death from Covid-19 in the past 24 hours.

  Summer spending stimulus - what does it mean for Scotland?

  The Treasury’s £1.57 billion of financial backing vocals for the art and culture sector is bringing £97m to Holyrood. The funding is part of this week’s summer stimulus of spending and support, being set out tomorrow by the Chancellor, Rishi Sunak. A further splurge announced this morning is of £3bn of greenery, including £2bn vouchers for English home-owners to make energy efficient improvements. Expect a share of that for devolved administrations, including Holyrood. This brings us back to the question of what gets a share of funding to Holyrood and what is applied directly in Scotland. Pre-briefing includes a report, in The Times, that the property market is to get a stimulus from a cut to stamp duty in England and Northern Ireland. That translates in Scotland to the Land and Buildings Transaction Tax, wholly controlled from Holyrood. It can also choose to cut those rates as a stimulus, but unlike Westminster, it can’t borrow to fill the gap created in its budget. The Times is also reporting there could be a VAT cut aimed at restaurants and pubs. If that happens, that would cross the border and apply equally to Scotland. The Scottish government wants extended furlough funding, which has been done through the tax system at a UK-level. For the details though, we’ll have to wait until Wednesday, and later find out what the Scottish government intends to do with additional funds.
