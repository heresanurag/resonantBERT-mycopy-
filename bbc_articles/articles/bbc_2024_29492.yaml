content: |-
  Watch: Will Stone MP grapples with a pro-MMA fighter to raise money for a mental health charity.

  Will Stone MP grapples with pro-MMA fighter Matt Inman in a match held at Croydon's Fairfield Halls.

  The new Labour MP for Swindon North is also a black belt in Brazilian jiu-jitsu and former soldier.

  Both men agreed to donate money raised from the event to The Kelly Foundation, a mental health charity in Stone's constituency.
