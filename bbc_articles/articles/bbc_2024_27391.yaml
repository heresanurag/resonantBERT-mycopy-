title: 'Sydenham shooting: One dead and two injured in south-east London - BBC News'
date: '2024-11-10'
section: London
url: http://www.bbc.co.uk/news/articles/cy87rmx2k5yo
content: |-
  A man has been shot dead while two other people received treatment for gunshot injuries.

  Man shot dead and two injured in south-east London

  Police were called to a shooting near Wells Park Road

  A man has been killed and two people have been injured in a shooting in south-east London. The Metropolitan Police said officers were called to reports of a shooting near Wells Park Road, Sydenham, just after 10:00 GMT on Sunday. They found a man with injuries who died at the scene. A woman who was discovered with gunshot injuries to her legs was taken to hospital. Her condition is not described as life-threatening. A third person attended hospital with what were believed to be gunshot injuries, the force added, although their condition was unknown.

  Police are trying to establish the identity of the victim and tell his family

  Neighbours have said that near the scene of the shooting there was a “very busy” party, which carried on until the morning. Sabrina Charles, who lives nearby, said she was woken in the early hours of Sunday by noise coming from flats in Hensford Gardens. "I didn’t hear the music until after 11pm, and it went on until around 5am," she said, adding that the gathering was still going on at 07:00 when she walked her dog. Another resident living within the cordon, who wished to remain anonymous, said they heard screaming and shouting at about 10:00, before getting on a bus.

  No arrests have been made and police are trying to establish the victim's identity and contact his family. Cdr Peter Stevens said: "I know people will be shocked by this senseless act of violence, all the more so on a Sunday morning in a residential area. "I share their concerns and can assure the local community that the Met's response, alongside our partners, has been rapid. "We are determined to safeguard the community, to get to the bottom of what happened here and bring those responsible to justice." He added that there would be additional officers patrolling the area as well as forensic experts at the scene. The eastern end of Wells Park Road and a block of flats in Hensford Gardens are taped off, with the cordons likely remain in place "for some time".
