  RMT boss Mick Lynch says his members will "keep going" in their dispute over pay, jobs and conditions.

  Lynch says action will continue 'until we get a settlement'

  More now from RMT leader Mick Lynch. He told Sky News that action by his union will continue "until we reach a settlement" with Network Rail and other operators. He's also warned that the UK could be brought by a standstill by a wave of strikes hitting "every sector of the economy". He stopped short of predicting a general strike, saying that it was down to Trades Union Congress to make that decision. But he added: "What you are going to get is a wave of solidarity action, generalised strike action, synchronised action. "And you'll see it in every sector of the economy, in education, in health, wider parts of the transport system, in all sectors, the private sector as well. "People are fed up with the way they've been treated. The British worker is basically underpaid and gets no dignity or respect in the workplace."
