title: 'Watch: Torvill and Dean perform Bolero 40 years on - BBC News'
date: '2024-02-15'
section: General
url: http://www.bbc.co.uk/news/uk-england-nottinghamshire-68305403
content: |-
  The pair returned to Sarajevo, Bosnia-Herzegovina, where they won a gold medal for their performance at the Winter Olympics.

  Figure skaters Jayne Torvill and Christopher Dean have performed an adaptation of their iconic 1984 Bolero performance.

  The pair skated in front of a crowd at the Skenderija Cultural and Sports Centre in Sarajevo, Bosnia-Herzegovina, to mark the 40th anniversary of their gold medal-winning performance at the Winter Olympics.

  The Valentine's Day Bolero performance in 1984 made Torvill and Dean the highest-scoring figure skaters of all time for a single programme.

  The pair will skate together for the final time as part of a UK tour in 2025.

