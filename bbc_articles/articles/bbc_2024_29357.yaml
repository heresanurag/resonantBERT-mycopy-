  The PM replied: "She talks about a petition, we had a massive petition on the 4th of July in this country. "We spent years taking our party from a party of protest to a party of government, they are hurtling in the opposite direction." Badenoch also challenged the prime minister to repeat a pledge from Chancellor Rachel Reeves not to make further increases to taxes or borrowing after the Budget. Sir Keir declined to restate the pledge, adding he was "not going to write the next five years of Budgets”. And he accused Badenoch of making "unfunded commitments" by backing extra spending, whilst not saying whether she would reverse the NI hike if she were in government. The Conservatives, he told MPs, had “nothing to offer except complaints”. Those signing online petitions on Parliament's website are asked to tick a box saying they are a British citizen or UK resident, and provide a postcode. The most popular e-petition ever came in 2019, when one calling for Brexit to be cancelled received 6.1 million signatures. Three years earlier, a call for a second Brexit referendum garnered 4.2 million names. The current petition system replaced one run by the Cabinet Office between 2011 and 2015, which in turn replaced a Downing Street website set up under New Labour in 2006. Almost 1.8 million people backed a petition on the Downing Street website calling on the Blair government to "scrap the planned vehicle tracking and road pricing policy".
