  'My voice has gone' - what they said

  Newport manager Michael Flynn told BBC Sport: "It was unbelievable. My voice has gone.

  "I'm so proud of the players. They were excellent from start to finish - the amount of work they did off the ball and the chances we created as well.

  "Let's not say that we just hung on - we created quite a few chances. And my assistant Wayne Hatswell said that Gary Lineker owes him a pint because he keeps going on about the own goal he scored!"

  Leicester manager Claude Puel told BBC Sport: "Congratulations and well done to this team. They believed in themselves and created the upset.

  "It is a big disappoint for us. It is difficult to accept.

  "We had lots of opportunities without finding a clinical edge.

  "We thought we did the most difficult thing to come back and then conceded a penalty. It was a typical cup game with the conditions.

  "We had an experienced team to manage this game. We had lots of experience and a good team on the pitch."

  Scoring for fun in the cup - best of the stats
  • None Newport's victory was their first FA Cup win against a side from the top tier of English football since beating Sheffield Wednesday in the third round in 1963-64.
  • None Leicester have been eliminated from the FA Cup by a side in the fourth tier of English football or lower for the first time since non-league Harlow Town knocked them out in a third-round replay in 1979-80.
  • None Leicester have lost back-to-back games in all competitions against fourth-tier opposition (Shrewsbury Town and Newport County) - as many defeats as in their previous 34 matches against such opponents (W31 D1 L2).
  • None This is the first time two top-flight sides have been knocked out of the FA Cup by teams from the fourth tier or below on the same day since 7 January 1989, when Middlesbrough were beaten by Grimsby and Coventry by Sutton United.
  • None Newport have scored 16 headed goals in all competitions this season. Of sides currently in the top four tiers of English football, only Aston Villa have scored more (19).
  • None Jamille Matt has scored on five of his six starts in the FA Cup since his first in November 2016.
