  People were seen embracing and crying at the site of the attack in Sumy

  A spokesperson for UN Secretary-General António Guterres said he was "deeply alarmed and shocked" to learn of the missile attack. "Attacks against civilians and civilian objects are prohibited under international humanitarian law, and that any such attacks, wherever they occur, must end immediately", he added. Guterres stressed the UN's support for "meaningful efforts towards a just, lasting and comprehensive peace that fully upholds Ukraine's sovereignty, independence and territorial integrity". Sunday's double missile strike was the deadliest attack on civilians in Ukraine this year. Another Russian missile attack, earlier this month on 4 April, killed 20 people and injured 61 in the city of Kryvyi Rih. On that occasion, Russia's defence ministry said it had targeted a meeting of "unit commanders and Western instructors" in a restaurant. No evidence was provided. It is estimated that hundreds of thousands of people - the vast majority of them soldiers - have been killed or injured on all sides since Russia launched a full-scale invasion of Ukraine on 24 February 2022. The UN estimates that nearly seven million Ukrainians are currently living as refugees, external. The conflict goes back more than a decade, to 2014, when Ukraine's pro-Russian president was overthrown. Russia then annexed the Black Sea peninsula of Crimea and backed insurgents in bloody fighting in eastern Ukraine.

