title: Zelensky urges Trump to visit Ukraine ahead of deal with Russia - BBC News
date: '2025-04-14'
section: Europe
url: http://www.bbc.co.uk/news/articles/c0r5vlwj4dqo
content: |-
  A Russian missile killed 34 people on Sunday in an attack that Trump described as "a mistake" and Germany called "a war crime".

  Zelensky urges Trump to visit Ukraine before deal with Russia

  This video can not be played To play this video you need to enable JavaScript in your browser. Watch: BBC on the scene of Russian missile attack in Sumy

  Ukraine's President Volodymyr Zelensky has invited Donald Trump to visit his country before any deal is struck with Russia to end the war. "Please, before any kind of decisions, any kind of forms of negotiations, come to see people, civilians, warriors, hospitals, churches, children destroyed or dead," Zelensky said in an interview for CBS's 60 Minutes programme. The interview was recorded before a Russian missile hit the city of Sumy on Sunday, killing 35 people and injuring 117 others. Without providing evidence, Russia said it fired two Iskander missiles at a meeting of Ukrainian soldiers, killing 60 of them. Trump said he had been told it was a mistake, without specifying who told him.

  At the scene in Sumy, the conference centre Russia claimed was used for the meeting is smashed, and a crater marks the spot where a missile hit. The roof is no more. Kyiv has not confirmed the gathering of military officers – however, a regional mayor in Sumy has demanded the resignation of local security officials if indeed they allowed such a meeting to happen. Any gathering of soldiers is a prime target for Russia. In previous attacks and indeed throughout the invasion of Ukraine, civilians have been seen as acceptable collateral damage by the Russian military. The attack comes as the US, Ukraine's strongest military ally, has been pursuing an end to the war - now in its fourth year - through negotiation under Trump. Asked about the attack, the US president said it was "terrible" and that he had been "told they made a mistake", but did not elaborate. Earlier, Trump's special envoy to Ukraine, retired Lt-Gen Keith Kellogg, said the attack had crossed "any line of decency". However, it remains to be seen if Trump will accept Zelensky's invitation. Scott Bessent, the US treasury secretary, is the only senior member of Trump's team to visit Kyiv, and that was to demand Zelensky sign a contract heavily weighted in Washington's favour to trade Ukraine's mineral wealth for continued military aid. Zelensky refused. The Ukrainian president has highlighted Russia's continued attacks on civilians while Trump attempts to improve relations with Moscow in search of a ceasefire. US special envoy Steve Witkoff has already held three meetings with Vladimir Putin, and Kyiv is adamant Moscow will exploit this as it continues to erode Ukraine's territory. European leaders condemned the Sumy attack. Germany's chancellor-in-waiting, Friedrich Merz, told the country's public broadcaster ARD the attack constituted a "serious war crime". "It was a perfidious act.. and it is a serious war crime, deliberate and intended," the conservative politician said. Germany's outgoing Chancellor Olaf Scholz, meanwhile, said the attack showed "just what Russia's supposed readiness for peace [was] worth". French President Emmanuel Macron accused Russia of "blatant disregard of human lives, international law, and the diplomatic efforts of President Trump". "Strong measures are needed to impose a ceasefire on Russia," he said. "France is working tirelessly toward this goal, alongside its partners." Describing the attack as "barbaric", European Commission President Ursula von der Leyen added: "Russia was and remains the aggressor, in blatant violation of international law. "Strong measures are urgently needed to enforce a ceasefire. Europe will continue to reach out to partners and maintain strong pressure on Russia until the bloodshed ends and a just and lasting peace is achieved, on Ukraine's terms and conditions." British Prime Minister Sir Keir Starmer also gave a view, saying he was "appalled at Russia's horrific attacks on civilians in Sumy".

