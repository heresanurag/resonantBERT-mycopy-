content: |-
  Carol Hunt and her daughters Hannah and Louise died in an attack in their home in Hertfordshire.

  Carol Hunt and her daughters Louise and Hannah were killed in the attack

  A man has denied murdering a mother and two of her daughters in a crossbow and knife attack at their home. Carol Hunt, 61, was stabbed to death and Hannah Hunt, 28, and Louise Hunt, 25, suffered fatal crossbow bolt injuries in Bushey, Hertfordshire, on 9 July. Kyle Clifford, 26, from Enfield, north London, also denied two counts of possession of an offensive weapon and false imprisonment, during an appearance via video link at Cambridge Crown Court. Those who died were the wife and daughters of BBC racing commentator John Hunt. A provisional trial date has been set for 3 March.

  Kyle Clifford has denied murdering the three women

  The defendant, who appeared via a link from HMP Belmarsh, entered his not guilty pleas to all charges except a new count of rape, for which he is not yet required to enter a plea. Cambridge Crown Court heard the charge was related to Louise Hunt. The false imprisonment charge alleges Mr Clifford "assaulted and unlawfully and injuriously imprisoned Louise Hunt and detained her against her will".

  Carol Hunt (right) was the wife of racing commentator John Hunt (left)

  An inquest found that Mrs Hunt died from stab wounds to her chest and abdomen, while her daughters both died from crossbow injuries. Mr Hunt and his third daughter Amy previously issued a statement following the deaths, which said: "The devastation we are experiencing cannot be put into words."
