title: India couple takes the plunge to marry underwater - BBC News
date: '2021-02-07'
section: General
url: http://www.bbc.co.uk/news/world-asia-india-55948400
content: |-
  The couple exchanged wedding garlands 20 metres underwater off the coast of Chennai city.

  A couple literally took the plunge and got married 20 metres underwater off the coast of Chennai, a city in southern India.

  V Chinnadurai and S Swetha donned traditional clothes and exchanged garlands in a Hindu ceremony - all underwater.

  Mr Chinnadurai is a licensed scuba diver but Ms Swetha took lessons and trained in the months leading up to the wedding.

  The entire ceremony was recorded before the couple swam back up to celebrate with family and friends.
