title: Katie Boulter beaten by Diana Shnaider in Hong Kong Open final - BBC Sport
date: '2024-11-03'
section: Tennis
url: http://www.bbc.co.uk/sport/tennis/articles/c5ypg26j4vro
content: |-
  British number one Katie Boulter is comfortably beaten in straight sets by top seed Diana Shnaider in the final of the Hong Kong Open.

  Katie Boulter will move up to at least 23rd in the world rankings after reaching the final

  British number one Katie Boulter was comfortably beaten in straight sets by Russian top seed Diana Shnaider in the final of the Hong Kong Open. Boulter, seeded second, was bidding to win a third WTA title of the season but was never in the contest, losing 6-1 6-2 to the world number 14 in one hour 11 minutes. Despite the defeat, Boulter will move into the world's top 25 for the first time after a strong finish to the season. "Massive congratulations to Diana, her family and her team. What an incredible week and incredible season," said the 28-year-old. "You absolutely killed me out there today, but I will get you next time. "A massive thank you to my team. You push me every day to try to be better and I am sure I will be back. What a season we have had." Boulter is next set to represent Great Britain at the Billie Jean King Cup Finals on 15 November. She will also be seeded at the Australian Open in January, meaning she should avoid playing the top-ranked players in the early stages. "Katie was happy to make it to the final, given how she was feeling off the court - she was physically drained," former British number one Laura Robson said on Sky Sports. "She's in the world's top 25 and there's so many positives. All round, a fantastic 2024 for her."

  Shnaider has now won all four WTA finals she has played in this season across all three surfaces, following victories in Thailand, Hungary and Germany. "It feels amazing," said the 20-year-old left-hander. "I hope I can keep going like this every season. "I will keep working. I am very happy to win the last tournament of the season with my family here. The whole week has been enjoyable and memorable."
