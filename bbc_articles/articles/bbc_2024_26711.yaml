title: 'Newspaper headlines: ''UK warns Israel'' and ''staff to get more rights''
  - BBC News'
date: '2024-10-04'
section: The Papers
url: http://www.bbc.co.uk/news/articles/cz6w836d249o
content: |-
  UK concern over the conflict in the Middle East escalating even further makes headlines on Saturday.

  'UK warns Israel' and 'staff to get more rights'

  The Times says that ministers are planning what they'll call a "once in a generation" overhaul of workers' rights. The plans reportedly include the right to sick pay, maternity pay and protection against unfair dismissal from a person's first day in a job. But the paper says the government has "offered concessions on key aspects of the reforms", including abandoning the "right to switch off", which would have stopped companies from contacting employees outside their working hours. The Chancellor, Rachel Reeves, has given an interview to The Financial Times Weekend, which it says "sets the tone" for her Budget later this month. She pledges to "invest, invest, invest", but insists she will install "guardrails" around extra borrowing. The paper says Ms Reeves also suggests that increasing taxes will help to fill a £22bn "hole" in public finances she has identified, pledging that "there won't be a return to austerity". "Hands off our Falklands" is the headline in The Daily Mail. It reports that Argentina has been "emboldened" by what the paper calls the UK's "humiliating handover" of the Chagos Islands to Mauritius, and has "vowed to make a fresh grab" for the Falklands. In The Daily Express, the Argentine foreign minister is quoted as saying her government will "recover full sovereignty" of what it calls Las Malvinas. But Sir Keir Starmer's spokesman has insisted the sovereignty of the Falkland Islands "is not up for debate". Photos of Conservative leadership contender James Cleverly and his wife at Wimbledon are published in The Daily Mirror. It says the couple accepted tickets for the men's singles final last year, but the then foreign secretary declared that his wife had not been there. A spokesman for Cleverly says there was a mistake in the declaration and he has contacted the government to rectify it. And The Sun speaks to a British expat who flew nearly 700 miles from Spain to the UK, just to satisfy an immense craving for Nando's. Mark Rofe didn't even leave Heathrow Airport upon his arrival. He tells the paper he simply stopped at the restaurant's branch in the South Terminal before boarding another flight back to Barcelona - taking a chicken wrap with him.

