title: 'Gainsborough Care Home deaths: Woman released under investigation - BBC News'
date: '2024-10-24'
section: Dorset
url: http://www.bbc.co.uk/news/articles/cj0j8yzj96po
content: |-
  Three elderly care home residents were found dead in Swanage, Dorset, on Wednesday.

  Gainsborough Care Home has been cordoned off while investigation work takes place

  A woman arrested on suspicion of manslaughter following the deaths of three care home residents has been released while police inquiries continue. The 60-year-old was questioned by detectives after two men - aged 74 and 91- and an 86-year-old woman were found dead at Gainsborough Care Home in Swanage on Wednesday morning. Dorset Police said earlier the deaths were being treated as "unexplained" but potential carbon monoxide poisoning was still being investigated. Seven people were taken to hospital as a precaution and are not in a serious condition, the force added.

  Residents were taken to All Saints Church in Swanage

  A police cordon remains outside the home with police tape on the hedges and officers standing outside. Forensic officers, Dorset and Wiltshire Fire and Rescue Service and two Health and Safety Executive workers were seen to arrive at the scene earlier. Emergency services were first called to the home on Ulwell Road at 05:20 BST on Wednesday. About 40 residents from the home were later transferred, some in wheelchairs, to All Saints Church a short distance away. Police said the families of those who died had been informed and the coroner notified. Det Ch Insp Neil Third said there would continue to be a large multi-agency presence in the area "over the coming days". He added: “The care, compassion and respect that has been shown so far is commendable and we hope this continues over the coming days as our investigation progresses.”

  Dorset councillors have been given a confidential briefing about the incident. Councillor Toni Coombs, chair of the health scrutiny committee, read a statement before the meeting saying the authority was "deeply saddened" by the deaths. Speaking on BBC Radio Solent's Dorset breakfast programme, the town's deputy mayor Chris Moreton said: "My main thought this morning is naturally for the families that have lost loved ones." Mr Moreton said he went across to the church on Ulwell Road with his wife to offer help on Wednesday morning as the residents started to arrive. "The response of the ambulance service gives you some initial thought of the situation which I would describe as dire," he said. "The manner in which it happened so quickly is enough to shock anyone - thank you to those who went the extra mile. "The [care home] staff are traumatised... we will be endeavouring to support them."

  A spokesperson for Gainsborough Care Home said they were "deeply saddened" and were "fully co-operating" with lead agencies. They added: "Our priority has been to work with Dorset Council and BCP Council to safely move residents to other care homes until we are advised that they can return to the home. "We are ensuring that those directly concerned are supported and kept up-to-date with the changing circumstances, with the necessary information and reassurance provided. "The home has long been a core part of the Swanage community, and our residents, families and team members are all affected by this tragic incident and are touched by the support received."

  This video can not be played To play this video you need to enable JavaScript in your browser. Rev Jo Levasier spoke to the BBC after care home residents were taken to her church

  All Saints' vicar Jo Levasier opened up the church to take in the residents from the care home on Wednesday morning. Rev Levasier said she was woken by a phone call in the early hours asking to use the church hall. "I am glad somebody had made a plan and the care home knew who to call," she said. "It took several hours to get everybody evacuated. We used every space of the church - the place was crawling with all emergency services... I have to say the emergency services were totally awesome." She said that after a downpour of rain while the residents were being moved into the church "a call went out for dry blankets and loads turned up". "It was wonderful to see how people wanted to help and support one another," she added.

  This video can not be played To play this video you need to enable JavaScript in your browser. Maggie O'Neill told BBC Radio Solent about being one of the first volunteers to arrive and help residents

  Resident Maggie O'Neill said sirens could be heard "all around Swanage" as emergency services descended on the town. She said she ran down to offer help after finding out people were being wheeled down the road to the church hall and saw "about 40 people" covered in blankets and wearing sleepers "looking distressed". Ms O'Neil said she then helped to make hot drinks for the residents and brought them biscuits. "It was so early in the morning they were taken out of their beds at about 07:30 - so it was a shock to them," she said. "Nobody could have cared more for the people who lived in Gainsborough." She said the church was inundated with people offering to help. "It just speaks to me of the kindness and how out-reaching they are... I am amazed how much people helped one another," she added.

  A police cordon remained outside the home on Thursday morning, with police tape on the hedges and officers standing outside

  Gas distribution company SGN said engineers had completed safety checks at the care home on Wednesday evening and were no longer on site. In a statement, the firm said: "We can confirm there has been no gas leak involving our network. "We'd like to assure the community that the mains gas network in their local area is sound."

  A local bakery donated several boxes of pastries to comfort the evacuated care home residents, while bags of fish and chips were sent by a restaurant. Dorset South MP Lloyd Hatton said the deaths at the care home were a "devastating blow to the whole community". "It's a place of really strong community and people care for one another and look out for one another - its been fantastic to see that community spirit in play," he added. Dorset Council said all 44 residents from the home had been moved to temporary care home placements. The authority said they were either in other Agincare Care Homes, care homes in the Bournemouth, Christchurch and Poole or Dorset council areas or hospital settings. "A small number of residents have been moved to Agincare homes in Hampshire and West Sussex," the council added.

