content: |-
  Iga Swiatek, the world number one, announces split with coach Tomasz Wiktorowski.

  World number one Iga Swiatek is looking for a new coach after splitting with Tomasz Wiktorowski following three seasons working together. Wiktorowski, 43, joined Swiatek's team as coach in 2022 when she had one Grand Slam success to her name. The Pole helped Swiatek to four further Grand Slam titles, including three successive French Opens. She became the first Polish player to reach world number one in April 2022 and has spent a total of 123 weeks at the top of the rankings. "After three years of the greatest achievements in my career, together with my coach Tomasz Wiktorowski we decided to part ways. I want to start with a big thank you and appreciating our work together," Swiatek wrote on Instagram.

  "His experience, analytical and strategic attitude and enormous knowledge about tennis helped us to achieve things I've never dreamed of only a few months after we started working together." Swiatek says she has held "first talks" with prospective new coaches and will take a "couple of weeks" to start work with her next appointment. She is not playing at the ongoing China Open, having withdrawn beforehand because of personal matters. The 23-year-old won the French Open and US Open during her opening season with Wiktorowski. During 2022, Swiatek embarked on a 37-match winning run - the longest streak by a woman this century. The Pole won a fifth Grand Slam - her fourth with Wiktorowski - at Roland Garros in June. But Swiatek was disappointed with her hard-court performances this season, exiting the Australian Open in the third round and the US Open at the quarter-finals stage.

  Swiatek says a chance to spend more time at home after three years of travelling will be welcome to Wiktorowski, and also indicates this is the right time for her to start working with a non-Polish coach. Piotr Sierzputowski guided her through the majority of her teenage years, with Swiatek suggesting in the past that she has been more comfortable being surrounded by people with whom she shares a language and a culture. It is, unusually, now four months since the world number one won a title. She has not played since losing to Jessica Pegula in the US Open quarter-finals, missed this week's China Open for personal reasons and will not play next week in Wuhan either "after an important change in my team". Swiatek has frequently criticised the relentless nature of the circuit and the increase in mandatory tournaments on the WTA Tour. She has already decided not to represent Poland in the Billie Jean King Cup Finals - which leaves next month's WTA Finals as perhaps her only appearance before the year is out.
