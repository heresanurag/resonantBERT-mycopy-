title: World leaders show respect and support as Biden quits race - BBC News
date: '2024-07-22'
section: US & Canada
url: http://www.bbc.co.uk/news/articles/cw9ygvw959ro
content: |-
  Many recognised that the decision to step down was "personally difficult" for the 81-year-old.

  Joe Biden withdrew from the presidential race on Sunday, after weeks of mounting pressure from Democrats

  Joe Biden's decision to drop out of the 2024 Presidential race has sent ripples around the world, with a number of global leaders reacting to the news. He also endorsed Vice-President Kamala Harris and said he would "focus all my energies on my duties as President" for the rest of his term. Many of his allies paid tribute to his foreign policy achievements and acknowledged the difficulty of his decision. "Thanks to [Biden], transatlantic cooperation is close, Nato is strong and the USA is a good and reliable partner for us. His decision not to run again deserves recognition," Germany's Chancellor Olaf Scholz posted on X.

  The United Kingdom's Prime Minister Keir Starmer said he "respects" Mr Biden's decision and "looks forward" to working together for the rest of his presidency. "I know that, as he has done throughout his remarkable career, President Biden will have made his decision based on what he believes is in the best interests of the American people," Mr Starmer added. Canada's Prime Minister Justin Trudeau thanked Mr Biden and US First Lady Jill Biden, calling the president a "true friend" to Canadians. "He’s a great man, and everything he does is guided by his love for his country," Mr Trudeau said. Some noted the difficulty of Mr Biden's decision to step away from power. Poland's Prime Minister Donald Tusk said Mr Biden had "made difficult decisions" throughout his political career that have "kept the world safer, and democracy and freedom stronger". "I know that you were guided by the same principles when announcing your latest decision. Perhaps the most difficult one in your life," he said. Mr Biden has faced intense pressure from recent weeks from fellow Democrats to step aside, after a faltering debate performance against Donald Trump in June. But even up until last week, Mr Biden has said that he planned to stay in the race. At 81, he is the oldest person ever to have occupied the Oval Office. Japan's Prime Minister Fumio Kishida noted that Biden's announcement is one the US president considers "the best political decision he can make". "The Japan-US alliance is the cornerstone of our country's diplomacy and security, so we will monitor the situation closely," Mr Kishida said. Prime Minister of the Czech Republic, Petr Fiala, described Mr Biden's decision to withdraw as "responsible and personally difficult... but all the more valuable". But Mr Fiala also acknowledged growing political uncertainty in the US. "I am keeping my fingers crossed for the USA that a good president emerges from the democratic competition of two strong and equal candidates," he said. Italy's foreign minister and deputy PM Antonio Tajani said his country "must look with great serenity to the US". "We will work well with whoever the next president is, whether Trump or Harris," he said. Ukraine's leader Volodymyr Zelensky said he respects Mr Biden's "tough but strong decision" and thanked him for his "unwavering support for Ukraine’s fight for freedom." "We sincerely hope that America's continued strong leadership will prevent Russian evil from succeeding or making its aggression pay off," Mr Zelensky said. Some countries at odds with the US have also reacted to Mr Biden's decision. Venezuela's President Nicolas Maduro called it "the most sensible and correct decision". "[Mr Biden] realized that at that age and with weakened health he could not assume the reins of his country, let alone a presidential candidacy," Mr Maduro said at a campaign event for his own re-election. And the Kremlin's spokesman Dmitry Peskov said Russia's priority will still be on its war in Ukraine. "A lot can change" before the US presidential vote in November, he added. "We need to be patient and carefully monitor what happens," he said.
