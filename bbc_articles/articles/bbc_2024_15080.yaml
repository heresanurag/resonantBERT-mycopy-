title: Tributes as 'broadcasting titan' Wark leaves Newsnight - BBC News
date: '2024-07-13'
section: General
url: http://www.bbc.co.uk/news/videos/cd10dv33y2lo
content: |-
  A host of former political leaders wished Kirsty Wark well as she presented her final Newsnight.

  Former political leaders came together to pay tribute to "broadcasting titan" Kirsty Wark as she presented Newsnight for the last time on Friday.

  Ex-prime ministers Tony Blair, Gordon Brown and David Cameron, and former Scottish First Minister Nicola Sturgeon, left messages of support for the longtime Newsnight presenter who, in Cameron's words, "often terrified us".

  Wark first presented Newsnight over 30 years ago, making her the longest-serving presenter in the programme's history.

  She will go on to present Front Row on BBC Radio 4.
