title: Second nurse charged over video threatening Israeli patients - BBC News
date: '2025-03-05'
section: Australia
url: http://www.bbc.co.uk/news/articles/cpv4jd7nje3o
content: |-
  Australian police have been investigating the video, which circulated widely online and caused public outcry.

  A screenshot from the video, which circulated widely online

  A second Sydney nurse who allegedly appeared in a video that made threats towards Israeli patients has been charged by police. Ahmad Rashad Nadir, 27, and Sarah Abu Lebdeh, 26, were both suspended from their duties at Bankstown Hospital in February after the video was released online. It was filmed on an anonymous online platform which pairs people randomly for a chat. Authorities say there is "no evidence" the pair actually harmed patients. Mr Nadir was charged on Wednesday with using a carriage service to threaten, menace or harass, and with possessing a prohibited drug.

  Carriage services refer to modern communication systems such as phones and the internet. Ms Lebdeh was charged last week with three offences: threatening violence to a group, using a carriage service to threaten to kill, and using a carriage service to harass or cause offence. Neither person has entered a plea to the charges, but Mr Nadir apologised last month through his lawyer. In the footage, which appeared to have been filmed inside a hospital and was published by an Israeli content creator, Ms Abu Lebdeh and Mr Nadir allegedly bragged about refusing to treat Israeli patients, killing them, and said they would go to hell. The video spread widely online and caused public outcry, with Prime Minister Anthony Albanese describing it as "disgusting" and "vile". Earlier this month Australia passed tougher laws against hate crimes following a wave of unrelated antisemitic attacks. In recent months, there have been a series of arson and graffiti incidents involving homes, cars, and synagogues in Jewish communities across Australia. There have also been rising incidents of islamophobia. A Western Australian teenager was charged on Wednesday after allegedly threatening to launch a Christchurch massacre-inspired attack on a Sydney mosque.
