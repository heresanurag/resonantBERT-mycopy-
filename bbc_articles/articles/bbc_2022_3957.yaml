title: 'Ukraine war: UK has a direct line to Russia - defence chief - BBC News'
date: '2022-03-06'
section: General
url: http://www.bbc.co.uk/news/uk-60637046
content: |-
  The line is tested every day, Admiral Sir Tony Radakin tells the BBC's Sunday Morning Programme.

  The UK Ministry of Defence has a direct line to Moscow, which is tested every day, says chief of defence staff Admiral Sir Tony Radakin.

  Speaking on the BBC's Sunday Morning programme, he said he met his Russian counterpart General Valery Gerasimov a couple of weeks ago.

  Sir Tony revealed that he told him it would be a "catastrophic mistake" for Russia to invade Ukraine.
