title: Burned body found in Motherwell was a man - BBC News
date: '2024-02-24'
section: Glasgow & West Scotland
url: http://www.bbc.co.uk/news/uk-scotland-glasgow-west-68391890
content: |-
  Officers remain in the area after the discovery was made at about 09:00 on Saturday.

  Police remain at the scene in Motherwell

  Police have confirmed that a burned body that was found near a football pitch in Motherwell was that of a man.

  Officers were called to Margaret Drive in the North Lanarkshire town at about 09:00 on Saturday following the discovery.

  His death is being treated as unexplained and enquiries are at an early stage to establish the full circumstances of his death

  The force said officers remain in the area and inquiries are ongoing.
