title: 'Watch: Trump denies ‘having sex with a porn star’ - BBC News'
date: '2024-06-28'
section: General
url: http://www.bbc.co.uk/news/videos/c4ngeykrpn7o
content: |-
  Joe Biden spoke about Donald Trump’s alleged affair with adult film star Stormy Daniels. He accused the former president of having “the morals of an alleycat”.

  Trump denied he had sex with Daniels, and said the hush money case in which he had just weeks ago been convicted, was a political case against him.
