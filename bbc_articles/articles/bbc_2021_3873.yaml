title: Running from terror in north-east Mozambique - BBC News
date: '2021-03-12'
section: General
url: http://www.bbc.co.uk/news/world-africa-56365847
content: |-
  A militant Islamist insurgency has forced half a million people to flee, amid fears of beheadings and abductions.

  An Islamist insurgency in north-east Mozambique has driven more than half a million people from their homes in the past year.

  Aid agencies are calling it an urgent and forgotten humanitarian crisis. In a world exclusive, a BBC team reached the besieged town of Palma at the heart of the conflict – the first international journalists to do so.
