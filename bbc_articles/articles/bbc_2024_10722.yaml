title: 'Daniel Anjorin: Family devastated by loss of ''most loved and amazing son''
  - BBC News'
date: '2024-05-04'
section: London
url: http://www.bbc.co.uk/news/uk-england-london-68956936
content: |-
  The parents of a 14-year-old boy killed on his way to school in London pay tribute to their son.

  Daniel Anjorin had a "positive nature and gentle character", his school said

  The parents of schoolboy Daniel Anjorin have said they have lost the "most loved and amazing son". The 14-year-old was fatally stabbed with a sword in Hainault, London, as he left his home to walk to school. In a statement, his family said: "It is difficult for us at this time to process what has happened to him and that he will never come home." It comes as a fundraiser set up for them by a family friend has raised more than £125,000 in just three days. Arsenal, the football team he supported, also paid tribute to Daniel during their Premier League game at the Emirates Stadium on Saturday.

  The family statement said: "We as a family are devastated by the loss of our beloved son Daniel." It added: "It is difficult for us at this time to process what has happened to him and that he will never come home. "Daniel had left the house for school and then he was gone. "Our children have lost their loving and precious brother and we have lost the most loved and amazing son. "We would like to send our best wishes to the other victims of this unthinkable incident. "We would also like to thank the local community for all of their support during this most difficult time."

  A banner reading 'RIP Daniel' was held among the crowd at Arsenal's football match against Bournemouth

  On Saturday ahead of the match against Bournemouth, the north London team held a minute's silence while his picture was shown on the big screens around the stadium. Play was also stopped during the 14th minute while a minute's applause was held. Meanwhile, more than 7,000 people have made a donation to the online fundraising page set up by Kwasi Asare, a friend of Daniel's brother. It says: "Daniel was a very loved boy in the local community who was always full of happiness and joy and very much loved by everybody he came across. "He meant so much to a lot of people and will be dearly missed." Previously, Daniel's family said he was a wonderful child who was "well loved" and "hard working". "No family should have to go through what we are experiencing," they said. "Any family will understand it's an absolute tragedy." His school, Bancroft's, in Woodford Green, said he was a "true scholar" who had a "positive nature and gentle character". In a statement, it described him as a "core member" of the community, adding: "Losing such a young pupil is something we will always struggle to come to terms with."

  Four other people - including two police officers - were seriously injured during the attack on Tuesday. Marcus Arduini Monzo, 36, from Newham, east London, has been charged with murdering Daniel. He has also been charged with two counts of attempted murder, two counts of causing grievous bodily harm, aggravated burglary, and possession of a bladed article. He has been remanded in custody and will next appear at the Old Bailey on Tuesday.

