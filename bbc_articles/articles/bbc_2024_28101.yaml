  Arsenal host Juventus in the Women's Champions League on Thursday before a two-week gap for the international break, meaning a permanent manager could be in charge for their next WSL game at home to Aston Villa on 8 December. Former Arsenal and England player Anita Asante says Slegers, 35, has done enough to earn an extended stay in the dugout. "The record speaks for itself so far," she told the Football News Show. "I'm sure there are sceptics out there saying don't get carried away. But it's also about the body language from the players, the impetus they are putting on the pitch, the performances and results, the goals they are scoring. "That was a big struggle for them earlier in the season. They weren't being clinical - already that's a transformation."
