title: Renee Slegers continues to press case for permanent Arsenal job - BBC Sport
date: '2024-11-16'
section: Women's Football
url: http://www.bbc.co.uk/sport/football/articles/c5yx4g0d7e7o
content: |-
  The calls for Renee Slegers to be appointed permanent Arsenal manager could soon reach a crescendo after an impressive north London derby win over Tottenham.

  The calls for Renee Slegers to be appointed permanent Arsenal manager could soon reach a crescendo after yet another impressive win in interim charge, this time a 3-0 victory at Tottenham in the north London derby. The Gunners have won five out of six games under the former Netherlands midfielder, scoring 19 goals and conceding just two. That run includes impressive wins against Valerenga and Juventus in the Women's Champions League, before Saturday stroll at Tottenham Hotspur Stadium in the Women's Super League (WSL). "It is something the club must look at, giving her the manager role [permanently]," former Arsenal midfielder Fara Williams told BBC Sport. "That is not to say that they need to rush into it. While she is getting the results and performances there is no need to make a decision just yet."

  This video can not be played To play this video you need to enable JavaScript in your browser. The Football News Show: Should Renee Slegers get longer spell as Arsenal boss?

  The celebrations by the Arsenal fans nestled in one corner of the stadium were in sharp contrast to the start of last month, when supporters jeered manager Jonas Eidevall and called for his dismissal following a 2-1 home defeat by Chelsea. Slegers, who joined Arsenal as Eidevall's assistant in September 2023, was installed as interim manager to give the club time to decide on a replacement. "It's a different energy. Renee knows us all," Arsenal captain Leah Williamson told BBC Sport. "She has connected with everyone individually. We got into a bit of a rut with low confidence and she has just stripped it back and wants the best out of every player. It’s working." Forward Alessia Russo, who opened the scoring against Spurs after just 63 seconds, said: "We are a little bit more confident. Things don't change overnight. "She has allowed us a little bit of freedom up there and we are really enjoying it. Each game is getting better and better and we are getting some big results."

