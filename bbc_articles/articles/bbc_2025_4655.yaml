content: |-
  England start their Women's Six Nations title defence with a comfortable win over Italy at LNER Community Stadium in York.

  This video can not be played To play this video you need to enable JavaScript in your browser.

  England started their Women's Six Nations title defence with a comfortable victory over Italy at LNER Community Stadium in York. The victory extends the Red Roses' winning run to 21 games before a home Rugby World Cup that starts in August. On her first Red Roses start, wing Mia Venner grabbed the opening try before centre Emily Scarratt crossed in a dominant opening period. The hosts, following a penalty try from a maul infringement, scored the bonus-point try inside 30 minutes after Claudia MacDonald's sharp finish. Italy managed one score in the first half through number eight Francesca Sgorbini, but Amy Cokayne quickly responded to grab England's fifth first-half try. England struggled for further points in the second half but Emma Sing capped off a solid day from the kicking tee with the final try late in the game. John Mitchell's side are seeking a fourth successive Grand Slam and a seventh Six Nations title in a row. England next face Wales at Principality Stadium on Saturday, while Italy, who finished fifth in last year's championship, host Ireland on Sunday with hopes of replicating their only victory last campaign.

  Mitchell has been clear that building depth in his squad before the World Cup is one of his key priorities this championship, after he made seven changes and some positional alterations to his starting XV from England's WXV1 title success over Canada in October. One of those changes saw Gloucester-Hartpury wing Venner play her first game in five years for the Red Roses and scored a try inside the first couple of minutes. The 22-year-old swung round to her opposite wing to sharply finish before making a searing run down the flank to help set up Scarratt's score. Following a penalty try, MacDonald collected a pin-point cross-field kick from Holly Aitchison and stepped past the covering defence to score her first international try since 2023, after suffering a second neck injury in February 2024. Italy's first-half try and impressive defensive work to deny two certain England scores showed heart in what was an improved first game under new head coach Fabio Roselli. Before the 2023 Six Nations, Italy announced 22 professional contracts had been given out to their players and it will take time for them to reap the benefits. Roselli's side spent large portions of the second half in England's 22, but failed to convert any of their chances. Sing's try in the corner capped off an impressive performance from full-back, where she kicked three of her five conversions and looked dangerous to press forward her case for more regular game time. Given England's struggles from the kicking tee in the last Six Nations, Gloucester-Hartpury's Sing could prove a point of difference in a year that could come down to small margins at a home World Cup. World player of the year and regular full-back Ellie Kildunne came off the bench and finished the game on the wing to add another option to Mitchell, who has plenty to pick through after a rare below-par second half. However, the win successfully kicks off England's title defence with a much-changed side and is the first victory in a year which could end with World Cup glory.
