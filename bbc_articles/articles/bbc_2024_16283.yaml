title: Who could Kamala Harris pick as her vice-presidential candidate? - BBC News
date: '2024-07-23'
section: US & Canada
url: http://www.bbc.co.uk/news/articles/c80ekdwk9zro
content: |-
  She is reported to be vetting a shortlist of candidates, many of whom are white men from swing states.

  Who could be Kamala Harris's running mate?

  Now that Vice-President Kamala Harris is closing in on the Democratic nomination to take on Republican Donald Trump, talk has turned to her running mate. She will need to pick one by the time Democratic party delegates vote next month at a convention in Chicago to officially confirm who is on the ticket. A team to vet the people in the frame has been reportedly appointed to explore who might best stand up to the scrutiny of the national spotlight. Historically, vice-presidents are picked to complement a candidate and strategists believe for that reason she may pick a white man from a battleground state. Here's a bit on the names reported to be in the mix, with an assessment of their chances by North America correspondent Anthony Zurcher.

  The charismatic governor of Pennsylvania, a state that many think is essentially must-win for Harris, has oratory skills which have drawn comparisons with Barack Obama. He would be the first Jewish vice-president and has peeled off Republican voters in his home state. Shapiro has seen high approval ratings since he was elected in 2022 in a swing state Trump narrowly carried in 2016. He made national headlines last year after quickly rebuilding a collapsed bridge on a crucial Philadelphia highway - a major political victory for a first-term governor. The speedy repair was hailed by many as the perfect infrastructure talking point for a potential 2028 presidential candidate. Anthony Zurcher: He could help lock down an important - perhaps the most important - state for Ms Harris. But his outspoken support of Israel during the Gaza War and his criticism of student protests in his state might open up divisions within the Democratic Party that the vice-president is keen to avoid.

  The 60-year-old served 12 years as a US congressman before his successful 2018 run to lead the state. His performance as governor was thrust into the national spotlight when he sent in the National Guard to deal with mass protests after the death of George Floyd. He himself had a 20-year service in the National Guard before his political career, a time when he also taught at a high school and worked as an assistant football coach. When asked whether he would serve as Ms Harris' running mate, Mr Walz told CNN's State of the Union: “I would do what is in the best interest of the country." He dodged the question when asked if he received vetting materials. AZ: Minnesota may not be a top-line battleground state, but Tim Walz has the small-town Midwestern sensibilities to give him some cross-border appeal. While he governs from the left, his plainspoken manner and religious convictions give him a moderate sheen.

  The former astronaut and Navy combat pilot has an all-action edge, while his strong border stance and occasional criticisms of the Biden administration could be eye-catching for floating conservative voters. His Democratic superstar wife Gabby Giffords, who was shot in a mass shooting, gives him a personal story as strong as his CV. The former House congresswoman was seriously wounded and has become one of the leading voices on gun safety laws. With gun violence a major campaign issue for Democrats, Mr Kelly’s personal story could resonate with voters. AZ: Mark Kelly is from a state that Democrats would love to keep in their column. His selection would create challenges down the road, however, as Democrats would have to gear up for another pivotal Senate campaign to hold his seat in a special election in 2026.

  Mr Beshear has carved out a successful career as the Democratic leader of a deep-red state, which voted for Trump by a margin of more than 25 percentage points in 2020. That year he became the only Democratic governor to win in a Trump state, helped by the state's booming pre-Covid economy. Supporting public education and protecting reproductive rights are also key issues for him. Kamala Harris and he have been close for a long time so there would be no question marks about chemistry if picked as her running mate. The most youthful of those in the frame can help Harris underline the generation gap with the top of the Republican ticket. And he’s not afraid of talking about his Christian faith and its impact on his personality and work, something that might endear him to parts of America beyond Harris’s reach. Mr Beshear dodged reporters' questions in Georgia when asked if he was being vetted to serve as Harris' running mate. AZ: Andy Beshear has proven himself adept at winning support in a state that is dominated by Republicans and voted overwhelmingly for Donald Trump in 2020. He’s the son of a popular former Kentucky governor, though, which gave him electoral advantages he might not be able to reproduce nationally.

  JB Pritzker, the governor of Illinois, has raised his profile in recent years by going after Trump and defending Mr Biden. The billionaire businessman - heir to the Hyatt hotel chain - is quick to post criticism of Trump on social media. After the debate he called Trump a "liar" and said he is a "34-count convicted felon who cares only about himself". Like Ms Whitmer, Mr Pritzker has a track record of completing agenda items on left-wing Democrats' to-do lists on issues like abortion rights and gun control. He also dodged questions on ABC about whether he was being vetted to serve as the vice-presidential candidate. AZ: He has a blunt Chicago manner that lends an air of everyman authenticity to his politics. Coming from deeply Democratic Illinois, however, may limit his appeal in the mid-western swing states - particularly given Ms Harris’s liberal California background.

  It is no secret that Pete Buttigieg has presidential aspirations. He ran in 2020 and is often touted as one of the Biden administration's best communicators. Mr Buttigieg has managed a number of public crises during his time as transportation secretary. He helped to oversee the government response to the East Palestine train derailment in Ohio, the Baltimore Bridge collapse and Southwest Airlines' scheduling crisis in 2022. Mr Buttigieg stated on X, formerly Twitter, that Mr Biden had "earned his place among the best and most consequential presidents in American history". He said he would do "all that I can to help elect Kamala Harris the next President". AZ: Pete Buttigieg was the surprise hit of the 2020 Democratic presidential race, generating a loyal following that is still with him. His ability to adeptly define and defend the party’s priorities, even in hostile territory like Fox News, could be a useful skill for a running mate.

  The list of potential nominees to the ticket stretches beyond these Democrats, as the party has developed a deep bench of talent. Gary Peters is another possible pick. The senator represents the swing state of Michigan and is being pushed by labour leaders to the Harris campaign, according to Axios. Maryland Governor Wes Moore found himself in the spotlight in recent months following the collapse of the Francis Scott Key Bridge in Baltimore. Mr Moore didn't answer when asked if he received vetting materials on ABC's This Week. Michigan Governor Gretchen Whitmer, who co-chairs the Harris campaign, is a two-term governor and an increasingly popular Midwest Democrat. She was rumoured to be a potential pick, but told CBS she was not part of the vetting process after previously telling reporters she had no plans to leave Michigan. Retired Admiral William McRaven, 68, cemented his legacy in Washington by overseeing the special operation that killed Osama bin Laden. In recent years, Mr McRaven has emerged as a vocal critic of Trump, particularly on national security issues, and strong backer of President Biden. Senators Amy Klobuchar and Cory Booker have run for president in the past and have some name recognition among Democrats. And Georgia Senator Raphael Warnock, who won a closely contested Senate race in a swing state.
