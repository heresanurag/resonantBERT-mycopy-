title: 'Robbie Fitzgibbon: Former Great Britain athlete dies aged 28 - BBC News'
date: '2024-10-12'
section: Sussex
url: http://www.bbc.co.uk/news/articles/c8rd88zd0j0o
content: |-
  Paying tribute, his club Brighton Phoenix says he was "one of our most cherished athletes".

  A former Great Britain athlete has died at the age of 28, his running club has said. Robbie Fitzgibbon, a middle distance runner, represented his country at several international events. His club, Brighton Phoenix, described him as "one of our most cherished athletes". A statement said he was "a friend to many, and a source of motivation for all who had the privilege of knowing him".

  It added: "Robbie was the epitome of a runner’s runner, embodying everything we value at Phoenix." Robbie Fitzgibbon joined Brighton Phoenix as a junior, and through "dedication, relentless hard work, and determination", he became a GB senior international-level athlete, the club said. In 2019 he competed in the senior indoor European Championships, reaching the 1,500m final, and went on to compete in several Diamond League races. His coach and mentor Joel Kidger said: “Robbie was talented but, even more so, a hard worker. "He was gritty, determined, and usually got to where he wanted."

  Brighton Phoenix club described Robbie Fitzgibbon (centre) as "one of our most cherished athletes"

  Charlie Grice, his training partner, paid tribute saying: "You were a true fighter who always gave your best." In recent years, Fitzgibbon took a step back from track running, moving from middle-distance to long distance races. He had been preparing to run the 2025 Brighton Marathon in aid of the charity Mind. His father Robin will now run in his place, the club has announced. Josh Guilmant, vice chairman of Brighton Phoenix running club, said: "That is a really nice move. "We think some of his former team mates will want to run with Robin - some of them have already said they do." He added that he will be looking to speak to the organisers of the marathon "to see what we can do". A GoFundMe that Robbie had set up to raise money for the charity Mind has now surpassed £10,000 in donations. There has been a significant number of new donations since the club announced Robbie's passing on Friday night.
