  Ten of this year's 12 shortlisted albums were debuts, while four were instrumental or partly instrumental - reflecting changing listening habits during the pandemic.

  Judge Annie Mac said the list showed "how remarkably creative and diverse British music is at the moment".

  Radio 2's head of music, Jeff Smith, who chaired the judging panel, said selecting the winner "is always difficult, but it was especially difficult this year".

