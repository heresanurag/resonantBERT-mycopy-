title: Durham Uni study finds chimpanzees more empathetic than assumed - BBC News
date: '2025-04-26'
section: Wear
url: http://www.bbc.co.uk/news/articles/c5y45ylrv0xo
content: |-
  Durham University finds that chimpanzees are as likely to console as the 'more empathic' bonobo.

  Chimpanzees consoled each other by embracing, holding hands, and touching, researchers found

  Chimpanzees comfort each other when in distress, despite typically being referred to as "violent" and "despotic" when compared to other apes. Researchers at Durham University found that chimpanzees were as likely to console one another as bonobos - even though the latter is typically considered the more "empathic" primate. The team logged 1,400 hours of observation across the two species, focusing on how individuals reacted to a group member who had experienced distress, such as a fight. Among both bonobos and chimpanzees, the research concluded older apes were less likely to offer consolation than their younger counterparts.

  The findings suggested that emotional sensitivity to others emerges early in ape development. In bonobos, younger individuals are the most likely to console others and be consoled. In chimpanzees, young males and close social partners consoled the most. Both species consoled each other in a similar way to humans, with behaviours including embracing, hand-holding, and touching.

  Younger bonobos were more likely to console others, and be consoled, researchers found

  Lead researcher, Dr Jake Brooker, said: "For a long time, bonobos have been thought of as the more empathic ape, whilst chimpanzees are typically spoken about as the violent, despotic ape. "However, we found that chimpanzees are just as likely to console one another as bonobos. It is the first time the two species' approach to consolation has been directly compared, Durham University said. Researchers studied 40 bonobos at the Lola ya Bonobo sanctuary in the Democratic Republic of Congo, and 50 chimpanzees at the Chimfunshi Wildlife Orphanage in Zambia. The work was funded by the Templeton World Charity Foundation. The team said further research of this kind could shed light on the evolution of human social behaviour.

