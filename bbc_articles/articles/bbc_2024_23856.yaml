  The Mad Hatter's Tea Party: Opening the conversation about mental health issues

  'What does our modern society perceive as normal?'

  Welcome to Wonderland. The stage is set for ZooNation dance company's production of The Mad Hatter’s Tea Party at London's Linbury Theatre. Over-sized cups and saucers, laden with delicious-looking treats, stand next to teapots of many colours, ready to be wheeled on for rehearsals. But there are many other props that were not featured in the much-loved tale by Lewis Carroll - Alice's Adventures in Wonderland. In this adaptation, a doctor's white coat is hanging up and case files in brown binders labelled March Hare, Queen of Hearts, Mad Hatter, White Rabbit and Alice, are strewn across a desk. The files belong to Dr Ernst Sven Sjogren-Kvist, an expert in "normalisation", played by Tommy Franzen. His job is to fix people who have been locked away for not being "normal".

  Kate Prince, choreographer and founder of ZooNation, wants this production to open discussions around mental health. Her aim is to challenge viewpoints around what is considered normal: "What does our modern society perceive as normal? My discovery in life and the theme of the show is there is no such thing as normal. "It's all around mental health challenges and it's also about the benefits of music and dance to your mental health, and how they allow you to thrive and feel liberated and free."

  Kate Prince in rehearsals with the company

  Since 2017, the number of young people struggling with their mental health has doubled, according to charity Mind, external. Often it is difficult for young people to find the words to express how they are feeling, and it is hoped productions like this will help. Jennifer Walters, executive director of social change at mental health charity Mind, says the arts can support young people with their mental health and help them talk about it. "We found that nearly a fifth of young people have had a conversation about mental health after hearing or reading about experiences conveyed in music, and nearly a third said it helps normalise the topic of mental health," she says. "Finding a method of communication that feels right for you can be an important first step in getting the help and support you may need. "Seeing mental health experiences depicted on stage or on screen or sharing the experience of watching a show together and discussing afterwards, can be a great way to open up these mental health conversations even more." The characters in Kate Prince's production all face different challenges. Alice is experiencing anorexia nervosa and body dysmorphia. The Queen of Hearts has BPD (borderline personality disorder) with extreme uncontrollable anger. Tweedle Dum has PTSD (post-traumatic stress disorder) and the White Rabbit has anxiety, depression and OCD (obsessive compulsive disorder).

  ZooNation company in rehearsal at the Linbury

  Tommy Franzen, who plays Dr Ernst Sven Sjogren-Kvist, says his character is on a journey during the production, and his perceptions shift once he has a better understanding of what people are facing. "Their behaviour may seem odd to many but when you hear their story, you start to sympathise with them and their behaviour starts making sense," he says. "My character is a person who at the beginning of the show sees the world in black and white, right or wrong. This has probably come from his education, as he had only just graduated. As the show goes on, all his beliefs get challenged and eventually he loses his mind (or gains it) as expressed through a dance solo." The music in this production was created by Josh Cohen and DJ Walde, who worked alongside Kate Prince to bring her narrative to life. It incorporates various musical styles, artists and influences, with each character getting their own unique musical motif. Ms Prince thinks the Mad Hatter's Tea Party will be a positive theatrical experience: "The show makes you feel alive and free, and inspired that the dancers and the singers are just exceptional and the music is really uplifting. "It is always good to try something new. I am always telling my daughter to try something new," she says. ZooNation also offers industry-led workshops for school, community and educational groups, who would like to discover more about the creative process, choreography and the characters behind the show. The Mad Hatter's Tea Party is at the Royal Opera House Linbury Theatre, 4–24 September, 2024
