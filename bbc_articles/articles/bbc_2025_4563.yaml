  These issues aren't new, but the show has come as others are also discussing the dangerous messages aimed at boys and young men. On Wednesday, former England football manager Sir Gareth Southgate delivered a speech warning against "callous, manipulative and toxic influencers". "They are as far away as you could possibly get from the role models our young men need in their lives," he said. Thorne says Sir Gareth is "amazing" - but he believes the solution is about more than having better role models. "We've been having that conversation since I was a kid," the writer says. "This has got to be a point where we do something a bit more radical than that. It's not about role models. "Role models obviously can have a huge impact on people. But truthfully, we've got to change the culture that they're consuming and the means by which our technology is facilitating this culture. "It was a really interesting speech, but I was hoping he was going to propose more radical things than he did." So what could more radical solutions be?

  Police detectives played by Ashley Walters and Faye Marsay visit Jamie's school to seek information

  This week, Prime Minister Sir Keir Starmer told Parliament he's been watching the "very good" drama with his teenage children. Violence carried out by young men who are influenced by what they see online is "abhorrent and we have to tackle it", and is "also a matter of culture", he told the Commons. Thorne hopes the PM will get the message that "there's a crisis happening in our schools, and we need to think about how to stop boys from harming girls, and each other". "That's going to take a mass of different things to facilitate in schools and in homes, and that requires government help," he says. He urges Sir Keir to "rather urgently" consider a smartphone ban in schools and a "digital age of consent", similar to Australia, which has passed a law banning children under 16 from using social media. The writer has also suggested extending that to all smartphone use and gaming. "I think we should be doing what Australia is doing, and separating our children from this pernicious disease of thought that is infecting them," he says. A ban would be a tough sell to teenagers, though.

  Each episode was filmed in a single shot, including one showing a session between Jamie and a child psychologist played by Erin Doherty

  Thorne appeared on BBC Two's Newsnight this week alongside three men aged 18, 19 and 21. When asked about a social media ban for under-16s, they had mixed feelings. One said it was "a great idea, within reason", another said it would be "quite unfair", while the third was against the idea, arguing that "social media has brought a lot of good to young generations as well". For Thorne, the question about how to police smartphones and social media is about to come very close to home. His son is eight, and Thorne says he wants to make sure he establishes "a method of communicating with him" as he grows up. Soon, he will want his own phone. While working on the series, he has been thinking about how to handle his son's future use of technology. "And I'm still processing how to do it." Researching and writing Adolescence has opened his eyes about the challenges facing young people and parents, he says. But how to tackle them? That's the hardest part.
