title: 'Adolescence: Netflix series writer Jack Thorne wants ''radical action not
  role models'' - BBC News'
date: '2025-03-22'
section: Culture
url: http://www.bbc.co.uk/news/articles/c0egyyq1z47o
content: |-
  The writer behind the year's most talked-about TV show discusses the changes he hopes it will inspire.

  Owen Cooper has been praised for his performance as 13-year-old Jamie

  One of the most talked-about TV shows of recent years, Netflix's hard-hitting drama Adolescence, has been the hot topic of discussion this week, from the House of Commons to US talk shows, external to the gates of the scriptwriter's son's school. Those discussions have been sparked by the fictional story of a 13-year-old boy who is accused of stabbing a girl, and the factors that could have turned him into a killer. "I've had lots of responses from people I haven't heard from for years, telling me about conversations they're now having with their children," writer Jack Thorne says. "That's really gratifying. "My son's headteacher stopped me at the school gates to say, 'I'd like to talk to you about this, and I'd like to think about what our school can do and what other schools can do'," Thorne adds. "The conversations seem to be starting in all sorts of different places." Thorne is now calling for the government to take "radical action" to help tackle the issues the programme raises. Chief among them are social media and the influence of incel (involuntary celibate) ideas, which encourage men to blame women for their lack of relationships and opportunities.

  But the drama, which Thorne created with actor Stephen Graham, is not just pointing the finger at incel culture, the writer tells the BBC. "I really hope this is a drama that suggests that Jamie is like this because of a whole number of complicated factors." His parents, school and friends are all shown as playing a part in various ways. But Jamie, played by Owen Cooper, is bullied on social media to make him feel ugly, and is exposed to incel messaging and skewed views on sexual violence. "He is this vulnerable kid, and then he hears this stuff which makes sense to him about why he's isolated, why he's alone, why he doesn't belong, and he ingests it. He doesn't have the filters to understand what's appropriate," Thorne says. "At this age, with all these different pressures on him and with the peculiarities of his society around him, he starts to believe that the only way to reset this balance is through violence."

  The writer went down similar online wormholes himself on sites like 4Chan and Reddit in order to see the world through Jamie's eyes. He found that these messages were not simply coming from the obvious places. "It was far from just Andrew Tate. It was not those big guns of the manosphere," he says. "It was the smaller blogs and vlogs and the little bits like people talking about a video game, but then explaining through that video game why women hate you. "That was the stuff that I found most disturbing."

