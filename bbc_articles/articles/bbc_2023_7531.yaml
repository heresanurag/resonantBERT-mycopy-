title: Extinction Rebellion disrupts Rees-Mogg and Braverman speeches - BBC News
date: '2023-05-15'
section: General
url: http://www.bbc.co.uk/news/uk-politics-65599312
content: |-
  Extinction Rebellion protesters interrupt speeches by leading Tory MPs at right wing conference.

  Extinction Rebellion staged protests at a right wing conference in London organised by the US-based National Conservatism movement.

  Jacob Rees-Mogg was unexpectedly joined onstage by a man warning about fascism. Later on, Home Secretary Suella Braverman was interrupted as she began a speech on conservatism and immigration.

  The protesters - who Extinction Rebellion say were protesting about "increasingly dangerous rhetoric" from senior politicians - were ejected from the hall.

  The home secretary joked that the protests were "audition day for the shadow cabinet".
