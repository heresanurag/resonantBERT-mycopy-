title: Man may have died two months before Salford body find, police say - BBC News
date: '2024-07-20'
section: Manchester
url: http://www.bbc.co.uk/news/articles/c728v78p1vyo
content: |-
  Julius Matera's remains were found in December 2023, but he may have died in October, police say.

  Man may have died months before body found - police

  Police said they were "very determined" to find out how Mr Matera died

  Police investigating the death of a man whose body was found on a city street have said he probably died two months earlier. Greater Manchester Police said Julius Matera's remains were found near a property on Great Cheetham Street West in Salford on 7 December 2023. Appealing for information, Det Ch Insp Rachel Smith said officers believed the 43-year-old died on the evening of 13 October or the early hours of 14 October. She said she believed there were "people in the community who may know what happened to Julius and why", but they were yet to contact the force.

  She said seven months on from his remains being found near Broughton Cricket and Rugby Club, officers were "still working to find out what happened to Julius". "We will keep going until we have answers," she said. She added that "no matter how small the information might seem, it could be pivotal to our investigation"

  Mr Matera's family said he "had a way of making people smile even in the toughest of times"

  Paying tribute, Mr Matera's family said he had been "remarkably friendly, considerate, respectful, funny and adventurous". "He was always ready to help when he could," they said. "He had such an adventurous spirit and a curious mind that made him want to explore and discover things in his own special way with a keen ambition in current affairs and commentary." They said Mr Matera had been an "active local community member who enjoyed the company of others and was never a lonely person". “We all miss his contagious laugh," they added. "He had a way of making people smile even in the toughest of times and is remembered for that smile and a chuckle that captured his joyful spirit." Two men who were arrested at the scene in December 2023 and a further man who was held, all on suspicion of murder, were later released on bail pending further inquiries.
