title: Jessica Ennis-Hill takes part in Sheffield park run - BBC News
date: '2017-02-04'
section: General
url: http://www.bbc.co.uk/news/uk-england-south-yorkshire-38867537
content: |-
  The retired athlete ran two laps of a Sheffield park with dozens of other runners.

  Olympian Jessica Ennis-Hill has taken part in her first park run in her home city of Sheffield.

  The retired athlete ran two laps of Endcliffe Park, with dozens of other runners in the morning 5km event, to mark a new sponsor for the series of events.

  She later posted online: "Loved my first park run this morning! 5km is a little bit further than the 800m I'm used to."
