title: Elton John makes first appearance since revealing limited vision - BBC News
date: '2024-09-07'
section: US & Canada
url: http://www.bbc.co.uk/news/articles/c3rdeq0j8q9o
content: |-
  He appeared at his documentary premiere days after revealing he has limited vision due to an infection.

  The star arrived on the red carpet in a buggy with his husband David Furnish

  Sir Elton John has made his first public appearance at the Toronto International Film Festival, days after he revealed an eye infection had left him with limited vision. The 77-year-old smiled and waved at the cameras as he arrived with his husband David Furnish on Friday. The music legend was in the Canadian city for the world premiere of documentary film Elton John: Never Too Late. His appearance comes days after Sir Elton revealed he picked up an eye infection over summer leaving him with only limited vision in one eye.

  The documentary, billed as a portrait of Sir Elton, looks back on his life his farewell show at Los Angeles' Dodger Stadium in 2022. It will premiere on Disney+ in December.

  Sir Elton said he's been spending the summer recuperating at home

  On Tuesday Sir Elton told his nearly five million followers on Instagram: "Over the summer, I’ve been dealing with a severe eye infection that has unfortunately left me with only limited vision in one eye. "I am healing, but it’s an extremely slow process and it will take some time before sight returns to the impacted eye. "I am so grateful for the excellent team of doctors and nurses and my family, who have taken such good care of me over the last several weeks. "I have been quietly spending the summer recuperating at home, and am feeling positive about the progress I have made in my healing and recovery thus far."

  Jennifer Lopez appeared for the premiere of Unstoppable

  Toronto International Film Festival also saw Jennifer Lopez attend the world premiere of Unstoppable, a biographical sports film she stars in. It is produced by Oscar-winners Matt Damon and Lopez's husband Ben Affleck who she is divorcing after two years of marriage. He did not attend. The estranged couple are yet to comment on news of their divorce.
