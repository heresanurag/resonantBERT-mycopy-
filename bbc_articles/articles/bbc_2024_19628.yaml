  On the streets of Chicago - a blue city which saw tens of thousands of migrant arrivals over the last two years - many residents said they were sympathetic to the migrants, even if some were concerned they were a strain on local resources. "They [the government] provided food, they provided housing, provided clothing," said Naaman Martin, an elderly Chicago resident who plans to vote for Harris. "But for the homeless, they claim they can't do nothing". "It is what it is," he added. "It is not a voting issue for me." Alexandra Willis, a 29-year-old store owner and Harris supporter, said she has a "lot of empathy" for migrants and wishes they had legal pathways to the country. “They made it all the way here from another country," she said. "They’re very talented. I’d hire them but legally I can’t.” Immigrants have expressed frustration that their difficult journeys to the US have become a political lightning rod. As the DNC unfolded this week, several dozen, predominantly Venezuelan migrants gathered at a shelter just a few miles away, waiting for volunteers to distribute donated snacks as politicians nearby discussed policies that could eventually determine their fate. While the migrants currently housed there are only vaguely aware of the ongoing convention, they are very familiar with immigration, the border and conceptions of "migrant crime" playing a prominent role in the US political debate. Yelitza, a Venezuelan mother of four who fled her country after another son of hers was killed while participating in a protest march, said she feels that migrants are unfairly demonised by politicians, who don't understand the reasons that many left their countries to undertake an extremely perilous journey to the US. "The trip was extremely hard. The jungle. Criminals in Mexico. Cartel members wanted to rape my niece. I did the trip with four little kids," she said. "We're not here because we like it, or because I want to. Everyone needs to understand that," she added. "My country is in a disastrous situation. We only came here to give our children a future."
