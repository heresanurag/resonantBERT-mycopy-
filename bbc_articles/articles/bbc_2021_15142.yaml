content: |-
  Manchester United keeper David de Gea describes his side's 4-1 loss to Watford as "embarrassing" and "another nightmare".

  Last updated on .From the section Man Utd

  Manchester United goalkeeper David de Gea described his side's 4-1 loss against Watford as "embarrassing" and "another nightmare".

  United boss Ole Gunnar Solskjaer is under pressure after his side fell to seventh in the Premier League, amid a run of one league win in seven games.

  Captain Harry Maguire was sent off at Vicarage Road and the Hornets also had a penalty saved.

  "It was embarrassing, the way we played today," De Gea told BBC Sport.

  "The first half was very poor - it's not acceptable for this club and the level of players that we have. It's another nightmare. There's been some difficulties but I don't really know what to say.

  "I have been in difficult moments with this club but we are in a difficult situation - we don't know what to do with the ball, we are conceding a lot of goals. It's a horrible moment.

  "It's easy to say the manager and staff but the ones who are on the pitch are the players and they're the ones who have to score goals and fight on the pitch. We need to look at ourselves one by one and give more for the club and the fans. It's difficult to say why there was a performance like this - I don't know what to say.

  "It's hard to be in the dressing room now - we are sad, we are angry. Personally I'm hurt - it's a very difficult moment for the whole club."

  Analysis - 'Many players think he will be replaced'

  There is growing expectation Manchester United will sack Ole Gunnar Solskjaer.

  While speculation about an emergency meeting of the club's hierarchy has been played down at Old Trafford, the club remain tight-lipped around Solskjaer's future.

  Many players and others close to the club now think he will be replaced.

  There was genuine hope among the club's hierarchy that the situation could be turned round. However, both the performance and result at Watford were worse than anyone could have imagined and Solskjaer apologised to supporters afterwards.

  Continued uncertainty will not help preparations for Tuesday's Champions League trip to Villarreal.

  Solskjaer is due to face the media at 13:00 GMT on Monday before a game United must not lose if they are to remain in control of their qualification situation.

  Having decided not to replace Solskjaer during the international break and made no move to secure the services of Antonio Conte before he joined Tottenham three weeks ago, it is not immediately clear where United will turn for a new manager if the Norwegian's departure is confirmed.

  Zinedine Zidane is currently out of work but other options, including Leicester's Brendan Rodgers, Mauricio Pochettino at PSG and Erik ten Hag at Ajax, are under contract, with no guarantee any of them would be prepared to leave their current jobs.

  'We have let ourselves and the fans down'

  United's win percentage in the Premier League since Boxing Day 2020 is now below 50% with 18 wins from 37 games.

  They have lost eight of those games and drawn 11 and would be out of the top four during that period, with Manchester City, Chelsea, West Ham and Arsenal all earning more points in the corresponding period.

  Solskjaer's side have now conceded 21 goals in the league - the joint-third highest - and have a goal difference of -1, following five defeats in their opening 12 games.

  At the full-time whistle, Solskjaer, who is yet to win a trophy since joining the club in December 2018, went over to the travelling United fans and held his hands up in an apologetic manner and offered a little wave as he walked off.

  Midfielder Bruno Fernandes said the blame should be on the players and all of the coaching staff, not just Solskjaer.

  "The first half is the worst we've played and it's hard for me to explain why we played the way we did and allowed them to get in our box from nothing," said Solskjaer. "We were outfought.

  "I am very hurt - when you play in the Premier League you have got to turn up against good players and good opposition like this.

  "The boys are in a terrible place in their heads now - we have let ourselves down and the fans down. It's hard to stand here and explain that but that's football and we have to take the flak for it."

  Speculation over Solskjaer's future will now increase with the Reds having already been knocked out of the League Cup by West Ham, and they are yet to guarantee progress from their Champions League group with two games remaining.

  "I've never said I feel safe - I will never say that I feel safe," added Solskjaer.

  "I'm the manger and I will take the flak and take the responsibility - the players are working as hard as they can.

  "The fans are really disappointed - I understand, we all understand. They've supported us through thick and thin, they've been with us through this rebuild."

  United travel to Villarreal in the Champions League on Tuesday before facing Premier League leaders Chelsea at Stamford Bridge on Sunday, 28 November.

  Games against Arsenal, Crystal Palace, Young Boys and Norwich follow before mid-December.

  Former Arsenal defender Martin Keown said Solskjaer's future is now looking "perilous".

  "He is one of their own, part of the family at that club but they cannot ignore now that he is part of the problem," said Keown on BBC's Final Score.

  "Change is inevitable. It is looking perilous for the manager.

  "That last Watford goal was about passion and desire. Where were the defenders? They were not strong enough."

  Former Scotland defender Alan Hutton, who was on BBC Radio 5 Live, said United were "abysmal" and they were a "team full of stars and they're not performing".
