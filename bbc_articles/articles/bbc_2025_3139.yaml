  Ms Roome has been campaigning for legislation that would allow parents to access the social media accounts of their children if they die. She has been trying to obtain data from TikTok that she thinks could provide clarity around his death. Ms Kenevan said they were going to court to pursue "accountability - they need to look not just at us, but parents around the world, not just in England, it's the US and everywhere". "We want TikTok to be forthcoming, to help us - why hold back on giving us the data?" Ms Kenevan continued. "How can they sleep at night?"

  Mr Walsh said he had "no faith" that the UK government's efforts to protect children online would be effective. The Online Safety Act is coming into force this spring. But Mr Walsh said, "I don't have faith, and I'm about to find out if I'm right or wrong. Because I don't think it's baring its teeth enough. I would be forgiven for having no faith - two and a half years down the road and having no answers." Ms Roome said that she was grateful for the support she had from the other bereaved parents. "You do have some days particularly bad - when it's very difficult to function," she said.

  This video can not be played To play this video you need to enable JavaScript in your browser. 'Some days are particularly bad,' says Julian "Jools" Sweeney's mother

  The families' lawsuit against TikTok and its parent company ByteDance claims the deaths were "the foreseeable result of ByteDance's engineered addiction-by-design and programming decisions", which it says were "aimed at pushing children into maximizing their engagement with TikTok by any means necessary". And the lawsuit accuses ByteDance of having "created harmful dependencies in each child" through its design and "flooded them with a seemingly endless stream of harms". "These were not harms the children searched for or wanted to see when their use of TikTok began," it claims. Searches for videos or hashtags related to the challenge on TikTok are blocked, a policy the company says has been in place since 2020. TikTok says it prohibits dangerous content or challenges on the platform, and directs those who search for hashtags or videos to its Safety Centre. The company told the BBC it proactively finds and removes 99% of content that breaks its rules before it is reported. TikTok says it has met with Ellen Roome to discuss her case. It says the law requires it to delete personal data, unless there is a valid request from law enforcement prior to the data being deleted.

