  The Met Office said: "Very strong westerly winds are expected to develop across western Scotland and northern Northern Ireland late Wednesday and extend eastward across southern Scotland and northern England during the evening.

  "There is still some uncertainty in the timing and location of the strongest winds but there is the potential for inland wind gusts of 70-80 mph in places. Gusts of 80-90 mph are possible around exposed coasts and hills."

  The Met Office has also issued a yellow "be aware" warning for high winds for parts of Scotland, the north of England and Northern Ireland during Storm Dudley. It covers from 15:00 on Wednesday to 18:00 on Thursday.

  This warning was also been updated on Tuesday to shrink the size of the warning area to remove the north of Scotland and extend it southwards to cover Wales, the Midlands and East Anglia.

  Scotland's transport minister Jenny Gilruth said south and central Scotland were expected to face the worst of the conditions on Wednesday.

  She said: "The high winds will likely bring challenges for the trunk road network, with the potential for restrictions on bridges, so travellers should make sure they plan their journey in advance, drive to the conditions and follow Police Scotland travel advice."

  Police Scotland urged people to prepare for disruption and allow extra time for journeys.

  Forestry and Land Scotland, which is still clearing up after two recent storms, has urged people to avoid forestry areas during this week's bad weather

  Scottish Borders Council said residents in the local authority area should prepare for the likelihood of power cuts, road closures and damage to buildings.

  Forestry and Land Scotland said it was still clearing up damage to forestry caused by November's Storm Arwen and January's Storm Malik.

  The public body said people should avoid woodland and forestry areas during this week's storms.

  BEAR Scotland also announced the A83 at the Rest and Be Thankful would be closed from 18:00 on Monday with traffic being diverted to the Old Military Road due to heavy rainfall expected overnight.

  It said the hillside would continue to be assessed throughout the storm period.
