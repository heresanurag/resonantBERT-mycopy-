title: Travel warning ahead of Storm Dudley's strong winds - BBC News
date: '2022-02-16'
section: Scotland
url: http://www.bbc.co.uk/news/uk-scotland-60375137
content: |-
  An amber warning is issued for parts of central and southern Scotland, northern England and Northern Ireland on Wednesday.

  Coastal areas are expected to see the strongest winds on Wednesday

  Parts of Scotland, England and Northern Ireland could be battered by winds gusting to 90mph during Storm Dudley on Wednesday, forecasters have warned.

  The Met Office has updated an earlier amber warning to bring forward the start time to 16:00 and ending it at midnight, rather than 09:00 Thursday.

  The Scottish government has warned of the risk of travel disruption.

  England's National Highways has urged motorists in the affected area to only travel if "absolutely necessary".

  Storm Dudley has been forecast to bring inland winds potentially gusting to 80mph and up to 90mph on exposed coasts and hills.

  Police Scotland said there was a "high risk" of travel disruption.

  The Scottish government said the Transport Scotland resilience room and the multi-agency response team would be active for the duration of the amber warning.

  It added that it was receiving regular updates from the Met Office and Scottish Environment Protection Agency.

  National Highways' head of road safety Jeremy Phillips said drivers should check the latest weather and travel conditions before setting off on journeys and to "consider if their journey is necessary and can be delayed until conditions improve".

  A second storm - Storm Eunice - is expected to bring strong winds across southern Scotland and also parts of England, Wales and Northern Ireland on Friday. Snow has also been forecast for parts of Scotland.

  A yellow warning for wind has been issued for Storm Eunice.

  The amber warning covers central and southern Scotland, north east and north west England and Northern Ireland.

  The cities of Glasgow, Edinburgh, Newcastle and York are covered by the warning. It also includes parts of Argyll and Bute, Fife, Dumfries and Galloway, Scottish Borders, Cumbria and County Antrim.

