content: |-
  Two new allegations of grooming and sexual abuse are being investigated, North Wales Police say.

  Neil Foden was jailed for 17 years in July

  Police are investigating two new grooming and sexual abuse cases involving paedophile head teacher Neil Foden. North Wales Police said the allegations related to victims who were "children at the time of the offence". Foden was jailed for 17 years in July after sexually abusing four girls over a four-year period. The Crown Prosecution Service (CPS) said police had not been in contact regarding any new allegations.

  Foden was head teacher at Ysgol Friars in Bangor, Gwynedd, and strategic head teacher at Ysgol Dyffryn Nantlle in Penygroes. Former Ysgol Friars staff member Ana, not her real name, said she was worried facts related to the case were not being shared with authorities and "secrets" were "casting a shadow" over the school's future. "There are people there (at the school) who have information... and the feeling I have is that they won’t come forward," she said. Ana worked at the school for 20 years and Newyddion S4C has spoken to several current and former staff members who shared her feelings.

  The North Wales Safeguarding Board is carrying out a child practice review to see what lessons can be learned. But there are concerns the review is limited and there are calls for a public inquiry and independent review of the county council's processes. Ana questioned how much detail the panel had been given about how the school was run. Brian Jones, the school's newly appointed chair of governors, said the child practice review team had visited the school on "several occasions" and staff had been given the "opportunity to share concerns or information that may be of use to them".

