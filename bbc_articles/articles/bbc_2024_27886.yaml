  Ana said the culture Foden created at Ysgol Friars was "suppressive, toxic, fearsome and bullying". She said there were "many things that have happened at the school that needed to come out" and "there are some members of staff who know more than they are saying". After the crimes came to light, Ana claimed there was not enough support for teachers and other school staff. The morning after Foden's arrest, she said there was a special staff meeting. "We were sent straight back to work after receiving the news and were expected to carry on, when in reality all we wanted was to get together and discuss what we had just heard. She said a counsellor was available, but said some found it difficult to ask for help and requests for appointments were not anonymous.

  It is understood at least 10 teachers are on long-term absence from Ysgol Friars, with sources claiming there had been an average of 18 absences a day since October. Mr Jones said: "155 individuals work at Ysgol Friars, and naturally each has been affected as a result of Neil Foden's horrific crimes." He said the new governing body was "committed to doing their very best for the welfare of the school's pupils and staff". Ana also criticised the council, Cyngor Gwynedd, for not taking control of the school after Foden was accused, saying it should have reacted "a lot sooner". Recognising the difficulties faced by pupils and staff, the council said its education department had been working with the teaching staff, support staff and school governors to "restore and stabilise the situation for the benefit of all the school's pupils".

  Ana says the school she used to work at needs a "clean slate"

  During Foden's trial, the court heard colleagues saw him go to his car with one of his victims and hug her. A former pupil who claimed Foden groomed her for five years said teachers and other school staff saw her get into his car alone several times. Ana said many in the school were aware some girls got "a lot of attention" from Foden. "We knew as members of staff we were not supposed to carry children in our cars, so why was it different for Foden, and why didn't anyone question that?"

  Ana said she felt able to speak about how Ysgol Friars was run after leaving the school. She said: "Every day, I think about those young girls Foden abused." Foden left the school in September 2023, but she said "secrets cast a shadow over the school". "I would say that many senior staff have been moulded into how Foden wanted them to behave. "This is bigger than Foden himself. He made sure he was surrounded by people who weren't going to question him." She said the school needed a "clean slate". Mr Jones said he could not comment on matters relating to staff, but "any allegation" brought to the board's attention would be dealt with in accordance with its policies.

  The conclusion of the children's practice review, chaired by Jan Pickles, is due next spring and will be presented to the Welsh government, but there are concerns about the communication processes and "timeliness" of responses. The Child Protection Panel said the review team would make direct contact with individuals should they need to meet or discuss anything further. But some within the school community said they were worried about confidentiality and general awareness of the review process, with parents not given a direct line of communication with the North Wales Safeguarding Board. A letter from the school in July said information should be sent to the head teacher or a member of staff "in whom you trust". There has been no further correspondence with parents. Some said they were "surprised" and felt information should be sent directly to the panel.

  The Gwynedd Child Practice Review said it has focused on perpetrator behaviour and professional conduct as well as governance arrangements and management of disclosures. It added anyone with information can send it directly to the board, external.

  The school does not currently have a permanent head teacher, with David Healey, who was deputy under Foden, in interim charge since September 2023. Mr Jones said the post had been advertised three times but so far it had "not been possible to make a permanent appointment" and arrangements to appoint a head teacher on a temporary basis were under way. Mr Healy is understood to have been one of the applicants to be Foden's permanent successor. The council said recruiting a permanent head teacher had been "challenging" and a new approach was needed.

  The council said a formal "recovery plan" was to be implemented, saying it had "proactive steps in place" to review internal processes, including a barrister investigating events in 2019 referenced in the trial. "We can ensure that we will not for a moment forget about the most important ones in this whole situation - the girls who should have been safe in their school, and that is why we are going through these processes and arrangements," it said.
