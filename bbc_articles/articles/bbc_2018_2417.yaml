  Chris Hixon, 49, was the athletic director at Stoneman Douglas and was reported dead by local media.

  As well as being a wrestling coach, he led the school's baseball team to state and national championships in 2016.

  He had two children of his own.

  A photo was later shared of Mr Hixon at his US Navy retirement ceremony with his son, Thomas Hixon.

