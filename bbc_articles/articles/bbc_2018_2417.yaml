id: bbc_2018_2417
title: 'Florida shooting: Who are the victims? - BBC News'
date: '2018-02-16'
section: US & Canada
url: http://www.bbc.co.uk/news/world-us-canada-43070359
content: |-
  Football coach Aaron Feis, who was shot while shielding pupils, was among those killed on Wednesday.

  A beloved football coach. A swimmer who had just won a college scholarship. A freshman soccer player. A geography teacher shot while trying to barricade the door.

  They are among the victims of a mass shooting at a Florida high school on Wednesday.

  Details of the 17 people who died are emerging.

  Aaron Feis, assistant American football coach at Marjory Stoneman Douglas High School in Parkland, is being hailed as a hero for shielding students from bullets. He was fatally injured after diving in front of a pupil.

  The MS Douglas Eagles, the school football team, confirmed Mr Feis' death on Twitter. "He died a hero," they wrote.

  "I coached with him. My two boys played for him," Broward County Sheriff Scott Israel said. "The kids in this community loved him, adored him."

  Students led tributes to their former coach as news of his injuries first spread.

