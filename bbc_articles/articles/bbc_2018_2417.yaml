  Geography teacher Scott Beigel, 35, let students into his classroom to shelter and was shot dead by the gunman while trying to lock the door, a student told Good Morning America.

  His friend Matt Hipps took to Facebook to share his memories of Mr Beigel, calling him: "My friend, my brother, my family."

  "He was so unselfish with his talents and gifts," he wrote. "He made others better."

  "He made the ultimate sacrifice," said Mr Hipps. "I won't say goodbye. It just hurts too much. I will see you on the other side."

  Former colleague Libby James Watt shared this picture of Scott Beigel

  Mr Beigel also worked at a summer camp in Starlight, Pennsylvania.

  Libby James Watt, a former colleague there, told the BBC: "We met in Summer 2016. The whole Camp Starlight family is broken.

  "He was the most quirky humoured character with a fierce heart to craft strong and caring people. His passion was undeniable and infectious - he'd light up a room, he'd light up an entire state.

  "Our Camp family has lost an icon, but for protecting his students - true to his heart to the end. A leader and protector."

  Meadow Pollack was a senior at the high school. Her father confirmed to local media that she had died.

  A family friend had previously posted on Facebook looking for information, and the teenager's Facebook page has been changed into a memorial.

  Her friend Gii Lovito took to Facebook to share her thoughts.

