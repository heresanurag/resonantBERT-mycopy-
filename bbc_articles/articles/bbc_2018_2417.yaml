  Cara Loughran was confirmed dead by a family friend who wrote on Facebook: "Cara's parents were given the news no parent ever wants to hear at 2am.

  "This is too horrible to even begin to process," she added.

  "Our next-door neighbour's daughter was one of the lives taken too soon by a senseless act," Danny Vogel posted on social media.

  "RIP Cara, and fly with the angels. You will be greatly missed, and we will always love you and celebrate your beautiful life."

  This photo of Gina Montalto was widely shared on social media by her neighbour Michael Citron.

  Her death was later confirmed as her mother changed her Facebook profile picture to waves crashing against rocks.

  Gina, 14, was part of the school's Color Guard - a team of flag-bearers and dancers that accompanies the marching band. The squad were due to compete in Tampa this weekend.

  Her former instructor Manny Miranda wrote on Wednesday night: "My heart is broken into pieces. I will forever remember you my sweet angel."

  Ross Rosenzweig (left) shared this photo with Joaquin Olivier (right)

  Joaquin Oliver was set to graduate in a few months' time.

  He was confirmed dead by a Venezuelan journalist, who was with his family when they received the news.

  His most recent photo on his Instagram page, with girlfriend Victoria Gonzalez, has seen an outpouring of support.

  This includes comments from friends and strangers alike, many of whom simply wrote 'que en paz descances' - Spanish for 'rest in peace'.

  The 14-year-old was confirmed dead by her aunt on Facebook.

  "There are no hashtags for moments like this, only sadness," wrote Claudette McMahon Joshi, as she asked friends online to pray for her niece.

  A local Mormon church leader confirmed in an email to his congregation that the teenager was confirmed dead at 0100e on Thursday.

  "She was a valiant young member of the Coral Springs Ward," wrote Stephen Thompson.

  The 14-year-old played trombone in the school marching band and was proud to have helped lead the squad to a state championship last year.

  His father, Max Schachter, said he will be remembered as "a sweetheart of a kid".

  Alex "just wanted to do well and make his parents happy," his father said, adding that he has a brother who also attends the school but was not injured.

  Schentrup was a 2017 National Merit Scholar semi-finalist, according to the Broward County Public School system.

  The 16-year-old's death was reported by several friends and family members on social media.

