  Miguel Duque (middle) shared this photo of him with his brother Martin (right)

  Martin Duque, aged 14, was confirmed dead by his brother Miguel Duque, who posted this photo of them together on Instagram.

  "Words can not describe my pain," he wrote. "I know you're in a better place."

