  Her cousin, Matt Brandow, called her "the smartest and most intelligible 16 year old I've ever met".

  "You will be remembered forever," he added.

  The 15-year-old's aunt wrote on Facebook that the teenager had been discovered on the third floor of the school.

  "This has devastated our family and we're all in shock and disbelief. Our hearts are broken," Toni Stroud Brownlee wrote in her post.

  "Luke was a beautiful human being and greatly loved."

  Softly-spoken Helena, 17, was a "smart, kind-hearted, and thoughtful person," according to tributes.

  "She was deeply loved and loved others even more so. Though she was somewhat reserved, she had a relentless motivation towards her academic studies, and her soft, warm demeanour brought the best out in all who knew her," said Curtis Page Jr., who described himself as a relative.

  Her cousin Fena Cooper had shared a news article calling for blood donations on Facebook on Wednesday, adding that her family "still have no update on the location of my cousin".

  At 04:28 Ms Cooper wrote: "Valentine's Day will never look the same for my family...

  "Please continue to remember my Aunt Anne Ramsay, my cousin Ellis Ramsay, and their father Vincent Ramsay, who lost his only daughter on his birthday."

