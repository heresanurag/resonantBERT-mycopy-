  Peter's cousin Aaron Chen told First Coast News the 15-year-old spent his last moments trying to save lives.

  He was in the Junior Reserve Officers' Training Corps (JROTC), a school programme for potential US military officers.

  Aaron said Peter was last seen in his JROTC uniform, holding a door open so others could flee.

  Jesse Pan, a neighbour and longstanding friend of Peter's family, told the BBC Chinese Service he had tried to support the teenager's parents.

  "I was there with his parents, helping translating and finding a funeral home," he said. "His parents fainted as soon as they saw his body. He had got multiple shots in front... So horrible."

  Friend Jordan Moll told the BBC Peter was a "kind and caring" person, saying: "It was great spending the time I had with him. His family always treated my friends and I well when we visited. Even though they don't speak English, they were always happy when we came over. I'm very grateful that I met Peter, and he will be remembered."
