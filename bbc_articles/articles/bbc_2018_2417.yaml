  Nicholas Dworet's partner Daria Chiarella shared this photo of the couple on her Facebook page

  Nicholas Dworet was confirmed dead by his swim team on Facebook, who posted: "It's with a heavy heart that I/We have to announce that our family member, teammate, TS Aquatics swimmer Nick Dworet has passed away."

  The 17-year-old had secured a swimming scholarship to the University of Indianapolis just a week ago.

  His partner Daria Chiarella changed her Facebook profile picture to a selfie Nicholas took, prompting an outpouring of support.

  "I'm so sorry, we all love you so much and are here if you need anything," read one comment.

