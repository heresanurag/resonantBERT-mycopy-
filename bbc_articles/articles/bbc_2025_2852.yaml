title: Son saves dad twice with bone marrow and kidney donations - BBC News
date: '2025-02-07'
section: London
url: http://www.bbc.co.uk/news/articles/c74mr88rp1eo
content: |-
  Joshua, 23, was travelling in Australia when he got the phone call about his dad's failing kidney.

  Joshua and his dad pictured together after their recent operations

  Joshua Andrew was travelling in Australia when he got the call from his family that his father David's kidney function was declining. So Joshua offered to donate his. David, 57, was suffering from chronic kidney disease which was a result of chemotherapy he received around 10 years ago for non-Hodgkin lymphoma. Joshua, 23, was on the Gold Coast at the end of last summer when he returned to Southgate, north London, to begin preparations for the operation. It wasn't the first time that a donation from Joshua has saved his father's life. He had previously donated bone marrow as part of David's cancer treatment.

  Joshua said that he really wanted to help his dad

  The pair have matching immune systems and Joshua's kidney was a perfect match for David. Following their operations last week at the Royal Free Hospital, they are both now recovering at home. Joshua said: "The main thing was that I knew I wanted to help my dad. The nursing and surgery team at the Royal Free Hospital talked through every aspect of what was about to happen."

  Joshua previously donated bone marrow to his father as part of his cancer treatment

  David added: "The team here have been great. I was nervous about it for Joshua, but they really put us at ease and explained everything clearly." The operation went ahead despite David's health. At the beginning of 2024 he broke his neck in a serious bike accident. He had emergency surgery and extensive rehabilitation to slowly built up his strength again. "I've really had to adjust. I've got my mobility back, but my right leg is still weak," David explained. "I can't run, and I haven't ridden a bike since then, and I don't know if I ever will again." Joshua said hoped to be able to return to Australia in the near future, having made "friends for life" during his travels.

  Joshua's mother Lois said she was "so proud" of the pair after her son saved his father's life on two occasions

  Mum Lois added: "I am so proud of them both, it's actually difficult to put into words - David, for always just accepting what has been thrown at him and getting on with whatever treatment he requires to give him the best chance - Josh, for just saying 'well why wouldn't I do it for my dad?'" Alison Richardson, the live donor coordinator who helped the pair through their treatment, said Joshua is a remarkable young man. "He is delighted that he has been able to do this for his dad and it has been a pleasure to look after him," she said. "He is only 23 and he has saved his dad not once, but twice."
