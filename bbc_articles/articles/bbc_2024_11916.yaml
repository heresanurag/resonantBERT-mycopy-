  The story of the Battle of Orgreave, told by the people who were there

  A convoy of 35 lorries arrived at Orgreave at 08:10 to collect the day’s first shipment of coke. Miners briefly pushed against police - as was the ritual on picket lines - until the lorries had passed. At 08:20, the police lines parted and mounted officers charged into the field.

  Assistant Chief Constable Anthony Clement, who was in operational control of South Yorkshire Police’s operation, said mounted police were used to disperse miners throwing a “barrage of missiles”, but prosecutors later conceded in court that most projectiles were thrown after the police charge.

  Robert Plant: “We were pushed up to the riot shields, there was a lot of people pushing us into the shields. I says we need to get out of here. I think somebody had thrown a stone from the crowd, I says I don’t really like that because all that’s doing is antagonising the police, so let’s just go out the way.”

  Tony Munday, Hertfordshire Police officer: “At some point, there was a hell of a lot of bricks and other things being thrown in our direction. My main concern was just to look down to the ground because I didn't want to be blinded. I said ’I hope someone is going to do something soon because this isn’t a good place’. We were almost like skittles, completely defenceless.”

  Chris Kitchen: “There were some throwing from lads further back than us. There were no way that them missiles were going to the police lines. They had more chance of hitting us.”

  Russell Broomhead: “There were people at the back throwing stones and that, and they were actually hitting us [miners]. So I turned around, and I got me back to the police lines, and I'm shouting ‘Give over throwing, you're going to hurt us.’ Then everybody scattered. I turned around and there was this police horse nearly on top of me.”

  Paul Brown, South Yorkshire Police mounted officer: “The pickets were getting really agitated and it was decided to relieve the pressure on the lines to bring us forward... I was quite lucky, I ducked and dived at quite a few of the missiles.”

  Robert Plant: “The horses came galloping through and they trampled this guy about five or six metres from me, four horses just flattened him. So I shouted a few abusive words to them, I weren’t happy, and they just carried up going up the field.”

  Tony Munday: “[When] officers on horseback went through followed by officers with short shields we actually cheered because it wasn’t a good place to be, it really wasn’t, when you’ve got no protection... Not knowing what the strategy was of the people in charge, we're thinking, frankly, 'Are we just cannon fodder?' You had no idea.”

  Steve Brunt: “I went round the corner, I’ve got a horse behind me and one coming towards me. I thought I have no idea where I’m going. All I remember is going down on the ground and I must have gone under the horse's legs or very close to them. We went down the banking, across the railway, up the other side and then turned round and looked and there’s police stood there with them little batons. They were banging them just like the Zulus were banging them shields in that film: bang, bang, bang.”

  Chris Kitchen: “The excitement that I felt when we first got there of being part of something that were much bigger than I’ve ever been on before soon turned to fear. You started to realise that we’re here to peacefully picket and we’ve got the numbers but we’ve got no protection and the police were tooled up. They came prepared. They knew what were going to happen.”
