  • None Why did Andrew and Tristan Tate go to the US? The Tates are understood to be required to return to Bucharest at the end of March to satisfy prosecutors' terms; however, it is too early to say whether they will comply. Police in the English county of Bedfordshire are still seeking Andrew's extradition on separate and unrelated allegations of rape and human trafficking, as well as tax evasion. In the UK, four British women have filed a civil case against Andrew Tate in the country's High Court, alleging he raped and coercively controlled them, charges they also deny. Those plaintiffs said it was clear he would not face criminal prosecution in Romania and appealed to UK authorities to take action.
