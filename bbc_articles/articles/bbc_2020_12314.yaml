content: |-
  At least one person has been killed and several wounded after several shootings in the Austrian capital.

  At least one person has been killed and several wounded after several shootings in the Austrian capital, Vienna.

  A large area of the city centre has been cordoned off as police scour the city for gunmen.

  Austrian Chancellor Sebastian Kurz called it a "repulsive terror attack" and said one gunman was also killed.
