  Bringing you the latest news from across England about the coronavirus pandemic.

  Artists involved in stage shows being streamed online during the coronavirus crisis will be offered payment, the National Theatre has announced.

  The "nominal" payment will apply to all the productions the National has been streaming on YouTube since early April, and the artists can turn it down if they wish.

  James Corden, Benedict Cumberbatch and Tamsin Greig are among the actors whose work at the National has been made available online to view free of charge.

  Benedict Cumberbatch (left) and Jonny Lee Miller alternated the lead roles in Frankenstein, one of several shows to have been made available Image caption: Benedict Cumberbatch (left) and Jonny Lee Miller alternated the lead roles in Frankenstein, one of several shows to have been made available

  "Whilst the National Theatre continues to face a precarious financial future, we now feel able to make a payment to all artists involved," said its executive director Lisa Burger.

  "We recognise a great many are also experiencing a particularly challenging time at this moment."
