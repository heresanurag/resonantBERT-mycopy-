  Albon clung on ahead of McLaren's Lando Norris, while Fernando Alonso had his most anonymous race of the season to take ninth in the Aston Martin ahead of Alfa Romeo's Valtteri Bottas.

  Piastri had to pit to repair damage after the Hamilton incident and finished 12th behind Liam Lawson's Alpha Tauri.

  Verstappen's 10th win in a row moves him clear of Sebastian Vettel's total of nine, also achieved in a Red Bull, in the 2013 season.

  Asked about his achievement, Verstappen said: "I never would have believed that was possible but we had to work for it today and that made it definitely a lot more fun.

  "We had good pace, I think we were good on the tyres but [Ferrari] had a lot of top speed, it was so hard to get close and get a move on into Turn One so I had to force him into a mistake."

  Red Bull have now won all 14 races so far this season.
