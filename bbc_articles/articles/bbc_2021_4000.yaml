content: |-
  Further evidence is being heard by MSPs investigating the Scottish government's mishandling of complaints against former first minister Alex Salmond.

  The Scottish Parliament's inquiry into the Scottish government's handling of complaints against Alex Salmond is continuing to hear from witnesses.

  The former first minister successfully took the government to court over its investigation of harassment complaints against him.

  In January last year MSPs agreed to set up the special Holyrood committee. However, it was put on hold after criminal charges were brought against Mr Salmond - which culminated in him being acquitted of 13 charges of sexual assault.

  The committee takes evidence each Tuesday while the Scottish Parliament is sitting.
