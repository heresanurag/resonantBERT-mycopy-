content: |-
  England captain Ben Stokes backs opener Zak Crawley to improve his dismal record against New Zealand in the second Test in Wellington.

  Zak Crawley averages less than 10 in his 17 Test innings against New Zealand

  England captain Ben Stokes has backed opener Zak Crawley to improve his dismal record against New Zealand in the second Test in Wellington. Crawley made nought and one in the eight-wicket victory in the first Test, taking his average against the Black Caps down to 9.88. The 26-year-old missed the last three Tests of the summer with a broken finger but in the year prior averaged almost 44 against allcomers. "Some guys have bogey teams, some guys have teams they do really well against," Stokes told BBC Sport. "We're one Test match into a series against New Zealand, but over the past 18 months Zak has been absolutely phenomenal for us." Crawley's struggles come from nine Tests and 17 innings against the Kiwis. Since 2000, only one other batter in Test cricket has played as many innings against the same opponent and ended with a lower average – West Indies' Marlon Samuels averages 9.81 against Sri Lanka. Stokes pointed to the job done by Crawley and his opening partner Ben Duckett in setting the tone at the beginning of an England innings. Of all pairs to have opened at least 10 times for England in Tests, the Crawley-Duckett run-rate of 5.03 is at least a run faster than the next quickest partnership, which is Crawley and Alex Lees. "Those two have been such a successful pairing for us," added Stokes. "They go out there with a mindset of putting the opposition bowlers under pressure straight away, not allowing them to settle in."

  Both England and New Zealand are unchanged for the match at the Basin Reserve, which begins at 22:00 GMT on Thursday. That means another overseas Test for England seamer Chris Woakes. The 35-year-old has a poor record away, where his wickets cost an average of 51.4 runs compared to 21.6 at home. In the first Test in Christchurch, Woakes made a crucial intervention in New Zealand's second innings by removing Kane Williamson and Tom Blundell in successive deliveries. "Someone with his skill level should never doubt themselves wherever they are in the world," said Stokes. "It's belief in himself, belief from myself and Brendon McCullum that he's not just someone who is going to be playing in England." An England victory in Wellington would secure their first Test series win in New Zealand since 2008. New Zealand were poor in the first Test, dropping eight catches. They have not made changes despite wicketkeeper Blundell and seamer Tim Southee, who will retire after the third and final Test, coming under pressure. Once again they have opted against a frontline spinner, relying on all-rounder Glenn Phillips' off-breaks. "Going by the games here, the Wellington first-class games, the balance that we’ve gone in with is right for this wicket," said captain Tom Latham. "We obviously have some spin options in that top seven anyway." The last time these two sides met on this ground, in February 2023, produced one of the greatest Tests of all-time. England were beaten by one run, becoming only the fourth team to be beaten after enforcing the follow-on. "It was an amazing Test to be a part of," said Stokes. "I'm one of the very few players who can say they have been involved in a game where one run separated two teams."
