content: |-
  Fighters and pundits offer their predictions with Britain's Leon Edwards set to defend his welterweight title against Belal Muhammad at UFC 304 in Manchester this weekend.

  Edwards is on a 12-fight win streak while Muhammad has won nine in a row

  Britain's Leon Edwards defends his welterweight title against American Belal Muhammad at UFC 304 in Manchester this weekend. Edwards, 32, will be making a third defence as he takes on 36-year-old Muhammad, who is on a nine-fight winning streak in completed contests. The fight at the Co-op Live Arena is a rematch of their 2021 bout, which was deemed a no-contest following an accidental eye poke from Edwards which left Muhammad unable to continue. The pair will make their walk to the octagon in the early hours of Sunday morning - predicted to be around 05:00 BST - with the UFC's scheduling catering largely to an American audience. In the co-main event, Britain's Tom Aspinall will defend his interim heavyweight belt against 33-year-old American Curtis Blaydes in another rematch. Aspinall, now 31, seriously injured his knee when losing to Blaydes in 2022. You can follow live text commentary on BBC Sport website and app from 04:00 BST on Sunday. Will Edwards and Aspinall retain their titles in front of a 23,500-capacity home crowd? BBC Sport has asked around the world of MMA for fight predictions.

  Irish welterweight Ian Garry: "I think Belal has a huge opportunity to go out there and bring it to Leon. Over five rounds Leon rarely gets the finish - I think we could see Belal go out there and try and dominate - but I just believe this will be a five-round decision that sways in the way of Leon. But I'm excited to see if there's an evolution and difference in Belal from his training camp. I think it's an exciting time for him." Irish strawweight Shauna Bannon: "I think Leon Edwards will win by decision. I think it will be back and forth but Leon will get the win." American heavyweight Curtis Blaydes: "I think it will be a hard-fought five rounds, I think Belal Muhammad will get the decision win. I think there's going to be a lot of wall grappling involved and just grappling overall, and that's where Belal shines."

