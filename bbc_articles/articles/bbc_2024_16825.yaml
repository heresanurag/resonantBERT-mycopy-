  British lightweight Paddy Pimblett: "Obviously I'm backing the fellow Englishmen, it goes without saying. I think Belal has got so much better since the first fight, but Leon was on his way to finishing him in that fight and I think he gets a finish. And Big Tom's out for revenge, but Curtis is his toughest test to date, stylistically." American welterweight Belal Muhammad: "I think people are going to be surprised – Curtis Blaydes is so good everywhere: his wrestling, grappling, striking, and he's kind of hard to beat in a wrestling match-up. And I think I dominate Leon and I think that should be your headline – Belal dominated Leon." British featherweight Arnold Allen: "Leon's the man, he's grown so much as a champion, he's got better and better. I think you're going to see him be a dominant champion for a while. With Tom, the heavyweight division is crazy, but Tom looks so good. Every time he's out he shocks again, so I think those guys are going to defend their belts." American lightweight Bobby Green: "Tom is a new age heavyweight. I used to be a Sergei [Pavlovich] fan and he creamed Sergei. He understands fighting and what it should look like so I'm going with Tom. And then I'm gonna go with Leon, let's go." British heavyweight Mick Parkin: "I think the two British guys are good. I don't know Edwards or train with him but I think he will win. Obviously I train with Tom and I wouldn't he surprised if in the first minute or two he wins again. Respect to Curtis Blaydes, I think he's a great fighter, but Tom is something special."
