  British featherweight Nathaniel Wood: "Call me biased but I think they’re [Leon Edwards and Tom Aspinall] both going to get the job done and I think they're going to get it done in good fashion." British UFC interim heavyweight champion Tom Aspinall: "Leon will knock him out. Later in the fight. I think it will be competitive but I don't think it will be an exciting fight. I think Leon will control range, be safe and doing his thing, and knock him out." British strawweight Molly McCann: "I like Curtis and I love Tom but obviously I’d like to see a fellow North West boy keep the belt. I think it won't be a decision with them both, I think it will be a submission win. And I believe Leon will win by TKO but I'm not sure what round."

