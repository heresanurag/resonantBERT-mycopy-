title: Scotland eases home working rule as Omicron 'in reverse' - BBC News
date: '2022-01-25'
section: Scotland
url: http://www.bbc.co.uk/news/live/uk-scotland-60110769
content: |-
  First Minister Nicola Sturgeon says employers can now look at a "hybrid" office return for staff, but older pupils will still have to wear masks in classes.

  'Government is turning its eyes away from NHS staff' with indy plans

  Scottish Lib Dem leader Alex Cole-Hamilton challenges the first minister on a "litany of social problems" - including in the health service and with poverty - which he says the government has deferred because of the pandemic. Yet, he says, "miraculously" we are told this week that the threat of the virus has abated to such an extent that we can hold an independence referendum in 2023. Mr Cole-Hamilton asks the FM if she understands the anger of front-line health care staff, "who are on their knees", as the government "turns its eyes away from them" Ms Sturgeon says her government focuses on these issues each and every day and that will continue as we come out of the pandemic and hopefully into the recovery phase.
