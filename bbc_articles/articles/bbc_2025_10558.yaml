title: Layton Carr fire death children released on bail in Gateshead - BBC News
date: '2025-05-04'
section: Tyne
url: http://www.bbc.co.uk/news/articles/ceqr45eq47po
content: |-
  Eleven boys and three girls, aged 11 to 14, are being investigated on suspicion of manslaughter.

  A body believed to be that of Layton Carr, 14, was found in a fire-hit industrial unit

  Fourteen children arrested over the death of a teenage boy following a fire at an industrial unit have been released on bail. The blaze broke out at Fairfield industrial park in the Bill Quay area of Gateshead on Friday evening. It was extinguished but a body believed to be that of Layton Carr, 14, who had been reported missing, was located inside the building, Northumbria Police said. Eleven boys and three girls, aged between 11 and 14, were arrested on suspicion of manslaughter and have since been released on bail pending further inquiries.

  Floral tributes to the teenager have been left at the scene

  The fire at the 15-acre site on the southern banks River Tyne was reported shortly after 20:00 BST on Friday. One resident of the area described it as the "biggest fire" they had ever seen. A boy's body was found inside and, later, police arrested 14 children on suspicion of manslaughter.

  The blaze broke out at Fairfield industrial park in the Bill Quay area of Gateshead

  Det Ch Insp Louise Jenkins said it was an "extremely tragic incident where a boy has sadly lost his life". "Our thoughts are with Layton's family as they begin to attempt to process the loss of their loved one." Police have appealed for anyone with information to get in touch.

  Layton's school, Hebburn Comprehensive, posted a tribute on Facebook which read: "Our school community is heartbroken. "Layton was a valued and much-loved member of Year 9 and he will be greatly missed by everyone." Meanwhile, more than £10,000 has been raised so far via a GoFundMe set up for Layton's mother.

