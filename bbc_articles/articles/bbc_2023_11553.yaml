title: 'France protests: Police throw tear gas in Marseille - BBC News'
date: '2023-07-02'
section: General
url: http://www.bbc.co.uk/news/world-europe-66078692
content: |-
  Heavy clashes have been taking place between police and protesters all evening in the French city.

  Footage widely shared online shows police using tear gas against people in the city of Marseille, in southern France.

  The video is from Saturday evening and shows clashes taking place on La Canebière, which is the city's main avenue.

  France has been rocked by five nights of unrest after police fatally shot a 17-year-old boy of Algerian descent, Nahel, in the Paris suburb of Nanterre.
