title: 'Orpington: Two children, aged 4 and 6, injured by four dogs - BBC News'
date: '2024-10-06'
section: London
url: http://www.bbc.co.uk/news/articles/cly3d8z75veo
content: |-
  A woman is in custody after being arrested on suspicion of having dogs dangerously out of control.

  Two children, aged 4 and 6, injured by four dogs

  Police were called to Mickleham Road, St Paul's Cray, shortly before 09:00 BST

  Two children have been taken to hospital after being injured by four dogs in south-east London, the Metropolitan Police has said. The victims, aged four and six, were found injured on Mickleham Road in St Paul's Cray, Orpington, just before 09:00 BST. A 30-year-old woman was also injured and all three were taken to hospital for treatment. Their injuries are not thought to be life-threatening. The Met said a woman has been arrested on suspicion of having dogs dangerously out of control and has been taken into custody.

  Police said all four dogs were of a Mastiff-type breed. Supt Mitch Carr said: "I know this incident will have caused a lot of public concern, especially due to the young age of the children injured. "Fortunately, it is believed that none of the injuries are life-threatening. "The dogs have also been taken to police kennels while the investigation is ongoing." The London Ambulance Service said it sent crews including an advanced paramedic, an incident response officer and an air ambulance. A spokesperson said the woman and two children were treated at the scene and taken to a major trauma centre by road. The Met said extra officers would be in the area over the next few days to provide "community reassurance".
