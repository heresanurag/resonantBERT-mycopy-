  Novak Djokovic and Nick Kygrios are narrowly beaten in the second round of the doubles at the Brisbane International.

  Djokovic and Kyrgios beaten in doubles in Brisbane

  Novak Djokovic and Nick Kyrgios teamed up for the men's doubles at the Brisbane International

  Novak Djokovic and Nick Kyrgios were knocked out of the men's doubles in the second round at the Brisbane International after a narrow defeat by top-seeded pairing Nikola Mektic and Michael Venus. Kyrgios, 29, lost a gruelling three-set match to Giovanni Mpetshi Perricard on Sunday on his return to singles competition after 18 months out through injury. The Australian said the defeat left him in "throbbing" pain and suggested he was a doubt for this month's Australian Open. But he fulfilled his promise to play alongside Djokovic in the doubles and appeared comfortable, only occasionally grabbing his right arm between serves.

  The pair lost the first set 6-2 but responded well to win the second 6-3 to take the match to a deciding first-to-10-points tie-break. With Djokovic and Kyrgios two points from victory, a double fault from the Serbian proved costly at 8-6. It shifted the momentum of the tie-break back towards Mektic and Venus, who won the next three points to seal the win 6-2 3-6 10-8. "Incredible," Mektic said afterwards. "I was very happy when I saw them [Djokovic and Kyrgios], I could play them on the first of January. "It's an amazing feeling to start the year like this and we knew there would be points like that against players like this." Djokovic, pursuing his 100th career ATP title, is through to the quarter-finals of the singles, where he will play France's Gael Monfils.
