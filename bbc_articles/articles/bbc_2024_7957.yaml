title: 'Chelsea 3-0 Aston Villa: Aggie Beever-Jones wants to ''give the right people
  headaches'' - BBC Sport'
date: '2024-04-17'
section: General
url: http://www.bbc.co.uk/sport/football/68841877
content: |-
  Chelsea forward Aggie Beever-Jones says she wants to "give the right people headaches" as she scores her eighth goal of the season in the 3-0 win over Aston Villa.

  Aggie Beever-Jones hopes she has given Chelsea something to think about after scoring in a 3-0 win over Aston Villa.

  Only Lauren James has scored more for Chelsea this season than the 20-year-old forward, who has been used mainly as an impact substitute.

  "I hope to give the right people headaches and I hope to contribute to the team and what they need," Beever-Jones told BBC Sport.

  "For me, I'm just happy to help the team out and scoring is just a bonus."

  Beever-Jones made only her third Women's Super League start of the campaign against Villa, and has yet to play a full 90 minutes in the top flight this season - yet she now has eight league goals to her name.

  Former Chelsea and England midfielder Karen Carney said Beever-Jones has "every attribute possible" and presents a selection headache for boss Emma Hayes.

  "The thing she has got to develop now is that end product," Carney said on Sky Sports. "She's got it, but she just needs to keep working on it and working on it. I think she's got all the attributes to be one of the top players."

  Former Chelsea goalkeeper Mark Schwarzer added that Beever-Jones will have given manager Emma Hayes plenty to think about for her side's remaining fixtures.

  "The fact players come in, they get the opportunity to play, they go and deliver," he said. "Now it's about what is Emma going to do moving forward?"

  Chelsea have been through a tough recent spell, losing the League Cup final to Arsenal at the end of March and then their FA Cup semi-final against Manchester United last Sunday.

  But they returned to form against Villa, going back to the top of the WSL, where they now lead Manchester City on goal difference.

  They remain in contention for the Champions League and face Barcelona in the semi-finals, with the first leg in Spain on Saturday.

  Beever-Jones said their cup exits are "not the Chelsea way".

  "We're Chelsea and we want to win as much as we can," Beever-Jones told Sky Sports. "Losing two titles isn't the Chelsea way and that's not how we wanted it to go this year.

  "I think it's evident how to bounce back from losses like that. We're just happy with the three points. We've still got two titles to fight for and today was the first step in that process."
