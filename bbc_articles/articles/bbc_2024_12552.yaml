  The 45-year-old man was found injured on Main Street, Alexandria, on Friday.

  Man abducted and assaulted before being thrown from car

  The man was thrown out of a car on Main Street, Alexandria

  Police are appealing for information after a 45-year-old man was abducted and seriously assaulted before being thrown from a car in Dunbartonshire The man was found injured on Main Street, Alexandria, at about 23:00 on Friday. Police said they believed the man was assaulted near Renton Road in Dumbarton. The car involved is described as "reddish". The man was taken to hospital where he is being treated for serious face, hand and leg injuries.

  Det Con Georgia Callander said: “Inquiries are at a very early stage to establish the full circumstances surrounding this serious incident and we are appealing for members of the public to c, externalome forward with any information, external. “If you were near to Main Street, Old Bonhill, or Renton Road in Dumbarton, on Friday night and saw or heard anything suspicious it is important that we speak to you." She appealed to anyone in the area with private CCTV or a dashcam to check in case it may have captured something which could be of significance to the investigation.
