title: Free Madonna concert to end 'Celebration' tour brings fans to Brazil beach
  - BBC News
date: '2024-05-06'
section: General
url: http://www.bbc.co.uk/news/world-latin-america-68961494
content: |-
  The concert in Brazil marked the end of the singing icon's 'Celebration' world tour.

  An estimated 1.6 million people gathered on Brazil's famous Copacabana beach on Saturday to watch a free Madonna concert.

  The gig was put on to mark the end of the icon's 'Celebration' world tour, and featured performances of a number of her greatest hits.
