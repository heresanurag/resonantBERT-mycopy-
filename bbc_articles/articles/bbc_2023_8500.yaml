title: Canada fires shroud New York City with orange haze - BBC News
date: '2023-06-07'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-65840256
content: |-
  Timelapse video of the city's skyline shows the air quality worsen in a matter of a few hours.

  Millions across North America are breathing the hazardous air from the wildfires in Canada. The country is facing its worst wildfire season in history.

  New York City, which is hundreds of miles south of the blazes, has been shrouded with orange haze because of the air quality.
