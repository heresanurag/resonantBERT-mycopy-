content: |-
  Ros Atkins takes a look at what we do and do not know about the BBC presenter row.

  Claims relating to allegations about an unnamed BBC presenter have been dominating the headlines after the Sun newspaper reported that the presenter was alleged to have paid someone for sexually explicit photos, beginning when they were 17.

  On Monday, that young person's lawyer said nothing inappropriate or unlawful had taken place.

  Ros Atkins explains what we do and do not know about how the BBC's handling of the complaint and what might happen next.
