  A 27-year-old man has been charged in Londonderry as part of the investigation into the murder of journalist Lyra McKee.

  The man was charged with possession of a firearm with intent to endanger life and possession of a firearm in suspicious circumstances.

  He is due to appear via videolink at Londonderry Magistrates' Court on Thursday.

  Ms McKee was shot in Derry's Creggan estate on 18 April 2019.

  The 29-year-old was observing rioting when she was shot.

  One man, Paul McIntyre, 52, from Kinnego Park in Derry, has been charged with Ms McKee's murder.
