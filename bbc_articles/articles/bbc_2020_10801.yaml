title: '''Yellow vest'' France protests: Demonstrators return to streets of Paris
  - BBC News'
date: '2020-09-12'
section: General
url: http://www.bbc.co.uk/news/world-europe-54130150
content: |-
  More than 200 people are arrested as anti-government demonstrators clash with police in the French capital.

  Police in Paris say they've detained more than 200 people, after the "yellow vest" movement attempted to revive its anti-government protests.

  In 2018 and 2019 demonstrations by the movement sometimes brought parts of France to a standstill.
