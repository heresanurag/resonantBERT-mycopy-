content: |-
  The group, including a 15-year-old boy, is detained over the violence on the night of Lyra McKee's murder.

  Lyra McKee was observing rioting in Creggan when she was shot dead last month

  Three men and a teenage boy remain in police custody after being arrested in connection with the violence that took place on the night Lyra McKee was murdered.

  The 15-year-old youth, and three men aged 18, 38 and 51, were detained under terrorism legislation on Thursday.

  Ms McKee, 29, was shot while observing rioting in Londonderry on 18 April.

  Violence broke out in Creggan after raids were carried out by police.

  Detectives were investigating dissident republican activity in the Mulroy Park and Galliagh areas.

  The four have been taken to Musgrave Station in Belfast where they are currently being questioned.

  Police were searching for weapons and ammunition in Derry when the violence started

  The senior detective leading the investigation, Det Supt Jason Murphy, said: "Detectives carried out searches at four houses in the city and arrested four people in connection with the violence which was orchestrated on the streets of Creggan on the evening of Lyra McKee's murder.

  "I want to thank the public for the widespread support we have received to date, including more than 140 people who have provided images, footage and other details via our dedicated major incident public portal. I still want to hear from anyone who can tell us anything they know."
