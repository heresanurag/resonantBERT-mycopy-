  It began running on Thursday afternoon and, according to the Facebook Ad Library, was mainly aimed at 35-54 year olds and cost the party around £7,000.

  The advert, along with two others, was removed so it is no longer visible online and a message reads: "This ad was taken down because it goes against Facebook's intellectual property policies."

  In Facebook's policy guidelines it states that "ads must not contain content that infringes upon or violates the rights of any third party, including copyright, trademark, privacy, publicity or other personal or proprietary rights".

  When it rejected the BBC's initial request to stop running the ads, the Conservative Party said it was "clear the footage was not edited in a manner that misleads or changes the reporting".
