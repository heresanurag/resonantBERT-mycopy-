content: |-
  Ariel, 10, and her brother Elias, 13, are awarded top grades.

  Elias, 13, and Ariel, 10, are celebrating after receiving top grades in their GCSEs and A-levels

  Two high-flying siblings, aged 10 and 13, are celebrating after they aced their GCSE and A-level exams. Ten-year-old Ariel, from Burton-upon-Trent, Staffordshire, opened her GCSE results on Thursday to discover she had scored an eight in maths and a nine in chemistry - an A and A* under the previous grading system. It came after her brother Elias, 13, received three A*s in his chemistry, maths and physics A-levels last week. The pair have been home-schooled since the Covid pandemic by elder sisters Clara and Juliana, who are both studying at university.

  Speaking to BBC Midlands Today, Ariel said: “I feel very happy that I made it to an eight and a nine.” She said she was now working on further GCSEs in biology and physics, and might tackle an English GCSE as well. Meanwhile, Elias said he was “surprised” with his three A*s and was looking to sit A-levels in biology and further maths, as well as a GCSE in English. “And I’m thinking of applying to Oxford next year,” the teenager added.

  Sisters Clara and Juliana have home-schooled their younger siblings

  Juliana, who is studying a PhD in bioengineering at Imperial College London, said the whole family was proud of the youngsters’ achievements. The 23-year-old said that while her siblings were “really good” at studying, they also had other talents – Ariel likes to draw and Elias plays the piano. “Both of them are very multi-talented,” she added. Clara, 21, will also be studying at Imperial College London this coming year, where she will be doing a masters in machine learning and big data in physical sciences. She said teaching her younger siblings was “quite fun” because there was a lot of “chit-chat moments” between the four of them. “It’s quite relaxed, there are no time restrictions too. The playful environment helps them to learn very well,” she added. Clara said she and her sister were also hoping to tutor other children part-time during their own studies.
