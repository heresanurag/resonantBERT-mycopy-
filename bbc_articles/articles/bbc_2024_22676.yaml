title: BBC Natural History Unit co-founder Tony Soper dies aged 95 - BBC News
date: '2024-09-20'
section: England
url: http://www.bbc.co.uk/news/articles/c4glpenddeko
content: |-
  Former BBC wildlife TV presenter, author and naturalist Tony Soper has died.

  Tony Soper was the co-founder of the BBC's Natural History Unit, which started in Bristol in 1957

  A former BBC wildlife TV presenter, author and naturalist has died aged 95. Tony Soper co-founded the BBC's Natural History Unit, which began in Bristol in 1957 and has since produced countless wildlife programmes around the world. Mr Soper was born in Southampton in 1929 and brought up in Plymouth, where he started his career at the corporation as a trainee engineer in 1947. He was a wildlife camera operator, a film producer and went on to present many TV shows, including Birdwatch and Beside the Sea.

  Tony Soper presented many wildlife shows including Birdwatch and Beside the Sea

  Speaking to BBC Radio Devon in 1995, Mr Soper said the team who set up the unit "had to be very resourceful" in its early days. "Our cutting room set up was a projector and a splicing machine, which we bought from the local camera shop - we lusted after having a camera so we could shoot our own film," he said. According to his website, external, he started working as a freelancer in 1963 so he could live closer to the sea in Devon. He subsequently pursued a career leading wildlife cruises to the Arctic and Antarctica, writing a multitude of books about wildlife in the UK and further afield. Mr Soper is survived by his wife Hilary, his two sons Tim and Jack and his five grandchildren.
