  Mihail Mihov took part in the research as part of his studies for a doctorate. "Maternal smoking during pregnancy has been linked to many health issues for babies," he said. "However, we previously had limited knowledge about which processes in the womb are influenced by maternal smoking and how they translate to diminished health later in life. "Our findings show that maternal smoking impacts baby's health, particularly for males, from as early as the second trimester and this continues throughout adulthood."

  Felix Grassmann, professor of epidemiology and biostatistics at the Health and Medical University in Germany, co-led the research. "Most research has been conducted in cohorts with too few individuals thus lacking statistical power to uncover the rarer associations," he said. "In this research, we used genetic, biochemistry and medical questionnaire data on more than 500,000 individuals making it one of the biggest studies reported on the effects of maternal smoking during pregnancy." He added: "In short, we found that when a mother smokes during pregnancy her son's liver is more affected than her daughter's liver. "This difference and the sex difference in risk of death continues into middle age." The Action on Smoking (Ash) charity welcomed the research as highlighting the "importance of supporting every woman to have a smoke-free pregnancy".
