title: Males 'more impacted by mother smoking during pregnancy' - study - BBC News
date: '2025-03-12'
section: NE, Orkney & Shetland
url: http://www.bbc.co.uk/news/articles/cn52lxdg24lo
content: |-
  Data from half-a-million people was assessed by the University of Aberdeen research team.

  The smoking during pregnancy study looked at data from 500,000 people

  The sons of women who smoke while pregnant experience more long-lasting side effects than their daughters, according to a new study. University of Aberdeen researchers looked at data from 500,000 people around the UK to assess genetic links. They said the results indicated that men born to women who smoked through pregnancy were more likely to die younger if they went on to smoke themselves. The research team said they hoped the findings might help the medical community develop fresh counselling strategies for smokers.

  The team looked at the genetic relationship between mothers and their adult children. Data from 500,000 individuals across 22 centres in Scotland, England and Wales was used. They found that, at every stage, male foetuses and adult sons were more affected by maternal smoking during pregnancy than females. They said this was shown by changes in levels of various genes in male foetal livers as early as 17 weeks into pregnancy, right through to adult males having shorter life expectancy. However the authors said that if the adult man stopped smoking, or did not smoke at all, they could counter any risks.

  The team was led by Prof Paul Fowler, chair in Translational Medical Sciences at the University of Aberdeen. "We hope our findings will pave the way towards investigating the molecular effects of maternal smoking which will allow the scientific community to uncover the specific mechanisms by which the trait modifies or initiates specific diseases," he said. "Ultimately, we also hope it helps the medical community to develop even better counselling strategies and campaigns towards smoking cessation."
