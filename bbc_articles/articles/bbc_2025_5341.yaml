  Their fate is the discussion of Arab leaders in Egypt but what do Gazans want for their future?

  Gazans face tough choices as their future is debated on the global stage

  Jabalia, in northern Gaza, was once a bustling and tightly-packed refugee camp

  The level of destruction in Jabalia when viewed from the air is truly astonishing. A Hiroshima-like wasteland stretches as far as the eye can see. The mangled carcasses of buildings dot the churned-up landscape, some leaning at crazy angles. Great undulating waves of rubble make it all but impossible to make out the geography of this once bustling, tightly packed refugee camp. And yet, as a drone camera flies over the wreckage, it picks out splashes of blue and white where small tent camps have been set up in patches of open ground. And figures, clambering over broken buildings, moving along streets of dirt, where food markets are springing up under tin roofs and canvas awnings. Children using a collapsed roof as a slide. After more than six weeks of Gaza's fragile ceasefire, Jabalia is slowly coming back to life.

  Many, like Nabil, who returned have found their homes damaged or completely destroyed

  In the neighbourhood of al-Qasasib, Nabil has returned to a four-storey house that's somehow still standing, even if it lacks windows, doors and - in some places - walls. He and his relatives have made crude balconies out of wooden pallets and strung-up tarpaulin to keep out the elements. "Look at the destruction," he says as he surveys Jabalia's ocean of ruins from a gaping upper floor. "They want us to leave without rebuilding it? How can we leave. The least we can do is rebuild it for our children." To cook a meal, Nabil lights a fire on the bare staircase, stoking it carefully with pieces of torn-up cardboard.

