title: Biden border order attacked by rival Republicans - BBC News
date: '2024-06-05'
section: World
url: http://www.bbc.co.uk/news/articles/cv224kdxwm4o
content: |-
  The president has hit back at critics after unveiling plans to curb record migrant arrivals at the US-Mexico border.

  A group of migrants who were detained attempting to cross the US border from Mexico yesterday

  US President Joe Biden's Republican rivals, and some of his Democratic allies, have criticised his new executive order aimed at curbing record migrant arrivals at the US-Mexico border. Under the order, which took effect at midnight, officials can quickly remove migrants entering the US illegally without processing their asylum requests. Left-wing Democrats, activists and the UN have voiced concerns, while Republicans have criticised the plan as an election-year ruse, arguing for tougher action. But Mr Biden says his Republican opponents stood in the way of a bipartisan border security deal that failed in Congress earlier this year.

