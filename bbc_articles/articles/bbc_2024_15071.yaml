title: Man arrested on suspicion of murder over Bushey crossbow killings - BBC News
date: '2024-07-13'
section: Beds, Herts & Bucks
url: http://www.bbc.co.uk/news/articles/ckrg38vpzkxo
content: |-
  Kyle Clifford is arrested on suspicion of murdering Carol Hunt and two of her daughters.

  Carol Hunt and her daughters Louise and Hannah were killed in the attack

  A man suspected of killing a mother and two daughters in a crossbow attack has been arrested on suspicion of murder. Carol Hunt, 61, Hannah Hunt, 28, and Louise Hunt, 25, died at their home in Bushey, Hertfordshire, on Tuesday evening. Kyle Clifford, 26, from Enfield in north London, was arrested on Thursday evening on suspicion of three counts of murder. He was found wounded in a cemetery in Enfield on Wednesday and remained in hospital in a serious condition, police said.

  Kyle Clifford, 26, has been arrested and is in a serious condition in hospital

  The victims were the wife and two of the three daughters of BBC commentator John Hunt. Det Supt Rob Hall, from the Bedfordshire, Cambridgeshire and Hertfordshire Major Crime Unit, said: "Our thoughts remain with the victims’ family at this tragic time. "The investigation is moving at pace and as a result, we have now arrested a man. Inquiries are continuing at this time." On Thursday, police said a crossbow had been recovered as part of the investigation.

  Flowers have been placed in memory of the victims

  Tributes to the victims have flooded in from friends and members of the sporting world. Loreto College St Albans said it was "mourning the loss of two of our former students, Hannah & Louise, along with their mother, Carol". "As a Loreto Community, they will always hold a place in our heart. May they rest in peace," a statement said. On Thursday, more than 50 people attended a vigil at St James’s Church in Bushey to pay their respects. Support has also come from Rabbi Elchonon Feldman, from Bushey United Synagogue, who said: "It will certainly take time to comprehend that such a tragedy took place in our midst, but in the first instance we stand together in sorrow and prayer with all family and friends who are grieving at this time of immense loss." Sally Golding, who knew Hannah Hunt as her beautician, described "a really, really lovely bubbly person with a great personality. She was a sweet girl, a very happy little soul". Lea Holloway, a longstanding friend of Carol Hunt, was in tears as she left the church. "I’ll miss Carol like crazy," she said. "I can’t believe this has happened. It’s the thing nightmares are made of."

  A minute's silence was held in memory of commentator John Hunt's family members at Newmarket Racecourse in Suffolk

  Jockeys at Kempton Park Racecourse in Surrey wore black armbands to show support and a minute’s silence was held at Newmarket Racecourse in Suffolk. In a statement, the British Horseracing Authority said: "The thoughts of everyone at the BHA are with John Hunt, his family and friends at this shocking and tragic time. "It is impossible to comprehend the horror that has been inflicted upon them by this dreadful event." The Sky commentator Mike Cattermole said it was "hard to comprehend and process the shock and disgust of what happened to John Hunt and his family". He added: "John lived for his girls, they were the world to him."
