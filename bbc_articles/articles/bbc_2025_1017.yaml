  A number of Saturday's front pages reflect on JD Vance's speech in Munich

  'Free speech in retreat' and Payne's 'chaotic' last days

  A number of Saturday's newspapers lead with comments made by US Vice President JD Vance during the Munich Security Conference on Friday. The Daily Mail, external carries his warning that "Free Speech is in Retreat" in the UK - calling Vance's address a "blistering speech" which "stunned European leaders and military chiefs" who had expected him to focus on how to end the war in Ukraine. Meanwhile, the Financial Times, external describes Vance's approach as "confrontational" and says his claim - that European democracies faced a greater "threat from within" than from Russia - drew a "furious response" from European Union officials. According to the Guardian, external, the US VP launched a "brutal ideological assault on Europe, accusing its leaders of suppressing free speech, failing to halt illegal immigration and running in fear from voters' true beliefs". The Times, external describes Vance's words as "sweeping polemic" and cites an unnamed government source who has told the paper that Vance came across as "crackers".

  In other news, the Daily Telegraph, external reports that Energy Secretary Ed Miliband has pledged a permanent ban on fracking, despite the discovery of a giant gas field in Lincolnshire - which the paper says could fuel the UK's entire needs for a decade. The i newspaper, external says the UK is spending millions of pounds on a social media campaign aimed at putting off Albanians who want to come to Britain. The mother of the late Caroline Flack gives an interview to the Daily Mirror, external on the fifth anniversary of the TV star's death. Finally, according to the Daily Star, external Robert De Niro's Zero Day co-star Jesse Plemons is backing him as the next president of the US, as he has the "command and presence" to take the White House job.

