content: |-
  Israel's military confirmed that its jets carried out a strike on Jabalia in Gaza.

  Israel's military has confirmed that its jets carried out an attack on Jabalia in Gaza.

  The Hamas-run health ministry and a hospital director said at least 50 people were killed in the attack. Meanwhile, the Israeli military said the strike killed a senior Hamas commander and caused the collapse of Hamas's underground infrastructure.
