title: 'PMQs: Starmer and Johnson on ex-minister lobbying claims - BBC News'
date: '2021-04-14'
section: General
url: http://www.bbc.co.uk/news/uk-politics-56749125
content: |-
  Keir Starmer says claims about lobbying show a "return of Tory sleaze" as he calls for MPs to clean up "sleaze and cronyism".

  Sir Keir Starmer said claims about lobbying show a "return of Tory sleaze" as he called for MPs to clean up "sleaze and cronyism".

  But Boris Johnson said the government had brought in "tougher laws on lobbying" that were opposed by Labour.

  The pair could not resist making reference to the police TV drama Line of Duty as Sir Keir called on Ted Hastings and AC-12 to help, and the prime minister said his government was rooting out "bent coppers".
