title: 'As it happened: India couples say hopes dashed as same-sex marriage not legalised
  - BBC News'
date: '2023-10-17'
section: India
url: http://www.bbc.co.uk/news/live/world-asia-india-66917126
content: |-
  The Supreme Court says it lacks the power to make such a ruling but directs the government to give more rights to LGBTQ+ couples.

  'Court can't give LGBTQ+ people right to marry'

  We just heard from Justice S Ravindra Bhat. He said that he agreed with the Chief Justice that queerness is neither an urban nor an elitist concept and that the judiciary cannot add words into the Special Marriage Act. However, he disagreed with several other points, including giving LGBTQ+ couples the right to jointly adopt children. Justice Bhat added that LGBTQ+ people have the right to choose their partners under Article 21 of the Constitution. "But if it is agreed that marriage is a social institution, does it mean that any section of the society which wishes for the creation of a like institution, can seek relief by court?" He said that the court cannot create a legal framework for queer couples as that is the job of the legislature. "The state cannot be obligated to recognise the bouquet of rights flowing from such a union," Justice Bhat added.
