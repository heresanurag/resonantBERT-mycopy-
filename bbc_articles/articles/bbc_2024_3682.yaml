title: Beaming Olly Alexander unveils UK Eurovision song on Radio 2 - BBC News
date: '2024-03-01'
section: General
url: http://www.bbc.co.uk/news/entertainment-arts-68448012
content: |-
  The Years and Years singer speaks of his excitement as he unveils the UK's 2024 entry.

  Years and Years singer Olly Alexander will be representing the UK in May at the 2024 Eurovision song content, which takes place in Malmo, Sweden.

  Speaking to Zoe Ball on BBC Radio 2, Olly unveiled his entry, Dizzy, and discussed his inspiration for the track.

  This marks a change of tack for the UK as they opt for a well known artist. With his band Years & Years, Alexander has already had three successful albums.

