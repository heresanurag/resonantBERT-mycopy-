content: |-
  A witness describes seeing a car hitting a pedestrian and then a house in Beaumaris, on Anglesey.

  Three dead in crash as witness says pedestrian hit

  The crash happened on Alma Street, on the seafront near Beaumaris Pier on Anglesey

  A witness has described seeing a car hitting a pedestrian and then a house as three people died in a crash in north Wales. The crash happened on Alma Street, on the seafront near Beaumaris Pier on Anglesey, police said. A resident told the PA news agency the incident was “just awful”, and that she had watched “people trying very, very hard to do CPR”. “[The vehicle] was so mangled. It’s so mangled it’s not true,” she said.

  The Welsh Ambulance Service said it was called to the scene shortly before 14:45 BST on Wednesday

  The witness said she was in a hotel overlooking the scene and was alerted to the incident by a “loud bang”, adding that the collision involved “a car hitting a pedestrian and then hitting a house”. "It was just awful, the ambulance took ages to get here and when the police and the vehicles eventually came... there was nothing they could do once they got here,” she said. "Everybody really rallied around, diverting the traffic and trying their best to give the people dignity, but it was pretty horrific." North Wales Police said officers wanted to speak to witnesses, and anyone with dashcam footage. They also urged people to avoid the area. “I am thinking of everyone who has been affected today. It is news that has shaken our community here on the island,” she said. Rhun ap Iorwerth, Plaid Cymru leader and Member of the Senedd for Ynys Môn, urged people to follow the police’s advice to avoid the area. "This is devastating news and my condolences are with those affected and their loved ones," he said. Andrew John, the Archbishop of Wales, and David Morris, the Bishop of Bardsey, issued a joint statement offering their “sympathy and prayers” to all those involved in the crash. “This is devastating news for the community and for the friends and family of the three people who have sadly died,” they said. Police said officers, along with fire, ambulance and air ambulance crews attended. The Welsh Ambulance Service said it was called to the scene shortly before 14:45 BST on Wednesday. Beaumaris is located on the east of the island of Anglesey and is a popular holiday destination, with many tourists visiting the Unesco-listed Beaumaris Castle or nearby Puffin Island.
