  The Queen was welcomed on board at Portsmouth Naval Base and given a briefing on the 28-week deployment, which will cover 26,000 nautical miles.

  The Queen was shown around by the ship's commanding officer Captain Angus Essenhigh and commander of the Carrier Strike Group Commodore Stephen Moorhouse
