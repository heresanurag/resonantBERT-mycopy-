content: |-
  England's chief medical officer Chris Whitty says easing measures now would be "the wrong thing to do".

  Do you need to wear a mask if you're vaccinated?

  One of the big unknowns about the vaccines that are being developed is whether they prevent people from passing on the virus. The trials that have taken place have only established that they stop people getting ill. But it is quite possible that someone who is vaccinated could still infect others. The assumption is vaccination will at least disrupt this to some extent - but it may not end transmission completely. For that reason, those who are vaccinated will still be expected to wear masks and self-isolate if they are a close contact of someone who is infected. That does not mean these precautions can never be lifted. Once all the vulnerable people are immunised, there will be a strong case that these steps are not needed – or at least not needed on the scale they are currently being used. However, it will take many months to get to that point. Masks, self-isolation and social distancing are here for a while.
