id: bbc_2022_5012
title: 'PMQs: Cooper calls for Johnson Covid care home apology - BBC News'
date: '2022-04-27'
section: General
url: http://www.bbc.co.uk/news/uk-politics-61243448
content: |-
  Daisy Cooper responds after a court rules policies on discharging untested patients from hospitals to care homes in England at the start of the Covid pandemic were unlawful.

  Liberal Democrat Daisy Cooper said the government had once again been found to have broken the law, this time following a High Court ruling that discharging patients from hospitals to care homes in England during the pandemic was unlawful.

  The MP said Boris Johnson should apologise to bereaved families, and to care workers for his previous comments claiming "too many care homes didn't follow procedures".

  Boris Johnson said he wanted to renew his apologies, adding that the start of the pandemic was "an incredibly difficult time" and that it was not known that Covid could be transmitted asymptotically.
