  Marie-Louise Connolly, Jayne McCormack and Richard Morgan answer your questions tonight at 19:00 GMT.

  Tonight in a special Coronavirus Catch-up, our correspondents and reporters will be answering your questions on the pandemic.

  Should we be concerned about the new variant? Where will we need to use vaccine passports?

  Our Health Correspondent Marie-Louise Connolly, Political Correspondent Jayne McCormack and Business Reporter Richard Morgan will join Jordan Kenny on Thursday night.

  So what do you want to know? Get in touch with us using the form below.

  Watch Coronavirus Catch-up live on tonight at 19:00 GMT here on the BBC News NI website, the BBC iPlayer or the BBC News NI Facebook page.

  If you are reading this page on the BBC News app, you will need to visit the mobile version of the BBC website to submit your question on this topic.
