  Temperatures go above 23C in parts of the south of England, which is hotter than Ibiza, Rhodes and Cyprus.

  UK sees its hottest day of the year so far

  Surrounded by daisies, a woman soaks up the rays in a central London park

  The UK saw its warmest day of the year so far on Friday as temperatures went above 23C (73F) in the south of England. Otterbourne in Hampshire recorded the highest temperature of 23.7C and was hotter than Ibiza, Rhodes and Cyprus. Usk in south Wales reached 22.4C, but Scotland and Northern Ireland were cooler with temperatures of 18.3C in West Freugh and 17.2C in Armagh. Temperatures are expected to fall this weekend as cooler air moves down from the north. England's south coast will be warmest on Saturday with an expected high of 21C, while Sunday will peak nearer 17C.

  Before Friday, the highest temperature recorded so far this year was 21.3C in Northolt, west London, and Chertsey, Surrey, on 20 March. Last month was the sunniest March in England since records began in 1910, according to the Met Office. It was also very dry, with the UK's rainfall total just 43% of the usual amount. Whereas, the highest April temperature ever recorded in the UK was 29.4C on 16 April 1949.

  The sun shines as statement fashion pieces were on display during Ladies Day at Aintree Racecourse

  Friday was warm across most of the country, with temperatures reaching 23.4C in Wiggonholt, West Sussex - but some chillier weather was seen in parts of Scotland and northern England. Wild temperature swings are not unusual at this time of year. Parts of southern England already hit highs of 20.7C on Thursday and 20.1C in the Scottish Highlands. Scotland had its warmest day of the year on Thursday but temperatures both there and in Northern Ireland were a little lower on Friday.

  A nuthatch was enjoying the morning sun in Perth, Scotland

  A woman enjoys a morning on the beach in Dover, Kent

  The suns rays were captured on Northern Ireland's coast in Dunseverick

  Temperatures are forecast to fall at the weekend as cooler air moves down from the north. The south coast of England will be warmest on Saturday, reaching 21C, while the highest temperature in the UK on Sunday will be nearer 17C – still well above the seasonal norm. Northern Ireland will be cooler this weekend but is set to turn warmer again next week with temperatures of up to 18C expected. Heading into next week, the risk of overnight frost will return for the beginning of the week but it is expected to warm up again, with temperatures forecast to be back up to 21C in Scotland. Throughout this time it is still looking dry, and those conditions are ideal for wildfires starting and spreading. Scottish Fire and Rescue Service (SFRS) said on Wednesday that there was a "very high to extreme risk" of fires spreading while Cumbria Fire and Rescue service urged the public to act responsibly to cut the risk of wildfires. The fire service has tackled blazes this week near Bonhill in West Dunbartonshire and in the Kilpatrick Hills near Milngavie, East Dunbartonshire. Elsewhere, more than 126 acres (51 hectares) were left charred after a fire at Upton Heath in Poole shortly before midnight on Wednesday, and a second fire broke out at nearby Canford Heath on Thursday morning. Dorset & Wiltshire Fire and Rescue Service said the fires were both "down to human intervention". In England there were 185.8 hours of sunshine in March, according to the Met Office, the country recorded its sixth driest March and Wales its fourth driest since records began in 1836.
