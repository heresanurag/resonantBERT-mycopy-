title: 'Gaza war: Injured Palestinian boy takes first steps in Jordan - BBC News'
date: '2025-03-05'
section: Middle East
url: http://www.bbc.co.uk/news/articles/cwyjj3knjkmo
content: |-
  Nine-year-old Rami was badly hurt in a strike which killed his brother - now he's learning to walk again.

  Injured Gazan boy takes first steps after surgery in Jordan

  This video can not be played To play this video you need to enable JavaScript in your browser. Rami dreams of one day playing football like Cristiano Ronaldo

  Rami Qattoush's mother beams with pride, as her nine-year-old son tentatively kicks a football for the first time since his injury. It is a huge milestone in his recovery, since he travelled to Jordan last month after getting Israeli military approval to leave Gaza. Rami dreams of playing football one day, like Cristiano Ronaldo. But he is still in pain and quickly tires, having to sit down on a plastic chair, exhausted from the effort. His bandaged legs - one of them splinted - are badly scarred and withered. Doctors in Gaza had urged the family to agree to have both of his legs amputated. But his eight-year-old brother, Abdul Salam, had already lost his lower right leg due to his injuries and their mother, Islam, begged the surgeons to save Rami's limbs.

  Rami is receiving treatment at a hospital in Jordan

  The boys had been fast asleep in the family's third-floor flat in Maghazi in central Gaza when, their mother says, an Israeli air strike targeted the building next door, raining rubble and shrapnel on the children. Rami's 12-year-old brother, Mustafa, was killed, his body blown to pieces. His heart, pierced with shrapnel, was only found two days later, Islam says. The family gave it a separate burial. The UN says at least 14,500 children are reported to have been killed and many more badly wounded in the war between Israel and Hamas in Gaza, which began after Hamas gunmen attacked Israel on 7 October 2023, killing around 1,200 people. Medical evacuations from Gaza are critical, it says, external, because the healthcare system there has been devastated. Only 20 of the territory's 35 hospitals are partially functional and there are shortages of essential medicines and equipment.

  An estimated 30,000 Gazans – like Rami and Abdul Salam – have been left with life-changing injuries which will require years of rehabilitation, according to the World Health Organization, external. It has helped facilitate the evacuation of hundreds of patients since 1 February when the Rafah crossing with Egypt reopened for them. But it says that between 12,000 and 14,000 people – among them 4,500 children – still need to be brought out for treatment. "The war has exacted a horrific toll on Gaza's children," the UN Children's Fund (Unicef) said when a ceasefire deal was announced in January.

  Rami's mother travelled with him to Jordan, but his brother and father remained in Gaza

  Rami endured several surgical procedures without painkillers, anaesthesia or antibiotics, his mother told the BBC. His wounds became so infected that they were crawling with maggots. Doctors did not think his legs could be saved. "Rami was in such pain, he was screaming 'God, you've taken my brother, now take me too!'" Islam says. And then, in January, a rare chance came up - for Rami and his mother to be evacuated to Jordan for treatment at a specialised hospital for reconstructive surgery, run by Médecins Sans Frontières (MSF) in Jordan's capital, Amman. It is currently treating 13 children from Gaza, but has the capacity to take in dozens more. "It's the only hospital I know of providing physical and mental rehabilitation for victims of war," says Marc Schakal, MSF programme manager for Jordan, Syria and Yemen. "It's multi-disciplinary care, not just surgery." Rami has a psychologist, surgeon and physiotherapist. He is also being fed, clothed, and taught at MSF's small "School of the Future", a bright prefabricated building in the grounds of the hospital. After missing so much education, he is a keen learner.

  Rami is attending the on-site school, alongside a classmate from Iraq

  But he has also been missing his father Mohammed and his brother, Abdul Salam - who needs a prosthetic leg but wasn't able to leave Gaza with him. They're grateful for their treatment, but both he and his mother want to return home as soon as they can. "Gaza is beautiful," Rami told me. "In Gaza before the war, we used to have medical treatment, but then the aid stopped." With the facilities and expertise at the MSF hospital, he's now making quick progress.

  Rami's younger brother, who remains in Gaza with their father, has lost his lower right leg

  "He arrived in a wheelchair," says his physiotherapist, Zaid Alqaisi, who has formed a strong bond with Rami while helping him to walk again. "He's very motivated. He wants to get back to his friends and his family. He wants to make his dad proud." He also wants to swim again in the sea in Gaza. But many more operations lie ahead, and Rami and his mother have no idea when they will return home. Not knowing if they will be allowed back into Gaza is another huge stress for all of the Palestinian patients on top of their trauma, according to psychologist Zainoun al-Sunna.

  Sharing a hospital room with Rami is a withdrawn and traumatized five-year-old boy, Abdul Rahman al-Madhoun, who also needs surgery on his legs. He was in his mother's arms when she was killed in an air strike in October 2023, along with his siblings. In hospital in Gaza, a nurse trying to cheer him up told him his mother had turned into a star. "Since then, he looks up into the sky at night, looking for stars and talking to them," his aunt Sabah says. "He doesn't talk to other people. But I hear him saying to the stars: 'Mummy I've eaten, Mummy I'm going to sleep now.'" The psychological injuries of the hospital patients are often tougher than the physical. "Some will never recover," says hospital director Roshan Kumarasamy, who says that reconstructive surgery will be needed on patients from Gaza for years to come because of an "unimaginably massive spectrum of injuries".

  The family were able to speak on a video call

  But Rami is strong and determined. When he breaks down in tears thinking of Mustafa, he reassures me it's "OK". And when he and his mother manage to get through to his family in Gaza on a video call, Rami is eager to show them how he can now stand on his own two feet. His father cheers him on, saying: "Rami, you're a hero." And now his family have another reason to celebrate – Rami's brother, Abdul Salam, and his father have just been given permission by Israel to leave Gaza for Jordan as well. In the weeks to come, he should be fitted with a new leg, allowing both injured boys to relearn how to walk.
