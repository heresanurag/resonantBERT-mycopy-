id: bbc_2018_11426
title: Trump calls senior official's anonymous editorial 'gutless' - BBC News
date: '2018-09-06'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-45429193
content: |-
  The president says a damning editorial about him by unnamed administration official is "a disgrace".

  In an anonymous editorial published by the New York Times, a senior official in President Donald Trump's administration says he or she is part of a resistance within the White House.
