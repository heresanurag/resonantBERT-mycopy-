  Speaking to broadcasters from the G20 summit in Rio de Janeiro, the prime minister insisted the "vast majority" of farms would be "unaffected" by the Budget changes. Sir Keir Starmer - who highlighted his childhood growing up in the countryside - said he "gets" farmers' concerns and said the government was using the Budget to invest in other areas which affect rural communities, such as hospitals, schools and housing. He said: "I think it's very important for me to keep making the case that it's only farms and assets over £3m in a typical case of parents wanting to pass on to their children, and therefore, for that reason, I'm confident that the vast majority of farms will not be affected." He said £5bn had been pledged over two years "in farming and food sustainability. That's hugely important for farmers, an additional amount for flooding that impacts them and on disease outbreak". When asked if the government would reconsider the policy, the prime minister's official spokesperson replied: "No - we have set out the reasons we have taken this difficult decision and why we believe it's a fair and proportional approach."

  Shortly before the rally ended, Conservative Party leader Kemi Badenoch took to the stage to loud cheers as she pledged to reverse what she called “the family farms tax”, which she said would "destroy farming as we know it”. The Liberal Democrats said it was "utter rubbish" to say only 500 of the UK's wealthiest farmers' estates would be affected each year. The party's environment spokesman, Tim Farron, told the BBC: "The only way that people can pay the inheritance is get rid of the farm - so corporates buy it. "It's cruel, it's unfair, it's also incredibly stupid".

