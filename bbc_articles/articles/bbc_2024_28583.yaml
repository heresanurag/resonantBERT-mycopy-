  Inheritance tax rules mean the amount people are liable to pay may vary.
  • None Under the new rules farms would be affected by the 20% inheritance tax on any value above £1m (not on the whole value)
  • None There is no inheritance tax to be paid on the value of property up to £325,000, bringing the untaxed total to £1.325m
  • None If a farmer is married, their spouse would be able to pass on another £1.325m tax free, taking the total untaxed amount to £2.65m
  • None In addition, there is an £175,000 tax-free allowance on a main residence when it's being passed on to children or grandchildren. This brings the total untaxed amount for a farming couple to up to £3m

