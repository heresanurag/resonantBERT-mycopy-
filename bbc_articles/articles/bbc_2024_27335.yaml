title: MSPs says doubts remain over A9 dualling project - BBC News
date: '2024-11-01'
section: Scotland
url: http://www.bbc.co.uk/news/articles/c0rgqlnnx5po
content: |-
  They also say issues around funding had already delayed the £3bn Inverness to Perth project.

  A group of MSPs say they are concerned not enough money will be available to complete a £3bn project to dual the A9 between Inverness and Perth by 2035. In a new report, a Holyrood committee said wrangles over funding had already "significantly" contributed to the original 2025 target being missed. Convener and Scottish Conservative MSP Jackson Carlaw said there was "no conspiracy to frustrate" the road but there had been a lack of scrutiny and focus. Transport Scotland said it welcomed the report by the Citizen Participation and Public Petitions Committee and would respond to its recommendations in due course.

  Two sections of single carriageway totalling 11 miles (18km) of road have been upgraded over the past decade. About 77 miles (124km) have still to be done. Delays and rising costs have hit the project. Earlier this month it emerged the total cost of upgrading a six mile (10km) section was expected to run to £308m - £111m more than originally estimated, and would ready later than previously hoped. Single carriageway sections are being dualled to improve journey times and safety. In 2022, the number of fatalities on the Inverness to Perth stretch was 13 - the highest number in 20 years. Mr Carlaw said the thoughts of the committee were with those who had lost their lives on the A9. He said it was clear to the committee there was a lack of clarity over the availability of funding for the project and this had resulted in delays. Mr Carlaw also accused the Scottish government and its agency Transport Scotland of failing to be open about the challenges to completing the work. He told BBC Scotland News: "There was no smoking gun - the delay isn't down to some insidious conspiracy to frustrate the road, but there was a complete lack of transparency and clarity about the funding of this road." Mr Carlaw said new delays to the Moy-Tomatin section could be repeated and affect the completion of the overall project. The committee wants procedures to be put in place to ensure problems faced by major projects are brought to light quickly, and a new committee to manage the dualling of the A9. It has also recommended that plans be made for a memorial to people killed on the road. Mr Carlaw said fatalities were the "underlining tragedy" of the delays and politicians should collectively feel ashamed for not delivering the upgrade. A Transport Scotland spokesperson said: "Transport Scotland welcomes the final report received from the committee and will take the appropriate time to consider and respond to the recommendations set out in the report."

  MSPs gathered evidence over two years after a petition was raised by campaigner Laura Hansler, of A9 Dual Action Group. She called for the project to be completed as promised and the creation of a national memorial to people who had lost their lives. Ms Hansler said there had been a "dragging of feet" over funding for improvements. She said: "I am infuriated by some of the things in the findings. "I think it proves time and again that not only have we been disrespected but there is complete disinterest in the people of the Highlands and Islands." She added: "I am very concerned too that it (2035 target) won't be met. "To this day we still only have 11 miles delivered." Former first ministers Alex Salmond and Nicola Sturgeon were among those to give evidence to the inquiry. Appearing before the committee in May, Ms Sturgeon said she was sorry the original target could not be met. She said she was not apologising because the SNP or Scottish government had "messed up", but because the £3bn project had faced significant challenges beyond their control, including from Brexit and the Covid pandemic. Mr Salmond had earlier told the committee it was a matter of "integrity and honour" for the Scottish government to complete dualling. He said the SNP cabinet he led in 2011 believed upgrading the road between Inverness and Perth could be finished by 2025.

  A target of 2035 has been set for completing the remaining sections

  The Scottish Conservatives described the committee's report as "damning". MSP Sue Webber said: "The A9 is the backbone of Scotland, and every day that these essential upgrades are delayed, more lives are put at risk and costs continue to skyrocket. "Rural communities and businesses across Scotland need action from this SNP government and they must finally fully dual the A9 between Perth and Inverness."
