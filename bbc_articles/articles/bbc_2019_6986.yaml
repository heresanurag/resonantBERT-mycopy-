id: bbc_2019_6986
title: US migrant children 'hungry, dirty, sick and scared' - BBC News
date: '2019-06-26'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-48766973
content: |-
  A lawyer says migrant children are being held in Texas in "the most degrading and appalling conditions".

  A lawyer who visited children at a migrant detention centre near El Paso, Texas, says she witnessed "the most degrading and appalling conditions that you could imagine".

  Elora Mukherjee is director of the Immigrants' Rights Clinic at Columbia Law School.
