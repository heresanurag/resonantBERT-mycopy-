title: 'Nottingham: Police watchdog investigates arrest footage - BBC News'
date: '2024-07-16'
section: Nottingham
url: http://www.bbc.co.uk/news/articles/c7240173q2vo
content: |-
  The clip shows officers using batons on a man during an arrest following a crash in Nottingham.

  This video can not be played To play this video you need to enable JavaScript in your browser.

  The police watchdog has started an investigation after a video was shared of officers striking a man with their batons during an arrest. Footage of the incident, which followed a crash in Nottingham on 27 May, has been widely viewed online. The Independent Office for Police Conduct (IOPC) said the man, who was in his 40s, was de-arrested and made a complaint about the way he had been treated by officers. It added its investigation was launched following a mandatory referral made by Nottinghamshire Police on 25 June.

  In the video, officers can be seen striking the man on his legs and upper body. The police force is undertaking their own investigation into the incident, which happened in Daleside Road, Sneinton. IOPC regional director Derrick Campbell said: "We are aware people used mobile phones to film police making an arrest and we would ask anyone with footage, who we have not spoken to already, to come forward. "In particular we want to hear from two men, one of whom was on a quad bike, who may have recorded what happened and be able to assist our investigation. “We understand the public concern that can be caused by incidents like this and our independent investigation will consider the legitimacy of the arrest as well as the justification and proportionality of the force used by officers.” Follow BBC Nottingham on Facebook, external, on X, external, or on Instagram, external. Send your story ideas to eastmidsnews@bbc.co.uk, external or via WhatsApp, external on 0808 100 2210.
