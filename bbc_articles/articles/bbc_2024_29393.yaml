title: World's largest crocodile in captivity dies - BBC News
date: '2024-11-03'
section: Australia
url: http://www.bbc.co.uk/news/articles/clyvzyyd6l7o
content: |-
  The huge saltwater crocodile Cassius was nearly 5.5m (18ft) long and lived in Australia.

  Cassius had become a popular tourist attraction at his home in Green Island, Australia, in the Great Barrier Reef

  The world's largest crocodile in captivity has died at a wildlife sanctuary in Australia. Cassius was nearly 5.5m (18ft) long, weighed nearly one tonne and was thought to be at least 110 years old - although no one knew for sure. The huge saltwater crocodile lived in the sanctuary on an island off the coast of Queensland since being caught in Australia's Northern Territory in the 1980s. In 2011, he was awarded the Guinness World Record for the largest crocodile in captivity.

  Marineland Melanesia Crocodile Habitat said in a post on social media that Cassius was "our beloved mate" and "a cherished member of our family". Cassius had previously lived in the wild, where he was known for catching and eating cattle, and attacking boat propellers before being captured. The habitat's founder, George Craig, bought Cassius in 1987, the Australian Broadcasting Corporation reported. Cassius "brought joy and companionship to his best mate George for over 37 years", the habitat said.

  'Best mate' George Craig standing alongside Cassius the crocodile in March this year

  The habitat added that Mr Craig relocated to Cairns last month and Cassius's health declined soon after. "He was very old and believed to be living beyond the years of a wild croc," the post said. The habitat also thanked "everyone who visited Cassius throughout his life and offered kindness", adding that the site may be operating "in a limited capacity over the next few days".
