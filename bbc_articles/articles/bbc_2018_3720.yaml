title: Parsons Green witness describes 'human crush' - BBC News
date: '2018-03-16'
section: General
url: http://www.bbc.co.uk/news/uk-41281762
content: |-
  Emma was at Parsons Green when an explosion on a train triggered a crush of people fleeing.

  A blast on a Tube train in south-west London is being treated as terrorism.

  Emma was at Parsons Green station when the explosion triggered a crush of people fleeing.
