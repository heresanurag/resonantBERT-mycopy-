  Bringing you the latest news from across England about the coronavirus pandemic.

  One person has been fined by police for breaching quarantine rules after arriving from abroad, new figures from forces in England and Wales show.

  The data released by the National Police Chiefs' Council (NPCC) on Monday comes after holidaymakers in Spain and its islands were told they would have to self-isolate for 14 days when returning to the UK.

  The ticket for breaching quarantine rules, which was issued by Lincolnshire Police, was one of only eight fixed penalty notices handed out in England in the two weeks to July 20, with none in Wales.

  NPCC chairman Martin Hewitt said compliance with the rules had been good, but added "it's really difficult to understand how people will respond" after Spain was removed from the UK's list of safe destinations over a spike in the number of coronavirus cases.

  "You would hope that people would come back and be responsible," he said.

  A total of 18,669 fixed-penalty notices, including 16,029 in England and 2,640 in Wales, have been recorded by forces up to July 20. The figures do not include fines issued during the local Leicester lockdown.
