title: Murder inquiry after man's body found in Belfast - BBC News
date: '2024-07-23'
section: Northern Ireland
url: http://www.bbc.co.uk/news/articles/cql8wz874g4o
content: |-
  Detectives are investigating the death of Kevin Davidson as suspected murder.

  Kevin Davidson, who was 34, was reported missing earlier this month

  A murder investigation has begun after a man's body was found in south Belfast at the weekend. Kevin Davidson, who was 34, was reported missing earlier this month. Officers from the Police Service of Northern Ireland discovered his body at a property in Donegall Avenue on Saturday night. Two people, a 32-year-old man and a 35-year-old woman, were arrested in connection with the investigation. A detective said the man and the woman remain in custody.

  South Belfast MLA Edwin Poots said the incident is a "pretty shocking state of affairs". "Nobody wants these things happening in their community," he told BBC News NI. Mr Poots also offered his sympathy's to Mr Davidson's family. He added: "Whoever’s done this needs to be brought to justice, it’s wholly wrong that someone has their life taken from them."
