title: 'New Lodge bonfire: Three police officers injured in trouble - BBC News'
date: '2019-08-09'
section: Northern Ireland
url: http://www.bbc.co.uk/news/uk-northern-ireland-49277109
content: |-
  Police have since left the site because of "risks to innocent bystanders" posed by their presence.

  This video can not be played To play this video you need to enable JavaScript in your browser. Three officers are injured in New Lodge trouble

  Three police officers have been injured after trouble flared at the site of an anti-internment bonfire in north Belfast.

  More than 150 officers were deployed after unrest earlier on Thursday.

  Young people tried to push through police lines around the bonfire and fireworks, bottles and wood were also thrown.

  Police later left the bonfire because of the "risks to innocent bystanders" posed by their presence.

  Residents in nearby tower blocks were told to leave their homes as the Housing Executive "cannot guarantee their safety" due to the proximity of the bonfire.

  The bonfire was lit late on Thursday night.

