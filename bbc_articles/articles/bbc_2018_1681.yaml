title: 'Winter Olympics: Curling gets an unlikely fan in Mr T - BBC News'
date: '2018-02-14'
section: Newsbeat
url: http://www.bbc.co.uk/news/newsbeat-43057789
content: |-
  Brits get excited for the curling every four years but now Mr T has discovered his love for the sport.

  Every four years the UK goes crazy for curling at the Winter Olympics - but this year it has a new fan.

  Mr T has been entertaining his followers on Twitter with his observations on the sport.

