title: Foo Fighters' Dave Grohl breaks leg in stage fall - BBC News
date: '2024-10-16'
section: General
url: http://www.bbc.co.uk/news/entertainment-arts-33121165
content: |-
  Dave Grohl, the lead singer of the rock band, the Foo Fighters, gave a new meaning to the phrase "break a leg" after falling off the stage during a concert in Sweden.

  The lead singer of the rock band, the Foo Fighters, gave a new meaning to the phrase "break a leg" after falling off the stage during a concert in Sweden.

  Dave Grohl fell and broke his leg during the second song of the set in Gothenburg, but to the surprise of fans he later returned to play the rest of the show with his leg in bandages.
