content: |-
  The use pictures or music to evoke a response in people living with dementia can help start a conversation with loved ones and carers.

  Can classic TV comedies can help revive long-held memories for people living with dementia?

  It's an idea that's being tested out with the launch of specifically curated channels on BBC iPlayer aimed at stimulating memories and reminiscence for people living with the condition.

  The use of pictures or music to evoke a response in people living with dementia can help start a conversation with loved ones and carers.

  The BBC visited Philip and Tanya Shuttleworth in Bristol to put the idea to the test.
