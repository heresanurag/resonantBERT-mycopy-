title: 'Newspaper headlines: Kate''s medical records ''breached'' and Labour''s fiscal
  rules - BBC News'
date: '2024-03-20'
section: The Papers
url: http://www.bbc.co.uk/news/blogs-the-papers-68612825
content: |-
  An alleged breach of the Princess of Wales's privacy and pledges by the shadow chancellor feature on the front pages.

  "Kate's medical records security 'breach'," is the headline on the front of the Daily Mirror. The paper says allegations that "at least one" unauthorised member of staff tried to access the Princess of Wales's notes have "sent shockwaves" through the London Clinic, in Marylebone, where she underwent abdominal surgery two months ago.

  One insider tells the paper it is a "major security breach and incredibly damaging for the hospital, given its unblemished reputation for treating members of the Royal Family". The private hospital wouldn't comment on the claims, but tells the paper it "firmly" believes patients deserve privacy and confidentiality.

  The Daily Mail reports that the London Clinic has begun an investigation into the claims. The Times says the hospital has long been favoured by the royal family for its discretion. It reminds readers that the precise nature of the Princess's condition "has never been revealed".

  The Sun returns to its story showing the latest pictures of the Princess of Wales in public at the weekend. The man who filmed her shopping in Windsor tells the paper: "I saw Kate with my own eyes."

  The Daily Express says Prince William is focusing on "driving forwards" amid what it calls the "idiotic" conspiracy theories swirling around Kate. The "world goes mad after woman goes shopping," is how the Daily Star sums up the furore.

  The main story for the Guardian is a global wellbeing survey, which suggests young people are less happy than older generations - and are suffering the equivalent of a midlife crisis because of social media. The US surgeon general, Vivek Murthy, tells the paper the findings are a "red flag that young people are really struggling in the US and now increasingly around the world".

  The Financial Times and the i newspaper both lead on what they call the "vision" for the economy, set out by the shadow chancellor, Rachel Reeves, in a speech to business leaders yesterday.

  The FT says her pledge to borrow only for investment echoes the fiscal rules set out by Gordon Brown when he was chancellor during the last Labour government. But the paper says a top union boss - the leader of Unite, Sharon Graham - has denounced Ms Reeves' economic plan as too timid and "for the birds".

  The front page of the Daily Telegraph carries a claim by the business secretary, Kemi Badenoch that Britain's diversity drive has been "counter-productive".

  Mrs Badenoch, who is also the equalities minister, says the findings of a report she commissioned show that while millions are being spent on equality, diversity and inclusion initiatives, many have little to no impact on increasing diversity or reducing prejudice.

