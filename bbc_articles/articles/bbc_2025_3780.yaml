  Joanne Penney, 40, was described by her family as "deeply loved by all who knew her".

  Murder charges after mum shot dead at block of flats

  Joanne Penney died after being shot at a block of flats in Talbot Green on Sunday

  Five people have been charged in connection with the death of a 40-year-old woman who was shot dead at a block of flats. Joanne Penney died after being shot at Green Park in Talbot Green, Rhondda Cynon Taf, on Sunday. Police said they were considering several lines of inquiry, including that Ms Penney could have been a victim of mistaken identity. South Wales Police said four people had been charged with murder, while a fifth person was charged with assisting an offender.

  The force also said a 32-year-old man was arrested on Friday in Suffolk, taking the total number of arrests to seven. Ms Penney's family described her as a daughter, mother, sister and niece who was "deeply loved by all who knew her".

  The shooting happened at the Llys Illtud block of flats in Talbot Green

  The five charged, three men and two women, are:
  • None Tony Porter, 68, from Braunstone Town, Leicestershire, charged with murder and participating in the criminal activities of an organised crime group All five appeared before Cardiff magistrates on Saturday, where Ms Ginova's application for bail was refused. The defendants were remanded in custody to appear before Cardiff Crown Court on Tuesday. Det Chief Supt Ceri Hughes said police were still trying to "piece together the circumstances" behind Ms Penney's death. "I would still urge anyone who has information, either about her death or what happened at the property in Llys Illtyd on Sunday evening, to come forward - the smallest piece of information could be of vital importance."
