title: 'Masks compulsory in England''s shops: Latest updates - BBC News'
date: '2020-07-14'
section: England
url: http://www.bbc.co.uk/news/live/uk-england-53389647
content: |-
  Bringing you the latest news from across England about the coronavirus pandemic.

  Deaths of cleaners who worked at the Ministry of Justice during the Covid-19 pandemic must be examined as part of an independent investigation, Labour has said.

  Speaking in the House of Commons, shadow justice secretary David Lammy said leaked emails, interviews and messages show cleaners were "forced" into the department during the lockdown period and "denied" personal protective equipment (PPE).

  Seven outsourced staff have had "consistent symptoms" for coronavirus and two are now dead, Mr Lammy told MPs.

  Justice minister Lucy Frazer said the matters have been "looked at" but she would be happy to consider any further points.

  The Ministry of Justice later said it was complying with official guidance and there was "no evidence" to suggest there had ever been a coronavirus outbreak at its premises.
