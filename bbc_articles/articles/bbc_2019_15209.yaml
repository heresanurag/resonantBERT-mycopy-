id: bbc_2019_15209
title: Deaths of woman and man in Stonehaven not suspicious - BBC News
date: '2019-12-06'
section: NE Scotland, Orkney & Shetland
url: http://www.bbc.co.uk/news/uk-scotland-north-east-orkney-shetland-50683965
content: |-
  The 24 and 28-year-olds were found at what is believed to be a holiday home in Aberdeenshire.

  Police were called to the scene

  The deaths of a woman and man in Aberdeenshire are not being treated as suspicious, police have said.

  Officers were called to the building - believed to be a holiday home - in the Rickarton area of Stonehaven at about 13:30 on Thursday.

  Police said a woman aged 24 and man aged 28 were found. Next of kin have been informed.

  Det Insp Sam Buchan said: "Our thoughts are with the family and friends of the man and woman who have sadly died."

  Det Insp Buchan added: "Officers remain at the property and I would like to thank members of the community for their patience whilst our inquiries continue."

  A report will be sent to the procurator fiscal.
