title: Should all children learn sign language? - BBC News
date: '2020-03-07'
section: General
url: http://www.bbc.co.uk/news/education-51774535
content: |-
  A teenager and her brother are leading a campaign to make sign language part of the school curriculum.

  Doctors said Christian would never be able to communicate because of brain damage sustained at birth.

  But his sister Jade Kilduff learned sign language just so she could teach him.

  Now they have a large following on social media, where they sign along to popular songs on their channel Sign Along With Us.

  Jade also started a petition to make sign language lessons a part of the primary school curriculum - she has had over 100,000 signatures.

  James Wolfe Schools in east London already teach sign language, but Jade would like it rolled out nationally.
