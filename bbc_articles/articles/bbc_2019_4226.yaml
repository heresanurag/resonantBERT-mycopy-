title: 'Attorney General Geoffrey Cox: ''We must leave the EU'' - BBC News'
date: '2019-04-04'
section: UK Politics
url: http://www.bbc.co.uk/news/uk-politics-47806920
content: |-
  Geoffrey Cox says it is "an article of faith" that the government should "honour" the EU referendum.

  This video can not be played To play this video you need to enable JavaScript in your browser. Attorney General Geoffrey Cox: "Once we are out, we are out"

  It is an "article of faith" that the UK must leave the EU to honour the referendum result, Geoffrey Cox says.

  The attorney general told the BBC a customs union was "not desirable" but if that was the only way of leaving the EU, he would take it.

  He suggested the government's only option was to "seek with Labour some common ground" for a "swift exit".

  And he suggested that the UK could not be bound into a customs arrangement permanently.

  It comes as the Brexit secretary says rejection of the PM's deal would mean a "soft Brexit or no Brexit at all".

  Meanwhile, the PM has responded to criticism from her own party over talks with Labour leader Jeremy Corbyn by saying all MPs had a responsibility to deliver Brexit.

  In an interview with the BBC's political editor Laura Kuenssberg, Mr Cox, who has provided the government and MPs with legal advice on Brexit, said the UK could not be bound into a customs union permanently.

  "If we decided, in some considerable years time that we wanted to review our membership of any such customs union if we signed it - and I'm not saying we will - that's a matter for negotiation and discussion.

  "There's nothing to stop us removing ourselves from that arrangement, so we can't look at these things as permanent straitjackets upon this country."

  Mr Cox said he was "completely convinced" the UK had to leave the EU.

  "We promised this country that we would do so, we promised it that we would honour the outcome of the referendum," he said.

  "The referendum said leave and leave we must."

