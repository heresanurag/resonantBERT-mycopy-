content: |-
  Thomas Brückner, who was 49, was behind a massive club hit that reached number one in the UK in 2003.

  DJ Tomcraft, known for hit Loneliness, dies at 49

  Brückner based Loneliness on a song he found in a charity shop

  German DJ and producer Thomas Brückner, better known as Tomcraft, who was behind the massive 2003 club hit Loneliness, has died at the age of 49. Tributes have been paid in the dance-music world, with Judge Jules - who championed Loneliness on its release - writing, external he was a "lovely guy, who made one of the greatest records ever". A message from Brückner's family posted on social media, external, on Tuesday, said: "With a heavy heart, we need to inform you that yesterday, 15 July 2024, our beloved father and husband has passed away. "We will forever carry you in our hearts and love you until we're reunited again."

  Brückner made his name in the late 1990s and early 2000s with club hits such as The Circle, Prosac and Silence. Loneliness gave him commercial success, reaching number eight in the UK in 2002 before going to number one the following year.

