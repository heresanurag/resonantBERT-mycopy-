  "Georgia is a mini Marlie I think," he said. "She has come through a very good PWR season and she is good in continuity and the tackle. "For her to her to be under Marlie and learning is huge. I like the way he creates and regains momentum, she is a lady of not many words and defines herself though actions. She has got an exciting future." Cleall has featured only once since Mitchell took charge last autumn. She was picked as part of his 2024 Six Nations squad, but did not play in the first two matches before a cut to her knee in training ended her campaign. She subsequently lost her central contract with England, although did make an appearance off the bench in the win over France earlier this month. "I kind of thought I had one more year in me as a professional, but that was someone else's choice," 32-year-old Cleall told Contested., external She said she had phoned Mitchell to signal her intention to fight for her international place. "My aim and my plan is still to go with the World Cup with England," she said.

  Cleall was nominated for World Player of the Year in 2021 but has slipped from first choice under Mitchell's leadership

  A 32-strong squad at the Rugby World Cup will create extra opportunities, but Mitchell added that Cleall needs to become more mobile and explosive to match his playing style. "There is still that opportunity, but she is under no illusions of what is required," he said. "Physically the game is getting quicker and she is going to have to meet that demand. "When you are an impact player, we can't afford for that player to be a plodder - that player has to lift the tempo of the game." England travel to Canada as WXV champions, having won the inaugural tournament in New Zealand in November. They play the United States on 29 September before matches against New Zealand and Canada on the following two weekends. England are on a 17-match winning streak, stretching back to their defeat by New Zealand in the World Cup final in 2022. They are top of the world rankings – more than seven points clear of second-placed New Zealand – and hot favourites to win WXV before next year's home World Cup. BBC Sport will show all matches in WXV1 and WXV2 on BBC iPlayer, online and on the BBC Sport mobile app.
