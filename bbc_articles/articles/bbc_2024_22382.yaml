  Lilli Ives Campion and Georgia Brock are included in England's squad for the WXV tournament in Canada, but there is no place for stalwart Poppy Cleall

  Lilli Ives Campion and Georgia Brock made their England debuts this month

  Venue: Vancouver and Langley, Canada (WXV1) and Cape Town, South Africa (WXV2) Dates: 27 September - 12 October Coverage: Live on BBC Sport website and BBC iPlayer

  Flanker Georgia Brock and second row Lilli Ives Campion and have been selected in England's 30-player squad for the WXV campaign. Campion, 20, and Brock, 23, won their solitary Test caps during the wins over France and New Zealand this month. There is no place for former captain Poppy Cleall, who was a key part of England's past two World Cup campaigns. Hooker Connie Powell returns from injury and is preferred to May Campbell. Two uncapped prospects – Loughborough wing Bo Westcombe-Evans and Bristol centre Pheobe Murray – are named among the backs. Marlie Packer captains the squad, with Zoe Aldcroft and Natasha Hunt continuing as vice-captains.

