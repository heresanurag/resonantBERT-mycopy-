title: Rebels declare ceasefire in DR Congo for 'humanitarian reasons' - BBC News
date: '2025-02-03'
section: Africa
url: http://www.bbc.co.uk/news/articles/cjexnzl372wo
content: |-
  The rebels say they will not seize any further territory but will protect their positions.

  The alliance of rebel groups in eastern Democratic Republic of Congo have declared a humanitarian ceasefire starting on Tuesday. In a statement, the group - which includes the Rwanda-backed M23 rebels - cited "humanitarian reasons" for the ceasefire, after it has been capturing territory in eastern parts of the country. The UN said at least 900 people have been killed and 2,880 injured in recent fighting in and around Goma, DR Congo's largest eastern city, after it was seized by rebels. The G7 nations and the EU have condemned the offensive as a flagrant violation of DR Congo's sovereignty.

  The alliance of rebel groups - known as the Congo River Alliance - has accused the Congolese military of killing people using aircrafts to bomb areas it holds. It added it does not intend to seize any further territory, despite saying otherwise last week, and it will hold its positions.
