  • None What's the fighting in DR Congo all about? In a statement, the alliance said: "We reiterate our commitment to protecting and defending the civilian population and our positions." Regional fighting has seen hundreds of thousands of people displaced over the last three years. Since the start of 2025, more than 400,000 people have been forced from their homes, according to the UN's refugee agency. Rwandan President Paul Kagame - who is also commander-in-chief of the Rwanda Defence Force - said he did not know if his country's troops were in the DR Congo. "There are many things I don't know. But if you want to ask me, is there a problem in Congo that concerns Rwanda? And that Rwanda would do anything to protect itself? I'd say 100%," he told CNN , externalon Monday. Meanwhile, human rights groups have been calling for more pressure on Rwanda to back down. The DR Congo's communications minister called for the international community to impose sanctions on Rwanda. "A strong decision (must be taken) not only to condemn, but to stop what Rwanda is doing, because it is not acceptable if you want to preserve peace in Africa and in our region," Patrick Muyaya told Reuters. "Sanctions are the minimum," he added. The Congolese and Rwandan presidents are due to attend a regional peace summit in Tanzania on Friday. With 30 years of conflict behind them, it is expected that any negotiations if they do not break down - as they have several times in the last year - could go on for months.
