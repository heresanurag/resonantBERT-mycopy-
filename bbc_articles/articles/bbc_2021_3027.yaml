  Details and reaction as Health Minister Vaughan Gething gives a briefing on the pandemic.

  A former MP is calling for an investigation into her husband's death amid growing concern over the use of "do not resuscitate" (DNR) orders.

  Former Conwy Labour MP Betty Williams's husband Evan died at Ysbyty Gwynedd in Bangor last April after contracting Covid.

  She said she had not been told about the decision on a DNR order - which she said was made the day he died - despite speaking to staff before his death.

  Ms Williams said neither she nor her husband had given consent for such an order.

  Betsi Cadwaladr University Health Board said it was unable to comment on individual cases but invited Ms Williams to get in touch.

  However, she told BBC Radio Wales' Sunday Supplement programme she had already written to the new chief executive to highlight her concerns.
