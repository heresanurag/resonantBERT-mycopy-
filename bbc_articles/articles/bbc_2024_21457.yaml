  The entire Newsnight interview can still be easily watched online, external. Which begs the question: Do we need a dramatisation, or indeed two, if you can just watch the real thing? "The interview was one hour, in one moment, in one day, in one year," Maitlis said. "And [the drama] is actually an accumulation of consequences and results and fallout that we're only just managing to understand. "Now, I still think that the story itself isn't actually finished, but this is the nearest you'll get to kind of understanding, I guess, the beginning of it, and just what it did to all of us." A Very Royal Scandal is out on Prime Video on 19 September.
