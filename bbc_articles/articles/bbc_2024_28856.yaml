title: 'Scotland v Australia: Fagerson to earn 50th cap as Ritchie returns - BBC Sport'
date: '2024-11-22'
section: Scottish Rugby
url: http://www.bbc.co.uk/sport/rugby-union/articles/cm27ddyl8p2o
content: |-
  Matt Fagerson moves to number eight, having played at six against South Africa

  Coverage: Listen on BBC Radio Scotland and 5 Live Sports Extra, follow live text commentary on the BBC Sport website and app

  Matt Fagerson will earn his 50th cap in Scotland's final Autumn Nations Series match against Australia, with Jamie Ritchie also starting in the back row. Ritchie is the only change in the forward pack from the defeat by South Africa two weeks ago, with the Edinburgh flanker starting at blindside and Fagerson shifting to number eight in place of the injured Jack Dempsey. Having made his comeback from concussion against Portugal last week, Darcy Graham plays on the wing with Blair Kinghorn returning to his more natural full-back berth. That means Glasgow's Tom Jordan drops to the bench, having impressed at 15 on his first three caps. Scotland are aiming to deny Australia a first 'grand slam' tour of the home nations since 1984, with the rejuvenated Wallabies having beaten England and Wales so far and with their final Test against Ireland to come next weekend. Gregor Townsend's side comfortably defeated Fiji and Portugal either side of a 32-15 loss to the world champion Springboks. Tight-head prop Will Hurd, second row Alex Craig, and scrum-half George Horne are among the replacements having been part of the second-string side which swept aside the Portuguese 59-21 a week ago. "[If we win] it will give us a massive boost going into the Six Nations because we're playing a quality side," Townsend said. "It'll be frustrating if we don't deliver a performance that we've been working towards. If we don't at least match that performance of South Africa - that's what we're building towards."

  Emerging superstar Joseph-Aukuso Suaalii will earn just his third Australia cap at Murrayfield, starting at outside centre. The 21-year-old was named player of the match in the Wallabies' victory against England on his first senior game of union, having switched from rugby league. He was on the bench against Wales, but with Samu Kerevi suspended, Len Ikitau moves back to inside centre to make way for Suaalii. Meanwhile, former Leicester Tigers winger Harry Potter will make his debut, while captain Harry Wilson is restored at number eight after missing the win against Wales with concussion. La Rochelle's formidable lock Will Skelton starts again in the second row alongside Jeremy Williams, who replaces Nick Frost. In total, Australia coach Joe Schmidt has made six changes to the side which won by a record score in Cardiff, with Jake Gordon coming back in at scrum-half for Nic White and Carlo Tizzano replacing Fraser McReight at openside flanker. “The week has been complicated, with the freezing conditions ruling out training fields but the group have adapted well to the situation," Schmidt said. “The core of the Scotland team has been together for a number of years. They’re cohesive and combative and we will need to be at our best on Sunday.”
