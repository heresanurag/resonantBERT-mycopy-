  During the election campaign Labour promised a greater emphasis on encouraging healthier lifestyles including tackling obesity, smoking, and alcohol-related harm - alongside shifting the focus of the NHS from treating illness to preventing it. Sir Keir has confirmed the government is looking at tougher rules on smoking in pub gardens and other outside spaces to reduce the number of preventable deaths linked to tobacco use. But on Wednesday, Health Secretary Wes Streeting insisted Labour did not want to be the "fun police". Speaking at the Institute for Public Policy Research (IPPR) think tank, Streeting said he would make changes "with people" and not "to people".
