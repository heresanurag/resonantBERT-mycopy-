title: 'Small beer: Study calls on government to shrink pints - BBC News'
date: '2024-09-18'
section: General
url: http://www.bbc.co.uk/news/articles/c4gl737zr79o
content: |-
  Cambridge University found serving beer in two-thirds of a pint glasses led to a 10% drop in drinking.

  A sobering discovery has led to Cambridge University academics calling on the government to stop serving beer in pints to reduce Britain’s alcohol intake. A study found , externalthat beer consumption dropped by 10% when pubs shelved pint glasses and served customers with glasses two thirds the size instead. That could be enough to make an impact in the fight against several forms of cancer and other health issues linked to excessive drinking, researchers argued. The government has no plans to remove pints as the largest serving size of draught beer, but former Tory cabinet minister Lord Vaizey told the BBC he thought it was "a good idea" that should not be "dismissed out of hand".

  Speaking on BBC Two's Politics Live, the former culture secretary said offering "people what looks like a pint, feels like a pint but isn’t a pint which means you end up drinking perhaps less and get healthier". Researchers found drinkers tend to stick to a specific number of servings when drinking at a pub, regardless of size. And at 568ml the imperial pint - Britain’s preferred measure for ales since the 17th century - is larger than typical servings in the US (473ml), Belgium (250ml), France (330ml), and Germany (500ml). In a similar trial in January, wine sales fell when the largest glass size, typically 250ml, was scrapped. Researchers asked more than 1,700 pubs, bars and restaurants to participate in a trial to say if the same trick worked for beer. Only 13 accepted, despite compensation offers for lost sales. The study found customers did not complain about the smaller beer measures and on average venues found number of units of alcohol that were sold fell by about 8%. Of the 12 pubs in the final study, an average of nearly five fewer pints (2.77 litres) of beer and cider were sold per day when pint glasses were replaced. There was a 7% increase in the amount of wine purchased.

  Labour MP Josh Simons - an ally of prime minister Sir Keir Starmer - said he would not back any plans to remove pints as the top measure of drinks. Speaking to the BBC he said: "I love a pint and leader of the Labour Party Keir Starmer loves a pint. "Pubs are places where people come together - they are public goods in a sense." Simons said he was "not comfortable" with the government dictating glass sizes. Pints were "what it means to be drinking in a British pub," he added.

