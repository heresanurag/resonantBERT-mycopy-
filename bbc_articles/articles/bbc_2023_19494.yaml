title: Seven-storey building partially collapses in New York City - BBC News
date: '2023-12-12'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-67698743
content: |-
  Officials are investigating what caused the collapse of the residential structure in the Bronx on Monday.

  A residential structure partially collapsed in the Bronx borough of New York City on Monday. No casualties were reported and officials are investigating what caused the incident. Residents were safely evacuated to a nearby school.
