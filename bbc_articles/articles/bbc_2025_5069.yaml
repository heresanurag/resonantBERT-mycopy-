title: Baby Reindeer leads TV Bafta nominations - BBC News
date: '2025-03-27'
section: Culture
url: http://www.bbc.co.uk/news/articles/c2kgl9ly9n8o
content: |-
  The Netflix series is up for eight awards, while ITV's Mr Bates vs The Post Office has six nominations.

  Nava Mau, Richard Gadd and Jessica Gunning are all up for acting TV Baftas for Baby Reindeer

  The stars and creatives behind controversial Netflix drama Baby Reindeer are leading the charge at this year's Bafta TV awards with eight nominations. They include a best actor nod for Scottish comedian Richard Gadd, who is also the show's creator, plus best supporting actress nominations for Jessica Gunning, who plays stalker Martha and co-star Nava Mau (Teri). There are six nominations apiece for ITV's Mr Bates vs The Post Office, Disney+'s Rivals and Apple TV+'s Slow Horses. Ant and Dec (Ant & Dec's Saturday Night Takeaway), Claudia Winkleman (The Traitors) and Stacey Solomon (Sort Your Life Out) are among the nominees for best entertainment performance.
  • None Read the list of nominations in full

  Anna Maxwell Martin is up for best actress for ITV's Until I Kill You

  The best leading actress nominees are Anna Maxwell Martin (Until I Kill You), Billie Piper (Scoop), Lola Petticrew (Say Nothing), Marisa Abela (Industry), Monica Dolan (Mr Bates vs The Post Office) and Sharon D Clarke (Mr Loverman). David Tennant (Rivals), Gary Oldman (Slow Horses), Lennie James (Mr Loverman), Martin Freeman (The Responder) and Toby Jones (Mr Bates vs The Post Office) take on Gadd for the best actor accolade.

  Sharon D Clarke and Lennie James are both up for best acting nominations for Mr Loverman

  Which progammes have the most nominations?

  Solomon's show is also up for best factual entertainment, taking on Rob and Rylan's Grand Tour, In Vogue: The 90s and Race Across the World. Soap star Danny Dyer has landed his first Bafta nomination in the best male comedy performance category for his role in Mr Bigstuff. The best female nominations in this category include Ruth Jones for Gavin and Stacey and Nicola Coughlan for Big Mood. In the prestigious best drama category, crime dramas Blue Lights and Sherwood will take on superhero series Supacell and acclaimed period drama Wolf Hall: The Mirror and the Light. But while Damian Lewis landed a nomination for best supporting actor for his portrayal of Henry VIII, there was no best actor nod for its star Mark Rylance, who plays scheming advisor, Thomas Cromwell. Rylance won the coveted best actor award for the first series of Wolf Hall back in 2016. Recognition for Mr Bates vs The Post Office and Wolf Hall comes following concerns about the future of such dramas due to budget pressures.

  The 1% Club, Michael McIntyre's Big Show, TaskMaster and Would I Lie to You? are all up for best entertainment programme. Best reality show nominees are Dragons' Den, The Jury: Murder Trial, Love is Blind and The Traitors.

  Diane Buswell and Chris McCausland won the Strictly glitterball last year

  The six nominees for Memorable Moment, the only award voted for by members of the public, were revealed earlier this month, although they're not included in the tally of nominations. They are:
  • None Bridgerton - "THE" carriage scene where Colin admits his true feelings for Penelope
  • None Mr Bates vs The Post Office - Jo Hamilton phones the Horizon helpline
  • None Rivals - Rupert Campbell-Black and Sarah Stratton are caught in a game of naked tennis
  • None Strictly Come Dancing - Chris McCausland and Dianne Buswell Waltz to You'll Never Walk Alone
  • None The Traitors - "Paul isn't my son... but Ross is!"

  Sophie Willan is nominated for her sitcom Alma's Not Normal

  Baby Reindeer is also nominated for best limited series, alongside Mr Bates vs The Post Office, the adaptation of David Nicholls' novel One Day and Lost Boys and Fairies. Supporting actor hopefuls are Mr Loverman's Ariyon Bakare, Slow Horses' Christopher Chung and Jonathan Pryce, Wolf Hall: The Mirror and the Light's Damian Lewis, Eric's McKinley Belcher III and The Gathering's Sonny Walker. Alongside Gunning and Mau from Baby Reindeer, supporting actress nominees are Rivals' Katherine Parkinson, Say Nothing's Maxine Peake, Sherwood's Monica Dolan and Truelove's Sue Johnston. Say Nothing has four nominations in total, including best international programme. It's an adaptation of Patrick Radden Keefe's book about the story of the IRA's Price sisters. The second series of Alma's Not Normal is nominated again for scripted comedy, while its star and creator, Sophie Willan is up for best female actress in that genre. Willan took home both awards for the first series at the 2022 TV Baftas. Other scripted comedy nominees this year are Brassic, Ludwig and G'Wed. Dylan Thomas-Smith is up for best male comedy performance for the latter.

  Meanwhile, the BBC documentary Life and Death in Gaza has four nominations including best factual series. Bafta chair Sara Putt said: "From stories that got the nation talking, to courageous documentaries about conflict and real-life events, this year's television nominations celebrate the exceptional creativity and craft of British and international television, and of the talented people who bring it to life on-and-off screen." Almost half the performance nominees are receiving their first television nomination.

  The Bafta TV nominations also include those who are recognised for a Bafta TV craft award, which honours those behind the scenes in categories such as directing, editing and sound. The TV Awards will be hosted by Alan Cumming and will be broadcast on BBC One and BBC iPlayer on Sunday 11 May.
