title: 'Zayn Malik: Former One Direction singer pays tribute to Liam Payne at Leeds
  concert - BBC News'
date: '2024-11-24'
section: Culture
url: http://www.bbc.co.uk/news/articles/c704gxggzdzo
content: |-
  The singer began his tour in Leeds following his former One Direction bandmate Liam Payne's death.

  The written tribute to Liam Payne appeared onscreen during Zayn Malik's concert

  Zayn Malik has paid tribute to his former One Direction bandmate Liam Payne at his show in Leeds on Saturday night, with a sign which read: "Love you bro". The message, external, which has been widely shared on social media, also had Payne's name and the year he was born and died. Malik's tour was meant to begin in Edinburgh earlier this week. However, he rescheduled two of his shows in the city, citing "unforeseen circumstances". The singer also previously postponed his US tour, after what he called the "heartbreaking loss" of Payne.

  Payne died, aged 31, after falling from the third floor of hotel balcony in Argentina last month. Family, friends and former bandmates remembered him at his funeral in Amersham in Buckinghamshire on Wednesday. Harry Styles, Louis Tomlinson, Niall Horan and Malik were among the mourners, alongside Payne's girlfriend Kate Cassidy and his former partner Cheryl, with whom he shares a son.

  Zayn Malik joined his former One Direction bandmates at the private service earlier this week

  At the O2 Academy Leeds, Malik played a string of his hits including Pillowtalk and My Woman. Many had expected he might pay tribute to Payne during the show. In the end, he did so right at the end, with a message that was accompanied by a pink heart. It came after Malik announced last week that he was rescheduling two of his Edinburgh shows. In an Instagram story, he said that the show originally scheduled for 20 November at the O2 Academy Edinburgh venue had been rescheduled for 8 December. A further date on 21 November at the same venue has been moved to 9 December. "All tickets for the original show dates will be honoured on the rescheduled dates," the post added.

  In October, he made the decision to postpone his US shows, telling fans: "Given the heartbreaking loss experienced this week, I've made the decision to postpone the US leg of the Stairway to the Sky Tour." The US part of Malik's tour was due to start in San Francisco, before visiting Las Vegas, Los Angeles, Washington DC and New York. He has told fans on X the dates would be rescheduled for January and the tickets will remain valid for the new dates. "Love you all and thank you for your understanding," he added.

  Zayn Malik has said he would "cherish all the memories" with Liam Payne

  Payne and Malik rose to global fame as part of the boyband One Direction - created on The X Factor TV show in 2010 - and sang together with bandmates Harry Styles, Louis Tomlinson, and Niall Horan. Malik left the group in 2015 to embark on a solo singing career, and the band later split in 2016. After Payne's death, his One Direction bandmates posted a series of poignant and heartfelt tributes to their "brother", who they remembered as "the most vital part" of the group. "I loved and respected you dearly. I will cherish all the memories I have with you in my heart forever, there is no words that justify or explain how I feel right now other than beyond devastated," Malik wrote. "I hope that wherever you are right now you are good and are at peace and you know how loved you are."
