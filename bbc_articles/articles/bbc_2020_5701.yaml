title: 'Coronavirus: Parents of special needs children ''skip meals'' - BBC News'
date: '2020-05-19'
section: Leeds & West Yorkshire
url: http://www.bbc.co.uk/news/uk-england-leeds-52723352
content: |-
  Lockdown measures have seen costs rise as children must stay at home, charity Family Fund says.

  The parents of a girl with special needs say they are having to skip meals to make ends meet amid lockdown.

  Tristan Howdle, from Harrogate, was made redundant as a result of the coronavirus pandemic and his wife, a carer, is working fewer hours.

  Charity Family Fund said many families of disabled children - including the Howdles with daughter Mia, 7 - struggle with food and energy costs.

  Lockdown measures also mean they are unable to access the support they need.

  The charity has spoken out as the government announces £10m emergency funding to help low-income families care for children with complex needs at home.

  The grants, which are expected to work out at about £400-£500 per family, are being made available to help those with seriously ill or disabled children.

  Mr Howdle, who worked in recruitment before the lockdown began, says the family is shielding as daughter Mia has chronic lung disease, global developmental delay and autism.

  She usually goes to a special school in Wetherby, but cannot currently attend.

  Tristan Howdle said the family are struggling financially due to pressures brought on by the lockdown

  The situation has also forced Mrs Howdle to reduce her working hours to avoid any direct work with people due to the infection risks.

  She has also given up her usual night shifts, leaving her wages about £500 a month lower than normal.

  "It's the total effect of everything we're missing which is hard for us, all her hospital appointments, all the support she receives at school, it's just incredibly hard on Mia," said Mr Howdle.

  He added he and his wife are not eating properly to be able to afford to give Mia the food she needs.

  "You will eat toast or something, just so there is sustenance, but we won't go with full meals all the time, we are just eating what we can," he continued

  "In terms of costs, we're spending more than we ever have before on food. Autism means that [Mia] will only touch and eat very specific brands of foods.

  "Some of those brands are not cheap but she will not eat other brands. It's a specific part of that condition that anyone who understands autism will know."

  Family Fund, based in York, said a survey it commissioned showed more than half of families of children with special needs are in a similar position.

  Mia was born prematurely and weighed just 1lb 8oz

  A quarter of the parents surveyed said they had missed meals in the past two weeks because of reduced income.

  It found that while the situation has improved, 26% of families still report having to go without toiletries, 25% without hygiene products and 13% without medicines.

  Children and families minister Vicky Ford, said: "I know that these unprecedented times may put additional pressure on families, particularly those whose children have the most complex needs, and these parents deserve some extra help to loo after and educate them at home."

  Cheryl Ward, of Family Fund, welcomed the funding and said it would make an "incredible difference" to ease some of the pressures these families face.

