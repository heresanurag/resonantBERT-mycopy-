title: Major incident declared after Walsall canal cyanide spill - BBC News
date: '2024-08-14'
section: Birmingham & Black Country
url: http://www.bbc.co.uk/news/articles/c5yk7nd8r9do
content: |-
  Sodium cyanide, which can pose a serious health risk, is discovered in the waterway.

  People are being urged to avoid the canal and towpaths between Walsall and Birmingham

  A major incident has been declared after a toxic chemical spill in a canal in Walsall. The public have been warned to avoid a 12-mile stretch of the canal network and towpaths running from the heart of the borough to neighbouring Birmingham, but taking in interconnected waterways across Wednesbury, Tipton and West Bromwich. Walsall Council leader Garry Perry confirmed the substance to be sodium cyanide, which can cause seizures, vomiting and loss of consciousness. He said: "We understand [the public's] alarm - of course we want to do all we can to take the right precautionary measures to protect individuals."

  There are a number of dead fish in the canal

  Sodium cyanide dissolves in water and can have serious adverse health effects for those who come into direct physical contact with it, posing potential risks to both people and their pets, the council has advised. Dozens of dead fish can be seen in part of the canal. Anyone exposed to the water who felt unwell should seek medical advice through the NHS 111 service, or phone 999 in an emergency, a Walsall Council spokesperson said. The exclusion zone markers run from the Walsall lock flight to lock flights at Rushall/Ryders Green in the borough, and Perry Barr in Birmingham. Mr Perry said it was too early to speculate how the substance entered the waterway.

  Walsall Council leader Garry Perry said he understood people would be alarmed by the spill

  When the spill was discovered on Monday, it had gone directly into the stretch of canal from Spinks Bridge, Walsall, down to Birchills Street Bridge. Mr Perry said there would be an ongoing investigation into the spill, with regular updates through the day each day as more information became available. Water testing would take place, he said, adding that there were several partner agencies involved in the major incident response. Precautionary measures would be reduced as soon as the impact was clearer, and it was known what needed to be done to make the canal and surrounding towpaths safe, Mr Perry explained.

  One resident, who said he wanted to see those responsible pay for the damage to the environment, told the BBC: "I think [the chemical spill] is disgusting - there ought to be big fines."

  People are being urged to avoid a 12-mile stretch of the canal network following the spill in Walsall on Monday

  The UK Health Security Agency (UKHSA), describes sodium and potassium cyanide as white crystal-like solids with a faint almond odour. Both are used in industry for metal cleaning, plating and extraction, and photography. They can also be used to make other chemicals. Exposure to cyanide salts can cause headache, nausea, dizziness, nervousness, confusion, changes in heart rate and drowsiness, according to the agency. It can also cause a loss of consciousness, seizures, vomiting and low blood pressure.
