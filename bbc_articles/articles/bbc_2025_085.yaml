title: MrBeast announces engagement to YouTuber Thea Booysen - BBC News
date: '2025-01-02'
section: Newsbeat
url: http://www.bbc.co.uk/news/articles/clyk956j1k8o
content: |-
  The world's most popular YouTuber, known for his grand stunts, says he opted for an intimate proposal.

  The couple were recently photographed at the premiere of MrBeast's new series Beast Games

  YouTuber MrBeast has announced his engagement to girlfriend Thea Booysen. The 26-year-old revealed that he'd proposed on Christmas Day, sharing photos of the moment he went down on one knee. Mr Beast, real name Jimmy Donaldson, is the world's most popular YouTuber with 340m subscribers. Fiancée Thea, originally from South Africa, also has her own channel, TheaBeasty, with almost 40,000 subscribers. Now living in the US, the 27-year-old also streams games on Twitch and is a published author.

