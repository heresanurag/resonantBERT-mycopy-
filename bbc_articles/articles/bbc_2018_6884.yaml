title: Matthew Wright says emotional goodbye to The Wright Stuff - BBC News
date: '2018-06-14'
section: Entertainment & Arts
url: http://www.bbc.co.uk/news/entertainment-arts-44480663
content: |-
  The TV presenter had to hold back the tears as he hosted The Wright Stuff for the final time.

  Wright was showbiz correspondent at the Daily Mirror

  TV star Matthew Wright said an emotional goodbye to his team and the audience as he hosted The Wright Stuff for the last time.

  The presenter announced last month that he would be leaving the Channel 5 current affairs show after 18 years.

  His voice wavering, he said: "I'd like to thank you at home. Eighteen years we have spent together. That is a long time for stuff to happen."

  He said that he was looking forward to spending more time with his wife.

