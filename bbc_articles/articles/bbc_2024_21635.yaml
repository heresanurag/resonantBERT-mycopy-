title: 'Bradford City of Culture 2025: David Hockney, Turner Prize and Bronte tribute
  in line-up - BBC News'
date: '2024-09-12'
section: Culture
url: http://www.bbc.co.uk/news/articles/c5y8yeyddw7o
content: |-
  The first part of the city's year-long programme of cultural events for 2025 is unveiled.

  A nationwide drawing project backed by artist David Hockney is among the events unveiled on Thursday for Bradford's tenure as UK City of Culture 2025. The first part of the year-long programme will also include the Turner Prize, an outdoor event created by magician Steven Frayne - formerly known as Dynamo - and tributes to the Brontë sisters. Music will also be a big feature of the events, with celebrations of brass bands and South Asian music in the pipeline. Shanaz Gulzar, creative director of Bradford 2025, said the line-up would "showcase the exceptionally rich, diverse talent" of the West Yorkshire city.

  "We're young, we're diverse, we're creative, and we're the heart of the UK," she said at a briefing event. In a statement, Culture Secretary Lisa Nandy added that the programme would enable Bradford "to tell its incredible story and show off its rich local heritage to the world".

  Hockney, widely regarded as Britain's greatest living artist, was born in Bradford in 1937 and learned his craft by pushing a pram containing art materials around the city as he painted on the streets. For the City of Culture year, he will be "inviting people of all ages across the UK to take part in a drawing project to reflect our everyday lives", organisers said. Other events announced on Thursday include an adaptation of The Railway Children in the locations used for the beloved 1970 film, and a musical project created by conductor Charles Hazlewood. "We are so excited to be coming here to Bradford, what an amazing city, it's a city that wears its history on its sleeve," Hazlewood told the briefing. It was also revealed that the 2025 Turner Prize will be hosted at Cartwright Hall art gallery.

  Zayn Malik is the ambassador for Bradford's City of Culture year

  Bradford was announced as the next UK City of Culture in 2022. County Durham, Southampton and Wrexham had all also been shortlisted. Those behind the city's bid believe it will generate £700m and create 3,000 jobs. Earlier this year, former One Direction star Zayn Malik was revealed as the ambassador for the city's year in the limelight. The 31-year-old singer is originally from the suburb of West Bowling - although he now spends much of his time in the US. "I've travelled all over the world but my roots and family remain in Bradford," Malik said in a statement. "Now we can celebrate this great city and the people who live and work here with the rest of the world." Bradford is also the birthplace of writers JB Priestley and Andrea Dunbar, while Haworth, the home of the Brontes, is in the district. Bradford is one of the youngest cities in the UK, with over a quarter of the population under the age of 20. It also has one of the most diverse communities in the UK. A UK City of Culture is chosen every four years and has previously been awarded to Derry (2013), Hull (2017) and Coventry (2021).
