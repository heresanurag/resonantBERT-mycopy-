title: 'Ukraine war: The drone pilots monitoring Russian troops - BBC News'
date: '2022-03-27'
section: General
url: http://www.bbc.co.uk/news/world-europe-60878703
content: |-
  The BBC joins a Ukrainian defence unit carrying out aerial reconnaissance around Kyiv.

  Ukrainian volunteers have formed territorial defence groups to help their armed forces stop the Russian invasion.

  Some of them work close to the front line.

  The BBC’s Abdujalil Abdurasulov joined an aerial reconnaissance team during their field operation.
