  Police say the baby of Constance Marten and Mark Gordon may have come to serious harm.

  How the search for Constance Marten and Mark Gordon unfolded

  Constance Marten, 35, comes from an affluent family and has inherited wealth, but she is estranged from her relatives. Mark Gordon is a 47-year-old registered sex offender who spent 20 years in prison in the US after having been convicted in Florida of a rape he committed aged 14. The couple met in 2016. They are thought to have been leading a nomadic lifestyle after the police say the couple left their home in south-east London in September 2022, when Marten began showing signs of pregnancy. The couple's car was found burning on the side of the motorway near Bolton in early January. Police discovered that Marten had given birth a day or two earlier without any medical assistance. They started searching for the couple right away – but despite numerous CCTV sightings placing them in various locations around the country, Marten and Gordon weren’t found until 27 February, when they were arrested on the outskirts of Brighton. The search for the baby continues.
