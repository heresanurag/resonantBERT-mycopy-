content: |-
  Former captain Alan Shearer on what England have been missing at Euro 2024 and who might help solve their problems.

  'England need midfield balance and a pattern of play'

  England can only go one way from here. We can only get better. We have to because what we have seen up until now at these Euros will not be good enough for us to go the distance like when we reached the final last time. Like everyone else, I was desperate for us to deliver against Slovenia after the way we played so poorly against Serbia and Denmark. I really wanted to see a reaction to the criticism the team have been getting but, apart from the final few minutes, it just didn’t happen. Instead, until some late changes, it was exactly the same sort of disappointing performance we’d already seen twice from Gareth Southgate’s side at this tournament.

