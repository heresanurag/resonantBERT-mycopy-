title: 'Soleimani funeral: Huge crowds, anger and the supreme leader''s tears - BBC
  News'
date: '2020-01-07'
section: General
url: http://www.bbc.co.uk/news/world-middle-east-51005546
content: |-
  Large crowds turned out for the funeral of the Iranian military commander Qasem Soleimani.

  As he led prayers for Soleimani, who was killed in a US drone strike, Iran's supreme leader Ayatollah Khamenei wept.
