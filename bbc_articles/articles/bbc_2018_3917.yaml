title: UK ivory ban among world's 'toughest', Michael Gove says - BBC News
date: '2018-04-03'
section: UK
url: http://www.bbc.co.uk/news/uk-43620012
content: |-
  All sales of ivory products to be banned, regardless of their age, the environment secretary says.

  Prince William condemned illegal wildlife trading during a trip to China in 2015

  A British ban on ivory sales is to be one of the toughest in the world, the environment secretary has said.

  Michael Gove said the sale of ivory of any age, with limited exceptions, will be banned in an effort to reduce elephant poaching.

  The move, which is still to be signed into law, comes after a consultation in which more than 60,000 people supported the introduction of a complete ban.

  Campaigners say about 20,000 elephants are killed each year for their tusks.

  Previous bans only applied to ivory produced after 1947. The new law is even tougher than the changes proposed in the October 2017 consultation.

  Mr Gove added that the new law would "reaffirm the UK's global leadership on this critical issue, demonstrating our belief that the abhorrent ivory trade should become a thing of the past".

  He said: "Ivory should never be seen as a commodity for financial gain or a status symbol."

  Those breaking the ban by selling ivory will face a maximum penalty of five years in jail or an unlimited fine, said the Department for Environment, Food and Rural Affairs (Defra).

  It added that the measure was tougher than rules in China and the US.

  The US currently bans ivory apart from items older than 100 years, as well as items with up to 50% ivory.

  The Chinese ban exempts "relics", with no specific date before which these must have been made.

  There will still be some exemptions to the ban, designed to provide "balance to ensure people are not unfairly impacted" and for "items which do not contribute to the poaching of elephants", the department said.

  WWF chief executive Tanya Steele said the UK stance made it a "global leader in tackling this bloody trade" and called for "global action" to stop elephant poaching.

