content: |-
  Defending Premiership champions Northampton Saints beat current leaders Bath 35-34 in a scintillating match at Franklin's Gardens, with Fin Smith settling the outcome with the last kick.

  Northampton upset leaders Bath with last kick of epic clash

  Reigning Premiership champions Northampton Saints edged current leaders Bath with the final kick of a sensational match at Franklin's Gardens. In a repeat of last season's Premiership final, Saints piled on the pressure in a breathless first half with early tries from Josh Kemeny, captain Fraser Dingwall and James Ramm. Joe Cokanasiga and Orlando Bailey responded for Bath before George Hendy got Saints' fourth score. The visitors came back into the match with tries from Will Stuart, Max Ojomoh and a second from Cokanasiga before a last-minute penalty from Fin Smith sealed a dramatic win for the hosts. Bath remain top, six points ahead of Bristol, while Northampton stay eighth, 15 points clear of next-to-bottom Exeter.

  It took the home side less than two minutes to get on the scoreboard, as full-back Hendy exploited space down the touchline before the ball made its way to Kemeny, who escaped the final Bath tackler to touch down beyond the posts. With the wind in their sails, Saints struck again almost immediately. Smith recovered his own kick into the Bath 22, and with the defence stretched, scrum-half Alex Mitchell fed Dingwall to go over untouched. Bath were shocked as Ramm powered through a gap between defenders and arced away from the covering Bailey to score the home side's third try in fewer than 15 minutes. But, the visitors regained their composure and responded quickly. After patient work from fly-half Finn Russell and Bailey, Cokanasiga found just enough space to touch down in the corner. As the penalty count rose for the home side, Bath scored again. Russell played a perfect pass to fix the Saints' defence, allowing Bailey to power his way through to the line. But, Phil Dowson's men proved relentless in attack and scored a deserved fourth try before the break as Hendy followed up a kick through by the inspired Smith.

  James Ramm powers over for Northampton in the first-half

  Looking to close the gap, Bath rang the changes early in the second half, and it soon paid dividends. Stuart crashed over from the short range following a period of sustained pressure on the Saints' line for the away side's third try. Following further sustained pressure in the host's 22, Ojomoh fought his way over following a brilliant offload from Sam Underhill before Bath got their noses in front for the first time through Cokanasiga. Rory Hutchinson's kick was charged down by Miles Reid, who fed the flying winger to run in from the halfway line. Smith and Russell traded penalties as the lead changed hands three times in the final 10 minutes. At 34-32 ahead, Bath looked set a remarkable comeback success, only for Smith to give Saints the final say and extend the visitors' long wait for a victory at the Gardens.

  "It was a good game of rugby. It clearly could've gone either way, despite us being 19-0 up after 15 minutes. I'm delighted with the application of the group - loads of heart, loads of grit, loads of toughness. "We talked about the starts we hadn't managed to put out on the field against Gloucester and Sarries and that's something we focused on and credit to the players, we got stuck in straight away. About winning at the death: "To go through that many phases, draw a penalty and for Fin to slot it – speaks volumes about the character [of the team]."

  "That was some game. It's always gutting to lose with the last play of the game. "The game is 80 minutes long, they started very well, we came back, they came back, we dominated the second half, they got in front with two mins to go with a decision at the back end of the game. If that call goes the other way, we're victorious. "There's not too much to comment on in terms of the decision, that's the call the referee makes, from my side, we'll take the two points and move on."
