  Meanwhile Wigan Labour MP Lisa Nandy and Rachel Reeves, the MP for Leeds West, have written to the BBC director general Tony Hall to complain about the decision, arguing it reflects a capital-centric outlook in the corporation's output and deprived non-Londoners of a voice at a crucial moment in the Brexit debate.

  Ms Nandy said: "The decision to move last night's Question Time from Bolton to London has been met with real anger in the north. Too often people in our constituencies are cut out of the national debate."

  The MPs have also asked the BBC to provide a breakdown of how many episodes of Question Time are filmed at state schools and how many take place at private schools, in addition to statistics on the number of programmes broadcast from London.

