content: |-
  Parades fill the streets of Brazil's Rio de Janeiro for the first carnival since the pandemic began.

  Music and dancing has filled to the streets of Rio de Janeiro, as Carnival retuned after a break because of Covid.

  Carnival is one of the most important cultural events in Brazil and it lasts for several days.
