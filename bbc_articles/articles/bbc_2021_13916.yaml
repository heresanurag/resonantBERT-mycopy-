  Germany faces record Covid cases on 17 November in what the chancellor says is a "dramatic" situation.

  How do infection rates in the UK and Europe compare?

  For much of the late summer and early autumn, the UK was an outlier in Europe with infection rates stabilising at a high level, while they fell significantly across much of the continent. But in recent weeks, as UK infections have stayed broadly stable with some fluctuations up and down, several European nations have seen cases surge to their highest rates in the pandemic. That's what led UK Prime Minister Boris Johnson to warn of "storm clouds gathering" over Europe, as he called on people to get their booster jabs in case a similar surge hit Britain. The number of people testing positive each day in the UK is already more than 500 per million. But in parts of central Europe like Austria, Slovakia, the Czech Republic and Slovenia, it is at least double that rate. Countries such as Belgium, the Netherlands and Ireland have also surged ahead of the UK in recent weeks, with case rates of more than 1,000 per million people, 900 per million people and 800 per million respectively. Germany has a lower infection rate, but the trajectory has been causing concern among officials there. However, other countries such as France, Italy and Spain have low infection rates and have only seen the first signs of an upswing. Among the explanations for the differences are differing behaviour as socialising indoors becomes more common in winter and the levels of immunity, which vary according to the level of vaccination, the number of previous infections and how much immunity has waned.
