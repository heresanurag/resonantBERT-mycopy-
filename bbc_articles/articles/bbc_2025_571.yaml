title: Holmfirth Army veteran proposes at Invictus Games in Canada - BBC News
date: '2025-02-10'
section: West Yorkshire
url: http://www.bbc.co.uk/news/articles/cqjvxyyre9vo
content: |-
  James Cairns, who lost his leg in Afghanistan, proposed before wheelchair basketball match.

  James Cairns said the surprise had taken "months of planning"

  An Army veteran from West Yorkshire said he got his "gold medal moment" at the Invictus Games in Canada when he proposed to his girlfriend. James Cairns, from Holmfirth, asked his partner of four years Hannah Wild to marry him at the opening of the Team UK wheelchair basketball match in Vancouver on Sunday, the Royal British Legion said. Mr Cairns, 35, celebrated the moment she said "yes" with his team-mates, friends and the couple's two-year-old son. Mr Cairns, who lost his leg to a sniper bullet in Afghanistan, said it had taken "months of planning" to keep the secret.

  Army veteran James Cairns hugs his partner Hannah Wild after she accepted his surprise proposal

  Mr Cairns competes in the biathlon and swimming events as well as wheelchair basketball. The seventh edition of the games, established by the Duke of Sussex in 2014, began in Vancouver on Saturday. The Duke was at the opening ceremony, which had a star-studded line-up of performers including Nelly Furtado, Coldplay's Chris Martin and Katy Perry. More than 500 competitors from 23 nations will take part in the games, which run until 16 February. The games aim to "inspire recovery, support rehabilitation and generate a wider understanding and respect for those who have served their country", the Royal British Legion said. The Invictus Games were held in London in 2014, in Orlando in 2016, Toronto in 2017, Sydney in 2018, The Hague in 2022 and Dusseldorf in 2023. Listen to highlights from West Yorkshire on BBC Sounds, catch up with the latest episode of Look North or tell us a story you think we should be covering here, external.
