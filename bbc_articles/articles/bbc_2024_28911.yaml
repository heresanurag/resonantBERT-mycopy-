  Pep Guardiola says he will stand by Manchester City even if they are relegated over alleged breaches of financial rules.

  'I will be here' - Guardiola's relegation promise to Man City

  This video can not be played To play this video you need to enable JavaScript in your browser. Guardiola vows to stand by Man City even if they are relegated

  Pep Guardiola says he will stand by Manchester City even if they are relegated over alleged breaches of financial rules - and claimed "75%" of rival clubs want to see them go down. Guardiola has signed a two-year contract extension that would keep him at City until 2027. The 53-year-old has committed his future to the club even though no decision is expected around the 115 Premier League charges City are facing until early next year. City deny any wrongdoing but sanctions in the event of a guilty verdict could range from a huge fine to points deductions or even relegation. Guardiola said 12 months ago he would manage them in League One if he had to. He repeated the sentiment on Friday before the Premier League encounter with Tottenham. "I said that six months ago. You have my interviews," he said. "I said when all the clubs accused us of doing something wrong and people say 'what happens if we are relegated?' I will be here. "I don't know the position they are going to bring us, the Conference? [But] next year we will come up and come up and come back to the Premier League. "I knew it then, I feel it now." However, Guardiola said the issue was not in his thoughts when he decided to extend his stay, and repairing the damage of four straight defeats for the first time in his managerial career was more pressing. "I read something about the situation and how you need to be relegated immediately," he added. "Seventy-five per cent of the clubs want it, because I know what they do behind the scenes and this sort of stuff. But I don't live with it, I live with the four defeats, what I have to do. There are lawyers on both sides. I don't think about it."

  This video can not be played To play this video you need to enable JavaScript in your browser. Was a lack of replacements behind Guardiola's new Man City deal?

  Guardiola was in an expressive mood as he spoke to the media for over 25 minutes. In embracing the fact City are currently on a four-match losing streak for the first time since he arrived at the club in 2016, Guardiola repeatedly mentioned he had also won an unprecedented four league titles in a row. "Two sides of the same coin," is how he described it. He also rattled through his extensive injury problems, adding midfielder Mateo Kovacic to the list of those not available for the visit of Ange Postecoglou's side, but confirmed central defensive trio John Stones, Manuel Akanji and Nathan Ake may well be fit. Ballon D'Or winner Rodri, one of those whose absence is most keenly felt, will be at the Etihad Stadium tomorrow, although his involvement will be limited to saying a few hellos as he continues his recovery from knee surgery. But the most interesting conversation was around Guardiola's contract. It was widely reported earlier in the week he had agreed a one-year contract extension, with the belief any additional season would be added as 'an option'.

