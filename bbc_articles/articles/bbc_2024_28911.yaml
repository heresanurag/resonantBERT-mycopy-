  There did seem something convenient about his explanation for why the agreement covers two seasons rather than one, in negotiations Guardiola says were concluded in two hours. "For the weather!" he said initially, before offering a serious response: "It's a good question. Mainly I don't want next season in September, October, November to be [about] 'Pep, will he extend again?'. I don't want to be in that position. "In the end, the contract is there. I would like to stay two more years but I know if the results are not good I will not stay for two more years. "We have legendary players here in the team but if we don't perform our fans and chairman will ask what is going on and you have to change. Everyone is under pressure. I have the contract but maybe in a month I am not here." That is impossible to imagine, even in the unlikely event City's losing streak continues. Deep down, Guardiola knows it - and chairman Khaldoon Al Mubarak knows it too. "In just two hours, we did it," he revealed. "Maybe I am arrogant, but I think we deserve to continue for what we have done in the last years."

  Manchester City manager Pep Guardiola has won 18 trophies since arriving at the club in 2016
