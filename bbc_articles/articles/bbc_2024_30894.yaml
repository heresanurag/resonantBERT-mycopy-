  England 'may need to manage Stokes' bowling'

  Ben Stokes missed four Tests because of a hamstring injury earlier this year

  Assistant coach Marcus Trescothick admitted England may have to manage Ben Stokes' bowling workload after the captain sustained another hamstring injury. Stokes pulled up on the third afternoon of the third Test against New Zealand and will have a scan overnight. The 33-year-old's 36.2 overs in this Test are his most in a single match since June 2022. "Maybe it's a case that you manage his bowling loads and he doesn't bowl the volume that he's bowled in this game," said Trescothick. "We'll just have to look at how we manage it." Along with all-time greats Jacques Kallis and Sir Garfield Sobers, Stokes is among only three all-rounders to have scored at least 6,000 runs and taken more than 200 wickets in Test cricket. For much of 2023 his bowling was hampered by a long-term left-knee injury, upon which he had surgery at the end of that year. He returned to playing a full role as a bowler in the England side, but this latest problem is the second injury to his left hamstring in five months. The first was sustained playing in The Hundred in August, causing Stokes to miss four Tests.

  Again appearing to be at full fitness in New Zealand, the 66.1 overs he has bowled in this series are his most as captain. The 23 overs he sent down on the first day of the third Test in Hamilton are the most he has bowled in a single day. "It's always challenging when it's in the same area as before," former England opener Trescothick told BBC Sport. "Is it the same injury? We don't know. Until we get those scan results we're not going to know." Stokes was bowling his third over of the third day when he felt the injury in his hamstring and immediately left the field. Unlike the issue in The Hundred, when Stokes was helped off the field at Old Trafford, he was able to leave under his own steam. He did not appear for the rest of the New Zealand second innings, as the home side piled on 453 to set England an improbable 658 to win. The tourists slipped to 18-2 by the close. Following play, Stokes limped away from the England dressing room with his hamstring strapped. "Naturally, he was upset," said Trescothick. "That has calmed down a little bit now. He's done plenty of icing, and seen the doctors and the physio. He'll get advice, then hopefully that makes a decision for him." Stokes was due to play for MI Cape Town in the SA T20 in January, a stint that now looks in severe doubt. The slim chance that Stokes may have been chosen to play for England in the Champions Trophy also looks to be over. England's next Test is not until May, when they host Zimbabwe for a one-off four-day match at Trent Bridge.
