title: 'Geraint Thomas: Thousands give hero''s celebration for Tour win - BBC News'
date: '2018-08-09'
section: General
url: http://www.bbc.co.uk/news/uk-wales-45133040
content: |-
  Tour de France winner Geraint Thomas says he feared it would just be "the wife and the dog".

  About 8,000 people lined the streets of Cardiff to welcome home Tour de France winner Geraint Thomas.

  The 32-year-old joked: "I was a bit worried it was just going to be the wife and the dog."
