  Sefton Council said it had launched a dedicated webpage providing information about help and support, external and would do "whatever it takes” to support the community as it dealt with the impact of "one of the saddest days in the borough’s history". Council leader Marion Atkinson said there had been some "truly amazing acts of kindness" since the tragic events and while it would "take time for us to come to terms with this... we will stay strong together". She added that the "offers of support" that the council had received "from across the world [were] much appreciated".

  Prime Minister Sir Keir Starmer said he came to pay his "respects to the families and the victims"

  In total, 11 patients with stab injuries were treated by the ambulance service and some were taken to Alder Hey Children's Hospital, which declared a major incident. A spokeswoman for Alder Hey said two of the seven children who had been brought there for treatment remained in "critical care, but currently in a stable condition".

  Prime Minister Sir Keir Starmer, who followed Home Secretary Yvette Cooper in visiting the scene of the attack, said he had come to pay his "respects to the families and the victims who are going through raw pain and grief". "As a father myself, I can't imagine what they're going through," he said. He told emergency crews he was "incredibly proud of what you did" in responding to the attack, adding: "I'm amazed, but not surprised, that you're in today, carrying on with your duties." "I wanted to shake their hands and say on behalf of the entire country 'thank you for what you did yesterday', because that was no ordinary challenge that they ran towards," Sir Keir said. "They have saved lives and sometimes it's very important to come and personally say 'thank you'."

  Shadow home secretary James Cleverly called for people not to "get involved in the grief of others" by sharing misinformation relating to the attack on social media. "Enough people are already distressed without their distress being amplified by speculation and gossip online," he added.

  Singer Taylor Swift said she was "completely in shock" after the "horror" of the knife attack. Her fans had raised more than £200,000 for the victims' families by Tuesday evening. Several other fundraisers have also been launched for those caught up in the attack. King Charles previously paid tribute to "all those affected by this truly appalling attack".

