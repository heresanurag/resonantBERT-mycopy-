content: |-
  But households still face the biggest fall in living standards since records began, the Office of Budget Responsibility warns.

  Sunak only cuts back on one sixth of taxes he raised

  There are some interesting measures that have been announced by the chancellor today. But the figure that courses through all of this is that very high inflation. It affects everything - how much borrowing there is, the debt interest payments too - and the prediction of it reaching 9% by the end of the year is pretty extraordinary. Rishi Sunak has kept the National Insurance rise to pay for the NHS and social care - starting next month. But he announced today that in July, after three months, half of that gets given back mainly to lower earners in the form of a higher National Insurance threshold. Then the rest of it goes back via a tax cut, but only if the conditions are met in his tax plan in a couple of years time. Overall, it means he hasn't had to reverse the National Insurance rise he had already announced and he continues to go big on being a "tax cutting chancellor". But if you look at the OBR's documentas, he has only cut back about one sixth of all the taxes that have been raised since he came into No 11. You still have corporation tax going up, you still have NI going up in people's pay packets this April, and you still have council tax going up.
