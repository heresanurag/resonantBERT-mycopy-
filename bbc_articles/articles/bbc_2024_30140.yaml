title: Kevin Sinfield kicks off epic 230-mile run in Liverpool for MND - BBC News
date: '2024-12-01'
section: England
url: http://www.bbc.co.uk/news/articles/cd9n91vjd4ko
content: |-
  The rugby star will run 230 miles in seven days across the UK in memory of late teammate Rob Burrow.

  Rugby star Kevin Sinfield has started a fifth epic fundraiser in memory of his late teammate Rob Burrow, who died of motor neurone disease (MND) this year. The 44-year-old will be running more than 230 miles (370km) in seven days across the UK, having already raised about £10m over four previous annual challenges. For this year’s event, he started at Liverpool’s annual Santa Dash, where more than 8,000 participants ran along the city’s famous waterfront with him. Sinfield told BBC Breakfast: “I think it’s important we’re doing justice - I want to represent the Burrow family the best we can but also the MND family.

  “They keep surprising us with some of the things they tell us and, through that, we get energy and want to push on even more.” The incurable condition affects the brain and nerves and is more common among people in their 60s and 70s.

  Rob Burrow joined his wife, daughters and Sinfield at the 2024 Leeds Marathon named in his honour

  Sinfield and fellow runners are wearing the number 7, which was worn by Burrow at Leeds Rhinos

  The Prince of Wales, who awarded Burrow and Sinfield their CBEs at their former Leeds Rhinos ground in January, posted a social media video where he described the new challenge as a “fitting tribute”. "What you and Rob have achieved has been incredible and it's a very fitting tribute to his legacy, what you're achieving again this week. "I'm sure you'll be running with him in your mind the whole way round."

  Burrow and Sinfield became close friends when they played for Leeds Rhinos

  Members of the MND community will join Sinfield to complete their own mile in the Running Home for Christmas challenge, which will pass by Wrexham, Gloucester, Belfast and Glasgow. Sinfield, who will also run to Hull, Northampton and Leicester, said: “The response has been great over the last few years and the cities are actually inviting us there now.” On the final day, the Oldham-born star will run from Manchester United’s stadium to his Saddleworth home in the Pennine Hills.

  Rob Burrow had a stellar 17-year playing career until retirement in 2017 and was diagnosed with MND two years later

  Following 12 weeks of training, Sinfield said it did not "get any easier as you can imagine, as you get a bit older”. He will be raising funds for six MND charities, including the Darby Rimmer Foundation, set up by former Liverpool defender Stephen Darby who was diagnosed with the disease in 2018. Burrow, who was married with three children, retired from playing in 2017 after winning eight Super League Grand Finals and 15 England and five Great Britain caps. He was diagnosed with MND in 2019, when he told his wife Lindsey: "Thank God it's me and not the kids." Burrow died at the age of 41 in June. In October, Sinfield agreed to remain as assistant coach for the England rugby union squad.
