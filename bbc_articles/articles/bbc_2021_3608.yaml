  A special event to mark 12 months of the pandemic.

  'We never got to say goodbye'

  The event begins with a short film in which two women share their experiences of bereavement as a result of coronavirus. Andrea Williams, from Sully, Vale of Glamorgan, says she never got to say a final goodbye to her husband Mark, 58, who died at the start of the pandemic. "We did so much together and we had so much more we wanted to do, we were living our best life," she says. "He was absolutely everything to me. "Not to have had that final conversation... even if it is just to say I love you." Ms Williams has since helped set up the Covid-19 Families Wales group - which supports about 1,300 people who have lost loved ones .
