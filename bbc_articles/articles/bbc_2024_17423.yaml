  Fans give their suggestions for which Euro 2024 players their Premier League club should sign this summer.

  Which Euros players do Premier League fans want to sign?

  It is one of international football’s biggest cliches: the player who performs well at a major tournament gets a blockbuster move. Think Enzo Fernandez at Qatar 2022. Jack Grealish after Euro 2020. Or the ultimate example - Karel Poborsky following Euro '96. So who should it be from this summer's European Championship in Germany? We asked fans of Premier League clubs for their suggestions...

  Athletic Bilbao’s 21-year-old forward was tipped for a big tournament - and he has delivered. Boasting more than 120 senior club appearances, the winger has dazzled at Euro 2024, his fine goal against Georgia a reminder of his sizzling talents. He could be one of Europe's most in-demand players after the tournament.

  Sean, Liverpool: It has to be Williams. He has all of the attributes I think will energise the front six under Arne Slot. He has pace, movement, an eye for goal and the confidence of youth. Mohamed Salah may well be gone from this team next year and we need to plan for that. Robert, Manchester United: Williams would be such an improvement on our current wingers and can play both sides. Him on the right and Alejandro Garnacho on the left would be frightening. Ben, Tottenham: Young and talented, incredibly quick and technical. He has the perfect profile for Ange Postecoglou's system.

  Christoph Baumgartner has made nine goal contributions in his past nine games for Austria (six goals and three assists)

  The vibrant displays of Ralf Rangnick's Austria have been underpinned by RB Leipzig's Christoph Baumgartner, a 24-year-old attacking midfielder with an eye for goal. He scored against Poland and set up Marcel Sabitzer's winner against the Netherlands in the final group game to help Austria win Group C above France.

  Tomos, Aston Villa: Would absolutely love the Villa to sign Baumgartner. He looks modern but is also a throwback in his style and skill. Get him in, Unai Emery. Andrew, Brighton: Have been impressed by Baumgartner. Would give another attacking option. Stanis, Crystal Palace: With Oliver Glasner's knowledge, we need to look at the Austria attacking players plying their trade in the German Bundesliga, especially Baumgartner.

  Italy have always produced great defenders and, in 22-year-old Calafiori, they may have another. He even looks a bit like 2000s legend Alessandro Nesta. An uncapped flier when named in head coach Luciano Spalletti's Euro 2024 squad, Calafiori quickly made himself indispensable. He missed the last-16 tie against Switzerland as Italy were knocked out.

  Leon, Arsenal: Calafiori would be a good signing as back-up for Gabriel - and maybe even challenge for a spot? Josh, Chelsea: Calafiori would be a great option. He is young but already has lots of experience and would strengthen our backline. David, West Ham: We need to push to sign Calafiori. A centre-half who is comfortable on the ball, skilful and prone to the odd lapse? Perfect.

  Georges Mikautadze scored three goals from six shots at Euro 2024 and his conversion rate of 50% compares favourably to some of the other players at the tournament

  Surprise packages Georgia grabbed the headlines with their win over Portugal and Mikautadze scored in each of their three group games. The 23-year-old also managed 13 goals in 20 Ligue 1 appearances for Metz last season despite their relegation.

  Sonny, Ipswich Town: Mikautadze would be a dream signing given how good he has been. Although he would blow our budget off the roof, he would be worth it. Mark, Leicester City: Without doubt, Mikautadze. He is another gem from the lower French leagues, just like Riyad Mahrez. Tom, Wolves: I would be all over Mikautadze. Quick, relatively young and knows where the back of the net is. He has really impressed me.

  Giorgi Mamardashvili made 21 saves in the group stages, equalling the most by a goalkeeper in European Championship history

  At the other end of the Georgia team, goalkeeper Mamardashvili has been outstanding in Germany. Also 23, he was inspired in the second group game against the Czech Republic, making 11 saves to ensure a vital point.

  Jack, Newcastle United: If we are seriously looking for a new long-term number one, he looks great value. Tom, Nottingham Forest: A good transfer window will include signing a goalkeeper. Mamardashvili has really impressed me with very good saves and he would be the perfect signing. Ethan, Southampton: Mamardashvili has been unbelievable in goal for Georgia and, with Gavin Bazunu out for a long time, he could be a perfect signing.
