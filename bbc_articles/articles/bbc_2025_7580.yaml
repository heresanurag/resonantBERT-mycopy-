  England's pack have been dominant up front in all four of their wins during this year's Six Nations. Scrum dominance over Ireland resulted in the second-half sin-binning of prop Niamh O'Dowd, which helped England score two tries and swing the game. Scotland scored their first try against England since 2023 from a powerful maul drive on Saturday, with Mitchell also unhappy about his side's set-piece. "We were a little bit untidy. Our maul could have been better and we let them off the hook at times," he told BBC. France second row Manae Feleu has stolen two line-outs this campaign - topped only by England locks Abbie Ward and Rosie Galligan - and will be keen to disrupt the Red Roses' line-out and maul, which was so key in their run to the World Cup final in 2022. But it is also in the loose where France's pack will want to go toe-to-toe with the champions, with number eight Teani Feleu and locks Madoussou Fall and Manae Feleu all standout carriers. In their past three wins Les Bleues have opted for a 6-2 bench spilt to maintain power from their pack for the full 80 minutes, which they have turned to again for the game on Saturday. "France are one of the few packs in the Six Nations that I think can rival what England do," Daley-Mclean added. With 10 offloads between lock pairing of Fall and Feleu, Mitchell's side will need to target wrapping up the ball as well as the tackler.

