  Which aspects of their game do England need to get right to beat France and secure a seventh successive Women's Six Nations title on Saturday?

  How England can overcome French threats in Grand Slam decider

  This video can not be played To play this video you need to enable JavaScript in your browser. England beat France for their third Grand Slam in a row

  York, Cardiff, Cork, Leicester. It doesn't matter where England play in the Women's Six Nations, comfortable bonus-point wins follow. The 59-7 hammering of Scotland last weekend means the Red Roses have secured the maximum possible 20 points from their four matches to set up a Grand Slam decider against France at Allianz Stadium, Twickenham on Saturday. John Mitchell's side have breezed past the competition so far but he has challenged his side to produce the "complete performance" to secure a seventh successive title. Les Bleues are also undefeated this campaign and were the last team to beat the Red Roses in the Six Nations - back in 2018. "It's something we've had a chat about and it's something we're keen on. We know it's there. We're continually searching for that complete performance," Mitchell said. Where do England need to get right to once again lift the Six Nations? And what threat do the French pose?

  Watch live on BBC Two, BBC iPlayer and online, listen on BBC Radio 5 Sports Extra and BBC Sounds, live text and video highlights on the BBC Sport website and app

  France almost stunned England when they last travelled to Twickenham in 2023, when they scored 33 points in an incredible second-half fightback. The game finished 38-33 as France cut loose in attack in the second period, scoring tries from all over the pitch, showing what can happen if you kick inaccurately to their dangerous backs. Having scored 141 points in this year's championship and 21 points in last year's defeat by Mitchell's side in Bordeaux, Les Bleues remain dangerous in attack through their old-school French flair, meaning accuracy from the boot is needed to win the territorial battle and shut down opportunities. Scrum-half Pauline Bourdon Sansus remains a class act - proven in her standout display in a dominant second-half performance against Scotland - and has the ability to produce a magic moment from anywhere and at any time. Fly-half Carla Arbez is joint-second for kicks in play (52) this championship, a tactic France have avoided using in their previous two encounters with Mitchell's side. "France now attack differently and have a world class scrum-half, who is a threat," Mitchell told BBC's Rugby Union Weekly. "They focus on kick metres, the 10 [Arbez] is there to move them forward. "In Bordeaux, they didn't kick, maybe seeing how our back three played at Twickenham against Ireland, and in our WXV1 warm-up game in September they didn't kick at all. "In this tournament, they have been reliant on kicks from 10, so I'll be surprised if they don't come with that." Rapid wing Joanna Grisez is another player England need to keep an eye on after the 28-year-old showed her sharp finishing ability for the opening score as France fought back to win 34-21 in Italy last Saturday. Mitchell has moved away from Holly Aitchison's running game at 10 in favour of the tactical kicking of Saracens fly-half Zoe Harrison, who impressed in wins over Wales and Ireland, for the decider. Harrison - on a wide Allianz Stadium pitch - is suited to finding space behind France's back three, and with a strong performance could seal a starting spot before a home Rugby World Cup that starts in August. "A big, long kicking game where you can pressure France is going to be huge," former England fly-half Katy Daley-Mclean told BBC's Rugby Union Weekly. "France are not going to want to get into a territory battle, they are going to want to have their territory in the 22 when they can dominate with their big carries."

  Scotland flanker Evie Gallagher was a constant threat at the breakdown in Leicester to record three turnovers, finding particular success in the second half to slow down England's ball. "We could have been more ruthless at the breakdown in the second half," flanker Marlie Packer told BBC. "It's not about the scoreboard it's about our individual targets." Prior to the win over Scotland, England struggled in the first half against Ireland, leading only 7-5 at half-time, with the hosts also producing vital turnovers to nullify the Red Roses. France number eight Teani Feleu is joint-second for turnovers in this year's Six Nations with four, while lock Manae Feleu is also handy over the ball and has made three steals at the breakdown. Les Bleues are likely to take note from Gallagher, who tops the overall stats with eight turnovers, and target England's breakdown to prevent quick ball reaching their clinical outside backs. Captain Zoe Aldcroft is top for attacking ruck arrivals (101) in the competition, and will need more support from the rest of her pack in order to retain the ball.

