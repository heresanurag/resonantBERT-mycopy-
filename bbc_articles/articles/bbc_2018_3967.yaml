title: 'Syria war: Inside Douma, Eastern Ghouta, bombed city of the ''chemical attack''
  - BBC News'
date: '2018-04-17'
section: General
url: http://www.bbc.co.uk/news/world-middle-east-43796356
content: |-
  A journey into the recently recaptured city reveals humanitarian suffering and a bomb-making factory.

  Douma was the last rebel-held city in eastern Ghouta and an alleged chemical attack here led to the US, UK and France carrying out missile strikes in Syria.

  Now under the control of the Assad regime, Seth Doane, CBS, was the only American network correspondent to view the site, visiting the building where the 'chemical attack' took place and finding a bomb on a rooftop.
