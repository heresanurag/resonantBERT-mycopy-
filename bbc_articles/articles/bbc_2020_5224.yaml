  RNLI: 'Stop people going to beaches before more lives are lost'

  The chief executive of the RNLI has called on the Government to restrict access to the coast after two people died in Cornwall on Monday. In an open letter, Mark Cowie said the lifting of lockdown restrictions in England had put the charity in an "impossible situation" in which they had to choose whether to put lifeguards or the public at risk. He wrote that - despite warning that no lifeguards were on patrol - lifeboat crews had their busiest weekend of the year so far due to crowded beaches, hot weather and large waves. On Monday, a 17-year-old girl died after a boat capsized near Wadebridge and a man died after being pulled from the water by a member of the public in Padstow. Mr Cowie wrote: "Safety advice and warnings will only go so far when people are desperate to enjoy some freedom after weeks of lockdown. "As a lifesaving charity, the RNLI cannot stop people going to beaches - but the government can - before more lives are lost around our coast this summer."
