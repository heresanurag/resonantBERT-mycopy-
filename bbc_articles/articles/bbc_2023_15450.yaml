content: |-
  The pair were filmed on the rail line at a site that sees 130 trains a day pass at up to 100mph.

  Two cyclists have been captured in "shocking" CCTV footage taking photos on a railway line.

  The incident was filmed at the Calcot Mill level crossing in west Berkshire as a woman poses on the tracks on a stretch of the railway where 130 trains a day pass through at speeds of up to 100mph.

  Network Rail has released the footage following "a concerning rise in the number of trespassers" on the route between Penzance in Cornwall and London Paddington.

  The rail operator said many of the reports have involved children and young people and the majority of incidents have been seen in Gloucester, Cheltenham, Trowbridge, Bridgwater, Plymouth and in and around Bristol, especially near stations and on level and foot crossings.

