title: Woman, 41, killed in American Bulldog attack in Aberdeen - BBC News
date: '2024-12-09'
section: NE, Orkney & Shetland
url: http://www.bbc.co.uk/news/articles/c5y4vjl8yyzo
content: |-
  Michelle McLeod was described by relatives as a much-loved mother and daughter.

  A woman has been killed in a dog attack at a flat in Aberdeen. Michelle McLeod, 41, died at the scene after emergency services attended the incident in the city's Foresterhill Road on Saturday night. Police said that the dog - which it is understood was registered as an American Bulldog - had since been destroyed. Ms McLeod's family in a statement: "She was a much-loved mother, daughter and friend to many and will be sorely missed by all who knew her".

  Police Scotland said inquiries into the incident were ongoing. A force spokesperson said: "Police received a report that a woman had been seriously injured by a dog within a flat. "Emergency services attended but the 41-year-old woman died at the scene." Ms McLeod's family has asked for privacy following her death. They added: "We are devastated by the loss of Michelle."
