title: Black box recovered from Prigozhin crash site - Russia - BBC News
date: '2023-08-25'
section: Europe
url: http://www.bbc.co.uk/news/live/world-europe-66608237
content: |-
  Ten bodies have also been recovered from the scene of the plane crash near Moscow, Russian authorities say.

  As we head into the weekend, the mystery surrounding the potential death of Wagner leader Yevgeny Prigozhin remains.

  Russia has branded allegations that it ordered his killing a "complete lie" but officials there continue to refer to him in the past - including Vladimir Putin.

  The Russian leader's spokesman Dmitry Peskov refused to say if the Kremlin knows for certain whether Prigozhin was on board a plane that went down near Moscow on Wednesday.

  We do now know that 10 bodies and a black box were recovered at the crash site, according to Russian authorities, but who they are is yet to be confirmed.

  Until there is official confirmation of Prigozhin's death, it seems the mystery and confusion will only intensify.

  Thanks for following today's coverage, which was written by Antoinette Radford, Oliver Slow, Joel Guinto, Ece Goksedef and Adam Durbin. It was edited by Matt Murphy, Sam Hancock, Dulcie Lee and Nathan Williams.

