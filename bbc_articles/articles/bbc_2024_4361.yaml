title: Watch the moment divers free trapped whale sharks - BBC News
date: '2024-03-14'
section: General
url: http://www.bbc.co.uk/news/world-asia-66254335
content: |-
  Five whale sharks were found trapped in fishing nets in Indonesian waters.

  Underwater footage captured the moment divers freed five whale sharks from fishing nets in waters off Indonesia.

  Whale sharks are the largest species of fish but their numbers are decreasing, according to the International Union for Conservation of Nature.
