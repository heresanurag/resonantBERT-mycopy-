title: 'Avonmouth: Four dead in ''tragic'' explosion - BBC News'
date: '2020-12-03'
section: General
url: http://www.bbc.co.uk/news/uk-55179100
content: |-
  An investigation is under way into a fatal blast at a waste water treatment works in Avonmouth, Bristol.

  Four people have died following a large explosion at a waste water treatment works near Bristol.

  Firefighters were called to Wessex Water's premises in Avonmouth, Bristol, at about 11:20 GMT.

  Three of the people who died worked for the firm and the other was a contractor.

  Ch Insp Mark Runacres of Avon and Somerset Police told reporters an investigation was under way into the "tragic incident."
