  HurlyBurly Theatre introduces babies to opera in a production that explores the magic of nature.

  HurlyBurly Theatre is introducing babies to opera in a production that explores the magic of nature. You are the Sun combines sensory play and singing.

  It is aimed at children aged up to two years old and the audience is encouraged to join in with the performers as the production unfolds.

  BBC London went to a performance at the Southbank Centre to meet the co-founder of HurlyBurly Theatre Catherine Carter and speak to some of the parents.

  The production is touring and will be at the New Wimbledon Theatre as part of the Wimbledon Children's Festival on the 9 and 10 August.

