title: 'Mars: Nasa helicopter ''Ingenuity'' flight a success - BBC News'
date: '2021-04-19'
section: General
url: http://www.bbc.co.uk/news/science-environment-53587718
content: |-
  Ingenuity has become the first rotorcraft to fly on another planet. This is how it works.

  Nasa has confirmed that this small helicopter has made history by becoming the first to successfully fly on another planet.

  Ingenuity took its test flight on Monday 19 April but it wasn't until later in the morning that data showed it had worked.

  Ingenuity is a 1.8kg (4lb) helicopter that travelled to Mars inside Nasa's Perseverance rover, which landed in February 2021.

  Flying on the Red Planet isn't straightforward - as BBC science reporter Laura Foster and Nasa systems engineer Farah Alibay explain.
