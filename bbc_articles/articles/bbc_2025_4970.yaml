  Local elections 2025: Is there an election in my area?

  On Thursday 1 May elections will be held for 23 councils and six mayors in England. Around a third of electors in England are eligible to vote, and more than 1,600 councillors will be elected. In some parts of England, local elections have been postponed because the government is planning to reorganise local councils. Use our tool to find out whether there is an election near you.

  A modern browser with JavaScript and a stable internet connection is required to view this interactive. More information about forthcoming elections (Opens in a new browser tab) Is there an election in my area? To provide information about any elections in your area, the BBC collaborates with the Electoral Commission and sends them your personal data. Data privacy notice (Opens in a new browser tab) There is currently a problem with the service. Please try later. To make sure you get the correct information, please choose your address:

  Most of the councils up for election are county councils - large authorities like Lancashire and Kent that look after services including social care, education, road maintenance and libraries. In parts of England with no district councils, like in Cornwall, Doncaster and Buckinghamshire, local authorities are responsible for the full range of services - these also include bin collections, public housing and planning.
  • None When and where are the local elections?

  Mayors in Cambridgeshire and Peterborough, Doncaster, North Tyneside, and the West of England are up for election. While in two areas - Hull and East Yorkshire, and Greater Lincolnshire - voters will have the chance to elect a mayor for the first time.
