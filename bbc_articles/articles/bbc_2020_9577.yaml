content: |-
  First Minister Nicola Sturgeon says head teachers and teaching unions are being consulted about pupils wearing face coverings in non-classroom areas.

  Scotland to go beyond WHO guidance on face masks in schools

  The first minister says over the weekend the World Health Organisation (WHO) has issued fresh guidance saying children over the age of 12 should wear masks. Ms Sturgeon confirms the education secretary is in the final stages of consulting with teachers and education authorities on a recommendation for the use of face coverings in secondary schools. This would be for staff and pupils when they are moving around in communal areas like corridors. She explains this is being consulted on because mixing of different groups is more likely in this area, as is crowding and a lack of sufficient ventilation. The first minister tells the briefing the government will go slightly beyond WHO guidance. She adds the position on school transport is being considered but the use of face coverings in school class rooms is not being consulted on. That's because there is more scope for physical distancing in the classroom, but where there are outbreaks this could be an option she explains.
