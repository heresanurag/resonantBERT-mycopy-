  Watch the Duchess of Cornwall tell Lord Dobbs how being a "pony-mad child" influenced her reading habits.

  The Duchess of Cornwall has been telling Lord Dobbs the importance of reading to children as part of his Christmas guest editorship of BBC Radio 4’s Today programme.

  Looking back on her own childhood favourites, the Duchess of Cornwall said she was "pony-mad" and cited Black Beauty as one of her favourites.

  Listen to the full interview from 06:00 GMT on 27 December on BBC Radio 4 and BBC Sounds.
