  Sara Davies to 'step away' from Dragons' Den

  Davies has appeared on Dragons' Den since 2019, when she replaced Jenny Campbell

  Entrepreneur Sara Davies has announced she will step away from filming TV show Dragons' Den for the rest of this year to focus on her own business. Davies became the youngest ever female Dragon when she joined the series aged 35 in 2019. In a statement on Instagram, Davies said she had "taken the decision to step away from the Den for now, to focus on my own business" - a crafting company she launched in 2005. Davies will still appear in the second half of the current series later this year, which has already been filmed.

  The wording of her statement allowed the possibility for Davies to return in the future. The BBC has not yet announced who will replace her. In her post, Davies said: "As this last run of Dragons' comes to an end I have to say I've loved every minute of this series so far and I'm so proud of the businesses I've invested in this year! "As a lot of you will know, I've taken up my position again as CEO of Crafter's Companion and my business is my big priority this year. And when I commit to a business, I really commit, which is why I find Dragons' Den such a rewarding role. "As well as filming an incredible show, being a Dragon requires so much dedication and time behind the scenes as you join the life of each business you invest in. "It means seeing through your investment and committing to your part in that organisation. It's so much more than a TV show. "That's why taken the decision to step away from the Den for now, to focus on my own business, which was my first baby! "So I won't be filming with the team this year for the next series."

  Davies has gone on to host other TV series such as The Big Idea Works

  Dragons' Den launched in the UK in 2005, and sees entrepreneurs pitch their businesses to five wealthy investors. International versions of the show include the US spin-off Shark Tank. Davies, who was born County Durham, has also appeared on Strictly Come Dancing, written a memoir, and hosted TV series Ultimate Wedding Planners and The Big Idea Works. She is also set to host a new "high-stakes" quiz show on ITV called Time Is Money. The 40-year-old ended her Instagram post by "sending so much love to my fellow Dragons and the amazing team behind it all". Kalpna Patel-Knight, head of entertainment commissioning at the BBC, said: "Sara has been an exceptional Dragon, investing in numerous entrepreneurs over her years in the Den. We wish her all the best and hope to have her back in future series." The other current Dragons are Steven Bartlett, Peter Jones, Deborah Meaden and Touker Suleyman. Recent guest Dragons have included Joe Wicks, Emma Grede and Trinny Woodall.
