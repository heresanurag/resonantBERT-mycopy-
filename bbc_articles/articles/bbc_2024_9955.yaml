title: 'Mexico surfer deaths: Girlfriend shares victim''s last voicemail - BBC News'
date: '2024-05-10'
section: US & Canada
url: http://www.bbc.co.uk/news/world-us-canada-68984998
content: |-
  Callum Robinson, his brother and a US friend were murdered in an apparent robbery attempt.

  The girlfriend of an Australian surfer murdered in Mexico received a heart-rending voicemail shortly before he died, she has revealed. Callum Robinson, 33, was traveling with his brother Jake and a US friend, Jack Carter Rhoad, when the trio were murdered near the town of Ensenada. A Mexican man has been charged in their disappearance and reportedly has confessed. Authorities believe the victims were killed while resisting a robbery. On Instagram, Callum's girlfriend Emily Horwath shared the last voicemail he left her, which began with the words, "happy Tuesday! Good morning". "It's 11:11 and I'm just thinking about you. Just wanted to drop you a quick message and say hello," Callum said. "Hope you're having a phenomenal start to your day." "I'm sensing a big grin on your face for some reason today," he added. "I hope you're full of positivity and smiles." Ms Horwath captioned the Instagram story with the words "I will play this on repeat". The bodies of the Robinson brothers and Mr Rhoad were found six days after they vanished 27 April, each with a gunshot wound to the head, according to Mexican authorities. A fourth body found in the same area had been there longer and is not believed to be connected to the case.

  On Wednesday, a suspect in the case - known as "El Kekas" - appeared in court on kidnapping charges. Mexican authorities have said murder charges will also be filed in the case. The suspect, who can only be described under Mexican law by his first names, Jesús Gerardo was detained along with his girlfriend and another man. In court on Wednesday, the girlfriend - who has yet to be charged with a crime - said that Jesús had come to her home on 28 April and confessed to having murdered "three gringos". "I killed them," she said he told her. The crime, near the well-worn tourist and surfer town of Ensenada, has shocked the community, which has long been considered an oasis of calm in the notoriously violent state of Baja California. Protesters, some carrying surfboards bearing slogans demanding more to be done to ensure safety on local beaches, marched through the city on Sunday.
