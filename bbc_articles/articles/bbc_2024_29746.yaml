  Here's what you need to know about the Trump family.

  The Trump family: A guide to an American dynasty

  Before politics, Donald Trump built a dynasty with a multimillion-dollar inheritance, a brand name and a lot of expensive real estate. Now that brand - and that name - is synonymous with the Republican Party, with various members of the Trump family now wielding influence. As Trump prepares to return to the White House, here are some of the most prominent family members.

  Donald Trump Jr, the eldest of the Trump children, has taken on a larger role in the years since his father left the White House. He was prominent in the media during the selection of Trump's running-mate JD Vance who, he says, is a friend. "It's an incredible pick," he said at the Republican National Convention (RNC). "Truly a great choice." He made no secret Ohio Senator JD Vance was his first pick and he got his wish. Donald Trump Jr was previously married to Vanessa Trump, with whom he shares five children. He is now engaged to Kimberly Guilfoyle.

  Like his brother, Eric Trump, the third of Trump's children, has lobbied his father about issues important to him, according to reports. He has kept a less public persona than his older brother but also maintains a leading presence in the Trump family business.

  Ivanka Trump and Jared Kushner were arguably the most influential family members during Trump's first stint in the White House. The pair have been married since 2009 and share three children. During Trump's time in office, Ivanka made numerous appearances on behalf of her father and his administration. Mr Kushner held a senior adviser role in the White House from 2017 to 2021.

  The fourth child of the former president and the only one of Trump's children born to his second wife, Marla Maples. She has not maintained any political role in her father's campaigns or time in the White House. She has been married to Michael Boulos since 2022.

  Kimberly Guilfoyle and Donald Trump Jr have been together for six years and engaged since 2020. She was a Fox News presenter from 2006 to 2018, before leaving to become a member of a pro-Trump super PAC (political action committee). Like her fiancé, she has been an outspoken supporter of Trump, particularly in TV appearances. She was married to California Governor Gavin Newsom in the early 2000s.

  Married to Eric, she is the rising star of the family, particularly since she began serving as Republican National Committee co-chair earlier this year. She has two children with Eric. In July, she gave a speech at the convention and spoke warmly of her father-in-law. "Our family has faced our fair share of death threats... none of that prepares you as a daughter-in-law to watch in real time someone try to kill a person you love," she said.

  Melania Trump, who returns to the White House as First Lady for a second term, has been married to Trump since 2005. She maintained a low profile during Trump's first term in office and has made few public appearances since. In July, she made an unexpected appearance at the convention, just days after an attempt on her husband’s life. In a memoir released in October, she shared her pro-choice stance on abortion. Her position is in contrast with that of her husband who has taken credit for helping overturn Roe v Wade, upending the constitutional right to abortion. Barron Trump, 18, is her only child with Trump.
