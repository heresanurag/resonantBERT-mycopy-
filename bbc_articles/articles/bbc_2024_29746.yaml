  Barron Trump has largely stayed out of the spotlight during campaigning. In May, it was reported he would be among the delegates from the state of Florida attending the convention in July, but a day later his mother stated that he had declined the offer. He graduated from Oxbridge Academy in Palm Beach, Florida, in May and his father says he is now studying at Stern School of Business at New York University.

  Kai Trump is the eldest of Trump's grandchildren and the daughter of Donald Trump Jr and his former wife Vanessa Trump. The 17-year-old is a keen golfer and spoke at the convention about what Trump is like as a grandfather. “To me, he’s just a normal grandpa. He gives us candy and soda when our parents aren’t looking,” she said.
