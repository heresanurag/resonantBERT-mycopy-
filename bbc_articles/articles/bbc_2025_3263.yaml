title: JD Vance's cousin criticises him for 'belittling' Zelensky - BBC News
date: '2025-03-10'
section: US & Canada
url: http://www.bbc.co.uk/news/articles/cm2yl5kevrpo
content: |-
  Nate Vance spent three years volunteering with the Ukrainian military after Russia's full-scale invasion.

  Vice-President JD Vance said President Zelensky should be more grateful for US support during the heated White House exchange

  US Vice-President JD Vance's cousin has criticised him and President Donald Trump for "belittling" Volodymyr Zelensky during the three men's Oval Office showdown in February. "There's a certain level of decorum that I expect from political leaders, especially in front of cameras," Nate Vance - who spent three years volunteering with the Ukrainian military after Russia's full-scale invasion - told the BBC. It follows his earlier comment that Trump and Vance were acting like "useful idiots" for President Vladimir Putin in their handling of the conflict. Last month US and Russian officials held direct talks on ending the war. US and Ukrainian officials are currently in Saudi Arabia for talks.

  Nate Vance told the BBC's PM programme on Monday that he was "not happy" with the way in which the White House meeting had been handled by his cousin and Trump. "I'm kind of attached to the Ukrainian issue but, looking at that, if it were some other completely neutral issue and I saw White House officials and hack journalists that are political belittling a foreign leader, I'd be like 'what the hell is going on?'" he told the BBC. The televised Oval Office meeting between the leaders quickly turned heated, with Trump threatening to withdraw support from Ukraine if a deal was not made and accusing the Ukrainian President of "gambling with World War Three". Vance called Zelensky "disrespectful" for "litigating" the dispute in front of the media and accused him of not expressing gratitude for America's support during the war. Nate Vance said that he did not agree that Zelensky had failed to show appreciation. "Zelensky does a daily or nightly address and thanks everyone who supports Ukraine on a daily basis," he said. He said that perhaps the Ukrainian leader had not shown "enough deference to Donald Trump" but that it would be "odd for my cousin and Donald Trump to ask for deference because they've been actively working against his initiatives for the past three years". Zelensky was eventually asked to leave the White House and a planned news conference was cancelled. Following the meeting, the Trump administration halted military aid, satellite imagery and intelligence sharing to Kyiv.

  One American reporter during the meeting in the White House accused Zelensky of disrespecting the occasion by not wearing a suit. Since the start of the war, Zelensky has eschewed suits for military-style dress in what he says is solidarity with soldiers. "Everyone knows that's why he does that and it's kind of a symbolic thing," Nate Vance said. "Who cares? It's a silly hill to die on. And speaking of which, why is Elon Musk in the Oval Office wearing a baseball hat and a T-shirt all the time?" In an interview with French newspaper Le Figaro earlier on Monday, Nate Vance said his cousin was a "good guy, intelligent" but that the meeting with Zelensky was "an ambush of absolute bad faith". He later told the PM programme that he had been a "Republican my whole life so this is an odd stance for me to be taking but I'm pretty passionate about it and it's one issue where I think we're doing wrong". He said it was unlikely his cousin would want to speak to him following his comments. Asked about other Americans' view of the encounter, he said 20% would be "disheartened" and that "all of this alienation is isolating us and the last time we decided to take an isolationist path we ended up with World War One and World War Two". Zelensky subsequently said the angry exchange had been "regrettable" and it was "time to make things right". The US is attempting to mediate with both Russia and Ukraine in hopes of ending the war. Last week, Trump said that he was "doing very well with Russia" and that it was "more difficult, frankly, to deal with Ukraine".
