title: Runner, 10, already breaking records - BBC News
date: '2018-12-05'
section: General
url: http://www.bbc.co.uk/news/uk-england-leicestershire-46446789
content: |-
  Shaikira King won a national cross country championships and now has higher ambitions.

  A 10-year-old runner from Leicestershire who is the national U11 girls' cross country champion, is being tipped as an Olympic hopeful.

  Shaikira King, from Loughborough, won her 12th consecutive race at the Leicestershire and Rutland Schools Cross Country at Prestwold on Saturday.

  She started running competitively four years ago and says she dreams of representing Team GB.
