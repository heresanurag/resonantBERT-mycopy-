  But some viewers suggested ratings could drop as a result of the inclusion of same-sex dancing.

  Several readers contacted BBC News to say they would stop watching Strictly if same-sex couples became a regular feature of the show.

  Former Strictly professional Robin Windsor referred to the negative comments in his tweet but encouraged viewers to just "enjoy the artistry".

