title: 'BTS: Suga apologises for driving scooter under influence - BBC News'
date: '2024-08-07'
section: Culture
url: http://www.bbc.co.uk/news/articles/cy0rl85rjvyo
content: |-
  Suga from the K-Pop band was fined and lost his licence after a police officer saw him falling over.

  Suga said sorry to "those who have been hurt by my carelessness and wrongful behaviour"

  Suga from K-pop boy band BTS has apologised for driving an electric scooter while intoxicated. Posting on social media, the 31-year-old said he was "very heavy-hearted and apologetic" to bring his fans "disappointing news". In the post, the rapper explained he had "violated the road traffic act" when he had driven home in Seoul "thinking it was a close distance" and "[forgot] that you can't use an electric scooter under the influence". "I fell while parking the electric scooter in front of my house, and there was a police officer nearby," he wrote. "I was given a breathalyser test and subsequently had my license revoked and was fined."

  His blood alcohol level was 0.227%, far exceeding the 0.08% threshold, say local media reports quoting police. He added: "Although no one was harmed and no property was damaged, this is entirely my responsibility with no excuses. "I apologise to those who have been hurt by my carelessness and wrongful behaviour, and I will ensure that this does not happen again in the future." The phenomenally successful boy band are currently on hiatus as its members complete military service. Suga started his service last year and is working as a social service agent after being ruled unfit for regular combat duty. Local media reported the star's alternative service was likely to be related to shoulder surgery that he required in 2020. BTS's record label Bighit have also issued an apology for the scooter incident. "We express our sincere apology for the incident involving BTS member Suga and his electric kickboard accident," they said in a statement. "We apologise for the disappointment caused by the artist's inappropriate behaviour. "As a social service agent during his military service, he is prepared to accept any disciplinary actions from his place of work for causing a social disturbance. "We will take greater care to ensure that such incidents do not happen again in the future."
