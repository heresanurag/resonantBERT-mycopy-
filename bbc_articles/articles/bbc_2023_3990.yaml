  Alia Ramna, 22, a transgender woman from Cardiff, has also been put through conversion therapy.

  She said: "I knew I was different and it was a gradual realisation, but it got to a breaking point when I was 16 and I couldn't conform anymore.

  "I realised if I didn't come out I would die because I couldn't see myself as a man anymore.

  "I saw no other option, it was either death or transition."

  Alia Ramna went through conversion therapy in an effort to try and suppress her gender identity

  Ms Ramna said when her family found out, they made her recite religious verses to "pray the gay away".

  "For conversion therapy to still be happening in 2023 is awful - it is still happening in homes and behind closed doors," she said.

  Ms Ramna said there needed to be safe spaces for trans and non-binary people and discreet ways for people to seek help.

  Andrea Williams, chief executive of Christian Concern, said the ban would "end up criminalising consensual conversations with those who genuinely want help and support".

  Christian Concern is preparing legal action against any proposed legislation in this area.

  The Evangelical Alliance, which said it represented 3,500 churches, argued a ban could jeopardise religious freedoms.

  The Muslim Council of Wales said it had deep reservations, adding the ban could undermine religious freedoms.

  A spokesman added: "To protect minorities from harmful and abusive treatment is a worthy goal, however legislation is a blunt tool and often produces unintended consequences."

  The planned ban will outlaw attempts to change someone's sexuality or gender identity

  However, the Church of England said the practice had "no place in the modern world".

  The UK government said it would be publishing a draft bill to ban conversion practices.

  A spokesperson added: "The police are experienced at dealing with crimes in private settings, and we will publish more details of how the ban will protect those at risk in due course."

  If you have been affected by any of the issues in this story, the BBC Action Line has links to organisations which can offer support and advice.
