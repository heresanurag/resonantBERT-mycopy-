title: 'Turkey-Syria earthquake: Dog rescued after 23 days under rubble - BBC News'
date: '2023-03-02'
section: General
url: http://www.bbc.co.uk/news/world-europe-64817526
content: |-
  More than 50,000 people died when earthquakes shook southern Turkey and northern Syria last month.

  A dog has been found by a rescue team in Hatay, Turkey, 23 days after devastating earthquakes shook the region.

  More than 50,000 people were killed in southern Turkey and northern Syria and thousands more remain missing.
