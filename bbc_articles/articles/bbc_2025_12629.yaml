title: Qatar reopens airspace after Iran's attack on US base near Doha - BBC News
date: '2025-06-23'
section: World
url: http://www.bbc.co.uk/news/articles/cqx29w0lrx0o
content: |-
  The US embassy in Qatar has also lifted its shelter-in-place order and said operations will resume as normal on Tuesday.

  Qatar reopens airspace after Iran's attack on US base near Doha

  Doha's Hamad airport is one of the world's busiest transit hubs

  Qatar has reopened its airspace after closing it earlier on Monday in anticipation of retaliatory attacks by Iran on a US air base near Doha. Iran launched missiles at al-Udeid air base on Monday evening. Both Qatari and US officials said nearly all were intercepted and their were no casualties or injuries. Prior to Iran's attack, the US embassy in Qatar had urged American citizens to shelter-in-place "out of an abundance of caution". That order has since been lifted, with the embassy saying operations will resume as normal on Tuesday. Monday's attack by Tehran comes two days after the US launched massive strikes against three nuclear facilities inside Iran.

  Shortly after midnight on Tuesday local time, Qatari officials announced that air travel in the country could resume as normal. Earlier on Monday, Qatar's Ministry of Foreign Affairs said it was closing its airspace to ensure the safety of residents and visitors, without offering further details. Around the same time, the US embassy in Qatar suggested in a notice online that Americans should shelter in place "until further notice". The UK government issued a similar warning to its citizens in Qatar, saying it was doing so in response to the US alert. The warnings came ahead of a missile attack by Iran on al-Udeid Air Base, which serves as the headquarters for US Central Command's air operations in the Middle East and hosts nearly 8,000 US troops, according to the State Department.

