title: 'Brecon: Choir escapes dramatic coach fire unhurt - BBC News'
date: '2024-09-29'
section: General
url: http://www.bbc.co.uk/news/videos/cje3yvzj22po
content: |-
  The singers were returning home from a contest when the blaze broke out.

  A choir escaped unhurt after their coach caught fire on the way home from a competition - but their £300 cash prize went up in smoke.

  Bechgyn Bro Taf's singers were returning to Cardiff after competing at the 70th Llanwrtyd Eisteddfod in Llanwrtyd Wells, Powys, on Saturday night.

  Their vehicle caught fire on the A470 at Libanus, near Brecon, along with their winnings.

  The 21 choristers had to await recovery from a second coach.

  Mid and West Wales Fire and Rescue Service said part of the road remained closed on Sunday afternoon after the fire reignited earlier in the day.
