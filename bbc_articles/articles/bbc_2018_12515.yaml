id: bbc_2018_12515
title: '''Wildcat kittens'' filmed by hillwalker in Cairngorms - BBC News'
date: '2018-10-23'
section: General
url: http://www.bbc.co.uk/news/uk-scotland-45944385
content: |-
  A hillwalker near Lochnagar in Aberdeenshire spotted the litter of young cats.

  What appears to be three wildcat kittens have been filmed by a hillwalker in the Cairngorms.

  Chris Usher was near Lochnagar in Aberdeenshire when he spotted the litter of young cats.

  Estimates suggest there are between 100 and 300 wildcats left in Scotland. They are under threat from cross-breeding with domestic cats.

  Scottish Wildcat Action said the footage appeared to show genuine wildcat kittens.
