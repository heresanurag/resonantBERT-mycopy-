title: Paul Danan died after taking cocktail of drugs including cocaine and heroin,
  inquest hears - BBC News
date: '2025-03-11'
section: Bristol
url: http://www.bbc.co.uk/news/articles/cx2gdv216gko
content: |-
  The Hollyoaks and reality TV star died at the age of 46 at his home in Bristol on 16 January.

  Hollyoaks actor and reality TV star Paul Danan died at his Bristol home from a cocktail of drugs including cocaine and heroin, an inquest opening has been told. Danan died in January at the age of 46. The inquest was opened and adjourned on Tuesday at Avon Coroner's Court, with senior coroner Maria Voisin setting a provisional date of 28 May for the actor's full inquest hearing. Danan, who played Sol Patrick in Hollyoaks, was also known for his appearances on the likes of Celebrity Love Island and Celebrity Big Brother.

  Coroner's officer Alexis Camp told the hearing that Danan was pronounced dead at his home in Brislington, Bristol, at 5.20pm on 15 January. His body was identified at the scene by his partner, Melissa Crooks. Ms Camp said: "The circumstances are that Mr Danan was found unresponsive at his home address. "Emergency services attended and confirmed he had sadly died. A post-mortem has taken place and samples have been removed for further analysis." The court was told that the provisional cause of Danan's death is combined toxicity of heroin, methadone, codeine, pregabalin, cocaine, zopiclone, contributed to by benzodiazepine use. Ms Camp said: "I understand there are no family concerns," adding that "no note was left" by the star. Statements will be taken from Danan's GP, family, police, the ambulance service and inquiries are ongoing with Avon and Wiltshire Mental Health Partnership NHS Trust (AWP), she said.

  Danan had been due to appear for a plea hearing at Warrington Magistrates' Court on 16 January after being charged with being in possession of cocaine and cannabis, according to court documents. He was also accused of driving whilst under the influence of drugs on 2 October last year, in Warrington, Cheshire. Danan had openly discussed previous issues with drugs, including addictions to cocaine and codeine, which he said he used to "self-soothe" after losing acting parts in his 20s while in the US. He also said that he had spent more than £1m on rehab over the years. In 2020, Danan launched drama classes in Bristol, his adopted home, for adults with mental health or addiction issues, or who have been through trauma or been in prison. Speaking at the time of his death, the actor's management company said he was "known for his television presence, exceptional talent and unwavering kindness", and had been "a beacon of light to so many".
