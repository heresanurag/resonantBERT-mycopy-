title: 'Strictly Come Dancing: BBC to introduce chaperones in rehearsal rooms - BBC
  News'
date: '2024-07-17'
section: Culture
url: http://www.bbc.co.uk/news/articles/cv2gkrlvkyno
content: |-
  A member of production staff will be in all rehearsals following complaints about two former dancers.

  Graziano Di Prima has said he "deeply regrets" the events leading up to his departure

  The BBC is to put a member of the Strictly Come Dancing production staff in all future rehearsals following complaints about the behaviour of two former professional dancers during training. There will also be two new dedicated welfare producers, as part of a string of extra measures. The announcement comes after the news that Giovanni Pernice and Graziano Di Prima will not return for this year's series. Earlier on Tuesday, TV star Zara McDermott, who was partnered with Di Prima last year, said she was involved in incidents in the Strictly training room that she now finds "incredibly distressing" to watch back.

  A statement from the corporation said: "The BBC is today announcing additional steps to strengthen welfare and support on Strictly Come Dancing. "Concerns that have arisen in recent months have been fundamentally about training and rehearsals. The actions we announce today are designed to address that."
  • None have a production team member present during training room rehearsals at all times
  • None deliver further training for the production team and crew Kate Phillips, the BBC's director of unscripted, said: "Whilst we know our shows have been positive experiences for the vast majority of those who have taken part, if issues are raised with us, or we’re made aware of inappropriate behaviour, we will always take that seriously and act. "Concerns that have arisen have been fundamentally related to training and rehearsals. "The decisive steps we have taken and are announced today, act to further strengthen the welfare and support in place for everyone involved with this production."

  Giovanni Pernice has rejected "any suggestion of abusive or threatening behaviour"

  Last month, Pernice was left out of the new line-up, with a legal firm saying it had contacted the BBC regarding "numerous serious complaints" about his alleged behaviour during the last series. He said he was surprised by allegations about his dance teaching methods, and rejected "any suggestion of abusive or threatening behaviour". Di Prima was then dropped, before McDermott issued her statement referring to a negative experience in the training room. "Reports have been made about my treatment on the show and there were witnesses to some events, as well as videos of particular incidents which are incredibly distressing to watch," she said. Di Prima has not responded to her comments. When his departure was announced at the weekend, he said he "deeply regrets" the events leading up to his departure and acknowledged that his "intense passion and determination to win might have affected my training regime".

  TV journalist Caroline Frost said the claims had cast a shadow over the show's 20th anniversary year. "They were hoping to pop the champagne corks and be toasting a completely unarguable success," she told BBC News. "Instead, there is a shadow because of allegations of bad behaviour behind the scenes. And now the BBC is finding itself on the back foot. It’s making changes today." Strictly's bosses are expected to reveal the celebrity line-up for this year's series soon. "I think they will be very much hoping that a huge big press launch comes in the next few weeks, a good line-up, that everybody can move on, and that no more bad stories come out in the mean time," Frost added.
