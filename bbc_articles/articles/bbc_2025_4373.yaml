title: Moment Nasa astronauts begin journey back to Earth - BBC News
date: '2025-03-20'
section: General
url: http://www.bbc.co.uk/news/videos/clydp1zee90o
content: |-
  Two astronauts are returning home after nine months in space.

  Two Nasa astronauts who've been on the International Space Station (ISS) since last June have begun their journey back to Earth aboard a SpaceX Dragon flight.

  Suni Williams and Butch Wilmore were sent on an eight-day mission that turned into a nine-month stint following technical issues with their Boeing Starliner capsule.

  The trip back home is expected to last almost 17 hours.
