title: Supreme Court rules Trump officials must 'facilitate' release of man deported
  to El Salvador - BBC News
date: '2025-04-12'
section: World
url: http://www.bbc.co.uk/news/articles/c62gnzzeg34o
content: |-
  The government has said Kilmar Abrego Garcia was deported in error, but has resisted returning him to the US.

  Supreme Court rules Trump officials must 'facilitate' release of man deported to El Salvador

  The US Supreme Court has ruled unanimously that the Trump administration must try to release a Maryland man who was mistakenly deported to a mega-jail in El Salvador. In a 9-0 ruling, the justices declined to block a lower court's order to "facilitate" bringing back Kilmar Ábrego García, but they also said Judge Paula Xinis may have exceeded her authority. On Friday Judge Xinis directed the Trump administration to provide her with daily updates on what steps they are taking to bring Mr Ábrego García back to the US. The government has conceded Mr Ábrego García was deported due to an "administrative error", though it also alleges he is a member of the MS-13 gang, which his lawyer denies.

  Mr Ábrego García, a Salvadorean, is one of dozens of alleged gang member migrants placed by the US on military planes last month and flown to El Salvador's notorious Cecot (Terrorism Confinement Centre) under an arrangement between the two countries. Following the Supreme Court's order, lawyers for the Trump administration went in front of Judge Xinis of the Maryland district court on Friday to explain how they will release Mr Ábrego García. The judge had asked the government to explain by that morning how they planned to bring Mr Ábrego García back, but justice department attorneys filed a motion asking for the deadline to be extended until Tuesday evening. During an at-times tense hearing that lasted about half an hour, Judge Xinis repeatedly pressed the justice department for specifics on Mr Ábrego García's whereabouts. "I'm not asking for state secrets," she said. "I'm asking a very simple question: where is he?" Judge Xinis ultimately ruled that the government must provide her with daily updates on Mr Ábrego García's location and status, what efforts it had previously taken to get him back to the US and what efforts it will undertake. In court documents, Mr Ábrego García's lawyers accused the government of trying to "delay, obfuscate and flout court orders, while a man's life and safety is at risk".
  • None Can the US return man deported to El Salvador? In its emergency appeal to the Supreme Court last week, the Trump administration argued that Judge Xinis lacked the authority to issue the order to return Mr Ábrego García by Monday night, and that US officials could not compel El Salvador to return him. US Solicitor General Dean John Sauer wrote in his emergency court filing: "The Constitution charges the president, not federal district courts, with the conduct of foreign diplomacy and protecting the nation against foreign terrorists, including by effectuating their removal." The Supreme Court, which has a 6-3 conservative majority, issued its decision in an unsigned order on Thursday. The justices did not give the administration a deadline for when Mr Ábrego García should be freed. They said Judge Xinis may have exceeded her authority when she required the Trump administration to "effectuate" Mr Ábrego García's return. "The district court should clarify its directive, with due regard for the deference owed to the executive branch in the conduct of foreign affairs," the Supreme Court order said.

