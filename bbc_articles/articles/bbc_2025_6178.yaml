  On Friday, President Donald Trump told reporters that if the Supreme Court said "bring somebody back I would do that". "I respect the Supreme Court," he said. A justice department spokesperson told the BBC that the Supreme Court correctly recognised "it is the exclusive prerogative of the president to conduct foreign affairs". "By directly noting the deference owed to the executive branch, this ruling once again illustrates that activist judges do not have the jurisdiction to seize control of the president's authority to conduct foreign policy." Mr Ábrego García, 29, entered the US illegally as a teenager from El Salvador. In 2019, he was arrested with three other men in Maryland and detained by federal immigration authorities. But an immigration judge granted him protection from deportation on the grounds that he might be at risk of persecution from local gangs in his home country. Democratic Senator Chis Van Hollen, who represents Mr Ábrego García, said the case marks a "troubling moment" for the US when it comes to the rule of law. "It took them only 72 hours to illegally abduct Abrego Garcia and take him out of the country to El Salvador," Van Hollen told BBC News. "They can get them back in 72 hours or less, and they need to do that. And they need to do it now." Mr Ábrego García's wife, Jennifer Vásquez Sura, is a US citizen and has been calling for his release since his deportation. "I will continue fighting until my husband is home," she told the New York Times on Thursday.
