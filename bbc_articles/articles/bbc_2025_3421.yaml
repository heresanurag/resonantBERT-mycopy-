title: Greenland's opposition wins election dominated by independence and Trump -
  BBC News
date: '2025-03-12'
section: World
url: http://www.bbc.co.uk/news/articles/cx2r3d0r8z0o
content: |-
  The Democrats party wants a gradual move to independence but the second-placed party is keen to speed it up.

  Jens-Frederik Nielsen (C) celebrated into the night as it became clear his Democrats party had won the election

  Greenland's centre-right opposition has won a surprise general election victory - in a vote dominated by independence and US President Donald Trump's pledge to take over the semi-autonomous territory. The Democratic party, which favours a gradual approach to independence from Denmark - achieved around 30% of the vote, near-complete results show. "Greenland needs us to stand together in a time of great interest from outside," party leader Jens-Frederik Nielsen told local media. "There is a need for unity, so we will enter into negotiations with everyone." His party will now have to negotiate with other parties in order to form a coalition.

  Greenland - the world's biggest island, between the Arctic and Atlantic Oceans - has been controlled by Denmark, nearly 3,000km (1,860 miles) away, for about 300 years. Greenland governs its own domestic affairs, but decisions on foreign and defence policy are made in Copenhagen. Five of the six main parties in the election favour independence from Copenhagen, but disagree over the pace with which to reach it.

  US president Donald Trump says he wants the US to take over Greenland. Many people think it will never happen. But could it? If so, how?

  The Democratic party, whose vote was up by more than 20% on 2021, is considered a moderate party on independence. Another opposition party, Naleraq, which is looking to immediately kick off the independence process and forge closer ties with the US, is on course for second place with almost a quarter of the vote. Support for Naleraq was boosted ahead of the vote by the decision of one of Greenland's most popular young politicians, Aki-Matilda Hoegh-Dam, to switch from one of the ruling parties. She came second only to Democrats leader Jens Frederik Nielsen in the popular vote. "It's the second biggest party, so you can't avoid them," Nielsen told local reporters. "But we don't want to rule out the other parties beforehand."

  Aki-Matilda Hoegh-Dam (C) celebrates with Naleraq leader Pele Broberg (L) and colleagues

  The two current governing parties, Inuit Ataqatigiit (IA) and Siumut, are heading for third and fourth place - marking an upset for Prime Minister Mute B Egede. More than 40,000 Greenlanders out of a population of 57,000 were eligible to cast their votes to elect 31 MPs, as well as the local government. Six parties were on the ballot. The voting took place at 72 polling stations scattered across the vast island. "The Democrats need a supporting partner to be able to have a majority," says Maria Ackren from the University of Greenland. "It would say it can be either Naleraq or Inuit Ataqatigiit. It's up to the Democrats to try to figure out what they want." Since 2009 Greenland has had the right to call an independence referendum. Although Naleraq is pushing for a vote within a few years, Jens-Frederik Nielsen's party favours a gradual approach towards independence, focusing first on making self-government a success. Prof Ackren believes the Democrats won, partly because Greenlanders wanted a change of government, but also because they were unhappy with new fisheries laws and other domestic issues. Independence is seen as the end goal for most Greenlanders, but not before reforms have been made to the economy, health and other sectors, she says. Greenland's strategic location and untapped mineral resources have caught President Trump's eye in particular. He first floated the idea of buying the island during his first term in 2019. Since taking office again in January, Trump has reiterated his intention to acquire the territory. "We need Greenland for national security. One way or the other we're gonna get it," he said during his address to the US Congress last week. Greenland and Denmark's leaders have repeatedly rebuffed his demands. The leader of the Democrats said Greenland needed to adopt a calm course with the US. He told public broadcaster KNR that while big developments were happening globally, they should stand together and speak with one voice.
