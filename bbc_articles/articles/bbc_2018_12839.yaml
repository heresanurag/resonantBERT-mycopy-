title: 'Brexit: Jeremy Corbyn on Theresa May trade talks update - BBC News'
date: '2018-10-16'
section: General
url: http://www.bbc.co.uk/news/uk-politics-45867342
content: |-
  The Labour leader accuses Theresa May of "Groundhog Day" over the progress of trade talks with the EU.

  The Labour leader has accused Prime Minister Theresa May of "Groundhog Day" over the progress of post-Brexit trade talks with the EU.

  Jeremy Corbyn said Mrs May's statement to MPs was another "nothing-has-changed moment from this shambles of a government."
