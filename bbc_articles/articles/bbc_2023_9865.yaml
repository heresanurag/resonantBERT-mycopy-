title: 'India train crash: Scores dead after Odisha incident - BBC News'
date: '2023-06-02'
section: General
url: http://www.bbc.co.uk/news/world-asia-india-65793684
content: |-
  Rescue efforts are under way after a train collision in Odisha caused a number of casualties.

  More than 120 people have been killed and 850 injured after trains collided in India's eastern Odisha state, local officials say.

  Footage shows people climbing over the wreckage of the trains.

  Dozens of ambulances were sent to the scene in the Balasore district, the state's chief secretary said.
