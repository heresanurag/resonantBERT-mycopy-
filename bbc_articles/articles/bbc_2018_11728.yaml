title: Isle of Wight ferry hits yachts at Cowes harbour - BBC News
date: '2018-10-21'
section: Hampshire & Isle of Wight
url: http://www.bbc.co.uk/news/uk-england-hampshire-45932147
content: |-
  None of the 40 passengers onboard were hurt and the vessel has been refloated.

  This video can not be played To play this video you need to enable JavaScript in your browser. An eyewitness describes hearing shouting in the "disorientating" thick fog

  A ferry has hit several yachts and run aground off the Isle of Wight.

  The Red Falcon "came into contact" with a number of boats while trying to berth at Cowes Harbour, operator Red Funnel said.

  None of the 40 passengers onboard were hurt, a spokesman said. The Coastguard confirmed nobody is missing or in the water.

  A member of the public had called 999 reporting cries for help from within the harbour.

  However, this was someone "onboard his own vessel calling out to try and alert the master of the ferry of the situation", the coastguard said.

  The ferry ran aground while entering Cowes Harbour in dense fog

  The mast of a boat struck by the ferry was visible in the water

  The vehicle ferry, which left Southampton for East Cowes at 07:00, got into difficulty an hour later while entering the harbour in low visibility.

  Passenger Ed Anderson, from Guildford, said: "We got into the harbour at around 8am. We were all in our cars on the car deck when we heard it run aground.

  "The captain ordered us back to the passenger deck and we were given free breakfast and drinks.

  "I can see the mast of the boat we hit sticking up from the water."

  Gwen Clayton was walking her dog by the water when the ferry ran aground.

  She said: "You could see a maximum five metres in front of you and I heard shouting and a sort of clanging, like a metallic sound. And then nothing."

  The Red Falcon "came into contact" with a number of boats, Red Funnel said

  The vessel came to a halt about 50m (165ft) off the esplanade.

  It has since been refloated with the assistance of tugs and has been cleared to be relocated to Southampton after coastguard surveyors completed an initial assessment.

  Coastguards at the scene confirmed a mast seen in the water belongs to a vessel that sank in collision with the Red Falcon.

  Fran Collins, Red Funnel's CEO, said: "I would like to apologise to all passengers who have been disrupted by this incident, and emphasise that we give the safety of our passengers and crew the highest priority."

  All passengers and vehicles were discharged at East Cowes.

