title: James Morrison's partner Gill Catchpole found dead at their home - BBC News
date: '2024-01-08'
section: Gloucestershire
url: http://www.bbc.co.uk/news/uk-england-gloucestershire-67910325
content: |-
  Ms Catchpole is the mother of Mr Morrison's two daughters and they were together for two decades.

  Mr Morrison is a singer who has had two Number One albums since 2006

  Ms Catchpole was found in her home in Whitminster, Gloucestershire, on Friday morning. The death is being treated as non-suspicious.

  She is the mother of Mr Morrison's two daughters and the two have been a couple since they were teenagers.

  "The coroners and woman's next of kin have been informed," a police statement said. Officers had been called to help a woman aged in her 40s.

  Mr Morrison had two Number One albums since 2006 and won the Brit for Best British Male in 2007.

  The Warwickshire-born singer grew up in Cornwall and busked on the streets of Newquay.

  In 2022, he returned to the town to help raise money for the cancer wards at the Royal Cornwall Hospital.

  He has also lent his support to a local foodbank in the Cotswolds, close to his home.

