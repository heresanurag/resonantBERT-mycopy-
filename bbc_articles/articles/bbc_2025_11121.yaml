  The body of friend Sam Harris was found in January while Aziz Ziriat remained missing until now.

  Body of hiker missing since New Year's Day found

  Samuel Harris (right) and Aziz Ziriat were last heard from on New Year's Day

  The body of a British hiker who went missing in the Dolomites has been found, a search team in Italy said. Aziz Ziriat, 36, was discovered lying in a rocky crevice on Saturday, around 400m (1,300ft) below where the body of his friend, Sam Harris, 35, had previously been found. The pair, who were both from London, went missing while hiking in January. Mr Ziriat's body was found in the Passo di Conca area by specialist search teams including a canine unit, Trentino Alpine and Speleological Rescue confirmed.

  Searches had been taking place near to where Mr Harris's body was found

  A spokesman said the rescuers "lowered themselves down the wall below the base of the slope, where the dog finally signalled the missing man's body in a rocky crevice, where it had been covered by snow". He said Mr Ziriat's family was immediately informed of the discovery. Mr Harris's body was discovered on 8 January. The friends had not been seen or heard from since 1 January and did not check in for their flight home on 6 January. Their last known location was near a mountain hut called Casina Dosson, close to the town of Tione Di Trento, near Riva Del Garda on Lake Garda. Palace for Life, the official charity of Crystal Palace FC where Mr Ziriat worked as head of community engagement, previously released a statement which said colleagues were "profoundly sad" at his disappearance. Describing his "real passion to make a difference", it added: "Aziz has not only been incredibly impactful in his role, but also a kind, compassionate and generous individual who brought positivity and warmth to everyone he has worked with." Joe Stone, a university friend of Mr Ziriat, previously said that the pair were "experienced hikers" who liked to go off the grid, but "alarm bells were raised" when they failed to check in for their return flight.
