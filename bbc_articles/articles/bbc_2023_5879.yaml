  Preview of Saturday's big race at Aintree where Rachael Blackmore's mount Ain't That A Shame is among the favourites - plus pundit predictions.

  Last updated on .From the section Horse Racing

  Rachael Blackmore's mount Ain't That A Shame is among the favourites for Saturday's Grand National at Aintree.

  The trailblazing rider became the first woman to win the National in 2021 and is 8-1 to repeat the feat.

  A field of 39 will contest the 175th running of the famous race at 17:15 BST after Escaria Ten was withdrawn.

  Meanwhile, three people have been arrested in connection with potential co-ordinated disruption activities at Aintree.

  Bookmakers expect more than £150m to be wagered on the National, which takes place over 30 fences and four and a quarter miles.

  After downpours on Friday, a largely sunny day is forecast, with the going described as good to soft, soft in places.

  A win for Blackmore would be poignant for Irish trainer Henry de Bromhead, whose 13-year-old son Jack died in a riding accident seven months ago.

  Last year's victor Noble Yeats, runner-up Any Second Now and third-placed Delta Work will all line up again.

  Approximate odds: 8-1 Ain't That A Shame, 9-1 Corach Rambler, 10-1 Delta Work, Noble Yeats, 12-1 Mr Incredible, Gaillard Du Mesnil, 14-1 Any Second Now, Le Milos, The Big Dog, 16-1 Vanillier, 18-1 Longhouse Poet, 20-1 Capodanno, Galvin, Our Power, 25-1 Bar.
