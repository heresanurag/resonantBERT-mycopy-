content: |-
  Watch as a crowd in the north-eastern city of Kupiansk try to stop the vehicle from leaving.

  This video has no sound.

  Watch the moment a crowd of people in the city of Kupiansk surround what's believed to be a Russian vehicle.

  Kupiansk is in north-eastern Ukraine near the Russian border.

  Video shows locals running towards the car and trying to stop it from leaving, with one person climbing on to the bonnet.
