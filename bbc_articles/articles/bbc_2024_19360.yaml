  The winners will be announced at a ceremony at London's O2 Arena on 11 September.

  Mr Bates vs the Post Office and Baby Reindeer nominated for NTAs

  Mr Bates vs the Post Office aired in January this year

  The shortlist for the National Television Awards has been revealed, with Baby Reindeer and Mr Bates vs the Post Office up for best new drama. ITV's Mr Bates vs the Post Office showed the human toll on hundreds of sub-postmasters who were wrongly prosecuted for false accounting and theft due to faulty software. Actor Toby Jones has also received a nod in the drama performance category for his role as Sir Alan Bates, one of more than 550 claimants who have brought legal action against the Post Office. Baby Reindeer, which was a Netflix hit, is a dramatised account of harassment and stalking experienced by the show's lead actor Richard Gadd.

  Romantic drama One Day and thrillers Fool Me Once and Red Eye have also been nominated in the category. Actor Jessica Gunning has also been recognised for her role as stalker Martha Scott. Baby Reindeer hasn’t been without controversy – it hit the headlines after Fiona Harvey, alleged to have inspired the character Martha, took legal action against Netflix. Harvey said the story was inaccurate. Netflix is aiming to get Harvey's suit struck out. Footballer David Beckham and pop star Robbie Williams are also nominated for their Netflix shows, in the authored documentary category. Predictably, Ant and Dec are again nominated for TV presenter of the year – if they win, it will be their 23rd time. The NTAs are voted for online by viewers and comedian Joel Dommett will be present the ceremony for the third time on September 11 at London's O2 Arena.

