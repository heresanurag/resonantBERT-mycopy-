  Yostin Mosquera is charged after the remains of two men were found in suitcases in Bristol and a London flat.

  Man in court after men's remains found in suitcases

  Yostin Mosquera, 34, Paul Longworth, 71 and Albert Alfonso, 62, pictured on a boat in Colombia

  A man has appeared in court charged with murdering two men whose remains were found in suitcases at Bristol's Clifton Suspension Bridge and at a London flat. Yostin Andres Mosquera, of Scotts Road, Shepherd’s Bush, west London, is accused of murdering Albert Alfonso, 62, and Paul Longworth, 71, between 8 and 10 July in the London borough of Hammersmith and Fulham. Mr Mosquera, 34, spoke only to confirm his name, address and date of birth. He was remanded into custody and is set to next appear at a hearing at the Old Bailey on Wednesday.

  Flowers have been left near the Shepherd's Bush home where the two victims lived

  Both victims were known to Mr Mosquera, who had been staying with them at their flat for a short period of time, the Metropolitan Police said. Mr Longworth was British and Mr Alfonso was originally from France with British citizenship. Evidence in the investigation so far has not pointed to a homophobic motive, the Met Police said, but it had been classified as a hate crime under national guidelines. This would be reviewed if clearer evidence emerged, the force added, while officers were also working to establish whether there were any linked offences or incidents in the UK or overseas to "build a full picture of the circumstances".

  Police have been on the scene in Scotts Road, Shepherd's Bush

  Deputy Assistant Commissioner Andy Valentine said: "I hope it will be of some reassurance that whilst inquiries are still ongoing and the investigation is at a relatively early stage, we are not currently looking for anyone else. “Officers have worked with the pan-London LGBTQ+ Independent Advisory Group (IAG) since the identity of the two victims and their sexuality was established. "Their advice, expertise and support for the investigation has been extremely valuable."
