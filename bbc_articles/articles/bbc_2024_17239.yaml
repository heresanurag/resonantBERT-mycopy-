  Fresh from seeing his daughter headline one of the biggest festivals in the world, Dukagjin says "Glastonbury is one of a kind" and knows it will be hard for his project Sunny Hill, which took place for the first time on its new permanent site to accommodate the growing audience, to reach a status like that. Although, he says industry friends like Coachella owner Paul Tollett say the project reminds him of Glastonbury in the 1980s, and there are plans to make it more than a live music festival. "I love artists who spend a day or two longer in Pristina and have a chance to meet local artists and share ideas. "And for them to rub shoulders with people in the music industry, and hopefully next year we can create a movement with some workshops," Dukagjin says. You can learn more about Sunny Hill Festival and how Kosovo is trying to change its image on Business Daily.

