  President Joe Biden gave the US's highest civilian honour to 19 people, including Denzel Washington and Hillary Clinton.

  Michael J Fox, Bono, Anna Wintour and Denzel Washington were among recipients of the Presidential Medal of Freedom at a ceremony in Washington on Saturday.

  Outgoing President Joe Biden awarded the US's highest civilian honour to 19 people this year, with honourees spanning the worlds of culture, politics and activism.
