  See key moments in Alexei Navalny's career as an outspoken critic of President Putin.

  Jailed Russian opposition politician Alexei Navalny is dead, the prison service of the region where he had been serving his sentence says.

  The anti-corruption campaigner, once described as the man President Putin “fears the most”, had been in jail since 2021 on charges widely viewed as politically motivated.

  The 47-year-old survived poisoning attempts and years in some of Russia's most notorious jails, after his group had exposed corruption at almost every level of the Russian state.

  Watch some of the most dramatic moments from his career.
