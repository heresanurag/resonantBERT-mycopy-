title: 'Dalston: Woman arrested over fatal stabbing of boy, 4 - BBC News'
date: '2023-12-22'
section: London
url: http://www.bbc.co.uk/news/uk-england-london-67793113
content: |-
  The boy was found wounded at a property in east London and died from his injuries in hospital.

  Emergency services were called to a home on Montague Road on Wednesday night

  A four-year-old boy has died after being found with knife injuries at a residential property in east London.

  A woman, 41, who was known to the boy, has been arrested on suspicion of his murder, the Metropolitan Police said.

  The force received a call at about 23:00 GMT on Wednesday raising concerns for the welfare of a child at a property in Montague Road, Dalston, Hackney.

  The boy was taken to hospital but later died.

  The woman remains in custody and police are not looking for anyone else in connection with the stabbing.

  The boy was taken to hospital from an address in Montague Road, Dalston

  The Met's Det Ch Supt James Conway said: "This is an extremely distressing incident which will understandably cause shock and disbelief amongst the local community and those who attended the scene.

  "We are working with our partners, including Hackney Council and the school community, to ensure support is there for people who need it."

  Specialist officers from the homicide team are working on the investigation, the Met Police said

  He added: "Specialist officers from our homicide team are progressing this investigation and continue to work to establish the circumstances of this young child's death, and the events that led up to it.

  "This incident occurred within the home and, while there is no wider public safety risk, additional officers will be present in the area, as we recognise the impact this will have on the community."

