title: Rochdale gang guilty of raping and abusing girls for five years - BBC News
date: '2025-06-13'
section: Manchester
url: http://www.bbc.co.uk/news/articles/cdd2rld9mj2o
content: |-
  Seven men are convicted of sex offences against two girls in Rochdale between 2001 and 2006.

  Mohammed Zahid, who led the gang, was known as "Boss Man" and worked on Rochdale market

  Seven men have been found guilty of sexually exploiting two teenage girls who were repeatedly raped and assaulted in Rochdale for five years. The gang was convicted of various sexual offences against the girls between 2001 and 2006. The victims, known as Girl A and Girl B, were groomed from the age of 13 and treated as "sex slaves", being expected to "have sex with the men whenever and wherever they wanted", the trial heard. Girl A told the jury she could have been targeted by more than 200 men, while Girl B said social workers had regarded her as "a prostitute" from the age of 10.

  Manchester Minshull Street Crown Court heard that both girls had "deeply troubled home lives" and were plied with drugs, alcohol and cigarettes and given places to stay by the men, who worked on the town's market or as taxi drivers. The prosecution said the girls were "children passed around for sex, abused, degraded and then discarded", adding: "They became sex slaves." Girl A told the jury she may have been preyed on by hundreds of men as her phone number was swapped, but said "there was that many it was hard to keep count". She told local children's services in 2004 that she was "hanging around" with groups of older men, drinking and taking cannabis, the court heard. Girl B, who was living in a children's home when she came into contact with the men on the market, said police and social workers knew what was going on but "weren't concerned enough to do anything about it". "It was in my file, when I looked it up. I read it," the woman, now aged in her 30s, told the court. "I was picked up by the police for loitering and prostituting from the age of 10." Three of the abusers, Mohammed Zahid, 64, the leader of the gang, Mushtaq Ahmed, 67, and Kasir Bashir, 50, were all Pakistan-born stallholders on the market. Father-of-three Zahid, who was known as Boss Man, gave free underwear from his lingerie stall to the girls, who did not know each other.

  Mohammed Shahzad, Mushtaq Ahmed and Kasir Bashir denied the offences against them

  He also gifted them with money, alcohol and food in return for the expectation of regular sex with him and his friends, the court heard. In 2016, Zahid was jailed for five years in an earlier grooming gang case after he engaged in sexual activity in 2006 with a 15-year-old girl who he met when she visited his stall to buy tights for school.

  Bashir did not attend the current trial after he absconded while on bail before proceedings got under way. It can now also be reported that Mohammed Shahzad, 44, Naheem Akram, 48, and Nisar Hussain, 41, were remanded in custody in January. Police received intelligence that the three taxi drivers were planning to leave the UK and had already paid a deposit for their transport.

  Nisar Hussain, Roheez Khan and Naheem Akram have all been convicted following the trial

  The seventh defendant Pakistan-born Roheez Khan, 39, also featured in another previous Rochdale grooming trial in 2013. He was jailed for six-and-a-half years as one of five men convicted of sexually exploiting a "profoundly vulnerable" 15-year-old girl in 2008 and 2009. During the latest trial, a second jury was required after concerns that one original juror - thought to be an ex-police officer - might be racist. The prosecution did not oppose the application and a second jury was sworn in shortly after. Jurors deliberated for three weeks before delivering their unanimous guilty verdicts.

