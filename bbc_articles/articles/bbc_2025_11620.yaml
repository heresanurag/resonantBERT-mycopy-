  • None Zahid, of, Station Road, Crumpsall, was convicted of raping Girl A and Girl B, offences of indecency with a child and procuring a child to have sex
  • None Ahmed, of Corona Avenue, Oldham, and Bashir, of Napier Street East, Oldham, were convicted of multiple counts of rape and indecency with a child, in relation to Girl B
  • None Shahzad, of Beswicke Royds Street, Rochdale, Akram, of Manley Road, Rochdale, Hussain, of New Field Close, Rochdale, and Khan, of Athole Street, Rochdale, were convicted of multiple counts of rape against Girl A
  • None Khan was found guilty of a single count of rape against Girl A During the trial the prosecution offered no evidence against an eighth defendant, Arfan Khan, 41, of Rochdale, who was cleared of various sexual offences.

  Following the verdicts, Det Supt Alan Clitherow, from Greater Manchester Police's CSE team, said the force should have done more at the time. "What is clear is the way those victims were dealt with at the time is indefensible and inexcusable," he said. "There was information at the time that police and other agencies could and should have done something with and we didn't. "We have made comprehensive apologies for that." He said the force had since improved on how these investigations are managed. All the men were prosecuted as part of Operation Lytton, an ongoing investigation by the force into historical child sexual exploitation in the town. A total of 32 offenders have been convicted so far as part of that inquiry along with an earlier investigation called Operation Doublet into child sexual exploitation. Five more trials are scheduled to take place from September.

  Liz Fell from the Crown Prosecution Service said: "These men targeted children, preyed upon their vulnerabilities and groomed them for their own sexual gratification. "The treatment of the victims at the hands of these predators was nothing short of appalling." She said the convictions sent "a very clear message" that the CPS and police would "relentlessly" prosecute those who sexually exploit children, "whenever that abuse took place". Sharon Hubber, Rochdale Borough Council's director of children's services, said: "We know that these convictions are unlikely to erase the memories of the abuse these women were subjected to as children, but we hope they do bring some form of closure. "We know that more could and should have been done by the people who were working here at the time, and for that we are truly sorry." The NSPCC said the "appalling, ruthless exploitation" of these vulnerable girls highlighted the need for children to be able to speak out and warned that adults must educate themselves on the signs of grooming. "Child sexual abuse can have profound and long-lasting consequences on those who experience it," the charity added. A sentencing date has yet to be fixed.

