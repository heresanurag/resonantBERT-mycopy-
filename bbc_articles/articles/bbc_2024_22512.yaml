title: 'Manchester United: Casemiro''s wife hits back after criticism - BBC Sport'
date: '2024-09-02'
section: Man Utd
url: http://www.bbc.co.uk/sport/football/articles/cdxlp5jke9yo
content: |-
  Casemiro's wife defends her husband following criticism after Sunday's 3-0 defeat by Liverpool, reminding people of the many trophies he has won.

  Manchester United's 3-0 home loss to Liverpool was particularly painful for Brazilian midfielder Casemiro, who was substituted at half-time and then criticised by pundits. There were even claims he left Old Trafford at the break, but United boss Erik ten Hag refuted this. Now Casemiro's wife has come to her husband's defence, reminding people of the many trophies he has won throughout his illustrious career. Anna Mariana posted a picture of his collection of silverware on Instagram, with the Brazilian having won the Champions League five times as well as La Liga three times with Real Madrid and, most recently, the FA Cup with Manchester United. She then posted a picture of the 32-year-old celebrating with team-mates writing: "Always strong Casemiro, the biggest (flaming heart emoji)." Casemiro made two mistakes in the first 45 minutes in Sunday's game at Old Trafford, from which Liverpool ultimately scored in their comfortable victory. Former Liverpool defender Jamie Carragher said on Sky Sports: "It is a sad sight seeing what he's going through out there." "I have to say he's lost his confidence a little bit," added former Manchester United full-back Gary Neville. Casemiro was replaced at the break by 20-year-old Toby Collyer, who made his United debut. Explaining his decision, Ten Hag said: "We had to take risks because we want to bounce back, then you need players in midfield to cover ground, therefore we put Toby Collyer on the pitch. "I think that in football everyone has to take responsibility. I'm sure he is a great character and he won everything in his career that you can imagine. I am sure he will keep contributing to our team and Casemiro is always winning so he will be there."

  Casemiro has won many trophies during his career

  It seems a long time since Casemiro texted his agent following Manchester United's four-goal hammering at Brentford in August 2022 to say he would 'fix' the problems at Old Trafford and he joined in a deal worth £70m. As it turned out, the Brazilian was yet another short-term fix for a fundamental problem. After a decent first season, his form collapsed. By the end of last term, Casemiro had lost his place. The precise reason for his complete absence from United's FA Cup final matchday squad for their 2-1 win over Manchester City was never properly explained but fundamentally, having been dropped to the bench at Wembley by Ten Hag, the midfielder informed his boss he was not fit enough to be involved. Casemiro was on the pitch for the post-match celebrations, briefly attended the party that followed but was quickly out of the door and on a private plane with his family to begin their summer, as he had also been dropped by Brazil from their Copa America squad. That, it was felt, was going to be the end of Casemiro at Manchester United, with a summer move to the Saudi Pro-League anticipated. Except a deal did not materialise. Casemiro returned for the start of pre-season training, looked fit and did quite well on United's tour of the US. He started in the Community Shield loss to City in August and has also started all three Premier League games this season. It is being stressed by club sources the 32-year-old is an example to younger members of the group. He can speak English even though he is not fluent, he trains hard and - occasional flare-ups such as the cup final issue aside - is a positive influence off the pitch. Club officials were quick to counter social media claims Casemiro left Old Trafford early on Sunday and Ten Hag confirmed he had seen Casemiro in the dressing room after the final whistle. But the half-time introduction of Collyer because, according to his manager, United needed a more mobile presence in central midfield said everything. In his prime, Casemiro was one of the most effective defensive midfield players of his generation. As his wife pointed out on social media, he has won every honour in the game. But top-level football is a brutal business. In the Premier League, reputations count for nothing. And, sadly for United, in the biggest of games, Casemiro has turned into a liability. With domestic football taking a pause for the international break, Casemiro will have two weeks before he can put matters right on the pitch, having been dropped again from the Brazil squad.

