content: |-
  Some of the key reactions to reports that a journalist was inadvertently added to a chat with high-level Trump officials discussing air strikes in Yemen.

  Officials and journalists in Washington DC reacted to reports that reporter Jeffrey Goldberg was added to a Signal platform messaging group which apparently included Vice-President JD Vance, Defence Secretary Pete Hegseth and National Security Adviser Mike Waltz, among others. Goldberg said he saw classified military plans for strikes against the Iran-backed Houthi group in Yemen, including weapons packages, targets and timing, two hours before the bombs struck. Mike Waltz has taken "full responsibility" for the group chat.
