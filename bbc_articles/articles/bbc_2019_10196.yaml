content: |-
  Recorded drug crime is increasing in many small towns and villages even as it falls significantly in city centres, analysis by the BBC finds.

  Drug crime is increasing in many small towns and villages even as it falls significantly in city centres, the BBC has found.

  Police data shows drug crimes in England and Wales have fallen by more than 50,000 in the past five years.

  But national averages hide a major shift in where drug crimes are being committed.

  It comes as the government pledged an extra £85m to prosecutors to help deal with a rise in violent crime.

  In London, 30 out of 36 areas saw either a decrease or no significant change in recorded drug crime over the past five years.

  But moving outside of the capital, in the South East and East of England, there were 74 small towns and villages that bucked the trend and saw increases in drug crime.

