  The map above used a statistical model to classify areas that have experienced a significant change in drug crime. Weight is given to areas with a strong overall trend of increasing or decreasing crime across several years. Where there is no strong overall pattern in a particular location, those areas have been labelled as having "no change". 'Drug crime' refers to drug-related incidents reported to or identified by the police that an officer classes as criminal, whether or not the crime results in a charge.

