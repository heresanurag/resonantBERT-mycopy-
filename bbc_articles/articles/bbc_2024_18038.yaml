title: 'Wayanad: Hopes for survivors fade in deadly India landslides - BBC News'
date: '2024-08-01'
section: Asia
url: http://www.bbc.co.uk/news/articles/cv2g0jmm7vro
content: |-
  Nearly 200 people remain missing after a landslide hit Kerala's Wayanad district on Tuesday.

  At relief camps and hospitals, survivors wait for news of their relatives

  Hopes of finding more survivors are fading as rescue operations continue in Kerala, where massive landslides have killed 182 people, according to officials. Nearly 200 people are still missing after Mundakkai and Chooralmala areas in Wayanad district were flattened by thick torrents of mud and water on Tuesday. Rescue operations have been hampered by heavy rains in the region all week. The army is constructing a temporary bridge to Mundakkai, which is across a swollen river, to help stranded residents and search for more survivors.

  Nearly 200 people remain missing as search and rescue operations enter a third day

  Health officials reported 256 autopsies, but that included a number of body parts. On Thursday, Wayanad remained on high alert for more rains as schools and colleges were closed for the day. The hilly district is known for its cardamom plantations and tea estates and has several popular tourist spots. Officials said nearly 1,600 people had been rescued from the affected villages and tea estates. But migrant workers from the estates were among those still missing. More than 8,000 people have been moved to 82 relief camps set up in the district, Chief Minister Pinarayi Vijayan has said. The army is now building a temporary metal bridge to Mundakkai village, which is among the worst affected by the landslides.

  Wayanad remains on high alert for more rains

  Earlier, rescuers had constructed a temporary pedestrian bridge and used ropes to rappel across the river to reach stranded people there and move the injured to hospitals. But heavy rains and strong river current had made it difficult to carry out full-fledged rescue work. The temporary metal bridge is expected to be complete by Thursday evening. It will allow ambulances and heavy machinery to move rubble and search for survivors, Major General Vinod Mathew told reporters. Meanwhile, the air force is conducting sorties to identify areas with survivors and distribute relief material. Three army sniffer dogs were expected to reach the disaster zone to help detect people still trapped under the rubble. "Still large areas are to be explored and searched to find out whether live people are there or not," senior police officer MR Ajith Kumar told AFP news agency on Wednesday.

  The landslides cut off areas like Mundakkai as a key bridge was washed away

  TV footage showed harrowing scenes at relief camps and hospitals as survivors searched for their loved ones or waited for news of them. One man listed out names of those who had still not been found as he told Manorama News, external, "My house was spared but I have lost many children who were like my own." At a community centre that had bodies displayed for identification, a young man told The NewsMinute, external that he had identified two of his uncles, but was still searching for seven other relatives. "I am in touch with people at other centres where bodies are placed and they are sending me pictures, but I am yet to identify any of my other missing relatives," he told the news site. With more heavy rainfall forecast for the district, the government has warned residents to be prepared for flash floods.
