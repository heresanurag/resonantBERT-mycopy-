title: Hundred organisers say online 'racism or other forms of abuse' unacceptable
  - BBC Sport
date: '2021-07-25'
section: General
url: http://www.bbc.co.uk/sport/cricket/57961240
content: |-
  Organisers of The Hundred say they do not "accept racism or other forms of abuse" following "recent online comments directed towards players and fans".

  Last updated on .From the section Cricket

  Organisers of The Hundred say they do not "accept racism or other forms of abuse" following "recent comments directed towards players and fans".

  The Hundred is a new cricket competition which started on Wednesday.

  A statement from organisers on the social media abuse in recent days said: "Sadly, we have witnessed these unacceptable behaviours online.

  "We stand together with the rest of cricket against all forms of discrimination."

  It added: "You can disagree with us on many things, but not on that. Those who do are not welcome here."

  The abuse relates to social media and not in the grounds during matches.

  West Indies all-rounder Carlos Brathwaite, who plays for Manchester Originals in The Hundred, has posted on social media criticising "these keyboard warrior racists".

  England World Cup-winning bowler Liam Plunkett plays for Welsh Fire and also posted about online criticism "if you have a bad day at the office" after he conceded 42 runs off 15 balls in his side's win over Northern Superchargers on Saturday.

  Plunkett said it is "crazy" that people "feel they have the right" to abuse players in such circumstances.

  The Hundred is run by the England and Wales Cricket Board and features eight new franchises, each with a men's and women's team.

  The abuse is among many recent incidents where sportspeople have been targeted, including Formula 1 driver Lewis Hamilton being racially abused on social media after his victory at his home British Grand Prix.

  England footballers Marcus Rashford, Jadon Sancho and Bukayo Saka also received racist abuse on social media after they all missed a penalty in the Three Lions' Euro 2020 final shootout defeat against Italy.

  A mural honouring Manchester United striker Rashford was also defaced, though it was repaired the next day and later covered with hundreds of messages of support.
