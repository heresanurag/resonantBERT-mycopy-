content: |-
  Alice Bhandhukravi had to move quickly after things didn't go to plan on BBC London's late bulletin.

  A BBC London newsreader had to run across the studio when things didn't go to plan on the late evening news bulletin on Wednesday.

  After introducing the bulletin, Alice Bhandhukravi moved across the studio during the title sequence, but then had to dash back to the desk as viewers saw the opening shot of the studio.

  But Alice took it all in her stride, smiling as she sat down at the desk and welcomed viewers to the programme.

  She later took to X saying "I have apparently qualified for the 10m dash (across the studio) in the 2028 Games., external"

