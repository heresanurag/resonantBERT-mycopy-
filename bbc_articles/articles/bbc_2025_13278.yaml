  TV and radio presenter Gaby Roslin replied in the comments, offering "so much love and enormous hugs". Fellow pop star Rita Ora replied: "You're literally my favourite person and I'm praying for you, you've got this. "My mother had it and I know the surgery and any treatment on this matter is mentally tough so I'm here for you. X." The likes of Leigh-Anne Pinnock, Leona Lewis, Rochelle and Marvin Humes also offered their support, as well as Wretch 32 and Paloma Faith.

  CEO of Breast Cancer UK, external, Thalie Martini, told BBC News that Jessie J's "openness is inspiring and offers a powerful reminder of the importance of early detection, education and prevention." "We fully support those who take further preventative measures due to early diagnosis or a genetic predisposition," she added; while urging people to reduce their risk by "maintaining a healthy diet, staying active and reducing alcohol consumption". Breast cancer is the most common type of cancer in women in the UK. According the NHS website, external: "It's important to check your breasts regularly so you know what's normal for you. "This makes it easier to notice any changes in the size, look or feel of your breasts."

  Jessie J has had health issues throughout her life, being diagnosed with a heart condition as a child before going on to have a stroke as a teenager and briefly going deaf in 2020 due to Meniere's disease. Last year she revealed she had been diagnosed with ADHD and OCD. The singer's latest announcement comes after she recently told BBC Radio 2 breakfast show host Scott Mills, external she had turned down a major Broadway role, playing Sally Bowles in Cabaret. "I recently got offered a huge role on Broadway but I turned it down because it wasn't the right time," she explained. "My son was too young and I just couldn't." Underlining her background and training in musical theatre, she added: "I will do it at some point, and it was an amazing audition process and I was so proud that I got it."
