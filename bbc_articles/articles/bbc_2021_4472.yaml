title: 'Prince Philip: Gun salutes take place in tribute - BBC News'
date: '2021-04-10'
section: General
url: http://www.bbc.co.uk/news/uk-56702330
content: |-
  Gun salutes have been fired across the UK, in Gibraltar and at sea in memory of the Duke of Edinburgh.

  He died at Windsor Castle on Friday at the age of 99.
