title: Malton summer music festival scrapped - BBC News
date: '2024-04-13'
section: York & North Yorkshire
url: http://www.bbc.co.uk/news/uk-england-york-north-yorkshire-68802110
content: |-
  Meadowfest was due to take place in Malton at the end of July.

  Mark Brayshaw from organisers Visit Malton said it was difficult to see the event returning to the town again

  A music festival which attracts thousands of visitors to a North Yorkshire market town each year has been cancelled.

  Meadowfest - which has been held in Malton since 2019 - was due to take place on 27 July.

  However, organisers said they could not reach an agreement with the site's landowner this year.

  The Fitzwilliam Estate - which owns the Riverside Meadow site - has been contacted for comment.

  Mark Brayshaw, head of organisers Visit Malton, said the event had grown in popularity since it began in 2019.

  He said previous artists to have performed at the event, described as a "boutique festival", had included The Lightning Seeds in 2021 and Chesney Hawkes in 2023.

  About 3,000 people attended the event in 2023, Mr Brayshaw said.

  Speculating on the possibility of the festival returning to the town, Mr Brayshaw said: "Never say never, but it would be difficult to bring the event back once it has been pulled like this."

