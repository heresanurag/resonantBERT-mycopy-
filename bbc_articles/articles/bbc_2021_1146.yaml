title: 'Covid: Four vaccine centres shut amid snow alert for Wales - BBC News'
date: '2021-01-24'
section: Wales
url: http://www.bbc.co.uk/news/uk-wales-55764501
content: |-
  The vaccination centres temporarily closed in south Wales as a weather warning was extended.

  Appointments were brought forward or rescheduled for safety reasons

  Four vaccination centres were shut as snow caused some travel disruption in Wales.

  Sunday appointments in Bridgend, Rhondda, Abercynon and Merthyr Tydfil were rescheduled for safety reasons, but centres will reopen on Monday, the Cwm Taf Morgannwg health board said.

  The Met Office has extended a yellow weather warning to midnight on Sunday for all of Wales except Anglesey.

  A yellow warning for ice runs from midnight until 11:00 GMT on Monday.

  Police have warned of difficult conditions due to snow and ice.

  Up to 3cm of snow is forecast to fall in most areas, with 10 to 15cm expected in the Brecon Beacons and Snowdonia.

  Cwm Taf Morgannwg health board urged anyone with queries about Sunday's vaccination appointments to call the number on their appointment letters.

  Snow volunteers cleared pathways so a Covid vaccine pilot in Maesteg could keep running

  "We can confirm that no vaccines have been wasted as a consequence of this temporary Sunday closure and we are grateful to all those who were able to turn up at such short notice yesterday as we brought forward a significant number of Sunday appointments during the course of Saturday," it said.

  "Additionally, our 4x4 arrangements are enabling us to continue to reach care homes to vaccinate the staff and residents there."

