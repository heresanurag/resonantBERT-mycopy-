  North Wales Police tweeted there was "widespread snow this morning, particularly in some higher areas, making driving conditions difficult".

  And Dyfed-Powys Police said some roads were "impassable" and advised people to "stay home".

  In Bridgend, officers from South Wales Police were pelted with snowballs as they helped an injured sledger on Heol y Nant.

  North Wales Police warned of difficult conditions due to "widespread snow", particularly on high ground.

  It said the A499 near Pwllheli had received heavy snowfall overnight.

  Welsh Ambulance Service boss Jason Killens tweeted, thanking the public for helping crews continue to work despite the conditions.

