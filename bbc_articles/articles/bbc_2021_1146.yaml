  Villages were dusted with snow, such as in Llanfynydd, Carmarthenshire

  Nick Rolfe shared this garden view in Nercwys, near Mold, Flintshire

  The Met Office warned travellers that "longer journey times by road, bus and train services" could be expected, although Wales is in a level four lockdown with all but essential travel banned.

  It also said the snow could lead to power cuts and other services, such as mobile phone coverage, may be affected.

  Those going out for daily exercise have been warned there could be icy patches on some untreated roads, pavements and cycle paths.

  In Powys, this was the view over Newtown on Sunday

  The hills around Llangollen, Denbighshire, were covered in snow on Saturday

  Power cuts and travel delays are possible, the Met Office says

  The drop in temperatures is likely to exacerbate problems after widespread flooding caused by Storm Christoph.

  Two flood warnings issued by Natural Resources Wales remain in place, meaning flooding is expected.

  These cover the River Ritec at Tenby in Pembrokeshire, which could affect the Kiln Park caravan site, and the lower Dee Valley from Llangollen to Trevalyn Meadows.

