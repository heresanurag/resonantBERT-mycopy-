title: NHS Lothian criticised over late diagnosis of deaf children - BBC News
date: '2021-12-09'
section: Edinburgh, Fife & East Scotland
url: http://www.bbc.co.uk/news/uk-scotland-edinburgh-east-fife-59590610
content: |-
  Several profoundly deaf children were diagnosed too late for vital implant surgery, a report finds.

  A delay to the diagnosis of hearing loss can have "significant detrimental effects" on children's lives, the report says

  Serious failings at a health board led to several profoundly deaf children being diagnosed too late for vital implant surgery, an inquiry has found.

  NHS Lothian has admitted the delay would have "long-term" consequences for the speech and language development of the children involved.

  An independent investigation uncovered "significant failures" involving 155 children over a period of nine years.

  The health board said it "apologised sincerely" to those affected.

  NHS Lothian commissioned the external review of its paediatric audiology service following criticism in May about the diagnosis and care of a child with hearing difficulties.

  It was carried out by the British Academy of Audiology (BAA), which has now made 36 recommendations to the health board - nine of which must be addressed immediately.

  The National Deaf Children's Society has called for a "sweeping review" of children's audiology services in Scotland after "almost a decade of failures" at NHS Lothian.

  The society's chief executive, Susan Daniels, said: "The horrendous findings in this report represent a real-life nightmare for the families involved. They placed their trust in a service that was supposed to help, only to be completely let down.

  "Some will be left with life-changing consequences, while many others across Scotland will now be facing the very real fear that the same thing could happen to them."

  The society believes that thousands of children treated at NHS Lothian could have been affected.

  The BAA looked at 1,113 patient records from 2009-2018, identifying "significant failures" in almost 14% of them. Among these 155 children, auditors found:

  Cochlear implants work by providing a sensation of hearing to people with severe or profound deafness.

  It is widely accepted that using the implants in young children exposes them to sounds at a crucial period in language and speech development.

  Cochlear implants provide a sensation of hearing to those with severe or profound deafness

  The BAA said it had found "no evidence" that national guidelines and protocols on hearing tests for children had been followed or consistently applied "at any point since 2009".

  "The head of department reported being aware of this failing; however, there was no evidence this was raised at a more senior health board level, no evidence of any mitigation having been enacted or that any action plans had been put in place to correct this," the review said.

  It also highlighted the average age of diagnosis of hearing loss at NHS Lothian, which between 2009 and 2018 was 4.5 years.

  In England, the average age of diagnosis was 109 days.

  There are standard tests used to detect hearing loss in children but the report found that staff at NHS Lothian were deviating from professional standards.

  Much of the training that staff undertook was done within the department and the health board admits that not enough external checks were carried out, or data collected, to monitor how the service at the Edinburgh's Sick Children's Hospital was compared to other parts of Scotland.

  Charities say there is not a good enough system in Scotland to monitor quality and compare how health boards are doing.

  They say if that had been in place then the issues in Lothian would have been identified more quickly.

  In light of the report, these charities want an urgent Scotland-wide review of audiology with the health secretary Humza Yousaf saying he will look at how lessons learned from Edinburgh can be applied across the country.

  The report said it was "internationally recognised" that delays to diagnosis could have "significant detrimental effects" on children's lives.

  It added: "The root cause of these failures is identified as a lack of scientific leadership, knowledge, reflection and inquiry in the presence of a lack of routine and robust quality assurance processes."

  Tracey Gillies, medical director at NHS Lothian, said the health board was "very sorry and saddened" by the findings.

  "Due to these failings, the diagnosis of hearing loss or impairment in six children was missed. Diagnosis of a further six children was significantly delayed with long term consequences for these children.

  "Their long-term development of speech and language will be affected and these children will require specialist support," she said.

  The health board has written to the families of children affected to offer support and a meeting to discuss their child's condition.

  Ms Gillies added: "We apologise sincerely to all affected children and their families for these failings and for the worry and distress caused. We would encourage families who may have concerns to contact our helpline for information on 0131 465 5457."

  NHS Lothian said it had appointed an "additional senior expert" to provide support in the paediatric audiology department and begun a "comprehensive training programme" for staff.

  The board's chief executive, Calum Campbell, said the thoroughness of the review reflected a "determination" to improve the service.

  "We note that the report was positive about some aspects of the care of the audiology team who are committed to working hard to improve the quality of testing provided by the service," he said.

  "A number of improvements have already been made and a detailed action plan has been developed to implement all the recommendations of the BAA in full."

  Scottish Health Secretary Humza Yousaf said the report had highlighted "unacceptable failures" at NHS Lothian.

  "I expect the board to enact the recommendations as a matter of urgency and engage with any actions from the formal recovery plan," he said.

  "To those families who have been affected by this I would like to extend my heartfelt apologies along with a promise that robust action will be taken. They have been failed and I am determined that the board must ensure that this is not repeated for any other families."
