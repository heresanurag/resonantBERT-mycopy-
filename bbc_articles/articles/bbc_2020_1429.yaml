title: 'School league tables: Boys behind girls for three decades - BBC News'
date: '2020-02-07'
section: Family & Education
url: http://www.bbc.co.uk/news/education-51313438
content: "Use the BBC News postcode search to see how your school has done in this\
  \ year's secondary league tables.\n\nEngland's schoolboys have had worse exam results\
  \ than girls for 30 years, secondary school league table data just published confirms.\n\
  \nGirls are now 14% more likely to pass English and maths GCSE than boys, with 64%\
  \ of girls doing so and 56% of boys.\n\nYet there is little national focus on the\
  \ difference in results or measures addressing why boys lag behind.\n\nAnd campaigners\
  \ and academics accuse consecutive governments of ignoring the issue.\n\nCheck how\
  \ your local schools have done by clicking here.\n\nSorry, your browser does not\
  \ support this tool. \n\n Please visit the Department for Education. Compare schools\
  \ in your area on the Department for Education website by entering your postcode\
  \ or council in the box below The BBC uses the postcode you enter here to create\
  \ a web link to the Department for Education website. The BBC is the data controller\
  \ of the data you enter here. Please be aware that when you leave the BBC website\
  \ you will be subject to the Department for Education’s privacy policy. If you have\
  \ any questions about how the BBC process data, please read our Privacy and Cookies\
  \ Policy. Department for Education website\n\nIf you can't see the postcode lookup,\
  \ click or tap here.\n\nOn current trends, the gap between rich and poor is set\
  \ to be eclipsed by the gap between males and females, in terms of university entrance,\
  \ within a decade, campaigners say.\n\nData going back 30 years shows the gap between\
  \ the percentage of girls' and boys' GCSE passes more than doubled between 1989\
  \ and 1999, from four to nine percentage points - a change often attributed to the\
  \ introduction of GCSEs.\n\nBut there was little change over the next two decades.\
  \ It remained stable for a few years, then dipped slightly to seven percentage points\
  \ in 2009, then widened again over the next decade to nine percentage points.\n\n\
  The former head of university and college admissions services, Mary Curnock Cook\
  \ said she was \"baffled by this yawning inequality\", which revealed a \"massive\
  \ policy blind spot\".\n\n\"On current trends, a girl born today will be 75% more\
  \ likely to go to university than her male peers,\" she said.\n\n\"By then, the\
  \ gap between women and men will be larger than the gap between rich and poor.\"\
  \n\nThe data also shows the gender gap is apparent in the EBacc, which measures\
  \ those pupils who achieve a grade 4 or above across the core academic subjects\
  \ of English, maths, science, history or geography and a language.\n\nIt shows girls\
  \ are one and a half times more likely to pass all components of the Ebacc, with\
  \ 28% of girls passing compared with 18% of boys.\n\nThere is now a clear need to\
  \ tackle the underachievement of boys, according to the Men and Boys Coalition -\
  \ a group of organisations, academics and individuals campaigning on male equality\
  \ issues.\n\nChief executive Dan Bell said: \"For decades, this problem has existed\
  \ but successive governments and the wider education establishment has buried its\
  \ head in the sand and, in effect, ignored it.\n\n\"There has never been an explanation\
  \ for this attitude despite clear evidence that generations of boys and young men\
  \ are being left behind.\n\n\"That attitude can no longer be tolerated if we are\
  \ to live in a modern inclusive society that truly tackles inequality.\n\n\"The\
  \ time has now come that we must see positive action from the government and the\
  \ wider education establishment to not just recognise this critical inequality faced\
  \ by boys and young men but to systematically create strategies to tackle it.\"\n\
  \nSchool Standards Minister Nick Gibb focussed on the achievement gap between disadvantaged\
  \ pupils and their better off peers, saying it remains stable, but highlighting\
  \ that it has dropped by about 9% since 2011.\n\nHe added: \"The EBacc is instrumental\
  \ in driving up educational standards.\n\n\"Overall more pupils are studying these\
  \ core academic subjects than at any time since the EBacc measure was introduced\
  \ and the entry rate is particularly high in our free schools.\"\n\nThe BBC is not\
  \ responsible for the content of external sites."
