  Grants and loans will be made available to help member states deal with the pandemic's economic impact.

  Public Health England not set up as 'mass' organisation - Hancock

  Returning to the health secretary's evidence to the Commons Science and Technology Committee. Public Health England was "designed as a scientific organisation" and "was not set up to be an organisation ready to go to mass national scale", Matt Hancock tells MPs. He says the country was "like almost every other country in the world" in that it "didn't go into this crisis with that mass of testing capability". Asked whether he is engaged in reforming PHE, he says: "There will be a time for that, my priority now is on controlling the virus and preparing for winter." Mr Hancock says the "rate-limiting factor" on delivery of a vaccine is its manufacture, while the distribution itself is "not simple". "You need a cold chain because the vaccine needs to be kept below room temperature, and then the administration of it needs to be done by people who are qualified," he says. He adds that ministers are proposing to "broaden the range of qualifications that are allowed to do the vaccination".
