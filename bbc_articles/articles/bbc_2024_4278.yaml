id: bbc_2024_4278
title: Elon Musk and son visit Berlin Tesla plant after pylon fire - BBC News
date: '2024-03-14'
section: General
url: http://www.bbc.co.uk/news/world-europe-68558161
content: |-
  A far-left activist group took responsibility for the fire, which left the plant without power for nearly a week.

  Elon Musk - and his son X AE A-XII - have visited a Tesla plant in Berlin that was targeted by a suspected arson attack earlier this month.

  A nearby electricity pylon was set on fire, leaving the facility without power for nearly a week.

  An activist group took responsibility for the fire. It said it targeted the site because of the amount of resources and labour it uses.

  Mr Musk told reporters at the site he wanted to push ahead with plans to expand the plant, despite the fire.
