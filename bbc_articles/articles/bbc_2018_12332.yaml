content: |-
  Meet the man behind Shiro's Story, a low-budget drama set in London, on the verge of signing a deal.

  Shiro's Story is a low-budget rap action drama set in Deptford, London. It has stacked up millions of views on YouTube for its 10 minute long, three-part series about love, betrayal and gun violence.

  Writer and director Rapman is on the verge of signing a deal with a major international production company to make more episodes.

  He says the story is based on the things he saw growing up.

  He took the BBC on a tour of the council estate where the story is based.

  Read more: Rapman - I want to take Shiro's Story to Netflix
