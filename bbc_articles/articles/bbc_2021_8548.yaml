title: Wildfires spread from California to Nevada - BBC News
date: '2021-07-26'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-57961767
content: |-
  Fire crews are battling extreme temperatures to control wildfires in California and Nevada.

  Fire crews are battling extreme temperatures as they try to control wildfires in California and Nevada. Hundreds of people have been evacuated.

  Across the country, in Washington DC, the moon turned a bright orange colour due to the smoke from the fires.
