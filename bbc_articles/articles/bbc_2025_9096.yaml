  The comment came after the company's boss refused to rule out opening production plants in America.

  Jaguar says it has no plans to build cars in the US

  UK-based carmaker Jaguar Land Rover has said it does not intend to produce vehicles in the US, as President Donald Trump's tariffs impact the motor industry. "Following articles based on comments made by the JLR CEO in the full year earnings media call, we can confirm we have no plans to build cars in the US," a spokesperson told the BBC. Jaguar, which has no factories in the US, paused shipments to the country in April after Trump's first tariff announcements, before resuming exports to the country this month. This week, the firm joined a growing list of companies to hold back on giving profit forecasts, as Trump's unpredictable trade policies continue to impact businesses around the world.
