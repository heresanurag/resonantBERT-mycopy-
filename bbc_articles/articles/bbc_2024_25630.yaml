title: Pontypridd man dies after falling on Benidorm holiday - BBC News
date: '2024-10-02'
section: Wales
url: http://www.bbc.co.uk/news/articles/c5y9qnzvn19o
content: |-
  Nathan Osman, a 30-year-old father-of-four, died after getting lost on his way to his holiday hotel in Spain.

  Nathan Osman's family said he "made so many wonderful memories that his children will cherish forever"

  The family of a dad-of-four have been left "devastated" after he died after taking the wrong path back to his hotel in the Spanish resort of Benidorm. Nathan Osman, 30, from Pontypridd, Rhondda Cynon Taf, was on his first holiday abroad with friends on Saturday when he got lost and had a fatal fall. Mr Osman's family said his children were "his absolute world and he lived and breathed for them". His family urged people to never walk home alone.

  Nathan Osman and his family enjoyed exploring and hiking

  In a tribute, his family said the accident "has left [his partner] Katie and his four children to live the rest of their lives without him". The family described him as an "incredible father", "loyal", "caring" and "a true friend to anyone that was lucky enough to know him". "His smile and his big brown eyes were infectious," they added. "He was the kindest of souls and his legacy will live on through his four beautiful children." Mr Osman and Katie loved the beach, exploring and being outdoors. His family said: "Regardless of how you may feel in the moment, please don’t take for granted your own safety. "We want Nathan to be remembered for the amazing soul he was and the beautiful legacy he has left for everyone. He will be missed forever."
