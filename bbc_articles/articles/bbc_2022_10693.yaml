title: Alabama pastor arrested while watering neighbour's plants - BBC News
date: '2022-08-27'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-62696077
content: |-
  Michael Jennings was handcuffed despite another neighbour telling police it was all a misunderstanding.

  Footage has emerged of a pastor in the US state of Alabama being arrested as he watered his neighbour's flowers.

  Michael Jennings was handcuffed during the good deed, despite another neighbour telling police it was all a misunderstanding.

  His lawyer says the incident - in May of this year - was a clear case of racial profiling.
