  There is plenty of history when it comes to O'Sullivan versus Carter. Formerly practice partners, their relationship appears to have soured over the years. They have met twice with the world title on the line and more recently played out a fiercely contested Masters final in 2024, with O'Sullivan victorious. After that encounter, O'Sullivan called Carter "not a nice person" and "a nightmare" to play against after being criticised by his opponent. O'Sullivan, who has claimed a record 41 ranking titles, has dominated their head-to-head statistics, winning 24 of their 27 matches in varying formats of the game. However, Carter did triumph in the second-round contest at the World Championship in April 2018, in another match with a bit of spice to it. The pair barged shoulders during the 19th frame of Carter's 13-9 second-round win at the Crucible. Referee Paul Collier told the players to get back to the game after words were exchanged between the pair. O'Sullivan later said the incident was "nothing" - and blamed the media for trying to make a story out of it.

  I don't think either of them [Ronnie O'Sullivan or Ali Carter] will be happy with that draw. It is great Ronnie is in the competition - we've not seen him since January. I want him to play and as it stands, it seems like he is playing which is fantastic for the game. Carter is one of the toughest qualifiers to get drawn against. It is a horrible draw.

