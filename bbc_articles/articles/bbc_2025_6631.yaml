  Defending champion Kyren Wilson will play Lei Peifan in the World Championship first round - with Ronnie O'Sullivan set to face Ali Carter as he bids for a record eighth title in the modern era. O'Sullivan, 49, who confirmed on Thursday that he plans to participate in the tournament, external, has not played competitively since snapping his cue at the Championship League in January. His prospective meeting with Carter, who at 18th in the world is the highest ranked qualifier, is a repeat of the 2008 and 2012 finals, which were both won by 'The Rocket'. World number one Judd Trump will take on Zhou Yuelong, while Masters winner Shaun Murphy will play debutant Daniel Wells. Four-time world champion Mark Selby will meet qualifier Ben Woollaston, who is appearing in the televised stages of the competition for the first time since 2013. John Higgins, who has also won four world crowns, will play Joe O'Connor, while 2024 finalist Jak Jones faces a difficult assignment against former UK champion Zhao Xintong, who is competing as an amateur having served a ban for breaching betting regulations. Zhao is one of a record 10 Chinese players to reach this stage of the tournament -with Ding Junhui facing another man making his debut in Zak Surety and Si Jiahui, who reached the last four two years ago, playing David Gilbert, a semi-finalist in 2024. There are a number of other intriguing encounters in the draw, with 2010 champion Neil Robertson facing Chris Wakelin, Mark Allen taking on Fan Zhengyi, and Barry Hawkins playing Hossein Vafaei. The tournament begins on Saturday at the Crucible Theatre in Sheffield, with live coverage across the BBC.

