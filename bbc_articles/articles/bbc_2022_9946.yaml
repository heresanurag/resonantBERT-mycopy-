  Sharman Islam Siraj, 38, from Ilford, was among those honouring Ms Aleena.

  "We are from the area, this is our home, this our community," she said.

  "She was someone that we used to see all the time walking past our house, she was in the same school as my sister, she was just a local girl - and I feel like if this could happen to her, this could happen to anybody.

  "It's shocking that it can happen to her, it's shocking that it happened here. I'm here to support the family, I'm here to show love, support, solidarity."

  Ms Aleena's family say the vigil was to highlight the need to end violence against women

  Women and men, young and old joined Zara's family as they walked through Gants Hill along the route she had tried to make home.

  Friends and supporters wore mourning white as they walked in silence.

  One mother of four sons said she took her children to the vigil to ensure they respect women when they grew up.

  While sombre in atmosphere, the mood was one of strength and defiance.Friends of Zara said she would have been proud of what they did today.

  One message was clear: Zara was a "brave fearless and independent woman" who would never be forgotten.

  Anjum Mouj, co-chair of London Black Women's Project - who was liaising with Ms Aleena's family, spoke with the crowd before the vigil got under way.

  She said: "Grandma, mother, aunties, cousins, friends, family, have asked me to thank you from their heart, their heartfelt thanks for you all to be here, to do this walk with us to take Zara Natasha Aleena home, the steps that she couldn't take.

  "She could see, it's in touching distance of her home, it's in touching distance, she could see her home almost and she couldn't walk there."

  Mayor of London Sadiq Khan said: "All women should be able to walk home safely"

  Mayor of London Sadiq Khan said: "All women should be able to walk home safely.

  "My thoughts and prayers go out to Zara Aleena's family and friends, who came together with others today to remember her life and complete her journey home."

  Two women hug as they attend the vigil in Ilford

  A post-mortem examination found she had suffered multiple serious injuries.

  Jordan McSweeney, 29, of Dagenham, has been charged with Ms Aleena's murder, attempted penetration without consent and robbery.
