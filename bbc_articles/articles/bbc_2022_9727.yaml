title: Fire breaks out in Kent field - BBC News
date: '2022-07-24'
section: General
url: http://www.bbc.co.uk/news/uk-62279837
content: |-
  The local fire service says the blaze, which spanned eight hectares, has now been extinguished.

  A crop fire broke out on Saturday afternoon in a field in Lenham Heath, between Maidstone and Ashford.

  Officials at the Kent Fire and Rescue Service said they managed to put the blaze out, which covered about eight hectares (20 acres) of land.

  A long queue of lorries could also be seen along the M20.
