content: |-
  Ronnie O'Sullivan will play Jackson Page in the first round of World Championship as he bids for a record eighth title in the modern era.

  Ronnie O'Sullivan could join Steve Davis, Stephen Hendry and Mark Williams, by winning the three Triple Crown events in a season

  Coverage: Watch live on BBC TV, BBC iPlayer, BBC Sport website and app; live text coverage of selected matches; updates on Radio 5 Live.

  Ronnie O'Sullivan will play Jackson Page in the first round of the World Championship as he bids for a record eighth title in the modern era. O'Sullivan, 48, is also aiming to become the fourth player to win all three Triple Crown events in a season. The tournament begins on Saturday at the Crucible Theatre in Sheffield, with live coverage across the BBC.

  Four-time winner Mark Selby plays Joe O'Connor, who came though qualifying and is the only debutant in the draw. John Higgins - another four-time champion - will meet Jamie Jones, who defeated 2010 champion Neil Robertson in the final round of qualifying. Mark Williams, who won the most recent of his three titles in 2018, arrives at the Crucible having recently claimed the prestigious Tour Championship, but will face a tough opener against Si Jiahui, who reached the semi-finals 12 months ago. Mark Allen, who has won three tournaments this season, gets under way against Robbie Williams, 2005 winner Shaun Murphy plays Lyu Haotian, and there is also the prospect of an entertaining encounter between Ding Junhui and Jack Lisowski. Gary Wilson will look to build on his successes in the Scottish and Welsh Opens when he plays another former champion in Stuart Bingham. Kyren Wilson will look to avoid an upset against 52-year-old Dominic Dale, who is appearing for the first time since 2014, having become the oldest qualifier since Steve Davis in 2010.

  Remarkably, O'Sullivan heads to Sheffield for the 32nd time while enjoying an unbroken spell at the top of the rankings lasting more than two years and is unsurprisingly the bookmakers' favourite to triumph. He has claimed five titles this season, including the UK Championship and the Masters, in the process earning £1.2m in prize money - more in a single campaign than any player in history. He has also defeated Page in both their previous meetings, although the Welshman is regarded as one of the sport's most exciting prospects and recently advanced to the semi-finals of the World Open. The 22-year-old will go into the contest after sealing a final-frame victory in qualifying over world number 22 Noppon Saengkham with a superb break of 107.

