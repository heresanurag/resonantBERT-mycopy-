  I've been here before and drawn the lowest-ranked qualifiers, but last time I lost. Robbie is a very good player - he scores heavily and gets on with it. I am looking forward to it. Ronnie against Jackson could be really interesting. Jackson does not seem to be scared of anyone. He will not be intimidated by the atmosphere, although Ronnie is trying to create a bit of history for himself. Ding versus Jack Lisowski is another huge match. Jack would have been the player that all the seeds wanted to avoid given how talented he is and how he performs on the big occasion. Hossein is not scared to ruffle a few feathers, so it will be interesting to see how he treats the build-up playing one of the form players of the year in Judd. Judd has won five tournaments this year and will be full of confidence.
