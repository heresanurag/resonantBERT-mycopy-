  Nakash, 13, Aayat, 11, and seven-year-old Muhammad Malik died in the blaze in East Ham on 13 July.

  Children who died in fire named as parents pay tribute

  The parents of three children who died in a fire in east London have paid tribute to them, saying: “You are loved beyond words.” The children have been named as 13-year-old Nakash Malik, his 11-year-old sister Aayat Malik and their seven-year-old brother Muhammad Hanan Malik. Their parents, Khurram Malik and Naumana Gul Khan, said of their children: “Your lives were a blessing, your memory a treasure. You are loved beyond words and missed beyond measure. May you rest in peace in God's heaven.” The blaze broke out on the ground and first floor of a terraced house on Napier Road in East Ham, shortly before 08:30 BST on Saturday 13 July.

  Metropolitan Police officers continue to investigate the cause of the fire alongside the London Fire Brigade. At this stage, there is no evidence to indicate suspicious circumstances, a force spokesperson said.
