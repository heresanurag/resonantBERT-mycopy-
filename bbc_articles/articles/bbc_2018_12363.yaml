content: |-
  The peer stands by his decision as Sir Philip Green plans to make a complaint to the House of Lords.

  This video can not be played To play this video you need to enable JavaScript in your browser. Lord Hain: "I stand fully by what I've said in the House of Lords"

  Lord Hain says he "will not be silenced" after naming Sir Philip Green as the businessman who prevented the Telegraph from publishing allegations of sexual and racial harassment.

  Sir Philip has said it was "outrageous" for the peer to use parliamentary privilege to name him and will issue a formal complaint to the House of Lords.

  He has "categorically and wholly" denied the allegations.

  Lord Hain told BBC News he will not apologise for identifying the tycoon.

  Sir Philip said Lord Hain had failed to disclose financial links to Gordon Dadds, the law firm representing the Daily Telegraph.

  He says he believes Lord Hain's actions, on Thursday, were a breach of the House of Lords' code of conduct.

  This video can not be played To play this video you need to enable JavaScript in your browser. Monaco, models and money – who is retail mogul Sir Philip Green?

  But speaking to the BBC, the former Neath MP said: "I stand fully by what I've said in the House of Lords. I'm resolute about that.

  "I will not be silenced or intimidated into retracting or apologising for what I said."

  He said he has "complied fully" with all of his House of Lords obligations.

  "I am going to continue to stand up for citizens' rights against power, privilege and wealth."

  Lord Hain previously "categorically" denied that he was aware of law firm Gordon Dadds' work with the Telegraph and said the firm played "absolutely no part" in his decision to name Sir Philip.

  He is a global and government adviser at Gordon Dadds.

  The law firm said Lord Hain had not obtained any information from it regarding the case, "including any information which would enable him to identify Philip Green as having any involvement in it".

  He added: "What he [Sir Philip] is saying is attempting, maliciously, to shift the story from what has really gone on here."

  The peer added that he had "stood for justice for the average citizen the world over all my life".

  Sir Philip, with wife Tina (right) at London Fashion Week, has denied the allegations

  On Friday Sir Philip, who has been the centre of an eight-month investigation by the Daily Telegraph, had said: "As many people have said, Lord Hain's blatant disregard of a judgement made by three senior judges is outrageous."

  The Telegraph says that former employees of the businessman have accused him of sexual and racial harassment.

  But the Court of Appeal granted Sir Philip an injunction, preventing the paper from naming him.

  On Wednesday the Telegraph reported "a leading businessman" was granted an injunction.

  The newspaper has said "substantial sums" were paid to five members of Sir Philip's staff in settlement agreements which included a legal commitment not to discuss their alleged experiences.

  Sir Philip has "categorically and wholly" denied allegations of "unlawful sexual or racist behaviour".

  Although the press were gagged, MPs and peers are protected from being prosecuted over statements made in the Commons or Lords under Parliamentary privilege.

  Labour peer Lord Hain identified the Topshop boss in the Lords on Thursday, saying he felt it was his duty to do so because "it was in the public interest".

  The Telegraph and the media at large were then entitled to report Lord Hain's statement in Parliament, even though the injunction had been issued by the courts.

  Sir Philip is currently in Tucson, Arizona, but refused to speak to a Sky News crew who approached him there on Friday, telling them they were "being intrusive".
