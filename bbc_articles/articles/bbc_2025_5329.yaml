title: Historic Olney Pancake Race attracts 'best' turnout - BBC News
date: '2025-03-04'
section: General
url: http://www.bbc.co.uk/news/videos/c5y9kknelldo
content: |-
  Last year's runner-up goes one better in a tradition that dates from 1445.

  Spectators and the international media gathered in a small town in Buckinghamshire on a sunny Shrove Tuesday to watch the annual pancake race take place.

  This year's race was won by 2023 champion and 2024 runner-up Eloise Kramer, who was up against 41 other runners.

  Ruth Martin, one of the organisers of the Olney Pancake Race, said it had the "best turnout so far".

  The race itself dates back to 1445 with ladies from the town, near Milton Keynes, running with their frying pans from the market square to the church. It was revived in 1948.

