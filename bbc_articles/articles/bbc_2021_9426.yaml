title: Storms hit Essex and Cambridgeshire after hot spell - BBC News
date: '2021-07-20'
section: General
url: http://www.bbc.co.uk/news/uk-england-essex-57909228
content: |-
  The Met Office has issued an amber warning for thunderstorms.

  Sunny skies turned to heavy rain and hail across the East of England, as the Met Office issued an amber warning for thunderstorms.

  Several Twitter users posted videos of the torrential showers, in stark contrast to the earlier sun which saw parts of the region heat up to 30C (86F).

  The Met Office says the weather could lead to localised flooding and travel disruption.

  The hot weather is expected to continue for the rest of the week.
