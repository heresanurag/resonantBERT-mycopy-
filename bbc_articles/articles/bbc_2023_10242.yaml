title: 'Watch: Raging wildfires shut down Italian airport - BBC News'
date: '2023-07-25'
section: General
url: http://www.bbc.co.uk/news/world-europe-66298131
content: |-
  Palermo’s airport was shut down overnight as wildfires burned around its perimeter.

  Palermo’s international airport was shut down overnight as fires burned around its perimeter. The wildfire is one of several on the island of Sicily and has spread due to windy conditions.

  Southern Italy has been sweltering through weeks of extreme heat. On Monday, temperatures in Palermo reached a record 47C (116F).
