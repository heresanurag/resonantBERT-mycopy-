title: The 11-year-old ballroom dancer winning without a partner - BBC News
date: '2018-06-03'
section: General
url: http://www.bbc.co.uk/news/uk-england-hampshire-44304346
content: |-
  Bridget Tilley is an 11-year-old world champion dancer, now she's going solo.

  An 11-year-old girl world champion ballroom dancer has gone solo, due to a lack of young male dance partners.

  Bridget Tilley, from Hedge End in Hampshire, has won titles across the world, including an international championship in Paris.

  She trains up to five times a week and is now working towards the UK's Stars of the Future Under 12 Solo.
