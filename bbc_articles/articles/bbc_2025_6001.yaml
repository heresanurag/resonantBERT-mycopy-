  The Evangelical Christian has long been a fervent supporter of Israel.

  Mike Huckabee confirmed as US ambassador to Israel

  Evangelical Christian and former talk show host Mike Huckabee has been confirmed as the new US ambassador to Israel. The former Arkansas governor has long been a fervent supporter of Israel. He strongly backs Jewish settlements in the Palestinian territories, which are considered illegal under international law - though Israel rejects this. "This is a great day for the Israeli-American alliance," Israeli Prime Minister Benjamin Netanyahu said, joining other members of his government in celebrating the outcome of Wednesday's vote. The Senate backed Huckabee by 53 to 46, largely along party lines, with only one Democrat, John Fetterman, supporting him.

  Many Democrats have, however, been critical of his previous statements about the ongoing war in Gaza. Democratic Senator Jerry Nadler last month said Huckabee was "woefully unfit" for the role. Nadler also accused him of engaging in "brazen denial of the existence of the Palestinian people", referencing a 2017 news conference where Huckabee said there was "no such thing as a Palestinian". Huckabee takes up his post at a time when there is little sign of any agreement on a fresh ceasefire in Gaza and the return of the remaining hostages. He has also frequently expressed his support for annexing the occupied West Bank, with far-right politicians in Israel calling this year for Israeli sovereignty to be extended there. But during his questioning by a Senate committee, he sought to play down some of his past statements, saying he would "carry out the president's priorities", not his, and denied backing the expulsion of Palestinians. Israeli Foreign Minister Gideon Sa'ar said Huckabee's appointment would "strengthen the unbreakable bond between our nations", following a phone call between the two. Israel's prime minister also shared his congratulations, describing Huckabee as a "dear friend" in a post on X. Netanyahu has just returned from Washington where he stood next to US President Donald Trump as he told the world he was conducting direct talks with Iran - Israel's principal regional adversary - and praised Turkey's President Erdogan - whom Israel regards as a potential threat in the remaking of Syria. Speaking on Wednesday, the Trump said Huckabee would "be fantastic" in his new role. "He's going to bring home the bacon," he said from the Oval Office, "even though bacon isn't too big in Israel. I had to clear that up."
