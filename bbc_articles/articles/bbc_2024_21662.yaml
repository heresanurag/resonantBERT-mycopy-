title: 'Coastal erosion: Saundersfoot sea defence pebble return plea - BBC News'
date: '2024-09-12'
section: Wales
url: http://www.bbc.co.uk/news/articles/c39kgw2xr4xo
content: |-
  People are asked to return any pebbles they have taken from a beach as they protect nearby homes.

  People have been urged to return pebbles they have taken from a popular tourist beach

  Pebble pinchers are being asked to return them to a popular tourist beach in an effort to claw back stones that are key for coastal defences. Saundersfoot beach is being stripped of pebbles essential to defend homes from coastal erosion, Pembrokeshire councillor Chris Williams said. With coastal erosion and the warming climate, he said the beach and nearby properties were at risk without the protective pebbles in place. He added: "Recently people have been taking stones, painting them and selling them off for different sorts of charities. I don’t think people are aware of how important they are to that beach."

  Pembrokeshire Coast National Park Authority said pebbles helped play a "vital role" in protecting coastlines by absorbing wave energy and helping to stabilise the shoreline. It urged people not to take them as keepsakes and return any they may have. It added: "While the removal of pebbles may seem small on an individual basis, over time, this can contribute to changes in the beach's natural defences." Mr William acknowledged that he himself had been "guilty" of taking pebbles in the past and said "in an ideal world" he would also like people to return the stones they had taken.

  Allan Lunt admitted he’d taken three pebbles from the beach to place around his fish pond

  Enjoying the sunshine on Saundersfoot beach on Wednesday, 73-year-old Allan Lunt from Chester admitted he had taken three pebbles from the beach during his holiday. "Some of them are very attractive and, secondly, I have a fish pond at home and I place them around [it]," he said. "The pebbles I take are very small, whether that contributes to coastal erosion, I'm not too sure."

  The stones are essential to protect beachfront properties from the waves

  Sophie, 31, and Jason Powell, 36, from Worcester, said they had never thought about the effect of taking pebbles. "I know many people who have taken them for souvenirs," said Sophie. "We’ve got some acrylic paint pens, we were going to draw on some with our little girl to make memories and take them home to show family." A defiant Jason added: "I’ve been coming here since I was a kid and it doesn’t seem like there are any less [pebbles], I haven't noticed any difference." When questioned about the possible contribution to coastal erosion, Lauren Murphy, 34, from Leeds said she had never really thought about the bigger picture. "We’ve been collecting shells this morning, but it’s something that we’d think about in future, not to take pebbles just in case it did contribute to coastal erosion."

  Chris Williams says Saundersfoot's pebbles come from "all around the world"

  Mr Williams said it was important the stones do not get depleted as the existing stones "came from all over the world and it was used as ballast" for the coal industry. "The stone was dropped off before they picked up the coal... and in the 70s there was stone put on the beach from the local quarry. "It didn’t look very pleasant for the first couple of years but as the sea and the climate weathered it it formed the grey pebbles. "The stones on that beach aren’t from Saundersfoot, they’ve been brought in to help maintain that beach and the properties behind." A council meeting will be held next week to look at solutions to the problem.
