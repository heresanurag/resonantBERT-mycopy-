id: bbc_2018_9767
title: Ruby Rose cast to play Batwoman in new TV production - BBC News
date: '2018-08-08'
section: Newsbeat
url: http://www.bbc.co.uk/news/newsbeat-45109922
content: |-
  The series, which will see Batwoman's alter ego Kate Kane portrayed as a lesbian, is still in development.

  Ruby Rose will play the first openly lesbian lead superhero in a new TV production of Batwoman.

  The Australian actress will play the title lead in a new series on The CW Network in America.

  The series will see Batwoman's alter ego Kate Kane portrayed as a lesbian, and is expected to air in late 2019/early 2020.

  Kate Kane has been openly gay since 2006, in an effort by DC Comics to make its publications more diverse.

