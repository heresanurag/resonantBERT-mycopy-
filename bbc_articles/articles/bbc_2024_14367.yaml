title: 'Watch: Drug dealer jumps into river to flee police - BBC News'
date: '2024-06-07'
section: General
url: http://www.bbc.co.uk/news/videos/cz5510vz2r6o
content: |-
  Police use a paddleboard to retrieve a bag containing money and drugs from the branches of a tree.

  Police bodycam footage showed the moment a drug dealer jumped into a river in an attempt to avoid arrest.

  Fynley Jefferies, 20, ran away when approached by officers in St Neots, Cambridgeshire, on 21 August 2023, before leaping into the water and staying there for several minutes.

  Officers used a member of the public's paddleboard to retrieve a bag containing cash, cocaine, ecstasy and ketamine with a street value of £2,000, which he had tied to the branches of a tree.

  Jefferies, of Parker Close, Eynesbury, admitted possession with intent to supply drugs, harassment without violence and malicious communication at Cambridge Crown Court on 4 June.

  He was sentenced to three years and 11 months in prison.

