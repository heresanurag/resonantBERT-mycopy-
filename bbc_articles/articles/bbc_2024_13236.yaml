  The University of Reading wants the education watchdog to scrap single-word judgements.

  The University of Reading wants the education watchdog to scrap single-word judgements

  A university has refused to use a one-word grade given by Ofsted in a protest against the way the education regulator works. The University of Reading's Institute of Education, which trains teachers, was marked "outstanding" after an inspection in May. But it said it would not be using the phrase in any of its marketing material following the death of Caversham headteacher Ruth Perry, who took her own life after her school was downgraded to "inadequate". Ofsted, external said the decision to use any quotes from its reports in promotional content was down to the provider.

  Mrs Perry, 53, took her own life while waiting for an Ofsted report to be published

  The rating was awarded to the university's training facilities for primary and secondary school teachers on 21 June. But while the institute said it was "proud" to use some of the content from the Ofsted report, it would not focus on the one-word grade as it wanted the watchdog to change the way it reviewed schools. Mrs Perry, the headteacher of Caversham Primary School – one of the Institute of Education’s partner schools - died by suicide in January 2023. It sparked calls for the body, which oversees school inspections, to stop handing out the single-word judgements. However, in April, the government said the ratings should stay.

  Ofsted's chief inspector, Sir Martyn Oliver, previously apologised for the part the school inspection played in Mrs Perry's death

  Schools or organisations are inspected by Ofsted every four years or 30 months, depending on their status. They are given a report and graded accordingly: Dr Catherine Foley, co-head of Initial Teacher Education at the Institute of Education, said: “Will we be using content from the reports on our website? Yes. “But you won't find the one-word judgement in our email signatures, banners, or marketing materials. "It's time to stand alongside all those campaigning for change – Ofsted must reform.” Ofsted told the BBC it did not ask providers to display Ofsted judgements, logos, banners or quotes in any promotional material. A spokesperson added: "Some want to celebrate their success and that’s their choice. If others choose not to, that’s fine too."
