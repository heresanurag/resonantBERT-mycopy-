title: 'Watch: Why Sunak’s Rwanda bill battle isn’t over - BBC News'
date: '2023-12-13'
section: General
url: http://www.bbc.co.uk/news/uk-politics-67692848
content: |-
  The BBC's Ione Wells tells us what's next for the PM's Rwanda plan after it passes a vote in the Commons.

  The House of Commons has voted in support of a new law aimed at sending some asylum seekers to Rwanda.

  Despite rebels from his own party failing to vote for the bill, the prime minister won by 313 to 269 votes

  The BBC's Ione Wells explains what happens next for Rishi Sunak and his Rwanda plan.
