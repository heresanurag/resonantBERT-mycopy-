title: 'Missing Charlie Pope: Body found in Manchester canal - BBC News'
date: '2018-03-03'
section: Manchester
url: http://www.bbc.co.uk/news/uk-england-manchester-43256675
content: |-
  Charlie Pope, 19, went missing in Manchester city centre in the early hours of Friday.

  Although the body has not been formally identified, police believe it is Charlie Pope

  Police searching for a missing teenager have found a body in a canal.

  Charlie Pope, 19, left the Zombie Shack on New Wakefield Street, Manchester, at 02:30 GMT on Friday. He was last seen on Whitworth Street two hours later.

  Following an underwater search in the canal just off Whitworth Street West, a body was found on Friday afternoon.

  Police believe the body found is that of the teenager, from Ponteland, Northumberland. There are no suspicious circumstances surrounding the death.

