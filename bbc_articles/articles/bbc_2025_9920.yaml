  The head of South Africa's most prominent Afrikaners interest group told the BBC on Wednesday night that "there are real issues that need to be addressed" when asked about the Trump/Ramaphosa meeting. Asked whether Afriforum, a South African NGO representing Afrikaners in the country, helped make the video shown in the White House Oval Office, CEO Kallie Kriel said the group had "used some of that video footage in some of our videos, but in terms of that specific compilation, we did not make that". "That video material is quite easily accessible to many people, but I think that video was very important to just get the shift to a situation that there can't be denialism, and if there is (sic) going to be solutions, then there are real issues that need to be addressed. And I think that video made the point quite strongly," she said. Tensions between South Africa and the US are not new. Days after Trump took office for his second term in January, Ramaphosa signed into law the controversial bill that allows South Africa's government to expropriate privately owned land in cases when it is deemed "equitable and in the public interest". The move only served to tarnish the image of Africa's biggest economy in the eyes of the Trump administration - already angered by its genocide case against Israel at the International Court of Justice (ICJ). In February, the US president announced the suspension of critical aid to South Africa and offered to allow members of the Afrikaner community - who are mostly white descendants of early Dutch and French settlers - to settle in the US as refugees. South Africa's ambassador to Washington, Ebrahim Rasool, was also expelled in March after accusing Trump of "mobilising a supremacism" and trying to "project white victimhood as a dog whistle".
