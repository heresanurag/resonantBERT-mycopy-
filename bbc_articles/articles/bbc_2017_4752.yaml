  • None Manchester United have drawn 15 league games this season - their most ever in a Premier League season and most in a league campaign since 1991-92 (also 15).
  • None Southampton had six shots on target - only Tottenham (seven on Sunday) have had more in a match against Manchester United this season in all competitions.
  • None However, that included a missed penalty which means Saints have now missed their last three Premier League spot kicks, after Dusan Tadic v Hull and Shane Long v Middlesbrough.
  • None Sergio Romero became the eighth different United keeper to save a Premier League penalty, and first since David de Gea against Everton in October 2014.
  • None Southampton have now gone four top-flight home games without a goal for the first time in their history.
  • None Even if United win their remaining game, this will be their lowest tally of wins in a single Premier League season (currently 17). They last had fewer in 1990-91 (16 wins).

  Southampton host Stoke City on the final day of the season on Sunday while Manchester United host Crystal Palace at Old Trafford (both 15:00 BST).

  Jose Mourinho's side then travel to Stockholm for the Europa League final against Ajax on Wednesday, 24 May (19:45 BST).
