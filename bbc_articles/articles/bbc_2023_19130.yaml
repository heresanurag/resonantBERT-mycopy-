title: 'Watch: Rhinos ''scared'' by Christmas pudding present - BBC News'
date: '2023-12-23'
section: General
url: http://www.bbc.co.uk/news/uk-england-oxfordshire-67804985
content: |-
  A giant, decorated enrichment ball left rhinos at the Cotswold Wildlife Park unimpressed.

  You know that feeling when you buy someone a Christmas gift that you thought they would really like?

  That is exactly how keepers at Cotswold Wildlife Park in Oxfordshire must have been feeling when they delivered a giant decorated Christmas pudding enrichment ball to their rhinos.

  In the best-kept tradition of getting an ugly jumper from your auntie, the rhinos were not quite sure and ran off in the opposite direction.

