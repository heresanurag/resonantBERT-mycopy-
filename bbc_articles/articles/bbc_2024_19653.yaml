title: Haunting Titanic newspaper article found in woman's wardrobe - BBC News
date: '2024-08-22'
section: England
url: http://www.bbc.co.uk/news/articles/cz9w31jdejxo
content: |-
  The 1912 newspaper shows two women in Southampton waiting for a list of survivors to be posted.

  The newspaper had been kept safe for 112 years

  A newspaper published in the aftermath of the sinking of the Titanic has been unearthed in a wardrobe. The edition of The Daily Mirror from 20 April 1912, which shows a photo of two women waiting for the list of survivors to be posted on a wall in Southampton, was found in a house in Lichfield, Staffordshire, after 112 years. More than 1,500 people died when the Titanic sank after hitting an iceberg in the Atlantic Ocean on 14 April 1912. The newspaper was found by Hansons Auctioneers, the owner of which, Charles Hanson, called it a "valuable piece of social history".

  "The sinking of the Titanic has been heavily documented in films, TV shows and books and we know much about those who lost their lives," he said. "This find reminds us of the many bereaved families and friends, heartbroken mothers, fathers and wives."

  The newspaper was from five days after the disaster, the day the list of survivors was posted in Southampton

  Beneath the picture of the women, the article described "tragedy upon tragedy" for Southampton where "the majority" of the crew lived. "A list of the saved was posted outside the White Star offices, and mothers and wives who had been hoping against hope eagerly read the names, only to find their worst fears were realised," it read. "By this appalling disaster mothers have been robbed of sons, wives of husbands and young girls of sweethearts." It described "a terrible day in the history of the town, though it put an end to all suspense". Inside the newspaper, which sold for £34 on Tuesday, is a double-page spread with photographs of some of the victims.

  Titanic sank in the early hours of 15 April 1912

  Mr Hanson said the woman whose wardrobe the paper was found in kept newspapers marking several major events, including the coronation of King George V in 1911. He said the focus for the Titanic was often on the victims themselves, rather than the victims' families. "But when you see the faces of those affected it's very moving," he said.

