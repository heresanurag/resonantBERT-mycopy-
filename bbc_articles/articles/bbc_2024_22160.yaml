title: 'Kolkata rape case: Mamata Banerjee accepts some demands of the protesting
  doctors - BBC News'
date: '2024-09-17'
section: Asia
url: http://www.bbc.co.uk/news/articles/cd6qvyxx46vo
content: |-
  The West Bengal government has agreed to remove a top police officer and two senior health officials.

  Thousands of doctors in Kolkata have been protesting the rape and murder of their colleague

  The Indian state of West Bengal has agreed to remove the police chief of its capital, Kolkata, following a meeting with doctors protesting the rape and murder of their colleague. Two other senior officials - the director of medical education and the director of health services - will also be removed, Chief Minister Mamata Banerjee said. Thousands of junior doctors in the state have been on a strike since 9 August, when the body of the 31-year-old woman was found at the state-run hospital where she worked. The crime sparked nationwide outrage and concerns about the safety of health workers in India.

  A hospital volunteer was arrested in connection with the case, which is now being investigated by a federal agency. The protesting doctors have voiced five key changes: justice for the victim, the removal of senior police officials, and enhanced security for health workers, among them.
  • None Rape and murder of doctor in hospital sparks protests in India On Monday, Banerjee announced the government had accepted some of their demands. "The commissioner of Kolkata Police will be removed on Tuesday evening and there will be some more changes," she said at a midnight press conference, held after a five-hour meeting with a delegation of protesters. The decision has raised hopes for junior doctors resuming work - but protesters have said they would decide their next steps, external only after the promises made by the government are fulfilled. The woman's murder has sparked an outpouring of anger, especially in West Bengal. A series of protests have taken place since the killing. The largest saw tens of thousands of women across West Bengal participating in the Reclaim the Night march on 14 August to demand "independence to live in freedom and without fear". While protests died down in other parts of India, doctors in Kolkata refused to back down till all their demands are met. Thousands of them have set up camp outside the state's health department headquarters, defying a Supreme Court order for them to return to work, which was passed last week. Authorities had earlier invited the protesters for a meeting with the chief minister but the doctors insisted on livestreaming the meeting, which the government declined. The protests have put the West Bengal government on the back foot. Courts criticised the local administration and police for lapses in the handling of the case, which they have denied. The state government has said that 23 people have died after not accessing medical services during the strike. But the protesting doctors say they have ensured that emergency services are not affected. On Monday, Banerjee announced that no action will be taken against protesting doctors for abstaining from work. India's Supreme Court has said the incident had "shocked the conscience of the nation" and criticised authorities for their handling of the investigation. Banerjee's government has announced a slew of measures for women's safety at workplaces, including designated retiring rooms and CCTV-monitored "safe zones" at state-run hospitals.
