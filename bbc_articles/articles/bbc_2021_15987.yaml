content: |-
  Ros Atkins examines the ethical arguments surrounding vaccine mandates.

  Austria is introducing a vaccine mandate from February and other nations around the world are also looking at their options.

  This complex situation has many viewpoints, from intrusions on personal liberty, moral obligations to keep each other safe, to unfair distribution of vaccines to poorer countries.

  Ros Atkins takes a look at the differing views.
