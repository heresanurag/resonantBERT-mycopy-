  A man who stole a car from south Belfast with a 17-year-old passenger on board was later detained across the border.

  Arrest after car stolen with teenage girl still inside

  A man who stole a car from Belfast with a 17-year-old girl still inside has been arrested over the border in Dundalk. Police said the car, which had been parked up in Botanic Avenue in the south of the city, was stolen in the early hours of Saturday morning. The car stopped on the Saintfield Road in Lisburn, about 15 minutes away, where the passenger managed to escape uninjured. The car was then seen being driven at speeds in excess of 100mph on the A1 when police contacted An Garda Síochána (Irish police) to let them know it was heading towards the border.

  Officers from the Police Service of Northern Ireland (PSNI) were informed just before 02:30 that the car had been located and a 25-year-old man had been arrested in Dundalk. He remains in custody. "The victim was not injured but left shaken by her ordeal," said PSNI Det Sgt McVeagh. "Thankfully we are not dealing with any casualties after some very dangerous and reckless behaviour by the suspect involved." "Excellent cooperative work between ourselves and our colleagues in the An Garda Síochána have ensured this vehicle was recovered and the suspect was arrested." Irish police said the car was found on the Newry Road in Dundalk and a man was arrested nearby.
