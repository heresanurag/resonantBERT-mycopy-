content: |-
  Politicians and pundits were quizzed by the BBC's Fiona Bruce and American voters in Pennsylvania.

  In a special US election episode of the BBC's Question Time programme, host Fiona Bruce quizzed politicians and pundits on immigration, foreign policy and the economy.

  The panel included our North America Correspondent Anthony Zurcher, Republican and Democratic members of Pennsylvania’s House of Representatives, Martina White and Malcolm Kenyatta; British-American commentator Mehdi Hasan; and Bryan Lanza, an adviser to Donald Trump.

  The episode featured a live audience of American voters and was recorded in the key swing state of Pennsylvania on 9 October.

  After an hour's back and forth with panellists and audience members on key voter issues, Bruce concluded "that was lively".
