title: Converted electric bike caused fatal Coventry fire - BBC News
date: '2024-11-10'
section: Coventry & Warwickshire
url: http://www.bbc.co.uk/news/articles/cje0d41gwwjo
content: |-
  Investigators focus on a pedal bike converted into an electric model stored in a property's hallway.

  An investigation into the fire concluded it was started accidentally

  A house fire that killed two people in Coventry was started accidentally by a converted electric bike, a fire service has said. Crews called to the blaze in the Stoke Aldemoor area on Friday found the bodies inside the property. Following an investigation, West Midlands Fire Service (WMFS) said the fire involved a pedal bike that had been converted into an electric model, which was stored in the hallway. The people who died have not yet been formally identified.

  Crews called to The Coppice shortly before 04:40 GMT found a severe fire in a first-floor maisonette flat, that affected the entire property.

  The blaze in a first-floor maisonette flat affected the entire property, the fire service said

  WMFS said in a statement: “No further information relating to the cause or the victims who sadly lost their lives in this tragic accident will be released at this time. “Our thoughts remain with everyone affected by this tragic accident.” Four fire crews were sent to the scene, the first arriving within four minutes. Crews wore breathing apparatus to enter the property and extinguished the blaze by 05:55 GMT. An investigation was carried out by fire investigations officers and a fire investigations dog, together with police.

