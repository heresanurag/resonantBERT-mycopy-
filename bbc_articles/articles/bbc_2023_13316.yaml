  The monarch raises a toast to his hosts in Versaille, President Macron and his wife Brigitte.

  King Charles III raised a toast to his hosts Emmanuel and Brigitte Macron at a star-studded banquet in Versailles.

  Famous guests including Hugh Grant, Arsene Wenger and Didier Drogba joined the dinner - which was part of a three-day state visit to France.

