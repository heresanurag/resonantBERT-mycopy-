id: bbc_2017_3002
title: 'Donald Trump: ''I inherited a mess'' - BBC News'
date: '2017-02-16'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-38997073
content: |-
  President Trump tells journalists he is tackling American jobs being lost abroad and a "disaster" in the Middle East.

  President Donald Trump denounces the previous administration at a news conference in the White House, saying he "inherited a mess at home and abroad".

  Mr Trump cited American jobs being lost abroad, the Middle East and North Korea as evidence.
