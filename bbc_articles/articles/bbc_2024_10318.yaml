id: bbc_2024_10318
title: Smoke fills street as London bus catches fire in Twickenham - BBC News
date: '2024-05-18'
section: General
url: http://www.bbc.co.uk/news/uk-69033322
content: |-
  Firefighters tackled huge flames from the blazing bus on Saturday as people looked on.

  A single-decker bus was destroyed after it caught fire on Richmond Road in London on Saturday afternoon.

  Video footage from the scene in Twickenham showed firefighters battling huge flames and billowing black smoke in the middle of the street.

  The 490 bus burst into flames at about 13:18 BST, and was over for firefighters at 14:26 BST, the Fire Brigade said.

  No-one was hurt and the road has been closed for the rest of the day while investigations continue, according to the London Fire Brigade.

  Five fire engines and about 30 firefighters took just over an hour to extinguish the fire.
