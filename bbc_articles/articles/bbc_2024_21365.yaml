  But Mr Canal said Mr Athwal's licencing issues were "simply scandalous hypocrisy". He called on Prime Minister Sir Keir Starmer to withdraw the whip while Mr Athwal was investigated. Labour's 2024 general election manifesto included a commitment to "prevent private renters being exploited and discriminated against". Richard Blakeway, the housing ombudsman, said there was "a serious gap that needs to be closed" wherein social housing tenants could take complaints to an ombudsman, but private tenants could not. Speaking to BBC Radio 4's Today programme, he said it was "welcome" that the government had indicated it would compel landlords to become members of a redress scheme. He added that the current standard for a decent home was "a very low bar" and "outdated". "So there needs to be a fundamental rethink of what is a decent home in the 21st century." Mr Athwal has described himself as a "renters' champion", saying he prided himself on being a good landlord who had never evicted a tenant. Redbridge Council said it was aware of the situation with Mr Athwal's properties, and that while it would not comment on individual cases, it treated all landlords who needed a licence "equally".
