  The MP says he was "shocked" by a BBC report highlighting issues with the flats he rents out.

  Labour MP 'profoundly sorry' over state of flats

  Labour MP Jas Athwal is facing calls to stand down as a Redbridge councillor over the condition of his rental properties

  A Labour MP has said he is "shocked" and "profoundly sorry" after it was revealed flats he rents out had black mould and ant infestations. Jas Athwal, who became the MP for Ilford South in July, said his tenants had been "let down", and pledged that repairs and maintenance work would be completed "swiftly". He also said he had not previously been aware of the problems by highlighted in a BBC report due to the properties being managed by an agency. Paul Canal, Conservative leader for Redbridge Council, in north-east London, called for Mr Athwal to resign as a councillor "immediately", describing the conditions of properties owned by Mr Athwal as a "disgrace".

  "His role as a councillor is untenable," Mr Canal said. He said he had called for Redbridge Council to investigate whether Mr Athwal had breached its code of conduct, echoing a similar call made by Andrew Boff, a Conservative member of the London Assembly. Mr Athwal owns 15 properties, making him the biggest landlord in the House of Commons. The BBC found flats owned by him contained dirty communal areas, lights that did not work and fire alarms hanging loose from the ceiling. One resident said they had been threatened with eviction by the property's letting agent when they complained. Mr Canal said he would be reporting the management agency to the police for "threatening behaviour". Mr Athwal said: "I know it's my responsibility to have issues addressed as soon as they arise and have met the property management company to understand failures in communication. "I'm profoundly sorry that tenants have been let down and will be reviewing the property management and how matters are escalated going forward." The Labour MP also admitted that his flats did not have the correct property licences under a scheme he introduced as the leader of Redbridge Council. In a lengthy statement, he said it had been his understanding that his property licences were up to date, but had "recently seen an email which shared that licences are due to expire" and was "in the process of renewing all licences".

