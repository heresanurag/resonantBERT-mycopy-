title: 'Sapphire Jubilee: The Queen makes history - BBC News'
date: '2017-02-06'
section: General
url: http://www.bbc.co.uk/news/uk-38879349
content: |-
  The Queen makes history again, becoming the first British monarch to reign for 65 years.

  The Queen has become the first British monarch to reach a sapphire jubilee, marking 65 years on the throne.

  She will spend the day at her estate in Norfolk, with no official engagements planned.
