  But, Mr Biden warned on Tuesday the threat of antisemitism is growing in the US, including on college campuses, joining a heated American debate about Jewish security, Zionism, free speech and support for Israel, in the country with the largest Jewish population after Israel. Addressing a bipartisan audience at the US Holocaust Memorial Museum's annual commemoration, Mr Biden said: "This hatred (of Jews) continues to lie deep in the hearts of too many people in the world and requires our continued vigilance and outspokenness," Biden said. "Now here we are, not 75 years later, but just seven and a half months later, and people are already forgetting ... that Hamas unleashed this terror," he added. "I have not forgotten, nor have you. And we will not forget."
