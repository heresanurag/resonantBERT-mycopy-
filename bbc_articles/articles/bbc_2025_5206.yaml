content: |-
  Donald Trump has scrapped federal diversity initiatives and many US firms have too - will UK companies follow suit?

  Diversity backlash: Is 'masculine energy' coming to the UK?

  "Dangerous, demeaning, and immoral." That's how Donald Trump has described diversity, equity, and inclusion (DEI) programmes which aim to boost workers from diverse backgrounds. Upon returning to the White House, he ordered the shutdown of all federal DEI initiatives, urging the private sector to follow suit. And many have, with the likes of Walmart, McDonald's, Meta and Amazon ditching or scaling back their diversity policies. Corporations, according to Meta boss Mark Zuckerberg, have been "neutered" and need more "masculine energy". Some UK employees fear Trump's rhetoric could normalise intolerant attitudes in the workplace, even if DEI policies remain intact. "Someone that is at the top saying things like that sets a precedent that it's okay to do so," says Chloe, who works at a London-based finance company.

  Stefan Hoops said his post seemed to have "hit the Zeitgeist"

  Stefan Hoops, the head of Deutsche Bank's investment arm, also said he feared Trump's language would "lead us straight back to the macho 'Wolf of Wall Street' era" and called on companies to ensure equal opportunities. He posted his thoughts on LinkedIn alongside a picture of him lifting weights, external, saying, "I figured a masculine-looking picture would balance my anti-anti-woke observations." But so far there is little evidence of UK firms changing their diversity policies. In fact, the UK arm of accountancy giant Deloitte has signalled a split with its US counterpart, external by saying it remains "committed to our diversity goals", not long after staff in the US were told there were plans to "sunset" their DEI goals. In the UK, the Equality Act protects against discrimination and since 2017, organisations with over 250 employees must report their gender pay gap. In addition, any company listed on the stock exchange is required to publish board diversity data against set targets, including that at least 40% of board members should be women.

  Pavita Cooper is the UK chair of the 30% Club, which campaigns to increase gender diversity in senior management. She says the UK's legal system will help protect DEI policies. "In the US, they are talking a lot about affirmative action and 'woke ideology'. In the UK, we focus a lot more on positive action," Ms Cooper says. She explains that affirmative action involves quotas, while positive action encourages participation without preferential treatment, such as through scholarships or mentoring.

  Elon Musk's appearance with his son in the White House raised eyebrows

  Martha Lane Fox, who has worked to promote diversity in the tech sector, believes the UK has an opportunity to "lean into diversity - stand apart from the US". She points out the "irony", external of Elon Musk, tasked by Donald Trump with slashing federal government spending, standing in the Oval Office with his young son as he dismantled DEI programmes. "Imagine if everyone had such casual and extraordinary opportunities for childcare, what could we unlock?"
  • None Could DEI live on in the US under a different name?

  However, Baroness Lane Fox, who is chair of the British Chambers of Commerce business group, says the UK still has "a long way to go" in terms of representation, pointing out that there is only one disabled person on the board of a FTSE 100 company and very few female executives on boards.

  The CIPD, the professional body for HR, notes some change to DEI (also known as EDI) policies, with companies such as BT dropping diversity measures from its managers' bonus scheme., external "We're seeing some UK organisations reposition or re-evaluate their EDI initiatives and metrics," says Peter Cheese, chief executive of the CIPD. "Some of this will be in response to what is happening in America but it's a shift that has been building for a while. "The current climate – social and political - is making organisations look at what they're doing and why, how they're measuring the impact of these initiatives, and the difference their EDI policies are making to business outcomes." A spokesperson for BT said the changes do not represent a rollback on the company's EDI commitments.

  In the City, the financial regulator had proposed collecting diversity data for all financial services staff, but in May its chief executive told MPs that it was not "prioritising moving forward on that at this stage". The data gathering plans had been criticised by some Conservative MPs as well as City bosses privately as being costly and little more than a box-ticking exercise.

  In the US even tech giant Apple, which points to its "north star of dignity and respect for everyone", has been forced to admit that it may need to make some changes to its policies "as the legal landscape around this issue evolves". Last month, consulting giant Accenture also cited the "evolving landscape" as it said it was ending employee representation goals, external and career development programmes for "people of specific demographic groups". The company, which employs around 11,000 people in the UK, said the change in its policies and practices would apply "globally, and not just in the US". It also noted that it had "largely achieved" its diversity goals. Similarly, investment bank Goldman Sachs told the BBC earlier this month that it had axed an internal diversity rule that barred it from advising all male, all white boards on company flotations because it was no longer needed.

  Ann Cairns, who is the chair of Crown Agents Bank and Trust Management Finance Group, and also sits on the board of London Business School, says she isn't surprised that DEI policies are under attack. "We swing back and forth on this topic depending on who is in power and their influence. Some bigger companies are being driven by America but we will have to wait and see what happens."

  Have you noticed shifting attitudes towards diversity in your workplace?
