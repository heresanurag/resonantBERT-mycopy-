title: Wrong-way Cambridgeshire slip road driver caught on dashcam - BBC News
date: '2024-12-03'
section: General
url: http://www.bbc.co.uk/news/videos/c99x0jmvr9ro
content: |-
  A learner driver is surprised to see a car coming towards her the wrong way down a slip road.

  A driving instructor said his pupil was "more than a little bit surprised" to find a car coming towards her the wrong way down a slip road.

  Stuart Mark was taking his student on her first dual carriageway lesson when he spotted the Renault Clio about to enter the A428 from the Hardwick exit in Cambridgeshire on Saturday morning.

  "I could see it in the distance and saw other cars flashing their lights as the car came down the slip towards oncoming traffic, so I gently braked [the dual control car] and turned the steering wheel slightly to make sure we avoided the car," he said.

  Mr Mark said the Clio driver realised their mistake before getting on the main road, turned around safely and drove back up the slip road.
