  He said Crawley's intention was also to kill the second man in York. In a victim impact statement from Mr Taylor's widow, Maria, which was read to the court, she said: "Our lives and world are completely torn apart. "We had plans to grow old together this has all been taken away from us."

  Paul Taylor's body was discovered in a shallow grave in Finglandrigg Wood

  Crawley bludgeoned Mr Taylor to death with a hammer and tried to burn his body, the court heard. He then buried the Cumberland Infirmary catering manager in a shallow grave in Finglandrigg Wood. They had been in touch for some time before the killing and had previously met to have sex, the trial heard. Crawley was also sentenced for the attempted murder of a second man he met on gay dating app Grindr, who he also attacked with a claw hammer in York while on bail for the murder of Mr Taylor.

  A jury found him guilty on Monday, after more than eight hours of deliberation. Det Supt Ian Hussey of Cumbria Police said Crawley was "behind bars where he rightly belongs". He said Crawley had "lied about his actions" form the outset, including "concocting" a story around self-defence."
