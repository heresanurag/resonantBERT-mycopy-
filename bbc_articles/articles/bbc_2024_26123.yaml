title: 'Paul Taylor hammer attack murder: Jack Crawley jailed for life - BBC News'
date: '2024-10-23'
section: UK
url: http://www.bbc.co.uk/news/articles/cn0d212xzyvo
content: |-
  A judge calls Jack Crawley, who murdered Paul Taylor, a "highly dangerous man".

  Jack Crawley was found guilty of Paul Taylor's murder following a trial

  A man who bludgeoned an army veteran to death with a hammer has been sentenced to life in prison. Paul Taylor, 56, from Annan, Dumfriesshire, went missing last October and his remains were found in woodland near Carlisle, Cumbria, in May. Jack Crawley, 20, of Carlisle, was told at Carlisle Crown Court he would need to serve a minimum term of 37 years for murder, as well as the attempted murder of another man while he was on bail. Mr Justice Goose described Crawley as a "highly dangerous young man" who inflicted "callous cruelty" on Mr Taylor.

  The judge said Mr Taylor was killed in a "murder for gain", as Crawley wanted to steal his car.

