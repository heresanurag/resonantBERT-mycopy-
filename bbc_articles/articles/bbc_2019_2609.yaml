id: bbc_2019_2609
title: Reaction as MPs vote to seek Brexit delay - BBC News
date: '2019-03-13'
section: Parliaments
url: http://www.bbc.co.uk/news/live/uk-politics-parliaments-47529293
content: |-
  MPs vote for the government to seek a delay to the UK's departure from the EU, by a majority of 211.

  Recap: What does the motion mean?

  Theresa May is expected to return to the Commons next week for another vote on her twice-defeated Brexit deal. If her deal is passed by next Wednesday (20 March, specified in the government motion), the PM will go to Brussels the following day to request a short Brexit delay to a date no later than 30 June to give herself time to pass legislative changes. But if the Commons has not passed a resolution approving the negotiated Withdrawal Agreement by 20 March, then the motion said it is "highly likely" the European Council would require a "clear purpose for any extension" and to determine its length. The motion adds that any extension beyond 30 June would "require the United Kingdom to hold European Parliament elections in May 2019".
