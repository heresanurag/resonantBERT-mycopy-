content: |-
  The 19-year-old from Lancashire went missing on Tenerife in the early hours of Monday.

  Police and rescue teams are continuing to search for a 19-year-old from Lancashire who went missing in Tenerife in the early hours of Monday morning.

  Jay Slater was last known to be in the Rural de Teno national park region, after earlier attending a music festival in Playa de las Americas.

  The BBC's Nick Garnett visited the area where the search teams and police are trying to locate the missing teenager.
