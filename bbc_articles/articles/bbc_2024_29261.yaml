title: 'Storm Bert: Fresh weather warnings as clean-up continues - BBC News'
date: '2024-11-26'
section: UK
url: http://www.bbc.co.uk/news/articles/c93qe00lw34o
content: |-
  Flood warnings are still in place as new weather alerts are issued for heavy rain.

  The River Avon burst its banks in Bradford-on-Avon in Wiltshire

  Flood warnings are still in place across England and Wales following Storm Bert - as fresh weather warnings were issued with more heavy rain forecast. A severe "danger to life" flood warning remains for the River Nene in Northamptonshire after a caravan park was submerged for the third time this year. Heavy rainfall and strong winds brought by Storm Bert over the weekend led to at least five deaths, while homes, roads and rail networks faced major disruption. The Met Office has named a third storm - Conall - after issuing yellow weather warnings for rain in parts of south-west, southern and south-east England from 22:00 GMT on Tuesday until midday on Wednesday, where the storm is due to hit.

