  As of 15:00 GMT there were 94 flood warnings, meaning flooding is expected, in England, particularly concentrated in Northamptonshire, Worcestershire and around south-west England. Wales has four warnings in place while there are none in Scotland and Northern Ireland. Environment Secretary Steve Reed said the impact of any further flooding "should be less severe". He told the Commons on Monday: “Further flooding is sadly likely over the next few days as water levels rise in slower flowing rivers such as the Severn and the Ouse."
