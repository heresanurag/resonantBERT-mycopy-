  A landslip from a coal tip left buildings deep in sludge and mud in Cwmtillery in South Wales after a landslip. Residents told how slurry running down the road carried "trees and big boulders", as homes had to be evacuated. BBC correspondent Tomos Morgan said people who had to flee their homes would not be able to return until the road was made safe, which he understood could take a couple of weeks. Politicians and residents in south Wales have criticised what they said was a lack of preparation and insufficient warning for Storm Bert. In Pontypridd, Rhondda Cynon Taf, residents said lessons were not learned from Storm Dennis, which left much of the town under water in 2020.

  Five men died over the weekend as a result of the adverse weather. North Wales Police confirmed a body was found after Brian Perry, a 75-year-old dogwalker, went missing near the River Conwy in Trefriw on Sunday. Mohammed Wahid, a 34-year-old man whose car hit a wall in the snow in Shipley, West Yorkshire, died on Saturday. Three other men died in road accidents on Saturday. A man died when his car was hit by a tree on the A34 at Winnall, Hampshire, and another man crashed on the A45 near Flore, Northamptonshire, during rush hour. A third man, in his 80s, died after driving into a ford in Colne, Lancashire.
