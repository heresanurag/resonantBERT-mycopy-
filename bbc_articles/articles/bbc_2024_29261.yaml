  • None How are flood alerts and weather warnings set? A clean-up is continuing in several areas after flooding in the wake of Storm Bert. In Worcestershire, a man has been arrested after a tractor was seen being driven through deep floodwaters in Tenbury Wells, which led to damage to shops. National Rail said on Tuesday that "various routes" in south-west England and Wales would continue to be impacted following disruption caused by Storm Bert. Debris needed to be removed from the line between Swindon and Bristol Parkway, which had been impacted by flooding, and passengers are advised to check before travelling. Meanwhile, platform closures at Newbury due to "ongoing damage" caused by the storm meant Great Western Railway were reducing the number of trains running through the station on Tuesday, Network Rail said.

  Residents at Billing Aquadrome Holiday Park in Northamptonshire, where a major incident has been declared, slept at an evacuation centre overnight on Monday. Volunteers from humanitarian charity React helped those evacuated by offering toothpaste and socks, while another charity cooked hot meals in the car park. West Northamptonshire Council said it had helped 114 people, including 30 families with children.

  Sam Craddock, who has lived in a lodge at the site for 15 years, told BBC Radio 4's Today programme: “The sirens went off. We didn’t expect it to be this bad. "It's probably the third or fourth time we’ve been evacuated this year due to the flooding. "[It's] really bad out there." One man said a warning went off at about 03:45 GMT on Monday and "everyone had to get off the site". "It's just not good, it's not good at all," he said.

  Sam Craddock said she did not expect the flooding to be "this bad"

  Showers continued through the night on Monday and on Tuesday in parts of south-west England, the north coast of Northern Ireland, north-west England and the coastal counties of Scotland. Some of these showers are heavy with thunder over the hills. But through Tuesday evening and overnight another area of low pressure will sweep in from the Atlantic, bringing a spell of wet and potentially windy weather to England and Wales. On its current track, the low pressure will bring rain north-eastwards across south-west England this evening and then Wales, the Midlands, East Anglia, parts of northern England and south-east England, where it could turn heavy and thundery. To the north of the rain, across Northern Ireland and Scotland it will be cold with a frost and patchy fog. There is a chance the rain might turn to snow across north Wales and the Peak District – as it bumps into the colder air – and then as it clears eastern England it might have a sting in its tail, bringing a bout of strong winds. As much as 25mm more rain is forecast on already saturated ground.

  Yellow warnings for rain cover parts of south-west, southern and south-east England

  In Chippenham, Wiltshire, a clean-up operation is taking place and shop owners are assessing the damage. Becky Lyons, who runs Pawesome Pet Shop, said she faced "carnage" after the floods hit her store and some of her Christmas stock has been ruined. "It's heartbreaking initially and then you think you've just got to get on with it," she told BBC Breakfast. "We're hoping to open again today." She said there was a "great community" and customers had offered to help with the clean up.

