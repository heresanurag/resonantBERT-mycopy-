title: Pedestrian dies after being hit by ambulance near Elgin - BBC News
date: '2025-02-22'
section: NE, Orkney & Shetland
url: http://www.bbc.co.uk/news/articles/cm2yz1n5ej0o
content: |-
  A 40-year-old man was hit by the ambulance, which was responding to an emergency call, on the outskirts of Elgin.

  Pedestrian dies after being hit by ambulance

  The ambulance hit the pedestrian on the outskirts of Elgin

  A pedestrian has died after being hit by an ambulance which was responding to an emergency call in Moray. The man was hit by the vehicle on the A96 at Barmuckity, near Elgin, at about 03:30 on Saturday. The 40-year-old was taken to hospital but died a short time later. Police Scotland said inquiries into the incident were ongoing.

  The road was closed between Reiket Lane and St Andrews Drive for about 10 hours before reopening at about 14:00. While the A96 was closed, emergency services personnel could be seen investigating the site of the incident. The ambulance was still on the road, with damage visible to the front of the vehicle including the windscreen and bumper on the passenger side.

  The A96 road was closed overnight while police investigated the fatal crash

  A local man who passed the incident on Saturday morning told BBC Scotland News that there was no pavement running along the side of the road. He added: "I could see the front of the ambulance was quite badly damaged and there had clearly been a serious crash. "The ambulance was pointing towards Aberdeen, that stretch of road is known locally at the Barmuckity Straight, and while there are street lights leading to the roundabout, there is not a footpath there really." Officers are appealing for anyone who witnessed the incident or caught it on a dashcam, external to come forward. The fatal crash took place on a single carriageway A-road on the outskirts of the town, about 38 miles (61km) from Inverness. The site of the accident is next to a number of local amenities, including several fast food outlets, coffee shops and car garages. A spokeswoman for the Scottish Ambulance Service said the "circumstances of the incident" were being investigated. Sgt Dave Cooper said: "My thoughts are with the family and friends of the man who died and we'll do all we can to support them at this difficult time."
