title: Demolition begins at Parkland school shooting site - BBC News
date: '2024-09-04'
section: General
url: http://www.bbc.co.uk/news/videos/c511wy5gx2vo
content: |-
  'I hear her voice when we drive down this road', says the father of one of the shooting victims.

  Demolition has begun at Marjory Stoneman Douglas High School in Parkland, Florida, the site of a mass shooting in 2018.

  'I always hear her voice when we drive down this road', says Tony Montalto, father of one of the shooting victims.

  Behind a security fence, some family members of the 17 victims watched the first blows as a crew began tearing down the three-storey building.
