title: 'Nottingham attacks: MoJ staff accused of accessing case files - BBC News'
date: '2024-12-23'
section: Nottingham
url: http://www.bbc.co.uk/news/articles/c8ew92pxjp8o
content: |-
  Police are investigating claims MoJ staff illegally accessed Nottingham attacks files.

  Ian Coates, Barnaby Webber and Grace O'Malley-Kumar were stabbed to death by Valdo Calocane

  An investigation has opened into allegations Ministry of Justice (MoJ) staff illegally accessed computer files related to the Nottingham attacks. Students Barnaby Webber and Grace O'Malley Kumar were fatally stabbed by Valdo Calocane in the city in June 2023 along with school caretaker Ian Coates. Calocane, who had been diagnosed with paranoid schizophrenia, received a hospital order in January after admitting manslaughter on the grounds of diminished responsibility. Now the South East Regional Organised Crime Unit is examining whether case files were accessed illegally by government employees.

  In a statement, the unit said it was "currently investigating allegations under the Computer Misuse Act in relation to members of staff from His Majesty's Courts and Tribunals Service and His Majesty's Prison and Probation Service". It said: "This is in relation to individuals accessing case files for the investigation into the deaths of Ian Coates, Barnaby Webber and Grace O'Malley-Kumar, who were killed in an attack in Nottingham in June 2023. "No arrests have been made at this time as part of this investigation."

  Emma Webber (right) and other victims' family members have been highly critical about how the case has been handled

  The unit said the probe was "completely independent from any previous investigations in relation to the original incident, to ensure the families of the deceased and injured can have full trust and confidence in the process". Barnaby's mother Emma Webber said her family had received a letter notifying of them of the investigation. She said: "So many individuals and organisations failed Barney, Grace and Ian. It's an utter disgrace. "Leicester and Nottingham police forces, the NHS, the CPS and now the wider courts and prison and probation service. When will it ever stop?" The MoJ said the court worker under investigation was no longer employed by the service. A spokesperson said: "Our thoughts remain with the families of Ian Coates, Grace O'Malley-Kumar and Barnaby Webber. "It would not be appropriate to comment on a live police investigation." In February a special constable with Nottinghamshire Police was sacked for viewing bodycam footage showing the aftermath of the attacks.

  Barnaby Webber, Grace O'Malley-Kumar and Ian Coates were killed in a series of stabbings by one man on the streets of Nottingham in the summer of 2023.

