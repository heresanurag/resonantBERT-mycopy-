title: 'Ukraine war: Bono sings with soldier in Kyiv metro station - BBC News'
date: '2022-05-08'
section: General
url: http://www.bbc.co.uk/news/world-europe-61373349
content: |-
  The U2 frontman was seen singing at a downtown metro station covering the hit track Stand by Me.

  The Irish rock star and U2 frontman gave a surprise performance at a downtown metro station giving renditions of hits such as Sunday Bloody Sunday, Desire and With or Without You.

  Bono also sang along side Taras Topolya, lead singer of popular local band Antytila, who called on the world to support Ukraine amid continued Russian attacks on the country.
