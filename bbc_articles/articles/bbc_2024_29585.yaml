title: Million-strong petition for firework restrictions goes to No 10 - BBC News
date: '2024-11-05'
section: England
url: http://www.bbc.co.uk/news/articles/cpvzkm3gzxjo
content: |-
  A Lincolnshire woman wants fireworks to be banned, except on the dates of traditional festivals.

  Million-strong fireworks petition goes to No 10

  Julie Doorne has been campaigning for greater restrictions on fireworks since 2013

  A woman will visit Downing Street later to deliver a million-strong petition calling for tighter regulations on fireworks. Julie Doorne, from Grantham in Lincolnshire, wants their use to be restricted to the dates of traditional festivals, such as Bonfire Night, because of the impact on animals and vulnerable people. The petition, external, which is backed by the RSPCA, also calls for a reduction in the maximum decibel level. However, the British Fireworks Association said changes to regulations would be "misguided" and surveys showed most people enjoyed fireworks.

  At present, it is against the law for anyone to set off fireworks between 23:00 and 07:00, except on 5 November, New Year’s Eve, Diwali and Chinese New Year. Ms Doorne said people expected fireworks on these occasions, but added: "You don’t expect somebody to set off fireworks in the middle of the year and you can’t prepare your animals or your vulnerable relatives for that. “Something has got to be done, because they are allowed to be used 365 days a year for 16 hours of every day and we don’t think that that’s a balance." The objectives of the campaign include reducing the decibel limit from 120 to 97, indicating noise levels on packaging and licensing all public displays.

  Mike Carter, of Discount Fireworks in Hull, says some buyers are requesting silent products

  Earlier this month, a report by the Social Market Foundation, external found three quarters of respondents liked fireworks, but 91% would be open to their partial replacement with "alternative" displays, such as lasers, drones and silent or quiet fireworks. In addition, 7% thought fireworks should be banned, 44% wanted private displays to be outlawed, and 34% called for greater restrictions on when they can be used. “I wouldn’t get over a million signatures if everyone was happy about this," Ms Doorne said.

  Fireworks are becoming more popular for a range of events, according to one retailer. Mike Carter, of Discount Fireworks in Hull, said people had started buying for gender reveals and weddings, in addition to traditional festivals. The industry had been "working hard" to regulate noise and "some domestic appliances were louder than fireworks", he said. But people were also becoming more aware of the impact on animals or other people. "You’ll get people coming in saying they’ve got dogs or horses near them and will ask for a low noise box that is just colourful with no bangs," Mr Carter said.

  Pet-owners can prepare for fireworks ahead of traditional festivals such as New Year's Eve, campaigners say

  The RSPCA said Ms Doorne's plan "could make a seismic difference for animals". According to the charity, 55% of pet-owners "dread the fireworks season" and 43% "change their lifestyle due to unexpected fireworks". Campaign manager Carrie Stones said: "For many animals the dazzling spectacle of fireworks, and particularly the loud bangs, can become a terrifying ordeal. "It’s never about trying to spoil people’s fun, but the impact of fireworks on animals can be devastating and we believe that more responsible use, and tighter restrictions, will go a long way to making sure less animals suffer.”

  The British Fireworks Association represents the majority of manufacturers and importers of consumer fireworks. Chairman Steve Raper said the organisation supported the "safe, respectful, and responsible use of fireworks" and "understood" the concerns of those "adversely affected" by "misuse". However, limiting dates would have a "significant impact" on celebration periods for cultural events, while licensing public displays could deter organisers due to "time-consuming and expensive" procedures. Noise levels had been examined by the Office for Product Safety & Standards, external (OPSS), which concluded that the vast majority of fireworks on the UK market fell well below the limit, he said. In addition, a Commons inquiry in 2019, external heard evidence that restrictions could create a black market. "The UK would be flooded with illegal, untested and dangerous products," Mr Raper said. He pointed to a OPSS survey, published in 2021, external, which found almost two-thirds of respondents enjoyed fireworks. A "collaborative approach, involving all stakeholders" was "essential" to finding a solution that addressed the concerns of those affected, while "preserving the right of the vast majority to enjoy fireworks responsibly”, he added.

