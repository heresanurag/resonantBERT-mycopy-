  England captain and player of the match Harry Brook, speaking to Test Match Special: "That's a pretty compete performance. we are happy with the way we went about the game and it's nice to come out victorious. "I am glad to be somewhere near my best. It's nice to be out there and contributing to the side." Australia captain Mitchell Marsh: "We were a bit off. Fair play to England, they put us under pressure with the bat. They outplayed us. "It's going to be a great experience in Bristol. We would have liked to have wrapped up the series, but England have come back really strongly." Former England captain Sir Alastair Cook on TMS: "England have fought back really well in this series and here they've been superb."
