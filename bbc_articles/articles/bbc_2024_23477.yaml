content: |-
  England show their firepower with bat and ball as they level the one-day international series with a 186-run thrashing of Australia at Lord's.

  This video can not be played To play this video you need to enable JavaScript in your browser.

  England showed their firepower with bat and ball as they levelled the one-day international series with a 186-run thrashing of Australia in a rain-shortened match at Lord's. Stand-in captain Harry Brook scored a magnificent 87 from 58 balls, while Ben Duckett also made a half-century before Liam Livingstone's blistering unbeaten 62 from 27 balls took the home side to a formidable 312-5 from 39 overs. Livingstone hit seven sixes, with four of them coming as he took 28 off the last over of the innings from Mitchell Starc. That late onslaught gave Livingstone a 25-ball fifty, the fastest in an ODI at Lord's, while England's 12 maximums is a new record in an ODI at the home of cricket. Australia made a fast start in the chase but three wickets in four overs, including both openers, halted the momentum and England seized control. The tourists crumbled from 68-0 to 126 all out in 24.4 overs, with Matthew Potts excellent in taking 4-38. Brydon Carse had bowled Travis Head to get things started and the 29-year-old fast bowler ended with figures of 3-36, while Jofra Archer claimed 2-33. It was left to Adil Rashid to wrap things up as England claimed their second largest ODI victory by runs over Australia. After losing the first two matches of the series, this new-look England side have battled back to force a decider in Bristol on Sunday.

  This video can not be played To play this video you need to enable JavaScript in your browser.

  Following up his maiden ODI hundred in Durham, Brook played as if this was a continuation of that innings. The good work of Duckett and Phil Salt to battle through the powerplay in very tricky conditions, after a delay of more than two hours because of rain, helped lay the foundations and Brook built on them supremely. His effortless power and immaculate timing were on show from early on, with his assuredness and control at the crease a constant throughout his innings. Australia thought they had got him caught behind down the leg side off Starc after a rare misjudgement but the decision was overturned when replays showed the ball bounced before reaching wicketkeeper Josh Inglis – prompting a chorus of boos from the home crowd. From there, Brook hardly made a misstep and when he did depart 13 shy of another ton, there was almost more surprise than disappointment around the ground. Adam Zampa eventually dismissed him but it was a tough day for Australia’s premier spinner. Duckett launched him over the ropes in his first over then Jamie Smith and Brook followed suit as Zampa was prevented from settling. Smith had been on the offensive from ball one as England tried to press on and although he and Brook fell in quick succession, Livingstone ensured there was no respite for Australia. The all-rounder had already clubbed Glenn Maxwell, Josh Hazlewood and Starc into the stands but it was his brutal takedown of the latter to finish the innings – hammering two straight sixes and clobbering two more leg side – that put a real spring in the hosts’ step going into the interval.

