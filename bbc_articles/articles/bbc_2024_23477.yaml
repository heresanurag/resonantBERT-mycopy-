  Australia came out swinging to start their innings, with Head and Mitchell Marsh quick to put the England seamers under pressure. They raced to 66-0 at the end of the eight-over powerplay but Carse bowled Head in the next over and, with the white-ball nipping around under lights, the wickets began to tumble. Potts had Steve Smith caught behind, Archer knocked over Marsh with a beauty and Carse did for Inglis before uprooting Marnus Labuschagne’s off stump. It was a superb response from the England pace attack, who were clinical after working themselves into a position of strength. Brook kept his seamers going and, when Archer removed Glenn Maxwell, they were into the Australian bowlers. The home side were relentless in their hunt for wickets and faced little resistance from the tourists. The teams now head to Bristol with a buoyant England hoping to complete the turnaround from 2-0 down.

