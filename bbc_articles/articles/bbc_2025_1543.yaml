  Ireland also benefit from a coherence that comes from four provinces, compared to 10 Premiership clubs. Those are the big structural issues, but Test rugby is a melting pot of grand plans and tiny details from which coaches have to forge results. And there are plenty of problems that fall firmly in Borthwick's in-tray. Most pressing is England's inability to deliver an 80-minute performance. Aled Walters, the conditioning guru who quit England for Ireland last year, stalked the sidelines and will have enjoyed how his current team overwhelmed his former one. If it is an issue around the quality of players, rather than their conditioning, is the bench right? If it is a matter of experience rather than quality, should those fringe players have had more of run-out in the two meetings against Japan this year? As it stands, two wins over the Brave Blossoms are England's only victories in their last nine matches. Two years into the job, England's winning percentage under Borthwick is less than 50%. France, buoyed by Antoine Dupont's return and experience of a 53-10 win on their last visit to Twickenham, loom next weekend. England have made their fans plenty of promise, but wins mean more than words. And they have been in painfully short supply.

