  Trial date set for men charged over fires at homes linked to PM

  The three men charged (from left to right): Petro Pochynok, Roman Lavrynovych and Stanislav Carpiuc

  Three men charged in connection with arson attacks on two properties and a car linked to Sir Keir Starmer will face trial in April of next year, a court has heard. Roman Lavrynovych, 21, and Stanislav Carpiuc, 26 appeared together via video link from the high security Belmarsh prison in south-east London. Petro Pochynok, 34, however, refused to attend Friday's hearing and remained in his cell. They will next return to court on 17 October to enter pleas to the charges they face.

  The charges relate to three incidents. The first was on 8 May when a car previously owned by the prime minister was found on fire on a street he used to live on in Kentish Town, north London. Three days later, a fire was discovered at flats linked to the PM in nearby Islington. Firefighters had to rescue one person with the help of breathing apparatus. On 12 May, a fire was discovered at the entrance to Sir Keir's Kentish Town home, which is currently rented out. Mr Lavrynovych, a Ukrainian citizen, of Sydenham, south London, was the first to be charged and is accused of three counts of arson with intent to endanger life. Mr Carpiuc, a Ukrainian-born Romanian national, of Romford, east London, was the second man charged and is accused alongside Ukrainian Mr Pochynok, of Holloway Road, north London, of conspiracy to commit arson with intent to endanger life. During the short hearing at the Old Bailey on Friday, Mr Lavrynovych and Mr Carpiuc spoke only to confirm their identities and dates of birth via an interpreter. Mrs Justice Cheema Grubb told the court that Mr Pochynok had refused to leave his cell for the preliminary hearing, adding that the three men would next appear before the court in October to formally enter pleas. All three have indicated that they deny the charges and a trial date has been fixed for 27 April 2026.
