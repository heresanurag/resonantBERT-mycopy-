title: Reform UK candidate apologises over Hitler neutrality comments - BBC News
date: '2024-06-10'
section: Politics
url: http://www.bbc.co.uk/news/articles/cjmmrwexv4ko
content: |-
  Ian Gribbin says his grandparents were "Russian Jews fleeing persecution" and his comments were taken out of context.

  This video can not be played To play this video you need to enable JavaScript in your browser.

  A Reform UK candidate has apologised for claiming the country would be "far better" if it had "taken Hitler up on his offer of neutrality" instead of fighting the Nazis in World War Two. Ian Gribbin, the party's candidate in Bexhill and Battle, also wrote online that women were the "sponging gender" and should be "deprived of health care". In posts from 2022 on the Unherd magazine website, seen by the BBC, he said Winston Churchill was "abysmal" and praised Russian President Vladimir Putin. Initially Mr Gribbin declined to comment, but later said: “I apologise for these old comments and withdraw them unreservedly and the upset that they have caused.” He said that he himself had been “upset at the way these comments were taken out of context especially when my mother was the daughter of Russian Jews fleeing persecution.”

  When the comments first came to light, a Reform UK party spokesman suggested they were not endorsements but "arguing points in long distance debates". But asked about the comments at a press conference later the party’s Chairman, Richard Tice, said that if people did “inappropriate things” or said “daft things” then the party would “look at it” and “investigate". Reform UK Leader Nigel Farage said "every party" would face issues with vetting candidates due to the unexpected election timing, which had cut short the checks parties carry out. In July 2022, Mr Gribbin posted on the Unherd website: "Britain would be in a far better state today had we taken Hitler up on his offer of neutrality.... but oh no Britain’s warped mindset values weird notions of international morality rather than looking after its own people." The same month he wrote: "In Britain specifically we need to exorcise the cult of Churchill and recognize that in both policy and military strategy, he was abysmal." The previous month he criticised women, writing on the site’s message board: "Do you think you could actually work and pay for it all too like good citizens? "Men pay 80% of tax – women spend 80% of tax revenue. On aggregate as a group you only take from society. "Less complaining please from the 'sponging gender'." He added that women are "subsidised by men to merely breath (sic)". In January 2022 he posted: "Men pay 80% of tax. Women take out 80% of expenditures. "Square that inequality first by depriving women of healthcare until their life expectancies are the same as men, Fair’s fair." In December 2021 he wrote female soldiers "almost made me wretch (sic)" and were a "total liability".

  In the run up to the invasion of Ukraine, he praised President Putin, writing in January 2022 that he had "shown a maturity of which we can only dream of". He "understands the bonds that create more stable societies; the hypocrisy of the West is preposterous as we stare in the face daily the enormous economic equalities created by our deluded neo liberal ideas", he wrote. In February, Mr Gribbin wrote "if only the West had politicians of his class". A Reform UK spokesman initially said: "Through offence archaeology the BBC has found that Mr Gribbin has made a series of comments about a number of subjects. "They were written with an eye to inconvenient perspectives and truths. That doesn't make them endorsements, just arguing points in long distance debates. "His historical perspective of what the UK could have done in the 30s was shared by the vast majority of the British establishment including the BBC of its day, and is probably true. "Again no endorsement, just pointing out conveniently forgotten truths. "As for the feminism point, his tongue is so firmly in his cheek one should be able to spot it from 100 yards."

  The BBC is aware of at least 16 former potential parliamentary candidates for Reform who are no longer standing because of inappropriate or offensive comments. This compares to eight for the Green Party, five for Labour, three for the Conservatives, two for the Liberal Democrats and one for the Workers Party of Britain. Plaid Cymru has also withdrawn support for one candidate over social media posts but because this was after nominations closed they will remain on the ballot as the Plaid candidate.

