  Check out our comprehensive guide to all the key events and British medal hopes in the 2022 Winter Olympics in Beijing.

  This video can not be played To play this video you need to enable JavaScript in your browser.

  The 2022 Winter Olympics in China have finished after a record 109 gold medals were awarded in 15 disciplines. Team GB, consisting of 50 athletes, participated in 11 of the disciplines, winning one gold medal and one silver medal, both in curling.

