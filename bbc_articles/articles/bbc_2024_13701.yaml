  MrBeast becoming the most subscribed-to individual and channel on YouTube means he has extended his grip, and wealth, on the platform even further. He has several other channels dedicated to his gaming, philanthropy and reactions to other content - accounting for tens of millions of subscribers each. "Do not email me asking for money, I give away money because it makes me happy," his channel's description tells viewers, referring to the sheer amount of cash - measured in the millions - he has distributed during his YouTube career. A video he posted in April saw one person win $250,000 (£196,000). In 2022, Forbes estimated his net worth to be around $500m and ranked him first on its list of the 50 top creators, external in 2023. Elon Musk, who has encouraged MrBeast and other video creators to post on his platform X (formerly Twitter), was among those congratulating him. Making X a more appealing platform for creators has formed a key part of Mr Musk's strategy for making the platform profitable, and the YouTuber revealed in January he earned $250,000 from his first video posted on X. And MrBeast taking the record will come as welcome news for Amazon - which has signed him to a TV deal reportedly worth as much as $100m, external.
