title: CCTV shows street attack on 12-year-old girl - BBC News
date: '2018-02-20'
section: General
url: http://www.bbc.co.uk/news/uk-england-derbyshire-43118597
content: |-
  The attacker is shown to grab the girl and throw her to the ground.

  CCTV of the moment a 12-year-old girl was thrown to the ground during a street robbery has been released.

  The attacker is shown walking along Cambridge Street, Derby, before turning and grabbing the girl.

  The "horrific" robbery saw the victim pinned to the ground and her phone pulled from her hand, police said.

  It took place on Sunday afternoon, with the suspect described as white, aged 16-19, about 5ft 6in (1.68m) tall, of slim build and with black hair shaved into a V-shape at the back.
