title: 'Notting Hill Carnival: Mum and chef die after separate attacks - BBC News'
date: '2024-09-01'
section: London
url: http://www.bbc.co.uk/news/articles/c70jd57rx8jo
content: |-
  Both deaths are now being treated as murder investigations, say police.

  Cher Maximen had been at the carnival last Sunday with her daughter when she was attacked

  A 32-year-old mother and a man who were attacked in separate incidents during the Notting Hill Carnival weekend have died, police said. Cher Maximen, who was with her three-year-old daughter when she was stabbed on Sunday, died in hospital on Saturday morning, it was confirmed. Mussie Imnetu, who worked as a chef and had been visiting London from Dubai, was found unconscious on Monday evening near Notting Hill, also died from his injuries on Friday, police said. Metropolitan Police Commander Charmain Brenyah said the deaths had been "devastating for both families" and they were both now being treated by the force as murder investigations.

  Notting Hill Carnival's organisers said it was "shocked by these tragic deaths". ”We stand together against all violence and condemn these acts, which are against all carnival values and the millions of people who come in celebration of them,” a spokesperson said. The Met previously said Ms Maximen was attacked shortly before 18:00 BST on Sunday. Westminster Magistrates’ Court heard on Wednesday that she had tried to intervene in a fight and was stabbed. Speaking outside New Scotland Yard on Saturday afternoon, Cdr Brenyah said Ms Maximen's daughter was being supported. “The news of Cher’s tragic death is devastating for her family, the wider community and all those involved in delivering the Notting Hill Carnival," she added.

  Mussie Imnetu, who worked as a chef and was found unconscious on Monday evening near Notting Hill, has also died

  The Met said Mr Imnetu, 41, had been visiting the UK from Dubai where he lived and worked. He was found unconscious with a head injury in Queensway, at 23:22 BST and then taken to a west London hospital where he died. Det Ch Insp Brian Howie, who is leading the investigation into Mr Imnetu’s death, said his “family, friends and colleagues in London, Dubai, Sweden and Eritrea are inconsolable after receiving the worst news imaginable”. “Our investigation is well advanced, but we are still very keen to hear from anyone who can help piece together Mussie’s movements between 13:00 when we know he left The Arts Club in Dover Street, and when he arrived at Dr Power restaurant, in Queensway at 22:30," he said. “If you visited the restaurant between 22:00 and 23:30 on Monday night or were in the area and saw something, regardless of the reason you were there, please do get in touch.”

  Mr Imnetu was the head chef at Arts Club in Dubai and had worked under Alain Ducasse, Gordon Ramsay and Marcus Wareing, according to the club's website. It said Mr Imnetu was a well-travelled chef, hailing from Eritrea who grew up in Sweden before taking positions in London and New York. The Arts Club paid tribute to Mr Imnetu and said he was “known for his passion, calm demeanor and kindness”. A spokeswoman said: “He was a keen footballer and famously counted on his now eight-year-old son to taste test his culinary masterpieces. “Mussie will be dearly missed by the entire The Arts Club team. His legacy will live on through the passion and excellence he instilled in those around him. Our thoughts and prayers are with his family and loved ones.”

  Shakiel Thibou, 20, of Hammersmith, was charged with the attempted murder of Ms Maximen and he appeared at Westminster Magistrates' Court on Wednesday. In relation to Mr Imnetu, earlier this week Omar Wilson, 31, of Leytonstone, was charged with causing grievous bodily harm with intent. He appeared at the same court on Friday and was remanded in custody to appear at Southwark Crown Court on 27 September. Both cases would be reviewed in conjunction with the Crown Prosecution Service, police said.

  Home secretary Yvette Cooper called the deaths of Ms Maximen and Mr Imnetu "deeply distressing". Posting to X, the social network app formerly known as Twitter, she said, external: "My thoughts are with all their family and friends. "This terrible and appalling violence has no place on our streets." Mayor of London Sadiq Khan said it was “heartbreaking” to hear of the deaths. He said: “This violence is shocking, completely unacceptable and a betrayal of the values that Notting Hill Carnival was founded to celebrate.”

  The Met said anyone with information should call the police on 101, message @MetCC on X or contact Crimestoppers, anonymously, on 0800 555 111 giving the reference 8020/26AUG.
