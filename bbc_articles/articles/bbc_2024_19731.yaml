title: Jermaine Jenas says he is ashamed after BBC sacking - BBC News
date: '2024-08-23'
section: Culture
url: http://www.bbc.co.uk/news/articles/cy9enw5xp2qo
content: |-
  The former Match of the Day and One Show presenter admitted sending "inappropriate messages" to colleagues.

  I am sorry and ashamed after BBC sacking - Jenas

  This video can not be played To play this video you need to enable JavaScript in your browser. Watch: Jenas tells the Sun newspaper he is "100% in the wrong" after BBC sacking

  Jermaine Jenas has told the Sun newspaper, external he is "ashamed" and has "let everybody down" after being sacked as a BBC presenter. He told the paper he sent "inappropriate messages" to two colleagues on the One Show, but insisted he "did nothing illegal" and said they were sent to "two consenting adults". The former Match of the Day and One Show host had his contract terminated this week for allegedly sending inappropriate messages to a female colleague. The BBC has not disclosed further details about the allegations against him.

  He told the Sun the texts were a "huge error of judgement" for which he was "deeply sorry", adding that he was "not a sex pest". Jenas, who is married with four children, told the paper he is receiving therapy and accepted he "fell below [the] standards" of the BBC. The 41-year-old continued: “I feel so ashamed. I’ve let everybody down - my colleagues, my friends and, most importantly, I’ve let my family down." The issue was brought to the BBC's attention a few weeks ago. The corporation announced his departure on Thursday. A BBC spokesperson said: "We can confirm Jermaine Jenas is no longer part of our presenting line-up." The BBC has not commented since Jenas spoke to the Sun.

  Jenas said he was sacked during a video call on Monday while on a family holiday, five days after being told of the allegations against him by the BBC. In a lengthy and at times tearful interview on camera with the Sun, Jenas said "nothing physical ever happened" but said he considered what he did "cheating". He continued: “I was given an incredible opportunity and I know it’s on me that right now I feel I have lost everything. "I feel like people are judging me and that I am the number one target right now in the country.” Jenas said he owed "everyone an apology, especially the women" he was messaging, and added: "I am sorry for what I have put them through." He denied sending any explicit pictures or video, the Sun reported. Jenas was presenting on talkSport Drive when the news of his BBC dismissal broke on Thursday. Asked about the allegations on air, he repeatedly refused to be drawn on why he had been sacked and said he was "speaking to lawyers". On the same day, his profile was removed from his agent's website. In a statement, talkSport said: "There are no plans for Jermaine to broadcast as a presenter on talkSport in the immediate future." Jenas earned between £190,000 and £194,999 at the BBC in the last financial year for his work on coverage of football including the FA Cup, Match of the Day and the World Cup. His salary for his work on The One Show has not been made public because it is paid by BBC Studios, the BBC's commercial production company, which doesn't reveal how much it pays presenters. Jenas made his footballing debut at 17, and played for his boyhood team Nottingham Forest, followed by Newcastle United and Tottenham Hotspur. He made 21 appearances for England and retired in 2016 before beginning a career in the media. The ex-Premier League footballer also works for TNT Sports as a pundit and co-commentator, and fronts their Formula E racing coverage. A Formula E spokesperson said Jenas was part of the Formula E presenting team for season 10, which ended in July, and the presenting line-up for the next season will be announced "in due course". They continued: "This decision will be carefully considered, taking into account the high standards we expect to be upheld at Formula E.” TNT has not commented about his future with the broadcaster. Jenas's agency, MC Saatchi, no longer represents him and his profile on the site now displays a "page not found" notice, external.

