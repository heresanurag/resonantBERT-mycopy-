  According to a report by the European Commission, Sweden and the UK have the safest roads in Europe.

  "Britain has some of the safest roads in the world and the number of fatalities has fallen by 44% over the last ten years - however we are determined to do more," a Department for Transport spokesman said.

  "Our campaigns, especially those focusing on road safety, play a key role in ensuring the public stays safe on the roads."

