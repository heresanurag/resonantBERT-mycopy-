  • None 'Oopsie, too late' - US courts tested by Trump's latest deportations Trump is also considering whether to cancel the temporary legal status of some 240,000 Ukrainians who fled to the US during the conflict with Russia. CHNV helped a reported 213,000 Haitians enter the US amid deteriorating conditions in the Caribbean country. More than 120,700 Venezuelans, 110,900 Cubans and over 93,000 Nicaraguans were also allowed into the US under the programme before Trump shut it down. Last month, DHS announced it would in August end another immigration designation, temporary protected status (TPS), for 500,000 Haitians living in the US. TPS was granted to nationals of designated countries facing unsafe conditions, such as armed conflict or environmental disasters. DHS also halted TPS for Venezuelans in the US, although this is facing a legal challenge. Since taking office in January, Trump's immigration policies have encountered a number of legal hurdles.
