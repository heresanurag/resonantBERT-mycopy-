  In Ormskirk, West Lancashire, homes were reportedly flooded around Halsall Lane and surrounding streets. Some residents posted pictures on social media showing flood water in their kitchens and gardens.

  Floodwater is reported to have entered homes around Halsall Lane, Ormskirk

  In Warrington, three people were rescued from a car by Cheshire Fire and Rescue Service on Cliff Lane, and in Booth Lane, Lymm, another three people were rescued in the early hours. The service used a rescue raft to get to the vehicles in both cases.

  The River Mersey at Palatine Road in Northenden, Manchester

  Manchester City Council leader Bev Craig said the authority was working with the police, fire service and Environment Agency to monitor water levels and provide support to residents. She said: "Some residents have been asked to evacuate where the Environment Agency has issued flood warnings, and these residents have been contacted directly and supported. "Thankfully we are seeing signs that water levels are beginning to fall, and it is unlikely that further evacuations will be necessary. "However, water levels will continue to be monitored over the coming hours."

  A car was stuck in flood water in Gressingham, Lancashire

  Flooding on the line between Manchester Piccadilly and Manchester Airport train stations has also led to major disruption and cancellations. Trains were not operating between Manchester Airport and the city's stations, or on routes between Manchester and Liverpool Lime Street, or from both Liverpool and Manchester to Huddersfield, Leeds and York. TransPennine Express urged customers on its services not to travel before at least 12:00, saying flooding was causing "significant issues" in Greater Manchester and Cheshire. Flooding also caused severe disruption across the road network, with the M57 closed in both directions between junction 6 at Kirkby and junction 7 at Aintree, according to National Highways. It said the westbound M56 between junction 6 for Manchester Airport and junction 7 for Bowdon was also expected to be closed "for some time" due to flooding across all three lanes.
