title: Family tributes to Kendal football girl killed by car on pitch - BBC News
date: '2025-03-06'
section: Cumbria
url: http://www.bbc.co.uk/news/articles/c3vw3dlgg6vo
content: |-
  Poppy Atkinson, 10, was determined to play football for Manchester United, her family says.

  Girl killed by car on pitch was 'force of nature'

  Poppy Atkinson was determined to be a professional footballer, her family said

  A girl who was killed when a car crashed on to a pitch where she was playing football was a "force of nature", her family has said. Poppy Atkinson, 10, was fatally struck by the vehicle while attending a training session at Kendal Rugby Club in Cumbria on Wednesday evening. Her family described her as the "focal point of their lives". She was determined to be a professional footballer and play for Manchester United, they said.

  An eight-year-old girl, also from Kendal, was taken to hospital for treatment but her injuries were not life-threatening. Cumbria Police arrested a 40-year-old man from Lancaster on suspicion of causing death by dangerous driving but said there was "no indication to suggest that this incident was a deliberate act".

  Poppy Atkinson (pictured with her brother Edward) touched so many lives, her family said

  Poppy's family said their lives revolved around the "small, petite and beautiful" girl's love for football, adding: "Many who know her, and who know her determination to improve and win, had no doubt she would achieve her goal to one day to play for Manchester United. "She was a force of nature. She was so special, she was too good for this world. "Poppy touched so many lives, it was easy to see why, her energy, character, spirit and passion for football was infectious and touched huge numbers of people. "The hole in our lives and so many around us that Poppy leaves is enormous, we will never be whole again."

  Poppy's headteacher, Nick Turley, said she had a "wonderful sense of humour"

  Nick Turley, the headteacher of Old Hutton CE Primary School, where Poppy was a pupil, said the community was devastated. "Poppy was someone who brought joy, light and happiness to all she did," he said, adding: "She had a wonderful sense of humour and a deep love of life. "Our prayers will remain with Poppy's family and as a school community we will do all we can to support them." Poppy's family said her favourite Manchester United players included Ella Toone and Kobbie Mainoo. In response, the club said: "On behalf of Ella, Kobbie and everyone at Manchester United, we send our heartfelt condolences to Poppy's family and friends for their devastating loss.

  Eyewitness Scott Denney said it "all happened very fast" as the car appeared on the pitch at Kendal rugby club just before 17:00 GMT. "Just as we got on to the pitch, a car came through the barriers at the top and then landed on the pitch," he said. Mr Denney, whose son attends the GT7 Football Academy which holds training sessions at the rugby club, said he had "no idea" how the car got on to the field. "It was just sheer panic. It was just not very nice at all," he said. "The children were obviously scared but the coaches dealt with it really, really well." Staff got the children off the field and out of view of the crash site, he added. He said: "Last night there were a lot of families here that pulled together to give support to the mum and dad and friends of the little girl."

  Floral tributes have been laid at the scene

  People have laid floral tributes and Kendal Rugby Club has cancelled its fixtures this weekend. He said there was a kerb, footpath and fence between the car park and the playing area and "you wouldn't anticipate any car could gain enough speed to land as it did on the pitch". Poppy's football team, Kendal United, said, following guidance, all training sessions would continue as scheduled "to provide our young players with the stability and routine that is important to help children process such tragic events". The club committee said they were working to provide "as much support as possible" and welfare officers were on hand. "Words cannot express the sorrow we feel as a club community during this extremely difficult time," they said.

