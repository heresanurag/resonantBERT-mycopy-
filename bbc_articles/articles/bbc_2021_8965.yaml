  And so to the sport. While some is already under way, the first medals will be awarded on Saturday, with four Britons taking on the men's cycling road race and shooter Seonaid McIntosh competing in the women's 10m air rifle. Swimmer Adam Peaty, rower Helen Glover and the men's artistic gymnastics team are among those also starting their campaigns. And with that, there are just four words left needing to be said.

