title: Children evacuated from Gaza for medical treatment - BBC News
date: '2025-03-06'
section: General
url: http://www.bbc.co.uk/news/videos/c1w0plzpqpqo
content: |-
  The first of an estimated 2,000 Gazan children needing medical treatment arrive in Jordan.

  The first 29 of an estimated 2,000 children in need of medical treatment have arrived in Jordan from Gaza. Among the evacuees are war wounded and children suffering from diseases like cancer and rare blood conditions.

  Among them is six-month-old Niveen Abu Daqqa, who has a heart condition, and her mother Enas – she left four children behind in Gaza to accompany her.

  They are travelling under an agreement reached between Israel and Jordan that is backed by the United States. Each child is accompanied by at least one family member, and all who evacuated Gaza were cleared to leave by Israel.
