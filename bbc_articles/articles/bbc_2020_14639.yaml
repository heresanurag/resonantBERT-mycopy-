content: |-
  The PM says "a shorter Christmas is a safer Christmas" at his press conference on 16 December.

  When will the Oxford vaccine be available?

  Tim Ross, from Bloomberg, asks whether the prime minister hopes the Oxford/AstraZeneca will be available by the end of this year, adding: "When will all over 50s be vaccinated?" Johnson replies that he has "always been in the worried, sceptical camp on vaccines" and worried that he "shouldn't over-promise". He says it is "incredibly exciting" about the coronavirus vaccines, adding: "I don't want to jinx things by over-promising at this stage." Whitty says the approval of the Oxford/AstraZeneca this is in the hands of the regulator the MHRA and it is "very important we let them do their job free of any pressure". Whitty says there is a "fair chance" that by "early in the new year" the regulator will be able to says whether the vaccine is effective and safe. "With AstraZeneca, if it comes through, it does make it a lot easier - not only is the volume going to be greater," he says, as the Pfizer vaccine is limited because of global demand - "but it is easier to deploy because it doesn't have the -70C requirements the Pfizer one has". He says if the vaccine is approved "it will speed up substantially the period when those in the highest risk groups can all be vaccinated".
