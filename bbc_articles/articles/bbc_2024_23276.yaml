title: 'Mohamed Al Fayed: ''Several enquiries'' made over abuse allegations relating
  to time at Fulham FC - BBC Sport'
date: '2024-09-26'
section: Fulham
url: http://www.bbc.co.uk/sport/football/articles/cdd42gel0mmo
content: |-
  Lawyers representing some of Mohamed Al Fayed's accusers say they have received "several enquiries" relating to Fulham Football Club during the late billionaire’s 16 years of ownership.

  Lawyers representing some of Mohamed Al Fayed's accusers say they have received "several enquiries" relating to Fulham Football Club during the late billionaire's 16 years of ownership. Al Fayed was accused by more than 20 female ex-employees of sexual assault or rape in a BBC documentary which aired last week. The Harrods boss, who died last year aged 94, was chairman of Fulham between 1997 and 2013, and a spokesman for the group of barristers, Justice for Harrods Survivors, said more individuals have now come forward. In a news conference last week, the group said he was a "monster" who threatened his sexual abuse victims to stay silent. Fulham say the club "remain in the process of establishing whether anyone at the club is or has been affected by the reports concerning Mr Al Fayed". A spokesperson for the Football Association added that they are "aware of the reports and will remain in contact with Fulham FC to monitor the matter". The Justice for Harrods Survivors group of barristers said they had fielded "well over 200 inquiries" about Al Fayed. "As we said last week, given our prolonged experience in dealing with the women impacted by this case, we expected that anywhere Mohamed Al Fayed went, abuse would follow," a statement read. "Sadly, this has proven to be true. We are now in possession of credible evidence of abuse at other Al Fayed properties and businesses, including Fulham Football Club."

  Last week, a former manager of Fulham's women's team told BBC Sport that extra precautions were put in place to protect female players from the club's late owner. Gaute Haugenes, who managed the team from 2001 to 2003, said members of staff became aware Al Fayed "liked young, blonde girls". In a news conference on Thursday before Fulham's game at Nottingham Forest this weekend, men's manager Marco Silva was asked the negative headlines concerning Al Fayed, though this was prior to the development about the enquiries to barristers. "To hear that is really sad for us, and for myself, as a manager, of course I have empathy for that situation," he said.
