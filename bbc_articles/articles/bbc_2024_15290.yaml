title: 'Euro 2024: England fan doesn''t regret ''Euro winners'' tattoo - BBC News'
date: '2024-07-15'
section: Wiltshire
url: http://www.bbc.co.uk/news/articles/cw0y92zr77do
content: |-
  Dan Thomas has urged other England fans to get their own tattoo ahead of the Euros 2028.

  Dan Thomas got the tattoo ahead of the final that England went on to lose

  An England football fan who had "Euro Winners" tattooed on his leg before the final says he will not cover it up and has no regrets. Dan Thomas, from Swindon in Wiltshire, received a tattoo of the Henri Delaunay Cup and the words "England Euro 2024 Winners" ahead of the final that England went on to lose 2-1 against Spain on Sunday. Mr Thomas, 29, now says he is confident the Three Lions will win the next Euros tournament in 2028 - when the UK and Ireland are the hosts - and may get an alteration. He said he "still loves" the tattoo and has urged other England fans to get their own to show their support ahead of the next tournament.

  The data consultant said: "We came close, I don't regret the tattoo. "If anything, I don't think it'd be hard to change the four into an eight in four years time. I won't be covering it up. Absolutely no regrets and I still love it." Spain substitute Mikel Oyarzabal scored in the final four minutes to inflict a second successive European Championship final defeat on Gareth Southgate's side in three years.

  Mr Thomas described the results of the match as "bittersweet" and praised the team for reaching the final. "The result wasn't what we wanted, but a great achievement to reach yet another final," he said. "It's only a matter of time before we win something."

  Dan Thomas wants other fans to get an England tattoo ahead of the 2028 tournament

  He spent two-and-a-half hours at the Reign Barbers and Tattoos parlour in Swindon getting the sizeable tattoo on his left leg. He live streamed the moment he had the artwork tattooed on his leg, which received 42,000 views on TikTok. "I don't really tend to look at the comments on my tattoo. Other people's opinions don't faze me," he said. "I'd encourage others to do the same in following tournaments to get behind the team."

  Mr Thomas spent two and a half hours getting the ink on his leg

  Tattoo artist Tinashe Chikerema applied the ink to Mr Thomas's skin, not before he "triple checked" he wanted it done. "I couldn't believe he actually wanted the tattoo, but I triple-checked with him. Fair play to him for being so confident in the team," Mr Chikerema told PA. Mr Thomas's friend, Jack Wilkinson, who owns Reign Barbers and Tattoos, did not believe Mr Thomas would go ahead with the tattoo "until the needle actually touched the skin".
