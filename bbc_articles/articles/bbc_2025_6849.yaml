  Coverage: Watch live on BBC One Scotland, BBC iPlayer or the BBC Sport website & app; listen on BBC Sounds or BBC Radio Scotland

  "Overall, I would say I am a more complete player," is the assessment of Kevin Nisbet who has been enjoying a career "reset" at Aberdeen. Twelve goals from the 28-year-old Scotland striker have helped the Pittodrie club in the league chase for European places, while two of those have come in a Scottish Cup run that continues with Saturday's semi-final against Hearts at Hampden. After a frustrating, injury-hit first campaign at Millwall, Nisbet joined the Dons on loan last summer but did not complete 90 minutes in the Premiership until February. "I probably wasn't fit enough, due to not playing a lot last season," Nisbet told BBC Scotland. "It took me a while to get up to speed but I feel sharp now." Seven of Nisbet's goals have come in his past 10 outings, along with five assists. The former Hibs player credits extra work off the pitch for his upturn in form, admitting that he hasn't always been as diligent. "Coming in on days off, doing the gym, looking after myself, stretching a lot, just the kind of things I probably wasn't doing in the past year if I am brutally honest. "I started in October and I have just consistently done it. Now I am reaping the rewards. "When I first came in, the gaffer [Jimmy Thelin] gave me points on the things I am really good at, but he also gave me points on how he was going to improve me.

  "I have improved a lot on the defensive side, the tracking back as well and working for the team. It's probably something I lost in the last few years and I have got that back thanks to the club. "I feel I am in a place now that is beneficial to me. "Coming up here was just about a complete reset on myself, getting back to scoring goals and enjoying my football. I have got that smile back on my face when I am playing." Nisbet has 11 Scotland caps, the last of which came in June 2023. However, his eye-catching displays in red earned a recall to the national squad earlier this year. "I had kind of put that to the back of my mind," he explained. "I had other priorities to get back to and when I started doing that the Scotland squad came." With his loan up at the end of the season, and with a year of his Millwall contract still to run, Nisbet is not giving too much thought to what comes next. "I just tend to stay well clear of it all," he said. "I have learned from when I was at Hibs, I got too involved in some situations. For me, it is just about head down and taking it game by game and it starts on Saturday. "I don't think anyone can predict the future, so it is just about getting to the end of the season and then see what happens."

