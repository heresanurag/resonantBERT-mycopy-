title: Nigel Farage to run as Reform UK candidate in Clacton - BBC News
date: '2024-06-04'
section: Politics
url: http://www.bbc.co.uk/news/articles/c3gg66pm8ylo
content: |-
  The ex-Brexit Party leader says he has changed his mind and does not want to let his supporters down.

  This video can not be played To play this video you need to enable JavaScript in your browser.

  Nigel Farage has announced he will stand in the general election for Reform UK and is taking over as the party's leader. He will be Reform's candidate in Clacton, after previously saying he would not stand in July’s general election. The former UKIP and Brexit Party leader said he had changed his mind after spending time on the campaign trail, adding he did not want to let his supporters down. The Essex seat, which was the first to elect a UKIP MP in 2014, has a Conservative majority of 24,702.

  Mr Farage said he wanted to lead a "political revolt," adding: "Yes, a revolt. A turning of our backs on the political status quo. It doesn't work. Nothing in this country works any more." He predicted the Conservatives will be in opposition after the general election. He said: "They are split down the middle on policy, and frankly, right now they don't stand for a damn thing. "So our aim in this election is to get many, many millions of votes. And I'm talking far more votes than UKIP got back in 2015." In a further blow to Prime Minister Rishi Sunak, two polls suggested the Tories are on course for a huge defeat. A YouGov poll for Sky News, external of almost 60,000 people, carried out between 24 May and 1 June, suggested Labour is set for its biggest election victory in history, winning 422 seats, with the Tories down to just 140. Meanwhile, a More in Common poll , externalof 15,000 people, conducted between 9 April and 29 May, predicts Labour will win 382 seats, compared to 180 for the Tories. Both are MRP polls, which project results in each individual constituencies, and were carried out before Mr Farage announced he was standing as a candidate.

  Mr Farage has made clear his intention to put immigration at the heart of his campaign. “We simply as a country cannot go on with an exploding population in the way that it is,” he told BBC Radio 4's Today programme. He said that the UK should admit far fewer unskilled immigrants, saying: “We don’t need any - we literally don’t need any.” He also appeared to ditch Reform’s policy to move asylum seekers to British overseas territories. He said the idea was not “terribly practical,” adding: “I took over yesterday, give me more than 12 hours and I’ll sort a few things out.” Mr Farage has stood to be an MP unsuccessfully seven times, most recently in South Thanet, Kent, in the 2015 general election, when he finished second behind the Tory candidate.

  Reform UK had already selected a candidate for Clacton, but Mr Farage said he had known for “many months” that it was a “possibility” he could be replaced. The constituency was previously held by UKIP after former Tory MP Douglas Carswell defected to the party and triggered a by-election, which he won. More than 70% of voters in the constituency backed Brexit in the 2016 referendum – the fifth highest figure in the UK. In 2017 Conservative Giles Watling unseated UKIP, gaining the seat with a majority of more than 15,000. By 2019, with no UKIP or Brexit Party candidate standing, Mr Watling’s majority grew to 24,702. He is defending the seat again in July for the Tories. Mr Watling told the BBC: “I will be pleased to show Nigel around Clacton so he can see what it is really like, but I am not prepared to see the constituency of Clacton sacrificed on the altar of his vanity.”

  Many Conservatives fear a prominent role for Mr Farage in the campaign could be damaging for the Tories. In 2019 Reform's previous incarnation, the Brexit Party, stood aside in more than 300 seats previously won by the Tories, amid concerns it could split the pro-Brexit vote. However, Mr Farage has said there will be no deals with the Tory Party for the upcoming general election and the party is contesting 630 seats across England, Scotland and Wales. Reform had one MP in the last Parliament, Lee Anderson - who defected from the Tories in March. The party's leader Richard Tice stood aside for Mr Farage on Monday. "Farage knows that Reform won’t win any seats, but he doesn’t seem to care that a vote for Reform only helps Labour," he said. Liberal Democrat deputy leader Daisy Cooper: "Rishi Sunak's constant pandering to Reform has horrified former lifelong Conservative voters in the centre ground. "Sunak must show some backbone and rule out Farage ever joining the Conservative Party in future, including if he gets elected to be an MP."

