  Thomas first appeared in Coronation Street aged 16, with is character's storylines revolving around his love life, grieving for his father Tony and being attacked by his enemy Callum Logan. Jason Grimshaw became a suspect in the latter's murder, and ultimately left for Thailand.

  In 2018, Thomas appeared as Rafael Humphreys in Neighbours' Hit & Run special.

  Later that year, Thomas's Celebrity Big Brother housemate Roxanne Pallett publicly apologised to him, saying she had "overreacted" when he "punched" her on the show. She said: "I was sensitive and emotional and mistook what was playful - I apologise for it, I shouldn't have questioned his motivation."

  Last year, the three brothers confronted the issue of their absent father in an ITV documentary.

  Thomas recently revealed on social media he is now doing food deliveries for Adam's restaurant, near Stockport.

  The 36-year-old went on to say that making regular trips home to Manchester to also see his daughter Scarlett - whose mother is his ex-girlfriend and former Corrie colleague Tina O'Brien - had "put a strain" on his relationship with his fiancée and former TOWIE star Lucy Mecklenburgh.

  Thomas and Mecklenburgh live in Essex with their baby son Roman.

  "There is that trying to find a mix of making both work, and working out where you're going to end," he said.

  "I think eventually I'd like to be in Manchester with both my kids, but at the moment it's having that help at hand in London, it's just easier, but I think eventually I would love to be back where I started, with all my brothers and all our kids.

  "I think that's what'll happen eventually but we're just taking it a day at a time. I think that's what you've got to do with this family life."

