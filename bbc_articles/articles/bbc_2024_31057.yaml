title: Bashar al-Assad says he didn't intend to leave Syria, statement claims - BBC
  News
date: '2024-12-17'
section: World
url: http://www.bbc.co.uk/news/articles/c5yd0zz5edqo
content: |-
  In what appears to be his first reaction since fleeing Syria, the former president says Russia decided to airlift him to Moscow.

  Assad says he didn't intend to leave Syria, statement claims

  Portraits of Assad have been torn down across Syria

  Syria's former President Bashar al-Assad says he never intended to flee to Russia - in what is purported to be his first statement since the fall of Damascus eight days ago. Assad's reported statement was put on the Telegram channel belonging to the Syrian presidency on Monday, although it is not clear who currently controls it - or whether he wrote it. In it he says that, as the Syrian capital fell to rebels, he went to a Russian military base in Latakia province "to oversee combat operations" only to see that Syrian troops had abandoned positions. Hmeimim airbase had also come under "intensified attack by drone strikes" and the Russians had decided to airlift him to Moscow, he says.

  In the statement - published both in Arabic and English - the former Syrian leader reportedly describes what happened on 8 December - and how he was apparently besieged at the Russian base. "With no viable means of leaving the base, Moscow requested that the base's command arrange an immediate evacuation to Russia on the evening of Sunday 8th December," the statement reads. "This took place a day after the fall of Damascus, following the collapse of the final military positions and the resulting paralysis of all remaining state institutions."
  • None 'I felt like a breathing corpse': Stories from people freed from Syria torture prison
  • None Bowen: Syrians search for dead loved ones - and closure The statement adds that "at no point during these events did I consider stepping down or seeking refuge, nor was such a proposal made by any individual or party". "When the state falls into the hands of terrorism and the ability to make a meaningful contribution is lost, any position becomes void of purpose," it says.

