id: bbc_2023_13843
title: 'Crossmaglen: Man ''critical'' after being shot in arm and neck - BBC News'
date: '2023-09-04'
section: Northern Ireland
url: http://www.bbc.co.uk/news/uk-northern-ireland-66705243
content: |-
  Police appeal for information after a man is attacked while on his way to work in County Armagh.

  Police say they received a report of a shooting in the Ballsmill Road area at about 06:30 BST

  A man is in critical condition in hospital after being shot in the arm and neck while sitting in a vehicle near Crossmaglen, County Armagh.

  It happened on the Ballsmill Road at about 06:30 BST on Monday.

  Police said another vehicle pulled up, a man with his face covered exited and then shot the victim before making off.

  The victim, who is in his 30s and lives locally, had been on his way to work, Sinn Féin MLA Conor Murphy said.

  Irish broadcaster RTÉ said he was found lying on the road by a passing motorist after the attack.

  A police cordon remains in place in two locations along the Ballsmill Road outside Silverbridge.

  In between the cordons, a forensic team has been searching for clues.

  The road is a short distance from the border and sits just off the main Dundalk-Armagh road.

  A number of cordons have been set up near the scene of the shooting in the village

  Police remain at the scene and a number of road closures are in place while investigations are ongoing.

  They have appealed for anyone with information about the shoting to come forward.

  Mr Murphy said it was "a despicable and cowardly attack by criminal elements".

  "There is no place for these thugs on our streets," he added.
