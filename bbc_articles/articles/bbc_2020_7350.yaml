title: Leeds fans gather at Elland Road to celebrate promotion - BBC News
date: '2020-07-17'
section: Leeds & West Yorkshire
url: http://www.bbc.co.uk/news/uk-england-leeds-53449239
content: |-
  Jubilant Leeds fans ignore warnings to stay at home and instead gather outside Elland Road.

  Some fans were seen wearing Leeds United face masks during the celebrations

  Leeds supporters have gathered outside the club's stadium to celebrate their return to the Premier League for the first time in 16 years.

  Leeds' owner Andrea Radrizzani and the police had urged fans to stay at home.

  However, there was jubilation outside Elland Road as the club's place in the top-flight was confirmed when West Brom lost to Huddersfield Town earlier.

  Last month Liverpool fans flocked to Anfield to celebrate winning the league.

  Under social distancing guidelines, people in England should keep a distance of at least 1m while observing precautions to reduce the risk of coronavirus.

  This video can not be played To play this video you need to enable JavaScript in your browser. Fans celebrate at home as Leeds are promoted in the midst of the coronavirus crisis

  Fans were seen celebrating together despite social distancing rules

  The smoke from blue and yellow flares filled the air outside Elland Road

  While hundreds of Leeds fans headed to the ground, countless others celebrated the historic moment at home, although manager Marcelo Bielsa had said he would not watch the game.

  Phil Beeton, co-chairman of Leeds United Supporters Club said: "It's absolutely brilliant, I'm just so pleased for everyone.

  "It's been such an up and down few weeks and the games have come so thick and fast that you've not had one minute to get over the last game before you're looking at the next one.

  "You've got to not lose sight of the fact that we've been through a horrendous period and an awful lot of people have lost their lives, I dare say a lot of Leeds fans too, and we've done it for them."

  Supporter Neil Sutcliffe said he was pleased that his grandchildren and other young fans would finally get the chance to see Leeds in the Premier League.

  He said: "It's been a long, long time coming. Sixteen years of heartache and we've finally managed to get back where we belong, all those ups and downs and it's finally come to fruition.

  "Let's hope we can consolidate for next year and I'm sure we'll put on a good show and show the world we deserve to be where we are.

  "I'm just hoping the supporters can be let back into the stadium, it's fantastic but it's tinged with a bit of sadness that you're not there live."

  Stewards tried unsuccessfully to enforce social distancing outside the ground

  Fans were heard chanting Leeds anthem Marching On Together

  Earlier this week, Radrizzani said it was "vitally important we stay safe and keep those around us safe too by staying at home".

  "The fight against Covid-19 is not yet over and we must continue to be sensible," Radrizzani wrote in an open letter to supporters published in the Yorkshire Evening Post.

  His sentiments were echoed by West Yorkshire Police.

  Earlier this week, a spokesperson for the force said:" It's important to remember that Covid-19 is still with us and large gatherings are still not permitted.

  "We understand that fans will want to celebrate but ask them to bear in mind their own safety and wellbeing, as well as that of others.

  "The safety of fans and the wider public is our primary concern and the safest way that people can celebrate is in their own homes."

  Fans were seen celebrating by the statue of club legend Billy Bremner

  Flags were waved at the ground including one bearing the face of manager Marcelo Bielsa

  Hundreds of fans have gathered here at Elland Road for this historic moment.

  Blue and yellow flares were let off as people stood next to the Billy Bremner statue raising cans of beer in celebration.

  Obviously it's still against the rules to gather in large groups and stewards were trying to enforce social distancing with police also patrolling.

  But it was almost impossible for many of the fans not to be standing shoulder to shoulder and there were few masks on show.

  Leeds players were cheered when they appeared at a window overlooking the crowd

  Leeds-born Kalvin Phillips came out to celebrate with the crowd from a distance

  Leeds put themselves on the brink of promotion when they beat Barnsley 1-0 on Thursday to move six points clear of third-placed Brentford with two games remaining.

  The result meant their long exile from the top-flight would end if West Brom failed to beat Huddersfield or the Bees dropped points at Stoke.

  Promotion was secured when the Baggies fell 2-1 to a spirited Terriers side who still needed points to ensure their Championship survival.

  After the result came in, celebrities and high profile figures form the world of football posted messages of congratulations on Twitter:

