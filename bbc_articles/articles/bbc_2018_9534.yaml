id: bbc_2018_9534
title: Video apparently shows Mo Salah using a phone while driving - BBC News
date: '2018-08-14'
section: General
url: http://www.bbc.co.uk/news/uk-england-merseyside-45175229
content: |-
  Liverpool FC said it told police about the footage "and the circumstances surrounding its capture".

  Liverpool striker Mo Salah has been referred to the police by his own club after he was apparently filmed using a mobile phone while driving.

  The club said: "We have spoken to the player also and will deal with any follow-up internally.

  "Neither the club or player will be making any further comment on this matter."

  Merseyside Police confirmed in a tweet that the video had been passed to the "relevant department".
