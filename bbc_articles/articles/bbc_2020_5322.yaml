title: 'VE Day: UK''s streets not empty as filled with love, says Queen - BBC News'
date: '2020-05-08'
section: UK
url: http://www.bbc.co.uk/news/uk-52590865
content: |-
  Commemorating her father's VE Day address, she expresses pride in a UK the wartime generation would "admire".

  This video can not be played To play this video you need to enable JavaScript in your browser. "We are still a nation those brave soldiers, sailors and airmen would recognise and admire"

  The Queen has given a poignant address to mark the 75th anniversary of VE Day, praising Britain's response to the coronavirus epidemic that has filled empty streets with "love".

  In the broadcast, she said: "Today it may seem hard that we cannot mark this special anniversary as we would wish.

  "Instead we remember from our homes and from our doorsteps."

  It aired exactly 75 years on from her father King George VI's address at the end of the Second World War in Europe.

  Thanking the wartime generation, the Queen, 94, said: "They risked all so our families and neighbourhoods could be safe."

  "We should and will remember them."

  Victory in Europe (VE) Day marks the day in 1945 when Britain and its allies accepted the unconditional surrender of Nazi Germany, bringing the war in Europe to an end.

  This year's celebration has been limited due to the lockdown conditions in place across Europe because of the coronavirus pandemic.

  Despite this, the Queen said, "our streets are not empty, they are filled with the love and the care that we have for each other".

  "And when I look at our country today and see what we are willing to do to protect and support one another, I say with pride that we are still a nation those brave soldiers, sailors and airmen would recognise and admire."

  In the pre-recorded message from Windsor Castle, her second televised address of the coronavirus pandemic, the Queen described the Second World War as a "total war" where "no one was immune from its impact".

  "At the start, the outlook seemed bleak, the end distant, the outcome uncertain," she said.

  "But we kept faith that the cause was right and this belief, as my father noted in his broadcast, carried us through.

  "Never give up, never despair, that was the message of VE Day."

  Paying tribute to those who were killed during the conflict, she said: "They died so we could live as free people in a world of free nations.

  "They risked all so our families and neighbourhoods could be safe."

  Reflecting on her own memories of VE Day, the Queen said she "vividly" remembered the "jubilant scenes my sister and I witnessed with our parents and Winston Churchill from the balcony of Buckingham Palace".

  Prime Minister Winston Churchill stands on the balcony of Buckingham Palace alongside the Royal Family (with the Queen, then Princess Elizabeth, on the left) on 8 May 1945

  The Queen, then 19, later slipped into the crowds outside Buckingham Palace, unnoticed, with her 14-year-old sister Princess Margaret, where the pair joined thousands of other revellers.

  The khaki-coloured Auxiliary Territorial Service (ATS) cap she wore to disguise herself from the public that day laid in front of her as she made her address on Friday evening.

  It was in the ATS that Princess Elizabeth qualified as a driver and the cap was part of her uniform when she undertook national service in 1945.

  The Queen, sitting behind a desk in Windsor's white drawing room, also surrounded herself with other historic personal mementos from the war years, including wearing two aquamarine and diamond clip brooches.

  The art deco-style pieces were an 18th birthday present from her father in April 1944 - just over a year before VE Day.

  Also visible were framed photographs of her father George VI and the Royal Family standing on the Buckingham Palace balcony on VE Day with Prime Minister Winston Churchill.

  The monarch's broadcast marked the culmination of a raft of events throughout Friday remembering the war and celebrating its end in Europe.

  Earlier, the UK held a two-minute silence, led by the Prince of Wales and the Duchess of Cornwall, to honour the war's servicemen and women.

  Prime Minister Boris Johnson thanked the VE Day generation, saying "our gratitude will be eternal".

  He said: "We can't hold the parades and street celebrations we enjoyed in the past, but all of us who were born since 1945 are acutely conscious that we owe everything we most value to the generation who won the Second World War."

  In Westminster, Commons Speaker Sir Lindsay Hoyle laid a wreath on behalf of the House of Commons.

  The Royal Air Force display team the Red Arrows staged a flypast over London, while RAF Typhoon jets flew over Cardiff, Edinburgh and Belfast.

  The Red Arrows flew over Horse Guards Parade in central London

  Mr Johnson said the coronavirus outbreak demanded "the same spirit of national endeavour" as shown during wartime

  Veteran Signalman Eric Bradshaw, who is isolating after testing positive for Covid-19, has been celebrating VE Day at his care home in Oldham, Greater Manchester

  In the afternoon, solo buglers, trumpeters and cornet players across the country played the Last Post from their homes.

  Extracts from Sir Winston Churchill's VE Day speech were broadcast, 75 years after it was first heard and people were encouraged to join in a toast from their homes.

  Later in the evening, Welsh soprano Katherine Jenkins, actor Adrian Lester and singer Beverley Knight, performed well-known songs from the 1930s and 40s and the public joined in a sing-along to Vera Lynn's wartime classic, We'll Meet Again.
