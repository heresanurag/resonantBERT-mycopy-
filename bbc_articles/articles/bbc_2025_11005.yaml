  Israel PM 'uncertain' over condition of three Gaza hostages

  Hostages' families have urged Israel's prime minister to agree another deal with Hamas rather than expand the Gaza offensive

  Israel's prime minister has said there is "uncertainty" about the condition of three of 24 hostages previously believed to be alive in Hamas captivity in Gaza. Benjamin Netanyahu said he knew "with certainty" that 21 hostages were alive but the status of "three more" was unclear. His comments came after US President Donald Trump said 24 hostages were alive a week ago but the figure was now 21. He made the comments while speaking at an event at the White House on Tuesday and did not cite a source or provide further details. The Hostages and Missing Families Forum had demanded information.

  The forum also urged Netanyahu to halt his plans to expand Israel's offensive in Gaza and to instead agree a deal with Hamas to return its remaining 59 living and dead hostages. A spokesperson called on the prime minister "to stop the war until the return of the last abductee", adding: "This is the most urgent and important national task." Speaking in a video on Wednesday following Trump's remarks, Netanyahu said: "We know with certainty that 21 hostages are alive. There are three more regarding whom there's uncertainty about whether they are alive." Last week, Netanyahu said rescuing hostages was a "very important goal" of the war, but that "the supreme goal is to achieve victory over our enemies". Israel's chief military spokesman Brig-Gen Effie Defrin appeared to contradict the prime minister on Monday when he stated: "The objective of the operation is the return of our hostages, the dismantling and decisive defeat of the Hamas regime." Despite that statement, Israel's Haaretz newspaper reports that the military's chief of staff, Lt Gen Eyal Zamir, presented operational orders to commanders this week that put "returning the hostages" bottom of a six-point list, external, with "defeating Hamas" at the top. Israeli officials have said the plans for the expanded offensive include seizing all of the territory indefinitely, forcibly displacing Palestinians to the south, and taking over aid distribution with private companies despite protests from the UN and its humanitarian partners. About 1,200 people were killed and 251 others were taken hostage during the Hamas-led attacks on southern Israel on 7 October 2023, which triggered the Gaza war. Another four people, two of them dead, were already being held captive in Gaza before the conflict. So far, Israel has secured the return of 196 hostages, 147 of them alive, mostly through two temporary ceasefire deals with Hamas. At least 52,653 people have been killed in Gaza during the war, according to the territory's Hamas-run health ministry. More than 2,500 have died since Israel ended a two-month ceasefire on 18 March and resumed its offensive, saying it wanted to put pressure on Hamas to release hostages. Israel has also blocked all deliveries of humanitarian aid and other supplies for nine weeks, which the UN says has caused severe shortages of food, medicine and fuel.
