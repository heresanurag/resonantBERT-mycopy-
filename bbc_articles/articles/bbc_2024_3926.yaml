title: 'Newspaper headlines: ''Town Halls'' woke spree'' and ''Palace''s doctored
  photo'' - BBC News'
date: '2024-03-11'
section: The Papers
url: http://www.bbc.co.uk/news/blogs-the-papers-68530779
content: |-
  Monday's papers carry the image of the Princess of Wales which has been recalled by several news agencies.

  Many of the early editions of Monday's front pages feature a photo of the Princess of Wales and her children Prince George, Princess Charlotte and Prince Louis - which has since been withdrawn by three major international news agencies over concerns it was "manipulated".

  Some newspapers appear to take the photograph at face value including the Daily Mirror which calls it a Mother's Day happy snap of recovering Kate - though online it points out it had been recalled.

  The Daily Express describes it as a "charming photo" which proves the Princess of Wales on the mend.

  But, the Daily Telegraph homes in on the so-called "Kill Notice" issued by the agencies, which tells papers not to use it. The paper reports social media users had pointed out a number of issues with the picture - such as leaves on a background tree and no wedding ring on Catherine's hand.

  The Daily Mail says what was meant to be a reassuring picture - months after Catherine's abdominal surgery - may have backfired.

  In other news, The Times reports new research which suggests there's been an "alarming" rise in threats of violence against people perceived as insulting Islam. The independent report commissioned by the government's counter-extremism "czar" also exposed links between activists at the forefront of protests in Britain, and an extremist radical Islamic Party in Pakistan.

  The Guardian has more on the joint call for politicians not to use the issue of extremism for point-scoring.

  According to the i newspaper, faulty IT at the Home Office - which cost the government £71m - is hindering efforts to tackle immigration. It says the flawed Atlas system is said to be blocking applications for British citizenship, and leaving "sobbing" Home Office staff locked out of vital casework.

  Finally, the Financial Times says a joint survey it carried out shows US President Joe Biden is struggling to be given credit for a growing economic feel-good factor in America.

