  King starts to deliver his Speech opening 2024 Parliament

  King Charles has told Parliament about the bills to be presented by the new government.

  He was opening Parliament in a ceremony where he outlined around 40 bills by the first Labour government for 14 years.

  He said the government programme would be "mission-led" and based on the principles of security, fairness and opportunity for all.
