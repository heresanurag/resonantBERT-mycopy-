  Mr Stancombe was raising money for Elsie's Story, a charitable trust that makes grants to assist young people and support others in the Southport area. Elsie's mother, Jenni Stancombe, told BBC Breakfast the Prince and Princess of Wales had donated to Elsie's Story and sent the family a "special message" ahead of the race. Running alongside Mr Aguiar was Jinnie Payne, the headteacher of Churchtown Primary School, where Alice and Bebe were pupils. She said Prince William and Catherine made a donation to the Churchtown Playground fund for a new playground, including a performance stage and library, at the school. Mrs Payne said the school was "deeply touched and encouraged by William's and Kate's support".
