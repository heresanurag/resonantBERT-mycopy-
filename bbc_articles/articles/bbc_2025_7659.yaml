  David Stancombe and Sergio Aguiar were raising money for projects set up in their daughters' memory.

  Fathers of Southport victims complete London marathon in tribute to daughters

  Mr Stancombe and Elsie (left) and Mr Aguiar and Alice

  The fathers of two girls killed in the Southport attack have completed the London Marathon in an emotional tribute to their daughters. Sergio Aguiar and David Stancombe entered the race to raise money for projects set up in their daughters' memory. Alice Aguiar, nine, Elsie Dot Stancombe, seven, and Bebe King, six, were killed last July at a Taylor Swift-themed dance workshop. The fathers received encouragement from Sir Keir Starmer on the morning of the race with Mr Aguiar telling the BBC it was "good" to have received his support. Mr Stancombe added: "Even now it still blows me away that so many people know about it and you're getting messages from the prime minister."

  "I would love people to know I've seen their message, but I have genuinely read so many of them. It's amazing," he added. Mr Aguiar finished the gruelling race on Sunday with a time of four hours and five minutes. Mr Stancombe finished in four hours and 28 minutes. Bebe's parents, Lauren and Ben King, went to London to cheer from the sidelines as Mr Aguiar and Mr Stancombe ran the 26.2 mile (42.2km) route.

  In the video message played to the families ahead of the race, Starmer said: "David and Sergio, I want to wish you the very best of luck in the London Marathon this weekend. I know how much it means to you and your families. "This is an incredible way to honour the memory of your precious daughters and the entire nation is in awe of your courage and your resilience. "We'll all be with you every single step of the way. Good luck."

