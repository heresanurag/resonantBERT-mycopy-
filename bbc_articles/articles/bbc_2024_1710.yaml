title: Zendaya channels cyborg chic at Dune premiere - BBC News
date: '2024-02-16'
section: General
url: http://www.bbc.co.uk/news/entertainment-arts-68315760
content: |-
  The outfit has been compared to famous Star Wars character C-3PO on social media.

  Zendaya turned heads at the premiere for Dune: Part Two as she donned a robot-style metallic suit.

  Photographers and fans were heard gasping as the actress revealed her futuristic look.

  Timothée Chalamet, Florence Pugh and Austin Butler were also among the cast at the event.

  The long-awaited sequel was originally scheduled to be released last year.
