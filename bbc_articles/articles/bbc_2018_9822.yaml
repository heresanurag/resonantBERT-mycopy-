id: bbc_2018_9822
title: 'Venezuela ''drone attack'': Soldiers seen running - BBC News'
date: '2018-08-05'
section: General
url: http://www.bbc.co.uk/news/world-latin-america-45073420
content: |-
  Footage shows Venezuela's president looking up and dozens of soldiers running. He later blamed Colombia for the incident.

  Venezuelan officials say explosive drones went off as President Nicolás Maduro was giving a live televised speech in Caracas, but he is unharmed.

  Footage of the event shows Mr Maduro looking up, startled, and dozens of soldiers running, before the transmission is cut off.

  Mr Maduro has blamed Colombia for the attack - something denied by Bogota as a "baseless" accusation.
