title: 'Sports Personality of the Year 2024: Nominees to be announced on Monday -
  BBC Sport'
date: '2024-12-08'
section: Sports Personality
url: http://www.bbc.co.uk/sport/articles/c5ydl28lee1o
content: |-
  The contenders for the 2024 BBC Sports Personality of the Year award will be announced on Monday.

  The six nominees will be revealed on the BBC Sport website and app from 07:00 GMT.

  This year's awards ceremony will be held at MediaCityUK in Salford on Tuesday, 17 December.

  Gabby Logan, Alex Scott and Clare Balding will present the show live on BBC One and BBC iPlayer from 19:00 GMT.

  Eight awards will be handed out including the prestigious main prize, which was won last year by England goalkeeper Mary Earps.

  Voting is still open for the World Sport Star of the Year award, with Simone Biles, Caitlin Clark, Catherine Debrunner, Armand Duplantis, Sifan Hassan and Leon Marchand up for the prize.

  Skateboarder Sky Brown, Para-swimmer William Ellard and darts player Luke Littler have been shortlisted for the Young Sports Personality of the Year award.
