  The BBC's Analysis Editor Ros Atkins takes a look at what we know - and what we don't - about the US-Ukraine mineral deal.

  Ukraine says it has agreed to the terms of a major deal that would give the US access to its mineral deposits.

  But it reportedly does not give firm security guarantees to war-torn Ukraine.

  The BBC's Analysis Editor Ros Atkins looks at what we know about the agreement.
