title: Black bear cools off in California swimming pool - BBC News
date: '2024-08-26'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-66349101
content: |-
  Police responded to the unexpected visitor splashing around in the backyard of a home in Burbank.

  A bear has been spotted taking a dip in a swimming pool in the backyard of a house in California.

  Extreme heat has hit parts of the US, including here, with temperatures breaking records across states.

  Burbank Police Department posted footage on social media of the bear splashing around and escaping the heat, before it scaled over a nearby wall and climbed up a tree.

  It also shared safety tips for what to do if you see a bear.
