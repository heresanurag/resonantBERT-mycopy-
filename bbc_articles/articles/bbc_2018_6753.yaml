title: Meet the 'forgotten' Victorian astronomer Annie Maunder - BBC News
date: '2018-06-25'
section: General
url: http://www.bbc.co.uk/news/science-environment-44606012
content: |-
  A state-of-the-art telescope is named after Annie Maunder, a Victorian pioneer of space photography.

  As a female scientist in Victorian times, Annie Maunder struggled to gain recognition for her pioneering astronomical work.

  But 71 years after her death, a new telescope has been named after her.
