content: |-
  Amber Guyger received a 10-year sentence for shooting dead Botham Jean inside his own apartment.

  A former US police officer has been sentenced to 10 years in prison for shooting dead her neighbour Botham Jean inside his own apartment.

  Amber Guyger argued she killed him after mistakenly thinking she was in her own home and that he was an intruder.

  In an emotional testimony, Jean's brother Brandt said he "loved [Guyger] as a person" before giving her a hug.

  Read more: US ex-cop who killed neighbour jailed for 10 years
