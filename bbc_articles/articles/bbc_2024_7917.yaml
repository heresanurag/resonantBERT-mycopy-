  Taylor and Serrano's first encounter at Madison Square Garden was a seminal moment in women's boxing as two female fighters headlined at MSG for the first time. But it was the nature of the contest that has lived on as the two rivals put on a stunning display, Taylor coming out a narrow winner. After their first fight took years to come to fruition, the rematch has stopped and started in the two years since, but has now been delivered - and on Netflix. The streaming giant has a global audience of 260m and will broadcast the fight at no extra cost for its subscribers. After the first bout drew a record 1.5m viewers on DAZN, the rematch could eclipse that figure with YouTuber turned boxer Paul fighting heavyweight legend Tyson the same night. Tyson described Taylor and Serrano as "two of the best boxers" in the world and the event as a "true gift to fans". It could draw a record crowd for women's boxing with AT&T Stadium able to welcome 80,000 fans, compared to the 19,187 who attended Taylor-Serrano 1. Both women have achieved more history since their fight. Taylor became just the third fighter male or female to win undisputed titles at two weights, while Serrano became Puerto Rico's first undisputed champion in the four-belt era. At light-welterweight Serrano will be an underdog again, but after previously rising to the occasion, she is targeting the stoppage she couldn't produce in their first encounter. "I believe I won our first fight, but I didn't get the decision, so this time I'm not leaving it to the judges," she said.
