  Katie Taylor's long-awaited rematch with Amanda Serrano announced for 20 July in Texas, as a co-main event with the Jake Paul v Mike Tyson bout.

  Amanda Serrano is on a four-fight winning streak since losing to Katie Taylor in 2022

  Undisputed light-welterweight champion Katie Taylor's rematch with Amanda Serrano will take place in Texas on 20 July. Taylor, 37, defeated Serrano via split decision in an all-time lightweight classic two years ago. Taylor is now undisputed champion at light-welterweight and Serrano steps up in weight again to face the Irishwoman. The highly anticipated rematch will be the co-main event to Jake Paul v Mike Tyson at Dallas' AT&T Stadium. "This is the rematch the world has wanted to see," said Taylor. "The first fight in New York was obviously an epic occasion and it more than lived up to the billing, and I'm sure the rematch will be no different." Taylor moved up to light-welterweight after beating Serrano, suffering her first ever loss to Chantelle Cameron in May 2023 before avenging the defeat last November. The win over Cameron saw Taylor become a two-weight undisputed champion, having also achieved the feat at lightweight. After losing to Taylor, 35-year-old Serrano subsequently became undisputed champion at featherweight and has won four fights in a row. The Taylor defeat was only the second loss of Serrano's career and the seven-division world champion held the WBO light-welterweight belt in 2018. Serrano relinquished her WBC featherweight title last year in order to fight in 12, three-minute rounds but has decided to resume fighting at 10, two-minute rounds to face Taylor. "I promised my fans they would see this rematch after we made history at MSG and it feels like a dream come true to know that Katie and I are finally making it happen on the biggest stage possible to show the world what elite women's boxing is all about," said Serrano. "While my focus continues to be on giving women the choice to fight with the same rules as men, I've always said that this is the one fight I'd go back to 10x2 for."

