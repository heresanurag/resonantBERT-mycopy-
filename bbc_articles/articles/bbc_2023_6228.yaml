title: Disneyland fire-breathing dragon engulfed by flames - BBC News
date: '2023-04-24'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-65370124
content: |-
  A giant dragon in California's Disneyland Park is engulfed by fire during a show as visitors look on.

  Visitors watched on in shock as a giant fire-breathing dragon in California's Disneyland Park burst into flames during a show.

  Footage shows Maleficent, a 45ft (13m) dragon, quickly being engulfed in flames, as firefighters try to control the blaze.

  It happened during Fantasmic, a live performance featuring gravity-defying water displays, pyrotechnics and Mickey Mouse (usually) saving the day.

  No injuries or deaths have been reported, local media and officials said.
