title: Mr Beast apologises after 'horrible' Las Vegas event - BBC News
date: '2025-04-17'
section: Technology
url: http://www.bbc.co.uk/news/articles/c74n9wez7k8o
content: |-
  The YouTuber promised disappointed fans, who had spent $1,000 on 'The MrBeast Experience', a visit to his studio.

  MrBeast is known for his elaborate stunts and charitable actions on his YouTube page

  YouTuber MrBeast has issued an apology after his MrBeast Experience at a Las Vegas resort did not live up to the billing. The influencer, whose real name is Jimmy Donaldson and has more than 385 million subscribers, said the event "definitely isn't the experience we hoped they'd deliver" and promised to make it up by inviting everyone affected to his studio. The event at Resorts World Las Vegas was advertised as an "immersive" and "unforgettable" experience that included exclusive games, a MrBeast-themed menu and mystery bags thought to contain limited edition merchandise, including one with a $10,000 (£7,550) gift voucher. Those who attended the three-day event complained and demanded refunds.

  A crowd of frustrated fans confronted the resort's CEO Alex Dixon on Tuesday, asking him to refund the $1,000 (£750) they spent on the three-day event. Fans arrived at Resorts World Las Vegas expecting fun games and exclusive experiences from MrBeast, but some said they waited in their hotel rooms for their mystery bags and were underwhelmed. "It should have been like mini-games, meet and greets, photo ops, special drinks, and things," Theresa Metta, who travelled to Las Vegas with her mother told 8NewsNow, an affiliate of the BBC's US partner CBS News. "Unfortunately, we didn't get any of that." Instead, the guests camped out in their hotel rooms waiting days for their bags to arrive. And when they did, the guests were underwhelmed. "I was told to wait in my room for two days for a package to come, so I legit spent two days in my room for a package to come, and it was a box of chocolates," Ms Metta said. Several users said on social media that they received t-shirts in different sizes, which could be purchased for $9 (£7) online. One posted a video on TikTok accusing the hotel and the YouTube star of "false advertising", saying it was a "horrible" experience. Replying to a fan's complaint on X, Donaldson admitted it "definitely isn't the experience we hoped they'd deliver" and promised to make it up by inviting everyone affected to his studio. The event has since been removed from the hotel's website. The BBC has contacted Donaldson and Resorts World Las Vegas for comment.
