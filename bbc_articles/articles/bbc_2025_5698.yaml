content: |-
  Interim head coach Matt Sherratt says Wales must not fixate on breaking their record losing sequence after a 35-29 Six Nations defeat to Scotland.

  Wales must not be 'chewed up' by losing run

  Jac Morgan has been one of Wales' leading lights in a winless Six Nations campaign

  Coverage: Watch on BBC One, BBC Sport website and app and S4C. Text commentary and highlights on BBC Sport website and app. Listen live on BBC Radio Wales, BBC Radio Cymru, BBC Radio 5 & BBC Radio 5 Sports Extra.

  Interim head coach Matt Sherratt says Wales can not fixate on breaking their record 16-game losing sequence after a 35-29 Six Nations defeat by Scotland. The loss in Edinburgh was also a 10th consecutive Six Nations failure during a winless run that began in October 2023. Wales launched a spirited Murrayfield comeback to claim two losing bonus points after Scotland had taken their foot of the pedal when leading 35-8 after an hour. The stark reality now is Wales have now joined Italy as another tier-one team to have lost 16 successive internationals in the professional era. England visit Cardiff next Saturday with Wales bidding to avoid losing all their matches for a second Six Nations tournament in a row. "There's no point hanging on to the past at all," said Sherratt. "It [the losing run] is not something I'm going to talk about, it's there in the background. "Everyone knows that, but if you start taking the pitch with desperation and anxiety and worrying where the next win comes from, it's just going to chew you up. "What I can promise the players next week is I'll do my best to make them a better team. So I'll be positive and we'll have a plan for England."

