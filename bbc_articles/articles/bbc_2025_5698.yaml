  Wales had run Ireland close in Sherratt's first game in charge, but could not replicate that intensity in the opening exchanges against Scotland. Gregor Townsend's side ran in four tries before the break to lead by 20 points as they outclassed Wales. "We knew two things were going to be important," said Sherratt. "They edged the contestable kicking game and their defence at the contact area was so good. "That's what happened in the first 40 minutes as we gave their back three some run ups and they are dangerous." Sherratt has insisted it was those technical problems rather than any emotional issues. "The easy thing is to say there was a drop off emotionally, but I don't think that was the case," said Sherratt. "They are a good Scotland team and we've got to remember that. They've been together a long time and we ran into them on a good day. "There was no lack of passion out there. There was a hell of a lot of effort from our boys in that last 20 minutes. "It was nice to get that four-try bonus point, but what was more pleasing was seeing the desperation of them defending our line. "The amount of tackles some of our forwards put into those sets was outstanding."

