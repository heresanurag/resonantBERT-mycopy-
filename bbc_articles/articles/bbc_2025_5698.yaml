  Wales, who had scored in the first half through full-back Blair Murray, made the scoreline far more respectable with tries from Ben Thomas, Teddy Williams and Max Llewellyn as replacement fly-half Jarrod Evans helped orchestrate the second-half comeback. Wales also had a late Taulupe Faletau try disallowed for Murray illegally hurdling a tackle in the build-up, a decision Sherratt described as "correct". "The game had run its course so when the bench came on it was pretty clear what we had to do," said Sherratt. "Ultimately the first 20 minutes was always going to dictate where the game went. "It was a brave effort to come back and get two points, but I've seen enough of those games where the reality is they probably thought they'd done enough and dropped off 5%. "The most pleasing thing was you could sense just before half-time, if we started chasing the game and getting unstructured, we'd hurt ourselves. "There was an element of maturity in the second half where we weren't reckless. "It gave us something to build on and some green shoots going into the England game."

