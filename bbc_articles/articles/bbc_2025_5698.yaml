  After they host Italy on Sunday, England will travel to Principality Stadium next Saturday for Sherratt's final game in charge before he returns to Cardiff. Gloucester-born Sherratt is looking forward to plotting the downfall of his fellow countrymen, who could still be in contention for the Six Nations title when they take the field in the Welsh capital. "Straight away after the game, the players said in the huddle that it's not a week to lick your wounds for too long. "There's no greater challenge than England in Cardiff. I know it's something the boys can't wait for and personally for me, it should be a great occasion." Sherratt also stated he was unsure whether Josh Adams would be fit to face England after the Cardiff wing missed the past two games because of a hamstring injury.
