  Immigrants 'could become homeless' without support

  Councils are calling for the government to allow people with a temporary immigration status to receive public funds amid fears they will be forced into homelessness during the pandemic. Increasing numbers of people who are not eligible to support from UK taxpayers are approaching local authorities for support during the coronavirus pandemic, the Local Government Association (LGA) said. People with a temporary immigration status are given the condition called "no recourse to public funds" by the Home Office, meaning they cannot access welfare benefits. But the LGA fears that, without this support and as people lose their jobs, they could become homeless. Councillor David Renard, the LGA's housing spokesman, said: "As the economy recovers, local outbreaks may mean there still may be a need to be able to access safe and suitable accommodation and financial support to allow for self-isolation, particularly for single adults without care needs who are not usually eligible for social services' support." A government spokeswoman said: "Families with leave under family and human rights routes can apply, free of charge, to have no recourse to public funds conditions lifted and we encourage anyone eligible to submit an application."
