id: bbc_2022_10111
title: Abuse of BBC journalist was disgraceful, says Nicola Sturgeon - BBC News
date: '2022-08-17'
section: Scotland politics
url: http://www.bbc.co.uk/news/uk-scotland-scotland-politics-62576062
content: |-
  Independence supporters shouted insults including "traitor" and "scumbag rat" at Scotland editor James Cook.

  James Cook was called a "traitor" outside the Conservative leadership hustings in Perth

  Nicola Sturgeon has described the abuse of a BBC journalist by independence supporters as "disgraceful".

  Protesters outside the Conservative leadership hustings in Perth shouted insults including "you're a traitor" and "scumbag rat" at James Cook.

  There were also reports of eggs being thrown and people being spat at as they arrived at the event.

  The first minister said abusing journalists was never acceptable, and described Mr Cook as a "total pro".

  Ms Sturgeon tweeted: "Their job is vital to our democracy and it is important to report and scrutinise, not support any viewpoint.

  "James Cook is a journalist of the highest quality and a total pro - the behaviour he was subjected to last night was disgraceful."

  She later said she did not believe those involved had been SNP members, but that "appropriate action" would be taken if they were.

  A video of the exchange between Mr Cook and protesters outside the Perth Concert Hall on Tuesday evening was posted online by one of those involved in the demonstration before later being deleted.

  It showed insults being shouted at Mr Cook, the BBC's Scotland editor, before a woman asked him how long he had been in Scotland and whether he knew about the Claim of Right 1689.

  Mr Cook replied that he was Scottish before adding: "I'm not going to be starting asking you how long you've been in Scotland, I think it's a bit of a rude question."

  After abuse continued to be shouted, Mr Cook said: "It's a waste of time. I'm very much trying to have a civilised conversation with you, in our nation, which we share.

  "But I can't have a civilised conversation because this gentleman calls me 'traitor' and 'scum' and screams me down."

  The BBC described Mr Cook as an "exceptional correspondent" who "showed professionalism throughout the incident".

  It added: "It is never acceptable for journalists to suffer abuse of any nature while doing their job."

  The BBC has faced accusations of bias - which it strongly denies - from many within the pro-independence movement since the 2014 referendum campaign.

  A small group of protesters carrying signs criticising the treatment of migrants and refugees broke through barriers and ran towards the door of the venue

  Mr Cook's predecessor as the broadcaster's Scotland editor, Sarah Smith, has previously spoken of the "criticism, bile and hatred" she faced while covering politics in the country.

  Ms Smith said she was frequently subjected to insults and misogyny, and had been "demonised quite heavily amongst certain parts of the population".

  SNP MSP James Dornan had to issue an apology after initially claiming Ms Smith had "imagined" or "exaggerated" her story.

  There were reports of abuse and eggs being hurled at Tory members as they arrived to hear leadership rivals Liz Truss and Rishi Sunak speak.

  Protesters hung banners saying "Tory Scum Out" and "Scottish not British" outside the venue, with one group breaking through the barriers and running towards the door of the concert hall before retreating.

  Holly Moscrop, the national chair of the Scottish Young Conservatives, said her coat had been grabbed, she was spat on and had misogynistic abuse screamed at her near the entrance to the venue.

  Ms Moscrop told BBC Scotland's Drivetime programme: "The protesters were leaning right over the railing and one of them grabbed my coat.

  "They were screaming abuse right in my face to the point that they were spitting in my face.

  "They were shouting that I was a Tory whore, telling me that I should die and kill myself and that we were Tory scum.

  "I was genuinely really scared that they were going to come over the barrier and that they were going to do something".

  Scotsman journalist Alistair Grant said he was one of those who had been hit by an egg.

  He tweeted: "Can 100% confirm that when I arrived at the Tory leadership hustings, eggs were being thrown towards the queue of party members waiting to get in to the venue.

  "Regret to say an egg just hit my leg. Can't stress how uncomfortable it is to have an eggy sock."

  There were reports of eggs being thrown at Conservative members as they queued outside the Perth Concert Hall

  Scottish Conservative chairman Craig Hoy said people trying to attend the hustings had faced a "gauntlet of hate" outside.

  He added: "Everyone is entitled to peacefully protest and make their voice heard against politicians they disagree with - that's the essence of democracy - but, not for the first time, a mob of extremist nationalists crossed a line.

  "It's shameful that journalists doing their job and ordinary party members, some of them elderly, had to run a gauntlet of hate just to get into the venue, including having eggs thrown at them and being spat at."

  Police Scotland said there had been no arrests at the protest, with Ch Supt Phil Davison insisting that an "appropriate policing plan was in place to maintain public safety and minimise disruption".

  He added: "We have a duty under the European Convention on Human Rights to protect the rights of people who wish to peacefully protest or counter-protest, balanced against the rights of the wider community."

  It wasn't a huge surprise to see a crowd of protestors outside the venue. Many of the same banners were draped over the same railings at the last hustings in 2019.

  Some were slightly taken aback though at the scale and ferocity of the event, with insults and the occasional egg flying while a large sound system boomed out some rather sweary speeches.

  There was a fairly partisan atmosphere inside at times too, with members booing and heckling some questions from the host, broadcaster Colin Mackay.

  Political leaders are at pains to paint any abuse as the work of an extremely vocal minority.

  But there is no mistaking the fact that politics has a fairly angry tinge to it right now.

  People are struggling amid rising prices and fuel bills, and it's only going to get worse as we move into winter.

  Trust in politicians was plumbing new depths even before the cost of living crisis, and now inflation and interest rates are on the rise and wage disputes are commonplace.

  Whoever wins the Tory leadership is going to face a huge challenge in cooling the atmosphere of debate and bringing people together in such circumstances.
