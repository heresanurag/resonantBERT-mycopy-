title: 'Great North Run 2023: Mo Farah fourth in final race of career - BBC Sport'
date: '2023-09-10'
section: General
url: http://www.bbc.co.uk/sport/athletics/66767631
content: |-
  Britain's four-time Olympic champion Mo Farah brings the curtain down on his illustrious career with a fourth-place finish in the Great North Run.

  Last updated on .From the section Athletics

  Mo Farah, one of the greatest British athletes of all time, finished fourth in the final race of his career at the Great North Run. The 40-year-old four-time Olympic champion slipped off the pace early in the famous 13.1-mile race from Newcastle to South Shields. He finished three minutes 30 seconds behind Ethiopia's Tamirat Tola, who won in 59mins 58secs. "It's very emotional. There was a lot going through my mind," Farah said. He told BBC Sport: "All I know is running and that is what made me happy for so many years. "Running is everything to me. Running is what saved me."
  • None 'I'm proud of what I've accomplished - but I'm looking forward to being a normal person' 'Thank you for the memories, thank you for the medals' He became the first Briton to complete the Olympic 5,000m and 10,000m double with victory in front of a joyous home crowd at London 2012, and defended his titles at Rio 2016. Only five Britons have more Olympic medals than Farah, who also won six world, five European and two European indoor titles as well as the Chicago Marathon in a career dating back more than two decades. Farah waved to the crowd during the final 200m of the Great North Run before jogging back down the finishing straight to high-five fans, many of whom were carrying 'One Mo Time' signs. "Without the crowd I wouldn't have got through it," he said. "I wanted to end my career here in Newcastle. I've had some amazing memories. It's really important to come out here and give my support to the crowd. "It's very important to have a race like this. Without the support and community in Newcastle, it wouldn't be the same." Former European 10,000m champion and Great North Run founder Brendan Foster said: "Mo Farah is the greatest sportsman or woman Britain has ever had. We'll never see his type again." Steve Cram, the former 1500m world champion and now BBC commentator, said: "Thank you for the memories. Thank you for the medals. Thank you for all the excitement and drama." British Athletics described Farah, who was knighted in 2016, as "the greatest", while Team GB tweeted: "Generation: inspired." What else happened at the Great North Run? Kenya's Peres Jepchirchir, the Olympic marathon champion, won the women's race in 1hr 6mins 45secs. Compatriot Sharon Lokedi was 58 seconds behind in second, with Britain's Charlotte Purdue third. Belgium's Bashid Abdi was runner-up in the men's race, 1min 22secs behind world marathon champion Tola. Ethiopia's Muktar Edris was third. Commonwealth Games bronze medallist Daniel Sidbury won the men's wheelchair race in 42:48 and fellow Briton Samantha Kinghorn the women's in 49:21. Almost 60,000 people took part in the 42nd edition of the Great North Run, the biggest half marathon in the world. Bill Cooksey, 102, walked the course to raise funds for the County Durham and Darlington NHS Foundation Trust. Keith Turner became the first blind person to complete a half marathon untethered. His guide, Jim Roberts, rang a bell to direct Turner, who described running untethered as "freedom". Archive: 'You could be quite good, you know'
