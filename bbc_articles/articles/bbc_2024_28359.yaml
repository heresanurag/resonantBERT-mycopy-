title: 'Inga Maria Hauser: Family welcome inquest into Ballycastle murder - BBC News'
date: '2024-11-18'
section: Northern Ireland
url: http://www.bbc.co.uk/news/articles/cq8v4192q84o
content: |-
  The body of Inga Maria Hauser, 18, from Munich was found in Ballypatrick Forest, Ballycastle, in 1988.

  The body of Inga Maria Hauser was found in Ballypatrick Forest, Ballycastle, in 1988

  A senior coroner has said his court will do everything it can to facilitate an investigation into the death of a young German backpacker 36 years ago. Joe McCrisken made the statement at a preliminary hearing of the inquest into the murder of Inga Maria Hauser. The 18-year-old’s body was found in Ballypatrick Forest, Ballycastle, in 1988. No one has ever been charged with her killing.

  The family of Ms Hauser, who was from Munich, have campaigned for years for the truth about what happened to her. On Monday, Ms Hauser’s sister Friederike listened over video link as the preliminary proceedings got under way at the coroner’s court sitting at Laganside. Malachy McGowan, the barrister representing her, told the coroner: “My client is very grateful for the decision to hold this hearing today. “The family have been waiting for decades and they place their trust and considerable hope in this process.” He agreed the family had waited “a long time”, adding: “We'll do everything we can to facilitate an investigation into this lady’s death.” He also said there was a “considerable amount of material” that would be disclosed as part of the inquest “by the PSNI, the PPS and perhaps other agencies”.

