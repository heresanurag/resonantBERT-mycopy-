title: Man charged over theft of copper pine cone bollards in Glasgow - BBC News
date: '2021-12-25'
section: Glasgow & West Scotland
url: http://www.bbc.co.uk/news/uk-scotland-glasgow-west-59790144
content: |-
  Two of the public artworks were reported stolen in the Gorbals area of Glasgow earlier this month.

  Two pine cones were reported stolen from McNeil Gardens earlier in December

  A man has been charged in connection with the theft of public artworks in the shape of pine cones in Glasgow.

  Two of the copper-coated bollards were reported stolen from the Gorbals area on 13 December.

  Police later discovered that a number of the 2ft (0.6m) bollards, which were installed as traffic calming measures, were missing.

  Officers said a 39-year-old man had been arrested and charged and would appear in court on Monday.

  He is accused of theft and road traffic offences.

  The copper pine cones were installed alongside bollards in housing areas in the Gorbals

  Created by Gorbals Art Project and artists Cathy Keay and Liz Peden, the original 16 bollards were installed by New Gorbals Housing Association (NGHA) as part of traffic calming work in 1998.

  They were made by Edinburgh firm Powderhall Bronze in Granton, who have now been asked for replacements.

