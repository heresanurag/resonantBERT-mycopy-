title: US officials investigating fatal Mexican Navy ship crash - BBC News
date: '2025-05-18'
section: World
url: http://www.bbc.co.uk/news/articles/cp8ykn0ez3po
content: |-
  Authorities are examining the site in New York to determine how the collision, which killed two, occurred.

  Authorities in New York are investigating the site where a Mexican sailing ship struck the Brooklyn Bridge for clues about how the fatal collision occurred. Two people on board were killed and at least 19 others were injured when the Mexican Navy training ship crashed into the bridge on Saturday night. Police said early investigations showed the ship had lost power before the collision. Video showed the ship's three tall masts crumbling as horrified onlookers watched from the shore. It's not clear how the vessel came to approach the bridge, which authorities confirmed was not damaged by the strike. It had reopened to traffic late on Saturday.

  Police said the Cuauhtémoc ship had a 48.2m (158ft) mast height while the bridge had a 41.1m (135ft) clearance at its centre, according to the New York transport department's website. Responders were able to remove at least 27 people from the ship for treatment, while all 277 personnel on the ship were accounted for, said New York fire authorities. The ship lost all three masts and has been moved to a nearby pier for investigation. The National Transportation Safety Board said it was sending a team to assist in the investigation, which is being coordinated between the US and Mexico governments. Mexico's Navy Secretary Raymundo Pedro Morales Ángeles said in a statement the results of any investigation would be followed with "total transparency and responsibility". The Cuauhtémoc left Acapulco, Mexico, on 6 April on a tour that included stops in New York and Aberdeen, Scotland, for the city's Tall Ships race in July.

