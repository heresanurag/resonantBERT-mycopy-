title: 'Joey Jordison: Slipknot founding drummer dies aged 46 - BBC News'
date: '2021-07-27'
section: US & Canada
url: http://www.bbc.co.uk/news/world-us-canada-57993121
content: |-
  Jordison was a member of the mask-wearing heavy metal band and also performed with the likes of Metallica.

  Jordison also performed in other metal bands, including Murderdolls

  The former drummer of US heavy metal band Slipknot, Joey Jordison, has died at the age of 46.

  In a statement, Jordison's family said he passed away peacefully in his sleep.

  They did not reveal his cause of death, but said his passing had left them with "empty hearts and feelings of indescribable sorrow".

  Jordison was one of Slipknot's original members, founding the band in 1995 along with percussionist Shawn Crahan and bassist Paul Gray.

  The group released a successful self-titled debut album four years later.

  The band went on to sell millions of albums globally, find mainstream US chart success and win a Grammy award.

  Slipknot is best known for a unique aggressive music style and wearing horror-style masks while performing.

  Jordison remained a part of the group until 2013. In later years, he revealed he left after being diagnosed with transverse myelitis, an inflammation of the spinal cord.

  Corey Taylor, Slipknot's lead vocalist, posted black images to his social media accounts after news of his death broke, as did Crahan.

