  His bandmate, drummer Alex Bent, said he was lost for words at the news. "To call him an inspiration would be an understatement," he wrote.

  "Countless hours studying every move behind the kit. I owe so much to Joey Jordison and could never imagine being where I am today without his influence."

  "An absolute legend who changed the game not only for drums, but metal music as a whole," added popular metal YouTuber Nik Nocturnal.

  "46 is no age. RIP," he posted online.
