title: '''You''re not doctor'': Anthony Fauci grilled in hearing - BBC News'
date: '2024-06-04'
section: General
url: http://www.bbc.co.uk/news/videos/c6pp0n849d4o
content: |-
  Marjorie Taylor Greene challenged the US' former top doctor, who also got emotional during his testimony.

  During a congressional hearing on Monday, Dr Anthony Fauci forcefully rejected allegations that he tried to "cover up" the possibility that Covid-19 originated in a lab.

  During his testimony, Dr Fauci became emotional while talking about the threats received by him and his family.

  At a later point, Republican Representative Marjorie Taylor Greene questioned Dr Fauci's medical license, refusing to acknowledge him as "doctor".

  Dr Fauci led the National Institute of Allergy and Infectious Diseases (NIAID) for decades and later joined the White House Coronavirus Task Force in January 2020, before stepping down in 2022.
