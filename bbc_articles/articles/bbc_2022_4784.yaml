title: Moment Hungary PM criticises President Zelensky in winner's speech - BBC News
date: '2022-04-04'
section: General
url: http://www.bbc.co.uk/news/world-europe-60979305
content: |-
  Viktor Orban calls Ukraine's president one of his "opponents" after his election win.

  Watch the moment he used space in his victory speech to criticise Ukraine's Volodymyr Zelensky, calling him one of his "opponents".

  President Zelensky has frequently criticised Orban's policies. Hungary shares a border with Ukraine and has taken in over half a million refugees.
