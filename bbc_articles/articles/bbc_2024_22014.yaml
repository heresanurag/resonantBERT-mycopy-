content: |-
  It follows concerns from neighbours about violence, anti-social behaviour and child exploitation.

  Cambridgeshire Police closed a home in Peterborough after complaints from people living in the area

  Police have banned entry to a house following concerns about violence, anti-social behaviour and child exploitation. The Cambridgeshire force served a full closure order on 28 Angus Court in West Town, Peterborough after gaining permission from a court. It said it had received complaints from the local community and partner agencies about activities at the address. The order, which is in place until 12 December, states the property is closed to all people at all times, with the exception of emergency services and landlords.

  Failure to comply with the order is a criminal offence that could result in a fine, imprisonment for up to three months or both. PC Olivia Ciani said the action followed complaints from people living nearby, including concerns about young people and cars being damaged. She said: "I hope this action gives them the break they need and shows we are listening to their concerns and working hard to make the area a safe and comfortable space for them to live in."

