content: |-
  Freya Anderson is picked in Team GB's swimming squad for the Olympics, alongside the likes of Olympic champions Adam Peaty and Tom Dean.

  This video can not be played To play this video you need to enable JavaScript in your browser. Adam Peaty: Olympic swimming champion on balancing his faith with a fighting mentality

  Adam Peaty will go for a third Olympic 100m breaststroke title in a row after being confirmed in Team GB's swimming squad for the Paris Games. The 29-year-old was among those to secure their places with swims at the British trials earlier this month. Freya Anderson, a relay gold medallist from Tokyo, contracted glandular fever this year and missed automatic qualification but has been picked. Breaststroker James Wilby is another given a coaches' discretionary pick.

  Peaty, who also won mixed relay gold in Tokyo, impressively won the British title earlier this month after difficulties with injury and his mental health since the Tokyo Games. Two-time Olympic champion Tom Dean is also included, while Matt Richards is targeting five medals in Paris after winning the 100m and 200m freestyle events at the British trials. Duncan Scott will be another strong medal hope after winning the 200m individual medley and qualifying in the freestyle races behind Richards. Angharad Evans and Kieran Bird, who won the women's 100m breaststroke and men's 400m freestyle events respectively at the Aquatics GB Championships but missed the qualification time, join them in the squad. Eva Okaro, who took silver - a place ahead of Anderson - in the 100m freestyle and in the 50m freestyle, is picked, as are Jack McMillan and Jacob Whittle. There is no place for Kara Hanlon, the 200m breaststroke British champion, or Amelie Blocksidge - who won two British titles aged 14 at the trials event but missed out on the qualification time. Out of the pool, Hector Pardoe, who won bronze at February's World Championships, Leah Crisp and Toby Robinson will compete in the marathon swimming events.

