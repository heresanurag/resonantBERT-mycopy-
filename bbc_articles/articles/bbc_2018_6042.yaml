title: Israel PM Benjamin Netanyahu unveils 'Iran nuclear archive' - BBC News
date: '2018-05-01'
section: General
url: http://www.bbc.co.uk/news/world-middle-east-43950636
content: |-
  PM Benjamin Netanyahu claims to have unveiled captured proof of Iran's nuclear programme.

  Israeli Prime Minister Benjamin Netanyahu unveils what he claims to be Iran's secret atomic archive, obtained through "a great intelligence achievement".
