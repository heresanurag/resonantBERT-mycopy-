title: Police to host live safety forum after Bournemouth beach stabbing - BBC News
date: '2024-06-01'
section: Dorset
url: http://www.bbc.co.uk/news/articles/ce551jp5zl7o
content: |-
  The session follows a fatal stabbing on Bournemouth beach which police say "shocked" the community.

  Durley Chine Beach was cordoned off to the public

  Police will be answering questions from the public about their safety following a fatal stabbing on a beach. Amie Gray, 34, was one of two women who were attacked on Durley Chine Beach in Bournemouth on 24 May. Dorset Police said the incident had "shocked" the community and it would be hosting a question and answer event to discuss plans to keep locals safe. It will be streamed on Facebook Live on 5 June.

  Amie Gray (left) was stabbed multiple times on the Bournemouth beach

  The session will be hosted by representatives from Dorset Police, Bournemouth, Christchurch and Poole (BCP) Council and the the Police and Crime Commissioner. Members of the public will be encouraged to ask questions about what steps these authorities are taking to prioritise safety across Bournemouth, Christchurch and Poole. Ch Supt Heather Dixey said they would be discussing ways to meet the "increased demands" on services over the summer, as well as plans to increase police visibility. The hour-long question and answer event will begin at 18:00 BST and can be streamed on the Dorset Police, Bournemouth Police, BCP Council and PCC Facebook pages and the Dorset Police YouTube account.

  Flowers were left at the scene of the stabbing

  Poole-based personal trainer, Amie Gray, died at the scene on the beach in Bournemouth after she was stabbed multiple times. A second woman, aged 38 and also from Poole, was taken to hospital with serious stab wounds and has since been discharged. Nasen Saadi, aged 20 and from Croydon, London, has been charged with murder and attempted murder. He is due to appear before Poole Magistrates' Court on Saturday. Ch Supt Dixey said: "Our communities have been understandably shocked by what happened in Bournemouth last weekend and the thoughts of everyone are with the loved ones of Amie Gray and the injured woman. "Our investigation is continuing and we will provide updates as and when we have them."
