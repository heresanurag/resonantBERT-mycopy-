title: Ten dogs found dead in bag pulled from Leeds canal - BBC News
date: '2024-06-09'
section: West Yorkshire
url: http://www.bbc.co.uk/news/articles/cn00kpppydyo
content: |-
  The dogs were found nine months after a near-identical incident in the same place, the RSPCA says.

  The dogs were found in the canal which runs alongside the River Aire, the RSPCA said

  Ten dogs were found dead in a bag pulled from a Leeds canal, nine months after an almost identical incident in the same waterway, the RSPCA has said. The bag, containing two adults and eight puppies, was pulled from the canal next to the River Aire near Holts Crest Way on 20 May. Two adult French bulldogs, six French bulldog puppies and two terrier puppies were found inside the bag, along with a red brick. RSPCA animal rescue officer Hannah Williams said: "It is very suspicious that two identical incidents have occurred in the same area."

  The RSPCA was contacted after a member of the public saw a large Sports Direct bag in the canal and was concerned there was an animal inside. Officers from the charity and a crew from West Yorkshire Fire and Rescue Service retrieved the bag and discovered the animals inside.

  The RSPCA said a brick was also found in the bag containing the dogs

  In August, a family of French bulldogs - two adults and three puppies - which were believed to have been drowned were pulled from the canal, again in a Sports Direct bag, the charity said. Despite an appeal for information from the RSPCA, no one responsible for the incident was traced. Ms Williams said: "It is very suspicious that two identical incidents have occurred in the same area, both families of French bulldogs and both in Sports Direct bags. "It seems highly likely these are linked." She added: "It's awful to think what these poor dogs went through and I'm keen to piece together what happened leading up to finding them. "They didn't appear to be in ill health, which makes us believe they could have been intentionally drowned." The RSPCA has appealed for anyone with information about the incident to contact them. The charity also asked local residents to check any security camera footage from around 20 May to see if it showed anyone walking French bulldogs or carrying a large Sports Direct bag. Follow BBC Yorkshire on Facebook, external, X (formerly known as Twitter), external and Instagram, external. Send your story ideas to yorkslincs.news@bbc.co.uk, external
