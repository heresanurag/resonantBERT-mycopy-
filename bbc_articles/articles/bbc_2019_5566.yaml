title: Gang steals Ayrshire pensioner's safe in 'callous' raid - BBC News
date: '2019-05-04'
section: Glasgow & West Scotland
url: http://www.bbc.co.uk/news/uk-scotland-glasgow-west-48162467
content: |-
  Police investigate separate incidents where thieves forced their way into homes in Kilmarnock and Paisley to steal a safe.

  A 66-year-old man has been robbed of a five-figure sum after a group of men burst into his home and stole a safe.

  Police have described the attack, which took place on Friday at about 14:15 in Shields Road in Galston, near Kilmarnock, as "incredible callous".

  They said they believed the raid was pre-planned by about four or five men.

  It follows the theft of a safe from a family home in Paisley, in which two men forced their way into a house while a couple and a young child were inside.

  Following the theft in Kilmarnock, the men made off in a silver coloured Lexus GS300 car, which had a broken rear windscreen, heading towards the centre of Galston.

  Det Sgt Ewan Bell said: "Although the man was not physically injured, this robbery was a terrifying experience for him to have to go through and he has been left shaken.

  "Nobody should be afraid in their own home and it is vital that we find the men responsible for this incredibly callous and forceful crime."

  Mr Bell said officers were going through CCTV and making door-to-door inquiries in an effort to find the men responsible.

  He added: "We believe that the man we have described may have been in the area in the days leading up to the robbery and that it was a pre-planned, targeted attack."

  One of the men was wearing a grey balaclava while another is described as being 5ft 10in tall, of stocky build with pale skin. He is described as having short cropped hair that was either blond or red and stubble on his face.

  Meanwhile, police are investigating an armed robbery at a family home in Paisley in which a safe was also stolen.

  A 27-year-old woman answered her door to two men in the town's Dee Crescent, at about 11:50 on Friday, when they forced their way in.

  The woman was in the house with her young child and 31-year-old partner. Police said the men managed to get into one of the rooms where they stole the safe.

  One of the suspects dropped a "bladed weapon" after being chased away from the scene by the 31-year-old man.

  Det Con John Sharkey said the two suspects were dressed entirely in black and would have "looked completely out of place".

  He added: "Although thankfully not injured, this was very distressing for both the man and woman involved especially as their young child was also in the house at the time.

  "The man gave chase after the suspects along Dee Crescent and managed to recover one of the weapons used, but the men got away.

  "At this time we do not know why their house was targeted."

  The suspects, who made off on foot towards Fulbar Road, are described as both white, between 30 and 40 years of age and wearing almost identical clothing.
