title: 'CES 2018: Short story dispenser spits out tales - BBC News'
date: '2018-01-09'
section: General
url: http://www.bbc.co.uk/news/technology-42616461
content: |-
  A French publisher aims to print stories and poems on demand in unexpected places.

  A French publisher aims to install machines, which print stories and poems on demand, in unexpected places.

  Short Edition is promoting its dispenser at the CES tech show in Las Vegas.

  The BBC's Chris Foxx challenged the entrepreneur involved about whether the scheme had a hope of success in the age of the smartphone.

