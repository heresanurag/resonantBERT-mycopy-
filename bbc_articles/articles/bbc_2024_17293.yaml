title: 'Bangladesh protests: Videos show police violence during protests - BBC News'
date: '2024-07-30'
section: Asia
url: http://www.bbc.co.uk/news/articles/c720lzejzwpo
content: |-
  A UN expert describes the violence seen in videos analysed by the BBC as "unlawful".

  This video can not be played To play this video you need to enable JavaScript in your browser. Videos of police action during protests show shots fired at protesters

  An image is worth a thousand words – sometimes, it can even stir a nation. In Bangladesh, it was the image of university student Abu Sayeed standing with open arms, stick in hand, facing heavily-armed police alone which many credit as the turning point in the recent widespread protest in the country against quotas in government jobs. Within seconds, as the video shows, the young man was shot at – but still he continues to stand, even as the sounds of more shots ring out. He collapses a few minutes later. The 16 July incident quickly went viral, triggering more students to jump into the agitation against reservations in civil service jobs for the family members of the veterans of the country’s independence war in 1971. What followed were days of unrest, marked by an unprecedented ferocity of violence. Bangladesh security agencies are accused of a disproportionate use of force - firing tear gas, rubber bullets, pellet guns, sound grenades and live rounds - a charge they deny. A curfew was eventually brought in, with a shoot-on-sight order. The highly-respected Bengali daily Prothom Alo and the AFP news agency say more than 200 people were killed in the violence, including several students and three police officers. Official government statistics stand at 147, according to the home minister. But exact details - and more videos showing what was happening on the streets - have been slow to emerge, in part due to the internet shutdown imposed by the government. However, since the broadband was partially restored last week, more visuals of the violence have come to light. In one, substantiated by the BBC’s Verify Team, a young man is trying to pull his injured friend to safety in the Jatrabari area of the capital Dhaka. Within seconds, a plain-clothes officer with a helmet appears to be firing in the direction of the two. After a while, the young man leaves his mortally wounded friend and sprints away to safety. What both this and the video of Abu Sayeed show are “unlawful killings”, Irene Khan, a senior UN expert told the BBC. “Abu Sayeed was not posing any threat to police. But what they do is shoot him point blank, it is a clear display of unjustified, disproportionate violence,” Ms Khan, the Special Rapporteur on the promotion and protection of the right to freedom of opinion and expression, explained.

  Bangladeshi junior minister of information and broadcasting Mohammad Ali Arafat agreed the video of Mr Sayeed being shot appeared “unlawful”. “That was absolutely vivid and clear,” he said. “The guy was standing stretching his hands and chest, very short distance he was shot.” Mr Arafat added the incident would be investigated, saying an independent judicial committee had been formed to investigate. A third video checked and substantiated by the BBC’s Verify Team showed heavily armed troops firing at a group of protesters at a distance in the Mohammadpur area of Dhaka. But a spokesman for Dhaka Metropolitan police, Faruk Hossain, defended their actions, saying police fired only in self-defence. “Police use force to save life and property. Any police officer opened (fire) only when it is questioned of private (self) defence situation,” Mr Hossain said in a WhatsApp message. Officials produced videos of another incident, which appears to show a crowd targeting a police van and later beating up an officer inside the van in the Uttara area of Dhaka. “They [protesters] killed a police officer and hung him upside down in the Jatrabari area of Dhaka,” Mr Arafat alleged. A ruling party activist was also allegedly beaten to death. The violence was “not one-sided - people need to see both sides, to see what happened”, Mr Arafat said, adding security forces were outnumbered and attacked in several places because they were not allowed to open fire.

