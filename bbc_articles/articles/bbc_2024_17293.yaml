  A second video sent by the government showed an injured police officer being carried away by his colleagues. The government alleges supporters of the main opposition Bangladesh Nationalist Party (BNP) and the Jamaat-e-Islami party infiltrated the student protests and launched violent attacks on security forces and set fire to state property. Critics dismiss the claim as an attempt by the governing Awami League to divert attention. Since the protests died down, activists and local media say the government has unleashed a crackdown by arresting more than 9,000 people, including opposition supporters. Student protest leaders have also been rounded up - a move the government said was “for their own safety”. With the government going hard on the demonstrators, experts warn that Bangladesh could witness further unrest. “There is no trust between the state and the people, you can see that. That’s why you are having these protests and the terrible situation,” the UN expert Ms Khan said. Bin Yamin Mollah, one of the coordinators of the student movement, who is in hiding “living in fear” of arrest, echoed her sentiment. “The government has betrayed us,” he told the BBC.
