title: 'War in Ukraine: The woman turning amputees into ''superhumans'' - BBC News'
date: '2024-12-10'
section: Europe
url: http://www.bbc.co.uk/news/articles/c0q0wvyqzwdo
content: |-
  Olga Rudnieva is supporting Ukrainian soldiers who have lost limbs in the front line to return from injury even stronger.

  The woman helping amputees rebuild their lives in war-torn Ukraine

  Rudnieva has provided prostheses and trauma therapy to over 1,000 amputees

  Serhiy Petchenko lost both hands while defending Ukraine from Russian invaders in June 2023. After surviving the bitter months-long battle for the city of Bakhmut, his injury came in a railway incident further from the front line. It left the 42-year-old feeling helpless and in despair. After the amputations, his wife, Anna, had to remain by his side 24/7 for six months. "What helped us survive is our love," says Serhiy. But it's hard to believe he went through such an ordeal when you see him now, standing on the doorstep of a brand-new café, which he is about to open in Lviv, in the west of Ukraine. He smiles widely, his arms - and hands - by his side. Serhiy received two prosthetic hands and full rehabilitation at the Superhumans Center, a private clinic for people with war injuries, located outside the city. At the same time, the couple received the training they needed to open a family business. Serhiy says the centre gave him a chance to return normal life, while learning to live with a new disability.

  Serhiy Petchenko and his wife Anna, outside their new cafe

  At least 50,000 Ukrainians have lost limbs in nearly three years of war according to the Ukrainian Health Ministry - both soldiers and civilians. "Some people have double, triple, quadruple amputations. All these people will need prosthetics, or some will use wheelchairs," says Olga Rudnieva, CEO and co-founder of the Superhumans Center. Many amputations are the result of delays in evacuation from the battlefield. The barrage of incoming fire can be so intense that it may take many hours to get a wounded soldier to hospital. With more than one million people on the front line, Rudnieva says, Ukraine will become "the country of people with disabilities". "We want to normalise disability. OK, that's how the country is going to look," she says, describing the thinking behind her centre. "Most of the people here at the centre shouldn't be alive. The fact that they are is a miracle in itself."

  Olga Rudnieva: 'We want to normalise disability'

  Rudnieva co-founded the centre amid the Russian missile attacks that have rained down on the country since February 2022. Some people called her "crazy" but she went ahead anyway. "If I have an opinion, I'm sharing my opinion. If I know what to do, I just go and do it," she says. Her partners and team raised funds all over the world for high-quality prosthetics and reconstructive surgery. Her passionate presentation, explaining how injuries can be empowering, turned some celebrities into Superhumans supporters, including British adventurer Bear Grylls, Virgin boss Richard Branson, singer Sting and actress Trudie Styler. "We truly believe that you can be empowered by trauma. The trauma can ruin you or it can build your superpower," she says. The Superhumans Center supplements Ukraine's military hospitals and clinics, which are overloaded with the constant flow of wounded soldiers from the 3,200km long front line. Since it opened in April 2023, more than 1,000 patients have received treatment here - both military and civilian, adults and children. Almost 800 of them have received prosthetic limbs. "It's the global headquarters of resilience," says 47-year-old Rudnieva. walking energetically between patients' wheelchairs.
