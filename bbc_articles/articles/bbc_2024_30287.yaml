  More than 1,000 patients have received treatment at the centre

  They are waiting for modern prosthetics or are already practising to use their new limbs. She asks some of the young men around, with double and triple amputations, to show her what they have learnt so far. Ukrainian soldiers use callsigns instead of names, and Rudnieva has one too - "Mum". "They learned to walk with their mothers, and I was the second person they learned how to walk with," she says proudly. At the start of the war, Ukraine was not ready to support so many people with disabilities. "Ukrainian soldiers are less afraid to be killed than to be wounded, because a severe injury means you are going to be disabled for the rest of your life – and the infrastructure is not right, and society is not ready, and the healthcare system is not right," says Rudnieva. A few times a day she visits the rehabilitation room where the "superhumans", as she calls them, are learning to walk again. Among the battle-hardened men is gentle Olena, a bakery manager from the city of Kostiantynivka in eastern Ukraine. She lost her leg in a Russian rocket strike on the way to her mum's birthday party.

  Olena looks forward to going for a carefree stroll in the sunshine, when she gets her artificial leg

  "The first thing I'll do when I have my artificial leg, if the weather is fine, is just go for a walk. Without any rush, without an aim. I'll just take a walk to recall how it feels," she says. At present she uses a leg that belongs to the rehabilitation room, but soon she will have one of her own. Rudnieva remembers Olena's story in detail, and the stories of her other patients. She knows about their wives and husbands, parents and pre-war jobs. "Younger guys bring me their girlfriends and ask my opinion," she says, with a smile. Couples have even come came to her before taking a decision on whether to divorce or not. A severe war injury is a challenge not just for the survivor, but for his or her entire family, and it tests relationships. "We are waiting today for Nazarchyk, Serhiy and Anna's son. He is so active. He will turn it upside down." Rudnieva says that her work has taught her to value life as never before, and also to stop fearing death.

  Once a director of the Olena Pinchuk Foundation, working to halt the spread of HIV/Aids across Ukraine, she was abroad when Russia invaded. For a few months she ran a humanitarian aid hub in Poland, then she returned to Ukraine and founded her life-changing project. She wasn't the only one. Ukrainian civil society quickly rallied round, both to support the war effort - fundraising for drones and vehicles, importing medical equipment or clothing - and to keep society going while the country fought for its life. There are now other private rehabilitation centres, ambulances and taxis that help evacuate people from half-destroyed towns, food services for refugees, and many other initiatives that supplement services provided by the state. "When the full-scale invasion started, I, as a feminist, was very scared. I thought that it's the end of feminism, because war is a very masculine thing," Rudnieva says. But later on she realised that women have taken over many responsibilities as men have gone away to fight, as well as in some cases becoming fighters too. "I think that women proved to be absolutely amazing during this war," says Rudnieva, as some of her words are drowned out by sirens - part of the soundtrack of Ukraine's new life. "I'm really proud to be among Ukrainian women."

