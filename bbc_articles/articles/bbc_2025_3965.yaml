  And the manager may find himself given a statue of St James' Park, near those of Sir Bobby Robson and Alan Shearer, with the latter living through every Wembley moment with the rest of the Toon Army. Howe is the first English manager to win either the FA Cup or League Cup since Harry Redknapp won the FA Cup with Portsmouth in 2008. He is also the first English manager to win this trophy since Steve McClaren at Middlesbrough in 2004. Newcastle looked to have learned every lesson from their loss to Manchester United in this final two years ago. This time they were ready. This time they rose to the occasion. The Toon Army was also ready. The simple message of "Get Into Them" emblazoned on a flag unfurled before kick-off was carried out to the letter. And it was all accompanied by the endless, deafening sound of a support who have craved this day. Newcastle stories were scattered all over Wembley along with the ticker tape of celebration. Burn completed the finest few days of his career when he followed up his first England call-up at 32 with a thunderous header from Kieran Trippier's corner to open the scoring in first-half stoppage time. He took advantage of Liverpool's inexplicable ploy of marking him with a player in Alexis Mac Allister, who is not far off a foot smaller than him - something that carried on in the second half. As the theme from the film Local Hero - a permanent part of the soundtrack at St James' Park - rang out at Wembley amid joyous scenes, it could have been in honour of Blyth-born Burn, the boyhood fan whose name will be etched in Newcastle folklore forever. Isak was touted as Newcastle's potential match-winner before the game. And so it proved as he reacted swiftly and to deadly effect to sweep home Jacob Murphy's knockdown. And then there was Joelinton. The Brazilian was the best player on the pitch, running powerfully and tearing into tackles throughout, usually followed by clenched fists in the direction of Newcastle's support.

