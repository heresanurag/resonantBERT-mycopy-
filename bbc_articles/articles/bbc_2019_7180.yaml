  • None Scott (2007, 2011 and 2019) is only the second player to score in three separate Women's World Cup tournaments for England, after Fara Williams (2007, 2011 and 2015).
  • None Ellen White is the second English player to score in four consecutive World Cup appearances after Gary Lineker between 1986 and 1990. She is the first English player to do so in a single edition.
  • None Lucy Bronze became the first England player to both score and assist a goal in the same Women's World Cup game since Jill Scott against New Zealand in 2011. All five of her goal involvements at the tournament have been in the knockout stages (three goals, two assists).
  • None Norway have been eliminated from the Women's World Cup by England in consecutive tournaments (also 2015 last 16).
