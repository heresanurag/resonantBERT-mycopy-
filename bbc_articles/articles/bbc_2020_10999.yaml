  Sheffield and Rotherham head for the restrictions top tier as the Manchester funding row continues.

  Weeks before we know if restrictions are working - expert

  We've been hearing today about the stricter coronavirus measures coming into place for South Yorkshire and Greater Manchester. But the effects will take two or three weeks to show if top-tier coronavirus restrictions are working in a region, MPs have heard. Dr Clare Gardiner, director general of the Joint Biosecurity Centre (JBC) told two select committees that it would take that long for the data to come through, with part of the lag due to the virus having a 10-day incubation period. She added: "We also are looking really keenly at the number of people being admitted to hospital. "We are particularly concerned and will be looking closely at case rates in the over-60s and watching quite carefully the information about outbreaks in care homes, so looking to protect and being able to protect the vulnerable." When asked about the criteria used to raise an area from tier two to tier three, Dr Gardiner said there were a "basket of indicators" which were looked at with the chief medical officer who would then make recommendations to ministers. These included having a rate of more than 100-150 cases a week per 100,000 people, case rates among the over-60s, a positivity rate in tests of more than 7.5% and the number of people being admitted to hospital.
