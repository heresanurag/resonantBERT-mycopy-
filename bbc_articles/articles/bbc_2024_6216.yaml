content: |-
  Singer-songwriter Raye breaks the record for most Brits in one year with six awards including Best Artist and Best Album.

  Raye's six awards in a huge achievement for artist whose career was held back for years

  It's the most won by any artist ever in a single Brits ceremony. In one night, she has equalled the career total of David Bowie, Michael Jackson and Oasis. It’s a huge achievement, and a massively emotional moment for an artist whose career was held back for years, by a record label that tried to turn her (unwillingly) into a dance artist, even while she wrote genre-spanning hits for other people. Going independent was a risk. But it’s one that paid off. She is winner of Artist, Album, Single and Songwriter of the Year; with further awards for Best R&B and (in slightly anomalous move) Best Newcomer. In the end, the only person who could defeat her was Dua Lipa - who scooped her in the Best Pop category - and Raye herself, as she had a second nomination for Single of the Year. The tears on stage are real. After years of frustrated dreams, she has finally achieved them.
