title: 'Ceredigion: Fire on Cwm Rheidol mountain filmed from above - BBC News'
date: '2025-04-09'
section: General
url: http://www.bbc.co.uk/news/videos/cnv55zle9dno
content: |-
  Firefighters are striving to get a huge blaze under control after it started four days ago.

  Shots from above show the extent of major blaze that has spread across a mountain and is covering an area the size of 4,000 football pitches.

  Wildfires across Wales are beginning to stabilise, firefighters have said, after crews worked for several days to get them under control.

  Many smaller incidents were swiftly extinguished but the blaze at Cwm Rheidol, Ceredigion, was left to burn on Tuesday night as the dark conditions were too dangerous for crews.

  A reinspection was due to take place on Wednesday morning.
