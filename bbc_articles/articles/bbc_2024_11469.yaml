title: Truck hits parked cars in High Wycombe street - BBC News
date: '2024-06-11'
section: General
url: http://www.bbc.co.uk/news/videos/c722l0kljrpo
content: |-
  Footage is shared online of a truck weaving along a street, on to pavements and hitting parked cars.

  Footage has been shared online of a truck being driven on to pavements and into several vehicles.

  Thames Valley Police, external said a man had been arrested after it was called to Mill End Road in High Wycombe on Friday afternoon to reports of damage.

  The 34-year-old, from the Buckinghamshire town, was arrested on suspicion of driving a motor vehicle with alcohol concentration above the prescribed limit, driving without insurance, failing to stop after a road traffic collision and dangerous driving.

  The man has been bailed while the investigation continues.

