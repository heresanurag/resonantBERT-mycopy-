content: |-
  The region moves into Tier 3 from Friday, says Boris Johnson, after talks with local leaders failed.

  Government trying to do two things at once

  The PM’s confirmation that the Greater Manchester area is to go into a tier-three shutdown of much of the hospitality sector at the end of Thursday will be damaging to the local economy but the virus is still spreading rapidly. The surprising thing here was that £60m of support to businesses placed on the table in negotiations with Manchester at midday appears to have been completely withdrawn. The region was trying to establish how much would be needed to fund support for businesses affected. At the press conference, just £22m was mentioned, which works out at £7.85 per Greater Manchester citizen - about half what Liverpool received. Local MPs and politicians said Manchester was being “punished”. The problem for the government here is that it is trying to do two things at once. It is trying to accommodate the fact that some jobs are gone forever and those people, it believes, should get new ones. That was the rationale behind closing the furlough scheme. But since then the health crisis has returned with a vengeance, and businesses are being obliged to be shut, as more were in March. Mr Burnham says when London was driving national infection levels high, the whole nation was shut down, and a £5bn a month furlough scheme was launched. Now the north is leading infections, only its city regions are being compulsorily shut, and the jobs support is significantly less generous. During the negotiations, it is said that Greater Manchester was told there was no longer the money. The government is trying to balance lives, livelihoods and the limits of public spending on a regional basis for economic reasons. But it is far from certain that a national lockdown will be avoided.
