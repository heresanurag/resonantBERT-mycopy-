content: |-
  Rapman on being discovered by one of the richest artists in music and becoming a film director.

  UK music artist and film director Rapman is well-known for his short films, narrated in the form of a rap.

  His Shiro's Story trilogy has had more than 20 million views online and led to him signing a deal with one of the richest artists in the music industry, Jay-Z.

  Rapman's latest project, Blue Story, is a London-based film that is out in cinemas on 22 November.

  He spoke to the BBC about Blue Story and his journey to becoming a film director.
