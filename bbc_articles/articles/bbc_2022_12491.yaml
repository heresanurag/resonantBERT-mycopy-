id: bbc_2022_12491
title: Attempted murder arrest after police cars rammed by tractor - BBC News
date: '2022-09-24'
section: Northern Ireland
url: http://www.bbc.co.uk/news/uk-northern-ireland-63021368
content: |-
  Police say the incident, involving a tractor, was reckless and cowardly and officers could have been killed.

  A man has been arrested on suspicion of attempted murder after three police cars were rammed by a tractor in Fivemiletown, County Tyrone.

  Police investigating a report of a drink driver attended an address in Tattenabuddagh Lane just after midnight on Saturday.

  A man then tried to evade police in a tractor and rammed three police cars, causing substantial damage.

  No officers were injured in the incident.

  A man, aged 25, was later arrested on suspicion of attempted murder and remains in custody.

  Det Insp Snoddy said the incident was reckless and cowardly and that if the officers had not taken evasive action they would have been seriously injured or killed.

  "This incident has left three of our police vehicles off the road which affects our service delivery in the Mid Ulster area," the officer added.

  "There is also the impact in terms of our officers' welfare, as well as the cost of repairs to the vehicle."
