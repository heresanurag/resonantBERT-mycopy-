title: 'Iran explosion: Moment driver sees huge blast rip through port - BBC News'
date: '2025-05-27'
section: General
url: http://www.bbc.co.uk/news/videos/clywpwr8y71o
content: |-
  At least four people have been killed and 500 more injured in Bandar Abbas.

  Footage filmed by a driver, and verified by the BBC, shows the moment a massive blast shook the Shahid Rajaee port on Saturday morning, near the southern Iranian city of Bandar Abbas.

  At least four people have been killed and 500 more injured in the explosion, according to state media.

  The explosion blew out the windows of nearby office buildings and caused the roof of at least one building to collapse.

  According to reports, witnesses have said the explosion occurred after a fire broke out and spread to unsealed containers storing "flammable materials", most probably, chemicals.

