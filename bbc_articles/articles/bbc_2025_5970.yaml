title: E-bike riders caught on camera using police drone - BBC News
date: '2025-04-10'
section: General
url: http://www.bbc.co.uk/news/videos/c33zz00kpzxo
content: |-
  Police in Newport use a surveillance drone to spot a group of e-bikers on city streets.

  Police drones have been used to track and catch nuisance or illegal e-bike riders in what could become a tactic used elsewhere in the UK.

  A group of e-bikers were tracked through the Alway and Ringland areas of Newport in March using an "eye-in-the-sky" drone, helping officers to find out where a bike was being kept.

  Gwent Police's Supt Jason White told city councillors the drone was deployed "to really good effect" and is safer than pursuits.

  Officers hear "time and time again" about the use of more powerful e-bikes, he added.
