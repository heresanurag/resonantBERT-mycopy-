title: 'World Cup 2018: England fans react to 6-1 win over Panama - BBC News'
date: '2018-06-24'
section: England
url: http://www.bbc.co.uk/news/uk-england-44593129
content: |-
  Jubilant supporters celebrate as England record their biggest win ever in the World Cup finals.

  Smile when you're winning... fans react at Croydon Box Park in London

  England fans have been reacting with glee and surprise as the national team thrashed Panama 6-1 in the World Cup.

  Jubilant supporters celebrated up and down the country as England recorded their biggest win ever in the competition to secure a place in the last 16.

  Harry Kane played a captain's role once more with a hat-trick to become the tournament's leading scorer.

  John Stones also scored two and Jesse Lingard scored England's third goal.

  Yes really, England scored six goals

  Hundreds also gathered at Brighton Beach to watch Harry Kane and the rest of the team triumph

  Dogs dressed for the part in Norfolk... maybe their dribbling skills could be used

  Spectators were well and truly awake at Dreamland theme park in Margate, Kent

  In Cornwall, some fans on Fistral beach looked like they were doing their best shirtless Poldark impressions
