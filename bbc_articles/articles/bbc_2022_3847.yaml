title: 'Spring Statement 2022: Sunak on Ukraine war effect on UK economy - BBC News'
date: '2022-03-23'
section: General
url: http://www.bbc.co.uk/news/uk-politics-60838860
content: |-
  The chancellor says sanctions imposed on Russia are "of unprecedented scale and scope”.

  Britain has imposed “sanctions of unprecedented scale and scope” after Russia invaded Ukraine, the UK chancellor has said.

  Opening his Spring Statement, Rishi Sunak said these actions were “not cost-free”, and posed a risk to the recovery of the UK and international economies.
