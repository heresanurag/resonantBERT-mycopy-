  About a dozen advocates and Democratic lawmakers had their own press conference outside the US Capitol on Tuesday, criticising Mr Biden's decision. Pramila Jayapal, the chair of the Congressional Progressive Caucus, said she was "profoundly disappointed" by the executive action and called it a "step in the wrong direction". Others in Mr Biden's party disagreed - including Ruben Gallego, an Arizona congressman, who said there was still "more work to do". The campaign for Donald Trump, Mr Biden's Republican challenger for the presidency, earlier argued that the order “is for amnesty, not border security”. In Tuesday's statement after the president's announcement, the White House said that the new order "will be in effect when high levels of encounters at the southern border exceed our ability to deliver timely consequences, as is the case today." Among the actions announced on Tuesday were the use of a 1952 law that allows access to the American asylum system to be restricted. The law, known as 212(f), allows a US president to "suspend the entry" of foreigners if their arrival is "detrimental to the interests" of the country. The same regulation was used by the Trump administration to ban immigration and travel from several predominantly Muslim countries and to bar migrants from asylum if they were apprehended crossing into the US illegally, provoking accusations of racism. "While there’s no question the US needs to better address challenges at the border, the use of 212(f) authority is concerning," Ms Murray said.

