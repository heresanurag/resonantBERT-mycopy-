  Ms Jayapal told the BBC she was concerned that Mr Biden's actions could spark legal battles. ''When Donald Trump did this, the ACLU (American Civil Liberties Union) filed a lawsuit and it was declared unconstitutional, she said. "This is a different executive order. So things may be different." But, she added, "we are at serious risk of being in violation of our own laws". The Biden administration plans to defend the new policies in court from any challenges it could face from activists or Republican-led states. It has said the restrictions will come into effect when the seven-day average for daily crossings hits 2,500. "These actions will be in effect when the southern border is overwhelmed, and they will make it easier for immigration officers to quickly remove individuals who do not have a legal basis to remain," the White House said. The border will reopen to asylum seekers only when the average figure holds at 1,500 over a seven-day period - and it will then reopen to migrants two weeks later. Other measures are aimed at quickly resolving immigration cases in court, and expedited removals for those found to have no legal basis to remain in the US. Asylum processing at ports of entry will continue under the order. About 1,500 asylum seekers go through the process at official crossings each day, mostly after setting up appointments using a Customs and Border Protection (CBP) app known as CBP One.

  Guerline Jozef, executive director of Haitian Bridge Alliance - which works with Haitian migrants at the border - called the announcement "a direct assault on the fundamental human right to seek asylum". "This Trump-era policy will leave thousands of vulnerable individuals, including families, children, and those fleeing violence and persecution, without the protection and refuge they need," Ms Jozef said. Speaking to reporters on Tuesday, senior administration officials pushed back on comparisons with Trump-era policies, saying the new rules would only apply during periods of increased arrivals. They said exemptions would be made for unaccompanied children and those being trafficked. Republicans, meanwhile, have criticised the Biden border plan as an election-year ruse - and have argued for tougher action. They argue that US laws already exist to prevent illegal immigration but are not being duly enforced by the Democratic president. The officials and the White House have sought to lay the blame on Republicans who stood in the way of a bipartisan border security deal that failed earlier this year. "Republicans in Congress chose to put partisan politics ahead of our national security," the White House said.

  Recently released statistics from CBP show that about 179,000 migrant "encounters" were recorded in April. In December, by comparison, the figure spiked to 302,000 - a historic high. Officials in the US and Mexico have said that increased enforcement by Mexican authorities is largely responsible. The decline in migrant crossings at the US border comes at a politically fraught time for President Biden. Polls show that immigration is a primary electoral concern for many voters in the presidential election in November. A Gallup poll at the end of April suggested that 27% of Americans view immigration as the most important issue facing the country, topping the economy and inflation. A separate poll conducted in March by the Associated Press and NORC Center for Public Affairs Research indicated that two-thirds of Americans now disapprove of Mr Biden's handling of the border, including about 40% of Democrat voters.
