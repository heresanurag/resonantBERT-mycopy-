id: bbc_2024_2914
title: Thousands rally in support of Brazil's ex-leader Jair Bolsonaro - BBC News
date: '2024-02-25'
section: General
url: http://www.bbc.co.uk/news/world-latin-america-68399370
content: |-
  Brazil's former president greets supporters in Sao Paulo as an investigation continues into the 2023 storming of Congress.

  Tens of thousands of people gathered on Sao Paulo's iconic Paulista Avenue to show support to Brazil's ex-president Jair Bolsonaro, as the investigation continues into claims he plotted a coup with allies to remain in power after his failed 2022 re-election bid.

  Mr Bolsonao, dressed in the green and yellow colours of the national flag, addressed the crowds and put his hand on his chest whilst singing the national anthem.

  Police accuse him of having led a failed plot to remain in power after losing the election to his left-wing rival, Luiz Inácio Lula da Silva.

  Mr Bolsonaro says the operation is politically motivated.
