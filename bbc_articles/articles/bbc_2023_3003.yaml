title: Culcheth murder inquiry started after girl stabbed in park - BBC News
date: '2023-02-12'
section: Manchester
url: http://www.bbc.co.uk/news/uk-64614832
content: |-
  Brianna Ghey, 16, was found with multiple stab wounds in a park in Warrington on Saturday.

  Brianna Ghey was found injured in Linear Park in Culcheth and died at the scene

  Police have launched a murder investigation following the death of a teenage girl in a park in Warrington.

  Brianna Ghey, 16, was found with multiple stab wounds on a path in Linear Park, Culcheth at about 15:15 GMT on Saturday and died at the scene.

  Cheshire Police Det Ch Supt Mike Evans described it as "a truly awful attack".

  He said police were especially keen to speak to two people seen in the park, described as a white man and woman, in their late teens or early 20s.

  He said they both had dark curly hair, adding: "The man was wearing a longish dark hooded coat and the woman had a distinctive red or purple black checked blanket-style coat and a long flowing skirt, dress or trousers."

  He said the pair may hold vital information to assist the investigation and appealed for them to come forward.

  "We are also keen to speak to anyone who was in the park from around 13:30 until 16:00 GMT yesterday or anyone who may have seen Brianna in the hours leading up to her death," he added.

  Anyone in the park between 13:30 and 16:00 GMT is asked to contact Cheshire Police

  "Brianna was a 16-year-old, well-loved girl who met a tragic end yesterday," Det Ch Supt Evans said.

  Police said a post-mortem examination was taking place to establish the cause of death and that officers were supporting Brianna's family, who are from Birchwood.

  Det Ch Supt Evans said searches were continuing to trace the murder weapon and establish a motive for the attack.

  Investigators have cordoned off a section of the park where she was found by members of the public.

  Additional officers are patrolling the area, which is a well-known dog walking spot.

  "I would like to reassure the local community that we are working hard to find those responsible for Brianna's death and we have extra officers in and around Culcheth supporting the investigation," Det Ch Supt Evans said.

