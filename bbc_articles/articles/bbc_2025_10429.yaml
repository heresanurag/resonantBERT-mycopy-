title: Girl left 'in agony' after 'substandard surgery' in Cambridge - BBC News
date: '2025-05-03'
section: Cambridgeshire
url: http://www.bbc.co.uk/news/articles/cz79zzg3w7po
content: |-
  The 12-year-old's mother says surgery by a now-suspended doctor left her unable to leave the house.

  A girl with cerebral palsy was left "in agony and couldn't leave the house" after an operation by a now-suspended surgeon, her mother said. Tammy, 12, is among the first to receive findings from an independent investigation into treatment by paediatric specialist Kuldeep Stohr at Addenbrooke's Hospital in Cambridge. Her family's lawyers said they had received a written admission of substandard surgery after screws on her hip joints, meant to improve her mobility, were inserted in the wrong place and did not properly connect to the bone. Cambridge University Hospitals NHS Foundation Trust (CUH) said nearly 800 cases were being reviewed and it wanted to "apologise unreservedly again" to patients.

  In a statement on its website, it added it would take at least a year to complete all cases but that "we will be contacting patients and families during this time once the review of their care is complete". Ms Stohr previously said she was fully co-operating with an investigation after a review found several operations fell "below expected standards".

  Her mother said Tammy was in awful pain after the operation

  Tammy's mother Lynn said: "When Tammy had the operation in 2021, she was left in awful pain. "She was in agony and wouldn't leave the house. "Obviously we are pleased to have a written admission from the trust that Tammy's care fell below standard, but we are four years after that operation now." The family's solicitor Elizabeth Maliakal said: "Tammy's family have been issued a written apology, which has come with an admission of substandard surgery, causing pain and harm, which is of course significant." But she added the admission was "very brief, lacks detail and is unclear" about what was found in the investigation.

  Mother Lynn (left) said she raised concerns "on many occasions" about her daughter's discomfort

  A CUH spokesperson said: "As part of the external clinical review process, patients and families are being invited for a meeting with a senior clinician, either in person or online. "This is to go through the details of the review findings for their case and to provide an opportunity to ask questions and clarify details." The trust has also commissioned an investigation into what was known and when, as it emerged that concerns had been raised as early as 2015. It said this was expected to be completed by the end of July 2025.

  Kuldeep Stohr is being investigated in relation to 700 planned and 100 emergency operations

