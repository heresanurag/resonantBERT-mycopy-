title: 'Tokyo Olympics: Gold medals for Team GB''s Adam Peaty, Tom Daley and Matty
  Lee, and Tom Pidcock - BBC Sport'
date: '2021-07-26'
section: Olympics
url: http://www.bbc.co.uk/sport/olympics/57968233
content: |-
  It's day three of the Tokyo Olympics, where the gold rush has started for Team GB.

  This video can not be played To play this video you need to enable JavaScript in your browser. Peaty dominates to win gold, Alex Yee earns triathlon silver and rugby sevens get underway

  Tom Daley finally ended his wait for an Olympic title with synchronised 10m platform gold alongside Matty Lee, as Adam Peaty and Tom Pidcock were also crowned Olympic champions on day three in Tokyo. Britain's Daley and Lee edged out China for victory, 13 years after 27-year-old Daley - a two-time bronze medallist - made his Olympic debut in Beijing. In the early hours of day three, swimmer Peaty had become the first British swimmer to defend an Olympic title with his dominant victory in the 100m breaststroke. Less than half an hour after Daley and Lee's gold, cyclist Pidcock added a third to Team GB's tally, dominating the men's cross-country mountain biking. Earlier, Britain's Alex Yee cemented his position as the new star of British triathlon with a silver medal, as Jonny Brownlee placed fifth. In taekwondo, Lauren Williams is through to the final of the women's -67kg, guaranteeing herself a medal. She will take on Croatia's Matea Jelic at 13:30 BST. Elsewhere, Japan's Momiji Nishiya won women's street skateboarding gold at just 13 years old. Olympic organisers say a tropical storm will hit Tokyo tomorrow, but it is not expected to cause much disruption to the Games. Rowing and archery events have already been moved because of the anticipated strong winds, but there are no plans to make any other changes to the schedule unless the forecast alters.

  Here's some of what else you've missed on Monday morning:
  • None Britain's men began their rugby sevens campaign with wins over Canada and Japan.
  • None Duncan Scott won his 200m freestyle semi-final while Kathleen Dawson qualified for the women's 100m backstroke final.
  • None In badminton, Marcus Ellis and Lauren Smith won their mixed doubles tie against Thailand to top their group, but Ben Lane and Sean Vendy lost to Chinese Taipei in the men's doubles.
  • None Britain's sole fencer Marcus Mepstead lost to Egypt's Mohamed Hamza in the first round of the men's foil.
  • None Australian swimmer Ariarne Titmus beat American great Katie Ledecky to gold in the women's 400m freestyle final.
  • None Japan's Naomi Osaka cruised into the third round of the tennis women's singles.

