  Alistair and Jonny Brownlee have long been British triathlon's golden boys, but in winning Olympic silver, Yee - who previously trained with the brothers - well and truly stepped up to take over the baton. Competing in just his eighth race at this level, he led for much of the 10km run before Norway's Kristian Blummenfelt produced a stunning breakaway in 27C heat and high humidity to win gold. Yee finished 11 seconds behind, with New Zealand's Hayden Wilde taking bronze. "I am just a normal guy from south-east London - dreams really do come true," Yee told BBC Sport. The event - which was moved to the early hours in Tokyo to avoid the worst of the heat - had to be restarted after a boat blocked around half of the athletes as they entered the water.

