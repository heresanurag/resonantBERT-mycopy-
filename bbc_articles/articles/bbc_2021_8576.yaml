  Daley was just 11 when he told the BBC: "I want to get to the Olympics and win a gold medal." Sixteen years on, that dream is now a reality. Daley and Lee - who, at four years his diving partner's junior, was making his Olympic debut - performed impeccably throughout the synchronised 10m platform event, moving top of the leaderboard after four dives. They finished with a total score of 471.81, leaving China's Cao Yuan and Chen Aisen with too much to do and they took silver with a tally of 470.58. "We are the ones to beat, and they've got to come and get us. I still honestly can't believe what's happening. I didn't even think I was going to get here in the first place, but here we are," said Daley. Lee added: "It's crazy, I don't understand what just happened."

  This video can not be played To play this video you need to enable JavaScript in your browser.

  Victory was all but secured for Peaty before he even entered the water, given he has not lost over 100m for more than seven years, including his first gold in Rio five years ago. Though he was unable to break his own world record of 56.88 seconds in Tokyo, he still finished more than six tenths of a second quicker than the Netherlands' silver medallist Arno Kamminga, with Italy's Nicolo Martinenghi taking bronze. Peaty touched the wall in 57.37, the fifth fastest time in history, but compatriot James Wilby could not join him on the podium, finishing in fifth place. Peaty has won the 100m breaststroke at the last three World Championships, has broken the world record five times and is the only man to have ever swam it in under 57 seconds. "I haven't felt this good since 2016. It just means the world to me," said the 26-year-old. "I thought I had the best preparation in my life but then you throw in morning finals, and you throw all that out the window. "That's really what it takes to be an athlete. It's not who's the best all year round, it's the best person on the day who's the most adaptable and really who wants it more."

