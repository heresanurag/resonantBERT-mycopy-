  Cyclist Pidcock had prepared for Tokyo's brutal temperatures by training in a heated tent at home and it paid off. He finished 20 seconds clear of the rest of the field in Izu, with Swiss world number one Mathias Flueckiger taking silver and David Valero of Spain winning bronze, to take Britain's first gold in mountain biking. The 21-year-old, who has world titles in cyclo-cross, road and mountain bike events at under-23 level, had surgery on a broken collarbone at the start of June but returned to training just six days later. When asked how it felt to win gold, Pidcock told Eurosport: "Not real really. It's pretty crazy that I became an Olympian and I was trying to tell myself at the start of the race it's special just to be here."

