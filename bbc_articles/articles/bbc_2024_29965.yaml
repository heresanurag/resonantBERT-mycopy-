title: Anger at 'disrespectful' warning labels on Glasgow gravestones - BBC News
date: '2024-11-08'
section: Glasgow & West Scotland
url: http://www.bbc.co.uk/news/articles/c2dljljwkzyo
content: |-
  The city council said it was a way to reach families where it was uncertain who had responsibility for the memorial.

  The stickers covering up names was called 'disgusting' by visitors

  Visitors to cemeteries in Glasgow have criticised a "disgusting" decision by the city council to place large stickers on gravestones. The warning labels - which in some cases have been placed directly over the deceased's name - state that the stone has been inspected and failed safety standards. However, the labels have sparked anger on social media where people accused the local authority of being disrespectful towards the dead. Glasgow City Council justified the stickers as a way to "reach out to families" where it was uncertain who had responsibility for maintaining the memorial.

  A number of graves across the city have had the stickers applied

  Sami Tollett was visiting her father's resting place at Riddrie Park Cemetery when she noticed a number of graves around it had the prominent stickers displayed. She said: "It’s disgusting and morally wrong to deface somebody’s resting place. "It’s actually sad to see. It used to be a lovely place, well kept and maintained, but now it’s an eyesore. "It's even worse with the big stickers all over the headstones."

  Glasgow City Council said the stickers helped them contact families

  Gravestones are looked after privately, external, rather than by the city council itself, with families usually hiring a stone mason to work on them. In May 2015 an eight-year-old boy, Ciaran Williamson, died when a headstone in Cardonald's Craigton Cemetery fell on him. A fatal accident inquiry into his death heard that up to 900 headstones at Craigton were deemed unsafe in the days after the tragedy. Graveyard visitor Gillian Sooter told BBC Scotland News she was upset to see several stickers while at the city's Lambhill cemetery. She said many of the labels were "covering up the people's names". She added: "It looks terrible to think your loved ones are lying here and on their stones are a big white sticker."

  Visitors to Riddrie Park Cemetery discovered the stickers had been applied recently

  Glasgow City Council said safety in cemeteries was an "absolute priority" and the stickers were used because it was "very challenging" to track down owners of some graves. A spokesperson said: “Regular inspections of headstones is a statutory obligation for the council but the maintenance and upkeep of any memorial is a matter for the owner. “However, as owners themselves pass on, identifying a person to take responsibility for headstone maintenance can become very challenging. “Applying these notices to headstones is an effective way to reach out to families and they have helped us to make contact with people who have an interest in undertaking necessary repairs." The spokesman said that where headstones were considered a safety risk, they could be laid flat to avoid accidents.
