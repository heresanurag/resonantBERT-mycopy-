title: Dejected Scotland squad gets jolly farewell from oompah band - BBC News
date: '2024-07-01'
section: General
url: http://www.bbc.co.uk/news/videos/c5111zp7egwo
content: |-
  A sombre Steve Clarke and his men were played out to a series of upbeat numbers following their Euros exit.

  A sombre Steve Clarke and his men were played out of their hotel in Germany to a series of jolly numbers from an oompah band following Scotland's exit from the Euros.

  The squad were defeated by a dramatic 100th minute winner from Hungary on Sunday night, securing their departure from the tournament.

  Perhaps in an attempt to alleviate their bitter disappointment, a Bavarian band treated the players to an upbeat farewell - including a rendition of Scotland the Brave.

  The team are due to arrive back in Scotland later.
