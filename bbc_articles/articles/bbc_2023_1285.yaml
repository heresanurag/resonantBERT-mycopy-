content: |-
  The prince says he took psychedelics 'like medicine' as a form of therapy to cope with royal life.

  Many of you have been getting in touch with your opinions on the claims Prince Harry makes in his memoir.

  Here are more of the responses we've received:

  Quote Message: The Royal family should not say anything publicly but the family need to get together and communicate with each other behind closed doors." from Sarah, Royal Wootton Bassett The Royal family should not say anything publicly but the family need to get together and communicate with each other behind closed doors."

  Quote Message: Harry is a private citizen and is entitled to complain or explain as much as he likes. What husband would continue to sit in silence as him and his wife are constantly critiqued in the media?" from Buddy Anderson, Market Harborough Harry is a private citizen and is entitled to complain or explain as much as he likes. What husband would continue to sit in silence as him and his wife are constantly critiqued in the media?"

  Quote Message: Harry needs to make his mind up what he wants. He's lucky to be the 'spare' as it allowed him the freedom he wanted." from Sarah Harry needs to make his mind up what he wants. He's lucky to be the 'spare' as it allowed him the freedom he wanted."

  Quote Message: If you wanted to get away from press intrusion this is a strange way to go about things, not to mention numerous TV interviews? No time for him anymore at all." from Fiona Weir, London If you wanted to get away from press intrusion this is a strange way to go about things, not to mention numerous TV interviews? No time for him anymore at all."

  Quote Message: All families have disagreements but we don’t all write books about it. We get over it and move on and so should he." from Judi Machin All families have disagreements but we don’t all write books about it. We get over it and move on and so should he."
