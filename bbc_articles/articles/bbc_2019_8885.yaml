title: 'BBC Click 1000: Interactive Special'
date: '2019-07-06'
section: General
url: http://bbc.co.uk/click1000
content: |-
  Take control of this special 1000th episode of BBC Click - a first-of-its-kind interactive experiment that puts you in the director’s chair as you decide what stories to watch and as the show changes to suit you.

  Please use your device horizontally in order to use this experience!
