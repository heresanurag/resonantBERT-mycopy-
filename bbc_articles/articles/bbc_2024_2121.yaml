title: Black teenager stopped by Met Police 6 times in 5 months - BBC News
date: '2024-02-06'
section: London
url: http://www.bbc.co.uk/news/uk-england-london-68219504
content: |-
  Eight Met officers are under investigation by the police watchdog.

  The IOPC director said it was investigating "concerning allegations"

  Eight Metropolitan Police officers are under investigation after a 16-year-old boy was stopped and searched six times in five months.

  The boy, who is black, was stopped and searched by police between January and May 2023 across Tottenham and Stratford.

  No further action was taken each time.

  Commander Nick John, from the Met's Directorate of Professional Standards, said the force was fully co-operating with the investigation.

  He said: "Given the seriousness of these allegations it is important that we understand exactly what has happened in each of these interactions.

  "We want to increase trust in our communities, both in how we tackle crime and the way in which we interact with the public. Any complaint received by the Met is taken extremely seriously."

  Haringey Independent Stop and Search Monitoring Group complained to the force on behalf of the child and his mother in April and June 2023.

  The Independent Office for Police Conduct (IOPC) launched its investigation after it received a mandatory referral from the Met in September 2023.

  The complaints include allegations that there were insufficient grounds for the stop and searches, racial profiling by the officers, force was unreasonably used, they failed to consider the boy's welfare and policing procedures were not consistently followed.

  Four of the searches involved Territorial Support Group (TSG) officers while the other two incidents involved local borough command officers.

  During the incidents, the child was told he was being searched on suspicion of drugs or theft, and reportedly matched descriptions of people carrying out robberies and knife crime in the area, the IOPC said.

  It has reviewed body worn video footage from the officers and written records made at the time of the grounds for each stop and search.

  In five of the six incidents, the IOPC said it identified evidence indicating potential breaches of the police standards of professional behaviour.

  As a result, seven MPS officers are under investigation for potential gross misconduct and an eighth officer is being investigated for potential misconduct, the IOPC said.

  Charmaine Arbouin, IOPC director, said: "The concerning allegations raised in the complaint - which include racial profiling of a child and insufficient grounds for stopping and searching them six times in five months - are issues that we know disproportionately affect Black and other minority ethnic communities and erode public confidence in policing.

  "It's therefore essential that we carry out an investigation - independent of the police - to look at each of these incidents and the actions and decision-making of the officers involved.

  "We will continue to keep those involved updated as our investigation progresses."

  The IOPC said that an investigation does not necessarily mean that disciplinary proceedings will follow.

