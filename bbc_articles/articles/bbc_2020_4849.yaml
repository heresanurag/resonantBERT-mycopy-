content: |-
  Health Secretary Jeane Freeman defends the Scottish government's recruitment of more contact tracers.

  The Scottish Government say 600 of the 2000 staff required will come from the NHS Image caption: The Scottish Government say 600 of the 2000 staff required will come from the NHS

  A testing and tracing system to help suppress coronavirus is to be trialled in three health boards from Monday, the Scottish government has said.

  The data gathering technology will be piloted in NHS Fife, NHS Lanarkshire and NHS Highland.

  Earlier this month, the government said testing and tracing would be "key" to the battle against the virus.

  It has been revealed that despite 8,000 applications for 2,000 jobs as contact tracers, no-one has yet been hired.

  But Health Secretary Jeane Freeman did say that 600 additional staff from the NHS are ready to start and added that she had every confidence that all the posts would be filled by the end of May.
