  Police say all five people on board the bus "escaped serious injury" in the crash near Grosmont

  Five rescued as bus plunges 30ft off bridge

  The bus crashed off the road in Grosmont, North Yorkshire

  Five people have been rescued after a bus crashed off a bridge and plunged 30ft into a river. The single decker vehicle came off the road in Grosmont, near Whitby in North Yorkshire, at about 13:40 BST. North Yorkshire Police said five people who were on the bus had "escaped serious injury". Photos of the crash shared by Scarborough and Ryedale Mountain Rescue, external appeared to show the bus suspended over what police described as a shallow river.

  A road closure was put in place and motorists and pedestrians have been advised to avoid the area. A police spokesperson said no other vehicles were thought to have been involved in the incident. Structural engineers have been called to inspect the bridge following the crash, the force added. Listen to highlights from North Yorkshire on BBC Sounds, catch up with the latest episode of Look North or tell us a story you think we should be covering here, external.
