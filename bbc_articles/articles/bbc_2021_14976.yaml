content: |-
  Campaigners say London could see its worst year for youth killings for more than a decade.

  Campaigners say this year could reach the worst for youth killings in London in over a decade. There have been 27 teenage deaths by violent crime this year in the capital. The previous peak was in 2008.

  The 26th victim this year was 18-year-old Kamran Khalid. The BBC's Vinnie O'Dowd spent time with Kamran’s family at the time of his funeral.
