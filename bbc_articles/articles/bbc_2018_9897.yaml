title: 'Stolen plane: Footage shows aerial stunts - BBC News'
date: '2018-08-11'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-45155399
content: |-
  The man who stole an empty US passenger plane attempted aerial manoeuvres before it later crashed.

  After an empty passenger plane was stolen from a Seattle airport, video has emerged of its pilot doing aerial manoeuvres.

  Two F15 fighter jets pursued the plane, which was taken by an airline employee.

  The man is not believed to have survived when it later crashed.

  This video has been removed for rights reasons.
