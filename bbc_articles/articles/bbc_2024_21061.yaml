title: 'Walthamstow counter-protest: ''We won''t be pushed around'' - BBC News'
date: '2024-08-08'
section: London
url: http://www.bbc.co.uk/news/articles/c623g0xnrero
content: |-
  Parents with children, those born locally standing with people from abroad join hundreds turning out.

  'We're here to ensure no-one ever pushes us around'

  They came to east London in their hundreds, preaching a message of peace. Under grey skies, people chose to chant, clap and come together to stand up for those feeling fearful following events across the UK during the past week. Waltham Forest is a borough of sanctuary, meaning it welcomes refugees. That was reflected in the huge diversity of attendees: parents alongside children, those born in London standing with people from abroad - but all united by wanting to show solidarity with this community.
  • None LIVE: 'Successful night,' Met Police chief says after mostly peaceful rallies across England

  More than 1,000 people stood shoulder-to-shoulder on Hoe Street as all of the shops shut up early for the evening. It was almost as if the people of Walthamstow were hanging out of their windows to get a glimpse of the crowds below, seemingly wanting to get the best vantage point. "It makes me feel very, very welcome," Shanika Davids says. "I am so proud of everybody here today. I feel very much loved by this community."

  Another woman of colour told us her own children hadn't felt comfortable leaving the house over fears for their safety. Many held signs reading “Hate not welcome here”, “Stop the far-right” and “I welcome refugees”. "We are here to support diversity and show strength against bullies," says Frank Merritt. "We are here as a community to ensure that no-one ever pushes us around."

  Frank and Clara said they wanted to show their support for immigrants

  Despite the hundreds of police officers on the streets and some boarded up shop fronts, there were no signs of violent clashes. For hours, a woman with a portable sound system was leading the call and response, saying: “Whose streets?” The crowd of counter-protesters responding: “Our streets!” “When the fascists return,” another man on a megaphone cried out. “We fight back”, the masses replied.

  Police were out in force throughout Wednesday evening

  Nazar, a 20-year-old nurse, says none of her fellow nurses are English. She said she wanted to come out "to show her support". "Although I come from a family which was not born here, I was born here," she says. "I don't want to be targeted just because my family came here." "We obviously look scary - that's why they didn't show up," adds Clara Serra Lopez. "I'm here because I'm a European immigrant, which comes with a lot of privilege. "It's important for white British and white immigrants to show up for the ones that might be really fearful to come here. "I want them to know there's more of us than of than of them. "England wouldn't be anything without immigration."

