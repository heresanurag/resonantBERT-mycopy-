  Quiz: Which Chelsea outcast should your club sign?

  It is no secret that Chelsea need to reduce their squad size before the summer transfer window shuts. The Blues have made 11 signings so far this summer, swelling their senior squad to more than 40 players. Boss Enzo Maresca said there will be "problems" if he can't cut numbers before deadline day. Take our quiz to find out which of their unwanted players would be a good fit for your club.
