  Mohammed Mahmoud, who made headlines when he stood guard over a suspect after that attack in north London, condemned the shootings and called for greater action against far-right extremism.

  Speaking at a vigil held at East London Mosque, Imam Mahmoud criticised those who perpetuated a "narrative of otherness" towards Muslims.

  Akeela Ahmed, who belongs to a group of Muslim representatives which advises the government, also called on the British public to "come together" in order to "challenge the extremist narrative promoted by those who seek to create divisions".

