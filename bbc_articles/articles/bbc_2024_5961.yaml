title: 'Newspaper headlines: Sewage ''outrage'' and ''King calls for kindness'' -
  BBC News'
date: '2024-03-27'
section: The Papers
url: http://www.bbc.co.uk/news/blogs-the-papers-68681114
content: |-
  Thursday's papers cover the fallout over record discharges of sewage and the King's Easter message.

  The Times reports that an urgent investigation has begun into prison security after one of its undercover journalists was hired at one of the country's most dangerous jails.

  The paper says he was able to walk inside and interact with prisoners without security searches. In an editorial, the paper says the exposé of HMP Bedford suggests "a system near to the point of breakdown" which should be a "wake up call for politicians and the public". The Ministry of Justice says all jail staff and visitors were "regularly and randomly searched".

  The Guardian focuses on the criticism faced by water companies in England after data revealed raw sewage was discharged for more than 3.6 million hours into rivers and seas last year. An unnamed water company executive tells the paper, "we have wasted 15 years, we haven't invested enough".

  The Daily Telegraph says campaigners have accused the Environment Agency of being an "apologist" for water firms after it said the record sewage spills were the result of wet weather. The i says environmentalists point the finger at Labour because they think the party's proposals, if it wins the general election, to fine water bosses and block bonuses are "feeble gestures".

  Sewage spills into England's rivers and seas by water companies more than doubled last year.

  The Times leads on a joint article for the paper by the Labour leader Sir Keir Starmer and his deputy, Angela Rayner. The pair say the Conservatives were "starting to understand" the problems that cause regional inequality but they accuse Rishi Sunak of killing the levelling up policy at birth. The paper says the intervention represents an attempt to exploit Tory divisions, as Labour prepares to launch its local election campaign today.

  "Could Rishi gamble on a summer election?" asks the Daily Mail. The paper says the prime minister's aides are urging him to hold a general election as early as June, amid fears Tory rebels will step up their plotting and lodge no confidence votes against him. Asked about the prime minister's refusal to call a vote on the second of May when people will vote in the local elections in England, Ms Rayner tells the Daily Mirror Mr Sunak "wants one last summer with his beloved helicopter".

  Being fat can be caused by your genes, US researchers found

  The Daily Telegraph carries a photo of the King, dressed in a suit, recording his Easter message at his desk in Buckingham Palace. The paper says he has been regularly photographed working at home, and is preparing to attend an Easter Sunday service at Windsor Castle under what it calls "modified conditions." The Daily Express says the Prince and Princess of Wales and their three children will not be joining, as they focus on Catherine's recovery.

  According to the Sun, being overweight really is in your DNA. It quotes researchers as saying that out of 3,000 adults all "normal weight" at the start of a study, 43% deemed genetically at risk became obese over the following five years. The Sun says experts believe 2,000 extra steps a day for those predisposed to being obese can help keep off the weight.
