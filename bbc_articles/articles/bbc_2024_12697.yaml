title: Blaze rips through home as residents flee Gosport home - BBC News
date: '2024-06-20'
section: General
url: http://www.bbc.co.uk/news/videos/crgg9n90xplo
content: |-
  A mother-of-five has been left homeless and had to "watch the houses burn", her best friend says.

  Video shows a fire in a three-storey house that spread to seven homes.

  Residents had to flee their homes as the blaze took hold.

  The fire started on Hill Park Road, Gosport, on Wednesday shortly before 21:40 BST.

  The fire service said two people treated at the scene were later released without needing further treatment.

  Jenna Robinson set up an online appeal for her best friend whose house was the first involved in the fire.

  She said the mother-of-five told her after they fled their home "they all stood by and had to watch the houses burn".

