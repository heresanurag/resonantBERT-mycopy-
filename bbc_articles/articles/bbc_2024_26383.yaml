content: |-
  At BBC News, we would like your help to make sure we are getting our coverage right.

  What issues really matter to you? Let us know

  BBC News is here for one reason – you. We are here to bring you impartial, trusted journalism about the most significant events from the UK and around the world, and about what matters most to you in your lives. That is why we are launching Your Voice, Your BBC News. We want to hear what you think we should be reporting on. We want to know what you care about, what issues are affecting you, where you think we should be reporting from, and why.

  This builds on Your Voice, Your Vote which we launched as an experiment during this year's UK general election. It was an invitation for you to get more involved in our journalism and the stories we cover. And I want to say a massive thank you - because thousands and thousands of you did. You told us the election issues that you - not the politicians - really cared about. That guided us to cover stories we might otherwise have missed, from electricity pylons to rural bus services, as well as being able to share your personal experiences in our coverage of big topics, such as housing, the climate and the NHS. Your questions helped inform our interviews with politicians - including this one with former prime minister Rishi Sunak. And our specialist correspondents answered your questions too - using what the parties promised in their manifestos – and what they left out. Over the course of the election Your Voice, Your Vote reached millions of BBC News consumers across our digital, TV and radio services, and audience research tells us you really valued taking part. We at BBC News valued it too, and we want this partnership to continue, because it helped us ensure our work is relevant and useful to you. So we're back with an updated version of Your Voice, Your Vote that can bring us together - not just when we're counting down to an election. We're calling it Your Voice, Your BBC News. Your Voice, Your BBC News welcomes your input and participation into our reporting across every part of BBC News. You can get in touch via this link or by using the form below. Alternatively, you can email at bbcyourvoice@bbc.co.uk or WhatsApp on +44 7980 682727.

