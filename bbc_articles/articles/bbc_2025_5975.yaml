  Beijing is reportedly considering banning Hollywood films and suspending fentanyl cooperation with the US, according to Chinese blogger Liu Hong, who is a senior editor at state-run Xinhua news. But that would offer little comfort to firms like Fuling, which sells disposable tableware to US fast food restaurants like McDonald's and Wendy's. It said the additional tariffs would "significantly impact" its business. Fuling noted that nearly two-thirds of the company's revenue in 2023 and the first half of last year came from the US. To mitigate the impact of tariffs, Fuling, which is headquartered in China's Zhejiang province, started a new factory in Indonesia late last year. However, Trump's new tariffs have introduced more uncertainty for Chinese exports from Indonesia, which are now subject to a 32% levy, the company said in a corporate filing.

  Some Chinese companies say the tariffs deal a "fatal blow" to their already razor-thin margins

  Indonesia was hit along with much of the world in President Trump's announcement of expansive tariffs last week, which he claimed would allow the US economy to flourish. But economists have warned of a US and global recession. The tariffs have also shaken world markets and drawn criticism from billionaire CEOs, including Trump's ally Elon Musk. While China has left the door open for talks, Trump has not spoken to Chinese leader Xi Jinping since returning to the White House. Such broad, sweeping tariffs will cause more harm than good, the American Chamber of Commerce in China said in a note to its member companies on Wednesday. "This level of upheaval is unprecedented, and it remains unclear how the current measures will benefit consumers in either nation or the broader economy," read the note signed by Chair Alvin Liu and President Michael Hart.

  Trump is yet to speak to Xi since returning to the White House

  Some analysts believe the levies will force China to restructure its economy and rely heavily on domestic consumption, which it has been struggling to boost. Otherwise, the tariffs will not be sustainable for China in the longer term, Tim Waterer from brokerage KCM Trade said. "The tariffs are aimed at suppressing China," said the manager of a Chinese freight company, who asked to remain anonymous. He added that many of the South East Asian countries that have been hit with steep tariffs are "exactly where many Chinese businesses have relocated", such as Vietnam and Cambodia. The Tianjin-based company plans to negotiate with some of its American clients to share the burden of the tariffs. "Every case is different, but overall, the impact has been quite substantial," he said. Another freight company manager Wu Changchun, whose firm mainly operates on shipping routes between China and Cambodia, said he is already seeing a fall in freight volume. Several construction projects in Cambodia have also come to a halt after Trump's tariffs announcement, he said. "If the tariffs were at 10% or 20%, businesses might still be able to absorb the cost by optimising supply chains, cutting margins and sharing the burden. Trade could still go on... [But at 104%] that's no longer something trade-offs can fix," said Mr Wu, a general manager at Maritima Maruba. "That's full-on decoupling. Trade would basically come to a standstill."
