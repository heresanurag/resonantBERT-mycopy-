content: |-
  Borussia Dortmund agree a deal with Sunderland to sign Jobe Bellingham for an initial 32m euros (£26.96m) plus 5m euros (£4.2m) in add-ons.

  Jobe Bellingham is yet to win his first cap for England's senior team

  Borussia Dortmund have agreed a deal with Sunderland to sign Jobe Bellingham for an initial 32m euros (£26.96m) plus 5m euros (£4.2m) in add-ons. The 19-year-old midfielder had garnered interest from across Europe but it is Dortmund, former home of elder brother Jude, who are set to secure his signature. Bellingham has played for Sunderland since 2023 and helped them secure Premier League promotion this past season, making 43 appearances for the Black Cats and scoring four goals across all competitions. The England youth international started his career at Birmingham City, coming through the academy before playing two years of senior football for the club.

  Borussia Dortmund experienced an inconsistent season in 2024-25 but had a strong finish to the campaign winning their final five matches to finish fourth and secure Champions League football for next season. If the deal is completed by 10 June, Bellingham would be able to play in the upcoming Club World Cup. That tournament takes place in the United States from 14 June to 13 July. Bellingham has been named in the European Under-21 Championship, to be held in Slovakia from 11-28 June, but England boss Lee Carsley has said he will release players so they can compete in the Club World Cup.

  It is thought Bellingham is keen to follow in his brother's footsteps. Jude, two years Jobe's senior, also came through Birmingham City's academy before moving to Dortmund in 2020 and then Real Madrid in 2023. Bellingham is already mirroring his brother's career with the move to Dortmund and he was also named the Championship's Young Player of the Year in May, five years after Jude won the same award. Another connection between brothers may have helped facilitate Bellingham's move to Dortmund. The German club's UK scout is Daniel Dodds, brother of Wycombe Wanderers boss Mike, who worked with the Bellinghams in the Birmingham academy. Mike Dodds was also part of the coaching staff at Sunderland when Jobe Bellingham made the move from St Andrew's to the Stadium of Light. "I think he can go to the very top," Mike Dodds told the Northern Echo in 2023., external "Both brothers have a very similar mindset in terms of their relentlessness in their pursuit of where they want to get to."
