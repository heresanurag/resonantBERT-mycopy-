  Kwasi Kwarteng, James Cleverly and Suella Braverman get the "great offices of state" as new PM Liz Truss appoints her cabinet.

  What's in the new transport secretary's in-tray

  New Transport Secretary Anne-Marie Trevelyan will have many issues to think about, including how to approach the ongoing wave of industrial action hitting the railways, where strikes could continue for months. There’s also a decision to be made on whether Avanti West Coast will get a new contract to operate trains on the West Coast mainline, after recently slashing its schedules amid a staffing crunch. More government funding announced last month will have saved some regional bus services for the next six months, but with passenger usage still below pre-Covid levels and costs rising, what happens after that? And will the £2 cap on fares promised for all of England, from January to March, only last for those 3 months? There's plenty to think about regarding aviation, and not just working with industry to make sure airlines and airports have enough staff for next summer. Sustainability and how the goal of "net zero" in aviation by 2050 can be achieved are a big focus for the industry. Other things on the list include how the current motoring taxes should be replaced as we move away from petrol and diesel vehicles, and how to ensure the electric vehicle charging infrastructure meets demand.
