title: 'Climate change: Fridge doors could save 1% of UK electricity use - BBC News'
date: '2021-11-07'
section: Wales
url: http://www.bbc.co.uk/news/uk-wales-59141894
content: |-
  Research shows adding doors to supermarket fridges could save 1% of the UK's total electricity use.

  This video can not be played To play this video you need to enable JavaScript in your browser. Adding doors to supermarket fridges might have a bigger impact than you'd expect

  The UK could cut its total electricity usage by 1% if the top five British supermarkets put doors on fridges, campaigners have said.

  Aldi has pledged to put fridge doors in all of its new UK stores, saving 2,000 tonnes of carbon a year.

  Other supermarkets say they will try to make open fridges more efficient.

  But the Environmental Investigation Agency said supermarkets could cut their electricity bills by an average of 33% by adding doors.

  Each of Aldi's 100 new stores will save 20 tonnes of carbon per year by having doors on fridges, the German chain said, adding it would reduce stores' energy consumption by 20%.

  Glamorgan Cricketer and environmental campaigner Joe Cooke says all supermarkets operating in Wales should follow suit.

  Supermarket chain Aldi estimates stores with fridge doors will use 20% less electricity

  "It's such a simple change," Cooke said. "It could save so much energy, that's going to be so important for us as we try to decarbonise and make the changes to become a greener country."

  Cooke said only the Co-op and Aldi had committed to fridge doors in all their new and newly refurbished stores.

  Mary Dunn, Aldi UK's managing director of corporate responsibility, said: "Introducing fridge doors is another step on that journey to reduce our energy consumption and we hope that customers enjoy the new, more sustainable shopping experience."

  But Tesco, Sainsbury's, Morrisons, Waitrose and M&S all said they would be using "air wall" technologies that force cold air towards the back of open displays to save energy.

  Lidl said is uses curtains when its stores are closed and Asda said it would be trialling doors on chilled displays in 2022.

  Instead of adding doors, many big supermarkets say they will try to make open fridges more efficient

  Ulla Lindberg, a refrigeration and consumer researcher from Swedish fridge maker Haglund Industry, said fridges with doors outperform even the most efficient open cabinet technology.

  Ms Lindberg's research found food shoppers were not turned off by doors, with many feeling the food was fresher.

  Supermarkets with fridge doors also saw less food waste and allowed supermarkets to cut their heating bills in winter because they need less heat in the chilled sections of their stores, Ms Lindberg said.

  Ulla Lindberg's research found shoppers were not turned off by fridge doors

  "Half of the energy in a supermarket is from the refrigeration so that means that you cut a lot [with doors]," she explained.

  "You can also improve the situation for the consumer and the food as well."

  The then Welsh Assembly's petitions committee considered a campaign to ban open refrigerators in supermarkets in 2019, but members concluded the Welsh government did not have the powers to intervene.

  The UK government ruled out a ban on the use of open fridges and freezers in retail outlets in 2019 and said it was already taking action to improve energy efficiency.

  In a statement, the the Department for Business, Energy and Industrial Strategy said it was "looking at various ways to encourage greater energy efficiency in commercial refrigeration".

  "We urge retailers to increase their use of energy-efficient technology wherever possible," it added.
