title: Neath Abbey pub landlord assault death 'terrible shock' - BBC News
date: '2019-09-02'
section: Wales
url: http://www.bbc.co.uk/news/uk-wales-49548947
content: |-
  Six teenagers, aged between 14 and 16, are held in custody following an incident early on Sunday.

  Mark Winchcombe was attacked in the early hours of Sunday

  Six teenagers have been arrested after a pub landlord died in Neath.

  Mark Winchcombe, 58, was attacked on Main Road, Neath Abbey, near his pub the Smiths Arms at 00:55 BST on Sunday.

  South Wales Police said six boys, two aged 14 and four aged 16, remained in custody but did not say what they were being held on suspicion of.

  Detectives would like anyone who was in the area at the time who may have seen anything that could help with their inquiries to contact them.

  The pub has remained closed and was cordoned off by police following the attack.

  He added: "He was a very genuine man who would stop in the street to have a chat."

  Tudor Williams, who runs a car dealership opposite the pub, said: "I've known Mark all my life and he is a very tidy guy.

  "He is very hard working and has been trying to build up the pub for years. It is a terrible shock to everyone and our thoughts are with his family."

  Katrina Mears, who lives across the road from the pub, said: "Mark was brilliant. Very lovely.

  "He ran a very respectable and superb pub which is loved by the whole community.

  One regular pub-goer, who did not want to be named, said: "They refurbished that pub and put their heart and soul into it.

  "People are in shock and just keep thinking of his lovely partner and family."

