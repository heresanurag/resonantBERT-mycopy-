id: bbc_2020_6321
title: 'BAME coronavirus deaths: What''s the risk for ethnic minorities? - BBC News'
date: '2020-06-10'
section: General
url: http://www.bbc.co.uk/news/explainers-52969054
content: |-
  Statistics from England show more people from BAME backgrounds are dying than those from white ethnic groups.

  Statistics from England show people from black, Asian and minority ethnic groups are more likely to die from coronavirus than those from white ethnic groups.

  Public Health England found people from black ethnic groups are most likely to be diagnosed with Covid-19, and death rates were highest among people of black and Asian ethnic groups.

  But why is this exactly? Is it to do with ethnicity - or are there other reasons which put people from BAME communities at such a disadvantage?
