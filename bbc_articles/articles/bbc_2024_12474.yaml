  Denise Leigh, from Staffordshire, is hoping with her husband to reach the final of the ITV1 show.

  A blind couple from Staffordshire are preparing for the performance of a lifetime on Friday after making it through to the live semi-finals of Britain's Got Talent.

  Opera singer Denise Leigh and her husband Stefan, from Audley, say the support for them has been "overwhelming".

  Denise has overcome breast cancer and says the side effects of chemotherapy and radiotherapy mean she has had to retrain her voice.

  Britain's Got Talent is on ITV1 at 20:00 BST on Friday.
