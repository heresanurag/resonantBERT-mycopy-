  US President Donald Trump hosted his first public event since testing positive for coronavirus last Thursday.

  US President Donald Trump hosted his first public event since testing positive for Coronavirus last Thursday.

  Addressing supporters from the White House Balcony, he thanked the public for their support before taking the opportunity to criticise Democratic rival Joe Biden.
