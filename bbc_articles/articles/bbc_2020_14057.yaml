  How to help keep the virus at bay this Christmas

  Welsh minister Baroness Morgan has urged people to "behave sensibly" this Christmas to avoid further "trouble" in the new year. The number of households who can mix in Wales over Christmas has been cut from three to two (a person who lives alone can join too). But for people who are still undecided or planning to see loved-ones, here is a reminder of how to mix more safely. A study by Sage, the UK government's science advisory panel, found that if you double the number of people getting together, the odds of infection increase fourfold. And since the coronavirus can survive on surfaces, possibly for several hours, passing around objects could post a risk - so Sage recommends playing quiz-style games instead . For more guidance on everything from noise levels to the length of recommended time spent together, head here. Video caption: Covid Christmas: What are the Christmas Covid rules? Covid Christmas: What are the Christmas Covid rules?
