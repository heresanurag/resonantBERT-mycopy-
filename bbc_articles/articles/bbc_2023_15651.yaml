  There are also parts of the music video for the song, which was released in April 2004, that fans have suggested appear to point to an abortion too.

  The video explores Britney's huge levels of fame, showing her being hounded by paparazzi and fans and then her getting injured after being hit in the head with a camera.

  She retreats to her hotel room and gets in the bath and is seen to lose consciousness as she bleeds and then drowns.

  The video then has scenes which show Britney being carried into an ambulance, being resuscitated by doctors in a hospital bed all whilst her ghost looks on.

  Britney Spears and Justin Timberlake pictured together in 2002

  Britney's ghost then walks into the next room of the hospital, where a baby girl is being born - perhaps referencing the situation the singer would have been in if she had had the baby.

  However, it does not explicitly allude to an abortion. The narrative arc appears to be one life ending, while another one begins.

  Britney's live performances have also been mentioned since Britney revealed details of the abortion - with one showing her touching her stomach whilst singing the song and another showing her interrupting a performance to kiss her sons - Sean Preston, now 18, and Jayden James, now 17, whilst they're sitting in the audience.

  Justin is yet to comment on Britney's latest revelation but said in a social media post in 2021 that he was "deeply sorry" and would "take accountability" after admitting he had failed her during their relationship.

  His song Cry Me A River, released shortly after their breakup in 2002, was seen by some as capitalising on their relationship, as he used heartbreak to promote his music and even featured a Britney lookalike in the video.

  Annet has previously said the song was partly intended as a response to Cry Me A River.

  "He was talking [rubbish] about her at that time on the radio," she said. "He was getting personal. Here, she had a different type of image, and he was really exposing some stuff that she probably didn't want out there."

  Speaking about the process of writing the song, she said: "After the Dream Within a Dream tour in which I sang backgrounds for her, we became friends and bonded over breaking up with our boyfriends.

  "So we sat down in her house and starting writing. It was a very cathartic moment to share with another girl who has gone through something similar."

  In a 2003 interview, Britney discussed Everytime, commenting that she wrote "the whole thing from scratch on the piano".

  Britney's book is set to focus in part on her 13-year conservatorship under her father James and will be published on the 24 October - two years after the end of the legal arrangement which she says "stripped her of her womanhood".
