title: Russian submarine hit Royal Navy warship sonar in North Atlantic - BBC News
date: '2022-01-06'
section: UK
url: http://www.bbc.co.uk/news/uk-59898569
content: |-
  The incident was captured by a television crew filming a documentary on board HMS Northumberland.

  A Russian submarine collided with a Royal Navy warship's sonar on patrol in the North Atlantic, the Ministry of Defence has confirmed.

  HMS Northumberland had been tracking the submarine when it hit the ship's sonar equipment being trailed hundreds of metres behind it.

  The incident, in late 2020, was captured by a television crew filming a documentary.

  A UK defence source said it was unlikely the collision was deliberate.

  HMS Northumberland was searching for the submarine in the Arctic Circle after it disappeared from the ship's radar, according to Channel 5, which was filming for its Warship: Life at Sea series.

  The MoD said the frigate had located the hunter-killer submarine using the towed array sonar - a long tube fitted with sensitive hydrophones to listen under the water.

  A periscope was spotted on the surface by the ship's Merlin helicopter before the Russian submarine dived again, hitting HMS Northumberland's sonar.

  The film cameras captured the crew shouting: "What the hell was that?".

  It is not clear what, if any, damage was suffered by the Russian vessel but the warship had to return to port in Scotland to replace the damaged equipment.

  There has been an increase in Russian submarine activity in recent years, and Royal Navy frigates regularly patrol the North Atlantic.

  The MoD would not usually comment on operations but it has done so because the incident was caught on camera.

  A spokesman said: "In late 2020 a Russian submarine being tracked by HMS Northumberland came into contact with her towed array sonar.

  "The Royal Navy regularly tracks foreign ships and submarines in order to ensure the defence of the United Kingdom."
