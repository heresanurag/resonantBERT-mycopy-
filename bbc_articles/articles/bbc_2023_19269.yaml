title: 'Watch: Delia Smith''s car hit by objects at Ipswich v Norwich game - BBC News'
date: '2023-12-19'
section: General
url: http://www.bbc.co.uk/news/uk-england-suffolk-67749917
content: |-
  Police say there has been "no formal complaint" after Delia Smith's BMW is hit outside Portman Road.

  Police say they have received no formal complaint after Norwich City co-owner Delia Smith's car was hit by objects as she arrived at Ipswich Town's stadium for Saturday's derby match.

  Video captured the moment items bounced off the Norwich owner's car, with one can landing on the BMW's bonnet.

  People could also be heard chanting "scum" in the direction of the vehicle.

  An Ipswich Town spokesman said: "We are aware of a reported incident on Saturday that took place outside of the stadium on Constantine Road.

  "The local authorities are aware and we will assist them in any way possible."

  Suffolk Police said the force was "aware of an incident whereby a beer can was thrown on to the bonnet of a car in Constantine Road".

  "There was no injury or damage caused and no formal complaint has been received," a spokesperson said.
