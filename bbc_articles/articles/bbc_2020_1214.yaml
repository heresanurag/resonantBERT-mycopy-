title: Peter Wright beats Michael van Gerwen to win first PDC Darts Championship title
  - BBC Sport
date: '2020-01-02'
section: Darts
url: http://www.bbc.co.uk/sport/darts/50968083
content: |-
  Peter Wright wins his first PDC World Championship with a 7-3 victory over three-time champion Michael van Gerwen.

  Wright averaged 102.79 in the final against Van Gerwen's 102.88

  Scotsman Peter Wright captured his first PDC World Championship title with a superb 7-3 win over 2019 champion Michael van Gerwen at Alexandra Palace. The 49-year-old lost 7-4 to Van Gerwen in the 2014 final and had previously lost 10 of his 11 major finals. But Wright raced into a 2-0 lead and with the three-time champion missing doubles, built a 6-3 advantage. Seventh seed Wright, who survived a sudden-death shootout in round two, is the second oldest winner of the event. Phil Taylor won the last of his 16 world titles aged 53 in 2013. "Champion of the world sounds amazing. You should never give up, it doesn't matter how many times you get beaten," an emotional Wright told Sky Sports. "I couldn't believe that first dart [for the match] didn't go in, or the second one - and I thought 'don't do it again' but I've done it." Van Gerwen had a slightly higher average than Wright - 102.88 to 102.79 - but landed only 40% of his doubles against 53% from the champion.

