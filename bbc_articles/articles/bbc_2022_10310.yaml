title: Salman Rushdie's 'defiant sense of humour' remains, son says - BBC News
date: '2022-08-14'
section: US & Canada
url: http://www.bbc.co.uk/news/world-us-canada-62542161
content: |-
  The author was severely injured after being stabbed on stage at an event in New York State.

  Author Sir Salman Rushdie is still in a critical condition but "his usual feisty and defiant sense of humour remains intact", his son says.

  Zafar Rushdie said his father had sustained life-changing injuries, but was able to speak to his family.

  Sir Salman, 75, was left severely injured after being stabbed on stage at an event in New York state.

  He has faced years of death threats for his novel The Satanic Verses, which some Muslims see as blasphemous.

  The man charged over Friday's attack has pleaded not guilty to attempted murder.

  "Following the attack on Friday, my father remains in critical condition in hospital receiving extensive ongoing medical treatment," Zafar Rushdie tweeted.

  The family were "extremely relieved" when Sir Salman was taken off a ventilator on Saturday, he said, adding that his father was able to "say a few words".

  "Though his life-changing injuries are severe, his usual feisty and defiant sense of humour remains intact," he said.

