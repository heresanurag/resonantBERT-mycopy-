title: 'Watch: Macron interrupts Trump over Ukraine funding - BBC News'
date: '2025-02-27'
section: General
url: http://www.bbc.co.uk/news/videos/c1lpvgj31r3o
content: |-
  The two leaders discussed funding the Ukraine war effort on the third anniversary of Russia's invasion.

  After their meeting in the Oval Office on Monday, French President Emmanuel Macron interrupted US President Donald Trump as they took questions from reporters.

  Trump had said European countries were "loaning" money to Ukraine. "They get their money back," he added.

  Macron placed his hand on Trump's arm and said that Europe's Ukraine funding took the form of loans, guarantees and grants, and included "real money".
  • None The pair met on the third anniversary of Russia's full-scale invasion of Ukraine, a week after the US started peace negotiations with Russia without directly involving Europe.
