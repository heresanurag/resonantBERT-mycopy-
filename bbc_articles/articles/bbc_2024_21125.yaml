title: Russia seeks 15-year sentence for US-Russian ballerina Ksenia Karelina - BBC
  News
date: '2024-08-08'
section: Europe
url: http://www.bbc.co.uk/news/articles/cx2elj7v3z2o
content: |-
  Ksenia Karelina pleads guilty to treason charge after February arrest for donating to pro-Ukraine charity.

  Russian-American ballerina Ksenia Karelina has pleaded guilty to treason charges after she was arrested for donating money to a charity supporting Ukraine. Russian prosecutors are seeking a 15-year sentence after the security services accused Ms Karelina of collecting money that was used to purchase tactical supplies for the Ukrainian army. She was detained by authorities in Yekaterinburg, about 1,600km (1,000 miles) east of Moscow after a family visit in February. The sentence comes one week after Russia and the West carried out the largest prisoner exchange since the Cold War, where 24 people jailed in seven different countries were exchanged.

  Ms Karelina's lawyer said the prosecutors' request for a 15-year sentence in a penal colony was too severe as the defendant had cooperated with the investigation. Mikhail Mushailov also said it was "impossible" for Ms Karelina to have been included in the recent prisoner exchange, because an exchange can only happen once the court verdict comes into force. "After the verdict, of course, we will work in this direction," Mr Mushailov told reporters on Thursday. The Los Angeles resident had been living away from Russia for several years and gained American citizenship in 2021. She travelled to Russia for a family visit back in January, and has since been prevented from returning to her home in Los Angeles. It has been widely reported that investigators brought the treason charge against her after discovering she had donated around $50 (£39) to Razom, a charity that supports Ukraine. The charity said it was "appalled" to hear of the amateur ballerina's arrest.

  Ms Karelina's charges and trial come after Russian President Vladimir Putin signed a decree in April last year increasing the maximum sentence for treason to life in jail, up from 20 years, as part of a crackdown on dissent. Speaking with the BBC at the time of Ms Karelina's arrest, her partner said she was "proud to be Russian" - and had remained confident that she could travel in the country, he explained. Chris Van Heerden has been campaigning since news of the arrest for the US government to free his girlfriend from Russian detention. The FSB said Ms Karelina had been detained in Yekaterinburg in February - the same city in which US journalist Evan Gershkovich was arrested on charges of espionage on 29 March last year. On 1 August Mr Gershkovich was one of 16 prisoners freed and returned to Europe and the US in return for eight Russian prisoners who were released from prisons in the US, Norway, Germany, Poland and Slovenia.
