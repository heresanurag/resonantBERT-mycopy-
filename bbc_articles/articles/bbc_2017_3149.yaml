id: bbc_2017_3149
title: 'Christian charity abuse claims: Daughter ''didn''t see anything'' - BBC News'
date: '2017-02-02'
section: General
url: http://www.bbc.co.uk/news/uk-38847949
content: |-
  One of the daughters of former Christian charity head John Smyth QC says having boys around the house was a normal part of her childhood, after allegations of abuse against him emerged.

  The Church of England has admitted it failed "terribly", after claims of physical abuse by a former colleague of the Archbishop of Canterbury Justin Welby were not reported to police for over 30 years.

  Channel 4 News alleges 22 boys were beaten by former Christian charity head, John Smyth QC, in the 1970s.

  One of his daughters told the BBC that having boys around the house was a normal part of her childhood, though she never saw any abuse.

  Her interview has been voiced by an actor to protect her identity.
