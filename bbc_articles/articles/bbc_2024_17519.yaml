  SNP deputy Westminster leader Kirsten Oswald was ousted in East Renfrewshire by Labour's Blair McDougall – the former head strategist of the Better Together campaign for the 2014 Scottish independence referendum. Stephen Flynn, the SNP's Westminster leader, clung on to his Aberdeen South seat but told BBC Scotland it was a “very difficult and bleak night” for the SNP and that the party had to learn from it. “There’s the Starmer tsunami, the fact that people want change in Downing Street and we’ve undoubtedly been squeezed in that context,” he added.

  Former first minister and SNP leader Nicola Sturgeon told ITV, external: “This is not a good night for the SNP on these numbers and there will be a lot of questions that need to be asked as we come out of it.” Alex Salmond, who preceded Ms Sturgeon as SNP leader and first minister, said the "slaughter of the SNP" was not due to its support for Scottish independence. He added: "How could it be? The SNP did not even campaign on it."

  Scottish Conservative leader Douglas Ross described it as a “historically bad night” for the Tories. “There is no shying away from that at all and there will be a huge amount of reflection on the campaign and also clearly the last few years,” he told BBC Scotland News. “It has been particularly difficult and there is no denying that.” He went on to lose his own election race to the SNP, receiving 32.8% of the vote compared to the SNP who won 35.2%. Reform collected 14.6%. Ruth Davidson, the former Scottish Conservative leader, told Sky News it was a "massacre” for the Tories. However, she said earlier internal Tory figures had predicted an even worse result. The Conservatives, who fell behind Reform UK in several Scottish seats, have so far kept five seats north of the border. The Scottish Liberal Democrats have so far returned five MPs here. Former leader Jo Swinson said the party was set to become a “substantial force again”.
