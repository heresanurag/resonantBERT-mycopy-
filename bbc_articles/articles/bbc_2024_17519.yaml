title: SNP loses 'damaging' 38 seats so far as final result delayed - BBC News
date: '2024-07-05'
section: Scotland Politics
url: http://www.bbc.co.uk/news/articles/cw4yxzz43m4o
content: |-
  The first minister says his party has "soul searching" to do after a series of losses to Labour.

  SNP loses 'damaging' 38 seats so far as final result delayed

  This video can not be played To play this video you need to enable JavaScript in your browser. First Minister John Swinney says SNP must establish approach for delivering independence

  The SNP has lost 38 seats in the general election so far, with one still to declare due to a recount. Labour made dramatic gains across the central belt, with most of their results following vote share swings of about 20% from the SNP. The Scottish Conservatives won five seats, down from six in 2019, with leader Douglas Ross failing to secure a controversial bid for Aberdeenshire North and Moray East. First Minister John Swinney has described the result, the SNP's worst since 2010, as "very, very difficult and damaging". Speaking later on Friday, he said the party would have to rebuild trust with the people of Scotland. He added: "The Scottish National Party needs to be healed and it needs to heal its relationship with the people of Scotland, and I am absolutely committed to doing that. "I have to accept we failed to convince people of the urgency of independence in this election campaign. "Therefore, we need to take the time to consider and to reflect on how we deliver our commitment to independence - which remains absolute."

  The SNP was defending 48 seats of the 57 in Scotland and has won just nine. A recount in Inverness, Skye and West Ross-shire - an SNP seat under previous boundaries - has been delayed until Saturday. It is being held due to a statistical issue - there appears to be a discrepancy between the verified votes and the counted votes - which means the returning officer cannot declare a result at this stage. However, on Friday evening SNP candidate Drew Hendry conceded defeat in the seat, which now seems likely to go to the Scottish Liberal Democrats.

  Labour celebrated gains across Scotland, especially in the central belt

