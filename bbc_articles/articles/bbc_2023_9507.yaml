  A senior civil servant tells the Covid Inquiry an influenza outbreak was thought to be "most likely".

  We did not run out of PPE, nationally - Wormald

  Keith now turns to the stockpile of PPE (personal protective equipment) prepared for an influenza pandemic, enough to last about three months. "Was that a capability that was transferred to Covid, or did we run out?," he asks Wormald. Wormald replied that is was transferred, as they used the pandemic stockpile that had been built up. "We never nationally ran out of PPE. We were very short and we had significant logistical issues." "The stockpile that we had built up was useful in the pandemic...it would have been much better were it to have been larger." However, at this point chair of the Inquiry, Baroness Hallett, interrupts and says that medical professionals would be surprised to hear that we never nationally ran out of PPE. Wormald says he chose his words very carefully: "There were huge pressures on PPE and we had, as I said, significant challenges getting PPE to the right place, so the department has never said and it would not be true to say that in individual places there were shortages of PPE. "That's different from it having run out nationally."
