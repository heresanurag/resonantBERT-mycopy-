title: 'Tomasz Waga: Third man in court charged with Cardiff murder - BBC News'
date: '2021-04-23'
section: Wales
url: http://www.bbc.co.uk/news/uk-wales-56856144
content: |-
  Tomasz Waga died after being found unconscious by a dog walker in a Cardiff street in January.

  Tomasz Waga had travelled to Cardiff from the Dagenham area on the day of his death

  A third man has appeared in court charged with the murder of a 23-year-old man who died after being found in a Cardiff street.

  Tomasz Waga, from Poland but living in Essex, was found unconscious by a dog walker in Westville Road, Penylan, on 28 January at about 23:30 GMT.

  A 25-year-old from Tottenham in London appeared before Cardiff magistrates on Friday.

  Two other men have already been charged in connection with Mr Waga's death.

  They have both been remanded in custody and are awaiting trial.
