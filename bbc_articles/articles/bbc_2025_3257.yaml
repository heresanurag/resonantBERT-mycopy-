  The US president has accused China, Mexico and Canada of not doing enough to end the flow of illegal drugs and migrants into the US. The three countries have rejected the accusations. He imposed new 25% tariffs on imports from Mexico and Canada last week, but then exempted many of those goods just two days later. Trump also doubled a blanket tariff on goods from China to 20%. The US is now facing retaliation, including new tit-for-tat tariffs from China targeting US farm products that came into effect on Monday. They mean US exports including chicken, beef, pork, wheat, and soybeans face new tariffs of 10% to 15%. Ontario premier Doug Ford, who leads Canada's most populous province, also said he was going forward with a 25% surcharge on energy exports to the US, announced in retaliation for the tariffs. If Trump escalates, "I will not hesitate to shut the electricity off completely," he warned.

  Speaking on NBC on Sunday, Commerce Secretary Howard Lutnick acknowledged: "Foreign goods may get a little more expensive". "But American goods are going to get cheaper," he said. But when asked whether the US economy could face a recession he added: "Absolutely not... There's going to be no recession in America." Former US Commerce Department official, Frank Lavin, told the BBC that he thinks the trade war is unlikely to escalate out of control. But while tariffs will eventually "fade a bit" they will still be an "extra burden on the US economy," he said. Han Shen Lin, China country director at consultancy firm The Asia Group, told the BBC's Today programme: "You're seeing a lot of tit for tat between both sides to demonstrate that neither side will back off easily. "That said China has realised it probably can't export its way to GDP growth in the way that it used to so it is focusing a lot more on the domestic economy right now."
