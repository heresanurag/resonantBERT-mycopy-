title: Barnet food hub faces closure - BBC News
date: '2024-08-30'
section: General
url: http://www.bbc.co.uk/news/videos/c80e11kz18mo
content: |-
  A hub that supplies 17 food banks in Barnet is set to close in September after its funding was withdrawn.

  Barnet Council blamed the “extremely challenging” financial climate for the end of its funding of the hub, which is based at Old East Barnet Library.

  Staff at the hub have described it as a “devastating blow” for the local community.

