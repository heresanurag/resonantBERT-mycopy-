  The dancer was on the show between 2010 and 2013, partnering with Patsy Kensit and Anita Dobson.

  Robin Windsor, a former professional on Strictly Come Dancing, has died aged 44.

  Watch some of his best moments on the BBC show, where he appeared from 2010 until 2013, partnering with Patsy Kensit, Lisa Riley and Anita Dobson.
