id: bbc_2017_3064
title: Iran 'will not instigate hostilities' - foreign minister - BBC News
date: '2017-02-20'
section: General
url: http://www.bbc.co.uk/news/world-middle-east-39024115
content: |-
  The Iranian Foreign Minister, Javad Zarif, has called on the United States to stop threatening Iran.

  In an interview with the BBC's Chief International Correspondent, Lyse Doucet, he said moves in Washington to prepare new sanctions were an effort to provoke and agitate his country.
