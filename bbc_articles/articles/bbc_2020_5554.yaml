id: bbc_2020_5554
title: Aya Hachem's funeral takes place in Lebanon - BBC News
date: '2020-05-23'
section: General
url: http://www.bbc.co.uk/news/uk-52786713
content: |-
  The 19-year-old law student was shot dead in Blackburn last week after she was mistaken for someone else.

  Aya Hachem, 19, died when shots were fired from a passing car on in Blackburn on 17 May.

  She was buried in the town of Koleileh in Lebanon. Five people have been charged in relation to her death.
