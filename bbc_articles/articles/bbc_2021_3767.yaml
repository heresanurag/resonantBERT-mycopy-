title: Swan spotted rattling letterboxes on Northampton street - BBC News
date: '2021-03-19'
section: General
url: http://www.bbc.co.uk/news/uk-england-northamptonshire-56462299
content: |-
  The cherry-knocking bird was caught on camera on a residential road.

  A swan has been spotted rattling letterboxes on a residential street in Northampton.

  Wendy Howard said she had seen a swan on multiple occasions while out walking and captured the bizarre sight on camera.

  The RSPB said the swan could have been doing it for territorial reasons or to get food.

  It has advised people to only feed them in their natural habitat by a river or lake.
