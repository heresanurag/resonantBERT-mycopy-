title: Glasgow tower blocks demolished by controlled explosions - BBC News
date: '2025-03-23'
section: Glasgow & West Scotland
url: http://www.bbc.co.uk/news/articles/c93n44x473go
content: |-
  Three 26-storey high rises on Wyndford Road were taken down in seconds by demolition experts.

  This video can not be played To play this video you need to enable JavaScript in your browser.

  Three 1960s tower blocks have been brought crashing down in seconds by demolition experts, changing the skyline of northern Glasgow. The 26-storey towers at Wyndford Road were destroyed using using controlled explosions to make way for nearly 400 new homes. An exclusion zone and temporary evacuation centre were set up as residents from 240 nearby properties were asked to leave during the operation. A fourth high-rise block will also be taken down as part of the redevelopment using a piece-by-piece demolition technique.

  The Wyndford estate was built in the Maryhill area of the city, on the site of the old Glasgow City barracks, with the high storey blocks completed in the late 1960s. The four 26-storey blocks and several smaller high-rise buildings at one point provided homes for around 6,000 people.
