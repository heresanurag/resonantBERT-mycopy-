  Seeing Allen Morgan again at trial, Mr Prickett said: "I could see him as he was 40 years ago". But of course, it takes more than one person for there to be a conspiracy, and Mrs Morgan’s killer has never been found and brought to justice. The police are hoping Morgan will tell them details they need to know to help them identify the murderer. "I only hope now that even at this late stage, we can ID the person who committed the murder," Mr Prickett said. "That person is still out there. We might have suspicions but that is perhaps for further investigation."

