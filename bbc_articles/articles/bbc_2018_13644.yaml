id: bbc_2018_13644
title: 'Fallon: ''Doomed'' Brexit deal should be renegotiated - BBC News'
date: '2018-11-27'
section: General
url: http://www.bbc.co.uk/news/uk-politics-46357613
content: |-
  Ex-defence secretary Sir Michael Fallon says Theresa May's Brexit deal is "doomed".

  Brexit should be delayed and negotiators should be sent back to Brussels, former British defence secretary Sir Michael Fallon told the Today programme..

  He attacked the proposed EU agreement, saying it was the "worst of all worlds" and is "doomed".
