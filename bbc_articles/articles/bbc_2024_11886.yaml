content: |-
  Tsvetomir Genov was stabbed to death in an "unprovoked attack" in front of his 16-month-old son.

  Dad murdered while pushing infant son in his buggy

  Tsvetomir Genov was stabbed to death on 22 August while he was taking his son out in a buggy

  A man has been found guilty of murdering a father who was fatally stabbed while pushing his 16-month-old son in his buggy. Maurice Jones, 25, of Gainsborough Close, Salisbury, stabbed Tsvetomir Genov - also known as TG - on 22 August 2023. Mr Genov, 20, had been walking down the street Jones lived on when Jones confronted him over issues relating to Mr Genov's child and Mr Genov's former partner, police said. Jones was convicted earlier of murder and possession of a bladed article. He was then remanded into custody ahead of sentencing at Salisbury Crown Court on 18 July.

  Mr Genov died at the scene and Jones fled, discarding the knife and his trousers. He pleaded not guilty to the charges in December, and claimed to have only taken a knife for his own protection.

  During the two-week trial at Winchester Crown Court, Jones said he had used the weapon out of fear, claiming to have lost control of himself. However, the jury dismissed his claims.

  Det Ch Insp Phil Walker, of Wiltshire Police, paid tribute to Mr Genov's family for their "dignified manner" in court, while dealing with their "unimaginable loss". “Sadly, this is another murder involving the use of a knife," he said. “The defendant purposely armed himself with a knife and left the address he was in to confront the victim, before launching into a violent, unprovoked attack, ignoring efforts to stop him. “TG was simply walking his son back to his mother's address and did not present any danger to anyone. “This was a violent assault in a public place and the defendant has not shown any true remorse for his actions. “My condolences go out to TG’s family and friends and we hope this verdict will give them some comfort at such a difficult time.”
