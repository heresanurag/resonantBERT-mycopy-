title: Boca Juniors v River Plate final in Copa Libertadores postponed after team
  bus attacked. - BBC News
date: '2018-11-25'
section: General
url: http://www.bbc.co.uk/news/world-latin-america-46332745
content: |-
  Clashes between Boca Juniors and River Plate have injured players and delayed the Copa Libertadores final.

  Clashes between Boca Juniors and River Plate have delayed the second leg of a Copa Libertadores cup final match after the former team's bus was attacked.

  Boca Junior players on the bus were injured in the incident between two of Argentina's biggest rivals.
