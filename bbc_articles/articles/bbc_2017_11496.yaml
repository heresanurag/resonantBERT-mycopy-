title: UK's busiest container port at Felixstowe marks 50 years - BBC News
date: '2017-11-25'
section: General
url: http://www.bbc.co.uk/news/uk-england-suffolk-42117493
content: |-
  The Port of Felixstowe has changed dramatically since it first opened.

  The UK's biggest and busiest container port is marking a half century of handling cargo.

  The Port of Felixstowe was the first of its kind in the country when it opened in 1967.

  It currently employs 2,500 people and is linked to 32,500 jobs across Suffolk.
