content: |-
  Jack Dee, Rory Bremner and many others pay tribute to a "kind and thoughtful friend".

  This video can not be played To play this video you need to enable JavaScript in your browser.

  A host of British comedy stars have paid tribute to Jeremy Hardy following his death from cancer at the age of 57.

  Jack Dee, who worked with Hardy on Radio 4's I'm Sorry I Haven't A Clue, said he was "off-the-register funny".

  Julian Clary said he had always been "the funniest and brightest", while Victoria Coren Mitchell described him as "a miracle of a person".

  Labour leader Jeremy Corbyn also paid tribute to the socialist comic, saying he "gave his all for everyone else."

  This video can not be played To play this video you need to enable JavaScript in your browser. The comedian is remembered by Mark Steel and Jeremy Corbyn

  Jack Dee - who interviewed Hardy for an edition of Radio 4's Chain Reaction also paid tribute to the comedian.

  This video can not be played To play this video you need to enable JavaScript in your browser. Jeremy Hardy "could do satire without being a smart arse", says Jack Dee

  Coren Mitchell said he had been "so kind" when her father Alan - another regular on The News Quiz - died in 2007.

