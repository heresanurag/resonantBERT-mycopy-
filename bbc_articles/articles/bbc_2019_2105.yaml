  Singer Billy Bragg said Hardy would be "greatly missed by friends and fans", while actress Rebecca Front said his death was "heartbreaking news".

  "I was almost always paired with Jeremy on The News Quiz and he was endlessly kind, supportive, generous and of course funny," she wrote on Twitter.

  QI regular Alan Davies, meanwhile, paid tribute by posting his "best Jeremy Hardy line".

