title: 'Euro 2024: Albania''s Mirlind Daku given two-game ban for offensive chants
  - BBC Sport'
date: '2024-06-24'
section: European Championship
url: http://www.bbc.co.uk/sport/football/articles/c5111xlvvy6o
content: |-
  Albania forward Mirlind Daku has been banned for two matches after leading his country's fans in derogatory chants.

  Daku addressed his country's supporters with a megaphone following Albania's heated 2-2 draw with Croatia in Hamburg.

  Uefa also fined the Albania Football Association £21,250 (25,000 euros) for "transmitting provocative messages not fit for a sports event".

  The Albania FA were charged an additional £19,000 (22,500 euros) for pitch invasions and the lighting of fireworks by supporters.

  The Croatian Federation were fined £23,600 (28,000 euros) for the throwing and lighting of fireworks.

  Uefa added its investigation into "potential racist and/or discriminatory conducts by supporters in this match is ongoing".

  Daku took to social media to apologise on Friday.

  Serbia had threatened to pull out of Euro 2024 over chanting between Croatia and Albania fans.

  The Serbian team played their match with Slovenia a few hours later, drawing 1-1.

  Daku's actions also resulted in the North Macedonia football federation demanding an apology.
