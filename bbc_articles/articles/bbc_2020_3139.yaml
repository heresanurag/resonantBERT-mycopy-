title: Throbbing Gristle's Genesis P-Orridge dies aged 70 - BBC News
date: '2020-03-15'
section: Entertainment & Arts
url: http://www.bbc.co.uk/news/entertainment-arts-51893184
content: |-
  The musician, artist and provocateur had been battling leukaemia for two-and-a-half years.

  Genesis P-Orridge - an icon of the avant garde

  Genesis P-Orridge, founding member of cult experimental bands Throbbing Gristle and Psychic TV, has died.

  The musician and artist, who had been battling leukaemia for two-and-a-half years, was 70.

  With Throbbing Gristle, Genesis helped pioneer the genre of industrial music. In later life, they became a "body evolutionist", proposing a new gender that was beyond male and female.

  The death was confirmed by Genesis's daughters, Genesse and Caresse.

  In a statement, they said their father "dropped he/r body early this morning, Saturday March 14th 2020".

  "S/he will be laid to rest with he/r other half, Jaqueline 'Lady Jaye' Breyer who left us in 2007, where they will be re-united."

  They concluded the post by thanking people for their "love and support and for respecting our privacy as we are grieving".

  Born Neil Megson in Manchester, Genesis P-Orridge's career began in Hull in 1969 with the radical art outfit COUM Transmissions.

  Alongside then-partner Cosey Fanni Tutti, the group played an abrasive brand of industrial rock, often combined with sexually-explicit live shows.

  Their 1976 exhibition at London's Institute of Contemporary Arts, titled Prostitution, scandalised the art world, and prompted Conservative MP Nicholas Fairbairn to denounce the group as "the wreckers of civilization".

  Shortly afterwards, Genesis and Tutti branched out to form Throbbing Gristle with Peter "Sleazy" Christopherson, releasing their debut album The Second Annual Report in 1977.

  Crude, uncompromising and deliberately malicious, it was not an easy listen - based around multiple versions of the songs Slug Bait and Maggot Death, which detailed sadistic acts of violence and murder.

  Only 785 copies were pressed, but the album was a key influence on the industrial movement, a more antagonistic cousin of punk.

  "In terms of being shocking, punk was pretty tame in comparison," said Simon Reynolds, the author of Rip It Up and Start Again: Postpunk 1978-1984.

  "They were writing songs about serial killers and cutting themselves onstage."

  The band upped the dread on their second album, D.O.A, but discovered a more accessible side on 1979's 20 Jazz Funk Greats, recorded on a tape machine they had borrowed from Paul McCartney.

  Performing with Psychic TV in New York, 1988

  Two years later, Genesis formed another band, Psychic TV, who explored the singer's interest in the occult and fetishism; and scored a minor hit with Godstar, a tribute to late Rolling Stone guitarist Brian Jones.

  The band's output was prolific - releasing more than 100 albums, and entering the Guinness Book of World Records after issuing 14 live records in the space of 18 months.

  In the early 1990s, Genesis's house in Brighton was raided by Scotland Yard's Obscene Publications Squad after a Channel 4 programme alleged the musician was the leader of a Satanic cult.

  Although no charges were filed, the artist went into self-imposed exile in the US; where they met Jacqueline "Lady Jaye" Breyer, a dominatrix, nurse and soon to be muse.

  Together they launched a "Pandrogeny Project" - surgically altering their bodies to resemble each other as closely as possible, becoming a single "pandrogynous" being named Breyer P-Orridge.

  The couple also adopted genderless pronouns - s/he and he/r - explaining that they wanted to create a third gender.

  "It's not male or female, not either/or — just complete," Genesis told Paper magazine last year. "We thought it was important to remind people of that idea, and as artists, we figured the best way to do so was visually."

  In 1995, Genesis nearly lost their left arm while escaping a fire at the Los Angeles home of the producer Rick Rubin.

  S/he was awarded $1.5m in damages, and used the money to bankroll experiments in photography, collage, sculpture and cosmetic surgery.

  Having been a fringe artist for years, Genesis began to find he/r work embraced by the fine art world, including Tate Britain, which acquired several pieces.

  In recent years, however, the musician's legacy was called into question by Throbbing Gristle bandmate Tutti, whose memoir revealed allegations of abusive and domineering behaviour.

  The guitarist claimed that Genesis threw a concrete block at her head from a balcony, and ran at her with a knife after she attempted to end their relationship. Genesis always denied the accusations.

  After Lady Jaye died of an acute heart arrhythmia in 2007, Genesis continued their Pandrogeny Project, and recorded a final album with Psychic TV, Alienist, in 2016.

  Genesis is survived by two daughters, Genesse and Caresse and first wife Paula P-Orridge, now known as Alaura O'Dell.

