  The Senate backs $40bn of military, economic and humanitarian support as Russian attacks continue.

  As we reported earlier, Ukrainians are marking Vyshyvanka Day - a celebration of Ukrainian folk culture, particularly the wearing of traditional embroidered shirts.

  Here are some images taken as people came out to celebrate, despite the continuing war in the country.

  The designs on some vyshyvankas have meanings such as hope, fertility and protection Image caption: The designs on some vyshyvankas have meanings such as hope, fertility and protection

  Children were among those who gathered in Lviv Image caption: Children were among those who gathered in Lviv

  Once traditionally white, vyshyankas are now made in a wide range of colours Image caption: Once traditionally white, vyshyankas are now made in a wide range of colours

  This performance took place in the western city of Lviv Image caption: This performance took place in the western city of Lviv

  Sewing lessons were on offer in Odesa Image caption: Sewing lessons were on offer in Odesa

