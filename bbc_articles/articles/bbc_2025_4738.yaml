title: Ant Middleton banned as company director over £1m unpaid tax - BBC News
date: '2025-03-24'
section: Culture
url: http://www.bbc.co.uk/news/articles/c871v73j78lo
content: |-
  SAS: Who Dares Wins star Ant Middleton is reprimanded for taking £3m from his company while owing tax.

  Ant Middleton was chief instructor on SAS: Who Dares Wins from 2015-21

  Former SAS: Who Dares Wins star Ant Middleton has been banned from being a company director, after his company failed to pay more than £1m tax. The Insolvency Service said Mr Middleton and his wife, Emilie, "were taking millions of pounds out of" their company when it should have been paying the tax instead. The couple's "media representation services" company, Sway and Starting, went into liquidation in 2022 owing £300,000 in VAT and £800,000 in corporation tax. It had had £4.5m income in the previous three years, "indicating it had enough income to pay the tax it owed in full", the Insolvency Service said. Meanwhile, the couple had taken out a £3m directors' loan from the company.

  The couple, both 44, from Essex, have been disqualified as company directors for four years. They have not commented. Insolvency Service investigation and enforcement services director Dave Magrath said: "Ant and Emilie Middleton had legal and financial duties as directors to ensure their company paid the corporation tax and VAT it owed. "Instead, they were taking millions of pounds out of the company at that time. "This disqualification should serve as a deterrent to other directors that if you do not pay your taxes while directing money elsewhere, you are at risk of being banned."

  Mr Middleton had agreed a payment plan with the liquidator to pay £300,000 to settle the outstanding directors' loan. However, he made only the first payment and then put their home on the market in an attempt to repay the rest. The former United Kingdom Special Forces (UKSF) soldier was the chief instructor on SAS: Who Dares Wins when it launched, in 2015. He left the gruelling reality show in 2021 over what Channel 4 called his "personal conduct off camera", with press reports he had made inappropriate comments to a member of staff. In response, Mr Middleton said the "woke patrol" had taken over the series.
