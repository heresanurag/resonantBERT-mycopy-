  Omar Murtaza, 33, said he was evacuated from his nearby home with his wife and four children, aged between seven weeks and six years, during the stand-off.

  "It's a bit scary, this is normally a quiet neighbourhood. You don't expect guns anywhere really, but not in Oxford," he said.

