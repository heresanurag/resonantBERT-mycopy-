title: 'Ukraine dam: Swans seen swimming through Nova Kakhovka - BBC News'
date: '2023-06-07'
section: General
url: http://www.bbc.co.uk/news/world-europe-65818722
content: |-
  The city was flooded after Ukraine accused Russia of destroying a huge dam nearby.

  Swans were seen swimming through the city of Nova Kakhovka, in southern Ukraine, after Kyiv accused Moscow of destroying a huge dam nearby.

  Evacuations are under way after the incident in the Russian-held region of Kherson.
