content: |-
  Charli XCX, Ghetts and Jade are among the other stars in contention for songwriting prizes.

  Lola Young is nominated for best song musically and lyrically, best album and rising star

  Pop singer-songwriter Lola Young leads the nominations for this year's prestigious Ivor Novello Awards, with Charli XCX, Ghetts and Jade among the other stars in contention. Young has three nominations including best song musically and lyrically for her breakthrough hit Messy, which spent a month at number one in the UK earlier this year. She is also shortlisted in the best album category, where she will go up against Charli XCX's Brat, which became a cultural phenomenon last summer. The Ivor Novello Awards are coveted in the UK music industry because they specifically celebrate songwriting.

  Charli, rapper Ghetts and singer Raye all have two nominations each, as has Young's co-writer Conor Dickinson. Former Little Mix star Jade is nominated for best contemporary song for her first solo single Angel of My Dreams. And 40 years after its release, Wham!'s Last Christmas is nominated for the prize for most performed work, which is based on airplay. The winners will be announced at a ceremony in London on 22 May. Judges have already announced that U2 will be named Academy Fellows, the Ivors' highest honorary accolade.
