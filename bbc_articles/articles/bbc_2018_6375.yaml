title: Controversial Russia-Crimea bridge opens - BBC News
date: '2018-05-16'
section: General
url: http://www.bbc.co.uk/news/world-europe-44134045
content: |-
  The $3.7bn (£2.7bn) bridge links southern Russia with the territory it annexed in 2014.

  The $3.7bn (£2.7bn) bridge has been a flagship political project for Russia as it seeks to cement its hold on to the territory it annexed from Ukraine in 2014.
