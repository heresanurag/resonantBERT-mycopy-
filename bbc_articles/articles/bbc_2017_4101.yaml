  • None Paul Pogba attempted 127 passes in the game, the fourth-highest total by a player in a Europa League game this season. He is also second with 130 against Zorya Luhansk on 29 September.

  Manchester United play Premier League leaders Chelsea on Sunday before the second leg at Old Trafford next Thursday. Anderlecht play KV Oostende on Sunday in the Belgian top flight.
