title: 'Covid: Data looks encouraging for 19 July, says Hancock - BBC News'
date: '2021-06-22'
section: UK
url: http://www.bbc.co.uk/news/live/uk-57564103
content: |-
  Despite a rise in cases, hospitalisations and deaths remain low, the health secretary says.

  The mayor of Moscow has announced that from 28 June all restaurants, cafes and bars in the city will admit only visitors who have been fully vaccinated, have a fresh negative PCR test, or have had Covid-19 in the past six months.

  Writing in his blog, mayor Sergey Sobyanin said the situation with Covid in the capital remained very difficult.

  "There are over 14,000 seriously ill people in hospitals. The health care system is having to mobilise all its full potential."

  Last week, the Moscow authorities introduced compulsory vaccinations for some categories of the service industry and public service workers. This, Mr Sobyanin said, is already bearing fruit, as the rates of vaccination in Moscow have grown five-fold in the past few days.

  At the same time, the mayor said, it was important to ensure the service industry continued to function.

  The mayor stressed that only officially-generated QR codes can be used to gain entry to restaurants - and no paper certificates will be accepted.

  Moscow and one of the Euro 2020 host cities, St Petersburg, are both undergoing a surge in infections.

  Moscow has been recording over 9,000 new cases daily on some days - a record since the start of the pandemic. The authorities believe the vast majority of new cases are caused by the Delta variant.
