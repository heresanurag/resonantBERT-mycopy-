title: The 'Hillary safe space' that divided the American left - BBC News
date: '2017-09-16'
section: BBC Trending
url: http://www.bbc.co.uk/news/blogs-trending-41283202
content: |-
  A website endorsed by former US presidential candidate Hillary Clinton has been a divisive topic amongst America's left

  Verrit describes itself as "media for the 65.8 million"

  It's a website that describes itself as "media for the 65.8 million" - a reference to the number of Americans who voted for Hillary Clinton in the 2016 US presidential election.

  That's a sizeable number, and if anywhere near that many had signed up, Verrit would be a very successful outlet. Instead, it has collected relatively few followers, and has highlighted divisions in the Democratic Party.

  Set up in June 2017, and endorsed earlier this month on Twitter by Clinton herself, Verrit is a website whose primary function, according to its creator and former Clinton adviser Peter Daou, is "to bring together like-minded people."

  "My wife and I are quite active on social media, and the community we are most involved with are Hillary supporters and voters and people who share their mindset," Daou tells BBC Trending.

  "Since the election one of the main refrains we would hear is that these voters feel intimidated and harassed when they go on social media and they also feel invisible in the mainstream media," he says. "So we thought it would be great to create a space where they could converse with each other, where their issues would be centred and highlighted."

  The site displays a number of virtual message cards - known as "Verrits" - that quote a headline or short phrase. By clicking on the headline the reader is greeted either by a piece of text or links to news articles.

  Examples of some recent headlines the site has hosted include "Murder is a leading cause of death for pregnant women in the United States." When clicked on, the headline leads to a Washington Post article from July. Another reads: "By 2050, water shortages will affect a quarter of the world's population."

  But on the site, statements of fact backed up by legitimate news outlets freely mix with opinion and spin. Other headlines include "'Hillary Democrats' are the heart and conscience of America" and "The Republican Party is harmful to America's children."

  The site seems to have flown mostly under the radar until Clinton's tweet:

