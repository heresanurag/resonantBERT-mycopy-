  It was quickly criticised by some of Clinton's most determined opponents on the right. While that might not have been surprising, criticism of Verrit has also found root amongst those on the left.

  Overall online, the negative reaction was overwhelming. Politico described Verrit as "a propaganda rag so shameless it would make Kim Jong Un blush."

  Brendan James, one of the co-hosts of the leftist political comedy podcast Chapo Trap House is no fan of Clinton. But he also says he isn't convinced by the concept behind the site.

  "It's not really a social media site because you can't upload anything to the site, you can't post your own material and these aren't really facts he's disseminating," he tells BBC Trending radio. "I dare say even the more rabid Hillary voters don't quite know what to do with [Verrits].

  "I suppose you could pass them round like a meme, or use them in a little argument you might get in an email chain with your aunt," he says.

  Although Clinton's tweet received more than 22,000 likes, Verrit has not gone hugely viral. Its Twitter account has only about 60,000 followers, and its Facebook page has about 12,000.

  Hillary Clinton endorsed Verrit - but that hasn't led to millions of followers

  Daou says he doesn't take the criticism personally, and argues that the reaction shows he must be doing something right - and that his critics are scared of Hillary Clinton and Verrit.

  "If her voice is being reflected in Verrit then she is here to stay," he says. "I think long term, the idea of Verrit being here to stay does frighten people who don't want that view to be expressed."

  Unsurprisingly, Brendan James from Chapo Trap House takes quite a different line: "Well, that's sort of the only thing you can say when you've failed miserably in doing what you set out to do... if it were true that all of these people who voted for Hillary were as adoring of her as Peter is, this venture would make sense and they would all be clamouring for this service.

  "Unfortunately I think the number of people who are really dying for this number in their dozens not their millions," he says.

  The incident highlights a key split in the Democratic Party - which is made up of many factions, but broadly speaking can be divided into Clinton loyalists, and supporters of the socialist Bernie Sanders, who challenged Clinton in the Democratic presidential primary.

  Online, Clinton supporters use hashtags such as #StillWithHer - a reference to Clinton's popular "I'm with her" slogan - and #TheResistance. Sanders supporters are more likely to tweet #FeeltheBern - and as the debate over Verrit shows, these two factions have not quite been united in their shared opposition to President Donald Trump.

