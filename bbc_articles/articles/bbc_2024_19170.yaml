  Jack Laugher's father says his son's pictures were "nothing that you couldn't show your grandma".

  Jack Laugher's father said his son posted pics on OnlyFans to earn extra income

  Olympic diving medallist Jack Laugher has had to help fund his career by posting pictures on subscription site OnlyFans, his father said. The 29-year-old from Ripon claimed bronze for Great Britain earlier in the men's synchronised 3m springboard diving at the Olympic Games in Paris. However, the City of Leeds diver's father Dave Laugher said his son has had to make extra money by posting pictures on the subscription site, which has been associated with adult content. Speaking to BBC Radio York he said: "I actually suggested it to him, but it's nothing that you couldn't show your grandma."

  Laugher won gold and silver at Rio 2016 and a bronze in Tokyo in 2021

  Laugher, who is competing in his fourth Olympics, won gold and silver in diving at the 2016 Summer Olympics in Rio de Janeiro. The diver also picked up three gold medals at the 2018 Commonwealth Games in Australia and a bronze at the Tokyo Olympics in 2021. Speaking before his son's latest success, Mr Laugher said OnlyFans "has got a reputation for saucy content" and it was sad his son "has to try to make extra money to make ends meet, when really he should be getting the funding that he needs". However, he added: "It's all safe content from Jack's point of view." Mr Laugher said his son's business wear "is a pair of trunks" adding: "There's nothing left to the imagination when you just wear trunks all the time and he just posts pictures of himself as you would see him if he was in a competition. "It makes extra money for him and he's pleased to have the opportunity, but it's nothing that you couldn't show your grandma." Jack Laugher himself has previously told The Sun newspaper, external he was happy to "cash in", adding that while he is aware of the "negative" perceptions of the site he was "comfortable" with his decision. Laugher is set to compete in the individual 3m springboard later in the week, with heats held from 6 August. Listen to highlights from North Yorkshire on BBC Sounds, catch up with the latest episode of Look North or tell us a story you think we should be covering here, external.
