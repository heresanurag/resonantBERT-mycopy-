title: 'The Masters 2025: Rory McIlroy v Bryson DeChambeau showdown - BBC Sport'
date: '2025-04-13'
section: Golf
url: http://www.bbc.co.uk/sport/golf/articles/cx27vek5jeeo
content: |-
  Long drives are the only similarity between Rory McIlroy and Bryson DeChambeau, the contrasting pair in pole position to win the Masters.

  This video can not be played To play this video you need to enable JavaScript in your browser. McIlroy makes incredible start with eagle on second

  Aside from their love of hitting the ball prodigious distances with their drivers, Rory McIlroy and Bryson DeChambeau's approach to winning the Masters could not be more different. While McIlroy has spent this week blocking out "the noise", DeChambeau has been feeding off the rising decibels echoing through the Georgia Pines at Augusta National. While McIlroy strolled serenely and stony faced to the scorer's hut after Saturday's second successive 66, DeChambeau bounded up the hill with a beaming smile, energised by a closing 50-foot birdie - his 69th shot - high-fiving everyone and anyone. While McIlroy planned to spend a quiet Saturday evening away from his phone and trying to stay awake for an episode of raunchy period drama Bridgerton, DeChambeau was ready to embrace his mobile and was looking forward to a late night spent watching action of a different sort, a James Bond film. The two look set for a final-round showdown on Sunday as they attempt to become Masters champion for the first time. McIlroy leads on 12 under par, two ahead of DeChambeau. There are others on the leaderboard with pedigree though. Canadian Corey Conners, something of an Augusta expert with three top 10s in his past six starts, is the next best at eight under and he is two clear of last year's runner-up Ludvig Aberg and 2018 champion Patrick Reed. But Masters Sunday is already being billed as a rematch by many - a chance for McIlroy to exact revenge after he capitulated in the final three holes at last year's US Open and DeChambeau took full advantage.

  This video can not be played To play this video you need to enable JavaScript in your browser. Best shots from Masters day three

  Victory for the man from Northern Ireland would see him become the first in a quarter of a century to complete the career Grand Slam and match the feats of Gene Sarazen (completed in 1935), Ben Hogan (1953), Gary Player (1965), Jack Nicklaus (1966) and Tiger Woods (2000). Anything other than a win would add another painful chapter to this storied golfer's rollercoaster history in the biggest tournaments. "I'll have some dinner and try to make it through the second episode of the third season of Bridgerton," said McIlroy of his evening's plans. "I fell asleep during episode one [on Friday night]. "I'll put the phone away. I've tried to stay clear of that this week. Try not to look at it until Sunday night." "And then [on Sunday] it's just trying to fill that time between 07:00 and 10:30 before heading to the golf course. "I watched a little bit of Premier League football [on Saturday], and then I watched Zootopia with [daughter] Poppy. It's a very, very good movie if anyone's interested."

  For McIlroy's American rival, it is a chance to pick up a third major title and further prove that playing on the LIV Series circuit is not a hindrance to winning the sport's most important prizes. And as a player who thrives on the energy from the crowd, DeChambeau has no plans to keep things quiet on Sunday. "Just getting the patrons going and having a bit of fun with them makes me focus more," he said. "It's a fun thing that whenever I feel like I feed into the crowd, they give that energy back and it's a cool feeling." And when asked how he will he be preparing for his quest to win a maiden Green Jacket, he replied: "Eating, looking at my phone – I don't have a problem with that. "Watching a movie – probably James Bond or something. I love James Bond movies. Pierce Brosnan. "I'll probably go to bed late and get up around 10:00, 10:30 and see how the course is playing and go from there."

