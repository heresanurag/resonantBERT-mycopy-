  McIlroy has not held the solo 54-hole lead at any major since the US PGA Championship in 2014 – a tournament he went on to win. In fact, he has closed out at every major he has led going into the final round, apart from at Augusta National, when a meltdown on the second nine cost him victory in 2011. It is, therefore, perhaps unsurprising he is not getting carried away with his current advantage. "I still have to remind myself that there's a long way to go," he said. "I, just as much as anyone else, know what can happen on the final day here. "I've got a lot of experience – and thankfully I've got a short memory." On Saturday, McIlroy started with three birdies and an eagle in his opening five holes, and became the first player to open with six straight threes at the Masters. Afterwards, he said it was a challenge to keep his emotions in check when running so hot. "I am a momentum player," he said. "There is a balance. You have to ride that momentum as much as you can but temper it with a little bit of rationale and logic. "It's a fine dance. I certainly don't want to be a robot but at the same time, I don't want to be too animated either." The stage is set for a rematch with DeChambeau, who came from two shots back with five holes to go at Pinehurst to win last year's US Open, and is never shy to show his emotions. There, McIlroy missed two short putts on holes 16 and 18 to open the door for DeChambeau, who barrelled through in typically raucous fashion. And he is already relishing the challenge of taking on McIlroy again. "It will be the grandest stage that we've had in a long time and I'm excited for it," said DeChambeau. "We both want to win really, really badly. It's going to be an electric atmosphere." Follow all the action of the final round with live text commentary on the BBC Sport website and app from 18:00 BST. Live radio commentary is on BBC Radio 5 Live and BBC Sounds from 19:30 BST.
