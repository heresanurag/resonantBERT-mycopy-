title: 'East Belfast: Three still held over Kathryn Parton murder - BBC News'
date: '2024-05-18'
section: Northern Ireland
url: http://www.bbc.co.uk/news/uk-northern-ireland-69032418
content: |-
  Kathryn Parton, 34, who suffered serious head injuries, was found dead on Wednesday.

  The body of Kathryn Parton was found in a house on Madrid Street in Belfast

  Police are continuing to question three people on suspicion of murder after a woman was found dead in east Belfast. Kathryn Parton - known as Kat - was discovered with serious head injuries in a house in Madrid Street on Wednesday afternoon. The 34-year-old was pronounced dead at the scene. The three who remain in custody are a woman aged 43 and two men aged 22 and 23.

  Earlier this week, the PSNI said they were trying to establish the exact circumstances of her death. Belfast East MP Gavin Robinson described the incident as heart-breaking.

  The charity Women's Aid said Ms Parton was the 19th woman to be killed in Northern Ireland since 2020.
