title: Hidden mosaic discovered at Wroxeter Roman site - BBC News
date: '2024-08-13'
section: Shropshire
url: http://www.bbc.co.uk/news/articles/c4gv3e6p05do
content: |-
  The mosaic depicting dolphins and fish is likely to have been commissioned by someone wealthy.

  Archaeologists said the mosaic would have been commissioned by someone "wealthy and important"

  A 2,000-year-old mosaic has been discovered during excavations at a Roman site in Shropshire. The piece at Wroxeter Roman City, near Shrewsbury, depicts brightly-coloured dolphins and fish. It was uncovered during work to search for the main civic temple. "Our excavations were in hope of discovering the walls of this building, but we never suspected we would find a beautiful and intact mosaic, which had lain hidden for thousands of years," said Win Scutt, from English Heritage.

  The mosaic was likely made soon after the Roman city was established

  "It's always an astonishing moment when you uncover a fragment of beauty hiding just below the ground," he added. Archaeologists who made the discovery said the mosaic dated back to a time soon after the city was established, and would have been commissioned by a "wealthy and important person". The team also found coins and pottery and a painted plaster wall on one side of the mosaic, which experts said would help date the phases of the city, and the activities that took place there. The area of excavation has been reburied for protection and preservation.

  Wroxeter Roman City was one of the largest cities in Roman Britain

  Wroxeter, once known as Viroconium Cornoviorum, was established in the 90s AD. It contained a civic bath house, market place, county hall and judicial centre as well as more than 200 houses. Today, a number of ruined buildings are the only remains of the city above ground, and are cared for by English Heritage. The excavation was a collaboration between English Heritage, the University of Birmingham, Vianova Archaeology and Heritage Services, and Albion Archaeology. In July, archaeologists found a large monumental building on the city's main road, and a shrine or mausoleum which may have honoured an important individual.
