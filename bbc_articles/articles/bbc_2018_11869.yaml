id: bbc_2018_11869
title: 'Storm Callum: Landslide kills man in Carmarthenshire - BBC News'
date: '2018-10-13'
section: Wales
url: http://www.bbc.co.uk/news/uk-wales-45852407
content: |-
  Officers say the man was killed on the main road between Carmarthen and Cardigan.

  Police confirmed a man had died following a landslide on the A484 at Cwmduad

  One man has died after a landslide in Carmarthenshire as Wales was battered by Storm Callum.

  Dyfed-Powys Police said it is "dealing with" a landslip at Cwmduad on the A484 between Carmarthen and Cardigan where a person was confirmed dead at the scene.

  Officers are supporting the dead man's family and the road is closed.

  Carmarthenshire is one of the worst hit areas by Storm Callum as torrential rain has caused rivers to burst their banks and flood towns and villages.
