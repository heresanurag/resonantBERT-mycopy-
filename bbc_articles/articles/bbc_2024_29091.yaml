  Man who used 3D printer to build gun jailed

  The weapon was found during a search of Jordan Brown's home

  A man who created parts for a gun on a 3D printer has been jailed. Jordan Brown, 25, from Thornton-Cleveleys Lancashire, pleaded guilty to manufacturing and possession of a firearm and ammunition. Officers raided his home in June and found a weapon and ammunition wrapped in a t-shirt in his bedroom wardrobe, Lancashire Police said. Brown was sentenced at Preston Crown Court to five years and two months in prison.

  Two 3D printers were found during the search of his home on Devonshire Avenue. Det Sgt Vicki Speak said: "We welcome the sentence imposed on Jordan Brown for manufacturing the firearm. "The weapon was tested and found to be viable. "Despite being manufactured with parts from a 3D printer, the harm which the weapon could cause was catastrophic."
