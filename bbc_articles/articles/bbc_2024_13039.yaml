  Glastonbury Festival as seen from the sky
  • None James Pearce took to the sky above Worthy Farm on Sunday morning
  • None A variety of artists will be performing over the five-day festival
  • None About 200,000 people are expected to attend this year's festival Slide 1 of 4 , Aerial view of Worthy Farm. The paraglider's legs can be seen at the bottom of the frame, and fields are lined with colourful tents , James Pearce took to the sky above Worthy Farm on Sunday morning

  Preparations are under way ahead of Glastonbury Festival starting on Wednesday. On Saturday evening, James Pearce, a Somerset-based paraglider, took to the skies 1,000ft above Worthy Farm to take a peek at the site. He shared images of the view online, showing a sea of colourful tents and stages spanning the landscape. "It's immense up there," he said.

  Mr Pearce paraglides over the site every year, weather permitting. "I love flying. It's a passion and I get a different view of [Glastonbury]. "People don't see the scale of it - that's why I do it," he added. About 200,000 people are expected to attend this year's festival, which will be headlined by Dua Lipa, SZA and Coldplay.

