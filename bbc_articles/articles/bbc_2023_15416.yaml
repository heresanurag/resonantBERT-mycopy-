title: Kibbutz massacre survivor describes attack by Hamas gunmen - BBC News
date: '2023-10-14'
section: General
url: http://www.bbc.co.uk/news/world-middle-east-67101434
content: |-
  Neta Portal describes the horror of a Hamas attack after being shot in the legs six times.

  Twenty-two-year-old Neta Portal told the BBC about surviving the horror of a Hamas attack on an Israeli kibbutz in Kfar Aza on Saturday.

  She explained how her boyfriend told her to get up and run or they would die. Neta was shot in the legs six times.

  She was also reunited with her father, a policeman, in the attack. They hadn't spoken for six years after her parents' divorce.

