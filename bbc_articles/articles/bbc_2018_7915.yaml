id: bbc_2018_7915
title: Build-A-Bear 'pay your age' offer abandoned amid 'chaos' - BBC News
date: '2018-07-13'
section: England
url: http://www.bbc.co.uk/news/uk-england-44809213
content: |-
  Queues of "about a mile long" formed at one shopping centre, prompting calls to police.

  The Rock shopping centre in Bury, Greater Manchester, said queues were building at 10:45 BST

  A cheap teddy offer which left shoppers with young children queuing for up to eight hours amid chaotic scenes has been abandoned over "safety concerns".

  Build-A-Bear Workshop was offering UK customers a chance to buy any bear, which can cost up to £52, for the price of their child's age.

  At Leeds' White Rose Shopping Centre police were called when queues of "about a mile long" formed.

  The company said the response had been "overwhelming and unprecedented".

  There have also been reports of long queues in US shopping centres, where the American company was also putting on the same promotion on Thursday.

  Birmingham's Bullring shop was among those that shut early

  Police were called to the White Rose Centre in Leeds due to the popularity of the "pay your age" event

  Many of the company's stores - including Sheffield's Meadowhall shopping centre, Birmingham's Bullring, Telford and Basingstoke - had to shut for the rest of the day following demand.

  Leeds shopper Paul Shaw said: "Crazy scenes at the White Rose - Build-A-Bear is in chaos.

  "Queuing from the store, all the way outside, approximately five-hour queue. There are even police here trying to keep the peace."

