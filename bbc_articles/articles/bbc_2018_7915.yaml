  On its website Build-A-Bear describes itself as a "one-of-a-kind global brand that kids love and parents trust".

  The US brand was established in 1997 and has made more than 160 million teddy bears to date.

  Build-A-Bear stores offer children a chance to design, stuff and dress their own teddy bear. Customers can even add sounds and scents to their toy.

  Basic bears cost between £12 and £27 with limited edition toys costing more than £50. Clothing for teddies also ranges from £4.50 to £15.

  Amanda Bailey, 42, from Mickleover, Derbyshire, started queuing outside the Derby shop with her two daughters, aged two and five, at 09:10 and did not get inside until 12:40.

  "I thought I would give the queue an hour and then you get sucked in," she said.

  "Once inside it took a further two hours to get her bears because of the "stuffing counter queues".

  She said although she saved quite a bit on the cost of the £21.50 she bought for both children, she added: "When I look back I will probably think, 'what have I done that for?', especially with what I will end up paying for parking."

  Amanda Bailey queued for hours at the Derby store with daughters Paige (pictured) and Amelia

  Jolene Quarrell, 34, of Swadlincote, said she and her friend spent about the same length of time queuing both outside and inside the Derby store.

  "I thought it would be nice for the kids but it's been a bit too hectic to enjoy it," she said.

  Chloe Lythgoe, 19, took her two children to the Warrington store and described the scene as "like something out of a movie".

  "Children were becoming distressed from the waiting and the heat inside the shopping centre," she said.

  Crowds queued through The Centre in Livingston, West Lothian - and spilled out on to the pavement outside

  In a statement on its Facebook page, Build-A-Bear Workshop said: "We understand our guests are disappointed, and we are working to address the situation.

  "We will reach out directly to our valued guests as soon as possible."

