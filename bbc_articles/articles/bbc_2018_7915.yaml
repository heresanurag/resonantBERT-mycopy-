  A mother in Milton Keynes said she had taken her five-year-old daughter out of school to ensure they could get in the queue for a discounted bear.

  "She's only five, they're not really doing much in school that's important at that age," she said.

  Some customers praised the efforts of staff working at stores around the country who remained calm during the situation and offered vouchers to those who could not get in for the event.

  Customers in the Derby shop said it took them another two hours to buy bears once in the store because of extra queues

  Gemma Butler, marketing director at the Chartered Institute of Marketing, said: "This was an ill thought-out and unprofessional promotional execution, one that not only risks their own brand reputation, but has the potential to bring the wider marketing sector into disrepute."

  She added: "If their goal was to highlight demand, Build-A-Bear ought to have considered the consequences of thousands of children going home tonight disappointed and in tears."

  The Intu shopping centre in Chapelfield, Norwich, warned customers the queue was "extremely long"

