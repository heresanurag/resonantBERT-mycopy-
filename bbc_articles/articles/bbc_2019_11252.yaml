title: Make-up’s Big Palm Oil Secret - BBC News
date: '2019-09-01'
section: General
url: http://www.bbc.co.uk/news/stories-49516172
content: |-
  Make-up artist Emmy Burbidge travels to Papua New Guinea to discover the truth about what’s in her make-up, and find out whether there’s a sustainable way of producing the oil used.

  Emmy Burbidge is a make-up artist who runs her own beauty salon in Somerset, and wants to know where palm oil comes from and how it's made.

  Palm oil is used in 70% of cosmetic products, and Emmy says that her customers are increasingly asking whether it's in the products she's using. 20% of palm oil globally is certified as sustainable but it's also responsible for the loss of around 8% of the world's forests between 1990 and 2008.

  The 28-year-old travels to Papua New Guinea to discover the truth about what's in her make-up, and to find out whether there's a sustainable way of producing the oil used in making it.

  Will her trip make her change the way she runs her business?

