title: Kanye West performs at Travis Scott Utopia gig after antisemitism scandal -
  BBC News
date: '2023-08-08'
section: Newsbeat
url: http://www.bbc.co.uk/news/newsbeat-66437674
content: |-
  It's the first public performance since the rapper caused controversy with a series of antisemitic posts.

  Kanye West has not performed in public since sharing antisemitic posts online

  Kanye West made a surprise appearance on stage when he joined Travis Scott at his concert in Rome.

  It's Kanye's first public performance since he caused controversy by posting a series of antisemitic remarks online.

  Fellow US rapper Travis was performing the first gig since his Utopia album - which is currently top of the album charts - was released.

  He said his music had been inspired by Kanye, telling the crowd: "There is no Travis Scott without Kanye West."

  Kanye, who's legally changed his name to Ye, was dropped by brands and banned from social media in October over a string of antisemitic posts.

  He had accused rapper Diddy of being controlled by Jewish people on Instagram, appearing to reference an antisemitic conspiracy theory that a secret cabal of Jewish people is trying to control governments, banks and the media.

  Kanye then tweeted he would go "death con 3 Oon Jewish people", getting him banned there too.

  Brands like Adidas also sought to distance themselves from him - although last week they revealed they had made millions selling his Yeezy trainers.

  Kanye has previously spoken about being diagnosed with bipolar disorder and his mental health struggles.

  His account was re-instated on X, formerly known as Twitter, last week - but he hasn't posted yet.

  Travis Scott's new album Utopia has recently topped the charts

  Kanye's surprise appearance with Travis at the Circus Maximus stadium on Monday night marked his first on-stage performance since the controversy.

  The pair performed Kanye's songs Praise God and Can't Tell Me Nothing together.

  In footage shared from the concert on social media, Travis told the 60,000 fans: "It's been a long journey before we could get here.

  "There is no Utopia without Kanye West. There is no Travis Scott without Kanye West. There is no Rome without Kanye West. Make some noise for Ye."

  The concert followed a last-minute cancellation of Travis' planned live show in front of the pyramids in Egypt.

  Egyptian authorities said they had safety concerns about the concert following the death of 10 fans in a crowd surge at his 2021 Astroworld gig in Houston in the United States.

  Travis has insisted the Egypt gig will still go ahead, promising to share a new date soon.

