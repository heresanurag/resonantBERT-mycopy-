title: Areas of Scotland under new restrictions - BBC News
date: '2020-09-01'
section: Scotland
url: http://www.bbc.co.uk/news/live/uk-scotland-53938337
content: |-
  First Minister Nicola Sturgeon says residents in three of the country's biggest council areas will be unable to make indoor visits to other households.

  The first minister has announced that restrictions on visiting other households are being reintroduced in the Glasgow area, after an increase in cases of coronavirus.

  Nicola Sturgeon announced the move after 66 of the 154 new positive tests were recorded in the Greater Glasgow and Clyde area.

  The restrictions will apply to people living in Glasgow, West Dunbartonshire and East Renfrewshire.

  Earlier the first minister unveiled her plans for the next year and also updated the parliament on the latest on the coronavirus pandemic.

  Here are the headlines from a busy day at Holyrood:
  • Young people will be guaranteed a job, education or formal training under a new £60m "youth guarantee"
  • The Scottish government is to set out its plans for a second independence referendum in a draft bill
  • The first minister announces a new "proximity tracing app" to combat the spread of Covid-19 called 'Protect Scotland'
  • University students could face disciplinary action if they break government coronavirus guidelines
  • A passenger who flew on a Tui flight from Zante to Glasgow has tested positive for coronavirus

  That's all from us here on the live page, please take care and stay safe.
