content: |-
  Jack Laugher claims his third gold of the Games as Tom Daley and Dan Goodfellow also triumph

  This video can not be played To play this video you need to enable JavaScript in your browser.

  England's Jack Laugher secured a third gold medal of the Commonwealth Games on the day Dan Goodfellow and Tom Daley won the synchronised 10m platform. Laugher, already 1m and 3m springboard champion, and Chris Mears added to their 2016 Olympic gold in the men's synchronised 3m springboard event. Scotland's Grace Reid won the women's 1m springboard, ahead of Australian pair Georgia Sheehan and Esther Qin. Matthew Dixon and Noah Williams took silver behind Daley and Goodfellow.

  Daley, who won his fourth Commonwealth gold, and Goodfellow took the title with 405.81 points despite a poor final dive. Dixon and Williams, both 17, won silver with 399.99, with Australia's Domonic Bedggood and Declan Stacey third. Scotland's Jack Heatly and Lucas Thomson had five solid dives to put themselves in medal contention but a poor final effort meant they finished fifth.

  This video can not be played To play this video you need to enable JavaScript in your browser.

  Goodfellow over-rotated in his and Daley's final dive - a forward four and a half somersaults - but the Olympic bronze medallists had built enough of a lead to hold on to gold. Daley, who pulled out of the individual 10m platform through injury, told BBC Sport: "I didn't know if I was going to be able to compete so this medal means a whole lot to me. "I know I've won medals in the past but it's been a smoother journey to get to those competitions whereas this has been a really rough and rocky ride. "It was a close call as to whether I would be pulled from the synchro as well. As a competitor I want to do everything possible to compete. I had massage, compression, ice baths... I did everything I could to get myself in best possible shape." Goodfellow added: "He has been struggling all week but it shows what a great competitor he is. We only did our dives two days ago so we didn't know what would happen." In the final diving event of day nine, Laugher, 23 and Mears, 25, took England's diving medal tally to seven. Brothers Jack and Ross Haslam, 2017 British champions in the absence of Laugher and Mears, finished fifth. Laugher and Mears finished on 436.17 points - clear of Canada on 415.23 in second place, with Australia completing the medals.

