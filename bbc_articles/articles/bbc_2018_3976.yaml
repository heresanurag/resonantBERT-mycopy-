  Reid, 21, won Scotland's second diving medal of the Games with England's Katherine Torrance and Alicia Blagg fifth and seventh respectively. Reid scored 275.30, with Sheehan finishing on 264.00 and Qin on 252.95. Her success follows Heatly winning Scotland's first Commonwealth diving medal since 1958 with bronze in the men's 1m springboard.
