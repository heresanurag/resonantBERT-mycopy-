title: Orkney Islands Council ends investigation into leaving UK - BBC News
date: '2025-06-17'
section: NE, Orkney & Shetland
url: http://www.bbc.co.uk/news/articles/c75rnk7vkq5o
content: |-
  A look at various models of alternative governance found they were too difficult and too expensive.

  Options for greater autonomy were found to be too expensive or too difficult

  Orkney Islands Council has accepted it must remain part of the UK - after spending two years exploring opportunities for greater autonomy. Officials looked into various models for "alternative governance". These included changing their status in the UK or even potentially becoming a self-governing territory of Norway. A report to councillors concluded the proposals were too difficult and too expensive and members agreed to investigate a single authority model to reform how public services are delivered instead.

  Orkney's bid to loosen its ties to the UK made international headlines two years ago. The former council leader, James Stockan, even floated the idea Orkney could rejoin Norway. The islands were gifted to Scotland, along with Shetland, by King Christian I of Denmark and Norway in 1472 as security for a wedding dowry. The debt was never repaid and the islands have remained part of Scotland ever since then. Mr Stockan's quest for constitutional change stemmed from his acute frustration with the financial support Orkney has received from both the Westminster and Holyrood governments. He was backed by his fellow councillors at the time, who voted by 15 votes to six in favour of exploring "alternative models of governance". Mr Stockan left his leadership role and stood down from the council in January last year.

  When the report he set in motion finally appeared before councillors, its conclusion that Orkney had no realistic prospect of changing its relationship with the UK was accepted without comment. Instead, the council is mapping out a new direction with the Scottish government to reform how local services may be delivered in future through the single authority model. It sees health boards and councils work more closely together to deliver services and preliminary talks have been held. Orkney's current council leader, Heather Woodbridge, assured members during their meeting that this was just the start of a more detailed appraisal and implementing the model was not a foregone conclusion. The Scottish government believes the single authority model could also work in Argyll and Bute and the Western Isles. It has indicated it will publish more details and a timeline for implementation by the end of this parliament next year.
