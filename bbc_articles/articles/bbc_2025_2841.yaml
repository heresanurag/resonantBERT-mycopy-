title: 'Derbyshire: Driver knocks over worker after ignoring closure - BBC News'
date: '2025-02-06'
section: General
url: http://www.bbc.co.uk/news/videos/cpwxjnvp4dqo
content: |-
  Derbyshire Police said his actions were "not only unacceptable but criminal".

  A driver who ignored a road closure before reversing into a worker and driving off has been given a suspended sentence.

  John Leonard Muckle drove past closure signs while potholes were being fixed in Locko Lane in Hardstoft, Derbyshire, on 13 May 2024.

  After failing to pass a council truck on one side of the road, Muckle, of Broom Avenue in Pilsley, Chesterfield, tried to go around the other side and in doing so, knocked a worker into the hedgerow.

  On 22 January, Muckle was sentenced to eight months in prison, suspended for 12 months, and banned from driving for a year.

