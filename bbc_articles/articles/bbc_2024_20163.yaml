  At one point earlier this year, Mr Kennedy averaged about 15% in presidential preference polls as an independent candidate. His pitch blended anti-establishment and anti-corporate rhetoric with liberal social positions, environmentalism and controversial vaccine scepticism. But his numbers dwindled, and he announced last week he was suspending his campaign. Although he initially competed to win the Democratic nomination, he ended up criticising his former party and offering his endorsement to Donald Trump. The move dismayed his relatives, who are the most famous family in Democratic politics. Mr Kennedy's campaign attracted a range of bizarre and scandalous headlines. In May, the New York Times ran an article revealing he had told lawyers involved in his 2012 divorce proceedings that he was suffering from a memory issue relating to a dead brain parasite. In mid-July, Mr Kennedy texted an apology to a former family nanny after Vanity Fair magazine published a story in which she accused him of unwelcome sexual advances. “I have no memory of this incident but I apologise sincerely for anything I ever did that made you feel uncomfortable,” he wrote. In comments to the media, he said the Vanity Fair article contained a lot of “garbage” but conceded that he had a “very, very rambunctious youth” and that he was “not a church boy”. Earlier this month, Mr Kennedy was filmed talking to actress Roseanne Barr, recounting the 2014 incident with the dead bear cub. He said a woman had killed the bear with her car when he was driving in a rural area, and he put it in his van with the initial intention of harvesting its meat. But ultimately he thought it would be "amusing" to leave the carcass in New York's Central Park, to make it appear that an errant cyclist had killed the animal. The bear was found the following day. Responding to a BBC request for comment, New York's Department of Environmental Conservation said charges could not be brought for incidents more than a year old.

