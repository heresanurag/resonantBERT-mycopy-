title: Scrutiny over claims RFK Jr cut off dead whale's head - BBC News
date: '2024-08-28'
section: US & Canada
url: http://www.bbc.co.uk/news/articles/cr7rj432835o
content: |-
  Activists say the alleged incident decades ago may have broken conservation laws.

  Robert F Kennedy Jr faces calls from environmentalists for an investigation over a historic claim that he once cut the head off a dead beached whale with a chainsaw to take it home on the roof of his vehicle. A group that supports Kamala Harris for president says Mr Kennedy's alleged removal and transportation of the skull of the whale may have broken the law. Mr Kennedy, 70, has not commented on the incident, detailed by his daughter in an interview 12 years ago. The call for an investigation comes days after he suspended his independent presidential campaign, which was marked by strange twists including his confession that he once dumped the body of a dead bear in New York's Central Park.

  Mr Kennedy has now endorsed Donald Trump for the presidency, and has been offered a place on the Republican candidate's transition team if he is elected. The incident with the whale's head, which dates to around 1994, was recounted by Kathleen "Kick" Kennedy in a 2012 interview with Town & Country magazine. Mr Kennedy, who is said to enjoy studying animal skulls and skeletons, reportedly heard that the dead animal had washed up in Hyannis Port, Massachusetts, where the family was staying. He went to the beach to cut off the head with a chainsaw, and then proceeded to tie it to the roof of the family minivan with bungee cords. The family then drove back to their home in New York, Ms Kennedy said. "Every time we accelerated on the highway, whale juice would pour into the windows of the car, and it was the rankest thing on the planet," Ms Kennedy told the magazine. "We all had plastic bags over our heads with mouth holes cut out, and people on the highway were giving us the finger, but that was just normal day-to-day stuff for us."
  • None RFK Jr just endorsed Trump. Will it matter in November?
  • None Analysis: Dead bear another strange twist in RFK Jr's campaign The call for an investigation was made by the Center for Biological Diversity Action Fund, which has publicly endorsed Democratic candidate Kamala Harris for president. The group wrote a letter to set out their case to marine protection officials at the National Oceanic and Atmospheric Administration (Noaa). The letter, quoted by US media, said Mr Kennedy may have broken multiple federal laws by collecting wildlife body parts and transporting them across state lines. “Vital research opportunities are lost when individuals scavenge a wildlife carcass and interfere with the work of scientists," the group's political director Brett Hartl wrote. "This is particularly true of marine mammals, which are some of the most difficult wildlife species in the world to study,” Mr Hartl added. Noaa confirmed to the BBC that it received the letter and was compiling a response. Mr Kennedy has not confirmed receipt of the letter. The BBC has approached his campaign for comment.

