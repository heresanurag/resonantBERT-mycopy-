title: Vladimir Putin's North Korea visit confirmed for this week - BBC News
date: '2024-06-19'
section: World
url: http://www.bbc.co.uk/news/articles/cv22l88pr4po
content: |-
  Russia's president is due to meet Kim Jong Un on Tuesday, his first visit to North Korea since 2000.

  Russian President Vladimir Putin will travel to North Korea on Tuesday, the Kremlin has confirmed, after months of speculation over the much-hyped visit. After Kim Jong Un’s big green bulletproof train trundled around Russia’s Far East last year, the North Korean leader invited Mr Putin to visit him. That invitation was duly accepted. Over the past week sources had hinted that the visit was imminent, and satellite images had also spied apparent preparations under way in North Korea. With the “when” answered, next comes the clamouring for any news of deals done, any consequences for the war in Ukraine, as well as any eye-popping images of the pomp and ceremony that will surely accompany the two leaders' visit. The Kremlin has described the event as a “friendly state visit” with Russian media reporting Mr Putin and Mr Kim may sign a partnership agreement, including on security issues, and give joint statements to the press. But why does it matter and why now? Firstly, there is a natural curiosity given it will only be Mr Putin’s second time in North Korea - the first being in 2000 at the start of his presidential career, when Mr Kim's father, Kim Jong Il, was still supreme leader. But beyond that, this is a relationship that (though not at the levels enjoyed during the Soviet Union) has now gone from mutual pleasantries to mutual benefits, and it has the West worried. The Kremlin has said there is scope for "very deep relations" between Russia and North Korea, and although it said this shouldn’t concern anyone, it recommended those thinking of challenging the burgeoning ties to think again. There has been a lot of speculation about what exactly the two sides want from one another. And it seems to boil down to security of supplies. Russia is likely seeking ammunition, construction workers, even volunteers to go to the front line in Ukraine, says political scientist and Putin ally, Sergei Markov. In reply, Pyongyang could get Russian produce, as well as technological help for military goals, including its long-range missile programme ultimately to be within striking distance of the US, Mr Markov adds.

  Russia has grown increasingly isolated internationally after its invasion of Ukraine

  There is no doubt that Russia needs to feed its war in Ukraine. A recent Bloomberg report, citing South Korea’s defence ministry, suggests North Korea has shipped nearly five million artillery shells to Russia. Finding a partner that shares a keen disdain of sanctions and the West, and therefore one that wants to trade, is a major selling point for Russia. After all, Russia and North Korea are the two most-sanctioned countries in the world – North Korea for developing nuclear weapons and launching a series of ballistic missile tests. Earlier this year, Moscow dealt sanctions against Pyongyang a serious blow by vetoing a UN Security Council resolution to extend the panel overseeing them. And there may even be a real friendship between the two leaders, albeit a cautious and business-like one. In February, Mr Putin gifted Mr Kim a luxury Russian limousine (in violation of UN sanctions). Mr Kim said North Korea is an "invincible comrade-in-arms" with Russia in a recent message to President Putin. But it could just be business and a lack of other options. Put bluntly: North Korea is now of greater value to an isolated Russia - and North Korea sees Moscow needs friends.

