title: Great white shark follows police off Australian coast - BBC News
date: '2018-04-04'
section: General
url: http://www.bbc.co.uk/news/world-australia-43646190
content: |-
  They were patrolling off the South Australian coast when they noticed something behind them.

  Police patrolling off the coast of South Australia spotted a great white shark tailing them on Saturday.

  The team were doing checks on boats in the area.
