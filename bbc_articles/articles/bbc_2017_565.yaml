content: |-
  A two-week-old baby orangutan makes its public debut at Brookfield Zoo in Chicago.

  A two-week-old baby orangutan has made its public debut at Brookfield Zoo in Chicago.

  The Bornean orangutan was born on 20 December and was described as "significant to the zoo population" by the Chicago Zoological Society.
