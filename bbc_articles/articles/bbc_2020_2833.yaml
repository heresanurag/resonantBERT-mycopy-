title: 'Super Tuesday: What unites bitter rivals Biden and Sanders? - BBC News'
date: '2020-03-04'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-51732112
content: |-
  Joe Biden and Bernie Sanders gave victory speeches and made some not-so-subtle digs at each other.

  Joe Biden and Bernie Sanders have emerged as the two frontrunners in the Democratic race to challenge Donald Trump for the US presidency in November.

  The two men gave victory speeches on Super Tuesday night and without naming names, they made some not-so-subtle digs at each other.

  And even less subtle jabs at President Trump.
