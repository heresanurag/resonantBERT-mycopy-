title: Non-swimming otters rehomed in Lincolnshire take the plunge - BBC News
date: '2025-04-26'
section: General
url: http://www.bbc.co.uk/news/videos/cwy0ddvzey2o
content: |-
  Staff at the Ark Wildlife Park use fish to try and encourage the reluctant otters into the water.

  A wildlife park in Lincolnshire is trying to coax two otters that are unable to swim into the water with some fishy treats.

  The Ark Wildlife Park in Stickney, near Boston, has just welcomed the Asian short-clawed otters named Indigo and Bronte.

  The park's owner Jamie Mintram said the otters, which were rescued from the exotic pet trade, had most likely been separated from their mother at an early age, so had not learnt to swim.

  It is hoped the pair will now take the plunge and progress to a larger pool in their enclosure.

