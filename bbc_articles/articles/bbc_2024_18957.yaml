title: Funeral held for Southport victim Bebe King - BBC News
date: '2024-08-17'
section: Liverpool
url: http://www.bbc.co.uk/news/articles/c990p73my48o
content: |-
  Six-year-old Bebe was the youngest of the three girls killed in the knife attack at a dance class.

  Bebe King was described by her parents as "our shimmering star"

  A funeral has been held for Bebe King - the youngest of the three girls killed in the Southport knife attack. The six-year-old was killed along with Elsie Dot Stancombe, seven, and nine-year-old Alice da Silva Aguiar at a Taylor Swift-themed dance class in the Merseyside town on 29 July. Bebe’s parents said her nine-year-old sister Genie witnessed the attack but managed to escape. The family asked for privacy in and around the ceremony, which was held in Southport, and instead encouraged people to light a candle in her memory.

  Ben and Lauren King paid tribute to their daughter Genie (bottom right), who survived the attack

  Bebe was described by her parents Lauren and Ben King as a "sweet, kind, and spirited girl" who was "full of joy, light and love". They said Genie had shown "incredible strength and courage", adding: "Her resilience is a testament to the love and bond she shared with her little sister, and we will continue to support her as we navigate this painful journey together as a family." Mr and Mrs King also thanked members of the emergency services and the wider community for their support, which had "deeply touched our hearts". In a post on social media, Southport MP Patrick Hurley said: "Today is the funeral of Bebe King. My thoughts and prayers are with her family through this difficult time. "In honouring their wishes for a private funeral, I encourage anyone who wishes to pay their respects to light a candle in Bebe's memory and to work for a better future." The funeral of Alice da Silva Aguiar took place in Southport last Sunday.
