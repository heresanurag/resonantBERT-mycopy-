title: 'In pictures: World leaders gather for G20 summit - BBC News'
date: '2018-12-01'
section: World
url: http://www.bbc.co.uk/news/world-46394992
content: |-
  The Buenos Aires summit brings together the heads of the 20 most industrialised nations.

  One person who won't be arriving in time for Friday's opening of the G20 is German Chancellor Angela Merkel, who was seen emerging from her plane in a rainy Cologne after it made a forced landing due to a technical problem on Thursday evening. She resumed her journey on Friday morning
