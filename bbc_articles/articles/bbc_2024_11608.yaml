title: Prince William to attend England v Denmark at Euro 2024 - BBC News
date: '2024-06-12'
section: England
url: http://www.bbc.co.uk/news/articles/clddg94den4o
content: |-
  Prince William will watch England's second Euro 2024 group game in Frankfurt, Germany, next week.

  Prince William visited the England squad before they left for Germany

  Prince William is going to attend the England football game against Denmark in Germany next week, says Kensington Palace. He will be travelling to see England's second group stage match, after the Three Lions kick off their Euro 2024 tournament against Serbia on Sunday. The Denmark fixture will be played on Thursday 20 June in Frankfurt. The Prince of Wales, president of the Football Association, visited the England team earlier this week before they flew out to Germany and presented shirts to the 26 players in the squad.

  Speaking at the St George's Park training centre on Monday, Prince William said he had given the team some unorthodox advice. He told the players that during the school run his son Prince Louis had said the England team should "eat twice the amount you normally would eat". "So I then had visions of all of you running around with massive great tummies and loads of stitches on the pitch, so I think maybe take my youngest's advice with a pinch of salt."

  Prince William presented the FA Cup to Manchester Utd last month

  An enthusiastic Aston Villa fan, Prince William presented the FA Cup to Manchester United last month, accompanied at the final by his son Prince George. Prince William's father, King Charles, also appeared to have become interested in football punditry. The King, who supports Burnley, appeared to be sharing his thoughts on England's chances with David Beckham, at an event at St James's Palace on Tuesday evening. After England's faltering preparations, and a loss against Iceland, Beckham had said they were only "warming up". Diplomatically, the King said: "You don't want to expend it all in one go at the beginning."

  Prince William did not attend the World Cup in 2022, which was held in Qatar amid some political controversy, citing a busy schedule. He was criticised for not going to watch the England women's football team, the Lionesses, when they reached the World Cup final in Australia last year. His role as FA president covers both England men's and women's sides So far in 2024 the prince has reduced his travel, after his wife Catherine's cancer diagnosis. Overseas visits have been limited to taking part in the D-Day commemorations in France this month. The Euro 2024 game against Denmark next week, played in Frankfurt, will come a day before the prince's 42nd birthday. He was just 23 when he took on the role of FA president and one of his first duties was to attend the 2006 World Cup in Germany that summer. He showed his support for England in their opening match against Paraguay, which was also played in Frankfurt. During the 2022 World Cup, he said he would be supporting both England and Wales, given his role as the Prince of Wales. Scotland have also qualified for Euro 2024 and will play their first match against hosts Germany on Friday evening.
