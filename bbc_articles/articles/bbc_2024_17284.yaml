  Former captain Eoin Morgan, who led England to the 50-over world title five years ago, has already distanced himself from the role. Ex-England all-rounder Andrew Flintoff, who has been part of Mott’s backroom staff and is currently leading Northern Superchargers in The Hundred, is one candidate, having being tipped as a future head coach of the national side by Key. Jonathan Trott, the former England batter, has impressed as head coach of Afghanistan but has just taken a role as head coach of the Pretoria Capitals in the SAT20. Australian Mike Hussey, current head coach of Welsh Fire in The Hundred, has previously been part of England's coaching team. Whoever takes over will have to deal with a congested schedule. Many of England’s white-ball assignments are crammed in between or even during Test series, meaning some first-choice players are often unavailable. Key split the England head coach jobs after Chris Silverwood left in 2022. Brendon McCullum took the Test job and the white-ball reins were given to Mott, previously in charge of an all-conquering Australia women’s team. At the end of his first series in charge, Mott lost Morgan, who retired after the tour of the Netherlands. However, Buttler had long been touted as the skipper’s successor and England were able to add the T20 world title to the 50-over crown in Melbourne in 2022. Little has gone right since then. The defence of the 50-over World Cup in India was dogged with problems and heavy defeats, leaving Mott and Buttler under intense pressure. They were given the chance of redemption at the T20 World Cup, only to be put on the brink of elimination by a washed-out match against Scotland and a heavy defeat by Australia. England recovered to reach the semis, where they were outclassed by a vastly superior India side. Mott leaves with a losing record in one-day internationals, having lost 18 and won 16 of his completed matches in charge, but a better record in T20s, where he has 23 wins and 19 defeats. Whoever becomes Mott’s permanent successor will have the job of regenerating an England team. Many of the players that made England the first men’s team to hold both white-ball world titles simultaneously have either moved on or are coming to the end of their careers. Beyond the Champions Trophy, the next T20 World Cup is in 2026, the 50-over World Cup is next held in 2027 and a T20 cricket tournament will be part of the 2028 Olympics.
