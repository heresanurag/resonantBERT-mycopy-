  “After three World Cup cycles in a short space of time, I now feel the team needs a new direction to prepare for the challenges ahead,” said Key. “This decision was not made lightly, but I believe it is the right time for the team's future success. “With our focus shifting towards the Champions Trophy early next year and the next cycle of white-ball competition, it is crucial that we ensure the team is focused and prepared.” Mott, who had previously expressed a desire to stay in the role, said: “I would like to thank the players, management, and everyone at the ECB for their commitment, support, and hard work during my time. I leave with many great friendships and incredible memories.”

