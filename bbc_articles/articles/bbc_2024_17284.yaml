title: 'Matthew Mott: England cricket white-ball coach steps down from role but Jos
  Buttler to remain captain - BBC Sport'
date: '2024-07-30'
section: England
url: http://www.bbc.co.uk/sport/cricket/articles/cz9xz36ql00o
content: |-
  Matthew Mott steps down from his role as white-ball coach after England's disappointing performances in the 50-over and 20-over World Cups.

  Matthew Mott became England white-ball coach in May 2022

  Matthew Mott has stepped down as white-ball head coach after England failed to defend either of the limited-overs World Cups. Jos Buttler is to remain as captain, with assistant coach Marcus Trescothick put in temporary charge for the series against Australia in September. Australian Mott, 50, was appointed when England split the head coach roles in 2022 and later that year presided over the triumph at the T20 World Cup in his home country. But England, champions in 2019, endured a calamitous 50-over World Cup in India last year, winning only three of their nine matches. And they surrendered the T20 title in the Caribbean and United States in June, beaten in the semi-finals by eventual champions India. A run to the last four seemed like a minimum requirement for Mott to keep his job, though England managed to win just one of the four games they played against other Test-playing sides. Immediately after the T20 World Cup, England managing director Rob Key offered no assurances that Mott or Buttler would stay in their roles. Key has reviewed the tournament and held talks with both men. Buttler is to stay on and Mott exits two years into a four-year contract. England will now look for a head coach to build towards the next major tournament, the Champions Trophy in Pakistan early next year.
