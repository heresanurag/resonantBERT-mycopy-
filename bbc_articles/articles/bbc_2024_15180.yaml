  Barbora Krejcikova holds off a charge from Jasmine Paolini in a gripping Wimbledon final to earn her second Grand Slam singles title.

  This video can not be played To play this video you need to enable JavaScript in your browser. Krejcikova seals first Wimbledon title with win over Paolini

  Barbora Krejcikova held off a charge from Jasmine Paolini in a gripping final at Wimbledon to claim her second Grand Slam singles title. Krejcikova, a French Open winner in 2021, held her arms aloft as she sealed a 6-2 2-6 6-4 victory on her third championship point. She shared a warm embrace with Paolini at the net before looking up and blowing a kiss towards the sky. With the victory, Krejcikova, 28, has emulated her late friend and coach Jana Novotna. The 1998 Wimbledon champion died from ovarian cancer in 2017 at the age of 49. "Jana was the one who told me I had the potential and I should definitely turn pro and try to make it. Before she passed away she told me to go and win a Slam," Krejcikova said of her fellow Czech. "I achieved that in Paris in 2021 and it was an unbelievable moment for me, and I never really dreamed that I would win the same trophy as Jana did in 1998." The 31st seed also followed in the footsteps of 2023 champion Marketa Vondrousova to make it back-to-back triumphs for the Czech Republic in the women's singles. In keeping with Wimbledon tradition, Krejcikova clambered up to the players' box to celebrate with her team and family, many of whom were in tears. "I don't have any words right now - it's just unbelievable, it's definitely the best day of my tennis career and also the best day of my life," she added. As the magnitude of her achievement sank in, Krejcikova, trophy in hand, burst into tears as she left Centre Court. The result is a second straight Grand Slam final defeat for Paolini, who fell to Iga Swiatek in straight sets in last month's French Open showpiece. The 28-year-old was bidding to become Italy's first women's singles champion at Wimbledon.

  This video can not be played To play this video you need to enable JavaScript in your browser. Barbora Krejcikova reacts as she becomes Wimbledon 2024 women's singles champion

  With both players being unexpected finalists, it was guaranteed there would be a first-time women's champion for the seventh Wimbledon in a row. And after nearly two hours on court, it was Krejcikova's name that was etched on the Venus Rosewater Dish. It had been a difficult season until now for Krejcikova, who has been hampered by a back injury and illness. Between the end of January's Australian Open and this month's Championships, she had played nine singles matches, winning just three. Now she has won through seven matches in the space of two weeks. "Two weeks ago [in the first round against Veronika Kudermetova] I had a very tough match, and I wasn't in good shape before that because I was injured and ill," Krejcikova said. "I didn't really have a good beginning to the season. It's unbelievable I'm stood here now and I've won Wimbledon. I have no idea [how it happened]." A seven-time major winner in women's doubles, and a three-time champion in mixed doubles, Krecjikova holds an incredible 12-1 overall win-loss record in Grand Slam finals. She will receive £2.7m in prize money for winning this year's women's singles at Wimbledon.

  This video can not be played To play this video you need to enable JavaScript in your browser. Paolini wins spectacular point in the second set against Krejcikova

  Paolini's career has been on an spectacular upwards trajectory over the last 12 months. A late bloomer, she won a prestigious WTA Tour title in Dubai in February before going on a surprising run to the final of the French Open - the first time she had been beyond the fourth round of a major. Her staggering run at Wimbledon showed her appearance in that Roland Garros final was no fluke. The seventh seed has become a fan favourite at the All England Club thanks to her bubbly attitude and sheer doggedness to fight for every point. At the end of a first-set drubbing, Paolini headed off court to reset before emerging with a new-found determination. Having initially appeared to lack her usual cheery energy, she was soon giving fist pumps and a steely look, and she struck early in the second set to get back on track. Backed by the crowd and blessed with a never-say-die attitude, Paolini broke serve again at 5-2 to force a decider - to the delight of many inside Centre Court. Yet Krejcikova did not go away, firing booming groundstrokes until momentum swung her way when Paolini double-faulted to give away the all-important break. Despite fighting until the very end, the 5ft 4in Italian eventually lofted a backhand long on the third championship point. "The last two months have been crazy for me," said a smiling Paolini, who had never won a tour-level match on grass before June. "Today I am a little bit sad. I try to keep smiling because I have to remember today is still a good day. I made the final of Wimbledon."

  Krejcikova won the French Open in 2021 and now has a second major singles title
