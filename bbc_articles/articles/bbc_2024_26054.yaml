title: 'Michael Newman: David Hasselhoff leads tributes to Baywatch star - BBC News'
date: '2024-10-23'
section: Culture
url: http://www.bbc.co.uk/news/articles/c4g7z73n39lo
content: |-
  Michael Newman, who has died aged 68, was a real lifeguard as well as acting in the 1990s TV series.

  Hasselhoff says co-star 'saved my life four times'

  Newman was a real lifeguard and a firefighter as well as acting in the hit show

  David Hasselhoff has led tributes to his former Baywatch co-star Michael Newman, following his death at the age of 68. In a tribute on Instagram,, external Hasselhoff said Newman, who was a real lifeguard as well as an actor, "saved my life at least four times" while filming the hugely popular 1990s TV series. Only Hasselhoff, who played Mitch Buchannon, and Jeremy Jackson, who played Mitch's son Hobie, appeared in more episodes than Newman. His death came eight years after he was diagnosed with Parkinson's disease.

  Paying tribute, Hasselhoff posted a picture of the pair together and wrote: "Newman was a warrior... he literally saved my life at least four times. "He did the transfer from the scarab [speedboat] to jet skis several times perfectly. What an amazing man. "He was never afraid of the water. I remember directing him in a few episodes and he was really good. He became a great actor. We will all miss him." In his own post, Jackson said he was "so fortunate" and "honoured to have crossed paths" with Newman. He described him as a "true leader", adding: "There [will] never ever be another warrior like this."

  Hasselhoff (pictured centre, standing in front of Newman), described his former co-star as a "warrior"

  Newman's death was confirmed by his friend, film-maker Matthew Felker, who recently directed the docuseries After Baywatch: Moment In The Sun. "Few of us are lucky enough to have someone like Mike Newman enter and change their life," he wrote on Instagram. Days prior to his death, Felker said Newman had joked that his visit was "just in time". "That was Mike - he found humour all the way until the end," Felker said. Baywatch actress Gena Lee Nolin, who played Neely Capshaw, replied to Felker's tribute, saying: "Rest in Peace Newmie. He will be remembered and greatly missed by so many. One of the good ones through and through." Newman was also a full-time firefighter and continued to work while filming the hit US drama, which ran from 1989 to 1999. The actor also starred in a number of Baywatch spin-offs including Baywatch Hawaii, Baywatch: White Thunder At Glacier Bay and Baywatch Nights. Newman did not go on to many other acting roles, but did appear in the 1999 film Enemy Action with C Thomas Howell and Louis Mandylor. Newman spent his latter years working with the Michael J Fox Foundation to help find a cure for Parkinson's disease.
