title: Chile wildfires destroy scores of homes in Valparaiso - BBC News
date: '2017-01-03'
section: General
url: http://www.bbc.co.uk/news/world-latin-america-38493113
content: |-
  Hundreds of people are evacuated from Valparaiso, Chile, as forest fires set homes alight.

  Hundreds of people were evacuated from the port-city of Valparaiso, Chile, after forest fires set homes alight.

  The wildfires have been fanned by high temperatures and strong winds.
