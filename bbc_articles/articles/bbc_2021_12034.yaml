title: 'Sabina Nessa: Murder arrest as police issue CCTV appeal - BBC News'
date: '2021-09-24'
section: London
url: http://www.bbc.co.uk/news/uk-england-58671588
content: |-
  A 38-year-old is arrested in Lewisham as police release an image of a second man they are searching for.

  A man was captured on CCTV walking in Pegler Square

  A 38-year-old man has been arrested on suspicion of the murder of Sabina Nessa in south-east London, the Metropolitan Police said.

  Ms Nessa's body was found by a member of the public in Cator Park in Kidbrooke.

  Officers believe the 28-year-old teacher was attacked shortly after leaving her home in Astell Road at about 20:30 BST on Friday.

  The force has also released an image of another man they are searching for.

  The image shows a figure of a person walking through nearby Pegler Square.

  An image of a silver car it is believed he had access to - and that police are searching for - has also been released.

  Sabina Nessa was found near the One Space community centre in Kidbrooke

  The arrested man was held at an address in Lewisham and remains in custody.

  Police said a post-mortem examination carried out on Monday was inconclusive.

  Another man in his 40s who was held on suspicion of murder the day after Ms Nessa's body was found was later released under further investigation.

