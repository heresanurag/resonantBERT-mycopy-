title: '''Being sectioned felt like a punishment'' - BBC News'
date: '2021-01-15'
section: General
url: http://www.bbc.co.uk/news/uk-55681934
content: |-
  Antonio says he felt he was discriminated against because of his skin colour when he was sectioned.

  Black people are four more times more likely than white people to be sectioned under the Mental Health Act, according to NHS figures.

  When Antonio Ferreira was sectioned he says he felt he was discriminated against because of his skin colour.

  Now a student at Essex University, he hopes to improve police understanding of mental health problems.

  If you are experiencing emotional stress, help and support is available via BBC Action Line.
