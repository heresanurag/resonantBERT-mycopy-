title: Princess Diana's iconic sheep sweater was lost...then found again - BBC News
date: '2023-09-08'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-66758333
content: |-
  Misplaced for decades, the garment was rediscovered in an attic earlier this year.

  The former Princess of Wales first wore the sweater in 1981, a month before her wedding to then Prince Charles. Misplaced for decades, it was rediscovered in an attic in March this year.

  On Thursday, the sweater was sold for $1.14 million (£920,000) at an auction by Sotheby's in New York.
