title: Lucy Letby seeks attempted murder conviction appeal - BBC News
date: '2024-09-21'
section: England
url: http://www.bbc.co.uk/news/articles/cr75enxd95jo
content: |-
  The former neonatal nurse murdered seven babies and attempted to murder seven others.

  Lucy Letby was a neonatal nurse at the Countess of Chester Hospital

  Serial child killer Lucy Letby will seek to challenge the last of her convictions at the Court of Appeal next month. The former neonatal nurse denies attempting to murder a baby at the Countess of Chester Hospital in February 2016 but was convicted in July and given a 15th whole-life prison term. In August 2023, Letby was found guilty of murdering seven babies and attempting to murder six others, one of whom on two occasions. Judges will consider her latest appeal application on 24 October.

  Letby's bid to challenge her original 14 convictions was rejected in May. A public inquiry into the events surrounding Letby's crimes, chaired by judge Lady Justice Thirlwall, began at Liverpool Town Hall earlier this month. The judge said the inquiry's hearings would finish in early 2025, and she expected to publish her findings by late autumn of that year. Earlier this month, Letby's new barrister Mark McDonald told the BBC he planned to make an application to the Criminal Cases Review Commission (CCRC). The CCRC investigates potential miscarriages of justice and can refer cases back to the Court of Appeal for consideration.
