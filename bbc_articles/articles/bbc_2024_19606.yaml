  Dreamland said the ride automatically stopped as a result of the incident, passengers were escorted off the ride and given a precautionary check by its first aid team. They said: "The ride is currently not in operation whilst the qualified engineers carry out a full investigation and track damage is repaired."

  There was a fault on the Scenic Railway at Dreamland in Margate on 10 August

  The Scenic Railway was built in 1920 and is the fourth oldest surviving rollercoaster in the world. Dreamland has been contacted for more information on when the ride will reopen.
