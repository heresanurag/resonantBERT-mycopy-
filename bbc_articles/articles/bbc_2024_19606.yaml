title: 'Kent: UK''s oldest rollercoaster remains closed after track damage - BBC News'
date: '2024-08-22'
section: Kent
url: http://www.bbc.co.uk/news/articles/c2047711rxqo
content: |-
  Visitor Micah Fagan said: "I heard an enormous crunch of wood splitting...it didn’t sound right."

  The Scenic Railway is considered to be the heart of Dreamland

  The UK's oldest surviving rollercoaster is still closed following what visitors described as an "enormous crunch". On 10 August, there was a fault on the Scenic Railway at Dreamland in Margate which damaged pieces of the wooden track. Dreamland said the ride would be out of action while engineers carried out a full investigation and the track was repaired. Chatham resident Micah Fagan, who was planning to go on the ride shortly before the incident, said: "I heard an enormous crunch of wood splitting... it didn’t sound right."

  Mr Fagan said his partner also saw the damage happen and added everyone involved in the incident, including staff, were "super calm". He said: “It is one of the main attractions of Dreamland. If you are from the area you have always known about it.”

