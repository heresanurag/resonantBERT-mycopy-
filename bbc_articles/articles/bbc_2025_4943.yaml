title: Appeal for mother of newborn boy found dead in bag outside church - BBC News
date: '2025-03-26'
section: London
url: http://www.bbc.co.uk/news/articles/cn520z166wlo
content: |-
  The baby's body was found in a shopping bag outside a church by a council refuse worker on Tuesday.

  Appeal for mother of newborn boy found dead in bag

  The baby was declared dead at the scene

  Police have appealed for the mother of a newborn baby boy found dead in a Marks & Spencer shopping bag outside a west London church to come forward. Officers were called at 12:46 GMT on Tuesday to Powis Gardens after a council refuse worker spotted the bag outside the church. London Ambulance Service attended and the boy was declared dead at the scene. At a press conference outside All Saints Church in Notting Hill on Wednesday morning, Supt Owen Renowden from the Met Police said: "My priority remains with the mother's welfare and health. We are really worried about her wellbeing as she will have recently given birth."

  Supt Renowden added: "I know she will likely be feeling very frightened and going through an extremely difficult time. "If you are the baby's mother and you see this today, I want to appeal directly to you to come forward and receive help."

  Police are concerned about the welfare of the mother

  The deputy warden at the church told BBC London she had "never heard anything like this in my life" after the discovery of the baby boy. "I came here to prepare for the food bank and I just saw loads of police arriving, and when I came out it was all taped over," Marcia Haynes said. Ms Haynes said when she found out that a baby had died "it just freaked me out, and I just had to abandon what I was doing and go home because I thought I was going to be ill, to be honest". She said she had let two female police officers in to search the church on Tuesday.

  The BBC understands the Met believes there is nothing to suggest a connection between this baby found in Notting Hill and three siblings abandoned in east London between 2017 and 2024. Those children, known as Elsa, Roman and Harry, were found in 2024, 2019 and 2017 respectively, with the investigation into the identity of their parents also continuing.
