  "I honestly think it helped with the pain because the adrenaline of the engagement as well as the buzz of finishing the marathon," she told BBC Radio Wales Breakfast. "I did not have a clue that he was going to propose," she added.

  Thomas says fitness is a "big part" of their life together

  "I knew I wanted to do something related to fitness because it's a big part of our life together," Mr Grenfell said. "When she told me she wanted to do the Tenby Marathon I thought this is the perfect opportunity."
