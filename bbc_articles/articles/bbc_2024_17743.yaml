title: Tenby Marathon runner gets engaged at race finish - BBC News
date: '2024-07-08'
section: Wales
url: http://www.bbc.co.uk/news/articles/cn4v587dm2zo
content: |-
  Sarah John from Pembrokeshire says her boyfriend's proposal was the "most thoughtful".

  Sarah John had no clue her boyfriend of seven years would propose at the Tenby Marathon

  A marathon runner who saw her partner down on one knee as she crossed the finish line said the moment was "the most thoughtful proposal I could have ever imagined". Sarah John, 26, from Pembrokeshire, said it felt "incredible" when Thomas Grenfell popped the question at the end of the Tenby Marathon. Mr Grenfell, also 26, from Cwmdu, Powys, said: "It all worked out absolutely perfectly." The couple have been together since meeting in their first year at University of South Wales seven years ago.

  "We went through university together, all of Covid, got our first house together this year and now we are engaged," said Ms John, who said yes at the finish line of her second marathon. "I was so overwhelmed anyway, looking around to spot all of my family," she said. "So to turn and see Tom down on one knee at the end was the most incredible feeling ever.

