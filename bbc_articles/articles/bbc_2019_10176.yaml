title: Tear gas used at Hong Kong protests - BBC News
date: '2019-08-24'
section: General
url: http://www.bbc.co.uk/news/world-asia-china-49459522
content: |-
  Police use tear gas and charge barricades as Hong Kong has another weekend of protests.

  Police attempting to control another weekend of protests in Hong Kong use tear gas and charge demonstrators who had constructed barricades across the city's streets.
