title: Glasgow tower blocks demolished by controlled explosions - BBC News
date: '2025-03-24'
section: General
url: http://www.bbc.co.uk/news/videos/c4g07kzp9keo
content: |-
  Three 1960s tower blocks in Glasgow have been demolished to make way for nearly 400 new homes.

  Three 1960s tower blocks have been brought crashing down in seconds by demolition experts, changing the skyline of northern Glasgow.

  The 26-storey towers at Wyndford Road were destroyed using using controlled explosions to make way for 386 new homes.

  The Wyndford estate was built in the Maryhill area of the city, on the site of the old Glasgow City barracks.

  The four 26-storey blocks and several smaller high-rise buildings at one point provided homes for around 6,000 people.

  Locals gathered near the estate to watch the demolition, with some saying it brought back memories for them.
