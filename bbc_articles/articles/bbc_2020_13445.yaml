url: http://www.bbc.co.uk/news/world-asia-china-54957211
content: |-
  Stephen Ellison jumped into the river after the unnamed 24-year-old slipped on rocks and fell.

  A British diplomat has saved a student who was floating face down in a river near Chongqing in south-west China.

  61-year-old Stephen Ellison, who is only a month into his new post as consul general, jumped in after the 24-year-old woman slipped on rocks and fell.
