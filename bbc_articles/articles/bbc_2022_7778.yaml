  Singaporean dancer Janice Ho speaks to the BBC about portraying the Queen at the Jubilee Pageant.

  Singaporean dancer Janice Ho will play the Queen in the Jubilee Pageant on Sunday. Her dance performance symbolises the responsibility of the throne and will feature a dragon puppet the size of a double-decker bus.

  Ahead of the Pageant, Janice spoke to the BBC about the pressures of portraying the monarch and the demands of the role.
