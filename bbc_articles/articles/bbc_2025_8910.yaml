  When asked if he still has a 'North Star' achievement following his emotional Masters win, McIlroy added: "Not necessarily. I think everyone saw how hard having a North Star is and being able to get over the line. "If I can try to get the best out of myself every week, I know what my abilities are, I know the golf that I can play and if I keep doing that every week, especially in these four big ones each year, I know I'll have my chances." Having won all four majors, McIlroy's next significant achievement could be to match Sir Nick Faldo's European record of six major titles. "I've always said I'm not going to put a number on it," added McIlroy, who will play alongside world number one Scottie Scheffler and defending champion Xander Schauffele during the first two rounds of the US PGA. "I've talked about becoming the best European ever or the best international player, whatever that is, but the numbers tell one thing and it might not be the full story. "I feel like I burdened myself with the career Grand Slam stuff and I want to enjoy this. I want to enjoy what I've achieved and enjoy the last decade or whatever of my career. "I don't want to burden myself with numbers or statistics. I just want to play the best golf I can."

