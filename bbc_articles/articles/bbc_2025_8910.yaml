content: |-
  Rory McIlroy says his refusal to speak to Bryson DeChambeau in the final round of the Masters was not personal and simply part of his desire to win at Augusta.

  'I'm not going to be DeChambeau's best mate'

  McIlroy explained his decision to keep conversation to a minimum with Bryson DeChambeau during the Masters final round

  Coverage: Thursday, 15 May - live text from 13:00 BST on BBC Sport website and app. Live radio commentary on BBC Radio 5 Sports Extra from 13:00-19:00

  Rory McIlroy says he was not going to be Bryson DeChambeau's "best mate" at the Masters after refusing to speak to him during the final round. McIlroy played alongside DeChambeau for the closing round at Augusta, pitting the rivals against each other again after the American's dramatic US Open win in 2024. After carding a disappointing final-round 75 to finish tied fifth as McIlroy claimed the Green Jacket to complete a career Grand Slam, DeChambeau said the Northern Irishman "didn't talk to me once all day". "I don't know what he was expecting," said McIlroy, who tees off at the US PGA Championship later on Thursday (13:22 BST). "Like, we're trying to win the Masters. I'm not going to be his best mate out there. "Everyone approaches the game in different ways. I was focused on myself and what I needed to do and that's really all that it was. "It wasn't anything against him, that's just what I felt I needed to do to try and get the best out of myself on that day." McIlroy returns to major action in the US PGA at Quail Hollow, where he has won four PGA Tour events. He said he wants to "create a few more highlights" but admits he may never beat the feeling he had when he won the Masters. The 36-year-old hopes to become the first player to win back-to-back majors since Jordan Spieth claimed the Masters and US Open in 2015. While McIlroy described the outpouring of congratulatory messages following his Masters win as "absolutely amazing", he suggested he is far from finished. "Everyone needs to have goals and dreams and I've been able to do something that I dreamed of for a long time," said the world number two. "I'm still going to set myself goals, I'm still going to try to achieve certain things but I sit here knowing that very well could be the highlight of my career. "That's a very cool thing. I still want to create a lot of other highlights and high points but I'm not sure if any other win will live up to what happened a few weeks ago."

