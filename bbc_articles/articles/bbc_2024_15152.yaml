title: Vaughan Gething can't continue as first minister, say opponents - BBC News
date: '2024-07-14'
section: Wales
url: http://www.bbc.co.uk/news/articles/cg3mz110974o
content: |-
  Continued controversy surrounding Vaughan Gething means he must leave office, say opposition MSs.

  Gething can't continue in top job, say opponents

  This video can not be played To play this video you need to enable JavaScript in your browser. Vaughan Gething says he will not stand down over leak row

  Welsh First Minister Vaughan Gething can no longer command confidence in the Senedd and must stand down, according to political opponents. Welsh Conservative Tom Giffard said Welsh Labour was "completely divided under his leadership" and would be "unable to govern, unable to legislate". Welsh Liberal Democrat leader Jane Dodds said it was time for Mr Gething to "do the right thing" and resign. MS for Caerphilly Hefin David said the first minister retains the support of the Labour group in the Senedd. He also described Hannah Blythyn as "one of the most key members" of the group, despite her sacking over a leaked text. On Friday, Mr Gething insisted he was getting on with the job, despite the continuing row over this, and criticism of controversial donations to his leadership campaign. Mr Giffard, Member of the Senedd (MS) for South Wales West, told BBC Politics Wales on Sunday: "The idea that we can just move on in the way the first minister wants and talk about whatever he wants to talk about isn't the way this works. "He can't command the confidence of the Senedd.

  "His own party is completely divided under his leadership, unable to agree on anything, and it's quite clear he's going to really, really struggle to be able to pass a budget. "And the idea that we can just limp on for two years until the next Senedd election unable to govern, unable to legislate, unable to unite for the sake of one man's ego is absurd." The programme also heard from Labour's new MP for Monmouthshire, Catherine Fookes, who said although she didn't have anything to add further than the statements made by Mr Gething and Ms Blythyn, "the first minister does have my confidence, and we'll have to see how it plays out". Earlier on Sunday, Welsh Liberal Democrat leader Jane Dodds said it is time for Mr Gething to stand down.

  Members of the Senedd: Tom Giffard and Jane Dodds

  The Mid & West Wales MS told Radio Wales Sunday Supplement "the right thing for me at this point needs to be the first minister resigning". "There isn't any other way through," she said. In response to being asked why opposition parties continue to raise their issues with Mr Gething's conduct, she said: "Who is there to fight for somebody like Hannah Blythyn if it's not the opposition parties? "What we kept seeing time-after-time in the last few days is information revealed, which potentially shows that it didn't happen the way the first minister has said it happened."

