  She said that the Labour group could not "speak up" for Ms Blythyn, and that other parts of the Senedd had to "make sure that Hannah's voice is really there in this debate". Ms Dodds added: "I'm worried about people's mental health - not just Hannah's, but others as well. I'm sure the first minister is under immense pressure." She said she had wanted to give the first minister a chance and had affirmed Mr Gething as first minister back in March. "Action does speak louder than words and, sadly for me, I've come to this point where - like others in the siambr [chamber] - I don't have confidence in the first minister and the issue with Hannah has affirmed that."

  Plaid Cymru MS Heledd Fychan said in a statement the first minister had been "embroiled in scandal since day one". "Not only has he lost the confidence of the Senedd and the people of Wales, there appears to be growing discontent in his own party too due to his lack of transparency and aversion to scrutiny surrounding the sacking of a minister who still maintains she's done nothing wrong. "Under Vaughan Gething, his government is unable to deliver on behalf of the people of Wales. "The first minister must act on the wishes of the Senedd and put country before party." Labour Hefin David said he wants to see three things happen now. "First of all, Hannah continues to feel a full and welcome part of the Labour group, which is really important," he said. "And that's my ambition is to see her continue to play the full role. She can. She's a good friend. The second is I think with the Conservatives motion on Wednesday calling for the release of the evidence - I think that evidence [over her sacking as a minister] should be released but done in a way that is sensitive, that all participants have a say in that release, and it's put into context as well. "And thirdly, I think we need to get on to things like tackling the cost of living crisis, the health service, now we've got a Labour government in Westminster. It's time to take the opportunity now to work with them to solve the problems that we haven't been able to solve while the Conservatives controlled the UK Treasury."
