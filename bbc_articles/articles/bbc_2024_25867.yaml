  Crawley was arrested in Bristol on 2 February. During his police interview in relation to the incident in York, he claimed he was acting in self-defence when he hit the man with a hammer. Crawley led police to Mr Taylor's skeletal remains on 1 May, 195 days after he was reported missing by his wife. Crawley, of no fixed address, had admitted manslaughter, but denied murder throughout the trial, which began on 1 October.

  Paul Taylor's body was discovered in a shallow grave in Finglandrigg Wood

  Det Supt Ian Hussey of Cumbria Police said he did not believe there were further victims, but the force was investigating and could not be "complacent". In a statement issued after the verdict, Mr Taylor's family said their lives had been "completely torn apart". "Losing Paul in these circumstances and the torment and hurt this has caused has been horrendous and indescribable," they said.
