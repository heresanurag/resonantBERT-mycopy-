title: 'Paul Taylor murder: Carlisle man Jack Crawley guilty of murder - BBC News'
date: '2024-10-21'
section: UK
url: http://www.bbc.co.uk/news/articles/c9dy86l8x86o
content: |-
  Jack Crawley is convicted of murder after Paul Taylor's remains were found buried in woodland.

  Jack Crawley attempted to burn Paul Taylor's body, before burying him in woodland

  A man who bludgeoned an army veteran to death with a hammer has been found guilty of murder. Paul Taylor, 56, from Annan, Dumfriesshire, went missing last October and his remains were found in a shallow grave in woodland near Carlisle, Cumbria, in May. Jack Crawley, 20, of Carlisle, also tried to burn his victim's body, a trial at the city's crown court heard. He will be sentenced on Wednesday.

  Crawley was also found guilty of the attempted murder of a man in York in January, who he met on the gay dating app Grindr and also attacked with a hammer. He was on bail for the killing of Mr Taylor at the time. Meanwhile, a second man on trial, Marcus Goodfellow, 20, also of Carlisle, was found not guilty of assisting an offender by helping to dispose of Mr Taylor’s vehicle.

  Paul Taylor went missing in October 2023 and his remains were found in May

  Crawley had been in touch with Mr Taylor for some time before the killing and they had previously met to have sex, the court heard. Mr Taylor lived in Annan with his wife Maria. The court heard his family was unaware of his sexual interest in men. Crawley bludgeoned Mr Taylor in the head at least 10 times. He then attempted to burn his victim's body before burying him at Finlandrigg Woods near Carlisle.

