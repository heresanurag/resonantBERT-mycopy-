title: 'Conor McGregor: Jury begins deliberations in MMA fighter alleged rape case
  - BBC News'
date: '2024-11-21'
section: Europe
url: http://www.bbc.co.uk/news/articles/cn9x4gd3j4wo
content: |-
  The MMA fighter is facing an accusation in the civil action that he "brutally raped and battered" Nikita Hand in December 2018.

  Conor McGregor denies all the allegations against him

  The jury in a civil case against Conor McGregor will continue its deliberations at the High Court in Dublin on Friday. Mr McGregor is facing an accusation in the civil action that he "brutally raped and battered" Nikita Hand at a hotel in south Dublin in December 2018. The Irish sports star previously told the court he had consensual sex with Ms Hand in a penthouse at the Beacon Hotel. Ms Hand, who is also known as Nikita Ni Laimhin, is also suing another man, James Lawrence, for assault.

  Following two weeks of evidence and a number of days listening to closing remarks, the jury of eight women and four men started their deliberations at 15:03 local time on Thursday.

  Ms Hand has accused the MMA fighter of rape after a night out in 2018

  While in the jury room, the jury will have an issue paper where they record their decisions. The first is "did Mr McGregor assault Ms Hand?" and the second is "did Mr Lawrence assault Ms Hand?". They must answer "yes" or "no" to the questions. If they answer "no" to both then the matter ends there and Ms Hand loses her case. If they answer "yes" to one or more, then the jury will move to the next stage and assess what damages to award Ms Hand. Justice Owens warned the jury not to talk to anyone about their deliberations, including their loved ones who he said may be interested in the case. He told the jury to "look at all the evidence". While outlining the summary of Mr McGregor's evidence, the jury were told that they cannot draw any adverse inference from his "no comment" answers to police weeks after the alleged incident.

  James Lawrence outside the High Court in Dublin today

  Justice Owens reminded the jury, that if they reach a verdict to award damages, there are a number of types of damages to consider in this case. This also includes damage that covers pain and suffering to date and into the future, as well as distress and recognition of vindication. Also aggravated damage which is payment to recognition of offences that shock the plaintiff. He urged them to be careful not to double count and to ensure they write everything down. Exemplary damages are punitive damages which are to punish the defendant. He said it should be an offence that is really serious, and that they can regard rape as really serious. Justice Owens also said that someone attempting to cover up matters or making statements that are "patently untrue" are also serious. The jury were also told to keep both of their feet "firmly on the ground" and to "use their common sense". The judge added that if they reach the stage of awarding damages, and when assessing what to give when for loss of earnings, to deduct 15% from their figure. He told them this was called a deduction for contingencies as we live in "an uncertain world", and the courts say these things have to be taken into account.

  In a Republic of Ireland civil action - as opposed to a criminal case - neither the complainant nor the accused are entitled to automatic anonymity during the court proceedings.
