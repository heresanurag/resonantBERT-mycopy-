title: 'Putin and Kim: Friends in need (of ammunition) - BBC News'
date: '2024-06-18'
section: Europe
url: http://www.bbc.co.uk/news/world-europe-66784830
content: |-
  Russia needs weapons. N Korea has weapons. It's a match made in the geo-political realities of 2023.

  Vladimir Putin and Kim Jong Un, pictured here in 2019

  Vladimir Putin and Kim Jong Un have а lot in common. Neither gets out much. The Kremlin leader hasn't left Russia this year. In Kim's case, make that four years. Both Russia and North Korea have been accused of becoming "rogue states". Both are under heavy international sanctions. Both governments rail against the "hegemony" of the United States. Often a common enemy can bring leaders closer together. And so it is with Putin and Kim. Theirs is a marriage made, if not in heaven, then certainly in the geo-political realities of 2023. A bromance? Not exactly. Unlike former US President Donald Trump, who once declared that he and Kim Jong Un "fell in love", the leaders of Russia and North Korea are less effusive in their public displays of affection. But both Vladimir Putin and Kim Jong Un see potential benefits from a closer relationship.

  So, what's in it for the Kremlin? For a start, North Korea has a huge defence industry with large-scale production capabilities. With Russia's war in Ukraine grinding on, Pyongyang could prove an invaluable source of munitions for Moscow. Washington suspects the Kremlin has already clocked that. The United States claims that arms talks between Russia and North Korea have been "actively advancing" with Russia allegedly seeking supplies of ammunition and artillery shells. No confirmation of that from Russian officials. But plenty of unsubtle hints that Russia and North Korea intend to boost military co-operation. Back in July Sergei Shoigu became the first Russian defence minister to visit North Korea since the break-up of the Soviet Union, when he attended events marking the 70th anniversary of the Korean armistice. Kim Jong Un played tour guide as he showed Mr Shoigu around a weapons exhibition. The defence minister has also hinted that joint military exercises are in the pipeline. "If they are looking for weaponry in North Korea, one of the poorest and less developed countries of the world - an isolated country - to my mind that is the utmost humiliation of the propaganda of Russian 'great power'," believes former Russian foreign minister Andrei Kozyrev. Mr Kozyrev was speaking to me in a video call from the United States where he currently resides. "A great power would not go to North Korea for an alliance or military supplies."

