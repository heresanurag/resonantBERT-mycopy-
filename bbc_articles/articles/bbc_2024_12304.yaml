  But a power intent on overturning the world order might. With his full-scale invasion of Ukraine, Vladimir Putin signalled his determination to remake the global order to Russia's liking. Military co-operation with North Korea may be another sign of that. An arms deal between Moscow and Pyongyang would represent quite a shift. Until recently Russia had been four-square behind UN Security Council sanctions against North Korea over its nuclear weapons programme. Among other things, those sanctions ban the trade of weapons with North Korea. "Moscow had put its signature to those Security Council resolutions," Russian tabloid Moskovsky Komsomolets reminded readers last week. But it added: "Never mind. A signature can be revoked." The paper quoted the chairman of Russia's Council on Foreign and Defence Policy Fyodor Lukyanov as saying: "For a long time now the question's been asked: why are we [Russia] abiding by these sanctions? The whole system of international relations is in a state of total pandemonium. "Of course, the UN sanctions are legitimate. It's hard to deny that. We voted for them. But the situation has changed. Why not revoke our vote?" That would be music to Kim Jong Un's ears.

  What else may North Korea be hoping to get from Russia? Almost certainly, humanitarian aid to help alleviate North Korea's food shortages. There's also speculation that Pyongyang has been seeking advanced Russian technology for satellites and military use, including for nuclear-powered submarines. More than a year and a half into a war that has gone badly wrong for Russia, Moscow may well need to replenish its munitions stocks. It may well see a deal with Pyongyang as a way of helping to achieve that. But that doesn't mean that, without North Korea's help, Russia's war machine is about to grind to a halt. "Putin is not desperate," believes former foreign minister Andrei Kozyrev. "He can sustain this for a very long time and he can adapt. He learns every day how to circumvent the sanctions, how to co-operate with China, with North Korea and some regimes in Africa. That is not an alternative for the future. But it is an alternative for the present time. And maybe for years to come."
