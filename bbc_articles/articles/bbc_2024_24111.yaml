title: Summer 2024 was world's hottest on record - BBC Weather
date: '2024-09-06'
section: General
url: http://www.bbc.co.uk/weather/articles/c93p5kz9elro
content: |-
  Newly released figures show summer 2024 was the warmest on record across globe, despite cooler conditions in UK.

  Tourists have seen temperatures soar in Crete this summer, with Greece experiencing its hottest June and July on record

  Summer 2024 was the Earth's warmest on record, according to the Copernicus Climate Change Service. It was also the warmest across Europe at 1.54C above the 1991-2020 long term average, exceeding the previous record from 2022. August was also the 13th month in a 14-month period where the global average temperature exceeded 1.5C above pre-industrial levels. Despite the UK having its coolest summer since 2015, much of Europe experienced a hotter than average summer.

  Since 2009, summer months have consitently been warmer than average

  So far this year the global average temperature has been 0.7C above the 1991-2020 average, which is the highest on record. It is therefore increasingly likely that 2024 will be the warmest year on record globally, according to Copernicus, external, the EU's climate service. It was only last year when global average temperatures reached a record high. Throughout the world we have seen heatwaves and extreme weather having impacts. Copernicus deputy director Samantha Burgess said: "Temperature-related extreme events witnessed this summer will only become more intense". Across Europe, temperature records have been broken over the summer. Austria had their warmest on record. Spain had its warmest August on record, Finland its joint warmest and Switzerland second warmest. While the heat across Europe was focused to southern and eastern areas, it was cooler across the Republic of Ireland, the UK, western parts of Portugal, Iceland and southern Norway.

  While human activities have been the most significant cause of global temperature rise, the record heat in 2023 and into 2024 has been boosted by the natural climate pattern of El Niño. El Niño - a natural warming of sea surface temperatures in the eastern Pacific - was observed from June 2023 to May 2024. During this time, higher sea surface temperatures added more heat to the atmosphere. While it has now ended, its part in boosting global temperature will have an influence on 2024 overall. Scientists at the Australian Bureau of Meteorology believe the Pacific will enter the cooler phase of La Niña in the coming months.

