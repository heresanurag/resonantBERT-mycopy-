title: Essex couple fined £1,500 after migrant hid on motorhome - BBC News
date: '2025-03-10'
section: Essex
url: http://www.bbc.co.uk/news/articles/c17q9lrl57ro
content: |-
  The pair are given a £1,500 penalty after finding the young man once they arrived home in Essex.

  Couple who found migrant in motorhome are fined

  This video can not be played To play this video you need to enable JavaScript in your browser.

  A couple who discovered a migrant had clung to the back of their vehicle all the way home from France have been issued a £1,500 fine. Adrian and Joanne Fenton said they called police when they found the person zipped inside the cover of a bike rack at their home in Heybridge, Essex, in October. They later received a fine from the Home Office for failing to "check that no clandestine entrant was concealed" in the motorhome. The pair said they were drafting an appeal. The Home Office said penalties were "designed to target negligence rather than criminality".

  Border Force officials were called to Adrian and Joanne Fenton's home in Essex after they found the man hidden in their bike rack

  The man was discovered inside the cover of a bike rack, attached to the couple's motorhome

  "At no point did I believe I would be fined by taking correct and moral action," said Mr Fenton, writing in an email exchange to the Home Office, seen by the BBC. "This action taken by Border Force to impose a fine only encourages travellers [or] holidaymakers in this position not to call the police but to let the stowaway abscond."

  Joanne Fenton said she and her husband were drafting an appeal after their £1,500 Home Office fine

  Speaking to the JVS Show on BBC Three Counties Radio, Mrs Fenton said the pair had been travelling in France with friends and returned to the UK via ferry on 15 October. The 55-year-old said border officials in Calais and the UK had not inspected the bike rack or the cover before or after the crossing. Retired firefighter Mr Fenton, 57, had been at the wheel for the six-hour journey before the pair arrived home at 22:15 BST.

  Mrs Fenton said her husband unzipped the "really tight" cover they had been using for their bicycles on the back of the motorhome. "He sees two trainers... goes to have a look, and there's two legs attached to it," she recalled. "He's gone 'Jo, you need to phone the police. We've got a stowaway.'" Mrs Fenton said she offered the young man a bottle of water, to which he said "thank you". She said he told police he was from Sudan, and that he was 16 years old.

  Adrian Fenton said the migrant was latched on to the bike rack, under the covers, for a six-hour journey from France to Essex

  The Essex couple were travelling in Australia over Christmas when they received an email from the Home Office with details of the offence and fine. It said they failed to "check that no clandestine entrant was concealed in the vehicle", but Mrs Fenton contested that technically he was clinging to the outside rather than aboard the motorhome.

  The email also said the "entrant" was found by an authorised search officer, despite the couple saying they called the police the night they found him. Maldon Conservative Sir John Whittingdale - their local MP - has written to the Minister for Border Security and Asylum Dame Angela Eagle, asking her to review their concerns.

