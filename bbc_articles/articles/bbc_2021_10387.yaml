  Brooks, who almost missed out on the Games after knocking himself out during the World Championships in June, improved his first-run score to 90.80 and then watched on patiently as six riders followed him in the second run. Only one, Venezuela's Daniel Dhers, managed to beat it, with Logan's score from his first run enough to secure gold. Visibly emotional, Brooks told BBC Sport: "I've just cried for the last couple of minutes. "It's an unbelievable journey I've had on the way here. I am just so stoked. I don't think it will sink in for a while. For Charlotte to do her things today and put a score and tricks up there that we had never seen before, it was even harder focusing. "I knew the run I wanted to pull, I still missed a few bits out but, to be honest, I think that is all I had."
