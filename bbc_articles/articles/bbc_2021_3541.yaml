title: 'Covid-19: Vaccines now available in NI to everyone aged 50 and over - BBC
  News'
date: '2021-03-15'
section: Northern Ireland
url: http://www.bbc.co.uk/news/uk-northern-ireland-56396493
content: |-
  Health Minister Robin Swann says 30,000 people booked a Covid-19 vaccine in just three hours.

  People aged 50 or over in Northern Ireland can now book their Covid-19 vaccine appointment, Health Minister Robin Swann has announced.

  Those who are eligible and wish to receive the vaccine can booking it online or be contacted by their GPs.

  Booking slots are available at the seven regional vaccination centres.

  There was some frustration about the length of time some people were having to wait in the queue to book their slot on Monday.

  However, Mr Swann told the assembly that in the first three hours of the slots opening 30,000 people had booked vaccines.

  The centres will primarily be using the AstraZeneca vaccine for first doses, to maximise available vaccine supplies.

  Anyone who received the Pfizer vaccine as a first dose will still receive the Pfizer vaccine for their second dose.

  Northern Ireland's health minister told the assembly that the "benefits of vaccination outweigh the risks".

  It comes after health officials in Northern Ireland said they would continue to use the Oxford-AstraZeneca vaccine after its suspension in the Republic of Ireland.

  The temporary suspension of the vaccine is already having an impact on the republic's immunisation programme.

  About 30,000 vaccination appointments for health staff and those at high-risk might be delayed, according to RTÉ.

  Irish Health Minister Stephen Donnelly described its move as "precautionary", after reports of serious blood clotting events in adults in Norway.

  AstraZeneca has said there is no evidence of a link between the vaccine and increased risk of clotting, while Northern Ireland's Department of Health has said it would continue to use the vaccine after receiving guidance from the UK's Medicines and Healthcare products Regulatory Agency (MHRA).

  The latest figures show that across Northern Ireland 629,461 people have now received one dose of a Covid-19 vaccine, while 54,636 have received two.

  On Monday, the Department of Health recorded a further 121 cases of Covid-19 in Northern Ireland.

  One additional death was reported, bringing the department's total number of deaths with Covid-19 to 2,099.

  For a second day in a row, no additional deaths were reported in the Republic of Ireland, where there have a total of 4,534 Covid-19-related deaths.

  The Republic of Ireland's health department said there were 575 more confirmed cases, which brings that total to 227,316.

  Northern Ireland's health minister said vaccination was a "bridge to better, safer and more normal times for everyone".

  Chief medical officer Dr Michael McBride said the more people are vaccinated then "the more we are all protected".

  He received his first jab on Monday morning.

