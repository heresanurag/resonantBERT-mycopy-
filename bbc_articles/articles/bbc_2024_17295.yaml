content: |-
  Thousands of displaced Gazans return to the ruins of the southern city, after a week-long Israeli operation ends.

  Thousands of displaced Gazans have returned to the ruins of the southern city of Khan Younis, after a week-long Israeli operation ended.

  On Tuesday, Israel Defence Forces (IDF) officials said more than 150 gunmen had been killed during the week long offensive.

  But the Hamas-run Gaza media office said at least 250 Palestinians were killed and more than 300 injured during the fighting. Thirty more remain missing, they said.

  Read more: Thousands of Palestinians return to Khan Younis as IDF withdraws
