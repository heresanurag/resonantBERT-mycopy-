title: Snoop Dogg, Eminem and 50 Cent unite to honour Dr Dre - BBC News
date: '2024-03-20'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-68570993
content: |-
  The award-winning hip-hop producer was presented with a star on the Hollywood Walk of Fame on Tuesday.

  Award-winning hip-hop producer Andre Young, better known as Dr Dre, was presented with a star on the Hollywood Walk of Fame.

  Celebrity collaborators like Eminem, 50 Cent and Snoop Dogg joined for the ceremony on Tuesday. Speaking at the event, rapper Snoop Dogg said "there would be no Snoop without Dre".
