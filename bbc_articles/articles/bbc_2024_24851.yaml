content: |-
  Lebanon's health ministry says 22 people have died and more than 117 were left wounded after air strikes in central Beirut.

  Recent days have seen significant exchanges of missiles and rockets across the Israel-Lebanon border.

  Lebanon's health ministry says 22 people died - and more than 117 were left wounded - after two air strikes that came without warning hit central Beirut on Thursday.

  The Israeli military says Hezbollah has fired hundreds of missiles, many of them at northern Israel, in recent days.

  Nick Eardley from BBC Verify looks at the pattern of air strikes since the escalation in fighting last month - and how Israel's offensive has moved northwards over time.
