content: |-
  The former Democrat has been slumping in the polls, but some of his remaining support may swing behind the Republican.

  RFK Jr just endorsed Trump. Will it matter in November?

  Mr Kennedy announcing the suspension of his campaign in a speech in Arizona

  The independent campaign of Robert F Kennedy Jr is over, but the question that has followed him on the campaign trail remains – does his support come mostly from those who would otherwise vote Republican or Democrat? His base was small and shrinking. An average of opinion polls by the website RealClearPolitics puts him on 5%, down from the high teens just a few months ago. But in a closely fought election, Kennedy voters could swing victory either way for Donald Trump or Kamala Harris in November's election. Much of the slump in Mr Kennedy's numbers, experts say, is down to excitement among Democrats over their new candidate, Vice-President Harris.
  • None Democrats are worried. But will RFK Jr take more votes away from Trump?
  • None RFK Jr: How anti-vaccine misinformation has shaped his 'truth-teller' candidacy “When it was Biden versus Trump people were looking for a third option,” said Merrill Matthews, a resident scholar with the conservative Institute for Policy Innovation who has studied the history of third-party campaigns. “But with Kamala Harris coming into the picture and gaining the Democratic nomination, that has changed.” Opinion polls that reflect independent and third-party candidates – including the Green Party’s Jill Stein and left-wing activist Cornel West – have been inconclusive about where Mr Kennedy’s support is coming from. In some cases they show his presence in the race benefiting Republicans; in others Democrats; and in nearly every such poll, the margins are slim.

