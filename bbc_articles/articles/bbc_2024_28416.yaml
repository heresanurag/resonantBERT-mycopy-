title: Police catch Cambridge drug dealer after chase into bushes - BBC News
date: '2024-11-19'
section: General
url: http://www.bbc.co.uk/news/videos/cqlr7lgzy4po
content: |-
  The man tries to run away from police after they pull his car over.

  Bodycam footage has shown police chasing a drug dealer who hid in bushes in a bid to avoid arrest.

  Florian Bushushta fled after his car was stopped on Whitehill Road in Cambridge and officers attempted to detain him.

  Following a short foot chase, the 26-year-old was found hiding in a nearby garden.

  After the incident on 12 September, he was jailed for three years by Cambridge Crown Court. He admitted possession with intent to supply cocaine and cannabis, and possession of criminal property.
