title: Displaced people shelter in Lebanese school - BBC News
date: '2024-09-24'
section: General
url: http://www.bbc.co.uk/news/videos/clyl8gxxm9lo
content: |-
  As Israel continues to bombard southern Lebanon, thousands of civilians are fleeing their homes.

  Lebanon's health ministry says 558 people have been killed, including 50 children, in strikes since Monday.

  The BBC's Carine Torbey visited a school in the capital Beirut, which has been turned into a shelter for the displaced.
