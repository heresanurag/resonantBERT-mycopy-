content: |-
  Carlos Alcaraz wins his first title on grass and regains the world number one ranking with victory over Alex de Minaur in the Queen's final.

  Queen's 2023 results: Carlos Alcaraz beats Alex de Minaur in final to win first grass title Last updated on .From the section Tennis

  Queen's 2023: Best shots as Alcaraz beats De Minaur to win first grass-court title Carlos Alcaraz won his first title on grass and regained the world number one ranking with an impressive victory over Alex de Minaur in the Queen's final. Alcaraz's 6-4 6-4 triumph means he moves above Novak Djokovic in the rankings and will be the top men's seed at Wimbledon, which starts on 3 July. The Spaniard, 20 was playing only his third grass-court tournament. "So many legends have won here. Seeing my name on the trophy surrounded by the great champions is amazing," he said. Alcaraz will now hope to emulate his compatriot Rafael Nadal, who triumphed at Queen's in 2008 before going on to win Wimbledon for the first time a few weeks later. There were questions about Alcaraz's ability on grass at the start of the week but he answered those in emphatic style, becoming a crowd favourite with his attacking play, humble attitude and boyish smile. He will now be considered the main threat to Djokovic's defence of his Wimbledon crown. "It helps a lot to be top seed at Wimbledon," said Alcaraz. "It's amazing. It wouldn't be possible without the support of the people through the whole week. "I started the tournament not really well, I had to adapt my movement a bit on grass," he said. "But it's been an amazing week and it's ending with a lot of energy and on a high. "I have played 11 matches in my career on grass, so I have to get more experience, more hours. "But obviously after beating amazing guys, great players, and the level that I played, I consider myself one of the favourites - or one of the players to be able - to win Wimbledon."
  • None Wimbledon 2023: All you need to know De Minaur, 24, was seeking to become the first Australian winner at Queen's since Lleyton Hewitt secured his fourth title in 2006. The in-form world number 18, who beat Andy Murray in the first round, tested US Open champion Alcaraz with his pace and agility around the court. He had the first break point at 4-3 but the top seed shut that chance down instantly with a 137mph ace. A De Minaur forehand error gave Alcaraz his own break-point opportunity in the next game and the Spaniard roared with delight when the Australian sent another forehand long. Alcaraz demonstrated his ability on grass with a well-judged drop shot, a deft volley at the net, a thumping forehand winner and a huge ace as he wrapped up the first set in style. The Spaniard, who made the fourth round at Wimbledon last year before losing to Jannik Sinner, called for the physio at the end of the set to receive treatment for a right quad issue. With Alcaraz fit to continue, the pair went toe to toe in the second set, and the Spaniard acknowledged De Minaur's tenacity with a handshake at the net after the Australian came out on top of one mesmerising rally. But De Minaur's standards slipped in the next game and a double fault handed Alcaraz the crucial break. From there, Alcaraz's victory looked inevitable and he clinched the title with his first championship point when De Minaur sent a return of serve out of play. Meanwhile, Kazakhstan's Alexander Bublik battled his way past third seed Andrey Rublev 6-3 3-6 6-3 to win the Halle Open. World number 48 Bublik served three double faults in the final game before finishing the match with an ace to join 10-time champion Roger Federer on the winners' board. "This means the world to me. I've been struggling for a year and a half now. It was hard work," said the 26-year-old. "I was walking through the little hall of fame here before entering the court for the very first time. "I was like 'wow, the different names', a lot of guys I'm familiar with. "But I could not even imagine I would win this tournament. I'm really, really happy."
