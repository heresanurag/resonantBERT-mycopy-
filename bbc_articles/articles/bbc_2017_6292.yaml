content: |-
  Miley Cyrus, Justin Timberlake and Cheryl were among those celebrating dads.

  It wasn't just you and your mates getting soppy about your dads on Facebook yesterday. Take a look at some of the A-listers' heartfelt Father's Day messages.

  Liam Payne was one of many dads celebrating their first Father's Day

  Victoria Beckham shared a picture of husband David and their four children Brooklyn, Cruz, Harper and Romeo

  Kim Kardashian and Kanye West have two children together, Saint and North. She posted a picture of Kanye with daughter North

  Was Madonna having a dig at Guy Ritchie, the father of some of her children?

  Sir Paul McCartney's birthday fell on Father's Day this year, with fashion designer daughter Stella posting a picture of the pair together as she celebrated both occasions

  Justin Timberlake paid tribute to his wife Jessica Biel and their son Silas

  Mark Ruffalo did a shout out to all the father figures around the world

  Kate Beckinsale's father Richard died in 1979, when he was just 31

  Reese Witherspoon celebrated 'all the great dads out there'

  Catherine Zeta-Jones said her dad David is the 'sunshine of her life'

  Prince William was pictured with his dad and his son George

