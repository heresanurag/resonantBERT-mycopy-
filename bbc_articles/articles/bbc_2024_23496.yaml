title: 'Muriel Furrer: Swiss cyclist dies after crash at Road and Para-cycling World
  Championships - BBC Sport'
date: '2024-09-28'
section: Cycling
url: http://www.bbc.co.uk/sport/cycling/articles/c5y0l0v6y2do
content: |-
  Swiss cyclist Muriel Furrer dies after suffering a serious head injury at the Road and Para-cycling World Championships in Switzerland.

  The UCI announced Muriel Furrer passed away at Zurich University Hospital

  Swiss cyclist Muriel Furrer has died after suffering a serious head injury at the world championships in Switzerland. The 18-year-old crashed during the junior road race on Thursday and was taken to hospital by emergency helicopter. Torrential rain fell during much of Thursday's racing in Zurich. At a news conference on Friday, Peter van den Abeele, sports director of world governing body Union Cycliste Internationale (UCI), said they could not give more information about the incident as it was now under investigation by public authorities. He added: "The UCI and the organising committee are respecting the wish of the family to continue these world championships." However, the procedure for Friday's medal ceremony has been altered, with no music or anthems being played and flags being flown at half-mast. A minute's silence will be held and a message of condolence will be read, with a photo of Furrer shown on the video screen. All evening activities for Friday have been cancelled, along with the UCI gala that was scheduled for Saturday.

  Road cycling safety has come under the spotlight in recent years and the UCI introduced the SafeR campaign in 2023 to analyse risks involved in events. Last year, Furrer's compatriot Gino Mader was killed, aged 26, after a crash while descending at high speed during the Tour de Suisse. At the Tour of Austria in July, Norwegian cyclist Andre Drege, 25, was fatally injured in a crash on the descent of the Grossglockner, Austria's highest mountain. Olivier Senn, sports director of the Local Organising Committee (LOC) of the Road and Para-cycling World Championships, said: "We believe we always do the maximum for the safety and security of the riders. The downhill was looked at again with the rain on site." According to Senn, there was no information yet about the exact point of the accident and he said "we have slightly amended the staff on site". "With respect to the family, please use facts and not rumours," he added.

  Furrer was a double silver medallist in the time trial and road race at this year's Swiss road nationals. "Our hearts are broken," said Swiss Cycling on X. "It is with a heavy heart and infinite sadness that we have to say goodbye to Muriel Furrer. "We are losing a warm-hearted and wonderful young woman who always had a smile on her face. There is no understanding, only pain and sadness." In a statement following the news of her loss, the UCI said: "With the passing of Muriel Furrer, the international cycling community loses a rider with a bright future ahead of her. "The UCI and the Organising Committee of the 2024 UCI Road and Para-cycling Road World Championships offer their sincere condolences to Muriel Furrer's family, friends and her federation Swiss Cycling. "Muriel Furrer's family asks that their privacy be respected at this very painful time." British Cycling posted on X: "Everyone at British Cycling is devastated to learn of the passing of Muriel Furrer. "Muriel was a devoted young rider with a bright future ahead of her and will be sorely missed by the cycling world. We send our condolences to her family, friends and team-mates at Swiss Cycling." Road cycling team Movistar added: "Sending all of our strength to the family, friends and team-mates of Muriel Furrer and to Swiss Cycling for this tragic loss. May she rest in peace."
