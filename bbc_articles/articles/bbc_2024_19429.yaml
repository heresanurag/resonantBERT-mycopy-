title: It Ends With Us star Brandon Sklenar says female cast 'vilified' - BBC News
date: '2024-08-21'
section: Newsbeat
url: http://www.bbc.co.uk/news/articles/c0rw7vjn9dzo
content: |-
  Brandon Sklenar, who stars alongside Blake Lively, says the film's reception has been "disheartening".

  It Ends With Us star says female cast 'vilified'

  Brandon Sklenar appeared alongside Blake Lively in It Ends With Us

  It Ends With Us actor Brandon Sklenar says the drama surrounding the film is "disheartening" and that the women who worked on it have been "vilified". The film, starring Brandon alongside Blake Lively and Justin Baldoni, has divided audiences over its depiction of domestic violence and some critics have labelled its promotional tour as a "car crash". In a post on Instagram, Brandon said it has been "disheartening to see the amount of negativity being projected online". "Vilifying the women who put so much of their heart and soul into making this film because they believe so strongly in its message seems counterproductive and detracts from what this film is about," he wrote.

  The film adaptation of Colleen Hoover's bestselling novel tells the story of Blake's character Lily Bloom, who finds herself in an abusive relationship similar to the ones she witnessed growing up. It was released in the UK on 9 August and is already one of the most successful box office films in the US this year. But early reviews were mixed and The Telegraph said it "repackages domestic violence as slick romance", external. Author Colleen has previously said the book was inspired by the abuse her mother had suffered.

  In his post, Brandon claimed a friend of his who had been in a similar relationship had credited the book and film with "saving her life". "Trust me when I tell you, there isn’t a single person involved in the making of this film that was not aware of the responsibility we had in making this," he said. "A responsibility to all the women who have experienced generational trauma – domestic abuse – or struggle with looking in the mirror and loving who they see." Speaking to the BBC at the film's premiere, star Blake Lively also insisted it had been sensitively made. "Lily is a survivor and a victim and while they are huge labels, these are not her identity," she said on the red carpet. "She defines herself and I think it's deeply empowering that no-one else can define you."

  Blake posed for photos with Brandon (left) and her husband Ryan Reynolds at the premiere, but not her co-star Justin

  In his Instagram post, Brandon also hints at rumours of a rift between Blake and Justin, who plays Lily's charming but abusive boyfriend Ryle Kincaid. Speculation of a falling out was sparked when they weren't pictured together on the red carpet, however neither Blake nor Justin have spoken about it. "What may or may not have happened behind the scenes does not and hopefully should not detract from what our intentions were in making this film," Brandon wrote in his statement. "This film is meant to inspire. It’s meant to validate and recognise. It’s meant to instil hope. It’s meant to build courage and help people feel less alone. "Ultimately it’s meant to spread love and awareness. It is not meant to once again make women the 'bad guy', let’s move beyond that together."

  Justin Baldoni has been credited for speaking out about domestic abuse while promoting the film

  The relationship between Blake and Justin - who also directed the film - isn't the only thing generating chatter online - soon after the film was released, attention turned to how the film was being promoted. Apart from her Insta story, some critics say Blake hasn't spoken enough about the film's theme of abusive relationships and has perhaps been too focused on promoting other business ventures. Since the film's release, she's shared posts promoting her new make-up brand and drinks company as well as a sit-down chat with her co-stars where domestic violence was not discussed. The issue was also notably absent in her cover interview with Vogue for its September issue. When Blake posted on her Insta story last week with a number for a domestic abuse helpline, some interpreted that as a response to the criticism but have said it doesn't go far enough. Brandon's also been criticised for not drawing more attention to the issue of domestic violence, but in his latest post says everyone involved in the film felt a responsibility to victims. "Colleen and the women of this cast stand for hope, perseverance, and for women choosing a better life for themselves," he says. He disabled comments on the post and urged fans to "lead with love and be kind" before "spreading hate on the internet". "Let’s be a part of something better together," he wrote. "A part of a new story being written for women and all people everywhere." If you have been affected by the issues raised in this article, help and support is available via BBC Action Line.

