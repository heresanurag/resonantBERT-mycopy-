  Mike Hacham originally protested against Trump's so-called "Muslim ban" but says he'd for vote for him again.

  Mike Hacham originally protested against the US president's so-called "Muslim ban", but says he'd vote for Trump "100 more times".

  BBC Panorama's Trump Voters: One Year On is broadcast on BBC World News over the weekend of 20 and 21 January. It was first shown on BBC One in the UK on 15 January and is available on iPlayer (UK only)
