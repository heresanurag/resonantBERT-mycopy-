title: King Charles III leads procession behind Queen's coffin - BBC News
date: '2022-09-13'
section: General
url: http://www.bbc.co.uk/news/uk-62876527
content: |-
  The King and other royals follow a procession up Edinburgh's Royal Mile to St Giles' Cathedral.

  King Charles III and other royals followed the Queen's coffin in a procession up Edinburgh's Royal Mile.

  The coffin was taken to St Giles' Cathedral for a service of remembrance, before mourners are allowed to pay their respects.

  Thousands of people gathered along the Royal Mile to watch.
