  Horsham's Fay Louise planned her own funeral after doctors found a tumour in her appendix in 2023.

  Woman had eight organs removed in cancer treatment

  Faye Louise, from Horsham, began planning her own funeral after a tumour was found in her appendix

  A woman who had eight organs removed after being diagnosed with a rare cancer has returned to work. Faye Louise, from Horsham, West Sussex, began planning her own funeral after doctors found a tumour in her appendix in 2023. But after "the mother of all surgeries", she said she was cancer free and able to return to work as a flight dispatcher at Gatwick Airport. "To have been told there is no evidence of disease, it was the greatest Christmas gift that I could have got," she said.

  Ms Louise added that she was unsure if she'd be able to work again this time last year. "The job is very physical, but I love aviation and I'm happy that I'm back in the role," she told BBC Radio Sussex.

  Faye Louise said she was "cancer free" having been diagnosed with pseudomyxoma peritonei in 2023

  The former model began to have pains in spring 2023, which she initially put down to period problems, before an ultrasound revealed an ovarian cyst. However, after an operation to rectify the problems, she said she "heard the dreaded C-word" and was diagnosed with pseudomyxoma peritonei – a rare tumour that causes a build-up of a jelly-like substance in the abdomen. As the tumour had ruptured, spreading cancer cells around her body, Ms Louise needed an operation which involved removing eight of her organs. The surgery included the removal of her spleen, gallbladder, appendix, ovaries, uterus, fallopian tubes, belly button, greater and lesser omentum - which connect the stomach and duodenum to other abdominal organs - and part of her liver, as well as the scraping of her diaphragm and pelvis. She will continue to have yearly scans every November as a result. "Waiting for the results will sadly make or break every Christmas for me. But you just have to keep pushing forward and never give up," she said. "Some days I have been down to the depths of despair, but more often than not now, I'm having more positive days."

  Faye Louise has been fundraising for Cancer Research UK

  She has since returned to work, and fundraised for Cancer Research UK – including being gunged with 15 litres of orange gloop in the garden of the Red Lyon pub in Slinfold. She has also completed the Race for Life in Stanmer Park, Brighton, to raise funds for the charity.
