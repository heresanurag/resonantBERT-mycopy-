  Show regulars Scarlett Moffatt and Stephen Mulhern have also taken on greater presenting roles.

  But like last week's show McPartlin made a brief appearance in a pre-recorded comedy sketch called Saturday Knight Takeaway - alongside stars including Joanna Lumley, Noel Edmonds, Emilia Fox and Bill Roache.
