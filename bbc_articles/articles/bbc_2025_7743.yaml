title: 'Newspaper headlines: ''World faces economic war'' and ''TikTok talks'' - BBC
  News'
date: '2025-04-03'
section: The Papers
url: http://www.bbc.co.uk/news/articles/cq67l8y08ydo
content: |-
  Most of Thursday's front pages lead on Trump announcing universal 10% tariffs on all imports into the US.

  Now for our look at the morning papers, and Donald Trump's announcement on tariffs dominates the front pages.

  The i Paper, Guardian, Daily Mail, and Mirror are among the papers labelling the president's White House speech as the start of a new "global trade war". The Mail goes on to describe it as a "bombshell", external - but says the fact Britain was hit by lower tariffs than the EU "represents a key benefit of Brexit". The Express leads with a similar angle saying "Brexit Britain" has escaped the worse of Trump's "tariff pain", external.

  The Times says that after months of lobbying by Sir Keir Starmer, Britain was hit "less hard than most countries", external. It notes that there could be a "small window for negotiation" because the new tariffs are not due to come into force until the weekend.

  The Telegraph highlights a warning from economists that the tariffs could plunge the UK into recession, external with thousands of jobs at risk. It says the Chancellor, Rachel Reeves, on Wednesday refused to rule out raising taxes amid mounting concern she will breach her fiscal rules.

  Meanwhile the i quotes diplomatic sources who've expressed hope that the King could act as a "soft power weapon", external in a charm offensive with President Trump, aimed at securing an easing of trade barriers for the UK.

  In other news, the Sun leads with a report on Haroon Aswa, externalt, a British man who the paper describes as an "al-Qaeda mastermind". He was jailed in the US until 2022 but was then returned to the UK and has been detained at secure hospital. The paper reports that he could soon be released.

  The actor Val Kilmer is on several front pages following the news of his death. Metro describes him as a "maverick Hollywood bad boy and movie icon", external whilst the Guardian hails his "terrific screen presence".

  And Scottish dinosaurs also feature in many of Thursday's papers. Newly identified footprints on the Isle of Skye have revealed that despite being prehistoric predator and prey, huge meat-eating and plant-eating dinosaurs co-existed together on the island 167 million years ago. Researchers tell the i Paper, external that the prints - discovered on the island's Trotternish Peninsula - are helping to provide new insights into the behaviours of dinosaurs from the Middle Jurassic period.
