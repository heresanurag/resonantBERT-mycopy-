  The organisation fears rare species such as the Dingy Skipper Butterfly could become extinct in some local habitats.

  Barn Owls and the endangered White Clawed Crayfish could also be impacted by the project, it added.

  The Wildlife Trust called on the government to "stop and rethink".

  Nikki Williams, director of campaigns and policy, said: "HS2 will destroy precious carbon-capturing habitats if it's allowed to continue in its current form.

  "It will damage the very ecosystems that provide a natural solution to the climate emergency."

  The Wildlife Trust fears the Dingy Skipper Butterfly could be wiped out by the project's development

  Hilary McGrady, director general of the National Trust, said HS2 Ltd had "a vital responsibility to lead by example" and "must not end up cutting corners at the expense of the environment".

  But HS2 said at-risk areas in the report had been identified through a simplistic list of all wildlife sites within 500m of the railway.

  It added the report did not show evidence of significant impact at the sites.

  However, the Wildlife Trust said in response that the report was based on evidence provided by numerous organisations including the RSPB and the National Trust.

  "If HS2 Ltd is saying the impacts are lower than presented in the report, we would welcome the evidence," the Trust said.

  "Until we see it, we are raising our concerns about the risks both actual and potential and call on the prime minister to stop and review the project, while the full ecological impacts and approach are considered."

  HS2 said it had carried out extensive work to relocate animals, such as the Great Crested Newt, away from sites and into newly-created habitats.

  The company said its "green corridor" will deliver a railway that "respects" the natural environment.

  A total of seven million new trees - a mix of oak, hazel, dogwood and holly - are being planted as part of the programme.

  HS2 claims it is planting more than double the amount of trees and shrubs affected by the project.

  But Nikki Williams labelled HS2's proposed measures to temper the effects of the works "amateurish".

  Stop HS2 campaigner Lindsey Batham said hedgerows and trees being cleared for the project were "the roads and railways that wildlife uses".

  She said the project only called off uprooting vegetation during nesting season when she and her fellow campaigners intervened.

  "It's just not acceptable. No other contractor in the country would be able to do that - HS2 seems to have carte blanche," she added.

  Lindsey Batham says the Stop HS2 campaign had to stop rail workers from destroying habitats during nesting season
