title: US plans to send controversial cluster munitions to Ukraine - BBC News
date: '2023-07-07'
section: US & Canada
url: http://www.bbc.co.uk/news/world-us-canada-66134663
content: |-
  The White House defends the move, while acknowledging that such unexploded ordnance can harm civilians.

