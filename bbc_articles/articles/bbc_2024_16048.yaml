  Beau Greaves says she will not take her place at the PDC World Championship after defending her Women's World Matchplay title.

  Greaves says no to PDC Worlds after Matchplay win

  Beau Greaves beat Katie Sheldon, Mikuru Suzuki and Fallon Sherrock on her way to winning the 2024 Women's World Matchplay title

  Beau Greaves says she will not take up her place at the PDC World Championship after successfully defending her Women's World Matchplay title. Greaves said it was "silly" to believe she could defeat the top men at Alexandra Palace. The 20-year-old beat Fallon Sherrock 6-3 in the matchplay final at Blackpool's Winter Gardens. Greaves was level with Sherrock at 2-2 but went on to average 98.75 and broke throw four times to win. The triumph earned her a place at both the PDC's Grand Slam of Darts and the World Championship, but she will forgo the latter in December in order to defend her WDF Women's World Championship title. "Men's and ladies darts should be separate. I don't think any lady will ever go to Ally Pally and win that. If you think that, you're being silly," she said.

  Victory earned the top seed £10,000 in prize money, and she would like to see more money invested into the women's game. Greaves played at the 2023 PDC World Championship but lost in the first round to William O'Connor and said she did not enjoy the experience. "I just don't think we will ever be good enough to play against the likes of Luke Humphries, Michael van Gerwen or Luke Littler," she said. "I think for me, the women's game is more important. "When I go to the Grand Slam I don't look forward to it because I know I have got to play men. I don't fancy my chances at all - I am just realistic." Greaves started the day at Blackpool by recording a 4-1 win over Katie Sheldon to reach the semi-finals. In a repeat of the 2023 final, Greaves was a 5-2 winner over Mikuru Suzuki in the last four, but required seven match darts to clinch victory. Sherrock, the 2022 champion who made history with two wins at Ally Pally in 2019, beat Anastasia Dobromyslova in the quarter-finals. She then narrowly progressed through the semi-finals, coming back from 3-1 down to win 5-4 against Lisa Ashton. Both players struggled to take out doubles throughout the tie, with Ashton missing seven match darts in the tightest match of the tournament. In the men's event, Luke Humphries defeated Michael van Gerwen to claim the £200,000 first prize.
