  • None The Acqua Vergine runs for a total of 20km (12 miles) before flowing into the fountain
  • None Tourists can drink from a special tap tucked away at one side
  • None According to legend, the water source was discovered in 19 BC by thirsty Roman soldiers directed to the site by a young virgin - which is why it is called Virgin Waters
  • None The tradition of throwing coins into the fountain was made famous by Frank Sinatra's Three Coins in the Fountain in the 1954 romantic comedy of the same name
