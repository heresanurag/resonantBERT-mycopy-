title: Rome to bring in queueing system as Trevi Fountain re-opens after restoration
  - BBC News
date: '2024-12-23'
section: Europe
url: http://www.bbc.co.uk/news/articles/cwypvvplj05o
content: |-
  The landmark has been given a spruce-up ahead of the Roman Catholic Church's jubilee, which begins on Tuesday.

  More than 10,000 people used to visit the baroque landmark in Rome every day

  Built in the 18th Century by Italian architect Nicola Salvi on the façade of the Poli Palace, the historic fountain is one of the city's most visited spots. Between 10,000 and 12,000 tourists used to visit the Trevi Fountain each day, but a new queuing system has been installed to prevent large crowds massing near the landmark. Speaking on Sunday Mayor of Rome Roberto Gualtieri said imposing the limit will "allow everyone to better enjoy the fountain, without crowds or confusion".

  Gualtieri also said city authorities were considering charging a modest entry price to finance the fountain's upkeep. Sunday's re-opening took place under light rain in the presence of several hundred tourists, many of whom followed the mayor by throwing a coin into the fountain. The fountain and other key city sites have been cleaned ahead of the jubilee of the Roman Catholic Church which begins on Christmas Eve.

  A new queueing system will be put in place to avoid large crowds, like this in September 2024

  Its poor structural condition was exposed in 2012 when bits of its elaborate cornice began falling off after an especially harsh winter which required a multi-million euro renovation the following year. Making a wish and tossing a coin into the water is such a tradition that the city authorities used to collect around €10,000 (£8,300; $10,500) a week. The money was donated to a charity that provides meals for the poor.
