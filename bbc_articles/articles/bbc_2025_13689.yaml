title: 'Newspaper headlines: Trump''s ''LA face-off'' and NHS out for blood - BBC
  News'
date: '2025-06-09'
section: The Papers
url: http://www.bbc.co.uk/news/articles/c0ln57eljlxo
content: |-
  Donald Trump's crackdown on the LA immigration protests features prominently on Monday's papers.

  The Times leads on the above-inflation increase to the policing budget, external, that the paper says has been agreed before Wednesday's spending review.

  The representative bodies of police officers and superintendents have written a joint letter in The Daily Telegraph saying morale has been "crushed", external.

  The i Paper reports a potential modification to cuts to welfare benefits, external on Wednesday, in order to head of a large rebellion of unhappy Labour MPs.

  The Financial Times says that the publication of the government's industrial strategy has been delayed, external due to the spending review on Wednesday.

  The Daily Mail says corrupt immigration advisers, external are charging illegal workers to supply bogus skilled jobs for unqualified staff.

  The Guardian, external reports that creditors vying to take over Thames Water have demanded that the company and its managers are granted immunity from prosecution for serious environmental crimes as a condition of acquiring it.

  The Daily Mirror reports on the urgent shortage of blood in the NHS, external.

  It says the health service has around half of the six days' worth of national stock it aims for and donations are falling.

  The Sun leads on research it has commissioned which says there is an annual bill of £4.7bn to house and support illegal migrants in the UK.

  And finally, William Shakespeare was inspired to write Hamlet by a play called... Hamlet, external, according to the the Daily Star.
