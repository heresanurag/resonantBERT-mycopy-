title: '''Wobbly head'' woman fundraising for lifesaving surgery - BBC News'
date: '2018-03-23'
section: General
url: http://www.bbc.co.uk/news/uk-england-beds-bucks-herts-43516011
content: |-
  Nadine Turnbull struggles with a rare condition where her head is not properly secured to her body.

  A woman, whose friends call her "the girl with the wobbly head", lives with the fear that the slightest bump could kill her.

  Nadine Turnbull, from Milton Keynes, has a rare condition called Ehlers-Danlos syndrome and is hoping to raise £100,000 for surgery in the United States.
