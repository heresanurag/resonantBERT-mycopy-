  Manchester United set to make new bid for Everton's Jarrad Branthwaite, Crystal Palace reject £50m Newcastle move for Marc Guehi, Leicester eye Wilfried Zaha, plus more.

  Slide 1 of 3 , Back page of the Mirror , Back page of the Mirror

  Manchester United to make another move for Everton defender Jarrad Branthwaite, Juventus eye Raheem Sterling, plus more. Manchester United are planning a fresh bid for Everton's 22-year-old England defender Jarrad Branthwaite after learning their new signing Leny Yoro is unlikely to play again this year. (Sun), external The Netherlands centre-back Matthijs de Ligt, 24, and Morocco full-back Noussair Mazraoui, 26, are expected to join Manchester United from Bayern Munich with progress being made in talks between the two clubs. (Sky Sports Germany), external Juventus are examining the feasibility of signing England winger Raheem Sterling from Chelsea but realise they will face competition from other Premier League clubs for the 29-year-old. (Gianluca di Marzio - in Italian) , external Bayern Munich have pulled out of a deal to sign 28-year-old Germany defender Jonathan Tah from Bayer Leverkusen. (Kicker - in German), external Crystal Palace have rejected a second bid, believed to be worth about £50m, from Newcastle United for centre-back Marc Guehi, 24, as talks continue between the two clubs. (Sky Sports), external Wolfsburg defender Maxence Lacroix has been identified by Crystal Palace as the man to replace Guehi, with the 24-year-old entering the final year of his contract at the Bundesliga club. (Florian Plettenberg), external American billionaire John Textor has made a bid to become the majority owner of Everton, which could end the saga around the sale of the club. (Guardian), external Brazil forward Rodrygo, 23, has no intention of leaving Real Madrid even if Manchester City try to bring him in as a replacement for Argentina striker Julian Alvarez, who is set to join Atletico Madrid. (AS - in Spanish), external

  Crystal Palace are in talks with Galatasaray about a season-long deal for former Eagles winger Wilfried Zaha. The 31-year-old Ivory Coast forward left Selhurst Park to join the Turkish club on a free transfer last summer. (Guardian), external Leicester City are also working on a deal to sign Zaha from Galatasaray. (Athletic - subscription required), external Arsenal are ready to sanction 25-year-old English forward Eddie Nketiah's departure to Marseille on loan with an obligation to buy for a fee in the region of £25m. (Athletic - subscription required), external Wolverhampton Wanderers have targeted Ajax's 20-year-old Portugal winger Carlos Forbs as a replacement for compatriot Pedro Neto, 24, who is closing in on a move to Chelsea. (Fabrizio Romano), external West Ham United are close to winning the race to sign 24-year-old France defender Jean-Clair Todibo from Nice amid strong competition from Juventus. (Telegraph - subscription required), external Championship side Queens Park Rangers are interested in Japan's 22-year-old attacking midfielder Koki Saito, who plays for Belgian club Lommel. (West London Sport), external Barcelona have closed the door on a move for Liverpool's Luis Diaz for the time being but the Catalan club's sporting director Deco and president Joan Laporta remain fans of the 27-year-old Colombia winger. (Sport - in Spanish), external
