title: Cohen leaves court as charges listed - BBC News
date: '2018-08-21'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-45266608
content: |-
  The former lawyer to President Donald Trump left court without comment after pleading guilty to eight charges.

  Robert Khuzami, deputy US attorney for the southern district of New York, listed some of the charges against Cohen.
