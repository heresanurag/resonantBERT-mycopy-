  Party leaders have been asked about where they stand on the topic of single-sex spaces.

  What are the parties saying about women's rights and gender identity?

  Sir Keir Starmer and Rishi Sunak have clashed over single-sex spaces

  Sir Keir Starmer and Rishi Sunak were both quizzed about women-only spaces in their final head-to-head debate before the election. So what have the main parties said about transgender rights, women's rights and gender identity so far?

  Prime Minister Rishi Sunak has suggested voters face a "crystal-clear choice" at this election about the protection of single-sex spaces. The Conservatives say that - if re-elected - they will "protect female-only spaces and competitiveness in sport", by rewriting the Equality Act to make clear that sex as a protected characteristic means biological sex. "Keir Starmer has not matched my pledge to reform the Equality Act to pass new law...he's not sure, like I am, that sex means biological sex, and that's how you protect female-only spaces and services," the PM told the audience at Wednesday’s debate. Guidance around the Equality Act , externalsays certain spaces can be single-sex only, if it is proportionate and intended to achieve a legitimate aim such as privacy or the prevention of trauma. The Conservatives suggest change is needed to clarify that sex in this context means biological sex. Some people believe that trans women – that is, people who were born male but who now identify as female – should have access to the single-sex spaces and events that are specifically for women. This is contested by some women’s rights groups, and they are pressing for clarification of the Equality Act so that single-sex spaces such as women’s prisons, rape crisis centres, sports teams and changing rooms, are only open to biological women.

  The Conservatives have not confirmed an outright ban on conversion therapy

  In May, the government released draft guidance, external that schools in England "should teach the facts about biological sex and not use any materials that present contested views as fact, including the view that gender is a spectrum". Parents would have a right to know if their child wants to be treated as the opposite sex, the Conservative manifesto says, with schools having to involve parents in decisions about their children. Unlike Labour and the Lib Dems, the Conservatives have not promised to ban conversion therapy, which attempts to change someone's sexual orientation or gender identity. There is no legal definition, but in practice it means trying to stop or suppress someone from being gay, or from identifying as a different gender to their sex recorded at birth. Theresa May first pledged to ban it in 2018, and the government launched a consultation about how that would work. But the party now says it needs to take more time before deciding whether existing laws are strong enough or extra protection is needed.
