  Sir Keir Starmer defended his position on single-sex spaces in Wednesday's debate. "It's very important that we protect female-only spaces," he said, adding that he treats transgender people "as I treat all human beings - with dignity and respect". He referred to guidance around the existing Equality Act, which says that a trans person with a Gender Recognition Certificate could be prevented from using a single-sex service in some circumstances. It is not the first time he has been challenged about his messaging around women and transgender people. In 2021, Labour MP Rosie Duffield, who has consistently argued that sex is a matter of biological fact, posted a message on social media stating: “Only women have a cervix." Questioned about this, Sir Keir criticised her position, saying it was “not right”. But in a recent BBC Question Time debate, he said he agreed with former Prime Minister Tony Blair’s comment, that "biologically, a woman is with a vagina and a man is with a penis". He followed that up by saying some people don’t identify with their birth sex, adding: "My view in life is to respect and give dignity to everyone, whatever their position." He suggested his earlier comments were made in the context of a “toxic” and “hardline” atmosphere around trans rights. His comment prompted author JK Rowling to write in the Times newspaper that she would “struggle” to vote for him. She said she was propelled by “freedom of speech and observable truth” and believed Labour was “dismissive and often offensive” towards women fighting to retain sex-based rights – she said the party had “abandoned” women.

  Author JK Rowling said she would 'struggle' to support Labour given its stance on women's rights

  Labour’s education spokeswoman has refused to clarify whether the party would scrap the Conservatives’ proposed ban on schools in England teaching pupils about gender identity. Bridget Phillipson told the BBC protected characteristics such as gender reassignment should be taught “but on a factual basis at an appropriate age...[not] based on contested ideology”. In its manifesto, Labour has pledged to ban conversion therapy, and would include transgender people in that ban. It has also pledged to remove the “indignities” from the process of applying for a gender recognition certificate, which allows a person to change their legal sex. It pledged to "modify, simplify and reform" the process, while keeping the requirement for a medical diagnosis of gender dysphoria

  The Lib Dems would seek to completely overhaul the gender recognition process, removing the requirement for a medical diagnosis if a person wanted to change the sex listed on their birth certificate. Like Labour, the party promises to ban conversion therapy outright, while non-binary identities - those who do not consider themselves to have a solely male or female identity -would be recognised in law. The party says it would also require large employers to monitor and publish data on LGBT+ employment levels, pay gaps and progression, building on the mandatory reporting around gender pay gap data that already exists.

  John Swinney, who took over as SNP leader in May, has said he will "wait and see" after the general election about pursuing changes to gender recognition rules. The party had previously tried to enact a controversial bill that would allow transgender people to change their legal sex through self-identification - so without the need for a relevant medical diagnosis. It was blocked by the UK government last year, on the grounds that it would interfere with equality law in the rest of the UK. Previous SNP leaders Nicola Sturgeon and Humza Yousaf backed the idea of self-ID, but in 2019 some Scottish MPs, including the now-deputy leader Kate Forbes, urged the Scottish government not to rush into "changing the definition of male and female". In its election manifesto, the party says that if Scotland were to become independent from the rest of the UK "we would have the full powers to improve equality in law and society".

  In its list of pledges, Reform UK says “divisive, ‘woke’ ideology has captured our public institutions”. The party says “transgender indoctrination is causing irreversible harm to children”, and plans to ban what it describes as “transgender ideology” in schools in England. In practice, this means “no gender questioning, social transitioning or pronoun swapping”. The party would also scrap the Equality Act and diversity, equality and inclusion rules, which the party suggests are lowering economic productivity. When leader Nigel Farage was recently asked on BBC 5Live how he would interact with transgender people as the opposition party, he said that “while we should respect the rights of transgender people...we equally must respect the rights of women too, and women-only spaces”. He also suggested that a scenario in which someone who had gone through male puberty competed in a women’s swimming race “shouldn’t happen”.

  The Green Party supports the idea of trans and non-binary people to be legally recognised in their chosen gender through self-identification. It also supports a change in law so an ‘X’ could be added as a gender marker in the passports of non-binary and intersex people, if they wanted to use it.

  Like the Lib Dems and others, Plaid Cymru would seek to introduce a policy of self-identification if someone wanted to change their legally recognised gender, without the need for a medical diagnosis.
