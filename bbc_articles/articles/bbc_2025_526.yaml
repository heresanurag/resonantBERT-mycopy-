title: Oliver Ryan suspended as Labour MP over Whatsapp messages - BBC News
date: '2025-02-10'
section: Politics
url: http://www.bbc.co.uk/news/articles/cly5xdvnn16o
content: |-
  Ryan had been summoned to a meeting with his chief whip after the Mail on Sunday published the texts.

  Burnley MP Oliver Ryan has become the second MP to be suspended from the Labour parliamentary party over his membership of a WhatsApp group which contained offensive messages. Ryan was summoned to a meeting with Chief Whip Sir Alan Campbell, after the Mail on Sunday published the messages. Ahead of the meeting he issued an apology in which he said the comments in the group had been "completely unacceptable" and he regretted "not speaking out at the time". He follows Andrew Gwynne, who was also sacked as a health minister, in losing the whip after his participation in the WhatsApp group was revealed.

  In his statement, Ryan said: "I did not see every message, but I accept responsibility for not being more proactive in challenging what was said." He added: "I also made some comments myself which I deeply regret and would not make today and for that, I wholeheartedly apologise." The messages - sent to the WhatsApp group named Trigger Me Timbers - are reported to show Ryan mocking a Labour MP for his sexuality, and denigrating the vice-chairman of the local Labour Party. In a statement, a Labour spokesperson said: "As part of our WhatsApp group investigation, Oliver Ryan has been administratively suspended as a member of the Labour Party. "As soon as this group was brought to our attention, a thorough investigation was immediately launched and this process is ongoing in line with the Labour Party's rules and procedures. "Swift action will always be taken where individuals are found to have breached the high standards expected of them as Labour Party members."

  In the messages seen by the Mail on Sunday, external, Gwynne, who is the MP for Gorton and Denton, appears to suggest a councillor should respond to a 72-year old constituent asking about bin collections with the message: "I'm re-elected and without your vote. Screw you. PS Hopefully you'll have croaked it by the all outs [the local elections]." In another exchange, asked if an American psychologist will be attending an event, Gwynne replies: "No. He sounds too militaristic and too Jewish. Is he in Mossad?" On a different occasion he discusses fellow Labour MP Diane Abbott representing the party at Prime Minister's Questions saying: "Yep because its Black History Month." In a social media post, Gwynne said he apologised for any offence caused by the "badly misjudged" comments. Three Tameside councillors have also resigned from their executive duties while a Labour Party investigation takes place. Greater Manchester Police (GMP) said a non-crime hate incident had been recorded after a "small number of complaints relating to publicised messages allegedly from a WhatsApp group", without confirming the identity of those involved. A non-crime hate incident is a record kept by police of speech or actions deemed hostile to characteristics like race, sex or disability.

  Abbott told the BBC's World at One she was not surprised to learn about "distasteful" comments reportedly made about her in the WhatsApp group. Asked for her reaction, the Labour MP said: "Well, it's very distasteful but to be frank, it's not the first time people have said things like that about me here in the House of Commons and I just have to, as it were, keep my chin up and get on with my job." She added: "(It's) MPs of all parties, it's just the way it is. It's very sad that, in 2025, people haven't moved beyond that. "But my response is always to get on my job. After all, there are people of colour in other walks of life that have to suffer much worse abuse." Abbott said she knew Gwynne and she "wouldn't want to say I'm surprised" by the reported comments. "Those sorts of remarks are made by too many MPs when they think I can't hear," she added. Conservative shadow paymaster general Richard Holden said: "With two MPs suspended in just two days for their vile remarks, it is now clear how deep the rot is inside Sir Keir Starmer's Labour party. "But Sir Keir cannot now try and sweep this under the carpet. He should show some leadership, do the right - and decent - thing and expel them both." West Lancashire MP Ashley Dalton has been appointed to replace Gwynne as health minister. Dalton became an MP in 2023, winning the seat of West Lancashire and since the election had been serving as the parliamentary private secretary to Health Secretary Wes Streeting. At the same time, the government announced that Douglas Alexander would become a Cabinet Office minister with responsibility for relations with devolved governments, in addition to his current role in the business department. Other appointments see Lord Moraes and ex-MP Lord Wilson of Sedgefield become government whips, responsible for party discipline.
