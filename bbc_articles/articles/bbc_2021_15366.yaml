title: Polls close in North Shropshire by-election - BBC News
date: '2021-12-17'
section: Shropshire
url: http://www.bbc.co.uk/news/uk-england-shropshire-59668219
content: |-
  The vote follows the resignation of Conservative MP Owen Paterson in November.

  The polls opened at 07:00 GMT on Thursday

  The polls have closed in the constituency of North Shropshire to elect a new MP.

  It follows the resignation of Conservative MP Owen Paterson, who was found to have breached parliamentary rules on lobbying.

  The former cabinet minister, who stood down last month, had held the constituency since 1997.

  There are 14 candidates standing in the election. Polls opened at 07:00 GMT and closed at 22:00.

  We will be covering the result of the ballot, with a declaration expected overnight.

