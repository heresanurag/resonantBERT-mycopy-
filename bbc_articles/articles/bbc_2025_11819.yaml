title: Ex-Premier League goalkeeper David Stockdale buys Farsley Celtic - BBC News
date: '2025-06-16'
section: West Yorkshire
url: http://www.bbc.co.uk/news/articles/cje7e5j5jgpo
content: |-
  Farsley Celtic were recently relegated three divisions after a turbulent season both on and off the pitch.

  David Stockdale played for clubs including Sheffield Wednesday, Fulham and Brighton during his playing career

  The manager of non-league football side Farsley Celtic has agreed to buy the club after months of insecurity regarding the team's future. The Leeds-based team, who were recently relegated from the sixth tier of English football to the ninth tier, announced David Stockdale's family would be taking over the side. Stockdale, who is from Leeds and played in the Premier League as a goalkeeper for Fulham, has managed The Celt Army since February. The formal completion of the purchase is subject to "final legal technicalities", according to the club.

  Delays installing a new 4G pitch at home ground the Citadel resulted in Farsley playing their home fixtures almost 70 miles away in Buxton, Derbyshire, last season. Club chairman Paul Barthorpe stepped down in February, with the board announcing its financial challenges were leaving the side in a "battle to get through the rest of the season". After relegation from National League North, the side were moved to the Northern Counties East League Premier Division - the ninth tier of English football - after they were were denied an FA licence.

  Farsley Celtic have been playing recent home games in Buxton due to delays to a pitch upgrade

  A statement posted on the club's website on Monday said: "The club can confirm that the Stockdale family has agreed with the major shareholders to acquire 100% of FC 2010 (Holdings) Ltd. "The formal completion of the purchase is subject to final legal technicalities. "The club will provide further updates in due course." Posting on Facebook, Stockdale, who also played for clubs including Sheffield Wednesday, Brighton and Birmingham, said: "Time to get started. Exciting times."

