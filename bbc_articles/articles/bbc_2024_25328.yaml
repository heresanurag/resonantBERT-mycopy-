  Meanwhile, Great Britain's Harry Ledingham-Horn finished fourth in the men's keirin, with Japan's Kento Yamasaki taking gold. There was further success for Japan in the men's scratch race as Kazushige Kuboki won gold, with Noah Hobbs of Great Britain in sixth. New Zealand's Ally Wollaston sealed gold in the women's elimination race, adding to the bronze she picked up in Wednesday's scratch event.
