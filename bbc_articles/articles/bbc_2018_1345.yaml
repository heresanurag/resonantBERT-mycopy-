content: |-
  Great Britain's Penny Coomes and Nick Buckland miss out on a top-10 ice dance placing on day 11 of the Winter Olympics.

  This video can not be played To play this video you need to enable JavaScript in your browser.

  Great Britain's Penny Coomes and Nick Buckland just missed out on a top-10 finish in the ice dance competition on day 11 of the Winter Olympics in Pyeongchang. After qualifying in 10th, the pair came 11th after their free dance while Canada's Tessa Virtue and Scott Moir won gold with a world record of 206.07. GB's Rowan Cheshire came seventh in the women's ski halfpipe final, when Canada won another gold through Cassie Sharpe. And there was disappointment in the men's halfpipe qualifiers as Britons Murray Buchan, Alexander Glavatsky-Yeadon and Peter Speight failed to qualify for the final.

