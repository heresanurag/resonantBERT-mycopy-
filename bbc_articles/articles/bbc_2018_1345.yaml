  Great Britain duo Mica McNeill and Mica Moore lie in sixth place going into Wednesday's final two runs of the women's bobsleigh competition. Pilot McNeill guided the sled to a time of one minute 41.72 seconds - 0.46 seconds behind the leading pair of Elana Meyers Taylor and Lauren Gibbs of the United States. Welsh champion sprinter Moore and McNeill won the junior Bobsleigh World Championship in Winterberg in January 2017, before British Bobsleigh and Skeleton Association withdrew funding for the women's team because of overspending. The pair managed to raise £30,000 through public donations to compete in the Bobsleigh and World Cup in Whistler in November, finishing in fifth place, something Moore said "was incredible". The crowd-funding total has since risen to more than £40,000. "If I'm honest I drove a bit better in training," McNeill told BBC Sport, after Tuesday's second run. "It's really different come the race and we are pleased with what we've put down, but we know there is more to come." Moore added: "It was so special to be out there tonight and I have so much trust and faith in Mica and know we can do something special."

