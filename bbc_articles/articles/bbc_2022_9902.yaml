  PM Boris Johnson faces Labour leader Sir Keir Starmer in Prime Minister's Questions for final time.

  In Boris Johnson's last Prime Minister's Questions, Labour leader Sir Keir Starmer paid tribute to Johnson and his family, and wished them well for the future.

  Starmer then attacked Johnson's legacy, highlighting the criticism of his economic policies by the Tory leadership candidates - while Johnson pointed to the Covid vaccine rollout, Brexit and economic growth.

  Live: PM clashes with Starmer in his final PMQs as leader
