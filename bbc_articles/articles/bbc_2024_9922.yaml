  Mrs Elphicke has said she will stand down as an MP at the next election, with Labour keeping their current candidate for the Dover and Deal constituency. Announcing her shock defection on Wednesday, she hit out at Prime Minister Rishi Sunak saying under his leadership the Conservatives "have become a byword for incompetence and division". She said the government's record on housing and border security were the key factors behind her decision, accusing Mr Sunak of broken promises and abandoning key pledges. Some Labour MPs also expressed concern that Mrs Elphicke's political views did not align with the party. The MP, who had been seen as on the right of the Tory Party, had previously been critical of Labour's stance on immigration. Canterbury MP Rosie Duffield said her colleagues were "baffled" by Mrs Elphicke's defection and she did not "believe for a second that [Mrs Elphicke] has suddenly transformed into a Labour MP". John McDonnell, who was shadow chancellor under former Labour leader Jeremy Corbyn, told LBC he was "surprised and shocked", adding: "I'm a great believer in the powers of conversion, but I think even this one would have strained the generosity of spirit of John the Baptist, quite honestly."

  The Labour Leader of Dover District Council, Kevin Mills, said what he had in common with Mrs Elphicke was "a limb on each corner of my body". He told BBC Radio Kent he was pleased she had realised "the only party that can improve this country is the Labour Party" but had "some real concerns" about her defection. Mr Mills added that he would work with her, even though they had disagreed on issues including the dispute over P&O Ferries sackings and cuts at border controls. The executive of the neighbouring Folkestone and Hythe constituency Labour Party said it was "shocked and appalled" that Mrs Elphicke had been accepted as a Labour MP. "We believe that she is a toxic and divisive figure who has no place in the Labour Party and that - while it might have been temporarily headline grabbing to accept her - tremendous damage has been done to the party's reputation in doing so," it added. However, Labour Party chairwoman Anneliese Dodds said Mrs Elphicke was a "good, natural fit" for her party, adding: "People can change their minds." Labour has said she could have an unpaid role advising the party on housing policy. She has campaigned for rent freezes and against homelessness - areas where she has common ground with Labour. Defence Secretary Grant Shapps said Mrs Elphicke's defection showed Labour leader Sir Keir Starmer was "an opportunist" without any "core beliefs". "[Labour] seem to think that it's fine to bring people into the party who believe completely different things - or did last week - to them," he added. It is the second defection to Labour for Mr Sunak in less than two weeks, after Dr Dan Poulter also quit the Tories last month. However, Mr Poulter was viewed as more in the centre of the Conservative Party.
