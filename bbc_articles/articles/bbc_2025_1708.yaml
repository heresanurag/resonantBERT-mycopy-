  Trump's attacks came after Zelensky accused the US president of living in a "bubble" of Russian disinformation. The US and Russia's relations have grown closer in recent days, after officials met in Saudi Arabia and agreed to negotiate an end to the war. Ukraine and European leaders were not invited to the talks.

