  According to Western officials, there are now preliminary discussions about providing a reassurance force to Ukraine. This force could use drones and intelligence gathering planes to monitor Ukrainian cities, critical infrastructure and ports rather than have troops in the east of the country. This would be part of plans to restore a safe international airspace over Ukraine and make the waters of the Black Sea secure. Western officials said there might be larger land forces based in countries bordering Ukraine. They also said that any US backstop is more likely to be in the form of airpower rather than troops on the ground and that these aircraft may be based in countries neighbouring Ukraine such as Poland and Romania. Russia's ambassador to the UK, Andrei Kelin, again rejected the idea of foreign peacekeeping troops being allowed in Ukraine in the event of any peace deal. Speaking to BBC Newsnight, the Russian ambassador to the UK said Moscow would not accept troops from the UK or other European nations in Ukraine, even if Trump approved the idea. Mr Kelin also questioned whether there could be a potential peace agreement without fresh elections in Ukraine.

