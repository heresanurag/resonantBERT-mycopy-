title: 'Ukraine Russia war: Starmer backs Zelensky after Trump calls him ''dictator''
  - BBC News'
date: '2025-02-20'
section: Europe
url: http://www.bbc.co.uk/news/articles/clyrnjrjrr5o
content: |-
  It comes as Western officials say less than 30,000 troops could be stationed in Ukraine as part of a peace deal.

  Prime Minister Sir Keir Starmer has backed Volodymyr Zelensky as a "democratically elected leader" after Donald Trump described the Ukrainian president as a "dictator". Sir Keir called Zelensky on Wednesday evening and told him it was "perfectly reasonable" for Ukraine to "suspend elections during wartime as the UK did during World War Two", Downing Street said. The US president had earlier criticised Zelensky, saying he had done a "terrible job" and claiming "he refuses to have elections" in Ukraine. Zelensky's five-year term was due to end in May 2024, but elections have been suspended since martial law was declared after Russia's invasion.

  Sir Keir will travel to Washington DC next week for his first in-person meeting with Trump. The PM has said he wants to use his meeting next week to discuss a "US backstop" that he says is necessary to deter Russia from attacking Ukraine again. But the deepening rift between the US and Ukraine has now increased the political jeopardy for him. Sir Keir has said he would be prepared to deploy British troops to Ukraine to help guarantee its security as part of a peace deal provided there was a US "backstop". Western officials said the number of land troops involved would be less than 30,000, with the aim of providing reassurance to the Ukrainian people, rather than a peacekeeping force.

  In his phone call with Zelensky, Sir Keir "stressed the need for everyone to work together", a Downing Street spokesperson said. "The prime minister reiterated his support for the US-led efforts to get a lasting peace in Ukraine that deterred Russia from any future aggression," they added. Zelensky said they had discussed "upcoming plans and opportunities", adding: "UK's support matters indeed, and we will never forget the respect the British people have shown for Ukraine and our citizens." There has been widespread criticism of Trump's comments around the world - including from Sweden's prime minister as well as German Chancellor Olaf Scholz, who said it was "simply wrong and dangerous". Trump's former vice-president, Mike Pence, also criticised the comments, posting on X: "Mr President, Ukraine did not 'start' this war. Russia launched an unprovoked and brutal invasion claiming hundreds of thousands of lives." Conservative leader Kemi Badenoch also defended the Ukrainian leader, writing on X, external that Zelensky was "the democratically elected leader of Ukraine who bravely stood up to Putin's illegal invasion". But Badenoch said Trump was "right that Europe needs to pull its weight" and called on Sir Keir to "get on a plane to Washington and show some leadership".

  Liberal Democrat leader Sir Ed Davey said calling Zelensky a dictator "must be where the line is drawn" and he hoped "the whole political spectrum... will speak with one voice in opposition to Trump's lies". Former Conservative PM Boris Johnson posted on X to say, external "of course Ukraine didn't start the war". "Trump's statements are not intended to be historically accurate but to shock Europeans into action," he added.

