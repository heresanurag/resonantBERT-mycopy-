content: |-
  In total, 183 prisoners were released by Israel, after Hamas released three Israeli hostages who were taken to Gaza on 7 October 2023.

  A bus carrying freed Palestinian prisoners was greeted with celebrations in Ramallah, in the occupied West Bank, on Saturday.

  It was carrying those who had been released from Ofer prison, in Israel.

  In total 183 prisoners were released by Israel - many coming from Ofer prison. In exchange, earlier Hamas released three Israeli hostages who were taken to Gaza on 7 October 2023.
