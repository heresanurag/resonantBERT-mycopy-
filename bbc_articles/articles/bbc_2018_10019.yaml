title: 'Vietnam bridge: Walking through a god''s hands - BBC News'
date: '2018-08-01'
section: General
url: http://www.bbc.co.uk/news/world-asia-45028342
content: |-
  A bridge made to look like a golden thread held up by a god is drawing tourists in Vietnam.

  Fancy a stroll through a deity's hands? Vietnam has unveiled its latest tourist attraction: the 150m-long Golden Bridge, perched on a mountaintop near the city of Danang.
