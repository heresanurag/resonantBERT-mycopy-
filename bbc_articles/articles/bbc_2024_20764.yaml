  Thorpe spent his entire first-class playing career at Surrey, whom he represented from 1988 to 2005. Surrey chair Oli Slipper said Thorpe "is one of the great sons" of the county and "there is an overwhelming sadness that he will not walk through the gates of the Oval again". Surrey chief executive Steve Elworthy added: "He achieved remarkable feats for club and country and was a hero to so many cricket fans." Thorpe scored an unbeaten 114 in the second innings of his Test debut against Australia in 1993 and had a Test best of 200 not out, made against New Zealand in 2002. He began coaching in Australia after retiring from playing in 2005, working with New South Wales before joining the England set-up from 2010 to 2022. Thorpe was appointed head coach of Afghanistan in March 2022, but he was admitted to hospital with a serious illness before he could join the team. BBC cricket correspondent Jonathan Agnew said Thorpe was a "mainstay of England's middle order throughout the 1990s" and called him "a gritty and unfussy left-hander". Agnew added that, after it had been announced that Thorpe had been admitted to hospital in 2022 in a serious condition, "no details were given and there have been no public updates until today". The cause of Thorpe's death has not been announced.

  England captain Stokes wore a special shirt in support of Thorpe in June 2022 after the Professional Cricketers' Association said the ex-England batter was "seriously ill". The shirt had Thorpe's name and the number 564 on the back - signifying his status as the 564th player to be capped by England. Stokes donned the shirt at the toss for the first Test against New Zealand at Lord's. He posted a picture on social media of himself in the shirt on Monday, along with a series of heart emojis following the news about Thorpe’s death. England batter and former captain Joe Root described Thorpe as a "hero, mentor and so much more". Vaughan, another ex-England skipper, thanked Thorpe "for all the advice throughout my career". Vaughan added: "You were a great player and a brilliant team-mate. You have gone far too young but you leave as an England cricket legend." Duckett added on X: "He was one of my heroes growing up and I was fortunate to work with him. My thoughts go out to all of his friends and family during this tough time."

