title: 'Graham Thorpe: Former England and Surrey batter dies aged 55 - BBC Sport'
date: '2024-08-05'
section: Cricket
url: http://www.bbc.co.uk/sport/cricket/articles/c06kkkkjmz6o
content: |-
  Former England and Surrey batter Graham Thorpe dies aged 55, says the England and Wales Cricket Board.

  This video can not be played To play this video you need to enable JavaScript in your browser.

  Former England and Surrey batter Graham Thorpe has died aged 55, it has been announced. Thorpe played 100 Tests for England between 1993 and 2005, as well as 82 one-day internationals. A stylish left-handed batter, he scored 6,744 Test runs for England, including 16 centuries, at an average of 44.66. Current England captain Ben Stokes was among those to pay tribute to Thorpe, along with the England and Wales Cricket Board (ECB) and Surrey, while Michael Vaughan said his former team-mate was a "legend" who had "gone far too young". "There seem to be no appropriate words to describe the deep shock we feel at Graham's death," the ECB said in a statement. "More than one of England's finest-ever batters, he was a beloved member of the cricket family and revered by fans all over the world. "His skill was unquestioned, and his abilities and achievements across a 13-year international career brought so much happiness to his team-mates and England and Surrey CCC supporters alike. "Later, as a coach, he guided the best England men's talent to some incredible victories across all formats of the game. "The cricket world is in mourning today. Our hearts go out to his wife Amanda, his children, father Geoff, and all of his family and friends during this unimaginably difficult time. "We will always remember Graham for his extraordinary contributions to the sport."
