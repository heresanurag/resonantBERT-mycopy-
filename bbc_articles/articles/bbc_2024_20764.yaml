  Former Sri Lanka captain Kumar Sangakkara described Thorpe as a "great man and legend" as he paid tribute to his fellow left-hander. Thorpe was a Wisden Cricketer of the Year winner in 1997 and the sport's 'bible' described him as "one of England’s greatest batters" in a post on social media. Former England spinner Shaun Udal said: "Such tragic news about Graham Thorpe, played with and against the little legend since the age of 10, great player and human being." David Gower, a former England captain and dashing left-hander, remembered Thorpe for "how good he was in all conditions". "One of his highlights... was the 64 not out at Karachi in 2000 where England won a series for the first time in yonks against Pakistan, in Pakistan, and they had to do it in pitch black darkness," Gower told Sky Sports. "We up in the commentary box 80 or 90 metres away couldn't see anything live. "Only the genius of TV cameras allowed us to see what was going on, but that was a good example of his grit, determination and will to win. "He was very talented and what bears that out are his figures against all-comers."

