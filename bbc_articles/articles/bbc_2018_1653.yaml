title: Tom Daley announces baby news with husband - BBC News
date: '2018-02-14'
section: Devon
url: http://www.bbc.co.uk/news/uk-england-devon-43062264
content: |-
  The British Olympic diver and his husband Dustin Lance Black shared the news on social media.

  Tom Daley and Dustin Lance Black have been married for nine months

  British Olympic diver Tom Daley has announced he is expecting a baby with his husband, US film director Dustin Lance Black.

  They both shared the news on their social media accounts.

  The couple got married in a service at Bovey Castle Hotel on Dartmoor, Devon, in May last year.

  A spokesman for the couple told the Press Association: "Tom and Dustin are thrilled to share that they are expecting their first child in 2018."

  The couple posted a photograph of themselves holding up a baby scan picture on Instagram and Twitter, with the caption "Happy Valentines Day!".

  They have not revealed any more details about the pregnancy.

  Daley's mum Debbie Daley said she was "delighted" at the news.

