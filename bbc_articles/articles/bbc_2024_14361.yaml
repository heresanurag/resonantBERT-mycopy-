title: CCTV appears to show TV presenter Michael Mosley after leaving beach - BBC
  News
date: '2024-06-07'
section: UK
url: http://www.bbc.co.uk/news/articles/cl552xdq79do
content: |-
  The 67-year-old went missing on Wednesday after going for a walk on the Greek island of Symi.

  CCTV footage shows Michael Mosley in the main street of Pedi

  New CCTV images appear to show missing TV presenter Michael Mosley less than half an hour after he left a beach to go on a walk. The footage suggests he completed a walk to the nearby village of Pedi after leaving Agios Nikolaos beach while on a holiday on the Greek island Symi. The presenter, known for his TV programmes and his Just One Thing podcast which airs on BBC Radio 4, was reported to have left the beach on Wednesday at 13:30 local time (11:30 BST). The CCTV footage appears to capture the broadcaster in the village's main street holding an umbrella roughly 20 minutes later. A search and rescue operation, involving divers, helicopters and drones, was called off by Greek authorities at 20:00 on Friday evening. Emergency crews said it would resume on Saturday morning.

  A photo of Dr Mosley on holiday in Symi was shared on a local Facebook group on Wednesday

  Officials are now understood to be excluding the possibility Dr Mosley came to harm while walking between the beach and Pedi. The search and rescue operation had previously been focused on a rocky coastal path between the beach and Pedi that Dr Mosley was thought to have taken. The BBC has seen a second piece of CCTV footage from a nearby premises showing a man wearing the same clothes and carrying the same umbrella which was time stamped at 13:50. A woman said she had seen Dr Mosley in Pedi on Wednesday, the island's deputy mayor Ilias Chaskas told BBC News. Taking part in the search, Dr Chaskas said they have "looked everywhere", and divers had been "looking into the water" with the help of the Hellenic Coast Guard. Symi's coastguard said all patrol boats, private boats and commercial boats near the island had been searching for Dr Mosley. "Everybody is worried and looking for him," said Mika Papakalodouka, daughter of the mayor of Symi, Eleftherios Papakalodouka.

  The new CCTV footage suggests Dr Mosley did not come to harm on the coastal path

  The search party currently consists of 25 people including police officers, divers, volunteers and firefighters. Greek police said Dr Mosley left his wife Clare on the beach before setting off on a walk to the centre of the island on Wednesday. His phone was found where he was staying with his wife, who reported him missing, a police spokesperson told BBC News. His three adult sons and one daughter have flown to the island to join the search, Dr Mosley’s brother Arthur told The Telegraph on Friday. He said: “We are very shocked and perplexed by what has happened to him." After officers on the island were unable to find Dr Mosley, they requested help from the Greek fire department in Athens. Firefighters arrived in Symi from nearby Rhodes at 14:00 on Thursday.

  This video can not be played To play this video you need to enable JavaScript in your browser. A helicopter assisting with the search was filmed flying over Symi

  An appeal saying he was missing was posted on a local Facebook group on Wednesday, alongside a picture of Dr Mosley wearing a blue cap, polo shirt and shorts. "Have you seen this man? He set off to walk back from [Agios Nikolaos beach] at about 13:30 and failed to make it home," it said. It was extremely hot on the island on Wednesday, with the National Observatory of Athens reporting temperatures of more than 40C at 15:00.

  Symi is part of Greece's Dodecanese island group and sits about 12 miles (19km) north-west of Rhodes. In the 2021 census it had a population of approximately 2,600 people. The majority of its beaches are remote and people are advised to take boats to visit them.

  Maria and Antonis said locals could not understand the disappearance

  Father and daughter Antonis and Maria, who have lived on Symi all their lives, said his disappearance is shocking and confusing. “The place is very small. A little kid can’t get lost here. How does a man get lost?”

  With temperatures forecast to reach around 37C on Friday, a yellow high temperature warning has been issued across the island of Symi. The combination of the sweltering weather and rugged terrain will make the task for those searching for Dr Mosley even more challenging.

  A Foreign Office spokesperson said: "We are supporting the family of a British man who is missing in Greece and are in contact with the local authorities."

  Before moving into TV, Dr Mosley studied medicine in London and qualified as a doctor but for the last couple of decades has been working as a presenter, documentary maker, journalist and author. He writes a column for the Daily Mail and his TV programmes also include Channel 4 show Michael Mosley: Who Made Britain Fat? Dr Mosley has been an advocate for intermittent fasting diets, including the 5:2 diet and The Fast 800 diet. He has four children with his wife Clare Bailey Mosley, who is also a doctor, author and healthy living advocate. The couple recently appeared at the Hay Festival where Dr Mosley presented a special edition of BBC Radio 4's Just One Thing. Reacting to the "shocking news", his fellow Trust Me, I'm A Doctor co-star Dr Saleyha Ahsan said she was "praying he is found safe" and she feels "sick with worry". On Thursday's edition of The One Show, presenter Alex Jones opened the programme by expressing concern that "our friend" had gone missing. "Our thoughts are very much with his wife Clare and the rest of his family at this worrying time. We hope for more positive news," she added.
