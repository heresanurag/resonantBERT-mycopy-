title: Russian spy chief blames West for nuclear tension - BBC News
date: '2022-10-24'
section: General
url: http://www.bbc.co.uk/news/world-europe-63375420
content: |-
  The director of Russia’s foreign intelligence service answers questions from the BBC's Steve Rosenberg.

  The director of Russia’s foreign intelligence service (SVR) has denied that his country is using nuclear rhetoric amid tension with the West over the ongoing conflict in Ukraine.

  Sergei Naryshkin answered questions from the BBC's Steve Rosenberg, and also accused Ukraine's President Volodymyr Zelensky of wanting to acquire nuclear weapons.
