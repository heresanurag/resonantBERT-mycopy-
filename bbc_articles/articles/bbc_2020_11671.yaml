title: 'Amy Coney Barrett: Who is Trump''s Supreme Court pick? - BBC News'
date: '2020-10-27'
section: US Election 2020
url: http://www.bbc.co.uk/news/election-us-2020-54303848
content: |-
  A favourite of social conservatives, Judge Barrett's confirmation swings the highest US court further right.

  Amy Coney Barrett's nomination to the US Supreme Court came as little surprise.

  The long-term academic, appeals court judge and mother of seven was the hot favourite for the Supreme Court seat.

  Donald Trump - who as sitting president gets to select nominees - reportedly once said he was "saving her" for this moment: when elderly Justice Ruth Bader Ginsburg died and a vacancy on the nine-member court arose.

  It took the president just over a week to fast-track the 48-year-old conservative intellectual into the wings, and after a four-day confirmation hearing in the Senate, she was confirmed just over a week before the presidential election by 52 votes to 48.

  In prepared remarks released ahead of the hearings, Judge Barrett thanked Mr Trump for "entrusting me with this profound responsibility", which she called the "honour of a lifetime".

  Mr Trump has succeeded in tipping the court make-up even further to the right, just ahead of the presidential election, when he could lose power.

  Judge Barrett's record on gun rights and immigration cases imply she would be as reliable a vote on the right of the court, as Ginsburg was on the left, according to Jonathan Turley, a professor of law at George Washington University.

  "Ginsburg maintained one of the most consistent liberal voting records in the history of the court. Barrett has the same consistency and commitment," he adds. "She is not a work-in-progress like some nominees. She is the ultimate 'deliverable' for conservative votes."

  And her vote, alongside a conservative majority, could make the difference for decades ahead, especially on divisive issues such as abortion rights and the Affordable Care Act (the Obama-era health insurance provider).

  Judge Barrett's legal opinions and remarks on abortion and gay marriage have made her popular with the religious right, but earned vehement opposition from liberals.

  But as a devout Catholic, she has repeatedly insisted her faith does not compromise her work.

  Judge Barrett lives in South Bend, Indiana, with her husband, Jesse, a former federal prosecutor who is now with a private firm. The couple have seven children, including two adopted from Haiti. She is the oldest of seven children herself.

  Barrett with her family at an event to announce Trump's nominee

  Known for her sharp intellect, she studied at the University of Notre Dame's Law School, graduating first in her class, and was a clerk to Justice Antonin Scalia, who, in her words, was the "staunchest conservative" on the Supreme Court at the time.

  Like her mentor Justice Scalia, she is an originalist, which is a belief that judges should attempt to interpret the words of the Constitution as the authors intended when they were written.

  Many liberals oppose that strict approach, saying there must be scope for moving with the times.

  Judge Barrett has spent much of her career as a professor at her alma mater, Notre Dame, where she was voted professor of the year multiple times. One of her students, Deion Kathawa, who took a class with her earlier this year, told the BBC she was popular because she involved everyone in discussions. He found her "collegial, civil, fair-minded, intellectually sharp, and devoted to the rule of law secured by our Constitution".

  Another student told the WBEZ new site: "I feel somewhat conflicted because ... she's a great professor. She never brought up politics in her classroom... But I do not agree with her ideologies at all. I don't think she would be good for this country and the Supreme Court."

  Judge Barrett was selected by President Trump to serve as a federal appeals court judge in 2017, sitting on the Seventh Circuit, based in Chicago. She regularly commutes to the court from her home - more than an hour and half away. The South Bend Tribune once carried an interview from a friend saying she was an early riser, getting up between 04:00 and 05:00. "It's true," says Paolo Carozza, a professor at Notre Dame. "I see her at the gym shortly after then."

  Judge Barrett has continued to teach at Notre Dame Law School

  Prof Carozza has watched Judge Barrett go from student to teacher to leading judge, and speaks about her effusively. "It's a small, tight-knit community, so I know her socially too. She is ordinary, warm, kind."

  A religious man himself, he thinks it is reasonable to question a candidate about whether their beliefs would interfere with their work. "But she has answered those questions forcefully... I fear she is now being reduced to an ideological caricature, and that pains me, knowing what a rich and thoughtful person she is."

  A Hall of Fame picture of Amy Coney Barrett (right) hangs in Rhodes College, Tennessee, where she got her undergraduate degree

  Judge Barrett has defended herself on multiple occasions against charges that her religious faith might influence her in court. "I would stress that my personal church affiliation or my religious belief would not bear in the discharge of my duties as a judge," she once said.

  However, her links to a particularly conservative Christian faith group, People of Praise, have been much discussed in the US press. LGBT groups have flagged the group's network of schools, which have guidelines stating a belief that sexual relations should only happen between heterosexual married couples.

  LGBTQ advocacy group Human Rights Campaign has voiced strong opposition to Judge Barrett's confirmation, declaring her an "absolute threat to LGBTQ rights".

  The Guttmacher Institute, a pro-choice research organisation, declined comment on Judge Barrett specifically, but said appointing any new conservative Supreme Court justice would "be devastating for sexual and reproductive health and rights".

