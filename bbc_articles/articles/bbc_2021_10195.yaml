title: 'Your pictures of Scotland: 20 - 27 August - BBC News'
date: '2021-08-27'
section: Scotland
url: https://www.bbc.co.uk/news/uk-scotland-58309713
content: |-
  A selection of your pictures of Scotland sent in between 20 and 27 August.

  Send your photos to scotlandpictures@bbc.co.uk. Please ensure you adhere to the BBC's rules regarding photographs that can be found here.

  Please also ensure you follow current coronavirus guidelines and take your pictures safely and responsibly.

  Conditions of use: If you submit an image, you do so in accordance with the BBC's terms and conditions.

  George McLaughlin took this drone shot of Richard Groom's Floating Head concrete sculpture in the Canting basin in Glasgow.

  Jamie Ballantine from Blanefield said that after "hundreds of hours" spent trying to capture a photo of a kingfisher, this one appeared "on a branch above the water just five metres away."

  Natalie Gardiner from South Queensferry took this photo of her four-year-old son's "last day of summer before starting Primary One" at Seacliff Beach.

  Tom Kelly from Edinburgh said: "I was delighted to capture these goldfinches putting on quite a display around Murrayfield Stadium."

  Morag Calder sent in this picture of her dog Angus having a chat with the neighbours.

  Jack Roden from Lanark captured this shot at the beach in Durness.

  Robyn Gilfillan took this tender photo at Inverbeg, Loch Lomond.

  Rudi Pereira took this shot from the summit of Arthur's Seat in Edinburgh while waiting for the blue moon to rise.

  Jayne Elder said: "Splendid sunset with views to Jura and a piper, enjoying the ambience on camping holiday in Port Ban."

  Ian Barnes said: "This dog looked suitably bored on a warm and muggy day at South Queensferry watching life go by from the top window."

  Katrina McPherson took this dramatic shot on a boat trip near North Berwick.

  Marianne Lang from Aberdeen said: "Peace returns to Salen Bay, Arisaig, after tropical rain."

  Francis McCafferty took this photo of Loch Duich featuring Eilean Donan Castle.

  Andrew Davidson said: "Snapped this pic of our 10-year-old son Jensen chilling, watching the beautiful sunset on the Lake of Menteith."

  Andrew Leishman said: "Here is 10-year-old Bradley at his happiest catching stones whilst playing in the River Forth at Bo'Ness."

  Chris Barrow braved the midges to stop and take this photo descending from Loch Ericht down towards Loch Rannoch on his bike.

  Danny McCafferty took this on "a beautiful evening at Waulkmill Bay, Orkney".

  Douglas Baxter snapped this photo of a Peacock butterfly in Larkhall.

  Allan Pettigrew said: "Took this photo while having a walk through the Hermitage, just outside Birnam in Perthshire. It shows the Black Linn Falls in full flow below Ossians Hall."

  Jane Borthwick took this photo of Nairn bandstand on a recent visit to her hometown.

  Jean Crosland captured this shot of "rainbow power" at Swanston, Edinburgh.

  Lloyd Best sent in this photo of kayaking in The Minch, off Scourie, as the sea haar descended.

  Louise Simpson from Banff said: "I love the kaleidoscope effect created by afternoon sun shining through fluffy willowherb seeds"

  Mary McClymont from Edinburgh took this night shot of the Falkirk Wheel.

  Nicola Rae said: "Our five-year-old cockapoo Pepper enjoying a gloriously sunny evening walk under Stirling Castle at the Kings Knot known locally as "the Cup and Saucer."

  Susan Ferguson from Livingston said she was "photobombed" by a hoverfly as she tried to take a picture of a linseed flower in her garden.

  Curtis Welsh said: "Whilst driving from Kelso to St. Boswells in the Scottish Borders, I just had to stop and get this dramatic image of the Eildon Hills."

  Anna Bobak said: "Amber and I were celebrating International Dog Day by watching sunset on Ben A'an. It was a stunning evening and she was such a good girl!"

