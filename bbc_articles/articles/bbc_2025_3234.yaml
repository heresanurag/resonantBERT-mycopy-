  Despite Wales' travails over the past 18 months, World Cup winner Matt Dawson says England must expect a backlash at the Principality Stadium. "I have a sneaky suspicious something weird could happen down at the Principality," Dawson said on Rugby Union Weekly. "Wales have no right to beat England in the current form. And yet I couldn't call it."

  Max Ojomoh, whose father Steve played for England in the 1990s, has scored two tries in 10 games for Bath this season

  Meanwhile England have called Bath centre Max Ojomoh into their training squad as a replacement for club-mate Ollie Lawrence. Lawrence sustained a serious Achilles tendon injury in the win over Italy and is set for a lengthy spell out of action. It means Henry Slade is set for a return to the matchday squad, while Elliot Daly also impressed after moving into the midfield in Lawrence's absence.

