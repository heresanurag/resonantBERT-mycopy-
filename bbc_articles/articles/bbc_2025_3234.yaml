content: |-
  Jamie George lost the England captaincy before the Six Nations got under way

  Coverage: Live commentary on BBC Radio 5 Live, BBC Sounds and the BBC Sport website and app

  England vice-captain Jamie George says the Six Nations finale in Cardiff will be like a "World Cup final" for Wales as they seek to end a 16-match losing streak. The two sides meet on Saturday with England in contention to win their first title since 2020. But Wales will be desperate to stop their record losing run against their biggest rivals, according to George. "Wales are going to be so motivated - England against Wales in Cardiff is huge," the hooker told the BBC's Rugby Union Weekly podcast. "It will be their World Cup final. It doesn't get much bigger than Wales against England in Cardiff." After losing in Dublin on the opening weekend, England have recovered to win three on the bounce - and a fourth victory would leave them well placed if favourites France were to slip up against Scotland on the final day.

  Wales have yet to win this Championship, but George is wary of the improvements they have made since Matt Sherratt's appointment as interim boss. "Everyone has seen the progress in the team, so they are not going to roll over and give it to us," he added. "So we are going to have to be ready. It is a six-day turnaround and there are challenges there, but we will be ready to go in Cardiff. "For us we are going there looking to win the tournament. "Obviously there are certain things we can't control with that, but we will be highly motivated."

