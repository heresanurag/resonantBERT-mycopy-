title: Ban degrading and violent online pornography, review proposes - BBC News
date: '2025-02-27'
section: Politics
url: http://www.bbc.co.uk/news/articles/c0q1wx3nzy9o
content: |-
  A government-commissioned review will call for content showing women being choked during sex to be illegal.

  This video can not be played To play this video you need to enable JavaScript in your browser. Baroness Bertin: "Whether you’re 15 or 55 there is a great deal of content that just should not be allowed"

  Degrading, violent and misogynistic pornography should be banned, a review of the industry has recommended. The review, commissioned by the previous government and headed by the Conservative peer Baroness Gabby Bertin, urges ministers to give regulator Ofcom sweeping powers to police porn sites deemed to contain "harmful" material. It proposes outlawing "degrading, violent and misogynistic content", including making it illegal to possess or publish pornography showing women being choked during sex. Non-fatal strangulation is already an offence if someone does not consent but its depiction online is not illegal and the review finds it is "rife on mainstream platforms".

  The review proposes that porn videos considered too harmful for any certificate in the offline world should be banned online. Baroness Bertin argues that online pornography contributes to some of the "gravest issues in our society, from domestic violence to toxic masculinity to the mental health crisis among young people". She told the BBC: "I'm not saying that people shouldn't watch porn. I'm not saying porn shouldn't exist. I'm not a prude." However, her 32 recommendations on what government should do about the "high-harm sector" of legal online pornography are likely to initiate a debate about how far the state should police people's sex lives. Baroness Bertin said online porn was not "properly scrutinised and regulated" in the same way as offline content. "It strikes me as incredible that to buy a DVD, which sounds so sort of retro, the BBFC [British Board of Film Classification] has to put a stamp on it, has to check that certain standards have been met. That there's no sense you are encouraging child sexual abuse. No harmful, degrading, humiliating practices which is not through consensual roleplay," she told the BBC. "You just have to go on the homepages of some of these mainstream sites and you will see of all that degrading content – particularly violent towards women – and it's all there for everyone to see." Her report suggests pornography websites depicting the non-fatal choking of women during sex has normalised such behaviour in the real world, with violent and degrading material rife on mainstream platforms amid a "total absence of government scrutiny". The review cites research suggesting that over a quarter of the nation regularly accesses online porn with a third of all men watching material at least once a week. It concludes that increasingly disturbing content is "rewiring" the way young people think about gender, sex and their role in society. The Department for Science Innovation and Technology said it would look at the links the review highlighted. "We have already announced we will ban the creation of intimate deepfakes without consent and from next month under the Online Safety Act platforms will have to proactively tackle illegal content including extreme pornography and sexual abuse material," the spokesperson said. "But further action is needed to address the review's shocking finding that graphic strangulation is increasingly appearing in pornography, despite being illegal, and is becoming normalised in real life. "We will urgently ensure that platforms, law enforcement and prosecutors take all necessary steps to tackle this disturbing harm." Downing Street also described the findings of a report into the porn industry as "shocking", and suggested it would "act swiftly" to address gaps in the law - but stopped short of saying it would be banned. The review's recommendations were welcomed by the End Violence Against Women Coalition, which called for action from the government to address the harms arising from the current state of the porn industry. "We know these companies are profiting enormously from sexual violence, and until they are forced to clean up their act, they won't," the group's director Andrea Simon said. Madelaine Thomas, an adult content creator, also welcomed the review but added: "If we look to police people's sexual interests that's problematic. "I don't think prohibition has ever eliminated demand in any way but I do think there are ways that we can work together to come up with frameworks that prioritise both consent and compassion and allow people to create and view what they would like to view on the internet," she told BBC Two's Politics Live.

  Baroness Bertin argues that her proposals for sweeping new controls in currently legal pornography online would prevent real-world violence against women and girls. The review relates how a 14-year-old boy asked a teacher how to choke girls during sex and suggests online porn has created "such a confusing world for our sons". "They are, quite rightly, encouraged and taught to reject sexist attitudes, while a subterranean online world of pornography is simultaneously showing them that anything goes," Baroness Bertin writes. Ministers are urged to fund programmes for boys and young men which encourage positive masculinity and counter misogynistic culture. The report quotes BBC research suggesting up to 38% of British women had experienced being strangled during intercourse, but notes that nearly half of those women wanted to be choked. "This is important in demonstrating freedom of sexual expression and its nuance," the review says. Nevertheless, the report concludes that society has decided that "enough is enough" of harmful online pornography and its impact on young people. Measures to increase regulation of pornography, including to prevent children accessing explicit content, are already part of the Online Safety Act, which became law in October 2023.

