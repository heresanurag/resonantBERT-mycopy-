title: William and Kate congratulate Team GB as Paris 2024 Olympics ends - BBC News
date: '2024-08-13'
section: General
url: http://www.bbc.co.uk/news/videos/cr5n69dnp5zo
content: |-
  Celebrities Snoop Dogg, David Beckham, Jessica Ennis-Hill and others joined the royal couple in a video message.

  The Prince and Princess of Wales have called Team GB’s athletes an “inspiration to us all” ahead of the Olympics’ closing ceremony.

  In a video posted on X, Prince William and Catherine congratulated the athletes alongside celebrities American rapper Snoop Dogg, former England footballer David Beckham, and retired Olympian Dame Jessica Ennis-Hill.

  It also includes messages from Rebecca Adlington, Gabby Logan, Sir Chris Hoy, Dame Kelly Holmes, Mark Chapman, Colin Jackson, Emma Willis, Greg James, Andrew Cotter, Michael Johnson and Clare Balding.

  The princess has made few public appearances since stepping back from royal duties in January. Catherine announced she was receiving cancer treatment in March and has since been seen at Trooping the Colour and the Wimbledon men’s singles final.
