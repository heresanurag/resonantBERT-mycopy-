title: Police still hunting 100 suspects over Harehills disorder - BBC News
date: '2024-09-13'
section: West Yorkshire
url: http://www.bbc.co.uk/news/articles/c77l72r1j4eo
content: |-
  Dozens of people who took part in the disorder in Leeds in July remain at large, police say.

  A bus was set on fire during the disorder in Harehills on 18 July

  At least 100 people are still being hunted by police following violent disorder in Leeds in the summer, a meeting has heard. Trouble flared for several hours in Harehills on Thursday 18 July after police were called by the city's children's services to help take four children into care. West Yorkshire Police's Chief Constable John Robins told a meeting of the county's police and crime panel on Friday that 35 arrests had been made in relation to that night's events, but added that the investigation would continue for "some time". Meanwhile, the region's mayor has announced a public consultation with people living in Harehills over issues linked to the disorder.

  Speaking at the meeting, the Chief Constable praised front-line officers, who he said had "faced a series of violence and situations that were unannounced, unplanned and came out of absolutely nowhere". He told councillors from across West Yorkshire that police operations had been "quickly overwhelmed".

  Emergency services and community figures were praised for their efforts in trying to thwart and clean up after the violence

  Explaining the police's decision to withdraw from the area several hours into the violence, Mr Robins said: "Through engagement with local people and key individuals, it became clear that the single target in that crime and disorder was the police and nobody else. "There were no injuries to members of the public. We are very, very grateful to the community and volunteers in all sorts of places and at different times who helped on the night." Mr Robins told the meeting that the "vast majority" of those involved in the trouble were "local to Harehills", but said he believed others from outside the area turned up later on during the night. "We have made 35 arrests so far and we have at least 100 more people where work is ongoing to identify them yet. The investigation will go on for some time," he said.

  At the meeting, West Yorkshire's mayor Tracy Brabin praised councillors and community figures who she said went "throughout the night without sleep and were making sure the fires were put out and people were sent back to their homes". She added: "The fact nobody was hurt is a really good outcome for us." Ms Brabin said she was now developing a "programme of consultation" with members of the Harehills community to gain feedback from the incident. She said issues arising from that would be discussed at a meeting due to be held in the area in November. She added: "What I’d like to do is to talk to members of the community about their thoughts on what questions we should be asking the Chief Constable and the force in respect of Harehills. It would be valuable to get their questions." Listen to highlights from West Yorkshire on BBC Sounds, catch up with the latest episode of Look North or tell us a story you think we should be covering here, external.
