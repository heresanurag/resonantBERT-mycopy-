title: 'Brexit: Ministers plead with MPs to back Theresa May''s deal - BBC News'
date: '2019-01-13'
section: UK Politics
url: http://www.bbc.co.uk/news/uk-politics-46853689
content: |-
  Jeremy Corbyn vows to try to topple the government "soon" after the government's expected defeat in this week's key vote.

  This video can not be played To play this video you need to enable JavaScript in your browser. Brexit Secretary Stephen Barclay was questioned by Andrew Marr on whether the government is prepared for no deal

  The government has made a fresh plea to MPs to get behind Theresa May's Brexit deal in Tuesday's crucial Commons vote.

  No 10 says it is alarmed by reports MPs plan to take control of Brexit if Mrs May's deal is voted down, although a leading Tory rebel denies such a move.

  And Labour leader Jeremy Corbyn has vowed to table a vote of no confidence in the government if she loses, which could trigger a general election.

  The PM has warned of a "catastrophic" breach of trust if Brexit is thwarted.

  Writing in the Sunday Express, Mrs May told MPs: "It is time to forget the games and do what is right for our country."

  About 100 Conservative MPs, and the Democratic Unionist Party's 10 MPs, are currently expected to join Labour and the other opposition parties in voting against the deal.

  What is likely to happen next:

  Brexit Secretary Stephen Barclay told the BBC's Andrew Marr show there was greater "uncertainty" after Commons Speaker John Bercow's decision last week to allow MPs to change the parliamentary timetable.

  He warned "those on the Brexiteer side seeking ideological purity" by voting down Mrs May's deal they risked "leaving the door ajar to ways that increase the risk to Brexit".

  "There are lots of different plans being put forward by Members of Parliament that don't respect the result (of the referendum) or risk no deal," he added.

  Pressed on what would happen if the deal is defeated, Mr Barclay said he suspected the Commons would support something "along the lines of this deal" but declined to speculate on whether the government had a Brexit "plan B".

  This video can not be played To play this video you need to enable JavaScript in your browser. Jeremy Corbyn on how Labour would negotiate Brexit: "The EU is well known to be flexible"

  Mr Corbyn said Labour would vote against Mrs May's deal and, if she lost, would start moves to trigger a general election.

  He told Andrew Marr: "We will table a motion of no confidence in the government at a time of our choosing, but it's going to be soon, don't worry about it."

  The Labour leader has said his party does not have the votes in Parliament to win a confidence vote on its own and has appealed to other parties to support it.

  Northern Ireland's DUP party, which keeps Mrs May in power, is also planning to vote against her deal but has said it will support Mrs May in a confidence vote.

  If a majority of MPs back a no confidence motion, the government - or any anyone else with sufficient support - will get 14 days to try to win another confidence vote. If no-one can do that, a general election will be held.

  Mr Corbyn is facing growing calls from within his own party to back a second EU referendum.

  He told Andrew Marr he hoped to get a general election first - and ensure that the UK did not leave without a deal.

  "My own view is that I'd rather get a negotiated deal now, if we can, to stop the danger of a no-deal exit from the EU on 29 March - which would be catastrophic for industry."

  A "no-deal" Brexit is where the UK would cut ties with the European Union overnight without a transition period. Theresa May's government, and many others, believe this would be hugely damaging and want a more gradual withdrawal. But if Parliament can't agree on that, and nothing else takes its place, the UK could still leave without a deal. This would mean the UK would not have to obey EU rules. Instead, it would need to follow World Trade Organization terms on trade. Many businesses would see new taxes on imports, exports and services, which are likely to increase their operating costs. That means the prices of some goods in UK shops could go up. The UK would also lose the trade agreements it had with other countries as a member of the EU, all of which would need to be renegotiated alongside the new agreement with the EU itself. Manufacturers in the UK expect to face delays in components coming across the border. The UK would be free to set its own immigration controls. However some UK professionals working in the EU and UK expats could face uncertainty. Some countries, such as Spain, Germany and the Netherlands, have given temporary guarantees about residency status and rights, but there is not yet an agreed policy for UK citizens across the EU in the event of a no-deal Brexit. The situation for holidays and business trips is a little clearer, as the European Commission has said that even in a no-deal scenario, UK travellers won't need a visa for short visits of up to 90 days. The border between Northern Ireland and the Irish republic would become an external frontier for the EU with customs and immigration controls, though how and where any checks would be made is not clear. Some Leave supporters think that leaving without a deal would be positive if the right preparations were made. They say criticism is scaremongering and any short term pain would be for long term gain. But critics - including both Brexit supporters and opponents - say that leaving without a deal would be a disaster for the UK: driving up food prices, leading to shortages of goods and gridlock on some roads in the South East resulting from extra border checks.

  Asked whether Labour would campaign to leave the EU if a general election was called, Mr Corbyn said his party would "decide our manifesto content as soon as we know there's an election coming".

  He said he would have to ask the EU to extend Article 50, the legal process taking the UK out of the EU on 29 March, if he won an election, which he said would take place in February or March, to allow time for a new Labour government to negotiate a Brexit deal of its own.

  Mr Corbyn wants the UK to be part of a customs union with the EU, with access to the single market.

