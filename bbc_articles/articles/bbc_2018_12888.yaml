id: bbc_2018_12888
title: Elle magazine sorry after Kim and Kanye tweet tried to dupe people - BBC News
date: '2018-10-20'
section: Newsbeat
url: http://www.bbc.co.uk/news/newsbeat-45915251
content: |-
  The publication tweeted Kim and Kanye had split to dupe people to register for the US mid-term elections.

  Kim and Kanye are still very much together - this is all a ruse to get people to register to vote

  Despite what you may have seen on Twitter, Kim and Kanye have not broken up.

  That's what Elle magazine appeared to claim in a tweet - except it turns out it was a dupe to get people to click through and vote in the US mid-term elections.

  The US edition's Twitter account tweeted: "Kim Kardashian and Kanye West are splitting up."

  It then linked directly to a voter registration page.

