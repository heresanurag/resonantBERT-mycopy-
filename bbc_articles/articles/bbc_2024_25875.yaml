  Some trains in Scotland were also cancelled, with many routes subject to speed restrictions. ScotRail paused services between Kilwinning and Largs/Ardrossan due to waves coming over the sea wall at Saltcoats and reaching overhead lines. Train speed restrictions were in place, external for services in the west and north Highlands, Ayrshire, Stranraer and between Perth and Inverness. ScotRail warned that services on Monday could be affected by trees and debris on the track. Network Rail Scotland said response teams were patrolling the Mallaig and Oban lines to clear fallen trees and branches. Meteorologists say Storm Ashley, the first named storm of the season, saw a rapid drop of pressure as it moved in from the Atlantic on Saturday - a phenomenon called a "weather bomb".

