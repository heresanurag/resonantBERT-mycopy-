content: |-
  The BBC's Carl Nasman explains how the ramping up of deportation efforts led to protests in many US cities.

  The BBC's Carl Nasman in Los Angeles explains how an increase in immigration raids as part of the Trump administration's mass deportation effort has sparked protests in cities across the US.

  After some turned violent, President Donald Trump deployed thousands of National Guard troops as well as hundreds of US Marines to LA to maintain law and order.

  California Governor Gavin Newsom has called the move unnecessary and inflammatory.
