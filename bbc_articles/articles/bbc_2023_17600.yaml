title: 'Camlough: Teenager Dylan Vallely dies weeks after crash - BBC News'
date: '2023-11-15'
section: Northern Ireland
url: http://www.bbc.co.uk/news/uk-northern-ireland-67425822
content: |-
  Dylan Vallely, 16, was a passenger in a car which crashed near Camlough on 27 October.

  A 16-year-old boy has died almost three weeks after a crash near the village of Camlough in County Armagh.

  Dylan Vallely, from Newtownhamilton, was one of three people involved in the single-vehicle crash on Sturgan Road on 27 October.

  Police said at the time that Dylan was a back-seat passenger.

  On Wednesday, his school said he "embodied everything that is positive about the young people of south Armagh".

  St Joseph's High School in Crossmaglen added the teenager, who died on Tuesday, was a shining light and a perfect pupil.

  "He was the perfect role model with his mature and courteous manner that leaves an indelible mark on all who had the privilege of knowing him," a social media post continued.

  "His impact on the life of St Joseph's High School is impossible to quantify, but his innate goodness will always be the standard by which all of us are measured, and that is a truly remarkable legacy to leave."

  In a statement, his GAA club, St Michael's, also paid tribute.

  Liam Carragher, the club cathaoirleach (chairman), said the club was heartbroken.

  "Dylan was a great lad, on and off the pitch, hardworking, talented and with great manners," Mr Carragher said.

  "He was well-known and loved within not just our club but also in the whole GAA community in south Armagh and further afield."

  Newry and Armagh assembly member Conor Murphy, of Sinn Féin, said Dylan was "an extremely talented young footballer who was well known within his local community and across all of south Armagh".

  "All our thoughts and prayers are with the family, friends and teammates of Dylan at this extremely difficult time," the MLA added.

  Police said its investigation into the single-vehicle crash is ongoing.

  Two other teenagers, aged 18 and 17, who were in the front of the car, required hospital treatment.
