title: Rishi Sunak tells Rwanda policy critics they are wrong after minister quits
  - BBC News
date: '2023-12-06'
section: UK Politics
url: http://www.bbc.co.uk/news/live/uk-politics-67643298
content: |-
  The prime minister says next Tuesday's vote on Rwanda bill will not be treated as confidence vote in his government.

  Nearly it from us - will Sunak get the backing he hopes for?

  We are shortly going to be bringing to a close our coverage of what's been an eventful few hours in Westminster and Whitehall. It actually all started last night when Immigration Minister Robert Jenrick quit the government over new Rwanda asylum legislation which he said wouldn't go far enough. Then came along the former home secretary who turned up the pressure on Rishi Sunak's plans. Suella Braverman - who was only sacked by Sunak three weeks ago - didn't mince her words when she appeared on Radio 4's Today programme, saying his policy "won't work" and "won't stop the boats". She urged the PM to change course, but it appears Sunak is sticking to his present heading. At 11:00 on the dot Sunak was in the Downing Street news conference suite to deliver a defiant and strong defence of his government's new legislation. He urged everyone to get onboard and back his plan. With the Commons due to vote on the next Parliamentary stage of the Rwanda Bill's progress this coming Tuesday, there's plenty more to come with this particular political story. Until then, here is some further reading from my colleagues for you to enjoy:
