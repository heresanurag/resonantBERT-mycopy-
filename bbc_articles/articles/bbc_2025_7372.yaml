  BBC Radio Wiltshire hosted a debate with candidates from the main parties ahead of polling day.

  Candidates for the main parties contesting the local elections in Wiltshire joined us for a debate.

  They covered subjects ranging from potholes to housing, and what to do now the A303 tunnel at Stonehenge has been cancelled.

