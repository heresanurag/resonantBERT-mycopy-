id: bbc_2022_3382
title: 'Covid: Wales entering ''steady state'' in managing virus - BBC News'
date: '2022-03-04'
section: General
url: http://www.bbc.co.uk/news/uk-wales-60623152
content: |-
  All Covid rules in Wales, including wearing face masks, are set to end at the end of March.

  Wales is getting to a "steady state" of being able to manage coronavirus, the first minister has said.

  Mark Drakeford believes this "stability" means future outbreaks can be dealt with like other infectious diseases, such as measles.

  At a Welsh government briefing, Mr Drakeford announced plans to end all remaining Covid measures on 28 March.
