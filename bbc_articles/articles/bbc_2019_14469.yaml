  The BBC's Shaimaa Khalil visits Balmoral where residents have been battling fires.

  The BBC's Sydney correspondent Shaimaa Khalil visits Balmoral where residents have been battling fires.

  Since September, Australia's bushfire emergency has killed at least nine people, destroyed more than 700 homes and scorched millions of hectares.
