title: 'China coronavirus: Road blocks and ghost towns - BBC News'
date: '2020-01-26'
section: General
url: http://www.bbc.co.uk/news/world-asia-china-51255918
content: |-
  A BBC team travels into Hubei province, where the deadly new coronavirus originated.

  Authorities in China are intensifying travel restrictions in an attempt to limit the spread of the deadly new coronavirus.

  The BBC's Stephen McDonell and his team travelled into Hubei province, where the outbreak originated.
