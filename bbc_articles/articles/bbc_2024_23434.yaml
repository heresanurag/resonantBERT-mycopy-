url: http://www.bbc.co.uk/news/articles/c5y52rpgdyzo
content: |-
  Eric Adams, who is accused of accepting illegal campaign funds, has rejected calls from his party to resign.

  NYC mayor pleads not guilty to bribery and fraud charges

  Adams arrives for his arraignment in federal court on Friday

  New York City Mayor Eric Adams has pleaded not guilty to five counts of criminal offences, including bribery, wire fraud and soliciting illegal foreign campaign donations. Wearing a dark blue suit, Adams arrived in federal court in New York for a brief hearing to enter his plea. "I am not guilty, your honour," he told Magistrate Judge Katharine Parker with a straight-faced expression, according to reporters in court. The 64-year-old was indicted earlier this week on allegations that he accepted illegal campaign funds and thousands of dollars in luxury travel benefits from Turkish businessmen and an official in exchange for his influence as mayor.

