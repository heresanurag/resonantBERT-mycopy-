  Adams has denied any wrongdoing and said the public should withhold judgement until he makes his defence. "I follow the rules, I follow the federal law, I do not do anything that's going to participate in illegal campaign activity," he said at a news conference. Adams gave a thumbs-up to reporters as he entered court on Friday morning. He was released on bail. Judge Parker ruled that Adams cannot talk to witnesses about the facts concerning the case, though he can discuss business or private family matters with them, according to US media. His lawyer, Alex Spiro, told reporters outside court that he would be filing a motion to dismiss the case next week. "The entire body of evidence is one staffer," he told reporters. "What you have not heard, is that that staffer has lied, and the government is in possession of that lie." If convicted, Adams could face up to 45 years in prison. He has rejected growing calls from members of his own party to resign. The former police officer was elected to lead the most populous US city nearly three years ago with a promise to be harsh on crime. Prosecutors say Adams's misconduct began in 2014, during his time as Brooklyn Borough president, and carried on during his election campaign for mayor and while in office. In the 57-page indictment, Adams was accused of pressuring New York City Fire Department officials to approve a Turkish consulate building without a safety inspection in exchange for benefits such as discounted flights, luxury hotels and meals. Prosecutors say he also misused $10m (£7.4m) in public funds. He is accused of using straw donors - a scheme that a person or entity uses to evade campaign finance limits - to take in illegal foreign donations and matching them with city funds that were supposed to be for small-dollar contributions from residents. The mayor is due back in court on 2 October. Adams has insisted he will stay in office while the case plays out, despite calls from Democrats at the state and federal level to resign. New York Governor Kathy Hochul has the power to remove Adams. She has said she needs time to review the indictment to “see what’s embedded with this”. Adams can also be ousted from the mayor's office by a so-called "inability committee", which would likely include at least a few city officials who oppose him. Adams’s arraignment comes as the federal government carries out a number of probes into his administration, which has seen a wave of resignations in recent weeks. The police commissioner, the health commissioner and the mayor's chief counsel have all left office as well as the schools chancellor, David Banks, who had his phone seized.
