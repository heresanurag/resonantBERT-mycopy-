id: bbc_2024_8306
title: 'Chile: Woman steals gun from guard and opens fire - BBC News'
date: '2024-04-02'
section: General
url: http://www.bbc.co.uk/news/world-latin-america-68710122
content: |-
  Live-streamed footage captured the moment a detainee stole a gun from a guard and opened fire in Chile.

  Three people were injured after a woman, who was being detained, stole a gun from a guard and opened fire outside a Chilean market on Monday.

  A guard and a cameraman were among the wounded. The cameraman was taken to hospital with serious injuries, where he was in stable condition, according to national newspaper La Nación.

  The incident, which took place at Lo Valledor market in Santiago, was captured on a live stream.

  Video showed the woman being escorted out of the market in police custody.
