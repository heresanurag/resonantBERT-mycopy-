  It was a tough night for the young defender, clearly seen as a weakness in City's make-up and relentlessly targeted down the flank. Guardiola's takeaway from this harrowing night must be that he needs a ruthless cull of those older names, players who have delivered so magnificently for him. Rarely has such an elite team's form and quality fallen off the cliff so fast and so hard. This is a team that has been allowed to grow too old together, that is now unable to find the old hunger that enabled it to return to the well of success so brilliantly year after year. Guardiola has signed a new two-year contract and his task must be to fashion a new team before it is time to discuss another deal. The Bernabeu is the most unforgiving arena in the Champions League, its stunning refurbishment complete with five tiers of stands looking down on City's demise. It was a particular galling night for Guardiola, not simply because the task in front of him was laid out in graphic, gruesome detail before his very eyes, but also because Real Madrid's fans revelled in his discomfort as a result of his Barcelona allegiances. Guardiola's name was met with deafening jeers and whistles when it was read out before kick-off, and when one of the many giant screens captured his despair in close-up after Mbappe's early strike, a huge roar of delight swept around the stadium. As City players trooped disconsolately away at the final whistle, some of them perhaps on their way out of this tournament forever with this club, there was no consolation to be had, certainly not from Gonzalez's late goal. Manchester City have had a magnificent run. They have lit up domestic and European competition with the quality of their football but this was a night when it looked like their race was run. It is time for change. The dismissive way they were treated by a Real Madrid side they have regarded as rivals in recent years showed they need new blood to return to that former golden status. It happens to the best of them and Manchester City were the best of them. Not any more.
