title: 'Ruben Amorim: Man Utd boss says his players are ''too anxious, too afraid''
  - BBC Sport'
date: '2025-01-04'
section: Man Utd
url: http://www.bbc.co.uk/sport/football/articles/crl36g92eglo
content: |-
  Manchester United's players are sometimes "too anxious, too afraid to play football" on the pitch, says boss Ruben Amorim.

  Manchester United have not won any of their past eight league away games against Liverpool - drawing four and losing four

  Manchester United boss Ruben Amorim says his players are "too anxious, too afraid" and that his team's poor form has taken its toll on him. United head to leaders Liverpool on Sunday (16:30 GMT) on the back of four successive defeats in all competitions - including three in the Premier League. They have won just two top-flight matches since Amorim took charge in November and are only seven points above the relegation zone. "You can see in my face, you can compare it to the way when I arrive and now," said Amorim, who has lost five of his eight Premier League games in charge. "Of course there is a lot of pressure. For me, it's the pride and also the performance. "It's harder when we don't perform well." United lost 3-0 at home to Bournemouth, 2-0 at Wolves before slumping to a 2-0 home defeat against Newcastle in the space of eight days over the festive period. They have not lost four league games in a row in the same season since between December and February 1979, while they last suffered four defeats in a row without scoring back in April 1909.

