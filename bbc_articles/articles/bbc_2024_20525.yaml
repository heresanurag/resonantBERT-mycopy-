title: Oasis presale tickets relisted for £6,000 minutes after ballot - BBC News
date: '2024-08-30'
section: Culture
url: http://www.bbc.co.uk/news/articles/cj62dg8zgp9o
content: |-
  The first batch of tickets for reunion gigs go on sale with some relisted for £6,000.

  Oasis have reformed 15 years after splitting up over a row between brothers Noel and Liam Gallagher

  Oasis have issued a warning against reselling tickets to their comeback tour, after some were listed for thousands of pounds within minutes of a pre-sale. A limited number of fans were able to buy the first batch of tickets during a three-hour window on Friday evening. Shortly after, tickets were being listed online for more than £6,000 - around 40 times the face value of a standing ticket. Oasis urged people not to resell tickets at higher prices on websites not linked to their promoter, and said they would be "cancelled". General ticket sales opened in Ireland at 08:00 BST, with UK dates available from 09:00.

  Consumer law expert Lisa Webb from Which? told BBC News fans should be strongly advised "against buying any of the resale tickets currently popping up online at inflated prices". "Not only is there a chance that some of these listings could be scam attempts, but even legitimate tickets could be cancelled, rendering them invalid, if they are sold outside of the official resale platforms or at above face value," she said. Meanwhile, Adam Webb, campaign manager at FanFair Alliance, which was set up to help customers and artists tackle the issue of ticket touting, called on ministers to act. "We need some action from government, " he told the BBC. "Sir Keir Starmer made an announcement in March, suggesting that Labour - if they came into power - would cap resell price. That's something we hope they're going to move ahead with." In that speech, the prime minister said access to culture could not be "at the mercy of ruthless ticket touts who drive up the prices".

  Soon after Friday's pre-sale began, ticket listings appeared on resale websites like StubHub and Viagogo, including:
  • None £6,000 for Oasis's show at Wembley Stadium in London on 26 July
  • None Between £916 and £4,519 for the first concert of the tour at Cardiff's Principality Stadium on 4 July
  • None Over £4,000 for standing tickets at Edinburgh's Murrayfield Stadium on 12 August
  • None More than £2,500 for the band's homecoming concert at Manchester's Heaton Park on 12 July Ahead of the pre-sale, promoters said standing tickets will cost about £150, while standard seated tickets range from £73 to about £205. Prices for official premium packages go up to £506. About 1.4 million tickets are expected to be available for the 17 outdoor concerts in the UK and Ireland next July and August.

  A mural of Liam and Noel Gallagher was recently unveiled in Manchester

  Oasis intervened on Friday evening while the pre-sale was still ongoing, issuing a statement which read: "We have noticed people attempting to sell tickets on the secondary market since the start of the pre-sale. "Please note, tickets can ONLY be resold, at face value, via Ticketmaster and Twickets. "Tickets sold in breach of the terms and conditions will be cancelled by the promoters." Oasis's promoters had issued a similar warning prior to the pre-sale, saying tickets sold through "unauthorised resale platforms" will breach terms and conditions and "may be cancelled". Meanwhile, Viagogo issued a statement in which it said "resale is legal in the UK" and insisted the platform was "fully compliant with all UK laws and regulations". The company said that listing tickets on its platform was permitted once they become available to the public - including following a pre-sale event. "We oppose anti-competitive actions taken by event organisers to restrict purchasing and resale options to certain platforms in an attempt to control the market as they ultimately harm fans by limiting their choice", its statement continued, claiming such action leads to a "surge in scams." StubHub have also been contacted for comment.

  Oasis - spearheaded by brothers Liam and Noel - are one of the biggest British bands of all time

  On Thursday, Oasis's promoters said there had been "unprecedented demand" for the ballot to enter the pre-sale, and added three extra dates to the 14 that were initially announced. Hundreds of people who managed to secure a ticket ahead of Saturday's general sale celebrated on social media. "I’m actually going to see my favourite band of all time! Didn’t think I’d ever see this," wrote one user. Another said: "I have two very excited daughters. Almost got deafened by the screaming when the purchase was verified." One said he had secured tickets to the opening night of the tour and joked: “They should still be together then”. To enter the ballot, fans had to say who the band's original drummer was and were offered the options of Chris Sharrock, Alan White and the correct answer, Tony McCarroll, who played with the band from their formation until 1995. Entrants were also asked how many times they had seen the band. On Tuesday, Noel and Liam Gallagher announced that they had put their acrimonious split behind them, confirming the band's long-awaited reunion. The move came 15 years after the group disbanded following a backstage brawl at the Rock en Seine festival in Paris.

  As anticipation for the gigs builds, sales and streams of the band's back catalogue have surged, with three albums going back into the top five of the UK charts on Friday. Greatest hits collection Time Flies is at number three, 1995's What's The Story Morning Glory is at four, and debut Definitely Maybe - released on 29 August 1994 - is in fifth place. A 30th anniversary edition of Definitely Maybe was released on Friday. Oasis were formed in Manchester in 1991 - their original line-up comprised Liam and Noel Gallagher, guitarist Paul "Bonehead" Arthurs, bassist Paul "Guigsy" McGuigan and drummer Tony McCarroll. The band officially split in 2009 after an altercation backstage at the Rock en Seine festival in Paris.

