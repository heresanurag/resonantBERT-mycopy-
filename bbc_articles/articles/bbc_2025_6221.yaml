  Rory McIlroy, Justin Rose and Bryson DeChambeau know winning the Green Jacket on Sunday depends on what happens between their ears.

  This video can not be played To play this video you need to enable JavaScript in your browser. Rose & McIlroy feature in best shots of Masters day two

  -8 J Rose (Eng); -7 B DeChambeau (US); -6 C Conners (Can), R McIlroy (NI); -5 M McCarty (US), S Lowry (Ire), S Scheffler (US), T Hatton (Eng) Selected others: -3 L Aberg (Swe), C Morikawa (US); -2 T Fleetwood (Eng); Level M Fitzpatrick (Eng), A Rai (Eng); +2 J Rahm (Spa); D Willett (Eng)

  Whatever Augusta founder Bobby Jones uttered about the importance of golfing mentality - there are a few variants of his profound psychology - the legendary American probably didn't expect it to be referenced a century later. But Jones' principle of the most crucial hole for a golfer being the space between the ears remains commonly true. Three of the leading Masters contenders going into the weekend - Justin Rose, Rory McIlroy and Bryson DeChambeau - understand the deep value of controlling the mind. What differs is how each player manages those thoughts in order to best execute their technical skills. The approaches of the three men currently at the top of the leaderboard will be a fascinating aspect of the battle for the Green Jacket. Of course, there is no guarantee any of them will succeed. World number one and defending champion Scottie Scheffler looms ominously, with the likes of Canada's Corey Conners (three top-10s in his past six Masters), Ireland's 2019 Open champion Shane Lowry and England's Tyrrell Hatton also lurking on a stacked leaderboard. English veteran Rose, winner of the 2013 US Open and 2016 Olympic gold medal, is the man they are all chasing. The 36-hole leader is one clear of DeChambeau on eight under and his approach was to switch off from golf after a short debrief following his second round. He felt spending time with his family - including his mum and wife - instead of conducting further analysis would help his mental recovery. "Energy management is key going into a big weekend," the 44-year-old said. "I haven't made a full plan yet, but I won't watch every round. I feel I've done that before and I think that's as emotionally draining as being out there practising all afternoon. "I've got the family here, which is nice. I don't know what we'll do, but I won't be sweating it."

  Northern Ireland's McIlroy, who is two shots behind Rose after bouncing back into contention on Friday, is also using family life as a way to compartmentalise his day at work. For the second time at a major inside the past year, McIlroy made a hasty exit after two double bogeys ruined his Augusta scorecard on Thursday. But, unlike his final-day collapse at the US Open in June, McIlroy had the opportunity to come back the following day and put things right. "Once I left the [Augusta] property [on Thursday], I just tried to leave what had happened here," the 35-year-old explained after a superb second-round 66. "I rushed out of here to get home to see [daughter] Poppy before she went to bed. So that was nice to get to see her before she went to sleep. "I guess that's something that I didn't have a few years ago, to be able to get home and take my mind off the golf a little bit."

