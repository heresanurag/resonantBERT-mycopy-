  The burden of expectation weighs heavier on McIlroy than his European Ryder Cup team-mate Rose. Both men are chasing a Green Jacket which has been tantalising close, but just agonisingly out of reach, in respective careers which have delivered so much success. Four-time major winner McIlroy, however, has the intense scrutiny of trying to claim a rare career Grand Slam - which he has been attempting to complete since 2015. The world number two has been working with renowned sports psychologist Bob Rotella for a number of years and has been consulting the American between rounds at Augusta National. McIlroy said their discussions enabled him to climb back into contention on Friday after a chastening end to his opening round. "I feel like I did a good job of resetting," said McIlroy, who went out in 35 before returning in 31. "I had a good conversation with Bob, mostly around not pushing too hard too early and trying to get those shots back straight away. "I just tried to stay really, really patient."

  From bulking up to 'bomb and gouge' courses, to becoming a popular YouTube content creator, DeChambeau is not afraid to do things differently

  While Rose and McIlroy are trying to switch off more, DeChambeau seemingly does the opposite. The man known as 'The Scientist' for his studious thinking continues to leave no stone unturned in his pursuit of the iconic Green Jacket. The 31-year-old American, who took advantage of McIlroy's demise to win last year's US Open, has thumped thousands of balls on the practice range this week - hitting considerably more than his rivals - and says he plays "ping pong paddle" in his mind with different swings thoughts. "I've got a lot going on up in there," laughed the two-time US Open champion, who went straight to the driving range after his round on Friday. So for this week, it is working. DeChambeau backed up an opening 69 with a 68 to place himself between Rose and McIlroy on seven under par going into the weekend. He talks about staying "present". Like McIlroy, who claims he has learned to accept "golfing heartbreak", DeChambeau also says that can be helped by understanding the past. "You have to put yourself in position," the LIV Series golfer said. "You have to fail. You have to lose. You have to win. You have to come from behind. You have to hold the lead. "All those expectations and feelings have to get conquered in your mind. That's why this game is played between your ears." Just like Jones - the winner of his era's original Grand Slam in 1930 - told us. Follow live text commentary and in-play clips of Saturday's third round on the BBC Sport website and app from 18:30 BST, with radio commentary from19:30 BST on 5 Sports Extra and 21:00 on 5 Live and BBC Sounds.
