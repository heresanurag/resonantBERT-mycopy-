title: Mount Kilauea volcano erupts in Hawaii - BBC News
date: '2018-05-04'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-44003150
content: |-
  The eruption near a residential area has prompted a local state of emergency and evacuations.

  Mount Kilauea volcano has erupted near a residential area on Hawaii's largest island, prompting a local state of emergency and the mandatory evacuation of 1,700 local residents.
