id: bbc_2024_4099
title: US military footage illustrates Gaza pier plans - BBC News
date: '2024-03-13'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-68550599
content: |-
  The 2020 video shows the military building a pier similar to a temporary one set to be built to get aid into Gaza.

  A US military ship is sailing towards the Middle East, carrying equipment to build a temporary pier off the coast of Gaza. The floating harbour will help get aid into Gaza by sea as the UN has warned that famine in the Gaza Strip is "almost inevitable" and children are starving to death.

  Video from the US Marine Corps shows a similar pier being built by the military in 2020.

  The BBC's Tom Bateman explains the impact the port will have once built.
