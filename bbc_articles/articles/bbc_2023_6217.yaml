title: US plane engine splutters flames after bird collision - BBC News
date: '2023-04-24'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-65377855
content: |-
  A passenger's video shows the aircraft spitting fire shortly after take-off from Ohio.

  The engine of an American Airlines plane hit a bird shortly after take-off on Sunday and could be seen spitting fire.

  A passenger seated near the blaze caught the moment on camera.

  The Boeing 737, which was headed to Phoenix, Arizona returned safely to Columbus, Ohio, and no one was hurt.
