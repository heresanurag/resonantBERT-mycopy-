title: UK crowds celebrate summer solstice - BBC News
date: '2025-06-22'
section: General
url: http://www.bbc.co.uk/news/videos/c4g8vnqqn89o
content: |-
  People gathered across the UK to celebrate the summer solstice - marking the longest day of the year.

  Crowds cheered at an event in Stonehenge, as an orange sun rose from behind the monument, which was attended by a record-breaking 25,000 people.

  A timelapse video shows the sun rising behind clouds in Babbacombe, Devon, as swimmers made the most of what will be the hottest June day in the UK for six years.
