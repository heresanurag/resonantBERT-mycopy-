title: 'BBC Sound of 2025: Chappell Roan, Doechii, Ezra Collective and more make longlist
  - BBC News'
date: '2024-11-21'
section: Culture
url: http://www.bbc.co.uk/news/articles/ckgvpz0kry8o
content: |-
  The list has a track record of picking music's next big things, from Adele to The Last Dinner Party.

  Chappell Roan and Ezra Collective on BBC Sound of 2025 list

  Chappell Roan has also been nominated for six Grammy Awards

  BBC Radio 1's Sound of 2025 longlist has been announced, with breakout stars like Chappell Roan and Barry Can't Swim joined by newcomers including Myles Smith and Good Neighbours. The award is given to rising artists with "the best chance of mainstream success" in the next 12 months. Past winners include Adele, Sam Smith, Michael Kiwanuka, PinkPantheress and Haim. Last year's winners, The Last Dinner Party, went on to score a number one album and a Mercury Prize nomination for their debut release, Prelude To Ecstasy. This year's longlist also includes indie band English Teacher and Northern Irish rap act Kneecap. The winner will be announced on BBC Radio 1 and BBC News in January.

