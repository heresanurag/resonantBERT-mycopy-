  Oleksandr Usyk and Tyson Fury are taking different approaches to their rematch on Saturday, especially when it comes to their families.

  I speak to my wife and children every day - Usyk

  This video can not be played To play this video you need to enable JavaScript in your browser.

  Heavyweights Oleksandr Usyk and Tyson Fury have taken different approaches in preparing for their rematch in Saudi Arabia on Saturday, especially when it comes to contact with their families. Both men have large families and Briton Fury revealed he has not spoken to his wife Paris for three months while he has been in camp in Malta. Ukrainian Usyk, 37, on the other hand, says he speaks to his own wife and children every day, but has not seen them for five months. "It's helped me - because it's my family," Usyk said on Tuesday. "My little daughter, Maria, started to walk, say 'mama', 'baba' [grandmother]. This is real motivation for me."

  WBA (Super), WBO and WBC heavyweight champion Usyk contests his rematch with Fury in Riyadh, six months after their classic first encounter, which Usyk won by split decision. Fury, 36, is a slight underdog having been the favourite in the first bout. Fury has tried a no-contact approach with his family in an attempt to reduce distractions. "It's been a long camp - been away from my wife and kids for three months. "I've not spoken to Paris at all for three months - not one word. I've sacrificed a lot. But it'll all be worth it, 100%." Paris Fury is expected to be ringside on Saturday. At six months pregnant, she lost their baby on the eve of the first bout and was unable to join her husband in Riyadh. She said on Instagram: "People don't see the sacrifices made. "I've let him solely concentrate on this fight. It seems like he's been gone forever, especially with no contact. But if it's what he needs..."

