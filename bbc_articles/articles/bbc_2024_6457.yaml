title: Emily Atack reveals baby's sex and discusses consent - BBC News
date: '2024-03-05'
section: General
url: http://www.bbc.co.uk/news/uk-68477852
content: |-
  Actor Emily Atack wants the government to tighten laws around consent, revealed the sex of her baby.

  Actor Emily Atack, who is backing a campaign to tighten laws around consent, has revealed the sex of her baby on BBC Breakfast.

  The campaign she fronts aims to press the government to introduce an "affirmative consent" model, which Emily discussed on the programme.

  Emily said she will encourage her baby to be part of a positive change, saying she wants him "to be on the right side of history".
