title: Boy, 8, loses thumb after dog attack in Caernarfon, says gran - BBC News
date: '2024-08-12'
section: Wales
url: http://www.bbc.co.uk/news/articles/cj4x82p2rl9o
content: |-
  His grandmother said he was dragged along the ground by the animal she described as a monster.

  "All I saw was Caio being dragged by his ear on the floor," says his grandmother, Ruth Jones

  A woman whose eight-year-old grandson sustained life-changing injuries in a dog attack has described how he was “dragged like a rag doll” as she tried to save him. Ruth Jones’s grandson Caio was attacked in the North Penrallt area of Caernarfon on Sunday on his way to a birthday party. Caio, who has been taken to Alder Hey Children’s Hospital in Liverpool, has needed extensive surgery and he has lost his right thumb, said his grandmother. The dog, which has since been destroyed, is suspected to have been an XL bully, although this has not yet been confirmed.

  Ms Jones called the 48 hours since the attack “a nightmare”. “You close your eyes and all you can see is your grandson being dragged on the floor by this monster,” she said. Caio had been dropped off to go to a birthday party when the dog ran out into the street and attacked him. “My neighbour shouted to me that Caio was being attacked, half-eaten, by a dog,” she said. “I ran straight out of the house and tried to run up the hill. All I saw was Caio being dragged by his ear on the floor. It was just awful. “The dog opened his mouth and got him by the thumb and dragged him again, biting his arms whilst he dragged him up. “The child was dragged on the floor, as if he were a rag doll, even though my little Caio is a strong lad. “He bit the thumb off, down by the knuckle.

  Part of North Penrallt in Caernarfon was closed after the dog attack

  “I got hold of him (Caio), put him against the wall and shielded him with my body. “The dog tried to get in between my legs so he could still get at Caio. I wasn’t the object at all. He wanted the child”. Ms Jones said Caio had sustained severe injuries and would still need further surgery following the attack. She added that he was having nightmares about the attack. “He’s had a total amputation of his right thumb,” she said. “His earlobe – the cartilage has gone on that. Plus his left hand, the ligaments and the tendons have gone on that. “The pawprint and the scratches all down his face: a tooth went up through his eyelid up to his eyebrow. “I don’t know when he’s coming home. He needs a lot of surgery now. “I just hope this never happens to anyone else”. A 44-year-old man has been arrested on suspicion of owning a dangerously out of control dog that caused serious injury.

  Det Insp Richard Griffith of North Wales Police said: “This incident has understandably caused concern in the local community and there will be an increased police presence in the area for reassurance purposes. “Our investigations are continuing, and I am appealing to anyone who witnessed, or may have footage of the incident to contact police."
