  Olympic medal-winning boxer Anthony Ogogo posted a picture of himself with Sir Chris on X, calling him a "role model", an "inspiration", and a "hero". James Cracknell, a former Olympic rower for Team GB, also took to the social media platform, saying Sir Chris was "more inspirational today than during his immense sporting career". Scottish First Minister John Swinney praised Hoy's "incredible courage" in a post on X, saying he "has always inspired us by all that he has done". Speaking on the Sunday with Laura Kuenssberg programme, Health Secretary Wes Streeting said Sir Chris was "not the only person" dealing with a terminal cancer diagnosis and had "done the country such an enormous service" by being open and positive about it. "That's worth even more than the stack of Olympic gold that he's built up over his career," he added.

  The Edinburgh-born Olympian's cancer was discovered last year after a routine scan for shoulder pain - he thought he had injured himself while lifting weights at the gym - revealed a tumour. The athlete was with his wife Sarra when he was given his terminal diagnosis. The couple have two children, Callum and Chloe, who were aged nine and six at the time. Just before Sir Chris's tumour was discovered, Sarra had undergone scans that would later show she had multiple sclerosis, a degenerative disease. Former prime minister Gordon Brown said that courage had "defined" Sir Chris's career and "now characterises how Chris and Sarra both face their health diagnoses and embrace life". Talking to Stephen Nolan on BBC Radio 5 Live, Simon Richardson, editor of Cycling Weekly magazine, called Sir Chris "the epitome of the Olympic champion".

  Sir Chris, who was first inspired to take up cycling by the famous BMX scenes in the film E.T., had won six Olympic, 11 world and 43 World Cup titles by the time he retired. The cyclist first won gold at the Athens Olympics in 2004, and went on to secure three more gold medals four years later at Beijing. He won two further golds at London 2012, before retiring from cycling in 2013. His haul of six Olympic golds is the second highest total by any British Olympian behind Sir Jason Kenny's tally of seven.

