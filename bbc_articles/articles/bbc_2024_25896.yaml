title: Sir Chris Hoy courage praised as he reveals terminal cancer - BBC News
date: '2024-10-21'
section: UK
url: http://www.bbc.co.uk/news/articles/ce8196y545no
content: |-
  Sir Chris Hoy has received well-wishes after revealing his cancer diagnosis is terminal.

  Sir Chris Hoy co-presenting the World Track Championships on BBC Two on Sunday

  Sir Chris Hoy has been hailed as "inspiring" for sending a "wonderful message of hope" after revealing his terminal cancer diagnosis. The six-time Olympic cycling champion gave an interview to the Sunday Times, external, in which he said doctors have told him he has between two and four years to live. Well-wishes to Sir Chris have poured in from sporting stars, politicians and thousands of others on social media after he posted on Instagram on Sunday to say he was "feeling fit, strong and positive". Prime Minister Sir Keir Starmer said the "whole country" is behind the 48-year-old, while Health Secretary Wes Streeting said he was "in awe" at the Scot's courage and positivity.

  Sir Chris told the Sunday Times that he had been diagnosed with primary cancer in his prostate, which had spread to his bones - meaning it was stage four. The legendary athlete revealed earlier this year that he had been diagnosed, but he had not previously disclosed the type of cancer. Following the interview's publication, the star posted on Instagram on Sunday that he was in Copenhagen with the BBC Sport team covering the World Track Cycling Championships. Sir Chris has been appearing on BBC Two all week co-presenting the championships. "You may see in the news this weekend some articles about my health, so I just wanted to reassure you all that I’m feeling fit, strong and positive, and overwhelmed by all the love and support shown to my family and me," he said in the post. There were many supportive comments underneath the post, including from fellow former Olympic cyclist Mark Cavendish who called Sir Chris a "hero of a human being". Olympic athletics great Dame Kelly Holmes also commented "sending love to you Chris" and the British Cycling account left an emoji showing two hands making a heart symbol. "You know, we were all born and we all die, and this is just part of the process," Sir Chris told the Sunday Times. "You remind yourself, aren't I lucky that there is medicine I can take that will fend this off for as long as possible." Sir Chris told the newspaper he has known for a year that his cancer is terminal. Tumours were discovered to his shoulder, pelvis, hip, spine and rib.

