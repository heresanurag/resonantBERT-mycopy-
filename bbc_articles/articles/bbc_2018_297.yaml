id: bbc_2018_297
title: Huge Russian war games under way - BBC News
date: '2018-01-22'
section: General
url: http://www.bbc.co.uk/news/world-europe-41314390
content: |-
  A military exercise involving thousands of troops is provoking suspicion from some Nato countries.

  Russia's President, Vladimir Putin, has been inspecting a huge military exercise involving thousands of troops.

  Ukraine has joined some Nato member countries in expressing concern about the true purpose of the drill.
