title: Hundreds of thousands of dragonflies swarm beachgoers - BBC News
date: '2024-08-02'
section: General
url: http://www.bbc.co.uk/news/videos/c80xk751zdzo
content: |-
  Social media videos show the harmless insects invading a beach in Rhode Island.

  "It is unbelievable," says one beach goer as thousands of harmless dragonflies swarmed into Misquamicut State Beach in Rhode Island.

  According to some experts the warm ocean temperatures and wind may have pushed the insects to shore.
