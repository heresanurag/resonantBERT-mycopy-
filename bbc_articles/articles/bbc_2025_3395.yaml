title: Footage shows oil tanker and cargo ship on fire in North Sea - BBC News
date: '2025-03-11'
section: General
url: http://www.bbc.co.uk/news/videos/c7571p4vpv5o
content: |-
  An oil tanker involved in a collision with a cargo vessel off east Yorkshire's coast is on fire.

  Footage shows a rescue operation after an oil tanker and a cargo vessel collided in the North Sea off the coast of Hull.

  The two ships involved are the oil tanker MV Stena Immaculate and a cargo ship called Solong.

  The Immaculate was carrying jet fuel, which the company that owns the ship has said is now leaking into the sea.

  One person has been taken to hospital following the incident on Monday, while the 36 mariners across both crews are safe and accounted for, according to local MP Graham Stuart.
