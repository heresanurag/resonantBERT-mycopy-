title: 'Wimbledon 2018: Kevin Anderson beats John Isner in record-breaking semi-final
  - BBC Sport'
date: '2018-07-14'
section: General
url: http://www.bbc.co.uk/sport/tennis/44823525
content: |-
  Kevin Anderson wins the longest semi-final in Wimbledon history by beating John Isner in an epic lasting more than six-and-a-half hours.

  Last updated on .From the section Tennis

  Coverage: Watch live on BBC TV, BBC iPlayer, BBC Red Button, Connected TVs and the BBC Sport website and app; Live Radio 5 live and 5 live sports extra commentary; Text commentary online.

  South African Kevin Anderson won the second-longest match in Wimbledon history by outlasting American John Isner to reach the men's final.

  They slugged it out on Centre Court for six hours and 36 minutes before the eighth seed came through 7-6 (8-6) 6-7 (5-7) 6-7 (9-11) 6-4 26-24.

  The final set alone lasted for two hours and 50 minutes.

  Anderson, 32, will face either Rafael Nadal or Novak Djokovic in Sunday's final.

  Djokovic was leading two sets to one when play was suspended at 23:02 BST on Centre Court under the roof lights.
