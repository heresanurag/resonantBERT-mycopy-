url: http://www.bbc.co.uk/news/articles/c0lw8k4wd53o
content: |-
  The Bake Off judge swaps her trademark bright colours for a striking black latex outfit.

  Prue Leith like you've never seen her before on London catwalk

  It's Prue Leith, but like you've never seen her before. The Great British Bake Off judge is known for her love of bright colours, chunky necklaces and vibrant statement glasses. But the 84-year-old ditched her signature style for a completely different look on the catwalk during London Fashion Week. She wore a black skintight leather dress with red stitching and long latex gloves, as she strutted down the runway for the designers Vin + Omi's 20th anniversary show. Leith completed the look with bright red lipstick, short spiky hair and black eye makeup. The goal, designer Vin told PA Media, was to "sex her up".

  Prue Leith is a chef, writer, broadcaster - and, since 2017, a judge on Bake Off. In that role, she joins fellow judge Paul Hollywood in giving her verdicts on all kinds of cakes, breads and biscuits. Leith won over fans with her bright and bold eyewear. In 2022, she even launched her own range of glasses. She has spoken about her fashion sense before, including at the Hay Festival last year, when she revealed she wanted to inspire older women.

  Prue Leith is known for her love of bright colours and trademark glasses

  "Since I’ve been doing Great British Menu and Bake Off, there are thousands of women over 50 who are absolutely delighted that somebody so old wears bright colours and funky necklaces and mad glasses," she said. BBC News has approached Leith's representatives for a comment on her outfit at Friday's event. The Vin + Omi show wasn't on the official London Fashion week programme but it coincided with the event, which is celebrating 40 years in the industry. Others walking the catwalk included the model Josie Stevens and property mogul Naomi Heaton. The designers, who are based in Norwich, said the show's title, Moxie - meaning perseverance and courage - reflected their journey to where they are today.
