title: 'Newspaper headlines: ''Reeves risks union war'' and ''Pontiff''s progress''
  - BBC News'
date: '2025-03-24'
section: The Papers
url: http://www.bbc.co.uk/news/articles/c5y4d5v6z4po
content: |-
  A mix of stories - including Reeves' Spring Statement and the Pope's recovery - lead the front pages on Monday.

  The Chancellor, Rachel Reeves, is the focus of a number of the front pages:

  The Times says ministers are drawing up plans to cut up to 50,000 civil service jobs -- five times as many as publicly mooted. The paper says Reeves "risks war" with trade unions, external as she tries to balance the books. The i Paper's headline says the education sector is bracing for what it calls the "worst squeeze in a generation", external.

  The main story for the Daily Mail is the Chancellor accepting free tickets to a pop concert. The paper links the story to the civil service cuts and the headline asks: How About Cutting Your Freebies, Chancellor?, external

  The Daily Telegraph reports that Reeves is prepared to offer a £700m tax break to American tech companies, external as part of efforts to secure a deal with the US to avoid tariffs. She confirmed yesterday that talks were taking place about the UK's new digital services tax. The Guardian says opposition and Labour MPs are warning Sir Keir Starmer not to "appease" Donald Trump., external

  The Daily Express says campaigners are urging Reeves to use her Spring Statement to prevent thousands of pensioners from being dragged into paying tax. , external They're concerned that those on modest incomes will be hit as their pensions automatically rise because tax thresholds have been frozen.

  The boss of the National Grid's interview, external with the Financial Times makes headlines, with his insistence that Heathrow had enough power to stay open last week. The FT says airlines have questioned the length of the shutdown. An industry source tells the Telegraph that Heathrow appeared desperate to keep passengers away.

  According to the Sun, German prosecutors are racing, external to charge the prime suspect in the disappearance of Madeleine McCann, to stop him from leaving prison within two weeks. Christian Brückner is seeking early release from a rape sentence.

  The Daily Mirror says Christine Keeler's son is seeking a royal pardon for his late mother., external She was jailed for perjury in 1963, the same year she was caught up in the scandal surrounding her affair with the Conservative minister John Profumo.
