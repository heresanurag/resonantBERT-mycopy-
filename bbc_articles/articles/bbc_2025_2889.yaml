title: 'Sam Kerr: Chelsea striker''s ''stupid and white'' remark was hostile - court
  - BBC News'
date: '2025-02-07'
section: London
url: http://www.bbc.co.uk/news/articles/cjexp4495ejo
content: |-
  Chelsea striker Sam Kerr's words were an insult that referred to race, the prosecution says.

  Prosecutors in the trial of Chelsea striker Samantha Kerr, who called a police officer "stupid and white", have asked the jury if perceptions would be different had she said "stupid and black". Ms Kerr, 31, is alleged to have been "abusive and insulting" towards the officer at a police station in Twickenham, south-west London, in the early hours of 30 January 2023. Kingston Crown Court also heard character references from Chelsea team-mates and former head coach Emma Hayes.

  This video can not be played To play this video you need to enable JavaScript in your browser. Footage of Sam Kerr calling PC Stephen Lovell "stupid and white" was played to the jury on Monday

  In his closing speech, prosecutor Bill Emlyn-Jones KC asked the jury: "What if PC Lovell had been a black male and what if she had called him stupid and black? Now of course that is not a fair question, because black and white is not a fair swap." He went on to say: "Calling a white man is not as loaded, so you can't just turn it around, it is not as easy as that. "In the heat of the moment this was an insult delivered in reference to race and that is what the law prohibits. "The test for you is the same regardless of the ethnicity in question. She was insulting him and, at the time, she was hostile to him by reference to his race. "So the fact you will be able to think of much worse examples of racial aggravation is irrelevant. "Would we consider this a racially aggravated insult if she had said stupid and black? Of course you would, it wouldn't even be contestable."

  The striker signed for Chelsea in 2019

  Grace Forbes, defending Ms Kerr, read out statements from Chelsea captain Millie Bright and midfielder Erin Cuthbert. Bright described Ms Kerr as a "truly special human", while Cuthbert said she was a "great friend and team-mate" who "has a unique knack of seeing the best in everyone". Carly Telford, a goalkeeper who played for Chelsea from 2017 to 2022, described Ms Kerr as a "close friend" who was "reliable and trustworthy".
