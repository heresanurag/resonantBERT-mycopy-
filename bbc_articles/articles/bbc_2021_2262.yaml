title: 'Myanmar coup: MP arrested by soldiers as military detains politicians - BBC
  News'
date: '2021-02-01'
section: General
url: http://www.bbc.co.uk/news/world-asia-55884482
content: |-
  The politician's husband said about 15 soldiers came to their home during a string of early morning raids.

  The military in Myanmar has seized power and detained civilian leader Aung San Suu Kyi and other senior members of her governing party, the National League for Democracy (NLD).

  During early morning raids, soldiers arrived at the homes of politicians to arrest them for "election fraud".

  Pa Pa Han, who is a regional member of parliament was escorted out of her home by soldiers.

  Her husband, Ye Lin Naing, who is also an MP, live streamed it on Facebook, saying about 15 soldiers were at their home.
