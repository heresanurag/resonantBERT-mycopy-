title: Two accused of murdering woman in car chase after 'drug plot' - BBC News
date: '2024-06-25'
section: Tayside & Central Scotland
url: http://www.bbc.co.uk/news/articles/c2vvv2g0d17o
content: |-
  Andrew Gregoire and Anthony Davidson are said to have followed Amy Rose Wilson at speed causing her car to crash.

  Two accused of murdering woman in drug plot car chase

  Amy Rose Wilson died after an alleged car chase in Falkirk last year

  Two men are to stand trial accused of murdering a woman in a car chase following an alleged drug plot. Andrew Gregoire, 28, and Anthony Davidson, 31, are said to have tried to steal drugs and money from Amy Rose Wilson in Falkirk on 29 July last year. Prosecutors say she fled the scene in a car at speed and was later forced off the road, leaving her fatally injured. The two are also accused of attempted murder and trying to defeat the ends of justice, all of which they deny.

  Lawyers for the men entered pleas of not guilty and lodged special defences of incrimination during a hearing at the High Court in Glasgow. Mr Gregoire and Mr Davidson are accused of being involved in a plan to assault and rob, which involved obtaining gloves, hammers, bladed weapons and a car. The conspiracy charge states that the men had "acquired knowledge" of a drug deal to take place at Westway Retail Park in Cumbernauld, North Lanarkshire. It is said they travelled to the location from the south of England. The indictment also claims the "illicit drugs transaction" involved Ms Wilson and another man. It is alleged that Mr Gregoire and Mr Davidson followed them to Falkirk.

  The murder charge claims the two initially tried to rob Ms Wilson and the man of drugs and money. It is said that car windows were smashed, that the man was repeatedly punched and that threats were made. The pair have been charged with attempted murder of the man. Prosecutors then say Ms Wilson and the man drove off - but were pursued at "excessive speed" by Mr Gregoire and Mr Davidson and another person. The car is said to have been struck and forced onto the opposite side of the road causing a crash with another vehicle - leaving Ms Wilson fatally injured. Another man - Steven Hornsby, 54 - is also accused of trying to defeat the ends of justice in the incident, which he denies. Lord Matthews fixed a trial due to begin in March 2025 in Edinburgh.
