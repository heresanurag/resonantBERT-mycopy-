title: Severe flood warnings mean ‘threat to life’, warns Environment Agency - BBC
  News
date: '2017-01-13'
section: General
url: http://www.bbc.co.uk/news/uk-38610092
content: |-
  The severe warnings in place along the east coast of England need to be taken seriously, the Environment Agency has warned.

  The BBC spoke to Lisa Pinney from the Environment Agency, who has been assisting residents in Jaywick, Essex, affected by possible floods.
