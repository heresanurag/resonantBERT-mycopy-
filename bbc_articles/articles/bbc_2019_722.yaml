title: Tearful Andy Murray fears end of career - BBC News
date: '2019-01-11'
section: General
url: http://www.bbc.co.uk/news/world-australia-46833167
content: |-
  Britain's Andy Murray says next week's Australian Open could be his last tournament.

  Britain's Andy Murray fears next week's Australian Open could be his last tournament.

  The three-time Grand Slam winner, who is struggling to recover from hip surgery, was in tears as he spoke to journalists in Melbourne on Friday.
