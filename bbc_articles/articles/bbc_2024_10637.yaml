id: bbc_2024_10637
title: Dublin passengers recall 'panic' as Doha plane hit turbulence - BBC News
date: '2024-05-27'
section: General
url: http://www.bbc.co.uk/news/world-europe-69064916
content: |-
  People from a Dublin-bound plane from Doha describe scenes on board during severe turbulence.

  Passengers who were on board a Dublin-bound flight which experienced severe turbulence have described seeing people 'hit the ceiling' when the aircraft dropped very suddenly.

  Twelve people was injured during the incident on board Qatar Airways flight QR017 from Doha to Dublin.

  Eight of them were taken to hospital after the plane landed safely at Dublin Airport.

  Some of those on board spoke to Irish broadcaster RTÉ.
