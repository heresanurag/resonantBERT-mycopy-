content: |-
  North Carolina is the first of the seven battleground states to have a projected winner in this election.

  Donald Trump is projected to win North Carolina in the first result from one of the seven key battleground states of this election.

  Democrat Kamala Harris had hoped to flip the traditionally Republican state.

  The other six swing states are yet to be called.
