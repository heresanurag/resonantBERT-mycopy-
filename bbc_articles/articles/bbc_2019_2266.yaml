title: Duke and Duchess of Sussex support Morocco girls' school - BBC News
date: '2019-02-24'
section: UK
url: http://www.bbc.co.uk/news/uk-47349399
content: |-
  The duchess was given a traditional henna tattoo, which is intended to bring luck to her first child.

  Harry and Meghan are on a three-day visit to north Africa

  The Duke and Duchess of Sussex have met young women in Morocco to show support for girls' education.

  The couple were welcomed to a boarding house in the village of Asni by the girls, who waved flags and sang songs.

  During the visit, the pregnant duchess was given a traditional Moroccan henna tattoo, which is intended to bring luck to her first child.

  Harry and Meghan, who flew from the capital Rabat by helicopter, are on a three-day visit to the country.

  The Duchess of Sussex had henna applied to her hand during the visit

  Samira Ouaadi, 17, who drew a floral pattern on Meghan's left hand and wrist with brown henna paste, said: "It's tradition for pregnant women in Morocco to have a henna tattoo. We do it for major celebrations like getting married or having a baby."

  The Duke and Duchess announced their pregnancy last October and the baby is expected at the end of April or early May.

  When the artwork was finished, the duchess said the design was "really lovely" and showed her husband.

  The couple's first official trip to the north African nation is aimed at strengthening links with the UK.

  The secondary school is run by a Moroccan group that provides classes for girls from rural areas whose families cannot afford their education.

  Kensington Palace said the charity Education for All "has given girls from the poorest villages and most remote areas of Morocco the chance to reach their potential and contribute to Morocco's continued development".

