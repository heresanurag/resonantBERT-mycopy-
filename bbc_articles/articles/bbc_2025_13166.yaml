title: England and Wales classification for Oxford-Cambridge rail line - BBC News
date: '2025-06-03'
section: Wales
url: http://www.bbc.co.uk/news/articles/czxyr75gk1vo
content: |-
  One MP says it means Wales is "being denied hundreds of millions in funding".

  Anger as Oxford rail line classed as England and Wales project

  The new line is set to cost £6.6bn but no tracks will be laid in Wales

  There is anger that a multi-billion pound project to build a railway line between Oxford and Cambridge has been classed as an England and Wales project. The £6.6bn line will see no tracks laid in Wales but, because of the way it has been classified, the country will not benefit from any extra cash. David Chadwick, Liberal Democrat MP for Brecon, Radnor and Cwm Tawe, told BBC Radio Wales Breakfast it was "HS2 all over again", while former Welsh Labour transport minister Lee Waters called for Westminster colleagues to "fix" the system. The UK government said the project is being financed through its "rail network enhancements pipeline", which it said was also funding schemes in Wales.

  Under pressure over the issue in the Senedd, Wales' First Minister Eluned Morgan defended the decision but said Wales was not getting its "fair share" of rail cash. Meanwhile the Welsh government's Transport Secretary said a "pipeline" of work had been agreed with the UK government. The Tories said the Welsh government had "no sway" with its colleagues in Westminster, while Plaid Cymru called the decision "absurd". Chadwick said Wales was "being denied hundreds of millions in funding that could transform our own rail network". He added that Labour expected people in Wales "to believe the ridiculous idea that this project will benefit them and they are justified in not giving Wales the money it needs to improve our own public transport systems".

  Unlike Northern Ireland and Scotland, most of Wales' rail infrastructure is funded by the UK government, and not ministers in Cardiff. Under the system used to fund the devolved nations, called the Barnett Formula, Scotland and Northern Ireland get extra money when more cash is spent on rail in England and Wales. It follows the long-standing row over HS2 which was deemed to be an England and Wales project meaning Wales gets no extra cash. Had that scheme been classed as England-only Wales would have got additional money. However, none of the track planned for HS2 will reach Wales. Differing figures have been given for how much politicians think Wales is owed from HS2, from £4bn suggested by Plaid Cymru and the Welsh government in the past to £350m in the most recent figures from Welsh ministers.

  David Chadwick said the project was like "HS2 all over again"

  In the Senedd Plaid Cymru leader Rhun ap Iorwerth accused the first minister of allowing Wales to be "given a raw deal" over rail and employers' National Insurance contributions (NICs). The Welsh government revealed last week it had a £36m hole in its budget after extra funding provided by the UK government to cover the increased tax fell short. Eluned Morgan replied that ap Iorwerth "probably needs a little lesson on how the Welsh devolution settlement works". "Rail infrastructure is not devolved to Wales. You might want it devolved, but that is the situation it is in at the moment." "What we have is a situation where there is a pipeline of projects for England and Wales. "Are we getting our fair share? Absolutely not." She said she hoped for some acknowledgment of that via the spending review - where the chancellor will reveal her spending plans for the coming years, and added the railway line in question was "very different to HS2". "The Oxford to Cambridge railway line is a part of that broader rail infrastructure piece. The HS2 project was an exception to that, which is why we're making the case in a separate way," she said. Ap Iorwerth accused Morgan of "standing by" the decision on the Oxford to Cambridge line. Meanwhile Tory Senedd leader Darren Millar attacked Morgan over NICs, saying she had "absolutely no influence" over her colleagues in Westminster. Morgan said the Welsh government had made it clear it was unhappy with the situation on the tax and was "continuing to make the case... they should be covering the entire cost".

  On the social network BlueSky, external, ex-Welsh Labour transport minister Lee Waters drew attention to comments made by the rail minister Lord Hendy, where he criticised the classification of HS2 a year before he joined the UK government. Hendry told the House of Lords in 2023 that it was "strange that, as a consequence of spending on HS2, Scotland and Northern Ireland received additional funds as part of the block grant but Wales did not". Waters told BBC Wales: "The way the funding formula works does not pass the common sense test. "The signs are encouraging that we'll get more rail funding from the imminent spending review but we need to fix the system so that this doesn't keep happening. "It's no good recognising the problem in opposition and then not sorting it when you get a chance in government."

  The TSSA rail union called for a rethink over the Oxford to Cambridge classification. Its general secretary Maryam Eslamdoust said: "Labelling this project as benefiting 'England and Wales' when it delivers no new infrastructure in Wales undermines trust and risks depriving Welsh communities of much-needed funding for their own railways." She said: "The rail line lies entirely within England and will offer no benefit to Wales. On the contrary, its misclassification will deny Wales millions of pounds in desperately needed infrastructure investment." Welsh Conservative Shadow Cabinet Secretary for Transport, Sam Rowlands, said it was "clear that the Welsh Labour Government has no sway with their counterparts in Westminster." He called for consequential funding for HS2 and Oxford to Cambridge, but added: "To ensure transparency and effective use of resources, this funding must be allocated directly to Network Rail to deliver for the needs of people in Wales."

  The UK government said its rail network enhancements pipeline will pay for the redevelopment of Cardiff Central Station, improved level crossings in north Wales and support for the upgraded south Wales relief lines, external. Welsh government Transport Secretary Ken Skates said it was "not new" that the "system used for paying for rail improvements... has historically disadvantaged us", and previous governments had failed to change that. He said the Labour UK government has "admitted that the Wales and Borders network has been underfunded in the past". Skates added the UK and Welsh governments had agreed "an ambitious pipeline of improvements that will make up for under-investment by previous governments". The Welsh government clarified that the minister was referring to schemes previously praised by his Westminster counterpart Heidi Alexander in a letter in January, including five new stations in south east Wales and investment on the north Wales mainline.

  Railway funding has become a totemic issue for those who think that the way Wales is run is faulty; that it should have more of a say over how it runs its own affairs, and that the way it is funded is unfair. That's partly because of the state of our railways - the Labour UK government has itself admitted that they are historically underfunded. But many of the current complaints stem from Welsh Labour's previous criticism of how cash for building railways in Wales is not split from England, and the apparent reluctance now in Westminster to change that. There may be some good news to come in the chancellor's spending review - Transport Secretary Ken Skates has said he is "very, very confident" Wales will do well out of it. But the row will likely rumble on unless the longstanding policy, which dates all the way back to the start of devolution in 1999, is overhauled.
