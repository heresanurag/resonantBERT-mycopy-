title: Teenagers in stolen vehicle lead police in Florida car chase - BBC News
date: '2023-09-26'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-66924904
content: |-
  Video posted on social media shows the two suspects leading the police in a high-speed chase on a highway.

  Two teenagers have been arrested after leading the police on a car chase in a stolen vehicle in Hillsborough County.

  Video posted on social media by the Hillsborough County Sheriff's Office shows the suspects leading the police in a high-speed chase on a Florida highway.

  A police vehicle then used the precision immobilisation technique (PIT) to bring the stolen car to a stop.

  The 14-year-old and 15-year-old suspects have been charged with grand theft.
