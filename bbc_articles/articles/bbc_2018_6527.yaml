  The government won the vote on the EU Withdrawal Bill by 319 to 303.

  Traditionally, unwell MPs are able to be "nodded through" by whips if they make it onto the Parliamentary estate, without having to leave their vehicle and enter the House of Commons, and it is rare for this convention to be cast aside.

  Labour's shadow Commons leader Valerie Vaz said she had heard Tory whips confirming it would not apply in Wednesday's vote.

  "All the trust and conventions appear to have broken down that enable us to carry out our work here," she said.

  Ms Shah's office said she had been in hospital in Bradford since last Friday with "excruciating" nerve pain resulting from a hit-and-run collision and went "absolutely against doctor's advice" and had to sign a form to be allowed to leave.

  She is now back in the city's royal infirmary after a round trip of over eight hours.

  She told The Guardian she had been told by her party's whips to travel to Westminster but assured she would be able to stay in the car - however she said the Conservatives insisted she had to vote in person by walking through the voting lobbies in the Commons.

