title: Naz Shah's wheelchair vote prompts calls for Commons reform - BBC News
date: '2018-06-21'
section: UK Politics
url: http://www.bbc.co.uk/news/uk-politics-44561399
content: |-
  There are calls for changes to "archaic" rules after an MP was wheeled from her sick bed to vote.

  There have been calls for a reform of "archaic" Commons rules after a sick Labour MP had to enter the lobbies in a wheelchair to cast her vote.

  Naz Shah said she felt she had been stripped of her dignity after being told she would have to vote in person during Wednesday's Brexit bill debate.

  Labour has accused the Tories of suspending a convention sparing unwell MPs from having to enter the chamber.

  But the government blamed Labour for her ordeal.

  Commons leader Andrea Leadsom said she was "particularly sorry" that Ms Shah, the MP for Bradford West, had been "forced to come and vote".

  "But the fact that she had to come all the way from Bradford when she was clearly so unwell is clearly a matter for the honourable lady's party."

  She said the government had only been told of Ms Shah's situation just after midday on Wednesday.

