  She added: "I was in my pyjamas. It felt personally very undignified and very invasive. It was embarrassing. I thought I'd just be able to stay in the back of the car, where I'd made a bed for myself, and be counted there, but the Tories wouldn't have it.

  "By making me go in to vote like that, they stripped me of my dignity."

  Meanwhile the Lib Dems' deputy leader voted while nine months pregnant.

  "This is no way to run a Parliament in a modern democracy," Jo Swinson tweeted afterwards.

  "Deciding matters of state, or which parts of the country will have their voices heard, should not be determined by which MPs can be discharged from hospital or happen to be in childbirth. We need proxy voting."

  MPs are currently considering whether members who are new parents should be able to vote by proxy. A debate on the issue is to be held on 5 July.
