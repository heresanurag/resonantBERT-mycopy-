  Thousands of jobs are slashed in retail and aviation - two of the sectors hardest hit by lockdown.

  Public concern over coronavirus 'has risen' in Britain

  Most of Britain is preparing for an easing of lockdown restrictions. But public concern at the risks from coronavirus has risen to the highest level since the end of April, a new poll conducted by Ipsos Mori this week suggests. However, the survey also says the public is becoming more comfortable about returning to work and sending children back to school. A month ago, 37% of those surveyed said they were ‘very concerned’ about the risks to the country. This new poll suggests that has risen to 50%. Concern about the risks to individuals has also risen from 24% to 29%. The survey asks people whether they would feel comfortable in a range of situations if lockdown measures were lifted. The proportion of parents who said they would be comfortable sending their children to school has risen to 49%, up from 38% a month earlier. Two-thirds of people would be comfortable meeting friends or family outside their household, also a rise from six weeks before. But the poll suggests around six in 10 people would be anxious going to bars or restaurants, using public transport or lavatories and only 15% said they would be comfortable going to large sport or music events. Ipsos MORI interviewed a representative sample of 1,078 British adults aged 18-75 online between 26-29 June 2020. Data are weighted to match the profile of the population. All polls are subject to a wide range of potential sources of error.
