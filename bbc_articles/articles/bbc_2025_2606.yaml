content: |-
  BBC reporters in the US, Canada and Mexico assess the fallout after Trump gets border promises in return for a 30-day pause on tariffs.

  Trump's trade war with neighbours is delayed - what did they all get out of it?

  This video can not be played To play this video you need to enable JavaScript in your browser. Watch: 'I'm getting angry and anti-American' - Canadians on tariff threat

  President Donald Trump has suspended for 30 days the hefty tariffs on Mexico and Canada that he threatened after last-minute negotiations with the two US neighbours. He can point to concessions on border and crime enforcement as a victory. But Canada's Justin Trudeau and Mexico's Claudia Sheinbaum also can claim political wins. A trade war that would send economic shockwaves through North America and beyond is on hold - for now. So who blinked first and what happens next?

  President Trump's high-stakes confrontation with the United States' closest trading partners appears to have paid off, with both Mexico and Canada agreeing to stricter border security and taking bigger steps to address fentanyl trafficking. The strategy to leverage the US economy to force concessions from other countries notches a win for Trump's "America first" agenda, allowing him to follow through on core domestic issues without American consumers feeling the sting of the economic consequences of a continental trade war. His tariff playbook is hardly new. Trump's tariffs on steel and aluminium during his first term prompted backlash from Mexico, Canada and the European Union, but economists say those measures were more limited in scope. This time, Trump has promised sweeping tariffs on goods from Mexico and Canada, and China, which is still set to see a 10% tariff increase on goods starting at midnight on Tuesday. But it remains unclear whether Trump will follow through on his threats to Canada and Mexico once the 30-day deadline is up. That uncertainty stirs fears that could see businesses reducing their reliance on American markets, holding off on investing in building new factories or hiring workers until the trade stand-off becomes more clear.

  That was not a January Arctic blast from the north - it was a widespread sigh of relief from Canadian politicians and business leaders at the 30-day pause on US tariffs. While the threat of tariffs remains, Canadian Prime Minister Justin Trudeau can claim a political win: a temporary truce in what was shaping up to be a devastating trade war. Canadian politicians have been scrambling to figure out what exactly would satisfy Trump - a situation not helped by Canada's domestic politics, with Trudeau wrapping up his last weeks in power as a lame-duck prime minister. The border security measures announced on Monday aren't all new. In December, Canada announced C$1.3bn ($900m; £700m) in measures that included efforts to disrupt the fentanyl trade, new tools for law enforcement and enhanced co-ordination with US law enforcement. Canadian surveillance drones and two Black Hawk helicopters recently began patrolling the boundary between the two countries. Officials have cited those efforts for weeks to show they are taking Trump's border concerns seriously. A new element appears to be the appointment of a "fentanyl tsar" and a C$200m intelligence directive to fight organised crime and fentanyl. One question that remains is what this means for the future of the Canada-US relationship. The partnership between the allies has been deeply shaken by Trump's economic threats.

