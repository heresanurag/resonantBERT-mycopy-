  By Will Grant, BBC Central America and Cuba Correspondent, Mexico City Throughout this trade crisis, President Claudia Sheinbaum has called for "cool heads" and "calm". Even on Friday, she said she was confident of a last-minute reprieve from the 25% tariffs on Mexican goods. And so it proved, following an early morning telephone call with President Trump. Announcing the agreement soon after, she could barely wipe the smile from her face and her supporters have heralded what they see as a masterclass in how to negotiate with Donald Trump. Yes, she agreed to send National Guard troops to the border to focus on fentanyl-smuggling, but crucially she secured what she wanted from Trump, too. As well as the obvious – a pause on tariffs – she also got Trump to "promise" the US would do more to tackle the traffic of high-powered weapons from the US into Mexico, to prevent them from ending up in the arms of cartel gunmen. But she also bought herself another vital commodity: time. She now has several weeks to build on the points agreed in that phone call and turn the temporary hold on tariffs into a permanent one. The expectation is that now Secretary of State Marco Rubio will visit Mexico soon to discuss these matters and a joint group on fentanyl will be established with Mexican and US health and security officials. If in fact Sheinbaum does manage to prevent further trade hostilities, it will go down as the first significant victory of her new government, having only been in office since October. And it may set the tone for future interactions with President Trump and his administration.

  Are you in Canada or Mexico? What are your thoughts on the current situation?

