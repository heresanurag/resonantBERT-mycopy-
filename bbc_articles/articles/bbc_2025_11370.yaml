title: 'Thomas Tuchel: England manager understands how Jude Bellingham''s on-field
  attitude can cause ''mixed emotions'' - BBC Sport'
date: '2025-06-11'
section: England Men
url: http://www.bbc.co.uk/sport/football/articles/crmkyn2j33ro
content: |-
  Thomas Tuchel says anyone unhappy with Jude Bellingham's on-field attitude - including the German's mother - do not know the "special boy".

  Mum thinks Bellingham can be repulsive but I see special boy - Tuchel

  Jude Bellingham came on as a second-half substitute for England against Senegal on Tuesday

  England manager Thomas Tuchel says his mother views some of Jude Bellingham's on-field behaviour as "repulsive" - but he believes any critics of the Real Madrid midfielder do not know the "special boy" he does. Bellingham, 21, was angered by a VAR decision to rule out his second-half goal in Tuesday's friendly against Senegal, when England were 2-1 down. England eventually lost 3-1 at the City Ground, which was Tuchel's first defeat in charge of the national team. In an interview with Talksport,, external Tuchel said Bellingham's "fire" is something he does not want to "dim down" but does need to be "channelled" in the right direction. "I think he brings an edge which we welcome and is needed if we want to achieve big things," said the former Chelsea boss.

  "It needs to be channelled towards the opponent and towards our goal, not to intimidate team-mates or be over-aggressive towards team-mates and officials, but always towards the solution, towards winning. "He has the fire and I don't want to dim this down. He should play with this kind of fire, but the fire comes with some attributes that can intimidate you, maybe even as a team-mate. "You sometimes see the explosion towards referees and the anger in his game. If he can channel this in the right way, and we can help him with this, then for sure he has the something we need and a certain edge that is hard to find. "He's a nice kid, very open, very intelligent and he's been very easy [to manage] so far." It was put to Tuchel that there may be some fans who feel England would be better without Bellingham in the team, to which he replied: "I struggle to see that and I think it has to be the other way around - how we can have the best version of him, that people understand what he brings to us and he's bringing a certain edge. "I see it can bring mixed emotions. I see this with my parents, with my mum, that she sometimes cannot see the nice, well-educated, well-behaved guy that I see. "If he smiles, he wins everyone. But sometimes you see the rage, the hunger and the fire and it comes out in a way that can be a bit repulsive, for example, for my mother when she sits in front of the TV. I see that but, in general, we are very happy to have him. He's a special boy." BBC Sport has been told there is no unease from the Football Association about the interview. The governing body believes Tuchel's intention was to portray just how special Bellingham is - something they feel the head coach has achieved.

