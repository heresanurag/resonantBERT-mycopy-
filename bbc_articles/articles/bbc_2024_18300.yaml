  This year, the runaway success of Disney's Inside Out 2 has helped boost the entertainment giant's profits. But operating profit declined 3% to $2.2bn (£1.7bn) with the company blaming a "moderation of consumer demand" that "exceeded previous expectations", along with higher operating costs. The 2024 Olympic Games in Paris were partly blamed for the drop in its theme park takings, which make up over half Disney's profit. However, its parks - among the most visited attractions in the world - have remained a reliable profit engine, helping cushion the impact of declines in traditional television and losses in Disney's video streaming business. The experiences unit, which includes parks, cruise ships and consumer products, contributed 60% of the company's operating profit in the most recent quarter - up from 30% just a decade ago. On Friday, details of new films including the title of the third instalment of Avatar, an addition to the Star Wars franchise and a sequel to Freaky Friday were announced at D23, held near Disneyland in Anaheim.
