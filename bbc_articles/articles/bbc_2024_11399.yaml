content: |-
  Bernd Debusmann Jr was inside the tense Delaware courtroom as the verdict was read out.

  BBC reporter Bernd Debusmann Jr was inside the Delaware courtroom as the US president's son was found guilty of lying about his drug use on a form when purchasing a handgun in 2018.

  The jury deliberated for close to three hours after listening to a week of witness testimony about 54-year-old Hunter Biden's drug addiction.

  Hear what it was like inside the courtroom, where you could "hear a pin drop" as the verdict was read.
