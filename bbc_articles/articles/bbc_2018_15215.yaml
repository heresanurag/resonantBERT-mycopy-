title: 'Indonesia tsunami: Rock band Seventeen swept away by waves - BBC News'
date: '2018-12-24'
section: Asia
url: http://www.bbc.co.uk/news/world-asia-46669420
content: |-
  The band were performing on the beach when waves crashed through the tent, engulfing the stage.

  (From L-R) Andi, Riefian, Bani and Herman were performing as the tsunami struck

  One of the most shocking and heart-rending stories to emerge from the Indonesian tsunami is that of rock band Seventeen, who were performing in a marquee on the beach when waves came crashing through and swept them away.

  If a lot of the soul-searching and commentary in Indonesia right now is about how there was absolutely no warning for the killer waves, this is the starkest illustration of that.

  The footage of the event is startling for how quickly a scene of about 200 people gathered around tables listening rapt to the band, became one of surging waves as the singing turned into screams.

  Three members of the band - the bassist, road manager, guitarist - and a crew member have been killed. The band's drummer remains missing.

  The lead vocalist of the band is the only known survivor from the band so far and has been posting heartfelt updates on his Instagram account.

  "We lost Bani [bassist] and Oki Wijaya [road manager]," said Riefian Fajarsyah in an Instagram video as he held back tears.

  "Please pray that my wife Dylan and Herman [guitarist], Andi [drummer] and Ujang [crew] will be found soon."

