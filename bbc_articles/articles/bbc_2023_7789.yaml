title: 'Watch: Officer clings to speeding car in wild chase - BBC News'
date: '2023-05-19'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-65640384
content: |-
  A routine traffic stop in the US turned into a chase when officers discovered the driven had a warrant.

  Newly released bodycam footage by US police has revealed what happened during a dramatic car chase in 2021.

  Iowan police officer Patrick McCarty can be seen jumping into action when a man with an arrest warrant tried to flee what was initially a routine traffic stop.

  Mr McCarty broke his back in the fall, the Iowa Capital Dispatch news service reported.

  The driver, Dennis Guider Jr, pleaded guilty to causing serious injury with a vehicle and was sentenced to up to five years in prison.
