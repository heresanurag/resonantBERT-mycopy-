id: bbc_2022_1956
title: 'In pictures: Kyiv under attack - BBC News'
date: '2022-02-26'
section: In Pictures
url: http://www.bbc.co.uk/news/in-pictures-60536824
content: |-
  Russian forces continue a military assault on neighbouring Ukraine, as fighting reaches the streets in the capital.

  Ukrainian servicemen patrol during a curfew as Russian forces continue to advance on the third day in Kyiv. The capital's Mayor Vitali Klitschko announced the curfew from between 17:00 on 26 February and 08:00 local time on 28 February.
