title: Thousands stranded in Swiss ski resort - BBC News
date: '2018-01-11'
section: General
url: http://www.bbc.co.uk/news/world-europe-42643206
content: |-
  More than 13,000 tourists are stranded in the alpine resort of Zermatt, after heavy snow cut off towns and villages across Switzerland, France and Italy.

  More than 13,000 tourists have been left stranded in the Swiss resort of Zermatt, after heavy snow in the Alps cut off towns and villages across Switzerland, France and Italy.

  The avalanche risk is set at the rarely used maximum on a five-point scale. This is the highest it has been for almost 10 years.

  Trains have now started to move tourists from the resort.
