title: Dash cam captures Rhuallt Hill lorry crash into stopped car - BBC News
date: '2025-06-10'
section: General
url: http://www.bbc.co.uk/news/uk-wales-north-east-wales-39345657
content: |-
  Dash cam footage captures the moment a lorry crashes into a broken down car containing two young children.

  Footage from a truck captured the moment it crashed into a broken down car containing two young children.

  Truck driver Thomas Anthony Holland, 61, was fined £300 after admitting driving the Scania lorry carelessly on the A55 dual carriageway at Rhuallt Hill on 28 October last year.

  The car contained a grandmother and mother who said they feared for the lives of the two children in the back.

  Holland, from Llangollen, was given six penalty points at Flintshire Magistrates' Court on Tuesday.

  But magistrates did not impose a driving disqualification.
