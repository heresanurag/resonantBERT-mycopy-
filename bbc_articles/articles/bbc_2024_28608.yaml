  Icy conditions are expected to cause further disruption into Thursday morning following Wales' first snowfall of the season. The Met Office issued a yellow warning for ice across Wales, external, which is in place from 16:00 GMT on Wednesday until 10:00 on Thursday. Almost 50 schools were closed on Wednesday in Wrexham, external, Powys, external, Caerphilly, external and Denbighshire, external. Buses replaced trains between Llandudno, Conwy county, and Blaenau Ffestiniog in Gwynedd, and a road in Wrexham was shut.

  Forecasters have warned people to take extra care when making journeys, and to expect disruption. "With cold Arctic air firmly in place over the UK, continued winter hazards are likely through much of this week," said Met Office chief meteorologist Neil Armstrong. The Met Office said cold northerly winds will continue through the week across much of the UK, with further warnings likely. It added that temperatures were likely to increase from the south-west this weekend, though this will be accompanied by some strong winds and heavy rain.

