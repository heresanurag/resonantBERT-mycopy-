  Icy patches are expected to form on untreated surfaces during Wednesday evening and overnight into Thursday as temperatures drop below freezing, according to the Met Office. Areas in north Wales are mainly affected, with yellow weather warnings in place from 16:00 GMT on Wednesday until 10:00 on Thursday. A few sleet or snow showers will also be likely, particularly close to coasts. The forecaster has warned people should expect some roads and railways to be affected with longer journey time. By the weekend, the cold air is set to be replaced by milder south-westerly winds with potentially wet and very windy weather sweeping in.

  The Met Office issued three yellow warnings across the UK until Thursday morning

  Snow started falling across parts of the UK on Monday night, causing more than 140 schools to shut in Wales and several roads to close on Tuesday. Transport for Wales said 13% of its services had been disrupted due to severe weather on Tuesday. A lorry stuck in snow near Bwlchgwyn, Wrexham county, left a section of the A525 impassable in both directions. The UK Health Security Agency also issued the first amber cold weather health alert of the season, warning that conditions could be dangerous for elderly and vulnerable people.

  The Alzheimer's Society warned cold weather could be "particularly challenging" for people with dementia. "Colder temperatures can be difficult for a person with dementia to adjust to, and they may not always be able to communicate that they are cold - or they may not even recognise it themselves," the charity said. Another charity, Asthma and Lung UK, urged those with lung conditions to be "extra careful". The charity warned that cold weather could trigger potentially life-threatening asthma attacks, or "flare-ups", for people with other lung conditions.
