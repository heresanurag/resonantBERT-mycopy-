title: '''Tradeswomen paid less than men amid appalling sexism'' - BBC News'
date: '2024-09-20'
section: England
url: http://www.bbc.co.uk/news/articles/c1k3k9y2dp3o
content: |-
  One tradeswoman struggled to find employment despite finishing her training with a distinction.

  Katy Bradshaw struggled to get an apprenticeship even though she passed her training with distinction

  Women in the skilled trades industry can be subjected to "appalling" levels of sexism and paid less than men, according to workers and new research. More than a third of tradeswomen said they are not taken seriously because of their gender, research by industry platform, Rated People, showed. Katy Bradshaw, an electrician in Gloucestershire who was the only woman on her training course, said: "I was the only one to pass first time with distinction in my class, every other lad failed. "But, I still struggled to find an apprenticeship; nobody would take on a female."

  "It took a long, long time until I eventually found someone who already had a female on their books and was willing to take me on," she added. TaskHer, a company that enables homeowners to book qualified tradeswomen online, has spoken out on National Tradesmen Day (September 20) about the bias that exists against women in the field.

  Anna Moynihan, co-founder of TaskHer, said many women she represented had experienced "appalling" sexism in the skilled trades industry

  "Currently the trade industry is one of the worst for bias and sexism," said co-founder, Anna Moynihan. "Often women are paid less, don’t always feel safe, are at the receiving end of sexist jokes, and it’s often assumed they aren’t able to do the work properly because of their gender," said Ms Moynihan. "Some of our tradeswomen have been asked if they are calling on behalf of their son, or told, 'We can't employ you because you're not strong enough to lift equipment'," she added.

  Founded in 2022, the idea for TaskHer came to Ms Moynihan and her husband, Paul, while organising building work at their house. Every time Ms Moynihan booked a tradesperson for a job or a quote, she found that they would instinctively speak to her husband about what needed to be done, despite the fact that she had made the booking. This gender bias led them to realise how underrepresented women were in the trades, which are 96% male in the UK.

  "To face this type of sexism every day while simply trying to do your job is exhausting and frankly, unacceptable. "The trades offer a lucrative and flexible career for women, plus there is a shortage of 166,000 tradespeople at the moment, and encouraging more women into the industry can help address that shortage," she added.

  Rosie Russell, a painter and decorator from Bristol is one of the 40 women represented by TaskHer. She said her job gives her a lot of flexibility as a working mum. "I had to learn everything for myself, like going to do estimates and quotes. "But you can make it into your own niche and add creativity. "I have someone working for me now, so you can make more money by subcontracting, and I'm also looking into teaching other people," she said.

  Rosie Russell, a painter and decorator from Bristol, is one of 40 women represented by TaskHer

  It is estimated that less than 0.5% of gas engineers and 2% of electricians and plumbers are women. Ms Moynihan said women were missing out on accessing high-paying careers, and in many cases, being funnelled into low-paying work as a result.

  "Girls at school-leaving age who're not going to university are still filtered into roles such as hairdressing and childcare, which don't pay very well," said Ms Moynihan. "Whereas their male peers are filtered into apprenticeships in plumbing, heating and gas electrics, which can command a salary of £80,000 in London."

  Ms Bradshaw, who now runs her own business, said there were very few women she knew personally in the industry, but she now has a support network on social media. "If you ever need something, or advice, you pop something on there and within ten minutes you have about ten replies, so there's a small, but growing community of tradeswomen. "Now customers trust me and that's what I want; if they feel comfortable and happy, then I can carry on with my job," she said. A Trade Union Congress South West spokesperson said no worker should be exposed to any form of discrimination, harassment or abuse. "And yet sadly, our research shows it is all too common for women," they said. "There are still workplaces whose culture, policies and procedures badly need to move into the 21st Century. "It's why we greatly welcome the Government's commitment to bringing in the biggest boost to employment rights and protections not seen for a generation."

