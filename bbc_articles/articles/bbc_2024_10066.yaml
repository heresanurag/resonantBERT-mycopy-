title: Edgware stabbing victim Anita Mukhey 'devoted to her family' - BBC News
date: '2024-05-13'
section: London
url: http://www.bbc.co.uk/news/uk-england-london-68999503
content: |-
  A man has been charged with the murder of Anita Mukhey, who was stabbed in north London on Thursday.

  Anita Mukhey was a part-time secretary with the NHS

  A grandmother who was killed near a bus stop has been remembered for being "devoted to her family". Anita Mukhey, 66, a medical secretary in the NHS, was stabbed in Edgware, north London, on Thursday morning. Jalal Debella, 22, from Colindale, has been charged with her murder. In a statement released through the Met Police, her family said she was a married mother and grandmother devoted to her family. "The family ask for privacy at this difficult time," the statement said. Mr Debella did not enter a plea at Willesden Magistrates' Court and is due before the Old Bailey on Tuesday.

  Police were called to Burnt Oak Broadway at about 11:50 BST on Thursday. Ms Mukhey was treated for knife wounds but died at the scene. In footage seen by the PA news agency, people could be seen rushing to her aid in the moment after the incident. The Metropolitan Police urged people not to share the "enormously distressing" footage online. On Saturday, in a post on X, formerly Twitter, a police spokesman said: "A small number of social media users have posted graphic footage of the attack. "It is enormously distressing for grieving families. "We ask that these posts are deleted and others not to share them." The Met Police previously said the attack was an "isolated incident" and no further suspects were being sought.

