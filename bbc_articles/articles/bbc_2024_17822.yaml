title: Darlington parents in court over Scarlett Vickers' alleged murder - BBC News
date: '2024-07-08'
section: Tees
url: http://www.bbc.co.uk/news/articles/cn380kexl5vo
content: |-
  Simon Vickers and Sarah Hall are remanded in custody after their 14-year-old daughter was stabbed.

  The parents of a 14-year-old girl who died from a stab wound have appeared in court charged with her murder. Police were called to a house in Geneva Road, Darlington, County Durham, at about 23:00 BST on Friday and the teenager, called Scarlett, died at the scene. Simon Vickers, 49, and Sarah Hall, 44, appeared at Newton Aycliffe Magistrates' Court and were remanded in custody. No pleas were entered and the case is due to next be heard at Teesside Crown Court on 5 August.

  Speaking over the weekend, Det Supt Craig Rudd, of Durham Police, described the girl's death as "tragic".

  The house on Geneva Road was cordoned off as officers conducted enquiries over the weekend
