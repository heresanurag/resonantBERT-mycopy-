  Pledgeball is a research-driven charity that aims to help eliminate waste and encourage fans to think about their carbon footprint. Also a nominee in 2023, it has been consistently active in the football community but is increasingly partnering with other sports and organisations to support, promote and encourage the update of sustainable practice. In the past 12 months, Pledgeball has introduced a sustainable travel charter to help clubs choose a more sustainable way to travel, its founder Katie Cross delivered a workshop on fan engagement with environmental sustainability, and it has worked with Uefa and the Biathlon International Union around big events. Through Pledgeball in 2024, fans pledged to save 62,589,800 kg of CO2e per year, which equates to taking more than 13,600 cars off the road. Pledgeball founder and chief executive Katie Cross said: "One of the issues is we all feel incredibly overwhelmed by this, we feel climate change is such a big issue that we cannot take part and so we turn off to it. "What Pledgeball does is show a clear way in which you can have an impact, illustrate what that is and help you see you are a part of a huge community that also cares and wants to take action. "There is a huge desire for bold action that will change things and protect those things we care about."
