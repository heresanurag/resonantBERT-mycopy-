title: Abortion protesters 'said I was a murderer' - BBC News
date: '2018-01-16'
section: General
url: http://www.bbc.co.uk/news/uk-42707033
content: |-
  Legal action is being considered after anti-abortion protesters have been accused of "harassing" women.

  Anti-abortion protesters have been accused of "harassing" women attending Marie Stopes abortion clinic in Ealing, London.

  Now the local council is considering legal action.

  Watch the BBC's Victoria Derbyshire programme on weekdays between 09:00 and 11:00 on BBC Two and the BBC News channel.
