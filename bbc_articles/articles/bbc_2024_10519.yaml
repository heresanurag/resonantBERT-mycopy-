  Family pictures with his daughters posted to Combs' Instagram account are in stark contrast to the images of him carrying out a violent assault. The Los Angeles District Attorney's Office said on Friday that it would not be able to bring charges due to the statute of limitations for assault. So where does the CCTV video, and the ongoing investigation, leave his career? In his music, Diddy has often relied on collaborations with other A-list stars. His last album featured Mary J Blige, The Weekend, 21 Savage, and John Legend. He is extremely unlikely to be able to recreate such productions now. But whether there will be an effect on his vast number of listeners is less clear. Fitness company Peloton has banned his music from its workout playlists already, according to TMZ, but other companies are yet to comment. R Kelly continues to get millions of monthly listeners on Spotify, despite convictions for child sexual abuse. Meanwhile, Kanye West experienced a peak in his monthly listeners last year, despite being dropped by brands for expressing antisemitic views. Those who passed by Diddy's star on the Hollywood Walk of Fame this week reflected on what the video meant to the rapper's fans. "It's career-ending. I don't know how he's going to come back from this," said Mar Anthony, a Los Angeles local. "I was a fan when I was a kid, listening to Every Breath You Take (I'll Be Missing You). But what he did and the music, they're two different things. "It's the same thing with Michael Jackson," he said, nodding towards another Walk of Fame star that lies not far away - in an apparent reference to allegations of child abuse made against that star. Diddy "definitely deserves what is coming to him", said Prince Laurenz Hamlin, who was visiting LA. "But he still has built a legacy in the music industry. I think people will have to separate the art from the artist." One woman, after snapping a photo of Combs' star, simply muttered "predator" as she walked away. It is unclear who is currently advising Sean Combs. The law firm that previously issued denials on his behalf has said it no longer represents him. Despite the civil lawsuits there have been no criminal charges filed against him. But the ongoing police investigation will no doubt be weighing heavily on the rapper. "The Department of Homeland Security was involved [in the raids]," said Mr Dowlatshahi. "Just that fact alone shows the severity of what's going on here."
