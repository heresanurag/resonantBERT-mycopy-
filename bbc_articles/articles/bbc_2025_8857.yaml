title: Belgian soldiers injured during training incident in Scotland - BBC News
date: '2025-05-13'
section: Scotland
url: http://www.bbc.co.uk/news/articles/ce391pqlww1o
content: |-
  Belgium's defence ministry said approximately 10 other soldiers also sustained hearing damage during the incident.

  Belgian forces were in Scotland on a training exercise when the soldiers were injured

  Three Belgian soldiers have been injured in a live firing incident during a military training exercise in Scotland. Belgium's defence ministry said approximately 10 other soldiers also sustained hearing damage. The Scottish Ambulance Service said two helicopters and three ambulances formed part of its response to the incident at Tain, in Easter Ross, at about 13:15 on Monday. Tain is the location of a large weapons training area where aircraft and ground troops conduct live firing exercises.

  Police Scotland said it was alerted to an incident involving military personnel at 13:25 on Monday and inquiries were ongoing.

  It is understood about 600 Belgian personnel are based at Kinloss Barracks in Moray during a large-scale exercise called Red Condor. It is taking place until 21 May and involves military helicopters, according to the UK Ministry of Defence, external. Two of the injured soldiers are now in a stable condition, with one expected to undergo surgery in Scotland before being repatriated to Belgium. The third soldier who went to hospital sustained minor injuries and has since been discharged. A spokesman for Belgium's defence ministry said: "The incident took place during a planned training exercise. An investigation has been launched to determine the exact circumstances. "The families of the injured personnel have been informed." The Belgian prime minister Bart De Wever posted on X that he had been informed that three members of the Third Parachute Battalion had been injured. He wished them a speedy recovery and offered his sympathies to their loved ones. A spokesperson for the UK Ministry of Defence said: "We are aware of an incident during an exercise in Scotland involving foreign national military personnel. "Our thoughts are with all those affected."

  The Scottish Ambulance Service said one of its own air ambulances and a helicopter from Scotland's Charity Air Ambulance were sent to the incident. Trauma teams and a doctor also responded to the incident. An ambulance spokesperson said: "Two patients were transported by air to Aberdeen Royal Infirmary and one patient by road to Raigmore Hospital." Tain Air Weapons Range covers an area of 2,700 acres on the Dornoch Firth. It is used by the UK military, US Air Force and Nato personnel. Hampshire-born L/Cpl Joe Spencer, of 3rd Battalion The Rifles, died in an accident at the range on 1 November 2016. An inquiry into his death heard that, as a group of snipers gathered in a shipping container on the range, the 24-year-old was resting his chin on a suppressor fitted to his rifle's muzzle when the gun fired unexpectedly. Sheriff Gary Aitken, who led the inquiry, said his death could have been avoided if precautions had been taken.
