  When asked if Mulligan could ever have a normal life, Dr Bateman said it would be difficult.

  "It will be difficult to come of age, to make the transition to adulthood in a custodial institution and not spend your time, as most adolescence do, learning how to deal with the wider world, learning how to be an adult."

  Mr Lee is more optimistic: "It depends on whether or not they're branded evil," he said.

  He said excursions outside prison would be essential towards the end of his sentence: "If he is kept in custody for 10 years, unless he has the opportunity of dipping his toe into real everyday life, I think his chances of being normal again are very slim."
