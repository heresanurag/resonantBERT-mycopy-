title: 'James Vickery: Crystal Palace fan on dream of singing at stadium - BBC News'
date: '2025-03-22'
section: General
url: http://www.bbc.co.uk/news/videos/c871225p788o
content: |-
  Partially-deaf singer James Vickery has been a fan of the south London club since he was a child.

  When he became partially deaf as a child, James Vickery thought his dreams of becoming a singer were over.

  But the Crystal Palace fan from Croydon went on to secure a record deal after one of his videos on YouTube got more than 40 million views.

  Ahead of the release of his second album, he spoke to BBC London at the Premier League club's Selhurst Park ground - where he one day hopes to have a sell-out gig.

