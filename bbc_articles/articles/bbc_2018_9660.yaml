title: Meet Nasa's commercial flight astronauts - BBC News
date: '2018-08-04'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-45065542
content: |-
  They will be aboard the first US flights to the International Space Station since the shuttle programme ended.

  The first US flights to the International Space Station since the shuttle programme ended are scheduled to blast off in 2019.

  Nasa says four crews of two will travel in the commercially-funded craft built by SpaceX and Boeing.
