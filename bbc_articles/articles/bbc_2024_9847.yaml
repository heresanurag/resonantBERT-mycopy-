content: |-
  Jo Bean says the hunt for her five-year-old lurcher Rosie has taken over her life.

  Jo Bean said the search for Rosie had taken over her life

  A woman has quit her job in order to search for her missing dog. Jo Bean, from Desborough, said her five-year-old lurcher Rosie ran off on a walk at Barford Wood and Meadows near Rushton, Northamptonshire, on 19 February and had not been seen since. Ms Bean, a fashion designer, said she had walked "hundreds of miles across muddy fields" in search of Rosie. She said the search for Rosie, who is about the size of a Labrador, had taken over her life. Ms Bean said Rosie was a very friendly dog and an "absolute poppet". Drones, wildlife cameras and "an abundance of people" have helped in the search for Rosie, but no firm leads have been established.

  Rosie, a five-year-old lurcher, has been missing since 19 February

  "It takes up your life," said Ms Bean. "I wake up in the morning and I have 40-odd messages on my phone from social media which I answer to. It could just be a lead to find Rosie." Ms Bean, who has worked as a costume designer on the BBC's Great British Sewing Bee, said losing Rosie was "the worst-ever experience I have encountered". She said: "In our 10 weeks of searching for Rosie we have literally been thrown into a whole new world of lost, missing and stolen pets and it's been a huge incredibly painful learning curve. "But we are so incredibly grateful to have amazing people that have given their time in helping us through this incredibly difficult time. The compassion and care has been humbling" Rosie, a Bedlington terrier and whippet-cross, went missing when she chased after an animal during an off-lead walk at about 20:00 GMT and did not return, despite a "relentless" overnight search. She was not wearing a collar at the time, but was microchipped, Ms Bean said. Rosie is described as long haired with "light flecks" and a "distinctive" white chest and white rear toes. A "substantial" reward is being offered for her safe return.

  There have been no confirmed sightings of Rosie in the 10 weeks since her disappearance
