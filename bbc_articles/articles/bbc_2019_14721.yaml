title: 'Barry stabbing: Victim Jordan Davies a ''loving father'' - BBC News'
date: '2019-12-18'
section: Wales
url: http://www.bbc.co.uk/news/uk-wales-50833624
content: |-
  Jordan Davies, 23, is described by his family as a "loving son, brother and father".

  Jordan Davies was a father of two young children and was a keen footballer

  Family of a man who was fatally stabbed in a town centre said he was "a loving son, brother and father".

  Jordan Davies died on Holton Road in Barry, Vale of Glamorgan, after being assaulted at about 16:00 GMT on Monday.

  His family said the father of two young children would be "greatly missed by everyone who knew and loved him."

  A 24-year-old man who was charged with murder appeared at Cardiff Magistrates' Court on Wednesday and was remanded in custody.

  He later appeared at Cardiff Crown Court.

  Det Ch Insp Mark O'Shea from South Wales Police said: "I would like to again express our thanks to those who tried to help in an extremely distressing situation."

  Police were called to Holton Road, Barry on Monday afternoon

