title: Pamela Bach, Baywatch and Knight Rider star, dies aged 62 - BBC News
date: '2025-03-06'
section: US & Canada
url: http://www.bbc.co.uk/news/articles/cy0d818r602o
content: |-
  She was found at her home in the Hollywood Hills after dying by suicide, said the Los Angeles medical examiner's office.

  Pamela Bach, the former Baywatch actress and ex-wife of David Hasselhoff, has died aged 62. Bach was found at home in the Hollywood Hills on 5 March after she died by suicide, said the Los Angeles Medical Examiner's office. She met Hasselhoff while acting with him on the set of TV series Knight Rider, and the two married in 1989. She went on to star alongside him on lifeguard TV drama Baywatch before their divorce in 2006. "Our family is deeply saddened by the recent passing of Pamela Hasselhoff," Hasselhoff said in a statement.

  "We are grateful for the outpouring of love and support during this difficult time but we kindly request privacy as we grieve and navigate through this challenging time." Born in Tulsa, Oklahoma, Bach began acting in the 1970s. She and Hasselhoff have two daughters together. Her acting credits included soap opera The Young and the Restless, Cheers, The Fall Guy, T.J. Hooker, Superboy and Viper. Her daughter, Hayley Amber Hasselhoff, posted a photo of her parents on Instagram, with a white star, in apparent tribute to her mother. In Bach's last Instagram post, published on New Year's Eve, she wrote about being excited to welcome 2025. She said she was also excited to watch her granddaughter, London, "grow and seeing her smile light up my world is truly the greatest blessing". "May 2025 be filled with beautiful moments, laughter, and all the blessings your hearts can hold," she continued. "Here's to a year of making cherished memories, spreading joy, and embracing every precious moment!" Bach's representative, Sharon Kelly, told TMZ she was shocked by her death. "My heart goes out to her family, her beautiful daughters and granddaughter who Pamela constantly gushes about and loves so dearly," she said.

  If you are suffering distress or despair, details of help and support in the UK are available at BBC Action Line If you're in the US, call 988, or contact Lifeline, external.
