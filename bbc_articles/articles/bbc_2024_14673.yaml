title: Aer Lingus pilots in fresh talks over strike action - BBC News
date: '2024-07-01'
section: Europe
url: http://www.bbc.co.uk/news/articles/c4ngmrk8gv1o
content: |-
  About 400 flights have been cancelled up until 7 July as a result of the industrial action.

  Talks under way between Aer Lingus and pilots

  Talks at the Labour Court collapsed last week after five hours

  Fresh talks were under way between Aer Lingus and the Irish Airline Pilots' Association (Ialpa) on Monday evening in an effort to resolve the ongoing pay dispute. The Republic of Ireland’s Labour Court issued the invitation to both parties to review the situation after earlier discussions broke down. It comes after five days of industrial action by pilots represented by Ialpa. About 400 flights have been cancelled up until 7 July as a result of the indefinite work-to-rule and strike action policy by pilots. On Saturday, hundreds of pilots went on an eight-hour strike which resulted in the cancellation of 120 additional flights, affecting 17,000 passengers on the day.

  Pilots began an indefinite work-to-rule on Wednesday in protest at the company's handling of their claim for a 24% pay increase. Work-to-rule means not working overtime or performing other out-of-hours duties. Arriving at the court on Monday, Aer Lingus chief corporate affairs officer Donal Moriarty told Irish national broadcaster RTÉ the airline was hopeful of making progress at Monday's talks. Ialpa President Capt Mark Tighe warned that if the talks fail, the union will consider escalating its industrial action, with further withdrawals of services likely. Speaking to BBC News NI's Good Morning Ulster programme last week Capt Tighe said Ialpa would accept a less than an inflationary rise in an effort to resolve the dispute. Aer Lingus described the reduction by Ialpa of its demands as "minimal", external. Capt Tighe said the union was hopeful the court would be able to assist in the dispute. The Aer Lingus website, external has a list of flights disrupted because of the strike. It states that if your flight is affected, you will be contacted by them directly by email or SMS message. Or, if you booked through a travel agent, they will contact you to advise you of your options.
