title: Dancing On Ice taken off air by ITV - BBC News
date: '2025-03-27'
section: Culture
url: http://www.bbc.co.uk/news/articles/c70e2negn50o
content: |-
  The broadcaster announced there are "no current plans for another series" of the ice-skating contest.

  Dancing On Ice taken off air by ITV

  Dancing On Ice has been "rested" with "no current plans for another series", ITV has announced. The decision means the show won't be on air for its 20th anniversary next year. The ice-skating competition started in 2006 but has suffered from falling viewer numbers recently. The Sunday night staple was hosted by Holly Willoughby and Phillip Schofield until Schofield resigned from ITV in 2023 after admitting lying about an affair with a younger colleague on This Morning.

  An ITV spokesperson said: "Following another successful series earlier this year, Dancing On Ice will be rested in 2026 with no current plans for another series. "We would like to take this opportunity to thank all of the cast and crew who have worked on the show since 2006, and over the previous 17 series, for all of their hard work both on and off the ice." In an Instagram post on Thursday, external, Willoughby thanked everyone who has been "part of our Dancing on Ice family". She added: "I will miss it hugely, but I count myself so lucky to have had it for as long as we did."
  • None Holly Willoughby back on TV screens in Dancing on Ice

  The show sees celebrities paired with professional ice skaters to perform routines in front of a panel of judges. Ratings were strong for several years but viewing figures dropped this year. An average of 2.9 million viewers tuned in live for the launch show in January, compared with 2024 when an average of 3.6 million viewers watched the first episode. This year's series, which was co-hosted by Willoughby and Stephen Mulhern, was won by Coronation Street actor Sam Aston and his skating partner Molly Lanaghan. Other celebrities who have taken to the ice since 2006 include Olympic gymnast Beth Tweddle, EastEnders actor Sam Attwater and presenter Joe Swash. Judges included Olympic champions Christopher Dean and Jayne Torvill, who have both been on the show since the start. Willoughby left This Morning in October 2023, leading to speculation she may also quit Dancing on Ice. But ITV later announced she would continue to host the show, and she returned for the 2024 series alongside Mulhern. Willoughby and Mulhern first worked together on children's show Ministry of Mayhem in the mid-noughties. The show was later titled Holly & Stephen's Saturday Showdown. They also briefly hosted the skating competition together in 2022 after Schofield tested positive for Covid-19.
