content: |-
  Rugby league star runs day two of ultra-marathon challenge in Cardiff, as supporters cheer him on.

  Kevin Sinfield and his support crew started the ultra-marathon from Cardiff's Principality Stadium

  People in Cardiff have been cheering on rugby league star Kevin Sinfield on his latest challenge to support people with motor neurone disease (MND).

  He has raised millions for charities since ex-Leeds teammate Rob Burrow was diagnosed with the condition in 2019.

  Saturday marks the second day of Sinfield's challenge, running an ultra-marathon each day for seven days in seven cities.

  He said he had received an "absolutely awesome welcome" in Cardiff.

  Sinfield and his team are due to finish on the pitch at the Arms Park at half time during the United Rugby Championship derby game between Cardiff and Scarlets.

