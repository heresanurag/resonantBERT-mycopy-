  Saturday's route of the 7 in 7 in 7 Challenge began at the Principality Stadium before heading to Whitchurch and then returning through Victoria Park, passing Cardiff City Stadium and Cardiff Bay, before finishing at the Arms Park.

  Up to 100 people from the MND community were invited to share a mile run with him at Bute Park.

  Rugby league star Kevin Sinfield (right) has raised millions for charities since his friend and former teammate Rub Burrow (left) was diagnosed with MND

  Kate, whose brother Sam died 11 years ago with MND, said she wanted to take part in the invitation-only "extra mile" to thank Sinfield for his efforts.

  "People hadn't heard about it [MND] when my brother died," she said.

  "I will do anything I can to find a cure, raise money and raise awareness."

  It moves to Birmingham on Sunday followed by Edinburgh, Dublin and Brighton, before ending with a race from Twickenham Stadium to the Mall in London.
