  UK ambassador to Italy Edward Llewellyn says survivors described 'distressing' situation

  The UK ambassador to Italy, Edward Llewellyn, told the BBC that he had spoken to most of the British survivors of the Sicily yacht sinking.

  He said he had heard from them of the "desperately sad and distressing situation they all found themselves in" and said he was working with the Italian authorities to provide help and support to those rescued.
