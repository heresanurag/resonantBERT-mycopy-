title: Man arrested after 'wrong way' fatal crash on East Kilbride expressway - BBC
  News
date: '2018-11-10'
section: Glasgow & West Scotland
url: http://www.bbc.co.uk/news/uk-scotland-glasgow-west-46162882
content: |-
  Police said the car involved appeared to have been travelling in the wrong direction on the East Kilbride expressway.

  The road has been closed at the scene

  A motorcyclist has died in a crash with a car which is thought to have been travelling in the wrong direction.

  The incident happened on the A725 East Kilbride expressway at about 06:45. The man on the motorbike, which caught fire, was pronounced dead at the scene.

  The car driver was arrested and taken to Hairmyres Hospital for treatment.

  The A725 was closed in both directions for a number of hours but has since reopened. Anyone who witnessed the crash is asked to contact police.

