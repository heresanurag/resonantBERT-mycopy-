title: Congressman Mike Rogers physically restrained over Speaker vote - BBC News
date: '2023-01-08'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-64195940
content: |-
  Mike Rogers dramatically confronts a fellow Republican after 14 rounds of voting for Kevin McCarthy.

  This was the dramatic moment when tensions flared on the floor of the US House of Representatives - after 14 rounds of voting for a new Speaker.

  Lawmaker Mike Rogers - a supporter of Kevin McCarthy as Speaker - had to be physically restrained as he bellowed and jabbed his finger at a fellow Republican who was not supporting Mr McCarthy.

  Read more about the moment Mr McCarthy was finally elected.
