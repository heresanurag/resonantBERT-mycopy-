title: 'Hackney shooting: Woman in life-threatening condition - BBC News'
date: '2020-11-23'
section: London
url: http://www.bbc.co.uk/news/uk-england-london-55039040
content: |-
  The 32-year-old woman was an "innocent bystander", the Metropolitan Police believes.

  A police cordon was put in place around Westgate Street in Hackney

  A woman is in a life-threatening condition in hospital after being shot in a London street.

  The woman, 32, was found with wounded on Westgate Street, Hackney, at 20:52 GMT on Sunday.

  Police said the victim was "an innocent bystander". She was treated at the scene before being taken to hospital. Her next of kin has been informed.

  The Met Police's specialist gang crime unit is investigating. There have been no arrests.

  Det Insp Matt Webb, said: "We have been told that the area was busy at the time of the shooting.

  "I am confident that someone has information that will help our investigation.

  "At this early stage, we believe that the victim was an innocent bystander."

  Earlier on Sunday, a man in his 20s was stabbed to death in south London.

  He was pronounced dead at Ramillies Close, Brixton Hill, just before 18:00.

  Officers are trying to trace his next of kin. No arrests have been made, the Metropolitan Police said.

  On Sunday afternoon a man was knifed to death in Kensal Green, north-west London.

  A man in his 50s has been arrested in connection with the death and remains in police custody, but no details about the victim have been released.

