title: 'PMQs: Boris Johnson faces MPs'' questions - BBC News'
date: '2020-02-05'
section: Parliaments
url: http://www.bbc.co.uk/news/live/uk-politics-parliaments-51386144
content: |-
  Boris Johnson answers questions from Labour leader Jeremy Corbyn and backbench MPs.

  PMQs ends but shadow women and equalities minister Dawn Butler raises a point of order relating to Nadia Whittome's question (see post timed at 12:26).

  She says the claims that everybody on a deportation flight to Jamaica - due to leave next week - are criminals "seems not to be true".

  Specifically she refers to one of her constituents who is due to be on the flight. She argues that he was convicted "under the now unlawful" joint enterprise rule and later released.

  She adds that the wife of this constituent fears the stress of the situation will kill him.

  Speaker Sir Lindsay Hoyle says the MP knows it is not a point of order but adds "I am sure the government frontbench has heard what was said."
