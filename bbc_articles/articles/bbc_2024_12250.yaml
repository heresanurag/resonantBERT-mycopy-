title: Search for British teenager Jay Slater missing in Tenerife - BBC News
date: '2024-06-18'
section: Lancashire
url: http://www.bbc.co.uk/news/articles/c511v9d7g2vo
content: |-
  Jay Slater was last heard from at 08:00 BST on Monday 17 June.

  Jay Slater called his friend to say he was lost, had 1% battery and needed water

  Search dogs and mountain rescue teams have joined the search for a 19-year-old British man missing in Tenerife, according to his mother. Apprentice bricklayer Jay Slater, from Oswaldtwistle in Lancashire, was last heard from at around 08:00 BST on Monday. His friend Lucy - who he had gone to the island with to attend a music festival - said he had called her to say he was lost, needed a drink of water and had 1% battery on his phone. Mr Slater’s phone then cut off, with his last known location showing as the mountainous Rural de Teno national park in the north west of the island.

  A poster shared by the family and friends of Jay Slater showing his last known location

  He has not been heard from since. His worried mum Debbie Duncan, who has flown to Tenerife with her other son, told the BBC the Spanish authorities have deployed mountain rescue and dog units. She said: "It's absolutely horrible. There's been nothing, something has happened." Lucy, who travelled to the island with Mr Slater to attend the NRG music festival, said he had gone to stay with some people he had met on the holiday. However she said Mr Slater seemingly did not realise how far away they were from where he was staying, and set out on Monday morning to walk home. She told the BBC she had spent hours on Monday and Tuesday looking for him. "The area is so big," she said. A spokesperson for the Foreign Office told the BBC: "We are supporting the family of a British man who has been reported missing in Spain and are in contact with the local authorities."
