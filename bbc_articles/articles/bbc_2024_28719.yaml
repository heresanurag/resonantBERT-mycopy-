title: Coventry baby died in 'sudden and unanticipated' dog attack - BBC News
date: '2024-11-21'
section: Coventry & Warwickshire
url: http://www.bbc.co.uk/news/articles/c4g7ydk492yo
content: |-
  Seven-month-old Elle Doherty suffered a fatal head injury after she brushed against the family's 31kg dog.

  Seven-month-old Elle Doherty died on 16 June, an hour after being attacked by her family's pet dog

  A seven-month-old baby who was attacked by her family's pet dog, died after she suffered a "catastrophic" head injury, an inquest has heard. Elle Doherty was on the floor, near her parents, when the 31kg Belgian Malinois made a "sudden and unanticipated" attack, Coventry Coroner's Court heard. Area coroner Delroy Henry concluded the attack at the family home in Coundon on 16 June lasted "less than a second" as the dog, called Zeus, was immediately pulled away. Elle suffered skull fractures and a cardiac arrest, and was pronounced dead in hospital an hour after the attack.

  Her parents did not attend the inquest hearing after expressing what Mr Henry said was a "wholly understandable" wish to be excused. A series of freeze-frame CCTV images recorded from an indoor security camera at the family's home, showed the couple's immediate response to protect their daughter. Commenting on the stills, Det Insp Anthony Hibbert agreed with Mr Henry's suggestions that the incident "transpired within a second or less" and that both parents "immediately reacted to this situation by removing Zeus from the equation" and taking hold of both the dog and Elle. Det Insp Hibbert told the inquest: "It appears from when you watch the footage, maybe baby Elle slightly leant on Zeus and that is when Zeus attacks baby Elle."

  In a written statement, Mr Doherty said the pet had been acquired from a breeder in Gloucestershire in October 2020 and was "good around people and other dogs". The inquest heard a dog-handler was called to the scene and used a sedation dart to remove Zeus from the garden. The dog was taken to a vet and put down on the same day. Bringing the inquest to a close, Mr Henry said: "This is certainly a tragic incident - a family changed forever. "I really don't think there are any words that I could say to console the family of Elle save to reiterate that my heart goes out to Elle's parents and family."

