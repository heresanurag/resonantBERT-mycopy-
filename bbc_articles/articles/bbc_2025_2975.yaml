title: Stolen dog reunited with Norfolk owners after seven years - BBC News
date: '2025-02-08'
section: Norfolk
url: http://www.bbc.co.uk/news/articles/c4gp5ygggxeo
content: |-
  Daisy's owners speak of their joy as the RSPCA finds the Labrador 200 miles away after being stolen.

  Stolen dog reunited with owners after seven years

  Daisy the Labrador was taken from her garden in November 2017

  A couple who "never gave up hope" after their dog was stolen more than seven years ago said they were "so, so grateful" to the RSPCA for reuniting them. Daisy the Labrador was abducted from her Norfolk garden in November 2017, sparking press appeals and a petition to government. An RSPCA inspector found 13-year-old Daisy more than 200 miles away in Somerset on Sunday during a routine investigation, and checked her microchip. Owner Rita Potter spoke of her joy at getting her dog back, adding: "We kept a photograph on the mantlepiece and would look at it every day thinking of her, and where she might be."

  Rita and Philip Potter never gave up hope of finding their dog Daisy

  Mrs Potter and her husband Philip struggled to hold back tears as Daisy returned to her home in Old Buckenham. "It is an absolute dream come true that the RSPCA found her and returned her to us - where she belongs - we are so, so grateful," said Mrs Potter.

  RSPCA inspector Kim Walters (left), pictured with colleague Andy Cook, was able to bring the dog back to Norfolk

  Daisy's theft made news headlines in 2017, external after witnesses spotted her being bundled into a truck by suspected 'backyard breeders', who make profit out of breeding animals and have little care for their welfare. Police investigated but the vehicle could not be traced. Mr and Mrs Potter took part in several press and social media appeals, with support from actor Tom Hardy who shared their post. They also started a petition urging the government to do more to tackle pet theft, which attracted 100,000 signatures. Last year the Pet Abduction Bill was passed.

  The Potter family have been delighted to have Daisy back

  RSPCA inspector Kim Walters rushed Daisy to a vet in Weston-Super-Mare on Sunday, after becoming concerned about her condition. Her owner - who claimed he had only had the dog for a few years - agreed to sign her over into the care of the animal welfare charity. A microchip scan revealed she was stolen and gave contact details for Mr and Mrs Potter. Ms Walters said: "They were obviously shocked - but elated at the same time. "I was a bit choked from listening to them, and clearly how much they loved her, so it was great telling them that we could get her back home soon." Andy Cook, behavioural welfare adviser for the charity, said: "It seems Daisy has been used for 'backyard breeding' and she has a number of mammary masses, she has slight hip dysplasia and her coat was quite dirty. "She really is the sweetest girl and will wag her tail whenever she sees you, but since she was stolen it is clear she has had a hard life." Mrs Potter said: "We know she is elderly now and has health issues, but whatever time she has left she will now be surrounded by lots of love and attention."

