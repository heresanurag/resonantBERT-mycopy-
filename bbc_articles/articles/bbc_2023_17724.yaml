title: 'Florida: Pilot rescued after plane crashes into Everglades - BBC News'
date: '2023-11-01'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-67284282
content: |-
  Video shows the man sitting on the plane's wing waiting for help, before helicopter arrives to airlift him to hospital.

  A pilot has been rescued after spending nine hours in Florida's Everglades after his small plane crashed.

  The Florida Everglades are the only waters where man-eating crocodiles share the same space as alligators.

  Video shared by Miami-Dade Fire Rescue shows the man sitting on the plane's wing, while waiting to be rescued, before a helicopter came to his aid.

  The man was taken to hospital and had minor injuries.
