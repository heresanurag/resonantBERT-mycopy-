  Actor arrested by police on set of TV show Rivals

  A man (not pictured) was arrested on the set of TV show Rivals

  A supporting actor has been arrested on a set while filming the TV show Rivals, the BBC understands. Nigel Adams, 45, was arrested by Avon and Somerset Police at Berkeley Castle in Gloucestershire, where he was filming a scene for the TV show. Mr Adams, of Weston-super-Mare, is accused of assaulting a woman at an address in the coastal town on 31 May and appeared at Bristol Magistrates Court on 6 June. He was released on conditional bail and is due to attend Bristol Crown Court on 7 July. A spokesperson for Happy Prince, the production company for Rivals, said: "On 4 June, the police visited the set regarding an ­unrelated matter involving a supporting artist."

  Rivals is a Disney+ show, starring David Tennant, Danny Dyer and Emily Atack and based on the Jilly Cooper novel. The production company added: "Production co-operated with the police. We do not have any further information as it is not connected to Rivals or to our production."

