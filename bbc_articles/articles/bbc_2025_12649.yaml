content: |-
  No injuries were reported after the aircraft abruptly turned on its side while landing in Clay Township.

  A helicopter flipped and crashed near a waterfront restaurant in Clay Township, Michigan on Sunday. Video captured by an eyewitness shows the aircraft trying to land when it abruptly turns on its side and crashes.

  No injuries were reported and police say the cause of the crash is under investigation.
