title: 70 Royal Python snakes neglected in a home rescued by centre - BBC News
date: '2025-03-12'
section: North Yorkshire
url: http://www.bbc.co.uk/news/articles/cy05pw15xnjo
content: |-
  Live snakes were kept in enclosures with dead ones, whilst bags of pythons were found in the freezer

  Two of the 70 snakes found in the house in Knaresborough

  Seventy "neglected" snakes have been rescued from a house where they were being kept in poor conditions after their owner's relationship ended. Volunteers from Knaresborough Exotic Rescue were called to the property by a woman whose partner had left the royal pythons behind when they broke up. Daniel Holmes, from the reptile sanctuary, said three serpents were found dead in an enclosure and the bodies of other deceased pythons were discovered in the freezer. He said: "I've been doing this for many years and this was the worst condition I have ever seen snakes kept in."

  The snakes were kept in a racking system used by breeders

  The owner, who had tried breeding the reptiles, originally told his girlfriend there were only six of the creatures, but Mr Holmes soon realised there were around 50 kept in drawers and 20 that were loose inside the property. He thought the man had "just given up" and abandoned the breeding operation. Some of the drawers the pythons were kept in were too small for their needs and a number of males had escaped to try and find females to mate with. "Now we're probably going to have pregnant snakes as well. They've all got mites, which is a bit like fleas to dogs, so they all need treating. There is one that needs vet care as well," he said.

  Mr Holmes said the baby snakes were in the worst condition because their enclosure was overheating. "They've dried out so now we have to rehydrate them and get them eating because they're severely underweight." He said it was "sickening" and "tragic" to see. "I took two volunteers with me and it's the first time one of them came with us. He's a young lad and, if I'd have known the state the snakes would be in, I wouldn't have taken him with me because he got very upset and started crying."

  He added it would be "difficult" to rehome the pythons because of the expense of the specialist enclosures needed for them, but said Cheshire Reptile Rescue had offered to take five of them and also donated a racking system for Mr Holmes to house the remaining snakes in. An animal rescue in Sunderland has donated a freezer of food for the reptiles. Mr Holmes has also gathered information about the incident to hand over to the RSPCA for further investigation.
  • None Royal pythons, also known as ball pythons, are native to West and Central Africa and live in grassland, shrubland and open forests. They are the smallest African python species but can grow to a length of 182cm (6ft).
  • None They are mainly active at night and coil themselves into a tight ball when threatened. They are popular as pets because they do not often bite.
  • None Their diet consists mostly of small rodents and birds.

