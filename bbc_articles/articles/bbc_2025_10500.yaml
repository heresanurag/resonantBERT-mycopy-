title: 'Elizabeth Tamilore Odunsi: British nursing student killed in Texas days before
  graduation - BBC News'
date: '2025-05-03'
section: London
url: http://www.bbc.co.uk/news/articles/cql6n0gk530o
content: |-
  Londoner Elizabeth Tamilore Odunsi, 23, was discovered with multiple stab wounds at her flat in Houston.

  A British nursing student studying in the US has been found stabbed to death in an apartment in Houston, Texas, just days before she was due to graduate, say police and her family. Elizabeth Tamilore Odunsi, 23, was discovered on 26 April by officers who had gone to her flat to check on her, Houston police said. Police said she had multiple stab wounds. A man was found in another room with at least one stab wound and he was taken to hospital in a critical condition. Ms Odunsi had a TikTok account, Tamidollars, where she posted to her 30,000 followers about her experiences as a Briton living in the US.

  In her last post, from 21 April, she described how she was ready to graduate in two weeks, and had already booked a holiday. An online fundraiser to repatriate her remains to the UK for burial has gathered more than £54,000 ($71,000). "Tami was a beautiful soul, full of light, ambition, and kindness," her sister, Georgina Odunsi, wrote on GoFundMe. "She moved from the UK to the United States to pursue her dream of becoming a nurse, dedicating herself to a life of care and service," she continued. "Tragically, Tami was brutally murdered just days before she was set to graduate from university - an unimaginable loss at a moment that should have marked the beginning of a bright and promising future," her sister wrote. According to a Houston Police Department statement, officers were called to the student housing complex at 15:50 local time last Saturday. Officers knocked on the door, but there was no answer. They saw blood on a rear concrete patio and entered the apartment. "The female victim was discovered on the kitchen floor with multiple stab wounds. A male was discovered in a bedroom with at least one stab wound," detectives wrote. Ms Odunsi was pronounced dead at the scene. Texas Woman's University, where she was studying, did not immediately respond to a request for comment from BBC News. In a post, external last year, Ms Odunsi described how she preferred living in the US to the UK, telling her TikTok followers that "the vibes are just so much better here". In a more recent post, she shared video of the cap and gown she intended to wear to graduation, with the caption "3 more weeks". In an earlier post, she shared a video of herself studying with the caption: "She doesn't know it yet, but a year from now all her hard work will pay off, she'll be working as a nurse in her dream speciality." Ms Odunsi added that she hoped to have a "stronger relationship with Christ, living a quiet and peaceful life".
