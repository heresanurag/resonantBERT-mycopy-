id: bbc_2021_9623
title: 'Afghanistan: Female presenters back on Tolo News after Taliban takeover -
  BBC News'
date: '2021-08-17'
section: General
url: http://www.bbc.co.uk/news/world-asia-58241000
content: |-
  Women had been noticeably absent from major news outlets after the Taliban took control of Afghanistan.

  Female presenters have returned to the screen at a major Afghan news outlet, after briefly being taken off air as the Taliban took over Afghanistan.

  Tolo News said their broadcasts had returned to "normal".

  It comes as questions are asked over how women's rights will look under Taliban rule.
