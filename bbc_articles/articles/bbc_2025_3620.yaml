title: Norfolk and Cambridgeshire reports of loud explosion-like sound - BBC News
date: '2025-03-13'
section: General
url: http://www.bbc.co.uk/news/videos/cq5zlppnz97o
content: |-
  One resident says his whole house shook when the noise hit.

  Mystery surrounds a loud explosion-like sound heard across parts of the East of England that was captured on video.

  Stuart Mulholland, 59, who has lived in the village of Christchurch near March, Cambridgeshire, for the past 25 years, captured the noise on his home's CCTV on Monday at about 12:33 GMT.

  "Me and my wife were just in the study at the time and we actually thought a lorry had driven into the house because the whole house just shook," he told the BBC.

  "My wife then went outside on to the driveway and saw everyone else coming out of their houses into the road... we just guessed it must have been a sonic boom."

  Social media users also reported hearing the noise in Downham Market, Norfolk, but the Ministry of Defence said it had no reports of a sonic boom.

  Norfolk Police said it had received a report of a loud explosion-like sound.
