  The BBC's Katy Watson reports from Wellington on why tens of thousands have taken to the streets.

  More than 35,000 people in New Zealand have joined a hīkoi, or peaceful protest, over a bill seeking to a reinterpret a historic Māori treaty.

  The BBC's Katy Watson explains from Wellington why the bill has caused such controversy.
