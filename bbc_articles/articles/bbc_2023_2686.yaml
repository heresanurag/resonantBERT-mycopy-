title: Iran dancing couple given 10-year jail sentence - BBC News
date: '2023-02-01'
section: Middle East
url: http://www.bbc.co.uk/news/world-middle-east-64470506
content: |-
  The pair, both in their early 20s, were reportedly convicted for promoting corruption and propaganda.

