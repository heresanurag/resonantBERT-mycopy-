title: 'Amsterdam red light district: Hologram aims to solve sex worker''s murder
  - BBC News'
date: '2024-11-11'
section: Europe
url: http://www.bbc.co.uk/news/articles/cx28k2mjmxeo
content: |-
  The fatal stabbing of a Hungarian teenager, killed shortly after she gave birth, has baffled police for 15 years.

  The hologram represents Betty Szabo, who was murdered in Amsterdam in 2009

  Dressed in faded denim hotpants, a leopard-print bra, with a tattoo snaking up her stomach and across her chest, the 3D computer-generated image reaches out and appears to knock on the window to attract attention. She leans forward, breathes on the glass and writes the word "help". The hologram is designed to represent Bernadette "Betty" Szabo, a 19-year-old woman from Hungary who was murdered a few months after giving birth in 2009. Her fatal stabbing has baffled police for 15 years. Dutch cold case detectives are using the innovative technology for the first time in an effort to solve the case. The murdered teenager’s image is being projected from behind a window, alongside hundreds of young women who continue to make a living in this notoriously risky industry. Investigators hope the lifelike hologram will help jog memories and draw attention to the unsolved murder. Until now, Betty's killer has eluded justice and cold case detective Anne Dreijer-Heemskerk is determined to change that: “A young woman, only 19, taken from life in such a horrific way.” Szabo had a tough life and her story was one of hardship and resilience, according to the detective.

