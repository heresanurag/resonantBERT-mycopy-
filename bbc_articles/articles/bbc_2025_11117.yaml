title: Thousands evacuate from fast-moving fires in Canada - BBC News
date: '2025-06-01'
section: US & Canada
url: http://www.bbc.co.uk/news/articles/cz9yv2g07p0o
content: |-
  A military aircraft and helicopters are being used to evacuate some residents in remote areas.

  Wildfire smoke above Highway 97, north of the Buckinghorse River near Trutch, British Columbia.

  Some 17,000 people have evacuated the Canadian province of Manitoba as fast-moving wildfires move across parts of the country. A military aircraft and helicopters have been used to evacuate some residents in remote areas as firefighters face growing flames. Hot and dry weather is expected in the coming days. Dense smoke from the fires - of which there are more than 188 according to officials - has spread across Canada and into parts of the US. Both Saskatchewan and Manitoba have declared states of emergency for the next month and have asked for international help in fighting the fires.

