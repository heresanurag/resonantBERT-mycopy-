content: |-
  All 58 recommendations of the Grenfell Tower public inquiry will be enacted, government says.

  Seven organisations to be investigated over Grenfell fire

  The 2017 fire killed 72 people in the west London tower block

  Seven organisations criticised in wake of the Grenfell Tower disaster could be banned from bidding for public contracts, the government has said. Cladding and insulation firms are among those set to be investigated, Housing Secretary Angela Rayner said, as she announced all recommendations of a public inquiry into the fire will be met. "The bereaved and the survivors and members of the Grenfell community are still waiting for the justice they need and deserve," Rayner said, "and justice must be done". The government said it is already working on a list of reforms to building safety which came from the cladding crisis following Grenfell, and that it will begin implementing the changes from 2028.

  The fire in the west London tower block killed 72 people in 2017. The inquiry found all their deaths were avoidable. It concluded that the fire was the result of a chain of failures by governments, "dishonest" companies and the fire service, which lacked a strategy for dealing with high rise cladding fires. Rayner, who is also deputy prime minister, said the Grenfell Inquiry had uncovered "serial incompetence and negligence, complacency and inaction, and blatant dishonesty and greed" which led to the fire. She said the government was acting on its findings and would take "tough action" to reform the system and "ensure no community will ever have to face a tragedy like Grenfell ever again". "That means greater accountability, stronger regulation, and putting residents at the heart of decision-making," she added, saying it was owed "to the memory of those who lost their lives". Ed Daffarn, who survived the fire, told the BBC the announcement left him feeling frustrated, adding the government's intentions "may be good but the wait is torturous".
  • None Grenfell Tower to be taken down, government confirms Rayner said three of the organisations set to be investigated - manufacturing companies Arconic, Kingspan, and Celotex - were found by the inquiry to have acted with "systemic dishonesty". "Their disgraceful, mercenary behaviour put profit before people and exploited the regulatory regime to evade accountability with fatal consequences." She also said the organisations that failed "included the government and regulators". The department she now leads, she said, "failed to act on known risks and ignored, delayed, or disregarded matters affecting the safety of life". The full list of seven companies set to be investigated for professional misconduct is:
  • None Saint-Gobain Construction Products UK Limited - in relation to its then ownership of insulation firm Celotex Limited They will be investigated using powers under the Procurement Act passed in 2023. The government's role in failing to regulate safety in the construction industry became apparent early in the Grenfell inquiry, prompting an apology for "past failures" during the hearings. The government will provide an update on its work to meet the inquiry's recommendations every three months.

  Rayner said the Grenfell Inquiry had exposed "the shocking industry behaviour and wider failures that led to the fire"

  The announcement is part of a continuing effort to strengthen the regulations and oversight of construction. On Wednesday, the government published a new Construction Products Reform Green Paper setting out possible penalties for companies found to have breached safety obligations, such as fines and powers to limit individuals being involved in the industry. But officials will not say if these will be applied retrospectively. The failures which led to the Grenfell fire happened in the years before its refurbishment in 2016. The government has backed a new "Hillsborough Law", which would create a legal duty for public authorities to tell the truth and be transparent. Ministers are also promising a new single construction regulator, created through merging two existing bodies, will improve standards in the industry.

  Love, loss and a need for answers. Hear from survivors of the Grenfell Tower fire in London as they remember the fire which killed 72 people.

  Sir Martin Moore-Bick, chairman of the Grenfell Inquiry, recommended there should be just one regulatory body

  Mr Daffarn, a member of the Grenfell United campaign group told BBC Radio 5 Live: "The report is full of recommendations for further consultations, further reviews - we are eight years on from the tragedy. "It feels like we are just in this carousel of waiting, waiting for justice." Grenfell Next of Kin, which represents some of the bereaved, said it welcomed the measures being put in place but that these "should have been basic requirements for a developed country such as ours". The group said it was concerned that there so far had been no charges related to the fire, and claimed the "immense" delay was "primarily because the inquiry was allowed to overshadow the necessary criminal process". The Grenfell disaster was caused by the use of highly flammable cladding backed by insulation which also contributed to the spread of the fire. Manufacturers either concealed evidence of the risks their products posed or made false and misleading claims, the inquiry found. The London Fire Brigade failed to respond to the rapid spread of the fire due to poor training and a lack of guidance about how to deal with flammable cladding. The government will seek views about its plan for a new College of Fire and Rescue later this year to "improve the training and professionalism of firefighters". It will also bring in certification for fire risk assessors, after the inquiry found Grenfell was inspected by an assessor who lacked the necessary training. The Ministry of Housing, Communities and Local Government (MHCLG) has taken over responsibility for fire safety from the Home Office and says it will support both the continuing police investigation and plans for a memorial which will replace the tower once it is dismantled in two years' time.
