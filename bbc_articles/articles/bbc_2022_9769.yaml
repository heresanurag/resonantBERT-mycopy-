  Sajid Javid and Rehman Chishti withdrew from the contest just minutes before the deadline.

  'Half the audience will not be persuadable' at hustings

  At the hustings - that begin at 19:00 BST in Parliament - roughly half of the audience will not be persuadable because they've already said who they're backing. Others like Priti Patel and Sajid Javid have said they are yet to make up their minds. But only part of their decision will be based on the performance this evening. Some already have in mind who they might be potentially backing but if someone was to come in with a better job offer dependent on their support, that might persuade them. It's not entirely going to be a merit-based process. Twelve minutes - you probably spend longer looking for a new car or new house than choosing a new prime minister. The hustings may be crucial for a few MPs choosing how to vote - but there will be other considerations, including personal ones, at play. Worth remembering too that we haven't had all of the candidates' campaign launches yet. Penny Mordaunt is due to hold hers tomorrow.
