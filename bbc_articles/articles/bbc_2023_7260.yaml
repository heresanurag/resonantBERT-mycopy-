title: Prince Louis drives digger with Prince of Wales - BBC News
date: '2023-05-08'
section: General
url: http://www.bbc.co.uk/news/uk-65523273
content: |-
  The Prince and Princess of Wales have been joining the Big Help Out with their three children.

  Prince George, Princess Charlotte and Prince Louis joined their parents helping scouts in Slough as part of the Big Help Out.

  The initiative, to celebrate the King Charles III's Coronation, aims to encourage people to take part in volunteering projects.
