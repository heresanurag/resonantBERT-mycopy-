title: Who is in charge of Iran? - BBC News
date: '2024-05-20'
section: Middle East
url: http://www.bbc.co.uk/news/world-middle-east-57260831
content: |-
  How does President Ebrahim Raisi's sudden death impact how the country is run?

  Iran's constitution is straightforward when it comes to a president being incapable of executing his duties due to illness, death, or impeachment and removal by parliament.

  Following Mr Raisi's death, Supreme Leader Ayatollah Ali Khamenei appointed First Vice-President Mohammad Mokhber to run the affairs of the country.

  Mr Mokhber will organise the election for a new president - working with the heads of parliament and the judiciary - to be held within 50 days.

  At the last election, all serious challengers to the president were barred from running, clearing the path for Mr Raisi to enter office with the lowest number of voters.

  The majority boycotted what they saw as a fixed election.
