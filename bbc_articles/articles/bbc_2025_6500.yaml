  Who has made Troy's Premier League team of the week?

  After every round of Premier League matches this season, BBC football pundit Troy Deeney will give you his team and manager of the Week. Here are this week's choices. Do you agree? Give us your thoughts using the comments form at the bottom of this page.

  Kepa Arrizabalaga (Bournemouth): He didn't do anything extraordinary in Monday's win over Fulham but he did all of the simple things really well. Came and collected crosses really well, made five or six vital saves, and in the time that Chelsea are desperate for a goalkeeper - who knew they loaned out their best one?

  Ben Johnson (Ipswich): Got his goal. He's been playing a bit further forward for Ipswich but at right-back this week we were struggling so I'm going to put him after their draw at Chelsea. Virgil van Dijk (Liverpool): The leader. The man who says to everybody 'we are going to win the league and we are going to do it our way'. Puts a load of pressure on his team-mates, holds them accountable and then pops up with a fantastic winning goal v West Ham. James Tarkowski (Everton): Tarkowski was excellent for Everton, especially when you look at how he dealt with Chris Wood. Just the intelligent play to handle anything thrown his way from Nottingham Forest. To stop Forest scoring is a massive testament to his game and Everton's defence. Rayan Ait-Nouri (Wolves): I thought he was the player of the weekend. In the week that Wolves - not mathematically, but fundamentally - are staying up, they could have taken their foot off the gas and relaxed. He went better, Wolves got better. A goal and an assist. He was excellent marauding down that left-hand side and caused Spurs no end of trouble.

  Sandro Tonali (Newcastle): Since he has come back from his ban, the Italian has been frightening. He has been looking like one of the best midfielders in European football. He has everything to his game - he can run, can score, can tackle and his run and finish for the goal was excellent against Manchester United. Tyler Adams (Bournemouth): This is someone who won't get a lot of credit but he does some ugly stuff really well. Gets after his team, puts loads of pressure on the opposition, makes all the tackles, breaks everything up and gets zero credit. Kevin de Bruyne (Manchester City): The man, the myth, the legend - Mr Kevin de Bruyne. It's so good of a performance that we have become accustomed to how he delivers on a regular basis. One of the best midfielders the Premier League has ever seen and unfortunately I think we're losing him at a time where I think he still has loads to offer.

  Stephy Mavididi (Leicester): People are going to go 'huh?'. Yes, he plays for Leicester. He scored his goal, he was excellent. Delivered a lot of attacking impetus going forward and it was probably his best performance for Leicester all season. Unfortunately it's too little too late at this moment in time. Joao Pedro (Brighton): People are going to say 'he scored two penalties' but he scored two excellent penalties in a game that they were a little bit off. Maybe that was because Leicester were better in terms of wanting the game more. Pedro showed class and quality over that. Harvey Barnes (Newcastle): Everyone saw how well he did. He stepped up for Newcastle with Anthony Gordon being out. Two good goals, really dynamic, driving past people. Goals always change games and Barnes was excellent.

  Pep Guardiola (Manchester City): Having to go first with the early kick-off, Manchester City needed a win and needed to put pressure on that top four against an excellent Crystal Palace team. He delivered a wonderful gameplan and got it all right from a tactical point of view.

