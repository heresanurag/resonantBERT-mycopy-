content: |-
  Dina Asher-Smith wins her third gold medal of the European Championships as she leads Great Britain to victory in the women's 4x100m relay final.

  Last updated on .From the section Athletics

  Coverage: Live across BBC TV, BBC Radio 5 live and sports extra plus the BBC Sport website with further coverage on BBC iPlayer, Red Button, Connected TVs and mobile app

  Dina Asher-Smith won her third gold medal of the European Championships as she led Great Britain to victory in the women's 4x100m relay final in Berlin.

  The 100m and 200m champion ran a superb final leg to pass Germany, Switzerland and Netherlands in the final 30 metres for a fitting end to her campaign.

  Britain then won the men's 4x100m relay in the final event of the competition.

  Laura Muir took 1500m gold for her first major outdoor title with team-mate Laura Weightman getting bronze.

  The five medals on Sunday meant Great Britain finished top of the athletics table with 18 - seven gold, five silver and six bronze.

  They finished second in the overall table, behind Russia, in these inaugural multi-sports championships, winning 74 medals - 26 gold, 26 silver and 22 bronze.

  Russian team members were awarded a trophy for topping the medal table at the closing celebrations in George Square, Glasgow.
