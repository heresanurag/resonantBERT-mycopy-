title: 'Johnny Marr: I said no to 2025 Smiths reunion tour offer - BBC News'
date: '2024-09-18'
section: Manchester
url: http://www.bbc.co.uk/news/articles/clyl2ppg0l7o
content: |-
  The Smiths guitarist responds to Morrissey's claims he ignored a lucrative offer to reunite.

  I said no to Smiths reunion tour - Johnny Marr

  Marr said he turned down the offer of a global Smiths tour

  Johnny Marr has denied former bandmate Morrissey's claims he ignored the offer of a lucrative Smiths reunion tour, adding he simply "said no". The guitarist and co-songwriter of the Manchester band, which split in 1987, confirmed the refusal in a statement in response to a trademark row between the two. It comes after Morrissey said he had agreed to an offer to reunite for a 2025 global tour but Marr had failed to respond. "I didn't ignore the offer - I said no," Marr said.

  In a statement released on Tuesday by his management team, the 60-year-old also said he took it upon himself to trademark the Smiths name to "protect the legacy" of the band. The move was to prevent third parties from profiting on the name, and was done made on "behalf of both myself and my former bandmates". The comments came in a response Morrissey's claim the guitarist had applied "for 100% trademark rights... without any consultation" with the frontman.

  Morrissey claimed Marr had trademarked the band's name without consulting him

  The Manchester band had a string of Top 40 hits in the 1980s with songs including Heaven Knows I'm Miserable Now, This Charming Man and How Soon Is Now?, before their split. Marr's management said in the statement they discovered the Smiths trademark was not owned by the band after a third party attempted to use it in 2018. "Marr reached out to Morrissey, via his representatives, to work together in protecting The Smiths' name", they said "A failure to respond led Marr to register the trademark himself." An agreement was later reached with Morrissey's lawyers that the trademark be held for the mutual benefit of the pair, the statement continued. "As a gesture of goodwill, in January 2024, Marr signed an assignment of joint ownership to Morrissey. "Execution of this document still requires Morrissey to sign."

  The Smiths, who formed in 1982, released four albums before an acrimonious split in 1987

  Mike Joyce, the band's drummer, told BBC Radio Manchester he found it odd the trademark and tour spat had played out in the public domain. He said he thought these issues should be dealt with by solicitors and management teams instead, but admitted it was "none of my business". Later in his statement, Marr also denied speculation that a tour is planned with a different frontman for The Smiths, saying: "There are no such plans." He also confirmed that he turned down the chance of doing another greatest hits compilation with Warner Music Group, saying there are already a number in existence.
