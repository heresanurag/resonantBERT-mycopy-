id: bbc_2025_2757
title: UK expels Russian diplomat after British envoy accused of spying - BBC News
date: '2025-02-06'
section: Europe
url: http://www.bbc.co.uk/news/articles/cn8xp5gg04do
content: |-
  The Foreign Office says the move is in response to Moscow expelling a UK diplomat last year.

  A Russian diplomat has been expelled from the UK in the latest escalation of a tit-for-tat spat after Moscow threw out a British official last year. Foreign Secretary David Lammy said action had been taken "following Russia's recent expulsion of a British diplomat" in November. Moscow accused the diplomat of giving false information and spying as grounds for asking him to leave. The government said the UK "will not stand for intimidation of our staff in this way" and that "any further action taken by Russia will be considered an escalation and responded to accordingly".

  Russia's ambassador to the UK Andrey Kelin, who has been in post since 2019, was summoned to the Foreign Office to be informed one of his diplomats was having their accreditation revoked. An accreditation is a recognition by a government of a diplomat's status, and gives them certain immunities depending on rank. "We are unapologetic about protecting our national interests," Lammy said. "My message to Russia is clear - if you take action against us, we will respond." The Russian Foreign Ministry said it intended to retaliate to the expulsion, in a statement given to the state-owned Tass news agency. Moscow revoked the British diplomat's accreditation in November, accusing them of spying and ordering the individual to leave the country within two weeks. Russian state-run news agencies reported that the country's security service FSB had accused the diplomat of providing false information on his documents and carrying out espionage activities. His photo and name was also shared on Russian TV bulletins. At the time, the Foreign Office dismissed Russia's accusations as "baseless" and said it was considering a response. Russia previously said it planned to take further action should the UK respond to its own expulsion. Diplomatic relations between the UK and Russia have worsened since the latter's full-scale invasion of Ukraine in 2022. Since then, expulsions of diplomats have become increasingly common. In September last year, Russia announced that the accreditation of six British diplomats in Moscow had been revoked, requiring them to leave the country. And in May, British diplomat Capt Adrian Coghill was given a week to leave Russia, days after the Russian defence attaché was expelled from London for alleged espionage as an "undeclared military intelligence officer". A number of British politicians and members of the press have also been barred from entering Russia since the war began, including senior government officials and journalists from the BBC, Sky News and Channel 4. Most recently, 30 more people, including Deputy Prime Minister Angela Rayner and other Labour cabinet members, were added to Russia's "stop list". Lammy and Prime Minister Sir Keir Starmer were added to the list in 2022, as was now-Conservative leader Kemi Badenoch.
