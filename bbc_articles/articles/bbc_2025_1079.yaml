  She tells me she arrived at the hospital seven hours earlier. She has already seen a doctor but is now having to wait. Her white hospital bib, tucked into the collar of her grey jumper, is splattered with congealed blood. I ask her if she's with anyone. "No, I've been here on my own," she tells me. "On your own, the whole time?" I ask. "Yes," she says, resigned to her predicament.

  Less than 5ft (1.5m) away in the corridor a man lying on a gurney begins to groan. Islam Iskau, who's 72, is wearing an oxygen mask and is grimacing from pains in his leg. He has been waiting in the corridor for around three hours. His moans and groans grow louder, as he writhes on the gurney. Eventually a friend who is with him manages to find a nurse to get him some painkillers. For patients waiting in the corridor, there is no privacy. Some might argue no dignity either, with their pain and ailments, oxygen bottles and intravenous drips all on public display. Then suddenly, an emergency alarm goes off. A patient in one of the wards is having a seizure. The doctors and nurses on duty, professional as ever, head straight for her bed, at least six or seven people. They need to get her to the resuscitation area fast, to save her life. But they can barely make their way out of the ward, because of all the patients in the corridor. A little later an ambulance drops off a man with mental health problems, who has cut himself in the lower abdomen with a knife. Despite the self-harm and his mental state, the ambulance staff tell the on-duty nurse that the outside mental health assessment service CASS, had refused to intervene, saying the patient wasn't in crisis.

  The duty nurse shakes her head in disbelief, writing down the details. Once again the Royal Free's A&E is being left to carry the can for another agency. Resident doctor Charlie Hall, who's on duty, tells me he comes from a long line of doctors. "It's not the health service I signed up for, at the age of 17," he says. "The access to services, I feel, are creaking for patients and the ability to provide high-quality care is creaking. A lot of patients are very dissatisfied with what's going on, and I don't blame them. We're doing our level best in the hospital to give them the best treatment and the best options, but you can only apologise so much." When our filming is over, we learn that Raymond Dubbery has died on the ward. For just 24 hours, we saw the NHS up close, fighting uphill battles every day.
