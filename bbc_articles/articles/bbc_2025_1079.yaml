  As part of the BBC's special report, Clive Myrie meets the people at the Royal Free Hospital relying on the NHS for care.

  Clive Myrie: What I saw during my 24 hours at a London hospital

  This video can not be played To play this video you need to enable JavaScript in your browser. 'It's going to be a long night': Watch as Clive Myrie finds corridors filled with beds at London hospital

  It's just before 10:00 GMT at the Royal Free Hospital in north London. Raymond Dubbery is 81 and suffering from pneumonia. His hair thinning, he's frail and very thin. The skin hangs from his limbs. Transferred here from his care home, he's not eating much. The hope is he could be discharged soon, but he doesn't like his care home and doesn't want to go back. Dr Khai Lee Cheah, consultant in elderly care, holds his hand. Raymond tells her he wants to live somewhere he'll be happy. "I take your point completely," she tells Raymond. "That your care home should be somewhere to live, and not just somewhere to die." I'm spending 24 hours at the Royal Free for a glimpse of the challenges facing the NHS as it grapples with intense winter pressures.

  Raymond Dubbery was transferred to hospital from his care home

  For patients like Raymond, who has no family, hospital staff have become social workers - a point of human contact at a time when the social care sector is under strain. It's a dilemma for the medical staff, with 15-30% of patients at the Royal Free medically fit to be discharged but unable to go home, for a myriad of reasons. The hospital has its own discharge team - whose job it is to safely get patients out of the door, to free up beds for new admissions. Just under 14,000 people who are medically fit are still in English hospitals and can't go home, through no fault of their own. At the Royal Free London Trust, there are 275 people occupying beds who don't need to, at three major sites. That makes up nearly 20% of all the beds the trust has. Faye Rogers, on the discharge team, has been on the phone with a removals company. She's trying to get someone to visit the home of a patient to shift a wardrobe in the bedroom, to make space for an essential hospital bed. "This is the kind of issue we have to deal with every day," she says. "Sometimes a family member has the keys to a patient's house, and they've gone on holiday. Some patients forget the key code to their front door, so no one can get in. The problems are mundane and routine but make it difficult for people to be discharged and they're a regular occurrence."

  Mid-afternoon is easily the quietest time during our 24 hours at the Royal Free, with some of the ambulance staff we come across cautioning that things will change as day turns to night. And they are right. From around 8pm, more and more patients turn up at A&E, on foot and by ambulance. All the assessment bays where patients are triaged on arrival fill up quickly and are in constant use for the next five hours. That leads to a spillover into the corridors, with patients in wheelchairs, on hospital beds and gurneys filling all the available space. The wards on either side are full too. It's cramped and depressing - but a familiar scene in hospitals right across England. At around 10pm we come across Cathleen Hill who's 86, sitting in a wheelchair among those in the corridor. She has a facial injury and a bloody nose.
