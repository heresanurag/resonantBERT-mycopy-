  In the year to March 2024, 65,913 rape cases were recorded by police in England and Wales (excluding Devon & Cornwall police). Of these cases, just 2.6% have so far resulted in a suspect being charged, or receiving a summons, according to Home Office figures. A spokesperson for the CPS said: “A settlement has been reached with Ms McCrossen-Nethercott, to whom we have apologised unreservedly, and we continue to wish her the very best going forward. “We remain positive about the progress being made and recognise there is still a long way to go to improve outcomes for victims, so more people can come forward and report with confidence.” Jade said she was still waiting to hear from the CPS about the lessons it has learned from her case. She said she hoped her story would empower others to raise their voices. “We must hold these agencies accountable and we've done it now,” she added.

  When unexpected sleepwalking claims turn a rape case on its head, Jade fights back. Filmed over three years, this is the remarkable story of one woman's battle for justice. Will she win? Watch now on BBC iPlayer (UK Only)
