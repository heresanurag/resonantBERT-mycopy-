title: 'Kian Dawson: Derry teenager killed in Quigley’s Point crash - BBC News'
date: '2024-08-25'
section: Europe
url: http://www.bbc.co.uk/news/articles/clywkxd442xo
content: |-
  Kian Dawson from Londonderry died and a man in his 20s is in hospital following a crash on Saturday.

  A 16-year-old boy has died after a single-car crash in Quigley’s Point in County Donegal. The male passenger died at the scene, gardaí (Irish police) have said. He has been named locally as Kian Dawson from the Carnhill area in Londonderry. The driver, a man in his 20s, was taken to the Royal Victoria Hospital in Belfast for treatment of injuries. BBC News NI understands that the driver of the car, who is also from Derry, is in a critical condition. The crash happened on the R240 at Cross at about 23:15 local time on Saturday.

  The road was closed on Sunday morning to allow for an examination of the scene by Garda Forensic Collision Investigators. Gardaí are appealing for any witnesses to contact them.

  In a tribute on social media, the club said: "Our hearts are sore today". "We awoke this morning to the sad news that young Kian Dawson, a player in our 2007 group since the age of 5, had sadly passed after a road traffic accident last night in Donegal," the post said. The statement described Kian and his father as "an integral part" of Don Bosco's FC.

