  The club further described Kian as "the most genuine, well mannered and unassuming young lad", adding he was a credit to both the club and his parents. "Kian will be forever remembered by his coaches, teammates and friends at Don Bosco's. We are also thinking of you all at this heartbreaking time." Club activities, including training and matches, have been called off for the coming week.

  A car was removed from the scene on Sunday afternoon

  At the scene: BBC reporter Kevin Sharkey, in Quigley's Point The crash happened beside a sweeping bend on a country road. The loss of life here last night is the latest in a long line of tragedies on roads in the Inishowen peninsula in recent years. Many of the previous victims have been from local communities. I understand that the young people involved in this tragedy had travelled from across the border. There were poignant scenes as the small car, which hit a bridge, was lifted from the crash site and taken away on the back of a lorry, under garda escort. A heartbreaking outcome just a day after two young friends went for a drive together.

  "Our prayers have to be with them at all times," Terry Crossan says

  Inishowen councillor Terry Crossan said news of the crash was "absolutely heartbreaking". "Out here in Inishowen it has happened so often, time and time again, absolute tragedies... It doesn’t bear thinking about at all," he told BBC News NI. "We've had our fair share [of accidents], all in almost the same sort of general area." The community of Inishowen will be offering their prayers and heartfelt condolences, Mr Crossan added. "This will impact on the whole of the community and whenever the names of the victims begin to emerge it will hit home even harder," he said. "There’s not much that you can say, you just pray for them and hope that they can get through this tragedy." In a separate crash in County Donegal, three people have been taken to hospital following a two-car collision on Sunday morning. It happened at about 09:00 local time at Inver. Gardaí said the road remains closed with local diversions in place.
