title: 'Newspaper headlines: German far right ''big win'' and school ''race hate surge''
  - BBC News'
date: '2024-09-02'
section: The Papers
url: http://www.bbc.co.uk/news/articles/c17g20e9l7ro
content: |-
  A variety of stories lead the papers, including new data about racist incidents involving school pupils.

  Protesters in Israel on Sunday night called for Israeli Prime Minister Benjamin Netanyahu to do more to free hostages held by Hamas

  Photographs of the six Israeli hostages found dead in Gaza make the front pages of The Times, The Guardian and The Financial Times. Their discovery has led to what the Guardian, external calls "an eruption of public outrage" against the Israeli government for the failure to reach a deal to bring the remaining hostages back. Frustration among relatives has, according to the Financial Times, external, become more intense because of the realisation that time is running out for the 101 hostages still being held. The Times, external says protests and the prospect of a general strike are increasing the pressure on Israeli Prime Minister Benjamin Netanyahu. The decision to scrap one-word Ofsted judgements for the state sector in England is described by Metro as a "Grade big U-turn on schools". The Daily Telegraph, external reports that the change has been introduced so swiftly the exact form of the new report cards has not been decided. The paper understands they could be "at a glance" sheets no bigger than A4. "Another week, another win for the unions," says The Sun - adding, in its editorial, external, "teachers have got their way"

  "Germany's far right has first big win since Nazis", is the Times, external' lead on the electoral success for the AfD party in regional elections in Thuringia and Saxony. The Guardian, external says the results have "sent shockwaves through the political landscape". But according to the FT, external, what has happened is a reflection of mounting frustration among many east Germans against a government that they associate with high inflation, economic stagnation, surging energy costs and constant internecine squabbling. The Telegraph reckons , externalOlaf Scholz's days as chancellor are numbered. The Daily Mirror reports, external that almost 60 children a day were suspended from school for racism last year. In all 11,619 pupils were sent home in 2023 - an increase of 25% on the previous 12 months. Campaigners claim impressionable children are repeating what they hear from their parents and right-wing figures in the media. The Department for Education says racism and discrimination has no place in schools. "How Ludicrous!", is the Daily Express' take, external on a claim by the Commons leader that the government cut universal winter fuel payments for pensioners to prevent a run on the pound. Shadow Treasury Minister Laura Trott has described Lucy Powell's remarks as "ridiculous fantasies". The Sun's political editor, Harry Cole, calls the remarks "gibberish". Ms Powell, leader of the House of Commons, said she was "really sorry" that the government had been forced to make the decision - but said ministers had been left with no choice.

