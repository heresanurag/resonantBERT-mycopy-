title: Barcelona v Atletico Madrid could be first La Liga match held in United States
  - BBC Sport
date: '2024-10-22'
section: Football
url: http://www.bbc.co.uk/sport/football/articles/c98y89dwrxro
content: |-
  Barcelona's fixture against Atletico Madrid is planned for 22 December

  Barcelona's league fixture against Atletico Madrid in December could be staged in Miami - with La Liga officials hopeful that Fifa will approve the plan. It would be the first time a La Liga match has been played in the United States. Fifa, football's world governing body, will make the final decision on the proposal. The match is currently scheduled for 22 December, before La Liga pauses for its winter break. Both Atletico and Barcelona are scheduled to play in a four-team Spanish Super Cup in early January, which is being held in Saudi Arabia. In April, Fifa withdrew from a legal challenge by leading match promoter Relevent, which is seeking to stage overseas league matches in the United States. The following month, Fifa announced it was setting up a working group to look at the potential impact of competitive domestic matches being played abroad.

  La Liga president Javier Tebas has spoken of his desire to take La Liga games to other countries. Barcelona planned to stage a league match against Girona in Miami in January 2019, but the idea was scrapped in the face of opposition from Spain's football association and its players' union. League sources say there is still work to do on the plan but they are hopeful of receiving approval to proceed. The Premier League has previously said it has no plans to play games overseas.
