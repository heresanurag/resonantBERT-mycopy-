title: British man dies after balcony fall in Spain - BBC News
date: '2020-07-12'
section: UK
url: http://www.bbc.co.uk/news/uk-53377298
content: |-
  Police in Malaga said the Briton had landed on another man below, killing him too.

  The incident occurred in the coastal resort of Marbella, southern Spain

  A British man has died in Spain after falling from a hotel balcony in the early hours of Saturday and landing on another man, according to reports.

  Police in Malaga told the Mail they were "investigating" the death of two men in Marbella after "one man landed on another man, killing him as well".

  The Foreign Office told the BBC it was "supporting the family of a British man following his death in Spain".

  A spokesman for the FCO added officials were in contact with local police.
