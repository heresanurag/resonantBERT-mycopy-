title: 'Casement Park: GAA president Jarlath Burns '' very pessimistic'' over stadium
  hosting Euro 2028 - BBC Sport'
date: '2024-06-12'
section: European Championship
url: http://www.bbc.co.uk/sport/articles/c5116przyevo
content: |-
  Former Armagh captain Jarlath Burns became GAA president in February

  GAA president Jarlath Burns says he has not yet given up on Casement Park hosting Euro 2028 games, but remains "very pessimistic" that the stadium will be redeveloped in time. The Casement Park project has been plagued by delays and Northern Ireland secretary of state Chris Heaton-Harris said in April that the UK government is still "working to figure out" the cost of building the stadium in west Belfast. A month later, prime minister Rishi Sunak insisted the government will make a “significant contribution” to the scheme. The original cost a decade ago was estimated to be £77.5m but Heaton-Harris suggested in March it could now be about £308m. At the launch of the All-Ireland Hurling Championship on Tuesday, Burns said "it's not looking as if we're going to get the Euros". Speaking to BBC Sport NI on Wednesday, Burns said: "Well, I'm not resigned yet. "I'm very pessimistic and that was the word I used yesterday because whenever the Euros were announced for Belfast, the clock began ticking. It's ticking very fast now and ticking down unfortunately. "The six weeks lead into the [general] election is very unhelpful because that takes us right up to the 4 July and whoever is in government on 5 July needs to prioritise this as their number one project if this is going to be delivered for Belfast and for Northern Ireland."

