title: 'Watch: Bear dodges skiers on California slopes - BBC News'
date: '2023-12-14'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-67722456
content: |-
  The bear escaped collision-free and is said to have reunited with its mother on the other side of the trail.

  A skier just missed hitting a bear on the slopes of Lake Tahoe, California, when it quickly crossed the ski path.

  No one collided with the bear and Tao Feng, who filmed the close encounter, says he saw the bear reunite with its mother on the other side of the trail.
