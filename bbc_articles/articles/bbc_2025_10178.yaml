content: |-
  The pocket watch belonged to Boston MP Herbert Ingram, who drowned in Lake Michigan in 1860.

  Watch lost in shipwreck comes home after 165 years

  The 16-carat gold timepiece will be on display at Boston Guildhall from 24 May

  A 165-year-old pocket watch found in an American shipwreck has been returned to its home town in the UK. The timepiece belonged to Herbert Ingram – a British politician and journalist from Boston, Lincolnshire. Ingram was recognised for his role in bringing fresh water, gas and the railways to the town, but died during a trip to the US in 1860 when the steamship Lady Elgin sank on Lake Michigan. Councillor Sarah Sharpe, from Boston Borough Council, said: "The fact that this small part of him is coming back to his home town to be displayed is really special and important."

  Divers in Illinois found the pocket watch in the shipwreck in 1992

  The pocket watch, its chain and fob was found by divers at the bottom of the lake, in Illinois, in September 1992. But it remained in the US for more than 30 years until it was offered to an archaeologist who was curating an exhibition about the wreck of the Lady Elgin. Ingram was sailing on the ship with his son when a violent storm broke out on the night of 8 September 1860. The ship collided with another vessel and Ingram was among about 300 people who died. His body was brought back to Britain, where his legacy has lived on. He was celebrated as the founder of The Illustrated London News, the first illustrated news magazine, and was credited, as MP for Boston, with helping to transform the town into a large industrial centre. A statue of him stands outside St Botolph's Church – the Boston Stump – overlooking the marketplace.

  Valerie van Heest has written a book about the Lady Elgin

