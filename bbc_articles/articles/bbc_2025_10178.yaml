  After the watch was discovered by divers in 1992, its owner was identified as Ingram using initials and manufacturer details. In October 2024, the divers approached Valerie van Heest, an archaeologist who had conducted a survey of the shipwreck. They said the watch had belonged to Ingram and offered it to her for an exhibition about the Lady Elgin. "I very quickly came to the realisation it doesn't belong in America," she said. "It belongs in Boston where Herbert Ingram was from, where a statue of him still stands." Ms van Heest contacted the Boston Guildhall museum and later purchased the watch in order to donate it to the town. "It is physical artefacts that connect us in the present to the past," she said. "To see a watch which belonged to the man who stands in Boston's town square... I think this is going to draw people in, to wonder who was this man?"

  Herbert Ingram was an MP and celebrated journalist

  Coincidentally, the Guildhall had been planning an exhibition about Ingram. Sharpe, the portfolio holder for heritage and culture at Boston council, said she was so surprised when Ms van Heest got in touch that she "couldn't sit down". "Since then I've been absolutely buzzing," she added. "Herbert Ingram was one of our most influential people." Listen to highlights from Lincolnshire on BBC Sounds, watch the latest episode of Look North or tell us about a story you think we should be covering here, external.
