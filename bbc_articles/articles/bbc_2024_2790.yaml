title: 'Tate Modern: Man dies after falling from London gallery - BBC News'
date: '2024-02-02'
section: London
url: http://www.bbc.co.uk/news/uk-england-london-68180323
content: |-
  Inquiries are under way to identify the man and notify his family, the Met Police say.

  A man has died after falling from the Tate Modern gallery in London, the Metropolitan Police has said.

  The man died at the scene at about at 10:45 GMT despite efforts from emergency services, and a cordon remains in place.

  In a statement, the Met said the man's death was being treated as "unexpected but not thought to be suspicious".

  Inquiries are under way to identify the man and notify his family, the Met added.

  The Tate Modern said the gallery had closed for the day, adding: "We are very sad to report that a member of the public passed away at Tate Modern this morning.

  "The police are not treating the event as suspicious, but we have closed the gallery for the day as a mark of respect.

  "All our thoughts are with the person's family and friends at this time."

