id: bbc_2018_1094
title: Antarctica's Weddell Sea 'deserves protected status' - BBC News
date: '2018-01-24'
section: General
url: http://www.bbc.co.uk/news/science-environment-42798872
content: |-
  Scientists have called for special status to protect coral, penguins and other wildlife in Antarctica.

  A submersible mission in Antarctic waters has revealed unique ecosystems so rare they deserve special protection, say scientists.

  The seabed investigation, co-ordinated by the campaign group Greenpeace, will help build the case for the creation of the world's largest wildlife sanctuary.

  Read more on the proposals here.
