  Gymnast Simone Biles and swimmer Katie Ledecky both won gold to add to their extensive Olympic medal collections. American superstar Biles, 27, secured her third gold of the Paris Games when she took the vault title on Saturday in emphatic fashion. It was another of the titles she first won at Rio 2016, then lost in Tokyo when she pulled out of several events with the 'twisties'. Meanwhile, in the La Defense Arena, legendary swimmer Ledecky won the women's 800m freestyle final for the fourth consecutive time. The 27-year-old is the first female swimmer, and the only swimmer other than the great Michael Phelps, to win the same Olympic event four times in a row. The United States' most decorated female Olympian now has nine golds and 14 Olympic medals overall.

