content: |-
  There was excitement and drama, and GB medals, in rowing, athletics and gymnastics on day eight of the Paris Olympics on Saturday.

  Another good day for GB as world stars shine - top five stories from Paris

  This video can not be played To play this video you need to enable JavaScript in your browser.

  Team GB added six more medals, including one gold, on day eight of the Olympics to take their total medal haul up to 33. The 10th British gold of Paris 2024 was won in the men's rowing eights on Saturday, and put GB fifth in the medal table. The women's eights won a hard-earned bronze, as the rowing team reached historic heights in the French capital. GB's equestrian team continued their impressive Games with a bronze in the team dressage, but missed the chance to complete an unprecedented equestrian clean sweep following golds in team eventing and jumping. In the gymnastics, American superstar Simone Biles won her third gold of the Games in the vault, while Team Ireland's Rhys McClenaghan became the new Olympic pommel horse champion. GB's Max Whitlock missed out on a history-making medal in the same final, but there was success for Jake Jarman, who claimed bronze on floor. Meanwhile, there were mixed fortunes on the track, as Louie Hinchliffe won his men's 100m heat - but team-mate Jeremiah Azu was disqualified. St Lucia's Julien Alfred stormed to the women's 100m title to make history as her nation's first ever Olympic medallist, but GB's Daryll Neita finished four-hundredths of a second off the podium in fourth. There was success in the 4x400 mixed relay, with Great Britain securing bronze. There was also bronze for Emma Wilson in the windsurfing, GB's first sailing medal at Paris 2024. However, she was disappointed to miss out on gold having dominated the earlier rounds and said she was "done with the sport". In the pool, Adam Peaty made his return from Covid to help the team qualify for the mixed medley relay final. But he didn't feature in that final, with GB's Kathleen Dawson, James Wilby, Duncan Scott and Anna Hopkin finishing seventh.

  This video can not be played To play this video you need to enable JavaScript in your browser. Team GB hold on secure gold in the Men's eight final

  The final day of rowing competition at the 2024 Games brought medals for Team GB in both blue riband events. Firstly, the women's eights took bronze after a close battle with Canada, who won silver, while Romania ran away with gold. Then came the men, who were neck-and-neck with the Netherlands at the halfway mark before charging away in the final 500m to emulate the gold they won in this event in 2016. Cox Harry Brightmore was on his feet in the boat, pointing out each of the eight rowers to congratulate them on their achievement. This was GB's eighth rowing medal in Paris, making it their best medal tally for an overseas games. They won nine in 2012 and eight in 1908 - both in London.

