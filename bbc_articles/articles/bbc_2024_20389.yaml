  Team Ireland's Rhys McClenaghan won pommel horse gold as Great Britain's Max Whitlock missed out on a medal in his final Games. McClenaghan, 25, added to his two World Championship titles, three European golds and one Commonwealth gold by becoming Olympic champion on pommel horse. Defending champion Whitlock, who was going for an unprecedented fourth consecutive medal on the same gymnastics apparatus, finished fourth and said he was now "done" competing. There was, however, success for Team GB at the Bercy arena, with Olympic debutant Jake Jarman claiming bronze in the floor final. The 22-year-old will have another chance for a medal on Sunday in the men's vault final.

