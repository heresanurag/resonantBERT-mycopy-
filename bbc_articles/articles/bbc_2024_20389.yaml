  On a rainy and raucous night at the Stade de France, Julien Alfred led from start to finish to secure a surprise gold in the women's 100m final. In doing so, the 23-year-old made history by winning St Lucia's first ever medal at the Olympic Games in a national record time of 10.72 seconds. Afterwards, she revealed she watched "all Usain Bolt's races this morning", taking inspiration from the record-breaking Jamaican running legend. American world champion Sha'Carri Richardson took silver in 10.87, with compatriot Melissa Jefferson (10.92) third. Great Britain's Daryll Neita finished four-hundredths of a second off the podium in fourth, crossing the line in 10.96. Neita produced the highest-placed finish by a British female athlete in an Olympic sprint final for 64 years, but said afterwards she was "finding it hard to find words" after coming "so close" to a first individual global medal. Her British team-mates Dina Asher-Smith and Imani Lansiquot earlier failed to make the final, while Jamaican sprint icon Shelly-Ann Fraser Pryce withdrew before her semi-final.

  This video can not be played To play this video you need to enable JavaScript in your browser. GB’s Jeremiah Azu disqualified after false start in the 100m heats

  Hinchliffe, the British sprinter trained by US Olympic great Carl Lewis, laid down a marker in the men's 100m heats. He won his heat in 9.98 seconds, ahead of highly fancied Noah Lyles of the USA, before GB's Zharnel Hughes also progressed. But before that, the men's 100m - arguably the highlight of the Olympics in male competition - could not have got off to a worse start for Team GB. It was heartbreak for Azu as he was disqualified from his heat for a false start. The 23-year-old from Cardiff - who ran 9.97 seconds in May, one of the top 10 times ever by a British athlete - fiercely fought his case, but eventually left the track in the most disappointing fashion. Hinchliffe and Hughes will aim to make the final when they go in the semis from 19:05 BST on Sunday.
