title: DJ Johnnie Walker ends 58-year career with last BBC show - BBC News
date: '2024-10-27'
section: Culture
url: http://www.bbc.co.uk/news/articles/c7044l733rdo
content: |-
  The stalwart of the BBC calls time on his career due to ill health.

  Walker raises a glass as he presents his final Sounds Of The 70s on BBC Radio 2

  Veteran DJ Johnnie Walker said "the day has come I've always dreaded" as he presented his final Sounds Of The 70s show on BBC Radio 2. The presenter, 79, announced earlier in the month he was retiring from radio after 58 years due to ill health. For his final broadcast on Sunday, Walker confirmed he would not be taking any requests this time as all the song choices would be made by himself, adding: "I'm playing all the ones I love." An emotional final show featured messages from his wife Tiggy and Sir Rod Stewart, before Walker ended by telling listeners "may we walk into the future with our heads held high and happiness in our hearts".

  Walker became the presenter of Sounds of the 70s in 2009, but his career in British radio has spanned almost six decades. After opening his last show with George Harrison's track What Is Life, Walker then dedicated his second song, Sister Sledge's We Are Family, to his listeners. Walker was joined on air by his former co-presenter Sally Boazman, who said being partnered with him was the "best luck" of her life. The pair worked together on BBC Radio 2 Drivetime for seven years from 1999. In a pre-recorded message, Sir Rod Stewart praised Walker for helping the careers of many rock bands. Sir Rod told Walker he had "propelled the careers of a bunch of unknown layabouts to the top of the charts, and overnight fame and everything that goes with it". The rock star ended the message by making Walker an offer: "So if I do manage to get through the pearly gates, I'll have a pint of Guinness, please mate, and guess what? I'll pick up the tab. "See you later, Johnny. Rock on mate, rock on."

  Walker joined BBC Radio 1 in 1969, having been a DJ on the pirate station Radio Caroline in the 1960s. He left the BBC in 1976 and later moved to San Francisco, where he recorded a weekly show broadcast on Radio Luxembourg. He returned to the BBC in the 1980s and on 17 January 1987, Walker re-joined Radio 1, presenting the Saturday afternoon show The Stereo Sequence. He has remained at the BBC ever since, and hosted his last episode of The Rock Show on Friday by playing some of his "favourite rock anthems".

  Walker's wife Tiggy, who sat in on the show as it aired from their home in Dorset, praised her husband for continuing to broadcast after he became "very ill" in January. The radio legend was diagnosed with idiopathic pulmonary fibrosis - a severe respiratory illness that can make breathing very difficult. "I'm the one person who knows how hard it's been for you, and I just want to say well done for keeping going as long as you have, because you make a lot of people very happy," Tiggy said. "I know there will be a lot of tears out there today, including mine." Walker admitted he might shed a tear or two as well as he thanked her for all her "wonderful care", adding: "I certainly couldn't have done the show without that so thank you for that." After announcing his retirement, Walker told the BBC: “I get cards from people saying: ‘You’re the friend I’ve never met’ and things like that. So it will be sad to say goodbye.” Bob Harris will taking over from Walker as the presenter of Sounds of the 70s in November.
