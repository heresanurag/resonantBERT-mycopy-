title: 'Coronavirus: Raab confident Boris Johnson will ''pull through'' - BBC News'
date: '2020-04-07'
section: General
url: http://www.bbc.co.uk/news/uk-52205777
content: |-
  Foreign Secretary Dominic Raab said the prime minister remains in good spirits while in intensive care.

  The UK foreign secretary says Boris Johnson remains in good spirits while in intensive care.

  Speaking at the government's daily coronavirus briefing, Dominic Raab said the prime minister is a "fighter" and "will pull through".

  Downing Street confirmed earlier that the PM was in a stable condition at St Thomas' Hospital and did not need to be on a ventilator.

  Read more: Raab 'confident' PM will recover from coronavirus
