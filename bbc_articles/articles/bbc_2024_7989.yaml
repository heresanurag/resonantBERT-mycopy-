title: Runaway circus elephant stops traffic in Montana - BBC News
date: '2024-04-17'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-68841331
content: |-
  Viola, the elephant, was startled by the sound of a nearby car and ran away while having a bath.

  A circus elephant shocked drivers in Butte, Montana when it escaped and stomped into traffic.

  Viola, the elephant, was being washed near the road when she was startled by the sound of a car, and took off.

  CCTV footage shows the elephant walking past several cars, and then turning into a car park with her trainer running after.

  Bill Melvin, the manager of a local business, said the elephant was on the loose for around 10 minutes before being ushered back into its trailer.
