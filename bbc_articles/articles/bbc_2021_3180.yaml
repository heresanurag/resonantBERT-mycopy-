content: |-
  "We are seeing a resurgence in central and eastern Europe," says the World Health Organization.

  The world through its media

  Russian President Vladimir Putin has wrongly claimed the death of a vaccine recipient has suspended innoculations using the Pfizer jab in parts of Europe. "In some European countries, Pfizer inoculations were stopped because there were lethal outcomes there," Putin told a gathering of youth activists that was broadcast live on Russian state TV channel Rossiya 24. He made the comment after praising Russia's own vaccines as the "safest and most effective" in the world. Putin appeared to be referring to the false allegation in a video shared on social media that claimed Pfizer was halting production of its vaccine after 23 people died in Norway. But as a fact-check by the news agency Reuters pointed out, Pfizer actually announced in mid-January that it was temporarily reducing production at its facility in Puurs, Belgium, for a week as part of a plan to increase vaccine output in the long term. In a previous fact-check , the agency reported the Norwegian Institute of Public Health had found no evidence to suggest the vaccine was to blame for the deaths of 13 elderly recipients.
