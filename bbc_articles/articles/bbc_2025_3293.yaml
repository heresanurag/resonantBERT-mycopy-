content: |-
  The 59-year-old political newcomer says he will keep tariffs on US imports "until the Americans show us respect".

  Canada's next PM Mark Carney vows to win trade war with Trump

  This video can not be played To play this video you need to enable JavaScript in your browser. Mark Carney tells party he won't let Donald Trump "succeed" in trade war

  Mark Carney has won the race to succeed Justin Trudeau as Canada's prime minister, vowing to win the trade war with the US and President Donald Trump. The former governor of the Canadian central bank and Bank of England beat three rivals in the Liberal Party's leadership contest in a landslide. In much of his victory speech, Carney, 59, attacked Trump, who has imposed tariffs on Canada and said he wants to make the country the 51st US state. "Americans should make no mistake," he said. "In trade, as in hockey, Canada will win." Carney is expected to be sworn in the coming days and will lead the Liberals in the next general election, which could be called in the coming weeks.

  This video can not be played To play this video you need to enable JavaScript in your browser. Watch: Canada will 'fight when we must', says Trudeau in farewell speech

  Carney, now prime minister-designate, has never served in elected office. The Liberal leadership race began in January after Trudeau resigned following nearly a decade in office. He had faced internal pressure to quit over deep unpopularity with voters, who were frustrated with a housing crisis and the rising cost of living. Carney won on the first ballot on Sunday evening, taking 85.9% of the vote to beat his nearest rival, former Finance Minister Chrystia Freeland. Loud cheers erupted as the results were announced to a crowd of some 1,600 party faithful in Ottawa, Canada's capital. The party said more than 150,000 people had cast ballots in the race.
