title: Meet the scientists studying seal poo - BBC News
date: '2019-05-04'
section: General
url: http://www.bbc.co.uk/news/science-environment-48151530
content: |-
  Scientists in the Antarctic are monitoring seal poo to keep track of what's happening in the environment.

  The British Antarctic Survey are monitoring the droppings of some of the higher predators on the island of South Georgia in the Antarctic.

  They say it helps them keep track of what's happening in the environment.
