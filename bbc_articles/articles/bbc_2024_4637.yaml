content: |-
  Earl Spencer speaks about abuse he suffered as a child in an upcoming interview with the BBC's Laura Kuenssberg.

  The BBC's Laura Kuenssberg has spoken to Princess Diana's brother, Earl Spencer, about the terrible abuse he suffered as a child when he was sent away to boarding school.

  In the interview, he lifts the lid on some of the misery in his childhood as he grew up alongside his world-famous sister, and says that their life of privilege did not protect them.

  Watch the full interview tomorrow on BBC One and BBC iPlayer at 09:00.
