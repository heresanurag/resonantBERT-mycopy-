id: bbc_2019_1466
title: '''Social media inspired me to self-harm'' - BBC News'
date: '2019-02-07'
section: General
url: http://www.bbc.co.uk/news/uk-47156850
content: |-
  Miss England Alisha Cowie says self harm was made to sound "poetic" online, but became a "destructive habit".

  Health Secretary Matt Hancock is to meet the head of Instagram on Thursday to talk about what social media companies should be doing to stop young people viewing images of suicide and self harm.

  Viktoria and current Miss England, Alisha Cowie, say they were encouraged to self harm by images they viewed online.

