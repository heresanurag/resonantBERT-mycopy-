title: 'Covid-19: Can face masks make communal singing safe enough? - BBC News'
date: '2020-12-23'
section: General
url: http://www.bbc.co.uk/news/uk-55414707
content: |-
  Communal singing is against Covid guidelines in the UK but could a new scientific study change that?

  Communal signing isn't allowed in the UK under coronavirus guidelines but researchers are hoping to find the evidence needed to bring it back.

  University College London has been analysing how wearing a face mask could make communal singing safe enough.
