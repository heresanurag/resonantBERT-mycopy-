title: 'Boeing strike: Workers vote overwhelmingly to back the walkout - BBC News'
date: '2024-09-13'
section: Business
url: http://www.bbc.co.uk/news/articles/c8jlj3dnlw7o
content: |-
  More than 30,000 workers down tools after union members voted overwhelmingly to back the strike.

  Almost 95% of union members who voted in the ballot rejected the pay deal

  Boeing workers have gone on strike after they overwhelmingly rejected a tentative deal between union representatives and the plane maker that included a 25% pay rise. More than 30,000 workers in Seattle and Portland downed their tools from midnight Pacific Time (07:00 GMT) on Friday. The walkout is another setback for the firm, which is facing deepening financial losses. It is also struggling to repair its reputation after a series of safety issues, including two fatal crashes.

  The stand-off adds to the challenges facing Boeing's new chief executive Kelly Ortberg, who was appointed last month with a mission to turn the business around. Almost 95% of the union members - who produce planes including the 737 Max and 777 - voted in the ballot rejected the pay deal. Of those who voted, 96% back strike action until a new agreement is reached. "Our members spoke loud and clear tonight," said Jon Holden, president of the International Association of Machinists and Aerospace Workers (IAM) District 751. Speaking at an investor conference on Friday, Boeing chief financial officer Brian West said the impact on the firm would depend on the duration of the strike, which has shut down production of the firm's popular 737 planes. He warned that the stoppage "will jeopardise" the firm's recovery and said the firm was focused on repairing its relationship with workers and reaching a deal. "We want to get back to the table and we want to reach an agreement that is good for our people, their families, our community and our intent is to do just that," he said.

