  The presenter took over Sunday Love Songs on Radio 2 following Wright's death.

  Michael Ball thanks BBC DJ Steve Wright in first show

  Michael Ball has paid tribute to Steve Wright, calling his legacy "immeasurable", as he took over the the late DJ's Sunday Love Songs programme on BBC Radio 2. Ball, a West End star who has presented on Radio 2 since 2008, was named as the show's new host after Wright died in February. The 61-year-old said Wright was "missed", adding: "He created Love Songs, and I am so, so proud to be carrying the baton for him into the future." Wright joined the BBC in the 1970s, and went on to host shows on Radio 1 and Radio 2 for more than four decades. He also presented Top of the Pops on BBC One. The death of the beloved presenter at the age of 69 led to an outpouring of tributes across the BBC and beyond. Ball was among those paying tribute at the time, calling the news, external "unbelievably sad and shocking", and calling Wright "an inspiration, a cheerleader and a lovely man".

  During the show - which is now called Love Songs with Michael Ball - the presenter revealed that the last song he played would be a tribute to Wright. The final song on the weekly show is known as the "last dance". Ball said that this Sunday, it would be something "very special", and one of Wright's favourites. "So in memory of Steve, I want you to give someone a hug. Make that time for it now. "Your partner, your friend, (your) child, parent, even your pet.
