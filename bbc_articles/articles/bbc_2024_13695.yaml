  • None No inquest to be held into death of BBC DJ Steve Wright "And if you're on your own right now, I'm embracing you with a virtual hug. "And I want to take this opportunity to thank Steve, his legacy on Radio 2 is immeasurable." He went on to play the song Wichita Lineman by Glen Campbell, a song Wright regularly used as background music for his show. Ball said he hoped audiences would "take a moment and maybe have a little dance along with me". Sunday Love Songs was a show that was dear to Wright's heart. After his 15-year stint on Radio 1 ended, he worked in commercial radio for a short while but then joined Radio 2 as part of the weekend line-up and launched Sunday Love Songs in 1996. He developed the format himself as a programme where he could read out listener emails and letters exactly as they were written. When he was subsequently given the Radio 2 afternoon show - which he hosted for 23 years - he agreed a special deal that allowed him to also present Sunday Love Songs each week. And even when he was replaced by Scott Mills on the afternoon show in 2022, he again continued his Sunday stint until the day before his death. Ball now hosts the show on Sundays from 09:00 to 11:00.
