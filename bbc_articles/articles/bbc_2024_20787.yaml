title: 'Conwy: Welsh singers asked to leave Blue Bell pub - BBC News'
date: '2024-08-05'
section: Wales
url: http://www.bbc.co.uk/news/articles/c0krr97l4nzo
content: |-
  Landlord defends decision to ask customers singing in Welsh to stop and leave pub.

  Drinkers told to leave pub after singing too loudly

  Jared Dunn said the singing was "loud" and other customers were leaving the pub without finishing their meals

  A landlord has defended a decision to ask customers singing loudly to stop and leave his pub. Jared Dunn said a group of about 30 people started singing in Welsh during a busy Saturday afternoon at the Blue Bell on Castle Street in Conwy. He said the singing was "loud and people were leaving, people were not finishing their food". "We have run the pub for 11 years - we don't do singing," he added.

  TV and weather presenter Sian Lloyd posted about the incident on X, formerly known as Twitter, external, saying: "Friends of mine have just been thrown out for singing in their native language." She added it was "scarcely credible such a frightful pub exists in Cymru". But Mr Dunn said: "This has nothing to do with singing in Welsh. "We do open mic night and have bands in the pub but people were bursting into song. "If they were vaping inside the pub we would ask them to leave - there's house rules." He said a doorman asked the singers to leave after Mr Dunn heard them while he was working in the kitchen. "They were singing the national anthem which was beautiful, so we asked them to stop after it ended. "The doorman was dealing with it. Another doorman came in from next door." Mr Dunn added: "The pub is for everyone's enjoyment, and they didn't conform to a reasonable request."

