  On Sunday night, Ms Lloyd said the storm seemed to have passed. She said she has arranged to meet landlord Mr Dunn, adding that social media had blown the matter "out of proportion". "Just had a lovely chat with landlord Jared at The Blue Bell in Conwy," she posted on X, external. "We agreed on lots, but especially on how much social media tends to blow things out of proportion. "I am now looking forward to meeting him and clinking glasses over a nice Guinness #IechydDa." On Monday she posted on X, external to say she had apologised to Mr Dunn and had expressed her "mortification". "I genuinely thought my original post was defending the Welsh language and fairly tongue in cheek, hoping to start a conversation, hence the question mark and emoji," she said. "Clearly I misjudged the situation, as well as the mood, and that did not happen. I was wrong and I stand corrected. "What I was told about the incident now appears not to be the full story. At the end of the day, I was not there and should not have acted so instinctively... upon hearsay. "For that, my sincere apologies." She added: "Hand on heart, I'm appalled at the thought of causing any small business distress." Correction 5 August 2024: The headline on this story has been amended to reflect that the group of singers were asked to leave the pub because they were singing loudly, not because they were singing in Welsh. Update: This story was updated on 11 September 2024 to include Sian Lloyd's apology to Mr Dunn.
