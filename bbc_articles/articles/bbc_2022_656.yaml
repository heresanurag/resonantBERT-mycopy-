title: Truck spends three days dangling over China cliff - BBC News
date: '2022-01-08'
section: General
url: http://www.bbc.co.uk/news/world-asia-china-59906706
content: |-
  The driver is said to have tried to reverse on a narrow mountain road.

  Watch this incredible video showing a truck that was left dangling over a cliff edge in China for three days.

  The driver and passenger managed to escape, and the vehicle was eventually hauled to safety.
