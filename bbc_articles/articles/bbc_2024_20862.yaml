content: |-
  Teenager Andrea Spendolini-Sirieix finishes sixth in the 10m platform final after attempting to become first British woman to win two Olympic diving medals.

  Spendolini-Sirieix emotional after missing out on medal

  This video can not be played To play this video you need to enable JavaScript in your browser. Spendolini-Sirieix misses out on medal as Quan wins 10m gold

  Warning: This article contains mention of mental health issues

  Teenager Andrea Spendolini-Sirieix missed out on creating history as the first British woman to win two Olympic diving medals as she finished sixth in the 10m platform at Paris 2024. Having claimed bronze alongside Lois Toulson in the synchronised event last week, Spendolini-Sirieix hoped to repeat the medal success in Tuesday's individual event. After her final dive, the 19-year-old from London became emotional as she was consoled by her coach. She later spoke of her pride at coming through mental health struggles and going on to enjoy Olympic success. "It wasn't meant to be," Spendolini-Sirieix said. "Three years ago I didn't even want to be alive, so today I'm just happy that I am alive, I'm breathing and I've got my family to support me." Spendolini-Sirieix had high hopes of creating another magical moment for Team GB, having produced a superb performance to place third in Monday's semi-finals. However, she could not match that level during the final. Even if she had, it would have been difficult to surpass the brilliance of Chinese pair Quan Hongchan and Chen Yuxi. Quan, 17, won gold to defend the title she won as a 14-year-old in Tokyo, having made a strong statement with a perfect 10 in her opening dive. Team-mate Chen, 18, took silver as they replicated their one-two at the previous Games. Watched by her father Fred Sirieix - the television personality who stars in First Dates - Spendolini-Sirieix looked emotional when she was consoled after her final dive. "Obviously it wasn't the result that I wanted," Spendolini-Sirieix told BBC Sport, adding that her rivals had been "amazing" and dived better than her.

  Spendolini-Sirieix has already competed in two Olympic finals while still a teenager

  Spendolini-Sirieix's feat of reaching Paris Olympic finals comes after she considered quitting earlier in 2022 because of a "fear of diving"., external A mental block, described as being similar to the 'twisties' suffered by American gymnast Simone Biles, was difficult to overcome but she rediscovered her love for the sport. Since finishing seventh in the Tokyo Olympics final three years ago, Spendolini-Sirieix has developed into a genuine Olympic force in the 10m platform. Not since Eileen Armstrong claimed silver in 1920 had a British woman won a medal in the individual event - and despite the valiant endeavour of Spendolini-Sirieix the wait goes on. The teenager was aiming to land Team GB's first Olympic medal in a women's individual diving competition since Elizabeth Ferris won bronze in the 3m springboard in 1960. Claiming two golds at both the Commonwealth Games and European Championships in 2022 mark arguably the biggest successes of the teenager’s career so far. She also had podium finishes - including a mixed team event gold - at the World Championships that were held in Doha in February this year. Adding individual gold in the 10m platform at Paris 2024 was the next target. However, overhauling the Chinese pair of Chen and Quan was always going to be a considerable task. "She has had a super year," her father Fred told BBC Sport. "She is diving well. She made a couple of errors and she got overtaken and she couldn't claw back the deficit. "But I am proud of my little girl. She has come here, she has come to Paris in the Olympics and she has got a medal."

