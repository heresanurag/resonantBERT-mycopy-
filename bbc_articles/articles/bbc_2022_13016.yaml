title: 'James Cleverly: Changing leadership disastrously bad idea - BBC News'
date: '2022-10-13'
section: General
url: http://www.bbc.co.uk/news/uk-politics-63241256
content: |-
  The foreign secretary defended the mini-budget that triggered market turmoil.

  Foreign Secretary James Cleverly has defended the government's economic plans and says replacing the prime minister is "a disastrously bad idea".

  Speaking to Radio 4's Today programme, he said Liz Truss was delivering what she promised and the government was sticking with its current plans "to grow the economy".
