title: Celtic's Callum McGregor retires from Scotland duty - BBC Sport
date: '2024-08-09'
section: Scottish Prem
url: http://www.bbc.co.uk/sport/football/articles/c5y83l52de8o
content: |-
  Celtic captain Callum McGregor announces his retirement from international football with Scotland.

  This video can not be played To play this video you need to enable JavaScript in your browser.

  The 31-year-old midfielder won 63 caps for Scotland and was part of Steve Clarke's squad at Euro 2024. McGregor revealed he had spoken this week to Clarke, who said he was "disappointed" with the player's decision but could "understand the rationale". Celtic youth product McGregor told the club's website it was a "very difficult" decision but one he felt was "the right one at the right time". "It has been a huge honour to achieve 63 caps for my country, as appearing just once would have been a dream come true," McGregor said.

  "So to achieve 63 and be inducted into the Roll of Honour at 50 caps is something I could only have dreamed of as a young kid. "Throughout my career, I wanted to make myself available for Scotland at all times and whenever selected, give the absolute maximum possible to help the country and represent the supporters with passion and pride." McGregor said reaching two major tournaments would "always be a source of real pride" but had hinted during this summer European Championship that he had been hindered by fitness issues. "Of course, like many others, I wish we could have gone further in these competitions," he added. "But, nonetheless, it has been a privilege to have played for my country on such a stage and to have represented my country for such a long period."

  Steve Clarke is disappointed but can understand Callum McGregor's decision

  Clarke paid tribute to McGregor's contribution to his team. "Callum's consistency of performance and leadership qualities have been a real catalyst in the team’s return to major tournaments," he told the Scottish Football Association website. "He has been a driving force in the middle of the park and, in many ways, is a coach’s dream: he is low maintenance, leads by example and sets the highest standards every day in training and in matches. "That professionalism and dedication has been a huge influence in our squad. We had a very good chat and, while I am disappointed to lose Callum’s qualities, I can understand the rationale behind his decision. "He will be missed by his team-mates, the coaches, the backroom staff and, of course, the fans. I would like to thank him for all that he has contributed and helped us achieve."

  Celtic boss Brendan Rodgers said McGregor could be proud of his international career - but admitted he would be able to reap the benefits at the club. “From a selfish perspective, of course for Celtic it’s really good news because he gets the chance to recover. You all know the number of games that he plays. “So this will give him those little opportunities to have a breather, because he’s really intense, and that’s what I love about him, his appetite to improve. “He never has a day off ever. Even if he has a free day, he’s either recovering, he’s thinking about the game, so these little windows that he will have will give him the chance to do that. “But a fantastic career he’s had for his country, he can be very proud of that and now going into this next part of his career he has all his focus on Celtic.”
