title: Time to get smartphones off the dancefloor? - BBC News
date: '2024-12-08'
section: Business
url: http://www.bbc.co.uk/news/articles/c4gpn44pyz9o
content: |-
  A new nightclub is opening and introducing a strict no phones on the dancefloor policy.

  A new nightclub is opening this week with a strict rule that your smartphone camera must be covered with a sticker. Amber's in Manchester is the latest in a handful of venues in the UK to enforce the policy - but in cities like Berlin, renowned for its nightclubs, it's the norm. Amber's director Jeremy Abbott told the BBC the club made the decision because "we really want the music and the experience to be front and centre", but the issue is being debated on social media. Some posted on Instagram, external concerns that clubs could suffer as social media videos of their night act as free adverts, while others welcomed the move as "partying with privacy".

  “It is the fear of being put on the internet isn’t it?" one woman told the BBC when we asked young people in Manchester how they feel about a no camera phones in clubs rule. “Being really drunk and that embarrassing picture of you ending up on Insta, waking up and seeing the events of last night.” Another woman said: “It does make the vibe better, because the less people [are] on their phone, engaging more with the DJ and stuff, that’s the better environment to have."

  So are Britain's clubs at a turning point? Is now the time to get phones off the dancefloor and people's minds back on the music? Sacha Lord, night time economy adviser for Greater Manchester, thinks so. "These phones are killing the dancefloor, they’re killing the atmosphere,” he says. "DJs hate it. To look out into a sea of phones and no-one’s dancing is really demoralising.” Smokin Jo, who has been DJing since 1990, remembers when the rave and club scene was burgeoning in the late 80s and early 90s. "Everyone's got their hands in the air, there's joy, there's happiness. "Now there's these videos being posted of people standing still with their phone in the air. It's so sad," she says. But Dr Lee Hadlington, senior lecturer in cyberpsychology at Nottingham Trent University, says for those clubbers, "part of their enjoyment is to document their night in terms of photos and memories".

  Smokin Jo wants to see more dancing and fewer smartphones when she's DJing

  At Amber's, phones are not banned outright but clubbers will be required to put a sticker over the camera lens to prevent photos being taken. A content team will be on hand to take and post photos online instead. People violating the rule will be "politely asked to stop", says Abbott. "If you are seen doing it again, you will be asked to leave the venue." The rule comes at a tricky time for Britain's nightclub scene, which has struggled to recover from the numerous Covid lockdowns. Between June 2020 and June this year, the number of clubs has fallen from 1,266 to 786, according to figures from the Night Time Industries Association and research firm NeilsenIQ. Abbott concedes Amber's no phones rules is a risk but says the club has been "blown away" by the response. Lord says the policy could be a "shot in the arm" for the industry and "bring back the energy to the dancefloor".

  Graeme Park, one of Britain's best-known DJs and a leading figure from Manchester's legendary Hacienda nightclub, says: "I totally, totally understand and think that no smartphones on the dancefloor is a great idea. "However, I’ve got a 20-year-old son. He makes music, he DJs, he goes clubbing and he’s like, 'why’s your generation telling our generation we can’t use our smartphones?'"

  DJ Graeme Park wonders how younger clubbers will feel about limiting smartphones

  Ben Park, Graeme's son, says: “Personally, I’ve got nothing against phones being in clubs. I understand the whole no phone policy but at the same time people want to post pictures of them or their friends on social media, people want to promote it online." But he understands why some clubbers - and DJs - get annoyed by so-called TikTok ravers who "literally go to events just to show that they’ve been there and just post it on TikTok," he says. Cyberpsychologist Dr Hadlington says for these clubbers, it could be about a fear of missing out on social media action. "The paradox is they’re spending more time posting about it than they're enjoying the good time," he says.

  It might be a relatively new concept in the UK, but in Berlin, 90% of venues have a no-phones-on-the-dancefloor code, according to Lutz Leichsenring, former spokesperson for Clubcommission Berlin and co-founder of VibeLab. He says that with more tourists coming to the German capital to enjoy the scene, "I think people really appreciated that this policy was a part of clubbing". And, on a personal note, he says that for him, "it is very, very weird when I’m in a club where people around me take pictures and film the whole time".

  Amber's is adopting the same policy that London nightclub fabric has had in place since reopening in 2021 after Covid. The venue has actually been camera-free since it opened its doors in 1999 but as technology changed and smartphones became more ubiquitous it has tweaked its policy. "When people come in at the point of search, we put a sticker on the camera lens and just really sort of invite people not to use it, that's all it is," says fabric's co-founder Cameron Leslie. He says for the most part clubbers abide by the rule. "It’s not an aggressive enforcement," he says. "We have posters up in the club and then beyond that if people do use it and our team do see them we invite them not to." Smokin Jo reckons there are steps DJs can take themselves. “Maybe DJs need to have a clause in their contract saying ‘I’ll do the gig but you need to have some sort of policy’ because we’re losing the identity of the scene and the roots of it." Fellow DJ Graeme Park thinks there is no easy answer to smartphones in nightclubs but says: “It is a really, really good thing that people are talking about it. "It’s the cultural zeitgeist changing and that’s the great thing about clubbing, the attitudes change every decade or every few years."
