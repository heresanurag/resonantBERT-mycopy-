content: |-
  This video has been removed for rights reasons.

  Sir Lenny Henry has hosted Comic Relief for the final time, almost 40 years after co-founding the charity behind the fundraising broadcast.

  Sir Lenny told viewers: "It is not about me - it is about the mirth and the money, the comedy and compassion."

  He also delighted fans with a unique take on the Barbie hit 'I'm just Ken'.

  Since launching in 1988, Comic Relief has raised more than £1.5bn from donations - money which has reached more than one hundred million people.
