title: Ex-police chief likens riots to terrorism - BBC News
date: '2024-08-06'
section: UK
url: http://www.bbc.co.uk/news/articles/cy9eex9qj4xo
content: |-
  Neil Basu says the current wave of violence has been triggered by “lies spread through social media".

  Neil Basu was in charge of counter-terrorism at the Metropolitan Police from 2018 to 2021

  The former head of counter-terrorism policing says some violence during the riots has “crossed the line into terrorism”. Neil Basu, who held the top counter-terror job between 2018 and 2021, said: “I hope my successors are looking at that very closely.” He told the BBC: “I think we have seen serious acts of violence designed to cause terror to a section of our community." Mr Basu said “people should look very carefully” at the legal definition of terrorism when considering some of the violence and actions seen since last week.

  He said the current wave of violence had been triggered by “lies spread through social media” and “we need to do something about that”. On X far-right activist and convicted criminal Stephen Yaxley-Lennon, also known as Tommy Robinson, spent the weekend posting inflammatory messages to thousands of followers, all from the safety of a sun lounger in Cyprus. Robinson was handed back his X account last November by the social media firm’s billionaire owner Elon Musk. Mr Musk himself posted this weekend where he said civil war in the UK was “inevitable”. X has not replied to the BBC’s requests for comment.

  Among the latest scenes of violence over the weekend, anti-immigration rioters smashed the windows of the Holiday Inn Express in Rotherham on Sunday before starting fires

  For Mr Basu, social media companies “only respond” to two things: a change in the law or advertisers pulling out because they do not want to be associated with “platforms that would allow lies that result in violence and sheer terror in communities”. The targeting of hotels believed to be housing migrants comes after years of demonisation by the far right with lists of hotels shared on social media, making it hard to know where might be struck next. Mr Basu said “we should be appealing” to advertisers to cut the funding of social media giants if responsibility was not exercised.

