  He also said there were gaps in the laws relating to hateful extremism which needed to be filled, particularly to stop Robinson “glorifying and creating violence from his sunbed in the Mediterranean”. “Yaxley-Lennon knows well he’s in the full glare of policing, counter-terrorism policing, and the security service.” Mr Basu said he had “spent many years skirting round various fringes of the law” and had been able to “inflame and toxify debates and create the kind of mayhem we’re seeing”. “If he is not crossing a legal threshold, then the government and society need to consider if that threshold is in the wrong place,” Mr Basu added.

