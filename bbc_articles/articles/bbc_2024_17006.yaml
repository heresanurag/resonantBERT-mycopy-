title: Two taken to hospital in Bath after woman approached them with bag - BBC News
date: '2024-07-29'
section: Somerset
url: http://www.bbc.co.uk/news/articles/c849jvn7npyo
content: |-
  Two people were taken to hospital with breathing difficulties and itchy eyes.

  People unwell after woman approaches them with bag

  A cordon was put in place "as a precaution", said police

  Two people have been taken to hospital after a woman approached them with a bag, leading to them feeling unwell. Avon and Somerset Police said it was called to reports of a woman approaching people in Stall Street in Bath at about 14:30 BST. Two people were experiencing breathing difficulties and itchy eyes as a result, the force said. A cordon was put in place but has now been lifted, as officers deem it "safe to be removed".

  A blue tent was in place at the scene

  Dakota Nicholls said he was leaving work when he saw the scene. "It was quite frightening because it was so close to work," he said. "I saw people in hazmat suits, loads of ambulances, police cars. I’ve never seen anything like that before. It was out of the ordinary.”

  Police were called by the ambulance service just after 15:00. A police spokesperson earlier said officers were working with ambulance and fire crews and had "well rehearsed plans for responding to such incidents". "As a precaution" emergency personnel were wearing protective clothing, they added. The spokesperson said the cordon was put in place "as our priority is to ensure public safety". "We are now satisfied it is safe to be removed."

