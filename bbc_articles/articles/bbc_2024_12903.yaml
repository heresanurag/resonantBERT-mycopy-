title: Just Stop Oil activists deny Stansted Airport spray paint damage - BBC News
date: '2024-06-22'
section: England
url: http://www.bbc.co.uk/news/articles/ck55kedn98jo
content: |-
  Just Stop Oil had said Taylor Swift's private jet was at the airport.

  The jets appeared to have been sprayed at London Stansted Airport on Thursday

  Two women have denied causing £52,000 worth of damage after private jets were sprayed with orange paint by Just Stop Oil activists at Stansted Airport. Jennifer Kowalski, 28, and Cole Macdonald, 22, pleaded not guilty to causing criminal damage and interfering with national infrastructure. Ms Macdonald, of Baker Street, Brighton, East Sussex, and Ms Kowalski, of Williamson Avenue, Dumbarton, in West Dumbartonshire, were not asked to enter pleas to a third charge of aggravated trespass. Just Stop Oil had said the private jet of popstar Taylor Swift was at the Essex airport, but police said it was not there at the time.

  The pair were accused of using angle grinders to break through an airport fence at about 05:00 BST on Thursday before entering a taxiway with fire extinguishers filled with orange spray paint.

  Prosecutors said the cost of cleaning up the paint was £52,000, but the full extent of the damage to the fence and extra security was not known. Chelmsford Magistrates' Court heard 75 flights were disrupted during a 38-minute delay, affecting thousands of passengers. The pair were denied bail and were due to appear for another hearing at Chelmsford Crown Court on 22 July.
