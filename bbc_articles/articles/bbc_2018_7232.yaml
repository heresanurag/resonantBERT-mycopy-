title: '''Punish a Muslim Day'' letter suspect appears in court - BBC News'
date: '2018-06-15'
section: England
url: http://www.bbc.co.uk/news/uk-england-44491542
content: |-
  David Parnham is accused of 14 offences, including soliciting to murder and staging a bomb hoax.

  Images of a letter said to be promoting 'Punish a Muslim Day' were widely shared online

  A man accused of sending letters promoting "Punish a Muslim Day" has appeared in court charged with soliciting to murder.

  Anonymous notes calling for a coordinated attack on Muslims were sent to addresses across the UK.

  David Parnham, 35, from Lincoln, has been charged with a total of 14 offences, including staging a bomb hoax and sending threatening letters.

  He appeared at Westminster Magistrates' Court earlier and was remanded.

  He is due to appear at the Old Bailey on 29 June.

  Counter Terrorism Policing North East said Mr Parnham was charged "in connection with an ongoing investigation into offensive communications".

  Police said Mr Parnham was arrested in Lincoln on Tuesday, when searches took place at a home and an office building in the city centre.

  The letters were reportedly received in communities across England and Wales - including West Yorkshire, South Yorkshire, Leicestershire, London and Cardiff.

