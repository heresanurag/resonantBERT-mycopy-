title: Delight as painting stolen in 1979 returned to Chatsworth Estate - BBC News
date: '2024-08-28'
section: Derby
url: http://www.bbc.co.uk/news/articles/ce312k3gwzdo
content: |-
  A 17th Century painting is back at Chatsworth House after going missing for more than 40 years.

  The painting by Erasmus Quellinus II was stolen from a gallery in Eastbourne in 1979

  Art experts say they are delighted that a stolen painting has been returned to a stately home after being missing for 45 years. The 17th Century double portrait of Sir Peter Rubens and Sir Anthony van Dyck was stolen in 1979 while on loan to a gallery in Eastbourne. But now the oil on wood painting by Flemish artist Erasmus Quellinus II is back in its rightful home of Chatsworth House, near Bakewell in Derbyshire. Charles Noble, curator of fine art at Chatsworth, described the find as a "thrilling moment".

  Mr Noble said: "Firstly that somebody had put it up for sale, and secondly when it finally arrived back here at Chatsworth. "It was over 40 years ago, and after that sort of time, you don't expect a painting to reappear again." The late 11th Duke of Devonshire had loaned the picture, from the Devonshire Collections, to the Towner Art Gallery in Eastbourne. But on 26 May 1979 the painting, which first came to Chatsworth in 1838, was taken during a raid.

  The painting was eventually found more than 800 miles (1,287km) from its home in Derbyshire

  By chance it was spotted by Belgian art historian Bert Schepers at an auction in Toulon in France in 2020, and he alerted Chatsworth to its whereabouts. Thanks to a record of the work on the Art Loss Register (ALR), the seller agreed to give it back to Chatsworth, and the painting was returned in May after repainting and restoration. Lucy O’Meara, recoveries manager at ALR, said: "Despite that long period of time since the loss, we are delighted to have been able to secure its return to Chatsworth where it belongs, and this should give hope to others who are still seeking the return of pictures stolen decades ago.” Alice Martin, head of the Devonshire Collections, said: “We are very grateful to the expert team at the Art Loss Register for their assistance in recovering this painting. Their guidance was invaluable in securing a successful outcome." The painting is due to go on display at the National Galleries of Scotland’s Royal Scottish Academy building in November.
