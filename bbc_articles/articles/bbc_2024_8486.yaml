  The long-awaited vote comes as Kyiv faces a weapons shortage in its fight against Russia.

  The long-awaited vote on a critical $61 billion (£49 billion) aid package comes as Kyiv faces a weapons shortage in its fight against Russia.

  Supporters in the House cheered and waved Ukrainian flags while House chair Marc Molinaro called for order.

  Watch the moment it was passed.
