  Shekells handed first start as England change nine

  Jade Shekells showed off her powerful ball-carrying ability against Italy

  Coverage: Watch live on BBC Two, BBC iPlayer and online, listen on BBC Radio 5 Sports Extra and BBC Sounds, live text and video highlights on the BBC Sport website and app

  Centre Jade Shekells will earn her first start for England as one of nine changes made by John Mitchell for Saturday's Women's Six Nations match against Scotland in Leicester. Gloucester-Hartpury's Shekells, 28, was part of the GB Sevens squad at last year's Olympics in Paris and made her Red Roses debut off the bench against Italy in round one. Former England captain Marlie Packer, who is one try away from 50 for her country, also has not featured since the opening-round win over Italy in York and returns to start at open-side flanker. Zoe Aldcroft replaced Packer as England captain in January and remains the only Red Roses player to start every game this championship after being named at blind-side flanker. Maddie Feaunati was a standout performer in the opening two rounds before the return of Alex Matthews in the comfortable win over Ireland last Saturday, but the 22-year-old Exeter Chief is back to start at number eight. Lock Rosie Galligan replaces Morwenna Talling to partner Abbie Ward in the second row, while props Sarah Bern and Kelsey Clifford are rewarded with starts following their tries off the bench in Cork. Hannah Botterman and Maud Muir drop to the replacements, and with Amy Cockayne going for a scan on her pectoral muscle, Saracens hooker May Campbell is named on the bench to possibly make her third England appearance. "Marlie, whether she is playing or not, has always been inputting information," Ward said. "Even if she is not on the pitch, then she brings her experience. She has that energy and ferocity but she also has her other side, where she brings a calmness to the squad. "Playing or not, she is trying to elevate the squad." Scotland, who were defeated 46-0 by Mitchell's side last year, come into the fixture off the back of a disappointing 25-17 home loss to Italy, meaning their only victory this championship was a narrow win over Wales in round one. Following three bonus-point wins, victory for England in Leicester on Saturday, with defeat for second-placed France in Italy, would guarantee their seventh Six Nations title in a row, before a home Rugby World Cup which starts in August.

