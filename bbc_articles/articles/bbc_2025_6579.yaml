  Mitchell has opted to change his half-backs as Lucy Packer and Holly Aitchison come in for Natasha Hunt and Zoe Harrison. Saracens' Harrison has impressed in victories over Wales and Ireland to put pressure on Bristol Bears' Aitchison, who makes her first start at fly-half this Six Nations after being Mitchell's main starting 10 in last year's Grand Slam-winning side. Harlequins' Packer is the joint-highest try assist holder in this year's tournament alongside Harrison with four, and is too pushing for a regular starting spot. Full-back Ellie Kildunne and centre Megan Jones also featured with Shekells at the Paris Olympics and are retained from Cork. After missing last year's Six Nations with a neck injury, Exeter Chiefs wing Claudia MacDonald scored on her Red Roses return against Italy and replaces Jessica Breach to make her second start this campaign, with Abby Dow named on the opposite wing. Leicester native Emily Scarratt, who has 117 caps, is named on the bench after not featuring since the opening round in York. The 35-year-old was part of England's last World Cup win in 2014 and has featured in 52 Six Nations matches, losing just two. Scarratt celebrated her 100th cap in her home town with 10 points from the tee in England's last game in Leicester - a 69-0 hammering of Ireland in 2022. "When you have those opportunities to come home, they don't come around very often, especially when you don't live in London where so many of my games have been," Scarratt told BBC Sport. "It is a special occasion and there are not too many more opportunities to do that. "The crowd is close to the pitch and we know what a crowd in Leicester is like. Hopefully that is in full voice and right behind us." England are on a 23-game winning streak and are chasing a fourth successive Grand Slam, with wins for Mitchell's side and undefeated France on Saturday setting up a Grand Slam decider at Allianz Stadium on 26 April.

