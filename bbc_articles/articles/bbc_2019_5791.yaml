title: 'Sheffield deaths: House murders accused mother in court - BBC News'
date: '2019-05-27'
section: Sheffield & South Yorkshire
url: http://www.bbc.co.uk/news/uk-england-south-yorkshire-48422992
content: |-
  Tristen and Blake Barrass, aged 13 and 14, were found dead at a house in Shiregreen, Sheffield, on Friday.

  Floral tributes and balloons have been left at the scene in Shiregreen, Sheffield

  A mother has appeared in court charged with the murder of her two teenage sons at a house in Sheffield.

  Sarah Barrass, 34, is accused of murdering 14-year-old Blake Barrass and Tristen Barrass, 13, in the Shiregreen area on Friday.

  She appeared at Sheffield Magistrates' Court alongside Brandon Machin, 37, who also faces two counts of murder.

  The defendants were remanded in custody and are due to appear at Sheffield Crown Court on Tuesday.

  Ms Barrass has also been charged with three counts of attempted murder against two other children.

  No pleas were entered to any of the charges.

