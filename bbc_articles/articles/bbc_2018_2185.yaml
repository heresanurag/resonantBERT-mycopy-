id: bbc_2018_2185
title: Meet Grenfell firefighters running London Marathon in full kit - BBC News
date: '2018-02-09'
section: General
url: http://www.bbc.co.uk/news/uk-42995833
content: |-
  Firefighters who battled the tower block fire will carry 30 kilos each at the London Marathon.

  Nine members of the fire crew at Paddington Fire Station are doing the London Marathon wearing 30 kilos (66 pounds) of kit.

  They were among the first emergency services on the scene of the Grenfell Tower fire in June last year.
