title: Walking Dead comics artist Charlie Adlard's work displayed - BBC News
date: '2019-07-06'
section: Shropshire
url: https://www.bbc.co.uk/news/uk-england-shropshire-48459359
content: |-
  Charlie Adlard says he has had exhibitions all over the world but never in his home town Shrewsbury.

  Charlie Adlard was named the UK's comics laureate in 2016

  The comics artist behind The Walking Dead series is to be celebrated in an exhibition opening in his home town.

  Charlie Adlard, from Shrewsbury, Shropshire, has drawn the Walking Dead comics since 2004 and has also worked on The X-Files and Mars Attacks.

  He was named the UK's comics laureate in 2016 and Drawn of the Dead will be his first exhibition in Shrewsbury.

  Mr Adlard's "dystopian vision" will be displayed at the town's museum and art gallery until November.

  The Walking Dead, which Adlard has drawn since 2004, has since become a major TV drama

  The comics will be displayed alongside Mr Adlard's original sketches

  Mr Adlard has appeared in the TV version of the comics twice

  The Walking Dead series was turned into a popular TV show which has just run into its 10th season.

  Mr Adlard told the BBC he had appeared in the TV series twice as a zombie extra.

  "You couldn't see me, but I just really wanted the experience," he said.

  The exhibition will showcase more than 80 artworks

  Although his work has been on show around the world, this will be Mr Adlard's first exhibition closer to home

  The exhibition is going to be an "immersive" experience, Mr Adlard said

