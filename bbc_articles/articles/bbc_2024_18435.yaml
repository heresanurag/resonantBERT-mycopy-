title: Watch South Wales Police officers smash in door of wrong house - BBC News
date: '2024-08-13'
section: General
url: http://www.bbc.co.uk/news/videos/cg79zkvzy5jo
content: |-
  Natalie Gerrard was lying in bed when officers broke down her front door with a battering ram.

  A couple have been left "traumatised" after police mistakenly raided their home.

  Natalie Gerrard and her partner had the front door of their home in Bridgend county smashed in as they slept.

  Ms Gerrard said she was lying in bed in Caerau, Maesteg when officers executing a drugs bust broke down her front door with a battering ram on the morning of Saturday, 20 January.

  South Wales Police apologised to the couple and said "an error had been made in identifying the address upon the warrant".
