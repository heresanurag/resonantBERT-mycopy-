title: Thief complains after video stealing parcel appears online - BBC News
date: '2024-12-23'
section: General
url: http://www.bbc.co.uk/news/videos/c623qr1ep84o
content: |-
  The suspect, who stole a package off a front porch, returned days later after the victim shared footage of the theft on an app.

  Police in Gloucester Township, New Jersey are searching for two suspects after they were caught on doorbell surveillance video stealing a parcel off a front porch.

  One suspect was seen returning days later to complain after a video of the theft emerged online. The theft victim had posted the video on a neighbourhood monitoring app.

  The package contained four drinking glasses and baby items that cost about $74, according to police. The suspect also returned one of the drinking glasses, which was broken.

  The Gloucester Township Police Department is asking for help identifying the suspects.
