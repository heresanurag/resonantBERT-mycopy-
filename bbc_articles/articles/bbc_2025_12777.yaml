title: 'Club World Cup: Paris St-Germain''s Luis Enrique criticises pitch - BBC Sport'
date: '2025-06-24'
section: European Football
url: http://www.bbc.co.uk/sport/football/articles/cp862416n77o
content: |-
  Paris St-Germain boss Luis Enrique compares the pitches at the Club World Cup to "an NBA court full of holes".

  Paris St-Germain manager Luis Enrique has criticised the pitches at the Club World Cup and said the "ball bounced like a rabbit" during his side's win against the Seattle Sounders. The match was played at Seattle's Lumen Field, home of MLS side the Sounders and NFL team the Seattle Seahawks, with the stadium's artificial turf replaced with a temporary hybrid grass for the tournament. The Spaniard says football's world governing body Fifa needs to "bear in mind" the quality of both match and training pitches if it wants the Club World Cup to be "the most high-level competition in the world". "I wouldn't imagine a NBA court full of holes," the 55-year-old said after his side won 2-0 to secure top spot in Group B in the tournament, which is being solely hosted in the United States. "What I really care about is the state of the field of play, and I say this on the day we've won. "The ball bounces almost like if it were jumping around like a rabbit." Fifa say that the pitches used at the Club World Cup meet international testing standards and that they continue to monitor "key performance indicators" such as surface hardness and the roll of the ball on a consistent basis. "Fifa always values direct feedback from players and coaches," a Fifa spokesperson told BBC Sport. "In some cases, this has led to adaptive measures, such as pitch irrigation during cooling breaks being introduced for the first time under Fifa protocol to support optimal ball movement in warmer conditions."

  PSG won the Champions League at the end of May with a dominant victory over Inter Milan in Munich to complete a European and domestic treble. Luis Enrique said his team have had to adjust the way they play since their arrival in the US because of pitch conditions. "Lumen Field is an example, it used to be artificial turf and now it is natural grass and they have to water it by hand - they did so at half-time but the field was dry again in 10 minutes," he added. "For our game this a problem. It's very different to European pitches. The grass is different and therefore it is not so easy to have the same smoothness to play our style - but we did adapt well and we're very happy."

