  There are fewer than 12 months before the Fifa World Cup takes place across Canada, Mexico and United States. Real Madrid's Jude Bellingham also criticised the pitches at the Club World Cup following his side's 3-1 win against Pachuca. "The pitches aren't great at all. It holds up the ball, the ball barely bounces," said the England midfielder. "It's tough on the knees as well. Hopefully there's someone who will look at that going into the World Cup next year." Five of the venues from this year - Mercedes-Benz Stadium, Hard Rock Stadium, MetLife Stadium, Lincoln Financial Field and Lumen Field - will also host World Cup matches. All five are used by NFL teams and usually have artificial turf but will have real grass installed in time for the World Cup in order to meet Fifa requirements. The inaugural Club World Cup is not the first time the standard of pitches in the US has caused problems. Players were critical of conditions at last summer's Copa America, with Argentina goalkeeper Emiliano Martinez saying the field at Mercedes-Benz Stadium was a "disaster" following a win over Canada. Tournament organiser Conmebol defended the pitches, with director of competitions Fredirico Nantes saying "the grass in Atlanta posed absolutely no threat". The stadium will host eight matches at the World Cup next summer, including one of the semi-finals.

  The state of the pitches is the latest concern that has been raised at the Club World Cup. There have been concerns about the weather throughout the competition, with extreme heat causing problems for the players. Borussia Dortmund substitutes watched the first half of their win over Mamelodi Sundowns from the dressing room because of the temperature, with their manager Niko Kovac saying conditions were "like a sauna". Chelsea boss Enzo Maresca has said his side have struggled to train in Philadelphia, as temperatures reached 37C.
