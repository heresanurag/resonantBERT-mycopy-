title: 'Tokyo Olympics: Tom Dean takes gold & Duncan Scott silver for GB in 200m freestyle
  - BBC Sport'
date: '2021-07-27'
section: Olympics
url: http://www.bbc.co.uk/sport/olympics/57979697
content: |-
  Tom Dean claims a stunning gold and Duncan Scott silver to ensure a British one-two finish in a thrilling 200m freestyle at the Tokyo Olympics.

  This video can not be played To play this video you need to enable JavaScript in your browser.

  Tom Dean claimed a stunning gold and Duncan Scott silver to ensure a British one-two in a fast, closely-fought 200m freestyle at the Tokyo Olympics. Dean touched home in one minute 44.22 seconds, securing a British record in his debut Games. Scott finished just 0.04secs behind his team-mate, with Fernando Scheffer of Brazil taking bronze. It is the first time since 1908 that two male British swimmers have finished on the Olympic podium together. The 21-year-old Dean had a difficult build-up to Tokyo after twice contracting coronavirus in 2020, which at one stage left him unable to "walk up the stairs without coughing and wheezing". Unable to train for three weeks on each occasion, he told BBC Sport it had been a real setback "physically and mentally" prior to the Games. "The three week build-up back to training had to be structured to prevent any long-term damage to my heart and lungs, so it was scary," he explained. "It was upsetting because no-one takes six weeks off in the build-up to an Olympics. It was a real shock to the system." Despite the disruption, he arrived at the Games as the second-fastest man in the year, behind Scott. "When I was sitting in my flat in isolation, an Olympic gold seemed a million miles off," he said. "It is a real honour. I watched the flag go up and the anthems be played, it is the stuff of dreams."

  The two Britons high-fived before sharing a hug as their remarkable podium finishes were confirmed. Both swimmers looked shocked as they spoke to BBC Sport afterwards, with Scott describing it as an "unbelievable moment". The Scot was the favourite going into the race but Dean was able to back up his rapid start with a strong finish. Scott, who won European silver in May, said he was "just buzzing for Deano" as the two good friends allowed their victory to sink in. About 70 of Dean's family, former coaches and friends gathered in his mum's garden in Maidenhead to watch the race in the early hours, with a video of their celebrations going viral. "I'm delighted. It feels surreal at the moment, it feels like it's a bit of a dream," Dean's mum Jacquie Hughes told BBC One. "We decided, because we couldn't be there, how nice would it be for Tom to know his family and friends were together watching him."We invited some members of the [swimming] club, some neighbours and before we knew it there were 70 people in the garden watching on a big screen. "It was so joyous and full of passion. It was lovely. I spoke to Tom this morning and he said he watched the video over and over again."

