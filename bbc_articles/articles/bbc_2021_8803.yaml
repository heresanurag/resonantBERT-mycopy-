  The British team - including Adam Peaty, who won a historic 100m breaststroke gold on Monday - cheered the two on from the stands, with several reduced to tears by the emotion of the moment. "You can't describe that. When you have worked so hard, to share this medal moment with one of your best friends is an unbelievable feeling," two-time Olympic gold medallist Rebecca Adlington told BBC TV. "Duncan will be slightly disappointed because he was the fastest and the favourite but, at the end of the day, you can tell that if anyone were to beat him, he would want it to be his team-mate."

  It is the first time since 1908 that two British male swimmers have shared an Olympic podium

  Scott was quick to praise Dean, with the pair celebrating together on the podium as they received their Olympic medals. "He has come on so far in the last 18 months and it is a pleasure to watch," Scott added. "He is a good mate out of the pool and it is great to be able to compete against him." Dean's triumph ensured Britain won their fourth gold medal of the games after Peaty, Tim Pidcock, and Tom Daly and Matty Lee's successes on 'Magic Monday'. He returned to the pool on Tuesday to anchor home the British Men's 4 x 200m freestyle team to a spot in Wednesday's final. Alongside Matthew Richards, James Guy and Calum Jarvis, the quartet finished ahead of Australia and the United States - and faster than Italy, who won the other heat. Elsewhere, Britain's Kathleen Dawson finished sixth in the 100m backstroke, while Freya Anderson missed out on qualifying for the 200m freestyle. Britons Abbie Wood and Alicia Wilson qualified for the 200m individual medley in second and eighth position respectively. And American Lydia Jacoby was the shock winner in the 100m breaststroke, forcing her team-mate and Rio 2016 champion Lilly King to settle for bronze. The 17-year-old had to move from Alaska - where there is no Olympic-length pool - to train and benefited from the Games being delayed by a year to allow her to develop.

