title: Man creates carousel on Helsinki open water - BBC News
date: '2017-01-19'
section: General
url: http://www.bbc.co.uk/news/world-europe-38668375
content: |-
  A 200-tonne ice carousel has been created on a frozen bay in Helsinki. The carousel is said to be 36 metres in diameter.

