content: |-
  Health trusts say it is "too early" to assess the strike's impact, but there will be a "knock-on effect" for patients.

  'People seem to have got the message to stay away'

  Barnsley, South Yorkshire, is a town with a rich history when it comes to strikes. But the paramedic unloading an elderly patient from his ambulance today is not in a union - he's "just not that type" - so he's on shift and answering this emergency call as usual. He says it’s quiet in A&E today as "people seem to have got the message to stay away". But the pressure he’s under at work is definitely worse than ever. Four-hour waits outside Barnsley Hospital are frequent now – time spent waiting to hand over a patient which means he has to leave other calls for life-saving help unanswered. "It doesn't feel good," he tells me. So what does he think of his colleagues out on the picket line today? "It's their right of course. But I don't think it will make any difference." Nearby, a lady wheels her elderly father into A&E, his fractured wrist in a homemade bandage. They wouldn’t have called an ambulance anyway she says, but she still has no sympathy for the strikers. As a teacher, she tells me she’d never leave the pupils who need her like that, adding: “If you don’t like the pay, you can go and get a different job.”
