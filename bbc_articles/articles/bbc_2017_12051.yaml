title: Nigel Farage is most successful politician - Ken Clarke - BBC News
date: '2017-11-15'
section: General
url: http://www.bbc.co.uk/news/uk-41992013
content: |-
  Ken Clarke tells MPs that he pays tribute to Nigel Farage's "campaigning abilities" over Brexit.

  Former UKIP leader Nigel Farage is the "most successful politician of my generation", Tory MP Ken Clarke has told the Commons.

  Remain-supporting Mr Clarke told MPs that he paid tribute to Mr Farage's "campaigning abilities" as the Brexiteer had persuaded a "high proportion of the population" over Brexit.

  In response, Mr Farage thanked Mr Clarke and offered to buy him a beer.
