  Mr Graf said another newspaper had been in touch to ask about his "dead name" - the name he was known by in his former gender.

  When a trans person obtains a Gender Recognition Certificate (GRC) they legally identify with their preferred name and gender rather than their assigned one.

  The Daily Express said it would not comment on the tweet.

