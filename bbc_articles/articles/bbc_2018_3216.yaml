  A Sun spokesman said: "We don't think there's anybody that could come away from reading the feature on the front and the inside spread and not wish the couple the best for the future.

  "We've got an ongoing dialogue with the LGBTI community and always strive to ensure our stories are received in the way we intend.

  "Jake and Hannah's is a wonderful story and we hope they have every happiness."
