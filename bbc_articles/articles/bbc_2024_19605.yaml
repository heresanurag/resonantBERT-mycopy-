  Reports suggest Emma Ramsay, 19, died after an accident at her hotel on the Mediterranean island on Tuesday morning.

  Scots teenager dies in 'balcony fall' at holiday hotel in Ibiza

  Emma Ramsay was staying at a hotel in the San Antonio area of Ibiza

  A Scottish teenager has died while on holiday in Ibiza after reportedly falling from a hotel balcony. Emma Ramsay, 19, is reported to have died on Tuesday morning after the accident at the hotel in the San Antonio area of the Mediterranean island. Ms Ramsay, who was from Hamilton in South Lanarkshire, was described as "an absolute angel" by her family, with her mother saying their hearts "are forever broken". The Strathclyde University student had posted videos of her enjoying her holiday just hours before her death, saying in an Instagram post that she was "obsessed with this place".

  In a post on social media, her mother Barbara said her daughter was "my best friend in the whole world". She added: "I am going to miss you more than words will ever express. Rest in peace my sweet angel and sleep tight mummy loves you so so much." In another post, she wrote that the family's "hearts are forever broken." Lorna Lawson, the headteacher at Ms Ramsay's former school St John Ogilvie High, said they were "shocked and saddened at the heartbreaking news". She said: "Emma was an incredibly kind, hardworking, bright and talented pupil who contributed a great deal to our school community. “Our thoughts and prayers are with Emma’s family and friends during this incredibly difficult time. Emma will be missed and will forever hold a special place in our school.” Ms Ramsay had been the school's head girl, and was set to begin her third year studying law at Strathclyde University. A spokesperson for the university said: “Emma was a much-loved member of our student community and we are shocked and saddened by her death. "Everyone at the university offers our deepest condolences to Emma’s family and all those affected by this terrible incident." Colette Watson, the headteacher at St Mark’s Primary in Hamilton, also paid tribute to her former pupil. She said : “Emma was a lovely girl, caring and considerate and many of our staff have truly fond memories of her time with us. “This is terribly sad news, and our thoughts, prayers and profound sympathies go out to Emma’s family and friends.” The Olive Press, external newspaper in Ibiza reported that ambulances, local police, and the Spanish civil guard were called to the Hotel Vibra District, but that paramedics could not save the teenager's life. A Foreign Office spokesperson said: "We are supporting the family of a British woman who has died in Spain and are in contact with the local authorities.”
