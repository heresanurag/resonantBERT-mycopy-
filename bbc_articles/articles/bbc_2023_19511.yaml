title: Baby owl found living in family Christmas tree - BBC News
date: '2023-12-16'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-67733828
content: |-
  The Kentucky family says the bird went undetected for four days because it blended into the tree's branches.

  An owl was discovered living in a Kentucky family's Christmas tree.

  The bird was discovered when carpet cleaner Bob Hayes was working in the house and noticed the tree branches moving.

  The family says the bird was able to go undetected for four days because it blended into the tree's branches.
