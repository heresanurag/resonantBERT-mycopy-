content: |-
  These festive covers have appeared across one Welsh town, but who's behind it all?

  Christmas-themed bollard covers have appeared in one Powys town.

  The Knitting Nannas group, in Ystradgynlais, say they are trying to bring some festive cheer to the town.

  The group of local women, mostly in their 80s, began the project in June.

  Group organiser Cilla Davies says plans are already under way to replace them with new covers in spring.
