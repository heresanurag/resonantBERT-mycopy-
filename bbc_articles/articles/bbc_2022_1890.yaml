content: |-
  American Nathan Chen wins the men's figure skating gold but defending champion Yuzuru Hanyu's jump record attempt fails at Beijing 2022.

  This video can not be played To play this video you need to enable JavaScript in your browser.

  American Nathan Chen won the men's Olympic figure skating gold to end the hurt of 2018, but defending champion Yuzuru Hanyu's jump record attempt failed at Beijing 2022. For Chen, 22, it was redemption after nerves destroyed his jumps when he was the favourite four years ago. Yuma Kagiyama took silver and Japanese compatriot Shoma Uno the bronze. "It means the world. I'm just so happy," Chen said. "It's a whirlwind right now. I had a blast out there." With ground to make after after Tuesday's short programme, Hanyu, 27, had been trying to perform the first quadruple axel in competition but it ended in a fall and he came fourth. The climax of the event took place against the backdrop of uncertainty over what might be the legal issue that has so far prevented the handing out of the medals won in Monday's team event.

  This video can not be played To play this video you need to enable JavaScript in your browser. Winter Olympics: Acrobatic aerials, a photo-finish & sublime skills in day six best bits

  Four years ago, Chen - then aged 18 - arrived at the Pyeongchang Games as favourite for the gold medal but nerves got the better of him and he failed to land a single jump in his short programme. That meant he was in 17th place going into the second day, and although he wowed the judges with the top score in the free skate, the damage had already been done and he could only finish fifth. This year, the skate was firmly on the other foot. It was Hanyu who lost ground in Tuesday's short programme, missing his opening quadruple salchow because of a "hole" in the ice, while Chen put in a stunning display that earned a world record score for a short programme. Having watched Hanyu fall twice and his closest rivals perform before him on Thursday, Chen knew what he had to do when he took to the ice as the final skater.

  Performing to Elton John's Rocket Man, the American nailed his jumps in a performance that was as fun as it was technically superb. His final total of the short and free skates combined was 332.60, with Kagiyama scoring 310.05 and Uno 293.00. Since his disappointment four years ago, Chen has gone on to dominate the sport, winning three world championships in a row before finally getting his hands on Olympic gold.

  Yuzuru Hanyu had been aiming to become the first man since 1928 to win three Olympic men's figure skating titles. He was attempting a quad axel, which has never been performed before, despite no evidence in training this week that he could land one

