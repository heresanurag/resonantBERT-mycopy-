  The incoming Love Island host is guaranteed to be greeted in South Africa by one familiar face at least, in the form of boyfriend and Scottish comedian Iain Stirling - who does the voiceovers on the show.

  He greeted the announcement of her arrival by joking: "I wonder if she's single..."

  Caroline Flack has given her approval online over the decision to replace her with Laura Whitmore

  Flack gave her approval to the decision to appoint Whitmore too, via her Instagram story on Friday.

  "She loves the show as much as I do," she noted.

  Flack was charged with assault by beating following an incident at her Islington home in north London.

  Police were called to her house, where she lives with her partner, tennis player Lewis Burton, at 05:25 GMT last week.

  Officers attended after reports of a man being assaulted. The man was not seriously injured, police said.

  The 40-year-old will appear at Highbury Corner Magistrates' Court on 23 December.

  Announcing her decision to step aside, she said: "There have been a significant number of media reports and allegations into my personal life.

  "While matters were not as have been reported, I am committed to working with the authorities and I can't comment further on these matters until the legal process is over."

  She added: "In order not to detract attention from the upcoming series I feel the best thing I can do is stand down for series six. I want to wish the incredible team working on the show a fantastic series in Cape Town."

  ITV announced the winter spin-off in July following the show's success over the past five summers. The company said the 2019 series reached more than six million viewers and was the most-watched programme of the year at the time among adults aged between 16 and 34.

  In November, Whitmore took up her new role as a BBC Radio 5 Live broadcaster, as part of the station's shake-up to their weekend line-up, which also saw Scott Mills join.

  The 34-year-old had previously filled in on occasion and said at the time she was "thrilled" to return on a permanent basis with "big name guests from the worlds of politics, music and showbiz".

  The Bray-born star studied at Dublin City University and made her breakthrough as a TV presenter with MTV Ireland from 2008 onwards.

  She hosted I'm a Celebrity... Get Me Out of Here! NOW; a companion series to the popular ITV reality show from 2011-2015, before appearing as a contestant on Strictly Come Dancing in 2016.

  Unlike Flack, who won the competition in 2014, Whitmore was voted off the show following a dance-off with eventual winner Ore Oduba.

  Whitmore has also worked as a model and as a co-commentator for BBC Three on the Eurovision Song Contest Semi-Finals in 2014.

