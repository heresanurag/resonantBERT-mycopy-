  The alarm was raised when Chris Ellery went missing off Fishguard, with searchers unable to locate him.

  Man who went missing in Irish Sea thanks searchers

  Chris Ellery is now back at home with his family

  A man who went missing in a small boat in the Irish sea has thanked all those who helped search for him during his ordeal. Last Thursday, keen photographer Chris Ellery failed to return from a solo trip from Fishguard, Pembrokeshire, sparking a massive search. However, the 54-year-old from Bristol eventually turned up in Ireland on Saturday, walking into a local police station in County Wicklow where officers described him as "tired but OK". He took to social media to thank "everyone whose kind messages and support kept my family and friends going during these last few difficult days", before praising the "hundreds of RNLI and HM Coastguard volunteers" that searched the Pembrokeshire coastline for him.

  Mr Ellery added that he has since set up a Go Fund Me page to "help support these incredible organisations", external. His family had travelled to the port of Fishguard after they had not heard from him, with daughter Kenzie taking to social media to make an appeal for help. "Just to let everyone know I’m safe and sound back in the UK, I would like to express a massive thank you to everyone for your kind messages and support that kept my family and friends going during these last few difficult days," he said. Thanking his family for their support, Mr Ellery added: "One day I will share the difficult journey I experienced across the Irish Sea, but for now I will focus on the positive and lighter side of my time in Ireland." He described arriving on the shores of Kilmichael Point, "a beautiful remote part of Ireland".

  Mr Ellery, a keen photographer, had gone out on his boat, but had engine trouble

  "Then while walking to a local Garda police station, a kind soul called Shay pulled up in his car and asked if I would like a lift, telling me the nearest station was 26km away, but was happy to take me to the station in Baltinglass," he said. "Shay then told me he is currently not working, made his stopping more special, someone with little money would give his last penny to help a stranger." Mr Ellery walked into the station on Saturday, telling police officers his story, who helped put him in touch with his family. He described being "very emotional" when he heard their voices, saying locals made him feel welcome in the area. "Garda officer Brendan contacted a local B&B in Baltinglass," he said. "Owner Eammon offered me a warm welcome into his Horan accommodation and pub, introducing me to his selection of fine ciders and telling all the pub regulars 'this is Chris Ellery'. "The PM of Ireland posted a message of support about Chris after landing on the Irish shores from Wales. They laughed and chuckled about my story." Mr Ellery praised all those that had helped him, especially Shay, of whom he said: "Shay mentioned he would one day love to be a father. "Just one problem is he needs a girlfriend. So I would like to reach out to the lovely ladies of Ireland who are looking for love, Shay would make a wonderful husband and father."

  A Coastguard spokesman said Mr Ellery set off from French Camp Bay on Thursday expecting to return the following day. But as he headed west towards Ireland, his three metre (10ft) black inflatable boat had engine trouble. "He broke down, but managed to get it going again. But his phone had also stopped working," the spokesman said. "He came ashore in County Wicklow and made his way to a local police station. They contacted Dyfed-Powys Police."
