title: 'Local elections 2023: Reaction on the ground - BBC News'
date: '2023-05-05'
section: General
url: http://www.bbc.co.uk/news/uk-politics-65491348
content: |-
  The Conservatives have lost seats to Labour and the Liberal Democrats.

  Labour have won Plymouth and Stoke-on-Trent and have taken control of Medway Council in the local elections.

  Meanwhile, the Conservatives have lost their majorities in Tamworth, Brentwood, Hertsmere and North West Leicestershire, as counting continues in England.

  The Liberal Democrats have also gained council seats at the expense of the Conservatives.

  The majority of the local election results will not be confirmed until later on Friday.

