title: NY police officer pulls man from 20-storey window ledge - BBC News
date: '2024-09-20'
section: General
url: http://www.bbc.co.uk/news/videos/cgey71qrg3eo
content: |-
  The man in distress was barely holding on when emergency services arrived, according to police.

  Bodycam video shows the moment a police officer rescued a man in distress from a 20-storey window ledge.

  The man was barely holding on when emergency services arrived, according to the New York Police Department. Officers from Special Operations and Midtown South worked together to pull the man to safety.

