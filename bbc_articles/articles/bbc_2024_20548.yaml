content: |-
  Aaron Ramsdale completes £25m move to Southampton from Arsenal.

  Southampton have completed the signing of Arsenal and England goalkeeper Aaron Ramsdale for £25m. The Saints will pay an initial £18m for the former Sheffield United player, with an extra £7m in add-ons. The 26-year-old has signed a four-year deal at St Mary's and the club have the option of extending his deal by a further 12 months. "The way the manager wants to play, the way he was when I spoke to him, he was just full of so much enthusiasm. I’d never met him before but he made me feel about eight feet tall, which is just what you want." Later on Friday, Southampton also confirmed the signing of winger Ryan Fraser on a free transfer. The 30-year-old mutually agreed to terminate his contract with Newcastle United which allowed him to join the Saints on a two-year deal. Fraser's arrival was confirmed shortly after the departure of highly rated 18-year-old left back Jayden Meghoma, who has joined Brentford in a move that could reportedly be worth up to £10m. Ramsdale, capped five times for England, was selected for Gareth Southgate's Euro 2024 squad. He made 89 appearances for Arsenal after a £26m move to the Emirates from Sheffield United in 2021. "Aaron is a real statement signing for us," said Southampton boss Russell Martin. "I’m very grateful to ownership and the board for making it happen, especially as so many other clubs were keen to get him." Ramsdale had been linked to a move to Wolves. The ex Bournemouth goalkeeper attended Southampton's play-off win against Leeds United in May in support of close friend David Brooks, who was on loan with the Saints from the Cherries.

  Ramsdale in fancy dress as Harry Potter character Hagrid at the 2024 play-off final

  There is a tradition in the pair's friendship group to attend an end-of-season match in fancy dress, which saw Ramsdale dress up as Harry Potter character Hagrid at Wembley. Southampton's announcement video saw Ramsdale dress up as Hagrid once again to confirm his move. Arsenal expect to complete a season-long loan move for Bournemouth goalkeeper Neto to replace Ramsdale.

  Scotland international Fraser played a significant role in Southampton's promotion from the Championship during a season-long loan deal from Newcastle last term. He played 44 times for Martin's side during the 2023-24 campaign, including the play-off final victory against Leeds United, while also scoring eight goals. And with 173 Premier League appearances to his name, Martin is delighted to welcome back his wealth of experience to the club. “Everyone could see the quality and creativity he has and he delivered in so many big moments for us," said Martin. "What many people outside of the building won’t have seen is the impact he also had off the pitch within the group, and it’s fantastic for us to be able to keep someone not only with great ability, but the same level of character too." Fraser, who has also played for Bournemouth in the English top flight, added: "I'm probably the happiest man in Southampton at the minute. "It's been a long summer from the play-off final to now, but my number one goal was to get back here and now that it's happened it's one of my proudest moments to be honest."
