title: 'Newspaper headlines: ''No-fly throne'' and ''Labour turmoil on ruling'' -
  BBC News'
date: '2025-04-17'
section: The Papers
url: http://www.bbc.co.uk/news/articles/c39j70x72gzo
content: |-
  A range of stories make Friday's front pages including a drone ban around King Charles estate in Sandringham.

  The fall-out from the Supreme Court's ruling on the legal definition of a woman is the focus of a few of Friday's papers. The Daily Mail, external is reporting that the equalities watchdog has been inundated with calls from organisations seeking clarity on how to enforce the decision. The Daily Telegraph, external says Britain's largest bank, Lloyds group, has vowed "solidarity" with trans workers and told staff that it remains "committed to inclusivity". Details about a new, daily, weight loss pill also feature on a number of the front pages including the Times, external which reports that trial results have found that the drug - which is called Orforglipron - controlled type 2 diabetes and helped patients to shed pounds. The Daily Express, external headline declares that the drug will be "revolutionary".

  The Guardian, external reports that ministers are "scrambling" to avoid a rebellion this summer when MPs vote on controversial cuts to disability benefit payments. It says Labour backbenchers may be offered the opportunity to "abstain" to avoid embarrassing the government, which is due to hold a vote in June. A potential trade deal with the US is the lead for the i Paper, external. It reports that the UK is under huge pressure to cut food standards to win a trade deal with America - and prevent the next round of Donald's Trump tariffs hitting Britain. The paper says that the government has repeatedly ruled out allowing "chlorinated chicken" or "hormone treated beef" from the US onto the UK's supermarket shelves. But it quotes Tom Bradshaw - president of the National Farmers Union - as saying that "there are serious concerns" about the pressure being applied to British negotiators to weaken its standards as a "concession for lower tariffs". The Sun, external reports that a no-fly-zone has been imposed over the King's home at Sandringham, after several drones were spotted above the estate ahead of the Ukrainian President's visit last month. The paper says the ban will be in place for a year. "No-fly throne" is the headline.

