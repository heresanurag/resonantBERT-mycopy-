  Watch: Moving and spectacular D-Day commemorations

  World leaders and royalty met with D-Day veterans to honour their sacrifice in World War Two and remember those who died.

  Events took place in France and the UK to mark the 80th anniversary of the Allied invasion of France.

  On 6 June 1944, tens of thousands of soldiers landed on five beaches in Normandy, northern France.

  The landings were the start of the campaign to liberate Nazi-occupied north-western Europe.
