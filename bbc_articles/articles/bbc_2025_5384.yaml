  His defamation action says she admitted being pressured into making false claims, in an "evil conspiracy".

  Jay-Z sues woman who dropped rape claim against him

  Jay-Z is suing a woman who in February withdrew her legal action accusing the rapper of rape. His defamation action claims she "voluntarily admitted" being pressured into making false claims in what it describes as an "evil conspiracy" to extort money and damage his reputation. The anonymous woman filed her legal action in October and refiled it in December, accusing Jay-Z, real name Shawn Carter, and Sean "Diddy" Combs of raping her aged 13, after the 2000 MTV Video Music Awards.

  The shocking allegations and conspiracies surrounding hip hop mogul Sean 'Diddy' Combs. Each week we'll unpick the latest news and rumours, and dig into a culture in the spotlight.

  Jay-Z's defamation action, filed at a federal court in Alabama, also accuses the woman's lawyer, Tony Buzbee, and his co-counsel, David Fortney, of orchestrating her lawsuit. Mr Buzbee has garnered headlines internationally over the dozens of legal actions he has filed on behalf of people accusing Mr Combs of sexual misconduct, extortion, assault and other transgressions. Mr Combs has denied all the allegations. He is also facing federal sex-trafficking and racketeering charges, to which he has pleaded not guilty.

  Jay-Z's defamation action says the woman told his legal team her lawyers had made her make the false allegations. "Buzbee brought Jay-Z into it," it says she said. And despite her admitting Jay-Z "did not sexually assault [her]," Mr Buzbee "pushed [her] towards going forward" with the false story to strengthen the case and extort more money, the defamation suit claims. Jay-Z's action also notes alleged discrepancies in the woman's interview with NBC News last year, including naming another celebrity guest at the MTV party, who had, in reality, been performing in a city thousands of miles away on the night. Her father also contradicted her claim he had picked her up after the alleged assault, it claims. Jay-Z's defamation action says Mr Buzbee's firm failed to vet the claims and the woman, who they say has a history of mental health issues and an assault charge.

  Mr Buzbee has denied any wrongdoing and claims Jay-Z's team tried to intimidate the woman into retracting her statements. In a statement obtained by BBC News, Mr Buzbee said Jay-Z's defamation action had "no legal merit". "Shawn Carter's investigators have repeatedly harassed, threatened and harangued this poor woman for weeks, trying to intimidate her and make her recant her story," Mr Buzbee said. "She won't - instead, she has stated repeatedly she stands by her claims." Jay- Z, who is married to Beyoncé, says the accusations have led to personal and professional harm, including the loss of business contracts worth about $20m (£15.8m) a year for his company, Roc Nation, and taken an emotional toll on his family, particularly his children.
