content: |-
  Abdelkader Hammad is a surgeon currently stuck in Gaza, and was speaking to the BBC when two explosions went off in the building next door.

  Abdelkader Hammad is a surgeon at Royal Liverpool Hospital currently stuck in Gaza, he was being interviewed when two explosions went off in the building next door.
