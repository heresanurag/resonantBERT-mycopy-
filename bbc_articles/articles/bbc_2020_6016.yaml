content: |-
  Police confirm three people have died and another three are seriously injured.

  A large police investigation is underway in Reading, Berkshire, following a stabbing incident at Forbury Gardens.

  Thames Valley Police have confirmed three people have died and another three are in a serious condition in hospital.

  A man was arrested at the scene and is now in custody.
