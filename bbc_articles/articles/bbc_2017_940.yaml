  How much do you know about famous cases of nepotism?

  US Democrats say that President-elect Trump's plans to employ his son-in-law as a special adviser may be in breach of anti-nepotism laws.

  History is littered with examples of people giving out - and just being accused of giving out - jobs to their nearest and dearest. Take our quiz to test your knowledge of nepotism:

