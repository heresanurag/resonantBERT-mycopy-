title: BT email access restored after earlier outage - BBC News
date: '2025-02-15'
section: Technology
url: http://www.bbc.co.uk/news/articles/c8xq0gey2pno
content: |-
  The broadband provider says an earlier issue is no longer impacting customers.

  An issue which left thousands of BT customers unable to access their emails on Saturday morning has been resolved, the broadband provider has confirmed. Reports of an outage started spiking from 05:00 GMT according to tracking site Downdetector, which received a peak of more than 5,000 complaints from customers. But in a updated statement shortly after 14:00 on Saturday, BT said that the problem had been fixed and apologised to customers who had been impacted. Other services including Broadband, TV and mobile packages were unaffected.

  The outage appeared to be nationwide, with customers taking to social media to report issues from Aberdeenshire and Dumfries in Scotland to Warwick, Norfolk and Wakefield in England. BT had said earlier that it was investigating the cause of the outage, and suggested those impacted switch off wi-fi and use mobile data to access their email. "Email is not working. What is problem? When will it be fixed?" wrote one user, Paul Hough, who tagged the provider in a post on X. "Unable to login BT Email. Getting the message 'BT Server Outage. Try again later'," said another customer. Others reported that they were able to access their emails after switching from wi-fi to mobile data.

