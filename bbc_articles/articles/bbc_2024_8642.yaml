title: 'London Marathon: Man paralysed on one side eyes world record - BBC News'
date: '2024-04-22'
section: General
url: http://www.bbc.co.uk/news/uk-england-london-68854638
content: |-
  Ahead of the big race, the lifelong Spurs fan met with defender Ben Davies for some encouragement.

  Anthony Bryan had a brain tumour as a child and then suffered a stroke after the operation, subsequently losing the use of the left side of his body.

  The lifelong Tottenham Hotspur fan will be running the London Marathon this year, raising money for the Stroke Association.

  But he'll also attempt to break the Guinness world record for the fastest marathon for someone paralysed down one side of their body, the current record being five hours 50 minutes.

  Ahead of the big race, he met up with Spurs defender, Ben Davies, for some words of encouragement.
