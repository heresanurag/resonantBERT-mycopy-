title: More time for suspects after PC Christopher Miller "hit-and-run" - BBC News
date: '2025-05-26'
section: Beds, Herts & Bucks
url: http://www.bbc.co.uk/news/articles/ckg46ey3eyno
content: |-
  Thames Valley Police says two men remain in custody after a warrant of further detention was granted.

  Thames Valley Police said PC Christopher Miller, 38, suffered very serious injuries

  Police investigating a suspected hit-and-run in which an officer was critically injured have been given more time to question two suspects. PC Christopher Miller, 38, has been in hospital with life-threatening injuries since the incident on the B416 in Stoke Poges, Buckinghamshire on Thursday night. Two men, aged 28 and 38, from Slough, Berkshire, were arrested on suspicion of attempted murder and causing serious injury by dangerous driving. Thames Valley Police said the suspects remained in custody after a warrant of further detention was granted.

  The suspected hit-and-run happened on the B416 at Bells Hill in Stoke Poges

  The force added that a 37-year-old woman from Slough, Berkshire, who had been detained on suspicion of assisting an offender and perverting the course of justice, has been released on police bail. A 43-year-old man detained for the same two offences has also been released on police bail. The incident happened at about 22:20 BST when a white BMW struck PC Miller - who was on foot - and failed to stop, police have said. His injuries were described as "life-threatening" and his family and close colleagues are being supported by specially trained officers.

  Deputy Chief Constable Ben Snuggs said: "All officers should expect to return home safely after each tour of duty and we wish Christopher a swift and full recovery."

