  Meg Bellamy says she was trolled online while playing the future Princess of Wales in The Crown.

  Trolls told me I was too fat to play Kate - Crown star

  Meg Bellamy, who played a young Catherine Middleton in Netflix drama The Crown, has said she was told by internet trolls she was "too fat" for the role. The actress, 21, starred in the final season of the show which depicted the courtship of William and Kate - now the Prince and Princess of Wales - at the University of St Andrews. Speaking to the Mail on Sunday's You magazine, external, Bellamy said when she looked at her phone after a long day of doing press interviews, she found "all this negative stuff" about her body online. "The comments were mostly 'You're too fat to play Kate'," she added.
  • None Queen's friend says Netflix show 'makes me so angry'
  • None How The Crown could undermine the crown Bellamy, from Berkshire, starred opposite Ed McVey who played William. Luther Ford also joined the cast in season six, as Prince Harry. It was the first major role for all three young actors. In the interview, Bellamy described the comments from internet trolls as "a glimpse into being a woman in this industry. "I thought, 'OK, that's a sign to distance yourself, because it doesn't mean anything'. "You can't listen to that sort of stuff. Not least because most of it is written by internet trolls, or men called Gary who are holding a fish in their profile picture."

  Luther Ford, Meg Bellamy and Ed McVey played Prince Harry, Catherine, and Prince William respectively

  Bellamy indicated she was staying positive about her experience, adding that she has had "so many amazing things" happen to her. "They're the losers for saying that. I'm living my best life over here." Bellamy said that since wrapping filming, "I've tried to put the character behind me". But reflecting on Catherine's cancer diagnosis, she added, "I so feel for her and for the family." In a video message in March, the Princess of Wales revealed she was receiving cancer treatment after her diagnosis. The final series of the royal drama, which came out towards the end of last year, split critics. It covered events including the death of Princess Diana and the aftermath in which her ghost appears to Prince Charles and the Queen. It also portrayed the Queen's Golden Jubilee in 2002 and the wedding of Prince Charles and Camilla in 2005. The show has received some criticism over its historical accuracy. But Netflix previously said the series "has always been presented as a drama based on historical events". The role of the late Princess Diana was depicted by Australian actress Elizabeth Debicki in both series five and six. Bellamy said Debicki has been "so supportive" of her. "I can call her about anything," she added.
