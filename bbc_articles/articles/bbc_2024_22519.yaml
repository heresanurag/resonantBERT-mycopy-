content: |-
  Ollie Pope has done a fine job as England's stand-in captain but must find a serenity to his batting, says Jonathan Agnew.

  'Pope's challenge is to find calm at the crease'

  This video can not be played To play this video you need to enable JavaScript in your browser.

  I have an enormous amount of time for Ollie Pope. I first got to know him on England's tour of New Zealand in 2019. Joe Root, then the captain, arranged some evenings for former England players, raising money for charity. One was a quiz night and Pope was captain of my team. I have called him "skipper" ever since and here he is captaining England. He is very chatty, very polite, always with something to say. Put simply, he's a really nice guy. The role of a vice-captain, in any team, is an interesting one. Often that player is a foil to the captain, a different kind of character so the two bounce off and complement each other. Sometimes the vice-captain is the one the players confide in, or seek information from. The vice isn't always the right man to be the next captain, either. Just because someone is a good vice-captain, that doesn't necessarily make them a great leader. Marcus Trescothick was actually Nasser Hussain's vice-captain before Michael Vaughan took on the captaincy, and England made absolutely the right decision in promoting Vaughan. For Pope, the move to make him vice-captain to Stokes followed their recent history of succession planning around a young batter. Until Harry Brook came along, Pope seemed nailed on to be England's next Test captain, but it's probably not as straightforward now.

  Still, when Stokes' hamstring injury ruled him out of this Sri Lanka series, England were correct to turn to Pope. As a leader, he has done a fine job. In both Tests, at Old Trafford and Lord's, there have been times when the conditions were benign, batters set and the bowlers in need of inspiration. Pope has had to think hard to come up with plans to find wickets. He can do no more than have two wins from two Tests, albeit if a 100% failure rate with the DRS system needs some work. Inevitably, a new captain's performance with bat or ball will also come under scrutiny. You are still in the team to score runs or take wickets and, often, a skipper will experience a spike in their output. That has not been the case for Pope, who has contributed just 30 runs in his four innings as captain. The problem for Pope is not the lack of runs, but the way he has been getting out and how he has looked at the crease, neither of which have been different to how he batted before the captaincy came along. Pope's position at number three is suited to a calm personality because of the range of different situations a player can find themselves in. Pope, though, does not give off that feeling of calmness. Everything seems jittery, frantic and rushed. At this point, I should say that the game is littered with lots of successful players who arrived at the crease as a ball of energy. Kevin Pietersen was famous for a 'Red Bull run' at the start of his innings and, back when I was playing, Derek Randall would come to the middle chatting away. As a bowler, I was always told not to say anything to Derek, because a conversation would calm him down.

