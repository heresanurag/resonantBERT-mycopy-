  Pope's challenge is to find that serenity. Can he play his first 20 deliveries happy in his own mind that the bowler might be on top? Can he give himself the chance to get set at the crease? When he does, we know he is capable of playing match-winning innings. His 196 in the first Test against India in Hyderabad earlier this year was one of the greatest knocks ever by an England player overseas. England will be patient with him. He is captain for the final Test at the Oval and when he returns to the ranks I would be stunned if he does not get all of the three Tests in Pakistan and three in New Zealand before Christmas to find his best form. They will be desperate for him to succeed. In looking for that calmness, Pope can do no better than the man next to him in the batting order. At Lord's, Root scored his 33rd and 34th Test hundreds, surpassing my Test Match Special colleague Sir Alastair Cook as the man with the most centuries for England. It is incredibly difficult to compare players from different eras, but Root's numbers speak for themselves. He is absolutely outstanding in every facet of batting: front foot, back foot, pace, spin. He really does have every base covered. As far as the summer is concerned, everything has gone to plan for England, with the exception of the injury to Stokes. They have five wins from five Tests and the opportunity for the clean sweep in the final match of the series against Sri Lanka at the Oval next week – they haven't gone through a summer winning every Test since 2004. I expect them to do just that. I can't see anything other than an England win.

