id: bbc_2025_2830
title: 'NI Education: Teachers reject pay rise of 5.5% - BBC News'
date: '2025-02-06'
section: Northern Ireland
url: http://www.bbc.co.uk/news/articles/cg45py7wdrzo
content: |-
  All five teaching unions in Northern Ireland are joined the strike action in April 2023

  The majority of teachers in Northern Ireland have rejected a 5.5% pay offer for 2024/25 and are set to take action short of strike. BBC News NI understands that some of the terms of the offer on workload and strike action had proved to be contentious. Teaching unions had received the 5.5% offer from the employers, including the Department of Education (DE), on Friday. It was expected to have cost the Northern Ireland Executive about £49m.

  But members of a number of teaching unions have declined to ratify the offer. BBC News NI understands that members of the National Association of Head Teachers (NAHT) were the exception. The NAHT's position, which has just been communicated with members, has been to accept the pay offer. Teaching employers have said they are disappointed that the pay offer has not been ratified, and are calling on trade unions to cease their intended industrial action and bring forward proposals to resolve the dispute.

  The offer from the employers had said that schools needed "a prolonged period of stability free from industrial action and the threat of industrial action." It also asked teachers to accept that "industrial action should only be taken as a last resort in any dispute". The offer also said that teachers should "commit to a period free from industrial action in the context of the agreed future pay negotiation timeframes and implementation of the agreed work programme". Union leaders subsequently said that did not mean that teachers had to waive their right to strike. The pay offer also specified how many days and hours teachers should work. Unions had carried out a short consultation with teachers on the offer, but that did not provide the necessary backing for the deal.

  Teaching unions had suspended planned action short of strike while negotiations on the pay deal took place, but they will now resume that action from Monday. That is likely to affect some school activities like like school meetings, meetings with parents, administrative tasks, planning and participation in board of governors' meetings. Some teachers who had contacted BBC News NI had expressed unhappiness with the offer, with one saying it was "not a pay issue, but a workload issue". Members of the main teaching unions had previously voted for strike action and action short of strike due to the lack of a satisfactory pay offer for 2024-25. However, while action short of strike is to resume, no strikes have yet been announced by the unions.

  The INTO union said it "remains committed to finding an uplift that is acceptable to our members"

  In a communication to members, the NASUWT union said almost 80% of about 6000 members had voted against the pay offer. "Action Short of Strike (ASOS) will commence on Monday 10 February," the union said. "This result sends a clear message that our members are united in their demand for a fair and reasonable settlement without needless conditions being imposed on teachers. "We will continue with this action until a reasonable and fair deal is achieved for teachers. "Your voice matters, and together, we will work towards achieving the outcome you deserve."

  In a joint statement, the Northern Ireland Teachers Council (NITC), the body which represents all unions, said that they remained "committed to engaging in further negotiations in an effort to reach clear and unrestricted pay award for teachers for 2024/25." The INTO's Northern Secretary, and Secretary of NITC, Mark McTaggart said that "members and school leaders have informed us that they were unhappy with the perceived restrictions included in last weeks offer". "It is disappointing that ongoing negotiations have failed to find an amicable resolution," he said. "INTO remains committed to finding an uplift that is acceptable to our members, in the meantime, Action short of Strike will commence on Monday 10 February." The NAHT's acceptance of the offer will not impact the overall failure of NITC to accept it, which has been the decision of the majority of union members. But NAHT members may be expecting that their acceptance of the offer to be honoured. Where this takes their union, made up of school leaders, remains to be seen as they have affirmed their commitment to consider their next steps in consultation with their membership.

  In a statement, the Management Side of the Teachers' Negotiating Committee expressed its disappointment that the NITC did not accept this years pay offer. It said its offer of a 5.5% cost of living increase and commitments on workload issues would require additional funding of £83m funding each year. Management Side chair Eve Bremner said the "substantial" offer was at the "limits of affordability" and that industrial action will have "serious implications for children and young people's education". "We are committed to achieving the best possible outcomes for pupils and teaching staff. I would therefore again call upon the trade Unions to cease their intended industrial action and bring forward proposals to resolve this dispute," she added.
