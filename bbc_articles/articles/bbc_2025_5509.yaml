title: Scranton helped the US aid Ukraine. Now its role is uncertain - BBC News
date: '2025-03-06'
section: World
url: http://www.bbc.co.uk/news/articles/cz7v1ejv01go
content: |-
  Scranton's ammunition plant makes weapons for Ukraine, and Zelensky paid it a visit last year.

  This city helped the US back Ukraine. Now its role is uncertain

  This video can not be played To play this video you need to enable JavaScript in your browser. Watch: How an ammunition plant in Scranton played a role in the Ukraine war

  US President Donald Trump's pause on military aid and intelligence sharing for Ukraine has left the war-torn country's residents uncertain about their futures and rattled America's European allies. But it also hit far closer to home in Scranton, Pennsylvania, a city about 4,700 miles (7,560km) away from Kyiv that has played its own small role in the conflict. Scranton is known as the setting for the American version of The Office television show, and as the birthplace of former President Joe Biden - one of Ukraine's biggest backers. But after Russia invaded Ukraine, it has become known as the home of the Scranton Army Artillery Plant among those who have followed the conflict closely. Owned by the US government and operated by defence contractor General Dynamics, the plant produces the 155mm artillery rounds - a key munition that has helped the Ukrainians keep Russian advances at bay. These rounds are used daily, as the conflict grinds on into World War I-style trench battles and artillery strikes. "Scranton is the only place the metal cases for 155mm ammunition are made in the US," said former Defense Department official Christine Michienzi, who led the effort to scale up production of weapons systems sent to Ukraine. Ukrainian President Volodymyr Zelensky toured the plant during a whirlwind trip to Scranton in September 2024, shaking hands with staff and observing its machinery. Scranton is one of three plants in Pennsylvania that has increased production of the 155 mm rounds since the start of the Ukraine-Russia conflict. Between 2009 to 2017, they collectively produced about 9,000 rounds per month. By the time of Zelensky's visit last year, the facilities had ramped up their output to 36,000 rounds monthly, the US Army said, external. During the Oval Office meeting that caused the Trump administration's relationship with Ukraine to collapse, Vice-President JD Vance cited the tour to accuse Zelensky of campaigning "for the opposition" during his visit.
  • None One day, three crises and Trump's free-wheeling foreign policy on display Despite all the politicial drama, this Pennslyvania community continues to see its work as representing the US commitment to Ukraine, said Scranton Mayor Paige Cognetti. "We have multiple Ukrainian churches here. We have quite the diaspora of Ukrainian Americans," Cognetti said. St Vladimir Ukrainian Catholic Church in Scranton has raised funds for the war effort and hosted Ukrainian soldiers at community events. "Scranton has a very proud history of supporting Ukraine," Cognetti told the BBC, "and it's been a really tough couple of weeks here, as we see that support erode from the US administration."

  Cognetti was unsettled by the Oval Office argument between Trump, Zelensky, and Vance last Friday. "To see US policy shift and potentially to have the US really turn its back on Ukraine is really appalling," she said. The Scranton artillery plant "ensures warfighters have the ammo when and where needed, and continues to bolster US stockpiles around the globe," said Lt Gen Chris Mohan, deputy commanding general and acting commander, in a statement about Zelensky's visit. Cognetti said that the plant had added "many dozens" of jobs and increased capacity during the Ukraine war, estimating that about 400 people worked there when Zelensky visited. But with the Trump administration now pressuring Zelensky to end the war, Scranton's role in geopolitics could be winding down. US National Security Adviser Mike Waltz confirmed on Wednesday that the White House had paused intelligence sharing with Kyiv, telling reporters: "We have taken a step back." The Trump administration is reviewing "all aspects of this relationship", he added. Republican lawmakers have backed Trump's recent actions, which they see as key to negotiating an end to the war. "I think the president just wants to get everybody to the table, and I think he's making progress," South Dakota Senator Mike Rounds told reporters. There are different estimates for how much military aid the US has given Ukraine, a BBC Verify analysis found. The German-based Kiel Institute estimated the total at $119.7bn (£94.3bn). The US Department of Defense provided a total of $182.8bn, which includes spending on Operation Atlantic Resolve - a response to Russia's invasion of Ukraine. Fedir Venislavsky, a member of the Ukrainian parliament's defence committee, told the BBC that without US military aid, front-line soldiers would be able to last "maybe six months."
  • None What pause in US military aid could mean for Ukraine The region is home to multiple military manufacturing plants, including a Lockheed Martin facility and the larger Tobyhanna Army Depot, which also produces some supplies for Ukraine. Representatives for the Scranton Army Ammunition Plant declined to comment on how the pause could impact the plant and jobs. On Tuesday, cars pulled into the secure facility as usual, and its car park appeared full. "Even if there is a permanent freeze, Scranton will continue to produce large numbers of 155mm ammunition for the foreseeable future," said Ms Michienzi. "It will take many years to manufacture millions of rounds to replenish US inventories, plus rounds for some of our allies." Any effect would be minor for Scranton's economy, local officials said. The plant "is not the largest employer by any stretch," said Bob Durkin, president of the non-partisan Scranton Chamber of Commerce. "But it's a very important employer. The jobs are really high quality jobs. They are well paying, family sustaining jobs." Outside the plant's gates, Scranton's perspective on the war remains divided. Though Scranton, in north-east Pennsylvania, is a historically Democratic area, Republicans have made political gains in the region. In the 2024 presidential election, Trump won the state, but narrowly lost Lackawanna County, where Scranton is located, to then-Vice-President Kamala Harris. However, in the House race, Republican Rob Bresnahan ousted Democratic congressman, Matt Cartwright, by just 6,200 votes. Trump campaigned against US spending on Ukraine, a pledge that resonated with his base. On Tuesday, just before his speech before Congress, denizens at the local Poor Richards dive bar were split on Ukraine - and what role Scranton ought to play on the world stage. "I feel really angry about the way Trump handled the meeting with Zelensky," said Brandon Lux, 35, who worked in mental healthcare in Scranton. "Halting all government funding to Ukraine right now, I think that that will definitely have implications for what happens here in our city."

  Fran Fitzgerald, who was celebrating Mardi Gras at a local Scranton bar, wants the US to focus its spending

  But other residents felt Trump was correct to pressure Zelensky and to reassess Biden's support of the embattled country. "We don't have money to give them, we have to take care of our people first," said Fran Fitzgerald, who described herself as a "big fan" of Trump. Ms Fitzgerald said she hoped the Trump administration could direct the funds being used in Ukraine to projects like fixing Scranton's "terrible roads" and potholes. Mike Pierson, an electrician, voted for Trump but does not necessarily agree with all his actions so far. The self-identified independent worried that Elon Musk and his Department of Government Efficiency taskforce would endanger his Social Security benefits. He hopes to retire within the next five years. But Mr Pierson echoed the president's argument that the US should not be spending money abroad on conflicts like Ukraine, but back at home. "We're the world's bank, we're the world's insurance policy," he said. "We need to stop."
