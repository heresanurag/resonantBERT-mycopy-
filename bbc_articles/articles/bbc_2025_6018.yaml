  Trump recognises tariff 'transition problems' as US markets fall again

  This video can not be played To play this video you need to enable JavaScript in your browser. Watch: Trump cites 'transition costs' and 'problems' in wake of tariff fallout

  Donald Trump has said there will "always be transition problems" and "difficulty" as markets fell again amid continued uncertainty over the US president's global tariff war. His statement on Thursday comes hours after the White House said that tariffs on China would reach 145% for some products due to a pre-existing 20% levy imposed on those producing the drug fentanyl. Despite this, Trump said he was still hoping to secure a deal with China. "I think we'll end up working something out that's very good for both countries. I look forward to it," he said. Meanwhile, markets continued to face a turbulent time on Thursday, following Trump's 10% tariff announcement for all countries except China.

  Trump on Wednesday paused his threat to impose tariffs as high as 50% on "worst offender" countries, but pressed on with his trade war with China. Beijing has shown no sign of backing down, this week increasing its retaliatory tariffs to 84% on American products. The three major US stock markets managed to regain some initial ground early on Thursday. However by closing, the S&P 500 lost 3.6%, the Dow Jones 2.5% and the Nasdaq 4.31%. Warner Bros Discovery shares fell 14% on Thursday, while Amazon and Apple who were both down 7%.
