  • None What does Trump's tariff pause mean for global trade? In a televised cabinet meeting, Trump said there would "always be transition difficulty" but added that "it was the biggest day in history in markets". He said that investors were happy with how the US was running and that they were "trying to get the world to treat us fairly". He claimed that "everybody wants to come and make a deal" to reduce tariffs. Echoing Trump's statements in the meeting, Commerce Secretary Howard Lutnick said that many countries were coming to talk and that they'd come with "offers they never would have" if it was not for the president's policies. "We're getting the respect we deserve now," he added. "I think you're going to see historic deals one after the other." Trump said the US would "love to be able to work a deal (with China)", adding that he had "great respect for President Xi" and thought that they would "end up working something out that's very good for both countries". However, he repeated his claims that China had "taken advantage" and "ripped off" the US "more than anybody" for a long time. China announced that it would cut the number of American-made films shown in its cinemas, and claimed the tariff dispute has dampened audience appetite for Hollywood. Beijing already restricts US releases to 34 a year, and Hollywood has become less important in China as homegrown films increase in popularity. The European Union meanwhile said it would be pausing the countermeasures it had planned to impose on the US from 15 April also for 90 days. Twenty-six EU member states – all bar Hungary – had voted to impose retaliatory tariffs on Wednesday if the US imposed its levy of 20%. In a statement, European Commission President Ursula von der Leyen said that the EU wanted "to give negotiations a chance".
