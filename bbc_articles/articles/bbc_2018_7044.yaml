title: Mother and son found dead at Beachy Head cliffs - BBC News
date: '2018-06-18'
section: England
url: http://www.bbc.co.uk/news/uk-england-44518286
content: |-
  The bodies found at Beachy Head are believed to be a 42-year-old woman and her son from Maidstone.

  The cliffs at Beachy Head are a popular beauty spot

  The bodies of a woman and a young child have been found at the cliffs at Beachy Head.

  Police and coastguards discovered their bodies at the beauty spot in East Sussex at about 07:00 BST.

  The identities have yet to be confirmed, but they are believed to be a 42-year-old woman and her five-year-old son from Maidstone, in Kent.

  Sussex Police said their inquiries were at an early stage, but the deaths were not being treated as suspicious.

  Emergency teams discovered the bodies at about 07:00 BST

  The emergency services were alerted on Sunday evening after a car was found in a car park.

  Eastbourne RNLI coxswain Mark Sawyer said the boy's body was recovered by the coastguard helicopter, and the woman's by the lifeboat.

  It follows the discovery of three bodies at the foot of the cliffs near Eastbourne on Wednesday. Police said none of those deaths were linked.

