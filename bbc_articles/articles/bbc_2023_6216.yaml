title: Three teenagers killed in crash in Shipston-on-Stour named - BBC News
date: '2023-04-24'
section: Coventry & Warwickshire
url: http://www.bbc.co.uk/news/uk-england-coventry-warwickshire-65378201
content: |-
  The students had been travelling home together from school when the collision happened.

  This video can not be played To play this video you need to enable JavaScript in your browser. In a letter to parents, principal John Sanderson said the school flag would fly at half-mast

  Three teenagers who died in a crash on the way home from school have been named by their head teacher.

  Harry Purcell, 17, and Matilda Seccombe, 16, died in hospital on Friday after the crash near Shipston-on-Stour, Warwickshire.

  Chipping Campden School said police contacted staff earlier to say Frank Wormald, 16, had died on Sunday.

  A fourth, Edward Spencer, 17, remains in a stable condition. The school said the community was hurt deeply.

  All four teenagers, in Year 12, were travelling in the same car and attended the school in Gloucestershire.

  In a letter to parents, principal John Sanderson said the school flag would fly at half-mast.

  People have been paying their own tributes to the students at the school

  "There are no words that I can find to express the sense of loss that we feel," he said, extending sympathy to families and close friends of the students.

  "Each one of these young people has been part of our extended school family and each loss is felt profoundly.

  "In time, I would like to try and find the words to pay tribute to each of the young people we have lost, as each was remarkable and unique, having touched the lives of so many in such profound ways."

  The four teenagers had been travelling home from school in a Ford Fiesta when they were involved in a collision with a Fiat 500 on the B4035 Campden Road at about 16:10 BST.

  The occupants of the Fiat 500 - a woman and two children - were taken to hospital with serious injuries, West Midlands Ambulance Service said.

  The crash happened on the B4035 Campden Road at about 16:10 BST on Friday

  They remain in hospital in a stable condition, Warwickshire Police added.

  Officers said they were pursuing a number of lines of inquiry into the cause of the crash and urged witnesses to come forward.

  "Specialist officers are carrying out a detailed investigation to piece together the circumstances of the collision, and we are working with our partner agencies and the local authority," said Insp Michael Huntley.

  Candles were lit at a nearby church in memory of the pupils

  Bouquets of flowers were left by mourners in the school grounds

  Mr Sanderson said an area would be set aside at the school for staff, students and the community to leave flowers and tributes.

  "I'm very conscious that we will need to take each day at a time, but wanted to express my sincere thanks for the professional and personal help and advice that has been offered to us at school over the last 48 hours," he said.

  The principal said the school continued to "hope and pray" that student Edward Spencer, who remains in hospital, "makes good progress in recovering from his injuries over the coming weeks and months".

  "Edward and his family are very much in our thoughts," Mr Sanderson added.

  Reverend Craig Bishop said the incident had sent "shock waves" through the community

  The school is arranging extended tutor time to allow staff to talk to pupils, as well as providing extra support, including from bereavement specialists.

  The Reverend Craig Bishop said the crash had sent "shock waves" throughout the local community and beyond.

  On Monday at 18:00 there will be a service at St James' Church, Chipping Campden, for people to "reflect upon the horrors" of the crash, he added.

  Mr Bishop said similar services would take place throughout the week.

