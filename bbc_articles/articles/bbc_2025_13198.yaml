  Greg Monks was reported missing in Albufeira last week after travelling to the resort for a stag party.

  Family 'devastated' after body found in search for missing Scot

  Greg Monks was reported missing in Portugal last week while on a stag party

  A body has been found in the search for a Scottish man reported missing in Portugal. Greg Monks, 38, from Cambuslang, was reported missing by friends last week after leaving the main strip in Albufeira in the Algarve in the early hours of 28 May while on a stag party. The Portuguese national Policia Judiciaria said the body of a man was found in the Cerro de Aguia area on Wednesday morning. His sisters described Mr Monks as an "amazing boy" who would "be missed every day".

  A Policia Judiciaria statement said Mr Monks' disappearance was reported to the Guarda Nacional Republicana (GNR) on 28 May. Cerro de Aguia is about 3.1 miles (5km) from the main Albufeira strip, where Mr Monks was last seen by friends in the early hours of the morning.

  The Foreign Office said they were supporting Mr Monks' family

  Posting on a Facebook page set up in the wake of his disappearance, Mr Monks' sisters, Jillian and Carlyn, said the support they had received had been "out of this world". They wrote: "[We] didn't think it would end like this. "We are absolutely devastated. Greg was an amazing boy who everyone thought so highly of, was friends with everyone and always made us laugh. We will miss him every day. "If love coulda saved you, you would live forever." Other tributes left online described Mr Monks as "one of life's good guys" who was "much loved".

  The Polícia Judiciária said the body was found on a "vacant and very uneven lot". They said an autopsy would take place in due course. A Foreign Office spokesperson said: "We are supporting the family of a British man reported missing in Portugal and are in contact with the local authorities."
