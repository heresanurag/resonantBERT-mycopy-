title: Attorney general tells MPs 'this Parliament is a disgrace' - BBC News
date: '2019-09-25'
section: General
url: http://www.bbc.co.uk/news/uk-politics-49827307
content: |-
  The Attorney General, Geoffrey Cox, tells MPs that the current Parliament is a "dead Parliament" and is "too cowardly" to call an election.

  The Attorney General, Geoffrey Cox, has told MPs that the current Parliament is a "dead Parliament" and is "too cowardly" to call an election.

  He told members of the Commons that the Parliament was "a disgrace".
