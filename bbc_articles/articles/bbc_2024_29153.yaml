  Pontypridd resident Paula Williams said flooding had hit "in exactly the same place" as it had done previously, criticising NRW's efforts to adequately protect the area. "They've tried to convince everybody that the flood defences worked. I have got videos proving the flood defences don't work," she added. Prime Minister Sir Keir Starmer said on Sunday he had spoken with Ms Morgan and would continue to receive updates about Storm Bert as it moved across the UK. "Thank you to the emergency services who are working tirelessly to protect communities — my thoughts are with those impacted," he said on X.

  Since Storm Bert made landfall on Friday, at least five men have died - including the man reported to be Brian Perry - on the roads. A man in his 60s died on Saturday after a tree hit his car near Winchester, and two others died in crashes - one in West Yorkshire and another in Northamptonshire - though the latter incidents have not been directly attributed to the storm. In Lancashire, a man in his 80s died after his car entered a ford on Saturday - police have not directly related his death to the storm. Parts of Scotland experienced a second day of disruption with high winds and localised flooding after Storm Bert swept heavy snow and rain across the country. Milder temperatures caused the snow which covered the north of England and much of Scotland earlier this week to melt. Amber weather warnings for snow were in place on Saturday for parts of Scotland and north-east England, while large swathes of the UK were under yellow weather warnings. Following hours of heavy rain caused by Storm Bert, residents in Dundonald in Northern Ireland were stranded in their homes due to the floodwater on Saturday.

