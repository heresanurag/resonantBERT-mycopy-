date: '2024-11-25'
section: UK
url: http://www.bbc.co.uk/news/articles/cn7mnnmg038o
content: |-
  Eluned Morgan says there will be discussions about the support given to those impacted.

  This video can not be played To play this video you need to enable JavaScript in your browser.

  Welsh First Minister Eluned Morgan has said the floods brought by Storm Bert have been "absolutely devastating", as heavy rain and strong winds continue to move across the UK. South Wales, where a major incident has been declared by one council, has seen over 100mm of rain in places, while two areas in the south east of the country are under severe flood warnings, detailing a "significant risk to life". Ms Morgan said authorities had been prepared for the storm, but added that "when you get the kind of enormity of rain we’ve had over the past few days", minimising the impact was always "going to be difficult". The worst of the rain is moving eastwards into England, where the midlands and south west have also seen flooding. Across the UK, more than 100 flood warnings, external are now in force.

  Yellow warnings for wind and rain have been in effect for western Scotland, southern England and Wales, as well as Northern Ireland but are due to expire late on Sunday. A sole yellow warning for wind comes into force on Monday covering part of Scotland. There are also hundreds of flood alerts in place in England, Wales and Scotland. Wind gusts have reached 75mph in coastal areas and up to 65mph inland. North Wales Police said on Sunday afternoon that a body had been found by officers searching for a man who went missing at the River Conwy near Trefriw in Conwy county during the storm on Saturday. Formal identification has not yet taken place but the family of Brian Perry, 75, have been informed, police said. Around London, all of the Royal Parks closed on Sunday due to high winds - including Hyde Park and its popular Winter Wonderland attraction. The parks' management said there would be delayed re-openings on Monday following a safety inspection.

  This was the scene in east London on Sunday where strong winds almost toppled this scaffolding onto Bethnal Green Road

  Travel disruption to roads and railway lines due to floodwater, high winds and fallen trees continued in some areas on Sunday after similar incidents on Saturday. One train from Sheffield to London was more than five hours delayed, with the service taking a detour and encountering further flooding along the alternative route. A backlog meant the train was stationary for two hours, with staff giving out free water and snacks. There were many families with tired young kids crying, and people getting frustrated with the lack of information. Pictures from Tenbury Wells in Worcestershire showed streets submerged in water as the town's Kyre Brook rose and caused a wall to collapse. In south Wales, a major incident has been declared by Rhondda Cynon Taf Council after significant flooding. The River Taff has burst its banks in Pontypridd, and residents in the town were seen using buckets to remove water from outside their homes. Wales' first minister said there had been "huge investment" since the Storm Dennis, but acknowledged that many people had been affected for a second time. Asked about claims of a lack of warnings from authorities ahead of the storm, she added: “We certainly knew Storm Bert was coming, so there was an amount of preparation. "But when you get the kind of enormity of rain we’ve had over the past few days – and it’s still coming down – then we’ve got to recognise that it is going to be difficult." She added that discussions had begun about what support would be provided to those affected. Climate change was “clearly making a difference in the severity and the frequency of these weather events", she said. "There will come a point when it will be too difficult to protect every home in the country, but clearly we want to put the support in place if we’re able to do that,” she said. Three rest centres have been set up for affected residents. Between 200 and 300 properties - residential and commercial - have been affected by flooding, the council added. Record river levels were recorded on the River Taff on Saturday night but officials said these levels were beginning to drop as rain subsides, although residents were still urged to be cautious. The Abercynon Feeder Pipe Footbridge over the river was completely washed away, council leader Andrew Morgan told a news conference on Sunday afternoon. The bridge was being rebuilt after being badly damaged during Storm Dennis in 2020, which also caused significant flooding to homes and businesses when it hit the area. Mr Morgan told reporters he was "amazed" that only a yellow weather warning was issued for the area and said "we were preparing for the possibility of an amber warning". Further east, National Resources Wales (NRW) issued two severe flood warnings on Sunday covering parts of the River Monnow in Monmouthshire. The warnings are the most serious that can be issued and indicate that "significant risk to life" and disruption is expected from severe flooding.

