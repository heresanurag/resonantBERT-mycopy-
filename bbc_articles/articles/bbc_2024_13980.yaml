  The flurry of personal stories is a trend that’s mirrored nationally. A study published in May 2024 by Johns Hopkins University, external found that one in three Americans know someone who has died of a drug overdose. For 20% of those who took part in that survey, it was a family member or a close friend who had died. Matthew Eisenberg, the Director for Mental Health and Addiction Policy at Johns Hopkins University, said the jury pool’s experience was reflective of the overall US population. “Nearly one in three people at any given time have a substance use or mental health disorder in the US," he told BBC News. “Around 16-17% of folks have said they have an addiction problem over the past year." Many of the potential jurors spoke of their loved ones struggling with opioids or heroin, but there were other addictions mentioned as well. And while the opioid epidemic gets a lot of attention due to its scale, Dr Eisenberg said, it is important to note there are other serious issues too. “10% of adults in the US have an alcohol use disorder,” he said, “[and] 3% of folks have a simultaneous alcohol and drug use disorder.” Hunter Biden has been open about his struggle with addiction, writing at length about his crack cocaine habit in his 2021 memoir, Beautiful Things, and mentioning it in interviews. “Look, everybody faces pain,” he told the New Yorker in 2019. “There’s addiction in every family. I was in that darkness. I was in that tunnel - it’s a never-ending tunnel. You don’t get rid of it. You figure out how to deal with it.” And his father has spoken of the issue and his support for his son, too. “My son, like a lot of people, like a lot of people you know at home, had a drug problem,” Mr Biden said in the first presidential debate in 2020 “He’s overtaken it, he’s fixed it, he’s worked on it, and I’m proud of him.”

  The importance of the support of family members was also a sentiment expressed in the courtroom earlier this week. “I have a daughter that's a recovering addict,” a member of the jury pool told the court. “And I think after everybody is recovering, they need a second chance. My daughter has been given a second chance, everybody needs a second chance.” The scene in the courtroom in Delaware showed how the issue has affected families from all walks of life in the US - including those who occupy the White House. Few have escaped unscathed. “Addiction is a disease that affects people of all education statuses, income levels, races and ethnicities and all age levels too” Dr Eisenberg said, noting, however, that there were disparities in access to treatment. After a day of whittling down the jury pool, four of the final 12 jurors serving on the trial know someone who has struggled with addiction. Two of the alternates have also been personally affected by the issue. “I have lost many friends to drug overdoses,” one alternate told the court. “I feel it’s an everyday part of the world these days."
