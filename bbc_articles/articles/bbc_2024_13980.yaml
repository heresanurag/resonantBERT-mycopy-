title: Hunter Biden jury pool highlights toll of US drug epidemic - BBC News
date: '2024-06-05'
section: US & Canada
url: http://www.bbc.co.uk/news/articles/c722vr3wprlo
content: |-
  More than two dozen potential jurors shared personal stories of addiction, revealing the scale of the issue.

  Prosecutors will likely delve into Hunter Biden's drug addiction, a subject many potential jurors said they had been personally affected by

  In a Delaware courtroom, at the outset of a trial involving the son of President Joe Biden, the extent of America’s drug addiction epidemic was laid bare. Jury selection in Hunter Biden’s trial on federal gun charges began on Monday, with the court working through a pool of 65 randomly selected people who appeared individually to answer a key question - could they remain impartial during such a high-profile, politically-charged trial? Almost immediately, the issue of drug addiction and its consequences in the US emerged as a common theme among the group. More than two dozen potential jurors said they knew someone who had suffered from substance abuse or addiction. Stories of daughters, brothers, sisters, mothers and fathers struggling with addiction unravelled over the course of the day. The subject will play a central role in the trial, as prosecutors delve into the younger Biden’s history of crack cocaine use as they seek to prove he knowingly lied about his drug habits when purchasing a gun in 2018. The defence, meanwhile, say the 54-year-old was in recovery at the time so was truthful when he said he was not a drug user.

  Given the relevance of addiction to the trial, time and time again the court heard personal accounts from potential jurors about the toll the issue had taken on them. “My childhood best friend passed away from an overdose,” one juror said. Another explained how their brother had struggled with opioid addiction and was now in rehab. Someone else’s brother and brother-in-law had both been addicted to alcohol and had now died. One person detailed how their nephew got a football scholarship to college, but slipped into drug addiction following a shoulder injury. “They kept giving him [oxycontin], and then he quit their football program, he was a mess,” they told the courtroom. “He got in trouble, he burglarised the bar [and] restaurant that he was working at, and he was addicted to drugs at the time.” The sometimes emotional first-hand accounts could be replicated across the US, with the sheer number of stories emerging from the pool of 65 highlighting just how widespread the problem is. One man broke down crying explaining that both their nephew and brother-in-law had struggled with drug addiction. “I can tell that’s a very emotional thing for you,” the judge said, “I know it’s hard and I’m very sorry”. Another potential juror told how their sister had been jailed for credit card fraud and drug charges. She had been struggling with addiction but was currently clean. One person’s brother was “doing better” now they were in rehab for opioid addiction.

