title: Passenger overboard from Southampton cruise ship, firm says - BBC News
date: '2024-03-25'
section: Hampshire & Isle of Wight
url: http://www.bbc.co.uk/news/uk-england-hampshire-68650734
content: |-
  The man was reported missing from the MSC Euribia which left Southampton on 15 March.

  MSC Euribia was on a seven-night tour of northern Europe

  A cruise passenger has gone overboard during a tour of northern Europe, the ship's operator has said.

  The man disappeared from MSC Euribia on 16 March, a day after the ship left Southampton on a seven-night excursion.

  Police, who boarded the vessel on its return to Southampton on Friday, said they were investigating on behalf of the coroner.

  In a statement, MSC Cruises said it was deeply saddened by the news and its thoughts were with the man's family.

  The firm said the ship was bound for Hamburg, its first port of call, when the man went overboard.

