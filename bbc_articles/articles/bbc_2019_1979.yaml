content: |-
  The Uppies and Doonies go head to head in the annual clash held on the streets of the Borders town.

  Teams battle over a small leather ball in the heart of the Borders town

  The Uppies and the Doonies went head to head in Jedburgh on Thursday in their traditional annual ba' game.

  It is one of a number of towns to stage such events.

  Both boys' and men's games take place throughout the day

  The Uppies try to take a small leather ball towards the town's castle and the Doonies try to carry it towards the Jedwater.

  Games often run on until late in the day as the action takes place up and down through the town centre.

  The action is rarely anything less than fast and furious

  Jedburgh is one of a number of towns that still play the traditional ba' games

  The aim of the game is to carry a leather ball to a "goal" at either end of the town

  The action draws large crowds and competitors of all ages

  It is not always easy to tell who is on top during the game

  The teams taking part represent those living to the north and south of the town's Mercat Cross

  Shops in the town take protective steps during the ba' game

  The town is proud of its tradition which dates back centuries
