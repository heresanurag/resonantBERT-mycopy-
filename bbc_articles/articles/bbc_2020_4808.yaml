  Nightingale hospital 'should take all coronavirus patients'

  All coronavirus patients in Bristol should be treated exclusively at the city's Nightingale hospital to free up the main hospitals, opposition councillors say. Bristol City Council's Lib Dem group claims patients are avoiding appointments fearing they would contract the virus. Leader Gary Hopkins, said: "They are massively handicapped in trying to deal with the backlog, with operating theatres turned over to Covid-19 and many patients frightened to come into hospital because of Covid-19 fears. "Covid-19 is highly dangerous and infectious, and hospital staff are hard pushed enough without dealing with the dangers of internal cross infection." The Bristol Nightingale will be used for patients from across Gloucestershire, Wiltshire and Somerset as well as Bristol. NHS Nightingale Hospital Bristol chief officer Marie-Noelle Orzel said: "Capacity still exists in hospitals throughout the Severn network region to care for patients with coronavirus, as well as other patients who may need urgent and emergency treatment, with the Nightingale Bristol standing ready if and when needed. "A degree of flexibility has been built into the planning so that as the clinical picture and patient requirements evolve, the hospital will be able to adapt accordingly."
