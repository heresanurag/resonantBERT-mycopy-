title: 'North Korea defection: Footage of moment soldier flees - BBC News'
date: '2017-11-22'
section: General
url: http://www.bbc.co.uk/news/world-asia-42075986
content: |-
  He raced across the border on foot, closely pursued by North Korean troops who shot at him several times.

  Remarkable footage has been released showing the defection of a North Korea soldier across the border at the Panmunjom truce village on 13 November.

  He is almost caught by North Korean troops, who shoot at him several times, before he is rescued by South Korean soldiers.

  A spokesman for the UN command, said the North Korean soldiers who shot at the defector had violated the armistice agreement that halted the Korean war.

  Read more: What we've learned from the dramatic footage
