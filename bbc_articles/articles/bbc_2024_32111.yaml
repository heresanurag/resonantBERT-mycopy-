title: Martial law in South Korea sparks fear and confusion among citizens - BBC News
date: '2024-12-03'
section: Asia
url: http://www.bbc.co.uk/news/articles/c0kvjx474g1o
content: |-
  One Seoul resident said the president's shock announcement on Tuesday felt like "a coup d'état".

  'It feels like a coup d'état' - martial law chaos sparks worry in South Korea

  Protesters and opposition party members gathered outside the National Assembly grounds on Wednesday

  South Koreans have been describing feelings of worry, shock and confusion after the country's president plunged the country into political chaos - declaring martial law and hours later revoking the move after a major outcry. In a televised address on Tuesday, President Yoon Suk Yeol said military rule was needed to protect the country from North Korea's communist forces and to eliminate anti-state elements - before it was swiftly blocked by MPs. It has left some South Koreans anxious about the fallout from the political instability, including Seoul resident Ra Ji-soo, who reported hearing helicopters near her home late on Tuesday. Speaking shortly after the president's address, she told the BBC it felt like a "coup d'état in Myanmar is happening here in Korea. I’m worried."

  Adding to the sense of events spiralling out of control, she also said a friend in the police force had received an emergency mobilisation order and had rushed to the station. In the immediate aftermath of Yoon's announcement, the country's military declared the suspension of all parliamentary activity. Footage showed a heavy police presence outside the National Assembly in the Yeongdeungpo District in the South Korean capital, and scuffles breaking out between police and protesters before lawmakers were able to gain access to the building and vote down the measure.

  Kim Mi-rim said she had packed an emergency kit in case she had to leave her home in Seoul

  Despite the wording of Yoon's pronouncement, it quickly became clear within South Korea that his drastic move was in response to a series of political events that have destabilised his leadership. A South Korean woman, who wished to remain anonymous for fear of speaking out, said she felt Yoon was “attempting to restrict everyone's freedom and right to express their concerns and judgement towards the government". "I am so scared that South Korea will turn into another North Korea," she added. Another Seoul resident, Kim Mi-rim, told the BBC she had hurriedly packed an emergency kit, fearing the situation could escalate. She recalled that previous instances of martial law involved arrests and imprisonment. The BBC also spoke to journalists in Seoul who were coordinating closely, sharing advice on staying safe while it seemed that martial law might remain in effect, bringing all media and publishing activities under strict government control.

  Other people feared they could be inadvertently impacted by the repercussions of the political chaos. "How can someone who say he serves the country be so careless in acting on his whim," Don Jung Kang, a small business owner who makes accessories told the BBC. "As a self-employed person I really think there will be a massive damage to my business. Just from his words the currency has crashed... And it will seriously affect importing materials."

  People also rallied in support of President Yoon Suk Yeol in Seoul

  On Tuesday night, the leader of South Korea's main opposition party, the Democratic Party, called on lawmakers and the public to gather outside the National Assembly building - the main parliament - in Seoul. Protesters chanted "no to martial law" and "strike down dictatorship" as the sounds of sirens from dozens of assembled police patrol cars and riot police buses occasionally rang out. Clashes between police and protesters were seen on live streams in the early hours of Wednesday, before the president's U-turn led to scenes of jubilation outside the parliament complex. Juye Hong, a South Korean university student, said her family and friends had been "frantically texting, trying to make sense of this situation" which felt like "being thrown into a complete nightmare" as the drama unfolded. She said the lack of clarity made the initial announcement "even more distressing". "People are saying there are soldiers across the city and tanks across the major districts," said Juye. "My friends and I don’t know if schools will be open tomorrow, how the falling value of the won and rising exchange rates will affect the economy, and if young men might be conscripted."
