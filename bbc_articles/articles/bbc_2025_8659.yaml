title: Second arrest over MSC Virtuosa cruise ship death - BBC News
date: '2025-05-11'
section: Hampshire & Isle of Wight
url: http://www.bbc.co.uk/news/articles/c0lnwlxj0p6o
content: |-
  James Messham died following an altercation reported hours after MSC Virtuosa departed Southampton.

  The cruise ship left Southampton at 18:00 BST on 3 May

  A second man has been arrested after a 60-year-old man died following an altercation on a cruise ship. James Messham, from West Sussex, was reported dead about two-and-a-half hours after MSC Virtuosa departed Southampton on 3 May. Hampshire and Isle of Wight Constabulary said a 56-year-old man from Richmond, London, had been arrested on suspicion of manslaughter. A 57-year-old man from Exeter, Devon, who was arrested on suspicion of murder on 5 May was released on bail.

  The vessel left Southampton at 18:00 BST for a two-night voyage to Bruges, Belgium, returning at 06:00 on Monday. The MSC Virtuosa is operated by MSC Cruises and has capacity for 6,334 guests. MSC Cruises previously said: "Following an incident on board our ship, the relevant authorities were contacted and we are cooperating fully with their investigations. "We are providing full support to those impacted and thoughts are with the family and friends at this difficult time." Police said they still wanted to hear from anyone who was aboard the ship.

