title: Seoul's over-65s disco 'like medicine' for seniors - BBC News
date: '2019-08-27'
section: General
url: http://www.bbc.co.uk/news/world-asia-49448760
content: |-
  A daytime party set up by the local government proves a hit in the rapidly-ageing country.

  A daytime disco for over-65s in the Korean capital Seoul is giving seniors a new lease of life.

  The event is the first of its kind organised by the local government and aims to tackle loneliness and dementia in the rapidly ageing country.

  Video by Olivia Lang, Julie Yoonnyung Lee and Youjin Do
