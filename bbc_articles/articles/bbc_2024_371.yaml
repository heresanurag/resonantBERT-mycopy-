title: 'Liverpool: Huge fire engulfs building in city centre - BBC News'
date: '2024-01-27'
section: General
url: http://www.bbc.co.uk/news/uk-68119241
content: |-
  Nearby properties are evacuated as authorities warn people to avoid the area.

  A large fire has broken out in a four-storey building in Liverpool, causing the evacuation of properties nearby.

  Merseyside Fire and Rescue Service said the building was in danger of collapsing.

  Twelve fire engines rushed to Fox Street in the city centre, after the blaze broke out at about 14:20 GMT.

  As huge plumes of smoke could be seen across Liverpool, firefighters urged people to avoid the area and nearby residents and businesses to close windows and doors.

