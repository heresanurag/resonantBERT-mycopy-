  A selection of your pictures of Scotland sent in between 19 and 26 February.

  Pheasant surprise: Alex McSorley said he saw this pheasant "tippy toeing" through the outskirt of woods in Coldstream near the golf course. "He looked as if he was on a mission (to survive I believe) as the sound of shotguns going off could be heard coming from the woods adjacent."
