title: 'Shamima Begum: Justice and the ISIS bride - BBC News'
date: '2020-11-23'
section: General
url: http://www.bbc.co.uk/news/uk-55034542
content: |-
  The Supreme Court has ruled that Shamima Begum will not be allowed to return to the UK in order to fight her citizenship case.

  Shamima Begum ran away to Syria as a 15-year-old to join the self-proclaimed Islamic State. But when the terror group was defeated, she ended up in a camp in Syria.

  Now, she wants to return home to the UK, but her British citizenship has been revoked by the government who say she poses a threat to national security.

  The Supreme Court is deciding exactly how her case should be handled, and its decision could have huge implications on how cases like Shamima's are dealt with in the future.
