title: 'Lyra McKee: Murdered journalist''s ''dreams snuffed out'' - BBC News'
date: '2019-04-19'
section: Northern Ireland
url: http://www.bbc.co.uk/news/uk-northern-ireland-47990464
content: |-
  Lyra McKee, who was shot dead during rioting in Londonderry, was a "tireless activist", says her partner.

  This video can not be played To play this video you need to enable JavaScript in your browser. Tributes have been paid to Lyra McKee who was shot dead in Londonderry

  A journalist who was shot dead during rioting in Northern Ireland had her dreams "snuffed out by a single barbaric act", her partner has said.

  Lyra McKee, 29, was struck by a bullet as she was observing the violence in Londonderry on Thursday night.

  Police have blamed dissident republicans for the murder and have released CCTV footage that shows Ms McKee in the crowd.

  The footage also shows the suspected gunman.

  This video can not be played To play this video you need to enable JavaScript in your browser.

  At a vigil in Derry, the dead woman's partner, Sara Canning, said she had been left without "the woman I was planning to grow old with".

  She described her partner as a "tireless advocate and activist" for the LGBT community.

  "The senseless murder of Lyra McKee has left a family without a beloved daughter, a sister, an aunt and a great-aunt; so many friends without their confidante," added Ms Canning.

  "We are all poorer for the loss of Lyra."

  Former US President Bill Clinton said he was "heartbroken by the murder of Lyra McKee".

