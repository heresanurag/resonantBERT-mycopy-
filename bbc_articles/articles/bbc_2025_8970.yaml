title: 'Benwell explosion: Reece Galbraith jailed over blast deaths - BBC News'
date: '2025-05-14'
section: Tyne
url: http://www.bbc.co.uk/news/articles/c8e6wggw233o
content: |-
  Seven-year-old Archie York was killed by an explosion caused by a neighbour making cannabis sweets.

  Archie York was killed in the Benwell explosion

  A man whose illegal cannabis factory exploded in a block of flats, killing seven-year-old Archie York, has been jailed for 14 years. Archie died when the blast caused by Reece Galbraith, 33, obliterated several homes in Benwell in the early hours of 16 October 2024, Newcastle Crown Court heard. The fatal explosion was caused by a build-up of butane created in the process of making drug-infused sweets in one of the flats by Jason Laws, 35, who was also killed, and Galbraith. Galbraith, of Gateshead, admitted two counts of manslaughter, with Archie's mother screaming at him in court that he had killed her son.

  Mr Laws and Galbraith were using a ground-floor flat in the block of 12 homes on Violet Close to make so-called cannabis shatter, prosecutor David Brooke KC said.
  • None 'My son was killed by criminals making cannabis' At about 00:40 BST, their "sophisticated" factory exploded, killing Archie, who lived upstairs with his parents and baby brother, and totally destroying six homes, the court heard. Archie's mother Katherine Errington and seven-week-old brother Finlay were buried beneath bricks and debris, the pair having to be dug out and pulled to safety by his father Robbie York, the court heard.

  Archie York was killed in the blast

  There was then a "fierce fire" and the block ultimately had to be demolished, with dozens of people losing their homes and treasured possessions, Mr Brooke said. Archie had been asleep in his living room when the blast occurred and was killed instantly, while his father, mother and baby brother all "miraculously" survived, the court heard. Mr Brooke said there had also been an "enormous impact" on the local area, with the damage and costs to Newcastle City Council valued at £3.7m, 81 adults and 59 children from 51 homes displaced and 10 households having to be permanently rehoused.

  Ms Errington told the court her son's death had "broken us in ways I didn't know possible" and the family had "lost everything", adding she felt "survivor's guilt". In a fury, she angrily told Galbraith he "took risks for profit" before screaming at him: "You killed my son." "This was your choice," Ms Errington said. "We will never forgive you for what you did to our beautiful boy." The court heard Archie's beloved dog Chase had also been killed in the blast.

  Archie's parents said they would never forgive their son's killer

  In a statement read to the court, Mr York said he felt "nothing but anger" towards Galbraith and Mr Laws, adding he had "no sympathy" for the latter's death. "They were making drugs whilst my family slept upstairs unaware of the danger that was below us," Mr York said. He said Galbraith and Mr Laws' illegal operation had put multiple children at risk while their own children slept safely elsewhere, adding: "We worked hard for what we had and they did nothing but inflict pain and misery on others."

  Another neighbour, who had lost her home of 18 years, said the men were horrible, selfish and greedy. One woman said her seven-month-old daughter had been blown across her bedroom and was found beneath a pile of drawers and bricks, with the woman fearing the girl would need medical treatment for the rest of her life.

  Police found dozens of canisters of liquid butane gas and expensive equipment used to make cannabis shatter, a brittle substance containing a high concentration of the psychoactive compound THC which is used to form sweets from in the debris, the court heard. Mr Brooke said butane was used in the production process but it was "highly dangerous" and "extremely flammable". He said the canisters clearly displayed multiple vivid warnings which Mr Laws and Galbraith had ignored. Galbraith, of Rectory Road, had also been in the flat and was found in the wreckage covered in severe burns, going on to spend a month in a coma in hospital.

  Ten households lost their homes in the blast with dozens of people needing to be evacuated.

  His finger prints were found on some of the butane canisters and on packages of cannabis sweets discovered in Mr Laws' car, Mr Brooke said, with evidence from his phones showing he had been selling cannabis sweets for at least 11 months before the blast. Galbraith, who also admitted producing and selling cannabis, had previous convictions related to the drug and was under police investigation at the time of the blast, the court heard. In mitigation, Richard Wright KC said Galbraith had not intended to harm or kill anybody and was "genuinely sorry".

  A judge said Archie was a healthy, happy and much-loved boy

  Mr Justice Cotter said Archie was a "healthy, happy and much-loved seven-year-old" with a "wonderful and exciting life ahead of him". The judge said the effect of the "tragedy" would "never diminish for his parents" and there was nothing which could ease their "life sentence of grief", adding: "No sentence can cure their unimaginable pain, grief and loss." The operation run by Mr Laws and Galbraith was "not easy" and required extensive knowledge and research, much of which included explicit warnings about the "inherently dangerous" process of using butane, the judge said. He said it was miraculous more people were not seriously injured or killed.

