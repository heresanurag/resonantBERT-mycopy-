title: Drone captures Southrepps 'radiation fog' daybreak - BBC News
date: '2019-02-05'
section: General
url: http://www.bbc.co.uk/news/uk-england-norfolk-47132158
content: |-
  Drone flight captures spectacular views of countryside church wrapped in swirling fog.

  Swirling mist known as "radiation fog" provided the perfect conditions for a haunting cinematic landscape for experienced aerial videographer James Horne.

  These striking images were captured earlier this month by Mr Horne, a qualified drone pilot, at Southrepps in north Norfolk.

  "The phenomenon has nothing to do with nuclear radiation, but refers to the way heat radiates from the ground during long, clear and calm winter nights, which cools the air above the ground," WeatherQuest forecaster Dan Holley said.

  "If the cooling is sufficient, the air reaches saturation and fog begins to form."
