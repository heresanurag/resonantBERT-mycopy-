  Four intruders break in to the couple's home and search the property before fleeing, police say.

  Intruders break in to Wright and Keegan's home

  Mark Wright and Michelle Keegan describe the property as their "dream home"

  Police are investigating after four people broke into the home of TV personalities Mark Wright and Michelle Keegan. The married couple, 38 and 37, reported intruders forced entry to their home in Essex at about 18:20 GMT on Tuesday. Essex Police said the group carried out a search of the property "before fleeing". Wright and Keegan, who is pregnant, describe the property as their "dream home" on Instagram, where they run an account that has 664,000 followers.

  The couple started building their house in 2021 and charted their progress on Instagram

  Essex Police has increased "high visibility" patrols in the area while an investigation continues. The force said its officers were at the scene within eight minutes on Tuesday. "We are exploring a number of lines of inquiry including but not limited to forensic opportunities, CCTV and witness statements," a spokeswoman said. "Anyone with information should contact us as soon as possible." Wright rose to fame on reality show The Only Way Is Essex, while Keegan first appeared on television as Tina McIntrye in ITV soap opera Coronation Street. The couple have used the Instagram account to chart their progress in building their home since 2021. The BBC has contacted Wright and Keegan's representatives for comment.

