  Donald Trump has been targeted in an alleged assassination attempt, for the second time in a matter of months.

  Donald Trump has been targeted in an alleged assassination attempt for the second time in a matter of months.

  The former president was rushed to safety after a suspected gunman was spotted hiding in the bushes of his Trump International Golf Club in West Palm Beach, Florida.

  The suspect, who has been named as Ryan Wesley Routh by the BBC's US partner, CBS news, fled in a car but was later stopped and arrested on the I-95 highway.

  Trump was not injured and later posted on social media saying he was "safe and well".
