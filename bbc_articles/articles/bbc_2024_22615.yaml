  Former Manchester United manager Sir Alex Ferguson talks to BBC Breakfast about helping families affected by dementia. He was speaking as part of National Playlist Day,

  Former Manchester United manager Sir Alex Ferguson talks to BBC Breakfast about how he helps families affected by dementia, and what he does to keep his brain active.

  He was speaking as part of National Playlist Day, which is used to celebrate the power of personalised music playlist for those living with dementia.
