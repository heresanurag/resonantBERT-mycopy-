title: Oasis tickets sales 'shambles' defended by industry chief - BBC News
date: '2024-09-02'
section: Culture
url: http://www.bbc.co.uk/news/articles/c2kj3742jxwo
content: |-
  Fans complained they felt ripped off and frustrated after facing long online queues and surge pricing.

  The Oasis ticket sales process has been defended by the boss of a ticketing industry body, after prices surged while fans queued online. Many fans were furious to find tickets escalating in price as the sale continued on Saturday while others gave up queuing or were kicked out of the system while they waited. Rachael Board from Devon, told BBC News she’d woken up “feeling like she’d been completely ripped off” after paying £495 for a ticket, far higher than the £150 she’d intended to pay. But ticketing websites were praised for coping with the "enormous demand" by Jonathan Brown, chief executive of the Society of Ticket Agents and Retailers, who stressed prices were set by the band.

  Throughout Saturday, hundreds of thousands of fans waited online to get tickets in the hope of being able to see Oasis live again, 15 years after the group disbanded.
