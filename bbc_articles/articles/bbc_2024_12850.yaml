  Pressed further, he added: "We provoked this war. It's, you know, of course it's his fault - he's used what we've done as an excuse." After the interview aired on Friday, Mr Farage, a former member of the European Parliament, said on X that he was "one of the few figures that have been consistent and honest about the war with Russia". Alongside the new statement, he reposted a speech in the European Parliament from 2014 in which he called for the West to "stop playing war games with Putin." Labour's shadow defence secretary John Healey said the remarks made the Reform UK leader "unfit for any political office in our country, let alone leading a serious party in Parliament." The Ukrainian presidency has told the BBC it will not be putting out an official statement on Mr Farage’s comments. But a source in the presidential office warned about the "virus of Putinism and the rise of war propaganda", adding: "The task of civilized humanity is to fight this virus in the bud.”

  Reform UK has been gaining ground on the Conservatives in the opinion polls since Mr Farage announced he was returning to front-line politics as the party's leader shortly after the general election campaign got under way. He has said his aim is for Reform to replace the Conservatives as the official opposition to Labour, which he says is certain to gain power on 4 July, although polling suggests the party may win only handful of seats at this election.
