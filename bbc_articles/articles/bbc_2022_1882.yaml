id: bbc_2022_1882
title: 'Terror attacks: UK threat level lowered to ''substantial'' - BBC News'
date: '2022-02-10'
section: UK
url: http://www.bbc.co.uk/news/uk-60322508
content: |-
  This means security experts now think a terror attack is "likely", rather than "highly likely".

  Priti Patel said a lower threat level must not make us complacent

  The UK's terror threat level has been lowered from severe to substantial, meaning a terror attack on British soil is considered "likely".

  The level was raised to severe - where an attack is "highly likely" - after two terror attacks late last year.

  In October, Conservative MP Sir David Amess was stabbed to death in Essex. A month later, a bomb was set off outside Liverpool Women's Hospital.

  The home secretary said a lower threat level must not make people complacent.

  In a statement to Parliament, Priti Patel said: "The attacks in October and November 2021 reflect the complex, volatile and unpredictable nature of the terrorist threat in the UK."

  She said the decision was taken by security and intelligence experts from the Joint Terrorism Analysis Centre (JTAC), independently of ministers.

  They judged that despite the two attacks, the current nature and scale of the threat was consistent with the level seen prior to them, Ms Patel said.

  "JTAC keep the threat level under constant review based on the very latest intelligence and analysis of internal and external factors which drive the threat," she added.

  She described the reduction in threat level as positive but warned "it must never make us complacent".

  In the threat grading system, "substantial" is the third highest - below "critical" and "severe" but above "low" and "moderate".

  Next month, Ali Harbi Ali, 25, from Kentish Town, north London, will go on trial for the murder of Sir David in an alleged terror attack.

  The 69-year-old MP for Southend West was holding a constituency surgery in Leigh-on-Sea when he was stabbed multiple times. He died at the scene.

  After the Liverpool hospital explosion on Remembrance Sunday last year, police identified the man killed when his homemade bomb went off in the back of a taxi as 32-year-old Emad Al Swealmeen.

  He was an asylum seeker born in Iraq, who is understood to have converted to Christianity in 2017.

  The taxi driver, David Perry, escaped from the vehicle before it burst into flames, avoiding serious injury. His wife Rachel called it "an utter miracle".
