title: 'Paris 2024: Argentina''s Olympic football opener against Morocco a ''circus''
  - Javier Mascherano - BBC Sport'
date: '2024-07-24'
section: Olympic Games
url: http://www.bbc.co.uk/sport/football/articles/c7294ev3dd5o
content: |-
  Argentina coach Javier Mascherano describes the chaotic ending to his team's opening game of the Olympic football tournament as a "disgrace" and "a circus".

  This video can not be played To play this video you need to enable JavaScript in your browser. Watch the story of Argentina's game against Morocco that lasted four hours

  Argentina coach Javier Mascherano has described the chaotic ending to his team's 2-1 loss to Morocco in the men's Olympic football tournament as a "disgrace" and "a circus". Crowd trouble forced the first football match of Paris 2024 on Wednesday to be suspended for nearly two hours, with the game eventually completed in an empty stadium. With Morocco leading 2-1 Argentina appeared to level the match 16 minutes into second-half injury time, which sparked bottles being thrown on to the turf and a pitch invasion by some supporters in Morocco colours. The referee led both sets of players off the pitch at 16:05 BST, with the match resuming at 18:00 after fans had left the Stade Geoffroy-Guichard in Saint-Etienne. Shortly before restarting, Argentina's equaliser was ruled out for offside following intervention from the video assistant referee (VAR). Morocco held on to their lead across three additional minutes.

  Former midfielder Javier Mascherano is a two-time gold medallist with Argentina

  "I have not been a coach for long, but never in my career as a player have I seen a situation like that," said Mascherano, who won gold with Argentina in 2004 and 2008. "It is a circus. But that is how it is. We cannot control it. I told the boys that now we need to look forward, try to get the six points that will allow us to qualify and that all this should fill us with energy and anger for what we have ahead of us." For some time the outcome of the match was unclear, with the official International Olympic Committee (IOC) website indicating it had ended. Mascherano said the team captains initially "decided not to play on" and that the organiser "called Fifa" - world football's governing body - before deciding to restart the match. "It is a disgrace that this should happen and poison the tournament. This wouldn't even happen in a neighbourhood tournament. It's pathetic," he added. "Beyond the Olympic spirit, the organisation needs to be up to standard and at the moment, unfortunately, it is not." A statement from the tournament organisers said: "The football match between Argentina and Morocco at the Saint-Etienne Stadium was suspended due to a pitch invasion by a small number of spectators. "The match then restarted and was able to conclude safely. Paris 2024 is working with the relevant stakeholders to understand the causes and identify appropriate actions." On Thursday, organisers said they would bring in additional staff and crowd barriers for upcoming matches in Saint-Etienne. Olympics security director Bruno Le Ray said there is an average of 17,000 security staff working across the Games each day, which increases to 22,000 on the busiest days. Argentina play their second match on Saturday in Lyon against Iraq, with Morocco facing Ukraine in Saint-Etienne the same day.

