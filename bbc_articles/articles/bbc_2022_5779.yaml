content: |-
  Winner of the Vitality London 10,000 road race, Ellis Cross, shares what it is like to beat the former Olympic champion.

  The runner who beat Sir Mo Farah in the Vitality London 10,000 road race on Bank Holiday Monday shares what it is like to beat "an idol" of the sport.

  The 25-year-old competitor, Ellis Cross, from Polesworth, in Warwickshire, was not part of the elite field.

  He beat the former Olympic champion Sir Mo Farah by four seconds.

