title: 'Mount Everest: Nepali sherpa breaks own record with 31st summit - BBC News'
date: '2025-05-27'
section: Asia
url: http://www.bbc.co.uk/news/articles/cm2y70xknnyo
content: |-
  Kami Rita Sherpa is a "global symbol of Everest itself", says the expedition organiser.

  Expedition organiser Seven Summit Treks says Kami Rita Sherpa is a "a global symbol of Everest itself".

  Nepali sherpa Kami Rita, also known as "Everest Man", has scaled Mount Everest for the 31st time, breaking his own record for the most climbs up the world's tallest peak. The 55-year-old, who was guiding a group of Indian army officials up the mountain, reached its 8,849m summit at 04:00 local time on Tuesday (23:15 GMT Monday). "Kami Rita Sherpa needs no introduction. He is not just a national climbing hero, but a global symbol of Everest itself," expedition organiser Seven Summit Treks said in a statement. Kami Rita first summited Everest in 1994 guiding a commercial expedition and has made the peak almost ever year since.

  He scaled it twice some years, like in 2023 and 2024. His closest competitor for the Everest record is fellow Nepali sherpa Pasang Dawa, who scaled the peak 29 times - the latest attempt made last week. Kami Rita has previously told media how his climbs are just work. "I am glad for the record, but records are eventually broken," he told AFP in May last year. "I am more happy that my climbs help Nepal be recognised in the world." Earlier this month, Kami Rita posted snippets of life on Everest, including one of the Puja ceremony, a Tibetan Buddhist ritual done before Everest expeditions to pray for a safe and successful climb. Kami Rita's feat comes one week after British mountaineer Kenton Cool summited Everest for the 19th time, also breaking his own record for the most climbs for a non-sherpa. More than 500 people and their guides have climbed Everest successfully this climbing season, which is coming to an end. Nepal issued more than 1,000 climbing permits this season - including for Everest and other peaks - according to its tourism department. The number of Everest summit attempts has soared in recent years. However this has led to concerns around overcrowding and environmental impact. Last year, authorities introduced a rule requiring climbers to clear up their own poo and bring it back to base camp to be disposed of.
