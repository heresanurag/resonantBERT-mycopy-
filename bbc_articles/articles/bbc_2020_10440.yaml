title: 'Stevie Lee: Jackass star and wrestler dies aged 54 - BBC News'
date: '2020-09-11'
section: Entertainment & Arts
url: http://www.bbc.co.uk/news/entertainment-arts-54120576
content: |-
  The actor and wrestler appeared in Johnny Knoxville's 2010 reality comedy film Jackass 3D.

  Stevie Lee (centre) was a member of the wrestling group Half Pint Brawlers, pictured here in 2011

  Jackass star and TNA wrestler Stevie Lee has died at the age of 54.

  Lee appeared in Johnny Knoxville's 2010 reality comedy film Jackass 3D, and was known in the ring as Puppet.

  He died unexpectedly at home on Wednesday, his family confirmed on a GoFundMe page set up to help cover his funeral costs.

  "Puppet has put smiles across the world with his hardcore attitude and lifestyle," a family statement read.

