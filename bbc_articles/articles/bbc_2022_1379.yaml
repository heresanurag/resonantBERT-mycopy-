title: Thunderstorm alert over for south and east England - BBC News
date: '2022-01-02'
section: UK
url: http://www.bbc.co.uk/news/uk-59853518
content: |-
  Blustery winds and heavy rain move east, as a Met Office weather warning comes to an end.

  Strong winds are hitting parts of south east England - with a storm warning in place until 18:00 GMT on Sunday

  A Yellow weather alert for thunderstorms, which brought heavy showers and high winds to the south and east of England, has come to an end.

  "A band of thunderstorms" moved across England on Sunday, with the Met Office warning of "localised disruption" and difficult driving conditions.

  It follows unseasonably warm weather over the new year.

  Saturday marked the warmest New Year's Day on record, reaching 16.3C (61.3F) in London's St James's Park.

  The original yellow warning, issued mid-morning on Sunday, encompassed a wide swathe of south and south west England, as well Cardiff, Monmouthshire and Newport in Wales - but the warning was later updated to focus on a smaller affected area in the south and east of England only.

  There had been fears about damage to trees and buildings, or disruption to train and road travel but they appear to have come to nothing - although several flood warnings remain in place due to the significant rainfall causing some rivers to overflow.

  A Met Office tweet said it would be "another mild evening" but with "some blustery winds at times". Showers are expected to work their way eastwards "perhaps with hail and the odd thunderstorm in places".

  On Friday, Britain saw its warmest ever recorded New Year's Eve with temperatures reaching 15.8C (60.4F) in Merryfield, Somerset.

  The Met Office said the extremely mild spell was driven by a flow of warm, moist air from the Canary Islands.

  Recent temperatures in England have topped 16C where they more typically reach 7C

  But climate change is also a factor: warm weather records are being broken nine times more frequently, according to the Met Office - a clear sign of an over-heating planet, according to BBC environment analyst Roger Harrabin.

  Globally, climate change has driven temperatures up by 1.1C. In recent days, the US reported dramatic winter wildfires in Colorado - halted by sudden, heavy snowfall - while the state of Alaska recorded its hottest-ever December day at the end of last month.

  The Met Office said the weather across the UK was forecast to get cooler from Tuesday, potentially bringing wintry showers and frosts.

  BBC Weather's Tomasz Schafernaker said, following the "extraordinarily mild weather", it is set to turn colder and temperatures would be "closer to the norm for the time of year" - with temperatures expected to be below freezing in Scotland and Northern Ireland by early Tuesday.

  Most of the UK would continue to have above average temperatures, he said, warning of low pressure and an approaching weather front bringing "a little bit of sleet and snow" to some northern parts of the UK by Monday.

