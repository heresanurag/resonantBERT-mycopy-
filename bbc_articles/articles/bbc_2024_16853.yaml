title: Priti Patel vows to get Tories 'match fit' in leadership bid - BBC News
date: '2024-07-27'
section: General
url: http://www.bbc.co.uk/news/articles/c2lky7z7531o
content: |-
  Dame Priti is the first woman to enter the race, with Kemi Badenoch expected to announce her bid on Monday.

  Dame Priti Patel is the fifth Tory MP to announce her leadership bid

  Former Home Secretary Dame Priti Patel has launched a bid to become leader of the Conservative Party, telling members she can turn it "back into a winning machine". Dame Priti, who served in government under three prime ministers, said her experience meant she would be able to "reinvigorate" the party following its worst ever general election performance. She is the first woman to throw her hat into the ring to replace Rishi Sunak, joining James Cleverly, Robert Jenrick, Tom Tugendhat and Mel Stride in the race. Shadow business secretary Kemi Badenoch - widely seen as a frontrunner to take over from Mr Sunak - is expected to launch her candidacy on Monday.

  Ms Badenoch, who finished fourth in the September 2022 leadership election, is said to have secured the 10 endorsements from fellow MPs required to get on the ballot for the initial vote. Dame Priti has been a backbench MP since stepping down as home secretary in 2022, following the resignation of her ally Boris Johnson. The 52-year-old was widely expected to run for the leadership. She has been highly critical of the Conservative Party's leadership in recent years, blaming them for the Tories' slide from political favour that culminated in July's historic election defeat. "It isn’t our heroic members who failed, but politicians’ distraction from public service," she said on Saturday. “It is time to put unity before personal vendetta, country before party, and delivery before self-interest." Dame Priti added that one point of difference between her and other leadership candidates was that she would reward members' dedication by giving them more of a voice in the party.

  She also said that it would be through focussing on Conservative policies on issues including law and order, immigration and healthcare that would reverse the party's fortunes. “We must now turn our Conservative values into strong policies to bring about positive change for people across our country." Dame Priti, who retained her seat in the Essex constituency of Witham in the recent general election, is a Eurosceptic who was a leading figure in the Vote Leave campaign during the EU referendum. She has previously taken a leading role in negotiations with France over immigration and played a key role in drawing up a new post-Brexit points-based system. The MP has also faced allegations of bullying. In 2020, a Cabinet Office inquiry into her conduct found that Ms Patel had "unintentionally" breached the ministerial code in her behaviour towards civil servants. Her "approach on occasions has amounted to behaviour that can be described as bullying," the government's independent advisor on standards said at the time. Mr Johnson, who was then prime minister, decided Dame Priti had not broken the ministerial code and could remain in her post as home secretary. He awarded her a damehood in his resignation honours last year. Dame Priti also served in Theresa May's cabinet as secretary of state for international development and was Lord Hague's press secretary from 1997 to 2000 after he became the leader of the Conservatives.

  Rishi Sunak will remain Conservative leader until his successor is announced. The process to choose his replacement will see Tory MPs whittle down the field of candidates who secure enough backers to four by the time of the party's annual conference in Birmingham at the end of September. In a series of further ballots, the MPs will then narrow the field to a final two contenders, with party members then choosing the winner. The online vote will end on 31 October, with the result announced two days later on 2 November, three days before the US presidential election.
