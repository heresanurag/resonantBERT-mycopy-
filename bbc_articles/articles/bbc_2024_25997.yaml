id: bbc_2024_25997
title: Sinn Féin employee resigns after damage to DUP portrait - BBC News
date: '2024-10-22'
section: Northern Ireland Politics
url: http://www.bbc.co.uk/news/articles/c5y3y37wyrxo
content: |-
  A painting of a Democratic Unionist Party peer in Belfast City Hall was removed and damaged at the weekend.

  The portrait of a former DUP lord mayor was on display at Belfast City Hall

  A Sinn Féin employee has resigned after admitting involvement in an incident where damage was caused to a portrait in Belfast City Hall. A painting of former lord mayor and Democratic Unionist Party (DUP) peer Lord Wallace Browne was removed from a wall at the weekend and its glass "smashed". A Sinn Féin spokesperson said the employee was "immediately suspended" and the police have been notified. The party said the employee, who worked in the assembly, had now resigned from their job and the party.

  In a social media post, external, DUP leader Gavin Robinson said: "We don't know if the motivation was sectarian bigotry, antisemitism, wanton destruction or a heady mix of the three... but [it's] a disgrace." DUP councillor Dean McCullough said the glass in the portrait's frame had been smashed. "We have called for a full and robust investigation because there are a number of outstanding questions," he said. The council said it was "assessing the extent of the damage and looking into the circumstances". It added that it hoped the portrait could be repaired "as soon as possible so the portrait can be put back on display". The Police Service of Northern Ireland said at 16.50 BST on Monday, they received a report of criminal damage to artwork in Belfast City Hall which occurred on Saturday evening. They encouraged anyone with information to contact them.

  Saturday's incident comes days after a portrait of former Belfast Lord Mayor Niall Ó Donnghaile was removed from City Hall. Party group leaders on the council agreed the move unanimously, it is understood. It followed revelations that Mr Ó Donnghaile quit Sinn Féin after sending inappropriate texts to a teenage boy. Sinn Féin leader Mary Lou McDonald told the Dáil (Irish parliament) there were no findings of illegality and no criminal charges were pursued. The controversy concerning Mr Ó Donnghaile shows no signs of abating, with McDonald saying on Monday that she will make "a full, unequivocal apology" to the teenager. The DUP's McCullough questioned whether the damage to the portrait was "in any way linked" to the "rightful removal" of Mr Ó Donnghaile's portrait. "It is worth highlighting that this particular portrait was painted by the renowned Jewish artist, Israel Zohar - again, raising another, serious question," he added.

  Wallace Browne was lord mayor of Belfast from 2005 - 2006

  The incident happened following an event at City Hall to celebrate an Irish language group's 20th anniversary. Glór na Móna said they were "extremely disappointed" to learn of the incident and would assist the council with its investigation. "Following the formal end of our event, a portrait within city hall was damaged," it said. "Glór na Móna had no knowledge of this taking place and only became aware of this on Monday 21 October when contacted by council staff. "This is completely contrary to the ethos and principles of our organisation and the spirit of our successful anniversary celebratory event." Several senior Sinn Féin members were among those seen in pictures posted online from the city hall event. They included former party leader Gerry Adams and Aisling Reilly, a junior minister in the Northern Ireland Executive.
