title: 'Paris 2024: The AI tech aiming to identify future Olympians - BBC News'
date: '2024-08-09'
section: General
url: http://www.bbc.co.uk/news/articles/cmj2jkppvx3o
content: |-
  Olympics fans are trying a new AI-powered system to see if they may be able to win a gold medal one day.

  Fans at the Olympics are trying out a new AI-powered talent spotting system that hopes to find the gold medallists of the future. Its developers aim to use a portable version of the technology to bring advanced sport science to remote areas around the world. As the alarm sounds, Tacto races frantically to swipe the infra-red sensors in front of him as some of them suddenly flash blue. Not far away his younger brother, Tomo, sprints down a short running track as his motion is tracked by a series of cameras. The seven and four-year-old siblings from Yokohama, Japan, are taking part in a series of AI-powered tests that have been specially set up near the Olympic Stadium in Paris.

  Tomo has his sprinting skills assessed while being watched by his father Tad

  The aim of the system is to identify the potential gold medallists of the future. Data is gathered from five tests which include activities like running, jumping, and measuring grip strength. This information is then analysed to assess a person's power, explosiveness, endurance, reaction time, strength and agility. The results are compared with data from professional and Olympic athletes.

  Tacto and his mother Nami test their reaction times

  “We’re using computer vision and historical data, so the average person can compare themselves to elite athletes and see what sport they are most physically aligned to,” says Sarah Vickers, head of Intel’s Olympic and Paralympic Program. After completing the tests, each participant is told which sport they would be most suited to from a list of 10. Intel says all the data collected from the people taking part is deleted once the process is complete. Aside from technology, it is something the young brothers are having fun doing. “I enjoyed it,” says Tacto. “I liked the bit where we had to sprint the best.”

  Assessors in Senegal filmed children with tablets to allow AI to assess their speed and agility

  The AI system that is open to fans at Paris 2024 has a far smaller, more portable counterpart that can be run on most devices which have a basic camera and a little computing power. “With just a mobile phone or a tablet or a PC you have this opportunity to go into places where you couldn’t go before,” says Sarah. This AI technology can assess people’s performance just by analysing video from the camera without the need for physical sensors. The International Olympic Committee recently took the system to Senegal, where it toured around five different villages and assessed more than 1,000 children on their athletic potential. Partnering with Senegal’s National Olympic Committee, and after a follow-up round of more advanced tests, it identified 48 children with “huge potential”, and one with “exceptional potential”. They have been offered places on sports programmes if they want, to see how far they can take their athletic abilities. It is hoped that the system can be rolled out further and used to offer opportunities to people in areas which it would be impossible to reach with bulkier assessment systems.

  Francesca, from Barcelona, is scanned by the system in Paris

  Prof John Brewer, a visiting lecturer at University of Suffolk, who has worked with England’s Football Association on talent identification, says spotting potential at a young age is the “holy grail” of sport. However, he warns that a basic system that can only measure a few attributes would be limited when it comes to technical sports like football or basketball, or ones that require endurance. “If you want to win the marathon or the 10K you have to have that aerobic capacity, that oxygen transport capacity, that no filming will ever show,” he says. Prof Brewer does see the benefits of the system for making initial assessments of potential athletes. “If they are revealing skill and agility which suggests that they are able to have talent in a particular sport then that has to be encouraged,” he says. “And if it is portable and can be taken to areas where they don’t necessarily have access to high-tech assessment methods, then that can only be a good thing.” “But it would only be one part of a much bigger talent identification system.”

  Ex-swimmers Hank (left) and Brock had their skills assessed

  Back at the Olympic Stadium, young Tacto has his results - he has been identified as a potential sprinter. He is delighted, although he says he currently prefers football and tennis. Two more experienced athletes are Hank and Brock, who both used to compete for their university in the US at inter-collegiate level. This standard can offer world-class facilities and has produced many Olympians. “We’re former athletes and we’re competitive and thought it’d be fun,” says Hank. “This kind of technology wasn’t around when we were swimming 10 to 15 years ago,” Brock adds. And what were their results? “I got basketball and I’ve literally never played basketball in my life,” replies Brock. “Well, he played with me once and we never allowed him back,” replies Hank. It seems even with AI technology, computers cannot get it right every time.
