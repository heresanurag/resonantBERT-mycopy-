content: |-
  Prince William 'lost' his voice after Aston Villa's win against Bayern Munich.

  This video can not be played To play this video you need to enable JavaScript in your browser.

  It was a historic night for Aston Villa as Unai Emery's side beat Bayern Munich in the club's first Champions League home match for 41 years. Jhon Duran's late goal sent the Villa Park crowd into ecstasy, in what was a repeat of Villa's 1982 European Cup final victory against Bayern. The Prince of Wales was one of the lucky Villa supporters to witness the victory but his celebrations came at a price. "I've lost my voice. I can't quite believe it. 42 years," Prince William said after the match. Emery spoke to the prince after the win and urged him to enjoy the victory. "I told him (William) the best moments we can have is days like today and try to enjoy the way," said Emery. "Because when you are getting at the end, I don’t know where, but everything we are doing on the way, every day, every match, try to enjoy it, enjoy the way."

  Prince William with former Aston Villa striker John Carew at the 2019 play-off final

  The prince started supporting Villa during his school days. Despite attending school in Berkshire, Prince William chose a team further afield as he did not want to follow the crowd. "A long time ago at school I got into football big time. I was looking around for clubs. All my friends at school were either Man United fans or Chelsea fans and I didn’t want to follow the run of the mill teams,” he told the BBC in 2015. “I wanted to have a team that was more mid-table that could give me more emotional rollercoaster moments." William was born 26 days after Villa's European Cup final win against Bayern Munich on 26 May 1982. He has spoken previously about the joy he gets from following a club with the ups and downs that Villa have experienced. “Aston Villa’s always had a great history. I have got friends of mine who support Aston Villa and one of the first FA Cup games I went to was Bolton v Aston Villa back in 2000. Sadly, Villa went on to lose to Chelsea (in the final)," he added. “It was fantastic, I sat with all the fans with my red beanie on, and I was sat with all the Brummie fans and had a great time “It was the atmosphere, the camaraderie and I really felt that there was something I could connect with.” Prince William attended the 2019 Championship play-off final win against Derby County and sat alongside former Villa striker John Carew. "He's supporting us but not just now," Emery told CBS after the win against Bayern. "Two years ago when we were not in Europe he was coming to our training round, watching the session, having lunch with us. He's very humble with us. We appreciate a lot his visits to us."

