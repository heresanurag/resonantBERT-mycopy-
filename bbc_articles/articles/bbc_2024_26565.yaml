  Earlier this summer, Prince William was made the Patron of the Football Association, external. The role had previously been filled by Queen Elizabeth II - the prince's grandmother - before her passing in September 2022. Until the appointment, he had held the position of President of the FA after taking the role in 2006. The prince, who was accompanied by eldest son George, presented the FA Cup trophy to Manchester United after their 2-1 victory against Manchester City in May's final. Prince William and George attended the Euro 2024 final in June, which England lost 2-1 to Spain in Germany. George has accompanied his dad to Aston Villa matches, including last season's Europa Conference League victory against Lille at Villa Park and the semi-final exit to Olympiakos.

