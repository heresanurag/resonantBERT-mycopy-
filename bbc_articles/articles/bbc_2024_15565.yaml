  The driver of the number 18 bus is among the injured, although no-one is believed to be badly hurt.

  Six hurt as London bus crashes into scaffolding

  The bus struck the scaffolding on the corner of Harrow Road and Sutherland Avenue

  Six people were hurt when a London double-decker bus carrying passengers crashed into scaffolding attached to a shop. It happened on Harrow Road at the junction with Sutherland Avenue in Maida Vale, west London, shortly before 14:30 BST. Paramedics from London Ambulance Service treated people with injuries at the scene. Among those hurt was the driver of the number 18 bus, although none of the injuries sustained is thought to be serious.

  This image of the scene was posted to X shortly after the collision

  The Metropolitan Police is asking any witnesses and anyone with dashcam footage of the incident to contact the force. No arrests have been made. A spokesperson for RATP Dev Transit London, the operator of the bus route, said: "We are currently investigating the circumstances that led to this incident in cooperation with the relevant authorities.” A number of road closures and safety cordons are in place around the scene.
