content: |-
  The Princess of Wales is showing her support for cancer patients with a photo taken by her six-year-old son.

  Catherine in a wintry photo taken by her son in Windsor in recent weeks

  A photograph of the Princess of Wales taken by her six-year-old son Prince Louis has been released to mark World Cancer Day on Tuesday. The image shows Catherine in a frosty woodland scene, arms open and well wrapped up, and was taken in Windsor in recent weeks. Alongside the photo, the princess posted the words: "Don't forget to nurture all that which lies beyond the disease." The picture is said by Kensington Palace to reflect how spending time in nature has been important to the princess, who announced in January she is in remission from cancer.

  This is the first photo taken by Louis that has been shared on royal social media channels as he follows in the footsteps of his mother, who has been an enthusiastic photographer. At the weekend, Catherine called for a "rebalance" in society to allow people to prioritise their physical and mental health. She is gradually returning to work after completing her cancer treatment - and launched a new stage in her early years education project encouraging more empathy and kindness. "At times, it can feel like the world is filled with mistrust and misunderstanding, leaving many people feeling isolated and vulnerable during difficult times," she wrote in her charity's report. She brought a message of support for those currently undergoing cancer treatment when last month she visited the Royal Marsden Hospital in west London, where she had been a patient. This latest photograph is another indication of her continuing support, ahead of World Cancer Day, and how much she seems to have been motivated to help others by her own experience of ill health.

