title: 'Nazanin Zaghari-Ratcliffe: ''Boris should resign'' says Sadiq Khan - BBC News'
date: '2017-11-12'
section: General
url: http://www.bbc.co.uk/news/uk-politics-41959523
content: |-
  The London mayor calls for the foreign secretary to resign over comments about a woman held in Iran.

  Mayor of London Sadiq Khan has called for Boris Johnson to resign over comments he made about a British-Iranian woman being held in Iran.

  The foreign secretary caused consternation when he told a group of MPs that Mrs Zaghari-Ratcliffe had been "training journalists" in Iran.

  Her family say Mrs Zaghari-Ratcliffe was in Iran visiting family,
