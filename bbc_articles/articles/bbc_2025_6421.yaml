title: UK jobs market weakens as employment costs grow - BBC News
date: '2025-04-15'
section: Business
url: http://www.bbc.co.uk/news/articles/c30qzng45mzo
content: |-
  The number of job vacancies and people on payrolls fell ahead of changes to National Insurance and wages.

  Job vacancies have fallen to the lowest level in nearly four years, suggesting demand for workers is weakening as employment costs grow. The number of jobs on offer fell to 781,000 in the first three months of the year, the Office for National Statistics (ONS) said, while payroll numbers also declined. Average UK pay continued to rise - up 5.9% - but increases in employer National Insurance Contributions as well as National Minimum Wage hikes which came into force this month are forecast to weigh on salaries. "The looming hike in employers' taxes in April is very likely to have persuaded employers to hold back on hiring," said Sarah Coles, head of personal finance at Hargreaves Lansdown.

  Employment Minister Alison McGovern welcomed a continuing rise in real wages and said April's changes would boost "people's payslips and improving living standards". However, the number of workers on payrolls dropped by 78,000 in March and were revised down for the previous month. Ms Coles said that pausing hiring "is the simplest lever for businesses to pull when they want to slow things down. It's far cheaper and damaging than letting people go, so may be a sign of things to come". The ONS said the UK unemployment rate remained at 4.4%, roughly the same as the previous three months. The employment rate for people aged 16 to 64 years was 75.1%, still below Labour's target of 80% employment. However, the ONS has said its jobs figures should be treated with caution because of low response rates to its employment survey, on which the figures are based.

  While wage growth remains strong, some economists are predicting this will not last. Yael Selfin, chief economist at KPMG UK, said: "The short-term impact of the rise in labour costs which came into effect in April, will likely put downward pressure on pay over the coming months." Meanwhile, recruitment firm Manpower said the whole picture of the labour market will not be fully understood for some time as the effect of Donald Trump's tariffs spreads. "We're seeing much broader scale cutbacks than we'd previously anticipated as higher costs coincide with the Trump-led tariffs and British Steel negotiations, all adding to a greater sense of uncertainty for businesses," said Anna Spaul, market intelligence director at ManpowerGroup. The strength in wage growth contrasted with signs of weakness in hiring illustrates the dilemma facing the Bank of England and interest rates which are currently at 4.5%. Wage growth could delay further rate cuts but the Bank may act to stimulate the economy following the implementation of tariffs in the UK and globally. The Bank will hold its next interest rate-setting meeting in May.
