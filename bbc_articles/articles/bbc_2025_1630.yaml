title: Knockholt pub shooting suspect believed dead in River Thames - BBC News
date: '2025-02-20'
section: Kent
url: http://www.bbc.co.uk/news/articles/c24137eq9gpo
content: |-
  Police believe the man suspected of shooting Lisa Smith died after falling into the River Thames.

  The man suspected of fatally shooting Lisa Smith is believed to have died, Kent Police say

  A man suspected of fatally shooting his wife outside a pub in Kent is believed to have died after falling into the River Thames, police say. Edvard Stockings is suspected of shooting Lisa Smith in the car park of the Three Horseshoes pub in Knockholt last Friday. Det Ch Insp Dave Higham said: "Our inquiries have concluded that the suspect is believed to have died after falling into the River Thames." Mr Stockings's body has yet to be found but searches are ongoing, Kent Police added.

  Ms Smith, 43, from Slough, was shot dead shortly after 19:00 GMT on Valentines Day. Det Ch Insp Higham added: "This murder has led to the senseless loss of a beloved daughter and mother and our thoughts remain with Lisa's family."

