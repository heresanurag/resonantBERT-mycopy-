  A friend of Mr Stockings, who was also known as Smith, previously said he received a call from him where he told him: "She's dead, I love you. I'll see you on the other side." CCTV footage captured the sound of three gunshots, followed by shouting and screaming. A car and gun, linked to the suspect, were found "next to the Dartford crossing", police said. They added that the car was found on the bridge.

  The Three Horseshoes Pub in Knockholt

  Mr Stockings's friend, Leslie Thompson, said he had known Mr Stockings for more than 30 years and the shooting did not make sense, adding: "They were both the life and soul of the party. We really don't know why he has done it. I'm baffled." He added that Mr Stockings was "unbelievably close" to his father and had been deeply affected by his death two years ago. "He's had a breakdown," Mr Thompson concluded, adding he was "one million percent sure... [Mr Stockings is] in the river." A police spokesperson said the force would be assisting the coroner.
