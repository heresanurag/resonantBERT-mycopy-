title: 'As it happened: I would jab my children, says Prof Jonathan Van-Tam - BBC
  News'
date: '2021-08-04'
section: UK
url: http://www.bbc.co.uk/news/live/uk-58083530
content: |-
  Healthy teenagers will be offered a Pfizer jab and will get good protection from one dose, the JCVI says.

  Why now and will parental consent be needed?

  We've moved to questions from journalists now and the first is from the BBC's Sanchia Berg. She asks why the JCVI has made this decision now - and if 16 and 17-year-olds will have to have parental consent to be vaccinated. Prof Wei Shen Lim said there was more data "across a range of factors that influences advice". In the UK a person who is 16 or above is deemed able to give consent themselves. If they are competent and able to consent for themselves, that consent therefore holds, he says. Prof Jonathan Van-Tam says there is no time to waste as schools and colleges will soon be going back. "I want us to proceed as fast as is practically possible, that isn't going to be tomorrow, I don't think it's likely to be early next week." But he says the NHS has been preparing for very many weeks and the programme will start in "a very short number of weeks indeed". He says there is "a plentiful supply" to meet whatever form this stage of the vaccine rollout will take.
