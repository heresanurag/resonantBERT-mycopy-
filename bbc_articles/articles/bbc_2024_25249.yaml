title: Panda Fu Bao fans bid emotional farewell in South Korea - BBC News
date: '2024-10-16'
section: General
url: http://www.bbc.co.uk/news/world-asia-68727131
content: |-
  Thousands of Fu Bao fans lined the streets, as the country's first giant panda left for China.

  Thousands of emotional Fu Bao fans lined the streets near Everland theme park, as the first giant panda born in South Korea left for China to join a breeding programme.

  Her parents were sent to South Korea as part of China’s "panda diplomacy" programme and after Fu Bao was born, she doubled the number of visitors at the park.

  Video shows a truck carrying the beloved panda moving through the streets, as people stand on the side of the road waving flags and wiping away tears.
