content: |-
  A selection of your pictures of Scotland sent in between 27 August and 3 September.

  Send your photos to scotlandpictures@bbc.co.uk. Please ensure you adhere to the BBC's rules regarding photographs that can be found here.

  Please also ensure you follow current coronavirus guidelines and take your pictures safely and responsibly.

  Conditions of use: If you submit an image, you do so in accordance with the BBC's terms and conditions.

  Easily spotted: A cold ladybird covered in dew captured on an early morning walk in Tentsmuir forest, Fife, by Liz Ross.

  Fun guy: Spotted near Culbo on the Black Isle by Ian Dudgeon.

  Epic outline: "From Foula's northern cliff edge above the Atlantic, the island's highest peak Da Sneug ... and in the distance Hamnafield," says Carol Christiansen.

  To the fore: Golfers in North Berwick at sunset captured from West Bay beach in this image from Craig Smith.

  Standing tall: "The world famous Glenfinnan Monument in all its glory," says Mark Reynolds.

  Feeling peckish: "Hungry Laird and Ellis thinking hurry, hurry at the Wee Hurrie in Troon," says dad Scott Torbett.

  Field of vision: Duncan Murdoch captured this view of harvest time at West Pilmore Farm, Invergowrie, looking across to the Tay.

  Mane attraction: "These are some very cheeky ponies on top of Traprain Law in East Lothian," says Zoe Alston. "One even tried to eat our lunch!"

  Howzat? Tom Neilson took this shot while walking through the Meadows in Edinburgh.

  Still waters: The Laggan dam, Spean Bridge in the Highlands, from Lindsay Munro.

  Lorraine Allen, who is originally from Scotland but now lives in East Yorkshire, took this snap of her Border Terrier Erik at Braemar showground. "He was intrigued after other members of our human family had a go so we thought he should join in," she said.

  Hello there: "Thought this was a nice picture of two Highland cattle staring at each other on a misty morning," says Neil Brown.

  See for miles: A bench stop for lunch on a hike to the Devil's Beef Tub from Moffat for Gosia Tyma McCallum.

  Open plan: An old building at St Magnus Bay, Shetland, by Stuart Collinson.

  Nature wins: Linda Armstrong took this image on the outskirts of Cairneyhill on the Fife Pilgrim Way.

  Picture perfect: Eddie McMaihin captured the Japanese Gardens at Dollar on a sunny day.

  Milk race: "Curious cows after riding through their field on the Isle of Bute," says David Sykes.

  Striking sky: Taken in Orkney just outside of Kirkwall in the garden of the holiday house where Chris Thomson was staying.

  High spot: "The tower on the top of Kinpurnie Hill, in the Sidlaws north of Dundee was apparently an observatory," says Jen Low.

  Wait for me: A cygnet battling to keep up with the family on the Forth and Clyde canal in this picture from Valerie Pegler.

  Worth the effort: The view from the top of Bracara Brae, Loch Morar during an evening bike ride from Bunacaimb for Julie Bagwell.

  Colourful scene: A peace cranes installation at St John's Church Edinburgh, as part of the Just Festival 2021, snapped by Janina Dolny.

  Total relaxation: Sue Watson sent in this image of a cat soaking up the September sun.

  Calm sea: A beautiful day at Portpatrick harbour captured in all its glory by David Carr.

  Day trip: David Granger and wife Carole went to Fort William and drove round to Corpach to see the shipwreck.

  Long hours: Late-night working at Longnewton Farm by St Boswells in the Scottish Borders, from Curtis Welsh.

  Supper time: Jayne Sayliss saw this sea otter in the bay at Laide in Wester Ross with a freshly-caught crab.

  Rush hour: Stromness after nightfall on a "calm evening", says Nigel Heath.

  Dog delight: "Tess and Skye were having fun chasing a ball at the Loch of the Lowes in the Scottish Borders," says Walter Baxter.

  Aye aye! An unusual angle on this gannet chick, snapped on Bass Rock by Jacki Gordon.

  Amazing vista: Derek McRonald took this picture at 8am at the top of Ben Nevis on a rare clear day.

  Special scene: A mirror image cast on the Lake of Menteith with the Port of Menteith Church reflected on the calm waters, from Ian Barnes.

