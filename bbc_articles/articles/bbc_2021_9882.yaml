content: |-
  Emmanuel and Ebenezer Boakye say growing up in a single-parent family made them determined to thrive.

  This video can not be played To play this video you need to enable JavaScript in your browser. Ebenezer and Emmanuel Boakye say they were confident about getting six A*s

  Twin brothers from east London have gained places at Oxford and Cambridge universities after achieving top A-level grades.

  Emmanuel and Ebenezer Boakye managed a combined six A*s and one A at Hackney's Mossbourne Community Academy.

  Emmanuel will now study English literature at Oxford University, while Ebenezer will read Spanish and Russian at Cambridge.

  Emmanuel told the BBC he was "not really processing" the results yet.

  Top grades for A-level results for England, Wales and Northern Ireland have reached a record high - with 44.8% getting A* or A grades.

  Emmanuel and Ebenezer Boakye achieved a combined six A*s and one A

  The 18-year-old brothers said growing up in a single-parent household in Hackney had made them determined to make something of their lives and "make their mum proud".

  Emmanuel said: "It's not really sunk in yet.

  "We've always had people in our corner, our mum and the school, supporting and pushing us to do it."

  Emmanuel said he had planned on going to Cambridge with his brother, until he attended an event by the Oxford University African Caribbean Society.

  Despite going to different universities the pair say there will be no sibling rivalry.

  "We're still going to support each other at our different universities," Ebenezer said.

  The brothers plan to celebrate their achievement by "going to Nando's or something", Ebenezer added.

  Victoria Genfi said she sent her sons to Mossbourne Community Academy due to its "discipline"

  The pair's mum Victoria Genfi, 58, said: "I can't put into words how proud I am or how wonderful they are."

  Ms Genfi, who raised the twins and an older sister alone, said their childhood had been "difficult".

  "We've come a long way," she said.

  "I believe that no matter what background you come from if you push your children and support them through everything, they can achieve anything."

  Ms Genfi, who works at JD Wetherspoon, said she planned to deliver home-cooked meals to her sons once a month, alternating between the universities.

  In what is the second year of replacement results after exams were cancelled due to the Covid pandemic, there has been a significant improvement on 2020's results when 36.5% of students achieved top grades.

