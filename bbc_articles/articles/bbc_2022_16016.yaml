  Shetland author Ann Cleeves has tweeted that she lost her laptop "in the blizzard" on Monday.

  She has offered a reward, saying there is half a novel saved on the computer.

  The wintry weather looks set to continue as a Met Office yellow weather warning for snow and ice has been extended until 12:00 on Friday.

  It covers the north and north-east of Scotland, Shetland, Orkney and the Western Isles.

  Forecasters say snow showers and icy surfaces will bring some travel disruption.

  A temperature of -17.3C was recorded in Braemar, Aberdeenshire, early on Tuesday morning, making it the coldest night of the year so far.

  A van came off the road near Uig in Skye due to the icy conditions

  The Braemar met office which recorded the coldest temperature of the year on Monday night

  Elsewhere in Scotland, some schools have been shut in Highland, Moray and Dumfries and Galloway due to the effects of the weather.

  Police in Dumfries and Galloway have warned young people not to play on the ice, after receiving multiple calls from the public.

  Snow has caused disruption to travel on the A9 near Inverness, and in Skye one driver had a lucky escape after his van came off the road near Uig.

  A newly erected fence stopped his vehicle from going down a steep slope.

  Meanwhile Aberdeen City Council has reported issues with buttons on traffic lights freezing due to the cold weather.

  It said that engineers will be de-icing the units but warned they may freeze again.

