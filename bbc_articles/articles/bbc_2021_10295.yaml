title: Afghanistan in serious danger - President Ghani - BBC News
date: '2021-08-15'
section: General
url: http://www.bbc.co.uk/news/world-asia-58213300
content: |-
  Ashraf Ghani addresses the nation as the Taliban reportedly close in on the Afghan capital, Kabul.

  The president of Afghanistan, Ashraf Ghani, has given his first national address since the Taliban intensified their nationwide military campaign.

  The militants are reportedly closing in on the capital, Kabul, and have now taken half of the 34 Afghan provincial capitals.

  The president said steps were being taken to boost Afghanistan's security and defence forces.
