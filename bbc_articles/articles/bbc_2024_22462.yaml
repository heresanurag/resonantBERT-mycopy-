title: Fossil fuel companies invest £4bn in sports to 'greenwash' reputations - report
  - BBC Sport
date: '2024-09-19'
section: Sustainability
url: http://www.bbc.co.uk/sport/articles/cvgxe2n05v3o
content: |-
  Fossil fuel companies invest more than £4bn in sports sponsorship to "greenwash their reputations", according to a new report.

  Saudi Arabia’s national oil giant Aramco have deals in F1, football and cricket

  Fossil fuel companies have invested more than £4bn in sports sponsorship "in an attempt to divert attention from their role in fuelling the climate crisis and harming human health”, according to a new report. Green think-tank New Weather Institute (NWI) analysed more than 200 active deals, claiming “sport is increasingly one of the areas oil and gas companies are using to greenwash their reputation". Its report, ‘Dirty Money - how fossil fuel sponsors are polluting sport’, found that football had the most partnerships with the energy and petrochemical industry (58), followed by motorsports (39), rugby union (17), and golf (15). Team GB gold-medal winning Olympic rower Imogen Grant says it shows sport is “being used to improve the perception of companies that are doing terrible things to our environment, directly impacting the sports they are sponsoring". "A lot of that is coming from massive state-owned fossil fuel sponsors but it's not a deal sport can accept for much longer," she told BBC Radio 4's Today programme. NWI says Saudi Arabia's national oil giant Aramco was the biggest fossil fuel sponsor of sport, paying almost £1bn across 10 active sponsorships, followed by petrochemical companies Ineos (£588m), Shell £355m) and TotalEnergies (£257m).

  Earlier this year Aramco announced a partnership with world football governing body Fifa. It is also a major sponsor of Formula 1 and has a global deal with the International Cricket Council, the sport's world governing body. It declined to comment. Ineos, which has invested in a range of sports teams, also declined to comment, although its chairman Sir Jim Ratcliffe has previously denied allegations of 'sportswashing' by campaigners. TotalEnergies - whose sponsorship of the 2023 Rugby World Cup was criticised by Greenpeace - has been contacted for comment. It has previously said: "Our sports sponsorship represents a tremendous open-air laboratory where TotalEnergies can trial the new solutions that it has pioneered to support and guide its customers and partners towards the mobility of tomorrow's world and carbon neutrality." Shell, which sparked controversy by sponsoring British Cycling in 2022, said it has "invested £4.2bn in low-carbon solutions last year, which was 23% of its capital spending". It added: "This is to support the development of low-carbon energy solutions including e-mobility, low-carbon fuels, renewable power, hydrogen, and carbon capture and storage." NWI is calling on sports organisations and governing bodies to introduce "tobacco-style bans on sponsorship from fossil fuel companies, and actively seek and encourage more sustainable sources of funding". Andrew Simms, co-director of NWI, said: "Oil companies who are delaying climate action and pouring more fuel on the fire of global heating, are using big tobacco's old playbook and trying to pass themselves off as patrons of sport. "But air pollution from fossil fuels and the extreme weather of a warming world threaten the very future of athletes, fans and events ranging from the Winter Olympics to World Cups. "If sport is to have a future it needs to clean itself of dirty money from big polluters and stop promoting its own destruction."
