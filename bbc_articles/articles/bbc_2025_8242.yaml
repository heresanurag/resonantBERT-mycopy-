title: Blondie drummer Clem Burke dies, aged 70 - BBC News
date: '2025-04-08'
section: Culture
url: http://www.bbc.co.uk/news/articles/c1wd0qvx2gvo
content: |-
  The musician, who had cancer, was the powerhouse behind hits like Atomic, Heart Of Glass and Call Me.

  Clem Burke, the drummer for 1970s new wave band Blondie, has died aged 70 following a "private battle with cancer", the band's spokesperson has confirmed to the BBC. Named one of the greatest drummers of all time by Rolling Stone magazine, external, his energetic fills and melodic flourishes elevated UK number one hits like Call Me, The Tide Is High, Atomic and Heart Of Glass - with Burke deftly switching between punk, reggae, disco and hip-hop grooves. In a long and varied career, he also played with Iggy Pop, Bob Dylan, The Ramones, Eurythmics and Take That's Mark Owen. "Clem was not just a drummer; he was the heartbeat of Blondie," his bandmates said in a tribute posted on Facebook, external.

  "His talent, energy, and passion for music were unmatched, and his contributions to our sound and success are immeasurable," wrote singer Debbie Harry and guitarist Chris Stein. "Beyond his musicianship, Clem was a source of inspiration both on and off the stage. His vibrant spirit, infectious enthusiasm and rock solid work ethic touched everyone who had the privilege of knowing him."

  (Left to right) Chris Stein, Debbie Harry and Clem Burke of Blondie, pictured in 2021

  Burke was born and raised in New Jersey, and said his earliest memory was "playing my father's kit along to the Four Seasons". He gained experience in marching bands and cover groups, before being recruited for Blondie in 1974. From the start, he envisioned his role as something more than a mere time-keeper. "I always appreciated drummers like Hal Blaine (Phil Spector's go-to session drummer) and Earl Palmer (Little Richard, Fats Domino) who were consummate studio musicians, and had the kind of musicality and versatility that I aspired to," he told Mixdown magazine last year, external. "I wanted to be able to contribute to the song rather than detract." The band made their name in New York punk clubs such as CBGB, alongside contemporaries such as Talking Heads, Television, and Patti Smith and released their self-titled debut album in 1976. However, it was 1978's Parallel Lines that made them household names, powered by new wave hits like One Way Or Another and the disco grooves of Heart of Glass. Recording the drum track for Heart Of Glass was a torturous experience, however. Producer Mike Chapman wanted to synchronise Burke's playing to a Roland drum machine - an experimental procedure that led to the drummer playing each of his drums individually, then piecing together the rhythm track over the period of a week. By the end of the session, "he was ready to kill me," Chapman later told the Wall Street Journal., external

  Burke's bandmates paid tribute calling him "the heartbeat of Blondie"

  When Stein became critically ill in 1982, Blondie disbanded. Burke spent the intervening years playing with US rock band The Romantics, and worked with everyone from Pete Townshend and Joan Jett, to Sex Pistol Steve Jones and The Ramones - for whom he adopted the stage name Elvis Ramone. However, he returned to Blondie when they reformed in 1997, and scored his sixth UK number one single with the anthemic Maria. Speaking to BBC News in 2021, Harry said that having Burke back in the band meant their legacy wouldn't be diluted. "I think a lot of times when bands get back together, they don't have enough of the original musicians," she said. "With Chris and Clem and myself, we had that core, and it really weighed heavily, you know?" The band have continued to perform and record ever since, and played Glastonbury's Pyramid Stage in 2023. Burke also became involved with a years-long study of the physical and psychological effects of drumming. That led to the establishment of the Clem Burke Drumming Project in 2008, whose detailed studies showed that drummers can reach the same physical exertion as professional athletes. As a result, he was given an honorary doctorate by the University of Gloucestershire in 2011. Burke made his last appearance with Blondie at Northern Ireland's Belsonic festival last summer, still wearing his CBGB t-shirt. "His influence and contributions have spanned decades and genres, leaving an indelible mark on every project he was a part of," wrote Harry and Stein on Facebook. "We extend our deepest condolences to Clem's family, friends, and fans around the world. His legacy will live on through the tremendous amount of music he created and the countless lives he touched.
