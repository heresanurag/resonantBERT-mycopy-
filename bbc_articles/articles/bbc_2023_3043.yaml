title: Six times Nicola Sturgeon spoke her mind - BBC News
date: '2023-02-16'
section: General
url: http://www.bbc.co.uk/news/uk-scotland-64648039
content: |-
  Scotland's first minister shared her view on the Tories, Jeremy Clarkson and controversial haircuts.

  Nicola Sturgeon has confirmed that she is resigning as Scotland's first minister, saying there was much more "intensity", and "brutality", to the life of a politician, than there was in previous years.

  These are some of the recent moments from her political career where she didn't hold back her thoughts on the government, Jeremy Clarkson and possible controversial haircuts.
