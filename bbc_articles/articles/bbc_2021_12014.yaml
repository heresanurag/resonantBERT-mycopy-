title: 'Afghanistan: Taliban raise flag in Afghan resistance stronghold - BBC News'
date: '2021-09-06'
section: General
url: http://www.bbc.co.uk/news/world-asia-58460845
content: |-
  The Taliban claim to have taken Panjshir – the last pocket of Afghanistan not under their control.

  The Taliban have posted a video of their fighters raising their flag in Panjshir – the last pocket of Afghanistan not under their control – as they claim to have taken the valley.

  While resistance fighters dispute this, saying they still have a presence in the area, the Taliban flag can be seeing flying in front of the provincial governor's office.

  Read more: Taliban claim to have seized holdout Afghan valley
