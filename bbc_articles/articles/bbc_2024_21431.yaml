title: Tyreek Hill traffic stop video released by Miami police - BBC News
date: '2024-09-10'
section: US & Canada
url: http://www.bbc.co.uk/news/articles/c4gqnvj1v8lo
content: |-
  The American football star was briefly detained before the Miami Dolphins' first match of the season.

  This video can not be played To play this video you need to enable JavaScript in your browser.

  Police in Miami have released bodycam footage of a traffic stop involving American football star Tyreek Hill, who was pulled from his vehicle and handcuffed by officers. Mr Hill was pulled over on his way to Hard Rock Stadium in the south Florida city just hours before the opening match of the season. Miami-Dade police say one of the officers involved in the stop has been placed on administrative duties pending an investigation. Two of Mr Hill’s Miami Dolphins teammates, Calais Campbell and Jonnu Smith, were also involved in the incident.

  The team issued a statement on Monday backing their star wide receiver, saying: "We are saddened by the overly aggressive and violent conduct" shown to Mr Hill and the other players. The team called for the officers involved in the incident to be disciplined. Mr Hill said the officer placed on administrative duties should be fired immediately. "Each action that a law enforcement official take[s] is governed by standard operating procedures," he said in a statement issued by his lawyer. "The officer's use of force was excessive, escalating, and reckless. "We are demanding that the officer be terminated effective immediately." The local police union said that the officers acted properly during the encounter.

  A still from the bodycam footage showing Tyreek Hill being detained by Miami police

  The traffic stop happened not far from the team’s home stadium, and the bodycam footage begins when Mr Hill’s car is pulled over, several officers approach, and one knocks on the window. “Don’t knock on my window like that,” Mr Hill says several times after rolling the window down. The officer responds: “Why don’t you have your seatbelt on?” After a brief exchange Mr Hill then says: “Give me my ticket bro, so I can go, I’m gonna be late." Mr Hill then rolls the car window back up. The officer knocks on the window again and orders him to put it down again. “Keep your window down (or) I’m going to get you out of the car,” the officer says. “As a matter of fact, get out of the car.” The officers pull the football star out of the car and put him face down on the pavement. “When we tell you to do something, you do it, do you understand?” one of the officers says, as they handcuff Mr Hill. “You were beating on my window like you crazy,” Mr Hill is heard saying. The officers then march him over to the curb and make him sit down. “I just had surgery on my knee, bro,” Mr Hill tells the officers. Two of Mr Hill's teammates - defensive tackle Calais Campbell and tight end Jonnu Smith- stopped along the road as the incident was unfolding. Mr Campbell also said he was placed in handcuffs as he tried to intervene in the situation.

  Both players were released shortly after the traffic stop. Mr Hill was able to get to the game, scoring a touchdown in the Dolphins’ 20-17 win against the Jacksonville Jaguars. He celebrated by pretending to be placed in handcuffs with his teammates. At a news conference after the game, Mr Hill said he did not know why he had been stopped and handcuffed. "I was just doing what my uncle always told me to do if I was in a situation like that, just listen, put your hands on the steering wheel. Gotta be careful, man. "They said I was speeding, but I don't know,” he said. “What if I wasn't Tyreek Hill? Worst-case scenario, you know?” In a statement, Miami-Dade Police Department Director Stephanie V Daniels said that an internal affairs investigation was underway and that one of the officers involved had been place on administrative duties. "I'm committed to transparency and accountability to the community with any situation involving my officers,” Ms Daniels said. The local police union issued a statement describing Mr Hill as "uncooperative" and said that he was “driving in a manner in which he was putting himself and others in great risk of danger”, but that he was never formally placed under arrest. "Upon being stopped, Mr Hill was not immediately cooperative with the officers on the scene who, pursuant to policy and for their immediate safety, placed Mr Hill in handcuffs,” said the statement from South Florida Police Benevolent Association president Steadman Stahl. Mr Hill's attorney, Julius Collins, told CNN that the video contradicts the police union's statement. US media reported that Mr Hill was given citations for careless driving and failing to wear a seatbelt.
