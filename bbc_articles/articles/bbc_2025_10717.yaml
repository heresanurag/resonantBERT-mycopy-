  The couple's first son RZA was born in May 2022 and their second son, Riot, was born in August 2023.

  The pop star and businesswoman is known for her high-profile pregnancy announcements. She debuted the pregnancy of her first child with a photoshoot with her partner in Harlem, New York City in 2022. When she performed at the Super Bowl halftime show in 2023 she revealed she was expecting their second child. She's not the first star to reveal their baby bump at the Met Gala - the former tennis player, Serena Williams and model Karlie Kloss both publicly revealed their pregnancies at the 2023 event.

  Speculation started mounting that the couple were expecting their third child when Rihanna was seen entering the Carlyle Hotel ahead of the event
