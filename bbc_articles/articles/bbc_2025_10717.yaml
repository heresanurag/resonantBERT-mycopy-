title: Rihanna and A$AP Rocky reveal third pregnancy at 2025 Met Gala - BBC News
date: '2025-05-06'
section: Culture
url: http://www.bbc.co.uk/news/articles/cde21wnlrpjo
content: |-
  Partner A$AP Rocky confirms the news on the red carpet, telling reporters the couple were "happy".

  Rihanna reveals she is expecting third child with A$AP Rocky

  Singer Rihanna has confirmed she is expecting her third baby while attending fashion's biggest night of the year, the Met Gala in New York. The 37-year-old cradled her bump and smiled for the cameras while appearing on the red carpet, which was navy with daffodils. Rihanna, whose real name is Robyn Fenty, and her partner, rapper A$AP Rocky, already have two sons. A$AP Rocky, also known as Rakim Mayers, thanked reporters who offered their congratulations on the red carpet. "It is time to just show the people what we were cooking up," he said.

  Rihanna was the last to arrive at the benefit event for New York's Metropolitan Museum of Art, which marks the opening of its Costume Institute's annual fashion exhibit. Each year celebrities wear extravagant outfits in line with the event's theme. This year's concept was "Superfine: Tailoring Black Style," the first since 2003 to focus exclusively on menswear. A$AP Rocky, a co-chair of the event, confirmed the couple's pregnancy news on the red carpet. "Thank you, thank you, thank you," the rapper said. "I'm glad everybody's happy for us because we're definitely happy", he added.

