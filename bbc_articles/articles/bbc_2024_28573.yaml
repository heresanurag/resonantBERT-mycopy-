title: Ukraine fires US-supplied longer-range missiles into Russia, Moscow says -
  BBC News
date: '2024-11-20'
section: Europe
url: http://www.bbc.co.uk/news/articles/c0mzjm7knw7o
content: |-
  Missiles targeted an ammunitions depot in Bryansk region, Moscow says, with Foreign Minister Lavrov saying the US wanted to escalate the conflict.

  Army Tactical Missile Systems (Atacms) can reach up to 300km (186 miles) and are tough to intercept due to their high speed

  Ukraine has fired US-supplied longer-range missiles at Russian territory for the first time, the Russian government said, a day after Washington gave its permission for such attacks. US officials also confirmed use of the Army Tactical Missile System (Atacms) to CBS news, the BBC's US partner. Ukraine has not commented. Russia's defence ministry said the strike had targeted the Bryansk region bordering Ukraine to the north on Tuesday morning. It said five missiles had been shot down and one had caused damage - with its fragments starting a fire at a military facility.

  But two US officials said initial indications suggested Russia had intercepted just two missiles out of around eight fired by Ukraine. The BBC has not been able to independently verify the contradicting figures. Russia’s Foreign Minister, Sergei Lavrov, accused Washington of trying to escalate the conflict. "That Atacms was used repeatedly overnight against Bryansk Region is of course a signal that they [the US] want escalation," he said. "And without the Americans, use of these high-tech missiles, as [Russian President Vladimir] Putin has said many times, is impossible." He said Russia would "proceed from the understanding" that the missiles were operated by "American military experts". "We will be taking this as a renewed face of the Western war against Russia and we will react accordingly," he told a press conference at the G20 in Rio de Janeiro.

  Earlier on Tuesday, the Kremlin approved changes to Russia’s nuclear doctrine, setting out new conditions under which the country would consider using its arsenal. It now says an attack from a non-nuclear state, if backed by a nuclear power, will be treated as a joint assault on Russia. Commenting on the changes, US state department spokesperson Matthew Miller said: "Since the beginning of its war of aggression against Ukraine, [Russia] has sought to coerce and intimidate both Ukraine and other countries around the world through irresponsible nuclear rhetoric and behaviour." He added that the US had not "seen any reason" to change its own nuclear posture, but would "continue to call on Russia to stop bellicose and irresponsible rhetoric". UK Prime Minister Sir Keir Starmer also described the move as "irresponsible rhetoric", adding that was "not going to deter our support for Ukraine".

  Ukraine has already been using Atacms in Russian-occupied areas of its own territory for more than a year. The missiles can hit targets at a range of up to 300km (186 miles) and are difficult to intercept. Kyiv is now able to strike deeper into Russia using the missiles, including around the Kursk region, where Ukrainian forces hold more than 1,000 sq km of territory. Ukrainian and US officials reportedly expect a counter-offensive in the region.
  • None Atacms: What we know about missile system Ukraine is using to strike Russia In a statement, Russia’s defence ministry said the strike had been launched at 03:25 (00:25 GMT). A fire caused by fallen debris from one of the missiles was quickly extinguished and there were no casualties, it said. Ukraine’s military earlier confirmed that it had struck an ammunition warehouse in the Russian region of Bryansk, but it did not specify whether Atacms had been used. It said the attack, on a depot around 100km from the border near the town of Karachev, had caused 12 secondary explosions.
