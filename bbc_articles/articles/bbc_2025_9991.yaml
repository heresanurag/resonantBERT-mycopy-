title: Glastonbury Festival yurt glampers ticketless as Yurtel goes bust - BBC News
date: '2025-05-23'
section: England
url: http://www.bbc.co.uk/news/articles/czelydedx44o
content: |-
  Festivalgoers who booked through Yurtel have been left ticketless and out of pocket.

  Some festivalgoers had booked accommodation and tickets through Yurtel which has since appointed liquidators

  A number of Glastonbury glampers have been left ticketless and out of pocket weeks before the festival after a luxury yurt company went into liquidation. Festival-goers had booked accommodation and event tickets through Yurtel, based in Corsham, Wiltshire, but have since been told by the company that their bookings will not be fulfilled after it ceased trading on 8 May. Prices for hospitality tickets and accommodation packages offered by the company ranged from £10,000 up to £16,500. The BBC has approached Yurtel for comment. Glastonbury Festival said while it was "disappointing" for those who had booked through the company, it has "no involvement with the operation of Yurtel".

  The cheapest package offered by Yurtel was £10,000 for a deluxe bell tent with options ranging up to £16,500 for a presidential suite, which featured a front deck with seating, a king sized bed and a sofa. In an email to customers, the company said it ceased trading due to insolvency and would commence formal liquidation shortly. It said that accommodation booked with Yurtel would not be available and advised people to book with another provider. It added that money customers had paid "cannot be refunded" and advised that details of the claim process would be provided to creditors when liquidation has started.

  Lydia, who paid £10,000 plus vat for tickets and accommodation for two via bank transfer, said she was "absolutely gutted". She claimed the company did not allow customers to book via credit card. "I tried to get it [tickets] through the normal Glastonbury route and wasn't successful and then booked quite soon after that," she said. Lydia said "the only option" was to purchase tickets through Yurtel, with her parents also spending £16,000 to join her. She had booked tickets to go last year but had to cancel due to an operation. "This was a very, very expensive thing that people would save for. It is no drop in the ocean. " she added.

  Customers had paid to stay in luxury tents, similar to the ones pictured here

  Louise, who paid £13,500 via bank transfer for tickets and accommodation, said she felt "sick to her stomach" when she found out Yurtel had gone into liquidation. She sad she had booked the luxury Glastonbury glamping tickets as a "once in a lifetime special treat". "It felt like a sickening feeling in the pit of my stomach and also regret," she said. "The fact that someone had just walked away with our money and we had nothing to show for it." Just like Lydia, Louise also claimed that the company did not allow customers to book via credit card. "My husband tried to pay by card, because we knew then we'd be protected, but they insisted they didn't take card," she added.

  Glastonbury Festival said Yurtel was one of a small number of campsites local to Worthy Farm with limited access to purchase hospitality tickets for their guests in certain circumstances. "As such we have no records of their bookings and are unable to take any responsibility for the services and the facilities they offer," the festival said. However, the festival said Yurtel had not paid for any tickets for the 2025 festival prior to entering into liquidation. "Anyone who has paid Yurtel for a package including Glastonbury 2025 tickets will need to pursue any potential recompense available from them via the liquidation process as outlined in their communication to you. We are not able to incur the cost or responsibility of their loss or replacement," it added. The festival is encouraging Yurtel customers to contact Yurtel@btguk.com to confirm their consent for them to share their personal data and details of their party with them. "We will then be able to provide details of alternative potential sources for those customers to purchase tickets and accommodation for this year's festival," it said. The festival, taking place between 25 - 29 June will include headliners Neil Young, Olivia Rodrigo and The 1975.

