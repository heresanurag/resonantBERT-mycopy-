title: Dolly Parton surprised with Kentucky's highest honour - BBC News
date: '2024-08-29'
section: General
url: http://www.bbc.co.uk/news/videos/c1d7k165vy6o
content: |-
  The singer was given the "Colonel" award while promoting her literacy program, which gives free books to kids.

  Dolly Parton was dubbed a “Kentucky Colonel”, the highest civilian award in the state, by Governor Andy Beshear as she promoted the expansion of her children’s literacy program, Imagination Library.

  Parton’s father never had the chance to learn to read, having grown up poor.

  Imagination Library gives books to infants every month from when they are born until they enter kindergarten to improve literacy rates.
