title: Commons Speaker John Bercow accused of bullying private secretary - BBC News
date: '2018-05-01'
section: UK Politics
url: http://www.bbc.co.uk/news/uk-politics-43963788
content: |-
  The Speaker's former private secretary breaks a non-disclosure agreement to speak to Newsnight.

  This video can not be played To play this video you need to enable JavaScript in your browser. John Bercow's former private secretary tells Newsnight the Speaker bullied him

  John Bercow's former private secretary has told Newsnight that he was bullied by the Speaker.

  Angus Sinclair said he faced angry outbursts, undermining, obscene language, and mimicry from Mr Bercow, who also smashed a phone on his desk.

  Mr Sinclair said he was paid £86,250 in 2010 as part of a deal that required him to sign a non-disclosure agreement.

  Mr Bercow denies bullying - with a spokesman saying "there was no substance to any of the allegations".

  Mr Sinclair, who has breached the terms of the non-disclosure agreement by speaking to Newsnight, said: "I thought to myself, it's in the public interest to know why I left.

  John Bercow in 2010. Angus Sinclair is on the right, with blue, white and purple ribbons on his chest

  "Yes, it breaks that non-disclosure agreement, but it's the truth. There was bullying."

  Mr Sinclair, who spent 30 years in the Royal Navy, joined the House of Commons in 2005 as the private secretary to Michael Martin, who was then Speaker.

  In 2009, after the expenses scandal, Mr Martin was replaced by Mr Bercow, who Mr Sinclair says bullied him - shouting at him, undermining him in front of other staff, swearing, and attempting to physically intimidate him.

  After around a year of working for Mr Bercow, Mr Sinclair was given a "compulsory early retirement" by Commons authorities.

  The £86,250 lump sum - more than a year's pay - was part of a deal that required him not to make a complaint about his treatment at the House, or speak publicly about the manner of his treatment.

  This is not conventional for people retiring from the House.

  The role of Speaker's secretary is wide-ranging: in addition to running the Speaker's office, the secretary also assists the Speaker in his duties in the House of Commons chamber,

  Others involved in the process have confirmed to Newsnight that the intention of the non-disclosure agreement was to prevent the issue of bullying being raised.

  Mr Sinclair said: "I can only think it was because of the detail of what had happened, you know, the bullying and the manner of my leaving...

  "What I'd done was sign a cover-up and in a cynical way. I'd been paid to do it, and that's not a good feeling."

  A spokesman for the Speaker's Office said: "Mr Speaker strenuously denies that there is any substance to any of these allegations.

  "Mr Speaker has a superb team of dedicated, effective and long-serving staff - five of whom have worked for him very happily for a combined total of over 40 years."

  John Bercow on the day he was elected Speaker

  Conservative MP Andrew Bridgen, who is a long-standing critic of Mr Bercow, said the Speaker should "consider his position".

  He told BBC Radio 4's Today programme: "I think, at a time when we are looking for culture change in the House of Commons with regard to bullying and harassment, I think that's very difficult if the titular head of that organisation is mired in these allegations."

  But Labour peer Lord Hain said the "attack" on the Speaker was motivated by those "resisting his essential parliamentary reforms".

  Labour MP Barry Sheerman also defended Mr Bercow, saying he had been the "best reforming Speaker for 100 years", and it was only a "small group" of parliamentary officials "hated" his modernising efforts.

  Cabinet Office minister David Liddington said: "I have heard the allegations that have been made. Obviously any allegation of this nature is serious. It is a matter for the House of Commons to decide what to do."

