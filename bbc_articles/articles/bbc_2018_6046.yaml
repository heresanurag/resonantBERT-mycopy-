  Newsnight has previously reported that House of Commons managers were informed in 2011 that Kate Emms, Mr Sinclair's successor in that role, had been diagnosed with post-traumatic stress disorder after less than a year working for Mr Bercow.

  Reflecting on what happened, Mr Sinclair said: "I think if I'd actually said to myself I'm not signing this non-disclosure agreement, or I'd put in a complaint, or I'd done what anyone should do if they've suffered a bullying incident - to speak out and get it resolved, then [Ms Emms] might not have been put in that position."

  As a consequence of Newsnight's reporting on the culture of Westminster, the House of Commons Commission has commissioned an inquiry into the treatment of the apolitical staff who run the House.

  However, the investigation - led by Dame Laura Cox - will not investigate individual cases or reopen past complaints.

  Mr Sinclair said he had a good relationship with Mr Martin, but struggled to build a working relationship with his successor, Mr Bercow.

  Mr Sinclair told Newsnight: "The Speaker responded in a way that I can only say is a form of bullying. And that is to show anger, to thump the table to say that someone has failed in front of others... it seemed to get more frequent."

  Newsnight has spoken to other members of House staff, who have corroborated this account.

  Other officials have described Mr Sinclair being undermined in meetings and held responsible for things that were beyond his power.

  Mr Sinclair has also shown Newsnight entries from his contemporaneous diary, which records examples of these behaviours.

  Mr Sinclair told Newsnight that the Speaker was prone to "over-the-top anger. I'm not sure he was completely in control of it. The arms would wave around".

  Mr Sinclair detailed one particular outburst, which is corroborated by his diaries: "There was one afternoon I was working at my desk and he came in and was absolutely furious about something... he asked for some information from another part of the House. It had been very slow coming and I'd prodded for an early resolution and he knew that but he held me responsible...

  "There was a tirade of how I'd let him down and it was the worst thing... there was a lot of bad language and suddenly his mobile phone which he'd been holding was flung on the desk in front of me and broke into a lot of bits."

  Mr Bercow in the chamber. His current private secretary is at the Speaker's left hand side.

  Mr Sinclair described the effect on his personal wellbeing: "Perhaps one of the worst aspects of it - from time to time you would hear yourself mimicked, and your thought then is 'Is that really how he sees me?'

  "I think we all know that every job in the land has to have some dignity. Well, I felt at the time that the dignity had been removed.

  "You would walk to work with a heavy heart. The horizon suddenly was low, and it was not a good feeling, it was a feeling of failure."

  The role of Speaker's secretary is unusual, in that it is appointed solely at the discretion of the Speaker. It is set out in Erskine May, the parliamentary practice guide, that the Speaker of the House has the sole power to appoint his own staff.

  While Mr Sinclair raised his treatment with House of Commons managers, any complaint would - in the end - have to be dealt with by the Speaker.

  In 2010, shortly after the general election, Mr Bercow was re-elected as Speaker. Mr Sinclair said he was called in to see the Speaker, who told him he was going to "redesign the office", and that Mr Sinclair would not be needed.

  His severance package included a payment of £86,250. But a letter from the Director General of Resources made clear the payment was explicitly dependent on signing a non-disclosure agreement that would bar him from speaking to the media - or raising a tribunal complaint.

  The House of Commons agreed at that time that there was no concern about Mr Sinclair's capacity.

  The House gave him a reference stating that he "acted with a very high degree of professionalism. He showed discretion, loyalty, assiduity and efficiency... there were no disciplinary issues affecting him".
