title: 'Darius Campbell Danesh: Gerard Butler pays tribute to late friend - BBC News'
date: '2022-08-19'
section: Scotland
url: http://www.bbc.co.uk/news/uk-scotland-62604375
content: |-
  The actor describes his fellow Scot as a "brother in arms" and says he has been left devastated by his death.

  Gerald Butler has paid tribute to his late friend Darius calling him "an incredible talent"

  Hollywood star Gerard Butler says he has been left "devastated" by the death of his "brother in arms" Darius Campbell Danesh.

  In an Instagram tribute, he shared a photo of them smiling together, writing that Darius had "the heart of a lion" and was "the perfect friend".

  The Scottish singer, who was 41, was found dead at his Minnesota apartment on 11 August.

  His fellow Pop Idol contestant Will Young has also paid tribute.

  On Twitter, he shared a picture taken while they were on the TV talent show in 2002 and said his thoughts were with Darius' family.

