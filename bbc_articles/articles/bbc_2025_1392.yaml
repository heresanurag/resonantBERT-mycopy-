title: 'NFL: Louis Rees-Zammit commits to Jaguars and ''never'' considered rugby return
  - BBC Sport'
date: '2025-02-18'
section: Rugby Union
url: http://www.bbc.co.uk/sport/articles/cz61xj92ydqo
content: |-
