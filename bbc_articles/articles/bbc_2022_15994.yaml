title: Diver finds jewellery worth £10k in Helford river - BBC News
date: '2022-12-13'
section: Cornwall
url: http://www.bbc.co.uk/news/uk-england-cornwall-63956428
content: |-
  Police hope the distinctive haul of rings and pendants can be reunited with their owner.

  The diver found a number of rings, pendants and a bracelet

  A haul of jewellery found at the bottom of a river and handed in to police is believed to be worth about £10,000.

  Devon and Cornwall Police said a diver contacted them after making the discovery in the Helford river near Falmouth.

  The haul included a number of rings and pendants and officers are hoping to reunite them with their owner.

  PC Victoria Swan said: "Some of the rings and pendants are very distinctive.

  "We are hoping to find the owner as it is clear the jewellery is of huge sentimental value."

  A pearl necklace was among the items found

