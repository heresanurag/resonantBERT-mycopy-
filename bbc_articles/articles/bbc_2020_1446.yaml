title: GP 'cited Jolie and Goody' for unnecessary examinations - BBC News
date: '2020-02-07'
section: London
url: http://www.bbc.co.uk/news/uk-england-london-50070197
content: |-
  Manish Shah, of Romford, denies 34 sexual assaults against eight female patients

  Manish Shah is accused of 34 sexual assaults against eight female patients

  A GP accused of molesting female patients as young as 11 cited celebrities Angelina Jolie and Jade Goody to convince them to have unnecessary checks, a court has heard.

  Manish Shah, of Romford, allegedly carried out "invasive" intimate examinations between May 2009 and June 2013 for his own sexual gratification.

  The eight alleged victims are aged between 11 and 39, the Old Bailey heard.

  Prosecutor Kate Bex QC described how on one occasion, Mr Shah brought up a news story about Hollywood star Jolie having a preventative mastectomy as he asked a woman if she would like him to examine her breasts.

  In another instance, he mentioned Goody as he told another woman an examination was in her best interests, it was claimed.

  Ms Bex told jurors: "He took advantage of his position to persuade women to have invasive vaginal examinations, breast examinations and rectal examinations when there was absolutely no medical need for them to be conducted."

  The first complaint against him emerged in July 2013, jurors were told heard.

  Ms Bex said one theme of the case was the defendant's "sexualised" behaviour.

  He would allegedly give patients hugs and kisses, singling some out as "special" and his "star", saying he had a soft spot for them.

  The 50-year-old did not always wear gloves and left one patient entirely naked on an examination table, it was claimed.

  Mr Shah allegedly attempted to justify an examination in medical notes by suggesting it was "requested".

  Ms Bex said he flouted NHS guidelines on giving healthy women under 25 smear tests and routine breast examinations on women under 50, which were said to cause more harm than good.

  He also allegedly breached guidelines on the use of chaperones during intimate examinations.

  Mr Shah has denied 13 charges of sexual assault and 21 counts of assault by penetration.

