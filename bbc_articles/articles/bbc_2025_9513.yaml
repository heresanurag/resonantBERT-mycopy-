title: Ed Sheeran supports Sheffield group TRACKS in surprise gig - BBC News
date: '2025-05-19'
section: England
url: http://www.bbc.co.uk/news/articles/cx2egr875kro
content: |-
  The pop star performed in front of hundreds outside Sheffield Town Hall on Sunday.

  Ed Sheeran came to Sheffield to support DJ AG and music group TRACKS

  Singer-songwriter Ed Sheeran thrilled hundreds of fans with a surprise outdoor gig in Sheffield on Sunday. The Halifax-born pop star appeared alongside TikTok sensation DJ AG in support of TRACKS - a group that helps young people break into the music industry. It comes after the Shape of You star announced in February that his foundation would award the group three years of funding. Youngsters performing alongside the seasoned artists said it "meant the world" and hoped it would help launch their careers.

  London-based AG is known to draw big names for his impromptu performances, which he announces at short notice on his social media channels. He said giving young talent a platform was "extremely important" to allow them "to shine".

  DJ AG hosted an outdoor music event in Sheffield on Sunday, which saw Ed Sheeran perform

  He said: "It's not about me, I'm just a facilitator showcasing talent, trying to help, do my part, giving it everything and hopefully everyone had a good time." The event also saw TRACKS release their new single called Spotlight, from seven of their students.

