title: 'Ben Youngs: Leicester Tigers and ex-England scrum-half to retire - BBC Sport'
date: '2025-04-22'
section: Rugby Union
url: http://www.bbc.co.uk/sport/rugby-union/articles/c89gqj1d25lo
content: |-
  England's most-capped men's player Ben Youngs will retire at the end of the season.

  Ben Youngs has played 238 Premiership games for Leicester and 332 in all

  England's most-capped men's player Ben Youngs has announced he will retire at the end of the 2024-25 season. The scrum-half, 35, played in 127 Tests for his country and won four Six Nations titles, as well as five Premiership titles with Leicester Tigers. Youngs became Leicester's youngest Premiership player aged 17 in April 2007 and made his 332nd appearance for the club in Sunday's win at Bristol. "It's a bittersweet feeling really," he told the club's website. "Obviously, I'm sad at the thought it's coming to an end but I'm excited about the rest of this season, excited about what this group can do."

  "That's the strange part, I'm using the 'r' word [retirement] but it isn't over today, there is still plenty of rugby left this season and that's what is at the front of my mind. I'm not done, let's not write the obituary just yet. "I have spent two decades of my life here at the club and I have been lucky to be a part of some incredible moments along the way, enjoyed so much success and made memories that will last a lifetime." Youngs made his England debut in March 2010 and played at four World Cups, in 2011, 2015, 2019 and 2023, retiring from international rugby after the 2023 tournament in France, where he helped England finish third. He was part of the successful British and Irish Lions tour of Australia in 2013, featuring in the first two Tests, but withdrew from the 2017 squad to tour New Zealand for family reasons. Youngs played for Leicester and England alongside his brother Tom, who retired in 2022, while their father Nick played for the club between 1981 and 1988. In 2021, the family became the first to reach 600 Tigers appearances, a total that now stands at 692. Youngs added: "It's all I have known in club rugby - the green, red and white - and all I've wanted to know. The idea of playing against this club wasn't ever an option for me and so to be able to finish a one-club player will be one of my greatest achievements. "The time will come to thank everybody who have helped me achieve what I have but that's for when it comes to an end. For now, it's about finishing this chapter of my life with some more success. I'm not done just yet."
