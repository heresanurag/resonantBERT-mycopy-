title: England's strongest man rolls up frying pan with bare hands - BBC News
date: '2024-02-26'
section: General
url: http://www.bbc.co.uk/news/uk-england-oxfordshire-68368582
content: |-
  Paddy Haynes has won many awards for his strength and hopes to win more titles this year.

  England's strongest man has revealed his strength by crushing a frying pan with his bare hands.

  Paddy Haynes from Adderbury, Oxfordshire, rolled up the pan for BBC Radio Oxford's Adam Ball to showcase his strength in the run-up to Oxfordshire’s Strongest Man & Woman.

