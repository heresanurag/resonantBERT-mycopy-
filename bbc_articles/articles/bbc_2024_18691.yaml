title: 'Steel job cuts: Port Talbot needs years of support - councillor - BBC News'
date: '2024-08-15'
section: Wales
url: http://www.bbc.co.uk/news/articles/cq5dzvw4djno
content: |-
  With Port Talbot's second blast furnace due to shut, townspeople voice their fears for the future.

  Steel town needs help for years - community leader

  Steelworkers say they are waiting for answers about their future in Port Talbot

  A "period of great uncertainty and anxiety” looms over Port Talbot ahead of mass job cuts at its steelworks next month, says a senior community leader. With owner Tata Steel due to close its second blast furnace within weeks, deputy council leader Alun Llewelyn said Neath Port Talbot's focus was "to try and give as much help" to those affected. The UK government announced an initial £13.5m would be made available immediately to support businesses and workers, but Mr Llewelyn called for "decades" of aid. Tata, which said it was losing £1m a day at the site, recognised the "uncertainty that workers are feeling", but it had set up a "wide range of employee support mechanisms".

  Tata Steel closed the first blast furnace in July, and plans to shut the second by the end of September. Adam Williams, who has worked at the steelworks for 18 years, opted to start his own window cleaning business in preparation. “I decided to take matters into my own hands, rather than living in this vicious circle of being told I could lose my job," he said. “It really hasn’t hit home yet that it is coming to an end after 18 years, it’s going to be emotional when I finally get my finishing date, but at least I can see the next chapter.”

  Adam Williams is working two jobs as he prepares for the future

  He described the workers' mood as sombre: “We still haven’t had firm answers yet about what’s happening, but then again it hasn’t been agreed with unions yet, so you do understand it in that way. It’s just frustrating.” When he found out in January he would be losing his job, he said “it was a worrying time”, and a lot of other jobs did not pay as much. “I haven’t got many qualifications so I just wanted to see what I could do for myself.” After seeing a friend running a successful window cleaning business, Adam who is originally from Llanelli, Carmarthenshire, and now lives in Skewen, close to Port Talbot, saw an opportunity to do the same. He now often finishes a 12-hour steel shift, has a nap, and starts his other job. “It is a lot. But the support has been fantastic. I’m booked up right until October, so it’s great.”

  Alun Llewelyn says the council is aware the area might possibly lose skilled workers

  Councillor Alun Llewelyn said the council had been working with the transition board set up by the UK government to “ensure a way forward to create new employment and an economic future for Port Talbot”. He said an information hub will opening at Aberafan shopping centre to help workers and companies in the supply chain. But he called for continuing support from both the UK and Welsh governments “in order to replace the gap that’s being left by the jobs”. “We’re very conscious that we could be losing skilled workers from the area," he said. “We want to give as many people as possible the opportunity to stay in the area, to obtain new work, to obtain new skills,” he added. Welsh Secretary Jo Stevens said: "There are things happening here and now, and there will be things happening in the longer term. "This is a government that has economic growth and clean energy by 2030 at the heart of its missions, and I believe Port Talbot can play a big role in that."

