  Before the general election in July, when UK Labour was still in opposition, it was very critical of the then Conservative government’s approach to Tata’s plans for Port Talbot. That Tory previous government had agreed to give the company £500m towards the building of a greener electric arc furnace. And, along with Tata, it decided to create a £100m transition fund to help workers and the wider community cope with the fallout from the thousands of job losses that would result from the closure of the blast furnaces. Labour promised a new approach and on taking power said it was in negotiations with the company and there was “a better deal available”. Well, the clock is ticking: only one blast furnace remains operational at Port Talbot and it is still scheduled to close in September. Sir Keir Starmer's government is starting to spend the transition fund announced by its predecessor, but right now its game plan doesn’t seem much different.

  This video can not be played To play this video you need to enable JavaScript in your browser. How has Port Talbot's steelworks changed over the years?

  Many players at Aberavon Harlequins, one of several rugby clubs in the town, are worried about the impact of the job cuts on the area. About 2,000 jobs are expected to go by the end of next month, along with many more contractor and supply chain roles. Thomas Morley, 30, called it "gutting for the community”. He said: “I’m the third generation of my family to have worked there, my grandpa was there, my father was there, and I was offered a job there by luck.” He worked at the plant for three years, before leaving to find another job in IT, and said the “lack of communication” from the company caused the most concern for many of his friends still there. “What’s happened has been flung on the town and nothing has really been said since. “We need to see that they care and there are plans in place, otherwise the investment in the town is going to collapse.”

  Morgan Evans says the uncertainty around roles is affecting his family

  Morgan Evans, 24, said “half” of his family worked in the steelworks, and “the stress is affecting everyone involved”. He said: “I’ve lived here all my life, and every day I look over to the steelworks, it’s part of the identity of the town. “My father, auntie, uncle, multiple cousins, one of my best friends, all work there. “It’s such an uncertain time for everyone, the stress is affecting not just the workers but their families too.”

  The Welsh government said it had "worked closely with Tata Steel, unions, the supply chain and local partners for well over a decade", and "made no secret about our concerns regarding the timeframe around the transition, and are under no illusions about the impact it will have for so many, particularly in and around Port Talbot". It said that working with the UK government and others it was "reinforcing that commitment to ensure that the Tata workforce, its supply chain and local communities are supported not only in the short term but long into the future". Tata Steel said: “We very much recognise the uncertainty that workers are feeling as we restructure our business in order to stem losses of £1million a day”. It added it had a wide range of employee support programmes available including a mental health hub, and the company is helping employees "become accredited with formal qualifications”. The spokesperson added work on its voluntary redundancy programme was ongoing.
