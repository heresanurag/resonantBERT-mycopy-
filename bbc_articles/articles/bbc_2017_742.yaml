title: Natalie Portman on playing Jackie Kennedy - BBC News
date: '2017-01-18'
section: General
url: http://www.bbc.co.uk/news/entertainment-arts-38662080
content: |-
  The actress says her latest role is "a portrait of grief and incredible sorrow".

  Jackie Kennedy is remembered for her style and elegance, as well as what happened in Dallas in 1963, but a new film examines what life was like for the wife of JFK before and after his assassination.

  Natalie Portman, who plays the former first lady, spoke to Tom Brook about the role, and about her thoughts on President-elect Donald Trump.
