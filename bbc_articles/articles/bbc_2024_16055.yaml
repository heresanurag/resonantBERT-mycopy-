title: World's longest rowing boat to take part in Olympic torch relay - BBC News
date: '2024-07-21'
section: General
url: http://www.bbc.co.uk/news/videos/cqe6q917y1jo
content: |-
  The 24-seater boat will take the Olympic torch down a section of the River Marne on Sunday.

  Meet the Stampfli Express - a 24-seater rowing boat which will be a part of the Paris 2024 Olympic torch relay on Sunday.

  Just days before the start of the Olympic Games, the impressive shell will take 23 rowers and an Olympic torch bearer down a section of the River Marne, just east of Paris.

  It will not be a part of the official competition - rowers are only allowed to compete alone or in teams of two, four or eight in the Olympic Games.

  The boat is especially made by Swiss manufacturers Stampfli Racing Boats for big occasions.
