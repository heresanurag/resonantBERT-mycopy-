title: 'El Salvador ruling: What is temporary protected status? - BBC News'
date: '2018-01-12'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-42074906
content: |-
  The Trump administration cancels permits allowing people from El Salvador to live and work in the US.

  The Trump administration is cancelling permits allowing nearly 200,000 people from El Salvador to live and work in the US. They must leave the country by 2019 or face deportation.

  The humanitarian programme, Temporary Protected Status (TPS), was granted after a series of earthquakes rocked the Central American country in 2001. What is TPS?
