content: |-
  The singer is reunited with jewellery and his acoustic guitar after the Brighton burglary.

  Sam Tompkins has been reunited with his Gibson acoustic guitar

  Singer Sam Tompkins has said his faith in humanity has been restored after he was reunited with items stolen in a house burglary - including a sentimental necklace. The 27-year-old said he came back to his home in Brighton on Thursday to find a small window smashed. Burglars took his Gibson acoustic guitar, laptop and all of his jewellery including a cross necklace which his father John Tompkins wore for more than a decade before his death last November. Posting on Instagram, external on Saturday evening the pop star said his father was "smiling from above".

  The stolen necklace had belonged to Sam Tompkins' late father

  A video he posted showed him collecting the items in what appeared to be a police station. He thanked "everyone who shared and spread the word". Referring to the necklace, Mr Tompkins said: "I never thought I would see it again. Thank God." The singer, who is currently on a world tour for his new album, had said the necklace was a “pretty irrelevant item” to anyone else but “means so much” to his family.

