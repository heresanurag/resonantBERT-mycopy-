  So what next for the Edwards family? "Our dream one day would be to secure a proper farm tenancy somewhere but we don't want to leave Dorset for family reasons - we love it here and we've got our farming community connections. "The dream would be to actually get some security because working off the grazing licences is very hard, you never know what's going to happen one year to the next. "Planning the sheep feed and all the running around in the trucks and things - it's a lot."

