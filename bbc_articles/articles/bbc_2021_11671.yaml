title: Runner airlifted to hospital after Anglesey cliff fall - BBC News
date: '2021-09-11'
section: Wales
url: http://www.bbc.co.uk/news/uk-wales-mid-wales-58532208
content: |-
  A major search and rescue operation was launched to rescue the woman after her fall.

  The alarm was raised at Porth Dafarch on Anglesey on Saturday morning

  A runner has been airlifted to hospital after falling off a cliff in north Wales.

  A major rescue operation was launched after reports a woman had fallen on the Anglesey coast at 10:45 BST.

  Coastguard crews from Holyhead, Cemaes Bay and Moelfre were joined by a helicopter from Dublin, and a RNLI lifeboat, in the search near Holyhead.

  The casualty had been running at Porth Dafarch and was flown to hospital at 14:00.
