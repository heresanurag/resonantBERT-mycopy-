id: bbc_2017_1915
title: Adele fluffs cover of George Michael's Fastlove - BBC News
date: '2017-02-13'
section: General
url: http://www.bbc.co.uk/news/entertainment-arts-38954080
content: |-
  Adele calls halt to cover of George Michael track at Grammys and starts again.

  Adele called a halt to her performance as she paid tribute to George Michael at the Grammys.

  The star was performing a sombre version of Fastlove in honour of the star, who died on Christmas Day, but went badly off-key as she went into the first chorus.

  "I can't mess this up for him," she said, fighting back tears. "I'm sorry for swearing. Can we start again?"
