title: 'Robin Windsor: "I''m proud to be a ballroom dancer" - BBC Sport'
date: '2024-02-20'
section: General
url: http://www.bbc.co.uk/sport/av/get-inspired/30024264
content: |-
  Robin Windsor tells Get Inspired why it is his ambition to get the whole nation into dance.

  As soon as he was old enough to walk, Robin Windsor was shaking about to music in front of the mirror learning new moves and putting together dance routines.

  After four successful years on Strictly Come Dancing, Robin has turned his attention to inspiring the nation to get into dance.

  "Ballroom dancing on TV is inspiring so many people across the country to get up and give it a go", he said.

  If Robin has inspired you to get into dance, our activity guide has lots of information, hints and tips on how to get started.
