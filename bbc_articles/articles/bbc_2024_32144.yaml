title: 'New Ross: Man arrested over murder of eight-year-old girl - BBC News'
date: '2024-12-03'
section: Europe
url: http://www.bbc.co.uk/news/articles/ckg9nvnnlk7o
content: |-
  The victim is named locally as eight-year-old Malika Al Kattib, a schoolgirl from New Ross.

  A man has been arrested on suspicion of the murder of an eight-year-old girl in New Ross, County Wexford. Malika Al Kattib was injured during an incident at a house in the town on Sunday night. The suspect, who is in his 30s, had been receiving treatment in hospital following the incident. Gardaí (Irish police) said he had now been discharged from hospital and they had detained him on suspicion of murder.

  On the morning after the child's death, gardaí said a man and a woman in their 30s were treated in hospital for non life-threatening injuries. It is understood that the woman who was injured was Malika's mother.

  The incident happened a very short distance away from New Ross Garda Station. Malika attended a local primary school, New Ross Educate Together National School, in nearby Barrett's Park. It released a statement on Monday describing her death as a "terrible tragedy for the family, our school and our community".
