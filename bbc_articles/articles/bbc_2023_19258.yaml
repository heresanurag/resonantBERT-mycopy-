title: 'Odhrán Kelly murder: Gary Damien Scullion charged over killing - BBC News'
date: '2023-12-09'
section: Northern Ireland
url: http://www.bbc.co.uk/news/uk-northern-ireland-67661855
content: |-
  Gary Damien Scullion, 31, appears in court charged with Mr Kelly's murder in Lurgan at the weekend.

  A 31-year-old man has appeared in court charged with the murder of Odhrán Kelly in County Armagh.

  Gary Damien Scullion, from Edward Street in Lurgan, appeared at Craigavon Magistrates' Court on Friday.

  When asked if he understood the charge, he replied "yeah".

  The body of the 23-year-old was found beside a burning car in Maple Court, close to Edward Street, in the early hours of Sunday.

  There was no application for bail and the defendant was remanded in custody until January.

  Relatives of Odhrán Kelly wept in court as the case was being heard.

  On Thursday, two women appeared in court charged with assisting an offender by helping with "the disposal of the body of Odhrán Kelly".

  Andrea Catherine Theresa Stevenson, 43, from Edward Street in Lurgan and 36-year-old Stephanie McClelland, from Shan Slieve in the town were remanded in custody and are due to appear in court again later this month.

  In Lurgan, Odhrán Kelly is being remembered as a cherished member of his family and as a valued member of the community.

  He worked at Craigavon Area Hospital where friends say he was a funny and caring colleague.
