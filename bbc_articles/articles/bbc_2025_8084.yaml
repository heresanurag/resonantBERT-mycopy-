  "As defendants acknowledge, they had no legal authority to arrest him, no justification to detain him, and no grounds to send him to El Salvador - let alone deliver him into one of the most dangerous prisons in the Western Hemisphere," Xinis wrote. "Having confessed grievous error, the defendants now argue that this court lacks the power to hear this case, and they lack the power to order Abrego Garcia's return." She added that the government's arguments "fail as a matter of law". "Surely, Defendants do not mean to suggest that they have wholesale erased the substantive and procedural protections of [federal immigration law] in one fell swoop by dropping those individuals in Cecot without recourse," Xinis wrote. White House officials continued to defend the deportation. Attorney General Pam Bondi appeared on Fox News on Sunday and reiterated the government's claim that Mr Garcia is a member of the MS-13 gang, which has been designated a terrorist organisation by the Trump administration. Bondi did not supply any evidence. Trump also appeared to comment on the case, during his flight back to Washington DC from Florida on Sunday evening. "He's in MS-13," Trump told reporters aboard Air Force One, without mentioning Mr Garcia by name. Trump also confirmed that El Salvador President Nayib Bukele will visit the White House in the next few weeks, and that the two leaders will discuss the possibility that the Central American country will begin jailing imprisoned American citizens. "I love that," he said about the idea. "I think if we could get El Salvador or somebody to take them, I'd be very happy with it, but I have to see what the law says," he continued. Xinis' opinion comes a day after the Justice Department lawyer who argued the case on behalf of the Trump administration was put on leave. Prosecutor Erez Reuvani had told the judge during a hearing on Friday that he was unaware of certain elements of the case, including why Mr Garcia was taken to Cecot prison. Bondi, in her Fox News appearance, said that Mr Reuvani was removed from the case because he did not sufficiently argue the government's position. "He shouldn't have taken the case. He shouldn't have argued it, if that's what he was going to do," she said. "You have to vigorously argue on behalf of your client."

