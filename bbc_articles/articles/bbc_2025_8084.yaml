title: US judge scolds Trump officials for failing to return deported man - BBC News
date: '2025-04-06'
section: World
url: http://www.bbc.co.uk/news/articles/cn4jz3v401yo
content: |-
  The scathing opinion comes as a deadline looms to return the man from a prison in El Salvador.

  US judge scolds Trump officials for failing to return man deported in error

  Kilmar Abrego Garcia was deported last month along with hundreds of alleged gang members

  A US judge has issued a scathing opinion against the Trump administration after immigration officials admitted to having mistakenly deported a man living in the US to a prison in El Salvador. The opinion issued by US District Judge Paula Xinis on Sunday reaffirms her earlier ruling that demands Kilmar Abrego Garcia be returned to the US by Monday night. The judge says Mr Garcia was seized "without any lawful authority" and held "without legal basis", in "direct contravention" of US law. She calls his situation a "grievous error" that "shocks the conscience". Trump officials argue that they are unable to return him because they lack the authority to remove him from jail in El Salvador.

  The Justice Department has asked an appeals court to dismiss Judge Xinis' order. The appeals court is expected to rule by Sunday evening. Mr Garcia was among 238 Venezuelans and 23 Salvadorans the Trump administration deported to El Salvador's notorious mega-prison, the Center for the Confinement of Terrorism (Cecot). Officials alleged they were gang members and thus subject to deportation. Mr Garcia was found to have been wrongly removed in part because a US immigration judge had granted him legal protection from deportation in 2019. His lawyer has denied any gang ties and said Mr Garcia has never been charged with a crime. Mr Garcia's family, including his wife Jennifer Vasquez Sura, a US citizen, have been calling for his release since his deportation in mid-March. Judge Xinis' 22-page opinion chastises US officials for claiming that there was little they could do to remedy what they have described as an "administrative error" that led to his deportation.

