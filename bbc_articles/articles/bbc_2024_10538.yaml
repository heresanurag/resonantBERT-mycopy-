title: Remains found in river believed to be Sarah Mayhew - BBC News
date: '2024-05-22'
section: London
url: http://www.bbc.co.uk/news/uk-england-london-69048496
content: |-
  Two people are accused of murdering the 38-year-old whose remains have now been found in two locations.

  Sarah Mayhew's remains were also found in a park in Croydon in April

  Human remains found in a river in south London are believed to be those of 38-year-old Sarah Mayhew. The remains were discovered by contractors carrying out cleaning work in the River Wandle at Rawnsley Avenue, Mitcham, on Tuesday afternoon. Remains discovered on 2 April in Rowdown Fields, New Addington, have already been identified as those of Ms Mayhew, from Croydon. A man and a woman were charged with murder in April. Following an examination of the latest discovery, the family of Ms Mayhew has been informed and is being supported by specialist officers, the Metropolitan Police said. Ms Mayhew was last seen in Sutton, south-west London, on the evening of 8 March.

  Gemma Watts, 48, and Steven Sansom, 44, both appeared at the Old Bailey in April charged with murder. They are also charged with preventing a lawful and decent burial. The court heard Ms Watts, from New Addington, Croydon, and Mr Sansom, from Sutton, south London, are alleged by prosecutors to have killed Ms Mayhew at a residential property on the night of 8 March. The court heard Ms Mayhew's body was then allegedly cut up and dumped. At the time, the Old Bailey heard that Ms Mayhew's remains had not yet been fully recovered and searches were continuing. Both defendants were remanded into custody. Det Insp Martin Thorpe said on Wednesday: "My thoughts remain with Sarah's family. We will continue to provide our support as our investigation progresses. "At present we are not looking for anyone else in connection with her death." Det Insp Thorpe added officers were expected to remain at the scene for some time to continue their work.

