title: 'Newspaper headlines: India Air crash ''sole survivor'' and ''miracle of seat
  11A'' - BBC News'
date: '2025-06-12'
section: The Papers
url: http://www.bbc.co.uk/news/articles/c89pzj02j73o
content: |-
  A British man from Leicester, Vishwash Kumar Ramesh, was the sole survivor of the crash that killed more than 260.

  Israel launching strikes against military and nuclear sites in Iran broke too late for the first editions of this morning's papers. But there is plenty of reaction on their websites.

  The Guardian says, external explosions were heard around the Iranian capital, Tehran, as Israel announced strikes.

  The Daily Mail says, external Israel has called the action "pre-emptive", and Iran says it will offer a "decisive" response.

  All the papers reflect on the more than 240 people killed when a London-bound Air India flight crashed in western India yesterday.

  The Daily Telegraph, external is one of many papers to carry photographs of the plane plunging to the ground in Ahmedabad, almost immediately after take off.

  The Guardian says, external footage of the aftermath showed smoke rising over the area, as well as firefighters on "charred streets" and people on stretchers.

  The Times says, external the cause of the crash is still unknown but experts are considering engine failure, a problem with the position of the wing, or a bird strike.

  The paper goes on to say that the captain had more than 8,000 hours of experience and is understood to have made a mayday call as the plane failed to climb.

  The Financial Times writes, external that the worst aviation disaster in more than a decade will pile "new pressure" on Boeing, which made the plane.

  It is the first crash of the Boeing 787 model since it entered service in 2011.

  There is nothing to suggest any fault on Boeing's side, but the paper says the incident comes as the company is trying to "rebuild trust" following two fatal crashes of its Boeing 737 MAX aircraft in 2018 and 2019.

  And "miracle" is the word used by most of the papers to describe a passenger from Britain surviving the crash.

  The Metro says , external Vishwash Kumar Ramesh, who managed to walk away from the scene, was sat by the plane's emergency exit door.

  The front page of the Daily Mail, external features a photograph of his boarding pass, for seat 11A, labelling it "lucky".

  All the papers carry the comments the sole survivor made after the crash, in which he said he had no idea how he was still alive.
