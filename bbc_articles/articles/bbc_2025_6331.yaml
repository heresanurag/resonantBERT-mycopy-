title: Gatwick Airport north terminal access suspended due to car fire - BBC News
date: '2025-04-13'
section: Sussex
url: http://www.bbc.co.uk/news/articles/ckgx523yx0xo
content: |-
  Gatwick Airport says access to the north terminal has now been resumed following the car fire.

  Access to the north terminal was suspended

  A car burst into flames at Gatwick Airport earlier, temporarily suspending access to the North Terminal. West Sussex Fire and Rescue Service (WSFRS) sent two fire engines to the blaze, which it said had spread to the car park barriers, shortly before 13:30 BST. A Gatwick Airport spokesperson said the north terminal car park had since reopened and the fire had been extinguished. Danny Connelly said he could smell the fire as soon as he walked out of the terminal "then as we walked further round, we saw the vehicle fully on fire".

  The fire service said the blaze was extinguished shortly after 14:00, but crews remained at the scene. A WSFRS spokesperson said "We are still urging residents living nearby to avoid the area near to the north terminal carpark to ensure safety of the public, staff and other airport users." Sussex Police has been contacted for more information.
