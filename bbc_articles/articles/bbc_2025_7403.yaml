  Legal experts say there are even technical issues about the US recognising Crimea because of certain laws passed by the US Congress. But despite that, western diplomats do not dismiss the plan out of hand. "There is a landing space," one told me. "It is just a question of whether there is enough trust between the parties to move forward." They say that because the proposed deal, as leaked so far, contains huge gaps. There is no reference to any ban on western countries continuing to rearm Ukraine, something that in the past has been a red line for Russia. There is no reference, either, to Russia's demands for Ukraine to be "demilitarised", in other words for its army to be reduced massively in size, again another long-term Moscow demand. Under the deal, Ukraine may not be allowed to join Nato but it could join the European Union. There is no apparent objection to a European "reassurance force" deploying to western Ukraine after any ceasefire to deter future Russian aggression. But it is still not clear if the US is willing to provide a "backstop" to this force. There is also uncertainty about what economic sanctions against Russia would be lifted and when, and under what circumstances. In other words, a huge amount of detail is unclear and still to be discussed. And all sides seem far apart. Ukraine still wants an immediate conditional ceasefire and then talks. The US wants a quick win. And Russia wants to get deep into the detail of a peace deal, the like of which normally takes months if not years to resolve. There is an old Russian saying that "nothing is agreed until everything is agreed". Right now we seem far away from that.
