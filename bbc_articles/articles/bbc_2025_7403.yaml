content: |-
  Negotiations are gathering pace but the proposals being put forward by Trump's team still have major gaps.

  US intensifying bid to end Ukraine war - but chances of success remain unclear

  The pace of diplomatic efforts to end the war in Ukraine is quickening. Talks are taking place in London between officials from the UK, Germany, France, Ukraine and the United States. Donald Trump's special envoy Steve Witkoff is heading to Moscow for his fourth meeting with President Putin. And yet there is little clarity about where these efforts are heading or whether they will be successful. Not so long ago the American plan for ending the fighting in Ukraine was clear. There would be an immediate, unconditional 30-day ceasefire followed by longer-term talks to establish a permanent settlement to the war. Ukraine agreed to this and – under pressure from the US – made a huge concession; it would no longer demand the promise of long-term security guarantees before any cessation of hostilities.

  A block of flats partially destroyed in a Russian attack on Zaporizhzhia on April 22

  But Russia refused to play ball, insisting there could be no end to the fighting until a whole series of conditions were met. In particular, Vladimir Putin said "the root causes" of the war had to be addressed, namely his fears of an expanding Nato alliance and the very existence of Ukraine as a sovereign state somehow presenting a threat to Russia's security. The US accepted the premise of this Russian argument and is now deep in the weeds of a potential ceasefire proposal. In recent days, there have been various leaks about the latest US ideas, the status and veracity of which is disputed among diplomats. But there seems to be a framework along the following lines: Russia would halt its invasion along current lines, and would give up its ambition to control the remaining parts of the four regions of eastern Ukraine it has yet to occupy, namely Luhansk, Donetsk, Zaporizhzhia and Kherson. In return, the US would accept the four occupied territories de facto as Russian controlled. It would also recognise Crimea – which was annexed illegally by Russia in 2014 – as de jure Russian territory. The US would also ensure Ukraine ruled out joining Nato. As part of this plan, the US might also take control of the controversial Zaporizhzhia nuclear power plant – currently in Russian hands – and feed the electricity to both parts of Ukrainian territory. This proposal would then be backed up with the US threat – as rehearsed by both President Trump and Secretary of State Marco Rubio – that it would give up on the negotiations if there was no immediate agreement. At first sight, this proposal seems unlikely to succeed. President Zelensky has already made it clear Ukraine would never concede that Crimea is Russian sovereignty. Even if he wanted to do that, he could not because it would first require a referendum of the Ukrainian people. The European powers have made clear they would not accept Russian sovereignty over Crimea, something that would breach post-war international legal norms that borders should not be changed by military force.

