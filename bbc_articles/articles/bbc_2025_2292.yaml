content: |-
  The prince has written the foreword to a book by Lindsey Burrow, wife of the late rugby player Rob Burrow.

  Lindsey Burrow, the wife of the late rugby player Rob Burrow, has spoken out about the support she and her family have received from Prince William.

  Mrs Burrow spoke to BBC Breakfast ahead of the release of her memoir - Take Care: A Memoir of Love, Family & Never Giving Up - which will be released on Thursday.

  The Prince of Wales recorded the foreword to the book, where he said he was struck by her "incredible strength, positivity and resilience".

  Rob Burrow died in June last year after a battle with Motor Neurone Disease (MND). Before his death he campaigned tirelessly to raise awareness of the condition alongside his friend Kevin Sinfield, a legacy his family is continuing.
