  Foreman had two impressive wins over fellow great Joe Frazier

  At 27, Foreman got back in the ring to fight Frazier for a second time. They each received a $1m fight purse. On 15 June 1976, Foreman crushed a 32-year-old Frazier for a second time, stopping him in the fifth. During the US TV broadcast, commentator Howard Cosell summed up the performance: "George Foreman: Too big. Too strong. In perfect shape. The punches crisp from the very beginning." Foreman was seemingly on top of the world again, though three fights later he would lose to Jimmy Young on points in a sluggish performance in Puerto Rico. After the fight, Foreman said he had a "near-death experience" in the dressing as he struggled with exhaustion and heatstroke. Foreman said in that moment he became a believer in God. He retired from boxing aged 28 and became an ordained minister.

  Foreman's famed punching power helped him achieve history at the age of 45

  Ten years later, Foreman shocked the boxing world by announcing his comeback. He returned initially because his George Foreman youth centre was in financial crisis but would rack up 24 wins between 1987 and 1991. "Everybody laughed, and I listened to them laugh," Foreman told the BBC later. He faced Holyfield in April 1991 for the WBA, WBC and IBF heavyweight world titles. Holyfield would beat a 42-year-old Foreman, seemingly ending an impossible mission to become world champion again. He tried again, losing on points to Tommy Morrison in 1993 - but was given the chance to fight WBA and IBF champion Michael Moorer next. Fellow American Moorer was cruising through the encounter before eating a right hand from Foreman in the 10th round. The punch made Foreman the oldest heavyweight champion in history at 45. He narrowly retained the title against Axel Schulz in his next bout. He would fight three more times in non-world title fights, before finally bringing the curtain down on his professional career in 1997 at the age of 48 following a points loss to Shannon Briggs. "It was a great challenge for me to fight and fight, and when the time was up, I was happy about it."

  In 2022, two women filed lawsuits in the United States accusing him of sexual abuse in the 1970s. One accused Foreman of grooming her when she was eight and having sex with her when she was 15. The other accused him of sexually abusing and raping her when she was 15 and 16-years-old. In March 2024, Foreman launched a countersuit, asking one of the lawsuits be thrown out. He remained a household name in retirement. He became a boxing analyst but to the younger generations he most known for his George Foreman grill. Foreman had 12 children, naming all the boys George, and was married five times.
