title: 'George Foreman: Obituary of heavyweight great from Rumble in the Jungle to
  world champion at 45 - BBC Sport'
date: '2025-03-22'
section: Boxing
url: http://www.bbc.co.uk/sport/boxing/articles/c39veyw9lgeo
content: |-
  George Foreman goes down as one of the greatest ever heavyweight boxers, one part of a "holy trinity of heavyweight boxers with Muhammad Ali and Joe Frazier".

  'If Big George hit you, you stayed hit'

  George Foreman was a two-time heavyweight champion, winning his titles 21 years and nine months apart

  One version of George Foreman had only mayonnaise sandwiches to eat at school. Another was winning Olympic gold aged 19. Another was committing muggings at 15. The 20-something version of Foreman was one-third of heavyweight boxing's "holy trinity", with Muhammad Ali and Joe Frazier. The 45-year-old version would become boxing's oldest heavyweight world champion. He was once marked to be another poor kid from Texas, lost to America's wasteland, but instead rose to be one of the most recognisable faces on the planet. Foreman's powers of transformation served him well in a sporting career brimming with prestige and drama. 'Big' George Foreman, who has died aged 76, leaves behind a professional legacy that many boxers today could only dream of replicating. He had 81 fights, 76 wins and just five losses. He was twice the heavyweight champion of the world. He fought Frazier, Ken Norton and Ali. His longevity was such that he even faced a 28-year-old Evander Holyfield. His legacy was forged in the Rumble in the Jungle, his haunting of Frazier and his impossible achievement aged 45. Foreman secured his spot in the halls of heavyweight greatness many times over. "I am sure he is in every argument for the greatest heavyweights of all time," 5 Live Boxing analyst Steve Bunce said. "He had 76 wins and I don't often do stats and facts but 68 ended by knockout. "I haven't done the research to tell you how many times he dropped men, but I will say of his 76 wins he probably dropped his opponent about 200 times in total. "If Big George hit you, you stayed hit. It was as simple as that."

