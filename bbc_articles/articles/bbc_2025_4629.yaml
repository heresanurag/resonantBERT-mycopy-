  Foreman was born in Marshall, Texas, 10 January 1949. He was one of six siblings and took the name of his stepfather, JD Foreman, rather than his birth father. By his own admission, Foreman was a troubled kid struggling in an environment designed to keep him disenfranchised and angry. He started mugging people by the age of 15. "I've always been motivated by food, because I was always hungry," he said. "There never was enough food to eat for me, for various reasons." His mother, Nancy, convinced him to join the Job Corps aged 16. He earned his GED,, external and learned to be a carpenter and bricklayer, but in a pivotal moment for his life, he was introduced to boxing by a coach called Doc Broadus. Foreman arrived at the 1968 Olympics aged 19 and with just 25 amateur fights under his belt. He bulldozed the competition, winning gold. "Less than two years prior to the date that I'd stood on that platform receiving gold and listening to the national anthem, I was under a house, hiding from the police," he said later. "I climbed from underneath that house, in mud and slop, and said to myself: 'I'm going to do something in my life, I'm not a thief.'"

  Frazier (left) was 29-0 when he met Foreman, who was 37-0

  Foreman's Olympic triumph cleared a path into the pro ranks. He had 13 fights in his first year as a pro, with 11 knockouts. By 1972, he was 37-0 and the clear contender to the heavyweight champion Frazier. Frazier had beaten Ali. He was the top dog in the division. Foreman was a 4-1 underdog when they met in Kingston, Jamaica in January 1973. Foreman knocked Frazier down six times in two rounds to become the WBA, WBC and lineal heavyweight champion. The win completely altered the heavyweight landscape at the time. Foreman was only 24. "That is the fight where he famously lifts Joe Frazier off the ground with an uppercut. That is George Foreman," Bunce said. Foreman would say later Frazier was the only man he ever "feared" and how the victory changed his life overnight. "One day you're no-one and the next day everyone wants to take advantage of you," he said.

  It is hard to explain just how iconic the 'Rumble in the Jungle' is. If there was a room of statues representing the greatest fights, it would be there in the centre, along with the two seminal bouts between Ali and Frazier. It was a fight that encapsulated everything boxing was, and still is. The sublime and the downright grime. It was staged in Zaire on 30 October 1974, funded by the brutal dictatorship in control there at the time. Ali, a massive underdog, had cast himself as the charismatic good guy and Foreman the brutish villain. It would be staged at 04:00 local time so some 50 million people could tune in across the world. A suspected 26 million people watched in the UK, out of a population of 56 million. Foreman was expected to crush Ali. Instead Ali produced a classic performance, soaking up pressure for seven rounds. Debuting his 'rope-a-dope' style on the ropes, he slowly drained Foreman of his powers. In the eighth round, Ali pounced. He dropped Foreman, who was not allowed to beat the count by the referee, thus bringing to a close one of the biggest upsets in world championship boxing. After his first loss in 41 fights, Foreman took two years out of the ring. "From pride to pity, that was devastating," Foreman said of the loss. Foreman complained the ropes had been loosened, that his trainer had even drugged him. He campaigned for a rematch but never got it. But once Ali called time on his career, he and Foreman became close friends. Foreman famously helped a Parkinson-afflicted Ali climb the steps to receive an Oscar for the When We Were Kings documentary in 1996, which told the story of their showdown 22 years previously. "Foreman was part of that holy trinity of heavyweight boxers, with Muhammad Ali and Joe Frazier," boxing promoter Frank Warren said. "The great fights they had between them were special times for boxing and world sport. "They're events that have gone down not just in boxing, but significant moments in the world of sport."

