title: Meet the dog brightening up a weekly bin round in Belfast - BBC News
date: '2024-09-01'
section: General
url: http://www.bbc.co.uk/news/videos/cvg5vpg0my7o
content: |-
  Some dogs don't like people in uniforms or high-vis jackets, but Maddie loves them.

  Every Friday she waits outside her house for the binmen to come - and they love her too.

  Her family have been putting videos of her excited reactions to the refuse collectors online, to great reception.

  One video has received more than 10 million views on Instagram, with comments left online by people living as far away as Brazil and South Korea.
