title: Essex dog attack moment described by victim's daughter - BBC News
date: '2024-02-04'
section: General
url: http://www.bbc.co.uk/news/uk-68199978
content: |-
  Sonia Martin speaks to the BBC about her mother's death and thanks neighbours who tried to help.

  A woman killed in an attack by dogs was visiting her grandson for the weekend, and had raised concerns to the owners about the animals being dangerous.

  Esther Martin, 68, died on Saturday afternoon in Jaywick, near Clacton-on-Sea.

  Her daughter, Sonia Martin, has spoken to the BBC about her mother's death and thanks neighbours who tried to help.
