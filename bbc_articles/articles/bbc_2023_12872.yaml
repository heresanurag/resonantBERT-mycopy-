  Maui officials say they are still in search and rescue mode, and are asking tourists to avoid the island.

  Situation in Maui should take precedence - Big Island mayor

  Hawaii County Mayor Mitch Roth begins his remarks by saying that there are "three to five fires depending on how you count them" on Big Island (also called Hawaii). Speaking via a video-link, he says one of these is "pretty much well contained", while firefighters are still fighting the other two. Roth says he "appreciate(s) all the support" that officials have received, from local to federal partners, adding that "we are not out of the woods yet". He says that his thoughts and prayers are with Maui, and that the situation there "should take precedence" over the one on Big Island.
