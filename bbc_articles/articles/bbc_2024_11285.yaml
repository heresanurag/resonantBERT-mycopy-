title: 'Plaid Cymru: Rhun ap Iorwerth says UK should aim for nuclear disarmament -
  BBC News'
date: '2024-06-10'
section: Wales
url: http://www.bbc.co.uk/news/articles/cj551318ejlo
content: |-
  Plaid Cymru's Rhun ap Iorwerth says nuclear deterrent not "the kind of defence that we need and should be building".

  We should aim for nuclear disarmament - Plaid leader

  One of the UK's Trident-carrying submarines is always on patrol

  Nuclear disarmament of the UK is something "we all should be aiming for", according to Plaid Cymru's leader Rhun ap Iorwerth. But he said the UK's defence force should be "well-funded", able to "play their part in defending ourselves in peacekeeping roles" and ensures the welfare of military personnel after they leave service. His comments come after Conservative minister Penny Mordaunt said in a general election debate Russia's leader Vladimir Putin would doubt Labour's willingness to use nuclear arms. "I'm against the nuclear deterrent because I don't think that is the kind of defence that we need and should be building in the 21st Century," Mr ap Iorwerth told BBC Radio Wales' Sunday Supplement. "We absolutely, yes, need to be making sure that we have adequate defence forces. "I don't think that our place here in Wales is to be talking about nuclear deterrence.

  "It's about making sure that we have well-funded defence forces able to play their part in defending ourselves in peacekeeping roles. "That does not mean to say that I don't think our armed forces and, in particular, those women and men who go into the armed forces who find themselves all so often left after they leave without the support in mental health in housing." The Plaid leader shared a stage with leading figures from other political parties in Friday's BBC general election debate.

  Rhun ap Iorwerth (right) tussled with Reform's Nigel Farage in Friday's televised general election debate

  In it, Labour deputy leader Angela Rayner said her party would keep the UK's nuclear deterrent and match the Tories' pledge to raise the total defence spending to 2.5% of gross domestic product (GDP). Lib Dem deputy leader Daisy Cooper said her party was committed to maintaining the UK's nuclear deterrent and would reverse cuts to the number of troops in the armed forces. The Green Party and the SNP both confirmed they opposed renewing Trident - arguing the money could be better spent on other areas of defence.
