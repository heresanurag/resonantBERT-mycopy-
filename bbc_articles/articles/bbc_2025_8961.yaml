title: 'Alexis Ohanian: Reddit founder and Serena Williams'' husband buys stake in
  Chelsea Women - BBC Sport'
date: '2025-05-14'
section: Chelsea
url: http://www.bbc.co.uk/sport/football/articles/cn05x60p8dro
content: |-
  Reddit founder Alexis Ohanian buys a stake in Women's Super League champions Chelsea.

  Reddit founder Alexis Ohanian has bought a stake in Women's Super League champions Chelsea, the club have confirmed. Ohanian, who is married to tennis great Serena Williams, will have a seat on Chelsea Women's board after purchasing a 8-10% share, believed to be worth around £20m. "This is a landmark day in the history of Chelsea Women and for women's football in Europe and beyond," said Aki Mandhar, chief executive Chelsea Women. "This investment is validation of the club's past success but more importantly it is yet another proof point in the market of the persistent growth and potential of women's football. "There is no greater champion of investing in the future of girls and women's sports than Alexis, and we are incredibly proud to welcome him to the club." Ohanian, 42, has invested in women's football previously, as the largest shareholder in American club side Angel City FC until it was sold in 2024 for £192.3m - the highest price for a women's sports team until this deal. "As Founding Control Owner of Angel City FC, I've seen the opportunity to create and grow a worldwide brand within women's football, and I'm confident Chelsea FC Women is the next global women's sports brand," said Ohanian. Ohanian had announced news of his investment on Wednesday and posted images of Chelsea kits with the names of his children, Olympia and Adira, on the backs.

  Ohanian, who also owns shares in the TGL Golf League, founded social media giant Reddit and has an estimated net worth of $150m, external. His investment of roughly £20m puts the value of Chelsea Women at more than £200m, which was the worth placed on the club when Chelsea FC Holdings sold the team to a sister company earlier this year to help the club adhere to profit and sustainability rules. The Blues have put a post-investment valuation on the club at £245m. It marks the latest boardroom change for Chelsea, who recently appointed Mandhar as their first dedicated chief executive officer for the women's team. Earlier this month, Chelsea won their sixth consecutive WSL title. They became the first side to finish a 22-game campaign unbeaten and set a new league record of 60 points. They also won the Women's League Cup in March and are going for a domestic treble when they meet Manchester United in the Women's FA Cup final at Wembley on Sunday - a game Ohanian and Williams are expected to attend. Chelsea also reached the semi-finals of the Women's Champions League, but were knocked out by holders Barcelona 8-2 on aggregate.
