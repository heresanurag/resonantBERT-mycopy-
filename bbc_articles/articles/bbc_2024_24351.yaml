title: Somerset's 'vital' carers documented through photography - BBC News
date: '2024-09-09'
section: England
url: http://www.bbc.co.uk/news/articles/cr40pe75k5yo
content: |-
  Daisy Moseley wants to highlight the work of society's "unsung heroes" working in social care.

  Nidheesh Madhava said the healthcare sector is "the best place to show care and compassion"

  Portraits of care workers have been captured by a photographer to highlight their "incredible work". Daisy Moseley, 35, from Stroud, in Gloucestershire, photographed the staff from Camelot Care homes in Yeovil, Bridgwater and Wellington, in Somerset. "Carers are the unsung heroes of our society," she said. "Each one I met had a unique story about how they came to be there – some inspired by personal experiences, others wanting to make a meaningful impact in their communities."

  The project, which includes both colour and black and white photographs, seeks to acknowledge the hard work and commitment of the country’s more than 10 million carers.

  Daisy Moseley wants to highlight the "incredible work" of carers

  Ms Moseley was inspired to embark on the project after helping her mother provide end of life care for her late grandmother. “It made me realise how vital and demanding the role of a carer truly is,” she said. She added that she now believes the role of caregivers is undervalued in society. "It feels like no one noticed the work they did until Covid hit,” she said. “One minute we were all on our doorsteps clapping them, the next, it feels as though we forgot all about them again, as though nothing had ever happened.”

  Summer Woodley chose the job to help “make people smile”

  Ms Moseley visited the dementia specialist care homes and spent time with carers from "all different walks of life" and learned about what drew them to the profession. "Caring for someone can be a beautiful thing, but it’s also physically and emotionally draining,” Ms Moseley said. “It was touching to see how much they care for the people they look after, the different relationships they have with the residents, and how it’s different for each one of them.”

  Cynthia Fernandez said she enjoys working in care

  Ms Moseley said she is hoping to host an exhibition and create a book of the portraits in the future, if she can secure funding. "Through this project, I want to ensure their efforts are recognised and valued," she added. Paul Teasdale, director of Camelot Care, said he is "delighted" with Ms Moseley's portraits. He said: "Her photographs beautifully capture the dedication and empathy our staff bring to their work every day."

