content: |-
  The parents of a teenager shot dead in Liverpool make an emotional plea over gun violence.

  The parents of a teenager shot dead in Liverpool have urged people to hand over their guns to police.

  Yusuf Sonko was 18 when he died from a gunshot wound to the head in June last year.
