title: Cold case detectives vow to solve historical sex crimes - BBC News
date: '2024-05-19'
section: UK
url: http://www.bbc.co.uk/news/uk-69023887
content: |-
  Forensic science advances are helping police to secure convictions in unsolved cases spanning 50 years.

  Det Con Hayley Dyas warns offenders who may think they have evaded justice, 'we will come for you'

  With so few rape cases making it to court across the UK, one police team has made it a priority to revisit 50 years of unsolved sex crimes. Operation Painter, run by the Bedfordshire, Cambridgeshire and Hertfordshire Major Crime Unit, started in 2016 and began by combing through 5,407 unsolved rape and sexual assault cases. It is using the latest forensic science to bring some justice to victims such as Karen - who had believed her rapist would never be caught. Karen had been celebrating her 26th birthday with a night out in Luton, Bedfordshire, in 1993, when she decided to get a taxi home. But she became uneasy when the driver took a wrong turn and began to veer away from the direction of her house. Karen says the tone of his voice switched and he said: "You haven't got a clue where you are, have you, you stupid bitch." She says his whole face changed and he looked "completely evil". Karen went into "survival mode" while the man raped her by some garages in the dark. "I thought, 'the best thing to do here is just to let him do whatever he wants to do, to survive and get back to my son,'" she tells a new BBC Two documentary. Intimate swabs were taken after the attack, but forensic science was not advanced enough to get a DNA profile of the culprit from the traces of semen which were found.
