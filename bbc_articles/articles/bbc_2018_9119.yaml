title: Radio 4's PM presenter Eddie Mair to get new LBC show - BBC News
date: '2018-07-02'
section: Entertainment & Arts
url: http://www.bbc.co.uk/news/entertainment-arts-44681814
content: |-
  The 52-year-old, who presented PM for 20 years, is getting a new show on the commercial station.

  Eddie Mair has presented PM on BBC Radio 4 for 20 years

  Presenter Eddie Mair is joining LBC to present a new show on the commercial radio station.

  The 52-year-old announced on Sunday that he was leaving the BBC after more than 30 years.

  Mair, who has presented Radio 4's PM programme since 1998, will host his last show on 17 August.

  He said LBC's "growth has been driven by bosses and staff who are passionate about radio, which is why I am eager to get started."

  He will begin working at LBC in September. Full details of his LBC programme will be announced over the next few weeks

  "LBC has established itself as a ground-breaking broadcaster. Innovative, informed and fun with appointment-to-listen shows and a reputation for setting the agenda."

  James Rea, managing editor of LBC, added: "Eddie is a hugely respected broadcaster and I'm absolutely delighted he's joining LBC.

  "He will be a fantastic addition to our formidable line-up. I know Eddie's new show will be exceptional when it launches in September."

