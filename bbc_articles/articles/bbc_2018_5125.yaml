title: RAF anniversary flypast at Biggin Hill - BBC News
date: '2018-04-02'
section: General
url: http://www.bbc.co.uk/news/uk-43612268
content: |-
  A formation of three World War Two aircraft - a Spitfire T9, Spitfire Mk IX and a Hawker Hurricane X - fly over the airfield of Biggin Hill.

  A formation of three World War Two aircraft - a Spitfire T9, Spitfire Mk IX and a Hawker Hurricane X - have flown over the wartime airfield of Biggin Hill.

  Wartime pilot Lt Keith Quilter and Air Transport Auxiliary pilot Mary Ellis watched from the ground.
