id: bbc_2018_9804
title: Ai Weiwei fans mourn as Beijing studio destroyed - BBC News
date: '2018-08-05'
section: General
url: http://www.bbc.co.uk/news/world-asia-china-45073421
content: |-
  The prominent Chinese artist says the authorities have demolished his studio "without warning".

  The dissident Chinese artist Ai Weiwei says the authorities in Beijing have demolished his studio there.

  The 66-year-old has lived in Germany since leaving China in 2015. He is a strong critic of China's government.
