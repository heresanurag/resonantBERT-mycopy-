  Earlier, HTS fighters and their allies took over Hama and released inmates from its central prison amid fierce battles, while the military said it had redeployed troops outside the city. Hama is home to one million people and is 110km south of Aleppo, which the rebels captured last week. In Aleppo, a city of two million people, some public services and critical facilities - including hospitals, bakeries, power stations, water, internet and telecommunications - are disrupted or non-functional because of shortages of supplies and personnel. UN Secretary-General Antonio Guterres urged "all those with influence to do their part" to end the civil war.

