title: Toilet paper spill ‘clogs’ traffic on California highway - BBC News
date: '2024-03-12'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-68540785
content: |-
  Officers responded to a call. The offender: Loo rolls causing havoc on a busy interstate.

  California Highway Patrol officers were seen cleaning up an interstate in Los Angeles, California on Monday after cases of toilet paper fell out of a truck. The loo rolls, which were scattered across multiple lanes, caused a temporary traffic jam.
