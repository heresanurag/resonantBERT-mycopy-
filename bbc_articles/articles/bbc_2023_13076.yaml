  "You're missing lots of dancing, Katie, but we can do that again. We love you and miss you."

  Katie Owen completed a 160-mile journey to Cardiff for her radio show.

  Katie Owen, pictured with her dad, had to change out of her dress for the wedding in the train toilets as she headed to Cardiff for her BBC show

  "I left after the ceremony, got the train to Central Square and changed out of my wedding dress in the train toilets," she said.

  "It was beautiful, lots of Welsh flags. I left the after-party as everyone was arriving which was hard but worth it when I got to the studio.

  "(It) was lush being the first exclusive announcement too on BBC Radio Wales."

  The day of her father's wedding, Katie was back in the radio studio

  Tributes on social media came from McClure's fellow This Is England actress Jo Hartley who said: "It was so amazing to be there and share it with your family and friends - love you both."

  Former Lioness and I'm A Celebrity winner Jill Scott added "yous look amazing congrats", while singer Sophie Ellis Bextor wrote "that's so lovely! Congratulations xx".

