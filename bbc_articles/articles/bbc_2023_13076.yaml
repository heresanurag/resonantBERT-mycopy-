  McClure is best known for her roles as Det Insp Kate Fleming in the BBC police series Line of Duty, and as Lol Jenkins in the film This Is England and its sequel mini-series on Channel 4.

  Owen, from Merthyr Tydfil, is a film producer, director and actor.

  He appeared in Channel 4's Shameless, won a Welsh Bafta in 2007 for the documentary The Aberfan Disaster, and directed Don't Take Me Home, the story of the Wales football team at Euro 2016.
