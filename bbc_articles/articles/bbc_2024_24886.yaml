content: |-
  It had been feared they might pull out after Transport Secretary Louise Haigh criticised the ferry firm and urged consumers to boycott the company.

  P&O owner to attend summit despite row over minister's comments

  P&O Ferries owner, DP World, will now attend the UK's investment summit on Monday, despite a row over a minister's criticism of the firm. It had been feared they might pull out from the summit - where they were expected to announce a £1bn investment - after Transport Secretary Louise Haigh criticised the ferry firm and urged consumers to boycott the company. An expansion of the firm's London Gateway port, in Essex, is likely to go ahead, with an announcement expected by some in the coming days. Whitehall sources said on Saturday that there had been "warm engagement" between senior figures in the firm and the government since Sir Keir Starmer distanced himself from his minister's remarks.

  The government is hosting the International Investment Summit, where it hopes to attract billions of pounds of investment. A Downing Street spokesperson said the summit would "show Britain is open for business" as it looks to enable economic growth. Later, a government source said the prime minister had confidence in Haigh. A government spokesperson said: "DP World’s investment in Britain is a vote of confidence in the stability and seriousness of the government. We welcome the jobs and opportunities it will create." They added that the government was unlocking the UK's "potential and ambition" by working in partnership with businesses and investors around the world. DP World has said the expansion of the London Gateway port would bring Thurrock hundreds of jobs. The United Arab Emirates-based company also owns the container port in Southampton. It has yet to comment publicly on the latest developments. Speaking to the BBC's Newscast on Friday, Sir Keir said Haigh's comments were "not the view of the government". The prime minister is understood not to have been directly involved in talks with DP World, nor has he personally spoken to Haigh about her remarks.

