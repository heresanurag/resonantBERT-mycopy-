  Actress Jodie Whittaker talks about her role as the Doctor as she arrives at the Bafta TV Awards.

  Doctor Who actress Jodie Whittaker has spoken to the BBC's Lizo Mzimba on the red carpet ahead of the Bafta TV Awards.
