title: 'JoJo Siwa: Poland Eurovision bosses say no talks held with star - BBC News'
date: '2024-09-03'
section: Newsbeat
url: http://www.bbc.co.uk/news/articles/cy5425k7e4eo
content: |-
  In a TikTok post, she describes Poland as a "massive part" of her ancestry, saying she'd be "1000%" willing to participate.

  We haven't spoken to JoJo Siwa, say Polish Eurovision bosses

  JoJo Siwa is known for distinctive choreography and energetic live performances

  The people in charge of Poland's Eurovision entry say they haven't spoken to reality TV star JoJo Siwa about representing the country. In a post on TikTok, the 21-year-old claimed she'd had "real" discussions about performing at the contest next year. But Polish broadcaster TVP, which is involved in choosing the country's Eurovision acts, said it wasn't speaking to artists and hadn't made any decisions about 2025. BBC Newsbeat has approached the singer's management for clarification.

  In her video, JoJo describes Poland as a "massive part" of her ancestry, saying she's "1,000%" willing to participate. "I actually happen to be Polish," she says. She says an early, joking response to a comment about participating had since "become a real conversation". JoJo goes on to say she is "talking with the people in Poland" but there are "a lot of logistics" to navigate. "I have a project that I'm actually committed to when Eurovision is happening but I might be able to make both work if Poland wants me to," she says. "If Poland wants me to represent, I will be there. I will make it happen." JoJo, who was born in the US, became famous as a child star on reality TV series Dance Moms. The Karma singer has regularly gone viral on social media for dance routines, interviews and live performances.

  The Karma singer performed at music festival Mighty Hoopla in London in 2024

  It isn't uncommon for countries competing at Eurovision to send artists from elsewhere. Canadian superstar Celine Dion won the contest for Switzerland in 1988. More recently, US rapper and singer Flo Rida was part of San Marino's entry in 2021.
  • None Five times the US wowed Eurovision Fans backed JoJo to represent Poland after her song Yesterday's Tomorrow's Today began climbing streaming charts there. Eurovision rules require acts to perform a previously unreleased song - something JoJo says wouldn't be a problem for her. "I did come up with an idea for a song that I 100% would do and I can't wait," she told followers. "I think it would be so freaking fun." Any act chosen to represent Poland would compete in one of two semi-finals for a place in May's final. Switzerland is hosting next year after Nemo's song The Code won 2024's contest in Swedish city Malmö.

