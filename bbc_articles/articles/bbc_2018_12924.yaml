title: Couple's joy at civil partnership decision - BBC News
date: '2018-10-02'
section: General
url: http://www.bbc.co.uk/news/world-africa-45717512
content: |-
  Rebecca Steinfeld and Charles Keidan have fought a four-year battle to be allowed a civil partnership.

  Heterosexual couple Rebecca Steinfeld and Charles Keidan say they are looking forward to setting a date for their civil partnership.

  They won a legal battle for the right to have a civil partnership instead of a marriage in June.

  PM Theresa May has now announced that heterosexual couples in England and Wales will be able to choose the union they prefer.
