  Both Jabeur and Svitolina are popular figures at the All England Club, having particularly captured the hearts of the British fans last year with their respective stories. Amid the backdrop of her nation being attacked by Russia, Svitolina reached the semi-finals in her first season back on the WTA Tour after having baby daughter Skai. Jabeur – known as the Minister of Happiness because of her infectious personality – went one better by reaching the final. It was her second successive appearance in the SW19 showpiece but she lost again, this time to surprise victor Marketa Vondrousova, and had to be consoled by the Princess of Wales in one of the abiding images of the tournament. Jabeur, who planned to have a baby if she won the title last year, says it is her “dream” to win Wimbledon. Her wait goes on after an error-strewn performance. The pace of Svitolina’s returning unsettled Jabeur and the focused Ukrainian broke twice to win the opening set in 27 minutes. The second stanza was tight. Jabeur was unable to convert a set point on Svitolina’s serve at 5-4 and that knocked the confidence of the Tunisian as her opponent dominated the tie-break.

  Elsewhere, 17th seed Anna Kalinskaya moved past fellow Russian Liudmila Samsonova with a 7-6 (7-4) 6-4 win to set up a fourth-round meeting with Rybakina. Danielle Collins found herself 4-0 down in the first set against Beatriz Haddad Maia of Brazil when play was suspended because of rain. However, the American 11th seed returned to win the next nine games and went on to seal a 6-4 6-4 victory. Collins will face Czech 31st seed Barbora Krejcikova, who benefitted from Jessica Bouzas Maneiro's early retirement because of injury.
