title: 'Harlequins 53-16 Stormers: Alex Dombrandt and Cadan Murley score hat-tricks
  in thumping win - BBC Sport'
date: '2024-12-15'
section: Harlequins
url: http://www.bbc.co.uk/sport/rugby-union/articles/cpq9ejypz1vo
content: |-
  Alex Dombrandt and Cadan Murley hat-tricks punish a weakened Stormers side as Harlequins kickstart their Investec Champions Cup campaign.

  Alex Dombrandt scored a hat-trick at Twickenham Stoop to follow up his try at Racing 92 in round one

  Alex Dombrandt and Cadan Murley claimed hat-tricks as Harlequins punished a weakened Stormers side to revive their Investec Champions Cup campaign in style. Having come away from a trip to Racing 92 with no points last week, Quins needed a home win and dominated their South African visitors throughout at Twickenham Stoop. The hosts' began rustily but then found their usual attacking verve while down to 14 men - after Irne Herbst was yellow carded - as Danny Care and Dombrandt backed up Murley's early score. The Stormers, missing Springbok fly-half Manie Libbok and with five debutants in their squad, were not helped by three second-half yellow cards as the pressure mounted. Dombrandt grabbed his side's bonus-point try early in the second half and the floodgates opened, with the number eight helping himself to another score before Murley matched his hat-trick. Replacement hooker Sam Riley rounded off the scoring as Quins passed 50, on a sombre night for the South African side, whose sole try came late from JC Mars. Danny Wilson's side moved up to third in Pool Four and travel to Toulon in January, while the Stormers remain pointless and with slim hopes of making the next round.

  Despite travelling with a weakened side, Stormers led from two early Jurie Matthee penalties, before winger Murley squirmed over in the corner using all of his power. The visitors almost went the length after picking off a wayward Care cross-field kick but wasted the opportunity, and then another as Matthee saw a drop-goal attempt veer towards the corner flag. Herbst saw yellow for a high shot on Springbok Salmaan Moerat but the hosts finally found their attacking groove midway through the half. Luke Northmore hit a superb outside-to-in angle off a line-out and from the next play Tyrone Green went close, before Care's show-and-go got him over the try-line. The 37-year-old former England scrum-half turned provider at the end of the first half, a lovely delayed pass allowing Dombrandt to saunter in for the third try. The visitors' scrum-half Stefan Ungerer was yellow carded after the break, before Dombrandt came up smiling from a catch-and-drive - and the bonus point in the bag. The England number eight had three scores just before the hour as the Stormers went down to 13 as Seabelo Senatla was shown a yellow while Ungerer was still off - their night going from bad to worse as Angelo Davids was also sin-binned in the 68th minute. Murley's quickfire double got tries seven and eight - the last teed up by Dombrandt - before Riley got in on the act, and JC Mars registered the late Stormers consolation.
