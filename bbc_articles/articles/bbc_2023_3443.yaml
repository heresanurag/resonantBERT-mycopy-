title: 'Swansea: Morriston gas explosion destroys homes - BBC News'
date: '2023-03-13'
section: General
url: http://www.bbc.co.uk/news/uk-wales-64939658
content: |-
  Pictures from the scene appear to show a number of terraced houses damaged.

  A number of terraced houses have been badly damaged after a gas explosion.

  Emergency services are responding to the incident on the junction of Field Close and Clydach Road in Morriston.

  South Wales Police has asked people to avoid the area.
