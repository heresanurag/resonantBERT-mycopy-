title: Twenty four injured as Waverley crashes into pier - BBC News
date: '2020-09-03'
section: Glasgow & West Scotland
url: http://www.bbc.co.uk/news/uk-scotland-glasgow-west-54011504
content: |-
  The paddle steamer was damaged as it collided with the pier at Brodick with more than 200 passengers on board.

  Eyewitnesses say the paddle steamer struck the pier

  A total of 24 people have been injured after the paddle steamer Waverley collided with Brodick Pier in Arran.

  The Maritime and Coastguard Agency (MCA) said "a number have been taken to hospital" following the incident.

  People stranded in Arran were later due to be returned to the mainland by an emergency sailing of a CalMac ferry.

  Police, paramedics, coastguards and rescue helicopters were scrambled to the scene after the alarm was raised at about 17:15 on Thursday.

  MCA said 213 passengers and 26 crew were on board the vessel when it struck the pier.

  One passenger, Graham McWilliams, told BBC Scotland's The Nine about the moment of collision.

  He said: "As we came into the pier, everything seemed quite normal.

  "Then there was a sudden crash, a loud bang, and the boat stopped very quickly. I saw people falling and it was quite distressing."

