  How did you rate the players as England begin their Euro 2022 campaign with a win over Austria at Old Trafford?

  England v Austria: How you rated the players from Euro 2022 opener at Old Trafford Last updated on .From the section Women's Euro 2022

  England started off their home Euro 2022 campaign with a deserved 1-0 win over Austria. The performance was less than electrifying though and your top-rated player of the game was England defender Millie Bright... with only 6.54. England striker Ellen White was the worst-ranked player with 4.99.
