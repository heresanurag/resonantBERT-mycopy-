id: bbc_2021_3382
title: 'Covid: Ghost-hunters stopped in Mumbles due to rule break - BBC News'
date: '2021-03-05'
section: Wales
url: http://www.bbc.co.uk/news/uk-wales-56278809
content: |-
  Four people were stopped and fined for driving to "ghost hunt and view castles".

  Police stopped the car and found four people on a ghost hunt

  People on a ghost hunt about 60 miles (96km) away from home have been fined by police for breaking lockdown rules.

  Covid fines were issued to four people who drove from Cwmbran in Torfaen to Mumbles, Swansea, to "ghost hunt and view castles".

  A car was also seized due to the driver having no insurance and a provisional licence.

  Current lockdown rules in Wales say you can only travel when essential.

  Reporting the incident, South Wales Police tweeted it would be a "long walk home" for offenders.
