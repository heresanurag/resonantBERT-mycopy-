content: |-
  The PM tells the BBC's political editor he is "thoroughly enjoying" himself out meeting voters in the election campaign.

  The PM told the BBC's political editor he was "thoroughly enjoying" himself meeting voters in the election campaign.

  Rishi Sunak was asked if he was changing people's minds and he claimed he was.

  Speaking in Devon, he added there would not be a bigger plan in the campaign as the Conservative policy for national service.

  Live coverage of the election campaign
