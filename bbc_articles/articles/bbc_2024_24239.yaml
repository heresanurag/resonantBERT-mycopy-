title: ISS footage captures 'orbital sunrise' over Earth - BBC News
date: '2024-09-08'
section: General
url: http://www.bbc.co.uk/news/videos/cn9lwl34l57o
content: |-
  The footage - captured by a Nasa astronaut - shows the skies brighten as the International Space Station passes over Europe.

  Stunning timelapse footage taken aboard the International Space Station shows the skies over Earth being lit up by an approaching sunrise.

  Nasa said the footage of the "orbital sunrise" - which is when an astronaut sees the sun rise from space - was taken by its flight engineer Matthew Dominick, and was filmed while the space station was passing over Europe.
