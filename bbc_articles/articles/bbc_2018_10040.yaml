  One of Mr Walsh's neighbours said: "He only moved in recently, I'd say two or three weeks ago. I just really feel for the family. It is not nice at all."

  The crash happened on Newstead Avenue and Mr Walsh was found dead at his house in nearby Blenheim Avenue

