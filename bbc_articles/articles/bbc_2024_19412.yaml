title: Waitrose to open 100 new convenience shops - BBC News
date: '2024-08-21'
section: Business
url: http://www.bbc.co.uk/news/articles/cd6yngde8v1o
content: |-
  Waitrose says the move towards convenience shops is in response to consumer habits and demand.

  Waitrose has announced plans to open 100 new convenience shops over the next five years. The supermarket said the new stores would be opened across England, Wales and Scotland but said it could not share the exact locations of all of them. Waitrose confirmed the move towards convenience shops was in response to changing consumer habits and demand, with the first new store confirmed for Hampton Hill in London later this year. The company, which is part of the John Lewis partnership, currently has about 45 Little Waitrose stores, which are largely located in the south of England.

  "We know the opportunity is there yet we have currently only circa 45 little Waitrose convenience shops," said a Waitrose spokesperson. The supermarket said it planned to invest £1bn on its expansion plans and to improve its existing 329 stores, some of which are part of motorway services and petrol stations. Clive Black, an analyst at Shore Capital, said the general shift of supermarkets focusing on convenience stores could be due to planning permission constraints and affordability. "Such stores are easier to gain planning permission with greater site availability than traditional, larger, supermarkets whilst they are also cheaper and quicker to develop," he said. Waitrose is not alone in its plan to focus on smaller stores, Asda previously revealed plans to open 300 convenience stores by 2026. Eleanor Simpson-Gould, senior retail analyst at GlobalData, said "traditional" supermarkets were ramping up investment in smaller stores in response to "gains" made by the discounters such as Aldi and Lidl. "Convenience stores enable grocers to enter new locations with smaller investment costs than large format stores," she said. "Consumer habits are changing, and expediency drives this demand for smaller stores." GlobalData predicts that online shopping will see a 6% increase in sales in 2024. "This demand can be supported by smaller format stores, providing a base for rapid-delivery capabilities to expand," Ms Simpson-Gould added.
