title: Eight-try Leinster crush Glasgow Warriors to reach semi-finals - BBC Sport
date: '2025-04-12'
section: Irish Rugby
url: http://www.bbc.co.uk/sport/rugby-union/articles/c4g7erdgrx1o
content: |-
  Leinster score eight unanswered tries against Glasgow Warriors to advance to the Champions Cup semi-finals and underline their status as tournament favourites.

  Max Deegan scored Leinster's first and eighth tries

  Leinster crushed Glasgow Warriors to advance to the Champions Cup semi-finals and underline their status as tournament favourites. The Irish side ran in eight unanswered tries in a ruthless display as they completely outclassed the United Rugby Championship holders. Scores from Max Deegan, James Lowe, Tommy O'Brien, Hugo Keenan and a penalty try put the hosts in complete control at 33-0 up at the break. Garry Ringrose and Dan Sheehan crossed and Deegan added his second try as Leinster fired another resounding statement of intent to become kings of Europe again. Leinster will face the winner of Northampton Saints versus Castres in Dublin in the last four.

  The home side were on top from early on and thought they had struck first when Jordie Barrett crashed over, but the try was ruled out after the TMO spotted a knock-on from Ringrose in the build-up. It merely delayed the inevitable as, a few minutes later, some sharp handling created space for Deegan to dive over in the corner. Kyle Rowe looked ready to hit back for Glasgow with a break up the touchline until Barrett tracked back to sweep up his kick through and snuff out the danger. Warriors hopes suffered a double-blow when Adam Hastings was penalised for a deliberate knock-on to prevent Ringrose running in for a try. Yellow card for Hastings, penalty try awarded, and a mountain to climb for Warriors. The home side were ramping it up and made their numerical advantage count by whipping the ball wide to send Lowe over on one wing, then O'Brien over on the other. At 26-0, the contest was effectively over with barely half an hour on the clock. The blue shirts were coming in waves and Glasgow could not escape. Sam Prendergast slipped a deft little kick in behind the Warriors defence for Keenan to score. Half-time came as welcome respite for the beleaguered Warriors, but Leinster kept their foot on the throat, Ringrose bursting through the midfield to score. It was all too easy and Josh van der Flier popped a basketball pass over the top for substitute Sheehan to go over for try number seven. Glasgow's evening went from bad to worse when Matt Fagerson departed with a nasty looking leg injury. Leinster were in no mood to show any sympathy and a lovely chip from substitute Ross Byrne landed into the grateful arms of Deegan to go over for his second try of the evening and round off a powerful, clinical display. After defeats in the past three consecutive finals, Leinster are desperate to get their hands on the Champions Cup. On this evidence, they will take some stopping. Leinster head coach Leo Cullen: "There is a good desire there at the moment. We had a great day last week at Croke Park, a six-day turnaround and the guys added freshness. "We're into the next round and Ulster are here next week in the URC. The group is hungry and motivated at the moment and that's what we want to see." Glasgow head coach Franco Smith: "It was the first time we've been completely bullied in every part of the game. "As coaches, we just keep on telling the players that we need to improve, there is more required, there is a difference between club and international level. "You play a team like this, you realise that, you understand the work that still needs to be done - may that be in the gym or on the field with decision making, the pressure, how you manage the game when you start losing the contact part of it." Replacements: McGrath for Ringrose (52), Slimani for Gibson-Park (52). Not Used: Sheehan, Porter, Mangan, Doris, Byrne, Henshaw. Replacements: Schickerling for G. Horne (60), Bhatti for Matthews (48), Afshar for Samuel (60). Not Used: Stewart, Du Preez, Williamson, Ferrie, Cancelliere.
