title: Migrant emerges from back of motorhome in Heybridge - BBC News
date: '2025-03-10'
section: General
url: http://www.bbc.co.uk/news/videos/cy87vwj1ze6o
content: |-
  The video shows the man being helped out of the vehicle by police and apprehended.

  The moment a migrant emerged from the back of a motorhome having clung to the vehicle from France was captured on camera.

  The video was filmed by Adrian Fenton, who said he and his partner called police when they found the man zipped inside the cover of a bike rack at their home in Heybridge, Essex in October.

  It shows the man being helped out of the vehicle by police and apprehended. The couple were fined £1,500 for failing to "check that no clandestine entrant was concealed" in the motorhome.

  The Home Office said penalties were "designed to target negligence rather than criminality" but the pair said they were drafting an appeal.
