title: 'Belfast: Toddler in tuxedo delights Queen Camilla on bakery visit - BBC News'
date: '2024-03-21'
section: General
url: http://www.bbc.co.uk/news/uk-68630984
content: |-
  The bakery owner's son stole the Queen's limelight when visiting Belfast on Thursday.

  A tuxedo clad toddler stole the limelight from Queen Camilla on a visit to a Belfast bakery.

  Fitz Corrie-Salmon, the son of bakery owners William Corrie and Zoe Salmon, dressed for the occasion and drew the attention of the cameras.

  The Queen remarked that little Fitz was "such a natural" in front of photographers.
