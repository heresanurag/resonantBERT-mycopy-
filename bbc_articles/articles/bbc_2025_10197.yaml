  The famous frog gave the commencement speech at the University of Maryland where Muppets creator Jim Henson graduated in 1960.

  Students at the University of Maryland received encouraging words during their graduation ceremony from Kermit the Frog, who was this year's commencement speaker.

  The last time Kermit the Frog delivered a commencement address was in 1996 to the graduating class of Southampton College of Long Island University. Jim Henson, the creator of the beloved frog, graduated from the University of Maryland in 1960.

  Today, he is memorialised alongside Kermit in a bronze statue outside the university's student union.
