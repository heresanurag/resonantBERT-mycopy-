content: |-
  Dai Walters was one of five people injured after a helicopter crashed in woodland near Ruthin.

  Former Ffos Las racecourse owner Dai Walters is in intensive care after Tuesday's crash

  Racehorse owner Dai Walters has been moved to intensive care after being involved in a helicopter crash.

  The businessman, 77, from Lisvane in Cardiff, was one of five people injured after the accident in woods near Ruthin in Denbighshire.

  Racehorse trainer Sam Thomas was also injured in the crash but his assistant said he had been down to the stables and was "OK".

  An investigation into the crash, which happened on Tuesday, is taking place.

  Former Ffos Las racecourse owner Mr Walters was one of two people taken to Glan Clwyd hospital following the incident.

  While emergency services initially said he had escaped life-changing injuries, family friend Huw Howatson confirmed on Saturday afternoon that Mr Walters had been moved to intensive care.

