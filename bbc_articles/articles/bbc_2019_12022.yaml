content: |-
  The men were rescued from the fire at the club in Morecambe but died soon after, police say.

  Two men have died in a fire at a working men's club in Lancashire.

  The men were rescued from Gordon Working Men's Club on Springfield Street, Morecambe but died a short time later, police said.

  Ten fire engines, including appliances from Cumbria, two helicopters and three road ambulances, were called after the blaze broke out at 14:45 BST.

  An investigation into the cause of the fire is under way, Lancashire Police said.

  Firefighters would remain at the scene overnight, Lancashire Fire and Rescue Service said.

  A number of roads have been closed while crews continue to tackle the fire

  One eyewitness, who did not want to be named, said she was in The Cavern pub opposite the club when the fire broke out.

  "Next minute there's smoke coming in through the main window, coming through the door," she said.

  Two air ambulances were called to the scene

