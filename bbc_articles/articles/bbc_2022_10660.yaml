title: 'Commonwealth Games: Matty Lee & Noah Williams win synchronised 10m platform
  gold after Jack Laugher and Anthony Harding''s 3m springboard title - BBC Sport'
date: '2022-08-05'
section: Commonwealth Games
url: http://www.bbc.co.uk/sport/commonwealth-games/62436108
content: |-
  Matty Lee and Noah Williams win synchronised 10m platform gold after England team-mate Jack Laugher clinches his second Commonwealth Games title in 24 hours.

  This video can not be played To play this video you need to enable JavaScript in your browser.

  Matty Lee and Noah Williams won synchronised 10m platform gold after England team-mate Jack Laugher had clinched his second Commonwealth Games title in 24 hours. It marked Olympic champion Lee's first Commonwealth medal of any colour, as he and Williams - silver medallist in 2018 - scored a total of 429.78 points. Earlier, Laugher and partner Anthony Harding won the synchronised 3m springboard title, the third successive Games at which 27-year-old Laugher has won the event. There was also a bronze for England's Commonwealth Games debutant Amy Rollinson in the women's 1m springboard final.

  "In the Commonwealth Games I have never done exactly what I wanted to do," Lee told BBC Sport. "I missed out in 2014, had a rubbish Games in 2018 but I am so happy me and Noah have just smashed the synchro and got gold." Lee, 24, won Olympic gold in Tokyo with Tom Daley in this event, but with Daley taking a break from the sport he teamed up with 22-year-old Williams earlier this year. Together they won silver at the World Championships in June, with gold coming in their second major competition as a pair in Birmingham. They finished 15.93 points ahead of Canada's Rylan Wiens and Nathan Zsombor-Murray in silver medal position, while Australia's Domonic Bedggood and Cassiel Rousseau took the bronze. "This is what I do diving for. This is why I have achieved what I have. It is just competing. Especially in front of a home crowd. You don't get better than this," Lee added. "You don't get a chance to do this very often. We are so lucky to be able to do it - I mean that wasn't luck out there, that was pure skill - but we are lucky to get a gold in front of a home crowd. I'm ecstatic."

  This video can not be played To play this video you need to enable JavaScript in your browser.

  In Friday's first diving final, Laugher and 22-year-old Harding scored a total of 438.33 points to win gold, as Scotland's Ross Beattie and James Heatly finished fourth. "Obviously two golds is amazing," Laugher, who won 1m springboard gold on Thursday, told BBC Sport. "I think what me and Tony wanted to take from this was that we wanted to get another good performance under our belt. Certainly Tony achieved that. I've still got some things to improve on." Laugher and Harding topped the standings from their very first dive, but it wasn't until their third dive - a 3.4 difficulty forward two-and-a-half somersaults with two twists in pike - that their dominance began to show. Their highest score of 88.92 points came on their penultimate dive, the same point at which the Malaysian pair of Chew Yiwei and Ooi Tze Liang - who had been on their heels in second - slipped up, eventually finishing last. Another Malaysian pair, Gabriel Gilbert Daim and Muhammad Puteh, won silver, 61.56 points behind England, while bronze went to Australia's Samuel Fricker and Li Shixin. "This is my second international in like two or three years," Harding said. "The 3m men's in Great Britain is so hard, it's so tough to get on the big stage and I've worked so hard. I've had to be patient, I've had to wait for it. It's thanks to Jack for seeing me in training, seeing how good I can be and trusting in me and believing in me." Laugher and Harding only made their debut as a partnership at the World Championships in June, taking silver on that occasion. Their total in Birmingham was higher than Laugher's gold medal-winning totals with Mears at the previous two Commonwealth Games. Of his partnership with Harding, Laugher said: "We're really good friends and we've got a lot in common. I think our diving styles are very similar. "He deserves this. He's a great athlete and he's finally got his chance and he's really grabbed a hold of it, and that's something I need in my career - someone with motivation and drive to want to be the best and keep my fire ignited. "I've been doing this for a long time and having someone new on the scene, raring to go, I think it's really good and I think the synchro partnership is obviously great and we've done some amazing performances this year and I just can't wait for the future."
