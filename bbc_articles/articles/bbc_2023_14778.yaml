title: BBC reporter zip wires between London skyscrapers - BBC News
date: '2023-09-12'
section: General
url: http://www.bbc.co.uk/news/uk-england-london-66776424
content: |-
  The charity event saw 850 people riding by zip line from the Leadenhall Building to the Gherkin.

  The London Landmarks Skyscraper Challenge took place over the weekend, raising more than £800,000 for a range of charities.

  The event saw some 850 participants abseiling down or zip wiring from the Leadenhall Building - often known as the Cheesegrater - to the Gherkin, high above the streets of the Square Mile.

  BBC London's Harry Low decided to give it a go.
