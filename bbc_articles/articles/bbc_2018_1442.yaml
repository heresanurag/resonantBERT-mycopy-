id: bbc_2018_1442
title: 'Russia-Trump inquiry: Lavrov calls Russia charges ''blather'' - BBC News'
date: '2018-02-17'
section: General
url: http://www.bbc.co.uk/news/world-europe-43098212
content: |-
  The Russia foreign minister says he wants to see more facts on the US charges against 13 Russians.

  The Russian Foreign Minister, Sergei Lavrov, has dismissed as "blather" charges brought by FBI Special Counsel Robert Mueller against 13 Russians over election meddling.

  Speaking at the Munich Security Conference, he called for "facts".
