title: EastEnders actress Lacey Turner calls for better miscarriage support - BBC
  News
date: '2021-04-27'
section: General
url: http://www.bbc.co.uk/news/uk-56904891
content: |-
  In the UK parents only qualify for treatment on the NHS if they have had three miscarriages in a row.

  EastEnders actress Lacey Turner has has two miscarriages and believes the current system needs reforming.

  New research published in The Lancet reveals that miscarriage doubles the risk of depression and quadruples the risk of suicide.
