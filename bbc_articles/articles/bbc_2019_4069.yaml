  The police recorded-crime figures also show robberies rose 11% and vehicle thefts 9%. There was 2% fall in firearms crimes in 2018, a total of 6,525 offences.

  The total number of crimes recorded by police in 2018 was 5.8m, a year-on-year increase of 7%.

  The data was published at the same time as the Crime Survey for England and Wales, which is based on people's experiences of crime and includes offences that are not reported to police.

