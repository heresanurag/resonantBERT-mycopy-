title: Knife crime offences at record level in 2018, police crime data shows - BBC
  News
date: '2019-04-25'
section: UK
url: http://www.bbc.co.uk/news/uk-48050426
content: |-
  Incidents are continuing to rise amid a spate of assaults involving young people, police data shows.

  Knife crime in England and Wales rose to record levels last year, data shows.

  Police recorded 40,829 offences involving knives or sharp instruments in 2018, up 6% on the year before.

  The Office for National Statistics said cases of murder and manslaughter, excluding terror attacks, increased by 12%. There were 732 killings, up from 655 in 2017 - the highest since 2007.

  The separate Crime Survey, based on people's experiences, points to no significant change in overall crime.

  The police-recorded knife crime figures come amid a national debate on the issue, following a spate of assaults and killings involving young people.

  They show these recorded offences are continuing to rise and are at their highest level since 2011 - the year that knife crime statistics started to be gathered in a unified way.

  However, they show the rate of increase appears to be slowing. Offences rose 9% in the 12 months to September 2018 - after a 13% rise in the 12 months to June 2018.

  According to the statistics, there was an increase in knife offences recorded in 31 of the 43 police forces in 2018.

  The Metropolitan Police recorded the most knife offences - 14,660 - representing a 1% yearly rise. The biggest increase of 54% was recorded by British Transport Police, while Merseyside saw a 35% rise and Dyfed-Powys 28%.

  The figures show there were 252 killings involving a knife or sharp instrument in 2018. There were 18,950 assaults and 17,402 robberies where a knife or sharp instrument was used.

  The knife crime statistics do not include Greater Manchester Police because of differences in the way the force has been recording offences.

  Meanwhile, the number of killings in 2018 last year was at its highest in any calendar year since 2007, when the total reached 765.

  The Home Office has announced proposals for teachers and NHS workers to help tackle youth crime, as well as more stop and search powers for police.

  Policing minister Nick Hurd said recent figures from the Metropolitan Police suggested that action to tackle violent crime was having an impact.

  He added: "Law enforcement alone is not the answer which is why our serious violence strategy puts a greater focus on prevention - including by consulting on a proposed new duty to underpin a public health approach to serious violence, and investing over £220m in projects to steer young people away from crime."

  Yvette Cooper, who chairs the Home Affairs Select Committee, said: "The police are completely overstretched and crime prevention work is far too limited.

  The Labour MP added: "The Home Office and government response on knife crime and other rising crimes is still far too weak and just doesn't match the scale of the problem."

  Shadow home secretary Diane Abbott said the recorded crime figures were "deeply troubling" and showed "reckless cuts" to police forces were having an impact.

