title: BBC joins Met Police for dawn raid on disorder suspect's home - BBC News
date: '2024-08-08'
section: General
url: http://www.bbc.co.uk/news/videos/c628mxvlrd1o
content: |-
  Around 20 officers were involved in the operation in a residential area of London

  The BBC joined the Metropolitan Police for a raid of a house in London, where a man was arrested on suspicion of violent disorder against an officer during a Whitehall demonstration on 31 July.

  Around 20 officers were involved in the dawn raid, which took place at a property in a residential area. The man was taken to a local police station for questioning.

  Hundreds of people have now been arrested after days of unrest across the country.
