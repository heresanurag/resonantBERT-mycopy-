  Boris Johnson said his programme for government was the "most radical" in a generation.

  Clive Lewis: Labour needs to change itself

  We told you half an hour or so ago that Clive Lewis has been setting out his leadership pitch. Writing in the Guardian , he says he is standing "for the simple reason that if I don’t, certain necessary truths may go unspoken during the debates of the coming months". "The truth is that to change our country, we have to change ourselves," he says. The shadow treasury minister goes on to praise Jeremy Corbyn for his “enormous achievements in inspiring a new generation of members.” But he says the party was “never democratised on the scale” that members expected. He also distances himself from the Tony Blair and Gordon Brown years saying that the party often had “the legacy of the 2000s thrown back in our faces.” Of Labour's election defeat he says:"We never painted a rich and textured picture of life in the society that we proposed to build - instead we offered a shopping list of rather disconnected policies."
