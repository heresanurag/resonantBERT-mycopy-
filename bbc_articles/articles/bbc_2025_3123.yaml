content: |-
  Some people wore red and white, while others carried balloons in the same colours or held banners.

  Parents of stabbed boy joined by hundreds on march

  Harvey Willgoose's parents, Mark and Caroline, led an anti-knife march through Sheffield

  The parents of a teenage schoolboy stabbed to death led an anti-knife crime march earlier. Hundreds of people took part following the fatal stabbing of 15-year-old Harvey Willgoose at All Saints Catholic High School in Sheffield on Monday. Family and friends were joined by football fans and others affected by the teenager's death, as they walked from the city's town hall to Bramall Lane football stadium. Harvey died after being stabbed in the chest. A 15-year-old boy has been charged with murder.

  This video can not be played To play this video you need to enable JavaScript in your browser.

  The march, organised by Sheffield United fans and charities Always an Alternative and Mums United, started at 13:00 GMT ahead of the match between United and Portsmouth. Harvey's mum, Caroline Willgoose, said the turnout had been "amazing". "I just know that everyone is feeling for us," she said. "That's what's getting me through it."

  Flowers and tributes have been laid at Bramall Lane in memory of Sheffield United fan Harvey Willgoose

  She said fans of Sheffield United's rivals Sheffield Wednesday had been heard "shouting his name" on trams in the city during the day, while a number of Portsmouth supporters also joined the march. There was also a minute's applause at the 15-minute mark of the match between West Bromwich Albion and Sheffield Wednesday earlier. Mrs Willgoose said her son "would love it" to see supporters of different clubs singing his name.

  There was a minute's applause at The Hawthorns in the match between West Bromwich Albion and Sheffield Wednesday

  The march followed a mass at St Joseph's Catholic Church in Handsworth. "It was a very moving service," Father Desmond Sexton said outside the church afterwards. "People held the family very much in their prayers. "People came together in all sorts of ways and will continue to do so. "And it's that sense of being together that we give to another." A 15-year-old boy, who cannot be named due to his age, appeared at Sheffield Crown Court on Thursday charged with murder, possession of a bladed article and affray. A provisional trial date has been set for 30 June. Listen to highlights from South Yorkshire on BBC Sounds, catch up with the latest episode of Look North or tell us a story you think we should be covering here, external.
