title: 'Police: Jersey explosion ''a devastating scene'' - BBC News'
date: '2022-12-10'
section: General
url: http://www.bbc.co.uk/news/world-europe-jersey-63927608
content: |-
  Chief of Police Robin Smith describes the damage following a fatal blast at a block of flats in Jersey.

  One person has died after an explosion at a block of flats in Jersey.

  About 12 people are missing and two people are being treated at hospital after the explosion on Pier Road in St Helier just before 04:00 on Saturday morning.

  Chief of Police Robin Smith spoke to reporters about the extent of the damage.
