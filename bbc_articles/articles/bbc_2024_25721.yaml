  While in the Commonwealth country, the King's visit will include supporting environmental projects and a naval review in Sydney Harbour. The 75-year-old monarch is also expected to meet two Australian scientists, Georgina Long and Richard Scolyer, who have carried out pioneering research on melanoma, external - one of the country's most common cancers. There will be a reception in the capital on Monday to welcome King Charles, but the six state premiers - of New South Wales, Victoria, Queensland, Western Australia, South Australia, and Tasmania - have said they are unable to attend. A post on the Royal Family's X account said the trip would include the King addressing the Australian parliament in the capital Canberra. The King's cancer treatment has been suspended while in Australia and during the trip's next leg in Samoa, where he will attend a Commonwealth leaders' summit. The timetables for the royal tour do not include evening engagements, state dinners, or trips out late in the day. A message on the the Royal Family's social media account said: "Ahead of our first visit to Australia as King and Queen, we are really looking forward to returning to this beautiful country to celebrate the extraordinarily rich cultures and communities that make it so special."

