title: Floridians flee as 'destructive' Hurricane Milton nears - BBC News
date: '2024-10-09'
section: General
url: http://www.bbc.co.uk/news/videos/c93pj987l3vo
content: |-
  Residents are boarding up windows and finalising evacuation plans as another severe storm bears down.

  Huge lines of traffic can be seen in Tampa, Florida, as residents try to flee ahead of the arrival of Hurricane Milton.

  Elsewhere people have been boarding up homes and businesses, and a shelter has been set up at a baseball stadium.

  Officials have warned of the threat to life posed by the category four storm as it heads towards the US.

  The hurricane is set to hit the state less than two weeks after Hurricane Helene, which cause widespread devastation in the US south-east, killing at least 225 people.
