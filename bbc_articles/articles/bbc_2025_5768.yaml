title: 'Ireland 27-42 France: ''Free-scoring Bleus leave Irish history tilt in tatters''
  - BBC Sport'
date: '2025-03-09'
section: Ireland
url: http://www.bbc.co.uk/sport/rugby-union/articles/cm2dzpxv8vdo
content: |-
  Ireland hosted France in the Aviva Stadium seeking to make history. Instead a signature achievement has slipped from their grasp for the third time in 17 months.

  Ireland allowed 34 unanswered points between the 43rd and 74th minutes of their loss to France

  In the end, it was the most ill-fitting of send-offs. As a video tribute to Ireland's retiring trio of legends appeared on the big screens at the Aviva Stadium after a 42-27 Six Nations defeat by France, the majority of a crowd that had felt decidedly blue-tinged throughout had already departed into the Dublin streets. Many of them were likely left trying to process what they had witnessed across the previous 40 minutes. Peter O'Mahony, Conor Murray and Cian Healy may have 374 caps' worth of Ireland experience, but even that most seasoned group of stalwarts would struggle to recall any recent spell where Ireland were so thoroughly bested. Simon Easterby's side came in with the 2025 Triple Crown already secured, chasing both a Grand Slam and the first ever hat-trick of outright titles in the competition. When, with 37 minutes remaining of the game, they had overturned their third half-time deficit of the championship thanks to Dan Sheehan's converted score, that potential history still stretched ahead of them. Yet across the scintillating spell that followed, France scored 34 straight points to gain the upper hand in the game, the Six Nations title race and, perhaps, the competition's defining rivalry of the past four seasons.

