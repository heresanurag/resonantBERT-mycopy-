title: 'Front line frontmen: Antytila, the rock band fighting Russia - BBC News'
date: '2022-08-24'
section: General
url: http://www.bbc.co.uk/news/world-europe-62636408
content: |-
  Members of one of Ukraine’s top rock bands, Antytila, are among thousands of civilians fighting against Russia.

  Six months ago thousands of Ukrainian civilians joined the military to fight invading Russian forces.

  Among those who signed up were members of one of Ukraine’s top rock bands, Antytila. They became Army medics in Kharkiv - helping to treat wounded soldiers.

  The BBC joined them as they headed to the front line.

  Filmed and produced by Christian Parkinson and Alexandra Ostasiewicz
