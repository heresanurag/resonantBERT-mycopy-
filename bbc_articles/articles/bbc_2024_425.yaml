title: 'Storm Henk: Billing Aquadrome evacuated after severe flooding - BBC News'
date: '2024-01-03'
section: General
url: http://www.bbc.co.uk/news/uk-67875840
content: |-
  Parts of the East Midlands have been severely affected by flooding and strong winds, brought by Storm Henk.

  Aerial footage filmed from a helicopter shows submerged houses and fields in Northamptonshire, after Storm Henk caused flooding in the East Midlands.

  Mobile homes at Billing Aquadrome, which is a holiday park located in Great Billing, were also submerged. The company released a statement saying that the park was in "full evacuation".

  Storm Henk has caused huge damage across parts of the UK, with winds of more than 90mph sweeping across some regions.

  Here's what residents who had to evacuate the holiday park said to the BBC about their experience.
