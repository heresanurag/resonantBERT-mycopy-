  Scotland defeat Australia 19-14 in a thrilling lawn bowls men's triple final to take the gold medal.

  Scotland defeated Australia 19-14 in a thrilling lawn bowls men's triple final to take the gold medal.

  The hosts went 14-13 in front, but Darren Burnett moved Scotland back into a 16-14 lead in the penultimate end.

  Scotland's trio of Derek Oliver, Ronald Duncan and Burnett took another three in the final end with Australia missing with their final shot.

  Wales' Laura Davies took silver in the women's singles after losing in the final to New Zealand's Jo Edwards.

  Wales duo Marc Wyatt and Daniel Salmon will compete in Monday's men's pairs final against Scotland's Paul Foster and Alex Marshall.

  Burnett, meanwhile, said winning gold was the "greatest feeling in the world".

  "We beat the Aussies in their backyard," he said. "I knew it was up to me to deliver one or two big ones."
