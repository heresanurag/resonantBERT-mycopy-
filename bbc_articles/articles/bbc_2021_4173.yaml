  The Queen has led her family in mourning at the funeral of her husband, the Duke of Edinburgh, in the grounds of Windsor Castle.

  The Queen has led her family in mourning at the funeral of her husband, the Duke of Edinburgh, in the grounds of Windsor Castle .

  A national minute's silence was held at 15:00 BST, just before the service began.

  The ceremonial funeral is taking place entirely within the grounds of the castle and the public have been asked not to gather there or at other royal residences.
