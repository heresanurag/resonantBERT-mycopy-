content: |-
  A period of unseasonably mild weather is forecast to hit the UK over the festive period.

  The UK is set for a period of unseasonably mild weather on Christmas Day this year.

  It is expected to be cloudy too, with the threat of some isolated rain in the far north of Scotland.

  BBC weather presenter Louise Lear delivers the weather forecast for the festive period.
