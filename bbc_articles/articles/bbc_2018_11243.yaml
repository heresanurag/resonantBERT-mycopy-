title: 'John McCain memorial: Washington pays homage - BBC News'
date: '2018-09-01'
section: US & Canada
url: http://www.bbc.co.uk/news/world-us-canada-45374913
content: |-
  Members of Congress attend a ceremony at the Capitol in Washington ahead of Saturday's funeral.

  Members of the US Congress have gathered to commemorate the late Republican Senator John McCain, who died last week at the age of 81.

  A military honour guard carried the flag-draped coffin up the stairs of the US Capitol, just before 11:00 (15:00 GMT) on Friday.

  John McCain's widow, Cindy, and his sons Jack (C) and James (R) watched the coffin being carried in

  John McCain is the 31st person to lie in state at the Capitol Rotunda in 166 years

  Mr McCain's mother Roberta, 106, and granddaughter Meghan also attended, along with his seven children and hundreds of members of Congress

  Vice-President Mike Pence said Mr McCain would be missed: "As President [Donald] Trump said yesterday [Thursday], we respect his service to the country."

  John McCain's funeral will take place at the Washington National Cathedral on Saturday.
