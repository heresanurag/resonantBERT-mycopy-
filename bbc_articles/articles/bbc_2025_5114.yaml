  US Vice-President JD Vance is visiting Greenland on Friday - but why is the US so interested in the territory?

  President Trump has repeated claims that taking control of Greenland is essential for US national security - as Vice-President JD Vance and his wife Usha visit a US space base there on Friday.

  The BBC's Analysis Editor Ros Atkins looks at what the Trump administration wants from Greenland - and the controversy surrounding the trip.
