content: |-
  First Minister says testing system has not "been good enough" and sets out plans to "simplify" process.

  As we bring our live coverage to an end for the day, here's a reminder of today's developments:

  Public Health Wales announced that 41 more people have died after testing positive for coronavirus bringing the total to 575. The figure includes deaths in hospitals and may also include some deaths recorded in community settings like care homes.

  Tributes have been paid to two workers serving the health care sector in Swansea who have died with Covid-19. Swansea University said Brian Mfula, was an "inspiring, warm and generous" mental health nursing lecturer. Swansea Bay health board said Jenelyn Carter, was a "lovely, caring" healthcare assistant who worked on admissions at Morriston Hospital.

  Wales' coronavirus testing system has not "been good enough", First Minister Mark Drakeford has admitted as he set out plans to "simplify" the process.

  We'll be back with the latest on the outbreak in the morning.
