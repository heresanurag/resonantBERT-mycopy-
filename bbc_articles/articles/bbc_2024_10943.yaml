title: Kidderminster woman pleads guilty to role in monkey torture network - BBC News
date: '2024-05-07'
section: Hereford & Worcester
url: http://www.bbc.co.uk/news/uk-england-hereford-worcester-68968718
content: |-
  Holly LeGresley, 37, was a participant in a group that paid people to kill and torture baby monkeys.

  This video can not be played To play this video you need to enable JavaScript in your browser. Holly LeGresley was surrounded as she left Worcester Magistrates' Court

  A British woman has pleaded guilty to being part of a global monkey torture network. Holly LeGresley, 37, from Kidderminster, was a participant in a private online group that was paying people in Indonesia to kill and torture baby monkeys on video. The convictions follow a year-long investigation by the BBC Eye team. They went undercover in the groups to expose the existence of the sadistic global network. LeGresley, of Baldwin Road, pleaded guilty at Worcester Magistrates' Court to charges of consuming, causing and facilitating the torture of baby monkeys over the internet. She admitted to uploading 22 images and 132 videos of monkeys being tortured to online chat groups. The prosecution said LeGresley showed a desire to harm vulnerable creatures and that she also had a hatred towards pregnant women and children.

  The monkey torture community began life on YouTube before moving to encrypted messaging apps

  The 37-year-old was part of a group on the messaging app Telegram that brainstormed, crowdfunded and then commissioned videos of monkeys being tortured by people in Indonesia. The group was used to share ideas for custom-made torture videos such as setting live monkeys on fire, injuring them with tools and even putting one in a blender. The ideas were then sent, along with payments, to video-makers in Indonesia who carried them out, sometimes killing the baby long-tailed macaque monkeys in the process. Under the username "The Immolator" LeGresley once ran a poll for members of the group on which method of torture should be inflicted upon an infant monkey. LeGresley will be sentenced at crown court on 7 June. BBC Eye identified her as a participant in a group run by a US man called Mike Macartney, a former motorcycle gang member who served time in prison and went by the screen name "Torture King".

  "The Torture King" Mike Macartney at home in Virginia

  LeGresley, who at the time was living with her parents in the Midlands, was among the most active participants in the group and was made a group moderator by Macartney. She would often message privately with Macartney, who pleaded guilty this month to animal abuse charges in the US and is facing up to five years in prison. Kevin Lacks-Kelly, the head of the UK National Wildlife Crime Unit, said LeGresley played a key and active role in the global torture network. He said she was much more than a spectator, that she raised funds, archived videos to share between groups and acted as an admin in the groups welcoming new members. "I've been investigating wild crime for 22 years and it sickens me to say that this is unequivocally the worst case I have ever investigated or overseen," he said. Sarah Kite, a co-founder of the animal charity Action for Primates who investigated the groups, said LeGresley "unquestionably derived enjoyment from watching helpless infant monkeys in terror and pain fighting for their lives". "The depth of the depravity and perversion... in facilitating the horrific and gratuitous torture and killing of vulnerable baby monkeys was sickening, something I had never seen previously," she said.

  Adriana Orme was arrested by police in October 2022

  Another woman, Adriana Orme, of The Beeches in Ryall, near Upton-upon Severn, also appeared at the magistrates' court on Tuesday in connection with the network. The 55-year-old chose not to enter a plea at this stage to charges of publishing an obscene article and for causing unnecessary suffering to a protected animal. Orme is alleged to have published an obscene article by uploading one image and 26 videos of monkey torture between 14 April and 16 June 2022. She is also alleged to have encouraged or assisted the commission of unnecessary suffering by making a £10 payment to a PayPal account on April 26 2022. Her next appearance in court will be 5 June. LeGresley, who left court without comment, admitted uploading images of monkey torture between 25 March and 8 May 2022, and making a payment of £17.24 to a PayPal account to encourage cruelty on 25 April 2022. Both defendants have been granted conditional bail and ordered not to have unsupervised contact with any animal or child.

  Holly LeGresley (right) pleaded guilty to being part of the torture network, while Adriana Orme (left) did not enter a plea

  At least 20 people were placed under investigation globally last year following the BBC's investigation. Three participants have already been charged in the US, including the ringleader of the group, Macartney. David Christopher Noble, 48, a former US Air Force officer who was previously court-martialled and dismissed from the military, and Nicole Devilbiss, 35, faced the same charges as Macartney and are both facing up to five years in prison. Along with Macartney, the BBC identified two other ringleaders in the monkey torture network - Stacey Storey, a grandmother in her 40s from Alabama who was known in the community as "Sadistic", and a man known as "Mr Ape", whose real identity we cannot reveal for safety reasons. Both were expected to face charges for their role in the groups.

  Police in Indonesia detain Asep Yadi Nurul Hikmah, who was among the most brutal torturers

  Police in Indonesia also arrested two torture suspects. Asep Yadi Nurul Hikmah was charged with animal torture and the sale of a protected species and sentenced to three years in prison. M Ajis Rasjana was sentenced to eight months - the maximum sentence available for torturing an animal.

