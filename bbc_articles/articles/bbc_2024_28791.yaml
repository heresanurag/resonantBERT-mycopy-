  Deputy First Minister Kate Forbes said it was a milestone to be celebrated. "The Glen Sannox will provide resilience to the fleet delivering vital lifeline services to islanders and I am encouraged that the Scottish government’s wider programme to procure six new ferries by 2026 has taken another major step forward," she said. CalMac's interim chief executive Duncan Mackison said the ship would benefit the entire network, giving the operator more flexibility in deploying vessels. He added: "Our crew are excited to sail her and will now get to work to complete operational trials and familiarisation work in the next few weeks before she enters service for Arran." Scottish Conservative transport spokeswoman Sue Webber accused the Scottish government of having "betrayed islanders at every turn and squandered an eye-watering amount of taxpayers’ money in delivering the Glen Sannox". She added: "Seven years ago today Nicola Sturgeon promoted this ferry to much fanfare, only for it to be then embarrassingly revealed that it had painted-on windows and was clearly nowhere near ready for service. “Now islanders must finally hope that this lifeline ferry will be setting sail soon. However, SNP ministers should not be patting themselves on the back at this long-awaited news.

  Glen Sannox is expected to carry its first passengers in January

  Glen Sannox is the second largest ship to join the CalMac fleet - and the first ferry ever built in the UK capable of running on liquefied natural gas (LNG). CalMac, which is also owned by the Scottish government, will now spend six-and-a-half weeks conducting crew familiarisation and harbour berthing trials. The ship will also begin its annual maintenance cycle, with two weeks of inspections scheduled for early December, before carrying its first passengers from Troon to Brodick on Arran, probably in mid-January. Construction of Glen Sannox's sister ship, Glen Rosa, is proceeding more smoothly, and it is due to be delivered in September next year.

  The order for the two ferries has become one of the biggest public procurement disasters since power was devolved to Holyrood. Glen Sannox was originally due for delivery in May 2018, with Glen Rosa expected to follow two months later, but from the outset the build was plagued by design challenges and disputes over rising costs. The contracts were awarded in 2015, a year after Ferguson Shipbuilders, the last commercial yard on the River Clyde, was rescued from administration by successful businessman Jim McColl, in a deal brokered by then first minister Alex Salmond.

  Former First Minister Alex Salmond, seen here with Ferguson workers in 2014, brokered a deal to rescue the shipyard

  While the ships were bigger and more complicated than anything previously attempted by the small Port Glasgow shipyard, the new owners were promising new investment and were confident they could deliver them. But relations with the yard's new management and CMAL quickly soured with both sides blaming each other for problems that developed. Jim McColl claimed a flawed concept design by CMAL, repeated change requests and interference led to unforeseen costs. CMAL maintained McColl's company had simply proved unable to design and build the ships, and there was no basis in the contracts to pay any more. The stalemate saw the firm run out of money - and Ferguson's fell back into administration in August 2019. It was subsequently nationalised, saving 350 jobs, but the new management under "turnaround director" Tim Hair struggled to resolve the difficulties. He left the firm in early 2022, having been paid nearly £2m for 18 months work, with the two ships far from complete. His replacement David Tydeman described the challenges of fitting the LNG system into the tight machinery spaces as more complex than building a Type 26 frigate. Mr Tydeman was himself subsequently sacked by the Ferguson board earlier this year after another delivery deadline was missed.
