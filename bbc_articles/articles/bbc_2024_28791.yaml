title: Ferries saga ship Glen Sannox finally delivered - BBC News
date: '2024-11-21'
section: Glasgow & West Scotland
url: http://www.bbc.co.uk/news/articles/cew1wxx0d0jo
content: |-
  The dual-fuel ferry is handed over, seven years to the day since it was launched by Nicola Sturgeon.

  MV Glen Sannox, in the Clyde at Greenock, during its recent sea trials

  The long-delayed ship at the centre of Scotland's ferries saga has been handed over by the Ferguson shipyard, exactly seven years after it was launched. MV Glen Sannox, destined for CalMac's Arran route, is the first new large vessel for the west coast ferry fleet in nearly a decade. The ferry operator will now conduct several weeks of crew familiarisation trials before the ship carries its first passengers in January. Glen Sannox was originally due for delivery in 2018 but has faced major challenges in design and construction, sparking the longest-running political controversy of the devolution era.

  Costs have risen from an initial contract price of £97m to more than £400m, including £45m of government loans that were never fully recovered. The handover comes seven years to the day since the ship was famously launched by former first minister Nicola Sturgeon with painted-on windows and plywood funnels.

  Since then the Port Glasgow shipyard has faced administration, nationalisation - and years of frustrating setbacks as it grappled with complex engineering challenges to complete the dual-fuel ship. The delays also disrupted vessel replacement plans, with CalMac now under huge pressure to maintain services with an ageing and increasingly unreliable fleet. Alex Logan, convener for the GMB union who has worked at the Inverclyde shipyard since he was 16, said it was a big day both for the yard - and Scotland's island communities. "It's been a long hard struggle - everyone knows this, the troubles we've had with Glen Sannox - but we've finally got it over and we're looking forward to the islanders getting a vessel," he said. "I can only apologise on behalf of the workforce - but it's not any fault of the workforce. It was bad planning, bad design - but eventually we're here and I'm glad."

  The new Master of Glen Sannox, Michael Mackinnon, raises CalMac's house flag on board the ship for the first time

  The 102.4m (336ft) vessel was formally handed over to CMAL, the publicly-owned company which owns Scotland's west coast ferries and leases them to CalMac. Once all the paperwork was completed, the new Master of Glen Sannox, Michael Mackinnon, boarded the ship and raised CalMac's house flag for the first time. Interim chief executive of Ferguson Marine, John Petticrew, declared the ship "a fine vessel, well capable of providing decades of service for islanders and visitors". He added: "There is no doubt it’s been a long haul getting to this point, and we sympathise with ferry users who have waited so long to see this day. "Looking to the future, our ability to adapt, learn from, and successfully overcome considerable challenges demonstrates the resilience and skills of our workforce, and will provide huge value as we tender for future contracts."
