title: Saltburn 'explosion' leaves 25,000 homes without power - BBC News
date: '2018-03-05'
section: Tees
url: http://www.bbc.co.uk/news/uk-england-tees-43295726
content: |-
  Saltburn, Redcar and Hartlepool were affected by the suspected blast at an electricity substation.

  This video can not be played To play this video you need to enable JavaScript in your browser. Watch: Flames at an electricity substation in Saltburn

  A suspected explosion at an electricity substation left more than 25,000 properties on Teesside without power.

  Fire crews were called to Windsor Road in Saltburn, shortly before 19:00 GMT.

  No injuries were reported, but large areas of Saltburn, Redcar and Hartlepool were affected.

  Northern Powergrid said it had restored power remotely to 22,000 customers within 25 minutes and a further 2,045 customers by about 20:40 GMT.

  The fire service said one fire engine was on scene

  Underground cables were affected in the incident and firefighters and engineers were both working at the scene, Cleveland Fire Brigade said.

  Johanna Parks reported on Twitter there were "two large bangs" and smoke billowed out of the substation

