  Get extra election news, analysis and in-depth reporting from the BBC direct to your smartphone.

  You can get extra news, analysis and in-depth reporting on the Northern Ireland Assembly election from the BBC's team direct to your smartphone by signing up below.

  Tap here to receive the alerts.

  This feature is only available to UK app users.

  You can download the latest versions of the BBC News app here on the Android Play Store or here on the iOS App Store.
