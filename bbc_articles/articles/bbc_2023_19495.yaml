content: |-
  Watch the US artist sing and play on a public piano inside St Pancras International station.

  US singer Alicia Keys has surprised commuters in London with a performance of some of her biggest hits inside St Pancras International.

  Watch this video to see her sing If I Ain't Got You and No One, on a public piano donated to the station by Sir Elton John.
