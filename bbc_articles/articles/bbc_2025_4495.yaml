title: 'M25: Drivers warned as final motorway closure begins - BBC News'
date: '2025-03-21'
section: Surrey
url: http://www.bbc.co.uk/news/articles/c8d4259l20ro
content: |-
  Work began in 2022 and is part of a delayed £317m project to improve safety and cut congestion.

  Motorists are being urged to avoid the area unless their journey is "absolutely necessary"

  Drivers are being urged to avoid an area of the M25 in Surrey that has been closed for the fifth and final time. Work to demolish and remove an old bridge has seen the stretch between junction 10, near Wisley, and junction 11, near Woking, shut in both directions from 21:00 GMT on Friday until 05:30 on Monday. It is part of a £317m project to add extra lanes to improve safety and cut congestion where the motorway meets the A3. National Highways said that diversion routes will be in place while work is carried out and drivers are being urged to avoid the area unless their journey is "absolutely necessary".

  This video can not be played To play this video you need to enable JavaScript in your browser. The closure of the M25 at Wisley will be the last one for the works

  Begun in 2022, work was due to end this summer but that completion date has now been delayed until spring 2026 as a result of "periods of extreme weather". And, while National Highways admitted a "notable increase" in traffic during the previous closure a fortnight ago compared with the previous three in 2024, it said an end was in sight.

  Senior project manager Jonathan Wade insisted the "complex" project was now "on the home straight", even despite Friday's problems at Heathrow, where an electrical fire caused flight chaos and left thousands stranded. However, he added that, while National Highways are continuing as planned, the Department of Transport would have the final decision on the matter. Mr Wade also advised drivers to allow extra time and use alternative routes where possible. Motorists are also being warned to follow the official diversions put in place, after a HGV driver had to be rescued by Surrey Police from Pyrford Lock after following Google Maps instead. The Department of Transport has been approached for comment.

