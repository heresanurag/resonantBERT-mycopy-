title: 'Manchester United 0-1 Juventus: Dybala strike seals Champions League win on
  Ronaldo return - BBC Sport'
date: '2018-10-24'
section: General
url: http://www.bbc.co.uk/sport/football/45907593
content: |-
  Juventus beat Manchester United as Paulo Dybala scores the only goal on Cristiano Ronaldo's return to Old Trafford.

  Last updated on .From the section European Football

  Cristiano Ronaldo marked his return to Old Trafford with a win as his Juventus side outclassed Manchester United to move five points clear at the top of Champions League Group H.

  The former United star helped to set up Juve's winner in the 17th minute, with his cross reaching Paulo Dybala who finished from close range.

  The Italian champions had several chances to extend their lead during a first half where they were completely dominant, managing 10 shots to United's one and enjoying 70% of possession.

  United improved after the break but only had one serious effort at goal, when Paul Pogba let fly from the edge of the area but saw his shot rebound off the post.
  • None Lukaku struggling but goals will come - Mourinho

  It was a frustrating night for United boss Jose Mourinho, who was taunted by the away fans as he saw his side suffer only their second home European defeat since March 2013, when Ronaldo scored Real Madrid's winner.

  The two sides will meet again at the Allianz Stadium on 7 November, when a win will send Juve into the last 16.

  United remain in second place, with their hopes of making the knockout stages boosted by Valencia's draw with Young Boys earlier on Tuesday.

  Ronaldo had returned to Old Trafford with a rape allegation - that he strenuously denies - hanging over him but said before the game that he is "a happy man".

  All eyes were on him again from the moment he led his team-mates out of the tunnel for the warm-up, and he received an enthusiastic welcome from the home fans as well as the travelling Juve supporters.

  As was so often the case during his six years as a United player between 2003 and 2009, Ronaldo was to play a starring role when the game got under way.

  The 33-year-old's performance, particularly in the first half when Juventus were completely dominant, was a reminder of his former glories here and a time when United were a team renowned for their attacking flair.

  He started the game on the left but Juve's fluid front three meant he often popped up on the right, as he did to set up Juve's goal, or in the centre.

  The Portuguese forward could not cap his display with a goal - David de Gea's fine save to tip over his curling shot shortly after the break was his best effort - but this was still an impressive demonstration of his enduring quality.

  Ronaldo remained the centre of attention after the game too. A succession of pitch invaders attempted to reach him during the match and after the final whistle, when he took a selfie with one of them.

  That meant he was the last player to leave the pitch, and he was cheered off by all sides of Old Trafford, while clapping and touching his chest to show what their applause meant to him.

  United have mounted second-half comebacks in their last two matches, a victory over Newcastle and their draw with Chelsea last weekend, but they did not come close to a repeat here.

  Those performances had hinted at what United are capable of when they hit form but this game turned into a sobering reminder of their standing compared to Europe's elite, particularly in attack.

  Anthony Martial finally forced Wojciech Szczesny into one save of note with seconds of the 90 minutes remaining, with the Juve keeper's only other stop coming before the break when he collected a looping header from Pogba.

  Like Ronaldo, the France midfielder was also facing his former club - it was during his four years with Juve from 2012-16 that Pogba forged his reputation as a world-class marauding midfielder.

  But he was unable to inspire his side in the final third, while Romelu Lukaku's goal drought continued, and must now be becoming a major concern.

  The Belgium striker only managed one shot at goal - which was blocked - and he has now failed to score in any of his past eight club appearances.

  Manchester United manager Jose Mourinho: "In the other side there was huge quality. Sometimes people look for Ronaldo or Dybala but in a top team you have to look to Chiellini and Bonucci. I think Juventus are the type of team that when they are in front its very difficult.

  "I think our attacking players, things were not coming. But everyone tried, everyone was strong mentally to try until the end. Juventus felt it and they ended the game with an extra central defender.

  "But Juventus is a different level of quality, I have to be honest. A level of quality, stability, experience, know how. It was a really difficult match for us. I thought we could take something but it was not possible."
  • None Manchester United suffered their fourth home defeat in their last 13 games at Old Trafford in all competitions - as many as in their previous 81 home matches.
  • None Juventus registered their first win at Old Trafford in the Champions League since November 1996, when they won 1-0 under manager Marcello Lippi.
  • None Manchester United failed to score in consecutive home Champions League matches for the first time since November 2005.
  • None Only Lionel Messi and Edin Dzeko (5) have scored more Champions League goals this season than Juventus striker Paulo Dybala (4).
  • None Manchester United attempted just six shots, their fewest in a home Champions League game since April 2014 against Bayern Munich (also six).
  • None Juventus are unbeaten in nine European matches against English opposition (W5 D4), last losing in March 2010 against Fulham in the Europa League.

  United's next test is a home game against Everton on Sunday (kick off at 16:00 GMT). Juventus, who dropped their first domestic points of the season last weekend in a draw with Genoa, travel to play Empoli on Saturday (17:00).
