id: bbc_2023_12931
title: 'Colombia earthquake: Guests leave as live TV broadcast disrupted - BBC News'
date: '2023-08-19'
section: General
url: http://www.bbc.co.uk/news/world-latin-america-66553771
content: |-
  The news anchor remained calm and went to a commercial break.

  An earthquake with a 6.1 magnitude has interrupted a live TV broadcast in Bogota, Colombia.

  The tremor was followed by a series of aftershocks, estimated at 5.6 and 4.8 magnitudes.
