title: 'Paddington: Bear from Peru finally gets his British passport - BBC News'
date: '2024-10-22'
section: Culture
url: http://www.bbc.co.uk/news/articles/cx2l2dvvwqno
content: |-
  Film-makers asked for a passport to be used in the famous bear's new movie, Paddington in Peru.

  Paddington Bear has finally been issued with a British passport, 66 years after he was first said to have arrived in London - but he won't be able to travel far. Film-makers requested a passport for the Peruvian bear, to be used as a prop in Paddington in Peru. Co-producer Rob Silva told the Radio Times, external that they had asked for a replica but been given an official one. However, the Home Office confirmed to the BBC that it was a specimen document and can't actually be used. "You wouldn’t think the Home Office would have a sense of humour, but under official observations, they've just listed him as Bear," Silva said.

  Paddington was created in 1958 by Michael Bond, who said the much-loved bear from "darkest Peru" was inspired by his childhood during World War Two. "When I was small, I had memories of children being evacuated from London with a label around their necks and all their possessions in a suitcase, and this became part of Paddington as well," he told the BBC in 2017. "Paddington Bear was a refugee with a label - 'Please look after this bear. Thank you', and he had a little suitcase." Paddington arrives as a stowaway on a boat from South America and settles with the Brown family, who name him after the London train station where they found him. The successful movie series, based on Bond's books, sees Ben Whishaw voice the famous bear. Paddington in Peru, the third film, will be released in November. Paddington also famously had tea with the late Queen Elizabeth II during the celebrations for her Platinum Jubilee.
