content: |-
  The reptile, believed to be an adder, was seen enjoying the surf in the hot weather.

  Who can blame this snake for enjoying a dip in the sea on such a hot day?

  The reptile, believed to be an adder, was spotted enjoying the gentle surf at Morfa'r Garreg beach in Pwllheli, Gwynedd.

  Adders - the UK's only venomous snake - are most active from spring to October and pose a particular risk to dogs between April and July.
