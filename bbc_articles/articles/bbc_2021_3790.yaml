title: Child dies after being rescued from fire in Greenwich flat - BBC News
date: '2021-03-06'
section: London
url: http://www.bbc.co.uk/news/uk-england-london-56306177
content: |-
  The child died in hospital after firefighters rescued them from a fire in flat in south London.

  Firefighters were called to the scene at about 05:44 GMT

  A child has died following a fire in a block of flats in south London.

  A 34-year-old woman and two children were rescued from the top floor of a split-level maisonette on Russett Way, Greenwich, just before 06:00 GMT.

  All three were taken to hospital by the London Ambulance Service, where one of the children died. The woman and second child remain in a serious condition.

  A spokesperson for London Fire Brigade said the blaze was brought under control at about 07:00.

  Six engines and about 40 firefighters from crews based in Greenwich, Lewisham, Deptford, New Cross, Lee Green and East Greenwich were at the scene.

  The cause of the fire is being investigated by London Fire Brigade and the Met Police.

