title: Girls Aloud to release Sarah Harding's version of I'll Stand By You for Children
  in Need - BBC News
date: '2024-11-06'
section: Culture
url: http://www.bbc.co.uk/news/articles/cn5wkyq37wvo
content: |-
  The group will re-release I'll Stand By You with newly rediscovered vocals by their late bandmate.

  Sarah Harding died in 2021 at the age of 39

  Girls Aloud are to release a new version of their hit single I'll Stand By You, with the lead vocal sung entirely by their late bandmate Sarah Harding. The ballad was originally released as a Children In Need song in 2004 and topped the UK chart for two weeks. The 20th anniversary re-release will again raise money for the charity. "It really is a special celebration of Sarah, and also Girls Aloud's involvement with Children In Need over the years," singer Nadine Coyle said. Harding died of complications from breast cancer in September 2021 at the age of 39.

  Her isolated vocal for I'll Stand By You was rediscovered earlier this year as the band were pulling together archive material for their sold-out arena tour. The song became an emotional highpoint of the tour, with Harding shown singing on screens while her bandmates guided the audience in a heartfelt singalong. Initially spread across the stage, Nadine, Cheryl, Nicola Roberts and Kimberley Walsh slowly moved towards each other before singing the last chorus a capella, harmonising with their late friend while holding hands. "It was an emotional moment for us all," reflected the band in a statement announcing the new single release.

  The band performed I'll Stand By You on the 2004 Children In Need telethon

  I'll Stand By You - Sarah's Version premiered on Wednesday during Zoe Ball's BBC Radio 2 breakfast show. Speaking on the programme, Nadine called the song "really special" and paid tribute to "our wonderful Sarah". The new mix showcases the singer's strength as a vocalist - with a tell-tale rasp that catches on the song's message of friendship and solidarity. A new version of the music video, featuring unseen archive footage, will also be screened during the Children in Need appeal show on BBC One on 15 November. The single will be released on the same day. The Pretenders star Chrissie Hynde, who wrote and released the original song in 1994, endorsed the new recording. "How wonderful to hear I’ll Stand By You with the lovely vocals of Sarah Harding leading the way for BBC Children in Need," she said in a press release. Children in Need is the BBC's charity for disadvantaged children and young people across the UK. Meanwhile, ITV will screen highlights of the recent Girls Aloud tour on 17 November, marking what would have been Harding's 43rd birthday. The full concert will also be available to stream on ITVX.
