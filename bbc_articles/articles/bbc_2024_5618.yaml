title: Triple lock for pensions to be in Tory manifesto, Jeremy Hunt says - BBC News
date: '2024-03-24'
section: Business
url: http://www.bbc.co.uk/news/business-68649894
content: |-
  Chancellor Jeremy Hunt says he will pay for the "expensive" pledge through economic growth.

  This video can not be played To play this video you need to enable JavaScript in your browser. Watch: Laura Kuenssberg asks if the triple-lock would be in the Conservatives' election manifesto

  Jeremy Hunt has said the Conservatives will keep the triple lock system to decide rises in the state pension if they win the election.

  The chancellor confirmed the pledge, which means the pension rises in line with average earnings growth, inflation or 2.5% - whichever is highest.

  He told Sunday with Laura Kuenssberg he was confident the "expensive" promise would be paid by growing the economy.

  Labour said it was "committed to retaining" the triple lock.

  However, it is yet to confirm if the pledge will feature in its election manifesto. "We will set out those plans for our manifesto in detail," Labour party chair Anneliese Dodds told the BBC programme.

  The state pension will rise by 8.5% in April.

  Mr Hunt confirmed the current triple lock system to decide how much the payments rise each year would "absolutely" remain if the Conservatives win the general election, which must be held by 28 January 2025, for the whole of the next parliament.

  "When we came to office in 2010, pensioners were more likely to be in poverty than other income groups, now because of the triple lock that we introduced they are less likely to be in poverty," he told the BBC.

  "I think that is a very important social change because unlike adults of working age, pensioners can't work, they have retired and so we need to respect that."

  Mr Hunt said he realised continuing the policy would be an "expensive commitment", but added: "You can only make that commitment if you're confident that you're going to deliver the economic growth that is going to pay for it."

  Liberal Democrat Treasury spokesperson Sarah Olney said the pledge was a "shameless election trick by the Conservatives" and claimed Mr Hunt was "yet again taking pensioners for granted".

  Yael Selfin, chief economist at accountancy firm KPMG, said: "It is easier to make this promise now that inflation is going down."

  Inflation rose by 3.4% in the year to February, which is the lowest rate since September 2021 and Ms Selfin predicted that it would fall below the Bank of England's 2% target sooner than expected this year.

  Ms Selfin said: "The extra spending on pensions will not necessarily create a lot of growth on its own. [The chancellor] would need to find other ways to stimulate growth."

  Labour leader Sir Keir Starmer declined to say if the triple lock would be in his party's manifesto when asked by The Sun newspaper last week.

  "We will have to see what the state of the economy is as we go into the election. We will publish all of our plans as we go in and answer that question, but I believe in the triple lock."

  The state pension is a payment made every four weeks by the government to people who have reached the qualifying age and have paid enough National Insurance contributions. More than 12 million people in the UK receive it.

  Currently, the pension is worth £203.85 a week for the full, new flat-rate (for those who reached state pension age after April 2016), and £156.20 a week for the full, old basic state pension (for those who reached state pension age before April 2016).

  In April, the two payments will rise to £221.20 and £169.50 per week respectively, taking the annual totals to £11,502 and £8,814.

  Next month's increase is set to be the second significant rise in the state pension in two years, after a 10.1% increase in April 2023.

  The Institute for Fiscal Studies economic think tank says the policy "can't go on forever"

  The triple lock is designed to ensure pensioners, especially if they rely solely on the state pension, are able to afford rising prices, or keep pace with the increases in the working population's wages.

  It was introduced by the Conservative-Liberal Democrat coalition government in 2010, but there has been debate over whether it can continue in the long-term future due to its costs.

  The state pension cost £110.5bn in 2022-2023, just under half the total amount the government spends on benefits, and the government's official forecaster, the Office for Budget Responsibility, estimated the level would grow to £124bn in 2023-2024.

  Paul Johnson, director of the Institute for Fiscal Studies economic think tank, told the BBC he was not surprised by Mr Hunt's pledge to keep the policy in place due to pensioners being an important voting demographic to the Conservative party.

  But he warned: "It can't go on forever and they need to give an indication to when they want it to stop."

  The rate of price rises in the UK - inflation - has been high in recent years, putting pensioners, as well as working families under financial pressure.

  Inflation has fallen sharply but interest rates are still at a 16-year high after being raised by the Bank of England in recent times to try to slow the pace of consumer prices rising.

  It has made borrowing money on things such as credit cards and mortgages much more expensive for households, but has boosted returns for savers.

  Mr Hunt said the UK was "not there yet" when asked whether the cost-of-living crisis had ended, but added that a fall in interest rates would "make the biggest difference for families up and down the country".

  The Bank of England, which sets rates independently from the government, has held rates at 5.25% five times in a row, but signalled last week cuts are to be made this year, possibly as soon as May.
