title: 'Tory conference: Moment Truss speech interrupted by protesters - BBC News'
date: '2022-10-06'
section: General
url: http://www.bbc.co.uk/news/uk-politics-63143848
content: |-
  Greenpeace campaigners heckle the prime minister a few minutes into her party conference speech.

  Greenpeace campaigners heckled Liz Truss a few minutes into her party conference speech. Holding a banner that read 'Who voted for this, they could be heard shouting: "Who voted for fracking?"

  After they left the hall in Birmingham the prime minister joked that they had arrived too early and would be addressing their issues later in her speech.

  Coverage of Wednesday at the Conservative Party conference
