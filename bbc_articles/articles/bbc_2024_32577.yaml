title: Cumbria schoolboy 'shocked' at strongman victory - BBC News
date: '2024-12-07'
section: Cumbria
url: http://www.bbc.co.uk/news/articles/cn08dr92we4o
content: |-
  Keenan Pearson, 15, from Flimby, weightlifts his way to national glory despite being a novice.

  Keenan Pearson is the first Cumbrian to be crowned British under-17 Strongman Champion

  A schoolboy said he has been left "speechless and shocked" after being crowned Britain's top young strongman, despite only taking up the sport 10 weeks earlier. Fifteen-year-old Keenan Pearson defeated rivals two years older than him to be crowned British Under-17 Strongman Champion. He won the title at in Preston, Lancashire, on Sunday despite going into the event "fearing" he would finish last. The youngster, from Flimby, west Cumbria, said a chance meeting with local Rugby League player Ben Harrison set him on the path to success.

  Pearson beat 14 other challengers in the finals at Kaos Gym, scoring 63 out of 64 to finish five points ahead of the 17-year-old in second place. The sport involves competitors lifting different level weights across five categories. They score points for how "clean" the lift is as well as the actual weight lifted.

  Weighing in at 22 and a half stones (142kg), the teenager can deadlift as much as 39.9 stones (254kg). Speaking on BBC Radio Cumbria after becoming the first Cumbrian to win the national title, he said: "I was speechless, I didn't think I'd win something like this because I'm new to the sport. "I've only been lifting for 10 weeks, and I went to this competition and I'm just really shocked. "Obviously I couldn't have done all of this without my one-to-one coaching with Adam Rumney at the Cumberland Strongman Academy." The teen, who attends Netherhall secondary school in Maryport, is now aiming to win more titles, starting with a charity event this month and the Cumberland Strongest Man competition in March. He is also aiming to compete at the Scotland Strongest Man championships next year. Mark Bailey, deputy headteacher of Netherhall, said the school is "incredibly proud" of Keenan. He said: "When I caught up with him the first thing he said was how grateful he was for the support he gets from his mum and dad. "He's a hugely impressive young man whose physical stature is matched by his character and commitment to all he undertakes."
