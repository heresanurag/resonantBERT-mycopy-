title: Championship play-off final rail disruption due to 'train faults' - BBC News
date: '2025-05-24'
section: England
url: http://www.bbc.co.uk/news/articles/crljzzykj50o
content: |-
  Sheffield United and Sunderland fans are warned about "extremely busy" trains and potential cancellations.

  In an update on Saturday afternoon, LNER said the faults had caused a couple of cancellations

  Football supporters travelling to Wembley for the Championship play-off final were warned of delays or cancellations due to a series of train faults. On Saturday morning, LNER said it was experiencing "major disruption" to services due to several trains requiring repairs on the East Coast Main Line. Sheffield United and Sunderland compete for a place in the Premier League this afternoon, with the game kicking off at Wembley at 15:01 BST. In an update at 13:00, LNER said the faults had caused a couple of cancellations but the majority of services were now running smoothly.

  Lumo services between Edinburgh and King's Cross are also impacted. Passengers on cancelled journeys can travel on any LNER service, the firm said, or use their tickets on routes operated by other rail firms., external Earlier this week, Sheffield United supporters were warned about planned bank holiday rail engineering works also impacting journeys.

