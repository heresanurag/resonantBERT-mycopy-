title: 'Coronavirus: Police turn away 1,000 cars in two days - BBC News'
date: '2020-06-04'
section: Wales
url: http://www.bbc.co.uk/news/uk-wales-52929780
content: |-
  Police say many people officers spoke to were from England and thought lockdown rules were the same.

  Dyfed-Powys Police said many of those it stopped were from England and thought lockdown restrictions were the same in Wales

  Police turned away more than 1,000 cars from one beauty spot in just two days for breaching lockdown rules.

  Dyfed-Powys Police said many people officers spoke to in the Brecon Beacons were from England who said they did not know about Wales' different rules.

  The force's commissioner has said the UK government "hasn't been all that clear" on the differences.

  Supt Steve Davies said fines were issued if people had "clearly flouted the rules".

  The force said many of those stopped at the weekend claimed they thought the rules in Wales were the same as in England and came from as far afield as London and the Midlands.

  Police said they were kept busy due to the volume of people trying to drive to the area around Ystradfellte, Powys, known as "waterfall country".

  The force, which covers some of Wales' most rural areas, also said 72% of people reported for breaches of Covid-19 restrictions in Powys since 27 March had been from outside the force area.

  Dafydd Llywelyn, Dyfed-Powys Police and Crime Commissioner, told BBC Radio Wales that the "majority" of people had listened to advice to stay local.

  But he concluded the number of people breaking the rules was "not surprising".

  "We have people travelling from Cardiff and the valleys into the force area. We also are getting people coming across the border," he said.

  "In the first instance the police are trying to educate those coming across the border because the message from the central government hasn't been all that clear."

  A UK government spokesman said it had been "absolutely clear" that people should check and follow local guidance when travelling between different parts of the UK.

  "Our analysis shows that this message has been received clearly and is helping to tackle coronavirus," he added.

  Dafydd Llywelyn says he "felt sorry" for people who did not know the rules were different in Wales

  Mr Llywelyn added he "felt sorry" for people who did not know the rules were different in Wales because it is often "impossible" for officers to do anything other than issue a fine.

  Supt Davies added: "Our officers have worked hard to engage with the public at every opportunity throughout these unprecedented times by explaining what we are doing and why, and encouraging people to make the best choices to protect public health in Wales.

  "But where people have clearly flouted the rules we have dealt with them appropriately and issued fines."

  He said officers would continue to conduct stop checks throughout Powys and across the force area this weekend.

  Wales' three national parks and all National Trust sites remain closed to the public during the lockdown, although the Brecon Beacons National Park Authority has said parts of the park will open from Monday.
