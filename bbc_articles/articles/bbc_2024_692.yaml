title: 'Watch: Inside Alaska Airlines plane after part blows off mid-air - BBC News'
date: '2024-01-07'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-67900834
content: |-
  Footage from TikTok shows passengers on an Alaska Airlines flight moments after it lost a section of its fuselage.

  Video posted on social media shows the inside of a plane moments after it lost a section of its fuselage mid-flight.

  Passengers can be seen on board the Alaska Airlines aircraft, which was carrying 177 people, using emergency oxygen masks but staying remarkably calm.

  The flight was forced to make an emergency landing in the US state of Oregon and the US Federal Aviation Agency said the plane "returned safely... after the crew reported a pressurisation issue".

  Alaska Airlines has since grounded all 65 of its Boeing 737 Max 9 aircraft.
