title: TV actor Will Mellor criticises Post Office boss - BBC News
date: '2024-01-08'
section: General
url: http://www.bbc.co.uk/news/uk-england-manchester-67916492
content: |-
  The Mr Bates vs The Post Office star accuses senior Post Office figures of "ruining people's lives".

  Actor Will Mellor has criticised the boss of the Post Office for a lack of "humanity" during the scandal.

  The Mr Bates vs The Post Office actor, who played one of the victims in the ITV1 drama, hit out at former Post Office CEO Paula Vennells and other key figures "who were ruining other people's lives".

  Mr Mellor, originally of Stockport, Greater Manchester, said in a BBC Radio Manchester interview: "I don't know how she slept at night."

  He also supported a petition which has called for her to be stripped of her CBE.

