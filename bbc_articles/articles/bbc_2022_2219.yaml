  Kurt Zouma: West Ham boss David Moyes says defender available for Leicester City game Last updated on .From the section West Ham

  Zouma will get some help - Moyes West Ham boss David Moyes says Kurt Zouma is available for Sunday's game at Leicester amid the controversy of the defender being filmed kicking his cat. Animal charity the RSPCA has removed the 27-year-old's two cats as they investigate the incident. Moyes was criticised for picking Zouma against Watford on Tuesday after the video of the defender emerged. "There are different views whether he should be available. We decided he should. I stand by that," said Moyes. Zouma has been fined the maximum amount possible by the Hammers, with the club "currently in the process of identifying the appropriate animal welfare charities" to benefit from the funds. "I don't think a club could have taken action any quicker than they've done at the moment. West Ham have done a really good job," added Moyes. "I'm not condoning him, his actions were terrible. They were diabolical but we've chosen to play him and we stand by that. "He's incredibly remorseful. Like everybody else, in life sometimes you need a bit of forgiveness. He's hoping he is forgiven for a bad action. "We will get him some help. We are trying to do as much as we can as a club, as a team, to help him. "Like people who maybe have drink-driving offences, most of them have to go to classes to learn the reasons and the damage that can be done. "I think RSPCA are going to provide us some courses for Kurt to understand about animals and how to treat them." However, the RSPCA said in a statement on Saturday that "there have been no plans made for animal welfare courses to be undertaken". It added: "Our focus remains entirely on our experienced officers carrying out a full and thorough investigation." The RSPCA said it has also "not been offered or accepted a donation". The video also showed Zouma slapping his cat and was reportedly filmed by his brother Yoan. Yoan is at Dagenham & Redbridge, who have said he will not play for the National League club until the conclusion of an RSPCA investigation. The fallout from the incident has resulted in German sportswear firm Adidas ending its deal with the Hammers player. West Ham sponsor Experience Kissimmee has also ended its deal with the club, while Vitality, another sponsor, has suspended its contract with the club. The Hammers signed Zouma for £29.8m from Chelsea in August 2021 and he has helped them to fourth place going into the game against the Foxes. "I've never had [an incident] like this. As a football manager it shows you never know what you're going to get," said Moyes. "That's part of being in this job. We'd rather we weren't making news. West Ham have made really, really good news in the last two years. "We've a really good side. I'm sad the focus has been taken away from what is, at the moment, a really good season."
