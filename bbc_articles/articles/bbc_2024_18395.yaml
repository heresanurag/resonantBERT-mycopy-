  The Martian surface has evidence of ancient rivers and lakes etched into it

  The Insight probe was only able to record directly from the crust beneath its feet, but the researchers expect that there will be similar reservoirs across the planet. If that is the case, they estimate that there is enough liquid water on Mars to form a layer across the surface that would be more than half a mile deep. However, they point out, the location of this Martian groundwater is not good news for billionaires with Mars colonisation plans who might want to tap into it. "It's sequestered 10-20km deep in the crust," explained Prof Manga. "Drilling a hole 10km deep on Mars - even for [Elon] Musk - would be difficult," he told BBC News. The discovery could also point to another target for the ongoing search for evidence of life on Mars. "Without liquid water, you don't have life," said Prof Manga. "So if there are habitable environments on Mars, those may be now deep underground."
