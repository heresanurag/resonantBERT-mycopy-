title: 'Mars water: Liquid water reservoirs found under Martian crust - BBC News'
date: '2024-08-12'
section: Science & Environment
url: http://www.bbc.co.uk/news/articles/czxl849j77ko
content: |-
  Studies of quakes detected from the planet's surface found it in the planet's rocky outer crust.

  The discovery comes from analysis of data from Nasa's Insight lander, which took a seismometer to Mars

  Scientists have discovered a reservoir of liquid water on Mars - deep in the rocky outer crust of the planet. The findings come from a new analysis of data from Nasa’s Mars Insight Lander, which touched down on the planet back in 2018. The lander carried a seismometer, which recorded four years' of vibrations - Mars quakes - from deep inside the Red Planet. Analysing those quakes - and exactly how the planet moves - revealed "seismic signals" of liquid water.

  The Insight mission set out to investigate the evolution of rocky planets, including Earth and Mars

  While there is water frozen at the Martian poles and evidence of vapour in the atmosphere, this is the first time liquid water has been found on the planet. The findings are published in the Proceedings of the National Academy of Sciences, external. Insight's scientific mission ended in December 2022, after the lander sat quietly listening to "the pulse of Mars" for four years. In that time, the probe recorded more than 1,319 quakes. By measuring how fast seismic waves travel, scientists have worked out what material they are most likely to be moving through. "These are actually the same techniques we use to prospect for water on Earth, or to look for oil and gas," explained Prof Michael Manga, from the University of California, Berkeley, who was involved in the research. The analysis revealed reservoirs of water at depths of about six to 12 miles (10 to 20km) in the Martian crust. “Understanding the Martian water cycle is critical for understanding the evolution of the climate, surface and interior,” said lead researcher Dr Vashan Wright, from UC San Diego’s Scripps Institution of Oceanography. Prof Manga added that water was "the most important molecule in shaping the evolution of a planet". This finding, he said, answers a big question of "where did all the Martian water go?". Studies of the surface of Mars - with its channels and ripples - show that, in ancient times, there were rivers and lakes on the planet. But for three billion years, it has been a desert. Some of that water was lost to space when Mars lost its atmosphere. But, said Prof Manga, here on Earth, "much of our water is underground and there's no reason for that not to be the case on Mars too".

