title: Top London surgeon tackles Covid 'vaccine hesitancy' in minority communities
  - BBC News
date: '2021-02-06'
section: General
url: http://www.bbc.co.uk/news/health-55955875
content: |-
  Martin Griffiths is working hard to get more people from ethnic minority communities vaccinated.

  A leading surgeon whose work includes helping knife crime victims has a new mission - tackling Covid "vaccine hesitancy" in ethnic minority communities.

  Martin Griffiths is taking part in a vaccination programme at the Royal London Hospital.
