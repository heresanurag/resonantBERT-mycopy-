title: 'Donald Trump tells America: ''I''m starting to feel good'' - BBC News'
date: '2020-10-04'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-54405733
content: |-
  President Trump says "I'm starting to feel good," a day after being taken to hospital.

  President Trump says that when he came to a military hospital near Washington for coronavirus treatment a day ago, he was not feeling well, but now felt much better.

  He said the next few days would be the real test.

  Read more: Trump says he is doing well, but next couple of days the 'real test'
