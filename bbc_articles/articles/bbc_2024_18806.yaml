title: 'Smarden: First Ukrainian lion arrives at the Big Cat Sanctuary - BBC News'
date: '2024-08-16'
section: Kent
url: http://www.bbc.co.uk/news/articles/cn47w2r19x2o
content: |-
  Yuna is the first of five lions rescued from the warzone due to make a new home in Kent.

  Yuna, an African lioness, is making a new home in Kent after being rescued from the war in Ukraine

  A Kent animal sanctuary has arranged the rescue of two lions from the war in Ukraine. Lioness Yuna is expected to arrive at the Big Cat Sanctuary in Smarden, near Ashford, on Friday. Rori, a male lion, is expected to join her in a few months, but is being temporarily housed at an animal rescue centre in Belgium while his enclosure in Kent is prepared. The Big Cat Sanctuary plans to rescue a total of five lions from their previous homes in Ukraine, but needs to raise a total of £500,000 to do so.

  Three-year-old Yuna had been kept with another lion near Kyiv, and was traumatised when debris from a missile attack landed 300m (984ft) from their small enclosure. Rori, also three, had been kept as part of a private menagerie which was disbanded after the Russian invasion, and may have been used for illegal breeding.

  Yuna's journey from Ukraine to Kent took a total of four days

  The operation to bring the two lions to the UK has taken months to plan alongside the International Fund for Animal Welfare, and the journey has taken four days to complete, travelling through six countries. Cam Whitnall from the Big Cat Sanctuary said: “It’s been a huge effort from everyone involved. We have worked night and day for many months for this very moment and we can’t wait to get them to their forever home now here at the sanctuary.”

  Rori, the male lion, is temporarily living in Belgium

  The other lions scheduled to be brought to the sanctuary are Vanda, a one-year-old female being kept as a pet in south-eastern Ukraine, and Ama and Lira, also one and thought to have been bred illegally. So far £300,000 of the £500,000 needed for the project has been raised after an appeal was launched in May.

