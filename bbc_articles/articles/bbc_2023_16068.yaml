title: Armed police arrest Cambridgeshire double murderer on motorway - BBC News
date: '2023-10-23'
section: General
url: http://www.bbc.co.uk/news/uk-england-cambridgeshire-67196871
content: |-
  Stephen Alderton, who shot dead a father and son, was stopped in a motorhome on the M5.

  The moment a double murderer was stopped and arrested by armed police on a motorway was caught on camera.

  Video shows Stephen Alderton, 67, of no fixed address, emerging from a motorhome pulled over on the M5 near Worcester in March 2023.

  He was jailed for a minimum of 25 years after admitting shooting dead father and son Gary Dunmore, 57, and Josh Dunmore, 32, at separate properties in two Cambridgeshire villages in March.

  Cambridge Crown Court heard the murders - described by a judge as an "execution" - came two days after a family court hearing.
