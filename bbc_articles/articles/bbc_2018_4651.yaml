  The Department for Transport said the additional regulation would be unnecessary and burdensome on small businesses.

  It added employers should encourage employees to notify them of any change in their driving status.

  A spokeswoman added: "This is a tragic case and our sympathies are with the friends and families of the eight victims involved."

  Last month Masierak, from Evesham, was jailed for 14 years for causing death by dangerous driving, while Wagstaff, of Stoke-on-Trent, was sentenced to 40 months in prison after pleading guilty to causing death by careless driving.
