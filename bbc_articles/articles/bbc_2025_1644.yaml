title: 'Newspaper headlines: ''Hounded to her death'' and ''Don''t be fooled by Putin''
  - BBC News'
date: '2025-02-20'
section: The Papers
url: http://www.bbc.co.uk/news/articles/c9wpkv8pwllo
content: |-
  A mix of stories lead Friday's newspaper front pages, including the latest in the rift between the US and Ukraine.

  'Hounded to her death' and 'Don't be fooled by Putin'

  Now for a look at the papers, and the Daily Telegraph highlights, external French President Emmanuel Macron's pledge to challenge Donald Trump to "stand up to Russia" when he visits Washington next week. The French president says that, on the issue of Ukraine, he will tell Trump that "his interests are the same as ours". But the Telegraph's editorial column argues, external that European countries need to wake up to President Donald Trump's policies - and accept that relying on America for security "is no longer a viable approach". The opinion column in the i newspaper argues that Sir Keir Starmer is facing a "tricky high-wire act", in his forthcoming talks with Trump. Standing with Ukraine and European allies, while remaining on the right side of the US president is, it believes, an "enormous and possibly impossible task". The Financial Times says, external the US is "threatening to derail a traditional show of unity" on Ukraine, from the G7 group of leading economies. The paper explains that the G7 nations are due to publish a joint statement supporting Kyiv on 24 February, the third anniversary of Russia's invasion. But it says Washington is against calling Moscow the "aggressor". There is a picture on the front of the Guardian, external of distraught Israelis who gathered yesterday at Hostage Square in Tel Aviv, for the return of the bodies of those who died while being held in Gaza. The paper was published before Israel said late last night that one of the four coffins Hamas handed over contained the remains of an unidentified person, and not those of hostage Shiri Bibas. The Daily Mail accuses, external Hamas of "evil of a different order", for parading the coffins in front of cheering crowds.

  The Express leads, external on the inquest into the death of Gunner Jaysley Beck, the soldier who took her own life after reporting that she had been harassed and abused by more senior colleagues. The headline is a quote from Gunner Beck's mother: "No apology will ever bring our daughter back." In its opinion column, the paper calls for "major reform" so that armed forces personnel who are targeted by predators can speak out and be protected, without fear that their careers could suffer. Under the headline "conduct unbecoming", the leader in the Times states, external that "the British Army has a problem with women" suggesting that despite numerous inquiries, it still fails to provide them with a consistently safe working environment. And the paper warns that misogyny also "rears its head" in both the Navy and Air Force. The Mail warns, external that artificial intelligence poses a threat to the UK's creative industries. It's concerned about possible changes to the law, that would allow tech firms to use online material such as text, images or music, to improve AI models. Finally, as the Broccoli family hands the James Bond film franchise to Amazon, a few papers take this as a licence to dust off the 007 puns. "Will the Skyfall in?" asks the Mirror., external The Express, external goes for: "Shaken and stirred". The Times, external comes up with: "We were not expecting this, Mr Bond." But the winner has to be the Sun,, external with: "No Prime to die".

