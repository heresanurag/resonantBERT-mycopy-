  The crew of the Argos Georgia took to life rafts when it started taking on water on Monday.

  Nine dead after Spanish fishing boat sinks off Falklands

  Nine people have died and four more are missing after a Spanish fishing boat sank in the South Atlantic Ocean. The 27-member crew abandoned the Argos Georgia and took to life rafts when it started taking on water on Monday, about 200 nautical miles off the coast of the Falkland Islands. Pedro Blanco, the Spanish government's representative in the north-western region of Galicia, said that 14 of those on board had survived. Officials on the Falklands confirmed that nine bodies had been recovered and that a decision had been taken to stop search and rescue efforts.

  The government of the Falkland Islands - a British overseas territory - said it had taken into account the weather conditions and safety of those involved. A further recovery effort would be made to find those missing "as soon as this is practicable". It had earlier described conditions in the South Atlantic as "extremely challenging", including gale-force winds and waves reported to be 8m (26ft) high. A military helicopter earlier abandoned search and rescue operations because of the sea conditions and the distance from land. It had returned to the Falklands to refuel, but had to suspend its mission because of the deteriorating weather. The Spanish government said 10 of the crew were from Spain, eight were Russians, five were from Indonesia and the others were from Uruguay and Peru. Falkland Islands officials sent their thoughts and condolences to all the families involved. Two of the Spanish crew died and another two were among the missing, according to Pedro Blanco, who said the four were all from Galicia. Those rescued would be brought to Port Stanley for treatment in hospital, officials said. Thirteen of the survivors were being brought back to port on the patrol vessel Lilibet while another was on board the fishing boat Robin M Lee, which, like the Argos Georgia, is based in Galicia. The Argos Georgia had left Port Stanley on Sunday night heading for fishing grounds, according to ship tracking website Marine Traffic. Argos Froyanes, the fishing company which owns the longliner, declined to comment on the incident. Spanish reports suggest it had unloaded its cargo at Port Stanley and had returned to resume fishing when the boat's hull began to leak, leading to what officials called "uncontrolled flooding". A distress call was put out on Monday afternoon, prompting an air and sea rescue co-ordinated by the UK Coastguard, the British military, the governments of the Falklands and South Georgia. The crew took to life rafts and, hours later, the boat went down.
