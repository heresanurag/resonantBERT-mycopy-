title: Wolf Hall author Hilary Mantel dies aged 70 - BBC News
date: '2022-09-23'
section: Entertainment & Arts
url: http://www.bbc.co.uk/news/entertainment-arts-63007307
content: |-
  Dame Hilary Mantel, author of the best-selling Wolf Hall trilogy, has died aged 70, her publisher says.

  Two of the three books in Dame Hilary's Wolf Hall trilogy won the Booker Prize

  Dame Hilary Mantel, author of the best-selling Wolf Hall trilogy, has died aged 70, her publisher has confirmed.

  She won the Booker Prize twice, for 2009's Wolf Hall, the first in the Thomas Cromwell series, and its 2012 sequel Bring Up the Bodies.

  In a statement, her publisher said: "We are heartbroken at the death of our beloved author, Dame Hilary Mantel.

  "Our thoughts are with her friends and family, especially her husband, Gerald.

  "This is a devastating loss and we can only be grateful she left us with such a magnificent body of work."

  HarperCollins said Dame Hilary had died "suddenly yet peacefully" on Thursday, surrounded by family and friends, after suffering a stroke.

  Wolf Hall was a fictional account of Thomas Cromwell's rise to power in the court of Henry VIII.

  The third and final book in the series, The Mirror and the Light, was published in 2020 to much critical acclaim, became a fiction best-seller and was longlisted for The Booker Prize 2020.

  The trilogy sold more than five million copies globally and has been translated into 41 languages.

