  Father Christmas had an elfin hand from one of his festive team as he took part in a charity fundraiser.

  Father Christmas has been having an underwater adventure ahead of his busy festive schedule.

  He took part in a charity fundraiser in full scuba kit and had an elfin hand from one of his team.
