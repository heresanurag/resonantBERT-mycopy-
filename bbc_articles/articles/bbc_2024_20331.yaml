title: 'Paralympics: William and Kate send good luck message to GB athletes - BBC
  News'
date: '2024-08-29'
section: UK
url: http://www.bbc.co.uk/news/articles/ce8dgqne45ro
content: |-
  The Prince and Princess of Wales posted on X hours before the Games' opening ceremony in Paris.

  The royal couple said they were looking forward to "another few weeks of incredible sport"

  The Prince and Princess of Wales have sent a good luck message to Great Britain's Paralympians ahead of the start of the Games in Paris. William and Catherine wished athletes "the very best of luck" before the Paralympics opening ceremony tonight. Wheelchair tennis player Lucy Shuker and wheelchair basketball athlete Terry Bywater will be this year's flag bearers for ParalympicsGB. The royal couple said they were looking forward to "another few weeks of incredible sport" after the Olympics was held in the French capital just a few weeks ago. Team GB finished with 65 medals, beating their total from Tokyo by one.

  The medal tally matched the team's total from London 2012 and is the joint-third-highest for Team GB at a single Games behind Rio 2016 and London 1908. William and Catherine said in their message, posted on X: "Looking forward to another few weeks of incredible sport! "Wishing the very best of luck to our Paralympics GB athletes and all those competing at #Paris2024. W & C." The Duke of Edinburgh, patron of the British Paralympic Association and William's uncle, posted a similar message via the Royal Family X account. He shared his congratulations to all athletes on being selected and called on them "to make us proud and to inspire the next generation". At the end of the Olympics, the prince and princess sent a congratulatory video message to athletes. But many who watched the video were unable to focus on much else but the future king's newly grown holiday beard. Catherine is still undergoing cancer treatment but has been seen at more public events recently - including Wimbledon where she received a standing ovation.
