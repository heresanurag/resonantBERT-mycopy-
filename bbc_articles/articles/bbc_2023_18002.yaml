title: Nottinghamshire industrial waste site engulfed in huge fire - BBC News
date: '2023-11-12'
section: General
url: http://www.bbc.co.uk/news/uk-67393756
content: |-
  Video shows huge flames and plumes of grey smoke rising into the sky in Newark.

  Huge flames and plumes of grey smoke could be seen rising into the sky from a blaze at an industrial waste site in Newark on Saturday.

  Nottinghamshire Fire and Rescue Service said it sent six fire engines, a welfare unit and command unit to the scene.
