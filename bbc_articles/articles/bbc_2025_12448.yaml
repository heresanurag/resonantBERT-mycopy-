  How did my MP vote on assisted dying?

  To play this video you need to enable JavaScript in your browser. This video can not be played Watch: How the assisted dying debate played out

  MPs have voted to legalise assisted dying in England and Wales after their final debate on the change in the law. After months of deliberation and scrutiny, the Terminally Ill Adults (End of Life) Bill was backed by 314 votes to 291, a majority of 23. MPs were given a free vote on the issue, meaning parties did not instruct them what to choose. The third reading of the bill was the last opportunity for MPs to approve or reject it.

