title: 'UK heatwave: Hottest day expected with temperatures of 32C - BBC News'
date: '2023-09-04'
section: UK
url: http://www.bbc.co.uk/news/uk-66710496
content: |-
  Temperatures could be as high as 32C on Wednesday, with England health alerts in force until Sunday.

  The hottest day of the year is expected in the next two days, with parts of the UK already in heatwave conditions.

  Areas of West Yorkshire, Cornwall, Devon and Wales passed the threshold on Tuesday, the Met Office said, although Tuesday's hottest temperatures did not pass June's high of 32.2C (90F)

  Heat-health alerts have been upgraded to amber for much of England, with only the North East under a yellow one.

  It means people of all ages could be affected, putting the NHS at risk.

  Met Office meteorologist Amy Bokota said 13 weather stations had officially recorded a heatwave and she expected "a few extra" would be added to that list over the coming days.

  She said 32C was expected on Wednesday before a possible peak of 33C on Thursday.

  "It will then be 32C right the way until Sunday for some places in the south," she said.

  Heatwave criteria are met when a location records a period of at least three consecutive days with daily maximum temperatures meeting the heatwave threshold - which varies between 25C and 28C across the UK.

  How are you coping with the hot weather? Get in touch.

  Hot conditions will be also be felt in Wales, while parts of Scotland and Northern Ireland could see "unseasonably high temperatures".

  English regions included in the amber warning are: London, the South East, the South West, the East and West Midlands, the East, North West and Yorkshire and Humber.

  All eight were issued with a yellow warning on Monday but this has now been upgraded.

  The North East is the last remaining region to have a yellow alert in place - this means that the elderly and those with pre-existing health conditions should take extra care.

  It also means officials do not believe there will be a significant impact on the NHS in the area.

