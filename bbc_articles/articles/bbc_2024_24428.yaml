title: Rogers double as England U21s beat Austria in friendly - BBC Sport
date: '2024-09-09'
section: General
url: http://www.bbc.co.uk/sport/football/live/c99087xv1ndt
content: |-
  Aston Villa forward Morgan Rogers scores twice as England Under-21s beat Austria in a friendly at Kenilworth Road.

  Aston Villa forward Morgan Rogers scored twice as England Under-21s beat Austria in a friendly at Kenilworth Road.

  Rogers got his first in the 25th minute when he confidently fired home from the penalty spot to give the Young Lions the lead.

  However, Austria equalised 10 minutes later through midfielder Thierno Ballo.

  But Rogers finished off a fine move four minutes into the second half to regain the lead for England in Luton.

  Manchester City midfielder James McAtee then got his side's third with a fine first-time strike from inside the box, before West Bromwich Albion forward Tom Fellows wrapped up the win by tapping in for his first international goal.

  With Lee Carsley temporary manager of the senior side, Ben Futcher was in the England dugout once again.

  He was in charge as England drew 0-0 with Northern Ireland in European Under-21 Championship qualifying on Friday.
