content: |-
  Watch: Radiohead's Thom Yorke responds to heckler shouting about Gaza

  Radiohead's Thom Yorke briefly left a stage in Melbourne after being heckled by a man who was shouting about deaths in Gaza.

  The protester had called on Yorke to condemn the violence there.

  Footage captured by a concert-goer shows Yorke's response to the man before he walks off stage.
