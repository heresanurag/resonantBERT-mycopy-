title: Men spotted 'snow canoeing' in Bere Regis - BBC News
date: '2018-03-01'
section: General
url: http://www.bbc.co.uk/news/uk-england-dorset-43246244
content: |-
  Two men were spotted on a canoe being towed through the snowy streets of Bere Regis in Dorset.

  Two men have been spotted "snow canoeing" in rural Dorset.

  A BBC cameraman filmed the pair as they were towed by a 4x4 through the streets of Bere Regis.
