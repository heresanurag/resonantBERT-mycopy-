title: 'Tony Eastlake: Man accused of flower seller''s murder in court - BBC News'
date: '2021-06-02'
section: London
url: http://www.bbc.co.uk/news/uk-england-london-57335125
content: |-
  James Peppiatt is charged with the murder of Tony Eastlake, who was stabbed near his stall.

  Tony Eastlake was stabbed to death in Islington on Saturday afternoon

  A man has appeared in court charged with murdering a flower seller who was stabbed close to his stall in north London.

  Tony Eastlake, 55, died at the scene after he was stabbed on Essex Road in Islington on Saturday afternoon.

  The case was sent to the Old Bailey where Mr Peppiatt is due to appear on Monday.

  A 48-year-old woman has also been arrested on suspicion of assisting an offender and perverting the course of justice.

  She was taken to a police station in north London, where she was bailed to return later in the month.

