id: bbc_2017_1556
title: Donald Trump praises UK's Brexit decision - BBC News
date: '2017-01-16'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-38632439
content: |-
  US President-elect Donald Trump says the UK is "doing great" following the decision to leave the EU.

  His comments came as the Chancellor, Phillip Hammond, told a German newspaper that the UK wouldn't "lie down," if access to the single market was closed off during Brexit negotiations.
