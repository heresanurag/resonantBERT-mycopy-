  Your player ratings out of 10 for Tunisia v England in the World Cup group match.

  Last updated on .From the section World Cup

  Harry Kane's late heroics in England's 2-1 win over Tunisia secured him top spot in your player ratings, scoring 7.09. Wing-back Kieran Trippier came closest to matching his Spurs team-mate with 6.93.
