title: 'Gaynor Lord: Body shows no signs of suspicious death - BBC News'
date: '2023-12-16'
section: Norfolk
url: http://www.bbc.co.uk/news/uk-england-northamptonshire-67738644
content: |-
  The body of a woman found in the River Wensum is expected to be formally identified on Sunday.

  Store cameras showed Gaynor Lord at work shortly before she left

  Post-mortem tests on a body found in the search for missing Gaynor Lord show the cause of death was not suspicious.

  CCTV footage had showed the 55-year-old hurrying through the streets of Norwich just hours before her belongings were found dumped in a park on 8 December.

  A body was found by police divers on Friday and formal identification is expected to take place on Sunday.

  Norfolk Constabulary said the post-mortem examination showed "no signs of third party involvement".

  Ms Lord's family is being supported by specialist officers.

  Specialist divers had been searching the river for three days

  Ch Supt Dave Buckley said: "The post-mortem examination has found no signs that any other parties were involved.

  "Although our searches have concluded, officers are continuing to work to establish the full circumstances surrounding Gaynor's disappearance.

  "We will pursue all lines of enquiry to understand why she went missing.

  "Our thoughts remain with Gaynor's family at this incredibly difficult time."

  Ms Lord was reported missing after failing to return home from Jarrolds department store in Norwich where she worked on a gin counter as a retail assistant.

  This video can not be played To play this video you need to enable JavaScript in your browser.

  CCTV footage showed her leaving work more than an hour earlier than expected before hurrying through the city on foot.

  She spent 33 minutes in the grounds of Norwich Cathedral before heading in the direction of Wensum Park via St Augustines Street.

  Moments later, a member of the public reported seeing a woman matching Ms Lord's description in the park doing a "yoga pose".

  Wensum Park was closed while the searched were carried out and has since reopened.

  A friend of Ms Lord told the BBC she received two calls from her on the day she disappeared - one which had to be cut short at about 14:15 GMT; the second, a "pocket call" at about 16:15.

  Julie Butcher said she"feels terrible" after cutting the conversation short to take a work call and was unable to reach her after that.

