title: Man held after London acid attack on schoolgirl Teagan McFarlane bailed - BBC
  News
date: '2024-10-06'
section: London
url: http://www.bbc.co.uk/news/articles/cq5eqnx61g5o
content: |-
  A 14-year-old girl suffered "potentially life-changing" injuries in the attack in London.

  A 35-year-old man arrested on suspicion of causing grievous bodily harm after a suspected acid attack on a girl outside a west London school has been released on bail, police have said. Teagan McFarlane, 14, suffered "potentially life-changing" injuries and needed surgery following the attack on Monday afternoon. A 16-year-old boy was also injured outside Westminster Academy, Westbourne Park, while a staff member was hurt trying to help them. A 14-year-old girl has been arrested and also released on bail, the Metropolitan Police said.

  The arrested man was bailed on Friday pending further enquiries. Police are continuing to appeal for dashcam footage of the incident. Detectives said "a lone man" threw a substance at the teenagers before fleeing on an electric scooter along Harrow Road. Corey McFarlane, Teagan's father, previously said "words could not express the shock, pain, and trauma" his daughter is going through, "both physically and emotionally". He added that she was initially discharged from hospital, but was later readmitted. The 16-year-old boy was treated at hospital and has now been allowed home.
