content: |-
  Chief political correspondent Henry Zeffman looked like he'd seen a ghost on BBC Breakfast.

  The BBC's chief political correspondent Henry Zeffman looked like he had seen a ghost after witnessing former Prime Minister David Cameron walk into Downing Street.

  "I'm a bit tired, but I don't think I've had a funny turn... David Cameron has just walked up the street and gone into 10 Downing Street," Henry Zeffman told BBC Breakfast viewers.

  Shortly after this clip, it was then announced that Mr Cameron was made foreign secretary as Rishi Sunak reshuffles his cabinet.

  The ex-PM's shock return comes after Home Secretary Suella Braverman was sacked following days of speculation over her future.

  Mr Cameron, the former Conservative prime minister, was in office between 2010 and 2016.

