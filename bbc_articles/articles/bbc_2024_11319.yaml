  In February, Iain Packer was convicted of Emma Caldwell’s murder and of multiple rapes and sex assaults. The BBC has seen police statements taken during the murder investigation where multiple women made rape and assault allegations against Packer. They were not acted on at the time and it took nearly 20 years for Packer to be put on trial for his crimes. Allegations were also made against other individuals during the inquiry and not acted on. Nicky, not her real name, worked alongside Emma Caldwell in Glasgow in 2005. She said she tried to report attacks by Iain Packer but was instead held for soliciting. Nicky recalled: "There was twice that I went to Stewart Street to report things, and taken up there by uniformed officers in a car and I’d end up in a cell for a section 46 (for prostitution). "Because I was on the streets working and they’d do nothing else with the rest of the information."

  Iain Packer was jailed for life in February and told he must serve at least 36 years in prison after being found guilty of 33 charges of physical and sexual violence against 22 women

  In February, as well as being convicted of murder, Iain Packer was also found guilty of abducting and attempting to rape Nicky. She said of the police: "They didn't believe us. There's times where I was told it’s your own fault, you’re putting yourself out there - what you’re doing, you know what to expect." After Packer was convicted, Police Scotland Deputy Chief Constable Bex Smith apologised and said Emma Caldwell, her family and many other victims had been "let down by policing in 2005". In an interview with BBC Scotland News, she said: "We did a huge amount of work around understanding the offences that were reported around 2005, and there were many. "We launched a separate operation so that we could understand the offending at that time, and we submitted several reports to the Crown Office in terms of that offending. "Time is no barrier to justice .. and if women feel like they want to come forward and report now, then absolutely it's the time to do that." Who Killed Emma? is available now on BBC Sounds and other podcast platforms This article has been amended to make clear the details of Willie Johnston’s response to the BBC’s questions.
