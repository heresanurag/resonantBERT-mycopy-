title: 'Emma Caldwell: Hundreds of sex attack reports ''dismissed'' by police - BBC
  News'
date: '2024-06-10'
section: Glasgow & West Scotland
url: http://www.bbc.co.uk/news/articles/c2ll4ne4d1eo
content: |-
  A former detective says says 300 rapes and sexual assaults were not dealt with by police during the Emma Caldwell murder investigation.

  Emma Caldwell's body was discovered in remote woods in Lanarkshire in May 2005, five weeks after she was last seen in Glasgow city centre

  Nearly 300 rapes and sexual assaults reported by sex workers during the Emma Caldwell murder investigation were not dealt with by police at the time, a senior officer has confirmed. Police Scotland’s deputy chief constable said an operation had been launched to examine sex offences which were reported around 2005. She said a number of the offences were now being dealt with by the courts. A former detective told the BBC he had received multiple reports of rape when he worked on the murder inquiry. But he said they were “boxed” – marked as irrelevant and not followed up. Willie Johnston, who was in charge of the murder inquiry at the time, declined to answer questions from the BBC about these allegations. He told the BBC he’d be “more than content” to tell his story at the public inquiry. The then Strathclyde Police launched one of its most expensive murder investigations after Emma Caldwell’s body was found in remote woodland in South Lanarkshire in 2005. The 27-year-old had been working as a sex worker in Glasgow, to fund her heroin addiction. About 800 women were working in the city’s red light district at the time and many were interviewed by detectives on the inquiry. A BBC Scotland podcast, Who Killed Emma?, revealed a total of 276 rapes and sexual assaults reported by sex workers during the investigation were not followed up by police.

  Former Detective Sergeant Willie Mason said many reports were "boxed" instead of being followed up

  Former Det Sgt Willie Mason worked on the inquiry in 2005. Mr Mason was based on a bus run by a church group which parked each week in the red light district. He was tasked with gaining the trust of the women who were working on the streets. Mr Mason said the women began reporting attacks to him – sometimes up to five reports on one night. He said: "I would take what was classed as a message from them, and then I would write it up the following day, and put it into the inquiries, saying their name, their age, date of birth, address, where they could be contacted, and saying that a man in a blue car, you know, had attacked her. "Just the basic details that they were telling me. Sometimes they were able to name them, sometimes they weren’t. "It could be anything from a slap in the face to, you know, a rape. "It wasn’t just me that was collecting them. The guys out doing the general leg work, they were putting these reports in as well."
  • None How police missed the chance to catch Emma's killer

  The former detective said questions were raised at briefings with those leading the Emma Caldwell murder inquiry about what was happening with the reports. He said: "But we were told at one point in a daily briefing, a number of daily briefings, when these questions were raised, that this wasn’t a matter for this inquiry team. These would be followed up at a later date, by another team." But Mr Mason said instead of being followed up they were “boxed”. "That’s a police term," he said. "During an inquiry there’ll be filing cabinets, and there’ll be big cardboard boxes which are filing boxes. "And if something’s marked up as irrelevant or not to be followed-up, they’re boxed. "And it’s basically a term that we used in the police for knowing full well nothing else was going to get done about that particular inquiry."

