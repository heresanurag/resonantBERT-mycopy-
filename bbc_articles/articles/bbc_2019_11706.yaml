title: Blind man's injuries 'life threatening' after subway fall in Glasgow - BBC
  News
date: '2019-10-03'
section: Glasgow & West Scotland
url: http://www.bbc.co.uk/news/uk-scotland-glasgow-west-49923699
content: |-
  The man suffers "life-threatening injuries" after falling onto the line at Bridge Street subway station in Glasgow.

  The alarm was raised at Bridge Street station just before midday

  Glasgow's Subway services were suspended for more than three hours after a man was seriously hurt in a fall onto rail tracks.

  British Transport Police said his injuries were "life-threatening" after the incident at Bridge Street station.

  The 32-year-old, who is blind, fell onto tracks with his guide dog just before 12:00.

  He was treated at the scene then taken to the Queen Elizabeth Hospital. The dog was collected by the Scottish SPCA.

  It is now in the care of Guide Dogs UK and was said to be "distressed but unhurt".

  BTP confirmed: "A 32-year-old man has been taken to hospital. At this stage his injuries are believed to be life-threatening. The incident is not being treated as suspicious."

  A spokeswoman for the Scottish Ambulance Service said: "We received a call at 11.59 hours to attend an incident Glasgow's Bridge Street Subway station.

