  "We sent an ambulance, a critical care advanced practitioner, the trauma team and the special operations response team to the scene.

  "One male patient was taken to the Queen Elizabeth Hospital travelling with the trauma team."

  Services on Glasgow Subway were fully operational by about 15:35.

  A Guide Dogs spokesman said: "We are aware of an incident that happened at Bridge Street station. We will be looking into it thoroughly to establish exactly what happened, but our immediate thoughts and concerns are for the welfare of our guide dog owner and their guide dog.

  "Members of Guide Dogs staff have been supporting the guide dog owner's family in hospital, and the guide dog is being examined by a vet before being taken into Guide Dogs' care for the short term."

