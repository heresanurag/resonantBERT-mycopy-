  Laurence Westgaph, who is historian-in-residence at National Museums Liverpool, said: "This gesture by St Nicholas Church records in stone the presence of black people in this town for more than 300 years and at a time when Liverpool's population was less than 10,000 people."

  Following Black Lives Matter demonstrations in the summer, the city's council launched a project to ensure streets named after affluent slavers were given special plaques to explain their links to the trade.

  The city also launched its own Race Equality Taskforce.

