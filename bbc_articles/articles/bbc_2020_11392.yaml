title: Stone marks Liverpool's first recorded black resident - BBC News
date: '2020-10-04'
section: Liverpool
url: http://www.bbc.co.uk/news/uk-england-merseyside-54387940
content: |-
  Records show that the man, known only as Abell, lived in the city in the early 18th Century.

  The stone marks the life of a man, known only as Abell, who died in 1717

  A stone commemorating the first recorded black resident in Liverpool has been unveiled more than 300 years after his death.

  Records show the man, known only as Abell, was buried at St Nicholas' Church on 1 October 1717.

  Thousands of enslaved Africans crossed the Atlantic on Liverpool-registered ships in the 18th Century transatlantic slave trade.

  Written evidence shows there was also a rising population of black residents at the time.

  Much of the city's 18th Century wealth came from the slave trade

  The stone, which marks the anniversary of Abell's funeral and coincides with Black History Month, was unveiled by Councillor Anna Rothery, who became Liverpool's first black lord mayor last year.

  She said: "As a city we are facing up to the grim injustices of our past and, by setting them in their context, we are a better place."

  Hundreds of people joined a Black Lives Matter protest in Liverpool this summer

  More than 12.5m Africans were traded as slaves between 1515 and the mid-19th Century.

  Some two million of the enslaved men, women and children died en route to the Americas.

  Rector of Liverpool, Revd Canon Dr Crispin Pailing, said: "We cannot hide from our past, and there is no institution from this era of our history which is free from the taint of this horrific trade.

  "We cannot give justice to Abell and other enslaved Africans, but we can give them the dignity of naming them when we can, and we can give them status within the history of our city."

