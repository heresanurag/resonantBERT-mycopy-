title: University of Essex students died after car crashed into building - BBC News
date: '2025-02-03'
section: Essex
url: http://www.bbc.co.uk/news/articles/c4g9w7k71mro
content: |-
  Police are appealing to anyone who may have seen a seen black Ford Focus at the time.

  An investigation is taking place to determine what led up to the collision

  Four people who died when a vehicle crashed into a building were students at the University of Essex, police said. Emergency services were called to a "serious crash" on Magdalen Street in Colchester on Saturday at about 04:40 GMT. Makyle Bayley, 22, Eva Darold-Tchikaya, 21, Anthony Hibbert, 24 and Daljang Wol, 22 all died at the scene, Essex Police said. Temporary Assistant Chief Constable Stuart Hooper said the force did not believe any other vehicles were involved and appealed for anyone who had seen a black Ford Focus being driven in the area to come forward.

  Tributes for the students have been left at the scene

  The four students, who died at the scene, had all been inside the car. Mr Hibbert and Mr Wol had been "outstanding members" of the Essex Rebels men's basketball team, the university said. Mr Bayley was a "talented basketball player" and a member of the British Universities and Colleges Sport (BUCS) basketball team. Ms Darold-Tchikaya had multiple roles in the Essex Blades Dance Club and was active in other clubs and societies. Vice-Chancellor at the university, Professor Maria Fasli, said the "whole university is in mourning". "They touched the lives of so many of us at Essex; their friends, classmates, the teams they played for, and the staff with whom they spent time," she said. "These were young lives filled with hope, promise, talent, and dreams for the future. "They all played an active role in our community through clubs and societies and were well-known around the University." Essex Rebels Basketball also paid tribute. A club post on X, external said: "No words can fully express the incredible sadness everyone in the Rebels family is feeling."

  Some buildings on Magdalen Street were being assessed for structural damage

  Magdalen Street was closed throughout the day. Mr Hooper extended his condolences to their friends and families, who specialist officers would be supporting. "Our specialist Serious Collision Investigation Unit is investigating what led up to the collision but at this stage we do not believe any other vehicles were involved," he said. "I again want to thank all the attending emergency services for their efforts to maintain the dignity of those who died and to the community for their support and co-operation."

