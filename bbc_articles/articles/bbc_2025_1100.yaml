title: JD Vance 'misinformed' on Scotland's abortion buffer zones - BBC News
date: '2025-02-15'
section: General
url: http://www.bbc.co.uk/news/videos/c5y61gd0n3zo
content: |-
  Gillian Mackay MSP has criticised the US Vice-President's comments on Scotland's abortion clinic buffer zones.

  US Vice-President JD Vance has criticised Scotland's law enforcing buffer zones around abortion clinics.

  In a speech at the Munich Security Conference he claimed the Scottish government had warned people against private prayer within their own homes.

  Scottish Green MSP Gillian Mackay told BBC Scotland there was misinformation in the remarks and said she will raise the issue with ministers.

  The Scottish government said Vance's claim was "incorrect" and the law was "carefully drafted to capture only intentional or reckless behaviour close to a small number of premises providing abortion services".

  The vice-president also accused most European democracies of retreating from their values and ignoring voter concerns on migration and free speech.
