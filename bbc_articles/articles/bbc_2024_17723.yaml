title: Cash machine appears on side of Sonning Bridge - BBC News
date: '2024-07-07'
section: England
url: http://www.bbc.co.uk/news/articles/c4ng03jg4jyo
content: |-
  After a phone, a postbox, and a door, artist Impro installs a cash machine on Sonning Bridge.

  A phone, a postbox, a door - artist Impro has made Berkshire's Sonning Bridge his canvas over the years. And now his latest confounding creation has been revealed. As well as the phone, postbox and door, Impro's other work has included a large Google Maps pin at Playhatch Roundabout.

  Regarding the cash machine, he said: "Banks have reacted to complaints about branch closures and accessibility by opening cashpoints on river bridges for boaters within minutes of Keir Starmer walking into No 10. "The first is on Sonning Bridge."

  Little personal information is known about Impro, other than he lives in Oxfordshire. In a rare interview with the BBC in 2014, he said his art was inspired by his belief that people are encouraged to take life seriously "despite the fact that it's absurd and tragic". His postbox work drew international attention when it caught the eye of famous spoon-bender Uri Geller. Mr Geller said: "I have never seen anything like this anywhere in the world. It's a new one on me."

  Uri Geller was left confused about a previous art installation on the bridge

