title: 'Japan election: Ruling LDP to fall short of majority - exit poll - BBC News'
date: '2024-10-27'
section: Asia
url: http://www.bbc.co.uk/news/articles/c8xpev42g78o
content: |-
  The prime minister announced a snap election despite voter apathy and low approval ratings.

  Japan's ruling party loses its majority in blow to new PM

  The election was called by the LDP’s new leader Shigeru Ishiba before he had been officially sworn in as prime minister

  The coalition led by Japan’s ruling Liberal Democratic Party (LDP) has lost its majority in parliament, its worst result for over a decade. Opposition parties secured more than half the seats in the lower house, provisional election results showed. With 22 seats left to declare, the LDP and its coalition partner, the much smaller Komeito, had gained 208 seats to the opposition's 235. A party needs a majority of 233 seats in the lower house of Parliament, the Diet, to govern alone.

  The result of the general election has triggered uncertainty about how the world's fourth-largest economy will be governed. The largest opposition party, the Constitutional Democratic Party (CDP), had won 143 seats at around 02:00 JST (17:00 GMT), according to NHK. The election was called by the LDP’s new leader Shigeru Ishiba three days after he was selected as new leader, before he had been officially sworn in as prime minister. "Voters have handed us a harsh verdict and we have to humbly accept this result," he told NHK. It comes after a tumultuous few years for the LDP which saw a “cascade” of scandals, widespread voter apathy and record-low approval ratings. The party had seen approval ratings of below 20% earlier in the year, in the wake of a political fundraising corruption scandal. Yet opposition parties have failed to unite, or convince voters they are a viable option to govern. The main opposition party had an approval rating of just 6.6% before parliament was dissolved. “It is so hard to make decisions to choose parties, I think people are losing interest,” Miyuki Fujisaki, a long-time LDP supporter who works in the care-home sector, told the BBC ahead of polls opening. The LDP, she said, has its problems with alleged corruption, “but the opposition also does not stand out at all”. “They sure complain a lot, but it’s not at all clear on what they want to do,” the 66-year-old said. For all the apathy, politics in Japan has been moving at a fast pace in recent months. Shigeru Ishiba took over as prime minister after being voted in by the ruling party following his predecessor Fumio Kishida - who had been in the role since 2021 – making a surprise decision to step down in August. The move to call the election came at a time when the LDP is desperate to restore its tarnished image among the public. Ishiba - a long-time politician who previously served as defence minister - has described it as the “people’s verdict”. A series of scandals has tarnished the ruling party’s reputation. Chief among them is the party’s relationship with the controversial Unification Church - described by critics as a “cult” - and the level of influence it had on lawmakers. Then came the revelations of the political funding corruption scandal. Japan’s prosecutors have been investigating dozens of LDP lawmakers accused of pocketing proceeds from political fundraising events. Those allegations - running into the millions of dollars - led to the dissolution of powerful factions, the backbone of its internal party politics. “What a wretched state the ruling party is in,” said Michiko Hamada, who had travelled to Urawa station, on the outskirts of Tokyo, for an opposition campaign rally. “That is what I feel most. It is tax evasion and it’s unforgivable.”

  It strikes her as particularly egregious at a time when people in Japan are struggling with high prices. Wages have not changed for three decades – dubbed “the lost 30 years” – but prices have risen at the fastest rate in nearly half a century in the last two years. This month saw more price hikes on thousands of food products, as well as other day-to-day provisions like mail, pharmaceuticals, electricity and gas. “I pay 10,000 yen or 20,000 yen ($65 - $130; £50 - £100) more for the food per month (than I used to),” Ms Hamada said. “And I’m not buying the things I used to buy. I am trying to save up but it still costs more. Things like fruit are very expensive.” She is not the only one concerned with high prices. Pensioner Chie Shimizu says she now must work part-time to make ends meet. “Our hourly wage has gone up a bit but it does not match the prices,” she told the BBC as she picked up some food from a stand at Urawa station. “I come to places like this to find something cheaper and good because everything in regular shops is expensive.”
