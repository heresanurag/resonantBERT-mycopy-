title: Teenage hillwalker found safe after search in Highlands - BBC News
date: '2023-08-13'
section: Highlands & Islands
url: http://www.bbc.co.uk/news/uk-scotland-highlands-islands-66492795
content: |-
  The police, coastguard, and mountain rescue teams had been searching for Isaac Johnson.

  A 17-year-old hillwalker reported missing overnight on a walking trip in the Highlands has been traced safe and well, say police.

  Isaac Johnson had set off at lunchtime on Saturday from Glen Moidart in Lochaber, but did not return as planned.

  Mountain rescue teams, the coastguard and police were involved in the search.

  Police said on Monday morning the teenager had been found.

