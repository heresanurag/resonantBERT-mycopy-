id: bbc_2018_2060
title: Cheers and song as Ramaphosa elected South Africa president - BBC News
date: '2018-02-15'
section: General
url: http://www.bbc.co.uk/news/43075328
content: |-
  ANC MPs and supporters burst into song after Cyril Ramaphosa became South Africa's new president.

  There were joyous scenes in the South African parliament as Cyril Ramaphosa was elected unopposed to be the new president of the country.

  ANC MPs and supporters burst into song after the announcement.

  Mr Ramaphosa, 66, became president after the embattled Jacob Zuma resigned facing numerous corruption allegations, which he denies.
