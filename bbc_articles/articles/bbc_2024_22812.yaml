title: 'Mohamed Al Fayed: Five things we learnt from press conference - BBC News'
date: '2024-09-22'
section: UK
url: http://www.bbc.co.uk/news/articles/c98137yl092o
content: |-
  From threats to fear and sexual health checks, lawyers alleged systematic abuse of dozens of women.

  What we learned from Fayed sex abuse press conference

  Mohamed Al Fayed was a "monster" who threatened his sexual abuse victims to stay silent, lawyers representing former Harrods employees told a news conference on Friday. Giving harrowing details of what is alleged to have taken place, the legal team and one of Fayed's many alleged victims recounted how the former owner of Harrods used his power to force himself on women, had them followed and made them have sexual health checks. The legal team representing 37 women who say they were sexually assaulted or raped by the late billionaire spoke publicly to outline how the former Harrods boss used "his wealth and power to manipulate and control victims". Here are five things we learned. Warning: this story contains details some may find distressing.

  Fayed was a "serial sexual abuser" whose abuse was "constant and repetitive" over 25 years, barrister Dean Armstrong KC said. "I have many years of practice... I have never seen a case as horrific as this," he told the news conference. "This case combines some of the most horrific elements of the cases involving Jimmy Savile, Jeffrey Epstein and Harvey Weinstein. "Savile because in this case, as in that, the institution, we say, knew about the behaviour", Mr Armstrong continued. "Epstein because in that case, as in this, there was a procurement system in place to source the women and girls. As you know, there are some very young victims. "And Weinstein, because it was a person at the very top of the organisation who was abusing his power. "We will say plainly, Mohammed Al Fayed was a monster."

  Not only was Fayed a "monster", but "he was a monster aided by an institution", Mr Armstrong alleged of Harrods, the upmarket London department store owned by the billionaire between 1985 and 2010. He claimed it was "simply not true" that Harrods did not know of the allegations until 2023. Mr Armstrong told the news conference that "systematic abuse" was known of "well before this". "Those who controlled Harrods knew about Mohamed Al Fayed's inappropriate behaviour", he said, adding that choosing to only address the claims now was an "insult" to the "brave" survivors. "We are here to say publicly and to the world, or to Harrods in front of the world, that it is time that they took responsibility, and it is time that they set matters right, and that is something they should do as soon as possible. "They need to face up to accept the responsibility, that they have full culpability for the abuse that these women suffered. "Today, we are going to set out our claim and how our claim shows an abject failure of corporate responsibility and a failure to provide a safe system of work." Following the news conference, Harrods - which has been under new ownership since 2010 - said it was "utterly appalled by the allegations of abuse perpetrated by Mohamed Al Fayed. "These were the actions of an individual who was intent on abusing his power wherever he operated and we condemn them in the strongest terms. "We also acknowledge that during this time his victims were failed and for this we sincerely apologise. We are doing everything we can to fix this." The company said it is a "very different organisation" now and "seeks to put the welfare of our employees at the heart of everything we do". The department store's new owners have a compensation scheme for ex-employees who say they were attacked by Fayed, which is separate to the legal action being taken by some accusers. Harrods has already reached financial settlements with the majority of people who have approached them since 2023, and has had new inquiries this week. Harrods is accepting vicarious liability for the actions of Fayed, and there are no non-disclosure agreements attached to the settlements. "While we cannot undo the past, we have been determined to do the right thing as an organisation, driven by the values we hold today, while ensuring that such behaviour can never be repeated in the future", it added.

  The legal team representing 37 women, and Natacha - second from right - who told the press conference Fayed attacked her

  Fayed's victims were told they would "never work in London again" and "we know where your family live", to stop them from speaking out, barrister Maria Mulla told the news conference. She gave the example of a woman who wrote a formal complaint to Harrods after allegedly being sexually assaulted by Fayed. Ms Mulla said on the same day the complaint was made, the head of security told the victim: "'You are a girl, alone in London, someone could jump out the bushes at you or you could have a sudden accident. "'You need to deny what you said in the first letter in a second letter which you must drop off before noon on the following day.'" Not only were they threatened, but women who made complaints to Harrods were "often demoted" and "false accusations made against them so that they had no choice at all but to leave Harrods", Ms Mulla alleged. Another example she gave was of a woman who wanted to resign after being sexually assaulted and suffering from degrading behaviour. Ms Mulla said the woman was called into an office by the head of security, told she had been "disloyal and had to resign immediately", and that that if she ever spoke to press there would be "serious consequences". After leaving Harrods, this woman was subjected to threats over the phone by the head of security, Ms Mulla said. Due to this she became "very depressed and suicidal and was admitted to psychiatric unit for six months of her life". The whole experience left her "unable to form any proper relationship with any other man" and she "lost out on the opportunity to have her own family", Ms Mulla said. Female employees were also followed, the barrister said, giving the example of a 16-year-old who was tailed by a member of Fayed's security team to "check if she was in a relationship", with reports going back to the billionaire. Phone calls were also listened in on, Ms Mulla said, and if members of the security team heard anything "untoward" or "negative about Mohamed Al Fayed", again they would be reported back.

  Women who had been identified by Fayed would be "sent for a private medical investigation", Ms Mulla said. She told how women would arrive "none-the-wiser", expecting a normal medical test - but were instead subject to a "full internal screening" - cervical smear tests and full sexual health checks. Some would even have their ovaries checked, she said. If the women questioned what was happening, they would be told "he [Fayed] wants to check you are clean". Sometimes the women would not find out the results themselves but they were passed on to Fayed who would make "degrading and humiliating remarks" about the results, Ms Mulla said.

