  One of those who had to go through these checks was Natacha, who says she believes she was "checked for my purity" and she never received any of the results from the tests. Speaking at the news conference, the former Harrods employee told how working for Fayed was like walking "into a lion's den - a lair of cover-ups, deceit, lies, manipulation, humiliation and gross sexual misconduct". Fayed was a "a sick predator who lured me in" using "modus operandi he used time and time again", Natacha alleged. She said she was just 19, "young, naïve and totally innocent" when she was offered a supporting role to the billionaire's private PA. She said Fayed "behaved like a father figure", told her to call him "papa", and "often spoke about his family and children, as if to make me feel safe around him." Natacha alleged Fayed would hold "private meetings" with her which over time would involved a "forced kiss" or being "pulled down on to his lap" with his hands "exploring any part of your body that he wished". She recalled feeling "paralysed" as this happened, and being told not to talk about it as "he would know". Natacha recounted her "final night" working at Harrods, when she was "summoned" up to Fayed's private apartment for a "work meeting" and the door was locked behind her. She told the conference how the door to his bedroom had been left open and she could see sex toys. Natacha alleged that Fayed "pushed himself on to me. I fell to the floor with him on top of me", she said, adding she "kicked him off" and ran to the door, but Fayed "just laughed at me and told me in no uncertain terms that I was never to breathe a word of this to anyone. If I did, I would never work in London again and he knew where my family lived. I felt scared and sick... I never set foot in his office again". Natacha said her experiences left her struggling with confidence and in personal relationships for years. When she saw that Fayed had died last September aged 94, she said she "couldn't believe this monster had gotten away with his crimes. Thankfully today, this is a different story and I am truly grateful for that".
