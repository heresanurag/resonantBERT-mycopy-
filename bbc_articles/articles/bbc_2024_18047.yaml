title: Jake Wightman out of Paris 2024 Olympics with hamstring injury - BBC Sport
date: '2024-08-01'
section: Olympic Games
url: http://www.bbc.co.uk/sport/olympics/articles/c10l3yl7485o
content: |-
  British 800m medal hope Jake Wightman withdraws from Paris 2024 because of a hamstring injury.

  Jake Wightman finished 10th in the 1500m at Toyko 2020

  British 800m medal hope Jake Wightman has withdrawn from the Paris Olympics because of a hamstring injury. The 30-year-old, 1500m world champion in 2022, has been replaced by Elliot Giles. Wightman won 800m silver at the 2022 European Championships but has since missed three big events because of injury. A foot problem prevented him from defending his world title in Budapest in 2023, and he missed the UK Championships in June this year because of a calf issue.

  Wightman said before the Olympics that injuries would not affect his ability to win a medal. "You don't lose the qualities you had," he said. "If you're not out there performing and showing what qualities you have, people forget about it. "It's a nicer thing for me to be able to come in under the radar and not have this pressure of everyone expecting me to go out and win or be the best in the world." Giles, 30, joins Max Burgin and Ben Pattison as Britain's representatives in the 800m heats on Wednesday.

