title: Trump signs executive order to block funding to National Public Radio - BBC
  News
date: '2025-05-02'
section: Culture
url: http://www.bbc.co.uk/news/articles/cly1jwe7582o
content: |-
  Trump alleged that both organisations have produced "biased and partisan news coverage".

  Trump alleged that both organisations have engaged with "biased and partisan news coverage"

  US President Donald Trump has issued an executive order calling for all federal funding to the Public Broadcasting Service (PBS) and National Public Radio (NPR) to be blocked. On Thursday evening, Trump alleged that both organisations have engaged with "biased and partisan news coverage". The order instructs the board of the Corporation of Public Broadcasting (CPB), which distributes funding to PBS and NPR stations, to "cease direct funding" to the "maximum extent allowed by law". PBS called the order "blatantly unlawful", while CPB said the organisation is not "a federal executive agency subject to the President's authority".

  Meanwhile, Radio Free Asia, which receives funding from the government, said on Friday it was shutting down most of its news broadcasts and letting most staff go. CEO Bay Fang said the cuts were due to the Trump administration withholding congressionally allocated funding, even though a federal judge sided with the broadcaster last week.

  The executive order says the board should "decline to provide future funding" to the news organisations. "Which viewpoints NPR and PBS promote does not matter," it continues. "What does matter is that neither entity presents a fair, accurate, or unbiased portrayal of current events to taxpaying citizens." Paula Kerger, CEO of PBS, called the president's order "blatantly unlawful" and said it "threatens our ability to serve the American public with educational programming, as we have for the past 50-plus years". The White House has said that funding of news media is "not only outdated and unnecessary but corrosive to the appearance of journalistic independence" and that the media landscape has become more "diverse". However, the CPB budget has already been approved by Congress through 2027. Patricia Harrison, CEO of the CPB, said the organisation is not "a federal executive agency subject to the President's authority". "Congress directly authorised and funded CPB to be a private nonprofit corporation wholly independent of the federal government," she said. "In creating CPB, Congress expressly forbade 'any department, agency, officer, or employee of the United States to exercise any direction, supervision, or control over educational television or radio broadcasting'."

  More than 40 million Americans listen to NPR public radio each week, and 36 million watch a local television station from the PBS network each month, according to their estimates. NPR director Katherine Maher estimated in March that the radio station would receive about $120m (£90m) from the CPB in 2025, "less than 5% of its budget." Both organisations have previously said that Trump's effort to cut funding could have a "devastating impact" on those who rely on them for credible news, including during emergency situations.

  Media rights group RSF warned on Friday about "an alarming deterioration in press freedom" in the United States under Trump and "unprecedented" difficulties for independent journalists around the world. Following the news of Trump's executive order, REM singer Michael Stipe was among the figures offering support to the journalists affected. "Whether it's music or a free press – censorship anywhere is a threat to the truth everywhere," he said in a statement. "On World Press Freedom Day, I'm sending a shout-out to the brave journalists at Radio Free Europe."
