content: |-
  Bringing you the latest news from across England about the coronavirus pandemic.

  A "worryingly low number” of vulnerable children allocated a school place to keep them safe during the coronavirus crisis are turning up, officials have told BBC Newsnight.

  In some areas just a quarter of the “at risk” children meant to be in school are attending, the programme has been told, while in others, the figure is below 10%.

  The National Police Chiefs' Council lead on child protection, Norfolk’s Chief Constable Simon Bailey, warned there might be an impact upon child sex abuse.

  "Yes I think it’s possible, in exactly the same way as I’ve got to work on the premise that we will also see more children groomed and abused online,” he said.

  The Department for Education said: “Being in school can keep vulnerable children safe and ease pressure on families, which is why we have enabled these children to continue attending despite schools being closed for other pupils."

  You can watch the full story Newsnight at 22:45 BST on BBC Two or the BBC iPlayer.
