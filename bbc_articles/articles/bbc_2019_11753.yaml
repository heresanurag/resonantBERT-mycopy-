id: bbc_2019_11753
title: Reaction as Brexit deal agreed - BBC News
date: '2019-10-17'
section: UK Politics
url: http://www.bbc.co.uk/news/live/uk-politics-50079596
content: |-
  Latest updates as Boris Johnson hails a new deal with the EU, saying "now is the moment to get Brexit done".

  The pound is trading up on the day - but a surge in the currency triggered by news of the Brexit agreement failed to last, amid concerns that the deal could still be scuppered. Sterling rose to a five-month high against the dollar, coming close to $1.30, soon after the UK and EU's negotiating teams agreed a deal. It then began to lose ground after the DUP said it would not vote for the deal and by early afternoon, sterling had fallen back below $1.28. It later regained momentum to trade at $1.2863, up 0.26% on the day. There was a similar pattern against the euro. At first the pound jumped above €1.16, before falling back to €1.1576.
