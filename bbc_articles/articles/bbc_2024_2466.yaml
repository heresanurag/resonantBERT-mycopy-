  The Kenyan athlete spoke to the BBC in 2023 about beating Eliud Kipchoge's marathon world record.

  When Kenyan athlete Kelvin Kiptum spoke to the BBC in 2023 he candidly reflected about beating the world record of his hero Eliud Kipchoge.

  Following his death, many have shared their tributes honouring the young athlete.

  Read more: Kiptum - the marathon runner destined for greatness
