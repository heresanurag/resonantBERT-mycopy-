  Other messages from October 2020 appear to show Mr Case suggesting coronavirus guidance should be delivered by "trusted local figures, not nationally distrusted figures like the PM, sadly". Boris Johnson was prime minister at the time.

  In a statement responding to the leaks, Mr Hancock said: "There is absolutely no public interest case for this huge breach. All the materials for the book have already been made available to the Inquiry, which is the right, and only, place for everything to be considered properly and the right lessons to be learned.

  "As we have seen, releasing them in this way gives a partial, biased account to suit an anti-lockdown agenda."

  Chris Heaton-Harris, the government's Northern Ireland secretary, told BBC's Sunday with Laura Kuenssberg the messages give "almost a view into the psyche of Mr Hancock rather than into the actual decision-making".

  "I think viewers would expect that politicians being human beings would express things in a human way."

  Former Conservative MP Ann Widdecombe told the BBC's Stephen Nolan on Radio 5 Live that she had been "just as much against lockdown as Isabel Oakeshott", but found the leaks "profoundly unhelpful".

  Labour's Jonathan Ashworth - who was shadow health secretary during the pandemic - said there were always "two sides to a story" but many people will be "deeply troubled" by the messages.

  He called for the public inquiry to "report in some preliminary way by the end of the year", and added: "I also think Rishi Sunak needs to get a grip of this situation and insist that all ministers hand over everything, that no WhatsApps are deleted."

  In other newly-released leaked messages, Mr Johnson spoke of the need to get "absolutely militant" on social distancing in Covid hotspots, saying there had been a "general collapse" in rule following.

  In a WhatsApp conversation with Mr Case from July 2020, he wrote: "We need to tell people that if they want to save the economy and protect the NHS then they need to follow the rules.

  "And we may need to tighten the rules. You can now have six people from different households indoors. Do people really understand that and are they observing it?" he asked.

  The exchange came one month after the prime minister broke the rules himself.

  Mr Johnson, his wife Carrie, and the then-chancellor, Rishi Sunak, all received one fine each for attending a birthday party thrown in the ex-PM's honour in June 2020.

  A spokesman for Mr Johnson said it was not appropriate to comment on these leaks, and added that the public inquiry provided the right process for these issues to be examined.

