  Asked about the incident while on a trip to Brussels, Prime Minister Sir Keir Starmer said his first thoughts "as a father" were with the victim's family. "The terrible stabbing in Sheffield is one where I think the whole country would want to reach out to the family, to the friends, to the school, the entire community in their grief and mourn with them," he said. Louise Haigh, the MP for Sheffield Heeley, said the news was "horrific" and that "serious questions" would have to be answered about how it could have happened. Anti-knife crime campaigners in the area have said incidents like this should not happen. Amaan Ahmed, who manages the Castle Asian Community Trust near the school, said he feared the boy's death would leave parents wondering if they should send their children back to school. "If it can happen in a public place like a school, people will be worried about going to the park I think too," he added. Sheffield-based Anthony Olaseinde, who works for the charity Always an Alternative, said the incident was "heart-breaking". "Something like this should not happen," he said. He said the charity had held sessions at All Saints and worked with young people at the school.

  Police remain at the scene at All Saints Catholic High School on Tuesday morning

  Reverend Steve Chalke MBE, the founder of Oasis Academy schools chain, said knife crime was a symptom of wider problems. "The issue is lack of inclusion, the issue is mental health, the issue is poverty, the issue is grooming, the issue is exploitation on huge council housing estates, the issue is exclusion from school. "We need to do more to include kids. You can't defeat knife crime, you got to double up on inclusion." Knife crime campaigner Alison Cope, whose son Joshua Ribera was stabbed to death in a street in 2013, said knife crime happened in schools on "rare occasions". She said: "I see social media fuelling so many arguments in school and some of those arguments are turning into real life. "We have seen young people murdered because it started as an argument on social media." If you are affected by any of the issues raised, help and support is available via BBC Action Line.
