title: Tributes paid to boy, 15, after Sheffield school stabbing - BBC News
date: '2025-02-04'
section: South Yorkshire
url: http://www.bbc.co.uk/news/articles/cn01zpyrllqo
content: |-
  The boy, named locally as Harvey Willgoose, is described as a "lovely lad" and the "life of a party".

  The teenager who died has been named locally as Harvey Willgoose

  A 15-year-old boy who was fatally stabbed at a school in Sheffield has been described as a "lovely lad" and the "life of a party". Floral tributes and messages have been left outside All Saints Catholic High School, where the boy, named locally as Harvey Willgoose, was injured. A boy, 15, has been arrested on suspicion of murder and remains in police custody, South Yorkshire Police said. The force said it was working "at pace" to build a full picture of what had happened.

  One message left outside All Saints described the teenager as someone who had been "the life of a party" and who had "brought joy and laughter to everyone who knew him". His "bubbly personality was contagious", it added. "I'll never forget all the moments, all the laughs. You'll be missed by so many," it said. A teenager who said he had known the 15-year-old also left a bunch of flowers outside the school. The 17-year-old, who studies at a local college, heard the news through friends and said the boy who died had been a fan of Sheffield United. He said: "I'm a bit upset to be honest, it came as such a shock. "He seemed quite a happy guy and a nice guy to be around." One All Saints pupil said the victim had been a "lovely lad". "He would make your day better hearing him down that hallway. You didn't have to personally know him to be upset," the 17-year-old said. "Teachers loved him, students loved him, everyone loved him. "I've been at the school for seven years now and nothing like this has ever, ever happened."

  Floral tributes have been left outside the school gates in Sheffield

  On Monday a number of parents arrived at the school to collect their children early. One told the BBC they were keen to get their youngster home after hearing a variety of rumours about what had happened, adding the "kids were getting panicked". According to the local newspaper The Star, the school's head teacher sent a message to parents on Monday. He said it was with "shock and sorrow" that he had to tell people a pupil had been fatally stabbed. He also said the school would be closed on Tuesday. Assistant Chief Constable Lindsey Butterfield said her force was working to establish "how this tragedy unfolded" and used a news conference to urge people to "be mindful that there are loved ones at the centre of this". All Saints head teacher Sean Pender had sent a message to parents last Wednesday about a lockdown at the site which he said was due to "threatening behaviour between a small number of students". Asked during the news conference about the reports, ACC Butterfield said she could not share any information relating to it. But she urged people to avoid speculation and sharing content online "which could be distressing to them [the family] and detrimental" to the investigation.

