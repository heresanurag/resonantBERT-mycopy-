title: Boy, 13, dies after motorbike fall at Aberbeeg Motorcross track - BBC News
date: '2020-07-22'
section: Wales
url: http://www.bbc.co.uk/news/uk-wales-53503845
content: |-
  Cory Hewer died two days after suffering serious head injuries at a motorcycle track.

  Cory Hewer's parents said he was a "cheeky, funny, loving boy"

  A 13-year-old boy has died after coming off a motorbike on an off-road circuit.

  Gwent Police said the incident happened at about 15:30 BST on Sunday at Aberbeeg Motorcross track in Cwm, Blaenau Gwent.

  Cory Hewer, from Ebbw Vale, was taken to Cardiff's University Hospital of Wales with serious head injuries but died on Tuesday.

  In a statement, his parents thanked people for their "kind support and generosity".

  They added: "Cory was a very happy little lad who loved his rugby and motocrossing.

  "He was a cheeky, funny, loving boy and will be missed very much. He passed away doing a sport that he loved the most and was so brave donating his organs.

  "Our lives will never be the same without him," they said.
