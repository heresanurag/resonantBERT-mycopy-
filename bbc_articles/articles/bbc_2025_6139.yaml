title: General strike hits transport in Argentina - BBC News
date: '2025-04-11'
section: Latin America
url: http://www.bbc.co.uk/news/articles/czx1y5gwwwyo
content: |-
  President Javier Milei has made sweeping cuts to public services since he took office 16 months ago.

  The capital's central Constitucion railway station was closed on Thursday

  A general strike against public spending cuts in Argentina has severely disrupted transport. All domestic flights have been cancelled, while trains and metro services have been suspended in Buenos Aires and other parts of the country. Many shops remained closed in the capital but bus drivers continued to work. Airlines said international flights would go ahead as planned, with only a few delays. It is the third general strike called by Argentina's powerful unions since President Javier Milei took office at the end of 2023.

  The national airline, Aerolíneas Argentinas, said it had scrapped 258 flights, affecting around 20,000 passengers

  Since then, the president has introduced tough austerity measures to tackle hyperinflation. His plan has worked so far, with inflation down from more than 200% to about 60% a year. But the unions say the most vulnerable in society have been affected, including pensioners and low-paid workers. Milei has slashed subsidies for transport, fuel and energy, fired tens of thousands of public servants and closed government departments. Horacio Bianchi, a retired teacher living in Buenos Aires, told the Associated Press news agency people were suffering as they "don't have enough money to eat". "These people [the government] came to solve the problems and they have absolutely worsened them for everyone," he added. On Wednesday, workers had joined a weekly protest staged by pensioners who have seen their pension funds slashed. In recent weeks, their protests have ended in violence as sympathetic groups, such as football fans, clashed with police.

  The strike was preceded by a peaceful march on Wednesday in support of pensioners, who have been affected by the cuts

  The protest action comes as the Argentine government awaits whether it will be granted a new $20bn (£15.4bn) loan from the International Monetary Fund. The country already owes the lender $44bn. The US Treasury, external said Milei had "brought Argentina back from economic oblivion". US Treasury Secretary Scott Bessent will travel to Buenos Aires on Monday in support of the reforms.
