title: 'Coronavirus: Sex workers meet clients despite lockdown - BBC News'
date: '2020-05-11'
section: General
url: http://www.bbc.co.uk/news/uk-england-birmingham-52579788
content: |-
  A BBC investigation uncovers evidence some sex workers are still travelling around the country.

  A BBC investigation has uncovered evidence the lockdown measures have not stopped some sex workers from travelling around the country to meet up with clients.

  BBC reporter Jonathan Gibson spoke to sex workers including Tiffany, in Birmingham, who said she had travelled to Bristol and further afield to visit clients' homes and offices.

  The investigation also revealed some brothels were still trading, despite calls for social distancing.

  The English Collective of Prostitutes said most sex workers were mothers and if they were working, it was because they were desperate for money.
