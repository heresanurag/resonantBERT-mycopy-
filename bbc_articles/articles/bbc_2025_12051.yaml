content: |-
  Air India say there were 169 Indian nationals on board the flight, as-well as 53 Britons, one Canadian national and seven Portuguese nationals.

  BBC correspondent Roxy Gagdekar reports from the scene of a plane crash in Ahmedabad, India.

  The London bound flight was reported to have been carrying 242 passengers.

  Air India said the flight was carrying 169 Indian nationals, as well as 53 Britons, one Canadian national and seven Portuguese nationals.
