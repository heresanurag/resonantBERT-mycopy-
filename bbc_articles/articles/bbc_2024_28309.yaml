title: Sergio Garcia set for DP World Tour return with 2025 Ryder Cup in New York
  a target - BBC Sport
date: '2024-11-18'
section: Golf
url: http://www.bbc.co.uk/sport/golf/articles/ce89jelgwp2o
content: |-
  Europe's Ryder Cup captain Luke Donald said Sergio Garcia "was very interested" about rejoining the tour when the pair spoke recently

  LIV Golf's Sergio Garcia is set to rejoin the DP World Tour for the 2025 season as he seeks to play at next year's Ryder Cup. Garcia, 44, who is the event's record points scorer, wants to match Lee Westwood and Sir Nick Faldo's European record of 11 appearances at the biennial competition. However, in order for that to happen, the Spaniard has had to settle the outstanding substantial fines - reported to be more than £1m - imposed on him by the tour for his previous defection to play LIV events, and he will also have to serve a suspension. A spokesman for the Europe-based DP World Tour confirmed former Masters winner Garcia submitted an application to return to the membership before the 17 November deadline. European players wishing to be selected for the Ryder Cup must be members of the tour. "He has paid his fines but will have to serve his suspensions before he can play on the DP World Tour," the spokesman added. The 2025 Ryder Cup takes place at Bethpage in New York from 26-28 September. Europe's captain Luke Donald recently said he had been speaking to Garcia about the Spanish star returning to the tour and becoming eligible to play on the team. Garcia has won 16 titles on the European tour, as well as 11 PGA Tour titles, with his 2017 Masters title counting in both tallies. He joined the breakaway LIV Golf, a Saudi-funded series, in 2022 along with other big names from the sport. He resigned his membership of the European circuit in May 2023 after an arbitration panel found in favour of the DP World Tour and confirmed its right to fine and ban players who competed in LIV Golf events without permission.

  Garcia has made no secret of his desire to return to the European Ryder Cup team and clearly believes a fine of more than £1m is worth paying to make himself available for next year's match at Bethpage. The all-time record points scorer missed Europe's triumph in Rome but has a long friendship with captain Luke Donald that stretches back to their successful playing partnership in previous matches. Clearly the attraction of playing under Donald in New York next year has proven irresistible to Garcia. He will need to play four events next season, after missing events for which he has been suspended, to maintain his renewed membership. Garcia remains suspended from the PGA Tour, as are all players still competing on the breakaway LIV circuit. But the Spaniard is not alone in paying DP World Tour fines with Adrian Meronk, Dean Burmester, Joaquin Niemann, Thomas Pieters, Patrick Reed and Lucas Herbert all reinstating their memberships. Jon Rahm and Tyrrell Hatton remain members until their appeals against fines are heard. This is unlikely to happen before the Ryder Cup.
