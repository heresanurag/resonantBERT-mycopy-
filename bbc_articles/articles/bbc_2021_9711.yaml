title: Bridge-collapse fears trigger alert for Bassaleg homeowners - BBC News
date: '2021-08-07'
section: Wales
url: http://www.bbc.co.uk/news/uk-wales-58128542
content: |-
  Temporary accommodation is available for those who decide to leave, the council says.

  A row of houses on Forge Mews is accessed via Old Bassaleg Bridge

  Fears a bridge could potentially "collapse under its own weight" have led to residents being advised to leave their homes.

  Newport City Council said it had closed Old Bassaleg Bridge, which serves properties on Forge Mews in Bassaleg, following a structural review.

  The council said temporary accommodation would be provided to anyone who decided to leave their home.

  Resident Alison Williams said she was "shocked and stressed".

  "They've closed our river bridge off, which has closed our access off," she said.

  "It means emergency vehicles can't come into our street. So if there is a fire, ambulance, it won't happen."

  A nearby footbridge has also been closed as well as the road

  She said the council told residents about the three-week closure by letter on Tuesday.

  Officials offered her temporary accommodation, but the route could be closed for "anything up to six months", Ms Williams added.

  "I've got two kittens, there's no way I'm going to put them into a hotel," she said.

  "We have strongly advised the residents of Forge Mews to leave their homes as soon as possible," said a council statement.

  "This is because the bridge closure would prevent emergency services from accessing the street in the event of an emergency."

  The council said remedial work on the Old Bassaleg Bridge would start as "soon as possible".

  "This is a serious situation, and it is our assessment that the bridge poses too great a risk to remain open," it said.

