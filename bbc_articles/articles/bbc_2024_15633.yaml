title: 'Cardiff: CCTV shows speeding car hit girl and drive away - BBC News'
date: '2024-07-18'
section: General
url: http://www.bbc.co.uk/news/uk-wales-68800505
content: |-
  A five-year-old girl was on her scooter with her family before she was hit by a grey BMW.

  CCTV footage has captured the moment a speeding car hits a five-year-old girl before driving off.

  South Wales Police is investigating the incident which happened on Sloper Road in Cardiff at about 17.50 BST on 24 March.

  The clip shows the girl riding her scooter on the pavement after a visit to the park with her mother and brother.

  A grey BMW can be seen overtaking a vehicle waiting at the junction of Langham Way and Sloper Road before mounting the pavement, hitting the child and fleeing the scene.

  A spokeswoman for South Wales Police said: "Amazingly the little girl received only minor injuries, but the incident was understandably very frightening for her and her family.

  The force is appealing for the driver or anyone with information to get in contact.
