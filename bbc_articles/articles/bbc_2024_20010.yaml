  Last year’s summit between Mr Biden and Mr Xi in San Fransisco was meant to make progress on these issues. Since then, despite the tariffs and the stern rhetoric, Washington and Beijing have acknowledged their differences - and reports of the two sides striking a deal on curbing fentanyl production are a good sign. In April, when the BBC accompanied US Secretary of State Antony Blinken on his visit to Shanghai and Beijing, the public elements of some of his meetings with senior Chinese officials felt like a steely stand-off. It was a show of diplomatic strength meant for each side's domestic audience. And this will undoubtedly be a part of Mr Sullivan’s trip too, as he tries to bolster Mr Biden's diplomacy in the waning months of his presidency. But these meetings serve another fundamental purpose - face-to-face time between two rival, inter-dependent economies as they battle mutual distrust and try to probe each other’s real intentions. It seems that Jake Sullivan's previous meetings with Wang Yi have quietly laid the groundwork for what both sides call “stable relations”. In a recent speech at the Council of Foreign Relations in Washington, Mr Sullivan said that he and Mr Wang had "increasingly gotten to the point of setting aside the talking points and really having strategic conversations”. He described the character of those conversations as “direct”, including one on the war in Ukraine. "Both of us left feeling that we didn’t agree or see eye-to-eye on everything but that there was a lot of work to carry forward.”
