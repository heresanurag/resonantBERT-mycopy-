title: 'New Heights: Travis and Jason Kelce sign $100m podcast deal with Amazon -
  BBC News'
date: '2024-08-28'
section: Culture
url: http://www.bbc.co.uk/news/articles/czxl1wnpjgyo
content: |-
  Amazon secure exclusive rights to the brothers' popular New Heights sport and culture podcast.

  NFL stars Travis and Jason Kelce have signed a lucrative podcast deal with Amazon, reportedly worth $100m (£75m). The three-year deal, announced on Tuesday, gives the company's Wondery audio network exclusive multimedia rights to the brothers' popular New Heights podcast. The pair said they "couldn't be more excited" at the deal ahead of the show's third series. The siblings launched the podcast in 2022 - interviewing celebrity guests and discussing their own lives - all with brotherly humour.

  Travis, 34, a three-time Super Bowl champion for the Kansas City Chiefs, has since found wider fame as the boyfriend of pop megastar Taylor Swift. Elder brother Jason, 36, recently retired after 13 seasons with the Philadelphia Eagles and has taken up an analyst role with ESPN.
