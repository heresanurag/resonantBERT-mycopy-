title: 'Pembrokeshire: Missing Chris Ellery in Ireland, says daughter - BBC News'
date: '2024-11-02'
section: Wales
url: http://www.bbc.co.uk/news/articles/c748z9mvzm9o
content: |-
  Chris Ellery's boat broke down in the Irish Sea, but he was able to make it to County Wicklow.

  Chris Ellery did not return home as planned from a boat trip at Fishguard, prompting a search

  A keen photographer who broke down on a small boat in the Irish sea has made a remarkable landing in Ireland. Chris Ellery, from Bristol, failed to return from a solo trip out of Fishguard, Pembrokeshire, on Thursday, sparking a massive search. He came ashore on Saturday and walked to a local police station in County Wicklow, HM Coastguard said. Gardai (Irish police) said the 54-year-old was "tired but okay".

  Chris Ellery's daughter has shared photos of her father and his boat in an effort to find him

  The Coastguard spokesman said Mr Ellery set off from French Camp Bay on Thursday expecting to return the following day. But as he headed west towards Ireland, his three metre (10ft) black inflatable boat had engine trouble. "He broke down, but managed to get it going again. But his phone had also stopped working," the spokesman said. "He came ashore in County Wicklow and made his way to a local police station. They contacted Dyfed-Powys Police.

  Mr Ellery's family had travelled to the port of Fishguard after they had not heard from him. His daughter Kenzie took to social media to make an appeal for help. But she said on Saturday afternoon he had been found. "My dad is alive he has been found in Ireland," she said in a Facebook post, external. A large-scale search had taken place after he had gone missing. HM Coastguard had resumed the two-day operation on Saturday, involving an aircraft, several RNLI boat crews, two coastguard teams and police around north Pembrokeshire, Cardigan Bay and St Brides Bay.
