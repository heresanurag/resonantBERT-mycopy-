title: Surfers enjoy a five-star Severn Bore - BBC News
date: '2024-03-13'
section: General
url: http://www.bbc.co.uk/news/uk-england-gloucestershire-68543486
content: |-
  A five-star series of waves push up the River Severn in daylight for the first time since 2019.

  A large tidal surge is pushing up through the Severn Estuary.

  The Severn Bore is a natural phenomenon caused by a rising tide, creating a series of waves that are hotly anticipated by surfers, kayakers and paddleboarders.

  Tuesday's is expected to be the only five-star bore of the year - the biggest possible one.
