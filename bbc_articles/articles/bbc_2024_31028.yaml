  While the Parliamentary and Health Service Ombudsman (PHSO) could recommend compensation, it could not enforce it. The work and pensions secretary said the government would develop an action plan to fix problems identified in the ombudsman's report, and set a clear notice of any future changes to the state pension age. She said that future pension communications would also use "the most up to date methods" to contact those affected. Liberal Democrat work and pensions spokesman Steve Darling said the government had "turned its back on millions of pension-age women who were wronged through no fault of their own". For the Conservatives, who did not respond to the ombudsman's report when in power, shadow work and pensions secretary Helen Whately said ministers must "own" the decision not to give payouts. A petition to Parliament for a compensation system to be introduced had reached 135,000 signatures before Tuesday's announcement.

  The Waspi campaign and others have highlighted previous comments made by the the prime minister, as well as Kendall, before they came to power. Both spoke of the "injustice" that the women faced, with such a post from 2019 still on the latter's website, external. Caroline Abrahams, charity director at Age UK, said: "The fact that many of the women affected will also be coping with the loss of their Winter Fuel Payment this year will intensify their sense of injustice." However, not everyone has criticised the government's decision. Pensions consultant John Ralfe said it was the correct and "inevitable" response from the Department for Work and Pensions.

