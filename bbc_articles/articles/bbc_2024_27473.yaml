title: Moment car explodes on quiet New York street - BBC News
date: '2024-11-11'
section: General
url: http://www.bbc.co.uk/news/videos/c170n1qq02qo
content: |-
  Officials are still investigating the cause of the blast, which damaged homes and vehicles.

  Surveillance video shows the moment a car exploded on a quiet residential street in Queens, New York. The blast smashed windows of five homes and five cars but caused no injuries.

  Division 13 New York Fire Department Deputy Chief George Healy said a pressurised cylinder being stored in the car experienced a failure but that the cause of the explosion remains under investigation.

  Mr Healy added it is unlikely there was foul play involved.
