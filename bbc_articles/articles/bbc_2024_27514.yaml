content: |-
  Crystal Palace midfielder Justin Devenny is called up to the Northern Ireland squad for the first time for the Nations League matches against Belarus and Luxembourg.

  Justin Devenny has been playing for Northern Ireland Under-21s

  Crystal Palace midfielder Justin Devenny has been called up to the Northern Ireland squad for the first time for the forthcoming Nations League double-header against Belarus and Luxembourg. His addition to manager Michael O'Neill's group completes a memorable couple of days for the 21-year-old after he made his Premier League debut for Palace against Fulham at the weekend. The Scotland-born player, who qualifies for Northern Ireland through his mother, played from the start in his club's 2-0 defeat by Fulham at Selhurst Park on Saturday before being substituted after 74 minutes. Devenny was a regular for Northern Ireland's under-21 team during their recent European Championship qualifying campaign and comes highly recommended by their manager Tommy Wright. "The number of players we have pushed through from the 21s in the past 12 months is extremely high and Justin has been on that pathway," explained O'Neill. "Obviously Justin having made his Premier League debut has accelerated things and, with there not being a U21 camp in this international window, it's great to have him in. We know what he is capable of, and it's a good opportunity for him."

  A squad update released by Northern Ireland on Monday also revealed that Rangers winger Ross McCausland is an injury doubt for Friday's game against the Belarusians at Windsor Park, and an away encounter against Luxembourg on Monday 18 November. McCausland was involved for Rangers against Hearts in the Scottish Premiership on Sunday but was unable to train on Monday because of a niggle. Northern Ireland sit top of Nations League C Group 3 with seven points after two wins, one draw and one defeat from their four fixtures in the competition to date. Belarus are second on six points, Bulgaria third with five and Luxembourg bottom with two. Last month O'Neill's charges followed up a 0-0 draw in Belarus with a swashbuckling performance in a 5-0 victory over Bulgaria in Belfast.
