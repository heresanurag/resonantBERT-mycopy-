title: Wallace allegations 'truly upsetting' says MasterChef's Torode - BBC News
date: '2024-12-04'
section: Culture
url: http://www.bbc.co.uk/news/articles/ceqlnez0ylqo
content: |-
  Lawyers for Gregg Wallace have strongly denied he engages in behaviour of a sexually harassing nature.

  MasterChef presenter John Torode has said he found the recent allegations against co-host Gregg Wallace "truly upsetting". He added that the "thought of anyone who has appeared on our show not having a brilliant experience is awful to hear". His comments come after co-host Wallace stepped back amid an investigation into ongoing allegations of inappropriate behaviour, which he denies. Torode, who has presented the BBC One cooking show alongside Wallace since 2005, said on Instagram, external he "loves being part of" the show and "will continue to be a part of it".

  "Since last Friday I have been away filming MasterChef overseas. I love my job, and I love MasterChef. I love being part of it and will continue to be part of it," he wrote. "During the last few days, I've been trying to make the best cookery programme, so being busy making the show and caring for our contestants has allowed me little time to think about anything else, but that has been hard. "But as I hope everyone appreciates there is an investigation under way, which I fully support, so I cannot make any further comment at this stage and I hope that you all understand and respect my silence on the matter moving forward." Wallace's lawyers have strongly denied he engages in behaviour of a sexually harassing nature.

  Gregg Wallace (left) and John Torode pictured on the set of MasterChef

  On Tuesday, the BBC announced that two MasterChef celebrity Christmas specials have been pulled from its festive schedule, as well as a Celebrity MasterChef Christmas Cook Off and a special Strictly-themed episode. The BBC said: "MasterChef is an amazing competition which is life-changing for the chefs taking part and the current series of MasterChef: The Professionals is continuing as planned. "The celebrity Christmas specials are obviously a different type of show and in the current circumstances we have decided not to broadcast them." Three episodes of BBC Two's Inside The Factory, which are repeats, are also coming out of the schedule, but the current series of MasterChef: The Professionals remains on air. Torode became a familiar face to TV audiences in 1996 as the resident chef on ITV's This Morning. MasterChef launched in 2005 as a revamped version of the original 1990-2001 series, which was hosted by Loyd Grossman. The revamped 2005 series, which was called MasterChef Goes Large and was won by Thomasina Miers, reverted to its original name in 2008. The success of the programme led to spin-off shows such as Junior MasterChef, Celebrity MasterChef and MasterChef: The Professionals. Last week Banijay UK, the production company behind the BBC show, announced that Wallace would be "stepping away from his role on MasterChef" following complaints from individuals in relation to historical allegations of misconduct. Banijay UK announced an "immediate, external review to fully and impartially investigate" and said that Wallace was "committed to fully cooperating throughout the process".

