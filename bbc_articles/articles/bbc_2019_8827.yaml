  A selection of your pictures of Scotland sent in between 12 and 19 July.

  "She said 'yes'!". Bill Lindsay offered to take photos for this young couple from Texas on St Andrews West beach. Bill says: "After six or so photos he asked if I would take one more. He then got down on one one knee and proposed." This is 30 seconds later.
