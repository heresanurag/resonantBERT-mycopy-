  Hendrix and his frustration was just one of many odd moments at this curious festival. Pink Floyd played to only a few hundred people, because there were too few turnstiles to allow the thousands of fans inside in time to see their set. Later, there were so many people in the auction room that punters were pushed under the stage and watched through cracks in the floorboards. And on the night of the gig, Hendrix was reported to have attracted the attention of plenty of adoring female fans outside his hotel window. But its quirkiness was a product of the fact that nobody had done it before. "It was one of the best festivals I ever did and the people running that festival... had it down, man. It was fantastic," singer Geno Washington says. Washington and his Ram Jam Band headlined the gig and it is one he still remembers fondly. "I can't see why they didn't do it again because it was huge, man," Geno adds.

  It is believed the festival attracted a crowd of between 4,000 and 6,000, and there were many more outside unable to gain entry. However, despite its popularity on the day, it didn't make that many headlines due to the release of an iconic Beatles album the Friday before the event. "Sgt Pepper was released and it took over the rock press," Doug recalls. "So, a little event in Spalding didn't raise the same interest. "I think that it's something that needs publicity because not many people actually knew, even at the time, that it took place." The auction room was eventually demolished and the area is now occupied by Halfords and Argos. On the streets of Spalding today, most people have never heard of Barbeque 67. One person asks if it is a "kind of sauce", another wonders if it is an "American barbecue" and one asks if it is a "kind of restaurant". Despite a Blue Plaque marking the hotel where Hendrix stayed, many people in the town have no idea of the musical heritage on their doorstep or whose guitar might be languishing at the bottom of a nearby landfill site.

