content: |-
  Was a Spalding event featuring Jimi Hendrix the first rock festival? Those who were there think so.

  Hendrix's guitar ended up at the tip after 'first rock festival'

  Colin Ward was a drummer for Sounds Force Five, who played at Barbeque 67

  The 1967 Monterey Pop Festival in the US is often cited as having been the first rock festival. But weeks earlier, thousands of fans crowded round a shed in Lincolnshire to watch some of music's biggest names perform.

  "What you've got to remember is this was a shed," says record shop owner Alan Barnsdale, recalling the Tulip Bulb Auction Hall in Spalding, Lincolnshire. "It was an auction house for selling off [flower] bulbs and commodities like that. No windows. There was nothing there." And yet, on Monday 29 May 1967, history was made when the likes of Eric Clapton, Jimi Hendrix, Pink Floyd and The Move performed there to eager fans. By luck or foresight, Barbeque 67 set the tone for what was to come. "[It] was the first British rock festival, really, although nobody knew it was at the time," says Bev Bevan, the drummer from Electric Light Orchestra and The Move.

  Jimi Hendrix was among the headliners at "Britain's first rock festival"

  Hendrix was among the attractions, but the day did not go too well for the legendary guitarist. "He was not happy with the sound at all," remembers Bev. "He just couldn't get his guitar to sound like he wanted it to." Local historian Doug Kendall was in the crowd that day. "I think it was possibly the only time in history that Hendrix was heckled," he says. Also on the line-up was Sounds Force Five. Drummer Colin Ward remembers the young guitarist kicking his amplifiers before taking his frustration one step further. "He set fire to his guitar with lighter fuel, which was quite funny at the time, and then he threw that off stage," Colin recalls. "Sadly, that guitar ended up on the council tip. Had we had the foresight of keeping it, it would be worth thousands now." It was a gimmick Hendrix repeated to great acclaim the following month at the Monterey Pop Festival, which is widely regarded as launching his career in the US.

