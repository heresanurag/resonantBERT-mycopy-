title: Drug-fuelled driver who caused three-year-old's death jailed - BBC News
date: '2025-05-27'
section: Manchester
url: http://www.bbc.co.uk/news/articles/cp3qdj0qdp7o
content: |-
  Rawal Rehman is jailed for 12 years after his van hit and killed Louisa Palmisano in Manchester.

  Rawal Rehman's van struck the girl after he crashed into a tram

  A van driver who took at least 20 lines of cocaine before crashing into a tram, then hitting and killing a three-year-old girl with his vehicle, has been jailed. Louisa Palmisano, from Burnley - known as Lulu - was hit by a van while walking with her parents on Mosely Street in Manchester city centre on 22 February, and later died in hospital. Rawal Rehman, who initially fled the scene before being arrested the next day, had binged on the cocaine and visited two massage parlours in the city on the morning of the crash. The 36-year-old, of Lambton Road, Manchester, was sentenced to 12 years in jail at Manchester Crown Court on Tuesday, after pleading guilty to causing death by dangerous driving.

  Louisa Palmisano's family said they "miss her more than words can ever express"

  Rehman had ignored stop signs when he careered straight into the tram, causing his van to mount the pavement and hit the victim, at about 10:00 GMT on 22 February, the court heard. He ran away from the crash, after flagging down a taxi, and was arrested a day later following a manhunt by police. Lulu's family said they had been on a family trip to Manchester before the "unimaginable tragedy" had occurred. They said Rehman's sentence "brought a measure of legal closure, but nothing can fill the void left by her absence".

  The victim was taken from the scene of the crash to hospital, where she later died

  CCTV of the incident was played to the court, showing the family walking along the pavement, with Lulu between her parents, holding their hands. After the crash, Rehman, with his hood up, got out of the van and walked around the vehicle, before retrieving his phone and leaving in search of a taxi. The court heard he had a number of previous convictions, including being jailed in 2017 for three years for conspiracy to pervert the course of justice, after he torched a car involved in a fatal hit-and-run collision which killed a 25-year-old man, in Chorlton, Manchester.

  The court was shown CCTV of Rehman flagging down a taxi in order to flee the scene

  David Toal, appearing for the defence, said his client had admitted to things for which the prosecution had no evidence, which demonstrated he had taken responsibility for his actions, stating Rehman had planned to hand himself in to the police before his arrest. He said: "An aggravating factor is that he left the scene - there is no excuse for this. "His explanation is that he panicked, and that panic turned into shock when he learned, via social media, that a young girl had lost her life." The child's parents said Lulu was their only child and "the centre of our world". "Her joyful spirit, vivid imagination, and kind heart touched everyone who knew her. "At just three years old, she brought more light and love than we ever thought possible. "Her life was full of promise, and her loss is something we will carry with us for the rest of our lives."

