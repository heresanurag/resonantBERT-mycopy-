id: bbc_2017_1697
title: Light plane crashes into Melbourne shopping complex - BBC News
date: '2017-02-21'
section: General
url: http://www.bbc.co.uk/news/world-australia-39035668
content: |-
  A plane carrying five people has crashed into a Melbourne shopping complex, Australian authorities say.

  A retailer in the complex said the plane crashed into its rear warehouse but all staff were safe. It is believed the shopping centre was closed at the time of the incident.
