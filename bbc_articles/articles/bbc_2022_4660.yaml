title: 'Michael Snee and Aidan Moffitt killings: Man charged with Sligo murders -
  BBC News'
date: '2022-04-14'
section: Europe
url: http://www.bbc.co.uk/news/world-europe-61106318
content: |-
  Yousef Palani, 22, is accused of murdering Michael Snee and Aidan Moffitt in the Irish town.

  Yousef Palani is accused of two murders as well as a separate assault

  A man has appeared in court charged with the murders of two men in the Irish town of Sligo earlier this week.

  Yousef Palani, 22, whose address was given as Markievicz Heights, Sligo, is accused of murdering AIdan Moffitt and Michael Snee.

  He is also accused of attacking a third man in the town on 9 April.

  He was detained by armed police after the killing of Mr Snee, 58, whose body was found at his home in Connaughton Road on Tuesday night.

  Michael Snee and Aidan Moffitt were found dead in their own homes in Sligo in the Republic of Ireland

  The night before, Mr Moffitt, 42, was found dead in his Cartron Heights home.

  Both men had been assaulted and sustained "significant" injuries, Gardaí (Irish police) said.

  A large crowd gathered in the area outside the court ahead of the accused's appearance

  Relatives of the two murder victims and the man who was assaulted sat in the courtroom for the short hearing.

  Mr Palani was remanded in custody and will appear in court again by video link on 21 April.

  The court was told he made no reply to the assault charge and said he understood the two murder charges when they were put to him.

  A defence lawyer requested he be put on suicide watch by the prison service and that he be given an urgent psychiatric assessment.

  A large crowd had gathered outside the court ahead of his appearance.

  They were angry scenes and abuse was shouted at the prison van when it arrived at the court.

  Then, when it was leaving the court, some members of the public banged on the side of the van and were held back by police.

  On Thursday, Fr Noel Rooney, a parish priest who knew both victims, said the killings were "beyond belief" and had caused "a great deal of shock and upset".
