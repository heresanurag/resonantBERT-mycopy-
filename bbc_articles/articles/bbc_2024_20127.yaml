  The latest attacks are being seen as an attempt by Moscow to reassert its control over the conflict after Ukraine's recent gains of territory in Russia's Kursk region. Russia has been targeting Ukraine's energy infrastructure since early on in its full-scale invasion, which began in February 2022. In recent months it has renewed its campaign of attacks on the power grid, causing frequent blackouts across the country. On Monday, Mr Zelensky called on Western allies including the UK, the US and France to change their rules and let Ukraine use their weapons to strike deeper inside Russia. Ukraine is allowed to use some Western weapons to hit targets inside Russia - but not long-range weapons. Mr Zelensky said "we could do much more to protect lives" if European air forces worked with Ukraine's air defence.
