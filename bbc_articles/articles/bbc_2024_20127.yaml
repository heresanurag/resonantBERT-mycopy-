title: Massive Russian strikes hit Ukraine for second day - BBC News
date: '2024-08-27'
section: Europe
url: http://www.bbc.co.uk/news/articles/ckg1lpe26ylo
content: |-
  Local officials say at least three people have been killed in Russian attacks on Ukraine overnight.

  A hotel was hit in the central city of Kryvyi Rih, leaving at least two people dead

  Russia has targeted Ukraine with another wave of deadly strikes, a day after one of its biggest air attacks of the war. At least two people were killed in an attack on a hotel in the central city of Kryvyi Rih and two more died in a wave of drone strikes on the Zaporizhzhia region in the south east, officials said. Ukrainian monitors had earlier detected Russian aircraft launching hypersonic missiles and the air force said it had shot down five missiles and 60 drones. At least six people died overnight Sunday to Monday and dozens were wounded as more than half of Ukraine's regions were attacked by drones and missiles.

  On Monday people took shelter in metro stations in Kyiv

  Power infrastructure was hit causing blackouts in many cities, with water supplies also affected. A statement from the Russian defence ministry said long-range air and sea-based precision weaponry had been used to strike power stations and related infrastructure across Ukraine, including in Kyiv, Lviv and the Kharkiv and Odesa regions. US President Joe Biden called the attacks "outrageous", saying Washington would continue to support Ukraine's energy grid. In the latest attacks overnight into Tuesday, Russia said it had launched 10 missiles and 81 drones. A hotel was struck by a ballistic missile in Kryvyi Rih late on Monday, killing a man and a woman and leaving several others wounded. Two people were reported missing. Kryvyi Rih is the home city of Ukraine's President Volodymyr Zelensky. Meanwhile, Zaporizhzhia regional administration head Ivan Fedorov said two people had been killed and four more wounded by drone strikes. Explosions have also been reported in Kyiv, Sumy, Khmelnytsky and Mykolayiv regions. Launches of several hypersonic Kinzhal (dagger) ballistic missiles, which are hard for air defences to intercept, have been detected.

