  Tavia Da Costa, who was due to turn two later this month, died in Dungannon on Sunday.

  Toddler's death now being treated as murder

  Tavia Da Costa was due to turn two years old later this month

  A murder investigation has begun after the death of a 23-month-old girl in County Tyrone, police have said. Tavia Da Costa, who was due to turn two later this month, died at a house in Windmill Court in Dungannon on Sunday. Police had been treating the death as suspicious, but following the results of a post-mortem examination, it was now being treated as murder. A man and two women, all aged in their 20s, have been arrested and are in custody.

  Det Ch Insp Anthony Kelly said officers attended a report of a sudden death of a child in the town on Sunday morning. "My thoughts, and sincere sympathy, are with little Tavia's family members and loved ones whose worlds have been turned upside down," he said. "A 21-year-old woman, a 24-year-old woman, and a 29-year-old man were each arrested on suspicion of murder and remain in custody at this time."

  The child has connections to the East Timorese community in Dungannon. Roy Setiawan, chair of the Timorese Association Inclusive Support, said the community was “heartbroken”. "It's just a shock to the whole community, the East Timorese community, but also it's disturbing for the whole community of Dungannon," he said. “It is just really sad and I would like to reach out to our community and the wider community to express our condolences and our deepest sympathy to those who are mentally and physically affected by this tragic incident."
