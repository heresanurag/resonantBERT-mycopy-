  Given her recent difficulties with illness and injury - and the stacked nature of the 10,000m - it seemed a bronze might be the best McColgan could hope for. But the 31-year-old Dundonian is one of the most obdurate athletes on the circuit. She led early and maintained her form throughout, before finding herself in a duel with Irine Cheptai with a lap to go. The Kenyan surged ahead on the back straight but McColgan wasn't having any of her capers, digging in and rampaging past to record the biggest win of her career. "I have never sprinted like that in my life and without the crowd I could never have done that," she told BBC Sport. "It was vibrating through my body. "I couldn't have asked for anything more to have my family here. Your family know the ups and downs and this is my fourth attempt over four events and I have come sixth every time. You could see I wanted gold. To win it tonight was so special." Mother Liz, a redoubtably presence at the best of times, stood emotionally beside her as she spoke. "To witness your daughter win in the same event is incredible," she added. "She just ran the race I knew she was capable of running. I know how hard she works and it's fantastic it came together and she won."

