  The triumph of Lenton and Wilson, with their combined age of 130, was a gently enjoyable start to an enthralling day. The duo didn't just beat their Australian opponents, they overwhelmed them 17-5 in a dominant display, having seen off England in their semi-final. It matched the achievement of their male pairs counterparts. "I'd never thought we'd be going home with a gold medal," Lenton told BBC Scotland. "I hoped and prayed we would. When it really mattered - the semi-finals and finals - we really turned it on, both of us. "In a couple of weeks' time, I will be 73, but records are there to be broken and somebody will break that." Scott is your man for that kind of business. The swimmer has not only ransacked 78-year-old Alister Allan's record of 10 Commonwealth Games medals this week and pushed the mark out to 13, but he has also now stripped the shooter of the consolation that he had won more golds. The Olympic medallist now taken gold in the 200m freestyle and medley, as well as bronze in the 400m medley, 100m free, 4 x 200m freestyle and 4 x 100m medley relay, all in the past five days. And he took one of those off to rest. "I'm absolutely exhausted," the 25-year-old told BBC Sport Scotland. "I was really hurting and I'm really glad that I'm finished, to be honest. "It's been a really long week and I just scraped the barrel there and the team helped me out. I'm just absolutely buzzing for the four of us, and the four that did the heat. It's been all of us coming together to get that bronze."

