content: |-
  Scotland claim an astonishing four gold medals during less than four hours of incredible Commonwealth Games drama on Wednesday.

  This video can not be played To play this video you need to enable JavaScript in your browser.

  Scotland claimed an astonishing four gold medals - and six in total - during less than four hours of incredible Commonwealth Games drama in Birmingham on Wednesday. Para-bowlers Pauline Wilson and Rosemary Lenton started the rush, the latter becoming Scotland's oldest gold medallist at the age of 72. Then, Sarah Adlington retained her +78kg judo title and became Scotland's first ever double judo gold medallist, before swimmer Duncan Scott added his second gold with a Games record in the 200m individual medley. And Eilish McColgan produced the most remarkable result of all to rampage to victory in the 10,000m and match her mother Liz's success in 1986 and 1990. And just for good measure, she did it in a Games record with her maw watching trackside.

  Those coruscating few hours were bookended by Adlington's team-mate Rachel Tytler taking bronze in the -78kg category, and Scott joining Craig McNally, Ross Murdoch - in the last races of their career - and Evan Jones to claim third in the 4 x 100m medley relay. It added an enormous dollop of polish to Scotland's standing. Medals have been surprisingly bountiful, but golds vexingly rare. Not any more. The nine won in Goal Coast four years ago are now in significant danger of being surpassed. The Birmingham tally now stands at 32, with seven gold, eight silver and 17 bronze after six of the 11 days. Just 12 more of any colour matches the amount of four years ago. Boxer Reese Lynch, Sam Hickey and Sean Lazzerini all won their quarter-finals earlier on Wednesday to secure at least another three bronzes, and will watch team-mates Lennon Mulligan, Matthew McHale and Tyler Jolly try to do the same on Thursday.

