title: 'Donald Trump: US border security ''our sacred obligation'' - BBC News'
date: '2018-12-22'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-46642820
content: |-
  The US president says any measure that funds the government must include border security.

  US President Donald Trump has said that any measure that funds the government must include border security.

  He is facing criticism over his failure to deliver on his key campaign promise to build a wall on the US-Mexico border.
