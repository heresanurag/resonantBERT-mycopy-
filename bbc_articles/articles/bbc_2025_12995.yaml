title: 'Watch: Moment South Korean man sets Seoul metro carriage on fire - BBC News'
date: '2025-06-27'
section: General
url: http://www.bbc.co.uk/news/videos/cn810xk11jeo
content: |-
  Authorities have released CCTV of an arson attack in Seoul on 31 May where six people suffered minor injuries.

  CCTV has captured the moment a South Korean man doused a metro carriage with flammable liquid before setting it on fire. The Seoul Southern District Prosecutors' Office has released footage of the arson attack which occurred on 31 May.

  Six people were injured during the incident, including smoke inhalation and a sprained ankle while trying to flee the train. No deaths were reported. A 67-year-old suspect has been charged with attempted murder and arson.
