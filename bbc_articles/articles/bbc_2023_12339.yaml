content: |-
  The 10-year-old girl was found dead in her home in Woking, Surrey, last week.

  What do we know about the case so far?

  More details about Sara's death are emerging as police have named the father, step-mother and uncle as the three people they want to speak to in connection with their murder inquiry. Urfan Sharif, his partner Beinash Batool and his brother Faisal Malik left the UK for Pakistan on Wednesday 9 August. They had booked the tickets the previous evening. Sara's body was then discovered in a house in Woking, Surrey in the early hours of Thursday. Surrey police say that Sharif also made a call to police from Pakistan shortly after his flight landed. This call led officers to the house in Woking, where Sara was then found.
