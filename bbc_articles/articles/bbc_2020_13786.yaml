title: 'Queen’s Christmas message 2020: ‘You are not alone’ - BBC News'
date: '2020-12-25'
section: General
url: http://www.bbc.co.uk/news/uk-55447416
content: |-
  The monarch makes her annual address in the Christmas Message to the Nation and Commonwealth.

  The Queen has broadcast her annual address in the Christmas Message to the United Kingdom and Commonwealth.

  She acknowledged the “difficult and unpredictable times” of the past year, saying “there is hope in the new dawn.”

  She also paid thanks to the efforts of health workers and community volunteers in the UK and around the world.
