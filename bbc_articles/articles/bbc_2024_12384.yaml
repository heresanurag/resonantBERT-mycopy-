title: Senior doctors accept pay deal in England - BBC News
date: '2024-06-19'
section: Health
url: http://www.bbc.co.uk/news/articles/cyjjkd2w2exo
content: |-
  The pay deal, worth up to 19.4% for some, comes after months of negotiations.

  Some senior doctors in England have accepted a pay offer from the government. It means speciality and associate specialist (SAS) doctors - medics who have finished junior doctor training but are not working as either consultants or GPs - have joined their consultant colleagues in ending their dispute. SAS doctors had not yet taken strike action, but had been threatening to do so. The pay deal is worth up to 19.4% and includes reform of the contract and changes to career progression. The announcement comes ahead of a planned five-day strike next week by junior doctors in the lead up to the general election. It will be their 11th walkout of the dispute. The BMA has asked for a 35% pay rise to make up for what it says is 15 years of below-inflation pay rises. Junior doctors received a pay rise averaging nearly 9% in the last financial year.

  The dispute with SAS doctors has been rumbling on for a year. There are around 13,000 of them working in the NHS in England, the overwhelming majority in hospitals. Dr Ujjwala Mohite, chair of the BMA’s SAS Committee, said the deal marked “significant progress” in helping keeping more SAS doctors in the profession. “We entered this dispute with the Government almost a year ago - and today’s result is a step in the right direction in restoring SAS doctors’ value in the NHS. “A combination of burnout, eroded pay, stunted career progression, and being taken for granted by the government has seen many forced to leave the NHS altogether. “Many SAS doctors also suffer from grade-ism – the idea that, because they don’t fit into the traditional pathways, they are somehow not as important.” Health Secretary Victoria Atkins said she was delighted with the result, calling it a "fair deal" for the taxpayer. And she urged junior doctors to call off their strike, saying she would get back to negotiations after the election. "There is a deal to be done," she added. Pay disputes are also ongoing in Northern Ireland and Wales - although junior doctors, SAS doctors and consultants are currently considering a new pay offer in Wales.
