  Speaking before Draper's practice, Smith said: "I have to select the team to do what is best, not just for Wednesday, but also we have really important matches at the weekend. "We just have to weigh up risk versus reward a little bit. "We have four guys here who are more than capable of going out tomorrow if that's required and doing a really good job." British men's number one Draper produced the best performance of his career by reaching the last four in New York. His run came to an end when he lost to world number one Jannik Sinner, who went on to win the title, in the semi-finals on Friday. Draper was sick on court during the match, afterwards putting that down to the psychological stress of the occasion. "It's a question of figuring out where he is at with his energy; how much tennis he can play over the course of the week," Smith said.

  The British team, without Andy Murray for the first time since his recent retirement, has a different feel for the Finals group stage event. Evans and Skupski, who memorably teamed up to secure a "bonkers" doubles victory which put Britain through to the eight-team knockout stage in Manchester last year, remain in the squad alongside Draper. Harris - a late bloomer who has just moved to a career-high 101st in the world - and 28-year-old Wimbledon doubles champion Henry Patten are involved for the first time. British number two Cameron Norrie is missing through the arm injury which ruled him out of the US Open. Smith's squad face Finland, Argentina and Canada in the round-robin event at the AO Arena. The top two teams progress to the eight-nation finals which will be held in Malaga between 19-24 November.
