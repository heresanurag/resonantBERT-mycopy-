  US Open semi-finalist Jack Draper is left out of Great Britain's opening tie against Finland at the Davis Cup Finals group stage on Wednesday.

  Draper left out of GB team for Davis Cup opener

  Jack Draper is ranked 20th in the world

  US Open semi-finalist Jack Draper has been left out of Great Britain's opening tie at the Davis Cup Finals group stage against Finland on Wednesday. Draper, 22, only arrived in Manchester on Tuesday lunchtime and, after practising under the watchful eye of British captain Leon Smith later that day, has been given more chance to recover from his exploits in New York. Draper had strapping applied to his right thigh before hitting with British number 10 Charles Broom for about an hour at the Manchester Regional Tennis Centre. Billy Harris, who is the nation's highest-ranked player in Draper's absence, will make his Davis Cup debut aged 29. Dan Evans also plays in the singles before teaming up with Neal Skupski in the doubles.

