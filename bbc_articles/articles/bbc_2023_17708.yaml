title: Lady Leshurr says her career is ruined following assault case - BBC News
date: '2023-11-01'
section: London
url: http://www.bbc.co.uk/news/uk-england-london-67286179
content: |-
  The 35-year-old speaks out after being acquitted of assaulting her former girlfriend last year.

  Lady Leshurr had denied two counts of assault

  Lady Leshurr has said her "career has been ruined" after she was found not guilty of assault.

  The rapper, whose real name is Melesha O'Garro, had been accused of assaulting her ex-girlfriend Sidnee Hussein and Ms Hussein's then partner, Chante Boyea.

  A jury found the 35-year-old not guilty of two counts of assault occasioning actual bodily harm.

  Following the judgement, Ms O'Garro said she had been dropped from deals and not received any income for a year.

  The former Dancing On Ice contestant had told her trial at Snaresbrook Crown Court that Ms Boyea, a security officer, had attacked her first and used her Belgian Malinois dog Toby as a "weapon" during the incident in Walthamstow, north-east London, on 22 October 2022.

  Writing on the social media website Instagram, Ms O'Garro said: "For the past year I've been battling a court case from people that accused me of stalking, harassing, and biting them but I was the victim.

  "I was attacked and bitten by a dog and made out to be the aggressor."

  She added she had been left with "no income" and that her career had been ruined "regardless of the outcome".

