  The court had heard how the defendants flagged down Ms Boyea's car at about 05:00 BST as she was driving to work along Knotts Green Road in Walthamstow.

  Ms Boyea, who was training to become a dog handler at the time, told jurors that after she stopped, Ms O'Garro "bit down on my hand and from that point on she didn't let go".

  She said she had suffered nerve damage to her left hand as a result of the attack and could no longer hold a dog lead securely.

  "I will never be able to continue in that line of work again," she told the court.

  However, Ronnie Bergenthal, for Ms O'Garro, told jurors that doctors' notes did not specify that she had suffered nerve damage in references to her left hand being injured.

  The defence lawyer claimed Ms Boyea had also used her security dog in the boot of the car "as a weapon on Ms O'Garro", adding: "You were directing that dog to bite Ms O'Garro."

  Ms Boyea denied this, and said: "At no point did I throw punches or attack her or release the dog from the boot."

  Sherelle Smith, from Yardley, Birmingham, who had been accused of assaulting Sidnee Hussein after she tried to help Ms Boyea was also found not guilty.

  Lady Leshurr, from Kingshurst, Solihull, previously hosted a weekly show on Saturdays on BBC Radio 1Xtra.

