title: 'North Wales crash: Service held for teenagers who died - BBC News'
date: '2025-05-25'
section: General
url: http://www.bbc.co.uk/news/uk-wales-67500902
content: |-
  The impromptu service was held in the hamlet of Llanfrothen, in Gwynedd.

  An impromptu service has been held to commemorate the lives of four teenagers killed in a car crash.

  Wilf Fitchett, Jevon Hirst, Harvey Owen and Hugo Morris, from Shrewsbury, were found in an overturned, partially submerged car in Gwynedd, on Tuesday.

  The memorial was held at the cenotaph in the hamlet of Llanfrothen, near where their car was found. There was also a minute’s silence.

  BBC Wales' Nick Servini said from the scene: “The local community didn’t know the four teenagers from Shrewsbury but it doesn’t mean they haven’t felt their loss very deeply.”
