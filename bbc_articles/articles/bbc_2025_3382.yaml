content: |-
  As questions remain over how the tanker collision happened, here is a timeline of how it unfolded.

  'A massive ship came out of the blue': Sailor recounts how North Sea collision unfolded

  For the crew onboard the Stena Immaculate, the cargo ship which was about to plough into them seemed to just "come out of the blue". Within seconds, fires began to break out. Soon the flames were tearing through the jet fuel-laden vessel, triggering several explosions. More than 24 hours later, the other ship involved in the collision - the Solong - is still ablaze and drifting in the North Sea. BBC News has spoken to eyewitnesses who have recounted how the crash and evacuation unfolded over 30 life-or-death minutes.

  The Stena Immaculate - which was carrying fuel on behalf of the US military - was anchored outside the port of Hull and almost entirely stationary when it was hit at 09:48 GMT on Monday. An experienced American sailor who was on the oil tanker when it was struck gave CBS News, the BBC's US partner, a first-hand account. The sailor - who did not give his name as crew are not allowed to speak to the media - was standing close to the point of impact and had seconds to react.
  • None North Sea tanker collision - what we know so far He recalled hearing the shouts of his fellow crew members as they warned each other to brace. It felt as though the Solong was driving into the side of the Stena Immaculate for 10 minutes, the sailor said. Other crew members described how it appeared nobody was on the bridge of the Solong at the moment of the crash, he added. An investigation into the cause of the collision has only just begun but the transport minister said it is clear something went "terribly wrong".

  Data from MarineTraffic appears to show the Solong was travelling at 16 knots (18 mph). Flames immediately began erupting from the vessel, he said, and the crew jumped into action, putting on protective gear to battle the blaze. "Everybody had only seconds to react", the sailor said. It was a "textbook" operation for the crew who had trained for a disaster like this. Another sailor who was onboard the Stena Immaculate told BBC News he had been blindsided by the impact and described how the severity of the situation dawned on him. "My eyes were locked on the flames... all I did was still pretty foggy," he said. "I looked down, I saw the containers. I looked up, and I briefly saw that it was a ship, and then [I saw] the fire."

  Images of the Stena Immaculate taken on Tuesday reveal the extent of the fire damage

  That was when his training kicked in, he recounted, and he joined efforts to fight the flames. But it did not take long before they realised battling the inferno was hopeless and their ship was a lost cause. The decision was made to abandon.

  The Stena Immaculate's crew ran to their cabins to get what they needed. They grabbed emergency equipment and life jackets, before hurrying back to the pre-arranged mustering point. A headcount was carried out to ensure they had all made it to the lifeboats. As they climbed in, the fast-spreading flames were lapping at the sailors, creeping so close that they singed the hair of some of them. All 23 sailors got off the oil tanker safely and made it back to shore. The captain was the last to disembark. On Monday evening, some of the Stena Immaculate crew were in a Grimsby supermarket shopping for clothes. One told BBC News he left the vessel with nothing but his wallet and phone.

  Less is known about how events unfolded on the Solong, a Portuguese-flagged cargo ship which was sailing from Scotland to the Netherlands when it struck the Stena Immaculate. There were 14 crew members on board at the time, 13 of whom were brought back to shore. Coastguard vessels and aircraft were scrambled to search for the missing sailor.

