  But around 12 hours later, with the North Sea in pitch dark, the search was called off and the working assumption is now that the missing sailor was killed in the incident. His identity has not been publicly confirmed. On Tuesday afternoon, police said a 59-year-old man had been arrested on suspicion of gross negligence manslaughter, and the ship's owners subsequently confirmed the man was the Solong's captain. Meanwhile, the cargo ship was being held offshore by a tugboat in a safer position. But, according to the coastguard, it continues to burn.

