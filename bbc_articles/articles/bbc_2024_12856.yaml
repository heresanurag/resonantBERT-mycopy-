  Despite disagreeing with the decision, Koeman - who said he spoke to Taylor in the dressing room afterwards - said he could accept the outcome and was satisfied with a draw that leaves the Netherlands on four points after two games and in a strong position to reach the last 16. "France had better chances but not that many more," he added. "I personally thought the goal should have stood, therefore my takeaway from this is it is a fair result – I can accept this. "There were times during the game where we weren’t up to scratch and that is probably due to the fact we were up against a great opponent." Indeed, France had 14 shots without scoring, which is their most in a major tournament game without finding the net since the Euro 2016 final against Portugal, when they had 18. Netherlands face Austria in their final Group D game on Tuesday, 17:00 BST, at the same time France take on Poland, who have already been eliminated.
