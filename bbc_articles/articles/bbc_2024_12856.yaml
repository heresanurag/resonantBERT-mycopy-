title: 'Netherlands VAR disallowed goal: Should Xavi Simons'' effort have counted?
  - BBC Sport'
date: '2024-06-22'
section: European Championship
url: http://www.bbc.co.uk/sport/football/articles/c722px74pepo
content: |-
  Netherlands boss Ronald Koeman insists Xavi Simons' disallowed goal should have stood in the 0-0 draw against France at Euro 2024.

  VAR: Should Simons goal for Netherlands have counted?

  This video can not be played To play this video you need to enable JavaScript in your browser. Netherlands denied an opening goal as VAR rules out Simons strike

  Netherlands boss Ronald Koeman insisted Xavi Simons' disallowed goal should have stood as his side played out the first goalless draw of Euro 2024 against France in Leipzig. Goalscorer Simons, the Netherlands team-mates celebrating with him and a delirious Dutch crowd behind the goal were all convinced the 21-year-old had given Koeman's side the lead when he found the bottom corner in the second half. But the on-field officials, led by English referee Anthony Taylor, disallowed the goal because Dutch full-back Denzel Dumfries was in an offside position and deemed to be impeding France goalkeeper Mike Maignan. There was a lengthy check by the video assistant referee Stuart Atwell as fans inside the stadium, without the luxury of being able to see the replay, whistled in frustration until it was announced the on-field decision would stand. "I think the position of Dumfries is offside, that is true," said Koeman. "But he is not disturbing the goalkeeper and when that is not happening, it is a legal goal, in my opinion." The offside law states: "The attacking player is penalised for preventing an opponent from playing or being able to play the ball by clearly obstructing the goalkeeper's line of vision." The assistant referee flagged for offside, with Taylor and VAR Atwell ruling not to overturn the on-pitch decision. It was one of the first major talking points surrounding the use of VAR at the tournament - alongside Belgium's disallowed goal for a handball in their 1-0 defeat to Slovakia - especially regarding the time taken to reach a decision. "You need five minutes to check it, because it is so difficult?" added Koeman. "I don’t understand this. He is not disturbing the goalkeeper." France coach Didier Deschamps was, perhaps unsurprisingly, of the opinion the correct decision was reached. "I was a little taken aback by how long it took," he said. "Because, for me, when I saw the image on the screen for me it was a no brainer."

  Netherlands player Denzel Dumfries is stood in an offside position, far right, next to France goalkeeper Mike Maignan.

  A closer view of Dumfries next to Maignan - the officials rules he was impeding goalkeeper Maignan from being able to dive.

  The incident was similar to a handful of offside decisions given in the Premier League last season when a player was deemed to be in the eyeline or obstructing the goalkeeper, with Wolves having a 99th-minute equaliser against West Ham disallowed. Max Kilman's 99th-minute leveller was ruled out after Tawanda Chirewa was adjudged to be offside and blocking goalkeeper Lukasz Fabianski, therefore interfering with play. Wolves boss Gary O'Neil ended up with an £8,000 fine and touchline ban for his protests.

  This video can not be played To play this video you need to enable JavaScript in your browser. "France have been very fortunate" - BBC pundits on disallowed goal

  The former England strikers on BBC television coverage were in agreement with the Netherlands boss that the goal should have stood. "France have been very fortunate here," said Alan Shearer. "When you see the angle behind the goal, the goalkeeper cannot dive for that with the body position he was in. "He's not getting to that ball and Dumfries is not affecting him at all. I just don't think he's getting there at all." Gary Lineker added: "You have to decide whether the goalkeeper is impeded and he's not, clearly. He's a long way from Dumfries there, if he dived he could just about reach him." Wayne Rooney, along with former Spain midfielder Cesc Fabregas, suggested referee Taylor should have gone to look at the pitchside monitor. "He does actually make a small attempt to get the ball," said Rooney. "There's no way that should be disallowed, I think it's a goal and it was frustrating with how long it took. "If you go to the monitor at least the referee can make a decision and it's his own opinion." However, former Netherlands defender Mario Melchiot - after joking he did not like VAR - conceded that Dumfries was impacting Maignan's ability to save the ball. "I think normally when someone is stood in such a position, you think is he in the line of the ball? No. But the position he was in he could put the keeper off," he told BBC Radio 5 Live. "If this goal was scored against us I would have said the same thing."

