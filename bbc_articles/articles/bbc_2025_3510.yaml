  However Freeman insisted that chasing a four-try bonus point would not change how England approach the game. "I don't think it influences us as players, we know what we can control," he added. "We are aggressive with the ball and run with intent, that is all we can do, what happens happens. "If we get our game on, hopefully the tries come off the back of it. If that puts some sort of pressure on the other teams then that is a win." Freeman also revealed one thing has been unique in England's preparation however, with his rapping skills being called upon by head coach Steve Borthwick. "In the meeting yesterday Steve was talking about these buzzwords and they kind of rhymed a little bit, he noticed and asked us 'if there was to be a rap, who would you choose to rap?' "At Saints I did a rap once so one of the lads mentioned my name. So that was last night, stressing, sorting this rap out. "I did it this morning about our collision skills. It went down great, I ended up tearing into everyone and then tearing into myself."

