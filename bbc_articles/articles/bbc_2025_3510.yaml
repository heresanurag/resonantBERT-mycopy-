  Freeman is in a rich vein of try-scoring form, having crossed in each of England's games in the Six Nations this year. If he does so again against Wales on Saturday, he will become the first English player to score tries in every round of the Six Nations. France wing Philippe Bernat-Salles - in 2001 - is the only player to have achieved the feat since Italy's inclusion in the competition in 2000, although his compatriot Louis Bielle-Biarrey would also achieve the feat with a try when France play Scotland. Saturday's game will be Freeman's first experience of playing away at the Principality Stadium for England. "Having spoken to the lads about it, I know it is an awesome place to go, the crowd is electric with the roof on," he said. "I am really buzzing for it." As well as coming out on top in the usual fierce rivalry between the two nations, England hope they can end the day at the summit of the Six Nations table. Leaders France are a point ahead of England and have a vastly superior points difference to any other team. Ireland, in third, are a point behind England before taking on Italy in their final match.
