content: |-
  England wing Tommy Freeman says he is already preparing for a switch into midfield.

  Switch to centre 'definitely on the cards' - Freeman

  Freeman has scored six tries in 19 games since making his Test debut against Australia in 2022

  Coverage: Watch on BBC One, BBC Sport website and app, plus S4C via iPlayer. Text commentary and highlights on BBC Sport website and app. Listen live on BBC Radio Wales, BBC Radio Cymru, BBC Radio 5 Live.

  Wing Tommy Freeman says he is already studying how to play centre with a move into midfield "definitely on the cards" for England. All 19 of Freeman's Test appearance have come on the wing, but the 24-year-old regularly switched to outside centre for Northampton last season, starting there in Saints' Champions Cup semi-final defeat by Leinster. Ollie Lawrence, England's first-choice 13, suffered a season-ending Achilles tendon injury in Sunday's win over Italy, while the team have lacked a heavy-duty gainline-breaking midfield runner since Manu Tuilagi moved to French side Bayonne in 2024. "I have trained there and, in the week, I make sure I know all the roles there," Freeman told Rugby Union Weekly. "It is definitely on the cards. That option is there." Asked if he saw centre as a long-term positional switch, Freeman said "not right now" while revealing there were aspects of playing centre that were more enjoyable than being on the wing. "You get a lot more touches being one in, and I like to create things as much as finish them," he added.

