id: bbc_2018_3770
title: Last male northern white rhino dies in Kenya - BBC News
date: '2018-03-20'
section: General
url: http://www.bbc.co.uk/news/world-africa-43471837
content: |-
  Sudan died in a Kenyan conservancy at the age of 45, after months of ill health.

  His death at the age of 45 leaves only two females - his daughter and granddaughter - of the subspecies alive in the world.

  Hope for preserving the northern white rhino now lies in developing in vitro fertilisation (IVF) techniques.
