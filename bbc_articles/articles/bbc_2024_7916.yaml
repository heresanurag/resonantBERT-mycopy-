title: Iran suffered 'double defeat' - Lord Cameron - BBC News
date: '2024-04-17'
section: General
url: http://www.bbc.co.uk/news/world-middle-east-68815655
content: |-
  The UK foreign secretary says Iran carried out a very significant attack, "but fortunately, it was a failure".

  Foreign Secretary David Cameron has said Iran has suffered a "double defeat" after its attack on Israel failed.

  Speaking to BBC Breakfast, he said the Iranian regime has revealed its true nature to the world.
