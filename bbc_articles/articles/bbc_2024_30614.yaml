title: Rare dinosaur trio fetches £12.4m at London auction - BBC News
date: '2024-12-13'
section: Science & Environment
url: http://www.bbc.co.uk/news/articles/ceqlj97nq0jo
content: |-
  The skeletons - two Allosaurus and one Stegosaurus - date back approximately 150 million years.

  The juvenile and adult Allosaurus sold for £8.130m ($10.3m)

  Fossils from a trio of dinosaurs have sold for more than £12m at auction. The prehistoric skeletons, which date back approximately 150 million years, fetched £12.4m ($15.7m) at Christie's in London. All three skeletons - two Allosaurus and one Stegosaurus - were excavated from the same site in Carbon County, Wyoming and travelled to London in 12 crates, where they were rebuilt. James Hyslop, Head of Science & Natural History at Christie's, said: "It is humbling to stand in the presence of these ancient giants and marvel at the wonders of our Earth's past."

  The Allosaurus and Stegosaurus fossils represent two of the most recognisable dinosaurs from the Late Jurassic era, approximately 150 million years ago. The Allosaurus, often seen as a precursor to the mighty Tyrannosaurus rex (T. rex), was a paramount predator in its day, notable for its sharp claws and a powerful bite. Meanwhile, the Stegosaurus is seen an iconic herbivore, whose armoured plates and spiked tail helped it to defend itself against predators and adapt to a challenging environment.

  "There is no complete dinosaur skeleton" explained Mr Hyslop, so all three fossils have been enhanced with cast, sculpted, 3D-printed materials, and are displayed on custom frames. In terms of fossils, the Stegosaurus has around 144 bone elements; the adult Allosaurus has about 143, with the juvenile version having 135. Dinosaur bones can sell for millions, but auction sales have been criticised by some experts, who argue that fossils often end up in private collections which then denies researchers - and the public - any access to these significant discoveries. "The problem is these specimens go on sale for huge amounts of money, far more than museums can afford," Dr. Susannah Maidment, from London's Natural History Museum, told the BBC in 2019. However Mr. Hyslop claimed, in his experience, "the majority of private collectors active in this area are keen to share their passion". "In the case of the two most recent dinosaurs sold at Christie's - Stan, the T-Rex, and a raptor skeleton - both are now in the care of museums, or on public display," he said.
