  Sir David Attenborough's impassioned speech at the NTAs was all about protecting "our beautiful world".

  This video has been removed for rights reasons.

  Protecting "our beautiful world" was at the heart of Sir David Attenborough's National Television Awards acceptance speech.

  He and the team behind Blue Planet II picked up the Impact Award.

  The BBC One series has been credited with changing people's perceptions towards plastics and influencing UK government environmental policy.
