id: bbc_2018_361
title: 'CES 2018: iKeyp smart safe proves easy to crack open - BBC News'
date: '2018-01-10'
section: General
url: http://www.bbc.co.uk/news/technology-42634501
content: |-
  Tests of a smart safe on show at the CES expo suggest it is relatively easy to steal its contents.

  An internet-connected safe is being promoted at the CES trade fair as a smarter way to keep valuables safe.

  The device comes with its own theft-detection alert app and promises "peace of mind".

  But when BBC Click's Lara Lewington put it to the test she made some worrying discoveries.

  An earlier version of this video that showed the app failing to trigger a theft alert was due to user error rather than a fault with the product.

