  "What's been done can't be undone, but there can be accountability," he said.

  Asked to describe his emotional state, his lawyer Joseph Norwood told BBC News: "Obviously elation."

  "The thought of being confined in prison for 50 years for something you had nothing to do with has to just be one of the worst things for a person's mental state," Mr Norwood said in an interview on Thursday.

  But Mr Simmons was diagnosed with stage four cancer as he was being released, says the attorney.

  "So it was a mix of elation, gaining his freedom, gaining his name back, clearing his name," said Mr Norwood, adding that Mr Simmons was now responding well to chemotherapy and was "on the mend".

  "So it's been a heck of a ride."

  Mr Simmons is currently battling liver cancer, according to his GoFundMe, which has raised almost $200,000 (£157,000) to help support his living costs and medical treatment.

  A district court vacated his sentence in July after finding that prosecutors had not turned over all evidence to defence lawyers, including that a witness had identified other suspects.

  Mr Simmons and Mr Roberts were convicted in part because of testimony from a teenager who had been shot in the back of the head. The teenager pointed to several other men during police line-ups and later contradicted some of her own testimony, the National Registry of Exonerations said.

  Mr Roberts was released on parole in 2008.

  Wrongfully convicted people who serve time in Oklahoma are eligible for up to $175,000 in compensation.
