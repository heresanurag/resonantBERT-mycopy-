id: bbc_2025_1847
title: 'New Zealand: Seven churches targeted in suspected arson spree - BBC News'
date: '2025-02-22'
section: World
url: http://www.bbc.co.uk/news/articles/cly6v3l9dm2o
content: |-
  Four churches were burned while evidence suggests three more were targeted but did not catch fire.

  Emergency services were called to the fires early on Saturday morning

  Seven churches have been targeted in a suspected arson attack that occurred overnight in New Zealand. Four churches in the town of Masterton, north of the capital Wellington, sustained "moderate to significant" damage, while evidence was found to suggest three more buildings had been targeted but did not catch fire. Crews from across the Wairarapa region responded to the fires at about 04:30 local time on Saturday (15:30 GMT on Friday). "The fires are being treated as suspicious and have been referred to police," a Fire and Emergency spokesperson said. No arrests have been made.

  The Anglican Church Of The Epiphany, St Patrick's Catholic Church Masterton, Masterton Baptist Church and Equippers Church Masterton were all set on fire, authorities said. Descriptions of broken windows, burnt chairs and scorched upholstery have been reported in local media. All fires have been extinguished and no-one was injured. Masterton Mayor Gary Caffell said the apparent attacks had shocked the community, adding that they had come out of the blue. He told local media: "You just don't expect something this sort of thing to happen, and particularly in a place like Masterton." Local MP Mike Butterick expressed his "deep sorrow" and described first responders as "heroes" in a statement. A funeral home in the same area which contains a chapel was also set on fire at around 10:00, but no one was in the building. Police remain at the scene and are asking witnesses to come forward. Officers will also be conducting patrols in Masterton to reassure residents throughout Saturday, and in the nearby towns of Featherston and Carterton. A video circulating on social media shows a man claiming responsibility for the attacks, expressing anti-religious and anti-monarchist sentiments. Police and Fire and Emergency New Zealand have been approached for further comment. Religious buildings in New Zealand have suffered a spate of arson attacks in recent years. Last year, a church property in Auckland was subjected to two arson attacks in the same night. A mosque was also set on fire in the same area in November. In 2019, 51 people were murdered at two mass shootings in mosques in Christchurch. The man responsible Brenton Tarrant said he had also planned to burn down the mosques, wanting to "inflict as many fatalities as possible".
