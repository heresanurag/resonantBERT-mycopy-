title: Dame Mary Berry moved to tears by William's 90th birthday wishes - BBC News
date: '2025-03-24'
section: Culture
url: http://www.bbc.co.uk/news/articles/cwyezz8zqe7o
content: |-
  The Prince of Wales is among those sending 90th birthday messages to the "true national treasure".

  This video can not be played To play this video you need to enable JavaScript in your browser.

  Dame Mary Berry is celebrating her 90th birthday on Monday, with the Prince of Wales among those marking the milestone by sending messages to the "true national treasure". Prince William's birthday wishes to the TV chef will be shown on a special pre-recorded episode of BBC One's The One Show later. The One Show host Alex Jones told BBC Radio 2: "We had lots of messages throughout the programme for Mary - but one in particular blew her away. I mean, there were tears before we'd even started." In his message, the prince tells Dame Mary: "I want to wish you a very happy 90th birthday. You are a true national treasure and we've loved working with you over the years."

  "I dread to think who's cooking your cake and the criticism they might get but good luck and I hope it goes really well." The One Show's birthday party does involve a cake - made by fellow celebrity chef Monica Galetti.

  Claudia Winkleman, who has appeared on a string of shows with Dame Mary over the years, joined her on the One Show sofa

  Claudia Winkleman will also appear, as will Dame Mary's former Great British Bake Off co-stars Mel Giedroyc and Sue Perkins. "We have got lots of guests that have touched her life over the years. "Claudia is on because they did a show together and they're great friends. "And then we may have two ladies who were on a very popular programme with her on BBC One. Dame Mary has also marked her birthday by joining Instagram, external for the first time.
