title: Moldovan president's dog bites hand of visiting Austrian president - BBC News
date: '2023-11-17'
section: General
url: http://www.bbc.co.uk/news/world-europe-67453626
content: |-
  Video shows Austria's president being bitten by the Moldovan leader's three-legged canine.

  Footage shows the Moldovan president's dog biting the hand of Austria's President Alexander Van der Bellen.

  President Maia Sandu had been walking with Mr Van der Bellen in the grounds of the presidential residence in the capital Chisinau, when he tried to pet her dog and the etiquette faux-pas occurred.

  The dog, a rescue called Codrut, had been frightened by the number of people nearby, President Sandu said.

  President Van der Bellen was later seen with a bandaged hand and posted a video on X, formerly Twitter, saying that he was a dog lover.
