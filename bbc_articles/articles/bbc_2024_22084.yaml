title: Sheriff describes moment suspect apprehended at Trump golf course - BBC News
date: '2024-09-16'
section: General
url: http://www.bbc.co.uk/news/videos/cvgllpz6wqyo
content: |-
  Palm Beach County Sheriff Ric Bradshaw told reporters that a Secret Service agent had spotted an AK-47-style weapon poking out of the bushes.

  The local sheriff has described the moment a suspect was apprehended after what the FBI has said "appears to be an attempted assassination" on former US President Donald Trump.

  Palm Beach County Sheriff Ric Bradshaw told reporters that a Secret Service agent had spotted an AK-47-style weapon poking out of bushes on the golf course about a hole ahead of where Trump was playing, and engaged the suspect.
