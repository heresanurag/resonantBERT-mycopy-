id: bbc_2018_13306
title: 'Theresa May: Cabinet has backed draft Brexit plan - BBC News'
date: '2018-11-14'
section: General
url: http://www.bbc.co.uk/news/uk-politics-46214045
content: |-
  The Prime Minister speaks after a meeting with her cabinet on the draft UK-EU agreement.

  In a statement outside 10 Downing Street after a five-hour Cabinet meeting, Prime Minister Theresa May said that Cabinet has agreed the draft Brexit withdrawal agreement.

  Mrs May said she believed the draft agreement was "the best that could be negotiated".
