title: All Grenfell deaths were avoidable - inquiry chair - BBC News
date: '2024-09-04'
section: General
url: http://www.bbc.co.uk/news/videos/ckgw0nz8r70o
content: |-
  The Grenfell Inquiry found that residents were "badly failed" for years.

  The chair of the Grenfell Inquiry has said that the deaths of all 72 people who were killed in the fire at the building were avoidable.

  Delivering his final statement seven years after the fire, chairman Sir Martin Moore-Bick said the tower residents were "badly failed over a number of years" by those responsible for ensuring their safety.
