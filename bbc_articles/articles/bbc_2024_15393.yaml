title: Burial operation for pod of 77 whales in Sanday under way - BBC News
date: '2024-07-16'
section: NE, Orkney & Shetland
url: http://www.bbc.co.uk/news/articles/cv2gd0wwyreo
content: |-
  The Orkney incident is thought to have been the largest mass stranding for decades.

  Dozens of whales died on a beach in Sanday

  The burial operation for a pod of 77 pilot whales that died after washing ashore in Orkney is under way. The animals were found on the island of Sanday last Thursday, in what is thought to have been the largest mass stranding for decades. About a dozen that were still alive were euthanised. The carcasses are being buried at multiple land sites, which were approved after tests were carried out to prevent any possible disturbance to archaeological sites. It is hoped the burials will be completed by Wednesday.

  The pod included male whales measuring up to seven metres (22ft) long, along with females, calves and juveniles. Cetacean experts - whose specialty is aquatic mammals - have been examining tissue samples in a bid to establish the cause of the stranding. The whales were healthy before they came ashore, according to initial findings. Disposal of the carcasses at sea was ruled out, following advice from environmental regulators.

  Hayley Green, Orkney Islands Council’s corporate director of neighbourhood services and infrastructure, said it had been "challenging" to identify eight suitable sites for burial. “Sanday is a land rich in archaeology and protected bird and wildlife species," she said. "However, thanks to the community I am pleased to report that this has now been achieved and those sites have already been cleared for use." She added: "We hope that the burials will be completed today, or by Wednesday at the latest. "We would respectfully ask that people stay away from the burial activity for their own safety and stress that this will not make for pleasant viewing."

  Local farmers have been assisting with the burial operation. Digging equipment and trailers are being used, including further equipment which arrived by ferry on Tuesday. The Scottish government said the responsibility for disposal of whales less than 25ft in length rested with councils, external. “However in exceptional circumstances we will consider what support can be provided to local authorities affected on a case by case basis," a statement added. Pilot whales are social creatures and live in a matriarch-style social structure, with the oldest female viewed as having the authority in the pod. The stranding is thought to be the largest UK stranding since 1927. Last year an entire pod of 55 pilot whales died following a stranding on Lewis.
