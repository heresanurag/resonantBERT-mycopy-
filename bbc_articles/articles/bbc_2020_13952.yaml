content: |-
  It is the second week running that the reproduction number of virus transmission has been below 1.

  US travel spiked over Thanksgiving despite warnings

  As coronavirus spread across the US last month, health officials urged people to refrain from travel to see friends and family over the Thanksgiving holiday. But data shows that millions of Americans ignored these calls. While air travel was much lower than in previous years, airports still reported some of their busiest days since the start of the pandemic. The US Transportation Security Administration said it had screened over one million passengers on several days during the holiday period. Experts have warned the US could see "surge upon surge" of Covid-19 cases as a result, while the US Centres for Disease Control and Prevention warned that even a small number of infected travellers could lead to hundreds of thousands of new infections. Meanwhile vehicle travel surged around Thanksgiving, peaking at only around 5% less than last year, according to transport analytics firm Streetlight Data. The company's founder, Laura Schewel, told the Associated Press that this showed "people were less willing to change their behaviour than any other day during the pandemic”. Officials have made similar calls for people to avoid travel over Christmas and New Year period, as hospitalisation numbers soar to record highs. Read more: Millions travel for Thanksgiving despite warnings
