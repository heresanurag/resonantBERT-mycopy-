  China tariffs may be cut to seal TikTok sale, Trump says

  Trump previously called for TikTok to be banned but now has an account on the platform

  US President Donald Trump says he may cut tariffs on China to help seal a deal for short video app TikTok to be sold by its owner ByteDance. Trump also said he was willing to extend a 5 April deadline for a non-Chinese buyer of the platform to be found. In January, he delayed the implementation of a law passed under the Biden administration to ban TikTok. The legislation, which was signed into law in 2024, cited national security grounds for the sell or be banned order.

  "With respect to TikTok, and China is going to have to play a role in that, possibly in the form of an approval, maybe, and I think they'll do that," Trump told reporters on Wednesday. "Maybe I'll give them a little reduction in tariffs or something to get it done," he added. Trump also said he expected at least the outline of a deal to be reached by the 5 April deadline.
  • None What does Trump's executive order mean for TikTok and who might buy it? In response to the comments, a spokesman for China's foreign ministry said Beijing "has repeatedly stated its position. China's opposition to the imposition of additional tariffs has always been consistent and clear". Trump made the comments after announcing new import taxes of 25% on all cars and car parts coming into the US in a move that threatens to widen the global trade war. The BBC has contacted TikTok for comment. The biggest sticking point to finalising a deal to sell the TikTok business, which is worth tens of billions of dollars, has always been securing Beijing's agreement. Trump has previously tried to use tariffs as leverage in the negotiations. On his first day back in the White House, on 20 January, the president threatened more import duties on China if it did not approve a TikTok deal. The hugely popular app is used by around 170 million Americans. Trump, who called for TikTok to be banned in his first term as president, now has an account on the platform. He has more than 15 million followers and has said he received billions of views on the app during his presidential election campaign. Separately, the US increased levies on all imports from China to 20% this month. That doubled the tariffs Trump imposed on the world's second largest economy on 4 February. On 10 February, China responded with its own tariffs, including a 10-15% tax on some US agricultural goods. Beijing has also targeted various US aviation, defence and tech firms by adding them to an "unreliable entity list" and imposing export controls. The 10% levy doubled to 20% on 4 March. China has urged the US to return to dialogue with Beijing as soon as possible.
