content: |-
  Senator Mike Lee, who later tested positive for Covid-19, seen hugging other attendees at a White House event.

  Senator Mike Lee, who later tested positive for Covid-19, was seen hugging other attendees at a White House event on 26 September.

  Several people who also attended are now confirmed to have the virus – including President Trump – although it is unclear exactly where and when they caught it.

  Read more: White House event under scrutiny over virus spread
