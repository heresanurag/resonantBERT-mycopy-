title: Welsh cyclist completes 'dream' ride across the world for charity - BBC News
date: '2025-05-04'
section: Wales
url: http://www.bbc.co.uk/news/articles/c93gexlek8vo
content: |-
  Nathan Hurley has ridden 16,250 miles (26,000km) across 26 countries from Wales to Australia.

  Nathan Hurley has completed his cycle from south Wales to New South Wales

  TV viewers may be glued to the new series of Race Across the World - but one adventurous cyclist has just completed his own remarkable ride across the globe. Nathan Hurley of Blackwood in Caerphilly county set off on his bicycle from Cardiff on 1 March - St David's Day - 2024. More than 14 months, 26 countries and 16,250 miles (26,000km) later, he has arrived in Sydney. The "exhausting" journey from south Wales to New South Wales is a "dream come true" for Nathan and has so far raised £4,000 for the Multiple System Atrophy (MSA) Trust.

  The self-confessed "urban dweller" admitted setting off with a tent, stove and a blow-up pillow was a daunting prospect. Nor was he a particularly good or keen cyclist having almost fallen off his just 50m (164ft) into the ride leaving his nervous parents looking on with their heads in their hands. "One of the challenging things is being on your own," he said from Sydney. "I've been racking up 60 to 80 miles and sometimes up to 10 hours on the saddle each day but it's taken a lot mentally as well as physically. "I'm not an outdoorsman and out of all of my friends I'm the guy who doesn't do adventure well. I always forget something. "I like my flat whites and eggs benedict so it's been a real struggle when I've been out there camping and cooking."
