title: 'Iowa: Time-lapse footage shows multi-car pile-up - BBC News'
date: '2018-02-08'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-42979558
content: |-
  Around 70 cars were involved in a multi-car crash that has left one person dead and dozens injured.

  A traffic camera shows how motorists in Iowa battled with rough driving conditions.

  One person was killed and dozens were injured.
