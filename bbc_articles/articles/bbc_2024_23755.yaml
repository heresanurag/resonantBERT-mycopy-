  The pair appear in court along with a man over the death of Jahziah Coke.

  Teens in court accused of stab murder of boy, 13

  Jahziah Coke died after being attacked at his home on Lovett Avenue, in Oldbury, on Thursday

  Two teenage boys have appeared in court charged with murder over the fatal stabbing of a 13-year-old inside his home. Jahziah Coke died after he was attacked on Lovett Avenue in Oldbury, West Midlands, at about 16:00 BST on Thursday. A man in his 40s, arrested on Monday, has been charged with assisting an offender. All three defendants appeared at Birmingham Magistrates' Court earlier.

  The teenage boys, who cannot be named for legal reasons and whose ages have not been revealed, were remanded into youth detention. They are due to appear next before Birmingham Crown Court on Thursday.

  Police officers are appealing for anyone with information, such as doorbell or CCTV footage, to come forward

  The number of people permitted at their hearing was restricted. As the teens were taken away, a woman said "stay strong" and passed on her love, to which one of them responded: "I love you too." The charged man, who also cannot be named for legal reasons and appeared in a separate hearing, was remanded into custody. He is due to appear next at the same court on 1 October. Paying tribute, Jahziah's mother described her son as a "polite, kind and family-orientated young man". “He was very loving and always smiling," she said. "His smile would light up the room." West Midlands Ambulance Service said the boy had received treatment from paramedics but died at the scene. Bouquets of flowers, candles and balloons have been left outside the house. Police officers are continuing to appeal for anyone with information to come forward. "We have been carrying out CCTV inquiries in the area, but also need to hear from anyone with dashcam, doorbell, CCTV or phone footage that might help the investigation," a force spokesperson said.
