title: Wales women's over 65s hockey team win silver in World Cup - BBC News
date: '2024-11-24'
section: Wales
url: http://www.bbc.co.uk/news/articles/ckg0e5dkmnro
content: |-
  Hockey players who first wore the Wales jersey together in 1977 have now reunited in New Zealand.

  Twins play for Wales again almost 50 years later

  Twin sisters Ms Satterley and Ms Cornell played hockey together in their teens and now again in their 60s

  Twin sisters who played for Wales almost 50 years ago have reunited in their country's colours - and taken World Cup silver. Jean Satterley, who is now 66, started playing hockey when she was 12 with twin sister Jan. The pair, from Swansea, first played for Wales in 1977 as schoolgirls. They have just taken silver at the Masters Hockey World Cup in Auckland, New Zealand, where Wales' over-65s team competed with players from 23 other countries.

  Ms Satterley said the team was "still coming down" from their win on the other side of the world. While playing for Wales schoolgirls together in 1977, the sisters were joined by Judith Williams and Janet Millar - who were also representing Wales again 47 years on. The self-funded event took place between 7 and 16 November, with Wales missing out to England for gold in the over-65s category.

  Wales' over 65s hockey team travelled all the way to New Zealand for the world cup

  "It's been really special to all play together all these years later," said Ms Satterley. The over 65s played six matches in total - beating Argentina, Scotland, the USA and Australia - to reach the World Cup final, where they lost 7-0. "When we went up to collect them [medals] it seemed the rest of the world teams were cheering and shouting for us," she said. "An incredible moment. We're still coming down from it." Age categories for over 45s, 50s, 55s, 60s, 65s and 70s for both men and women, saw thousands of players take part.

  The four started playing hockey together again for the Welsh Masters team at the age of 60

  "For many of us this is our first time in New Zealand and it's been fantastic," said Ms Satterley. "Everyone has been so welcoming, and despite us losing out we're all really pleased with how we did." It was a sweet moment, after she had been one of the players who waited decades before receiving her cap for playing for Wales, in 2023. Speaking of the delay, Ms Satterley said: "It's hard to understand how in every sport in Wales, players, mainly men, get a cap for each game and I have only ever had one." She played 40 times for the Welsh senior team but said other male sports remain much better funded. "I get the caps in numbers but not physical recognition, so it has made up a little bit for the delay in getting the cap," Ms Satterley added.

  Their first time playing for Wales in 1977, the twin sisters are pictured front row holding hockey sticks

  Many of the women involved still work part-time and managed to arrange the trip to New Zealand through fundraisers - bringing in £4,000 to help with their travel costs. It was not the first time the four friends have gained a silver medal either - as part of the over 60s team, they came second in the European Cup in Antwerp, Belgium, in 2019. Next on the agenda is taking part in trials in the new year and preparing for home internationals in Swansea next May. "It will be lovely to get to play on home turf," Ms Satterley said. But for now, the team will continue travelling around New Zealand before heading home.
