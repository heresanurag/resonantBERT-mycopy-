title: Are AI-created recipes hard to swallow? - BBC News
date: '2024-08-29'
section: Business
url: http://www.bbc.co.uk/news/articles/cl7y71krnjvo
content: |-
  Chefs are increasingly using AI to dream up new food combinations, but the results are mixed.

  Dodo Pizza did not put the AI-created blueberry and breakfast cereal pizza on sale

  Can AI help restaurant owners come up with tasty new menus to tempt customers, or is this just a recipe for disaster? "We asked [popular AI chatbot] ChatGPT to create a recipe - the best pizza for Dubai," says Spartak Arutyunyan, who heads menu development for the city’s branch of restaurant and delivery chain Dodo Pizza. "And it did create a recipe. We launched it, it was actually a huge hit, and it's still on the menu.” With 90% of Dubai's three million people being immigrants, "there's so many cultures here", says Mr Arutyunyan. "Indians, Pakistanis, Filipinos, Arab people, European guys."

  He asked ChatGPT to come up with a pizza that represented that cultural mix. Its response was a topping comprising Arab shawarma chicken, Indian grilled paneer cheese, Middle Eastern Za'atar herbs, and tahini sauce. And Dodo Pizza’s customers apparently cannot get enough of it. “As a chef, I wouldn't mix these ingredients ever on a pizza, but still, the mix of flavours was surprisingly good,” says Mr Arutyunyan. Yet other pizzas dreamed up by the AI did not make it to the menu, for example strawberries and pasta, and blueberries and breakfast cereal.

  Spartak Arutyunyan says the AI-created pizza they put on sale was a "huge hit"

  A world away in the US, Venecia Willis conducted a similar AI experiment at Dallas' Velvet Taco, where she is culinary director. She became "really curious" about AI, so she let ChatGPT loose on devising one of their tacos of the week. For prompts, Ms Willis says she told it to "use, like, eight ingredients, and it could only select one tortilla and one protein". Some recipe results were rather less than moreish. "There were some funky combinations, and I was like, I'm not really sure if red curry, coconut tofu and pineapple are going to be delicious together," says Ms Willis. But she made three of the recipes that looked more promising, and ultimately chose a prawns and steak taco to go on public sale. They sold 22,000 in a week. “I think AI is a great tool to use when you're in a bit of a creative slump, to get the brain going again – ‘that combination might actually work, let's try it’. The AI can suggest something maybe I wouldn't have thought of." But Ms Willis adds that she “wouldn’t go completely rogue with AI. There has to be a human element to validate recipes.”

  Venecia Willis says the AI came up with some "funky" taco suggestions

  Not everyone in the food trade loves the idea of AI though. London-based cocktail creator Julian de Feral says he avoids AI because it “seems very counter-intuitive”, with its choices lacking common sense. AI chatbots are “not magic”, warns Emily M. Bender, a linguistics professor at the University of Washington in Seattle. She says that they are instead systems for remixing text that was sourced from many places, including the internet. “If you can get ChatGPT to spit out something that looks like a recipe, then it's because there are recipes on the internet.” She adds that the chatbot could have grabbed the recipe from someone’s cookery blog, thereby decreasing their reader numbers, and their ability to make a living from subscriptions or advertising revenue.

  Still, UK supermarket chain Waitrose is using AI to spot rising food trends on social media. Currently these include “smash burgers” – crispy burgers made by squashing ground beef onto a super-hot pan – and “crookies” – a croissant filled with cookie dough and chocolate chips. "We saw smash burgers trending all over social media," says Lizzie Haywood, Waitrose's innovations manager. “Now three or four dedicated smash burger restaurants opening up in the UK has coincided with us launching our smash burgers.” As for crookies, she says the AI saw that the mention of them had “jumped 80 to 90% from last year on social media, and we managed to launch them into trial stores in three months".

  Waitrose uses AI to trawl the internet for food trends, such as crookies

  In Singapore, Italian expat Stefano Cantù has created an AI-powered app that can suggest recipes in response to you telling it what ingredients you have in your fridge and cupboards. In a nod to the app being powered by ChatGPT he has called it “ChefGPT”. "I'm Italian, so of course I cook stuff," says Mr Cantù, whose day job is at a software company. He says he came up with the idea “over a weekend” after asking ChatGPT for recipe inspirations. The app also has drop-down menus and toggles, to let a user specify tools they have in their kitchen, or if they're in a hurry or not a very good cook. The AI then comes up with a recipe and a picture of the dish. Mr Cantù says he got 30,000 users within a week and a half of launching last year. But then he got “quite a big bill from OpenAI”, the company behind ChatGPT. He now continues to pay OpenAI a regular fee for using its AI. Mr Cantù explains that this is a standard arrangement when a start-up like his builds its app on top of another company's technology. He adds that he is continuing to try to find “the right balance between advertising and subscriptions, and the right level of usage to give free users". And how he can “monetise free users without selling their data". Back in Dubai, Spartak Arutyunyan at Dodo Pizza says AI should be seen as more of a fun thing to use rather than something you’d base your entire menu around. Yet Dodo Pizza is now enabling customers in Dubai, who order via its app, to try using AI themselves to dream up unusual pizza toppings. And the firm says it aims to extend the AI function to its other branches around the world. Clarification 27 September: This article was amended to update a quote from Prof Emily M Bender providing a better explanation of how AI chatbots work.
