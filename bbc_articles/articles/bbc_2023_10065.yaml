  The government said courses that do not have "good outcomes" for students would include those that have high drop-out rates or have a low proportion of students going on to professional jobs. It will also look at potential earnings when deciding if a degree offers enough value.

  Prime Minister Rishi Sunak said: "The UK is home to some of the best universities in the world and studying for a degree can be immensely rewarding. But too many young people are being sold a false dream and end up doing a poor-quality course at the taxpayers' expense that doesn't offer the prospect of a decent job at the end of it."

  Nearly three-in-10 graduates do not progress into highly-skilled jobs or further study 15 months after graduating, according to the regulator, the Office for Students (OfS).

  The OfS already has the power to investigate and sanction universities in England which offer degrees falling below minimum performance thresholds - but the new rules would permit the regulator to limit student numbers for those courses.

  The current thresholds for full-time students doing a first degree are for:

  This announcement does not change these criteria, and other aspects of the policy are unclear, such as how many students may be denied a place at university in future and which subjects would be most affected.

  The Department for Education would not say which courses would be at risk of recruitment limits as this would be for the OfS to determine.

  Speaking on Radio 4's Today programme, Education Minister Mr Halfon said putting limits on underperforming degrees would mean those courses "will then improve".

  "Students will be able to make informed choices," he said. "If a course has poor outcomes they might choose to do another course at university, they may still decide to do that course but will have the recruitment limits on it."

  He suggested the OfS would use "existing powers" to look into poor quality courses, saying: "We can't order the Office for Students to do anything."

  Labour's shadow education secretary Bridget Phillipson said the announcement was "an attack on the aspirations of young people".

