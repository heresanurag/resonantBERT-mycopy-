title: Poor quality university courses face limits on student numbers - BBC News
date: '2023-07-17'
section: UK Politics
url: http://www.bbc.co.uk/news/uk-politics-66216005
content: |-
  Ministers will ask the regulator to restrict numbers on underperforming courses in England.

  The OfS says nearly three-in-10 graduates do not progress to highly-skilled jobs or further study 15 months after graduating

  Universities in England could be restricted in recruiting students to poor quality courses, under new government plans.

  Ministers will ask the independent regulator to limit numbers on courses that do not have "good outcomes".

  Education Minister Robert Halfon said imposing restrictions would encourage universities to improve course quality.

  Labour said the move would "put up fresh barriers to opportunity in areas with fewer graduate jobs".

  The advocacy group Universities UK said university was a great investment for the vast majority of students.

  A spokeswoman for the organisation warned any measures must be "targeted and proportionate, and not a sledgehammer to crack a nut".

