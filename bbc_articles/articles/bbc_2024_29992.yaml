  Crews managed to get inside the building after putting the fire out but found two bodies inside.

  Bodies of two people found after house fire

  The blaze in a first-floor maisonette flat affected the entire property, the fire service said

  Two people have been found dead following a house fire in Coventry. The blaze in a first-floor maisonette flat affected the entire property on The Coppice, Stoke Aldermoor, during the early hours, West Midlands Fire Service said. West Midlands Police said it was working to identify the two people found inside after it took fire crews 75 minutes to put the fire fully out. Firefighters wearing breathing apparatus "entered the property but very sadly, the bodies of two people were found inside," the fire service said. The ambulance service said nothing could be done to save either of the patients.

  Police and fire crews were working together to identify the cause. Twenty firefighters attended the scene and were called out at about 04:40 GMT. Investigation officers and a fire investigation dog were also there. BBC CWR reporter Adele Wilkinson, who was at the scene, said the street looked fairly normal apart from the police cordon which had closed the road. "There's a few police cars, police patrolling around the streets," she said.

  Emergency services were sent to the Stoke Aldermoor area in the early hours

  A West Midlands Ambulance Service spokesman earlier said: "Sadly, it quickly became apparent nothing could be done to save either of the patients and they were confirmed dead at the scene." It sent one ambulance, a paramedic officer and the trust’s hazardous area response team to the scene. Anyone with information is asked to get in touch with police.

  Police said officers were liaising closely with the fire service

