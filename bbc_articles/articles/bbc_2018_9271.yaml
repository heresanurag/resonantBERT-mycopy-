  Mr Kamara was a rapper in the music group Moscow17.

  He was friends with fellow rapper Rhyhiem Ainsworth Barton, who was found with fatal gunshot wounds in Warham Street in May.

  Mr Kamara was accused and cleared of murdering Abdirahman Mohamed - a brother of a member of a rival group, Zone 2 - alongside another member of Moscow17, Kevin Aka-Kadjo.

  The Met said "one line of inquiry is this being gang-related".

  Rhyhiem Ainsworth Barton, also part of the Moscow17 drill group, was found with fatal gunshot wounds in the same street in which Mr Kamara was stabbed

  In an interview earlier this year, Mr Kamara said music has influenced crime in London.

  Det Supt Helen Lyons said there is "a significantly increased police presence" in the area where Mr Kamara was murdered as enquiries continue.

  A police cordon was in place at the scene on Warham Street, Camberwell

