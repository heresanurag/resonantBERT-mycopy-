title: 'Drill rapper murder: Injured boy and man arrested - BBC News'
date: '2018-08-03'
section: London
url: http://www.bbc.co.uk/news/uk-england-london-45061937
content: |-
  A boy and man injured in a stabbing which left drill rapper Incognito dead have been arrested.

  Siddique Kamara was known by his rap name Incognito

  A boy and man injured in a stabbing which left a London drill rapper dead have been arrested on suspicion of murder.

  Siddique Kamara, also known as Incognito and SK, died of stab wounds on Warham Street, Camberwell, on Wednesday evening.

  The boy, 16, and man, 31, remain in hospital under arrest, police said.

  Two other men arrested near to the scene have since been released under investigation.

  Mr Kamara, 23, died of two stab wounds to the chest, a post-mortem examination revealed.

  The two suspects, who were airlifted to hospital, have non life-threatening injuries, the Met Police said.

  The Met put an S60 order in place on Friday night to give officers extra stop and search powers because of the "escalating violence" in Southwark and Lambeth.

