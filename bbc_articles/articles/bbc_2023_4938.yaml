  Police bodycam footage shows the moment Thomas Cashman is arrested on suspicion of murder.

  Police bodycam footage has been released showing the moment Thomas Cashman is arrested on suspicion of murdering nine-year-old Olivia Pratt-Korbel in her own home.

  Cashman asks Merseyside Police officers: "What have I done?"

  The 34-year-old later tells armed officers: "I ain't committed no offence youse are talking about."

