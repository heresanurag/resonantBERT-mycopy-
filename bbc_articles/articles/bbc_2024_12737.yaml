title: Body found in Norwich in search for missing Anthony Hill - BBC News
date: '2024-06-21'
section: Norfolk
url: http://www.bbc.co.uk/news/articles/c3ggj0lz20go
content: |-
  Police searching for a missing 37-year-old say they have spoken to his family.

  Anthony Hill was last seen on Monday morning

  Police searching for a missing school teacher in Norwich have found a body. Anthony Hill, 37, left his address on Plumstead Road East at about 07:45 BST on Monday before CCTV showed him at a Co-op store on Sprowston Road at about 09:58. Officers confirmed a body had been found in an area off Heathgate shortly before 20:00 on Thursday and the force said the death was not believed to be suspicious. Formal identification had yet to take place, but Mr Hill's family had been informed, police said.

  On Thursday, his wife Kayleigh Hill had said it was "reassuring" that so many people had helped with the search, which had been concentrated on the area around Mousehold Heath. Money-saving expert Martin Lewis had spoken of his devastation at the disappearance of Mr Hill, who had worked with him before pursuing a career in teaching and moving to Norwich. On Friday, he posted on social media with a "heavy heart". "My love to Ant's wife Kayleigh and their little girls," he told his 3.1 million followers on X, external. "I'm so sorry for all Ant's friends and his little pupils. I will remember you fondly Ant. "Also thanks to the thousands of you who shared the posts while Ant was missing, I know it gave succour to his family. RIP."
