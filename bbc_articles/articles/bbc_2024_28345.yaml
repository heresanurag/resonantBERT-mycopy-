title: Man pleads guilty following fatal Sunderland XL bully attack - BBC News
date: '2024-11-18'
section: England
url: http://www.bbc.co.uk/news/articles/crmz1vgwyxwo
content: |-
  Christopher Bell admits being the owner of an out-of-control XL bully which killed his neighbour.

  Ian Langley, 54, was attacked while he walked his puppy in Shiney Row, near Sunderland, on 3 October last year. Christopher Bell, 45, formerly of Maple Terrace, Shiney Row, appeared at Newcastle Crown Court. He pleaded guilty to being the owner of a dog which caused injury leading to death while dangerously out of control in a public place.

  Bell, now living in Hull, was granted bail and will be sentenced on 27 January. The charge named his dog as Titan - "an American bully XL". Officers shot the animal at the scene to protect the public, Northumbria Police said.

  Ian Langley, 54, suffered fatal neck injuries following the attack in October 2023

  Neighbours said Mr Langley, who was originally from Liverpool, was walking his Patterdale puppy, called Bow, when he was attacked. He died in hospital from injuries to his neck. A law introduced in February banned people from owning XL bully breeds without an exemption certificate. Det Ch Insp Jason Henry said Mr Langley's family had shown "significant strength" during the investigation. "This case highlights the very tragic consequences of what can happen when people fail to control dogs within their care."
