content: |-
  Jimmy Thelin's rollercoaster season is rewarded as belief and composure leads Aberdeen to Hampden triumph.

  Thelin feels warmth of Aberdeen fans again after cold winter

  To play this video you need to enable JavaScript in your browser. This video can not be played

  Winters in Aberdeen can be bleak. Winterfell has nothing on a dark, bitter night on Union Street. Especially if it's 25 January and all you have to warm you is a red and white scarf around your neck. The city's football team, magnificently unbeaten in their first 16 games across all competitions this season - including 15 wins, were in crisis. A cataclysmic collapse in form had delivered 10 defeats in 13 winless games, the most recent a grim 3-0 chasing at home by St Mirren. Fanciful dreams of title challenges had been switched for blind panic of relegation form. "Time to either adapt or die. Jimmy Thelin has a month at most to sort it out," said one angry fan before his side went on to lose 2-0 to Hibernian in their next game. Publicly, there was no panic, just a relentless message from Thelin, the club's calm and cool new manager, that the tide would turn again. It was hard to see it from outside, but inside the club, the Swede remained steadfast. Almost four months on to the day, Thelin's calm and cool was unceremoniously abandoned as he levitated above his Hampden technical area, punching the air as his side made history to lift the Scottish Cup for the first time in 35 years.

  It was a fairytale bookend to the most polarising football campaign that has possibly ever been but one that was rescued by one thing - belief. Not many outside of Thelin's inner circle held much of it for his team in Glasgow's south side against treble-chasing Celtic. Roundly beaten in their previous four meetings and fresh from a spluttering fifth-place finish. It was clear something needed to change for Saturday's final. Even as the contest unfolded, it was hard to see Thelin's masterplan. Sixteen per cent possession at half-time. No shots, no encouragement. Yet the former Elfsborg head coach's late substitutes and game plan hauled Aberdeen level and paved the way for a dramatic penalty shootout shock up there in the pantheon of historic wins in this famous old competition. "He's the best manager I've ever worked with," Dimitar Mitov, Aberdeen's heroic shootout goalkeeper, said. "It's his day-to-day basics of how he manages the team, how we train, the little details he puts into the team. "But the most important part - and I've never seen this before - is when we made it to the final, he always said 'when we win the final'. There were no ifs. And that mentality went to the boys. "Everybody starts saying when, not if. I think that was the turning point."

