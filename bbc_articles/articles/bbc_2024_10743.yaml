content: |-
  A selection of striking images from around the world, taken over the past seven days.

  A hydroelectric dam collapsed in southern Brazil after days of heavy rains that triggered massive flooding, killing more than 30 people. At least 500,000 people are without power across the state of Rio Grande do Sul. A drone view shows houses in the flooded area next to the Taquari River, in the city of Encantado
