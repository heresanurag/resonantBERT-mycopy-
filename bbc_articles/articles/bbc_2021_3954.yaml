title: 'Comic Relief 2021: Justin Bieber and Prince William lead Red Nose Day stars
  - BBC News'
date: '2021-03-20'
section: Entertainment & Arts
url: http://www.bbc.co.uk/news/entertainment-arts-56442606
content: |-
  And the Duke of Cambridge thanks the public for its "compassion and generosity" as £52m is raised.

  Justin Bieber's performance aired on the same day that he released his album, Justice

  Justin Bieber and the Duke of Cambridge were among famous faces who took part in this year's Red Nose Day on BBC One.

  The Canadian singer gave this year's Comic Relief charity fundraiser an exclusive performance of his latest song Hold On.

  Prince William thanked the public for its "compassion and generosity".

  Comic Relief had raised £52m by Saturday morning to help tackle hunger, homelessness, domestic abuse and mental health stigma.

