title: Are online bookings killing restaurants? - BBC News
date: '2018-10-01'
section: Business
url: http://www.bbc.co.uk/news/business-45009457
content: |-
  "No-shows" from online bookings are hurting restaurant profits, but eateries are fighting back.

  It's no secret that UK restaurants are struggling, with a clutch of big-name chains announcing closures in recent months due to weaker demand and rising overheads. But it seems another issue is adding to their woes - people not turning up for bookings.

  According to some estimates, "no-shows" account for 5-20% of total restaurant bookings across the country and can cost venues thousands of pounds a month.

  One example is the Beach House restaurant in Oxwich, Gower, south Wales, which reported having more than 100 last-minute cancellations over 10 days in April, "most of which were no-shows".

