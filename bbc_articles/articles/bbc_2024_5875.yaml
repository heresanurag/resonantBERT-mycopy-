content: |-
  The prime minister was defending the government's position a day after his MPs accused Beijing of "malicious" cyber campaigns.

  Anyone who arrives here illegally should not be able to stay, Sunak tells MPs

  We're still hearing from Labour's Diana Johnson, who says more than 33,000 people have arrived in the UK "irregularly" since the Illegal Migration Act came into force last July and asks if the PM is expecting to send them all to Rwanda. Sunak says there "will be choices about which cohorts to initially apply the policy to", adding "that's all in the planning work that's being done". Johnson says there are 33,000 people "in limbo" and asks again whether Sunak expects them to go to Rwanda. The PM says: "My general view - I probably wouldn't characterise it as being in limbo - is anyone who arrives here illegally should not be able to stay... and we will do everything that we can to remove them, either to their home country if it is safe to do so or a safe alternative like Rwanda." Johnson insists these people "are in limbo at the moment because they can't claim asylum and you're not able to tell me how many of the 33,000 you think will go to Rwanda". The two appear to disagree over precisely which immigration rules those 33,000 people fall under.
