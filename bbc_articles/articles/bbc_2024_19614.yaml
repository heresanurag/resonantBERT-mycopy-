content: |-
  The US pop star cancelled three concerts in Austria after an alleged suicide attack plot was uncovered.

  Taylor Swift says she felt ‘fear’ over Vienna attack threat

  Taylor Swift gave eight shows at Wembley Stadium in June and August

  Taylor Swift says the cancellation of her Vienna tour dates over an attack threat filled her with "a new sense of fear". In a post on Instagram, she said she felt "a tremendous amount of guilt" because so many people had planned on travelling to the shows. Three concerts were cancelled in the Austrian capital earlier in August as three people were arrested in connection with allegedly planning attacks inspired by the Islamic State group. The 34-year-old singer-songwriter finished the European leg of her Eras Tour on Tuesday at Wembley Stadium in London.

