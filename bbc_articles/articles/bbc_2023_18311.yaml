title: 'Philippines earthquake: Video shows chaos in shop as tremors hit - BBC News'
date: '2023-12-03'
section: General
url: http://www.bbc.co.uk/news/world-asia-67603527
content: |-
  Video shows violent tremors shaking goods off shop shelves and blowing out street lights.

  Videos show how violent tremors which hit the Philippines' southern Mindanao island shook goods from shop shelves, and blew out street lights.

  It is reported that at least one person was killed.

  Read more: Two powerful earthquakes hit the Philippines
