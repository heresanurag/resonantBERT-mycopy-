content: |-
  The firm is deciding whether to remain in Japanese ownership or return to its Northern American roots.

  Why retail giant 7-Eleven is on a rival's shopping list

  When the owner of 7-Eleven announced this week that it had received a buyout offer from a Canadian rival it triggered shockwaves in Japan. A Japanese company of this size has never been bought by a foreign firm. Historically, companies from Japan were more likely to buy overseas businesses. 7-Eleven is the world's biggest convenience store chain, with 85,000 outlets across 20 countries and territories. And it's been especially successful at selling itself as an option for a quick and cheap yet tasty meal, and in places where there is already an abundance of that, such as Japan and Thailand. "We have more stores than McDonald's or Starbucks," the chief executive of Seven & i Holdings, Ryuichi Isaka, told BBC News before the firm received the buyout offer. Around a quarter of those 85,000 shops are in Japan, while there are roughly 10,000 in the US.

  In comparison, Quebec-based Alimentation Couche-Tard, which operates the Circle K chain, has almost 17,000 stores in 31 countries and territories. More than half of its outlets are in North America. The approach valued Seven & i at more than $30bn (£23bn) before news of the preliminary offer emerged. 7-Eleven's shares jumped by over 20% on Monday, before giving up some of those gains the following day. Analysts point to the Japanese yen's weakness against the US dollar and other major currencies for helping to make Seven & i affordable. Along with the weakness of the yen, efforts by the Japanese government to promote mergers and acquisitions appear to be working, said Manoj Jain from Hong Kong-based hedge fund Maso Capital. However, the proposal is still at the preliminary stage and given the potential size of any deal it could face scrutiny from competition authorities.

  7-Eleven has been keen to capitalise on the popularity of the food it sells - a wide range, including rice balls, sandwiches, cooked pasta, fried chicken and dumplings. While in much of the world convenience stores are where people grab a bar of chocolate or a bag of crisps in an emergency, in Japan, shops like 7-Eleven are popular with visitors searching for culinary delights. These 7-Eleven dishes have turned the chain into a social media sensation in Asia. Dropping into a 7-Eleven store has even been touted as one of the top things to do in Thailand, where its ham and cheese toastie has become a TikTok hit. British singer Ed Sheeran is among the celebrities who have helped raise 7-Eleven's profile - a video of him trying snacks from a store in Thailand went viral.

