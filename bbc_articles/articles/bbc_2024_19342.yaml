  Mr Isaka has been aiming to repeat that success in the US and European markets as the company came under pressure from investors to sell some of its businesses and focus on the 7-Eleven brand. The firm has been updating its strategy so more stores could follow the approach of its Japanese shops. "What we found is that stores which sell fresh food are attracting many more shoppers," Mr Isaka said. "We want to grow with high quality - not just increase the quantity. We want to make sure customers are happy, and increase sales of each store whilst increasing the number of stores," he added.

  Seven & i has also been on a shopping spree. In January, it bought more than 200 stores in the US from petrol station chain Sunoco for around $1bn (£770m). In April, it bought back more than 750 stores from a franchisee in Australia. For most of its almost century-long history 7-Eleven was an American brand. Starting out in 1927 selling blocks of ice that were used to keep fridges cool, it later stocked essential items like eggs, milk and bread. At the time, the stores were open between 07:00 and 23:00 - hence the name.

  The first 7-Eleven store opened in Texas in 1927

  As the business grew, 7-Eleven began offering franchises outside the US. In 1974, Japanese retail firm Ito-Yokado struck a deal to open the country's first 7-Eleven. In 1991, it bought a 70% stake in the chain's US parent company. The founder of Ito-Yokado, Masatoshi Ito, who died in 2023 at the age of 98, is often credited with transforming 7-Eleven into a global empire. Ito-Yokado was renamed Seven & i Holdings in 2005 with the "i" in its name being a nod to Ito-Yokado and Mr Ito, who was by then the company's honorary chairman. Now, as the company decides whether it will remain under Japanese ownership or return to its North American roots, experts are wondering whether more of Japan's big firms could become takeover targets. There is now a "greater willingness of Japanese boards and management teams to accept offshore capital and be receptive to foreign approaches,” Mr Jain said. More foreign investors may now be encouraged to pursue their interest in Japanese companies, he added.
