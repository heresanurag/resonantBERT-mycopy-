title: Rare otter sighting recorded in London's Canary Wharf - BBC News
date: '2025-04-16'
section: General
url: http://www.bbc.co.uk/news/videos/cjdxymxxgdro
content: |-
  A wildlife expert says it is "absolutely fantastic" to see an otter in such a "highly urbanised" area.

  A rare otter sighting has been recorded in east London's financial hub Canary Wharf.

  The reclusive creature was spotted on a dock by a security camera owned by Hannah Green and Tom Hill, who live on a boat in the area.

  Elliot Newton, from rewilding organisation Citizen Zoo, said it was "absolutely fantastic" to see the otter in such a "highly urbanised" part of the capital.

  "This is a wonderful reflection of the recovery otters have experienced in recent decades, having faced near extinction in the mid-20th Century," he said.

