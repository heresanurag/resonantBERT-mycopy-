title: 'Paul Robson: Sex offender who fled HMP North Sea Camp recaptured - BBC News'
date: '2022-02-17'
section: Lincolnshire
url: http://www.bbc.co.uk/news/uk-england-lincolnshire-60382854
content: |-
  Paul Robson, 56, spent four days on the run after going missing from an open prison on Sunday.

  Police had said sex offender Paul Robson could be "anywhere in the country" and the public should not approach him

  A sex offender branded a "menace to females" has been recaptured after fleeing from an open prison.

  Paul Robson, 56 was given a life sentence in 2000 after he sexually assaulted a woman at knifepoint.

  He walked out of HMP North Sea Camp, in Lincolnshire, on Sunday and spent four days on the run.

  Robson was arrested in Skegness at about 09:30 GMT on Thursday after a call from a member of the public who recognised him, police said.

  Announcing his capture, Ch Supt Kate Anderson, from Lincolnshire Police, thanked members of the public who had shared the force's appeals to find Robson and reported potential sightings.

  "At this stage, we don't believe he had any accomplices or believe that he's committed further offences," she said.

  Officers had worked "tirelessly" in their search for Robson, she added.

  Further photos of Robson were issued as part of the force's appeals to locate him

  Police had issued several appeals to locate Robson since he absconded.

  Further images of him were released on Wednesday, with the force suggesting he may have changed his appearance.

  It is understood Robson was returned to a closed prison and will not be eligible to apply for parole for at least a further two years.

  A Ministry of Justice spokesperson said Robson would "face an uphill struggle proving he can ever be trusted to move to an open prison again".

  Robson, originally from Newcastle, was jailed at Oxford Crown Court for the attempted rape and indecent assault of his victim.

