  Graham Potter feels "ready" to return to football management as speculation links him with the England job.

  Potter ready for next job as he salutes Southgate

  Graham Potter played for clubs such as Stoke City and Southampton during his career

  Graham Potter says he is "ready" to return to football management amid reports he is being considered for the England job. Gareth Southgate resigned as manager on Tuesday, less than 48 hours after England lost 2-1 to Spain in the Euro 2024 final. Potter, 49, is being tipped as a viable successor to Southgate, with other possible contenders including Newcastle's Eddie Howe and England Under-21 coach Lee Carsley. Potter has not managed in football since he was sacked by Chelsea in April 2023. The former Ostersund, Swansea and Brighton boss said he had spoken to a number of clubs but was waiting for the "right opportunity". "Now I'm in that good place where I'm happy to be ready and looking forward to the next challenge," Potter told Sky Sports., external "I've had a great break. The journey from where I started to where I finished doesn't come for free. It involves moving three countries, with a young family, and all that comes with being a football manager. "It was important for me to take a break, reflect and re-energise. "It's been a good time to look at other things, other sports, other teams and visit places. "I feel really ready, really excited to be back when the right opportunity comes."

  Potter's first managerial appointment came in 2008 at Leeds Carnegie. Potter was asked directly about the England job when he received an honorary doctorate from Leeds Beckett University on Thursday. He told BBC Radio Leeds "today was not the day" to discuss it but that Southgate had "done a fantastic job" and "there isn't anyone in the country more respected in football than Gareth". Southgate was England manager for almost eight years. In that time he led the men's team to a World Cup quarter-final and semi-final and back-to-back Euros finals. Southgate said when he resigned: "It's time for change, and for a new chapter." The Football Association has begun its search for a replacement and intends to have a new figure in place "as soon as possible".
