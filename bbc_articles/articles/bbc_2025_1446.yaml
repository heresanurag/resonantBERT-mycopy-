title: 'Thutmose II: Last undiscovered tomb of Tutankhamun dynasty found - BBC News'
date: '2025-02-19'
section: World
url: http://www.bbc.co.uk/news/articles/c5ym30v356po
content: |-
  It is the first time a pharoah's tomb has been found by a British-led team since Tutankhamun's in 1922.

  This video can not be played To play this video you need to enable JavaScript in your browser. Watch: Egyptologists discover the the tomb of King Thutmose II

  Archaeologists have found the last undiscovered royal tomb of the 18th Egyptian dynasty, which included the famous pharoah Tutankhamun. The uncovering of King Thutmose II's tomb marks the first time a pharoah's tomb has been found by a British-led excavation since Tutankhamun's was found over a century ago. The British-Egyptian team located it in the Western Valleys of the Theban Necropolis near the city of Luxor. Researchers had thought the burial chambers of the 18th dynasty pharaohs were more than 2km away, closer to the Valley of the Kings.

  The entrance to the tomb of King Thutmose II, who ruled three-and-a-half thousand years ago

  The crew found it in an area associated with the resting places of royal women, but when they got into the burial chamber they found it to be decorated - the sign of a pharaoh. "Part of the ceiling was still intact: a blue-painted ceiling with yellow stars on it. And blue-painted ceilings with yellow stars are only found in kings' tombs," said the field director of the mission Piers Litherland. He told the BBC's Newshour programme he felt overwhelmed in the moment. "The emotion of getting into these things is just one of extraordinary bewilderment because when you come across something you're not expecting to find, it's emotionally extremely turbulent really," he said. "And when I came out, my wife was waiting outside and the only thing I could do was burst into tears." Mr Litherland, an honourary research associate with the University of Cambridge's archaeology department, said the discovery solved the mystery of where the tombs of early 18th dynasty kings are located. Researchers found Thutmose II's mummified remains two centuries ago but its original burial site had never been located.

  The King Thutmose II mummy lies in the National Museum of Egyptian Civilization

  The location and entry to the royal tomb of King Thutmose II who ruled three-and-a-half thousand years ago

  Thutmose II, whose reign is believed to have been from about 1493 to 1479 BC, was an ancestor of Tutankhamun. Tutankhamun's tomb was found by British archaeologists in 1922. Thutmose II is best known for being the husband of Queen Hatshepsut, regarded as one of Egypt's greatest pharaohs and one of the few female pharaohs who ruled in her own right. Mr Litherland said the "large staircase and a very large descending corridor" of the tomb suggested grandeur. "It took us a very long time to get through all that," he said, noting it was blocked by flood debris and the ceilings had collapsed. "It was only after crawling through a 10m (32ft) passageway that had a small 40cm gap at the top that we got into the burial chamber." There they discovered the blue ceiling and decorations of scenes from the Amduat, a religious text which was reserved for kings. That was another key sign they had found a king's tomb, Mr Litherland said. They set to work clearing the debris - expecting that they would find the crushed remains of a burial underneath. But "the tomb turned out to be completely empty", said Mr Litherland. "Not because it was robbed but because it had been deliberately emptied." They then worked out that the tomb had been flooded - "it had been built underneath a waterfall" - just a few years after the king's burial and the contents moved to another location in ancient times. It was through sifting through tonnes of limestone in the chamber that they found fragments of alabaster jars, which bore the inscriptions of the names of Thutmose II and Hatshepsut. These fragments of alabaster "had probably broken when the tomb was being moved," said Mr Litherland. "And thank goodness they actually did break one or two things because that's how we found out whose tomb it was."

  The team, from the New Kingdom Research Foundation and Egypt's Antiquities Ministry, who found the tomb

  The artefacts are the first objects to be found associated with Thutmose II's burial. Mr Litherland's said his team had a rough idea of where the second tomb was, and it could still be intact with treasures. The discovery of the pharaoh's tomb caps off more than 12 years of work by the joint team from Mr Litherland's New Kingdom Research Foundation and Egypt's Ministry of Tourism and Antiquities. The team has previously excavated 54 tombs in the western part of the Theban mountain in Luxor, and had also established identities of more than 30 royal wives and court women. Egypt's minister of tourism and antiquities Sherif Fathy said: "It is an extraordinary moment for Egyptology and the broader understanding of our shared human story." Correction 23 February 2025: The headline and text of this story have been amended to reflect that the discovery of Thutmose II's tomb is not the first since Tutankhamun's, as the Egyptian tourism minister had claimed, as others, including those of Psusennes I, Amenemope and Shoshenq II, have been found since.
