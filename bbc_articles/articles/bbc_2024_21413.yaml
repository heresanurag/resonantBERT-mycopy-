title: 'Solheim Cup 2024: Europe warned to expect ''hostile'' atmosphere in US - BBC
  Sport'
date: '2024-09-10'
section: Golf
url: http://www.bbc.co.uk/sport/golf/articles/c5y3nv5dd3xo
content: |-
  The US have won seven of the nine Solheim Cups played on home soil

  Europe will face a "hostile" home crowd "absolutely desperate" for the United States to win back the Solheim Cup in Virginia this week, says former captain Mickey Walker. Last year's 14-14 draw in Spain, the first in the contest's 34-year history, meant Europe retained the trophy after victories in 2019 in Scotland and 2021 in Ohio. No side has held the trophy for a fourth successive time and Europe have won just twice in nine previous events in the US. "The Americans will feel it is essential to win and it's going to be difficult for Europe because it can get quite hostile," Walker, who led Europe to their first triumph in 1992, told BBC Sport. "The American crowds will be out there to win it. It will be very pro-American and that will be really tough. "Those that have played before will know what to expect and they will be as prepared as they can be, but it's a lonely place when you're out there playing and 90% of the support is American."

  Walker, who was Europe's captain in the first four editions of the biennial contest, is wary that continued unsporting partisan behaviour will spoil both the Solheim and Ryder Cup. And while the Solheim Cup does not appear to have as large an issue, Walker said she felt "intimidated" as a spectator as far back as at the 2009 contest in Chicago and "does not like" the way it is going. It is no secret that the Ryder Cup at Whistling Straits in 2021 saw the European players and their families receive some horrendous abuse from a minority of US fans at the course on the banks of Lake Michigan. No away side has won the Ryder Cup since Europe's victory at Medinah in 2012 and while Padraig Harrington accepted that some of that is down to home captains being able to dictate course set-up, he also acknowledged the part fans play. Speaking before last year's contest in Italy, the Irishman, who led Europe in 2021, forecast there would be trouble, telling the Daily Telegraph: "I wish I could say it is one-way traffic, but it isn't and we should realise that and look at our own backyard as well. "It's not just the players either. The same as in America, the wives and families are being singled out by hecklers as well, with some pretty awful stuff going on." Walker agreed, saying: "The past two Ryder Cups have been bordering on the crowds not behaving very well because they have been so much behind their team. "Rome was the worst it has been in Europe. "I don't like it, you want to win just by playing the better golf." It is a sentiment echoed by John Solheim, the son of Karsten and Louise Solheim who have sponsored the tournament since the inaugural event in 1990 and who the trophy is named after. "It's extremely important to the Americans to win it back, but it doesn't really matter to me who wins," he told BBC Sport.
