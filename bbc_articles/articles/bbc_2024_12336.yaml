title: 'David TC Davies: Polls point to big Labour majority, says top Tory - BBC News'
date: '2024-06-19'
section: Wales
url: http://www.bbc.co.uk/news/articles/ce77ljjwgggo
content: |-
  Cabinet minister says polls suggest a Labour win, but voters are "not at all happy" with choices.

  Parties to get it in the neck at election - Davies

  David TC Davies was promoted to Welsh secretary by Rishi Sunak when he became prime minister

  All politicians are going to "get it in the neck" from disgruntled voters at the general election, according to the Welsh secretary. David TC Davies admitted opinion polls are "clearly pointing at a large Labour majority", but said he believes there is "no great optimism" from voters. "I think people are really quite concerned," the Conservative minister told the Sun newspaper's online politics programme Never Mind the Ballots. Labour has retained a lead of around 20 points over the Tories in the polls over the course of the election campaign.

