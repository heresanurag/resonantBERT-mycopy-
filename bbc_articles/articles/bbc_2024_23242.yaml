title: Comedian Janey Godley receiving end-of-life care - BBC News
date: '2024-09-26'
section: Scotland
url: http://www.bbc.co.uk/news/articles/cd7xv79dp0jo
content: |-
  The 63-year-old announced on social media that her cancer had spread and she was going into a hospice.

  This video can not be played To play this video you need to enable JavaScript in your browser. Janey Godley gave the update on her cancer in a video posted on social media

  Comedian Janey Godley has revealed she is receiving end-of-life care following the spread of her cancer. In a video posted on social media, the 63-year-old from Glasgow said she was receiving palliative care in hospital and would be going into a hospice. She thanked the NHS, friends and family for all the support she had received. "It is devastating news - but we all come to an end sometime," she said.

  Last week, the comedian cancelled her Why Is She Still Here? autumn tour on the advice of doctors after being readmitted to hospital. Godley, who found viral fame with her dubbed videos of Nicola Sturgeon's Covid briefings during the pandemic, revealed she had ovarian cancer in November 2021. She was given the all-clear in 2022 but a later scan discovered signs of the disease again.

  Janey Godley with daughter Ashley Storrie in November 2019, two years before her cancer diagnosis

  In a video posted on X, she said: "The chemo ran out of options and I just couldn't take any more of it - and the cancer has spread. "So it looks like this will be getting near the end of it - and it's really difficult to speak about this and say it to people." Godley thanked the NHS and various hospitals and staff who care for her, "right down to the wee woman who holds my hand and makes me tea". "It is devastating news to know I'm facing end of life, but we all come to an end sometime," she said. "The overwhelming support has been amazing and I don't know how long I've got left, before anybody asks." She added: "Thanks everybody for all your love, and know that I really, really appreciate the outpouring of love and the support that you've gave me."

  Godley became friends with Scotland's former first minister Nicola Sturgeon after her videos became a hit during Covid

  Born in the east end of Glasgow in 1961, Godley was a pub landlady before establishing herself on the comedy circuit. She is mother to comedian and actress Ashley Storrie, the star of BBC Three comedy Dinosaur. Storrie told followers on TikTok that she was going to keep "living her life and working", per her mother's wishes. "I want to show her before she leaves that I’m going to be ok because I know that’s the thing she’s worried about the most," she said. "I won’t be sitting a vigil by her bedside crying – because she doesn’t want me to and I’m going to respect her wishes. "I love my mum and every weird, uncomfortable and unusual facet of her." Storrie, who has autism, urged people to be compassionate as "not everybody processes things the same as you do" and said she was very grateful for the support she had received. Godley went viral in 2016 after she was pictured holding a placard with an offensive word at a protest against Donald Trump on his visit to Scotland. Her profile was raised further when she voiced over videos of Nicola Sturgeon's Scottish Covid briefings. She later became friends with the former first minister. Godley has also been a regular co-presenter on BBC Radio 4's Loose Ends, as well as fronting BBC Radio 4 series The C Bomb. In 2023 she was honoured at the inaugural Sir Billy Connolly Spirit of Glasgow Award at the Glasgow International Comedy Festival.

  Well-known in celebrity circles, Godley received a flood of support from famous faces following her news. Posting on X, Nicola Sturgeon told her: "Sending you so much love, my friend. You are an inspiration." Star Wars actor Mark Hamil told Godley he was her fan, adding: "Sending you much love & best wishes always, Janey." Food author and TV chef Nigella Lawson, who has been social media friends with Godley for years, said: "Oh Janey, this is heartbreaking. Thank you for all you’ve given the world – and for being you." Songwriter Midge Ure replied: "Gie it laldy till ye can gie it laldy no more!" LBC presenter James O'Brien described her as a "wonderful, wonderful woman". He said: "Privilege to know her. As fearless as she is funny, which is really saying something." And broadcaster Richard Bacon said: "I love you Janey. You are endlessly brilliant, creative, original, positive, kind, tough, brave. And brilliant, again."
