title: Cowboy wrangles runaway cow on Michigan interstate - BBC News
date: '2023-05-24'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-65642955
content: |-
  State police were forced to seek out a cattleman's help to catch the bovine, which is now safe and has not been charged.

  When this cow ran onto an interstate, police in Michigan relied on a cowboy to lasso the suspect bovine. The animal is safe and has not been charged with a crime.
