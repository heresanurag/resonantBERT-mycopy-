title: Bournemouth murder accused 'asked how to get away with murder' - BBC News
date: '2024-12-11'
section: Dorset
url: http://www.bbc.co.uk/news/articles/c1kejm1x2x2o
content: |-
  A criminology student asked tutors about murders before stabbing a woman to death, a court hears.

  Accused killer asked how to get away with murder - court

  A criminology student asked in a seminar how to get away with murder before stabbing a woman to death on a beach, a court has heard. One of Nasen Saadi's lecturers asked him if he was planning to kill someone, Winchester Crown Court was told. The 20-year-old defendant, from Croydon, is accused of murdering Amie Gray, 34, and seriously injuring 38-year-old Leanne Miles at Durley Chine, Bournemouth, on 24 May. He denies the charges but has pleaded guilty to failing to give the police access to his mobile phone.

  Sarah Jones KC, prosecuting, told the jury: "He seems to have wanted to know what it would be like to take life." The court heard Mr Saadi was studying criminology and criminal psychology at the University of Greenwich in 2023. A lecturer, Dr Lisa-Maria Reiss, recalled how the defendant asked her to "go back to the point where you talked about murder and self-defence", even though her session had not discussed those issues. Giving evidence, she said: "He asked me what DNA is left behind and if the police is able to trace that DNA. "I asked him: 'You're not planning a murder, are you?' "He said, no, he was researching an article he wanted to write."

  Nasen Saadi booked into a Travelodge three days before the attacks, the court heard

  Dr Reiss' partner, special officer Pavandeep Singh Aneja, was asked to give a talk to students on policing in November, the jury heard. He told the court the defendant asked questions "on DNA, how to get away with murder, these types of things". He continued: "There were questions along the lines of 'If a crime is committed in one area, would that information be shared elsewhere?' "There were more questions: 'What are your thoughts of females as police officers?', which I thought was a pretty strange question." Mr Singh said the questions were "to an extent, relevant" and he did not challenge them.

  This video can not be played To play this video you need to enable JavaScript in your browser. Mr Saadi was pictured on CCTV on the beach three days before the murder, the court heard

  Another witness described hearing two loud screams on the night of the attacks. Giving evidence, Michael Priddle said: "The first was deeper and louder than normal. The second scream not quite loud." As he made his way home from the clifftop in Bournemouth, he said he saw a man dressed in dark clothing with a hood. Mr Priddle said: "[It was] very concerning for my own safety. He seemed not a nice person. "Is grimacing the right word? [He had] a frown. I seriously kept an eye on him for my safety. He looked a nasty person." The witness later picked out Mr Saadi as the man he saw from a selection of photographs, the court was told.

  Previously, the court heard how the two women were attacked as they sat on the sand watching the full moon after lighting a fire. Ms Gray, a football coach from Poole, was pronounced dead at the scene. Ms Miles was taken to hospital for treatment for stab wounds to her chest and back. In a video played in court on Monday, Ms Miles described how she pleaded for her life for the sake of her children. Speaking from her hospital bed, three days after the attack, she said: "I just remember we turned around, and I looked at this boy. "He went towards me first - because I remember Amie saying: 'What are you doing? Get off her.'" Her voice shaking with emotion, Ms Miles described how she lost sight of her friend as they fled, but heard her saying: "Get off me". She continued: "He came back on to me and he was continuously stabbing me. "I said: 'Please stop, I've got children.' And then I think that's when he started to go, he walked away."

  Police sealed off the beach following the incident

  In March and April, Mr Saadi carried out internet searches for "deadliest knife", "machete" and "what hotels don't have CCTV", prosecutor Sarah Jones KC previously said. He booked a Travelodge in Bournemouth for two nights from 21 May, spending one of the evenings watching the film The Strangers - Chapter 1, which portrays a killer with no motive, Ms Jones added. He also booked into a nearby guesthouse on 23 May, it was heard. He told police he could not remember his movements on the day of the attack, suggesting that he may have had a blackout, the jury was told. At his home in Purley, where he was arrested on 28 May, police found knives, latex gloves and a balaclava, the court heard. However, no weapon or clothing from the night of the killing has been discovered, prosecutors said.

