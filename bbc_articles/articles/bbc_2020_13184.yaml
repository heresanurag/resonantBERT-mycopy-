  Details and reaction to First Minister Mark Drakeford's briefing as Wales comes out of lockdown.

  Local lockdowns 'where necessary' in Wales

  Local lockdowns within Wales have not been ruled out in future and they will be imposed "where that is necessary", the first minister has said. Mark Drakeford explained that current figures for Merthyr Tydfil, which has one of the highest rates of coronavirus in the UK, are "showing some promise". "We've never said that we wouldn't consider further local action where that is necessary", he said. The first minister added there has been a reduction in the incidence rate per 100,000 people in Merthyr Tydfil. "It's always important to give a bit of a health check with Merthyr figures, because it's the smallest local authority in Wales and relatively small raw numbers drive large percentage and incidence changes," he said. "But the path that we are following in that part of Wales is showing the advantages of the firebreak period that we have just completed." Mr Drakeford added he thought it was a "bit rich" to hear some opposition politicians calling for an extension to the firebreak after they voted against the policy in the Senedd.
