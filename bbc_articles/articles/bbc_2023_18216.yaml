title: Dancing Queen! Camilla in Kenya animal sanctuary visit - BBC News
date: '2023-11-02'
section: General
url: http://www.bbc.co.uk/news/uk-67289523
content: |-
  The Queen joined a traditional dance in Nairobi and stopped to feed orphaned elephants.

  Queen Camilla joined a traditional dance with Maasai women during a state visit to Kenya.

  She was presented with Maasai traditional regalia at the Brooke Donkey Sanctuary in Nairobi.

  On the same day, she also fed milk to orphaned elephants at the Sheldrick Wildlife Trust Elephant Orphanage.
