title: 'Chesterfield: Man charged after street evacuation alert - BBC News'
date: '2024-07-21'
section: Derby
url: http://www.bbc.co.uk/news/articles/cleyz3xd1nxo
content: |-
  Residents from 35 homes were told to leave after suspicious items were found during a search.

  The cordon was put in place early on Friday after a property was searched

  A man has been charged in connection with an alert that saw 35 homes in Derbyshire evacuated for two nights. Police searched a house in Kingsley Avenue, Chesterfield, following an assault in the town on Friday, and found a number of suspicious items which resulted in the cordon being put in place. Officers said Robert Spinks, 51, of Kingsley Avenue has been charged with wounding and possession of an offensive weapon. Residents began being allowed to return to their homes in the early afternoon of Sunday.

  Police are still at the scene speaking to residents

  Mr Spinks is due to appear in court on Monday. Police said the initial incident took place at 00:25 BST on Derby Road and involved a man allegedly throwing a substance at another man. The victim was taken to hospital but later discharged. On Friday, officers closed a section of Kingsley Avenue between Church Street and Burns Road. Three homes were initially evacuated before residents from a further 32 properties were told to leave. A rest centre was established at Queens Park Leisure Centre for residents. Follow BBC Derby on Facebook, external, on X, external, or on Instagram, external. Send your story ideas to eastmidsnews@bbc.co.uk, external or via WhatsApp, external on 0808 100 2210.
