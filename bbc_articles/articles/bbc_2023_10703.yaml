title: 'Cluster bombs: Biden defends decision to send Ukraine controversial weapons
  - BBC News'
date: '2023-07-08'
section: US & Canada
url: http://www.bbc.co.uk/news/world-us-canada-66140460
content: |-
  But the UK says it "discourages" the use of the weapon while Spain criticises the US decision.

