title: Wiltshire police officer 'intentionally' hit by car in Devizes - BBC News
date: '2024-06-02'
section: Wiltshire
url: http://www.bbc.co.uk/news/articles/ck773p013gyo
content: |-
  The officer was taken to hospital with injuries after attempting to approach the vehicle.

  A police officer has been injured after a driver "intentionally" hit him with a car. Wiltshire Police said the officer left his marked patrol car to speak to people in a parked vehicle on a field near Devizes on Saturday morning. The driver drove off, hitting the policeman and leaving him injured. Supt Conway Duncan said a search was now under way for the driver. Supt Duncan said it was a "significant incident where an officer undertaking their duties has intentionally been injured".

  The force said the policeman was on mobile patrol in Conscience Lane, travelling from Rowde towards Devizes, at about 23:30 BST when he spotted the vehicle and tried to speak to those inside. He was taken to hospital for his injuries and has since been discharged to continue his recovery at home.

  Supt Duncan added: "We are providing ongoing welfare support to the officer and their family. "Our thoughts are with him and we wish him a speedy recovery." He said the force was "undertaking extensive urgent inquiries to identify" the person responsible. "We would encourage anyone with information to come forward."
