  Tom Daley watches back one of his first BBC interviews from 2008, when he was a 13-year-old with a dream.

  Tom Daley watches back one of his first BBC interviews from 2008, when he was a 13-year-old with a dream to become an Olympic gold medallist.

  How has life changed for him since then, and what will be the next chapter of his legacy in Paris?

  Follow the Paris 2024 Olympics across the BBC from Friday, 26 July.

