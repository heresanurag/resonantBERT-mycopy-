title: 'Shea Gordon: Teens jailed for life after birthday party murder - BBC News'
date: '2024-02-06'
section: London
url: http://www.bbc.co.uk/news/uk-england-london-68219942
content: |-
  Shea Gordon, 17, was stabbed just after midnight in 2022 while attending the event in east London.

  Shea Gordon died in 2022 after being fatally stabbed

  Two teenagers have been jailed for life after murdering a boy at an 18th birthday party in east London.

  Shea Gordon, 17, was stabbed just after midnight on 4 September 2022 at a hall on Lichfield Road in Mile End.

  Abdul Yaro, 19, and Kavian Vaughans, 18, who had been found guilty of murder, were handed life sentences with a minimum term of 21 years.

  Dainnan Witter-Cameron and Giovanni Addae-Johnson, both 18, were jailed for eight years for manslaughter.

  The defendants were sentenced at the Old Bailey by Judge Angela Rafferty KC.

  Police said Shea had been targeted by the four teenagers and Snapchat messages from their mobile phones showed they were planning to attend the party in order to attack him.

  Shea was stabbed three times, suffering two wounds to his right leg and an injury to the top of his chest.

  Despite the efforts of emergency services, he died from his injuries.

  Shea's mother Charisse James said, in a victim impact statement, his death would "haunt me for the rest of my life".

  (Clockwise from top left) Abdul Yaro, Giovanni Addae-Johnson, Kavian Vaughans and Dainnan Witter-Cameron have been jailed for killing Shea Gordon

  "My son went out that night to a party to enjoy himself and never made it back home," said Ms James.

  "This is something I will never get over."

  Shea's aunt Nicola Boamah said he was "viciously and brutally" taken away.

  She added: "It is devastating he will never ever realise his dream of becoming an estate agent and opening his own clothing line."

  Shea's stepmother Tanisha Duvall said his loss had "left a void that can never be filled".

  Ms Duvall said he was pursued "mercilessly" by the four defendants who had "forever altered the trajectory of our life".

