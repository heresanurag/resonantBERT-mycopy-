title: 'Winter Olympics: Elise Christie faces ''fight against time'' to make 1,000m
  - BBC Sport'
date: '2018-02-18'
section: Winter Olympics
url: http://www.bbc.co.uk/sport/winter-olympics/43102468
content: |-
