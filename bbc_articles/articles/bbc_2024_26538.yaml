content: |-
  Footage appears to show the blasts close to Beirut-Rafic Hariri International Airport.

  Footage appears to show the moment large explosions were seen near Beirut-Rafic Hariri International Airport on Thursday night.

  Loud blasts have been reported by various international and Lebanese news agencies near the airport, which borders the suburb of Dahieh - Hezbollah's stronghold in the city and a continuing target for Israeli air strikes.

  The BBC has yet to confirm the location of the latest strike.
