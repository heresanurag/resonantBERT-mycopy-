  • None Jordan Pickford set a new record for an England goalkeeper for most minutes without conceding - 725 - overtaking Gordon Banks' 720 minutes set between May/July 1966.
  • None England won a European Championship knockout game after going behind for the first time, while it's the first time they have done so in a major tournament since a 3-2 win over Cameroon in the 1990 World Cup quarter-final.
  • None This was the seventh game at Euro 2020 to go to extra time, with the 1990 and 2014 World Cups the only major tournaments to see more matches go to the extended period (eight each).
  • None Mikkel Damsgaard's opening goal for Denmark was the first direct free-kick goal of Euro 2020 with what was the 37th direct free-kick shot.
  • None Jack Grealish became the third England player to be both subbed on and subbed off in a match at a major tournament, after Jamie Redknapp (v Scotland in Euro 1996) and Aaron Lennon (v Portugal in the 2006 World Cup).
