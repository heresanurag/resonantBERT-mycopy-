content: |-
  Newly released video shows a Russian fighter jet fly within feet of a US aircraft near Alaska.

  Video released on Monday by US military officials shows the moment a Russian fighter jet flew close to a US aircraft on the 23 September near Alaska.

  North American Aerospace Defense Command said the Russian jet's conduct was "unsafe, unprofessional, and endangered all."
