  Respite for Les Bleus and from there on, they thundered home like champions. When Russell and Graham got their wires crossed in attack, Romain Ntamack scooped up the loose ball, galloped away and found Bielle-Biarrey on his shoulder. The Bordeaux wing ran in for yet another try in what has become an epic season. Russell landed a penalty to keep Scotland within seven, but France put them away again in short order. The mighty French bench had come on and they were having a major influence. The Ramos try that made it 28-16 had its origins in French maul power sapping the energy from the visitors. Ramos converted his own score and now it was a 14-point game and, effectively, a done deal. France's fourth, and Moefana's second, was a beauty, a gorgeous strike from Bielle-Biarrey, Fickou and then Moefana. Ruthless and beautiful in equal measure. The home fans erupted at the last whistle. The cameras panned to the absent icon, Antoine Dupont - a man who did more than anybody to deliver this night of nights. They would have wanted him out there but they did not need him. They have too much for Scotland and too much for everybody else, too, over the course of the seasons. Wonderful.

