content: |-
  This video can not be played To play this video you need to enable JavaScript in your browser. France thrash Scotland to become Six Nations champions

  France secured the Six Nations championship with a flourish - and quashed England's hopes - by ultimately overpowering a dogged Scotland in Paris. Steve Borthwick's men moved to the top of the table with a thumping win in Wales, but the French responded to the challenge. Their four tries did not just secure the title in terrific style, it also brought their tally to 30 across the five games - a new Six Nations record, breaking a mark set by the English in 2001. Fabien Galthie's team roared into an early 10-0 lead thanks to the first of Yoram Moefana's two tries and a penalty from Thomas Ramos, who later bypassed Frederic Michalak as France's all-time top points scorer. Scotland were not helped by a yellow card for Jamie Ritchie, but as the visitors came into it, France's discipline faltered and they had Peato Mauvaka and then Jean-Baptiste Gros sin-binned in an fractious opening 40. Finn Russell's penalties and a try from Darcy Graham made it 16-13 to France at the break - a lead they only held after a Tom Jordan score was disallowed just before the break. However, the hosts took control from there. Nervy in the opening half, the French were dominant in the second. Louis Bielle-Biarrey equalled the all-time single-season championship try-scoring record when he landed his eighth of the campaign. Then Ramos and Moefana, again, took France clear as a depleted Scotland faltered.

  Ramos made it 3-0 with the boot early on and, amid the next French onslaught, Ritchie got binned. Scotland were scrambling to survive, but could only hold out for so long. Eventually the dam burst when Gael Fickou put some neat footwork on Zander Fagerson before putting Moefana in for a score converted by Ramos. It was the dream beginning for the title-chasers, but that feelgood slowly faded as Scotland came into it. Orchestrated by Russell, they took risks in going wide, playing with an abandon that troubled France. Midway through the half, as Scotland started asking questions. Mauvaka got a yellow for what looked like a flying headbutt on Ben White. The hooker was fortunate it was not red. He lost the plot in that moment and Russell took advantage when banging over a penalty to make it 10-3.

  Ritchie returned, Ramos fired over another penalty, then Scotland silenced the Stade with a try. Russell pulled the strings throughout, moving France this way and that. When he pulled the trigger, he popped a gorgeous inside pass to Graham, who sped away from Uini Atonio to score. Russell's conversion made it 13-0 and suddenly France were not looking too clever. Perhaps spooked by Scotland's freewheeling approach, they were a world away from the dominant force that did such a number on Ireland last weekend. That would change, emphatically so, but France had to work their way some dicey moments first. They experienced more turbulence when Gros was yellow-carded for a high tackle before Russell and Ramos exchanged penalties. Then, as half-time approached, Scotland launched a devastated counter-attack through Blair Kinghorn, who scythed through the French defence. It all ended with Tom Jordan battering his way over, but France were spared when Kinghorn was ruled to have had a foot in touch.

