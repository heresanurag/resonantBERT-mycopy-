content: |-
  The button to destroy Hexham House in Newcastle is pressed by three children who won a competition.

  A tower block in Newcastle-upon-Tyne has been demolished in a controlled explosion.

  Hexham House in Walker was pulled down as part of regeneration work.

  After a short delay, the 15-storey building was demolished at about 11:30 GMT.

  Three children from Walker, who were selected through a competition, pressed the button to detonate the explosives.

