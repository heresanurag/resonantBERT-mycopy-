title: 'Assassin''s Creed Shadows: Ubisoft confirms game leaks genuine - BBC News'
date: '2025-02-26'
section: Newsbeat
url: http://www.bbc.co.uk/news/articles/ckgz0vxkx3po
content: |-
  French developer Ubisoft urges fans to avoid sharing spoilers as video of its latest game appears online.

  Assassin's Creed Shadows is seen as a pivotal release for Ubisoft

  The makers of Assassin's Creed Shadows - the forthcoming entry in one of video gaming's biggest franchises - have confirmed footage leaked online is real. Some players managed to get their hands on the game - due to be released on 20 March - ahead of its official release. Developer Ubisoft said gameplay videos shared online "did not represent the final quality of the game". In a statement posted online, the company said it was "still working on patches" and urged fans not to share spoilers.

  The Assassin's Creed series has sold more than 200 million copies worldwide and, according to a Ubisoft earnings report published last year, external, generated about €4bn ($4.2bn/£3.3bn) revenue in the decade up to 2024. Shadows will be the first instalment set in Japan - something fans have long been asking for. The new release, seen by many as a make-or-break title for the French gaming giant, has already been delayed twice. Early authorised previews of the game have been positive, and its developers have insisted they pushed back its release to polish certain features. It was previously due to come out for PC, PlayStation and Xbox on 14 February. Reports suggest that leaked footage came from physical copies of the game, and it is possible that copies had been printed on to discs to meet this date. Modern games frequently receive downloadable release-date updates to address any issues that are discovered after physical versions have been produced.

  They are Naoe – a female ninja – and Yasuke – who's based on a real-life figure often referred to as "the African samurai". Shadows' developers have defended the inclusion of Yasuke against critics who argued that a native Japanese character would have been preferable. Opponents have accused those complaining of racism, pointing out that they have not taken issue with depictions of the character in other video game franchises.

  Ubisoft is one of the biggest gaming companies in the world, employing more than 18,000 people in multiple international offices. Last year was seen as a tough 12 months for the publisher, after a disappointing launch of its major release, Star Wars Outlaws. Its other 2024 titles, Prince of Persia: The Lost Crown and pirate-themed online game Skull & Bones, were also reported to have fallen below the company's expectations. Ubisoft also discontinued online shooter XDefiant and closed three of its studios. CEO Yves Guillemot has said Ubisoft is "taking decisive steps" to reshape the company and "drive significant cost reductions". It is thought to be seeking a buyer and has already made layoffs this year, including the closure of its office in Leamington Spa, England.

