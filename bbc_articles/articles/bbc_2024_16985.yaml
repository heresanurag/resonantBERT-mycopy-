  Since the 7 October Hamas attack, Israeli authorities have rounded up and held thousands of Palestinians, often without legal representation. The BBC has previously spoken to medical workers at a field hospital set up in Sde Teiman, who alleged that detainees have been blindfolded, permanently shackled to their beds, and made to wear nappies rather than having access to a toilet. Last month, Israel’s Haaretz newspaper published allegations made by a doctor at Sde Teiman that leg amputations had been carried out on two prisoners, because of cuffing injuries. The BBC has not independently verified the claims. Detainees there have told journalists and United Nations officials that they were beaten and attacked. The Israeli Defence Forces (IDF) have denied systematic abuse. Many Gazans detained by Israel’s army are released without charge after interrogation. Amnesty International this month called on Israel to end the indefinite detention of Gaza Palestinians and what it called "rampant torture" in its prisons.
