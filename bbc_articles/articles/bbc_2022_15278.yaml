title: British Paralympian John McFall announced as world's first disabled astronaut
  - BBC News
date: '2022-11-23'
section: Science & Environment
url: http://www.bbc.co.uk/news/live/science-environment-63710967
content: |-
  British Paralympic sprinter John McFall is chosen as the first disabled astronaut by the European Space Agency.

  Astrophysicist Rosemary Coogan, Esa's newly appointed career astronaut, has been speaking to the BBC in Paris.

  She says her main motivation to apply for the role was the significance of deepening our understanding of key questions, which space discovery can provide answers for.

  Quote Message: I just feel really strongly about all of the things that space can do for us from the pursuit of knowledge itself in terms of how we came to be, the conditions for life, how that affects the human body and what might happen to us if we're no longer in those conditions to really the practical applications of space technology, which we use everyday in Europe. from Rosemary Coogan I just feel really strongly about all of the things that space can do for us from the pursuit of knowledge itself in terms of how we came to be, the conditions for life, how that affects the human body and what might happen to us if we're no longer in those conditions to really the practical applications of space technology, which we use everyday in Europe.

  Asked about the training that awaits her, Coogan says "today is the beginning" and the training will be incredibly exciting.

  She is looking forward to spending time with her colleagues, "and we'll all be in it together", she adds.

  Regarding future opportunities for space exploration, Coogan says they never know which mission they'll be assigned to, but "luckily all of the opportunities [from the International Space Station to Nasa's Artemis's European missions] would be fantastic," she adds.

  Coogan says she was incredibly grateful and excited about the appointment, and she hopes to be able to contribute.
