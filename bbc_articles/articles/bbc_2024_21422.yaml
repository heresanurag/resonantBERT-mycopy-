  Put your knowledge of England's other male centurions to the test as Harry Kane nears his 100th Three Lions cap.

  Who else has 100 England caps? Kane nears milestone

  With England captain Harry Kane approaching his 100th England appearance, it's time to test your knowledge of the other male Three Lions centurions. Kane will become the 10th man to reach that landmark if he plays against Finland on Tuesday (19:45 BST). Try our quiz below to rank the other nine from most to fewest caps - and share your result once you've finished.
