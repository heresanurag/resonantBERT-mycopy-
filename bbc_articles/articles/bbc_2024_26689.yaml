title: Government pledges nearly £22bn for carbon capture projects - BBC News
date: '2024-10-04'
section: England
url: http://www.bbc.co.uk/news/articles/cy4301n3771o
content: |-
  Sir Keir Starmer says carbon capture clusters on Merseyside and Teesside will "kickstart growth".

  The prime minister made the announcement on a visit to to the North West with Rachel Reeves and Ed Milliband

  The government has pledged nearly £22bn for projects to capture and store carbon emissions from energy, industry and hydrogen production. It said the funding for two "carbon capture clusters" on Merseyside and Teesside, promised over the next 25 years, would create thousands of jobs, attract private investment and help the UK meet climate goals. Sir Keir Starmer, who is to visiting the north-west of England with Chancellor Rachel Reeves and Energy Secretary Ed Miliband to confirm the projects, said the move would "reignite our industrial heartlands" and "kickstart growth". But some green campaigners have said the investment would "extend the life of planet-heating oil and gas production".

  Carbon capture and storage facilities aim to prevent carbon dioxide (CO2) produced from industrial processes and power stations from being released into the atmosphere. Most of the CO2 produced is captured, transported, and then stored deep underground. It is seen by the likes of the International Energy Agency (IEA) and the Climate Change Committee as a key element in meeting targets to cut the greenhouse gases driving dangerous climate change. Despite Miliband first announcing plans to develop carbon capture projects for power plants in 2009 during the last Labour government, little progress has been made since in the UK. Speaking at a glassmaking factory in Cheshire, Sir Keir said: "For our energy intensive industries like glassmaking here, or cement, or steel, or ceramics, you are familiar with these, the security that the future belongs to them. "That the necessary mission of decarbonisation does not mean de-industrialisation. This if you like, is the politics of national renewal in action." Speaking to the Today programme, Miliband said the project was "essential if we are to decarbonise without industrialising". He said: "This is a government willing to invest in the future of Britain to create good jobs of the future, as the good jobs used to exist in coal but this is a new era for Britain and a new set of good jobs bringing us energy security." He paid tribute to the end of coal-fired energy production in the UK, saying: "If Monday was the end of an era, today with this government's decisions a new era begins. "Carbon capture and storage, a new industry, a new generation of good jobs in our industrial heartlands."

  Ed Miliband, Rachel Reeves and Keir Starmer visit Teesside earlier this year, where one of the promised clusters will be stationed.

  Up to £21.7bn will subsidise three projects on Teesside and Merseyside to support the development of the clusters, including the infrastructure to transport and store carbon. It will also support two transport and storage networks carrying captured carbon to deep geological storage in Liverpool Bay and the North Sea. The government said the move would give industry confidence to invest in the UK, attracting £8bn of private investment, directly creating 4,000 jobs and supporting 50,000 in the long term. It will also help remove 8.5 million tonnes of carbon emissions each year, officials said. The projects are expected to start storing captured carbon from 2028.

  Last year the Conservative government announced £20bn plans for carbon capture, but Labour said it had never committed any cash. In her strongest indication yet of a significant increase to levels of state investment, the chancellor said contracts such as this were never signed by the previous government because it did not prioritise capital investment - which is money spent on items such as buildings, equipment, and IT. Reeves added: "This game-changing technology will bring 4,000 good jobs and billions of private investment into communities across Merseyside and Teesside, igniting growth in these industrial heartlands and powering up the rest of the country." Emma Pinchbeck, chief executive of Energy UK, described carbon capture, utilisation and storage as a "tool in our armoury of technologies which we need to decarbonise parts of energy that we currently can't do with clean electricity". James Richardson, acting chief executive of the Climate Change Committee, said: "It's fantastic to see funding coming through for these big projects." However Greenpeace UK's policy director, Doug Parr called for spending instead on offshore wind or nationwide home insulation. He said £22bn was "a lot of money to... extend the life of planet-heating oil and gas production." Meanwhile Friends of the Earth said the government should be spending the money insulating people’s homes, not on a technology it said would just extend the lifespan of the fossil fuel industry. But Miliband questioned what the alternative was to carbon capturing. He said: "Just take net-zero Teesside, that provides us a gas-fired power station but capturing the carbon, now what's the alternative to that, because that provides low carbon, a flexible power generation when the wind doesn't blow or the sun doesn't shine - but the alternative is unabated gas". He added the UK needed "all the technologies at our disposal" as the "backbone of our system will be renewables". The Merseyside and Teesside projects are part of several announced in 2023 to capture and store 20-30 million tonnes of CO2 a year by 2030.

