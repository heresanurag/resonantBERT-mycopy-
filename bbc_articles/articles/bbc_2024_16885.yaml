  Nick Park and Rupert Shipperley scored either side of a Gareth Furlong double as Great Britain's men opened with a 4-0 win over Spain in the hockey. Captained by Northern Ireland's David Ames, GB men are aiming to secure a first Olympic medal since winning gold in 1988 and continue their campaign against South Africa on Sunday.

  This video can not be played To play this video you need to enable JavaScript in your browser.

  In the dressage, Laura Collett set an Olympic record with her leading score on London 52 in the eventing dressage, recording just 17.5 penalties, while in men's gymnastics GB reached the team final following a strong qualifying performance. In the rowing, it was a fast start for Great Britain with the women's quadruple sculls winning their heat in style. The group of Lauren Henry, Hannah Scott, Lola Anderson and Georgina Brayshaw beat Germany, Switzerland and the US to qualify for the final with the fastest time from the heats, almost four seconds quicker than the rest. The men's quartet also booked a spot in the final, and the women's double sculls pair of Mathilda Hodgkins Byrne and Rebecca Wilde finished second in their heat to qualify for the semi-finals. Also on the water, Adam Burgess qualified in second for the men's canoe singles semi-final on Monday, while Kimberley Woods reached the same stage in the women's kayak singles.

  This video can not be played To play this video you need to enable JavaScript in your browser. Watch: Best shots from Nadal & Alcaraz against Argentina

  Spain's all-star men's doubles team of Carlos Alcaraz and Rafael Nadal began their gold medal bid by beating Argentina's Andres Molteni and Maximo Gonzalez 7-6 (7-4) 6-4 at a raucous Roland Garros. While they had to work hard, few athletes will experience simpler opening tasks in Paris than Novak Djokovic encountered on Sunday. In just 53 minutes, the Serbian crushed Australian doubles specialist Matt Ebden 6-0 6-1. Ebden was playing his first singles match for two years. Up next for Djokovic? It could be his great rival Nadal, should the 14-time French Open champion beat Hungary's Marton Fucsovics. In the women's tennis, Poland's Iga Swiatek got up and running at the venue where she is a four-time French Open champion by beating Romania's Irina-Camelia Begu 6-2 7-5.

  Australia set the early pace in the medal table
