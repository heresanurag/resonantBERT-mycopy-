  Adam Peaty has described himself as "the person with the bow and arrow and not the one being fired at". He says there is "no pressure really" on him after time on the sidelines with a foot injury and the period when he stepped away from swimming to focus on his mental health. But the man who has won the last two 100m breaststroke gold medals looked in fine fettle as he won both his heat and semi-final in his hunt for a third straight Olympic title. Peaty will go in Sunday's final at 20.54 BST. GB finished fifth in the final of the men's 4x100m freestyle relay, and seventh in the women's final.

  This video can not be played To play this video you need to enable JavaScript in your browser.

  Hosts France got their Games going with a bang on day one by winning gold in the men's rugby sevens. In front of an ecstatic crowd at the Stade de France, the French defeated reigning champions Fiji 28-7. The dream final for the neutrals saw the hosts play the favourites. Fiji had won gold in the two previous men's Olympic rugby sevens competitions and had never previously lost a match at the Games. But inspired by Antoine Dupont, France came from behind - with two of their four tries scored by the 15-a-side captain - to make history. Earlier, Shirine Boukli opened France's medal account with bronze in the women's -48kg judo, while Luka Mkheidze reached the final of the men's -60kg. Mkheidze had to settle for silver as he was beaten by Yeldos Smetov of Kazakhstan. France thought they were on course for a gold medal in the women's epee fencing when Auriane Mallo-Breton led 7-1 over Vivian Kong of Hong Kong, but Kong produced a stunning fightback to clinch a dramatic 13-12 win in overtime.

