title: Coronavirus in Scotland - New testing system ready to go live on Thursday -
  BBC News
date: '2020-05-26'
section: Scotland
url: http://www.bbc.co.uk/news/live/uk-scotland-52755413
content: |-
  First Minister Nicola Sturgeon says the new test, trace and protect system will go live on Thursday and have the capacity to carry out more than 15,000 tests daily.

  Childcare-related lockdown fines may not be reviewed after all.

  In his first answer during the daily briefing, Matt Hancock heard Martin from Brighton ask whether the government will review all penalty fines for families travelling for childcare purposes during lockdown. Hancock said it was “perfectly reasonable to take away that question” and said he would look at it with his Treasury colleagues. The question comes a day after the PM's chief aide said he travelled to Durham for childcare reasons - but he is accused of breaking lockdown rules and is facing calls to resign. However, it looks like all he may have been willing to do is pass the query on.
