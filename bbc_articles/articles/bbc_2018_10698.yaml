title: Indiana school bus driver fired for letting kids drive - BBC News
date: '2018-09-25'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-45633102
content: |-
  She's now facing preliminary felony charges for allowing students to drive.

  Joandrea Dehaven McAtee of Porter County, Indiana is facing preliminary felony charges of child neglect after video emerged of her allowing three school students, aged 11, 13 and 17, time in the driver's seat.
