title: 'Alexei Navalny: Mourners form long queue to lay flowers - BBC News'
date: '2024-03-03'
section: General
url: http://www.bbc.co.uk/news/world-europe-68464380
content: |-
  Hundreds of people line up to pay their respects at the Russian opposition leader's grave in Moscow.

  Crowds have continued to visit and lay flowers at the grave of Alexei Navalny, two days after his funeral.

  Hundreds queued on Sunday to pay their respects at the Russian opposition leader's grave in Moscow's Borisovskoye cemetery.

  Mr Navalny, who was President Vladimir Putin's fiercest critic inside Russia, died at the age of 47 in an Arctic penal colony on 16 February.
