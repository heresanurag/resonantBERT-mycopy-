  A Football Federal Australia spokesman told the BBC that it would not assist in funding Bolt's trial.

  Mr Mielekamp said the club was optimistic that the trial could be extended.

  "If all goes well, who knows? He may be lighting up the A-League this season," he told the local Seven Network on Tuesday.

  Mr Mielekamp said the club had received positive reports about Bolt's performance when he trained with German club Borussia Dortmund and Norwegian side Stromsgodset.

  "The most important thing is we wait to find out and see how good a footballer he is first," Mr Mielekamp said.

  "Time will tell at what level he is at and if it fits the A-League."
