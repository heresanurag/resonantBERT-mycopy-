title: Usain Bolt may play football in Australia - BBC News
date: '2018-07-17'
section: Australia
url: http://www.bbc.co.uk/news/world-australia-44855182
content: |-
  The top tier Central Coast Mariners have been pursuing the champion sprinter for months now.

  Usain Bolt has played in a number of exhibition matches this year

  Eight-time Olympic champion Usain Bolt is in talks for a trial to play football in Australia, a club says.

  The Jamaican former sprinter, 31, is negotiating a six-week stint with the Central Coast Mariners, a team in the country's A-League competition.

  Mariners chief executive Shaun Mielekamp said the club had spent four months pursuing Bolt, and a season-long deal could follow.

  Football agent Tony Rallis said a deal had been agreed "in principle".

  Mr Rallis, who has been involved in the deal, told local Sky Sports Radio that negotiations continued over Bolt's pay.

  "The owner of Central Coast Mariners has put his hand deep in his pocket and guaranteed 70% of the salary," Mr Rallis said.

  News Corp Australia reported that a "multi-million dollar" deal had been proposed.

  The 100m and 200m world record holder, who retired from athletics last year, has previously spoken about his interest in becoming a professional footballer.

  Bolt is a fan of Manchester United and one of its former assistant managers, Mike Phelan, is now at the Mariners.

