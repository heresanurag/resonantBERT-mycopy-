title: Volkswagen agrees deal to avoid Germany plant closures - BBC News
date: '2024-12-20'
section: Business
url: http://www.bbc.co.uk/news/articles/cje9kv3q94po
content: |-
  VW and a union have, however, agreed to cut more than 35,000 jobs across the country by 2030.

  Volkswagen has reached a deal with the IG Metall trade union which will avert plant closures in Germany and avoid immediate compulsory redundancies. The two sides have, however, agreed to cut more than 35,000 jobs across the country in a "socially responsible manner" by 2030, in order to save some €15bn (£12.4bn). Germany's largest carmaker had previously warned it might have to shutter plants in the country for the first time in a bid to cut costs. After drawn-out negotiations which began in September, the union said on Friday that the two had "succeeded in finding a solution" that secures jobs and enables future investment.

  VW was considering closing up to three factories in Germany and had been calling on its workforce to accept a 10% pay cut. At the time, the union was calling for a 7% increase. While the deal will also see a reduction in production capacity across its plants, it was celebrated by union leaders. "No site will be closed, no-one will be laid off for operational reasons and our company wage agreement will be secured for the long term," said IG Metall's works council chief Daniela Cavallo. "We have achieved a rock-solid solution under the most difficult economic conditions," she added. The 35,000 job cuts by 2030 are expected to be found through different solutions such as offered early retirement. Under the agreement, a 5% wage increase that was previously agreed will also be suspended in 2025 and 2026. The union said this would help "support transformation" at the company. The number of apprenticeships on offer each year in Germany will be reduced from 1,400 to 600 from 2026 too, and it will look at shifting some production to Mexico. It is also looking at alternative options for its Dresden and Osnabrueck sites. But Oliver Blume, VW's group chief executive, said in a statement that the agreement was "an important signal for the future viability of the Volkswagen brand". Factory closures in Germany would have been unprecedented in the manufacturer's history. VW, along with other German carmakers, has been badly affected by a decline in demand for its cars in China, previously a lucrative market. At the same time, Chinese brands have been moving into Europe, increasing competition for sales. During the talks, some 100,000 workers joined short, so-called "warning strikes" at sites across the country, in order to put pressure on the company's management. The latest round of talks began on Monday, with negotiators apparently determined to get matters settled before Christmas. The German chancellor Olaf Scholz also welcomed the announcement, describing it as a "good, socially acceptable solution".
