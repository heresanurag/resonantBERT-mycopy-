title: 'Newspaper headlines: ''Pension pinchers'' and ''Red Bullish'' - BBC News'
date: '2024-03-08'
section: The Papers
url: http://www.bbc.co.uk/news/blogs-the-papers-68507979
content: |-
  Friday's papers continue to lead with the fallout from the Spring Budget, and allegations about Christian Horner.

  The Daily Telegraph leads with the claim from the UK's counter-extremism tsar that Pro-Palestinian protests are turning London into a "no-go" area for Jewish people every weekend.

  The independent adviser to the Home Office, Robin Simcox, argues that the government has failed to use its powers to tackle groups that "lurk" just below the threshold of being terrorists. Mr Simcox calls for urgent action to combat what he sees as "a permissive environment for radicalisation". He says such groups have "gone unchallenged for too long".

  Doctors will use the NHS App to monitor patients' step counts and offer therapy, according to the front-page lead in The Times. The paper says the idea is part of government plans to tackle unhealthy lifestyles and get people back to work. The health secretary, Victoria Atkins, tells The Times the NHS will use the wealth of data collected by smartphones to prevent serious illnesses and boost economic growth. She describes the revamped app as "the front door to prevention" and tells the paper she will set out a new strategic approach to help reduce the record 2.8 million people off work with long-term sickness.

  "Don't leave our country defenceless" is the headline on the front of The Daily Mail. It highlights what it calls a "blistering" report from the government spending watchdog that found there was a funding "black hole" for the armed forces of up to £29bn. A strongly worded leader article asks "When will the Prime Minister take defence seriously?" It calls the lack of extra defence spending in the Budget "scandalous" - and states that despite rising instability around the world, the armed forces have "rarely been in such a hideously parlous state".

  The Guardian has a front page story that the Ministry of Defence paid £8m to a company later alleged to have been a conduit for secret payments to high-ranking Saudi Arabian officials. The paper says the payments were made until at least 2017 under a contract to keep a huge defence deal with the Saudis on track. It explains that the details have surfaced in an ongoing criminal trial. The Guardian says the MoD has refused to provide any further details.

  The Financial Times says the Chancellor is clawing back £200m from local authorities by ending a scheme that lets them keep the entire proceeds of council house sales. It says Jeremy Hunt took the decision as part of deliberations for Wednesday's budget, despite opposition from the Department of Levelling up. One council leader from Lincolnshire tells the paper the policy had made a huge difference. A source at the Treasury is quoted as saying that not renewing a temporary policy does not amount to a cut.

  There's more fallout from the budget in The Mirror, which leads with angry reaction to measures that experts say could make eight million pensioners worse off. Under the headline "Pension Pinchers", the paper calls it a "budget bombshell" that means OAPs are being "clobbered" with stealth taxes. The article quotes the Silver Voices campaign group as saying that older people are "hopping mad". The Mirror's leader article says "only this government would raid the incomes of the elderly to cover the cost of its economic mismanagement".

