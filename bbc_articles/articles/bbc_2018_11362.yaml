title: 'Alopecia: ''I can''t control my hair loss'' - BBC News'
date: '2018-09-19'
section: General
url: http://www.bbc.co.uk/news/uk-england-hampshire-45508312
content: |-
  Two women talk about how they deal with alopecia and the remaining hair they still have.

  Cat Brown and Louise Barnfather explain their differing approaches to living with alopecia and the remaining hair they still have.

  Cat, from Weymouth, Dorset, shaves her head and wears a wig. Louise, from Eastleigh, Hampshire, shows off her remaining hair.

  They talked about the condition, as part of National Alopecia Awareness Month.
