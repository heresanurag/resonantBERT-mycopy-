id: bbc_2023_16313
title: 'Watch: Formation of Chinese ships blocks Philippine boats - BBC News'
date: '2023-10-06'
section: General
url: http://www.bbc.co.uk/news/world-asia-67025727
content: |-
  The BBC saw first-hand how Chinese ships were manoeuvring in the South China Sea to block Philippine vessels.

  Journalists were on board a Philippine Coast Guard boat, which was acting as a security escort for a resupply mission, when it came within metres of Chinese ships.

  It came as long running tensions over disputed waters have flared up.
