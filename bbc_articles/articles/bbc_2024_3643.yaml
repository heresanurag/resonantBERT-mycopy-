content: |-
  The papers look into deaths at Gaza aid drop and whether dangerous police officers continue to 'hide in plain sight'

  The dramatic political comeback of George Galloway presents Sir Keir Starmer with another headache - according to the Sun in its online coverage.

  The paper says the left-wing firebrand and former Big Brother contestant focused on Gaza as he gallivanted through mosques across Rochdale, to seize the support of its Muslim population. The Times says the campaign was one of the most divisive in recent years. The Guardian uses the same word to describe Mr Galloway. It says he was so confident of victory that shortly after the polls closed, he'd briefed reporters that he'd won comfortably, before announcing plans for a mass rally.

  The Daily Telegraph covers the spat between Rochdale's new MP and the leader of the Reform Party, Richard Tice - who claims that his candidate and campaigners suffered abuse and death threats. Mr Galloway rejects the suggestion his supporters engaged in bad behaviour - saying that Mr Tice had "rather lost his balance".

  The front page picture of the Guardian captures the aftermath of the chaos in Gaza. It shows three Palestinian men holding a body, which is wrapped in a white sheet. The paper says there are "starkly different accounts" of how the deaths occurred. The Times believes the tragedy will almost certainly end hopes of a six week ceasefire. In an analysis piece, it says Israel is dependent on the Biden administration for arms and diplomatic support - and the moment where America pushes the brakes seems near.

  There's widespread condemnation of the errors made by the Metropolitan Police, which led to the appointment of Wayne Couzens to the Diplomatic Protection Squad -- before he kidnapped and murdered the marketing executive, Sarah Everard. Sarah Vine in the Daily Mail says it would have been hard-wired into Ms Everard's brain that a policeman was someone she could trust and that it sets her blood boiling, that she met a monster. The Sun is equally condemnatory describing officers responsible for vetting recruits as "simply useless, lazy and lethargic."

  "Britain's broken borders" is the headline in the Mail. It says the official reviews which were carried out by the sacked immigration chief, David Neal, expose shocking failings with the migration system - with airport passport checkpoints left unmanned. In an editorial, the paper accuses the government of trying to bury bad news by releasing the findings when all eyes were trained on the report into Couzens. The Home Office said the publication was "itself a demonstration of transparency".

  According to the Daily Telegraph, Vladimir Putin is trying to destabilise Europe by flooding the West with migrants, to try to influence elections. It says that it's seen intelligence documents suggesting that Russia is using thousands of former militias in Libya to "weaponise" immigration. It says Mr Putin, who is increasingly isolated, is moving migrants to Europe's doorstep, along Russia's eastern borders and through proxies in the south, including Africa.

  Several of the papers mark the death of the Hairy Bikers star, Dave Myers, at the age off 66. The motorcycling chef, who had cancer, is pictured on the front of the Daily Star with his co-star Si King. It prints the words he used to pay tribute to Dave Myers: "My best friend is on a journey that, for now, I can't follow."

