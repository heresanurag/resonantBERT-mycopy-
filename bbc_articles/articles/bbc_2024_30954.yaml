  Rain has played a key part in this game, and it did so again for large periods of day four. An hour was lost in the morning while the extended afternoon session was delayed then interrupted twice. It meant time was being taken out of the game for the hosts, but also allowed Cummins and Starc to stay relatively fresh and come back for spells in each session of play. Cummins in particular was superb and hostile, as India struggled to deal with his canny changes in length. The tourists were looking settled when Nitish Kumar Reddy and Jadeja had shared 53 for the seventh wicket, but Cummins got the former to drag on and that opened the door. Siraj soon fell and Jadeja, looking to increase the scoring, holed out to square leg to make the follow-on a real possibility. It is unknown if Australia would have enforced it given Hazlewood's injury, but with the time taken out of the game already and the possibility of further rain on Wednesday, it seems highly likely they would have. However, the option was taken off the table by the brilliance of Bumrah (10 not out) and in particular Deep (27 not out). The pair were able to work singles almost at will as Australia set attacking fields, before Deep's bit of bravery took them beyond the target required. With the pressure released, he then carted Cummins into the second tier over mid-wicket, before the umpires decided the light was not good enough to continue. The unbroken stand of 39 has likely saved the game for India and they will hope that, having been completely outplayed in this game and in the second Test, momentum will now swing back in their favour.
