content: |-
  It's the best time of the year for football kit enthusiasts as clubs get decked out ready for the new season - but which is your favourite?

  Clubs around the world have been releasing kits for the upcoming season

  It's the best time of the year for football kit enthusiasts as clubs get decked out ready for the new season. With the Premier League and EFL due to restart in August, clubs in England, as well as elsewhere, have been releasing their latest kits for the upcoming campaign. For some fans, it's time for a new start and fresh hope, together with a new look, while for others it's about respecting the club's traditions. We've put together a non-exhaustive list of new kits below. Vote for your favourite at the bottom of the page.

  Inter Miami describe their new third kit as tapping into 80s nostalgia and leaning heavily on the "vibrancy of vintage Miami style". Throw a white linen blazer over the top to complete the look. The MLS team boast a number of vintage stars in their line-up, including Lionel Messi, Luis Suarez and Sergio Busquets.

  Black Panther star Michael B Jordan became a part-owner of the Cherries in 2022

  Bournemouth's Hollywood owner Michael B Jordan has collaborated on a special edition kit that the Cherries will wear during their pre-season tour of California. The club have produced two kits - one in red and one in black - with an interlocking cherry motif all over.

  Designer and Arsenal fan Dumbuya has used bold colours against a black palette

  Arsenal's third kit was designed in collaboration with British African heritage brand Labrum London. Designer Foday Dumbuya, who was born in Sierra Leone, explained, external that the use of pan-African colours are a nod to the club's close connection with their African fanbase, while the zig-zags bring energy - something which Arsenal have in abundance with the likes of Bukayo Saka and Declan Rice.

  Forward Cole Palmer showed he could handle the heat last season

  The motif across Chelsea's new home shirt is "the hottest part of the flame" according to the club. After a disappointing season in which they finished sixth, Chelsea's men will be hoping to ignite their title hopes under new manager Enzo Maresca this season. Meanwhile, following Emma Hayes' departure at the conclusion of the last campaign, WSL champions Chelsea will be hoping that new manager Sonia Bompastor can carry the torch forward.

  Latina Calcio's home kit is a bit of an epic

  Italian designer Ezeta have turned to Greek mythology for the design of Serie C side Latina Calcio's new kit. The pattern across the jersey is inspired by a fifth-century BC vase attributed to Persephone, which depicts Ulysses and the sorceress Circe in Homer's Odyssey. Circe lived on the island of Aeaea, known today as the Circeo Promontory, which is located in the Province of Latina, south of Rome.

  Barcelona's new home kit goes back to basics

  To mark their 125th anniversary, Barcelona's new home kit for the 2024-25 campaign is a throwback to the first ever Barcelona strip from 1899. After finishing 10 points off leaders Real Madrid last season, the Catalan club will be hoping to get back on track under new boss Hansi Flick. Barcelona's women, meanwhile, are reigning champions in Liga F and the Women's Champions League.

  Juventus's new home kit is out of this world

  At face value, Juventus' home shirt is business as usual, but a closer inspection reveals a subtle crater pattern designed to reflect the moon's surface. The pattern is supposed to inspire "players and fans alike to explore new horizons". The Old Lady have not won Serie A since the 2019-20 season.

  Marc Guehi (left) played every game for England at Euro 2024 apart from the quarter-final when he was suspended

  On the eve of the centenary of Selhurst Park, Crystal Palace are looking to the future, with stars like Marc Guehi and Adam Wharton, both of whom travelled to Germany with Gareth Southgate's England team this summer - Guehi becoming a regular starter at Euro 2024. Their new home shirt sticks to the traditional vertical red and blue stripes, with a lively design that reflects the "energetic spirit and identity of the club".

  Palace's 'Eagle Yellow' away strip features a simplified eagle-on-ball crest and an eagle graphic across the front. The club said: "Eagle Yellow follows in a long tradition of yellow kits for the club over the years, with the colour first emerging in the 1960s and playing a part in some of the most memorable occasions in our history on the road."

  Ipswich Town made their fans proud with an impressive promotion season in the Championship during the 2023-24 campaign

  The club describe Ipswich's new home shirt as having a "heritage feel". The badge has been picked out with a shield around it and the original Umbro diamond is used to celebrate the brand's centenary. Kieran McKenna's team reached 96 points in the Championship last season and will be hoping to bring that good form into their first year back in the top flight in 22 years.

  We may see a new-look Liverpool under new manager Arne Slot

  It's all change at Anfield with the departure of former manager Jurgen Klopp, but the Reds will be hoping for continued success under new Dutch manager Arne Slot. The collar on this season's home kit is a nod to the shirt worn by Liverpool in 1983-84 under Joe Fagan. Like Slot, Fagan succeeded another Anfield great in Bob Paisley and managed to deliver the European Cup in his first year in charge.

  Will the Postecoglou project deliver silverware this campaign?

  Tottenham's home shirt for the new campaign combines a white base with navy sleeves, collar and side panels. Spurs just missed out on Champions League football last season, but will be hoping to make further progress under Ange Postecoglou. Meanwhile, Jan Robert Vilahamn led the women's team to the FA Cup final last season.

  Newcastle's new home shirt reflects the kit Alan Shearer wore back in the day

  Adidas have taken over from Castore in manufacturing Newcastle's kits for the 2024-25 season. The German brand looked after the Magpies' kits between 1995-2010 - a period that saw the likes of Alan Shearer, David Ginola and Faustino Asprilla play for the club. Newcastle's new home jersey harks back to the kit worn by the team during the 2002-03 season.

  Fulham are entering their third consecutive season in the Premier League

  The club describe their new home kit as giving a "contemporary twist" to a "timeless, classic, look," with a "waffle base" fabric throughout. Waffle, indeed.

  Manchester United finished eighth in the league last season, but won the FA Cup

  Manchester United part-owner Sir Jim Ratcliffe has opted for continuity at Old Trafford by sticking with manager Erik ten Hag, who won the FA Cup last season. In terms of this season's kit, there is a new sponsor and the iconic red has a glow effect because of the rayon-style fabric.

  City would love to carve their name on the Premier League trophy for a fifth successive year

  The reigning Premier League champions will push for a historic five-in-a-row this campaign. Their new home shirt features a graphic detail on the collar and cuffs and the font on the back was designed in collaboration with City fan Noel Gallagher. You gotta roll with it.

  Leeds recently debuted their home kits with new sponsor Red Bull

  Leeds' home kit for the new season is a simple affair, with a white base and blue accents on the side panels. The most striking thing about the shirt is the sponsor. The Championship club announced a new multi-year agreement with Red Bull in June, with the energy drinks manufacturer taking a minority stake in the club.

  Leeds' away strip harks back to the glory days of 1974

  Leeds United's new away strip is inspired by the kits worn by players during the 1973-74 season, when the Yorkshire club won the First Division for the second successive season under manager Don Revie. The bold yellow and 'smiley' badge match those worn during that illustrious period.

  Aston Villa have marked their 150th anniversary in style

  Aston Villa's new home kit respects the club's traditions, with 'AV 150’ in calligraphy on the back of the collar to mark the 150th anniversary of the club. It's also adorned with a new club crest. After finishing fourth last season, the Birmingham club have qualified for the Champions League. The last time they played in the continent's premier club competition (then known as the European Cup) was during the 1982-83 season, having won it the year before.
