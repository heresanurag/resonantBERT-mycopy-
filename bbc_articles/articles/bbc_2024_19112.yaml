content: |-
  More than 100 women who experienced complications have received payouts from manufacturers.

  Women harmed by vaginal mesh in England get payout

  More than 100 women who experienced pain and complications from transvaginal mesh implants have received payouts from three manufacturers of the products. The financial settlement offered by companies Bard, Boston Scientific, and Johnson & Johnson has not been disclosed. This is the first successful group claim in England after some 10,000 women were injured by mesh implants, which treat incontinence and pelvic organ prolapse. Some women were left in permanent pain, unable to walk, work or have sex.

  Lisa Lunt, partner at law firm Pogust Goodhead, which led the actions on behalf of the women, said those implanted with transvaginal mesh had suffered years of chronic pain and suffering. But she said lots of women had missed out on payouts because of a deadline to claim. "Hundreds of women were prevented from making a claim due to strict 10-year time limits that are in force from the date that the product was manufactured. "It’s about time that the government took action to increase the time limits," she said. Kath Sansom, from campaign group Sling the Mesh, said that it was "groundbreaking" to achieve the successful group action, but it would only benefit a fraction of women harmed by the mesh products. She believes 40,000 women could be affected by mesh complications - about 10 to 20% of those given mesh implants. There has already been a successful group action in Scotland.

  Pelvic mesh was considered to be the gold standard treatment for incontinence and prolapse in women for many years. However, the net-like implant can erode and harden, cutting through tissue and causing serious pain. Thousands of women who have experienced life-changing complications have lost their mobility, relationships and jobs. Earlier this year, England's patient safety commissioner called on the government to act quickly to help victims of pelvic mesh implants. In 2020, a review found many lives had been ruined because women's concerns about treatments they had been given had been ignored.

  The three mesh manufacturers involved have issued statements. Bard confirmed that legal action brought by the firm on behalf of the women had been resolved "without any admission of liability”. Boston Scientific said the action by claimants had been "successfully resolved without any admission of misconduct or liability”. Johnson & Johnson said the action against the company over transvaginal mesh devices had been resolved. According to The Guardian newspaper, the total payout is expected to run into millions of pounds.
