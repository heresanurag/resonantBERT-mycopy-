title: 'FA Cup first round: What lies ahead for the lowest-ranked teams? - BBC Sport'
date: '2024-11-01'
section: FA Cup
url: http://www.bbc.co.uk/sport/football/articles/cr5m3d3qypmo
content: |-
  Eighth tier Hednesford Town are among the non-league sides in action as BBC Sport looks at the lowest-ranked sides left in the FA Cup.

  Hednesford Town's Jake Jervis and Nile Ranger of Kettering Town are two familiar names in FA Cup first-round action

  It’s that time of year again where non-league clubs are thrust into the limelight and dare to dream big. From Maidstone United’s 2-1 win over now Premier League side Ipswich Town last season to Wrexham’s famous victory against Arsenal in 1992, the magic of the FA Cup never fails to deliver. The first round has once again thrown up all manner of unique meetings and history to be made, with the lure of a glamour tie now within touching distance. Let’s take a look at the lowest-ranked teams still in the competition - after grinding through the qualifying rounds - and what lies ahead for them this weekend.

  Manager Richard Lavery has led Kettering Town to an FA Cup tie against rivals Northampton Town

  Arguably the biggest story of the first round belongs to Kettering Town. It has already taken the Poppies four matches to get here, but they have been rewarded with a trip to their local rivals Northampton Town who play four divisions above. Only 17 miles of the A43 separate these two clubs, who have coexisted for more than 125 years. They have met in this competition five times before. The last such occasion was 35 years ago, also in the FA Cup first round, with Northampton winning 1-0, while the time before that was back in 1961 in the second round, which ended 3-0 to the Cobblers. You'd have to dig out the archives from the 1900s to find the first three games, two of which came in 1901 in the fifth qualifying round - the equivalent to today's first round. They played out a 2-2 draw before Northampton won the replay 2-0. Then in 1904, Northampton again came out as 2-0 victors in a fourth qualifying round clash. Kettering are top of the seventh-tier Southern League Premier Division, while Northampton are 18th in League One. A total of 78 league places separate the two sides, though the visitors do have ex-Celtic and Norwich striker Gary Hooper and former Newcastle forward Nile Ranger to call upon. The game will be live on BBC Two on Saturday at 17:30 GMT.

  Hednesford Town are the only side in the eighth tier of English football still in the FA Cup this season

  Hednesford Town might also stake a strong claim for being the weekend's biggest headline. The Pitmen are officially the lowest-ranked team left in the FA Cup and ply their trade in the eighth tier of English football, where they are 14th in the Northern Premier League Division One West. Manager Steve King described his side's progress as "unbelievable" having started the competition on 3 August in the extra preliminary round. The Staffordshire side have won six ties and played an astonishing nine games in the competition, including three consecutive replays, just to get to the first round. King won't be able to enjoy the fruits of his labours though, with the club sacking him on Thursday, external after a "breakdown in his relationship with the board". They are also the FA Cup's leading scorers so far with 22 goals, 10 ahead of second highest Gainsborough Trinity who they host on Saturday (more on Gainsborough shortly). There is one familiar face among the Hednesford squad in the shape of ex-Birmingham City, Portsmouth, Plymouth and Luton forward Jake Jervis. It marks the first time the club have reached the first round for 10 years, since losing 2-1 at home to Crawley in 2013-14. Their best ever FA Cup run was in 1996-97 when they made it to the fourth round before being beaten 3-2 away at eventual finalists Middlesbrough.

  Juninho Paulista and Fabrizio Ravanelli were among the Middlesbrough side who beat Hednesford Town on their best ever FA Cup run in 1997

  Hednesford's opponents are Gainsborough Trinity, who haven’t made it to the FA Cup second round since 1952. But Gainsborough have the chance to create some history if they can get past a team who play one league below them. Russ Wilcox's side are struggling in 20th in the Northern Premier League but have several games in hand, thanks in part to their cup run. Trinity have won four ties to reach this stage and with only one tier separating them from Hednesford, it means one of the lowest-ranked teams will make it through.

  Gainsborough Trinity last made it to the FA Cup first round in 2017-18 and were beaten 6-0 at home to Slough Town

  Harborough Town had never made it to the first round of the FA Cup before, so they will be making history when they travel to face National League South side Tonbridge Angels on Saturday. The seventh-tier Bees, who play in the Southern League Premier Central Division, booked their place thanks to a 1-0 win at home to Bury two weeks ago. "It's the FA Cup, it doesn't have to be a blockbuster, you just have to get in the next round and little old Harborough are there," said manager Mitch Austin. Harborough's director of youth football Maz Hayton told BBC Radio Leicester: "We're buzzing with the opportunity that's provided with our first-team coach, our manager, our gaffer Mitch Austin. He's been tremendous at the club - a revelation."

  Horsham and Guiseley are the other two lowest-ranked sides from the seventh tier who made it to the FA Cup first round. Isthmian League Premier side Horsham travel to League Two Chesterfield, while Northern Premier League outfit Guiseley face an even trickier test at League One Stevenage. Guiseley aren't in unfamiliar territory, having reached this stage five times in the last 14 years, most recently in 2021-22 when they lost 1-0 away at AFC Wimbledon. The Lions' best run came in 2018-19 as they reached the second round before suffering a 2-1 defeat at home by Fleetwood Town. As for Horsham, it was only last season that the Hornets went all the way to round two, albeit in bizarre circumstances after losing a first round replay 3-0 against Barnsley but going through because the Tykes fielded an ineligible player. They eventually crashed out away at Sutton United following a 3-0 defeat. This season will be the sixth first round tie in their history.
