title: UK EuroMillions ticket-holder claims £111.7m prize - BBC News
date: '2023-06-03'
section: UK
url: http://www.bbc.co.uk/news/uk-65795050
content: |-
  The winner becomes the 18th UK player to win more than £100m in a EuroMillions jackpot.

  A UK ticket-holder has come forward to claim the £111.7m jackpot from Friday's EuroMillions draw.

  Lottery operator Camelot said it had received a claim which would now go through a process of validation.

  Once the ticket has been validated and paid, the winner can decide if they want to share the news.

  This winner will become the 18th UK player to win more than £100m in a EuroMillions jackpot.

  The winning numbers were 03, 12, 15, 25 and 43 with Lucky Stars 10 and 11.

  The lucky winner will be wealthier than England footballer Harry Kane (£51m), Harry Potter actor Daniel Radcliffe (£92m) and pop singer Dua Lipa (£75m), according to the Sunday Times Rich List.

  Andy Carter, senior winners' adviser at the National Lottery, said: "It is wonderful news that a lucky ticket-holder has claimed this incredible prize."

  Last month, a UK ticket-holder claimed £46.2m out of a possible £138m.

  In July last year, a UK ticket-holder won a record jackpot of £195m, but kept their identity anonymous.
