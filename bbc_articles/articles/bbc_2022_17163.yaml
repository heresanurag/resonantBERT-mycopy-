title: White Christmas forecast for Scotland as weather warning issued - BBC News
date: '2022-12-24'
section: Scotland
url: http://www.bbc.co.uk/news/uk-scotland-64080993
content: |-
  A Met Office yellow alert for snow and ice has been put in place for Christmas Day and Boxing Day.

  It could be a white Christmas for many Scots after a winter weather warning was issued.

  The Met Office yellow alert for snow and ice is from 21:00 on Christmas Day until 18:00 on Boxing Day.

  Up to 10cm (4in) of snow is expected on higher ground, with blustery snow showers forecast.

  The warning covers Aberdeenshire, Moray, Perth and Kinross, Stirling, the Highlands and large swathes of west and central Scotland.

  Last year was declared a white Christmas after snow fell in Braemar and Aboyne in Aberdeenshire, Strathallan in Perthshire and across Shetland.

  The year before was also technically a white Christmas, with 6% of weather stations reporting some snow falling in 2020 but in most places it did not lie on the ground.

  On Friday, the Met Office said: "Strengthening west-northwesterly winds will bring increasingly frequent wintry showers to the west of Scotland through Sunday night and into Monday morning.

  "These may fall as snow to low levels for a time where temporary accumulations of 1-3cm are possible, with 5-10cm of snow over the hills. Icy surfaces will be an additional hazard.

