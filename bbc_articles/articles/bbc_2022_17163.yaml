  "Snow will become increasingly confined to higher ground through Monday morning, with a further 10cm or so possible by the end of the day.

  "Strong to gale force winds bring the risk of drifting and blizzards for upland areas, with a small risk of isolated power outages as the snow and strong wind affects power lines."

  The weather service said road and rail journeys could be affected as it warned of icy patches forming on roads, pavements and cycle paths.

  In recent times, about half of Christmas Days have seen some snowfall recorded somewhere in the UK but the widespread coverings evoked by Dickensian Christmas scenes are now a rare event.

  There has only been a widespread covering - where more than 40% of weather stations in the UK reported snow on the ground at 09:00 - four times since 1960, in 1981, 1995, 2009 and 2010, according to the Met Office.
