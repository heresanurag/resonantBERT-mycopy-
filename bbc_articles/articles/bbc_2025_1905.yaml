title: 'Beterbiev vs Bivol 2: Briton Hamzah Sheeraz bout with Carlos Adames ends in
  controversial draw - BBC Sport'
date: '2025-02-22'
section: Boxing
url: http://www.bbc.co.uk/sport/boxing/articles/cj67knpl4p8o
content: |-
  Hamzah Sheeraz's world title challenge ended in disappointment but the Briton was fortunate to claim draw against WBC middleweight champion Carlos Adames in Saudi Arabia.

  Hamzah Sheeraz's world title challenge ended in disappointment but the Briton was fortunate to claim a draw against WBC middleweight champion Carlos Adames in Saudi Arabia. A cautious Sheeraz – who was on a 15-fight knockout streak – never really found his rhythm and seemed reluctant to let his hands go. Adames produced the cleaner and more varied work, the volume of punches and fluidity. The Dominican, 30, retained his belt but can feel unlucky with a split-decision draw. The three judges in Riyadh scored it 118-110 to Adames, 115-114 to Sheeraz and 114-114. With swelling under his right eye, Sheeraz cut a frustrated and deflated figure at the final bell. The 25-year-old was guilty of overthinking, being too hesitant and perhaps overawed by the occasion. Sheeraz was fortunate to remain undefeated as his record extended to 21 wins and one draw. He told Sky Sports afterwards: "I'm an overachiever. I'm very blessed but we'll go back to the drawing board and fix those errors. "No excuses, I've got a hand injury but that's got nothing to do with the outcome of the fight."

  Sheeraz looked disappointed at the final bell, before the scorecards were read out

  As challenger, Ilford's Sheeraz made an understated ring walk first, keeping his eyes firmly on his rival as both boxers were introduced to the crowd. Adames was in confident mood throughout fight week, describing the Briton as hype and questioning the quality of his previous opponents, while not affected by the jeers which greeted him. The pair sized each other up in the opening rounds and the champion crouched down, bobbed and weaved his way around the ring, targeting 6ft 3in Sheeraz's body. "You're going to become world champion tonight, baby," trainer Ricky Funez told Sheeraz early on. The Londoner - who trains out in Los Angeles - upped the tempo in the fourth as he doubled up his piston-like jab and followed it up with a body shot and a chopping right. But Adames hunted Sheeraz down and landed clean shots to win the sixth and then made the challenger wince when he connected with a thunderous overhand right in the eighth. Promoter Frank Warren seethed as he walked over to Sheeraz's corner at the end of round nine and yelled at his fighter to throw the uppercut. A thudding right – Sheeraz's best shot of the fight – did not land until the 11th and his corner changed their tune before the final round, saying: "You have to knock him out to win." It was Adames, though, who ended the fight on top and looked to have defended his title with an assured display. During the wait for what would be controversial scorecards, Sheeraz appeared to gesture to his promoter Warren that there was something wrong with his hand. Earlier this week, Sheeraz had talked up his dreams to become a three-weight world champion and welcomed a contest with Saul 'Canelo' Alvarez next year. Those ambitions, for now, seem a world away.

  American Stevenson dominated the contest before Padley's corner threw in the towel just before the end of the ninth round

  Another Briton also saw his dreams dashed as American Shakur Stevenson stopped Josh Padley in the ninth round to make a stylish defence of his WBC lightweight title. Part-time electrician Padley accepted a late call-up to fight the 27-year-old on Wednesday after original opponent Floyd Schofield Jr pulled out. It was a valiant effort but the gulf in class was clear from the outset. The undefeated Stevenson had stopped just 10 of his previous 22 opponents, but what the New Jersey fighter lacks in knockout power he makes up with quick hands, combinations and sharpness. A perplexed Stevenson looked at Padley's corner when they got overly excited by a shot which almost landed in the third. Moments later, the Doncaster fighter's legs buckled by a solid right from the three-weight world champion. Stevenson dropped his 29-year-old opponent with a good body shot in the ninth. The courageous Padley fought on, even bringing a smile from Stevenson when unleashing his own flurry of punches, but the writing was on the wall. He hit the canvas twice more in the round before the fight was halted as his corner threw in the towel.

  Callum Smith extended his record to 31 wins and two defeats

  Light-heavyweight Callum Smith kept his hopes of becoming a two-time world champion alive by inflicting a first career defeat on fellow Briton Joshua Buatsi with a unanimous points decision win. Both men enjoyed success in a high-level back-and-forth encounter - one which could have headlined a UK arena. Liverpudlian Smith targeted Buatsi's body early and hurt the Olympian with a hook in the sixth. But Buatsi came back strongly, using his jab well and landing power punches of his own as former super-middleweight world champion Smith, bloodied by a cut to his eye, tired. The 34-year-old Smith was awarded the decision with scores of 115-113, 116-112 and a contentious 119-110 to become the WBO 'interim' champion. Londoner Buatsi, 31, was defeated his 20th pro fight. "I was the underdog tonight and it got my back up a little bit that [people said] I'm finished," said Smith. "I feel like I'm good enough to be a two-weight world champion."
