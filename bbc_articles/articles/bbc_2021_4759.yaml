title: Baby found dead in Bilston supermarket car park - BBC News
date: '2021-04-11'
section: Birmingham & Black Country
url: http://www.bbc.co.uk/news/uk-england-birmingham-56710338
content: |-
  West Midlands Police says it has identified the mother and she is receiving "appropriate care".

  The baby was found by a member of the public in the car park of Morrisons on the Black Country Route in Bilston

  A newborn baby has been found dead in the car park of a supermarket.

  A member of the public found the baby at Morrisons on the Black Country Route in Bilston at about 09:00 BST, West Midlands Police said.

  In a statement, the force said it did not currently know "when the baby was born or how they came to be in the car park".

  Police have since identified the mother of the baby and said she was receiving "appropriate care".

  Det Insp Jim Edmonds said it had been a "tragic discovery" and officers had been "treating the scene and the baby with the utmost care and dignity".

  In an update, issued at 20:00 BST, West Midlands Police said it had traced the mother and officers would be speaking to her "in due course".

  It thanked the public for sharing its appeal to trace her.

  A Morrisons spokesman said the company was helping the police and it would not be releasing any further information.

