title: 'Covid: Bereaved Carmarthenshire survivor questions lockdown easing - BBC News'
date: '2021-07-15'
section: General
url: http://www.bbc.co.uk/news/uk-wales-57838628
content: |-
  Gwyn Tovey's wife Rita died just weeks after he caught the virus, which led to Long Covid.

  A man who lost his wife to Covid just weeks after catching it himself, has warned restrictions are being lifted too quickly across the UK.

  Gwyn Tovey, 72, from Carmarthenshire, has been caring for his 94-year-old mother Betty, who also caught the virus and has dementia, while dealing with long Covid himself.

  His wife Rita died just weeks after Gwyn picked up the virus in December.

  Regarding lockdown easing across the UK, he asked: "Do we really know what we're doing? Is it one heck of a rush?"
