title: Glastonbury 2024 adds acts to line-up and reveals stage times - BBC News
date: '2024-06-04'
section: Somerset
url: http://www.bbc.co.uk/news/articles/c1ddp11l2gzo
content: |-
  Acts like Squeeze and Seasick Steve are added to the festival line-up, with just three weeks to go.

  Glastonbury reveals more of line-up and stage times

  Dua Lipa will headline the opening night of the festival

  More of the line-up for this year's Glastonbury festival has been revealed, with acts like The Snuts and The Zutons joining previously-announced headliners Dua Lipa, Coldplay and SZA. Other acts added to the bill include Nigerian star Tems, rising indie artist Rachel Chinouriri and Manchester legends James. The festival kicks off in three weeks, with gates opening on Wednesday, 26 June. Tickets sold out in October, but full coverage will be available on BBC radio and television as well as BBC Sounds and iPlayer. Highlights are expected to include country star Shania Twain in the Sunday teatime "legend slot" and pop superstar Cyndi Lauper making her Pyramid Stage debut. The singer recently announced her farewell tour, 41 years after her breakthrough hit Girls Just Wanna Have Fun. Other acts on the bill include dance giants Disclosure and Justice, pop stars Jessie Ware and Sugababes, and rappers Little Simz and D-Block Europe. A surprise set will also take place at 18:00 on Saturday 29 June, on the Woodsies stage. In previous years, acts like The Killers, Radiohead, Foo Fighters and George Ezra have popped up in those secret slots. Speculation about this year's guest will undoubtedly run rife at Worthy Farm until the moment they take to the stage.

  Glastonbury has also revealed the stage times for every act, allowing fans to plan their trip - amid the inevitable, excruciating clashes between their favourite acts. Dance fans face a tough choice on Friday night, for example, when Jungle go up against Jamie XX. And people looking for a dose of introspective melancholia at the end of the festival will have to choose between The National on the Other Stage, and James Blake, who plays in the Woodsies tent. Meanwhile, the early afternoon line-up for The Other Stage is not listed on either Saturday or Sunday - with acts to be confirmed in the coming weeks.

  Dua Lipa will headline the Friday night on the Pyramid Stage, making her first appearance at Glastonbury since 2017. Speaking to the BBC last month, she said the show occupied "50% of my thoughts". "I’ve got to figure out a way to make 150,000 people feel like they’re in a small little nightclub," she added. "That’s the goal, and if there’s one place to do it, it’s gotta be Glasto." Coldplay will top the bill on the Saturday night - becoming the first act to headline the festival on five separate occasions. Currently in the middle of the Music of the Spheres world tour, the band have promised some surprises for their return to Somerset. And US soul star SZA will close the festival on Sunday, bringing confessional, poetic and subtly confessional hits like Saturn and Kill Bill to the Pyramid Stage. The festival will pay tribute to Annie Nightingale - the BBC Radio 1 DJ and Glastonbury stalwart, who died earlier this year. A special set on the BBC Introducing Stage will see BBC acts that she mentored - including Jon Carter, Krafty Kuts and Martha - playing some of her favourite songs.

  Here are the line-ups and set times for the five biggest stages at the festival. The full line-up, which includes more than 100 stages, is available on the official Glastonbury website., external

