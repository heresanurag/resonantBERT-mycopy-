title: 'Mike Amesbury: Ex-Runcorn MP blames Labour mistakes for election losses -
  BBC News'
date: '2025-05-06'
section: Politics
url: http://www.bbc.co.uk/news/articles/c87p99jzrxjo
content: |-
  Mike Amesbury says Reform UK benefitted from government mistakes over welfare cuts.

  To play this video you need to enable JavaScript in your browser. This video can not be played Mike Amesbury: "The prime minster and the chancellor need to own their political mistakes"

  Ex-Labour MP Mike Amesbury has blamed "big political mistakes" over benefit cuts by the government on a disastrous set of election results that saw his former seat fall to Reform UK. Labour lost 187 council seats as well as a by-election in Runcorn and Helsby, where Reform overturned a 14,700 majority to win by just six votes. The by-election was triggered when Amesbury resigned after receiving a 10-week prison sentence for assaulting a constituent, which was reduced to a suspended sentence after an appeal. While taking responsibility for causing the by-election, Amesbury said Reform were "the beneficiaries" of government mistakes on cutting winter fuel payments and disability benefits.

  The by-election vote was held alongside a series of council elections across England, which marked Sir Keir Starmer's first major electoral test as prime minister. Amesbury said he "wasn't surprised" by the results. He told BBC Radio 4's Today programme: "When you look at the results in the months leading up to this by-election and the local election results the same picture emerged - and Reform have been the beneficiaries of some big political mistakes from the Labour government." He cited the decision to axe winter fuel payments for millions of pensioners and make it more difficult for people to claim personal independence payments (Pips). In an interview with BBC Breakfast, Amesbury said "obviously my mistake gave people the opportunity to vote in a by-election, but overturning nearly a 15,000 vote majority is not simply on my shoulders". He added: "There's been Labour losses up and down the country." Amesbury said he "sincerely hopes" the prime minister and Chancellor Rachel Reeves "not only listen, but learn and respond".

  Amesbury's comments come as Labour MPs have been growing increasingly vocal about opposition to the party's benefit cuts. He is one of several Labour voices partly blaming winter fuel and Pip cuts for the party's local election drubbing, which saw Labour lose two-thirds of the seats it was defending. BBC analysis estimates that, if elections had taken place across Britain on 1 May, Labour would have won 20% of the vote - equalling its lowest previous recorded performance in 2009. It is the first time the combined projected share of the vote for the Conservatives and Labour has fallen below 50%, underlining the continuing fragmentation of the British political landscape. Behind the scenes Labour's leadership is facing mounting pressure to change course - with a potential rebellion brewing at an upcoming vote on disability benefits.

  Health Secretary Wes Streeting has acknowledged restricting winter fuel payments dented Labour's support at the elections, adding it had "come up on the doorstep" during campaigning and many voters "aren't happy" with the move. He told the BBC Labour were "reflecting on what the voters told us," but the policy was not being formally reviewed.

  Amesbury spent three nights in jail following his 10-week sentence being handed down at Chester Magistrates' Court on 24 February. Chester Crown Court later suspended his sentence, allowing him to serve his time in the community instead of behind bars. Following his trial, Amesbury said he had spent a night in hospital due to his deteriorating mental health. Amesbury said he has since been treated for depression and now takes medication and has "support from counselling". He told the BBC he wishes he had acted sooner to treat his mental health "before the incident". Of the night of the attack he says he "regrets for every single day of my life that I did not walk away - but I did what I did and I paid the price". During the interview, he apologised to Paul Fellows, the constituent he assaulted. Amesbury told the BBC he has still not met Mr Fellows but had apologised "very publicly" and said he would be happy to meet to apologise in person. Mr Fellows previously told the Mail on Sunday, external in March: "I've not had any kind of personal apology, anything in either writing or trying to contact me. "I felt like it was just purely for the media and the judge." In the same interview, Mr Fellows said Amesbury "could have killed me and deserves to be in prison".

