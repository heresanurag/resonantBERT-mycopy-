title: Catherine, the Princess of Wales, drives armoured vehicle - BBC News
date: '2023-11-09'
section: General
url: http://www.bbc.co.uk/news/uk-67362958
content: |-
  The Princess of Wales also met regimental mascot Emrys Jones, a Welsh Mountain Pony.

  The Princess of Wales has made her first visit to 1st The Queen's Dragoon Guards after being appointed Colonel-in-Chief in August.

  At their base in Norfolk, Catherine drove a Jackal 2 armoured vehicle , flew a drone and also met the guard's mascot, Emrys Jones the Welsh Mountain Pony.

  King Charles III previously held the position of Colonel-in-Chief while he was the Prince of Wales, and before him the first post holder was Queen Elizabeth, the Queen Mother.
