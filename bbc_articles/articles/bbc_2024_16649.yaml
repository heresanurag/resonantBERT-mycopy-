title: 'Esther Martin: Man charged over fatal Jaywick XL bully attack - BBC News'
date: '2024-07-26'
section: Essex
url: http://www.bbc.co.uk/news/articles/c724dyl41d3o
content: |-
  Police say Ashley Warren, 40, of Leyton, London, has been charged in connection with the incident.

  Esther Martin was fatally injured in the attack in Jaywick in February

  A man has been charged after a woman was fatally injured by two XL bully dogs. Esther Martin, 68, died after being attacked by the animals in Hillman Avenue, Jaywick, Essex, on 3 February. Ashley Warren, 40, of Walnut Road, Leyton, London, has been charged with two counts of owning or being in charge of a dog dangerously out of control, causing injury resulting in death. Essex Police said it was the first case to be charged since new laws on owning XL bullies came into force this year. Mr Warren is due to appear at Colchester Magistrates' Court on 22 August.

  Mr Warren, formerly of Hillman Avenue, Jaywick, has also been charged with two counts of possession or having custody of a fighting dog, two counts under the Animal Welfare Act, possession of a bladed article and possession of a Class B drug. Both dogs were confirmed to be XL bullies following the fatal attack. Ms Martin, who was staying at the address in Hillman Avenue but lived in Woodford Green in east London, was found along with “two large dogs”, an inquest was told as proceedings were opened then suspended pending the outcome of the police investigation. Her medical cause of death was recorded as “dog bite wounds to the upper right limb”. Two dogs were destroyed at the scene and the breed was later confirmed by Essex Police.

