  Thousands gather in London for the start of a long weekend of festivities for the Platinum Jubilee.

  The Queen made an appearance on the Buckingham Palace balcony alongside active members of the royal family, where she greeted thousands of people who gathered in London to witness the start of Platinum Jubilee celebrations.
