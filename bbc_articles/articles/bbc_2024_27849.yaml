title: 'Spain floods: Málaga street turns into river - BBC News'
date: '2024-11-14'
section: General
url: http://www.bbc.co.uk/news/videos/c238er1891ro
content: |-
  Video shows people in Calle Alcazabilla struggling to cross a road as flood water surges through it.

  Video captures the moment people in Málaga struggle to cross a road as flood water surges through it.

  Filmed at around 13:30 local time (12:30 GMT) the footage shows water gradually gathering speed as it gushes down a cobbled street in Calle Alcazabilla.

  Spain's Civil Protection Agency sent a mass alert to phones in Málaga province after 22:00 local time (21:00 GMT) on Tuesday evening warning of an "extreme risk of rainfall".
