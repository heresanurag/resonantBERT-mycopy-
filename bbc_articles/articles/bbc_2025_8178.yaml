  The Crown Prosecution Service says it will not bring charges against a police officer after the deaths of two boys in a crash.

  No charges for police officer after teen e-bike deaths

  Kyrees Sullivan and Harvey Evans died in a bike crash in Ely, Cardiff

  A police officer driving a van which followed two teenagers before they both died in an e-bike crash in Cardiff will not face criminal charges, the Crown Prosecution Service (CPS) has said. The CPS said there was insufficient evidence to provide a realistic prospect of conviction. Malcolm McHaffie, head of its special crime division, said it was decided that "no criminal charges will be brought against a South Wales Police officer". The deaths of Kyrees Sullivan, 16, and Harvey Evans, 15, sparked a riot in the city's Ely suburb.

  Best friends Kyrees and Harvey Evans were riding an electric bike when they fatally crashed on Snowden Road, shortly after 18:00 BST on 22 May 2023. Following the deaths, rumours rapidly spread on social media that the boys had been chased by police before the crash. Cars were set alight and fireworks thrown at police after 100 to 150 people gathered in Ely on the evening of the crash. The disorder continued until the early hours, leaving 15 officers injured and property damaged. More than 40 people have since been charged with a variety of public order offences following the riot, with nine defendants below the age of 18.

  This video can not be played To play this video you need to enable JavaScript in your browser. The deaths of the two teenagers sparked a riot in Ely, Cardiff

  Former South Wales Police and Crime Commissioner, Alun Michael, had initially insisted that the two teenagers were not being followed by police before they died. But CCTV footage analysed by BBC Verify later showed police were following the boys just minutes before the crash. South Wales Police later said that its officers had been following the boys in the minutes before, and the force referred itself to Independent Office for Police Conduct (IOPC). The IOPC served the driver of the police van, along with another officer in the vehicle, gross misconduct notices. At the time, the police watchdog said this did not necessarily mean disciplinary proceedings would follow The CPS also announced it was investigating the police officer driving the van for dangerous driving.

  On Monday, Mr McHaffie, said: "Following a thorough and detailed review of the evidence in relation to a single allegation of dangerous driving in this case, we have decided that no criminal charges will be brought against a South Wales Police officer. "We have concluded that there is insufficient evidence to provide a realistic prospect of conviction." The CPS added in its statement that it fully understood that this would be "disappointing news for the families of both boys" and would offer a meeting with them to explain their reasoning further.

  David Ford, director of the IOPC, said the families were informed of the referral to the CPS after it "thoroughly and carefully" analysed the evidence which determined there was an indication an officer may have committed a criminal offence related to their driving. He added that the IOPC acknowledged the CPS's decision and was finalising its stance on potential disciplinary action for the police van driver, with an update to follow once decisions were made. Mr Ford also announced the IOPC's second investigation into family complaints against South Wales Police, which covered a number of areas including the families' treatment at the scene of the incident, was close to finishing.
