title: 'Farningham: Transporter carrying luxury sports cars overturns - BBC News'
date: '2023-08-25'
section: General
url: http://www.bbc.co.uk/news/uk-england-kent-66621548
content: |-
  Police are investigating the crash which closed the A20 near Farningham, Kent, for several hours.

  A transporter carrying a fleet of luxury cars overturned on a main road in Kent.

  The vehicle came off the A20 near Farningham on Wednesday evening, spilling high-value cars across the carriageway.

  The driver of the transporter was treated for minor injuries, while the road was closed for several hours.
