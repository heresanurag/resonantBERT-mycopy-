  • None Great Britain's men's curling team failed to reach the semi-finals as they lost 9-5 in their tie-breaker against Switzerland. The British women's team play Sweden in the semi-finals on Friday (11:05 GMT) and will be guaranteed at least a silver medal if they win.
  • None Emily Sarsfield got her first taste of Olympic competition when she finished 22nd in the ranking round in the women's ski cross. She will ski against France's Alizee Baron and Canada's India Sherret in Friday's first knockout race (01:20 GMT).
  • None Team GB's bobsleighers recorded the fastest and second fastest push start times on the latest day of training. Brad Hall and his crew were quickest before finishing 15th fastest overall, while Lamin Deen's team were ninth overall. There will be two further training runs on Friday before the competition starts on Saturday.

