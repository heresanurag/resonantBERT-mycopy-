content: |-
  Great Britain's Dave Ryding targets a medal at the 2022 Winter Olympics after finishing ninth in the slalom in Pyeongchang.

  This video can not be played To play this video you need to enable JavaScript in your browser.

  Great Britain's Dave Ryding wants to challenge for a medal at the 2022 Winter Olympics after finishing ninth in the men's slalom in Pyeongchang. Ryding, 31, said he would take inspiration from Sweden's surprise gold medallist. "Andre Myhrer has just won and he's 35," Ryding told BBC Sport. "Mario Matt won in Sochi at the age of 35 and I'll be 35 in four years' time. "I came to skiing quite late and I'm really motivated to keep progressing."

  Dave Ryding finished 17th in the slalom at the 2014 Sochi Games

  Ryding was 13th after his first run but moved up to ninth on his second - 1.17 seconds slower than Myhrer - while fellow Briton Laurie Taylor finished 26th. "I've finished ninth at an Olympics and I'll accept that," Ryding added. "I could have done more but others will feel the same way."

  "If you look at the way he has come through since the 2010 Olympics, it's just been constant improvement all the way for eight years," he said. "You could argue that one of the things he lacks is that final risk-taking, but if he takes some risks he can be really quick."

