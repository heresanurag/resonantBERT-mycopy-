  Scotland are built to go wide. Wales would have known that but knowing it and stopping it are two different things. At their first attempt, the Scots scored, working the visitors left and right through a dozen and more punishing phases before hitting the accelerator. Graham sped away and found Kinghorn, who went over despite Anscombe's desperate efforts to halt him. Russell, who missed three kicks out of three at Twickenham last time out, banged over the conversion from close to the touchline. You got the sense he enjoyed it. Wales then lost Tom Rogers through injury that sparked a backline reshuffle. Centre Joe Roberts appeared off the bench on the left wing, with Ellis Mee switching to the right. Within seconds, Scotland scored again. Once more it was on the edge where Scotland made merry, this after Wales made a mess of an exit. Duhan van der Merwe fended off Mee and played in Huw Jones. Wales, ripped to shreds, could do nothing to stop Jones hitting Jordan running free outside him. Russell made it 14-3 with the conversion. Only 11 minutes had been played. Anscombe's deft chip in behind saw Murray score soon after, but it was only brief respite for Wales.

  Three minutes later, Scotland conjured a third. Jordan won ball in the air to start it and Russell's brilliance was there at the finish. Deep in the Welsh 22 and with Anscombe in his road, the fly-half dummied, stepped and then found Graham, who roared in. Another conversion and Scotland were already in dreamland. Wales' nightmare only grew darker. WillGriff John got binned for a cynical foul play. Then, they lost a fourth try. A totally self-inflicted nonsense score, too. Thomas tried a kick-pass to Murray on the right wing, which was a poor decision. Murray acrobatically kept the ball in play, but when Thomas fumbled trying to gather, Jordan was all over him, hacked on and scored. Wales were all over the place in defence and much better in what little attacking ball they had. A 20-point game in half an hour and they were fortunate it was still only 20 at the break. It was 27 before too long. Russell put a penalty to touch and Scotland attacked off it, Russell popping Kinghorn in under the posts. So classy, so ruthless. The fly-half has had a rough few weeks post-Twickenham - unfair in the extreme - but his response was terrific. He bossed it out there, banged over the conversion of Kinghorn's try with ease, and exited just after the hour with the job done. Scotland's issues late on started just before Russell went off. Wales mustered a second score of their own, getting in behind before Ben Thomas went over. Back to a 20–point game with the extras. Then, with Russell off the pitch, Williams blasted over, and after that came the Faletau moment, the score disallowed for Murray hurdling a tackle in the preamble. Wales hadn't done with the jumpy Scots, though. Max Llewellyn went over in the last throes for a fourth Welsh try and a losing bonus point and a four-try bonus that looked impossible for much of the day.

