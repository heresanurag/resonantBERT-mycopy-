title: Horse airlifted to safety from deep Italian pit - BBC News
date: '2023-06-26'
section: General
url: http://www.bbc.co.uk/news/world-europe-66025233
content: |-
  The dramatic moment a horse stranded down a four metre-deep Italian pit is hauled free by helicopter.

  A stranded horse stuck down a four metre-deep pit in Lazio, central Italy, had to be pulled to safety by helicopter on Sunday.

  Footage released by the Italian fire brigade Vigili del Fuoco shows the dramatic moment the horse is hauled free and taken out of danger.
