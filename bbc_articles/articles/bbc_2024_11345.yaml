content: |-
  Scottie Scheffler holds off Collin Morikawa to win the PGA Tour's Memorial Tournament - his fifth title of the year.

  Scheffler wins Memorial to claim fifth title of 2024

  Scottie Scheffler was congratulated by his wife Meredith and baby son Bennett after holing the winning putt

  -8 S Scheffler (US); -7 C Morikawa (US); -4 A Hadwin (Can); -3 C Bezuidenhout (SA); -2 M Fitzpatrick (Eng), S Straka (Aut), L Aberg (Swe)

  Scottie Scheffler holed a five-foot putt on the last to hold off Collin Morikawa and win the PGA Tour's Memorial Tournament by one stroke to claim his fifth title of the year. In doing so, the world number one became just the second player after Tiger Woods to win the Players Championship, Masters and Memorial in the same year. The American led on 10 under overnight, four clear of Morikawa, Adam Hadwin and Sepp Straka but, rather than the expected procession, he was pushed all the way. "I didn't do a whole lot well but I did enough to get it done," said Scheffler, who carded a two-over 74 to win his 11th PGA Tour title on eight under. "I feel like I've had some close calls in this tournament. The golf course was playing so tough, firm and fast - 16, 17 and 18 were brutal. "But it was a fun test of golf, I like it when it gets hard."

  It was the perfect tune-up for Scheffler who is hot favourite to win his third major at this week’s US Open at Pinehurst. On a tough day for scoring at Jack Nicklaus' Muirfield Village, Ohio, Scheffler's advantage was down to two after nine holes. But while Hadwin, who had started the strongest with three birdies in his opening seven holes, fell away with five bogeys in his final 11 holes to finish third on four under, Morikawa continued to press. The lead was down to one when two-time major winner Morikawa rolled in a 30-foot birdie putt on the par-three 12th, while Scheffler missed his attempt from a third of that distance. The advantage was back to two when Morikawa bogeyed the 16th, but Scheffler dropped a shot on the 17th to leave him with a one-shot lead with one to play. Both players overhit their approaches to the final green but both then chipped out to around five feet. Scheffler was up first and rolled his effort into the middle of the cup to seal the win and $4m (£3.14m) first prize. Amid the celebrations Morikawa knocked in his par putt to close with a one-under 71 and seven under total. Straka, who had been level with Morikawa on six under at the start of the day, fell away with a run of four bogeys in five holes from the 10th, but a chip-in birdie at the last saw him finish with a 76 to end joint fifth on two under. England's Matt Fitzpatrick, who won the 2022 US Open, holed six birdies as he shot the joint lowest final round - a three-under 69 - to also finish on two under, alongside Sweden's Ludvig Aberg (74). Rory McIlroy closed with a 76 to end two over, one ahead of England's Tommy Fleetwood who also shot a 76. Ireland's Shane Lowry, who was playing with Northern Ireland's McIlroy, had a disastrous round which included seven bogeys, two doubles and a triple-bogey seven on the 17th as he shot a 13-over-par 85 to finish 12 over.

  Mexico's Carlos Ortiz won LIV Golf Houston to claim his first title on the tour. Ortiz shot a five-under-par 67 to finish the 54-hole event on 15 under, one stroke ahead of Poland's Adrian Meronk. They were part of a four-way tie for the lead heading into the final round along with England's Paul Casey and Spain's David Puig. But Ortiz, whose only PGA Tour title came in Houston in 2020, took control with a birdie at the par-five 15th, where Meronk carded a bogey. Puig, who went round in 69, tied for third with American Patrick Reed, while Casey finished six shots behind Ortiz thanks to a 73. Spain's Jon Rahm withdrew during Saturday's second round because of an infection in his left foot. Rahm, who won the 2021 US Open, is set to play in the 124th edition of the event which gets under way on Thursday. Follow live text coverage of all four rounds of the US Open from 1230 BST on Thursday, with radio commentary of the final two rounds on Saturday and Sunday on the BBC Sport website and app and BBC Sounds.
