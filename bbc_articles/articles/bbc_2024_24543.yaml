title: The Office US star Jenna Fischer reveals breast cancer diagnosis - BBC News
date: '2024-10-10'
section: General
url: http://www.bbc.co.uk/news/articles/crkd8g307kro
content: |-
  Jenna Fischer, who starred as receptionist Pam, says she's "feeling great" after ten months of treatment.

  Jenna Fischer is best known for her role as receptionist Pam Beesly in The Office

  Actress Jenna Fischer has revealed she has been receiving treatment for breast cancer since December last year. Best known for her role as receptionist Pam Beesly in the US version of The Office, Jenna said she was "now cancer-free" after surgery and multiple rounds of chemotherapy and radiation treatment. "I'm happy to say I'm feeling great," Jenna shared on Instagram, adding she was opening up about her treatment to encourage other people to check for signs of the disease. "If I had waited six months longer, things could have been much worse," she wrote.

  Jenna, who also hosts the Office Ladies podcast, played Pam in the mockumentary series between 2005 and 2013 alongside Steve Carrell, who plays regional manager Michael Scott. The much-memed series, based on a BBC series of the same name starring Ricky Gervais, is one of the most-watched shows on Netflix and repeatedly ranks among the most popular US sitcoms.

  Jenna says she's now cancer free after surgery as well as chemotherapy and radiation treatment

  Jenna said her cancer was found after a routine scan in October 2023 which she said she'd been putting off. "Seeing women post photos of their mammogram appointments on Instagram needled me into setting my own (which I was late for)," she wrote, external. After that appointment, she said further tests found she had "stage 1 triple positive breast cancer". Jenna said that "luckily" her cancer was caught early but the tumour was aggressive so needed multiple rounds of treatment.

  There are a number of types of breast cancer and some, like triple positive, are known as hormone receptor-positive cancers. This means the tumours are encouraged to grow by hormones, such as oestrogen, progesterone and a protein called HER2, that are found naturally in the body These cancers are much more likely to respond to drug treatments that target these hormones to help stop the cancer cells dividing and growing. Cancer Research says the term "triple positive breast cancer" is not widely used in the UK, instead being called "invasive breast cancer". Breast cancer is the most common type of cancer affecting women in the UK according to the NHS, but it can also affect men. More than 50,000 people in the UK are diagnosed with it each year and figures from Cancer Research, external suggest one in every seven women in the country will be diagnosed in their lifetime. It still claims the lives of more than 11,000 British people each year, but Cancer Research says survival rates are improving, with 76% of patients living for at least 10 years after diagnosis.

  Jenna said her best friend Angela had "protected me and advocated for me" during her treatment

  During chemotherapy, Jenna said she lost her hair and shared a photo on Instagram of her "patchy pixie" cut as it grew back. She said she was ready to "ditch the wigs" she has been wearing for the past year, adding that "many people" in her life did not know she was undergoing treatment. "I needed spaces and people who did not regard me as a cancer patient." But she highlighted the support she'd had from people who did know, including her co-star Angela Kinsey, who plays picky safety officer Angela Martin in the series and co-hosts the Office Ladies podcast. "When I lost my hair, she wore hats to our work meetings to make sure I wasn't the only one," Jenna said.

  Jenna told her followers that she will "continue to be treated and monitored", and she urged fans: "Get 'em checked ladies". "My tumour was so small it couldn't be felt on a physical exam," she wrote, adding that had she delayed her scans "it could have spread". "Should you get a breast cancer diagnosis," she wrote, "there is a village waiting to care for you." If you have been affected by the issues raised in this article, help and support is available via BBC Action Line.

