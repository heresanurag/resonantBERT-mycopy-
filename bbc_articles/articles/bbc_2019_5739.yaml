title: Massive dust storm engulfs Australian city - BBC News
date: '2019-05-08'
section: General
url: http://www.bbc.co.uk/news/world-australia-48195044
content: |-
  The storm swept over Mildura in Australia with wind gusts reaching up to 87km/h (54mph).

  A huge dust cloud has swept across the city of Mildura in Australia.

  On Tuesday, wind gusts reached speeds of up to 87km/h (54mph).
