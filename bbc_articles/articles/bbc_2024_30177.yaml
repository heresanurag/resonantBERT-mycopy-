title: 'Red Sea sinking: UK family ''desperate'' as couple remain missing - BBC News'
date: '2024-12-01'
section: World
url: http://www.bbc.co.uk/news/articles/c62l2rn3zdzo
content: |-
  The family of a couple missing after a tourist boat sank are anxiously awaiting news of their loved ones.

  The family of a British couple still missing after a tourist boat sank in the Red Sea have spoken of their "desperation" as they wait for news. Jenny Cawson, 36, and her husband Tarig Sinada, 49, from Devon, are believed to be among seven people still unaccounted for after the Sea Story went down off the coast of Egypt early on Monday. Recalling the moment he was told of the incident, Jenny's father Michael Williams told the BBC: "We were just in disbelief, it’s one of those moments when the world stops." The family complain the UK Foreign Office is not giving them enough information about the incident and search operation being conducted by Egyptian authorities. The Foreign Office said it was providing "support to a number of British nationals and their families following an incident in Egypt".

  The four-deck Sea Story had been carrying 31 passengers and 13 crew when it was reported to have been hit by a large wave near the town of Marsa Alam during storm weather, causing it to capsize. The resort town is a popular destination for tourists on Egypt’s southern Red Sea coast surrounded by diving spots, including renowned coral reefs. There were tourists onboard from Belgium, Britain, China, Finland, Germany, Ireland, Poland, Slovakia, Spain, Switzerland and the US. Thirty-three people have been rescued and four bodies were recovered. In a phone call from Devon, Michael revealed how Tarig's mother broke the news of the sinking to the family. "Tarig’s mother messaged us that the Sea Story sank in the Red Sea and asked me if I knew the name of the boat," he recalled. Jenny’s mother Pamela knew the name and had a picture of the boat as the couple, both experienced scuba divers, had contacted them when they arrived at the Red Sea. "Your heart sinks. You ask yourself, have I misread the news? Let’s look again," she said. Pamela said the family are continuing to receive daily updates from the Foreign Office but complains there is "still no news". Because of a lack of solid information, the family said they approached local sources in Egypt for news of their loved ones. "One of the local sources was kind enough to try and look for them in local hospitals," Pamela adds. The family say they were told the boat had not been found, but then came across media reports that it had been located by Egyptian rescuers. Five of the survivors who were pulled out alive on Tuesday had reportedly been rescued from inside the boat cabins. A diver told the BBC earlier in the week that they had to put a lot of effort to get into the largely submerged Sea Story, open the cabin and get the five survivors, as well as four bodies out.

  The Sea Story was carrying 31 passengers and 13 crew

  There is a lot of speculation about how the boat sank and if it was only bad weather that played a part, or if any man-made factors contributed. The Egyptian Red Sea governor has ruled out the possibility of a technical error behind the sinking. He made it clear the boat was safe and went through all the necessary checks. Meanwhile, the Egyptian navy has been taking the lead in the rescue operations. It is understood this is still going on, as no official statement has said otherwise. But the survivors have been kept away from the press. The local authorities say they are in good condition. "We’re surprised that our Foreign Office can’t pressure anybody in Egypt," says Jenny's father Michael. Sea cruises and diving tours are very popular among European tourists who visit the Red Sea, known for its clear waters and magnificent marine life. The Sea Story sailed off from Marsa Allam on a five-day trip that was supposed to end in Hurghada, another famous resort. There are now concerns the incident could have serious repercussions on the tourism industry in the area. Jenny, who works for the Devon Wildlife Trust and Tarig, an IT professional, had visited Egypt a few times before, and also went on diving trips in different countries around the world, the family said. Pamela says: "Everything Jenny and her husband do is highly considered; they do proper research before travelling anywhere. They are not the type of people who take anything at face value."
