  • None Plastic or paper? The truth about drinking straws As part of a wider effort to target plastic pollution, the Biden administration last year announced that it would gradually phase out single-use plastics from food packaging, operations and events by 2027, and from all federal operations by 2035. Trump has been a long-standing critic of paper straws. During his campaign to be re-elected president in 2020, which he ultimately lost, "Trump" branded plastic straws were sold - at $15 for a pack of 10 - as a replacement for what he called "liberal" paper straws. In total, the campaign reported nearly $500,000 from straw sales in the first few weeks alone. Some statistics place the number of disposable drinking straws used in the US at 500 million a day - although that figure is hotly disputed and the true total could be about half that. A number of US cities and states - including Seattle, Washington; California; Oregon; and New Jersey - have adopted rules that limit the use of plastic straws or require that businesses provide them only after being asked by customers. UN Environment Program statistics show that 460 million metric tonnes of plastic are produced every year, contributing to waste in the ocean and microplastics which can affect human health. Some studies have shown that paper straws, however, contain significant amounts of "forever chemicals" such as polyfluoroalkyl substances, or PFAS. PFAS can stay in the environment for decades, contaminate water supplies and cause a variety of health issues.
