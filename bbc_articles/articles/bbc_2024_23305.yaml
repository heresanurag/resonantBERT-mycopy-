title: 'Joyce Taggart: Tributes paid to Ballykelly crash victim - BBC News'
date: '2024-09-26'
section: Northern Ireland
url: http://www.bbc.co.uk/news/articles/c5y0kv84mpjo
content: |-
  Joyce Taggart, 84, died following a crash in Ballykelly, County Londonderry, on Thursday.

  Joyce Taggart was pronounced dead at the scene

  Tributes have been paid to "joyful and kind" Joyce Taggart who died following a car crash in County Londonderry. The 84-year-old's car was involved in a collision with a bus on the Clooney Road in Ballykelly after 14:15 BST on Thursday. Rev Phillip Houston, of Ballykelly Presbyterian Church, told BBC News NI that Joyce was a popular member of the choir and other church groups. He said Joyce was a "joy to be around" and that "she was a core part of our church family". "She was a fantastic singer in the choir and was a real light," he said. The church was open for a time on Thursday evening for parishioners and members of the wider community to come and reflect following the sad news. "We wanted a place for people to come and comfort one another and also provide a space where people could share memories of Joyce," he said.

  The Clooney Road, which was closed for a time following the crash, has since reopened. The Police Service of Northern Ireland (PSNI) are investigating the circumstances of the collision and appealed for witnesses or anyone with dash-cam footage to contact them.
