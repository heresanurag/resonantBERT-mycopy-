title: 'Colin Pitchfork: Double child killer''s release confirmed - BBC News'
date: '2021-07-13'
section: Leicester
url: http://www.bbc.co.uk/news/uk-england-leicestershire-57737050
content: |-
  A judge-led review upholds a decision by the Parole Board to deem Colin Pitchfork safe for release.

  Colin Pitchfork has spent 33 years in prison for the rape and murder of 15-year-olds Lynda Mann and Dawn Ashworth

  A man who killed two schoolgirls is to be released from prison.

  Colin Pitchfork has served 33 years in jail for raping and murdering 15-year-olds Lynda Mann and Dawn Ashworth in the 1980s.

  Last month the Parole Board said it was safe to release the 61-year-old, who was the first murderer to be convicted using DNA evidence.

  This led to a challenge by Justice Secretary Robert Buckland which has now been "refused" by a judge-led review.

  Barbara Ashworth said the decision to allow her daughter's killer to be released was "disappointing" but added "he can't hurt me any more".

  She said: "I've had 33 years of it and it's all been said and as far as I'm concerned he's going to be out in amongst the public, so it speaks for itself."

  Dawn's uncle Philip Musson added: "It sends the message that child rapists, killers, murderers can at some point in time resume their lives when they themselves have deprived their victims of their lives.

  "That's an unacceptable position as far as I'm concerned."

  Dawn Ashworth's uncle Philip Musson told the BBC the result of the judge-led review sends the wrong message

  South Leicestershire MP Alberto Costa, who had campaigned to stop Pitchfork's release, said: "If Colin Pitchfork had committed just one of his crimes today, he would likely have received a whole life tariff which would've resulted in him probably spending the whole of his life in prison.

  "We have moved on from the past and how we treat sexual offences and murders against women, but that doesn't, in my opinion, excuse the Parole Board from making the decision, which I think people are right to feel angry at."

  A spokesperson for the Ministry of Justice (MoJ) said offenders are usually released within a few weeks of a final decision.

  In a statement the Parole Board said it recognised the "pain and anguish" the victim's families have endured through the parole process.

  "However, Parole Board panels are bound by law to assess whether a prisoner is safe to release," the statement said.

  "Legislation dictates that a panel's decision must be solely focused on what risk a prisoner may pose on release and whether that risk can be managed in the community.

  "As made clear in the reconsideration decision, release was supported by all of the Secretary of State's witnesses during Mr Pitchfork's review."

  The justice secretary intervened on the grounds the decision to free Pitchfork was "irrational" because the Parole Board panel "failed to give sufficient reasons" as to why it agreed with the evidence provided by professional witnesses.

  Judge Michael Topolski QC, who reviewed the decision for the Parole Board, said he did not consider it "irrational" and concluded the "application for reconsideration is refused".

  He added: "This was and remains a case of considerable seriousness, complexity and notoriety. The terrible consequences of the brutal rapes and murders of two innocent girls will forever darken the lives of the families concerned."

  Pitchfork's release will be subject to strict licence conditions.

  A Ministry of Justice spokesperson said: "We are disappointed with this outcome given we felt there were grounds for the decision to be reconsidered, but respect the independent judge's decision.

  "Our sympathies remain with the families of Lynda Mann and Dawn Ashworth but they can be reassured that Pitchfork will be subject to close probation supervision for life and faces an immediate return to prison if he fails to comply with his licence conditions.

  "The Lord Chancellor has launched a Root and Branch review of the parole system, which will report back later this year, and we are changing the law so that child murderers such as Pitchfork face life in prison without the possibility of parole as the default sentence."

  Over the last two years there have been more than 250 challenges to Parole Board decisions - but whether they come from inmates wanting to get out, or the secretary of state trying to keep them in, very few lead to a fresh hearing because the legal test to overturn the detailed work of the Parole Board is very high.

  In this case, Justice Secretary Robert Buckland had to convince a judge that the panel that authorised Pitchfork's release had acted irrationally - meaning no other panel could have reached the same conclusion on the evidence.

  Neither ministers nor offending behaviour experts have argued that Pitchfork needs to take part in more rehabilitation programmes or treatment - and so from the get-go it was looking like the challenge was not going to succeed.

  When Pitchfork was jailed in 1988, a minister set his minimum term - so if the government wanted him to be in jail forever, that was the time to make that order. The law of life sentences - set by MPs - allows prisoners to be released on licence at the end of their minimum term, if they can show they are no longer a danger.

  And so, there was always going to come a time when the Parole Board would have to consider whether Pitchfork was safe to leave jail.

