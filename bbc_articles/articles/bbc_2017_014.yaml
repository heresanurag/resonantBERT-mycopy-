title: Barack Obama's last day as 44th president - BBC News
date: '2017-01-21'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-38699742
content: |-
  From leaving a note for his successor on the Oval Office desk to giving a final speech.

  Barack Obama spent his last day in the White House and as the 44th president of the United States.

  He received his successor, Donald Trump, at the White House in the morning and boarded Air Force One one final time in the early afternoon to go spend some time in California.
