title: Ashley Warren denies charges over fatal Jaywick XL Bully attack - BBC News
date: '2024-09-19'
section: Essex
url: http://www.bbc.co.uk/news/articles/cy0lgezrkr0o
content: |-
  A court hearing is told the XL Bully dogs involved in the case were called Beauty and Bear.

  Ashley Warren, 40, entered his not guilty plea at Chelmsford Crown Court on Thursday

  A man has denied having dangerously out of control XL Bully dogs which fatally attacked a grandmother. Esther Martin, 68, was visiting a property in Jaywick, near Clacton-on-Sea in Essex, on 3 February when she was killed. Ashley Warren, 40, pleaded not guilty at Chelmsford Crown Court to two counts of owning or being in charge of a dog dangerously out of control causing injury resulting in death. He was told he would face trial in August 2025. He was the first person to be charged with dog-related offences after the XL Bully breed was banned in England two days before Ms Martin's death.

  Esther Martin died from "unsurvivable" dog wounds, an inquest hearing was told

  The dogs, called Beauty and Bear, were destroyed by attending officers from Essex Police. During the brief hearing, Mr Warren, of Walnut Road, Leyton, east London, but previously of Jaywick, also denied having a knife at Clacton railway station on 3 February. An inquest hearing on 22 February was told Ms Martin was found unresponsive inside a property in Hillman Avenue, Jaywick, and had sustained "unsurvivable" dog bite wounds. Her medical cause of death was recorded as "dog bite wounds to the upper right limb".

