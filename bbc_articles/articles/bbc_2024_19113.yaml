title: Rocket engine explodes during test at Shetland spaceport - BBC News
date: '2024-08-19'
section: NE, Orkney & Shetland
url: http://www.bbc.co.uk/news/articles/cy54wqzz0kvo
content: |-
  The test was carried out by a German firm who hope to launch the UK's first vertical rocket into orbit.

  This video can not be played To play this video you need to enable JavaScript in your browser.

  A rocket engine has exploded during a launch test at the UK's new spaceport in Shetland. The test was being carried out by German company Rocket Factory Augsburg (RFA) who hope to eventually launch the UK's first vertical rocket into orbit. The scheduled nine-engine test was part of a number of trials due to be carried out before progressing to launch. RFA said no-one was injured in the explosion and the launch pad had been "saved and is secured".

  Large flames and plumes of smoke could initially be seen shooting horizontally from the bottom of the rocket. The entire structure was then engulfed by fire. It comes three months after the first rocket test at the site on the tiny island of Unst was carried out and declared a success. On that occasion, RFA fired their engines for eight seconds before shutting down. A statement from SaxaVord Spaceport said all safety protocols were fully observed and the site was evacuated prior to the test, leaving no staff at risk. A spokesman said: "This was a test, and test campaigns are designed to identify issues prior to the next stage. "We will work with RFA to understand and learn from the causes and support them as they move forward to the next phase of their preparations."

  In December 2023, SaxaVord Spaceport was given approval from the Civil Aviation Authority to begin orbital launches this year. It was to be the first fully-licensed spaceport in Western Europe able to launch vertically into orbit. It permits up to 30 launches a year that will be used to take satellites and other payload into space. German rocket firm HyImpulse and Edinburgh-based Skyrora are among the companies planning to use the spaceport.

  The spaceport said the site was evacuated prior to the test

  Lockheed Martin/ABL Space Systems is also planning orbital launches as part of the official UK Government Pathfinder launch. The SaxaVord Spaceport, a former RAF radar station, is co-owned by Frank and Debbie Strang. They bought the site 15 years ago with initial plans to turn it into an eco-tourism attraction. The space industry in the UK is estimated to be worth £17.5bn and supports about 48,800 jobs at 2,200 firms. Cornwall Spaceport was the UK's first licensed spaceport, however its rockets are launched horizontally, carried by an aircraft. Scotland currently has five proposed spaceports under development, with the Sutherland Spaceport also under construction with ambitions of launching 12 rockets into orbit per year. A further spaceport is planned on North Uist, with both Glasgow Prestwick and Spaceport Machrihanish hoping to join the space race and conduct horizontal orbital launches in the future.
