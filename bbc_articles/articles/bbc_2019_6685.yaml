title: Inside the battle-scarred Philippine city of Marawi - BBC News
date: '2019-06-07'
section: General
url: http://www.bbc.co.uk/news/world-asia-48545173
content: |-
  The Philippine city of Marawi was liberated from IS-linked militants in 2017, but rebuilding has been a long, slow process.

  In May 2017, jihadists loyal to the so-called Islamic State took Marawi by force.

  After five months of heavy bombing and more than 1,000 deaths, government forces liberated the city.

  But large parts of it remain in ruins with thousands displaced in makeshift camps.

