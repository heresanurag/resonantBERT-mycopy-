title: Trump signs order banning transgender women from female sports - BBC News
date: '2025-02-05'
section: US & Canada
url: http://www.bbc.co.uk/news/articles/c20g85k3z35o
content: |-
  He says the move, which covers non-elite levels, restores fairness but human rights advocates have condemned it.

