content: |-
  Essex Police release two new images as part of its latest appeal to find him.

  Searches continue for man missing more than a month

  Essex Police have released two new images of Martyn Richardson as part of its latest appeal to find him

  Extensive searches continued to find a man who has been missing for more than a month. Martyn Richardson, who has Asperger's syndrome, was last seen leaving a family party in Bocking, near Braintree in Essex, at about 20:30 BST on 24 August. The 27-year-old's bike was found undamaged three days later in fields near the River Blackwater. Essex Police said it had carried our river searches, used thermal imaging cameras and drones, carried out multiple house-to-house enquiries, reviewed hours of CCTV from buildings in the area, checked land between Broad Road and Church Lane and explored the area where his bike was discovered. The work "helped us rule out several possibilities", the force said.

  As part of the investigation, police also released two new images of Mr Richardson.

  Mary Richardson said Martyn was "absolutely fine" when he left the party

  His nan, Mary Richardson, who has been his legal guardian since he moved in with her aged one, said: "It has now been five weeks since Martyn went missing and we are desperate for any information that may help us find him or information of where he went that night. "Please if anyone knows anything no matter how small come forward. Martyn we all love and miss you so much." Mr Richardson was last seen wearing a grey hoodie with a long-sleeved top underneath, black shorts and black shoes.

  Martyn Richardon's grandmother, Mary Richardson, said it was "out of character" for him to be missing

  Officers said they still wanted to speak to four people who may have seen Mr Richardson on the night he went missing at about 20:45, as they could have "crucial information about his movements". They are a group of three dog walkers, and an another person, who were seen walking in The Chase, close to Dorewards Avenue and Dorewards Farm, Bocking. Insp Phil Jackson said: "With every day that passes we are growing more and more concerned. "Small details may be incredibly important for our investigation, so contact us if you think you know something you’ve not shared before."

