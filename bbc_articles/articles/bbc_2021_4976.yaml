title: 'Saint Vincent volcano: ''Explosive'' Soufrière eruption sparks mass evacuation
  - BBC News'
date: '2021-04-09'
section: Latin America & Caribbean
url: http://www.bbc.co.uk/news/world-latin-america-56693406
content: |-
  La Soufrière on Saint Vincent island spews ash 6 km into the air, as 16,000 people are evacuated.

  This video can not be played To play this video you need to enable JavaScript in your browser.

  An "explosive" volcanic eruption has blanketed the Caribbean island of St Vincent in ash and smoke and forced thousands of people out of their homes.

  La Soufrière, which has been dormant for decades, first started showing volcanic activity in December, but that increased this week.

  On Thursday, Prime Minister Ralph Gonsalves urged more than 16,000 residents in "red zones" to evacuate.

  The volcano has since spewed dark ash plumes 6 km (3.7 miles) into the air.

  Ash fall has been recorded as far from the volcano as Argyle International Airport some 20 km away, St Vincent's National Emergency Management Organisation (Nemo) said.

  The volcano had been dormant since 1979, but in December it started spewing steam and smoke, and making rumbling noises.

  Thousands of people have been evacuated from the surrounding area

  The first sign that an eruption was imminent came on Thursday evening, when a lava dome became visible on La Soufrière.

  That same night, Mr Gonsalves ordered an urgent evacuation of the surrounding area.

  Then just before 09:00 on Friday (13:00 GMT), seismologists from the University of the West Indies confirmed that an "explosive eruption" was under way.

  Evacuees were taken to cruise ships and safer parts of the island.

  One resident, Zen Punnett, told AFP news agency that he saw "a huge ball of smoke", and that there was panic when people were first ordered to evacuate.

  "I can feel and hear rumbling here in the green safe zone... keeping calm as much as possible and praying," he added.

  A second explosion was recorded, causing a large vertical column of ash

  Lavern King, a volunteer at shelters on the island, told Reuters news agency: "People are still being evacuated from the red zone, it started yesterday evening and into last night. The place in general is in a frenzy."

  Inhabitants of the red zone constitute more than 10% of the country's population.

  Later on Friday another explosion was recorded, the UWI Seismic Research Centre tweeted.

