  The "inspirational" producer, who has died at 83, worked with Ken Loach on Kes and Cathy Come Home.

  This video can not be played To play this video you need to enable JavaScript in your browser. Garnett: 'Cathy let everybody of the hook'

  Tributes have been paid to TV and film producer Tony Garnett following his death at the age of 83.

  Originally an actor, Garnett produced such seminal Ken Loach works as Cathy Come Home and Kes, and later produced influential TV series This Life.

  World Productions, the TV company he founded, said he died on Sunday "after a short illness".

  Loach said Garnett "believed in drama, in film and its power to communicate truth".

  "He understood the basic conflict at the heart of society, between those with power who exploit and those who are exploited," the director told Radio 4's Today programme.

  "He was a brilliant, complex man, intensely loyal and generous-spirited."

  Line of Duty creator Jed Mercurio said he was "an inspirational figure who'll be greatly missed".

  He wrote on Twitter: "Tony was instrumental in giving me my break into TV when I was a junior hospital doctor who'd never written anything.

  "They don't make 'em like him any more."

  Cathy Come Home told of a young couple with children who become homeless

  Garnett was also remembered with affection by former Line of Duty cast member Daniel Mays, who called him "the nicest man".

  "Very sad to hear of the passing of the great Tony Garnett," he wrote. "His legacy and body of work is truly exceptional."

  New Tricks writer Lisa Holdsworth, who chairs the Writers' Guild of Great Britain, wrote: "Every TV writer in the UK owes him a debt of gratitude. He elevated our medium by showing how fierce, relevant and vital it could be."

  Other writers and actors added heartfelt tributes on Twitter.

