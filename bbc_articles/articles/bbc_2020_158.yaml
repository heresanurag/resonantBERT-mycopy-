  Born in Birmingham in 1936, Garnett began his career on screen in 1960s TV shows including Emergency Ward 10 and Z Cars.

  His subsequent work with Loach, Jim Allen and others was characterised by hard-hitting social realism.

  Through World Productions, the company he founded in 1990, he executive produced such TV series as Between the Lines, Ballykissangel and This Life.

  The latter, he revealed at a BFI talk last year, came about when Michael Jackson, then controller of BBC Two, wanted a drama "about young people who are just starting their first jobs".

  This Life saw Jack Davenport, Daniela Nardini, Jason Hughes, Amita Dhiri and Andrew Lincoln play housemates in London

  "He said, 'Could they be lawyers?'" Garnett recalled. "I said, 'They can be anything you like Michael.'"

  The show, about a group of young lawyers sharing a house in London, ran for two series and gave early breaks to rising stars like Jack Davenport and Andrew Lincoln.

  Garnett enjoyed much success at the BBC but could be highly critical of the corporation.

  "I have criticised the BBC in the past because I think it's very important for all of us," he said in 2014.

  "I'm a defender of the BBC but at the same time a loyal defender of the opposition."

