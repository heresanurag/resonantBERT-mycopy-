title: London twins' dream of cleaning plane comes true at Heathrow - BBC News
date: '2024-12-22'
section: General
url: http://www.bbc.co.uk/news/videos/ce8xzjd1m6zo
content: |-
  James and John Makanjuola say they are "buzzing" after cleaning a British Airways plane.

  Twin brothers from south London have made a name for themselves on social media by cleaning things that often get overlooked - from street signs to bins.

  James and John Makanjuola previously spoke to BBC London about their passion for cleaning the capital's less-loved spaces. During the interview, they also shared their dream of cleaning a plane.

  Fast-forward a few months and that dream became a reality when the duo were surprised with the opportunity to clean a British Airways Airbus A320 at Heathrow Airport.

  After almost two hours of cleaning, the twins said they were still buzzing from the experience and were surprised at how physical the job is.

