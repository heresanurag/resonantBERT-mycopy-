title: 'Sri Lanka bombings: Forgiving and fighting to recover - BBC News'
date: '2019-10-21'
section: General
url: http://www.bbc.co.uk/news/world-asia-50097068
content: |-
  Six months after one of the world's worst recent terror attacks, this town is fighting to recover.

  Six months ago, on Easter Sunday, Sri Lanka was hit by one of the world’s worst terrorist attacks this century.

  The town of Negombo suffered the deadliest bombing, when 115 people died while attending Mass.

  Hasaru Jayakody lost his mother in the explosion – and spent his 17th birthday recovering from shrapnel injuries in hospital.

  BBC correspondent Caroline Hawley went to find out how Hasaru and his community are recovering.
