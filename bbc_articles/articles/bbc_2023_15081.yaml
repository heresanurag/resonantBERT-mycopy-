content: |-
  Jim Jordan says the House won't vote on his candidacy again tonight, reconvening on Wednesday morning.

  Lots of 'yelling and screaming' expected before next vote

  It’s back to the drawing board for Jim Jordan and his team. Their decision to hold a public vote for speaker today even though they were not certain they had the votes may have turned out to be a damaging miscalculation. Their goal was to flush the opposition out, expose them as just a handful of holdouts and put them on the record where they would wilt under the spotlight. Instead, the vote showed that there is substantive opposition to Jordan - more, even, than those who initially opposed Kevin McCarthy during his speaker bid at the beginning of the year. There is strength in numbers. With 20 Republicans opting for someone other than Jim Jordan as speaker, it will be easier for them to resist what is sure to be the intense pressure that is coming their way, both from their fellow House Republicans and from the conservative grassroots. “There’s going to be a lot of yelling and screaming,” Ken Buck, one of the 20 Republicans who opposed Jordan, told CNN. He predicted that while there may be some shifts in Jordan’s support ahead, further rounds of balloting will produce a similar level of opposition. If that turns out to be the case – and Buck says he remains firmly opposed to Jordan – Republicans may start looking for another speaker candidate or, perhaps, giving serious consideration to electing a temporary speaker to handle pressing legislation until the current Republican leadership drama can be resolved.
