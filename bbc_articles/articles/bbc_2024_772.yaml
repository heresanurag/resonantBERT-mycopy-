title: Iceland volcano lava sets house on fire in Iceland - BBC News
date: '2024-01-14'
section: General
url: http://www.bbc.co.uk/news/world-europe-67976275
content: |-
  The last residents of Grindavik were evacuated around 03:00 GMT on Sunday morning.

  A volcano is erupting near of the south-western Icelandic town of Grindavik.

  Seismic activity intensified overnight and the remaining residents of Grindavik were evacuated around 03:00 GMT.

  Lava has spilled onto the town's streets and covered part of a house, which has burst into flames.
