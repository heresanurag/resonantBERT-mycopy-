title: 'Coronavirus: Eating sea urchins and Swiss rolls under quarantine - BBC News'
date: '2020-02-07'
section: General
url: http://www.bbc.co.uk/news/world-asia-51411830
content: |-
  Thousands of people around the world remain under observation for signs of coronavirus.

  Thousands outside of China have been put under quarantine, as they remain under observation for signs of coronavirus.

  They have either been evacuated from China to their home countries or have been in contact with infected people, and now have to stay in isolation for at least 14 days.

  While some of those quarantined within China, particularly in Hubei province, have reported poor living conditions, many of those in lockdown in the rest of the world have been put up in comfortable converted military camps and government facilities.

  Some are also on cruise ships - or being housed in seaside holiday resorts.
