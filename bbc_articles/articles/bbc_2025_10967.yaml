title: 'Watch: Black smoke emerges after first conclave ballot - BBC News'
date: '2025-05-08'
section: General
url: http://www.bbc.co.uk/news/videos/cn808p9373mo
content: |-
  The signal means more voting will take place tomorrow as a new pope has not yet been chosen.

  Smoke has emerged from the Sistine Chapel chimney after the first ballot of the conclave - the secretive process to choose a new pope.

  Black smoke means more voting will take place tomorrow. If the smoke had been white a new pope would have been chosen.

