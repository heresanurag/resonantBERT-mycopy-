title: 'As it happened: NHS Covid test and trace app pings 500,000 in single week
  - BBC News'
date: '2021-07-15'
section: UK
url: http://www.bbc.co.uk/news/live/uk-57846210
content: |-
  Figures released on 15 July show the number told to isolate after close contact with someone who tested positive is up 46% on previous week.

  A man whose wife died after receiving the Oxford-AstraZeneca Covid jab has said a vaccine damages scheme needs to be made easier for families to access.

  Kurt Weideling lost his wife Nicola in May after the 45-year-old suffered rare complications after the jab.

  He is now trying to apply for compensation through the UK government's Vaccine Damage Payment programme, which was set up in 1979 and offers those who are "severely disabled as a result of a vaccination against certain diseases" a one-off tax-free payment of £120,000.

  He said people like Nicola "have effectively died as heroes" as they had made the sacrifice for a vaccine programme that has saved thousands of lives.

  There was a "pretty fundamental ethical responsibility to those families" who have lost loved ones who have had the jab, after the UK continued with its vaccine programme "knowing that a certain number of people would die", he added.

  The government says it has received 145 claims for vaccine damage payments after a Covid vaccination but, to date, no payments have been made.

  The Department of Health says vaccines are safe and effective and have already prevented 30,000 Covid deaths in England.
