id: bbc_2023_16852
title: 'Iceland volcano: Moment house shakes after series of earthquakes - BBC News'
date: '2023-11-13'
section: General
url: http://www.bbc.co.uk/news/world-europe-67401223
content: |-
  Thousands of people have been told to leave their homes over fears of a volcanic eruption.

  Caitlin McLean, from Scotland, was visiting her boyfriend Gisli Gunnarsson when they were forced to flee to his mother's home in Reykjavik on Friday, over fears of a volcanic eruption.

  Mr Gunnarsson told the PA news agency he feared he might never see his home again.

  Authorities have ordered thousands of people living in the southwestern town to leave as a precaution.

  Iceland declared a state of emergency after a series of earthquakes, and experts say the chance of a volcanic eruption in Iceland is rising.
