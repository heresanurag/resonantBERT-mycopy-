title: 'Ukraine war latest: Zelensky hails ''historic'' day as Biden makes surprise
  visit to Kyiv - BBC News'
date: '2023-02-20'
section: Europe
url: http://www.bbc.co.uk/news/live/world-europe-64702090
content: |-
  US President Joe Biden travelled to Kyiv today for his first visit to Ukraine since Russia invaded almost a year ago.

  The logistics of getting a president to a country at war

  There had been widespread speculation among the press corps that President Biden might be planning a trip to Kyiv. Yet today's visit still took everyone completely by surprise. According to the White House schedule issued yesterday, Biden was due to fly to Warsaw later tonight. There were two suspiciously lengthy gaps in the itinerary of his two-day trip to Poland and we wondered if that might be when he would slip into Ukraine. Instead, journalists in Washington woke up to find the trip had already happened. Air Force One took off at 04.15 EST (09.15 GMT) on Sunday. The small pool of reporters travelling with the president were sworn to secrecy and not allowed to report the trip until after his arrival. BBC teams in Kyiv had noticed increased security measures around the city, but did not know for sure who was due to visit. President Biden made a 10-hour train journey to Kyiv from Poland, as air travel is not safe in the war zone, leaving reporters like me, who thought they were travelling with the president tonight, making a trip on an aircraft that will not be called Air Force One. That call sign is only used when the president is on board.
