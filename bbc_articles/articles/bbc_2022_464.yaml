  See the full list of winners from the 79th annual Golden Globe Awards.

  The best film and TV shows of the past year were honoured at the Golden Globe Awards on Sunday.

  Here is the full list of winners, which were announced at a pared-down ceremony in Los Angeles.

  This year's Globes were not televised following controversy surrounding the organisation behind the event, the Hollywood Foreign Press Association (HFPA).

  Best actress in a motion picture - musical or comedy

  Best actor in a motion picture - musical or comedy

  Best supporting actress in any motion picture

  Best supporting actor in any motion picture

  Will Smith during a photoshoot at Wimbledon for his tennis-themed movie King Richard

  Best actress in a TV series - musical or comedy

  Best actor in a TV series - musical or comedy

  Best actress in a limited series or TV movie

  Best actor in a limited series or TV movie

  Best supporting actress in a series, limited series or TV movie

