content: |-
  The 79-year-old actor came downstairs in his dressing gown after he heard the commotion.

  A woman caught allegedly trying to steal presents from beneath Robert De Niro's Christmas tree in New York City has been charged with burglary.

  Police saw 30-year-old Shanice Aviles enter the actor's building's basement at 02:45 (07:45 GMT) on Monday and later found signs of a forced entry.

  The 79-year-old actor came downstairs in his dressing gown after he heard the commotion, ABC News reported.

  A spokesperson for De Niro said the actor was fine, and had no comment.

  He added the alleged burglary on the Upper East Side took place at a home he was renting temporarily.

  A New York police spokesperson said officers followed Ms Aviles into the apartment, where they caught her in the living room as she allegedly attempted to put presents from the tree into her bag.

  Officers reportedly did not know the home was De Niro's. A police spokesperson said the investigation was ongoing.

  Two-time Academy Award winner De Niro was born and raised in Manhattan.
