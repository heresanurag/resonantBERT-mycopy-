title: 'Internet: ''Equal society means broadband access for all'' - BBC News'
date: '2021-05-02'
section: Wales
url: http://www.bbc.co.uk/news/uk-wales-56844652
content: |-
  Children, jobseekers and older people are among those most affected by the digital divide.

  The pandemic has highlighted the need for broadband for even simple things such as staying in contact with friends

  The coronavirus pandemic has highlighted large inequalities in society.

  One that Helen Tinsley would like to see tackled is the digital divide.

  Helen, who is retired and from Cardiff, sees the impact on children, jobseekers, older people, as well as people in different parts of the country.

  Ahead of the Senedd elections, we asked what people would change and Helen wants broadband for everyone.

  During the pandemic, a lot of focus has been placed on providing laptops and internet access to allow children in deprived areas to be educated from home.

  However, Helen believes this is just the tip of the iceberg, and it is an issue affecting people in every age group.

  "It's not just schoolchildren, it's now important that everyone has broadband," she said.

  "Twenty years ago, if someone had said it's important everyone has access to the web, many would have laughed and thought 'what will we use that for?'"

  After problems, villagers in Michaelston-y-Fedw installed their own ultrafast broadband - which they claim to be the fastest in Wales

  People have gone to great lengths to secure access, with villagers in "not spot" Michaelston-y-Fedw, which lies between Newport and Cardiff, installing their own ultrafast broadband.

  Prof Christopher Spry, who lives in Heol Senni in the Brecon Beacons, also had to pay to get his internet from a satellite 22,000 miles above Africa because of poor connection.

