title: 'Fredi Rivero: Three teenage girls admit manslaughter of man, 75 - BBC News'
date: '2025-06-12'
section: London
url: http://www.bbc.co.uk/news/articles/cj3j4v1g314o
content: |-
  Fredi Rivero, 75, was pushed, shoved, kicked and punched in a group attack in north London.

  Three teenage girls have pleaded guilty at the Old Bailey to the manslaughter of a 75-year-old man who died after a street attack that was filmed on a mobile phone. Fredi Rivero was set upon in Islington, north London, on 27 February and died in hospital the next day. Mr Rivero, a Bolivian national, was near a bus stop on Seven Sisters Road when the teenagers got off a bus and surrounded him. The girls, aged 15, 16 and 17, pushed, shoved, kicked and punched him, with one of them filming the attack on her phone and grabbing his glasses. Detectives retrieved CCTV footage of the assault which showed the oldest girl punching Mr Rivero in the head, causing him to fall backwards.

  Police were called at about 23:30 GMT to reports of the disturbance and found Mr Rivero unconscious on the pavement with a severe head injury and in cardiac arrest. He was taken to the Royal London Hospital where he died. The girls, who cannot be identified because of their ages, appeared at the court from custody by video-link. Judge Judy Khan ordered reports and remanded the defendants into custody to be sentenced on 5 September.

  Previously, police have described Mr Rivero as a "much-loved father" whose family were "devastated by his death". Mr Rivero's daughter, ex-wife and cousins attended court for the hearing.
