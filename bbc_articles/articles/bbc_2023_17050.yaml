title: 'Kiesha Donaghy: Murdered Elgin mother victim of ''violent attack'' - BBC News'
date: '2023-11-22'
section: NE Scotland, Orkney & Shetland
url: http://www.bbc.co.uk/news/uk-scotland-north-east-orkney-shetland-67478642
content: |-
  Police say Kiesha Donaghy, 32, sustained head injuries in the fatal assault in Elgin.

  Kiesha Donaghy was said to be popular and loved

  A 32-year-old mother murdered in Elgin was the victim of a violent attack, police have said.

  Kiesha Donaghy was found dead at a property in Anderson Drive at about 19:20 last Thursday.

  Det Supt Lorna Ferguson, of Police Scotland, said Ms Donaghy had sustained head injuries in the fatal assault.

  But she said that, at this stage, it was impossible to tell whether the mother-of-two knew her killer or whether a weapon had been used.

  Asked what message she had for the killer, the detective said: "I would say that somebody somewhere knows who you are. I have absolutely no doubt that we will catch them."

  Dept Supt Ferguson said Ms Donaghy was last seen on Wednesday, and her family and friends were "devastated" by her death.

  "Keisha's a popular girl, loved by her friends and family," she added. "We need to look at Kiesha's lifestyle and build up a picture."

  The officer said she did not have a suspect but had no information to suggest anyone else was at risk.

  Police are maintaining a visible presence in Elgin as part of the murder investigation, and to reassure the community.

  "I can't go into all the injuries but I can tell you it was quite a violent attack," Dept Supt Ferguson added.

  "There's obviously real concerns and I can understand that. Elgin is a small tight-knit community.

  "It is an unusual incident, I have no information to suggest anybody else is a risk."

  She appealed for information and said a dedicated team of officers was working to find out what happened.

