title: Police presence at SNP headquarters in Edinburgh - BBC News
date: '2023-04-05'
section: General
url: http://www.bbc.co.uk/news/uk-scotland-65188875
content: |-
  Several police vehicles were seen parked outside the party's headquarters in Edinburgh this morning.

  Several police vehicles have been parked outside the SNP's headquarters in Edinburgh.

  Two officers were posted outside the building in the city centre and there were others inside.

  Police Scotland have said that officers are carrying out searches at a number of addresses as part of an investigation into Scottish National Party finances.
