id: bbc_2021_112
title: 'Covid-19: Running a roadside van when a pandemic cuts traffic - BBC News'
date: '2021-01-17'
section: General
url: http://www.bbc.co.uk/news/uk-wales-55679462
content: |-
  With traffic down and more people working from home, what is the future for these lay-by businesses?

  Few people get as unique a take on the movement, mood and feelings of the public than the business owners that sit in its lay-bys.

  Since the start of lockdown they have juggled highs and lows.

  From supporting lorry drivers unable to stop at closed service stations to seeing their customers told to stay at home - and in turn not spend money with them.

  Some are now questioning their future and role in a workforce predicted to change its patterns and work from home more in the future.
