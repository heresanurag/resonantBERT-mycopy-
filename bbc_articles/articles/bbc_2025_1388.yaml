  The president opened the Nascar season with a flyby and lap in front of the racing cars.

  President Trump has driven round the Daytona racetrack in the opening event of the season's Nascar series.

  Trump's Air Force One jet gave a flyby for spectators before he met the drivers and led them for a lap around the circuit.
