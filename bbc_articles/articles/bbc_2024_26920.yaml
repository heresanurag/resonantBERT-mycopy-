title: '''Bags of sweets amid rubble of flattened Beirut building'' - BBC News'
date: '2024-10-07'
section: General
url: http://www.bbc.co.uk/news/videos/czxd3yvkzn5o
content: |-
  The BBC's Hugo Bachega reports from the scene of an overnight Israeli strike in Lebanon.

  Israeli strikes on southern Lebanon and the capital Beirut continued overnight, while Israel has also issued fresh evacuation orders.

  The BBC's Hugo Bachega visited the scene of one strike in southern Beirut and found a building completely flattened.

  He said residents told him there was a sweet shop in the building hit - and saw purple bags with the name Akkawi Sweets in the rubble.

  Israel accuses Hezbollah of hiding its facilities in residential areas and under civilian buildings.
