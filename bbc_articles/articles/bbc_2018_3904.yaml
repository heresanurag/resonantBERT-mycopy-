title: 'Anthony Joshua: How many calories make a champion? - BBC News'
date: '2018-04-03'
section: General
url: http://www.bbc.co.uk/news/uk-43572801
content: |-
  For Anthony Joshua it's 5,500 - but what about some of the other heavy-hitters out there?

  Anthony Joshua has up to 5,500 calories on a day with lots of training.

  But even he might be amazed at the amount Hafbor Julius Bjornsson - aka The Mountain from Game of Thrones - eats while training for a competition.

