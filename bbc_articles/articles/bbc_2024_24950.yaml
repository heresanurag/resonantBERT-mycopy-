title: 'Hendon Golf Club: Antisemitic messages raked into bunkers - BBC News'
date: '2024-10-13'
section: London
url: http://www.bbc.co.uk/news/articles/c4g5yw42leqo
content: |-
  The incident is being investigated as a racially aggravated hate crime, police said.

  The messages were discovered shortly before the Jewish holiday of Yom Kippur

  Police have launched a hate crime investigation after antisemitic messages were raked into bunkers at a golf club in north London. The Metropolitan Police said staff at Hendon Golf Club reported the messages and damage to other property on Friday. It happened shortly before the Jewish holiday of Yom Kippur, which ran from Friday evening to Saturday evening. The force said the incident was being "investigated as a racially aggravated hate crime" and appealed for information.

  Hendon MP David Pinto-Duschinsky said the incident was "utterly appalling". In a statement posted on X, formerly Twitter, he added: "I've reported it to the police and the CST and will be talking to the club. "It's completely unacceptable. I want the people who did this caught and punished." The Community Security Trust (CST) said it was aware of the "appalling antisemitic slogans and symbols". The charity, which works to tackle antisemitism, said in a statement: "For this to occur in the heart of the Jewish community shortly before the onset of Yom Kippur is utterly disgraceful."

  DCI Daniel Branch, of the North West Command Unit, said the force was "aware of the shock and distress that this incident has caused, especially coming at a time when the Jewish community is celebrating Yom Kippur". He added: "The incident is being investigated as a racially aggravated hate crime and work is ongoing, led by officers from the North West community safety unit, to identify and arrest whoever is responsible for this."
