title: Syrian family in Cardigan advise Afghan refugees about Wales - BBC News
date: '2021-08-20'
section: General
url: http://www.bbc.co.uk/news/uk-wales-58285615
content: |-
  The Alchikhs made Cardigan their home after spending three years in a Lebanese refugee camp.

  A Syrian family have given advice to refugees from Afghanistan about what to expect in Wales.

  The Alchikhs made Cardigan in Ceredigion their home in 2017 after spending three years in a Lebanese refugee camp.

  Muhanad Alchikh said they had been made welcome in Wales and Cardigan was “very friendly”.

  “We hope to help anyone who wants to get a new life,” he said.
