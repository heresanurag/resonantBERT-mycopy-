title: Household Cavalry horses are making remarkable progress - Army - BBC News
date: '2024-05-10'
section: London
url: http://www.bbc.co.uk/news/uk-england-london-68988811
content: |-
  Horses Quaker and Vida both had surgery after they were injured when they bolted through London.

  One horse, Vida, could be seen with blood on its chest and legs

  Soldiers and Household Cavalry horses injured after four of them bolted through central London are "making remarkable progress" in their recovery, the British Army has said. The horses were spooked at the sound of building works in Belgravia on 24 April, and fled through the city. Some of the horses hit vehicles, including a double-decker bus, leaving at least one animal soaked in blood. Of the soldiers who were hurt, one is still being treated in hospital. Two of the horses - Quaker, a Cavalry black and Vida, a grey - underwent surgery following the incident.

  The horses could be seen trying to dodge traffic as they ran through the streets

  In a statement, an Army spokesperson said: "Healing can be a slow and unpredictable process, but the soldiers and horses injured... are making remarkable progress. "They are receiving the best care possible and have our very best wishes - something we're heartened to see is shared by millions of people around the country." Of the seven horses involved, two are back on duty and the other five are due to be sent to the countryside to convalesce as soon as their wounds are sufficiently healed to allow them to travel. Three of the soldiers who were injured have returned to duty, while another is recovering at home. The horses of the Household Cavalry are trained by the Army for several months and ridden on the streets of London to get them used to heavy traffic and loud noises, including gun salutes and military bands.

