content: |-
  Wales and West Utilities says it has replaced the markings with "the full and correct spelling".

  Wales and West Utilities has fixed the road markings

  Road markings reading "Ceep Klear" near a school have been repainted after being pointed out by locals. The misspelling of the common "Keep Clear" warning appeared on a re-patched section of Watermoor Road in Cirencester, Gloucestershire. Images of the sign, near Paternoster School, attracted hundreds of comments on social media on Thursday. It has now been repainted and a spokesperson for Wales and West Utilities, which carried out the work, said the markings now have "the full and correct spelling".

  Some people on social media had speculated it was Gloucestershire County Council's fault, as they are responsible for managing the road network. But the council explained it was in fact Wales and West Utilities who had been carrying out work there and repatching it afterwards. The utilities company said the "fix" was part of their work to upgrade the gas network. "Contractors working on our behalf have been to the site to reinstate the road surface but unfortunately, when replacing the road markings they have misspelt the wording on the tarmac," a spokesperson said. "As soon as we were made aware, we contacted the contractors to request that they return to the site and rectify this as quickly as possible. "The team have now replaced the markings with the full and correct spelling," they added.

