  Nasen Saadi is charged with murder and attempted murder after two women were stabbed on a beach at night.

  Man in court over stab murder of woman on beach

  Amie Gray (left) was stabbed multiple times on a beach in Bournemouth

  A 20-year-old man has appeared in court after being charged with murdering a woman who was fatally stabbed on a beach. Two women from Poole, Dorset, were attacked on Durley Chine Beach in Bournemouth at about 23:45 BST on 24 May. Amie Gray, a 34-year-old personal trainer, died at the scene and 38-year-old Leanne Miles was taken to hospital with serious stab wounds. Nasen Saadi, from Croydon, London, who is also charged with attempted murder, was remanded in custody after appearing at Poole Magistrates' Court. He will next appear at Winchester Crown Court on Tuesday.

  Durley Chine Beach was cordoned off after the attack

  Ms Miles was discharged from hospital on Thursday. Mrs Gray's wife Sian said previously: "Words cannot describe the pain that we feel. Amie was the most loving wife and mother." She was described by her mother, Sharon Macklin, as "amazing, funny and kind" with an "energetic soul". "She was beautiful inside and out and there are no words that can express how empty our lives will be without her," she said. Mrs Gray was head coach at Dorset Futsal Club, a women's indoor football team, who said they were "absolutely devastated". "As a club run by volunteers, the time and dedication she put into getting the women's team to where they are was second to none, without her, there would be no Dorset Futsal Ladies," the club said.
