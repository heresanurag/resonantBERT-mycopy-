title: Stormzy to receive honorary Cambridge University doctorate - BBC News
date: '2025-03-20'
section: Cambridgeshire
url: http://www.bbc.co.uk/news/articles/c04zyg716pqo
content: |-
  The university is honouring eight people, including former Olympian Dame Katherine Grainger.

  The "Stormzy effect" has contributed to an increase in applications to Cambridge from black students across the UK, the university says

  Stormzy has been nominated for an honorary degree alongside one of the most decorated British female Olympians, Dame Katherine Grainger. In 2018 the musician, whose real name is Michael Ebenezer Kwadjo Omari Owuo Jr, launched a scholarship programme for black students at the University of Cambridge. The institution said he would receive a doctorate in law in recognition of his philanthropic work and impact on education, music, sport and literature. Eight people will be recognised by the university, including Dame Katherine, the first female chair of the British Olympic Association.

  In November Dame Katherine Grainger became the first female chair in the 119-year history of the British Olympic Association

  Cambridge University said the "Stormzy effect" had contributed to an increase in applications to the university from black students across the UK. The Stormzy Scholarship funds two black British students per year at Cambridge, covering their tuition fees and maintenance costs. It was later expanded when HSBC UK agreed to fund a further 10 students per year. The university said 55 students had been supported by a Stormzy Scholarship so far, and this year would see the largest group to date graduate. Dame Katherine will also receive a doctorate in law from the university. She is currently chancellor of the University of Glasgow and is the only British woman to have won a medal at five successive Olympic Games.

  Sir John Rutter, founder and director of the Cambridge Singers, is to be granted a doctorate in music

  All eight of those recommended have accepted the honorary doctorate nomination, subject to final approval by the university's governing body. They will be admitted to their degrees on 25 June, presided by vice-chancellor Prof Deborah Prentice. An honorary doctorate in letters will be granted to Sir Simon Russell Beale, who is an honorary fellow of Gonville and Caius College, where he studied for his undergraduate degree. Political activist, philosopher and author Professor Angela Davis will also receive a doctorate in letters. The founder and director of the Cambridge Singers, Sir John Rutter, whose work has been performed all over the world, will be granted a doctorate in music. Lady Arden of Heswall, the former justice of the UK's Supreme Court and an honorary fellow of Girton College, will receive a doctorate in law. She was the first female judge assigned to the Chancery Division at the High Court of Justice. The Nobel Prize-winning economist Sir Oliver Hart will receive a doctorate in science. Professor Maria Leptin, the president of the European Research Council, will be conferred with a doctorate in medical science.

