  Friday is not a working day in Saudi and as such the weigh-in – held at a garden-themed theme park - was slightly better attended than other fight week events. The distant screams from a rollercoaster were drowned out by some travelling British fans chanting "there's only one Tyson Fury". They were joined by a couple of hundred Saudis, most of whom happened to be visiting the theme park. Blockbuster boxing shows in the Kingdom have been criticised for their low attendance. While it takes time to cultivate new boxing fans, local interest in this bout does not appear to be growing at the quickest of rates. Usyk v Fury could sell out any stadium in the United Kingdom, but the fighters benefit from fighting in the Middle East because of the investment of the energy-rich Saudi organisers. Although exact purses have not been revealed, the pair - according to unconfirmed reports - will share prize money of £150m, with the split undisclosed. Fury reportedly took home as much as £85m for the first fight, significantly higher than Usyk's purse of £35m.

