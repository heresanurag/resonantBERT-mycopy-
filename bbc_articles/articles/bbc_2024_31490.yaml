content: |-
  A fully clothed Tyson Fury weighs in four stone heavier than champion Oleksandr Usyk for Saturday's heavyweight world title fight in Saudi Arabia.

  This video can not be played To play this video you need to enable JavaScript in your browser.

  A fully clothed Tyson Fury weighed in at a career-heavy 20st 1lb for Saturday's heavyweight world title fight against champion Oleksandr Usyk in Saudi Arabia. Ukraine's Usyk will defend his WBA (Super), WBC and WBO titles against two-time champion Fury at Riyadh's Kingdom Arena. Dressed in a leather jacket, white trousers and a baseball cap - which he kept on when he stepped on the scales - Fury weighed in four stone heavier than his opponent. He cut a more relaxed figure than he has throughout the week, even shaking hands with Usyk's team. But the 36-year-old Briton seemed eager to get Friday's weigh-in over and looked away after just seven seconds during their final face-off. They had shared an 11-minute face-off a day earlier. The Morecambe fighter walked off without giving an on-camera interview. Usyk, asked how he was feeling, simply replied: "Nothing." The 37-year-old earned a split decision win for the undisputed title in May, inflicting a first career loss on Fury. He too was fully dressed in a tracksuit as he tipped the scales, making it difficult to determine the boxers' conditioning and shape, as he weighed in at 16st 2lb, just two pounds heavier than his weight for the first fight. "You can analyse it anyway you like but tomorrow night you're going to find out who is the best," Fury's promoter, Frank Warren, said. "You know both of them will come to fight. We are going to see something extra, extra special."

  Fury weighed 18st 7lb for the first Usyk fight and was at his heaviest against Francis Ngannou last year at 19st 8lb

  Away from the weigh-in, the fighters' teams are in a dispute over a replacement official and the length of Fury's beard. Fury has grown a bristly beard, which he says provides added strength. Boxing rules usually require facial hair to be of a certain length. Stubble, for example, can further damage a cut. At a rules meeting on Friday, Fury's beard was cleared. Usyk's team, however, are planning to "push this further". Speaking to the Independent,, external Usyk's promoter Alex Krassyuk cited WBC rules setting out that the length of facial hair cannot act as a cushion for the impact of a punch.
  • None Usyk v Fury 2 - all you need to know Meanwhile, Fernando Barbosa was set to be one of the three judges on Saturday but he has not travelled to Riyadh because of illness. Steve Weisfeld and Ignacio Robles were flown in to replace Barbosa, but the two fighters' teams were split on which judge should be used. Robles will be the third judge after a coin toss was used to decide.

