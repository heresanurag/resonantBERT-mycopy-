  Buses were also leaving Warrington Central at the same times, calling at all stops to Manchester Oxford Road. A bus will depart Manchester Oxford Road at 19:00, calling at all stops to Earlestown. TransPennine Express said rail replacement buses had been requested for the following routes:
  • None Manchester Piccadilly to Liverpool Lime Street in both directions
  • None Manchester Piccadilly to Preston in both directions East Midlands Railway said it had bus replacements services on standby at Warrington Central, Stockport and Sheffield. TransPennine Express said customers at Liverpool Lime Street could use their ticket at no extra cost to travel on TransPennine Express services to Manchester Victoria. It also advised customers at Manchester Piccadilly and Manchester Oxford Road to use the free Transport for Greater Manchester bus link to Manchester Victoria, where they could change for connecting services towards Liverpool.

  The fire at the former Hotspur Press printing works is close to Manchester Oxford Road railway station

  The fire-hit building, also known as Medlock Mill, closed as a printing site in 1996. Developer Manner's plan to regenerate the historic building into a 36-storey student tower was given planning permission in May 2024. However, it recently redesigned its proposals and they will now be submitted to Manchester City Council, the Local Democracy Reporting Service said earlier this month.

