title: 'Manchester fire: People evacuated from tower after blaze spreads - BBC News'
date: '2025-06-23'
section: Manchester
url: http://www.bbc.co.uk/news/articles/c24v7nj3lmeo
content: |-
  Residents are evacuated from a tower block after embers from a major fire at Hotspur House spread.

  The fire at Hotspur House in Manchester spread to a neighbouring building

  A fire that broke out at a landmark Manchester city centre building - causing it to partly collapse - spread to a neighbouring tower block. Embers from the blaze at Hotspur House reached 1 Cambridge Street, resulting in the evacuation of residents from the building, Greater Manchester Fire And Rescue Service (GMFRS) told the BBC at the scene. However, it added the fire was no longer being treated as a major incident. Anyone who has nowhere to go is set to be put up overnight by Manchester City Council. The fire at the former printing press building broke out at about 17:00 GMT, forcing the cancellation of all trains through Manchester Oxford Road station.

  The fire service urged the public to stay away from the area and said 20 fire engines from across Greater Manchester were on the scene. A spokesperson said the blaze had spread to three floors of Hotspur House, and aerial units had been used to bring the fire under control. The spokesman added: "The two apartment blocks at number 1 Cambridge Street have been evacuated. "A cordon is in place on Cambridge Street and we ask that the public stay away from the area. "Residents nearby should keep doors and windows closed due to smoke in the area." Footage taken at the scene showed parts of Hotspur House had collapsed. National Rail said all lines were blocked and warned that services running through the station may be cancelled or delayed until 21:00 BST. It said rail replacement buses were running for Northern customers from Manchester Oxford Road at 18:20 BST and 18:25, calling at all stops to Warrington Central. There have been no further updates on disruption to rail services.

  Part of the former Hotspur Press appears to have collapsed due to the fire

