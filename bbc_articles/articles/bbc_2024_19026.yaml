title: 'Newspaper headlines: ''He was unforgettable'' and ''Royal role models'' -
  BBC News'
date: '2024-08-18'
section: The Papers
url: http://www.bbc.co.uk/news/articles/cgjv89ewn11o
content: |-
  Front pages include the Sussexes finishing their Colombia tour and tributes to the French actor Alain Delon.

  'He was unforgettable' and 'Royal role models'

  The Daily Telegraph, external carries a warning from the Conservatives that the government's plan to scrap the Trades Union Act will ''open the floodgates” to more industrial action. It is understood that the current requirement, that a certain proportion of union members need to vote for strike action for it be legal, would no longer apply. Shadow business secretary Kevin Hollinrake is quoted as saying that ''it will be businesses and consumers that pay the price, and growth that suffers". ''Half of Labour MPs in pay of unions” is the headline for the Daily Mail, external. The paper says that, based on figures in the MPs’ register of interests, 213 of the 404 Labour MPs took union money to help them fight the election. A Labour spokesperson said all donations were declared in line with parliamentary and Electoral Commission rules. Workers who are regularly contacted by their boss out of hours could get thousands of pounds in compensation, according to the Times, external. It says the government is looking to Ireland and Belgium for inspiration on its proposed ''right to switch off'' policy. The paper says that although it is unlikely that employees could take legal action for this alone, it could be used as an aggravating factor in a broader claim against their employer. A government source said the details were still being drawn up. A former Victims' Commissioner, Dame Vera Baird, has told the Daily Express, external that men who repeatedly abuse women should be sentenced as quickly as those who have been prosecuted for the recent disorder in England. Dame Vera writes that male violence against women and girls is "almost always poorly and slowly dealt with by police and the wider criminal justice system, which offers no deterrent''. The Daily Telegraph, external also reports that the prime minister has been urged to rethink his refusal to allow Ukraine to use long-range missiles produced in the UK to hit targets deep inside Russia. The paper has spoken to four former Conservative defence secretaries, who say the UK is failing to provide Ukraine with the support it needs. A Ministry of Defence spokesman tells the Telegraph there has been “no change in the UK’s position” when it comes to Storm Shadow missiles. An investigation by the i paper, external has found that thousands of children and teenagers have had vapes or drinks spiked in the past three years. The figures come from a Freedom of Information request to police forces in England and Wales. The paper says there is particular concern about vapes being laced with the synthetic drug, spice.

  Imran Khan has applied to become the next chancellor of Oxford University, according to the Guardian

  Pakistan's jailed former Prime Minister Imran Khan has applied to become the next chancellor of Oxford University, according to papers including the Guardian, external. One of his advisers is said to have confirmed his candidacy for the election in October. The paper says Mr Khan is an Oxford graduate and previously served as chancellor of the University of Bradford for seven years. ''Bank on record traffic for big August getaway'', is the warning in the Daily Mirror, external. The motoring organisation the RAC says its data indicates that 19 million trips will be made between this Friday and Monday, which would make it the busiest August bank holiday since its records began in 2015.

