content: |-
  BBC Russia editor Steve Rosenberg assesses the Russian leader's next move.

  Steve Rosenberg: After days of escalation, what will Putin do next?

  After all, this was the week the Kremlin leader lowered the threshold for the use of Russian nuclear weapons. It was the week the US and UK crossed (another) Putin red line, allowing Ukraine to fire Western-supplied longer-range missiles into Russia. It was also the week that President Putin, in effect, threatened the UK, America and any other country supplying Ukraine with such weapons and for such a purpose. “We consider ourselves entitled to use our weapons against the military facilities of those countries that allow their weapons to be used against our facilities,” the Russian leader said in an address to the nation on Thursday evening. So, you can see: “What will Vladimir Putin do next?” is a most pressing question. And, since I’m the BBC’s Russia Editor, you might expect me to have the answer. I’ll be honest with you. I don’t. Perhaps even Putin doesn’t know the answer, which makes things even more serious. Instead of answers, some observations.

  This week the Kremlin accused the “collective West” of escalating the war in Ukraine. But nearly three years of war in Ukraine have shown that it is Vladimir Putin who embraces escalation as a means to achieving his goals - in this case, control over Ukraine or at the very least peace on Russia’s terms. Putin’s full-scale invasion of Ukraine, his decision to declare four Ukrainian territories part of Russia, his deployment of North Korean troops to Kursk region, his decision on Thursday to target the Ukrainian city of Dnipro with a new intermediate-range hypersonic ballistic missile, followed up by threats to strike the West - all of these represent moments of escalation in this conflict. I once described Vladimir Putin as a car with no reverse gear and no brakes, careering down the highway, accelerator pedal stuck to the floor. From what I can see, little has changed. Don’t expect the Putinmobile to suddenly decelerate or de-escalate now in the face of longer-range missile strikes on Russia. Escalation, though, is another matter. That’s a distinct possibility. Ukraine will be bracing itself for more Russian attacks, even heavier bombardments. Western governments will be assessing the threat level in light of Putin’s warnings. Even before the Kremlin leader’s TV address, there had been fears in the West of an upsurge in hybrid Russian warfare. Last month the head of MI5 warned that Russian military intelligence was engaged in a campaign to “generate mayhem on British and European streets". “We’ve seen arson, sabotage and more," he added. Back in June, Putin suggested that Moscow might arm adversaries of the West if Ukraine were allowed to strike deep into Russia with Western long-range missiles. "We believe that if someone is thinking it is possible to supply such weapons to a war zone to strike our territory and create problems for us,” he said, “why can’t we supply our weapons of the same class to those regions around the world where they will target sensitive facilities of the countries that are doing this to Russia?" Putin warns West as Russia hits Ukraine with new missile

  The question “What will Putin do next?” is usually followed by: “Would Putin use a nuclear weapon in the Ukraine war?” The Russian president has dropped some unsubtle hints. On announcing the start of his "special military operation" – the full-scale invasion of Ukraine – he had issued a warning to “those who may be tempted to interfere from the outside”. “No matter who tries to stand in our way or create threats for our country and our people,” the Kremlin leader declared, “they must know that Russia will respond immediately. “And the consequences will be such as you have never seen in your entire history.” Western leaders generally dismissed what they saw as nuclear sabre-rattling. Since the start of the war Western governments have crossed several Russian "red lines": providing Ukraine with tanks, advanced missile systems and then F-16 fighter jets. The "consequences" threatened by the Kremlin never materialised. In September Putin announced he was lowering the threshold for the use of nuclear weapons - the decree was published this week. A clear warning to Europe and America not to allow longer-range missile strikes on Russian territory. Now this red line, too, has been crossed. In his address to the nation Putin confirmed Western reports that Ukraine had fired US-supplied Atacms and British-made Storm Shadow missiles at targets inside Russia. Earlier this week, when pro-Kremlin tabloid Moskovsky Komsomolets asked a retired lieutenant-general how Russia should respond to an Atacms attack on Bryansk region, he replied: “Starting World War Three over strikes on an arms depot in Bryansk region would probably be short-sighted.” It would be comforting to think that the Kremlin shares that view. But Vladimir Putin’s address to the nation contained no evidence of that. His message to Ukraine’s supporters in the West appeared to be: this is a red line I’m serious about, I dare you to cross it. “Even Putin doesn’t know whether he can use a nuclear weapon, or he can’t. It depends on his emotions,” Novaya Gazeta columnist Andrei Kolesnikov told me recently. “We know he’s a very emotional man. The decision to begin this war was also an emotional step. Because of that we must take seriously his idea of the changing of the nuclear doctrine. They say the fear of war must return and will contain both sides, but this is also a tool of escalation. “In this interpretation we must admit that Putin, under some circumstances, can use at least a tactical nuclear weapon in the framework of a limited nuclear war. It will not solve the problem. But it will be the start of a suicidal escalation for the whole world.” Tactical nuclear weapons are small warheads intended for use on the battlefield or a limited strike.

  Vladimir Putin may act on emotions. He is also, clearly, driven by resentment of the West and appears determined not to back down. But he also knows the world could soon be a very different place. In two months’ time Joe Biden will be out of office and Donald Trump will be in the White House. President-Elect Trump has expressed scepticism regarding US military assistance for Ukraine and has been fiercely critical of Nato. He’s also said recently that talking to Vladimir Putin would be “a smart thing”. All of that should be music to Putin’s ears. Which means that, despite the latest threats and warnings, the Kremlin may decide against a major escalation right now. That is, if the Kremlin has calculated that Donald Trump will help end the war on terms beneficial to Russia. If that calculation changes, so could Moscow’s response.
