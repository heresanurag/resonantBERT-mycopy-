  Jordan Henderson made 492 appearances for Liverpool before leaving in 2022

  Henderson left Liverpool in the summer of 2023, initially joining Saudi Pro League club Al-Ettifaq before moving on to Ajax. The midfielder, who has won 81 caps for the national side, has turned out 38 times across all competitions for Ajax this term. His inclusion means there is no space for 21-year-old Crystal Palace midfielder Adam Wharton, who made his England debut in March 2023 and was part of Southgate's squad at Euro 2024, although he was unable to add to his one and only cap. Wharton missed three months of this season with a thigh injury but has been playing regularly for the Eagles since returning at the start of February.

  Tuchel has given four players the opportunity to win their first cap, with Burn, Lewis-Skelly, Trafford and Quansah all looking to impress. Burn, unlike the other three, has had a long wait for his maiden call-up following some consistent performances for Newcastle. The 32-year-old began his professional career with non-league side Darlington and spent time with Fulham, Yeovil, Birmingham, Wigan and Brighton before joining the Magpies in 2022. "[It's an] incredible moment for Dan, and there's no-one more deserving in my opinion," said Newcastle manager Eddie Howe. "He came in during our relegation battle. He's just such an inspiring guy, but also a talented player. "It's one of the great football stories, one of the great comebacks, someone who had to do it the real hard way, coming through the leagues, dedicated, professional, a leader, an inspirational figure." Lewis-Skelly, 18, only made his senior competitive debut for Arsenal in September but has emerged as a significant player the Gunners. He has primarily been deployed at left-back but can also operate in midfield and has made 25 appearances this season. "Very proud of him," said Arsenal boss Mikel Arteta. "One of our graduates getting the call for England, it's a massive thing. "It's a story that gives a lot of hope to young players. In six, seven months your career can change dramatically for the good. It's something for people to be inspired by." Trafford and Quansah have both previously been called up to England squads but are yet to make an appearance.

  Tuchel has wasted no time in putting his personal stamp on his first squad with some eye-catching selections. The headline is a recall for Rashford, an outcast at Manchester United after the appointment of head coach Amorim but enjoying a renaissance under the expert guidance of Unai Emery on loan at Aston Villa. Rashford's career had come to a dead stop at United but his revival at Villa, where he has helped them to reach the Champions League quarter-final and the last eight of the FA Cup, has convinced Tuchel the talented 27-year-old has something to offer his new England. The past few months have represented a fresh start for Rashford at Villa. Now he will be hoping the same will happen with England. The recall of Henderson is, if anything, an even bigger surprise given he is 35 in June and last played for England in November 2023. He had an ill-fated move to Saudi Arabia after leaving Liverpool, before returning to Europe with Ajax. Henderson is hardly one for the future but Tuchel believes he can offer leadership and experience. The recall, however, is still a major shock. Tuchel has to find a solution to England's left-back dilemma and this means a call-up for Arsenal's gifted teenager Lewis-Skelly, while another first timer in an England squad, Newcastle United's Burn, has also figured in that position.

