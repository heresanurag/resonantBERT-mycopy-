title: The decade's first babies arrive in Scotland - BBC News
date: '2020-01-02'
section: Scotland
url: http://www.bbc.co.uk/news/uk-scotland-50964317
content: |-
  The first child of 2020 is believed to have been a boy who arrived at 00:03 at the Royal Infirmary of Edinburgh.

  Emma Allan gave birth to Scotland's first baby of the decade

  Scotland has welcomed its first babies of the decade in hospitals around the country.

  The first arrival is believed to have been a boy born at 00:03, at the Royal Infirmary of Edinburgh.

  Weighing 8lbs 5oz, he is the first child for Emma Allan and Cameron Cunningham, who are from Port Seton.

  New mother Emma said: "He was due 10 days ago so this isn't what we expected - he must have wanted to be the first baby of the decade."

  Ten minutes after baby Cunningham was born in Edinburgh, a baby girl weighing 7lbs 11.5oz was born at Aberdeen Maternity Hospital.

  Parents Kayleigh Clark and Darren Wood, from Inverurie, welcomed Emily Louise Wood into the world at 00:13.

  Just over an hour later at 01:18, a baby girl was born at Forth Valley Royal Hospital in Larbert to parents Sarah and Lizzie Middleton, from Stenhousemuir.

  The child, named Lexie, arrived weighing 6lb 9oz and is Sarah's first baby.

  A boy called Russell was born at 02:09 in St John's Hospital in Livingston.

  Mary Cruikshank was one of the first babies born at the Ayrshire Maternity Unit

  His parents Laura and Kevin Galbraith are from Bathgate in West Lothian.

  The first Glasgow baby was a girl, born at 04:36 at the Queen Elizabeth University Hospital maternity unit.

  She has been named as Catherine by her parents Marie and Peter Rankin, from Clarkston, East Renfrewshire.

  At Raigmore Hospital in Inverness, local couple Alison and Allan Stewart had a boy at 04:11.

  At the same hospital just 19 minutes later, Sophie Jansen van Rensburg and partner Warren, from Nairn, had a little boy.

  They plan to name him Carter.

  The first baby of the year at the Ayrshire Maternity Unit was 7lb 11oz Theodore - a son to Christina and Ryan Maguire from Troon - who was delivered at 05:23.

  Three minutes later, Robyn was born to mother Erica Borland and father Sam Love, from Ayr. Weighing 9lb 3oz, Robyn is a little sister for brothers Evan, 4, and two-year-old Luke.

  Manilyn and Richard Cruikshank, from Maybole, welcomed their first child - a daughter named Mary - at 06:39. Mary weighed in at 4lb 15oz.
