title: BBC correspondent mobbed by joyous Argentina fans - BBC News
date: '2022-12-20'
section: General
url: http://www.bbc.co.uk/news/world-latin-america-64037345
content: |-
  The BBC's Katy Watson was surrounded by fans when reporting on World Cup celebrations in Buenos Aires.

  This is the moment a BBC correspondent was surrounded by fans celebrating Argentina's World Cup win.

  Katy Watson was close to Buenos Aires Obelisk monument, when she was mobbed by ecstatic fans waiting to see their idols.

  Thousands have taken to the streets for the festivities, with crowds stretching into the distance.
