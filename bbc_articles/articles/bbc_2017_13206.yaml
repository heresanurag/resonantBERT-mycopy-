id: bbc_2017_13206
title: DUP leader Arlene Foster welcomes Brexit deal - BBC News
date: '2017-12-08'
section: General
url: http://www.bbc.co.uk/news/uk-politics-42277066
content: |-
  DUP leader Arlene Foster says substantive changes to proposed text for a deal with the EU were made.

  The leader of Northern Ireland's Democratic Unionist Party, Arlene Foster, has said she is "pleased" to see changes which mean there is "no red line down the Irish Sea".

  PM Theresa May said there would be no hard border and the Good Friday Agreement would be upheld.
