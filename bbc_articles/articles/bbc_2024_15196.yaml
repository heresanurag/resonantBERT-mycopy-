content: |-
  Ed Sheeran, Little Simz, Kate Beckinsale and Sir Patrick Stewart are among the stars cheering the Three Lions.

  Ed Sheeran, Little Simz, Kate Beckinsale and Sir Patrick Stewart are among the dozens of British celebrities and sports stars who have sent personal messages of support to England ahead of the team's Euro 2024 final later.

  The messages will feature in a montage during a pre-match special on BBC One and BBC iPlayer, hosted by Gary Lineker.

  Watch live coverage of Spain v England on Sunday, 14 July from 18:30 BST on BBC One and iPlayer, and follow on the BBC Sport app.
