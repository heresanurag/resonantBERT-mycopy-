  Since February, both men and women have been attacked in Manchester city centre while intoxicated.

  Both men and women have been raped while intoxicated in Manchester city centre since February, police say

  A man has been arrested on suspicion of raping four people in separate attacks in a city centre. The victims, men and women, were attacked in Manchester when they were intoxicated and then had their personal items taken, Greater Manchester Police said. Det Supt Richard Hunt said the "truly horrific crimes" dated back to February. The suspect, in his 40s, is being questioned in police custody.

  Det Supt Hunt said: “No-one should feel unsafe when walking the streets of Greater Manchester. "Our specialist officers have been and are continuing to support those involved in these incidents, and we are doing all we can to provide the appropriate care that they need at this time." He added: "We urge anyone who has experienced sexual violence or abuse to please come forward and report it to us. "Every report will be thoroughly investigated, and we will ensure that you and your loved ones are fully supported every step of the way as we seek justice." Listen to the best of BBC Radio Manchester on Sounds and follow BBC Manchester on Facebook, external, X, external, and Instagram, external. You can also send story ideas to northwest.newsonline@bbc.co.uk, external
