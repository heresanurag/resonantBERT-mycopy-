  Spurs could have no fit centre-back after Davies 'setback'

  Tottenham could be without any fit centre-backs for Sunday's Premier League game against Wolves after Ben Davies suffered a setback in his recovery. The Wales international, 31, has been out since 5 December with a hamstring injury. Davies had been nearing a return, but manager Ange Postecoglou said on Friday: "No, he is ruled out. Unfortunately he had a setback in training, so he'll probably be out for a couple of weeks." Radu Dragușin will also be assessed after he was forced off with an ankle injury in Thursday's defeat by Nottingham Forest. If the Romanian is ruled out he would join Davies and Spurs' other centre-backs Micky van de Ven and Cristian Romero on the sidelines. "A bit early to tell," Postecoglou said of Dragușin's injury. "He obviously tweaked his ankle last night and felt he couldn't continue. We'll have to wait and see."

  After Dragusin limped off in the 87th minute of the 1-0 defeat at Forest, Spurs finished with 18-year-old Archie Gray, who has been filling in in defence, and fellow midfielder Yves Bissouma in the centre-back roles. Full-back Djed Spence is also suspended for the 15:00 GMT kick-off against Wolves as Postecoglou said the injury crisis is the worst he has faced in his managerial career. "There's always been issues at different times but not to this extent," he added. "I think we've had close to pretty consistently 10 first-team players not available for a significant run of games. "We've been kind of getting through it for quite a while and keeping our fingers crossed we don't get any more issues, but the nature of football and fixture scheduling we've had, we've always been on a fine line of being able to get through. "It's another test for us, but it is what it is, and whatever we need to deal with, we'll deal with and get ready for Sunday." The Forest defeat was Spurs' ninth of the season and left them 11th in the Premier League. They play Liverpool in the Carabao Cup semi-finals next month and Postecoglou said he still feels the support of the club's fans despite the increased pressure and criticism of his attacking style. "They love their football club, they care about their football club and they want their football club to succeed," said the Australian. "They make those feelings and emotions seen. "I haven't felt anything but support since I have been here. I still feel that support is there. I will keep doing what I think is the right thing to bring success to this football club, that doesn't change."
