content: |-
  Different cases are posing wider questions about the relationship between politics and gambling.

  What have we learned from the political betting saga?

  Two weeks into the gambling saga and it just grows and grows. What began as a discrete - and extraordinary - story about one Conservative candidate is now a sprawling tangle of claims about at least six Conservatives, a Labour candidate and six officers from the Metropolitan Police, some of whom are being looked at by the Gambling Commission and others, it appears, are not. Specific claims are being merged into one melange which gives the impression that political actors are betting on political outcomes with surprising frequency. It’s worth being clear that there are now some fairly distinct categories of allegation. First, there’s the allegations against the two disowned Conservative candidates and the Member of the Welsh Parliament over bets allegedly placed on the date of the July election. They have said they will cooperate with the Gambling Commission, which is investigating whether there has been any breach of the Gambling Act. The commission has not identified any individuals it is looking into but has said if someone uses confidential information in order to gain an unfair advantage when betting, this may constitute an offence of cheating.

  A bet on the timing of the election is also assumed to be the accusation against the member of Rishi Sunak’s close protection team who has been suspended and arrested on suspicion of misconduct in public office. Yesterday there were some slightly different allegations. Kevin Craig, a Labour candidate, was suspended by the party when it became apparent that the Gambling Commission was looking at him too – albeit over a different kind of bet, one on the outcome in his constituency. This is different because Mr Craig didn’t bet on the date of the election, but on the – as yet unknown – result in his seat. It’s also interesting to note that Mr Craig’s case may be an indication that the Commission has broadened its inquiries. We thought they were simply looking at wagers placed on a July election in the days leading up to Mr Sunak’s announcement. The fact they are looking at somebody who placed bets on a completely different market may suggest their probe is far wider now. Then there’s Alister Jack, the Scottish secretary, who insists that he did not break any rules when earlier this year he placed a trio of bets, one successful, two unsuccessful, on the election date. He has said he is not under investigation by the Gambling Commission.

  All cases with their messy and uncertain specifics, and plenty of gaps to be filled in. But if there is a common theme it is politicians and politicos more generally betting on politics. One Labour candidate instantly got in touch after the news of Mr Craig’s suspension broke to tell me they did not believe he would be the only candidate to have placed a bet on the outcome of the election. Sir Ed Davey, the Liberal Democrat leader, told the BBC today that he had placed a bet on his party’s fortunes at the 2010 general election. (He was over-optimistic and lost). Are such bets a legal or regulatory matter? It seems unlikely, though that’s for the Gambling Commission to determine. But politically, you can see that party leaders may now decide that politicians placing any sort of bet on politics is an unsustainably bad look. Don’t be surprised if one outcome of this saga is new rules on when politicians can gamble.
