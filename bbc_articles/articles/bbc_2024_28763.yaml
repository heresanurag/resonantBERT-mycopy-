title: Students push sliding coach on icy road in Nottingham - BBC News
date: '2024-11-21'
section: General
url: http://www.bbc.co.uk/news/videos/cp3np8pdldko
content: |-
  They tried to stop the vehicle as it "encountered difficulties" on a hill.

  Footage has emerged showing the moment a group of students tried to stop a coach from sliding down an icy road.

  National Express said 30 passengers were on board when the coach got into difficulty on Derby Road, Nottingham, in the early hours of Tuesday.

  Rosie Moorhouse, 19, a student at the University of Nottingham, described the situation as "a bit scary" when she saw a group of students pushing against the coach.

  "It just started sliding down the hill on the ice," she said.

  "A big group of people who were already outside, basically just playing in the snow, got behind the coach and pushed up against it until it stopped sliding down the hill.

  "When everyone stopped it [the coach], everyone started applauding and it was really cute.

  "It was very wholesome. It was nice."

  She said: "While thankfully no-one was injured in this incident, we would always advise people to keep a safe distance from a vehicle carrying out a manoeuvre, no matter if their intention was to help."
