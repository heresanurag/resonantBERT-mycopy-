  French tennis player Nicolas Mahut also chimed in on the incident, suggesting that organisers were bowing to pressure from major corporate Chinese sponsors.

  Chinese premium liquor company Luzhou Laojiao and mattress firm DeRucci are listed as two of the leading partners on Australia Open's website.

  "What's going on!? What lack of courage! What if you did not have Chinese sponsors?" Mr Mahut tweeted.

  Australia researcher for international rights group Human Rights Watch, Sophie McNeill, called Tennis Australia's decision "not cool," and urged other tennis players in the tournament to bring attention to Peng Shuai.

