title: Home Office doubles time given to refugees to find accommodation - BBC News
date: '2024-12-06'
section: Politics
url: http://www.bbc.co.uk/news/articles/cx27npv58nno
content: |-
  The period for refugees to move out of supported housing will increase from 28 to 56 days.

  Home Office to give refugees more time to find housing

  The Home Office has said it will double the number of days someone granted asylum can stay in government accommodation. Government letters seen by the BBC reveal the grace period given to refugees to transition from supported housing to their own accommodation will be increased from 28 to 56 days from 9 December. The change is described by the Home Office as "an interim measure" expected to be in place until June 2025, when it will be reassessed. Officials said in the letters the move was designed to support local authorities after research suggested a significant rise in refugee homelessness over the past year.

  In October 2022, Home Office officials said the daily bill for housing asylum seekers in hotels was £5.6m a day. A fast-track element was added to the UK's asylum system to speed up the processing of those whose claims were likely to be accepted because of the countries they had come from. Afghanistan, Eritrea, Libya, Syria and Yemen were put on the fast-track list in February 2023. Some claims related to people from Iran and Iraq were also processed more quickly. The Home Office's annual accounts, published last September, promised to "take action to address the unacceptable costs of housing migrants in hotels" and revealed the cost had risen to £8m a day. Ministers announced claims would be processed more quickly to allow hotels to be closed. They also changed the move-on system, altering the stage at which the 28-day move-on period began and effectively reducing the period to seven days. That change was reversed a few weeks later, but many charities claim that was the trigger for a refugee homelessness problem that has not gone away. The number of hotels housing asylum seekers has significantly decreased during that time. But last month, a Home Office minister acknowledged the number of hotels had started to increase. This month, the Home Office refused a BBC Freedom of Information request asking whether the overall hotel bill had also come down.

  Labour campaigned on a promise to cut the asylum backlog, which hit record numbers under the Conservative government. But the Home Office's faster processing has partly led to a rising number of homeless refugees, who have been evicted from government accommodation hotels. This has placed further pressures on councils and charities already dealing with high levels of rough sleeping.

  Official government data released last week showed a record 123,100 households were in temporary accommodation at the end of June, a 16% rise on last year. Research published last month by the No Accommodation Network, an umbrella group for organisations in the asylum sector, suggested a big rise in refugee homelessness over the last year. They said 1,941 adults granted leave to remain had found themselves without accommodation in 2023/24 - a rise from 977 in 2022/23. The organisation called on the government to do more to combat the "refugee homelessness emergency". The government's Homelessness Reduction Act, which was implemented in 2018, acknowledged that at least 56 days are usually needed to find accommodation. Currently, a refugee granted leave to remain is given up to 28 days to find somewhere to live before they are evicted from Home Office accommodation. If a newly-recognised refugee does not find somewhere to live in that time, they often declare themselves as homeless to a local authority. A lack of available accommodation options has meant many councils and charities have had to use more expensive options, such as hotels and bed and breakfasts, to house those in need. The boss of a homelessness charity in Manchester told Radio 4's Today programme this week it had seen a huge increase in the number of asylum seekers or refugees -from 30% to more than 60% of the charity's caseload in the last 12 months. She did not say how many people this equated to. Jo Walby, chief executive of Mustard Tree, said refugees often struggle to "access the private rented market" in big cities like Manchester. She added: "The reality is, you can't learn English, you can't work, and then you have four weeks to be told to find a job and find a house and you don't have access to government support or council support, because you don't have priority need." Matt Downie, head of the homelessness charity Crisis, said: "This extension will ensure that people trying to rebuild their lives after fleeing war and persecution won't face further trauma of life on the streets. "This is a hugely positive step... it's important that this becomes a permanent change next year if we're going to ensure that refugees granted settled status don't face homelessness in the future." Phil Kerry, the chief executive of New Horizons Youth Centre, a London-based charity that helps young homeless people, said: "The timing of this news could not be better and crucially means that we won't have more refugees pushed onto the streets this Christmas." A Home Office spokesperson said: "We have inherited enormous pressures in the asylum system and remain absolutely committed to ending the use of hotels as we ramp up returns of failed asylum seekers."
