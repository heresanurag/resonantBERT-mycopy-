title: 'Premier League Darts results: Gerwyn Price beats Nathan Aspinall to win night
  three in Dublin - BBC Sport'
date: '2025-02-20'
section: Darts
url: http://www.bbc.co.uk/sport/darts/articles/c99nv48dn4jo
content: |-
  Gerwyn Price wins his first Premier League night since 2023 with victory over Nathan Aspinall in Dublin.

  Gerwyn Price finished as the runner-up in the 2023 Premier League

  Gerwyn Price beat Nathan Aspinall 6-3 in the final to win night three of Premier League Darts in Dublin. The 2021 world champion was in scintillating form throughout the evening and beat world champion Luke Littler and world number one Luke Humphries to reach the final. It was the Welshman's first night win since the 11th event in 2023 - where he went on to finish runner-up in the season-ending play-offs. He exchanged breaks with Aspinall, who picked up his first wins of the year, in legs three and four before breaking again in leg seven to take control. That put him 4-3 ahead and he held his throw before breaking again to seal a dominant victory. He averaged 100.57 and took out 50% of his checkouts, before racing off stage and not conducting a post-match interview with Sky Sports. Speaking after this quarter-final win, the 39-year-old had said: "I want to be a tough nut to crack for everyone, that is what I used to be. That is where I was two or three years ago and I've maybe slipped off the radar a little bit but I am coming back. "My game is in a great place and my mind is in a good place." For Aspinall this will a morale-boosting performance after the world number 11 spoke candidly about suffering with 'dartitis' , external- a condition where players have a mental block when it comes to throwing on the stage. It came after he said he felt "absolutely shocking" and was "under the weather" before his quarter-final win over Rob Cross. Price is the third winner of the season after victories for Humphries and Littler in the opening two weeks.

  Humphries failed to make the final for the first time this season after a 6-3 defeat by Price in the semi-finals. He led 2-0 but was blown away by the Welshman's superb finishing that saw him take out six of his seven attempts at a checkout. A pumped up Price had already seen off world number two Littler in the quarter-finals with an impressive 6-4 victory. It means Price has now won his past five matches against Littler. Littler was not at his best, mixing big scoring with low scores and that saw him average less than 100. The 18-year-old was visibly frustrated by the defeat and was seen throwing his darts case to the floor as he made his way off the stage. Seven-time winner Michael van Gerwen reached his third successive semi-final but his throw was broken four times by Aspinall in the semi-finals. Aspinall's run to the final means Stephen Bunting, who is playing in the Premier League for the first time since 2015, is the only player without a win. He posted on X, external after his 6-4 defeat by Humphries to say "still a few nerves" and it is "a marathon not a sprint". Week four takes place in Exeter on 27 February.

  Premier League Darts is played across 16 initial weeks in the league stage with quarter-finals, semi-finals and a final each night. Each of the eight players is guaranteed to face the other seven in the quarter-finals in weeks 1-7 and 9-15, with weeks 8 and 16's fixtures done off the table. It means we will get fourth v fifth in Sheffield on the final league-stage night, with the play-off spots potentially on the line. Players earn two points per quarter-final win, an additional point if they win their semi-final and five for winning the night. The top four players after the group stage progress to the play-off night at London's O2 Arena on 23 May, with first facing fourth and second against third in a best-of-19-leg match. The final, which is the best of 21 legs, follows. If players are level on points after the 16 weeks then places are decided by nights won and then matches won.
