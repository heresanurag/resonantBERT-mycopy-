content: |-
  Days of heavy rainfall in California have caused flooding and mudslides, leaving infrastructure damaged.

  Days of heavy rainfall in California have caused flooding and mudslides, leaving infrastructure like roads and homes damaged. Dangerous weather is expected to continue in the area through Wednesday.
