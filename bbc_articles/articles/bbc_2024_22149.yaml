title: 'Newspaper headlines: ''Huw Edwards'' ''shame'' and ''reputation in tatters''
  - BBC News'
date: '2024-09-17'
section: The Papers
url: http://www.bbc.co.uk/news/articles/c0kjjlxjzr5o
content: |-
  Tuesday's headlines are dominated by the sentencing of ex-BBC newsreader Huw Edwards.

  Several front pages express surprise and anger that former BBC presenter Huw Edwards was not sent to jail when he was sentenced on Monday for admitting charges of making indecent images of children. The Daily Telegraph says his suspended sentence has prompted accusations that sex crimes against children are being taken less seriously, external than offences involving social media comments. Campaigners also tell the paper that the sentence sends the wrong message to offenders, by suggesting they might not be sent to prison even if they have committed serious offences. The Daily Express says there is "fury" at the leniency of Edwards' sentence, while the Daily Mail's headline is "disgraced, reviled... but not a day in jail". The Sun says many people will ask how Edwards avoided prison given what it calls the "sickening" revelations in court, external.

  The Daily Mail, The Times and the Daily Telegraph all carry photographs of the prime minister's wife, Lady Victoria Starmer, attending London Fashion Week in a distinctive dress - navy spots on white - loaned to her by a designer. The Daily Mail says it is "another outfit she hasn't paid for" referring to what it calls "wardrobegate" - the row over clothes and other gifts given to the prime minister and his wife by the Labour donor Lord Alli. The Daily Telegraph says the entrepreneur also lent the couple a house at times during the election, external. On Monday, Sir Keir said all politicians received gifts and it was important to declare them. The Guardian reports that growing concerns about how the story of the donations was apparently leaked have prompted ministers to pressure the head of the civil service to bring forward his expected departure, external. Simon Case is thought to be preparing to step down in January, but the paper suggests No10 insiders have become so frustrated by his apparent failure to get a grip on leaks they would like to see him go sooner. A Cabinet Office spokesman denied that Mr Case was the source of any leaks or negative briefing.

  The business secretary says he wants to give staff a default right to flexible working

  Business Secretary Jonathan Reynolds tells the Times he wants to end what he calls the culture of "presenteeism" at work, external - where working at home is frowned upon. He says giving staff a default right to flexible working and allowing them to work from home and ignore work emails or calls in the evening will keep them motivated and resilient. The government is due to publish an employment rights bill next month. The Financial Times says that the European Union is preparing to provide up to €40bn (€33.7bn) in unilateral loans to Ukraine, regardless of whether the United States comes on board to help. The paper says Brussels is mulling the move because of concerns that Hungary will try to delay a previous G7 proposal to use frozen Russian assets to help Kyiv. And the Guardian and Daily Telegraph both report that London mayor Sadiq Khan is to press ahead with his plan to pedestrianise Oxford Street. The Times says the thoroughfare is currently overcrowded, polluted and a hotspot for pickpockets -but the the mayor wants to create a European-style boulevard with planters, benches and water features.

