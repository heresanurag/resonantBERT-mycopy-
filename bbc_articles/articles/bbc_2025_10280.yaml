  On Sunday, the head of a controversial US and Israeli-approved organisation planning to use private firms to deliver aid to Gaza resigned. In a statement by the Gaza Humanitarian Foundation (GHF), executive director Jake Wood said it had become apparent that plans to set up distribution hubs would not meet the "humanitarian principles" of independence and neutrality. The UN and various humanitarian organisations have said they will not co-operate with the GHF, accusing it of being discriminatory over who will receive food. Israel imposed a total blockade on Gaza on 2 March that lasted 11 weeks before it allowed limited aid to enter the territory in the face of warnings of famine and mounting international outrage. The Israeli military body responsible for humanitarian affairs in Gaza, Cogat, said 107 lorries carrying aid were allowed into Gaza on Sunday. The UN says much more aid - between 500 to 600 lorries a day - is needed. Meanwhile, 20 countries and organisations met in Madrid on Sunday to discuss ending the war in Gaza. Spanish Foreign Minister Jose Manuel Albares called for an arms embargo on Israel if it did not stop its attacks. Israel launched a military campaign in Gaza in response to Hamas's cross-border attack on 7 October 2023, in which about 1,200 people were killed and 251 others were taken hostage. Fifty-seven are still being held, about 20 of whom are assumed to be alive. At least 53,939 people, including at least 16,500 children, have been killed in Gaza since then, according to the territory's health ministry.
