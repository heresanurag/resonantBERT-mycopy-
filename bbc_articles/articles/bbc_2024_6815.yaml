title: Mouse filmed tidying up Powys man's shed every night - BBC News
date: '2024-03-07'
section: General
url: http://www.bbc.co.uk/news/uk-wales-67907306
content: |-
  Retired postman Rodney Holbrook never expected to capture a Ratatouille-style scene in his own shed.

  An avid wildlife photographer has captured his most unusual scene yet - a mouse tidying up his garden shed.

  Retired postman Rodney Holbrook said after noticing clothes pegs, corks, nuts and bolts being sorted out on his workbench, he set up up a night vision camera.

  The 75-year-old from Builth Wells, Powys, was surprised to find a mouse was his mystery cleaner.

  "I don't bother to tidy up now, I leave things out of the box and they put it back in its place by the morning," he said.
