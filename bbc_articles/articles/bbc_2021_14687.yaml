content: |-
  Politicians say it is clear "intervention is now required" but stop short of making an order to bosses.

  And now a final look at what's going on in Wales, where people have been urged to help keep the spread of Covid under control ahead of Christmas.

  Addressing the Senedd on Tuesday, Health Minister Eluned Morgan MS confirms there will be no changes to restrictions for another three weeks - but she warns Wales is "not out of the woods yet".

  Morgan says the signs elsewhere are troubling, especially the "new wave" of coronavirus "once again sweeping across Europe", which has led to many neighbouring countries tightening their restrictions.

  "None of us want to see restrictions back in place in Wales at Christmas, but neither do we want to see people falling ill with Covid at Christmas.

  "We need everyone's help and support to keep the virus under control as we start thinking ahead and planning for Christmas," the Labour politician adds.

  While there has been a fall in overall rates of infection in Wales, cases are still high at 500 per 100,000 people.

  There have been 250 deaths involving Covid-19 registered in Wales over the last three weeks.

  The Welsh government has said that extending its vaccine passport system to the hospitality sector remains an option if there is another spike in cases.

  Morgan says the government has received "mixed messages" from the sector in response to the possibility of a Covid Pass being introduced as a requirement in pubs and restaurants.

  She says: "Some are less than enthusiastic, but some are saying if this will keep us open over Christmas then so be it. We need to be very careful in listening to the voices of a minority."
