title: 'Kevin Spacey trial live: Actor denies using power to get people into bed -
  BBC News'
date: '2023-07-14'
section: UK
url: http://www.bbc.co.uk/news/live/uk-66187664
content: |-
  The Hollywood actor denies 12 sex offences against four complainants between 2001 and 2013.

  Kevin Spacey spent around three hours in the witness box today, his evidence tested by the prosecutor.

  The actor projected his voice at times when denying the allegations and told the court he “definitely” misread the signs from one of the four male complainants - but had consensual agreements with two others.

  Spacey, an Oscar winner, also denied drugging and performing a sex act on one of the complainants while he was asleep. Spacey said one of the allegations, that he grabbed a man’s crotch, was completely untrue.

  The prosecutor suggested he had used his position of power and fame. The actor said he didn’t have a “power wand” that he waved in front of people’s faces whenever he wanted someone to go to bed with him.

  He also admitted feeling “lonely” after becoming famous. Asked if he reached out to people sexually in order to ease the burden, he replied: “Welcome to life. Yes, yes I did”.

  Spacey denies the charges and the trial continues.
