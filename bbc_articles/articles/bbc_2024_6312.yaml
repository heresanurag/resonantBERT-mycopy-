title: Tesla electric car factory expansion plan sparks treetop protest near Berlin,
  Germany. - BBC News
date: '2024-03-04'
section: General
url: http://www.bbc.co.uk/news/world-europe-68464382
content: |-
  Environmentalists in Germany have occupied part of a forest earmarked for clearance.

  Environmentalists in Germany have occupied part of a forest expected to be cleared if an expansion of Tesla's electric car factory near Berlin goes ahead.

  Scores of activists from across the country have built tree houses in the protest camp. Some locals have also voiced their opposition to the carmaker's plans, joining protesters in the forest.
