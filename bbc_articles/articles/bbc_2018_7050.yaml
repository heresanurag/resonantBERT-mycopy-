content: |-
  Who should start for England in their World Cup opener against Tunisia? See who you have selected and pick your 11.

  Last updated on .From the section World Cup

  Did Dele Alli, Eric Dier, Raheem Sterling, Fabian Delph and Danny Rose make your England starting XI? Gary Cahill or Harry Maguire? Ashley Young or Danny Rose? Who plays in central midfield? What formation should England play? We asked you to pick your XI to face Tunisia on Monday (19:00 BST). Most of you went for 4-4-2 so we will show you your most popular team in that formation - and also the most popular line-up in the 3-5-2 that Gareth Southgate is likely to choose. Here is your 4-4-2 line-up There were three differences between this and the team Gareth Southgate picked - you wanted Danny Rose, Gary Cahill and Marcus Rashford instead of Ashley Young, Harry Maguire and Raheem Sterling You can still pick your team at any stage and share it on social media.
  • None Frank Lampard column as he picks his starting XI
  • None England will 'put hearts on the line'
