content: |-
  Or Levy, Ohad Ben Ami and Eli Sharabi are returning home after being released in Gaza on Saturday.

  Three more Israeli hostages have returned to Israel after being released by Hamas.

  Eli Sharabi, 52, Ohad Ben Ami, 56, and Or Levy, 34, were handed over to the Red-Cross in a highly-staged event in the Deir al-Balah area.

  In a statement, the Hostage Families Forum described the appearance of the men, who appeared thin and gaunt as "disturbing".

  They were all taken captive during the 7 October attacks and have been held in Gaza for 16 months.

  In exchange, Israel has freed 183 Palestinian prisoners held in Israeli jails.

  The releases come as part of a ceasefire deal between Israel and Hamas which came into force on 19 January.

