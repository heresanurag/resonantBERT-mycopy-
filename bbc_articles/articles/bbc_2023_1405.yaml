content: |-
  Rising British star Jack Draper will play top seed Rafael Nadal in the Australian Open first round, with Andy Murray also handed a tough draw.

  Last updated on .From the section Tennis

  Draper has climbed into the world's top 40 after being ranked outside the top 250 a year ago Coverage: Commentary every day from 07:00 GMT on Radio 5 Sports Extra 'Tennis Breakfast' live from Melbourne, with selected live text commentaries and match reports on the BBC Sport website and app. Rising British star Jack Draper will play top seed Rafael Nadal in the Australian Open first round, with Andy Murray also handed a difficult draw. Murray faces 13th seed Matteo Berrettini, while Novak Djokovic makes his Melbourne return against Spain's Roberto Carballes Baena. Emma Raducanu, who has been struggling with an ankle injury, has been drawn against Germany's Tamara Korpatsch. Raducanu, 20, could face seventh seed Coco Gauff in the second round. After learning of his first-round meeting with 2022 winner Nadal, Draper said it would be "amazing to play on court with him". "He's a great champion," the 21-year-old added. "Whatever happens, it will be a special occasion for me. "I'm still very young in my career so it's great to have these sort of experiences and exposure to playing someone like Rafa on a big court like that. "But I want to play really well and I want to compete hard and do the best I can." The Australian Open, which is the first Grand Slam tournament of the new season, takes place at Melbourne Park between 16 and 29 January. Andy Murray (left) was beaten by Matteo Berrettini (right) in the third round of last year's US Open Draper emerged as one of the rising stars on the ATP Tour last year and the left-hander has continued his rapid progress this season by reaching the Adelaide semi-finals. But his debut in the main draw at Melbourne Park could not have been much tougher. Nadal, 36, is the defending champion and, although he has struggled with injuries and lost his two matches so far this year, remains a daunting prospect for most opponents. However, the 22-time major champion would also probably not wish to start against a young talent who possesses the power and confidence of 40th-ranked Draper. Former world number one Murray will also be cursing his misfortune. The 35-year-old Scot impressed earlier on Thursday by beating Australian Alex de Minaur in an exhibition match at the Kooyang Classic, saying afterwards he hoped for a kind draw at Melbourne Park. Instead he was pitched against Italy's Berrettini, whose big serving troubles most opponents and who reached the semi-finals last year.
  • None Murray has 'no timeframe' on retirement What about the other British players? Emma Raducanu said this week she is trying "not to expect too much" but is hoping to be fit for the tournament Raducanu, who shocked the world by winning the 2021 US Open as a teenage qualifier, suffered what she described as more bad luck when she rolled an ankle in Auckland last week. It led to doubts over whether she would be fit to play in Melbourne, but she has been practising on court in the past few days with her movement seemingly improving with each session. Raducanu is ranked one place below Korspatch at 75th in the world, but the 27-year-old German has never won a main-draw match at a major. Cameron Norrie, Britain's highest ranked player and the 11th seed, starts against French wildcard Luca van Assche, while 25th seed Dan Evans faces Argentina's Facundo Bagnis. Another difficult challenge for a British player saw Kyle Edmund - a semi-finalist in 2018 but on the comeback trail after three knee surgeries - pitted against Italian 15th seed Jannik Sinner. Harriet Dart, the only other Briton in the women's draw, starts against Swiss 32nd seed Jil Teichmann. Nine-time champion Djokovic missed last year's event after being deported from Australia in a row over his vaccination status and returns on the back of winning the Adelaide title last week. The 35-year-old Serb, who is also bidding for a 22nd major title which would equal Nadal's men's record, has only lost one of his past 25 matches. Seeded fourth, Djokovic would not face Nadal until the final - but could face home favourite Nick Kyrgios in the quarter-finals. In the women's draw, world number one Iga Swiatek, who reached the semi-finals last year, starts against Germany's recent Wimbledon quarter-finalist Jule Niemeier. Another eye-catching draw sees Belarusian Victoria Azarenka and American Sofia Kenin - both former champions - meet in the first round.
