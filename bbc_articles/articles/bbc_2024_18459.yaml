title: Champions League highlights on the BBC starting from this season - BBC Sport
date: '2024-08-13'
section: Football
url: http://www.bbc.co.uk/sport/football/articles/cd73de95zywo
content: |-
  The BBC will show highlights of the Champions League this season - with a special highlights show after this Wednesday's Uefa Super Cup. For the next three years, from 22:00 on the Wednesday of Champions League matchweeks, there will be match-by-match highlights available on BBC iPlayer and the BBC Sport website and app, plus a highlights show on BBC One at 22:40. There will also be clips online and on social media. The new deal starts with a bonus show on Wednesday, 14 August for the Super Cup between Real Madrid and Atalanta. Highlights will be available on the BBC Sport website from 22:00 BST, with a BBC One show at 22:40.

  The Champions League will have more rounds of fixtures than before with 17 in total. That includes eight rounds of group games - running from 17 September until 29 January - and then an extra round before the last 16. The Champions League will expand from 32 to 36 teams from this season, with all teams contained in a single table. The top eight will go through to the last 16, while teams from ninth to 24th go into a new play-off round. That means the BBC will have highlights of the Premier League, Champions League and FA Cup this season. BBC Radio 5 Live will still have live commentary of selected Champions League games this season, while TNT Sport and Amazon Prime Video will show the games live in the UK. Amazon have first pick of the Tuesday games - 17 matches in total - with all the other matches shown on TNT.
