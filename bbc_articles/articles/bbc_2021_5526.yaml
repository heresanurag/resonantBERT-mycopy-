  Bartlett's rapid rise has seen him named on the Forbes 30 under 30 list, and win entrepreneur rising star at the Black British Business Awards.

  In 2019, he was also inducted into Manchester's Hall of Fame by the Mayor of Greater Manchester.

  On Dragons' Den he will take the place left by Tej Lalvani, who announced his departure from the show earlier this year.

  The new Dragon announced his arrival with a video on social media showing him growing scales and breathing fire.

  The show sees people pitch business ideas in exchange for expert advice and a stake in their fledgling independent companies.

