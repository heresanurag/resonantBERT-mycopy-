title: 'Kostyantynivka, Ukraine attack: There will be retribution, says Ukrainian
  PM - BBC News'
date: '2023-09-06'
section: Europe
url: http://www.bbc.co.uk/news/live/world-europe-66726576
content: |-
  The attack on civilians in eastern Ukraine is the worst of its kind for several months.

  This latest Russian attack on a civilian area, like so many before it, has no military value.

  What makes it stand out is the tragically high casualty toll. There have been numerous previous, well-documented missile, drone and artillery strikes by Russian forces on civilian "targets" in this war - so many that it is something of a miracle that even more people have not been killed.

  Some of these strikes, including those on Ukraine’s infrastructure, are deliberate – a failed attempt to demoralise Ukraine’s population and force them to call on their government to sue for peace on Moscow’s terms.

  Other strikes by Russian weapons on civilians have simply been a case of poor or lazy targeting, often by large and indiscriminate weapons like the S300 missile, originally designed to shoot down enemy aircraft, not for flattening apartment blocks in cities.

  A third category, an inevitable consequence of this high-intensity war, is when debris from missiles and drones shot down by Ukraine’s air defences fall on residential areas.

  In recent months Ukraine has begun "bringing the war home to Russia", aiming its own explosive drones towards targets inside Russia.

  Some of these attacks, like the one on Pskov airbase, have a genuine military value, while others on areas of Moscow appear to be done primarily for psychological purposes.

  Russian casualties from these attacks have been minimal compared to those suffered by Ukrainians.
