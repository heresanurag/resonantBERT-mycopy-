id: bbc_2024_26029
title: 'Newspaper headlines: ''Gun cop cleared'' and ''workplace reforms could cost
  £5bn'' - BBC News'
date: '2024-10-22'
section: The Papers
url: http://www.bbc.co.uk/news/articles/cp3931el05zo
content: |-
  The acquittal of the policeman who shot Chris Kaba and plans for new workers' rights lead the papers.

  French fashion brand Chanel is to become the sponsor of the annual Oxford and Cambridge boat race, the Financial Times reports

  The news that police officer Martyn Blake has been cleared of the murder of Chris Kaba, who was shot during a police stop in south London in 2022, leads many of the papers. At the time of the incident, Mr Kaba was unarmed. "Gun cop cleared" is the headline in the Daily Mirror, external. "Cleared in three hours", says the Sun, external, which highlights what it calls the "police's fury" at the murder trial. The Daily Telegraph, external says the Crown Prosecution Service is "under fire" from both Scotland Yard and MPs, who are asking why Martyn Blake was charged in the first place. The Times, external says there is "anger on all sides", with a police source telling the paper that, if prosecutors are "trying to make an example of someone", no one will want to work as a firearms officer. In its leader column, the Financial Times gives its verdict on the government's assessment that its overhaul of workers' rights will cost businesses up to £5bn a year. The paper insists that the government's tax plans "must avoid overburdening business and investors" and calls on the chancellor to "tread carefully". In the Daily Mail, external, shadow business secretary Kevin Hollinrake writes that what he calls the "draconian" bill is "a catastrophic own goal" and "an act of economic self-flagellation".

  The Guardian, external reports on a revelation by the archbishop of Canterbury that he's the descendant of a slave owner. The paper reports that Justin Welby recently discovered that his biological father - with whom he had no relationship - was the great-great-grandson of Sir James Fergusson, who owned enslaved people on a sugar plantation in Jamaica. Sir James was compensated by the British government when slavery was abolished in the 1830s. French fashion brand Chanel is "dipping its oar" into sport for the first time by sponsoring the annual boat race between Oxford and Cambridge universities, according to the Financial Times, external. The paper says the contest will be renamed "The Chanel J12 Boat Race" after one of the company's high-end watches. And the Mirror, external reports that a group of metal detectorists and a Somerset landowner have received a total of more than £4.3m after discovering a hoard of 1,000-year-old coins. It says the silver pennies - which have been bought for the nation - feature representations of England's last Saxon king, Harold the Second, and its first Norman king, William the Conqueror. According to the Times, the 2,500 coins could once have bought 500 sheep.

