title: Asma al-Assad has not filed for divorce from Bashar al-Assad, says Kremlin
  - BBC News
date: '2024-12-24'
section: World
url: http://www.bbc.co.uk/news/articles/ce8n6lk97r2o
content: |-
  Following reports in Turkish media, a Kremlin spokesman denies Asma al-Assad wants to divorce her husband and leave Russia.

  The British-born wife of deposed Syrian president Bashar al-Assad is not seeking a divorce, a Kremlin spokesman has said. Reports in Turkish media had suggested Asma al-Assad wanted to end her marriage and leave Russia, where she and her husband were granted asylum after a rebel coalition overthrew the former president's regime and took control of Damascus. Asked about the reports in a news conference call, Dmitry Peskov said, "No, they do not correspond to reality." He also denied reports that Assad had been confined to Moscow and that his property assets had been frozen.

  Russia was a staunch ally of the Assad regime and offered it military support during the civil war. But reports in Turkish media on Sunday suggested the Assads were living under severe restrictions in the Russian capital, and that the former Syrian first lady had filed for divorce and wanted to return to London. Mrs Assad is a dual Syrian-British national, but the UK foreign secretary has previously said she would not be allowed to return to Britain. Speaking in parliament earlier this month, David Lammy said: "I want it confirmed that she's a sanctioned individual and is not welcome here in the UK." He added he would do "everything I can in my power" to ensure no member of the Assad family "finds a place in the UK". In a statement attributed to Bashar al-Assad last week, he said he had never intended to flee Syria, but he was airlifted from a Russian military base at Moscow's request.
  • None Asma married Bashar al-Assad about five months after he became Syria's president in 2000
  • None She was born and raised in London to Syrian parents, and left the UK to marry Assad in Syria when she was 25
  • None The couple embarked on state visits across Europe, including a 2001 trip to France
  • None In 2002, they met Queen Elizabeth II in London. It was the first time a Syrian leader had been invited to Buckingham Palace
  • None They met then-Prime Minister Tony Blair at Downing St on the same trip
  • None Russia's Vladimir Putin and his then-wife Lyudmila welcomed the Assads to Moscow in 2005
  • None She was pictured less frequently after the start of the Syrian civil war, and was criticised for staying silent while her husband violently repressed pro-democracy campaigners. In 2018 she was photographed at a graduation ceremony while undergoing treatment for breast cancer
  • None She accompanied her husband as he took press questions during Syria's 2021 election, which critics dismissed as a farce
  • None The couple were guests at the opening of the 2023 Asian Games in Hangzhou, China Slide 1 of 9 , A smiling Bashar al-Assad in an black suit with no tie, sits next to a smiling Asma al-Assad in a cardigan , Asma married Bashar al-Assad about five months after he became Syria's president in 2000

  Asma al-Assad, 49, was born in the UK to Syrian parents in 1975 and grew up in Acton, west London. She moved to Syria in 2000 at the age of 25 and married her husband just months after he succeeded his father as president. Throughout her 24 years as Syria's first lady, Mrs Assad was a subject of curiosity in western media. A controversial 2011 Vogue profile called her "a rose in the desert" and described her as "the freshest and most magnetic of first ladies". The article has since been removed from the Vogue website. Just one month later, Mrs Assad was criticised for remaining silent while her husband violently repressed pro-democracy campaigners at the start of the Syrian civil war. The conflict went on to claim the lives of around half a million people, with her husband accused of using chemical weapons against civilians. In 2016, Mrs Assad told Russian state-backed television she had rejected a deal to offer her safe passage out of the war-torn nation in order to stand by her husband. She announced she was being treated for breast cancer in 2018 and said she had made a full recovery one year later. She was diagnosed with leukaemia and began treatment for the disease in May this year, the office of then-President Assad announced. A statement said she would "temporarily withdraw" from public engagements.
