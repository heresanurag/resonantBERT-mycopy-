title: Retracing Tunisia beach attacker's movements in VR simulation - BBC News
date: '2017-01-18'
section: General
url: http://www.bbc.co.uk/news/uk-38655606
content: |-
  Virtual reality images retracing the route of the Tunisian beach attacker was shown to the inquest.

  Virtual reality footage retracing the footsteps of the Tunisian beach attacker who killed 38 people in 2015, was shown to the inquest investigating their deaths.

  The inquest was also told a report from Jan 2015 for the UK government had raised concerns about security at the Riu Imperial Marhaba resort.
