title: 'Plymouth shooting: Police Chief describes what happened - BBC News'
date: '2021-08-13'
section: General
url: http://www.bbc.co.uk/news/uk-58198081
content: |-
  Devon and Cornwall Police Chief Constable Shaun Sawyer explains how reports of the shootings came in.

  Devon and Cornwall Police say a young girl was among the five people killed by a gunman in Plymouth on Thursday evening.

  Chief Constable Shaun Sawyer outlined what happened, calling it ''a truly shocking event".
