title: Ex-prisoner on protective instinct during London Bridge attack - BBC News
date: '2020-02-14'
section: General
url: http://www.bbc.co.uk/news/uk-51494751
content: |-
  In 2019, ex-prisoner Gareth Evans protected others from London Bridge attacker Usman Khan.

  In 2019, ex-prisoner Gareth Evans put his life at risk to protect others from London Bridge attacker Usman Khan.

  Evans's friend, Jack Merritt, died that day, along with Saskia Jones. Both were attending a conference on prisoner rehabilitation.

