title: Why do people ignore hurricane warnings? - BBC News
date: '2018-09-14'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-45502104
content: |-
  Despite all the warnings, not everyone in the path of a hurricane will evacuate. Professor Robert Meyer tells the BBC why.

  Despite all the warnings, not everyone in the path of a hurricane will evacuate. Professor Robert Meyer tells the BBC why people are hesitant to leave their homes.

  Meyer is the author of The Ostrich Paradox: Why we Underprepare for Disasters
