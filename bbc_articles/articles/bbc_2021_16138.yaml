title: Man, 19, charged over death of Amber Gibson - BBC News
date: '2021-12-01'
section: Glasgow & West Scotland
url: http://www.bbc.co.uk/news/uk-scotland-glasgow-west-59498465
content: |-
  The man is understood to be the brother of the teenager who was found dead in Hamilton on Sunday.

  Amber Gibson had been reported missing last Friday

  A 19-year-old man has been charged in connection with the death of a teenage girl in Hamilton, South Lanarkshire.

  Amber Gibson, also known as Niven, was reported missing from her home in the Hillhouse area on Friday.

  The 16-year-old's body was discovered at Cadzow Glen on Sunday morning.

  Connor Gibson, who is believed to be her brother, has been charged over her death. He is expected to appear at Hamilton Sheriff Court on Friday.

  Det Supt Raymond Brown, from Police Scotland's major investigation team, said the teenager's family were "absolutely devastated" by the death.

  The Cadzow Glen park remains sealed off with a large police presence in the area.

  The entrance to Cadzow Glen Park in Hamilton was sealed off by police

  Flowers have been laid at the entrance to the park. One tribute said: "To Amber, rest in peace. We will always think of you."

  The teenager was a pupil at Moore House Academy in Bathgate, West Lothian.

  A school spokesperson said: "Our children and staff are devastated at the news of this tragedy, and we are all supporting each other through this difficult time.

  "Our deepest sympathies extend to Amber's loved ones and to everyone who knew her."

  Police have asked anyone with any information about the death or anyone who believes they saw her between Friday and Sunday to contact them.
