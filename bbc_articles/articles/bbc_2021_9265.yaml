  "There's a lot to think through," he added. "I feel we've made progress over four years. A lot of things we've done right and we know this team isn't at its peak yet.

  "When you're in sport and you get to finals, those opportunities are so rare, so to be close, it's very hard the day after. You have given everything - the emotions are drained.

  "We will go again. It's too easy to say we can go to the World Cup in Qatar and win - that's a bit glib. We still have to qualify. You have to start the cycle again.

  "But to be able to work with these players every day has been fantastic, so when it comes to the end like it has now, it's hard."

  England had one of the youngest squads at Euro 2020, fuelling hope some of the country's young talents will develop further by the time the 2022 World Cup begins.

  Southgate disagreed when asked if England were "too nice" to win the biggest tournaments, insisting teams would not be able to reach the final if that were the case.

  "All of this team can go again but the young ones are still two to four years from peaking," he added.

  "I know as I reflect over the coming days there are a huge number of positives and these players will be far better for going through so many important wins and landmarks."

  'He's a workaholic - this is a chance for him to push on'

  Former Crystal Palace manager Alan Smith is a close family friend of Southgate's and was at Wembley with the England manager's parents and wife.

  "They're so supportive of Gareth," Smith told BBC Sport. "They've lived through all the hardships. Football is not always on an upward strip, it has lots of downs. I saw last night the character of the family watching the penalties. They didn't duck away from it, they watched it.

  "It was great seeing Gareth come in after and just saying 'hello mum and dad, hello darling' - because they've been away so long. It shows the merit of that family.

  "I think this is a chance now for him to push on. He is a workaholic and he will be back in on Wednesday thinking of the games that are coming up. He will sit down with Steve Holland, Chris Powell and his other staff to see if we can build on what's been achieved."
