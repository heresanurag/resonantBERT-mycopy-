content: |-
  Cardiff council says it will take action after waste collection footage was shared on social media.

  A bin man was seen on CCTV dropping open bin bags onto pavements and throwing bags onto the street.

  Video footage from Kingarth Street in Splott, Cardiff, was shared on social media by a resident on Wednesday.

  "Fly tipping is shocking in Splott and now I can see why," they said in a post on X, formerly known as Twitter.

  “The council has identified the individual shown in the footage and appropriate action will be taken,” a Cardiff council statement said.
