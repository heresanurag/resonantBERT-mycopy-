title: 'Sarm Heslop: Mum believes missing daughter is dead - BBC News'
date: '2023-03-08'
section: Hampshire & Isle of Wight
url: http://www.bbc.co.uk/news/uk-england-hampshire-64872250
content: |-
  Brenda Street says her daughter Sarm Heslop would have returned home by now if she was still alive.

  Sarm Heslop was 41 when she was reported missing by her boyfriend from his boat off St John on 8 March 2021

  The mother of a woman who vanished from her boyfriend's catamaran in the Caribbean two years ago says she believes her daughter is dead.

  Sarm Heslop was last seen as she left a bar on St John in the US Virgin Islands with Ryan Bane on 7 March 2021.

  He reported her missing from Siren Song, moored off the island, at 02:30 local time the following morning.

  Her mother, Brenda Street, said: "I feel I should grieve. I don't know how to. My heart's broken."

  The former flight attendant's possessions, including her bank cards and mobile phone, were on the boat where she had been staying and working with Mr Bane, a US citizen.

  Ms Street told the BBC: "Now after two years it's not possible she is missing. I don't believe she is still alive - I wish to be able to find her and bring her home.

  "Sarm would never put her family and friends through this torment, this gut wrenching heartache for this long.

  "I imagine her as a mermaid.... If she is in the ocean because she loved the ocean."

  This video can not be played To play this video you need to enable JavaScript in your browser. Brenda Street said her heart was 'broken' following her daughter's disappearance

  Mr Bane reported Ms Heslop missing to police at 02:30 local time on 8 March 2021 - the coastguard was only informed around noon the same day.

  His lawyer denied officers' requests to search the boat and he has not given an interview to police.

  The Virgin Islands Police Department (VIPD) have not been able to confirm if Ms Heslop was on board as reported.

  Ms Street said: "They just seem to try and push it under the carpet. I had an email from the VIPD a couple of weeks ago. That's the first time in 18 months. It said, 'Hope you're doing well, have you any further information?'

  "My relationship with the authorities is non-existent, they just ignore us. We sent a long list of questions - lawful and legal ones - but they just didn't reply to us."

  Currently her disappearance is being treated as a missing persons investigation by VIPD.

  Ms Heslop had been staying and working with Mr Bane, a US citizen, on the catamaran

  Ms Heslop's family also want the VIPD to admit mistakes were made in their investigation and for UK police to be brought in.

  Ms Street said: "They didn't go to the boat to check she was there. They didn't tell the coastguard. If she had fallen overboard, the coastguard would have been there immediately, not nine hours later.

  "The FBI and Hampshire police have offered help but they have been turned down."

  The BBC has contacted Mr Bane's lawyer for comment.

  In a statement VIPD said: "The Virgin Islands Police Department continues to send thoughts and prayers to the family, friends and colleagues of Sarm Helsop.

  "The VIPD Criminal Investigations Bureau continues to work this ongoing."

  Ms Heslop, who was 41 when she vanished, is known to have left Mr Bane's boat moored off St John - which was under a 22:00 local time Covid curfew - to visit a bar and have dinner the night before.

  Kate Owen, one of her closest friends, travelled to the Caribbean with Ms Heslop after they left their jobs as Flybe cabin crew. She spent time with the couple who started dating after meeting on dating app, Tinder.

  Kate Owen and Sarm Heslop travelled to the Caribbean together after they left their jobs as cabin crew

  The 43-year-old from Southsea said the last time she heard from her friend was a text while she was at the bar with Mr Bane the night before she vanished.

  She said: "They had just returned from a charter - it sounded like they were having a drink and just relaxing - there was nothing in that message that made me think she wasn't happy or in any danger.

  "You can't grieve this because we know she's not coming back but there are still so many questions about what happened and why is she not here."

  Her friends and family say continued requests to the island's police also remain unanswered and her belongings, including her phone and iPad, are also still being held by the force despite requests to return them.

  Ms Heslop's friends set up a Facebook Page to share information about her disappearance and continue to offer a reward of up to $10,000 (£8,328) for information.

  Det Ch Insp Matt Gillooly of Hampshire Constabulary said the force had "previously provided operational support in the UK to assist the US Virgin Islands Police Department investigation".

  He said: "Hampshire Constabulary cannot comment further on another force's investigation, but will always be available to assist the US Virgin Islands Police Department as and when requested."

