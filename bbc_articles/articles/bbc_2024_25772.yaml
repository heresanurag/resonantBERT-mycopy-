title: 'Pembrokeshire: Baby boy''s death prompts neglect arrests - BBC News'
date: '2024-10-20'
section: Wales
url: http://www.bbc.co.uk/news/articles/cx2yv2lm8ldo
content: |-
  A 19-year-old woman and 23-year-old man are arrested and bailed after the unexplained death of the boy.

  Police and the ambulance service were called regarding the welfare of an infant on Friday

  Two people have been arrested on suspicion of child neglect following the death of a baby boy. Police and paramedics were sent to a house in Clynderwen, Pembrokeshire, at about 13:45 BST on Friday. A four-month-old boy was pronounced dead at the scene. A 19-year-old woman and 23-year-old man have been arrested and released on bail pending further inquiries, Dyfed-Powys Police said.

  On Sunday, the force said the baby’s death was being treated as unexplained. "People living in the Clynderwen area will see an increased police presence over the coming days," it added.
