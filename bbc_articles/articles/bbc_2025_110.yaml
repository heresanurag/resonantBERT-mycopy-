  An off-duty police officer caught him using a mobile phone behind the wheel of a Rolls-Royce.

  Stormzy banned from driving after mobile phone use

  The 31-year-old rapper already had six points on his licence

  Stormzy has been banned from driving for nine months after an off-duty police officer caught him using a mobile phone behind the wheel of a Rolls-Royce in London. The 31-year-old rapper, whose real name is Michael Ebenazer Owuo Junior, pleaded guilty via a letter to driving the Rolls-Royce Wraith while using a device on Addison Road, west Kensington, in March last year. District judge Andrew Sweet said Stormzy's driving record was "not good" and criticised his "dangerous and irresponsible" actions. The court was told he already had six points on his licence for previous speeding offences. Stormzy's solicitor told Wimbledon Magistrates' Court his client accepted responsibility for his actions.

  The court heard the off-duty officer knocked on his tinted passenger window and said: "Get rid of your tints and get off your phone." Stormzy had previously denied using his mobile while driving but wrote to the court to change his plea.

  Previously, he also admitted driving a Lamborghini Urus that had front windows illegally tinted to only 4% light transmission, violating the 70% requirement. Prosecutor Alice Holloway said the vehicle's use was dangerous and put "vulnerable road users at risk". In that incident, Stormzy was stopped by officers on Coombe Lane, in Kingston upon Thames, at about 12:45 on 17 October 2023, having previously been warned about the windows. Peter Csemiczky, defending, said his client apologised and had removed the tints. The judge also fined Stormzy, who did not appear in court, £2,010 after six more points were added to his licence, which led to the immediate driving ban.
