content: |-
  Luis Suarez will make his 143rd and final appearance for Uruguay against Paraguay on Saturday.

  This video can not be played To play this video you need to enable JavaScript in your browser.

  Uruguay striker Luis Suarez has announced his retirement from international football. The 37-year-old fought back tears as he confirmed the World Cup qualifier against Paraguay on Saturday (00:30 BST) will be his last appearance for his country. The former Liverpool and Barcelona forward is Uruguay's all-time leading scorer with 69 goals in 142 appearances, having made his debut against Colombia in February 2007. "I’ve been thinking about this and analysing this. I believe this is the right time," said Suarez. "I want to be relaxed when I play my last game with the national team. I'll be just as excited to play as I was in 2007 when I played for my national team for the first time. "That 19-year old kid is now a veteran player, an older player - however you want to call it - with an incredible history with the national team, that will give his life for the team."
