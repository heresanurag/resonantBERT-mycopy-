title: 'Sebastian Kurz: Austrian leader resigns amid corruption inquiry - BBC News'
date: '2021-10-10'
section: Europe
url: http://www.bbc.co.uk/news/world-europe-58856796
content: |-
  Sebastian Kurz denies allegations he used government money for party political purposes.

  Sebastian Kurz said he would fight the charges against him

  Austria's Chancellor Sebastian Kurz has stepped down, after pressure triggered by a corruption scandal.

  He has proposed Foreign Minister Alexander Schallenberg as his replacement.

  Mr Kurz and nine others were placed under investigation after raids at a number of locations linked to his conservative People's Party (ÖVP).

  He denies claims he used government money to ensure positive coverage in a tabloid newspaper.

  The allegations this week took his coalition government to the brink of collapse after its junior partner, the Greens, said Mr Kurz was no longer fit to be chancellor.

  The Greens began talks with opposition parties, who were threatening to bring a vote of no confidence against the chancellor next week.

  Greens leader and Vice Chancellor Werner Kogler welcomed Mr Kurz's resignation and indicated he would be willing to work with Mr Schallenberg, saying they had a "very constructive" relationship.

  "What's required now is stability. To resolve the impasse I want to step aside to prevent chaos," Mr Kurz said as he announced his resignation.

  He said he would remain leader of his party, and continue to sit in parliament.

  "First and foremost, however, I will of course use the opportunity to disprove the allegations against me," he added.

  Although he is no longer chancellor, Mr Kurz will still be a major figure in Austrian politics.

  As leader of his party, he will be present at cabinet meetings. The head of the opposition Social Democrats says he will be pulling the strings as a shadow chancellor.

  Other observers point to his close relationship with Alexander Schallenberg, a career diplomat who worked with Mr Kurz when he first entered government as foreign minister.

  Some members of Mr Kurz's party are hoping his resignation will be temporary and he will be able to stage a comeback.

  Other Austrians say the two corruption investigations, and the collapse of his last coalition government with the far-right Freedom Party in 2019, mean it is time for Mr Kurz to leave politics altogether.

  Mr Kurz became leader of the ÖVP in May 2017 and led his party to victory in elections later that year - becoming, at the age of 31, one the world's youngest ever democratically elected heads of government.

  The corruption allegations relate to the period between 2016 and 2018, when finance ministry funds were suspected to have been used to manipulate opinion polls in favour of the ÖVP that were then published in a newspaper.

  While no newspaper was named by prosecutors, the tabloid daily Österreich put out a statement on Wednesday denying media reports it had taken taxpayers' money for advertising in exchange for publishing the favourable polls.

  Mr Kurz, nine other individuals and three organisations have been placed under investigation "on suspicion of breach of trust ... corruption ... and bribery ... partly with different levels of involvement", the Prosecutors' Office for Economic Affairs and Corruption said on Wednesday.

  Earlier in the day, prosecutors carried out raids at the chancellery, the finance ministry and homes and offices of senior aides to the chancellor.

  Mr Kurz has called the allegations against him "baseless".

  He also denies wrongdoing in a separate investigation he was placed under in May over allegations he had made false statements to a parliamentary commission.
