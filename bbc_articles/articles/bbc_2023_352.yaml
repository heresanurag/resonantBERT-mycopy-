title: 'Justin Roiland: Rick and Morty creator dropped by Hulu as well as Adult Swim
  - BBC News'
date: '2023-01-25'
section: Entertainment & Arts
url: http://www.bbc.co.uk/news/entertainment-arts-64396728
content: |-
  Justin Roiland, who is facing domestic abuse charges, has now lost work with Hulu and Adult Swim.

  Justin Roiland has pleaded not guilty to the charges

  US streaming site Hulu has followed TV channel Adult Swim in dropping Rick and Morty co-creator and voice actor Justin Roiland, over charges of domestic violence against an ex-girlfriend.

  Mr Roiland voiced the title characters in Adult Swim's Emmy-winning animated sitcom about a scientist and his grandson.

  He also worked on Solar Opposites and Hulu's other animated show, Koala Man.

  Mr Roiland denies the charges. A trial date has not yet been set.

  Hulu and 20th TV Animation said in a statement on Wednesday that it had "ended our association with Justin Roiland", though according to the PA news agency, both of its above shows are expected to continue without him.

  Rick and Morty won the Emmy for best animated programme in 2018 and 2020

  It comes after Adult Swim, part of the Cartoon Network, said earlier this week that Mr Roiland's best-known work, Rick and Morty, would go on without its co-creator and star for its seventh season, with his roles reportedly to be recast.

  A statement released on Tuesday said: "Adult Swim has ended its association with Justin Roiland.

  "Rick and Morty will continue. The talented and dedicated crew are hard at work on season seven."

