content: |-
  Craig Ballentine has landed in Dublin after being detained in the United Arab Emirates since October.

  Man detained in Dubai over Google review home for Christmas

  This video can not be played To play this video you need to enable JavaScript in your browser. Craig Ballentine makes an emotional return to Ireland after being detained in Dubai

  A holidaymaker from Northern Ireland who was detained in the United Arab Emirates (UAE) after posting a negative Google review about his former employer has said returning home is a "Christmas miracle". Craig Ballentine, from Cookstown, County Tyrone, was arrested in Abu Dhabi airport in October because of his critical comments. Under the UAE's strict cybercrime laws, he was accused of slander and faced potential jail time. The 33-year-old arrived in Dublin on Thursday morning after his travel ban had been lifted and he told BBC News NI he was "happy to be on Irish grass now".

  Craig was greeted by his friend, Sean, at the airport

  "It has been very overwhelming, because it has been quite confusing," he said. "One minute everything changes. "It has been a Christmas miracle. "The happiness kicked in when I just arrived at Dublin Airport, when I saw Dublin from the sky, that was it. "I will have an extra big fry in the next hour or two and then it will be mainly focusing on seeing friends and family. "On Christmas Eve, we are going to do the 12 pubs of Christmas - there are a few friends from Liverpool coming over, we do it every year - and I texted them this morning, saying, 'I'm coming'."

  There were interventions from a number of politicians to highlight Mr Ballentine's case, including Northern Ireland First Minister Michelle O'Neill, former UUP leader Sir Reg Empey and Mid Ulster councillor Trevor Wilson. Upon Mr Ballentine's return, O'Neill said: "I am delighted to hear the news that Craig has arrived back in Ireland. It has been a difficult few months for him and his family who were concerned for his safety. "My office was happy to assist in any way we could throughout this ordeal. I hope that Craig can now enjoy time at home in the company of his family and friends who have supported him throughout this difficult situation." "It was a very stressful time for him and his family and hopefully he can now enjoy the Christmas festivities with his family and friends," the UUP councillor said. Mr Ballentine had previously told BBC News NI that all he wanted was to get home for Christmas to his family. He said the last few weeks have been tough on them. Mr Ballentine has already paid a fine but said he may have to return to Dubai at the end of January for a further court hearing. He said that with regard to his case, he would have to "play it by ear". "On Christmas Eve, we will know a bit of a verdict of the court judgement," he added. "Have to wait for another 30 days and then they might appeal again, so it could be February, March, April, or else it could just be lifted just like that, finished."

  In 2023, Mr Ballentine got a job in a dog grooming salon in Dubai. After working there for almost six months, he needed time off due to illness and so he gave his employer a doctor's certificate as proof of his condition. But when he did not show up for work, he was registered as "absconded" with the UAE authorities, which meant he could not leave the country. Mr Ballentine later managed to get that travel ban lifted and went home to Northern Ireland, but doing so took two months and cost him thousands of pounds.

  Mr Ballentine had returned to the UAE for a short holiday

  While he was back in Northern Ireland, he wrote an online review of the dog grooming salon, outlining the problems his former boss had allegedly caused him. He told BBC News NI his Google post "explained the ordeal that I went through". In late October, Mr Ballentine returned to the UAE for a short holiday, at which point he was immediately arrested for the alleged slander. He was transferred from Abu Dhabi to Dubai where he had to await the outcome of the case.
