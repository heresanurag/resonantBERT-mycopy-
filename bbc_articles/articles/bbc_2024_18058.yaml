id: bbc_2024_18058
title: Video shows men armed with blades fighting in street in Southend - BBC News
date: '2024-08-01'
section: General
url: http://www.bbc.co.uk/news/videos/cjm9kn82dkzo
content: |-
  The footage shows at least three men brandishing what appears to be machetes.

  Video showed a group of people appearing to be armed with weapons fighting in the street in Southend-on-Sea.

  The footage - posted on social media on Tuesday evening - showed at least three men brandishing what appeared to be machetes before they and others ran from the scene.

  Essex Police said it had put a Section 60 dispersal order in place after "incidents of disorder" were reported on the city's seafront and high street.

  Six people were arrested and weapons seized, the force added.
