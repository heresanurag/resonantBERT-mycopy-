title: 'Harshita Brella: Pankaj Lamba was previously arrested, IOPC says - BBC News'
date: '2024-11-27'
section: Northamptonshire
url: http://www.bbc.co.uk/news/articles/cwyg7g94wd9o
content: |-
  The IOPC is examining how Northamptonshire Police responded to concerns raised by Ms Brella in August.

  Harshita Brella was the subject of a Domestic Violence Protection Order in the months before her death

  The husband of Harshita Brella was arrested by police in September after she made a report of domestic abuse, a police watchdog has confirmed. An international manhunt has been launched for Pankaj Lamba after Ms Brella's body was found in the boot of a car in Ilford, east London, on 14 November. Police believe Ms Brella, 24, was fatally strangled in Corby, Northamptonshire, on 10 November and have named Mr Lamba, 23, as the prime suspect in the investigation. The Independent Office for Police Conduct (IOPC) said it was investigating Northamptonshire Police after Ms Brella made a report of domestic abuse in August.

  Mr Lamba was arrested on 3 September and released with bail conditions and a domestic violence protection notice, the IOPC added.

  An international manhunt is under way for Pankaj Lamba

  IOPC regional director Derrick Campbell said its investigation followed a self-referral from the police force. "We will be examining the police response to Ms Brella's report of domestic abuse made at the end of August this year," he said. "We will look into further contact Northamptonshire Police had with Ms Brella concerning the case." Mr Campbell said the investigation would consider the actions and decisions taken by Northamptonshire Police in relation to its dealings with Ms Brella. He added: "We will be contacting Ms Brella's family to explain our role and express our sincere condolences."

  A CCTV image released by police showed Ms Brella and Mr Lamba at Corby's boating lake on 10 November

  Detectives investigating the killing released a CCTV image of Ms Brella and Mr Lamba on Friday. A photo showed the pair walking together near the Corby's boating lake on Sunday, 10 November. Police appealed for anyone who was in the Cottingham Road area that evening to contact them.

