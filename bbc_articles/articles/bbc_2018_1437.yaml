id: bbc_2018_1437
title: Russians conducted 'information warfare' on US election - BBC News
date: '2018-02-17'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-43092569
content: |-
  US Deputy Attorney General says Russians began interfering with the US election process as early as 2014.

  US Deputy Attorney General Rod Rosenstein said that Russians used "information warfare" against the US election process to spread distrust.
