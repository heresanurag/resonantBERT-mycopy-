title: How bumble bees trick plants into flowering early - BBC News
date: '2020-05-22'
section: General
url: http://www.bbc.co.uk/news/science-environment-52759704
content: |-
  It's the first time scientists have observed this behaviour, which bees do when pollen is scarce.

  Scientists have observed for the first time bumble bees tricking plants into flowering early.

  The practice is used by the bees when pollen is scarce.
