title: '''Free speech'' vow after abortion clinic safe zone breach - BBC News'
date: '2025-04-05'
section: Dorset
url: http://www.bbc.co.uk/news/articles/cdxnz7171yno
content: |-
  Livia Tossici-Bolt was convicted of breaching a Public Spaces Protection Order at an abortion clinic.

  Livia Tossici-Bolt was found guilty of two charges of breaching the Public Spaces Protection Order on two days in March 2023

  A woman convicted of breaching an abortion clinic protection zone has said she will continue her "fight for free speech". Livia Tossici-Bolt, 64, was given a two-year conditional discharge and ordered to pay costs of £20,000 for two charges of breaking a Public Spaces Protection Order (PSPO). The anti-abortion campaigner held a sign reading "Here to talk, if you want" outside a clinic in Bournemouth on two days in March 2023. Her legal representative told the BBC Tossici-Bolt had been offering a "consensual conversation" and would explore "all legal options" following the ruling.

  The case has been highlighted by US Vice-President JD Vance and the Bureau of Democracy, Human Rights, and Labour - a bureau within the US State Department. The bureau said it was "disappointed" by the ruling, in a post on X. "Freedom of expression must be protected for all," it added. Speaking on Radio 4's Today programme, Tossici-Bolt said: "It was nothing to do with protesting, harassing or intimidating. It was inviting a conversation." She said her actions were "certainly not to make any woman unhappy or distressed". "Anyone could have approached me - including women attending the clinic. It was up to them," said Tossici-Bolt. "I was there to listen to them. Not that I was there to convince them or change minds or not." Asked what she would do next, she said: "I was given a conditional discharge. I will continue my fight for free speech." At Poole Magistrates' Court on Friday, District Judge Orla Austin said Tossici-Bolt's presence "could have a detrimental effect" on the women attending the clinic. The judge continued: "It's important to note this case is not about the rights and wrongs about abortion but about whether the defendant was in breach of the PSPO."

  The prosecution had been brought by Bournemouth, Christchurch and Poole Council for breach of a PSPO under the Anti-social Behaviour, Crime and Policing Act 2014. The zone at Ophir Road came into force in October 2022, running from 07:00 to 19:00, Monday to Friday. Tossici-Bolt's legal counsel, Jeremiah Igunnubole, from the Alliance Defending Freedom, said they would "explore all legal options". He said the conviction and costs imposed were "unprecedented". "Never before have we seen entirely peaceful conduct being criminalised for nothing other than offering a consensual conversation," he said. Speaking earlier this week, former supreme court justice Lord Sumption said: "Women having an abortion - it's a very agonising decision and most people feel they are entitled to protection. "Anti-abortion campaigners can shout their views from the rooftops, broadcast or write in the press. "Freedom of speech is in no way inhibited, except they cannot stand outside abortion clinics so as to harass the women trying to get in."

