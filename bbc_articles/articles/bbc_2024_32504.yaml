content: |-
  The man, in his 40s, was driving on the A59 when he was struck, Lancashire Police says.

  Man dies as tree falls on van in storm

  A man died after the tree fell across the A59 in Longton

  A driver has died after a tree fell onto his van during Storm Darragh. The man, in his 40s, was travelling in a Citroen van on the A59 in Longton, near Lancashire Police's headquarters, at about 09:00 GMT when he was injured. He died at the scene and his next of kin have been informed. Det Sgt Matt Davidson, from Lancashire Police, said: "Very sadly this incident has resulted in the death of a man and our thoughts are with his loved ones at this time.

  "An investigation is ongoing, and I would appeal to anyone who saw what happened or has any dashcam or mobile phone footage to please get in touch."

  Commuters have been urged to take care after many trees have fallen across the country

  Millions of people in parts of Wales and south-west England have been urged to stay at home, with Storm Darragh bringing gusts of more than 90 mph. Travel has been disrupted and some football matches, including the Merseyside derby between Liverpool and Everton, have been cancelled. Commuters have been warned to take care after several trees fell around the country due to the gusts.
