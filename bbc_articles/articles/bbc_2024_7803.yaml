title: 'Watch: Huge fires blaze along Miami highway - BBC News'
date: '2024-04-16'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-68824337
content: |-
  Stubborn brush fires in Miami, Florida, have been burning for several days.

  Heavy smoke and flames lick the sides of a Miami highway with brush fires burning there for several days now. Miami-Dade Fire Rescue (MDFR) say roads have been closed and traffic rerouted.

  There have been no casualties or injuries reported as the fires raged over more than 150 acres of land.

  Wildfires in the state of Florida aren't unusual, says our weather team, but do tend to be smaller and more localised than those in other parts of the US. Temperatures are currently well above average for this time of year in Florida with dry conditions.

  It is also fairly breezy making conditions conducive to wildfires. Weather doesn't start fires but it can help them burn and spread.
