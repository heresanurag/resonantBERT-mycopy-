title: Moscow attack survivor recalls moment concert gunmen opened fire - BBC News
date: '2024-03-26'
section: General
url: http://www.bbc.co.uk/news/world-europe-68657611
content: |-
  Pavel and his wife were attending a concert in Moscow when gunmen opened fire, killing dozens of people.

  Pavel Shampanov and his wife were attending a concert in Moscow when four gunmen opened fire, killing dozens of people.

  The Islamic State group (IS) has said it carried out the attack at the Crocus City Hall on Friday.

  All four gunmen were arrested.

  Mr Shampanov explains how the evening unfolded and how he managed to escape.
