  However, Green MSP for Mid Scotland and Fife Mark Ruskell was one of those opposing the project. He said: "I am proud the local community has stood up and protected Park of Keir. "At the heart of this project was an exclusive luxury housing development that would have been damaging to the local landscape and would have eroded ancient woodlands and crucial greenbelt land." The Scottish government approved planning permission in principle for the facility in December 2021, following an appeal by the developers. Stirling Council had rejected plans for the development, which also included housing and a hotel. However, Scottish ministers overruled this decision, saying the benefits of the plan would outweigh the loss of green belt land.
