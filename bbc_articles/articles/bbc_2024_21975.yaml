  Solheim Cup: Lilia Vu seals United States victory over Europe in Virginia

  Lilia Vu produces a wonderful final-hole birdie to tie her match with Albane Valenzuela and win the half point that seals the United States a dramatic Solheim Cup victory over Europe in Virginia.

