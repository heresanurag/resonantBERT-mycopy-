title: 'Coronavirus updates as they happened: US markets down amid fears of second
  virus surge - BBC News'
date: '2020-06-11'
section: World
url: http://www.bbc.co.uk/news/live/world-53003283
content: |-
  US stock markets have seen steep falls, while several states report rising Covid-19 cases.

  With the easing of Italy's lockdown, staff at the Museum of the Treasure of San Gennaro in Naples are disinfecting exhibits ahead of its reopening on Saturday Image caption: With the easing of Italy's lockdown, staff at the Museum of the Treasure of San Gennaro in Naples are disinfecting exhibits ahead of its reopening on Saturday

  All Thai train services have resumed after a three-month hiatus because of the pandemic. These passengers in the province of Narathiwat were observing social distancing measures Image caption: All Thai train services have resumed after a three-month hiatus because of the pandemic. These passengers in the province of Narathiwat were observing social distancing measures

  Nepalese police used a water cannon on protesters who gathered near the prime minister's residence in Kathmandu. The demonstrators are demanding a stronger response to the pandemic Image caption: Nepalese police used a water cannon on protesters who gathered near the prime minister's residence in Kathmandu. The demonstrators are demanding a stronger response to the pandemic

  Workers at a Nissan car plant in Barcelona staged another protest after the company announced it was closing the factory with the loss of about 2,800 jobs because of the pandemic Image caption: Workers at a Nissan car plant in Barcelona staged another protest after the company announced it was closing the factory with the loss of about 2,800 jobs because of the pandemic

  With growing unemployment across the US, these volunteers loaded food aid for distribution to hard-hit areas of Boston, Massachusetts Image caption: With growing unemployment across the US, these volunteers loaded food aid for distribution to hard-hit areas of Boston, Massachusetts

  A makeshift memorial to health workers who have died from Covid-19 has been set up in St Petersburg, Russia. The Kremlin has denied under-reporting the numbers of deaths from the virus Image caption: A makeshift memorial to health workers who have died from Covid-19 has been set up in St Petersburg, Russia. The Kremlin has denied under-reporting the numbers of deaths from the virus
