title: Donald Trump and JD Vance potential targets of China cyber attack - BBC News
date: '2024-10-26'
section: World
url: http://www.bbc.co.uk/news/articles/cwyg9w7g6zlo
content: |-
  It is reported the Republican candidates' phones may have been among the targets of a broader cyber attack.

  Trump and Vance possible targets of China-backed cyber attack

  US authorities say cybercriminals linked to China may have attempted to tap into the phones or networks used by former President Donald Trump and his running mate, Senator JD Vance, a number of sources familiar with the matter confirmed to the BBC's US news partner, CBS News. The sources said the Trump-Vance campaign had been alerted to the fact that phones used by Trump and Vance may have been among the targets of a broader cyber attack. People affiliated with the Harris-Walz campaign were also targeted, a person familiar told BBC News. It is unclear how much information, if any, may have been compromised.

  The Department of Justice and the FBI declined to comment on whether candidates were targeted. A joint statement, external from the FBI and the Cybersecurity and Infrastructure Security Agency (CISA) said the US government was investigating the "unauthorised access to commercial telecommunications infrastructure by actors affiliated with the People's Republic of China". They said after the "malicious activity" was identified, the agencies "immediately notified affected companies, rendered technical assistance, and rapidly shared information to assist other potential victims", adding that the investigation was ongoing. "Agencies across the US government are collaborating to aggressively mitigate this threat and are coordinating with our industry partners to strengthen cyber defences across the commercial communications sector," they added. Law enforcement is currently treating the hack as an act of espionage, not as an attempt at campaign influence, one source told CBS. Earlier this month it emerged that US telecommunications companies had been targeted in a hack. One of the companies affected is said to be Verizon, through which the hackers are thought to have potentially targeted Trump and Vance's data, according to the New York Times, who first reported the story. In a statement, Verizon spokesman Rich Young said the company was “aware that a highly sophisticated nation-state actor has reportedly targeted several US telecommunications providers to gather intelligence.” He said Verizon is assisting law enforcement agencies in the investigation and working to address any further problems. The Trump campaign has already been the target of one hack earlier this year. Three Iranians nationals linked to the country's Islamic Revolutionary Guard Corps were charged in September with deliberately attempting to undermine a presidential campaign. US government agencies and officials have long warned of the threat of foreign interference in the US, including US elections. “Our adversaries do look at American elections as points to try to influence, to try to undermine confidence in our democracy, to try to put their thumb on the scale,” National Security Adviser Jake Sullivan said in the summer. “We are clear eyed about that. And we are doing a lot to push back against it". In January, the issue was discussed in Congress, with FBI Director Christopher Wray warning that Chinese hackers were preparing to "wreak havoc and cause real-world harm" to the US.
