  England captain returns to his Walthamstow roots for unveiling ceremony of life-size statue kept hidden for four years.

  Harry Kane 'humbled' by statue unveiled near first club

  Harry Kane says the statue has been "humbling"

  England captain Harry Kane says he is "really impressed" with a life-size statue of himself that has been unveiled near his childhood football club in north London. The statue was paid for by Waltham Forest Council at a cost of £7,200 but remained in storage for four years while a location for its installation was found. It was unveiled by two young players from Ridgeway Rovers FC, where Kane played as a boy, at the Peter May Sports Centre in Walthamstow on Monday. "It's quite humbling to see it here now knowing there's going to be loads of kids walking past and hopefully being inspired," the Chingford-raised player said.

  Ridgeway Rovers players unveil Harry Kane's statue at the Peter May Sports Centre

  The funding for the statue was approved by the Conservative councillors for Chingford's Endlebury ward. Councillors Emma Best and Roy Berg had originally planned to install the statue on a platform at Chingford Overground station, but the proposal was rejected by Transport for London following a risk assessment.

  Harry Kane playing for Ridgeway Rovers FC where his career began at the age of five

  One player told BBC Newsround: "Harry Kane is very special because obviously he played here when he was younger, which is incredible for all the people here." Another added: "I think Harry Kane should be celebrated. He's a massive role model." Kane, who was born in Walthamstow, joined Ridgeway Rovers as a five-year-old. The now 31-year-old striker would go on to play for Tottenham Hotspur and his current team, Bayern Munich.

  The Bayern Munich striker returned to his Walthamstow where he was born for the unveiling

  The statue sits in front of a new mural that depicts highlights from the England captain's career, including his debut goal against Lithuania in 2015. "I think it's a really incredible story of my journey and my life and the hard work," Kane said. "It's really cool the kids have somewhere to be inspired by."
