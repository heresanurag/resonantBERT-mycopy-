title: Southern Water's hosepipe ban warning after dry spring - BBC News
date: '2025-06-17'
section: Hampshire & Isle of Wight
url: http://www.bbc.co.uk/news/articles/cql03rpkyl6o
content: |-
  Southern Water has advised customers to think about having shorter showers to save water.

  The River Itchen has been affected by the dry spells, Southern Water said

  A water firm has advised its customers to have shorter showers and let their lawns go brown after England experienced the driest spring since 1893. Southern Water serves about 2.6 million customers across the south of England, including in Hampshire and the Isle of Wight. It said a prolonged dry spell has impacted the local chalk streams and the Test and Itchen rivers, which supply most of the south's water. The company warned if river levels kept dropping, it might need to bring in hosepipe bans or stop using such streams altogether.

  Earlier this month the Environment Agency issued a "medium" risk of summer drought. It also convened a national drought group to discuss the latest outlook and to hear from water companies about steps they are taking to prepare for the summer. Southern Water has given four water saving tips for summer, which include customers using a watering can instead of a hosepipe, letting grass go brown, having shorter showers and reusing water from paddling pools, if people use them.

