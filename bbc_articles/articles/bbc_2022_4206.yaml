title: 'Ukraine conflict: Kyiv TV tower struck by Russian missile - BBC News'
date: '2022-03-02'
section: General
url: http://www.bbc.co.uk/news/world-europe-60579847
content: |-
  Authorities say five people were killed in the Russian attack on the civilian-run tower in the capital.

  The moment an airstrike hit Kyiv's main television tower has been published on the Telegram channel of Kyiv's Mayor Vitaly Klitschko.

  Emergency services say five people were killed in the Russian attack.

  It's unclear whether the tower itself was directly hit - it remains standing - but the blasts took some broadcasts off air.

  Warning - this video contains distressing footage. It has been verified by the BBC but the source is unknown.
