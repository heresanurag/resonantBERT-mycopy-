content: |-
  Andy Murray earns a much-needed win over an ailing Matteo Berrettini in Miami, with fellow Briton Jack Draper also through.

  This video can not be played To play this video you need to enable JavaScript in your browser.

  Britain's Andy Murray earned a much-needed win by beating former Wimbledon runner-up Matteo Berrettini - who almost fainted in the second set - in a tricky Miami Open first-round draw. Murray, 36, fought back to win 4-6 6-3 6-4 as Italy's Berrettini indicated he was struggling with dizziness. Murray, who plans to retire later this year, was able to earn only his fourth win in 11 matches this season. He wrote "life in the old dog yet" on a camera lens after sealing victory. British number four Murray, ranked 62nd in the world, will next face Argentine 29th seed Tomas Martin Etcheverry, who beat him in a subdued Australian Open first-round exit earlier this year. Fellow Briton Jack Draper, 22, is also through to the second round in Miami after a confident display against Japan's Taro Daniel. The British number two won 6-3 6-2 to set up a meeting with Chilean 22nd seed Nicolas Jarry.

  Murray's scrawled message on the television camera - which is customary for the winner - indicated his satisfaction at extending what is expected to be the two-time champion's final appearance in Miami. The former world number one, who turns 37 in May, recently said he does not "plan on playing much past the summer" when pressed about his retirement plans. Murray has been candid about his struggles in recent months and looked to be heading to another defeat against former world number six Berrettini, who was playing his first ATP Tour match in almost seven months. Berrettini, whose own career has been stalled by a succession of long-term injuries, demonstrated he has not lost his strong service game by landing 78% of his typically-hefty first serves in an impressive first set. Three-time major champion Murray, rarely one to roll over, improved considerably in the second set and turned the match around. More proactive in the points and making fewer unforced errors, the Scot was rewarded by taking his third break point of the game for a 4-2 lead. Then came a dramatic and concerning moment when Berrettini, serving to stay in the set at 5-2, wobbled as he was preparing to play. The 27-year-old needed treatment from a doctor for dizziness before being able to continue, but also took a long break off the court before the deciding set. With Berrettini still looking uncomfortable, Murray maintained his intensity to break at the fourth time of asking in a 12-minute opening game and it was enough to secure a much-needed success. His celebration was respectfully reserved given the circumstances and he made sure his first act was to ask Berrettini how he felt when they shook hands at the net.

  Jack Draper reached a career-high ranking of 37th in the world earlier this month

  While Murray is coming towards the end of his career, Draper is still only just getting going - and the signs are increasingly encouraging. One of his main targets this year is taking over the British number one ranking which Murray held for so many years, and he is hot on the heels of current incumbent Cameron Norrie. Draper's talent - characterised by a powerful serve and explosive forehand - has never been in doubt, but there have been constant concerns about his physical and mental durability. The Miami Open is known for its difficult and humid conditions, but Draper - who headed straight to Florida to acclimatise following his early exit at Indian Wells in California - showed no problems in an assured performance against Daniel. Draper used his biggest weapons to great effect, hitting 10 aces as he won 97% of his first-serve points and dropping only eight points on serve. He also broke Daniel three times and was able to keep the points short in a victory which took little over an hour. Now Draper turns his attention to Jarry, who received a first-round bye, as he looks to go on a run at the ATP Masters 1000 event which would help him surpass his previous career-best ranking of 37th in the world.
