content: |-
  It's a bitter blow for Ukraine and Europe - but not the first time the US has withheld aid, writes BBC's Jonathan Beale.

  What pause in US military aid could mean for Ukraine

  President Donald Trump's decision to pause all US aid to Ukraine is a bitter blow – not just for Kyiv but also European allies who have been lobbying the US administration to continue its support. This is not the first time that the US has withheld military aid. Republicans in Congress blocked then-President Joe Biden's largest tranche of military assistance for Ukraine in the summer of 2023. Then, Ukraine just about managed to eke out its existing stocks of ammunition with the help of Europe. Congress finally approved the £60bn aid package in the spring of 2024. It was just in time - Ukraine was struggling to fend off a renewed Russian offensive in Kharkiv. The arrival of the delayed US weapons helped turn the tide. As in 2024, it may be months before the effects of cutting off US aid are felt – at least in terms of ammunition and hardware. European nations have slowly ramped up their production of artillery shells. Overall Europe now provides Ukraine with 60 percent of its aid – more than the US. However, US military support is still vital to Ukraine. One Western official recently described it as "the cream" in terms of weapons.

  This video can not be played To play this video you need to enable JavaScript in your browser. Could Europe fill the gap if the US cuts support for Ukraine?

  Ukraine's ability to protect its people and cities has heavily relied on sophisticated US air defence systems – such as Patriot batteries and NASAMS – jointly developed with Norway. The US has given Ukraine the ability to carry out long range strikes – with HIMARS and ATACM missiles. The US has limited their use inside Russia, but they have still been vital to hit high value targets inside occupied territories. It is not just quality, but quantity too. As the world's most powerful military, it has been able to send hundreds of surplus Humvees and armoured vehicles - numbers that smaller European armies could never match. The absence of some of this aid may take time to filter down to the frontline. But there could be a more worrying immediate impact, not least in terms of intelligence sharing. No nation can match the US in terms of space-based surveillance, intelligence gathering and communications. And it is not just provided by the US military, but commercial companies too.

  Take Elon Musk's Starlink satellite communication network. Every Ukrainian position I have visited on the frontline has a Starlink dish. They are used to relay the latest information on the battlefield. They have been essential to co-ordinate artillery and drone strikes. In the past, the Pentagon has admitted that it has been funding this lifeline. Given that Elon Musk is a key figure in the US administration, it seems highly unlikely that he will now be willing to foot the bill. He too is a harsh critic of Ukrainian President Volodymyr Zelensky. Will the US prevent European countries from sending their US-made equipment to Ukraine? When Europe wanted to provide US-manufactured F-16 jets to Ukraine, it first had to receive the approval of Washington. And then what about the maintenance of US-supplied equipment? The US has also been training Ukrainian forces and then helping them maintain US-supplied equipment. Biden lifted restrictions on US contractors working in Ukraine towards the end of his term. F-16 jets in particular need engineers and spares to keep on running. Trump's decision to pause aid may, to many in Ukraine and beyond, seem petulant. But there is also clearly a political aim to force them to the negotiating table sooner. The hope among European allies is that it will just be a pause. Without US support, Ukraine will find it an even harsher struggle for survival.
