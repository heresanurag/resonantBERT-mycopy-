title: Scotland triumph in World Schools Debating Championships - BBC News
date: '2024-07-27'
section: Scotland
url: http://www.bbc.co.uk/news/articles/crgm0e8kzj2o
content: |-
  The team defeated Bulgaria to lift the trophy in Belgrade on the motion: "This house regrets the glorification of champions".

  Team Scotland celebrates after defeating Bulgaria in the final

  Scotland have been crowned winner of the World Schools Debating Championships for a fifth time after victory at the competition in Serbia. Team Scotland squad, drawn from four schools, overcame New Zealand, Pakistan, England and Qatar to meet Bulgaria in the final. Their victory in Belgrade brings Scotland level with England as the second most successful team in tournament history - behind nine-time champions Australia. First Minister John Swinney offered his "warmest congratulations" to the pupils.

  The team consisted of Logan Moss from Dollar Academy, Miya Turner from Portobello High School, Lena Zielinksa from Broxburn Academy and Sophie Hannigan and Callum Hendry from St Columba’s in Kilmacolm. The competition, which was launched in 1988, was won previously by Scotland in 1990, 1999, 2007 and 2012.

  Callum, Sophie and Logan reflect on their win next to the trophy

  Scotland recorded a resounding 7-2 victory in the grand final on the motion: "This house regrets the glorification of champions". Callum, who trained for five hours a week while juggling his school work, told BBC Scotland News that he could not believe he was a world champion. He said: "It has still not really set in." Sophie said the team had to negotiate eight rounds before the knock out stages, a schedule that featured "ups and downs". But she added: "As the competition progressed we got stronger and stronger and by the time of the semi-finals and the final I did feel that we were very strong." And, reflecting on the final debate, Logan joked: "We were saying that champions shouldn't be glorified, which is slightly ironic given we are doing a BBC interview with a trophy next to us." Mr Swinney was among several politicians and public figures who congratulated the team on social media. Writing on X the first minster said: "Warmest congratulations to Team Scotland who have won the World Schools Debating Championships." Scottish Conservative leader Douglas Ross posted: "An outstanding result. Congratulations to the World Champions - Team Scotland."
