title: The Cure's Robert Smith on grief, death and new album Songs Of A Lost World
  - BBC News
date: '2024-11-02'
section: Culture
url: http://www.bbc.co.uk/news/articles/cz7wq20dj10o
content: |-
  The goth icons played two sets at the BBC in support of their new record, Songs Of A Lost World.

  The Cure's Robert Smith: 'Singing new album live helps me grieve'

  The Cure played an intimate concert for Radio 2 earlier this week, which will be broadcast on BBC Two this weekend

  The Cure frontman Robert Smith says performing songs from the band's newly-released album, Songs Of A Lost World, helped him deal with the grief of losing close family members in recent years. Speaking to BBC Radio 6 Music's Huw Stephens, he said singing live became "hugely cathartic" in escaping the "doom and gloom" he felt. "You just suddenly feel something. You feel connection," he added. "And that's the reason why I still do it... that communal moment with a crowd. There's something really, really wonderful about it." The band performed a live session before also playing a Radio 2 In Concert set to a small audience at the BBC Radio Theatre on Wednesday.

  The London show included a performance of Alone – the group's first new music in 16 years and the lead single from Songs Of A Lost World, released this Friday. The long-awaited record is the follow-up to 2008’s 4:13 Dream and has been in production since 2019, following the band's 40th anniversary shows. Smith expressed relief at finishing the process, telling Stephens that completing song lyrics he deems worthy has become more difficult with age. "It's the one thing that as I've grown older, I’ve found much much harder to do - write words that I want to sing. I can write words but I don't really feel like singing them. "So to arrive at that point where I think that it's worth singing these songs, it has become really, really hard,” he said.

  He revealed that his wife Mary, who he met at secondary school, helped him finalise the album's tracklist, insisting that he balance the depth of the darkness. "I was finishing the doom and gloom ones... and [Mary] said no, no, no your best albums are the ones that just have a couple of... more upbeat tracks. She was right. "I wanted to finish everything, because I thought that's only fair to all the songs, like they're all little children - I don't want to pick favourites." Originally formed in Crawley, West Sussex in 1978, The Cure continue to endure as alternative rock’s goth icons - pitching lyrics of love, angst and desolation against a kaleidoscope of melodies.

  The Cure in 1987, with present bassist Simon Gallup (far left) sitting next to vocalist Robert Smith, the band's only constant member, who still sports the same trademark big hair today

  From early years of rock sparsity - pulling apart the remnants of Joy Division's post-punk gloom and David Bowie's Low era - they bloomed into late-80s indie-pop heavyweights - defined by Smith's melancholy. This era spawned a number of UK top 10 singles, including Lullaby and Friday I'm In Love - one of the band's best-known tracks from their chart-topping 1992 album, Wish. Guitarist and principal songwriter Smith remains the band’s only constant member, closely followed by long-time bassist Simon Gallup. Reeves Gabrels and Perry Bamote currently tour on guitar, with Jason Cooper on drums and Roger O'Donnell on keyboard. But it is Smith's imprint that dominates on Songs Of A Lost World - the band's 14th album. Featuring songs written as far back as 2010, events of recent years have given it a personal feel, with Smith mourning the loss of family members, including his late brother, Richard. His death inspired the track I Can Never Say Goodbye - a window into grief-stricken frustration and regret.

