  When the track made its way into new songs included in last year's tour, Smith often had trouble completing it without becoming overwhelmed with emotion. He told Stephens that going on stage and singing the track "night after night" eventually became a "wonderful moment". Speaking to Matt Everitt in an interview for the latest issue of Uncut magazine, since published on the band's YouTube channel, Smith explained these real-life touchstones came to define the record and set it apart from earlier albums. "When you’re younger, you romanticise [death], even without knowing it. Then it starts happening to your immediate family and friends and suddenly it’s a different thing," he said. "It’s something that I struggled with lyrically: how to put this into the songs? I feel like I am different person than I was when we last made an album. I wanted that to come through."

  The Cure performed in support of their first album in 16 years, Songs Of A Lost World

  This sense of fragility and awareness of mortality runs throughout, as Smith, now 65, faces the passage of time with newfound urgency. Its darkness and atmospherics mirror 1982's Pornography and 1989's critically-acclaimed Disintegration. However, Songs Of A Lost World is much tighter in length, with only eight tracks - almost half the runtime of the latter and the band's more recent albums. Reviews from critics have been positive, hailing Songs Of A Lost World as a return to form. The Telegraph awarded five stars, external, with Neil McCormick describing it as "perversely uplifting in its nihilism and the best thing since their debut". The Guardian’s four-star review, external praised the record’s introspective depth, particularly how it wrestles with “the question of Smith’s own selfhood”. “It seems to be fracturing”, wrote Kitty Empire, despite fans’ supposed clear image of one of British rock’s iconic figures. She also highlighted the "unexpected pop banger", Drone: Nodrone - one of Mary’s picks - as the album’s “crowning glory”. These themes culminate on the album's closer, Endsong, an 11-minute epic that stood out as a highlight of the band's Radio 2 In Concert performance on Wednesday - broadcast on BBC Radio 2, iPlayer and BBC Two this Saturday (21:10 GMT). Formed around a thudding, slow drum beat, the guitars build in a crescendo of whirling tones and unrelenting bass hooks, similar to 1992's Cut.

  The Cure performing during their 6 Music session for Huw Stephens' show

  Lyrically it finds Smith looking back on his own life, "remembering the hopes and dreams I had"; wondering what "became of that boy", and how he "got so old". Classic melancholy on paper perhaps, but live it sounds brutally honest, unapologetically raging and resigned in equal measure. Elsewhere, the mood of the set was celebratory and very much alive: filled with fan favourites and greatest hits, from the languid heartbreak of Pictures of You to the poppier sounds of Inbetween Days and Just Like Heaven. The band themselves also appeared in good spirits, exchanging smiles, with Smith playfully dancing around during the encore that included Close To Me and Lullaby. Joy in the face of new material that, in places, sounds darker than ever should perhaps come as no surprise. "I've hated the idea of having a set time for a career", Smith told the NME in 1983 as he turned 25. "I think it’s terrible. I suppose it’s because I’m getting older and feeling my age." Smith recently suggested to The Times, external that the band may come to an end around their 50th anniversary in 2028, by which time he will be around 70. Speaking to Stephens, he suggested, with a dry laugh, that he's "not going to get" to that milestone age and would instead be "really happy" to see Christmas. But Smith told Uncut that the band have three albums near-completion following their intensely productive 2019 recording sessions. He adds to Stephens that he's "almost there" with the second album. "Once I’ve done that, then I shall take a deep breath and then I’ll look up, but until I finish it I’m not bothering about what comes next." Time waits for no-one, but Smith and The Cure are certainly not ready to stand still.
