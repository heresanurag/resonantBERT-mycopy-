  But now, that thread is filled with replies urging Twitter to use Helvetica - or whatever the user's default system font is.

  Social-media companies often face a backlash to changes, however.

  And Facebook users have reacted badly to changes over the years - to both its design and the algorithms that power its news feed and dictate what users see.
