  A few days later, a tweet from the technology giant's accessibility account said: "We're making contrast changes on all buttons to make them easier on the eyes because you told us the new look is uncomfortable for people with sensory sensitivities."

  And the next day, it said: "We've identified issues with the Chirp font for Windows users and are actively working on a fix."

  Many users had also complained about the new font on mobile phones, however.

  And, replying to a concerned user asking to be able to choose their own font, Twitter promised future changes and it was "going through everyone's feedback on the font".

  Announcing the new font, in January, Twitter head of branding Derrit DeRouen said it had been designed, by Swiss type foundry Grilli, "to improve how we convey emotion and imperfection" - and the widely used standard typeface Helvetica was "not up for the job".

