  Former champion Catriona Matthew announces this year's Women's Open at St Andrews will be her last.

  Matthew to play in final Women's Open at St Andrews

  Catriona Matthew is preparing for her final Women's Open appearance

  Former champion Catriona Matthew has announced this year's Women's Open will be her last. The Scot, 54, won the title in 2009 and this year's championship over the Old Course at St Andrews will be her 30th consecutive appearance in the major. Matthew has claimed 11 professional wins, including four on the US-based LPGA Tour and six on the Ladies European Tour, in a stellar playing career. The two-time winning Solheim Cup captain will skipper the Great Britain and Ireland team when the leading female amateurs take on the United States in the Curtis Cup at Sunningdale next week. "What better place than St Andrews to finish off," Matthew told BBC Sport.

  "If it hadn't been here, I probably wouldn't be playing. This is probably my favourite golf course. It'll be good fun. "I've probably hit it the best I've hit it in a couple of years in practice and on the range. Teeing it up on Thursday is a different matter, so we'll see. "Sunningdale, again, is another great golf course that I really enjoy playing. The Americans are going to be tough, no doubt about it. "If our team can play how they can play, we might have a little chance there."
