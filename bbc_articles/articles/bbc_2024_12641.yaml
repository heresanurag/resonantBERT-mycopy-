title: Red Arrows stamps launched by Royal Mail to mark 60th anniversary - BBC News
date: '2024-06-20'
section: Lincolnshire
url: http://www.bbc.co.uk/news/articles/c1001692e77o
content: |-
  The stamps include images of the RAF jets over famous landmarks and performing spectacular displays.

  A new set of stamps will mark the 60th anniversary of the display team

  Royal Mail has launched a set of stamps to mark the 60th anniversary of the Red Arrows. Available from today, the main set of eight stamps includes images of the RAF jets performing spectacular aerobatic displays, including the trademark red, white and blue trails. Four additional stamps show them above landmarks such as the Eiffel Tower and Niagara Falls. The Red Arrows were established in 1964 and have completed almost 5,000 displays in 57 countries.

  The Red Arrows have flown in 57 countries

  Sqn Ldr Jon Bond, who flies as "Red 1", said the stamps celebrated the "heritage" of the Red Arrows and featured "brilliant images". The stamps would "hopefully inspire many more people", he added, "just like each of our colourful, dynamic displays". The Red Arrows are based at RAF Waddington, in Lincolnshire, and fly Hawk jets. On Saturday, they flew over central London to mark the King's official birthday.

  The stamps include an iconic image of the Red Arrows with a Vulcan bomber

  David Gold, Royal Mail's director of external affairs and policy, said the Red Arrows represented the UK globally and had "entertained us with spectacular displays of aeronautical excellence". "We are proud to mark their 60th season with these striking new stamps," he added. Follow BBC Lincolnshire on Facebook, X (formerly Twitter), external, and Instagram. Send your story ideas to eastyorkslincs.news@bbc.co.uk, external
