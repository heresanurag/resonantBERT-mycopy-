title: Stranded baby elephant rescued from lake - BBC News
date: '2019-05-11'
section: General
url: http://www.bbc.co.uk/news/world-asia-48240033
content: |-
  Officials in north-east India guided an elephant calf to safety, after it became separated from its mother.

  An elephant calf has been rescued from a lake in north-east India, after it became separated from its mother.

  The baby elephant became stranded in the Deepor Beel lake in Kamrup district, and was guided out by forest officials and locals.
