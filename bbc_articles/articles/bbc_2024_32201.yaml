  The arrest is in connection with a campaign to bring the killer of PC Yvonne Fletcher to justice.

  Fraud arrest over 'justice for killed PC' campaign

  Yvonne Fletcher was policing a demonstration outside the Libyan embassy in London when she was fatally shot

  A 69-year-old man has been arrested in north London on suspicion of fraud in connection with a campaign to find the killer of a police officer in 1984. Yvonne Fletcher was 25 when she was shot on duty outside the Libyan embassy in London. Nobody has been charged over her death. The Metropolitan Police received allegations of financial irregularities linked to a justice campaign and passed the inquiry to Cheshire Police to avoid any conflict of interest. A property in Mill Hill is being searched by officers and the arrested man remains in police custody for questioning.

  Det Con Ed Currie, from Cheshire Police, stressed that the investigation was not linked to PC Fletcher's family, who are being kept up to date on the case, or the official police memorial trust charity. He added that the force was keen to hear from anyone who may have, at any time, donated to the campaign.
