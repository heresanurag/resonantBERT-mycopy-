title: 'Newspaper headlines: Water groups ''facing lawsuits'' and ''prisons near capacity''
  - BBC News'
date: '2024-07-03'
section: The Papers
url: http://www.bbc.co.uk/news/articles/cjr491vpy9ko
content: |-
  A Supreme Court ruling on sewage and the crisis of overcrowding in the UK's prisons lead the papers.

  Boris Johnson addressed a crowd of Conservative supporters in central London on Tuesday

  Boris Johnson's late intervention in the Conservatives' election campaign features on a number of front pages. The Daily Mail, external calls it a "rousing, rallying cry to disaffected Tories". The Daily Telegraph, external reports that Prime Minister Rishi Sunak thanked his former boss just before Mr Johnson addressed Conservative supporters at the event in London - and said he was glad to have his support. The paper adds that Mr Johnson had previously blamed Mr Sunak for triggering his downfall in 2022 by resigning as chancellor, but that the two "buried the hatchet to put the Conservative Party first". The Guardian, external reports that senior Jewish figures have been angered by remarks made by some Conservatives - who appeared to mock Sir Keir Starmer for wanting to protect family time on Friday nights. The paper quotes a former president of the Board of Deputies of British Jews, Marie van der Zyl, saying the outrage was “horribly stigmatising” - as the Labour leader's wife is from a Jewish family. She added that it was important for Jewish families to observe the tradition of spending time with loved ones on Friday evenings. The Financial Times, external reports that some wealthy individuals have started selling assets such as shares and property over fears that a Labour government could increase capital gains tax. One wealth manager, Nick Ritchie, tells the paper there is “a general nervousness" and uncertainty about Labour's intentions. Mr Ritchie said a small number of clients were already offloading assets to make sure their gains were taxed at “at a favourable 20%” - but others were taking a wait-and-see approach.

