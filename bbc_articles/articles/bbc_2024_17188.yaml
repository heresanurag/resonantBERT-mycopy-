  Ukraine has been dealt a blow in its attempt to gain Nato membership, according to the Telegraph, external. A US State Department official tells the paper the alliance needs to see more evidence that Ukraine is taking steps to prevent corruption before membership talks can progress. The Daily Express, external reports that the waiting list for children to join the Scouts is at an all-time high. The Daily Mirror, external says Scout leaders are urging adults to volunteer for the organisation as 100,000 youngsters are waiting to join more than 7,500 Scout groups. New research has cast doubt on people's ability to focus on the job in hand while working from home. A survey of more than 2,000 hybrid workers found that 82% of those questioned admitted watching TV, the Times reports, external. Gen Z workers - those aged between 18 and 24 - were the most likely to reach for the remote during the working day. The most popular choice of viewing was ITV's This Morning, followed by Come Dine with Me on Channel 4 and the quiz show Tipping Point.
