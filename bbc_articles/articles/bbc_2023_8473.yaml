title: 'Ukraine dam breach: Tears and a hug as people rescued - BBC News'
date: '2023-06-07'
section: General
url: http://www.bbc.co.uk/news/world-europe-65837844
content: |-
  The BBC's James Waterhouse witnesses an evacuation in the Ukrainian city of Kherson.

  The BBC's James Waterhouse witnessed an emotional rescue in the city of Kherson, as people were evacuated through the flooded streets in dinghies.

  Thousands of people are being evacuated after a dam collapsed by the Russian-controlled city of Nova Kakhovka.
