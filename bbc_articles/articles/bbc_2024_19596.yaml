title: Twelve ancient oak trees compete for Tree of the Year competition - BBC News
date: '2024-08-22'
section: UK
url: http://www.bbc.co.uk/news/articles/ckgjy97kz2zo
content: |-
  The public will vote for which of the trees will become the UK's favourite.

  Ancient oaks compete for Tree of the Year

  The Michael oak in Midlothian is among the contenders - it's name is probably a corruption of the Scots word "meikle", meaning big

  A dozen centuries-old oak trees have been shortlisted for the annual Tree of the Year contest. Contenders include the 1,200-year-old Marton Oak in Cheshire, the Bowthorpe Oak in Lincolnshire, which has carved graffiti dating back hundreds of years, and one of the last surviving trees from an ancient Scottish forest. The shortlist was selected by a panel of experts from the Woodland Trust charity. An online public poll will select the winner, which will then go forward to compete in the European Tree of the Year contest early in 2025.

  The Queen Elizabeth Oak in Sussex is believed to have been used as a navigation aid by Queen Elizabeth I

  Dr Kate Lewthwaite, citizen science manager at the Trust, said: "We chose the iconic oak because it captures people's imaginations. "From their leaves to their acorns, these trees are ingrained in our heritage and the ancients are so impressive in terms of their sheer size and age. "It's humbling to think how many events these trees have lived through, and that reaching full maturity they can stand for hundreds of years as ancient trees - all the while continuing to provide vital habitat as they hollow and produce dead wood."

  The Skipinnish Oak in Lochaber is among those shortlisted

  The oldest on the list, the Marton Oak, also has the UK's widest trunk with a 46ft (14m) girth. The Lincolnshire oak is the second widest on the list and stands near the village of Manthorpe, about three miles (5km) south of the market town of Bourne. It is hollow and it is claimed 36 people once stood in it.

  The Bowthorpe oak in Lincolnshire is believed to be more than 1,000 years old

  In Scotland, the Capon Tree in the Scottish Borders is one of the few trees left from the Jedforest woodland, which was cut down to provide timber for shipbuilding. A Welsh contender is the Gregynog Oak, which stands in the Great Wood in the grounds of Gregynog Hall in Powys. The Darwin Oak in Shrewsbury is more than 500 years old and stands close to the childhood home of Victorian scientist Charles Darwin. The tree and eight others of similar age are due to be felled to make way for a relief road. More than 100,000 people have signed a petition to save the trees.

  Plans to cut down the Darwin Oak in Shrewsbury has attracted protests

  The Woodland Trust said the list highlights that "ancient trees have very little legal protection". As well as voting in the competition, the charity is asking the public to sign its Living Legends petition, calling for stronger laws around cutting down valuable trees. Adam Cormack, head of campaigns at the Trust, said it was "essential that future generations have the opportunity to stand under a centuries-old oak and wonder what stories it holds". He said: "The history of our country is interwoven with these wonderful trees, which have built our ships and cities and after which we have named so many places and pubs." Others on the list include: Follow BBC Lincolnshire on Facebook, X (formerly Twitter), external, and Instagram. Send your story ideas to eastyorkslincs.news@bbc.co.uk, external
