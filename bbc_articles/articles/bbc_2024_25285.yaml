title: 'Newcastle house explosion: Second body found in rubble - BBC News'
date: '2024-10-17'
section: Tyne
url: http://www.bbc.co.uk/news/articles/c79n083lrdgo
content: |-
  A body, believed to be a man in his 30s, is found after the blast which killed a seven-year-old boy.

  Two people died and six were injured in the blast

  A second body has been found following an explosion which also killed a seven-year-old boy. The victim, believed to be a man in his 30s, was found in the remains of three houses destroyed on Violet Close in Benwell, Newcastle. The blast, which happened at about 00:45 BST on Wednesday, destroyed six flats along the street. An investigation by emergency services is under way and gas service workers remain at the scene.

  Formal identification of both of those who died is yet to take place, Northumbria Police said. Five adults and a child were also taken to hospital with varying degrees of injuries, with all but one discharged following treatment. A man aged in his 30s remains in hospital in a critical but stable condition. Officers also confirmed there were no reports of people related to the properties still missing.

  Floral tributes have been left at the scene

  Cordons around the site are "expected to be in place for some time", police said. Supt Darren Adams said the force was "committed to providing answers to what has happened". It said housing officers had ensured all those living nearby and who had been evacuated had a place to stay. Some were with friends and family while others were in temporary hotel accommodation. The authority said it was working to secure "suitable long-term options".

  Several community centres in the area have opened their doors to support people affected. The Reverend Chris Minchin of Benwell and Scotswood Team Parish, said people had been making donations, including baby clothes, because a lot of young families had been affected. He said many people caught up in the explosion had to leave their homes in their pyjamas, "grabbing" pets as they fled. One of those living nearby, Jodie Holmes, said she was "just drifting off to sleep" when she heard a "boom". She said: "We got up and went outside. You could hear the screams, crying."

  Jodie Holmes volunteered at the community centre housing people who had been evacuated

  Ms Holmes went to volunteer at the nearby community centre which opened "within minutes" of the explosion. She said 60 to 70 residents were there overnight. "Everyone was in shock," she said. "Kids were sleeping under the tables on blankets." The Red Cross gave out mobile phone chargers and food at the evacuation centre. Volunteers have since been sorting donation boxes to give to the families affected. Meanwhile, West End Women and Girls Centre also opened up to offer food and a "warm welcome".
