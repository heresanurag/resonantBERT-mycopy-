title: 'Brazil landslides: Dozens missing, feared buried in the mud - BBC News'
date: '2023-02-23'
section: General
url: http://www.bbc.co.uk/news/world-latin-america-64739626
content: |-
  More than 40 people have been killed in landslides which hit coastal towns in Brazil's São Paulo state.

  More than 40 people have been killed, and at least 40 others are still missing, after landslides hit coastal towns in Brazil's São Paulo state.

  Heavy rain caused flooding and landslides in towns along the coast, including Barro do Sahy, Juquehy and São Sebastião.

  Family and friends have been joining the rescue operation to find those still buried in the mud.
