  A second defeat means Sri Lanka already face an uphill challenge to qualify from a competitive Group D that also includes South Africa, the Netherlands and Nepal. They looked in a strong position when 100-3 at the start of the 15th over but crumbled in the latter part of their innings, with Mustafizur Rahman taking 3-17 and Rishad Hossain 3-22. Bangladesh made a poor start in reply but a crucial partnership worth 63 between Hridoy and Das eased nerves, before Mahmudullah's unbeaten 16 from 13 balls saw them over the line with an over to spare. "The last 10 to 15 days we have been making plans, especially all the fielders doing their job, so we are really happy," said Bangladesh skipper Najmul Hossain Shanto. "The run-chase was not easy. We did not bat well to be very honest. I think they bowled really well, but on a wicket like this we should have won this easily." Sri Lanka captain Wanindu Hasaranga said: "If batters put up 150 to 160, our bowling attack can win games. Last two games the batters didn't do the job. It's tough." Bangladesh's next match is against South Africa in New York on Monday, with Sri Lanka facing Nepal in Florida the following day.
