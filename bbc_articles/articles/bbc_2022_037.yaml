title: 'Ukraine ambassador on Russia invasion fears: Assistance piling up - BBC News'
date: '2022-01-21'
section: General
url: http://www.bbc.co.uk/news/world-europe-60047215
content: |-
  Vadym Prystaiko speaks to BBC World amid mounting fears of a Russian invasion of Ukraine.

  The Ukrainian ambassador to the UK has welcomed the military support the country has received from the UK and US. The US Secretary of State, Antony Blinken is in Kyiv for talks and promised a relentless push for peace, but said that Russia could attack at very short notice. Russia has repeatedly denied planning to invade Ukraine.

