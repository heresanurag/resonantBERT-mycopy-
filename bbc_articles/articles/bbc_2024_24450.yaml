title: Brotherhood of Man singer Martin Lee dies aged 77 - BBC News
date: '2024-10-01'
section: Culture
url: http://www.bbc.co.uk/news/articles/cglk1zwdzeyo
content: |-
  The group were best known for winning the Eurovision Song Contest in 1976 with Save Your Kisses for Me.

  Brotherhood of Man's Lee Sheridan, Sandra Stevens, Nicky Stevens and Martin Lee pictured in 1976

  Singer and songwriter Martin Lee, a member of pop group Brotherhood of Man, has died aged 77. A statement released by the PA News Agency and posted on the band's Facebook page said Lee died on Sunday from heart failure following a short illness. Brotherhood of Man were best known for winning the 1976 Eurovision Song Contest with Save Your Kisses for Me. The song reached number one in more than 30 countries and became one of the best-selling Eurovision singles in the contest's history.

  "He will be sadly missed by his fellow band members Nicky Stevens, Lee Sheriden and especially Sandra Stevens to whom he had been married for 45 happy years," the statement said. Lee joined Brotherhood of Man in 1972 and served as lead vocalist and guitarist. Save Your Kisses For Me won the Eurovision Song Contest four years later in the Netherlands. The song topped the table with 164 points, 17 points ahead of second-placed France. Tony Hiller, the group's manager, put the song's success down to their TV appearances across France, Belgium, Germany and Switzerland the year before the contest - and the single sold six million copies. The group's hits included United We Stand, Oh Boy, and Kiss Me Kiss Your Baby. Lee co-wrote many of the group's songs with Sheriden, including Angelo and Figaro, which both reached number one in the UK. After winning Eurovision, they continued to tour around the world, but they retired from performing in 2020. "We have so many happy memories but now we are in total shock and cannot imagine a world without Martin Lee," the group said. Prior to joining Brotherhood Of Man, Lee had already released a solo single called Cry Jose, and had also played in the Johnny Howard Band. Lee was born Martin Barnes, on November 26, 1946, in Purley, London, but had spent five years of his youth living in Australia.
