  Met refers itself to IOPC after Bournemouth killing

  Amie Gray (left), shown with her wife Sian Gray, was stabbed to death on Durley Chine beach on 24 May

  The Metropolitan Police has referred itself to the police watchdog over contact its officers had with a man in south London, who was later charged with murdering a woman in Bournemouth. Nasen Saadi, 20, from Croydon, is charged with murdering Amie Gray, a 34-year-old personal trainer, on Durley Chine beach on 24 May. He is also charged with the attempted murder of Leanne Miles, 38. Mr Saadi's trial is set for 25 November, with a plea hearing due to take place on 23 August at Winchester Crown Court.

  In a statement, the Metropolitan Police said it received a complaint in early June "from a third party" relating to the handling of an allegation made in February. "We made a mandatory referral to the Independent Office for Police Conduct on 7 June and await their assessment," the force added.
