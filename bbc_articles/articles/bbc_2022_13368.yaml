title: 'Sleaford: Referee Michael Grant dies after being hit by football - BBC News'
date: '2022-10-26'
section: Lincolnshire
url: http://www.bbc.co.uk/news/uk-england-lincolnshire-63392921
content: |-
  Michael Grant, a well-known figure in grassroots football, died on Monday from a bleed on the brain.

  Michael Grant had been refereeing a match at Carre's Grammar School in Sleaford

  Tributes have been paid to a respected referee who has died after being struck by a football.

  Michael Grant had been officiating at a youth match on 19 October at Carre's Grammar School in Sleaford when he was struck by a "stray ball", Boston and District Saturday Football League said.

  The grandfather-of-one, from Ruskington, suffered a bleed on the brain and died in hospital on Monday.

  A minute's silence will be held prior to league and cups games on Saturday.

  Nick Law, head at Carre's Grammar School, said: "The whole school community is both shocked and saddened by the tragic death of Mr Grant.

  "He was well-liked by the staff and the boys and was an important part of the sporting life here at Carre's.

  "We will all miss him immensely and our thoughts and prayers are with his family."

  Mr Grant officiated up to three games a week, "always with a smile on his face", Lincolnshire Football Association said.

  In a statement, the association said: "Football in Lincolnshire has lost a much-respected referee in the process of doing what he loved.

  "The whole football family sends our heartfelt condolences to his family and his many friends."

  Boston and District Saturday Football League described Mr Grant as a "long-established and respected" referee.

