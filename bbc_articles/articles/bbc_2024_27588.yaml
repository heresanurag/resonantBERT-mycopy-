  Two weeks after flash floods devastated eastern Spain, several areas are on alert again.

  Spain braces for torrential rain as new weather system reaches Med coast

  Valencia is still recovering from the first "Dana" weather system at the end of October

  Two weeks after flash floods caused devastation in eastern Spain, several areas of the country are on alert, with a new weather front expected to bring torrential rain and low temperatures. Eastern and southern Mediterranean areas are again the most vulnerable, with Spain's meteorological agency Aemet placing parts of the Valencia, Catalonia and Andalusia regions, as well as the Balearic Islands, on orange alert from now until Thursday. Aemet warns of rainfall and storms that could be “very strong to torrential”. That orange alert is the second highest and it signals a significant meteorological event “with a degree of danger for normal activities”.

  A military vehicle has been driving through towns using a megaphone to warn of the expected storms. Precautions are being taken in many areas of Valencia, with school classes and sports activities suspended in some towns and sandbags piled up to protect the centre of the town of Aldaia. However this second “Dana” weather system is not expected to be as dramatic as the red alert on 29 October, when the Valencia region in particular suffered an unprecedented loss of lives and material damage. There were 222 confirmed deaths from the flooding in Spain last month, and 23 people are still missing. Dana weather systems are formed when an area of low pressure gets "cut off" from the main flow of the jet stream. This means that instead of moving through a region relatively quickly, they get blocked over the same area leading to persistent rainfall for several days. Colder air high in the atmosphere meets warmer air flowing in from the Mediterranean which intensifies the storm.

