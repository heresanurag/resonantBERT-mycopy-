  Heavy rainfall has already hit some areas this week. Parts of Almería province in Andalusia were flooded on Monday night, causing part of the A7 motorway to be closed temporarily. Emergency services rescued three people after their cars were dragged by the flood waters to a bridge in the town of Vícar. The Spanish weather agency has advised people in areas on orange alert to stay away from ravines and waterways, even though they may be dry, because of the risk that they become flooded. The national traffic office (DGT) advised people in those areas to check the state of roads before using vehicles.

  King Felipe VI was due to visit a military base at Bétera in Valencia on Tuesday where members of the armed forces are taking part in the ongoing search for missing people and the clean-up operation. On a previous visit to Valencia, the king, Prime Minister Pedro Sánchez and the regional president Carlos Mazón were insulted, jostled and had mud thrown at them by people in the town of Paiporta, due to the perceived lack of state help in the wake of the tragedy. Mazón, in particular, has come under mounting pressure for his administration’s response on the day the flash floods struck.

  Dana weather systems are not uncommon in Spain – they typically happen around 10 to 20 times a year in the western Mediterranean. This second Dana in a matter of weeks is not considered either as extreme or slow-moving as the one that hit Valencia at the end of October. However, the wettest places - especially around Malaga and Granada - could see around 180mm of rain falling this week – about two months’ worth of rainfall in a matter of days. Large hail and squally winds will also be a hazard. The first significant snowfall of the season is expected to affect the Cantabrian mountains as well as the Sierra Morena mountains and the Central and Betic chains as colder air moves across the Peninsula. Strong gusty winds will accompany the mountain snow too.

