title: Alex Murdaugh murder trial as ex-lawyer was cross-examined - BBC News
date: '2023-02-23'
section: US & Canada
url: http://www.bbc.co.uk/news/live/world-us-canada-64748208
content: |-
  The prominent lawyer from South Carolina was grilled over the killings of his wife and son.

  Murdaugh explains why he hired someone to shoot him

  Alex Murdaugh has described the day he hired a hit man to shoot him, so that his son, Buster, would be able to collect on his life insurance policy. "I meant for him to shoot me so I'd be gone," Murdaugh said. "I knew all this was coming to a head. I knew how humiliating this was going to be for my son. I had been through so much. At the time in the bad place that I was, it seemed like the better thing to do." The defence walked through 4 September 2021, the day that Alex Murdaugh frantically called 911 to say that he had been shot in the head while trying to change a tyre by the side of the road. He was airlifted to a nearby hospital where doctors found that he had been grazed by a bullet. But things began to unravel quickly from there. Reports began circulating that, hours before the shooting, Murdaugh was forced to resign from his family law firm after his colleagues confronted him over "misapprorpriated funds". He would later be charged with multiple felonies for stealing millions of dollars in legal settlements from his clients. In the days after he was shot, Alex admitted that he had hired a "hit man" to help him commit suicide so that his surviving son, Buster, could collect on his life insurance policy. He also checked himself in to "rehab" for opioid addiction. The prosecution has argued Alex killed his wife and son to cover up his financial misdeeds. They will likely bring up this incident during the cross-examination in an attempt to show that Alex resorted to desperate measures to hide that he had allegedly stolen money, and was comfortable lying to investigatosrs.
