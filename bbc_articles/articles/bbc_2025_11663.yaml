  This year's relaxed ceremony had a very different feel compared to last year - and not just because it was sunshine rather than lashing rain. At Trooping the Colour in 2024 there had been feverish interest in Catherine's return to public life, in what was her first public appearance since her cancer diagnosis. This year she could be seen smiling alongside her children, Prince George, Princess Charlotte and seven-year-old Prince Louis - who gave a gap-toothed grin in a carriage alongside his brother. The King, who is still undergoing his own treatment for cancer, rode in the carriage for the second year running rather than riding on horseback. This was a ceremony celebrating the King's birthday. Although King Charles's actual birthday is 14 November, monarchs historically have had an "official" birthday for public events such as this, held in the summer in the hope of better weather.

  The Red Arrows led the RAF flypast over central London

  Members of the Royal Family, including the King, were wearing black armbands in honour of the Air India crash victims

