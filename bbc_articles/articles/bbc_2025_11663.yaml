  Members of the Household Cavalry ride on the Mall after Trooping the Colour

  Large crowds lined on the Mall to view the Red Arrows flypast

  Along with the crowds of well-wishers and tourists, there was also a protest by anti-monarchists, who chanted and waved Not My King flags. The event, which saw 1,350 troops taking part in the King's Birthday Parade, had its traditional finale with the Royal Family on the Buckingham Palace balcony watching a flypast. This year the Red Arrows went green, as they used a more environmentally friendly blend of fuel, including sustainable aviation fuel and a biofuel for the trademark vapour trail. That will have pleased the King, an environmental champion, who has been encouraging the use of sustainable aviation fuel where possible on royal flights and wants to promote its wider use.

