  BBC eastern Europe correspondent Sarah Rainsford reports from Kramatorsk in Ukraine's Donbas region.

  The BBC's eastern Europe correspondent Sarah Rainsford reports from Kramatorsk in Ukraine's Donbas region shortly after President Putin announced a Russian military operation in the region.
