  What happens next?

  By the time Everton's second charge is heard, they may only have six league fixtures remaining.

  In September owner Farhad Moshiri agreed to sell his 94% stake in Everton to American investment fund 777 Partners.

  The takeover has been cleared by the Financial Conduct Authority (FCA) and the Football Association (FA), but Everton are still awaiting Premier League approval.

  Nottingham Forest and Manchester City are the only other clubs to have been charged by the Premier League for financial breaches, with Forest's case due to be heard next week on Thursday and Friday, 7 and 8 March.

  Reigning champions City were referred to an independent commission in February 2023 over more than 100 alleged breaches between 2009 and 2018.

  This might be Everton's biggest result of the season so far. They will be relieved that their punishment has been reduced, and will feel vindicated after describing the original 10-point deduction as excessive.

  Significantly, the appeal board found that the commission had made "legal errors" on two grounds - including that the club failed to act in utmost good faith.

  That finding - and the regained four points - will be a source of considerable satisfaction among their fans, many of whom were furious with the Premier League over what they saw as an unfair sanction. Their hope is that this boosts their team's survival hopes, and provides some clarity over its proposed takeover by a US investment firm.

  However, while the club is now five points clear of the relegation zone, it will also be braced for the outcome of another charge of breaking financial rules for another, more recent period.

  Nottingham Forest were also charged and referred to an independent commission for that same period, and today's news will be of some comfort to them too as a 'lighter' punishment benchmark has now been set.

  Manchester City are the only other Premier League club to have been charged with breaching financial rules. They deny wrongdoing, and such is the scale and specifics of their case, it may be unwise to attach too much significance to today's appeal result in relation to them.

  It's difficult to know how to feel after hearing the news that Everton have had four points returned on appeal. The initial 10-point deduction was draconian, with fans, players and the manager all punished for something out of their control.

  Ask many Evertonians and they'd have told you they expected nothing back, so there may well be some welcome surprise amongst the fanbase.

  Personally, there's a sense of relief that a line can be drawn under the first charge, but utter dismay that six points is still deemed a fair and proportionate punishment.

  The club have been used and continue to be so, in a game between league and government. That should never sit right with any fair-minded football fan.

  I've got a real hope that the clarity and closure provides the players and manager with a mental lift going into the upcoming fixtures.

  They have all operated admirably in the most trying of circumstances. This shouldn't be forgotten when we return to Goodison Park this weekend. We can't forget however, that the battle continues. The second charge is next on the to-do list.

