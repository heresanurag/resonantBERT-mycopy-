title: Train smashes through truck stuck on railway crossing - BBC News
date: '2023-06-09'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-65859078
content: |-
  A train crashed into a truck which was stuck on a railway crossing in North Carolina.

  The truck driver got away in time and no injuries were reported.
