title: Huge fire at Blackpool former government site - BBC News
date: '2024-06-08'
section: Lancashire
url: http://www.bbc.co.uk/news/articles/cy6649p2lzxo
content: |-
  The blaze spread through a former Department of Work and Pensions complex.

  Lancashire Fire and Rescue said the fire was "significant"

  Over 50 firefighters have spent the night tackling a huge blaze at a former government building. The fire at the old Department of Work and Pensions site at Warbreck Hill Road in Blackpool was spotted at about 23:30 BST on Friday. Lancashire Fire and Rescue Service described the blaze as "significant". Some roads in the area have been closed to traffic, including Warbreck Hill Road between Devonshire Road and Hollyoak Avenue, plus Bispham Road up to the junction with Hayfield Avenue.

  The blaze cause major destruction at the large site

  Firefighters brought the blaze at the large site under control and were damping down on Saturday.
