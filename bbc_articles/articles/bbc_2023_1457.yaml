title: 'Quadriplegic cerebral palsy: Mum sees son walk for first time - BBC News'
date: '2023-01-16'
section: Wales
url: http://www.bbc.co.uk/news/uk-wales-64251504
content: |-
  Due to a new machine bought by his school, Jacob has stood up and moved his legs for the first time.

