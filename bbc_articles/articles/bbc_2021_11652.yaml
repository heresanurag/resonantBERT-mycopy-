title: Red carpet debut for 'Bennifer' 2.0 in Venice - BBC News
date: '2021-09-11'
section: General
url: http://www.bbc.co.uk/news/entertainment-arts-58527312
content: |-
  Ben Affleck and Jennifer Lopez arrive in Venice for the premiere of The Last Duel.

  Ben Affleck and Jennifer Lopez, often affectionately called "Bennifer" by fans, have walked the red carpet together for the first time since reuniting as a couple.

  They posed for photographers as they arrived for the premiere of The Last Duel at the 78th annual Venice International Film Festival.

  Their last red carpet appearance together was almost 20 years ago for the premiere of the film Gigli in 2003.
