content: |-
  Police believe Tom Voyce tried to cross a ford in Northumberland flooded by Storm Darragh.

  Wife of former rugby star 'heartbroken' over death

  Anna Voyce said she had been overwhelmed by the support she had received during the search for her husband, Tom

  The wife of former England rugby star Tom Voyce has said "absolutely devastated and heartbroken doesn't even describe how we feel", following his death. A body found in an area in Northumberland flooded during Storm Darragh has been confirmed as that of the missing 43-year-old. The former England international was reported missing on Sunday and police believe he tried to cross Abberwick Ford, near the village of Bolton, in a vehicle which was then pulled along by the current. Anna Voyce paid tribute to her husband and said: "My main focus now is our son Oscar having done what he asked, 'find Daddy'."
  • None Voyce - a wing who took flight with Wasps Northumbria Police confirmed on Thursday its Marine Unit had discovered a body near Abberwick Mill, following a large-scale search. "Tom would be blown away by the amount of people that were out there helping," Mrs Voyce said. "We have all been overwhelmed by the support of friends, many travelling from far afield to help with the search. "We are just so lucky to live in such a special community that pulled together to find Tom."

  Tom Voyce retired from rugby in 2013 and had been living in Alnwick since 2019

  Since relocating to Northumberland from London in 2019, Mr Voyce left his role at Investec to set up his own business, Trevow Vegetation Management. Mrs Voyce said: "Tom was fully immersed in Alnwick Rugby Club and was much-loved by Oscar's under-7's team which he coached with gusto, giving back to the game that gave him so much. "Oscar is immensely proud of his Daddy and he was the best father and role model that Oscar could have asked for."

  Mr Voyce is believed to have died attempting to cross Abberwick Ford, near the village of Bolton, Northumberland, which was flooded due to Storm Darragh

  Alnwick Rugby Football Club said it was "deeply saddened" by his death. "The senior players couldn't have enjoyed his sessions more and in recent years he has taken to coaching the minis, and I know he will be a huge miss to them. "Our thoughts are with his wife Anna, son Oscar, mother Christine, sister Emily and the rest of his family. "A great rugby player and an even better man." Mr Voyce, from Truro in Cornwall, played for Wasps, Bath and Gloucester before retiring from the sport in 2013. Among those who paid tribute are England head coach Steve Borthwick. He described Mr Voyce as "a wonderfully gifted rugby player and a truly lovely man". "Tom left a lasting impact on everyone who had the pleasure of knowing him and created memories that will stay with all who watched him play," he said. "On behalf of everyone at England Rugby, we extend our deepest condolences to Tom's family, friends, and loved ones. Our thoughts are with them during this incredibly difficult time."
