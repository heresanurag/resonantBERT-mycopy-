content: |-
  Manette Baillie celebrated her birthday with the record-breaking jump, while aiming to raise £30,000 for charity.

  A 102-year-old woman has become Britain's oldest skydiver after jumping out of a plane at 7,000ft (2,133m) on her birthday.

  Prior to the jump, Manette Baillie, told BBC Radio Suffolk that she did it to raise money for three different charities.

  Mrs Baillie is no stranger to adventure. To celebrate her 100th birthday, she drove around Silverstone in a Ferrari at 130mph (209km/h)

