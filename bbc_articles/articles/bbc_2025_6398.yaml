  The six women, including pop star Katy Perry, took off from Texas on Jeff Bezos' Blue Origin rocket.

  An all-female crew, including pop star Katy Perry, have entered space on Jeff Bezos' Blue Origin rocket.

  It's the first all-female crewed expedition since a solo Soviet mission in 1963.

  Watch the moment the six women blasted off into space from Texas.
