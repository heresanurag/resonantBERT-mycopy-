title: 'Runcorn murder: Three boys arrested after teenager dies - BBC News'
date: '2018-09-08'
section: Liverpool
url: http://www.bbc.co.uk/news/uk-england-manchester-45457421
content: |-
  Three boys are held on suspicion of murdering Eddie O'Rourke who was found outside a Royal British Legion club.

  The victim was fatally injured outside the Royal British Legion club in Halton

  An 18-year-old man has died following a "disturbance" outside a Royal British Legion club.

  Eddie O'Rourke, from The Clough, Runcorn, died in hospital after being found with a "serious injury" in Halton Village at about 20:30 BST on Friday.

  Three boys from Runcorn, aged 15, 16, and 17, have been arrested on suspicion of murder, Cheshire Police said.

  Officers have appealed for information and said the attack was believed to be an "isolated" incident.

  Det Insp Adam Waller said: "Local officers remain in the area to provide reassurance to the community and anyone with any issues or concerns is urged to speak to them."

  He said he was keen to hear from anyone who was driving along Main Street or Castle Road around the time the victim was injured.

  Floral tributes have been left outside the club

