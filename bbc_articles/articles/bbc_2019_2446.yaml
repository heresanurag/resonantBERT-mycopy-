title: 'Australia weather: Queensland floods force Townsville families to evacuate
  - BBC News'
date: '2019-02-02'
section: General
url: http://www.bbc.co.uk/news/world-australia-47101289
content: |-
  Intense rain in north-eastern Australia triggers severe flooding, turning streets into rivers.

  Intense rain in north-eastern Australia has triggered severe flooding, turning streets into rivers, sweeping away cars and forcing families to evacuate.

  The city of Townsville in Queensland has been worst hit, with dozens of homes inundated with water.

  The army is helping with the emergency effort.

  Read more: Monsoon rains cause floods in Queensland
