title: 'Drayton Manor death: Jurors find Evha Jannath died accidentally - BBC News'
date: '2019-11-11'
section: England
url: http://www.bbc.co.uk/news/uk-england-50375840
content: |-
  Evha Jannath fell into the water on a rapids ride at Drayton Manor theme park in 2017.

  Evha Jannath fell out of a circular boat on the Splash Canyon attraction

  A girl who drowned when she fell from a theme park ride while on a school trip died accidentally, an inquest jury has concluded.

  Evha Jannath was unsupervised on the Splash Canyon ride at Drayton Manor in Tamworth, Staffordshire, when she died on 9 May 2017.

  The 11-year-old from Leicester, who could not swim, fell from a boat when it hit a barrier.

  The ride has been closed since, Stafford Coroner's Court heard.

  Evha, who was on an end-of-year school trip with Jameah Girls Academy, was pronounced dead in hospital later the same day.

  The inquest was told she had been standing up and "reaching into the water", breaching the park's rules, before she was "propelled" from the boat.

  CCTV footage played to jurors, showed her wading back towards her friends before climbing an "algae-covered travelator" and then falling off into a "much deeper" section of water.

  She was spotted face down by staff about 11 minutes later before her lifeless body was retrieved.

  Jurors were told the emergency stop button for the rapids ride was not pressed for 10 minutes after staff were informed a child was in the water.

  The inquest had heard Evha fell during her second turn on the ride - on her first she had been accompanied by teachers.

  The Splash Canyon ride has remained closed since Evha's death

  Police told the hearing a member of school staff, who had been assigned to accompany pupils, waited by the exit with another child who had not wanted to board the ride.

  Head teacher Erfana Bora said the teacher acted in line with the school's health and safety policy on the day.

  Ride operator Samuel Read said half the ride was not covered by CCTV cameras. Changes to add more had not yet been brought in.

  The theme park told assistant coroner Margaret Jones the ride would not reopen "in the current format" and until it had the consent of the Health and Safety Executive.

  Returning their conclusion, the jury panel said monitoring of CCTV "did not identify any misbehaviour" and there was "no opportunity" to rewind the footage.

  "The sign at the entrance for the ride does not tell passengers to sit." they said, but the sign did say the ride was "bumpy" and there were "11 worded signs which instructed guests to remain seated and hold the centre ring."

  The coroner said she will write to all UK theme parks urging them to conduct CCTV training.

  In a statement, Evha's famly said: "We have been very upset to learn that Drayton Manor had no life-saving equipment on the ride and no one knew how to rescue Evha.

  "We would like to thank the coroner for the recommendations she is making as to the safety of this and similar rides in the hope that no other family will have to go through what we have had to endure.

  "Evha was a bright and happy young girl who had great hopes for the future. Sadly, we will not be able to see her realise her dreams."

  In a statement, the theme park said: "We would like to express our deep, deep regret for the loss of Evha in what was a tragic accident.

  "Our thoughts have remained with her family, friends and everyone affected since that day."

  The Jameah Girls Academy said the inquest had "given us some insight into the circumstances by which she so sadly lost her life."

  Its statement added: "Our hearts go out to Evha's family, and we hope that this inquest has given them some closure.

  "As a school we will continue to honour Evha's memory."

