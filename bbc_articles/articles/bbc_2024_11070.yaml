title: Parc Prison inmates caught on CCTV beating guard - BBC News
date: '2024-05-09'
section: General
url: http://www.bbc.co.uk/news/uk-wales-68288205
content: |-
  Marzin Moshen, 20, and Finley Phillips, 19, turned on Ryan Young when he tried to break up a fight.

  Two young inmates were caught on camera battering a prison guard inside their jail.

  Inmates Marzin Moshen, 20, and Finley Phillips, 19, turned on guard Ryan Young when he tried to stop them fighting on a wing of Parc Prison in Bridgend.

  A court heard Mr Young was knocked out cold and badly beaten when he tried to intervene.

  Fitness instructor Mr Young was repeatedly punched, stamped on and suffered concussion after being knocked out.

  Moshen and Phillips were sent to a young offender institution for five months and 16 months respectively.
