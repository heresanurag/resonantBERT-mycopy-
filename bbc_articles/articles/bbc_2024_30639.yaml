title: Jubilant Syrians crowd squares for victory rallies - BBC News
date: '2024-12-13'
section: Middle East
url: http://www.bbc.co.uk/news/articles/cge9gd1n5nno
content: |-
  Syrians heeded the rebels' call to celebrate victory over the Assad regime which collapsed on Sunday.

  Umayyad Square in Damascus had a party-like atmosphere with music and celebrations

  Thousands of Syrians have thronged the streets of the capital, Damascus, and other cities to celebrate the fall of the regime of Bashar al-Assad. In Damascus people gathered at the iconic Umayyad Mosque for prayers before the jubilant rallies called by the Islamist rebels who led the armed uprising against Assad. Rebel leader Abu Mohammed al-Jolani, who has now started using his real name, Ahmed al-Sharaa, had urged Syrians "to go to the streets to express their joy" on Friday to mark "the victory of the blessed revolution". Assad fled to Russia on Sunday as the regime set up by his father 50 years ago collapsed in just a few tumultuous days.

