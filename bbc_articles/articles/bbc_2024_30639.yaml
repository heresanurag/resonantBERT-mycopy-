  Damascus's Umayyad Square had a party-like atmosphere. Speakers were set up, and music played "Raise your head high, you are Syrian." People waved the flag of the Syrian opposition and chanted revolutionary songs and slogans. Among them were men in black combat gear - wearing body armour and carrying guns. They were members of the rebel group Hayat Tahrir al-Sham (HTS). Some paused for pictures with civilians. One of them pulled out a piece of paper and started reading poetry he had written praising the country. Sara al-Zobi, a university student living in Damascus but originally from Deraa - the city the opposition regard as the birthplace of the revolution - said Syrians had gathered to celebrate on Friday and would proceed to build the future "hand-in hand". "We are gathering because we're happy Syria has been freed, we're happy to have been liberated from the prison in which we lived," said another participant, Nour Thi al-Ghina.
