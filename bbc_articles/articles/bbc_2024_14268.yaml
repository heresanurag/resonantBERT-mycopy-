content: |-
  The striker was caught exceeding the 70mph speed limit on the M60 in Manchester in December 2023.

  Marcus Rashford was speeding on the M60 in Manchester

  Manchester United footballer Marcus Rashford has admitted speeding on a motorway, court officials have confirmed. The striker was caught exceeding the 70mph speed limit in his Rolls-Royce car on the M60 in Manchester in December 2023. The exact speed Rashford was travelling at was not available on the court record. He could face a hefty fine or a driving ban at a hearing expected to take place on 27 September.

  Rashford missed out on selection for the England squad in the upcoming Euro 2024 tournament after a difficult season, when he scored eight times for United. At the end of May, he tweeted he would take time away from social media “for a few weeks... to rest and reset mentally after a challenging season”. Rashford was also involved in a car crash after returning to the Manchester United training base in Carrington in September following a match. After collecting his own car he was involved in a collision with another car. He did not require medical attention and no arrests were made. Rashford's representatives have been contacted for comment.
