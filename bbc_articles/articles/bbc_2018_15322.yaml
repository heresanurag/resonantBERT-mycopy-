  Solskjaer spent 11 seasons at Old Trafford, scoring the winning goal in the 1999 Champions League final, and said his return "feels like coming home".

  When asked about his status as a fan favourite, he jokingly replied: "How long will that last?"

  He also promised fans that he would "give everything" to "bring the club success" and get players "enjoying football".

  "We have to get used to winning again and challenging for trophies," he added.

  "Whatever has happened has happened and everyone starts with a clean slate."

  Solskjaer's first match in charge will be at Cardiff - where he had an eight-month spell as manager in 2014 - on Saturday at 17:30 GMT.

  He was relegated from the Premier League with the Bluebirds in 2014, then sacked after a poor start to the Championship campaign.

  In his first spell as manager of Molde from 2011 to 2014, he won the Norwegian league twice and Norwegian Cup once. He returned to the club in 2015 and signed a new deal there earlier this month.

  "The more mistakes you make, the more you learn and I've made a few mistakes," he said.

  "I've won the league, I've won the cup but I've also been relegated so I'm getting to know the occupation."

  Michael Carrick and Kieran McKenna, both part of Mourinho's coaching staff, will continue to work under Solskjaer.

  Solskjaer said he felt he needed to bring in the "experience" of Mike Phelan, who returns as first-team coach having previously worked as United assistant manager alongside Sir Alex Ferguson.

  "He's done it all, is an incredible calming influence on me and his football knowledge is really good," added Solskjaer.
