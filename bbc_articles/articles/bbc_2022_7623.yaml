title: 'Monmouth: Three held after man assaulted in street - BBC News'
date: '2022-06-26'
section: Wales
url: http://www.bbc.co.uk/news/uk-wales-61938138
content: |-
  A man is in hospital after he was discovered with serious injuries in the early hours.

  Monnow Street in Monmouth has been closed while police remain at the scene

  A man has suffered serious injuries after being found unconscious in an alleged assault.

  The 43-year-old was taken to hospital after being found in Monnow Street, Monmouth, at about 01:15 BST.

  Gwent Police arrested a 21-year-old man and two others, both aged 19, on suspicion of assault. Monnow Street was closed while police investigated.

  The injured man, from Poole in Dorset, is being treated at University Hospital of Wales in Cardiff, the force said.

  The man was found unconscious in the street in the early hours

