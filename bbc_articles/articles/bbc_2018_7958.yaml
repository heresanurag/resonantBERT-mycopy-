  • None We'll do anything for each other - Kane

  As he conducted his final media briefing before Sweden, Southgate summed up England's World Cup campaign when quizzed on the lack of clean sheets in their four games.

  "It just shows we still have room for improvement," said Southgate. "We've made progress. The style of play has improved enormously over the last 12 months. We're controlling games with the ball but we can create more chances and we can defend better."

  England have looked reasonably solid in defence but clean sheets count in this knockout stage and there is no doubt they must create more in open play.

  Captain Harry Kane leads the race for the World Cup's Golden Boot with six goals but three have been penalties, two as a result of corners and another an unwitting deflection from Ruben Loftus-Cheek's shot.

  Kane relishes the weight on his shoulders as captain but now is the time for Raheem Sterling to come to the party after 23 England games without a goal.

  Southgate himself praised Dele Alli's work without the ball against Colombia but accepted England need to work to benefit from his late runs into the area that mark him out as a special talent.

  Kieran Trippier has been an outstanding supply line but Kane now needs and deserves more from others.

  The upside for Southgate and England is if they have come this far carrying those two very curable flaws, how far can they go once the solution has been found?
