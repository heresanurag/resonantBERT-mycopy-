  • None England have shown why we can win this World Cup - Shearer

  Russia has offered another dramatic shift in climate for England after they landed in Samara, on the banks of the River Volga, from their headquarters at Repino, on the Gulf of Finland.

  Repino was hit by heavy rain in the days before departure and England arrived in Samara to scorching heat, with temperatures predicted to be around 30C at kick-off time on Saturday.

  There has even been a kilometre-long beach constructed in Samara to enhance the carnival atmosphere of Russia's hugely successful World Cup and England will hope the party does not end here.

  England have coped with similar changes in temperature against Tunisia in Volgograd and Panama in Nizhny Novgorod and, of course, it is the same for Sweden.

  Southgate, as he has been throughout, was measured and self-effacing as he completed media duties in the magnificent Samara Stadium but there is that inner steel and he senses this England team has an opportunity to write history.

  While Southgate outlined the improvements he wants on the pitch, captain Kane gave an insight into the mood off the pitch and the unity that has characterised England's squad.

  He talked of them being like brothers - Kane presumably the head of that particular branch of the family - and he will hope this happy band can have more stories to share when they return to Repino.

  England might have to dig in for another attritional battle against the country that almost always seems to make life difficult for them.

  They have met 24 times in total, England winning eight, drawing nine and losing seven. In World Cups and Euros they played four times - winning one, drawing two and losing one.

  England, apart from the rout against hapless Panama, have hardly been peppering the goal while Sweden, the epitome of defensive discipline, advanced by digging out a 1-0 win against Switzerland thanks to a deflected shot from Emil Forsberg, their main creator.

  There will be no shortage of tension no matter how this World Cup quarter-final plays out - that will be provided by the huge stakes on offer.
