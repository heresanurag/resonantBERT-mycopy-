title: 'England v Sweden: Three Lions have golden chance to succeed at World Cup -
  BBC Sport'
date: '2018-07-07'
section: General
url: http://www.bbc.co.uk/sport/football/44748334
content: |-
  England will face Sweden on Saturday in their biggest World Cup game since losing to West Germany on penalties in the semi-finals at Italia 90.

  Coverage: Live on BBC One and online; full radio commentary on BBC Radio 5 live and text commentary and in-play clips online and on BBC Sport app

  England will step out in the steamy heat of Samara on Saturday to face Sweden in what is their biggest World Cup game since losing to West Germany on penalties in the semi-finals at Italia 90.

  Yes, they have reached World Cup quarter-finals since, losing to eventual winners Brazil in Shizuoka in Japan in 2002 and in a penalty shootout to Portugal in Germany four years later.

  But this just feels different. This feels like a pathway towards their first World Cup final since 1966 has opened up in front of England thanks to the failures of holders Germany and a kinder draw thanks to finishing second behind Belgium in Group G.

  England were underdogs against Brazil in Japan and giants like France awaited even if they had passed Portugal in Gelsenkirchen in 2006.

  Here, at what is turning into a classic World Cup, England must find a way past Sweden then beat the winners of the other last-eight game between Croatia and hosts Russia to reach the final on Sunday week.

  England will feel they can achieve that - they would have settled for this in a heartbeat before the World Cup started. And Sweden, Croatia and Russia will be feeling exactly the same.

  When England started the serious work in Russia at their secluded and peaceful Zelenogorsk training base almost four weeks ago, the wisdom stated that a place in the quarter-final would represent respectability, an outcome manager Gareth Southgate and the Football Association could present as tangible progress.

  England could still do that - but what an opportunity has presented itself for Southgate and this popular group of players, who have none of the egos, cliques and sideshows that have overtaken them at previous tournaments.

  Southgate and his squad will still return home with reputations intact, and some enhanced, no matter how events unfold in Samara.

  There will, however, be a burning disappointment if they do not take this World Cup campaign into its final week.
