title: Nine held after knife attack on two men in Bristol - BBC News
date: '2024-06-09'
section: Bristol
url: http://www.bbc.co.uk/news/articles/c722xy80nrlo
content: |-
  Two men in their 20s were taken to hospital with knife wounds, with one in a serious condition.

  Nine held after knife attack on two men

  There is a large police presence and cordon at Easton Way

  Nine people have been arrested following a knife attack in Easton that left two people injured, one seriously, police have said. A cordon remains in place following the assault near Rawnsley Park, Bristol, at about 04:40 BST. Officers said two men in their 20s had been taken to hospital with knife wounds, with one in a serious condition. Nine people had been arrested on suspicion of attempted murder and remained in police custody, Avon and Somerset Police said.

  Forensics officers are at the scene on Easton Way

  Officers believe the victims and suspects are known to each other. Easton Way is closed between the junction with Stapleton Road and Pennywell Road. There is also no access to Easton Way from Old Market. Police are seeking witnesses from the Stapleton Road and Rawnsley Park area between 04:15 and 05:00. Neighbourhood Policing Ch Insp Scott Hill said: "This is a significant incident and I am conscious there have been a number of similar incidents of this nature over the past few months. "I also understand there is a great deal of concern among the community around knife crime. "We remain dedicated to reducing serious violence and knife crime, especially among young people," said Ch Insp Hill.

  There is also a police presence at Rawnsley House

  Rawnsley Park has been cordoned off

  News outlets and other organisations in Bristol signed an open letter in March calling for an end to "the scourge of knife crime". "Earlier this year, we launched a proactive operation targeting serious violence and knife crime," said Ch Insp Scott Hill. "We are working closely with partners to identify and tackle the root causes."
