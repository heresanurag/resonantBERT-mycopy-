  • None Dawson: Fans will be chuffed with England's new style Barclay selected four Irishmen, four Frenchmen, three Italians, two Englishmen and two Scots, with Garbisi at fly-half. "He kicked well and put Italy in the right parts of the field," said Barclay. "Italy have struggled with their game management over the years, but he controlled the game and his ability to get that Italian team going was brilliant." Le Garrec stood out after inspiring France's revival in their final two games. Barclay added: "The big question was what would France do without Antoine Dupont. Nolann Le Garrec showed if Dupont is not around for a while, it may not be all doom and gloom because he was sensational." In the pack, George Turner was selected at hooker. "He's been Scotland's best player," said Barclay. "He's physical, direct and powerful. He shows real urgency in go-forward, looks after the ball really well and is a destructive tackler." Warburton picked four Irishmen, four Englishmen, four Frenchmen, two Italians and one Welshman, with Ford steering the attack from fly-half. "England's attack as a team has started to click and the last two rounds [against Ireland and France] have really elevated George Ford," Warburton said. "I think he is a great game manager." Warburton admitted he had "cheated" slightly by picking Italy wing Monty Ioane out of position at full-back. "I know Monty Ioane is not a 15 and I've cheated a bit there but he was so good with his metres made and his one-on-one ability," said Warburton. "He is a game changer." And he could not leave out 22-year-old Martin, saying: "I know he's only started two games but he is a serious player with his ferocity and physicality." If you are viewing this page on the BBC News app please click here to vote.
