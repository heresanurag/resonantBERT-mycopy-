  John Barclay and Sam Warburton pick different fly-halves in their teams of the tournament. Who do they pick?

  Six Nations 2024: Team of the tournament - BBC pundits Sam Warburton and John Barclay pick their XVs Last updated on .From the section Rugby Union

  Six Nations Rugby Special: John Barclay & Sam Warburton pick team of the tournament BBC pundits John Barclay and Sam Warburton have named their Six Nations teams of the tournament. England lock George Martin and France scrum-half Nolann Le Garrec, who both only started two games, are among five players included in both XVs. The others are France prop Uini Atonio, England number eight Ben Earl and Italy centre Tommaso Menoncello. At fly-half, former Scotland captain Barclay opts for Italy's Paolo Garbisi, with ex-Wales skipper Warburton choosing England's George Ford. Ireland retained their Six Nations title on the final day but do not dominate either side, while only two Scotsmen and one Welshman are included. Meanwhile, both pundits chose "world-class" Earl as their player of the tournament, but also picked out 21-year-old Menoncello for special praise.
