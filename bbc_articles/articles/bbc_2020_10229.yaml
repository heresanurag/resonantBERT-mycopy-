id: bbc_2020_10229
title: 'Coronavirus: UK pledges support to global vaccine-sharing scheme - BBC News'
date: '2020-09-26'
section: General
url: http://www.bbc.co.uk/news/uk-54309525
content: |-
  Prime Minister Boris Johnson has announced the UK will give £500m to a new global vaccine-sharing scheme.

  The Covax vaccines procurement pool, aims to help poorer countries access a coronavirus jab when one is developed.

  Addressing the United Nations General Assembly via a pre-recorded video, the prime minister said 'the health of every country depends on the whole world having access to a safe and effective vaccine'.
