title: 'Ukraine war: Minesweeping dog helps clear Chernihiv of Russian explosives
  - BBC News'
date: '2022-04-17'
section: General
url: http://www.bbc.co.uk/news/world-europe-61099213
content: |-
  Patron, a Jack Russell, has so far helped to remove hundreds of explosive devices.

  A Jack Russell has been hard at work helping to remove explosive devices left behind by Russian troops.

  Patron is currently working in the Chernihiv region, north of Kyiv, and has so far helped to remove hundreds of devices.
