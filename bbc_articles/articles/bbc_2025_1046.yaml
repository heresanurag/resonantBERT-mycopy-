content: |-
  Couples fill Coventry Cathedral with family and friends to renew their commitment to each other.

  • None The layout of Coventry Cathedral was transformed for the event
  • None In the run-up to the event, BBC CWR heard from several couples with maybe unconventional love stories - from a "lunch out ploy proposal" to a "romantic postie" acting out a scene from Love Actually Slide 1 of 2 , The central area of Coventry Cathedral with people sat in long rows facing each other and two presenters stood in the middle , The layout of Coventry Cathedral was transformed for the event

  Dozens of people confirmed their love for each other on a special Valentine's Day event at a city cathedral. Organised by BBC CWR, the We Still Do celebration saw 80 couples fill Coventry Cathedral with family and friends to renew their commitment to each other. Some turned up in their original wedding outfits, several now had children in tow - and one couple even brought their beloved dog with them. Guests were also treated to a surprise appearance from pop star Pixie Lott as well as a reading from actor Yasmin Wilde - with the event streamed live on the BBC iPlayer.
  • None Pixie Lott, who has had three UK number ones and took part in Strictly Come Dancing, performed two songs on Friday - a cover of Coldplay's All My Love and her new single Show You Love
  • None Several women wore their wedding dresses and spontaneous clapping broke out as Pixie Lott sang
  • None "It was so special to be a tiny part of this monumental day," the singer said, "it felt like a really magical vibe"
  • None "I feel a bit bad for my husband as I feel this has been the best Valentine's Day ever because it's felt so special," Lott said Slide 1 of 4 , Singer in a red dress performs in the central aisle, watched by guests at Coventry Cathedral , Pixie Lott, who has had three UK number ones and took part in Strictly Come Dancing, performed two songs on Friday - a cover of Coldplay's All My Love and her new single Show You Love

  As part of the ceremony, the couples were invited to say these words: Today, I choose you again, as I did then, as I will always. I promise to keep building with you, to listen, to laugh, to stand beside you. To honour the love we have made, to cherish the life we are creating. Time may leave its marks upon us, but it cannot wear away the truth: You are my beloved, my partner, my gift. I promise— again and always—to be yours.

