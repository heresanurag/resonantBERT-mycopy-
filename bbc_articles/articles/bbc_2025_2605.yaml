content: |-
  The victim stabbed at a school in Sheffield on Monday has been named locally as Harvey Willgoose.

  Boy, 15, dies after being stabbed at school

  The teenager who died has been named locally as Harvey Willgoose

  A 15-year-old boy has died after being stabbed at a school in Sheffield, police have said. The boy, named locally as Harvey Willgoose, was injured at All Saints Catholic High School, in Granville Road in the city, at about 12:17 GMT. Police and paramedics were called but the teenager died a short time later. A 15-year-old boy has been arrested on suspicion of murder and remains in police custody, South Yorkshire Police said.

  Assistant Chief Constable Lindsey Butterfield told a press conference the force was working "at pace to build a full picture of what had happened and how this tragedy unfolded". "We urge you to be mindful that there are loved ones at the centre of this," she added.

