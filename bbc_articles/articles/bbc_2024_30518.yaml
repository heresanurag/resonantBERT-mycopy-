title: PinkNews boss suspended from NHS job after BBC investigation - BBC News
date: '2024-12-12'
section: General
url: http://www.bbc.co.uk/news/articles/ce908k1z8r3o
content: |-
  The BBC heard claims Dr Anthony James kissed and touched a younger PinkNews colleague at a party.

  Benjamin Cohen, left, and husband Anthony James are accused of sexual misconduct by PinkNews staff

  PinkNews director Dr Anthony James has been suspended from his job in the NHS, after a BBC News investigation heard allegations of sexual misconduct at the publisher. Bedfordshire Hospitals NHS Foundation Trust said they made the decision to suspend Dr James from his role as associate non-executive director pending further information. Representatives for PinkNews founder Benjamin Cohen and his husband, the site's Chief Operating Officer Dr James, told the BBC they were not able to provide a statement at this time in relation to the original claims made to the BBC, but that their position is that the allegations are false. The BBC has contacted representatives for Dr James about his suspension.

  A BBC investigation spoke to more than 30 former and current workers at PinkNews, the world's largest LGBT News website. They said that a heavy drinking culture at the company had led to instances of sexual misconduct and inappropriate behaviour from both Mr Cohen and Dr James. As part of the investigation, the BBC spoke to five former members of PinkNews staff who say they saw Dr James kissing and touching a younger colleague, who was described as "too drunk to consent." Others described a toxic work culture and a fear of speaking out due to the fact the two most senior bosses at the website were a married couple. When contacted about the original investigation, representatives for Mr Cohen and Dr James told the BBC they were not able to provide a statement at this time, but that their position is that the allegations are false.

  When a company that usually breaks the stories, becomes the story.

  Following the publication of the investigation, more than 10 former PinkNews staff members have come forward to share their experiences of working there. As well as his role at PinkNews, Dr James also served part-time as an associate non-executive director in the NHS. The role, described by the NHS as a "step up" role, was designed to allow people with potential to become non-executive directors to get more experience working on an NHS board. Bedfordshire Hospitals NHS Foundation Trust told the BBC it was "aware of allegations made on the BBC against Dr Anthony James, associate non-executive director, in his role as PinkNews' chief operating officer." A spokesperson for the trust added: "Following these allegations, we made the decision on Tuesday 10 December to suspend him from his associate non-executive role pending further information." There is no suggestion of any wrongdoing during Dr James' time with the NHS. The BBC contacted representatives for Dr James for comment on his suspension.
