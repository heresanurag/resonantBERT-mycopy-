  Leading LIV Golf player to get spot in The Open

  Cameron Smith won The Open in 2022 and joined LIV Golf the following month

  The leading LIV Golf League player not already exempt for this year's Open Championship will gain entry to the field for Royal Portrush. The highest-placed player in the top five of the circuit's standings after its June event in Dallas who has not already qualified will be awarded the spot. The 153rd Open takes place on the Northern Irish club's Dunluce course from 17 to 20 July. The USGA last week announced that the US Open, which takes place from 12 to 15 June at Oakmont Country Club in Pennsylvania, is offering an exemption to one leading LIV player. "The Open is a global championship for the best men's golfers and each year we review our exemptions to ensure we offer pathways into the championship based on results achieved on the leading professional tours," said Mark Darbon, the chief executive of the R&A, which runs The Open. "We acknowledge that players competing in LIV Golf should also have the opportunity to secure places in The Open through its individual season standings as well as existing pathways. "We are proud to offer a wide range of opportunities to qualify globally and look forward to seeing which golfers will emerge to take their place at Royal Portrush in July."

  The Masters and the US PGA Championship have previously awarded special exemptions to LIV's Joaquin Niemann while Sergio Garcia also received an invitation for the US PGA. Niemann and Garcia finished second and third respectively in the Saudi Arabian-funded breakaway circuit's individual standings for 2024 behind Jon Rahm. Rahm already has an exemption for all of this year's majors based on his victories in the 2021 US Open and 2023 Masters. Bryson DeChambeau, Brooks Koepka, Cameron Smith, Dustin Johnson and Phil Mickelson are also exempt for The Open as a result of their performances in past championships. The PGA Tour has been in protracted negotiations with LIV's backers, the Saudi Public Investment Fund, in an attempt to resolve the split in world golf.
