title: Israel will remain in Gaza 'security zones' after war, minister says - BBC
  News
date: '2025-04-16'
section: Middle East
url: http://www.bbc.co.uk/news/articles/c4g2775v853o
content: |-
  Israel Katz said Israel would continue its six-week blockade of all supplies, despite the UN warning of "devastating" consequences.

  Israeli troops will remain in Gaza 'security zones' after war, minister says

  Residents said there were fresh Israeli strikes in the south-west of Jabalia overnight

  Israel's defence minister has said troops will remain in so-called security zones they have established by seizing large areas of Gaza even after an end to the war. Israel Katz said the zones would provide a "buffer" to protect Israeli communities "in any temporary or permanent situation", and that "tens of per cent" of the Palestinian territory had been added since the Israeli offensive resumed three weeks ago. Israel would continue its six-week blockade of humanitarian aid to pressure Hamas to release hostages, he said, despite the UN warning of "devastating" consequences. On Wednesday Médecins Sans Frontières (MSF) became the latest international organisation to sound alarm at the impact of Israel's campaign, saying that Gaza had been "turned into a mass grave of Palestinians and those coming to their assistance".

  "We are witnessing in real time the destruction and forced displacement of the entire population in Gaza," Amande Bazerolle, the charity's emergency co-ordinator in Gaza, said. Gaza's Hamas-run health ministry has said more than 1,650 people have been killed since the war resumed on 18 March. Hospital officials said at least 24 Palestinians were killed in Israeli strikes across Gaza on Wednesday. The majority of those reported killed were in Gaza City, in the north. They included 10 members of the Hassouna family, mostly children and women. One of them was Fatema Hassouna - a young writer and photographer. The BBC has asked the Israeli military for comment on the strike.

  The UN says 69% of the territory is now under active Israeli military evacuation orders, within a "no-go" zone running along the borders with Israel and Egypt and the Wadi Gaza valley south of Gaza City, or both. Some 500,000 people have been newly displaced or uprooted once more, with no safe place to go, it estimates. The Israel Defense Forces (IDF) has said it has killed "hundreds of terrorists" in strikes while troops have advanced into several areas in the north and the south. It has established a new corridor that cuts the southern city of Rafah off from neighbouring Khan Younis and has designated 30% of Gaza as an "operational security perimeter". On Wednesday, Israel Katz said Israel's policy was to "first and foremost make every effort to bring about the release of all hostages" still being held there and to "build a bridge to defeat Hamas later on". "Unlike in the past, the IDF is not evacuating areas that have been cleared and seized," he said. "The IDF will remain in the security zones as a buffer between the enemy and [Israeli] communities in any temporary or permanent situation in Gaza - as in Lebanon and Syria." Hamas has insisted Israeli forces must withdraw from Gaza under any permanent ceasefire. "Any truce lacking real guarantees for halting the war, achieving full withdrawal, lifting the blockade, and beginning reconstruction will be a political trap," the group said on Wednesday, according to Reuters news agency. The Hostages and Missing Families Forum in Israel, which represents many hostages' relatives, called Katz's plan an "illusion". "They promised that the hostages come before everything. In practice, however, Israel is choosing to seize territory before the hostages," it said. "There is one obvious, practical, solution and it is to release all of the hostages in one stage with an agreement, even at the cost of ending the war." Israeli military reservists and veterans have recently signed several open letters calling for the return of the hostages to be prioritised over fighting Hamas.

  An estimated 500,000 Palestinians have been displaced again since Israel resumed its offensive last month

  Katz also made clear that Israel would maintain its blockade of Gaza - it has blocked the entry of all food, medicine and other supplies since 2 March. "Israel's policy is clear: no humanitarian aid will enter Gaza, and blocking this aid is one of the main pressure levers preventing Hamas from using it as a tool with the population," he said. UN agencies strongly reject the Israeli government claim that there is no shortage of aid in Gaza because 25,000 lorry loads of supplies entered during the ceasefire, and suggest the blockade could breach international humanitarian law. The UN's humanitarian partners say tents are no longer available for distribution and that there has been a rise in acute malnutrition, with the number of children who received supplementary feeding decreasing by more than two thirds in March. In its statement, MSF said the humanitarian response was "severely struggling under the weight of insecurity and critical supply shortages, leaving people with few, if any, options for accessing care". MSF said two of its staff had been killed over the past two weeks and called the killing of 15 emergency workers by Israeli troops last month "yet another example of the complete disregard shown by Israeli forces for the protection of humanitarian and medical workers". It also said it was facing shortages in medications for pain management and chronic illnesses, antibiotics and critical surgical materials.

  The Israeli military launched a campaign to destroy Hamas in response to an unprecedented cross-border attack on 7 October 2023, in which about 1,200 people were killed and 251 others were taken hostage. At least 51,025 people have been killed in Gaza since then, according to the territory's health ministry. Many of the 1.9 million displaced people returned to the home areas during the recent ceasefire, which began on 19 January. That ceasefire saw Hamas release 33 Israeli hostages - eight of them dead - in exchange for about 1,900 Palestinian prisoners in Israeli jails, a surge in humanitarian aid entering Gaza, and the withdrawal of Israeli troops from populated areas. Israel blocked supplies to Gaza on 2 March and resumed its offensive two weeks later. It said Hamas had refused to accept a proposal to extend the ceasefire deal's first phase and release of more of the 59 hostages it is still holding, up to 24 of whom are believed to be alive. Hamas accused Israel of violating the original deal, according to which there would be a second phase where all the remaining living hostages would be handed over and the war brought to a permanent end. A senior Palestinian official told the BBC on Tuesday that Hamas had rejected a new Israeli proposal for a six-week ceasefire in exchange for the release of half of the living Israeli hostages and disarmament of the armed group. On Wednesday, sources close to the Israeli prime minister's office told the Haaretz newspaper that Israel had not yet received an official reply from Hamas. The allied armed group Palestinian Islamic Jihad meanwhile released a new video showing the Israeli-German hostage Rom Braslavski. In the video, in which he appears to be speaking under duress, the 21-year-old appealed to the US and Israeli governments to secure his release. Germany's ambassador to Israel, Steffen Seibert, said it was painful to see him "cruelly paraded in a video". "The terrorists must release him and all hostages now. And to everyone involved in the talks: no duty is more pressing than their return," he added.
