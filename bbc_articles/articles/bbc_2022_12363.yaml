title: Queen's coffin carried to Westminster Abbey - BBC News
date: '2022-09-19'
section: General
url: http://www.bbc.co.uk/news/uk-62928806
content: |-
  The Queen's children and grandchildren followed the state gun carriage of the Royal Navy.

  A bearer party of the Queen's Company, 1st Battalion Grenadier Guards, lifted the Queen's coffin from the catafalque in Westminster Hall and carried it in procession to the state gun carriage of the Royal Navy.

  King Charles III, his sister Princess Anne, and his brothers, Princes Andrew and Edward then walked behind in procession to Westminster Abbey.

  Also following the Queen's coffin were Princes William and Harry, and Peter Phillips, who is the son of Princess Anne and one of the Queen's other grandsons.
