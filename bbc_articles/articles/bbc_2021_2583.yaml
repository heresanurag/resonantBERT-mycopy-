content: |-
  First Minister Nicola Sturgeon says the youngest pupils will start to go back to classrooms first.

  The smallpox virus was able to be eradicated because the pustules it caused made it clear who was infected Image caption: The smallpox virus was able to be eradicated because the pustules it caused made it clear who was infected

  Government ministers and their scientific advisers argue that vaccination and new treatments will reduce the death rate and allow us to live with coronavirus, rather than constantly trying to fight it.

  Wiping Covid from the face of the Earth would, of course, be great given the death and destruction it has caused.

  But the only problem with that is that eradication has only been achieved with one virus before - smallpox in 1980.

  It took decades to get to that point, and scientists and governments were only able to achieve this because of a pretty unique set of circumstances. Firstly, the vaccine was so stable it didn't need to be refrigerated, and when it was given it was immediately obvious whether it worked or not - a pustule developed.

  It was also clear when someone was infected - a lab test was not needed, which was a huge advantage in trying to contain outbreaks.

  Covid, as we are all too well aware, is completely different.
