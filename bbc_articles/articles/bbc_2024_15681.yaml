title: Blackpool fire death parents were 'bubbly, caring people' - BBC News
date: '2024-07-18'
section: Lancashire
url: http://www.bbc.co.uk/news/articles/cye07305z8do
content: |-
  A couple died and two children were injured when a fire broke out at a house in Blackpool.

  The fundraiser for Josh Pearson and Danielle Bamber has so far raised more than £2,000

  A couple who were killed in a house fire have been described as loving parents who were "always making memories with their kids". Josh Pearson, 28 and Danielle Bamber, 24, died after a fire at their home in Peter Street, Blackpool, in the early hours of Wednesday. A 20-month-old boy remains in hospital in a "poorly condition", while a six-year-old boy was treated for minor injuries, Lancashire Police said. The force said an investigation was under way into the cause of the blaze but so far it had found no evidence it started deliberately.

  Firefighters and officers were called to the house at 02:39 BST on Wednesday

  A tribute from Mr Pearson's family issued by Lancashire Police said: "Joshua was a much-loved son, that will be sorely missed, who adored his girlfriend and children." While the force said the woman had yet to be formally identified, it was thought Ms Bamber had died and shared a statement from her family. It said: "We as a family are devastated by what has happened to Danielle, our daughter, and her family. "Please allow us respect as a family to grieve in peace and refrain from any further speculation on social media and to refrain from posting further pictures of Danielle and her family. "Please respect our wishes at our time." Ms Bamber's best friend Codie Lee, who set up a GoFundMe appeal for the family, said the couple were "outgoing, bubbly and caring people". Ms Lee praised the "amazing" Blackpool community for making donations of everything "from toys to beds and duvets".

  Mr Pearson (L) was a loving son who adored his girlfriend Ms Bamber (R) and their children, his family says

  Police said firefighters and officers were called to the home at about 02:40 BST on Wednesday to reports of a blaze with people inside. Ms Bamber died at the scene, while Mr Pearson was taken to Blackpool Victoria Hospital but was confirmed dead a short time later. Detectives said they were keeping an "open mind" as to the cause. No arrests have been made. The force again urged people to avoid "unhelpful and upsetting speculation" which, it said, was adding to the family’s distress. Lancashire Police Ch Supt Mike Gladwin said it was an "absolutely heartbreaking incident" and his thoughts were with the family's loved ones at this "extremely distressing time". “I know news of this incident will have deeply affected people in the local area and further afield and I would like to thank the community for their support and understanding,” he added.

