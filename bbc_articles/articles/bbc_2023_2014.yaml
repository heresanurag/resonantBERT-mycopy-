title: 'Six Nations 2023: Deadline day arrives for Wales v England match in Cardiff
  - BBC Sport'
date: '2023-02-22'
section: General
url: http://www.bbc.co.uk/sport/rugby-union/64725372
content: |-
  The decision on whether Wales' Six Nations match against England goes ahead reaches the Wednesday deadline set by Welsh players.

  Last updated on .From the section Welsh Rugby

  The decision on whether Wales' Six Nations match against England goes ahead has reached the deadline day of 22 February set by Welsh players.

  Saturday's game is in doubt with Wales players threatening not to play because of a dispute with Welsh rugby bosses over contracts.

  Wales head coach Warren Gatland had said he was hopeful the matter would be resolved on Tuesday despite delaying naming his team.

  A resolution has yet to materialise.

  This takes matters into the deadline day the Wales players have set of Wednesday for the issues to be resolved as talks continue.

  Gatland revealed a training session on Tuesday afternoon had been cancelled so players could continue negotiations and said the threat from the national squad not to play against England was genuine.

  There are meetings on Wednesday between the players and the Professional Rugby Board (PRB), which runs the professional game in Wales and is made up of representatives from the Welsh Rugby Union (WRU) and four regions - Cardiff, Dragons, Ospreys and Scarlets.

  The PRB met in the morning and addressed Wales' professional players in the afternoon.

  The players want three issues resolved before they agree to take the field at Principality Stadium for a match worth close to £10m for Welsh rugby.
  • None The removal of the 60-cap selection rule in Wales whereby a player plying his trade outside the country cannot be picked unless he has made at least that number of Test appearances
  • None The removal of Welsh rugby bosses' demand that players accept 80% in set wages, with 20% available in bonuses

  PRB chair Malcolm Wall has said the 60-cap rule is under review and it is believed they are considering bringing the requirement down to between 25 and 40 caps.

  However, Wall stated his organisation was intent on pressing ahead with the fixed/variable contracts which mean players are only guaranteed 80% of salaries.

  It is understood the PRB are considering a concession on this issue as they weigh up a renegotiation or a removal.

  Wall also said the PRB will invite the WRPA to be represented at meetings and that an official position on the board would have to be formalised.

  Gatland, who said he was unaware of the severity of the issue when he decided to return to Wales after predecessor Wayne Pivac's departure in December 2022, says his players will be in the right frame of mind to play if the match goes ahead.

  "I don't think there is going to be any lack of motivation for a player playing against England," he said.

  "If things are resolved they will be completely focused on the game."
