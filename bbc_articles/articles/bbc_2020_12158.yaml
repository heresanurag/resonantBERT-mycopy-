title: Southampton police officer stabbed several times - BBC News
date: '2020-10-16'
section: Hampshire & Isle of Wight
url: http://www.bbc.co.uk/news/uk-england-hampshire-54561673
content: |-
  A 51-year-old man is arrested on suspicion of attempting to murder the officer in Southampton.

  The officer was checking on the welfare of a man on Portswood Road when he was attacked

  A man has been arrested on suspicion of attempting to murder a policeman who was stabbed multiple times.

  The 43-year-old officer was responding over concern for a man living in Portswood Road, Southampton, at about 12:00 BST on Thursday.

  Hampshire police said the officer suffered "serious, but not life-threatening, injuries" and had to stay in hospital overnight.

  The arrested man, a 51-year-old from Southampton, remains in custody.

  The officer was called to Portswood Road in Southampton at about 12:00 BST on Thursday

  Peter Crawford, who lives in the road, said it appeared the policeman had an injured arm.

  He said: "I saw all these police cars... and there was a guy at the front of one - I didn't realise he was a policeman at the time - I saw him bandaging his arm up.

  "And I saw a guy come out with the police with handcuffs on behind his back."

  Zoe Wakefield, who chairs Hampshire Police Federation, said the injured policeman was with a colleague when he was attacked and has since been released from hospital.

  She said: "The officers acted very bravely and I think the situation could have been a lot worse."

  A force spokesman said detectives were working to establish the exact circumstances of the attack.

  Det Ch Insp Dave Brown said officers were conducting inquiries, including house-to-house visits, and examining CCTV footage.

  "At the same time, we are providing support to the officer's family and his colleagues following this incident," he said.

  The force did not believe there was any wider risk to the public, Det Ch Insp Brown added.

