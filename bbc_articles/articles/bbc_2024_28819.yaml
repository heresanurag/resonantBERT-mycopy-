title: US Capitol Christmas tree arrives in Washington DC - BBC News
date: '2024-11-22'
section: General
url: http://www.bbc.co.uk/news/videos/cp87rdj8kk2o
content: |-
  This is the second US Capitol Christmas Tree to come from Alaska.

  An 80-foot Sitka spruce has arrived in the US capital city of Washington DC.

  Also known as the People's tree, the spruce travelled 700 miles by sea and nearly 4,000 miles by land from Wrangell, Alaska, before arriving in from of the Capitol building.
