title: 'Czech Republic: ''Apocalyptic'' scenes after tornado - BBC News'
date: '2021-06-25'
section: General
url: http://www.bbc.co.uk/news/world-europe-57619807
content: |-
  Footage shows the tornado tearing through part of the Czech Republic and the devastation left behind.

  A rare tornado has swept through several villages in the Czech Republic, killing five people and leaving more than 150 others injured.

  One eyewitness filmed the tornado toppling trees before it smashed through the window they were standing beside on Thursday.

  Later pictures show the extent of the damage left in its wake.
