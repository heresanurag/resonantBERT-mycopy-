title: England and Man City's Khiara Keating denies nitrous oxide charge - BBC News
date: '2024-07-23'
section: Manchester
url: http://www.bbc.co.uk/news/articles/cp38dj0dvx7o
content: |-
  Khiara Keating pleads not guilty to possessing nitrous oxide for wrongful inhalation.

  Keating was an unused substitute during the recent Uefa Women's Championship qualifiers

  Manchester City and England goalkeeper Khiara Keating has pleaded not guilty to possessing canisters of nitrous oxide. The 20-year-old, of Manchester, was charged with possession of a Class C drug on 18 June after an investigation by Greater Manchester Police. She appeared at Manchester and Salford Magistrates Court alongside her mother Nicola Keating, 48, who also denied the same offence. Both were granted unconditional bail ahead of a further hearing at the same court on 10 September.

  Nitrous oxide was made a Class C drug under the Misuse of Drugs Act in November 2023. Possession with the intention of wrongfully inhaling it for a psychoactive effect became an offence, but it is still possible to use the gas for legitimate reasons, such as in catering or pain relief during labour.

  Keating was a key member of Man City's title bid, which saw them eventually finish second

  Jonathan Potter, prosecuting, said the women were accused of possessing canisters for wrongful inhalation in Manchester in June. Keating was asked to indicate a plea and replied "not guilty", as did her mother. The pair only spoke further to confirm their names and addresses. They were bailed ahead of the September hearing , where a district judge is due to fix a date for trial. Keating, who was originally on the books of Manchester United before being spotted by a City scout, became the youngest player to win the Women's Super League Golden Glove award in May, after keeping nine clean sheets in 22 league games. She has yet to make an appearance for England, but was an unused substitute during the recent Uefa Women's Championship Qualification games against Sweden and the Republic of Ireland.
