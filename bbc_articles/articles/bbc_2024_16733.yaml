title: 'Chris Marriott: Jury discharged in ''Good Samaritan'' murder trial - BBC News'
date: '2024-07-26'
section: South Yorkshire
url: http://www.bbc.co.uk/news/articles/c720900y9kko
content: |-
  Hassan Jhangur admits causing the death by dangerous driving of Chris Marriott in Sheffield.

  Chris Marriott was out walking with his family when he was struck by Hassan Jhangur's car

  A murder trial jury has been discharged after it was unable to reach a verdict on a driver whose car hit and killed a "Good Samaritan" tending to an injured woman. Chris Marriott, 46, died when he was struck by Hassan Jhangur's Seat Ibiza as he tried to help Jhangur's own sister in Sheffield on 27 December. Mr Marriott was on a post-Christmas walk with his family when he unwittingly became caught up in a feud between the Jhangurs and another family. The Sheffield Crown Court jury deliberated for more than 35 hours before being discharged by the judge. Jhangur had previously admitted causing death by dangerous driving.

  Jhangur, 24, had also previously pleaded guilty to a charge of causing serious injury by dangerous driving. Those charges related to three people who were near Mr Marriott; off-duty midwife and councillor Alison Norris, Jhangur's mother Ambreen and his sister Nafeesa. Earlier, judge Mrs Justice Lambert KC asked the jury of six men and six women if any further time would mean they would reach verdicts. The foreman indicated they would not. The judge thanked them for their deliberations. "I know how hard you have striven to reach verdicts. You leave with my heartfelt thanks,” she said. Jhangur was remanded in custody ahead of a further hearing on 12 August where a potential retrial will be discussed. Ben Campbell, prosecuting, told the court it was his "firm expectation the Crown will seek a retrial in this case".

  Hassan Jhangur had denied the murder and manslaughter of Chris Marriott

  The prosecution had told the trial Jhangur, of Whiteways Road, ploughed into people in College Court, a cul-de-sac in the Burngreave area of the city. He then got out of the vehicle and attacked another man, Hasan Khan, with a knife, leaving him with serious injuries. The jury heard the background to the incident was a dispute between the two families following the marriage that morning of Jhangur's sister Amaani to Mr Khan. Giving evidence, Jhangur told the jury he "lost control" of the car as he took the corner into the Khans' street "too fast" and had no idea anyone was under the vehicle. He admitted that he took a knife with him when he drove to the scene, but denied he intended to kill or cause serious harm to anybody. He told jurors that he punched Hasan Khan because he feared he was going to attack one of his sisters with a baseball bat and, as he began to take blows, he took out the knife and began "swinging it" without knowing where it was hitting.

  Mr Marriott had been out for a post-Christmas walk with his two children and wife, Bryony

  According to the indictment from the court, Jhangur had denied the following charges:
  • None Count 2: Manslaughter of Chris Marriott, as an alternative to murder
  • None Count 4: Wounding with intent of Hasan Khan, as an alternative to attempted murder
  • None Count 7: Causing GBH with intent in respect to Alison Norris
  • None Count 8: Causing GBH with intent in respect to Nafeesa Jhangur
  • None Count 9: Causing GBH with intent in respect to Ambreen Jhangur Jhangur's father, Mohammed Jhangur, 56, denied perverting the course of justice by allegedly hiding the knife used to stab Mr Khan. He was released on bail after the jury was discharged.

  Flowers were laid at the scene of where Mr Marriott died on College Court

  Mr Marriott, a devout Christian, had been out walking with his wife and two children when he had stopped to help Nafeesa Jhangur, who had collapsed in the road. While giving first aid, he was hit from behind by a vehicle, killing him. Ms Norris, who had also stopped to help Mr Marriott's efforts, was hit by the car suffering injuries to her leg. South Yorkshire Police described Mr Marriott as a "Good Samaritan", after he stopped to help a stranger in need. Follow BBC Yorkshire on Facebook, external, X (formerly Twitter), external, and Instagram, external. Send your story ideas to yorkslincs.news@bbc.co.uk, external.
