title: Bicester firefighter's bravery shone through, family says - BBC News
date: '2025-05-20'
section: Oxfordshire
url: http://www.bbc.co.uk/news/articles/cj3jjed70zeo
content: |-
  Firefighters Jennie Logan and Martyn Sadler, along with father Dave Chester, died in the fire.

  The family of a firefighter who died in a blaze that claimed three lives have said her "bravery and fearlessness shone through right until the end". Firefighters Jennie Logan, 30, and Martyn Sadler, 38, along with father-of-two Dave Chester, 57, were killed in the blaze that engulfed the Bicester Motion site on Thursday evening. Two more firefighters remain in hospital in a stable condition after suffering serious injuries in the fire, which was brought under control. A police investigation has since been launched. In a statement released by Thames Valley Police, Ms Logan's family said she was a "much loved daughter to us, her sister, Emilie, and 'Mum' to her beloved dog, Mouse".

  Ms Logan's family said they would "miss her beautiful smile and zest for life"

  Ms Logan owned a dog business and used to attend shows with her dog Mouse. "We still can't believe we'll never see her again, driving around Bicester collecting her dogs, which were like a second family," the family statement continued. "She found her calling three years ago when she joined the fire service where she could use her incredible strength and determination. "Jennie was a force to be reckoned with but to everyone who knew her, she was such a loving, caring, thoughtful person, who would do anything and everything to help. "She lived life at 100mph, juggling her business with her love for rugby, where she made some truly amazing friends. "When Jennie's pager went off, there was no stopping her.

  To play this video you need to enable JavaScript in your browser. This video can not be played Announcing the death's on Friday, Chief Fire Officer Rob MacDougall hailed the "unwavering bravery"

  The statement went on to say: "Never did we think that when running out the door last Thursday, to give it her all, like she always did, it would be for the final time. "Her bravery and fearlessness shone through right until the end. "Our lives will never be the same, we'll miss her beautiful smile and zest for life. "She will always be our hero and we are so immensely proud of her. Forever in our hearts."

  Martyn Sadler, Ms Logan and David Chester died in the fire on Thursday

  Following the fire, Bicester Town Council opened books of condolence, while church services and a two-minute silence took place on Sunday. Nicholas Mawer, who represents Bicester North on Cherwell District Council, told the BBC those lost in the fire were "the best of Bicester". "Thankfully these incidents are very rare but it's deeply affected the community," he added. Ms Logan and Mr Sadler were members of Bicester Rugby Union Football Club (BRUFC), with Ms Logan on the Bicester Vixens women's team. "We are a tight-knit club," BRUFC's chairman Paul Jaggers said. "Obviously losing two of your members in any situation is really tough and it's had a profound impact." A fundraiser launched by the club has raised more than £11,000 for the Fire Fighters charity since the tragedy. Mr Jaggers described it as an "initial start". "The intention was always to run some events later in the year to remember Jennie and Martyn, and raise money alongside those, so hopefully this is just the beginning," he added. The Bishop of Dorchester, the Right Reverend Gavin Collins, led a tribute on Tuesday at the first full meeting of Oxfordshire County Council since elections earlier this month. "As we come together today, we hold in our hearts those who lost their lives in last Thursday's fire," Bishop Collins said. "We give thanks for all those who serve in our emergency services for their courage, commitment and compassion." Councillors were asked to pause sharing their own words in the chamber and sign a book of condolence.

  The firefighters were members of Bicester Rugby Union Football Club

  The fire was reported at about 18:30 BST on Thursday and rapidly spread through the former aircraft hangar at the site on Buckingham Road, and a major incident was declared. Ten fire and rescue crews were called to tackle the blaze as witnesses reported seeing black smoke in the sky. Bicester Motion is home to more than 50 specialist businesses, focused on classic car restoration and engineering on the former site of RAF Bicester. It was home to RAF Bomber Command in World War Two and became redundant in 2004. The Health and Safety Executive has confirmed it was "liaising with our colleagues at Thames Valley Police" as part of an investigation into the fire.

