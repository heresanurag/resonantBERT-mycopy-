content: |-
  The rapper alleges her jailed attacker continues to harass her from prison via third parties.

  Megan Thee Stallion alleges her attacker, Tory Lanez, continues to harass her from prison

  Rapper Megan Thee Stallion has filed a request for a restraining order against Tory Lanez, who's currently serving a 10-year prison sentence for shooting her. Lanez, real name Daystar Peterson, shot Grammy winner Megan, 29, in the feet during an argument after a party in 2020. In court documents filed in Los Angeles, Megan accuses him of continuing to harass her online from behind bars and subjecting her to "repeated trauma and re-victimisation". Lanez's lawyers told BBC Newsbeat the claims were "ridiculous" and the "truth will be revealed" in court.

  Megan's lawyers have asked a judge to prevent Lanez from harassing her via third parties. They accuse blogger Milagro Elizabeth Cooper, known online as Milagro Gramz, of being a "mouthpiece" and "puppet" sharing misinformation about the case on behalf of the jailed Canadian rapper. The filing from Megan's lawyers alleges Lanez, 32, discussed payments to Milagro with his dad, Sonstar Peterson, from prison, but his lawyers say any payments to the blogger from Sonstar had nothing to do with Lanez or his case. Milagro's representatives declined to comment on the filing when contacted by Newsbeat but said a response to be heard in a separate lawsuit would "speak for itself".

  Lanez was found guilty of shooting Megan in 2023 and was jailed for 10 years

  Lanez was found guilty of three charges at a trial last year - negligent discharge of a firearm, assault with a semi-automatic firearm, and carrying a loaded and unregistered firearm. The court heard he and Megan, real name Megan Pete, had a row after leaving a party hosted by Kylie Jenner in the Hollywood Hills on 12 July 2020. When Megan demanded to be let out of the car they were in, Lanez shot at her feet while ordering her to "dance". Lanez has continued to maintain his innocence and shortly after he was jailed in August 2023 claimed he had been wrongly convicted. In an Instagram post he wrote: "I refuse to apologise for something I did not do." The sentencing judge also criticised Lanez for trying to "intimidate Ms Pete and silence her truths from being heard".

  The trial divided the hip-hop community with artists taking sides. After Lanez was found guilty by a jury, 50 Cent apologised for posts he'd shared suggesting Megan had lied about being shot. But he wasn't alone - Megan said in court she had not known "a single day of peace" since the attack due to online speculation. She initially told police she'd hurt her feet by stepping on glass and later said she lied because she didn't want to "get in more trouble". Responding to the restraining order petition, Lanez's lawyers again cast doubt on Megan's side of the story. "It is important to consider the pattern of behaviour we are seeing," they said in a statement. "When someone has openly admitted to lying on major public platforms... at what point do we, as a society, stop believing the narrative they are pushing?"

  In October, Megan released a documentary charting her struggles with anxiety, depression and suicidal thoughts in the aftermath of the shooting and the trial. In their appeal for a restraining order, Megan's lawyers allege Lanez tried to disrupt the documentary's release with an appeal - something his lawyers dismissed as "ludicrous". "[He] was simply complying with legal deadlines, as required by the courts," they say. Megan's representatives say the "only recourse she now has is to seek a civil harassment restraining order against [Lanez] to end his ongoing campaign of harassment." A court hearing on the order is due to take place on 9 January.

