title: Ocasio-Cortez and Tlaib's testimony on detained migrants - BBC News
date: '2019-07-12'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-48971608
content: |-
  Representatives Ocasio-Cortez and Tlaib describe conditions at US facilities at the southern border.

  Representatives Alexandria Ocasio-Cortez and Rashida Tlaib were giving evidence to the House Oversight Committee following their visit to detention facilities on the southern border.

  Just a few hours later, Vice President Mike Pence was touring a facility and reviewed the conditions there.
