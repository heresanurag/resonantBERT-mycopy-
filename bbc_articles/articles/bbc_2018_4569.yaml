title: Merkel lobbies Trump on trade and Iran - BBC News
date: '2018-04-27'
section: US & Canada
url: http://www.bbc.co.uk/news/world-us-canada-43925422
content: |-
  Despite the show of unity between the two leaders, their differences on trade were plain to see.

  German Chancellor Angela Merkel says she will stay in close touch with US President Donald Trump on the Iran nuclear deal, which he could scrap.

  Mrs Merkel described the 2015 international accord as a "first step" that prevented Tehran from developing nuclear weapons.

  Mr Trump vowed to never let Iran have nuclear weapons, but would not say if he would consider military force.

  Mrs Merkel was in Washington for a brief "working visit" with Mr Trump.

  The optics of her trip contrasted starkly with the pomp and ceremony rolled out for French President Emmanuel Macron during his glitzy state earlier visit this week.

  Mr Macron had three days; Mrs Merkel had barely three hours.

  The German leader's differences with the US president on trade were laid bare at their Friday afternoon press conference.

  She hoped to persuade Mr Trump not to impose US tariffs on European steel and aluminium products.

  Berlin expects a US exemption on global duties to expire on 1 May.

  Neither the French president nor the German chancellor made any tangible progress on Iran during their trips to Washington this week.

  In a co-ordinated campaign they delivered the same message to President Trump: the nuclear accord was working but flawed, and should be used as a building block for further action to contain Iran in the region.

  In this way the Europeans are hoping to convince President Trump not to scrap the deal by a self-imposed deadline next month.

  They're trying to buy time to continue ongoing negotiations aimed at addressing his concerns, many of which they share: Iran's ballistic missile programme, its support for armed groups in the region, and its future nuclear activity once the limits in the existing agreement expire.

  But publicly Mr Trump gave no ground, and Mr Macron said at the end of his visit he was inclined to believe the US president would indeed pull out of the accord.

  Even if President Trump does so, he has declared that Iran would not be allowed to restart its nuclear programme.

  But he has not divulged any plan to curb Iran's nuclear activity without the deal if, indeed, he has one.

  Mrs Merkel was asked by a reporter whether she had secured an assurance from Mr Trump not to impose the duties.

  "The president will decide. That's very clear," she said, amid a co-ordinated lobbying campaign with other European leaders.

  "We had an exchange of views. The decision lies with the president."

  Mr Trump said he wanted a "reciprocal" trade relationship with Germany and other European nations.

