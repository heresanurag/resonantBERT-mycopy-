id: bbc_2024_24868
title: 'Causeway Coast and Glens: Investigation over alleged ''financial irregularities''
  - BBC News'
date: '2024-10-12'
section: Northern Ireland
url: http://www.bbc.co.uk/news/articles/c5y3x0e48dro
content: |-
  After a preliminary investigation a full formal investigation is required, councillors hear.

  An independent investigator has been appointed by Causeway Coast and Glens Borough Council to look into alleged “procurement and financial irregularities". Councillors were told that following a "preliminary investigation" of the concerns, it had been determined, under the council's Anti-Fraud, Bribery and Corruption Policy, that "a full formal investigation is required". Elected representatives were also informed that a procurement exercise had been carried out with the accountancy firm KPMG appointed to undertake it. The update was provided during a behind closed doors section of a quarterly Audit Committee meeting in June, according to council minutes.

  The council has not confirmed whether the KPMG investigation relates to an ongoing Police Service of Northern Ireland (PSNI) fraud investigation at the council. BBC News NI previously reported the PSNI was investigating an allegation of fraud and that a council official had been suspended. A PSNI spokesperson said the force's enquiries remained ongoing and officers continue to liaise with representatives from the council in relation to the matter. Details of the independent investigation and the appointment of KPMG emerged in a confidential report presented to councillors by the Audit, Risk and Governance manager. Councillors were asked to recommend the appointment of the independent investigator to the full council, according to minutes from the Audit Committee meeting. The council's director of corporate services also emphasised the need for "confidentiality and sensitivity around the complex matter". The council’s chief finance officer advised that in terms of cost the “initial estimate for the independent investigator” was £11,500. However he said this depended on the “scale and scope of the work”. It is understood councillors agreed to approve the independent investigation during a later meeting.

  A spokesperson for Causeway Coast and Glens Borough Council said it “does not comment on ongoing internal investigations”. Stormont's Department for Communities, which oversees local government in Northern Ireland, said it would not comment on an active investigation. The Northern Ireland Audit Office said: “The Local Government Auditor is aware of the ongoing investigation by council and is monitoring its progress.” The most recent meeting of the council’s audit committee in September heard that no new allegations of fraud were reported in the last quarter and that "all other investigations" were still ongoing.
