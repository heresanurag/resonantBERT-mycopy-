title: Meet Lilibet, the Lanesborough Hotel's most famous resident - BBC News
date: '2024-08-10'
section: General
url: http://www.bbc.co.uk/news/uk-england-london-68222999
content: |-
  The London hotel hosts many famous names, but one furry resident is the perhaps its most famous.

  The Lanesborough Hotel in central London has hosted many celebrities, including Sylvester Stallone, Madonna and Stevie Wonder, but one resident is turning out to be their most famous.

  Lilibet, the hotel's resident cat, loves to steal the limelight and has become a firm favourite with staff and guests.

  The Siberian Forest cat has a committee tending to her every need, and celebrities and royalty love to fuss over her.
