title: Dolphins entertain pleasure boat passengers in Flamborough - BBC News
date: '2025-06-24'
section: General
url: http://www.bbc.co.uk/news/videos/cx234n9dny2o
content: |-
  Passengers on a pleasure boat tour were treated to a dolphin display leaping alongside them.

  Rachel Bartle captured the moment the playful pod was spotted swimming off the coast of Flamborough.

  Posting the footage on social media Ms Bartle tagged the organiser, North Landing Boat Tours and Fishing Trips, and said "great trip".

  According to the RSPB, at a top speed of around 18mph (29km/h) – the mammals would give an Olympic swimmer a run for their money.

