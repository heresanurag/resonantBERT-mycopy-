content: |-
  The 111th edition of the Tour de France got under way in Florence and finished three weeks later in Nice. Here's the story of the race.

  Tour de France 2024: The stage-by-stage story of the race

  Tadej Pogacar won his third Tour de France title at the 2024 edition

  Slovenia's Tadej Pogacar became the first man to do the Tour de France-Giro-d'Italia double in 26 years by securing victory on Sunday. Pogacar, now a three-time Tour champion, beat Dane Jonas Vingegaard by six minutes and 17 seconds, as Belgium's Remco Evenepoel finished third. The 111th edition of the Tour de France got under way in Florence, Italy on Saturday, 29 June with the three-week race ending in Nice on Sunday, 21 July. Here's the story of the race.

  Romain Bardet (right) wore the yellow jersey for the first time in his career

  Mark Cavendish struggles on a demanding opening stage of the Tour de France as Romain Bardet claims the yellow jersey in a thrilling finale in Rimini. France's Bardet and his DSM-Firmenich-PostNL team-mate Frank van den Broek hold off a high-quality group including all the main general classification riders to triumph by five seconds. Manx rider Cavendish eventually crossed the line more than 39 minutes down and with just under 10 minutes to spare before the elimination time limit.

  Kevin Vauquelin was second in La Fleche Wallonne earlier this season

  Arkea-B&B Hotels rider Vauquelin took his first Grand Tour stage win after breaking away from the front group, becoming the second Frenchman to take a stage win in as many days. Tadej Pogacar, of UAE-Team Emirates, powered away on the final climb but took his main rival, and last year's winner, Jonas Vingegaard with him. Dane Vingegaard crossed the line with Pogacar, but the Slovenian took the yellow jersey after having a higher placing in the first stage.

  Biniam Girmay also won a stage at the Giro d'Italia in 2022

  Biniam Girmay makes history as the first black African to win a Tour de France stage as Mark Cavendish is held up by a late crash on the run into Turin. Eritrea's Girmay powers to victory, with Colombia's Fernando Gaviria and Belgium's Arnaud de Lie in second and third. Meanwhile, Richard Carapaz becomes the first Ecuadorian to wear the yellow jersey based on accumulated finishing positions.

  Tadej Pogacar won six stages at the Giro d'Italia before coming to the Tour

  Tadej Pogacar regains the leader's yellow jersey in thrilling fashion as he soloes clear to win the first big mountain stage of the Tour. Remco Evenepoel finishes second 35 seconds down, with defending champion Jonas Vingegaard 37 seconds back in fifth. Overnight leader Richard Carapaz loses more than five minutes and drops to 22nd in the general classification.

  Mark Cavendish broke the Tour's stage wins record 16 years after winning his first

  Mark Cavendish broke the Tour de France stage wins record as he took his 35th victory in cycling's greatest race to surpass the legendary Eddy Merckx with a sensational sprint finish in Saint Vulbas. Tadej Pogacar retained the yellow jersey, 45 seconds ahead of Remco Evenepoel, after narrowly avoiding a crash.

  Dylan Groenewegen claimed his sixth stage win and his first since 2022

  Dylan Groenewegen made a late surge for the line to beat Jasper Philipsen in a thrilling photo finish. Philipsen was later relegated to 107th place for shifting his line during the the final 150m, while there was no change at the top of the general classification standings.

  Remco Evenepoel's victory means he has now won stages in all three of cycling's Grand Tours

  Remco Evenepoel claims his first victory at the Tour de France in stage seven's individual time-trial as Tadej Pogacar holds on to the leader's yellow jersey. Primoz Roglic was third while defending champion Jonas Vingegaard lost more ground, finishing fourth.

  Biniam Girmay is targeting success in the points classification

  Biniam Girmay claims his second win in the Tour de France in a sprint finish on stage eight as Tadej Pogacar retains the leader's yellow jersey. Jasper Philipsen and Arnaud de Lie finish second and third on the uphill finish in Colombey-les-Deux-Eglises.

  Pidcock, right, won a stage of the Tour in 2022 on Alpe d'Huez

  Britain's Tom Pidcock is edged out on the line as France's Anthony Turgis wins the ninth stage. Pidcock, of Ineos Grenadiers, is narrowly beaten in a final sprint at the end of a frantic 199km stage in Troyes, which included several gravel sections. Slovenia's Tadej Pogacar retains the leader's yellow jersey following several attacks between contenders for overall victory.

  Jasper Philipsen won four stages in the 2023 edition of the Tour

  Eritrea's Biniam Girmay and Germany's Pascal Ackermann finish second and third respectively.

  Both Vingegaard (right) and Pogacar have won the Tour twice

  Denmark's Jonas Vingegaard won stage 11 of the Tour de France following a sprint to the line with rival and overall leader Tadej Pogacar. Defending champion Vingegaard, of Visma-Lease a Bike, edged out Pogacar of UAE-Team-Emirates as the pair raced for the line after several climbs on the 211km stage to Le Lioran in France's Massif Central region. Pogacar remains in the yellow jersey and is now one minute six seconds ahead of Remco Evenepoel, who was third on the stage, with Vingegaard a further eight seconds behind.

  Report: Girmay wins again as Roglic crashes and loses time Biniam Girmay sprinted to his third victory at the 2024 Tour de France by beating Wout van Aert in a frantic bunch sprint in Villeneuve-sur-Lot on stage 12. But overall contender Primoz Roglic lost significant time after a late crash, as Tadej Pogacar retained the leader's yellow jersey ahead of Remco Evenepoel and defending champion Jonas Vingegaard.

  Jasper Philipsen has now won eight stages in total at the Tour

  Belgium's Jasper Philipsen won stage 13 of the Tour de France as a crash marred the sprint finish to the line in Pau. His compatriot Wout van Aert and Germany's Pascal Ackermann finished second and third as Tadej Pogacar came home safely in ninth and retained the yellow jersey.

  Tadej Pogacar extended his overall lead with a dominant victory on stage 14 in the Pyrenees. The Slovenian powered up the Saint-Lary-Soulan Pla d'Adet summit finish to cross the line 39 seconds ahead of Jonas Vingegaard, who climbed to second in the overall standings ahead of Remco Evenepoel.

  Sunday's 197.7km mountain stage from Loudenvielle promised to be one of the toughest days on the Tour

  Tadej Pogacar took a huge step towards reclaiming the Tour de France title as he produced another superb ride to secure a second straight stage win. Pogacar left Jonas Vingegaard behind to claim his 14th stage win by one minute eight seconds, while Remco Evenepoel crossed almost three minutes down in third.

  Jasper Philipsen added his third stage win in 2024 after winning four times in 2023

  Belgium's Jasper Philipsen sprinted to his third stage victory at the 2024 Tour de France after Biniam Girmay suffered a late crash on stage 16, which provided the sprinter's teams with the final opportunity for success before the race returned to the alps. Tadej Pogacar finished safely to retain the yellow jersey.

  Richard Carapaz became the first man from Ecuador to win a Tour de France stage

  Richard Carapaz completed the set of victories in cycling's Grand Tours with a solo victory on the final major climb. It made him the first man from Ecuador to win a Tour stage. Tadej Pogacar increased his lead in the overall standings by two seconds.

  Victor Campenaerts previously won one Grand Tour stage, on the Giro d'Italia in 2021

  Belgium's Victor Campenaerts emerged from a breakaway trio to clinch victory on stage 18 of the 2024 Tour de France. The Lotto–Dstny rider, 32, hit the front with 10 of the of the 179.5km route from Gap to Barcelonnette.

  Pogacar attacked in the Alps with nine kilometres to go, making up almost three minutes to catch and pass stage leader Matteo Jorgenson of the United States

  Tadej Pogacar won his fourth stage at the 2024 Tour de France and substantially extended his overall lead. Pogacar's lead over defending champion Vingegaard increased to five minutes and three seconds with two stages remaining.

  Pogacar extended his advantage over Vingegaard by seven seconds and led the general classification by five minutes and 14 seconds going into the final stage

  Report: Pogacar dominates to win his fifth stage of Tour Tadej Pogacar continued his fairytale Tour de France with a fifth stage win to further extend his dominant lead. The Slovenian sprinted away from defending champion Jonas Vingegaard inside the final 500 metres on the Col de la Couillole.

  He won six stages, the first rider to do so at a single edition since Cavendish in 2009.

  Stage 21 was a time trial from Monaco to Nice as the tour ended outside of Paris for the first time since 1905 due to a clash with the Olympics. Wearing the yellow jersey, Tadej Pogacar finished the stage a blistering one minute and three seconds clear of second-placed Jonas Vingegaard. The win secured his third Tour de France title and extended his overall lead over Vingegaard to six minutes and 17 seconds. After his time trial, legendary British sprinter Mark Cavendish said the 2024 Tour was likely to have been his last race.
