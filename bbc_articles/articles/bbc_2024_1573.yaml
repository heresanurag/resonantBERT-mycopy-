title: 'Laura Kuenssberg: Tory by-election disaster shows power of ‘sofa vote’ - BBC
  News'
date: '2024-02-18'
section: UK Politics
url: http://www.bbc.co.uk/news/uk-politics-68326119
content: |-
  The results this week are as much about Conservative voters staying home as it is about them turning to Labour.

  It's probably raining. It's cold. The sofa is comfy. It's been a long day and the polling station feels like miles away.

  Behind the huge headlines of Labour's victories and the Conservatives' by-election thumpings, it's worth paying attention to voters' instinct - not to choose one party or another, but to stay at home.

  The two contests this week in Kingswood and Wellingborough have one important thing in common. In both places, the rise in Labour's share of the vote was dwarfed by the fall in support for the Tories.

  In other words, the headline of Labour pummelling the Conservatives doesn't account for voters who chose neither of the big parties - or crucially those who chose to stay cosy at home. It is as much about Conservative voters sitting on their hands as it is them transferring to Labour.

  There is important evidence about the appeal of Reform UK, who have strong ambitions, whether or not Nigel Farage ever concludes his game of footsie.

  But the big parties need also to look at those whose ballot might be "none of the above". One former cabinet minister claims there is "zero appetite for switching to [Sir Keir] Starmer, but our voters are deeply, profoundly switched off".

  And the former party leader, Lord Howard, writes this morning that "hordes" of Tory voters stayed at home.

  These results are truly dreadful for Downing Street. The spin that these are "mid-term elections" doesn't wash. We are already in the warm up to a general election, which is probably about eight months away. This is not a mid-term government. This isn't a slap on the wrist - it is latest in a line of kickings for the Conservatives as the moment of reckoning gets closer and closer.

  Rishi Sunak's team originally believed by now they would have narrowed the gap. Definitively, that has not happened.

  The mood in the Conservative Party is not just bleak but strangely apathetic, accepting of a defeat most believe is coming. One senior Tory told me: "It's weird, one of the most competitive bunch of people in the country is already accepting annihilation."

  There was more evidence, as we found in our Britain in a Room focus groups a few weeks ago, that voters aren't rushing gleefully towards the Labour party.

  But that should be little comfort to Conservatives. These by elections, just like months and months of polling, demonstrate their voters abandoning them in droves, however many resets Rishi Sunak tries. The keys to No 10 are dangling in front of Starmer.

