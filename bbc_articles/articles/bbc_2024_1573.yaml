  There is a simple logic then to what a senior Tory source describes as their "number one job", to get the Conservative voters from 2019 to turn out.

  "We have to show them there is something worth it... if they don't feel that, they will follow through on their disengagement and stay at home," the source says.

  It's wrong to pretend people's behaviour at by-elections will be exactly the same as in a general election - but they are important hints. And it won't have escaped the parties' notice that the number of people bothering to vote was lower than other recent contests in Mid Bedfordshire, Somerton and Frome, and Selby and Ainsty.

  The importance of what you might call the sofa vote - where members of the public choose just to stay at home - is often underplayed.

  The narrative of New Labour's fairy-tale victory of 1997 doesn't always include the role of turnout. One Tory campaigner from the time says there was a "toxic combination of switchers and stay at homes".

  They recall that "for every ten doors you knocked on of Tory voters, you probably had three or four direct switchers and two or three who were just not going to vote".

  Yes, the New Labour project was staggeringly successful. But if you are in the market for obscure political facts (I know you are), it's John Major, not Tony Blair, who holds the record for the biggest number of actual votes ever, in 1992 - just over 14 million, compared to around 13.5 million for Blair in 1997, when turnout dropped.

  The full story of the incredible Blair victory should include Conservative voters who didn't much fancy him, but didn't feel their natural party was worth defending, and so didn't bother.

  And if you really love these facts - on average, around 9,000 fewer people turned out in Labour seats in 1997 than Conservative ones. That was partly because their constituencies tended to be smaller, but turnout was significantly lower too. If it looked like Labour had a chance of taking a seat, lots of Tory voters chose to stay at home and let it happen.

  People decide where to put their cross on the ballot paper for all sorts of reasons. Recession. The deep unhappiness in the Tory Party. A local MP standing down, which might be a huge factor this time with dozens and dozens of Conservatives going - a tally that's likely to increase (a very important story for another time).

  But the decision not to cast a ballot is also a choice.

