title: Moment BBC reporter sounds like 'Minnie Mouse' after on-air glitch - BBC News
date: '2023-07-18'
section: General
url: http://www.bbc.co.uk/news/world-66234537
content: |-
  The BBC's Shaimaa Khalil was reporting live when a technical fault caused her voice to sound squeaky.

  The BBC's Shaimaa Khalil was reporting live from Melbourne for BBC Breakfast when a technical fault occurred, leaving her sounding somewhat like the cartoon character Minnie Mouse.

  Viewers took to social media to comment on the mistake, with one Twitter user saying "#bbcbreakfast loving that a sound error turned the reporter's voice into Minnie Mouse during a live report".
