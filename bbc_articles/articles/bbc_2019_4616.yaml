title: Labour pledges to end 'slum' office housing - BBC News
date: '2019-04-23'
section: Business
url: http://www.bbc.co.uk/news/business-48031661
content: |-
  It says current planning rules allow developers in England to convert offices into "rabbit hutch" homes.

