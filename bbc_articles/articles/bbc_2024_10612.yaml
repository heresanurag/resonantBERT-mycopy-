content: |-
  Pep Guardiola's side celebrate a record fourth straight Premier League title with fans in Manchester.

  'Great for the kids to see'

  I've been out and about among the fans and the mood is understandably buoyant. One boy told me he is most looking forward to seeing Phil Foden because "he can just walk though with the ball and score". Another fan said the success of the club was "great for the kids to see". "It was bit sad yesterday with the FA Cup final loss but we've got to let Manchester United have some sort of feel-good factor," they added. There was even more urban diplomacy on show from another woman, who said "even if we've got only one trophy this year, I'm not bothered - at least we've won a trophy". "Well done to Manchester United - they deserve a win after all the years they've had," she added.
