content: |-
  Tottenham Hotspur agree a deal worth up to £65m with Bournemouth for striker Dominic Solanke.

  Dominic Solanke did not make England's Euro 2024 squad despite a prolific season for Bournemouth

  Tottenham Hotspur have agreed a deal worth up to £65m with Bournemouth for striker Dominic Solanke. Spurs will pay an initial £55m with £10m in add-ons for the 26-year-old, who has one cap for England. Solanke's release clause of about £65m was confirmed by Bournemouth owner Bill Foley in an interview with BBC Sport last month. If completed the deal will be a record sale for Bournemouth - exceeding the £40m they received from Manchester City for defender Nathan Ake in 2020. Solanke joined Bournemouth for £19m in 2019 from Liverpool, who are understood to have a 20% sell-on clause on any profit. He enjoyed the best season of his career in 2023-24, scoring 21 goals in 42 appearances for the Cherries.

  Spurs manager Ange Postecoglou has been looking to strengthen his attack since England captain Harry Kane left for Bayern Munich last summer. The Australian told a news conference on Friday that Tottenham's forward line was "an area we need to reinforce this year" but felt a distinction should be drawn between the type of player they want and replacing Kane. Postecoglou said: "I think I said a number of times last year you can't replace a generational player and there's a reason they stand apart. "We've been working hard to try to get the right kind of players into those areas we need for another challenging season ahead." Foley said in July that while he hoped Solanke would stay, Bournemouth had "two or three candidates lined up" as potential replacements. Cherries boss Andoni Iraola acknowledged the forward "would be a big miss" should he leave.
