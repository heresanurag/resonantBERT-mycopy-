  His family have long said his health was steadily and dramatically declining and they feared he would die or kill himself. As the saga has dragged on, the UK and the US have faced growing pressure - from public campaign and from Assange's home country of Australia - to resolve the case. In February Australian Prime Minister Anthony Albanese said the country as a whole shared the view that "enough is enough". "This thing cannot just go on and on and on indefinitely". Rights groups such as Amnesty International, Human Rights Watch and the American Civil Liberties Union (ACLU) have all called for his release, saying his treatment has been cruel and his case a threat to press freedom. He's also won support from countless figures of global power and influence, including former leader of the UK Labour Party Jeremy Corbyn, linguist Noam Chomsky, Baywatch star Pamela Anderson, and the late fashion icon Dame Vivienne Westwood.

  The late Dame Vivienne Westwood had appeared at rallies calling for Assange's release

  But his critics - which include former Secretary of State Hilary Clinton and retiring Republican stalwart Mitch McConnell- say he is not a journalist and endangers lives by publishing troves of documents without redaction. After the final hearing on Wednesday in the US territory of Saipan - a Pacific island north of Guam - he is expected to return to Australia and be reunited with his family. They have expressed relief and thanked his supporters. "I am grateful that my son's ordeal is finally coming to an end. This shows the importance and power of quiet diplomacy," his mother Christine Assange said in a statement.

