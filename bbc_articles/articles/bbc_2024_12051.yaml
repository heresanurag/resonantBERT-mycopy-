  Rory McIlroy made three bogeys in his final four holes to lose the US Open by one shot

  Of course, DeChambeau ought not to have been in position to win the trophy outright on the 18th. McIlroy holed four birdies in his opening 14 holes and had the crowd chanting "Rory, Rory, Rory" when he drained a 27-foot putt on the 13th to move two shots clear. The European Ryder Cup star was better off the tee than DeChambeau and while his iron play was mixed, his chipping and especially his putting were superb. The flatstick is not McIlroy's strength but it was his long birdie putts that put him in command of the championship. It is ironic then that it was his putting that let him down - and for which this championship will always be remembered. Before this round, McIlroy was 496 from 496 for putts inside three feet this season but he watched in horror as his ball lipped out on the 16th for a second straight bogey. That opened the door for DeChambeau and, after another fine chip following a recovery from native vegetation at the last, he cost himself a play-off with his rival with a nervous prod that slid past the low side. McIlroy has had numerous close calls in the past 10 years - not least his one-shot defeat to Wyndham Clark 12 months ago - but this one will surely sting the most. His next bid to end his long major drought will start in five weeks' time at The Open at Royal Troon in Ayrshire.

  Cantlay's share of third equalled his best performance at a major championship

  The last time the US Open was held at Pinehurst in 2014, only three players finished under par - with Germany's Martin Kaymer an outlier as he won by eight. Once again, it proved a bruising test for the world's best with only eight players managing to finish in the red. Playing with McIlroy, Patrick Cantlay was his usual methodical self but never heated up enough to really challenge the lead. Fellow American Tony Finau shot an excellent three-under 67 for his third round in the 60s to join Cantlay at four under. Sweden's Ludvig Aberg had lit up Pinehurst through 36 holes but struggled on the weekend and an early triple-bogey effectively knocked him out of the running. He shot 73 to finish one over. England's Tommy Fleetwood, the only player in US Open history to have multiple rounds of 63 on the final day, again excelled on Sunday, carding a 68 to finish on three over, one ahead of compatriot Aaron Rai. However, it was a disappointing closing day for Tyrrell Hatton, who started at one under but slumped to six over with a final-round 77. That did at least beat the world number one Scottie Scheffler, whose two-over 72 left him eight over par for the tournament alongside Northern Ireland's Tom McKibbin.
