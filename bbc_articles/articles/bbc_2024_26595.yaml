title: Kellogg's Wrexham cereal factory expansion to create 130 jobs - BBC News
date: '2024-10-03'
section: Wales
url: http://www.bbc.co.uk/news/articles/cjr30dgn0dpo
content: |-
  It follows the closure of a sister site in Greater Manchester, with the loss of 360 jobs.

  The plant which already employs 350 people will have another 130 jobs added

  Kellogg's has said it will create 130 jobs at Europe's "largest cereal factory" in north Wales. Kellanova, the company which manufactures the cereal, has announced it is investing £75m at its site in Wrexham. The plant, which employs 350 people, produces well-known brands including Special K, All-Bran and Fruit 'n Fibre. Kellanova will move production of Corn Flakes and Crunchy Nut from its Greater Manchester plant, doubling the Welsh factory's capacity to 1.5 million boxes a day.

  It comes after Kellanova announced in May that it would close its Trafford Park factory, meaning 360 people would lose their jobs. The Wrexham factory was opened by Kellogg's in 1978 and Kellanova said this development meant the biggest single investment in the UK for 30 years, making it the largest cereals manufacturing plant in Europe.

  UK managing director Chris Silcock said: "By bringing together the manufacturing of all our major breakfast cereals at one site in Wrexham, we can make significant leaps forward in the efficiency, quality and sustainability of our operation. "We look forward to making Wrexham the home of our cereal production for many generations to come."

  Kellogg's has had a factory in Wrexham since the 1970s

  The company claims the development will reduce its CO2 emissions by 11% with the use of two new production lines using artificial intelligence. It also said more raw materials, such as rice, could be used, delivering a "10-fold reduction" in food waste, alongside new packaging lines and upgraded production lines. Wrexham MP Andrew Ranger said he was "delighted" about the investment. He added: "Our skilled workforce is one of Wrexham’s greatest assets and I am confident that their expertise and dedication will contribute to the success of this venture. "I look forward to a prosperous partnership and the positive impact this investment will have for Wrexham."
