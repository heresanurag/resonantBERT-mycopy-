  Chloe Kelly, Leah Williamson, Sarina Wiegman, Jill Scott, Ella Toone, Alessia Russo, Millie Bright, Rachel Daly and Beth Mead give their reactions to winning Euro 2022.

  England captain Leah Williamson says winning Euro 2022 is the proudest moment of her life and feels the legacy of the victory is just the start of a journey for women's football.

