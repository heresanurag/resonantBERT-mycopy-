content: |-
  The BBC's Nada Tawfik describes the moment clouds parted, allowing thousands to experience the full eclipse.

  BBC's Nada Tawfik describes the moment the clouds parted, allowing thousands gathered at Niagara Falls to experience the full eclipse. The crowd cheered in excitement, though birds seemed confused by the event.

  At the iconic site, at least two couples got engaged and one wedding took place during the brief daytime darkness.
