title: South Koreans react to President Yoon's martial law order - BBC News
date: '2024-12-04'
section: General
url: http://www.bbc.co.uk/news/videos/c0q0z5qvwywo
content: |-
  People in Seoul express anxiety and confusion following the president's now-rescinded martial law order.

  People on the streets of Seoul have expressed anxiety and confusion following South Korean President Yoon Suk Yeol's order of martial law - a decision that was quickly blocked by MPs.

  Residents say they feel "deeply disturbed" by the move, calling it an experience "only seen in movies".
