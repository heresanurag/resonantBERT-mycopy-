title: Deadpool star Ryan Reynolds plans 'best day' for boy with cancer - BBC News
date: '2024-11-13'
section: General
url: http://www.bbc.co.uk/news/videos/ceqx0qzln94o
content: |-
  Riley, who has cancer, is surprised after an online appeal to meet the Marvel star.

  A nine-year-old boy with cancer who wished to meet his hero Deadpool has had his dream come true.

  Riley, from Hartlepool, was diagnosed with osteosarcoma in 2023 and had his lower leg amputated.

  In 2024, the family found out the cancer had returned and spread. An online appeal by Micky Day from cancer charity Miles for Men on BBC Radio Tees was spotted by Ryan Reynolds on X.

  The Deadpool actor spoke to Riley in a video call and invited him for a meet-up at his club Wrexham, which he said he would make "one of the best days of his life".

  His wife and fellow Hollywood star, Blake Lively, also surprised the family.

  Riley’s mum, Sarah, said: "It was incredible that they took so much time out of their busy day to make one little boy feel special."

