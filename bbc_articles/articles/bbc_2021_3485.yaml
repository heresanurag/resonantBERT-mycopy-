content: |-
  Denmark and Austria have halted use of the vaccine as a precaution - but regulators say it is safe.

  Analysis: New Brazil variant cases are no surprise

  It was always known more cases of the P.1 Brazil variant were coming. When it was confirmed 11 days ago the variant was here, it was known two household members of the original cases in South Gloucestershire had tested positive for Covid. The results of the genomic sequencing to check which variant they had was not yet complete, but the expectation was it would be P.1. Where does this leave us? A quarter of all Covid cases are being checked for variants and all the indications are that they are not spreading. The new P.1 cases mean the total is now 10, while there have been just over 300 cases of the South Africa variant and another 113 cases where the UK virus has acquired the E484 mutation which allows it to escape some of the immune response. There will be more variants out there that have not been detected, but given that overall Covid infection levels are lower than when the variant was first discovered we can be confident it is not taking hold. Monitoring this though is crucial to help the UK decide if vaccines updates are needed ahead of next winter.
