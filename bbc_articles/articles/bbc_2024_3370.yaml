  He made his shock return to the South African villa in Love Island: All Stars - a spin-off show featuring islanders from across the show's 11 series.

  He left the villa on Sunday night's show coupled up with 32-year-old model Arabella Chi in sixth place, just one day before the show's final.

  In an exit interview with the show's host Maya Jama, Maxted said he believed some of the reasons given for the couple's "savage dumping" were cop outs.

  "It seems like we've been judged on the time that we had and not how strong our connection is," he added.

  Despite his week-long relationship as Chi's "wrestler in shining armour", Maxted said he's keen to see how the relationship will progress outside of the villa.

  "We just need to spend time together on the outside and just keep growing and getting to know each other," he said.

  "We know that there's something there and a connection so it's just about going at a good pace."

  Civale and Maxted first met in 2018 when the talent relations head for Ultimate Pro Wrestling booked the reality-star-turned wrestler for a match.

  Over the past six years, the two have become friends rather than co-workers.

  "It's just become a friendship over the years really," he told BBC News NI.

  "He's great with Leo, he's my little boy, they play Fifa and do things together, play football in the garden.

  "When he comes over he'll stay at mine, and it's nice to see him thriving in all aspects not just the wrestling."

  Civale said Maxted was getting a lot of support from wrestlers and fans since going back into the villa.

  "He's the nicest guy you'll ever meet," he added.

  "He's got a heart of gold, he'll always do things for you and it's nice to see that he's not being portrayed as anything else but himself.

  After Maxted's shock exit on Sunday's show, Civale is looking forward to seeing his friend again.

  "Hopefully he will find love with Arabella and then come out and we can all come out for a drink and have some fun."
