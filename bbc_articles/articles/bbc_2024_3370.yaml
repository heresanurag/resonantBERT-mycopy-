title: Love Island All Stars' Adam Maxted has 'heart of gold' - BBC News
date: '2024-02-17'
section: Northern Ireland
url: http://www.bbc.co.uk/news/uk-northern-ireland-68316898
content: |-
  Belfast's Adam Maxted leaves the All Stars villa in sixth place after a close vote by former islanders.

  Adam Maxted from Belfast left the Love Island: All Star villa on Sunday night's show

  Whether it's Love Island, I'm a Celebrity or The Traitors - who's heading into the villa, camp or castle is always shrouded in secrecy.

  And when the latest Love Island bombshell Adam Maxted made his way along the decking, through a heart-shaped arch, his friends recognised him straight away.

  Maxted, now a professional wrestler, once again left the villa on Sunday night after being voted out by the series' former contestants.

  But his appearance on Love Island: All Stars was a shock, not only to his fellow islanders, but for good friend Dominic Civale as well.

  "The first we saw of it was the silhouette of the new bombshell going in and we all knew the body shape, we were like: 'That's our guy, that's our Adam.'"

  The shock was also felt among those in the wrestling fan community when he re-appeared in the ITV2 spin-off show.

  "Nobody knew, so for us it was a nice surprise and we've been hooked ever since," he added.

  Dominic Civale from Somerset said Adam is "the whole package"

  Adam, who is originally from Belfast, first appeared on our screens on Love Island's second series in 2016.

  The 31-year-old made his mark as a bombshell, otherwise known as a new arrival, on the show on day 11, and grafted his way to fourth place alongside fellow islander Katie Salmon.

  After leaving the sunny Mallorcan villa, he became a household name in the world of professional wrestling.

