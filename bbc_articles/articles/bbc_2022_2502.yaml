  The storm sweeps across the UK, with a provisional record gust of 122mph measured on the Isle of Wight.

  Storm Eunice has swept across the UK - with a provisional record gust of 122mph measured on the Isle of Wight.

  Watch our video to see the impact of one of the worst storms to hit the UK in decades.

