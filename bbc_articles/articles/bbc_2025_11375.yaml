  According to a report by South Korea's Yonhap news agency, the military's decision also took into account the fact that the North has no longer been sending rubbish-filled balloons across the border. However, by suspending instead of terminating the broadcasts, the military is signalling that the speakers could be fired up again if needed, adds Yonhap. Seoul claims the broadcasts can be heard as much as 10km (6.2 miles) across the border in the day and up to 24km (15 miles) at night. The suspension comes almost exactly a year after they were first resumed in June 2024 - when both countries had engaged in various retaliatory campaigns involving rubbish and propaganda balloons. Reuniting with the South had always been a key, if increasingly unrealistic, part of the North's ideology since the inception of the state - until Kim abandoned the idea earlier last year. Both countries are technically still at war since the Korean War ended in 1953 without a peace treaty.
