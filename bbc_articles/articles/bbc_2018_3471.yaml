  The hearing on Thursday came after a lawsuit was filed in July by the Knight First Amendment Institute, a free speech group at Columbia University.

  The seven Twitter users involved in the legal action say their accounts were blocked by the president, or his aides, after they replied to his tweets with mocking or critical comments.

  The complaint argues that by blocking these individuals, Mr Trump has barred them from joining the online conversation.

  The government says the president can choose who he interacts with on Twitter.

  Katie Fallow, an attorney representing the Twitter users, said the president had blocked people "simply because they criticise him".

  She said this represented "viewpoint discrimination that violates the First Amendment", which guarantees free speech under the US constitution.

  One of the users, Philip Cohen, said Mr Trump blocked him after he responded to one of his tweets with a mocked up image that labelled the president a "corrupt incompetent authoritarian".

  "At first I was kind of proud, like 'oh he cares about me,'" he told AFP news agency.

  "But then very quickly I realized that a lot fewer people were seeing my tweets and my political efficacy, my ability to speak to my fellow citizens, was impaired by that. And I think that's not the way our government should act."

