  Your day-by-day guide to what is happening when - and who to watch out for - at the Paris 2024 Paralympics.

  What's happening and when on Paris Paralympics final day?

  The Paris Paralympics come to a close on Sunday and our guide will take you through the final 14 competition events - all times BST. A team of 215 athletes have represented ParalympicsGB in the French capital, with a target of 100-140 medals set by UK Sport. At the delayed Tokyo 2020 Games, held in 2021, the GB team finished second behind China in the medal table with 124 medals, including 41 golds. The Games began with the opening ceremony on Wednesday, 28 August, with the first medals decided the following day and action continuing until Sunday's closing ceremony.

  Para-athletics (men’s T54 marathon, T12 marathon; women’s T54 marathon, T12 marathon); Para-canoe (women’s KL1, KL2, KL3; men’s VL2, VL3); Para-powerlifting (women’s up to 86kg, over 86kg; men’s up to 107kg, over 107kg); Wheelchair basketball (women’s final)

  On the final day, action returns to the streets of the French capital with the marathons (from 07:00) which will include a 185-metre climb and link Seine-Saint-Denis, the area at the heart of the Games, and central Paris. As the race nears its end, the competitors will pass through Place de la Concorde, which hosted the opening ceremony, before heading up the Champs-Elysees and its cobbles to the Arc de Triomphe and the finish line at the Esplanade des Invalides, which was also the Olympic marathon finish. Eden Rainbow-Cooper made a major breakthrough when she won the Boston Marathon in April and will hope to shine on the Paris streets along with David Weir who famously won in London but was fifth in Tokyo after failing to finish in Rio. GB will be hoping for canoe success with defending KL2 champion Charlotte Henshaw and KL3 champion Laura Sugar both hoping to be on top of the podium again (10:41 and 11:07) and could model and Mr England winner Jack Eyers land a medal in the VL3 final (11:41)?

  Eyers chose to have his right leg amputated aged 16 and was the first amputee to be crowned Mr England

  The final day of powerlifting sees the heavyweights take to the stage - the women's up to 86kg (09:35) and over 86kg divisions (13:00) and the men's up to 107kg (08:00) and over 107kg (14:35) - the final gold medal before the closing ceremony. In the over 107kg division in Tokyo, Jordan's Jamil Elshebli and Mansour Pourmirzaei of Iran both lifted 241kg - almost 38 stone in old money - with Elshebli winning gold on countback. China’s Deng Xuemei lifted 153kg to take the women's over 86kg and you can expect plenty of big lifts again this time around. The women's wheelchair basketball also takes centre stage with the Netherlands aiming to retain the title they won for the first time in Tokyo - they take on the United States in the final (12:45).
