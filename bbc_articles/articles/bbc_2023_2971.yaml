title: 'Watch: Zelensky on Ukraine''s ''year of invincibility'' - BBC News'
date: '2023-02-24'
section: General
url: http://www.bbc.co.uk/news/world-64759078
content: |-
  The Ukrainian president addresses his people one year on from the start of the Russian invasion.

  Ukraine's President Volodymyr Zelensky has hailed his nation's "year of invincibility", one year on from the start of the Russian invasion.

  In a televised address, he said Ukraine would "do everything to win this year".
