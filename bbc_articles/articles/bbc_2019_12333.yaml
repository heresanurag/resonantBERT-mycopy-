title: 'Stratford stabbing: Boy arrested on suspicion of murder - BBC News'
date: '2019-10-11'
section: London
url: http://www.bbc.co.uk/news/uk-england-london-50017934
content: |-
  Baptista Adjei, 15, was murdered near a shopping centre in Stratford, east London.

  Baptista Adjei, 15, lived with his family in North Woolwich, London

  A 15-year-old boy has been arrested on suspicion of murdering another 15-year-old near a London shopping centre.

  Baptista Adjei, from North Woolwich, was found critically injured on Stratford Broadway, east London, shortly after 15:20 BST on Thursday.

  Police believe he and a 15-year-old friend were either attacked on a bus, or shortly after getting off.

  Another boy was arrested on suspicion of murder after handing himself in on Friday evening.

  The Met Police said he had been remanded in custody.

