content: |-
  Ranks of soldiers and huge crowds lined the streets to welcome the Russian president to North Korea.

  A lavish ceremony has taken place in Pyongyang's main square to welcome Russian President Vladimir Putin to North Korea.

  Mr Putin received a red carpet welcome, including roses, waving crowds and ceremonial gunfire at a grand military parade.

  The Russian president thanked North Korean leader Kim Jong Un for inviting him to Pyongyang, in his first official visit to the country since 2000.

  Footage released by state media showed tens of thousands of people lining the cleared avenues of the capital's centre as the leaders’ motorcade weaved through.

  The state news agency said the pair discussed deepening ties between their countries after Mr Putin’s arrival overnight.

  Relations between Russia and North Korea have strengthened since Russia's invasion of Ukraine.

