title: 'Football gossip: Toney, Chiesa, Calvert-Lewin, Mangala, Brobbey - BBC Sport'
date: '2024-08-27'
section: Football
url: http://www.bbc.co.uk/sport/football/articles/cz73n77v4xzo
content: |-
  Chelsea make a move for Ivan Toney, Dominic Calvert-Lewin is attracting Newcastle and Manchester United interest, Liverpool are working to secure a deal for Federico Chiesa, plus more.

  Chelsea make a move for striker Ivan Toney, Dominic Calvert-Lewin attracting Newcastle and Manchester United interest, Liverpool working to secure a deal for forward Federico Chiesa. Chelsea have made a move to sign 28-year-old Brentford and England striker Ivan Toney, though the Blues will not be able to match the wages on offer from Saudi Arabian club Al-Ahli. (Sky Sports) , external Toney could reportedly earn up to £400,000 a week with the Saudi Pro League side. (Mail), external Newcastle and Manchester United are looking at a late move for England forward Dominic Calvert-Lewin, 27, who is out of contract at Everton next summer. (Football Insider), external Liverpool are working to complete the signing of Juventus and Italy forward Federico Chiesa, 26, before the transfer window closes on Friday. (Athletic - subscription required), external Lyon and Belgium midfielder Orel Mangala, 26, is expected to have a medical with Everton with a view to joining the club on loan before the transfer deadline. (Sky Sports), external Leicester are close to a breakthrough in their £19.5m bid to sign Genk and Morocco midfielder Bilal El Khannouss, 20. (Daily Telegraph - subscription required), external Nottingham Forest are looking at Ajax and Netherlands forward Brian Brobbey, 22, as a potential signing before the transfer window closes. (Mirror), external Chelsea have identified Aston Villa and Colombia forward Jhon Duran, 20, as an alternative to Napoli striker Victor Osimhen if they fail to sign the 25-year-old Nigeria international. (Givemesport), external Roma are open to selling England forward Tammy Abraham, 26, with West Ham interested. (Football Insider), external

  Bayern Munich and Borussia Dortmund are monitoring 24-year-old English winger Jadon Sancho's situation at Manchester United. (Talksport), external Manchester City are yet to make a decision on the future of Portugal midfielder Matheus Nunes, 25, but are aware of Atletico Madrid's interest in him. (ESPN), external Ipswich Town are in advanced talks to sign Republic of Ireland winger Chiedozie Ogbene, 27, from Luton Town. (Athletic - subscription required), external Leeds have opened talks with Fortuna Dusseldorf in a bid to sign Japan midfielder Ao Tanaka, 25. (Mail), external Bayern Munich have agreed a deal with Saudi Arabia's Al-Hilal for Kingsley Coman, however the 28-year-old France winger has yet to commit to the move. (Sky Germany) , external West Brom have rejected a bid of about £10m from Southampton for 21-year-old English winger Tom Fellows. (Telegraph), external Netherlands striker Wout Weghorst, 32, is set to join Ajax from Burnley after reaching a personal agreement with the Dutch club. (ESPN), external
