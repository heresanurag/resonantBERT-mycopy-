  Once again it was passed every day by thousands of commuters, and was even featured in Bill Forsyth's 1981 film Gregory's Girl - appropriately during the scene when Gregory waits for his date Dorothy.

  Eventually the walkway was redeveloped and the clock, now known to many as the Cumbernauld clock, was placed into storage.

  By 2005 it had been out of the public eye for roughly a decade, a move that incensed locals who regarded the piece as a cinematic treasure.

  Clare Grogan and John Gordon Sinclair were a massive success in the 1981 film Gregory's Girl

  Eventually it was hung in the newly built Antonine Shopping Centre, which opened in 2007 - and interest in its welfare was far from waning.

  Mr Smith said: "Cumbernauld does get quite a lot of tourists.

  "People come from all over the world to view it - it does have that legendary status.

  "Architectural students ask about it, also people who have the connection with the clock. They want to see it and make sure it's in good working order."

  Until last week, the area surrounding the clock was sealed off from the public amid developments at the shopping centre.

  It is now back on display, but questions have been raised over its future after Network Rail recently indicated their interest.

  The clock on display at the Antonine Shopping Centre

  The company hoped to acquire the clock as part of a £100m upgrade to Queen Street Station, which is due for completion in 2019.

  A spokesperson said: "We have committed to exploring the possibility of returning the former St Enoch station clock to a railway setting in the redeveloped Queen Street, but any decision on its future would be for the current owners to make."

  Councillor Allan Graham, who is chair of Campsies Centre Ltd, maintained the clock is an "important artefact in the town's history".

  Plans are in motion to find the clock a new home, but whether that home will be in Cumbernauld is unclear.

  Mr Smith said: "The problem is, the clock is very large and heavy.

  "The problem is finding somewhere structurally able to cope. The idea is it goes somewhere visible and accessible to as many people as possible.

  "Campsies Centre Ltd have kind of been custodians investigating various options - chances are it'll need to be a purpose built area to accommodate it."
