title: A new home for the Gregory's Girl clock? - BBC News
date: '2019-03-26'
section: Glasgow & West Scotland
url: http://www.bbc.co.uk/news/uk-scotland-glasgow-west-47666900
content: |-
  A long-running debate over the famous clock's true home flares up after another attempt to move it to Glasgow.

  A landmark clock which featured in the 1981 romantic Scottish comedy Gregory's Girl is at the centre of a debate over its true home. But how did this striking piece wind up in a Lanarkshire shopping arcade - and will it remain there?

  It's perhaps unusual for a prominent landmark to go through something of an identity crisis - but then, the St Enoch Station Clock is not your average timepiece.

  The clock, which famously appeared in the film Gregory's Girl, was suspended from the roof of the old Glasgow station until its closure in 1966.

  It was distinctly Victorian, embroidered with an ornate frill as it ticked out the minutes and hours on Roman numerals.

  Even now, it is still fondly remembered as the place where young lovers would often meet before a night on the town.

  But just in the way that Glasgow residents were absorbed into Cumbernauld due to an overspill in population, so was the famous clock when it was gifted to the town by businessman Raymond Gillies in the 1970s.

  In recent years a debate has arisen over the clock's true home, fuelled by a number of bids to bring it back to Glasgow - most recently from Network Rail who want to install it in the revamped Queen Street Station.

  The tug of war over ownership is living proof that the clock's links with both regions are alive and well, according to Cumbernauld community councillor, and author of Cumbernauld Through Time, Adam Smith.

  He said: "I know people in Cumbernauld who have strong memories in St Enoch station, including someone who regularly met his now wife for dates under that clock. For him, the clock kept that association and link with Glasgow.

  "This debate has been going on for a while. I'm aware that within the last few years there has been a few approaches from Network Rail and others to secure the clock.

  "The argument is that, though St Enoch Station is long gone, it should be returned to Glasgow.

  "But the clock actually went to auction. Glasgow or the relevant train operator decided they didn't want it, and so it was bought by a private businessman and gifted to Cumbernauld for our 21st birthday. A lot of it was circumstance."

  Be it a stroke of fate or not, Cumbernauld embraced the clock with open arms more than four decades ago.

  It was installed at a key pedestrian thoroughfare - an atrium between the town centre and the main supermarket Woolco, which is now Asda.

  The Queen unveiled the clock in 1977.

