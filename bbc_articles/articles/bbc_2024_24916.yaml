title: Scottish DJ Jackmaster dies after head injury in Ibiza - BBC News
date: '2024-10-13'
section: Glasgow & West Scotland
url: http://www.bbc.co.uk/news/articles/c5y9r1y4r92o
content: |-
  Jack Revill, 38, died on Saturday morning following "complications arising from an accidental head injury".

  Scottish DJ and producer Jack Revill, known as Jackmaster, has died after suffering a head injury in Ibiza. Revill, 38, died on Saturday morning following "complications arising from an accidental head injury", his family said. They added that they were "utterly heartbroken" from the "devastating" loss. The Glasgow DJ played some of the most famous clubs and festivals throughout the world, as well as co-founding the Numbers record label.

  A statement from his family said: "It is with profound sorrow that we confirm the untimely passing of Jack Revill, known to many as Jackmaster. "Jack tragically died in Ibiza on the morning of October 12, following complications arising from an accidental head injury. "His family - Kate, Sean and Johnny - are utterly heartbroken. "While deeply touched by the overwhelming support from friends, colleagues, and fans, the family kindly requests privacy as they navigate the immense grief of this devastating loss".

  The DJ performed across the world, including Dublin's Bulmers Forbidden Fruit festival in 2016

  Born in Glasgow, Revill worked at well-known record shop Rubadub in Glasgow, and went on to become the co-founder of the record label Numbers. He had recently released the single Nitro, featuring Kid Enigma, telling Electronic Groove music magazine: "It was about feeling hyped and inspired in the club. "Sadly, those moments are rare now. Blame the phones and people who don't dance, I think. "I am so grateful for my fans, but I got into music because I love dancing. It's a lost artform at the moment, I think". In 2018 he apologised after an incident at the Love Saves the Day music festival in Bristol, after admitting behaving "inappropriately and offensively to staff at the event whilst heavily intoxicated". Electronic duo Disclosure were among those paying tribute, writing on Instagram, external: "Can't believe this. Heart broken. Thank you for all the amazing memories & inspiration Jack. This is just awful awful awful." A post from the official Instagram account of DU duo CamelPhat on Revill's Instagram page said: "Can't believe what I'm reading... in an industry full of Ego you were hands down one of the nicest fellas we ever met along the way. Our thoughts are with family & friends. RIP my friend x
