title: Ukraine claims advancement into Russia continues - BBC News
date: '2024-08-14'
section: Europe
url: http://www.bbc.co.uk/news/articles/cj627x96gxxo
content: |-
  President Volodymyr Zelensky says his troops have captured 100 Russian soldiers since the morning.

  Ukraine says its forces are continuing their advance into Russian territory, moving forward in several directions. Russia's western border region of Kursk came under a surprise attack last week, leading Russian authorities to declare a state of emergency in the area. Ukrainian President Volodymyr Zelensky said troops had advanced 1-2 km further into Kursk since Wednesday morning, and had also captured 100 Russian soldiers. But Russia claims it has stopped any further advances. Now in its second week, this is Ukraine's deepest incursion into Russia since Moscow launched its full-scale invasion in 2022.

  The amount of Russian territory seized is uncertain, with both countries making conflicting statements. A commander of the Chechen Akhmat special forces unit, Maj-Gen Apti Alaudinov told viewers on Russian state-controlled TV, Channel One, that Russian forces had almost “completely blocked” the Ukrainian military from advancing. But in a video link to President Zelensky, army chief Oleksandr Syrskyi stated Ukrainian troops were now fully in control of the Kursk border town of Sudzha. The BBC is unable to independently verify this claim, but a Ukrainian television report filmed from within the town showed Ukrainian soldiers removing a Russian flag from a school.

