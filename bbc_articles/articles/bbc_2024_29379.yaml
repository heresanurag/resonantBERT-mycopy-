title: Arrest linked to secret filming of women for videos shared on TikTok - BBC
  News
date: '2024-11-27'
section: England
url: http://www.bbc.co.uk/news/articles/c2450d5993vo
content: |-
  A BBC North West investigation found the videos had millions of views and attracted misogynistic comments.

  The videos have gained millions of views on social media

  A man has been arrested after women were filmed on nights out without their knowledge and the videos were shared on social media. A BBC North West investigation revealed such films had gained millions of views and attracted misogynistic comments, which led to a police inquiry. The videos on TikTok, Youtube and Instagram, often titled Manchester nightlife or Liverpool nightlife, were uploaded daily. A 27-year-old man was arrested on suspicion of stalking and harassment in Bradford earlier and is being questioned in police custody.

  Greater Manchester Police said many women who had been impacted by such videos had come forward following a public appeal. One of the women filmed told the BBC she was recorded walking along Deansgate in Manchester. The 23-year-old said she had not realised she had been filmed until she was sent a link to one of the videos. "I have no words really other than it just made me feel a bit sick," she said. The force said: "We’ve arrested a 27-year-old man from Bradford on suspicion of stalking and harassment, in connection with several reports of women being followed, filmed, and harassed in Manchester City Centre. "This arrest is thought to be the first in the country linked with several viral videos on social media platforms appearing to have filmed women on nights out, some whilst in vulnerable positions."

  Police said the arrest was thought to be the first in the country connected with videos of women filmed in "vulnerable positions" on nights out

  GMP said officers had found other content "locked under paywalled accounts which included footage of suspected non-consensual nudity and upskirting" in the course of the investigation. Ch Insp Stephen Wiggins said: "Filming in public is legal, however where this filming crosses the line into offences such as upskirting, stalking or harassment, it’s important that we don’t allow that behaviour." He added: "Everyone has the right to feel safe as they enjoy a night out, and these videos have made people, particularly women, not feel like that, which we can’t tolerate."
