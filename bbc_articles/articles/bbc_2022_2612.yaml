title: 'Ukraine violence: Missiles, helicopters and gunfire - BBC News'
date: '2022-02-24'
section: General
url: http://www.bbc.co.uk/news/world-europe-60508121
content: |-
  Footage from Ukraine as Russia attacks shows explosions, a fireball at an airport and a helicopter under fire.

  Russian forces have launched a military assault on neighbouring Ukraine, crossing its borders and bombing targets near big cities.

  Footage from locations around the country shows how some of the violence has unfolded, including a fireball as missile hit an airport in western Ukraine, a Russian helicopter coming under fire and pre-dawn explosions close to the city of Kharkiv.
