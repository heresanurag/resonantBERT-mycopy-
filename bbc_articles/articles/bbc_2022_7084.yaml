title: '''World’s biggest'' freshwater fish found in Mekong, Cambodia - BBC News'
date: '2022-06-21'
section: General
url: http://www.bbc.co.uk/news/world-asia-61885581
content: |-
  The biggest freshwater fish ever documented, weighing in at 300kg (661lb), is found in the Mekong river in Cambodia.

  The biggest freshwater fish ever documented was found in the Mekong river in Cambodia, according to scientists.

  Weighing in at 300kg (661lb), the giant stingray was studied and tagged before being released back into the river.

  Scientists said the discovery was ''absolutely astounding.''
