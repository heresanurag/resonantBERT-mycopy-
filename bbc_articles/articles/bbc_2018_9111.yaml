  The court heard how Ali had travelled to Afghanistan in 2011 and spent five years making bombs to maim and kill coalition troops.

  He returned to the UK in early November 2016 and was stopped at Heathrow airport, interviewed by police and had his fingerprints and DNA samples taken.

  His fingerprints were found on component parts of explosive devices that were handed in to US forces in Afghanistan in 2012.

  During police interviews, Ali admitted having "pressed the button" on more than 300 remote controlled bombs in Afghanistan and said he had returned to the UK to deliver a "message" to those in power.

  Addressing the judge on Friday, prosecutor Brian Altman QC said the explosives convictions included the "likelihood of multiple deaths being caused", and the preparatory offence relating to Westminster was "a fully-fledged plan nipped in the bud by the authorities".

  Police earlier defended the decision not to arrest Ali until April 2017, saying security services had been "managing any potential risk he posed" and that he was arrested at the most appropriate time".
