title: 'Khalid Ali: Westminster plot bomb-maker jailed for life - BBC News'
date: '2018-07-20'
section: UK
url: http://www.bbc.co.uk/news/uk-44901792
content: |-
  Khalid Ali was carrying three knives when he was tackled by armed officers near Downing Street.

  Khalid Ali was found guilty of preparing an act of terrorism in the UK and two counts of possessing an explosive substance with intent

  A plumber has been jailed for life for planning a terror attack in Westminster and making bombs for the Taliban.

  Khalid Ali, 28, from Edmonton in north London, was arrested on 27 April 2017 in Parliament Street, London, where he was caught carrying three knives.

  It was later revealed that he had spent five years in Afghanistan making bombs.

  He will serve with a minimum term of 40 years for preparing an act of terrorism in the UK and two counts of possessing an explosive substance with intent.

  Judge Nicholas Hilliard QC said that all three convictions were "very grave indeed".

  Ali had been "part of a very substantial operation engaged in terrorist activity in Afghanistan", he said.

  The judge said the UK plot was designed to attract "maximum publicity and instil terror".

  He added: "I am sure your plan was to attack and kill someone in central London.

  "Your preparations were complete and you very simply had to identify your precise target and his or her death was very likely to be caused by a knife attack.

  "I think you would have killed any police officer you could."

  Judge Hilliard passed life sentences with minimum terms of 40 years for the explosives offences, and life with a minimum term of 25 years for planning an attack in the UK - which will run concurrently.

  On 22 April last year - one month after the Westminster terror attack - Ali was seen on CCTV walking past a number of high profile locations in central London, including the MI6 building, Westminster Bridge, the Houses of Parliament and Whitehall.

  Five days later, his mother called police and said she had found four knives in his bedroom.

  He was arrested later that day, just metres from Downing Street.

