title: 'Gwynedd: Man with life-threatening injuries after boat fire - BBC News'
date: '2024-07-13'
section: Wales
url: http://www.bbc.co.uk/news/articles/cmj2krnkv81o
content: |-
  The blaze happened on a yacht moored at Porth Penrhyn and emergency services were called to attend.

  Flames were spotted at Porth Penrhyn in Bangor

  The owner of a yacht has been left with life-threatening injuries after it caught fire while he was repairing it. North Wales Fire and Rescue Service said it was called to the incident at Porth Penrhyn boatyard near Bangor, Gwynedd, at 13:37 BST on Saturday. The vessel was engulfed in flames following a gas explosion and black smoke could be seen rising into the sky. The man was subsequently taken to hospital by air ambulance.

  A spokesperson for Dickie's Marine Services, which operates the facility, said the blaze started on a catamaran which was out of the water at the time. "There was a gas explosion, but the cause isn't clear at the moment," he said. "The catamaran's owner suffered burns to his arms and the top of his head." North Wales Fire and Rescue Service sent four fire crews along with an aerial ladder platform and a welfare unit. Two sets of hose reel water jets were used to tackle the flames. North Wales Police cordoned off the area and the Welsh Ambulance Service also attended. The fire has now been contained and investigations are ongoing.
