id: bbc_2018_5360
title: India police arrest main suspect after teen raped and burned alive - BBC News
date: '2018-05-07'
section: India
url: http://www.bbc.co.uk/news/world-asia-india-44022550
content: |-
  Police say 15 people have been arrested in connection with the rape and murder of the 16-year-old.

  Relatives of the 16-year-old mourn in the village of Raja Kendua

  Indian police say they have arrested the main suspect in an alleged gang-rape and murder of a teenage girl.

  Dhanu Bhuiyan and his accomplices are accused of burning the 16-year-old alive on Friday in the state of Jharkhand.

  She was killed after her parents complained to village elders that she had been raped, according to police.

  The elders had told two accused rapists to do 100 sit-ups and pay a 50,000 rupee (£550; $750) fine as punishment.

  The men were allegedly so enraged by the penalty that they beat the girl's parents then set her on fire.

  "The two accused thrashed the parents and rushed to the house where they set the girl ablaze with the help of their accomplices," Ashok Ram, the officer in charge of the local police station, told the AFP news agency.

  Police say they have arrested 15 of the 18 people they want to investigate in connection with the incidents.

  They say Mr Bhuiyan was arrested at a relative's house where he was hiding. The suspect has not commented on the accusations.

  The girl was believed to have been abducted from her home while her parents were attending a wedding.

  She was then allegedly raped by two men in a forested area near the village of Raja Kendua.

  Upon discovering the assault, the 16-year-old's parents went to village elders to pursue charges against the suspected perpetrators.

  The victim and the accused appeared to have known each other, police inspector-general Shambu Thakur told AFP.

  A series of sexual assaults have triggered outrage across India

  Councils of village elders carry no legal weight. However, they have significant influence in many parts of rural India and are a way of settling disputes without having to go through India's expensive judicial system.

  However, several village elders have been charged with passing unlawful orders and tampering with evidence.

  The latest incident comes as India reels from a string of violent sexual crimes.

  About 40,000 rape cases were reported in India in 2016.

  Many cases, however, are believed to go unreported because of the stigma that is attached to rape and sexual assault.
