title: 'Ipswich deaths: Tributes to ''lovely'' mother Kia Russell - BBC News'
date: '2019-03-07'
section: Suffolk
url: http://www.bbc.co.uk/news/uk-england-suffolk-47481907
content: |-
  A 17-year-old boy is being questioned by police after the woman and her young son were found dead.

  Tributes have been paid to a "lovely" woman who died suddenly at home with her young son.

  Police were called to Swinburne Road in Ipswich at 17:00 GMT on Wednesday after the body of Kia Russell, 19, was found. Her son Kamari, two, was treated at the scene but died.

  Police have officially named the pair and confirmed there was "no third party involvement" in the deaths.

  A boy, 17, from Ipswich, arrested at the scene was released on police bail.

  Police say he was not being held on suspicion of murder or manslaughter.

  Lisa Horne, who lived next door until December, said news of the deaths was "really shocking".

  "She was in the garden with her son, or when we were doing the car she was there with hers. She always said 'morning' or 'hello'."

  Ms Horne added: "She never had any issues and was quiet. I just feel at a loss, at such a young age for both of them - no life at all really."

  Kia Russell posted this picture of Kamari on Facebook

  Another neighbour said Ms Russell was "an absolutely brilliant mum" to her son.

  "She was always caring for him. Wherever she went, he went as well.

  "Whenever I saw them, he was never screaming. He was always content."

  Suffolk Police said next of kin had been informed

  Friends and family have been leaving floral tributes

  The Reverend Mary Sokanovic, the priest in charge of the parish of Whitton with Thurleston and Akenham, said the church would be open for people to "find a quiet space or pray".

  "It's absolutely distressing. There aren't words for it," she added.

  She described the area as a "very mixed and varied parish".

  An area has been set aside at the Church of St Mary and St Botolph in Whitton

  Suffolk Police said next of kin had been informed, and officers have appealed for anyone with information to contact them.

  Post mortem examinations will take place on 12 March.

