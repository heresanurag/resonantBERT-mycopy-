title: Family's tribute to 'beautiful' teen killed at docks - BBC News
date: '2024-12-14'
section: Liverpool
url: http://www.bbc.co.uk/news/articles/c5yd2l7z18go
content: |-
  Zacharias Atkinson, 19, was fatally injured in an industrial incident in Bootle, Merseyside.

  Zacharias Atkinson was described as a Liverpool fan who "adored every one of his friends and family"

  The family of a man who was killed in an incident on an industrial estate have paid tribute to him and said "nobody should go to work and not come home". They described 19-year-old Zacharias Atkinson, also known as Puddy, as having "lived every moment to the fullest" after he was fatally injured at a privately-owned dockyard site in Bootle, Merseyside, on Wednesday afternoon. His relatives said: "Our beautiful boy Puddy has had his young life taken in the most horrific circumstances. "Our family and all of his friends are devastated beyond words. Nobody should go to work and not come home."

  Merseyside Police and the Health and Safety Executive have launched a joint investigation into the circumstances of Mr Atkinson's death. His family added that "he loved Liverpool FC, he adored every one of his friends and family".
