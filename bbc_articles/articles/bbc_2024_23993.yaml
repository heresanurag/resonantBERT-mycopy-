title: Danny Kinahan resigns as NI's veterans commissioner - BBC News
date: '2024-09-05'
section: Northern Ireland
url: http://www.bbc.co.uk/news/articles/c5y5327mjxzo
content: |-
  Mr Kinahan, NI's first commissioner, said he cannot provide the independent voice veterans require.

  Danny Kinahan was appointed to the role in 2020

  Northern Ireland's first ever veterans commissioner Danny Kinahan has resigned. In a statement, he said he “cannot provide the independent voice that veterans require”. Mr Kinahan, a former Ulster Unionist MP who served as a captain in the Blues and Royals Regiment, was appointed to the role in 2020. Northern Ireland Secretary Hilary Benn thanked Mr Kinahan for his “dedicated work on behalf of veterans and families living in Northern Ireland”.

  Mr Kinahan said that veterans in Northern Ireland “do not enjoy the same protection as their counterparts in Great Britain”. He said he had decided to resign following an “open and frank” conversation with Mr Benn. Mr Kinahan added: “Veterans in Northern Ireland have particular needs and concerns which need to be addressed by the UK Government, which I have made very clear in our discussions.”

