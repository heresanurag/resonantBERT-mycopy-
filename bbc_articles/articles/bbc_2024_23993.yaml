  Mr Kinahan was the first veterans commissioner to be appointed in Northern Ireland. Mr Benn said in his role as commissioner Mr Kinahan had spent four years working with veterans on a range of issues. The government, the secretary of state said, would “continue to engage with him on these issues”. He added: “We are committed to continuing to support veterans in Northern Ireland through the Veterans Welfare Service NI and the Armed Forces Covenant Fund Trust.” Democratic Unionist Party leader Gavin Robinson said Mr Kinahan's resignation raises questions for the government. "The Northern Ireland Office must urgently address the widespread concern of veterans who valued Danny's personal commitment and move quickly to assuage their concerns," he said. Plans for a commissioner for military veterans were contained in 2020's New Decade, New Approach agreement. According to the most recent census in 2021, it is estimated about 40,000 to 60,000 armed forces veterans live in Northern Ireland.
