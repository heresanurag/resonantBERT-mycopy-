  Weekly quiz: Who joined Kylie on the King's personal playlist?

  This week saw talks to end the three-year war in Ukraine enter a new phase, a mission to find ice on the Moon fall flat, and the UK unveil its latest attempt to take the crown at Eurovision. But how much attention did you pay to what else has been going on in the world over the past seven days?

