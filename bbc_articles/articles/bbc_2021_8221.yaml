title: 'Covid: Starmer warns of summer chaos over self-isolation - BBC News'
date: '2021-07-07'
section: UK
url: http://www.bbc.co.uk/news/live/uk-57746332
content: |-
  Keir Starmer asks Boris Johnson if he is comfortable with a possible 100,000 Covid cases a day.

  Labour's Catherine McKinnell has asked the PM for the data on the impact when all covid restrictions in England are lifted, likely to be on 19 July.

  She says cases are "sky rocketing" and nurseries are having to limit numbers to maintain legal ratios of staff to children.

  The PM says: "We have to make sure we use the tools we have in terms of isolation to get through this particular phase, it won't last long."

  She says businesses are having to close because of staff having to self-isolate.

  The PM says: "Thanks to the vaccine rollout we were able to get to step 3 and we have a review on 12 July but it looks as though we will get through to step 4 which will allow them to open up fully without the need for the one metre rule."

  McKinnell pushes the PM to share the data on what impact lifting restrictions will have on coronavirus cases, hospitalisations and deaths.

  He says: "We have data on hospitalisations and deaths and we have data for predictions for where they might go. They're available, you can look at them but they're speculative at the moment."

  He says we are in "about the middle to low of projections" scientists have made for the third wave if "all the openings" go ahead.
