title: Damage assessed after hurricane smashes through Florida - BBC News
date: '2024-10-10'
section: General
url: http://www.bbc.co.uk/news/videos/cm249d0l4dlo
content: |-
  The deadly storm brought tornadoes, floods and storm surges, destroying homes and leaving millions without power.

  Rescue and recovery efforts have begun in Florida after Hurricane Milton made landfall, ripping the roof off a stadium and leaving millions without power.

  Ahead of the storm on Wednesday, tornadoes touched down, levelling houses and killing at least five people.

  As the evening wore on, emergency services carried out dozens of rescues in flooded communities.

  One Floridian urged people to "start praying" for his neighbourhood.
