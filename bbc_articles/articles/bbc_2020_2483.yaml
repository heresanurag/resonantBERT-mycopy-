id: bbc_2020_2483
title: Greek coast guards fire into sea near migrant boat - BBC News
date: '2020-03-03'
section: General
url: http://www.bbc.co.uk/news/world-europe-51715422
content: |-
  The dinghy was also shoved around with boats by coast guards trying to force it back towards Turkey.

  Footage has emerged of Greek coast guards firing into the sea near a migrant dingy, and shoving it around, as they attempted to force it back towards Turkey.

  Migrants on another dinghy were met with shouts of "go away" by angry residents of the island of Lesbos.
