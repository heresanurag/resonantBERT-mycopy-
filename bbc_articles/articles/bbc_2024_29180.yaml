  BBC journalist Hazel Martin goes on a personal journey to find out why alcohol-related deaths from liver disease among women under 40 have risen sharply over the last decade. Watch now on BBC iPlayer or on Monday 25 November at 20:00 (20:30 in Wales and Northern Ireland) on BBC One.

  Several months after my diagnosis, I went back for a repeat fibroscan to see if there had been any improvement. I was relieved to see that my fibroscan reading had gone from 10.2 to 4.7 - back in the normal and healthy range. I was surprised what a dramatic difference cutting out alcohol had made in such a short space of time. I don’t plan on drinking again - I’ve been advised not to. I haven’t touched a drop for nearly a year and feel much better for it - but I still mourn it in a way I can’t quite put my finger on. Alcohol is ingrained in our culture. We drink at birthday parties, weddings and funerals. And then of course there’s the festive season, which builds up ahead of Christmas and lasts right through to New Year’s Day. For me growing up, alcohol felt normalised and I don’t think I was fully aware how much pressure there was to drink until I was forced to give it up. Abstaining hasn’t been easy though. It has taken a long time to reprogramme my brain to not need or want alcohol as a treat, a reward, or as a way to relax and have fun socially. I think that was part of the problem for me then, and it remains a problem for our society now.

