title: Chants, shooting and sirens as Iran prison burns - BBC News
date: '2022-10-16'
section: General
url: http://www.bbc.co.uk/news/world-middle-east-63273749
content: |-
  In some videos people could be heard outside the prison chanting "death to the dictator".

  A blaze at Evin Prison in Iran has been captured in videos shared on social media, where gunshots and explosions can be heard.

  Iran has been gripped for weeks by anti-government protests and many of those detained in Iran's recent protests have reportedly been sent to Evin.

  Read more: Huge fire and gunshots at notorious Iranian prison
