title: Vet shares top tips for saving money - BBC News
date: '2024-06-16'
section: General
url: http://www.bbc.co.uk/news/videos/cpddvnjejp1o
content: |-
  Keeping your pet on a healthy diet and brushing its teeth can help save pennies, says vet.

  Having a pet to love and care for is incredibly rewarding, but the cost of your animal companion can also be expensive.

  From fuel and electricity to milk and eggs, we've all noticed the price of things around us going up.

  And if you're a pet owner, it can be difficult to save money while keeping the same level of care.

  Cat the vet has shared her simple changes, from putting your furry friend on a diet to brushing their teeth, that can help save those pennies along the way.
