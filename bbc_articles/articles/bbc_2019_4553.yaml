id: bbc_2019_4553
title: '''Road Runner'' emu filmed sprinting along A82 - BBC News'
date: '2019-04-15'
section: General
url: http://www.bbc.co.uk/news/uk-scotland-47942016
content: |-
  The footage was captured between Fort William and Inverness.

  An emu has been caught on camera sprinting along a road in the Scottish Highlands.

  The bird can be seen running away from traffic on the A82 outside Fort Augustus.

  It has reportedly been returned safely to its home.
