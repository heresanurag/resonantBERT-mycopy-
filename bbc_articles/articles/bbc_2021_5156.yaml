title: US Dragon spaceship arrives at International Space Station - BBC News
date: '2021-04-24'
section: General
url: http://www.bbc.co.uk/news/science-environment-56871765
content: |-
  SpaceX's Dragon Endeavour spacecraft has docked with the International Space Station.

  Americans Shane Kimbrough and Megan McArthur, Frenchman Thomas Pesquet and Japanese flier Akihiko Hoshide were greeted with hugs by the crew already onboard.
