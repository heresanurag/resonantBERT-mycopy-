  Reeves also restored the government's £9.9bn "headroom" - spare cash it will have by the end of its five year budget period to deal with unexpected developments. But the OBR says this is a "very small margin" and it would not take much to knock the government's finances off course. The watchdog believes Reeves has just over a 50% chance of meeting her own borrowing and debt rules by the end of the decade. But Reeves insisted at a news conference that she was determined to keep a grip on the public finances. "People should have no doubt about my commitment and how seriously I take the fiscal rules, as I said today they are non-negotiable," she told reporters. She said the government would continue to make the case for free trade, amid the looming threat of US tariffs. On Wednesday, US President Donald Trump announced new import taxes of 25% on cars and car parts coming into America in a move that threatened to widen the global trade war. Lib Dem Treasury spokeswoman Daisy Cooper warned the chancellor she was "flying blind" into a trade war with Donald Trump that would leave her plans in "tatters" and the government should instead seek a new trade deal with the EU. Reform's deputy leader Richard Tice described the OBR's forecasts as "delusional" and said Labour should not rely so much on their advice. "We can't keep spending more than we're earning," he told BBC Radio 5's Matt Chorley. "I'm afraid we're heading to a very difficult place, led by the R-word – recession."

  Benefit cuts announced last week were extended after the OBR said they would not raise as much money as the government had expected. A rise in the standard rate of universal credit will be £1 a week lower than previously announced, and the health element of universal credit - which reflects a limited capability to work - will be frozen at £97 a week until 2029 for existing claimants. An extra 250,000 people, including 50,000 children, will be pushed into relative poverty by the government's changes, according to its own impact assessment. And an estimated 800,000 people will lose out on personal independent payments (Pips) by 2030. A further 2.25 million people currently receiving the health top up to universal credit will lose an average of £500 a year as a result of the freeze, and 730,000 future recipients will lose out. About 3.9 million households not on the health element of universal credit are expected to gain an average of £265 a year from the increase to the standard allowance. But the government stresses there are limits to their estimates because they don't take into account of funding for measures to support those with disabilities into employment. They also do not take into account the new protections for those with severe lifelong conditions.

