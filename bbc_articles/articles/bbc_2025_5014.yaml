title: Rachel Reeves squeezes benefits as 2025 growth forecast halved in Spring Statement
  - BBC News
date: '2025-03-26'
section: Politics
url: http://www.bbc.co.uk/news/articles/cz7v4370d2xo
content: |-
  The chancellor unveils defence spending boost and welfare changes in Spring Statement.

  Rachel Reeves has squeezed the welfare budget further and boosted defence spending in a Spring Statement aimed at kick-starting the faltering economy. The Office for Budget Responsibility (OBR) - the government's financial watchdog - halved its growth forecast for this year to 1%. The chancellor blamed global instability, arguing that the world was "changing before our eyes" and promising a "new era of security and national renewal". The OBR painted a more upbeat picture of subsequent years, predicting growth will be higher than expected thanks, in part, to more housebuilding.

  The Spring Statement was meant to be a routine update on the public finances but Reeves made more extensive changes after her plans were blown off course by lower growth and higher government borrowing costs. Reeves used her statement to announce a further £2.2bn for defence, while a target has been set to reduce the administrative costs of government departments by 15% by 2030. Real household disposable income per person is expected to grow by an average of around 0.5% a year, the OBR said. Reeves said this meant that by 2029 households would be on average more than £500 a year better off compared with what the OBR had expected in October. Economist Paul Johnson, director of the Institute for Fiscal Studies, told BBC Breakfast this was "actually a pretty feeble rate of growth". Writing in the Times, Reeves defended her handling of the economy, external, saying her plan was starting to "bear fruit", with wages up and interest rates down. "I won't shy away from the challenges we face, and change won't happen overnight," Reeves added. "But the prize on offer to us is immense." The Conservatives claimed her statement was an "emergency budget" to "clean up the mess" created by her decision in October to increase national insurance costs for business and government borrowing to fund public services. Shadow chancellor Mel Stride accused the chancellor of having "tanked the economy" due to her "ineptitude". This is hotly disputed by the government who insist they are sticking to rigid "fiscal rules" aimed at keeping a lid on borrowing - to prevent a repeat of the economic meltdown seen after Conservative PM Liz Truss's "mini budget". But the OBR - which was set up in 2010 to evaluate the government's figures - said Reeves will only manage to avoid breaking her fiscal rules through billions in public spending cuts. The government insists the most vulnerable will be protected from spending cuts - but some Labour MPs have accused the chancellor of seeking to balance the books on the backs of the poor and are threatening to vote against the changes. The Department for Work and Pensions' assessment finds that 3.8 million families are set to be on average £420 per year better off due to the changes. But the government analysis suggests more than 3 million families will on average be £1,720 a year worse off by 2030 due to benefit cuts. On social media, Labour MP Jon Trickett said: "I will not be voting for cuts to poorest people on welfare benefits. The chancellor has other options. "Picking on disabled people is not the right thing to do." Another Labour MP, Brian Leishman, said he was "very disappointed" with the chancellor's statement, saying "I'm not on board with that whatsoever" and confirmed he would not vote in favour.

