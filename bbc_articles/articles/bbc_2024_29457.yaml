title: 'Pall Mall: Aston Martin DB5 among cars in motoring spectacle - BBC News'
date: '2024-11-03'
section: London
url: http://www.bbc.co.uk/news/articles/cn5wx4v7kyvo
content: |-
  Vehicles on show in central London include models dating back to 1896 plus modern day supercars.

  Pall Mall was closed to through traffic on Saturday for the St James's Motoring Spectacle

  Thousands of spectators congregated in Pall Mall to see a display of some of the world's oldest and newest cars. The central London street was closed to through traffic for the St James's Motoring Spectacle, organised by the Royal Automobile Club. Cars on show across five dedicated zones included models dating back to 1896 and the Aston Martin DB5, well known from the 60-year-old James Bond film Goldfinger. A dedicated zone focused on modern design, providing both an opportunity for the public to see supercars and how manufacturers are embracing technology to make vehicles more sustainable, the automobile club said.

  The Aston Martin DB5, best known from the James Bond films, was at the event

  Alongside classics such as a 1904 Mercedes Simplex, supercars including an Aston Martin Valkyrie and a Porsche 963 hypercar that raced in this year's Le Mans 24 Hours were on display.

  Hypercars, including an Aston Martin Valkyrie, were part of the spectacle

  An extremely rare (and expensive) Pagani Huayra Roadster was part of the display

  Chairman Duncan Wiltshire said the club was "delighted" to host Saturday's event. "This wonderful new show will not only celebrate the freedoms motorised transport has provided but also forecast the car’s future role within a fast-changing world," he said. The club was founded in 1897 and its patron is King Charles III.

  Rare cars, including this Mercedes W196, were parked across five dedicated zones

  Advice on skills initiatives and careers within the automotive industry was on offer at the event

  The free event comes ahead of the RM Sotheby's London to Brighton Veteran Car Run - the world's longest-running motoring event, according to organisers - on Sunday. It will see more than 400 vehicles, built before 1905, head southward from Hyde Park.

  Cars that are more than a century old, including a 1902 Deckert, were on show

  A Porsche 963 hypercar, driven in the Le Mans 24 Hours, was a must-see attraction

