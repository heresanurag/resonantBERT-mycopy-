title: 'Thorpe Park: Riders stranded after Hyperia rollercoaster stops - BBC News'
date: '2024-06-15'
section: Surrey
url: http://www.bbc.co.uk/news/articles/cz442r1de2xo
content: |-
  The UK's tallest rollercoaster suffered another breakdown, leaving riders in mid air for an hour.

  Thorpe Park's Hyperia has suffered a series of breakdowns since opening in May

  The UK's tallest rollercoaster has suffered another breakdown just days after reopening. Thorpe Park in Surrey said people riding Hyperia were stuck on the ride for an hour on Saturday. The ride reopened on 12 June after a two-week closure, following its first day of operation. The park said the ride will remain closed while safety checks are carried out.

  Hyperia is 236ft (72m) tall and has a top speed of 81mph (130km/h). It opened on 24 May but stopped running the following day.

  In a statement on Saturday, Thorpe Park said: "Hyperia experienced a short delay in operation today. "Guests were held on the lift hill for approximately one hour before the ride was restarted and the train was brought back into the ride station." It said riders were "communicated to throughout" the shutdown. "Stoppages are perfectly normal and commonly experienced in theme parks everywhere," it said, adding: "At no stage was there any safety concerns for guests. " The ride will remain closed for the rest of Saturday to allow for checks, the theme park added.

