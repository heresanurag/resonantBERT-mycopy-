title: Social media influencers fuelling misogyny in schools, teachers say - BBC News
date: '2025-04-19'
section: Family & Education
url: http://www.bbc.co.uk/news/articles/crm3x92mpdxo
content: |-
  Almost three in five teachers believe social media use has had a negative effect on behaviour in schools, according to a union poll.

  Social media influencers are fuelling an increase in misogyny and sexism in schools, according to a new poll by a teaching union. Almost three in five teachers said they believe social media use has had a negative effect on behaviour in schools, the NASUWT poll of 5,800 teachers in the UK found. Influencer and self-proclaimed misogynist Andrew Tate was named by a number of teachers in the poll. The Department for Education (DfE) said it was supporting the teachers to tackle the "damaging impact" on children caused by "the rise of dangerous influencers".

  Union members will debate motions at its annual conference in Liverpool this weekend, including one that suggests far-right and populist movements have shifted their recruitment on to social media, messaging and online gaming platforms. "I have had boys refuse to speak to me and speak to a male teaching assistant instead because I am a woman and they follow Andrew Tate and think he is amazing with all his cars and women... These were 10-year-olds," one teacher said. Another teacher said: "In a secondary English class last year, a group of boys opted, despite discouragement, to write a persuasive essay on why Andrew Tate is the GOAT (greatest of all time) which included praise of his view that women are a man's property... all of the parents were contacted and were appalled." In an interview with the BBC in 2023, when pushed on whether his controversial views on women harmed young people, Tate claimed he was a "force for good". Patrick Roach, general secretary of the NASUWT, said "there is an urgent need for concerted action involving schools, colleges and other agencies to safeguard all children and young people from the dangerous influence of far-right populists and extremists". "Teachers cannot be left alone to deal with these problems," he added.

  Andrew Tate was named by a number of teachers in the poll

  But the founder of a group which trains professionals in how to work with boys and young men said the access young people have to pornography is "way more impactful" than the influence of people like Tate. Michael Conroy, who launched Men at Work in 2019, told BBC Breakfast: "Without porn, Andrew Tate would not be a known name. "Our boys, sadly, are learning about sex through porn, and it is usually representing to them a difference of power between men and women. "That chimes when they see work from people like Andrew Tate. It's already been learned, in that sense." Mr Conroy said this is often the case for boys aged "eight, nine upwards", adding: "Where there's access to a phone, there's access [to pornography], unfortunately." He said while issues like misogyny and sexism were not new in schools, they were being "turbocharged because of accessibility" to dangerous material online. The NASUWT conference came after Adolescence, a Netflix drama about a 13-year-old boy accused of murdering a girl from his class, prompted a national conversation about online safety. Last month, Prime Minister Sir Keir Starmer welcomed a move by Netflix to make the series available to screen for free in secondary schools. But he said there was no "simple solution" to stop boys from being dragged into a "whirlpool" of misogyny. A DfE spokesperson, responding to the NASUWT poll, said the government provides a range of resources to support teachers and its curriculum review will look at the skills children need to thrive in an online world. The Liberal Democrats said the results were "shocking, but should come as no surprise" and that it showed the need to "cut addictive algorithms off at their source". The party is calling for a task force to be set up and for money from fines for breaching the Online Safety Act to be reinvested into a safer screens programme in schools. Earlier this month, a survey commissioned by BBC News showed more than a third of secondary teachers have reported misogynistic behaviour from pupils at their school in the last week. About 40% of the teachers who responded also said they felt ill-equipped to handle such conduct.

