title: 'Euro 2020: Coldstream Guards perform Three Lions - BBC News'
date: '2021-07-07'
section: General
url: http://www.bbc.co.uk/news/uk-57752228
content: |-
  The Prince of Wales invited the Band of the Coldstream Guards to play an instrumental version of the rousing football anthem Three Lions, at his London residence.

  The song by comedians David Baddiel and Frank Skinner and the Lightning Seeds was first released in 1996.
