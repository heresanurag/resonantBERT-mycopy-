id: bbc_2023_19295
title: 'Watch: Streets littered with debris after China quake - BBC News'
date: '2023-12-19'
section: General
url: http://www.bbc.co.uk/news/world-asia-67757393
content: |-
  The 5.9-magnitude earthquake struck north-west China’s Gansu Province, killing more than 100 people.

  Footage shared by state media broadcaster CCTV showed buildings cracked and debris strewn through the streets in Jishishan County.
