  The suspect is currently in federal custody at the Metropolitan Detention Center (MDC) Brooklyn after being returned to New York amid heavy security last week. Authorities believe that Mr Mangione carried out a targeted killing of Mr Thompson, pointing to evidence that he was angry at the US healthcare industry. The federal complaint notes that a notebook found in Mr Mangione's possession expressed "hostility towards the health insurance industry and wealthy executives in particular." Some on social media praised Mr Mangione's alleged crimes, often sharing their own anger at the US private healthcare system. Speaking to CBS, the BBC's US partner, on Sunday, Homeland Security Secretary Alejandro Mayorkas said that the online rhetoric has been "extraordinarily alarming". "It speaks of what is really bubbling here in this country," he said. "And unfortunately we see that manifested in violence, the domestic violent extremism that exists."
