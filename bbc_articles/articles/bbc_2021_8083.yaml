title: 'Covid: Stars perform musical song in latest vaccine push - BBC News'
date: '2021-07-03'
section: UK
url: http://www.bbc.co.uk/news/uk-57702498
content: |-
  Film, TV and stage actors appear in a campaign video urging people to get their Covid jab.

  Asa Butterfield, Sandra Marvin and Russell Tovey all appear in the film urging people to get a jab

  Celebrities including actors and pop stars are fronting a video campaign urging people to get their Covid jab.

  It sees West End and Emmerdale actress Sandra Marvin and Nicola Roberts, of Girls Aloud, perform The Rhythm Of Life, from 1966 musical Sweet Charity.

  They are joined by actors Sir Derek Jacobi, Sex Education's Asa Butterfield and comedian David Walliams.

  A tap-dancing Jim Broadbent concludes the song, saying "just get a vaccination".

  The short film, directed by Josie Rourke, is being released ahead of the NHS's 73rd birthday - with sites across England lit up in blue on Saturday to pay tribute to the work of NHS staff during the pandemic.

  It begins with Broadbent entering an empty theatre before being treated to a star-studded performance of The Rhythm Of Life - later joining in, tap-dancing in a pair of glittery blue shoes.

  David Walliams said he wanted the UK to get back to the "all-singing, all-dancing, rhythm of life that we love"

  Don Warrington, Russell Tovey and Colin Salmon also feature in the ensemble song, alongside a chorus line of West End dancers dressed in NHS blue.

  Ahead of the launch, Walliams said the NHS had done an "absolutely fantastic job" in rolling out the vaccine; adding: "As we do in the film, I want to implore everyone to get their vaccine when called so we can get back to the all-singing, all-dancing, rhythm of life that we love."

