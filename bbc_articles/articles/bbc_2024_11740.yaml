title: 'Nottingham attacks: Tributes laid to remember victims - BBC News'
date: '2024-06-13'
section: Nottingham
url: http://www.bbc.co.uk/news/articles/c1ddkl3ddr0o
content: |-
  The families of Barnaby Webber and Grace O'Malley-Kumar lay roses in Ilkeston Road in Nottingham.

  The victims' families retracing the footsteps of Barnaby Webber and Grace O'Malley-Kumar on the anniversary of their deaths

  Walking side by side, united in their grief, the families of two students killed in the Nottingham attacks retraced their footsteps before their lives were cruelly taken exactly one year ago. Valdo Calocane killed Barnaby Webber and Grace O'Malley-Kumar, both 19, on 13 June along with school caretaker Ian Coates, 65. On Thursday morning, their families walked the same route that Miss O'Malley-Kumar and Mr Webber took home along Ilkeston Road, Nottingham, before they were fatally stabbed. The walk in their memory was followed by ceremonies at the University of Nottingham and Huntingdon Academy in St Ann's, where Mr Coates worked as caretaker.

  A single rose was laid in Ilkeston Road to pay tribute to the victims

  Family and friends of the victims joined in the procession, laying dozens of roses in Ilkeston Road. Calocane stabbed Mr Coates in a separate attack in Magdala Road. He stole his van and later drove at three pedestrians. Hundreds gathered at the university ceremony to pay their respects to the victims.

  The families offered each other comfort at the University of Nottingham memorial event

  David Webber, who joined the walk in memory of his son, told BBC Breakfast that the world changed "immeasurably for us" a year ago and that being in Nottingham felt "surreal". He added: "Barnaby and Grace loved this university. Ian loved this city. We’re here for them." Mr Webber added that returning to the city on the first anniversary of the attacks was "bittersweet".

