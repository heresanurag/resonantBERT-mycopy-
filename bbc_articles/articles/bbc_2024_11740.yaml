  "The hardest thing is driving into the city and it’s nothing to do with the city," he continued. "It’s to do with what’s happened here and knowing my son’s last breath was here. "If you asked me what I really wanted to do, I want to curl into a ball in the corner of my bedroom and just not leave, but that’s not what Barnaby would want me to do. That's probably not what Grace or Ian would want me to do."

  Floral tributes have been laid at the University of Nottingham

  At Huntingdon Academy in the St Ann's area of Nottingham, pupils paid tribute to Ian Coates, who had been the caretaker there for seven years and was on his way to work when he was killed. An exhibition in his honour was displayed, with children wearing red to symbolise love and kindness, and honour Mr Coates's love of Nottingham Forest. His son Lee said: “What they've done is amazing, and the effort they’ve put in is really nice. "It’s nice to know at a young age it’s okay not to be okay, and they’ve got a place to go and people to speak to.

  Lee Coates said he was moved by tributes from pupils at the school where his father Ian had worked

  Calocane was sentenced to an indefinite hospital order after admitting manslaughter on the grounds of diminished responsibility. According to the Crown Prosecution Service, medical experts provided "overwhelming" evidence that he was suffering from a serious mental health condition at the time of the attacks.

  Calocane's sentence was challenged by the victims' families, but the Court of Appeal ruled in May that it was not unduly lenient. Mr Webber said that all three families of the victims had "paid the ultimate price" as he called for a change to the country's justice system. He and his wife Emma Webber called for a public inquiry into the case back in January.

  Ian Coates, Barnaby Webber and Grace O'Malley-Kumar were killed on 13 June 2023
