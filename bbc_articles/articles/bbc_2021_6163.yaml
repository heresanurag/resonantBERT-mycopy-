title: Eleven charged after fight breaks out at Luton Airport - BBC News
date: '2021-05-15'
section: Beds, Herts & Bucks
url: http://www.bbc.co.uk/news/uk-england-beds-bucks-herts-57127034
content: |-
  Airport bosses say they are "shocked" by the violence, which broke out on Friday morning.

  This video can not be played To play this video you need to enable JavaScript in your browser. Footage of the fight was shared by another airport user

  Police have charged 11 people with violent disorder after a fight broke out at Luton Airport.

  Four people were injured, three seriously, in the brawl, which happened in the main departure lounge on Friday morning.

  The 11 men, aged between 20 and 55, were released on bail ahead of a court hearing.

  Five other people were released without charge and another was released on bail with conditions.

  A spokesman for the airport said it was "shocked and saddened" by the violence.

  He added: "We take a zero tolerance approach to violence and continue to assist the police with their inquiries.

  "We would like to sincerely apologise to any passengers affected."

