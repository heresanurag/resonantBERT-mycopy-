  • None South Africa have won six of their last seven Tests against Wales after losing four in a row against them previously
  • None Wales have lost each of their last 11 Test matches, their longest ever run in men's rugby, overtaking a 10-game stretch between November 2002 and August 2003.
  • None Wales have also won just one of their last 11 Test matches at the Principality Stadium and have lost all four of their home games against southern hemisphere sides during that time, since a 20-13 victory against Argentina in November 2022.
  • None World champions South Africa have won 14 of their last 16 Test matches, including each of their last three, with their only two defeats during that period both by a single point.
  • None The Springboks have both the highest dominant carry (38.9%) and dominant tackle (10.5%) rates of any nation in men's tier one rugby this year, while Wales have the lowest dominant tackle rate of any such side in 2024.
  • None The average attendance for the Wales and South Africa fixture in Cardiff for the last eight matches since 2008 is 64,242.
  • None The Principality Stadium roof will be closed for this game.
