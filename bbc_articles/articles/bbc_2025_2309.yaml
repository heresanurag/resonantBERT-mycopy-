title: '''I''m not a flight-shaming eco warrior'' says transport minister - BBC News'
date: '2025-02-26'
section: Business
url: http://www.bbc.co.uk/news/articles/cn0j1xep9vzo
content: |-
  Heidi Alexander speaks ahead of her decision on whether Gatwick airport can expand to two runways.

  The transport secretary has said she is "not a flight-shaming eco warrior" ahead of her decision over whether Gatwick airport will be allowed to expand. Speaking at an industry event on Tuesday, Heidi Alexander said she enjoyed flying and valued aviation's role in the economy and growth. A decision is expected later this week on whether the airport in West Sussex can expand its operations to two simultaneously functioning runways. The expansion plans are controversial and some MPs, local authorities and residents are strongly opposed due to a number of concerns including noise levels.

  If given the green light, Gatwick says the additional runway will enable an extra 50,000 departing flights a year, by the end of the 2030s. Alexander said the government would do "all we can to support the sector and take the brakes off growth". Gatwick wants to relocate its northern runway, which is currently used only for taxiing or in emergencies, and says it could be completed and operational by the end of the decade. This would cost an estimated £2.2bn and would be a privately financed project. Alexander made her comments during a speech at the annual dinner of trade body Airlines UK in London on Tuesday evening. "I have no intention of clipping anyone's wings. I am not some sort of flight-shaming eco warrior. I love flying – I always have," the transport secretary said. Alexander also raised the issue of climate change an extreme weather events. She said she did not want a world "ravaged" by this but wanted a world where her nieces and nephews are not denied the opportunity to travel. "This Government believes in increasing airport capacity. We're ambitious for the sector. But these strict criteria must be met if we are to balance the needs of today with the necessities of tomorrow," Alexander said. The transport secretary's comments come as Heathrow airport reports record passenger numbers for 2024 up 6%, reaching 83.9 million. Heathrow chief executive Thomas Woldbye said the increase underlined the need for expansion. "2024 underscores why [Heathrow] is the UK's gateway to growth," he said. Plans are being drawn up after the government backed a third runway at Heathrow - the UK's busiest airport, in January. Mr Woldbye said he was keen for expansion to go ahead at pace and believes with private investment, planes could be taking off from a third runway within a decade. Environmental campaigners and local communities oppose the decision, raising concerns about pollution and noise.
