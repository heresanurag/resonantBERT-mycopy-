title: Anna Wintour tells King Charles she has no plans to stop working - BBC News
date: '2025-02-04'
section: UK
url: http://www.bbc.co.uk/news/articles/c7vdjv31gmmo
content: |-
  Dame Anna removed her trademark dark glasses to accept her award at Buckingham Palace.

  Dame Anna is honoured for her services to fashion

  Vogue editor Dame Anna Wintour has "firmly" told King Charles she will not stop working, as she removed her signature sunglasses to receive an award at Buckingham Palace. Dame Anna, the longest-serving editor-in-chief of Vogue magazine, was made Companion of Honour for her services to fashion. She was honoured in the 2023 King's Birthday Honours and joins the likes of Dame Judi Dench, Sir Elton John, David Hockney and Sir Paul McCartney in the select group. "It makes me even more convinced that I have so much more to achieve," she said.

  Dressed in Alexander McQueen, Dame Anna told reporters on Tuesday she was "completely surprised and overwhelmed" to receive her second accolade at Buckingham Palace. She was made a dame in 2017 by Queen Elizabeth II, who honoured her for her contribution to fashion and journalism. "The last time I was here the Queen gave me a medal and we both agreed that we had been doing our job a very long time, and then this morning His Majesty asked me if this meant I was going to stop working and I said firmly, no," she said.

  ...and with the dark glasses on again outside Buckingham Palace.

  Last month, she also went without her trademark shades as former US President Joe Biden presented her with the Presidential Medal of Freedom - America's highest civilian honour - at the White House. The 75-year-old previously told the BBC the glasses are a "prop". "They help me be seen and not be seen," she said.
  • None 'The glasses are a prop': Anna Wintour on her style and being told 'no' One of the most significant players in fashion, Dame Anna has been editor-in-chief of Vogue since 1988 and, among other charities, has helped raise more than $20m (£16m) for Aids research. She has organised annual fundraiser the Met Gala, in New York, since 1995 and has also raised money for UK arts organisations following funding cuts in 2022. The Order of the Companions of Honour is an exclusive group, limited to 65 people at any one time. Appointments go to those who have made a long-standing contribution to the arts, science, medicine or government.

  Artist Dame Tracey Emin poses for a photo with her medal

  Tracey Emin, 61, one of Britain's most acclaimed artists, was also honoured at the investiture ceremony on Tuesday as she was made a dame. Speaking afterwards, she said her 2020 bladder cancer diagnosis had made her focus on "helping other people". In March 2023 her Tracey Emin Foundation opened its doors in Margate, offering rent-free space to art students. "I think if you come from an impoverished background, it's almost impossible to even get your qualifications and get into university," said Dame Tracey. "But one thing I would say is: do not be put off by the fees. "Go to university and worry about it afterwards, because otherwise, if you don't have the education, you can't change anything." Her notable works include My Bed, an art installation at the Tate Gallery exhibiting her own unmade bed and a floor littered with empty vodka bottles, cigarette butts and condoms. The work, shortlisted for the 1999 Turner prize, sold at auction for £2.2m.
