title: 'Limavady: Man arrested on suspicion of murder - BBC News'
date: '2021-07-13'
section: Northern Ireland
url: http://www.bbc.co.uk/news/uk-northern-ireland-57814597
content: |-
  Police say the woman and the man arrested on suspicion of her murder were on holiday in the area.

  The stabbing happened at a property in the Swanns Bridge area of Myroe

  A 53-year-old man has been arrested on suspicion of murdering a woman who was stabbed at a glamping site in Myroe near Limavady, County Londonderry.

  Police said they received a report of a stabbing on the Sea Coast Road shortly after 20:20 BST last night.

  Officers, along with the Ambulance Service, attended the scene but the 37-year old woman was pronounced dead.

  Police said the woman, and the man who has been arrested, had been on holiday in the area.

  "While our enquires are at an early stage, I can confirm that both the victim, and the man who was arrested were holidaymakers, and that we are not looking for anyone else in relation to this tragic death," Det Ch Insp John Caldwell said.

  Police say they are not looking for anyone else in connection to the woman's death.

  East Londonderry DUP MP Gregory Campbell said his thoughts were with the woman's family.

  "I understand they were visitors to the area, At this stage the police are still trying to make contact with family members. Everyone will be grieving with the deceased," he added.

  SDLP assembly member Cara Hunter said the local community is "shocked and saddened" by the woman's death.

  "This is a really quiet community and this has sent shockwaves throughout it, it is just heart-breaking," she said.

  Forensic officers at the scene on Tuesday morning

  She said the area "is very rural and typically very quiet" and popular with holiday-makers and tourists.

  "Something like this is just unheard of," she added.

  Sinn Féin MLA Caoimhe Archibald offered her "deepest condolences" to the woman's family and friends.

  "I would encourage anyone with any information that can help that investigation to get in contact with the police," she added.
