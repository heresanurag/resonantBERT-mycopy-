title: The Beatles' Abbey Road returns to number one 50 years on - BBC News
date: '2019-10-04'
section: Entertainment & Arts
url: http://www.bbc.co.uk/news/entertainment-arts-49931789
content: |-
  The Beatles' album sets a new record for the longest gap between appearances at number one.

  Harold Wilson was the Prime Minister and Sir Alf Ramsey was the England football manager last time Abbey Road was number one.

  The Beatles' Abbey Road has returned to number one in the UK, 50 years after it first topped the album charts.

  The Fab Four reclaimed the top spot with an expanded anniversary edition.

  The feat also sees the album set a record - the gap of 49 years and 252 days since its initial chart-topping run ended in early 1970 is the longest gap before returning to number one.

  "It's hard to believe that Abbey Road still holds up after all these years," tweeted Sir Paul McCartney on Friday.

  "But then again it's a bloody cool album," he added.

  The new version features original tracks such as Here Comes The Sun and Come Together as well as previously unheard material from the recording sessions.

  The previous record for longest gap between number one appearances by the same album was held by (yup, you guessed it) The Beatles again, for their seminal 1967 record, Sgt. Pepper's Lonely Hearts Club Band. The sprawling psych-rock masterpiece returned to number one in 2017 courtesy of another anniversary re-release - a mere 49 years and 125 days after its previous spell at the top.

