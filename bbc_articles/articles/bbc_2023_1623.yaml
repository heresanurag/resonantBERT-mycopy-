id: bbc_2023_1623
title: Brazil's President Lula sheds tears at election ceremony - BBC News
date: '2023-01-02'
section: General
url: http://www.bbc.co.uk/news/world-latin-america-63951100
content: |-
  The country's president-elect, Lula, breaks down in tears during a ceremony ratifying his election victory.

  Brazil's left-wing president elect Luiz Inácio Lula da Silva, who recently beat far-right incumbent Jair Bolsonaro in his country's presidential election, got emotional during a ceremony ratifying his election victory.

  After a divisive campaign which saw two bitter rivals on opposite sides of the political spectrum go head to head, Lula won 50.9% of the votes.
