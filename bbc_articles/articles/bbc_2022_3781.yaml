title: 'Covid: Date for lifting of Scottish face covering rules pushed back - BBC
  News'
date: '2022-03-15'
section: Scotland
url: http://www.bbc.co.uk/news/live/uk-scotland-60750123
content: |-
  People will have to continue wearing face coverings on public transport and shops until early April.

  Dr Liz Cameron, chief executive of the Scottish Chambers of Commerce, says the decision to delay lifting all remaining Covid restrictions will come as a "bitter disappointment" to her members.

  She adds: "Further delay will put Scotland’s recovery into reverse gear again, create confusion, dent business confidence, putting the buffers on economic growth.

  “Businesses cannot continue to operate with the start-stop lever being pulled just weeks apart, with no clear confirmation as to what the triggers driving decision making are."

  Dr Cameron also says businesses have invested millions to keep their customers and staff safe throughout the pandemic.

  Quote Message: The Scottish government must commit to the removal of all remaining restrictions as soon as possible whilst providing greater detail on what triggers sit behind the decision-making process to protect consumer and business confidence in the meantime. from Dr Liz Cameron Scottish Chambers of Commerce The Scottish government must commit to the removal of all remaining restrictions as soon as possible whilst providing greater detail on what triggers sit behind the decision-making process to protect consumer and business confidence in the meantime.
