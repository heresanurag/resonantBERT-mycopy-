content: |-
  John the female cat became wedged inside a garage and had to be rescued by firefighters.

  John the cat gets stuck in drainpipe

  John the cat got stuck in the garage drainpipe on Saturday

  A cat had to be rescued by fire crews after getting stuck in a drainpipe. John the female cat became wedged inside a garage and had to be cut out using small tools. She was taken to a vet so the remainder of the stuck pipe could be removed. Avon Fire and Rescue said firefighters from Clevedon, Somerset, were called out at about 10.00 GMT.

  The cat had to be cut out with part of the pipe still around her

  "The easiest and least distressing option was to cut a section of the pipe out with John in situ," the fire service said on Facebook. "She was then transported to a local vets who sedated her in order for the rescue to continue. No serious injury was found. "John was left with the vet and her family to be checked over by the vet until well enough to return home."

  The cat was not seriously injured despite its ordeal

