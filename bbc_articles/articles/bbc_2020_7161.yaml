  • None Steven Bergwijn became only the second player to score in his first three home Premier League appearances for Spurs, after Rafael van der Vaart in 2010.
  • None Since the start of last season, Manchester United have both taken (23) and scored (16) more penalties than any other Premier League side.
  • None Only Trent Alexander-Arnold (14) has more assists among Premier League defenders in all competitions than Spurs full-back Serge Aurier this season (eight).
  • None Jose Mourinho has won none of his past six matches against his former clubs in all competitions (D2 L4), taking just one point from four Premier League matches against Chelsea and Man Utd this season (D1 L3).
  • None Spurs are winless in seven games in all competitions (D3 L4), their worst run since November 2016 (also seven without a win).

  Tottenham host West Ham in the Premier League on Tuesday, 23 June (20:15 BST) while Manchester United are at home to Sheffield United on Wednesday, 24 June (18:00 BST).
