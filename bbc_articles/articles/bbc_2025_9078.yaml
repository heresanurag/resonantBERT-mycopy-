title: Jonathan Creak arrested after driving to Norfolk to slash ex-wife - BBC News
date: '2025-05-15'
section: General
url: http://www.bbc.co.uk/news/videos/cwy71302gl1o
content: |-
  Police officers can be heard shouting instructions to Creak before asking where his knife is.

  Police bodycam footage showed the moment a man was arrested after travelling more than 100 miles to slash his ex-wife.

  Rhiannon Creak was discovered with serious wounds to her neck, breast and torso on a riding track at Hardwick, near Long Stratton, Norfolk, on 6 July last year.

  Jonathan Creak, 50, of Woodstock in Oxfordshire, was found guilty of attempted murder at Norwich Crown Court on Tuesday.

  He had previously admitted to causing grievous bodily harm and possession of a knife in a public place.

  Creak is due to be sentenced on 30 May.
