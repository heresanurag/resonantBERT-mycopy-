  This a problem for Tuchel to solve and one he will be well aware of. But the 51-year-old will have enjoyed the spectacular strike from James, a player he greatly admires and who was a vital part of his Chelsea team that won the Champions League in 2021. Kane's second was also right up the head coach's street, with Declan Rice accelerating into the Latvia area, collecting Morgan Rogers' pass and drilling a ball across the face of the six-yard box which left his captain with a simple finish. What will cheer Tuchel is that he has plenty of raw materials to work with. Bellingham, for all the impetuosity that could - and should - have seen him sent off on Monday, is a generational talent, while Arsenal's Myles Lewis-Skelly has demonstrated he is a natural at this level. There was more good news from The Hawthorns where another Gunner, Ethan Nwaneri, excelled in a goalscoring performance for England Under-21s - and the return of a third Arsenal player, Bukayo Saka, will offer an added attacking dimension. Tuchel's task is to find the "X Factor", the missing ingredient, to get England's men over the line they have failed to cross since the 1966 World Cup. Two wins from two games is a satisfactory - and totally expected - opening to the Tuchel era, but now he must discover the missing link to enable him to deliver the exciting England side he has promised. And on the somewhat tedious evidence of his first two games, Tuchel will have plenty to exercise his mind between now and the next international camp in June.
