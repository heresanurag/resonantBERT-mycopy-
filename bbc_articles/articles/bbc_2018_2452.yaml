id: bbc_2018_2452
title: Jeremy Corbyn says Daily Mail and Sun stories 'nonsense' - BBC News
date: '2018-02-20'
section: General
url: http://www.bbc.co.uk/news/uk-politics-43131442
content: |-
  Jeremy Corbyn responds to the Daily Mail by saying stories about him and a Czech spy are "nonsense".

  Taking questions after his speech to manufacturers, Jeremy Corbyn responded to the Daily Mail by saying stories about him and a Czech spy during the Cold War were "nonsense".

  At the end of his appearance, BBC Breakfast presenter Steph McGovern, who was acting as compere for the event, asked if he was a "Czech spy" - to which he replied: "No."
