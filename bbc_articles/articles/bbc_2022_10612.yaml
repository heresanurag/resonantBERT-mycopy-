content: |-
  Beijing continues its show of force around Taiwan in response to top US Democrat Nancy Pelosi's visit to the island.

  Most Taiwanese don't think US would come to their defence - poll

  One poll suggests most Taiwanese are not confident that the US would help defend the island. Some 78.4% of those polled said they were not at all or not very confident that the US would provide assistance to defend Taiwan. While 19.2% of the 19,500 questioned - between Wednesday and Friday - said they were very or somewhat confident. The rest had no opinion. The share of Taiwanese people who believe that the US military would provide support against a Chinese invasion appears to have been dropping for some time. A poll in March, by the Taiwanese Public Opinion Foundation (TPOF) think tank, found that 55.9% of more than a thousand respondents did not believe at all or did not fully believe that the US would defend Taiwan if China invaded. While 34.5% somewhat or fully believed it would. This was a sharp drop from just six months before - prior to the Ukraine war - when a similar survey by TPOF found that 65% believed the US would send troops to defend Taiwan and only 29% did not think it would.
