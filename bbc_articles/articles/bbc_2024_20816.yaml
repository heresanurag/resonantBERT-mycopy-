title: Mark Drakeford back in Welsh government as health secretary - BBC News
date: '2024-08-06'
section: Wales
url: http://www.bbc.co.uk/news/articles/c4gvvy786mdo
content: |-
  The ex-first minister is given the health job on an "interim basis" by one of his successors.

  Mark Drakeford previously held the health brief between 2013 and 2016

  Former first minister Mark Drakeford is returning to government after being appointed as health secretary by Eluned Morgan. Ms Morgan said he would do the job on an "interim basis" and "bring his significant knowledge and experience to bear to continue our work to improve transparency and delivery". Ms Morgan, who became Wales' first female first minister on Tuesday, led the health department from 2021 until she took Welsh Labour's top job. Mr Drakeford, who stood down in March after five years as first minister, previously served as health minister between 2013 and 2016.

  Ms Morgan also confirmed the appointment of Climate Change and Rural Affairs Secretary Huw Irranca-Davies as deputy first minister. He stood on a "joint unity ticket" with Ms Morgan for the Welsh Labour leadership. Ms Morgan said he would "support me in my role as first minister and will work alongside me to deliver for the people for Wales". Elisabeth Jones has been nominated as counsel general, or chief legal adviser, on an interim basis, but that position requires the approval of Members of the Senedd. A full reshuffle is expected in the autumn. Mr Drakeford returns to the health job at a time when the Welsh NHS is in deep trouble.

  Eluned Morgan became Wales' first female first minister on Tuesday

  Figures released last month showed the waiting list for hospital treatment reached a record high, with about a fifth of the Welsh population waiting to be seen. Mr Irranca-Davies told BBC Wales the appointment gave the government "real continuity and stability" with "somebody who has not only vast experience in that role but also in his role as first minister as well". As the man who had led Wales through the coronavirus pandemic he was a "really sure pair of hands on that brief" for the rest of the summer, said Mr Irranca-Davies, while "we go out and actually engage with people across Wales". "I think there is a desire from the public to see stable, grown-up government that is acting on their behalf and doing the right thing, and I think Mark brings that, as well as the other cabinet appointments that have been confirmed today."

  Climate Change and Rural Affairs Secretary, Huw Irranca-Davies, has been appointed deputy first minister

  Ms Morgan is seeking to restore order and unity to the Welsh government and Labour Senedd group, after months of infighting. She replaced Vaughan Gething as first minister, after he resigned last month when four members of his cabinet quit their jobs and Ms Morgan was elected unopposed as Welsh Labour leader. Mr Gething, Wales' first black first minister, became mired in controversy after accepting donations from a man twice convicted of environmental offences for his election campaign and sacking one of his cabinet ministers over leaked messages. One of the ministers who quit Mr Gething's cabinet in July was his former leadership challenger Jeremy Miles, and responsibility for the Welsh language moved from Mr Miles to Ms Morgan. She continues to be minister for the language as first minister.

  Responding to Ms Morgan's cabinet announcements, Welsh Conservative Senedd leader Andrew RT Davies said the "new government will be judged on their results". “What Wales needs is a government that can be a voice for all of Wales, and can deliver the NHS and the public services Wales deserves," he said. “After months of chaos in Welsh government, Wales will be watching.” "At a time of crisis for the Welsh NHS, the last thing we need is an interim health minister that will only add to the uncertainty facing our health service," he said. "Wales deserves better than a government of stagnation and indecision."
