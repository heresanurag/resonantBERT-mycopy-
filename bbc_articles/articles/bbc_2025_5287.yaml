  A surge in rates of obesity is happening right now, particularly among young people. Rates of obesity in children and younger teenagers (from 8.8% to 18.1%) and younger adults (those under 25 - from 9.9% to 20.3%) more than doubled between 1990 and 2021. However, by 2050 one in three young people will be affected. The co-lead author of the report, Dr Jessica Kerr of the Murdoch Children's Research Institute in Australia, says the figures present a real challenge to health care systems in the coming years. "But if we act now, preventing a complete transition to global obesity for children and adolescents is still possible," she said. "Our estimates identify children and adolescents in much of Europe and south Asia living with overweight who should be targeted with obesity prevention strategies. "We have also identified large populations, particularly adolescent girls, in North America, Australasia, Oceania, North Africa and the Middle East, and Latin America that are expected to tip over to obesity predominance and require urgent, multifaceted intervention and treatment. "This is essential to avoid intergenerational transmission of obesity and to prevent a wave of serious health conditions and dire financial and societal costs for future generations."

