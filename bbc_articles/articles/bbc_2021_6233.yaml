content: |-
  Celebrity chef Matt Pritchard rows the Atlantic Ocean in a four-man crew's charity challenge.

  Dirty Vegan star Matt Pritchard has been rowing the Atlantic as part of a four-man crew

  While most of us have spent months locked down, Dirty Vegan Matt Pritchard has completed a row of the Atlantic.

  The BBC TV chef was in a team of four crossing the ocean to raise awareness about mental health - and they reached the finish line in Antigua on Sunday.

  Initially setting off on the 3,200 mile trip from Lanzarote on 6 March, they had to restart from Fuerteventura a week later.

  They could undertake the voyage as Covid rules allow charity events.

  After they completed the journey, Matt posted on his Instagram account: "I'm thirsty, hungry, tired and adopted bingo wings on my arms and calf's [sic].

  "Walking on land is very weird, it doesn't move. I'll be a cheap date tonight, one whiff of champagne and I'll be on my back mun."

