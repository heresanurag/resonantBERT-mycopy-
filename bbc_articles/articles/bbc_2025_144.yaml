  A long gun with a "suppressive device" on it - acting as a silencer - was also recovered from the scene. Jabbar was born in Texas and previously served in the US Army. According to a now-removed LinkedIn profile, he had worked in various roles in the US Army, including in human resources and IT, before he was discharged. He was deployed to Afghanistan from February 2009 to January 2010. He studied at George State University from 2015 to 2017, graduating with a degree in computer information systems. He also appears to have worked in real estate, holding a license that appears to have expired in 2023. Accountancy firm Deloitte confirmed that Jabbar was hired by them in 2021 and he also reportedly worked for Ernst & Young. He had a criminal record, relating to traffic offences and theft. Court records relating to Jabbar's most recent divorce point to him having experienced financial difficulties, and show that he was divorced a total of three times in the last 13 years, CBS reports.

  Video shows the truck driving onto the pavement to get around a police car before hitting people. The city's system of bollards - short, vertical posts to block vehicle access to pedestrian streets - was in the process of being repaired, the vice president of the New Orleans City Council told the BBC's Newsday programme. That meant temporary barricades were in place, CBS News reported. Witnesses who had been in New Orleans' French Quarter for New Year celebrations have spoken of the carnage they witnessed. Whit Davis, from Shreveport, Louisiana, was in a bar on Bourbon Street when the attack took place. "People started running and getting under tables like it was an active shooter drill," he told the BBC. "Everyone was just completely in shock." Jim and Nicole Mowrer, who were visiting New Orleans from Iowa, told CBS News that they witnessed the truck drive through a barricade at speed then heard gunshots and crashing noises. They tried to help people they thought were wounded but realised the victims had died.

  The wrecked white pickup truck could be seen surrounded by police on Wednesday morning

  A hotel worker told CBS he had been closing down for the evening when he looked out the window and noticed "there was a lot of bodies lying on the ground". "The truck was speeding away. I immediately ran downstairs to see if there were some people I can help out and unfortunately some people did perish during that event." "The scene was just horrific," he added. US President Joe Biden said his reaction to the attack was one of "anger and frustration". The White House said Mr Biden had called the city's mayor this morning to offer "full federal support". Louisiana Governor Jeff Landry said in a post on X that he was "praying for all the victims and first responders on scene". "A horrific act of violence took place on Bourbon Street earlier this morning," Landry wrote.

