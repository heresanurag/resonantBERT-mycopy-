title: BBC presenter sniffs therapy husky dog - BBC News
date: '2023-12-10'
section: General
url: http://www.bbc.co.uk/news/uk-67670385
content: |-
  Charlie Stayt gets up close with Thunder the therapy dog as he visits BBC Breakfast.

  BBC Breakfast's Charlie Stayt and Naga Munchetty were joined on the sofa by Thunder, a therapy husky dog.

  Thunder's owner Adrian told the duo that the NHS-approved husky also had his own special antibacterial "cologne" that made him smell nice and clean for his visits to hospitals.

  Charlie couldn't resist taking a sniff and confirmed that Thunder "does smell good".
