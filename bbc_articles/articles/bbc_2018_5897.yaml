title: Cheetahs chase family at safari park - BBC News
date: '2018-05-11'
section: General
url: http://www.bbc.co.uk/news/world-europe-44086107
content: |-
  The general manager of Beekse Bergen park in the Netherlands said they had a lucky escape.

  A family who got out of their car in the middle of a safari park in the Netherlands – surrounded by cheetahs – had a lucky escape, its manager says.

  Niels de Wildt from Beekse Bergen park says cheetahs prey on small game and so the family's little boy was particularly at risk.

  He also says the park makes it clear that visitors should not get out of their vehicles.
