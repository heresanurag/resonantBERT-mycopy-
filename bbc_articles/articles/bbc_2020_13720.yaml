id: bbc_2020_13720
title: Marr challenges Raab on broken promises over free trade deal - BBC News
date: '2020-12-13'
section: General
url: http://www.bbc.co.uk/news/uk-55292657
content: |-
  Dominic Raab says that the EU has 'shifted the goalposts' which has forced the UK into the position it is in.

  Secretary of State Dominic Raab was challenged by Andrew Marr on a promise he made during the Vote Leave campaign in 2016 that free trade would never stop between the UK and the EU.

  On Sunday he said that no deal would mean we don't get the advantages of a free trade agreement.

  He said that if the UK is "forced" into a no-deal position, it will be because the EU has changed its mind on key issues.

  It's "absurd" that the EU would allow German carmakers and French farmers to "suffer" because of this, he added.
