  Jude Bellingham and Harry Kane score as England progress to the Euro 2024 quarter-finals by beating Slovakia in extra time in Gelsenkirchen.

  A brilliant Jude Bellingham goal in injury time, and Harry Kane's extra-time header see England progress to a Euro 2024 quarter-final against Switzerland, by beating Slovakia 2-1 in Gelsenkirchen.

  Available to UK users only.
