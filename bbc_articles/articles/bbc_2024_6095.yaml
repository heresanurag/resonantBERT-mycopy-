content: |-
  The dramatic moment was captured in Newport as thunderstorms rolled across the area.

  This is the dramatic moment lightning struck a city centre hotel in south Wales.

  The video was captured in Newport on Thursday afternoon as thunderstorms swept the area.

  Management at the four-star, 15-storey Mercure Hotel said they remained open as usual and would welcome guests over the Easter weekend.

  The Mercure said: "We want to reassure our guests and the local community that their safety remains our utmost priority, no customers or staff were affected by the incident, and the hotel did not sustain any damage."
