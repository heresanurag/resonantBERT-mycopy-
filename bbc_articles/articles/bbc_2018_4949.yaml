  Avicii, one of EDM's early pioneers, had previously spoken about issues with his health.

  In 2012 he was hospitalised with acute pancreatitis - a condition which led to the removal of his gallbladder and appendix in 2014.

  Two years ago he quit touring due to health reasons.

