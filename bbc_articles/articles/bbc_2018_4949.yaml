  The full statement from the family read: "Thank you for all the initiatives taken to honour Tim, with public gatherings, church bells ringing out his music, tributes at Coachella and moments of silence around the world.

  "We are grateful for the privacy during this difficult time. Our wish is that it continues that way."

  The family didn't reveal any further details surrounding the DJ's death.

  Royal Oman Police said that two post mortem examinations were carried out, confirming there was "no criminal suspicion".

  Fellow electronic dance music (EDM) artists, fans and musicians have been sharing their memories of the DJ.

  Kygo dedicated a portion of his Coachella performance to Avicii.

