title: 'Emiliano Sala death: Cardiff City and agent reach agreement - BBC News'
date: '2024-02-08'
section: Wales
url: http://www.bbc.co.uk/news/uk-wales-68235543
content: |-
  Cardiff City reach out-of-court agreement with football agent, five years since fatal plane crash.

  Sala signed for Cardiff City just two days before he was killed in the plane crash

  Cardiff City FC have reached an out-of-court deal with an agent over the release of documents and messages about the transfer of player Emiliano Sala.

  The plane Sala was in from France crashed into the Channel in January 2019, killing him and the pilot.

  Club civil proceedings against Willie McKay, relating to legal action against FC Nantes, were due to be heard in Cardiff but have now been discontinued.

  Mr McKay and his son Mark arranged the unlicensed private flight to Cardiff.

  Sala had signed a £15m deal to join Cardiff from Nantes.

  A spokesman for Capital Law, lawyers for Cardiff City, said: "The club brought proceedings against McKay for disclosure of his documents and e-messages.

  "Agreement was reached over this so the hearing has been abandoned, the terms of the agreement are confidential."

  The body of 28-year-old Sala was found in the plane's wreckage after it crashed near Guernsey on 21 January 2019.

  No trace has ever been found of the pilot, 59-year-old David Ibbotson.
