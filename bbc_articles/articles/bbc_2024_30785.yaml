title: Drone footage shows £1bn A428 roadworks one year in - BBC News
date: '2024-12-15'
section: General
url: http://www.bbc.co.uk/news/videos/c1mre78lly0o
content: |-
  The work includes a 10-mile (16km) dual carriageway, bridges and new junctions.

  Footage has been released showing the latest progress on a £1bn upgrade of the A428.

  Work between the Black Cat roundabout in Bedfordshire and Caxton Gibbet in Cambridgeshire includes a new 10-mile (16km) dual carriageway, bridges and junctions connecting to the existing road.

  The project has seen 18,000 cubic metres of concrete poured, which is equivalent to seven Olympic-sized swimming pools.

  National Highways said the scheme remained on track to open to traffic in spring 2027.

