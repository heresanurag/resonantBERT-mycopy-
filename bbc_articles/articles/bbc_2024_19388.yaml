content: |-
  The right to switch off when outside work could help boost the UK's economic growth, Downing Street says.

  Switching off from job boosts productivity - No 10

  The right to switch off when outside work is key to productivity and could boost the UK's economic growth, Downing Street has said. The government has promised to introduce a "right to switch off" so people's homes do not become "24/7 offices". Ministers are exploring models in other countries, particularly Ireland and Belgium, where workers already have the "right to disconnect" and not routinely be contacted by their employer or required to work outside of their normal hours. "This is about ensuring people have some time to rest," the prime minister’s deputy spokesperson said. "Good employers understand that for workers to stay motivated and productive they do need to be able to switch off, and a culture presenteeism can be damaging to productivity."

  Productivity is an economic measure for the amount of work achieved in a given time, which experts see as essential for wages and living standards to increase. The PM’s deputy spokesperson said the aim was to ensure "we’re not inadvertently blurring the lines between work and home life". "It's obviously one of the central missions of the government to support growth, and we know that productivity is vital to growth," she said. "It's about making sure we have the right balance between making the most of the flexible working practices that we saw following the pandemic with also having appropriate arrangements in place to ensure that people can stay productive in light of that." The plans were not a "one size fits all" and would recognise companies vary and people have different roles," she added. In Ireland a Code of Practice was introduced, requiring employers to engage with employees and unions on a "right to disconnect" company policy, setting out the circumstances when employees can be contacted out of normal working hours. In Belgium, companies with at least 20 employees must have agreements in place on the right to disconnect. The idea of a right to switch off is part of a package of reforms to workers' rights proposed by Labour in its "New Deal for Working People", external. It is possible employees could be able to take their employers to a tribunal if conditions of employment are breached. That could involve different aggravating factors – including consistently contacting an employee after agreed working hours. But government sources pointed out different sectors have different needs and this is likely to be reflected in contracts.
