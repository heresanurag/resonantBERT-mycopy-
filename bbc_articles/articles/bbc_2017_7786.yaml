title: Hywel Bennett, star of television and film, dies aged 73 - BBC News
date: '2017-08-03'
section: Entertainment & Arts
url: http://www.bbc.co.uk/news/entertainment-arts-40814843
content: |-
  The Welsh television and film actor starred in Shelley, EastEnders and Tinker, Tailor, Soldier, Spy.

  Bennett began his film and television career in the 1960s

  Actor Hywel Bennett, known for his roles in Shelley and EastEnders, has died aged 73, his agent has confirmed.

  The Carmarthenshire-born actor's roles included 1960s films The Family Way, with Hayley and John Mills, and The Virgin Soldiers, with Lynn Redgrave.

  But it was in the long-running sitcom Shelley that he made his name.

  Bennett - whose other television roles included Tinker, Tailor, Soldier, Spy and Pennies from Heaven - played the title role in the series.

  It ran from 1979 to 1984 and told the story of an unemployed man living in a London bedsit. He later reprised the role in The Return of Shelley, which ran from 1988 to 1992.

  Bennett appeared with Cheryl Campbell and Christopher Guard in Malice Aforethought in 1979

  He also played Kevin in Last of the Summer Wine

  He joined EastEnders in 2003 as Jack Dalton, a gangland boss who ended up being killed in an act of revenge.

  He also featured in episodes of Last of the Summer Wine and in the Dennis Potter mini-series Karaoke and Cold Lazarus.

  Bennett appeared as Peter Baxter in The Bill for five years. His last known role was as Reggie Conway in The Last Detective in 2007.

  In later life he was seen as a gangland boss in EastEnders

  He had one daughter, Emma, with former wife Cathy McGowan and was godfather to Crispian Mills, son of Hayley and lead singer of rock band Kula Shaker.

