title: Gunshots fired at Edinburgh home in 'targeted attack' - BBC News
date: '2021-08-22'
section: Edinburgh, Fife & East Scotland
url: http://www.bbc.co.uk/news/uk-scotland-edinburgh-east-fife-58297984
content: |-
  A man, woman and two young children were in the house in Edinburgh when the incident happened.

  A man, woman and two young children were inside the property on Burdiehouse Drive at the time but no one was injured

  Gunshots were fired at a house in Edinburgh during a targeted attack as children played nearby.

  Detectives said a window was damaged in the property on Burdiehouse Drive, Burdiehouse, at about 20:40 on Friday.

  A man, woman and two young children were inside at the time but no one was injured.

  Police Scotland are keen to trace a small black hatchback car which was in the area and drove off towards Southhouse Broadway.

  Det Insp Bob Campbell said: "Whilst this may be a targeted attack, the fact is that a number of shots were fired indiscriminately at the house with some ricocheting off the wall and into the garden.

  "Children were playing in gardens nearby and there were people in the street at the time.

  "Thankfully no one was injured but the gunman obviously has no regard for anyone in the area, including children, some of whom were really terrified by what happened."

  A window was damaged in the incident

  Det Insp Campbell urged anyone with information about the incident to contact officers or Crimestoppers, where information can be passed on anonymously.

  "We recognise and understand the impact this incident will have had on the residents of Burdiehouse," he said

  "Thankfully firearm incidents like this are rare in Edinburgh and I would stress that the city remains a safe place to live, work and visit."
