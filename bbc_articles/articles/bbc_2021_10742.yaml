title: 'Covid-19: Relaxation of NI self-isolation comes in effect - BBC News'
date: '2021-08-16'
section: Northern Ireland
url: http://www.bbc.co.uk/news/uk-northern-ireland-58205347
content: |-
  Fully-vaccinated close contacts of people who have Covid-19 do not need to self-isolate from Monday.

  Currently anyone who is a close contact of a Covid-19 case in Northern Ireland must self-isolate for 10 days

  Fully-vaccinated close contacts of people who have Covid-19 no longer need to automatically self-isolate.

  Instead, they should get a PCR test on day two and day eight of what would have been their 10-day isolation period.

  A number of changes to Covid-19 restrictions made by the NI Executive last week come into effect on Monday.

  More than six people can now sit together in pubs and restaurants and conferences can resume.

  Other changes have been agreed for schools and the hospitality sector.

  On Monday, three coronavirus-related deaths were recorded in Northern Ireland.

  Another 1,306 people have tested positive for coronavirus.

