title: 'In pictures: International Women''s Day - BBC News'
date: '2018-03-08'
section: In Pictures
url: http://www.bbc.co.uk/news/in-pictures-43329958
content: |-
  People around the world rally against gender inequality and sexual discrimination.

  People around the world are marking International Women's Day with rallies against gender inequality and sexual discrimination.

  A demonstration for equal rights for women was held in the capital of Bangladesh, Dhaka

  A similar march was staged on the streets of Delhi, India

  Hindu nuns took to the streets of Kolkata, India, to demand equality for women

  In Belarus, women took part in a "Beauty Run" in the snowy capital Minsk

  "Manolo, today you'll do your dinner yourself!!" chanted these protesters in Barcelona, Spain

  In Italy, people lit flares as they condemned violence against women during a march in Milan

  In Pakistan, female members of police commandos showed their skills at their base in the capital Islamabad

  This woman performed kicks from Korean martial art taekwondo at a ceremony in Nairobi, Kenya

  Ball games on the snow? This sounded like a good idea for this women in Shenyang, China
