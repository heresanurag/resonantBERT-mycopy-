title: King Charles refreshes his CPR skills at nursing event in London - BBC News
date: '2025-03-11'
section: General
url: http://www.bbc.co.uk/news/videos/cgkme3l3pveo
content: |-
  The King performed CPR on a mannequin when he visited the Royal College of Nursing.

  The King refreshed his first aid skills when he practised resuscitating a dummy patient under the watchful eye of nursing cadets.

  King Charles, who has previously been trained in CPR, was at the headquarters of the Royal College of Nursing (RCN) in central London, to celebrate a scheme introducing young people to the healthcare profession.

  His visit celebrated the 1,000th RCN King's Nursing Cadet, a scheme launched in 2019 and inspired by King Charles, then the Prince of Wales, to help cadets acquire new skills.

  It is hoped his actions will encourage others to refresh their first aid skills or seek to learn.

