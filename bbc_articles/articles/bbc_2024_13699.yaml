title: Princess Anne praises Rob Burrow for MND fundraising - BBC News
date: '2024-06-03'
section: General
url: http://www.bbc.co.uk/news/uk-england-leeds-68431065
content: |-
  The Princess Royal meets the ex-rugby league player at an event at Headingley Stadium in Leeds.

  Rob Burrow and several motor neurone disease [MND] campaigners have been praised by The Princess Royal after an event at Headingley Stadium in Leeds.

  Princess Anne described former rugby league players Burrow and Kevin Sinfield as "extraordinary".

  Lindsey Burrow, Rob's wife, said: "She just asked us about the MNDA [Motor Neurone Disease Association] and how they supported us as a family. Very down to earth, she was lovely."

  The former Leeds Rhinos player was diagnosed with MND in 2019, two years after retiring from the sport.

  He was awarded a CBE by the Prince of Wales earlier in 2024.

