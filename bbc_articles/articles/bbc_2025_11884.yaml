title: Minnesota suspect attempted to kill two other state lawmakers, officials say
  - BBC News
date: '2025-06-17'
section: US & Canada
url: http://www.bbc.co.uk/news/articles/c98j5e34dy6o
content: |-
  Vance Luther Boelter attempted to kill two other Minnesota state lawmakers, authorities revealed at a press conference on Monday.

  Minnesota suspect attempted to kill two other state lawmakers, officials say

  To play this video you need to enable JavaScript in your browser. This video can not be played Watch: 'To lose her is tragic' - Minnesotans pay respects to Melissa Hortman

  A man who is accused of killing a Democratic state lawmaker and her husband - and injuring another state lawmaker and his wife - also attempted to kill two other state lawmakers, Minnesota officials say. Vance Luther Boelter, 57, who is charged with fatally shooting Melissa Hortman, a Minnesota Democrat, and her husband, Mark, visited the homes of other state lawmakers in "truly chilling" attacks, US Attorney Joseph Thompson said. Mr Boelter allegedly researched the victims and their families beforehand, in preparation for a larger-scale attack - which police thwarted. He appeared in court on Monday afternoon to face six federal charges.

  He could face the death penalty, if he is found guilty. Mr Boelter was wearing an orange jumpsuit when he arrived in court in St Paul on Monday afternoon. He said he could not afford a lawyer and would use a federal defence lawyer. At the brief hearing, Mr Boelter said he had seven cars, $20,000-30,000 (£14,700-22,100) in savings and made about $540 per week. At a press conference on the same day, officials talked through what happened in the early hours of Saturday morning in the suburbs of Minneapolis. They described how the Hortmans were killed, and John Hoffman, a Minnesota state senator, and his wife, Yvette Hoffman, were shot multiple times in a separate attack. Officials also announced the charges against Mr Boelter. At federal level, he faces two counts of stalking, two counts of murder, and two firearms-related charges. Separately, at state level, Mr Boelter is charged with two counts of second-degree murder and two counts of attempted second-degree murder. Thompson said that Mr Boelter arrived at the Hoffman home disguised as a police officer in a large black car with emergency lights on the vehicle. Mr Boelter was wearing a "hyper-realistic silicon mask" when he rang the doorbell and shouted "this is the police, open the door". Thompson said authorities have a clear picture of what happened because the Hoffmans have a security camera outside their front door.

  FBI and acting US Attorney General of Minnesota The suspect is said to have worn a "hyper-realistic silicon mask"

  When the Hoffmans opened the door, Mr Boelter shone a flashlight at the couple. Mr Boelter told the couple there was a shooting reported in the house and lowered his flashlight, Thompson said. The couple then realised he was not a police officer. After they attempted to push him out, he allegedly fired at the couple multiple times, Thompson said, then fled the scene. The couple's daughter Hope called 911. Yvette Hoffman was shot eight times and John Hoffman nine times. Speaking on Sunday, after Mr Boelter's arrest, state Governor Tim Walz said: "The latest news is Senator Hoffman came out of his final surgery and is moving towards recovery."
  • None What we know about the Minnesota shootings After allegedly shooting the Hoffmans, Mr Boelter drove to another state representative's home and rang the doorbell there, Thompson said. That state representative was not at home, Thompson said, noting that she and her family were on vacation. Authorities did not reveal her name. He then drove to a third lawmaker's home, targeting them as well, Thompson said. Officials did not reveal the name of that state lawmaker, either. After the press conference, Minnesota state senator Ann Rest released a statement saying the suspect had been parked near her home on Saturday morning. "I am so grateful for the heroic work of the New Hope Police Department and its officers," Rest wrote. "Their quick action saved my life." At one point, an officer pulled up next to Mr Boelter in his vehicle, Thompson said. The officer assumed that Mr Boelter was a police officer himself, who had been dispatched to the scene to check on one of the lawmakers. When the officer asked Mr Boelter what he was doing, he simply stared straight ahead, Thompson said. Mr Boelter went on to the residence of a fourth lawmaker - belonging to Melissa Hortman and her husband - before carrying out another attack there.

