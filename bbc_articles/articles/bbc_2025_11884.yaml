  He is accused of arriving at the Hortman home, and allegedly shooting and killing the couple. Police said they found him at that residence and engaged fire before Mr Boelter fled. After he fled, officers embarked on a two-day search for Mr Boelter before finding him late Sunday night in a wooded rural area west of Minneapolis. He surrendered peacefully, eventually crawling towards officers, according to police. Thompson said Mr Boelter had "planned his attack carefully". "He conducted surveillance of their homes and took notes about the location of their homes," he said of the suspect. When they found Mr Boelter's car, officials discovered five more firearms - including assault-style rifles, large quantities of ammunition - as well as a list of more than 45 Minnesota state and federal elected officials, including Melissa Hortman.

  FBI and acting US Attorney General of Minnesota

  Mark Bruley, police chief from Brooklyn Park, said the officers who arrived at the Hortman home "foiled" a larger plan. They "essentially took (Mr Boelter's) vehicle away from him, which involved all his maps, all his names, all his weaponry", Mr Bruley said. "I would be very scared what it would look like over the next few hours ahead had we not done that," Mr Bruley added. "It's a chilling attack on our democracy, on our way of life," Thompson said at the Monday press conference. "It's only the most recent example of violent political extremism in this country, and that's a trend that's been increasing over in recent years, and that's unfortunate. I hope it is a wake up call to everyone that people can disagree with you without being evil or needing to be killed or hurt." Mr Boelter is scheduled to return to court for his next hearing 27 June.
