title: Baby dropped to safety after Dallas apartment fire - BBC News
date: '2018-11-23'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-46310974
content: |-
  A baby had to be dropped to safety after a Dallas apartment block caught fire

  Six people had to jump from the top floor of their apartment block in Dallas, after a fire broke out.

  Fellow residents and bystanders used mattresses to break their falls.
