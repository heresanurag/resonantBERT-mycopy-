title: 'Japan: Shigeru Ishiba wins new term as PM in parliament run-off - BBC News'
date: '2024-11-11'
section: Asia
url: http://www.bbc.co.uk/news/articles/cn0d91zl8e0o
content: |-
  He will now navigate hostilities within his party, economic woes and a period of flux in international relations.

  Japanese Prime Minister Shigeru Ishiba has won a run-off vote in parliament to stay in his post, after an election setback last month that saw his coalition lose its majority in the lower house. Ishiba, 67, took over as prime minister from Fumio Kishida, who stepped down in September amid a series of scandals that rattled public trust in the Liberal Democratic Party (LDP) party. In an extraordinary parliament session on Monday, Ishiba defeated Yoshihiko Noda, the leader of the main opposition party Constitutional Democratic Party of Japan. Ishiba will now have to navigate hostilities within his party, economic woes and a period of flux in international relations.

  As the leader of a minority government, he also faces the challenge of having to heed to demands from the opposition bloc for any future bills or budget to pass - with fears of potential political gridlock in a hung parliament. A former defence minister, Ishiba gained a reputation in Japanese politics for being openly critical of figures in his party, including Kishida and Japan’s longest-serving leader Shinzo Abe. That reputation scored him points among voters, even as it ruffled feathers within his own party. Ishiba was named the leader of Japan’s ruling LDP - and consequently the country’s prime minister - on 1 October, following a tight race among LDP candidates. Days after taking office, he called a snap election for the parliament’s lower house in an attempt to consolidate his mandate. The election gamble failed, however, as the LDP lost its parliamentary majority in its worst result in over a decade.

  Shigeru Ishiba stands as lawmakers applaud in parliament after he is reappointed as prime minister

  "The Japanese people expressed their strong desire for the LDP to do some reflection and become a party that acts in line with the people's will," Ishiba told national broadcaster NHK after that election. Ishiba's cabinet will mostly remain the same, but the members who have lost their seats in the election will be replaced. The long-ruling party has become increasingly unpopular as Japan finds itself in the throes of economic challenges including soaring inflation, a sluggish economy and a weak yen. In recent years, the LDP has also come under scrutiny over political scandals including its ties to the controversial Unification Church and allegations that its politicians had concealed millions of dollars in fundraiser donations. When Kishida announced in August that he would step down as prime minister, he cited both cases as reasons for the party’s crisis of trust. Ishiba faces another challenge on the foreign policy front, as Donald Trump's victory in the US presidential election could mean more of his protectionist policies and potential new trade tariffs, especially on Japanese steel. Ishiba previously vowed to reform the LDP, revive the economy and double defence spending. He had also voiced support for socially liberal policies, including marriage equality and allowing couples to have separate surnames - though he has since called for further discussion on the issues, in line with the LDP's more conservative stance.
