title: 'Coronavirus outbreak: Chinese medics shave heads - BBC News'
date: '2020-02-14'
section: General
url: http://www.bbc.co.uk/news/world-asia-51488824
content: |-
  Medics in Wuhan resort to shaving their heads in a bid to prevent cross-infection of the coronavirus.

  Medics in Wuhan have been shaving their heads in a bid to prevent cross-infection of the coronavirus.

  Tens of thousands of people in China have been diagnosed with Covid-19 and it has spread to several other countries.
