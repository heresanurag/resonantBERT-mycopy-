title: Dutch police find 2kg gnome made of MDMA during drug bust - BBC News
date: '2024-11-22'
section: Europe
url: http://www.bbc.co.uk/news/articles/cy9jr3y8gv5o
content: |-
  Police say they tested the gnome after finding it among suspected narcotics.

  Police said the "gnome himself was visibly shocked" by the tactic

  Officers in the southern Netherlands have found a garden gnome weighing nearly 2kg (4lb) and made of the drug MDMA. "Drugs appear in many shapes and sizes, but every now and then we come across special things," Dongemond Police said in a translated social media post. The gnome was found among suspected narcotics during a large drug search. "In itself a strange place to keep your garden gnome," the force said. "That's why we decided to test [it] for narcotics".

  "The gnome himself was visibly startled," police said, referring to the gnome having its hands covering its mouth. It is not known which area the gnome was recovered in, but the Dongemond Police covers the municipalities of Oosterhout, Geertruidenberg, Drimmelen and Altena. MDMA - which is an illegal substance in the Netherlands - is a synthetic party drug also known as ecstasy. As of 2019, the Netherlands was among the world's leading producers of MDMA.

  It is not the first time someone has attempted to hide the drug in inconspicuous guises. Last year, a Scottish man was jailed for more than four years for trying to smuggle over £84,000 worth of MDMA that was hidden in cat food into the country. A Leeds man was also previously charged over a plot to smuggle 90kg (198lb) of the drug into the UK hidden inside pallets of frozen chicken.
