  Not only has it raised questions about Mr Blackford's judgement in the eyes of his critics, but proven there is at least one mole within his ranks who has recorded and leaked what was meant to be a private meeting.

  On Tuesday, party leader and Scottish First Minister Nicola Sturgeon will set out how she plans to "unlock the door to another independence referendum", as one figure put it to me.

  Exactly how they do that, with Boris Johnson refusing to countenance one, will be interesting.

  It'll be a big moment at the core of the SNP's very reason for being - and so itself a mood-maker for them and Scottish politics more broadly.
