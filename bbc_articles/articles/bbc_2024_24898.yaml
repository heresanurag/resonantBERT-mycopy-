  Hundreds go bonkers for conkers at world champs

  The event was held earlier at a pub in Northamptonshire, with hundreds of people watching

  More than 200 people have taken part in the World Conker Championships, with many competing in fancy dress. The competition took place earlier at the Shuckburgh Arms in Southwick, Northamptonshire. The event saw participants go head-to-head using conkers threaded on to string to try and smash their opponent's nut. Since its inception in 1965, the event has raised more than £400,000 for charities that support the visually impaired.

  Hundreds of spectators attended the event which was first held in 1965

  One man wore a green inflatable Yoda headpiece, while another wore a conker-themed hat. All participants were required to follow a stringent set of rules to ensure the event was as fair as possible, which included the conkers and laces being provided by organisers. There were fears before the event that there could be a shortage of conkers due to high winds blowing horse chestnut seeds from trees earlier in the autumn.

  Among the impressive headgear this year was a large Yoda headdress

  More than 2,000 conkers had been prepared prior to the event. Each player took three alternate strikes at the opponent's conker. Trophies were handed out to the overall winners. The "second biggest conker competition in the world" took place at The Locks Inn at Geldeston, near Beccles, on the Norfolk-Suffolk border earlier this month.

