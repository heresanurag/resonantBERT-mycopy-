title: Jaysley Beck's mother says 'no apology will bring her back' - BBC News
date: '2025-02-21'
section: England
url: http://www.bbc.co.uk/news/articles/ckgn24nw1n0o
content: |-
  A coroner has ruled the Army failed to protect Gunner Jaysley Beck from relentless harassment.

  Soldier's mum says 'no apology will bring her back'

  This video can not be played To play this video you need to enable JavaScript in your browser.

  The mother of a teenage soldier who took her own life following relentless harassment says no apology from the Army "will ever bring our daughter back". Royal Artillery Gunner Jaysley Beck was found hanged in her barracks at Larkhill Camp in Wiltshire on 15 December 2021, following a work Christmas party. Coroner Nicholas Rheinberg ruled the Army's failure to take action - after Gunner Beck was harassed by her line manager and sexually assaulted by another colleague - contributed to her death. Her sister, Emilli Beck, said she "feels sick" at the idea that her sister's complaint was "manipulated" to appear less serious because the Army had its "own interests at heart".

  Warning other women not to sign up, the 25-year-old told The Guardian, external: "I wouldn't advise it, going through what we have gone through and learning how these allegations are swept under the carpet." The coroner said the fact the soldier had also been sexually assaulted by another senior colleague, and the Army's failure to take appropriate action, "more than minimally" contributed to her death. Ms Beck said the alleged sexual assault committed while her sister was at an adventure training event in Thorney Island should not have been dealt with internally. She said: "It needed to be handled by the police. That could have ultimately left us with Jaysley still here today. I think for that, they've got blood on their hands." Ms Beck described her sister as "fantastic" and "everything I aspired to be".

  At the inquest's conclusion on Thursday, Mr Rheinberg determined Gunner Beck, who was originally from Oxen Park in Cumbria, had intended to take her own life as a result of these "frightening" incidents.

  Colleagues used a master key to enter Gunner Beck's room after concerns emerged that no-one had heard from her all day

  He concluded: "I find there was a failure on behalf of the Army to take action over the harassment she was suffering from her line manager. "And there was a failure on behalf of the Army to take action against the senior officer at whose hands she'd suffered a sexual assault." The coroner ruled the complaint "should have been reported to police and the failure to do so breached Army policy". "It was a sexual assault carried out on a 19-year-old Gunner by a middle-aged man of senior rank, and was recorded merely as 'inappropriate behaviour unbecoming of a warrant officer'," he added.

  Brigadier Melissa Emmett, head of the Army personnel services group, formally accepted failures were made and apologised to Gunner Beck's grieving family. She said "significant changes" have been made within the Army, including the "introduction of clear and unequivocal policies to state that there will be zero tolerance to unacceptable sexual behaviours". She added: "There is more work to do. It is my hope that such change will give service personnel the confidence they need to report sexual offences and inappropriate behaviours, knowing that they will be listened to."

  Gunner Beck (front) filed a complaint but it was dismissed as a "minor sanction"

  However, Gunner Beck's mother Leighann McCready said "true accountability" could only be achieved through independent scrutiny. "I believe it was a cover-up and it's been made clear through the findings that the Army has failed our daughter Jaysley," she said. "Things need to change. The Army cannot be allowed to investigate itself anymore when it comes to cases of sexual harassment, assault, bullying and abuse. "The Army has admitted that it let Jaysley down, and has apologised for its failings - but no apology will ever bring our daughter back.

  Leighann McCready said the Army "needs to change" to achieve real justice

  "Too often service women, and men, don't feel able to speak up out of fear of being victimised, and even when they do, the Army is left to investigate itself. "This cannot continue. Jaysley should still be here, we will not stop fighting until immediate action is taken." She added that since the inquest began, more than 700 male and female soldiers had reached out to share their own similar experiences.

  Alistair Carns, minister for veterans and people, paid tribute to Gunner Beck and said the Army would now "reflect on the failings identified to learn lessons" from her death. He said: "Jaysley was a young and promising soldier who should have had the opportunity to thrive in a supportive and safe environment. "Her death was and still is a tragedy, and we are deeply sorry for the failure to protect her." He said the Army would "honour Jaysley's legacy" by ensuring crucial reform is carried out in the "shortest possible time and most effective manner". Mr Rheinberg said he would not prepare a report to prevent future deaths as he had been "reassured" by the Army that "matters are currently under review and revision".

  Public speaker Gemma Morgan, who served in the military from 1996 to 2002, said she recognised the torment endured by Gunner Beck. She told BBC Radio 4 she experienced a "severe trauma response" when she returned from an operational tour as she grappled with the harrowing scenes she had witnessed. Following a night of social drinking, Ms Morgan was raped by one of her colleagues.

  Ms Morgan said sexual harassment in the Army is "not a historic issue, it is current"

  "It made me quite vulnerable in an environment that to be honest I'd gotten used to, but really it was very predatory," she said. "When I asked for help in the medical centre the next day, no help was given. It was absolutely devastating." Ms Morgan described in her book Pink Camouflage how her "promising career" and mental health "completely spiralled" as a result. "It's taken me 25 years to speak out about the relentless sexual harassment and abuse that I and other women experienced," she said. "My view is that [military] defence has a deeply ingrained cultural problem where harassment and abuse is commonplace. "We need to do better, we have to go beyond words and take real, measurable action. "That starts with defence accepting it has a problem, and having the humility to work with the experts to create much needed change."
