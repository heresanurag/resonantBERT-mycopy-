title: Drone footage shows wildfire damage in Jasper National Park - BBC News
date: '2024-08-17'
section: General
url: http://www.bbc.co.uk/news/videos/cwy3nqy4nydo
content: |-
  Residents have been allowed to return to Jasper township after the worst fire in a century burned in the Canadian park.

  The largest wildfire in a century in Jasper National Park in Alberta, Canada, burned through 33,048 hectares (81,663 acres), according to the federal government.

  Residents were allowed to return on 16 August to their fire-ravaged town. Only two-thirds of the township remains standing after the late July blaze.
