content: |-
  People in Scotland are now able to travel between council areas and meet in groups of six outdoors.

  Will Beresford took this picture of James and Ally after a morning run up Ben Lomond to celebrate their "new found freedom"

  More families and friends have been able to reunite in parks, gardens and beaches across Scotland after months in lockdown.

  Restrictions have been eased allowing people to travel between council areas and meet more people outdoors.

  Michael Mancini, who runs the Ice Cream Factory at Troon, South Ayrshire, said the beach was "heaving" with visitors.

  "We have been absolutely flying today. It has been brilliant, absolutely brilliant," he told BBC Radio Scotland.

  The change to the rules means it is now possible to travel out of your local area for non-essential reasons and for six people from up to six households to meet up outdoors.

  The relaxation had not been due to come into force until 26 April but the government said the changes were being made earlier in an effort to boost people's mental health and wellbeing.

  People cannot stay overnight outside their council area - even in a tent or caravan.

  And the advice remains to shop within your own council area unless there are no practical alternatives.

  While six people can meet up outdoors, the guidance is to minimise meetings, maintain 2m distancing and "use common sense".

