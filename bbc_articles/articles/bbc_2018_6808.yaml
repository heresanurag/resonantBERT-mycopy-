content: |-
  Meet Justin Carr - the man who helps Dele Alli, Kyle Walker and Danny Welbeck look their best for the World Cup.

  Justin Carr is the personal barber to some of England's biggest names.

  His job is to make sure Dele Alli, Kyle Walker and Danny Welbeck - among others - look their best in front of millions of people at the World Cup.

  He gave Newsbeat's Ben Mundy a haircut, and told us what it's like to groom the Three Lions.

  Newsbeat's at the World Cup in Russia this summer.

  You can follow our coverage on Instagram, Facebook and Twitter.

  Or listen live at 12:45 and 17:45 every weekday on BBC Radio 1 and 1Xtra - if you miss us you can listen back here.
