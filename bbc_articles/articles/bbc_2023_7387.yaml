title: Downing Street crash man on indecent images charge - BBC News
date: '2023-05-27'
section: UK
url: http://www.bbc.co.uk/news/uk-65729003
content: |-
  The 43-year-old man is released under investigation over the crash but faces the unrelated charge.

  A man arrested after a car crashed into Downing Street's gates has appeared in court charged separately with making indecent images of children.

  Seth Kneller, from Crewe, had been held on suspicion of criminal damage and dangerous driving over Thursday's incident.

  Scotland Yard said the 43-year-old had been released under investigation in relation to that.

  Police said the charge he did face was "unrelated" to their initial inquiry.

  Mr Kneller appeared at Westminster Magistrates' Court to answer the charge.

  He was remanded in custody until 23 June.

  There were no reports of any injuries in the Downing Street incident and inquiries are continuing, the Met said on Saturday.

  It is not being treated as terror-related.
