title: 'England: ''Three Lions still on track at World Cup despite turning clock back
  to dismal summer'' - BBC Sport'
date: '2022-11-26'
section: General
url: http://www.bbc.co.uk/sport/football/63764304
content: |-
  BBC Sport's Phil McNulty reflects on England's laboured 0-0 draw with the United States in the World Cup.

  Host nation:Dates: Coverage: Live on BBC TV, BBC iPlayer, BBC Radio 5 Live, BBC Radio Wales, BBC Radio Cymru, BBC Sounds and the BBC Sport website and app.

  England turned the clock back to the dismal days of summer as their laboured style returned, along with the jeers from supporters, in the undistinguished draw with the United States at Al Bayt Stadium.

  The attacking verve, creation and goals that illuminated the 6-2 triumph over Iran in their opening World Cup game were replaced by an England side lacking ambition and drive in a performance so devoid of tempo and urgency that it almost ground to a halt at times.

  And as the final whistle sounded, fans who revelled in the free-flowing style that demolished Iran made their feelings clear by delivering a loud and resounding raspberry in the direction of Gareth Southgate's players.

  Perspective is needed within the context of group games at the World Cup, indeed any major tournament, and England remain in a strong position to go through to the last 16 before their final game against Wales.

  But this was a chance to secure qualification after two games missed and an element of jeopardy remains.

  A quick jog of the memory reminds us that England suffered a similar fate of a goalless draw in their second group game of Euro 2020 against Scotland at Wembley and still went deep into that tournament. Here, they at least avoided a defeat they could not have complained about given that the United States were the better team.

  England are still in a good place within Group B, but no-one can seriously kid themselves that this was anything other than a very poor performance that is hardly likely to have the bigger names out here in Qatar having sleepless nights.

  This was a grim echo of the England that ended their Uefa Nations League campaign with relegation after a summer when they lost 1-0 away then 4-0 at home to Hungary in June, before a defeat in Italy and a draw at home to Germany in September.

  If the trouncing of Iran suggested Southgate had taken the handbrake off England then this was reverting to type, pedestrian and conservative.

  There must be serious concerns at the manner in which USA were able to run through England's midfield into space in front of the defence, along with the constant problems they caused down the left side of Southgate's team, especially in the first half.

  England were grateful for Weston McKennie's awful miss, a skied effort right in front of goal, and a moment of good fortune when man-of-the-match Christian Pulisic's powerful effort rattled off the crossbar with goalkeeper Jordan Pickford beaten in the first half.

  Southgate's side had no control in midfield, where Jude Bellingham could not repeat his high-class work against Iran. Indeed, he was replaced by the experience of Liverpool captain Jordan Henderson after 69 minutes as Southgate attempted to restore a semblance of order to what was becoming an increasingly hazardous situation.

  England's stodgy play looked to be crying out for the introduction of Manchester City's Phil Foden and a touch of the X-factor, but Southgate preferred his team-mate Jack Grealish and the Henderson shield.

  In the end, England appeared grateful to get out of the Al Bayt Stadium with a point, still on target for their primary aim of qualification from the group and satisfied they were not punished by defeat for such a disappointing effort.
