id: bbc_2025_8410
title: Snake halts Japanese bullet trains after wrapping around power line - BBC News
date: '2025-05-01'
section: Asia
url: http://www.bbc.co.uk/news/articles/cx26zn3340yo
content: |-
  The famously punctual train service was suspended for almost two hours.

  One of Japan's busiest bullet train lines came to a halt after a snake tangled itself in a power line, causing a power outage. Tokaido Shinkansen trains running between Tokyo and Osaka were suspended from around 17:25 local time on Wednesday. Services resumed at around 19:00 local time, operator Central Japan Railway Company said, according to local media. Japan is currently in one of its busiest holiday seasons, Golden Week, which consists of four national holidays in seven days, and will see trains, airports and holiday hotspots hit their peak.

  Osaka is also hosting the World Expo this year, which will see millions of foreign and domestic visitors flock to the city until it ends in October. The snake entanglement occurred between Gifu-Hashima and Maibara stations, which suspended Tokyo-bound trains between Shin-Osaka and Nagoya, and the Osaka-bound trains between Shin-Osaka and Tokyo, according to Japanese news agency Kyodo News. While authorities worked to get power restored, passengers reportedly gathered around staff at one station while large queues formed at ticket machines. One frequent shinkansen traveller, who was returning to Tokyo, said it was the first time he had experienced this. "I use the shinkansen several times a month, but this is the first time I have experienced suspensions due to a power outage," Satoshi Tagawa, 46, told Kyodo News. But 26-year-old Kazutoshi Tachi, said he was "fed up with the troubles" to services. "I want them to run on time," he added. This is not the first time a snake has brought the shinkansen service to a halt. In April 2024, there was a 17-minute hold-up while authorities removed a 16 inch (40.6cm) snake from the train between Nagoya and Tokyo, according to CBS News, BBC News's US partner.
