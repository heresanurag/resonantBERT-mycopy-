title: 'Logan Mwangi: Mum in court charged with murdering son, five - BBC News'
date: '2021-10-22'
section: Wales
url: http://www.bbc.co.uk/news/uk-wales-59008912
content: |-
  A 14-year-old boy also appears in court charged with five-year-old Logan Mwangi's murder.

  Logan was found dead in the River Ogmore on 31 July

  The mother of a five-year-old boy who was found dead in a river has appeared in court charged with his murder.

  Logan Mwangi, also known as Logan Williamson, was discovered in the River Ogmore in Bridgend county on 31 July.

  His mother Angharad Williamson, 30, from Sarn, appeared at Cardiff Magistrates' Court on Friday.

  Earlier, a 14-year-old boy, who cannot be identified because of his age, appeared at Newport Crown Court charged with murder.

  Logan's stepfather John Cole, 39, also from Sarn, has previously been charged with Logan's murder.

  Angharad Williamson and John Cole have both been charged with Logan Mwangi's murder

  Appearing via video link and wearing a black top, she was remanded in custody and is due to appear at crown court next week.

  The teenage defendant was remanded into the care of the local authority ahead of a plea hearing in November.

  All three have also been charged with perverting the course of justice.

  Teddies and balloons were left next to the River Ogmore in memory of Logan

  Following Logan's death, residents left floral tributes, teddies and cards near the part of the river where he was found.

  Logan's classmates have described him as a happy boy who liked Spiderman and playing hide and seek.

  His friends were "heartbroken" by his death.
