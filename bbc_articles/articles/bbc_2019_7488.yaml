id: bbc_2019_7488
title: 'Ford Bridgend: ''South Wales will be a ghost town'' - BBC News'
date: '2019-06-06'
section: General
url: http://www.bbc.co.uk/news/uk-wales-48540201
content: |-
  Workers react to news that Ford's engine plant in Bridgend will close in September 2020.

  Ford's engine plant in Bridgend is set to close in autumn 2020, with the loss of 1,700 jobs.

  Union officials were told of the plans at a meeting with Ford bosses which include the offer of redeployment.

  Workers were sent home after receiving a letter which said they will lose their jobs in phases from 25 September next year.

  Ford blamed "changing customer demand and cost" for the closure plans and denied Brexit was a factor.

  Workers spoke of the suddenness of the decision, while traders in the town said it would have an impact.
