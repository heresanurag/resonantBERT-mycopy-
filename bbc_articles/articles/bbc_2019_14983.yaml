title: Bees send footballers diving in Tanzania - BBC News
date: '2019-12-23'
section: General
url: http://www.bbc.co.uk/news/world-africa-50896946
content: |-
  A football match in Tanzania is briefly stopped when a swarm of bees invades the pitch.

  A football match in Tanzania was briefly stopped when a swarm of bees invaded the pitch.

  Two local teams, Young Africans and Iringa United, were playing at Uhuru Stadium in Dar es Salaam.
