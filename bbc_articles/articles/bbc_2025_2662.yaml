content: |-
  The money will be spent on projects ranging from tidal barriers and flood walls to nature-based solutions.

  Spending on flood defences set to rise to record levels

  The government says it will spend more than £2.6bn, over the next two years, to protect more homes and businesses in England from flooding - £250m more than previously announced. The money will be spent on projects ranging from tidal barriers and flood walls to nature-based solutions that slow water flow. In its latest detailed assessment, the Environment Agency calculated 6.3 million homes across England were currently at risk from flooding from rivers, seas and surface water. With climate change set to bring more intense storms and heavier rainfall, that could rise to eight million by 2050 - one out of every four properties.

  "The aim is to repair our flood defences that the previous government left in the worst condition on record, " Steve Reed, the Environment Secretary, told the BBC's Today programme. "My view is that was an absolute dereliction of duty. Given that they knew as I know that we're getting more and more severe weather due to climate change and that is increasing the frequency and severity of flooding." Between 2021 and 2024, the Conservative government spent just over £1bn a year on flood defences. Last year, a cross-party committee of MPs said it had failed to properly maintain existing flood defences or build enough new ones. "In Government, the Conservatives invested record amounts of money in flood defences and coastal erosion. To say otherwise is wholly untrue," said the shadow Environment Secretary Victoria Atkins. "Steve Reed has not told us where this latest money has come from, whether it is in fact a repackaging of money invested by a Conservative government, or how he intends to offer tailored support to frequently flooded communities." In each of the next two years, if all the announced money is spent, government spending on flood defences will rise to more than £1.3bn per year. Nearly 1,000 projects will receive funding, with more than 66,000 of the most at risk properties set to be be better protected.
  • None £3.5m for the Poole Bridge to Hunger Hill Flood Defence Scheme, in Dorset
  • None £2.5m to support property-flood-resilience schemes across Leics, Derbys and Notts More than £100m has been earmarked to repair and maintain defences, some of which were damaged in last year's floods.

  "With this new funding, we will work closely with the government to deliver the vital projects that are needed across the country, ensuring our investment goes to those communities who need it the most," Alan Lovell, who chairs the Environment Agency, said.
