id: bbc_2018_001
title: 'Kabul attack: Guests use sheets to escape hotel - BBC News'
date: '2018-01-21'
section: General
url: http://www.bbc.co.uk/news/world-asia-42764971
content: |-
  Guests used sheets to climb down from balconies during an attack by gunmen at the Intercontinental Hotel in Kabul.

  Six civilians, including a foreign woman, died, along with three attackers.

  Some 160 people were rescued after Afghan troops fought through the night to regain control of the building.
