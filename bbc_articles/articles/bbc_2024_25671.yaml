  Prosecutor Alex Prentice KC earlier told the court that the messages on the encrypted phone network EncroChat showed Stevenson discussing plans to import kilo blocks of cocaine with Cross, as well as the use of Bilsland provide “an appearance of legitimacy”. A tonne of the drug was seized in a raid by Border Force teams at Dover in September 2020. They found 119 packages of cocaine concealed in boxes of bananas from Ecuador, which were destined for Glasgow. It took officers three days to recover the drugs from the shipment. Defence counsel Thomas Ross KC told the court Stevenson had known exactly what he was doing and had made “a series of bad decisions” for which the motivation was obvious. “He takes ownership of all those decisions and doesn’t seek to cast blame in anybody else’s direction,” he said.

  Deputy Crown Agent Kenny Donnelly, who leads the fight against serious organised crime for the Crown Office and Procurator Fiscal Service, said Stevenson and his associates were involved in drug trafficking "on an industrial and global scale". He said the encrypted messages had shown that Stevenson was the ringleader who directed the others. "The cocaine they were planning to distribute would have undoubtedly contributed to misery in our communities," he said. “These convictions are testament to the forensic and meticulous work undertaken by specialist Crown Office prosecutors to bring Stevenson and his five co-accused to justice.” The judge, Lord Ericht, told Stevenson that he had directed "a complex operation" for the importing and supplying cocaine and played "a leading role" in manufacturing and distributing etizolam tablets.
