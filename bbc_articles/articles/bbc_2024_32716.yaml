title: 'Cammy Day: Edinburgh council leader quits over alleged messages - BBC News'
date: '2024-12-09'
section: Scotland
url: http://www.bbc.co.uk/news/articles/c4gxp093gwno
content: |-
  Police are investigating Edinburgh councillor Cammy Day following an allegation of inappropriate behaviour.

  Cammy Day has led the Labour-run administration since 2022

  The leader of City of Edinburgh Council has resigned after police launched an investigation into an allegation of inappropriate behaviour. Labour's Cammy Day had been suspended by the party pending the outcome of the probe. It was reported by the Sunday Mail, external that Day had "bombarded" Ukrainian refugees with messages, including asking sexually explicit questions. He confirmed his decision to stand down as council leader in a letter to the chief executive.

  He said in a statement: "The recent commentary on my personal life is detracting from the important work this Labour-led council does for the people of Edinburgh. "It undermines the dedicated efforts of my colleagues and council officers. "That's why it's time for me to step aside as leader." Day said he had not yet been contacted by police, but said he would fully cooperate with their investigation. He added: "I am hugely proud of what we've achieved for the capital during my time as leader and truly believe that Edinburgh is a better, fairer city as a result. "I'm also proud to have led a way of successfully doing politics across divides, finding a way to deliver on our priorities for our people and our city. "I love Edinburgh and it has been an enormous privilege to have played a part in its success."

  Cammy Day become an Edinburgh councillor in 2008

  One of the refugees contacted by Day told BBC Scotland News the council leader sent them messages on social media and added them on a dating site. The Ukrainian, who came to Scotland following Russia's invasion in 2022, claimed Day asked them sexually explicit questions and suggested meeting for wine. The refugee said they were uncomfortable with the contact but felt pressure to respond given his status - and were afraid of his influence. A former community development worker, Day moved into politics in his 30s, becoming a councillor in 2008. He has led a minority Labour administration since 2022. Police Scotland said it was investigating a complaint of inappropriate behaviour made on 22 October. The force also confirmed that a report had been made about Day earlier this year but no criminality had been established. City of Edinburgh council said it dealt with complaints through "established processes" in consultation with an independent whistleblowing service and, where appropriate, Police Scotland. SNP, Conservative and Liberal Democrat councillors had called on Day to step down as leader.

  Anas Sarwar said Cammy Day was immediately suspended when his party became aware of the allegations

  Scottish Labour leader Anas Sarwar described the allegations as "deeply distressing". He told BBC Scotland's Sunday Show that the party became aware of the claims on Saturday and Day was immediately suspended. A Scottish Labour spokesperson said the party took all complaints seriously and that they are investigated in line with party policy. First Minister John Swinney described the allegations as "deeply concerning". He said any complaints should be investigated "fully and comprehensively". SNP councillor Simita Kumar said it was "unquestionable" that Day had to stand down. "This resignation should have come sooner, and in my view should have come with an apology," she posted on X, external. The Ukrainian consulate in Edinburgh has also expressed concerns about the reports. It said it "looks forward to the results of the investigation and expresses hope for a fair resolution of this case". Edinburgh council parties have been invited to offer their nominations for the next leader ahead of a full council meeting next Thursday.

  The resignation of Cammy Day has the potential to lead to a change in the administration in Edinburgh - not simply a new council leader. In Scottish councils, it is rare for one party to have an overall majority. There is no rule which says the single biggest party has to be part of the administration. Deals have to be done. In Edinburgh, the SNP is the single biggest party but is in opposition. Instead Labour governs as a minority with support from Lib Dem and Conservative councillors. Labour will be hoping to stay in charge of the administration but this is not a foregone conclusion.
