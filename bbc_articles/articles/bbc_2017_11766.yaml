id: bbc_2017_11766
title: 'Egypt attack: Military releases air strike footage - BBC News'
date: '2017-11-26'
section: General
url: http://www.bbc.co.uk/news/world-middle-east-42125759
content: |-
  The footage shows jets and helicopters taking off and strikes on "terrorist targets".

  The Egyptian ministry of defence released footage showing jets and helicopters taking off along with onboard footage of strikes on what it said were "terrorist targets".

  It comes after the massacre of worshippers at a mosque in Sinai.

  At least 305 people died in the assault, which was launched during Friday prayers and has not yet been claimed by any group.
