title: 'Newspaper headlines: ''We have been betrayed'' and ''Musk ready to bankroll
  Farage'' - BBC News'
date: '2024-12-18'
section: The Papers
url: http://www.bbc.co.uk/news/articles/c2dxjzr2417o
content: |-
  Labour's rejection of a payout for pension age changes is criticised, while Reform UK is in talks with the billionaire.

  'We have been betrayed' and 'Musk ready to bankroll Farage'

  Reform UK treasurer Nick Candy (left) and the party's leader Nigel Farage (right) have been holding talks with Elon Musk (centre) in Florida

  There is a common theme in the coverage of the government's decision not to pay compensation to millions of women born in the 1950s affected by changes to the state pension. "We have been betrayed" is the message from campaigners on the front of the Daily Mirror. , external Unusually, the Daily Express, external is in agreement with the Mirror. Its headline accuses Labour of betraying pensioners "time after time". The Daily Mail, external points out that the work and pensions secretary, Liz Kendall, and the prime minister both backed the Waspi campaign while in opposition. According to the Times, external, Kendall met concerned Labour MPs after her Commons statement. Some attendees have described the talks as "heated". Under the caption "a meeting of minds", the Times, external is one of a number of front pages to feature a picture of the Reform UK leader, Nigel Farage, its treasurer, Nick Candy, and the world's richest man, Elon Musk. Talks took place between them at Donald Trump's Mar-a-Lago resort in Florida. "Musk ready to bankroll Farage," is the Daily Telegraph's, external headline. Writing in the paper, Farage says he was left in "no doubt" that he had the backing of Musk -adding that there were "ongoing negotiations" about a financial contribution.

  The Financial Times, external leads on Ukraine's assassination of the officer in charge of Russia's nuclear, chemical and biological defence forces in a bomb attack in Moscow. The paper describes Lieutenant General Igor Kirillov as the "most prominent military figure to be assassinated" since the start of the full-scale invasion of Ukraine in 2022. The Guardian, external says his killing "is likely to send shock waves through Russia's political and military elites". Writing in the i, external, Anne McElvoy says the "bigger prize" for Ukraine "is bringing retribution to a prosperous part of the Russian capital". "Victory for the victims of second Post Office scandal, after 30 years of lies," is the main headline in the i, external. The Criminal Cases Review Commission is examining seven cases relating to Capture, an IT system rolled out to Post Office branches before Horizon. The software was prone to bugs and glitches, and sub-postmasters were forced to hand over cash, sacked or prosecuted for the losses. "EU don't know what you're doing," declares the Sun, external, as it leads on the prospect of a European Super League for football. Previous plans folded in April 2021. Promoters believe this new format, of 96 teams across four divisions, complies with EU law. But one official from Uefa, European football's governing body, has called the proposals a "Christmas pantomime". The Olympic 800m champion, Keely Hodgkinson, is the toast of the front and back pages after winning BBC Sports Personality of the Year. "No one could stop Keely Hodgkinson on the track," is how the Guardian, external begins its report "or, as it turned out, in the battle for public opinion." The Daily Telegraph, external calls her the "girl with the golden run" while the Times, external' Matt Lawton says "there has been no one more deserving" of recognition.

