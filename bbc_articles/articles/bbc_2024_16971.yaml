content: |-
  An Adam Peaty near miss, Andy Murray comeback and Simone Biles star return, plus a Great Britain bronze, are among the highlights on day two of the Paris 2024 Games.

  Top five stories from day two of Paris Olympics 2024

  Kimberley Woods won Team GB's third medal of Paris 2024 in canoe slalom

  This video can not be played To play this video you need to enable JavaScript in your browser.

  Since winning his second Olympic gold medal in Tokyo three years ago, Peaty has been through the wringer with injuries and mental health struggles. To be at the Games in Paris is an achievement in itself - to come within two-hundredths of a second of a third straight gold was remarkable. Peaty was pipped at the post in a dramatic final, with Martinenghi taking a surprise gold. The Brit finished in a dead heat with American Nic Fink - both men will take home a silver medal. Earlier in the night, the Parisian crowd was sent into ecstasy as France's Leon Marchand set a new Olympic record - and narrowly missed breaking his own world record - in the men's 400m medley. GB's Max Litchfield finished fourth in that event - the third successive Olympics in which he has finished just outside the medals. Litchfield's compatriots Duncan Scott and Matthew Richards both made the final of the men's 200m freestyle, while Oliver Morgan also progressed from the semi-finals in the 100m backstroke.

  Andy Murray (left) and Dan Evans have progressed to the second round of the doubles

  Murray has never done anything easily in his extraordinary career - and he is not going to start now. He and Evans lost the first set of their first-round match to Daniel and Nishikori of Japan, before winning a tie-break in the second to set up a first to 10 championship tie-break shoot-out in the decider. Murray is playing in his final tournament before retirement, and his farewell tour seemed to be ending as the Japanese duo led 9-4 in that third set - giving them five match points. Yet the Britons somehow fought back, winning seven successive points to triumph 11-9 in the tie-break and reach the second round - sparking wild celebrations.

  This video can not be played To play this video you need to enable JavaScript in your browser. 'Who writes his scripts?' - Murray and Evans come from five match points down to win

  It had looked at one stage as if Murray's farewell would end before it began, as Evans took a nasty tumble in his opening singles match. Evans' right knee was bleeding and he looked to be struggling with his wrist after hitting the clay during his tie against Tunisia's Moez Echargui. Fortunately for both Evans and Murray, the Briton recovered to win in three sets - 6-2 4-6 6-2 - and was fit enough for the doubles. Elsewhere at Roland Garros, Rafael Nadal won his opening singles match to set up a mouth-watering second-round encounter with Novak Djokovic. And just a couple of hours before his first-round tie, British number two Cameron Norrie withdrew from the men's singles because of injury.

  This video can not be played To play this video you need to enable JavaScript in your browser.

  Four years ago, Woods spoke to BBC Sport about her experiences of depression and self-harm, which she linked to being severely bullied as a child. Sport has been her escape, and she won a brilliant bronze in the women's kayak discipline of canoe slalom for Team GB, with a time of 98.94 seconds. In a dramatic final, Woods was holding on to third place in the standings with only reigning Olympic champion Ricarda Funk to run. But when Germany's Funk clipped a gate and picked up a 50-second penalty, the bronze was secured for 28-year-old Woods and Team GB. Gold went to Australia's Jessica Fox, who only qualified sixth fastest for the final but produced a near-perfect run when it counted.

  This video can not be played To play this video you need to enable JavaScript in your browser.

  After her struggles three years ago at the Tokyo Games, Biles made a dazzling Olympic return with a stunning beam routine in gymnastics qualifying. There were concerns over the four-time Olympic champion as, after producing another impressive performance on the floor, she appeared to be limping. The 27-year-old came back out for the vault with heavy strapping to her left ankle but came through that routine - and the final apparatus - unscathed and finished top of the all-around standings with three sub-divisions to go. US coach Cecile Landi later told reporters Biles had "just a little pain in her calf". Rapper Snoop Dogg, who is part of the coverage team for American broadcaster NBC, and singer Ariana Grande were at the Bercy Arena to cheer on their compatriot, as was film star Tom Cruise who delighted fans by posing for pictures. It was a good day for the British gymasts too, as the women qualified for the team final on Tuesday.

  This video can not be played To play this video you need to enable JavaScript in your browser.

  British judoka Chelsie Giles won bronze at Tokyo and had a bye to the second round in Paris, but she was left in tears as she suffered a surprise exit after a golden score defeat by Brazil's Larissa Pimenta. There was also disappointment in the boxing for Rosie Eccles as she fell at the first hurdle, suffering a split-decision loss to Poland's Aneta Rygielska, and for Patrick Brown who was beaten in the roundof 16 by Brazil's Keno Machado. In the afternoon, Britain's Evie Richards took fifth in the women's mountain biking as home hero Pauline Ferrand-Prevot won gold for France. There was equestrian controversy too, as Great Britain's huge lead in the team eventing standings was reduced by a jumping penalty against Ros Canter.

  This video can not be played To play this video you need to enable JavaScript in your browser. Team GB remain in gold medal position after the Eventing cross country

  Team GB are looking to defend their Olympic title for the first time since 1972 and looked on course after superb runs from Tom McEwen on JL Dublin and Laura Collett on London 52. But Canter was then given 15 jumping penalties, cutting Great Britain's lead to 4.7 over France. The British team have asked for a review following Canter's penalties. There was better news for the rowers. Two-time Olympic gold medallist Helen Glover, 38, is competing in the women's four event with Rebecca Shorten, Esme Booth and Sam Redgrave. They are favourites for gold after winning two World Cups and the European Championships, and they eased through to the final in Vaires-sur-Marne.

