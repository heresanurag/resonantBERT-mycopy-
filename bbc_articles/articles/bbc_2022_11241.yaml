title: Carl Reilly has bail term varied to attend 80s disco - BBC News
date: '2022-08-02'
section: Northern Ireland
url: http://www.bbc.co.uk/news/uk-northern-ireland-62393547
content: |-
  Carl Reilly is charged with directing terrorism and has been on bail for more than five years.

  A man who has been on bail for more than five years on terrorist charges has had one condition varied to allow him to attend an 80s disco in Belfast.

  Carl Reilly, 46, is accused of directing terrorism and membership of a proscribed organisation - namely the Irish Republican Army - in 2015.

  Mr Reilly was arrested after a security operation involving covert recordings in County Louth.

  The bail request was made at Belfast Crown Court on Tuesday.

  Saying the charges faced by Mr Reilly were "serious", a defence barrister said bail conditions had been relaxed in the past to allow Mr Reilly to travel to Spain and Manchester.

  He asked for his client's curfew be extended to 02:00 BST. That would allow Mr Reilly to attend the 80s disco in Falls Park on 13 August which ends at midnight, then return to his home on Pollard Close.

  Judge Bagnall set the curfew at 01:00 BST to allow Mr Reilly time to go home after the disco

  A Crown prosecution barrister told Judge Fiona Bagnall there was a "principled objection" and there had been "all along to these applications".

  Judge Bagnall said she was prepared to relax the curfew, but set the time at 01:00 BST, saying there was no reason why Mr Reilly could not get home within an hour of the disco ending.

  The judge also ordered that information regarding who Mr Reilly would be attending the event with should be given to police 48 hours in advance.
