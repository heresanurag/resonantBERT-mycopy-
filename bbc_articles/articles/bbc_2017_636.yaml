title: How tea-maker brewed a Brexit bonanza - BBC News
date: '2017-01-26'
section: General
url: http://www.bbc.co.uk/news/business-38748296
content: |-
  Tea-maker Andrew Gadsden explains how his business made a five-figure 'bonanza' from the Brexit vote.

  He spoke with video journalist Dougal Shaw, who went to meet him at his store in Portsmouth, All About Tea.

  You can learn more about the store in this video from the My Shop series.
