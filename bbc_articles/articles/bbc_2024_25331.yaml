content: |-
  Falling masonry just misses people standing in a street in the eastern Turkish city of Elazig, that was hit by an earthquake.

  Falling debris narrowly missed a group of people in a street in eastern Turkey, after it was hit by an earthquake.

  A 5.9-magnitude quake struck the city of Elazig in Turkey's Malatya province on Wednesday. There have been no reports of any injuries or casualties.
