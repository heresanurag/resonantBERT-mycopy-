title: 'Watch: Smoke rises from Russia''s Black Sea navy HQ - BBC News'
date: '2023-09-23'
section: General
url: http://www.bbc.co.uk/news/world-europe-66887318
content: |-
  Videos circulating on social media show plumes of smoke billowing out of the building in Sevastopol, Crimea.

  A missile has hit the headquarters of Russia's Black Sea navy in Crimea, a local Moscow-appointed official has said.

  Videos circulating on social media show plumes of smoke billowing out of the building in Sevastopol.

  BBC Verify has confirmed the footage to be genuine and new.
