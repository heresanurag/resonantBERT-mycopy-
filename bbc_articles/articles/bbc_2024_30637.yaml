content: |-
  An eight-month-old baby sustained serious injuries after she was bitten by a dog on Wednesday.

  Two bailed after baby hurt in suspected XL bully attack

  The dog was seized and destroyed at the family home, police said

  Two people have been bailed after an eight-month-old baby was seriously injured by a dog in Kent. Police were called to Siskin Close in Hawkinge, near Folkestone, at about 14:25 GMT on Wednesday following a report that an infant had been bitten by a dog, reportedly an XL bully. The baby girl was airlifted to a London hospital where she remains in a serious condition, police said. A 76-year-old woman and an 18-year-old man were arrested on suspicion of being in charge of a dog dangerously out of control.

  Police were called to Siskin Close in Hawkinge, near Folkestone, on Wednesday afternoon

  Both have been bailed while inquiries continue, police said. The dog was seized and destroyed at the family home.

  One family member told the BBC the dog, named Hunter, had never shown any form of aggression and that the attack was out of character. "For the dog to do what he did, for me, was totally out of the blue," he said. Another family member said the baby and the dog were "like two peas in a pod". She added that the mother of the injured baby was "devastated". "It is shocking. You see and hear about it all the time, but you don't actually think it is going to happen to your own family," she said. In November 2023, police seized an XL bully from Siskin Close following a report that its owner had been bitten on the finger, which caused a minor injury, the force previously revealed. A police spokesperson said: "The owner was asked to voluntarily surrender the dog to officers for destruction, but declined to do so. "There were no legal grounds for officers to retain the dog in the circumstances, but the owner was asked to agree to accept the conditions of a police order, which included keeping the dog secure and supervised."
