title: 'Huszti sisters: Cause of death of missing women was drowning - BBC News'
date: '2025-02-24'
section: NE, Orkney & Shetland
url: http://www.bbc.co.uk/news/articles/c778j3gvkd0o
content: |-
  Henrietta and Eliza Huszti - both 32 and from a set of triplets - disappeared in Aberdeen in January.

  Cause of death of missing sisters was drowning

  The official cause of death of two sisters found in a river in Aberdeen was drowning, BBC Scotland News has learned. Henrietta and Eliza Huszti - both 32 and from a set of triplets originally from Hungary - disappeared on 7 January. Their bodies were found in the River Dee on 31 January near where they were last seen alive, and their identities were later confirmed. Police said the deaths were not being treated as suspicious. Their death certificates both state the single cause of death as drowning.

  The disappearance of coffee shop assistant Henrietta and hotel house keeper Eliza sparked a major search operation last month. They were last seen in the early hours of 7 January, when they crossed the Victoria Bridge and turned right onto a footpath next to the river heading towards Aberdeen Boat Club. The sisters had visited the Victoria Bridge the day before they disappeared. They also texted their landlady from the bridge area in the early hours of 7 January to say they were giving up their Aberdeen flat. The two missing sisters had not told relatives they planned to imminently move out. The first body was found near Queen Elizabeth Bridge on the morning of 31 January. Officers continued searching and found the second body in an area of the river near to the Victoria Bridge later that evening. The Victoria Bridge and Queen Elizabeth Bridge are about half a mile apart on the River Dee.
