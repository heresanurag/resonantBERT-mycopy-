id: bbc_2018_8000
title: 'Greece wildfires: Survivors fled to sea as flames kill dozens - BBC News'
date: '2018-07-25'
section: General
url: http://www.bbc.co.uk/news/world-europe-44941692
content: |-
  At least 74 people die as flames spread across the Attica region around Athens.

  Survivors say they ran into the sea to escape the devastating Greece wildfires, which have killed at least 74 people.

  Many are still thought to be missing after the Attica region around Athens was engulfed in flames.

  The country's prime minister, Alexis Tsipras, has declared a three-day period of national mourning.
