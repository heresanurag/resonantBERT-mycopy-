title: 'Pompeo: Iran threat included ''attacks on US embassies'' - BBC News'
date: '2020-01-11'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-51069660
content: |-
  US Secretary of State Mike Pompeo says Soleimani killed because of "imminent threat" to US facilities.

  US Secretary of State Mike Pompeo said that the US ordered the killing of Qasem Soleinmani because it had "specific information" that Iranian threats targeting US facilities, including embassies and military bases.
