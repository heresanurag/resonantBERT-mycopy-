  Despite Martinez's heroics, sixth-placed Villa were denied victory as Nikola Milenkovic and Anthony Elanga scored for Forest late on. That sealed Forest's sixth win in nine games, lifted them from fifth to fourth in the Premier League table, above Manchester City. "Today is a big moment," said Forest manager Nuno Espirito Santo. "Let's enjoy it together, all the fans, players. But we know that Brentford [next Saturday] is going to be so tough. "We are now trying to work on that, that is what is most important, game-by-game. I think we should enjoy this because they are special moments. The previous game, today. We want to do it together, us and the fans." Asked whether Forest can compete for a top-four finish, Nuno added: "We are competing against all the teams in the Premier League, it's not about that. "It's about preparing [for] the next one, focusing on the task ahead of you and realising that you didn't achieve anything [yet]." While Forest were celebrating at the City Ground, Villa boss Unai Emery felt his side were denied "a clear penalty" in the first half when Morgan Rogers' left arm appeared to be pulled by Elliot Anderson. "It's a massive mistake from the VAR," said Emery. "Please. OK, not the referee. I respect the referee and I respect the VAR, but the VAR is there to help the referees. It's a clear penalty. Where is the VAR?"
