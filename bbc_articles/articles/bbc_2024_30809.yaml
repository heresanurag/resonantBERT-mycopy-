content: |-
  'Magician' Emiliano Martinez pulled off an 'incredible' save for Aston Villa but it could not prevent Nottingham Forest enjoying a 'special moment'.

  Best save ever? - but Martinez can't stop 'huge moment' for Forest

  Emiliano Martinez has twice won the Yashin Trophy for the world's best goalkeeper

  BBC pundit Marc Albrighton wasn't the only one who thought the deadlock had finally been broken by Nottingham Forest's Nicolas Dominguez. It had been a drab affair at the City Ground until Morgan Gibbs-White flicked on a Forest corner and, from just four yards out, midfielder Dominguez stooped to head goalwards. The ball went behind Emiliano Martinez in the Aston Villa goal. Yet somehow, like a "magician", the Argentine keeper reached back and managed to stop it on the goal-line and drag it away from goal. Martinez's save looked crucial when, moments later, Jhon Duran scored, but Forest launched a late fightback to win 2-1 - and Martinez will be disappointed not to have kept out the equaliser. Former Wales defender, Ashley Williams told BBC Match of the Day: "That was the best save I have ever seen. He is so clever, he understands where he is and what he needs to do. He is facing the wrong way. "Then, the ups and downs of a goalkeeper, he lets in a routine one soon after." "I thought that was in but what a superb save," added Albrighton. "Martinez has got down so low and so quick, and somehow kept it out. "He is not even facing the right way and manages to claw it away. "I honestly can't believe it. It is centimetres from going in, that is incredible. That is one of the best I've seen." Martinez, 32, earned the Golden Glove trophy after helping Argentina win the 2022 World Cup and, speaking on Sky Sports, pundit Jamie Redknapp compared Saturday's save to one of the all-time greats - by England goalkeeper Gordon Banks at the 1970 World Cup. "We talk about the Pele one from Gordon Banks," said Redknapp. "I can't think of a better Premier League save in my life. "Somehow he saved it. It's almost like a magician, sleight of hand. That is truly sensational."

