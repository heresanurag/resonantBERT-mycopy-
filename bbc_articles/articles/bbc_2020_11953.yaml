content: |-
  Fallon Sherrock, who made history by beating two men at the PDC World Darts Championship last year, misses out on qualification this time.

  Sherrock made headlines with her groundbreaking win at the 2020 World Championship

  Fallon Sherrock, who made history by beating two men at the PDC World Darts Championship, has narrowly failed to qualify for the 2021 tournament. She lost out despite winning the last of four women's events which offered two spots for the championship, which starts at Alexandra Palace in December. Deta Hedman edged through on a total of 85 legs to 83 for the second place, after Lisa Ashton had sealed her spot. She played in the 2019 World Championship while Hedman will make her debut.

  Sherrock earned the nickname 'Queen of the Palace' after becoming the first woman to win a match en route to the third round of the 2020 tournament. But the 26-year-old from Milton Keynes finished just outside the top two in the PDC Women's Series Order of Merit despite reaching two finals, a semi-final and a quarter-final over four events in Barnsley.
