  BBC Verify's Nick Eardley takes a look at verified footage and images from a Russian missile attack on a Ukrainian hotel.

  Four people were killed after a Russian missile struck a hotel in Kryvyi Rih, President Zelensky's home town in central Ukraine. BBC Verify's Nick Eardley takes a look at verified footage and images from the attack.
