title: 'Lyra McKee murder: 52-year-old man still being questioned - BBC News'
date: '2020-02-11'
section: Foyle & West
url: http://www.bbc.co.uk/news/uk-northern-ireland-foyle-west-51457008
content: |-
  Three other men arrested are released, one without charge, the other two pending reports to prosecutors.

  Ms McKee, 29, was shot while observing rioting in Derry's Creggan estate on 18 April last year

  A 52-year-old man is still being questioned over the murder of journalist Lyra McKee.

  He was one of four men arrested in Londonderry under the Terrorism Act on Tuesday in connection with her murder.

  Two of the men, aged 20 and 27, were released pending reports to the Public Prosecution Service, and a 29-year-old man was released without charge.

  Ms McKee, 29, was shot while observing rioting in Derry's Creggan estate in April 2019.

  The New IRA admitted carrying out Ms McKee's murder.

  Police have again appealed for anyone with information to come forward.

  Lyra McKee was named Sky News young journalist of the year in 2006

  The 29-year-old writer and campaigner from Belfast had only recently moved to Derry when she was killed.

  She was standing near a police 4x4 vehicle on the night of 18 April 2019 when a masked gunman fired towards officers and onlookers.

  Regarded by many as a rising star in Northern Ireland media circles, she had written for many publications, including Buzzfeed, Private Eye, the Atlantic and Mosaic Science.

  She was named Sky News young journalist of the year in 2006 and Forbes Magazine named her as one of their 30 under 30 in media in Europe in 2016.

  The Belfast woman had signed a two-book deal with the publisher Faber and Faber, with her forthcoming book The Lost Boys due out this year.

  According to those who knew her best, the gay rights advocate was someone who "believed passionately in social and religious tolerance".

  At her funeral at St Anne's Cathedral in Belfast Fr Martin Magill received a standing ovation when he asked why it took her death to unite politicians.

  Days later the British and Irish governments announced a new talks process aimed at restoring devolution.

  PSNI Det Supt Jason Murphy said he believed "some people within the community know what happened and who was involved."

  "I understand people may be frightened to talk to us," he added.

  "I have previously given my personal assurance relating to anonymity for the purpose of this investigation and I renew this assurance today, as we approach the anniversary of Lyra's murder."

  Police were searching for weapons and ammunition when violence started on 18 April 2019

  Det Supt Murphy said he wanted the community in Creggan to "think about how that horrific attack impacted them personally and how it impacted the entire community".

  "We saw widescale revulsion after Lyra was murdered and I remain determined to work with the community and local policing to convert that revulsion into tangible evidence to bring those who murdered Lyra to justice," he said.

  He urged anyone with any mobile phone footage from the night Ms McKee to contact police via the PSNI's Major Incident Public Portal.
