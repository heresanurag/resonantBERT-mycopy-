title: Man charged after climbing Big Ben's Elizabeth Tower - BBC News
date: '2025-03-10'
section: London
url: http://www.bbc.co.uk/news/articles/c0mwxxn71w0o
content: |-
  Daniel Day, 29, has been charged with causing a public nuisance and trespassing on a protected site.

  A man has been charged by police after scaling Big Ben's Elizabeth Tower at the Palace of Westminster in central London on Saturday. Daniel Day, 29, of Palmerston Road, Westcliff-on-Sea, Essex, has been charged with causing a public nuisance and trespassing on a protected site after climbing onto the clock tower, the Metropolitan Police said. He has been remanded in custody to appear at Westminster Magistrates' Court on Monday. Emergency services were called at 07:24 GMT on Saturday to reports of a protester who had climbed up the tower holding a Palestinian flag.

  The barefoot man was brought down in a cherry picker as Big Ben struck midnight, after more than 16 hours on a ledge several metres up the tower. On Sunday, Westminster Police said a man had been arrested once he reached the ground after what it called a "protracted incident". The incident led to the closure of Westminster Bridge, one of the exits at Westminster Underground Station, and Bridge Street. Tours of the Parliamentary Estate were also cancelled in response. A small group of supporters gathered behind a police cordon below the tower shouting "free Palestine" and "you are a hero".
