content: |-
  People leave messages at the scene where a woman in her 30s died after she fell.

  Tributes to woman who died after beach fall

  Saffron Cole-Nottage has been named locally as the woman who died on Sunday

  Tributes have been left by a beach where a woman in her 30s died after a fall. Saffron Cole-Nottage, who has been named locally, died following the incident close to The Esplanade in Lowestoft, Suffolk, on Sunday evening. Suffolk Police said the death was being treated as "unexplained" and a file was being prepared for the coroner. Flowers and messages paying tribute have been left on the sea wall barrier.

  Tricia and Barry Butler placed flowers at the scene in Lowestoft in memory of Ms Cole-Nottage

  It is believed that Ms Cole-Nottage might have fallen on to rocks on the seafront. Tricia Butler, 65, and Barry Butler, 61, were at the scene on Wednesday to lay flowers in tribute to Ms Cole-Nottage. They told the BBC their daughter had previously worked with her in Kent, where they also used to live. "The family are obviously devastated," she said. "It's just tragic, absolutely tragic. "It shouldn't have happened... she had her whole life to live. It's sad."

  Ms Cole-Nottage died after falling at the seafront in Lowestoft, police said

  One of the written tributes left at the scene said: "My beautiful daughter-in-law, you are going to be missed", while another from the woman's niece said she burst into tears when she heard the news, adding "U really are my best auntie". Another handwritten message read: "There are no words to express how much we will miss you. The world is so cruel." A spokesperson for Suffolk Police said: "The death is currently being treated as unexplained but there are not believed to be any suspicious circumstances at this time." The emergency services, including an air ambulance, attended the scene at just after 20:00 GMT on Sunday.

