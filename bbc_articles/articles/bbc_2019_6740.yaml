title: Naomi Campbell on diversity, colourism and Windrush - BBC News
date: '2019-06-25'
section: General
url: http://www.bbc.co.uk/news/uk-48753590
content: |-
  The supermodel tells the BBC it is still a "big deal" to see a woman of colour on a magazine cover.

  Supermodel Naomi Campbell has said that while diversity in the fashion industry has improved it is still a "big deal" to see a woman of colour on a magazine cover.

  In an interview with Newsnight, she also talked about colourism, the Windrush scandal and outgoing Vogue editor Alexandra Shulman.
