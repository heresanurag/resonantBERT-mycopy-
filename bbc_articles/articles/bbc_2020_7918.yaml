  What went wrong for the Canaries?

  There were emotional scenes at Carrow Road when referee Kevin Friend signalled the end of the match.

  A number of Norwich players dropped to the ground while boss Farke consoled his team.

  Having spent the majority of this prolonged campaign in the bottom three, the end of the season cannot come soon enough.

  The Canaries depart England's top flight having caused one of the biggest shocks of the season, a 3-2 win over defending champions Manchester City, while Farke's side also held Arsenal and Tottenham at home, and won at Everton.

  When Jamal Lewis hit the winner against Champions League hopefuls Leicester on 28 February, shortly before the season was suspended, Norwich were just four points from safety with 10 games remaining.

  But they have been woeful since the restart, losing all six league games by an aggregate score of 15-1.

  Farke opted to keep the core of last season's team that finished with five more points than Sheffield United on the way to winning the Championship in impressive style.

  Nine of the 11 players that started against West Ham also started the final Championship game of last season against Villa.

  While Villa spent more than £100m after winning promotion via the play-offs, Norwich spent a fraction of that sum, with £750,000 for West Ham right-back Sam Byram one of their biggest outlays.

  They have managed just five clean sheets and scored only seven times away from Carrow Road.

  With two of their three remaining games at third-placed Chelsea and second-placed Manchester City, they are on course to finish the season with the fewest away goals in the Premier League era.

  What now for Farke and his players?

  Farke insists Norwich will not do anything "crazy" in the transfer market as they look to bounce back in 2020-21 - but there are some important decisions to be made.

  The former Borussia Dortmund reserve-team boss has a contract until 2022 and is keen to stay and rebuild a team capable of making an immediate return to the Premier League.

  Whether Farke will be in charge after a dreadful run of form remains to be seen, while Norwich's hierarchy has some tough decisions to make concerning the future of the club's playing assets.

  In November 2019, the Canaries announced losses of £38m for the financial year ending June 2019 before senior staff forecast a profit in the region of £16m for 2019-20.

  That was before the season was suspended, Norwich warning in April that they could lose up to £35m because of the coronavirus pandemic.

  It may prompt Norwich to cash in on highly-rated young players like Ben Godfrey and Todd Cantwell, although Farke stated on the eve of the West Ham game: "If we want to bounce back next season it is important we keep our best players to be competitive."

  Defender Godfrey, 22, has been linked with German teams Borussia Dortmund and RB Leipzig, while Sheffield United are reported to be interested in 22-year-old midfielder Cantwell.

  This was a huge win for West Ham - and not just in terms of the score.

  Having started the game three points above the relegation zone, they have created some breathing space before the last three games of the season - and left Bournemouth and Aston Villa in big trouble.

  The Hammers had failed to win any of their previous seven away league games under Moyes - but they made up for it as they claimed their biggest away win in the Premier League since November 2007.

  In addition to scoring the first hat-trick of his professional career, Antonio became the first West Ham player to score four goals in a league match since David Cross against Tottenham in September 1981.

  Since the restart, Antonio has been involved in 78% of West Ham's Premier League goals, scoring six and assisting one - form Moyes will hope he can continue to the end of the season.
  • None Norwich have been relegated from the Premier League for a record fifth time.
  • None West Ham picked up their first away win in the Premier League since December (1-0 v Southampton), ending a run of eight games on the road without a win (D1 L7).
  • None Norwich have lost 24 Premier League games this season - in no league season in their history have they ever lost more.
  • None The Canaries have conceded 17 goals from set-piece situations in the Premier League this season (excluding penalties), more than any other side.

  While Norwich are back in action on Tuesday at Chelsea (20:15 BST), West Ham host fellow strugglers Watford next Friday (20:00 BST).
