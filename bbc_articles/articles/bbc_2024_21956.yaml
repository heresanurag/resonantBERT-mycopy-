  McLaren’s Lando Norris says he is “still hopeful” of a good result in Sunday’s Azerbaijan Grand Prix despite starting the race down the field.

  Norris 'still hopeful' of good result in Baku

  The Azerbaijan Grand Prix is live on 5 Live and the BBC Sport website

  McLaren's Lando Norris says he is "still hopeful" of a good result in Sunday's Azerbaijan Grand Prix despite starting the race down the field. The Briton will start nine places behind title rival Max Verstappen's Red Bull after coming across yellow flags at the wrong moment in qualifying, which meant he did not progress beyond the first session. Norris qualified 17th but gained a place when Alpine's Pierre Gasly was disqualified for a technical infringement - and another when Mercedes elected to start Lewis Hamilton from the pit lane and take a new engine. The aim for Norris is to close a 62-point gap to Verstappen over the remaining eight races of the season. "It is what it is but there is a long race ahead," Norris said. "We have got some good tyres in the bank, so yeah, try and be hopeful and see what we can do." But Norris acknowledged that making progress would depend on strategy choices in the race, because overtaking is difficult on the Baku street track despite the two-kilometre pit straight. He said the fact that the slower cars in front of him had chosen to run low downforce to boost their speed on the straight would make it even more difficult. Norris said he was "disappointed and frustrated" with the result of qualifying but insisted that there was "nothing I could change". "Everything is going to have to be done with strategy because you can't overtake," Norris said. "There are a plenty of cars at the back who have taken the wing off and hope for the best. "That makes it impossible for a lot of cars to overtake them. "The car is quick and we hope that will come into our hands and at some point I can get clean air. "But on a street circuit everything gets backed up and you kind of get forced into a position and you can’t do a lot at times. "We will hope for the best but I don’t expect anything much at all unless strategy comes into play." The other McLaren driver Oscar Piastri, who has been asked before the weekend to help Norris' title bid, qualified second, behind the pole position Ferrari of Charles Leclerc. Ferrari's Carlos Sainz was third on Saturday, ahead of Red Bull’s Sergio Perez, Mercedes’ George Russell, Verstappen and Mercedes' Hamilton.

