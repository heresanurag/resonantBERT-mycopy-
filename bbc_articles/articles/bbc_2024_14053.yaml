title: Woman charged after Nigel Farage milkshake incident in Clacton - BBC News
date: '2024-06-05'
section: Politics
url: http://www.bbc.co.uk/news/articles/cw0097xlqxvo
content: |-
  A 25-year-old woman is due in court in July after the Reform UK leader had a drink thrown over him.

  Mr Farage was walking to the Reform UK campaign bus, from a local pub, when a woman appeared to throw the milkshake in his face

  A woman has been charged with assault after a banana milkshake was thrown over Nigel Farage. The Reform UK leader was leaving a pub in Clacton-on-Sea on Tuesday having launched his general election candidacy for the constituency. Victoria Thomas Bowen, 25, is due to appear at Colchester Magistrates' Court on Tuesday, 2 July charged with assault by beating and criminal damage, Essex Police said. A 44-year-old man arrested on suspicion of assaulting an emergency worker has been released and will face no further action.

  Mr Farage announced on Monday that he would take up the role of Reform UK leader and stand for the Clacton seat. The general election is due to take place on Thursday, 4 July.

