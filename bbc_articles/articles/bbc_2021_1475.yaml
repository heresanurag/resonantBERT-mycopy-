id: bbc_2021_1475
title: 'Stonehenge tunnel: Campaigners granted High Court hearing - BBC News'
date: '2021-02-17'
section: Wiltshire
url: http://www.bbc.co.uk/news/uk-england-wiltshire-56096991
content: |-
  Protesters are seeking a judicial review of the £1.7bn project over fears of the impact on the site.

  Campaigners against the tunnel have labelled it a "complete violation" and "international scandal"

  Campaigners challenging the approval of a road tunnel near Stonehenge have been granted a court hearing to allow the decision to be scrutinised.

  Save Stonehenge World Heritage Site (SSWHS) is seeking permission for a judicial review of the £1.7bn project.

  The hearing will determine whether a review should be granted and will take place at the High Court, with a date likely to be set next week.

  SSWHS believes the scheme will have a detrimental impact on the ancient site.

  Transport Secretary Grant Shapps approved the scheme in November against the recommendations of planning officials.

  The tunnel is part of a £1.7bn investment in the A303 between Amesbury and Berwick Down

  He said the need for the development "outweighed any harm" that might be caused.

  Wiltshire Council backed the decision to approve the plans, with leader Philip Whitehead saying he saw it as a solution to "horrendous" traffic in villages near the A303.

  But SSWHS said the two-mile (3.2km) tunnel along the A303 will cause "significant harm" to the area, and raised £50,000 in order to apply for a judicial review.

  The SSWHS is part of The Stonehenge Alliance, a coalition of groups fighting the tunnel plans.

  Its president, Tom Holland, said: "We have always believed that the government's intention to build a great gash of concrete and tarmac through the World Heritage Site is a dereliction of its responsibilities, and we are delighted that there will now be the opportunity to test this conviction in a court of law.

  "We urge Grant Shapps to review his decision and act to conserve rather than vandalise this most precious of prehistoric landscapes."

  The road tunnel has the backing of Wiltshire Council, English Heritage, the National Trust and Historic England

  Solicitor Rowan Smith, acting for SSWHS, said although there was "a huge level of public outrage", the case must proceed on the basis of "procedural error".

  "Today's decision means that our client's case and the government's decision-making process will now be fully scrutinised by the courts," he said.

  The project, expected to take five years to complete, is scheduled to get under way in 2023.

  The Department for Transport has been approached for comment.

