  Ms Giuffre 'remains in serious condition' in hospital following a collision with a school bus, her family say.

  Virginia Giuffre grateful for 'love and support' after car crash

  Ms Giuffre 'remains in serious condition' in hospital in Australia, her family said

  Virginia Giuffre, a prominent Jeffrey Epstein accuser, has expressed gratitude for the "outpouring of love and support" she has received after being hospitalised following a car accident. In a statement shared with the BBC, her family said: "She is overwhelmed with gratitude. Today she remains in serious condition while receiving medical care." On 24 March in western Australia, a school bus collided with a car Ms Giuffre was riding in, according to the statement. Ms Giuffre was "banged up and bruised" and later admitted to hospital after her condition deteriorated, her family said.

  "The school bus driver had a bus full of distraught children and left the scene to get them back, saying he would file a police report, which he did later," the statement said. "Virginia was banged up and bruised and returned home. Virginia's condition worsened and she was admitted to the hospital," it added. Ms Giuffre, 41, posted about the accident on Instagram over the weekend, writing: "This year has been the worst start to a new year". In the statement issued on Tuesday, her family said that she had intended to post on her private Facebook page.

  Ms Giuffre had recently been living with her children and husband Robert in the suburb of North Perth, Australia, though recent reports suggest the couple have split after 22 years of marriage. Ms Giuffre alleged that Epstein and Ghislaine Maxwell trafficked her to the Duke of York when she was 17. Prince Andrew has denied all claims but reached an out-of-court settlement with her in 2022. The settlement included a statement in which he expressed regret for his association with Epstein but contained no admission of liability or apology.
