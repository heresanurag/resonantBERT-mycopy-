content: |-
  The BBC’s analysis editor looks at the government’s proposed reforms to personal independence payments.

  Disabled people could face changes to how personal independence payments (PIP) work, with the government proposing major reforms.

  There’s been a rise in the number of people claiming PIP citing mental health conditions and Prime Minister Rishi Sunak says: “We need to do something about that.”

  But disability charity Scope has described the plans as a "reckless assault on disabled people".

  The BBC’s analysis editor Ros Atkins looks at why the government wants change and what impact it could have.
