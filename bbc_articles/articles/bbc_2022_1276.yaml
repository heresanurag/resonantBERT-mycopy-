title: Moment Djokovic learns his Australian Open fate - BBC News
date: '2022-01-16'
section: General
url: http://www.bbc.co.uk/news/world-australia-60013982
content: |-
  Tennis star Novak Djokovic loses his legal challenge and is deported from Australia.

  This is the moment judges revealed Novak Djokovic had lost his last-ditch attempt to avoid being deported ahead of the Australian Open.

  He will not appeal the decision.
