  There are metal meteorites that fall to Earth that are presumed to come from objects like Psyche.

  Their composition has prompted many people to think we could eventually go into space to mine them. As a resource, Psyche could be worth trillions of dollars.

  But Dr Helena Bates, a meteorite expert from London's Natural History Museum, said the emergence of such an industry was a way off yet.

  "I think asteroid mining is most valuable if you think about it in terms of extending space missions," she told BBC News.

  "So you send a spacecraft up to a near-Earth asteroid where it picks up some material that it can convert into fuel, and then it can transfer on to a deeper space mission. That's where I think asteroid mining could be really important for the future of space travel."

  Iron meteorites that have fallen to Earth are presumed to have come from bodies like Psyche

  Psyche is probably too distant, anyway. Even at its very closest, it's still 250 million km (155 million miles) from Earth, which is three times farther than Mars is at its closest, and when the metal world is on the far side of the Solar System to Earth, it's 650 million km (405 million miles) away.

  Nasa will be trialling two technologies on the mission it hopes to make greater use of in the future.

  One is electric propulsion. The spacecraft will use solar power to excite and accelerate a stream of xenon gas to provide persistent thrust.

  The other involves the use of laser beams to increase the rate at which data can be transmitted.

  The mission team is promising to make all imagery of Psyche available to the public within half an hour of it arriving at Earth.

  The spacecraft comes off the top of the rocket to head to the asteroid
