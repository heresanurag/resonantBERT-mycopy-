title: 'Joe Biden inauguration: 46th US president takes oath of office - BBC News'
date: '2021-01-20'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-55740014
content: |-
  The new president is sworn into office by Chief Justice John G Roberts.

  After vowing to uphold and defend the Constitution of United States, Joe Biden has been officially sworn in as the 46th US president.

  The new president's oath of office was administered by Chief Justice John G Roberts.

  Read more:Joe Biden becomes the 46th US president
