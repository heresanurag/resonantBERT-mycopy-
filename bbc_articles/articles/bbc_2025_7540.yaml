title: Pope Francis applauded as coffin begins its final journey - BBC News
date: '2025-04-26'
section: General
url: http://www.bbc.co.uk/news/videos/cly1p4v871qo
content: |-
  The Pope is being laid to rest at the church of Santa Maria Maggiore in Rome.

  The coffin carrying Pope Francis is moved from St Peter's Square after his funeral mass, in preparation for it to be taken to the church of Santa Maria Maggiore in Rome for burial.

  The Pope died on Easter Monday at the age of 88.
