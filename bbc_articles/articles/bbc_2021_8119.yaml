title: 'Croydon stabbing: Teen arrested after 16-year-old killed - BBC News'
date: '2021-07-03'
section: London
url: http://www.bbc.co.uk/news/uk-england-london-57703348
content: |-
  A 15-year-old boy is arrested in connection with the death of a 16-year-old boy in south London.

  Police were called around 01:00 BST on Thursday

  A 15-year-old boy has been arrested after a teenager was stabbed to death at a house in south London.

  Police found a 16-year-old boy with stab wounds at a residential address on Bracken Avenue, Croydon, on Thursday.

  Despite treatment, the teenager was pronounced dead around 01:30 BST. Next of kin have been informed but formal identification has not taken place.

  The 15-year-old boy was arrested in Brighton on Friday, and is being held in East Sussex, the Met Police said.

  A post-mortem examination will be held in due course and the force is retaining an "open mind" as to the motive.

  Det Ch Insp Dave Blair, of the Met's Specialist Crime Command, said: "Despite this early arrest, we still want to hear from anyone who has information relating to this horrific incident."

