title: Biden accuses Russia of 'genocide' in Ukraine - BBC News
date: '2022-04-16'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-61089381
content: |-
  US President Joe Biden accuses Russia's Vladimir Putin of genocide in Ukraine.

  During a speech about surging inflation on Tuesday, US President Joe Biden appeared to accuse Russia's Vladimir Putin of genocide.

  The Biden administration has previously stopped short of describing civilian killings in Ukraine as "genocide", but has accused Mr Putin of war crimes.

  The White House is seeking to pin the blame for rising consumer prices on Russia's invasion of Ukraine, though American inflation predates the war.
