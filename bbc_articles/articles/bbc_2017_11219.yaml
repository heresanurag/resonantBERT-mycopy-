id: bbc_2017_11219
title: Georgia Dome stadium crumbles in controlled demolition - BBC News
date: '2017-11-21'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-42058177
content: |-
  Around 5,000lb of explosives were used to bring down one of the biggest dome structures in the US. The newly erected Mercedes-Benz Stadium next door opened earlier this year.
