title: Samsung's folding phone breaks for reviewers - BBC News
date: '2019-04-18'
section: Technology
url: http://www.bbc.co.uk/news/technology-47970788
content: |-
  Several outlets reviewing Samsung's ground-breaking new folding smartphone have reported major problems with its screen.

  Samsung's folding phone was shown off for the first time earlier this year

  Earlier this week, Samsung sent out its remarkable new folding smartphone to a number of media outlets, including the BBC.

  Perhaps now it wishes it hadn’t.

