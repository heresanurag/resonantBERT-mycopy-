title: 'Lyra McKee: Sister pays tribute - BBC News'
date: '2019-04-25'
section: General
url: http://www.bbc.co.uk/news/uk-northern-ireland-48042024
content: |-
  Nichola Corner urges mourners at her sister's funeral to create change in the world.

  Nichola Corner, the sister of murdered journalist Lyra McKee, urges mourners at her funeral to create change in the world.

  She said that would be Ms McKee's legacy.

  "We must change our own world one piece at a time," she said.
