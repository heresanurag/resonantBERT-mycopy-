title: 'Sarah Smith: US braces as two starkly opposing visions clash - BBC News'
date: '2024-11-05'
section: US & Canada
url: http://www.bbc.co.uk/news/articles/cx2d7y87z0jo
content: |-
  After a history-making year, a divided country will soon face the reality of elections: there has to be a winner.

  Sarah Smith: US braces as two starkly opposing visions clash

  America is choosing its path forward, and the stakes could not be higher. Both candidates have presented stark visions for the future if they lose this election. Donald Trump says the country will "go to hell" and become "communist immediately" if he loses, while Kamala Harris describes her opponent as a "fascist" who wants "unchecked power". Voters in the key battleground states have been bombarded by campaign ads, much of it designed to induce fear. Given this climate, it is no wonder surveyed Americans are reporting high levels of anxiety. "I do believe they're making us live in fear just to get our vote," Heather Soucek told me in Wisconsin as election day loomed. She lives in a swing county in a swing state, and plans to back Trump because, in her words, Harris's economic plans are "scary".

  But just along the street, I also met Tracy Andropolis, a registered independent who said she would vote for Harris. "It's one of the most important elections in my lifetime. There's a lot on the line," she said, adding that she was concerned Trump would refuse to give up power if he won. Both expressed genuine fears for the future if their candidate lost, reflecting the existential mood of many voters on the eve of the election. Ms Andropolis also told me she did not believe the neck-and-neck polls. Not because she has any real evidence, but because she cannot envisage millions of people planning to vote for Trump. And she is by no means alone in her struggles to accept the closeness of this race. One of the things I've learned travelling around this country and talking to voters is that America doesn't just seem remarkably divided, it feels as though two separate nations are awkwardly cohabiting on the same land mass.

  Democrats mainly live in the cities and suburbs, with Republicans mostly living in rural areas. Americans are increasingly moving to places where their neighbours share their political outlook. And it’s not hard to identify these areas at the moment, given the yard signs and placards that so often mark out Trump and Harris territory.
  • None What will decide the US election and why it's so close But it is not possible to live in these separate political worlds forever. These two sides are about to collide with the harsh reality of an election. However disputed, however contested, there has to be a winner. And when some here learn the eventual result and realise that tens of millions of their fellow Americans feel very differently to them, it will be a shock.

