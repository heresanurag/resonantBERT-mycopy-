id: bbc_2020_6658
title: British Gas owner Centrica to cut 5,000 jobs - BBC News
date: '2020-06-11'
section: Business
url: http://www.bbc.co.uk/news/business-53006073
content: |-
  Most cuts will fall in the UK as the firm seeks to "arrest the decline" of it's business.

  Centrica, the owner of British Gas, is to cut 5,000 jobs this year to "arrest the decline" of the company.

  The company has been losing customers to rivals and, in February, blamed a big loss in 2019 on the energy price cap and falling gas prices.

  Centrica also said the coronavirus crisis had shown how the company could be "agile and responsive".

  New boss Chris O'Shea said most of the cuts would fall in the UK as the energy giant seeks to slim down its business.

  About half of the jobs to go will be among the company's leadership, management and corporate staff. This will include half of the senior leadership team of 40 who will leave by the end of August.

  Centrica currently has about 27,000 employees, with 20,000 of these based in the UK.

  Mr O'Shea was officially appointed as Centrica chief executive in April, having previously been the company's finance director. He took over from Iain Conn, who had said last summer that he intended to leave the role.

  "Since becoming chief executive almost three months ago, I've focused on navigating the company through the Covid-19 crisis and identifying what needs to change in Centrica," Mr O'Shea said.

  "We've learnt through the crisis that we can be agile and responsive in the most difficult conditions and put our customers at the heart of our decision making.

  "I truly regret that these difficult decisions will have to be made and understand the impact on the colleagues who will leave us. However, the changes we are proposing to make are designed to arrest our decline, allow us to focus on our customers and create a sustainable company."

  The GMB union said it would "fight for every job".

  "A combination of the [energy price] cap and too little, too late management decisions have left a once proud brand crippled and weak," said spokesman Justin Bowden.

  "Slashing thousands more jobs is not the answer. You cannot just cut your way out of a crisis."

  The price cap on electricity and gas bills came into effect in January 2019 and was a flagship policy of former Prime Minister Theresa May to end what she called "rip-off" prices.

  A number of energy companies have said the policy has affected their business and profits. Centrica made a loss of £849m in the last calendar year compared with a £987m profit the year before.

  The energy sector has seen a number of smaller suppliers fail, and other companies have been looking to merge.

  Last month, Ovo Energy - which bought SSE's retail division earlier in 2020, making it the UK's second biggest domestic gas and electricity supplier - said it was cutting 2,600 jobs.

  Centrica also said it would be consulting with staff on "simplifying" terms and conditions for employees in the UK.

  It said it had 80 different employee contracts, each with multiple variants, with many of the agreements more than 35 years-old.
