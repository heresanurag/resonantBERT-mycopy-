  Watched by Katy Perry and Chris Martin, the star delivered hit after hit from his debut album, Gang Signs and Prayer - as well as a snippet of the Grenfell charity single, Bridge Over Troubled Water, which was number one that weekend.

  Stormzy dedicated the set to his mother, declaring, "Hey, mumzy, look at your boy now," as he surveyed the massive crowd.

  Katy Perry and Chris Martin were among the stars who watched Stormzy's 2017 Glastonbury set

  A poster appeared in the window of the Glastonbury Oxfam shop earlier today.

  Angus Lavery, manager of the store, told the BBC he had no idea how the poster first appeared in his shop window.

  He said: "The poster appeared at lunchtime.

  "I don't know who put it up but I haven't been told to take it down."

