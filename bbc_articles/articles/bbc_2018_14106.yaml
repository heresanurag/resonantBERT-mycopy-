title: Stormzy to headline Glastonbury Festival 2019 - BBC News
date: '2018-11-16'
section: Entertainment & Arts
url: http://www.bbc.co.uk/news/entertainment-arts-46220908
content: |-
  He will be the first UK rapper and grime artist to headline the festival.

  Stormzy was a hit on the Other stage Glastonbury 2017

  Stormzy will be Glastonbury's first grime headliner, with a Pyramid Stage slot confirmed for 2019.

  The news first broke via a poster in an Oxfam shop in Streatham - close to the star's childhood home - and one in Glastonbury.

  Stormzy confirmed the news via a post on Instagram.

  He headlined this summer's Wireless Festival and has played Glastonbury festival twice before in the Sonic Tent in 2016 and the Other Stage in 2017.

  Last year marked a big breakthrough for UK grime when Boy Better Know headlined the Worthy Farm event's Other Stage.

  Stormzy played earlier in the day on the Other Stage and performed a thrilling set, which will undoubtedly have persuaded organisers Michael and Emily Eavis to book him for the main stage.

