  Fifteen months of fighting have left the Gaza Strip, a territory 41km (25 miles) long and 10km (6 miles) wide, largely uninhabitable. Entire districts have been razed to the ground. Agricultural land where greenhouses once stood has been reduced to sand and rubble. The UN Environment Programme (UNEP) has warned that it could take 21 years to remove and dispose of all debris. It described the water and sanitation systems as "almost entirely defunct", warned of mounting rubbish around camps and shelters, and highlighted the risk that chemicals from destroyed solar panels and the munitions being used could contaminate soil and water supplies. More than 50 million tonnes of debris have accumulated as a result of the destruction, according to the UN body. The Israeli military launched a campaign to destroy Hamas in response to an unprecedented cross-border attack on 7 October 2023, in which about 1,200 people were killed and 251 were taken hostage. More than 47,550 people have been killed and 111,600 injured in Gaza since then, according to the territory's Hamas-run health ministry.
