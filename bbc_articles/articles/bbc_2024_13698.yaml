title: 'Rob Burrow dies: Kevin Sinfield tribute to friend and former Leeds team-mate
  - BBC Sport'
date: '2024-06-03'
section: Rugby League
url: http://www.bbc.co.uk/sport/rugby-league/articles/cg33yv5x4xyo
content: |-
  Kevin Sinfield pays tribute to the late Rob Burrow, calling his former Leeds Rhinos team-mate a "beacon of hope and inspiration".

  Sinfield and Burrow both played more than 400 times for Leeds Rhinos

  Kevin Sinfield paid tribute to Rob Burrow, describing his former Leeds Rhinos team-mate who has died aged 41 as a "beacon of hope and inspiration". Rugby league legend Burrow passed away on Sunday following a four-and-a-half-year battle with motor neurone disease (MND). As friends and former Leeds team-mates, Sinfield and Burrow raised millions together for charity to raise awareness and fund research into MND. "Today was the day that I hoped would never come," said Sinfield. "The world has lost a great man and a wonderful friend to so so many." Burrow and Sinfield were both made CBEs in the 2024 New Year Honours. The pair have helped to raise more than £15m for MND charities since Burrow's diagnosis in 2019. "You fought so bravely until the end and became a beacon of hope and inspiration, not only for the MND community but for all those who saw and heard your story," said Sinfield.

