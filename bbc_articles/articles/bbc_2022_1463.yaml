  Other customers described it as "bad news" and some said they were cancelling their membership.

  But other customers said the subscription still represented value for money.

  Twitter user Jodie Portugal wrote: "Just received an email from #pret stating that my subscription will be increased to £25 a month for 5 drinks a day, which by itself would be about £150+, so for the cost of an extra drink and croissant I still save a fortune."

