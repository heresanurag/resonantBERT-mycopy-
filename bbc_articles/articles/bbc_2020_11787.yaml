title: Your pictures of Scotland 16 - 23 October - BBC News
date: '2020-10-23'
section: Scotland
url: https://www.bbc.co.uk/news/uk-scotland-54616107
content: |-
  A selection of your pictures of Scotland sent in between 16 and 23 October. Send your photos to scotlandpictures@bbc.co.uk. Please ensure you adhere to the BBC's rules regarding photographs which can be found here.

  Please also ensure you follow current coronavirus guidelines and take your pictures safely and responsibly.

  Conditions of use: If you submit an image, you do so in accordance with the BBC's terms and conditions.

  This out-of-this-world shot of the milky way above Lonan House in Glen Lonan was snapped by Michael Kent.

  Autumn has arrived. Andrena Coburn's daughter shares her name with the season and enjoys her special time of year playing hide and seek behind the big fir trees in the Hermitage at Dunkeld.

  Doe a deer - this friendly female deer wasn't shy as she met Michelle Borland on a visit to Glencoe.

  Ray - this drop of golden sun adds the finishing touches to Marion Reid's portrait of autumn.

  Me myself and I - Bruce Melvin's daughter Evie has the hills near Cairnsmore of Fleet all to herself in this picture.

  Canoe believe how beautiful the light and the broody sky look for this kayaker on Loch Bracadale, Skye?

  Oh deer - this majestic creature was waiting for a snack from Marc McCubbin from Renfrew at the Kingshouse Hotel in Glencoe.

  A housebreaking squirrel is caught in the act stealing nuts in Edinburgh.

  Who says we only choose dogs? Cleo the cat represents the feline faction as she enjoys the autumn sunshine in her garden in Motherwell.

  A line of the times: Aoibheann Devine thought this washing line near Pittenweem was very 2020.

  Ahead of the curve: Stephanie Brough got the best part of the day on her morning run through the McLennan Arch on Glasgow Green.

  Why couldn't the pony sing? Because he was a little hoarse: Christie Mellis reckons her son Nathaniel was sharing a joke with a local horse where his gran stays near Cove, Kilcreggan.

  Having it Largs: A rainbow encapsulates the North Ayrshire town, spotted from the Cumbrae ferry terminal by Maureen Kerrigan.

  No going back: Lucy, aged 10 braces for the cold after jumping off the slipway at Lamlash Bay, Arran as her mum Alison Roberts snapped the shot.

  This tree-mendous picture of Finn the Cocker Spaniel at the Cat Gates at Culzean Castle has a cinematic feel to it.

  Sandie Pow's husband Colin travels at the speed of kite as he surfs on the family's favourite beach, Sands of Luce in Dumfries and Galloway.

  Stephen Robertson soaked up the rich colours of autumn highlighted in this beautiful sunset over the hamlet of Altandhu and the summer isles.

  Four-year-old George is on track for a nice day out as he waves at the approaching train driver and passengers on the miniature railway as Strathaven Model Society staged the final rides of 2020.

  Mist and yellow fruitfulness: Autumn colours take over in the back garden of Sarah Morris in Hamilton.

  Gene Webster saw some shades of Halloween in this in-tree-guing shot taken at Glenmore in Aviemore.

  Sea bass: Alan Bruce from Edinburgh captured this cold-looking view of Bass rock with gannets looking on.

  Three Exmoor ponies at North Berwick Law take a colt hard look at a couple of dogs walking past.

  Wish view were here: Linda Young captures Ard Neackie on Loch Eriboll - a rocky promontory connected to the mainland by a sandy spit.

  Leave me alone: Ross Collins witnesses a car-free Kelvin Way in Glasgow as it remains pedestrian-only for social distancing.

  Joe and Joshua appreciate a neighbour's rainbow in support of our NHS.

  Mussel Beach: Jan DolnyI took an autumnal walk along Musselburgh Beach and was reminded how the town got its name, with thousands of mussel shells lining the shoreline beyond Fisherrow Harbour.

  Drama scene: Craig Buchan's photo from St Fillans looking out over Loch Earn looks like the start of a movie with the morning mist breaking over the still loch.

  In the run-up to Halloween, this moody picture of the light at the end of the tunnel on Inchcolm Island in the Firth of Forth has a hint of Harry Potter about it, and He Who Must Not Be Named.

  It's not Ard to see why we loved this mirror image shot of Loch Ard by Alan from Glasgow.

