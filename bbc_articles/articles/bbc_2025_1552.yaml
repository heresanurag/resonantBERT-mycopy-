title: Storm Éowyn brings wild weather to UK and Ireland - BBC News
date: '2025-02-02'
section: General
url: http://www.bbc.co.uk/news/videos/crlk02xyp87o
content: |-
  Storm Éowyn brought gusts of up to 114mph (183 km/h) - causing travel disruption and leaving many in the UK and Ireland without power.

  The worst of the weather has passed, but strong winds are expected to continue in parts of England and Wales on Saturday.

  These videos show some of the damage caused by flooding and the storm's fierce winds.
