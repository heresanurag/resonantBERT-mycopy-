content: |-
  Pep Guardiola says he sees a "bright future" for his Manchester City side, despite Sunday's 2-0 defeat by Liverpool.

  In the midst of a wet, miserable Manchester day, when his team were put in their place by opponents who are on the verge of taking their crown, Pep Guardiola saw the brightness of a new Manchester City team emerge. While City were swept aside by Premier League leaders Liverpool, Guardiola saw enough in his side to be confident for the future. His team contained three players who have been with the club a matter of weeks, key men Erling Haaland and Rodri the most notable of five absentees, and with central defensive axis Ruben Dias limited to a 13-minute cameo off the bench as he strives for full fitness in his comeback from injury. The average age of Manchester City's starting XI in this game was 25 years and 68 days - their joint-youngest in a Premier League match under Guardiola. "I saw a bright future," he told BBC Sport. "These players are so young. "Other than Kevin [de Bruyne] and Nathan [Ake], they are the future of this club in the next years, with others who will come in future windows." Guardiola namechecked wide duo Savinho and Jeremy Doku. It is safe to assume England international Phil Foden is also part of that group. For others, like De Bruyne, central defender John Stones, midfielder Ilkay Gundogan and England winger Jack Grealish, who remained on the bench throughout, the future is less certain. City have a long-standing interest in Juventus full-back Andrea Cambiasso and over the past few days have been linked with Bayer Leverkusen's Germany midfielder Florian Wirtz. By the time Guardiola gets to the start of next season, his squad could look very different to the one that began this one.

