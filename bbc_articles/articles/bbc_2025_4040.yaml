title: 'Henry Pollock: England back row predicted try-scoring Test debut, says Tommy
  Freeman - BBC Sport'
date: '2025-03-17'
section: Rugby Union
url: http://www.bbc.co.uk/sport/rugby-union/articles/cly4e6971wjo
content: |-
  This video can not be played To play this video you need to enable JavaScript in your browser. Pollock, 20, scores two tries on England debut in Cardiff

  England debutant Henry Pollock predicted he would score his first Test try on the wing and even rehearsed his celebration the night before, says club-mate Tommy Freeman. Pollock, 20, came off the bench to score two late tries against Wales on Saturday - adding gloss to England's thumping 68-14 Six Nations win in Cardiff. The Northampton Saints back row became England men's youngest Six Nations try-scorer, beating Henry Arundell's previous record by 36 days, after latching on to George Ford's pass to open his account out wide. Pollock's meteoric rise - from winning the Under-20 World Cup with England last summer to breaking through at Northampton and making a Test debut - has come as no surprise to Saints team-mate Freeman. "He is unbelievable," said Freeman, who made history of his own by becoming the first England player to score a try in every game of a Six Nations campaign. "I don't want to big him up too much, but honestly, he brings energy like you have never seen before for a 20-year-old. "I remember my first game I was shaking in the corner, all nervous. But this guy, nothing fazes him. "I remember [Friday] night as well. He was in my room telling me he was going to get his first try on the wing - and then he gets it. "He was doing the try celebrations as well in the room, showed me what he was going to do. "But that is the type of guy he is, and fair play to him, he backs it up and he has got a big career ahead of him. "That kid is pretty, pretty special, and he will continue to be, I am sure."

  Twelve minutes after his first try, Pollock highlighted his Test credentials with another score, which also came from a Ford assist. After grounding the ball, BBC commentator Andrew Cotter said: "He will be here for a long time to come." Former England scrum-half Matt Dawson, meanwhile, says Pollock "over-delivered" on the pre-match hype surrounding him. "He scored two tries on debut, which is awesome, but it was so much more than that for me and it was so far beyond somewhere I thought he would be on debut in Cardiff," Dawson said. "I thought it was a bit of a risk to play him but it totally worked and he over-delivered on expectation." England scored 10 tries at the Principality Stadium to seal a record Six Nations win over Wales, but had to settle for a second-place finish after France beat Scotland to clinch the title.

