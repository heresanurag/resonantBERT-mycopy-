title: Waymo driverless cars wake residents with nighttime honking - BBC News
date: '2024-08-15'
section: General
url: http://www.bbc.co.uk/news/videos/c17gqverg99o
content: |-
  The robotaxis were stationed in a San Francisco parking lot when a feature to avoid crashes set off the noise.

  A San Francisco, California resident filmed the moment driverless vehicles stationed in a car park started honking in the middle of the night.

  Waymo, the robotaxi company, says the honking is the result of a feature to avoid crashes.

  The video shows about 30 vehicles in the car park with a few of them seemingly stuck in a minor traffic jam when the honking begins.

  The company said in a statement to the BBC’s US partner CBS that it has updated the software that causes the cars to honk "so our electric vehicles should keep the noise down for our neighbours moving forward".
