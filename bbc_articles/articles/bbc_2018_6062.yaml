id: bbc_2018_6062
title: 'Jamie Oliver: ''I don’t ban junk food at home'' - BBC News'
date: '2018-05-01'
section: General
url: http://www.bbc.co.uk/news/health-43960360
content: |-
  The celebrity chef says snacks like biscuits and chocolate are a "treat" in his house.

  Celebrity chefs Jamie Oliver and Hugh Fearnley-Whittingstall are giving evidence to MPs on Tuesday on the need to tackle childhood obesity.

  Mr Oliver told BBC Breakfast that he does not ban junk food in his home, but that it is only eaten by his children as a "treat".
