title: Party leaders cast their votes as millions head to polling stations - BBC News
date: '2024-07-05'
section: General
url: http://www.bbc.co.uk/news/videos/c147e90gy1xo
content: |-
  Millions are heading to polling stations across the UK.

  Party leaders have cast their votes as polls opened across the UK.

  Prime Minister Rishi Sunak voted in North Yorkshire, heading to the polling station with his wife Akshata Murty.

  Labour leader Keir Starmer and his wife Victoria voted in north London.

  Lib Dem leader Sir Ed Davey and his wife Emily voted in south-west London.

  Scottish First Minister and SNP leader John Swinney voted in central Scotland.

  Green Party co-leader Carla Denyer voted in the west of England.

  It's understood that Reform UK's Nigel Farage opted for a postal ballot.

  Polling places are open from 7am to 10pm, with results expected in the early hours of Friday.
