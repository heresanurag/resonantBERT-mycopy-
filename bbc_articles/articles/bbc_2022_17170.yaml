title: Snowman composer reversions classic with TikTok violinist - BBC News
date: '2022-12-24'
section: General
url: http://www.bbc.co.uk/news/entertainment-arts-64006536
content: |-
  Esther Abrami has worked with The Snowman composer Howard Blake on a new arrangement.

  It is forty years since The Snowman hit the small screen at Christmas, entrancing audiences with its animation and soundtrack.

  Composer Howard Blake had actually written the famous track Walking in the Air some years earlier as part of his recovery from what he describes as a near 'breakdown'. Now Blake has teamed up with TikTok violinist Esther Abrami and is releasing a new arrangement of the track.

  The BBC went to meet the pair.
