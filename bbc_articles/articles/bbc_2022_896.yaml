id: bbc_2022_896
title: 'Ashling Murphy: Thousands gather at Ireland and UK vigils - BBC News'
date: '2022-01-15'
section: Europe
url: http://www.bbc.co.uk/news/world-europe-60009376
content: |-
  People across Ireland and the UK gather in memory of Ashling Murphy who was killed on Wednesday.

  A vigil for Ms Murphy was held outside the London Irish Centre in Camden on Saturday afternoon

  More vigils are taking place across the island of Ireland and the United Kingdom in memory of murdered teacher Ashling Murphy.

  The 23-year-old was killed on the banks of the Grand Canal outside Tullamore, County Offaly, on Wednesday.

  Parkrun runners across Ireland held moments of silence on Saturday morning for Ms Murphy.

  RTÉ have reported that gardaí (Irish police) have identified a new person of interest who is currently in hospital.

  The Irish broadcaster said gardaí were waiting to speak to him.

  About 5,000 people attended a vigil and walk in Cork this morning

  Thousands of people attended vigils in Cork and Dublin on Saturday.

  In County Offaly two walks took place along the Grand Canal in her memory.

  On Friday, the police force said it had made "significant progress" in its investigation but were not releasing specific details due to operational reasons.

  They said the Murphy family was "appreciative and overwhelmed by the national outpouring of support show to them" .

  The family attended a candlelit vigil near the murder scene on Friday.

  Vigils are also due to take place in Edinburgh, Glasgow and Brisbane, Australia.

  Well wishers lit candles in memory of Ashling near the scene of her murder in Tullamore

  The Irish Independent reported that her father paid a poignant tribute to the talented young musician, by performing her favourite song.

  Ray Murphy reportedly broke down in tears while playing the final chords of "When You Were Sweet Sixteen".

  A 40-year-old man arrested after Ms Murphy's murder was released without charge on Thursday night "and is no longer a suspect", according to gardaí.

  His solicitor has said he is now in hiding after he was vilified on social media.

  Speaking to BBC News NI, Donal Farrelly said his client was escorted to the hotel by gardaí on Thursday night because of concerns about possible "retribution" from members of the public.

  The National Women's Council of Ireland had announced details of vigils at dozens of locations on Friday and many event attracted very large crowds.

  Many of the vigils began at 16:00 local time, organised to coincide with the time Ms Murphy was fatally attacked.

  Park runners at Orangefield Park in Belfast held a moments silence in memory of Ms Murphy on Saturday

  One of the biggest events took place outside the Oireachtas (Irish parliament) buildings in Dublin.

  Taoiseach (Irish Prime Minister) Micheál Martin was among those in attendance.

  Speaking on the Late, Late Show on RTÉ on Friday night Mr Martin said men needed to "listen more to women".

  "We need to listen to what women are saying to us," he added.

  "Men want to step up to plate here and make sure we can create a different kind of society where people do feel safe and transform the culture that underpins bad behaviour and violence towards women."

  A photo of Ms Murphy was displayed on the big screen at half-time during the Heineken Champions Cup in Galway on Saturday

  Across Northern Ireland on Friday, large crowds gathered and traditional Irish musicians performed in tribute to Ms Murphy who was a talented multi-instrumentalist and member of the National Folk Orchestra of Ireland.
