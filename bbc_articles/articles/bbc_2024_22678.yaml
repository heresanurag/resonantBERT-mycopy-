title: Mohamed Al Fayed was 'a monster enabled by' Harrods, says lawyer - BBC News
date: '2024-09-20'
section: London
url: http://www.bbc.co.uk/news/articles/c89lxz09jzjo
content: |-
  Lawyers representing victims say the store should "take responsibility" after sexual abuse allegations emerge.

  Fayed was 'a monster enabled by Harrods', says lawyer

  Late Harrods department store owner Mohamed Al Fayed has been accused of rape and sexual assault

  Mohamed Al Fayed, the former owner of Harrods, was a monster enabled by a system that pervaded the London store, a lawyer for his accusers has said. The late Harrods owner was described as a "sexual predator" who assaulted staff and threatened them over a 25-year-period, barristers representing dozens of women told a press conference in London on Friday. Dean Armstrong KC said it was time Harrods "took responsibility" after allegations against Fayed - including rape - were made in a BBC investigation this week. Harrods has said it is "utterly appalled" by the allegations and has condemned his actions "in the strongest terms".

  At the press conference around 20 survivors sat at the front, sometimes nodding in agreement, and often shaking their heads as they listened intently to what were at times grim and disturbing details of allegations against Fayed. Some were too afraid to come to the event. But Natacha, who has partially waived her anonymity, spoke about her time working for Fayed when she was 19, describing him as someone who "preyed on the most vulnerable". Natacha said Fayed subjected her to a forced kiss, made her sit on his lap so he could "explore" her body, and on one occasion forced himself on her in his private apartment. He threatened her, saying he knew where she and her family lived and that she would "never work in London again" if she spoke out. The news conference heard how many women who worked for him were subjected to intrusive medical tests, including full cervical smears and having their ovaries checked. They were either not told the results of those tests or suffered what was described as "degrading and humiliating comments" by Fayed about the test results. Natacha told reporters she believed the medical examinations were used to evaluate their sexual "purity".

  The news conference was told about claims of extensive surveillance within Harrods and of phone lines being bugged. Speaking after the news conference, one former Harrods employee who started working there when she was 22 told the BBC "many other people throughout the organisation" knew about Fayed's alleged behaviour. Kate - not her real name - said Fayed was an "absolute monster" and that he assaulted her a number of times. She said she was pressured into taking a trip to Paris with Fayed, where he made inappropriate comments and "put his hands on either side of my face and kissed me". The incident took place in the nightclub below the Ritz Paris hotel, which Fayed owned. Kate, who was in the audience at the conference, said of Fayed: "He would try and kiss me. He would try and give me money. "He would stuff money up my jumper and then hold his hand there when I tried to take it out." She described Fayed as a "casual menace". "He gave an air of being relaxed. But actually there was something very deliberate about him and the way he was," she said. Kate said she received "threats not to speak" about Fayed after she left her job at Harrods.

