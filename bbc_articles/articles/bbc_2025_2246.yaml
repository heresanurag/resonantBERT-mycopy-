title: Apple boss Tim Cook says DEI programmes may have to change - BBC News
date: '2025-02-26'
section: Business
url: http://www.bbc.co.uk/news/articles/clyjv8e49deo
content: |-
  His comments came as shareholders rejected a call for the firm to consider ending its diversity practices.

  Apple boss says its DEI programmes may change

  Apple boss Tim Cook has said his company may have to change its diversity practices as the US legal landscape shifts. His comments came just minutes after a majority of shareholders rejected a proposal calling on the tech giant to consider ending its diversity policies, such as the use of race and sex in hiring decisions. Apple had urged shareholders to vote against the measure, which the company had argued was "inappropriately" trying "to micromanage" its business. The scrutiny of the firm comes as US President Donald Trump has called for an end to diversity, equity and inclusion (DEI) programmes in the government and private sector, including at Apple.

  In a social media post, external the day after the meeting, Trump ramped up the pressure on the company. "Apple should get rid of DEI rules, not just make adjustments to them," he wrote in a all-capital-letters post. "DEI was a hoax that has been very bad for our country. DEI is gone!!!" Trump's DEI orders have run into legal roadblocks, but many companies in the US, including big names such as Meta, Amazon and Goldman Sachs, have already ended or rolled back their own policies, citing legal risks. Apple's decision to fight the shareholder proposal had bucked that tide. Shareholder measures opposed by companies rarely succeed, so the outcome of Tuesday's vote was expected. It marked the second high-profile defeat of shareholder proposal targeting DEI, after a similar rejection at retailer Costco. However, despite the vote, Mr Cook on Tuesday acknowledged that the firm may have to alter some of its practices. "As the legal landscape around this issue evolves, we may need to make some changes to comply, but our north star of dignity and respect for everyone and our work to that end will never waver," Mr Cook said during a question-and-answer session at the company's annual shareholder meeting. He noted that Apple did not use "quotas" for hiring - a practice that has come in for some of the fiercest criticism - while saying the firm's strength came from a culture where "people with diverse backgrounds and perspectives come together". "We'll continue to work together to create a culture of belonging where everyone can do their best work," he added, saying the company would remain "committed to the values that have always made us who we are".

  The proposal targeting Apple's DEI policies was backed by the National Center for Public Policy Research, a conservative think tank, which had also put forward the proposal at Costco. It argued that the existence of Apple's diversity and inclusion programmes exposed the firm to "litigation, reputational and financial risks", pointing to the wider corporate retreat and noting that recent lawsuits have made it easier for workers to sue over discrimination. Stefan Padfield of the organisation's Free Enterprise Project, who presented the proposal at Tuesday's meeting, said the risks to Apple had increased after the Trump administration recently ordered staff to investigate DEI in the private sector. "The vibe shift is clear," he said. "DEI is out and merit is in." Apple's decision to push back against the shareholder proposal, while simultaneously opening the door to changing its policy is an effort to satisfy both sides of the fight, said Angela Jackson, a senior advisor to the Project on Workforce at Harvard University and author of the forthcoming book, The Win-Win Workplace. But she warned that it left Apple "playing defence". She said she wanted to see the company lead by making a more robust business case for the programmes. "They've made the right moves. The one step they could go further... is to really say, 'Yes it's our values, we believe it's the right thing to do, but it's also an economic imperative."

  The fight over DEI in the US has raised questions about whether such policies in other countries will face similar challenges. Catherine Howarth, chief executive of the responsible investment charity ShareAction, said she thought that Apple - a global, consumer-facing firm - had made the bet that the benefits of pushing back against the shareholder proposal outweighed the risks. "It's not popular with consumers and it's not popular with employees to abandon what were supposedly your principles in this area until very recently," she said. "They think it would go down very badly - and it would - with their global consumer base." Shareholders also rejected proposals that would have required Apple to report about its AI privacy practices, charitable giving and policies to combat child sex abuse. They backed the board members supported by the company, as well as its executive compensation, including a pay package for Mr Cook worth more than $74m.
