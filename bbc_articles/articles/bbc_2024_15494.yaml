content: |-
  CCTV footages shows Woodward ramming into another motorist who tried to overtake him on the A55.

  A man has received a suspended prison sentence following an incident of road rage on the A55.

  Paul Woodward, of Melyd Avenue, Prestatyn recently appeared before Caernarfon Crown Court following the incident on the eastbound carriageway of Rhuallt Hill in September last year.

  CCTV footage shows Woodward, 55, who was driving a white Citroen Berlingo van, clipped the rear of a silver-coloured VW Golf causing it to spin on the carriageway.

  Woodward was sentenced to 15 months in prison, suspended for 18 months and was disqualified from driving for 18 months. He was ordered to carry out 20 days rehabilitation work,150 hours of unpaid work, and pay a statutory surcharge.
