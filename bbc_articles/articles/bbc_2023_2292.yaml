  The US vice-president says Putin is "badly mistaken" if he thinks he can "wait us out" on Ukraine.

  That's it from us for now

  My colleagues and I are pausing our coverage of the Munich Security Conference - but we'd urge you to check out our report on the day's action here. And head here for a writeup of Prime Minister Rishi Sunak's latest comments on future trade arrangements for Northern Ireland - something else he was asked about in Germany today. I've been joined by James Harness, Samuel Horti and Antoinette Radford - thanks for following along.
