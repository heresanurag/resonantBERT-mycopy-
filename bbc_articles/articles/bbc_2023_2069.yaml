  The BBC's security correspondent explains why the US is downing multiple unidentified flying objects.

  US officials are facing mounting pressure to explain why multiple unidentified flying objects flying over North America are being shot down.

  The BBC's security correspondent Gordon Corera explains what the latest is in this saga.
