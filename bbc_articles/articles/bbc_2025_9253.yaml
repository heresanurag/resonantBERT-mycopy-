  Police have not confirmed the number of deaths but said there were five people on board in total.

  Five killed after helicopters collide in Finland

  Two helicopters crashed close to the Eura Airfield in Eura, Finland

  Five people have died after two civilian helicopters collided mid-air in Finland, local police said. The helicopters crashed near Eura Airport at around 12:00 local time (10:00 GMT), after having taken off together from the Estonian capital of Tallinn. Authorities found the wreckage of the helicopters in a wooded area. Police say there were two people in one helicopter and three in the other. They were on their way to an aviation event at the Piikajärvi Flight Center in Kokemäki, local media reported.

  The aircraft were foreign-registered civilian helicopters. The crash is being investigated by police. Finnish and Estonian officials said they were working with each other into the probe.
