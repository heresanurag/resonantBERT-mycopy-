title: 'G20: Trump leaves Argentine leader in the lurch - BBC News'
date: '2018-12-02'
section: General
url: http://www.bbc.co.uk/news/world-46419926
content: |-
  The US president was expected to remain on stage for a G20 "family photo" but instead exited, stage left.

  President Donald Trump prematurely left the G20 stage following a handshake with President Macri of Argentina.

  The US leader was expected to remain on stage with the host for a G20 "family photo" but had other ideas.
