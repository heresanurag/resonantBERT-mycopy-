content: |-
  Emergency services are at the scene and say the vehicle has now been "safely evacuated".

  Six children rescued after bus crashes into ditch

  The bus went into the ditch near Wisbech in the Cambridgeshire Fens

  Six children have been rescued after a bus they were travelling in crashed into a water-filled ditch. Emergency crews were called to Leverington Common near Wisbech St Mary, Cambridgeshire, at about 17:15 GMT on Thursday. The school children were evacuated from the vehicle and were not thought to be injured, police said. The driver of the bus was taken to hospital as a precaution, they added. Eyewitness Laurence Manning said he helped the children off the bus after he heard them screaming.

  "We pulled each school kid out one by one and then we tended to the driver who was still in the cab," he said.

  This video can not be played To play this video you need to enable JavaScript in your browser. CCTV captured the moment the bus crashed into the ditch

  Mr Manning said he rang for the ambulance. "The roof was caved in. As we're in the bus we could hear creaks and cracks because it was sinking even more. "We had to check the bus several times, it was quite scary. "But when there are kids involved you just have to get them to safety. "Luckily everyone was all right - few injuries but nothing serious."

  Laurence Manning said he helped get the children out of the bus

  A neighbour, Katie-Leigh Julian, said she looked after the children once they had been rescued. "The experience was not nice at all when it comes down to anyone, but when it's children around and there's no parents around it is heart-breaking," she said. Cambridgeshire Police said emergency crews would remain at the scene, with surrounding roads expected to be closed "well into the evening". The fire service said its firefighters arrived at the scene to find a bus in a ditch and they assisted the driver from the vehicle.

  Emergency services were working into Thursday evening to investigate what happened and recover the vehicle

