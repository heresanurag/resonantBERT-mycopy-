id: bbc_2021_10584
title: 'Covid: Wales to move to alert level zero from Saturday - BBC News'
date: '2021-08-06'
section: Wales
url: http://www.bbc.co.uk/news/live/uk-wales-58103273
content: |-
  Wales' First Minister Mark Drakeford delivered a press briefing as most restrictions are set to end.

  Booster jabs could begin in Wales this month if advice from the Joint Committee on Vaccination and Immunisation is received early in August, the first minister said.

  Mark Drakeford said that if the advice came at the end of the month, the booster campaign would start in September.

  Plans for the campaign were "in from every health board in Wales", he said.

  The first minister told reporters the programme would focus on the most vulnerable people first.
