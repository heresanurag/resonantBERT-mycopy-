title: The Hema committee report slams Malayalam-language film industry - BBC News
date: '2024-08-24'
section: Asia
url: http://www.bbc.co.uk/news/articles/cgq24z8z817o
content: |-
  The Hema committee report reveals the deep rot in the Malayalam-language film industry.

  A landmark report into problems faced by women in the Malayalam-language film industry has revealed the deep rot in one of India’s most popular film hubs. The findings of the three-member panel are pretty damning. The 290-page report – parts of which have been redacted to hide identities of survivors and those accused of wrongdoing – says the industry is dominated by “a mafia of powerful men” and that “sexual harassment of women is rampant”. Headed by a former judge of the Kerala High Court and set up by the state government in 2017, the Hema committee details the abysmal working conditions on sets - including a lack of toilets and changing rooms for junior artists, no food and water for them, poor pay and no accommodation or transport facilities. “There are no toilets, so women have to go in the bushes or behind thick trees. During their periods, not being able to change their sanitary napkins for long hours and holding urine for long causes physical discomfort and makes them sick, in some cases needing hospitalisation,” it says. The report, which was submitted to the government in December 2019, was made public only this week after nearly five years of delay and multiple legal challenges by members of the film industry. The panel was set up in the aftermath of the horrific sexual assault on a leading actress in the film industry. Bhavana Menon, who has worked in more than 80 films in southern Indian languages and won a number of prestigious awards, was assaulted by a group of men while travelling from Thrissur to Kochi in February 2017. Her assault made headlines, especially after Dileep, one of the Malayalam-language film industry's biggest actors and Menon's co-star in half a dozen films, was named as an accused and charged with criminal conspiracy. He denied the charges, but was arrested and held in custody for three months before being released on bail. The case continues to be heard in court. Indian law bars identification of survivors of sexual assault, but it was known from the start that it was Ms Menon who had been assaulted. In 2022, she waived her anonymity in a post on Instagram and in an interview to the BBC.

  The Hema committee report was handed over to Kerala Chief Minister Pinarayi Vijayan in December 2019

  A few months after the attack on Ms Menon, Women in Cinema Collective (WCC) – a group formed by some of her colleagues in a film industry known for its variety of successful mainstream and critically acclaimed films - petitioned the government, seeking swift action in the case and also to address the problems faced by women in cinema. In the report, retired Justice K Hema says the WCC told her that “women are being silenced as the prestige of the film industry needs to be upheld”. The panel interviewed several dozen men and women, including artists, producers, directors, scriptwriters, cinematographers, hairstylists, makeup artists and costume designers, and “gathered evidence including video and audio clips and WhatsApp messages”. Describing sexual harassment as the “worst evil” women in cinema face, the report said the panellists saw evidence that “sexual harassment remains shockingly rampant” and that “it goes on unchecked and uncontrolled”. The industry “is controlled by a group of male actors, producers, distributors, exhibitors and directors who have gained enormous fame and wealth” and they were among the perpetrators, it added. “Men in industry make open demands for sex without any qualms as if it’s their birthright. Women are left with very little options but to oblige - or reject at the cost of their long awaited dream of pursuing cinema as their profession. “The experiences of many women are really shocking and of such gravity that they have not disclosed the details even to their close family members.” Many of the people the panel approached were initially reluctant to speak because “they were afraid they would lose their jobs”. “In the beginning, we found their fear strange but as our study progressed we realised it was well-founded. We are concerned about their and their close relatives' safety.” The report, the WCC says, has vindicated its stand. “For years, we have been saying that there is a systemic problem in the industry. Sexual harassment is just one of them. This report proves it,” Beena Paul, an award-winning editor and one of the founding members of the WCC, told the BBC. “We were always told that we were troublemakers [for raising such issues]. This report proves that it [the condition] is far worse than what even we thought,” she said.

  Women from the opposition Congress party have demanded action based on the Hema panel report

  Members of the WCC say they have faced difficulty in getting work since they began demanding better working conditions on film sets. “People don’t like the fact that we are asking questions. So, quite a few members have faced difficult situations,” Ms Paul says. The Association of Malayalam Movie Artists (AMMA), a top industry body which counts superstars like Mohanlal and Mamooty among its members, denied the accusations. Its general secretary Siddique disagreed that there was a small, powerful group that controlled the industry. He also denied that sexual harassment was rampant in the industry and said that most of the complaints they received were about the delay or a lack of payment for workers. He said conditions for women had improved on film sets in the past five years and all facilities were now available to them. In the week since its release, the report has created ripples in the state, with activists and prominent opposition leaders demanding action against those accused of wrongdoing. Chief Minister Pinarayi Vijayan said if any woman who testified before the committee came forward to file a complaint, the government would take action. "No matter how big they are, they will be brought before the law," he said. On Thursday, a public interest petition was filed in the Kerala High Court, seeking initiation of criminal proceedings against those accused in the report. The court ordered the government to submit a copy of the report and the judges said they would decide if criminal action needed to be taken once they had read it.

  Allegations of harassment and abuse in films are not new in India – in 2018, the #MeToo movement hit the country’s most popular film industry Bollywood after actress Tanushree Dutta accused veteran actor Nana Patekar of behaving inappropriately towards her on a film set in 2008. Patekar denied the allegations. Ms Dutta, who has since claimed that she has been denied work, described the Hema committee report as “useless”, adding that earlier reports about making workplaces safer for women had not helped. Parvathy Thiruvothu, an award-winning actress and a key member of the WCC, however, told Asianet news channel that she considered the release of the report "a victory". “It’s opened up a door for big changes within the industry,” she said. Jeo Baby, director of The Great Indian Kitchen, a critically-acclaimed film that examines the patriarchal structure within the family, told the BBC that while gender issues remain a concern, change is under way in the industry. “This is the right time to correct this. The film industry has to fight this together.” The report, which has made several recommendations to make the industry a safe place for women, says their inquiry and recommendations are not to find fault with any individual, but "an earnest attempt to ennoble a profession so that it becomes a viable career option for aspiring artists and technicians, both male and female". “Hopefully filmmaking will become so safe that parents can send their daughters and sons to the profession with the same confidence and sense of security as they send their children to an engineering firm or a college,” it adds.
