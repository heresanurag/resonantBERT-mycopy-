  • None Kyrgios retires with injury but says Wimbledon run has given him 'second wind' If we did not know it before, we do now. There is a new star of British tennis - and her name is Emma Raducanu. No-one was more shocked than Raducanu herself when she defeated Marketa Vondrousova on Thursday to reach the third round, saying she "felt like she was on holiday". Coached by Nigel Sears, Andy Murray's father-in-law, she was only handed a wildcard into the main draw late on after making her WTA Tour debut at Nottingham earlier in June. But just hours after Wimbledon heard British legend Andy Murray questioning his future after a third-round exit, it witnessed a new talent breaking through. And as Raducanu walked on to Court One, she could not help but display a wry smile, looking around at the crowd as she laid out her towel and bag. But she was not at all fazed by the thousands watching, holding break point in the very first game though missing out on the chance to take first blood. Wimbledon 2021: Raducanu rules, lockdown hair and awkward Zverev - day six best bits Cirstea - who played her first Wimbledon when her opponent was just five - broke Raducanu in the fourth game. The young Briton broke back immediately in what was the start of a run that will be long remembered. She went on to win eight successive games, sealing the first set in the process, and looked to be careering towards a dominant two-set win. But when Cirstea - who defeated two-time Grand Slam champion Victoria Azarenka in the previous round - broke back in the fifth game, it looked as though the nerves were starting to creep in. She held five break points in a near 15-minute game at 3-4 ahead, but it was a moment in the 12th game that perhaps sealed the match for her. A remarkable backhand winner, that caused her to drop her own racquet in disbelief, was the moment Cirstea's head dropped, and Raducanu - who hit 30 winners in all - went on to earn her place in the fourth round on her third match point. In reaching the last 16, she bumps her prize money up to £181,000 - considerably more than her total career earnings before Wimbledon of $39,558 (£28,762). Emma Raducanu fell to the ground in shock after clinching victory 'She was fearless from the beginning' She came out and she was fearless from the beginning. She hadn't won a WTA match until this Wimbledon. To me, she seems like an incredible competitor. She's able to rebound immediately. She's a smart court player, she has the defence, the offence, the even-keeled temperament. Cirstea has had a fabulous spring, and she beat Azarenka and was on a high herself. Raducanu seems to play with that right level of engagement, clarity of how she wants to play - that's a very mature match there. Even that last game - it was on her third match point and she stayed calm. Everybody is going to know who she is overnight. She wasn't gifted this match - she took this match. She is still going to be ranked outside the world 200. It's not going to be easy. We've talked about how wide open the tournament is. Tomljanovic hasn't been this deep in a Slam. If you can beat Cirstea... you can beat Tomljanovic.
