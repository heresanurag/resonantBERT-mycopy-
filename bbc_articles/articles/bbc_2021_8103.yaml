content: |-
  Emma Raducanu's dream debut run at Wimbledon continues into the fourth round with victory over Romania's world number 45 Sorana Cirstea.

  Last updated on .From the section Tennis

  Raducanu beats Cirstea to progress into fourth round - best shots Coverage: Live across BBC TV, radio and online with extensive coverage on BBC iPlayer, Red Button, Connected TVs and mobile app. Full details Emma Raducanu's dream debut run at Wimbledon continued into the fourth round with victory over Romania's world number 45 Sorana Cirstea. The 18-year-old British wildcard, ranked 338th and fresh from completing her A-Levels, impressed in a 6-3 7-5 win. Playing on a show court for the first time, she stunned 31-year-old Cirstea by taking eight games in a row. "I am so speechless right now," Raducanu said. "I didn't know what my reaction would be, and then that just happened. I'm so, so grateful for all the support I had today. "This is by far the biggest court I've played on. I think I coped quite well in the beginning, I just tried to hold my nerve. "When I was packing to come into the bubble, my parents said, 'Aren't you packing too much match kit?' I think I'm going to have to do some laundry tonight." Raducanu becomes the youngest British woman to reach the Wimbledon last 16 in the Open era, and will face Australia's Ajla Tomljanovic next.
