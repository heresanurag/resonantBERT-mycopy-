title: Musk calls Trump's tax bill a ‘disgusting abomination' - BBC News
date: '2025-06-03'
section: US & Canada
url: http://www.bbc.co.uk/news/articles/c0j76djzgpvo
content: |-
  Billionaire says the bill, which faces a key test in the Senate, undercuts efforts to slash federal spending.

  Musk urges Americans to tell lawmakers to 'kill the bill'

  Elon Musk's criticisms are reflective over wider tensions within the Republican Party over Trump's 'big, beautiful' bill.

  Elon Musk hit out at US President Donald Trump's signature tax and spending bill again on Wednesday, calling on Americans to tell their representatives in Washington to "kill the bill". The budget, which includes huge tax breaks and more defence spending, was passed by the House of Representatives last month and is now being considered by senators. The tech billionaire wrote on X earlier this week that the bill would add to the US budget deficit and saddle Americans with "crushing" debt. On Tuesday, he described it as a "disgusting abomination", in a widening rift between the two.

