title: Barbarians' Api Ratuniyarawa charged with sexual assault in Cardiff - BBC News
date: '2023-11-04'
section: Wales
url: http://www.bbc.co.uk/news/uk-wales-67319671
content: |-
  Fiji international Api Ratuniyarawa, 37, is charged with sexually assaulting three women in Cardiff.

  Api Ratuniyarawa was named in the Barbarians' squad for Saturday's game with Wales

  A Barbarians rugby player has been charged with sexual assault.

  Api Ratuniyarawa, 37, appeared before Cardiff magistrates on Saturday charged with sexual assault by penetration and sexual assault by touching.

  The court was told he denied sexually assaulting three women at Revolution bar in the city's Castle Street between October 31 and November 1.

  He had been named in the Barbarians' squad prior to Saturday's game against Wales in Cardiff.

  The Fiji international, from West Northamptonshire, spoke only to confirm his name during the hearing.

  Prosecutor Michael Evans told the court: "The three incidents happened independently of each other, with the women not known to each other or to the defendant before that night."

  Magistrate Peter Hamley subjected the London Irish forward to "stringent bail" conditions, including an electronic curfew between the hours of 19:00 and 07:00.

  He is also unable to enter Wales apart from for court proceedings, not allowed to contact any witnesses in the case and not allowed to enter any licensed premises.

  The case is expected to go before Cardiff Crown Court on 4 December.

  In a statement, Barbarian FC said: "As soon as we were contacted by South Wales Police we cooperated fully, assisting them with their enquiries.

  "On their advice we can't comment any further as the investigation is ongoing."
