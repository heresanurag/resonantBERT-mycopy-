title: Tower of London illuminated for Armistice tribute - BBC News
date: '2018-11-05'
section: General
url: http://www.bbc.co.uk/news/uk-46086225
content: |-
  About 10,000 flames will be lit every night this week to mark the centenary of the end of WWI.

  Around 10,000 flames have been lit at the Tower of London to mark the centenary of the end of World War I.

  The tribute, called Beyond The Deepening Shadow, will run each night until Armistice Day 2018.
