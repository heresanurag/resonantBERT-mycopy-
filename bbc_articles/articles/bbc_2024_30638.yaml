title: Palace investigates after Household staff incident - BBC News
date: '2024-12-13'
section: London
url: http://www.bbc.co.uk/news/articles/c0mv92l9720o
content: |-
  A Buckingham Palace employee was reportedly arrested after an unofficial Christmas party at a bar.

  Buckingham Palace has said "appropriate action" will be taken following reports that one of its Household staff was arrested after a Christmas party at a London bar. Police are said to have been called to a bar in Victoria, which is near the palace, at 21:21 GMT on Tuesday after reports that a customer had smashed glasses and attempted to assault a member of staff. A 24-year-old woman was arrested on suspicion of common assault, criminal damage, and being drunk and disorderly. A spokesperson for the Palace said it was aware of an incident involving staff members outside the workplace and that the "facts will be fully investigated".

  The incident unfolded at a pre-arranged event attended up to 50 members of staff at a branch of All Bar One, the Sun reported, external. The woman was reportedly given a penalty notice for disorder after being taken into custody and held until the following day. The spokesperson confirmed that staff had been at a reception at the palace that evening, but stressed that the incident had occurred at an unofficial gathering elsewhere. In a statement, the Metropolitan Police said: "At 21.21hrs on Tuesday, December 10 officers were called to a bar in Victoria Street, SW1, following reports that a customer had smashed glasses and attempted to assault a member of staff. "Officers attended and arrested a 24-year-old woman on suspicion of common assault, criminal damage and being drunk and disorderly. "She was taken into custody and released the following evening having been given a penalty notice for disorder." A Palace spokesperson told the BBC: "We are aware of an incident outside the workplace involving a number of Household staff who had previously attended an early evening reception at the Palace. "While this was an informal social gathering, not an official Palace Christmas party, the facts will be fully investigated, with a robust disciplinary process followed in relation to individual staff and appropriate action taken." The BBC has approached the Metropolitan Police for comment.
