title: Europe hopes for Trump tariffs deal but prepares for the worst - BBC News
date: '2025-04-03'
section: World
url: http://www.bbc.co.uk/news/articles/c15v4j3dqk5o
content: |-
  The EU's message is that it is ready to negotiate with the US but at the same time poised to hit back too.

  Europe hopes for Trump tariffs deal but prepares for the worst

  European Commission President Ursula von der Leyen has already laid out initial countermeasures

  Europe's leaders had been preparing for "Trump's trade war" - but the reality of a 20% blanket US tariff still came as a shock. "This decision is a catastrophe for the economic world," said French Prime Minister François Bayrou. "The consequences will be dire for millions of people around the globe," said the EU's Commission chief Ursula von der Leyen, who was on a trip to Central Asia. The message from the EU, which has the task of responding on behalf of its 27 member states, is that Europe is ready to negotiate with the US but at the same time poised to hit back too.

  EU Trade Commissioner Maros Sefcovic aims to talk tariffs with his US counterparts on Friday. "We'll act in a calm, carefully phased, unified way, as we calibrate our response, while allowing adequate time for talks," he said. For every European country, President Donald Trump's tariffs will be a severe blow, and national governments have been trying to allay the fears of industry and commerce. Italy's Giorgia Meloni – who until Wednesday seemed more reluctant than others to retaliate in kind against the US – cleared her diary and hastily summoned ministers and business leaders to an emergency summit. Italy exports €8bn (£6.7bn) worth of agrifood products and €2bn worth of wine to the US, Alessandro Apolito of the country's main farmers' organisation Coldiretti told the BBC. Aside from economic losses, he says there is a risk that US consumers will turn to imitations, capturing market share that would otherwise go to authentic Italian products. In Spain, Prime Minister Pedro Sánchez rejected Trump's claim that the EU was imposing 39% tariffs on US goods, insisting in reality it was just 3%. "It's just an excuse to punish countries and implement sterile protectionism. The trade war will affect everyone, but it'll hit the one imposing it most of all," he warned.

  The Spanish Chamber of Commerce fears a 14% cut in exports to the US, especially in machinery and electrical equipment. Sánchez has announced a €14.1bn response plan to help business with finance and look for new markets beyond the US. Slovakia is more exposed than most EU countries, because of its heavy reliance on industrial exports, and some economists are warning of a deep fall in economic output of at least 2.5% in just two years. Poland's Prime Minister Donald Tusk warned of a potential 0.4% fall in its economic output this year. Even before Trump's announcement, the French government had revised down expected growth this year to 0.7%.
