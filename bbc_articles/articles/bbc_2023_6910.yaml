title: 'Newport: Man arrested after woman, 44, found dead - BBC News'
date: '2023-05-14'
section: Wales
url: http://www.bbc.co.uk/news/uk-wales-65584512
content: |-
  A 25-year-old man is arrested on suspicion of murder after the discovery of a woman's body.

  Police at the scene in Sandalwood Court, Newport, on Sunday

  A man has been arrested on suspicion of murder after a 44-year-old woman was found dead.

  Emergency services were called to an address in Sandalwood Court, Newport at 11:30 BST on Friday, and officers remained there on Sunday.

  Gwent Police said the woman was confirmed dead at the scene and her family were being supported.

  A 25-year-old man from Newport was arrested on suspicion of murder and remains in police custody.

  Officers are not looking for anyone else in connection with the death.

  Det Ch Insp Virginia Davies said: "Officers will be making further inquiries at this time and will remain at the scene as the investigation progresses.

  Residents have been asked not to be concerned by police activity in the area

  "It is possible that you may see ongoing police activity in Newport as part of this work, but please do not be alarmed.

  "If you have concerns or information then please do stop and talk with us."

  Police encouraged anyone with information to make contact with them.

  The force said it would be making a referral to the Independent Office for Police Conduct (IOPC) "in line with standard procedures".
