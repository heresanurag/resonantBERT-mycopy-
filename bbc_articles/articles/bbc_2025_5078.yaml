title: HMP Kirkham prison governor 'had fling with Breaking Bad dealer' - BBC News
date: '2025-03-27'
section: England
url: http://www.bbc.co.uk/news/articles/cj4nrk2ql7ko
content: |-
  Criminal Anthony Saunderson used the name Jesse Pinkman, a drug dealer in the TV show, a court hears.

  A prison governor was in a relationship with the boss of a drug-dealing gang who went by the name of a character from hit US crime drama Breaking Bad, a court has heard. Kerri Pegg, 42, was given a £12,000 Mercedes by Anthony Saunderson, who in secret chats with other criminals used the name Jesse Pinkman, after a leading character in the TV show. Ms Pegg had been a "rising star" in the Prison Service, climbing the career ladder from graduate entrant to prison governor in six years, Preston Crown Court was told. But it was alleged that while she was a governor at HMP Kirkham, she became too close to Saunderson and signed off his temporary release without proper authority.

  After Saunderson had served his sentence, detectives found size 10 Hugo Boss flip-flops and a toothbrush, both with his DNA on, at Ms Pegg's home in Orrell, Wigan. Ms Pegg is alleged to have been given the black Mercedes coupe after he paid for the vehicle using 34kg of amphetamines, jurors heard. The defendant denies two counts of misconduct in a public office, one by having a relationship with Saunderson and the second by failing to disclose county court judgments about her debts. She also denies one count of possessing criminal property, the Mercedes car, from Saunderson.

  Saunderson was released from prison in May 2019, and in early 2020 was using an Encrochat encrypted mobile phone, used by serious, organised criminals to send messages and secretly communicate, the court heard. When the system was cracked, it showed Saunderson, under the name Jesse Pinkman, was involved in massive drug trafficking. He has since been convicted for those offences. Other messages on the phone revealed the "ongoing nature" of his relationship with Ms Pegg, the court heard. Retired detective constable Kevin Byrne, of the National Crime Agency, told the court Ms Pegg had been arrested at her home on 11 February 2021. Mr Byrne said North Wales Police had told him that Saunderson agreed to pay 36kg of amphetamines for the Mercedes car, but at the handover only provided 34kg. The witness added: "Mr Saunderson had to go and pay the difference in cash. North Wales Police told us that was what took place."

  Ms Pegg's financial and bank records were also checked and there were no records relating to payments for the Mercedes, Mr Byrne said. Both Saunderson and Ms Pegg used "burner" phones to keep in touch but Mr Byrne said there had been 80 calls and texts from his phone to hers in the space of a month and no contact the other way. The only other numbers dialled on Saunderson's phone were to "prostitutes and escorts", Mr Byrne said. Simon Billington, then the head of offender management, worked with Ms Pegg at HMP Kirkham and she "shadowed" him for a time. Mr Billington said: "Kerri became very involved in Mr Saunderson's release on temporary licence plan. "The relationship between Mr Saunderson and Miss Pegg just created problems for me. "It was unnecessary. It was not following policy."

