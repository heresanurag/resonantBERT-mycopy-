  How much do you know about England's World Cup squad?

  The 23 footballers who've been chosen by England manager Gareth Southgate to represent their nation in Russia all share the same goal - they want to win the World Cup for their country for the first time in more than half a century.

  But how much do you know about these gifted Premier League stars?

  Like the players themselves, as they strive to thrive on the biggest stage in world football, it's time to put yourself to the test.
