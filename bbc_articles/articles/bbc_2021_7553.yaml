title: Dalian Atkinson's family 'hugely relieved' at verdict - BBC News
date: '2021-06-23'
section: General
url: http://www.bbc.co.uk/news/uk-england-shropshire-57585457
content: |-
  The family said Mr Atkinson needed medical help in Telford in 2016 but instead he received violence.

  Dalian Atkinson's family said they are hugely relieved a police officer has been found guilty of manslaughter.

  The former Aston Villa striker died after a stand-off with West Mercia police officers outside his father's home in Telford, Shropshire in 2016.

  Mr Atkinson's family said they had been "sickened" to hear PC Benjamin Monk of West Mercia Police try to defend his actions.

  They said Mr Atkinson needed medical help but instead he received violence.
