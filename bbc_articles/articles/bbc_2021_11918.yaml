title: Afghan Special Forces commander faced race against time to flee - BBC News
date: '2021-09-09'
section: General
url: http://www.bbc.co.uk/news/world-asia-58490568
content: |-
  An Afghan Special Forces commander says he owes his life to members of the Parachute Regiment who helped him escape.

  There’s growing concern about the fate of hundreds of Afghan Special Forces who were trained by the British military and who’ve been left behind after the Kabul airlift ended last month.

  Joya is one of the lucky soldiers who managed to escape in time.

  He served in the Afghan Special Forces for almost twenty years, reaching the rank of Lieutenant colonel shortly before the Taliban gained control of Kabul.

  Travelling on foot to the capital in a race against time, members of the Parachute Regiment he served alongside managed to coordinate his rescue.
