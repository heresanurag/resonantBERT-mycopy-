title: World pays tribute to George Bush Senior - BBC News
date: '2018-12-01'
section: US & Canada
url: http://www.bbc.co.uk/news/live/world-us-canada-46410383
content: |-
  The family of the 41st US President call him "a man of the highest character" after he dies aged 94.

  That's it for now - thanks for staying with us!

  The world has been paying tribute to the 41st US President George HW Bush, who died late on Friday aged 94.

  Details of his funeral are yet to be announced - you can get all the latest updates on this and other stories on the BBC News website.
