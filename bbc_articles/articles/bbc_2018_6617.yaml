title: Home Secretary Sajid Javid reveals moped mugging - BBC News
date: '2018-06-17'
section: UK
url: http://www.bbc.co.uk/news/uk-44510120
content: "Sajid Javid says moped thieves snatched his phone outside Euston station\
  \ in north London.\n\nHome Secretary Sajid Javid has revealed he was a victim of\
  \ a moped mugging in north London.\n\nIn a Sun on Sunday interview, Mr Javid said\
  \ he reached for his phone to call a taxi outside Euston station when the thieves\
  \ rode on to the pavement.\n\nThey grabbed his phone and zoomed off, he said, which\
  \ left him \"angry and upset\".\n\nHe said he is now working on a review to give\
  \ police more power to pursue moped thieves.\n\n\"Before I knew what was happening,\
  \ it (the phone) had gone,\" said Mr Javid, who was appointed home secretary in\
  \ April, becoming responsible for the UK's policing and security.\n\nSpeaking of\
  \ the incident, which happened a couple of years ago, he said: \"I was angry and\
  \ upset but thought myself lucky not to have been stabbed or beaten up like many\
  \ other victims who fall prey to these vicious criminals.\"\n\nHis revelation comes\
  \ days after comedian Michael McIntyre was robbed by men on a moped in north-west\
  \ London.\n\nThis video can not be played To play this video you need to enable\
  \ JavaScript in your browser. Stories of moped crime from victims and police\n\n\
  Home Office proposals announced last month aim to give police drivers more legal\
  \ protection and aim to smash the \"myth\" that officers cannot pursue riders who\
  \ are not wearing helmets.\n\nIt followed concerns among officers that they risk\
  \ prosecution for careless or dangerous driving if they chase criminals at high\
  \ speed, particularly those on mopeds and motorcycles.\n\nMr Javid told the newspaper:\
  \ \"It's ridiculous. Police should be allowed to get on with the job.\n\n\"If someone\
  \ commits a crime and police want to pursue them, they should have much more freedom\
  \ to.\"\n\nUse our tool to see how badly your neighbourhood is affected (London\
