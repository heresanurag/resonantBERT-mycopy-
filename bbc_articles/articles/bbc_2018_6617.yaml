  \ most dangerous road since 2012) Since 2012, by far the most common type of crime\
  \ has been theft and handling with 30,387 offences - around three quarters of the\
  \ total:\n\nIf you cannot view the postcode search, please click here to reload\
  \ the page.\n\nThe number of offences carried out by criminals using mopeds in London\
  \ has increased from 827 offences in 2012 to more than 23,000 last year.\n\nData\
  \ obtained by the BBC showed during that period, more than 40% of such offences\
  \ happened in just two boroughs, Islington and in Camden - where Mr Javid was mugged.\n\
