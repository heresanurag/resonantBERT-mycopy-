title: Under cover of war, extremists are seizing Palestinian land – they hope permanently
  - BBC News
date: '2024-08-27'
section: BBC InDepth
url: http://www.bbc.co.uk/news/articles/c624qr3mqrzo
content: |-
  Israeli extremists are working to make settlements in the West Bank irreversible, analysts fear.

  Last week, Israel’s domestic intelligence chief Ronen Bar wrote to ministers warning that Jewish extremists in the West Bank were carrying out acts of “terror” against Palestinians and causing “indescribable damage” to the country.

  Since the start of the war in Gaza, there has been an acceleration in settlement growth in the occupied West Bank.

  Extremists in Israel’s government boast that these changes will prevent an independent Palestinian state from ever being created.

  There are fears, too, that they seek to prolong the war in Gaza to suit their goals.

  Yonatan Mizrahi from Peace Now, an Israeli organisation that monitors settlement growth, believes a “mix of rage and fear” in Israeli society after the 7 October attacks, in which 1,200 people were killed, is driving settlers to seize more land, with fewer people questioning them.

  A June survey , externalby the Pew Research Center suggested that 40% of Israelis believed settlements made the country safer, up from 27% in 2013. Meanwhile, 35% of people polled said that the settlements hurt Israel’s security, down from 42%.

  Mr Mizrahi worries that Jewish extremists in the West Bank are exacerbating an already tense and volatile situation, making it harder than ever to end the Israel-Palestinian conflict. “I think it’s extremely dangerous,” he says. “It’s increasing the hate on both sides.”

  Since the outbreak of the war, settler violence against Palestinian civilians in the West Bank has surged.

  It had already been on the rise, but in the past 10 months the UN has documented, external around 1,270 attacks, compared with, external 856 in all of 2022.

  According to the Israeli human rights organisation B’Tselem, during the same period Israeli settler harassment has forced Palestinians out of at least 18 villages, external in the West Bank, the Palestinian territory between Israel and Jordan that was captured by Israel in the 1967 Middle East war and has been occupied ever since.

  Between 7 October and August 2024, 589 Palestinians were killed in the West Bank – at least 570 by Israeli forces and at least 11 by settlers, according to the UN, external. They include some said to have been planning attacks as well as unarmed civilians. In the same period, Palestinians killed five settlers and nine members of Israel’s security forces.

  This week, a Palestinian man aged 40 was reportedly shot dead after settlers and Israeli soldiers entered Wadi al-Rahhel, near Bethlehem. The Israeli military said stones had previously been thrown at an Israeli vehicle nearby.

  Last month, a 22-year-old Palestinian man was killed when dozens of settlers rampaged through the village of Jit, prompting international condemnation. Israeli security forces have made four arrests and have described the incident as a “severe terror event”.

  But the track record in such cases is one of virtual impunity. Israeli civil rights group Yesh Din found that, external, between 2005 and 2023, just 3% of official investigations into settler violence ended in a conviction.

  In the letter by Ronen Bar, which was leaked to Israeli media, the head of Israel’s Shin Bet security service said that radical settlers were emboldened by light-handed law enforcement.
