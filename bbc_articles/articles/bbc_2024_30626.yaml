title: Bolivian shamans refuse to leave shacks on deadly cliff edge - BBC News
date: '2024-12-13'
section: General
url: http://www.bbc.co.uk/news/videos/c20nzepj6kro
content: |-
  Locals call the shacks "suicide homes" with authorities planning a forced evacuation if necessary.

  Aymara shamans, or amautas, in Bolivia are refusing to leave their homes in El Alto despite being just feet away from a deadly drop.

  Locals call the shacks on the edge of a cliff "suicide homes" for the high risk that the inhabitants take.

  The structures are becoming increasingly unstable due to heavy rains and the impacts of global warming.

  The city authorities have warned residents about the eroding cliff and are planning a forced evacuation if necessary.
