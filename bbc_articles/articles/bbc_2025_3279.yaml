  • None Approximately $100m in crypto was stolen in an attack on Atomic Wallet in 2023 In 2020, the US added North Koreans accused of being part of the Lazarus Group to its Cyber Most Wanted list. But the chances of the individuals ever being arrested are extremely slim unless they leave their country.
