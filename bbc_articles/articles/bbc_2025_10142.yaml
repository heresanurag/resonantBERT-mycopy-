title: Ed Sheeran thrills with surprise set at Radio 1's Big Weekend - BBC News
date: '2025-05-24'
section: Newsbeat
url: http://www.bbc.co.uk/news/articles/cpvk017zk0no
content: |-
  The Shape of You hitmaker played in a packed out New Music Tent at Sefton Park, Liverpool.

  The Shape of You star performed on the New Music Stage on Saturday afternoon in Liverpool. Sheeran said he chose that stage because he'd "never played it before" and he felt the tent has "the best energy". But there was disappointment for some fans with access having to be "temporarily paused" after reaching maximum capacity.

  Earlier, rumours of a "big name" guest circulated around Sefton Park, with Radio 1 then posting on their Instagram that it was "the one and only" Ed Sheeran. Sheeran last played at Big Weekend in Coventry in 2022, with this being his fifth performance at the festival. He is about to start a European and UK tour, supported by Stargazing singer Myles Smith.

  Ellie, David and George squeezed into the New Music tent

  Fans who crammed into the tent included Ellie, David and George, who described Sheeran as "the biggest artist in the world". "It's a mental pull - the fact they managed to get him for a secret set," David says, adding it's "amazing what he does musically". But some festivalgoers felt he should have been on the bigger Main Stage, where more people could have seen him. Friends Scarlett and Kate were shut out after the area reached capacity. "I messaged my mum when it got announced," Kate tells Newsbeat. "Her and my sister were so jealous, and I was like, 'I'll send you videos!', but I'm not going to be able to."

  Kate and Scarlett were disappointed they didn't get to see Ed Sheeran

  More than 100,000 fans are expected to attend Big Weekend in Liverpool, which will have about 100 acts performing across four stages. The rest of the weekend will see Sam Fender headline on Saturday evening and Mumford & Sons on Sunday. Tate McRae, Lola Young, Jorja Smith, Wet Leg and HAIM will also be hitting the Main Stage on the final day of the festival.

