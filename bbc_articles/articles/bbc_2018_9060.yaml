title: Excited Croatia fans throw beer over BBC reporter - BBC News
date: '2018-07-16'
section: General
url: http://www.bbc.co.uk/news/world-europe-44853213
content: |-
  Excited crowds of Croatian football fans in Zagreb give BBC reporter Gavin Lee a beer shower following their best ever performance at a World Cup.
