title: Southwold Sausage Dog Walk waiting for record confirmation - BBC News
date: '2024-10-07'
section: General
url: http://www.bbc.co.uk/news/uk-england-suffolk-63203702
content: |-
  A gathering dedicated to the breed waits for a call from Guinness to confirm if a record was set.

  Thousands of dachshunds took part in a walk along the coast in what organisers hope could be a world record.

  A total of 2,238 were counted at the Southwold Sausage Dog Walk in Suffolk on Sunday, which would be the largest ever single-breed dog walk, if verified.

  The title is currently held by a walk in Cheshire in 2018 involving 1,029 beagles, external.

  Organiser Laura Baggott said: "It went better than expected. We have had 10 walks since 2017 and this was our biggest and best event yet."
