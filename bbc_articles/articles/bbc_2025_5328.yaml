content: |-
  Will Stuart's Test career seemed in jeopardy after a tough summer, but he has bounced back as one of the major plus points of England's Six Nations

  Will Stuart has started England's last nine games and played 70 minutes in the win over Scotland last time out

  Coverage: Live audio commentary via the BBC Sport website and app

  Will Stuart knows his history. Away from the pitch, the England prop has just finished reading Tom Holland's Rubicon, a book on power and plotting in the Roman Empire. Beneath that on the bedside table is a biography of military genius Napoleon Bonaparte. In Stuart's earphones has been a podcast detailing the brutality of the Eastern Front in World War Two. Professionally, though he has been stewing over more recent events. Eight months ago, Stuart was forced into his own retreat, coming under severe scrum pressure in two summer Tests in New Zealand. Coach Steve Borthwick publicly admitted he was looking for reinforcements in Stuart's tight-head prop position. The 28-year-old was duly left off the list for the first set of central contracts in October. His job security wasn't helped by a trio of front-row tyros – Afolabi Fasogbon, Billy Sela and Asher Opoku Fordjour – emerging out of England's Under-20 Rugby World Cup success either.

  "In the summer I knew I hadn't done myself any kind of justice, that I hadn't put my hand forward," Stuart tells BBC Sport. "There were open and honest conversations and I was under no illusion that performance-wise I had a lot of work to do. "I just needed to get my head down, fly into club games, get better and try to cement myself more as a starting tight-head." In typically understated fashion, he has done just that. His club side Bath are well clear at the top of the Premiership, while he took on the southern-hemisphere's finest at the set-piece in the autumn and held his own. And, so far in the Six Nations, he has been one of England's big plus points. Stuart and his front-row colleagues are in profit in the tournament, winning five scrum penalties and conceded three across their face-offs with Ireland, France and Scotland - a stat few would have predicted after their struggles in New Zealand. "We have taken a step forward from last summer," he adds. "We came into the autumn, we were very clean, good on our own ball, we were trying to be square and rock solid. "Now there is a big onus on trying to take another step forward - to being dominant." Stuart has been helped by the lingering effects of a 2022 elbow dislocation finally dissipating. But that scrum supremacy is also closer thanks to a more collaborative approach in training.

