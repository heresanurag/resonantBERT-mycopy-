  Musk's companies including SpaceX, its subsidiary Starlink and Tesla do a huge amount of business with the US government. SpaceX alone has been awarded $20.9bn (£16.3 billion) in US government contracts since 2008, according to analysis by BBC Verify. Trump realises this gives him leverage over the world's richest man. He posted on Truth Social on Thursday: "The easiest way to save money in our Budget, Billions and Billions of Dollars, is to terminate Elon's Governmental Subsidies and Contracts. I was always surprised that Biden didn't do it!" Musk threatened to retaliate by decommissioning SpaceX's Dragon, which ferries astronauts and supplies to the International Space Station. But he later backed down from that threat. In practice, cancelling or withdrawing from government contracts would be a complicated and lengthy legal process, and for now and some time to come, the US government is likely to continue to do a significant amount of business with Musk's companies. No other company other than SpaceX can make Dragon and Falcon 9 rockets, and Nasa has committed to a number of space station and moon missions using SpaceX craft. Despite those commercial partnerships, Musk and his companies also face investigations from a number of government agencies – more than 30, according to a February report by the New York Times – and regulatory issues such as approval for Tesla's proposed driverless taxis.

  When Musk was given the task of setting up the cost-cutting Department of Government Efficiency (Doge) as one of Trump's key drivers of change inside the US federal government, he was given broad scope to choose his own staff. According to leaked lists of Doge employees, many of them previously worked for Musk's companies. And even though Musk left Doge a week ago, many of the staff remain in their government jobs. Some Doge employees also have deep ties to the Trump camp. Katie Miller - who worked in Trump's first administration and is married to the current White House Deputy Chief of Staff Stephen Miller - was Doge's spokesperson. However, CNN reported that Mrs Miller also left the government last week and is now working "full time" for Musk. There are others in the Trump administration whose loyalties may be tested by the feud. David Sacks, who Trump named as his top advisor on artificial intelligence and cryptocurrency, is close to Musk, having worked with the tycoon decades ago at PayPal. On X, many Silicon Valley executives along with Maga-world influencers were picking sides and parsing each of the back-and-forth messages posted by the president and the world's richest man. Polling firm YouGov carried out a snap survey on Thursday, external asking people who they would side with. The results indicated 70% of Republican respondents said Trump, compared to less than 1 in 10 who chose Musk.
