title: US-Russian SpaceX crew successfully enter the ISS - watch live - BBC News
date: '2024-03-05'
section: Science & Environment
url: http://www.bbc.co.uk/news/live/science-environment-68473404
content: |-
  A SpaceX capsule carrying three US astronauts and one Russian cosmonaut has arrived at the International Space Station.

  We're now hearing from Libby Jackson from the UK Space Agency.

  It's like "friends coming to visit, coming to stay", Jackson says about the SpaceX capsule crew being greeted by the seven-person team already at the International Space Station (ISS).

  Quote Message: The two crews will know each other; they will have trained together back on earth." from Libby Jackson UK Space Agency chief The two crews will know each other; they will have trained together back on earth."

  Speaking to the BBC about how long it takes for someone to acclimatise to living at the space station, Jackson says it can take about two weeks for the body to get used to it.

  "The blood we have in our feet pulls up, the heart adjusts, the bones and the muscles get weaker, our balance system in our ears equalise, and it can take a couple of weeks to get used to the feeling," she says.

  Jackson says those adjustments to the body, and the unique conditions of living in space, mean the experiences of astronauts are really useful for helping us to understand how our bodies age.
