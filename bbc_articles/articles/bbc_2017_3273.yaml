title: Ex-football coach faces sex abuse charges - BBC News
date: '2017-03-07'
section: UK
url: http://www.bbc.co.uk/news/uk-39197916
content: |-
  Barry Bennell, who worked at Crewe in the 1980s and 1990s, faces eight more charges relating to boys.

  Former football coach Barry Bennell has been charged with eight more counts of historical child sexual abuse.

  The 63-year-old ex-youth coach at Crewe Alexandra faces allegations relating to two boys between 1980 and 1987.

  The Crown Prosecution Service said the charges followed an investigation by Cheshire Police.

  Mr Bennell, who also had links to Manchester City and Stoke City, will appear at South Cheshire Magistrates' Court on 13 March.

  He is accused of two counts of indecent assault on a boy aged under 14, indecent assault on a boy aged under 16, and five other offences.

  Mr Bennell previously appeared in court in January charged with eight separate offences of sexual assault against a boy aged under 16, between 1981 and 1986.

  He pleaded not guilty at Chester Crown Court and was remanded in custody until a further hearing on 20 March.
