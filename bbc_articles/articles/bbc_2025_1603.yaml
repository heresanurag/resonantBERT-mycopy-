  Jones wasn't getting carried away. A hat-trick, sure, but Ireland are up next and if any team is capable of taking the smile off a Scottish player's face it's the Irish. Ireland have won 10 in a row against Scotland. Last year in Dublin, Gregor Townsend's side were defensively sound but it was still a two-score game before Jones scored late. The visitors never looked like winning. In the three meetings before that, the contest was as good as over in minutes 40, 62 and 60. "We've wanted this one for a long time and never quite get it," said Jones of the holy grail of a win over Ireland. "It's a huge challenge for us. "It's the big match temperament, isn't it? That's what we need to find within this squad. We've sort of had it in games but never strung it together. "I feel like I say the same thing every year."

  This video can not be played To play this video you need to enable JavaScript in your browser. 'That was terrible!' - Six Nations captains take on reactions challenge

  Scotland competed well in Dublin last year, but the main feature of their day was dogged defence of their own line rather than anything they did in attack. They also gifted Ireland seven points early from a botched lineout. Go back over the 10 losses and you'll find multiple examples of awful Scottish errors costing them. "Last year was one of our best performances in Ireland and it was a close game," Jone added. "But, again, one of those we didn't quite take our chances. "This is the one we want. They've had our number for years now. "It's time to front up and have a really special performance. You don't want to say anything that is going to come back to bite you, but I think we have an inner belief. "But we've said that before and not been on the right side of the results." Familiar words that Jones says he's tired of uttering. Sunday is an opportunity to ensure that he never has to utter them again.
