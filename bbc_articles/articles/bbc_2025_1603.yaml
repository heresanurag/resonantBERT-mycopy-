content: |-
  Scotland emerged from a nervy Six Nations opener with Italy with full points and plenty to feel good about, writes Tom English.

  This video can not be played To play this video you need to enable JavaScript in your browser.

  In the bowels of Murrayfield on Saturday, Jonny Gray spoke after appearing in his first international rugby match in almost two years. Gray is not the most gregarious member of this Scotland squad. He's not a natural performer in front of the cameras. But he's honest and likeable and, most importantly, he's back. When he started to talk after the victory over Italy, his words had a power of their own. Once the mainstay of the Scotland pack, he has had a miserable time with injury. From the day in late April 2023 when he blew out his knee playing for Exeter, to early September 2024 when he turned out for his new club, Bordeaux, Gray played no rugby. He wanted to make himself available for the November Tests but just didn't feel like his body was ready. Then he got injured again. No action in the six weeks leading up to Saturday, he wondered what the day held for him. We saw Gray out there on the pitch and we heard from him afterwards, but what we knew nothing about was the anguish he'd gone through in all those months. How difficult was that time? Very, he said. Did he ever doubt that he'd play for Scotland again? Yes, he did. How special was Saturday? He spoke of his two young sons who were in the stand, the first time the pair of them were there to see their father play for his country. Emotional? Just a bit. And it was lovely. You didn't really need to hear his words to know what it meant to him, it was written on his face as he thanked the people who stood by him and believed in him.

  On a fairly turbulent day for Scotland, Gray was one of the feelgood stories. Huw Jones was man of the match which was fair enough given his hat-trick, but you could have just as easily given it to Rory Darge, whose work-rate and influence was massive, or Zander Fagerson, who has Test Lion written on him from top to toe. The gnarled old props of Scotland would have voted for Fagerson en bloc, no debate. The Peter Wrights would acknowledge Jones' treble while pointing you in the direction of the hard men who created the platform in the first place. Fagerson scrummaged well, carried 16 times - only Blair Kinghhorn carried more, but he wasn't always carrying in the heaviest of traffic like Fagerson - and made 69 metres with ball in hand. That's kinda mad. There were four Scottish players ahead of him on the metres made count and all of them were backs. Three of those played 80 minutes and the other played 72. Big Zander was out there for 68 minutes of world-class graft. He was immense. Again. For Scotland, it was a pleasing win, but their own analysis was encouraging. Finn Russell was hard on himself. Darge spoke about their looseness in that tricky spell when Italy came at them. Their breakdown work needs to be a whole lot better, he said. None of these guys need telling that if they have another period of inaccuracy and vulnerability against Ireland then they're not winning that game. That lapse was worrying, but better to have it against Italy, when they could recover, than against the Six Nations champions, who would not have let them off the hook.

