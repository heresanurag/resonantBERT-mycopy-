title: Leonardo da Vinci artwork sells for record $450m - BBC News
date: '2017-11-16'
section: General
url: http://www.bbc.co.uk/news/entertainment-arts-42006584
content: |-
  A painting of Christ believed to be by Leonardo da Vinci has been sold for a record $450m (£341m).

  A 500-year-old painting of Christ believed to have been painted by Leonardo da Vinci has been sold in New York for a record $450m (£341m), after fees.

  The painting is known as Salvator Mundi (Saviour of the World).

  It is the highest auction price for any work of art and brought cheers and applause at the packed Christie's auction room.
