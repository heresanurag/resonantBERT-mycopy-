title: Six Gaza aid boat activists deported from Israel after detention - BBC News
date: '2025-06-12'
section: Middle East
url: http://www.bbc.co.uk/news/articles/cx273w1032yo
content: |-
  Their boat was intercepted on Monday as they attempted to break Israel's naval blockade on Gaza and deliver a symbolic amount of aid.

  Six Gaza aid boat activists deported from Israel after three days in detention

  The Madleen (left) was intercepted on Monday

  Six activists who were detained by Israel after their boat was intercepted on its way to try to break the Israeli naval blockade of Gaza have been deported, the Israeli foreign ministry has confirmed. Earlier, Israeli human rights group Adalah said they were being transferred to Ben Gurion Airport "after more than 72 hours in Israeli custody following the unlawful interception of the Madleen Freedom Flotilla in international waters". Adalah, which provided legal advice to the activists, said two others who were on board remained in Israeli custody as they awaited deportation on Friday. Among those who left on Thursday was Rima Hassan, a French-Palestinian Member of the European Parliament.

  In a post on X, the Israeli foreign ministry said: "Six more passengers from the 'selfie yacht,' including Rima Hassan, are on their way out of Israel. "Bye-bye-and don't forget to take a selfie before you leave," it added. The post also showed pictures of the activists getting onto and then sitting on a plane. A post on Hassan's X account said she had left prison and was inviting people to meet in Paris' Place de la République at 21:00 (20:00 BST). The other five activists being deported are Mark van Rennes from the Netherlands, Suayb Ordu from Turkey, Yasemin Acar from Germany, Thiago Avila from Brazil, and Reva Viard from France, Adalah said. The rights organisation said the two other people yet to be deported were Pascal Maurieras and journalist Yanis Mhamdi, both French nationals. It said they were still in custody in Givon prison and were expected to be deported on Friday afternoon. In a statement issued before the six were deported, Adalah said: "While in custody, volunteers were subjected to mistreatment, punitive measures, and aggressive treatment, and two volunteers were held for some period of time in solitary confinement." It added: "Adalah calls for the immediate release of all eight volunteers and for their safe passage to their home countries. Their continued detention and forced deportation are unlawful and a part of Israel's ongoing violations of international law." The Israeli foreign ministry previously said those who refused to sign deportation documents would face judicial proceedings to have them deported, in accordance with Israeli law.

  A group of 12 people had been sailing on the yacht Madleen when it was intercepted by Israeli authorities on Monday, about 185km (115 miles) west of Gaza. The expedition, organised by the Freedom Flotilla Coalition (FFC), had been aiming to deliver a "symbolic" amount of aid to Gaza in defiance of Israel's blockade and to highlight the humanitarian crisis there. At the time, the Israeli foreign ministry dismissed it as a "selfie yacht" carrying "less than a single truckload of aid". Following the activists' detention, four, including Swedish activist Greta Thunberg and two French nationals, agreed to be deported immediately. Upon her arrival in France, Thunberg accused Israeli authorities of kidnapping her and other activists on the boat while they were in international waters. Israel's foreign ministry said unauthorised attempts to breach its blockade of Gaza were "dangerous, unlawful, and undermine ongoing humanitarian efforts". It added that the aid transported on the FFC boat, which included baby formula and medicine, would be transferred to Gaza "through real humanitarian channels".

