  Elsewhere, activists planning to join a pro-Palestinian march from Egypt to the southern Gaza border were stopped at Cairo airport on Thursday, an organising group said. The Global March to Gaza said about 170 people were facing "delays and deportations" at the airport. "Our legal services are working on these cases, as we have all complied with all the legal requirements of the Egyptian authorities," it said. Egypt's interior ministry has not commented on the arrests. Its foreign ministry issued a statement on Wednesday saying prior approval by state bodies was required to travel to the Gaza border area. The march aims to begin from El Arish in northern Egypt on Friday with the aim of arriving at the Egyptian side of the Rafah border with Gaza by Sunday, Global March to Gaza said. The aim is to challenge Israel's blockade of humanitarian aid. About 1,500 pro-Palestinian protesters have also travelled in a multi-vehicle convoy from Tunisia through to Libya, and were also aiming to enter Egypt to travel onto the Gaza border. Israel and Egypt have managed a blockade of Gaza since 2007, when Hamas seized control of the territory by ousting its rivals, a year after winning legislative elections. Israeli Defence Minister Israel Katz has called on Egypt to prevent what he called "the arrival of jihadist protesters at the Egypt-Israel border".

  Israel stopped all deliveries of humanitarian aid and commercial supplies to Gaza on 2 March and resumed its military offensive two weeks later, collapsing a two-month ceasefire with Hamas. It said the steps were meant to put pressure on the group to release the hostages still held in Gaza, but the UN warned that Gaza's 2.1 million population were facing catastrophic levels of hunger because of the resulting shortages of food. Three weeks ago, Israel launched an expanded offensive to take control of all areas of Gaza. It also partially eased the blockade, allowing in a "basic" amount of food. Israel is now prioritising distribution through the Gaza Humanitarian Foundation, which it backs along with the US. The UN and other aid groups are refusing to co-operate with the new system, saying it contravenes the humanitarian principles of neutrality, impartiality, and independence. It has been 20 months since Israel launched a military campaign in Gaza in response to the Hamas-led cross-border attack on Israel on 7 October 2023, in which about 1,200 people were killed and 251 others were taken hostage. At least 55,207 people have been killed in Gaza since then, according to the territory's Hamas-run health ministry.
