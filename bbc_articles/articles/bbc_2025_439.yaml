  Authorities plan on mapping the debris in the river so they can better understand how the aircraft responded to the collision. Work to remove large segments of the aircraft from the water by crane starts on Sunday and will continue throughout the week, said Mr Inman. Over 500 people have been working around the clock at the site of the crash in the Potomac River, Washington DC fire chief John Donnelly said. Mr Inman was asked about reports that one air traffic controller was managing both control for helicopters and airplanes flying in the area He did not comment on specifics, but said officials plan to examine the controller's behaviour over the past several weeks and in particular, the 72 hours before the crash. "Obviously we'll be looking at not only staffing that day...[but also] how many people, what job functions they've done, are they being combined." The Air Traffic Control group is still conducting interviews. Mr Inman was also asked whether his team is in contact with the White House. President Donald Trump has suggested without evidence that the helicopter involved in the crash "was flying too high". Recordings of air traffic control conversations published online suggested that a controller tried to warn the helicopter about the American Airlines plane in the seconds before the collision. The helicopter pilot appeared to respond to confirm they were aware of the plane, but moments later the two aircraft collided. Trump has also said suggested that diversity hiring at the FAA may have led to safety issues. "Our job is to find the facts," Mr Inman said. "More importantly, our job is to make sure this tragedy doesn't happen again - regardless of what anyone may be saying."
