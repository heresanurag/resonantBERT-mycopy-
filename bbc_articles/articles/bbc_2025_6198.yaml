  Kartal had earlier put Britain in a fine position with a gritty win over Vedder. She came back from an early break down in the first set and should have done similar at the start of the second. The Briton missed three break points against the world number 265 Vedder and was on the wrong end of an incorrect overrule of an out call by umpire Eva Asderaki-Moore at 4-3. Had it not been overruled, Kartal would have had a break point. Instead, the point was replayed, Vedder held serve and then broke Kartal in the next game. Vedder played her best tennis in the final two games of the second set, drawing errors out of Kartal before wrapping up the set with an ace. The Briton put her frustration aside for the third set, quickly going a break up and putting her heavy forehand to good use to win the final five games in a row.

  Victory for Boulter would have wrapped up the tie for GB, and the world number 40 was the favourite on paper. However, it was Dutchwoman Lamens who looked more comfortable in sliding and moving around on the clay. Boulter was always behind in the match, saving break points in the first game before going a double break down as her forehand misfired. When Boulter connected, her power was too much for Lamens, but she could not consistently find her range, despite briefly threatening a comeback after rescuing one of the breaks in the opening set. The Briton broke first in the second set, a nicely angled backhand forcing the error from Lamens, but she immediately surrendered the break with a wayward service game. Lamens did not look back, reeling off three games in a row to complete victory.
