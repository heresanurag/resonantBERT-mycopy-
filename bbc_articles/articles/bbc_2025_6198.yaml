content: |-
  Katie Boulter and Jodie Burrage produce a superb doubles performance to help Great Britain beat the Netherlands 2-1 and reach the Billie Jean King Cup Finals.

  This video can not be played To play this video you need to enable JavaScript in your browser.

  Katie Boulter and Jodie Burrage produced a superb doubles performance to help Great Britain beat the Netherlands 2-1 and seal their place in September's Billie Jean King Cup Finals. Boulter and Burrage, a late switch for doubles specialist Olivia Nicholls and Harriet Dart, beat Demi Schuurs and Suzan Lamens 6-2 6-2 on the clay. Boulter had earlier suffered a 6-4 6-3 loss to Lamens, while Sonay Kartal won her singles match 6-4 4-6 6-1 against Eva Vedder. Boulter jumped into the air after a Burrage ace confirmed their doubles victory, with the pair congratulating their opponents before heading over to celebrate with the team. "Every captain wants a Katie Boulter on their team," GB captain Anne Keothavong told BBC Sport. "Katie, after the disappointment of her singles, responded remarkably well. It was always an option for us and they went out there and did the job. "We knew doubles was going to be important this week - and I don't think Katie has ever done so much doubles practice in her life."

  Boulter and Burrage were playing together for only the second time, having practised as a partnership in the build-up to the competition. "We went out there and we gave it our all. We swung and that is what we wanted to do," Burrage said. "It was great to step on the court with Katie - good friends and good partners, I think." It is a credit to Boulter that she came out after a disappointing loss to world number 70 Lamens in the singles. She and Burrage claimed an excellent win against the formidable Dutch pairing - Lamens was on a 13-match unbeaten run at the BJK Cup while veteran Schuurs had not lost a match for her country since 2022. Boulter and Burrage played with aggression, targeting Schuurs' serve in particular. They hit 26 winners to 10 from the Netherlands, with Boulter cranking up her forehand in the deciding moments. Schuurs was left in tears after the match, with her side now needing to compete in the play-offs to secure a place in the 2026 qualifiers. Britain go on to compete at the eight-team Finals in Shenzhen, China from 16-21 September.

