  Lulu tells BBC Breakfast about the making of her new album, Making Life Rhyme and the ups and downs that inspired it.

  For half a century, Lulu has been wowing audiences, with her soulful voice and her larger-than-life personality.

  Now, she is back with a new album that she has written with the help of her younger brother.

  And she is about to take it on tour, right across the UK.

  Lulu told BBC Breakfast about the making of her new album, Making Life Rhyme and the ups and downs that inspired it.
