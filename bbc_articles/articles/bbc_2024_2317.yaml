  Former World's Strongest Man Eddie Hall tells Newsbeat about breaking records... and fitting into plane seats.

  He's a former World's Strongest Man - but how does he get on with delicate tasks?

  Eddie Hall spoke to Newsbeat about breaking records, how much he weighed as a child and how fitting into plane seats is a struggle.

