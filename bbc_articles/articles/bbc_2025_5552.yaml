content: |-
  The Ukrainian leader's climb-down on security guarantees may be because the US is the only place he can turn to, writes BBC Ukraine correspondent James Waterhouse.

  Zelensky's conciliatory letter to Trump suggests he's out of options

  Whether Ukraine's President Volodymyr Zelensky's decision to patch up relations with his US counterpart Donald Trump is wise depends on who you ask in Ukraine. "A very bad decision," remarked blogger and army serviceman Yuriy Kasyanov, who thinks the US "won't help Ukraine with anything" after this mineral deal is signed. "The president behaved with dignity" said former MP Boryslav Bereza, who described Zelensky's softening of tone as an "apology". Last night, Ukraine's leader gave his evening address from the courtyard outside Kyiv's Presidential Office. It was the same spot where he gave the now famous "we are all here" speech with his cabinet on the second day of Russia's invasion.
