content: |-
  Joanna Lumley and Steve Buscemi are seen in a new trailer for the hit show's second season.

  Netflix's Wednesday gets launch date and new characters

  Jenna Ortega reprises her role as the titular Wednesday Addams

  The first trailer for the second season of Wednesday - the most watched show in Netflix's history - has given fans the first glimpses of Joanna Lumley and Steve Buscemi in their new roles, alongside a host of returning favourites. The streamer has announced it will split the new season in half - releasing the first episodes on 6 August and the second batch on 3 September. This series follows Wednesday Addams, played by Jenna Ortega, as she returns to Nevermore Academy, now under the leadership of new principal Barry Dort (Buscemi). Also joining the school this term is her little brother Pugsley (Isaac Ordonez), a character described by executive producer Tim Burton as an "outcast among outcasts".

  Wednesday's parents will also have an increased presence on campus this season - "a rare new form of torture for the fiercely independent amateur sleuth", Netflix said. The first full-length trailer, which was released, appropriately, on Wednesday,, external opened with the show's lead character going through airport security. As the metal detector beeps, she has to unload a knuckle duster, cattle prod, several knives and Thing - a disembodied hand - from her bag, before a security guard challenges her about the tube of sun cream she is also carrying.

  The trailer sees Wednesday having to unload her weapon-filled bag as she goes through security

  "Wednesday Addams is one of the coolest characters of all time," Ortega said, external as the trailer launched. "So to have gotten the opportunity to play her once was incredible, and then to be able to slip into the costume and tone again, it's so much fun. "She runs circles around everyone that she has a conversation with, so to play someone who's so much more intelligent than you will ever be, it's quite funny and strange and enjoyable."

  British actress Joanna Lumley has joined the cast as Hester Frump, Morticia's complex mother

  Veteran British actress Lumley has joined the cast as Hester Frump, Wednesday's grandmother and closest ally. "The first day on set when Joanna walked on, she just was Hester and she nailed every single line, and it's just so delicious," said show creator Miles Millar. "She's perfect and hilarious." Lumley described the Nevermore atmosphere as "intoxicating", adding: "It's wonderful. I get to wear many, many huge wigs, one on top of the other - and lots of quite constraining clothes, so I love it."

  Fargo and Reservoir Dogs star Steve Buscemi will portray Nevermore's new principal Barry Dort

  Meanwhile, Buscemi described Principal Dort as "a bit of a mysterious figure", adding: "Something about him is not right, but he loves the school and he has real outcast pride." The first series of Wednesday was Netflix's biggest hit to date, and cemented Ortega as a major screen star. She has since appeared in Beetlejuice Beetlejuice, Death of a Unicorn and Scream XI.

  Wednesday's little brother enrols at Nevermore this season, while her parents have an increased presence on campus

  In the trailer, Wednesday's mother Morticia (Catherine Zeta-Jones) notes it's the first time her daughter has returned to school willingly. For her part, Wednesday describes returning to school as "like returning to the scene of the crime", noting that she "already knows where the bodies are buried". Later, the young Addams daughter is seen attending a macarbre tea party for a group of dolls. "Wherever there's murder and mayhem," Wednesday reflects, "you will always find an Addams." The trailer's reference to "mayhem" could hint at a previously reported cameo appearance from Lady Gaga,, external who recently released an album of that name. Netflix will be hoping the series replicates the success of the first. Its decision to split the new season in half is likely due to efforts to retain subscribers, refresh its platform and increase the hype around the show.
