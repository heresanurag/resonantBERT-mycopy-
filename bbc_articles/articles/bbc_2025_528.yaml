  A battle-hardened Test centurion with five Six Nations titles to his name, O'Mahony also knew better than to big up Ireland's chances with three games still remaining. After visiting Wales on 22 February, Ireland host pre-tournament favourites France in Dublin on 8 March before finishing the campaign away to Italy a week later. "Of course we know what's at stake," he said. "As I spoke about [earlier], you get ahead of things and something goes wrong. "We'll have an evening off and a few days off, then back in the camp and we've a big lead into another big game against Wales."
