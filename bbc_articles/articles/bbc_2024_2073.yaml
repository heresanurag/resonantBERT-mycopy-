title: Harry Styles spotted at Luton Town vs Manchester United match - BBC News
date: '2024-02-19'
section: Beds, Herts & Bucks
url: http://www.bbc.co.uk/news/uk-england-beds-bucks-herts-68333365
content: |-
  Fans joke that the star's appearance is the UK version of Taylor Swift at the Super Bowl.

  Harry Styles surprised and delighted fans with his appearance at Kenilworth Road

  Pop star Harry Styles turned football fans' heads when he was spotted in the crowd for Luton Town's match against Manchester United.

  The former One Direction star - a United fan - also dropped in to the Sky Sports studio ahead of the match.

  "We see your Taylor Swift at the Superbowl, American pop culture, and we raise you Harry Styles at Kenilworth Road for Luton vs Man Utd," posted one X user.

  Styles saw his team win the match 2-1.

  Manchester United fan Styles would have been happier with the result than Luton Town legend Mick Harford (right)

  Fans were amused to see him accepting a sweet from Luton Town legend Mick Harford, who he sat next to.

  "Mick Harford giving Harry Styles a Trebor Extra Strong mint before kick off is the most Kenilworth Road thing I've ever seen," posted radio presenter Matt Dyson on X.

  "Trebor sugar high could well be the next big hit song..." replied another poster.

