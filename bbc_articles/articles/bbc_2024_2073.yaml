  Fans seemed surprised to see the 30-year-old star at Kenilworth Road, which has achieved cult status among fans due to the its 11,500 capacity and the quirky entrance to its away end, sandwiched between a row of terraced houses.

  "Never thought I'd see Harry Styles setting foot in Kenilworth but here we are," posted one fan.

  "Harry Styles at Kenilworth Road was not on my Sunday bingo card," posted another.

  If Styles' visit to Luton has whetted his appetite, he may get the chance to return in May.

  That is when the town hosts Radio 1's Big Weekend - and the headline acts are yet to be announced.

