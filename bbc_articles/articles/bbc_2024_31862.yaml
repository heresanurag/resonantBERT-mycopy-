  Ukraine's war stamps, some with swear words, boost morale at home and promote its image abroad.

  Ukraine's war stamps put humour, patriotism and swearing in the post

  The head of Ukraine's postal company, Ukrposhta, says they're "breaking the rules" with their war stamps

  Rude gestures are rare on postage stamps, but Ukraine's best known stamp has one. It shows a soldier raising the middle finger to a Russian warship in reference to a stand-off at Snake Island on day one of the full-scale invasion nearly three years ago. The Russians demanded surrender but the Ukrainians refused, using unprintable language. The warship in question, the cruiser Moskva, was sunk by the Ukrainians two days after the stamp was issued, and it sold out within a week of going on sale. Such is the significance of the stamp that whatever was left was given to government delegations, external representing Ukraine on the world stage. Ihor Smilyansky, the head of Ukraine's postal company Ukrposhta, acknowledges it was a risqué step to take. "It was my decision. I said - I don't care whatever everyone else thinks. I just believe it's the right thing to do," he told the BBC. "I know it's breaking all the philatelic [study of stamps] rules and all the rules. But we're about breaking the rules." Ukrposhta often tests its designs on the public, and the results of such online polls tend to be very political too. That was how Ukraine's best-selling stamp came into being, showing a Ukrainian tractor towing a captured Russian tank and featuring the popular wartime greeting: "Good evening, we're from Ukraine." Ukrposhta has sold about eight million such stamps.

  "Good evening, we're from Ukraine" is the country's best-selling stamp

  Stamps featuring Ukraine's famous mine-sniffing dog Patron earned Ukrposhta about $500,000 (£400,000): 80% of the money was spent on mine-clearing equipment, and the rest on animal shelters. Another stamp of a mural left by renowned graffiti artist Banksy on a building devastated by shelling outside Kyiv, helped fund 10 bomb shelters. This stamp features another popular but unprintable Ukrainian slogan - this time directed against Vladimir Putin.

  Ihor Smilyansky says a dose of humour is added to Ukrposhta's stamps to maintain Ukrainian morale during the war with Russia. "Humour has become a fighting force for Ukrainians in this war," he tells the BBC. "Even in the most difficult circumstances you have to take it with a sense of humour. And that's what our stamps are sometimes about." Oscar Young from UK-based stamp dealers and auctioneers Stanley Gibbons says Ukraine's approach to stamps by focusing them on the war is highly unusual. "Generally stamps are artistic and polite, but to go out your way and be quite rude, placing profanity and being very gesturous on stamps - that is quite unique to these particular issues," he tells the BBC. He says the frank image used on the warship stamp is what made the stamp so famous and caused such a stir when it was issued. The distinctive character of Ukrainian stamps has earned them popularity with collectors worldwide. Laura Bullivant from Gloucester, in the UK, believes that other stamps look bland by comparison. "I think they're like the Ukrainian thought process, they're just strong, and they're just not bowing down to whatever's coming into their country," she says. "At a time of huge worry and awfulness, they are bringing something to the game that no other country could."
