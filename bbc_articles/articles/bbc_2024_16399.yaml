title: 'Man City 3-4 Celtic: Ederson future uncertain, says Pep Guardiola - BBC Sport'
date: '2024-07-24'
section: Man City
url: http://www.bbc.co.uk/sport/football/articles/c9e95e70rryo
content: |-
  Pep Guardiola wants Manchester City goalkeeper Ederson to stay at the club but says he could leave.

  Ederson has won six Premier League titles in seven seasons at Manchester City

  Manchester City manager Pep Guardiola says he cannot be sure Ederson will remain at the club this summer. The Brazilian goalkeeper has been the subject of interest from the Saudi Pro League. Guardiola said at the end of last season he still regarded Ederson as his first-choice goalkeeper, even though he chose back-up Stefan Ortega for the first-leg of their Champions League quarter-final with Real Madrid. Speaking after his side's 4-3 friendly defeat by Celtic in North Carolina, Guardiola said: "I'd like him to stay but it depends on other clubs. “I don't know the situation. There have been no contacts in the last days. It's a question of training, being with us until the transfer window finishes and we'll see.” Ederson came on at half-time during City's loss to Celtic in Chapel Hill, which was the Premier League champions' opening pre-season game. If Ederson’s future is uncertain, Kalvin Phillips seems certain to leave City - most likely on loan - before the transfer window closes on 30 August. Phillips endured a terrible spell at West Ham in the second half of last season, ending any hopes of him making Gareth Southgate’s England squad for Euro 2024. He was replaced at half-time against Celtic, although Guardiola said that was to protect him after he had missed the end of last season with injury. “That’s why we didn’t give him more minutes,” said Guardiola. “I don't know what's going to happen. He knows the situation, and we'll see.”

  Erling Haaland was handed the City armband for the first time as Guardiola named a blend of youth and experience in his starting line-up. City's side, which included six academy graduates alongside the likes of Kalvin Phillips, Jack Grealish and Stefan Ortega, trailed to Nicolas Kuhn's goal but Norway international Oscar Bobb found an equaliser in the 33rd minute. Celtic, who were playing their fourth pre-season match, went into the break 3-1 up after Kuhn scored his second of the game and Kyogo Furuhashi got on the scoresheet. City fought back in the second half, with Maximo Perrone scoring within 60 seconds of the restart to cut the deficit. Kasper Schmeichel, making his first appearance for Celtic since joining from Anderlecht, denied Haaland on three occasions. But the Norwegian, 24, scored the equaliser shortly before the hour-mark when he headed home a cross from compatriot Bobb. Celtic found the winner in the 68th minute when Luis Palma, who had come on three minutes earlier, scored on the counter-attack. The Bhoys' US tour continues against Chelsea on Saturday in Indiana, while City take on AC Milan in New York.

  Kasper Schmeichel (left) impressed on his first Celtic appearance
