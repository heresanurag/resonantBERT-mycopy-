id: bbc_2018_11662
title: U2's Bono cuts short Berlin show after losing voice - BBC News
date: '2018-09-02'
section: General
url: http://www.bbc.co.uk/news/entertainment-arts-45389777
content: |-
  The singer told the crowd that it "wasn't right" for him to perform after suffering problems with his voice.

  U2 fans were left disappointed when their Berlin show was cancelled after Bono lost his voice.

  The Irish band had played a handful of songs when the singer apologised and said: "I think we can't go on. It's not right for you."
