title: 'As it happened: Hancock ''very worried'' about impact of long Covid - BBC
  News'
date: '2021-04-01'
section: UK
url: http://www.bbc.co.uk/news/live/uk-56600336
content: |-
  The health secretary said the government was putting more research money into tackling the condition.

  England's chief medical officer Professor Chris Whitty has been speaking to a Royal Society of Medicine webinar about the coronavirus.

  In a wide-ranging discussion, Whitty has said those without Covid antibodies may still be protected from severe disease - and the slow easing of England's restrictions reflects how difficult the pandemic has been.

  He said: "I certainly don't think you should assume that if you have lower or no antibodies that means there is no protection.

  "It probably does mean you're more likely to get infected and it may mean you're more likely to be infectious, but doesn't necessarily mean you won't have protection from going into hospital, or having severe disease or mortality."

  And he said caution around reopening was needed "because we've got such a difficult situation to go through at the moment".

  "What we don't want to be is in a situation where we look back in six months and say 'If we'd only just been a bit more cautious for a month or two," he added.

  Whitty also predicted there could be a "very wide portfolio of vaccines" in around two years and that technology can "turn around a vaccine to a new variant incredibly fast, compared to how historically we've been able to do it".
