content: |-
  An "unknown" explosion at factory in Louisville, Kentucky injured 11 people on Tuesday.

  Two people have died in a large explosion at a factory in Louisville, Kentucky, the company Givaudan Sense Colour announced.

  Drone footage shows the building partially collapsed and windows in nearby homes and businesses blown out.

  Several other people were taken to hospital with injuries. The cause of the explosion is being investigated.
