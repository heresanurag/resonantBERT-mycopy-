title: Terminally ill boy, 11, enjoys video call with Johnny Depp - BBC News
date: '2022-12-21'
section: Derby
url: http://www.bbc.co.uk/news/uk-england-derbyshire-64042694
content: |-
  The star reprised the role of Captain Jack Sparrow for Kori, a huge Pirates of the Caribbean fan.

