content: |-
  Papal drama Conclave and immigration epic The Brutalist came away as big winners on the British film industry's biggest night.

  Pope drama Conclave and immigration epic The Brutalist walked away with some of the biggest prizes at the Bafta film awards.

  Conclave, directed by German director Edward Berger, picked up four awards including best film and best British film.

  US filmmaker Brady Corbet's The Brutalist also won four - Corbet picked up best director while Adrien Brody won best actor for his portrayal of Hungarian architect and Holocaust survivor, László Tóth.
