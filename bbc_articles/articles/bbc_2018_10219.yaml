title: Egypt hotel couple 'died from heart failure' - BBC News
date: '2018-08-24'
section: Lancashire
url: http://www.bbc.co.uk/news/uk-england-lancashire-45297626
content: |-
  John and Susan Cooper's daughter says she believes her parents' deaths were suspicious.

  There are "no criminal suspicions" over the deaths of John and Susan Cooper, the Egyptian authorities say

  A British couple who died on holiday in Egypt suffered heart and respiratory failure, local authorities have said.

  John Cooper, 69, and his wife Susan, 63, from Burnley, were staying at the Steigenberger Aqua Magic in the Red Sea resort of Hurghada.

  The couple's daughter, who was also staying at the hotel, said she believed their deaths were suspicious.

  The Red Sea governorate said medical checks by a health inspector revealed "no criminal suspicions".

  Thomas Cook said it was removing all its customers from the Steigenberger Aqua Magic as a "precautionary measure". It added that the circumstances of the deaths were "unclear".

  Kelly Ormerod, pictured with her mother, says her parents were healthy the day before they died

  The couple's daughter Kelly Ormerod, who was staying in the hotel with her three children, told the BBC something "doesn't add up" about the explanations of her parents' deaths.

  "I believe their deaths are not due to natural causes," she said.

  "My parents went to sleep on the Monday evening, fit, healthy and in good spirits, and awoke the following morning in very poor health."

  Mrs Ormerod said the authorities had failed to keep her updated on the situation and were preventing her from leaving the country.

  In a statement, authorities in Egypt said Mr Cooper died in his hotel room at 11:00 local time on Tuesday.

  He had suffered a "sharp drop in blood circulation and a sudden stop in the heart muscle", and his cause of death was listed as "sudden failure in the heart muscle and respiratory failure".

  Mrs Cooper was taken to hospital five hours later in a "state of fainting" and, although heart recovery work took place for 30 minutes, she died at 17:12.

  Up to 1,600 guests are staying at the hotel, according to owner Deutsche Hospitality

  The authorities said her cause of death was a "drop of blood circulation and respiratory functions".

  Egypt's tourism minister Rania Al-Mashat told the BBC the public prosecution office was investigating and would report "within the next week or 10 days".

  Thomas Cook said the circumstances of the deaths were "unclear", but it had no evidence that carbon monoxide was a factor.

  On Thursday, it said it had received "further reports of a raised level of illness among guests" at the hotel.

  It said 301 holidaymakers would have options for different hotels from Friday and those wishing to go home would be flown back.

  Sven Hirschler, senior director of corporate communications for Deutsche Hospitality, which owns the Steigenberger brand, said there was not an unusual level of illness among the 1,600 guests staying at the hotel.

  He said that Mr Cooper had complained of low blood pressure and was treated by the hotel's on-site doctor on the day he died.

  This video can not be played To play this video you need to enable JavaScript in your browser. Janine Traviss and her husband fell ill during a stay at the same hotel

  Janette Rawlingson, 43, from Chelmsford, Essex, who arrived at the hotel with her husband and two children on Tuesday, said Thomas Cook staff told guests at a meeting it was testing samples from the restaurant and swimming pool.

  "Other guests are saying there are 40 people ill at the hotel with vomiting and diarrhoea," she said.

  "A reasonable person can't help but wonder if there's a link between that illness and these deaths."

  Other holidaymakers have told the BBC about their experiences with illness during stays at the Steigenberger Aqua Magic.

  Janine Traviss, from Oldham, said she and her partner fell ill with a stomach bug during a holiday earlier this month.

  "I subsequently have been ill for several weeks now since returning and had to visit the doctor on two occasions with two full weeks of antibiotics," she said.

  "I am still recovering and still feel very tired and exhausted most days."

  Thomas Cook said it was working closely with the hotel and supporting the local authorities with their investigations.

  It stated the hotel was last audited late last month and received an overall score of 96%.

  "We will be contacting those customers due to travel to the Steigenberger Aqua Magic Hotel in Hurghada in the next four weeks to offer alternative holiday options," the tour operator added.

  Susan Cooper worked at the Thomas Cook branch in Burnley

  Mrs Cooper worked at the travel firm's Burnley branch, which remained closed for a second day on Friday.

  She has been described as a "loyal and long-serving" member of staff by the company.

  Alban Barker, 70, who lives close to the Coopers' home, paid tribute to a "really great couple" who were season ticket holders at Burnley.

  He said Mr Cooper, a clay pigeon shooting enthusiast, was an "extremely good, very reliable builder".

  "I bumped into them the other week and told him 'it's about time you retired' and he just laughed and said, 'I'm fine, I'm fit enough'.

  "He looked well, he was a strong man."

