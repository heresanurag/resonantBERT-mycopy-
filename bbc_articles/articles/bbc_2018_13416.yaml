  • None Southampton are winless in nine games at the Etihad Stadium (D1 L8) since winning their very first game there in April 2004.
  • None Danny Ings' penalty for Southampton was their first goal in 505 minutes of Premier League football, and ended Manchester City's run of 630 minutes without conceding a goal in the competition.
  • None Sergio Aguero scored his 150th Premier League goal in his 217th appearance - only Alan Shearer (212 games) has scored 150 in fewer games in Premier League history.
  • None Wesley Hoedt has now scored two own goals in this season's Premier League, more than any other player in the division.

  Manchester City are back in action on Wednesday when they host Shakhtar Donetsk in the Champions League (20:00 GMT), before they take on Manchester United on Remembrance Sunday (11 November, 16:30).

  Meanwhile, Southampton face Watford at St Mary's on Saturday (15:00).
