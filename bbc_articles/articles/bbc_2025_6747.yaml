  Baroness Falkner said trans people should use their "power of advocacy" to ask for facilities including a "third space" for toilets. "Single-sex services like changing rooms must be based on biological sex if a male person is allowed to use - it's no longer a single sex space." She added the ruling was "a victory for common sense only if you recognise that trans people exist, they have rights and their rights must be respected". British Transport Police said trans women in custody would now be searched by male officers as an interim measure while it reviews its policies and practices. "Under previous policy, we had advised that someone with a GRC may be searched in accordance with their acquired sex," a spokesperson said. "However as an interim position while we digest yesterday's judgement, we have advised our officers that any same sex searches in custody are to be undertaken in accordance with the biological birth sex of the detainee."

  Baroness Falkner said the next stage of litigation may well be tests of the efficacy of GRCs. Asked about whether she thought GRCs were now "worthless", she replied: "We don't believe they are. We think they're quite important." The new guidance could also have an impact on women's sport, where the question over whether transgender women can participate has been a high-profile issue in recent years. Sports have tightened up rules around transgender athletes at the elite levels. Athletics, cycling and aquatics have banned transgender women from taking part in women's events, while other sports have put in place eligibility criteria. Conservative leader Kemi Badenoch said a review on gender and equality laws was "a good idea". Speaking to broadcasters during a visit to Cambridge, she said: "We need to make sure that the law is clear and the public bodies follow the law, not guidance from organisations that don't understand it." She added the laws needed to be updated to ensure that they are "there to prevent discrimination, not for social engineering".

