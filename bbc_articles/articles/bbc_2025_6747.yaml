  Scottish Greens MSP Maggie Chapman, a prominent supporter of trans rights, told the BBC's Good Morning Scotland programme the decision would "stoke the fires of the culture war" and trans people now feared they could lose access to facilities they've used, in some cases, for decades. She added that trans people had been attacked in recent years "just for being who they are" and she was "concerned" about the impact of the Supreme Court decision. Trans rights campaigners have said they will be examining the judgment closely to decide on their next steps. The UK government has welcomed the "clarity and confidence" for women and service providers brought by the judgement. A government spokesperson said: "Single sex spaces are protected in law and will always be protected by this government, and trusts should follow the clarity the ruling provides." Health minister Karin Smyth said the government would be reviewing the ruling to "make sure we are fully compliant with it" and would be working with equality bodies to make sure organisations were fully compliant. She said the government was not interested in "so-called culture wars" and believed that everybody should have "their dignity and privacy and their rights respected". "I think now is the time to make sure that we look to the future, that rights are very clear for people and that service providers absolutely make sure they comply with the law," she said.

