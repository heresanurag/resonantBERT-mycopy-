title: NHS will be pursued if gender policies don't change, equalities watchdog says
  - BBC News
date: '2025-04-18'
section: UK
url: http://www.bbc.co.uk/news/articles/ce84054nqnyo
content: |-
  It comes after a Supreme Court ruling that the legal definition of a woman is based on biological sex.

  NHS will be pursued if gender policies don't change, equalities watchdog says

  Campaigners gathered outside the Supreme Court in London on Wednesday as the verdict came in

  The NHS will be pursued if it does not follow new guidance on single-sex spaces, the chairwoman of the Equality and Human Rights Commission (EHRC) has said. Along with other public bodies, the NHS will be receiving guidelines after the UK Supreme Court unanimously ruled a woman is defined by biological sex under equalities law. "We've been speaking to the health service for an inordinately long time - we will now be asking them when they will be updating their advice," Baroness Falkner told BBC Radio 4's Today programme. Currently the NHS guidance says trans people should be accommodated according to the way they dress, their names and their pronouns. Under the ruling this would be scrapped.

  The EHRC says it is "working at pace" to provide an updated code of conduct for services, including the NHS and prisons, and it expects its updated guidance to be in place by the summer. The ruling could have implications for spaces such as hospital wards, changing rooms and domestic refuges. Asked whether the EHRC would pursue the NHS if it doesn't change, Baroness Falkner replied "yes we will". "We will be having those conversations with them to update that guidance," she said. An NHS spokesperson told the BBC the service was "reviewing guidance on same sex accommodation" and as part of this process "will consider and take into account all relevant legislation and the Supreme Court ruling". Wednesday's case was brought by women's rights campaigners who challenged the Scottish government, arguing sex-based protections should apply only to people that are born female. Judges ruled that when the term "woman" is used in the Equality Act it means a biological woman, and "sex" means biological sex. This means a Gender Recognition Certificate (GRC) - a legal document that recognises an individual's gender identity - will now not change a person's legal sex for the purposes of the Equality Act. The Supreme Court justices argued this was the only consistent, coherent interpretation. There is already Equality Act guidance which allows for women-only spaces, such as toilets, changing rooms and hospital wards in certain circumstances. But under the new ruling a person who was born male but identifies as a woman does not have a right to use a space or service designated as women only. That includes transgender women who have legally changed their gender and hold a GRC.

