title: Shakespeare's Globe show abandoned after flare falls into theatre - BBC News
date: '2024-08-08'
section: London
url: http://www.bbc.co.uk/news/articles/c5y380g6rjno
content: |-
  An audience member says an object fell "into the crowd" after flares were fired from nearby bridges.

  This video can not be played To play this video you need to enable JavaScript in your browser. People across London filmed the flares and fireworks being set off from Southwark and Millennium bridges

  A performance at Shakespeare's Globe in London had to be abandoned after a flare fired from a nearby bridge landed inside the open-air theatre. Witnesses on Bankside said numerous fireworks and flares had been set off from Southwark Bridge and Millennium Bridge at about 22:00BST on Wednesday, which are believed to have been fired by Algerian football fans celebrating their club. An audience member who was at the performance of Antony and Cleopatra told the BBC he heard "hissing from above", before seeing "an object fall through the roof - and into the crowd". Shakespeare's Globe said "emergency measures" had been taken with people moved indoors for nearly an hour before police said it was safe to leave.

  Witnesses said the fireworks had lasted "for a few minutes"

  Jack Aldane, who was in the audience, said after he first heard the "hissing... I saw an object fall through the open roof of the theatre and into the crowd. "By the way it fell and landed, it was clear the object was a cardboard inner-tube from one of the fireworks. No-one appeared harmed." He described how the audience was then moved into a basement area, with staff saying there was “no immediate cause for concern”, and added the situation had been "handled all very well". Sophie Cook told the BBC she was nearby at The Anchor pub when "very suddenly loads of fireworks went off", which "completely lit up the sky". She said: "We stayed for an hour longer and there were no police. There were people driving and cycling, and nobody stopping them." It is believed the fireworks were set off by football fans celebrating the 103rd birthday of Algerian team Mouloudia Club d’Alger.

  Audiences at Shakespeare's Globe had been watching Antony and Cleopatra before the performance was stopped

  London Fire Brigade said it had not been called to the theatre, while police said they were not investigating the incident, which is not thought to be linked to other demonstrations that were being held in London. Shakespeare's Globe said that following the release of fireworks on Millennium Bridge "the Globe building was immediately locked down". A spokesperson said they could "confirm a flare landed in the theatre and was safely removed". "The audience and company were invacuated and held until 10.50pm when the police gave notice that it was safe to leave. All audiences, company members, and staff were evacuated and got home safely." They added the theatre was "continuing to gather the facts regarding exactly what happened", and that "the Globe Box Office will be in contact with all audience members who attended last night’s performance". Shakespeare's Globe has reopened as usual on Thursday and said no future performances had been affected.

