  But Miller insisted it was not their responsibility to chase the club to ensure that it added new players to its policy "immediately".

  It claimed the broker had warned Cardiff City Football Club several times that there would be a gap in a player's insurance cover between acquiring an "insurable interest" in a new player and informing the insurer.

  Lawyers for Cardiff City said that Miller's defence is being "evaluated, but doesn't seem to contain any surprises".

  The club, represented by David Phillips KC, added that it expects to file a reply "soon" to the High Court.

  In a statement, Cardiff City said that there "has been selective reporting" of its defence filed against the club brought against its insurance brokers.

  It said: "The club did not try to insure Emiliano after the plane crash.

  "All Cardiff City Football Club staff understood from its broker that all players were insured from the moment they were signed, and the case arises from learning they were not.

  "It will reply to the allegations made in the defence that are untrue, or portrayed out of context, in the court proceedings and will not litigate this case in the media."
