title: Government in court over chicken poo in River Wye - BBC News
date: '2024-02-07'
section: Science & Environment
url: http://www.bbc.co.uk/news/science-environment-68221223
content: |-
  Campaign group River Action say the Environment Agency did not enforce rules to stop fertilisers and chicken manure getting in river.

  Protestor outside court as the case kicks off on River Wye pollution

  Campaigners are taking the Environment Agency to court, accusing it of not stopping chicken manure polluting the River Wye.

  The charity River Action, who brought the case, says laws to keep waterways healthy have not been enforced.

  The Wye last year had its status downgraded to "unfavourable", and the rapid expansion of chicken farming in the catchment area was partly blamed.

  The Environment Agency said anyone breaking the law could be prosecuted.

  The Wye flows along the English-Welsh border and is home to otters, kingfishers and the endangered Atlantic salmon.

  "We believe that the government and the Environment Agency have acted unlawfully by deliberately not enforcing the critical regulation that, had it been in force, would have prevented the contamination of the Wye catchment area," Charles Watson, the chairman of River Action, told the BBC.

  Although the High Court hearing is being held in Cardiff, the Welsh Government isn't involved. The case is being brought against the Environment Agency which has jurisdiction on the English side of the Wye, and also includes as an 'interested party' the UK government's Department for Environment, Farming and Rural Affairs.

  A handful of protestors, including water campaigner and musician Feargal Sharkey, were outside court on Wednesday as the case began.

  At the heart of the judicial review are regulations known as the farming rules for water.

  Introduced in 2018, they state that farmers must make sure that fertiliser does not get into watercourses and that they should not put more on fields than is needed.

  River Action say the Environment Agency, which has responsibility for England, deliberately ignored the rules under pressure from farmers. River Action says this allowed the farmers to apply excessive amounts of manure to fields, creating nutrient rich run-off that found its way into the River Wye and its tributaries.

  The Environment Agency said it does not comment on ongoing legal proceedings but that "anyone caught breaching environmental laws faces enforcement action, up to and including prosecution".

  The BBC has learnt that to date there have been no Environment Agency prosecutions in the Wye catchment for applying too much fertiliser to fields.

  More than 20 million chickens are being raised in the RIver Wye catchment area at any one time

  There are many different sources of pollution that have contributed to the decline of the Wye. Studies by Lancaster University have shown that 70% of the phosphate in the River Wye catchment comes from agriculture, but not all of that is chicken-related.

  But the chicken industry in the Wye has seen the most dramatic expansion. More than 20 million chickens are now being raised in the catchment area at any one time - that is about a quarter of the UK's total production. And some analysts have directly linked the expansion of chicken farming to the decline of the Wye.

  Chicken manure contains high levels of nitrogen and phosphorus. It makes it a great fertiliser for crops, but when the nutrients reach waterways they can result in excessive growth of algae, starving the river of oxygen.

  With chicken sheds producing huge amounts of manure, some farmers have been spreading it on fields as fertiliser. But if the ground cannot absorb it and it rains heavily, the nutrients can be washed into rivers and streams.

  Whittern Farms' James Wright talks to BBC environment correspondent Jonah Fisher in front of a mound of chicken manure

  The National Farmers Union will also submit evidence at the court hearing. Its deputy president, Tom Bradshaw, says it is important that laws are applied correctly and proportionately.

  "Farmers and growers care about water quality in rivers and we continue to work hard, through a range of measures, to prevent valuable nutrients and soil that are crucial to our farming systems and producing food from contributing to water pollution." he said.

  "The use of organic manures has always been at the heart of sustainable food production."

  There are technical solutions but they come at a cost. Chicken farmer James Wright, a manager at Whittern Farms in Herefordshire, says they have invested in equipment that prevents pollution from manure.

  "These chickens will produce about 40 tonnes of chicken poo," he says as he shows us around one of the sheds.

  There are about 28,000 birds in the building, one of six on the property.

  The chicks are delivered at a day old and automated machines give them water and food. By about day 36, the chicks should weigh more than 2kg and will be killed, packaged and sold for about £5 in a supermarket.

  "We give them the best life we possibly can," Mr Wright says. "We are providing a protein source for over 60 million people in this country and we've got to do it somehow affordably and sustainably."

  Whittern Farms has installed £3m biomass boilers to deal with the more than 200 tonnes of chicken manure which it produces over a six-week period. The manure is burned to heat the sheds, while also making powdered fertiliser which is sold to other parts of the UK.

  But Mr Wright says economics make it difficult for other chicken farmers to do the same.

  "Chicken should definitely be more expensive," he says. "If the consumer was willing to pay an extra 10p to 20p for a chicken or an extra few pence for a chicken sandwich... that could be passed on down the chain to farmers and it would make a huge difference. It would pave the way for investment in technology like this."

  If the Environment Agency were to lose the case it could lead to tighter enforcement of the rules on manure, including preventing any application if there is a risk of nutrients like phosphorous becoming overloaded in the soil, and, where there are breaches, potential fines or prosecutions.
