  Sgt Carrington added: "The operation was a real success and underlines how we will continue to work hard to keep people safe, prevent and disrupt anti-social behaviour being caused at these car cruise events, and do everything we can to bring offenders to justice." A further two cars were stopped, leading to police enforcement action after a smaller scale pop-up meet on the A57 at Worksop on Bank Holiday Monday.

