title: Cars seized as drivers caught 'setting up to race' in Nottingham - BBC News
date: '2025-05-10'
section: Nottinghamshire
url: http://www.bbc.co.uk/news/articles/c3d4vk2mg75o
content: |-
  Between 300 and 400 car cruisers descended on Nottingham in known hotspots for anti-social driving.

  Cars seized as drivers caught 'setting up to race'

  Nottinghamshire Police has been targeting anti-social and dangerous driving by car cruisers as part of Operation Wheelspin

  Police have seized five vehicles and 14 drivers will be prosecuted after up to 400 cars were caught "setting up to race" in Nottingham. Nottinghamshire Police said it became aware that a large number of car cruisers were set to descend on the city on Saturday 3 May. A coordinated operation was then put in place at known hotspots for reckless driving, which the force said led to the seizure of cars and allowed officers to prevent issues at other locations. The force has targeted car cruising since last year as part of Operation Wheelspin, which aims to put the brakes on "meets" organised on closed social media groups.

  Officers have also caught drivers performing a "donut" at locations including a retail park in Colwick

  The force said the initiative, which has used number plate recognition technology to build up a database of potential problem cars, had led to a 20% reduction in related offences. Sgt James Carrington previously told the BBC the force is "playing a game of cat and mouse" with car cruising organisers, who can often arrange multiple meets at several locations on one night. Speaking about the operation on 3 May, he said: "We seized five cars that night alone, and 14 drivers will be prosecuted. "We also populated our database with a huge number of vehicle registration marks for further monitoring and to develop our intelligence picture going forward, as well as dispersing them out of Nottinghamshire without issue."

