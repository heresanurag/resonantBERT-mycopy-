title: Nigel Farage announced as Reform UK leader and MP candidate - BBC News
date: '2024-06-04'
section: General
url: http://www.bbc.co.uk/news/videos/cy99djpjyn4o
content: |-
  Mr Farage initially said he would not be standing in the 2024 election.

  Nigel Farage has announced that he is standing to be MP for Clacton in the general election, for the Reform UK party, as well as taking over as party leader for the next five years.

  Mr Farage initially said he would not run for a seat himself and would just do his "bit to help in the campaign”.

  He has stood as a candidate in seven elections but never won a seat.

