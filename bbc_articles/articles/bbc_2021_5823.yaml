  Voters go to the polls on Thursday in elections across England, Scotland and Wales.

  A view from the heart of the 'red wall'

  Dudley is at the heart of the so-called' red wall' - the belt of Midlands and Northern seats that returned Labour politicians for decades. But like many of its neighbours, it is starting to turn blue: it already has two Tory MPs, and the council is run by a minority Conservative administration. For Radio Four's World at One, BBC political reporter Rob Mayor has been finding out what people think of the upcoming elections: Council leader Patrick Harley is hoping to win a Conservative majority on Thursday. He says it will allow the town to attract investment from central government, as it has been doing for the last few years. But leader of the Labour group, Cllr Qadar Zada, says unemployment is "up by 75%" during the pandemic, with 20,000 young people out of work. Residents are also worried about crime, he says. Wendy Farmer, who has run a stall in the town's market for 30 years, says trade has fallen as all the big shops have closed. The council has not helped during the pandemic, she says. But she supports the prime minister. "Those that criticise, I'd like to see them them do what he's had to put up with in the last 12 months," she says. A full list of all the candidate standing in the area can be found here .
