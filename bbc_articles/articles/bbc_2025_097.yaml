  Celine was born in December 2023 weighing less than a bag of sugar.

  Baby to fly to Mexico for 'life-changing' therapy

  Charlie and Lottie said they were pleased their daughter, Celine, was at home on Christmas Day

  A one-year-old girl will fly to Mexico to receive potentially life-changing stem cell therapy after her family raised thousands of pounds to fund the treatment. Celine, whose birthday was in December, was diagnosed with myotonic dystrophy, a rare genetic condition, a month after she was born weighing less than a bag of sugar. Stem cell therapy is yet to prove effective, external for muscular dystrophy and has not been approved on the NHS so Celine's parents, Lottie and Charlie, have instead raised £86,000 to fund the treatment overseas after launching a crowdfunding campaign in July. The family, from Colchester, Essex, will travel to Mexico later this month for the first round of stem cell therapy, which Lottie said Celine would need to receive every year. They hope it will slow the weakening of her muscles.

  Celine's first birthday was in December

  The 36-year-old said she had not expected to celebrate her daughter's first birthday and was worried she would be too unwell to be at home for Christmas. "It was magical to have her there on Christmas Day," she said. "She didn't have a clue what was going on but we did and it meant the world." Lottie said she was anxious about the trip to Mexico but excited to see whether the treatment would improve her daughter's condition. "We've worked so hard towards this; everyone has. We're so grateful for the chance, but now it's very real." The couple's friends and family spent the second half of last year organising fundraising challenges and events. About 37 people, including TV personality Jake Quickenden, took part in a 100km (62 mile) walk from Colchester Town Hall to central London to kickstart the fundraising campaign. More events were planned for 2025 to help cover the cost of a second round of treatment for Celine, her mum added.

  Myotonic dystrophy is a genetic condition which leads to progressive muscle weakening. Symptoms can start at any age but they are generally more severe in children. There is currently no cure. Celine's parents have been told their daughter will never have a normally functioning immune system. They hope the treatment their daughter will receive in Mexico will slow the weakening of her muscles.

