title: 'England vs West Indies: Chris Woakes positive despite Edgbaston late wickets
  as Gus Atkinson shines - BBC Sport'
date: '2024-07-26'
section: England
url: http://www.bbc.co.uk/sport/cricket/articles/ce58j6yyen6o
content: |-
  Despite losing three wickets late on day one of the third Test, England can still pile on "big runs" against West Indies at Edgbaston, says Chris Woakes.

  This video can not be played To play this video you need to enable JavaScript in your browser. Highlights: Holder stars for West Indies as England trail by 244

  England can still rack up a huge total against West Indies at Edgbaston despite losing late wickets on day one of the third Test, according to Chris Woakes. Openers Zak Crawley and Ben Duckett were dismissed before the close along with nightwatcher Mark Wood to leave England on 38-3 in response to West Indies’ 282. Both Crawley and Duckett were out playing expansive drives and Woakes acknowledged on this occasion their attacking style "didn't come quite come off". The all-rounder, however, is confident England's middle order can make amends on a pitch which still looks good for batting. Joe Root and Ollie Pope will resume unbeaten on two and six respectively on Saturday. "Naturally you'd like to go into the close no more than one down, so you have to give credit to the West Indies for coming out in what's a tricky period I suppose to take three wickets," said Woakes, in familiar surroundings as a Warwickshire player. "We always try and take the positive option, particularly the two openers - they always look to make it hard for the opening bowlers. "But at the same time it's still a good batting surface and going into day two we've still got two top players at the crease and then a middle order which can build partnerships and hopefully put on some big runs."

  This video can not be played To play this video you need to enable JavaScript in your browser.

  Despite a late setback, it was a satisfying day with the ball for fast bowler Gus Atkinson as he finished with four wickets. The 26-year-old narrowly missed out on joining the elite list of players with three five-wicket hauls in his first five Test innings. Had he achieved the feat he would have been only the fourth England player to do so and the first since World War One. He has now taken 20 wickets in Test cricket and there are only six players that have taken more than that in their first three Tests. If he takes five wickets in the second innings, he will top the list. It was a brutal short-pitched ball that accounted for Gudakesh Motie which caught the eye of former England fast bowler Steven Finn. "That delivery is what I really love about Gus Atkinson - his ability to surprise," Finn said on BBC Test Match Special. "I know it's a lower order player, but the bounce, steepness and skiddiness of that bounce he can get makes him a special prospect." Woakes said Surrey's Atkinson has made Test cricket "look quite easy" given how quickly he has adjusted to to the format and "showcased his skills". "Credit to him, he has come in and bowled really well. He came in at Lord's and did fantastically well, got his rewards there," added Woakes. "He's also done it now on back-to-back flat wickets. Trent Bridge was hard work for the seamers, especially in the beating sun on day two. "He's got the ability to swing the ball and a good wobble seam, which is a good change-up for him. "He's got some pace behind him so he can use short-ball ploy well. He looks the all-round bowler and thankfully for him he's started really well in his Test career."

