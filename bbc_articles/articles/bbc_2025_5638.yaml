title: Gene found to link obesity risk in labradors and humans - BBC News
date: '2025-03-07'
section: Science & Environment
url: http://www.bbc.co.uk/news/articles/cy05qw217x9o
content: |-
  Scientists have found a genetic cause of many labradors' - and some people's - tendency to overeat.

  Genetic drive to overeat found in labradors and humans

  The gene the researchers identified interferes with a brain signalling pathway that helps regulate our appetite

  Dogs that are constantly hungry and prone to being overweight share a common bit of biology with some obesity-prone humans. This is what UK scientists have discovered - identifying a genetic source of many labradors' - and some people's - tendency to overeat. Researchers found that changes in a particular gene, one of the building blocks of biological code that produces the blueprint for how our bodies work, alters the chemical signals that tell our brains we've had enough to eat. The scientists say their findings, published in the journal Science, external, reveal something "powerful" about the biology of obesity risk.

  "By studying dogs, we've honed in on some interesting new biology here," explained lead researcher Dr Eleanor Raffan from the University of Cambridge's department of physiology, development and neuroscience. She added that the discovery showed that "owners of slim dogs are not morally superior - and the same is true of slim people". "If you have a high genetic risk of obesity, you're prone to gaining weight unless you put a huge effort into not doing so. And those with low genetic risk just don't have to work so hard." This canine-human biological link came from the researchers' examination of the genetics of 250 labradors. The team looked for pieces of genetic code that were common in overweight dogs. They picked out one gene in particular - called DENND1B - that was associated with a higher body mass in the labradors. And when they searched through a library of genetic information from thousands of humans, they discovered that the same gene was associated with a higher body mass in people, too. Before this study of labrador genetics, Dr Raffan said, "no one suspected that gene had anything to do with obesity".

  Dogs with this genetic predisposition need a strict diet and regime of exercise

  The gene interferes with a brain signalling pathway that helps regulate our appetite. Dr Raffan explained: "It alters the predisposition to weight gain because it's tweaking a system that is involved in regulating how hungry we feel and how much energy we burn off." The findings could help in the future development of new drugs to tackle obesity. But the scientists say they reveal how much harder people - and owners of dogs - with this genetic predisposition have to work to offset its effects. Another member of the research team, Alyce McClellan, from Cambridge University added that the results emphasised "the importance of fundamental brain pathways in controlling appetite and body weight".

  The discovery adds to a developing picture of those pathways and the biological driving forces behind overeating. A group of weight loss drugs, that includes Ozempic, target some of this biology, and have exploded in popularity in recent years. What we've identified here is a different pathway [from the one targeted by those drugs]," explained Dr Raffan. "But it all speaks to the same important bit of biology, which is that obesity is not about having low willpower. "It's about the fact that some people are prone to weight gain because they have a genetic risk which increases their responsiveness to food and their appetite. "This goes for dogs and humans alike - they have a genetic drive to overeat."
