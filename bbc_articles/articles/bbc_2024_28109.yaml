title: Southwest plane struck by gunfire at Texas airport - BBC News
date: '2024-11-16'
section: US & Canada
url: http://www.bbc.co.uk/news/articles/cvge1qw1283o
content: |-
  No injuries were reported in the incident, but one bullet hit the cockpit, officials say.

  A Southwest Airlines flight with passengers onboard was struck by gunfire as it was preparing to take off at Dallas Love Field Airport in Texas, authorities said. Flight 2494 was preparing for departure to Indianapolis when "a bullet apparently struck the right side of the aircraft under the flight deck", a Southwest spokesperson told the BBC's US partner, CBS News. No injuries were reported, and the aircraft returned to its gate and passengers deplaned, according to an airport spokesperson. The domestic airport's runway was temporarily closed but it has since reopened.

  Dallas police is currently leading the investigation into the Friday night incident. Its officers responded to reports of gunfire at 21:48 local time (03:48 GMT on Saturday) and arrived to find that the plane had been struck. The Federal Aviation Administration said in a statement that the bullet hit near the cockpit of the Boeing 737-800 Max aircraft. No details have formally been released on the circumstances surrounding the incident, but local TV station WFAA reported that police believed the shooting was a result of random gunfire. The outlet confirms 99 people were aboard the flight. Southwest has said it will accommodate all passengers on other flights. Earlier this week, three planes that were either landing or taking off from the main airport in Port-au-Prince, the capital of Haiti, were struck by gunfire as gang violence ravages the Caribbean nation. Those incidents prompted the Federal Aviation Administration to issue a 30-day ban on US airlines flying to Haiti.
