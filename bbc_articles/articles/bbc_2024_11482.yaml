title: Sophie Raworth steps down from BBC election debate - BBC News
date: '2024-06-11'
section: General
url: http://www.bbc.co.uk/news/articles/cmjj10zxm53o
content: |-
  Mishal Husain will present the debate after Sophie Raworth injured herself at the London marathon.

  Sophie Raworth has stepped down from hosting the BBC’s TV debate between Rishi Sunak and Sir Keir Starmer. The presenter has asked not to present The Prime Ministerial Debate on 26 June, due to fracturing her ankle. Mishal Husain, who hosted last week’s BBC debate between seven of the biggest parties in Great Britain, will now take her place. The event will be the last televised debate between the prime minister and the Labour leader before the general election on 4 July.

  Raworth said: "The injury I picked up at the London marathon has now been diagnosed as a fracture in my ankle. "I was only told this last week during the D-Day commemorations. I’m now on crutches, in a boot and non-weight-bearing for some time." She added she’s "delighted" Husain is now hosting. "Mishal Husain is a fantastic presenter and will be brilliant at moderating what is a really important debate for both the two leaders and the BBC," Raworth said. "I’m delighted she is doing it."

  Sir Keir Starmer and Rishi Sunak faced each other in last week's debate on ITV

  After the debate, Laura Kuenssberg and Clive Myrie, the hosts of the BBC’s election night coverage, will present reaction and analysis live from the debate venue. Raworth will continue to present BBC News bulletins and will still present the second day of the BBC’s general election night coverage. "Sophie has been remarkable in the pace and the way she’s worked in recent weeks, despite her injury," Husain said. "I can’t see myself ever stepping into her running shoes but she can count on me for this, as the two prime ministerial candidates face each other for their last television encounter." Jonathan Munro, deputy chief executive of BBC News, called the debates "a key moment in the campaign" by giving voters the chance to ask questions of their future prime minister. He added: "We’re wishing Sophie a speedy recovery; it seems it’s not only football managers who need to worry about foot injuries!" The debate, which is happening in Nottingham, will be broadcast on 26 June from 20:15 BST 21:30 BST and BBC iPlayer.
