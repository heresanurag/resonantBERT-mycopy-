  Disco legend Nile Rodgers gets his first ever Brit nomination at the age of 66, with Chic up for best international group alongside Beyonce and Jay-Z, who get a joint nomination for their collaborative album Everything Is Love.

  Janelle Monae and Christine + The Queens, whose albums both tackled themes of gender identity and sexual politics, lead a particularly strong field for best international female.

  Their competition comes from larger-than-life Bronx rapper Cardi B; breakout star Camila Cabello; and the slick pop of Ariana Grande.

  The 2019 Brits Ceremony will take place on Wednesday, 20 February at London's O2 Arena.

  Comedian Jack Whitehall returns as the host, after a successful try-out at last year's ceremony.

  "I know what it is now, I know the game," he said. "You need to be able to think on your feet, throw a few punches, and embrace the chaos."

