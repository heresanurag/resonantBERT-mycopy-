  England's Women's World Cup quarter-final against Colombia will be broadcast on BBC Radio 5 Live and BBC Sounds.

  When do England play Colombia in Women’s World Cup, kick-off time and how to follow it? Last updated on .From the section Women's World Cup

  England are hoping to reach their third successive World Cup semi-final Coverage: Live on BBC TV, BBC iPlayer, BBC Radio 5 Live, BBC Sounds and the BBC Sport website & app. England's Women's World Cup quarter-final against Colombia on Saturday 12 August (11:30 BST) will be broadcast on BBC Radio 5 Live and BBC Sounds. As well as live commentary, highlights will be available to UK users on the BBC Sport website and app throughout the day and at 19:00 BST on BBC Three. The BBC will also show both World Cup semi-finals, while the final will be live on BBC One and BBC iPlayer. The match is being broadcast live on ITV in the UK. Go here for all the latest from the Women's World Cup
