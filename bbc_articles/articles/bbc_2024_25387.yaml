  Wales boss Warren Gatland said: "Gareth has been a great player for Wales over the last decade and he has always given everything in the red jersey. "There have been some really memorable moments, like his tries against England in the World Cup in 2015 and against Australia in the 2019 and 2023 World Cups. He and his family can be very proud of his international achievements. "I know he still has a lot to give rugby and look forward to continuing to watch him play at club level." Last weekend Davies scored two tries as Scarlets won at Cardiff in the United Rugby Championship. He helped the west Wales team win the current competition’s Pro12 predecessor in 2017 with a win against Munster in Dublin. Scarlets head coach Dwayne Peel said: "Gareth has enjoyed an outstanding international career, for Wales and the Lions. “He has played in three World Cups, won Six Nations titles and a Grand Slam and scored some incredible tries. I have enjoyed working with him and look forward to doing so at the Scarlets. “He has been superb for us in the opening weeks of the season and still has a lot to offer us in terms of both playing and his leadership role here."
