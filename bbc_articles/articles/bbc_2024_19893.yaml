  There's more to the social media app than you may think.

  Telegram says it has 500 million users worldwide. Most use the app to chat, but there's more to it than that.

  BBC World Service Disinformation reporter Jack Goodman takes a look at what's behind the rise of Telegram.

  See also: 'Telegram: Why won't you take my naked photos down?'
