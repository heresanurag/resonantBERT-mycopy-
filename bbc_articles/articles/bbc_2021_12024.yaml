title: CBD trial to treat hallucinations in Parkinson’s disease - BBC News
date: '2021-09-24'
section: General
url: http://www.bbc.co.uk/news/health-58667520
content: |-
  Charles Ogilvie-Forbes is a volunteer in a clinical trial at King’s College London.

  Researchers across the UK are trialling a range of cannabis extracts to treat conditions from pain and asthma to brain cancer.

  Charles Ogilvie-Forbes is taking part in a study at King's College London, using CBD to treat the hallucinations he experiences due to his Parkinson’s disease.
