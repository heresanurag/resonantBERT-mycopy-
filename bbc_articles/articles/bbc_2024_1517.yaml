id: bbc_2024_1517
title: 'Ex-Post Office investigator: I was not technically minded - BBC News'
date: '2024-01-11'
section: General
url: http://www.bbc.co.uk/news/uk-67952199
content: |-
  Stephen Bradshaw is questioned at the public inquiry about the problems with the Horizon IT system.

  A former Post Office investigator has told the public inquiry into the Horizon IT scandal he is not "technically minded" and was not equipped to know whether there were errors in the system.

  Stephen Bradshaw, who was involved in the criminal investigation of nine sub-postmasters, said he had heard reports of problems with the software, but insisted he "would expect that to come from the people above".

  Between 1999 and 2015, the Post Office prosecuted 700 sub-postmasters and sub-postmistresses based on the faulty Horizon IT system.
