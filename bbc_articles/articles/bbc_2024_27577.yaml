  Democrats are already engaged in considerable soul-searching, as they come to grips with an election defeat that has delivered the White House, the Senate and, perhaps, the House of Representatives to Republican control. Various elements within the party are offering their own, often conflicting, advice on the best path from the wilderness back to power. Left-wing Senator Bernie Sanders, who twice ran for the Democratic presidential nomination, also criticised identity politics and accused the party of abandoning working-class voters. Some centrist Democrats, meanwhile, have argued that the struggle to connect with voters goes beyond the economy and immigration. They point to how the Trump campaign was also able to use a cultural message as a wedge to fracture the Democratic coalition.

  Among the positions that Republicans targeted in this year’s election were calls to shift funding away from law enforcement, decriminalise undocumented border-crossings and minor crimes like shoplifting, and provide greater protections for transgender Americans. Many arose after the murder of George Floyd in 2020 and the resulting rise of the Black Lives Matter movement, as well as other efforts to advance social justice and acknowledge darker parts of American history. Within a few years, however, some of those positions proved a liability for Democrats when trying to win over persuadable voters and keep their coalition from fraying. Harris, for example, backed away from some positions she’d taken when she first ran for president in 2019.

