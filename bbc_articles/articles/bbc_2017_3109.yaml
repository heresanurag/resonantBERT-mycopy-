id: bbc_2017_3109
title: Romania clashes flare over corruption decree - BBC News
date: '2017-02-02'
section: General
url: http://www.bbc.co.uk/news/world-europe-38836646
content: |-
  Anti-government protests take place in Bucharest, Romania.

  The Romanian capital, Bucharest, has seen one of its largest ever anti-government protests after a decree was passed that could free dozens of officials jailed for corruption.

  Some protesters in the capital threw firecrackers and smoke bombs at police who responded with tear gas.
