title: 'Antoine Dupont: France angry over ''serious'' knee for France captain in Six
  Nations - BBC Sport'
date: '2025-03-09'
section: Irish Rugby
url: http://www.bbc.co.uk/sport/articles/c3w1525d951o
content: |-
  France head coach Fabien Galthie fears captain Antoine Dupont has sustained a "serious" knee injury during their Six Nations victory over Ireland.

  This video can not be played To play this video you need to enable JavaScript in your browser. France captain Dupont goes off injured in first half

  France head coach Fabien Galthie fears captain Antoine Dupont sustained a "serious" knee injury against Ireland in the Six Nations. Dupont, 28, was forced off in the first half of France's dominant 42-27 win over holders Ireland. Ireland second row Tadhg Beirne fell on Dupont's leg at a ruck and the scrum-half was helped off the pitch in Dublin after receiving treatment. Galthie said there was "anger" in the French camp over the incident, which was not referred to the television match official (TMO) during the game. Both Dupont and Gregory Alldritt, who took over as French captain, were heard questioning referee Angus Gardner over a possible review of the incident. Galthie said Dupont was "suffering" and that he has referred Ireland pair Beirne and Andrew Porter to the citing commissioner for possible retrospective punishment. France are waiting to learn the full extent of the injury but fear it is likely to result in a lengthy absence. "We're suspecting something serious," Galthie said. Dupont was attempting to steal the ball in the 28th minute and was challenged by Beirne, who then fell on to the scrum-half's right leg as Irish prop Porter joined the ruck. "We named the players [who made contact with Dupont], Tadhg Beirne and Andrew Porter, who should appear before the disciplinary commission," Galthie added. "We want explanations, so we've named two players. We have to protect our players. There are means, there are rules. There is some kind of anger." France held a narrow 8-6 lead at half-time but overwhelmed the defending champions in the second half and are now favourites to win the title next weekend. "When I return to the dressing room and I see one of my best friends looking like that, it tears up one's insides," said Alldritt. "It is difficult to talk about. However, it added a bit of fire to our bellies for the second half." Galthie also said he would be citing Irish wing Calvin Nash, who replaced the injured James Lowe just before kick-off, for a second-half tackle that led to France centre Pierre-Louis Barassi leaving the pitch with concussion. Nash was sin-binned but the offence was not judged to be worthy of a red card.

  Antoine Dupont was substituted in the 28th minute of France's win over Ireland

  Ireland interim head coach Simon Easterby said the injury to Dupont, who was replaced by Maxime Lucu, came after a "rugby incident". "Tadhg [Beirne] cleans out someone in front of Antoine Dupont and he gets hit on the back of it. It happens, unfortunately," said Easterby. "We have moved away and players have a real awareness now of clearing out on the lower limb of the player, which can create that type of injury that might have happened today, but that wasn't the case. "He was securing his own ball and not making contact on Dupont. Unfortunately that happens. The guy that Tadhg hit was hit on to Dupont. It's just one of those things unfortunately. It happens in the game." Championship leaders France play Scotland in Paris on Saturday and are in pole position to claim a record-equalling seventh Six Nations title, while Ireland will look to bounce back against Italy in Rome.

