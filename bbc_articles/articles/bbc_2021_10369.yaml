  Novak Djokovic displays his frustrations during his bronze medal match against Pablo Carreno Busta, throwing a racquet and then smashing another against a net post.

  Serbia's Novak Djokovic displays his frustrations during his bronze medal match against Spain's Pablo Carreno Busta, throwing a racquet into the empty stands and then smashing another against a net post.

