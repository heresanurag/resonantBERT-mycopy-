content: |-
  The storm is several hundreds of miles from the US Gulf Coast, but its edges have brought significant rainfall to Texas.

  Tropical Storm Alberto, the first named storm of the season, has made landfall on the Mexican coast. At least three people have died in Mexico as a result.

  Although the storm is several hundreds of miles from the US Gulf Coast, its edges have brought significant rainfall to Texas.

  Video from coastal towns like Galveston and Surfside show heavy rain and extensive flooding.
