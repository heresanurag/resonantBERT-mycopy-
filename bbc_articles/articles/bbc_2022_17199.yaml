id: bbc_2022_17199
title: UK has its coldest day since December 2010 - BBC News
date: '2022-12-12'
section: UK
url: http://www.bbc.co.uk/news/live/uk-63940636
content: |-
  The Met Office says a temperature of minus 9.3 Celsius (15F) was recorded in Braemar, Aberdeenshire.

  On the roads, National Highways , which maintains motorways and major A roads in England, said there are delays of up to two hours between junctions 18 and 19 of the M6 northbound following a collision, though it didn't say if the incident was weather-related.

  Traffic Scotland , the equivalent body for Scotland, reports ice continuing to affect driving conditions in the regions of Strathclyde,Lothian and Borders,Central, Tayside & Fife, and theSouthwest.

  On the rail network , disruption to Southern and Thameslink trains is still expected to last until the end of the day. Customers are advised to only travel if "absolutely necessary" and to factor in delays.

  The Gatwick Express, which earlier was suspended altogether, is now running but with a reduced service.

  Great Northern has also now said it is having to cancel services because of the weather and that the disruption is likely to last until the end of the day.

  All four operators have warned that services could also be affected by preparations for the 48-hour strike action set to take place tomorrow and Wednesday.

  Southeastern has said its network continues to be impacted by the weather, though has said services will not be affected by strike action until Tuesday morning.

  On the London underground , as of 17.30, severe delays continue on the Central, Jubilee, and Piccadilly lines, as well as parts of the District line, while there are minor delays on the Circle, Hammersmith & City, Northern, and Victoria lines.

  The Overground is also suffering minor delays and is suspended between Watford Junction and Willesden Junction.
