title: Woman, 19, dies in suspected XL bully dog attack - BBC News
date: '2025-02-27'
section: Bristol
url: http://www.bbc.co.uk/news/articles/c86pp14j0dxo
content: |-
  Two people are arrested as police investigate reports the dog was an XL bully.

  Floral tributes have been left at the scene

  A 19-year-old woman has died after she was attacked by a dog believed to be an XL bully, police have said. Two people have been arrested following the attack at about 19:00 GMT on Wednesday at a property on Cobhorn Drive, south Bristol. Officers confirmed the dog has now been put down. Initial reports suggested it may be an XL bully, but police said it was too early to confirm the breed. A man and woman, both in their 20s, are in custody after being arrested on suspicion of being in charge of a dog dangerously out of control causing injury resulting in death and possession of a prohibited breed of dog.

  This video can not be played To play this video you need to enable JavaScript in your browser.

  The woman's family have been informed and are being supported by a specially trained officer, police said. A neighbour who lives close to the scene said the woman had only lived in the property a few weeks. "She seemed a lovely girl," said the neighbour, who did not wish to give her name. "I am still trying to process this. I was up all night awake trying to process this. "I am shocked. I just can't believe it's happened and she hasn't been there that long." Referring to the dog owner, the neighbour said: "The moment she walked out the door I could hear her, and I ran over to her and said, 'Are you okay?' "She couldn't talk or say a word. It was like she wasn't there because of the shock."

  Police were called to Cobhorn Drive shortly before 19:00 GMT on Wednesday

  Speaking at a press conference on Thursday, Insp Terry Murphy, from Avon and Somerset Police, called the incident "incredibly rare". "The circumstances [officers] faced were "immensely difficult", he said. "Our thoughts, first and foremost, are with the family of the young woman who's tragically died as a result of yesterday evening's incident. "A full investigation is now well under way to establish the full circumstances of the events that led to her death." Police do not consider there to be any ongoing risk to the public, he added, but there will be increased police presence in the area over the coming days. He declined to comment on whether the woman who died lived at the address where the incident happened, or if there had been previous police contact with the household.

  Police were called to Cobhorn Drive shortly after 19:00 GMT on Wednesday

  Doreen Tovey said the incident was "very frightening". "I came out my house to see what all the commotion was," she said. "[There were] loads of police cars, riot van, ambulance across the road from me." Resident Gary Steadman said he heard "screaming" and that the incident was heart-breaking. He also described the dog as "big, butch and brown and white" in colour.

  Doreen Tovey witnessed "all the commotion" on the street

  The road has reopened following a closure for investigative work on Wednesday night. Police have urged witnesses or anybody with information about the incident to contact them by calling 101.
