  On a warm night in Italy's capital city, the national stadium was only a quarter full but the fans present added to a sense of celebration at the start of Europe's biggest football carnival, which had been delayed 12 months by the coronavirus pandemic.

  The 16,000 inside the ground represented the biggest crowd in Italy for a year and a half, while those unable to get a ticket watched the action unfold on big screens set up across Rome.

  With the city hosting a further three three matches during the tournament, authorities have laid on a programme of events, including shows tracing the history of Italy in the Euros.

  The opening ceremony also featured Italy World Cup winners Francesco Totti and Alessandro Nesta kicking footballs into the stands, not to mention trapeze artists performing high above the pitch - but eventually the pre-match spectacle ended and the football finally began, although not before the ball was brought on to the pitch by a remote controlled car.

  Italy coach Mancini had talked about "an extra level of pressure" on his team for being involved in the opening match.

  Portugal in 2004, Switzerland in 2008 and Poland in 2012 are all examples of host, or co-host, nations coming unstuck on the opening night of the European Championship.

  There was pressure on the Azzurri after their failure to qualify for the 2018 World Cup, but this was an impressive start from one of the fancied teams.

  Turkey had beaten world champions France in qualifying but they lacked a real threat without Cenk Tosun, their top scorer in qualifying, who is out of the tournament with a knee injury.

  Both teams are back in Group A action on Wednesday, with Wales providing the opposition for Turkey in Baku (17:00 BST) while Italy take on Switzerland in Rome (20:00).
