content: |-
  Leaders of the far-right group, who were convicted and later pardoned, allege their constitutional rights were violated.

  Proud Boys sue US government for $100m over Jan 6 prosecutions

  The five were convicted in relation to the 6 January 2021 riots, where supporters of Donald Trump stormed the US Capitol in protest of Joe Biden's 2020 win

  Five leaders of far-right group the Proud Boys, who were convicted in connection with the 6 January, 2021 Capitol riot, have sued the US government for $100 million (£74m), claiming their rights were violated during their prosecution. The five were convicted of plotting and taking part in the riot to overturn US President Donald Trump's loss in the 2020 election. Trump pardoned or commuted their sentences earlier this year. The lawsuit, filed in Florida on Friday, claims FBI agents and prosecutors were motivated by personal biases when prosecuting their cases. They argue their constitutional rights were trampled on "to punish and oppress political allies" of Trump.

  The lawsuit was filed by Henry "Enrique" Tarrio, Ethan Nordean, Joseph Biggs, Zachary Rehl and Dominic Pezzola. Tarrio was found guilty of plotting the 2021 attack on the US Capitol, which happened as lawmakers were certifying former US President Joe Biden's 2020 election victory. He was sentenced to 22 years in prison, the longest among the five. He was formally convicted of seditious conspiracy, a rarely used charge of planning to overthrow the government, and multiple other counts. The other four leaders faced similar charges, and were also sentenced to time behind bars. They were given clemency by Trump, who issued approximately 1,500 pardons of people involved in the Capitol riot the day he was inaugurated in January. "These people have been destroyed," Trump said after signing their pardons. "What they've done to these people is outrageous. There's rarely been anything like it in the history of our country." The lawsuit filed on Friday alleges the five leaders of the Proud Boys were subject to "egregious and systemic abuse of the legal system". It accuses prosecutors of engaging in instances of "evidence tampering" and "witness intimidation". It also alleges that their prosecution was "corrupt and politically motivated". The lawsuit was filed against the US Department of Justice, which is currently operating under the Trump administration and is run by Attorney General Pam Bondi. The BBC has approached the Justice Department for comment. Approximately 1,583 defendants have been charged with crimes associated with the Capitol riot, according to figures released by the department in January. More than 600 were charged with assaulting, resisting or obstructing law enforcement officers, including around 175 charged with using a deadly or dangerous weapon or causing serious bodily injury. Capitol Police officers were attacked by rioters with weapons including metal batons, wooden planks, flagpoles, fire extinguishers and pepper spray. Many lawmakers had condemned the riot, while Trump has described it as a "day of love". His pardons of those convicted have been criticised by Democratic lawmakers as an attempt to re-write history. Former House Speaker Nancy Pelosi, who was among politicians forced to flee during the riot, called the pardons "an outrageous insult to our justice system".
