content: |-
  The US president pardoned 'Liberty' and 'Bell' ahead of Thanksgiving, and joked about his age.

  The US president pardoned 'Liberty' and 'Bell' ahead of Thanksgiving, joking that their luck was like getting tickets to a Taylor Swift concert... though he got the singer's name wrong.
