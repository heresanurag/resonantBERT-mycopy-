id: bbc_2018_5803
title: 'Trump: Knife blood on UK hospital floors - BBC News'
date: '2018-05-05'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-44008157
content: |-
  "They don't have guns," the president told the NRA. "They have knives and instead there's blood all over the floors of this hospital."

  President Trump told NRA members at their annual meeting that London knife attacks have left one hospital with blood on the floors.
