  The king, Sánchez and Mazón were all hit by the blowback of public anger over the handling of the tragedy on Sunday, when people in the Valencian town of Paiporta, the worst hit by the floods, threw mud and jeered at them, calling them “murderers”. As the scenes became increasingly violent, the prime minister’s security detail led him away to his car. Mazón stayed near the king and Queen Letizia, who both engaged with some of the local people in an effort to reassure them that everything possible was being done to help. While the wisdom of that visit has been widely questioned, Mazón has since presented a €31.4bn proposal for the reconstruction of the flood-devastated areas, to be financed by the central government. “What Spaniards want is to see their institutions, not fighting with each other, but working shoulder to shoulder,” he said as he announced it.
