  A week on, recriminations fly over who was to blame for Spain's worst natural disaster in living memory.

  Accusations fly in Spain over who is to blame for flood disaster

  Spain's initial unity has been shattered by recriminations a week after the floods

  A week after flash floods hit eastern Spain, recriminations are flying over who was to blame for the country’s worst natural disaster in living memory amid angry scenes on the part of those affected. An initial image of cross-party unity has been replaced by disputes over which institutions had jurisdiction in the disaster areas where at least 218 people lost their lives. In the immediate aftermath of the floods, Valencia regional leader Carlos Mazón of the conservative People’s Party (PP) welcomed Socialist Prime Minister Pedro Sánchez and thanked him for his government’s support. It was an unusual sight in the context of Spain’s deeply polarised politics, with Mazón even calling Sánchez "dear prime minister".

  Valencia's regional leader has faced criticism for taking around 12 hours to respond to a red weather warning by Spain's national meteorological office (Aemet) on 29 October and issue an alert directly to people’s phones, by which time the flood was already causing enormous damage. However, the national leader of the PP, Alberto Núñez Feijóo, questioned the information provided by the Aemet, which is supervised by the central government. He also complained that the prime minister's administration had not co-ordinated with the regional government. In the days since, pressure has mounted on Mazón, with many commentators and political adversaries calling on him to resign for his actions on that day, as well as for eliminating the Valencia Emergency Unit (UVE) on taking office last year. In response, he has taken a more confrontational approach, in line with that of his party boss. That has included blaming the CHJ hydrographic agency, which is controlled by Madrid, for allegedly activating and then de-activating an alert on the day in question. “If the CHJ had re-activated the hydrological alert, the alarm message would have been sent immediately” by the regional government, Mazón said. The CHJ has responded by explaining that it provides data on rainfall and related matters but that it does not issue alerts of this kind. Fifteen thousands troops, civil guards and police have now arrived in the Valencia region, double the number from last weekend.

  Carlos Mazón (in red) welcomed the prime minister (2nd R) to Valencia at the weekend

  Mazón has countered claims that his government did not request enough support from the military in the wake of the weather event, insisting that the armed forces themselves were responsible for such decisions. The head of the military emergency unit (UME), Javier Marcos, responded by saying that protocol dictated that the regional government had to request any such support. “I can have 1,000 men at the door of the emergency but I can’t go in, legally, without authorisation from the head of the emergency,” he said, referring to the Valencia leader. Mazón’s comments about the military reportedly enraged the defence minister, Margarita Robles, who expressed her anger during a crisis meeting of ministers with King Felipe on Monday. Meanwhile, the political situation has been further complicated after calls by Núñez Feijóo for the prime minister to declare a national state of emergency, which would centralise management of the crisis in Madrid, wresting powers from Valencia’s regional government. The leader of the far-right Vox party, Santiago Abascal, has also backed such a measure, which has been ruled out by the government. “Sánchez is the one responsible for not activating all the state resources when lives could have been saved,” he said, denouncing the “evil and incompetence” of the administration.

