  BBC will not appeal against Adams' libel case victory

  The former Sinn Féin leader was awarded €100,000 (£84,000) in damages following a trial last month

  The BBC has confirmed that it will not be appealing against Gerry Adams' libel case victory. The former Sinn Féin leader sued the corporation over a 2016 BBC Northern Ireland Spotlight story and online article on the murder of British agent Denis Donaldson. Last month, a jury found Mr Adams, 76, had been defamed when it was alleged by an anonymous contributor that he sanctioned the 2006 killing and awarded him €100,000 (£84,000) in damages. The combined legal costs of both parties are estimated at €3-5m (£2.5-4.2m), according to sources with knowledge of the case.

  A BBC spokesperson said: "We have given careful consideration to the jury's decision. "We will not be appealing its verdict, bringing this matter to a conclusion. We remain committed to public interest journalism and to serving all BBC audiences."

  In a statement Gerry Adams said the decision should be "followed by a substantial reform of its internal journalistic processes and a recognition that it cannot continue to be a voice for the British state in Ireland". "It must also become more accountable to the public," he added. "There is an onus on the BBC to ensure that in the future its ethics and journalism reflect the principles and values of a public broadcast service. "As I have already said the damages will be donated to good causes."
