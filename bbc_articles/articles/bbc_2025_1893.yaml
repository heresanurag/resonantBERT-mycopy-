title: Israel delays Palestinian prisoner release as hostages freed - BBC News
date: '2025-02-22'
section: Middle East
url: http://www.bbc.co.uk/news/articles/cjry4nqw4z0o
content: |-
  Israeli Prime Minister Benjamin Netanyahu said the prisoners won't be freed until the next release of hostages is guaranteed.

  Palestinians awaits news about the prisoner release in the West Bank

  Israel says it is indefinitely delaying the release of more than 600 Palestinian prisoners, in another potentially major setback in the ceasefire process. Benjamin Netanyahu said the release was now going to be delayed until the next handover of hostages by Hamas was guaranteed - and without what the Israeli prime minister called the degrading ceremonies Hamas has put on each week. Only one more handover - of the bodies of four hostages who died in captivity - is due to take place in the first phase of the ceasefire deal, which is due to end on 1 March. No arrangements for the release of other living hostages, due to take place in the second phase, have yet been made.

  Delegations from Israel and Hamas were due to negotiate the exact terms of the second phase while the first was ongoing - but have yet to meet. Mediators will be working overtime to get the deal back on track and avert a possible collapse, after both Israel and Hamas accused one another of breaking the terms of the agreement. Netanyahu accused Hamas of "repeated violations", including the "cynical use of the hostages for propaganda purposes". In response, Hamas official Izzat al-Rishq strongly condemned the decision to postpone the release of the prisoners in a statement on Sunday morning. He said that Israel's claim that the handover ceremonies were humiliating was a "false claim and a flimsy argument" aimed at evading its obligations under the ceasefire agreement.

  Netanyahu's statement came after four hostages taken captive on 7 October - Tal Shoham, Omer Shem Tov, Eliya Cohen and Omer Wenkert - were released on Saturday. The two other released hostages, Avera Mengistu and Hisham al-Sayed, were held in Gaza for years - Mr Mengistu since 2014 and Mr al-Sayed since 2015. In exchange, Israel was supposed to release 602 Palestinian prisoners. Hamas accused Israel of violating the agreement by delaying the release.

  The six Israeli hostages are the final living hostages to be returned as part of the first phase of a ceasefire agreement. Meanwhile, outside the Ofer Prison in the occupied West Bank, family and friends waited for the release of Palestinian prisoners.

  According to Palestinian authorities, 50 prisoners who were going to be released were serving life sentences, 60 had long sentences, and 445 were detained by Israel since 7 October. There are 62 hostages taken on 7 October 2023 still being held by Hamas, about half of whom are believed to be alive. Hamas began releasing hostages, facilitated by the Red Cross, in exchange for Palestinian prisoners after the ceasefire agreement took effect on 19 January. Initial chaotic scenes have become more choreographed, with hostages flanked by fighters on stages before the handovers.

  On Saturday, Mr Shoham, 40, and Mr Mengistu, 39, were passed to the Red Cross in Rafah in southern Gaza before being transferred to the Israel Defense Forces (IDF). Mr Shoham was visiting family at Kibbutz Be'eri in October 2023 when he and others, including his wife and two children, were kidnapped by Hamas. His captured family members were released after 50 days. In a statement, his family said: "This is an unforgettable moment, where all emotions are rapidly mixing together. Our Tal is with us." Mr Mengistu, who is Ethiopian-Israeli, had been held by Hamas since September 2014 when he crossed into northern Gaza. He and Mr al-Sayed, a Bedouin Arab Israeli who entered Gaza in 2015, had both suffered with mental health problems in the past, according to their families. Mr al-Sayed's release was conducted privately in Gaza City on Saturday. "After nearly a decade of fighting for Hisham's return, the long-awaited moment has arrived," his family said in a statement. "During these days, we need privacy for Hisham and the entire family so we can begin to care for Hisham and ourselves."

  Hisham al-Sayed walking with a member of the Red Cross after his release

  Separately, at Nuseirat in central Gaza, Mr Shem Tov, 22, Mr Cohen, 27, and Mr Wenkert, 23, were freed in another public show by Hamas. All three were taken captive at the Nova music festival. Mr Shem Tov had initially escaped by car when Hamas fighters descended on the festival, but was captured when he went back to rescue his friends. Mr Cohen had hidden with girlfriend Ziv Abud in a shelter at the festival, but was found and driven away. The shelter was bombed, but Ms Abud survived and escaped. Mr Wenkert managed to send text messages to his family when festival-goers were being attacked, to tell them he was going to a safe shelter, but they lost contact with him.

  Eliya Cohen wore a "grateful" hat after he was released

  Omer Wenkert during his release in Gaza

  Family members and supporters of Omer Wenkert reacted to his release

  Crowds in Tel Aviv's Hostages Square greeted the public releases with cheers as they watched them unfold on a live feed. Families celebrating the return of the six men called for all remaining hostages to be released. "Our only request is to seize this window of opportunity to secure a deal that will... return all hostages home," Mr Shoham's family said. His mother, Yael Alexander, who was watching Saturday's hostage release, told the BBC it was "amazing" to see them freed, but for her family it is "very tough" waiting. "There are more than dozens of young men alive, like my son, still waiting to be released," she said. "This is the main goal, to release the live people now from Gaza." Saturday's joyful scenes contrasted with earlier this week, when the bodies of hostages Shiri Bibas, her two young sons and another captive Oded Lifschitz were returned to Israel. About 1,200 people - mostly civilians - were killed in the Hamas attacks on 7 October 2023 and 251 others taken back to Gaza as hostages. Israel launched a massive military campaign against Hamas in response, which has killed at least 48,319 Palestinians - mainly civilians - according to the Hamas-run health ministry.
