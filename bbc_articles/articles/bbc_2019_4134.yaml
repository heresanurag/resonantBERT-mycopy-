title: Marie Antoinette's Versailles apartments on display - BBC News
date: '2019-04-14'
section: General
url: http://www.bbc.co.uk/news/world-europe-47928976
content: |-
  After three years of renovation, the queen's rooms are reopening to the public at the Chateau of Versailles.

  After three years of renovation, French Queen Marie Antoinette's apartments are to reopen to the public at the Chateau of Versailles.

  The rooms were used by the queen for sleeping and receiving guests.
