title: Texas synagogue hostage stand-off not related to Jewish community - FBI - BBC
  News
date: '2022-01-17'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-60013686
content: |-
  All four hostages at a synagogue in Colleyville, Texas, have been freed, the suspect died at the scene.

  A hostage situation at a synagogue in Colleyville, Texas, was "not related" to the Jewish community, according to the FBI's Matt DeSarno.

  Four people were taken hostage by a man at the synagogue on Saturday, and were released safely after an 11 hour stand-off. The suspect died at the scene.

  Update: The FBI's director, Christopher Wray, later said on 20 January that the FBI "is, and has been, treating the event as an act of terrorism targeting the Jewish community."
