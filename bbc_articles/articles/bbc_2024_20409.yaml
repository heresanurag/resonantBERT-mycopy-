  Scott Brash joins team-mates Ben Maher and Harry Charles with a clear round in the team jumping final to secure gold for Great Britain at Paris 2024.

  Scott Brash on Jefferson seals team jumping gold for Great Britain at Paris 2024, with a clear run after his team-mates Ben Maher and Harry Charles only incurred two time penalties.

