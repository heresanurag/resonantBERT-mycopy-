  US debutant Sarah Schmelzel, who had two chip-ins and an eagle in her round, drew level with Sagstrom on the long 14th. Up ahead, Andrea Lee fought back to take Henseleit down the 18th. The German then fell agonisingly short with a 20-foot putt to win a point as the US scrambled a crucial half. That opened the door for Thompson to end her Solheim career in fairytale fashion by securing the winning point, but she missed a birdie putt on the last, and a calm Boutier holed hers to add another blue point. Moments later Maguire completed her 4&3 victory over Ally Ewing to keep Europe in touch at 131⁄2-101⁄2 down - and fans of both teams scouring the scoreboard for where the remaining points would be won. Home favourite Lauren Coughlin, who had come from three down after 10 against Maja Stark, was the first to have a putt to win the trophy, but her 15-footer came up shy and the Swede nervelessly holed from 10 feet to keep Europe alive, albeit at 14-11 down. Switzerland's Valenzuela and Vu were next down the 18th. The American won the 17th with a 15-foot putt to keep her match alive, having been two down with two left to play. She then brilliantly coaxed her approach to the last hole to within two feet and Valenzuela was forced to hole a 30-footer to halve the hole and win the match. She missed, Vu tapped in and the American celebrations started. The final two matches saw Sagstrom win on the 18th to pick up another point for Europe, while Kupcho completed a 2&1 win over Grant on the 17th.
