  The foundations for the US victory were laid on Friday when the US won both sessions 3-1 to open a 6-2 lead. A solid layer was added on Saturday when the hosts repelled a strong European challenge in the morning foursomes and also tied the afternoon fourballs to take a 10-6 lead into Sunday. But Pettersen's players went to bed dreaming of a 'Manassas miracle' - referencing the European Ryder Cup's 'Medinah miracle' when they came from 10-6 down to triumph against all odds in 2012 - and they almost delivered on a warm day near Washington DC. The Europeans all strode confidently but quietly on to the first tee, in complete contrast to their opponents who were revelling in the raucous atmosphere, dancing their way across the tee and further whipping up the expectant home support. Europe needed eight points to reach the 14 they required to lift the trophy for a record fourth successive time and Pettersen said she had no option but to push her "form" players out early in Sunday's 12 singles matches. And English pair Charley Hull and Georgia Hall led from the front. Hull, out first against world number one Nelly Korda, raced to a superb 6&4 win, while Hall delivered a second European point from match three with a similarly dominant 4&3 victory over Alison Lee. But, in between those results, Megan Khang demolished Emily Pedersen 6&5 to put the US 11-8 ahead and within three and a half points of success. Two of those red points quickly followed with Allisen Corpuz beating Anna Nordqvist 4&3, while former world amateur number one Zhang crushed Carlota Ciganda 6&4 to be the only player to score four points this week. But then the nerves crept in with European blue flooding the bottom half of the scoreboard and setting up a dramatic climax on the banks of Lake Manassas. Germany's Olympic silver medallist Esther Henseleit won four straight holes from the eighth to turn around her match from two down to two up against Andrea Lee, while Sweden's Madelene Sagstrom and Ireland's Leona Maguire were also ahead. The European momentum continued with Celine Boutier winning three holes on the trot from the 12th to move level with the retiring Lexi Thompson, and Linn Grant also came from three down against Jennifer Kupcho to be level after nine. But as so often happens, the tide turned.

