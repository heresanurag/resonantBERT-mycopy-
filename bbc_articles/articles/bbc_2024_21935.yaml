content: |-
  The United States claim the Solheim Cup for the first time since 2017 after a tight victory over Europe in Virginia.

  The US claimed a first victory since 2017 and their 11th win in 19 editions

  The United States ended their seven-year Solheim Cup drought with a tight 151⁄2-121⁄2 victory over Europe in Virginia. World number two Lilia Vu delivered the winning moment - holing a short birdie putt on the 18th to secure a half point against Albane Valenzuela - after holders Europe had pushed the hosts close in a tense and thrilling finale. "It could have gone either way, it's crazy how it unfolded," said US captain Stacy Lewis. "It's amazing how often these things come down to half a point here and there and we're happy to be on the right side this time." Europe skipper Suzann Pettersen added: "We gave them a run for their money. We had a chance, there were possibilities and several times we thought we could get it done. "I'm happy for Stacy on home turf but we’ll come back very hungry. "I’ve truly enjoyed it, win or lose. It’s fun to win, a little bit more painful to lose."

