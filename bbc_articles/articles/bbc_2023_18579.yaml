title: Bodycam footage shows police hunting Prague gunman - BBC News
date: '2023-12-22'
section: General
url: http://www.bbc.co.uk/news/world-europe-67799890
content: |-
  A gunman killed 14 people at a university in the Czech capital, before turning the gun on himself.

  Czech police have released bodycam footage of officers searching for a gunman who killed 14 people at a university in the capital city of Prague on Thursday.

  In the video, armed police can be seen searching the university corridors and escorting students out with their hands in the air.

  At a press conference, a police official said that that the gunman, who was surrounded "from all directions", shot himself at the scene.
