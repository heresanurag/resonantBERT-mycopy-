  A judge in South Carolina says the former lawyer will "spend the rest of his natural life" in prison for killing his wife and son.

  Where did all of this take place?

  The murder trial was set against the backdrop of South Carolina’s sprawling Lowcountry, a rural area where oak trees are dripping with Spanish moss and the coastal waterways lead to the Atlantic Ocean. If you enjoy hunting, oyster roasts, or sipping tea on a wrap around porch, then South Carolina’s low country is the place for you. In a lot of ways, Hampton County seems like it’s frozen in time. It’s a sleepy southern town where generations of the same families have grown up together. And it was once a place where the last name Murdaugh could get you really far. Perhaps that’s why these murders — and the air of mystery surrounding Alex Murdaugh himself — has rocked this charming southern village to its core.
