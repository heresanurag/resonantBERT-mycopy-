content: |-
  A private plane has crashed into an empty building in Milan, killing all eight people aboard.

  A private plane has crashed into an empty office block in the northern Italian city of Milan, killing all eight people on board.

  The plane, which was bound for the island of Sardinia, came down after taking off from Milan's Linate airport.

  The pilot was Romanian billionaire Dan Petrescu, 68. He died alongside his wife and their son, Italian media say.

