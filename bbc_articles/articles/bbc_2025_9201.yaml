title: Two teens arrested after kittens found 'mutilated' in Ruislip - BBC News
date: '2025-05-16'
section: London
url: http://www.bbc.co.uk/news/articles/c17rqgl70nno
content: |-
  Two kittens were found dead in a field in Ruislip, west London, on Saturday, 3 May.

  This black duffel bag is thought to have been used to transport the kittens

  A 16-year-old boy and a 15-year-old girl have been arrested after the "mutilated" remains of two kittens were found in a field in west London, police said. The Metropolitan Police said the pair were arrested on suspicion of animal cruelty in connection with the incident in Ruislip on 3 May. They remain in custody. Police had released CCTV footage and an image of a duffel bag thought to have been used to carry the kittens as part of their investigation. "This incident caused great distress in the area and we thank the community for their willingness to share information that aided our investigation," a force spokesperson said.

  Sgt Babs Rock said on Thursday that the kittens were discovered at about midday on Saturday. She said the force was taking the "horrific incident" extremely seriously.
