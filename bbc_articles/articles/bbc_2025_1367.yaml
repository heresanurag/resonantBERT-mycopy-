title: 'Cardiff: City''s derelict Debenhams to become a park - BBC News'
date: '2025-02-18'
section: Wales
url: http://www.bbc.co.uk/news/articles/c743j52zz32o
content: |-
  Plans have been confirmed to turn the former Debenhams store in the city centre into a park.

  An artist's impression shows the proposed new site, in Cardiff city centre

  Plans to turn Cardiff's former Debenhams store into a park by 2026 have been approved by the city's council. The former city centre department store, which closed in 2021, is already in the process of being demolished. Developers Landsec presented plans to Cardiff City Council in August to transform the site into a public square with a splash pad, play park, and a raised terrace with two restaurants overlooking the park. Helen Morgan, St David's shopping centre director, said the planned redevelopment would be "revolutionary" for Cardiff.

  Landsec's £17m investment follows research and a public consultation with over 5,000 locals, which showed that 75% of Cardiff residents believed access to nature and green space should be a priority for the developers. The approved plans include a landscaped square with new trees and native plants to enhance biodiversity and access to nature in the city centre, alongside a splash pad for families. It will also have an open space with a stage for performances, and may host markets, street food vendors, and other events for the community.

