  St David's is aiming to open the square to the public in 2026. Ms Morgan said receiving the approval has been "a huge milestone in this landmark development", and she was delighted that Cardiff council and the community have recognised the positive impact that this space will have on the city. "A new city square will be revolutionary for this part of Cardiff, giving locals and visitors even more reason to spend time at St David's and in the city centre."
