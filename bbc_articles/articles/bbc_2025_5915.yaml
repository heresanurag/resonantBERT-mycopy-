title: King Charles presents honours in return to public duties - BBC News
date: '2025-04-01'
section: General
url: http://www.bbc.co.uk/news/articles/c78jdveg2ydo
content: |-
  Among those receiving honours are Katarina Johnson-Thompson and Alan Titchmarsh.

  King Charles appeared in "good spirits" as he attended his first public engagement since side effects from his cancer treatment stopped him carrying out a visit last Friday. The King hosted an investiture ceremony at Windsor Castle on Tuesday morning, recognising key figures and community leaders. Among those granted honours were reigning world heptathlon champion Katarina Johnson-Thompson, who became an MBE, and TV gardener Alan Titchmarsh, who was appointed CBE. The King, who will be 77 this year, was pictured smiling as he greeted guests.
  • None How does the UK honours system work? Speaking after the ceremony, Johnson-Thompson said of the King: "He seemed in good spirits," adding: "you know it's long, all day, because so many people are getting honoured today. "So he seems in really good spirits and I'm happy to see that he's fit and well." Asked about her conversation with the King, the Liverpool athlete said: "We were just chatting about... the toll that athletics puts on, or sports puts on the human body, and just how long I've been doing it." "He also mentioned that you need a good physiotherapist."

  Alan Titchmarsh was made a CBE for services to horticulture and charity

  Meanwhile, Alan Titchmarsh praised the King for his "boundless energy" despite his cancer diagnosis. Over the weekend the King rested at Highgrove, his estate in Gloucestershire, and will continue his return to public duties this week. His engagements are set to include his weekly audience with the prime minister, and an event marking the 50th anniversary of independence for Papua New Guinea. After attending hospital last Thursday, he was said to have been feeling well later that day and carried out some work in his study at Clarence House before having dinner with the Queen. A Palace source described the hospital visit as a "most minor bump in a road that is very much heading in the right direction".
