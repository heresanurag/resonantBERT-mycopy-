title: King of the Fells runner Joss Naylor dies aged 88 - BBC News
date: '2024-06-29'
section: Cumbria
url: http://www.bbc.co.uk/news/articles/c1e53k82n7no
content: |-
  Tributes are paid to the legendary, record-breaking Lake District fell runner Joss Naylor.

  Joss Naylor was known for his incredible running achievements and support for local charities

  Record-breaking veteran fell runner Joss Naylor, who was known as the King of the Fells, has died aged 88. The sheep farmer broke the Lake District 24-hour record three times and ran the fastest known times on the Three Peaks, Welsh 3,000ers and Pennine Way. The Climbers Shop in Ambleside wrote on Facebook that he died on Friday evening "in the company of family and friends". The Fell Runners Association said it was "hugely saddened" by his death, adding he "inspired so many".

  His friend Terry Abraham described him as a legend, external who was "respected around the world".

  Born in Wasdale Head, Cumbria, Mr Naylor took up running in 1960. In 1986, aged 50, he ran all 214 Wainwrights in seven days. When he turned 60 he ran 60 Lakeland fell-tops in 36 hours and at 70 ran 70 Lakeland fells. In February 2021, he told BBC Countryfile he was running two to three times a week on the fell tops among "the best views on this earth". Mr Naylor was appointed an MBE for services to sport and charity in 2007.

  Chairman of The Fell Runners Association, Stuart Ferguson, said: "We are hugely saddened by the news that the legend that is Joss Naylor has passed away. "Joss inspired so many and will be ever remembered for what he gave to our unique sport."

  Mr Naylor took part in a 24-hour running record at Crystal Palace in 1977

  Mr Naylor was a patron for the Brathay Trust, external, which said he used his long-distance races to raise about £40,000 for the youth charity between 2007 and 2019. "He's known for his incredible running achievements, but he used his running to support local charities, including disadvantaged children and young people," fundraising manager, Scott Umpleby, said. The charity said Mr Naylor "didn't hesitate" to say yes to becoming a patron in 2007. Mr Umpleby said the trust would put on races and Mr Naylor "attended every year" until he suffered a stroke in 2021.

  He was described as a "humble, down to earth man whose incredible athleticism was known and respected around the world"

  "He was always so positive... his legendary status was so wide and we would get queues of people to see him," Mr Umpleby said. "Last year, he was determined to come and watch - even from his wheelchair. "On a personal level, I started fell running and racing as a teenager in the 1980s and Joss was already a legendary figure. I really looked up to him."

  Joss Naylor was described as a "legendary figure" in fell running

  Mr Abraham, a broadcaster and photographer, wrote a tribute on Facebook describing his friend as a "humble, down to earth man whose incredible athleticism was known and respected around the world, let alone within Cumbria". "I admired and respected Joss from afar years prior to our meeting and have stayed friends since." Mr Abraham said his friend would "no doubt be up there now looking down upon his ancestral home" in the Lake District.

  Mr Naylor in Eryri in 2021 for the 50th anniversary of the 1000m Welsh Peaks Race

  A Facebook tribute, external from the 1000m Welsh Peaks Race, which Mr Naylor completed several times in the 1970s, said he had left a "legacy of excellence." "The fell and mountain running community across the UK will have been touched by his stalwart presence over decades, and now his sad passing. "Thank you for leaving a legacy of excellent running in the Welsh 1000m Peaks Race, with many notable wins in the the race's first years of the 1970s.

  Mr Naylor ran the Welsh 1000m Peaks Race several times in the 1970s
