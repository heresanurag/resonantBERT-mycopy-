content: |-
  Chloe Ayling tells the BBC how she dealt with victim blaming, online trolls and telling her story again.

  Drugged and kidnapped model says people still call her a liar years on

  A new BBC drama tells the story of model Chloe Ayling who was kidnapped in 2017

  Model Chloe Ayling was kidnapped after being lured to a fake photo shoot in Milan. She was released six days later, but her ordeal was far from over - seven years on, she is still being called a liar. "Headlines really stick in people's minds, even years later," Ms Ayling tells the BBC, explaining that she still receives online abuse from people questioning her account. Her story is being told in a new six-part BBC series, Kidnapped: The Chloe Ayling Story. The series, which follows Chloe's experience being kidnapped and the media storm that followed, is based on police interviews, court transcripts and personal accounts - with some scenes created for dramatic purposes. Ms Ayling faced years of doubts about her ordeal with people accusing her of faking her abduction, profiting from it and being involved in a publicity stunt. But she's since worked with the drama's writer Georgia Lester and producers to tell her story. "All I wanted was [the] facts to be laid out and everyone to know what actually happened," Ms Ayling says. She hopes her experience will help others. "This should be a lesson for people not to judge victims based on the way they act or react," she adds.

  Actor Nadia Parkes plays Ms Ayling in the six-part series released in August

  Ms Ayling's ordeal began in July 2017 when she was lured from London to Italy on the promise of a photo shoot by Lukasz Herba, who drugged her and took her to a remote farmhouse in a holdall bag. Lukasz Herba said she would be sold online if she could not provide a $300,000 (approximately £230,000) ransom fee. He released her to the British consulate in Milan six days later. When Ms Ayling, then 20 years old, returned to the UK she came under fire - she was accused of posing for the cameras and smiling. Finding herself at the centre of so much media attention, Ms Ayling remembers: "It was just so big and overpowering. "It was blown out of proportion, there were things that were missed out and it was going in a direction that was not true." On the topic of smiling when she arrived home from Italy, Ms Ayling says: "That was genuinely how I was feeling at the time. I was happy to be home. I was happy this was over, so why shouldn't I be smiling?"

