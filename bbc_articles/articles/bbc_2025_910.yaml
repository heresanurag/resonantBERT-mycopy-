content: |-
  One patient waits 24 hours for a bed in the emergency department.

  The BBC has been filming inside the Royal Free Hospital in London, looking at how the NHS is coping with intense winter pressures.

  At one point, a "full capacity protocol" is activated - and one patient is forced to wait 24 hours for a bed in the emergency department.

  Follow live coverage from the hospital here.
