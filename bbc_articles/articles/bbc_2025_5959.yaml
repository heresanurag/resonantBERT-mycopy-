title: Drone video shows Universal theme park site in Bedfordshire - BBC News
date: '2025-04-10'
section: General
url: http://www.bbc.co.uk/news/videos/c0l0058528zo
content: |-
  The 476-acre complex on a former brickworks near Bedford will also include a hotel and shops.

  Aerial pictures showed the scale of the UK site earmarked for Universal's first theme park in Europe.

  The attraction - which will also include a 500-room hotel and a shopping centre - is to be built on a former brickworks near Bedford.

  Universal said the 476-acre complex could attract 8.5 million visitors in its first year and could be expanded to 700 acres.

  A full planning proposal will be submitted to the UK government, with construction expected to start in 2026.

