title: Machete attack outside Manchester city centre bar - BBC News
date: '2018-03-17'
section: Manchester
url: http://www.bbc.co.uk/news/uk-england-manchester-43441576
content: |-
  A man is left with life-changing injuries after the "chilling" attack outside a bar in Manchester.

  Police described the assault as a "chilling" attack on an "innocent man"

  A man has been attacked with a machete outside a city centre bar.

  The victim, who is in his 30s, is in hospital with life-changing injuries after he was assaulted outside Barca on Catalan Square in Manchester at about 22:10 GMT on Friday.

  He was attacked after asking a man who had shouted abuse at a group to calm down, police said.

  Det Insp Mark Davis, from Greater Manchester Police, said it was a "chilling" attack on an "innocent man".

  The three offenders fled from the scene on foot and with a bicycle.

  Police said the victim had been in the bar with friends.

  The attacker walked past the victim and shouted abuse at a group.

  The offender then turned to a friend and asked for the machete.

  The friend brought over a backpack, which the offender pulled the machete out of, before turning and striking the victim's hand with it.

  Greater Manchester Police have asked for anyone who saw the assault to contact them.

