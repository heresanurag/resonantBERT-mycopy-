  To get back to the top of the table has only taken Adams and new manager Paolo Vanoli, a former Rangers defender, five Serie A games. Adams scored the winner in the 3-2 win at Verona last week to send Torino into first place and combat any pre-season pessimism, which has seen friction between supporters and owner Urbano Cairo. That came after former boss Ivan Juric - appointed Roma manager last week - left, having guided Torino to ninth last season, while key defenders Alessandro Buongiorno and Raoul Bellanova joined Napoli and Atalanta respectively. Vanoli replaced Juric after taking Venezia from second bottom of Serie B to promotion in 19 months. After Torino scored just 36 league goals last season, it is also easy to see why Adams - who netted 16 times to help Southampton to promotion from the Championship last term - was in demand. He repaid that faith on his full debut, with a goal and an assist in a 2-1 comeback win against Atalanta. Now, as early pacesetters, they host Lazio on Sunday. Few would back Torino lasting the pace, but it does not stop a clearly relaxed Adams from revelling in his new surroundings. "They want to aim high. Hopefully we can stay around there and that's lined up with what I want in this stage of my career," he says, having enjoyed the subtle differences in Italy - like travelling to last month's game at Venezia by boat. "You can be the top guy one week and then the zero the next. It's just about being humble, which is what the manager wants. He just says to stay humble, we're doing that and, if we keep going, we'll be fine."
