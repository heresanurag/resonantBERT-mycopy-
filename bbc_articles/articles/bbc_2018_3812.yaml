id: bbc_2018_3812
title: Jeremy Corbyn reacts to May's Brexit speech - BBC News
date: '2018-03-02'
section: General
url: http://www.bbc.co.uk/news/uk-politics-43261015
content: |-
  Jeremy Corbyn sums up Theresa May's big Brexit speech as "yet more confusion on the road to complications".

  Theresa May gave "some concessions" and there was "some movement" on the government’s Brexit stance, the Labour leader says, but she offered "no clarity and no real sense of priorities".

  Jeremy Corbyn told the BBC's Norman Smith the PM's speech was "yet more confusion on the road to complications".
