title: 'New-build homes: Wrexham residents plagued by problems - BBC News'
date: '2024-11-16'
section: Wales
url: http://www.bbc.co.uk/news/articles/c624528pjr7o
content: |-
  One man says his £250,000 home had kitchen sockets hanging out of walls, and holes in the ceiling.

  Five-year-old Riley and his mum, Shelby Brown, were crossing the road with a group near their house when he bruised his leg in a broken drain

  Buying a home on a brand new estate is meant to offer peace of mind, free from the potential pitfalls of older homes. But people living on Fern Meadow in Wrexham have been plagued by issues including unfinished roads and pavements, flooding, and loose sockets and holes in their ceilings. Shelby Brown's five-year-old son Riley was injured when he fell down a broken drain cover while trick or treating. Anwyl Homes said health and safety advice was given to home buyers while Bellway Homes - joint developer of the estate in Llay - added it was in "regular communication with affected residents".

  The 360-home development was built in 2020, but most of the estate's roads and pavements are yet to be surfaced. While out on Halloween, Riley's foot went through a gap in a drain cover, leaving him with bruises up his leg.

  Anwyl sent its best wishes to the family and said the gully cover had immediately been replaced. But Ms Brown said she felt "shrugged off" after being told the company "did not believe" it was responsible as it told home buyers to "take extra precautions" on unfinished roads and use the "footpaths provided". Ms Brown said the response was "absolutely shocking".

  Melissa Brimer and James Evans said the condition of the new estate gives a "bad impression"

  This incident brought into sharp focus the problems that have plagued Fern Meadow residents since they started moving in four years ago. Drainage system problems, flooding, and construction issues inside and outside their homes are chief among the complaints. One resident, who did not want to be named, said what happened to Riley was "not a surprise" and there were other safety hazards, including loose manhole covers.

  Riley suffered bruising to his leg when his foot slipped through this hole

  He paid £250,000 for his Bellway home two years ago and said, when he moved in, the list of unfinished work included kitchen sockets hanging out of walls, holes in the ceiling and flooding in his back garden. He added he discovered one issue that could have been fatal when he was trying to install some lights. "The fuses were the wrong way around," he said. "The wires were live. I had a tester, so I realised. I'd be dead if not."

  Residents have complained about many issues, including flooded gardens

  For James Evans and Melissa Brimer, who moved in just over 18 months ago, it is the look of the estate that is a big concern, with unfinished roads and makeshift ramps. Mr Evans said the "lack of communication" and "poor after-sale care" was frustrating. "No-one from the developers comes here to explain the timescales," he said.

  Another resident, who did not want to give their name, said he and his partner commissioned their own independent engineering report after persistent flooding in their garage, driveway, and garden. They also notified the National House Building Council, external (NHBC) about issues inside including a sinking kitchen floor and a gas leak which left them with no heating, but said developers seem "not to be answerable to anyone". "You are left in a wilderness. You would have better consumer protection if you were buying a pair of shoes," they added.

  Developers say work to get the roads and pavements finished is getting underway

  Both developers have apologised for the delays in completing work on the roads and pavements, but said progress was being made. Bellway homes said it would continue to work with residents, but in some cases, access to properties had prevented them from carrying out work. Regarding concerns about manhole covers, Bellway said keys were needed to lift them and any loose covers had been "remedied" when spotted by the onsite team. Another Wrexham Bellway development, Gatewen Village in New Broughton, has also been suffered flooding while waiting for drainage works to start. The house builder is also dealing with complaints about flooding and outstanding snagging issues on other developments including in one in Cambridgeshire. Swansea-based snagging expert John Cooper said the issues at Fern Meadow were common on new-build estates across the UK, with too few quality tradespeople to cope with the demand.

  One resident said he had easily lifted a number of manhole covers near his house

  Fern Meadow was controversial before it was even built - plans were rejected by Wrexham council, only to be given the green light by the Welsh government's planning inspector. He believes people who moved in had been "let down", saying residents who complained were told "it's a private matter, sort it out between yourselves". Fellow councillor Bryan Apsley said "it seems like it's been a disaster from day one". The Welsh government said its permission included land drainage works to be submitted to the council, and it was the authority's job to enforce planning conditions. The council told the BBC developers were responsible until it was happy that "drainage, roads and footways are completed to a satisfactory standard for adoption". NHBC said its 10-year warranty "protects homeowners in the event of serious structural defect" but said snagging issues were the builder’s responsibility.

  Mr Cooper added: "Developers are just management companies who sub-contract the work out," he said. He added buyers were at the mercy of who was doing the work, saying: "You might have the best tradesman working on your build or the worst. "Developers are selling the perfect dream. But they are not construction companies, they are just sales companies."
