  Olympics will go ahead 'even if Tokyo still in state of emergency'

  The Olympic Games will go ahead even if Tokyo remains in a state of emergency due to the pandemic, a senior member of the International Olympic Committee says. Tokyo is one of nine prefectures of Japan to be under emergency measures, which will stay in place until at least 31 May. John Coates, the chair of the IOC's coordination commission, says this will not affect the Games - even if the capital is still under the measures by the time they open on 23 July. "We've successfully seen five sports hold their test events during the state of emergency," he says. "All of the plans that we have in place to protect the safety and security of athletes and the people of Japan are based around the worst possible circumstances, so the answer (to whether a Games could take place during a state of emergency) is absolutely yes." The Japanese government has called on Games organisers to further reduce the number of overseas visitors, insisting that only those essential to the operation of the event come into the country. Overseas spectators have already been barred, and a decision on how many - if any - Japanese fans can attend will be taken next month.
