  David Mason, defending Gumrukguoglu, agreed "there were people higher up" but accepted his client had been an "important cog in the wheel". He said Gumrukguoglu had taken on the operation because he was trying to "pay off a very significant drug debt" after losing another batch of drugs in the Netherlands. Judge Benson took the pair's previous guilty pleas into consideration, but said their "substantial and important" role meant their sentences would be significant. "If people like you were not prepared to smuggle large quantities of cocaine then cocaine would not be available for addicts in the UK," he said.
