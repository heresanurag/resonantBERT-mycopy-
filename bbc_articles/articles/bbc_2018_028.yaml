id: bbc_2018_028
title: UKIP leader Henry Bolton 'not standing down' - BBC News
date: '2018-01-21'
section: General
url: http://www.bbc.co.uk/news/uk-politics-42767154
content: |-
  UKIP Leader Henry Bolton has faced repeated calls to quit over offensive texts sent by his former girlfriend.

  Speaking to the Sunday Politics, before a vote of no confidence in him by the party's NEC, he insisted he will refuse to resign.
