title: Which schools are closed during the Scottish teachers' strike? - BBC News
date: '2022-11-22'
section: Scotland
url: http://www.bbc.co.uk/news/uk-scotland-63660880
content: |-
  The majority of Scottish schools will close on Thursday

  The biggest Scottish teachers' strike in decades brought learning to a standstill on Thursday.

  Industrial action by the Educational Institute of Scotland (EIS) and the Association of Head Teachers and Deputes Scotland (AHDS) over pay saw almost all primary and secondary schools closed on 24 November.

  Talks to avert the strikes failed to come up with an improved pay deal.

  EIS members have rejected an offer of up to 6.85%, saying they wanted 10%.

  Each Scottish council has made its own arrangements for the strike action.

  All primary and secondary schools in the city are closed to pupils. Schools have written to parents and carers to inform them about arrangements, but early learning and childcare provision will be open as normal.

  Aberdeenshire Council said it would not be possible to safely open any schools. The buildings are closed to all pupils, and this will affect all primary and secondary schools. However, it will not affect early learning settings.

  All primary and secondary schools in Angus are closed. Nurseries at Andover, Inverbrothock, Northmuir, Seaview, Southesk and Warddykes are open as usual on this date, and early learning and childcare centres at Carnoustie and Forfar will also open as normal. All other school-based childcare settings will be closed.

  All schools are closed to pupils with no online learning available. Nursery provision will operate as normal in all establishments except Arinagour, Easdale, Kilmodan, Kilchattan, Rhunahaorine, where alternative childcare arrangements should be made. Families entitled to free school meals will receive a payment in lieu of their entitlement for this day.

  All schools are closed and staff who are not striking will work from home. Headteachers will send out details of learning and pastoral support as soon as possible. Nursery classes within primary schools will be closed. All other settings will be open. Those eligible for free school meals will take home Thursday's lunch on Wednesday with instructions for keeping it fresh.

  All Clackmannanshire's secondary, primary and special schools are closed, with the exception of the Park, Menstrie, Tulach and Sauchie early learning centres. These are staffed by non-teaching staff. All others based within primary schools will be closed. The council will support families entitled to free school meals who will get an additional payment.

  All primary and secondary schools and council nurseries are closed. Nurseries not operated by the Comhairle are expected to be unaffected: An Cotan, Stornoway Playgroup, Ravenspoint and Cothrom Og. Stornoway Childcare Centre will be open as normal. No dedicated home to school transport will operate. A payment will be made to bank accounts for any children registered for free school meals.

  All primary and secondary schools will be closed. It is expected that all early learning and childcare provision will also be unable to open. The council said it was still working with senior staff across Dumfries and Galloway to risk assess the opening of school nurseries.

  All Dundee City Council primary schools, attached nursery classes, secondary and special schools are closed. Arrangements are being made for free school meal payments to be made. The closures will also involve Kingspark School and the Rockwell Learning Centre.

  However, the following early years settings will be open: Caird View Nursery, Hill View Nursery, Longhaugh Nursery, Ballumbie Early Years Centre, Fintry Early Years Centre, Rowantree Early Years Centre, Downfield Early Years Centre , Claypotts Early Years Centre, Wallacetown Nursery, Baluniefield Nursery, Coldside Nursery, Law Nursery, Woodlea Children's Centre, Frances Wright Nursery , Jessie Porter Nursery , Menzieshill Nursery , Balgay Hill Nursery, Quarry View Nursery.

  No secondary schools are expected to open during the strike

  All schools in East Ayrshire Council are closed. It is anticipated that all early childhood centres will operate as normal. Arrangements are still being confirmed for pupils who receive a free school meal.

  All East Dunbartonshire primary, secondary and additional support needs schools are closed. All early years centres will remain open as these are not affected by the strike action.

  All schools and early learning and childcare settings are closed. All home to school transport will not operate, and a payment will be made for children who qualify for a free school meal.

  All primary, secondary and additional support needs schools are closed. A limited service is expected in family centres and nursery classes, and further details will be provided by individual establishments.

  All local authority schools, including additional support needs schools, and nursery classes in primary schools are closed to pupils. All council run early learning and childcare centres will remain open. A payment will be made for children entitled to a free school meal.

  All schools are clsoed to pupils - this impacts high schools, primary schools, special schools, nurseries, early learning, additional support needs units and childcare services. The council is making arrangements for free school meals and details will be issued through individual schools.

  All primary, secondary and additional support needs schools are closed. Standalone nurseries will remain open but nursery classes will be closed. Families who are eligible for free school meals will receive a payment for the strike day.

  All Primary Schools including council early learning settings, and all secondary schools, special schools and off-site provision are closed to pupils on 24 November. School crossing patrols and school transport will not operate. A payment will be made for those children and young people entitled to a free school meal.

  The council is still working through details and will communicate those to parents as soon as possible but at this point it was expected that all schools would be closed if the strike goes ahead.

  The latest strikes will fall as senior pupils prepare for prelim exams

  If the action goes ahead, all council early learning and childcare settings are closed apart from Scots Corner which will operate as normal. All schools and additional support provisions will also be closed to pupils. Home to school transport will not operate and a payment will be made for those children and young people entitled to a free school meal.

  Moray Council has confirmed all primary and secondary schools are closed. Early learning and childcare settings are not affected and will open as normal.

  All schools in North Ayrshire are closed. All standalone early years centres and a number of early years classes within schools are expected to remain open. Parents and carers will be notified directly by their child's establishment if the early years class will be open. Children who receive a free school meal will be able to access a packed lunch on Thursday, collected from the nearest school, between 11:00-13:00.

  With the exception of the 23 individual family learning centres and 52-week school-based nurseries, all educational establishments, including primary, secondary and additional support needs schools, as well as 58 other school nursery classes, are expected to be closed to pupils.

  Orkney's two main secondaries - Kirkwall Grammar School and Stromness Academy are closed. Three junior high schools - Stronsay, Sanday and Westray - will also be closed. The primary schools open are: Eday, North Walls, Papay and Rousay. The status of Burray, Hope and North Ron primaries is not yet known.

  Nurseries which will be open are Dounby, Eday, Glaitness, North Walls, Papay, Papdale and Rousay. Shapinsay is partially open for P1-4 and its nursery until 13:00. The Strynd and Willow Tree nurseries are open.

  Perth and Kinross Council schools and nurseries are closed to pupils. All kids clubs and wraparound care will also be closed. Free school meal payments will be made. All pupils at Fairview will receive payments for free school meals.

  Primary schools, secondary schools, additional support needs schools, council nursery classes that only open during term time are clsoed. All council nurseries that are open all year round will operate as normal. This includes all early learning centres and the following nursery classes: Bridge of Weir, East Fulton, Houston, Lochwinnoch, St Anne's, St Catherine's, St John Bosco, St Margaret's and Williamsburgh.

  Schools are closed for all pupils but all early learning and childcare provisions will be open.

  All schools in Shetland, apart from Cullivoe Primary School and Skeld Primary School and most early learning and childcare settings, are closed. Both Cullivoe and Skeld schools will have normal school transport arrangements. Isles Haven Nursery, including the Old Infants room in Lerwick will be open as will the out-of-school clubs at Islesburgh, Sandwick and Brae.

  Some nurseries will be open, with arrangements set up by each council

  All council primary, secondary and special schools in South Ayrshire are closed. Arrangements will be put in place to ensure that pupils entitled to a free school meal will still be able to get one. The council's Cherry Tree, Girvan, Prestwick North, Space Place and Wallacetown early years centres will operate as normal.

  It is anticipated that no South Lanarkshire primary, secondary or additional support needs schools will be able to open for pupils that day. This includes nursery classes in primary schools.

  All of its primary schools, secondary schools and additional support needs provisions, including Castleview Nursery, are closed. Stand-alone nurseries and nursery classes will remain open as normal.

  All West Dunbartonshire schools, including early learning and childcare centres attached to schools, are closed. A small number of standalone early learning centres will be open to pupils. Families with pupils who are entitled to free school meals will receive a payment.

  Centres which will open as normal are: Auchnacraig, Dalmonach, Andrew B Cameron, Ferryfield, Bellsmyre, Gartocharn, Braehead, Kilbowie, Brucehill, Lennox Faifley, Clydebank, Whitecrook and Dalmuir.

  All council schools, including additional support needs schools, are closed to pupils. All council early years centres and nurseries will remain open. A payment will be made for those children and young people entitled to a free school meal.
