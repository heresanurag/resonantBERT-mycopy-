title: Woman, 40s, arrested over death of Steve Bruce's grandson - BBC News
date: '2024-12-17'
section: England
url: http://www.bbc.co.uk/news/articles/cx26nzzdpeyo
content: |-
  Police arrest and bail a woman in her 40s over the death of Madison Smith – the grandson of Steve Bruce.

  Bruce said he had been touched by fans' tributes

  A woman has been arrested in connection with the death of the baby grandson of former Manchester United star Steve Bruce. Greater Manchester Police (GMP) confirmed a woman in her 40s had been arrested and bailed pending further inquiries on suspicion of child neglect. Officers found a dead baby at an address in Trafford Borough at around 07:10 BST on 18 October. Four-month-old Madison was the child of former Leeds, Fulham and Millwall striker Matt Smith, 35, who is married to the Blackpool manager's daughter Amy, 37.

  A GMP spokesman said: "At approximately 7:10am on Friday 18 October 2024 officers responded to a concern for welfare in Trafford and sadly found a baby deceased. "A woman in her 40s was arrested on suspicion of child neglect and has been bailed as we continue to investigate the circumstances surrounding this death."

  Bruce, current manager of League One club Blackpool, missed the team's game against Barnsley on 19 October following the incident. Later that month, the 63-year-old said in a message posted on the club's official X account: "It's been the worst time of my family's entire lives and is something no family should have to endure. "I'd like to take this opportunity on behalf of all the family to thank everyone for the tributes and messages from inside and outside the footballing world. It has touched us all."
