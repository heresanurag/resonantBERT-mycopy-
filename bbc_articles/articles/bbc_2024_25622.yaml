  When questioned about saying he was in Hong Kong during the Tiananmen Square massacre, Walz says he "misspoke".

  During the debate, Democratic vice president candidate Tim Walz was pressed over past statements he made on his military record and Tiananmen Square.

  When questioned about previous comments that he was in Hong Kong when the Tiananmen Square massacre happened in June 1989, Walz says he "misspoke".
