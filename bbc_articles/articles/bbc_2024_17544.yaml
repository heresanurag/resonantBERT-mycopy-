  Gareth Southgate is approaching his 100th game, so it is time to test your knowledge of the England boss.

  How well do you remember Southgate's 99 England games?

  Gareth Southgate will take charge of his 100th England game when he leads the Three Lions in their Euro 2024 quarter-final against Switzerland on Saturday. With the century approaching, it is time to see how well you remember Southgate's first 99 games in charge. Take our quiz to see if you have been paying attention!
