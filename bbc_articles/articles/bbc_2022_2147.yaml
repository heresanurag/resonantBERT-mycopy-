content: |-
  Russian troops have entered Kharkiv, where they are figthing Ukrainian soldiers on the streets.

  Russian troops are now inside the country’s second-largest city, Kharkiv, where they are fighting Ukrainian soldiers on the streets.

  The Ukrainian soldiers are seen firing rocket-propelled grenades on street corners.
