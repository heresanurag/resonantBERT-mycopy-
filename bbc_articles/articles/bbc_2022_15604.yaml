title: 'Ukraine war: Soldiers receive rapturous welcome in liberated Kherson - BBC
  News'
date: '2022-11-12'
section: General
url: http://www.bbc.co.uk/news/world-europe-63607628
content: |-
  Footage from social media shows a Ukrainian soldier shouting "Greetings from Kherson".

  Ukrainian forces who entered the city of Kherson after Russia announced its withdrawal from the west bank of the Dnipro River have been warmly greeted by residents.

  Moscow says about 30,000 Russian troops have been pulled out of the region, although the BBC is unable to verify that figure.
