content: |-
  The actor will make his comeback as Dr Victor Von Doom, a prominent villain in the comic books that spawned the popular Marvel film series.

  Robert Downey Jr is returning to the superhero world after five years - but not to the Iron Man role that launched the blockbuster Marvel franchise.

  The actor will make his comeback as Dr Victor Von Doom, a prominent villain in the comic books that spawned the popular film series.

  Downey Jr appeared on stage concealed behind Doctor Doom's iconic mask and green cloak before unveiling himself to fans.

  He will appear in Avengers: Doomsday, which is due to be released in May 2026, and a further instalment titled Secret Wars a year later.
