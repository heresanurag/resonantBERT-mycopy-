  Three children, aged 14, nine and seven, were reported missing after a day at Thorpe Park.

  Three children were reported missing after a day at Thorpe Park

  Three children who went missing after a day at Thorpe Park have been found safe in London, police have said. Khandi, 14, Amelia, nine, and Malik, seven, were reported missing at about 19:00 BST on Monday after a visit to the attraction in Chertsey. The group, who were all known to each other, had been on a planned day out and had travelled to Surrey from Milton Keynes, police said. Det Supt Trevor Struthers said: “We appreciate the concern this incident caused, especially given the children’s ages and the fact that they were missing overnight.”

  Det Struthers said police officers and staff had worked "tirelessly" to find the children and were "all relieved" they had been found safe. He said: "We have received a huge amount of information and support from both the public and the media, and we would like to thank everyone who provided information and shared our appeal.” The children were seen walking towards Chertsey town centre at about 15:17 on Monday, police said. A florist in Chertsey said she believed the children came into her store at 15:50. This was captured on CCTV. Samantha Williams, who owns House of Flowers, said the oldest child, a girl, asked for directions before the group exited the shop in the direction of a nearby train station. “They were rushing a bit. The kids were just wandering around the shop, not distressed at all,” she told BBC News. “She was watching them. I got the impression they didn’t know the area." Police have not confirmed if the sighting was of the children.

