title: Sinn Féin refuses to nominate deputy first minister - BBC News
date: '2017-01-16'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-38640366
content: |-
  Stormont faces collapse after Sinn Féin refuses to nominate deputy first minister.

  Nominating officer Michelle O'Neill said the DUP's actions had "diminished the credibility" of the political institutions and said it was now "over to the people to have their say".
