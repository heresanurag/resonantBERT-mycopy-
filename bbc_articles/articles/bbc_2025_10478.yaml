title: York Outer MP urges rethink on football stands alcohol ban - BBC News
date: '2025-05-03'
section: North Yorkshire
url: http://www.bbc.co.uk/news/articles/cly1xy34gk6o
content: |-
  Luke Charters say a conversation is needed about the ban on alcohol in view of the pitch in England.

  A York MP has called for a "modern approach" to rules on drinking at football matches

  Football needs a "modern approach" to alcohol being drunk in the stands, an MP has said. Legislation from 1985 bans fans from consuming alcohol in view of the pitch in the top five tiers of the men's game in England. At the time it was part of attempts to eradicate hooliganism, but other sports were not affected by the ban. Labour MP for York Outer Luke Charters said it was time trials took place to see what impact lifting the restrictions might have.

  "Its been 40 years since alcohol was banned in view of the pitch," he said. Charters said it has created an anomaly in that supporters of other sports are free to enjoy a drink while watching their chosen games. "I just think we need a modern approach to a modern game," the MP said. "You look at fans in Germany and in Italy, they are still able to have a beer while they are cheering on their team." Charters accepted it would not work on every occasion. "We do need those family zones where it won't be appropriate." The Football Supporters Association (FSA) said it backed the MP's comments "absolutely" and would welcome trials in the men's game. A spokesperson said: "In the past this is actually something many clubs have called for too."

  Luke Charters says he wants to start a conversation on the issue

  A trial on allowing the consumption of alcohol in view of the pitch has taken place in the women's game, which is not covered by the 1985 ban. Four clubs - Bristol City, Southampton, Birmingham City and Newcastle United - have participated in the trial for certain games in the latter part of the season. At the time the trial was announced the chief executive of Women's Professional Leagues Limited (WPLL) Nikki Doucet said it was about giving fans choices. "While obviously maintaining the safety and what we need to do in terms of being responsible," she said. The FSA's head of women's football Deborah Dilworth said the trials were a chance to be "innovative, creative and offer more choice to supporters".

  Charters said similar small-scale trials in the men's game would be welcome to see what might work going forward, initially in the lower leagues. "Limited trials and a conversation is really what I am talking about." He said it was about allowing fans who want to drink the "chance to do so responsibly" and it was an opportunity to give back to fans who support their teams loyally. The English Football League (EFL) did not wish to comment but its former boss Shaun Harvey did call for the ban to be lifted in 2018 and said he thought it "disproportionate". Charters raised the issue in the House of Commons during a debate on the Football Governance Bill alongside a call for strengthening and expanding the Premier League cap on away game tickets to all the top five leagues.

