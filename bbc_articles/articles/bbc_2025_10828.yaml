title: Cardiff hospital tolerated drugs and theft by staff - report - BBC News
date: '2025-05-07'
section: Wales
url: http://www.bbc.co.uk/news/articles/cx202ylne5go
content: |-
  Another review is under way into allegations staff allowed people into operating theatres.

  Crime by staff tolerated at hospital, report says

  A report found criminal behaviour among staff, including drugs and theft, went unchallenged

  Criminal behaviour by staff, including theft and illegal drugs, went largely unchallenged at Wales' largest hospital, a report has found. An "atmosphere of fear" in the surgical department of University Hospital of Wales meant staff did not raise concerns. The report by Cardiff and Vale health board also found anaesthetic practitioners, external were not always in theatre for the whole operation, but instead were in the anaesthetic room on their phones or watching Netflix. The health board apologised, saying it had taken action and implemented improvements, but also confirmed a separate review was under way into allegations staff allowed members of the public into the operating theatre to watch surgery.

  Behaviour of surgery staff largely went unaddressed as some said they often worked through their breaks, so needed to take food and drink into the anaesthetic room. It found staff felt belittled and there was a culture where swearing and outright criminal behaviour – including theft and illegal drugs found in a staff locker – went unchallenged.

  The report found issues that compromised infection control as staff members of all groups were not wearing a mask properly, did not have bare arms below the elbow and were wearing jewellery or nail varnish. The poor state of the hospital was also raised as repair and cleanliness was below expected standards, with several cases of pigeons being found in trauma theatres or on the theatre corridor. The report found teams often worked against each other, impacting the efficiency of theatres and a failure to follow policies enabled behaviours to go unchecked, leading to people feeling let down and unsafe. Health board bosses confirmed one person was caught with drugs prior to this investigation and it was reported to police, who did not bring charges. That person is still working at the health board after a disciplinary process.

  Cleanliness was below expected standards, with pigeons found in theatres and theatre corridors

  An anonymous complaint of racism was also made to management and the Nursing and Midwifery Council - an investigation was held and the person accused was suspended, but no further action was taken as there was insufficient evidence. The reluctance of staff to speak up made complaints difficult to address, the health board said, which is why work was being done to change and improve the culture. In a joint statement, the health board's Suzanne Rankin and Paul Bostock said while the report was "very disappointing and concerning", safety remained a top priority. They added: "The health board will now consider the findings, recommended actions and implications of the service review as it develops a management response and a detailed action plan to make urgent improvements and address quality and safety issues. "Colleagues directly involved in theatres will receive a copy of the report and will be supported by a series of face-to-face briefings with the chief operating officer and other senior colleagues."

  The health board said work was being done to change and improve its culture

  Speaking in the Senedd, Wales' Health Secretary Jeremy Miles said the report was "shocking". Conservative Andrew RT Davies called on the Welsh government to take over running the health board as senior managers were "clearly not in control of the situation". In response, Mr Miles said he would "meet very soon with the chair of the health board to see what specifics steps they are putting in place". Plaid Cymru's health spokesman Mabon ap Gwynfor said the report should "shock this government into finally getting to grips with the numerous crises facing our NHS". More than a third of theatre staff shared their experiences for the review, which began last summer and was conducted by two senior colleagues with no line management responsibility of theatres. The investigation looked into 15 of the hospital's 39 operating theatres, which bosses said were used to carry out 10,700 operations each year. The majority of these, about 7,000, are emergency cases which are carried out 24/7, they added.

  Lauranne Cullen, regional director for patient watchdog Llais called the findings "shocking and very disappointing". "Patients must feel safe and respected in every part of the NHS - especially in operating theatres, where they are most vulnerable," she said. Ms Cullen said the issues in the report showed "not just individual mistakes, but deeper problems with the culture and systems", calling for them to be dealt with "urgently and honestly". "There must be clear accountability, and a real commitment to rebuilding trust, safety and professionalism in these services," she said. Helen Whyley, Wales executive director for the Royal College of Nursing, said that "creating a culture that truly supports whistleblowing and moves away from blame is essential to patient safety and staff wellbeing". "Health boards must actively foster environments where concerns are welcomed, not punished," she said.
