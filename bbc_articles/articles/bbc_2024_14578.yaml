  England's laboured performance against Slovakia was preceded by an equally underwhelming group stage, though they did progress as group winners. Southgate has drawn comparisons with the 1990 World Cup and Euro 96, where England also made slow starts before reaching the semi-finals. "Everybody now, 30 years on, looks back at [Euro] 96, that I played in, in a different way to how it was at the time," said Southgate, who missed the decisive penalty against Germany in the semi-final at Wembley. "We were bang average against Switzerland, we were the same against Scotland. Scotland missed a penalty at 1-0. Spain should have beaten us in a 0-0 draw. "1990 was similar, so you do go through these moments in tournaments." Southgate has also praised "excellent" quarter-final opponents Switzerland, who are ranked 19 in the world and knocked out holders Italy in the last round. "They have had some consistency in what they do for a long time. Their system is difficult to press. They've got good rotation," he said. "Once they've been ahead they've been really difficult to break down, so they are a very good side."
