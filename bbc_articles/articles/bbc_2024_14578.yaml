  'England should be better but win has given belief'

  England have reached at least the quarter-finals at the last four major tournaments under Southgate

  Gareth Southgate says England know they "should be better than they have been" at Euro 2024 but their late last-16 win over Slovakia has given them belief. The Three Lions were on the brink of an embarrassing exit before Jude Bellingham scored a spectacular overhead kick to level in stoppage time. Harry Kane scored the winner in extra time to set up a quarter-final meeting with Switzerland on Saturday. "There's no question it will give the whole group belief," said Southgate. “We know we should be better than we've been but we've ended up with a lot of young players in important positions and trying to solve problems right the way through the four weeks of the camp. "But the standout is the way the players are dealing with it. Their togetherness, their spirit."

