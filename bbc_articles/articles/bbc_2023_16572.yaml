  Omid Djalili was due to appear at the Festival Drayton Centre on Thursday evening

  Comic Omid Djalili has pulled out of a performance, with the venue citing "personal threats due to the situation in Israel".

  The comedian was due to appear on Thursday at the Festival Drayton Centre, in Market Drayton, Shropshire.

  The centre said it was reaching out to ticket holders and would issue refunds next week.

  Mr Djalili's representatives have yet to respond to a BBC request for more information.

  The comedian, who was born in London to Iranian parents, has appeared in films including Mamma Mia! Here We Go Again and Bond movie The World Is Not Enough as well as the BBC TV series His Dark Materials.

  He was due to appear in the Omid Djalili and Friends show in Market Drayton, before touring Northern Ireland and the Republic of Ireland next week.

  West Mercia Police said it had not received any reports of concerns surrounding the performance in Shropshire.

  The Palestinian militant group Hamas launched an attack on Israel on 7 October which was followed by retaliatory air strikes on Gaza.

  The attack by Hamas, which is proscribed as a terrorist group by countries including the UK and the US, saw 1,400 people killed and more than 200 taken hostage after gunmen infiltrated southern Israeli communities under the cover of heavy rocket fire.

