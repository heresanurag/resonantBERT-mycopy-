content: |-
  Luke Littler moves eight points clear at the top of the Premier League table with victory on night eight in Newcastle.

  Luke Littler won the Premier League Darts title on his debut in 2024

  Luke Littler strengthened his position at the top of the Premier League table with victory on night eight in Newcastle. The world champion, 18, defeated Stephen Bunting, Rob Cross and Luke Humphries on his way to a fourth success in the 2025 event. Littler is eight points clear of second-placed Humphries and has 26 points at the halfway stage of the league phase - a tally that would have been good enough to secure a top-four finish and a place in the play-offs last year. He won the first nine legs he played at Utilita Arena, thrashing Bunting 6-0 in his quarter-final before going 3-0 up against Cross on his way to a 6-3 semi-final victory. Against world number one Humphries, the teenager raced into a 4-0 lead before completing a comfortable 6-1 win. "It's another week, more points on the board and another nightly win," Littler told Sky Sports. "Now I'm sitting even more comfortably at the top and there are loads of points ahead. I'm settled even more coming into the next weeks."

  Humphries ended a run of three successive Premier League losses by beating home favourite Chris Dobey in his quarter-final, before getting past Nathan Aspinall in the deciding leg of a high-quality semi-final. Cross and Aspinall - fifth and sixth in the table respectively - achieved crucial quarter-final wins to boost their hopes of reaching the play-offs on 29 May. Cross beat Gerwyn Price to move level on points with the 2021 world champion from Wales, while Aspinall overcame Michael van Gerwen 6-5 in his last-eight tie.

  Members of Newcastle United's Carabao Cup-winning squad, including recent England debutant Dan Burn (right), watched the action unfold at Utilita Arena

  Premier League Darts is played across 16 initial weeks in the league stage with quarter-finals, semi-finals and a final each night. Each of the eight players is guaranteed to face the other seven in the quarter-finals in weeks one to seven and 9-15, with week eight and week 16 fixtures done off the table. It means we will get fourth v fifth in Sheffield on the final league-stage night, with the play-off spots potentially on the line. Players earn two points per quarter-final win, an additional point if they win their semi-final and five for winning the night. The top four players after the group stage progress to the play-off night at London's O2 Arena on 23 May, with first facing fourth and second against third in a best-of-19-leg match. The final, which is the best of 21 legs, follows. If players are level on points after the 16 weeks then places are decided by nights won and then matches won.
