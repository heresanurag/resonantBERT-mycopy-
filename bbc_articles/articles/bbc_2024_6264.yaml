title: 'Sailing: Great Britain win silver at 470 World Championships and secure place
  at Paris Olympics - BBC Sport'
date: '2024-03-03'
section: Sailing
url: http://www.bbc.co.uk/sport/sailing/68463806
content: |-
  Great Britain's Vita Heathcote and Chris Grube win silver at the 470 World Championships after Sunday's medal race is abandoned because of high winds.

  Great Britain's Vita Heathcote and Chris Grube claimed silver at the 470 World Championships after Sunday's medal race was abandoned because of high winds in Mallorca.

  Heathcote and Grube secured a podium spot because they were in second going into the 10-boat medal race.

  Their performances, with two boats in the top 10, have secured Team GB an Olympic qualifying place for Paris.

  Overnight leaders Jordi Xammar and Nora Brugman of Spain took the gold, with Keiju Okada and Miho Yoshioka of Japan taking bronze.

  Team GB are the most successful nation in Olympic sailing history, having won 64 medals in total, including 31 golds.

  The Paris Olympics will run from 26 July to 11 August, with the sailing events taking place in Marseille Marina between 28 July and 8 August.
