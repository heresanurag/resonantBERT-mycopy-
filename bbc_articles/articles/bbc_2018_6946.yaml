  Australia go home without a win, again - the stats
  • None Australia failed to win a match at a World Cup tournament for the third time in their five participations (1974, 2014 and 2018).
  • None Peru won their first match at the World Cup since a 4-1 win over Iran in 1978 - 14,625 days ago.
  • None Peru forward Pablo Guerrero - aged 34 years and 176 days - became the third oldest South American scorer at the World Cup, behind only Argentina's Martin Palermo (36 years, 227 days) and Obdulio Varela of Uruguay (36 years 279 days).
  • None Peru's opening goal in this match was their first at the 2018 World Cup from their 28th shot of the competition.
  • None Australia's first two used substitutes in this match - Tim Cahill (38 years) and Daniel Arzani (19) - are separated in age by 19 years and 29 days.
  • None Peru opened the scoring in this match, only the third time they have done so in 18 World Cup matches and the first time since 1978 against Iran.
  • None Tim Cahill became the first Australian to appear at four different World Cup finals (2006, 2010, 2014 and 2018).
  • None Peru scored as many goals in this match as they managed in their previous eight World Cup games combined.
  • None Australia have not kept a clean sheet in any of their 13 matches at their last four World Cups between 2006 and 2018.
  • None Australia's failure to win any of their three matches at the 2018 World Cup mean that Oceania countries (Australia and New Zealand) have now won just two of their 22 matches at the World Cup finals (drawn seven, lost 13).

  'Proud of the fans' - what they said

  Australia coach Bert van Marwijk: "It's a little bit of a different feeling after this game.

  "I heard Denmark played a draw, so even if we won by three or four goals it wouldn't have mattered, other than the feelings for the players.

  "I liked the period of time I worked with these guys. I learned from them and I learned from their mentality.

  "The way they improved, you don't see that that often on this level. I hope they learned something in the past few months. They can learn from good things but also from bad moments."

  Peru coach Ricardo Garceca: "It is a joyful feeling. This was a very difficult match in terms of psychology, we had to be strong after we had lost unexpectedly twice.

  "We played against a team who is a tough, very strong and physical team and they could qualify so their players made a huge effort.

  "In the stadium we had all of these people supporting us. We can leave the World Cup with our heads high."

  Andre Carrillo, who scored Peru's first goal: "I am very grateful to all the Peruvian fans. Many people made the impossible trip to be here.

  "I am happy to give them the victory. We are proud of them."
