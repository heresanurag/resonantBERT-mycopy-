  Second kidnap arrest after man, 87, bundled in car

  The victim was walking home from Oldham Central Mosque when he was dragged into a car

  A second man has been arrested on suspicion of kidnap after an 87-year-old was dragged into a car before being driven away and dumped 15 miles away. The man was walking home from Oldham Central Mosque when he was bundled into a black car and blindfolded at about 21:00 BST on 15 September, Greater Manchester Police said. He was asked for money before being pushed out of the vehicle and abandoned in the dark in Rishworth, West Yorkshire. A man, 24, was arrested in Royton and is being questioned in police custody.

  A 39-year-old man who was previously arrested on suspicion of kidnap has since been released on bail pending further investigation, the force said. Det Insp Emma Hulston said: "We have arrested two men in connection with this shocking incident and our investigation team is making good progress in gathering evidence to establish the full circumstances. "Whilst incidents of this nature can cause alarm in the community, we do believe it was an isolated incident with no wider threat to the public." Officers appealed for anyone with information to come forward.
