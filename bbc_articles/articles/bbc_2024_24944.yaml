  Mr Donfried said he had been told the cause of death was suspected to be an "immediate massive heart attack". "The good news is he didn't suffer. I don't think he felt any pain." Describing the aftermath, he said: "Really time stopped. The entire hotel, the entire conference was in shock. "Most of the participants here were young leaders and none of them had ever experienced anything like this. "I think there was a feeling of shock, a feeling of loss and of not really knowing what to do." Those attending the event gathered later to share reflections and give thanks and prayers for Salmond's life.

  Salmond pictured at the conference on Friday alongside Alba Party chair Tasmina Ahmed-Sheikh

  Mr Donfried recited a prayer that was shared during his late father's funeral. "That was important for us all, to have a moment to come together and pause in honour of Alex." He added that Salmond, the leader of the Alba party, was "a great leader who inspired so many". Mr Donfried said: "I was speaking to some of the Spanish participants last night and they were talking about how in Spain he is, in so many ways, a legend." He said ACD, which is based in Berlin, had received many messages from across the world since Salmond's sudden death. Mr Donfried said the organisation was in close contact with the British Embassy and that the repatriation of Salmond's body may involve the Royal Air Force. He added: "Our hearts are all going out to Alex's family."
