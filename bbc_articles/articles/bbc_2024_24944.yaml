title: '''Time stopped'' after Alex Salmond collapsed at conference - BBC News'
date: '2024-10-13'
section: Scotland
url: http://www.bbc.co.uk/news/articles/cqxr1ev9ngvo
content: |-
  Organisers say the former first minister fell backwards in his chair after suffering a massive heart attack.

  Alex Salmond took part in a panel discussion at the conference in North Macedonia before collapsing during lunch

  A man who witnessed Alex Salmond collapse during lunch at an event in North Macedonia has said that "time stopped". Youth conference organiser Mark Donfried said Scotland's former first minister was caught by a fellow delegate as he fell backwards in his chair after suffering what is thought to have been a massive heart attack. The event was cancelled as paramedics tried in vain to resuscitate Salmond. A statement from his family paid tribute to a "formidable politician" and a "devoted and loving husband" following the former SNP leader's death on Saturday at the age of 69.

  "Alex was a formidable politician, an amazing orator, an outstanding intellect, and admired throughout the world," the family said in a statement released by The Alba Party. "He loved meeting people and hearing their stories, and showed incredible kindness to those who needed it. "He dedicated his adult life to the cause he believed in - independence for Scotland. His vision and enthusiasm for Scotland and the Yes movement were both inspirational and contagious. "But to us, first and foremost, he was a devoted and loving husband, a fiercely loyal brother, a proud and thoughtful uncle and a faithful and trusted friend." Tributes have also poured in from across the political spectrum. Speaking on Sunday morning, Scotland's First Minister John Swinney said Salmond "inspired a generation" to believe in independence.

  Swinney, who served as finance secretary while Salmond was first minister, said he took the party from the fringes of Scottish politics to the heart of government. Prime Minister Sir Keir Starmer described Salmond as a "monumental figure of Scottish and UK politics", while King Charles paid tribute to his "devotion to Scotland" during decades of public service. Floral tributes have been left outside the Scottish Parliament and Salmond's home in Strichen, Aberdeenshire. The former SNP leader was Scotland's first minister between 2007 and 2014, and in recent years led the Alba party. Mr Donfried, executive founder and director at the Academy for Cultural Diplomacy (ACD), said Salmond had been an "active member" of his organisation. He told BBC Scotland News: "For many of the young leaders here he was really a role model and he inspired many of them." Speaking from Ohrid in North Macedonia, he said: "We are all still in a state of shock and that is not something we can easily move forward from."

  Floral tributes to Salmond have been left outside the Scottish Parliament building in Edinburgh

  Mr Donfried said Salmond had delivered a speech at the conference on Friday then attended dinner that evening where he discussed plans for an ACD event in Scotland next year. He said the former MP and MSP had seemed in the "best of health, the best of spirits". But the following day during lunch after a panel discussion, Salmond took ill and lost consciousness at the table. Mr Donfried raced to the hotel reception to request an ambulance. He added: "By the time I came back he was on the floor and they were trying CPR." When paramedics arrived there was nothing that could be done to save him. The Interior Ministry of North Macedonia confirmed Salmond passed away at 15:30 local time (14:30 BST).

