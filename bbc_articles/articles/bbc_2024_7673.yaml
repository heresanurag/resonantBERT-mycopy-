title: 'Masters 2024: Collin Morikawa ''not scared'' of chasing Scottie Scheffler
  - BBC Sport'
date: '2024-04-14'
section: Golf
url: http://www.bbc.co.uk/sport/golf/68809200
content: |-
  Collin Morikawa says he "believes in what I can do" as he goes into Sunday's final round of the Masters one shot behind world number one Scottie Scheffler.

