title: 'Puberty blockers: Indefinite ban to be introduced - BBC News'
date: '2024-12-12'
section: Health
url: http://www.bbc.co.uk/news/articles/cly2z0gx3p5o
content: |-
  Health Secretary Wes Streeting says the way the drugs have been used is a "scandal" following a review.

  The ban on giving puberty blockers to under-18s questioning their gender identify is to be made permanent, Health Secretary Wes Streeting has announced. Streeting told MPs he was making the temporary ban introduced in May indefinite across the UK, following a consultation and advice from the Commission on Human Medicines - calling the way the drugs had been used a "scandal". The expert group said prescribing the drugs to children for gender dysphoria was an "unacceptable safety risk". Campaigners on both sides have reacted to the news, with those in support of the ban commending Streeting's "integrity" and those against calling it "discrimination".

  Puberty blockers are drugs used to delay or prevent puberty happening. A temporary ban was put in place by the last Conservative government, and had been renewed twice by Streeting. He said on Monday that the review identified cases where children had been prescribed the treatment after filling out an online form and only having one online consultation with a healthcare provider. The health secretary said it was essential for the government to be evidence-led when it came to healthcare.
  • None BBC InDepth: Can a drug trial solve one of medicine's most controversial debates?

  The order followed publication of a landmark review earlier this year, by paediatrician Dr Hilary Cass, into gender care services for children. It found a lack of evidence around treatment for under-18s with puberty-blocking drugs. In March, NHS England decided that puberty blockers would no longer be routine treatment for children with gender dysphoria. Then in May, the Conservative government tightened rules on the drugs, introducing an emergency ban on them being prescribed by private and European prescribers. This was kept in place by Labour when they came to power in the summer and was subsequently challenged in the High Court. The government won that case.

