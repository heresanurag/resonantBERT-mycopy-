  The Star Wars and Trainspotting actor said he was "very touched" to receive the movie award.

  The Force is with Ewan: McGregor gets Hollywood Walk of Fame star

  Ewan McGregor with his star on the Hollywood Walk of Fame

  Star Wars and Trainspotting actor Ewan McGregor said he was "very touched" after being awarded a star on the legendary Hollywood Walk of Fame. The 53-year-old Scot - who played Obi-Wan Kenobi in the Star Wars prequel trilogy - was "particularly moved" that his award was placed beside that of the movie franchise's original Princess Leia, actress Carrie Fisher. McGregor was inducted in a speech by another Star Wars idol, Anakin Skywalker actor Hayden Christensen. He becomes the 2,789th star to be inducted on the famous walk outside the El Capitan Theatre on Hollywood Boulevard.

  McGregor said: "I absolutely had no idea what it would feel like, or what it would mean, but it is meaning a great deal, and it feels very, very nice and I feel very touched by the whole thing. "I'm so moved that I'm close to my old friend Carrie Fisher, on the pavement here, that means a great deal to me." During his induction speech, Hayden Christensen described his former co-star as "the best Jedi master anyone could've asked for" and "the coolest man on the planet".

  The actor was joined by his family at the Hollywood ceremony

  Perth-born McGregor made his movie debut in Bill Forsyth's Being Human in 1994 and quickly followed that up playing journalist Alex Law in Danny Boyle's thriller Shallow Grave. He won international acclaim for his portrayal of heroin addict Mark Renton in Danny Boyle's Trainspotting in 1996, and the T2 Trainspotting sequel on 2017. McGregor starred as Jedi master Obi-Wan Kenobi in three Star Wars blockbusters between 1999 and 2005, before reprising the role in the Disney+ series in 2022. His other Hollywood credits include Moulin Rouge, Black Hawk Down and Salmon Fishing In The Yemen. He was made an OBE in 2013 for services to drama and charity and has won an Emmy Award and one Golden Globe.
