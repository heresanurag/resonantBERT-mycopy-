  Turkey says it has struck PKK sites in Iraq and Syria after blaming the Kurdish group for the attack.

  Turkey strikes Kurdish sites after attack kills five near Ankara

  Turkey's government says its military has struck sites in Iraq and Syria linked to Kurdish militant group the PKK, after blaming it for an attack near Ankara that killed at least five people. The Turkish government said that the strikes since Wednesday had killed 59 people it described as "terrorists". A Kurdish-led militia in Syria said 12 civilians died in the north and east of the country. Various videos from the attack earlier on Wednesday show at least two people firing guns around the entrance of Turkish Aerospace Industries (TAI), which is located some 40km (25 miles) outside the capital. No group has claimed responsibility for the attack, in which 22 people were injured.

  The Turkish defence ministry said that since Wednesday night and Thursday morning, its strikes had “successfully eliminated” 47 targets including caves, shelters, warehouses and other facilities in northern Iraq and Syria. President Recep Tayyip Erdogan called the attack on TAI "heinous" in a post on X. Interior Minister Ali Yerlikaya said shortly after the attack that the two perpetrators, a woman and a man, had been "neutralised". On Thursday, Yerlikaya said the attackers had been identified as PKK members Ali Orek and Mine Sevjin Alcicek. The Kurdistan Workers' Party (PKK) is banned as a terrorist organisation in Turkey, the US and UK, and has been fighting against the Turkish state since the 1980s for greater rights for the country’s significant Kurdish minority. The Kurdish-led Syrian Democratic Forces (SDF) said on Thursday morning that Turkey had launched a "new wave" of attacks, including on "civilian gatherings", killing 12 people. According to the the Syrian Observatory for Human Rights, Turkish warplanes and drones targeted infrastructure in northern and eastern Syria. It added that the region had seen “intensive raids” in the cities of Hasakah, Raqqa, Kobani, Manbaj and Tal Rifaat. The watchdog said Turkish forces resumed attacks on Thursday morning, with targets including a checkpoint near a train station, a bakery and power station. The Turkish defence ministry said earlier that "all kinds of precautions were taken to prevent harm to innocent civilians, friendly elements, historical and cultural assets and the environment".

