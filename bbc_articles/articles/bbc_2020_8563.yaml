title: Singer Mika on raising money for Lebanon - BBC News
date: '2020-08-21'
section: General
url: http://www.bbc.co.uk/news/world-middle-east-53860933
content: |-
  Mika, born in Beirut, is hosting a virtual concert to raise money for Lebanon after the the devastating explosion.

  Musician Mika was born in Beirut to a Lebanese-Syrian mother.

  After the the devastating explosion a couple weeks ago, he is hosting a virtual concert to raise money for Lebanon.

  He told BBC Breakfast why the cause is so important to him.
