title: Pope Francis' coffin is laid outside in St Peter's Square - BBC News
date: '2025-04-26'
section: General
url: http://www.bbc.co.uk/news/videos/c5y59rzypvxo
content: |-
  The pontiff's funeral is being held days after he died at the age of 88.

  Pope Francis' coffin has been carried out from St Peter's Basilica into St Peter's Square as part of his funeral service.

  Huge crowds gathered at the Vatican to pay respects to the Pope, who died on Easter Monday at the age of 88 after suffering from ill health.
