title: 'Crawley College: ''Heroic'' staff tackled armed suspect - BBC News'
date: '2021-04-27'
section: Sussex
url: http://www.bbc.co.uk/news/uk-england-sussex-56898742
content: |-
  A "quick-thinking" teacher and support worker detained a suspect at Crawley College, police say.

  Two members of college staff who tackled an armed suspect on campus have been praised for their "heroics".

  Armed police officers descended on Crawley College in West Sussex at 15:10 BST on Monday after reports of gunshots.

  A teacher and a member of support staff suffered minor injuries detaining a suspect, Sussex Police said. An 18-year-old man was arrested by police.

  Ch Insp Shane Baker said the pair's "heroics have not gone unnoticed".

  "They put themselves in harm's way in order to protect their students, fellow employees and the wider public, and I am hugely grateful for their quick-thinking actions," he added.

  A blank-firing handgun and knife were seized from the scene, police said.

  Video appearing to show a member of staff tackling the suspect to the ground and pinning him to the floor was shared by students on Snapchat on Monday.

  The two members of staff were not injured by gunshots and went to a walk-in medical centre for treatment, police said.

  "Thankfully, no other injuries were reported, and no damage was caused by the blank shots fired," Ch Insp Baker said.

  Scores of police officers were sent to Crawley College

  The college was evacuated, and all staff and students relocated to a safe space while police carried out a search of the buildings.

  Sussex Police officers were assisted by a bomb disposal team, East Sussex Fire and Rescue Service and the South East Coast Ambulance Service.

  It is not being treated as a terrorist incident, police said.

  Police officers have also conducted a search at an address in Barton Walk, Crawley.

  Police asked people to stay away from Crawley College

  Ch Supt Howard Hodges thanked "all the students, staff and public for their co-operation".

  "We continue to have a policing presence in Crawley and are speaking to witnesses. We are still appealing for anyone with information to come forward," he added.

  Crawley College was closed to students on Tuesday while police inquiries continued.

