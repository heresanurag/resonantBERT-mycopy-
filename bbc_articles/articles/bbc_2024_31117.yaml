title: 'Sergio Perez: Red Bull part ways with Mexican Formula 1 driver with two years
  left on contract - BBC Sport'
date: '2024-12-18'
section: Formula 1
url: http://www.bbc.co.uk/sport/formula1/articles/cq5ljdx2d43o
content: |-
  Sergio Perez is to leave Red Bull with two years left on his contract, after reaching a termination agreement with the team.

  Sergio Perez is to leave Red Bull two years before the end of his contract after reaching a termination agreement with the team. The move comes after a weak season for the Mexican, who failed to win a race and finished on the podium only four times as team-mate Max Verstappen won his fourth world title. Perez, who has essentially been sacked, said: "I'm incredibly grateful for the past four years with Red Bull Racing and for the opportunity to race with such an amazing team. "Driving for Red Bull has been an unforgettable experience and I'll always cherish the successes we achieved together." Perez, 34, is expected to be replaced by 22-year-old New Zealander Liam Lawson, in a promotion from the sister Racing Bulls team. Lawson, who drove six races at the end of 2024 and five during 2023, is said to have been told he would be promoted before the season-ending Abu Dhabi Grand Prix. Frenchman Isack Hadjar, who finished second in Formula 2 this season, is expected to join Racing Bulls alongside Japanese Yuki Tsunoda, who has been overlooked by Red Bull for a seat in the senior team. In Abu Dhabi, Perez expressed his concern for an inexperienced driver being put in alongside Verstappen. "Being team-mates with Max at Red Bull as a young driver, I wouldn't like to be in those shoes, if I'm honest," Perez said. "People cannot underestimate the level of challenge that there is in this seat." Although Red Bull had already decided to ditch Perez, he was reluctant to leave and his management sought the best possible compensation agreement before acquiescing. The team said "announcements regarding the team's full 2025 line-up will be made in due course". Red Bull team principal Christian Horner added: "I would like to thank Checo [Perez] for all he has done for Red Bull Racing over the past four seasons. "From the moment he joined in 2021 he proved himself to be an extraordinary team player, helping us to two constructors' titles and to our first one-two finish in the drivers' championship. "While Checo will not race for the team next season, he will always be an extremely popular team member and a treasured part of our history." "It's been an absolute pleasure driving alongside you," Verstappen posted on social media. "We've had some amazing moments together that I'll always remember."

  Red Bull's decision to drop Perez raises questions about the decision-making of Horner, who made the decision in May to sign him until the end of 2026. The move came at the start of a slump in form from Perez - which echoed a similar decline in 2023 - and Horner said the intention was to allow him to recover his confidence. But Perez's performances did not improve. He took his final podium in the fifth race of the season in China and after finishing fourth at the following race in Miami, his best result was a sixth place in the Netherlands. His one highlight for the remainder of the season was a strong performance in Azerbaijan, where he was on course for a podium finish before a late crash with Ferrari's Carlos Sainz. Perez's inability to get close to Verstappen's performances was a significant factor in Red Bull losing the constructors' championship. They finished third behind McLaren and Ferrari, despite Verstappen's nine victories. McLaren took six wins between Lando Norris and Oscar Piastri, and Ferrari five with Charles Leclerc and Sainz. Horner re-signed Perez - giving him a two-year extension that seemed inexplicable to many in F1 - rather than taking Sainz, who is being replaced at Ferrari next season by Lewis Hamilton. The basis for the decision was the tension that existed between the Verstappen and Sainz camps when the drivers were paired at Red Bull's junior team in 2015 and early 2016. But Verstappen's father Jos Verstappen said he had never expressed a preference for Sainz not to rejoin Red Bull. Perez took five victories for Red Bull, one in 2021, and two each in 2022 and 2023, but was able to get close to Verstappen only for the first four races of 2023. However, he was instrumental in Verstappen winning his first world title in 2021. His aggressive defence against Hamilton at the season finale in Abu Dhabi allowed Verstappen to close back up to the seven-time champion in the middle of the race. That meant when the decisive late safety-car period happened, Hamilton did not have a sufficient gap to pit for fresh tyres while also retaining the race lead, which he likely would have had Perez not blocked him for so long. That meant he was vulnerable to Verstappen, who did stop for fresh rubber. Race director Michael Masi started the race for one final lap, having ignored the rules governing a safety car period in two different ways, and Verstappen, on fresh tyres, was able to pass Hamilton, ensuring he rather than the Mercedes driver won the championship.
