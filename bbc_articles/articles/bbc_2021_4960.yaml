title: 'Chauvin trial: Firefighter ''distressed'' by George Floyd arrest - BBC News'
date: '2021-04-01'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-56595180
content: |-
  Genevieve Hansen was off-duty when she came across the scene of George Floyd's arrest.

  Genevieve Hansen was off-duty when she came across George Floyd's arrest. On the second day of the trial, she testified that she noticed Mr Floyd needed medical attention and told that to officers at the scene.
