title: Highlights from King Charles III Coronation concert - BBC News
date: '2023-05-08'
section: General
url: http://www.bbc.co.uk/news/uk-65520279
content: |-
  A brilliant variety of pop stars, beloved characters and masters of music come together on stage.

  King Charles III and the Royal Family have come together with a vast audience in the grounds of Windsor Castle to watch the Coronation concert.

  Watched by an average TV audience of 10.1 million - peaking at 12.3 million - it was was a night that celebrated the arts, from pop star performances, to choirs and orchestras to cartoon characters and a colourful drone display, hosted by actor Hugh Bonneville.

  William, the Prince of Wales, also took to the stage to pay tribute to his father and the late Queen Elizabeth II.
