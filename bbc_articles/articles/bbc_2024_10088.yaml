content: |-
  In court, Michael Cohen also said Trump had warned 'a lot of women' would make claims against him.

  This video can not be played To play this video you need to enable JavaScript in your browser. Watch: What Michael Cohen said at Trump's hush-money trial

  Testimony from the star witness in Donald Trump's Manhattan trial has repeatedly tied a 2016 hush-money arrangement back to the ex-president. Mr Trump's former lawyer Michael Cohen said he spoke to him immediately after wiring the $130,000 (£104,000) payment to adult-film actress Stormy Daniels. It was one of many times he operated "at the direction of and for the benefit" of Mr Trump, he testified. The former president has pleaded not guilty to felony charges against him. Altogether, Mr Trump faces 34 counts of business fraud for allegedly reimbursing Cohen for the payment through transactions masked as legal expenses. Ms Daniels had, in exchange for the money, agreed to keep quiet about allegedly having sex with Mr Trump while he was married. He has denied ever having sex with Ms Daniels. Prosecutors charge that the payment, made in the final days of the 2016 presidential campaign, and the subsequent attempt to conceal it by falsifying records qualifies as election interference.

  As the former president sat back in his chair, listening with his eyes closed, Cohen told the court on Monday that Mr Trump had "approved" the repayment plan. When the then-personal fixer met with Mr Trump and his top financial officer, Allen Weisselberg, between the presidential election and inauguration, the latter did the talking, Cohen said. Weisselberg explained to Cohen in front of their boss that he would be paid back in 12 instalments of $35,000, which would be accounted for as a retainer for legal services. Cohen said he got the sense the two had already discussed the arrangement before inviting him in to meet. Mr Trump "approved it", Cohen said, and then told him: "This is gonna be one heck of a ride in DC." The total would be far larger than what Cohen originally paid because he would be taxed on the payments, he testified.

  BBC News reporters are in the Manhattan courtroom covering the historic first criminal trial of a former US president. You'll find their updates and analysis on the BBC news website and app, and across TV, radio and podcasts.

  For weeks, the spectre of Cohen's testimony has hovered over the trial, his name repeatedly invoked as prosecutors walked jurors down a trail of wheeling and dealing in bank statements, text messages, witness testimony, emails and recordings of crucial conversations. Sixteen days into the trial, he finally appeared on the witness stand, the most significant day of testimony in the first-ever criminal trial of a former US president. What he had to say about events and conversations from eight years ago could come back to haunt Mr Trump as he seeks to return to the White House. Cohen, who served time in prison for crimes related to the payment, is one of the few witnesses who could help prosecutors establish that Mr Trump knew about the alleged reimbursement scheme. He could also testify about reasons why Mr Trump allegedly committed fraud. Prosecutors have said it was to interfere in the 2016 election. On Monday Cohen also testified that Mr Trump told him to "be prepared" for negative publicity after announcing his 2016 presidential bid, "There's going to be a lot of women coming forward," he allegedly said. He said Mr Trump instructed him to "handle" several hush-money payments, as well as liaise with tabloid media to thwart negative stories that could threaten his political goals. He recalled Mr Trump being "really angry" for what he perceived as a failure to keep Ms Daniels from shopping her story to the media. He said Mr Trump told him to "just take care of it", calling the story a potential disaster for his presidential campaign. "Women will hate me," he told Cohen, according to Monday's testimony. Cohen also testified that he worked with the National Enquirer tabloid to buy and bury a story about an alleged affair between Mr Trump and Playboy model Karen McDougal. Cohen said he was present for a call in which Mr Trump asked National Enquirer publisher David Pecker about a payment to Ms McDougal.

  "Pecker said 'we have this under control, we'll take care of this,'" Cohen testified. Speaking to reporters later outside the court, Mr Trump complained that the case was politically motivated and an attempt to derail his presidential campaign. Though Mr Trump is prohibited from publicly commenting on witness testimony, Republican senators Tommy Tuberville of Alabama and JD Vance of Ohio appeared in a show of support, assailing Cohen and defending the former president. "The thing that the president is prevented from saying, which is a disgrace, is that every single person involved in this prosecution is practically a Democratic political operative," Mr Vance said. Norm Eisen, an attorney who interviewed Cohen in 2019 while assisting the House of Representatives, told the BBC that Cohen's testimony so far had boosted the prosecution's case. "Given disparaging references others have made to Cohen, I am sure the jury is surprised by the sober, well-spoken, candid individual they are meeting," he said. "Of course, final judgment must wait until after cross-examination and a verdict, but I think he is doing well so far," he added. In 2018, Cohen pleaded guilty to eight felony counts, including tax offences, fraud and campaign finance violations - the latter of which stemmed from the very same payment in question at Mr Trump's trial. He also pleaded guilty to lying to Congress. Mr Trump's lawyers have sought to distance Mr Trump from the payment. In earlier testimony, they asked Mr Trump's former communications aide, Hope Hicks, if Cohen would sometimes go "rogue."
