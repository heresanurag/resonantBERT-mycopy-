title: Man charged after paramedics stabbed in Wolverhampton - BBC News
date: '2020-07-08'
section: Birmingham & Black Country
url: http://www.bbc.co.uk/news/uk-england-birmingham-53333408
content: |-
  The crew were hurt after being called to check on the welfare of a man at his home in Wolverhampton.

  The ambulance crew was on a call at a property in Stephens Close, Wolverhampton

  A man has been charged with wounding two paramedics who were stabbed during a call-out to his home.

  Michael Hipgrave and Deena Evans, of West Midlands Ambulance Service, were hurt at a property Wolverhampton on Monday after being called to check on the welfare of a man.

  Martyn Smith, 52, of Stephens Close, is charged with two counts of wounding with intent.

  Mr Smith was remanded in custody and will appear at the city's crown court on 5 August.

  Mr Hipgrave was discharged from Birmingham's Queen Elizabeth Hospital on Monday night and is recovering at home after surgery for cuts to his back.

  Ms Evans remains at the hospital where she is receiving further treatment for a knife wound to her chest and remains in a stable condition.

  On Tuesday, an ambulance service spokesman said both staff members were "recovering well".

