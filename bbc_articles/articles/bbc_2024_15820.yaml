  Carl Cooper was known to be violent, with both women contacting the police in fear for their safety.

  Man who murdered two girlfriends jailed for 35 years

  Carl Cooper was described as a "dangerous, violent domestic abuser"

  A man who murdered two girlfriends a year apart has been jailed for life with a minimum term of 35 years. Carl Cooper, 66, was in relationships with Naomi Hunte, 41, who was stabbed to death in 2022 and Fiona Holm, 48, who disappeared in June 2023. Ms Hunte was found dead on her sofa, while Ms Holm's body has never been found. A jury at Woolwich Crown Court previously convicted Cooper of both counts of murder after three days of deliberations.

  Fiona Holm (left) and Naomi Hunte were described as "vibrant and sociable"

  Sentencing Cooper, Mr Justice Johnson said: "I am sure that you, over many years, have been a great danger to women." "You have a history of acting in a controlling and coercive manner to your female partners," he added. The trial had heard Ms Hunte was found dead on Valentine’s Day after having made a number of calls to police over the previous two years. She told officers handyman Cooper was “obsessed” with her and had been stalking her, leaving her "really scared". Ms Holm, of Catford, south-east London, had also made complaints about Cooper to the police, and had told a friend he had stabbed her with a screwdriver, the court heard. After she was found to be missing, Cooper stripped his living room, getting rid of curtains, carpets and wallpaper.

  In a victim impact statement read out at the hearing, Ms Holm's daughter Savannah Holm said her mother was "the light of the party" and that her "love was contagious". Addressing Cooper, she said: "If he has any type of decency, he would tell us where our mother is so we can grieve properly and have a proper funeral for her." Ms Holm's sister, Helena Davis, said she had "loved life" and was "kind". "She was funny and came out with the most outrageous lines which could have everyone laughing," Ms Davis said. "This vile, evil man took her life and we want to know why. We want to know where he put Fiona so that we can bury her and lay her to rest." In a statement read out on his behalf, Ms Hunte's father said: "I have been robbed of my future with my daughter, my only child, and that leaves me with a sadness that will remain forever."

  Speaking outside the court after the hearing, the Met's Det Ch Insp Kate Blackburn, said: "Despite Cooper cruelly denying Fiona's family the opportunity to bury her, we will remain committed to finding Fiona and returning her to her family." She added a £20,000 police reward was on offer for information leading to the recovery of Ms Holm's remains and appealed to anyone with information to come forward. “Carl Cooper is a dangerous, violent domestic abuser who preys on women with vulnerabilities. “He took the lives of two vibrant, sociable women who were so very loved by their families and friends. "Naomi and Fiona are in my thoughts today.”
