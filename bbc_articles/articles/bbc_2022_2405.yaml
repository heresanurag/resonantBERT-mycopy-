title: 'Storm Corrie: Plane struggles to land in strong winds - BBC News'
date: '2022-02-01'
section: General
url: http://www.bbc.co.uk/news/uk-60216196
content: |-
  The flight from Aberdeen got into trouble as it was trying to land at London Heathrow Airport.

  A pilot was forced to make a ''touch and go'' landing after encountering strong winds caused by Storm Corrie.

  The British Airways flight from Aberdeen got into trouble as it was trying to land at London Heathrow Airport.

  The rear of the plane appears to brush the runway before returning to the skies and then attempt a second landing.
