title: 'Nobel Peace Prize: Japanese atomic bomb survivors Nihon Hidankyo win - BBC
  News'
date: '2024-10-12'
section: Asia
url: http://www.bbc.co.uk/news/articles/cy5y23qgx0qo
content: |-
  Nihon Hidankyo, a group of survivors of Hiroshima and Nagasaki, is recognised for its work to rid the world of nuclear weapons.

  Co-chair Toshiyuki Mimaki, who survived the 1945 atomic bombing of Hiroshima, was tearful after it was announced Nihon Hidankyo had won

  Nihon Hidankyo, a Japanese group of atomic bomb survivors, has won the 2024 Nobel Peace Prize. Known as hibakusha, the survivors of the 1945 bombings of Hiroshima and Nagasaki have been recognised by the Norwegian Nobel Committee for efforts to rid the world of nuclear weapons. Nobel Committee Chair Joergen Watne Frydnes said the group had "contributed greatly to the establishment of the nuclear taboo". Mr Frydnes warned the "nuclear taboo" was now "under pressure" - and praised the group's use of witness testimony to ensure nuclear weapons must never be used again.

  Founded in 1956, the organisation sends survivors around the world to share their testimonies of the "atrocious damage" and suffering caused by the use of nuclear weapons, according to its website. Their work began almost a decade after the devastation of Hiroshima and Nagasaki. On 6 August 1945, a US bomber dropped the uranium bomb above the city of Hiroshima, killing around 140,000 people. Three days later a second nuclear weapon was dropped on Nagasaki. Japan's surrender, announced by Emperor Hirohito shortly afterwards, ended World War Two. Speaking to reporters in Japan, a tearful Toshiyuki Mimaki, the co-head of the group, said: "Never did I dream this could happen," the AFP news agency quotes him as saying. Mr Mimaki criticised the idea that nuclear weapons bring peace. "It has been said that because of nuclear weapons, the world maintains peace. But nuclear weapons can be used by terrorists," Mr Mimaki said, according to reports by AFP. In a BBC interview last year, he said despite only being three years old at the time the nuclear bomb hit Hiroshima - he could still remember dazed and burnt survivors fleeing past his home. The prize - which consist of a diploma, a gold medal and a sum of $1m (£765,800) - will be presented at a ceremonies in Oslo in December, marking the anniversary of the death of the scientist and prize creator Alfred Nobel. The group has been nominated for the Nobel Peace Prize "many times" in the past, including in 2005 when it received a special mention by the Norwegian Nobel Committee, its website says.

  The Hiroshima Peace Memorial building was the only structure left standing in the area after the first atomic bomb was dropped in 1945

  The decision to recognise Nihon Hidankyo means the Nobel committee has steered away from more controversial nominees for the peace prize. There had been widespread speculation the United Nations agency supporting Palestinians – UNRWA – was being considered for the prize. Although the organisation is the main provider of humanitarian aid to civilians in Gaza, nine of its members were fired for alleged involvement in the Hamas attack on Israel on October 7 last year. More than 12,000 people had signed a petition urging the committee not to award UNRWA the prize. There were equal concerns about the nomination of the International Court of Justice. The UN’s main judicial organ is currently considering allegations that Israel has committed genocide in Gaza and has already issued a statement urging the Israeli authorities to refrain from genocidal acts. But while giving the prize to Nihon Hidankyo may be a non-controversial choice, it could also focus global attention on the threat of nuclear conflict which overshadows the fighting in both Ukraine and the Middle East. Throughout Russia’s invasion of Ukraine, its leaders have repeatedly hinted that they may be ready to use tactical nuclear weapons if western allies increase their support for Ukraine in a way Russia considers unacceptable. These threats have succeeded in restraining western support for fear of escalation. In the Middle East, the subtext for much of Israel’s strategy is the fear that Iran is seeking nuclear capability, something Tehran denies. The Nobel committee’s decision may renew a debate about the use of nuclear weapons at a time when some countries look enviously at their deterring power. This year's peace prize had 286 nominations, a number comprising 197 individuals and 89 organisations. Nominations can be made by people in positions of significant authority, including members of national assemblies, governments and international courts of law. Iranian human rights activist Narges Mohammadi won the prize in 2023, when she was honoured for her work fighting the oppression of women in Iran. Ms Mohammadi is currently being held in Evin prison in Tehran, having already spent 12 years in jail serving multiple sentences related to her activism.
