title: Grove woman who had mastectomy hosts life drawing fundraiser - BBC News
date: '2024-05-17'
section: Oxford
url: http://www.bbc.co.uk/news/uk-england-oxfordshire-69022919
content: |-
  Shelley Syme was diagnosed with breast cancer in August 2021, shortly after her 29th birthday.

  Ms Syme said she would feel "incredibly vulnerable" as no one had seen her naked body since the surgery

  A woman, who has had a full mastectomy on the left side, will host a life drawing event to raise funds and awareness for breast cancer. Shelley Syme from Grove, Oxfordshire, will be one of the models who get fully naked at Oxford's Old Fire Station on Friday in support of breast cancer charity CoppaFeel!. She was diagnosed with breast cancer in August 2021, at the age of 29. Ms Syme said she feels it would be "a powerful message" for body positivity. She initially found a small lump in her armpit in December 2020, and visited a breast clinic in August 2021. After nine biopsies from three areas of concern, Ms Syme said the nurse had told her to "prepare for the worst". Her treatment included, chemotherapy, lumpectomy, a full mastectomy on the left side and 15 sessions of radiotherapy. She will also continue hormone therapy for a number of years.

  Ms Syme would like to "give a boost" to people who have been affected by cancer and "are not happy with their bodies"

  Ms Syme told BBC Radio Oxford that the life drawing fundraiser would be "one hell of a challenge". "No one has seen my naked body since the surgery," she said. "It's going to be so exposing and I'm going to feel incredibly vulnerable." Ms Syme added that she thought it was "such a good and powerful message" not only for breast cancer awareness, but for body positivity in general. She said that the timing felt "especially more poignant", following CoppaFeel!'s founder Kris Hallenga recent passing at the age of 38. Ms Syme said she would love to "give a boost" to people who have been affected by cancer and "are not happy with their bodies". "I'd love young people to come as well," she added. She also co-hosts the podcast One Lump or Two?, where she shares her experience and helps others "feel a little less alone".

  Ms Syme said the event was "a powerful message" for both breast cancer awareness and body positivity

