content: |-
  Canada Soccer's chief executive confirms drone use prior to Paris 2024, including at the recent Copa America.

  Canada used drones before and Tokyo gold could be 'tarnished'

  Canada won women's football gold at the last Olympic Games in Tokyo

  Canada national team officials have used drones prior to the Paris Olympics and their Tokyo 2020 women's gold medal could be tarnished, officials said on Friday. The developments emerged after Bev Priestman was removed as Olympics head coach for Canada's women's team, following the flying of a drone over New Zealand's training session on Monday. Priestman, 38, was described by the head of Canada's Olympic committee as being "highly likely" to have been aware of the incident, leading to her suspension by Canada Soccer. Canadian media reported that both of the country's senior teams - men's and women's - have relied on drones for years. There has been pushback against that allegation but also an acknowledgement this was not the first drone deployed. Canada Soccer chief executive Kevin Blue confirmed he had received "anecdotal feedback" related to drone use during the men's team's run to the Copa America semi-finals this summer and said coach Jesse Marsch had only been made aware of it after the event. "I am aware of an instance of attempted drone usage at the Copa America," Blue said. "I have spoken with our current head coach about the incident after it occurred and I know he denounced it as a practice to his staff." Blue said there may be a "systemic ethical shortcoming" that needs to be addressed.

  Canadian Olympic Committee chief executive David Shoemaker said there "appears to be information that could tarnish" Canada's women's football triumph from the Tokyo Games. Shoemaker said: "It makes me ill, it makes me sick to my stomach to think that there could be something that calls it into question." Former Canada manager John Herdman said he is "highly confident" similar practices were not used during his time at the helm. Englishman Herdman, who was in charge of the Canada men's team at the 2022 World Cup and the women's side at London 2012 and Rio 2016, added he would co-operate with Canada Soccer's internal review. "I've always gone into Olympic Games, World Cups, big events, with integrity in mind and the ability to compete at the highest level, following the rules and processes. So from my side, I'll help Canada Soccer where I can with that review," said Herdman, who now coaches Toronto FC. Former Canada striker Christine Sinclair, the world's all-time leading international goalscorer, said players were never shown drone footage. "It's unfortunate that players of our national team had to play through condemnable actions by some of their staff as they attempt to defend our gold medal. Actions players have no control over," Sinclair said on Instagram. "I want to be clear that having been a national team player for 23 years, we were never shown or discussed drone footage in team or individual meetings I've been present for." Stephanie Labbe was Canada's keeper when they beat Sweden on penalties to win women's football gold at Tokyo under Priestman. "If anyone wants to speak about pks [penalty kicks], I studied hard the night before every match," said the 37-year-old, who retired in 2022, said on social media. "Watched video of players taking pks in national team and club games. Made my own educated guesses based on that info. No drone footage was watched. "Do not confuse great goalkeeping with cheating."

  Priestman served as an assistant coach to Phil Neville with the England women's team. She became Canada boss in October 2020, prior to the delayed Olympics in Japan. She "voluntarily" withdrew from Canada's opening 2-1 victory over New Zealand on Thursday, while Jasmine Mander, Priestman's assistant, was sent home along with "unaccredited analyst" Joseph Lombardi. In a statement on Wednesday, Priestman said she took responsibility for the actions of her colleagues after a scouting report filed by Lombardi was sent to Mander. On Thursday, a French court said Lombardi had been handed an eight-month suspended jail sentence after pleading guilty to flying a drone in an urban area without a licence. Blue said he hoped Fifa, football's world governing body, would not consider sanctions against the country's national team players. "We admire deeply the will and determination of this group," he said. "The players themselves have not been involved in any unethical behaviour and frankly we ask Fifa to take that into consideration."
