title: Anglesey salt firm braced for Trump tariffs - BBC News
date: '2025-04-23'
section: General
url: http://www.bbc.co.uk/news/videos/c9w8r0r9qrgo
content: |-
  Halen Môn hopes it can continue to work with US companies after new tariffs are imposed.

  Donald Trump's 10% tariffs on all imports to the United States poses new challenges for a Welsh firm which exports salt to the country.

  The United States is Anglesey-based Halen Môn's third-biggest export market, its managing director Alison Lea-Wilson said.

  She hopes the firm can continue to work with US customers after building up relationships over 25 years.

  Trump announced a 10% tariff on all imports from the UK and many other countries from 5 April which he said were necessary to protect American jobs and manufacturing.
