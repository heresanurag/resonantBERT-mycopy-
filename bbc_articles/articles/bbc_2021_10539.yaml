title: Your pictures of Scotland 30 July - 6 August - BBC News
date: '2021-08-06'
section: Scotland
url: https://www.bbc.co.uk/news/uk-scotland-58081513
content: |-
  A selection of your pictures of Scotland sent in between 30 July and 6 August.

  Send your photos to scotlandpictures@bbc.co.uk. Please ensure you adhere to the BBC's rules regarding photographs that can be found here.

  Please also ensure you follow current coronavirus guidelines and take your pictures safely and responsibly.

  Conditions of use: If you submit an image, you do so in accordance with the BBC's terms and conditions.

  Catch of the day: Mo Matthew captured an Osprey with a trout at Aviemore.

  Chair to dream: David Griffiths said he could let his imagination fly free with this view.

  What UV is what you get: Lucy O'Donnell said the sun came out at the end of a very grey day at Saligo Bay on Islay.

  Gone fishing: Ian Mulvey said the mackerel season was in full swing off Port Seton in East Lothian.

  Rock formation: Ian Munro took this image of lots of people congregating at the top of Ben Nevis.

  Any white horses? Jean Lowdon was glad the sea was not too choppy at Belhaven Beach at Dunbar.

  The bee's knees: Dave Smith said he could see a kaleidoscope of colours in his honeycomb, showing the wide variety of pollen and therefore the flowers his honey bees were foraging on.

  Mistified: David Ellison said he enjoyed the tranquillity of an early morning walk through the Abernethy Forest past Loch Garten.

  Thistle do nicely: Prit Buttar was taking a picture of this flower in Dundrennan, in Dumfries and Galloway when a hoverfly landed on it.

  Sheer terror: Laura McQuade took this view from the foot of the Inaccessible Pinnacle on Skye’s Cuillin Ridge

  Put a kilt on it: Callan Dick said the colours of the foliage bordering Dornoch beach immediately made him think of many tartans he had seen.

  Just great: Susan Urquhart took this lovely picture of her 90-year-old mother with her first great granddaughter - both called Maggie.

  Mid-knight: Chris Colford took this picture of Eilean Donan Castle after dark.

  I can see you: Ian Nicholson manged to get a picture of the elusive wolf fish about 16m below the surface during a dive St Abbs (New Asgard)

  Cloud-cuckoo land: Val Ross said: "A juvenile cuckoo begging to be fed by its foster parent, probably a meadow pipit, on the edge of a wood to the west of Beauly."

  Hairpin bend: Ali Parmenter at the Bealach na Ba said: "What you can't see is the small yellow car that the mega motor home was towing. At the point I took the shot they had almost become completely stuck. They had to detach the car and drive that separately down the pass."

  Seal of approval: "Breakfast in the sun!", Emma Ford said. "We spotted this mummy seal feeding her pup whilst relaxing in the sun on the rocks at Southend, Kintyre."

  Outfoxed: Dave Stewart said this Edinburgh fox walked up for a look with only railings between them, before trotting back to the other five foxes in the field behind in Leith.

  I carrot live without you: Sylvia Black said: "I dug up these two carrot lovers in my vegetable patch in Aberdeen."

  Alpaca hairdryer: Paul Condron said this nosey Alpaca didn't seem too happy at what the first rain in weeks was doing to his hair at Bellevue Farm on the Isle of Arran.

  Working from home: Jackie Mitchell said: "Mount Stuart House on the Isle of Bute was a family home up until 1993."

  Ewe’ve had yours already: Paul Gill took this picture of little Grace feeding orphan lambs, Lola and Ted, on the Isle of Harris.

  Wild life: Pauline May took this beautiful picture of wildflowers at Strichen Community Park, Aberdeenshire.

  Monumental undertaking: Lindsay Kyle took great effort to get this aerial shot of McCaig's Tower in Oban.

  Water you thinking about this?Ambika Meetei Thoudam took this beautiful drone picture of Arisaig.

  Bird's eye view: David Millar loved seeing this seagull up close in Oban.

  As far as the eye can tee: Fraser Spence captured the beauty of Machrihanish Dunes Golf Course.

  Rays the bar: James Thomson took this incredible shot of the sunset view from Elgol (Ealaghol) beach on the Isle of Skye.

  Island paradise: Ruth smith took this stunning photograph of Ailsa Craig.

  Flower of Scotland: This thistle stood out to Claire Sowden due to part of it being in the shade in Aberdeenshire.

  Yummy dummy: Beth Simpson said her daughter, Josie, enjoyed the sand at Ruby Bay Elie.

  Flower power: Susan Nelis said: "Colours, textures, heavenly scents and the humming of honey bees hidden between the River Spey and Moray Coast."

  Over the dune: Matthew Wade said: "Inviting sand dunes leading to turquoise seas on North Uist."

  I lilac this a lot: Alli McMahon took this beautiful picture of a lavender field in Kinross.

  Stoatin' aboot: Lesley Skinner said: "Saw this cutie and his family running about at Duncansby Head on a cloudy, misty day."

  Beauty and the beast: Mark Reynolds said: "A snap of a beautiful pair of swans with the Corpach Wreck and Ben Nevis in the background."

  Shingle-minded: Martin Cannon captured Borve on the Isle of Harris beautifully.

  Wheelie good view: Sheila Jones said: "Cycling from Fort William to Oban on the Caledonia Way, we crossed on the passenger ferry to Camusnagaul before cycling down to the Corran Ferry and on to Oban."

  Mark Cunningham took this picture with a UV filter at Port Logan in Galloway.

