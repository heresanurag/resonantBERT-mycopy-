title: Actor Gérard Depardieu's sexual assault trial set to begin - BBC News
date: '2025-03-24'
section: Europe
url: http://www.bbc.co.uk/news/articles/c1mnvd95ekeo
content: |-
  The French actor is accused of sexually abusing two women during a film shoot in 2021 and faces up to five years in jail.

  French actor Gérard Depardieu has appeared in court at the start of a trial on charges of sexual assault. Depardieu, 76, is accused of sexually abusing two women during a film shoot in 2021. Prosecutors say he made explicit sexual remarks to, and then aggressively "groped", two members of the production team. If convicted, Depardieu could face five years in jail and a fine of up to €75,000 (£63,000; $81,0000). This is the first case against Depardieu to come to trial, although in total about 20 women have accused him of improper behaviour.

  He is the highest-profile figure to face accusations in French cinema's response to the #MeToo movement. Several dozen protesters were present outside the Paris courthouse on Monday, with many holding up placards in support of victims of sexual assault and chanting feminist slogans. Depardieu has consistently denied any wrongdoing and, in an open letter published in French newspaper Le Figaro in 2023, said he had never hurt a woman. "Hurting a woman would be like kicking my mother in the stomach," he wrote. He added that he was "neither a rapist nor a predator" and lamented that it was his word against the "trial by media and lynching" that he faced. Depardieu's lawyer Jérémie Assous said on Monday that his client was "extremely affected" by the impending trial but that he was planning on "letting the truth burst out". Carine Durrieu-Diebolt, the lawyer for one of the two plaintiffs, told Reuters that there was "fear, because he's a cinema giant." "It's a struggle between David and Goliath and [the plaintiffs] are afraid of retaliation as they all work in cinema but at a much lower level than Depardieu." The trial was due to begin late last year but was postponed because of Depardieu's ill health. His lawyer has said the actor has had quadruple bypass surgery, suffers from diabetes and "gets exhausted very very quickly". However Depardieu has now been deemed fit to stand trial by a medical expert and should appear in court on Monday and Tuesday, although he will be afforded frequent breaks. French actor Charlotte Arnould was the first woman to file a criminal complaint against Depardieu, in 2018. An investigation is under way. Despite the mounting allegations, Depardieu - a towering figure of French cinema - has received strong messages of support from some members of France's artistic community. A group of more than 50 actors, directors and producers including Charlotte Rampling and Carla Bruni said accusations against Depardieu were "an attack on art itself" in a letter published in 2023. The same year, French President Emmanuel Macron also attracted anger when he said that Depardieu was "a great actor" who "made France proud". Campaigners said the comments undermined efforts to protect women from violence. Actress Léa Seydoux called Macron's comments "crazy", adding that it "gives a very bad image for France". The trial is due to run on Monday and Tuesday, and a verdict will be announced in several weeks.
