  Last month, police released an image of what the suspected gunman may look like.

  This image was broadcast again on Thursday's programme.

  Police released an image of what the suspected gunman may look like

  The Police Ombudsman's Office has begun an investigation into how the PSNI dealt with information about a potential threat to Mr Donegan received before his murder.

  The ombudsman is investigating whether the information was properly processed.

