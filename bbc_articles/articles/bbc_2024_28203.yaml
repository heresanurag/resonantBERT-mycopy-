  There are few fighters that look more at home in the build-up to a fight than Jones. On Thursday, Jones beamed backstage as he was presented with an electric guitar from a staff member at Madison Square Garden in honour of his UFC achievements. On the day of the fight, Jones could be seen sparring in the octagon in an empty Madison Square Garden - something which is uncommon for UFC fighters. Hours before he was due to walk out to face Miocic, Jones could be seen live on Instagram, singing with his team as he made his way to the arena. Jones had hinted at retirement before his win over Miocic but says he plans to carry on if the UFC makes him an offer he can't refuse. If they don't, Jones feels content with the way his historic UFC career will come to an end. "Professing my love for Jesus in front of everyone tonight, being an American champion, doing that in front of my president [former and the next US president Donald Trump]. If Stipe was my last fight, that was the way to do it," said Jones.
