title: 'Covid-19: Travel to Wales from UK hotspots to be banned - BBC News'
date: '2020-10-14'
section: Wales
url: http://www.bbc.co.uk/news/live/uk-wales-54538579
content: |-
  Latest update on the coronavirus pandemic in Wales on Wednesday 14 October.

  First Minister Mark Drakeford wrote to the prime minister twice to ask if people living in Covid hotspots in England could be banned from travelling to Welsh communities.

  Mr Drakeford said he had "asked for the necessary work to be brought forward, which would allow for devolved powers to be used to prevent people from travelling into Wales from high prevalence areas of the United Kingdom".

  The first minister said if Boris Johnson did not implement travel restrictions in England the Welsh Government would use its powers to bring in its own ban on Friday evening.

  "The timetable for the powers that we have in Wales is to do it by the end of the week," he said.

  "That gives more time for the prime minister, the UK government, to do the things that we have asked him to do, to do the same thing for people who live in England as we have done for people who live in Wales.

  "We've already heard from the first minister in Scotland, and she is eager to support what we're trying to do here.

  "Now is the time for the prime minister to do the same thing.

  "If he isn't willing to do so the timetable is for us to use the powers in Wales by the end of the week."
