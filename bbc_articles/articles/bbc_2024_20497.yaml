title: 'British Museum: Man caught upskirting jailed - BBC News'
date: '2024-08-30'
section: London
url: http://www.bbc.co.uk/news/articles/cn9lee3nrrlo
content: |-
  Jake Verano Gomez was spotted by an off-duty police officer secretly filming a woman.

  Jake Verano Gomez is believed to have targeted several women

  A man who was caught upskirting by an off-duty police officer at the British Museum has been jailed for four months. Jake Verano Gomez was seen taking a video of a woman under her clothes by the female City of London police officer on 19 August, Highbury Corner Magistrates’ Court heard. Similar videos were found on his phone, and police believe he filmed other women visiting the museum that day. Officers are asking anyone who thinks they may have been targeted to come forward. Verano Gomez, a Colombian national of no fixed address, admitted recording an image under clothing to observe another without consent - a crime under the Voyeurism Offences Act, which came into force in 2019.

  The police officer who caught Verano Gomez detained him with the help of museum workers, the court heard. The woman he targeted was supported by museum staff and police.

  The British Museum was the country's most-visited attraction last year

  Det Con Holly Wright said: “These kinds of offences have a devastating impact on women and girls, who should be free to go about their lives without fear of being the victim of such a horrendous crime. “Following his arrest, Gomez’s phone was interrogated by Met detectives. They found a number of videos of other victims also believed to have been filmed that day. Sadly, this may mean there are more women who are unaware that they have been the victim of crime. “If you were at the British Museum on Monday 19 August around 14:00 and think you may have been a victim, I am asking you to come forward and speak to us.”
