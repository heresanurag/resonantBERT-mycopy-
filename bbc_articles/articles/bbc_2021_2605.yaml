id: bbc_2021_2605
title: Winter storm leaves millions without electricity in Texas - BBC News
date: '2021-02-16'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-56090016
content: |-
  Texas is experiencing record low temperatures, with some places dipping to 0F (-18C).

  The sudden increase in electricity demand caused the state's power grid to fail.
