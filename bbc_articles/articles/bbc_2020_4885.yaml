  A weekly update on Covid-19 deaths in Scotland show that up until 10 May 3,213 people lost their lives to the virus.

  Coming up on The Nine: Care home staff 'do not meet testing criteria' even with symptoms

  BBC Scotland's The Nine has seen NHS guidance sent to care homes that advises staff “do not meet criteria for testing” even if they show symptoms of coronavirus. The document, sent to care homes in Fife, says that if the staff member works in a team big enough to “absorb the workload” they should isolate for 14 days instead. But Scottish government guidance states “all symptomatic key workers” can be tested. A Scottish government spokesperson told us “all residents and staff will be offered testing, whether they are symptomatic or not, in homes where there has been a confirmed case”.
