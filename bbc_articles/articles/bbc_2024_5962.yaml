id: bbc_2024_5962
title: Aerial footage shows raids at Sean 'Diddy' Combs's properties - BBC News
date: '2024-03-27'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-68661316
content: |-
  US Homeland Security agents were seen entering the rap mogul's properties in Los Angeles and Miami.

  US Homeland Security Investigations raided properties connected to rap mogul Sean "Diddy" Combs in Los Angeles and Miami on Monday. Authorities said the raids were part of an ongoing investigation. Officials did not specify the reasons for the raids or whether they were tied to Mr Combs.
