  Though he was released after posting bail of 1bn yen (£6.8m; $8.9m), Mr Ghosn but must adhere to strict bail conditions.

  He will not be able to access the internet, and his computer access is restricted to his lawyer's office during weekday daytime hours.

  He must stay at a residence in Tokyo designated by the court, and will be under constant video surveillance.

  Any violations of these restrictions could send him back to jail.

  Mr Ghosn's release comes after Japanese courts had rejected two previous requests for bail, saying the Brazilian-born executive posed a flight risk and could conceal evidence.

  He faces three charges in Japan of financial misconduct, including understating his income and aggravated breach of trust.

  He has said his arrest was the result of a "plot and treason" against him - a bid by some Nissan executives wanting to stop his plan to integrate Renault, Nissan and Mitsubishi.

  The case has attracted global attention and drawn criticism of Japan's criminal justice system, which allows for lengthy detention periods.
