id: bbc_2024_8597
title: Dashcam video shows dramatic rescue from burning car - BBC News
date: '2024-04-22'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-68860065
content: |-
  Drivers in Minnesota stopped in the middle of a highway to help pull a man out from a vehicle on fire.

  A dashboard camera filmed the moment drivers in St Paul, Minnesota, stopped in the middle of a highway to rescue a man trapped inside a burning vehicle.

  The footage shows people desperately trying to open the vehicle doors before someone breaks the driver's window to bring the man out to safety.

  The driver was taken to a nearby hospital but did not sustain any serious injuries.
