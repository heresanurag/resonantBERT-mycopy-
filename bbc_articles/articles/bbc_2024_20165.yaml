title: 'Newspaper headlines: ''Starmer''s tax alert'' and Oasis ''wait is over'' -
  BBC News'
date: '2024-08-28'
section: The Papers
url: http://www.bbc.co.uk/news/articles/c9wjxl0wwwjo
content: |-
  Several front pages respond to the PM's comments about the public spending deficit.

  'Starmer's tax alert' and Oasis 'wait is over'

  Sir Keir Starmer said that October's budget would be "painful" and asked people to "accept short-term pain for long-term good" when it came to the public finances

  The Financial Times, external says the wealthy are braced for what it calls an "October blow". According to the paper, Sir Keir Starmer is "betting" that the public will blame the former Conservative government for any tax rises and that such increases will not impede his push for higher growth. The FT also reports that the biggest trade union is unhappy with the speech, saying Unite is railing at what it describes as Sir Keir's "bleak vision of Britain". The Daily Telegraph, external calls the Downing Street rose garden address a "tax alert for middle England", with families preparing for "a capital gains tax raid". The paper says there is mounting concern that the government could align capital gains tax with income tax - potentially increasing the higher rate from 20% to 45%. "Finally Starmer comes clean," declares the Daily Mail, external headline, adding "he’ll "soak" the middle class". The paper says his "doom-laden" speech is paving the way for hikes to capital gains tax, inheritance tax and a possible raid on pensions. "Yes! It will be 'painful' for Britain's elderly this winter," is the verdict of the Daily Express, in reference to the decision to end winter fuel payments for millions of pensioners. The Express, external carries a call from a Labour peer, Lord Foulkes, for the chancellor to postpone the cut. In a comment piece, he says the winter fuel payment needs reform. But he goes on to say that cutting it entirely, with little notice, “will leave thousands of pensioners at risk this winter”. The Daily Mirror, external calls the speech "Starmer's big ask". The paper says he "always knew rebuilding Britain would be a tough job" but it carries warnings "not to prolong the agony for struggling households". The Mirror quotes Dennis Reed, the head of the pensioner campaign group, Silver Voices, who says: "There will be horror stories about people who can’t afford to heat their homes over winter.”

  Several papers lead on Sir Keir Starmer's visit to Germany and France, with the Guardian, external highlighting his promise to "turn a corner on Brexit". According to the paper, his attempt to renegotiate European relationships is part of a broader strategy of making contentious decisions early in his prime ministership to "reap the rewards for them closer to the next election". The i newspaper, external says he will lay the groundwork for what it calls a "softer Brexit" in Berlin this morning. The paper says the prime minister believes that strengthening relations with Europe will be crucial in boosting UK economic growth. The Times, external reports that Sir Keir is seeking a new deal with Germany so British businesses have "priority access" to Europe's biggest economy, in a "once-in-a-generation opportunity". A source tells the paper that discussions will focus on "tackling the problems" that make it difficult for British businesses, including getting certifications and information about tenders. Finally, "The Masterplan" for an Oasis reunion receives widespread coverage. A brooding photo of the Gallagher brothers, side by side, adorns the front of the Sun, external, which says it cannot wait for their "epic" 14-date tour next summer. A source tells the paper the shows will "sell out in less than three minutes". Extra gigs will definitely be announced, insists the Sun.

