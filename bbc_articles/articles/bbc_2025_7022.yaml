  A man and a woman have been charged after the discovery of Paria Veisi's body in Cardiff.

  Two charged after body of missing woman found

  Paria Veisi was last seen at 15:00 BST on 12 April

  Detectives have found the body of a missing 37-year-old woman after a murder investigation was launched. Paria Veisi, from Cathays, in Cardiff, was last seen at 15:00 BST on 12 April when she left her place of work driving a black Mercedes GLC 200. A man from Penylan, Cardiff, and a woman from White City Estate, London, have been charged. Both appeared in Cardiff Magistrates' Court on Saturday and have been remanded in custody.

  Ms Veisi's body was discovered at an address in Penylan, police said. The 41-year-old man from Penylan has been charged with murder, preventing lawful and decent burial of a dead body and assaulting a person occasioning them actual bodily harm. The 48-year-old woman from Australia Road, White City Estate, London, has been charged with preventing a lawful and decent burial of a dead body and conspiring to pervert the course of justice. Senior Investigating Officer, Det Ch Insp Matt Powell, said: "This brings our search for Paria to a sad and tragic end. Paria's family, all those who knew her, and those in her local community, will be deeply saddened and shocked by these latest developments." He added there will be detectives and crime scene investigators in the Penylan area over the next week. Those charged are due to appear at Cardiff Crown Court on 22 April.
