content: |-
  Georgia's parliament voted through a law that critics say could be used to threaten civil liberties.

  Riot police in Georgia have responded with force as protesters attempted to storm the parliament in Tbilisi.

  Georgia's parliament voted through a divisive "foreign agent" law that critics say could be used to threaten civil liberties.

