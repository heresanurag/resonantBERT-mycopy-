title: 'Watch: Newlyweds lose first home in deadly Kentucky storm - BBC News'
date: '2025-05-20'
section: General
url: http://www.bbc.co.uk/news/videos/cq54w918q9qo
content: |-
  Amerah and James Taylor lost their new home and their wedding rings when the tornado hit.

  Severe storms in the Midwest and South killed more than two dozen people, with officials fearing the death toll could still rise.

  Kentucky was the hardest hit state as a devastating tornado damaged hundreds of homes and left many people homeless, according to the BBC's US partner CBS News.

  Newlyweds Amerah and James Taylor lost their first home when a tornado struck London, Kentucky on 17 May. "We should not have survived this", Amerah Taylor said. The couple described being tossed around the house as the tornado struck and losing both of their wedding rings.
