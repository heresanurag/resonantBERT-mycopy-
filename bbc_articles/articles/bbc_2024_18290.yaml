  The founder of Protect says he had been unhappy at incidents, unrelated to the group, in Stoke-on-Trent and in Birmingham where Muslim men had shown up with weapons, saying it was a central rule of Protect that people neither turn up with weapons or with face coverings. He, and many other Muslim groups, also condemned an attack on a man who was punched and kicked outside a pub in Birmingham. “We've not made (the group) to incite racial hatred or start riots, but to protect ourselves and be vigilant,” says the Protect founder, who says creation of the group has been purely driven by the fear of further violence, particularly among Muslim women, some of whom have reported having headscarves pulled off or having faced abuse or assault. “We keep saying if there's a protest going on, don't go there. Don't be stupid. Let them protest. As long as they're not coming to our places to cause damage, don't put yourself where you don't need to be,” he says. During the week we saw some of the group’s rules in action. One evening Protect had made its members aware that a mosque in Accrington had put out a call for help because of concerns of violence.

  We saw dozens of young men gathered outside the mosque. They were repeatedly told by organisers not to wear masks or balaclavas, there was no evidence of any weapons as they stood alongside police. In fact, the evening passed off peacefully, with some of the evening’s most viral video moments playing out in Accrington, as pubgoers came out to hug the young Muslim men as they walked away from the mosque when it was clear there would be no trouble. The young men had been with the police throughout and had been chatting with officers. “We don't want war, and we're not asking for all this to happen,” says Protect’s founder. “But this country belongs to us as much to them. We were born here, our parents were born here. Some of our grandparents or great-grandparents fought in the World War II. “So I think we've got as much right as anybody else to call this country.”
