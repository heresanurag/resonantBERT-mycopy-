id: bbc_2018_2216
title: 'Matthew Falder: Experts on ''pure monster'' - BBC News'
date: '2018-02-19'
section: General
url: http://www.bbc.co.uk/news/uk-england-birmingham-42947475
content: |-
  The university lecturer is described by US Homeland Security as the 'worst' online offender.

  A university lecturer who hunted for vulnerable victims online boasted he would "never be caught".

  It took the UK's National Crime Agency four years to catch Dr Matthew Falder, who worked at the University of Birmingham.

  British police formed a unique taskforce with the FBI, US Homeland Security, Europol and GCHQ to track Falder, who hid behind email encryption, pseudonyms and dark web paedophilia sites.
