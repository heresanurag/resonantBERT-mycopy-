  After the summit, Zelensky went to Sandringham where he met King Charles III. He later spoke to reporters at a final press briefing where he said he was ready to sign a deal on minerals with the US. Ukraine was expected to sign the deal - which would grant the US access to Ukraine's rare mineral reserves - during Zelensky's visit to Washington, but the Ukrainian delegation ultimately left early after a heated confrontation with Trump in the Oval Office. Earlier on Sunday, US Treasury Secretary Scott Bessent warned a deal on minerals between the US and Ukraine could not be signed "without a peace deal" with Russia. But when asked by the BBC about the future of the deal following the summit, Zelensky said it was ready to be signed. "The agreement that's on the table will be signed if the parties are ready," he said.

  There was a warm reception for Zelensky as he met King Charles

  Sunday's summit concludes a hectic week of diplomacy, which included visits to Washington by Macron, Starmer and Zelensky. Zelensky's meeting, however, culminated in a heated exchanged with Trump and US Vice-President JD Vance, in which the US president accused his Ukrainian counterpart of "gambling with World War Three". Trump has said he wants to end the war in Ukraine and has expressed trust in Russian President Vladimir Putin, to the consternation of many of his Western allies. The US has also begun peace talks with Russia - excluding Ukraine. At one point, the US leader accused Ukraine of starting the war - even though it was Putin who launched a full-scale invasion of Russia's neighbour on 24 February 2022.

