title: 'Starmer: Coalition of willing to guarantee Ukraine peace - BBC News'
date: '2025-03-02'
section: Europe
url: http://www.bbc.co.uk/news/articles/c9vygkzkkrvo
content: |-
  The UK prime minister says Europe would take the lead but would need US backing for a peace plan.

  Starmer announces 'coalition of the willing' to guarantee Ukraine peace

  UK Prime Minister Keir Starmer has announced a four-point plan to work with Ukraine to end the war and defend the country from Russia. The UK, France and other countries will step up their efforts in a "coalition of the willing" and seek to involve the US in their support for Ukraine, he said on Sunday - after calling a summit of 18 leaders, mostly from Europe and including Volodymyr Zelensky - three days earlier. "We are at a crossroads in history today," Starmer said after the summit while Zelensky said Kyiv felt "strong support" and the gathering showed "European unity at an extremely high level not seen for a long time". It comes two days after a fiery exchange between the Ukrainian leader and US President Donald Trump in the White House.

  "We are all working together in Europe in order to find a basis for cooperation with America for a true peace and guaranteed security," Zelensky said after the summit. Meanwhile, French President Emmanuel Macron told Le Figaro newspaper that Paris and London wanted to propose a one-month truce between Russia and Ukraine "in the air, at sea and on energy infrastructure". Speaking at a news conference shortly after the meeting of leaders, Starmer said four points had been agreed:
  • None to keep military aid flowing into Ukraine, and to keep increasing the economic pressure on Russia
  • None that any lasting peace must ensure Ukraine's sovereignty and security and Ukraine must be present at any peace talks
  • None in the event of a peace deal, to boost Ukraine's defensive capabilities to deter any future invasion
  • None to develop a "coalition of the willing" to defend a deal in Ukraine and to guarantee peace afterwards Starmer also announced an additional £1.6bn ($2bn) of UK export finance to buy more than 5,000 air defence missiles. This comes on top of a £2.2bn loan to provide more military aid to Ukraine backed by profits from frozen Russian assets. "We have to learn from the mistakes of the past, we cannot accept a weak deal which Russia can breach with ease, instead any deal must be backed by strength," he said. The prime minister did not state which countries had agreed to join this coalition of the willing, but said that those who had committed would intensify planning with real urgency. The UK, he said, would back its commitment with "boots on the ground, and planes in the air". "Europe must do the heavy lifting," he said, before adding that the agreement would need US backing and had to include Russia, but that Moscow could not be allowed to dictate terms. "Let me be clear, we agree with Trump on the urgent need for a durable peace. Now we need to deliver together," Starmer said. When asked if the US under Trump was an unreliable ally, he said: "Nobody wanted to see what happened last Friday, but I do not accept that the US is an unreliable ally."

  Countries at the summit included France, Poland, Sweden, Turkey, Norway, the Czech Republic, Denmark, Germany, the Netherlands, Romania, Finland, Italy, Spain and Canada. European Commission President Ursula von der Leyen said that there was now an urgent need to "re-arm Europe". These sentiments were echoed by Nato Secretary General Mark Rutte, who said the meeting had seen European countries "stepping up" to make sure Ukraine has what it needs to "stay in the fight as long as it has to continue".

