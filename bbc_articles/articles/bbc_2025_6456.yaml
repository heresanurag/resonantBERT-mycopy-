title: Keir Starmer paid £54,718 in tax last year - BBC News
date: '2025-04-15'
section: Politics
url: http://www.bbc.co.uk/news/articles/cvgnvqvx7dvo
content: |-
  The prime minister, his deputy and the chancellor publish summaries of their taxes for 2023/24.

  Prime Minister Sir Keir Starmer paid £54,718 in income tax in 2023/24, according to a document released by the government. A summary shows he paid the tax on £152,225 of income in the financial year ending 5 April 2024, a period when Labour was in opposition. Sir Keir received most of his income from his role as an MP and smaller amounts from book royalties and £5,174 of interest on money in a savings account. Chancellor Rachel Reeves and Deputy Prime Minister Angela Rayner have also published summaries of their tax affairs for the same year.

  Reeves earned a total of £91,758 and paid £24,215 in income tax. The chancellor received £12,372 from self-employment income, which was related to book royalties and audiobook fees. Rayner earned a total of £85,205 and paid £21,514 in income tax. All of Rayner's income and taxable benefits came from her role as an MP. Sir Keir's tax bill for 2023/24 was lower than the previous financial year, when he paid £52,688 in capital gains tax after the December 2022 sale of a field partly owned by his father's estate. His tax bill in 2022/23 was five times lower than former Prime Minister Rishi Sunak's for the same year.

  Sir Keir's latest summary, external of his UK taxable income, capital gains and tax paid over the last tax year as reported to HM Revenue & Customs, was prepared by his chartered accountants. David Cameron became the first UK prime minister to publish a summary of his tax returns in 2016, after revelations about his late father's offshore fund. Theresa May released her tax return during her campaign to be Tory leader in 2016, but did not do so when she was prime minister. The two prime ministers who preceded Sunak - Boris Johnson and Liz Truss, who held the post for less than two months - did not publish their tax returns. Sunak and Jeremy Hunt published tax figures while they served as prime minister and chancellor respectively. Reeves had initially said she had no plans to publish details of her tax affairs when asked whether she would do so earlier this year. Bur Reeves later said: "I'm very happy to release my tax return in accordance with what's happened in the recent past, and I'll be doing that alongside the prime minister in due course." The Conservatives have previously said their leader Kemi Badenoch had no plans to publish details of her 2023/24 tax return. The BBC has approached the Conservative Party for comment.
