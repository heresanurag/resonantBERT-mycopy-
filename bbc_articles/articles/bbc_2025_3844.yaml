  Many would want a straightforward first race of the season. But Albert Park has a habit of throwing up curveballs, and it seems the weather may oblige on Sunday, with rain predicted. "It's a new car," Norris said. "So there are a lot of unknowns and question marks about how it will perform. It's not always as simple as just putting on wets and having a crack. "A bit of our pace potentially goes out of the window because it's harder to extract and show the difference of pace we had today. But we're in the best position to do that if we can. I know the chances of rain have been going down, but normally wet races and inter races are pretty exciting." What he did not mention is that the rain brings Verstappen - who would not expect to match the McLarens in a dry race - right into the picture. "The only thing I can say about Max in the wet is that he is mega," he said. "He can be a significant threat." Hamilton, too, has made a reputation for being special when it rains. But his circumstances mean he will not be treating it with the usual smile. "The wet has often been something I have enjoyed," Hamilton said. "So it's a comfort zone for me but I am going out for the first time in the wet in an uncomfortable position because I have never driven this car. "It is going to be a shock to the system when I first get out there, but I will be learning on the fly and giving it everything."

  British driver Nigel Mansell won his first race for Ferrari, at the 1989 Brazilian Grand Prix. Mansell started from sixth on the grid
