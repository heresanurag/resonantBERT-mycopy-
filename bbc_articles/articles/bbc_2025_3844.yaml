content: |-
  Lewis Hamilton's first qualifying session for Ferrari was perfectly decent but it was a sobering start to the season for his new team, says Andrew Benson.

  'No Hamilton fairytale as Norris and McLaren deliver on potential'

  Lewis Hamilton is starting his 19th season in Formula 1

  Coverage: Live commentary on BBC Radio 5 Live from 03:30. Live text updates on BBC Sport website and app

  There was no fairytale for Lewis Hamilton on his first competitive outing for Ferrari, as Formula 1's most celebrated driver began his career with the sport's most iconic team. The seven-time world champion qualified only eighth for the season-opening Australian Grand Prix - one place and 0.218 seconds slower than his team-mate Charles Leclerc, and a whopping 0.877secs behind Lando Norris' McLaren on pole position. Afterwards, Hamilton was repeating the mantra he has been using for some time - that it is going to take a little time before he is fully up to speed with his new car and team. "For me, just improving every single lap, session on session," he said. "Big learning curve this weekend. "The car was so much different than I have ever experienced here and it's been a lot slower process to build confidence in the car. "In the high-speed [corners], I have been down all weekend to Charles, who has had confidence from the get-go. He knew what the car does. I was just building up to that. I got a lot closer in the end and to be that close to Charles in my first qualifying session against a great qualifier..."

  He didn't complete the sentence, but the meaning was clear - Leclerc is blindingly fast; everyone knows that. So from Hamilton's point of view, in terms of his own relative performance, this was a perfectly decent start. The same could not be said of Ferrari themselves. Hamilton is at Ferrari with one objective only - to win an eighth world title. Leclerc himself spoke on Thursday about winning a championship with Ferrari being his "obsession". Neither will achieve their aims with a car that qualifies on the fourth row of the grid. Leclerc was perplexed by what had happened. He had been quick all weekend, and fourth fastest in the first qualifying session, just over 0.1secs off Norris, who topped all three. But it became progressively worse as the hour developed. "As soon as we started to push the car more and more," Leclerc said, "we found more and more inconsistency, which was a bit of a shame. "We lost the pace a little bit through qualifying. In Q1 we were good, in Q2 we were less good and in Q3 we had to push a lot to try and nail the lap time. We didn't really follow the track for some reason. "This car has a lot of potential but for now we don't seem to be in the right window, so we have to find it."

