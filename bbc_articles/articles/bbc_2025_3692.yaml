title: North Sea ships crash captain held for longer in police inquiry - BBC News
date: '2025-03-14'
section: Hull & East Yorkshire
url: http://www.bbc.co.uk/news/articles/cdel4nxwe5do
content: |-
  The Russian national will spend an extra 24 hours in police custody after being arrested on Monday.

  Police get more time with North Sea crash captain

  The Russian captain of the Solong cargo ship was arrested on Monday

  The captain of a cargo ship arrested after a collision in the North Sea is being held in custody for a further 24 hours "due to the complexities of the incident", police said. The 59-year-old Russian man was arrested on suspicion of gross negligence manslaughter. The US-registered tanker Stena Immaculate, which was carrying 220,000 barrels of aviation fuel, and the Portuguese-flagged cargo ship Solong crashed off the East Yorkshire coast on Monday. Humberside Police said detectives were given more time to question the man after magistrates had previously granted a 36-hour extension on Wednesday.

  Both ships were engulfed in flames and 36 crew members were rescued. A crew member of Solong remains missing and is presumed dead.

  The Stena Immaculate was carrying 220,000 barrels of aviation fuel

  In a statement, Humberside Police said: "Additional time has been imperative to the investigation due to the complexities of the incident with the vessels in the sea, the number of witnesses involved and establishing any scenes to collate and gather information and evidence. "Extensive lines of inquiry are continuing, and further updates will be provided when we can." It said officers were continuing to support the family of the missing crew member, who was "believed to be deceased". The force is conducting its inquiry in parallel with the Marine Accident Investigation Branch (MAIB), which is trying to establish the cause of the crash. On Friday, Stena Bulk said salvage experts from SMIT Salvage had successfully boarded Stena Immaculate to conduct a thorough assessment. It said the salvage process was "necessarily methodical, comprehensive and ongoing" and would "require time to complete fully".

  This video can not be played To play this video you need to enable JavaScript in your browser. Footage shows the extent of the damage on Solong

  Chief coastguard Paddy O'Callaghan said "only small periodic pockets of fire" on Solong remained, which were "not causing undue concern". He added regular aerial surveillance flights continued to monitor the vessels and confirmed "there continues to be no cause for concern from pollution" from either ship. The MAIB said its initial inquiries found the Solong was travelling from Grangemouth to Rotterdam and had often sailed the same route. "At 09:47 GMT it struck the Stena Immaculate that was at anchor off the entrance to the River Humber," the MAIB said. The ship was travelling at about 16.4 knots (about 19mph). The agency added it was gathering witness accounts and would also look at the "navigational practices on board both vessels; the manning and fatigue management; the condition and maintenance of the vessels involved; and the environmental conditions at the time." All 23 crew on board Stenna Immaculate were Americans who are currently in Grimsby and are likely to be repatriated in due course, the BBC understands. The MAIB said it was leading the safety investigation into the incident, with Portugal and the US acting as "substantially interested states".
