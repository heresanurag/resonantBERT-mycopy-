content: |-
  The prince, also joined by Declan Rice, is aiming to highlight the importance of supporting mental wellbeing.

  The Prince of Wales has spoken about mental health in a new video.

  He was joined by Premier League footballers Harry Kane and Declan Rice, and presenter Kelvyn Quagraine, to have a conversation about football and personal struggles in their lives.

  They hope their open conversation will help highlight the importance of supporting mental wellbeing.

  The men spoke to one another in an episode of Game Of Fives on the COPA90 Football YouTube channel.

  Read more about their talk here.
