title: Banff teenager who lost legs walking again for Christmas - BBC News
date: '2024-12-23'
section: Scotland
url: http://www.bbc.co.uk/news/articles/c98ldz7l57lo
content: |-
  The promising goalkeeper - badly injured in a car crash - is now "thankful" to be home for good.

  Teenager who lost legs walking again for Christmas

  This video can not be played To play this video you need to enable JavaScript in your browser. Adam is now adapting to life with his new prosthetic legs

  A promising teenage footballer who lost both lower legs after a car crash is home from hospital and walking again - in time for Christmas with his family. Adam Golebiewski was 17 when he was injured in the crash in Macduff, Aberdeenshire, in September. After undergoing the double amputation he celebrated his 18th birthday during his rehabilitation in hospital in Aberdeen, and was fitted for prosthetics. He told BBC Scotland News he was "thankful and grateful" to have succeeded in his ambition to be home by Christmas.

  Adam was recently able to walk out of hospital

  Apprentice builder Adam, from Banff, was a passenger in a car which crashed in Macduff's Union Road in the early hours of Sunday 8 September. Police Scotland said a 19-year-old man was later charged in connection with the crash. Three other teenagers were also injured in the crash. Adam was taken to hospital, where his legs were amputated below the knee. The football-obsessed goalkeeper - whose manager at junior side Deveronside described as having great potential - underwent intensive rehabilitation at Woodend Hospital in Aberdeen for about three months.

  The teenager's dad - also Adam - said the family was glad to have him back home

  The teenager, who is one of four siblings, has previously told BBC Scotland that he was just happy to be alive. Now back home, he is going to the gym and looking at his future sporting options. He described walking again and getting home as the "best feeling", adding that he had been "so excited" when he first stood up. Adam said the first weekend back at home had been difficult because it was the first time he had sat and spoken properly about the accident. "I just thought in my head: 'Why was it me? Why did it happen to a guy that was just trying to do well in life?' "It's a bit crazy to be walking already. I was just so happy to get out. I am very happy with them [the prosthetics], I get to do normal things again. "If I am with people I am the happiest person alive. Even when I cry I will smile."

  Adam's target was to get home for Christmas

  Adam said his goal was to try new things, including sports that he would not have tried before the accident. "It's been three months of pain, being trapped in hospital, but I am home now, so that's the most important thing," he said. "People say we're so proud of you, you must be proud of yourself. I'm just like 'I am' but I would keep that to myself." Adam has become a bit of an unwitting local celebrity as people try to keep track of his recovery. "I can't even walk five steps without people coming up to me asking how I am getting on," he said. He was recently invited to a special festive service at Aberdeen's St Machar's Cathedral by Andrew Simpson, the lord lieutenant of Banffshire.

  Adam was invited to a special festive service in Aberdeen

  Mr Simpson said: "When I heard about Adam's progress I wanted to invite him to it. "It was terrific, the service theme was empathy. Adam was the right person to be there. He has had great support." Adam's mum and dad, Joanne and Adam snr, said renovations had been made at home, such as removing doors, to help him when he is using a wheelchair. "It's been great to have him back, he was ahead of the game," his dad said. Adam's solicitor, Lisa Gregory, described him as "one of the most positive individuals you could hope to meet". She said: "Considering the injuries that he has sustained, we have all been blown away by his spirit and resilience. "Those injuries are, however, life-changing and we need to ensure now that Adam gets the medical, emotional and financial security he needs so that he can continue to live his life to the full and maintain his positivity."

  Adam was assisted in hospital by orthopaedic rehabilitation physiotherapist Owen Cairns. "I could not be more thankful and grateful for everything he did, helped me through everything, and got me on my feet again before Christmas which was my goal," the teenager said. "I was a bit upset to leave as me and Owen chatted about football." He said he appreciated the help of everyone in hospital. "They made me feel sort of special in there, even though I was just a boy from Banff that ended up in there."

  Adam is sure he will enjoy Christmas

  He is now anticipating the Christmas festivities back home, as he had dreamed. Asked what his hopes were of how it would go, Adam said: "To enjoy it like every other Christmas, and spend time with my family. "We are going to my grandma's. "I am sure I will enjoy it, and opening presents." He added: "They still see me as the same person. I am still the same, I just don't have legs any more."
