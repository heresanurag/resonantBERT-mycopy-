title: Great Yarmouth murder arrest after woman's body found in house - BBC News
date: '2024-01-20'
section: Norfolk
url: http://www.bbc.co.uk/news/uk-england-norfolk-68044068
content: |-
  Norfolk Police has referred itself to the independent watchdog due to "previous contact" prior to the death.

  A woman's body has been found by police at a property in Princes Road, Great Yarmouth

  A man has been arrested on suspicion of murder after a woman was found dead at a house.

  Police went to Princes Road, Great Yarmouth, Norfolk at about 09:11 GMT, after receiving information that a woman's body was in the property.

  A man, in his 40s, was arrested on suspicion of murder and has been taken into custody for questioning.

  Det Insp Alix Wright, of Norfolk Police, said: "We are in the very early stages of this investigation and are currently working to understand the sequence of events which has led to this woman's death.

  "We do, however, believe this to be an isolated incident and both parties were known to one another."

  A cordon has now been put in place around the house.

  The force also said that "following previous police contact prior to death" the matter would be referred to the Independent Office of Police Conduct.

