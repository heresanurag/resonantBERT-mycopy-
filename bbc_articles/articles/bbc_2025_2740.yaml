title: Mosul's historic al-Nuri mosque and al-Hadba minaret rise again - BBC News
date: '2025-02-05'
section: Middle East
url: http://www.bbc.co.uk/news/articles/cjw4zv533g7o
content: |-
  Some 80% of the Old City of Mosul, in northern Iraq, was destroyed under the Islamic State group.

  Mosul's landmarks rise again after IS destruction

  The famous leaning al-Hadba minaret was destroyed in the battle to liberate Mosul in 2017

  Historic buildings in Mosul, including churches and mosques, are being reopened following years of devastation resulting from the Iraqi city's takeover by the extremist Islamic State (IS) group. The project, organised and funded by Unesco, began a year after IS was defeated and driven out of the city, in northern Iraq, in 2017. Unesco's director-general Audrey Azoulay attended a ceremony on Wednesday to mark the reopening. Local artisans, residents and representatives of all of Mosul's religious communities were also there.

  In 2014, IS occupied Mosul, which for centuries was seen as a symbol of tolerance and co-existence between different religious and ethnic communities in Iraq. The group imposed its extreme ideology on the city, targeting minorities and killing opponents. Three years later, a US-backed coalition in alliance with the Iraqi army and state-linked militias mounted an intense ground and air offensive to wrest the city back from IS control. The bloodiest battles focused on the Old City, where the group's fighters made a last stand.

  IS detonated a series of explosives inside the al-Nuri mosque as the group retreated in 2017

  Mosul photographer Ali al-Baroodi recalls the horror that greeted him when he first entered the area shortly after the street-by-street battle was over in the summer of 2017. He saw the gloriously skewed al-Hadba minaret, known as the "hunchback", which had been emblematic of Mosul for hundreds of years, in ruins. "It was like a ghost town," he says. "Dead bodies all around, a sickening smell and horrible scenes of the city and the skyline without the Hadba minaret. "It was not the city that we knew - it was like a metamorphosis - that we never imagined not even in our worst nightmares. I fell silent after that for a couple of days. I lost my voice. I lost my mind."

  The crooked al-Hadba minaret has dominated the Mosul skyline for hundreds of years

  Eighty per cent of the Old City of Mosul, on the west bank of the Tigris, was destroyed during IS's three-year occupation. It was not just the churches, mosques and old houses that needed to be repaired, but also the community spirit of those who had lived there for so long in relative harmony between religions and ethnicities.

  The huge task of rebuilding began under the auspices of Unesco with a budget of $115m (£93m) that the agency had managed to drum up, much of it from the United Arab Emirates and the European Union. Father Olivier Poquillon - a Dominican priest - returned to Mosul to help oversee the restoration of one of the key buildings, the convent of Notre-Dame de l'Heure, known locally as al-Saa'a, which was founded nearly 200 years ago. "We started by trying first to gather the team - a team composed of people from Old Mosul from different denominations - Christians, Muslims working all together," he says.

  Under IS, the Dominican al-Saa'a Convent was looted, ransacked and damaged

  Father Poquillon says that bringing the communities together was the biggest challenge and the biggest achievement. "If you want to rebuild the buildings you've got first to rebuild trust - if you don't rebuild trust, it's useless to reconstruct the walls of those buildings because they will become a target for other communities." In charge of the entire project - which included the restoration of 124 old houses and two especially fine mansions - has been the chief architect Maria Rita Acetoso, who came to Mosul straight from restoration work for Unesco in Afghanistan. "This project demonstrates that culture too can create jobs, can encourage skills development and in addition can make those involved feel part of something meaningful," she says. She hopes the reconstruction can restore hope and enable the recovery of people's cultural identity and memory. "I think this is particularly important for the young generations growing up in a situation of conflict and political instability," she adds.

  Unesco says that more than 1,300 local young people have been trained up in traditional skills, while some 6,000 new jobs have been created. More than 100 classrooms were renovated in Mosul. Thousands of historical fragments were recovered and catalogued from the rubble. Among the host of engineers involved in the rebuilding, 30% were women.

  The roof and many of the arcades of Al-Tahera Church, destroyed under IS, have been fully restored

  Eight years on, the bells are ringing out again across Mosul from al-Tahera Church, whose roof collapsed after serious damage under IS occupation in 2017. Other major landmarks of Mosul have also been restored - that wriggling minaret of al-Hadba, the Dominican al-Saa'a Convent and the complex of Al-Nouri mosque.

  A ceremony beneath the Hadba minaret to mark the reconstruction - funded and organised by Unesco

  And people have been able to return to the houses that have been home to their families for centuries. One resident, Mustafa, said: "My house was built in 1864 - unfortunately it was partly destroyed during the liberation of Mosul and it was unsuitable to live there, especially with my children. "So I decided to move to my parents' house. I was very pleased and excited to see my house rebuilt again."

  The al-Nuri mosque and al-Hadba minaret were both completely destroyed by IS in 2017 (file photo from 2014)

  Abdullah's family has also lived in a house in the Old City since the 19th Century when the area was a centre for the wool trade - which is why he says their home is so precious to them. "After Unesco rebuilt my house, I came back," he says. "I can't describe the feeling I had because after seeing all the destruction that happened there, I thought I would never be able to come back and live there again."

  Unesco Director General Audrey Azoulay surveys the Old City of Mosul atop al-Hadba minaret

  The scars of what the people of Mosul endured are yet to heal - just as much of Iraq remains in a fragile state. But the Old City's rebirth from the rubble represents hope for a better future - as Ali al-Baroodi continues to document the evolution of his beloved home day by day. "It's truly like seeing a dead person coming back to life in a very, very beautiful way - that is the true spirit of the city coming back to life," he says.

