title: Spain's Hermoso was 'overwhelmed' after World Cup kiss, court hears - BBC News
date: '2025-02-07'
section: Europe
url: http://www.bbc.co.uk/news/articles/cge7p94pj4po
content: |-
  Teammates of Jenni Hermoso have testified in a trial over a kiss between her and former football chief Luis Rubiales.

  Spanish football players Alexia Putellas and Irene Paredes testified in court on Thursday

  Teammates of Spanish footballer Jenni Hermoso have given testimony in support of her account of feeling overwhelmed after being allegedly forcibly kissed by Spain's former football chief Luis Rubiales. Her teammates Irene Paredes, Laia Codina, and Alexia Putellas appeared at the trial of Mr Rubiales in Madrid on Thursday, where he is accused of sexual assault and coercion. Ms Putellas said Ms Hermoso had felt "overwhelmed" after the incident, while Ms Codina said she was "sad" and "not enjoying herself". Mr Rubiales kissed Ms Hermoso on the lips during the 2023 Fifa Women's World Cup medal ceremony in Australia, triggering protests and calls for his resignation. He denies any wrongdoing.

  Ms Hermoso had told the court on Monday she had never given permission to be kissed at the World Cup medal ceremony and felt "disrespected" as a woman. Ms Putellas said she thought at the time the incident had been something "fortuitous" and a "misunderstanding" but Ms Hermoso then later showed her a video and said she did not know how it occurred to Mr Rubiales to kiss her, according to local Spanish media. The court heard from Ms Paredes that while on the bus to the airport after the World Cup final, she told her teammates to stop making jokes about the incident, saying it was "serious". Ms Putellas said that Ms Hermoso was "overwhelmed" on the plane back to Spain. "She started crying from exhaustion," the Barcelona player added. The 31-year-old said Ms Hermoso was asked to speak to Mr Rubiales on the plane who told her that she should "come out" and "deny that there was no consent" in the kiss. "She was angry and she said that there was no need for him to explain the facts to her because she had experienced it, that she wasn't going to do that," Ms Putellas said. Ms Codina told the trial that during the team's celebratory trip to the Spanish island of Ibiza, Ms Hermoso was "sad, she was not enjoying herself, far from it" even though it "should have been the best moment" of her life.

