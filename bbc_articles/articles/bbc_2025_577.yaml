title: 'Lewisham: Armed police at stand-off after man seen with knife - BBC News'
date: '2025-02-10'
section: London
url: http://www.bbc.co.uk/news/articles/ce85lgng60go
content: |-
  Officers were called to Lewisham High Street on Monday after a man was seen with a knife in a flat window.

  Armed police responded to reports of a man in a dressing gown brandishing a knife out of the window

  Armed police remain at a stand-off in a flat above some shops in south-east London. They were called after a man was seen brandishing a knife through a third-floor window in Lewisham High Street. The area has been cordoned off, with significant impact on traffic, pedestrians and buses. The Met Police said there was "no indication" anyone else was in the property.

  A section of the A20 has been closed while emergency services attended the scene. Lewisham Council have said they have staff at the scene to support anyone unable to access their home - and that those affected should go to the cordon or call 020 8314 6000.

  A branch of HSBC bank closed as a precaution as officers responded to a "disturbance" on Lewisham High Street

  A food retailer at Lewisham Market, who did not want to be named, said the incident had been going on since late morning. A branch of HSBC opposite closed as a precaution, and the bank said no customers or staff were involved.

  Police say they are in conversation with a man in the flat above some shops

  The Met Police said officers were called to a disturbance at around 10:45 GMT. A passer-by, Callum Fahim, said he saw a man leaning out of a third-floor window waving a large knife around. "There are two armed police officers with a gun aimed at him, and they've been like that for a long time now. "I can't see any signs of any negotiations or anything taking place. There's fire engines, police and ambulance. "And now some police horses have turned up."
