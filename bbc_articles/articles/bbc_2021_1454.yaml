content: |-
  Boris Johnson joins Britons applauding the NHS fundraiser who has died at the age of 100.

  Analysis: Expect many arguments to come...

  So good news. Ten million have had a dose of the vaccine. And, importantly, England's chief medical officer says we're past the peak of this wave, or at least we should be if infection rates don’t start climbing again. Both are significant. They’re also the reason why Boris Johnson was starting to come under pressure, with questions like why can’t those who have had the vaccine start to mix with each other at least? Could schools go back earlier in England? It’s clearly still too early for the government to be able to signal to people that they can begin to relax. The numbers of people infected with Covid-19 around the country, at one in 55, are still very high. The prime minister would only say that he will set out, on 22 February "the timetable, the earliest dates we can do things". And he indicated he was still thinking about loosening the current restrictions in stages. "It feels to us that we will be going down the tiers nationally," said Johnson. Expect many arguments to come about when any loosening should happen, how soon should schools reopen, and whether some areas will move faster than others.
