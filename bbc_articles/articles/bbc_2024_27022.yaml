title: LA Dodgers-San Diego Padres game delayed as fans throw baseballs and beer at
  Jurickson Profar - BBC Sport
date: '2024-10-07'
section: Baseball
url: http://www.bbc.co.uk/sport/baseball/articles/c3wpz0ez707o
content: |-
  Jurickson Profar of the San Diego Padres is targeted by LA Dodgers fans who throw baseballs and beer at him during a heated game two of the National League Division Series.

  This video can not be played To play this video you need to enable JavaScript in your browser. San Diego Padres' Jurickson Profar reacts to fans throwing baseballs at him

  The San Diego Padres' play-off match with the Los Angeles Dodgers was stopped for almost 10 minutes when supporters threw baseballs and beer at a player. Game two of the National League Division Series was delayed in the seventh innings when Padres' Jurickson Profar was subjected to abuse from Dodgers fans. Profar riled supporters at Dodger Stadium when he caught Mookie Betts' hit by leaning over the advertising boards and celebrating. The 31-year-old hopped away with the ball in hand and maintained eye-contact with the home crowd. Tensions had threatened to spill over in the sixth innings when Dodgers pitcher Jack Flaherty and Padres baseman Manny Machado were embroiled in an angry exchange. Machado accused Flaherty of intentionally body-shotting batter Fernando Tatis with his pitch, known as 'plunking'. The incident stoked anger among the home crowd and the game was stopped in the seventh inning when a fan hurled a baseball in Profar's direction. As Profar went to notify the umpire, another was thrown at him. Profar was escorted away from the home fans by security and the Padres outfield players gathered together as one but, after eventually dispersing, Dodgers fans then threw beer at Profar. “First is that the fans should never get involved. There's no reason ever to throw anything at players, no matter what is going on."

  Jurickson Profar (right) was targeted by Dodgers fans

  Tatis said: "Man, it was definitely wild out there, but at the same time it's a good environment for baseball. "People get carried away a little bit with their emotions, but it's a good back and forth. It's a show." Dodgers manager Dave Roberts said: "I've seen over 1,000 games here - well over 1,000 games in a ballpark - and I've never seen anything like that." The Padres won game two 10-2, levelling the best-of-five series at one game apiece. They host the next two matches in San Diego.

