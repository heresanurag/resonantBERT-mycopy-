  On Tuesday evening, Netanyahu said Israel would continue to fight to achieve all of its war goals - "to return the hostages, get rid of Hamas and make sure Hamas is not a threat to Israel." US President Donald Trump's administration was consulted by Israel before it carried out the strikes, officials said. The US National Security Council spokesman Brian Hughes said: "Hamas could have released hostages to extend the ceasefire, but instead chose refusal and war." Hamas warned the resumption of violence by Israel would "impose a death sentence" on the remaining living hostages held in Gaza, and accused Israel of trying to force it into a surrender. Speaking to the BBC about the attacks, Dr Sabrina Das, an obstetrician training Palestinian doctors in southern Gaza, said: "It was all very sudden... everybody's mood was just shattered because we knew it was the start of the war again." Dr Das said her colleagues in Nasar hospital were "up all night operating" because "mass casualties had started coming in again". Mohammed Zaquot, director general of the Gaza Strip's hospitals, told BBC Arabic "the attacks were so sudden that the number of medical staff available was inadequate for the scale of these large strikes, and additional teams were called in immediately to assist". A group representing hostages' families has accused the Israeli government of choosing "to give up the hostages" by launching new strikes - and has been protesting outside the Israeli parliament. The news of the strikes terrified some of the families of Israeli hostages still being held by Hamas. "The Israeli government is not perfect, and Israel is not doing enough, because my brothers are not home", Liran Berman, whose twin brothers are still being held in Gaza, told the BBC. "But if Hamas wanted, the hostages would be back. They are in their hands." Israel says Hamas is still holding 59 hostages, 24 of whom are believed to be alive.

  A girl searches for items at a house which was destroyed in strikes on the Shujaiya district in Gaza City on 18 March

  The war was triggered when Hamas attacked Israel on 7 October 2023, killing about 1,200 people and taking 251 back to Gaza as captives. Israel responded with a massive military offensive, which has killed more than 48,500 Palestinians, Gaza's Hamas-run health ministry says, and caused huge destruction to homes and infrastructure.
