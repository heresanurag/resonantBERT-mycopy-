  Actor Nicky Henson, who appeared in TV shows including Fawlty Towers, EastEnders and Downton Abbey, has died at the age of 74.

  Henson starred in Fawlty Towers as Mr Johnson, a guest who got into trouble with John Cleese's Basil Fawlty after trying to sneak a woman into his room.

  A statement from the actor's family said: "Nicky Henson has died after a long disagreement with cancer."

  He was first diagnosed with the disease almost 20 years ago.

  Nicky Henson played the father of Honey in EastEnders

  He told the PA news agency last year: "For the last 18 years, I've regarded myself as 'being in extra time', which I never expected to have, so I'm very thankful for it."

  He played Honey Edwards' father Jack in EastEnders, and was entertainer Charles Grigg in Downton Abbey. His film credits included Vera Drake and Syriana, which starred George Clooney.

  He also enjoyed a host of stage roles at the Royal Shakespeare Company and National Theatre, and was a founder member of the Young Vic.

