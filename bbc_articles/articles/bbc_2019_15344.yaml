title: 'Nicky Henson: Stage and screen actor dies at 74 - BBC News'
date: '2019-12-16'
section: Entertainment & Arts
url: http://www.bbc.co.uk/news/entertainment-arts-50807031
content: |-
  The actor, who was 74, appeared in the classic sitcom as well as EastEnders and Downton Abbey.

