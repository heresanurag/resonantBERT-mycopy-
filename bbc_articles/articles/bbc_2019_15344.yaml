  Meanwhile, he recorded a pop single in 1961 and had a three-year contract writing songs for The Shadows and Cliff Richard.

  Fellow actor Ian Ogilvy posted news of Henson's death on Facebook, describing him as "my oldest and dearest friend".

  Henson was married twice, firstly to fellow actor Una Stubbs. They had two sons but the marriage ended in divorce.

  Henson later wed ballerina Marguerite Porter, with whom he had another son. They were married for more than 30 years.

  Sybil (Prunella Scales) was very taken with Nicky Henson's Mr Johnson

