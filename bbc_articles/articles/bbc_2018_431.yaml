id: bbc_2018_431
title: 'In pictures: Wildfires devastate southern California - BBC News'
date: '2018-01-10'
section: In Pictures
url: http://www.bbc.co.uk/news/in-pictures-42296941
content: |-
  Firefighters have started to contain wildfires that have devastated southern parts of the state.

  There are fears the blaze will hurt California's vast agricultural industry. Much of the state's avocado crop has been destroyed. About 90% of US avocados are grown in California and the industry is worth millions to the economy.
