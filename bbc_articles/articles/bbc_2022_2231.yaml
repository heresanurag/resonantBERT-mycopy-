  Ken Marsh, chair of the Metropolitan Police Federation, described the body and its officers as being "saddened" by the news that Dame Cressida had been denied "the opportunity and the necessary time to build back trust" in the force.

  He said that although it was "of course a challenging time" for the Met, "policing and police officers are an easy target for critics who have never spent a day in our shoes or dealt with the daily challenges we face".

  Mr Marsh added: "Whilst the federation did not always agree with Commissioner Cressida Dick, we think she was doing a good job in difficult circumstances. She genuinely cares about London, its citizens and - importantly, from our perspective - her officers and their families.

  "Her removal leaves a void in the leadership of London and UK policing at what is a critical time. She should have been treated better."

  Just hours before her resignation, Dame Cressida told BBC London she had no intention of stepping down

  However, Ms Chaudhri said she felt that public trust in policing in the capital could be restored by bringing in a replacement with new ideas.

  She added: "I think it's time for the organisation to look outside and to bring somebody fresh in so that they come in with an independent oversight without having to be tarnished or influenced by anybody else.

  "Of course, there will be some influences, but the bottom line is I think it's time to start looking further afield."

