title: 'Cressida Dick: Policing figures dismayed at Met chief''s demise - BBC News'
date: '2022-02-11'
section: London
url: http://www.bbc.co.uk/news/uk-england-london-60347497
content: |-
  Dame Cressida Dick's resignation has been welcomed by many. But what do police officers think of her?

  The outgoing commissioner enjoyed widespread support within the Met Police

  Dame Cressida Dick's resignation as Metropolitan Police commissioner has been welcomed by her critics. But what do figures in the policing community make of the imminent exit of the first female commissioner of the UK's largest police force?

  Dame Cressida resigned on Thursday after being unable to convince London's Mayor Sadiq Khan that she would be able to lead a positive transformation of the force's culture.

  Scrutiny of Scotland Yard has intensified following a litany of controversies, particularly during the past 12 months.

  The handling of the Sarah Everard vigil, the delay in investigating Downing Street parties, and the discovery last week of a culture of misogyny, discrimination, bullying and sexual harassment uncovered by the police watchdog at one central London station, have all cast the force in a poor light.

  Nonetheless, the mood within the Met Police about Dame Cressida's resignation is seemingly one of dismay.

  "This has been horrific and a waste of the best police leader I have known," one senior serving officer has told the BBC. It is a view that seems to reflect what many within policing think.

  Dame Cressida Dick has lost the backing of London Mayor Sadiq Khan

  Shabnam Chaudhri, who rose to the rank of superintendent during her time at the Met, described Dame Cressida's departure as a "very, very sad day for policing".

  The former officer told the BBC: "There is a culture that has been embedded in policing for many, many years, long before Cressida Dick took over as the commissioner for the Metropolitan Police.

  "However, she's had a terrible last two years with a catalogue of catastrophic incidents that have taken place."

  John Sutherland, who has written a book on the problems facing the police, was among the many former Met officers to offer his support.

