  Martin Hewitt, chair of the National Police Chiefs' Council, said: "Dame Cressida Dick cares deeply about the people of London and the Met's mission to keep Londoners safe.

  "We owe her a debt of gratitude for her four decades of dedicated service and huge contribution to policing and public service."

  Andy Marsh, chief executive of the College of Policing, said he would be among those who would miss the outgoing commissioner.

