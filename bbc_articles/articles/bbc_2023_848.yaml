content: |-
  Ron and Diane Hughes were visiting relatives "after being separated by Covid", their family say.

  Diane and Ron Hughes married in 2022 and were visiting Australia to see relatives in the country

  A couple who died in a helicopter crash on Australia's Gold Coast had arrived in the country days before to visit relatives "after being separated by Covid", their family has said.

  Diane Hughes, 57, and husband Ron, 65, were killed when two helicopters collided in Queensland on 2 January.

  The "fun-loving" couple from Neston, Cheshire, had "a zest for life", their family said in a statement.

  They added that they were "still in a state of shock" over what had happened.

  Officials have said the fatal crash near Sea World, a popular theme park on the Gold Coast, happened less than 20 seconds after one helicopter took off from a sandbar and collided with another aircraft that was landing.

  Mr and Mrs Hughes were killed, along with Sydney resident Vanessa Tadros, 36, and 40-year-old Sea World Helicopters pilot Ashley Jenkinson, who was originally from Birmingham.

  Three others, including two children, were badly injured and remain in hospital.

