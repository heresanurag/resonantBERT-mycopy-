title: Spitfire pilots return to Goodwood after round-the-world trip - BBC News
date: '2019-12-06'
section: General
url: http://www.bbc.co.uk/news/uk-england-sussex-50679671
content: |-
  Steve Brooks and Matt Jones return back to Britain after a record 27,000-mile flight around the world.

  Two British pilots have touched down on home soil, after flying around the world in a restored Spitfire, with the paintwork stripped to a shining aluminium finish.

  Steve Brooks, 58, from Burford, Oxfordshire, and Matt Jones, 45, from Exeter, took four months to circumnavigate the globe in the first trip of its kind in a Spitfire.

  They stopped off in 100 locations, across 30 countries.

  The project, called Silver Spitfire - The Longest Flight, started and finished at Goodwood Aerodrome, the base of Boultbee Flight Academy, the first-ever school for Spitfire pilots, in West Sussex.
