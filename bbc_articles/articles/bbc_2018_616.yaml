title: 'Golden Globes 2018: As it happened - BBC News'
date: '2018-01-08'
section: Entertainment & Arts
url: http://www.bbc.co.uk/news/live/entertainment-arts-42578742
content: |-
  Stars wore black for politically-charged Beverly Hills awards ceremony in protest at sexual assault.

  Actress and chat show legend Oprah Winfrey, winner of this year's Cecil B DeMille award for "outstanding contributions to the world of entertainment", brings the audience to their feet with a rousing speech.

  As the first black woman to get the award, she says it is "an honor and a privilege". But she also has powerful words to say about the importance of a free press - and the importance of speaking out against intolerance and abuse.

  Quote Message: We know the press is under siege these days. We also know it's the insatiable dedication to uncovering the absolute truth that keeps us from turning a blind eye to corruption and to injustice. To tyrants and victims, and secrets and lies. We know the press is under siege these days. We also know it's the insatiable dedication to uncovering the absolute truth that keeps us from turning a blind eye to corruption and to injustice. To tyrants and victims, and secrets and lies.

  Quote Message: What I know for sure is that speaking your truth is the most powerful tool we all have. And I'm especially proud and inspired by all the women who have felt strong enough and empowered enough to speak up and share their personal stories. What I know for sure is that speaking your truth is the most powerful tool we all have. And I'm especially proud and inspired by all the women who have felt strong enough and empowered enough to speak up and share their personal stories.

  Quote Message: I want tonight to express gratitude to all the women who have endured years of abuse and assault because they, like my mother, had children to feed and bills to pay and dreams to pursue. They're the women whose names we'll never know. I want tonight to express gratitude to all the women who have endured years of abuse and assault because they, like my mother, had children to feed and bills to pay and dreams to pursue. They're the women whose names we'll never know.

  Quote Message: For too long, women have not been heard or believed if they dare speak the truth to the power of brutally powerful men. But their time is up. Their time is up! For too long, women have not been heard or believed if they dare speak the truth to the power of brutally powerful men. But their time is up. Their time is up!

  Quote Message: I want all the girls watching here, now, to know that a new day is on the horizon. And when that new day finally dawns, it will be because of a lot of magnificent women, many of whom are right here in this room tonight, and some pretty phenomenal men, fighting hard to make sure that they become the leaders who take us to the time when nobody ever has to say 'Me too' again. I want all the girls watching here, now, to know that a new day is on the horizon. And when that new day finally dawns, it will be because of a lot of magnificent women, many of whom are right here in this room tonight, and some pretty phenomenal men, fighting hard to make sure that they become the leaders who take us to the time when nobody ever has to say 'Me too' again.
