title: India monsoon rains cause fatal bridge collapse - BBC News
date: '2022-08-21'
section: General
url: http://www.bbc.co.uk/news/world-asia-india-62623708
content: |-
  A bridge collapses in India following seasonal rains in Kangra, Himachal Pradesh, killing at least two people.

  A bridge has collapsed in India following seasonal monsoon rains in Kangra, Himachal Pradesh.

  At least two people are known to have died.
