title: 'Austrian GP: Max Verstappen on sprint pole - BBC Sport'
date: '2024-06-28'
section: Formula 1
url: http://www.bbc.co.uk/sport/formula1/articles/cp08lne3ppeo
content: |-
  Max Verstappen edges out Lando Norris by just 0.093 seconds to take pole position for the sprint race at the Austrian Grand Prix.

  The Austrian Grand Prix is live on 5 Live and the BBC Sport website

  Max Verstappen edged out Lando Norris by just 0.093 seconds to take pole position for the sprint race at the Austrian Grand Prix. Verstappen, the last of the front-runners to cross the line, despite being unhappy with his tyres as a result of a chaotic end to the session and crowded track. Oscar Piastri made it a McLaren two-three, 0.301secs off the Dutchman, ahead of George Russell’s Mercedes and Ferrari’s Carlos Sainz. The Spaniard’s team-mate Charles Leclerc failed to get around to the line in time before starting his flying lap at the end of the session and will start 10th. Lewis Hamilton, who ran off track a number of times during the session, ended up sixth, ahead of Red Bull’s Sergio Perez. The Mexican, under pressure after a series of disappointing races, was affected by the scramble for track positioning as all 10 drivers went out together in the final minutes of the session. The Alpines of Esteban Ocon and Pierre Gasly were eighth and ninth.

  The last two races have devolved into a fight between Verstappen and Norris for supremacy and so it was in sprint qualifying at the Red Bull Ring. But whereas Norris pipped Verstappen to pole in Spain last weekend, the world champion was fastest in every session in the shortened qualifying session that is held for the sprint and always looked most likely to take pole. In fact, Norris appeared to struggle through the first two sessions, in which he was only fourth and seventh, but pulled out a strong lap when it mattered. First Russell, then Piastri set the pace, before Norris moved the goalposts by a large amount for such a short lap, only for Verstappen to re-establish himself at the front with the final lap of the session. The crowd, a large portion of which have travelled from the Netherlands to support him in their trademark orange tops, cheered him across the line at what is Red Bull’s home race on a track they own. Verstappen said: “It is great to be first here in front of basically my home fans my home grand prix, it has been a good day so far. It has been nice to drive the car. Immediately it was well balanced. "Of course you make some small changes before spring qualifying and everything has been working really well.” Norris said: “I never got quite comfortable until my final lap so I am quite happy with that. Close. It must have been a nice lap by Max and (it’s) a good position for the sprint tomorrow.” Leclerc suffered an engine problem at the end of the pit lane as the cars went out for the single lap which settles the sprint qualifying session. His car went into anti-stall and then the engine stopped. By the time he had gone through the process of restarting the car, he did not have enough time to get around to the line before the chequered flag came out. Hamilton ran off track twice in the first session, first at the first corner and then at Turn Six. The second damaged his floor, which cost him about 0.2 seconds, according to Mercedes’ initial investigations, with more to follow. The seven-time champion ended up 0.216secs off Russell’s time. He said: “I wasn’t in the mix the whole session. It was pretty disastrous from my point of view. Car felt good, I don't think we had the pace to be on pole but very bad laps.”
