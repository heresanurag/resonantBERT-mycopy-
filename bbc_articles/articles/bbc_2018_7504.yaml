title: 'In pictures: Kim Jong-un in surprise Singapore tour - BBC News'
date: '2018-06-12'
section: In Pictures
url: http://www.bbc.co.uk/news/in-pictures-44447427
content: |-
  The North Korean leader surprises locals by visiting Singapore's landmarks under heavy security.

  North Korean leader Kim Jong-un went on a surprise night-time tour of Singapore, ahead of his historic summit with US President Donald Trump.

  Accompanied by his security personnel, Mr Kim decided to go on a walkabout in the city-state late on Monday

  The normally reclusive leader visited the futuristic Gardens by the Bay

  He then stopped at Singapore's Marina Bay Sands hotel

  Mr Kim, accompanied by Singapore's Foreign Minister Vivian Balakrishnan, described Singapore as "clean and beautiful"

  He also walked on the Jubilee Bridge, saying he aimed to learn from Singapore's experience

  Mr Balakrishnan posed for a selfie with the North Korean leader
