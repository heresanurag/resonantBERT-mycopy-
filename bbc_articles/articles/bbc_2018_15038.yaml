title: Woman, 93, dies after being hit by police van in Cardiff - BBC News
date: '2018-12-09'
section: Wales
url: http://www.bbc.co.uk/news/uk-wales-46500931
content: |-
  The Independent Office for Police Conduct says the 93-year-old was hit on Merthyr Road in Cardiff.

  The incident happened on Merthyr Road in Whitchurch

  A 93-year-old woman has died after she was hit by a police van.

  The woman was struck on Merthyr Road in Whitchurch, Cardiff, at 17:20 GMT on Saturday.

  The Independent Office for Police Conduct (IOPC) said it was investigating the death following "a mandatory referral from South Wales Police".

  It said the woman suffered injuries and was taken to hospital where she has since died.

  A spokesman said the woman's next of kin had been informed of her death.

  They said IOPC investigators "attended the scene and the post-incident procedures".

