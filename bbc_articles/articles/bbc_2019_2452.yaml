id: bbc_2019_2452
title: Snowy scenes across the UK - BBC News
date: '2019-02-02'
section: In Pictures
url: http://www.bbc.co.uk/news/in-pictures-47055649
content: |-
  As snow falls on large parts of the UK, we look at some of the most striking wintry images.

  Travel disruption on Friday hit major rail routes across the south west - but there were no such problems for this train crossing the Ribblehead Viaduct in North Yorkshire on Saturday.

  Most English Football League fixtures went ahead on Saturday. Ground staff at Portman Road worked hard ahead of Ipswich Town playing Sheffield Wednesday.

  But six English Football League matches were postponed. No Premier League fixtures were affected, including here at Burnley's Turf Moor stadium.

  The Met Office has issued yellow weather warnings for ice across much of the south of England for Saturday and Sunday.

  There were icy conditions at Murrayfield on Saturday morning ahead of Scotland's Six Nations match with Italy. Rugby fans travelling to Edinburgh were urged to plan their travel arrangements in advance.

  Forecasters have warned Saturday night could be the coldest of winter so far with many parts of the UK - including here in Whitley Bay - expected to remain covered in snow and ice.

  Icy roads were a familiar sight around the UK on Saturday morning - including here in Westbury, Wiltshire.

  Children went sledging on Friday as they enjoyed a precious day off school in Poundbury, Dorset.

  These dogs went for a walk near a snow-covered Clifton suspension bridge in Bristol on Friday.

  One of four endangered Amur tiger cubs, born at Whipsnade Zoo in Bedfordshire last year, had their first taste of British winter on Friday.

  The chilly conditions prompted a bit of snowboarding on the South Downs at Devil's Dyke near Brighton on Friday.

  The UK's snowman population has been booming thanks in part to many students and workers whose weekend began early.

  Behind you! This snowball was captured mid-flight on a hillside near Brighton on Friday.

  People got creative with a snowman and snow-cat on a bench in Bristol.

  This pair offered a helping hand to a driver trying to get his car moving on Friday.

  Cars are driven through snow and slush near Chievely, Berkshire, on Friday.

  A commuter in Bristol sported a kilt on his way to work on Friday morning.

  Another commuter looked a little better prepared, wearing ski goggles.

  You looking at me? Rachel Bennett's pug dog Keith seemed to enjoy the conditions in Doncaster, South Yorkshire.

  The Duke and Duchess of Sussex were in Bristol on Friday lunchtime as the snow continued to fall.

  Despite the weather, the royal couple were met by large crowds as they visited the Bristol Old Vic theatre, which is undergoing a £26m restoration.

  Snow ploughs were needed to clear roads and airport runways on Friday, including this one pictured in Shaftesbury, Dorset.

  Children made the most of the snow in Hartley Wintney, in Hampshire, on Friday morning.

  Staff worked to clear Arsenal's training ground in London Colney, Hertfordshire, on Friday morning.

  Driving conditions were hazardous across large parts of the UK, like here near Shaftesbury in Dorset.

  A very snowy Angel of the North near Gateshead, in Tyne and Wear, where heavy snowfall caused travel disruption on Friday.

  Spot the dog: A Dalmatian runs through the snow in Milton Keynes on Friday.

  A snow-covered tent in Cardiff's Queen Street, where temperatures fell below freezing on Thursday night.

  More than six inches of snow had settled in Wells, Somerset, by 10:00 GMT on Friday.

  Queen's Square in Bristol resembled a scene from Narnia on Friday morning.

  The struggle was real for this driver pictured clearing the windows of a 4x4 in Bristol on Friday.

  A dog out for a walk in the snow in Bristol on Friday.

  White rooftops were seen in Gold Hill, Dorset, on Friday morning after heavy snowfall.

  An elderly resident makes his way up a snow-covered road in Hartley Wintney, Hampshire, in the early hours of Friday.
