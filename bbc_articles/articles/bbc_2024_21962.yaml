  The Scottish and UK governments are optimistic workers facing redundancy will be offered new jobs.

  Governments hopeful of new jobs for Grangemouth workers

  The Scottish and UK governments have said they are hopeful workers facing redundancy in Grangemouth will quickly be offered new jobs. About 400 jobs are expected to go when the refinery closes next year. Unions have accused ministers of failing to plan properly for a “just transition”, and said thousands more workers had been left at risk. But Scottish energy secretary Gillian Martin told BBC Scotland’s Sunday Show she was “confident” highly skilled staff would find other work. And UK energy minister Michael Shanks said he was aware of other companies having already reached out to the workforce about taking them on.

