title: 'Derby: Man jailed after dog killed younger brother - BBC News'
date: '2024-10-19'
section: Derby
url: http://www.bbc.co.uk/news/articles/c20m31md8z1o
content: |-
  Wayne Stevens died from his injuries and the dog was shot dead by police officers.

  Gary Stevens was sentenced at Derby Crown Court on Friday

  A dog owner whose pet mauled his younger brother to death has been jailed. Wayne Stevens, 51, suffered "massive and horrific" injuries when he was attacked by the 8st (51kg) Cane Corso cross at a house in Derby in April 2023 and died at the scene. His older brother Gary Stevens, 55, pleaded guilty in September 2023 to being in charge of a dog dangerously out of control causing injury resulting in death. At Derby Crown Court on Friday, he was sentenced to four and a half years in prison.

  Wayne Stevens died in the attack at a house in Cameron Road, Derby, in April 2023

  The court heard the attack happened on 22 April 2023 after the brothers had returned from a pub to their home in Cameron Road and were drinking vodka. Prosecutors outlined how Wayne was found dead near the foot of a stairway following a 999 call at 05:52 BST. Judge Shaun Smith KC was told Gary wrongly told an emergency operator the Cane Corso was a poodle before police and paramedics were confronted by the "incredibly heavy" dog. After hearing how Gary was abusive to emergency crews before the "frenzied" dog was repeatedly Tasered and eventually shot dead almost an hour later, the judge told the father of three: "Paramedics and police officers attended the scene and you came to the front door clearly very drunk. "You were obstructive as your exchanges with the officers continued. "Police officers tried to persuade you to bring the dog under control - your response was to mock them for standing back."

  As part of his sentence, Gary was also given a lifetime ban from keeping a dog

  The court was told Gary had been given the 14-month-old dog by a mother of five who could no longer look after it, and that he knew it "would go for the face and neck if it was aggressive". The judge said: "I am entirely satisfied that you clearly knew of the dangers this dog presented prior to that fateful night. "There was a lack or loss of control of the dog due to the influence of alcohol." Det Insp Chris Barker, from Derbyshire Police, said: "All those who attended – from both the force and East Midlands Ambulance Service – were put in a very dangerous position both to try and help Wayne and then keep the public safe. "They did everything they could to try and protect everyone involved and not cause harm to the dog involved, however, ultimately there was no other option than for it to be destroyed. "I am sure the swift actions and clear decision-making at the scene helped prevent further injury to others."

