  'What's occurring?' - Nessa makes guest appearance on Strictly after first scenes of final Gavin and Stacey episode shown

  Viewers were surprised on Saturday night as Gavin and Stacey's Nessa appeared on their screens during the finale of Strictly Come Dancing.

  The actress Ruth Jones delivered one of her character's catchphrases, "what's occurring?" before the first clips from the final episode of Gavin and Stacey were shown.

  The final episode is due to air on BBC One on Christmas Day. The last fans saw of Nessa and Smithy, played by James Corden, was in the 2019 Christmas special, where Nessa went down on one knee, asking Smithy to marry her.
