id: bbc_2024_1386
title: Whistleblower testifies in Post Office scandal - BBC News
date: '2024-01-12'
section: General
url: http://www.bbc.co.uk/news/uk-67884747
content: |-
  Richard Roll revealed to Panorama in 2015 how Fujitsu could secretly alter sub-postmasters' accounts.

  Whistleblower Richard Roll revealed to BBC Panorama in 2015 that staff from Fujitsu could secretly alter sub-postmaster's accounts on the Post Office's Horizon computer system.

  His testimony marked a turning point for sub-postmasters fighting to prove their innocence after the Post Office held them responsible for financial shortfalls.

  The Post Office staged a campaign of threats and misinformation in a bid to halt or delay broadcast of the interview with Mr Roll, including smearing sub-postmasters and sending legal threats to Panorama's expert sources.
