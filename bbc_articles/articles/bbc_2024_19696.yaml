title: Devon vicar opens gym in church building - BBC News
date: '2024-08-23'
section: General
url: http://www.bbc.co.uk/news/videos/cm2nkvrp4dgo
content: |-
  The Reverend Leigh Winsbury says the cut-price gym is open to worshippers and weightlifters.

  The Reverend Leigh Winsbury has built a gym in a former monk's residence near his church.

  He said he had been inspired to set up the facilities as there was a lack of gyms around Hatherleigh in Devon.

  Mr Winsbury added the cut-price gym was open to everyone - worshippers and weightlifters, or anyone who just wanted to get fit.

