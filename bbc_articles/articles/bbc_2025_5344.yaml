  A clip of Donald Trump Jr allegedly saying on his podcast that the US should have sent arms to Russia rather than Ukraine was very likely generated with AI, experts say.

  A widely shared clip of Donald Trump Jr allegedly saying on his podcast that the US should have sent arms to Russia rather than Ukraine has been very likely generated using AI, audio forensics experts have told BBC Verify. Olga Robinson explains why the audio is suspect.

