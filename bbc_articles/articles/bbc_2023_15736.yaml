title: Destroyed cars line road near Israel festival in chilling video - BBC News
date: '2023-10-08'
section: General
url: http://www.bbc.co.uk/news/world-middle-east-67048805
content: |-
  The remains of cars can be seen after militants attacked people attending an outdoor party.

  On Saturday Palestinian militants stormed the Supernova music festival and opened fire as part of huge surprise attack on Israel.

  Chilling footage filmed from the area the following day shows the scale of the attack, with car wrecks lining a road, some overturned and others completely burned out.

  Read more about what happened at the festival here.
