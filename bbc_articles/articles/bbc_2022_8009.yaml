id: bbc_2022_8009
title: Eating disorder survivor finds menu calories triggering - BBC News
date: '2022-06-23'
section: Wales
url: http://www.bbc.co.uk/news/uk-wales-61895950
content: |-
  The Welsh government is deciding whether to introduce a similar rule to the one in England.

  Natasha Wynne says she became fixated on counting calories

  Seeing calories on restaurant menus in Wales is "triggering", a woman in recovery from an eating disorder said.

  Natasha Wynne collapsed at home in 2008 after becoming "fixated on counting calories".

  A charity said people living with eating disorders in Wales have not been able to escape a "dangerous" calorie labelling law in England.

  The Welsh government is considering similar rules to tackle obesity in a respond to its consultation.

  Ms Wynne, 32, from Cardiff, said at her worst she was setting "really strict targets on how many calories I'd have in a day, how much fat I'd have in a day, how many steps I'd do to burn it off".

  "It's horrific. You find yourself really stuck all the time making these extra decisions that other people maybe don't think about," she added.

  Although she has recovered over the years, she said seeing calories popping up on menus in Cardiff's restaurants recently has been difficult.

  "It took me, through treatment, a really long time to un-learn all that calorie information," she said.

  "Thinking about calories on menus, this is why I find this so stressful.

  "It's like everything through treatment I had to unlearn because fixating on calories was an unhealthy behaviour, now I'm constantly confronted with this calorie information which I know, for people like me, is really triggering."

  Calories have been appearing on menus in Wales since becoming a requirement in England

  Large restaurants and takeaways in England have needed to list calories on menus since April as part of the UK government's plans to tackle obesity.

  Restaurants, cafes and takeaways with more than 250 staff in England must print how many calories are in meals on their menus, websites and on delivery platforms.

  Eating disorder charity Beat said this was already causing distress in Wales.

  Beat said it had seen a 300% increase in the number of people asking for help with eating disorders over the past year.

  Most restaurants provide an alternative menu without the information.

  But when Megan Davies, 19, went out for a meal with her friends in Cardiff last month, the group asked for a menu without calories.

  Megan Davies and her friends were left unhappy at not being able to see a calorie-free menu

  "After we asked, the waitress was very sympathetic, but she said 'no, I'm really sorry, there isn't one available'," she said.

  "My friends and I were really let down because we didn't want to see the calorie information.

  "It's not yet a rule here to have calories on menus so we were really disappointed."

  The restaurant has apologised to Megan after she complained.

  The Welsh government is considering the same rule as part of its consultation on healthy eating.

  Dietician Sioned Quirke said making calorie labelling mandatory on menus in Wales was a "very good idea" and could lead to people making healthier choices.

  Sioned Quirke is in favour of the new rules

  "Having the actual facts on a menu is much better than trying to calculate ourselves what might be in a meal," she said.

  "We don't know how it's cooked, portion sizes are so different, so if you've got the facts there in front of you, you're making an informed choice."

  But she added that having an alternative menu without calories on request is "important" to give people an option.

  Beat disagrees. "It's estimated that we have over 58,000 people living with eating disorders in Wales," said Siân Brough, deputy service manager at the charity.

  "We know that calories on menus can cause severe mental distress to people with this serious mental illness.

  "It can contribute to eating disorder thoughts and behaviours worsening.

  "We're asking the government to send out a clear message to restaurants, cafes and takeaways across the nation that calorie labelling on menus is not mandatory."

  The Welsh government said it was considering "a range of measures" as part of its consultation on health eating.

  A spokesman added: "Whilst labelling is not currently mandatory in Wales, some outlets have already introduced calories on menus and we would ask that where possible restaurants provide menus that do not feature calorie details on request."
