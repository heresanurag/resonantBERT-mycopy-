content: |-
  The footage was filmed not far from the warehouse fire but the smoke could be seen for miles around.

  Video showed a thick plume of black smoke billowing into the sky from a warehouse fire declared a major incident.

  Eight crews were called to the incident on the Sanders Lodge industrial estate in Rushden, Northamptonshire at 06:30 BST.

  Smoke could be seen for miles around, with Bedfordshire Fire and Rescue Service saying it had received calls about it from people in Harrold and Sharnbrook.

  Reporting from the scene, the BBC's Sam Read said there was a "real sigh of relief" that no injuries were reported but the cause of the fire was still unknown.
