content: |-
  Gisèle Pelicot pushes through crowds of journalist to attend court.

  Gisèle Pelicot arrived at the court in Avignon ahead of the sentencing of her ex-husband Dominique Pelicot.

  He was jailed for 20 years after drugging his ex-wife and recruiting strangers to rape her for years.

  Fifty other men were sentenced alongside him.

  Supporters were heard applauding her as a crowd of journalists gathered around to take pictures.

  Follow our live coverage of the case.
