content: |-
  The seven-month-old was rushed to hospital after the attack on Sunday, but died later, police say.

  The baby girl was bitten by the family's pet dog at home in Shorncliffe Road, Coventry on Sunday

  A baby girl has been mauled to death by her family's pet dog, police have confirmed. The seven-month-old died after being bitten on the head at a property in Coventry. She was rushed to hospital by ambulance from the scene in Shorncliffe Road on Sunday, but died a short time later. Police said the dog was not classed as a dangerous breed and was removed from the home the same day and humanely destroyed.

  Police officers and ambulance crews were called at about 15:00 BST and arrived at the scene within minutes, West Midlands Police (WMP) said.

  "[The] baby girl had received serious injuries to her head after being bitten by the family’s dog inside the home," a spokesperson said. "Our thoughts remain with her family at this devastating time." The infant was treated by paramedics at the scene before being taken to hospital by land ambulance, West Midlands Ambulance Service (WMAS) confirmed. Warwickshire and Northamptonshire Air Ambulance had also been scrambled to the scene. "We were called to [the] medical emergency at a private address on Shorncliffe Road in Coventry at 3.01pm on Sunday," a WMAS spokesperson said. The service sent two ambulances, a specialist paramedic and a paramedic officer in response. WMP has urged anyone with information about the attack to contact them.

  No further details on the dog's breed have been released by police, but the force said it was in the early stages of an investigation and inquiries were continuing. In the UK, it is illegal to own pit bull terrier, Japanese Tosa, Dogo Argentino and Fila Brasileiro breeds, without a certificate of exemption., external In February, XL Bully dogs were also banned in England and Wales, after a spate of fatal attacks. A total of 16 people died as a result of dog attacks, external in the first nine months of 2023, figures from the Office for National Statistics revealed. And a BBC investigation earlier this year found dog attacks recorded by police in England and Wales rose 21% in 2023, compared to the previous year.
