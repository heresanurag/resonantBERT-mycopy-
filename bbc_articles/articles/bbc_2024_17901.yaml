content: |-
  An emotional Elina Svitolina says it is a "difficult day for Ukraine" after Russian strikes on the country killed 31 people and damaged a children's hospital.

  Ukraine's Elina Svitolina became emotional following her fourth-round win against Wang Xinyu at Wimbledon.

  A children's hospital in Kyiv was seriously damaged and 31 people were killed across Ukraine during rare daytime Russian strikes on Monday.

  Svitolina said it was "not easy to focus on the match" after hearing the news that morning.

