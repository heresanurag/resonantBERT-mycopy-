title: 'Odhrán Kelly: Man charged with murder after body found in Lurgan - BBC News'
date: '2023-12-08'
section: Northern Ireland
url: http://www.bbc.co.uk/news/uk-northern-ireland-67645853
content: |-
  The 31-year old is due to appear before Craigavon Magistrates' Court on Friday.

  A 31-year-old man has been charged with the murder of Odhrán Kelly in Lurgan.

  The body of 23-year-old Mr Kelly was found beside a burning car in Maple Court, close to Edward street, in the early hours of Sunday.

  The suspect is to appear before Craigavon Magistrates' Court on Friday.

  Earlier, two women appeared in court charged with assisting an offender by helping with "the disposal of the body of Odhrán Kelly".

  Another 31-year-old man who was arrested by police remains in custody.

  Andrea Catherine Theresa Stevenson, 43, from Edward Street in Lurgan and 36-year-old Stephanie McClelland, from Shan Slieve in Lurgan appeared at Lisburn Magistrates' Court on Thursday.

  Both were remanded in custody.

  They also both applied for legal aid and are expected to apply for bail later this month.
