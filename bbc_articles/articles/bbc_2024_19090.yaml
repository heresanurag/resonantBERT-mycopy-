title: Leah Croucher's family say others will die without system changes - BBC News
date: '2024-08-19'
section: Beds, Herts & Bucks
url: http://www.bbc.co.uk/news/articles/c4gd295q798o
content: |-
  John and Claire Croucher warn of "soul crushing consequences" unless probation changes are made.

  Leah Croucher's body was found more than three years after she went missing

  The family of a teenager abducted and killed by a wanted sex offender believe other families will suffer the same "soul crushing consequences" unless the probation system changes. Leah Croucher, 19, disappeared while walking to work on 15 February 2019. Her remains were discovered in October 2022 in a house in Milton Keynes – less than half a mile from her home. The coroner at the inquest into her death called for a review of the monitoring of sex offenders in the community after failings were identified. Her parents, John and Claire Croucher, said in a statement to the BBC they were "truly horrified" that issues remained more than 15 months on from her body being found.

  An inquest in June concluded Ms Croucher had been unlawfully killed by sex offender Neil Maxwell, and was most likely the victim of an "unwarranted sex attack". Maxwell was wanted for another sex offence at the time of Ms Croucher's death and killed himself while on the run from police in April 2019, two months after her disappearance.

  Ms Croucher's family said: "As a family we have had our souls crushed at least three times – the first when Leah went missing, the second when we received the horrific news that Leah had been murdered. "We then received the serious case review and probation report and, as heard during Leah’s inquest, both were full of acknowledged significant failings." They said knowing no-one would be charged with their daughter's murder "hurts". "To have to come to terms with the fact that over 15 months on, it was admitted at Leah's inquest that failings in the management of sexual offenders are likely still occurring today, we are truly horrified that we are expected to be OK with that. "Leah's death means nothing to the people it should. That hurts the most."

  Leah Croucher's parents Claire and John said their souls had been crushed

  The current system is "not equipped to manage these offenders and we fear that until these failings are properly addressed, another family will have to face these same soul crushing consequences", her parents added. They said they looked forward to the response to the issues raised in the prevention of future deaths report. The Probation Service previously said it was "profoundly sorry" for failings identified and that it had taken steps to address the risk management of offenders. Following the inquest in June, Thames Valley Police said the force had made improvements.

