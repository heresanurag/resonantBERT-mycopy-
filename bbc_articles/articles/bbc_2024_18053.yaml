title: 'Southport protests: More than 100 arrests as disorder spreads - BBC News'
date: '2024-08-01'
section: England
url: http://www.bbc.co.uk/news/articles/c4ng1254ndeo
content: |-
  Prime Minister Sir Keir Starmer will meet senior police leaders on Thursday to offer them his "full backing" in the face of ongoing unrest.

  More than 100 arrests as disorder after Southport attack spreads

  A car was set on fire in Hartlepool on Wednesday night

  Dozens of arrests have been made as disorder following the Southport knife attack spread to different parts of the country. More than 100 people were arrested in central London on Wednesday evening as officers clashed with protesters on Whitehall during a demonstration. Unrest also broke out in Hartlepool, where eight people were arrested, several officers were injured and a police car was set on fire. Prime Minister Sir Keir Starmer met with senior police leaders on Thursday to offer them his "full backing".

  Earlier, a 17-year-old boy appeared in court, charged with murdering three girls and attempting to murder eight other children and two adults in Monday's knife attack. He was named as Axel Muganwa Rudakubana. Dal Babu, former Ch Supt and firearms commander in the Met, has blamed the disorder on the "reckless" spread of misinformation about the identity of the suspect charged in the stabbing. Speaking on BBC R4's Today Programme, Mr Babu said the police have taken the "unprecedented" decision to confirm the suspect "was born in this country". In London, demonstrators were seen launching flares towards the gates of Downing Street and at a statue of Winston Churchill. People could be heard chanting phrases such as "stop the boats" and "save our kids" as they threw bottles and cans at officers. Earlier, the Met said conditions placed on the protest had been breached. The Met said it made arrests for a range of offences including violent disorder, assault on an emergency worker and breach of protest conditions on Wednesday evening. In a statement, the Met said officers were deployed to "ensure disorder was contained" and that some "suffered minor injuries".

  Several officers were also injured in Hartlepool after violence broke out in the town, Cleveland Police said. Eight people were arrested in relation to public order offences after glass bottles and eggs were thrown at police by protesters. A police car was also set on fire. Ch Supt David Sutherland said of the Cleveland arrests: "At this stage we believe the protest is in connection with the incident in Southport earlier this week." The force said they "expect further arrests to be made in the coming days". Disorder was also reported in Aldershot. Local MP Alex Baker said a peaceful protest "descended into intimidating behaviour" at a hotel in the Hampshire town. "This incident was exacerbated by people from outside our community who came here determined to cause unrest," she said. "We all support our shared right to peacefully protest, but we will not stand for people coming to our towns determined to stir up trouble and divide our community." In Manchester, two men were arrested for violent disorder and assaulting an emergency worker. Greater Manchester Police said protesters were dispersed in the Newton Heath area after "objects were thrown towards the police and public". Wednesday's disorder followed unrest near a mosque in Southport on Tuesday night, during which the building was attacked. Merseyside Police officers were also pelted with bricks and a police van was set on fire.

  A number of officers were injured during a protest in central London on 31 July

  The unrest came after Alice Dasilva Aguiar, nine, Bebe King, six, and Elsie Dot Stancombe, seven, were fatally stabbed on Monday while attending a Taylor Swift-themed dance class in Southport. Eight other children suffered knife wounds - with five of them in a critical condition - while two adults were also critically hurt. On Thursday, Alder Hey Children's NHS Foundation Trust announced two of the injured children had been discharged. Five children are still being treated by the hospital and are "currently in a stable condition", Alder Hey said.

  17-year-old Rudakubana has been charged with three counts of murder, 10 counts of attempted murder and possession of a bladed article. He appeared at Liverpool City Magistrates' Court on Thursday morning and later at Liverpool Crown Court. He was remanded into youth detention accommodation until 25 October, when a pre-trial preparation hearing will take place. The teenager was previously not named because of his age, but Recorder of Liverpool Judge Andrew Menary KC ruled during the hearing that his identity could be made public. The judge said this was "principally" because the defendant turns 18 on 7 August and legal restrictions protecting his anonymity would have ended then. He added: "Continuing to prevent full reporting at this stage has a disadvantage of allowing others up to mischief to continue to spread misinformation in a vacuum." Merseyside Police have confirmed that the defendant was born in Cardiff to Rwandan parents, that he appears to have no known links to Islam, and that they are not currently investigating the attack as terror-related.

  In Downing Street on Thursday, prime minister Sir Keir Starmer told police chiefs they were meeting in the shadow of the "horrific attack in Southport". "Our first thoughts are obviously with the victims, their families and the wider community who are in raw pain and grief," he said. “Shockingly, what we’ve also seen is marauding mobs on the streets of Southport attacking the very same police officers who responded to the awful attack on those girls." The PM said he wanted to send a message to police chiefs and their officers that "this government supports the police, it supports what you are doing. "And, to be absolutely clear: this is not a protest, this is violent disorder, and that action needs to be taken. This government will make sure you have the powers you need and will back you in using those powers.“

