  The photo shows the couple greeting Prince Archie and Princess Lilibet with smiles and outstretched arms.

  Harry and Meghan share photo of their children on Christmas card

  The Duke and Duchess of Sussex have shared a rare photo of their two children on their official Christmas card. It is among a series of six photos on the card, which features the message: "We wish you a very happy holiday season". Prince Archie, 5, and Princess Lilibet, 3, can be seen in one of the photos facing away from the camera as they walk towards their parents, who greet them with smiles and outstretched arms. The two young children have been kept away from the public eye by the couple - and their faces remain out of sight in the photo. The card also shows Meghan hugging a young girl and Prince Harry clasping the hand of a man lying in bed.

  The Christmas cards read in full: "On behalf of the office of Prince Harry and Meghan, the Duke and Duchess of Sussex, Archewell Productions and Archewell Foundation, we wish you a very happy holiday season and a joyful New Year." It is for professional use, with the couple sending a different card to close friends and family which will not be shared publicly. The Sussexes stepped down as senior royals in January 2020. While they have kept their Duke and Duchess of Sussex titles, they are no longer addressed as his or her royal highness (HRH). They moved to California in June 2020, before the birth of Lilibet in 2021, and no longer have an official UK residence. The couple have created the Archewell Foundation, which is a non-profit organisation with a mission to "show up, do good". Their media company, Archewell Productions, makes programmes for Netflix, under a deal thought to be worth millions of dollars.
