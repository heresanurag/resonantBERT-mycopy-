title: Motorcyclist Benny McIlhatton dies after Ballycastle crash - BBC News
date: '2024-04-21'
section: Northern Ireland
url: http://www.bbc.co.uk/news/uk-northern-ireland-68864231
content: |-
  Benny McIlhatton was on his motorbike when he collided with a car on the Magheramore Road on Saturday evening.

  A 44-year-old man has died after a road crash in County Antrim, police have said.

  Benny McIlhatton was on his motorbike when he collided with a car on the Magheramore Road, outside Ballycastle, at about 17:30 BST on Saturday.

  Mr McIlhatton, from the Loughguile area, died at the scene. Two other people were taken to hospital.

  Police have appealed for anyone with information, or dashcam footage of the collision, to contact them.
