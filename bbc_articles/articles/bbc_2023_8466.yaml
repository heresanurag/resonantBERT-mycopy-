  Prince Harry says the press have "misled" him his whole life as he finishes two days of cross-examination in court.

  The trial continues - but we're off for now

  After two long days, we’re going to end our live coverage of Prince Harry's hacking trial here. Don't worry though, there's more for you:
  • Get up-to-speed in our story here
  • Sign up for insider views on this and more with our BBC's Royal Watch newsletter here
  • Recap what the trial is about here Our reporters James Gregory, Jemma Crew, Dominic Casciani, Tom Symonds and Sean Coughlan have been updating us from the High Court. And in our London newsroom it's been Malu Cursino, with the page edited by Owen Amos and me.
