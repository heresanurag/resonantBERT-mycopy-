title: 'Gold toilet theft: Blenheim Palace security ''needs challenging'' - BBC News'
date: '2019-09-15'
section: Oxford
url: http://www.bbc.co.uk/news/uk-england-oxfordshire-49706425
content: |-
  The solid gold toilet - worth up to $6m - has not been found after the break-in at Blenheim Palace.

  This video can not be played To play this video you need to enable JavaScript in your browser. The 18-carat golden toilet was previously displayed at the Guggenheim Museum in New York

  Blenheim Palace's security measures "need to be challenged" after an 18-carat gold toilet was stolen from the stately home, its chief executive said.

  Dominic Hare said a gang "mounted a very fast smash-and-grab raid" at the Oxfordshire palace early on Saturday.

  The artwork - which Mr Hare said was worth $5m to $6m - has not been found.

  Its creator, conceptual artist Maurizio Cattelan, once the subject of a BBC documentary called the Art World's Prankster, insisted it was not a stunt.

  In an email to The New York Times he wrote: "I wish it was a prank."

  He added: "At first, when they woke me up this morning with the news, I thought it was a prank: Who's so stupid to steal a toilet?

  "I had forgotten for a second that it was made out of gold."

  The fully-working toilet - entitled America - went on show at the 18th Century palace on Thursday as part of an exhibition by the Italian artist.

  Visitors had been invited to book three-minute slots to use the throne for its intended purpose.

  Blenheim Palace has now reopened to the public after being shut on Saturday

  "'America' was the 1% for the 99%, and I hope it still is," Mr Cattelan said.

  "I want to be positive and think the robbery is a kind of Robin Hood-inspired action."

  Last month Edward Spencer-Churchill - half-brother of the current Duke of Marlborough - said the toilet would not "be the easiest thing to nick".

  A 66-year-old man was arrested on Saturday in connection with the theft, Thames Valley Police said.

  He remains in police custody in the West Mercia area.

  The burglary caused "significant damage and flooding" because the toilet was plumbed into the building, police said.

  Mr Hare told BBC 5 live it was the "first theft of this type in living memory" from the stately home - the birthplace of Sir Winston Churchill - adding it had "a sophisticated security system".

  "But what has happened has happened," he said.

  "So clearly we need to challenge ourselves on that."

  Blenheim Palace, a World Heritage Site, was shut on Saturday after the burglary but reopened on Sunday.

  Mr Hare said the artwork - famously offered to US President Donald Trump in 2017 - was a "comment on the American dream".

  "[It's] the idea of something that's incredibly precious and elite being made accessible, potentially to everybody, as we all need to go when we need to go," he said.

  "And it's ironic really that two days after this was made accessible, it was snatched away."

  Mr Hare said it was "not out of the question [the toilet] would be melted down" by the thieves.

  Police said thieves used at least two vehicles in the raid and urged anyone with information to contact them.

  Det Insp Jess Milne said: "We are following a number of lines of inquiry and there will continue to be a police presence in and around the area of Blenheim Palace while our investigations continue.

  "We are making every effort to locate the offenders and the toilet that was stolen."

