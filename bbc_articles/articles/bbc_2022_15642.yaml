  Dominic Raab is asked about his conduct in ministerial posts as he stands in for Rishi Sunak at Prime Minister's Questions.

  Not as embarrassing as it could've been for Raab

  This could have been more awkward for Dominic Raab. There were questions about him, but it wasn’t all about him, in the way some of Boris Johnson’s PMQs were in certain stickier moments. He did get a grilling from his opposite, Angela Rayner, about his admission formal complaints have been made about his behaviour. Labour raised some awkward questions for the government and the (absent) prime minister - why haven’t they appointed a new ethics adviser yet? Who will investigate Raab? And why did it take Raab asking for an investigation himself, rather than the PM initiating one? That’s something Rishi Sunak might be grilled on when he gets back from Bali. Raab was adamant he refuted the bullying allegations, and would comply with the probe. He appeared to get loud support from his Tory backbench colleagues who jeered at - and at times drowned out - Angela Rayner’s questions, and cheered his answers. This wasn’t as embarrassing as it could be for him as a result, but with the investigation only just starting, he’s far from out of the woods yet.
