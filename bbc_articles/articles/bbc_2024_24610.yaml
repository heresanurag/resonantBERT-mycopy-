title: Murder trial begins after woman admits killing partner - BBC News
date: '2024-10-10'
section: Northern Ireland
url: http://www.bbc.co.uk/news/articles/cdd4qq4djemo
content: |-
  The trial into the murder of a man in west Belfast has started at Coleraine Courthouse.

  Woman goes on trial accused of murdering her partner

  Jim Crossley died after being stabbed by his partner

  A woman has gone on trial accused of murdering her partner in Dunmurry. James Crossley, 38, was stabbed seven times in the chest on the night of 22 March 2022. Julie Ann McIlwaine, 33, of Hazel Close in Lagmore, west Belfast admitted causing the fatal injuries but is denying murder. The jury in Coleraine Courthouse was told they would hear how Ms McIlwaine would say that this was a “turbulent” relationship that involved domestic abuse.

  On Thursday, the court was played the recording of the 999 call Ms McIlwaine made after stabbing her partner. Ms McIlwaine told the emergency call handler that she locked herself in the downstairs bathroom with her baby and that she had stabbed her partner. The court heard how the recording captured Ms McIlwaine saying “he’s dead, he’s dead” in relation to her partner James Crossley and saying that she had “stabbed him at least six times” while he was sleeping.

  During the recording, the court heard the emergency medical dispatcher tell Ms McIlwaine to go to a neighbour with her baby to get help. The tape continued as the dispatcher guided the neighbour to check on Mr Crossley and the arrival of the PSNI. The call ended when the ambulance service arrived. Mr Crossley was taken to the Royal Victoria Hospital but died a short time later. His cause of death was given as “seven stab wounds to the chest and abdomen” and he had further wounds to his arms and legs. A police expert told the court that a knife – believed to be the murder weapon - was found beside the bed. The jury was also shown photographic evidence of the crime scene showing blood stains.

  The court was also shown body camera footage taken by the police who attended the house the night of the incident. In it, a distressed Ms McIlwaine held her 10-month-old baby as she sobbed: “What did I do?” She told police officers that her baby had been in the bed beside Mr Crossley who was asleep and snoring. She told them she lifted the baby off the bed before she stabbed Mr Crossley. The court also heard from a pathologist who outlined the injuries to Mr Crossley. He said the victim died from seven stab wounds to his chest and abdomen. Mr Crossley also had stab wounds to his leg, arm and hand possibly which were caused if he “raised his arms to protect himself," the pathologist added. “No more than moderate force would have been required” to inflict any of the wounds," he added. The court was told that Mr Crossley was more than twice the legal drink-drive limit for alcohol when he was killed. He also had traces of cocaine, diazepam and other drugs in his system at the time of his death.
