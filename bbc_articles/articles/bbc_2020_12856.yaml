title: 'Coronavirus: Boris Johnson ''proud'' of PPE contracts - BBC News'
date: '2020-11-18'
section: UK Politics
url: http://www.bbc.co.uk/news/uk-politics-54988822
content: |-
  Labour accuses the PM of ignoring the usual checks on suppliers - and wasting £21m on a "middle man".

  Boris Johnson says he is "proud" of the way the government got supplies of Personal Protective Equipment (PPE) at the start of the coronavirus pandemic.

  A report by a spending watchdog found suppliers with links to Conservative MPs were given priority.

  Sir Keir Starmer asked why the usual processes had been bypassed - and £21m had been handed to a "middle man".

  The PM told the Labour leader "fast" action had been needed and "any government" would have done the same.

  Sir Keir asked about a BBC report that £21m in UK taxpayers' cash had been given to Spanish businessman who acted as a go-between to secure protective garments for NHS staff.

