  How did you rate the players out of 10 in Russia's 5-0 win against Saudi Arabia in the World Cup group match.

  Last updated on .From the section World Cup

  World Cup 2018: Russia's Yuri Gazinskiy scores first goal of the tournament Hosts Russia started the World Cup with a convincing 5-0 win over Saudi Arabia - but which player stole the show? You rated all the players out of 10 and Russian substitute Denis Cheryshev topped the rankings with a score of 7.22 after scoring twice, including a superb strike into the top corner. Fellow substitute Artem Dzyuba was also on the scoresheet and was rated just behind his compatriot with 7.16. Check out the ratings of all the players below and read the match report here.
