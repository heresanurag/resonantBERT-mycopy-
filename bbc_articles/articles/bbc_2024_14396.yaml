content: |-
  A driver is arrested after a car crashes into a parked vehicle and a building in Hertfordshire.

  A driver has been arrested after a car crashed into a parked vehicle and a building in Harpenden.

  The crash, which was caught on CCTV by a neighbouring business, took place on the High Street at about 02:20 BST on 6 June.

  Kelly, the general manager at Hoo House, told the BBC she was "so thankful it wasn't the morning rush-hour, school run, no pedestrians and no patrons leaving the building late at night".

  Hertfordshire Constabulary said a 25-year-old man was arrested on suspicion of driving whilst over the prescribed drink-drive limit.

  The man was taken to hospital but did not have life threatening or life changing injuries, police said.

