title: 'Kathryn Parton: Man charged with murder of woman in east Belfast - BBC News'
date: '2024-05-19'
section: Northern Ireland
url: http://www.bbc.co.uk/news/uk-northern-ireland-69033997
content: |-
  A 43-year-old woman and a 22-year-old man also face charges related to Kathryn Parton's death.

  A 23-year-old man has been charged with the murder of Kathryn Parton in east Belfast.

  Ms Parton, who was 34, was found dead at her home in Madrid Street on Wednesday.A 43-year-old woman and a 22-year-old man have been charged with assisting an offender and of aiding and abetting a breach of bail. The woman has also been charged with attempting to pervert the course of justice.

  All three are due appear at Belfast Magistrates' Court on Monday, police said.

  Ms Parton - known as Kat - was found with serious head injuries and pronounced dead at the scene.
