title: General's assassination pierces Moscow's air of normality - BBC News
date: '2024-12-17'
section: Europe
url: http://www.bbc.co.uk/news/articles/czjdmgnj242o
content: |-
  The killing of Igor Kirillov is a wake-up call for the Russian capital, writes Steve Rosenberg.

  Lt Gen Igor Kirillov, head of the Nuclear, Biological, Chemical Defence Forces (NBC), was killed early on Tuesday

  Appearance and reality: there is a constant battle in Moscow between the two. Despite nearly three years of war, life here can seem so normal: from the crowds of commuters on the Metro to the bars and clubs packed with young Muscovites. Then, suddenly, something happens to remind you: there is nothing normal about Russia today. That "something" can be a Ukrainian drone penetrating Moscow's air defences. Or - even more dramatic - what happened on Tuesday morning: the targeted assassination of a senior Russian general as he walked out of an apartment block.

  When Lt Gen Igor Kirillov and his assistant Ilya Polikarpov were killed by a bomb concealed on an electric scooter, the reality of Russia's war on Ukraine hit home. At least to those Russians close to the crime scene. "It's one thing reading about it in the news, it feels far, but when it happens next door to you, that's completely different and frightening," Liza tells me. She lives one building from the site of the blast. "Until now, [the war] felt as if it was happening a long way off - now someone is dead, here, you can feel the consequences. "My anxiety has gone through the roof. Every sound you hear unnerves you - you wonder whether it's a drone or something at a construction site," Liza says.

