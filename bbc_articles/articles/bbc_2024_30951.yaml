  This perception of Russia's war in Ukraine as something distant - I've heard that so often here. I get the sense that, for a considerable portion of the population, this is a war they only experience on their TV screen or on their smart phone. In many ways, a virtual war. Astonishing, really, considering the large number of dead and wounded. But the killing of a Russian general in Moscow: that is a definite wake-up call; proof that this war is very real and very close to home. Will it serve as a wake-up call for the Russian authorities? Probably not. There is little sign of a Kremlin U-turn on Ukraine. Moscow is far more likely to intensify the war. Reacting to news of Kirillov's killing, the host of a political talk show on Russian state TV blamed Ukraine and claimed that "with this attack President Zelensky has signed his own death sentence". Former Russian President Dmitry Medvedev said "investigators must find the killers in Russia." He added: "We must do everything to destroy their patrons who are in Kyiv." Russia's security service says a 29-year-old man from Uzbekistan has now been detained over the killings.

  Liza says "it's one thing reading about it in the news, it feels far, but when it happens next door to you, that's completely different and frightening"

  From President Vladimir Putin there has been no public reaction so far to the killing of the general and his assistant. But the Kremlin leader has said many times before that, faced with security threats, Russia "will always respond". Based on that pledge, retaliation is likely. On Thursday, the Kremlin leader is due to hold his annual end-of-year press conference and phone-in. It's normally a marathon affair broadcast live by all the main TV channels. I wonder: will he use the event to comment on the dramatic early morning assassination of Kirillov? Will he break his silence on Syria? The Russian president has so far said nothing publicly about the fall of Bashar al-Assad, Moscow's key ally in the Middle East. And what will he tell Russians about where their country is heading, as the war in Ukraine - what Putin still calls his "special military operation" - approaches the three-year mark?
