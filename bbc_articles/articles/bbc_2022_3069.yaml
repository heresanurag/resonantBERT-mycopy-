title: Russian gymnast Ivan Kuliak investigated for wearing pro-war symbol on podium
  next to Ukrainian - BBC Sport
date: '2022-03-07'
section: Gymnastics
url: http://www.bbc.co.uk/sport/gymnastics/60641891
content: |-
  Russian gymnast Ivan Kuliak is being investigated after wearing a national war symbol on his leotard as he stood next to a Ukrainian rival on the podium in Qatar on Saturday. The International Gymnastics Federation (FIG) said it had opened disciplinary proceedings against Kuliak for his "shocking behaviour" at the Apparatus World Cup in Doha. Kuliak earned bronze in the parallel bars final and displayed a letter 'Z' taped to his chest as he stood next to gold medal winner Illia Kovtun of Ukraine. The letter Z has become symbolic with Russia's invasion of Ukraine and has been seen painted on the side of tanks and military vehicles, as well as being worn by pro-war politicians in Russia. This weekend was the final opportunity for Russian and Belarusian gymnasts to compete after their countries were sanctioned by the FIG as a result of Russia's invasion of Ukraine. From Monday, Russian and Belarusian athletes, officials and judges will not be allowed to take part in FIG competitions or FIG-sanctioned competitions.

