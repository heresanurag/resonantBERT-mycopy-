title: Corbyn wins Islington seat as independent - BBC News
date: '2024-07-05'
section: General
url: http://www.bbc.co.uk/news/videos/c10lv1m17yjo
content: |-
  Jeremy Corbyn has beaten Labour in Islington North by about 8,000 votes.

  The former Labour leader has retained his Islington seat as an independent with 24,120 votes. He's been an MP in Islington for more than 40 years.
