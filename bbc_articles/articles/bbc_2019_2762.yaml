title: Kezia Dugdale's homophobia claim about blogger's tweet 'absurd' - BBC News
date: '2019-03-25'
section: Edinburgh, Fife & East Scotland
url: http://www.bbc.co.uk/news/uk-scotland-edinburgh-east-fife-47693895
content: |-
  Blogger Stuart Campbell takes the former Scottish Labour leader to court after she publicly called his tweets "homophobic".

  Kezia Dugdale said she was "shocked and appalled" by Stuart Campbell's tweet

  A blogger who has taken former Scottish Labour leader Kezia Dugdale to court said it was "absurd" to interpret one of his tweets as homophobic.

  Stuart Campbell, who runs the blog Wings Over Scotland, is suing the MSP for £25,000 after she criticised him in a newspaper column.

  The dispute stems from a piece written by Ms Dugdale in the Daily Record.

  Mr Campbell appeared as the first witness in the defamation case at Edinburgh Sheriff court on Monday.

  His remarks were posted on his Twitter feed on 3 March 2017 as he was live-tweeting about the Scottish Conservative conference.

  Pro-Scottish independence campaigner Mr Campbell wrote: "Oliver Mundell is the sort of public speaker that makes you wish his dad had embraced his homosexuality sooner."

