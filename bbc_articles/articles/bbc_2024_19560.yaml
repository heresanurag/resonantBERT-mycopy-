content: |-
  The Obamas capitivated the crowd in Chicago as Michelle told supporters "hope is making a comeback".

  Former President Barack Obama and his wife Michelle captivated the crowd as they talked about "hope" and took aim at Donald Trump at the Democratic National Convention in Chicago.

  The Obamas endorsed Kamala Harris as the party's presidential candidate in the 2024 US election.

  The couple gave back-to-back speeches, in which they urged Democrats to get out and vote, saying November's election was going to extremely tight.
