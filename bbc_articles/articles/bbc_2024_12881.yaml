  Footage shows June's full Moon rising behind the Temple of Poseidon in southern Greece.

  Timelapse footage shows the June full Moon - also known as a Strawberry Moon - rising behind the ancient Temple of Poseidon in southern Greece on Friday, right after the summer solstice.

  The term was originally used by Native Americans in the north-east of the US to mark the time of year when strawberries are ripe for harvest, according to the Old Farmer's Almanac.
