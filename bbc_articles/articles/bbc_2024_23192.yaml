  Save Face is a national register of accredited practitioners who offer non-surgical cosmetic treatments. Director Ashton Collins said the organisation had supported 500 women who had suffered complications from the procedure. Ms Collins said: “Liquid BBL procedures are a crisis waiting to happen. They are advertised on social media as ‘risk-free’, ‘cheaper’ alternatives to the surgical counterpart and that could not be further from the truth.” She told BBC Radio 5 Live that facial fillers are "relatively safe", due to the small amount of product being injected. However, the "huge volumes" used in BBLs present a higher risk of complications. "I can't stress strongly enough how incredibly dangerous these procedures are," said Ms Collins. "I would urge anybody considering this treatment to avoid it at all costs." Save Face has criticised non-healthcare injectors carrying out liquid BBLs, saying they were often unable to identify and manage the complications of their clients and often misdiagnosed abscesses, and tissue necrosis as bruising. A Department of Health and Social Care spokesperson said: "The safety of patients is paramount, and we would urge anyone considering a cosmetic procedure to consider the possible health impacts and find a reputable, insured, and qualified practitioner. “We are exploring options around regulatory oversight of the non-surgical cosmetics sector and will provide an update in due course.”

