title: 'Alice Webb: Arrests after non-surgical Brazilian butt lift death - BBC News'
date: '2024-09-25'
section: Gloucestershire
url: http://www.bbc.co.uk/news/articles/cx2m829lmk9o
content: |-
  Mother-of-five Alice Webb, 33, died after reportedly undergoing a "Brazilian butt lift".

  Alice Webb, 33, died in the early hours of Tuesday

  Two people have been arrested on suspicion of manslaughter following the death of a woman believed to have undergone a non-surgical Brazilian butt lift (BBL). Mother-of-five Alice Webb, 33, died at Gloucestershire Royal Hospital in the early hours of Tuesday after falling unwell. Ms Webb's partner Dane Knight urged people to think of her daughters before speculating. Gloucestershire Police's major crime team is investigating and the two arrested people have been released on bail.

  In a Facebook appeal, Mr Knight said: "[I] Want to say a heartfelt thank you to all family and friends that were here for us at our time of need, including all of the kind messages sent to my children and myself. "There was some very beautiful messages sent by some of your children that formed a start of a smile from the corner of my kids' mouths." He also urged people to think about who is around before speaking about Ms Webb's death. "I [don't want] unnecessary questions raised to the five girls, so be extremely careful on what you say and who's around. "Please have these five girls' feelings at heart," he added.

  One neighbour of what the BBC believes to be the business which carried out Ms Webb's BBL said the police had been at the premises “all day ... until yesterday afternoon”. She said she was not aware what was happening there until a reporter had told her. “I feel very sorry ... for the lady who has lost her life. Very sad all round.”

  BBL is a treatment designed to make buttocks bigger, more rounded or lifted. It can be offered as a surgical or non-surgical procedure. Surgical BBLs involve inserting silicone-filled implants and/or removing fat from other parts of the body before injecting it into the buttocks. Non-surgical BBLs - like the one Ms Webb is believed to have had - involves injecting dermal filler into the buttocks. The filler is often made up of hyaluronic acid. It is commonly used in facial filling treatments, including lip and cheek filler. While non-surgical BBLs are not illegal in the UK, last year Wolverhampton City Council barred a company from carrying out the procedure after identifying risks associated with their processes, including blood clots, sepsis, and the potential for the death of body tissues. Five local authorities in Essex and Glasgow followed suit and have banned certain companies from carrying out liquid BBLs in their area.
