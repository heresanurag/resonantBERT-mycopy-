title: 'Six Nations: Henry Pollock included in England camp - BBC Sport'
date: '2025-02-12'
section: England
url: http://www.bbc.co.uk/sport/rugby-union/articles/cdxe5g2w172o
content: |-
  Henry Pollock, the fast-rising back row prospect, is brought into England's training camp in preparation for the Calcutta Cup clash with Scotland.

  Pollock has started England's two wins in this year's Under-20s Six Nations

  Coverage: Live on BBC Radio 5 Live with text commentary on the BBC Sport website and app

  England have called up 20-year-old rising star Henry Pollock for a three-day training camp as Tom Curry recuperates following Saturday's win over France. Back row Pollock has enjoyed a breakthrough season with Northampton after playing a key role in England Under-20s' World Cup triumph in the summer. Curry, who played the entirity of England's opening two Six Nations games, is following a modified recovery schedule after having surgery on his hip last year. He and second row George Martin are continuing rehabilitation alongside their international team-mates as they prepare for the Six Nations meeting with Scotland on 22 February. Both Curry and Martin are expected to resume full training next week in the build-up to the Calcutta Cup contest. Exeter wing Immanuel Feyi-Waboso, who is in contention for the end of the tournament after opting against surgery on a shoulder dislocation, is also in camp on Thursday as he works towards his comeback.

  Bath's Ted Hill is providing back-row cover alongside Pollock in a 28-strong group that includes Alex Mitchell and Harry Randall as the only two scrum-halves. Raffi Quirke and Jack van Poortvliet both suffered injury setbacks prior to the start of the Six Nations, while Ben Spencer has slipped down the pecking order. England, who lost their opening-round fixture against Ireland before beating France last weekend, are attempting to end Scotland's four-match winning streak in the fixture. Scotland will come to Twickenham with injury doubts of their own. Star fly-half Finn Russell and wing Darcy Graham were forced off after clashing heads with each other in Scotland's loss to Ireland, while captain Sione Tuipulotu has been ruled out for the entire campaign after tearing a pectoral muscle.

