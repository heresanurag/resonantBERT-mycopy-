title: Alex Salmond's coffin arrives back in Scotland - BBC News
date: '2024-10-19'
section: NE, Orkney & Shetland
url: http://www.bbc.co.uk/news/articles/cevywm3krj4o
content: |-
  The former first minister died of a heart attack in North Macedonia at the weekend.

  This video can not be played To play this video you need to enable JavaScript in your browser.

  The body of Alex Salmond, Scotland's former first minister, has arrived back in Scotland on a plane which landed at Aberdeen Airport. His coffin, flown from North Macedonia, was greeted by members of his family, new Alba Party leader Kenny MacAskill and a lone piper. It was placed in a hearse before a cortège started the journey to Fraserburgh in Aberdeenshire. The private plane, paid for by Scottish businessman and philanthropist Sir Tom Hunter, landed just before 14:00.

  Family and friends gathered on the runway as the coffin was taken from the plane

  Mr Salmond's wife Moira was sitting inside a funeral car during the short ceremony at the airport. A small group of people with saltire flags had gathered near the terminal building ahead of the flight's arrival. A group of Scottish independence supporting 'Yes Bikers' led the cortège to a funeral home in Fraserburgh. A private family service will be held on a date that has not yet been confirmed. A public memorial will follow at a later date.

  A group of Yes bikers led the cortège as it headed for Fraserburgh

  Before being placed on the aircraft, Mr Salmond's coffin had been draped in a Saltire by Alba party colleague Tasmina Ahmed-Sheikh. The coffin was given a guard of honour and carried by members of the Macedonian military. A group of delegates including Ahmed-Sheikh looked on as the flight took off from Ohrid airport.

  Mr Salmond had been at an Academy for Cultural Diplomacy conference in North Macedonia on Saturday when he had a heart attack during lunch with other delegates. Paramedics were called and attempts were made to revive him using CPR, but failed. He died age 69. His wife Moira, his sisters Margaret and Gail, his brother Bob and his nieces and nephews released a statement after his death which praised him as "a devoted and loving husband, a fiercely loyal brother, a proud and thoughtful uncle and a faithful and trusted friend".

  Kenny MacKaskill with family and friends look on as the coffin is moved into Fraserburgh Funeral Services

  Kenny MacAskill said the North Macedonian government had paid Mr Salmond a fitting tribute as he made his final journey home. He spoke to a small crowd of well-wishers in Fraserburgh who turned out to see the coffin arrive. Earlier this week he said the Salmond family had asked that their privacy be respected and that they would announce funeral arrangements and details of a memorial service in due course. First Minister John Swinney has lodged a motion of condolence at Holyrood, while books of condolence have been opened in the Scottish Parliament for MSPs and members of the public to leave messages. Businessman Sir Tom Hunter, said he was apolitical and disagreed with Salmond on some of his ambitions, but said he funded the flight because he "deserved the dignity and privacy" of a private return home.

  A coffin draped in the Saltire. Not for the return of a prince, a president or a prime minister. It was not the remains of a fallen soldier brought home to Scotland today. This was the repatriation of a political fighter and former first minister — perhaps the most formidable champion of Scottish independence in recent times. As the coffin bearing Alex Salmond’s body was flown home by charter plane from North Macedonia - there were hints of a state occasion. The honour guard and the red carpet on departure, the piper on arrival at Aberdeen. But Mr Salmond was a private citizen. His flight home a gift from the businessman, Sir Tom Hunter. This was principally a family reunion to which the TV cameras were permitted. The former first minister did not live to see his dream of Scottish statehood. The referendum, a decade ago, was the peak of his political career. The independence question he did so much to animate may or may not be revisited in future but with his passing, it is now for others to carry that torch.
