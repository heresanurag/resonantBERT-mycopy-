title: Body found in search for girl missing in Western Isles - BBC News
date: '2018-08-18'
section: Highlands & Islands
url: http://www.bbc.co.uk/news/uk-scotland-highlands-islands-45218565
content: |-
  Seventeen-year-old Hannah Mackenzie was last seen outside her school in Stornoway on Thursday afternoon.

  Police searching for a teenager who has been missing on Lewis since Thursday have discovered a body.

  The family of 17-year-old Hannah Mackenzie, from Gravir, have been informed although no formal identification has yet taken place.

  Searches were being carried out in the grounds of Lews Castle in Stornoway, where a body has now been found.

  Ms Mackenzie was last seen outside her school, the Nicholson Institute in Stornoway, at 16:00 on Thursday.

  It was the first day of school in the Western Isles after the summer holidays.

  Police said she was intending to walk to the Western Isles Hospital.

  Ch Insp Ian Graham, Area Commander for the Western Isles, said: "Our thoughts at this difficult time are with all concerned."
