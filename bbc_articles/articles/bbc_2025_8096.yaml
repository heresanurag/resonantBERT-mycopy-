title: 'Izaiah Smith: Boy found dead in Beckenham Place Park lake named - BBC News'
date: '2025-04-06'
section: London
url: http://www.bbc.co.uk/news/articles/c98gy68y3e9o
content: |-
  A teenager found dead after going swimming in a lake in south-east London is named as Izaiah Smith.

  The lake remains closed with security in place "until further notice"

  A teenager found dead after going swimming in a lake in south-east London has been named as Izaiah Smith. The body of the 15-year-old was found in Beckenham Place Park in Beckenham at about 22:40 BST on Friday following searches by specialist dive teams. The Metropolitan Police previously said his death was being treated as "unexpected" but was not believed to be suspicious. The victim's family has been informed and is being supported by specialist officers. Lewisham Council said the park had reopened but the lake would remain closed with security in place "until further notice".

  The boy's body was recovered from the lake in Beckenham Place Park

  A Lewisham Council spokesperson said: "We send our thoughts and deepest condolences to his family and friends. "We are working closely with the police in order that their investigation establishes the full facts of what's happened." On Monday, 11-year-old Kaliyah Coa went missing in the River Thames. A "recovery mission" is under way to find her, the Met said.
