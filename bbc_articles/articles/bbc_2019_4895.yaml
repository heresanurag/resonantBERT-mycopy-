content: |-
  Lauren London speaks at a memorial service for the rapper, who was shot dead in Los Angeles.

  Nipsey Hussle's girlfriend Lauren London has paid tribute to the rapper at his memorial service.

  The 33-year-old was fatally shot outside his Los Angeles clothing store on 31 March.
