  • None Fourteen of the 20 goals conceded by Russia at the World Cup have been scored via set pieces, including six of the seven they conceded at the 2018 tournament.
  • None Only one of the last six World Cup matches to go to extra-time has not gone to penalties - the 2014 final between Germany and Argentina.
  • None Both of Croatia's goals in this game were via headers - only one of their previous 29 World Cup goals was a header.
