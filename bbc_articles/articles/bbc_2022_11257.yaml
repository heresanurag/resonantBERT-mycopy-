content: |-
  Donald Trump's children, Don Jr, Ivanka and Eric, are accused of helping him lie for tax purposes.

  The 222-page lawsuit against Donald Trump and his three eldest children lists a number of properties that New York officials say were grossly misrepresented as part of the alleged fraud.

  Here are a few of the most well-known:

  Prosecutors alleged that the value of an apartment Trump had in Trump Tower in New York was listed at $327m after its "wildly overstated" size was tripled and given an "unreasonable" price per square foot. The record sale in the entire tower was $16.5m Image caption: Prosecutors alleged that the value of an apartment Trump had in Trump Tower in New York was listed at $327m after its "wildly overstated" size was tripled and given an "unreasonable" price per square foot. The record sale in the entire tower was $16.5m

  The Mar-a-Lago club in Florida was valued as high as $739m - although the attorney general's office alleges the real value was closer to $75m and that it generated less than $25m per year Image caption: The Mar-a-Lago club in Florida was valued as high as $739m - although the attorney general's office alleges the real value was closer to $75m and that it generated less than $25m per year

  Prosecutors say Trump's golf course in Aberdeen, Scotland was valued at $327m based on the assumption that 2,500 homes could be developed there - 1,000 more than had been approved by local authorities Image caption: Prosecutors say Trump's golf course in Aberdeen, Scotland was valued at $327m based on the assumption that 2,500 homes could be developed there - 1,000 more than had been approved by local authorities

  A 2020 appraisal of Trump Park Avenue in New York valued it at $84.5m - but it was allegedly listed as $135.8m on a company statement that same year Image caption: A 2020 appraisal of Trump Park Avenue in New York valued it at $84.5m - but it was allegedly listed as $135.8m on a company statement that same year

  A commercial property at 40 Wall Street in New York was valued at $220m in a November 2012 appraisal. The same year, it was listed as being worth $527m in a company statement - a figure which rose to $530m the following year Image caption: A commercial property at 40 Wall Street in New York was valued at $220m in a November 2012 appraisal. The same year, it was listed as being worth $527m in a company statement - a figure which rose to $530m the following year
