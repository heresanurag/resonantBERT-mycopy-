  Tuesday's headlines focus on the UK economy's growth struggles and the King's Christmas speech.

  Reeves needs 'Christmas miracle' and King's 'message of unity'

  The UK's stagnating economy is the top story for the i; the paper says the chancellor needs a Christmas miracle to turn it around, external. Figures from the Office for National Statistics (ONS) and the Bank of England show that the UK economy saw no growth in the third quarter of the year. The Financial Times quotes Rachel Reeves, external, who says she has a "huge task" ahead.

