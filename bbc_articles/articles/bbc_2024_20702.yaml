title: Charity worker attacks neighbours with cattle prod - BBC News
date: '2024-08-05'
section: Wales
url: http://www.bbc.co.uk/news/articles/cdrll0yyk0do
content: |-
  Paula Attwood-Rees attacked her 69-year-old neighbours and damaged their cars over a parking row.

  Paula Attwood-Rees, 59, attacked her 69-year-old next door neighbours while armed

  A charity worker attacked her neighbours with an electric cattle prod and damaged their cars amid a parking row. Paula Attwood-Rees, 59, flew into a rage with her 69-year-old next door neighbours, Jacqueline and Christopher Teague, near their homes on Alexandra Terrace in Monkswood, Monmouthshire. A court heard how Attwood-Rees was armed with a knife, a saw, an electric cattle prod and a garden shovel when she attacked the couple on 30 May. Both the victims needed hospital treatment after the attack, but their injuries were not life-threatening or life-changing, and their Audi TT and Renault Captur SUV vehicles were damaged.

  Attwood-Rees used an electric cattle prod, as well as being armed with a garden shovel, a knife and a saw, when she attacked her neighbours

  A police firearms team were called to the scene where Attwood-Rees assaulted PC Wayne Harrington as he tried to calm the violence. Attwood-Rees was initially charged with attempted murder, but later pleaded guilty to wounding with intent, assault occasioning actual bodily harm, aggravated burglary, criminal damage, weapons offences and assaulting an emergency worker. Clare Wilks, prosecuting, told Cardiff Crown Court on Friday how the situation flared in the evening after Attwood-Rees was convicted of previous criminal damage of a Toyota Yaris belonging to Mrs Teague, in a trial at Newport Magistrates' Court. Gareth Williams, defending, said his client was of previous "exemplary character" and had worked for charities, including raising money for Headway Cardiff in 2020 after the charity helped her during recovery from a brain aneurysm. Judge Tracey Lloyd-Clarke remanded her into custody and said the offences were "extremely serious" and an immediate custodial sentence was inevitable. Attwood-Rees will appear for sentencing at a later date.
