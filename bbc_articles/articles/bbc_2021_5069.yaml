title: 'AJ Tracey: Gig organisers fined £10k for Covid rule breach in Manchester -
  BBC News'
date: '2021-04-19'
section: Newsbeat
url: http://www.bbc.co.uk/news/newsbeat-56799333
content: |-
  Greater Manchester Police has warned of flouting restrictions after gathering in Platts Field Park.

  AJ Tracey says he didn't expect so many fans to turn up to the event in Manchester

  Organisers of an AJ Tracey gig, cancelled shortly before it was due to take place on Sunday in Manchester, have been fined £10,000 for breaching Covid rules.

  The rapper says he didn't expect so many people to turn up at Platt Fields Park, in the south of the city.

  The event was axed before he performed because so many people turned up.

  AJ Tracey was forced to cancel a trip to Bristol which he was set to make after his Manchester visit.

  Greater Manchester Police has warned "not to flout the lifting of restrictions" as lockdown rules ease.

  Current coronavirus restrictions in England mean only six people, or two different households of any size, can gather outside.

  In a video posted online, AJ Tracey thanked fans for coming out.

