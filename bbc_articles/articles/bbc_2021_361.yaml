title: CCTV captures moment hotel fire takes hold - BBC News
date: '2021-01-22'
section: General
url: http://www.bbc.co.uk/news/uk-scotland-55771004
content: |-
  CCTV footage has been released showing fire breaking out in a hotel after a porter put a bag of ash and embers in a cupboard.

  CCTV footage has been released of the moment a fire took hold in a hotel after a porter put a bag of ash and embers in a cupboard.

  Simon Midgley and his partner Richard Dyson died in the fire at Cameron House next to Loch Lomond in December 2017.

  Cameron House admitted charges under the Fire Scotland Act of failing to take fire safety measures.

  Christopher O'Malley, who put the bag in the cupboard, admitted breaching the Health and Safety at Work Act.
