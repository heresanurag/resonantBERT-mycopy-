title: 'Euro 2020: England fans celebrate as Three Lions make final - BBC News'
date: '2021-07-08'
section: General
url: http://www.bbc.co.uk/news/uk-england-57758930
content: |-
  England fans celebrate beating Denmark 2-1 in extra time at Euro 2020 to set up a final against Italy.

  The Three Lions have done it. They've reached their first major final in 55 years and England fans are buzzing.

  England beat Denmark in extra time at Euro 2020 to set up a final against Italy on Sunday.

  Gareth Southgate's side came from behind to win their semi-final 2-1 in front of around 60,000 people at Wembley Stadium.

  Watch key moments from an emotional night for England fans.
