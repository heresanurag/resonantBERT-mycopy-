title: 'Women''s Six Nations 2025: ''Calm'' England have ''great capacity'' to regroup
  - BBC Sport'
date: '2025-04-12'
section: England
url: http://www.bbc.co.uk/sport/rugby-union/articles/cwynql94gx3o
content: |-
  England score six unanswered second-half tries after "calm" half-time debrief quells the possibility of a shock defeat by Ireland in Cork.

  This video can not be played To play this video you need to enable JavaScript in your browser.

  While the crowd in Cork rose to their feet to clap off an Ireland side who were only 7-5 down against the favourites for the Rugby World Cup, England's leaders blocked out all the noise and gathered in a huddle. Captain Zoe Aldcroft led the discussion with lock Abbie Ward, fly-half Zoe Harrison, scrum-half Natasha Hunt and centre Meg Jones. All the remaining players were off down the tunnel, but the Red Roses' leadership team - like they did at the Principality Stadium in round two - took time to debrief before hearing from head coach John Mitchell and his assistants in the changing room. Ireland had frustrated Mitchell's side for large parts of the first half, and took a deserved lead through a try by wing Amee-Leigh Costigan. However, Morwenna Talling's score helped the visitors to a narrow half-time lead, and six unanswered second-half tries emphatically ended any possibility of a shock defeat. "It was all about how we could take pressure off ourselves and to just work on the successes we were getting." The Red Roses have not lost since their World Cup final defeat by New Zealand in 2022, with Mitchell's side rarely even close to defeat in their incredible 23-game winning run. Their most recent proper challenge came back in October against Canada at WXV1, where again they only held a 7-5 lead at half-time before eventually winning 21-12 to retain their title. Cork provided a similar exercise, which is exactly what England want before a home World Cup kicks off in August. "We actually really enjoyed that test. We needed that and it's good for the game to have a first half like that," England attack coach Lou Meadows told BBC Sport. "It was a physical battle and all about winning the collision and we just didn't do that in the first half. "They fixed it in the changing room themselves. It was about the collision and winning the carry, they spoke about the one action they needed to achieve that. "We wanted to keep it simple, clear that up and then we can play fast."

