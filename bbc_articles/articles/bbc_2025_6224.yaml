  The message about winning the collision from the leadership team quickly came to fruition when Jess Breach burst down the wing to score a disallowed try just over 30 seconds into the second half. It was the start of a free-flowing half of rugby from the Red Roses, led by fly-half Harrison, who despite being known for her strong kicking game was lively with ball in hand. "I really enjoyed Zoe's running game today, we know she can kick and distribute but I just liked how she got her head up early and saw space," former England fly-half and 2014 World Cup-winner Katy Daley-Mclean told BBC's Rugby Union Weekly. "She was solving the problems in front of her, she is starting to develop into a really well-rounded 10 and coming into form at exactly the right time." The biggest swing came when Mitchell unloaded his bench, which saw replacement prop Sarah Bern score twice and Kelsey Clifford grab her first international try. Mitchell made 13 changes to his starting XV from the opening win over Italy to the hammering of Wales in Cardiff as he aims to build "two teams" before the World Cup. "One thing England have is a massively good bench, Sarah Bern came on and was outstanding," added Mclean. "Kelsey Clifford and Maddie Feaunati were brilliant, the list is endless. They all came on and added. "It is great for England as it is competition but they know that very few teams in the world can live with you for 80 minutes and your bench." England, who next face Scotland in Leicester next Saturday, are chasing a seventh Women's Six Nations title in a row and a fourth successive Grand Slam. France are the last team to beat the Red Roses in the Six Nations back in 2018 and, after a convincing win over Wales, remain on course to set up a potential Grand Slam-decider at Allianz Stadium on 26 April. Former Red Roses head coach Simon Middleton says England need to address how they begin games. "They need to look at how they start the game, they struggled last week in the start against Wales and again this week," Middleton told BBC Sport. "What they do have is a great capacity to regroup themselves and that strength in depth, but against better sides they won't get presented with as many opportunities. "Other sides will not fall away as much as Ireland did." Come World Cup time - in front of what are likely to be record-breaking crowds - being calm and regrouping under pressure is certainly a handy skill to call upon.

