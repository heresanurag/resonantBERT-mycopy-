  They said: "This news comes as a shock to all of us who have tirelessly provided information and campaigned to make this possible since December 2021. "This decision will have a significant negative impact for people seeking asylum in Scotland. For some, it was the last ray of hope under such difficult and hostile policies. "As third sector organisations who have been providing direct support to the most vulnerable in our communities, we know that having free bus travel would have a positive impact by providing support and connection with others, as well as allowing access to education, advice and advocacy." A Scottish government spokesperson said: “People seeking asylum in Scotland who are currently eligible for free bus travel through the national concessionary travel schemes, including those under 22 and over 60 years of age and those with disabilities, will continue to be able to make use of their entitlement. “We remain committed to supporting people seeking asylum, refugees and communities through the New Scots refugee integration strategy approach. "We want to work collaboratively with the UK government to contribute ideas that build on shared priorities and where possible provide evidence of impacts and needs."
