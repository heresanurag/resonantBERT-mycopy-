  Eddie Mair of BBC Radio 4's PM programme announces the death of fellow Radio 4 presenter Steve Hewlett.

  Eddie Mair of BBC Radio 4's PM programme announces the death from cancer of fellow Radio 4 presenter Steve Hewlett at the age of 58.

  He was diagnosed last March with cancer of the oesophagus.

  He was frequently interviewed by Eddie Mair during his treatment, and after he was told it was no longer effective.
