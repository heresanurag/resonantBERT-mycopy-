url: http://www.bbc.co.uk/news/articles/cvge8dnrge5o
content: |-
  James Scott Rhys Anderson is the first UK citizen to be convicted by Russia during the war with Ukraine.

  Briton captured while fighting for Ukraine jailed in Russia

  A British man who was captured while fighting for Ukraine's armed forces has been jailed for 19 years by a Russian military court. James Scott Rhys Anderson was reportedly captured in Russia's Kursk region last November, where Ukraine had launched a cross-border incursion, and was charged with terrorism and mercenary activity. The 22-year-old is the first British national to be convicted by Russia during the war. The UK Foreign Office said Mr Anderson was sentenced on "false charges" and described him as a prisoner of war.

  A statement released by the Russian court claimed Mr Anderson had pleaded guilty but this cannot be verified, as he has not been heard from independently since he was taken. On Wednesday, a Russian military court ruled that Mr Anderson would spend the first five years of his sentence in prison before being transferred to a penal colony with "strict" conditions. Russian investigators had accused him of "committing a terrorist act" as part of an organised group, illegally crossing the border into Russia, causing "significant damage to property" and having "destabilised" the activities of authorities. But those claims were rejected by a UK Foreign Office spokesperson, who said they "strongly condemn" Mr Anderson's sentencing on "false charges". "Under international law, prisoners of war cannot be prosecuted for participating in hostilities. "We demand that Russia respect these obligations, including those under the Geneva Conventions, and stop using prisoners of war for political and propaganda purposes. "We remain in close contact with Mr Anderson's family and are providing consular support." Mr Anderson's three-day trial was held behind closed doors. Video footage released by the Kursk court showed Mr Anderson being led into court in handcuffs wearing a winter hat and jacket that appeared to be prison uniform. Reports of Mr Anderson's capture first came to light after a video circulated online showing a man identifying himself while being captured. In another video, he identified himself as a former British Army soldier from Oxfordshire. While Mr Anderson is the first UK citizen accused of fighting for Ukraine to be captured and convicted by Russia, two British captives were sentenced to death in Russia-occupied Donetsk - however, they were later released in a prisoner exchange.
