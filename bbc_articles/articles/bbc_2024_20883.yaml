title: Banksy goat artwork appears on west London building - BBC News
date: '2024-08-06'
section: London
url: http://www.bbc.co.uk/news/articles/cvg44my8v11o
content: |-
  The artwork shows a goat perched on the wall as rocks fall, while it is filmed by a CCTV camera.

  Banksy confirmed the artwork was by him on his Instagram account

  Banksy has unveiled a new artwork on the side of a building in south-west London. The elusive artist's signature stencil-styled piece, which appears to show a goat perched on a ledge as rocks fall, has been painted on a wall in Kew Green, Richmond. He posted a picture of the artwork on his Instagram on Monday, which is how he has previously claimed responsibility for his works. The piece also featured a real life CCTV camera which was pointed at the goat, but this has since been moved to its original position.

  The new artwork is attracting attention from onlookers

  Banksy did not caption the artwork on his Instagram post, external leaving many to interpret it their own way. Some suggested the picturing of a goat on a precipice represented the human race currently being "on the edge of extinction". Others interpreted the inclusion of the CCTV camera in the artwork as showing that even in the most out-of-the-way spaces, there is no privacy. Meanwhile, one person questioned whether the work had any meaning at all and Banksy had just "thought a goat would look cool up there".

  Pauline Taylor (left) thanked Banksy for choosing to unveil the piece in Kew

  Those living in Kew were simply pleased with the creation appearing on their doorsteps. "I think it's incredible - we hope it stays here," he told BBC London. Pauline Taylor said her grandchildren "will be wowed by it". "Our allotments are just down there, so everybody puts it on the website, 'oh my God we've got a Banksy'. In Kew, can you believe it?" she said. The artist, whose identity is unknown, last painted in the capital in Finsbury Park when he sprayed green paint on a wall behind a cut-back tree to look like foliage, with a stencil of a person holding a sprayer next to it.
