title: 'Celtic 3-0 Rangers: Brendan Rodgers'' side disappearing over horizon as Europe
  looms into view'' - BBC Sport'
date: '2024-09-01'
section: Scottish Football
url: http://www.bbc.co.uk/sport/football/articles/cwy7d4p9mpgo
content: |-
  On the evidence of this Old Firm game, Celtic will win the league at a canter. Their testing ground now has to be the Champions League.

  'Celtic disappearing over horizon as Europe looms into view'

  It could have been the game in microcosm. Fifty minutes in, Celtic leading 2-0, Cameron Carter-Vickers and Cyriel Dessers going for a loose ball. Carter-Vickers wins the physical battle to such an overwhelming extent that Dessers ended up on the floor with the American looking back at him, in the way you might look at roadkill. In every department worth mentioning, Celtic won a landslide victory. Rangers won the yellow card count. That was about it. From somewhere, Rangers manager Philippe Clement imagined a scenario where the game could have ended 3-2 or 3-3. It was a comment that will draw the same kind of blank expressions you see when historians are asked about the location of the Holy Grail or the resting place of the Mary Celeste.

  There was always a probability that Celtic would make this a rout if they hit their stride. Well, they hit it in a way they haven’t hit it in this fixture for a couple of seasons - and they won nearly all of those previous ones. Speed of thought, speed of action, mind and muscle - they were streets ahead. They worked harder, countered quicker. Like vultures, they feasted on the errors they forced Rangers into making. All the usual Old Firm hits played out - Daizen Maeda’s tormenting of James Tavernier, Callum McGregor’s domination in midfield, Kyogo Furuhashi’s brilliant finishing. But there was new stuff, too. Celtic lost a big player in Matt O’Riley, but the sharpness of McGregor, Kuhn and Paulo Bernardo made his loss redundant. Nicolas Kuhn was wonderful wide on the right, a constant source of movement and menace. Celtic were a class apart. It was all pretty simple for them.

