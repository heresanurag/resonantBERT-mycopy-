  The rivalry between these teams will always remain, but it’s a thing of geography and history these days. It doesn’t really transfer on to the pitch all that much, not when the only time that Celtic have lost a game against Rangers in the last 13 meetings was a dead rubber when they’d already secured the title. We want a title chase, but the evidence of Sunday is that we’re not going to get one. Rangers have a pile of work to do. They have too many players they still need to move out and too many better ones that they need to find. They’re in the midst of the dreaded concept ‘The Project'. They need players and they need patience to get on with it. Finding the former will be as much of a challenge as receiving the latter. Celtic are too well-coached, too settled, too good. They’ll surely win the league at a canter, but that’s not the testing ground for them anymore. It can’t be. They’ve proven in 12 of the last 13 seasons that they’re better than Rangers. It’ll become 13 in 14. Great for them, but what else? Europe. The Champions League. A kindly-enough draw in the new format that gives them a chance of doing something in that competition after so many failures in the last decade, many of the worst ones coming on Rodgers’ watch.

