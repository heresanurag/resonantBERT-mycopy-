id: bbc_2021_9872
title: Friends narrowly escape flooding lift - BBC News
date: '2021-08-10'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-58154056
content: |-
  Three residents were caught in a storm surge in Omaha, Nebraska, and recorded their ordeal.

  Tony Luu and his two friends wanted to check his apartment complex's basement during a heavy storm on Sunday.

  Water gushed into their lift as they went to the lower levels, and filled up to their necks.

  With his friends' help, they pried the door open to make an escape.
