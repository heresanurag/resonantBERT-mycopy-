  The NFL also announced on Monday that the Philadelphia Eagles will be the 'home' team for the league's first game in Brazil next season. The match in Sao Paulo will be played on Friday of the opening week of the season, with the Eagles' opponents to be named before the 2024 regular-season schedule is released in the spring. The NFL announced last month that the Chicago Bears and the Minnesota Vikings will join the Jacksonville Jaguars by hosting games in London next season, while the Carolina Panthers will be the home team when the NFL returns to Munich, Germany.

