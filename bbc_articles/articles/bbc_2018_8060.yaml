  Your team of the tournament

  We also gave you the chance to select your team of the tournament via our team selector.

  Unsurprisingly, more of the established superstars made the cut, although there is some crossover with the Player Rater.

  Modric was the most selected player, with 141,378 of the 180,000 people who took part (that's 79%) picking him in midfield. Hazard, De Bruyne and Trippier also make the cut.

  However, winners France are represented this time around, with defenders Raphael Varane and Benjamin Pavard, midfielder N'Golo Kante and forward Mbappe, who received the second most picks, all amongst the most selected.

