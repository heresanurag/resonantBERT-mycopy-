  Russia 2018 was not the World Cup for the big names as Lionel Messi, Cristiano Ronaldo and Neymar all failed to reach the semi-finals.

  Ronaldo did score a hat-trick in his opening game against Spain but ended the tournament with an average rating of 6.12, a score which ranked him 187th of all players in Russia to card a score.

  His foe and rival Messi only recorded an average of score of 5.25, including a bad day at the office with a 3.9 against Croatia in the group stage. He ended down in 426th place.

  And PSG forward Neymar really didn't impress you. The Brazil forward scored twice but only managed an average score of 4.47 - which left him the 542nd player on the list and below Panama's Armando Cooper.

  The lowest-ranked player to play more than once was Germany's midfielder Sami Khedira with 3.19. His score of 2.25 against South Korea was the lowest score awarded - though 13 Germany players scored lower than three in that match.

  South Korean full-back Ko Yo-han had perhaps the most remarkable World Cup from a statistical point of view. His only appearance was an 11-minute substitute cameo in the win against Germany, during which he touched the ball five times.

  He scored 8.37 to rank number one in the ratings of all players to have featured in that game.

  France were champions but you didn't rate them too highly.

  Mbappe was the best rated player of Didier Deschamps' side, ending the tournament with an average score of 6.54, just 0.01 ahead of Manchester United's Paul Pogba.

  Sixteen of the squad averaged under six throughout the tournament, with Chelsea forward Olivier Giroud averaging 5.53 despite not having a single shot on target in the whole World Cup.
