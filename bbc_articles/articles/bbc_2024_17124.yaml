content: |-
  Some inhalers in Nigeria have doubled or tripled in price since last year, leaving many struggling.

  The rising cost of living is making essential medicines unaffordable for many in Nigeria.

  Some asthma inhalers have doubled or even tripled in price since the end of last year, leaving sufferers like single mum Phoebe struggling with frequent asthma attacks.

  Filmed by Mobolaji Olatunde and Adekola Olawale. Edited by Mobolaji Olatunde and Okechukwu Omeire.
