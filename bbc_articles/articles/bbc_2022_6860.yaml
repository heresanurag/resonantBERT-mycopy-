content: |-
  The highly coercive and potentially lethal systems of control used against the Uyghurs and other minority groups in China’s internment camps have been revealed in the Xinjiang Police Files - a giant cache of secret documents shared with the BBC.

  The highly coercive and potentially lethal systems of control used against minority groups in China’s internment camps have been revealed in a giant cache of secret documents shared with the BBC. China insists the network of secure facilities built across its far western region of Xinjiang are simply “schools” for combatting extremism to which “students” sign up willingly. But the contents of the leaked Xinjiang Police Files suggest a different story. Taking information from the leaked documents, the BBC has reconstructed one of the camps – the Shufu County New Vocational Skills Education and Training Centre - to reveal the methods used inside. Keep scrolling to find out more

  The camp is just south of the city of Kashgar. The documents show it holds 3,722 “students”, guarded by more than 366 police officers.

  The camp is just south of the city of Kashgar. The documents show it holds 3,722 “students”, guarded by more than 366 police officers.

  Police are stationed at the front gate... ...and each of the main buildings. Twenty five of them are armed with guns. Watchtowers, the documents say, are guarded by two police officers. They are equipped with sniper rifles and machine guns. Exercise yards are fenced off and watched over by seven officers. Inside the building, “students” are overseen during lessons by police.

