title: 'Coronavirus: Pope Francis delivers blessing via videolink - BBC News'
date: '2020-03-08'
section: General
url: http://www.bbc.co.uk/news/world-europe-51794432
content: |-
  Due to the threat of coronavirus, Pope Francis delivers his weekly blessing via videolink to avoid large crowds gathering in the Vatican.

  Due to the threat of coronavirus, Pope Francis has delivered his weekly Angelus blessing via videolink to avoid large crowds gathering in the Vatican.

  It comes as Italy has placed up to 16 million people under quarantine as it battles to contain the spread of Covid-19.
