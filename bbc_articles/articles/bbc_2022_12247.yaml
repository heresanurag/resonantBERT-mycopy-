title: 'As it happened: UN inspectors view Russian-held nuclear plant - BBC News'
date: '2022-09-01'
section: Europe
url: http://www.bbc.co.uk/news/live/world-europe-62748668
content: |-
  The team are there to make sure fighting doesn't lead to a catastrophe at Europe's biggest nuclear power station.

  With dire warnings coming from President Volodymyr Zelensky's office about the danger of a nuclear catastrophe as fighting continues around Europe’s largest nuclear power plant, just what are the nuclear risks of the war in Ukraine?

  We can break them down as follows:

  Ukraine’s civil nuclear power plant at Zaporizhzhia has six nuclear reactors. These are well protected and of a far safer design than the one at Chernobyl that blew up in 1986.

  But they need a constant power supply to keep cool. If power were to be interrupted for a length of time, or if the plant’s radioactive waste was to be damaged, then there is a risk of harmful radiation leaking into the atmosphere.

  There is currently a northerly wind, turning northeasterly on Friday, which would blow any radiation plume away from Russia and towards Odesa, should an accident occur.

  Russian military doctrine allows for the early use of battlefield "tactical" nuclear weapons with a yield of up to 15 kilotons, enough to destroy a football stadium and anything within a one to two mile radius.

  There is currently no suggestion Russia would use one but if the war started to go really badly for Moscow then there is no knowing what President Putin could order.

  This is the doomsday nuclear arsenal, of massive city-destroying missiles and bombs, that President Putin likes to remind the world he controls.

  America, Britain and France all have the same, so no one has used one in anger since 1945. Ukraine returned all its Soviet-era nuclear warheads to Russia in the 1990s and some here now say this was a mistake.
