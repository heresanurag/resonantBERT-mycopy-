  Kennedy recently vowed to remove fluoride - a cavity-fighting mineral - from the US drinking water, which about two-thirds of Americans have in their water supply. Though it is a decision made by state and local health authorities, Kennedy said on X earlier this month that "the Trump White House will advise all US water systems to remove fluoride from public water". He alleged the chemical found in toothpaste and regularly used by dentists "is an industrial waste associated with arthritis, bone fractures, bone cancer, IQ loss, neurodevelopmental disorders, and thyroid disease".
  • None Five takeaways from Trump's first week The US Public Health Service reduced the amount of fluoride it recommended adding to water in 2015, but the federal government has encouraged states since the 1960s to add small amounts of the chemical to water to help prevent cavities and aid oral health. Recent court rulings have led to the reduction of fluoride in US water, and some experts have questioned the continued need for it in water systems given its wide availability in toothpaste and other dental products. Most of western Europe does not add fluoride to its water. In England, about one in 10 people has fluoridated drinking water. Removing it altogether could still pose a challenge, however, as the federal government does not have the final authority over that decision.

  Kennedy has long claimed that chronic health issues have worsened due to the inaction of federal health agencies. He said at a rally in Arizona earlier this month that he plans to fire and replace 600 employees at the NIH - which oversees vaccine research - as soon as Trump takes the White House. The longtime lawyer also said last month that he intends "to have every nutritional scientist" in the health and agriculture departments fired on day one of a Trump presidency because he alleges they are co-opted by corporate interests. He reportedly intends to take a serious look at those who work at other health agencies as well, including the Food and Drug Administration and the Centers for Disease Control and Prevention.
