content: |-
  National security adviser Jake Sullivan says the US will take "more steps" - but does not say if strikes inside Iran are planned.

  How far is the UK prepared to go?

  That's the obvious question many will be asking after last night's strikes on Houthi targets - the third time British jets were involved. After the first air strikes, the government said it was confident the Houthis' ability to mount attacks had been substantially downgraded. But since then, ships have continued to be targeted in the Red Sea, and many are still choosing to take the longer, more expensive route around the continent of Africa. Ministers say they’re ready to act again if necessary, but they, alongside the Americans, are keen to avoid any escalation. At the moment the opposition parties in Westminster are largely supportive of the government’s actions. The longer this goes on, though, the greater the risk that this becomes something more than just “targeted” strikes. There’s no military escalation yet, but the war of words is growing. This morning the foreign secretary issued a warning to the Houthis’ main backers - Iran - that it will be “ultimately held accountable” for its proxies.
