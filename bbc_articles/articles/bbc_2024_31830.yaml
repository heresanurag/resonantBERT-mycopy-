title: 'ICC Champions Trophy 2025: India face Pakistan in Dubai as fixtures released
  - BBC Sport'
date: '2024-12-25'
section: Cricket
url: http://www.bbc.co.uk/sport/cricket/articles/cd75z2xxzpwo
content: |-
  India will face Pakistan in Dubai on 23 February as the International Cricket Council releases the Champions Trophy 2025 fixtures.

  Pakistan beat India by 180 runs at The Oval to win the 2017 Champions Trophy

  India will face Pakistan in Dubai on 23 February as the International Cricket Council released the Champions Trophy fixtures on Tuesday. The eight-team tournament will be held in host country Pakistan and neutral venue Dubai from 19 February to 9 March. Defending champions Pakistan and India were drawn alongside New Zealand and Bangladesh in Group A while England will face Australia, South Africa and Afghanistan in Group B. The tournament opener will see Pakistan face New Zealand in Karachi on 19 February while India take on Bangladesh in Dubai the following day. The Pakistan Cricket Board picked Dubai as a neutral venue after India refused to travel to Pakistan because of the ongoing political tensions between the countries. As a result, India's three group fixtures and the first semi-final on 4 March will be played in the United Arab Emirates. The final, scheduled to be held in Lahore on 9 March, will also move to Dubai if India qualify for the title decider.

  Meanwhile, England will begin their Champions Trophy campaign against Australia in Lahore on 22 February before facing Afghanistan on 26 February and South Africa on 1 March. The 50-over Champions Trophy will be the first time Pakistan has hosted a global event since 1996. Pakistan will also host the women's T20 World Cup in 2028, when neutral venue arrangements will apply. Pakistan will also play at a neutral venue in any event hosted by India until 2027, as per the agreement between the Board of Control for Cricket, PCB and ICC. India and Pakistan have not met outside of men's major tournaments since 2013 and India have not played in Pakistan since 2008.

  9 Final, Lahore (unless India qualify, then it will be played in Dubai) Both semi-finals and final have reserve days
