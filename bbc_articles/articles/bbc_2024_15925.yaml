  BBC Sport readers rated Netherlands scorer Cody Gakpo as their player of the match in the Netherlands' win against Romania.

  Netherlands' Gakpo is your man of the match

  This video can not be played To play this video you need to enable JavaScript in your browser.

  We asked you to rate the players after the Netherlands' 3-0 victory against Romania in the last 16 of Euro 2024. You picked Netherlands scorer and Liverpool forward Cody Gakpo as your player of the match, being given an average mark of 8.60 out of 10. Defender Radu Dragusin was rated Romania's best player with a score of 6.60.

