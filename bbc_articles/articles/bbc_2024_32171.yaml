content: |-
  It’s been one week since rebel forces launched their largest offensive against the Syrian government in years. BBC Verify has been tracking their advances.

  It’s been one week since rebel forces launched their largest offensive against the Syrian government in years.

  BBC Verify has been tracking the advance of rebel forces from north-west of the country by analysing and tracking footage that’s been posted on social media.

  They appear to have captured a large area of land - including most of the city of Aleppo. The Syrian government and its key ally, Russia, have been carrying out airstrikes in response.
