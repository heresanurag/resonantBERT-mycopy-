title: 'Covid in Scotland: First Minister''s Questions - BBC News'
date: '2021-03-11'
section: Scotland
url: http://www.bbc.co.uk/news/live/uk-scotland-56285625
content: |-
  Nicola Sturgeon faces questions from opposition leaders and MSPs after confirming the return of more pupils to school will go ahead as planned.

  Alison Johnstone from the Scottish Greens asks the first minister about air passenger duty and UK government plans to cut it. She also asks about plans to build new roads.

  She calls it "irresponsible" because it flies in the face of the climate emergency, particularly in the build-up to the Cop26 conference later this year.

  She asks the first minister if she will take responsibility to make sure APD is not cut in Scotland.

  The FM says she has no plans to cut air passenger duty and says the Scottish government's economy recovery plan must be consistent with its moral obligation to meet net zero targets.

  She says if anyone looks at the Scottish government's budget they will see strongly the commitment to a "green sustainable recovery".
