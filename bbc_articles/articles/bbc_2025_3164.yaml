content: |-
  A statement from No 10 confirms he spoke with both and "retains unwavering support for Ukraine".

  Starmer speaks to Trump and Zelensky after White House row

  This video can not be played To play this video you need to enable JavaScript in your browser. Watch in full: The remarkable exchange between Zelensky, Vance and Trump

  Prime Minister Sir Keir Starmer has spoken to US President Donald Trump and Ukrainian President Volodymyr Zelensky after a meeting between the two leaders in Washington descended into a row about US support for Ukraine. The initially cordial White House talks ended in a furious row in front of the media, as Trump told his Ukrainian counterpart to be more thankful for US aid and accused him of "gambling with World War Three". No 10 confirmed the prime minister had spoken with both presidents and that he retained "unwavering support for Ukraine". On Sunday, Sir Keir will host a summit of European leaders to discuss an end to the war between Ukraine and Russia.

  Zelensky arrived in the UK on Saturday ahead of the meeting, which will now be overshadowed by events in Washington. Speaking on Friday, a No 10 spokesperson Sir Keir was "doing all he can to find a path forward to a lasting peace based on sovereignty and security for Ukraine". The Oval Office spat also prompted words of support for Zelensky from key European allies, including French President Emmanuel Macron, German Chancellor Olaf Scholz and Polish Prime Minister Donald Tusk.

  Former Foreign Secretary Jeremy Hunt told BBC Radio 4's Today programme that there remains a "sliver of hope" for a peace deal. "Trump wants a sustainable peace in Ukraine because he sees this as a very big part in his legacy and he wants that to last for many years," Hunt said. "He doesn't want to withdraw from Ukraine and abandon it to the Russians in the way that the United States abandoned Afghanistan to the Taliban - he knows that would be very bad for his reputation, for America's reputation - so in the end he needs a ceasefire that both Zelensky and Putin are part of." Hunt stressed that what was needed for negotiations to restart was "a little bit of time" for "tempers to cool down". The heated clash in the Oval Office of the White House - in which both Trump and Zelensky interrupted each other repeatedly - was supposed to be a prelude to the two leaders signing a deal that would pave the way towards US access to Ukrainian minerals. A news conference scheduled for later in the day was cancelled, and Zelensky was asked to leave the White House before the agreement could be signed.

  The Oval Office clash saw Trump accuse Zelensky of "gambling with World War Three"

  In a later interview with Fox News, Zelensky said the public spat "was not good" - but the relationship between him and Trump could be salvaged. Writing on Telegram on Saturday, the Ukrainian leader said: "It is very important for us that Ukraine is heard and that no one forgets about it, neither during the war nor after." Sir Keir's own meeting with Trump on Thursday took on a much more cordial mood. The pair agreed to begin work on a new US-UK trade deal, and Trump appeared to have softened his stance towards Zelensky. There had been speculation that Sir Keir had also gone into the visit seeking a US security "backstop" in a European-led peace plan for ending the war in Ukraine. However, the US president stopped short of making such a commitment. Trump had previously criticised Sir Keir and France's Macron of having "done nothing" to seek an end to the war in Ukraine.

  Reacting to Friday's far more acrimonious Oval Office meeting, Conservative leader Kemi Badenoch said that "respectable diplomacy is essential for peace", adding that a "divided West only benefits Russia". Liberal Democrat leader Sir Ed Davey suggested Trump and US Vice-President JD Vance were "bullying the brave true patriot Zelensky into accepting a deal that effectively hands victory to Russia". He also said that he was "proud that the UK has been Ukraine's staunchest ally from the start" but that the PM should "show British leadership on Ukraine by inviting President Zelensky to address Parliament on Monday". The leader of the SNP in Westminster, Stephen Flynn, said an offer of a second state visit - made during Starmer's White House visit, external - should be revoked. Meanwhile, Reform UK leader Nigel Farage said the spat was "regrettable" and would "make Putin feel like the winner". He added that it was "not the end of the story" and that a peace deal "with the right security guarantees" for Ukraine was "essential". While reaction among US politicians appeared to largely fall along partisan lines, in Ukraine there was broad appreciation for Zelensky holding his ground over what many Ukrainians see as an existential war. Russia, meanwhile, said Trump and Vance had acted with restraint.
