title: Unflustered news anchor loses tooth live on air - BBC News
date: '2020-07-17'
section: Europe
url: http://www.bbc.co.uk/news/world-europe-53451953
content: |-
  Marichka Padalko simply put the tooth in her hand and continued presenting the news.

  'Honestly, I thought the incident would go unnoticed,' Marichka Padalko said

  Live TV can throw up all sorts of potential hurdles - technical glitches, unpredictable guests and knowing that there is no take two.

  But Marichka Padalko, a news anchor in Ukraine, faced an unusual problem this week when part of her front tooth fell out.

  However, like a true professional, she simply put the tooth in her hand and continued.

  "Honestly, I thought the incident would go unnoticed," she wrote on Instagram.

