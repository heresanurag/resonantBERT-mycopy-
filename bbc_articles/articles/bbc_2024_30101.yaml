  For the Ireland players, a grim post-match review awaits on Sunday, but Farrell may already be mulling over his selection for Friday's match against Argentina, who have beaten New Zealand and world champions South Africa this year. Before this campaign, Fiji's visit to Dublin on 23 November appeared the most likely arena for Farrell to experiment and delve deeper into his squad, but the Englishman may feel as though wholesale changes are needed for Argentina. Farrell went for a tried-and-tested team against the All Blacks, with 10 of his line-up having started the World Cup quarter-final. The craft and game management of Sexton, the only player missing from a familiar backline, was sorely missed. Jack Crowley, who has started in the 10 jersey in every game since Sexton's retirement, was unable to orchestrate the Irish attack. Crowley was withdrawn after 58 minutes. Ciaran Frawley, who starred in the South Africa summer series with his Durban drop-goal double, did not fare much better. Sam Prendergast, the third fly-half in the squad, is viewed by some as Ireland's long-term solution at 10. He is uncapped but surely can't be too far away from his debut. But Farrell's selection issues extend beyond fly-half. He may feel the need to reintroduce Ryan Baird and Craig Casey, who were unlucky to miss out on the matchday squad, while Calvin Nash - who ably deputised for the injured Mack Hansen in the Six Nations - will be itching for another chance. "There were a lot of question marks with some of the bench picks," observed 2009 Grand Slam winner Bowe. "The likes of Cian Healy, who has 130 caps, Tom O'Toole, Iain Henderson, Peter O'Mahony, Conor Murray. Is it time to give an opportunity to the young guys to try and take this team on to the next World Cup?" This was Ireland's third defeat in five games, after losses away to England and South Africa. But it was also their most puzzling and ineffective performance. That is what will concern Farrell the most. And that is why he may feel the need for a shake-up before Argentina come to town.
