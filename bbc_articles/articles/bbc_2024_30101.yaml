title: 'Ireland 13-23 New Zealand: ''Error-strewn display may force Andy Farrell into
  shake-up'' - BBC Sport'
date: '2024-11-09'
section: Irish Rugby
url: http://www.bbc.co.uk/sport/rugby-union/articles/cy0l8zwyppro
content: |-
  Ireland's error-filled performance in the 23-13 defeat by New Zealand leaves head coach Andy Farrell with much to ponder.

  Ireland ended the game with 13 penalties conceded, 30 missed tackles and 21 handling errors

  It is a feeling Ireland have not felt for nearly four years. For the first time since France left Dublin victorious in the 2021 Six Nations, Ireland's players greeted full-time at Aviva Stadium with bowed heads and hands on hips as New Zealand celebrated a 23-13 win. Andy Farrell admitted losing at home was a "funny old feeling". He can only hope it is an aberration and not a portent for a grim autumn campaign before his secondment with the British and Irish Lions. That it was New Zealand who ended Ireland's 19-game unbeaten run at home will only deepen Irish dejection. In that France game, played in an empty stadium during the Covid pandemic, Ireland were at least spared the ignominy of defeat in front of their own fans. It was a different story here, however, as the home supporters headed for the exits even before Damian McKenzie booted the ball into the crowd to seal the All Blacks' first win on Irish soil since 2016.

  Ireland and New Zealand games usually live up to - and in some cases surpass - the hype. This one did not come close - even though the stage had been set perfectly.. While they refused to admit it, Ireland were out for revenge after last year's World Cup quarter-final defeat. New Zealand, on the other hand, had the pain of 2022's home series defeat to banish on their first visit to Dublin in three years. And an already healthy rivalry was fuelled by Johnny Sexton and Rieko Ioane's spat in the immediate aftermath of last year's World Cup game, which the former Ireland fly-half felt compelled to include in his autobiography. To mark the sense of occasion, there was even a fancy pre-game lightshow and a hair-raising Irish roar when the home side advanced to meet a haka led by Ioane. Then the game happened - and it did not play out with the ferocity and enterprising rugby with which this fixture has become synonymous in recent years. A lot of that was down to a disjointed, mistake-laden Irish performance, which ended with 13 penalties conceded, 30 missed tackles and 21 handling errors. They scored 10 of their 13 points while Jordie Barrett was sin-binned for a high hit on Garry Ringrose, and whereas the World Cup game ended with Ireland pushing for a try, here their challenge was swept away in the Dublin rain. "New Zealand just didn't let them play," former Ireland wing Tommy Bowe said on BBC Radio 5 Live. "They looked sloppy with ball in hand, they didn't go through the kind of phases we're used to seeing and we didn't really see any dangermen out there. "Andy Goodman came in as the attack coach to replace Mike Catt, but he'll be scratching his head at the minute because it just didn't seem to have the same fluidity we're used to seeing from this team in green."

