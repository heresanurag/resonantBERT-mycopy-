id: bbc_2018_8327
title: Lake District village ruins revealed by water shortage - BBC News
date: '2018-07-18'
section: General
url: http://www.bbc.co.uk/news/uk-england-44866693
content: |-
  The hot weather and low reservoir levels have uncovered the ruins of a lost village in Cumbria.

  The water levels are so low in Haweswater Reservoir that the ruins of a 1930s village are visible.

  This video also includes footage of Thirlmere.
