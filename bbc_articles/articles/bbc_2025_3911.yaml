title: 'Newspaper headlines: ''Geordie joy'' and ''Labour''s war of words'' - BBC
  News'
date: '2025-03-16'
section: The Papers
url: http://www.bbc.co.uk/news/articles/c15qdpz3djyo
content: |-
  Monday's papers have images of Newcastle United fans and players celebrating their League Cup victory.

  Joelinton and Bruno beam as Newcastle celebrate their historic League Cup triumph

  As the government prepares to unveil changes to the welfare system this week, several of the front pages focus on the continued opposition to the plans by some of their own MPs. The Guardian, external says there is "growing fury" adding that Cabinet ministers, who have been among those to raise doubts about the scale of the cuts, have expressed concerns about the way No 10 has handled the messaging so far. According to the i newspaper, external it is highly likely more Labour MPs will "make their opposition known". In the Times, external, it says Downing Street is about to start a "charm offensive" by inviting backbenchers to meet the Sir Keir Starmer, as well as other senior figures, to discuss the policy. The Daily Mail, external calls on the prime minister and Pensions Secretary Liz Kendall to "stand firm against the naysayers" - commenting that a "backlash" to the reforms was "inevitable". Similar ground is covered in the Daily Telegraph, external which says that welfare reform was never going to be "easy" - but that ministers are "already in retreat at the first sound of gunfire from within the party".

  In other news, the Daily Express, external reports on a new treatment for cystic fibrosis, which it claims represents a "major boost" for thousands of people with the condition. Health Secretary Wes Streeting says doctors are "over diagnosing" mental health conditions, according to Metro, external. Danny Jones's wife has moved out of their family home after his kiss with I'm A Celeb co-star Maura Higgins, the Sun, external reports. There are jubilant photos of Newcastle United fans and players on many front pages - including the Daily Mirror, external which looks back at the Toon's 2-1 victory of Liverpool at Wembley. Finally, the Daily Star, external says Britain is set to be the hottest spot in Europe as a "craic-ing" 800 mile-wide heat dome brings four days of sun from St Patrick's Day on Monday.

