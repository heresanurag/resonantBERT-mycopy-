title: 'German stabbing: Man surrenders and confesses to Solingen attack - BBC News'
date: '2024-08-24'
section: Europe
url: http://www.bbc.co.uk/news/articles/crlr2z23ykno
content: |-
  The man - reportedly wearing bloodstained clothes - turned himself in to Solingen police.

  German authorities have identified the man who confessed to a mass knife attack as a suspected member of the Islamic State group (IS). Prosecutors named the man as Issa Al H, omitting his surname because of Germany's privacy laws. The 26-year-old had given himself up and admitted to the stabbings, police said. Three people were killed and another eight injured during Friday's attack in the city of Solingen, during a festival to celebrate its 650-year history. On Saturday, IS claimed that it was behind the attack.

