title: 'Captain Tom Moore charity: Neighbours disappointed by report - BBC News'
date: '2024-11-22'
section: Beds, Herts & Bucks
url: http://www.bbc.co.uk/news/articles/c704y326g4ro
content: |-
  Neighbours in the Bedfordshire village react to the long-awaited Charity Commission report.

  'Capt Tom family were greedy and should be ashamed'

  There was no answer at the home when media rung the bell at the gates on Thursday

  The extraordinary fundraising efforts of Captain Sir Tom Moore inspired pride among his neighbours during the pandemic. Reporters, politicians and other dignitaries descended on the Bedfordshire village of Marston Moretaine. Does the community still feel that pride, despite a damning report published yesterday that concluded the family benefited personally from his name in the years that followed?

  Marilyn Wright said Capt Sir Tom Moore worked hard to raise £39m for NHS Charities Together

  Marilyn Wright's garden backs on to the house in Marston Moretaine, where the veteran lived with his daughter, son-in-law and two grandchildren. The 74-year-old said she bought his autobiography, Tomorrow Will be a Good Day, as she thought the money would go to charity. "I think it's terrible. The family should be ashamed of what they've done," she said. "If they kept the money from the book it was wrong, definitely wrong."

  The home is on the market for £2.25m. "I think they're moving away because of what's happened," added Ms Wright. "People in the village love Capt Tom. They've disgraced him."

  Chelsea Moncur has lived in Marston Moretaine for about six years

  "I don't think the money should have gone to the family. I would have expected the money to go to charity," said Chelsea Moncur, 31, who has lived in the village for about six years. "He's still a hero, but you expect the same from his family." She said, if in their position, she would "rather give it to charity."

  Nigel Costin says Capt Sir Tom earnt the respect he is due and he still admires him

  Nigel Costin, 77, from nearby Wootton Green, also said his view of Capt Sir Tom had not been tarnished, unlike the family's reputation. "They were greedy," he said. "They weren't a poor family to start with. They benefited from their father's diligence and hard work. "He raised a fortune and they should have contributed from the sale of the book. "They were entitled to keep some of it but they should have put a percentage into the charity, which he was there for. "It's like trying to take a medal off a Victoria Cross person. You can't do that."

  Joanne Ollier feels the whole inquiry has been a "shame"

  Joanne Ollier said Capt Sir Tom gave her a free copy of his book. The 41-year-old described how the family was always interested in the community and donated items to the care home where she worked. If the family "misrepresented" where the money from the book was going then that was wrong, she said. A press release, various marketing materials and the prologue of Capt Sir Tom’s memoir, all stated that the books would be used to support or raise money for the foundation. The family was not as active in the village as it once was, said Ms Ollier, and she admitted that some people felt "disappointed" with the family.

  Ann Nevison said the village had wanted to support the family

  "I think it's all very disappointing," said Ann Nevison, 69, who has lived in Marston Moretaine since 1995. She says that as Colin Ingram-Moore is an accountant and his wife a professional management consultant, they "should have understood the requirements". "I just think it's brought charities into disrepute, it has a wider impact. I think people will be now more suspicious [of charities]. "The village wanted very much to support Hannah and her husband and the family and I think now people probably feel conflicted."

  Small business owner Sam Barnes, 34, also told PA Media that the family "got greedy". Neighbour James Ellis, however, said he saw no issue if it was Capt Sir Tom's wish for the family to keep the profits, and that people were "getting a bit gripey". "It's been left to them, it's his will isn't it? Their inheritance in a way. "They've already done enough." There was no answer at the Ingram-Moore home on Thursday, with an intercom at the gate ringing through to a voicemail service.

