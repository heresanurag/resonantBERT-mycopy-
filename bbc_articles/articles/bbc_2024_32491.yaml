title: Worshippers flee arson attack at Melbourne synagogue - BBC News
date: '2024-12-06'
section: Australia
url: http://www.bbc.co.uk/news/articles/c5ydr228jyko
content: |-
  Prime Minister Anthony Albanese has called the fire an antisemitic "act of hate".

  This video can not be played To play this video you need to enable JavaScript in your browser.

  Worshippers were forced to flee an Australian synagogue after it was set on fire in what the prime minister condemned as an "act of hate". Firefighters were called to Melbourne's Adass Israel synagogue just after 04:00 local time on Friday (17:00 GMT Thursday) and arrived to find the building fully ablaze. Community leaders told local media that "a few people" were inside at the time for morning prayers, and they had reported seeing firebombs thrown. One person was injured and the fire caused extensive damage. Police say they believe the fire was deliberately lit but are keeping an "open mind" on a motive.

  In a statement, Prime Minister Anthony Albanese said the incident in Ripponlea, in the city's south-east, was "clearly aimed at creating fear in the community". "This violence and intimidation and destruction at a place of worship is an outrage," he wrote. "I have zero tolerance for antisemitism." He added that he had been briefed by the Australian Federal Police, who would provide support to authorities in the state of Victoria. "The people involved must be caught and face the full force of the law."

  Items were recovered from inside the damaged building following the attack

  Victoria Police said the exact cause of the fire had not yet been determined and an arson chemist would visit the site. However Det Insp Chris Murray said a witness had told them two people in masks appeared to have spread accelerant inside the building. "We believe it was deliberate. We believe it has been targeted," he added. "What we don't know is why." He appealed for anyone who may have witnessed the incident, or who may have CCTV or dashcam footage from the local area, to contact police. Synagogue board member Benjamin Klein told The Age newspaper that people inside "heard banging on the door and the window, and some liquids came through which were lit". "The whole thing took off pretty quickly," he said. A man who was inside at the time, Yumi Friedman, added that a window had been smashed, sending "glass flying". Mr Friedman told reporters his hand was burned on a door knob when he tried to return to the synagogue to fight the blaze. Det Insp Murray - who was confronted by an angry worshipper while updating the press - said police would be committing significant resources to the investigation and increasing patrols around the area. "We're going to do our best to make sure that they can return, as they should, to their local synagogues, doing what is absolutely Australian - that is to be able to worship without fear." Jewish community leaders have said they believe the attack is an escalation of a recent documented increase in antisemitism in Australia. "None of the Jewish community is surprised. We've known this has been coming," Executive Council of Australian Jewry president Daniel Aghion said.
