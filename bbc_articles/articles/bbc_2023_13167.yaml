title: Andrew Malkinson welcomes jail living costs reform - BBC News
date: '2023-08-16'
section: General
url: http://www.bbc.co.uk/news/uk-66420732
content: |-
  A man wrongly convicted of rape welcomes the scrapping of a rule which deducted living costs from compensation paid to wrongly imprisoned people.

  A controversial rule which deducted living costs from compensation paid to wrongly imprisoned people has been scrapped.

  The government announced the change on Sunday after the case of Andrew Malkinson, who spent 17 years in jail for a rape he did not commit, prompted calls for it to be overhauled.
