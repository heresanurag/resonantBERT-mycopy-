  Henrietta and Eliza Huszti were last seen near the River Dee in Aberdeen on 7 January.

  Second body found in search for missing sisters

  Henrietta, left, and Eliza Huszti went missing on 7 January

  The body of a second woman has been found near where two missing sisters were last seen in Aberdeen. Henrietta and Eliza Huszti - both 32 and from a set of triplets - were last seen near the River Dee on 7 January. Officers found the second body in an area of the river near to the Victoria Bridge at about 21:05 on Friday. The first body had been found near Queen Elizabeth Bridge at about 07:55. Police Scotland said the Huszti family had been informed. Inquiries are ongoing but there are no apparent suspicious circumstances.

  Supt David Howieson said: "Our thoughts remain with the Huszti family and we are keeping them fully updated following these recoveries. "We know how much of an impact this has had in Aberdeen and much further afield and I would like to thank everyone who has assisted with our investigation." The disappearance of the two sisters - originally from Hungary - sparked a major search operation.

  The second body was found in the river near Victoria Bridge

  Both women were last seen on Market Street at the Victoria Bridge over the River Dee at about 02:12 on 7 January. Earlier this week, Police Scotland said searches of the river and the harbour area had ended. But the force said inquiries would be ongoing and coastal areas north and south of the city would continue to be searched. Detectives previously revealed the sisters visited the Victoria Bridge the day before they disappeared. They also texted their landlady from the bridge area in the early hours of 7 January to say they would not return to their flat. The Victoria Bridge and Queen Elizabeth Bridge are about half a mile apart on the River Dee.

  Floral tributes have been laid at the side of the river

  Officers have been treating the search as a missing persons inquiry and not a criminal investigation. The sisters, who moved to Scotland 10 years ago, had not told relatives they planned to imminently move out of their rented Aberdeen flat.

  A police tent was set up at Aberdeen Boat Club near the spot where the first body was seen on Friday

  They had been saving up to buy a property but their brother Jozsef told BBC News last month it was "strange" the family did not know they had decided to end their tenancy. He said: "They wrote a message to their landlady that they wanted to immediately end their tenancy agreement. We didn't have any information about that. "So that's the strange thing, that the girls didn't tell us anything about that. "They never mentioned any such plan."

  The disappearance of the sisters has had a significant impact on people in Aberdeen and beyond
