title: 'Kate, Princess of Wales: I am having cancer treatment - BBC News'
date: '2024-05-11'
section: UK
url: http://www.bbc.co.uk/news/uk-68641441
content: |-
  Kate releases video message saying she is having preventative chemotherapy after cancer was found in tests.

  This video can not be played To play this video you need to enable JavaScript in your browser. Watch: The full video message from the Princess of Wales

  The Princess of Wales says she is in the early stages of treatment after a cancer diagnosis. In a video statement, Catherine says it was a "huge shock" after an "incredibly tough couple of months". But she sent a positive message, saying: "I am well and getting stronger every day." Details of the cancer have not been disclosed, but Kensington Palace says it is confident the princess will make a full recovery. The video statement from Catherine explains that when she had abdominal surgery in January, it was not known that there was any cancer. "However tests after the operation found cancer had been present. My medical team therefore advised that I should undergo a course of preventative chemotherapy and I am now in the early stages of that treatment," said the princess. The chemotherapy treatment began in late February. The palace says it will not be sharing any further private medical information, including the type of cancer.

  The princess, 42, said she was thinking of all those who have been affected by cancer, adding: "For everyone facing this disease, in whatever form, please do not lose faith or hope. You are not alone." Catherine said recovery from her surgery in January, for a condition which has not been revealed, had taken time and the priority was now reassuring her family. "William and I have been doing everything we can to process and manage this privately for the sake of our young family." The princess added: "It has taken us time to explain everything to George, Charlotte and Louis in a way that is appropriate for them, and to reassure them that I am going to be ok." She said the family now needs "some time, space and privacy". The King and Queen had been informed of the news about the princess's health prior to Friday's announcement - and King Charles himself has also been undergoing treatment for cancer. King Charles and Catherine were briefly treated at the London Clinic private hospital at the same time - Catherine had her abdominal surgery there and the King was admitted for a "corrective procedure" for an enlarged prostate. A Buckingham Palace spokesperson said the King was "so proud of Catherine for her courage in speaking as she did". After their time in hospital together, he has "remained in the closest contact with his beloved daughter-in-law throughout the past weeks". Prince Harry and Meghan sent a message saying: "We wish health and healing for Kate and the family, and hope they are able to do so privately and in peace." Catherine and Prince William are now not expected to appear with the Royal Family on Easter Sunday, and there won't be any early return to official duties for the princess. Kensington Palace also said Prince William's sudden absence from a memorial service on 27 February was because of the discovery of Catherine's cancer diagnosis.

  The Princess of Wales is pictured in a video message where she announced she is undergoing cancer treatment

  The couple have faced intense public speculation and a social media frenzy about her health, since her operation in January. She has not attended any official events since Christmas. In her video statement, she spoke about the support from her family: "Having William by my side is a great source of comfort and reassurance too. "As is the love, support and kindness that has been shown by so many of you. It means so much to us both." Kensington Palace said the video of the princess was filmed on Wednesday by BBC Studios, the production arm of the BBC. In a statement, BBC News said: "Along with other media, BBC News was briefed by Kensington Palace on the announcement this afternoon." There have been calls for privacy from the palace after weeks of speculation and conspiracy theories about the royal couple. This had intensified after the withdrawal by photo agencies of a photograph of the princess for Mother's Day, on 10 March, because of concerns over digital alterations, for which the princess subsequently apologised. There were also social media theories over video footage showing Prince William and Catherine shopping in Windsor earlier this week. Prime Minister Rishi Sunak said on Friday Catherine had shown "tremendous bravery" with her statement, wishing her a "speedy recovery". He said: "In recent weeks she has been subjected to intense scrutiny and has been unfairly treated by certain sections of the media around the world and on social media. "When it comes to matters of health, like everyone else, she must be afforded the privacy to focus on her treatment and be with her loving family." Labour leader Sir Keir Starmer said his thoughts were with the Royal Family, adding he was "heartened" by Catherine's "optimistic tone and her message of faith and hope". He said: "Any cancer diagnosis is shocking. But I can only imagine the added stress of receiving that news amid the lurid speculation we've seen in recent weeks." William and Catherine are "entitled to privacy and, like any parents, will have waited to choose the right moment to tell their children". Meanwhile, US President Joe Biden said on X, formerly Twitter, that he was joining "millions around the world in praying" for Catherine's "full recovery". Professor Pat Price, an oncologist and founder of the Catch Up With Cancer campaign, praised the princess for speaking out "so openly and frankly". "As was the case with the King's diagnosis, her doing so will no doubt give many more people that vital prompt to get themselves checked and give others affected by cancer more confidence to speak about their own experience. "This announcement is a stark and shocking reminder that cancer is no respecter of age or social status."
