title: Russia using chemical choking agents in Ukraine, US says - BBC News
date: '2024-05-02'
section: Europe
url: http://www.bbc.co.uk/news/world-europe-68941220
content: |-
  The state department says Moscow has used a World War One-era weapon to "dislodge" Ukrainian troops.

  The US has accused Russia of deploying chemical weapons as a "method of warfare" in Ukraine, in violation of international laws banning their use. State department officials said Russia used the choking agent chloropicrin to win "battlefield gains" over Ukraine. The allegations, which US officials said were not an "isolated" incident, would contravene the Chemical Weapons Convention (CWC), which Russia signed. The Kremlin rejected the accusations, calling them "baseless". Spokesman Dmitry Peskov told reporters in Moscow that Russia stood by its obligations under the CWC, which prohibits states from developing or acquiring new weapons. Some 193 states have ratified the convention. The Organisation for the Prohibition of Chemical Weapons (OPCW), a global watchdog that oversees implementation of the CWC, says a chemical weapon is a substance used to cause intentional death or harm through its toxic properties. Chloropicrin - which the US says Russia has used to "dislodge Ukrainian forces from fortified positions" - is an oily substance which was widely used during World War One. It causes irritation of the lungs, eyes and skin and can cause vomiting, nausea and diarrhoea, according to the US Centre for Disease Control (CDC). The chemical's use in war is expressly banned under the CWC, and is listed as a choking agent by the OPCW. The state department also said Moscow had regularly used "riot control agents," or tear gas, during the war. President Joe Biden has previously warned Russia against deploying chemical weapons in Ukraine. In March 2022, weeks after Moscow launched its invasion, Mr Biden vowed that President Vladimir Putin would pay a "severe price" if he did authorise the use of chemical weapons. "We would respond if he uses it. The nature of the response would depend on the nature of the use," Mr Biden said. But there have been consistent reports that Moscow has ignored that warning. US Assistant Secretary for Arms Control Mallory Stewart has previously said Russia was using riot control agents in the conflict. And Ukraine says its troops have faced mounting chemical attacks in recent months. The Reuters news agency reported earlier this year that Russian forces had used grenades loaded with CS and CN tear gases. The report added that at least 500 Ukrainian soldiers have been treated for exposure to toxic gases, and that one had died after suffocating on tear gas. Three Russian bodies linked to the country's biological and chemical weapons programme were sanctioned by the state department for their links to the production of chemical agents. Other firms that contributed to the government entities were also sanctioned.

  In 2017, the OPCW said Russia had destroyed the last of its Cold War-era stockpile of the weapons, as required under the CWC. But Moscow has since been accused of making incomplete declarations of its stockpile, according to the UK's House of Commons library. Since 2017, Russia has been accused of at least two chemical attacks - the Salisbury attack on a former Soviet intelligence officer and the 2020 poisoning of the late Russian opposition leader Alexei Navalny. The allegations come as part of a broader tranche of US sanctions which targeted 30 individuals, including three people officials say were involved in Navalny's death. The men are all officials at the Siberian prison colony where the opposition activist died earlier this year. Russia denies involvement in the opposition leader's death. Navalny's widow has accused President Putin of killing him. Meanwhile, Russian forces in eastern Ukraine have continued their steady advance ahead of Victory Day celebrations on 9 May - the holiday commemorating Soviet victory in World War Two. Much of the fighting has been taking place around Chasiv Yar, a Kyiv-controlled stronghold which Russia has been trying to reach after seizing the city of Avdiivka. It is thought Moscow wants to seize the town ahead of next week's celebrations. It comes as President Volodymyr Zelensky dismissed the head of Ukraine's Security Service's (SBU) cyber-security department, Illya Vityuk, amid allegations that he tried to use his position to punish a Ukrainian journalist who had reported on allegations of corruption against him. The reporter was subsequently summoned to a military recruitment centre, prompting military chief Col Gen Oleksandr Syrskyi to launch an investigation. Elsewhere, Human Rights Watch - a non-governmental organisation - has called for a war crimes investigation after it unearthed evidence that Russian forces executed over a dozen surrendering Ukrainian troops. The events allegedly occurred between December 2023 and February 2024, the body said in a statement.
