title: Jim Beam warehouse fire destroys 45,000 barrels of bourbon - BBC News
date: '2019-07-04'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-48862621
content: |-
  A fire engulfs two warehouses in Kentucky containing 45,000 barrels of bourbon.

  A fire in Kentucky that has destroyed two Jim Beam warehouses containing 45,000 barrels of bourbon may have been caused by a lightning strike.
