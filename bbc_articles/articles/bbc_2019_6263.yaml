title: 'Bafta TV Awards 2019: Killing Eve, Ant and Dec, Benedict Cumberbatch win -
  BBC News'
date: '2019-05-12'
section: Entertainment & Arts
url: http://www.bbc.co.uk/news/entertainment-arts-48050597
content: |-
  Killing Eve's Jodie Comer is named best actress and Benedict Cumberbatch wins best actor.

  Jodie Comer and Benedict Cumberbatch won the top two acting awards

  BBC thriller Killing Eve was the big winner at the Bafta TV Awards, scooping three trophies including best actress for Jodie Comer and best drama series.

  I'm A Celebrity... Get Me Out Of Here and Britain's Got Talent also picked up prizes, despite Ant McPartlin taking time out from both series last year.

  BGT won best entertainment show and I'm A Celebrity won the reality prize.

  Benedict Cumberbatch won best actor for his drama Patrick Melrose, which was also named best mini-series.

  The Sherlock star, who received his first of seven previous Bafta nominations in 2005 but hasn't won until now, told the audience: "Oh gosh, I think I'm going to fall over, I'm very used to being a bridesmaid not the bride."

  The ceremony took place at the Royal Festival Hall in London on Sunday.

  In Killing Eve, Comer played offbeat assassin Villanelle, who was pursued by intelligence agent Eve, played by Sandra Oh. Both were nominated for best actress.

  This video can not be played To play this video you need to enable JavaScript in your browser. Stars of the small screen chatted to BBC's Lizo Mzimba ahead of the ceremony

  Accepting the award, a tearful Comer - who dedicated her award to her late grandmother - said: "Thank you so much. Sorry, I'm the only one who's turned on the waterworks."

