content: |-
  A series of images from the era have emerged more than a decade after they were almost thrown away.

  Nostalgic 1950s photos that were almost lost for ever

  This 1958 photo captured seagulls feeding from fish boxes at Aberdeen harbour

  An amateur photographer’s images from the 1950s have been generating fresh interest more than a decade after they were almost lost for ever. Ray Stokes took his Voigtlander camera with him when he travelled on his motorbike around the UK and to places including Italy, Germany and Switzerland. After his death at the age of 88, his son Simon rescued the collection of old slides which his mum Jill was thinking about throwing away. When he started the lengthy process of scanning all the images he discovered more than 2,000 pictures from his father's life and travels.

  Ray Stokes motorbiked around Europe, taking photographs as he went, including here in Italy

  There were pictures of people and landmarks around Scotland and the UK, along with images taken on the continent. Ray had served in the RAF and was shot down over Germany during World War Two. He was taken prisoner after parachuting to safety. One of the sites he later visited on his motorbike was the area which had been the target of that RAF mission.

  Travel in the Scottish hillside was among the images captured by Ray Stokes

  The Devil's Elbow is in the Blairgowrie area

  The Forth Bridge was also photographed as Mr Stokes travelled around Scotland

  Simon identified Inverness Castle in one image because his dad wrote a lot of information about his images

  Mr Stokes took a photo of what he described as a "successful fishing trip"

  Morris dancers were photographed in Chipping Norton in 1962

  Ploughing in Germany in 1957 was among the images from Europe

  Aberdeen's Union Street seen from the Castlegate area more than 60 years ago

  Ray, who lived in the Blaby and Whetstone areas of Leicestershire, died in 2012. Simon uploaded some of his father's images to a photo sharing site in 2017. He also made a print of one image - showing seagulls at Aberdeen harbour - which hangs on his wall at home. Simon, 58, from Enderby in Leicestershire, posted the picture on social media last weekend and was surprised by the reaction.

  Simon Stokes - pictured with dad Ray and mum Jill - says he has inherited his love of photography from his father

  "I thought it was a good image which possibly deserved to be seen, with an interesting back story, and it might generate some interest," he told BBC Scotland News. "However, I wasn't quite expecting the response it has generated - I'm totally blown away." The one image has had more than 4,000 likes and scores of complimentary comments, with one person describing it as "otherworldly, like a watercolour painting emerging out from a time labyrinth". Simon said his dad would be "scratching his head" at the interest the pictures had generated all these years later. He said he had inherited a love of photography from his dad – and that it was “scary” to think that all those images could have been lost.
