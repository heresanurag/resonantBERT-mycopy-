  • None Who's up, who's down - and why Nevertheless Mr Msimang, has not given up on the ANC, which his veteran comrades convinced him to rejoin. “I don't think all is lost. There is time for the ANC to regroup,” says Mr Msimang. “But the renewal of the ANC would take the form of making sure that elements who are really corrupt are removed from the organization. We’ve really failed to act decisively to do that - we have not heeded the pleas of the people.” Nevertheless, Mr Msimang is worried about the absence of a strong alternative to the party: “There is this fragmentation, which is going to leave the country very unstable if this persists.”

  Mavuso Msimang has not completely given up on his former party

  At the elections results centre near Johannesburg the numbers tick up on a dashboard tracking the vote-count. Its giant screen towers over a hall crowded with journalists, party officials and analysts such as Susan Booysen. She found a quiet place to speak with me. The topic is coalition politics, which South Africa has not had at the national level for two decades. Though the ANC is still by far the largest party, it will need to share power in order to continue governing. The political landscape is tricky, and fraught with consequences because the major parties have different visions for the country. The pro-business Democratic Alliance is not an easy fit because of its free-market agenda and its reputation as a party for the white community and other minority groups. The next two biggest parties are on the radical left. Mr Zuma's new uMkhonto weSizwe (MK) - a name it adopted from the ANC's military wing - and the Economic Freedom Fighters (EFF). They talk about seizing white-owned land and nationalizing mines and banks. The ANC regards the EFF as “too erratic in its orientation, too in your face, and too unreasonable in its policy demands,” says Ms Booysen. And there’s too much “bad blood” between the ANC and MK, which has said it won’t partner with the ANC as long as Mr Ramaphosa remains its leader. Unseating Mr Ramaphosa is “the MK party's main objective at this stage, and the ANC is collateral damage in that process as far as they are concerned,” she says. Mr Zuma’s comeback, despite presiding over a decade of rampant corruption, has thrown a wildcard into the mix. He swept into the convention centre on Saturday night to make allegations of election rigging. The outcome of what’s expected to be turbulent coalition talks could decide between two very different directions for South Africa.

  On the campus of Wits University, a troupe of student actors is performing a pop-up parody of the election. People turned out in large numbers to vote here - many of them, like medical student Nobuhle Khumalo, for the first time. She’s excited about change but doesn’t know what it means: “We’re just going to see what it looks like as it unfolds.” We’re chatting on the grounds in front of the library with two of her friends, Mr Setsiba and music student Silka Graetz. They hope a coalition government will bring more accountability and transparency, but are wary it might result in greater political instability and dysfunction. “I think the increase of votes with other parties definitely creates a healthy competition,” says Ms Graetz. “And I think with healthy competition comes better service, just an improvement in so many different fields.” Young people, many of whom did not experience apartheid, were more willing than their parents to abandon the ANC, powered by concerns about their future. Some 45% of South Africa’s youth are unemployed, the highest recorded rate in the world. “When it’s campaign time you’re not speaking to issues that concern young people,” says Mr Setsiba, criticizing government budget cuts to education in recent years. “Pour funds into universities, stimulate entrepreneurship, and make it a thriving country for new businesses!” Ms Graetz warns that it will be important to restore investor confidence in the country in order to improve the economy. Both she and Mr Setsiba are preparing to graduate, so launching into the job market is at the top of their minds. Ms Graetz is acutely aware that her future will be formed in the next four or five years, the time period before the next election. “The one question I have is: 'How long we have to wait to see something [change]?'” she says. “I think there's been a big attitude shift. How much longer until that's put into action?” It took 30 years for the ANC to be held to account for its failures. South Africa’s younger generation is not prepared to wait that long.
