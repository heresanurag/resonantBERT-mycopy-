  The ANC has dominated South Africa for the past 30 years but now it has to look to the future.

  Can South Africa's ANC reinvent itself after dismal election result?

  South Africa's President Cyril Ramaphosa is under pressure after the disastrous election results

  Mavuso Msimang read the writing on the wall last year and now the people of South Africa have confirmed what he saw. The veteran of the African National Congress (ANC) resigned from the party in December after 66 years, citing endemic corruption, and warning that the ANC was on the “verge of losing power”. The party has lost the position of unrivalled political power it’s held since the end of apartheid 30 years ago, with a sharp drop in support. As South Africans digest a pivotal moment in their history, they are looking back at what this means for the former liberation movement, and forward to what it means for the future of the country. “I think all of us can agree it's about time we have change,” says Lerato Setsiba, a computer science student at Johannesburg’s University of Witwatersrand. “But I think a majority of the people at the moment, we’re quite scared... we don't know what's going to happen.”

  Mr Msimang’s house is furnished with tributes to the ANC’s iconic former leader – a life-size painting of Nelson Mandela, a coffee-table book bearing his name. Mr Msimang served in the ANC’s armed wing uMkhonto weSizwe in the 1960s and was appointed to several government positions after the 1994 elections that brought the movement to power. He’s now the deputy president of the ANC veterans league, which has strongly advocated for action against corruption in the party’s ranks. “There was always a tendency to not deal with issues of accountability,” he says, but the economic mismanagement that resulted “affected people very directly”. “When I saw those long queues [of voters] which are almost similar to what happened in 1994, I didn't think that they were queuing to celebrate the ANC. It became very clear to me that something bad is coming.” “I’m very disappointed,” he told me. “I don’t know how the ANC’s legacy will be retrieved. I hope this is not forever.” Many older voters who remember the horrors of apartheid remained loyal to that “liberation legacy” - the ANC’s leading role in overthrowing white-minority rule. They also remember its progressive social welfare policies that lifted millions of black families into the middle-class and expanded basic services such as water, electricity and welfare to millions more. But the party began to attract people interested in power and political patronage. Its downfall really began under former President Jacob Zuma, who resigned in disgrace amid allegations he’d allowed business associates to infiltrate government ministries. He denies the allegations. Mr Zuma was replaced by Cyril Ramaphosa, who has been accused of not taking strong enough action to root out corruption from the party.
