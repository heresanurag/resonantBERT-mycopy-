title: Amazon lorry crushes bollards in Ealing - BBC News
date: '2024-10-11'
section: General
url: http://www.bbc.co.uk/news/videos/cly3p410nx3o
content: |-
  Watch the moment an Amazon lorry was filmed mounting the pavement in Ealing, crushing bollards.

  An Amazon lorry has been filmed partially mounting a pavement in west London, crushing bollards and pulling up paving slabs on its way.

  The video, which was filmed by a member of the public, shows the vehicle making a left turn on to Bollo Lane next to the Acton Gardens development in Ealing.

  Acton Gardens resident Ben Mason said he initially heard a huge pounding sound. "I saw that it had taken up the bollards, then it turned on to Bollo Lane and did the same.

  He added "The scariest thing is that that road is so busy with dogs and pushchairs; God forbid if there had been anyone there - shocking to see."

  An Ealing Council spokesperson said the affected areas had been made safe as a temporary measure and that it would be contacting Amazon to recover all the costs incurred in repairing the damage.

  In a statement, Amazon said: “We’re investigating with our carrier partner and we’ve contacted the local authority to make this right.”

