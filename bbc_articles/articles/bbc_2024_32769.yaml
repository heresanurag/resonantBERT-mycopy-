  Mr Neven told the BBC Willow's performance meant it was the "best quantum processor built to date". But Professor Alan Woodward, a computing expert at Surrey University, says quantum computers will be better at a range of tasks than current "classical" computers, but they will not replace them. He warns against overstating the importance of Willow's achievement in a single test. "One has to be careful not to compare apples and oranges" he told the BBC. Google had chosen a problem to use as a benchmark of performance that was, "tailor-made for a quantum computer" and this didn't demonstrate "a universal speeding up when compared to classical computers". Nonetheless, he said Willow represented significant progress, in particular in what's known as error correction.

  In very simple terms the more useful a quantum computer is, the more qubits it has. However a major problem with the technology is that it is prone to errors - a tendency that has previously increased the more qubits a chip has. But Google researchers say they have reversed this and managed to engineer and program the new chip so the error rate fell across the whole system as the number of qubits increased. It was a major "breakthrough" that cracked a key challenge that the field had pursued "for almost 30 years", Mr Neven believes. He told the BBC it was comparable to "if you had an airplane with just one engine - that will work, but two engines are safer, four engines is yet safer". Errors are a significant obstacle in creating more powerful quantum computers and the development was "encouraging for everyone striving to build a practical quantum computer" Prof Woodward said. But Google itself notes that to develop practically useful quantum computers the error rate will still need to go much lower than that displayed by Willow.

  Google staff work on the cryostat that holds the chip and keeps it very cold

  Willow was made in Google's new, purpose-built manufacturing plant in California. Countries around the world are investing in quantum computing. Its director, Michael Cuthbert, told the BBC he was wary of language that fuelled the "hype cycle" and thought Willow was more a "milestone rather than a breakthrough". Nevertheless, it was "clearly a highly impressive piece of work". Eventually quantum computers would help with a range of tasks including "logistics problems such as cargo freight distribution on aircraft or routing of telecoms signals or stored energy throughout the national grid", he said. And there were already 50 quantum businesses in the UK, attracting £800m in funding and employing 1300 people. On Friday, researchers from Oxford University and Osaka University in Japan published a paper, external showcasing the very low error rate in a trapped-ion qubit. Theirs is a different approach to making a quantum computer that's capable of working at room temperature - whereas Google's chip has to be stored at ultra low temperatures to be effective. Scientific findings from Google's development of Willow have been published in the journal, external Nature
