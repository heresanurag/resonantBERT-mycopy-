content: |-
  Thousands of birds were captured on camera swooping above a nature reserve near Preston.

  Thousands of birds have been captured on camera swooping above a nature reserve near Preston.

  The phenomenon, known as a murmuration, is when huge groups of starlings come together to swoop and swirl across the sky.

  This display was spotted over Brockholes Nature Reserve and is believed to be one of the largest of the year so far.

  Experts believe murmurations offer protection from predators as it is not easy to single out a single starling from a whirling group of thousands.

