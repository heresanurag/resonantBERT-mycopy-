content: |-
  Great Britain come fourth in the Olympic men's team gymnastics competition after a thrilling final where Japan pip China for gold.

  This video can not be played To play this video you need to enable JavaScript in your browser. Japan win gold in men's team final after China's Su Weide falls twice

  Great Britain missed out on a medal in the Olympic men's team gymnastics despite some strong performances in Paris in a thrilling final where Japan pipped China to gold in a dramatic ending. The GB team of Max Whitlock, Jake Jarman, Joe Fraser, Luke Whitehouse and Harry Hepworth - who had qualified in third place - came fourth as China threw away a comfortable lead when Su Weide came off the high bar twice in the final rotation. Hopes had been high for just a second men's team Olympic medal for Great Britain - after a bronze at London 2012 - following excellent displays in Saturday's qualification event. They continued the momentum on Monday but a messy vault landing by Whitehouse proved costly, although the real difference was the marked improvement by the United States on their qualifying round. Great Britain have now come fourth three times in a row in this event. "Right now, it feels quite raw but overall we can be quite proud," Whitlock said. "Looking at every performance we’ve done, we did everything we possibly could. Fourth is still a high position in the world and we can take a lot of positivity from that."

  Max Whitlock is competing in his fourth and final Olympic Games

  The pre-event expectations were of a gold-medal tussle between China and Japan - but not in this fashion. A terrible pommel horse routine for Tokyo 2020 all-around winner Daiki Hashimoto looked to have put paid to Japan's challenge early and China established a comfortable lead. But Hashimoto stepped up to deliver a brilliant high bar routine and capitalise on Su's huge mistakes to give Japan the gold by a narrow margin - just 0.532 separated the top two nations. Great Britain were consistent throughout, with some encouraging performances - particularly an upgraded pommel horse routine for Whitlock - that give hope there may still be medals for them in the individual finals. Whitlock, 31, appearing in his fourth and final Games, had been seeking to add to his six Olympic medals. He will bid to win a third successive pommel horse gold on Saturday and has a chance to become the first gymnast to win medals on the same apparatus at four successive Games. His team-mates also still have opportunities for individual medals, with Jarman reaching the all-around, floor and vault finals. He is joined in Wednesday's all-around final by Fraser, while Hepworth will be in the vault and rings finals, and Whitehouse in the floor final. It is the first time Great Britain's men have booked six places in individual apparatus finals at an Olympics. "We've made history from the number of finals we've made in qualifications and now we can try and move forward, take confidence from today and hopefully finals can go to plan," Whitlock said. Great Britain's women compete on Tuesday in their team final, where American Simone Biles will be seeking to lead her team to gold after dazzling on her Olympic return in qualifying.
