title: 'Knife crime: Trauma of a teenage stabbing survivor - BBC News'
date: '2019-10-10'
section: General
url: http://www.bbc.co.uk/news/uk-49973667
content: |-
  Fifteen-year-old Gadi was attacked on his way home from football practice after wandering into the wrong area.

  Fifteen-year-old Gadi was stabbed on his way home from football practice simply because he wandered into the wrong area.

  More than 20,000 people in England and Wales were injured by knives or sharp instruments last year and survived.

  Many, like Gadi from London, struggle to come to terms with what happened. He tells Clive Myrie his story.
