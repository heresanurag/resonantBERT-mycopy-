content: |-
  Man arrested at Stansted Airport on suspicion of conspiracy to commit arson with intent to endanger life.

  Fourth man arrested over fires at homes linked to PM

  Damage at the private home of Keir Starmer

  A fourth man has been arrested over a series of fires connected to Prime Minister Sir Keir Starmer, the Metropolitan Police has said. The 48-year-old was arrested on Monday at London's Stansted Airport after initially being stopped by officers under schedule 7 of the Terrorism Act, 2000. He was later arrested on suspicion of conspiracy to commit arson with intent to endanger life. The charges relate to three incidents - a vehicle fire in Kentish Town, north London, a fire at the prime minister's private home on the same street and a fire at an address that he previously lived in Islington, north London.

  The man, who has not been named, has been taken to a London police station and remains in custody. Three men have already been charged in connection with the fires, Ukrainians Petro Pochynok, 34, and Roman Lavrynovych, 21, and Ukrainian-born Romanian national Stanislav Carpiuc, 26, who are all due to appear at the Old Bailey on Friday. Mr Lavrynovych, of Sydenham, is charged with three counts of arson with intent to endanger life. Mr Carpiuc, of Romford, and Mr Pochynok, of north London, was charged with conspiracy to commit arson with intent to endanger life. In the early hours of May 12, a fire took place at the home where Sir Keir lived before he became Prime Minister and moved into Downing Street. A car was set alight in the same street four days earlier on May 8. The other fire took place on May 11 at the front door of a house converted into flats in Islington.
