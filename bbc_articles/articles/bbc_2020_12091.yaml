title: 'Covid updates: PM does not want national lockdown ''right now'' - BBC News'
date: '2020-10-12'
section: World
url: http://www.bbc.co.uk/news/live/world-54505193
content: |-
  Boris Johnson says many people think country-wide restrictions are "extreme" and would harm the economy.

  Kuenssberg: Will these restrictions be enough?

  It's time for questions from journalists, and the BBC's Laura Kuenssberg asks several - including about whether financial support is enough for people facing restrictions, and whether the restrictions themselves will be enough to curb the spread of the virus. Prof Whitty says he is "not confident" that tier three proposals for the "very high" alert areas with the highest rates of transmission "would be enough to get on top of" the virus in those areas. That is why there's "a lot of flexibility" for local authorities to add more restrictions on top of the "base" of tier three rules, he says. He adds that it's widely agreed by experts that "the base will not be sufficient" to tackle the worst rates of infection. The PM adds that he believes the R number will come down under the new three-tiered system, "if properly implemented and enforced". He adds that a return to a national lockdown would be "extreme" and would do "a lot of immediate harm" such as to children who would miss out on school. As for those calling for no restrictions at all, Johnson says: "I can't support that approach I'm afraid Laura. We have to do a balanced approach." In a separate question from Kuenssberg, Sunak says his Job Support Scheme, covering two-thirds of wages is "very much in line with our peers" - citing Germany's scheme as an example.
