id: bbc_2019_964
title: 'Sudan protests: People flee gunshots in deadly protest - BBC News'
date: '2019-01-19'
section: General
url: http://www.bbc.co.uk/news/world-africa-46923839
content: |-
  Government forces allegedly fired directly at demonstrators demanding the president's resignation.

  Footage uploaded to social media shows Sudanese protesters running for their lives as gun shots ring out.

  In the fifth week of anti-government protests, government forces have allegedly shot dead a doctor and a 16-year-old.

  The doctor may have been directly targeted.
