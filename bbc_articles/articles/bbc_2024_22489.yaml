  If all is as smooth as silk so far for Slot, the same cannot be said for his fellow Dutchman Erik ten Hag, who survived a summer review after winning the FA Cup against Manchester City. An apparent lack of a credible, available replacement helped the decision-making process for Sir Jim Ratcliffe and the new Old Trafford hierarchy. The reality is Ten Hag is effectively only one bad run, or even one bad result, from coming under severe scrutiny once again. The manner in which Liverpool dismissed United so brutally, coming after their late home win against Fulham and defeat at Brighton, means this will happen with the campaign in its infancy. Mitigating circumstances must be taken into consideration to put Ten Hag's current plight into context. Midfielder Manuel Ugarte, their new signing from Paris St-Germain, was not available to play, while fellow summer acquisition Leny Yoro is a long-term injury casualty and Mason Mount, Luke Shaw and Rasmus Hojlund are also absent. This was still, however, a harrowing afternoon for Ten Hag and his players, especially Casemiro when he was a mercy substitution from his manager at half-time, replaced by 20-year-old rookie Toby Collyer. No such problems for Liverpool as Trent Alexander-Arnold - who had an early goal disallowed for a Salah offside - blew kisses and signalled the 3-0 scoreline to the travelling fans, before walking towards the Stretford End sporting a smile so wide that it looked like it might have to be surgically removed. The job of succeeding a legendary figure like Klopp was never going to be easy, but Slot is making a very good job of it so far.
