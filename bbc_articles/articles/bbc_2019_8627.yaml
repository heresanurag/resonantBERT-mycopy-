  Gerald Corrigan died three weeks after being shot outside his Anglesey home

  A man charged with conspiracy to pervert the course of justice after a 74-year-old was shot with a crossbow has appeared in court.

  Gerald Corrigan was fatally injured outside his home in Holyhead.

  Mr Jones is accused of conspiracy to pervert the course of justice by committing arson to destroy a Land Rover Discovery vehicle.

  He was remanded in custody and is due before Caernarfon Crown Court on 27 August.

  Terence Michael Whall, 38, from Bryngwran, has been charged with murdering Mr Corrigan and is due to stand trial early next year.

  Mr Corrigan died in hospital on 11 May, three weeks after being shot.
