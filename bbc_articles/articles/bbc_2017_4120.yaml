  • None Arsenal conceded three goals in four consecutive away league games for the first time since September 1929.
  • None In the past eight Premier League games, only Sunderland (six) have lost more games than Arsenal (five).
  • None Wilfried Zaha has had a hand in five goals in his past five Premier League games (two goals, three assists).
  • None Zaha now has nine Premier League assists for the season, matching the record held by Wayne Routledge in 2004-05.
  • None Sam Allardyce has won three consecutive home Premier League games for the first time since he was West Ham boss in December 2014.

  Crystal Palace will look to earn the one win Allardyce believes they need to be assured of safety when they host Leicester on Saturday. Arsenal travel to Middlesbrough next Monday in a game with significant implications at both ends of the table.
