title: Somerset trampoline park 'kicks out' boy with Down's syndrome - BBC News
date: '2025-03-22'
section: Somerset
url: http://www.bbc.co.uk/news/articles/cj0q3pgrne3o
content: |-
  The boy's sister said a staff member made "derogatory comments" and the police were called.

  This video can not be played To play this video you need to enable JavaScript in your browser.

  A woman has accused operators of a trampoline park of telling her 12-year-old brother that he had to leave because he has Down's syndrome. Billie Jacobs said a staff member at Flip Out Somerset used derogatory language and her brother was embarrassed in front of other children. "We were followed, stalked and sneered at by multiple members of young, immature staff," she said. The staff told her brother to leave despite having signed a waiver to attend a birthday party at the centre, she said. Flip Out Somerset questioned Ms Jacobs' account and said they "simply wanted to ensure safety to a child".

  Ms Jacobs said she visited the centre near Wellington, Somerset, on 9 February with her son for his fifth birthday party, along with her mother and brother. She said the family checked at the entrance to the centre whether they needed to provide paperwork for safety reasons, but were told signing a waiver would suffice. However, about an hour into the session, Ms Jacobs said she saw staff walking her brother away from the trampoline area. "Obviously, this set off alarms and myself and my mother approached to find out what was going on," Ms Jacobs said. "The reason given for dramatically marching a child off? He has Down's syndrome." "This quite obviously riled us, embarrassed my brother, but also caused a scene for all others to spectate."

  "[My brother] was 12 years old, soon turning 13. He is a typical, self conscious teenager and he takes everything to heart," Ms Jacobs said. "To embarrass him, because he is different, is disgusting. Not only that, but to show him those differences are not good enough to be involved in society – well not on my watch." She added: "It's about education. It's not about a payout."

  The boy "takes everything to heart", his sister said

  Down's syndrome is when someone is born with an extra chromosome. Those with the syndrome will have some level of learning disability, the NHS website says. Ms Jacobs, who wrote about the incident on social media, added: "My brother may be different to others in the general population, but all that extra chromosome does is make him better than everyone else. "If anyone takes anything at all from this, I hope it's this: be more like him. Because if you do try to reach his level, your life will be infinitely better for it." She said police were called and the boy was asked to leave. Avon and Somerset Police confirmed that they attended the incident.

  Flip Out Somerset told the BBC: "It is our belief that the day's events transpired differently to the version in the [post written on social media by Ms Jacobs]." They said the reason for the police attending was due to the 999-call handler escalating due to [concerns while the staff member was making the call]. The spokesman said: "We simply wanted to ensure safety to a child." He said a member of the team had "asked a parent of a young person for proof of medical screening, to ensure this safety". He said this screening is required to ensure the mitigation of risk in the safety waiver the customers signed prior to the session. The screening test checks for a neck joint condition called atlanto-axial instability, and Flip Out Somerset asks customers for it on the guidance of the Down's Syndrome Association and British Gymnastics, the spokesman said.

  "Someone with neck instability undertaking trampolining could have an impact, which for those without neck instability may be consequently minor, but for them could result in paralysation or dislocation of the joint in the neck," the spokesman added. "The likelihood is small, but the consequences are possibly catastrophic for an individual with neck instability." The safety waiver says: "Customers with Down's syndrome, prior to taking part in such activities, will be asked to obtain evidence that a GP or paediatrician has screened them using the screening test developed by the British Gymnastics association for atlanto-axial instability. "Approval for participation that is signed by the GP or paediatrician must be provided before taking part in any trampolining activities."

