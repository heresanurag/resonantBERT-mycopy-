title: Two teens arrested after Oldbury boy, 13, stabbed to death - BBC News
date: '2024-09-01'
section: Birmingham & Black Country
url: http://www.bbc.co.uk/news/articles/cd05rjdlx0no
content: |-
  The pair are arrested on suspicion of murder after the death in Oldbury on Thursday, police say.

  Floral tributes were placed outside the home where the boy was found

  Two teenage boys have been arrested on suspicion of murder after a 13-year-old boy was stabbed to death at his home. The youngster died after he was attacked at Lovett Avenue, Oldbury, at about 16:00 BST on Thursday, West Midlands Police said. The pair were arrested on Sunday and taken into custody for questioning. Dozens of bunches of flowers, candles and teddies were laid outside the home to pay tribute to the teenager, who has not yet been named.

  "The boys have been arrested on suspicion of murder," a force spokesperson said. They added the victim's family were aware of the arrests. "Our thoughts remain with them at this devastating time," they said.

  The boy died at a house on Lovett Avenue, Oldbury on Thursday, police said

  West Midlands Ambulance Service said the boy received treatment from paramedics on Thursday but died at the scene. An online portal was set up to allow people to send in information, pictures or video directly to investigating officers, police said. Bouquets of flowers were left outside the house and one woman collapsed in tears after she left her tribute on the doorstep.

  Candles were lit to pay tribute to the boy

  Local officers and youth workers were due to be in the area over the next few days to address any concerns from residents. Last year, the West Midlands had the highest rate of knife offences in England and Wales. One woman, who had lived on the estate for more than 30 years, said she was "shocked" after finding out the victim was teenager. “It’s just getting worse," she said of knife crime in the region.
