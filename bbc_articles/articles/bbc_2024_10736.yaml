title: 'Kirk Sandall: Arrest after £150k cannabis factory uncovered in Doncaster -
  BBC News'
date: '2024-05-04'
section: General
url: http://www.bbc.co.uk/news/uk-england-south-yorkshire-68956299
content: |-
  A 45-year-old man is detained after the grow was found in Doncaster, police say.

  A host of cannabis plants and a nest of electrical cables used to power lights and fans were found by police when they uncovered a cannabis factory in South Yorkshire.

  Officers from Doncaster East Neighbourhood Policing Team said they raided the unit in Kirk Sandall on Thursday afternoon following intelligence provided by the local community.

  Once inside, police discovered about 150 plants spread across two rooms, with the total value of the grow estimated by the South Yorkshire force to be about £150,000.

  A spokesperson said the plants were subsequently removed and destroyed, while a 45-year-old man had been charged in connection with the find.
