title: 'Hurricane Florence: Where is being hit? - BBC News'
date: '2018-09-14'
section: US & Canada
url: http://www.bbc.co.uk/news/world-us-canada-45511312
content: "Satellite images, maps and graphics showing where the category one storm\
  \ will hit and the impact it is expected to have.\n\nUS officials are warning Hurricane\
  \ Florence could kill \"a lot of people\" with risks of \"catastrophic\" flooding\
  \ as the storm begins to lash the country's East Coast.\n\nFlorence, although now\
  \ downgraded to a category one storm, is slow-moving and could linger for days,\
  \ bringing \"copious amounts of rain\".\n\nFlorence made landfall on Friday, with\
  \ the centre of the storm striking Wrightsville Beach in North Carolina, with gales\
  \ of up to 90mph (150 km/h).\n\nThe National Hurricane Center says that despite\
  \ the gradual lowering in wind strength, the storm remains extremely dangerous because\
  \ of the high volume of rainfall and storm surges predicted.\n\nSome 10 million\
  \ people are now under some form of storm watch.\n\nGeorgia, North and South Carolina,\
  \ Virginia and Maryland have declared a state of emergency as forecasts showed Florence\
  \ dumping historic amounts of rain on the area.\n\nTens of thousands of homes are\
  \ already without power and rains and surging seas have inundated coastal areas.\n\
  \nThe Federal Emergency Management Agency (Fema) said people living near rivers,\
  \ streams and lowland areas in the region were most at risk.\n\n\"Inland flooding\
  \ kills a lot of people, unfortunately, and that's what we're about to see,\" said\
  \ Brock Long, head of Fema.\n\nEvacuation warnings are in place for 1.7 million\
  \ people.\n\nMore than 1,400 flights have been cancelled, according to FlightAware.com,\
  \ with most of the coastal region's airports closed.\n\nThe weather system that\
  \ became Hurricane Florence has been travelling west from Africa toward the US since\
  \ 29 August. Its wind speeds reached hurricane levels in the mid-Atlantic.\n\nThe\
  \ biggest danger to life could be from storm surges, which are still predicted to\
  \ be as high as 13ft (4m) between Cape Fear and Cape Lookout in North Carolina.\n\
  \nMeteorologists have warned some rivers may see their flows \"reversed\".\n\nStorm\
  \ surges are caused when huge volumes of water are pushed by hurricane-force winds.\
  \ When they meet land, the water surges inshore at levels far exceeding normal tides.\n\
  \nFlorence is forecast to dump up to 40in (one metre) of rain in some areas after\
  \ it makes landfall.\n\nBy Friday morning, the North Carolina coastal town of Atlantic\
  \ Beach had already received 30in (76cm) of rain, the US Geological Service said.\n\
  \nThe torrential rainfall could last for significant periods and cause catastrophic\
  \ flooding, including in inland areas such as Alabama, Tennessee, Kentucky and West\
  \ Virginia.\n\nNational Weather Service forecaster Brandon Locklear said North Carolina\
  \ is likely to see eight months' worth of rain in two to three days.\n\nThe hurricane's\
  \ wind speeds have fallen from a category two level of 96-110mph to a category one\
  \ level of 74-95mph.\n\nThere will be hurricane-force winds up to 80 miles from\
  \ the centre of the storm, meteorologists say.\n\nFlorence was being followed in\
  \ the Atlantic by two other storms - Hurricane Helene and Tropical Storm Isaac.\n\
  \nBut Helene is now moving north east towards the UK and Isaac is moving west across\
  \ the Caribbean.\n\nHurricanes are violent storms that can bring devastation to\
  \ coastal areas, threatening lives, homes and businesses. Hurricanes develop from\
  \ thunderstorms, fuelled by warm, moist air as they cross sub-tropical waters. \n\
  \nWarm air rises into the storm. Air swirls in to fill the low pressure in the storm,\
  \ sucking air in and upwards, reinforcing the low pressure. The storm rotates due\
  \ to the spin of the earth and energy from the warm ocean increases wind speeds\
  \ as it builds. When winds reach 119km/h (74mph), it is known as a hurricane - in\
  \ the Atlantic and Eastern Pacific - or a typhoon in the Western Pacific. \"Everybody\
  \ has a plan until they get punched in the face. Well, we're about to get punched\
  \ in the face.\" \n\nFlorida Mayor Bob Buckhorn, ahead of Hurricane Irma (2017)\
  \ The central eye of calmer weather is surrounded by a wall of rainstorms.\n\nThis\
  \ eyewall has the fastest winds below it and violent currents of air rising through\
  \ it. A mound of water piles up below the eye which is unleashed as the storm reaches\
  \ land. \n\nThese storm surges can cause more damage from flooding than the winds.\
  \ \"Urgent warning about the rapid rise of water on the SW FL coast with the passage\
  \ of #Irma's eye. MOVE AWAY FROM THE WATER!\"\n\nTweet from the National Hurricane\
  \ Center The size of hurricanes is mainly measured by the Saffir-Simpson scale -\
  \ other scales are used in Asia Pacific and Australia. Winds 154-177km/h\n\nRoofs\
  \ and trees could be damaged. \n\nStorm surge +1.8m-2.4m Hurricane Sandy (2012)\
  \ caused $71bn damage in the Caribbean and New York Hurricane Ike (2008) hit Caribbean\
  \ islands and Louisiana and was blamed for at least 195 deaths \"For everyone thinking\
  \ they can ride this storm out, I have news for you: that will be one of the biggest\
  \ mistakes you can make in your life.\" \n\nMayor of New Orleans Ray Nagin ahead\
  \ of Hurricane Gustav, 2008"
