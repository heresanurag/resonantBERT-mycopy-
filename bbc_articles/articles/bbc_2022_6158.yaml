title: Toddlers & Tiaras and viral star Kailia Posey dies at 16 - BBC News
date: '2022-05-04'
section: Entertainment & Arts
url: http://www.bbc.co.uk/news/entertainment-arts-61318668
content: |-
  The Toddlers & Tiaras star was also known after her cheeky grin at the age of five became a meme.

  Posey was remembered as "such a bright and happy soul"

  Kailia Posey, a former child star of US reality TV show Toddlers & Tiaras, has died at the age of 16, her family have said.

  "I don't have words or any thoughts," Gatterman wrote, sharing a picture of her daughter dressed for a school prom. "A beautiful baby girl is gone."

  Posey was also known after her cheeky grin at the age of five became a widely-shared gif on social media.

