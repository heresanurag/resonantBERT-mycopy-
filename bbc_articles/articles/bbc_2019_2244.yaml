  Passing sentence, Judge Christopher Morgan told the 15 that while he accepted the group were seeking to demonstrate in support of their cause, they had come "perilously close" to causing a catastrophe.

  He said: "In normal circumstances only a normal custodial sentence would have been justified in this case, but in your case I accept that your intentions were to demonstrate."

  "There is no doubt that you understood that there were safety implications," he added.

  "You put at risk the safe operations of the airport and the persons who were there on the night."

  In court, the judge faced some tough arguments from a top human rights barrister about his duties to balance the question of airport security with the need to protect freedom of speech and assembly. Judge Morgan said he did this through tempering his sentences - in other circumstances, he said, he would have jailed the lot of them.

  Some of the defendants looked jubilant and defiant. Others looked like defendants often do: exhausted by the process, somewhat remorseful and promising never to do it again.

  So if the Court of Appeal decides not to examine the convictions, this prosecution will stand as a warning to others of the type of charge they could face for endangering an airport.

  A large crowd gathered outside the court in support of the Stansted 15

  Three of the defendants, Edward Thacker, Alistair Tamlit and Melanie Strickland were given nine-month jail sentences, suspended for 18 months.

  The other 12 received 12-month community orders, with 11 of them ordered to carry out unpaid work.

  All 15 were convicted on 10 December last year under the 1990 Aviation and Maritime Security Act, which was brought in after the 1988 Lockerbie bombing.

  The Stansted 15 have said they will appeal their convictions

  The defendants had said they were being prosecuted under the "little known" legislation, originally devised to combat terrorism and hjijacking.

  In a statement, the Crown Prosecution Service said it was never suggested to the jury that any of the 15 were terrorists.

  Prosecutor Tony Badenoch said the Crown would not be recouping the financial deficit caused by the protest; estimated to be more than £1m.

  New mother Emma Hughes, who gave birth between being convicted and sentenced, said the group were "massively relieved" none of them would be going to jail.

  She said: "It is a massive vindication of what we did. There are 11 people still in the UK because of the action we took. Three of them have now been granted leave to remain; there is one man here who would have been separated from his family and is now here with his family. We are going to keep fighting until we get these convictions overturned."

  Hundreds of people turned out to a demonstration outside the court, with crowds singing, clapping and waving banners.

  The courtroom was packed for the hearing, with extra space created in the public gallery and all seats filled.

