title: Jury shown self-filmed footage of suspect stabbing man during sex - BBC News
date: '2025-05-01'
section: England
url: http://www.bbc.co.uk/news/articles/cj684515djlo
content: |-
  Yostin Mosquera is accused of murdering Albert Alfonso and Paul Longworth to steal from the couple.

  The three men were friendly and had visited each other's home, the court heard

  A jury has been shown footage of an alleged killer attacking a man in a "frenzied stabbing" while having sex with him in west London. Yostin Mosquera, 35, is accused of murdering both Albert Alfonso, 62, and Paul Longworth, 71, before dismembering and decapitating them, packing body parts into suitcases and taking them to Clifton Suspension Bridge in Bristol last July. The Old Bailey heard that Mr Alfonso paid Mr Mosquera for "extreme sex" which, with their knowledge, was often filmed and posted online. Mr Longworth, Mr Alfonso's partner, was aware of the activities but was not involved, the jury was told.

  This article contains material that some people may find distressing.

  Mr Mosquera, a Colombian national, previously admitted the manslaughter of Mr Alfonso in a "loss of control" and blamed Mr Longworth's death on Mr Alfonso. This was rejected by the prosecution and Mr Mosquera is charged with two counts of murder. The footage of the attack, along with its soundtrack which captured the sound of someone appearing to struggle to breathe, was watched in silence by the jury at the Old Bailey. It was recorded on four cameras set up in the bedroom at the Shepherd's Bush flat to record sex sessions with Mr Alfonso and Mr Mosquera, who is then seen singing and dancing in the aftermath of the attack.

  A court drawing of Yostin Mosquera and an interpreter at the Old Bailey

  Mr Justice Bennathan had previously warned the jury the footage was "not an easy watch" and the soundtrack would potentially heighten any distress. The men, both naked, are seen grappling with each other and wrestling to the ground, with Mr Alfonso bleeding from a knife wound to the neck. Mr Alfonso eventually stopped struggling and his breathing could no longer be heard. Mr Mosquera is then seen singing a song in Spanish and dancing, before sitting down to look at a computer. The prosecution said Mr Mosquera had already killed Mr Longworth by hitting him on the back of the head with a hammer and had hidden his body in under-bed storage. After the couple were dead, it is alleged Mr Mosquera tried to steal from them using information gleaned about their bank accounts. He made several cash withdrawals from Mr Alfonso's, obtaining at least £900 before the transactions started getting declined, the court was told.

  Mr Mosquera took a suitcase and a trunk to Clifton Suspension Bridge

  Mr Mosquera was stopped just before midnight by a concerned cyclist as he stood on the Clifton Suspension Bridge two days later with a large suitcase and a trunk, the court heard. He claimed he was using it to move heavy car parts but dumped the luggage and fled when the cyclist and bridge staff noticed fluid leaking from them, jurors were told. The police were called and officers discovered the cases contained body parts. A luggage label on the trunk led police to the couple's address in Shepherd's Bush where they found other body parts of Mr Alfonso and Mr Longworth in a chest freezer, the court heard.
