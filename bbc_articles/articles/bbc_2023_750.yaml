title: Video shows Brazil Supreme Court mass break-in - BBC News
date: '2023-01-08'
section: General
url: http://www.bbc.co.uk/news/world-latin-america-64206282
content: |-
  Dozens of far-right demonstrators can be seen inside the court building with large crowds outside.

  Supporters of Brazil's ex-President Jair Bolsonaro have stormed the Congress, Supreme Court and presidential palace.

  This footage shows supporters of Mr Bolsonaro storming the court building.

