title: '''Super blue blood Moon'' seen around the world - BBC News'
date: '2018-02-01'
section: World
url: http://www.bbc.co.uk/news/world-42890838
content: |-
  Images from around the world as the lunar event dazzles skywatchers.

  This red glow is produced by the same effect that gives us red sunsets. Sunlight is skimming through the Earth's atmosphere on its way to the Moon and it gets refracted or bent. The blue light is then filtered out, leaving the red light visible, like here in Anaheim, California.
