content: |-
  Former world snooker champion Terry Griffiths has died aged 77, the World Snooker Tour has confirmed.

  Terry Griffiths won the World Championship in 1979, the Masters in 1980 and the UK Championship in 1982

  Former world snooker champion Terry Griffiths has died aged 77, after a long battle with dementia, his family has confirmed. The Welshman won the 1979 World Championship as a qualifier, beating Dennis Taylor 24-16 in the final. Griffiths also won the Masters in 1980 and the UK Championship in 1982 to complete snooker's 'Triple Crown'. He also reached a career-high third in the world rankings, and in 2007 was made an OBE for his services to the sport. His son Wayne wrote on Facebook: "To our friends and snooker followers in general, we are deeply saddened to share the news of our loss. "Terry Griffiths OBE passed away peacefully on 1st December, after a lengthy battle with dementia. He was surrounded by his family in his beloved hometown in South Wales. "A proud Welshman, Terry was born in Llanelli, brought pride to Llanelli and now he has found peace in Llanelli. He would not have had it any other way." A message on World Snooker Tour's official X account added: "We are deeply saddened tonight to hear that Terry Griffiths, a former world champion and all-time snooker great, has passed away at the age of 77. "Our sincere condolences to Terry's family and many friends. He was loved and respected by everyone in the sport."
