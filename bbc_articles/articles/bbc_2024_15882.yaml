  During the trial, the jury was played a voice note Mr Plumb sent to a man only known as Marc in March 2023. It outlined a plan to "hit" Ms Willoughby's house at night before using chloroform to incapacitate her. "We’re then gonna force her to make a video saying she came with us under her own free will... and she’s fully consenting to everything we do to her – so that covers us," Mr Plumb said in the voice note.

  It was also alleged he messaged Marc saying: "I'm now at the point that fantasy isn't enough anymore. I want the real thing." Ms Wass said the messages were "the ramblings of a rather sad" individual. "The plan was riddled with flaws - it was wholly unachievable," she told the jury. The barrister added that Mr Plumb had fallen down a "rabbit hole" of fantastical online chat rooms where "similar lonely, disaffected people were feeding off their fantasies". She continued: "It was the fantasy of rape and abduction that gave him the gratification."

  Mr Plumb said he was unable to stand while he gave evidence during the trial

  Ms Wass warned jurors it "would not be fair to hold [Mr Plumb's] previous convictions against him". The defendant had tried to kidnap two air hostesses off a train in 2006, and in 2008 he attempted to falsely imprison two 16-year-old girls at a shop, his trial was earlier told. Mr Plumb's age at the time and the fact he pleaded guilty to the offences meant it "wouldn't be right" to judge him on them, Ms Wass said. "I would urge you to stick to the evidence in this indictment and the central question - is this a serious plan or is it a fantasy?," she added.

  Police found "sexualised discussions" on a device they seized from Mr Plumb's address, the court heard

  The barrister said it would have been "impossible" for Mr Plumb to have "hopped" over a 9ft (2.74m) wall at Ms Willoughby's house when he weighed 30st (190kg). She argued it was "absurd" to suggest that Mr Plumb - who did not have a driving licence - would then take the broadcaster's car and drive her to his flat. Closing her speech, Ms Wass said Mr Plumb's alleged plan was instead "the ravings of an isolated individual".
