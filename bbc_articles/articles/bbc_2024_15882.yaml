title: Holly Willoughby kidnap suspect living a 'dark, twisted fantasy' - BBC News
date: '2024-07-02'
section: Essex
url: http://www.bbc.co.uk/news/articles/cd1xzq6wkzlo
content: |-
  Gavin Plumb's barrister tells a jury he fell down a "rabbit hole" of fantastical online chat rooms.

  Fake pornographic images of Holly Willoughby were found on a device owned by Gavin Plumb, it has been alleged

  A man accused of masterminding a plan to abduct, rape and murder Holly Willoughby was living a "dark, twisted fantasy", his barrister argued. Defending Gavin Plumb, Sasha Wass KC said the 37-year-old held "vile and misogynistic" conversations online but they were "a fantasy nonetheless". The trial at Chelmsford Crown Court was previously told that Mr Plumb was arrested after disclosing his alleged plot to an undercover police officer from the US. Security guard Mr Plumb, from Harlow, Essex, has denied soliciting murder, inciting rape and inciting kidnap.

  The prosecution alleged that Mr Plumb wanted to live out his "ultimate fantasy" by taking Ms Willoughby from her home by force and leading her to a "dungeon". Defending her client, Ms Wass said in her closing speech that he "neither had the means nor the opportunity" to undertake the so-called plan. "The fun - if that is the right word - was fantasising, the pretending that the plan would be put into effect," she told the jury. "There is no doubt that Gavin Plumb sent the messages and there is no doubt that the content of the messages are vile and misogynistic - and Mr Plumb himself accepted they were dark."

