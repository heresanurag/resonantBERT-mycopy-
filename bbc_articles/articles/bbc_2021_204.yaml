title: Inside one GP surgery's Covid vaccine roll-out - BBC News
date: '2021-01-07'
section: General
url: http://www.bbc.co.uk/news/uk-55568793
content: |-
  At Fullwell Cross Medical Centre in north London, they are now vaccinating almost 1,000 people a week.

  Dr Anil Mehta, a GP at Fullwell Cross Medical Centre in North London, told the BBC that staff were working from 7 in the morning until 10pm at night during the three days of their weekly Covid-19 vaccine rollout, describing the process as a 'full team effort.

  Dr Mehta was also keen to encourage people who might be nervous about the vaccine to take up the offer, emphasising that the evidence behind the vaccine 'was very strong'.

  This message was echoed by Zahin Ahmed, whose grandfather Shafiquz Zaman has now received both doses of the Pfizer-BioNtech vaccine at the clinic. Mr Ahmed, who is from the Bangladeshi community, also said it was important that minority communities took up the offer of the vaccine when called upon to do so.
