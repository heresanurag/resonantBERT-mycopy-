title: Von der Leyen promises to increase EU deportations - BBC News
date: '2024-10-17'
section: Europe
url: http://www.bbc.co.uk/news/articles/cx2mzvj4051o
content: |-
  The EU chief made the comments to member states, as Italy kicks off a contested migrant processing scheme.

  Ursula Von der Leyen and Giorgia Meloni in Brussels on Wednesday

  European Commission President Ursula von der Leyen has said the EU could "draw lessons" from a contested Italian policy of processing migrants offshore in Albania, as leaders of the 27 member states hold an EU summit focusing on migration. Ahead of the Brussels summit, she wrote to EU leaders to say the EU's executive would present a new proposal for legislation to increase deportations of migrants.. Italy has begun sending some migrants to a processing centre in Albania earlier this week. Sixteen men were transferred to the Albanian port of Shengjin on Wednesday, but hours after their arrival it emerged that two were minors and two more were medically vulnerable and would therefore be returned to Italy.

  Other EU countries have begun considering ways to process migrants in third countries. On Wednesday, the Dutch government said it was weighing up a plan to send rejected asylum seekers to Uganda. By framing this week's summit around the issue of migration, von der Leyen - who is starting a second five-year term as European Commission chief - appears to be responding to pressure on migration from across Europe. In her letter to member states, von der Leyen said the return rate of irregular migrants from EU countries is currently only about 20% - meaning the vast majority of people who are ordered to leave an EU member state do not.

  Member states should all recognise the decisions taken by other EU countries to ensure that "migrants who have a return decision against them in one country cannot exploit cracks in the system to avoid return elsewhere", von der Leyen wrote. Under the Italy-Albania scheme, some of the migrants rescued in the Mediterranean will be sent to Albania where their asylum claims will be examined. The two processing centres, which cost about €650m (£547m), were due to open last spring but were plagued by long delays, have been paid for by the Italian government and will be operated under Italian law. They will house migrants while Italy examines their asylum requests. Pregnant women, children and vulnerable people will be excluded from the plan. Political opponents of right-wing Italian Prime Minister Giorgia Meloni as well as several NGOs have criticised Italy's deal with Albania. Riccardo Magi, an MP with the left-wing +Europa party, said the Albania scheme was "cruel, useless and expensive", while NGO Doctors Without Borders said it was "likely to result in further harm and violation of human rights". Civil rights activists gathered near the Italian-built centre in Shengjin carrying a large banner reading: "The European dream ends here." However, addressing MPs on Tuesday, Meloni argued that the plan was "a new, courageous, unprecedented path" which "perfectly reflected the European spirit". The implementation and the results of the Albania agreement will be watched closely by many EU member states, several of whom have attempted to respond to a surge in support for far-right parties by hardening their rhetoric and their approach to migration. In the last few weeks alone, Germany reintroduced land border checks, the French government said it would look into tightening immigration legislation and Poland announced a plan to temporarily suspend the right to asylum for people crossing the border. Polish PM Donald Tusk said the controversial move was meant to stop Belarus from "destabilising" Poland by allowing large numbers of migrants into the country. In France and Germany, it was grisly murders which prompted calls for tougher action on immigration. A Syrian failed asylum seeker stabbed three people to death in Solingen, while a young student was murdered by a Moroccan national near Paris. In both cases, the killings were carried out by men who had been given expulsion orders that had not been enforced. Last month, 15 member states signed a proposal by Austria and the Netherlands to improve the "efficiency" of the deportations system.
