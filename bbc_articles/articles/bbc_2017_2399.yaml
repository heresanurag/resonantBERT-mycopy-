  Ex-Liverpool striker Djibril Cisse has quit football to become a DJ, but what other careers have ex-players done in retirement. Play our quiz to find out.

  Fireman, wrestler, politician? What do footballers do in retirement? Last updated on .From the section Football

  Following ex-Liverpool and QPR striker Djibril Cisse's announcement that he is to retire to focus on a career as a DJ, BBC Sport has unearthed a few more career paths taken by former players. Play along with our gallery quiz to see how many you can remember.
