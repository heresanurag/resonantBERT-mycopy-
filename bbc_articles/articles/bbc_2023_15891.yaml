id: bbc_2023_15891
title: 'Israel-Gaza: Explosions pierce Gaza darkness as Israel steps up bombing -
  BBC News'
date: '2023-10-27'
section: General
url: http://www.bbc.co.uk/news/world-middle-east-67243928
content: |-
  Israel's attacks in Gaza intensified on Friday night, and Gaza was left in darkness.

  Israel said on Friday evening that its ground forces were "expanding operations", as strikes on Gaza intensified.

  Rockets were also fired from within the Gaza Strip.

  Communication and power networks went down at around the same time, meaning residents in Gaza could not be contacted.
