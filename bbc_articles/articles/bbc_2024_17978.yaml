  Reform UK leader Nigel Farage used his speech to take a swipe at Sir Lindsay's predecessor as speaker John Bercow. To groans from some, he said Sir Lindsay was "in marked contrast to the little man that was there before you and besmirched the office so dreadfully in doing his best to overturn the biggest democratic result in the history of the country" - a reference to some of the controversial decisions Mr Bercow made on Brexit votes in Parliament. Mr Farage, who was elected to Parliament on his eighth attempt, hailed his party as "the new kids on the block", after Reform won five seats. MPs are now beginning the process of being sworn in, where they make an oath or affirmation of allegiance to the Crown.
