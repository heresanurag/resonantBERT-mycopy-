title: 'NI election 2022: Deadline to register to vote passes - BBC News'
date: '2022-04-14'
section: Northern Ireland
url: http://www.bbc.co.uk/news/uk-northern-ireland-61102275
content: |-
  The deadline for applying to register to vote passed at 11:59 BST on Thursday.

  The deadline for registering to vote in next month's Assembly election has passed.

  The deadline for applying to register to vote was 11:59 BST on Thursday.

  The assembly election is being held on Thursday 5 May across 18 constituencies. Two hundred and thirty-nine candidates are standing; 90 will be elected.

  Ballots are cast using the single transferable vote (STV) method.

  In this system, voters rank candidates in order of preference and are able to vote for as many or as few candidates as they like.

  SIGN UP FOR ALERTS: Get extra updates on BBC Northern Ireland election coverage

  To vote, you must be aged over 18 and be either a British, Irish qualifying Commonwealth or EU citizen.

  You must also be resident at an address in the area you want to vote in and not be legally excluded from voting.
