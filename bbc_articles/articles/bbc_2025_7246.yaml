content: |-
  Footage posted online shows a swimmer flailing in the distance as beachgoers yell in shock.

  Remains found after rare shark attack on swimmer in Israel

  Remains have been found by search and rescue teams after a swimmer was attacked by a shark off the coast of northern Israel on Monday, the country's Fire and Rescue Authority says. The remains recovered on Tuesday afternoon were transferred to the Institute of Forensic Medicine for identification. Local media said the missing swimmer was a 40-year-old man from central Israel. The extremely rare incident happened in the sea at Hadera, about 40km (25 miles) north of Tel Aviv. People on Olga Beach could be heard yelling in shock in footage posted on social media.

  Sharks are known to gather there where warm water is discharged by a local power plant, and especially at this time of year, but they are usually harmless. There have been no recorded fatal shark attacks in waters off Israel since the country was founded in 1948. Police closed the beach while rescue teams searched for the missing man.

  The attack happened close to the power station at Hadera

  An image from 2021 showing people wading close to a shark in the same area

  In video shared online, a man can be seen at a distance of what appears to be a few hundred feet out to sea. He is seen flailing around as people on the beach shout that he is being attacked. "I was in the water, I saw blood and there were screams," a witness, Eliya Motai, told Ynet news site. "I was a few meters from shore," he said. "It's terrifying. We were here yesterday and saw the sharks circling us." Dusky and sandbar sharks are known to cluster in the area, which is dominated by the Orot Rabin power station, the largest in Israel. They are attracted by the water warmed up by the plant and by fish which are carried down there from a nearby stream. Monday's incident is only the fourth documented shark attack in Israel's history, according to YNet.
