  BBC Sport looks at Manchester United's attacking shortcomings and Rasmus Hojlund's goal drought.

  What is behind Hojlund's goal drought?

  This video can not be played To play this video you need to enable JavaScript in your browser.

  Another bad result for Manchester United and another game without a goal from their misfiring forwards. United's penalty-shootout loss to Fulham in the FA Cup was the 18th consecutive game in which Rasmus Hojlund has failed to score since netting a double against Viktoria Plzen in the Europa League on 12 December. During that time Joshua Zirkzee has also managed just one goal in 16 games for a United side that has toiled in the final third of the pitch. And with United chasing an equaliser against the Cottagers, it was the Denmark international - signed from Atalanta in a deal worth up to £72m in 2023 - that made way for teenager Chido Obi. Hojlund, 22, managed just one shot - and that went wide of the near post from Christian Eriksen's cross - on an afternoon when he struggled to have an impact. Zirkzee, 23, also only had one effort on goal - a flick that also missed the target – while 17-year-old Obi had three and forced Fulham goalkeeper Bernd Leno into an outstanding reaction save. So, with Hojlund's form another cause of concern at a club dealing with numerous issues on and off the pitch, BBC Sport look at United's attacking shortcomings.

  United manager Ruben Amorim recently blamed a lack of service for Hojlund's barren run in front of goal. And their options in that regard have been diminished with Amad Diallo out injured, the out-of-favour Marcus Rashford shipped out to Aston Villa on loan and Antony now at Real Betis until the end of the season. During February, there was even a comical situation when the Brazil winger had scored more goals for the La Liga side (three) than United's players had between them at that point in the month. Yet Amorim is in control of the personnel and tactics and there were noticeable frustrations stirring around Old Trafford even before kick-off on Sunday when Alejandro Garnacho was left on the bench. Until his introduction in the 53rd minute, United's Noussair Mazraoui and Diogo Dalot - two full-backs playing in wing-back roles - had struggled to provide any sort of attacking threat whatsoever. When the Argentina winger came on the dynamic of the match shifted, United played with more purpose and had six shots on target in the second half compared to two before the break. Garnacho was also involved in Bruno Fernandes' equaliser as United finally got players forward, unlike the first period where Zirkzee and Hojlund lacked support. "I think United play too slow, the ball speed is too slow and for the centre-forwards they are just waiting around," said former United captain Wayne Rooney on BBC Match of the Day. "Sometimes I made mistakes and had a bad game but I had good players around me. Hojlund is getting no help. He's having to try to hold the ball and use his body. He is making runs and is willing but is a little isolated. "Not just Hojlund but Joshua Zirkzee has given up the ball too many times. There is not enough creativity and they are not holding up the ball for the midfielders and defenders to support them, so it's a bit of both."

