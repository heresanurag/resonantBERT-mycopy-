title: Solihull school investigation for allegations of teacher bullying - BBC News
date: '2025-02-27'
section: Birmingham & Black Country
url: http://www.bbc.co.uk/news/articles/clyze5lky7ko
content: |-
  Concerns raised include staff allegedly displaying "bullying" behaviour and children being put in isolation.

  Amy said her son Cooper had been out of education since October 2024

  An academy trust is launching an independent investigation at a Solihull school for children with additional needs after the BBC contacted them about allegations of "bullying by teachers". The Heights Academy, in Smith's Wood, opened in September 2023, promising a "unique educational approach" tailored to pupils who are autistic or have mental health needs. But some parents have expressed concern about the school's culture, with one accusing bosses of "mis-selling them a dream". The Forward Education Trust, which runs the school, said it was aware of concerns raised about the special educational needs and disabilities (SEND) provision and would commission a "thorough and transparent" investigation.

  One mother, Amy, told the BBC she had taken her son Cooper, who is autistic and has dyspraxia and anxiety, out of the school after just one year. She alleged the 12-year-old had been "relentlessly targeted" by a teacher over a number of months, claiming the case "wasn't investigated" by trust bosses. When asked if accusations of bullying by teachers would be included in the investigation, the Trust said it would be "inappropriate" to comment further.

  This video can not be played To play this video you need to enable JavaScript in your browser. Amy alleged her 12-year-old had been 'relentlessly targeted' by a teacher

  Amy, a full-time carer with a degree in education, said her son has now been out of education since October 2024. "We went to open evenings and did our due diligence," Amy said. "I would like them to understand the damage they have done to my child. "School is a place where children should feel safe, thrive and create memories, not come home petrified about going the next day."

  The BBC understands that a WhatsApp group with more than a dozen concerned parents has been set up. Labour councillor Hazel Dawkins said she had personally spoken to the parents of seven different children. Concerns raised to her include claims of staff members displaying "bullying" behaviour, children being placed in isolation for becoming emotional, and at least one case of a pupil escaping. "Some of the parents have mentioned that teachers just don't know how to handle [a child] having a meltdown," Dawkins said. "A room should be available for them to go into, calm down and go back into the lesson.

  Labour councillor Hazel Dawkins said she had personally spoken to the parents of seven different children

  Simon Dilkes, chief executive officer of the Forward Education Trust, insisted bosses were committed to the safety and wellbeing of pupils. He said the former CEO of a special school trust would be appointed to look into the complaints, with an investigation due to commence on Monday 3 March. "As part of our commitment to transparency and accountability, we will be launching an independent investigation to fully assess these concerns," Mr Dilkes said. "Once we have agreed some details, a more complete timeline can be advised to interested parties."

  The former CEO of a special school trust is set to be appointed to look into the complaints

  Solihull Council said: "We are aware of concerns raised by some parents of children attending The Heights Academy. "It is the responsibility of the multi-academy trust to investigate these concerns and we have sought assurance from the Trust that this is in train and will work closely with them where appropriate."

