title: Nutella sale causes scrums in French supermarkets - BBC News
date: '2018-01-26'
section: General
url: http://www.bbc.co.uk/news/world-europe-42838872
content: |-
  There have been scuffles in a chain of French supermarkets, as shoppers jostled to grab a bargain.

  A discount on Nutella has led to scuffles in a chain of French supermarkets, as shoppers jostled to grab a bargain on the sweet spread.

  Intermarché supermarkets offered a 70% discount on Nutella, bringing the price down from €4.50 (£3.90) to €1.40.
