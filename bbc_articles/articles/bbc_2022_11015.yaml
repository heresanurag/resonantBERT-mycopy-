id: bbc_2022_11015
title: Protesters interrupt Liz Truss speech - BBC News
date: '2022-08-06'
section: General
url: http://www.bbc.co.uk/news/uk-politics-62441972
content: |-
  The foreign secretary can be heard responding with a promise to clamp down on disruptive protest.

  A group of protesters have interrupted a speech made by foreign secretary Liz Truss at a Tory leadership hustings event in Eastbourne.

  In footage filmed by the BBC's Ben Weisz, the protesters can be seen standing up and delivering speeches of their own.

  Ms Truss can be heard responding with a promise to clamp down on disruptive protest.
