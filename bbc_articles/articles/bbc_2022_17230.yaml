title: LadBaby and Martin Lewis rework Band Aid's Do They Know It's Christmas - BBC
  News
date: '2022-12-12'
section: Entertainment & Arts
url: http://www.bbc.co.uk/news/entertainment-arts-63917114
content: |-
  The duo will make their fifth assault on the charts with a cover of Do They Know It's Christmas.

  Mark Hoyle wore an updated version of Band Aid's Feed The World T-shirt for the recording session

  YouTube stars LadBaby have unveiled plans to score an unprecedented fifth Christmas number one single in a row.

  The duo, Mark and Roxanne Hoyle, will cover Band Aid's 1984 hit Do They Know It's Christmas to raise money for those affected by the cost of living crisis.

  They will be joined by finance expert Martin Lewis and "icons from the music industry", who are yet-to-be revealed.

  "I don't think everyone is ready for Martin Lewis's singing voice," Mark told BBC News. "He puts me to shame".

  Proceeds from the song will be shared equally between food bank charity The Trussell Trust and the Band Aid foundation.

  LadBaby made chart history last year when their collaboration with Ed Sheeran and Sir Elton John, Sausage Rolls For Everyone, became their fourth consecutive UK Christmas number one.

