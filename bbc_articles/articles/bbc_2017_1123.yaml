title: Ambassador's wife accused of murder plot with lover - BBC News
date: '2017-01-01'
section: General
url: http://www.bbc.co.uk/news/world-38476907
content: |-
  The wife of the Greek ambassador to Brazil is accused of colluding with her lover in his murder .

  Police in Brazil have accused the Greek ambassador's wife of colluding with her lover in the murder of her husband, Kyriakos Amiridis.

  An investigator said Francoise Amiridis had admitted having an affair with a policeman, whom she blamed for the killing.
