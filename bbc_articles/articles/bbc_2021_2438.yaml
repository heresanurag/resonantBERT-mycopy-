url: http://www.bbc.co.uk/news/uk-england-wiltshire-55963876
content: |-
  Bethany Ovenden Gumm was a passenger in a car which left the road in Westbury and hit a garden wall and a tree.

  Bethany died after the car she was travelling in hit a wall

  A woman who died in a car crash which left three other teenagers injured has been named.

  Bethany Ovenden Gumm, 18, was a passenger in a Ford Fiesta which left The Mead in Westbury, Wiltshire and hit a garden wall and a tree on Friday.

  The driver, a 19-year-old man, was seriously injured and remains at Southmead Hospital in Bristol.

  Two other occupants - a woman, 18, and a girl, 17 - have "significant" injuries and also remain in hospital.

  The Mead, near the roundabout with the A350, was closed after the accident at about 23:40 GMT on Friday but reopened at about 10:00 GMT on Saturday.

  Insp Andrew Lemon, of Wiltshire Police, said: "This is a tragic incident and our thoughts are with the girl's family and friends at this extremely difficult time.

  "I ask that their privacy is respected and our investigation into the circumstances surrounding the collision is ongoing."

  Police said the car Bethany was in crashed into a garden wall and a tree on The Mead

  Flowers and tributes have been left at the scene of the crash in Westbury

