  After two days of counting here are some of the key outcomes of the Holyrood 2021 vote.

  With all the results now in, the SNP have secured a fourth consecutive win in the Holyrood election, only narrowly missing out on an outright majority. Covid precautions meant the count was held over two days but now the shape of the new parliament is clear, here are the headlines:

