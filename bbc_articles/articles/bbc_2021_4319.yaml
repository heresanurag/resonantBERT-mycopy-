content: |-
  The UK will send medical equipment to India, Boris Johnson says, as the country faces a surge in infections.

  Richer nations will soon be able to share jabs with poorer countries - Gates

  The UK, the US and other developed countries will start to have excess vaccines in "the next three or four months" which they can then share with the developing world, according to Billionaire philanthropist Bill Gates. Speaking earlier to Sky News's Sophy Ridge on Sunday programme, he said: "Over the balance of the year, the US, the UK and others will be able to make sure that the vaccines are now going to the developing countries." He added: "The other good news is that the actual death rate from this epidemic in the poorest countries has actually been quite low." He said that it was a "good thing" that rich countries had been able to vaccinate their elderly populations as they had generally been harder hit than developing countries. "The fact that now we're vaccinating 30-year-olds in the UK and the US and we don't have all the 60-year-olds in Brazil and South Africa (vaccinated), that's not fair, but within three or four months the vaccine allocation will be getting to all the countries that have the very severe epidemic."
