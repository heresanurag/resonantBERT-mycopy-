title: French president denounces 'scourge of antisemitism' after rape of Jewish girl
  - BBC News
date: '2024-06-20'
section: Europe
url: http://www.bbc.co.uk/news/articles/cljj9x8lj2jo
content: |-
  The French president was reacting to the incident which happened in Courbevoie, a suburb of Paris.

  President Macron asked his education minister to ensure schools hold conversations on the topics of racism and antisemitism

  French President Emmanuel Macron has said that schools in France are being threatened by the "scourge of antisemitism" after a 12-year-old Jewish girl was raped in what police said was a hate crime. According to French media, the girl told police she had been in a park in Courbevoie, north-west of Paris, with a friend last Saturday when three boys - two aged 13 and one aged 12 - approached her. She knew at least one of them. The victim said the boys dragged her away to an isolated location before hurling antisemitic abuse at her and raping her. The boys were arrested on Monday and two of them were charged with gang rape, antisemitic insults and violence, and issuing death threats. French media also reported that one of the attackers threatened to kill the girl if she went to the police. In response to the attack, people took to the streets on Wednesday to protest against antisemitism, carrying banners including one that read: "It could have been your sister."

  People have taken to the streets on Wednesday to protest against anti-Semitism

  Mr Macron talked about the Courbevoie attack during a Council of Ministers meeting on Wednesday, where he meets with the members of his government. He asked the Minister of Education, Nicole Belloubet, to ensure that over the next few days schools hold a dialogue on the topics of racism and hatred of Jews to prevent "hateful speech with serious consequences" from "infiltrating" classrooms. Ms Belloubet later wrote on X: "There is no limit to horror... Rape, antisemitism: every part of this crime is revolting." "Unfortunately, since 7 October, antisemitism has been on the rise again in our country," he told TF1. Chief Rabbi of France Haim Korsia said he was "horrified". "Justice must firmly punish the perpetrators of this despicable act. No one can be excused from this unprecedented antisemitic surge," Mr Korsia wrote on X. A January 2024 report by the Council of Jewish Institutions in France (CRIF) said there had been a 284% increase of antisemitic acts in France between 2022 and 2023. It also said that nearly 13% of such acts last year took place in schools. A significant spike was reported in the wake of the 7 October Hamas attacks against communities in Israel. France is in the middle of a heated election campaign after President Macron called a snap parliamentary election two weeks ago, and politicians from all sides were quick to weigh in. Marine Le Pen, the president of the far-right National Rally (RN), urged voters to keep in mind the "stigmatisation of Jews by the far left" when they go to the polls later this month. Her protegee, Jordan Bardella, said if elected he would "fight the antisemitism that has been plaguing France since 7 October".
