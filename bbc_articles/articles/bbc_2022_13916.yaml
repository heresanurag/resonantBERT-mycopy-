  The prime minister vows to focus on “growth, growth and growth” at the Conservative Party conference in Birmingham.

  Liz Truss has addressed the Conservative Party conference for the first time as prime minister, vowing to focus on “growth, growth and growth”.

  Here are some of the key moments from her speech.
