title: 'Portglenone: Man charged with attempted murder after stabbing - BBC News'
date: '2024-04-27'
section: Northern Ireland
url: http://www.bbc.co.uk/news/uk-northern-ireland-68890962
content: |-
  A 58-year-old man has been charged with attempted murder after an incident on Friday morning.

  The incident happened in Portglenone on Friday morning

  A 58-year-old man has been charged with attempted murder after another man was reportedly stabbed in Portglenone, County Antrim.

  Officers attended West Road at about 10:00 BST on Friday. A man was found with stab wounds to his neck and leg.

  He was taken to hospital by ambulance but his injuries are not believed to be life-threatening.

  The 58-year-old is due to appear before Coleraine Magistrates' Court on Monday.

  He is also charged with possession of an offensive weapon with intent to commit an indictable offence and possession of a class-A drug.
