  Daley was just 11 when he told the BBC: "I want to get to the Olympics and win a gold medal." Sixteen years on, that dream is now a reality. Daley and 23-year-old Lee, who was making his Olympic debut, performed impeccably throughout the synchronised 10m platform event, moving top of the leaderboard after four dives. They finished with a total score of 471.81, leaving China's Cao Yuan and Chen Aisen with too much to do and they took silver with a tally of 470.58. "That moment, being about to be announced as Olympic champions, I was gone. I was blubbering," said Daley.

  This video can not be played To play this video you need to enable JavaScript in your browser.

  Victory was expected for Peaty, given he has not lost over 100m for more than seven years, including his first gold in Rio five years ago. Though he was unable to break his own world record of 56.88 seconds in Tokyo, he still finished more than 0.6secs quicker than the Netherlands' silver medallist Arno Kamminga, with Italy's Nicolo Martinenghi taking bronze. Peaty touched the wall in 57.37, the fifth fastest time in history, but compatriot James Wilby could not join him on the podium, finishing in fifth place. Peaty has won the 100m breaststroke at the past three World Championships, broken the world record five times and is the only man to have swum it in under 57 seconds. "I haven't felt this good since 2016. It just means the world to me," said the 26-year-old.

  This video can not be played To play this video you need to enable JavaScript in your browser.

  Cyclist Pidcock had prepared for Tokyo's brutal temperatures by training in a heated tent at home and it paid off. He finished 20 seconds clear of the rest of the field in Izu, with Swiss world number one Mathias Flueckiger taking silver and David Valero of Spain winning bronze, to take Britain's first gold in mountain biking. The 21-year-old, who has world titles in cyclo-cross, road and mountain bike events at under-23 level, had surgery on a broken collarbone at the start of June but returned to training just six days later. When asked how it felt to win gold, Pidcock told Eurosport: "Not real, really. It's pretty crazy that I became an Olympian and I was trying to tell myself at the start of the race it's special just to be here."

