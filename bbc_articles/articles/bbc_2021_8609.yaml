title: 'Tokyo Olympics: Gold medals for Team GB''s Adam Peaty, Tom Daley and Matty
  Lee, and Tom Pidcock - BBC Sport'
date: '2021-07-26'
section: Olympics
url: http://www.bbc.co.uk/sport/olympics/57972548
content: |-
  Day three of the Tokyo Olympics was 'Magic Monday' for Team GB with three golds - for divers Tom Daley and Matty Lee, swimmer Adam Peaty and Tom Pidcock in mountain biking.

  This video can not be played To play this video you need to enable JavaScript in your browser.

  Tom Daley finally ended his wait for an Olympic title with diving gold alongside Matty Lee, while British team-mates Adam Peaty and Tom Pidcock were also crowned champions as day three in Tokyo became 'Magic Monday' for Team GB. Daley and Lee edged out China for victory in the synchronised 10m platform event, 13 years after the 27-year-old - a two-time bronze medallist - made his Games debut in Beijing. In the early hours of day three, Peaty had become the first British swimmer to defend an Olympic title with his dominant victory in the 100m breaststroke. Less than half an hour after Daley and Lee's gold, cyclist Pidcock added a third to Team GB's tally, dominating the men's cross-country mountain biking. In taekwondo, Lauren Williams took silver after a closely fought loss to Croatia's Matea Jelic in the final of the women's -67kg.

  This video can not be played To play this video you need to enable JavaScript in your browser.

  Earlier, Britain's Alex Yee cemented his position as the new star of British triathlon with a silver medal, as Jonny Brownlee placed fifth. The tally of three golds and two silvers is Britain's best return on an Olympic Monday, according to Simon Gleave, head of sports analysis at Nielsen Gracenote. It left Great Britain fifth in the medal table, with hosts Japan leading the way ahead of the USA. London 2012's 'Super Saturday' remains Team GB's most successful Olympic day of the past 100 years, bringing six gold medals and a silver.

  Elsewhere, Japan's Momiji Nishiya won women's street skateboarding gold at just 13 years old. Olympic organisers say a tropical storm will hit Tokyo on Tuesday but it is not expected to cause much disruption to the Games. Rowing and archery events have already been moved because of the anticipated strong winds, while Thursday's surfing finals have been brought forward to Wednesday.

  Tom Daley is competing in his fourth Olympics after Beijing 2008, London 2012 and Rio 2016

  Here's some of Monday's other news:
  • None Britain's men are in the rugby sevens quarter-finals after pool wins against Canada and Japan.
  • None GB's hockey teams won their latest matches, with the women, defending champions after victory at Rio 2016, defeating South Africa 4-1, while the men beat Canada 3-1.
  • None Duncan Scott won his 200m freestyle semi-final while Kathleen Dawson qualified for the women's 100m backstroke final.
  • None In badminton, Marcus Ellis and Lauren Smith won their mixed doubles tie against Thailand to top their group, but Ben Lane and Sean Vendy lost to Chinese Taipei in the men's doubles.
  • None Britain's sole fencer Marcus Mepstead lost to Egypt's Mohamed Hamza in the first round of the men's foil.
  • None Australian swimmer Ariarne Titmus beat American great Katie Ledecky to gold in the women's 400m freestyle final.
  • None Japan's Naomi Osaka cruised into the third round of the tennis women's singles and Novak Djokovic is into the men's second round.

