  For the second day running, Team GB boasted a taekwondo finalist and the result was silver again - with Welsh fighter Williams going down 25-22 to Croatia's Jelic. Williams led with just 14 seconds left before Jelic came back right at the end to snatch the gold medal. "I went out there to win, but I am very happy with how I performed all day. An Olympic silver medal is not bad, is it?" said Williams. In the triathlon, Yee led for much of the 10km run before Norway's Kristian Blummenfelt produced a stunning breakaway in 27C heat and high humidity to win gold by 11 seconds. "I am just a normal guy from south-east London - dreams really do come true," Yee told BBC Sport. The event - which was moved to the early hours in Tokyo to avoid the worst of the heat - had to be restarted after a boat blocked around half of the athletes as they entered the water.

