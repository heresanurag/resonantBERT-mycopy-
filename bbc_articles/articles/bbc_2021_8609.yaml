  • None Triathlon: Team GB head into the women's triathlon (22:30 Monday to 01:00 Tuesday) with a strong line-up: Rio bronze medallist Vicky Holland, 2020 world champion Georgia Taylor-Brown and 2019 world silver medallist Jess Learmonth.
  • None Taekwondo: Bianca Walkden competes for Britain in the +67kg category (02:00-14:30), having added two more world titles since taking bronze at Rio 2016. Mahama Cho, who beat Lutalo Muhammad to selection, competes in the men's +80kg class.
  • None Swimming: Duncan Scott will be one of GB's busiest swimmers, with six different events to his name in Tokyo. On Tuesday, the 2019 world bronze medallist will hope to line up in the men's 200m freestyle final (02:45).
  • None Equestrian: British rider Charlotte Dujardin will be looking to add to her three Olympic titles as she joins veteran Carl Hester and debutant Charlotte Fry in the team dressage (09:30).
  • None Gymnastics: One of the Olympics' biggest TV audiences will be expected for the women's team final (11:45-14:10). There's no question that the United States, led by Simone Biles, are the favourites. Can Britain, sixth at the last World Championships, make it into the final and find a way to challenge for a medal?

