title: 'Watch: Drone footage captures ''giant mega-shed'' in Nacton - BBC News'
date: '2025-03-17'
section: General
url: http://www.bbc.co.uk/news/videos/cm2nr7kwl34o
content: |-
  Drone video shows the scale of the warehouse, which is the size of six football pitches.

  Aerial video footage showed the scale of a structure described as a "gigantic mega-shed" by people living nearby.

  The size of six full-size football pitches, the warehouse at Nacton near Ipswich is about 147m (482ft) wide, more than 300m (984ft) long and 21m (69ft) tall.

  Some residents said the building had taken an emotional toll and was affecting their mental health.

  Sheila Snell, 69, said: "I'm absolutely devastated because all I see is what is like a prison wall at the end of my garden."
