title: 'Margaret Fleming: The teenager who was forgotten for 17 years - BBC News'
date: '2019-06-14'
section: Glasgow & West Scotland
url: http://www.bbc.co.uk/news/uk-scotland-glasgow-west-48523897
content: |-
  Margaret Fleming was last seen in 1999 but was not reported missing until 2016.

  Margaret Fleming was a vulnerable young woman who vanished without trace - and no-one raised the alarm for almost 17 years.

  She was 19 years old when she was last seen by anyone other than Edward Cairney and Avril Jones.

  Her disappearance was so mysterious that at one point police asked the couple, who were meant to be Margaret's carers, if she even existed.

  Their version of her life was stranger than fiction.

