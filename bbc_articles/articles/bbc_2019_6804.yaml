  But despite her struggles in the classroom, the teacher told BBC Scotland Margaret had the potential to hold down a job that did not require some numeracy and literacy skills.

  She added: "If she had stayed in Port Glasgow, she would have stayed in touch with her friends, but moving to Inverkip probably made it easier for Margaret to slip off the radar.

  "I don't even want to imagine what her life was like when she was living in Inverkip."

  The teenager's life and death has had a profound impact on Ms Cahill.

  She said: "There isn't anyone who remembers Margaret.

  "I taught her for two years and I am here speaking about her as a person and I am one of the only people who remembers her.

  "That is one of the saddest things that this wee girl was forgotten - abandoned with supposed carers, and forgotten about for 20 years."

