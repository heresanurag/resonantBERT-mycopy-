title: 'Reading stabbing: Three arrested on suspicion of murder - BBC News'
date: '2021-11-01'
section: Berkshire
url: http://www.bbc.co.uk/news/uk-england-berkshire-59116657
content: |-
  A man in his 20s died in what police say was a "targeted incident" in Reading on Sunday.

  Thames Valley Police said the stabbing took place in Romany Lane, Reading

  Three men have been arrested on suspicion of murder after a man was stabbed to death in what police have described as a "targeted" attack.

  The victim, who was in his 20s, died on Romany Lane in Tilehurst, Reading, on Sunday at about 22:40 GMT.

  An 18-year-old man and two 19-year-olds, who are all from Reading, remain in custody.

  Thames Valley Police said there was not believed to be any further risk to the public.

  Officers remain at Romany Lane and there will be an increased police presence there while the investigation continues, the force said.

  Senior investigating officer Det Ch Insp Andy Howard said: "We are currently in the early stages of this investigation and three people have been arrested on suspicion of murder.

  "At this time we believe that this was a targeted incident and that there is no risk to the wider public."

  The force said there will be an increased police presence in the area

