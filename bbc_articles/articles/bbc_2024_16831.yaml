  A selection of striking news photographs taken around the world this week.

  US Vice-President Kamala Harris arrives for a college athletics teams celebration at the White House. President Joe Biden ended his re-election campaign and endorsed Ms Harris to succeed him as the Democratic candidate. She said that she would "earn and win this nomination" and unite the country against Donald Trump.
