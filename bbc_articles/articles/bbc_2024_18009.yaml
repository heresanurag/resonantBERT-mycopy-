title: Bishop Auckland baby skeleton 'undisturbed' for years, say police - BBC News
date: '2024-08-01'
section: England
url: http://www.bbc.co.uk/news/articles/ckrg51v9327o
content: |-
  The discovery was made by contractors renovating a property in County Durham on Tuesday.

  Police forensics officers outside the disused building in Fore Bondgate, Bishop Auckland, where the skeleton of a baby was found

  The skeleton of a baby which was found beneath the floorboards of a house appears to have been full term and "undisturbed for a number of years", according to police. The discovery was made by contractors renovating a property on Fore Bondgate in Bishop Auckland, County Durham, on Tuesday. The body has been taken to the Royal Victoria Infirmary in Newcastle where a post-mortem examination will be held on Friday, Durham Police said. No other human remains were found at the building, the force added.

  A spokesperson said: "Detectives are waiting for the results of forensic analysis, however initial indications appear to suggest that the baby was full term and had been undisturbed for a number of years."

