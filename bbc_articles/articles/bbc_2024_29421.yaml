title: Award-winning artist learned to paint in prison - BBC News
date: '2024-11-03'
section: West Yorkshire
url: http://www.bbc.co.uk/news/articles/cn9x395dx38o
content: |-
  Leeds-based Kevin Devonport says his life spiralled into criminality after leaving the Army.

  'Prison turned me into an award-winning artist'

  Kevin Devonport turned his back on crime and discovered his passion for art in prison

  A former soldier who became a heroin dealer is now a successful artist after finding his passion while serving a 13-year prison sentence. Kevin Devonport spiralled into criminality after he left the Army aged 21 and he struggled with drug addiction. After turning his life around, he has won multiple awards, exhibited in London, obtained a university degree and has a studio in Leeds. The 52-year-old spoke to the BBC about how he carved a new path for himself while still behind bars.

  Mr Devonport said he enjoyed drawing still life the most

  Mr Devonport was 35 when he was caught selling heroin in 2007 and a self-proclaimed "career criminal" who had already served three jail sentences. Facing the prospect of another lengthy prison term, he took the advice of another inmate who told him - "don't serve time, let time serve you".

  "I tried using the time constructively," Mr Devonport, who served as a Chieftain gunner in the First Royal Tank Regiment, said. "I really wanted to sort my life out by then." He enrolled at the Open University and obtained a first-class honours degree in sociology, but it was when he stumbled across a painting class organised by charity Care After Combat, that he changed his life's trajectory. "I was never really an arty person," he said. "I’d look and admire but I never thought I could do it myself."

  Mr Devonport is currently showcasing some of his work in London

  However, Mr Devonport, who grew up on a council estate in Leeds and left school with no qualifications at 15, said he took to the class "like a fish to water". His first painting - "a little landscape" - may not have been his best work but he said it was the process of creating it that really struck a chord. Having never imagined he would be an artist, he won his first national award while still in prison. "It’s not been a conscious decision, it’s like life has directed me that way," he said. Despite his successes, navigating life after his release in 2014, his reintegration into society and the stigma of incarceration, were challenging. His last run-in with the law was in 2018, when he was jailed for producing cannabis.

  Mr Devonport, who is now a father to Sinead, eight, said it was his art that anchored him and inspired his first exhibition titled "Unlabelled". "Coming into a world where you are not as accepted, you are a bit like driftwood," he said. "Being an artist gives me a sense of who I am, a sense of identity. I was lost. It’s given me something to attach to." Identity, his experience of the justice system as well as his time in the Army on active duty in Germany and Northern Ireland, are often themes that feature in his paintings.

  Mr Devonport's paintings often draw inspiration from his time on active duty in Northern Ireland

  "I tell stories, each object has a meaning," Mr Devonport, who works with offenders and tutors fine art, said. "When you know my art, you can read it like a book." Some of his most recent work is currently on display in Leadenhall Market, London, as part of his exhibition "Nothing Ordinary Here" and he has studio space at Assembly House in Armley, Leeds. While his route into art may have been an unconventional one, he said he did not regret his past. "The things I’ve done with my own life experiences, it’s made me who I am. "I think in terms of my art, it’s made me a better artist." Listen to highlights from West Yorkshire on BBC Sounds, catch up with the latest episode of Look North or tell us a story you think we should be covering here, external.
