title: Pope Francis 'alert' after respiratory failure, Vatican says - BBC News
date: '2025-03-04'
section: Europe
url: http://www.bbc.co.uk/news/articles/crmjk9mjnwmo
content: |-
  The Pope resumes mechanical ventilation after suffering two "acute respiratory failures" on Monday.

  Pope Francis is alert after suffering two episodes of "acute respiratory failure" on Monday afternoon, the Vatican has said. Doctors were forced to intervene to clear mucus from the Pope's lungs, an update from the Holy See said, though it said he was alert throughout. The 88-year-old pontiff has resumed the use of an oxygen mask and ventilator to assist his breathing, but remains "alert, focused and cooperative", the Vatican said. This is now the third serious downturn since the 88-year-old pontiff was admitted to hospital 18 days ago with pneumonia.

  On Friday, Pope Francis suffered an "isolated" breathing crisis involving vomiting, the Vatican said. Updates from the Holy See reported that he responded well to oxygen therapy, with Vatican officials saying on Sunday the Pope no longer required "non-invasive mechanical ventilation, only high-flow oxygen therapy". Following Monday's episodes, Pope Francis has resumed that mechanical ventilation. His illness has meant that Pope Francis has been unable to deliver his traditional Angelus prayer in person for three weeks in a row, with the Vatican publishing his written comments instead. Officials said the text, sent from his hospital room in Rome, had been written "in the past few days". In it, the Pope thanked people for their prayers and thanked his medical team for their care. He will also miss the procession and mass this Wednesday that mark the first day of Lent, the six-week period leading to Easter. Hundreds of Catholics gathered outside in St Peter's Square on Monday for an eighth evening to pray for the Pope's health, many carrying rosary beads as they headed across the cobbles towards the Basilica.

  The crowd, a mixture of priests and nuns based in Rome and Catholic pilgrims here for a Jubilee year, were led by an American cardinal. "I come every night to pray, but this night I am pretty worried," Javier, a Romanian priest, voiced the feelings of many on the square. "We still have hope, but it doesn't look good." "It looks bad, and that's a shame because we really like Francis," Patricia, a Spanish catholic from Toledo, told the BBC. She was following the prayers with her husband and young daughter. "He's really opened the doors of the church to many, like LGBT people. I think they will look for a more conservative pope next, to stop the change." Catholics have also been visiting the Gemelli hospital in Rome to pray for him - hoping he might come to the window, as has happened in the past. But although the Vatican recently described the Pope's condition as stable, he remains too sick even to greet the crowd below.

  The Pope was admitted to hospital on 14 February after experiencing breathing difficulties for several days. He was first treated for bronchitis before being diagnosed with pneumonia in both lungs. The pontiff is particularly susceptible to pneumonia, an infection of the lungs that can be caused by bacteria, viruses or fungi, after he contracted pleurisy – an inflammation of the lungs – as a young man and had a partial lung removal. Vatican sources stress, as they have all along, that the Pope's condition remains complex – his doctors remain cautious - and he is not out of danger.
