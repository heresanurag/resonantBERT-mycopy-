  Legendary American football coach Bill Belichick returns to the game after a year out but not as a coach in the NFL.

  This video can not be played To play this video you need to enable JavaScript in your browser.

  Legendary American football coach Bill Belichick has returned to the game after a year out but not as a coach in the NFL. The 72-year-old, who won a record six Super Bowls with the New England Patriots, has become head coach of the University of North Carolina. After ending his 24-year spell with the Patriots at the end of last season, Belichick was interviewed by the NFL's Atlanta Falcons but not offered a role. Instead he fulfilled a number of broadcasting roles this season before accepting a three-year deal with the Tar Heels, worth a reported $30m (£23.5m). Belichick's father, Steve Belichick, was an assistant coach at UNC from 1953-55. Bill Belichick takes over a Tar Heels programme that has not won a conference title since 1980. Belichick said in a statement released by UNC: "I am excited for the opportunity. I grew up around college football with my dad and treasured those times. "I have always wanted to coach in college and now I look forward to building the football programme in Chapel Hill."

  This is Belichick's first coaching job in the college game having spent his entire career in the NFL, beginning in 1975 as a special assistant with the Baltimore Colts, who have since relocated to Indianapolis. He won two Super Bowls as defensive coordinator with the New York Giants before becoming the Cleveland Browns head coach from 1991-1995. Curiously, Belichick also had two brief stints as head coach of the New York Jets totalling just seven days, the second of which in 2000 ended as his introductory news conference turned into a resignation announcement. He left to take charge of the Patriots, spearheading the greatest dynasty in NFL history as a New England team led by quarterback Tom Brady won six Super Bowls in an 18-year span. Belichick has the most Super Bowl wins by a head coach, while the Patriots and Pittsburgh Steelers share the team record.
