title: 'Park Royal fire: Crews battle huge bakery blaze - BBC News'
date: '2020-07-24'
section: London
url: http://www.bbc.co.uk/news/uk-england-london-53520832
content: |-
  London Fire Brigade says the blaze has created a lot of smoke and warns people to avoid the area.

  About 80 firefighters are tackling the blaze at a shop in Park Royal

  A large fire at a bakery and restaurant is sending huge plumes of black smoke over west London.

  The blaze, on Minerva Road in Park Royal, has prompted 50 calls from local residents, firefighters have said.

  London Fire Brigade said "a lot of black smoke" was coming from the building, and advised those living nearby to close doors and windows.

  About 80 firefighters and 15 fire engines were sent to the scene at 18:20 BST. No injuries have been reported.

  The blaze is over two storeys of a bakery and restaurant

  Assistant Commissioner Graham Ellis said: "This is a severe, complex and highly visible fire.

  "Due to the layout of the building and access to pockets of fire that remain we will be at the scene throughout the night.

  "Thankfully there are no reports of any injuries."

  No injuries have been reported

