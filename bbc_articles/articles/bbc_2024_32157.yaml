title: Darlington mum admits neglecting son before his alleged murder - BBC News
date: '2024-12-03'
section: Tees
url: http://www.bbc.co.uk/news/articles/cq624l1v714o
content: |-
  Paula Roberts changes her plea in the trial over the death of her son Charlie.

  Charlie Roberts was 22 months old when he died

  A woman whose 22-month-old son was allegedly murdered by her boyfriend has admitted child neglect. Paula Roberts, 41, was on trial along with Christopher Stockton, 38, over the death of Charlie Roberts in Darlington in January. She had denied child cruelty through neglect but changed her plea at Teesside Crown Court, and now admits she failed to get her son medical attention for various injuries he had suffered in the weeks before his death. Mr Stockton denies murder and child abuse and his trial continues.

  Prosecutors previously told jurors Charlie had suffered a number of injuries in the weeks before his death, which they claimed were caused by Mr Stockton. They included bruising to his ear, which medical experts said was extremely likely to have been caused accidentally, and an injury to his private parts.

  Roberts admitted child neglect on the basis she failed to get medical attention for the injuries between December 2023 and January 2024. The court heard Mr Stockton and Roberts started a relationship in early 2023 and he was acting as a stepfather for Charlie, having moved into the family's home on Frosterley Drive. On 12 January, 18 minutes after Charlie was left in his sole care, Mr Stockton called 999 to say the boy had collapsed. He claimed Charlie had been choking on a biscuit but scans revealed he had suffered catastrophic and unsurvivable head injuries which prosecutors said had been caused by him being violently shaken or having his head banged. Roberts will be sentenced at a future date and was granted bail. Judge Mr Justice Goss said it was a "serious offence" and all options would be open to him, including immediate custody.
