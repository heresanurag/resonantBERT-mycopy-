title: Number of young people not in work or education hits 11-year high - BBC News
date: '2025-02-27'
section: Family & Education
url: http://www.bbc.co.uk/news/articles/c5ymvnrn0deo
content: |-
  The latest figure of 987,000 16-24-year-olds not in work, education or training has risen by 110,000 in a year.

  Number of young people not in work or education hits 11-year high

  More young people were not in work, education or training at the end of 2024 than at any point in the past 11 years, new data suggests. The latest Office for National Statistics (ONS) figures suggest 987,000 16-24-year-olds were not in work, education or training between October and December. That is 13.4%, or almost one out of every seven people in that age range. The government says every young person will be given the chance to "earn or learn" under its Youth Guarantee initiative.

  Young men are more likely than young women to be not in education, employment or training (Neet), according to the latest ONS estimates. In October to December 2024, an estimated 14.4% of all male 16-24-year-olds were Neet, compared with 12.3% female. But numbers overall are rising too. The October to December 2024 figure of 987,000 was up by 110,000 in a year. At a community centre in Toxteth, Liverpool, Niall, 22, tells BBC News he sees many of his friends "throwing their potential away", as he did from the age of 16 to 20. Niall became Neet after getting in with the "wrong people", he says. "I'd go out partying or doing drugs, spending time just doing drugs to try and escape," he says. "So obviously I had to get off all that stuff."

  Niall says more centres should be available to connect young people with those helping their community

  Young people have too few community centres and often grow up around those not "doing the right things", Niall says. On universal credit while he looks for work, Niall has been inspired by those who helped him to become a youth worker himself. "I feel great about the future now," he says. "I wouldn't enjoy going back to that lifestyle now, because I know what comes of it. "I've put so much work into myself now that I want to build something."

  Young people not in employment can be unemployed - which means they are actively seeking work - or defined as economically inactive - meaning they are not seeking work. Most young people who are Neet fall into the economically inactive category, with 595,000 young people economically inactive in the latest stats, compared to 392,000 who were unemployed. Those working with young Neet people say poor mental health is one of the key issues preventing them finding work. In 2023, almost one out of every five (19.5%) had a mental-health condition, according to the latest yearly Department for Education figures. The King's Trust charity, founded by King Charles III when he was Prince of Wales to help young people find a job or start a business, published its annual Youth Index survey on Thursday. Most of the 4,285 16-25-year-olds across the UK surveyed in November and December felt anxious about their future on a daily basis. And of the 460 who were Neet:
  • None almost one out of every three (31%) said they would like to work but poor mental health prevented it
  • None one out of every two (50%) said being unemployed made them feel hopeless about the future
  • None almost one out of every five (19%) said they were applying for jobs every day without success

  Jack Rice has been a youth worker for three years, supporting young people in Knowsley, Liverpool, who have dropped out of school or college.

  Youth worker Jack (centre) often speaks to young people out and about on the streets of Knowsley

  And every Monday, he runs a football session. It is a useful escape for those such as Luke, 16, who wants to be a roofer and applies for "loads" of jobs but says his age puts off potential employers. Luke is also applying for apprenticeships and, if that does not work out, wants to start a college course next year.

  BBC News spoke to Luke, 16, at a football evening run by local youth workers

  Every year, the Merseyside Youth Association helps more than 5,000 young people gain life skills and qualifications. They are resilient and aspirational but facing an increasingly complex range of barriers to work, Gill Bainbridge, who has been the chief executive for over a decade, says. And around half of those on the charity's Talent Match programme, which aims to help young Neet people into work or training, have special educational needs. "You might have a young person who is on the autistic spectrum, who also struggled with their mental health, who therefore has low confidence," Ms Bainbridge says. "They haven't then succeeded in school, so it becomes a multi-layered set of issues that you really need to work at with a young person in the long term to start to unravel and address it step by step."

  Gill Bainbridge has run the Merseyside Youth Association for over a decade

  The charity was crucial for Harry, 23, who spent three years, when he was Neet, largely confined to his bedroom. The downward spiral in his mental health during the Covid pandemic, after his A-levels in 2019, left him feeling "trapped", he says "I didn't know who to speak to," Harry says. "It was so much easier, with how bad my mental health was, to just rot in this cycle and fester in my room." Harry had free one-to-one counselling through the charity, as well as a mentor who enrolled him on courses that helped him gain life skills, qualifications and friends. Two years on, Harry has his dream job, working for a music-publishing company, and says the support saved his life. Principal economist at the non-profit Youth Futures Foundation Dr Andrea Barry says it is essential the government can reach young Neet people not engaging with its services.

  Harry says his mental health was extremely poor when his mother first brought him to the Merseyside Youth Association

  "Unfortunately, young people who are not looking for work are not going to be in contact with the job centre," she says. "There's significant scarring effects for young people when they're out of work or education long-term. "And it's also important for the government's economic growth goals to get more young people in work and helping to grow the economy." The government recently relaxed some of the rules around apprenticeships for young people - but Dr Barry would like to see it guarantee that Level 2 or 3 apprenticeships will be available to them. More supported internship and help for schools and colleges to prepare young people for work could also help bring Neet numbers down, she says. A Department for Work and Pensions official said it was "determined that no young person gets left behind". "Our Get Britain Working White Paper will transform job centres and will ensure every young person is given the opportunity to earn or learn through our Youth Guarantee, while we significantly expand mental-health support for young people," they said.

