  In an interview recorded before his death Rob Burrow says his children gave him the drive to fight his MND.

  My kids inspire me, says Burrow in final podcast series

  In a podcast episode before his death, Rob Burrow said his children Macy, Jackson and Maya were his inspiration

  Rugby league star Rob Burrow has described how his three children inspired him "never to submit" to motor neurone disease, in an interview recorded before his death. The former Leeds Rhinos player said he hoped his children - Macy, Maya and Jackson - knew how much they meant to him and spoke of his agony of not being able to hug them. The interview saw Burrow, who died from MND in June, answer questions from guests from the sporting world, including Rio Ferdinand, Wayne Rooney and Mike and Zara Tindall. It was one of five new podcasts he recorded before his death as part of his award-winning "Rob Burrow Seven, Meets...".

  His wife, Lindsey, who was by her husband's side during the recordings, said he would "want people to hear the episodes and the fun and the laughter". "He just got on with life and I think he'd be proud to have this series out, I really hope people enjoy listening to it and remember what a great guy Rob was," she added.

  Lindsey Burrow said her husband would have wanted people to hear the podcast

  In the first episode of the new series, Burrow, normally the one asking the questions, was the one put on the spot by guests from the first series. Answering a question from Gabby and Kenny Logan about who inspired him, Burrow said it was his three children. "They inspire me to stay strong and keep a positive mindset," he said. "They are the reason I will never submit to this horrible disease. I want to be around to see them grow up and be here for as many milestones as possible." Responding to a question from former Manchester United and England defender Rio Ferdinand on what the most difficult thing about having MND was, Burrow said it was "not being able to be the dad he wanted to be". "It's the simple things like not being able to give them a hug, play with them or read them a bedtime story," he said. "That's the most difficult part for me, I've always been a hands-on dad."

  Rob Burrow said he wished his children happiness and health above anything else

  "I hope that they know how much I love them," Burrow said. While he said their personalities had given him a hint as to what they might choose to do when they got older all he wished for was their happiness and health. "I hope we've brought them up to have good manners and be kind to others," he said. "Whatever my kids end up doing, I'll be the proudest dad." Mrs Burrow has previously revealed that her husband had recorded messages for his children, to be played as they grew up. Other episodes in the new series will include appearances from retired Lioness Steph Houghton and her husband Stephen Darby, who has MND. Retired boxer turned coach Ricky Hatton will also feature, as well as cricketer Stuart Broad and Burrow's rugby league buddy Kevin Sinfield. All episodes from series one are available here, with series two available on BBC Sounds and BBC Radio Leeds from 26 September. Listen to highlights from West Yorkshire on BBC Sounds, catch up with the latest episode of Look North or tell us a story you think we should be covering here, external.
