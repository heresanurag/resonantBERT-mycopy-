title: Residents swarm refuse lorry in Birmingham as bin strike bites - BBC News
date: '2025-03-20'
section: General
url: http://www.bbc.co.uk/news/videos/c78ey1245w2o
content: |-
  Rubbish is piled high on streets in Birmingham after refuse workers went on all-out strike last week.

  A mobile refuse collection service descended into chaos as Birmingham residents attempted to dispose of their ever-growing waste amid an all-out bin strike.

  The collection lorry was swarmed by so many people as it attempted to travel along Anderton Park Road, in Moseley, that a local councillor called police.

  Residents from surrounding neighbourhoods scrambled towards the lorry as the city continues to be plagued by piles of rubbish because of the industrial action by refuse workers.
