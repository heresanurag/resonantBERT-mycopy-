title: 'Newspaper headlines: ''Winter fuel anger'' as ''scores of MPs could rebel''
  - BBC News'
date: '2024-09-08'
section: The Papers
url: http://www.bbc.co.uk/news/articles/cn7l3r3lz1go
content: |-
  The majority of Monday's newspapers focus on Labour's plan to cut winter fuel allowance from most pensioners.

  'Starmer faces winter fuel anger' as 'scores of MPs could rebel'

  The row about the government's decision to scrap the winter fuel allowance dominates the front pages. Looking ahead to Tuesday's Commons vote, the Guardian says "up to 50" Labour MPs could refuse to back the plans, external. Sources tell the paper that "dozens" could abstain or be absent, but few on the government benches are expected to actually vote against the policy. "Abstention is the new rebellion" says one anonymous Labour MP. Describing the vote as "a key test" of Sir Keir Starmer's authority, the Times says a "bullish" prime minister is "shrugging off" any criticism, external. Government sources tell the paper they are not concerned about the size of any potential rebellion. But it also reports that the Work and Pensions Secretary Liz Kendall spent the weekend on the phone, ringing round "wavering backbenchers." The Daily Mail asks why Labour is pushing ahead with the policy when it claimed that the party's own research back in 2017 warned that cutting the payments could lead to the deaths of thousands of pensioners, external. The paper says the "shocking analysis" was written after Theresa May's Conservative government announced similar plans to scrap the allowance and describes the proposal, which was later dropped by the Tories, as the "single biggest attack on pensioners in a generation". The Mail points out that Sir Keir was in the shadow cabinet when the research was first published.

  "Don't be a fuel, Keir" says the Daily Mirror's editorial. The paper describes the policy as a "political mistake" which "surely merits a rethink." It's urged the government to come up with an "escape route" before tomorrow's vote. The i newspaper says the government could respond to the criticism by announcing plans in next month's Budget for a social tariff, external for energy bills - similar to those for mobile phones. The paper says government officials are weighing up the idea, which would give households on lower incomes cheaper gas and electricity. The Daily Telegraph leads on the findings of a major report on the state of the NHS, due to be published later this week, which will warn that the health service is "going backwards" , externalfor the first time in 50 years. The government-commissioned report, by the surgeon and former health minister, Lord Darzi, will say that progress made since the 1970s on deaths from heart disease is now "in reverse".

  The Times reports that the law enforcement agency at the forefront of the government's plans to tackle trafficking gangs is "in crisis" and is losing more officers than it recruits, external. The paper says a new report on the performance of the National Crime Agency (NCA) concludes that it is "on its knees" due to a lack of funding. The Home Office says it is committed to investing in the NCA. And according to the Telegraph, "lazy joggers" are paying "mules" to run for them, external so they do not lose "kudos" on the popular fitness app Strava. Used by runners, cyclists and swimmers, the app tracks routes and times, allowing amateur athletes to share their progress on social media. But the paper says it has uncovered a new trend where users offer to take on someone else's exercise so they can still boast about how fit they are, even when they are too busy or lazy to do it themselves. Strava says any accounts found violating the apps terms of service will be suspended.

