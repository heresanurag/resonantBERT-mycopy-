title: 'Ukraine: Polish communities help people fleeing war - BBC News'
date: '2022-03-02'
section: General
url: http://www.bbc.co.uk/news/world-europe-60577667
content: |-
  Communities across Poland, and particularly along the border, are rallying to help people who have fled Ukraine.

  Poland is dealing with thousands of people fleeing from the war in Ukraine.

  Communities across the country, and particularly along the border, have rallied to help them.

  The BBC went to a school that has been transformed into a shelter.
