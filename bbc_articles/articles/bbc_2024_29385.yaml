  Westminster City Council says it suspended the Soho venue’s licence following a request by the Met.

  Westminster City Council said it suspended the venue’s licence after a request by the Metropolitan Police

  One of London's most famous private members' clubs, The Groucho Club, has shut following claims a "recent serious criminal offence" had taken place at the premises. Westminster City Council said it had suspended the Soho venue’s licence after a request from the Metropolitan Police. The private members club is understood to have co-operated with the council’s licensing sub-committee, acknowledged the seriousness of the allegations and accepted the decision. A full hearing about the licence will be held within 28 days of when police submitted the review application.

  The Groucho Club was opened in 1985 as a more relaxed alternative to traditional gentlemen’s clubs and has a long association with A-list celebrities. A council spokesperson said the decision to suspend its licence "follows reports that a serious crime may have taken place at the premises in circumstances linked to a breach in the premises licencing conditions". "The allegations are subject to an ongoing police investigation and we cannot comment further at this stage," they said. The Met said its investigation into "a recent serious criminal offence" was still taking place so it could only provide a limited amount of detail. It added further information would be released "when possible". It is understood the fact that a police investigation is taking place was only publicly revealed because the force had to apply for the club’s licence to be suspended, with the hearing having taken place in private. The Groucho Club has been approached for comment.
