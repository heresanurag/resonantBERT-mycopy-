id: bbc_2019_11317
title: Huge explosion at Turkish chemical factory - BBC News
date: '2019-09-19'
section: General
url: http://www.bbc.co.uk/news/world-europe-49749483
content: |-
  A blast propelled a metal tank into the air during a fire at a facility in Istanbul.

  A blast caused by a fire at a chemical factory in Istanbul sent a metal tank flying into the air and injured two fire fighters.

  Several people were affected by fumes, but there were no reported fatalities.
