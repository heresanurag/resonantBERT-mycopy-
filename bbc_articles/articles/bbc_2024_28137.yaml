  Earlier this week, Farrell suggested some of his players were "lucky enough" to retain their place in the starting line-up after a flat performance against the All Blacks. But the Englishman said he only received the response he wanted "in parts" against an impressive Pumas side. "I think if I can try and sum it up of where we're at, when you're looking at two top sides that we've played in the first two weeks, it looks like we're still trying to find our feet in the intensity of the full 80 minutes for that top 1% games. "New Zealand and Argentina have been playing those games for the past five or six months. "It looks like our lads, some of them, are a little bit shy of that intensity. Hopefully we're building through this month and we'll see the best of us in the next few games."
