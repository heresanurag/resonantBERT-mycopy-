title: Bath University makes students resit exam after giving answers - BBC News
date: '2024-01-22'
section: Somerset
url: http://www.bbc.co.uk/news/uk-england-somerset-68056937
content: |-
  A university accidentally printed the answers on one of their exams and is making students resit.

  The University of Bath handed out the answers and marking scheme to an exam

  A university accidentally printed the answers on one of their exams and students are now protesting the exam's resit date.

  The University of Bath handed out the answers and marking scheme to an exam.

  Now more than 400 economics students have to resit, causing problems for international students who were planning to fly home at the time of the new exam date.

  The university told BBC Points West that they are "very sorry".

  A student, who wanted to remain anonymous, said he was initially "confused" when he saw the exam papers included the answers.

  "I just continued with the exam and used the marking scheme as help towards my answer," he said.

  "I thought - who on earth managed to do this? I was quite angry, too. It was chaos."

  More than 150 students have so far signed a petition asking the university to reconsider the resit date

  The exam went ahead with the answers, without any further communication during the exam, the student added.

  It was only on the next day that they found out there would be a resit date.

  "The majority of us were upset with what the resit date was. We started submitting formal complaints," the student said.

  More than 150 students have so far signed a petition, asking the university to reconsider the resit date, which is on Friday.

  They say international students have already booked flights home during that date, assuming they would be done with exams by then.

  They also say the stress of preparing for a second exam is "unfair".

  "I think the university needs to understand the stress and anxiety, performances are definitely going to fall," the student said.

  "I feel like I will get less marks than I am capable of.

  "This isn't a small mistake they can brush under the carpet, they need to take responsibility."

  In a statement the University of Bath said: "Events like this are rare. We are taking steps to make sure it does not happen again.

  "To ensure quality standards are met, students will need to repeat the assessment for this module with a different exam paper.

  "This is important to assist in ensuring that their achievements can be properly recognised and to uphold the quality and integrity of their degree."

