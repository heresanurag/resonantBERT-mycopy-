  Gunn herself had previously said she was “never” going to be able to beat her powerful competitors, so had “wanted to move differently, be artistic and creative”. In a video posted to social media in the eye of the public storm, Gunn added that she had taken the competition “very seriously”. “I worked my butt off preparing for the Olympics and I gave my all. Truly.” She had only been trying to “bring some joy”, she said. "I didn't realize that that would also open the door to so much hate, which has frankly been pretty devastating.”

  Spice and Russ were early disciples of the Australian hip-hop scene

  Some within the Australian hip-hop community admit the response to Raygun’s routine initially elicited “a chuckle” - but it quickly got out of hand. Everyone was unequivocal in condemning the sheer volume of abuse, ridicule and misinformation that has targeted Raygun and the broader Australian B-girl community. But beyond that, the feeling is somewhat split. Many B-girls say Raygun’s performance does not reflect the standard in Australia. “When I first saw it, I was so embarrassed,” Spice – who retired from breaking years ago – says. On any other stage, Raygun would have been encouraged and supported for “having a go”, Spice says, but people representing the country need to be at a certain level. “It’s the Olympics for God's sake! “In hip-hop we have this thing, you step up or you step off... You need to know your place.” She stresses, though, that the “bullying is just disgusting” - and many like herself have been reluctant to speak up out of fear of adding to Gunn's anguish.

  But the impact of the controversy on local Australian B-girls has also been "devastating", Tinylocks told the BBC. Like some others the BBC spoke to, she did not want her full name published because of the scale of abuse that is circulating. B-girl’s videos are being trolled, their DMs inundated with insults and violent threats. Young dancers are being harassed at school, and many now feel unsafe practising in public. "Telling us to be positive and supportive while we are being harmed is unacceptable... [we’re] allowed to be angry,” she said in a statement. Tinylocks – who herself has battled Raygun – thinks Gunn simply had a terrible day, but says there are questions about her preparation and routine that need answering. “We know you're capable of more... Were you set up for success?”

  According to Wepiha, Gunn's victory in qualifying reflects the size of the “tiny” breaking scene in Australia, and the even tinier public and government support for it. "I mean, we had to actually get people out of retirement to make up the numbers," he said. "That's how small the scene is." Others says there were rules which may have made a small talent pool even shallower – like the requirement that potential qualifiers be a member of AUSBreaking and that they have a valid passport, in line with rules put forward by the World Dance Sport Federation. AUSBreaking did not respond to the BBC’s queries about Raygun’s selection, the financial support it receives or how it seeks out the country’s best breaking talent. But Steve Gow, the group’s secretary and long-time b-boy Stevie G, tells the BBC the size and isolation of Australia inhibits the growth and development of the scene. Being so distant from other, bigger hip-hop communities abroad can make it hard – both in terms of time and money – to learn from them. “It can be very insular,” he says. As if proving the point, he regularly pauses to greet almost everyone who walks into the Red Bull competition, which he is judging. He insists there is still a high quality of breaking in Australia.

  A B-girl competes to qualify for the Red Bull BC One World Final

  Ultimately, the community is bitterly hurt by the world’s response. They feel breaking isn’t truly understood, and that people have piled on without knowledge or context. “It’s a big disappointment because they’re not talking about the winners... they’re all talking about Raygun’s memes, and they’re not even seeing her full set,” Samson Smith – a member of hip-hop group Justice Crew – told Network 10. But many hope a silver lining may yet emerge. "She might actually bring enough attention to get resources,” Wepiha said. “At the end of the day, Australia has the most famous Olympian of 2024 and she might actually save the scene here."
