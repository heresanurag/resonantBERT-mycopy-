content: |-
  The Australian hip-hop community has been shaken by the reaction to Raygun's efforts in Paris.

  How Raygun made it to the Olympics and divided breaking world

  When breaker Rachael Gunn – aka Raygun – bombed out of the Paris Olympics, the shockwaves hit a tiny hip-hop scene on the other side of the world. In a Sydney warehouse-turned-community centre, breakers warm up with ab exercises that would make a Pilates teacher cry, before taking to the floor with acrobatic moves so intricate you can barely make them out. It is one of the most important events of the year – a qualifier for the Red Bull BC One World Finals – and the past week weighs heavy. A few people nervously glance at the handful of cameras lining the dance circle, their minds no doubt flashing to images of Gunn which have set the internet alight. “I feel like it's just pushed our scene in Australia into the Dark Ages,” Australian hip-hop pioneer Spice told the BBC. Gunn, a 36-year-old university lecturer, lost all three of her Olympic battles in viral fashion, her green tracksuit and unorthodox routine – which included the sprinkler and kangaroo-inspired hopping – generating waves of memes and abuse. The fallout has divided and disappointed the Australian breaking community. “It made a mockery of the Australian scene and I think that's why a lot of us are hurting,” Spice says.

  Many have rushed to defend Raygun against the onslaught. Others are ready to admit there are questions to be answered over her qualification and performance, but say the global bullying has undermined any attempt to fairly analyse what went down in Paris.

