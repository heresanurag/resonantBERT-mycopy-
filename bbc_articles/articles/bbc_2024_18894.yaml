  Gunn was always a dancer - albeit in jazz, tap and ballroom first - but it was her husband and coach Samuel Free that introduced her to the world of breaking when she was 20. She says it took years to find her place in the male-dominated scene. “There were times that I would go into the bathroom crying because I was so embarrassed at how terrible I was at this,” she told The Guardian Australia ahead of the Olympics. Eventually though, Gunn became the face of breaking in Australia – a top-ranked B-girl and an academic with a PhD in the cultural politics of the sport. And at an Olympics qualifying event in Sydney last October, where 15 women from across Oceania competed, Raygun emerged triumphant and booked her ticket to Paris. Like Gunn, breaking was perhaps a surprising candidate for the Olympics. Born in the cultural melting pot of the Bronx in the 1970s, the street dance quickly became a global phenomenon. And in recent years it caught the eye of Olympics chiefs desperate to attract new and younger audiences. Some argued it didn’t deserve Olympic attention, while others insisted a competition like that could not capture breaking’s essence and would only further divorce the artform from the street culture it came from. All eyes were on the event in Paris to see if the Olympic Committee’s gamble would pay off.

  From the moment the final B-girl battle at the Olympics wrapped up, it was clear that breaking had indeed captured global attention – or, more specifically, Raygun had. Rumours and criticism of her performance spread like wildfire, particularly online. Gunn received a torrent of violent messages, and an anonymous petition demanding she apologise was signed by 50,000 people.

  She was accused - without evidence - of manipulating her way onto the world’s biggest stage at the expense of other talent in the Australian hip-hop scene. Some people shared a conspiracy that she had created the governing body which ran the Oceania qualifiers, and a lie that her husband - who is also a prominent breaker and a qualified judge - was on the panel that selected her. Australian factchecking organisations, external and AUSBreaking, the national organisation for breaking, quickly tried to correct the record, but that didn’t stop the flood. Then there were those arguing that she had mocked and appropriated hip-hop culture. "It just looked like somebody who was toying with the culture and didn't know how culturally significant it was,” Malik Dixon told the Australian Broadcasting Corporation.

  In a series of statements, AUSBreaking stressed that judges were “trained to uphold the highest standards of impartiality” and that not a single person on the nine-person panel for the Oceania qualifiers was Australian. And while AUSBreaking has had many “interactions” with Raygun since its conception in 2019, at no point has she ever held a leadership position or been involved in “any decision making over events, funding, strategy, judge selection or athlete selection”. Taking to Instagram to rubbish all the “crackpot theories”, Te Hiiritanga Wepiha - a Kiwi judge on the Oceania qualifying panel - said Raygun won fair and square. “All us judges talked about how she was going to get smashed, absolutely smashed [at the Olympics]... She knew it was going to be rough, so it's actually courageous of her," Wepiha – also known as Rush – said in a livestream Some of the country’s most decorated athletes and highest Olympic officials also loudly defended Gunn. "The petition has stirred up public hatred without any factual basis. It's appalling," the Australian Olympic Committee’s Matt Carroll said.

