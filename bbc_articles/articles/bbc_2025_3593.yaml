  Aston Villa manager Unai Emery will get a shot at redemption for the lowest point of his stellar European career when he faces former club Paris St-Germain in the Champions League quarter-final. This master operator ensured Villa completed the formalities of a last-16 win over Club Brugge with the minimum of fuss as a routine 3-0 win at Villa Park gave them a 6-1 aggregate victory. It sets up a mouth-watering meeting with PSG, conquerors of Liverpool and the coming force in this season's Champions League, for a place in the semi-final. For Emery, it is the chance to take Villa's dream even deeper into the tournament, but it is also an opportunity to heal the scars left behind following his mixed two years in charge at PSG. Emery's three successive Europa League wins with Sevilla earned him the opportunity to succeed Laurent Blanc at PSG in August 2016. He left with one league title in 2018, but a Champions League last-16 tie against Barcelona, who were then coached by current PSG incumbent Luis Enrique, left a wound which victory in the last eight may at least go some way towards healing. It encompassed arguably the highest and lowest points of a turbulent two years, with the Barcelona of Lionel Messi, Luis Suarez and Neymar thrashed 4-0 in the first leg in Paris in February 2017. In a never to be forgotten second leg the following month, Barcelona won 6-1, with three goals in the last seven minutes, including Sergi Roberto's 95th-minute winner. Even after emerging victorious, Barcelona's Enrique described the tie as "a horror movie not a drama". For Emery and PSG it was worse, not helped by officiating that is still a bone of contention in Paris to this day. The two coaches will now meet again, with Enrique in charge of a young, vibrant cohesive PSG and Emery leading a Villa team carrying all the organisation and fierce discipline that are his hallmarks. It will make for a fascinating contest - and one which will be freighted with meaning and significance for Emery.

