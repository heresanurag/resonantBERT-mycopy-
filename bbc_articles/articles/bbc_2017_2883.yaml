title: David Hockney on Tate Britain retrospective - BBC News
date: '2017-02-06'
section: General
url: http://www.bbc.co.uk/news/entertainment-arts-38888772
content: |-
  David Hockney reflects on his career as the Tate Britain puts on the biggest ever retrospective of the artist's work.

  David Hockney has told the BBC he's "not that good, but not that terrible either", as the Tate Britain puts on the biggest ever retrospective of the artist's work.

  He spoke to the BBC's arts editor Will Gompertz.
