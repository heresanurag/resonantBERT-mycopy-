title: Tougher visa rules should reduce migration by 300,000 a year - Cleverly - BBC
  News
date: '2023-12-04'
section: UK Politics
url: http://www.bbc.co.uk/news/live/uk-politics-67612152
content: |-
  The salary needed for skilled workers is rising to £38,700, and care workers will not be allowed to bring dependants.

  Today the focus was on legal migration, but as soon as tomorrow it's likely to be on illegal immigration - and the government's frequently thwarted aim of sending migrants to Rwanda.

  Net migration - the difference between the number of people coming to live in the UK and those leaving - has ballooned at just the point (after Brexit) that the government at Westminster holds all the levers to control it.

  That is an accountability pinch point if ever you saw one - hence the anguish of many Conservative MPs attempting to reconcile a number treble the one they promised to cut four years ago.

  That is the context for today's plan - which at its heart has the claim that around 300,000 people who were eligible to come to the UK last year would not be able to in future.

  But what of the trade offs - the consequences for care homes and universities, for instance? And what of the political implications, given it could be after the general election before these policies - if retained - make any significant difference to the numbers?

  For ministers, this is about showing they get it and that plenty want to see the numbers shrivel. The big questions are will they, and when?
