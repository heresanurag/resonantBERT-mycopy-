content: |-
  The princess has begun to return to some public duties since finishing chemotherapy in September.

  Princess of Wales to host Christmas carol service again this year

  The Princess of Wales's annual Christmas carol service is to go ahead this year and will celebrate people from "all over the UK who have shown love, kindness and empathy" to those in need of support. Kensington Palace said the fourth Together At Christmas service will take place at Westminster Abbey on 6 December. The event will come at the end of a year during which the princess has had to largely withdraw from public duties following a cancer diagnosis, a period that the Prince of Wales recently described as the hardest of his life. Over the weekend, the princess took part in a number of Remembrance events, making her first major formal appearances since finishing chemotherapy.

  The carol service is supported by the Royal Foundation, the charity which supports the work of the prince and princess. It will be attended by other members of the royal family along with around 1,600 invited guests, among them people who have worked to support others in their personal lives, through their work, or by volunteering in their communities. Those being honoured have been nominated by charities associated with the royal family or by lord lieutenants, who represent the King in counties around the country. The event will also hear musical performances from stars including Paloma Faith, Olivia Dean, and Gregory Porter. It will be filmed and broadcast on ITV1 as part of a special programme on Christmas Eve. In total, fifteen Together At Christmas services will take place around the country, including at the Royal Cornwall Hospital in Truro and Blackpool Tower Circus. Kensington Palace said the service would provide "a moment to reflect upon the importance of love and empathy, and how much we need each other, especially in the most difficult times of our lives". "The service will shine a light on individuals from all over the UK who have shown love, kindness and empathy towards others in their communities," it said. It said the princess wanted to "celebrate the many people supporting those in need - individuals who have inspired, counselled, comforted, and above all else shown that love is the greatest gift we can receive". "This theme takes inspiration from the Christmas story which encourages us to consider the experiences of others and the important human need of giving and receiving empathy," it said.
