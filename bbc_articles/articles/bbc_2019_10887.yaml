id: bbc_2019_10887
title: Girl dies following hit-and-run crash in Kenton - BBC News
date: '2019-09-26'
section: Tyne & Wear
url: http://www.bbc.co.uk/news/uk-england-tyne-49838064
content: |-
  A 23-year-old man, believed to be the driver, has now been arrested, police said.

  Floral tributes have been placed at the scene

  A girl who was run over in what police have described as a hit-and-run crash has died in hospital.

  The 10-year-old was struck on Hillsview Avenue in Kenton at about 18:40 GMT on Wednesday, by a Renault Kangoo that was abandoned nearby.

  Northumbria Police said a 23-year-old man, believed to be the driver, had now been arrested.

  A second 23-year-old man has also been detained on suspicion of assisting an offender.

  Two women, aged 31 and 28, were earlier arrested on suspicion of perverting the course of justice.

  Ch Insp Chris Grice said: "This is a horrific incident that has robbed a family of their little girl and has had a significant impact on members of the community in Kenton.

  "We know this has had a big impact on the community but we know that the public will rally together at this difficult time to support the victim's family."

  He urged anyone with information about the crash to contact the force.

