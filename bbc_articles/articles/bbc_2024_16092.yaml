  Katharine Gale, 50, is a women's health nurse in Lampeter, Ceredigion. She also has endometriosis and was on a medication called Zoladex, similar to Prostap, in her thirties. When the peri-menopause began in her early 40s, she realised many women were not equipped to cope with it. "I was on my knees, I was really overwhelmed and burned out," she said. She said one in 100 women were under the age of 40 when they start going through the menopause. "For women going through that at a much younger age, when their friends are starting to think about having a family or they're at university, it can be really challenging." She said "we need to talk about the menopause more", adding there was a "lack of awareness" of help available. "I think we're really failing women around their health."

  Women's health nurse Katharine Gale says menopause needs to be more openly spoken about to break taboo

  Dr Michelle Olver, a sexual and reproductive health consultant, leads a specialist menopause clinic within Aneurin Bevan University Health Board, as well as a private clinic covering south Wales. She said balancing the symptoms of endometriosis with the side effects of "being switched off" and add-back hormones was tricky, emphasising health services were moving away from a "one size fits all" approach, but admitting access to support was a "postcode lottery". Dr Olver also teaches medical students at Cardiff University about the menopause, but such classes were not on offer when she trained.

  Emma hopes things can improve for young girls like her nine-year-old daughter Belle

  Emma worries about the future, particularly for her nine-year-old daughter Belle. "It petrifies me," she said. "I don't think my daughter quite understands what mummy's tummy troubles are, because I don't want to put the fear into her." She added: "There are young people messaging me every single day saying they're having awful problems and no one is believing them." The Welsh government said health secretary Eluned Morgan had "made clear her commitment to improve women's health services", with a 10-year women's health plan for Wales due to be published by the end of this year. "We recognise that there are improvements to be made in menopause and endometriosis care, treatment and support and greater consistency in those services is needed across Wales," it said.
