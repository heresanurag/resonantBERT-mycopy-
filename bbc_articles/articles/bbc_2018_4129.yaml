  Verne Troyer, who also appeared in Harry Potter as well as Celebrity Big Brother, has died at the age of 49.

  Verne Troyer, who played Mini-Me in two of the Austin Powers comedy films, has died at the age of 49, according to statements posted to his social media accounts on Saturday.
