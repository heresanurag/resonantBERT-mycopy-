title: Edgbaston murder arrest after man shot dead and another critically injured
  - BBC News
date: '2024-11-24'
section: Birmingham & Black Country
url: http://www.bbc.co.uk/news/articles/cy87menepe9o
content: |-
  Police say a man in his 20s was found in a car and pronounced dead at the scene.

  Residents said they heard three gunshots as they sat watching television

  A man has been arrested on suspicion of murder after a man was shot dead and another critically injured in Birmingham. Police found the dead man, in his 20s, slumped in a car and the other wounded at a nearby bus stop after he apparently tried to flee the gunman. Officers were called to Rotton Park Road in Edgbaston just before 23:00 GMT on Friday. The suspect, in his 30s, remains in custody while police continue searching for evidence at the scene.

  Police and ambulance crews were at the scene on Saturday

  Mohammed Faisal, who lives near where a cordon was set up on Rotton Park Road, said he was watching television when he heard gunshots. He said he heard two shots, shortly followed by a third. "Five minutes later I saw the blue lights turn up and I knew something bad had happened," he said. "We get a lot of crashes by the junction here, so I wondered if it was that at first but then it became obvious it wasn't. "It's extremely worrying especially when you have children living here like I do. You don't want something like this happening near your home."

  Police walked slowly along the road in their search for evidence

  The injured man, in his 30s, was taken to hospital, where he remains in a critical condition, West Midlands Police added. Det Insp Nick Barnes said: "This is a tragic incident, and we have worked through the night to understand exactly what happened. "We've already made good progress and arrested a suspect, but I still need to hear from anyone who was in the area that we've not already spoken to." Anyone with dashcam footage or mobile phone footage from the area at the time is being urged to contact the force. "We really need to hear from you so that we can build as clear a picture as possible of what happened," he added.

