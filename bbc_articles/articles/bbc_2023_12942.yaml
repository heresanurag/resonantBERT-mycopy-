title: Watch moment police arrest nurse Lucy Letby - BBC News
date: '2023-08-19'
section: General
url: http://www.bbc.co.uk/news/uk-66534712
content: |-
  The nurse who was found guilty of murdering seven babies at the Countess of Chester Hospital is led from her home into a police car.

  Cheshire police has released video of the moment Lucy Letby was arrested at her home and taken away in a police car.

  The nurse has been found guilty of seven murders and the attempted murder of another six babies at the Countess of Chester Hospital.

  She was was acquitted of two attempted murder charges and the jury was undecided on the attempted murder of a further four babies.
