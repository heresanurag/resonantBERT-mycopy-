  Demonstrators have targeted Tesla showrooms in recent weeks in protest against Mr Musk's cost-cutting role in Trump's administration, where he is head of the Department of Government Efficiency (Doge). Earlier this week, Trump hosted an event at the White House where he said people protesting against Tesla should be labelled domestic terrorists, while sitting in the driver's seat of a brand new red Tesla that he said he planned to buy. Trump said demonstrators were "harming a great American company", and anyone using violence against the electric carmaker would "go through hell".
