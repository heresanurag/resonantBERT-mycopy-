content: |-
  The Prince of Wales delivers a message in Welsh to wish Wales a "Happy St David's Day".

  The Prince of Wales has delivered a Welsh message to wish Wales a "Happy St David's Day".

  In his address, Prince William said: "Hello. Today, on St David's Day, we come together to celebrate Wales - its history, its culture, and its incredible people.

  "From its breathtaking landscapes to its language, Wales continues to inspire.

  "Today, we will celebrate everything that is magical about Wales.

  "To the people of Wales and everybody around the world, Happy St David's Day."
