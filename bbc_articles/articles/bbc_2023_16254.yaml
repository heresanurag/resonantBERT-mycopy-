content: |-
  Officers say they are concerned for the safety of the 21-year-old, who was last seen on 7 October.

  Lee Johnston was last seen on 7 October

  Police have made a fresh appeal for information about the disappearance of a 21-year-old County Londonderry man.

  Lee Johnston was last seen on 7 October and is being treated as a high risk missing person, police have said.

  A 31-year-old woman and a 33-year-old man arrested following his disappearance were bailed on Tuesday night to allow for further enquiries.

  Mr Johnston was last seen at 17:24 BST in Dunmore Crescent, Cookstown, police said.

  The latest images of Mr Johnston show him in a shop in Cookstown

  On Tuesday, police issued CCTV images of Mr Johnston at a supermarket in the County Tyrone town about 30 minutes earlier.

  They show him in a shop on the Orritor Road between 16:52 and 16:59.

  He has short brown hair with blue eyes, is about 5ft 9ins in height and was wearing a blue hooded top and tracksuit bottoms, officers explained on Wednesday.

  Supt Michael O'Loan appealed directly to Mr Johnston "to make contact with the police, family or friends so that we know you are safe and well".

  He said it was "completely out of character" for Mr Johnston not to have been in contact with his family since he was last seen.

  Police attended the scene of a property in Maghera on Tuesday

  Mr Johnston was first reported missing on the evening of Friday 13 October.

  Supt O'Loan appealed to anyone travelling through Mullagh Park between 15:00 and 16:00 or the Dunmore Crescent area of Cookstown shortly after 17.00 BST on 7 October to contact police if they have any information.

  He also urged anyone with dash-cam, CCTV or mobile footage to get in touch.
