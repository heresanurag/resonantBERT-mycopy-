title: Deadly Florida casino boat fire - BBC News
date: '2018-01-15'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-42687537
content: |-
  A woman dies and over a dozen people are injured north of Tampa, Florida.

  A 42-year-old woman has died in a casino boat fire north of Tampa, Florida.

  Over a dozen people were injured after the fire broke out near New Port Richey, forcing passengers to abandon ship and swim to shore.
