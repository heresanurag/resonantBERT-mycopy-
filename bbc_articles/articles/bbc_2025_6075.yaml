  Despite carving out more time for herself, the former first lady said she still finds time to "give speeches, to be out there in the world, to work on projects. I still care about girls' education". The Obamas celebrated their 32nd anniversary last year in October. Mrs Obama has previously been open about the struggles she faced in her marriage due to Mr Obama's political ambitions and time in the White House in her best-selling memoir, Becoming. She wrote in the book that her husband's aspirations resulted in loneliness and exhaustion.
