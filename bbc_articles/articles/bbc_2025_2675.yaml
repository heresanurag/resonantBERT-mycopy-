title: American Newcastle United fan flies 14 hours to watch games - BBC News
date: '2025-02-05'
section: General
url: http://www.bbc.co.uk/news/videos/c70qdz527veo
content: |-
  John O'Hare has a love of English football and travels more than 4,000 miles to watch his team.

  An American man with a passion for English football regularly travels more than 4,000 miles to follow his team.

  John O'Hare, from Oklahoma, supports Newcastle United and is a familiar face at St James' Park.

  His father was born on Tyneside, but was raised in New York.

  The avid Toon fan says his team has the most passionate fans in English football.

