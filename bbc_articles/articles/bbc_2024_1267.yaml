id: bbc_2024_1267
title: 'Ecuador: Watch gunmen threaten presenter on live TV - BBC News'
date: '2024-01-10'
section: General
url: http://www.bbc.co.uk/news/67927623
content: |-
  Armed men are seen pointing guns at staff inside a live TV studio in the city of Guayaquil.

  A live broadcast by the TC television station in the city of Guayaquil was interrupted on Tuesday by a group of armed men who were wearing hoods and carrying guns.

  It came a day after a 60-day state of emergency began in the country.
