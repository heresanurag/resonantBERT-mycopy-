title: French winemakers fan flames to save 2022 crop - BBC News
date: '2022-04-08'
section: General
url: http://www.bbc.co.uk/news/world-europe-61025658
content: |-
  Sudden and sharp frosts in France this week are threatening this year's vintage.

  Climate extremes in France this spring have again made it a race against time for vineyard owners to protect their crops.

  March warmth and April frosts in 2021 resulted in one of the country’s lowest wine production in years. This year is proving every bit as tough.
