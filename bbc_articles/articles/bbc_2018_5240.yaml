  Bruce, who began his morning show an hour earlier than usual, praised Alexander for filling in at short notice.

  "Dear old Chris has suffered a bereavement in his family," he told his listeners. "We're all wishing him the very best."

  Good morning everyone. The reason I'm not with you today is because just before we came on air my mum passed away and I needed to go straight back home to be with the family. But it's all OK, in fact it's very OK. Mum needed to be at peace.

  Moreover, she deserved to be at peace. We've been ready for this for some time now and, as she has throughout her life, in death she's brought us together. She was an incredible woman.

  Anyone who's ever met her will tell you that and ultimately there was no battle lost, only a life won. Every single day. I'll be back tomorrow.

  If Mum had the first idea I might not have shown up today because of her she'd have been furious. I hope you all have a lovely Thursday. See you tomorrow.

  Listeners to Evans' breakfast show were often kept abreast of his mother's activities. Last year, the DJ revealed on Twitter she had tried pizza for the first time at the age of 91, after undergoing an eye operation.

