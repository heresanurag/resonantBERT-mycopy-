id: bbc_2019_6974
title: 'Sudan crisis: Security forces attack protesters - BBC News'
date: '2019-06-04'
section: General
url: http://www.bbc.co.uk/news/world-africa-48505400
content: |-
  Video from Khartoum shows injured people and the sound of gunfire as tensions spill over into violence.

  Sudanese security forces have attacked a pro-democracy protest camp outside military headquarters in the nation's capital, Khartoum.

  Sources in Sudan say that at least 30 people have been killed, with many more injuries reported.

  There have been protests in Sudan since last December. In April they caused former President Omar al-Bashir to stand down after 30 years in power.
