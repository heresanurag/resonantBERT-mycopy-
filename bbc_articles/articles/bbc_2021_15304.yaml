  Ashton Braithwaite's been a fan of Little Mix for the full ten years, and he says he's OK with the trio's decision to take time out.

  "I think most of us saw it coming anyway. Ever since Jesy left, we thought this would be the route that they took," he tells Radio 1 Newsbeat.

  Ashton says before Little Mix, he would only listen to R&B and hip hop - but now describes himself as a "massive pop-head".

  "It's sad but it's not the worst thing in the world," says Ashton, who's looking forward to the future of Little Mix

  Kirsty Hillitt remembers voting for Little Mix on X Factor in 2011 - and has tickets to see them in Cardiff in 2022.

  "I'm so, so gutted really. I love their music and I'm gutted we won't be hearing it from a while," she tells Newsbeat.

  "But coming from a personal level, I can completely understand the girls needing to recharge, they've grown so much in the last 10 years. They've got to have a dabble at other things."

  Kirsty says she's "gutted" but hopes Little Mix get what they need from their hiatus

  But this isn't the first time a massive pop group has announced a temporary split, only for years to pass without getting back together.

  When One Direction separated in 2015, that was only described as a "temporary move".

  But Ashton and Kirsty are confident in Little Mix's promise to fans, and their strength as a group.

  "I'm pretty optimistic about it," says Ashton.

  "Little Mix have a different chemistry than other groups, they're very close. I do believe them, they've always delivered on their promises."

  And Kirsty says fans can see the trio's connection through their interactions with each other and their followers.

  "I feel like, when that connection is there, it's not going to go anywhere," she says.

  "They've supported each other through their own projects, and that's the difference to when you see some bands breaking up - you know it's not there any more."

  When Newsbeat spoke to Little Mix on the red carpet at the 2017 Brit Awards, they told us they were "never splitting up, ever."

