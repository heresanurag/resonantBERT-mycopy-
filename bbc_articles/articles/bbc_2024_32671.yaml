title: Lando Norris on McLaren's long but 'lovely' journey back to the top of F1 -
  BBC Sport
date: '2024-12-08'
section: Formula 1
url: http://www.bbc.co.uk/sport/formula1/articles/cy7kgg5lxeeo
content: |-
  McLaren's first constructors' championship since 1998 came after the team needed "great resilience and great belief" to return to the top of F1.

  McLaren's 'perfect' ending after being 'on the brink'

  McLaren were fourth in the 2023 constructors' championship, 538 points behind winners Red Bull

  Through six years at McLaren, through all the highs and lows sport can deliver, Lando Norris has always said he had the confidence that the team would get back to the top. On Sunday, Norris' victory in the Abu Dhabi Grand Prix, his fourth of his breakthrough year in Formula 1, justified that confidence and sealed the team's first constructors' championship for 26 years. "It's been a lovely journey," Norris said. "To end the season like this is perfect. "It feels wrong to say that McLaren have not won a championship in 26 years. Delivering that for the team has put the biggest smile possible on everyone's face. This is the biggest reward you can give back to everyone who designs the car, builds the car, gets the partners. "Everyone has played such a big part, so just proud. Proud is my biggest thing." McLaren are Formula 1's second longest-lived team, and the second most successful in terms of race victories, in both cases behind Ferrari, the team they pipped at the post this year by 14 points. So, "wrong" is certainly one word to use to describe a quarter-of-a-century gap since they were last crowned the best team in F1, a year before Norris was born. It was close, in the end. After Norris' team-mate Oscar Piastri was taken out of contention by a collision with Max Verstappen's Red Bull at the first corner, the pressure was on. Ferrari's Charles Leclerc worked wonders to move up from 19th on the grid to finish third behind team-mate Carlos Sainz, and one slip-up by Norris, or with his car, would have meant it was Ferrari who ended a long drought - theirs dating back to 2008. But Norris and his team were perfect. And as the tensions of the longest season in history were released on Sunday night at Yas Marina in wall-to-wall smiles and a waterfall of champagne, team principal Andrea Stella, one of the key architects of their return to the top of F1, chose two others. McLaren have needed both in considerable measure to come through what they have to get back to the pinnacle of F1.

