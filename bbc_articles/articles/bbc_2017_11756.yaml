  • None James Anderson's bowling average in the fourth innings v Australia is only 65.57.
  • None David Warner played attacking shots to 36.0% of the deliveries he faced; Cameron Bancroft attacked 6.7% of the time.

  Do England have any chance on Monday?

  There's the slimmest of slim hopes to cling on to, according to the computer model of cricket website CricViz.
