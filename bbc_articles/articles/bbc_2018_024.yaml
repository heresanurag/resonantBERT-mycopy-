title: 'Pope Francis in Peru: Violence against women ''a plague'' - BBC News'
date: '2018-01-21'
section: General
url: http://www.bbc.co.uk/news/world-latin-america-42764572
content: |-
  Pope Francis speaks out as he holds Mass in Trujillo, Peru.

  Pope Francis has urged people to fight violence against women in all its forms.

  The pontiff's comments came as he held mass in Trujillo, Peru.
