title: Footage shows timeline of Nottingham attacks and killer's arrest - BBC News
date: '2024-01-25'
section: General
url: http://www.bbc.co.uk/news/uk-england-nottinghamshire-68095900
content: |-
  Video released by police shows Valdo Calocane's movements and arrest in the Nottingham attacks.

  Footage released by police has shown the movements of triple killer Valdo Calocane and his subsequent arrest following the Nottingham attacks.

  The footage shows Barnaby Webber and Grace O'Malley-Kumar walking home from a night out before Calocane fatally attacked them on 13 June.

  Calocane is then seen moving towards the location where he killed Ian Coates, before stealing his van and driving into three pedestrians in the city centre, all of whom survived but suffered serious injuries.

