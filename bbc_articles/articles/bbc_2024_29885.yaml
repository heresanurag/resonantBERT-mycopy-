content: |-
  A pensioner who was punched in County Antrim over the weekend dies in hospital.

  Daughter's tribute to 'gentle giant' who died after being punched

  Tony Miskimmon was punched in the head on Station Road in Antrim town on Saturday

  The heartbroken daughter of a pensioner who died on Wednesday, after being punched at the weekend, has described him as a "gentle giant" who was well known in the community. Anthony 'Tony' Miskimmon, 74, was punched in the head and knocked unconscious on Station Road in Antrim town on Saturday. He died in hospital on Wednesday, his daughter said. A man appeared in court on Monday charged with grievous bodily harm in connection with the incident.

  The Police Service of Northern Ireland (PSNI) have said all charges, including any additional charges, will be reviewed by the PPS in due course.

  Mr Miskimmon with his two daughters Lani and Nikki Miskimmon

  On Sunday morning Mr Miskimmon’s daughter, Lani, heard the news about her father's injuries. Speaking to the Nolan Show Lani said that “never in a million years would I have thought I'd have that call". When Lani asked the doctor if her father would make it, the doctor said he had a 1% chance of survival. Lani, who lives in Australia, flew immediately to Northern Ireland to visit her father in hospital.

  Lani was shown a scan of her father’s brain which, she said, showed "catastrophic blood all over the brain.

  Lani described how Tony "loved his daughters"

  Lani described her father as a "big character" who loved his grandchildren, daughters and dogs. She last spoke to him on Saturday morning, while he was eating breakfast and getting ready to go to The Dockers Club. The two had discussed plans for him to fly to Australia to see his grandchildren again soon. “He loved his girls,” Lani said about her father adding: “I never went a day without knowing how much I was loved. "I was at the stage now where I wanted more, I could now bring my children over.” She told BBC News NI: “My dad had beautiful big hands and those hands should be holding mine and his grandkids, to think my children aren’t going to have their grandad at their weddings, he’d be incredibly proud.” Lani said the family are "beyond devastated" at his death. “I’m not interested in justice, I just want everyone to know the man you see in the news isn’t just a man, he’s my life.”

  PSNI Det Insp Sean Armstrong offered his deepest sympathy to Tony's family and friends. "Our enquiries are ongoing to establish the full circumstances surrounding Tony’s death and I would appeal to anyone who was in the area of Station Road, Antrim on Saturday 2 November between 19:00 and 20:00 and may have witnessed this incident, or has any other information that would assist with our enquiries to please get in touch," he added.
