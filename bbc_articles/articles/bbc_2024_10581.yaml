content: |-
  The star, fresh from a UK rail adventure for the BBC, talks identity, hate and saving the railway.

  Francis Bourgeois made 87 train stops over five days across the UK for the BBC Travel Show

  "I've got a model railway that runs all the way around my flat," says TikTok trainspotter Francis Bourgeois. This admission will make perfect sense, and perhaps bring a grin, to the millions who follow the 23-year-old on social media. For those less familiar, he's a unique kind of internet celebrity. His trainspotting reaction videos, showing his uncontainable, wholesome excitement as locomotives fly by, appeared to touch people during the pandemic, with comments underneath regularly pointing to the dose of joy he provided. Now, boasting a combined five million plus followers across TikTok and Instagram, life is busy. Celebrities including singer Joe Jonas and retired footballer Thierry Henry have starred in his videos, there's a book to his name, and fashion partnerships, Gucci included. Oh, and a live onstage appearance at a Sam Fender gig, external. Bourgeois, real name Luke Nicholson, grew up in northwest London near Willesden Junction station, sparking his childhood fascination with trains. His parents didn't own a car, so he travelled to school by rail and could see railway lines from the classroom. "I just thought everyone loved trains?" he says earnestly.

  Francis Bourgeois attempts to travel from the southern coast of England to the northern coast of Scotland using only British Railway rolling stock. Watch now on BBC iPlayer (UK Only)

  His grandmother bought him his first train when he was four, which grew into a lifelong passion for model making. "It's been the centrepiece of my railway enthusiasm throughout my life," he says. "In my late teens, I had a model railway that grew and grew... at one point it took over my parents' conservatory." Fast forward a few years, and his latest model in his flat, which travels through his bedroom and into the living room, holds special meaning. It represents the rebirth and acceptance of his passions - set free through TikTok trainspotting videos.

  At age six, Bourgeois and his family left London for Somerset. As a teenager, changing schools escalated social pressure to conform, pushing trains out of first class priority. He sold or threw away his old train models and replaced them with gelled hair, gym workouts, and partying, in hope of fitting in. "It was suppressed under the surface," he says. "Now, having my model railway, the pressure has been released." His TikTok trainspotting videos have taken this further, helping him both "rediscover who I am inside" and "properly own" his trainspotting passion through his famous screen identity.

  Bourgeois says it has taken him some time to adjust to fame, including being stopped by fans

  In 2021, while studying Mechanical Engineering at Nottingham University, Nicolson began posting trainspotting videos using the Francis pseudonym (inspired by artist Louise Bourgeois) to protect his employment prospects - eventually landing a fourth-year internship with Rolls-Royce. These early videos, of course, didn't stay secret around the carmaker office for long. When the plant director mentioned the clips with a smile in passing, Bourgeois knew they had "gone everywhere." It served as a lesson. "I wanted to form a protective bubble over that side of my life; isolate it in a way, but in doing so I realised this is what I want to be." "I started to realise that it's absolutely cool to have this unique passion." Then lockdown happened, almost hand-in-hand with the meteoric rise of TikTok, and Bourgeois came into full view. Now he uploads almost daily. And the sense of fun remains. One early viral video showed him falling off a picnic chair in excitement as a train whizzed past. Although part-comedic, filmed using a go-pro strapped to his head and a distorting fisheye lens, it is the simple intense authenticity of the emotion that keeps eyes watching and his fanbase growing.

