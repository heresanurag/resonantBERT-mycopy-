  Traditional media interest has followed, with a 2022 digital series for Channel 4 taking celebrities trainspotting. Now he is set to front his full-length solo TV debut for the BBC Travel Show. The adventure sees him travel nearly 900 miles, making 87 train stops over five days, riding exclusively on British Railway rolling stock. It's an opportunity, says Bourgeois, to break out of the confines of time-limited TikTok and lift the curtain on trainspotting, as well as his love for the railway, its heritage and its future. "I've found that I have a direct emotional connection with the railway. It doesn't just make me laugh; it can make me cry. "To see a huge full steam locomotive go by at 75 miles an hour - it's such a thrill," he says.

  Bourgeois says he has a "deep emotional connection" to the railway

  During his travels, he spots a train produced by one of the last remaining UK-based train factories and meets volunteers dedicated to preserving iconic railway lines. "For parts of our railway history to potentially disappear is sad. I want people to experience the raw beauty of the railway."

  But the fame of this visceral, niche relationship has also given Bourgeois darker times. When pictures and videos emerged online showing his life outside trains, be it as a teen wearing different style clothes, working out at the gym, or, more recently, enjoying himself at a music festival, some on social media were quick to dismiss his TikTok identity as an inauthentic hoax. "In coming out of my shell with my railway enthusiasm, it felt like I was being pushed back in," Bourgeois says. "Some people believe it's just a facade or a character, but what I feel when I see the trains is raw emotion, and that's what I let through on the camera, uninhibited. "Before, at school, I had these social inhibitions. When I'm out on the railway, everything is stripped back to the raw essence of how I'm feeling." He says trainspotting appeals because it offers both certainty and unpredictability, and goosebumps appear on his arms. In a video addressing the controversy, he openly explained his past struggles to fit in at school and how he now feels confident being his true self. He says people appreciated his honesty, as they related to his experience of finding their identity in school.

  "One of my friends, from the so-called cool group at school said: 'If you had told me about your model railway, I'd have told you about my Lego Star Wars!'" Bourgeois says. Our interview comes amid ongoing conversations around how best to regulate social media. So what would his advice be for those facing online hate? "It's not necessarily helpful to combat it directly", he reflects. "It's better to talk about feelings". He says he's spoken with his girlfriend of around six years, Amy, "for a long time" about the impact of social media. "She's really helped me feel confident", he continues.

  Bourgeois with his girlfriend Amy at a British Fashion Council show

  "Now, I know what I do social media for - for me and my railway enthusiasm. I see the backlash, but I also see the people who love the videos."

  Outside of trains, Bourgeois' other passion is music. I have to ask: Is it headphones in or out when travelling by train? "It depends. Some trains sound amazing but I enjoy travelling at 125mph, immersed in sound," he says, listening to heavy electronica, metal like Brutus, or ambient acts like Stars of the Lid. The latter feature in his ideal headline picks, alongside electronic pioneers Andrew Weatherall and Aphex Twin. The repetitive sounds of electronic music, he says, remind him of trains. And with that he's showing me an edit of Aphex Twin's track AFX, external, which mimics and samples the sounds of an underground train, complete with a twisted reworking of the mind the gap announcement. He offers to curate a playlist, which is reproduced below:

  2. Sandwell District - Falling The Same Way (Regis Mix) 3. The Sabres of Paradise - Ballad of Nicky McGuire

  Bourgeois enjoys electronic music, including from the late Andrew Weatherall, the acid house DJ-turned producer

  But Bourgeois is also intrigued by the mysterious Global Goon, aka Johnny Hawk - once falsely rumoured to be Aphex Twin, and now listed as his former roommate on Spotify. "I emailed him about a track called Thoxitron9 01 that he deleted, and he told me it was on a private SoundCloud playlist, but it's gone now. Luckily, I have a screen recording of it because it's an incredible drum and bass track." For Bourgeois, train tracks are also never too far away, but these days he's definitely following his own. Francis Bourgeois will be on The Travel Show on the BBC News Channel from 00:30 on Saturday 25 May. Watch on BBC iPlayer, here.
