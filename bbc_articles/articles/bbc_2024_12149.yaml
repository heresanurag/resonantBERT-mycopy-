title: Kylian Mbappé urges youth vote to counter 'extremists' - BBC News
date: '2024-06-17'
section: General
url: http://www.bbc.co.uk/news/videos/cgrr3n7y31yo
content: |-
  The footballer says the upcoming French election is an important moment for his country.

  The captain of France's national football team, Kylian Mbappé, has called upon young people to vote in the upcoming French election.

  Speaking ahead of France's opening game at Euro 2024, Mbappé warned "extremists are at the gates of power" and said he wanted to be proud to wear his country's shirt.

  His comments came after the French president Emmanuel Macron called a snap election earlier this month, following a big victory for his rival Marine Le Pen's right-wing National Rally in European elections.
