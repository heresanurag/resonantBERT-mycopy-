title: 'County lines: The search for vulnerable children - BBC News'
date: '2021-05-27'
section: General
url: http://www.bbc.co.uk/news/uk-57271269
content: |-
  The BBC's Angus Crawford joins police as they look for vulnerable young people involved in county lines.

  Charities working to help children involved in county lines drug gangs have told the BBC that they have been overwhelmed since lockdown eased.

  This comes after a week-long operation by police forces across England, Wales and Scotland during which they say more than 570 under-18s were safeguarded.

  BBC News correspondent Angus Crawford joined Northamptonshire Police as they searched for missing teens.
