title: 'Watch: Ukrainian TV films report inside Russia as flag removed - BBC News'
date: '2024-08-18'
section: General
url: http://www.bbc.co.uk/news/videos/ckgwd90dnv7o
content: |-
  Journalist Natalia Nahorna was reporting from the Russian town Sudzha when Ukrainian soldiers threw the flag to the ground.

  Ukrainian television has shown a report filmed in the Russian town of Sudzha - a key settlement in Kursk region which is at least partly controlled by Ukrainian forces.

  It shows Ukrainian soldiers removing a Russian flag from a local school and throwing it onto the ground.

  "Glory to Ukraine!" the soldiers are heard shouting as One Plus One war correspondent Natalia Nahorna reports from the scene. "Glory to heroes!" she responds, completing the slogan widely used by Ukrainians in this war.

  This is the first Ukrainian TV report from inside Russia during the war - an extraordinary development almost two and a half years after the start of the full-scale invasion.

