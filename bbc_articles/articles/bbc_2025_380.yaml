title: 'Swansea: Explosion caught on doorbell camera - BBC News'
date: '2025-01-05'
section: General
url: http://www.bbc.co.uk/news/videos/clykd1069gwo
content: |-
  Residents in the village were shocked after hearing a very loud bang and seeing a large orange flame.

  This is the moment an explosion was captured on a doorbell camera.

  It shows flames and a loud bang in the incident in Penllergaer, Swansea.

  Residents took to social media to find out what had happened.

  A spokesperson for the National Grid said its engineers "quickly located the fault and made it safe", with power restored within 10 minutes.
