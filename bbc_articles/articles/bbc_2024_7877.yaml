title: 'Brigitte Macron: French president''s wife to be subject of new TV drama -
  BBC News'
date: '2024-04-16'
section: Europe
url: http://www.bbc.co.uk/news/world-europe-68831403
content: |-
  The life of the French first lady will be turned into a six-part TV drama series.

  The life of France's first lady Brigitte Macron is to be the subject of a new TV series.

  Production company Gaumont said the six-part series, entitled Brigitte, a Free Woman, would trace the "storybook journey" of Emmanuel Macron's wife.

  The series will start with the first meeting of the couple, one of the series writers said.

  Mrs Macron first met her now-husband when she was a teacher at his secondary school.

  The couple ended up marrying in 2007, when Mr Macron was 29 and Mrs Macron was 54.

  Mrs Macron kept teaching for a time but quit her job in 2015 when her husband began getting involved in politics. He was elected president in 2017.

  The French press describes her as one of only a handful of people whose judgement the president always calls on.

  The new TV series will be written by French writers Bénédicte Charles and Olivier Pouponneau, Gaumont said.

  "Brigitte Macron is a fascinating character, and we want to tackle it in a romantic, almost melodramatic way because of the romantic dimension of her destiny," Ms Charles told Le Figaro.

  Asked about the new production of Mrs Macron's life, an anonymous source close to the first lady told AFP news agency: "We are not associated with this project which we learnt about today in the press."

  The cast of the series is yet to be announced.

  Gaumont is one of France's leading TV production companies. It is responsible for the hit TV series Lupin.
