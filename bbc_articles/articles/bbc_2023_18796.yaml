title: Moment landslide sweeps down mountainside into Lake Garda - BBC News
date: '2023-12-18'
section: General
url: http://www.bbc.co.uk/news/world-europe-67744248
content: |-
  The landslide created large waves and disrupted traffic on lakeside roads.

  Footage shows the moment a landslide swept down a mountainside into Lake Garda, Italy.

  The landslide created large waves and disrupted traffic on roads near the town of Tremosine.

  Rescue teams were deployed to the scene, but Italian firefighters confirmed no one was injured in the incident.
