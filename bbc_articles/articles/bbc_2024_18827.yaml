title: 'Knaphill: Man shot by armed police in Surrey dies - BBC News'
date: '2024-08-16'
section: Surrey
url: http://www.bbc.co.uk/news/articles/c77ln3m7g4jo
content: |-
  Surrey Police says a 29-year-old man has died after being shot by armed officers on Sunday.

  The shooting took place at Nursery Road, Knaphill, on Sunday

  A man has died after he was shot by armed police officers in Surrey on Sunday. Police were called to reports of an altercation between two people, one of whom had a weapon, in Nursery Road, Knaphill, on the outskirts of Woking. The Independent Office for Police Conduct (IOPC) said the man, aged 29, died on Thursday. An investigation into the incident has been launched by the IOPC following a mandatory referral from Surrey Police.

  IOPC regional director, Mel Palmer, said: “This is a tragic incident during which a man sadly lost his life. "We have met with the man’s family to explain our role. Our thoughts are with them and everyone affected by this incident." The man was taken to hospital after being shot at the scene. Surrey Police said he was in a critical but stable condition on Monday.

  The IOPC said it found from police call logs that shortly after 00:30 BST on Sunday officers received a report of an altercation, with a man said to be carrying a firearm on Nursery Road. The caller reported the man then went inside an address. “Armed Surrey officers arrived shortly afterwards and approached the address, with cordons put in place,” it said. “Police body-worn footage shows officers calling for the occupant of the address to come to the door with nothing in their hands. "The man opened the door and appeared to point a weapon in the officers’ direction.”

  The IOPC said one shot was fired by a firearms officer, which struck the man shortly after 01:20. It said a police baton round was also discharged, and officers provided immediate first aid while an ambulance was requested. The investigating body said "a non-police issue weapon" was found at the scene and has been seized. Surrey Police said: "Our thoughts are with everyone affected at this difficult time." It added that it would not comment further on the investigation into the incident.

