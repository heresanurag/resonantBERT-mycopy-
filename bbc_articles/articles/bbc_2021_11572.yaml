  The singer, who announced she had breast cancer in August 2020, has died at the age of 39.

  Girls Aloud singer Sarah Harding has died at the age of 39, her mother has said.

  She had retreated from the limelight re-emerging last August to announce that she had been diagnosed with breast cancer.
