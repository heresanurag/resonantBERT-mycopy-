title: Bionic arm for eight-year-old Mady Gardner - BBC News
date: '2019-08-01'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-49200369
content: |-
  Eight-year-old Mady, the youngest recipient of a bionic arm in the US, requested it be bright pink.

  Mady Gardner from Austin, Texas, was born without a left arm below her elbow. The 'Hero Arm' assists her with everyday living and tenses the same muscles as a biological hand.
