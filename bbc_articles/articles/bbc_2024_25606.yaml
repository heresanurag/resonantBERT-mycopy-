title: Missile becomes musical instrument of hope at Blenheim Palace - BBC News
date: '2024-10-19'
section: Oxford
url: http://www.bbc.co.uk/news/articles/ckgmp1n982ko
content: |-
  The extraordinary instrument will be featured at a concert, raising funds for Ukraine.

  The rocket has been hollowed out and with its explosive components replaced by a bow from a cello

  A musical instrument made from a Russian missile will be featured at a concert held at Blenheim Palace on Saturday night. The Gala Dinner for Ukraine at the estate in Woodstock, Oxfordshire, is being hosted by the Oxbridge Foundation. The Russian rocket that landed in Ukraine two years ago but did not explode has been hollowed out and with its explosive components replaced by a bow from a cello. Helen Clarke, co-founder of the foundation, said that was in an effort to "help to stop this war".

  Ukrainian composer Roman Hryhoriv said the stories and struggles woven into the instrument's creation made it "truly extraordinary”

  The musical instrument will be played in the UK for the first time. Ukrainian composer Roman Hryhoriv, alongside the Kyiv Camerata orchestra, will perform "music of war" on the casing of the Uragan MLRS bomb. Maestro Hryhoriv described playing it as "a ritual of purification". “This isn’t just an instrument to me - it transcends music and the idea of a concert," he said. “No other instrument can come close to its power and outpouring of pain and destruction. “The stories that are woven into its creation and our shared struggles make it truly extraordinary.” The event will raise funds to further help the country’s talented young students get access to education in the UK and US, ensuring the next generation is equipped to rebuild the nation. Ms Clarke said Blenheim Palace was "a very symbolic place" for the concert. "This is where we are trying to unite the efforts and stop this war because this is what happened in the past," she said. "The Battle of Blenheim was very significant for the history of Europe. "This is why we are trying to ... get the same message across - it's now time to stop future wars and this war by finding the right way of peace, as well as cease of the fire." Among the concert attendants will be former footballer and Ballon d’Or winner Andriy Shevchenko and General Valerii Zaluzhnyi, the Ukrainian ambassador to the UK.

