title: '''President Zelensky is a hero,'' says Conservative Party leader - BBC News'
date: '2025-03-02'
section: General
url: http://www.bbc.co.uk/news/videos/ceqjgnvjrp3o
content: |-
  The Conservative leader said her "heart went out" the Ukrainian president after his row with the US president.

  Conservative leader Kemi Badenoch has said her "heart went out" to Ukraine's President Volodymyr Zelensky after his row with US President Trump on Friday.

  Trump and Zelensky's meeting at the White House descended into chaos, with the two leaders engaging in a robust back-and-forth which also involved US Vice-President JD Vance.

  "I watched it, and I couldn't believe what was happening," Badenoch told Sunday with Laura Kuenssber, adding that she believed Zelensky was "being humiliated".
