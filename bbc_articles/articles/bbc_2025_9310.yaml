title: 'Bangor: Man arrested on suspicion of possessing a firearm - BBC News'
date: '2025-05-18'
section: Northern Ireland
url: http://www.bbc.co.uk/news/articles/c706zzry1xeo
content: |-
  Videos posted on social media appeared to show armed police confronting an individual.

  Videos circulating on social media appeared to show armed police confronting an individual on Bangor's High Street

  A man in his 40s has been arrested on suspicion of possessing a firearm with intent to cause fear of violence. It follows an incident in the centre of Bangor on Sunday evening. Videos circulating on social media show armed police confronting an individual along with the sound of gunshots. The Police Service of Northern Ireland (PSNI) said all shots were fired by police officers and "no injuries were sustained as a result of this".

  The shots were fired by specialist teams and, as is normal procedure, the Office of the Police Ombudsman has been informed. Police said they received reports of a man with a gun just before 21:30 BST on Sunday. "Following a public safety operation, involving specialist officers, one man, aged in his 40s was arrested on suspicion of a number of offences including possession of a firearm with intent to cause fear of violence," the PSNI said. The city's High Street was fully reopened by Monday evening.

  The Northern Ireland Ambulance Service said one person was taken to the Ulster hospital. They said they received a 999 call at 21:57 BST on Sunday, and sent two emergency crews and a rapid response paramedic.

  North Down MP Alex Easton said it is a "huge relief that no-one was harmed" and praised the PSNI for their "swift and professional response". "The restraint and composure shown by police officers in such a dangerous and unpredictable situation is to be highly praised," he added.

  Alliance's Connie Egan at the scene of the incident at the top of Bangor's High Street

  Speaking on BBC Radio Ulster's Good Morning Ulster programme, North Down assembly member Connie Egan thanked the police for their handling of an "incredibly delicate situation where police had to balance public safety with the safety of the individual involved". Democratic Unionist Party assembly member Stephen Dunne commended the PSNI for their "brave and decisive action" in dealing with "what was clearly a volatile and delicate situation".

  The Police Ombudsman's Office said: "In line with standard procedure, the PSNI notified us about the discharge of shots by police during an incident at High Street in Bangor. "Our investigators are now making initial enquiries, which will determine whether there are any matters requiring further investigation by the Police Ombudsman's Office."
