id: bbc_2017_1553
title: Eyewitness describes Kyrgyzstan plane crash - BBC News
date: '2017-01-16'
section: General
url: http://www.bbc.co.uk/news/world-europe-38642921
content: |-
  Local eyewitness Uson describes the moment a plane crashed in a Kyrgyzstan village.

  An eyewitness has described the moment a plane crashed in a Kyrgyzstan village, killing all four crew and at least 33 people on the ground.

  Uson said part of the plane crashed on top of his friend's house.
