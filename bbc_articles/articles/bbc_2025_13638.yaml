  Ukraine says it used 117 drones that were first smuggled into Russia, then placed inside wooden cabins mounted on the back of lorries and concealed below remotely operated detachable roofs. The lorries were then apparently driven to locations near the Russian air bases by drivers who were seemingly unaware of their cargo. The drones were then launched remotely. On Saturday, Ukraine released more footage from that attack - showing a single drone's entire flight. US President Donald Trump said on Friday that the Ukrainians had given Putin "a reason to go in and bomb the hell out of them last night". He earlier said that during a phone call, Putin had told him "very strongly" that Moscow would "have to respond" following Ukraine's airfield attacks. Russia launched a full-scale invasion of Ukraine in February 2022. It currently controls around 20% of Ukrainian territory, including the Crimean peninsula it annexed in 2014 after the overthrow of Ukraine's pro-Russian president. Peace talks between the two sides have so far failed to secure a ceasefire, and both sides remain deeply divided on how to end the war, with Ukraine pushing for an "unconditional ceasefire" as a first step, something Russia has repeatedly rejected.
