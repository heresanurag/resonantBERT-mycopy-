content: |-
  The billionaire tycoon was a divisive figure who dominated Italian politics for three decades.

  Berlusconi tried to teach me to shake hands

  At the end of our conversation, with the cameras still rolling, we shook hands. Quick as a flash, he said to me: “Don’t shake hands so strongly! Men will be frightened of you, and no-one is going to marry you!” When I replied, suggesting a firm handshake was a good thing, he insisted he was only joking: “You’ve got to joke every once in a while.” He then proceeded to teach me how to shake hands properly. “Let’s try this again”, he said. “No, no! Too strong! Any man will think you are trying to beat them up!” When the piece was published, many condemned him for his sexism and his lack of respect towards a female reporter. But others – especially at home in Italy – thought the exchange was funny and harmless. In my 10 years as a BBC journalist no other political interviewee has introduced this level of awkwardness. But having grown up in the Italy of Berlusconi, I wasn’t shocked. If anything, I reflected on the fact that there were at least six cameras filming our interview. Berlusconi knew exactly what he was doing. He wanted to be filmed making a joke. Because, he may have figured, that for as many people who would condemn him, there were just as many who would applaud the authenticity of a man who wasn’t going to conform to perceived political correctness.
