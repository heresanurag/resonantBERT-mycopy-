  Tasker, along with Bradley Hall, Greg Cackett and Joel Fearon, also claimed a World Cup bronze at Park City, Utah in November. "We are desperately sorry for Bruce to lose his chance of becoming a two-time Olympian so close to the Pyeongchang 2018 Games," said Team GB chef de mission Mike Hay. GB Bobsleigh performance director Chris Price added: "The last few days have been worrying for all who know and care for Bruce but we are naturally delighted that he is on course to make a full recovery. "We will now ensure Bruce and his family have all the necessary support in place to aid that process." Team GB are aiming for their most successful Winter Olympics ever after UK Sport set a target of at least five medals from February's Pyeongchang Games. Bobsleigh has been set a minimum target of a top-five finish, with hopes that they could even win a medal in South Korea.
