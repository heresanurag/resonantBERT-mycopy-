title: 'Winter Olympics: GB bobsleigher Bruce Tasker to miss Games after stroke -
  BBC Sport'
date: '2018-01-11'
section: Winter Olympics
url: http://www.bbc.co.uk/sport/winter-olympics/42652360
content: |-
  British bobsleigher Bruce Tasker will miss the Winter Olympics after suffering a minor stroke.

  Tasker is hoping to resume his Great Britain career next season

  Great Britain bobsleigher Bruce Tasker will miss the Winter Olympics after suffering a minor stroke on 4 January. The 30-year-old Welshman, who was due to compete in his second Olympic Games in Pyeongchang, is expected to make a full recovery. He was taken to hospital after experiencing dizziness and nausea. "To me, this was a completely freak occurrence. I was unlucky to be in this situation, but I'm lucky to have come out of it unscathed," said Tasker.

  "I'm set to make a 100% recovery and I already feel as though I'm most of the way there." Tasker is hoping to resume his Great Britain career next season. Since switching from a career in athletics in 2010, Tasker has competed at six World Championships and a Winter Olympics. He was part of a four-man crew that achieved fifth-place finishes at three successive global championships, including the Winter Olympics in Sochi, for which he could yet receive a bronze medal following the disqualification of athletes in two Russian crews. He was also part of the team that won the silver at the World Cup event in Lake Placid in 2013.

