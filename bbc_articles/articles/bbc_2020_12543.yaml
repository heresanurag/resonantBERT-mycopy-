title: Moment 180 mph motorcyclist in T-shirt is caught - BBC News
date: '2020-11-25'
section: General
url: http://www.bbc.co.uk/news/uk-55079524
content: |-
  The 19-year-old, filmed by a police helicopter, went through red lights and the wrong way on a motorway.

  Nineteen-year-old Marian Vasilica Dragoi was caught reaching 180 mph on his motorbike in southern England.

  A police helicopter filmed the events leading up to Dragoi's arrest, which happened after he rode on the wrong side of a motorway to get fuel from a service station.

  At Highbury Corner Magistrates' Court he pleaded guilty to offences including dangerous driving and is due to be sentenced in January.
