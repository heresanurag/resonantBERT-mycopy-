title: Mosque defender among men jailed for Middlesbrough disorder - BBC News
date: '2024-08-15'
section: Tees
url: http://www.bbc.co.uk/news/articles/c4gl0nd1yrlo
content: |-
  Noman Ahmed threw a punch at a man after a protest march turned violent, a court hears.

  A man who threw a punch while trying to protect a mosque during disorder in Middlesbrough has been jailed along with others involved in the violence. More than 1,000 people were estimated to have taken to the town's streets on 4 August, days after similar violence erupted in Hartlepool, Teesside Crown Court heard. Eight police officers were injured in Middlesbrough and houses and cars were damaged, prosecutors said. Noman Ahmed, 24, who was part of a group of men who went out to confront the mob, admitted violent disorder and was jailed for 14 months.

  Prosecutor Rachel Masters said a "peaceful protest" in Middlesbrough was advertised on social media, with crowds gathering at the Cenotaph in Linthorpe Road at about 13:45 BST. She said a march set off towards the town centre and was initially non-violent amid chants of "take our country back", but as the marchers passed Clarendon Road an object was thrown at them and the atmosphere became "immediately heated", Ms Masters said.

  Violence erupted in Middlesbrough on 4 August with police attacked and cars set alight

  Police quickly formed a line to stop protestors getting into Clarendon Road which "numerous people attempted to break through", the court heard. "From that point onwards it became violent," Ms Masters said, adding missiles were thrown at officers, bins set on fire and cars and windows smashed. Ahmed, of Harrow Road in Middlesbrough, was part of a "retaliatory group of Asian men" who directed violence towards those involved in the march, Ms Masters said. He was seen on police footage throwing a punch at a man who was being attacked by a larger group and who has not been identified, the court heard. Ms Masters said Ahmed, who was of previous good character, handed himself into police six days later after a public appeal.

  Noman Ahmed handed himself into police after a public appeal was issued

  Mitigating, Gary Wood said Ahmed had gathered with others amid fears their mosque would be targeted but "his intention was not to provoke any form of violence". Ahmed was told there were two men making "racist threats" towards the group and he joined others in chasing them, although he insisted he did not make physical contact with anyone, Mr Wood said. The court heard Ahmed was due to get married at the end of August for which an "enormous amount of money" had been spent, and his family were "devastated" and "disappointed" by his actions. Judge Francis Laird KC said Ahmed's case was different from others being prosecuted for the disorder and the defendant was "deeply ashamed" of his behaviour with "genuine remorse". The judge said he accepted Ahmed had gone to defend his mosque and had been told of people making "racial slurs and threats", but that did "not mitigate" his culpability. He said the public was "rightly outraged" by the disorder and only imprisonment was appropriate.

  Jonathan Ambrose was jailed for two and a half years

  Also sentenced was drug-addict Jonathan Ambrose, 33 and of Letitia House drug treatment centre in Middlesbrough, who was seen at about 19:00 BST near Parliament Road throwing rocks and stones at police officers. In mitigation, his lawyer Tabitha Buck said he had gone to see what was happening and made the "stupid mistake" of getting involved which he now regretted. Ambrose, who had multiple previous convictions including for causing racially aggravated harm or distress, was jailed for 30 months having also admitted possessing cannabis.

  Ben Judge and Aaron Bradshaw were jailed for three years and two years eight months respectively

  Meanwhile, Aaron Bradshaw and Ben Judge were jailed for their part in the 31 July Hartlepool disorder. Both men were wearing balaclavas when they repeatedly challenged and goaded a line of officers, with Judge, 28, of Farr Walk, throwing bricks and eggs at police. Bradshaw, 28, of Murray Street, suffered a broken arm after he was struck by a police officer's shield while attempting to hit officers with a wooden plank, the court heard. He was identified by an anonymous source after a public appeal, the court heard, while Judge was recognised by police in part thanks to a large tattoo on his arm. Judge and Bradshaw, who both had multiple previous convictions, admitted violent disorder and were jailed for three years and two years eight months respectively after Judge Laird called their behaviour "truly disgraceful".
