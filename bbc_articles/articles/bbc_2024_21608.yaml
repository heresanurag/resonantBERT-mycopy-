  Meanwhile, defender John Stones says he has been impressed by Carsley and his tweaks to England's playing style. Asked about the changes, Stones said: "Building up from the back, trying to get the lads to show their qualities on the ball and have that patience and belief that they show at their clubs and bring it all together as a collective. "Everyone has seen a familiar face [Carsley] when we're at St George’s Park. "We've always been crossing paths and getting to work with him, for me personally and the lads feel the same, we're trying to make the most of it. "Lee and his staff have as well, and we've got two great results out of it."
