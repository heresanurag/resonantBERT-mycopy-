title: 'Lee Carsley: England interim boss plays down ''impossible job'' reference
  - BBC Sport'
date: '2024-09-11'
section: England Men
url: http://www.bbc.co.uk/sport/football/articles/cjw3jenpznqo
content: |-
  England interim boss Lee Carsley has stepped up from the Under-21s

  Being England boss is not the "impossible job" but "a really good one", says interim boss Lee Carsley. Victory at the 1966 World Cup remains England men's only major title after Carsley's predecessor Gareth Southgate led the side to consecutive European Championship finals. Carsley was promoted from coaching England's Under-21s after Southgate's resignation following Euro 2024, but two wins from his opening two games in the Nations League have boosted his chances of being named permanent manager. The Three Lions beat the Republic of Ireland 2-0 in Dublin before overcoming Finland by the same scoreline at Wembley as England played with greater attacking freedom than on their run to the Euro 2024 final. Carsley's current role has been called "An Impossible Job" after the 1994 documentary filmed during Graham Taylor's tenure in charge of England, but Carsley says he is unaware of the reference. "I’ve not heard that one, no," Carsley said, when asked about it. Even before that documentary the role had been characterised as an 'impossible' one given the intense scrutiny the manger faces from the press and public. Carsley came in for criticism before his side had even kicked a ball with him at the helm for saying he had never sung the national anthem before games as he wanted to focus on the match, and would not be changing his position on that. "I think it’s a really good job," he added. "It's a job where, when you look at different opportunities, the first thing you think is: 'Can you win? Can you be in a position where you can win?' This job definitely ticks that box. "We've got the players to not only be competitive, but to win a major trophy." When Carsley was appointed as interim manager, the FA said it was "with a view to remaining in the position throughout autumn while the FA's recruitment process for a new permanent head coach continues". England have four more Nations League games this year, two in October and two in November.
