id: bbc_2018_3926
title: Crackdown on bad landlords in Margate - BBC News
date: '2018-04-17'
section: General
url: http://www.bbc.co.uk/news/uk-43801411
content: |-
  One woman says she is stuck in the sub-standard Margate flat she rents with her two young children.

  As more families rent their homes rather than buy, some councils are attempting to clamp down on sub-standard housing.

  Bethany Haigh rents a flat in Margate with her two children and says she has been stuck in problem homes since she was 18.
