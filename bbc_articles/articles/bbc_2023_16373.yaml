id: bbc_2023_16373
title: Atlanta woman returns from holiday to demolished home - BBC News
date: '2023-10-24'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-67177641
content: |-
  The Atlanta resident's house was mistakenly torn down by a demolition company with the wrong address.

  Susan Hodgson says she was in shock when she returned from vacation to find her property razed to the ground.

  The old family property, where no one had lived for about 15 years, was mistakenly torn down by a demolition company with the wrong address. She has yet to hear from the company.
