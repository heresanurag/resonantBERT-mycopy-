title: 'Jeff Sessions: ''Southern racist caricature painful'' - BBC News'
date: '2017-01-11'
section: General
url: http://www.bbc.co.uk/news/38577627
content: |-
  US attorney general nominee Jeff Sessions says US can 'never go back' to discrimination of past.

  Donald Trump's nominee for attorney general, Alabama Senator Jeff Sessions, has faced tough questioning about past allegations of racism during a confirmation hearing.

  He dismissed the claims and in response to a Republican colleague who asked him how it felt to be labelled a "racist or bigot" insisted he would defend the rights of all Americans.
