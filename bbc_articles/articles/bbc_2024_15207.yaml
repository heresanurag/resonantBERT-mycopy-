content: |-
  Sergeant Harry Filby served during World War Two but did not apply for a medal he was eligible for.

  Harry Filby served in the RAF during World War Two but did not apply for a medal he was eligible for

  A World War Two veteran has received a long overdue medal on his 99th birthday, after his carers applied for the honour as a surprise. Harry Filby, who lives in Hereford, served as an RAF radio operator but did not apply for the War Medal 1939-45 he was eligible for. The staff at Elgar Care, who support Mr Filby in his home, decided to apply for the medal and they managed to get it just in time for his birthday on Friday. “When they handed [the medal] to him, we saw the tears well up in his eyes,” said Tracey Waters, Elgar Care’s registered manager.

  Mrs Waters organised for Col Andy Taylor, a veteran who lives in Ledbury, to present the medal to Mr Filby at his home on Friday, in a ceremony his family also attended. “I’m not normally stuck for words – but my God I was,” Mr Filby said.

  Mr Filby served as an RAF radio operator who worked on board planes during the war

  Mrs Waters and her husband Karl, who also works for Elgar Care and is Mr Filby’s carer, decided to apply for the medal earlier this year after getting his family’s permission. She then contacted the Armed Forces Covenant, a government initiative that helps businesses to support veterans. Mr Filby was eligible for the War Medal 1939-45, which was created for everyone who served full-time in the armed forces and the Merchant Navy for at least 28 days during WW2.

  Mr Filby said his family had asked him many times to apply for his medal

  Mr and Mrs Waters said he had never applied for it largely because he was very modest about his service. “My daughter has been [on at] me for years: ‘Apply for your medals!’ ” Mr Filby said. Mrs Waters said the medal arrived just one day before Mr Filby’s birthday and the ceremony on Friday was “emotional”. She added: “This is the thing about care – it’s about stories like this.”
