  Liz Truss speaks out against what she calls the "anti-growth coalition" in her conference speech.

  Liz Truss spoke out against what she called the "anti-growth coalition" in her conference speech.

  She said the group, including opposition parties, trade unions and environmentalists, were "peddling the same old answers": more taxes, regulation and meddling.

  Coverage of Wednesday at the Conservative Party conference
