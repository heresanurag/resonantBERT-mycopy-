  "I am a bit emotional because of the significance of the performance in the mid-point of the season, where we were five weeks ago. It is Christmas and you make sacrifices. "I said to the boys, 'everyone makes sacrifices', so you want to make it worth it and they have for me, they have made my time worth it with that effort. "If you want to beat teams as good as Bristol or any in the upper echelon of the Premiership your set-piece is key as is your defence and you can layer things on the back of that. "But those two things make you competitive and when you start to get a few gamebreakers in your team, Raffi Quirke was exceptional, Tom Roebuck continues to score and impress and Fordy steers the ship – that is the gamebreakers I am talking about. "There is a glut of talent and the lads are revelling in it."
