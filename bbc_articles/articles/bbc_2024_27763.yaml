title: Niels Wittich steps down as Formula 1 race director - BBC Sport
date: '2024-11-13'
section: Formula 1
url: http://www.bbc.co.uk/sport/formula1/articles/c4gvpn1exnvo
content: |-
  Niels Wittich leaves his role as Formula 1's race director with immediate effect.

  Niels Wittich was previously race director for the German Touring Cars Masters

  Niels Wittich has left his role as Formula 1's race director with immediate effect. The German, a replacement for Michael Masi in 2022, "has stepped down from his position to pursue new opportunities," the FIA said in a statement. He will be replaced from the next race in Las Vegas by Rui Marques, most recently the race director for Formula 2 and 3. The surprise move has happened quickly. FIA staff were told earlier on Tuesday, BBC Sport has been told. An FIA spokesperson said: "Niels has fulfilled his numerous responsibilities as race director with professionalism and dedication. We thank him for his commitment and we wish him the best for the future. "Rui brings a wealth of experience having previously served as track marshal, scrutineer, national and international steward, deputy race director and race director in various championships."

  Germany's motorsport-magazin.com quoted Wittich saying: "I have not resigned." Its F1 reporter Christian Menath said on X that Wittich had told him he was fired. The FIA said it could not provide any information beyond its official statement. It is highly unusual for an F1 race director to be changed during a season, especially given there are just three races remaining and both the drivers' and constructors' championships remain undecided. The decision was not widely expected within F1, although some insiders had heard Wittich would be replaced at the end of the season. A senior source said that Wittich had left earlier than expected as a result of his relationship with FIA president Mohammed Ben Sulayem. Wittich is the latest in a series of senior people to leave the FIA in the past year. Sporting director Steve Nielsen quit the organisation in December 2023 after less than a year in his role. His departure followed that of Deborah Mayer, the head of the FIA commission for women. In January, leading engineer Tim Goss left his role as single-seater technical director. He is now at Red Bull's RB team. And in May Natalie Robyn left her role as chief executive officer, external after just 18 months in the position. Wittich's departure comes after a controversy concerning the FIA's racing guidelines broke out within F1 last month, following a battle between title contenders Max Verstappen and Lando Norris during the US Grand Prix. At the subsequent race in Mexico, the FIA agreed with the drivers that it would revise the guidelines with the aim of preventing a form of defence that has been perfected by Verstappen and is permitted by the current rules. Ben Sulayem's stewardship of the FIA has been marked by a series of controversies, the latest of which was a letter published last week by the Grand Prix Drivers' Association in which they asked to be treated like adults in the wake of Verstappen and Ferrari's Charles Leclerc being punished for swearing. They also asked Ben Sulayem to mind his "tone and language" when addressing the topic, after he was criticised by Lewis Hamilton for using "stereotypical" language with a "racial element". It is not clear whether Wittich's departure is related to either scenario. His predecessor Masi left the FIA after his role in the controversy at the Abu Dhabi Grand Prix in 2021. Masi ignored the rules during a late safety-car period in that race and his decisions led to Lewis Hamilton, who had been on course to win an eighth world title by winning the race, being overtaken by Max Verstappen, making the Dutchman champion instead. Wittich has been less overtly controversial in his role, but there has remained an underlying discontent among teams and drivers about the management of FIA race control.
