title: Stonehenge summer solstice sunrise attracts about 15,000 visitors - BBC News
date: '2024-06-21'
section: Wiltshire
url: http://www.bbc.co.uk/news/articles/c7224qlenmeo
content: |-
  People have gathered at the ancient site in Wiltshire on the longest day of the year.

  This video can not be played To play this video you need to enable JavaScript in your browser.

  About 15,000 people have gathered at Stonehenge to watch the summer solstice sunrise. It is one of the rare occasions people can get close to the stones at the historic site near Salisbury in Wiltshire. It went ahead as normal after Just Stop Oil protestors sprayed orange powder paint on the stones on Wednesday. English Heritage has removed the paint with a specialist air blower, but if rain had come into contact with it, there could have been significant damage.

  An estimated 15,000 people visited Stonehenge for the summer solstice on Friday morning

  The charity's historic properties director Kate Logan said: "I think all the people who attended solstice today were just really pleased to come and see the stones looking spectacular. The incident is behind us now. "We're really thrilled with how the event has gone this year. We don't often get such a glorious sunrise but today we've been very lucky."

  English Heritage's Kate Logan said the charity was "thrilled" with how the event had gone

  It is one of the rare occasions when visitors can get close to the stones and even touch them in some cases

  People come from all over the world to see the summer solstice at the 5,000 year old site. Tammy McCollam said she had travelled about 5,000 miles from Washington in the US specifically for the event. “It’s amazing. When I was able to touch the stones, it just felt so emotional, incredible. "I just felt called to come, this is a bucket list trip.”

  Many watch the sunset the evening before and stay overnight to see the sunrise

  The site opened on Thursday evening and there was a crowd for the sunset, with many staying throughout the night to watch the sunrise on Friday morning. The sounds of drumming and cheers from the crowd could be heard as the sun came up. Druids and other members of the pagan community gathered too, with the event a spiritual time for many. Carolyn Pare was one of the visitors and said: “There's a beautiful camaraderie and energy. It's a completely moving, spiritual experience to be here.”

  Deputy Chief Constable Craig Dibdin from Wiltshire Police said the event was "very safe"

  Wiltshire Police always has a presence at the event but after the Just Stop Oil protest, Deputy Chief Constable Craig Dibdin said they had immediately reviewed their plans with organisers and were happy with them. DCC Dibdin said it had been "very safe", with only been one arrest for a minor assault. "It's been a really successful, good humoured event," he added. Other places in the West Country also attract solstice crowds, in particular at Avebury, also in Wiltshire, and Glastonbury Tor in Somerset.

  Avebury is also a popular spot to watch the solstice

  There were gatherings around the West - including at Glastonbury Tor in Somerset
