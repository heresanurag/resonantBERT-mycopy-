  James Anderson says he would like to be remembered as a “decent” bowler after he ends his legendary England career with victory over West Indies.

  Remember me as 'decent', says retiring Anderson

  This video can not be played To play this video you need to enable JavaScript in your browser.

  James Anderson said he would like to be remembered as a “decent” bowler after he ended his legendary England career with victory over West Indies. Anderson took one more wicket as England wrapped up an innings win on the third morning, to end with 704 and sit third on the all-time list of Test bowlers. In moving and celebratory scenes at Lord’s, Anderson was given a guard of honour by both teams at the beginning of the day, then later appeared on the England balcony as spectators were allowed onto the outfield. “The way I have loved the sport so much, I would love for there to be people out there that have taken up the game because they have watched me bowl,” said the 41-year-old. “That people have been entertained by watching me bowl and there are kids or grown-ups who have taken up the art of swing bowling because they have seen me bowl. That would make me so happy.” Anderson, England’s all-time leading wicket-taker, is the most successful pace bowler in the history of the game, with only spinners Muttiah Muralitharan and Shane Warne ahead of him on the all-time list. In a 21-year career he won 188 Test caps, more than any other England player, but said he retires without ever feeling like he was a “great” of the game. “You go so up and down,” he told Sky Sports. “Some series you feel amazing and some not quite on it and a batter gets the better of you. “Playing against Virat Kohli in the early days, you felt you could get him out every ball and then recently like you can’t get him out at all. You feel so inferior. “I have never felt great at any stage. I know that sounds strange. I have always thought ‘how can I get better for the next series?’. That has helped me play for such a long time.”

  This video can not be played To play this video you need to enable JavaScript in your browser.

  Anderson said he wondered if his career was over during last summer’s Ashes series, when he only managed five wickets in four Tests. He survived to be part of the tour of India, when he became the first fast bowler to reach 700 wickets in the final Test, but is now retiring from international cricket after the England management told him they want to blood younger bowlers. And, despite being part of four Ashes series wins, Anderson said he did not “nail” cricket against Australia, whereas his long-term new-ball partner Stuart Broad often found his best against England’s oldest rivals. “Unlike Stuart I don’t feel like I ever rose to the occasion,” said Anderson. “There were times where maybe I was trying too hard.” Anderson will immediately move into England’s backroom staff, becoming a bowling mentor for the second Test at Trent Bridge next week. England captain Ben Stokes has said Anderson could be part of the coaching team for the Ashes tour of Australia in 2025-26. Anderson has said he is unlikely to play county cricket for Lancashire again this summer, but has not ruled out a return in 2025, when he will be nearly 43. "It is difficult to know what is next,” Anderson told Test Match Special. “I have never retired before so it is hard to think about how you will feel. “I am a competitive person. No matter what I do I am competitive at it. That is probably the thing I will miss the most – getting into the battle. “Trying to work a batter out, work out his strengths and weaknesses and get the better of him. That is something I have taken pride in and will definitely miss.”
