  The conference maintained its homespun feel, with yellow T-shirt wearing activists wandering around with yellow buckets hawking for loose change donations. In a nod to modernity, the buckets possessed a QR code on the outside - for digital donations - as well as coppers and some notes on the inside. Meanwhile, the Liberal Democrat chief whip, Wendy Chamberlain, was handing out badges. "72 in 24" they read, spelling out their numerical success. But the balance of power in Parliament matters too, as well as the raw numbers. Yes, the Lib Dems have 72 MPs, but Labour have an enormous majority. As things stand, the government can do what it wants and choose to ignore the protestations and suggestions coming from the opposition parties. Turning their swelled numbers into influence won't be easy. But for the Liberal Democrats this is a nice problem to have, after years in the doldrums. Don’t expect those Lib Dem smiles to ease just yet.
