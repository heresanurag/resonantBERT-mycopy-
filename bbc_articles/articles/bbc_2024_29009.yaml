  Wicketkeeper Jordan Cox is ruled out of England's series in New Zealand after suffering a broken thumb.

  England's Cox out of New Zealand series with broken thumb

  Jordan Cox has played three one-day internationals and two T20s for England

  Wicketkeeper Jordan Cox has been ruled out of England's series in New Zealand with a broken thumb. Cox, uncapped in Tests, injured his right thumb in the nets before the second and final day of England's only warm-up against a New Zealand Prime Minister's XI in Queenstown. The 24-year-old had been due to make his Test debut in Christchurch on Thursday (22:00 GMT, Wednesday), covering for regular keeper Jamie Smith, who is missing the three-match series on paternity leave. In Cox's absence, Ollie Pope is set to deputise behind the stumps, leaving 21-year-old Jacob Bethell in line for his first Test cap. Left-hander Bethell was a surprise inclusion in the squad, having never made a century in senior professional cricket. But he has impressed since making his white-ball debut for England in September. Bethell and leg-spinner Rehan Ahmed are not currently in Queenstown, instead going straight to Christchurch after being part of the squad for the limited-overs series in the West Indies. Pope has kept wicket for England on three previous occasions, once in New Zealand in 2019 and for two Tests in Pakistan in 2022.

  Vice-captain Pope took the gloves on the second day of the warm-up game on Sunday, but with only 14 players in Queenstown and some opting for extra time in the nets, England had to ask James Anderson to take part as a fielder. Anderson, 42, has been working as England's bowling consultant since retiring from Test cricket in July and is entered in the Indian Premier League auction, beginning on Sunday. The injury is cruel on Cox, who was facing throw-downs from England assistant coach Jeetan Patel. Cox has been the reserve keeper and batter in the Test squad since the summer and had already been told he would make his debut in place of Smith. England will call up a replacement, yet Cox's injury is the latest episode in a constantly changing picture behind the stumps. Smith, 24, was made first choice at the beginning of the home summer after Jonny Bairstow and Ben Foakes were dropped. A return for either seems unlikely. Phil Salt has kept for England in white-ball cricket, while Durham's Ollie Robinson has impressed in the County Championship. Somerset 20-year-old James Rew is an exciting prospect and currently with the England Lions in South Africa, alongside another 20-year-old in Matty Hurst of Lancashire. Having conceded a 113-run deficit when both sides batted on day one, the PM's XI struck 313-5 declared from 66 overs, with Olly Stone the pick of the England bowlers, taking 3-53. Chasing 201 with little time left in the day, only Joe Root (82* from 54 balls) and Ben Stokes (59 from 39) passed single figures, with the pair putting on 111 for the fifth wicket. Despite wickets tumbling, the tourists almost pulled off an unlikely win, but the match came to a close with England on 196-9 from 22 overs, five short of their target.
