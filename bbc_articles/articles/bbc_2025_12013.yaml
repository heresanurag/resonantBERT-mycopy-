title: Moment Bletchley double murderer is arrested on Christmas Day - BBC News
date: '2025-06-18'
section: General
url: http://www.bbc.co.uk/news/videos/cly282yjxrno
content: |-
  Video captures the moment he is detained and later refuses to answer police questions in custody.

  Video captured the moment a man was arrested on Christmas Day hours after killing his partner and neighbour.

  Jazwell Brown stabbed Joanne Pearson, 38, and Teohna Grant, 24, at a block of flats in Santa Cruz Avenue, Bletchley, in Milton Keynes, on 25 December 2024.

  Bodycam footage showed officers ordering Brown to the ground and telling him to stop resisting arrest, while he was later pictured in custody refusing to answer questions about the murder.

  Brown, 49, of Santa Cruz Avenue, Bletchley, was sentenced to life with a minimum tariff of 39 years at Luton Crown Court, having pleaded guilty to two counts of murder, two counts of attempted murder, and one count each of possession of a knife in a public place and causing unnecessary suffering to an animal.

