title: Catwalk gatecrasher becomes surprise fashion star - BBC News
date: '2019-05-05'
section: General
url: http://www.bbc.co.uk/news/world-africa-48167754
content: |-
  The feline fashionista dodged models on the runway of a Christian Dior event in Marrakesh.

  An unlikely model made an appearance at a fashion event in Marrakesh this week.

  Purr-rading on the runway, the grey and white cat stole the show as it dodged models heading the other way.
