content: |-
  The council says it will investigate all local agencies' involvement with the family.

  Review after 'shocking' deaths of mum and daughter

  Police said they were satisfied no crime had been committed after investigating the deaths

  Nottingham City Council is to carry out a review into the deaths of a mother and daughter whose bodies were found at a house. The pair, who have not been officially named, were discovered at the terraced property in Hartley Road, Radford, on 21 May after concerns were raised about their welfare. Nottinghamshire Police previously said it was satisfied no crime had occurred and the bodies had "lain undiscovered for some time". The city council said it had been assisting the family through its care and housing services.

  Next-door neighbour Margaret Kidd says she feels "devastated" about what has happened.

  Margaret Kidd told the BBC council officials had visited her next-door neighbour on several different occasions. "I saw them knocking at the door - and then come to my front or back door and say we're trying to get hold of this lady for quite a while now," she said. "So when I saw her going out I would say 'social services came for you yesterday' and she would just shrug her shoulders and say 'so what?' "I was devastated she wouldn't open her door for anybody. You'd see her take the bin out and take it back in - then all of sudden that activity wasn't going on anymore." A council spokesperson said: “This is a tragic situation and our thoughts are with the family and friends of the mother and daughter who died. "The full circumstances will be the subject of an inquest and a full review will be carried out to look at the involvement that all local agencies had with the family. “Ahead of the inquest and review, we are unable to discuss the detail of this case, however we can confirm that the council had provided support to the family through its care and housing services.” The BBC has contacted Nottingham Coroners Court about the inquest.

  Taxi driver Hassan Khalifa said the mother who died was quiet, but friendly

  Other people in Radford told the BBC the deaths have had a big impact on the community. Amanda Dawson, head teacher at nearby Mellors Primary School said: "I felt deep sadness that there were a couple of people that were nameless and faceless and didn’t appear to matter to anybody. "It shouldn’t happen here. We were absolutely devastated because it’s part of our community.” Taxi driver Hassan Khalifa said he had often driven the daughter to school and described her mother as "very quiet" and "very friendly". "I never heard any complaint from her. I didn’t see anything strange. [I was] very shocked, really very shocked," he said. The owner of a nearby butcher, who did not want to be named, said the mother was a regular customer. "[It is] so sad. I would have helped if I’d known," they said. "She was bubbly at first, but sometimes other customers would buy groceries for her. If I knew, I could have helped.” Follow BBC Nottingham on Facebook, external, on X, external, or on Instagram, external. Send your story ideas to eastmidsnews@bbc.co.uk, external or via WhatsApp, external on 0808 100 2210.
