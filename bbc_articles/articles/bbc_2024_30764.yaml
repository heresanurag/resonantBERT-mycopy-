title: Israel to close embassy in Ireland as it criticises 'anti-Israel policies'
  - BBC News
date: '2024-12-15'
section: World
url: http://www.bbc.co.uk/news/articles/cq62mge27r0o
content: |-
  The Republic of Ireland has crossed "every red line", Israeli Foreign Minister Gideon Saar says.

  Israel to close embassy in Ireland as it criticises 'anti-Israel policies'

  Israel will close its embassy in Dublin over "the extreme anti-Israel policies of the Irish government", its foreign minister has said. Gideon Saar said the Republic of Ireland had crossed "every red line". In a statement, he said Israel's ambassador to Dublin had been recalled in the past following what it called Ireland's "unilateral decision to recognise a Palestinian state". He added that the decision followed Ireland's announcement of its support for South Africa's legal action against Israel in the International Court of Justice (ICJ), accusing the country of "genocide".

  Mr Saar said: "The actions and anti-Semitic rhetoric used by Ireland against Israel are rooted in the de-legitimisation and demonisation of the Jewish state, along with double standards. "Israel will invest its resources in advancing bilateral relations with countries worldwide according to priorities that also take into account the attitudes and actions of these states toward Israel."

  Taoiseach (Irish prime minister) Simon Harris said the decision by Israel to close its Irish embassy is "deeply regrettable". He also rejected that Ireland is anti-Israel.

