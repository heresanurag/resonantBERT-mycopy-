  Tánaiste (Irish deputy prime minister) Micheál Martin said there are no plans to close its embassy in Israel. Martin said he had been informed by the government of Israel of its decision to close its embassy in Dublin. He said: "I believe firmly in the importance of maintaining diplomatic channels of communication and regret that this decision has been taken". "Ireland's position on the conflict in the Middle East has always been guided by the principles of international law and the obligation on all states to adhere to international humanitarian law." He said the continuation of the war in Gaza and the "loss of innocent lives is simply unacceptable and contravenes international law. He added: "It represents the collective punishment of the Palestinian people in Gaza. We need an immediate ceasefire, the release of all hostages and a surge of humanitarian aid into Gaza." Mr Martin said Ireland and Israel will continue to maintain diplomatic relations, adding: "Inherent in that is the right to agree and disagree on fundamental points.

  On 7 October last year, Hamas launched an attack in southern Israel killing 1,200 people and taking 251 hostages. In retaliation, Israel launched a massive operation inside the Gaza Strip with the stated aim of eliminating Hamas. So far, at least 44,875 people have been killed and more than 100,000 injured - mostly civilians, the Hamas-run health ministry says. The UN regards these figures as reliable.
