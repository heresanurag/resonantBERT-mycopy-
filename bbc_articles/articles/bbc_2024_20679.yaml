  Since then, many have said they have tried the same trick with marbles, including Cora Barras who, on a visit from Northern Ireland with her daughter, said "the thrill of trying to figure out" what was going on was "such fun". The shockwaves over the demolition continue to reverberate, with pub lovers nominating 65 hostelries, including 15 in the West Midlands, to be preserved. Under the List Your Local banner, the campaign was launched by West Midlands Combined Authority (WMCA) and the Campaign for Real Ale (Camra). "We can’t keep destroying all of the heritage and all of their memories and all of their links to the past of what made the Black Country great," said Ms Shanley.

  Liz Shanley says campaigners are still passionate about fighting for the pub's legacy
