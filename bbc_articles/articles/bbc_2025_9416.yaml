title: 'Bicester Motion fire: Town mourns firefighters and father lost - BBC News'
date: '2025-05-19'
section: Oxfordshire
url: http://www.bbc.co.uk/news/articles/c0mr91nz3ldo
content: |-
  A book of condolence opens at Bicester Town Council's headquarters following Thursday's fire.

  Town mourns loss of 'best of Bicester' after fire

  Martyn Sadler, Jennie Logan and David Chester (left to right) died in the fire on Thursday

  There is an "outpouring of grief and shock" in the town where two firefighters and a man were killed in a fire at a business park, a councillor has said. Jennie Logan, 30, and Martyn Sadler, 38, died while tackling the fire at Bicester Motion on Thursday evening. David Chester, 57, a father of two who ran a business at the site and lived in Bicester, was also killed. Many observed a two-minute silence in the town's Garth Park on Sunday and Bicester Town Council has opened books of condolence at Garth House. Nicholas Mawer, who represents Bicester North on Cherwell District Council, told the BBC: "These people are the best of Bicester."

  Another two firefighters who suffered serious injuries remain in hospital, Thames Valley Police has said. Mr Mawer, who attended a service at St Edburg's Church on Sunday, added: "Thankfully these incidents are very rare but it's deeply affected the community. "You could tell how affected the people were and at the centre of this are the families of the people who we lost."

  Bicester Town Council has opened books of condolence at Garth House

  He said town councillors were in early discussions regarding some kind of memorial for those who died, and that it would be further discussed in the annual town meeting later. "I'm sure in the fullness of time we'll bring forward a proposal that's suitable," he said.

  Michael Brooker, a fire officer with Oxfordshire Fire and Rescue Service and friend of Martyn Sadler, said the photo that had been distributed of Mr Sadler with a "big beaming smile - that was Martyn". "He always made sure we had fun," he continued. "It's kind of surreal because the room would light up when he turned up, and he would just have this air of confidence that would say, 'you know what, we've got this, we can do whatever we need to do'. "He really did have a generous heart, he was a really amazing guy."

  The firefighters were involved with Bicester Rugby Union Football Club's women's team

  Mr Brooker told the BBC he and his colleagues "have cried together... we've laughed together again". "It's not going to be easy the next couple of weeks, we know that, and we need to make sure we keep going," he continued. "We're resilient people, we do hurt, but we do need to honour them and continue doing what they loved doing themselves."

  Maria Santambrogio, from Upper Heyford, knew Mr Sadler for about three years and was his dog groomer. "He always mentioned how much he loved his job," he said. "Even when he was doing night shifts he never complained once. "He was in love with his dogs and his dogs were obsessed with him. "All I can say is that he was a very lovely man and super kind. Everyone that knew him is definitely going to miss him."

  Ms Logan and Mr Sadler were involved in Bicester Rugby Union Football Club's (BRUFC) women's team, Bicester Vixens. "We are a tight-knit club," BRUFC's chairman Paul Jaggers said. "We are a family and it's hit the club and the wider community very hard. "Obviously losing two of your members in any situation is really tough and it's had a profound impact."

  Many people gathered in Garth Park on Sunday to remember those who lost their lives

  Stuart Smith, from Bicester, said he would remember Ms Logan "for the friend she was, and just how strong, modest and reliable [she was]". He continued: "I think it's that determination... she was like, 'I'm going to join the fire service.' She did it. 'I'm going to play rugby.' She did it. 'I'm going to get a motorbike and learn how to ride it.' She did it. "She's just a doer and just a lovely person with no ego, wanting to help people, and most of all one of my best friends and like a sister to me, and I will miss her so much."

  Jennie Logan was described as "strong, modest and reliable"

  Calum Miller, MP for Bicester and Woodstock, said he had been "humbled" though "not surprised" by the "strength of responses and the many acts of kindness that people are showing". He continued: "We've seen friends and family and colleagues obviously, but also the much wider community come together, and what's struck me has been how deeply people have felt this, whether they knew the folk who have sadly died, or whether they saw the sacrifice they all made in trying to support our community. "Bicester is a town with a big heart and has really shown it over the four days."

  Both firefighters worked for Oxfordshire Fire and Rescue Service and Mr Sadler was also part of the London Fire Brigade. Mr Chester, who ran family business Chesters & Sons at Bicester Motion, joined the estate when it was bought 12 years ago and was described as "part of the fabric of our estate and a friend to us all".

  Ms Logan was a "lovely person with no ego", her friend Stuart Smith said

  Historic England, which had worked with Mr Chester, said he had been a "valued partner" who it was a "privilege" to work alongside. Bicester Hockey Club, of which his son is a member, described Mr Chester as a "pillar of the community", a "well respected man" and said his death had been a "great loss to all". Fire investigators and Thames Valley Police are working to establish the cause of the blaze in what the police said was a "complex investigation which may take some time".

  Flower tributes have been left outside Bicester Fire Station since Thursday, though the fire service said it would be "grateful" if people laid flowers at Garth Park "to avoid obstruction to the highways". One card, addressed from two dogs Cooper and Barney, said: "Jennie, you always were and will be our 'mum' and we will miss you more than anyone can know. "We will see you one day across the rainbow bridge. All our love, Cooper and Barney." The card also features two paw prints.

  Tributes have been left by the fountain at Garth Park

  The flags are flying at half mast outside Garth House as the town goes about its usual business. I arrived as staff were unlocking the gates, watering the flowerbeds, receiving deliveries and emptying the rubbish bins. But at the pond with the fountain at its centre - it's completely surrounded by flowers. It's astonishing, the sheer volume of tributes that have been paid from people in the town and far beyond. Meanwhile, police are still standing guard outside Bicester Motion, which a source tells me is likely to stay closed for weeks as investigations take place. It will be changed forever, not just because of all the physical damage to the building due to the sheer scale of the fire, but because of the tragedy that unfolded within.

  Flowers have been left by the fire station, though those paying their respects have been advised to visit the park instead

