content: |-
  Onlookers described seeing a van emerging from a side road before crashing into pedestrians.

  Pedestrian dies and others hurt in crash on Strand

  The van driver has been arrested on suspicion of causing death by careless driving

  A woman has died after a van driver crashed into pedestrians on the Strand in central London. The Met Police said three other people were hurt, one of whom was left with potentially life-threatening injuries. Two of the three are being treated in hospital. The van driver, a 26-year-old man, was arrested at the scene on suspicion of causing death by careless driving and drug-driving. Police said the crash, which happened at about 11:40 GMT close to King's College London and Somerset House, was not terror-related. Miles Damone, a student at King's, said: "The van came from one of the side roads by the Indian Embassy and then at this point - I didn't see how or when - crashed into the people."

  He told the BBC: "I just saw it coming from there, [it] made a sharp turn and just rammed into the fence." The Met Police said the van driver remained in custody while inquiries continued.

  Ali, a PhD student at King's College, said he had initially thought emergency services were there for a protest outside the university until he saw ambulance workers carrying stretchers. "[It] is so sad and hard to process - my thoughts go out to her family and friends," he said. "We walk by that crossing all the time and it's pedestrianised; barely any vehicles pass."

  Gian Giacomo said he saw people being treated by paramedics

  Student Gian Giacomo told the BBC he got to the university at 11:55 as the emergency services were arriving, and saw three people being treated by paramedics. "There was a lot of confusion. No-one knew what happened. The news of the van hitting the people came later on."

  A spokesperson for the London Ambulance Service (LAS) said paramedics had treated four people at the scene, but "despite our best efforts one person was pronounced dead". Two of those injured were taken to hospital, one with potentially life-threatening injuries, and the other with minor injuries. The fourth person was discharged at the scene, LAS said.

  A King's College London spokesperson said they were aware of the incident and were liaising with emergency services.
