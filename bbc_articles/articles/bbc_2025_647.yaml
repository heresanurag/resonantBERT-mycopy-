title: 'Sheffield stand-off: Armed police at apartment block - BBC News'
date: '2025-02-11'
section: South Yorkshire
url: http://www.bbc.co.uk/news/articles/ce8ykld1lz3o
content: |-
  Specialist officers are "negotiating" with a man at a building on Broad Street in Sheffield.

  Police have closed roads in Sheffield city centre as the incident continues

  Armed police are conducting a major operation in Sheffield following reports of a man with weapons in an apartment building. Officers were called to the Gateway building on Broad Street at about 19:00 GMT on Monday. About 10 police vehicles and ambulances remain at the scene. South Yorkshire Police said specialist officers continued to negotiate with the man. There is ongoing travel disruption in and around the city, with several routes gridlocked, as officers divert traffic away from the incident.

  Armed police on a balcony and inside the building on Broad Street

  In a social media update the force said: "Those within the building where the property is have been evacuated and those within the neighbouring buildings have been asked to stay indoors while officers conduct their work." About 80 Gateway residents were evacuated from the building to the nearby Ponds Forge sports centre, with some saying they had been given very little information. Erin, who was evacuated at about 20:30 GMT on Monday, said: "We've literally got the clothes we're standing in and our phones."

  This video can not be played To play this video you need to enable JavaScript in your browser. Sheffield incident: What we know so far

  Sam Edwards, 31, said he called the police after a "commotion on the floor above". "The chap living up there started emptying the contents of his flat onto our outdoor terrace and he then tried to set it alight," he said. "The police turned up, shortly after there was armed response telling us all to leave, which was quite alarming." Mr Edwards said the atmosphere among the evacuees was "pretty dire". He added: "We've tried to keep our spirits up because people are upset and concerned about what's gone on. "It's people's homes and possessions and there's a lot of anxiety, but we've just tried to be there for one another and ride it through as best we can. It's a bizarre situation." Mr Edwards said staff at the sports centre had been "very pleasant" and had kept residents refreshed with teas and coffees, while air mattresses were delivered to the venue at around 04:00 GMT.

  This video can not be played To play this video you need to enable JavaScript in your browser. People near the scene speak to BBC Radio Sheffield

  A Sheffield Hallam University spokesperson said the incident was affecting students in the Pinnacles student accommodation building They said the campus was open as usual, with the university "actively working to support those students directly impacted". Meanwhile, Several key routes around Sheffield city centre remain gridlocked. Vehicles heading to the city from the east are seeing the longest delays and closures, with the closed Park Square roundabout a major route into Sheffield. Police said Sheffield Parkway, between Park Square roundabout and Derek Dooley Way, would remain shut with motorists advised to find an alternative route. There was also severe disruption to the tram services in the area, they said.

  At one point around 100 emergency services personnel were thought to be at the incident
