title: Giovanni Pernice will not return to Strictly Come Dancing - BBC News
date: '2024-07-16'
section: Culture
url: http://www.bbc.co.uk/news/articles/cgeedq2zjjeo
content: |-
  The Italian professional dancer joined the show in 2015, winning it in 2021 with Rose Ayling-Ellis.

  Giovanni Pernice will not return to Strictly Come Dancing

  Giovanni Pernice has been a pro dancer on Strictly since 2015

  Giovanni Pernice will not return to Strictly Come Dancing for the next series. The BBC did not announce the star as part of its line-up of professional dancers for 2024, following reports that he would not compete. The Italian professional dancer, 33, has been on the BBC One celebrity dancing contest since 2015, winning it in 2021 with actress Rose Ayling-Ellis. The news comes weeks after he denied reports about his teaching methods on the show. Pernice had said he was surprised by allegations about his dance teaching methods, and rejected "any suggestion of abusive or threatening behaviour". Dancers who will return when the show starts in autumn include Amy Dowden, who took time out from the show last season for cancer treatment.

  Legal firm Carter Ruck said last month it had contacted the BBC regarding "numerous serious complaints" about Pernice's alleged behaviour while filming Strictly. The BBC issued a statement at the time addressing "media reports about a high profile show", believed to concern Strictly Come Dancing. It promised to handle any complaints with "care, fairness and sensitivity" to all sides, following reports about Pernice's teaching methods.

  Pernice was paired with actress Amanda Abbington for the 2023 series

  It came shortly after the Italian star put out a statement saying he looked forward to clearing his name, and thanking fans for their support. "Those who have followed my journey on Strictly Come Dancing over the last decade will know that I am passionate and competitive," he added. "No-one is more ambitious for my dance partners than me. "I have always striven to help them be the very best dancers they can be. This has always come from a place of love and wanting to win - for me and my dance partners." The Italian star was paired with Sherlock actress Amanda Abbington last year. She withdrew from the competition citing "personal reasons". It was widely reported that Abbington had experienced difficulties with Pernice, but she has not confirmed this to BBC News.

  Dowden said on Monday she was "so happy and grateful to be back", external, in a post on Instagram. She was diagnosed with stage 3 breast cancer after she discovered a lump in April 2023. After undergoing a mastectomy, she was told the tumours had spread and another type of cancer was discovered in July last year.

  Amy Dowden has been on Strictly since 2017

  Although she was unable to take up her usual role as one of the show's pros last autumn, Dowden made a surprise appearance back on the show when she read the show's terms and conditions for voting in October. The 33-year-old, from Caerphilly, then took part in the show's grand final. Dowden had said earlier this year that she hoped to get back to the Strictly dancefloor as soon as possible, after a health check showed "no evidence of disease".

  The other professional dancers confirmed to be taking part in the next series of Strictly are: Dianne Buswell, Nadiya Bychkova, Graziano Di Prima, Karen Hauer, Katya Jones, Neil Jones, Nikita Kuzmin, Gorka Marquez, Luba Mushtuk, Jowita Przystal, Johannes Radebe, Kai Widdrington, Nancy Xu, Carlos Gu, Lauren Oakley, Michelle Tsiakkas and Vito Coppola, who won last year's competition. The show marks its 20th anniversary this year, with the BBC promising "a spectacular series of glitz, glamour and unforgettable performances". There will also be a one-off programme detailing 20 years of the show featuring famous performances and interviews with past celebrity stars, professional dancers and judges. Shirley Ballas, Motsi Mabuse, Craig Revel-Horwood and Anton Du Beke will all return as judges. Pernice is currently on tour with Du Beke. The pair, who have hosted a travel show together, will next appear on stage at the Beck Theatre in Hayes later this week.
