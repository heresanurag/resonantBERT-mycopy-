title: 'Lisbellaw: Pedestrian dies after County Fermanagh crash - BBC News'
date: '2023-12-14'
section: Northern Ireland
url: http://www.bbc.co.uk/news/uk-northern-ireland-67711333
content: |-
  A man was arrested after the incident in which a 20-year-old woman died on the A4 Belfast Road.

  The crash happened on the Belfast Road

  A 20-year-old woman has died after she was hit by a vehicle in Lisbellaw, County Fermanagh, on Wednesday evening.

  The crash happened on the Belfast Road at about 17:50 GMT.

  A 25-year-old man has been arrested and remains in custody following, the police have said.

  Officers have appealed for anyone who may have witnessed the incident or drivers with dash-cam footage of the incident to contact them.

  In a separate incident, police are also appealing for information following a serious three-vehicle crash near Loughbrickland, County Down, on Wednesday.

  One person was taken to hospital following for treatment.
