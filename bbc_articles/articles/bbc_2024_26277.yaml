content: |-
  England head coach Steve Borthwick names a group of 17 players who will receive English rugby’s first Enhanced Elite Player Squad contracts.

  Fly-halves Marcus (left) and Fin (right) Smith are among 17 England players to receive new deals with the Rugby Football Union

  England head coach Steve Borthwick has named a group of 17 players that will receive English rugby’s first Enhanced Elite Player Squad contracts. Fly-halves George Ford, Marcus Smith and Fin Smith have been given one of the deals but there are no tighthead props in the group. Bath’s Sam Underhill is a surprise omission having started all of England’s eight Test matches in 2024. The contracts - the first of their kind - allow Borthwick to have the final say on all sports science and medical matters in relation to the players, handing the England boss unprecedented influence compared to his predecessors. "I am confident that these contracts, and our strong relationship with the Premiership clubs, will play a significant role in England Rugby’s continued development," he said. Northampton’s Alex Mitchell is the only scrum-half in the 17, with Ellis Genge the only loosehead prop, while Sale flanker Tom Curry has been handed an Enhanced Contract despite his long injury lay-off. Immanuel Feyi-Waboso has capped off a breakthrough year by being included in the group, while Henry Slade has also been given a contract despite not making the 2023 Rugby World Cup squad. Flanker Chandler Cunningham-South started England’s three Test matches on their summer tour, but has been left out of the 17.

  Aside from Genge and Curry, the other forwards to receive a contract are Ollie Chessum, Theo Dan, Ben Earl, Jamie George, Maro Itoje and George Martin, while Tommy Freeman, George Furbank and Ollie Lawrence are the remaining backs. "One of the aims of the new Men’s Professional Game Partnership is to create world-leading English teams," added Rugby Football Union director of performance rugby Conor O’Shea. "We believe this new collaborative approach between club, country and the players can bring greater stability to English rugby, as well as supporting the growth and performance of the England men’s team." A new player-led organisation called Team England Rugby negotiated the deal with the Rugby Football Union after the players broke away from their long-running arrangement with the Rugby Players Association earlier this year. The 17 players will now receive a salary from the RFU, of around £160,000 per year, rather than match fees of approximately £23,000 per game.
