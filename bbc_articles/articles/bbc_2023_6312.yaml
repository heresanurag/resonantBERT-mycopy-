content: |-
  Photographer James Grant shares some of his spectacular images of Eryri, also known as Snowdonia.

  Spring is upon us and as the days get longer and warmer, many will head out to enjoy the Welsh scenery.

  Here is a collection of images taken by landscape photographer James Grant, who lives in Llangollen, Denbighshire.

  The vast majority were captured in Eryri, also known as Snowdonia, in Gwynedd, while a few were taken in other areas such as Llandrillo, Denbighshire.

  One of Eryri's most striking mountains, Tryfan

  The summit of Cnicht, a mountain in the Moelwynion

  Daybreak looking over Llyn Cau with Pen-y-Gadair (Cader Idris) in the background

  The Point of Ayr Lighthouse, a Grade II listed building situated near the village of Talacre

  The breathtaking view from the summit of Yr Wyddfa (Snowdon)

  A view of the sun setting from Wales' highest point
