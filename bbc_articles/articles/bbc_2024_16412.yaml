title: 'Kevin Davidson: Man and woman charged with murder - BBC News'
date: '2024-07-24'
section: Northern Ireland
url: http://www.bbc.co.uk/news/articles/c87r8erdygro
content: |-
  Kevin Davidson was found dead in Donegall Avenue in south Belfast on Saturday.

  A 32 year-old man and a 35 year-old woman have been charged with murdering Kevin Davidson.

  Mr Davidson, who was 34, was reported missing earlier in July.

  Officers from the Police Service of Northern Ireland discovered his body at a property in Donegall Avenue in south Belfast on Saturday.

  The man and woman are due to appear in court on Thursday.
