  Defending champions Great Britain secure a bronze medal in the triathlon mixed team relay at the Paris 2024 Olympics after a photo finish.

  Defending champions Great Britain claim Olympic triathlon mixed team relay bronze - after initially being announced as silver medallists - following a photo finish for second place with the USA.

