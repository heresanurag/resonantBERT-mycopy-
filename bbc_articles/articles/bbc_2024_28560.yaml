  Girl, 10, dies after being bitten by family dog

  The girl died at the scene despite efforts by medical professionals

  A 10-year-old girl has died after being bitten at home by a family dog in North Yorkshire, police say. Officers were called to the incident at the home in the Malton area by Yorkshire Ambulance Service at about 16:15 GMT on Friday. Police said despite efforts by medical professionals and a member of the public who came to the family's aid, the girl suffered serious injuries and died at the scene. Following the attack, police said the dog was secured inside a car by a family member and was seized by officers when they arrived.

  North Yorkshire Police said the animal had been taken to secure kennels where it currently remained. The force said the dog was being assessed as part of the investigation. A spokesperson for Yorkshire Ambulance Service said a "range of ambulance resources" were sent in response to the emergency call on Friday. Police added: “Our thoughts remain with the girl’s family and friends at this very distressing time. Officers are supporting the family while inquiries continue. “We also urge people not to speculate about the incident, respect the family’s privacy and allow them to grieve in peace. “We will provide more information when we are able to.”
