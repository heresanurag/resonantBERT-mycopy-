title: Natalie Cassidy to leave EastEnders, three decades after first appearance as
  Sonia Fowler - BBC News
date: '2025-02-01'
section: Culture
url: http://www.bbc.co.uk/news/articles/c1we99le444o
content: |-
  The actress will leave the soap in February, more than three decades after her first appearance.

  Cassidy's exit storyline will coincide with the show's 40th anniversary in February

  Actress Natalie Cassidy is to leave EastEnders, more than three decades after her first appearance on the soap as Sonia Fowler. In a statement the 41-year-old said she was "extremely sad" but also "very excited" to be moving on. Her exit storyline has not yet been confirmed, but the BBC said her final scenes would air around the time of the soap's 40th anniversary in February. The BBC has also announced EastEnders will broadcast a live episode on 20 February, which will include a plot outcome which has been decided by viewers.

  Cassidy said: "After another 11 solid years back on the square, I have decided it's time to move on to pastures new.

  Natalie Cassidey and Jack Ryder (who played love interest Jamie) pictured on the show in 2002

  "EastEnders is in my bones so I will never forget where I started my career and I will continue to love the show," Cassidy said. "Thank you to [executive producer] Chris Clenshaw for the opportunity to be such a big part of the 40th anniversary - it's an honour. See you, Sonia, going but never forgotten." Cassidy made her first appearance in the soap in 1993, leaving the soap in 2007, before returning briefly between 2010 and 2011, and later coming back to Walford in 2014. Sonia is currently pregnant with Reiss Colwell's (Jonny Freeman) baby unaware that he killed his ex-wife Debbie (Jenny Meier), a crime Sonia was later charged with, but was found not guilty after a video emerged of her half-sister Bianca Butcher (Patsy Palmer) confessing to the crime.

  Cassidy (pictured in EastEnders in 2006) said it was time to move on to "pastures new"

  EastEnders executive producer Clenshaw said of Cassidy's departure: "Over the last 31 years in EastEnders, Natalie has been involved in some of the show's most iconic and explosive storylines. "Her portrayal of Sonia has made her a firm fan favourite amongst the viewers. "I won't be revealing the [minute] details relating to her exit, but I can say that she will take a central role in the 40th anniversary storylines in a week of truly unmissable drama that will change the lives of those in Walford forever. "I'd like to thank Natalie for her time at EastEnders, and I wish her all the best for the future." Sonia is well known for her poor trumpet playing, which angered her family and neighbours, during her early days on the soap. Some of her biggest storylines include her being bullied by her friend Clare Bates (Gemma Bissix) after she fell in with the wrong crowd at school, and her teenage pregnancy. The soap's 40th anniversary will also see the return of Grant Mitchell (Ross Kemp) after a near 10-year absence. On Friday, the BBC also confirmed it would air a live episode as part of the soap's 40th anniversary celebrations. The live episode will feature the result of an interactive twist, which will see viewers have power to decide the outcome of Denise Fox's love story, and whether her future should be with Jack or Ravi. The events of the anniversary week episodes will take place over one day in Albert Square, with an hour-long episode airing on 19 February, followed by the live episode the following night.
