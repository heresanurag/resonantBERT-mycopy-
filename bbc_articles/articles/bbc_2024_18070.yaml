title: 'Sky Brown: GB Olympics skateboarder cleared to compete after dislocated shoulder
  - BBC Sport'
date: '2024-08-01'
section: Olympic Games
url: http://www.bbc.co.uk/sport/olympics/articles/cerv3lee7yxo
content: |-
  Sky Brown won Olympic bronze in Tokyo at the age of just 13

  Team GB skateboarder Sky Brown has been cleared to compete in the Olympics after suffering a dislocated shoulder. Brown, who won a bronze medal at the Tokyo Games three years ago, suffered the injury on Monday - the day before she travelled to Paris. The 16-year-old has now been checked by Team GB doctors and physios and they have deemed her fit to compete in Paris. "This one was really scary," said Brown. "My shoulder being out and I couldn't get it back in. My dad put it in for me. "When I get back I'll have to do surgery, so it doesn't come out again. They're bringing some braces tomorrow and I will try it out and have to be strapped for every time I skate. "My message would be what doesn't kill you makes you stronger, as cringey as it is."

  Brown is due to compete for a medal in the women's park skateboarding, which takes place on Tuesday, 6 August at La Concorde. The British boarder has had a turbulent build-up to the Games, which included tearing the medial collateral ligament in her right knee in April. But she will now compete in the event in which she finished third at the previous Tokyo Olympics, earning GB's first ever skateboarding medal at the Games.

