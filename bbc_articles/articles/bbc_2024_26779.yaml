  Liverpool had been in Champions League action on Wednesday and had a tight turnaround for the trip to Crystal Palace, with the game having kicked off at 12:30 BST on Saturday. Slot added: "Maybe this is something the FA should look at - if you play Wednesday evening why do we have an early kick-off in an away game? "Or they have to look at me and rotate all my players, maybe it is also bad luck, I don't know. "The positive thing is that Jaros did really well last season when on loan. He was champion and won the cup. He wanted to play desperately. At this club we need three good goalkeepers. He was outstanding today." Alisson, who has been at Liverpool since 2018, missed two games last month with a hamstring niggle. Brazil's football federation later said the player would miss their games against Chile and Peru, and called up Weverton of Palmeiras to replace him. "The national team's medical department contacted the English club and was informed that he would not be able to play in both matches," a CBF statement said.
