  Slot fears Liverpool keeper Alisson 'out for few weeks'

  Alisson has made eight appearances for Liverpool this season

  Liverpool boss Arne Slot fears he will be without goalkeeper Alisson "for a few weeks" following his injury against Crystal Palace. Alisson, 32, went off in the 79th minute after appearing to pull his hamstring when making a clearance, and has pulled out of Brazil's squad for their upcoming World Cup qualifiers. With Caoimhin Kelleher absent from the squad because of illness, Vitezslav Jaros came on for his Liverpool debut and made one save to keep out a tame effort from Eberechi Eze as the Reds won 1-0. "With Alisson it is clear he will be out for maybe a few weeks," Slot told BBC Match of the Day.

