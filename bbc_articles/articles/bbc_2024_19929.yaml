title: Train driver strikes on hold after new ScotRail pay offer - BBC News
date: '2024-08-26'
section: Scotland Business
url: http://www.bbc.co.uk/news/articles/czjy04dwlkeo
content: |-
  Train drivers' union Aslef withdraws its ballot for industrial action with members to vote on the offer.

  ScotRail staff last went on strike over a pay dispute in 2022

  Threatened strike action by ScotRail drivers has been put on hold after a new pay offer. However, an emergency timetable with a reduced number of services will continue in the meantime. The train drivers' union Aslef said its ballot for industrial action had been withdrawn and has recommended that members accept the new pay deal in a ballot. It follows "constructive" talks between the company and unions in recent weeks.

  Jim Baxter, an Aslef executive committee member, said their negotiating team thought the latest offer from ScotRail was acceptable. He said: "Our ballot for industrial action has now been withdrawn and a referendum of our members, on the offer, will now be held. "The negotiating team and executive committee are recommending that members accept this offer." Their ballot will close on 25 September. ScotRail has been operating a reduced service since July, when a number of drivers stopped working extra Sunday shifts and overtime in the pay dispute. About 600 services were cut under the provisional measures, leaving 1,660 trains operating between Mondays and Saturdays. Peak-time services in the morning and late afternoon were halved from four trains per hour to two, external. The publicly-owned firm was embroiled in a long-running dispute with unions in the summer of 2022 which saw overtime bans and full strikes across the network in Scotland. Details of the new pay offer have not been made public but it is understood all staff would get a 4.5% rise, backdated to April.

  ScotRail believes the new offer recognises the hard work of staff

  The Rail, Maritime and Transport (RMT) union will be balloting members on the proposed deal. They have already voted for strike action but those plans have been put on hold after negotiators agreed on principle to the new terms. TSSA, which represents about 500 members in managerial and technical roles, said their ballot on an earlier pay deal closed on Friday and "demonstrated a strong appetite for industrial action". However, they said they had since received a "reasonable pay offer" from ScotRail. A spokeswoman for the union said: "We will act in good faith on that offer. "TSSA is a democratic trade union, and all decisions ultimately rest with our members."

  ScotRail's service delivery director Mark Ilderton said they were "pleased that we’ve been able to reach this position". “The talks with trade union colleagues have been very constructive and it is a fantastic step forward with Aslef withdrawing the ballot for industrial action and moving forward with a member referendum on the pay offer,” he said. He encouraged colleagues to support the offer. “We recognise the hard work of our colleagues, and the cost of living challenges faced by families across the country and believe that the pay offer reflects this, as well as providing value for money for the public finances,” he added. Caledonian Sleeper services would also have been impacted by strike action.
