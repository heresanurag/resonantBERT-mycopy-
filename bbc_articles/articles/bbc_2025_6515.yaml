title: Aimee Lou Wood calls SNL White Lotus sketch 'mean and unfunny' - BBC News
date: '2025-04-15'
section: Culture
url: http://www.bbc.co.uk/news/articles/c5yr7yy40j3o
content: |-
  The White Lotus star said a sketch that impersonated her using prosthetic teeth "punched down" on her.

  Aimee Lou Wood suggested her portrayal on the sketch show was misogynistic

  The White Lotus star Aimee Lou Wood has called a Saturday Night Live (SNL) sketch that impersonated her using exaggerated prosthetic teeth "mean and unfunny". The British actress said the US comedy programme "punched down" on her and suggested the sketch was misogynistic. In a series of Instagram posts, Wood wrote that she was happy to be made fun of "when it's clever and in good spirits" but that there "must be a cleverer, more nuanced, less cheap way". Wood, 31, said she had received "apologies from SNL" after sharing her criticism. The BBC has contacted broadcaster NBC for a response.

  The actress's role in the third series of The White Lotus, which follows a group of guests at a resort, prompted significant media attention surrounding what she calls her "big gap teeth". The SNL sketch, which aired this week, imagined US President Donald Trump and his top team spending time at the fictional hotel. Wood's character Chelsea was portrayed by cast member Sarah Sherman using a pronounced accent and fake teeth. At one point, in a reference to the actress's teeth, she asks: "Fluoride? What's that?" Wood, who burst onto screens in Netflix's Sex Education, said she was "not thin skinned" and understood that SNL was about "caricature". "But the whole joke was about fluoride," she wrote on Sunday. "The rest of the skit was punching up," Wood added, "and I/Chelsea was the only one punched down on". She said that she was not "hating on" Sarah Sherman, but "hating on the concept". Wood also shared a comment by an unnamed user describing the sketch as "sharp and funny" before taking "a screeching turn into 1970s misogyny". "This sums up my view," the actress added. She also criticised Sherman's accent, writing: "I respect accuracy even if it's mean." Wood, from Stockport, Greater Manchester, wrote that she had received "thousands of messages" agreeing with her since sharing her posts, and that she was glad she "said something". Speaking to GQ magazine last week, Wood said, external that the conversation surrounding her teeth made her "a bit sad because I'm not getting to talk about my work". "It makes me really happy that it's symbolising rebellion and freedom, but there's a limit," she said. Wood added: "I don't know if it was a man would we be talking about it this much? It's still going on about a woman's appearance."

  Following her posts, Wood's younger sister Emily offered her support for the actress on her own Instagram story. Sharing a picture of the pair together, Emily Wood said her sister was "out here personifying the word powerhouse". "The admiration I have for this woman is nuts. Beyond comprehension," she continued, adding that she felt "deep animalistic protectiveness" over her. "The greatest big sister. My best human on the planet. Her authenticity and originality is incomparable. My god we are really madly blessed to experience life on earth at the same time as her."
