  A recap of a dramatic night that saw South Koreans rush to overturn the president's shock martial law order.

  Fear, fury and triumph: Six hours that shook South Korea

  This video can not be played To play this video you need to enable JavaScript in your browser. South Korea: How two hours of martial law unfolded

  Nineteen-year-old Hwang was watching the protests in Georgia on Tuesday night's news when the images on TV suddenly changed - the spotlight was on his country after South Korea's President Yoon Suk Yeol announced martial law. "I couldn’t believe what I was seeing," said the student, who wished to be identified only by his surname. By Wednesday afternoon, he was among the protesters standing before the National Assembly, still stunned about what had happened the night before. "It's important for me to be here to show that we are against what Yoon tried to do," Hwang said. In a little less than six hours, Yoon was forced to walk back his shock announcement after lawmakers scrambled to block it. But those were chaotic hours, sparking protests, fear and uncertainty in the country that had elected him.

  On Tuesday night, at 23:00 local time (14:00 GMT) President Yoon, seated in front of blue creaseless curtains, made an unexpected address to the nation. He said he was imposing martial law to protect the country from "anti-state" forces that sympathised with North Korea. The embattled leader is in a deadlock over a budget bill, dogged by corruption scandals and investigations into his cabinet members. What followed was a sleepless night for Seoul. Shortly after Yoon’s announcement, police lined the white metal gates outside the National Assembly building in the heart of Seoul, the building that the country’s tourism authorities have framed as “the symbol of Korean democracy”. The military then announced that all parliamentary activity was suspended under martial law. But neither that nor the heavy security presence stopped thousands from gathering in front of the assembly in concern and fury. It is easy to forget that South Korea - now a vibrant democracy - had its last brush with authoritarianism in the not-too-distant past - it only emerged from military rule in 1987. Martial law was last imposed in 1979. This was “a move I never expected to see in the 21st century in South Korea,” university student Juye Hong told BBC World Service's OS programme from Seoul.

  Soon after Yoon's shock announcement, the opposition's Democratic Party leader Lee Jae-myung, hosted a live stream urging people to assemble at the National Assembly and protest there. He also asked his fellow lawmakers to make their way to the assembly to vote down the order.

  Tensions rose quickly as a sea of dark, puffy winter coats pushed up against lines of police in neon jackets, chanting “no to martial law”. And as vehicles arrived with military units, crowds blocked them. One woman lay defiantly between the wheels of a vehicle. In stark contrast, there was a façade of normalcy across the rest of Seoul. Still, confusion enveloped the city. “The streets look normal, people here are certainly bewildered,” John Nilsson-Wright, an associate professor at the University of Cambridge, told BBC World Service from Seoul. The policeman he spoke to was “as mystified as I am,” he added.

  A woman lies on a road to block a vehicle transporting an army unit

  It was a sleepless night for some. "At first I was excited at the thought of not going to school today," 15-year-old Kwon Hoo told the BBC in Seoul on Wednesday. "But then overwhelmingly the sense of fear settled in, that kept me up all night." "No words can express how afraid I am that things might turn out like North Korea for our people," a South Korean who did not want to be named told BBC OS. Meanwhile, word was spreading that special forces had been deployed to the assembly building. Helicopters were heard overhead as they circled the skies before landing on the parliament’s roof. Reporters jostled in the crowd outside the gates, clicking away with their cameras. As concerns grew that the government might restrict the media, journalists in Seoul stayed in touch with one another, exchanging advice on how to stay safe. Ahn Gwi-ryeong, the 35-year-old spokesperson for the opposition Democratic Party found herself facing down soldiers at gunpoint. A video of the moment, where she is tugging at the barrel of a soldier's rifle, has since gone viral. "I wasn't thinking about anything intellectual or rational, I was just like, ‘We have to stop this, if we don't stop this, there's nothing else,’’ she told the BBC. "To be honest, I was a bit scared at first when I first saw the martial law troops. I thought, ‘Is this something that can happen in 21st century Korea, especially in the National Assembly?" "After such a storm last night, it was hard to get back to reality," she added, recalling the previous night. "I felt like I was witnessing the regression of history."

  As Ahn was confronting the soldiers, the clock was ticking for opposition lawmakers, who rushed to get into the assembly to block the order. Once that happened, the president would have to withdraw it. But first, MPs and their aides had to get inside. Some crawled through the legs of security forces, others shoved and screamed at armed soldiers; many frantically clambered over fences and walls. Hong Kee-won from the Democratic Party told the BBC that he had to scale a 1.5m (4.9ft)-high fence to enter the building, with the police blocking him even after he had shown them identification that proved he was a lawmaker. Hong said that protesters helped to hoist him over the wall. He had been asleep when Yoon made the announcement - when his wife woke him, he raced to parliament. “Democracy is strong here,” Hong said. “The military needs to listen to us, to the constitution, and not to the president.”

  Lawmakers had to force their way into the assembly...

  And vote by barricading themselves inside it

  Lawmakers who made it into the building huddled together, only slightly calmer than the people outside. Hastily, they barricaded the entrances with whatever they could find: cushioned benches, long tables, sofas. Some tried to push back soldiers who had made their way into the assembly building. By 01:00 local time, National Assembly Speaker Woo Won-sik submitted a resolution requesting martial law to be lifted. With that, less than two hours after Yoon’s shock declaration, 190 lawmakers who gathered, including some from Yoon’s party, voted unanimously to block it.

  After the vote, opposition leader Lee told reporters that this was "a decisive opportunity to break the vicious cycle and return to normal society". By 04:30, Yoon was back on TV, in front of the same blue curtains, saying he would withdraw martial law. But this would only be made official, he said, when he could assemble enough of his cabinet to lift the order. The announcement was met with cheers outside the assembly. In the hours before dawn, more people emerged from the building, from behind the barricades they had haphazardly put together. With holes in the doors and broken windows, the stately building already bears scars of the night when South Koreans saved their democracy. Schools, local businesses and banks opened as usual on Wednesday morning - and flights continued to land uninterrupted in South Korea's buzzing capital. But public anger - and the political fallout - was not spent. As the sun rose on Wednesday, thousands gathered to call for Yoon's resignation. The president is also facing impeachment proceedings. “We are a strong democracy...But Korean people want to be safe - President Yoon must resign or be impeached,” Yang Bu-nam, a Democratic Party politician, told the BBC.
