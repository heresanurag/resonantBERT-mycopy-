content: |-
  The Queen looks back on her coronation and describes what it's like to wear the Imperial State Crown.

  The Queen is sharing memories of her coronation and describes what it's like to wear the Imperial State Crown, in a BBC television documentary.

  Here she tells royal commentator Alastair Bruce why "you can't look down" while wearing it.

  The Coronation will be on BBC One at 20:00 on Sunday 14 January. Preview clips can be watched here.
