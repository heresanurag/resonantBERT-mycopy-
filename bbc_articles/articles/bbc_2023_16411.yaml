title: Egypt warned Israel days before Hamas struck, US committee chairman says -
  BBC News
date: '2023-10-12'
section: Middle East
url: http://www.bbc.co.uk/news/world-middle-east-67082047
content: |-
  But Israel's PM describes any claim it received a specific warning as "totally fake news".

