content: |-
  Liza Grach emotionally recounts escaping to Germany with her child - but without her husband.

  Watch this emotional interview with a Ukrainian mother as she recounts the moment she fled her home with her baby - but had to leave her husband behind.

  Liza Grach, who is now in Germany, is one of hundreds of thousands of Ukrainian civilians who have escaped the country since conflict broke out.
