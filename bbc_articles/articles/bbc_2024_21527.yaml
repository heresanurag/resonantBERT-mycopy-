title: Six-year-old boy found with 'significant neck injury' - inquest - BBC News
date: '2024-09-11'
section: Wales
url: http://www.bbc.co.uk/news/articles/crmwg1nly99o
content: |-
  Alexander Zurawski's mother is charged with his murder and remanded in custody.

  Alexander was a kind, helpful and clever boy, his family said

  A six-year-old boy who died in Swansea was found with a "significant neck injury" by police officers, an inquest has heard. Alexander Zurawski died at a property in Cwm Du Close in Gendros, Swansea, on 29 August. His mother, Karolina Zurawska has been charged with his murder and is remanded in custody. The inquest into the boy's death has been opened at the Guildhall in Swansea and adjourned to a later date.

  Det Insp David Butt from South Wales Police said paramedics and police officers were called to a property at Cwm Du Close on 29 August following concerns of people living nearby. Officers discovered “a young child with a significant injury to his neck area and... blood loss”, DI Butt added. He said Karolina Zurawska was arrested at the property on suspicion of murder. Det Insp Butt said a post mortem examination was undertaken at the University Hospital of Wales in Cardiff where the cause of death was found to be a “complex sharp force injury to the neck area”. The coroner for Swansea and Neath Port Talbot Aled Gruffudd said there is “sufficient evidence” that Alexander died of an unnatural cause. There were no family members present at the inquest opening. The inquest was adjourned until the criminal process has been concluded. Paying tribute to Alexander at the time, his family said he was a "very kind child" who was always well behaved and "never naughty". They added he was "very clever and mature for his age", with a "great understanding of facts" and spoke both English and Polish.
