title: Army veteran who lost twin brother to suicide speaks out - BBC News
date: '2021-04-25'
section: Wales
url: http://www.bbc.co.uk/news/uk-wales-56834473
content: |-
  Aaron Leventhal hopes this will encourage others to seek help, rather than bottle it up.

