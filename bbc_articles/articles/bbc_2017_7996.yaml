  Witnesses told CTV in Vancouver that Ms Harris lost control, narrowly missing pedestrians, and then crashed through a glass window pane.

  The network adds that an Advanced Life Support ambulance responded and remained on scene for about 45 minutes before leaving without its lights or sirens activated.

  Ms Harris may have been filming a scene for the female character Domino, played by Zazie Beetz. Photographers had spotted Beetz in costume riding a motorcycle last week.
