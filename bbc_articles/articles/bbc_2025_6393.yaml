  Fresh from her five wins at the 2025 Brit Awards in March, Charli XCX had fans reliving their "brat summer" on Saturday, performing such hits as Von Dutch and 360 to a bumper crowd. The British singer also brought out a number of guests during her set, including Troye Sivan, Lorde and Billie Eilish, who appeared on the chart topping hit Guess. Before the performances could even begin, however, there was chaos at the gates, with ticket holders queuing in heavy traffic to get into the festival. This year Coachella replaced its first come first-served system for campers with a reservation-style programme, forcing attendees to wait up to 12 hours in their vehicles in scorching desert temperatures with limited facilities.

  Fans wore lime green and held up homemade banners for Charli XCX's set

  Most music festivals are never short of political activism and this year's Coachella was no different. Left-wing Senator Bernie Sanders took the stage before singer songwriter Clairo's Saturday set to attack US President Donald Trump's administration. "This country faces some very difficult challenges," he told the crowd. "The future of what happens to America is dependent upon your generation." Green Day also reworded lyrics from some of their hits during the band's headline performance, referencing the war in Gaza and railing against what frontman Billy Joe Armstong has repeatedly called "the Maga agenda".

  Following their success at the Bafta awards for their self titled feature film, Irish rap group Kneecap took to the Sonora stage and had the crowd chanting about former UK Prime Minister Margaret Thatcher. The online livestream of the performance cut out at the exact moment the band made their political remarks.

  Coachella has come under scrutiny in recent years, with one survey reporting in 2024 that 75% of 3,000 US respondents thought the festival was being overshadowed by influencers. The festival also suffered a number of talent-related incidents last year. Blur frontman Damon Albarn berrated the crowd in 2024, accusing them of being "lacklustre" in their singing. "You're never seeing us again so you might as well sing it," he said. "Know what I'm saying?" Grimes was also forced to apologise for "major technical difficulties" during her Coachella DJ set. Fans watched the singer scream in frustration after a string of problems including songs playing at double speed. The festival will continue on Sunday and resume next weekend.
