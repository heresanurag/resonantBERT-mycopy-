title: 'Coachella: Stars mingle in audience as Lady Gaga wows festival - BBC News'
date: '2025-04-14'
section: Culture
url: http://www.bbc.co.uk/news/articles/c807p1gxn7jo
content: |-
  Headliners at the California music festival this year include Megan Thee Stallion, Post Malone and Green Day.

  Popstars sneaked into the audience at Coachella to watch each other perform this weekend - as Lady Gaga wowed festivalgoers with a dramatic main stage set. Fans swarmed to catch the Poker Face singer perform songs from her new album Mayhem, delivering a visual spectacle by opening her set with what can only be described as a satanic ritual to her 2011 song Bloody Mary. Spotted watching on, external were South Korean pop group Blackpink, whose member Lisa was also seen dancing to K-pop boy band Enhypen after performing herself. Meanwhile, Beautiful Things singer Benson Boone surprised the crowd by bringing out Sir Brian May for a rendition of Queen's Bohemian Rhapsody while executing a trademark front flip.

  Actor Timothee Chalamet and partner Kylie Jenner were seen mingling with the crowd, external on the second day of the music festival, which is taking place at the Empire Polo Club in Indio, California. Blackpink's Lisa, who recently starred in the third season of HBO's The White Lotus, was supported during her set by co-star Patrick Schwarzenegger, who posted a clip of himself singing along to her hit Money. Meanwhile, Justin and Hailey Bieber, singer Tate McRae and Austrailian rapper The Kid Laroi were spotted dancing, external at Yeat's set on Friday night. Headline acts this year include Megan Thee Stallion, rapper Post Malone and US punk-rock band Green Day at the 100,000-attendees-a-day event.

