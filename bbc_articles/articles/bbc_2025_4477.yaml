content: |-
  Influencers Andrew and Tristan Tate face human trafficking and other charges in Romania, which they deny.

  Tates return to Romania to 'prove their innocence'

  This video can not be played To play this video you need to enable JavaScript in your browser. Watch: 'We deserve our day in court', Andrew Tate says

  British-American influencer Andrew Tate and his brother Tristan have returned from the US to Romania, where they face human trafficking and other charges. Speaking to the press outside their house in Bucharest, the brothers said they were back because "innocent men don't run from anything." "We've come here to prove our innocence because we deserve our day in court," Andrew Tate added. The BBC understands the brothers will appear at a police station to register on Monday. They strongly deny the allegations against them.

  Andrew Tate earlier told his 10.8 million followers on X that he had spent $185,000 (£143,000) on a private jet alongside his brother to "sign one single piece of paper in Romania." The brothers, who are dual US-UK citizens, arrived in the US at the end of February after Romanian prosecutors lifted a two-year travel ban. They told reporters they loved Romania and were "never going to leave" but would take holidays if and when they felt like it. Andrew Tate, 38, is a self-proclaimed "misogynist" who claims to have made millions from social media despite being previously banned from platforms for his views. He and Tristan, 36, are accused of human trafficking and forming an organised group to sexually exploit women in Romania. Andrew Tate is also accused of rape. The brothers are also the subjects of a separate investigation in the UK into allegations of rape and human trafficking. In the US they face a civil case from a woman who alleges the brothers coerced her into sex work, and then defamed her after she gave evidence to Romanian authorities. They deny the allegations against them. Romanian prosecutors stressed the case against the brothers had not been dropped and that they remain "under judicial control" - meaning they have to regularly report to the authorities. However, their exit sparked concerns that prosecutors felt political pressure from US President Donald Trump's administration. The US president said he knew nothing about the Tate brothers being released from Romania. When asked about concerns surrounding US influence, the brothers rejected these claims. "There's no American pressure, there's just the rule of law," the eldest brother told reporters. The Tates have a large US following and are popular figures among some elements of the American right. Earlier in February, some of Andrew Tate's alleged victims said they were "extremely concerned" by reports that US officials had asked for his travel restrictions to be relaxed. Andrew Tate was put under house arrest in Romania in August 2024 when prosecutors launched a second criminal investigation against him and his brother Tristan, as well as four other suspects. They all deny wrongdoing. Separately, the brothers are wanted in the UK to face allegations of sexual assault, which they also deny. The brothers have also been accused of tax evasion in the UK. A British court ruled in December 2024 that police could seize more than £2m ($2.6m) from them for failing to pay tax on £21m in revenue from their online businesses. Andrew Tate said the ruling was "not justice" and called it a "co-ordinated attack".
