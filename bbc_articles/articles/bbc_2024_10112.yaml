title: PSNI in plea for help to catch predatory money lenders - BBC News
date: '2024-05-14'
section: Northern Ireland
url: http://www.bbc.co.uk/news/uk-northern-ireland-69007665
content: |-
  Just three people have been prosecuted for illegal money lending in Northern Ireland since 2017.

  The PSNI has urged the public to help bring more predatory money lenders before the courts. Just three people have been prosecuted by the Paramilitary Crime Task Force for illegal money lending in Northern Ireland since 2017. PSNI Supt Joanne Gibson said it was "totally unacceptable for communities to go through this fear and intimidation". A new campaign on the problem is being led by the Crimestoppers charity. It has the backing of the Police Service of Northern Ireland (PSNI), the Executive Programme on Paramilitarism and Organised Crime and Advice NI. "We want people to tell us because we absolutely want to start seeing those convictions and seeing those successful prosecutions that they have had in the rest of the UK," PSNI Supt Joanne Gibson told BBC Radio Ulster's Good Morning Ulster. Supt Gibson said "criminal and predatory money lenders make their living from exploiting and intimidating others and, sadly, they are now taking advantage of current economic times to tighten their grip". "It's a manipulative process, which starts with the lender supposedly 'helping' those who are struggling to make ends meet," she added.

  "When loan repayments, with inevitable hefty interest rates, are not met the lenders will use threats and violence. "Victims with unpaid debts, and indeed their loved ones, are exploited and often forced to repay by other means, such as storing or selling drugs. "We've also heard shocking anecdotes of young people being forced into sexual exploitation as a form of repayment." Supt Gibson said there was a "renewed focus" on this particular crime type and they wanted to build on the Northern Ireland Executive's ending the harm, external campaign.

  Advice NI said it had "seen an increase in people contacting our free debt advice helpline over the last quarter due to the cost-of-living crisis"

  "The ending the harm campaign I think has raised awareness significantly and we just want to continue to build on that," she added. "But we totally recognise that police cannot solve this problem alone, it is one of those wicked problems that we are depending on the help of our partners and our communities themselves to start to tell us what is happening." Det Supt Avine Kelly said information would indicate "that this type of criminality is occurring throughout all of Northern Ireland and specifically Mid and East Antrim, Belfast and Ards and North Down". Advice NI, an independent charity which offers confidential debt advice to anyone who finds themselves in this situation, said it had "seen an increase in people contacting our free debt advice helpline over the last quarter due to the cost-of-living crisis". "Advisors are dealing with more people experiencing extreme financial difficulties and poverty, some of whom will turn to illegal and high-cost money lenders to make ends meet," its chief executive Bob Stronge said. "We would encourage anyone struggling to make ends meet to contact our Freephone helpline on 0800 915 4604 to have a benefits entitlement check carried out to ensure they are in receipt of all the benefits they are entitled to, or speak to our debt advisors who are trained experts, and can provide help and support to those in any type of debt and will work with you to find a solution that is right for you." Mick Duthie, Director of Operations at the independent charity Crimestoppers, external, said "fear and intimidation is used to stop people from speaking up about those involved in predatory money lending". "This allows criminals to profit, often at the expense of the most vulnerable in society," he said. "Our charity guarantees you'll stay completely anonymous when you contact us either via our website or on the phone."
