title: 'Streatham attack: Sudesh Amman tried to stab me - BBC News'
date: '2020-02-04'
section: UK
url: http://www.bbc.co.uk/news/uk-51375908
content: |-
  A woman describes the moment Sudesh Amman launched his attack in south London on Sunday.

  This video can not be played To play this video you need to enable JavaScript in your browser. Rosa (not her real name) was the first person Sudesh Amman attacked – this is her story

  A woman has told how the Streatham attacker tried to stab her but failed because he "didn't realise the knife still had plastic packaging on".

  Rosa, not her real name, was in a shop in Streatham High Road on Sunday when Sudesh Amman, 20, launched his attack.

  After running from the shop, Amman went on to stab two others on the south London street in scenes she described as "like a movie".

  He was shot dead one minute later, by police who had been watching him.

  Rosa said the experience was "horrific", adding: "Someone could have killed me when I was just going out to the shop."

  Speaking in Spanish in an interview translated by BBC News, Rosa, who is originally from the Dominican Republic, said she had been in a corner shop for about five minutes when "the man came in... who hurt the other people".

  She told the BBC's Lucy Manning: "He came in and took a knife and he looked like he was leaving the shop. The owner thought he was going to stop by the cashier to pay.

  "But... he pushed me, he tried to open and remove the plastic packaging from the knife but he didn't manage.

  "He pushed and he stabbed me but the knife was still covered with plastic."

  Amman, who had previously been convicted of terror offences, was seen entering a shop in Streatham High Road shortly before 14:00 GMT on Sunday.

  Once outside the shop he attacked two people before he was fatally shot by police - who had had him under surveillance.

