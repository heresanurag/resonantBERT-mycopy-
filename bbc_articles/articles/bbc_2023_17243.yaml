title: 'Succession actor Sarah Snook: ''AI is terrifying'' - BBC News'
date: '2023-11-04'
section: General
url: http://www.bbc.co.uk/news/entertainment-arts-67319851
content: |-
  The actor says the film industry should "set a precedent" on the use of artificial intelligence (AI).

  Actor Sarah Snook says the film industry should "set a precedent" on the use of artificial intelligence (AI).

  Snook, best known for her role as Shiv in the TV show Succession, said the use of AI is an "uncharted landscape".

  She spoke to Laura Kuenssberg ahead of her role in a London stage adaptation of The Picture of Dorian Gray. She wasn't able to talk about her time on Succession because of the Hollywood actors' strike.

  Many Hollywood screen actors are on strike, demanding better safeguards against the use of AI in TV and movie productions. Striking actors can't promote their screen work, though they can talk about their stage work.

  You can watch the full interview on Sunday with Laura Kuenssberg from 09:00 GMT on BBC One and iPlayer.
