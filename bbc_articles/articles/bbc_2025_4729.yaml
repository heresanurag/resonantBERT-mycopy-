title: Hastings half marathon cancelled as police burn chemicals - BBC News
date: '2025-03-23'
section: Sussex
url: http://www.bbc.co.uk/news/articles/cz614e6eepgo
content: |-
  The popular Hastings running event was due to take place on Sunday.

  Sussex Police they have carried out a controlled burn on chemicals found in the property

  Organisers of the Hastings Half Marathon have cancelled the event after explosive chemicals were found at a property which is on part of the route. Sussex Police confirmed on Saturday they had carried out a "controlled burn" of the chemicals, which were discovered on the A259 Marina in St Leonards on Thursday. A 28-year-old man was arrested after the discovery, which prompted officers to evacuate local properties. The force said it had also discovered about 500 additional cannisters containing chemicals that are "not considered to be explosive".

  The popular Hastings running event, which had more than 3,000 runners taking part last year, was due to take place on Sunday. Organisers said the decision "was not taken lightly", and they "accept how disappointing this is for everyone". A spokesperson said: "Following advice from authorities, we explored possible alternatives but safety of everyone involved has to come first." Anyone who was due to run will be contacted by the event, organisers added.

  Residents near a property on the A259 Marina in St Leonards were evacuated on Friday

  A Sussex Police spokesperson said searches were continuing for any other hazardous materials in the house. Authorities have added there is "no indication the 28-year-old man arrested intended to cause harm either to himself of anybody else". They said he has been detained under the Mental Health Act while inquiries continue. The 100m cordon remains in place at the site. Police said a decision will be made if this can be reduced on Saturday evening. Residents in the properties that have been evacuated are staying in a local hotel, arranged by Hastings Borough Council.
