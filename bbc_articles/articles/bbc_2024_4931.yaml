title: Putin thanks Russia after predictable win - BBC News
date: '2024-03-19'
section: General
url: http://www.bbc.co.uk/news/world-europe-68593039
content: |-
  President Vladimir Putin thanks Russians for putting their trust in him as he celebrates his election win.

  President Vladimir Putin has thanked Russians for putting their trust in him as he celebrated his inevitable election win.

  Mr Putin received applause and cheers from supporters as he claimed victory and a fifth term in power.
