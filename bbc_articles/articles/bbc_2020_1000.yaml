content: |-
  Find out who has won prizes at the 77th annual Golden Globe Awards - and who has missed out.

  Renée Zellweger was recognised for her portrayal of Judy Garland

  The winners of this year's Golden Globe Awards have been announced at a ceremony in Los Angeles, California.

  Here is the full list of winners and nominees:

  Best actress in a motion picture - musical or comedy

  Best actor in a motion picture - musical or comedy

  Awkwafina was named best actress in a musical or comedy for The Farewell

  Best actress in a supporting role in any motion picture

  Best actor in a supporting role in any motion picture

  Elton John and Bernie Taupin accepted the award for best original song

  Dundee-born Brian Cox was named best drama actor for Succession

  Best actress in a television series - musical or comedy

  Best actor in a television series - musical or comedy

  Best television limited series or motion picture made for television

  Michelle Williams was awarded best actress in a limited series for Fosee/Verdon

  Best actress in a limited series or TV movie

  Best actor in a limited series or a motion picture made for television

  Best actress in a supporting role in a series, limited series or a motion picture made for television

  Best actor in a supporting role in a series, limited series or motion picture made for television

