  Selecting QB Michael Penix Jr in the first round of the draft would not raise any eyebrows - if the Falcons hadn't just splashed out $180m to sign Kirk Cousins. It's a real puzzler that will dominate their entire season. Coming off a serious injury, Cousins will now be under pressure right from the off, with Penix lurking in the background.

  Rookie QB JJ McCarthy suffered a season-ending injury in pre-season, but even with him not too much was expected - bar trying to be a nuisance to Detroit, Green Bay and Chicago in their division. The team's big star, he'll only have Sam Darnold throwing him the ball, but such a talented receiver can still produce jaw-dropping plays.
  • None The NFL star being driven to greatness by his blinged-up alter-ego

  A new coaching staff and plenty of upheaval means anything is possible for the Titans, but it's a wait-and-see approach - especially in what is a sneaky tough division. Four touchdowns on his debut and a comeback against Miami were highlights, but he showed plenty of rough rookie QB edges. There is talent there though.

  They regressed last year and might take a step even further back if their big-money gamble on QB Daniel Jones, who is coming back from a torn ACL, backfires. The New York media market is brutal. Jones has been so-so in his career so needs to hit the ground running this season, or else...

  Respected coach Jim Harbaugh is expected to finally convert some of the Chargers' promise into results, with the Bolts on a lot of sleeper lists for the season. As long as he overcomes a foot injury, Herbert can finally add more wins to the stats he produces - as his QB talent has never been in doubt.

  Dan Quinn coached the excellent Dallas defence so is a good head coaching hire. If he gets a similar tune in Washington to add to exciting rookie QB Jayden Daniels, the Commanders can do something of a Houston from last year. Picked second behind Caleb Williams just gives Daniels that extra chip on his shoulder - and his pre-season form has been eye-catching.

  Jerod Mayo is in a tough spot replacing the legendary Bill Belichick - who at least produced two losing seasons to make it just a touch easier to follow. It's a settling in year for Mayo though. Third off the board in the draft, Maye has the equally unenviable task of trying to become a regular Patriots starting QB. He won't start straight away and looks very much a project.

  A poor record but the Cards at least played tough at times and there are signs of hope at least on the offensive side, with exciting QB Kyler Murray back from injury. The Cards were lucky that the three teams above them in the draft needed QBs, so they could grab a receiver thought of as a true generational talent.

  Trading for Bryce Young resulted in just two wins and Chicago getting Caleb Williams this year, and watching CJ Stroud flourish after passing on him in the draft will not have helped matters in Carolina - where there are still big gaps in the squad. He had little help last year but should find a bit more this season. That has to result in wins though, given the pressure associated with being a number one pick.
