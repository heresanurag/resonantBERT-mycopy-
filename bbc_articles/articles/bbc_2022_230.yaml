title: 'A66: Snow closes road amid travel disruption in north of England - BBC News'
date: '2022-01-07'
section: England
url: http://www.bbc.co.uk/news/uk-england-59907457
content: |-
  A major route was shut on the Durham and Cumbria border following overnight snowfalls.

  Snow hit Cumbria and Durham causing traffic disruption at the A66

  Snow caused travel disruption in parts of northern England and forced the closure of part of a major trans-Pennine route.

  The A66 was closed for several hours due to compacted snow between the A1(M) at Scotch Corner and the A685 at Brough.

  Durham Police said a snowplough team had been deployed and the road was later reopened.

  Routes at Stainmore on the Durham and Cumbria border were also affected.

