  The A590 at the High Low Newton bypass in Cumbria was also blocked due to several vehicle collisions.

  Pennine routes were also affected on the A689 at Lanehead in Durham.

  The Met Office has issued a weather warning of snow and ice for the Midlands and the north-west of England, from Stoke-on-Trent up to the Scottish border.
