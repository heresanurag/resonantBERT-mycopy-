title: Blackface TV 'makes Japan look ignorant' - BBC News
date: '2018-01-05'
section: General
url: http://www.bbc.co.uk/news/world-asia-42561799
content: |-
  Why a black writer in Japan wants comedians to stop blacking up to make people laugh.

  A well-known Japanese comedian used blackface makeup in a New Year show while pretending to be Eddie Murphy.

  US writer Baye McNeil, who lives in Japan, says this needs to stop because it makes Japan look ignorant.
