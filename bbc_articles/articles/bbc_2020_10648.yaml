  Bedfordshire Police said there were no reports of injuries, although it had received a large number of calls.

  Across the border in Buckinghamshire, Thames Valley Police tweeted that is was not a major incident, adding that "extra resources have been drafted in to clean up the mess created by the duty inspector's coffee".

