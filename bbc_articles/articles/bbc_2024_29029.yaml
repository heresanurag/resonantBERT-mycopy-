title: Hamas says female hostage killed in northern Gaza - BBC News
date: '2024-11-24'
section: Middle East
url: http://www.bbc.co.uk/news/articles/ckgzvqx252yo
content: |-
  The woman's identity has not been revealed and it is unclear how or when she is said to have died.

  Israel says it is investigating a claim by Hamas that a female hostage has been killed during Israeli operations in northern Gaza. The woman's identity was not revealed by Hamas, and it was unclear how or when she is said to have died. The Israel Defense Forces (IDF) said it was currently unable to “verify or refute” the claim, but that its representatives are in contact with the woman's family. “This evening the terrorist organization Hamas released a document in which a kidnapped woman is allegedly seen killed,” the IDF said in a statement. “We are checking the information and at this stage we are unable to verify or refute it.”

  Hamas claimed that communication with the woman’s captors had recently been restored after several weeks, leading to the discovery of her death. Abu Ubeida, spokesman for Hamas’s military wing, the al-Qassam Brigades, said another female hostage who the woman was held with had been injured and that her life was endangered. Israeli authorities believe there are around 60 living hostages remaining in Gaza - and the bodies of dozens of others who are believed to be dead. Hamas is proscribed a terrorist organisation by the US, UK, and many other nations. The news came as Israel pressed ahead with its operations across Gaza on Saturday. According to the territory's Hamas-run health ministry, about 120 people were killed by Israeli airstrikes across the territory in the past 48 hours. Israel launched a campaign to destroy Hamas in response to the group's unprecedented attack on southern Israel on 7 October 2023, in which about 1,200 people were killed and 251 others were taken hostage. Nearly 44,000 people have been killed and more than 104,000 injured in Gaza since then, according to the territory's Hamas-run health ministry.
