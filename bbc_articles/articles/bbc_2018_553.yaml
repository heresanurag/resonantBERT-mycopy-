title: Dylan Farrow addresses Woody Allen sexual assault claim - BBC News
date: '2018-01-18'
section: General
url: http://www.bbc.co.uk/news/entertainment-arts-42722972
content: |-
  Woody Allen's adopted daughter says she feels "outrage" after "years of being ignored".

  Woody Allen's adopted daughter has appeared on CBS This Morning to talk about her sexual assault claim against the director.

  The 32-year-old has repeatedly accused Allen of molesting her when she was seven - claims the director has always denied.
