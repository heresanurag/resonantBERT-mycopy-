title: 'Coronavirus in Wales: Monday 4 May 2020 - BBC News'
date: '2020-05-04'
section: Wales
url: http://www.bbc.co.uk/news/live/uk-wales-52523730
content: |-
  First minister says the lockdown measures have "helped to move us past the peak" of the virus.

  Welsh politicians have held discussions with General Electric about the future of its south Wales plant after the company announced plans to cut 13,000 jobs globally.

  Mick Antoniw, the Welsh Assembly member for Pontypridd, said the company would be looking for voluntary redundancies at the Nantgarw site, rather than compulsory ones, and will also safeguard its apprenticeship scheme

  GE had been forced to take action because of the "unique economic circumstances" facing it, with the air industry in particular suffering a "massive impact" from coronavirus, Mr Antoniw said.

  "It could be a lot worse because, at the moment, three-quarters of the air industry is shut down," he added.

  GE said on Monday it was planning to cut 25% of its worldwide workforce as part of $3bn savings. It employs about 1,400 people at Nantgarw.

  The mounting woes for the aviation sector are now expected to last into 2021 following a dramatic fall in passenger air travel demand.

  Pontypridd MP Alex Davies-Jones said: "Considering what's going on, it does seem that they've done everything they can to protect jobs and the business."
