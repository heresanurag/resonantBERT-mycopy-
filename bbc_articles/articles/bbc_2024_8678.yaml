id: bbc_2024_8678
title: 'Ukraine: TV tower collapses after missile strike in Kharkiv - BBC News'
date: '2024-04-23'
section: General
url: http://www.bbc.co.uk/news/world-europe-68877813
content: |-
  The local military says that digital TV has been cut off in the surrounding area.

  Footage shows the moment a major TV tower broke in half and fell to the ground in the Ukrainian city of Kharkiv.

  Local officials said it was likely to be a Russian missile attack on television infrastructure.

  The local military told the BBC that digital TV was cut off in the surrounding area.

  There were no casualties because workers were in shelters, regional governor Oleh Syniehubov said.

  Kharkiv, which is Ukraine's second largest city, has been pounded by Russian missile and drone strikes in recent weeks.
