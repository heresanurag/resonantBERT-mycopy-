title: 'Watch: Drone crashes into erupting Icelandic volcano - BBC News'
date: '2021-06-01'
section: General
url: http://www.bbc.co.uk/news/world-europe-57314928
content: |-
  A flight to film the erupting Fagradalsfjall volcano didn't go quite to plan.

  A drone trying to film the erupting Fagradalsfjall volcano has crashed into a lava spew.

  YouTuber Joey Helms wanted a close up view of the spectacle, but the flight didn't go quite to plan.

  The volcano has been erupting since March.
