title: Edible bandages for bears' burnt paws - BBC News
date: '2018-01-26'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-42810612
content: |-
  After two bears are injured in California wildfires, a creative solution to get them back on their feet.

  December's Thomas Fire left these two bears barely able to walk due to severe burns on their paws.

  So, a team from the California Department of Fish and Wildlife and veterinarians from UC Davis crafted innovative - and edible - bandages to help them heal.
