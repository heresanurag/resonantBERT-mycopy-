content: |-
  Former England and Harlequins prop Joe Marler announces his retirement from professional rugby aged 34.

  Joe Marler made 95 appearances for England, winning three Six Nations titles

  Former England and Harlequins prop Joe Marler has announced his retirement from professional rugby at the age of 34. Marler earned 95 international caps across 12 years with the national team, winning three Six Nations Championships. He has played his entire club career at Harlequins, winning two Premiership titles and the European Challenge Cup and making 204 appearances in the famous quarters. His last professional match will be Harlequins' Premiership fixture against Bristol Bears at The Stoop on Friday. "The time has come to finally jump off the rollercoaster and walk away from this beautifully brutal game. On Friday night I'll play my last-ever match for Quins. After all these happy years, it's over," Marler said in a statement. "I feel lucky to have pulled on the jersey worn by so many idols of mine, and so many better players. "That's an incredible thing to me. I got to stand alongside so many great players and people that have made this club so special."

  Marler made his international debut in 2012 against the Springboks on England's tour of South Africa. In 2015, he was part of the England squad that failed to advance past the pool stage of a home World Cup. But the following year, they won all five games to claim the Grand Slam at the Six Nations, with Marler featuring in every match. England retained their crown in 2017, just missing out on a second successive Grand Slam in a final-day defeat by Ireland, and were again champions in 2020. Despite announcing his international retirement in 2018, Marler returned to the England fold to compete at the 2019 World Cup in Japan, where they made it to the final before being beaten 32-12 by South Africa in Yokohama. His last World Cup appearance was in England's 16-15 semi-final defeat by the Springboks in Paris last year, before he again announced his international retirement in November. His form for England and Harlequins earned him call-ups for the British and Irish Lions tour of New Zealand in 2017, and for the Barbarians in 2019 and 2022.

  Marler was part of the England team that lost the 2019 World Cup final against South Africa in Japan

  Marler made his Quins debut in 2009-10 and was part of the squad that won the 2011-12 Premiership title, where he started in the 25-23 semi-final win over Northampton Saints and the 30-23 final victory over Leicester Tigers at Twickenham. He played 18 times in the club's run to their second league title, starting in the epic 40-38 final victory over Exeter Chiefs at the national stadium. The Quins legend has made two appearances so far this season and is in line to play his last professional match against Bristol on Friday. "The most important thing I want to say to our fantastic supporters is thank you," he said. "Thank you for your patience and support, when you could easily have turned your back on me. "For the kindness you've shown, even when I haven't deserved it, and for cheering my name, even after I'd been banned again." News of Marler's retirement comes amid a flurry of contract extensions announced at Harlequins during the autumn international break. Vice captain Cadan Murley, scrum-half Will Porter, winger Cassius Cleaves, full-back Tyrone Green, flanker Will Evans and hooker Sam Riley have all committed their futures to the club in the past two weeks.

  Marler (right) was part of the Harlequins team that won the 2020-21 Premiership final against Exeter Chiefs at Twickenham

  Marler's larger-than-life public persona grabbed headlines and has given him a crossover profile few front-rowers can match. Not all of his antics reflected well on him. His on-field trash talk crossed lines and prompted apologies on more than one occasion. His change of mind on New Zealand's haka – which he initially branded "ridiculous" earlier this month – was just the latest inelegant public u-turn. But his honesty over his struggles with mental health and balancing family life with the long-haul existence of a Test international was also refreshing, breaking down stigmas and clearing the way for others to talk about such issues. On the field, he has been England's most accomplished scrummaging loosehead for a decade, with then-coach Eddie Jones admitting that he regretted picking Mako Vunipola's all-court skills ahead of Marler's set-piece prowess to start the 2019 Rugby World Cup defeat against a powerful South Africa. At club level, he has been a Harlequins stalwart, bridging eras as part of both the 2012 and 2021 Premiership title wins. In taking Quins team-mate Fin Baxter under his wing, he has also played a key role in the succession plan for both club and country.
