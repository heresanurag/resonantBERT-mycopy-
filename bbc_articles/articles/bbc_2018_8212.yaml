title: 'Countess of Chester Hospital: Woman held in baby deaths probe - BBC News'
date: '2018-07-04'
section: Liverpool
url: http://www.bbc.co.uk/news/uk-england-merseyside-44696813
content: |-
  A healthcare professional is being held over the deaths of eight babies at a Cheshire hospital.

  Police have been investigating neonatal deaths between March 2015 and July 2016

  A healthcare professional has been arrested on suspicion of murdering eight babies and attempting to kill six others at a hospital.

  Cheshire Police said the woman's arrest was a significant step forward in an investigation into deaths at the Countess of Chester Hospital.

  Officers have been investigating the deaths of 17 newborns at the neonatal unit between March 2015 and July 2016.

  A spokesman said the probe also covered 15 "non-fatal collapses".

  The cases being investigated involve families from the Cheshire and north Wales area.

  Police officers are searching a house and a car in Westbourne Road, Chester

  The Countess of Chester declined to comment on whether any staff had been suspended and Cheshire Police would not reveal the role of the healthcare professional within the hospital.

  Police have confirmed they are searching a property in Westbourne Road, Chester, about a mile from the hospital, in connection with the investigation.

  Neighbours said a woman lived at the house and had moved in about two years ago.

  Det Insp Paul Hughes said the investigation was highly complex and very sensitive and officers were doing "everything we possibly can to try to establish in detail what has led to these baby deaths and collapses".

  The hospital says the neonatal unit was "safe to continue in its current form" and remained open to women over 32 weeks in their pregnancy

  He said there were "no set timescales for this coming to a conclusion but we remain committed to carrying out a thorough investigation as soon as possible".

  "Parents of all the babies are continuing to be kept fully updated and are being supported.

  "This is an extremely difficult time and it is important to remember that there are bereaved families seeking answers as to what happened to their children."

  Police were asked to investigate the deaths of eight babies in May 2017, a probe which has since widened to include nine more.

  In 2017 the Countess of Chester was among 21 hospitals called upon to investigate higher than average death rates.

  Authors of the MBRRACE-UK (Mothers and Babies: Reducing Risk through Audits and Confidential Enquiries across the UK) report looked at stillbirths and neonatal deaths around the UK in 2015.

  They found the Countess of Chester Hospital NHS Foundation Trust had a neonatal death rate of 1.91 for every 1,000 live births that year.

  This was the highest out of the 43 trusts of a similar size it was compared with, which had an average of 1.27 neonatal deaths for every 1,000 live births.

  There were also 5.42 extended perinatal deaths - deaths within four weeks - for every 1,000 births, including stillbirths. The average for similar sized maternity units was 4.73 deaths per 1,000 births.

  The rate declined in 2016 but was still among the highest in the group.

  Hospital medical director Ian Harvey said asking police to investigate the deaths had not been "something we did lightly, but we need to do everything we can to understand what has happened".

  He added the neonatal unit was "safe to continue in its current form" and remained open to women over 32 weeks in their pregnancy.

  The unit has 13 cots providing specialist care for about 400 newborn and premature babies born at 32 weeks and above each year.

  It stopped providing care for those born earlier than 32 weeks in July 2016 after the hospital reported "a greater number of baby deaths and collapses than normally expected".

  A review by the Royal College of Paediatrics and Child Health the following February said no "definitive explanation" had been found for the increase in mortality rates at the neonatal unit and there were no "obvious factors" linking the deaths.

  An inspection of the hospital by the Care Quality Commission in 2016 found the unit's nursing staff levels "did not meet standards recommended by the British Association of Perinatal Medicine" and it "lacked storage space and resources" for effective infection control.

