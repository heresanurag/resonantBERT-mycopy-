title: Ted Lasso star takes on Christmas classic - BBC News
date: '2024-12-10'
section: General
url: http://www.bbc.co.uk/news/videos/cdx9ndv4yq1o
content: |-
  Comedian and actor Nick Mohammed is best known for his role in Apple's hit comedy-drama Ted Lasso, which is filmed in Richmond in south-west London.

  The Londoner's latest venture is on the West End stage, where he is putting a comedy spin on the Dickens classic A Christmas Carol.

