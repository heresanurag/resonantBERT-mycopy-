title: 'Heathrow: Nine Just Stop Oil activists arrested at airport - BBC News'
date: '2024-07-24'
section: London
url: http://www.bbc.co.uk/news/articles/c2502nj7ynqo
content: |-
  The activists are suspected of conspiring to interfere with a site of key national infrastructure.

  Ten Just Stop Oil supporters were arrested at Heathrow

  A group of 10 Just Stop Oil activists have been arrested at Heathrow Airport but operations are continuing as usual, police have said. They were detained near the airport and taken into custody on suspicion of conspiring to interfere with a site of key national infrastructure under the Public Order Act. The campaigners said “the international uprising begins” and claimed supporters of climate activist organisation Last Generation were behind delays at Cologne-Bonn Airport. The German airport confirmed that “unauthorised people” gained access to its security area earlier.

  Footage of Heathrow shared on the Just Stop Oil (JSO) account on X, formerly Twitter, appears to show people cycling near a high barbed wire-topped fence close to passenger planes before dismounting and being approached by officers. A JSO spokesman said: "We refuse to die for fossil fuels. Continued burning of oil, gas and coal, as we pass irreversible tipping points that threaten to spin our climate out of control in a rapidly accelerating way, is jeopardising the stability on which our entire society depends."

