  A spokesman for Heathrow Airport said: “There has been absolutely no impact on operations whatsoever” and that “no-one gained entry to anywhere they shouldn’t be. “Thanks to swift action from the police and airport colleagues, there is no disruption to passenger journeys.

  Earlier this month, the High Court granted an injunction prohibiting anyone from entering, occupying or remaining on London Heathrow Airport land in connection with environmental campaigns, without consent. Anyone breaching the injunction might be jailed, fined or have their assets seized for contempt of court.

  The action follows the imposition of long jail sentences on five members of JSO who disrupted the M25 in 2022. The sentences - of four and five years - were described in an open letter signed by hundreds of high-profile names - as "one of the greatest injustices in a British court in modern history".
