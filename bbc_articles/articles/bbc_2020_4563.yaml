title: 'Sheikh Mujibur Rahman: Army officer hanged for murder of Bangladesh''s founding
  president - BBC News'
date: '2020-04-12'
section: Asia
url: http://www.bbc.co.uk/news/world-asia-52258557
content: |-
  Abdul Majed spent 25 years on the run after he was found guilty of murdering Sheikh Mujibur Rahman.

  Sheikh Mujibur Rahman is commemorated on banners in Dhaka

  A former army officer convicted of killing Bangladesh's independence leader in 1975 has been executed.

  Abdul Majed was hanged in the capital Dhaka after his appeal for presidential clemency was rejected this week.

  He was arrested on Tuesday after spending 25 years on the run for the assassination of Sheikh Mujibur Rahman.

  Rahman - the father of the current prime minister, Sheikh Hasina - was killed during a military coup in 1975, along with most of his family.

  His death came just four years after Bangladesh gained independence from Pakistan.

  Majed continued to live in the country after the coup but it is believed he fled to India in 1996 when Mrs Hasina was elected prime minister.

  Her government overturned a law protecting her father's killers from prosecution, and in 1998 Majed and a dozen other army officers were sentenced to death.

  Bangladesh's supreme court upheld the verdict in 2009 and five of the killers were executed soon afterwards. Majed was arrested after returning to the country last month.
