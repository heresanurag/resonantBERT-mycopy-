  Footage that appeared to be from the attack shows a chaotic scene: smoke filling the air, people running in multiple directions, spots of grass on fire and people injured on the ground. In images and videos posted online, a man who appears to be the suspect is seen without a shirt and holding bottles with liquid with pieces of red cloth inside them. He can be heard yelling at the crowd and appears to be advancing towards them as some rush to flee. As he screams, one woman is seen on the ground and appears injured. People surround her and a man pours water on her body. Footage shows police rushing to the scene and arresting the suspect. Police say he was taken to hospital with injuries. "It is clear that this is a targeted act of violence and the FBI is investigating this as an act of terrorism," Mr Michalek said. "Sadly, attacks like this are becoming too common across the country." Colorado's Attorney General Phil Weiser said that from what officials knew, the attack "appears to be hate crime given the group that was targeted". "People may have differing views about world events and the Israeli-Hamas conflict, but violence is never the answer to settling differences," Weiser said in a statement on Sunday. "Hate has no place in Colorado." Israel's foreign minister, Gideon Sa'ar, said he was "shocked" by the incident and called the attack "pure antisemitism fuelled by the blood libels spread in the media". Danny Danon, Israel's ambassador to the UN, called for "concrete action" in response to the attack. "Terrorism against Jews does not stop at the Gaza border – it is already burning the streets of America," he said.
