  The woman in her 80s dies five days after the crash on a store's car park.

  Woman dies after being hit by car at supermarket

  The woman was struck by a car on a supermarket car park off Bromley Lane in Kingswinford on 11 August

  A woman in her 80s has died after being hit by a car outside a supermarket. West Midlands Police said she was struck by a Citroen Berlingo on a supermarket car park off Bromley Lane, Kingswinford, Dudley, at about 16:45 BST on 11 August. The woman was taken to hospital where she had remained and died on Friday. Police said the driver of the car was helping officers with their inquiries.

  Anyone with information has been asked to contact the force.
