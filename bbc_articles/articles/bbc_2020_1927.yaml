id: bbc_2020_1927
title: 'Johnson: Cabinet has given HS2 ''green signal'' - BBC News'
date: '2020-02-11'
section: General
url: http://www.bbc.co.uk/news/uk-politics-51460503
content: |-
  The prime minister says that the government has approved the HS2 rail line.

  The prime minister has said that the government has approved the High Speed 2 rail line.

  He said he would appoint a specific transport minister to oversee the project to make sure it is kept within budget and delivered on time.
