content: |-
  Police said two attackers were "neutralised" after they opened fire at members of the public.

  Seven killed in shooting and knife attack in Tel Aviv

  Seven people have been killed in a shooting and knife attack in Tel Aviv, police in Israel have confirmed. Several others were injured - some seriously - when a gunman opened fire at members of the public in the Jaffa area. The deadly attack began in a rail carriage and continued on the platform, local police said in a statement. Footage posted on social media showed motionless bodies strewn on the street. Police said the gunman and another attacker armed with a knife were "neutralised" by members of the public, and described the motive as "terror".

  The identities of the perpetrators have not been released. Some Israeli media outlets earlier reported the death toll as eight, though it is unclear if this included the attackers.
  • None What we know about Iran's missile attack on Israel The shooting occurred shortly before an Iranian missile attack against Israel began. Police at the scene were seen taking cover as missiles and air defence rockets flew over the city and air raid sirens blared. Witnesses described the shooting, including Benjamin Ratzon, who told the Reuters news agency: "People were on the ground and they told me to bend down. "I saw the terrorist facing me. He wanted to do something and the security forces arrived to the scene and they ran towards him."

  Israeli police officers guarded a cordon near the site of the attack

  Another witness told the Jerusalem Post they initially mistook the gunfire for fireworks before realising "it was something much worse". They added: "There were many gunshots. We dropped to the floor, and people were crying. I saw someone bleeding on the ground.” A shop owner said they quickly closed their shutters upon seeing "crowds of people running and shouting 'terror attack'". Haartez quoted an eyewitness who was at a synagogue at the time of the attack. "Among the worshippers were medics who volunteer at the MDA (Israel's ambulance service). "We treated a man who was wounded in the synagogue and then ran to the street to help others who were wounded."
