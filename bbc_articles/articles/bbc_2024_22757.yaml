  • None More women tell BBC they were sexually assaulted by ex-Harrods boss More than 20 women told the BBC the businessman sexually assaulted or raped them while they worked at Harrods luxury department store in London. Mr Armstrong said his legal team was "going to reach a lot more" than they already had given the international nature of the allegations against Fayed. He said Fayed liked to associate with "what he perceived to be the upper echelons of society" - including celebrities, footballers and politicians - adding: "The scale of this is likely to increase, but the impact of this [on society as a whole] is likely to be much, much bigger." Catherine said she felt her experience compared to the rape allegations "feels like absolutely nothing - but I think it's important in kind of building up that evidence of a pattern of behaviour and culture." She condemned the workplace environment at Harrods which she said had allowed such actions to regularly happen - claims that have been rejected by the department store. Harrods was owned by Fayed from 1985 until 2010 and is now under new ownership - which said this week the company operated differently to how it had under Fayed.

  A BBC investigation into allegations of rape and attempted rape by Mohamed Al Fayed, the former owner of Harrods. Did the luxury store protect a billionaire predator? Watch Al-Fayed: Predator at Harrods on BBC iPlayer now.

  Catherine told the BBC: "It was kind of known that he behaved in a certain way and preyed upon young women and young women were recruited to work on the shop floor or to work in his office. "And that seemed to go without any kind of question." Her comments have been echoed by other accusers who have said many people in Harrods knew about Fayed's alleged behaviour. Concerns have also been raised about his conduct at Fulham Football Club, which he used to own. "I think that there were people at Harrods at the time who were enablers and they are as guilty as Fayed because they were not just passive onlookers. They were actually helping girl after girl into a total nightmare," Catherine said. She has called on "individuals" to be identified and "questioned on their collusion". "It is essentially grooming as the evidence suggests and they should face justice," she added. Catherine's testimony comes as more women speak out about Fayed's behaviour. New details have also emerged of failed efforts by police and prosecutors to hold Fayed to account during his life. The legal team representing many of the women the BBC has spoken to outlined their case against Harrods on Friday. The store's new owners have said: "These were the actions of an individual who was intent on abusing his power wherever he operated and we condemn them in the strongest terms." "We also acknowledge that during this time his victims were failed and for this we sincerely apologise." Mr Armstrong said: "As far as I am concerned, this is a corporate Me Too moment." Mr Drummond said: "This is the worst case of corporate sexual exploitation of young women that... probably the world has ever seen."

