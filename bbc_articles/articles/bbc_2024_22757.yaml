title: Mohamed Al Fayed accuser says complaint brushed off by manager - BBC News
date: '2024-09-21'
section: London
url: http://www.bbc.co.uk/news/articles/cly341d5l0vo
content: |-
  Another ex-Harrods worker tells the BBC her complaint about the billionaire was dismissed by bosses.

  Harrods worker says Fayed complaint was brushed off by her manager

  This video can not be played To play this video you need to enable JavaScript in your browser. Listen to former Harrods employee Catherine recount her 'horrible' experience

  Fresh allegations are being made about ex-Harrods boss Mohamed Al Fayed by a former worker who says her line manager "brushed it off" when she complained about inappropriate advances. The woman, named Catherine, contacted the BBC after reports this week from other women saying they were sexually assaulted by the late billionaire. Catherine said she was a 21-year-old Harrods employee when she was called into Fayed's office where he made "uncomfortable" advances including kissing her on the forehead, inviting her to work in his office and saying he was her boyfriend. Harrods’ current owners said earlier this week they were "utterly appalled" by the allegations and that "victims were failed".

  They said they had sought to settle claims "in the quickest way possible" since "new information came to light" in 2023. Lawyers for the dozens of female complainants say that it was "inconceivable" Harrods would not have previously been aware of the allegations, and argue the owners would have done due diligence checks when it bought the business in 2010. Dean Armstrong KC, one of the barristers representing alleged victims, said he was "at a loss" as to what the new information Harrods received in 2023 may have been. In a BBC interview on Saturday, he argued that the new owners - who bought Harrods in 2010 - "either didn’t know [about the allegations] - which I find very difficult to accept - or refused to acknowledge that there was this background of sexual misconduct". He also said his team had 37 clients, but that the number of people who had contacted them with claims about Fayed was approaching 150. Lawyers allege Fayed's assaults occurred around the world - including in the US, Canada, France, Malaysia and Dubai. "It's very much a global case, it’s not just the UK. It happened all over the world," another lawyer, Bruce Drummond, told the BBC. For Catherine, she says her experience took place in Harrods' flagship store in London. When she told her line manager about her incident, it was dismissed - and she regards it as one example of a wider culture of "collusion" at Harrods which enabled Fayed's behaviour. "I explained to [my line manager] what happened... and he just completely kind of brushed it off and was kind of like 'oh you know, that’s just what he’s like'," she told the BBC's Radio 4 Today programme. She had been "in a very junior role" when one weekend she was told to bring store musicians up to Fayed's office, after which he requested her immediate return. "So then I went back up and we went into a little room at the back, just him and I," she said. Fayed invited her to take a job in his office, she said - an offer she turned down because it was not in her area of expertise. "He then held my hand and asked if I had a boyfriend and I sort of politely laughed and said yes. "And he said, 'No, you don’t have a boyfriend, I’m your boyfriend you don’t need that donkey’ - which was strange and obviously I’m more and more uncomfortable by this point." She said Fayed then kissed her on the forehead, told her to think about the job and handed her £300 in cash - which she returned shortly after along with a formal rejection of the post. "He kissed me on the forehead. I know a lot of people have mentioned this whole thing about this fatherly approach but I have boundaries. It was horrible, and you know, holding my hand, being in very close proximity, was not normal," she said. She says she contacted the BBC this week to add to the weight of accusations against Fayed.
