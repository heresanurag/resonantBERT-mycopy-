  Theresa May says she believes in the course she has set out for Brexit with "every fibre of my being".

  Theresa May says she believes in the course she has set out for Brexit with "every fibre of my being" after the resignation of Dominic Raab and Esther McVey.

  They left after the Cabinet backed a proposed Brexit agreement, which she has told MPs is not final, but would bring the UK "close to a Brexit deal".

