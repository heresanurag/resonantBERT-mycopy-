title: Miriam Haley comments on Weinstein's guilty verdict - BBC News
date: '2020-02-26'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-51638421
content: |-
  One of two main accusers in Harvey Weinstein's trial says she feels "huge relief" at his conviction.

  Miriam Haley, one of two main accusers in Harvey Weinstein's trial says she feels 'huge relief' at his conviction.

  Her powerful testimony helped lead to him being found guilty in New York City of third-degree rape and a first-degree criminal sexual act.

  She told CBS This Morning: “It feels like we’re making progress.”

  Her lawyer Gloria Allred added that the conviction would help other victims as well as people who have committed gender violence to know that there are "consequences" to actions.

  His lawyers said sex between the movie executive and the accusers was consensual, and that the accusers used it to advance their careers, adding outside court that they would be appealing the conviction.

  Mr Weinstein still faces charges in Los Angeles of assaulting two women in 2013.
