title: 'Rust shooting: Bodycam footage from aftermath on set - BBC News'
date: '2024-02-23'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-68377790
content: |-
  Armourer Hannah Gutierrez-Reed, who is on trial after a cinematographer was killed, is seen handing the gun to police.

  New body camera video released by police in New Mexico shows the frantic moments that followed the fatal shooting of cinematographer Halyna Hutchins on the set of Rust.

  Armourer Hannah Gutierrez-Reed denies charges of involuntary manslaughter and tampering with evidence. The newly released video emerged on the first day of the trial in Santa Fe.

  The footage shows actor Alec Baldwin speaking to police and telling them that he was holding the gun.
