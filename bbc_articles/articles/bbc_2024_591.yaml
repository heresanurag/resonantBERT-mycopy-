title: 'Kirkcaldy: Watch moment double-decker spins round on ice, smashing parked
  cars - BBC News'
date: '2024-01-09'
section: General
url: http://www.bbc.co.uk/news/uk-scotland-67916370
content: |-
  The bus, which had no passengers on board, was heading to a school in Kirkcaldy.

  A double decker bus spun right round and smashed into parked vehicles when it hit freezing rain on a hill in Kirkcaldy.

  The Stagecoach bus, which was on its way to St Marie’s Primary School, skidded into a garden wall on Chapel Road, before coming to a stop.

  Police Scotland said they were called at about 08:30 to a report of a crash involving a bus and confirmed that no-one was hurt.

  A spokesperson for Stagecoach East Scotland confirmed there were no passengers on the bus at the time.

  "One of our vehicles operating on service SM1 was involved in an incident on Chapel Road in Kirkcaldy this morning in icy conditions,” they said. “Safety is our absolute priority, and we will investigate the full circumstances involved."

  The road has since reopened.
