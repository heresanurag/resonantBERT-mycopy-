  He wrote: "The line I improvised onstage Sunday night in Sydney was highly inappropriate, dangerous and a terrible mistake. "I don’t condone violence of any kind, in any form, against anyone. What happened was a tragedy, and I’m incredibly sorry for my severe lack of judgement. I profoundly apologise to those I’ve let down and truly regret any pain I’ve caused." Gass also split with his agent following the incident. "Due to what occurred, we have parted ways," Michael Greene of Greene Talent told BBC News. While many in the Sydney crowd can be heard laughing in video from the concert, the comment launched an angry reaction on social media – with X owner Elon Musk calling it "evil".

  Senator Ralph Babet - the United Australia Party's only parliamentarian - asked for the band to be deported. In a statement, he said the duo should "be immediately removed from the country after wishing for the assassination of Donald Trump at their Sydney concert". Asked about the comments while attending the Republican National Convention, Australian Ambassador to the US Kevin Rudd said it made him "physically ill" that someone would joke about such violence. "People might think that it is a bit of funny ha-ha at a concert to run off at the mouth about this stuff. It’s not. It’s about physical life,” the former prime minister of Australia said. “These people just [need to] grow up and find a decent job.” Trump was shot in the ear when a gunman opened fire at a Pennsylvania rally on Saturday. The FBI has identified the gunman who targeted Trump as Thomas Matthew Crooks, 20, a kitchen worker from Bethel Park, Pennsylvania, who is a registered Republican. A Secret Service sniper shot Crooks dead after he fired at the former president. One spectator was killed and two others were seriously injured.
