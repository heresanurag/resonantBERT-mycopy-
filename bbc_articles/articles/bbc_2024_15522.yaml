title: Jack Black cancels Tenacious D tour after Kyle Gass's comments about Donald
  Trump - BBC News
date: '2024-07-17'
section: Culture
url: http://www.bbc.co.uk/news/articles/c0dmx4p4m0lo
content: |-
  Kyle Gass sparked an outcry with a comment on stage about the assassination attempt on Donald Trump.

  Kyle Gass (left) and Jack Black have been on an Australian tour

  Jack Black has said he’s cancelled the rest of the Tenacious D world tour after his bandmate Kyle Gass sparked an outcry with a comment about the assassination attempt on Donald Trump. The comedy rock group were on stage in Sydney, Australia, on Sunday when Gass was asked to make a wish after being presented with a cake for his 64th birthday. He appeared to reply: "Don’t miss Trump next time." In a statement on Instagram, external, Black said he was "blindsided" by the comment. "I would never condone hate speech or encourage political violence in any form," the comedian and actor wrote. He said he didn’t feel it was "appropriate to continue the Tenacious D tour", and that the rest of the group’s "creative plans are on hold". Black added that he is "grateful to the fans for their support and understanding". The controversy had already led to Tuesday's gig in Newcastle, New South Wales, being postponed. Gass apologised for the comment on Instagram, external, saying it was a "severe lack of judgement".

