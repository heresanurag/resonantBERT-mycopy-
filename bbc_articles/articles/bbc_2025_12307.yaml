title: Tesco apologises for Lionesses Euro 2025 promotion in Cardiff store - BBC News
date: '2025-06-20'
section: Wales
url: http://www.bbc.co.uk/news/articles/cwyx5gqkewpo
content: |-
  A display in Cardiff is taken down after offering fans the chance to meet the England football team.

  Tesco has said sorry after a promotional display from Lionesses sponsor Lucozade was put up in Cardiff

  Tesco has apologised after a promotional stand advertising a chance to meet the England women's football team was put up at a store in Cardiff. Customers were shocked to see a Lucozade display featuring the Lionesses front and centre of the store's entrance at Western Avenue, just weeks before Wales face England at Euro 2025 in Switzerland. The chief executive of the Football Association of Wales (FAW), Noel Mooney, was among those who voiced their anger on social media, saying "we are Cymru". Tesco said it had since removed the display from the store, and wished both the Welsh and English teams good luck in the tournament.

  Wales women have qualified for the Euros for the first time, where they will face England

  One shopper described it as "deeply offensive" and called on Tesco to "read the room" as Wales women prepare for their first appearance at a major tournament. "I genuinely don't understand how this happens. Surely someone somewhere would have thought it was a bad idea," they said. "Do you have these up in Scotland too?" Another user said it was "disgraceful", adding: "Must be lovely for our Welsh women footballers, walking in Tesco and seeing the England women's team." In a statement, Tesco said the display was "incorrectly" put up in the store. "Many of our colleagues and customers will be supporting their home nations in the tournament," it added.
