title: Eight dead after stabbing at Wuxi school in eastern China - BBC News
date: '2024-11-17'
section: Asia
url: http://www.bbc.co.uk/news/articles/cd6vz299qvgo
content: |-
  A 21-year-old man has been arrested after a stabbing incident in the city of Wuxi, police say.

  Eight dead after stabbing at school in eastern China

  The stabbing incident happened on Saturday in the city of Wuxi in eastern China

  Eight people have died and 17 others have been injured following a stabbing incident outside a school in eastern China. A 21-year-old man was arrested at Wuxi Yixing Arts and Crafts Vocational and Technical College in the city of Wuxi at about 18:30 local time (10:30 GMT), according to a statement from local police. The statement said he graduated from the school in 2024 and carried out the attack after "failing to obtain his diploma due to poor exam results" and that he was unhappy with his internship pay. He confessed to his crime "without hesitation", police said.

  They added that an investigation was under way and efforts were being made to "manage the aftermath". The attack follows an incident on Monday where at least 35 people were killed when a driver ploughed a car into crowds at a stadium in the southern city of Zhuhai. Police said the driver was unhappy with a divorce settlement, but the incident sparked questions about a recent spate of public violence in the country. On social media, there have been discussions about the social phenomenon of "taking revenge on society", where individuals act on personal grievances by attacking strangers.

  The incident happened in the eastern city of Wuxi
