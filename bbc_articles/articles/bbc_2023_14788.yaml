content: |-
  How a convicted murderer from Brazil escaped prison and eluded police for almost two weeks.

  Brazilian fugitive Danelo Cavalcante was captured after two weeks on the run.

  On 31 August, he escaped Chester County Prison in Pennsylvania by climbing a wall and for several days authorities thought he was inside a perimeter near the prison.

  He was sentenced to life in prison after murdering his former girlfriend. Authorities say he committed a similar crime in his homeland, Brazil.
