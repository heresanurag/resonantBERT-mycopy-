  Speaking to reporters on Thursday, Sir Keir said that "preventable" smoking deaths put a "huge burden" on the NHS and taxpayers. He said the government was "going to take decisions in this space" and more details would be revealed. Richard Lawrence, a pub-goer in his 30s, is in favour of the plan and he does not understand why it is being perceived in a negative light. Mr Lawrence told the BBC: “I would be more likely to go to a pub if the ban was in place, I'd certainly enjoy the experience of a lovely beer garden and enjoy my food and drink without the worry of the disgusting smell of smokers and blowing their smoke at me."

  Tobacco use is the UK's single biggest preventable cause of death, killing two-thirds of long-term users and causing 80,000 deaths every year. About 12.9% of people aged 18 and over in the UK - or about 6.4 million people - smoked cigarettes in 2022 according to the most recently available data from the Office for National Statistics. That is the lowest proportion of current smokers since records began in 2011. Selva Venugopalan, 45, has a three-year-old boy and his wife, Geraldine, is pregnant with their second child. He told the BBC the proposals were "a no-brainer". "I don't want to smoke second-hand. I definitely don't want my children to smoke second-hand at a tender age." In its guidance about passive or second-hand smoke, Cancer Research UK says all forms of exposure to smoking are "unsafe", while the NHS says second-hand smoke is "a lethal cocktail of more than 4,000 irritants, toxins and cancer-causing substances".
