title: 'Brad Arnold: 3 Doors Down singer reveals stage four kidney cancer - BBC News'
date: '2025-05-08'
section: Culture
url: http://www.bbc.co.uk/news/articles/cp92rn8y5yjo
content: |-
  Brad Arnold says he believes one of the rock band's hits, It's Not My Time, is now "really my song".

  Brad Arnold, the singer with US rock band 3 Doors Down, has revealed he has been diagnosed with stage four kidney cancer. The 46-year-old said in an Instagram video, external that he has "clear cell renal carcinoma that had metastasised into my lung", adding: "And that's stage four, and that's not real good." The band made it big in the early 2000s with hits like Kryptonite, Here Without You and It's Not My Time, and have sold more than 13 million albums in the US. "Now, I believe It's Not My Time is really my song," Arnold wrote to fans in an accompanying caption. "This'll be a battle so we need our prayers warriors!"

  3 Doors Down emerged from Mississippi to break through with their hit Kryptonite, which reached number three in the US in 2000. Their debut album The Better Life was the 11th biggest-selling album of the year in their home country. They returned to the top five with the 2002 singles Here Without You and When I'm Gone, and scored US number one albums with Seventeen Days in 2005 and a self-titled LP in 2008. They also performed at President Trump's first inauguration in 2017.

  In his video, the singer and drummer said: "You know what, we serve almighty God, and he can overcome anything. So I have no fear. I am really, sincerely not scared of it at all. "But it is going to force us to cancel our tour this summer, and we're sorry for that. "And I'd love for you to lift me up in prayer every chance you get, and I think it's time for me to maybe go listen to It's Not My Time a little bit, right?" Clear cell renal carcinoma is the most common type of kidney cancer, and stage four is the most serious, meaning it has spread to another part of the body.
