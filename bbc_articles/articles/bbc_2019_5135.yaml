title: Caravan dog attack boy, 9, died from 'multiple bites' in Looe - BBC News
date: '2019-05-03'
section: Cornwall
url: http://www.bbc.co.uk/news/uk-england-cornwall-48150517
content: |-
  The dog that attacked Frankie MacRitchie in a caravan at a holiday park was put down this week.

  Frankie MacRitchie's family said the "wonderful" nine-year-old boy "will be so very missed"

  A nine-year-old boy who was attacked by a dog died from a loss of blood caused by multiple bites to his head, an inquest opening has heard.

  Frankie MacRitchie from Plymouth, Devon, was attacked in a caravan at a holiday park in Looe, Cornwall, last month and died at the scene.

  Devon and Cornwall Police said the dog involved in the attack was put down this week.

  The inquest in Truro has been adjourned to allow further inquiries.

  His body was identified by his mother in the following days.

  The inquest heard a post-mortem examination showed the preliminary cause of Frankie's death was severe loss of blood, caused by multiple dog bites to the head.

  Flowers and messages were left at Frankie's school in Plymouth after his death

  Emergency services were called to a caravan at Tencreek Holiday Park at 05:00 BST on 13 April after reports of a boy being "unresponsive".

  A woman described by police as a family friend was later arrested at a railway station near Plymouth.

  The 28-year-old, who was initially held on suspicion of manslaughter and having a dog dangerously out of control, has since been released but remains under investigation.

  Det Insp Steve Hambly from Devon and Cornwall Police said: "Officers are working closely with Frankie's parents at what is clearly a most distressing time.

  "The dog involved in the incident was put down earlier this week with the full consent of his owner, having previously been housed by police since the day of the incident."

  Acting Senior Coroner for Cornwall Andrew Cox told the hearing Frankie's body was identified by his mother Tawnee Willis at the Royal Devon and Exeter Hospital five days after his death.

