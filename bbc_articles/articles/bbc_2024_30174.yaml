title: Kate sends emotional Christmas message of 'love, not fear' - BBC News
date: '2024-12-01'
section: UK
url: http://www.bbc.co.uk/news/articles/c8xp00rrerdo
content: |-
  The Princess of Wales writes of the need for mutual support ahead of her carol concert next week.

  Catherine will be hosting her annual carol concert at Westminster Abbey

  The Princess of Wales has sent an emotional Christmas message calling for "love, not fear" ahead of her carol concert next week. Catherine says the Christmas story is about "the importance of giving and receiving empathy" and showing "how much we need each other in spite of our differences". The princess, who has faced health problems this year, says: "Love is the light that can shine bright, even in our darkest times." The princess's message will be sent in a letter to guests attending the carol concert in Westminster Abbey on 6 December and at 15 regional concerts around the UK.

  Catherine says of the meaning of Christmas: "Above all else, it encourages us to turn to love, not fear." It's a letter full of reflections on the importance of supporting one another, accompanying a concert that includes guests who have had a difficult year, such as families affected by the Southport knife attack. Catherine praises those who care for others in need: "Gentle words or a receptive ear, an arm around an exhausted shoulder, or silently being by someone’s side." The Together at Christmas carol service will also mark the latest stage in the princess's return to public life after a year in which she was diagnosed with cancer before receiving chemotherapy treatment, which ended in September. She says Christmas is a time to "slow down and reflect on the deeper things that connect us all" and to "live our lives with an open heart". The language is unashamedly emotive and prayer-like, extolling the virtues of love, and similar in tone to the princess's video message when she revealed that her chemotherapy had ended. "The love that we show ourselves and the love we show others - love that listens with empathy, love that is kind and understanding, love that is forgiving, and love that brings joy and hope," she writes. The carol service will include readings and music, with speakers including the Prince of Wales and Richard E Grant and participation from singers Gregory Porter and Paloma Faith. Olympic and world-champion cyclist Sir Chris Hoy, who also received a cancer diagnosis this year, will be among those lighting candles. And guests will be able to dedicate a decoration to someone who has supported them, on a "kindness tree" outside the abbey. As well as the famous faces, guests will include people who have volunteered to help others in their communities. In addition to the event in Westminster Abbey, there will be regional carol services over the next two weeks in cathedrals, churches and other venues in places including St Albans, Dewsbury, Aberdeen, Luton, Brecon, Omagh, Taunton, Truro and Blackpool.
