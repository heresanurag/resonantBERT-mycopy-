  Millan was competing in the European Talent Cup, a category of the FIM CEV Repsol which is an international championship for teenage riders looking to make it into the professional circuit. He had four podium finishes and two pole positions to his name in his debut campaign. In May, Swiss Moto3 rider Jason Dupasquier, 19, died in hospital from injuries he sustained in a three-bike crash during a qualifying session at the Mugello Circuit in Italy.

