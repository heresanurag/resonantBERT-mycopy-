title: 'Hugo Millan: Spaniard, 14, dies after crash at MotorLand Aragon - BBC Sport'
date: '2021-07-25'
section: Motorsport
url: http://www.bbc.co.uk/sport/motorsport/57961530
content: |-
  Hugo Millan, a 14-year-old motorbike rider, has died after crashing at a race in Spain.

  Hugo Millan, a 14-year-old motorbike rider, has died after crashing at a race in Alcaniz, Spain. The teenager was involved in a fatal collision at the MotorLand Aragon. The Spaniard was treated at the scene before being airlifted to hospital, where he then passed away. Cuna de Campeones, the riding school where he trained, paid tribute to him on Twitter, saying: "We will always remember you for your smile, your big heart and your professionalism."

