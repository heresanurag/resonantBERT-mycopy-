content: |-
  England miss out on the Under-20 Six Nations title - and a first Grand Slam since 2021- as they are beaten by Wales at Cardiff Arms Park.

  England miss out on U20 title after defeat by Wales

  This video can not be played To play this video you need to enable JavaScript in your browser.

  England missed out on the Under-20 Six Nations title - and a first Grand Slam since 2021- as Wales secured a remarkable win at Cardiff Arms Park. The result also helped France clinch a first championship since 2018 after their bonus-point victory over Scotland moved them above Mark Mapletoft's England, who had been hunting back-to-back titles. Hooker Kepu Tuipulotu assisted prop Ralph McEachran with a sumptuous one-handed offload for the opening try and a perfect start for England. Six points each from the boots of Harri Wilde and Ben Coen kept the game finely balanced, before Steffan Emanuel raced clear for the hosts as the sides went into the break level at 13-13. A spectacular acrobatic finish from Wales wing Harry Rees-Weldon gave Richard Whiffin's side the lead and ratcheted up the noise, as home fans began to believe they could seal a shock win. Fly-half Wilde kicked a third successful penalty to extend Wales' lead to 10 points as they closed in on a first victory over their rivals in five years. Ferocious defence from the hosts - led by skipper Harry Beddall and player of the match Harry Thomas - managed to keep England scoreless in the second half as they suffered their first loss since 2023. "The biggest thing was that crowd - from minute one it was like a 16th man," hooker Thomas told BBC Sport. "This is what Welsh rugby needs week in and week out, these fans were mental, on behalf of the boys we can't thank you enough. "[England] have been [talking] all week so we made it personal and that showed there as we wanted it more." Victory means Wales finish third in the Under-20 Six Nations for the first time since 2017 after wins over Italy, Ireland and England.

  Mapletoft's side had been a class above their opponents this campaign - until the final hurdle in Cardiff, where indiscipline and handling errors proved costly. Wing Jack Bracken was awarded a late yellow card for taking his opposite number out in the air, while Junior Kpoku was penalised close to Wales' line in the closing stages for a push on what was a frustrating night for the visitors. "It was not the result we wanted and we are going to have to take a long hard look at ourselves," England captain Tom Burrow said. "We have three months to right some wrongs [before this summer's World Rugby Under-20 Championship]. "No matter what we stick together out there, Wales brought fury and we knew that, their defence was very strong. "We will stick together as we are a tight-knit brotherhood."

  England were looking for their fifth successive win over Wales in the Under-20 Six Nations
