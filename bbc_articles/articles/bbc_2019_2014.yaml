title: Trump declares emergency over border wall - BBC News
date: '2019-02-15'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-47257199
content: |-
  The US president takes questions from reporters after his announcement at the White House.

  The US president has announced he will use emergency powers to pay for a border wall with Mexico.

  The rarely-used move would enable Mr Trump to bypass Congress, which has refused to approve the money needed.

  Senior Democrats accused the president of a "gross abuse of power" and a "lawless act".

  Several Republicans also voiced concern at the plan.

  This live stream has now ended.
