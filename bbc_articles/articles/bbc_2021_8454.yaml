title: 'Covid: Masks to remain compulsory on London transport - BBC News'
date: '2021-07-14'
section: General
url: http://www.bbc.co.uk/news/uk-57833858
content: |-
  London's mayor says he is not prepared to put customers at risk by relaxing the rules on face coverings.

  London mayor Sadiq Khan says masks will remain compulsory on London Transport despite restrictions easing on 19 July.

  TfL's 400 enforcement officers will deny those without a face covering from using London transport, under the plan.

  Speaking to BBC Breakfast, Mr Khan said:"As long as the virus is still with us, and as long as we're still concerned about the virus being transmitted, we will make it compulsory."
