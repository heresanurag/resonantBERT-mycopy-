title: 'Harrow ''stabbing'': Man found injured in street dies - BBC News'
date: '2019-04-03'
section: London
url: http://www.bbc.co.uk/news/uk-england-london-47805915
content: |-
  A man who was seen running from the scene in Harrow, north-west London, with a machete is arrested.

  The man was found on Northolt Road in Harrow by police officers at about 15:20 BST

  A man has died after being found injured on a road in north-west London.

  The man, believed to be in his mid-40s, was found on Northolt Road in Harrow by police officers at about 15:20 BST and was pronounced dead 30 minutes later. He has not yet been identified.

  Police initially believed he had died from stab wounds, but the death is now being treated as unexplained.

  A man who was seen running from the scene with a machete has been arrested on suspicion of murder.

