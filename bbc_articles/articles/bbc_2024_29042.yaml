  Events were held across the city on Thursday to mark five decades since the bombings, and on Friday, Prime Minister Sir Keir Starmer said a decision on an inquiry would be made as soon as possible. Pressed on how much longer families would have to wait, he said: "We'll keep talking to them and engage and come to a decision as quickly as we can." Watch Politics Midlands on BBC One in the West Midlands at 10:00 GMT on Sunday. The show will be available on the iPlayer afterwards.

