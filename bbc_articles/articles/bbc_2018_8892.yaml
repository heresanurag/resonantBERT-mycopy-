title: Venus Williams beaten by Kiki Bertens in Wimbledon third round - BBC Sport
date: '2018-07-06'
section: General
url: http://www.bbc.co.uk/sport/tennis/44740071
content: |-
  Five-time Wimbledon champion Venus Williams is knocked out in the third round by Dutchwoman Kiki Bertens.

  Last updated on .From the section Tennis

  Coverage: Watch live on BBC TV, BBC iPlayer, BBC Red Button, Connected TVs and the BBC Sport website and app; Live Radio 5 live and 5 live sports extra commentary; Text commentary online.

  Five-time Wimbledon champion Venus Williams became the eighth of the top 10 seeds to be knocked out after a third-round defeat by Kiki Bertens.

  Ninth seed Williams, 38, was beaten 6-2 6-7 (5-7) 8-6 by the 26-year-old Dutchwoman on Court One.

  Williams' fellow American Madison Keys lost nine consecutive games in her defeat to qualifier Evgeniya Rodina.

  The 10th seed lost 7-5 5-7 6-4 in two hours 10 minutes against the Russian, who is ranked 120th in the world.

  However, younger sister Serena went on to reach the last 16.
