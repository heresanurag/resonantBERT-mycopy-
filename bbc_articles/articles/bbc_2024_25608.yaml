title: Robert Jenrick faces backlash over special forces killing claim - BBC News
date: '2024-10-02'
section: Politics
url: http://www.bbc.co.uk/news/articles/cp39q1ppk41o
content: |-
  The Tory leadership hopeful claimed special forces were “killing rather than capturing terrorists”.

  Robert Jenrick made the claim in a video promoting his leadership campaign

  Tory leadership contender Robert Jenrick has stood by his claim that British special forces are “killing rather than capturing terrorists”. The former immigration minister made the comment in a video, external promoting his bid to be the party's leader. Tory leadership rivals James Cleverly and Tom Tugendhat, who have both served in the military, are among those who have criticised Jenrick’s comments during their party’s annual conference. When asked if he backed his claim about the conduct of special forces, Jenrick told activists in Birmingham: “I do".

  Speaking on stage at a conference event, Jenrick said human rights laws would make it “difficult” for British forces to “conduct a similar operation to the one that the United States did to kill or capture Osama bin Laden”. “I don't want our human rights apparatus to be standing in the way of taking the right operational decisions for our national security.” Tugendhat said he was "angry" at Jenrick's comments, adding that the assertion represents a "very serious accusation" and that the position shows "a fundamental lack of awareness of military operations, the command chain, and the nature of the law in the armed forces". He told the BBC that he spoke to a recently retired director of special forces and said: "A lot of people are extremely disappointed with the suggestions that they may be acting in ways that are not compatible with the values and standards of the British armed forces." Tugendhat later told BBC Newsnight Jenrick should "pull down” his video, arguing footage of special forces soldiers in operations should not be used. He said he knew some of the soldiers seen in the video, and one of them had subsequently died in an accident. Tugendhat said he was particularly upset because his friend was "not able to defend himself against the accusation that is effectively being levelled against him”. Cleverly called on Jenrick to justify his claims. “The British military always abide by international humanitarian law, the law of armed conflict,” Cleverly said. He added: “Our military do not murder people.”

