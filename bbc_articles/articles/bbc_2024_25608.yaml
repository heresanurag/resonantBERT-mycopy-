  In the video in which Jenrick made the claim, he called for the UK to leave the European Convention on Human Rights (ECHR). The ECHR is a treaty which sets out the rights and freedoms people are entitled to in countries that are signed up to it. The treaty is overseen by the European Court of Human Rights in Strasbourg, France. In the video, Jenrick said: “Our special forces are killing rather than capturing terrorists because our lawyers tell us that if they’re caught, the European court will set them free.” In an interview on BBC Radio 4’s Today programme, Jenrick was asked what evidence he had to back up his claims. He said: "The point I was making was one that our former defence secretary Ben Wallace has made, which is that our human rights apparatus including the ECHR is encroaching on the battlefield. "And it is impacting the decisions that our generals and military decision-makers are taking as to what kind of action is required in these difficult situations." Pressed on whether he knew special forces were killing rather than capturing terrorists, Mr Jenrick said: "As Ben Wallace has said in that interview, decision makers are being asked to make decisions which they might not ordinarily make, for example to call in a drone strike and take lethal action in that way." He added: "Of course I'm not going to elaborate on particular cases because these things, these cases are not things that any minister can speak about." Former defence secretary Grant Shapps, who is also chair of Cleverly's campaign, said he had seen "no evidence at all" in his time at the Ministry of Defence to back up Jenrick's claim. Speaking to BBC 5 Live, he added that Jenrick had been reflecting on a "broader concern" about the ECHR, but the issue was "not as black and white as he presented". However, former Tory MP Bob Seely, who is backing Kemi Badenoch to be party leader, defended Jenrick's comments, saying they were "true". In a social media post, external Seely, who served in Iraq and Afghanistan, said the Ministry of Defence's "fear" of human rights lawyers and the ECHR meant "it was easier to drop bombs than arrest anyone or bring them to justice".

  In an article last year, external, Wallace - the former defence secretary - claimed human rights laws including the ECHR had become a serious risk to national security. He told the Telegraph: "When we have a threat to the UK, this lunacy of being unable to render people across borders or arrest people in countries whose police forces are unacceptable means that we are more often than not forced into taking lethal action than actually raiding and detaining." The examples Wallace gave of lethal force were drone and satellite strikes - not of special forces on the ground featured by Jenrick. The role of the ECHR has long been a topic of intense debate within the Conservative Party. MPs on the right of the party have increasingly blamed the convention for enabling failed asylum seekers to challenge their removal from the UK. Jenrick and former home secretary Suella Braverman are among those who have called for the UK to withdraw from the treaty to avoid this. But other Tories oppose this. It has been a dividing line between the leadership candidates at the party's conference in Birmingham. On Monday, fellow leadership contender Badenoch warned party members that leaving the ECHR would not address "the root of the problem", saying it could result in Brexit-style "legal wrangling". She did not rule out leaving the treaty, but argued deporting more failed asylum seekers should be the priority. Jenrick and Cleverly both addressed the Tory conference on the main stage, for an extended question and answer session on Tuesday afternoon. Cleverly used the event to defend his past record as home secretary. Asked why he did not quit over the government’s approach to migration, like his leadership rival Jenrick, he said: “Because I want to deliver. I don't run away from problems, I deal with problems.” Cleverly added that he had brought in visa changes which reduced net migration by 300,000 people a year and had a plan to ensure the Rwanda scheme worked to deter small boats crossings.
