content: |-
  Bella Culley, 18, is being held in a Georgian prison after being charged with drug offences.

  What are conditions like in Bella Culley's prison?

  As a British teenager is held in jail in Georgia on suspicion of drug offences, a report by inspectors sheds light on what life is like inside Rustavi's prison number 5. Bella Culley, 18, from Billingham, Teesside, is behind bars after being arrested in Tbilisi and charged with importing large quantities of narcotics. She is currently detained for 55 days while the prosecution investigates, but the BBC understands this could be extended by up to a further seven months. The latest inspection of the prison, carried out by the ombudsman of Georgia, found a range of issues from a lack of exercise time to intermittent drinking water supplies and frequent verbal conflict between inmates. The BBC has approached the Georgian Ministry of Justice for comment.

  Ombudsman inspectors made monitoring visits to prison number 5 in March and May 2023 to assess the treatment of female prisoners and the implementation of previous recommendations. The visits were reportedly prompted by inmate complaints about the lack of access to proper hygiene.

  The inspection found new inmates spent up to two weeks in internal classification cells before being assigned to a block. According to the resulting report: "Even though they are legally guaranteed the right to exercise, they are unable to benefit from this right. "The internal classification cells are located in the C residential building of the facility, and there is no designated outdoor space available for the inmates housed there to get fresh air." The watchdog advised that the lack of exercise for new prisoners should be investigated by the ministry in charge of penal reform.

  A warning sign outside of prison number 5 in Rustavi, Georgia

  The report acknowledges that in recent years improvements had been made to cleanliness at the facility. However, "it was found that the facility frequently does not receive drinking water". Both prisoners and staff are forced to collect and store water in containers.

  Inmates reported instances where the water was unexpectedly cut off while they were taking a shower, forcing them to continue their showers using cold water stored in containers. Prisoners in closed-type residential units were only allowed showers twice a week. The report also stated the "ventilation systems in the showers and kitchen areas were insufficient" and that "these issues contribute to an unsatisfactory environment for the inmates".

  Bella Culley will be detained inside prison number 5 for at least 55 days

  Monitoring also revealed conflicts between inmates did occur at the prison. According to the facility's internal documentation, "verbal altercations among prisoners are frequent", while incidents of physical violence were relatively rare. In 2022, there were 11 recorded cases of physical altercations between inmates, but in 2023 only two such cases were documented. The report stated: "Conflicts among prisoners are primarily triggered by gossip, the spreading of false information about one another, and various domestic or day-to-day issues." Any fights were broken up by prison staff and those involved were given sanctions, the report said.

  The length of time Miss Culley is held in the prison pre-trial can be increased by the prosecution

  Miss Culley was charged by police with illegally buying, possessing and importing large quantities of narcotics, after officers said they had seized marijuana and the narcotic drug hashish in a travel bag at Tbilisi International Airport. A spokesperson said the arrest was the result of a joint operation between multiple departments and, if found guilty, Miss Culley could face up to 20 years in jail or life imprisonment. Cleveland Police confirmed an 18-year-old woman from Billingham was arrested in Georgia "on suspicion of drugs offences" and remained in custody.

