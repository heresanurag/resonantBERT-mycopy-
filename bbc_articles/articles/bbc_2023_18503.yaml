content: |-
  Suella Braverman tells Radio 4's Today the plan "won't work" unless the PM makes changes.

  The former home secretary, who was sacked by Rishi Sunak last month, has spoken after Immigration Minister Robert Jenrick resigned over the Rwanda bill.
