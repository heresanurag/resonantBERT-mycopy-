id: bbc_2020_1021
title: 'Carrickfergus: Police attend ''sudden death'' in Woodburn area - BBC News'
date: '2020-01-06'
section: Northern Ireland
url: http://www.bbc.co.uk/news/uk-northern-ireland-50996471
content: |-
  Police say a post-mortem examination is needed to determine the cause of death of the man in his 40s.

  Police have been to the scene of a "sudden death" in Carrickfergus, County Antrim.

  The Police Service of Northern Ireland (PSNI) said it happened in the Woodburn area of the town on Saturday night and involved a man in his 40s.

  A post-mortem examination was needed to determine the cause of death, police said.

  Ulster Unionist MLA John Stewart tweeted police were dealing with a "serious incident" at Ashleigh Park.

