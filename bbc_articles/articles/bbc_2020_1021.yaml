  Police maintained a cordon around a block of six flats in the Woodburn estate on Sunday.

  One neighbour told the BBC that the man lived alone and had only recently moved into the area.

  A neighbour and friend of the man who died said he last saw him on Thursday evening when he called to his flat.

  He added he let the police into the communal part of the building on Saturday afternoon after they received a call from someone expressing concern for the man.
