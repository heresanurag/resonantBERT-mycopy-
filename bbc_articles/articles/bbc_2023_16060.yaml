title: 'Watch: CCTV captures flock of sheep in garden - BBC News'
date: '2023-10-23'
section: General
url: http://www.bbc.co.uk/news/uk-england-leicestershire-67164920
content: |-
  A homeowner in Leicestershire is left bemused as his Ring doorbell alerts him to the intruders.

  CCTV has captured the moment a flock of sheep ran into a front garden.

  Homeowner Craig Hollingworth, 52, from Leicestershire, was left bemused when he was alerted to the visitors via his Ring camera.

  "We have no idea where they came from, but suspect they came from a field not too far away," he said.

  "It was totally crazy to look at my phone while I was away and see a whole flock of sheep in our garden."

  He added: "They left 20 minutes later and headed through several of our neighbours' gardens before the farmers herded them home."

