  This entire investigation was instigated by whistleblowing doctor Grigory Rodchenkov, who was director of Russia's anti-doping laboratory during Sochi 2014. He alleged the country ran a systematic programme of doping and claimed he had created substances to enhance athletes' performances and switched urine samples to avoid detection. The World Anti-Doping Agency (Wada) enlisted the services of Canadian law professor and sports lawyer Dr Richard McLaren to look into the allegations. The McLaren report concluded 1,000 athletes across 30 sports benefited from the doping programme between 2012 and 2015. Wada obtained what it said was a Russian laboratory database which it felt corroborated McLaren's conclusions, while retesting of Russian athletes' samples resulted in a host of retrospective bans and stripping of medals. Last week, Rodchenkov told BBC Sport that the IOC faced "the most important moment in its history" over whether to allow Russian athletes to parade with their national flag at Sunday's closing ceremony. Letting them do so would be the IOC's "worst decision", he said. Reacting to the IOC's decisions on Russia, Rodchenkov's lawyer, Jim Walden, said in a statement: "Thomas Bach was a drowning man, but finally cooler heads within the IOC threw him a life preserver. "Yet, in the decision, the IOC had the gall to claim Russia 'respected' its decision on 5 December to institute the suspension. This, despite Russia's continued retaliation against the IOC's main witness, Dr Rodchenkov, and Russia's litany of further transgressions, including denial and obstruction toward the IOC and World Anti-Doping Agency. The acrimony caused by Bach's mismanagement should be his undoing."

  The Russian Olympic Committee (ROC) says it hopes to be back in the Olympic fold "in the next few days" and welcomed the IOC's decision. "In light of the situation, we consider that the restoration of the rights of the ROC and all Russian athletes will be the main result of the Olympic Games that are ending today," it added. However, some athletes were said to be disappointed that they would not be able to march under their national flag at the closing ceremony. "Some athletes stayed behind later with the hope that they would be walking under the Russian flag. I've heard athletes say that they were staying just because they wanted to walk with the flag and in our uniform," Elena Valbe, president of the Russian cross-country skiing federation, said.

  In the end it looks like a compromise. Russia didn't get to march under its own flag at the closing ceremony but the return of its Olympic status could be imminent. Allegations of a huge state-sponsored doping programme meant Russia had been banned from the Games, although some if its athletes who were deemed to be clean were controversially allowed to take part under a neutral banner. The fact that two of these competitors were then caught doping in Pyeongchang meant the IOC decided not to lift the suspension immediately. But Russia will soon be welcomed back into the fold as long as none of its other athletes are found to have broken drug rules.

