title: 'Watch: Moment man vandalises ancient Incan artefact in Peru - BBC News'
date: '2025-02-20'
section: General
url: http://www.bbc.co.uk/news/videos/cn4yzywpy72o
content: |-
  Peruvian police released footage showing a suspect pounding Cusco's 12-Angle Stone.

  Footage released by Peruvian police shows a man attacking a famous Incan artefact in Cusco, with what they described as a metallic object.

  According to the city's culture ministry, the incident caused 'irreversible damage' to the 12-Angle Stone, which was once part of an ancient palace.

  A suspect was later detained and authorities said they believed the person behind the attack was intoxicated.

  The stone is a popular tourist attraction and a symbol of the advanced stonework of the Inca civilisation.
