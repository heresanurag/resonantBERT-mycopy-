id: bbc_2023_19270
title: Diners sprint from cafe as deadly China earthquake hits - BBC News
date: '2023-12-19'
section: General
url: http://www.bbc.co.uk/news/world-asia-67757395
content: |-
  CCTV footage shows customers and staff pausing for a moment before scrambling for the exit.

  China's deadliest earthquake in almost a decade struck Jishishan county at 23:59 local time (1559 GMT) on Monday.

  Surveillance footage from a restaurant in Linxia City - around 50km (30 miles) from the epicentre of the Gansu earthquake - shows the moment of impact.

  Customers and staff appear to notice the initial tremor, pausing for a moment before scrambling for the exit all at once.

  At least 127 people have been killed and more than 700 reported injured.

