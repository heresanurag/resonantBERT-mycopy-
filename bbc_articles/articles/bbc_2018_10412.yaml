title: Couple from Aberdeenshire in £58m lottery win - BBC News
date: '2018-08-02'
section: NE Scotland, Orkney & Shetland
url: http://www.bbc.co.uk/news/uk-scotland-north-east-orkney-shetland-45039299
content: |-
  The retired couple, who have yet to be named, are expected to discuss their win on Thursday.

  A retired couple from Aberdeenshire have won almost £58m on a national lottery game.

  They took the entire jackpot of £57,975,367 in the Euromillions draw on 10 July, although it is believed they did not claim the prize immediately.

  They have not been named but are expected to appear before the media on Thursday to discuss their win.

  The largest-ever UK lottery winners were Colin and Chris Weir from Largs, who won £161m.
