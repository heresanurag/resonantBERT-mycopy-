content: |-
  Anne-Marie was the second performance of the night at this year's Brit Awards.

  Ed Sheeran and Adele joined other musicians on the red carpet ahead of the ceremony. Fans are awaiting to hear who will win best artist after the Brits took the decision to scrap gendered awards. The show is being hosted at the O2 in London by comedian Mo Gilligan.
