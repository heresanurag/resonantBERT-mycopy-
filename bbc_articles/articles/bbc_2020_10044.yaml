content: |-
  Updates and reaction from the health minister's announcement of an extension to local lockdowns.

  Llanelli will be the first area that is not an entire county to be locked down Image caption: Llanelli will be the first area that is not an entire county to be locked down

  The Welsh Government does not currently have any "additional financial provision" for businesses in local lockdown areas, according to the health minister.

  Vaughan Gething said it was in discussion with the UK government about further support, but said Chancellor Rishi Sunak's statement on Thursday did not set out more cash for businesses affected.

  Mr Gething said the Welsh Government's budget was to "help us survive known threats we do have".

  He called on the UK government for a "further package".
