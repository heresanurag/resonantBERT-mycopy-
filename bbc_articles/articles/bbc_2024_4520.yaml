  Sinner earlier extended his winning run to 19 by beating Czech player Jiri Lehecka 6-3 6-3. World number three Sinner last tasted defeat in last year's ATP Tour Finals - where he lost to Novak Djokovic in the final - and has enjoyed a perfect start to the 2024 season. His winning streak includes a Grand Slam breakthrough title in Australia in January along with a triumph in Rotterdam last month. Elsewhere, American 17th seed Tommy Paul held his nerve to beat Norwegian ninth seed Casper Ruud 6-2 1-6 6-3 and reach the last four of the California tournament for the first time. He will face Australian Open runner-up Daniil Medvedev, who beat Danish seventh seed Holger Rune 7-5 6-4.
