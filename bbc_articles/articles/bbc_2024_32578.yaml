title: Watch burst drain during Storm Bert tear road open in Llanhilleth - BBC News
date: '2024-12-07'
section: General
url: http://www.bbc.co.uk/news/videos/clyj05rg6y0o
content: |-
  CCTV footage shows overflowing drain gush water onto Railway Terrace in Llanhilleth, Blaenau Gwent.

  A overflowing drain can been seen gushing water from underground onto a road in CCTV footage during Storm Bert.

  Flash floods submerged parts of Railway Terrace in Llanhilleth, Blaenau Gwent, on Sunday.

  Sian Rhiannon Samuel, who lives nearby, said many homes there had been flooded and some had "lost everything downstairs".

  "It's scary how quickly the flooding came - it literally tore the road open like it was nothing," she added.
