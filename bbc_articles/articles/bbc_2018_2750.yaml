title: Watch Frances McDormand's Oscar being taken - BBC News
date: '2018-03-07'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-43309541
content: |-
  A Governor's Ball guest took Frances McDormand's Oscar and posted a video on social media.

  A man took Frances McDormand's best actress Oscar for her role in Three Billboards Outside Ebbing, Missouri. The man appeared with the statue at the Governor's Ball, where he posted videos with the award.
