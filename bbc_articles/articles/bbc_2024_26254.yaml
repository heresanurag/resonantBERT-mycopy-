content: |-
  David Warner's lifetime leadership ban is lifted by Cricket Australia, leaving him free to captain in domestic cricket.

  Warner played his last match for Australia at the T20 World Cup in June

  David Warner's lifetime leadership ban has been lifted by Cricket Australia. Warner, 37, was banned from cricket for 12 months and prevented from holding leadership positions as part of his punishment for the ball-tampering scandal in 2018. It means Warner, who retired from international cricket this year, is free to captain in Australian domestic cricket, such as for Sydney Thunder in the Big Bash. Cricket Australia said the decision comes after a review by an independent panel. The panel said Warner had shown "extreme remorse", was "sincere and genuine in acknowledging responsibility" and could "contribute towards the development of young cricketers" if able to captain.

  Meanwhile, Australia skipper Pat Cummins appeared to rule out Warner reversing his Test retirement to fill the side's vacant opener position against India in the upcoming series. Warner has offered to come out of retirement for the series, with Australia needing an opener after Steve Smith's move back to the middle order. But, speaking to The Grade Cricketer podcast, external, Cummins said: "I did speak to Dave a couple of days ago and he said. 'What do you think?' "I'm like, 'Good luck with the Thunder this year.'" Warner was given an emotional send-off in January this year after announcing the New Year's Test against Pakistan at the Sydney Cricket Ground would be his last. It ended his 112-match Test career, in which he scored 8,786 runs and 26 centuries.
