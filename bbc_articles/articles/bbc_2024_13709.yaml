title: Man dies after gun discharged inside Stafford property - BBC News
date: '2024-06-03'
section: Stoke & Staffordshire
url: http://www.bbc.co.uk/news/articles/cy99neey5l4o
content: |-
  Police say the man, who was in his 50s, died after he was seriously hurt when he fired a gun.

  Police said a man in his 50s died after firing a gun in Stafford

  An investigation is under way after a man died when he discharged a gun inside a property in Stafford. Emergency services were called to Espley’s Yard at about 18:20 BST on Friday following a concern for welfare report. A man in his 50s suffered serious injuries and died a short time later, Staffordshire Police said. Officers were investigating the circumstances leading up to his death and the force said it had referred the case to the Independent Office for Police Conduct due to previous police contact.

  The death was not being treated as suspicious and officers said there was not believed to be any ongoing risk to the public. Extra police were patrolling the area to help with the investigation and to try to reassure residents, the force added. Det Insp Louise Booker said: “Our thoughts are with the man’s family in what is a tragic incident. We remain in regular contact with them and will be providing specialist support.”

  Update 3 June 2024: This story has been updated to explain the firearm was discharged inside a property in the town.
