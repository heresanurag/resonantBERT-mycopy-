title: London vegan restaurant Plates London to get Michelin star - BBC News
date: '2025-02-11'
section: London
url: http://www.bbc.co.uk/news/articles/c99y854dky2o
content: |-
  Plates London on Old Street is among 22 restaurants to be awarded first Michelin stars.

  This mung and urad bean lasagne in a miso and chive sauce is among the dishes on the menu at Plates London

  A vegan restaurant in London has become the first in the UK to be awarded a Michelin star. Several other restaurants, including one serving The Ritz hotel in London, were also awarded stars at a ceremony in Glasgow on Monday. In all, nine restaurants in the capital received their first star, which included Plates London, on Old Street, which serves a fully plant-based menu. Chef Kirk Haworth impressed judges by "taking his classical training and inventively adapting it to a vegan diet", Michelin said.

  The judges praised the Old Street restaurant for its "earthy vibes" as well as the cuisine

  Asked what he loved about vegan cooking at the ceremony, Mr Haworth said: "Trying to get rid of that word is everything that I love about it. "It's just about flavour; that's all it's about. Flavour, excitement, innovation, and trying to take it to a new space of deliciousness." The judges also praised the restaurant's "earthy, natural vibe" and "warm hues".

  Kirk Haworth, pictured with co-founder and sister Keeley Haworth, says, "It's just about flavour", after Plates London won a Michelin star

  Judges said The Ritz Restaurant on Piccadilly was "currently at the peak of its powers" and had earned two stars after "taking classically based dishes... and adding increasing amounts of originality and modernity". Soho's Humble Chicken picked up a second star for "thrilling cuisine". Greek restaurant Oma, in Borough Market on London's South Bank, received its first star after it had earlier won the Opening of the Year award. Chef Jorge Paredes said: "I am super excited. It's a dream come true for me. "It has taken me a long time to show where I am, but now I'm very happy."

  Kirk Haworth told the judges he was "trying to take it to a new space of deliciousness"

  Moor Hall, in the village of Aughton in Lancashire, was awarded a third star, becoming only the 10th restaurant across the UK and Ireland to achieve the accolade. A first Michelin star was awarded to 22 new restaurants in total - three in Ireland and two in Scotland - while Gorse in Cardiff became the first restaurant in the Welsh capital to achieve the feat. This year's ceremony was held as the Michelin Guide celebrates its 125th anniversary. International director Gwendal Poullennec said the company was "incredibly proud" of the milestone. He said: "It's an opportunity to celebrate the core value that has shaped our identity since 1900 - unearthing exceptional gastronomic talent, showcasing local food culture and announcing life's most meaningful moments, whether shared around the table with loved ones, enjoyed in a hotel for a well-deserved break, or marking life's biggest celebration."
