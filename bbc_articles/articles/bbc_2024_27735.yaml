  She said there were assumptions people made about her in school, which some asked to her face. "When it comes to wheelchair users, it's always without a doubt almost the first question, can that person have sex?" She said the boys in her class at school would ask personal and intrusive questions. "I got asked things like, can you only have sex in a wheelchair? Will your joints dislocate? If I wanted to have rough sex with you, would I be able to?" Holly said people have also messaged her on social media about sex, an offer she was often made to feel she should be "lucky" for. Holly would like to see better positive representation in the media, citing that the character Isaac Goodwin in the programme Sex Education was the only good example she has been aware of recently.

  Holly married James in September and says he has always supported her with her health

  Nicola Thomas, 38, from Caerphilly, who is registered blind, said: "One of the more common things people will ask is, how do you have sex? It kind of takes your breath back, it's such an invasive and personal question." Nicola has an auto immune disease - neuromyelitis optica , external- and she lost her sight in one eye 15 years ago and the other five years ago. "A lot of people see barriers with blindness and I'm definitely one to break those down." Nicola's hobbies include sailing, paddleboarding and travelling, and her next trip is to Hong Kong.

  Nicola and her boyfriend Paul love traveling the world together

  Nicola had a boyfriend when she lost her sight but the relationship broke down. "I was treated like a burden, people would say you can't be a carer for her, but I didn't need a carer." She now has a boyfriend who is also visually impaired. "Even though we're both blind, we'll navigate our way round a city, or go on a date on our own. Nothing holds us back." Nicola also said she feels stereotyped when people show an interest in her. "People message on social media asking for dates, their attention shifts or acts differently when I tell them I'm blind." "You're definitely treated like they're doing you a favour. It puts you off instantly." Nicola added: "People do pigeon hole us. I want to breakdown that stereotype, I have a full and happy life."

  "When you're disabled you're well acquainted with poverty but it's more than a monetary value, a healthy relationship is definitely a poverty."

  Kat Watkins said disabled people have a right to explore their sexual identity and develop relationships just like anybody else. She is the access to politics project officer for Disability Wales. "Why are sex and relationships such a taboo for disabled people? There is much more to us than just being able to eat and having a roof over our heads." "Living your life and enjoying yourself that's just part of life, and it doesn't get highlighted enough for people with disabilities." Kat said hearing examples of how people message disabled women was "sadly normalised." She said adaptable sex toys and aids can help give people confidence and would like to see them on more mainstream sex sites and outlets. "You've got to be comfortable with yourself and understand your body, so you can tell others how it works. Self love is also really important."

