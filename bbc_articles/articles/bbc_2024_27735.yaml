title: 'Disability: "Men think I''m lucky they offer sex because I''m disabled" -
  BBC News'
date: '2024-11-13'
section: Wales
url: http://www.bbc.co.uk/news/articles/cjr4ll9j40po
content: |-
  Holly says she wants to challenge negative stereotypes when it comes to people with disabilities dating.

  Holly says positive relationships for disabled people need better representation

  Holly was just 16 when someone asked her if she could have sex because she was disabled. She has been asked many other questions over the years, such as if she "can have rough sex" or if it needs to be in a wheelchair. "People think they're doing you a favour, almost like a sacrifice. The worst thing is I'm not surprised or offended anymore." Holly, now 26, has chronic pain and hypermobility syndrome and is one of a number of disabled women who have spoken out to challenge negative stereotypes and stigma when it comes to dating and relationships.

  Holly Greader said it was important that happy relationships for those who were disabled were represented. She started dating her now husband James when she was a teenager, and has been with him for nine years, getting married earlier this year.

  "Often in the media disabled people have miserable lives, we're just a sad story," she said. She added she has always felt supported by him, but felt stereotyped by others. "I was told by people when we first moved in together, that if my health declines he'd leave me. "For being a burden or too much to handle."

