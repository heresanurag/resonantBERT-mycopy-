title: Woman needed HIV test after GP used old genital swab - BBC News
date: '2024-07-24'
section: Health
url: http://www.bbc.co.uk/news/articles/c897q01q12eo
content: |-
  The 40-year-old was "extremely upset and scared" when told she needed tests for HIV and hepatitis.

  Woman needed HIV test after old genital swab used

  A woman had to be tested for HIV after being given a vaginal examination with a swab already used on another patient, the health ombudsman has said. After the examination, at her GP surgery in Batley, Yorkshire, for a pre-existing health condition, the 40-year-old was told an old swab had been used by mistake. She then had to wait three months for Human Immunodeficiency Virus (HIV), and hepatitis, test results, which were negative. Investigators have now urged all GPs to ensure proper infection-prevention measures are followed.

  Ombudsman Rebecca Hilsenrath said: "There is always the possibility for human error in any profession. "Fortunately in this instance, this serious mistake had no medical repercussions.” The patient, who lives near Leeds, complained to the surgery after the examination, in December 2022.

  “When I found out the swab had already been used and I would need to have tests for HIV and hepatitis, I was extremely upset and scared,” she said. “I was shocked and worried about what this might mean for my health.” The practice apologised - but an investigation by the Parliamentary and Health Service Ombudsman (PHSO) for England has now found it failed to sufficiently acknowledge its mistakes and should pay the woman £500 in recognition of her distress. The patient said: “It was a grave error and I still can’t fathom how it happened. “The mistake was bad enough in the first place - but the aftercare was worse. “That is why I escalated it to the ombudsman, as there was no acknowledgement of the distress I experienced for three months.” The ombudsman said the GP practice had now acknowledged its failings and taken steps to ensure it will not make the same mistake again.
