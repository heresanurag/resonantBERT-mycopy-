title: Cumbrian Tommy Hodgson toasts 100th with skydive - BBC News
date: '2019-07-10'
section: General
url: http://www.bbc.co.uk/news/uk-england-cumbria-48929522
content: |-
  This wasn't Tommy Hodgson's first jump as he trained with the Parachute Regiment in World War Two.

  What is the perfect way to celebrate your 100th birthday?

  For Tommy Hodgson it was skydiving over the Cumbrian hills.

  Now he hopes to set a world record by repeating the feat in three years' time.
