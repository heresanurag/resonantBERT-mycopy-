content: |-
  Raymond McCourt was given a life sentence in 1993 for killing a shopkeeper and wounding two other people.

  Raymond McCourt was last seen on a street in the east end of Glasgow

  A convicted murderer has gone on the run from an open prison near Dundee. Raymond McCourt, 59, who shot a shopkeeper in 1993, was reported missing from HMP Castle Huntly at about 17:30 on Tuesday. He was last seen earlier that day about 16:40 on Duke Street in Glasgow, wearing a checked red, white and blue shirt, a checked baseball cap and a rain jacket. Police Scotland has warned the public not to approach him.

  McCourt, from Glasgow, was previously released on licence in 2015 but was sent back to jail for theft just weeks later. A court at the time heard he had struggled with freedom and wanted to be back behind bars. It is understood that the latest alarm was raised when McCourt did not return to the prison following a period of leave. He has also been seen wearing a suit and tie.

  CCTV footage shows McCourt on the run in a suit and tie

  A Police Scotland spokesperson said: "Raymond uses public transport and has connections to the Glasgow and Edinburgh areas. "He is described as being 6ft 2in tall, stocky build with short grey hair and beard and has reduced mobility." McCourt was jailed at the age of 27 for murdering shopkeeper Khalid Mahmood in Cambuslang, Lanarkshire, in 1993. He shot him in the head before attempting to rob a nearby bakery. McCourt also shot local woman Moira Rooney and PC Brian Williams, who was giving chase as he fled the scene of the incident. He was jailed for offences including murder, attempted murder, assault and robbery, assault to severe injury and firearms offences.

  McCourt was previously released on licence from prison in 2015

  McCourt was released on licence in 2015 and went to live with his partner Agnes Hailes in Alyth, Perthshire. But Perth Sheriff Court heard that he then stole from her and sold off her valuables. He used the money to pay for a holiday to Blackpool before he was eventually tracked down by police. He told officers that he was struggling to cope with life outside prison, and had stolen the items to have a blow-out before returning to jail. McCourt was given a 10-month term for the theft and was recalled to prison on his life sentence. Police Scotland has asked for anyone with information on McCourt to get in touch, external.
