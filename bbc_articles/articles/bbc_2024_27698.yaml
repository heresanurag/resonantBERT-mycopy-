  In Pictures: Sporting photos of the week

  A selection of some of the most striking sports photographs taken around the world over the past seven days.

  Competitors enter the water at St Kilda Beach during Ironman 70.3 Melbourne on 10 November in Melbourne, Australia

  Robbie Dolan rides Knight's Choice to win the Melbourne Cup at Flemington Racecourse on 5 November

  Maro Itoje looks dejected at full-time following England's Autumn Nations Series defeat by Australia at Allianz Stadium on 9 November in London, England

  Manchester City striker Erling Haaland runs with the ball during the Champions League match against Sporting at Estadio Jose Alvalade on 5 November in Lisbon, Portugal.

  Shiho Kuwaki of Japan hits her tee shot on the second hole during the second round of the 40th Itoen Ladies Golf Tournament at Great Island Club on 9 November in Chonan, Chiba, Japan.

  Kaylea Arnett of the United States dives during the Red Bull Cliff Diving World Final held at Mrs Macquarie's Chair on Sydney Harbour, Australia on 8 November

  Fans sit atop the field goal after the game between the Mississippi Rebels and the Georgia Bulldogs at Vaught-Hemingway Stadium on 9 November in Oxford, Mississippi

  A general view of fireworks exploding as the Penn State Nittany Lions take the field before the White Out game against the Washington Huskies at Beaver Stadium on 9 November in State College, Pennsylvania

  Goalie Marc-Andre Fleury, Jared Spurgeon and Mats Zuccarello of the Minnesota Wild watch the puck go into the net after a shot taken by Macklin Celebrini of the San Jose Sharks in the second period at SAP Center on 7 November in San Jose, California

  Marie Dupayage and Thomas Nabais of France compete in the Ice Dance Rhythm Dance during the ISU Grand Prix of Figure Skating NHK Trophy at Yoyogi National Gymnasium on 8 November in Tokyo, Japan

  All photographs licensed by Getty Images and subject to copyright. Come back next Tuesday for more great sporting photos of the week, and see some of the most striking news pictures from last week.
