  Man arrested on suspicion of rape at Groucho Club

  A man has been arrested on suspicion of raping a woman at London's Groucho Club. Metropolitan Police said the alleged rape took place inside the private members' club in Dean Street, Soho, on 13 November. The 34-year-old man, from Hertfordshire, was arrested on Saturday and remains in custody, the force said. Last month Westminster City Council closed the celebrity hangout following claims a "recent serious criminal offence" had taken place at the premises.

  The council said it had suspended the Soho venue’s licence for up to 28 days after a request from the Metropolitan Police. A full hearing to discuss the licence is set to take place. The force said there is no suggestion that employees of the venue were involved in the offence at this stage. The woman is being supported by specialist officers. The Groucho Club was opened in 1985 as a more relaxed alternative to traditional gentlemen’s clubs and has a long association with A-list celebrities.

