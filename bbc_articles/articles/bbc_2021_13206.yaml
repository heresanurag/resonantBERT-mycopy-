title: Sir Elton John scores first number one in 16 years - BBC News
date: '2021-10-15'
section: Entertainment & Arts
url: http://www.bbc.co.uk/news/entertainment-arts-58933279
content: |-
  The rock star tops the UK singles chart with Cold Heart, with the help of collaborator Dua Lipa.

  Sir Elton John has now had eight number one singles

  Sir Elton John has topped the UK singles chart for the first time in 16 years with a little help from Dua Lipa.

  Their collaboration Cold Heart (Pnau Remix), which reworks his hits including Sacrifice, Rocket Man and Kiss the Bride, made it to number one after three weeks at number two.

  He last topped the singles chart in 2005, when he appeared on US rapper 2Pac's posthumous single Ghetto Gospel.

  Dua Lipa released a number one album last year during lockdown

  Sir Elton's first ever number one came courtesy of a collaboration with another female singer, Kiki Dee, with 1976's Don't Go Breaking My Heart.

  Dua Lipa's collaboration with the singer-songwriter, who recently underwent hip surgery, sees her collect her third number one, following her breakthrough anthem New Rules and One Kiss with Calvin Harris.

