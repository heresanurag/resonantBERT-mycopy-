  "Our boys, Elijah and Zachary, love him so much, and [Sir Elton's husband, filmmaker] David [Furnish]. He's like our eldest son in a way. And it's just great when we see each other."

  He added: "We play each other music and we cheer each other up when we're down in the dumps and it's a lovely thing. A friendship that's blossomed so beautifully."

