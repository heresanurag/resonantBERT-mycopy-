title: BAME communities' 'unequal mental health care' - BBC News
date: '2020-03-13'
section: General
url: http://www.bbc.co.uk/news/health-51860052
content: |-
  Black and ethnic minorities face inequalities linked to mental illness a new report finds.

  A new report by the Race Equality Foundation has found a wide range of inequalities linked to mental illness in Black, Asian and other minority ethnic communities.
