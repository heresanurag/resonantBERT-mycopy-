content: |-
  A 32-year-old man is in custody on suspicion of murder after the young girl died in hospital.

  The girl died in hospital after the ambulance service was called to a house in Park Avenue, Dungannon, on Friday afternoon

  A man has been arrested on suspicion of murder after a two-year-old girl from Dungannon, County Tyrone, died in hospital.

  The Police Service of Northern Ireland (PSNI) said the child was admitted after the ambulance service was called to a house in Park Avenue on Friday afternoon.

  It was reported the girl had suffered a serious head injury.

  A post-mortem examination is to be carried out to establish the cause of death.

  Det Ch Insp John Caldwell said the PSNI's "thoughts are with the child's family" and they are being supported by family liaison officers.

  Fermanagh and South Tyrone MP Michelle Gildernew said the community was in "shock at the news".

  She called for anyone who has information about the incident to contact police,

  "My thoughts are with all those affected by this tragedy," the Sinn Féin MP added.
