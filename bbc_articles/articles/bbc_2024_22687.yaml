  But life post-antenna has not been straightforward - the film also reveals he's received death threats, from people who object to how he has modified his body. Harbisson touches on this in the film. “For many years we’ve had different types of death threats, from people who really hate what we’re doing, because they think it’s anti-natural or anti-God," he says. "So they think we should be stopped.” The threats caused the couple to relocate their home to somewhere new, its precise location a closely guarded detail. Born says: "It's such a shame... they're very gentle people". But she adds that her film injects possible notes of caution into the issue of body augmentation. Harbisson's credo, which includes his own business interests, is: "Design Yourself." But Born wants to get people thinking about "security - and the hacking potential all of these things could result in". "There's a safety issue in terms of who is doing it, what are the circumstances that they're doing it under, and what are the possible outcomes or consequences?" she adds. A 2022 survey by US think tank the Pew Research Centre, external, into AI and human enhancement, suggests the US public may have some reservations. Those surveyed were "generally more excited than concerned about the idea of several potential changes to human abilities". But many were "hesitant or undecided" about the virtues of biomedical interventions to "change cognitive abilities or the course of human health".

  Neil Harbisson and one of his artworks: Red produces a low note, while violet produces the highest

  The film also highlights that three years earlier, BBC News presenter Stephen Sackur highlighted possible ethical concerns about body augmentation. He challenged Harbisson during an interview at Swiss debating conference, the St Gallen Symposium, external. "There are all sorts of ways in which this is worrying and alarming... not least because you call yourself transpecies, but you're acquiring abilities that are beyond the capacity of other human beings," he said. He also queried enhancements "only available to those who have the means to undertake this sort of thing, creating possibly an uber-species". But Harbisson said his not-for-profit Cyborg Foundation tries to make such augmentations “as available as possible". "It's not expensive to create a new sense, but we are giving all these senses to machines," he said, such as cars or hand dryers. "You can just add them to your body - it's just people who wish to extend their perception."

  Jenova Rain says Harbisson is "pushing the boundaries of what we're trying to achieve as a species"

  Body modification artist Jenova Rain worked with Harbisson in 2018 during Manchester Science Festival, and sees his work as "amazing and very important". "He's pushing the boundaries of what we're trying to achieve as a species," she tells the BBC. "I think we need more people to be as brave and bold as he is." Her job also includes combining technology and the human body - she implants microchips into people's hands, carrying out about 100 per year. The microchip would open a door, for example, much like an electronic key for a car. "Primarily we were looking at doing this as access for people with disabilities, or mobility and dexterity issues, who struggle using keys specifically," she tells the BBC.

  Dani Clode's designs could help someone with a disability, or undergoing rehabilitation

  Dani Clode, an augmentation designer for Cambridge University's neuroscience plasticity lab, finds Harbisson "fascinating" but says she and her colleagues are still working out if augmentation is "a good thing, or is it a bad thing?" "I'm choosing my words carefully here because it is an exciting and interesting area. We just want to make sure it's done safely," she tells the BBC. Clode demonstrates the thumb, operated by a pressure pad under the wearer's big toe. "I make the devices, and the lab uses them to understand the future brain," she explains, adding they study the impact on the brain when the body is augmented. "After five days of training with this device [we learned] we could alter the brain," she says. "We fundamentally changed how they used their hand for that for that week, which then showed up in their brain."

  "Cybernetics will happen - it is happening," she says. "I think often the politicians and the regulatory bodies or those parts of government are very slow, and that technology is not allowing for that. "The technology is accelerating so fast, but we plod along." She's concerned about who ends up holding the keys to cybernetic technology. "If it's all in the hands of a particular few individuals, or a few very elite, very rich influential organisations, that is not a democratic process, and it's going to affect all of us. "So I'm just alerting people, in a nice, accessible way." Cyborg: A Documentary is in UK cinemas on 20 September.
