title: ‘Meeting a real-life cyborg was gobsmacking’ says film director - BBC News
date: '2024-09-20'
section: Culture
url: http://www.bbc.co.uk/news/articles/cg58r70yj43o
content: |-
  Director Carey Born was so captivated by Neil Harbisson and his "eyeborg" she made a film about him.

  Neil Harbisson, who sees in black and white, says his antenna lets him "hear" colour

  For the past 20 years, self-declared "cyborg artist" Neil Harbisson has provoked debate with his "eyeborg" - a surgically attached antenna. Harbisson, who grew up in Barcelona, is colour blind, having been born with the rare condition achromatopsia, which affects one in 33,000 people. This means he sees in what he calls "greyscale" - only black, white and shades of grey. But he decided to have surgery in 2004 which changed his life - and his senses - attaching an antenna to the back of his head, which transforms light waves into sounds. When film director Carey Born came across Harbisson, classed by Guinness World Records as "the first officially recognised 'cyborg',", external she was "gobsmacked and astonished". Her next move was to meet him, and then make a film about him - Cyborg: A Documentary. It explores how he navigates his life, along with effects and implications of his unusual surgical procedure. "The reason he did it was not to substitute the sense that he was lacking - it was in order to create an enhancement," Born tells the BBC. "So that was really the main hook that I thought was fascinating."

  Harbisson and his partner Moon Ribas, who share a similar vision about body augmentation

  As a student, Harbisson had met Plymouth University cybernetics expert Adam Montandon, who enabled him to "hear" colour using headphones, a webcam and laptop - transforming light waves into sounds. Harbisson seized on this experience, but wanted more, by merging the technology with his own body - something Spain's bioethical committees repeatedly rejected. He eventually persuaded anonymous doctors to operate, removing part of the back of his skull so the antenna could be implanted and the bone could then grow over it. Harbisson, who describes himself as a "cyborg artist", has said: "I don't feel like I'm using technology, I feel like I am technology." The term cyborg refers to a being with human and machine elements, giving them enhanced abilities. Cyborgs are already a feature of popular culture and sci-fi, appearing in TV series like Doctor Who, The Six Million Dollar Man and The Bionic Woman, and films including Terminator and Robocop.

  Director Carey Born: "Cybernetics will happen - it is happening"

  The chip in the back of Harbisson's head allows him to hear the colours not through his ears, but through the bone of his skull. It also connects to nearby devices as well as the internet. His partner, Moon Ribas, says in the film: "He is brave, he likes to do things differently", while he says his antenna "allows me to extend my perception of reality". Harbisson explains in the film that post-surgery, he had five weeks of headaches, and it took him about five months to get used to the antenna. Born says after the procedure he got "depression, because like when they did trepanning [a surgical intervention where a hole is drilled into the skull] in the 60s and 70s. "People got really big side effects - he had that as well." She admits she was unsure what to expect when they first met, but found "Neil and Moon were very personable... I thought they would make an accessible way into the subject". The film shows how people respond to him, asking about his appearance, and we see him producing artworks based on his perception of colour.

