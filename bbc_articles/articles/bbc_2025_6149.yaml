id: bbc_2025_6149
title: 'Newspaper headlines: ''Parliament recalled'' and ''Royals tried to trap me''
  says Harry - BBC News'
date: '2025-04-11'
section: The Papers
url: http://www.bbc.co.uk/news/articles/c5yl8jnl4gno
content: |-
  A vote aimed at saving a British Steel plant and claims from the Duke of Sussex feature on Saturday's front pages.

  Several front pages carry photos of the cricketer James Anderson, who was named in former prime minister Rishi Sunak's resignation honours list

  The Guardian says, external the emergency parliamentary sitting to decide the immediate future of British Steel's Scunthorpe plant is an unprecedented move that paves the way for nationalisation. The paper reports that senior sources believe bringing the company into public ownership is the likely outcome - a move that the GMB union said was the only way of saving the British steel industry. The Times reports, external that US President Donald Trump's Ukraine envoy has said the country could be split up like post-war Berlin. According to the paper, General Keith Kellogg suggested Russia could occupy the East, with British and French adopting zones of control in the west as a "reassurance force". Between them would be Ukrainian forces and a demilitarised zone. General Kellogg has said on social media that the article "misrepresents what I said", adding he was "not referring to a partitioning". The Daily Telegraph reports, external that the Duke of Sussex believes a decision to downgrade the level of security he receives in the UK was intended to discourage him from leaving the country with his family. The paper says that he made the comments earlier this week while leaving the Royal Courts of Justice, where he was challenging an earlier ruling upholding the decision. "Royals Tried to Trap Me" is the headline in the Sun,, external which calls it a "shock new attack" by Prince Harry on his own family.

  The Daily Mail accuses, external the new interim chief executive of NHS England of running the health service from a train carriage, after he was photographed sleeping during his 300-mile commute from London to his home in Northumberland. NHS England says Sir Jim Mackey is "laser-focused" on improving services. The Daily Telegraph says, external the Chief Constable of West Yorkshire Police wants the law changed so that forces can discriminate in favour of ethnic minorities. The paper previously reported that the force had put a temporary block on hiring white candidates. John Robins argued in 2023 that a similar move after the Good Friday Agreement helped integrate Catholics into the police in Northern Ireland. And several front pages carry photos of the cricketer James Anderson, who is set to receive a knighthood in former prime minister Rishi Sunak's resignation honours list. "Arise, Sir Jimmy," says the Times., external

