title: Coldest wind chill ever recorded in continental US, say forecasters - BBC News
date: '2023-02-01'
section: US & Canada
url: http://www.bbc.co.uk/news/world-us-canada-64485092
content: |-
  The cold on Mount Washington in New Hampshire on Friday was producing a wind chill of -108F (-77C).

