  To be clear, most Conservatives remain profoundly gloomy about the party's prospects at the general election. One influential Conservative, explaining why there was now, they believed, "almost zero" chance of Mr Sunak being challenged, said that the results "confirm we're on track for a trashing"... but not an "extinction level" event. Not everyone is completely writing off the possibility that Mr Sunak could come under threat. One minister described a "relative silence" not only on the airwaves but also in some of the notorious party WhatsApp groups, saying this suggested that many were still adopting a "wait and see approach". The minister added: "Things often move quickly despite calm in the immediate aftermath of results." The Labour Party, meanwhile, are professing to be extremely satisfied, not just with the overnight results, but with the way the debate in the Conservative Party is developing. "If they want to kid themselves that the mayoral results mean they should keep Rishi Sunak in place," one senior Labour source said, "then they can be our guests."
