title: UK universities see drop in foreign student visa applications - BBC News
date: '2024-10-11'
section: Family & Education
url: http://www.bbc.co.uk/news/articles/cdd4p62nyg8o
content: |-
  The number of applications for students' family members also falls starkly after a ban by the previous government.

  The number of international students applying for visas to study in the UK dropped this summer, according to new figures. Home Office figures showed 16% fewer visa applications were made between July and September than in the same period in 2023. Meanwhile, the number of visa applications for family members of students dropped by 89%, after a rule change introduced by the previous government came into effect in January. The figures have prompted further concern within the sector over the financial health of UK universities, many of which depend heavily on international student fees.

  The Home Office said, external 263,400 sponsored study visa applications were made between July and September, down from 312,500 in the summer of 2023. In the same period, only 6,700 applications were made by dependants of foreign students, down from 59,900 last year. Since January, international students have been banned from bringing family members to live with them in the UK, apart from some who are on research-based courses or government-backed scholarships. The rule was introduced last year by Rishi Sunak's government, which had committed to bringing immigration numbers down.

  Some in the sector have warned that fewer international students will further damage university finances in the UK. Universities UK, which represents 140 institutions, said the figures showed that student recruitment "remains very challenging", and that "the UK’s position as a top study destination is under threat". Nick Hillman, director of the Higher Education Policy Institute (Hepi) think tank, said the numbers "confirm our fear that the previous government’s changes have made the UK a less attractive study destination". Jo Grady, general secretary of the University and College Union (UCU), recently called for government bailouts for those universities struggling financially. She said the new Labour government should "lift Tory visa restrictions as a first step towards stabilising our universities and rebuilding Britain". A Home Office spokesperson said the government "values the contribution legal migration makes to our country, but it must be controlled and delivered through a fair system".

