  Former Manchester United and France footballer Patrice Evra will make his mixed martial arts debut at PFL Europe Paris on Friday, 23 May, and wants to fight Luis Suarez.

  'He can even bite me' - Evra wants Suarez for MMA debut

  Patrice Evra has been working as a football pundit since retiring from playing

  Former Manchester United and France footballer Patrice Evra will make his mixed martial arts debut at PFL Europe Paris on Friday, 23 May. The 43-year-old - who quit football in 2018 - has been training since 2016 with PFL star and friend Cedric Doumbe. The opponent for Evra's bout at the Accor Arena is yet to be announced. Evra, who won 81 caps for France, wrote on social media: "They will pick my opponent. They asked who I wanna face. I said Luis Suarez. "I'll pay out of pocket. He can even bite me." In 2011, Uruguay striker Suarez - then playing for Liverpool - was banned for eight games for racially abusing Evra, who was playing for United. The 38-year-old Suarez, who still plays football for Inter Miami, has been found guilty of biting three opponents in his career.

  Speaking in the PFL press release about the announcement, Evra added: "I love this game too. "I've performed on the world's biggest stages, won every major trophy in football, but PFL Europe Paris will be an incredibly special night for me. "I've been training alongside the best in the world for years, and they'll also tell you I'm ready for this. I'm going to put on a show at the Accor Arena on 23 May, so come watch the spectacle." Evra played 379 times for Manchester United between 2006 and 2014, winning five Premier League titles and the Champions League. He also played for several clubs in France and Italy, including Monaco and Juventus, and ended his football career with a short spell at West Ham. Since retiring he has worked as a TV pundit. The Professional Fighters League (PFL) is the second biggest MMA promotion in the world, behind the UFC.
