  The speed at which Alcaraz raced through the third set showed just how difficult an opponent he is to face, given the momentum heading into the decider appeared to be with Lehecka. The 23-year-old Czech had beaten Alcaraz in three sets in the quarter-finals of the Qatar Open in February and must have sensed a repeat after a brilliant display in the second-set tie-break. There the Queen's crowd was treated to some incredible tennis and fans were on their feet when Alcaraz somehow returned a point he seemed certain to lose when he stretched to lob his opponent. Lehecka responded from that setback to hit an ace and take the set. But Alcaraz was almost unplayable in the third set, dominating on his serve and hitting some excellent winners as he followed up this month's French Open victory with this success. Five-time Grand Slam champion Alcaraz had made a relatively slow start to the tournament as he acclimatised to grass after a long season on clay, but now looks completely comfortable on the surface in time for Wimbledon, which starts on 30 June.
