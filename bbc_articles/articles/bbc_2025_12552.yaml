content: |-
  World number two Carlos Alcaraz holds off a battling Jiri Lehecka to seal his second Queen's title with victory in an enthralling final.

  To play this video you need to enable JavaScript in your browser. This video can not be played

  World number two Carlos Alcaraz held off a battling Jiri Lehecka to seal his second Queen's title with victory in an absorbing final on Sunday. The Spaniard won 7-5 6-7 (5-7) 6-2 to take his 21st career title but was pushed hard by the in-form Lehecka, who was one of only five players to have beaten Alcaraz this year. Lehecka had seen off British number one Jack Draper in the last four to secure his place in the final and initially looked unable to deal with the quality of Alcaraz in the first set. But a much closer second set went the distance, with Lehecka overcoming the disappointment of being lobbed after a superb drop shot in the tie-break to then serve an ace and level the match. Alcaraz, though, showed why he is such a formidable opponent as he recovered from that disappointment to step it up a gear in the third, breaking early on his way to securing the match and the title. It was an 18th match win in a row for Alcaraz and a fifth title in 2025 to ensure he starts his bid for a third successive Wimbledon crown as a player in form. "I'm happy to lift this trophy once again," Alcaraz said. "It has been an incredible week. I came without expectations and just wanted to play good tennis and to get used to the grass. "It's really special playing here every year and I can't wait to come back next year."

