content: |-
  Scotland's first minister gives evidence to Holyrood's Covid-19 Committee which is examining the government's handling of the pandemic.

  'We kid ourselves' if think vaccinating just our own people solves pandemic - FM

  Willie Coffey MSP says he takes prides in reading that it was a Scottish doctor, Alexander Wood, who is widely credited with inventing the modern-day hypodermic syringe - thanks for the plug, Mr Coffey - and asks whether there is more we could be dong to assist other countries with their vaccination programme. Nicola Sturgeon says "absolutely" and despite being "really pleased" with the vaccine rollout in the UK, she says "we kid ourselves on" if we think just vaccinating our own population solves a global pandemic for us. We will be this pandemic as long as other countries are in it, the first minister points out. We have a shared interest – not just out of altruism, but actually a "selfish self-interest" - in other countries getting themselves vaccinated as well, she says. The Scottish government has already helped prepare health systems in countries like Malawi, Zambia and Rwanda for distribution of the vaccine through its international development programme, Ms Sturgeon adds. Since around September, it has also carried out a review of its approach with a view to ring-fencing some funding for Covid-specific responses.
