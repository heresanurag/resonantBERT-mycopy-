content: |-
  The overnight visit will see the Labour leader continue his tour of the UK after travelling to Scotland earlier on Sunday.

  Keir Starmer arrives in NI on first visit as prime minister

  Sir Keir Starmer is to meet the first and deputy first ministers during the visit

  Sir Keir Starmer has arrived in Northern Ireland on his first visit since becoming prime minister. The overnight visit will see the Labour leader continue his tour of the UK after he travelled to Scotland earlier on Sunday. He is expected to visit Stormont on Monday to meet First Minister Michelle O’Neill and Deputy First Minister Emma Little-Pengelly. Ahead of the meetings, Sir Keir said “stability and certainty” would be at the centre of what his government does for Northern Ireland.

  “We are the party of the Good Friday Agreement, and the stability it has brought,” he said. “Together, as we take the steps towards a decade of national renewal, we will harness Northern Ireland’s vast economic strengths – rebuilding strong public services and generating real and tangible economic growth for working people. “We must turn the page and secure investment, prosperity, and stability for future generations to come.”

  On Saturday, the new Secretary of State for Northern Ireland Hilary Benn met the first and deputy first ministers at Hillsborough Castle

  The new Secretary of State Hilary Benn arrived in Northern Ireland on Saturday and held talks with most of the main political parties. On Sunday, he visited businesses in Belfast city centre, where he told reporters that Casement Park “has to be built”, but urged people to bear with him while he ploughs through the issues. Labour has been urged by political parties and sporting organisations to commit funding to ensure the stadium can be redeveloped in time for Euro 2028. Mr Benn said he wouldn’t be pressured into saying Casement Park will be built in time for the Euros in 2028 but said “as soon as I’m in a position to make that decision I will”. He previously said a Labour government could not write a “blank cheque” for the redevelopment.

  Sir Keir is also likely to be asked about committing to funding when he meets the political parties at Stormont on Monday. He will meet the first and deputy first ministers to discuss a range of issues and areas of shared co-operation, agreed during their call on the prime minister's first day in office. He will then meet other political leaders in the executive and opposition parties at Stormont.

  Taoiseach Simon Harris has congratulated Sir Keir Starmer on his appointment as UK prime minister

  The new UK prime minister has also got plans to meet politicians in the Republic of Ireland. Taoiseach (Irish prime minister) Simon Harris and Sir Keir are to meet later this month. On 5 July, the taoiseach spoke to the prime minister by phone. Mr Harris told his Fine Gael party in a private meeting on Wednesday that he was making plans to seek an early engagement with the new UK government. During the call on Friday, Mr Harris congratulated Sir Keir on his new role and his party's victory in the election. The taoiseach said he "looked forward to having a close and constructive working relationship". Mr Harris accepted the prime minister's invitation to visit Downing Street on 17 July.
