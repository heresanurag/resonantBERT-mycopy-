title: 'Talbot Green: Police station incident sees man appear in court - BBC News'
date: '2025-02-03'
section: Wales
url: http://www.bbc.co.uk/news/articles/c4gzj95l4ejo
content: |-
  A man appeared in court charged with attempted murder and six other offences.

  A man has appeared in court charged with attempted murder and six other offences after three officers were injured at Talbot Green police station on Friday. Alexander Stephen Dighton, 27, from Llantrisant in Rhondda Cynon Taf, is also charged with assaulting an emergency worker, assault, arson, criminal damage, possession of an offensive weapon and possession of a knife. He represented himself at Merthyr Tydfil Magistrates' Court on Monday and confirmed his name and date of birth in the brief hearing. Mr Dighton was remanded in custody until the next hearing expected to be held on 3 March at Cardiff Crown Court.

  The incident happened just before 19:00 GMT on 31 January when police say a man started damaging cars at the police station. In a statement the police said that there was a violent struggle after officers challenged the man. Three officers were injured, with two taken to hospital and treated for their injuries. Both have now been discharged.
