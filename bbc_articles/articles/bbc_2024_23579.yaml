  Behind the scenes at the United Nations, insiders tell the BBC they don't see major change whoever wins the White House.

  Trump or Harris? In a crisis-hit world, diplomats resigned to either

  The annual United Nations General Assembly week is always frenetic. It may be called the Super Bowl of diplomacy, but this year perhaps a more appropriate analogy is a marathon. Not since World War Two have there been so many global conflicts piling up, with Lebanon on the brink just as leaders arrived in New York City. Given the current state of uncertainty, the forthcoming US election was in the back of everyone’s minds here. One senior Western diplomat told me no-one expects things to move on the Israel-Gaza war until after a winner is declared in the White House race. “We understand that the current administration is under pressure not to take any decisions that might affect the election,” he said. “But we hope that after the election the current administration will use the interim period to maybe make some decisions that will lead to improving the situation in Gaza.” But in conversations with a dozen officials from different continents at the UN's headquarters in Manhattan, a picture emerged of a global community fatigued by crisis and resigned to working with whoever is the next occupant of the White House. All were granted anonymity to share their candid views. "I don’t see any difference between the two candidates, just look around the whole world from one end to the other, we are in total chaos," an ambassador from a South Asian nation told me.

  World leaders on the sidelines of the UN General Assembly this week

  It's a sentiment that reflects perhaps disillusionment with US leadership, but also the view by many in the global south that while the rhetoric changes, America’s broad foreign policies really don’t swing that drastically from one administration to the next. “It’s very easy to bash and make alarms about what could happen,” one senior Arab representative told me. He said while he thinks former President Donald Trump is unpredictable compared to Vice-President Kamala Harris, the idea that he would rip up multilateralism is exaggerated because it didn’t happen before. "What is really undermining multilateralism are actions and conflicts that are happening in many parts of the world, and you can’t put that on one country or on one administration," he said. Here at the UN complex, one longtime official of the organisation tells me there isn’t panic about the US election. "We have enough anxiety spread around what's going on today to worry about what's going on in November,” the official said. This source added that the UN survived the Trump administration in a way few would have predicted. "The volume may have been very loud, but they weren’t all that different from previous Republicans," the official said. If there is a second term, the official told me their sense is that Trump will be so focused on domestic issues and "settling scores internally" that foreign policy might not be the focus in the beginning. "I am very confident that the bones of friendship between Kenya and the US transcend individuals in office," he said. "It will transcend me as president or whoever is elected in the US."

