  Despite Harborough losing 2-1 to St Ives Town in their Southern League Premier Central encounter, Mr Oleart said his group was "very happy" with their experience. "It was certainly the best trip we have had so far," he said. "We occupied a full stand and started cheering from the first second of the game," added fan Alvaro Sanz. "Quite a few local fans joined us, and we even taught them some chants in Spanish. "We didn't stop supporting the team for the entire match."

  Alvaro Sanz (right), 31, travelled from Spain to watch the match on Saturday

  Before the game, residents watched in amusement as two coachloads of Spanish supporters arrived in the town centre before marching around singing Spanish songs before kick-off. "It wasn't just any club any more, it felt like our club," said Mr Oleart. "We were able to meet the players after the match and even have a drink with them in the pub, which is something that is impossible to imagine at a Premier League club. "We wanted to ensure the trip was a chance for us to create a relationship with their fans too. "There are many things to do to work on the alliance and to make it stronger, but I am sure there are many great memories to create in the future and I am hoping to bring 200-300 fans with me next time. "Many football fans are looking for this experience and we are glad to do it with Harborough Town FC."

  LMI subscribers brought flags and ensured they all wore Harborough Town shirts ahead of kick-off

  Bees chairman Pete Dougan said: "It was a great day and the atmosphere they generated was superb. "It was like song tennis in the stadium, our fans were singing songs in English and then they sang songs back in Spanish. It was good fun." Dougan said he was looking forward to welcoming his new fans back next season and revealed the club are heading to Barcelona and Madrid for a pre-season tour in July.

