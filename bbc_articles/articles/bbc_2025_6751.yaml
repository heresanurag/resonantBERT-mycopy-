content: |-
  Harborough Town's home match had some international visitors - but why were they there?

  Surprise as 100 Spaniards turn up at non-league game

  Madrid or Market Harborough? More than 100 Spaniards went to watch Harborough Town v St Ives Town on Saturday

  Wembley, Old Trafford and Anfield regularly welcome football tourists from foreign shores - but they are a far less common sight at Harborough Town's home ground in Leicestershire. So imagine the surprise when more than 100 Spanish sports fans turned up to enjoy the non-league club's match against St Ives Town on Saturday. The Spaniards were subscribers to a Spanish YouTube channel devoted to English football which has now started arranging trips. "Some of the local fans were quite surprised, probably wondering what 100 Spaniards were doing there," said Madrid-born and new Harborough Town fan Alvaro Sanz.

  The Spanish fans watching on during the 2-1 defeat on Saturday

  The channel La Media Inglesa (LMI) was founded by Barcelona-born Ilie Oleart and covers English football matches for Spanish speaking fans across the world. Since launching in 2011, the channel has gained more than 440,000 subscribers and began offering trips to the UK in 2018 so the fans could watch games in person. Mr Oleart, who supports La Liga side Espanyol, said the next step for LMI was to not only show English football but also try to be involved with an English football club in some way. "Our aim was to transform a small local English club into a small local club with a global fanbase," he said. After speaking to different lower league clubs, Mr Oleart asked his subscribers which club they should link up with - and Harborough Town FC emerged as the fans' choice.

  La Media Inglesa has taken subscribers to watch games at the likes of Brighton and Hove Albion, Sheffield United and Wycombe Wanderers

  "I met people at the club in September to get to know their history, the town and the facilities," said Mr Oleart. "We thought they were the perfect club with the right values to share with our audience." Harborough Town games in the seventh tier of English football will now be live-streamed on the LMI Youtube channel, giving Spanish-speaking fans a chance to become "virtual supporters" of the club.

  The club - nicknamed the Bees - have already captured the imagination this season by reaching the FA Cup second round for the first time and having former Brazilian international Sandro play for them. Club chairman Peter Dougan said the partnership with LMI was an "opportunity to grow our fanbase and our income" through a global audience and could open the door to sponsorship deals. "It was being in the right place at the right time," he said. "LMI liked what they saw and we decided they were right for our club too."

