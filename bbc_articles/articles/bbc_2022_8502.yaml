content: |-
  The actor is awarded $15m - but Heard also wins $2m after jurors find Depp defamed her via his lawyer.

  'Evidence matters, but the jury are fans too'

  If you were to take a look at social media over the past month, you'd see that to many, Heard lost in the court of public opinion weeks ago. "What's interesting about public opinion in this case is that we can measure it," said journalist and author Cooper Lawrence, who has written extensively on celebrity culture. "#JusticeForJohnnyDepp has more than 18 billion hits on TikTok. Amber Heard has only a tiny percentage of that." Each day of the trial, Depp would pass hundreds of screaming fans on the short walk from his car to court. Jurors had been instructed to stay offline and ignore all coverage of the case. But the noise around this case will have been hard to ignore. "I think it will be really interesting to see how the jury responds to the cult of celebrity that's in front of them," Lawrence said before the verdict. "Evidence matters, but the jury are fans, too."
