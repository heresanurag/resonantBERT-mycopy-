content: |-
  Two MPs enter the race to replace Ian Blackford who has stood down as the SNP's Westminster leader.

  This video can not be played To play this video you need to enable JavaScript in your browser. Ian Blackford has denied he was pushed out of his role as SNP Westminster leader.

  Ian Blackford has denied he was pushed out of his role as SNP Westminster leader.

  Mr Blackford stood down after five years in the post after weeks of speculation that some colleagues were plotting to replace him.

  He told BBC Scotland he took the decision to go but also claimed he would have been re-elected.

  Two MPs, Stephen Flynn and Alison Thewliss, have entered the race to become the new group leader.

  Mr Blackford's successor will be selected at the Westminster group's AGM on Tuesday.

  Asked on BBC Scotland's The Sunday Show if he was pushed out, Mr Blackford said: "No I took the decision, I need to make sure my talents are used in the right way to support the government and support the first minister.

  "I certainly take the view that if I had stood at the AGM that I still would have been the SNP's Westminster leader but I think now is the right time to allow other people to come forward."

  Mr Blackford, MP for for Ross, Skye and Lochaber, is taking on a new role for the SNP promoting independence to Scotland's business community.

  Stephen Flynn was elected MP for Aberdeen South in 2019

  Mr Flynn confirmed he would stand on Sunday evening and tweeted: "Independence is coming, let's get on and deliver it."

  The Aberdeen South MP added: "I want to see a Scotland where opportunity exists for all, where we have the powers to combat poverty and create a green energy revolution."

  Earlier, Glasgow Central MP Ms Thewliss said she was standing as she felt she had a "duty to step up".

  She wrote on Twitter that she would be a "clear contrast to the two men shouting at each [other] across the despatch box at PMQs on a Wednesday, illustrating the alternative vision on offer for Scotland".

  Alison Thewliss, the Glasgow Central SNP MP, wants to be the next SNP Westminster leader

  On Friday Kirsten Oswald confirmed she would step down as SNP Westminster deputy leader.

  The East Renfrewshire MP tweeted that it "seems sensible to me that a new leader and new deputy pick up the baton and they'll have my support to do that".

  The new Westminster leader will be selected on Tuesday by the 44 MPs who currently hold the SNP whip.

  It means the new leader will be in place to face Rishi Sunak at Prime Minister's Questions the next day.

  Meanwhile, SNP president Mike Russell and former cabinet secretary for the constitution has raised the prospect of the SNP using the next Holyrood election as a "de facto referendum" on independence.

  First Minister Nicola Sturgeon has said the next general election should be the "de facto referendum" on independence.

  This followed the Supreme Court ruling that the Scottish government does not have the power to hold an actual referendum without the UK's government's consent.

  But when asked by the BBC if the "de facto referendum" should be for the next Westminster or Holyrood election, Mr Russell said "we need to look at both of those options very carefully".
