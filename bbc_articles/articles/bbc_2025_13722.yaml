title: I forgave Yusuf, says Refom UK leader Farage after burka row - BBC News
date: '2025-06-09'
section: Politics
url: http://www.bbc.co.uk/news/articles/ce81kj65x40o
content: |-
  Nigel Farage says Zia Yusuf plunged the party into a "difficult place" after criticising an MP and quitting as chair.

  To play this video you need to enable JavaScript in your browser. This video can not be played Nigel Farage: Zia Yusuf got it wrong and I forgave him

  Reform UK leader Nigel Farage has said he "forgave" Zia Yusuf after he criticised one of the party's MPs and quit as its chairman, but told him "don't do it again". Yusuf stepped down from the role last week shortly after saying it was "dumb" for MP Sarah Pochin to call for a burka ban. On Thursday, Yusuf said working for a Reform UK government was not "a good use of my time"; however two days later he appeared to have a change of heart and said he would continue working for the party, albeit in a different role. Speaking in Port Talbot in Wales, Farage said Yusuf had "lost his rag" and "plunged us into a difficult place".

  He said Yusuf had made "intemperate comment or two" but added: "It was pretty clear by the next morning he quickly regretted what he had done. "I forgave him, I said 'don't do it again' but I forgave him." Speaking to the BBC earlier in the day, Yusuf had said he regretted his social media post and that "exhaustion led to a poor decision". He dismissed the incident as a "storm in a teacup". Having served as chair of the party for eleven months, Yusuf will now lead the party's Doge unit, a team inspired by the US Department of Government Efficiency, set up by President Donald Trump and Elon Musk. The initiative aims to cut wasteful spending in the councils Reform now controls. Asked why he had resigned as chairman, Yusuf said: "I've been working pretty much non-stop, virtually no days off. "It is very difficult to keep going at that pace." He said one of the reasons he had "changed his decision so quickly" and returned to work for the party, was that he had been "inundated" by supportive messages from Reform voters and members. As well having a public role with Reform UK, Yusuf has been a big donor, giving the party more than £200,000.

  The series of events began last Wednesday when Pochin, the newly-elected MP for Runcorn and Helsby, asked Prime Minister Sir Keir Starmer if he would join France and Denmark in banning the burka, a veil worn by some Muslim women that covers the face and body, "in the interests of public safety". The following day Yusuf, who is a Muslim, posted on X: "I do think it's dumb for a party to ask the PM if they would do something the party itself wouldn't do". Speaking to the BBC on Monday, Yusuf said "the thing that frustrated me at the time" was that Pochin had not chosen to ask something that was party policy. Asked for his views on a ban, he said: "If I was an MP I would think about it very deeply, I think I probably would be in favour of banning face coverings in public writ large, not just the burka. "I'm very queasy and uneasy about banning things that for example would be unconstitutional in the US but we have a particular situation in the UK." He said he did not believe Islam was "a threat to the country" but added that the UK had "a problem with assimilation".

  Labour MP Naz Shah told the BBC that Pochin's decision to ask the prime minister about burkas was "click-bait, dog-whistle politics". "In Runcorn and Helsby, there are just 141 Muslim women over the age of 18 - that's only 0.4% of the entire constituency population. Out of 93,137 residents, I'd bet my bottom dollar there isn't a single person who wears a burka or niqab." "If the local MP is concerned about crime or security, it's probably not the imaginary woman in the burka she should be focusing on." Over the weekend, Conservative leader Kemi Badenoch was also asked her views on banning the burka. She told the Telegraph: "People should be allowed to wear whatever they want, not what their husband is asking them to wear or what their community says that they should wear." However, she said that organisations should be able to decide what their staff wear and that she asked people coming to her constituency surgeries to remove face coverings "whether it's a burka or a balaclava". "I'm not talking to people who are not going to show me their face," she added. The Muslim Council of Britain accused her of "desperation" adding: "Kemi Badenoch isn't setting the agenda - she's scrambling to keep up with Reform UK's divisive rhetoric."
