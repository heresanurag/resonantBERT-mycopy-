  Ms Mordaunt also clashed with Ms Truss and Ms Badenoch over her record on trans rights during her time as an equalities minister.

  Both Ms Badenoch and Ms Truss accused Ms Mordaunt of supporting "self-ID", a process allowing a trans person to legally change their gender without, for example, a medical diagnosis.

  Ms Mordaunt denied ever supporting the policy, but Ms Badenoch, who previously served as a junior equalities minister in 2020-21, said she found that "hard to accept" and her understanding was Ms Mordaunt had pushed for it.

  Ms Truss, who also had responsibility for equalities alongside her role as foreign secretary, said she had "changed the outcome" of a consultation to ensure self-ID was not brought in.

  While Mr Sunak was not asked about gender identity during the debate, speaking on Saturday he said: "I'm the father of two young girls and I want to make sure that women's rights are protected, whether that's in sports, in changing rooms or in language.

  "But of course I respect everyone's freedom to love who they want and live as they live. But we must be unequivocal, as I am, about protecting women's rights."

  The next debate is on ITV at 19:00 BST on Sunday.
