id: bbc_2019_10070
title: Woman critical after vehicle hits campers in tents in Caernarfon - BBC News
date: '2019-08-19'
section: Wales
url: http://www.bbc.co.uk/news/uk-wales-49393601
content: |-
  Two men have been arrested after four people were injured by a car driven into tents.

  A woman was left critically injured after the crash on Monday morning

  Four people have been hurt after a vehicle hit them while they were in their tents at a campsite.

  A woman was critically injured and remains in hospital in the incident at Rhyd y Galen campsite, near Caernarfon, in the early hours of Monday

  Two men are in custody after they were arrested on suspicion of dangerous driving and drink-driving.

  North Wales Police said: "This was a terrifying event for people who should have felt safe in their tents."

  The critically injured woman was left trapped after the car was driven into two tents, North Wales Fire and Rescue Service said.

  She was freed by police and taken to Ysbyty Gwynedd hospital in Bangor.

  Another woman and two men were also hurt but have since been released from hospital.

  Det Ch Insp Sion Williams said: "We are continuing to support those involved and we are asking anyone with any information relating to the incident to contact us."

