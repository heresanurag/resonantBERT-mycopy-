title: 'M23 West Sussex: Motorway reopens after multi-vehicle crash - BBC News'
date: '2024-03-02'
section: Sussex
url: http://www.bbc.co.uk/news/uk-england-sussex-68456301
content: |-
  Six people were taken to hospital and 34 treated at the scene after the crash near Gatwick Airport.

  The crash caused long tailbacks on the M23, south of Gatwick Airport

  Six people were taken to hospital and 34 treated at the scene of a multiple vehicle pile-up on the M23 in West Sussex.

  The crash, involving 15 vehicles, happened about 17:40 GMT on Friday, and led to the motorway being closed between junctions 10 and 11, close to Crawley and Gatwick Airport.

  The road was reopened in the early hours of Saturday.

  Police said none of those taken to hospital had life-threatening injuries.

