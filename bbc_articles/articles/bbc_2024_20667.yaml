title: 'Man City 4-2 Chelsea: Erling Haaland hat-trick beats Chelsea in pre-season
  win - BBC Sport'
date: '2024-08-04'
section: Premier League
url: http://www.bbc.co.uk/sport/football/articles/cljyyrk2ly5o
content: |-
  An Erling Haaland hat-trick helps Manchester City to a comfortable pre-season win over error-prone Chelsea in Columbus.

  A hat-trick from Erling Haaland helped Manchester City to a 4-2 pre-season win over error-prone Chelsea in Columbus. Haaland, 24, scored twice in the first five minutes, profiting from two disastrous Chelsea mistakes as Enzo Maresca's side gifted the Premier League champions an early lead. The first goal came from a Tosin Adarabioyo loose pass, with Levi Colwill bringing down Haaland for a fourth-minute penalty, which the Norwegian scored after a re-take. Haaland doubled City's lead almost straight away when he intercepted a miscued Moises Caicedo pass to slot in. Another quick-fire pair of soft goals in the second half saw Pep Guardiola's champions build a commanding lead, City's third coming as substitute Raheem Sterling's mistake enabled Oscar Bobb to score through a near-post shot in the 55th minute. And Haaland got his hat-trick just one minute later after another error from Malo Gusto. Chelsea did get two goals back after Raheem Sterling volleyed in a cross after 59 minutes and then Noni Madueke scored on the counter attack in the 88th minute in front of 68,000 supporters at Ohio Stadium. Maresca insisted that his team played well in a "strange" game and both managers also blamed the "dry" pitch for errors in possession. City now return to the UK to face Manchester United in the Community Shield next Saturday. Meanwhile, Chelsea remain in the United States for a match against Real Madrid on Tuesday night before facing Inter Milan at Stamford Bridge next Sunday.

  It is clear to see that former Leicester boss Maresca is needing time to bed in his tactical approach after just five weeks in the job at Chelsea, compared to Guardiola's eight years in charge. All four goals were due to mistakes playing out from the back and while Maresca has said errors are inevitable with his approach, he believes it will ultimately lead to progress. Chelsea did, at times, create openings, including two chances missed by Christopher Nkunku and one from Enzo Fernandez. But City also had 15 senior players out because of international commitments at Euro 2024 and the Copa America, 10 more than Chelsea. There are legitimate questions whether full-backs like Reece James and Malo Gusto - who unusually started at left-back ahead of Ben Chilwell - can adapt to the latest new Chelsea system which sees several players playing out of their usual positions. Maresca admitted he is experimenting to find balance and said: "The reason why is because in this moment I need to see things for the rest of the season. "It is a strange game because you plan the game in one way, then you concede two goals and it changes the dynamic. “What can I say about the first-half? The team was good on the ball, creating some chances, finding the right players and the right spaces. “We need to learn that when you concede one, you cannot concede one and then after two minutes another one."

  Jack Grealish is using the disappointment around his Euro 2024 omission from the England squad to fuel further success in the coming season. The winger, 28, helped set up the first goal with some sharp pressing and was close to Haaland throughout, allowing him to link up to create dangerous attacks. "Jack has had an unbelievable three games," Guardiola said. "I said the first game is about rhythm. Against Barcelona he made five shots, one goal and today he is aggressive. "I remember perfectly the Jack I know. Not how he performs, but how he's training and his behaviours, which are like two seasons ago. A lot of competition is there [in his position] and the best player who produces for the team will play." Haaland, of course, showed his sharpness for the new campaign with a deadly 56-minute hat-trick. A host of Man City youngsters impressed, including Bobb who shot through Colwill's legs for the goal, and could have scored another after a brilliant dribble. Among City's starters were Rico Lewis, James McAtee, who claimed two assists, Josh Wilson-Esbrand and Nico O'Reilly. Julian Alvarez, Kevin de Bruyne, Jeremie Doku, Bernardo Silva, Phil Foden and Savinho are yet to begin pre-season with the main squad so Grealish, Haaland and Bobb could be the trio to start at Wembley Stadium against Manchester United next weekend.
