title: Murder arrest after man, 75, shot dead in Scarisbrick field - BBC News
date: '2024-07-26'
section: Lancashire
url: http://www.bbc.co.uk/news/articles/c0xjyz8v51wo
content: |-
  The 75-year-old victim was found in a field on Pinfold Lane in Scarisbrick

  A man has been arrested on suspicion of murder after a 75-year-old was shot dead in a field. The man was found on Pinfold Lane in Scarisbrick at about 16:55 BST on Thursday and was pronounced dead at the scene, Lancashire Police said. A 29-year-old man from Scarisbrick remains in custody after police recovered a shotgun from the scene. The force said the two men were "known to each other", and officers were not "looking for anyone else in connection with this incident".

  Police said the two men were known to each other

  Det Ch Insp Andy Fallows said: "A man has very sadly lost his life as a result of this, and we have a dedicated team of officers working to establish what led to his death." He appealed to the public for anyone with information or dashcam footage to get in touch with the force.
