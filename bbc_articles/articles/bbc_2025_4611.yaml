  Weekly quiz: What did a US influencer do that caused outrage in Australia?

  This week saw the South African ambassador to the US expelled from the country, the death of the last surviving Battle of Britain pilot and an ugly fish win a competition. But how much attention did you pay to what else has been going on in the world over the past seven days?

