title: Croydon moped robbers target family in stationary car - BBC News
date: '2018-06-11'
section: London
url: http://www.bbc.co.uk/news/uk-england-london-44435677
content: "The family were threatened by a man with a large knife and a woman, 30,\
  \ was injured.\n\nDetectives say the family was threatened with a large knife\n\n\
  A family of four were robbed by two masked men on a moped as they sat in a stationary\
  \ car in Croydon, south London.\n\nOne of the suspects threatened the family with\
  \ a large knife on Keats Way, Coulsdon, at about 17:45 BST on Friday.\n\nPolice\
  \ say the pair made off with a \"small quantity of jewellery\".\n\nA 30-year-old\
  \ woman suffered a cut to the hand during the robbery, as one of the suspects attempted\
  \ to steal her bracelet.\n\nIt is believed that the other man also had a knife.\n\
  \nDetectives described the suspects as two white males, aged in their late teens\
  \ or early 20s.\n\nBoth were of slim build and wore dark coloured tracksuits, black\
  \ crash helmets and facemasks.\n\nThe number of offences carried out by criminals\
  \ using mopeds in London has increased from 827 offences in 2012 to more than 23,000\
  \ last year.\n\nData obtained by the BBC showed during that period, more than 40%\
  \ of such offences happened in just two boroughs - Camden and Islington.\n\nUse\
