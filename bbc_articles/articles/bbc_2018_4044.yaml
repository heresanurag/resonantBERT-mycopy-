  Barker's victory meant she became the first Welsh cyclist to win a Commonwealth title on the track since Auckland 1990. She gained a lap on the field to finish on 40 points, winning two of the 10 sprints. "I consider this to be one of my best events. I wanted to win and I'm glad it paid off," she said. "It's really special and to hear the Welsh national anthem on the podium is something that doesn't happen very often. The 23-year-old had won silver and Archibald, 24, bronze at the Glasgow Games four years ago. Silver on the Gold Coast was Archibald's second medal of the Games so far, having won individual pursuit gold on Friday.

