content: |-
  Elinor Barker wins points race gold to secure Wales' first cycling title of the 2018 Commonwealth Games in Australia.

  This video can not be played To play this video you need to enable JavaScript in your browser.

  Elinor Barker produced a stunning performance to win points race gold and secure Wales' first cycling title of the Commonwealth Games in Australia. Scotland's Katie Archibald and Neah Evans completed an all-British podium with silver and bronze respectively. England's Sophie Thornhill and pilot Helen Scott broke their world record to win gold in the women's blind and visually impaired 1,000m time trial. That was their second gold on the Gold Coast and meant Fachie equalled the Scottish Commonwealth Games record - held by sprinter Allan Wells and bowler Alex Marshall - of four. Wales' James Ball and pilot Peter Mitchell took silver, while Scotland's Aileen McGlynn and pilot Louise Haston were third behind Thornhill and Scott. The home nations' medal-laden day was completed when Scot Jack Carlin took silver in the men's sprint final before England's Chris Latham won scratch race bronze.

