id: bbc_2023_7874
title: Ukraine accuses Russia of phosphorus attack on Bakhmut - BBC News
date: '2023-05-06'
section: General
url: http://www.bbc.co.uk/news/65507074
content: |-
  Ukraine has accused Russia of using phosphorus to attack the besieged city of Bakhmut.

  Footage of the attack was posted on the Ukraine defence ministry's Twitter account.

  Phosphorus weapons are not banned, but they are prohibited against civilians and civilian targets.
