content: |-
  Dumfries was one of seven Scottish towns promised the funds towards regeneration a year ago.

  What happened to the £20m for 'overlooked' towns?

  Dumfries was one of more than 50 towns promised £20m to help regenerate the town centre

  A year has passed since the UK government announced that dozens of "overlooked" towns - seven of them in Scotland - were in line for £20m each. The funding - unveiled by then Prime Minister Rishi Sunak - was to be put "in the hands of local people" to regenerate their high streets. It was branded as "barely more than shiny headlines" by his political opponents at the time. What has happened in Dumfries - one of the towns involved - in the 12 months since the announcement was made?

  If the funding is forthcoming, it will be used to make the area safer, cleaner and more attractive to businesses

  Businessman Richie Nicoll was selected in March to chair the town board set up to oversee spending the levelling-up funds scheduled to arrive over 10 years. He is proud of what they have managed in just six months since his appointment. "For me it's been a bit less than a year but that probably exacerbates how busy it's been," he said. "We've done a lot of the engagement - as per the government guidelines - I think we were just short of 2,000 people." From their views, he said, they had produced a "comprehensive report" of what could be done in the town which was also submitted to meet a government deadline on 1 August.

  Richie Nicoll has been at the helm of the town board for a little over six months

  "We have moved into a hurry up and wait situation," he admitted. "We are literally just waiting on feedback from the government which is a tad frustrating considering the urgency that we have had to work to." Richie said they had been told that the funding was ring-fenced regardless of whether there was a change of government over its 10-year time frame. "I'm clinging onto that and I'm hoping that it's just a delay as the new government align their budget," he said. "I'm bracing myself for the worst - but trying to stay optimistic."

  A town board has been set up in Dumfries to oversee spending the funds

  If the funding does come through, Richie said there were plans to use it to help clean up the town centre and make it feel safer. He also hopes that local apprentices in further education or already working with businesses might hone their skills in the town. By making the area more attractive, they aim to entice more businesses. None of this can start until the funding comes through but Richie urged the people of Dumfries not to lose patience with his board. "Stick with us and stay positive," he said. "We're as frustrated as anybody else, we've done a heck of a lot of work. "The team that I've got on the town board, they've done a cracking amount of work getting to where we needed to be." He said supporters of the local football team - Queen of the South - would know what it was like to try to keep the faith in trying circumstances.

  "We're batting against the wind sometimes, but we'll get there," he added. The UK government said it was currently "assessing the challenge" of a "£22bn in-year black hole" in the finances it had inherited from the previous government. "A decision on this funding will now be made following the Spending Review process," said a spokesperson. "We recognise this is challenging and will seek to provide clarity as soon as possible. "This is about being honest with people and being respectful of taxpayers' money, not making promises we can’t keep." Future plans for the next Spending Review period are expected to be announced at the end of the month. Dumfries - along with Greenock, Irvine, Kilmarnock, Coatbridge, Clydebank and Elgin - will be watching and waiting with extra interest.
