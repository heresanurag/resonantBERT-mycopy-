title: Brazil's samba for the disabled - BBC News
date: '2017-02-23'
section: General
url: http://www.bbc.co.uk/news/world-latin-america-38896756
content: |-
  The first samba school in the world designed for people with disabilities helps them take part in Carnival.

  Taking part in the Rio carnival can often be a challenge for many of the 45 million people with disabilities living in Brazil. But one samba school is making it possible.
