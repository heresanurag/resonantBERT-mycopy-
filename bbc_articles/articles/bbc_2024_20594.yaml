  Daniel Wiffen earns his second medal of the Paris Olympics after finishing third in the 1500m freestyle final which was won by the USA's Bobby Finke.

  Wiffen third in 1500m final for second Olympic medal

  This video can not be played To play this video you need to enable JavaScript in your browser.

  Daniel Wiffen has earned his second medal of the Paris Olympics after finishing in third place in the 1500m freestyle final which was won by the USA's Bobby Finke. Finke set a world record of 14 minutes 30.67 seconds with a stunning performance while Wiffen was third (14:39.63) behind Italy's Gregorio Paltrinieri (14:34.55). The La Defense Arena erupted as Finke finished the race in record time, surpassing Chinese swimmer Yang Sun's time of 14:31.02 at the 2012 Games in London. In doing so, he became the first athlete from Northern Ireland to win an Olympic gold medal in 36 years. The 23-year-old is also the first Team Ireland athlete to win more than one medal in the same Games in 28 years. Ireland now have six medals in Paris, equalling their best ever haul at London 2012. It is the latest achievement in a breakout year for Wiffen, who has now added Olympic gold and bronze to his two World Championship golds in the 800m and 1500m freestyle in Doha in February. On the last night of competition, Finke’s gold meant the United States continued their 124-run of having an individual male champion at the Olympics. It was also a third Olympic success for Finke, who won 800m and 1500m freestyle gold in Tokyo three years ago.

  Bobby Finke retained his 1500m gold medal from the Tokyo Olympics

  Despite a second medal of the Games, Wiffen admitted he had "a lot higher aspirations" for the 1500m final. "To be honest, the 800m surprised me at the start of the week," he told BBC Sport. "Coming into this race I was ready. I completely was in the right shape to go a lot faster than the world record but that's just swimming - some days you have it, some days you don't. "If you'd told me I'd get a bronze medal at the start of the week, I'd be over the moon. Now I'm coming away with gold and a bronze, it's kind of special." After a cool and calm entrance into the arena, which had already reached fever-pitch with two French swimmers also in the final, Wiffen settled into the race in fourth position as Finke looked to break away from the rest of the field. After qualifying for the final third fastest, some five seconds behind Wiffen’s quickest time of 14:40.34, the 24-year-old American turned the script on its head on Sunday’s final. Paltrinieri was the first swimmer to try to go with Finke, as Wiffen swam his own race in third. He tried to catch the leading pair at the race's midpoint but was unable to match the pace and had to settle for a comfortable third. "To be honest, sometimes after a great 800m, it's not a great 1500," Wiffen added. "Both those times in the 800m and 1500m were very good. That was my fourth fastest time ever [in the 1500m] so I'm still pleased with it. "We'll come better next season and go under that WR [world record]."

  Wiffen (right) was third behind Finke and Italy's Gregorio Gregorio Paltrinieri

  Now competition at the La Defense Arena has come to a close, Wiffen will race in the Open Water 10km marathon swim in the River Seine on Friday. Before the Games he told BBC Sport that, given his lack of open water training as he focused on his pool events, he would be as surprised as anyone if he could win a medal in the River Seine in what will be his first open water race. "I've watched a couple, I've trained with Hector Pardoe, the British Olympian," he said. "I'm looking forward to it. I'm not sure how it's going to go. "I'm going to go in there aiming to be on the podium but I hear it'll be quite hard and quite a physical race. "We'll see what happens, it's my first time, we'll see what we do." Wiffen's second Olympic medal is the seventh won by an athlete from Northern Ireland at the Paris Games. His gold on Tuesday was followed by Jack McMillan helping Great Britain to men's 4x200m freestyle relay gold and Hannah Scott's dramatic win in the quadruple sculls for Team GB. Rhys McClenaghan won pommel horse gold to complete gymnastics' Grand Slam on Saturday, while Rebecca Shorten and Philip Doyle have also won rowing silver and bronze medals.
