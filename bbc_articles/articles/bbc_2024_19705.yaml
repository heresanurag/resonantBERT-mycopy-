  The woman is named as Victoria Thomas, whose family say has been "taken away so tragically".

  Murder charge after body of mum found at property

  The family of Victoria Thomas describe her as a "much-loved" mother and daughter

  A 44-year-old man has been charged with murder after a woman was found dead at a property in Cardiff. Alcwyn Thomas, from Heath, Cardiff, is charged with murdering Victoria Thomas, 45, from Caerphilly Road in Cardiff, where police were called to at 00:30 on Tuesday. He is due to appear at Cardiff Magistrates’ Court later on Friday. Ms Thomas’ family described her in a statement as a "much-loved daughter, mother, sister, aunt, niece and friend" who has been "taken away so tragically".

  "Our family are broken, and we will miss her forever. "Please respect our privacy and our wishes to grieve at this devastating and difficult time," the statement added. Det Ch Insp Matt Powell from South Wales Police said her family was being supported by family liaison officers. "As our investigative work continues at the scene, I would like to thank the local community for its support and understanding," he added.
