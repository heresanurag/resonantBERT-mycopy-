  A police officer in the same state said: "We're just looking for some sound, reasonable answers so that people could go about their life and not live in this hysteria that we have going." As the mystery persists, state governments are calling for more power to deal with the small, uncrewed aircraft being spotted in the skies. Earlier this week, New York Governor Kathy Hochul said officials were sending her a drone detection system. Among those who have voiced their suspicions are President-elect Donald Trump, who has said the government "knows what it happening", but "for some reason they don't want to comment". However, he said he "can't imagine it's the enemy". The Pentagon earlier denied the suggestion of one New Jersey lawmaker that the possible drones came specifically from an Iranian "mothership", while an FBI official said there may have been "a slight overreaction" on the topic.

