title: 'Watch: Republic of Ireland lacking confidence says Hallgrimsson after Nations
  League defeat by Greece - BBC Sport'
date: '2024-09-11'
section: General
url: http://www.bbc.co.uk/sport/football/videos/crmwgvpkjn1o
content: |-
  Republic of Ireland manager Heimir Hallgrimsson says the "jersey is a bit too heavy" for some of his players after the 2-0 defeat by Greece in the Nations League.

  It is two defeats from their opening two games for the Republic who lost by the same scoreline to England on Saturday.
