title: Winter storm blankets eastern North America in heavy snow - BBC News
date: '2024-12-02'
section: General
url: http://www.bbc.co.uk/news/videos/clyvgpkkr8vo
content: |-
  Residents capture blue lightning, thundersnow, and efforts to dig out from heavy snowfall.

  A winter storm swept across the eastern US and Canada, bringing heavy snow and freezing temperatures to the Great Lakes, Midwest, and Northern Plains. Officials in New York and Pennsylvania declared states of emergency as poor conditions disrupted travel across the region.
