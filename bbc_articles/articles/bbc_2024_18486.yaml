title: 'Graham Thorpe: Former cricketer''s inquest opened and adjourned - BBC News'
date: '2024-08-13'
section: Surrey
url: http://www.bbc.co.uk/news/articles/c628ezd3ev2o
content: |-
  The coroner offers his sincere condolances to the former cricketer's family.

  Mr Thorpe's wife has said her husband suffered from depression and anxiety

  The inquest into the death of former England and Surrey cricketer Graham Thorpe has been opened and adjourned. Mr Thorpe died after being struck by a train on 4 August at a railway station, the brief hearing on Tuesday heard. The 55-year-old took his own life in Esher, Surrey, his wife Amanda Thorpe previously said. The inquest was opened and adjourned at Woking Coroner's Court.

  Coroner Simon Wickens offered sincere condolences to Mr Thorpe’s family and all those who had been touched by his life and career. In an interview with The Times, external, Mrs Thorpe said her husband had been suffering from depression and anxiety over recent years. "Despite having a wife and two daughters whom he loved and who loved him, he did not get better," she said. Mr Thorpe's daughter, Kitty, said the family "are not ashamed" of talking about his death, adding: "There is nothing to hide and it is not a stigma." The family say they are now considering launching a foundation in his name.

  Mr Thorpe played 100 Tests for England between 1993 and 2005, along with 82 one-day internationals. A batter, he scored 6,744 Test runs for England, including 16 centuries, at an average of 44.66. Current England players Ben Stokes, Joe Root and Ben Duckett were among those to pay tribute, while retired England bowler Stuart Broad described him as a "wonderful person". Mr Wickens confirmed an inquest would be held at a later date.

