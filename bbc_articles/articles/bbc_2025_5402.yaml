title: '''I lost trust'' in Gaza film, says BBC director general Tim Davie - BBC News'
date: '2025-03-05'
section: Culture
url: http://www.bbc.co.uk/news/articles/cwynrn0g0lko
content: |-
  The BBC removed the programme after it emerged the 13-year-old narrator was the son of a Hamas official.

  This video can not be played To play this video you need to enable JavaScript in your browser. 'Can we trust this film?': Tim Davie on Gaza documentary row

  The BBC's director general told MPs he decided to pull a documentary from iPlayer about children's lives in Gaza because he "lost trust" in it. The BBC has already apologised over "serious flaws" in the making of Gaza: How to Survive a War Zone, after it emerged its 13-year-old narrator was the son of a Hamas official. Tim Davie said he removed the film while concerns raised about the boy's connections to Hamas - which is proscribed as a terrorist organisation in the UK - were investigated. The independent company behind the film has said it asked if the boy had any Hamas connections but none were disclosed. The BBC has also said the corporation should have done more to uncover the link.
  • None Questions still remain for BBC after damaging Gaza documentary

  Davie said on Tuesday the BBC had received about 500 complaints that the film was biased against Israel and another 1,800 over its removal from iPlayer. Hoyo Films, the independent company that made the documentary for the BBC, has said it is "cooperating fully" with the BBC to "help understand where mistakes have been made". The initial internal review by the BBC found Hoyo had paid a member of the boy's family "a limited sum of money for the narration". Concerns were raised when it aired last month because it centred on a boy called Abdullah - who it later transpired is the son of Hamas's deputy minister of agriculture. "There were specific concerns – specific questions – about the father of the boy. And as we dug into it, we found out we were not told," Davie told the Culture, Media and Sport select committee on Tuesday. "There is a lot of frustration and disappointment. We're very sorry to the audience," he said. Davie continued: "If you're asked a number of times [about the boy's family] and that question was not answered [by Hoyo Films]... that is basics. "And at the end of the day, as editor in chief, I have to be secure, not only editorially where the film was at, but the making of that film. "And at that point, quite quickly, I lost trust in that film and therefore I took decision to take it off iPlayer while we do this deep dive." He said the decision had "nothing to do with one side or the other" in the Israel-Gaza conflict, adding that the corporation did not "bow to lobbies". Davie said Hoyo Films had written to the BBC to say that no money had been given to Hamas but a "forensic analysis" would be taking place into what happened. "As I understand it today, the BBC has only made one payment to the programme maker to make the film," he said. Asked whether the documentary could return to iPlayer following the conclusion of the investigation, the director general said he was not "ruling anything out". He explained that it was a "very difficult decision" and a "very hard situation" for the BBC to find itself in. "There was absolutely legitimate journalism to be done and the voices of those children in Gaza is absolutely something we need to hear - that's what makes it frankly frustrating where we are." He said the broadcaster had a "rich and important current affairs history" in the Middle East and the documentary maker had a "great reputation". "Overall, I am proud of the way we're covering some of these polarised, fiendishly difficult events where many of our journalists, as you know, are under enormous pressure, ferocious lobbying, and it's been extremely difficult," he said.

  The documentary centred on the son of Hamas's deputy minister of agriculture

  Hundreds of media figures signed a letter last week criticising its removal from the BBC's streaming platform. In a letter to the BBC on Monday, Ofcom chairman Lord Grade said the regulator could step in if an internal inquiry into the making of the documentary was not satisfactory. Samir Shah, chairman of the BBC, told the committee it was right the broadcaster was being allowed to "do our job". Describing questions over the Gaza documentary as a "dagger to the heart" of the BBC's reputation as impartial and trustworthy, the chairman added: "We will get to the bottom of it and take the appropriate action." Shah also called for a separate, wider independent review of the broadcaster's coverage of the Middle East. Elsewhere, Channel 4 News admitted the same boy featured in parts of its daily news coverage of the Israel-Gaza conflict, but said his appearances represented a "handful of minutes across hundreds of hours". A range of other topics were also discussed at the committee on Tuesday:
  • None Gregg Wallace - an external review into complaints about the former MasterChef host by the show's production company is expected in "weeks not months"
  • None Huw Edwards - the BBC has not yet been able to recover any salary from the former broadcaster since he left after being convicted of possessing indecent images of children
  • None Licence fee reform - a number of options are being considered to reform how the BBC drives its revenue, but general taxation and advertising and subscription models have been ruled out
  • None Licence fee enforcement - Shah said he found it "troubling" how not paying the fee was a criminal offence, but Davie said "effective enforcement" was needed which could be aided in future by new technology
  • None Role of the BBC - Shah said the case for the BBC was "stronger than ever" - to tackle misinformation and bring the nation together for collective moments
