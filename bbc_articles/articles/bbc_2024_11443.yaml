title: Animal-rights protesters attack portrait of King - BBC News
date: '2024-06-11'
section: UK
url: http://www.bbc.co.uk/news/articles/cydd9ye77rmo
content: |-
  Animal-rights protesters attack a portrait of King Charles III, in a London gallery.

  Posters were stuck to the glass over the King's portrait

  Animal-rights protesters have attacked a portrait of King Charles, in a London art gallery. Two protesters stuck posters on the glass covering the painting. The painting itself was unharmed, said the Philip Mould Gallery, and there were no arrests. The striking red artwork by Jonathan Yeo, unveiled last month, was the first official painting of the King since his coronation.

  The painting was attacked while on display in a London art gallery

  The Animal Rising group said its supporters had stuck posters to the glass protecting the painting, in what they described as a "light-hearted" action. They pasted over the royal portrait with a picture of Wallace, a character from the Wallace and Gromit animations. It was a protest message criticising the welfare standards of RSPCA "assured farm" status, with King Charles a patron of the RSPCA. “With King Charles being such a big fan of Wallace and Gromit, we couldn’t think of a better way to draw his attention," said Daniel Juniper of the campaign group. The gallery, which has been showing the painting to the public for free, said the incident was over quickly and no harm had been done to the artwork. The Metropolitan Police said they had not been called, but in response to footage on social media, officers had visited the gallery to make inquiries. "Staff at the venue were spoken to. They confirmed no damage had been done to either the painting or the glass that covered it," said a Met statement. "The protestors were asked by staff to leave following the incident, which they did. "The gallery did not wish to report a crime and as such there is no further action by police."

  The painting drew much public attention when the King unveiled it in Buckingham Palace last month. Painter Jonathan Yeo had included an image of a butterfly, to symbolise metamorphosis and rebirth and the King's support for environmental causes. The RSPCA said it was "shocked by this vandalism", a distraction from its work helping animals. "We remain confident that our RSPCA Assured scheme is the best way to help farmed animals right now, while campaigning to change their lives in the future," a spokeswoman said.

  Jonathan Yeo showed his painting to the King, last month
