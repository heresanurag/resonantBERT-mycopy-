title: 'Newspaper headlines: US ''lifts ban'' on strikes in Russia and royal ''raid''
  - BBC News'
date: '2024-11-18'
section: The Papers
url: http://www.bbc.co.uk/news/articles/cje0432k5lxo
content: |-
  Monday's papers feature Joe Biden lifting the ban on Ukraine using US arms to strike Russia and a burglary on a royal estate.

  US 'lifts ban' on strikes in Russia and royal 'raid'

  "Biden gives green light for strikes in Russia," says the Daily Telegraph, which leads on the US president's approval, external for Ukraine to fire long-range US missiles over the border. The paper says it could pave the way for Kyiv to use British Storm Shadow weapons inside Russia. The report quotes the shadow defence secretary, James Cartlidge, who welcomes the move. The Financial Times says it is a big shift from Joe Biden, external, months before Donald Trump replaces him in the White House. The president-elect has vowed a swift end to the war in Ukraine but provided no details as to how he would achieve that. The Times reports on the prime minister's planned meeting, external with the Chinese leader, Xi Jinping, at the G20 summit in Brazil today. "Starmer wants to build new rapport with China" reads its headline. The paper highlights Sir Keir's comment that he would hold "serious, pragmatic discussions" with Xi. The Daily Mail says Conservatives have accused the prime minister of "kowtowing", external to Beijing ahead of the meeting. "Anger as Starmer cosies up to China" reads it headline.

  Ukraine has been given the green light by the US to use American arms to hit Russia

  The supply of water to 16 million Thames customers is on a "knife-edge" according to the Guardian, external. It reports that Britain's biggest water company has £23bn of assets in urgent need of repair. The paper says Thames Water has failed to tackle serious safety concerns, including being subject to cyber-security attacks from groups affiliated with Russia, and that its financial situation is worse than previously admitted. A spokesperson for the company says the wellbeing and safety of customers is of the highest priority. Thames Water declined to comment on the reported cyber-attacks but an unnamed source denies the claims. The Daily Telegraph says farmers have warned the government, external that they "have nothing to lose", ahead of a planned protest outside Parliament on Tuesday. They are pushing back against proposals for a 20% levy on inherited agricultural land valued at over £1m. The report says ministers are drawing up contingency plans to keep supermarket shelves stocked if farmers strike. The government has called for calm, insisting most farmers will not be affected. "Labour war on farmers is threat to food security" says the Daily Express, external. The paper quotes the shadow home secretary, Chris Philp, who says the tax changes will be a blow to the entire country.

  Young people who are out of work could have their benefits cut if they do not take up training or apprenticeship offers according to the Times, external. It says hundreds of thousands of 18 to 21-year-olds will be contacted to try to get them back into work, under plans that will be announced this month. The report says the work and pensions secretary, Liz Kendall, will describe a post-Covid rise in economic inactivity as one of the biggest problems facing Britain's finances. The Sun says masked intruders raided a farm on the Windsor Castle estate, external, as the Prince and Princess of Wales, and their children, slept in their home five minutes away. The report quotes an unnamed source saying the two men must have been watching the estate "for a while", before climbing a fence and stealing agricultural equipment from a barn.

