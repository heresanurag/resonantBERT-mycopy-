  Watch as Nerys Bethan Lloyd tells police what happened during a fatal paddleboarding incident.

  This is the moment a paddleboard company owner tells police officers how a group fell into a river while trying to navigate a weir.

  Paul O'Dwyer, Andrea Powell, Morgan Rogers and Nicola Wheatley drowned while paddleboarding in "extremely hazardous conditions" in Haverfordwest, Pembrokeshire, in October 2021.

  Nerys Bethan Lloyd, 39, was jailed for 10 years and six months for gross negligence manslaughter.
