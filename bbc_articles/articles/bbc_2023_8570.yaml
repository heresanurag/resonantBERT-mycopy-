title: Applause, cheers and gunshots as Wagner group leaves captured Russian city
  - BBC News
date: '2023-06-25'
section: General
url: http://www.bbc.co.uk/news/world-europe-66012353
content: |-
  Footage appears to show locals in Rostov-on-Don gathering to show departing fighters their support.

  As Wagner fighters left the military headquarters in the southern Russian city of Rostov-on-Don, locals gathered to show their support to the mercenaries.

  Footage shows people cheering, applauding and saying goodbye to the troops, with some fighters firing into the sky as they left.
