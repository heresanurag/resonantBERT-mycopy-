content: |-
  Saracens centre Alex Lozowski replaces the injured Cadan Murley in the England squad for Saturday's Six Nations match with France at Twickenham.

  Alex Lozowski's last England appearance was against Japan at Twickenham in 2018

  Coverage: Live on BBC Radio 5 Live and BBC Sounds, with live text commentary on the BBC Sport website

  Saracens centre Alex Lozowski has replaced the injured Cadan Murley in the England training squad for Saturday's Six Nations match with France at Twickenham. Harlequins wing Murley, who scored a try on his debut against Ireland on Saturday, missed training on Monday with a foot injury which required a scan. The 25-year-old could return to the England camp later in the tournament. Lozowski, 31, won the last of his five international caps under former head coach Eddie Jones in 2018. He was part of Steve Borthwick's 36-man squad for last year's autumn internationals, but did not feature. Borthwick's side suffered a seventh defeat in nine matches on Saturday, despite leading by five points at the interval, with a dominant second-half display from the hosts securing a 27-22 win.

  France opened their Six Nations campaign in style by thrashing Wales 43-0 in Paris at the weekend. They were led to victory by Olympic gold medal-winning captain Antoine Dupont, who contributed three try assists and will be a key figure for England to keep quiet if they are to bounce back from the loss to Ireland. England senior coach Richard Wigglesworth said Dupont, who missed the 2024 Six Nations to focus on sevens in the run-up to Paris 2024, is the best player he has ever seen. "I think we've run out of ways to describe just how good he is," Wigglesworth told BBC Radio 5 Live's Rugby Union Weekly podcast. "The reason people speak about him in the terms they do, and rightly so, is there is strength, power, vision, skill and there is competitiveness. There is not something where you're going 'this is where I am going to get him'." Asked whether he believes Dupont is the best he has seen, Wigglesworth said: "Yes. I speak to my dad about the legends of the past and I can't compare him to them because I didn't watch them, but for me growing up and all the players I have watched and seen, to do what he is doing now with all the conditioning and professionalism of everyone he's playing against, to consistently do what he does on the biggest stage, I think makes him that."
