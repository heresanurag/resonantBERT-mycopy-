title: Australian swimmers approach sperm whale 'dangerously close' to shore - BBC
  News
date: '2023-12-11'
section: General
url: http://www.bbc.co.uk/news/world-australia-67674932
content: |-
  The sperm whale strayed into shallow waters, which caught the attention of swimmers.

  A video shared online appears to show swimmers at Leighton beach, near Perth in Australia, approaching a sperm whale that is swimming "dangerously close" to the shore.

  In the footage, the whale can be seen straying into shallow waters and attracting the attention of beachgoers, before heading back out to sea.

  Marine biologist Dr Natalie Sinclair told the BBC that the mammal could have been at risk of stranding, and that this kind of behaviour was "unusual and perilous".

  She also warned that people swimming that close risk disorientating the whale, and that the best thing to do in this situation is to "leave the whale alone" and leave any rescue attempts to professionals.

  "The proximity of individuals to the whale poses risk, not only to the animal, but also to the people involved," she added.
