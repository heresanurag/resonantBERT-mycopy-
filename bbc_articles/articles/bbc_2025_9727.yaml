title: Teenagers admit torturing and killing kittens in Ruislip - BBC News
date: '2025-05-20'
section: London
url: http://www.bbc.co.uk/news/articles/cd900lx9ej9o
content: |-
  A boy, 17, and girl, 16, plead guilty to killing the animals found in a field on 3 May.

  The kittens are believed to have been transported in a black duffel bag

  Two teenagers have pleaded guilty to torturing and killing two kittens in Ruislip, west London. A police investigation began when a kitten was found hanging from a tree in a field near Ruislip Golf Club while the other was on the ground nearby on 3 May. The 16-year-old girl and 17-year-old boy appeared at Highbury Corner Magistrates' Court and admitted causing unnecessary suffering to the protected animals by "mutilating and killing" them. They also both admitted one count of possession of a knife at Ruislip Golf Course.

  The court heard the kittens were found with ropes attached to them and had been cut open. The pair, who cannot be named for legal reasons, appeared in the dock flanked by security officers and spoke only to confirm their personal details. The court heard members of the public had seen the teenage boy in possession of an animal carrier and "became concerned" when they later saw him and the 16-year-old girl running from the scene. Knives, blowtorches and scissors were also found at the scene, the hearing was told. After the kittens were found, police appealed for information and released CCTV images of suspects and an image of a black bag believed to have been used to carry the animals. Two other teenagers, a 16-year-old boy and a 15-year-old girl, arrested on Friday on suspicion of animal cruelty, were released without charge, the Metropolitan Police said.

  The defendants were remanded into the care of the local authority with conditions including a 18:00 to 07:00 curfew monitored by police, and to not contact one another. Judge Michael Oliver told the defendants: "As I hope is clear to you, the offences are extremely serious. "I am not ruling out any way of dealing with you." The teenagers will be sentenced at the same court on 23 June.
