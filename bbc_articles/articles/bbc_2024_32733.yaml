title: 'Raygun: the musical cancelled after viral Olympian''s legal threat - BBC News'
date: '2024-12-09'
section: Australia
url: http://www.bbc.co.uk/news/articles/c938l80ekejo
content: |-
  Creator Steph Broadbridge says lawyers for Rachael Gunn sent a cease and desist letter.

  'Raygun: The Musical', was to be a parody about Rachael Gunn's journey to the Olympics

  Australian breaker Rachael Gunn's legal team has stopped a musical parody about her journey to the Paris Olympics from taking to the stage. The show titled 'Raygun: The Musical' was created by Australian comedian Steph Broadbridge, who was also due to feature in the cast. It was due to debut on Saturday at Kinselas in Darlinghurst, Sydney, but Broadbridge was forced to cancel the show after lawyers sent a cease and desist letter, saying that the Olympian owned the dance moves. In a statement to the Guardian, external, Gunn's legal and management team said it was committed to protecting her intellectual property and ensuring that her brand remained strong and respected.

  Gunn's lawyers said comedian Steph Broadbridge was 'not allowed' to do the kangaroo dance

  Some of Gunn's unconventional moves - such as the sprinkler and kangaroo-hop - went viral after her Olympics performance. Now, Gunn's lawyers have reportedly trademarked the poster for the musical and advised Broadbridge that she was "not allowed" to do the kangaroo dance because Gunn "owns" it. "That one did puzzle me - I mean, that's an Olympic-level dance," Broadbridge said in her Instagram video. "How would I possibly be able to do that without any formal breakdancing training?" Broadbridge said on Instagram that she planned for the show to be "back soon" and "with a whole new story arc". Everyone who was due to attend the trial show would be offered a refund for their A$10 ticket, she added. She said: "They [Gunn's legal team] were worried I was damaging her brand, which I would never." Gunn failed to receive a single point from judges at this summer's Olympic games and was subsequently eliminated from the round-robin stage which led to a torrent of abuse online. Despite being defended by officials, her performance divided opinion within the breaking community, with some saying she made a mockery of the scene. Gunn had initially planned to keep competing after the Olympics, but in November said the saga had been so "upsetting" that she changed her mind and had decided to retire.

  She ended her video saying that she intends to change the name of her character to "Raygun with an I" in hopes that "fixes everyone's concerns". In their statement to The Guardian, Gunn's legal team said: "While we have immense respect for the credible work and effort that has gone into the development of the show, we must take necessary steps to safeguard Rachael's creative rights and the integrity of her work. "This action is not intended to diminish the contributions of others, but rather to ensure her brand is properly represented and protected in all future endeavours."
