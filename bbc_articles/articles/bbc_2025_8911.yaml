  While the book largely cites anonymous sources in interviews with more than 200 people, one of the few to be quoted on the record is David Plouffe, who worked on Vice-President Harris's campaign. "We got so screwed by Biden as a party," the book quotes Plouffe as saying. The authors write: "Biden's physical deterioration - most apparent in his halting walk - had become so severe that there were internal discussions about putting the president in a wheelchair, but they couldn't do so until after the election. "Given Biden's age, [his physician Kevin O'Connor] also privately said that if he had another bad fall, a wheelchair might be necessary for what could be a difficult recovery," the book adds. Biden's physical condition had declined so much, the authors said, that aides had sought to ensure he walked shorter distances, used handrails when mounting stairs, and wore trainers more often.

