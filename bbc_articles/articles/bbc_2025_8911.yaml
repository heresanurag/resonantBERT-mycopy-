  Biden's condition during his 2024 presidential campaign was said to be so poor that aides discussed putting him in a wheelchair.

  Biden aide hits back at book alleging cover-up of his 'deterioration'

  Joe Biden's aides have hit back at a new book that accuses a White House inner circle of covering up the former US president's "physical deterioration" during his ill-fated re-election campaign. According to the book, Original Sin, Biden's condition during his 2024 presidential run was said to be so poor that aides discussed putting him in a wheelchair. A spokesperson for Biden, 82, said "evidence of aging is not evidence of mental incapacity" and maintained the Democrat had been "a very effective president". The book, by CNN's Jake Tapper and Alex Thompson of Axios, is due to be released on 20 May.

  Biden abruptly ended his re-election campaign last July shortly after his disastrous debate performance against Donald Trump, a Republican. Party insiders blamed him for exiting the race too late, leaving his replacement, Vice-President Kamala Harris, 107 days to challenge Trump, who swept to victory. Ahead of the book's release, Biden last week gave his first interview since leaving the White House to the BBC, saying: "I don't think it would have mattered" if he had left the race sooner.

