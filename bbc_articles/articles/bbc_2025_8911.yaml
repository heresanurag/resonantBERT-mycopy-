  At the time, Biden aides repeatedly told reporters his altered gait was due to a foot fracture in November 2020 and his subsequent refusal to consistently wear his prescribed surgical boot. In a statement to Axios, an anonymous Biden aide said: "Yes, there were physical changes as he got older, but evidence of aging is not evidence of mental incapacity." The spokesperson added: "We are still waiting for someone, anyone, to point out where Joe Biden had to make a presidential decision or make a presidential address where he was unable to do his job because of mental decline. "In fact, the evidence points to the opposite - he was a very effective president." Tapper and Thompson's book also says that Biden did not recognise George Clooney at a star-studded California campaign fundraiser last June hosted by the Hollywood star. "Thank you for being here," Biden told Clooney at the event, apparently unaware he was speaking to the Academy Award winner. "You know George," an aide reportedly told Biden, as he was struggled to work out Clooney's identity. Not long after the incident, Clooney wrote an opinion piece in the New York Times calling on Biden to quit the race. The actor was one of the first major donors to publicly withdraw his support. The book also alleges that Biden forgot the names of veteran aides, including trusted loyalist Mike Donilon, National Security Adviser Jake Sullivan and White House communications director Kate Bedingfield.
