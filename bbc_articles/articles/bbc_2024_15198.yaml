title: Video shows Trump rally shooter on roof - BBC News
date: '2024-07-14'
section: General
url: http://www.bbc.co.uk/news/videos/c3g6k02k960o
content: |-
  Video footage shows a gunman who opened fire at a rally for Donald Trump in Pennsylvania on a roof.

  The FBI says it is treating the incident as an assassination attempt.

  One bystander was killed in the shooting and two others were critically injured, police said.

  This video has been removed for rights reasons.
