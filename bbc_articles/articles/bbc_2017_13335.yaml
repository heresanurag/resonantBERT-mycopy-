title: 'Laura Plummer''s sister: Drug crime ''was a kind gesture'' - BBC News'
date: '2017-12-27'
section: General
url: http://www.bbc.co.uk/news/uk-42487536
content: |-
  The sister of jailed Briton Laura Plummer tells the BBC her crime was born out of kindness.

  A British woman convicted of smuggling 300 painkiller tablets into Egypt is "on the verge of a mental breakdown", her sister has told the BBC.

  Laura Plummer, who was found with Tramadol tablets in her suitcase, has been sentenced to three years in prison.

  Jayne Sinclair says Laura was trying to help her Egyptian boyfriend who was in pain after an accident.
