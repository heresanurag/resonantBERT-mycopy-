  But Labour MP Jonathan Ashworth says "I do not want to see British-made weapons used" in an offensive on the city of Rafah.

  Is this the start of a major offensive in Ukraine?

  David Cameron is next asked about Ukraine, after recent attacks on Kharkiv and Russian advances in the city. Heavy fighting has continued in the border area following Russia's surprise incursions on Friday. "Does this look to you like the start of a very serious, major summer offensive?" Laura asks. Cameron replies saying that it is "another invasion by Putin into Ukraine crossing over into their border". "Is it another invasion, this is what you are saying?" Laura asks. "Certainly," Cameron answers briefly. "There is no doubt what it is, which is another part of the invasion. It sums up the importance of making sure that the support from allies gets through to Ukraine," he says, emphasising the the importance of the support for Ukraine.
