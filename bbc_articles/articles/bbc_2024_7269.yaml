title: OJ Simpson died after 'battle' with cancer, family says - BBC News
date: '2024-04-11'
section: US & Canada
url: http://www.bbc.co.uk/news/live/world-us-canada-68792277
content: |-
  In a statement, his family says Simpson was "surrounded by his children and grandchildren" when he died on Wednesday.

  We are now closing our live coverage on the death of OJ Simpson from cancer at the age of 76.

  The news was announced on his official Twitter/ X account by his family, who said Simpson "succumbed to his battle with cancer" on 10 April and was "surrounded by his children and grandchildren."

  They also asked for "privacy and grace".

  You can read more about OJ Simpson's life and controversies here.

