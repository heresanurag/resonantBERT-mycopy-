title: Real Madrid security staff charged with assault after final - BBC News
date: '2024-06-04'
section: London
url: http://www.bbc.co.uk/news/articles/cy99d9njy1vo
content: |-
  The defendant is due in court later in June, charged with common assault over the alleged attack.

  A Real Madrid staff member has been charged with common assault following the Champions League final at Wembley.

  One of the Spanish football club's security staff has been accused of attacking a steward after the team’s win against Borussia Dortmund on Saturday.

  Spanish citizen Maria Hernandez, 52, is due at Willesden Magistrates’ Court on 18 June.

  In total, the Met Police made 56 arrests around the final, most of which were for attempts to breach security.
