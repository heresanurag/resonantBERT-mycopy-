title: 'Islington shooting: Man in 20s shot dead - BBC News'
date: '2020-07-05'
section: London
url: http://www.bbc.co.uk/news/uk-england-london-53290555
content: |-
  The man in his 20s died at the scene in Islington after being found with gunshot wounds, police say.

  The victim was pronounced dead at the scene by emergency teams

  A man in his 20s has been shot dead in north London.

  Emergency services were called to Roman Way in Islington at 15:20 BST and found the man with gunshot wounds.

  He was pronounced dead at the scene, close to Pentonville Prison, shortly afterwards, the Met Police said.

  The man's next of kin have been informed but no-one has been arrested. Officers have cordoned off the Westbourne Estate area as they investigate.

  The force said it was too early to say whether the shooting was linked to the prison, which is one of the country's oldest and busiest jails and houses a men's prison and a young offender institution.

  A witness said he heard a number of shots, ran to his window and saw "a guy on a bike or moped rode off".

  The man was shot dead close to a children's playground

  "When I looked to the park, I could see a guy stagger then fall," he added.

  "That was it, then police came."

  The witness, who wanted to remain anonymous, added: "There's always crime around here, the shooting is shocking, but not much of a surprise.

  "It's not nice though, especially near the local park."

  Islington South and Finsbury MP Emily Thornberry said: "My thoughts are with the victim's family and friends and local residents in whose midst this terrible event occurred."

