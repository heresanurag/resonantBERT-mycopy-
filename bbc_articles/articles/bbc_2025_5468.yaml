title: Man in Florida swallows stolen Tiffany earrings before police arrest him -
  BBC News
date: '2025-03-06'
section: US & Canada
url: http://www.bbc.co.uk/news/articles/cg5dz556jl6o
content: |-
  The man allegedly swallowed two pairs of earrings worth $769,500 (£597,000) hoping to avoid being charged with theft.

  An alleged thief in Florida swallowed stolen earrings worth more than half a million dollars moments before police took him into custody last week. Orlando police have accused the man, 32-year-old Jaythan Gilder, of lying to Tiffany & Co. employees in a Florida store by telling them he represented "a professional athlete", which led employees to show him "several high-value pieces". Mr Gilder then allegedly stole the earrings and ran out of the store. When officers caught up with him later that day, they saw Mr Gilder "swallowing several objects believed to be the stolen earrings," police said.

  Mr Gilder allegedly attempted to steal two pairs of earrings worth $769,500 (£597,000), as well as a diamond ring that he supposedly dropped as he fled the store. Police later released an x-ray that appeared to show an individual's abdomen with a foreign object inside. When asked by the BBC, Orlando Police did not say whether they had retrieved the jewellery. Police also said Mr Gilder has stolen from Tiffany & Co before, robbing a Texas store in 2022. There are 48 separate warrants out for his arrest in nearby Colorado, as well. Police charged Mr Gilder with robbery with a mask and grand theft in the first degree, involving stolen goods valued at more than $100,000. He is presumed innocent until proven guilty in court.
