title: 'Watch: Swans make heart shape during courtship dance - BBC News'
date: '2024-03-24'
section: General
url: http://www.bbc.co.uk/news/uk-england-nottinghamshire-68640686
content: |-
  The "romantic" ritual happens when a pair of swans establish a territory, a wildlife trust says.

  A walker has captured the "romantic" moment a pair of swans performed a courtship ritual at a country park.

  Kevin Hutson filmed the birds at Clumber Park in Nottinghamshire as they lifted their wings and bowed to each other.

  A spokesperson for Nottinghamshire Wildlife Trust said the swans "make this wonderful heart shape with their head and necks as part of a courtship ritual".

  "It's that time of the year when the pair will have established a territory and are strengthening their bond," they said.

