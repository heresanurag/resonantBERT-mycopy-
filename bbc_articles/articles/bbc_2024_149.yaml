  Luke Littler has been selected for Premier League Darts following his fairytale run to the final of the PDC World Championship. Only eight players contest the 16-week series and the 16-year-old, who was beaten 7-4 by Luke Humphries in Wednesday's final, has been included. World number one Humphries is also involved and will make his debut in the competition. The tournament begins in Cardiff on 1 February.

  Littler, who will be 17 when the event begins, will be the youngest player ever to compete in the Premier League. Defending Premier League champion Michael van Gerwen and runner-up Gerwyn Price return, while Michael Smith, Peter Wright and Rob Cross make it six current or former world champions in the eight. Nathan Aspinall, the World Matchplay champion in 2023, completes the line-up. "It's unbelievable. No more development tour. This is it. Playing in the Premier League and comfortably in the (world's top) 32," Littler told Sky Sports News. "As soon as I came off the stage, did the media and saw the family, my manager pulled me aside and said 'Do you want to do it?' I said, 'Let's do it, it might not happen again'. "I'll probably have to take a break maybe from a few ProTours but I knew what was coming as soon as I said yes to the Premier League. "This is just going to be an incredible experience." The competition comprises of 16 mini tournaments in as many weeks in different European cities. Each week will begin with four quarter-finals in a knockout-style tournament leading to a winner of the night being crowned. Matches will be the best-of-11 legs with the winner earning five points, the runner-up three points and two points apiece for the losing semi-finalists. The top four players in the table at the end of week 16 qualify for the play-off at London's O2 Arena on 23 May, where they will face off in a best-of-19 legs semi-final before a best-of-21 legs final to determine the Premier League champion.

