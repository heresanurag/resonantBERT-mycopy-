title: European Commission announces ‘fair’ post-Brexit trade deal - BBC News
date: '2020-12-24'
section: General
url: http://www.bbc.co.uk/news/uk-55437428
content: |-
  The President of the European Commission announces the end of negotiations between the UK and EU.

  Negotiations between the UK and the EU have come to an end with both sides reaching an agreed deal.

  “It is fair, it is a balanced deal and it is the right and responsible thing to do for both sides,” President of the European Commission Ursula von der Leyen said of the deal.

  UK MPs now have until the 31 December to approve its details.
