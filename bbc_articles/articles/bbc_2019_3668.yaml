title: 'Mike Thalassitis: Love Island star dies aged 26 - BBC News'
date: '2019-03-16'
section: Essex
url: http://www.bbc.co.uk/news/uk-england-essex-47597561
content: |-
  The reality TV star and former footballer has been called "an absolute gent" who died "too young".

  Love Island star Mike Thalassitis has died aged 26, his management has confirmed.

  The reality television star and former footballer was reportedly found dead in London on Friday.

  He found fame on the 2017 series of the ITV show.

  Several reality TV stars posted tributes to Thalassitis. The Only Way Is Essex star Ferne McCann wrote: "So so so so sad. Mike you absolute gent. I have no words."

