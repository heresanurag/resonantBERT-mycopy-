  A federal judge has blocked Elon Musk's Department of Government Efficiency (Doge) from accessing the personal financial data of millions of Americans in Treasury Department records, according to court documents. US District Judge Paul A. Engelmayer issued a preliminary injunction on Saturday to prohibit access, ordering Musk and his team to immediately destroy any copies of records. The move comes after 19 state attorneys general sued the Trump administration after Doge, a cost-cutting initiative led by Musk, was given access to the records. They argued access for Musk, a "special government employee", and Doge, which is not an official government department, violated federal law.

  In a post on X, Musk called the ruling "absolutely insane". "How on Earth are we supposed to stop fraud and waste of taxpayer money without looking at how money is spent?" he wrote. The Democratic state attorneys general sued Trump, the Treasury Department and Treasury Secretary Scott Bessent on Friday. Engelmayer's order, issued early on Saturday, said the states would "face irreparable" harm without immediate relief. "That is both because of the risk that the new policy presents of the disclosure of sensitive and confidential information and the heightened risk that the systems in question will be more vulnerable than before to hacking," the order read. The order restrains the defendants from granting access to Treasury Department records containing personally identifiable or confidential information to special government employees, political appointees, and other employees from outside the department. The injunction restricts anyone else from accessing those records other than civil servants who need to do so for their work at the Bureau of Fiscal Services and have passed background checks. The judge further ordered any person among those restricted to immediately destroy copies of records. The conditions will remain in place until the next court hearing on 14 February. New York Attorney General Letitia James, who was among the coalition of attorneys general who brought the lawsuit, said the Trump administration had given Musk and Doge "unprecedented access" to personal data. "Over the past week, my office has heard from more than a thousand New Yorkers who were afraid they would lose their privacy and the critical funding their communities count on because of Musk and DOGE's interference," she said. Tech titan and billionaire Musk has been heavily involved in upheaval during Trump's second term, with Doge leading major cuts at the US Agency for International Development (USAID), which distributes billions of dollars of aid globally.

