title: Man treated for consuming 'unknown substance' - BBC News
date: '2020-01-05'
section: Manchester
url: http://www.bbc.co.uk/news/uk-england-manchester-50992849
content: |-
  Officers in hazardous material suits are deployed after the man is found in Manchester.

  Images on social media show officers wearing hazardous material suits near the property

  Officers in hazardous material suits have been deployed in Manchester after a man reportedly consumed a poisonous substance.

  The man was found at a property in Moor Lane, Northern Moor, before 09:00 GMT. It is thought he had consumed poisonous seeds.

  "A man, aged in his 20s, is being treated at the scene and remains in a stable condition," police said.

  The spokesman added: "There is no wider threat to the community."

  Images on social media show officers wearing hazardous material suits near the property.

  Motorists have been advised to avoid the area as Moor Lane is closed for investigations.

