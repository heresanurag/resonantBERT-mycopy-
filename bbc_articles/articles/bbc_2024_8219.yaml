title: 'Hyson Green: Burglar barges into vulnerable man''s home - BBC News'
date: '2024-04-19'
section: General
url: http://www.bbc.co.uk/news/uk-england-nottinghamshire-68322095
content: |-
  The offender pushed his way into the 76-year-old victim's home when he answered the door.

  Footage has been released showing the moment a burglar barged his way into the home of a vulnerable man.

  The offender pushed his way into the 76-year-old victim's home in Vincent Gardens, Hyson Green, Nottingham, when he answered the door.

  He was then shoved into the living room, causing him to fall to the floor, before he was hit in the head with an unknown object, police said.

  The burglar took the man's wallet, which contained cash and bank cards, before running out of the property.

  The victim suffered a lump to his head and an injury to his finger in the attack at 16:35 GMT on Monday.

  Det Insp Chris Berryman, of Nottinghamshire Police said: "This was a particularly nasty attack on a vulnerable victim in his own home which left him with injuries. His 96-year-old mother was also in the property at the time."

  Police have appealed for anyone with information to come forward.

