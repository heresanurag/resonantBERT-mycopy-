  Norwegian athletics coach Gjert Ingebrigtsen tells a court he "loves" his children and was just an "overly protective" father as he denies abuse allegations.

  Ingebrigtsen's father just 'overly protective' as he denies abuse

  Jakob Ingebrigtsen was present to hear his father Gjert give evidence

  Norwegian athletics coach Gjert Ingebrigtsen told a court on Monday he "loves" his children and was just an "overly protective" father as he denied abuse allegations. Ingebrigtsen, 59, is on trial in Norway accused of physically and mentally abusing his 24-year-old son Jakob and another of his children. Double Olympic champion Jakob said when giving evidence last week that his father "manipulated" and "controlled" him throughout his upbringing and detailed a series of alleged incidents. Gjert addressed the court at the criminal case in Sandnes in his own defence. He said he had tried to shield all seven of his children, two more of whom also became successful athletes. "I became a father very early, with an enormous need to protect. I became what one might call overly protective," Gjert was quoted as saying in court by Norwegian state broadcaster NRK. "Highlighting relevant incidents in relation to the charges may make it seem like I am being portrayed negatively towards my children. But I love my children immensely." Gjert Ingebrigtsen told the court the ambition of some of his children had been "absolutely extreme" when they started to participate in sports. "I never heard 'could you please', but rather entirely different demands and expectations," Gjert said. "The demands from the children were about district level, national level, European level, and world level. Later, 'Dad' became 'Gjert', and 'Gjert' became 'the accused'." It was alleged in court last week that Gjert struck Jakob several times after he received a negative report about his behaviour from school when he was aged eight. Jakob also said that in 2008, when he was about the same age, his father hit him in the face because he was late for a race. He described another incident a year later when he alleged Gjert kicked him in the stomach after he fell off a scooter. Jakob also alleged his father threatened him in 2016, and another episode around the same time when Gjert was said to have thrown his games console out of the window.

  Jakob and his brothers Filip, 31, and Henrik, 34, who are also Olympic athletes, made public claims in October 2023 that their father - who was their coach until 2022 - had been violent. The trio, who are among seven Ingebrigtsen children, wrote at the time that they "still feel discomfort and fear" about Gjert, who they accused of being "very aggressive and controlling". Gjert said at the time via his lawyer that the statement was "baseless" and he "never used violence against his children". Gjert was charged with one offence in April 2024 - but five cases were dropped on the strength of evidence and one other because of time constraints. A further charge was later added to the case. In addition to his two Olympic titles, Jakob Ingebrigtsen is a two-time 5,000m world champion, two-time outdoor world 1500m silver medallist, and 16-time European champion. He recently won two world indoor titles, taking gold in the 3,000m and 1500m in Nanjing, China.
