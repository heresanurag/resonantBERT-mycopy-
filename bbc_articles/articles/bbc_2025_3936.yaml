  Both McLaren drivers spun at the penultimate corner. Norris was able to rejoin and dive into the pits for intermediate tyres, but Piastri was stuck on the grass. There was a degree of black comedy as he sat on the grass, his tyres spinning furiously, before finally managing to reverse back on to the track. Verstappen stayed out and took the lead for two laps, but as the rain intensified, he eventually had to admit defeat and stop. This was when Ferrari made their fateful error, leaving Hamilton and Leclerc out, to assume first and second places, only to immediately lose them as they scrabbled for grip for a lap and had to pit anyway. Liam Lawson then crashed his Red Bull, a disappointing end to a difficult first race for the senior team, and Gabriel Bortoleto blotted an otherwise strong start to his career for Sauber, and the safety car was deployed again. When the race restarted with five laps to go, Norris initially made a third consecutive excellent restart and built a lead over Verstappen.

  But when he ran a little wide at Turn Six, he allowed Verstappen to close within a second and gain the use of the DRS overtaking aid, giving Norris a nervous final couple of laps. But he held on calmly as Russell followed Verstappen over the line to take the final podium position. Lance Stroll made up for Alonso's error to take sixth for Aston Martin, ahead of Sauber's Nico Hulkenberg, Leclerc, Piastri and Hamilton.

  Australian Jack Doohan, who made his F1 debut in the final race of 2024 in Abu Dhabi, crashed on the opening lap

  There is no rest for the teams or drivers with the Chinese Grand Prix coming up next weekend. It's a sprint event too with the shorter race at 03:00 GMT on Saturday and the main grand prix at 07:00 Sunday, 23 March.
