title: Leigh Pateman admits murdering girlfriend he set on fire - BBC News
date: '2024-11-08'
section: England
url: http://www.bbc.co.uk/news/articles/c245zd2g086o
content: |-
  Leigh Pateman admits murdering Ellen Marshall who died two years after he attacked her in her home.

  Leigh Pateman is currently serving a prison term of 17 years and 10 months for the attack on his girlfriend

  A man who poured petrol on his girlfriend and set her on fire has pleaded guilty to murder after she died nearly two years on from the attack. Leigh Pateman, 45, doused Ellen Marshall as she sat in a chair at her home in Skegness, Lincolnshire, before setting her alight during an argument on 22 April 2021. She suffered 80% burns, mainly to the top half of her body, and died of her injuries on 11 March 2023. Pateman was jailed for 17 years and 10 months in March 2022 after admitting grievous bodily harm with intent. At Lincoln Crown Court on Friday, he pleaded guilty to murder and is due to be sentenced on 2 December.

  The murder charge was brought against Pateman, previously of Firbeck Avenue, Skegness, following Ms Marshall's death in Nottingham City Hospital. Pateman appeared in court via a video link from HMP Garth where he is currently serving his sentence.

  Ellen Marshall was given less than a 50% chance of survival despite undergoing 12 hours of surgery, the court heard

  Judge Simon Hirst told him: "You know the only sentence I can pass upon you is one of life imprisonment. "What I need to decide is the minimum term you will have to serve before you can appear before a parole board." During his previous sentencing hearing, the court was told how Pateman, who had fled the scene on his bike, was found at his mother's house, where he had gone to bed, covered in soot. He was arrested and treated for burns before being taken into police custody. Ms Marshall, who was 42 at the time and originally from Nottingham, was discovered by firefighters lying on the floor of her home in "extreme pain" and still conscious. Despite 12 hours of surgery she was given less than a 50% chance of survival. Judge Hirst, passing sentence in 2022, told Pateman: "It is difficult to think of a crueller crime than setting someone alight. "Her injuries are irreversible and she will never be able to return to her former life."

