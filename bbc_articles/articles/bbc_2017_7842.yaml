title: '''Impressive'' Perseid meteor shower seen over UK - BBC News'
date: '2017-08-13'
section: UK
url: http://www.bbc.co.uk/news/uk-40909057
content: |-
  A display of hundreds of shooting stars has been captured by stargazers from across the UK.

  Meteors captured above the Jill Windmill in West Sussex early on Sunday

  The Perseid meteor shower has been seen over parts of the UK, giving stargazers the opportunity to spot scores of shooting stars in the sky.

  The shower was due to peak in the UK on Saturday night, in a display also visible in other parts of the world.

  Stargazers took to social media to say they had seen the display, in which 100 meteors had been expected an hour.

  The Perseid meteor shower occurs every July and August as the Earth passes debris from the Swift-Tuttle comet.

  BBC News website reader Keith Trueman captured the meteor shower against the background of the Milky Way on Exmoor

  Bob Girling witnessed this impressive sight above Chilton, Oxfordshire, at around 23:20 BST

  Michiko Smith took a series of photos, including this one, from her back garden in Normanton, West Yorkshire

  Relatively clear skies above Ide, near Exeter, gave Alan Saunders a chance to photograph the meteor shower from his house

  Darren Felgate said this was taken from his back garden near the cricket ground in Scarborough

  A Perseid meteor passing through the constellation of Ursa Major was photographed by Brian Gibson from his back garden in Milngavie, Glasgow at 23:03 BST

  Former England cricketer Paul Collingwood was among those who attempted to spot the meteors.

  He tweeted that the shower had been "impressive".

