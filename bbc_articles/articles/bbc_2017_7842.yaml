  A Perseid meteor appears over Beachy Head in Eastbourne in this shot by reader John-Paul Brophy

  Mike Driscoll photographed this view of a meteor passing through The Plough over his house in Ashurst, Hampshire

  John Cooper witnessed this Perseid meteor from his back garden in Leicestershire at about 02:00 BST on Sunday.

