  The health secretary warned that "things will get worse before they get better" as he set out new measures.

  No more money to be put on the table, Burnham says he was told

  The Greater Manchester mayor Andy Burnham concludes his comments by revealing that government ministers suggested there is "no money left" for the kind of financial package the local leaders say is necessary before their areas are put into the highest tier of coronavirus restrictions. Burnham, who spoke to health ministers earlier today, said he had been told "there is no money to put on the table". He added: "To be honest with you, I don't believe that for one second. When I look today at some of the fees they are paying to consultants working on the failed test and trace scheme, when I look at the billions that is being thrown at a scheme that isn't working for Greater Manchester, money that has been found for other things this year. "The argument I am making is... support people right now when they need it because by supporting people now you will save jobs and businesses that will be able to restart the minute we find a vaccine, the minute the recovery is on."
