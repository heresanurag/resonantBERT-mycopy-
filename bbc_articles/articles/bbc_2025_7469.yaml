title: Liverpool 'tourist tax' of £2 to be charged for overnight stays - BBC News
date: '2025-04-25'
section: Liverpool
url: http://www.bbc.co.uk/news/articles/cvgq4v1rln0o
content: |-
  Liverpool hoteliers back plans for overnight visitors to the city to be charged a £2 fee from June.

  Hoteliers voted to approve the £2 overnight charge for staying in Liverpool

  People staying overnight in Liverpool will have to pay a "tourist tax" after hoteliers voted in favour of plans to introduce one. A ballot by Accommodation BID, which represents 83 hotels in the city, found that the majority of those who voted supported the idea of a £2 City Visitor Charge. Accommodation BID, which also represents serviced apartment providers in Liverpool, thinks the levy will raise £9.2m over two years, of which £6.7m will go towards supporting the city's visitor economy. Liverpool BID Company, which manages Accommodation BID, said the levy would "turbo charge" the city's tourism and visitor economy when it comes into force in June.

  The charge will be managed and administered by hotels and serviced accommodation providers, either when guests check in or at the end of their stay. Money raised under the scheme will be administered by Accommodation BID. Liverpool BID Company includes two business improvement districts in the city centre and represents more than 800 businesses in Liverpool. For an overnight visitor charge to be implemented in England, a clear and transparent business plan must be provided for how the money raised will be spent. Of the 83 hotels in Liverpool balloted about the visitor charge, 59% were in favour, on a turnout of 53%.

  Marcus Magee, chair of Liverpool's Accommodation BID, said the ballot was a "major step" in enabling the city's hospitality sector to have a say and an influence on decisions about the visitor economy. This, he said, was "crucial to the vibrancy and economy of the city". Bill Addy, chief executive of Liverpool BID Company, said the £2 levy would help Liverpool attract bigger events which, in turn, would bring more visitors and money to the city. "We have always said the industry should have their say on whether they want this levy to come in, as they are administering it," he said. "The evidence of other European cities suggests this model will translate overnight stays into major investment, so that we can convert that into world-leading and world-beating events." In April 2023, Manchester became the first city in the UK to introduce a "tourist tax". The City Visitor Charge - a £1 per room, per night fee - raised about £2.8m in its first year.

  Joao Pedro Benedetti said a £2 charge per night was "fair"

  Visitors to Liverpool who spoke to BBC Radio Merseyside said the £2-per-night levy would not put them off. Joao Pedro Benedetti, from Brazil, is on a day trip to Liverpool from Manchester, where he is staying for three nights. He said he thought the charge was not "abusive", and "only small". "I think it is only fair," he said.

  Jack and Tash think the £2 overnight charge is reasonable

  Tash and Jack from Newcastle are staying in Liverpool for the weekend. They said the £2 would not deter them from returning. "It's just that little bit extra and so many places are bringing in a tourism tax now. "It is just becoming the norm."

  Maria Fantin is visiting her son Lorenzo Cotrozzi in Liverpool

  Maria Fantin is from Italy and is visiting her son Lorenzo Cotrozzi, who lives in Liverpool. She said she was used to paying €2 a night elswhere and "it wouldn't put me off" from staying in Liverpool. "Most of the stuff here is free which is really cool," she said. "Abroad you have to pay a lot of money to get into the museum or the art gallery so I think why not?"

