  Holden, the Tory MP for Basildon and Billericay, branded the increase as "just another tax on motorists" for drivers who had "no other option" but to use the crossing. "I do not understand how that is possibly justifiable at the moment, and if the minster wants to try and justify that they should have the backbone to do it on the floor of the House of Commons where they can be questioned on it," he said. McMurdock, the MP for South Basildon and East Thurrock, said: "The toll was supposed to be removed once the costs of building the bridge had been repaid. What a joke. "How will making it more expensive to cross the Thames deliver the growth [that government] promised, and our nation desperately needs?" Jim Dickson, the Labour MP for Dartford, said the price rise was "unwelcome" but said he was glad ministers had "listened to me" by ensuring Dartford residents would still receive a "significant discount" for their annual passes. "It's important that we don't see big price rises in the near future, and I'll keep fighting to make sure local people are treated fairly," he continued. This week, it was announced that the Treasury would give £590m to the Lower Thames Crossing - a new tunnel under the estuary - which would link Tilbury in Essex and Gravesend in Kent. National Highways hopes the new road will reduce traffic at the Dartford Crossing by 20%.

  The cost of using the Dartford Crossing will increase from September.

