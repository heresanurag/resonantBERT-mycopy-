title: Dartford Crossing charge to increase to £3.50 as of September - BBC News
date: '2025-06-17'
section: England
url: http://www.bbc.co.uk/news/articles/cedg1z2dz8zo
content: |-
  Transport Minister Lilian Greenwood says the charge is "no longer sufficient" to manage demand.

  The charges first came into force to use the crossing, which connects Essex and Kent, in 2003

  The standard charge for car drivers using the Dartford Crossing will rise from £2.50 to £3.50 in September. The crossing links the M25 in Essex and Kent. Transport Minister Lilian Greenwood, in a statement to Parliament, said the road was used by as many as 180,000 vehicles each day and the current charge was "no longer sufficient" to manage demand. Jen Craft, the MP for nearby Thurrock, said she was "disappointed" and would write to her Labour colleague Greenwood to ask her to "reconsider".

  Conservative Richard Holden described the government announcement as "underhanded" and fellow Essex MP James McMurdock, of Reform UK, said it was typical of "rip-off Britain".

  As of 1 September, cars will be required to pay £3.50 to use the crossing

  Greenwood said there would be "significant" discounts for people living locally, external and that car drivers with pre-pay accounts would pay £2.80 for each crossing. People driving buses, coaches, vans and other goods vehicles with two axles would pay up to £4.20 under the changes. Vehicles with more than two axles will be charged up to £8.40. The fees were last increased in 2014. Greenwood said the new charges were "significantly lower" than if they had increased in line with inflation since 2014. "I am aware that these necessary changes to the charges will be unwelcome news for users of the crossing," she said. "These traffic levels are well in excess of the crossing's design capacity, causing delays for drivers."

  Under the original construction scheme for the Queen Elizabeth II Bridge (which opened in 1991), tolls were meant to stop when the private finance initiative contract with Dartford River Crossing Limited ended in 2003. However, the Transport Act 2000, external had introduced charging schemes for all trunk roads, bridges and tunnels that spanned more than 600m (1,969ft), which allowed the Highways Agency to continue to charge a crossing fee. Labour MP Craft said she regularly used the crossing herself. "I will be writing to the roads minister to ask if there's any scope to reconsider it, also asking if there's any scope for retaining some of the money that's raised to fund local public transport," she said. However, she said she could see the "logic" behind increasing the fees.
