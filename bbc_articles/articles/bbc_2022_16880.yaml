content: |-
  The prince's godmother resigned after repeatedly asking a black British charity boss where she was "really" from.

  As we report on the Prince and Princess of Wales's visit to Boston in the US, the racism row involving a member of the Royal Household has provoked much reaction in the UK.

  Across the BBC, we've been hearing the reaction of some black British people to the incident, as well as their own experiences of being asked the question: "Where are you from?"

  Quote Message: As a black woman born and living in the UK - a melting pot of different cultures - I find this question a loaded one, one that seeks to put me in a box: where am I in relation to you? A judgement based on the colour of my skin when my very identity is made up of so many things. I am not a single narrative, I am not a stereotype and until we share a diversity of stories, dangerous assumptions will persist. from Amanda Mukwashi Author As a black woman born and living in the UK - a melting pot of different cultures - I find this question a loaded one, one that seeks to put me in a box: where am I in relation to you? A judgement based on the colour of my skin when my very identity is made up of so many things. I am not a single narrative, I am not a stereotype and until we share a diversity of stories, dangerous assumptions will persist.

  Quote Message: “I don’t think that there is a person of colour who hasn’t had those experiences.... It’s wearying, it’s exhausting, but one sort of lives with it, and the time has come for us not to have to live with it any longer. from Margaret Casely-Hayford Board member of Coop, chair of Shakespeare's Globe, and lawyer “I don’t think that there is a person of colour who hasn’t had those experiences.... It’s wearying, it’s exhausting, but one sort of lives with it, and the time has come for us not to have to live with it any longer. Board member of Coop, chair of Shakespeare's Globe, and lawyer

  Quote Message: I've had similar experiences... maybe not necessarily the consistency of the line of inquiry - I don’t think I’ve ever had that type of experience - but certainly people have asked me, 'Where are you from?' or 'Where are you really from?' But having said that, to be honest, you just learn to move on with these things. from Samuel Kasumu Former advisor to former Prime Minister Boris Johnson I've had similar experiences... maybe not necessarily the consistency of the line of inquiry - I don’t think I’ve ever had that type of experience - but certainly people have asked me, 'Where are you from?' or 'Where are you really from?' But having said that, to be honest, you just learn to move on with these things. Former advisor to former Prime Minister Boris Johnson

  Quote Message: These types of experiences are commonplace across every facet of society, and it’s something that people of colour have to learn to navigate and understand and deal with as a normal part of our existence in British society... It’s not just in these particular elite spaces if you will... but in the workplace, walking down the road, shopping, just general living. from Prof Nicola Rollock Author and Professor of Social Policy and Race at King's College London These types of experiences are commonplace across every facet of society, and it’s something that people of colour have to learn to navigate and understand and deal with as a normal part of our existence in British society... It’s not just in these particular elite spaces if you will... but in the workplace, walking down the road, shopping, just general living. Author and Professor of Social Policy and Race at King's College London
