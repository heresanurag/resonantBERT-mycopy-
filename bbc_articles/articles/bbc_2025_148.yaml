  Charlotte Chilton from Warwickshire was on the second series of The Traitors as a "faithful".

  Ex-Traitors player: 'Beware those who talk too much'

  Charlotte Chilton was "a faithful" in the second series of The Traitors, which aired in 2024

  A contestant from last year's series of The Traitors has revealed her tips on how to spot potential "traitors" as the third series kicked off with some major plot twists. In the hit BBC reality TV show those contestants chosen as traitors must secretly "murder" their fellow players, called the "faithfuls", who aim to detect and "banish" them from the game before becoming their next victim. Charlotte Chilton from Warwickshire was a faithful on the second series of the show. It was won by traitor Harry Clark, who took home more than £95,000 in prize money. Her tips include questioning "anyone who talks too much" and she also warned against assuming a fellow contestant was too nice to be a traitor.

  Speaking to the BBC, Ms Chilton said: "Harry, I never thought was capable of being a traitor. But actually when you watch it back, you think, of course he was. "If I went into it now, no matter how lovely and brilliant you are, I wouldn't believe it." Reflecting on her time in the show, Ms Chilton said: "You go in there with a little bit of innocence and you don't quite understand it's all to play for." She said in hindsight "nothing is off limits".

  Ms Chilton said she had "loved" watching the first episode of the new series. "I really enjoyed it because I didn't know what was happening this time, so it's just got that extra element of excitement this year for me," she said. The former contestant also said she had enjoyed two twists to the show's format that were revealed in Wednesday night's episode, adding it was "cut-throat". "The one thing I would say is watching it I feel so much more sympathy for every person in it now, because it's really really difficult," she said. "I've watched an hour of what was probably filmed over two days and actually there would have been a lot more conversations going on."

  The third series of the hit show debuted on BBC One on New Year's Day

  Ms Chilton also said a lot of the new contestants had reached out to her and fellow players from the second series ahead of their turn at the game, and she was excited that new people were "joining the Traitors family". "We all get together when we can, we try and meet [up]," she said of her relationship with her former contestants, with Charlie Bees staying with Ms Chilton over the New Year period. While viewers will get to know this year's players over the course of the series, Ms Chilton said people would not be able to guess what moves the contestants would go on to make. "[The show is] built on taking normal people and putting them in this really stressful situation and seeing what they do," she said. "You've just got to see it unfold."

