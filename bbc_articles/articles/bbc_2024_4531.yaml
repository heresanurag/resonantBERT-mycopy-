id: bbc_2024_4531
title: Tornadoes and funnel clouds hit Ohio, Indiana and Kentucky - BBC News
date: '2024-03-15'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-68577700
content: |-
  A storm system struck Indiana, Kentucky and Ohio, where multiple warnings were issued.

  Severe weather has left a trail of destruction across parts of the US, with tornadoes and funnel clouds reported in several states.

  The BBC's US partner CBS News reported that at least three people had died as a consequence of the extreme weather.

  Multiple homes were damaged, with residents also dealing with knocked down trees and power lines.
