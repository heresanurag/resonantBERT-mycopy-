  Nicola Sturgeon acknowledges technical problems on the first day the vast majority of pupils in Scotland begin the new term at home.

  Douglas Ross: 'All of Scottish football should not be affected by the actions of one club'

  Scottish Conservatives leader Douglas Ross tells viewers he thinks politics should be put aside and the UK and Scottish governments should work together to get the vaccinations out as quickly as possible. He is reluctant, as an assistant referee, to comment on the Celtic Dubai situation, but he does say that people have to look at the message it sends out. He points out that for many people at home alone at the moment, football is something they look forward to and "we don't want to see the whole of Scottish football affected by the actions of one club". He adds that financial support should be made available to clubs in the Scottish lower leagues & Scottish Cup who have had their games suspended for three weeks.
