title: 'Salford deaths: Tributes after bodies of girl, 8, and woman found - BBC News'
date: '2024-09-24'
section: Manchester
url: http://www.bbc.co.uk/news/articles/cn0e51p015lo
content: |-
  Flowers and a teddy bear are left outside a house at which two bodies were discovered on Monday.

  A teddy bear and floral tributes have been left for the eight-year-old girl

  A woman found dead at home with an eight-year-old girl was a "loving and devoted mother", a neighbour has said. Emergency services were called to South Radford Street, Salford, at 10:30 BST on Monday to find a 40-year-old woman and child dead. They have not been formally identified by Greater Manchester Police (GMP) but a neighbour said they were a mother and daughter who lived alone at the address. GMP said it was not looking for anyone else in connection with the deaths.

  The neighbour said the mother was named Martina and the daughter Elani, but did not know their surname. She said the mother was half-Polish and half-Italian and had lived at the address for around two years. The mother is believed to have been a full-time carer for disabled Elani. The neighbour said: "All I could say was she was a loving and devoted mother to the little girl. "Elani was severely disabled and hugely dependant on her mum. "She had a walking frame and she would walk with her mum up and down the street outside their house."

  A police car guards the scene where the woman and child were found dead

  Flowers and tributes have been left outside the family home since police made the discovery. A teddy bear was left outside the end-of-terrace house, along with a card which read: "Rest in Paradise". GMP said "all known next of kin" had been informed and were being supported by specialist officers. Det Supt Simon Moyles said: "We are working hard as a team to establish what happened here. "While we are not actively looking for anyone else in relation to this investigation, I understand the news of their deaths and the large police and emergency services presence at the address will most likely cause some concern. "I want to reassure them that we believe this to be an isolated incident with no wider threat in the community." A cordon was still in place earlier, with police continuing to patrol the area. A Salford City Council spokesman said: "We are aware of the terribly sad news and our thoughts and prayers go out to the family and friends of those who have tragically lost their lives. "We’re working closely with Greater Manchester Police and assisting them with their ongoing investigation. "Our teams will be supporting both local residents and council staff who have no doubt been greatly affected."
