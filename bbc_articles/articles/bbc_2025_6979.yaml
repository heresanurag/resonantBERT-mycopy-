title: 'Chris Mason: Jitters, uncertainty and hope as UK awaits Trump tariff decision
  - BBC News'
date: '2025-04-02'
section: US & Canada
url: http://www.bbc.co.uk/news/articles/c1dr5wqdddgo
content: |-
  Talks are continuing between London and Washington at quite an intensity, our political editor writes.

  I detect a reasonable sprinkle of the jitters in government as the world waits for US President Donald Trump's tariffs announcement later. It is the single most globally consequential day so far of the president's second term. Foreign Secretary David Lammy said the UK must "prepare for the worst" and that there is every expectation in Whitehall that the president's moment at around 21:00 UK time, in the Rose Garden of the White House, will be noisy, theatrical and provocative. But there is also a hope that what we hear later can amount to a "ceiling", as it was put to me, from which the US can be negotiated down.

  This video can not be played To play this video you need to enable JavaScript in your browser. Watch: What we do and don’t know about Trump’s ‘Liberation Day’ tariffs

  Talks are ongoing, at quite an intensity by all accounts, between London and Washington on a narrow trade deal, talked up enthusiastically by Donald Trump when the prime minister met him at the White House in February. Those on the UK side feel they are making progress and that any agreement could not only ease the impact of tariffs but improve trading relations in particular sectors, such as technology. The big challenge is for how long it is sustainable politically to maintain a strategy that amounts to 'We are not going to shout our mouths off about the president, instead we will be publicly civil and privately carry on talking', once you've been whacked with tariffs anyway and before you land a trade deal.
