  I approached a couple with four young children, their parents fairly bursting with joy. "It's an indescribable feeling. We are so happy," said the man. "After all the years of dictatorship we have lived in our lives! We were in prison in 2014 and now we're out thank God. We won because of our men, our fighters, and now we are at the moment that we are going to build the greatest Syria!" "We call our sisters and brothers who left the country to come back," he added. "Our hearts and homes are open for you." The whereabouts of Assad were a mystery until Russian reports said he'd turned up in Moscow. We made our way to his Damascus residence - now a tourist attraction, stripped bare of anything valuable, of anything at all. We saw people carrying out furniture, with no one trying to stop them. The rebels may have brought freedom, but not security.

  'It's an indescribable feeling,' one man told the BBC

  Looters had also been breaking into other buildings nearby – deepening anxiety about this in-between-time without a government in charge. "The transition has to happen in a proper and correct way," said Alaa Dadouch, a 36-year-old father of three standing outside with his neighbours. "And the fact that he just left, you know..." "Yes, you see I'm still scared to even mention this," he said. "But the fact that he just left, that is selfish. Our president should have taken the proper measures that are needed for him to give at least the army or the police control over those areas until a new presidency comes in." He paused. "You know, two days back, I wasn't able to say that he's selfish, it would have been a big problem. A lot of everything is different. "You can actually breathe, you can walk around. You can actually give your opinion. You can say what bothers you without being scared. So, yes, there is a change. I hope it's a good change. But we've been living under false hope for 13 years [of civil war]." This country is caught between joy and fear, hoping for peace and worried about chaos.

  How have you been personally affected by the recent events in Syria? Tell us your story.
