title: Man charged with 64 offences in Hull Legacy funeral home inquiry - BBC News
date: '2025-04-03'
section: Hull & East Yorkshire
url: http://www.bbc.co.uk/news/articles/cd6jv4yxvgwo
content: |-
  The charges follow an inquiry into a Hull funeral directors in which police removed human remains.

  Robert Bush ran Legacy Independent Funeral Directors in Hull where 35 bodies and a quantity of ashes were removed by police in March 2024

  A man has been charged with 64 offences after a major investigation into a funeral directors in Hull in which police removed 35 bodies and a quantity of ashes. Humberside Police began its inquiry into Legacy Independent Funeral Directors after a report of "concern for care of the deceased" in March last year. Robert Bush, 47, formerly of Kirk Ella, East Yorkshire, is charged with 30 counts of preventing a lawful and decent burial, 30 counts of fraud by false representation, two counts of theft from charities, one count of fraud and another of fraudulent trading. He has been released on bail and is due to appear at Hull Magistrates' Court on 25 June.

  The company's premises on Hessle Road in Hull was searched following a report of "concern for care of the deceased"

  A 55-year-old woman, who was arrested in July 2024 on suspicion of money laundering offences, has been released with "no further action to be taken", the force said. At a press conference earlier, Deputy Chief Constable Dave Marshall said there were 254 victims in total, of which 172 had been affected by fraudulent trading of funeral plans between 23 May 2012 and 6 March 2024. He said the charges against Mr Bush included 30 counts of preventing a lawful and decent burial and 30 counts of fraud by false representation in relation to the deceased recovered from the funeral premises between 20 April 2023 and 6 March 2024. The fraud charge related to human ashes between 1 August 2017 and 6 March last year involving 50 victims, he added. Families have been updated of the development in the case and police have made initial contact with additional victims.

  Some of those affected by the investigation placed flowers at the company's premises following the police press conference on Wednesday

  Mr Marshall thanked those affected for their "patience and understanding". "They have always been the priority and at the very heart of the entire investigation and this will remain, and we would please ask their privacy is continued to be respected," he added. He said the 10-month police investigation had been "complex, protracted and highly sensitive", culminating in a file of evidence being submitted to the Crown Prosecution Service on 16 January, which had led to the charges being brought. Some of those affected by the inquiry placed flowers at the company's premises on Hessle Road following the police press conference on Wednesday. In a statement, members of the Hull 35 support group praised the force and said they were "grateful for the work and dedication" shown by officers. They said they had "found solace in monthly vigils" that had been held since the investigation began and the group would continue "to help others needing support for the foreseeable future".

  Deputy Chief Constable Dave Marshall (centre) said the police investigation had been "complex, protracted and highly sensitive"

  A month after the inquiry began, Humberside Police said more than 2,000 calls had been received on a dedicated phone line with "a significant number... understandably concerned about the identification of the ashes of their loved ones". The force confirmed it was impossible to identify any of the human ashes using DNA profiles which, Mr Marshall had said, would be "devastating news for families and loved ones". A dedicated helpline for anyone affected is available. Listen to highlights from Hull and East Yorkshire on BBC Sounds, watch the latest episode of Look North or tell us about a story you think we should be covering here, external.
