  How much attention did you pay to what has been going on in the world over the past seven days?

  This week saw Donald Trump unveil plans for a "Golden Dome" missile defence system over the US, the UK government do a U-turn on its controversial winter fuel payment policy, and comedy fans say goodbye to Cheers actor George Wendt. But how much attention did you pay to what else happened in the world?

  Fancy testing your memory? Try last week's quiz, or have a go at something from the archives.
