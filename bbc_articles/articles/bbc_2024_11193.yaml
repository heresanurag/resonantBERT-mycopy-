  According to the Financial Times Weekend, external, the investment firm Baillie Gifford is in "crisis talks" with British literary festivals it supports after the end of its sponsorship deals with two flagship events recently. Earlier this week, the Edinburgh International Book Festival ended its 20-year funding partnership with Baillie Gifford after pressure from climate change protesters. The move follows a similar decision by the Hay festival last week. The paper quotes a source with close links to the asset manager as saying the firm was "not throwing in the towel on supporting culture". All four members of ABBA reuniting to receive Sweden's equivalent of a knighthood features in most of the papers. Agnetha Faltskog, Bjorn Ulvaeus, Benny Andersson and Anni-Frid Lyngstad were recognised for their contributions to Swedish and international "music life" during a ceremony at the Royal Palace in Stockholm. The Guardian, external, The Express and The Mirror all make the same comment: "Thank you for the music."
