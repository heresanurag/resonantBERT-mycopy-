  Watch: PM Starmer apologises to Grenfell families

  The Grenfell Tower fire that killed 72 people was the result of "dishonest" companies, successive governments, and a lack of strategy by the fire service, a report concludes.

  Speaking after the report's publication, PM Sir Keir Starmer pledged that the government would work to prevent similar tragedies occurring in the future and issues an apology to Grenfell victims.

  Prosecutors say they will decide on possible charges by the end of next year.
