title: Footage shows underwater robot salvaging Titan sub - BBC News
date: '2024-09-23'
section: General
url: http://www.bbc.co.uk/news/videos/cn0ej44zkjqo
content: |-
  The June 2023 video was released by the US Coast Guard as it conducts hearings to investigate what led to the tragedy.

  Footage of the Titan submersible's salvage has been released by the US Coast Guard's Marine Board of Investigation (MBI).

  A remotely operated vehicle captured the footage on 26 June 2023, but the video was shown 23 September 2024 during a hearing investigating what led to the submersible imploding.

  The wreckage was recovered and transported to a secure facility for further analysis as part of the ongoing investigation.
