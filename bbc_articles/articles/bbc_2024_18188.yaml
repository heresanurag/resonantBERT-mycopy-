title: Middlesbrough woman jailed for pushing burning bin at police - BBC News
date: '2024-08-10'
section: Tees
url: http://www.bbc.co.uk/news/articles/c5y3gqvey04o
content: |-
  Stacey Vint will spend 20 months in prison for her part in the Middlesbrough riots.

  Stacey Vint was seen throwing a burning wheelie bin at police during the riot in Middlesbrough

  A woman who pushed a burning wheelie bin into a row of police officers during the Middlesbrough riots has been sentenced to 20 months in prison. Stacey Vint, 34, from Middlesbrough, headed towards officers before tripping over and falling to the ground at their feet, Teesside Crown Court heard. She appeared in court for sentencing alongside 21-year-old Charlie Bullock, of Middlesbrough, who was handed an 18-month sentence for violent disorder. The court heard he was one of the "main instigators" of a large group who were throwing rocks and stones at police officers on Sunday afternoon.

  The prosecution said the pair joined a "planned peaceful protest" on Middlesbrough’s Linthorpe Road, with about 1,000 people taking part. Chants of "take our country back" were soon heard and the protest quickly turned violent. Missiles, bricks and stones were thrown, windows were smashed and properties were damaged.

  Chief Constable Mark Webster said he had never seen such hatred aimed at police officers

  Vint previously pleaded guilty to unlawful violence and being in possession of cannabis. A video clip, which had been shared widely on social media, was played to the court. It showed Vint, of Normanby Road, pushing a burning bin at police officers, before falling over in front of them. In her defence, the court heard Vint was under the influence of alcohol and had agreed to give another man - who was pushing the bin into the police - a hand. The court heard she had no racist views and was not anti-police.

  Prosecutor Rachel Masters said a police officer had seen Bullock wearing a balaclava and throwing rocks and stones at police officers. He was described as "one of the main instigators". In his defence, the court was told Bullock was "completely ashamed of his behaviour" and did not hold "racist or far-right views".

  In a statement, Cleveland Police's Chief Constable Mark Webster said he had never seen "such hatred shown towards police officers", as deliberate attempts were made to injure them. Eight officers were injured during the Middlesbrough riots and almost £100,000 of damage was caused to police vehicles.
