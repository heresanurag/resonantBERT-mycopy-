  When Alani and Hamouda first started out, they employed one person to fulfil around six to seven orders a day. But since growing in popularity, primarily thanks to TikTok, their business now employs 50 people, who fulfil 500 orders a day. One big talking point has been the price of the product, which is £15 per bar. "It's all handmade, every single design is done by hand," Alani says. "We use premium ingredients and the process is not like making other bars - you've got the baking, moulding the chocolate to the design and with the filling itself, even the pistachios are hand-picked and processed". Speaking to Arabian Business last year,, external Hamouda said: "My mother used to make Knafeh, and that's something I wanted to capture my own way. "Knafeh was the first flavour we perfected. The crunch, the pistachio, it had to be just right," she added. Despite the product's success, Alani says "it's been a tough journey" as the pair have been working together full time while also raising their two children. "There's been times where we've wanted to give up, but we said to ourselves 'we'll keep going as long as we can pay the rent' and now we have no regrets as its worked out".
