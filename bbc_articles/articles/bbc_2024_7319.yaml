title: 'WSL: BBC Sport signs extended TV rights deal for 2024-25 season - BBC Sport'
date: '2024-04-11'
section: General
url: http://www.bbc.co.uk/sport/football/68787600
content: |-
  BBC Sport will show up to 22 Women's Super League matches across all platforms in the 2024-25 season.

  Last updated on .From the section Women's Football

  BBC Sport has agreed a one-year rights extension with the Women's Super League to show 22 live matches in the 2024-25 season.

  The deal, which is the first since a ground-breaking three-year contract in 2021, begins in September.

  All matches will be shown on BBC iPlayer, with a minimum of 18 live games across BBC One and BBC Two.

  Philip Bernie, interim director of BBC Sport, said women's football had reached "unprecedented heights".

  "We are pleased that BBC Sport will continue to showcase the great excitement of our domestic league by extending our partnerships with the Women's Super League," said Bernie.

  Alongside live matchday coverage, regular highlights will continue on The Women's Football Show and across the BBC Sport Website and app, with goals and clips available on BBC Sport's social channels.

  BBC Radio 5 Live commentary will be available on selected games, and the Women's Football Weekly podcast offers expert analysis and news from Ben Haines and former England striker Ellen White.
