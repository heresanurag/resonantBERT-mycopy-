id: bbc_2022_7415
title: Britons wary of impending rail strikes - BBC News
date: '2022-06-22'
section: General
url: http://www.bbc.co.uk/news/uk-61862548
content: |-
  Rail users are braced for days of disruption across England, Scotland and Wales ahead of the biggest rail strike in 30 years.

  There are planned walkouts on most major lines on Tuesday, Thursday and Saturday but disruption is also expected on non-strike days due to too few staff working.
