title: 'Swansea: Man pleads guilty to murdering wife in car fire - BBC News'
date: '2023-12-08'
section: Wales
url: http://www.bbc.co.uk/news/uk-wales-67659586
content: |-
  David Clarke, 80, killed his wife Helen near Swansea's Singleton Hospital in September.

  Helen Clarke was found with significant burns and a head injury

  An 80-year-old man has pleaded guilty to murdering his 77-year-old wife in a car fire.

  Helen Clarke died two days after emergency services were called to the blaze on Sketty Lane, Swansea, on Friday 24 September.

  David Clarke, of Higher Lane, Langland, Swansea, appeared at Swansea Crown Court via video link and spoke only to confirm his name and enter his plea.

  He will be sentenced on 9 February.

  David Clarke, 80, has admitted killing his wife in a car fire in Swansea

  Ms Clarke was found in a critical condition, with significant burns as well as a head injury, South Wales Police previously said.

  The force launched an investigation, with detectives working alongside other specialists.
