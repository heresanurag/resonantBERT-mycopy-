title: Bridge collapses amid severe flooding in US midwest - BBC News
date: '2024-08-01'
section: General
url: http://www.bbc.co.uk/news/videos/cv22gej431do
content: |-
  A railroad bridge between South Dakota and Iowa collapses after heavy rains.

  A railroad bridge between South Dakota and Iowa has collapsed due to severe flooding, illustrating the extensive impact of the recent heavy rains across the Midwest. This collapse adds to the growing infrastructure damage and challenges faced by the region. South Dakota Governor Kristi Noem said the collapse of the bridge is a crucial link for transporting commodities and will have significant repercussions for many months. One person has died in South Dakota and hundreds of homes have been destroyed in Iowa during flooding in the upper US Midwest.
