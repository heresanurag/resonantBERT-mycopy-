title: San Diego Zoo pandas make official debut - BBC News
date: '2024-07-21'
section: General
url: http://www.bbc.co.uk/news/videos/czq6yg537p7o
content: |-
  Yun Chuan and Xin Bao are the first pandas to enter the US in 21 years.

  Since arriving in June, the pandas have been acclimating to their new home and are expected to be seen by the public on August 8.
