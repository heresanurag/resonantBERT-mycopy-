title: Liz Truss leaves stage in Beccles as 'lettuce' banner unfurls - BBC News
date: '2024-08-14'
section: Suffolk
url: http://www.bbc.co.uk/news/articles/cdrlx5yxr60o
content: |-
  The former prime minister brings a speech to an abrupt end when the banner - which also reads "I crashed the economy" - appears.

  This video can not be played To play this video you need to enable JavaScript in your browser. The former prime minister was giving her support to Donald Trump when the banner slowly appeared

  Liz Truss walked off stage at a public event after a banner showing a picture of a lettuce and the words "I crashed the economy" was unfurled above her. The former prime minister was on stage at Beccles Public Hall, Suffolk, when the banner appeared. A video posted on X, external showed the speech being stopped and Ms Truss saying "that's not funny" before walking off stage. The activism group Led By Donkeys claimed responsibility for the stunt, while Suffolk Police said a man had been arrested and released without charge.

  "Liz Truss is on a pro-Trump speaking tour. So we dropped a strategically-positioned remote-controlled lettuce banner," the group posted on social media. Ms Truss responded to the prank on X, external, claiming it was done to "intimidate people and suppress free speech".

  Ms Truss was speaking in Beccles on Tuesday evening to promote her new book. In the footage, she stops speaking when her attention is drawn to the banner behind her. She is then heard to ask "what's that?", while the host said: "I have no idea where that has come from." As she left the stage, laughter could be heard from some members of the audience, while others clapped. A spokesperson for Suffolk Police said: "A 50-year-old man was arrested on suspicion of burglary with intent to commit damage following an event at Beccles Public Hall and Theatre and was taken to Great Yarmouth Police Investigation Centre for questioning. "He has since been released without charge and will face no further action."

  In July, Ms Truss attended the Republican National Convention in Wisconsin

  Ben Stewart, co-founder of Led By Donkeys, who attended the event on Tuesday, said: "This is all about Liz Truss aligning herself with Trump and the far right in America." "Sometimes, not always, but sometimes, one of the best approaches to the far right is to laugh at them."

  Before the event, a spokesperson for Beccles Public Hall had urged people to “remain civil”. An advert posted on Facebook last week, external said: "We recognise that people have differing opinions on politics. "We would however encourage any dialogue to remain civil."

  Almost 20,000 people tuned in to the webcam to congratulate the lettuce

  In 2022, during Ms Truss' 49 days as prime minister, the Daily Star newspaper created a live web-cam feed to test whether her term in office would outlast a 60p iceberg lettuce, external. It was in response to her mini-Budget, which included £45bn of unfunded tax cuts and triggered economic turmoil. Ms Truss lost the South West Norfolk seat, which she had held for the Conservatives since 2010, in July's general election. "What Led By Donkeys did is the best thing I've ever seen happen at Beccles Public Hall," said Paul Williams, 54, a businessman in Beccles. "I've seen increases in my mortgage payments and I'm sure everyone else has because of her mini budget. "I fully back [Led By Donkeys] and I actually support them."

  Leanne Howes, 43, visiting Beccles from nearby Lowestoft, defended Ms Truss' right to freedom of expression. "I'm not a fan of Liz Truss but I think anyone who is on stage and expressing what they want to do have freedom of speech. "We are entitled to say what we want... Everyone has the right to express how they feel, even if we don't agree with it," she added.

