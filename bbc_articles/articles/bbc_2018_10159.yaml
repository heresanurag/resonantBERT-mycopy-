id: bbc_2018_10159
title: Bologna tanker truck explosion leaves two dead - BBC News
date: '2018-08-06'
section: General
url: http://www.bbc.co.uk/news/world-europe-45089705
content: |-
  Two trucks collided on a motorway in northern Italy, causing a fire that killed at least two people.

  Two trucks have collided on a motorway bridge in northern Italy, causing an explosion and a fire that killed at least two people.

  The blast, which engulfed the area with flames and black smoke, caused the bridge to partially collapse.
