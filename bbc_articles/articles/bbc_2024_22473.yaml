title: 'Belleek: Man dies following hit-and-run accident and one charged - BBC News'
date: '2024-09-19'
section: Northern Ireland
url: http://www.bbc.co.uk/news/articles/c1539xkvjzlo
content: |-
  A 70-year-old man has died following a hit-and-run on the Boa Island Road on Thursday afternoon.

  The Boa Island Road was closed after the incident but it has since reopened

  A 70-year-old man has been charged after a man died following a hit-and-run in Belleek, County Fermanagh, on Thursday. Richard Maze, 70, who was riding a motorbike, died at the scene. Police received a report of the accident on the Boa Island Road at around 14:55 BST on Thursday. Police said Mr Maze's motorbike collided with a dark-coloured car which failed to stop on Thursday afternoon.

  The man who has been charged was arrested on suspicion of causing death by dangerous driving on Thursday. He has since been charged with causing death by dangerous driving, failing to remain where accident occurred causing injury, failing to report an accident whereby injury was caused and failing to stop where accident occurred causing injury. He is due to appear at Enniskillen Magistrates' Court on 14 October. The Boa Island Road was closed following the incident but it has since reopened. Police have asked for anyone with information to get in touch.
