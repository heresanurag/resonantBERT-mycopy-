content: |-
  The woman, aged in her 50s, was taken to hospital after a car fire in County Londonderry.

  Police were called to the scene at Quarry Road, Knockloughrim, at 05:40 BST on Tuesday

  A murder investigation is under way after a woman was found in a burning car in Knockloughrim, County Londonderry.

  Police were called to a house at Quarry Road after a car was reported on fire at 05:40 BST on Tuesday.

  The woman, who was in her 50s, died in hospital on Tuesday evening.

  A 59-year-old man has been arrested on suspicion of murder. He was also taken to hospital for treatment for burn injuries.

  DUP assembly member for the area Keith Buchanan said Knockloughrim was a "very, very small idyllic place and this sort of thing does not happen.

  "So there's a severe sense of shock in that small rural place - everybody knows everybody else."

  Sinn Féin MLA Emma Sheerin urged anyone with information to contact the police.
