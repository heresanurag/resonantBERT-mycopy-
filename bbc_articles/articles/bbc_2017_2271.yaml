title: Skydivers compete in Wind Games 2017 - BBC News
date: '2017-02-04'
section: General
url: http://www.bbc.co.uk/news/world-europe-38863714
content: |-
  The invention of wind tunnels has given skydivers a new way to hone skills that usually require jumping from a plane.

  Competitors have been taking part in the Wind Games 2017.

  More than 80 teams and 200 flyers from around the world met in Spain for the event.
