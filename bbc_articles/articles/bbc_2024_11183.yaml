  Bruhat Soma correctly spelled words like ‘caixinha’ and ‘sciniph’ to take home the $50,000 prize.

  Bruhat Soma correctly spelled words like "caixinha" and "sciniph" to win the 2024 Scripps National Spelling Bee and take home the $50,000 prize.

  The 12-year-old beat finalist Faizan Zaki by nine words, in a rapid elimination round that saw him correctly spelling 29 words in 90 seconds.

  The Scripps media group has sponsored the event since 1925.
