title: Paddleboard firm owner Nerys Lloyd was sacked as PC for fraud claim - BBC News
date: '2025-05-01'
section: Wales
url: http://www.bbc.co.uk/news/articles/cr4n9592ee1o
content: |-
  Four people died in a river accident, with Lloyd jailed after admitting responsibility.

  Nerys Lloyd was sacked by the police in 2022

  A paddleboard firm boss jailed after four people died in a river accident was sacked from the police over a fraudulent insurance claim. Nerys Lloyd, 39, from Aberavon, was jailed at Swansea Crown Court on 23 April for 10 years and six months after the tragedy on the River Cleddau in October 2021. Now the case has finished, South Wales Police has published details of a misconduct hearing for the former officer. It reveals she was sacked in 2022 after claiming more than £500 from a car insurance scheme when the actual cost of repairs was around £20.

  Lloyd's company Salty Dog had organised the excursion in which Paul O'Dwyer, Andrea Powell, Morgan Rogers and Nicola Wheatley drowned at a weir in Haverfordwest, Pembrokeshire. Now the criminal case has concluded, the south Wales force has released previously unpublished details of an unrelated misconduct investigation into an insurance fraud. In his findings, the Chief Constable Jeremy Vaughan describes how Lloyd, who had served as a firearms officer, had made a fraudulent claim against the South Wales Police Federation motor insurance scheme. The actual cost of a repair to her car was "in the region of £16 to £20" but she had claimed £577.55. The report said that when the matter came to light, Lloyd had admitted her wrongdoing and immediately apologised for her behaviour. The claim was reported to South Wales Police. Lloyd was interviewed under caution on 11 October 2021, two weeks before the tragedy on the river. She made a full admission to the fraudulent claim and said she had made a "massive error of judgement". On 19 October 2021, she attended Ystrad Mynach Police Station, Caerphilly county, and accepted a formal caution for the criminal offence of fraud by false representation under the Fraud Act 2006.

  Nicola Wheatley, Morgan Rogers, Paul O'Dwyer and Andrea Powell died after paddleboarding in 2021

  At the misconduct hearing in January 2022, the chief constable found the allegations of breaches of professional standards were proved for honesty and integrity, bringing discredit on the police service and undermining the confidence of the public. Mr Vaughan said it was entirely unacceptable for police officers, who are responsible for enforcing the law, to break the law themselves. He concluded that she should be dismissed without notice. During the sentencing hearing last week it was disclosed that Lloyd had been suspended by South Wales Police when the tragedy happened. However, the judge Mrs Justice Mary Stacey said the prior caution for fraud would not have any bearing on her sentencing decision.
