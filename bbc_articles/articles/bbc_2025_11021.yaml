  Postecoglou has previously said he does not know whether he will remain Spurs head coach beyond the end of the season, with multiple reports that his position is uncertain. Tottenham released a video of Postecoglou's dressing room speech after the Bodo/Glimt victory, where he addressed his players. "I've been in this game a long time, I've experienced it all, I'm so proud of how all of you have all stuck together," he said. "Not one time have I felt people are not believing, or have lost what we have in here. Outstanding. People will never realise what's its taken for you guys to be in this position. "You deserve all the credit for that. Unbelievable what you've done. The things we've had to deal with. Everyone has contributed. Yeah we've had problems for sure, but we've stuck together." "You can make it something really special. This is the group of players that is going to do it."

