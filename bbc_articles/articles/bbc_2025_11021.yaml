  Postecoglou's comments about winning a trophy in his second season looked like they might come back to haunt him at times, but he is now just one game away from delivering the goods. "Be careful what you dream for," former Spurs midfielder Glenn Hoddle told TNT Sports. "He has come out and said it and his players have come out and responded. He's saying 'I always win something in my second season' and he believes it, the players are believing it and now the fans are believing it. Anything can happen." Former Tottenham goalkeeper Paul Robison, part of the BBC 's commentary team in Norway, believes winning the Europa League is more important to Postecoglou than it is to Manchester United boss Ruben Amorim. "If Tottenham don't win he won't be in charge next season," Robinson said. "Ange Postecoglou's whole season and Tottenham career depends on that one result. You cannot underestimate how big that game is for Tottenham to win the final. "Champions League football, yes, and the finances that come with it, but not having to go through a whole restructure. If they don't win that final they are back to square one. It's massive for Tottenham."
