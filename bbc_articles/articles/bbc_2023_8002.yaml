  From Bucks Fizz to Sandie Shaw, what do Liverpool children think about previous champions?

  The UK has won Eurovision five times, so what do children think about these past performances?

  To reflect on the UK’s previous success, kids from the Liverpool Philharmonic Melody Makers choir give their honest reviews.
