  \ for the content of external sites.\n\nRyanair would not comment on its bookings\
  \ but a spokesman said \"all affected customers are being contacted and advised\
  \ of their options of a full refund, a free transfer on to the next available flight\
  \ or a free transfer on to an alternative routing\".\n\nHe added: \"We apologise\
  \ to all customers affected by these disruptions, which are entirely beyond our\
