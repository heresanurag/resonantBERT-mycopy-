  \nThe problems occurred as thunderstorms and torrential rain swept across the UK\
  \ overnight during the Bank Holiday weekend and at the start of school half-term.\n\
  \nBBC Look East reporter Richard Daniel said Ryanair had announced at the airport\
  \ that all its flights are fully booked for the next two days, meaning passengers\
  \ whose flights have been cancelled would not be able to re-book during that period.\n\
  \nPassengers have been advised to check with their airlines for up to date flight\
  \ information\n\nFlights at Stansted have been \"diverted, delayed or cancelled\"\
  \ after a fuelling system was damaged\n\nPassenger Steve Childs told the BBC his\
  \ Ryanair flight to Madrid had been due to take off at 08:25 BST.\n\nMr Childs,\
  \ who is travelling with his wife and daughter, said he has had to get information\
  \ from social media.\n\n\"There have been no announcements,\" he said.\n\n\"Flights\
  \ which were due to leave at 06:00 still haven't left.\n\n\"We are in the middle\
  \ of the departure hall. Fortunately we have seats, but there are lots of people\
  \ without.\"\n\nPassengers whose flights have been cancelled are waiting to see\
  \ if they can re-book\n\nHundreds of passengers have been stranded at the airport\n\
  \nRob Liddell, who was due to fly out on a family holiday to Rome for three days,\
  \ said communication had not been great.\n\nHe found out his flight had been cancelled\
  \ via a phone app, despite the departure board saying it had only been delayed.\n\
  \nMr Liddell said that after \"standing in a queue of several hundred people waiting\
  \ to attempt to re-book our flights,\" Ryanair had \"announced all flights are fully\
  \ booked for next two days, so that's us heading home\".\n\nHe said people at the\
  \ airport were \"pretty calm\" and \"resigned to the fact this has happened\".\n\
  \nHe added there were thousands of people in the departure lounge and \"lots of\
  \ young families in corridors\".\n\nApril Peake, from Oxford, said her Ryanair flight\
  \ to Lisbon was due to take off at 09:45.\n\n\"It is so hot in the departures lounge,\"\
  \ she said. \"I feel like I've made it to Portugal. But I haven't.\"\n\nShe said\
  \ people were \"bored\" and frustrated\".\n\n\"Flights keep disappearing from the\
  \ information boards, and there are very quiet announcements listing the flight\
  \ numbers of all the cancelled flights,\" she added.\n\n\"The lounge was thick with\
  \ people a little while ago, but it seems to be thinning out a little bit now.\"\
  \n\nThe best way to get news on the go \n\nFrustrated passengers have been venting\
  \ their thoughts on social media.\n\nTwitter user Tracey Mitchell said her niece\
  \ and nephew's flight had been cancelled, meaning they were \"no longer going on\
  \ their cruise\".\n\nThis Twitter post cannot be displayed in your browser. Please\
