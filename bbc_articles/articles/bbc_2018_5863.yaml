title: Lightning strike causes Stansted Airport disruption - BBC News
date: '2018-05-27'
section: Essex
url: http://www.bbc.co.uk/news/uk-england-essex-44270666
content: "Flights are cancelled or delayed after its aircraft fuelling system was\
  \ damaged by a thunderstorm.\n\nThis video can not be played To play this video\
  \ you need to enable JavaScript in your browser. Passengers at the airport found\
  \ the delays 'irritating'\n\nHundreds of passengers are stranded at Stansted Airport\
  \ after lightning strikes damaged aircraft fuelling systems, grounding flights.\n\
  \nFlights have been cancelled or delayed and some are being diverted away from landing.\n\
  \nThe airport said its aircraft fuelling system was \"unavailable\" for a period\
  \ earlier due to a lightning strike.\n\nA spokeswoman said engineers had since restored\
  \ the system but \"flights may be diverted, delayed or cancelled\".\n\n\"We apologise\
  \ for the inconvenience and advise all passengers to check with their airlines for\
  \ their latest flight updates,\" she said.\n\nPassengers have described being stuck\
  \ on planes for hours waiting to take off, while others are waiting in an already\
  \ crowded departure lounge for information.\n\nThis Twitter post cannot be displayed\
  \ in your browser. Please enable Javascript or try a different browser. View original\
