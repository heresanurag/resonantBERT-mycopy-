title: 'World Cup: Ryan Reynolds urges Wales to harness Dracula''s spirit - BBC News'
date: '2022-11-21'
section: General
url: http://www.bbc.co.uk/news/uk-wales-63698038
content: |-
  Wrexham co-owner Ryan Reynolds sent the words of support to Wales at the World Cup.

  Hollywood star and Wrexham co-owner Ryan Reynolds has wished Wales luck at the World Cup with the message: "Drink the blood of your enemies, boys."

  Business partner Rob McElhenney urged them to beat England and Iran but to lose or draw with the United States.

  Cardiff-born actor Matthew Rhys said Wales was already "incredibly proud" of what the team had achieved.

  And Total Eclipse of the Heart singer Bonnie Tyler said: "All the very, very best for the World Cup!"
