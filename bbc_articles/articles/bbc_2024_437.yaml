content: |-
  Charmian Abrahams's family say they are devastated she died "so suddenly and tragically".

  A woman who was run over and killed in Birmingham was the former Crossroads actress Charmian Abrahams, it has emerged.

  The 96-year-old was hit by a delivery van in Harborne on Monday.

  She was best known for playing Mavis Hooper in the ATV/Central drama, set in a fictional village near Birmingham.

  During her career, she worked with acting legends including Sir Noël Coward, Albert Finney and Sir Ian McKellen.

  Her family have paid tribute to her in a statement released by West Midlands Police.

  "Charmian was a much-loved aunt and great-aunt and a dear friend to many. At 96 she was still full of life and energy and fiercely independent," they said.

  "We are devastated that her life has been brought to an end so suddenly and tragically, but we will treasure our memories of her zest for life and the many good times we shared with her."

  West Midlands Police said its serious collision investigation unit was looking into the crash, which happened on Lordswood Road at about 11:40 GMT.

  The force is appealing for any further witnesses or anyone with dashcam footage to come forward.

