id: bbc_2024_5744
title: Witness video shows escape from Moscow attack - BBC News
date: '2024-03-25'
section: General
url: http://www.bbc.co.uk/news/world-europe-68644879
content: |-
  A woman races to escape Crocus City Hall, where gunmen killed at least 60 people.

  Video filmed by a woman racing to flee a concert venue on the outskirts of Moscow, where gunmen burst in and killed at least 60 people, has been posted online.

  Originally seven minutes in length, the video has been edited down to show her escape route.

  Crocus City Hall was about to host a rock concert when the attackers entered the foyer and then the theatre itself.

  An Islamic State group said it had carried out the attack - a claim the US said was credible.
