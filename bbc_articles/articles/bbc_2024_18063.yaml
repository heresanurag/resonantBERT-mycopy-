content: |-
  The families of Mathilda Hodgkins-Byrne and Becky Wilde react to their bronze medal in Paris.

  Great Britain's Mathilda Hodgkins-Byrne and Becky Wilde have won a bronze medal in the women's double sculls final.

  The athletes left it late to qualify for Paris - doing so at the final Olympic Qualification Regatta in May.

  Last year, Becky Wilde underwent surgery for compartment syndrome in both her arms, a condition which causes pressure to build inside the muscles.

  After a rollercoaster of emotions, the Taunton rower has a medal.
