id: bbc_2018_1287
title: 'Iran unrest: Deaths reported in fresh protests - BBC News'
date: '2018-01-02'
section: General
url: http://www.bbc.co.uk/news/world-middle-east-42532859
content: |-
  Thirteen people are believed to have been killed in fresh anti-government demonstrations in Iran.

  Initially, state TV said that 10 people had been killed overnight on Sunday, but by Monday evening that figure had been raised to 13 by a regional governor.

  Police also say one of their officers has been shot dead.

  Protesters took to the streets again following a televised address by Iranian President Hassan Rouhani.
