title: 'Newspaper headlines: PM wants end to ''meddling'' on Rwanda and Met chief
  under fire - BBC News'
date: '2024-04-22'
section: The Papers
url: http://www.bbc.co.uk/news/blogs-the-papers-68871585
content: |-
  After a weekend of coverage, the Met Police antisemitism accusations remain front page news.

  Rishi Sunak is under pressure from Tory backbenchers and peers, the Guardian says, to exempt Afghans who served alongside British forces from being deported to Rwanda.

  The paper says the concession could ease the passage of the Rwanda bill through Parliament. The Daily Telegraph has seen leaked government documents which, it says, show the Foreign Office tried to scupper the scheme, by raising concerns it could breach human rights laws.

  In the Times, the writer and broadcaster, Sir Trevor Phillips, attacks the House of Lords handling of the Rwanda bill, accusing peers of "vexing and self-indulgent behaviour". "They were bound to fail", he writes, "and they knew it." He proposes a plan for reforming the chamber, including drastically reducing its size and introducing a time limit on how long peers can serve. Dominic Lawson, writing in the Daily Mail, predicts that finding an airline to take refugees to Rwanda may make the government's current problems seem insignificant. The Daily Express criticises Labour's stance on Rwanda. In its leader, it says "Repeated obstruction is not constructive policy" and calls for Sir Keir Starmer to outline his alternative.

  The i carries strong criticism of the Metropolitan Police's handling of the Gaza protests and the antisemitism row after a campaigner was criticised by an officer for being "openly Jewish". Writing in the paper, Anne McElvoy, says the controversy has had a "corrosive" impact on the leadership of the Met's commissioner, Sir Mark Rowley. She argues that the force is "unclear about what conduct is lawful and where it should intervene."

  A crime and justice commission has been launched by the Times, which it says will be a year-long inquiry into the future of the criminal justice system. It carries a YouGov survey suggesting half of respondents don't trust the police to solve crimes, and a third have no faith in their ability to maintain law and order. Just over a third of those polled said they believed the police were doing a good job.

  The Financial Times offers a gloomy assessment of the likelihood that new military aid from the US can affect the war in Ukraine. It has spoken to military experts, including a senior Ukrainian official who has said the arms would help "slow down the Russian advance but not stop it." Matthew Savill, a director at the defence think-tank the Royal United Services Institute, said the weapons wouldn't create "immediate parity" with the Russian volume of fire, but it would help close the gap.

  The Sun reports claims that Moscow has been behind radar jamming which has affected thousands of British passenger flights. It says journeys to Turkey and Cyprus are among those affected by actions which render the onboard GPS unreliable. The airlines insist they have procedures to mitigate against GPS problems and that flying remains one of the safest forms to travel.

  In the Daily Mirror, under the headline "Together for Stephen", Baroness Lawrence talks about the legacy of the murder of her son Stephen, 31 years ago today in south east London. Doreen Lawrence tells the paper that she remains as committed as ever to championing his legacy by encouraging the next generation to develop key skills and overcome barriers to getting on in life.

