  The world's richest man is leading a sweeping cost-cutting drive. What do voters in a key swing state make of his role?

  'On a power trip' or 'obviously brilliant'? Americans weigh Musk's influence

  This video can not be played To play this video you need to enable JavaScript in your browser.

  Seated around a breakfast table in Erie, Pennsylvania, four veterans in their mid-80s - John, Jack, Bob and Don - gather to reminisce about their decades of friendship. But it is another Don, this one in his late 70s, who keeps creeping into their conversation: President Donald Trump. Of the four, only Bob voted for Trump. But after seeing Elon Musk standing next to the Republican president in the Oval Office this week, defending his efforts to slash the size and spending of the federal government, he is already doubting his decision. "I'm afraid of him," Bob says of Musk. "I think he's trying to be president." Erie County was one of the key battlegrounds that helped swing the 2024 presidential election in Trump's favour. The Republican won 50.1% of the vote here just four years after his Democratic rival Joe Biden narrowly took the county. And part of Trump's winning platform was a clear promise to overhaul and upend the federal government, pledging on the campaign trail to deliver "trillions" in cuts if elected. Polls indicated that was popular with Republican voters, and that remains the case now. What was less clear to voters before the election was just how much of a frontline role Musk would play in this administration. The 53-year-old owner of Tesla, SpaceX and X now leads the Department of Government Efficiency (Doge) which is dedicated to shrinking government and is routinely pictured alongside the president. Members of his team have entered various departments to monitor spending and offered millions of workers an exit route. They have moved to freeze federal funding as well as the work of agencies such as the US Agency for International Development (USAID) in a blizzard of activity in recent weeks.
  • None What we know about Musk's cost-cutting mission But given the scale of Musk's influence in the nascent Trump administration, Democrats are concerned about conflicts of interest as well as Musk, whose companies have billions in federal government contracts, potentially taking actions to benefit himself. "This is dangerous. This is against America's interests," Senior Democrat Chuck Schumer said. "And President Trump needs to show some leadership and rein in Doge before it inflicts more harm."

