  Coverage: Watch on BBC One, listen on Radio 5 Live, BBC Radio Scotland & BBC Sounds; text commentary and highlights on BBC Sport website and app

  Scotland co-captain Finn Russell says he pays little attention to criticism directed at him, and has moved on quickly from his crucial missed kick against England in the Six Nations at Allianz Stadium. Russell had a chance to effectively win the game in London by converting Duhan van der Merwe's 79th-minute try, but his touchline effort slid past the post and England held on for a 16-15 victory. The Bath fly-half was central to an impressive Scotland attacking display that produced three stunning tries, but some fans and pundits have instead focused on his wayward display from the tee that saw him miss all three attempts at goal. And he said: "I think that's just part of the job, isn't it? "If I'm going to be the 10 and the goal-kicker, and I don't get the kicks like I could have done against England, that's all going to come with it. "That's why you do it, to get these chances and opportunities. Had I got that kick, it would have been a different story. But missing it, that's part of it and that's how it goes. I'm not too stressed about what's been said about my game. "As long as I'm happy with it myself, that's all that matters. I go back to my family and friends and they're the ones that either pick me up or put me down either way, depending on how it goes. "My dad was saying, 'unlucky with the kick, but you played really well overall'. For me, that means more than what others say."

  This video can not be played To play this video you need to enable JavaScript in your browser. Who got a nickname from Trump? And who's wrestling a camel?

  The Scots take on Wales at Murrayfield on Saturday knowing that once again their title hopes are over for another year after back-to-back defeats by Ireland and England. It has so far been yet another underwhelming Six Nations for a group of players believed by many to be the most talented in Scotland's history. "I don't know the answers," Russell. "If I did, we'd probably not be in this situation. That's part of sport. "As a team, we need to get better. It sounds simple, doesn't it? When we do get chances, we need to take them and have that ruthless edge that a lot of people talk about. "As a team, we're growing and developing. We come into every tournament hoping we're going to win it. But we do need to learn and get better from these games. It's not an easy thing to do. I've been here quite a few times now and it's the same kind of story. It's tough. "The best thing we can do is have a good game this weekend against Wales, hopefully get the result, then go to France and hopefully get the result over there."

