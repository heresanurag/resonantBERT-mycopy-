title: Manchester Arena attack conspiracist ordered to pay £45k in damages - BBC News
date: '2024-11-09'
section: England
url: http://www.bbc.co.uk/news/articles/c86q0ypq7q0o
content: |-
  Richard Hall claimed the Manchester Arena attack, which killed 22 people, was fake.

  A conspiracist who claimed the Manchester Arena bombing attack was staged has been ordered to pay £45,000 in damages. Two survivors of the attack, which killed 22 people, have been awarded damages of £22,500 each against former TV producer, Richard Hall. Martin Hibbert and his daughter Eve, of Chorley, sued Hall for harassment and they won the case last month. Mr Hibbert was left with a spinal cord injury and Ms Hibbert suffered severe brain damage as a result of the bombing.

  Hall had told the court his actions, which included filming Eve outside her home, were in the public interest as a journalist and claimed "millions of people" had "bought a lie" about the attack. As well as those who died, hundreds of people were injured in the attack when Salman Abedi detonated a homemade rucksack bomb in the foyer of the venue as thousands of people left an Ariana Grande concert. She said Hall’s account was “preposterous and untrue” but she accepted he continued to believe it was true. She said both father and daughter were vulnerable and the harassment had been prolonged. She also imposed an injunction on Hall, aimed at stopping him harassing the Hibberts in future, and ordered him to pay 90% of the Hibberts' legal costs.

  Mr Hibbert, who now uses a wheelchair, had been the closest survivor to the bomber and suffered 22 shrapnel wounds. He was left paralysed from the waist down and suffers from post-traumatic stress disorder (PTSD). Ms Hibbert, who was 14 at the time of the attack, suffered significant, permanent cognitive impairment as a result of the bombing and was left needing full-time care throughout her life, unable to walk unassisted and suffering from PTSD and depression. Outside the court Mr Hibbert said Mr Hall’s actions were "oppressive and unacceptable".

  Martin Hibbert has been left paralysed from the waist down

  “Freedom of expression provides protection for journalism, but Mr Hall has abused media freedom," he said. “He repeatedly published false allegations and dismissed the tragic reality which so many ordinary people have experienced and continue to live with. “His abhorrent behaviour had to be challenged, not just for me and my family but for others too." He added that the judgement is a "comprehensive victory" and hopes it opens the door for change to protect others. Kerry Gillespie, of Hudgell Solicitors, said many feel they can publish "harmful, unfounded allegations against others, especially those who have already suffered from tragedy" but added that this case has changed the landscape. “Martin and Eve have set a precedent which will hopefully see more people who engage in this sort of behaviour challenged," she said.

  Richard Hall left the court after he was asked if we wanted to apologise to victims

  Outside the Royal Courts of Justice, Mr Hall repeated some of his claims about the attack not having happened, and alleged his trial had not been fair. He walked away when asked if he wanted to apologise to the victims of the attack.
