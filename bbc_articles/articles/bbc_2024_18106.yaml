  Mr Boutcher said it was not lost on him that the Police Service of Northern Ireland (PSNI) had posted on its Armagh social media channels "rightly congratulating Armagh on winning the All-Ireland final", accompanied by details of the force's Fatal Five road safety messaging, reminding drivers to stay safe. "Later that evening, police vehicles were seen being driven in Camlough in a manner which was irresponsible," he said. "I, of course, understand the sentiment of what those police officers were seeking to do in supporting the local community in Armagh’s brilliant win. "But there are many other ways to show that support, driving in that manner is not one of them." Mr Boutcher added that he had received phone calls both condemning and supporting the officers' actions. He said that an internal investigation had been launched "which will be proportionate and will not be unduly influenced by anyone".

  Several unionist politicians had questioned the actions of the PSNI officers involved and on Monday members of the Democratic Unionist Party (DUP) met with PSNI officials to raise their concerns. The party's policing spokesperson, Trevor Clarke MLA, said after the meeting: "We’re very careful to just make our point today in terms of the erratic driving, the manner in which the police officer drove the car around and around the roundabout and enjoyed the triumphalism of the celebration of the football. "We’re actually allowing the police to investigate this in such a manner and come to their own conclusions, giving everyone involved a fair hearing, and let them go through the process." TUV leader Jim Allister said he would be contacting the police ombudsman, Northern Ireland's police watchdog, and the chief constable following a "disgraceful display by officers in a marked PSNI car tonight in Camlough". "They can be seen driving through the village waving GAA flags in a fashion which could best be described as joyriding while using the siren improperly," the North Antrim MP continued. The Sinn Féin infrastructure minister John O'Dowd said that criticism had been "blown out of all proportion". Mr O'Dowd said: "That PSNI officer [has] done more for community relations with the nationalist and republican community than any glossy brochure or any glossy recruiting campaign would have ever done".
