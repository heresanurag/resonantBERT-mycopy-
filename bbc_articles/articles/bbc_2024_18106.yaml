title: 'Katie Simpson: Three officers facing misconduct proceedings - BBC News'
date: '2024-08-01'
section: Northern Ireland
url: http://www.bbc.co.uk/news/articles/c727py603ezo
content: |-
  Chief constable Jon Boutcher says officers were "not professionally curious enough" when Ms Simpson died.

  Katie Simpson died following an incident in a home in August 2020

  Three police officers are facing misconduct proceedings over the investigation into the murder of Katie Simpson, the Policing Board has been told. It follows an inquiry by the Police Ombudsman. Chief constable Jon Boutcher said that officers were "not professionally curious enough" when she was first admitted to hospital in 2020. Ms Simpson's murder was originally thought by police to have been a suicide. Speaking at a Policing Board meeting on Wednesday, the chief constable also commented on officers who were filmed in police vehicles taking part in GAA celebrations in Camlough, saying they did not act "professionally or independently”.

  Jon Boutcher said there were "a number of shortcomings in our initial investigation"

  On the Katie Simpson case, Mr Boutcher said police systems "failed to identify" the previous offending of Jonathan Creswell, who was later charged with Katie Simpson's rape and murder. The trial ended abruptly when the defendant was found dead. "There are a number of shortcomings in our initial investigation," Mr Boutcher said. "I cannot apologise enough to the (Simpson) family for the delay in getting the right response." For a number of months, the PSNI did not treat her death as suspicious.

  Jon Boutcher said that chief inspector John Caldwell was not among the officers facing misconduct proceedings

  Mr Boutcher also defended detective chief inspector John Caldwell, who, it has been claimed, was resistant to investigating her death. The chief constable said: "The programme was disparaging, in my view, and damaging to his professional reputation and in turn public confidence in the police. "John is not subject to misconduct proceedings. "He did not conduct the role of senior investigating officer at any stage in relation to this case. "In my view, probably, the primary reason for attention on Mr Caldwell is because he is a known public figure for very sad and tragic reasons." Mr Caldwell survived a gun attack claimed by the dissident republican New IRA in February 2023. Mr Boutcher added: "It is unfortunate this issue has distracted from the tragic death of Katie and the important lessons that will be learned by the police."

  Mr Boutcher also spoke about the PSNI officers who took part in GAA celebrations in Camlough. It comes after videos emerged of officers taking part in celebrations following Armagh's All-Ireland Senior Football Championship final victory over Galway on Sunday. The footage appeared to show officers in police vehicles waving flags and sounding their sirens. The chief constable said the officers did not act "professionally or independently”. He said he did not support their actions and described their driving “at best irresponsible”. An internal investigation is under way. Mr Boutcher said no-one was being sacked, suspended or relocated.

