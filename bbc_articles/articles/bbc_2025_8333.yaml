title: UK investigating fraud claims around green fuel HVO diesel - BBC News
date: '2025-04-09'
section: Climate
url: http://www.bbc.co.uk/news/articles/cm24n8nej94o
content: |-
  The BBC finds evidence of fraud in the production of a "green" diesel meant to cut emissions.

  The UK government is investigating a fast-growing "green fuel" called HVO diesel amid claims of significant fraud, the BBC has learned. HVO is increasingly popular as a transport fuel and for powering music festivals and its backers say it can curb carbon emissions by up to 90% as it can be made from waste materials like used cooking oil. But industry whistleblowers told the BBC they believe large amounts of these materials are not waste but instead are virgin palm oil, which is being fraudulently relabelled. And data analysed by the BBC and shared with the UK's Department for Transport casts further doubt on one of the key ingredients in HVO, a material called palm sludge waste.

  Europe used more of this waste in HVO and other biofuels in 2023 than it is thought possible for the world to produce. In response to the BBC's findings, the Department for Transport said they "take the concerns raised seriously and are working with stakeholders and international partners to gather further information". HVO, or hydrotreated vegetable oil, has been called something of a wonder-fuel in recent years as it can be used as 100% substitute for diesel reducing planet warming emissions. UK consumption rocketed from 8 million litres in 2019 to about 699 million litres in 2024, according to provisional government figures. Its green credentials rely heavily on the assumption that it is made from waste sources, particularly used cooking oil or the waste sludge from palm oil production. But industry whistle-blowers have told the BBC that they believe virgin palm oil and other non-waste materials are often being used instead. That would be bad news for the planet, as virgin palm oil is linked to increased tropical deforestation, which adds to climate change and threatening endangered species like orang-utans. This palm oil "floods the market like cancer," one large European biofuel manufacturer told the BBC.

  They said that to stay in business they have to go along with the pretence that they are using waste materials. Another whistle-blower, a former trader of these biofuels, also speaking anonymously, gave the BBC his account of one recent case dealing with supposedly waste products. "I believe that what I bought was multiple cargos of virgin palm oil that has been wrongly classified as palm oil sludge," they said. "I called one of the board members and told them about the situation, and then I was told that they didn't want to do anything about it, because the evidence would be burned." As well as this testimony, data compiled by campaign group Transport & Environment and analysed by the BBC suggests that more palm sludge waste is being used for transport biofuels than the world is probably able to produce. The figures show that the UK and EU used about two million tonnes of palm sludge waste for HVO and other biofuels in 2023, based on Eurostat and UK Department for Transport figures. EU imports of this sludge appear to have risen further in 2024, according to preliminary UN trade data, although the UK appears to have bucked this trend. But the data analysed by the BBC, which is based on well-established UN and industry statistics, suggests the world can only produce just over one million tonnes of palm sludge waste a year. This mismatch further suggests non-waste fuels such as virgin palm oil are being used to meet Europe's rapid growth in biofuels, according to researchers and industry figures.

  "It's a very easy game," said Dr Christian Bickert, a German farmer and editor with experience in biofuels, who believes that much of the HVO made with these waste products is "fake". "Chemically, the sludge and the pure palm oil are absolutely the same because they come from the same plant, and also from the same production facilities in Indonesia," he told BBC News. "There's no paper which proves [the fraud], no paper at all, but the figures tell a clear story." Underpinning the sustainability claims of biofuels is an independent system of certification where producers have to show exactly where they get their raw materials from. It is mainly administered by a company called ISCC, and in Europe it has a long-standing reputation for ensuring that waste materials turned into fuel really do come from waste, by working with national authorities. But in Indonesia, Malaysia and China, three of the main sources of the raw ingredients claimed to be waste for HVO, supervision is much more difficult. "ISCC is simply not allowed to send anybody to China," said Dr Christian Bickert. "They have to rely on certification companies in China to check that everything is OK, but China doesn't allow any inspectors in from outside." This concern is echoed by several other groups contacted by the BBC. Construction giant Balfour Beatty, for example, has a policy of not using the fuel, citing sustainability concerns. "We just are not able to get any level of visibility over the supply chain of HVO that would give us that level of assurance that this is truly a sustainable product," Balfour Beatty's Jo Gilroy told BBC News. The European Waste-based and Advanced Biofuels Association represents the major biofuel manufacturers in the EU and UK. In a statement they said "there is a major certification verification issue that needs to be addressed as a matter of priority", adding that the "ISCC should do much more to ensure that non-EU Biodiesel is really what it claims to be". In the light of growing fraud allegations, the Irish authorities have recently restricted incentives for fuels made from palm waste. The BBC also understands that the EU is about to propose a ban on ISCC certification of waste biofuels for two-and-a-half years, although it is expected to say it is not aware of direct breaches of renewable goals. It would then be up to individual member countries to decide whether to accept certifications. In response, the ISCC said it was "more than surprised" by the EU's move, adding that it had been "a frontrunner in implementing the most strict and effective measures to ensure integrity and fraud prevention in the market for years". "The measure would be a severe blow to the entire market for waste-based biofuels," it said.

