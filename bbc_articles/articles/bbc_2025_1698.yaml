  Neighbouring Bletchingley Parish Council offered the use of its sports pavilion in Grange Meadow for evacuated residents. Councillor Linda Baharier told BBC Radio Surrey: "It has showers, it's warm and it has cooking facilities there. "The biggest problem was those that were only renting, because they had no insurers to talk to. "We've been looking more long-term at people that maybe can offer a spare room while they can find somewhere else to rent."

  Shane Fry says it will be a "trialling few months" for businesses in Godstone

  Shane Fry, who runs garage DD Services, was concerned lengthy road closures could affect "the longevity" of the business. "We're not allowed public access to our garage, we have lost a fair bit of our business, either people can't get to us or choosing not to," he added. "I've got four employees, they've got families to look after and I've got my own to look after, so it's going to be a trialling few months for us."

  Road closures remain in place around the sinkhole

  Catherine Sayer, leader of Tandridge District Council, said the authority was now leading the incident response and had offered five families overnight accommodation. She said: "We know this is a really difficult time for those residents who have had to leave their homes and for local businesses which have been impacted." Residents will be allowed back to the site to collect essential belongings once the site is secured, the council added. Mr Furniss added that the county council was "looking at weeks, if not months" for repairs. "We will have to excavate the whole area and build the road back up from the base, allow the utilities to come back in and reconnect, and then we will be able to put the road back on top of that," he said. Graham Bristow, who runs Blossoms Café with his daughter, said: "She's trying to be brave about it" he said, "but she's extremely worried about what the next couple of months might bring. "If we suffer, is there going to be any help, possibly in rates reductions? We don't know."

