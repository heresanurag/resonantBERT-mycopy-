content: |-
  A major incident is still in force three days after a sinkhole opened in the centre of Godstone.

  Sinkhole street families 'out of homes for months'

  It is estimated repairs to the sinkholes will take months

  A huge sinkhole that opened in the middle of a Surrey village has stopped getting bigger but could prevent people from returning home for months, according to a councillor. Two sections of Godstone High Street have caved in since Monday night, with 30 homes evacuated. Surrey County Council's highways boss Matt Furniss said the sinkhole had stabilised and testing work was being carried out in the holes but it could be months before families were allowed back into their homes. One local parish councillor said the search was on for people that could offer a spare room while residents found other rental properties.

  The sinkhole spread so quickly it trapped this car in a driveway

  The first hole appeared late on Monday night when a water pipe burst, growing to at least 65ft (20m) long by Tuesday lunchtime, with a parked car teetering close to the edge of a second hole that opened up.
  • None Explainer: What is a sinkhole and how does it form? Mr Furniss said: "We're doing borehole testing, which will give us an early indication of what's below and allow us to inform the temporary works needed to stabilise the area. "We'll be looking to completely rebuild the road. "We don't know what's caused the water pipe to break, that's what the investigation will look into. "What we do know is that it's currently stable, it isn't growing anymore, we think that most of the properties are currently structurally sound so residents will be able to get access to retrieve property." He said he believed the second hole had been caused by water finding a route from the first.

  Residents of 30 properties, including Rez Mira, were evacuated when the sinkhole opened

  The authority has declared the situation a major incident, while Tandridge District Council opened an information centre at St Nicholas Youth Centre. Mr Furniss added: "All properties have been surveyed and we believe are currently structurally sound, but this may not remain the case. "We cannot estimate a timescale for return but will keep residents updated. It may take months."

