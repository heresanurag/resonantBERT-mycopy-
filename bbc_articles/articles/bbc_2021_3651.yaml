title: 'Covid-19: Welsh Government update 1 March 2021 - BBC News'
date: '2021-03-01'
section: Wales
url: http://www.bbc.co.uk/news/live/uk-wales-56222576
content: |-
  Details and reaction as First Minister Mark Drakeford gives a live televised briefing.

  The UK Government must ensure the supply of coronavirus vaccinations to Wales increases in the coming weeks, Wales' first minister says.

  Mark Drakeford said the Welsh Government remained on track to offer vaccinations to everyone in the top nine priority groups by the middle of April, but only if supply levels recover from a recent drop-off.

  “We’ve had the two weeks where we knew that the volume of vaccine coming to Wales was going to be lower than it had been previously, but the profile for the month of March is of significantly accelerating volumes of the vaccine coming to Wales”, he said.

  “It’s very important that that is now delivered - providing it is delivered then we remain on track, both to offer the second vaccine to people who’ve had the first, and to complete an offer of the first dose of the vaccine to everybody on the nine top priority groups by the middle of April”.

  He said Wales continued to receive its "Barnett" share of the vaccines delivered to the UK so far, reflecting not only the size of its population but also its profile.

  Wales received a greater proportion during the early phase of the vaccine rollout, because of its higher share of elderly people and those who are clinically vulnerable.

  “We have not been held back by problems of supply in being able to get our vaccination programme underway,” Mr Drakeford said.

  “We did make the case ... that because we have a higher proportion of our population in those early groups, that we would get a slightly bigger part of our Barnett share in the beginning and that would mean we would get slightly less of it towards the end.

  “In the event that hasn’t happened - we continue to get our Barnett share.”
