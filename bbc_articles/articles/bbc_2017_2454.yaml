content: |-
  Colin Paterson speaks to fans for BBC radio from Black Sabbath's final gig.

  Black Sabbath, the British band credited with inventing heavy metal, have played their final gig.

  A capacity crowd of 16,000 watched the performance in the band's home city, Birmingham.
