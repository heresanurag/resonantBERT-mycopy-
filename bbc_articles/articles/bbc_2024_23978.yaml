title: Crowded boat attempts Channel journey a day after fatalities - BBC News
date: '2024-09-05'
section: General
url: http://www.bbc.co.uk/news/videos/c9902k751eko
content: |-
  Migrants attempt to cross the Channel one day after 12 people died when their dinghy sank.

  Footage shows migrants attempt to cross the Channel one day after 12 people died when their dinghy sank.

  Dozens of people were seen running across Wimereux beach in France to board a dinghy which was already full of people.

  Some of the people attempting to board the dinghy did not have life vests. French police and coastguards were present on the beach and on the shore trying to prevent people attempting the crossing.

  Some migrants had turn around and it is not clear if the dinghy managed to reach open sea.
