title: Customers complain as empty shelves continue at Co-op after hack - BBC News
date: '2025-05-06'
section: General
url: http://www.bbc.co.uk/news/articles/cze1eg3z307o
content: |-
  The retailer says "sustained malicious attempts by hackers" is affecting its IT systems.

  Customers complain as empty shelves continue at Co-op after hack

  John Walker took this photo of empty shelves in a Co-op in Llanrwst, Conwy

  Co-op customers have complained as stores are being left with empty shelves while the retailer battles with a major cyber attack disrupting deliveries of fresh stock. The disruption comes after the company admitted to the BBC on Friday the attack on its systems had resulted in "significant" amounts of customer data being stolen. A Co-op spokesperson told the BBC deliveries to its stores were impacted by the "sustained malicious attempts by hackers to access our systems". "We are working around the clock to reduce disruption and resume deliveries," they said.

