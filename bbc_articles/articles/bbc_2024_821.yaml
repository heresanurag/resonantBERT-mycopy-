id: bbc_2024_821
title: Dramatic videos show Storm Isha damage so far - BBC News
date: '2024-01-22'
section: General
url: http://www.bbc.co.uk/news/uk-68055708
content: |-
  Near misses, huge waves and more are captured on camera following strong gusts in the UK and the Isle of Man.

  Videos shared on social media have captured near misses, collapsing roofs and flying furniture in the strong winds from Storm Isha.

  Tens of thousands of homes were left without power, dozens of flights cancelled and diverted, along with train disruptions.

  Storm Isha has swept across parts of the UK and the Isle of Man bringing gusts of 99mph (159km/h) in some areas. Parts of Northern Ireland, northern England and Scotland have seen the strongest winds in 10 to 20 years.
