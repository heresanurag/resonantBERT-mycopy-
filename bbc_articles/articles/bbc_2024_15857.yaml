title: Hundreds queue for Sunday roasts at Glastonbury Festival - BBC News
date: '2024-07-02'
section: General
url: http://www.bbc.co.uk/news/videos/cz7e3n64x5eo
content: |-
  The Sunday dinners sold out in just 55 minutes as people looked forward to a hot meal at a table.

  Forget the baked potatoes and lentil curries, hundreds of people at Glastonbury Festival have been tucking into a Sunday roast.

  Deluxe Diner have been offering them since 2016, and they have grown in popularity over the years, selling out in just 55 minutes in 2024.

  Festival goers paid £36 for meat, vegetables and all of the trimmings - served on "real plates".

