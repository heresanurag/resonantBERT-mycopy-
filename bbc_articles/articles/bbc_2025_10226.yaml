content: |-
  Now the 2024-25 Premier League campaign is over, cast your votes in BBC Sport's end-of-season awards.

  The 2024-25 Premier League campaign is over and, before we all switch focus to summer plans, it is time to see how you voted in our end-of-season awards.

  Who was the best player and best young player? Who was the manager of the season? Which team caught your eye the most and who was the best signing?

  The nominees were decided by a group of BBC Sport journalists and voting closed at 18:00 BST on Monday, 26 May.
