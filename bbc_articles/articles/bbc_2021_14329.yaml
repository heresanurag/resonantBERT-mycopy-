title: 'Chester crash: Two Flintshire women die and man seriously injured - BBC News'
date: '2021-11-26'
section: Wales
url: http://www.bbc.co.uk/news/uk-wales-59430868
content: |-
  The driver of a Citroen and her passenger die at the scene of a crash near Chester on Thursday.

  The two women were pronounced dead at the scene

  Two 20-year-old women from Flintshire have died and a man has been seriously injured following a crash.

  The driver of a Citroen, from Greenfield, and her passenger, from Connahs Quay, died at the scene on the A5117 near Parkgate Road, Chester.

  A man, 28, who was driving a BMW, was taken to hospital with serious injuries following the incident at 21:28 GMT on Thursday.

  Cheshire Police are appealing for witnesses following the crash.
