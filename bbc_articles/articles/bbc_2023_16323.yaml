title: Moment Tupac's murder suspect 'Keffe D' gets arrested - BBC News
date: '2023-10-06'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-67032696
content: |-
  Newly released bodycam footage shows the 60-year-old former gang leader getting handcuffed in Las Vegas. David ‘Keffe D’ Duane had been indicted for the 1996 murder of rap star Tupac Shakur.
