content: |-
  Dom Ansah and Ben Gillham-Rice, both 17, died after being stabbed at a birthday party.

  Ben Gillham-Rice (left) died from a knife wound to the chest and Dom Ansah (right) was killed by a stab wound to the back

  A third man has been arrested in connection with the deaths of two teenagers who were stabbed to death at a house party.

  Dom Ansah and Ben Gillham-Rice, both 17, died after being attacked at a birthday party in Archford Croft in Milton Keynes on 19 October.

  A 27-year-old has been arrested on suspicion of conspiracy to murder and released under investigation.

  Two other men have been charged with two counts of murder.

  Charlie Chandler, 21, of Fitzwilliam Street, Bletchley, and Earl Bevans, 22, of no fixed abode, are due to appear at Luton Crown Court on Monday.

  The two men have also been charged with two counts of attempted murder in relation to two "males" who were seriously injured in the incident.

  Earlier, Thames Valley Police said they believed others were involved in the stabbings and urged them to come forward or risk being publicly named.

  The boys were stabbed in Archford Croft in Milton Keynes

