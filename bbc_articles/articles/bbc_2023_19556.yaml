title: Teens guilty of 'ferocious' Brianna Ghey murder - BBC News
date: '2023-12-20'
section: Manchester
url: http://www.bbc.co.uk/news/live/uk-england-manchester-67771276
content: |-
  Brianna's mother says she has lost all sympathy for the killers who didn't display "an ounce of remorse".

  Quote Message: Prior to the trial I had moments where I felt sorry for the defendants because they had ruined their own lives as well as ours. But now, knowing the true nature and seeing neither display an ounce of remorse for what they have done to Brianna, I have lost all sympathy that I may have previously had for them. And I am glad that they will spend many years in prison and away from society." from Esther Ghey

  Prior to the trial I had moments where I felt sorry for the defendants because they had ruined their own lives as well as ours. But now, knowing the true nature and seeing neither display an ounce of remorse for what they have done to Brianna, I have lost all sympathy that I may have previously had for them. And I am glad that they will spend many years in prison and away from society."
