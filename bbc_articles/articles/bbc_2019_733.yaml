title: 'Craig McLachlan: Actor charged with assault and sex offences - BBC News'
date: '2019-01-11'
section: Australia
url: http://www.bbc.co.uk/news/world-australia-46833427
content: |-
  A spokesman for the ex-Neighbours star said he would "vigorously defend" the charges.

  McLachlan is a veteran of the Australian entertainment industry

  Australian actor Craig McLachlan has been charged with one count of common assault and eight counts of indecent assault by police.

  The former Neighbours star, 53, was charged by a police sex crime unit in Melbourne.

  A spokesman for Mr McLachlan told local media: "Craig is innocent of these charges which will be vigorously defended."

  He is due to appear at Melbourne Magistrates' Court on 8 February.

  Police did not elaborate on the nature of the allegations.

  McLachlan is a veteran of the Australian entertainment industry, having won Australia's top television award - the Gold Logie - and starred in programmes including Home and Away and the Doctor Blake Mysteries.
