title: 'Six Nations: Ireland ''incredibly lucky'' over Garry Ringrose ban believes
  former lock Donncha O''Callaghan - BBC Sport'
date: '2025-03-04'
section: Ireland
url: http://www.bbc.co.uk/sport/articles/cpv4k34pnmxo
content: |-
  Garry Ringrose will miss Ireland's Six Nations game with France on Saturday

  Former Ireland international Donncha O'Callaghan believes Garry Ringrose's Six Nations red card against Wales "holds a massive mirror" up to rugby's disciplinary processes. Ireland centre Ringrose was dismissed for a high tackle on Ben Thomas in the Principality Stadium last month but will sit out just one championship game, his side's hosting of France in Dublin on Saturday. "If we're going to give the bans, we need to stand by them. Otherwise we're undermining all our officials," said O'Callaghan on Rugby Union Weekly. "We [Ireland] are incredibly lucky to have Garry back on the pitch so soon. "Nothing towards him. He's an incredible player, not a bit dirty, an incredible guy, but that went wrong. "To see the way the citing went is disappointing." Ringrose's three-game ban came after the mid-range entry point of a six week/match suspension was reduced by 50% taking into account his guilty plea and previous disciplinary record. A further game will be taken off should Ringrose complete World Rugby's Coaching Intervention Programme. The 30-year-old was also able to serve the first game of the suspension during Leinster's United Rugby Championship victory over Cardiff on Saturday, meaning he could return against Italy in the Six Nations' final weekend.

