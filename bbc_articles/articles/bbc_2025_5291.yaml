  Romain Ntamack was handed a similar ban for his red card against Wales in round one, also for a tackle on Thomas, although his suspension did not include matches for his club side Toulouse. Both players were inititally shown yellow cards subject to off-field reviews. That meant the punishment could only be upgraded to a 20-minute rather than full red card and allowed Ireland to later replace Ringrose with Bundee Aki. Given the huge impact made by Aki in the remainder of the game, O'Callaghan questioned the reduced sanction which is being used in the Six Nations for the first time this season. "You have to think does it undermine the card itself?" he added. "Did Wales lose out on the advantage? Do France gain as opposed to what it was there for? "It holds a massive mirror up to the sanction."
