  A selection of striking news photographs taken around the world this week.

  The Comet C/2023 A3 (Tsuchinshan-ATLAS) streaks across the sky over the Dazhuangke section of the Great Wall in Beijing. Comet A3 was first spotted in January 2023 at the Tsuchinshan Observatory in China. Since 12 October, it has become more visible for stargazers, and can now be seen with the naked eye.
