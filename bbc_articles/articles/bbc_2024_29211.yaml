content: |-
  Parts of Chippenham are submerged in flood water after it was battered by Storm Bert.

  Parts of a town in Wiltshire are submerged in flood water after it was battered by Storm Bert.

  Aerial footage shows a playground and a high street flooded in Chippenham, and a number of what appear to be beer kegs knocked over.
