title: Dame Shirley Bassey receives top honour from King Charles - BBC News
date: '2024-07-09'
section: Wales
url: http://www.bbc.co.uk/news/articles/c0471dk9x3mo
content: |-
  The 87-year-old, who has been a Dame since 1999, has been made a Companion of Honour.

  Dame Shirley Bassey has been made a Companion of Honour at a ceremony at Windsor Castle

  Dame Shirley Bassey says receiving her latest honour from King Charles III made her more nervous than singing for him. The 87-year-old Welsh superstar said she "forgot to curtsy" as she was made a Companion of Honour at a ceremony at Windsor Castle. The exclusive title is awarded for service of "conspicuous national importance" and is limited to 65 people. Dame Shirley, who become a dame in the 1999 honours list, said it was the first time meeting the King since he became monarch.

  "I think it's more nerve-racking to receive the award from him than to sing in front of him," she said. “I mean, it's new, different, whereas singing I've been doing since I was a child. "I forgot to curtsy, but that's why I grabbed his hands because I forgot to curtsy."

  Dame Shirley attended Windsor Castle with her daughter, grandson and his daughter

  Asked what it was like to be dubbed an icon, she said: "It can be very nice, and it can be very isolating and a nuisance - especially if you're in a restaurant and people come and sit at your table uninvited." She said the most glamorous moment of her life was the first time she sang for the late Queen at the Royal Variety Performance. "I've had 70 years of glamorous moments," she said. "I think the first time I sang for the Queen at the Royal Variety - my very first show. And then I did quite a few after and was very blase about it."

