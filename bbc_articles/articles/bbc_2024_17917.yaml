  The Cardiff-born singer previously said she was "humbled" and "full of emotion" when it was revealed she would receive the title in the New Year Honours list. "As a little girl growing up in Tiger Bay, I would dream of travelling the world, and never imagined, that one day, my voice would take me to where I am now," she said at the time. "Every step of my career has been about taking that chance, believing in myself and making that leap."
