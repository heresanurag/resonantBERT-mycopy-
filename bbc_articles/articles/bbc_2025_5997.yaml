  England head coach John Mitchell makes three changes to his starting XV to face Ireland in Cork in the Women's Six Nations on Saturday with World Cup-winning number eight Alex Matthews returning.

  Matthews returns as England make three changes

  Emily Scarratt (left) and Marlie Packer (right) both have over 100 caps for England but have not been involved since the opening round win over Italy

  Coverage: Watch live on BBC Two, iPlayer and online, listen on BBC Radio 5 Sports Extra and BBC Sounds, live text and video highlights on BBC Sport website and app.

  England head coach John Mitchell has made three changes to his starting XV to face Ireland in Cork in the Women's Six Nations on Saturday with World Cup-winning number eight Alex Matthews returning. Last year's World Rugby women's player of the year nominee Matthews, 31, missed the opening two rounds through suspension and is joined by captain Zoe Aldcroft and Sadia Kabeya in the back row. Props Maud Muir and Hannah Botterman also come into the starting line-up in the pack for Mackenzie Carson, who on Monday was ruled out of the rest of the tournament with an ankle injury, and Bristol Bears' Sarah Bern. Former captain Marlie Packer again misses out on the matchday squad, with Maddie Feaunati named on the bench after starting the opening two rounds at number eight, winning player of the match against Italy before scoring twice against Wales. "Alex [Matthews] is aware of how well Maddie is going but she is never one to be too proud of herself," England attack coach Lou Meadows told BBC Sport. "Alex is a very good player but knows she doesn't own the shirt and will always have to fight for it. "She doesn't rest and is an extremely focused individual and wants to be better all the time. She wants to grow that shirt to where it can be, competition to do that is great." Packer, 35, started England's opening Six Nations win over Italy in York after being replaced as Red Roses captain in January by Aldcroft. However, the Saracens flanker was left out of the matchday squad that hammered Wales at Principality Stadium in round two. Captain Aldcroft has started all three games this championship at blind-side flanker, with Saturday being her eighth start in the back row after spending the majority of her 60-cap international career at lock.

