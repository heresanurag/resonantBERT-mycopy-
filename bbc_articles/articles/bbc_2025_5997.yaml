  England are seeking a seventh Six Nations title in a row before a home Rugby World Cup that starts in August. Fly-half Zoe Harrison spent the majority of last year behind Holly Aitchison, but is retained from the victory over Wales after four try assists and an assured kicking performance. Trailfinders Women wing Abby Dow scored two tries in Cardiff - both assisted by Harrison - and starts on what will be her 50th cap alongside regular back-three members Ellie Kildunne and Jess Breach. "Abby Dow is a phenomenal athlete but also extremely smart," Meadows added. "She is also extremely caring which people might not see from the pitch. Although she is an extremely talented individual, it is always about the team first and she works so hard on and off the pitch for everybody. "Her speed is her super strength but she has an incredible skill-set that she has worked on really hard, especially her kicking game. I am super proud of her." Centres Tatyana Heard and Megan Jones started four out of five games in last year's Grand Slam-winning campaign and again line up in the midfield together. Ireland, who shocked New Zealand at WXV1 in October, come into the game off the back of a first away win in the Women's Six Nations since 2021. Scott Bemand's side scored four tries to thrash Italy in Parma and make amends after failing to capitalise on opportunities in an opening-round defeat by France in Belfast. Ireland suffered a record 88-10 Six Nations defeat by England in last year's championship but head coach Bemand said earlier this week that his side are now a considerably "better team".

