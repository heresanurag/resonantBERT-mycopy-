title: MPs debate anti-Semitism - BBC News
date: '2019-02-20'
section: Parliaments
url: http://www.bbc.co.uk/news/live/uk-politics-parliaments-47279812
content: |-
  The House of Commons holds a debate on modern anti-Semitism.

  Former Labour MP Ivan Lewis says the "current Labour leadership have always believed that the creation of Israel was a catastrophe".

  He says this is in contravention of their belief that all minorities around the world have the right to self-determination.

  He says the only time the Labour leadership does not believe a minority group should have self-determination is on Israel.

  He asks how Labour can "tackle the cancer of anti-Semitism" with the current leadership in charge.

  "If all of this has happened in the party, imagine what would happen in the country, if the right honourable gentleman ever became prime minister", he asks.
