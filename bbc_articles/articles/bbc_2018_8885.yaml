  See how you rated the players as Belgium beat Brazil 2-1 in a World Cup thriller.

  World Cup: Brazil v Belgium - how you rated the players Last updated on .From the section World Cup

  Belgium beat Brazil 2-1 to reach the World Cup semi-finals for the first time since 1986. And in a game packed full of star names, three Premier League regulars topped your ratings.
