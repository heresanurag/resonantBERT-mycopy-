id: bbc_2020_7248
title: 'Coronavirus in Wales: Health minister gives update - BBC News'
date: '2020-07-21'
section: Wales
url: http://www.bbc.co.uk/news/live/uk-wales-53483024
content: |-
  A pay rise for doctors and dentists is confirmed while underground attractions can reopen on Saturday.

  The Welsh Government would still consider using a contact-tracing app if a viable option comes available, the health minister has said.

  Vaughan Gething told the weekly press conference an app would be a "useful addition" to contact tracing.

  He said: "If there is a viable UK wide app that works, and provides information into our system - as it will need to do to help assist contact tracing - we'd want to be part of it".

  Mr Gething added that Welsh officials are in contact with colleagues in Northern Ireland where an app is being developed based on technology used in the Republic of Ireland.

  He said: "If it works within one part of the NHS, then obviously there are questions for us about making use and adapting that here. We're still not there in terms of making a decision."

  But Mr Gething did praise the success of the current contact tracing scheme in Wales.

  "The latest management information is that we're getting to 88% of index cases," he said.

  "We're getting to 80% of index cases within 24 hours. We're getting to 89% of contacts index cases. We're getting to 74% of those contacts within 24 hours as well."
