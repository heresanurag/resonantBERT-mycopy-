title: '''Shooting star'' streaks through the night sky - BBC News'
date: '2024-02-20'
section: General
url: http://www.bbc.co.uk/news/uk-67848135
content: |-
  Videos posted on social media show what appears to be a meteor flying over England.

  Videos posted on social media show what appears to be a meteor flying over England in the early hours of Saturday morning.

  Many others commented that they had seen the phenomenon, from locations including Kent, London and Birmingham.
