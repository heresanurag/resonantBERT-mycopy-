title: Manchester tram-van crash victim was a three-year-old Burnley girl - BBC News
date: '2025-02-24'
section: Manchester
url: http://www.bbc.co.uk/news/articles/cq6y2jg5zm0o
content: |-
  Police say a 36-year-old man has been arrested on suspicion of causing death by dangerous driving.

  Louisa "Lulu" Palmisano, three, died when a van struck a tram, causing it to mount the pavement

  A three-year-old who was killed after a van struck a tram and mounted the pavement has been described by her parents as the "sweetest, kindest, and most generous little girl". Louisa Palmisano, known as Lulu, from Burnley, died after being hit by the van, which had been forced off the road by the impact of the collision in Manchester city centre at about 10:00 GMT on Saturday. "Her absence has left a devastating void in our family," her parents said. "She was our only child, our whole world. We were simply enjoying a happy family day out when this unimaginable tragedy struck." Greater Manchester Police (GMP) said a 36-year-old man had been arrested on suspicion of causing death by dangerous driving.

  Police said they were called to reports of a crash in Manchester city centre at about 10:00 GMT on Saturday

  Lulu's parents described their daughter as "full of creativity and joy" and said she "absolutely loved going to nursery". They said: "In an instant, our lives were shattered beyond repair. "The pain of losing her is unbearable, and we miss her more than words can ever express." First responders, including senior clinicians and air ambulance crews, battled to save Lulu but she died in hospital. Police said the van driver left the scene after the crash, which happened near Manchester Art Gallery. A GMP spokesperson said a man had been arrested on Monday and remained in custody.

  Det Sgt Andrew Page said Lulu's family were being supported by specially trained officers and had requested privacy. He urged anyone with any information about the fatal crash to contact police. A Manchester City Council spokesperson said Lulu's family had its "full support" and added: "All of Manchester is horrified at this shocking crash." Councillor Pat Karney told BBC North West Tonight he "couldn't imagine" the family's pain and grief. Asked about public remarks regarding the location of the crash, Karney said it would be "totally inappropriate to have a debate about it at this stage". "We are in a legal process so the police will make their investigation and then in the course of time, there will be a coroner's report," he said. "Any recommendations about the future of that junction will come to the council. Obviously we'll take that very seriously."

