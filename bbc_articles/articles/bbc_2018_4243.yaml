id: bbc_2018_4243
title: Good Friday Agreement played up, suggests Labour's Barry Gardiner - BBC News
date: '2018-04-10'
section: UK Politics
url: http://www.bbc.co.uk/news/uk-politics-43706473
content: |-
  Labour's Barry Gardiner says concerns about the Irish border was in Dublin's "economic interests".

  Barry Gardiner called the Good Friday Agreement a "shibboleth" at an event in Brussels

  A Labour front bencher has suggested the Irish government and Sinn Fein have "played up" concerns that Brexit could harm the Good Friday Agreement.

  Shadow international trade secretary Barry Gardiner said concerns about the Irish border issue was in the Irish government's "economic interest".

  Mr Gardiner's comments came to light as Northern Ireland marks the 20 years of the Good Friday Agreement.

  Labour's Owen Smith said the remarks were "reckless and plain wrong".

  The shadow international trade secretary made the comments at a think-tank Q&A session in Brussels last month.

  In a speech at the think-tank event, posted on his website, Mr Gardiner set out Labour's official position on Brexit and a customs union.

  He suggested a customs union with the EU was at least a partial solution to the problem of the Irish border.

  But in an audio recording obtained by the BBC, Mr Gardiner appears to play down the risks of failing to resolve the border issue post-Brexit, and suggests both the Irish government and Sinn Fein may be exaggerating them.

  "We must also recognise there are real economic reasons why people have played up the issue of the Irish border and the need to have the shibboleth of the Good Friday Agreement," he said.

  Shibboleth means a long-standing custom, principle or way of speaking which identifies people as a member of a group - and in some modern uses it carries the implication of being outmoded or no longer important.

  Former Labour Prime Minister Tony Blair told BBC Radio 4's Today programme he didn't know how anybody could say it was outdated, because the Good Friday Agreement "is the only basis on which you are going to have peace".

  Mr Gardiner later issued a statement insisting he "absolutely" does not believe the agreement was outdated.

  He said: "I am deeply sorry that my informal remarks in a meeting last month have led to misunderstanding on that point - in particular, that my use of the word 'shibboleth' in its sense of 'pass word' or 'test of membership' gave the impression that I thought the Good Friday Agreement was in any way outdated or unimportant. I absolutely do not."

  The 1998 peace deal brought an end to The Troubles in Northern Ireland

  In the audio recording Mr Gardiner said it was "hugely in the Republic of Ireland's economic interest to make sure there is no tariff and no external border there".

  He added the UK leaving the EU did "not mean putting in a normal border relationship when one party is no longer in the EU will bring back paramilitary activity".

  And there were "very good political reasons" for playing up the issue too, he said.

  "Sinn Fein - who are trusted colleagues - want to see the unification of Ireland. That is a political objective of Sinn Fein.

  "But that doesn't mean a normal border will bring back paramilitary activity."

  He said his remarks were "deeply unfashionable".

  Reports of his remarks on Twitter over the weekend were dismissed by Mr Gardiner as "nonsense on stilts".

  Writing in the Guardian in March, shadow Brexit secretary Sir Keir Starmer said Labour leader Jeremy Corbyn had made it clear that his party would seek to negotiate a new comprehensive UK-EU customs union to help avoid a hard Irish border.

  Ex-shadow Northern Ireland secretary Mr Smith told the BBC: "I worked in Northern Ireland with Barry and it is remarkable that he can display so little understanding of the vital and continuing importance of the Good Friday Agreement, or of the essential need to avoid any hardening of the border in Ireland.

  "Labour members will be particularly shocked, but it should concern people in every party and none that there now seems to be a substantial group of senior politicians who are prepared to sacrifice the Good Friday Agreement in order to deliver Brexit."

  The 20 March event was a meeting of trade unionists and selected MEPs hosted by the Rosa Luxemburg Stifung - the think tank of Die Linke, the party to the left of Germany's SDP.

  A response has been sought from Mr Gardiner, and Labour did not want to comment.

