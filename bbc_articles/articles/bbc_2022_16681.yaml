  Foreign Secretary James Cleverly says the government is not due to sit down to discuss pay with nursing unions.

  We need more doctors and nurses, says Powis

  Kuenssberg asks about what she says is the scandal of people dying in ambulances Prof Sir Stephen Powis replies that the government is putting in a national fall service so elderly people who fall at home can be treated there instead of going to hospital. On the issue of tackling the shortage of staff in the health service, he says "the NHS absolutely needs more staff". This is because it has 100,000 vacancies and we have fewer doctors per head of the population compared with other countries. He says he hopes to publish a long-term workforce plan in the spring. "If you ask me personally when it comes to doctors we need more medical student places," he says. He adds that he would increase these places from 1,000 to 2,000 and would create them in areas of the country where there are staff shortages so people will put down roots there and work in those communities.
