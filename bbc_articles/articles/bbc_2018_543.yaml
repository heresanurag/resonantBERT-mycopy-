title: Beauty queen hits back at racist critics - BBC News
date: '2018-01-18'
section: General
url: http://www.bbc.co.uk/news/world-42726615
content: |-
  The new Miss Belgium, crowned just four days ago, has already faced racist abuse on social media.

  Angeline Flor Pua, 22, has only been Miss Belgium for four days but has already been subjected to racist abuse on social media.

  Born in Antwerp to Philippine parents, she described what the experience has been like and how she's addressing the hurtful comments.
