  Police Scotland say the alarm was raised at Flip Out on Southcroft Road, Rutherglen, just before 11:00.

  Boy, 10, dies after becoming unwell at trampoline park

  A 10-year-old boy has died after becoming unwell at a trampoline park in South Lanarkshire. Police Scotland confirmed the alarm was raised at Flip Out on Southcroft Road, Rutherglen, just before 11:00. The boy was taken to the Royal Hospital for Children in Glasgow where he was pronounced dead. His death is being treated as unexplained but police said there were not thought to be any suspicious circumstances.

  A Police Scotland spokesperson said: “Inquiries are ongoing after a child took unwell at a premises in Southcroft Road, Rutherglen, shortly before 11.00am on Sunday, 18 August 2024. “The child, a 10-year-old boy, was taken by ambulance to the Royal Hospital for Children where he was pronounced dead." The spokesperson added that Glasgow City Council had been informed. The Flip Out venue has been closed since the boy's death. In a statement on social media, Flip Out said it was "fully co-operating with Police Scotland in their investigations". A spokesperson added: "We are profoundly saddened by this tragic event, and our deepest sympathies go out to the child's family and loved ones during this incredibly difficult time." The venue is a 63,000 sq ft (5283 sq m) indoor play centre which has more than 34 trampolines. Its facilities also include go karting, a soft play area and a donut slide.
