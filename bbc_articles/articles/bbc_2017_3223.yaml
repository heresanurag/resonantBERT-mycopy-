content: |-
  Manchester United are drawn against Belgian side Anderlecht in the Europa League quarter-finals.

  Last updated on .From the section European Football

  Manchester United will face Belgian league leaders Anderlecht in the Europa League quarter-finals.

  United, considered the favourites by many bookmakers, are the only British team left in Europe's secondary club competition.

  Jose Mourinho's team edged past Russians FC Rostov with a 2-1 aggregate win in the last 16.

  The first legs are set to take place on Thursday, 13 April and the return games will follow a week later.

  Manchester United have lost only two of their six previous meetings with Anderlecht - which includes a club-record 10-0 win in their first European fixture.

  The Red Devils, under legendary manager Matt Busby, thrashed the Belgians in the European Cup preliminary round second leg in September 1956.

  The sides last met in the 2000-01 Champions League first group stage - Andy Cole's hat-trick helping United to a 5-1 win at Old Trafford before they lost 2-1 in Belgium.

  Anderlecht, who are Belgium's most successful team with 33 domestic titles, finished as Pro League runners-up in 2016.

  They finished top of the league at the end of the regular season last weekend, two points clear of Club Brugge before the end-of-season play-offs.
