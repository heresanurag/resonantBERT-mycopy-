title: 'Emile Cilliers trial: Parachute sabotage accused ''caused gas leak at home''
  - BBC News'
date: '2017-10-24'
section: Wiltshire
url: http://www.bbc.co.uk/news/uk-england-wiltshire-41737936
content: |-
  Army sergeant Emile Cilliers denies attempting to kill his wife by trying to create gas leak at their home.

  The prosecution claims Emile Cilliers wanted to kill his wife and start a new life with his lover

  An Army fitness instructor accused of attempting to murder his wife caused a gas leak at their home by loosening a nut on a valve, a court heard.

  Emile Cilliers, 37, is accused of trying to kill Victoria Cilliers, 40, by sabotaging her parachute.

  He also faces a second attempted murder charge and a third charge of tampering with a gas fitting at their home in Amesbury, Wiltshire, on 30 March 2015.

  Mr Cilliers has denied the charges at his trial at Winchester Crown Court.

  Victoria Cilliers suffered multiple injuries in a 4,000ft fall at Netheravon Airfield, Wiltshire, in April 2015.

  Prosecutors allege Mr Cilliers, a sergeant with the Aldershot-based Royal Army Physical Training Corps, twisted the lines of her main parachute and sabotaged a reserve chute the day before she jumped.

  Police evidence showed the kitchen cupboard where the gas leak occurred (large arrow)

  He is also accused of damaging a gas valve at their home a few days earlier.

  The court heard Mrs Cilliers reported smelling gas after her husband had spent the previous night at his barracks because he said he wanted to avoid Monday morning traffic.

  Jurors were told an engineer called to check the leak found a loose nut on a gas isolation valve in a cupboard next to the oven. Dried blood was also found on the pipe, which the court has heard matched that of Mr Cilliers.

  They were shown a set of pliers which prosecutors claim were used to loosen the nut. Emile Cillers said he used the pliers to tighten it but had been unable to do so because it was too tight.

  The jury was shown the pliers found in Mr Cilliers' home, allegedly used to tamper with the gas valve

  Forensic scientist Mark Kearsley said the markings from the pliers had been used in a "loosening and not tightening motion".

  He said: "The nut must have been in a tightened position to lead to the impression we had, if the nut was loose it would just have turned with the tool."

  Gas engineer Michael Osborne said he was called to the Cilliers' home on 30 March to make the gas leak safe.

  He said it was not unusual to find such a leak and explained that as well as a tool, the nut could have become loosened or "relaxed" by repeated changes in temperature or by being knocked by food tins being placed in the cupboard.

  Mr Cilliers denies all three charges and the trial continues.

