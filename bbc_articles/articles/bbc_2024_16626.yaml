title: Vehicle drives through intense wildfire in California - BBC News
date: '2024-07-26'
section: General
url: http://www.bbc.co.uk/news/videos/c2j3258xrgyo
content: |-
  Video shows huge flames on either side of the road, as thick smoke obscures the view ahead.

  A wildfire northeast of Chico, California, has rapidly grown to over 6,000 acres overnight, according to Cal Fire officials.

  Video recorded from inside a moving vehicle shows huge flames on either side of the road, as thick smoke obscures the view ahead.

  Mandatory evacuations were enforced in Butte and Tehama Counties, displacing thousands of residents.

  Fire crews from Chico Fire Department and Cal Fire continue their battle against the blaze, which began as a small two-acre fire but quickly spread due to strong winds.
