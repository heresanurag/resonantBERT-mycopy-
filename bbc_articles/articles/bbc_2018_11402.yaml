title: The plastic smokers leave behind - BBC News
date: '2018-09-06'
section: General
url: http://www.bbc.co.uk/news/science-environment-45426352
content: |-
  An activist hopes to pick up a million cigarette butts from his local beaches to draw attention to the plastic they contain.

  Jason Alexander founded 'Rubbish Walks' to clean up his local area and beaches in Suffolk.

  He's targeted cigarette butts, which, surprisingly to some, are mostly made of plastic, and collects thousands in a single outing.
