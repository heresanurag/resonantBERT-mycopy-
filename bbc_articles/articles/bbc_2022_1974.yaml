title: 'Ukraine crisis: Missile strikes, tanks and buildings hit in Kyiv - BBC News'
date: '2022-02-26'
section: General
url: http://www.bbc.co.uk/news/world-europe-60525995
content: |-
  Russia continues its full-scale assault on Ukraine, with troops said to be in the capital.

  Russia has continued its full-scale assault on Ukraine, with troops said to be in the capital, Kyiv.

  The city was attacked from the air overnight and now Russian forces are advancing on land.

  Ukraine's President Zelensky has called on European citizens to protest and asked their governments to intervene to stop Russia's assault.
