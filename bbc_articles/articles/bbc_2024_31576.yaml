content: |-
  Mick Hodgson is not able to be Santa for the first time in 20 years but loved the reindeer visit.

  School Santa gets visit from reindeer in hospice

  Mick Hodgson was Father Christmas at a school grotto for 20 years

  A great-grandfather who was Father Christmas for 20 years said it felt "wonderful" to meet some reindeer in his bedroom in a hospice. Mick Hodgson was a caretaker at Harwich Centre Pre-school in Essex, when he volunteered to help out in the grotto. "I've got amazing memories. It was lovely to see the reindeer," he said. The 77-year-old, who has prostate cancer, is being cared for at St Helena Hospice, in Colchester.

  The former caretaker says he has amazing memories from his time in the grotto

  His wife Lorraine said she thought he was hallucinating when he said he had reindeers in his room. "I only realised it had really happened when I saw them later in reception. They were beautiful animals. "The hospice staff go above and beyond and we are so grateful to them," she said. Mr Hodgson, who has six grandchildren and two great-grandchildren, was diagnosed with cancer in 2019 but still volunteered to dress up as Father Christmas up until last year, she said. "He was devastated not to be able to do it this year, but this experience has helped him. "The hospice makes what should be a really horrible time as joyful as it can be," she added.

  Mr Hodgson said he was amazing memories from his time as Father Christmas

  Carole Morgan, the manager of the pre-school, said Mr Hodgson brought "so much Christmas magic" to hundreds of children, who loved it when they sang Jingle Bells. "He is so kind, gentle and softly spoken to every child he meets," she said. "He always has time to chat with every little one and has the ability to charm even the littlest of children who may be a little shy of a big man in a red suit."

  The charity The David Randall Foundation organised and paid for the visit

  The visit was organised and funded by the David Randall Foundation, which provides what they call "good days" for people in Essex with terminal and life-limiting illnesses. The charity was formed in 2013 in memory of the cricketer David Randall, external, who died from cancer at the age of 27. His mother, Sue Randall, who runs the charity, said: "We like to give people the chance to make memories in the time they have left. "It gives me a nice warm feeling inside to know that this brought Mick so much joy."

