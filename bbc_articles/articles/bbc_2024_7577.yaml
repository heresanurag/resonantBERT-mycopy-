title: Manchester police chase stolen car with 89-year-old passenger still inside.
  - BBC News
date: '2024-04-13'
section: General
url: http://www.bbc.co.uk/news/uk-68807571
content: |-
  Manchester police pursue a car reported stolen with the owner's 89-year-old mother still inside it.

  Greater Manchester Police have released dash cam footage showing its pursuit of a stolen car that had an elderly woman still sitting in the passenger seat.

  The 999 call to emergency services was also released. The car's owner sounds noticeably distressed, and tells the call handler that her 89-year-old mother in the car is blind and has dementia.

  The woman had left the engine running to keep her mother warm during a cold January, while she went into a shop.

  51-year-old David Stephenson, of no fixed abode, has been jailed this week for eight years and six months after being found guilty of kidnap, theft of a motor vehicle, dangerous driving and driving without a licence.
