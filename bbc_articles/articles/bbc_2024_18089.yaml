title: 'Huddersfield fire: Girl, 8, and woman die after ''suspicious'' house blaze
  - BBC News'
date: '2024-08-01'
section: General
url: http://www.bbc.co.uk/news/articles/cjl6j8p9p5lo
content: |-
  Police are treating the fire as suspicious but are not looking for anyone else over the blaze.

  Emergency services were called to Leeds Road in the early hours of Wednesday

  An eight-year-old girl and a woman have died following a house fire in Huddersfield, with a second child, aged 10, in a critical condition in hospital. Emergency services were called at about 02:20 BST to Leeds Road, where firefighters rescued the woman and two children from the property. All three were taken to hospital, where the woman and one of the two girls later died as a result of their injuries, West Yorkshire Police said. Officers investigating the blaze said they were treating the fire as "suspicious" but that they were not looking for anyone else in connection with the incident at this stage.

  Floral tributes have been left outside the house in Leeds Road

  Speaking earlier, Det Ch Insp James Entwistle said: "Our thoughts go out to everyone affected by this tragic incident. Specially trained officers are supporting the family. “Whilst we are not currently looking for anyone else in connection with the incident, we are still keen to speak to anyone who was in the area this morning, who may have seen something to come forward with information."

  Investigations continue at the scene of the blaze in Huddersfield

  People living nearby described the woman and two children as "nice people" and expressed their shock at what had happened. One woman, who asked not to be named, said: “It’s just so sad. The whole community is gutted. Everyone is feeling it. “It’s a close-knit community here. Most people knew the family and would have seen the kids playing on the street.” Another man, who gave his name as Simon, described the woman as "kind, friendly and helpful" adding: "She will be dearly missed, I just cannot understand." Several bunches of flowers have been left on a wall outside the house, one with a message saying: "May you now rest in peace. Beautiful inside and out. Will miss you." Follow BBC Yorkshire on Facebook, external, X (formerly known as Twitter), external and Instagram, external. Send your story ideas to yorkslincs.news@bbc.co.uk, external
