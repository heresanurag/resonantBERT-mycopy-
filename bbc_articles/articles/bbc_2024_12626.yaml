title: Tory campaign official Tony Lee looked into over alleged bet - BBC News
date: '2024-06-20'
section: Politics
url: http://www.bbc.co.uk/news/articles/c722014r42xo
content: |-
  Tony Lee is married to Tory candidate Laura Saunders, who is also being looked into by the Gambling Commission.

  Betting watchdog looks into Tory campaign official

  The Conservative Party’s director of campaigning Tony Lee is being looked into by the Gambling Commission over an alleged bet relating to the timing of the general election, the BBC can reveal. Mr Lee, who took a leave of absence from his job on Wednesday afternoon, is married to a Conservative candidate who is being looked into by the betting industry regulator. Laura Saunders, the party’s candidate in Bristol North West, has worked for the Tories since 2015 and is Mr Lee's partner. It is not known when either individual placed a bet or for how much money. Ms Saunders and Mr Lee have been approached for comment by the BBC and have not responded. Rishi Sunak announced 4 July as the date of the general election on 22 May, taking much of Westminster by surprise. A Conservative Party spokesman told the BBC: “We have been contacted by the Gambling Commission about a small number of individuals." The party said it would not be proper to comment further until any process was finished. If someone uses confidential information to gain an unfair advantage when betting, this could be a criminal offence under section 42 of the Gambling Act.

  A spokesperson for the Gambling Commission said: “The Gambling Commission regulates gambling in the interests of consumers and the wider public. "Currently the Commission is investigating the possibility of offences concerning the date of the election. This is an ongoing investigation, and the Commission cannot provide any further details at this time. "We are not confirming or denying the identity of any individuals involved in this investigation." Last week it was alleged that one of Rishi Sunak’s closest aides, Craig Williams, placed a £100 bet on a July polling day three days before the PM named the date. Mr Williams, who was the Tory MP for Montgomery until the election was called and is standing again in the new constituency of Montgomeryshire and Glyndwr, previously apologised and said he made a "huge error of judgement". When asked by the BBC, he refused to say whether he placed a bet on the basis of inside information.

  Labour and the Liberal Democrats have both called for Ms Saunders and Mr Williams to be suspended as Conservative candidates. Labour leader Sir Keir Starmer said: “It’s very telling that Rishi Sunak has not already done that. “If it was one of my candidates, they’d be gone and their feet would not have touched the floor.” Lib Dem deputy leader Daisy Cooper said: "It would be an utter disgrace if Conservative politicians were shown to be more focussed on turning a quick buck rather than the needs of the country.”

