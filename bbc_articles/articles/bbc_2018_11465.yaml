title: 'Labour conference: Starmer says EU remain option on the table - BBC News'
date: '2018-09-24'
section: UK Politics
url: http://www.bbc.co.uk/news/uk-politics-45622161
content: |-
  It comes after confusion over Labour's stance on whether a fresh EU referendum should include staying in.

  Labour's Brexit spokesman has insisted the party could back another referendum that offered voters the chance to stay in the EU.

  Sir Keir Starmer said the party was "certainly not ruling out" such a move.

  He was speaking after shadow chancellor John McDonnell said he thought any vote should be on the terms of a Brexit deal rather than staying in the EU.

  Mr McDonnell later said "all options" were on the table if it came to another referendum.

  On Tuesday, Labour's conference in Liverpool will debate and vote on a motion to keep a new referendum "on the table" if Labour is unable to force a general election.

  Key delegates - including Sir Keir and leading figures from some trade unions - decided the text at a meeting which lasted several hours on Sunday evening.

  The final draft for the vote says: "If we cannot get a general election, Labour must support all options remaining on the table, including campaigning for a public vote."

  Since the draft was finalised, key figures have faced questions on whether it will include the option to stay in the EU.

  Speaking on BBC Radio 4's Today programme, Mr McDonnell said that Labour would continue to respect the 2016 referendum, in which people voted by 51.9% to 48.1% for the UK to leave the European Union, adding: "If we are going to respect the referendum it will be about the deal."

  And he said a general election was needed so a Labour government could strike a Brexit deal with the EU which "brings the country together".

  But later, Sir Keir told the BBC the party was deliberately not being "prescriptive" about the question that could be posed in another referendum, saying it was "certainly not ruling out" the option to stay in the EU.

  Backbench MP David Lammy, a prominent campaigner for a second referendum, said it would be "farcical" to have a vote without the option of remaining in the EU.

