content: |-
  Find results for your area and follow the others as they come in.

  It was a tough night for both Labour and the Conservatives.

  The Brexit Party swept across Britain, and the Liberal Democrats and Green Party also made gains.

  The Brexit Party topped polls in every country or region apart from London, which was won by the Liberal Democrats; Scotland, which was won by the SNP; and Northern Ireland, where they did not stand.

