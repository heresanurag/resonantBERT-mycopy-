content: |-
  About 40 residents have been evacuated and several casualties passed to the ambulance service.

  Man dies and girl, eight, hurt in Perth flat fire

  The roof and upper floors were completely destroyed by the blaze

  A man has died and several people including an eight-year-old girl have been injured in a flat fire in Perth. Police officers on patrol noticed the blaze had broken out in the top floor of the four-storey building on the corner of Scott Street and South Street at about 01:50. About 40 residents were evacuated from neighbouring properties, while 12 fire crews worked through the night to extinguish the flames and deal with structural collapses. The eight-year-old girl and a 27-year-old man were taken to hospital while two firefighters, one of whom had been hurt by falling masonry, were also given medical treatment. A man was pronounced dead at the scene.

  The Scottish Fire and Rescue Service said one fire engine remained on the scene on Sunday morning to make the area secure.

  The roof and top floor of the building, which houses the Royal Bar on the ground floor, has been completely destroyed. The evacuated residents were taken to the Salutation Hotel which is being used as a respite centre. First Minister John Swinney, the MSP for Perthshire North, said he was "terribly sorry" to hear of the man's death. In a post on X, he said: "Concerned also for the condition of those who are receiving hospital treatment. This is a major incident and I am thankful to the emergency services."

  Flames tore through the roof of the building at the junction of Scott Street and South Street

  A joint investigation has been launched by police and the fire service. Ch Supt Nicola Russell said inquiries were at a very early stage and as part of this, a temporary airspace restriction - which includes drones - had been put in place in the area until 13:00 on Wednesday. She said: "You must check if it is legal to fly in your area. Drone users are responsible. It is a criminal offence to fly in restricted airspace. "A police cordon remains in place and members of the public are asked to avoid the area." Scott Street and South Street are still closed.

  Crews remained on the scene into Saturday morning
