title: Haunting image of trapped sea turtle wins underwater photo award - BBC News
date: '2020-02-01'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-51230018
content: |-
  Shane Gross captured the haunting photo while diving near the island of Eleuthera in the Bahamas.

  Photographer Shane Gross captured a haunting photo of a turtle caught in a fishing line while diving near the island of Eleuthera in the Bahamas.

  He hopes the image will bring more awareness of the effects of ghost fishing and plastic pollution.
