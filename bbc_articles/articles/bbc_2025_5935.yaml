title: Three dead after bus and car catch fire in west London crash - BBC News
date: '2025-04-01'
section: London
url: http://www.bbc.co.uk/news/articles/c7vn6m7yr80o
content: |-
  Emergency services found a bus and car alight on Monday evening and three people died at the scene.

  Three dead after bus and car catch fire in crash

  Emergency services found both vehicles alight when they arrived at the scene

  Three people have died after a car and a bus were involved in a collision in west London. Metropolitan Police officers found both vehicles alight when they were called to Bedfont Road, Feltham at 23:55 BST on Monday. Three people who were in the car were pronounced dead at the scene while a fourth was taken to hospital. Two passengers in the bus, an H26 service bound for Hatton Cross, were also taken to hospital but their injuries were not believed to be life threatening and others were treated by paramedics, the Met said.

  It is understood that two of those killed were teenagers, one male and one female. One person at the scene, who did not wish to be named, said the female teenager was local to the area. Flowers have been laid at the scene.

  The bus that was involved in the collision was an H26 service bound for Hatton Cross

  Assistant Commissioner Paul McCourt, from London Fire Brigade, said: "The thoughts of everyone within the brigade are with the families impacted by this tragic incident. "I'd like to thank our crews and emergency service colleagues for the determination and dedication they showed when responding to this difficult situation. "The brigade will speak with our firefighters that attended and offer support through our counselling and trauma services where required." The fire was put out at 01:41.

  The fire was put out within two hours, the fire service said

  Claire Mann, Transport for London's chief operating officer, said: "Our thoughts are with the family and friends of the people who were tragically killed yesterday in a collision involving a bus and a car. "This is a devastating incident and we have support available for those affected. "Safety is our top priority and we are working urgently with the police on their investigation." Roads in the area will remain closed while an investigation continues.
