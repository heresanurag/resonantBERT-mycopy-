title: 'Australia bouncy castle fall: Five children killed and four others injured
  - BBC News'
date: '2021-12-16'
section: Australia
url: http://www.bbc.co.uk/news/world-australia-59677855
content: |-
  Four others are badly injured after wind blew the castle into the air, causing them to fall 10m.

  Police described the scene as "very distressing"

  Five children have died and four others are injured after falling from a bouncy castle that was blown into the air in Australia, police say.

  The accident - caused by a wind gust - happened on Thursday at a primary school fun day in Devonport, Tasmania.

  Police said the children had fallen from 10m (32ft), with two boys and two girls among the victims.

  The children were in grade six, meaning they were probably 10 or 11 years old. A fifth child died later in hospital.

  "A wind gust had reportedly caused the jumping castle and inflatable balls to lift into the air," Tasmanian Police Commissioner Darren Hine said.

  "Our hearts are breaking for the families and the loved ones, schoolmates, teachers of these young people who were taken too soon."

