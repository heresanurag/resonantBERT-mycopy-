title: Blackpool 'needs arena' to attract the best international stars - BBC News
date: '2025-01-03'
section: Lancashire
url: http://www.bbc.co.uk/news/articles/cvg6yp2k4w5o
content: |-
  Former councillor and musician Tony Williams says Blackpool desperately needs a larger music venue.

  Tony Williams played with Stealers Wheel and Jethro Tull before becoming a Blackpool councillor

  Blackpool needs to build a large arena to compete with rival towns and cities on the entertainment circuit, a former councillor who played guitar with some of the biggest stars of the 1970s has warned. Tony Williams, who led the town's Conservative group for eight years until 2023, said the recent collapse of the £300m Blackpool Central leisure plan meant there was an opportunity to instead build a state-of-the-art venue on the site. Along with former Blackpool Mayor Robert Wynne, he first suggested the idea of an arena off Central Drive in 2018. Williams, best known musically for his work with folk-rock groups Stealers Wheel and Jethro Tull, said: "The town is perfectly positioned to draw large crowds."

  Tony Williams said promoters he spoke to blamed the lack of a big enough venue for Blackpool missing out on concerts by the biggest stars

  Despite having "excellent transport links and accommodation options", he said Blackpool was still "overlooked". Williams added: "What continues to dismay me is the frequent sight of international groups, musicians, and shows touring the UK, yet Blackpool is never on their itinerary." He said promoters he spoke to blamed the lack of a big enough venue in the resort. He said neighbouring Lytham was the only Fylde coast location to attract global stars, thanks to its annual summer festival. Williams added: "The absence of a suitable venue not only limits our town's potential as a cultural hub but also reinforces the perception that Blackpool is no longer the vibrant, world-class destination it once was." Blackpool South MP Chris Webb has already said he backed the building of an arena, which he said was also supported by residents. Blackpool Council said it was confident of finding new investors for the Blackpool Central site. Demolition of a former police station and courts on the site is due to begin soon, meaning that the council will be able to offer a fully cleared site to potential developers.
