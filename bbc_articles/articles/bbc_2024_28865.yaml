title: 'Harshita Brella murder: CCTV shows her walking with husband - BBC News'
date: '2024-11-22'
section: Northamptonshire
url: http://www.bbc.co.uk/news/articles/cwygdjyx1d9o
content: |-
  Police release an image of Ms Brella and Pankaj Lamba on the night they believe he killed her.

  A CCTV image showed Pankaj Lamba and Harshita Brella near Corby Boating Lake at about 18:30 GMT on Sunday, 10 November

  Detectives investigating the murder of a woman found dead in a car boot have released a CCTV image of her on the night they believe she was killed. The body of Harshita Brella, 24, of Corby, Northamptonshire, was discovered in Ilford, east London on 14 November. Ms Brella's husband, Pankaj Lamba, 23, of Sturton Walk, Corby, is being treated as a prime suspect and is believed to have fled the country. A photo shows the pair walking together near the town's boating lake on Sunday, 10 November and police appealed for anyone who was in the Cottingham Road area that evening to contact them.

  Ms Brella was the subject of a Domestic Violence Protection Order in the months before her death

  Det Ch Insp Johnny Campbell from the East Midlands major crime unit said: "Our inquiries have established that Pankaj and Harshita were in the area of the boating lake on Sunday evening, and as part of our ongoing investigation we have carried out searches in the surrounding area. "We know that it’s a busy part of the town and there will have been a lot of passing traffic. "As such, we’re appealing to anyone who was in Corby between 18:00 and 21:00 on Sunday, 10 November, specifically in the area around the Corby Boating Lake, Cottingham Road and Westcott Way."
  • None Harshita Brella murder: What we know so far

  Officers visited Ms Brella's home on Skegness Walk, Corby, on 13 November over concerns for her welfare. When she could not be located, a missing person investigation was launched, leading to the discovery of her body in the boot of a car on Brisbane Road, Ilford. Earlier this week, police released images of Pankaj Lamba in the Ilford area and appealed for information from anyone who may have interacted with him.

  Specialist police dogs and their handlers have been searching areas around the boating lake in connection with the murder of Harshita Brella

  Ms Brella had previously been the victim of domestic violence and was made the subject of a Domestic Violence Protection Order (DVPO) in September. Northamptonshire Police has referred itself to the Independent Office for Police Conduct (IOPC) because of its previous contact with her. Assistant chief constable Emma James said the force had reviewed its handling of an investigation launched after a domestic abuse allegation by Ms Brella on 29 August. She said: "Harshita was placed in a refuge and visited and contacted by officers on a number of occasions throughout the investigation. "The alleged perpetrator was identified, quickly arrested and bailed with conditions. "This case has been referred for a domestic homicide review which will seek to identify any learning."

