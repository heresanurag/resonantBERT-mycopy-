content: |-
  The long-term impact of the chemical on human health is still unclear and being researched.

  'Forever chemical' found in all but one of tested UK rivers

  The River Ness in Scotland was the only river of those sampled that did not show traces of the "forever chemical" TFA.

  A chemical that scientists worry might have an impact on human reproduction has been found in rivers across the UK. Researchers from York University analysed samples from 32 rivers in all the UK's 4 nations and found traces of trifluoroacetic acid (TFA) at 98% of the test locations. TFA is what's known as a "forever chemical" which means that it breaks down extremely slowly in nature, and so accumulates over time. As with other "forever chemicals", also known as PFAS, just how much a threat to human health and at what concentrations is still being researched. But scientists in Germany say having looked at the impact of TFA on animals they want it to be classed as toxic for reproduction.

  TFA forms when synthetic chemicals from other "forever chemicals" such as those found in pesticides and refrigerants are partially broken down. "This molecule (TFA) is everywhere," Alistair Boxall, professor of Environmental Science at the University of York who carried out the research, told the BBC. "We will all be drinking water containing TFA every day - so we'll be exposed throughout our lifetime. It's that long-term, low level exposure that is the big concern." This new study, external was funded by environmental charity Fidra and involved sampling in 5 rivers in Wales, 3 in Northern Ireland 14 in Scotland and 10 in the north of England. The highest concentration was recorded on the River Kelvin in Glasgow. The River Ness, which flows from Loch Ness to the Moray Firth, was the only river sampled not to show traces of TFA. Recent studies in the EU have found TFA to be widespread, including in wine and food, human blood and breast milk. Authorities in Germany have been looking with interest at rising TFA levels in drinking water. In the last two decades its concentrations have gone up fourfold and researchers have been trying to establish what impact - if any - it might have on human health. Citing scientific studies that showed TFA affecting rabbit and rat foetuses, the German Federal Environment Agency (UBA) has, external applied to the European Chemicals Agency (ECHA, external) for TFA to be classified as toxic for reproduction and harmful to the environment, external. That could eventually lead to recommendations being made in the EU as to how products containing TFA should be controlled. "Currently, there are no expected adverse health effects from consuming water or food contaminated with TFA," said Andreas Hensel, president of the German Federal Institute for Risk Assessment (BfR). "The new classification is an important step in preparing further measures to ensure that this remains the case in the future". There aren't currently any rules or regulations in place to identify or reduce the concentrations of TFA either in the environment or in drinking water supplies in the UK. But aware of concerns, the Drinking Water Inspectorate, which monitors and regulates drinking water quality in England and Wales, has just commissioned its own research. It will look at how much TFA is already in drinking water and what risk - if any - it poses. "The information signposted by the University of York suggests that TFA can be formed from the degradation of PFAS-containing pesticides," a spokesperson for the Drinking Water Inspectorate, told the BBC. "It is important that the fate of pesticides and other chemicals in the environment is understood, in order to protect drinking water sources." A spokesperson for Water UK, which represents the UK's water companies, told the BBC: "We want to see PFAS, including TFA, banned and the development of a national plan to remove it from the environment which should be paid for by manufacturers."
