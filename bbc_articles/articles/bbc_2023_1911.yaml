title: 'Sunak reshuffle: Cabinet meets after PM sets out stall with mini-reshuffle
  - BBC News'
date: '2023-02-07'
section: UK Politics
url: http://www.bbc.co.uk/news/live/uk-politics-64552137
content: |-
  Sunak ally Grant Shapps has been named as energy secretary as part of a Whitehall shake-up to reshape government.

  As leader of the Conservative Party, Rishi Sunak has a pressing political challenge: lifting the Tories' poll ratings off the floor before the next general election.

  In less than two years, voters will judge if the prime minister has delivered on key promises - from improving the ailing NHS to stopping small boats crossing the Channel.

  And it's a fair bet many voters won't be that fascinated by today's tinkering with Whitehall machinery.

  But it's a very Rishi Sunak reshuffle. There was no political pantomime. No parade of the hired and fired up Downing Street.

  After the seemingly endless reshuffles of last year's Tory Party implosion, Sunak has decided to rejig government structures rather than play another round of ministerial musical chairs.

  So, his cabinet looks largely the same. He's done nothing to rile his restive parliamentary party.
