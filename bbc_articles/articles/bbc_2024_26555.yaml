  North Carolina prisons on Wednesday relocated 800 inmates due to lack of power and running water, according to the state's department of corrections. Over 2,000 prisoners were relocated from other prisons earlier this week. Family members of prisoners told the Asheville Citizen-Times, external newspaper that they haven't been able to contact their loved ones for more than a week. More than 6,700 Army and Air National Guard members from 16 states are assisting with the on-the-ground response, according to the National Guard. The president deployed 1,000 active-duty soldiers to help with the aid efforts.

  Former President Donald Trump toured damaged areas in Georgia earlier in the week. More rainfall is expected in the coming days in parts of the Gulf Coast and Florida, which could complicate the recovery efforts. US Homeland Security chief Alejandro Mayorkas warned earlier in the week that if another storm struck the US in the coming months, the Federal Emergency Management Agency would struggle to provide assistance. The Biden administration has shipped more than 8.8 million meals, 7.4 million litres of water, 150 generators and 225,000 tarps to the region, Mr Mayorkas said. The Atlantic hurricane season continues until the end of November, and two more storms are currently brewing. Hurricane Kirk, a category four storm, is expected to create dangerous surf conditions in Florida and the Caribbean islands, but is not expected to make landfall in the US. Tropical Storm Leslie currently poses no threat to the US.
