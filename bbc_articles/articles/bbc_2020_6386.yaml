content: |-
  Developments as the chief medical officer says opening schools in June is his "second-best" option.

  It is unlikely Snowdon will be open to visitors soon, to prevent crowds gathering on the summit Image caption: It is unlikely Snowdon will be open to visitors soon, to prevent crowds gathering on the summit

  Any moves to reopen parts of the Snowdonia National Park will be "cautious and measured and will be phased" say officials.

  It follows the announcement from the Brecon Beacons park authority that it is preparing to reopen some areas to the public from Monday 8 June.

  However, popular sites such as Pen y Fan, Waterfalls Country and Llyn y Fan Fach will remain closed for the time being.

  Pictures of hundreds of people queuing at the top of Snowdon and overflowing car parks in the area are thought to have played a role in the coronavirus lockdown measures being implemented in March.

  In a statement on Thursday, officers in Snowdonia said they had been reviewing the measures in place.

  "In the coming weeks there will be only minor changes to allow for local people to exercise locally as set out by Welsh Government," said a spokeswoman for the park authority.

  "Internationally recognised sites that are very busy will be opened much later.

  "We would like to thank visitors for their patience and for continuing to respect the restrictions in Wales.

  "The ancient landscape, vast night skies and fragile wildlife of Snowdonia will be well worth the wait when it’s finally safe to return."
