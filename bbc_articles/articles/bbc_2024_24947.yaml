title: 'Newspaper headlines: Alex Salmond dies aged 69 and ''Coleen of the jungle''
  - BBC News'
date: '2024-10-13'
section: The Papers
url: http://www.bbc.co.uk/news/articles/czeg95l19e0o
content: |-
  Many of the papers lead on the death of former Scotland First Minister Alex Salmond.

  Alex Salmond dies aged 69 and 'Coleen of the jungle'

  File picture of Coleen Rooney, who the Sun reports is set to go on I'm A Celeb

  The Sunday Telegraph's front page features an obituary of the former First Minister of Scotland, Alex Salmond. Its report includes tributes from Sir Keir Starmer, external and the current First Minister, John Swinney - alongside a picture of the Salmond. The Sunday Times describes Mr Salmond as a "titan of Scottish independence", external. "Coleen of the jungle", reads the Sun on Sunday's headline. The paper says the wife of the former England football captain, Wayne Rooney, has agreed to appear on the next season of ITV's I'm a Celebrity... Get Me Out of Here!, external Coleen Rooney will reportedly earn more than £1.5m for her stay in the jungle - the biggest deal in the show's history. The Sunday Express says cuts could see hundreds of violent criminals freed on bail, external because of a lack of part time judges. "Rapists and thugs to get bail", reads its headline. The paper says a reduction of court sitting days could force judges to consider extending custody time limits - the maximum six-month period where defendants charged with serious crimes can be legally detained while awaiting trial. A ministry of justice spokesman says the government is committed to bearing down on the Crown Courts backlog.

  The Mail On Sunday claims that Scotland Yard was forced to breach protocols and give the pop star, Taylor Swift, blue light escorts, external to her Wembley shows earlier this year. Its report says the Attorney General, Lord Hermer, was asked to intervene after the Met resisted the idea of providing that level of security - usually reserved for royals and top level politicians. The paper says the report puts more pressure on the Home Secretary, Yvette Cooper - who is already facing questions about her role in the decision - but adds it is not clear who from the government asked Lord Hermer to get involved. The attorney general's office tells the Sunday Times that the operational decision on security for Swift was solely one for the police. "Starmer steps into cabinet row to rescue global summit" reads the Observer's headline. The paper focuses on what it describes as the "explosive row" after the Transport Secretary, Louise Haigh, branded P&O Ferries, external "a rogue operator". The comments threatened to overshadow Sir Keir's upcoming investment summit in London, when the owner of P&O reportedly pulled out of the event. The report says company representatives will now attend, and the prime minister and Haigh have "spoken and made up" after he appeared to rebuke her. The Sunday Mirror's front page focuses on a defiant plea from Sir Keir, as he marked his first 100 days as prime minister. He has urged the country to judge him on how his government fixes Britain, external. The report includes quotes from Sir Keir, who insists he is "just getting started". The Sunday Telegraph claims that the Energy Secretary, Ed Miliband, is wasting money on new electricity pylons, external to meet net zero targets, even though underground cables can be cheaper. The paper leads on a report by the National Energy System Operator, which examined a project in East Anglia. A Department for Energy Security and Net Zero spokesman tells the paper that underground cabling is more expensive and costs are borne by the bill payer.

