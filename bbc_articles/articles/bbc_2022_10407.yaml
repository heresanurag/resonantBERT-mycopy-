title: Chrissy Teigen and John Legend announce pregnancy - BBC News
date: '2022-08-04'
section: Entertainment & Arts
url: http://www.bbc.co.uk/news/entertainment-arts-62416789
content: |-
  The US model says she and John Legend are expecting a baby, nearly two years after a stillbirth.

  Chrissy Teigen and husband John Legend have spoken publicly about their fertility issues

  Chrissy Teigen has announced that she is expecting a child with her husband, John Legend, almost two years after losing a baby during pregnancy.

  The US model, aged 36, shared an Instagram post showing herself visibly pregnant, saying she was feeling "hopeful and amazing".

  "Joy has filled our home and hearts again," she added.

  In September 2020, she lost a baby, whom the couple had named Jack, after suffering complications and bleeding.

  Teigen previously said that the loss was "the greatest pain I could ever imagine".

  At the time, she wrote that she and her husband were "shocked and in the kind of deep pain you only hear about, the kind of pain we've never felt before".

