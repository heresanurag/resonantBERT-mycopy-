title: Prince William plays rugby with children in Cape Town - BBC News
date: '2024-11-06'
section: General
url: http://www.bbc.co.uk/news/videos/cvg47mzm0rzo
content: |-
  The Prince of Wales is on a trip in South Africa promoting his Earthshot environmental prize.

  Footage shows him meeting young environmentalists and playing rugby with local school children in Cape Town.

  The annual Earthshot prize supports sustainable, eco-friendly projects from around the world, with five winners each receiving £1m.
