content: |-
  Police say the attack was "out of character" as the girl and dog had a "close, loving relationship".

  Family dog to be destroyed after girl, 10, killed

  Police said the girl died from serious injuries at the scene

  A family dog which killed a 10-year-old girl inside her home will be destroyed, police have said. The girl suffered serious injuries after being bitten by her dog while at home in the Malton area at about 16:15 GMT on Friday. Despite efforts by medical professionals and a member of the public who came to the family's aid, the girl died at the scene, police said. Their inquiries so far indicated the attack was "out-of-character" and that the girl and dog had "a close, loving relationship".

  North Yorkshire Police said it was "conducting detailed inquiries covering all aspects of the incident". The force said: "One of the lines of inquiry relates to the behaviour of the dog to help explain, as far as possible, why it attacked the girl.

  "All indications so far suggest it was out-of-character, with the girl and dog having a close, loving relationship." The force said "due to the circumstances of the incident, the dog will be destroyed." A post-mortem examination of the girl was due to take place later on Sunday. The girl would be "formally identified in due course" a spokesperson added. A member of the public went to help the family after the attack, before emergency services had arrived. The dog had been secured inside a car by a family member and was later seized by officers who took it to secure kennels. The force said: "Our thoughts remain with the girl's family and friends at this very distressing time. Officers are supporting the family while inquiries continue. "We also urge people not to speculate about the incident, respect the family's privacy and allow them to grieve in peace." Listen to highlights from North Yorkshire on BBC Sounds, catch up with the latest episode of Look North or tell us a story you think we should be covering here, external.
