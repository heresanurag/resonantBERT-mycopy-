  Mr Fishburn's achievements had helped inspire the next generation of gymnasts at Scarborough Gymnastics Academy, Mr Mackay said. "Joe has just been an absolute dream to work with," he added. "He sets the most amazing example to these kids. It will have motivated them." Mr Fishburn said there were "definitely" some future contenders at the academy.

