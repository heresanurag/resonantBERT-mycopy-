  Joe Fishburn, from Scarborough, says winning the show in front of his grandma made it extra special.

  New Gladiators king hails 'best moment of my life'

  Joe Fishburn, from Scarborough, was crowned Gladiators champion on Saturday

  The newly crowned champion of Gladiators has described winning the show in front of his beloved grandmother as "the best moment of my life". Joe Fishburn, a 24-year-old Team GB gymnast from Scarborough, beat Mus Dumbuya in Saturday's final to be named the ultimate male winner of series two along with gym owner Amanda Wah, who won the women's competition. Mr Fishburn, who was raised by his grandmother Christine after his mum died when he was two, had previously said he hoped his life story would give people "faith and hope when they face a challenge". "I can't tell you how amazing it feels," he said of his victory.

  The gymnast was cheered on by friends and family, including his grandmother, throughout his time on the show. "There have been so many times where I have competed abroad and she's not been able to travel," he said. "For her to see me winning, even in the first round, going through the paper and getting to see her and everybody loving her - it was genuinely the best moment of my life."

  Former Gladiators contestant Roddy Mackay (left) coached Mr Fishburn (right) before the competition

  Mr Fishburn said seeing his family "come together" had been his highlight from the Gladiators 2025 experience. "It was really incredible to have an occasion, not necessarily a sad one, where everyone can get behind you and get together," he explained. "Family is incredibly important to me." Ahead of taking on the Gladiators challenge, Mr Fishburn trained at Scarborough Gymnastics Academy. He devised a programme specific to the show under his coach Roddy Mackay, a former contestant in the original TV series. Mr Mackay said Mr Fishburn's victory was "amazing - I knew he could win it". "His gymnastic abilities and his rugby abilities are just the perfect match for Gladiators," he said.

