title: Carlisle man arrested for 'racially abusing' Wigan Athletic player - BBC News
date: '2024-11-03'
section: England
url: http://www.bbc.co.uk/news/articles/cp351ypzl30o
content: |-
  The man is arrested on suspicion of racially abusing a Wigan Athletic player at Brunton Park.

  A man has been arrested on suspicion of racially abusing a footballer.

  Cumbria Police said a 37-year-old man was arrested after Carlisle United's 2-0 defeat to Wigan Athletic, in the first round of the FA Cup at Brunton Park.

  The man, from Carlisle, was held on suspicion of a racially aggravated public order offence towards a Wigan Athletic player during Saturday's match, the force said.

  It added he remained in custody.
