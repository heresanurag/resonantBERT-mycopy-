title: Global reaction to pub's Nottingham Forest free beer 'own goal' - BBC News
date: '2025-02-04'
section: Nottinghamshire
url: http://www.bbc.co.uk/news/articles/c74e7qdzk53o
content: |-
  Beccy Webster admitted the promotion had seen her give away nearly 300 pints, costing up to £1,500.

  Beccy Webster said many of the worldwide messages were "to see if we were still in business"

  A pub landlady has said there has been a global response to the story of her offering a free pint every time Nottingham Forest scored - only for them to win 7-0. Beccy Webster, who runs the Gedling Inn in Nottinghamshire, admitted Nottingham Forest's victory over Brighton on Saturday led to her giving away nearly 300 pints at a cost of up to £1,500. She said she had messages from as far afield as Australia, the US, Brazil and Poland - as well as numerous media interviews - "mostly seeing if we were still in business". She added: "It's been overwhelming - but it's been lovely to have something good come from what looks like a loss."

  This video can not be played To play this video you need to enable JavaScript in your browser.

  The venue in Main Street had only publicised the offer 45 minutes before the match got under way. Miss Webster expected the Reds to score "two or three" and had been upstairs feeding her baby when the goals started to go in. She said: "It was as I was coming down the stairs the third went in and I began to wonder if I had made a mistake." But she decided to stick by the deal despite her partner suggesting they call it off. "I said we had to carry it through and stick to our word and we have to back Forest all the way," Miss Webster added.

  A suggestion to cancel the offer at half-time was rejected by the landlady

  She said she did not think about how much it was costing as "everyone was having such a good time". "I haven't added up the total because I'm still in shock," Miss Webster joked. "But I would say over £1,000, maybe close to £1,500, but I'm hoping to get some help from the brewery. "It would be nice if [club owner] Evangelos Marinakis could cover the bill - but actually if he came to visit we would give him a free pint, he is doing such a great job." With Nottingham Forest having such a good season and sitting third in the Premier League, Miss Webster said staff had to make decision on how to mark upcoming games. She added: "We will definitely do offers and deals for future matches but I'm not sure it will be free pints for goals. "Maybe, maybe not, watch this space." Forest's 7-0 victory over Brighton came just a week after the Reds fell to a 5-0 defeat away at Bournemouth.

