content: |-
  At least seven people have died and 30 are in hospital following a roof collapse in a church in Ciudad Madero.

  At least seven people have died and 30 are in hospital following a roof collapse in a church in Ciudad Madero, Mexico.

  The roof collapsed at around 15:20 local time (21:20 GMT) on 1 October, while 100 people were at a mass inside.

  The bishop of the diocese of Tampico, José Armando Álvarez Cano, said they were working hard "to find those under the rubble".
