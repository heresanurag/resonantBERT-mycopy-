title: 'England v Greece Nations League: Four inexperienced players ''auditioning''
  for Thomas Tuchel - BBC Sport'
date: '2024-11-13'
section: England Men
url: http://www.bbc.co.uk/sport/football/articles/cpvzdlkrl77o
content: |-
  BBC Sport takes a look at the players interim boss Lee Carsley has fast-tracked into the England squad after nine withdrawals.

  This video can not be played To play this video you need to enable JavaScript in your browser. A pinch me moment - Morgan Rogers on England call up

  A flurry of withdrawals from senior players has hit interim England manager Lee Carsley's plans for his final two games in charge this week. Experienced internationals Declan Rice, Bukayo Saka, Trent Alexander-Arnold, Phil Foden and Jack Grealish - plus Cole Palmer, Levi Colwill, Aaron Ramsdale and late replacement Jarrad Branthwaite - are the nine players to have pulled out, many citing injury. Captain Harry Kane questioned whether the fact that it was the third international break of a busy season had been "taken advantage of a little bit" and said he was unhappy about the number of players missing. "I don't really like it if I'm totally honest. I think England comes before anything, any club situation," he told ITV Sport. Some reports have mentioned pressure from clubs for the amount of drop-outs, with Manchester City manager Pep Guardiola critical of Grealish's initial call-up for Nations League games against Greece and the Republic of Ireland. And for players and fans, these two games represent a strange 'limbo' period before new head coach Thomas Tuchel takes over in January. The replacements called up by Carsley, including Aston Villa's Morgan Rogers, 22, and Liverpool's Jarell Quansah, 21 have taken the squad's average age down to just over 25 years. The squad also features six uncapped players. England's Euro 2024 squad under former manager Gareth Southgate had an average age of 26.1 years, which was already the third youngest at the tournament behind Turkey (25.8) and the Czech Republic (25.3). Carsley said he would put "his own stamp" on the England squad during his time as interim boss and "freshen it up" with each get-together. He has certainly done that. He has again turned to 'England pathway' players he knows well from his time as Under-21 manager, and even with Palmer and Colwill dropping out, there are still eight players from his Euro 2023 squad which beat Spain 1-0 in the final. However, this is one of the least experienced squads in recent history, with Harry Kane (101) and Kyle Walker (91) making up almost half of the 400 caps across the entire squad. England's high-profile withdrawals have 240 caps between them. England need to win these two matches to earn automatic promotion back to the top level of the Nations League and ensure Tuchel's first game is not a Nations League play-off rather than the World Cup qualifier he says he has planned for. Tuchel will not be in Greece and Carsley said the German has had no influence over the squad selection for this match - and that "he is highly respectful" of the job that Carsley and his staff are doing. Ultimately, Carsley's lasting impact could be fast-tracking the next generation of England stars quicker than expected. It all makes for an interesting 'audition' for some players in this squad.

  A player who has perhaps one of the biggest chances to impress is Aston Villa forward Morgan Rogers. The 22-year-old has scored three goals and provided two assists in 11 games for his club side and the calls from outside the set-up for him to be included have probably been some of the loudest in recent weeks. Rogers says he is ready to step up before the "clean slate" when Tuchel takes over. "I just try and push myself every day and see what new levels I can reach. I have probably surprised myself a bit at times this season in how well I have done," Rogers said. "I have always believed in myself that I can get to this level and maintain it." Rogers plays in an area of the pitch where England have a lot of depth - but with Foden, Palmer, Grealish and Saka all out, the forward could have a great chance to show what he can do in a hostile environment against opponents that took England apart in September.

