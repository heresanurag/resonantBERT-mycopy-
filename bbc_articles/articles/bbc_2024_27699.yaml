  Could Curtis Jones (left) finally be in line for his first England cap?

  It feels like Liverpool midfielder Curtis Jones has been around the England set-up for a while and it is pretty incredible that the 23-year-old with almost 150 Liverpool appearances is yet to make his debut for the Three Lions. Jones was named in the pre-Euro squad in June last year but did not make the cut and has been called up to the senior squad when there have been pull-outs in the past. Carsley said Jones is "one of the best he's worked with in terms of ability" and he could benefit from the absences of Kobbie Mainoo and Rice. England have sometimes struggled to dominate possession against the bigger nations in major tournaments and Jones' performances for Liverpool may be enough for Tuchel to think he's someone who can help get them over the line. Jones told BBC Radio 5 live his call-up was "huge" and the "perfect time" given his club form. "It's been a thing now which I have said for a while, I am not a young lad anymore," he added. "You know I have had the experience of Champions League games and Premier League games."

  Lewis Hall started his career at Chelsea and made his Blues debut under incoming England boss Tuchel

  England have had a problem filling the left-back position for a long time. Southgate's gamble on Luke Shaw's fitness for the Euros - and having to use the right-footed Kieran Trippier instead - was one of the biggest talking points for fans. Ben Chilwell has been frozen out at Chelsea and would need a move in January and some regular football before he can be considered again, although a positive for the full-back is that he won the 2020-21 Champions League under the incoming Tuchel. Hall is only 20 but is excelling for Newcastle United, playing all 11 Premier League games this season - and was actually given his Chelsea debut by Tuchel as a 17-year-old. "I am not sure if that means anything now, especially as I feel my game is completely different to how it was back then," said Hall. "He was a good person to me, he gave me my debut and without that, it wouldn't have given me the confidence I got when I was younger. "I had a bit of feeling [about being called up] purely because of the lack of out-and-out left-backs that there are in the squad."

  Lille midfielder Angel Gomes is very much a Carsley pick. He was one of the major reasons that the Under-21s won the Euros last summer. However, it will be interesting to see if Tuchel sees the midfielder in his plans going forward. Carsley said that Gomes controls games with his technique rather than his physicality and with Tuchel favouring football which can at times be described as pragmatic, it could be that Gomes is one who has more work to do than others to impress the new manager.

