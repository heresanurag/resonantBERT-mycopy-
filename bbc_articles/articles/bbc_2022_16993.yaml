  Wout Weghorst is your star player as the Netherlands lose a dramatic penalty shootout to Argentina in the World Cup quarter-finals in Qatar.

  Last updated on .From the section World Cup

  The Netherlands are out of the World Cup after a dramatic defeat on penalties by Argentina in the quarter-finals, but one of their players stood out above the rest.

  Wout Weghorst was named player of the match by BBC Sport readers with the forward scoring twice as a substitute to receive an average rating of 7.99.

  The next highest-rated player was Lionel Messi, who set up Argentina's opening goal and scored their second from the penalty spot.
