title: Margot Robbie unable to speak at Saltburn premiere - BBC News
date: '2023-11-15'
section: General
url: http://www.bbc.co.uk/news/entertainment-arts-67430193
content: |-
  The actress and producer lost her voice before her first red carpet since the end of the actors' strike.

  Margot Robbie was unable to sing the praises of her latest movie, Saltburn, because she lost her voice before its premiere in Los Angeles.

  The actress does not appear in Saltburn, but is one of the film's producers.

  Luckily director Emerald Fennell and members of the cast were on hand to do the talking for her.

  It was one of the first major premieres since US actors' union the Screen Actors Guild ended its four-month strike.
