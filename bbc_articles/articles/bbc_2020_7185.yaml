content: |-
  Bringing you the latest news from across England about the coronavirus pandemic.

  Londoners were three time more likely to die from coronavirus than those in the south-west of England, a study has found.

  Up to 8 May there were 7,369 deaths linked to coronavirus in London, according to Public Health England.

  When taking into account the usual mortality rate and age of the two areas this was 3.7 times more than the least affected region - the south-west, which saw 2,187 deaths over the same period.

  The study found 9,035 excess deaths in London over the same period. Or to put it another way, nearly 10,000 more Londoners have died this year than you would expect - coronavirus is directly linked to 81.7% of these, but not all.
