title: 'Tom Daley: The boy with the Olympic dream that came true - BBC Sport'
date: '2021-07-27'
section: Olympics
url: http://www.bbc.co.uk/sport/olympics/57968119
content: |-
  The 'baby' of Beijing became a father, a husband and an LGBTQ+ spokesperson. And now Tom Daley is an Olympic gold medallist. This is his story.

  Tom Daley in tears on top of the Olympic podium after achieving his ultimate goal.

  The young boy facing the camera spoke with a smile, but everyone could see the steeliness in his eyes. "I want to get to the Olympics and win a gold medal," Tom Daley told the BBC in 2005. He was holding a picture he'd made - a drawing of himself doing a handstand on the 10m diving platform at the London Games, then still seven years away. "If I wasn't to win, it would drive me on to be at the next Olympics and get that medal then." Daley was just 11 when he stated that mission. Sixteen years later and his dream was finally achieved. He and Matty Lee secured a historic synchronised 10m platform Olympic title at Tokyo 2020. During the medal ceremony tears poured from his eyes at the enormity of it all. And what a journey it has been. This is the story of Tom Daley's path to gold medal glory.

