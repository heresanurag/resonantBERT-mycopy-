  This achievement in Tokyo and others - including becoming world champion at 15 and twice winning Olympic bronze - owe much to a remarkable resolve that's also helped him overcome struggles away from the pool. Growing up, he was bullied at school. In 2011, his father died at the age of 40. He feared the consequences of revealing his sexuality before coming out in 2013. Daley is Britain's most decorated diver, but he possesses a level of fame that far transcends his discipline. He has become one of sport's highest-profile gay athletes, a role model for others in the LGBTQ+ community. He has suffered several media run-ins during the course of a life lived under the spotlight. Now aged 27 and a father himself, he says he finds it "crazy" to see how "focused and obsessed" he was as a child. "If my son was talking like that at the same age, I'd be like 'wow, calm down, take your time, enjoy it,'" he told BBC Sport. "But clearly there was just something in me that wanted it so much." Tokyo - his fourth Olympics - arguably represented his last realistic chance to claim it. While that same dream drove him today, parenthood and his partner helped give him a new perspective, on both triumph and trauma. "I thought I was going to win an Olympic gold medal in Rio, and that turned out the complete opposite by a long shot," recalls the diver. "It felt like the end of the world. "Now my world and structure is my family and it was my husband who said to me that my story wasn't finished. "Although we didn't know it at the time, my son (Robbie) needed to see me win an Olympic gold and the fact that I can say that my son watched me become Olympic champion - albeit on TV as they couldn't be here - is such a great feeling."

  This video can not be played To play this video you need to enable JavaScript in your browser. The Making of Tom Daley - from childhood star to father & husband

  Daley has always lived and breathed for the Olympics. He vividly recalls the efforts he went to, as an 11-year-old, to watch the men's synchronised 10m platform final during Athens 2004, when Leon Taylor and Pete Waterfield won silver for Britain. "We were on holiday in our caravan and everyone was going to the kids' clubs but I was determined to stay in and watch the diving so I was leaning out of the window with the aerial to try to get a better signal," he recalls while laughing. Four years later, Daley was already gaining more attention than his "idols" ever had. He had qualified for Beijing 2008, aged 13, and cameras were trained on his every move. He didn't challenge for medals in China, but the crowd loved watching the young teenager - cheering on 'baby Daley' throughout the event. A star was born. But back home, it wasn't all easy. "Some people at my school were so happy for me, but others started being really horrible and I was bullied," he says. "For a long time, I just kept quiet about it, but I bottled up so much that eventually I just couldn't train and it drained me so much mentally until I had nothing left. "It got to a point where I was always embarrassed to talk about diving and I couldn't take a compliment, because whenever someone said something nice, I had this fear I was going to be mocked." It left Daley wanting to be home schooled. Instead he was offered the chance to join Plymouth College towards the end of his first year of GCSEs, a month before the 2009 World Championships. In Rome, the revitalised 15-year-old graduated from medal contender to fully grown champion. While his landmark performance in the 10m platform was striking, what happened in the hour after was perhaps even more memorable. Daley rolls his eyes, but also smiles, when recalling the now infamous press conference.

  Daley's 2009 World championship gold medal-winning post-event press conference was interrupted by his father Rob.

  "I remember seeing my dad sneak in with a BBC journalist and he had this beaming smile," he recalls. "He put his hand up and said: 'I'm Rob, Tom's dad, and I want a cuddle.' I remember thinking: 'Oh my god...'" In the footage, Daley can be heard muttering "dad, this is so embarrassing" as he gingerly makes his way around the media scrum to his father - and another hoard of cameras. "I remember him saying: 'Tom I took you to all of your training sessions, taught you to ride a bike, I changed your nappies when you were a kid.' He said it was the proudest moment of his life to see his son become world champion. "When I look back, it was a very special moment as we'd achieved it together, and now as a father myself, I completely understand why he was so emotional." What few knew then was that Rob had been diagnosed with a brain tumour in 2006 and he appreciated not only how special these moments were, but also how precious time with his son was.

  Months after Daley's success, the family learned that despite having surgery to remove 80% of the tumour three years earlier, Rob was no longer in remission. On Friday 27 May 2011, exactly 14 months before the London 2012 Olympics began, Rob died peacefully with his family by his side. "In a way, if he hadn't had that brain tumour, we perhaps wouldn't have been as close. We developed this great connection," says Daley. "The heartbreaking thing is that the last few days, all he was asking me about were: 'Have we got tickets for London 2012 yet? Did we win the ballots, are we able to get in?' "He was so excited about being able to see me compete and it's surreal to think of all the things he's missed." Grief impacts people in different ways and looking back now, more than a decade on, Daley believes he "didn't handle it in the healthiest of ways" at the time. "My dad died on a Friday and I was at training on the Saturday morning, and then the funeral was on a Wednesday. I left the wake halfway through to travel and go compete at the national championships," he says with a shake of the head. "Now looking back on it as an older athlete, there are more important things to life than diving, but then I knew the London Olympics was this big thing that my dad and I had always dreamed of, and there was all the motivation in the world to go be on the podium in 2012." After the loss of his father, Daley took on new responsibility as the "man of the house" and helped his mum, Debbie, by driving his younger brothers to school and their rugby training.

  Heading into his home Games, there were constant media questions about his state of mind. Comments made by British Diving's performance director added further pressure. Alexei Evangulov demanded he lose weight and also publicly criticised the diver by suggesting he might become 'Britain's Anna Kournikova' - referencing the Russian former tennis player turned model whose sporting career was said to have been damaged by media distraction. Despite "so much pressure", Daley delivered a brilliant bronze, which effectively saved his sport by securing the squad funding for the four years leading into Rio 2016. "Looking back I sometimes wonder: 'Was that my time? Could it have been gold?' But there are so few people who get to become an Olympian, let alone an Olympic medallist, and to have won a bronze in front of a home crowd, I have to be proud," he says.

  Daley won bronze at 2012 Olympics and celebrated with fans at the Team GB parade in London

  Daley paid tribute to his father in his post-event interviews, but only finally allowed himself to fully grieve in the months following. "It all hit me after the Olympics. There was this massive crash," he says. "I didn't know what I wanted to do with my life any more, as London 2012 was all I'd had in my book - and for a few months I actually quit diving." At this time, Daley was seeing a therapist in an attempt to overcome the "terror" he was experiencing when performing his 'twister' dive. A real fear had developed since camera flashes forced him to request a re-dive while performing the routine in the Olympic final. He was also plagued by a persistent triceps injury tear, frustrated by 'fake news' stories in the press about his purchasing habits and was aware that certain people were keen to 'out' him at a time when he was still processing thoughts about his sexuality. Aged 19, Daley returned to compete at the 2013 World Championships in Barcelona, re-tore his triceps, finished sixth and then took a trip to Los Angeles. It changed his life.

  Daley with his son Robbie and husband Dustin Lance Black - they were married in 2017

  "The difficult thing I found growing up was that there are so many conflicting thoughts and feelings, and I had to live all of that out in the public eye," he says. "Figuring out your sexuality is quite difficult in any way, let alone doing it under constant scrutiny and people asking constant questions and trying to figure out things."

  Daley met his now husband, the Oscar-winning screenwriter and producer Dustin Lance Black, while in the United States. A "huge weight" was soon lifted off his shoulders. "Meeting Lance and then coming out in 2013 changed everything," he says. "It allowed me to stop worrying, stop being scared and to just be me." Following a move to London, and with Jane Figueiredo as his new coach, the medals began to flow once more. A third career Commonwealth gold at Glasgow 2014 was followed by a team title as well as individual bronze at the 2015 Worlds. In 2016, Daley entered what he felt would be his "peak Olympics" in Rio as one of the gold medal favourites. He warmed up for his individual event with an impressive bronze alongside new synchronised 10m partner Dan Goodfellow. Before he competed again, team-mates Jack Laugher and Chris Mears made history by becoming Britain's first-ever Olympic diving champions - with Laugher also adding an individual 3m silver. "When Jack and Chris won Olympic gold medal, I was like 'OMG that is my biggest dream' so I didn't get my escape strategy right and I had no mental break from everything that was going on," Daley says. "After Jack won the silver, I was like, right this is my time now!"

  Daley had scored a personal best of 571.85 in the preliminary round of the 10m platform but could only manage a score of 403.25 in the Rio 2016 semi-final

  Despite setting a new Olympic record total of 571.85 in the preliminaries, later that day the diving world was left stunned as Daley failed to reach a major final for the first time in his career. Five years on, he's still unable to explain exactly what happened. "My nervous system, erm, my mind and body connect wasn't, erm, there," Daley says, uncharacteristically flustered as he watches back footage from the event for the first time. "I've kind of blanked this out and there's still no sense in it. Sometimes I think maybe I should have stayed in the ice bath longer, or had a recovery drink at a different time, but sometimes you just have to say it was a bad day." In the post-event interviews, he tearfully vowed to return for the Tokyo Games. But redemption of a sort would come far sooner - 12 months later, he delivered arguably the greatest performance of his career so far to secure a first individual world title since 2009. The following year, at the 2018 Commonwealth Games, he used the platform victory gave him to speak out on issues beyond sport.

  Inspired by his husband's activism around LGBTQ+ issues and campaigns, he called on Commonwealth countries to decriminalise homosexuality, stating that it was illegal for athletes competing in 37 of the 53 nations at the Games (70%) to be in a relationship with someone of the same sex. "We have to talk about these things and shine a light on them in order to get change," he says now.

