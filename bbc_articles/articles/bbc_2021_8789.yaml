  Daley struggled with pneumonia, concussion and a stress fracture that year. He contemplated his future in diving, but the arrival of son Robbie revitalised him. "Back in 2016, it felt like the end of the world," he says. "Now I wish I could go back and tell myself: 'You're going to get married, have a beautiful son and things are going to get much better.'" However, now 27, the daily impact of throwing his body from 10m and hitting the water at 35mph has undeniably taken its toll. Having once been the 'baby' of the team, Daley now describes himself as the "grandad". The five-time European champion has taken up mindfulness, yoga and gyrotonics in a bid to prolong his career, which has been extended by at least 12 months by the coronavirus pandemic. "I knew going into Rio that if I'd won the Olympic gold medal it would have been my last dive," states Daley, who will compete individually as well as alongside new synchronised partner Matty Lee in Tokyo. Now though he is "almost relieved" to have had five extra "bonus" years in the sport and arrived in Japan "mentally stronger" than at any point in his life.

  So, to Tokyo. Daley had long spoken about preferring to face dominant Chinese rivals in outdoor venues where the sun, wind, fluctuating crowd noises add variables to competition. The indoor spectator-less Tokyo Olympic Aquatics Centre was seen as the perfect setting for the East Asian athletes to dominate with their style which he has previously described as "almost robotic." As expected, the defending Olympic and current world champions Chen Aisen and Cao Yuan began the synchronised 10m final strongly and looked to be going clear of their rivals at the halfway stage. Daley curled his lip as the scoreboard revealed the situation. They had been good, but not good enough for gold. He and Lee shared a brief look and nodded. They knew they had more to give. A brilliant dive followed in the fourth round and the British pair edged to within a point of their rivals with their penultimate routine. Daley and Lee produced their greatest dive - 101.01 - in the final round. 2004 Olympic silver medallists Leon Taylor, who mentored Daley earlier in his career, erupted with excitement on commentary, calling the gold for Britain - before pausing and realising that while a high three-digit score was improbable, it wasn't impossible from the Chinese. Daley was nervous. The traditionally measured, calm and 'in control' diver had disappeared and, in his place, stood a man with little composure who was fidgeting. He was anxious, jumping like a worried child. He'd been here before, waiting for judges to decide his fate - but this time was different. It was likely to be his last chance for gold. Moments later as the Chinese total was revealed, Daley leapt on to partner Lee and the tears began to flow. Not just from Daley though, but most of his team-mates, coaches and the Team GB support staff were all wiping their eyes. "I've been diving for 20 years now and I honestly still can't believe what's happened," he told me moments after receiving the medal he has craved since childhood. This was a victory for two British divers and a first-ever Olympic title for the nation in the synchronised 10m event. But it was also much more.

  Matty Lee and Daley handled nerves and pressure in their final two routines at Tokyo 2020 to win gold

  It was also the completion of a journey he began with his late father over two decades ago. It was also a statement about the importance of inclusion and overcoming adversity. "When I was a little boy, I felt like an outsider and different," began Daley. "I felt I was never going to be anything because who I was wasn't what society wanted me to be. "I hope that seeing LGBT people performing at the Olympic Games gives young kids belief and means they won't feel so frightened, scared and alone. "Whoever you are, no matter where you come from, you can become an Olympic champion - because I did it."

