title: 'Watch: Columbia student Mohsen Mahdawi released in Vermont - BBC News'
date: '2025-05-01'
section: General
url: http://www.bbc.co.uk/news/videos/cvgnwk39pwno
content: |-
  Mahdawi was among multiple international students and graduates detained after their involvement in the protest movement against the war in Gaza.

  A Columbia University student and Palestinian activist arrested by US Immigration and Customs Enforcement has been released from custody.

  Mohsen Mahdawi, who has a permanent US residency or "green card" status, was detained after attending an American citizenship interview in mid-April.

  Vermont District Judge Geoffrey Crawford ordered the release of Mahdawi from prison on bail, pending the court's ruling on the habeas petition challenging his detention, according to a statement by the American Civil Liberties Union (ACLU), which is part of his legal representation.
