title: 'Nick Pope''s parents: England dream ''hasn''t sunk in'' - BBC News'
date: '2018-06-12'
section: General
url: http://www.bbc.co.uk/news/uk-england-cambridgeshire-44457113
content: |-
  An England goalkeeper's parents remember him refusing to play football and hiding under the bed.

  The parents of England goalkeeper Nick Pope say their son’s England call up “hasn't sunk in”.

  The Burnley keeper, who grew up in Cambridgeshire and started as a youth player at Ipswich before moving to nearby Bury Town, is in the England squad for the World Cup.
