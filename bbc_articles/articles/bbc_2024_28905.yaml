title: Kate invites Southport families to Christmas carols - BBC News
date: '2024-11-23'
section: UK
url: http://www.bbc.co.uk/news/articles/c5y56068wr0o
content: |-
  It comes after the Prince and Princess of Wales met families of those killed in the attack.

  The Princess of Wales has invited families affected by the Southport attacks to her annual Christmas carol service, Kensington Palace has said. The fourth Together At Christmas service will take place at Westminster Abbey on 6 December. The event will come at the end of a year during which Catherine has had to largely withdraw from public duties following her cancer diagnosis. Last month, she visited Southport with the Prince of Wales where they held a private meeting with the bereaved families of three children killed in the knife attack in July, in what was her first official public engagement since she finished chemotherapy treatment.

  At the time, royal sources said she decided to join Prince William to show her "support, empathy and compassion to the local community".

  The Prince and Princess of Wales visited Southport in October

  Bebe King, 6, Elsie Dot Stancombe, 7, and Alice Dasilva Aguiar, 9, were killed on 29 July, 2024, in the attack at a children's dance group. The royal couple talked to the families of the three children before passing on the families' thanks to emergency responders. Earlier this month, the princess, 42, joined the King and other senior royals at Remembrance events in London.

  The Prince and Princess of Wales and their children pictured at last year's carol service at Westminster Abbey

  The carol service is supported by the Royal Foundation, the charity which supports the work of the prince and princess. It will be attended by members of the Royal Family along with around 1,600 invited guests, among them people who have worked to support others, through their work or by volunteering. Those being honoured have been nominated by charities associated with the Royal Family or by lord lieutenants, who represent the King in counties around the country. The event will also hear musical performances from stars including Paloma Faith, Olivia Dean, and Gregory Porter. It will be broadcast on ITV1 as part of a special programme on Christmas Eve. Fifteen Together At Christmas services will take place around the country, including at the Royal Cornwall Hospital in Truro and Blackpool Tower Circus. Kensington Palace said the service would provide "a moment to reflect upon the importance of love and empathy, and how much we need each other, especially in the most difficult times of our lives". It said the princess wanted to "celebrate the many people supporting those in need - individuals who have inspired, counselled, comforted, and above all else shown that love is the greatest gift we can receive".
