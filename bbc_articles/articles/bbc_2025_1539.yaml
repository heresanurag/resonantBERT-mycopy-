content: |-
  Manchester United sign Denmark defender Patrick Dorgu from Lecce on a five-and-a-half-year deal.

  Patrick Dorgu is the second defender to join Manchester United in the January transfer window

  Manchester United have signed Denmark defender Patrick Dorgu from Lecce on a five-and-a-half-year deal. The deal for the 20-year-old is worth £25m (30m euros), with a potential £4.1m (5m euros) in add-ons. Dorgu has made 57 appearances for Lecce since his senior debut at the start of last season, having joined the Serie A club at youth level in 2022. "I am incredibly proud to be able to call myself a Manchester United player - this is a very special day for my whole family," said Dorgu. "I cannot wait to work with Ruben Amorim. His vision for this team and the future of the club is incredibly exciting. There is a clear plan set out for my development, and I feel that Manchester United is the perfect place to fulfil my potential and complete my huge ambitions." Talks over a loan move for United's Dutch full-back Tyrell Malacia, 25, to join Portuguese club Benfica have broken down. Meanwhile, Red Devils striker Marcus Rashford is scheduled to have a medical at Aston Villa before completing a loan move to the Midlands club. Rashford has not featured for United since being dropped by head coach Ruben Amorim for the Manchester derby on 12 December.

  Patrick Dorgu and Ayden Heaven were introduced to United fans before Sunday's game against Crystal Palace

  Dorgu is the second defender to arrive at Old Trafford this transfer window, following England Under-19s international Ayden Heaven's move from Arsenal. After progressing through the Denmark youth sides Dorgu made his senior debut as a late substitute against Switzerland in the Nations League in September, scoring with his first touch in a 2-0 win. Technical director Jason Wilcox said: "Patrick is a really exciting talent. His strong defensive and attacking attributes, adaptability and work-rate will make him a key part of Ruben Amorim's squad. "Patrick has had a superb start to his career, and at the age of just 20 we know he will continue to develop under the guidance of our excellent coaching team."
