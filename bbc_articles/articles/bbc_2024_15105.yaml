content: |-
  Justice Murray said the security guard pursued an unhealthy sexual obsession with the TV presenter.

  A security guard has been jailed for life with a minimum term of 15 years and 85 days after hatching plans to kidnap, rape and murder TV presenter Holly Willoughby.

  Chelmsford Crown Court was told Gavin Plumb's plot had a "catastrophic" and "life-changing" impact on the former This Morning presenter.

  Plumb was unanimously convicted of soliciting murder and inciting rape and kidnap following a trial at the same court.

  In sentencing, Mr Justice Edward Murray said Plumb had pursued an unhealthy sexual obsession with Holly Willoughby over a number of years.
