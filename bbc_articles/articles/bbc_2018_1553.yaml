  East Midlands Ambulance Service said that crews from the West Midlands and Yorkshire had responded to other 999 calls near the border while it dealt with the incident in Leicester.

  Emergency services say a "search and rescue" operation is under way

  Did you witness what appears to be a big explosion in the Hinckley Road area of Leicester? You must stay safe when you send any pictures to: haveyoursay@bbc.co.uk.

