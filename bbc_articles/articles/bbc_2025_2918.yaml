title: Pelvic mesh victims still waiting for compensation a year on - BBC News
date: '2025-02-07'
section: Health
url: http://www.bbc.co.uk/news/articles/c75z9w592d4o
content: |-
  A year after a major report called for urgent action, no scheme has been put in place to help victims.

  Mesh victims still wait for financial compensation

  More than 100,000 women are believed to have had mesh implants fitted between 2007 and 2015

  Women harmed by pelvic mesh implants are still waiting for government compensation a year after a major report, external called for urgent action. Patient safety commissioner Dr Henrietta Hughes, who made that recommendation, called it "an injustice" for the thousands of lives destroyed. Some women were left in permanent pain, unable to walk, work or have sex, after the surgery to treat incontinence and pelvic organ prolapse. The government says it remains "fully focused" on how best to support patients and prevent harm.

  A Department of Health and Social Care official said: "Our sympathies are with those affected. "This is a complex area of work and Health Minister Baroness Gillian Merron met with some of those affected before Christmas, and has committed to providing an update to the patient safety commissioner at the earliest opportunity."

  Dr Hughes said: "It is very disappointing that women who have suffered so much harm are still waiting for redress. "They need redress now and the government must act immediately." Pelvic mesh was considered the gold-standard treatment for incontinence and prolapse in women for many years, to give weak or damaged tissue extra support. But the net-like implant can erode and harden, cutting through tissue and causing serious pain. The Hughes report also called on government to act quickly to help victims of another treatment scandal, involving an epilepsy medication. If taken during pregnancy, sodium valproate can cause major birth defects - but for decades, women were not properly warned about the risks. An estimated 20,000 children were exposed to the drug in the womb, which can lead to birth defects, and learning and behaviour problems.

  Joanne Cozens, who took sodium valproate during pregnancy, worries about how she will look after her son

  Joanne Cozens, whose son Thomas has Asperger's syndrome, said she was not properly informed of the dangers before she became pregnant. She is one of many parents awaiting compensation and told BBC News: "Families have been struggling for decades now.

  Dr Hughes has recommended initial payments of £100,000 for sodium-valproate victims and £20,000 for women injured by mesh, followed by further payments for some, as well as some non-financial assistance to victims and their families. Some women have already received undisclosed payouts from three mesh manufacturers, Bard, Boston Scientific and Johnson & Johnson.

