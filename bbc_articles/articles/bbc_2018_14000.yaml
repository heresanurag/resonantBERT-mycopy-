title: BBC caller asks Theresa May for honest referendum answer - BBC News
date: '2018-11-24'
section: General
url: http://www.bbc.co.uk/news/uk-politics-46319276
content: |-
  Prime Minister Theresa May was asked whether the UK would have been better off staying in the EU.

  Prime Minister Theresa May takes calls on the BBC News Channel and BBC Radio 5 Live in a special programme presented by Emma Barnett.

  Michael asked her: "What in your honest opinion is better for the UK, your deal or the deal we had if we stayed in the EU?".
