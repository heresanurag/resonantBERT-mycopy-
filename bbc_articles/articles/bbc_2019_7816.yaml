id: bbc_2019_7816
title: Police hunt two men after gas released on Tube at Oxford Circus - BBC News
date: '2019-07-21'
section: London
url: http://www.bbc.co.uk/news/uk-england-london-49056474
content: |-
  Passengers were left coughing and short of breath following exposure on the morning Tube train.

  Police have released images of two people they want to speak to

  Police are looking for two men after suspected CS gas was released during a fight on a London Underground train.

  It happened at 09:13 BST on board a Victoria line Tube train at Oxford Circus in central London.

  British Transport Police (BTP) said a number of people were treated at the scene by paramedics for coughing and shortness of breath.

  The force has appealed for witnesses and released CCTV images of the two men they would like to speak to.

  BTP added that other than the symptoms shown by the passengers, there were "no further concerns for their health".

