title: 'Fred Stolle dies at 86: Tributes to Australian tennis great - BBC Sport'
date: '2025-03-06'
section: Tennis
url: http://www.bbc.co.uk/sport/tennis/articles/c984lg8mdgmo
content: |-
  Australian tennis great Fred Stolle, who won two Grand Slam singles titles and 17 doubles titles, dies at the age of 86.

  Fred Stolle lost his first five Grand Slam finals

  Australian tennis great Fred Stolle, who won two Grand Slam singles titles in the 1960s, has died at the age of 86. Stolle won the French Open in 1965, the US Open in 1966 and reached the final in six other Grand Slams, including three at Wimbledon. He also won 10 Grand Slam men's doubles titles and seven mixed doubles. Tennis Australia said the sport had lost "one of its great players and characters". "When we speak about Australia's golden era and the progression from amateur to professionalism, Stolle's name is right up there with the best," said CEO Craig Tiley.

  "His legacy is one of excellence, dedication, and a profound love for tennis. "His impact on the sport will be remembered and cherished by all who had the privilege to witness his contributions." Stolle was among the Australians - along with Roy Emerson, Rod Laver, Ken Rosewall and John Newcombe - who dominated the men's game late in the amateur era and start of the professional. Stolle, who described playing for Australia as "everything to me", helped them win the Davis Cup in 1964, 1965 and 1966. After retiring he became a coach and then commentator. Laver, the only man to win all four majors in one year during the Open era, described Stolle as "too nice a guy to hold a grudge". "It took the best to beat the best," he said on X. "We never tired of reliving the past as we travelled the world looking into the future with an enduring love of the sport." Former Australian doubles player Paul McNamee said: "What a player, what a commentator, what a bloke." "One of that great group of Aussie tennis players who made history, and whose legacy is perhaps unrivalled."
