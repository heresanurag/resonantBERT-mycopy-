title: 'Paris Olympics 2024: Canada football drone scandal - Bev Priestman ''heartbroken
  for players'' - BBC Sport'
date: '2024-07-28'
section: Olympic Games
url: http://www.bbc.co.uk/sport/olympics/articles/cgr5l127ye2o
content: |-
  Canada's women's head coach Bev Priestman says she is "absolutely heartbroken for the players" over a drone scandal, as Canada's government withholds funding.

  Canada head coach Bev Priestman stepped down from her Olympic duties before being banned for 12 months by Fifa

  Canada women's football head coach Bev Priestman says she is "absolutely heartbroken for the players" after a drone scandal left the Olympic champions' title defence in jeopardy. The team have been docked six points at Paris 2024 and Priestman received a one-year football ban from world governing body Fifa. Canadian Soccer Association (CSA) officials Joseph Lombardi and Jasmine Mander have also been suspended from all football activities for a year. They were sanctioned after a drone was used to spy on a training session held by New Zealand, who are in Canada's group at the Paris Games. "I am absolutely heartbroken for the players, and I would like to apologise from the bottom of my heart for the impact this situation has had on all of them," said Priestman in a statement on Sunday. "I know how hard they have worked following a very difficult year in 2023, and that they are a group of people who care very much about sportsmanship and integrity." The English-born coach, referencing an ongoing CSA investigation, said: "As the leader of the team on the field, I want to take accountability, and I plan to fully co-operate with the investigation." She also urged the Canadian public to continue to support the players.

  Earlier on Sunday, Canada's government said it will withhold funding for the women's football officials who were banned by Fifa. Carla Qualtrough, the country's sports minister, said the move to send a drone to monitor New Zealand's training session was "cheating". She described the issue as "deeply regrettable" and said it was causing "significant distraction and embarrassment for Team Canada and all Canadians". "It is completely unfair to Canadian players and to opposing teams. It undermines the integrity of the game itself," Qualtrough added. "Given that the women's programme receives funding from Sport Canada, we are withholding funding relating to suspended Canada Soccer officials for the duration of their Fifa sanction." Sport Canada is the government-led body that helps to fund elite level national organisations. Canadian Olympic Committee chief executive David Shoemaker said on Friday there appeared to be "information that could tarnish" the team's women's football gold medal from the Tokyo Games. It followed Canadian media reports that drones had been used at previous tournaments. Qualtrough added: "There is a deeply concerning pattern of behaviour at Canada Soccer. "We must, and will, get to the bottom of this. The government of Canada will closely monitor the investigation and outcomes of the Canada Soccer process that is under way. "The Future of Sport in Canada Commission is also under way which will make recommendations to the government on improvements to the Canadian sport system." However, Priestman said in her statement the "winning of the gold medal was earned through sheer grit and determination, despite reports to the contrary". Canada, led by assistant coach Andy Spence in Priestman's absence, have beaten New Zealand and hosts France in their opening two games in Group A. A 2-1 win against France on Sunday evening means they sit third in the group table on zero points but victory over Colombia in their final group game would secure qualification for the quarter-finals. Vanessa Gilles scored the winner 12 minutes into second-half stoppage time for Canada as they defeated the hosts in Saint-Etienne, keeping hopes of making progress alive.
