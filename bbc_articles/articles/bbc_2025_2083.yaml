title: Godstone sinkhole to be investigated with 3D maps, says council - BBC News
date: '2025-02-24'
section: Surrey
url: http://www.bbc.co.uk/news/articles/c5y0gxnnzwjo
content: |-
  Operations to look into the sinkhole have been delayed but less intrusive methods may be used.

  Godstone sinkhole to be investigated with 3D maps

  The sinkhole on Godstone's High Street may be investigated with 3D mapping

  The Godstone sinkhole will be investigated using 3D mapping technology, a council leader has said. Godstone Parish Council said an operation by Surrey Highways to investigate the two holes had had to be delayed until next week due to safety concerns. The sinkholes - which appeared last week on Godstone High Street - have caused 30 households in the area to be evacuated, although six have now returned. Tandridge District Council's leader Catherine Sayer said remote sensing called LiDAR would be used to create 3D maps instead of borehole testing.

  She said: "What I have seen is information that says the borehole testing is delayed, and they're going to use less intrusive testing methods and survey methods. "The less intrusive testing methods will be used first." One of the alternative methods that may be used is LiDar, which stands for light detection and ranging. It is a remote sensing technique which uses lasers to measure distances and create 3D maps, Ms Sayer added. The technology has been around since the 1970s when it was used in meteorology, but is now used by autonomous vehicles to sense surroundings.

  Works to investigate the sinkhole have been delayed for safety reasons

  A source from Surrey County Council, whose highways department is responsible for the investigation, said equipment would arrive on 26 February. He said: "We're waiting for some specialist equipment to arrive on site to carry out further comprehensive assessment to ensure any stability and repair work is safe and designed properly." Tandridge District Council said it would be hosting a public meeting at St Nicholas Youth Centre on Tuesday evening to address concerns from residents and business owners.

  Surrey Police said on Sunday that security measures in the area had been strengthened. A spokesperson said: "The perimeter fencing of the cordon surrounding the sinkhole has been made more secure over the weekend and the site will be staffed by Ringway 24/7 on behalf of Surrey County Council. "In addition, CCTV cameras have been installed and an overnight security guard has been provided by Tandridge District Council. "Surrey Police is supporting partners by providing advice on additional security measures that could be put in place by the local council."
