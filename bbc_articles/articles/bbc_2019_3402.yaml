id: bbc_2019_3402
title: 'Bin Laden files: CIA releases video of son Hamza''s wedding - BBC News'
date: '2019-03-01'
section: General
url: http://www.bbc.co.uk/news/world-asia-41842169
content: |-
  The footage is among files from the al-Qaeda leader's computer released by the CIA.

  Footage showing Osama bin Laden's son Hamza at his wedding is among nearly half a million files from the former al-Qaeda leader's computer to be released by the CIA.

  Previously only childhood videos of Hamza - now a senior al-Qaeda member - had been publicly seen.

  The computer was seized by US special forces in the 2011 raid on bin Laden's compound in Pakistan during which he was killed.
