content: |-
  In 2015, Xi Jinping posed for a selfie with Sergio Aguero and David Cameron, but are China still on track to meet his footballing goals?

  Ten years on, can China still meet grand football plans?

  Oscar (left) joined Shanghai Port from Chelsea for a reported £60m in January 2017

  When China's president, Xi Jinping, visited Manchester in October 2015, there followed a bizarre photo opportunity and a bold statement. The former was an image of two global leaders - Xi and then UK Prime Minister David Cameron - posing alongside Manchester City striker Sergio Aguero. The unlikely selfie went viral on social media. The latter laid out a target that seemed much more likely for a nation of 1.4 billion people - and the football world took notice. In a written interview with the news agency Reuters, President Xi said he wanted China's national team to become "one of the best in the world". Six months after Xi's visit to the UK, the Chinese government launched a strategy that aimed to make the country a "world football superpower" by 2050. In the long term, the president wanted China to host and be competitive at the men's World Cup. By 2030, he wanted China to be one of the best teams in Asia. When the strategy was announced, China were 81st in the Fifa world rankings. Today, they sit 90th - wedged between New Zealand and the Caribbean island of Curacao. China's only appearance at a men's World Cup remains at the 2002 tournament in Japan and South Korea, where they were eliminated in the group stage. Should they lose to Saudi Arabia and Australia in this month's international break, it would almost certainly end their hopes of reaching the next edition in 2026. Despite that, some of Xi's aims are already taking shape - his strategy having been set out over three stages, spanning 34 years. One of them was to get tens of millions of young people playing the sport regularly. China's community football projects have indeed been hugely upscaled, with pitches now accessible all over the country. "This absolutely kicked into high gear from 2016 - football pitches were springing up everywhere," says Dr Mike Gow - an expert in contemporary China at Edge Hill University. "You're never more than about 10 minutes' walk from either a half-size or full-size all-weather pitch. The scale of it is quite impressive."

  Xi Jinping posed for a selfie with Sergio Aguero and David Cameron when he visited the UK in 2015

  But while access has improved, adopting a football culture similar to Europe and the UK is proving more challenging. In 2018, David Sproer was working as a coach in Cologne when he was presented with an opportunity to work for the Shanghai Football Association as a youth coach in the women's game. "It felt like a gold rush," he says. "It felt like things were really taking off, and that Chinese football could make huge steps towards a brighter future." Sproer left the country, along with many other European coaches, during the Covid-19 pandemic. He says he has no regrets about his time in China, but believes parts of his experience shone a light on why the country is so dominant in Olympic sports such as gymnastics, diving and table tennis but has struggled in football, where cohesion and communication play a more important role. "Chinese kids are educated and socialised a little differently from European kids," he says. "They grow up with an understanding that there is always a right and a wrong answer. "You have to be a little bit more versatile in football than, say, diving. It's not about perfection, it's also about creativity." The growth of the game among young people has also suffered as a result of the perception of football in the country. In December 2024, former Everton midfielder Li Tie was sentenced to 20 years in prison for fixing matches and accepting bribes. He had been China's men's national team coach from January 2020 to December 2021. The saga was the latest in a string of corruption cases that have blighted Chinese football over many years. According to Sproer, they have had an impact on the number of parents willing to volunteer to help in organising youth teams. "Kids are under enormous academic pressure. The parents are under pressure in their jobs," he says. "So there isn't much time to volunteer, and there is also not this culture of volunteering, because football in China in the professional leagues doesn't have the greatest image."

  Hulk spent five season in the Chinese Super League, scoring 51 goals in 100 games

  Three months before Li Tie's sentencing, Chinese football had suffered a blow, with a 7-0 defeat by bitter rivals Japan in World Cup qualifying. "This is like England getting hammered by Germany," says Dr Gow. "Fans were angry, but they were more exasperated. Exasperated at the state of the game, and exasperated at the level of corruption in the game." When Xi set out his football plan in 2016, it led to a wave of investment from Chinese private investors in British and European clubs. The Chinese Super League (CSL) had its own resurgence, with wealthy owners pumping money into clubs to finance moves for players such as Oscar, from Chelsea, and Hulk from Zenit St Petersburg. Now, only two Chinese investors have overall control of professional clubs in England - the Fosun International Group at Wolverhampton Wanderers, and Dai Yongge, whose tenure at Reading has been beset by financial crises and successive points deductions. And clubs in the CSL are counting the cost of their transfer spending, with Guangzhou Evergrande, who won eight domestic titles and two Asian Champions Leagues between 2011 and 2019, forced into liquidation in January as a result of unpaid debts. "A lot of entrepreneurs used the China football strategy as a pretext to move money out of China," Dr Gow says. "It's very difficult to get your money out of China, so they seized on this opportunity that there was a national policy. "Fairly quickly, within a two- or three-year period, the authorities came along and said 'no, this is not what we want you to be doing,' so they kind of closed the door on that outward investment." With the presence of Chinese investors dwindling at European clubs, and with the men's national team still struggling to make inroads on the pitch, it is tempting to write off Xi's ambitions already. But those who've spent time in the country still feel the targets can be met by 2050, with China's results in younger age groups signalling some progress. "Never underestimate them," says Dr Gow. "When you have the Chinese Communist Party and the People's Republic of China, and they come out with a plan like this, they tend to deliver the objectives."
