id: bbc_2021_13256
title: Covid test lab in Wolverhampton suspended over wrong results - BBC News
date: '2021-10-15'
section: Health
url: http://www.bbc.co.uk/news/health-54923641
content: |-
  Health chief says it's not clear what went wrong as 43,000 in England and Wales potentially affected.

  About 43,000 people in England and Wales may have been wrongly told their Covid-19 test was negative because of errors at a private laboratory.

  Testing at the Wolverhampton lab has been suspended following an investigation by NHS Test and Trace.

  The head of the UK Health Security Agency has ordered an investigation into why it took a month to identify the failures.

  Those still infectious are being asked to take another Covid test.

  Concerns were raised when people had positive lateral flow tests, but negative follow-up PCR results from the lab between 8 September and 12 October - most affected live in the South West of England.

  The error could mean thousands of people infected with Covid were wrongly told to stop isolating, and may have infected others.

  Prof Alan McNally, from the University of Birmingham, told the BBC he was "astonished" by the revelation and could not work out how so many tests could be incorrect.

  Jenny Harries, chief executive of the UK Health Security Agency (UKHSA) and head of NHS Test and Trace, said it was "not clear" what went wrong.

  "We are doing a detailed investigation with them, working on the actual processes within the laboratory - but the important thing of course is that we have suspended all of their services." she said.

  Those who are still infectious - estimated to be a few thousand people tested in the past week or so - will be contacted first, by text and email, to recommend they have another test, Dr Harries said.

  Lateral flow tests (LFTs) are rapid tests widely used by schools and workplaces to find people with no symptoms who are infected and can spread the virus.

  PCR tests, which are sent off to a lab to be analysed, detect the virus several weeks after infection and trigger contact tracing. After a positive LFT, official guidance is to take a PCR to confirm Covid-19.

  Some false negatives are expected, because no test is 100% perfect, but reports of this happening appeared to be unusually high in certain areas over the past few weeks.

  The UKHSA said around 400,000 samples had been processed by the privately-run lab and it estimated 43,000 people may have been given incorrect negative test results, with 4,000 of those from Wales. Some may also be in the South East and scattered across the country.

  Graham Loader and his wife went about their normal business after negative PCR results

  Graham Loader, from Newbury, says his family have had three positive lateral flow tests, all followed by negative PCR tests taken at the testing site at Newbury Showground in West Berkshire.

  He said each time the family got a positive lateral flow test but negative PCR test, they assumed the LFTs must have been at fault.

  "I think we just blamed the LFTs because they were a bit basic," he said.

  "I thought they must be detecting something from a cold and be an error."

  His wife, a school teacher, had felt a bit unwell but didn't have the classic symptoms of coronavirus. She had a negative PCR test but took some time off as a precaution, despite being advised she did not need to.

  Mr Loader, who coaches a boy's football team, thought he'd come down with a cold.

  He added: "I completely trusted the PCR, so I feel bad for all the people I've been in contact with."

  All samples from the lab, where Immensa Health Clinic Ltd runs the testing operations, are now being sent to other labs.

  Government records show that Immensa, which was founded in May 2020 just months after the start of the pandemic, has been awarded contracts for Covid testing by the Department of Health valued at £181 million.

  The Wolverhampton Science Park which houses the offices and laboratories of Immensa Health Clinic

  UKHSA said all other labs are working normally and there are no technical issues with the test kits themselves.

  Dr Will Welfare, public health incident director at UKHSA - which replaced Public Health England - said: "As a result of our investigation, we are working with NHS Test and Trace and the company to determine the laboratory technical issues which have led to inaccurate PCR results being issued to people.

  "We have immediately suspended testing at this laboratory while we continue the investigation."

  He said the public should remain confident in using both kinds of test, and continue to get a follow-up PCR test after a positive LFT.

  The company said it was "fully collaborating" with health officials on the matter and added it had already analysed more than 2.5 million samples for NHS Test and Trace.

  We have been hearing about this for the past couple of weeks - anecdotally - from GPs.

  They reported patients getting in touch, saying they were unwell, had all the symptoms, had tested positive on a lateral flow, and then had gone to get the confirmatory PCR and it was negative.

  GPs were rather suspicious of this - it seemed to be largely around the South West of England.

  The problem is with the laboratory in question, not the testing sites.

  But 8 September - the date from which the UK Health Security Agency says results have been affected - goes back a little way.

  So the question is, who knew what and when?

  If you got infected in September and got a false result on your PCR, the infection will have almost certainly worn off by now.

  But some, who maybe tested in the last week or so, whose results went to that lab, will need to be contacted.

  It does raise question marks over how some of these labs are run.

  Many coronavirus testing sites in England and Wales are likely to be affected by the lab errors, including one at Newbury Showground in West Berkshire.

  On Thursday evening the local council told people who had got a negative result at the site between 3 and 12 October, to book another test.

  West Berkshire Council said it had been told by the government that a number of other sites nationally may have been affected.

  For several weeks, there have been widespread reports in the South West of England of people testing positive with lateral flow tests, but then later testing negative after a PCR test.

  Scientists had called for the issue to be looked into quickly, with one study suggesting positive lateral flow test results were very accurate and should be trusted.
