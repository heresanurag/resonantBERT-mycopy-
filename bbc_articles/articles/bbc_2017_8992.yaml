  Hennessy was given a fake visa to fly to Tripoli, but on arrival he was arrested by a militia and taken to a detention centre near the airport.

  "There were daily abuses," he said. "If people make noise, or rush for food, you get beaten."

  The weapon of choice for the guards was a water pipe.

  Some of his fellow detainees outlined other hazards on the migrant trail through Libya - being bought and sold by militias, used as slave labour, and forced to bribe guards to be released from detention centres.

  I just want to leave this place and go to my country

  Osman Abdel Salam, from Sudan, lifted the red towel around his neck to reveal a raised scar.

  He said that was the handiwork of jailers in the Libyan town of Bani Walid. They forced prisoners to call home, while being brutalised, to extort money from their relatives.

  "When we call, we are crying. They beat you on the head. There are some people who don't want to obey - they burn their body. My father is a farmer. He doesn't have money so he sold our house."

  Osman's freedom - which was short-lived - cost his family $5,000 (£3,800).

  When I asked if he still wanted to get to Europe, he covered his eyes with the towel and began to weep.

  "I just want to leave this place and go to my country."

  Emmanuel John, an 18-year-old who speaks perfect English, said he was beaten from the moment he crossed the border, and feared he would die.

  "The smugglers that brought us to Libya handed us to others, from the same network," he said.

  "There are stops along the way until you arrive in the city. At every stop you have to pay money. And if you don't, there will be beatings."

  But it was not the physical abuse that pained him the most.

  "Two girls were raped in the room beside us," he said.

  "It was a horrible moment. We couldn't do anything. We didn't have anything to defend ourselves."

  He told us the girls were aged about 15 and 19, and were travelling with their family.

  The European Union wants Libya to do more to prevent migrants like Emmanuel reaching Europe.

  But those intercepted by the Libyan coastguard are being returned to an unstable country, with a collapsing economy, that can barely feed them.

  A recent United Nations report condemned the "inhuman conditions" in Libyan detention centres highlighting "consistent reports of torture, sexual violence and forced labour", and cases of severe malnutrition.

  Breakfast time at Triq al-Sika was long on queues, and short on food.

  Each man received a small bread roll, some butter, and a single cup of watery juice.

  Three-month-old Sola has been in detention for most of his short life

  The detainees wanted us to witness this, as did the officials in charge. They say they have run out of money to pay their suppliers and are now relying on donations.

  Those behind bars here are effectively prisoners, who don't know their sentence. They can be held indefinitely - with no legal process. Their only hope of release is to be sent back to their home country.

  Three-month-old Sola has been in detention for most of his short life.

  We found him in the women's section, sleeping peacefully on a faded mattress.

  His young mother, Wasila Alasanne, tried to take him across the seas to Italy when he was just four weeks old.

  "Our boat broke and the police arrested us on the water," she said.

  "Since then we have been in five prisons. We don't have enough food. We don't have the right to call our parents. They don't know if I am alive or dead. My baby and I are suffering."

  Wasila's husband is being held in a different detention centre.

  She has no idea when they will be reunited, or when they will free.

  Her home country, Togo, has no ambassador in Libya.

  Now she can only dream of deportation, as she used to dream of Europe.

  A note on terminology: The BBC uses the term migrant to refer to all people on the move who have yet to complete the legal process of claiming asylum. This group includes people fleeing war-torn countries such as Syria, who are likely to be granted refugee status, as well as people who are seeking jobs and better lives, who governments are likely to rule are economic migrants.
