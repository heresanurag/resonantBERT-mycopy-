title: 'Libyan migrant detention centre: ''It''s like hell'' - BBC News'
date: '2017-09-07'
section: Africa
url: http://www.bbc.co.uk/news/world-africa-41189247
content: |-
  The EU wants Libya to do more on migrants but the unstable country is struggling to cope.

  This video can not be played To play this video you need to enable JavaScript in your browser.

  The 18-year-old from South Sudan knew he might perish on the treacherous crossing from Libya to Europe. So far this year, the Mediterranean has claimed an estimated 2,400 migrants and refugees.

  But before he ever reached the shore, Hennessy was kidnapped, beaten and almost shot.

  The teenager says he left home in 2016 after family problems resulted in death threats.

  He is behind bars in the Triq al-Sika detention centre in Tripoli, along with around 1,000 other men. Most we met were Africans in search of work, who were stopped at sea, or trying to get there.

  Now they are jammed into a warehouse, bereft of light and struggling to breathe.

  Hennessy Manjing spent three years in London, where he wants to return

  In the sweltering heat they are melding together - a tapestry of jumbled limbs, and torment.

  "When they find their journey ends here, they are completely broken," said one official at the centre.

  Some try to fan themselves with scraps of cardboard. At night, when the doors are locked, they have to urinate in bottles.

  "It's like hell," said Hennessy "even worse than jail."

  The gaunt teenager spoke with a London accent - the legacy of three years spent living in the UK with his family.

  Hopes of getting back there led him first to Egypt, and then across the border to eastern Libya. He says that's where an armed gang kidnapped him and about 40 others from their trafficker.

  There is not enough money to look after all the detainees

  "We saw people holding guns and sticks, and they forced us into trucks," he said.

  "People starting jumping off. By the time we jumped, there was an old man, from Chad. He was shot. Blood went all over my T-shirt. I thought I had been shot as well so I just ran away."

  He sought help from a local man, who returned him to one of the kidnappers.

  "He slapped me and punched me in the stomach, and said: 'Why did you run away?'

  "Thank God, on the third day my trafficker came and released us."

