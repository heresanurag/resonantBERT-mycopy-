title: Trump's new ban dodges pitfalls faced by last attempt, experts say - BBC News
date: '2025-06-06'
section: US & Canada
url: http://www.bbc.co.uk/news/articles/cd7gp8l1241o
content: |-
  It appears the US president has learned lessons from a previous effort to ban entry from several nations.

  Trump's new ban dodges pitfalls faced by last attempt, experts say

  Trump's first travel ban triggered protests across the US in 2017

  US President Donald Trump has issued a sweeping new travel ban for people from 12 countries, revisiting a hallmark policy of his first term in office. There are some key differences, however. The original travel ban suffered a series of legal defeats. This time, the policy appears to have been designed to avoid the same pitfalls. Its predecessor, which targeted seven predominantly Muslim countries and was dubbed the "Muslim ban" by critics, was ordered just a week after Trump took office in 2017, during his first term in the White House. The ban was amended twice to overcome court challenges, after opponents argued it was unconstitutional and illegal because it discriminated against travellers based on their religion. A scaled-back version was eventually upheld by the US Supreme Court in 2018, which this new ban closely resembles. Legal experts told the BBC that it appeared Trump had learned lessons from his first attempt. Christi Jackson, an expert in US immigration law at the London firm Laura Devine Immigration, said the new ban was more legally robust as a result. While the first lacked "clarity", the new restrictions were "wider in scope" and had "clearly defined" exemptions, she said. While there are some similarities in the nations chosen by the 2017 ban and the 2025 ban, Muslim-majority states are not the express target of the latest order. Barbara McQuade, professor of law at the University of Michigan and former US attorney for the Eastern District of Michigan, told the BBC World Service's Newshour programme that, on this basis, it seemed likely to win the approval of the Supreme Court if it was ever referred up to that level.

  The 12 countries subject to the harshest restrictions from 9 June are mainly in the Middle East, Africa and the Caribbean, including Afghanistan, Iran and Somalia. There will be partial restrictions on travellers from another seven countries, including Cuban and Venezuelan nationals. Trump said the strength of the restrictions would be graded against the severity of the perceived threat, including from terrorism. But besides Iran, none of the 12 countries hit by the outright ban are named on the US government's state sponsors of terrorism list. Trump cited Sunday's incident in Boulder, Colorado, in which a man was accused of throwing Molotov cocktails at demonstrators attending a march for Israeli hostages, in a video announcing the ban on X. The alleged attacker was an Egyptian national. However, Egypt does not appear on either list.

