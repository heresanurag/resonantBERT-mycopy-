  Trump also specified high rates of people overstaying their visas as a reason for listing certain countries. However, Steven D Heller, an immigration lawyer based in the US, said there was a "lack of clarity" over what threshold had to be met by a country's overstaying rate in order for that country to be placed on Trump's ban list. That could be the basis for a successful legal challenge, he suggested. "If they're relying on this notion of excessive overstay rates... they have to define what that actually means," he told the BBC. But he noted that existing US law gave the president broad powers over immigration policy. Unlike the first ban, which was to last for only 90 to 120 days, today's order has no end date. It has been met with dismay in the targeted countries. Venezuela has described the Trump administration as "supremacists who think they own the world", though Somalia has pledged to "engage in dialogue to address the concerns raised". The original ban spurred mass protests and sowed chaos at US airports. It was repealed in 2021 by Trump's successor, President Joe Biden, who called the policy "a stain on our national conscience". Immigration lawyer Shabnam Lotfi, who challenged the previous travel ban, said it would be an "uphill battle" to overturn the new one. "The president does have the authority to determine who is admissible to the US," she said, adding that because of the way the ban had been written, it was "harder to find a huge group of people that could file a class-action lawsuit". "They've put more thought into it." Ms Lotfi noted that the new restrictions could have consequences for students and other visa applicants abroad. "Students who are stuck in administrative processing are impacted. So are winners of the diversity visa lottery who paid fees and went to interviews - they're unlikely to get visas now," she said. "Even EB-5 investors - people who've put over $1 million into the US economy - are affected. And H-1B visa holders stuck abroad, waiting to return to their US employers, could also be blocked."
