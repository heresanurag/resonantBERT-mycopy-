title: 'Pink: Cardiff gig proposal shout-out ''dream'' for couple - BBC News'
date: '2024-06-13'
section: Wales
url: http://www.bbc.co.uk/news/articles/cx00ed83nxeo
content: |-
  A couple who got engaged at the singer's Cardiff show caught the attention of the US star.

  Josh and Ella got engaged when Pink sang What About Us, a song they used to listen to when they first got together

  A couple who got engaged at a Pink concert have said they "couldn't have dreamed" that the star would give them a shout-out during the show. Josh Phillips, 25, and Ella O’Grady, 24, were at the US singer's Summer Carnival Tour in Cardiff's Principality Stadium on Tuesday. When the star sang her hit What About Us, Josh got down on one knee and proposed to Ella, with Pink announcing "congratulations" to the packed stadium. The couple, from Nantyglo, Blaenau Gwent, said they used to listen to the song when they first got together six-and-a-half years ago.

  Ella said: "Pink was directly in front of me, Josh was on the floor, I was just thinking 'what the hell is going on?' "Everyone was cheering and looking at us and saying 'congratulations' and I was like 'Pink is there, Josh is on the floor, what do I do?' "I thought he was picking his drink up off the floor, we had a cardboard container with four drinks in between his feet and I thought he had gone down to get his drink!"

  Josh, a healthcare support worker, said he had been planning the proposal for months and the gig presented "the perfect opportunity". He said: "I was relieved when Ella said yes, not going to lie! Obviously you had that thought, 'what if she says no?' "I couldn’t believe it, I said 'really?' and she said 'yes' again. I was so nervous, as you can imagine. The pair said "literally after us" another couple at the gig also got engaged, with the romantic gesture catching the attention of Pink from the stage.

  Pink kick-started her European tour off in Cardiff on Tuesday night

  "Pink didn’t actually notice us first," Ella said. "It was only the fact that she noticed the other couple and everyone around us had tried pointing in our direction to get her attention that we had also got engaged not long before. "I had my hand in the air pointing at my finger, and she saw us then and clicked on, and she was like: 'Wait? You got engaged as well?' and she congratulated us then. "It was crazy. I still can’t get my head around it." Josh added: "I couldn’t have dreamed it, especially the response we’ve had, it’s mad really, the amount of people who have messaged us on social media, it doesn’t feel real." The couple said they were planning on moving and "getting settled into our new house first" before they begin making arrangements for their wedding.
