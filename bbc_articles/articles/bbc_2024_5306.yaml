title: Boris Johnson nominee joins Lords as youngest peer - BBC News
date: '2024-03-21'
section: General
url: http://www.bbc.co.uk/news/uk-politics-66290542
content: |-
  A former adviser to Boris Johnson joins the House of Lords as its youngest member.

  A former adviser to Boris Johnson has joined the House of Lords as its youngest member.

  Charlotte Owen, 30, who sits as Baroness Owen of Alderley Edge, was nominated in the former PM's resignation honours list. She was a special adviser in both Mr Johnson's and Liz Truss's Downing Street Policy Unit.

  The list, approved nine months after Mr Johnson’s resignation, included 38 honours and seven peerages.
