title: 'Wicked: Meet the London braider behind Elphaba''s wig - BBC News'
date: '2025-01-05'
section: General
url: http://www.bbc.co.uk/news/videos/c2ld25d1ek1o
content: |-
  Marie-Josee came to London as a refugee from Congo.

  The film Wicked has been a huge hit with fans, becoming one of the highest-grossing movies of 2024.

  Adapted from the stage musical, it tells the origin story of Elphaba, better known as the Wicked Witch of the West from The Wizard of Oz.

  Elphaba's wig was braided in the capital by a woman who came to London as a Congolese refugee and now runs a hair salon in Seven Sisters.

  This article was amended to make clear the wig was made by Samuel James Wigs and Josee's team did the braiding

