title: 'MTV VMAs 2024: Katy Perry wows and Taylor Swift makes history - BBC News'
date: '2024-09-12'
section: General
url: http://www.bbc.co.uk/news/videos/cevjvg8j704o
content: |-
  Katy Perry, Taylor Swift and Chappell Roan were among the stars gracing this year's event.

  The stars were out in force at the 2024 MTV Video Music Awards on Wednesday, with artists including Katy Perry and Lenny Kravitz performing.

  Perry picked up the equivalent of a lifetime achievement prize after performing a career-spanning medley.

  However, Taylor Swift was the main winner, earning seven new VMAs and overtaking Beyoncé as the event's biggest ever winner.
