title: Suspected sabotage causes Cannes Film Festival power cut 'meltdown' - BBC News
date: '2025-05-26'
section: General
url: http://www.bbc.co.uk/news/videos/cvgvnzxlee1o
content: |-
  The prestigious film festival was disrupted, about 160,000 homes were without power and businesses were left without power.

  Cannes faced a citywide power cut on Saturday, disrupting the prestigious film festival and closing restaurants, and businesses.

  French police are investigating suspected arson as the cause of the outage, after a substation in the village of Tanneron, which supplies Cannes, was attacked in the early hours.

  Despite the disruption, the Cannes Film Festival was able to use private generators to resume the festival - before power was restored at 15:00 (14:00 BST).

