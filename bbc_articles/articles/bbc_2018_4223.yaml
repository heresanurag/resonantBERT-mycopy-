content: |-
  David Luckman and Parag Patel retain their Commonwealth Queen's Prize title as Wales win silver and Scotland take bronze.

  David Luckman and Parag Patel took gold at Glasgow 2014, with Luckman also triumphing in the individual event

  England's David Luckman and Parag Patel beat Wales' Gareth Morris and Chris Watson to retain their Commonwealth Queen's Prize pairs shooting title. Scotland's Ian Shaw and Alexander Walker won the bronze as the home nations dominated the final standings. Luckman, 41, winner of the 2014 individual event, and seven-time medal winner Patel, 42, were third behind Wales heading into the final distance. In the event, competitors fire at targets over five distances.
