id: bbc_2018_6628
title: 'WHO: Gaming addiction ''a mental health condition'' - BBC News'
date: '2018-06-17'
section: General
url: http://www.bbc.co.uk/news/uk-44504683
content: |-
  For millions, it is a harmless hobby but for some it can become more than that.

  For most people gaming is an enjoyable hobby and a way to spend time with friends. But for some it can become more than that.

  Gaming addiction has been listed as a mental health condition for the first time by the World Health Organization.

  For information designed to help children with their online lives, visit BBC Own It.
