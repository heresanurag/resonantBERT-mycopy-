  Price is one of the most in-demand producers in the industry, with credits including Dua Lipa's Levitating, The Killers' Human and Kylie Minogue's All The Lovers. He has worked with Madonna since 2001, serving as music director on three previous world tours and producing 2005's Confessions On A Dancefloor album and its Abba-sampling megahit, Hung Up. The pair established a musical shorthand that he said works almost telepathically. "It sounds very spiritual - but a lot of the ideas we have about music are inferred or non-verbal. There's just an understanding of feeling." Although Price hadn't worked on a Madonna concert since 2006, their bat-senses began to tingle in January. "When she announced the greatest hits tour I called her just to say, 'Congratulations, I think this is a great idea'. And she said, 'I was just thinking about you, and I thought you'd be the perfect person to work with on this'. "So two weeks later, I went to New York." By that point, "Madonna had a really already highly evolved storyline" for the show that "reflected on her career, from being a young woman in New York and learning the scene, all the way through to motherhood, spiritual awakenings, and all the ups and downs. The storyline was just really, really compelling".

  Madonna's tours have always reconfigured and recontextualised her music and iconography

  It's no coincidence that the tour was conceived while Madonna was also working on a movie of her life story. Due to star Julia Garner, the project was put on ice in January, around the same time as the tour was announced. "One of the Madonna's skills is that she's able to cross-pollinate ideas between different projects," said Price. "In this case there'd been consideration about doing a biopic [which gave] this tour the potential for having a documentary aspect to it as well." As a result, the show will draw on news footage, classic costumes and music videos. More crucially, it will use Madonna's original multi-track recordings, with Price extracting "a vocal take where there's a car going by in the background" or "a solo from a guitarist who's no longer with us" to recapture the original spirit of the songs. In fact, for the first time since she performed club shows at the start of her career, Madonna will not be joined by an on-stage band. "There are live musicians that perform at different parts of the show," said Price. "But what we realised is that the original recordings are our stars. Those things can't be replicated and can't be recreated, so we decided just to embrace that."

  Price spoke to the BBC from his studio on a break before the final week of rehearsals for the tour

  Not that the shows will be a straightforward exercise in nostalgia. In the past, she's enjoyed tweaking her most famous songs - playing True Blue on a ukulele, or splicing the Sex Pistols' God Save The Queen into the frothy disco of Dress You Up. This tour will be no exception. "With Madonna, everything is always about recontextualising stuff, finding ways to take strong original messages and see how they resonate in the era that we're in now," said Price. "A lot of the powerful moments [in this show] are to do with where the music intersects with something that society was going through, especially something emotional, like the Aids crisis. Those moments are incredibly powerful." In Madonna's world, details matter. And with thousands of hours of archive to draw on, it sounds like the Celebration tour will spotlight her ongoing contribution not just to pop music but to culture. We'll find out on Saturday night.
