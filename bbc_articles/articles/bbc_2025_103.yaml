content: |-
  The aqueduct collapsed and flooded surrounding field after heavy rainfall.

  The banks of a canal in Cheshire collapsed on New Year's Day after parts of the UK were lashed by heavy rain.

  Drone footage showed how fields near the village of Little Bollington, which is close to Altrincham, were inundated with water pouring from the Bridgewater Canal.

  Cheshire Police said nearby properties were evacuated and a section of the M56 had to be closed.

  It came on the same day that Greater Manchester police declared a major incident due to floodwater trapping people in their homes across the north west of England.
