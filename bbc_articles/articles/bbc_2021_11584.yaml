content: |-
  The ambulance service says it sent its hazardous area response team to the scene.

  City Road was closed to traffic but has since reopened

  Five people have been taken to hospital after reports of an assault in Cardiff.

  South Wales Police said the five had "superficial injuries" following the incident on City Road at about 14:45 BST.

  The Welsh Ambulance Service said it sent its hazardous area response team to the scene and took two of the people to hospital.

  The police appealed for anyone with mobile phone or dashcam footage to send it to them.

  Police cordoned off part of the pavement

  Police have appealed for mobile phone or dashcam footage
