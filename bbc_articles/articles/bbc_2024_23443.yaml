title: 'Kay Alexander: ''I filmed a trail 20 minutes after giving birth'' - BBC News'
date: '2024-09-27'
section: General
url: http://www.bbc.co.uk/news/videos/c04pe14l73lo
content: "Former BBC Midlands Today presenter Kay Alexander reflects on the show \n\
  \ as it marks its 60th anniversary.\n\nWeather presenter Shefali Oza has been talking\
  \ to Kay Alexander MBE about her memories of Midlands Today as the BBC regional\
  \ news programme reaches its 60th year.\n\nThe newsreader started on the show in\
  \ 1975 and became a trailblazer for women in the industry.\n\nIn the interview,\
  \ she shares how she once filmed a segment 20 minutes after giving birth.\n\nAfter\
  \ trawling the BBC Archive, footage of Kay was has been uncovered, as she went behind\
  \ the scenes of how Midlands Today was made in 1980.\n\nAnd, if you thought pets\
  \ on skateboards was some sort of new phenomenon, Herbie the duck quacked his way\
  \ to national stardom when MT first caught up with him on the board, in 1978.\n\n\
  Herbie's antics had provoked such a reaction, the team at BBC Nationwide even broadcast\
  \ an obituary to him after he died in 1983."
