title: Petrol station and homes flooded after heavy rain in Derbyshire - BBC News
date: '2025-01-03'
section: General
url: http://www.bbc.co.uk/news/videos/cdekw41jnpgo
content: |-
  The Met Office has now issued a yellow weather warning for snow and ice in the county.

  A main road in Derbyshire has been affected by flood water following heavy rain.

  A section of the A57 near Glossop was completely flooded on Wednesday.

  This led to a petrol station and nearby homes being engulfed by water.

  The Met Office has issued a yellow weather warning for snow and ice in Derbyshire this weekend.

