title: Bear fight on cliff-edge ends in deadly fall - BBC News
date: '2022-06-09'
section: General
url: http://www.bbc.co.uk/news/world-61750744
content: |-
  A female bear was forced to protect her cub from a male in Spain's Cantabrian mountains.

  Two bears ended up in a deadly fight in Spain's Cantabrian mountains, which are home to around 350 bears.

  Video footage shows a female bear protecting her cub from a larger male, before both fighting bears fall off a cliff ledge.
