  Jordan McSweeney and prison instructor Hayley Jones have been charged over an alleged inappropriate relationship.

  Zara Aleena killer and prison worker appear in court

  Prison workshop instructor Hayley Jones acted in a way "which amounted to an abuse of the public's trust", it is alleged

  The man who murdered Zara Aleena has appeared in court over an alleged inappropriate relationship with a prison workshop instructor. Jordan McSweeney is serving a minimum term of 33 years at HMP Belmarsh for the killing and sexual assault of the 35-year-old law graduate as she walked home from a night out in Ilford, east London, in June 2022. McSweeney, who murdered Ms Aleena nine days after he was released from prison, appeared at Wimbledon Magistrates' Court via video-link, alongside 33-year-old Hayley Jones, who attended in person. McSweeney, 31, is accused of encouraging or assisting the commission of an indictable offence, while Ms Jones is charged with misconduct in public office.

  The case was adjourned to Woolwich Crown Court on 25 September. Ms Jones is alleged to have acted in a way "which amounted to an abuse of the public's trust" during a relationship with McSweeney, between 6 March and 7 April 2023, at HMP Belmarsh. She was granted conditional bail and told not to contact McSweeney directly or indirectly, nor to visit the prison in which he is being held.
