id: bbc_2017_3144
title: Transgender pupil treated 'like freak' by school - BBC News
date: '2017-02-02'
section: General
url: http://www.bbc.co.uk/news/uk-england-hereford-worcester-38832413
content: |-
  A 16-year old transgender pupil is suing his former school for discrimination.

  The mother of a transgender pupil is taking legal action against a school which she claims treated her child like "a freak".

  Jackie* said the treatment had been "appalling". Her child Aidan*, 16, who was born female, claims he was effectively excluded by Hereford Cathedral School, which refused to let him wear a boy's uniform.

  The legal action is currently going through the courts.

  It is understood as part of the school's defence, it claims Aidan was withdrawn by his family before a final decision was made by the school about whether it could accommodate his needs.

  In a statement it said: "The continued happiness, wellbeing and safety of our pupils is the top priority."
