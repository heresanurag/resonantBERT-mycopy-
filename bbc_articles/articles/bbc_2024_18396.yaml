title: 'Ammanford school stabbings: Girl, 14, admits wounding - BBC News'
date: '2024-08-12'
section: Wales
url: http://www.bbc.co.uk/news/articles/ckg5xn92p4po
content: |-
  The girl denies the attempted murder of three people, including two teachers, at a school.

  Ysgol Dyffryn Aman was locked down for several hours in April

  A 14-year-old girl has admitted stabbing three people in an attack at a school in Carmarthenshire, but has denied attempted murder. Teachers Fiona Elias, Liz Hopkin and a pupil were injured at Ysgol Dyffryn Aman in Ammanford in April. The teenager, who cannot be named because of her age, pleaded guilty to three counts of wounding with intent and of being in possession of a bladed article on school premises. But she denied three counts of attempted murder at Swansea Crown Court on Monday and will stand trial in September.

  Teachers Fiona Elias (left) and Liz Hopkin (right) required hospital treatment after the attack

  The accused spoke only to confirm her name and enter her pleas and looked at the ground as the judge spoke. Pupils were kept in lockdown for four hours as police investigated the scene on 24 April, while the three victims all needed treating in hospital. The court heard the attack was captured on CCTV. The girl, who was 13 at the time, will remain in secure youth detention accommodation until her trial, which is due to start on 30 September.
