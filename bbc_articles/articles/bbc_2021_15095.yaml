  That takes the total number of deaths to 142,945 in the UK since the start of the pandemic.

  Amazon will pay a $500,000 (£370,000) legal settlement in the US over claims it failed to adequately inform its warehouse workers or public health officials about Covid-19 cases in the workplace.

  The corporation did not admit wrongdoing in agreeing the settlement, which comes under California's "right to know" rules that require employers to keep staff informed of potential Covid exposures.

  The state's attorney general Rob Bonta said Amazon workers had been left "terrified and powerless" and local public health bodies were often left "unable to effectively track the spread of the virus".

  The ruling applies only to California - where the company employs around 150,000 people - and must still be approved by a judge.

  Amazon said there was no change needed to how it notified workers if they are a close contact of a case, adding the issue was around the structure of bulk employee Covid-related notifications.

