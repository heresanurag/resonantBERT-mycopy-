title: Former Tory MP Jamie Wallis in court accused of harassing ex-wife - BBC News
date: '2025-05-19'
section: Wales
url: http://www.bbc.co.uk/news/articles/ce3vqxp9nn3o
content: |-
  Jamie Wallis, now known as Katie, pleads not guilty to harassing Rebecca Wallis earlier this year.

  Katie Wallis, who was previously known as Jamie Wallis, is accused of harassing Rebecca Wallis earlier this year

  A former Conservative MP will stand trial accused of harassment. Jamie Wallis, who is now known as Katie Wallis and uses female pronouns, represented Bridgend from 2019 to 2024. The 40-year-old from Butetown in Cardiff appeared at the city's magistrates' court on Monday and pleaded not guilty to harassing ex-wife Rebecca Wallis between 14 February and 21 March by making unwanted phone calls, sending unwanted messages and voice notes and driving past her home. No evidence was offered on a previous charge of stalking.

  Ms Wallis, who is the first MP to openly begin the process of gender transitioning, told the court: "Legally I am known as Jamie, but I prefer to be known as Katie." Simone Walsh, prosecuting, told the court the defendant and alleged victim were in a relationship for more than 15 years and separated in 2020, with their divorce finalised in 2024. "Following the victim informing the defendant of a new relationship the defendant's behaviour became harassing in nature," she said. Narita Bahra, defending, said there was "no malice" on her client's part, adding she would be seeking a psychiatric report ahead of the trial. The case was postponed until 17 June.
