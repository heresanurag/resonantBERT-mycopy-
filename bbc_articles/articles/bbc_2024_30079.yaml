content: |-
  A 34-year-old man was arrested in connection with the incident and has been released pending further inquiries.

  A 34-year-old man has been arrested in connection with an alleged rape at a car showroom in Edinburgh.

  Emergency services were called to the Peter Vardy BMW premises in the Seafield Road area of Edinburgh at about 13:35 on 3 November following reports of a serious sexual assault.

  Police confirmed that a 34-year-old man was arrested in connection with the incident and has been released pending further inquiries.

  An investigation into the incident is ongoing.
