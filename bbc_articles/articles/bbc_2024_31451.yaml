  Comedian and classical singer Lloyd Griffith has given a special performance at Lincoln Cathedral.

  Comedian and actor Lloyd Griffith has got into the festive spirit with a carol recital at Lincoln Cathedral.

  The 41-year-old from Grimsby is usually seen performing stand up or starring in BBC show, Return to Paradise, but is also a classically trained choral singer.

  He sang the traditional Christmas carol, O Holy Night, alongside Jeffrey Makinson, the cathedral's organist and assistant director of music.

