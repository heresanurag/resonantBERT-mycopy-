content: |-
  Ben Whittaker steers his career back on track with a second-round stoppage of Liam Cameron to win their light-heavyweight rematch in Birmingham.

  Whittaker wins by TKO then yells at Cameron's team

  In his first fight working with trainer Andy Lee, Ben Whittaker extended his record to nine wins and one draw

  Ben Whittaker steered his career back on track with a second-round stoppage of Liam Cameron to win their light-heavyweight rematch in Birmingham. The 27-year-old whipped in a flush right to hurt Cameron and then loaded up with several unanswered punches before the fight was, perhaps a little prematurely, called off. An emotional Whittaker, 27, then ran over to the opposite corner at the BP Pulse Live arena and began shouting at Cameron's team. TV replays showed some spit land in the direction of trainer Grant Smith, although it appeared to be unintentional. "My emotions came out, I was roaring like a lion," Whittaker said when asked about the incident on Sky Sports. "If a little bit of dribble came out, then a little bit of dribble came out." The undefeated Whittaker makes amends for October's controversial draw, which ended in bizarre circumstances when both men fell over the ropes and Whittaker was unable to continue because of an injury.

  Cameron (right) has lost his seventh fight in 31 pro outings

  Whittaker, from nearby Wolverhampton, made a spectacular entrance as he danced in front of pyrotechnics while accompanied by a choir, but was met with jeers. The 2020 Olympic silver medallist looked a little surprised at the crowd's reaction. Most observers had Cameron, 34, winning the first fight in Saudi Arabia but it was Whittaker who made the sharp start, with crisp and accurate punching. England striker Marcus Rashford and UFC star Leon Edwards watched on as Whittaker - with his nickname 'The Surgeon' etched on his shorts - landed cleanly midway through the first round. He put it on Cameron and another right connected as the Sheffield fighter's legs dipped and he was held up by the bottom rope. Referee Howard Foster saw enough and jumped in. There were no real protests from Cameron. After his verbal attack on Smith, Whittaker cupped his hands as more boos echoed around the arena, though he did share an embrace with Cameron and his team a little later. Whittaker's stock dropped after his draw in Saudi Arabia. He left that fight in a wheelchair and was accused of quitting by some fans. But he bounced back in style in his first fight under respected trainer Andy Lee, who defended his boxer's outpouring of emotion. "No one can understand what this man has gone through over the last six months," Lee said. "The fact he's just standing here in the ring tonight, not many people could put up with what he's gone through. His emotions are bound to get carried away."

  Frazer Clarke extended his record to nine wins, with one loss and one draw - afterwards calling out the winner of the bout between British champion David Adeleye and Jeamie 'TKV' Tshikeva

  British heavyweight Frazer Clarke returned to winning ways on the undercard with a statement first-round stoppage victory over Ebenezer Tetteh. The 33-year-old connected with a heavy right. Tetteh rose to his feet on unsteady legs before the fight was waved off after a barrage of punches. Ghanaian Tetteh disputed referee Kevin Parker's decision. He placed his hands on the official and pulled him towards him, and had to be calmed down by his team. Clarke had surgery on his jaw and cheekbone following a devastating loss to Fabio Wardley in October. "I've been crying out for that kind of performance since my debut," 2020 Olympic bronze medallist Clarke said. "Especially after the last six months, being in a dark place at times."
