title: 'Coronavirus: PM announces social distancing shake-up - BBC News'
date: '2020-06-23'
section: General
url: http://www.bbc.co.uk/news/uk-53147270
content: |-
  From 4 July the two metre rule is to be relaxed to "one metre plus" where 2m is not possible.

  The two metre rule on social distancing is to be relaxed to "one metre plus" where 2m is not possible from 4 July, the prime minister has said.

  It is part of a series of measures being announced to ease the lockdown in England.
