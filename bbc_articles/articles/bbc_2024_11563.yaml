title: Second man denies felling famous Sycamore Gap tree - BBC News
date: '2024-06-12'
section: Tyne
url: http://www.bbc.co.uk/news/articles/c0661ndny82o
content: |-
  Daniel Graham and Adam Carruthers are accused of criminal damage to the tree and to Hadrian's Wall.

  Adam Carruthers, 31, from Wigton, leaves Newcastle Crown Court, where he denied causing criminal damage following the felling of the Sycamore Gap tree

  A second man has denied illegally felling the UK's most famous tree. Daniel Graham, 38, and Adam Carruthers, 31, are accused of causing £622,191 damage to the tree at Sycamore Gap in Northumberland, which was cut down in September. The pair are also accused of causing £1,144 damage to Hadrian's Wall, a Unesco World Heritage Site, which was hit by the falling tree. Mr Graham, from Carlisle, had previously denied both offences. Appearing at Newcastle Crown Court, Mr Carruthers, of Wigton, Cumbria, entered not guilty pleas.

  Daniel Graham (left) and Adam Carruthers, both wearing masks, appearing at a previous court hearing, will stand trial in December

  Mr Graham did not attend the hearing as he was “unavoidably detained”, his barrister Christopher Knox said. A trial has been listed for 3 December and is anticipated to last at least 10 days. Both men are accused of criminally damaging the tree and wall on 28 September, with both sites referred to in court documents as places of "historical interest" and "natural beauty" belonging to the National Trust. They have been released on bail.

  The tree stood between two hills on Hadrian's Wall in Northumberland

  The felling of the much-photographed tree, which had stood next to the Roman wall since the late 1800s, caused an international outpouring of shock, dismay and anger. Northumberland National Park Authority officials said the tree was "part of England's identity", and had attracted millions of people to the site.

  The tree was chopped down in September
