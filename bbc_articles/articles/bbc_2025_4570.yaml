title: A timeline of the Heathrow Airport disruption and what happened - BBC News
date: '2025-03-22'
section: General
url: http://www.bbc.co.uk/news/videos/c93k595e9yxo
content: |-
  BBC Verify's Nick Beake explains how Europe's busiest airport was taken out of action.

  Thousands of passengers around the world have been affected by the closure of Heathrow Airport for most of Friday.

  The site lost power following a large fire at an electrical substation nearby.

  BBC Verify's Nick Beake explains how Europe's busiest airport was taken out of action and the global impact that followed.

  Additional reporting by Paul Brown, Jake Horton and Victoria Park. Produced by Aisha Sembhi. Graphics by Mark Edwards.
