  Prince Harry and Meghan Markle share more details about their wedding day.

  Kensington Palace has released further details of Prince Harry's wedding to Meghan Markle, including timings and procession plans.

  See inside St George's chapel, Windsor Castle, where the wedding will take place on 19 May.
