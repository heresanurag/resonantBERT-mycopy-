title: 'Germany tornado: Video shows damage in Paderborn - BBC News'
date: '2022-05-21'
section: General
url: http://www.bbc.co.uk/news/world-europe-61533541
content: |-
  Eyewitness footage shows severe weather in Paderborn, injuring at least 40 people and killing one man.

  Footage from eyewitnesses shows a tornado ripping through a city in western Germany.

  Severe weather battered the streets in Paderborn destroying trees and damaging houses.
