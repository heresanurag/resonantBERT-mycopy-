content: |-
  Authorities say there was no sign the couple had sustained any injuries, but no cause of death has been given.

  Death of Hackman and wife 'suspicious enough' for investigation, police say

  This video can not be played To play this video you need to enable JavaScript in your browser. Gene Hackman: A look back on his career

  Oscar-winning actor Gene Hackman and his wife appeared to have been dead for "quite a while" when the couple and their dog were found on Wednesday afternoon at their home in the US state of New Mexico, police say. Hackman, 95, was discovered in a side room near the kitchen of the house in Santa Fe, while his wife Betsy Arakawa, a 65-year-old classical pianist, was found in a bathroom. Authorities reported no signs of injury but deemed the deaths "suspicious enough" to investigate and have not ruled out foul play. No cause of death was given. In a wide-ranging career, Hackman won two Academy Awards for The French Connection and Unforgiven.

  This video can not be played To play this video you need to enable JavaScript in your browser.

  Three of Hackman's children from a previous marriage confirmed the death of their father and Ms Arakawa in a statement to the BBC. "He was loved and admired by millions around the world for his brilliant acting career, but to us he was always just Dad and Grandpa. We will miss him sorely and are devastated by the loss," Elizabeth, Leslie and Annie Hackman said. Warning: This story contains details some readers may find upsetting "On 26 February, 2025, at approximately 1:45pm, Santa Fe County Sheriff's deputies were dispatched to an address on Old Sunset Trail in Hyde Park where Gene Hackman, his wife Betsy Arakawa, and a dog were found deceased," the office said. In a news conference on Thursday afternoon, Sheriff Adan Mendoza said: "It sounds like they had been deceased for quite a while, and I don't want to guess in reference to how long that was." He added: "There was no immediate sign of foul play. Haven't ruled that out yet. "This is an investigation, so we're keeping everything on the table." A sheriff's detective who responded to the scene said that they believed the couple had been dead for some time because of Ms Arakawa's "decomposition" and "mummification" in the hands and feet. "The male decedent also showed obvious signs of death, similar and consistent with the female decedent," said the search warrant. Near Ms Arakawa's head was a portable heater, which the detective determined could have been brought down in the event that she abruptly fell to the ground. Authorities say they have requested carbon monoxide and toxicology tests for both Hackman and his wife, and that a cause of death has not yet been determined as they await the results of the autopsy.
