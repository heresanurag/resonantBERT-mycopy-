  He won the best actor Oscar for his role as Jimmy "Popeye" Doyle in William Friedkin's 1971 thriller The French Connection, and another for best supporting actor for playing Little Bill Daggett in Clint Eastwood's Western film Unforgiven in 1992. A relative latecomer to Hollywood, Hackman's breathrough came in his thirties, when he was nominated for an Oscar for portraying Buck Barrow in 1967's Bonnie and Clyde - opposite Warren Beatty and Faye Dunaway - and again for I Never Sang for My Father in 1970. Both films saw him recognised in the supporting actor category. He was also nominated for best leading actor in 1988 for playing the FBI agent in Mississippi Burning. He played more than 100 roles during his career, including supervillain Lex Luthor in the Christopher Reeve-starring Superman movies in the 1970s and 1980s. Hackman featured opposite many other Hollywood heavyweights including Al Pacino in 1973's Scarecrow and Gene Wilder in 1974's Young Frankenstein. His last big-screen appearance came as Monroe Cole in Welcome to Mooseport in 2004, after which he stepped back from Hollywood for a quieter life in New Mexico.
