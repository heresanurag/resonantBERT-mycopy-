  A prescription bottle and scattered pills were on the bathroom countertop close to her body. The couple's German Shepherd dog was found dead in a bathroom closet near to Ms Arakawa. Hackman was discovered wearing grey tracksuit bottoms, a blue long-sleeve T-shirt and brown slippers. Sunglasses and a walking cane were next to the body. The detective suspected that the actor had fallen suddenly. The circumstances of their death were "suspicious enough in nature to require a thorough search and investigation", said the search warrant, because the person who called emergency services found the front door of the property open. But the detective observed no sign of forced entry into the home. Nothing appeared out of place inside. Neither was there any indication that belongings had been rummaged through, or that any items had been removed. Two other, healthy dogs were discovered roaming the property - one inside and one outside. The couple's 2,300 sq ft ranch-style home, part of a gated community, was valued at around $1m, according to tax records.

  Police at the Santa Fe gated community where the couple were found dead

  The local utility responded and found no sign of a gas leak in the area. The fire department detected no indication of a carbon monoxide leak or poisoning, according to the search warrant. The detective spoke at the scene to two maintenance workers, one of whom had called the emergency services. The two workers said they sometimes conducted routine work at property, but rarely ever saw the couple. They indicated that they communicated with them by phone and text, primarily with Ms Arakawa. The two workers said they last had contact with the couple two weeks beforehand. A recording of the 911 call obtained by the BBC shows the emotional caller telling a dispatcher how he found the two bodies. "No, they're not moving," he says in the audio. "Just send somebody out here really quick." The person, who made the call while standing outside the property and peering in through a window, is heard saying "damn" repeatedly. Hackman met Ms Arakawa when she was working part-time at a California gym in the mid-1980s, the New York Times has previously reported.

