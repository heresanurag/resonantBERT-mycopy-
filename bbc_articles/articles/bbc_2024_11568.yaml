  England manager Gareth Southgate says Euro 2024 could be his "last chance" to win a trophy with England.

  'Euros might be my last chance to win with England'

  Southgate has been in charge at four major tournaments over almost eight years

  Manager Gareth Southgate says Euro 2024 could be his "last chance" to win a trophy with England. The 53-year-old has been in charge since 2016, taking his side to the 2018 World Cup semi-finals, the Euro 2020 final and the 2022 World Cup quarter-finals in Qatar. His contract is due to expire in December but the Football Association are keen for him to remain as manager for the next World Cup in 2026 in USA, Canada and Mexico. However, Southgate told German newspaper Bild, external that failure to win a trophy in Germany could see the end of his stay. "If we don't win, I probably won't be here anymore. Then it might be the last chance," he said. "If we want to be a big team and I want to be a top coach, then you have to deliver in the big moments."

  Southgate's side's preparations for the tournament have been mixed with a 3-0 victory over Bosnia-Herzegovina followed by a disappointing 1-0 defeat by Iceland on Friday. England start their Euro campaign against Serbia in Gelsenkirchen on Sunday, 16 June before games against Denmark and Slovenia. "I think about half of the national coaches leave after a tournament - that's the nature of international football," said Southgate, who has been linked to Manchester United if they sack Erik ten Hag. “I've been here for almost eight years now and we've come close. So I know that you can't keep standing in front of the public and saying 'please do a little more', because at some point people will lose faith in your message. Asked why he did not sign a new contract before Euro 2024, Southgate said: "The reason is that there would have been more criticism, which would have put more pressure on the team. "England did that once before with Fabio Capello and there was a big drama before the tournament. It's better to check yourself after the tournament."
