content: |-
  A keen weather watcher has captured rare ice formations as freezing conditions grip NI.

  Freezing conditions have given rise to rare ice formations on the River Fane in South Armagh

  In a rare and captivating spectacle, 'ice pancakes' have formed on a Northern Ireland's rivers as Arctic air continues to grip Northern Ireland.

  These naturally occurring circular ice formations are reminiscent of oversized floating pancakes.

  They are caused by the freezing of foam floating on the river's surface.

  The phenomenon unfolded on Wednesday in several places including Slievenacloy Reserve in County Antrim and on the River Fane in South Armagh

  While ice pancakes are not unheard of, witnessing this phenomenon in Northern Ireland is relatively uncommon, adding to the intrigue surrounding the frozen spectacle.

