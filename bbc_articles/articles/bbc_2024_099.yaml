  The recent cold spell, marked by a significant drop in temperatures, contributed to the freezing of the water's surface, giving rise to the ice formations.

  The elusive phenomenon of hair ice has also made a captivated appearance during cold weather this month.

  It was photographed by Ronald Surgenor, a skilled wildlife photographer and conservationist associated with Ulster Wildlife, in Ballynahone Bog, near Maghera, in County Londonderry.

  At first glance, hair ice looks like candy floss has appeared on tree branches

  The natural wonder forms on decaying wood during humid winter nights when the temperature hovers just below freezing.

  Scientists have attributed its formation to a fungus which enables the creation of thin hairs, each with a diameter of around 0.01mm.

  This captivating discovery was also captured on camera in parts of Northern Ireland in January 2021.

  The natural wonder forms on decaying wood

  Chilly weather will persist until the weekend, with ice warnings in place until 10:00 GMT on Friday.

  Wednesday saw temperatures in parts of Northern Ireland remaining below freezing all day, and similar conditions are expected on Thursday.

  A brisk northerly wind will also bring snow showers today, especially towards the north coast.

  As freezing conditions continue into late Friday morning, the promise of milder weather is on the horizon for the weekend.

  However, this respite will be short-lived as the forecast includes a shift towards more unsettled weather from Saturday.

  Stronger winds and outbreaks of rain are expected, prompting the Met Office to issue a weather warning for strong winds on Sunday.
