title: Portland cafe says Bella robot will not replace staff - BBC News
date: '2025-05-04'
section: Dorset
url: http://www.bbc.co.uk/news/articles/cvgqmqeej56o
content: |-
  A hotel cafe in Dorset begins using a robot to help deliver food orders to its customers.

  Mike Deadman, from The View Cafe and Bar, said Bella was not being used to replace staff

  Bella carries multiple trays packed with food and drinks, deftly swerving any obstacles and delivering orders day in and day out to her customers. This is the latest recruit at The View Cafe and Bar at Portland's Heights hotel in Dorset. But Bella is no normal member of the waiting staff - she is a state-of-the art robot programmed to serve and even interact with the eatery's patrons. And costing a little under £9,000, it is hoped it can be an economical idea, as well as a novel one. But assistant manager Mike Deadman insists Bella - built by Chinese technology company Pudu - will not result in any job losses. He told the BBC the robot was brought in to help at busier times and to carry items others might find a struggle.

  Bella is programmed to deliver to every table in the cafe

  "I think [Bella] will complement existing services but I certainly don't think it'll replace the human touch," he said. "Our recruitment process is as active as ever and it's simply supplemented."

  Bella is capable of singing Happy Birthday and can respond with phrases such as "wow your hands really are warm" when touched. The 55kg (121lb) robot is also equipped with obstacle avoidance technology, meaning it can glide through the cafe speedily and efficiently. Mr Deadman was inspired to bring the technology - also trialled by Bella Italia in 2022 - to Portland after seeing it used in cafes and restaurants in other parts of the world. But only time will tell if it will prove the future of customer service.

