content: |-
  Liverpool have agreed a fee of £10m for Italy and Juventus winger Federico Chiesa.

  Italy international Federico Chiesa is closing in on a move to Liverpool

  The Reds have agreed a fee of £10m for the Italy international, with a further £2.5m in add-ons based primarily on team performance. Chiesa, 26, is on his way to Liverpool for a medical and if all goes to plan he would become Arne Slot's first signing to arrive at the club. Speaking to Italian network Sportitalia, external outside an airport on Wednesday, Chiesa said he was "ready for this new adventure". The forward was a star of the Italy squad that beat England on penalties in the Euro 2020 final at Wembley. Chiesa scored 32 goals in 131 appearances for Juventus, including 10 in 37 matches last season. However, newly-appointed Juventus boss Thiago Motta has left him out of his first two matchday squads this season. Liverpool agreed to sign Georgia goalkeeper Giorgi Mamardashvili from Valencia in a deal worth up to £29m on Tuesday - but he will not join until next season.

  Chiesa, who is out of contract in the summer of 2025, has struggled to reach peak form since suffering a serious knee injury in January 2022 which required surgery. However, Slot believes the former Fiorentina player will add something to Liverpool's squad. Chiesa was named in the team of the tournament at Euro 2020 and, 12 months later, in Serie A's team of the year. He started 25 league games last season - scoring nine times - but Chiesa is not part of the Italian club's plans going forward as Juventus look to get some money back for a player who arrived in a deal worth up to £54m.
