title: 'Turkey earthquake: Girl, three, pulled alive from rubble - BBC News'
date: '2020-11-03'
section: General
url: http://www.bbc.co.uk/news/world-europe-54778682
content: |-
  A three-year-old girl is pulled alive from rubble in Turkey's port city of Izmir.

  A three-year-old girl has been pulled out alive after being trapped under rubble for 65 hours following a powerful earthquake in Turkey.

  The earthquake on Friday has killed at least 85 people, with more still missing.

  Dehydrated but without serious injuries, the girl clung to a rescue worker's thumb as she was carried to safety.
