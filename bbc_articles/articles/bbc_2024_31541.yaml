title: 'Watch: Paul McCartney and Ringo Starr reunite on stage - BBC News'
date: '2024-12-21'
section: General
url: http://www.bbc.co.uk/news/videos/cj491vg28wro
content: |-
  The former bandmates hugged at a gig in London before they performed Beatles classic songs together.

  Former bandmates Sir Paul McCartney and Sir Ringo Starr hugged on stage during a gig at London's O2 Arena.

  Sir Ringo, drummer for the The Beatles, walked on to thunderous applause before the pair launched into classics Helter Skelter and Sgt Pepper's Lonely Hearts Club Band.

  Thursday's performance was the last in Sir Paul's Got Back tour, which saw the 82-year-old play in France, Spain and Brazil
