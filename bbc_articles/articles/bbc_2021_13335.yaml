title: 'Sarah Everard murder: Women react to Met safety advice - BBC News'
date: '2021-10-01'
section: General
url: http://www.bbc.co.uk/news/uk-58768109
content: |-
  People stopped by a lone plain-clothes officer should challenge their legitimacy, the Met Police says.

  People stopped by a lone plain-clothes officer should challenge their legitimacy, the Met Police has said.

  The force is seeking to reassure women after the murder of Sarah Everard by serving police officer, Wayne Couzens.

  The Met has advised people detained by a lone plain-clothes officer to ask questions like "Where are your colleagues?" and "Where have you come from?"

  But some women say this shifts the onus back on to them.
