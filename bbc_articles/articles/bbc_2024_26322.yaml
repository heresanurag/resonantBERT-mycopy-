content: |-
  Norris says he's 'not quite at Verstappen's level'

  Lando Norris is 57 points behind leader Max Verstappen in the drivers' championship

  Lando Norris says he is "not quite at the level" of title rival Max Verstappen when it comes to race-craft. The Briton was controversially penalised at Sunday's United States Grand Prix, demoting him from third to fourth behind Verstappen, for overtaking off track. Norris said: "Max is the best in the world in this style of defence and attacking. So I have to be at his level and at the moment I am not quite at the level I need to be at. "It's a shame to say, but it's probably the truth. At the same time, it's a chance for me to learn and progress." However, Norris said he did not believe he deserved the penalty and Verstappen's driving in the incident was "not how racing should be". McLaren have submitted a request for a right of review into Norris' penalty, with a hearing to take place in Mexico on Friday. They will need to demonstrate there is a "significant and relevant new element" for it to progress. Norris was among a number of drivers who questioned Verstappen's approach to the corner, essentially saying it complied with the rules, but was not fair racing. But in response, Verstappen said: "It's how the rules are written. I don't make the rules. I just follow the rules as much as I can. I just implement the rules and play with them." Seven-time champion Lewis Hamilton added: "You shouldn't be able to come off the brakes and run more speed in and go off the track and still hold your place." The Mercedes driver felt a change had been needed for some time, and pointed out Verstappen had used the same tactic in their 2021 title fight. Hamilton's team-mate George Russell said he would ask the FIA whether, following a review, they believed Verstappen should have been penalised for his manoeuvre. "In my view, he should have been penalised, therefore there isn't really a loophole," added the Briton. "If they say he shouldn't have been, then he is exploiting a loophole. "But he is in a title battle with Lando the same way as he was with Lewis and I don't think he would have done the same manoeuvre if it was any other driver, same as in Brazil 2021. It was a bit do or die, and he is happy to drive in that manner against his title rival, which I totally understand." Ferrari driver Charles Leclerc, who won the race in Austin, said Verstappen's defence of his position from Norris was "a bit too extreme". Leclerc added the Dutchman "has always been on the limit of the regulations and sometimes it goes over a little, but that's what makes those fights exciting". Many drivers want to talk to governing body, the FIA, at this weekend's Mexico City Grand Prix about F1's rules on racing. Verstappen used these to his advantage in Austin in a move at Turn 12 in which Norris was trying to overtake him around the outside. The rules say if the driver on the inside has his front axle ahead of the car outside him at the apex of the corner, he does not need to give his rival any room on the exit. But a number of drivers feel Verstappen is exploiting that rule by braking so late that he complies with the regulation, but then goes off the track himself. Another rule says drivers are not allowed to force a rival off the track, but this was not applied in this case. Several drivers feel defending in that way makes it almost impossible to overtake Verstappen.

  Norris, who is 57 points behind the three-time world champion with five races to go and 146 available, said: "The fact of getting off the brakes just to be ahead at apex, no matter how wide you run on the exit, is incorrect and I don't believe that's how racing should be. "So I think there are some tweaks [that need making]. But Max races hard, I expect that. I just don't think I was in the wrong last weekend. I don't believe either of us were necessarily in the wrong. "It's not that I believe he should have got a penalty and I shouldn't. I don't believe either of us should have got a penalty. "The stewards have a tough job because every race is different. You have to understand the driver's mindset. He has nothing to lose, I have a lot to lose. So he can afford to take bigger risks than I can and that's just the unfortunate position I'm in at the moment." Asked whether the rules give too much incentive to brake late and have the front axle ahead of a rival's when defending a corner on the inside in the way Verstappen did, Leclerc added: "It's a very complex subject. I don't have the right answer here. Common sense has to be applied in certain situations. "When a driver does that multiple times in the same way...we have to still create overtaking opportunities. What I have seen in Austin was maybe a bit too extreme." Williams driver Alex Albon felt there needed to be an addition to that specific rule that covers the scenario when both drivers go off track, as happened between Verstappen and Norris. "It's tricky because he's still in control but he's still off the circuit," he said. "So there probably needs to be some kind of sentence around, 'if you then end up going off the track yourself, there should be some kind of fall back or give back position'."
