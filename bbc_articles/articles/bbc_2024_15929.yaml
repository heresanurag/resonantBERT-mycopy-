  James Anderson takes 7-35 eight days before his farewell Test appearance for England t put Lancashire on top against Notts.

  Anderson takes 7-35 to put Lancs on top against Notts

  James Anderson has taken 55 five-wicket hauls in his first-class career

  Nottinghamshire (3 pts) trail Lancashire (6 pts) by 143 runs with seven second innings wickets remaining

  James Anderson took seven for 35 in Lancashire's County Championship match against Nottinghamshire, eight days before his farewell Test appearance for England. Anderson had figures of 6-19 as he ripped through the Notts batting line-up before lunch as the visitors reached 74-6, and then added another in the afternoon session as they were bowled out for 126. The 41-year-old's figures were the best by a bowler in the Championship all season in what is his first match of the summer ahead of the first Test against West Indies at Lord's on 10 July. He was wicketless in the second innings as the follow on was enforced, but Australia spinner Nathan Lyon picked up both wickets as Notts ended on 84-2, 143 runs in arrears. “To do what he did this morning was pretty amazing to witness," said Lyon. “Obviously I’ve seen it when I’ve been on the other side, when I’m not standing there saying ‘come on Jimmy’, so that was amazing to watch and amazing to be a part of."

  Next week's Test will be the 188th of Anderson's career - having made his debut in 2003 and taken 700 wickets, the most of any fast bowler in Test history. He reeled off 10 overs on the spin in his first competitive cricket since the fifth Test against India in March, in a vintage spell of bowling in overcast conditions. It was the 55th five-wicket haul of his first-class career and moves his overall tally of first-class wickets to 1,121. "I’ve said this before, I’m very surprised that England have tapped him on the shoulder and said 'you’ve got one more Test and that’s it'," added Lyon. “He’s world class. He’s probably the best to ever play the game as a fast bowler and his skillset especially in England is remarkable. “No disrespect to the other bowlers playing in this game - the class of what Jimmy brings to the table, the extra zip off the wicket, the extra bounce he gets. That’s not even mentioning his skillset - that ability to go both ways and also bowl the wobble seam." Anderson, who has been appointed as a fast-bowling mentor once his international career ends, has not yet confirmed whether he will retire from county cricket.

  With Nathan Lyon and James Anderson, Lancashire had an attack with 1,230 Test wickets

  Lancashire skipper Keaton Jennings declared once his side had scored the six runs needed for a third batting point and then watched from second slip as Anderson unleashed his astonishing spell from the Harrod Drive End to destroy the visitors’ top order. If there was a shade of good fortune about his first wicket when Haseeb Hameed deflected the ball just enough to clip the bails, the rest were the result of Anderson repeatedly hitting a perfect line and length. Will Young was the next to depart when edging behind to wicketkeeper Matty Hurst followed by Joe Clarke caught at second slip, while both Jack Haynes and Lyndon James were caught fending off rib-high deliveries. Anderson took all six wickets to fall before lunch after Liam Patterson-White edged to give fourth slip another catch and, suitably refreshed, the England bowler returned to have Dillon Pennington caught behind in the fifth over of the afternoon. By then Tom Bailey had nipped in to take two wickets in two balls, ending a 41-run partnership between Ben Slater and Calvin Harrison when the latter edged behind, and having Olly Stone caught at second slip. Last pair Slater and Dane Paterson added 42 for the last wicket before a direct hit by Lyon ended the innings with Paterson run out. Slater, who carried his bat for 64 in that innings, was trapped lbw for 17 by Lyon when Nottinghamshire followed on and the Australia spinner had Hameed caught behind for 41.
