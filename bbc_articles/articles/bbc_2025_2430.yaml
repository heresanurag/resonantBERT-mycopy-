content: |-
  Chelsea captain Millie Bright says it was "hugely disappointing" to hear insults directed at her following their 1-0 win at Aston Villa on Sunday.

  We are not collectibles or robots, we are humans - Bright

  Chelsea captain Millie Bright said it was "hugely disappointing" to hear insults directed at her following their 1-0 win at Aston Villa on Sunday. The England defender said a fan made an expletive-filled comment about her first-half performance after asking for photos and autographs. "Now everyone can have their opinion, what was said I don't actually care about, but it was more the fact this came after they'd ask for photos and signatures," Bright posted on Instagram on Monday. "Please may I remind you that as players we are not collectibles, we are not robots, we are humans the same as you." Earlier this season, Chelsea made the decision to stop players from giving autographs and photos at their home ground Kingsmeadow, saying it was "no longer safe or sustainable" to do so.

  A late own goal from Villa's Sarah Mayling helped the Blues continue their unbeaten run in the Women's Super League this season. The five-time defending champions hold a seven-point lead at the top of the WSL and have conceded just six goals in 13 matches - all of which Bright has played in. The 31-year-old asked for fans to be "more mindful of your comments". "After every game we as players make a choice to give you our time, support and generosity to do photos, signatures, have conversation, because we care and respect you travelling to support us," she added. "Every game we give our absolute all and it won't always be pretty or perfect, but just remember we give everything to be the best for you. So this experience was hugely disappointing, especially from a fan sat in the Chelsea section."
