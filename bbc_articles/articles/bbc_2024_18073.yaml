title: Boy, 11, arrested on suspicion of Hartlepool police car arson - BBC News
date: '2024-08-01'
section: Tees
url: http://www.bbc.co.uk/news/articles/crglyl239yjo
content: |-
  It follows the arrest of 11 other people so far after unrest in Hartlepool on Wednesday.

  Cleveland Police said 12 people had been arrested so far

  An 11-year-old boy has been arrested on suspicion of arson after a police car was set alight on a night of unrest on Teesside. It follows the arrests of 11 other people, as police officers were attacked with missiles, glass bottles and eggs in Hartlepool's Murray Street area on Wednesday. Cleveland Police said it believed the disorder, which saw one of the force's vehicles set on fire, was linked to protests over the fatal knife attack on children in Southport, Merseyside, on Monday. Assistant Chief Constable David Felton said "disorder of this kind will not be tolerated" and that the force continued to work to identify those involved.

  Cleveland Police confirmed the boy was the youngest person arrested so far in connection with the riots.

