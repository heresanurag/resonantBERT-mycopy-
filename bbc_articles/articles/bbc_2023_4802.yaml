title: Wisconsin Sheriff rescues stuck bobcat from car grille - BBC News
date: '2023-04-21'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-65346484
content: |-
  A Sheriff's office in Wisconsin responds to an unusual call by a driver.

  A Sheriff's office in Wisconsin responded to an unusual call by a driver, after a bobcat got stuck in a car grille.

  Officials say the animal was unharmed and eventually set free back at the location where it entered the car.
