  The jury was told in October 2023 Mr Plumb engaged in an online discussion with a person he believed to be called David Nelson. "In that discussion, the defendant explained his plans to kidnap, rape and murder the celebrity Holly Willoughby," Ms Morgan said. She said Mr Plumb's plans were "graphic and were obviously sexually motivated" – but that Mr Nelson was, in fact, an undercover police officer from the US. The court was also shown a video Mr Plumb sent to Mr Nelson showing a “kit of sexualised paraphernalia” laid out on a bed, including hand and ankle shackles, a rope and a ball gag.

  Summing up the defence’s case earlier, Sasha Wass KC said Mr Plumb’s online discussions were a "dark, twisted fantasy but a fantasy nonetheles". "The fun - if that is the right word - was fantasising, pretending that the plan would be put into effect," she told the jury. "There is no doubt that Gavin Plumb sent the messages and there is no doubt that the content of the messages are vile and misogynistic - and Mr Plumb himself accepted they were dark." Ms Wass said the messages were "the ramblings of a rather sad" individual. "The plan was riddled with flaws - it was wholly unachievable," she added. The barrister added Mr Plumb had fallen down a "rabbit hole" of fantastical online chat rooms where "similar lonely, disaffected people were feeding off their fantasies". She continued: "It was the fantasy of rape and abduction that gave him the gratification."

  Mr Plumb said he could not stand while he gave evidence during the trial

  Ms Wass warned jurors it "would not be fair to hold [Mr Plumb's] previous convictions against him". The defendant had tried to kidnap two air hostesses off a train in 2006, and in 2008 he attempted to falsely imprison two 16-year-old girls at a shop, his trial was earlier told. Mr Plumb's age at the time and the fact he pleaded guilty to the offences meant it "wouldn't be right" to judge him on them, Ms Wass said. "I would urge you to stick to the evidence in this indictment and the central question - is this a serious plan or is it a fantasy?," she added. Closing her speech, Ms Wass said Mr Plumb's alleged plan was instead "the ravings of an isolated individual". The jury retired at 15:23 BST after hearing seven days of evidence.
