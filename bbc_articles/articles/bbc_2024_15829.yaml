title: 'Holly Willoughby: Jury considers verdict in kidnap plot trial - BBC News'
date: '2024-07-02'
section: Essex
url: http://www.bbc.co.uk/news/articles/c51yw6d4elwo
content: |-
  Gavin Plumb is alleged to have planned his “ultimate fantasy” of attacking the TV presenter.

  Pictures of TV presenter Holly Willoughby were posted in an online group called "Abduct Lovers", a jury at Chelmsford Crown Court heard

  Jurors in the trial of a man accused of plotting to abduct, rape and murder Holly Willoughby have retired to consider their verdicts. Gavin Plumb, 37, is alleged to have masterminded his "ultimate fantasy" by assembling tools to help him attack the TV presenter between 2021 and 2023. The security guard, from Harlow, Essex, was arrested and charged after unwittingly disclosing his alleged plan to an undercover police officer from the US. Mr Plumb has denied soliciting murder and inciting rape and kidnap throughout his seven-day trial at Chelmsford Crown Court.

  Mr Justice Murray urged jurors to "put aside your own feelings and judge the case calmly and dispassionately" as they retired.

  Gavin Plumb allegedly said he wanted to give Ms Willoughby a birthday present "she'll never forget"

  During the trial, prosecutor Alison Morgan KC alleged Mr Plumb wanted to take Ms Willoughby from her home by force and lead her to a "dungeon". Mr Plumb went to "great lengths to suggest to other people it was not a fantasy", she told the jury.

  The court was earlier played a voice note Mr Plumb sent to a man only known as Marc in March 2023. It outlined a plan to "hit" Ms Willoughby's house at night before using chloroform to incapacitate her. "We’re then gonna force her to make a video saying she came with us under her own free will... and she’s fully consenting to everything we do to her – so that covers us," Mr Plumb said in the voice note. It was also alleged he messaged Marc saying: "I'm now at the point that fantasy isn't enough anymore. I want the real thing."

