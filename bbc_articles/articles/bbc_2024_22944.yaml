  The company said it is a "very different organisation" now and "seeks to put the welfare of our employees at the heart of everything we do". The department store's new owners have a compensation scheme for ex-employees who say they were attacked by Fayed, which is separate to the legal action being taken by some accusers. Harrods has already reached financial settlements with the majority of people who have approached them since 2023, and has had new inquiries this week. Harrods is accepting vicarious liability for the actions of Fayed, and there are no non-disclosure agreements attached to the settlements.

  Dean Armstrong KC, one of the barristers representing alleged victims, said he was "at a loss" as to what the new information Harrods received in 2023 may have been. In a BBC interview on Saturday, he argued the new owners - who bought Harrods in 2010 - "either didn’t know [about the allegations] - which I find very difficult to accept - or refused to acknowledge that there was this background of sexual misconduct". Mr Armstrong also said his team had 37 clients, but that the number of people who had contacted them with claims about Fayed was approaching 150. Lawyers allege Fayed's assaults occurred around the world - including in the UK, US, Canada, France, Malaysia and Dubai. "It's very much a global case, it’s not just the UK. It happened all over the world," another lawyer, Bruce Drummond, told the BBC. On Sunday, Deputy Prime Minister Angela Rayner said she was concerned by a culture of "powerful people who seem to get away with it" in response to the sex abuse allegations made against Al Fayed. Speaking on the BBC’s Sunday with Laura Kuenssberg programme, she said: "I think there's a lot of work that needs to be done to make sure that nobody is above the law and can hide in plain sight."

