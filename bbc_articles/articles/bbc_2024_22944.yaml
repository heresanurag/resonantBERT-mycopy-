content: |-
  Evidence was presented by police in 2009 and 2015 over sex abuse claims against Mohammed Al Fayed.

  CPS twice did not prosecute Fayed over sex abuse claims

  Late Harrods department store owner Mohamed Al Fayed has been accused of rape and sexual assault

  The Crown Prosecution Service has said that it twice considered bringing charges against ex-Harrods owner Mohammed Al Fayed but concluded there was no realistic prospect of a conviction. Police officers presented the CPS with evidence in 2009 and 2015 "which our prosecutors looked carefully at", it confirmed. Fresh allegations are being made about the late billionaire, who died last year at the age of 94. A BBC documentary has led to dozens of women coming forward to say they were raped or sexually assaulted by the businessman.

  In 2008, the Metropolitan Police investigated Fayed after a 15-year-old girl said he sexually assaulted her in the Harrods boardroom. The force said it handed a file of evidence to the CPS - a step which has to be taken before charges can be issued. Three other investigations into claims made by three other women - in 2018, 2021 and 2023 - got to an advanced enough stage that the CPS was called in to advise detectives, as first reported by the Sunday Times, external. But, in those instances a full file of evidence was not passed to prosecutors.

  Fayed bought Harrods in 1985 and sold it in 2010. More than 20 women have told the BBC the businessman sexually assaulted or raped them while they worked at Harrods luxury department store in London. The legal team representing many of the women making allegations against Fayed outlined their case against Harrods on Friday. Harrods’ current owners said earlier this week they were "utterly appalled by the allegations of abuse perpetrated by Mohamed Al Fayed". "These were the actions of an individual who was intent on abusing his power wherever he operated and we condemn them in the strongest terms," they said in a response to the BBC investigation. "We also acknowledge that during this time his victims were failed and for this we sincerely apologise. We are doing everything we can to fix this."

