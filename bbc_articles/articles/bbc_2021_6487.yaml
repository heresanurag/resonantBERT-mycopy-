title: 'Ballymurphy: The search for truth - BBC News'
date: '2021-05-12'
section: General
url: http://www.bbc.co.uk/news/uk-northern-ireland-57068152
content: |-
  A look at the background to the events of 1971 in west Belfast and bereaved families' search for truth.

  Ten people killed in west Belfast almost 50 years ago in the wake of an Army operation were "entirely innocent", an inquest has found.

  The inquest, which began in November 2018, examined the deaths in and around the Ballymurphy area of west Belfast in August 1971.

  The deaths happened in the wake of an Army operation in which paramilitary suspects were detained without trial.

  BBC News NI's Will Leitch, who regularly attended the inquest, looks at the background to the events and the bereaved families' search for the truth.
