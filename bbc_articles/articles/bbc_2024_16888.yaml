  The bat was discovered after a couple returned from their holiday in Lochailort in the Highlands.

  Baby bat returns to Highlands after hiding in holiday suitcase

  This video can not be played To play this video you need to enable JavaScript in your browser. Baby bat Raspberry became disoriented and found its way into a suitcase

  A baby bat has been returned to its home in the Highlands after hiding away in a couple's holiday luggage. It was discovered by Alex O'Neill when he arrived back in Glasgow, after he and his partner stayed at a cottage on Kinlochmoidart Estate in Lochailort. The tiny bat, which has been named Raspberry, survived tucked away for four hours on the 150 mile (240km) road trip last week. After being handed into the care of a bat expert, Raspberry was helped back to full health and released in the Highlands on Saturday evening.

  Rasperry gets back to fitness by flying around the ceiling

  Alex told BBC Scotland News that he found the bat after he felt something moving in his bag while unpacking. He said: "We see bats here in Glasgow sometimes. Lochailort has a lot of them so it wasn’t likely to freak me out. "I took it out, threw something over it keep it dark, and then looked on Google for what to do with a bat. "It was calm, it wasn’t agitated or anything. It was just a case of dropping a tea towel on it and scooping it up to look after it."

  The Darlington family helped transport Raspberry back to the Highlands

  Alex contacted the Bat Conservation Trust who put him in contact with expert Tracey Jolliffe - a microbiologist and former vet nurse. Tracey, who named the bat Raspberry, said it was an inexperienced flyer and likely became disoriented which led it into the suitcase. She added: "Raspberry was a juvenile on the point of her first proper flight. It’s relatively common for them to get into trouble at that point. "She was a bit skinny and in a bit of a bad way at first, but fine after a few days of feeding her up."

  Tracey allowed Raspberry go on test flights around her ceiling to make sure it would be capable of taking to the skies again. She appealed on social media for anyone who could help transport Rasperry back to the Highlands. The Darlington family from Wrexham- who were visiting Glasgow on their way north - were able to take Raspberry part of the way to Strontian in Lochaber. Raspberry was then passed to countryside ranger Eilidh-Ann Philips who took her back to Kinlochmoidart Estate. Raspberry was quickly joined by other bats from the roost when she was released at dusk on Saturday. Sarah Winnington-Ingram, who runs the estate, said she cannot remember an animal ever stowing away with a visitor. She added: "It’s quite unusual. There is a lot of wildlife up here and people see bats all the time, but not like that. "I’ve never even seen a bat in the cottage before either. It’s great to see it back home safely."
