title: Kevin Sinfield 'battered' after 230-mile Rob Burrow run - BBC News
date: '2024-12-09'
section: Manchester
url: http://www.bbc.co.uk/news/articles/cwyx1gw2dw2o
content: |-
  The rugby league star did seven ultra marathons in seven days and raised more than £1m.

  Kevin Sinfield started in Liverpool before heading to Belfast during his challenege

  Rugby star Kevin Sinfield has said he feels "battered" after completing a "really demanding" 230-mile run in aid of people with motor neurone disease (MND). Sinfield finished seven ultra marathons in seven days in memory of his late teammate Rob Burrow, who died with the illness in June. The former England player started the week-long endeavour in Liverpool before finishing near his home in Saddleworth, Greater Manchester, on Saturday, raising more than £1m. He told BBC Radio Manchester: "I am a little battered still but I've slept pretty well for the last two nights."

  He added: "It will take me a couple of days to get right." The former Leeds Rhino player defied a serious muscle injury picked up in November to complete his 'Running Home for Christmas' challenge. Sinfield admitted he suffered a "tear in the back of my calf". The 44-year-old said: "It put the whole thing in jeopardy, but now I have a lot of back pain and hip stuff. "But there is a difference between being injured and being in pain. It was really demanding and really tough. "Some days we were on our feet for nine hours. But we got through it. It was great to finish back home." The Oldham-born star met members of the MND community as he did his marathons. He said: "There was a lot of emotion from the stories you hear from the time you spend with people. "It did mean that it was more emotional and some ways energised us from some of the stories you hear. "It drives you forward and Rob was never far from my thoughts."

  Rob Burrow was accompanied by his family and Sinfield at the Leeds Marathon this May

  The former rugby star said: "We saw how much people respected and loved him. "To see what he and his family went through was tragic but we have all taken inspiration from him." Sporting legends including Olympic cycling couple Sir Jason and Dame Laura Kenny, plus Greater Manchester Mayor Andy Burnham and members of the MND community accompanied Sinfield during sections of the gruelling run. It was his fifth annual fundraiser for MND charities, prompted by Burrow's diagnosis in 2019. They became friends after playing at Leeds Rhinos and Sinfield has raised more than £11m since he started the epic runs in 2020. Following Burrow's death at the age of 41, his father urged Sinfield to continue the fundraising efforts to tackle the impact of MND.

  Sinfield ran past both Manchester City and United on the last leg of his tour

  Burrow, who was married with three children, was diagnosed with MND in 2019, after a successful rugby career which included eight Super League Grand Final victories. He also won 15 England and five Great Britain caps.
