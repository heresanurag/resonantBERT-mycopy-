title: 'Paris Paralympics: GB''s Sarah Storey selected for ninth Games - BBC Sport'
date: '2024-07-22'
section: Disability Sport
url: http://www.bbc.co.uk/sport/articles/c725xyex9p3o
content: |-
  Cyclist Sarah Storey has a chance to add to her 17 Paralympic gold medals after being selected for her ninth Games.

  This video can not be played To play this video you need to enable JavaScript in your browser.

  Great Britain's most successful Paralympian Sarah Storey says being selected for a ninth Games was a "pinch-me moment" after she was named on Monday in a 23-strong cycling squad for Paris 2024. The 46-year-old made her debut as a swimmer in Barcelona in 1992 aged 14 before switching to cycling in Beijing in 2008. She won a record-breaking 17th Paralympic gold in Tokyo in 2021 in the C4-5 road race to move one gold ahead of Mike Kenny and become GB's most decorated competitor. Unlike in her previous Games as a cyclist, Storey will not compete on the track and will instead focus on the time trial and road race events which will take place in Clichy, near Paris. "I'm thrilled to have the chance to put on the ParalympicsGB kit again," Storey told BBC Sport. "It is a pinch-me moment and is a dream I didn’t know I had as a kid. "It has been a huge motivation since the lockdown Games in Tokyo to get to Paris and to be able to have all those spectators there. It feels like a home Games again. "For me, it is all about trying to defend my two road titles from Tokyo. I am also double world champion from Glasgow in 2023 in those two events. "These Games will have two different courses so every time you get on the start line it is a different challenge that lies ahead and you need different skills. "I think that is what keeps it exciting, keeps everyone guessing and keeps me working hard to see if I can pull out another great performance." She is joined on the team by fellow Tokyo gold medallists Kadeena Cox, Jody Cundy, who will be competing at his eighth Games, Jaco van Gass and Ben Watson plus husband and wife Neil and Lora Fachie and their sighted pilots Corrine Hall and Matt Rotherham. The team also includes current world champions Lizzi Jordan and Danni Khan, Daphne Schrager, Archie Atkinson, Blaine Hunt, Fin Graham and Fran Brown. Tokyo medallists Sophie Unwin and Jenny Holl, James Ball and Steve Bate are also named along with pilots Steffan Lloyd and Chris Latham and Paralympic debutant Matt Robertson. Track events take place from 29 August-1 September followed by road events from 4-7 September. The GB cycling team enjoyed their most successful Paralympic Games ever in Tokyo, coming home with 24 medals with every rider winning a medal.

  Graham has gained plenty of experience since his Paralympic debut in Tokyo

  Graham won two silvers in the C3 category on his Games debut in Tokyo but the 24-year-old Scot has claimed world gold on the track and road since then and is hoping for more in France. "In Tokyo I was able to fully focus on performance without the crowd and extra distractions so I could just focus on getting the best out of myself," he told BBC Sport. "Now I know what performances to go through to get that out of myself, so hopefully I can enjoy the atmosphere more, soak it up and experience the Games for what it is. "It will be exciting to have a full Games with friends and family there." Having finished second behind team-mates Van Gass and Watson in the individual pursuit and road race respectively, Graham wants to go one better in Paris. "Jaco and I have had some good battles and it keeps you focused in training, but I’ve been going well on the road in both the time trial and road race this season," Graham added. "Going to Tokyo I had only won one World Cup bronze, but since then I've won six world championships and multiple World Cups so I feel my performances have stepped on since then. "I feel a lot stronger and hopefully in Paris it will all lead to good results. If I can come back with one gold I would be over the moon."

  Men: James Ball piloted by Steffan Lloyd, Steve Bate piloted by Chris Latham, Neil Fachie piloted by Matt Rotherham, Matt Robertson, Fin Graham, Jaco van Gass, Ben Watson, Archie Atkinson, Jody Cundy, Blaine Hunt Women: Lora Fachie piloted by Corrine Hall, Lizzi Jordan piloted by Danni Khan, Sophie Unwin piloted by Jenny Holl, Fran Brown, Daphne Schrager, Kadeena Cox, Sarah Storey
