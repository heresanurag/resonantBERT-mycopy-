title: Bushey man murdered after honeytrap set-up, court hears - BBC News
date: '2022-07-07'
section: Beds, Herts & Bucks
url: http://www.bbc.co.uk/news/uk-england-beds-bucks-herts-62084191
content: |-
  A jury is told Vishal Gohel was promised a sexual liaison with three women before being killed.

  Three men burst into Vishal Gohel's flat after he was promised a sexual liaison with three women, court hears

  A man was murdered in his own home after being set up by three women in a "honeytrap", a court heard.

  Vishal Gohel, 44, was found dead with gaffer tape on his face at his flat in High Street, Bushey, Hertfordshire, in January.

  The jury at St Albans Crown Court was told he had been promised a sexual liaison with the women before three men burst into the property.

  Three men and three women deny murder and manslaughter.

  They also deny conspiracy to rob on or before 23 January.

  The male defendants are: Tevin Leslie, 21, of Hurst Street, Brixton, London, Sakeen Gordon, 20, of Uxbridge Road, Ealing, Brandon Browne, 21, of Laburnham Road, Rochester, Kent.

  The female defendants are: Tiana Edwards Hancock, 18, of Fresh Wharf Road, Barking, Yarley Georgia Bruce-Annan, 20, of Harts Lane, Barking, and Faith Hoppie, 21, of Blake Avenue, Barking.

  Mr Gohel was found dead at his flat by his neighbour, the court heard

  "They promised him a sexual liaison that never happened.

  "It allowed them to give entry to the three male defendants so they could burst in and take Vishal Gohel unawares and steal property from him."

  The prosecutor said a post-mortem examination showed Mr Gohel suffered severe blows to his head with internal bruising to his scalp, eyes and jaw and brain damage.

  She said efforts had been made to clean up the flat and an iPhone and an iWatch had been taken.

