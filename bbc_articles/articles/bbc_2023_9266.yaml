title: Dingo bites tourist sunbathing in Australia - BBC News
date: '2023-06-23'
section: General
url: http://www.bbc.co.uk/news/world-australia-65994828
content: |-
  New video shows the moment a French woman was attacked by a dingo at a beach in K’gari, Australia.

  The Queensland Department of Environment and Science says the animal was "humanely euthanised" after being involved in a number of "high-risk" incidents.

  K'gari Island in Queensland is home to some 200 wild dingoes. There are strict rules against feeding them with heavy fines for offenders. Another dingo was euthanised earlier this month after months of attacks on the island.
