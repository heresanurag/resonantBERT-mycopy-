content: |-
  Thousands of starlings are seen swooping above a Northamptonshire village by residents.

  Thousands of starlings have been caught on camera swooping and swirling above a Northamptonshire village.

  They were filmed by Pattishall resident Kim who has been witnessing the spectacular sight most days, between about 16:30 and 17:30 GMT.

  She said: "It's a beautiful sight to behold watching them every evening dance above my house, but my car is a mess and I've watched my poor neighbour clean hers twice in a week."

  The RSPB said many starlings arrive in the UK, external from Scandinavia during winter and when they flock, murmurations can contain tens of thousands of birds.
