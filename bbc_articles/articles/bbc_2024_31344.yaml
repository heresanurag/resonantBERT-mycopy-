title: 'Fifpro: Seven Manchester City players and nine England Lionesses nominated
  for 2024 team of the year awards - BBC Sport'
date: '2024-12-02'
section: Football
url: http://www.bbc.co.uk/sport/football/articles/cge9d01vpvwo
content: |-
  Seven Manchester City players are among 11 Premier League stars nominated for the 2024 Fifpro team of the year.

  Seven Manchester City players are among 11 Premier League stars nominated for the men's 2024 Fifpro team of the year.

  Only Real Madrid have more players nominated with eight, including France forward Kylian Mbappe, who joined the Spanish club from Paris Saint-Germain in the summer.

  City's seven are goalkeeper Ederson, defenders Ruben Dias and Kyle Walker, midfielders Rodri, Kevin de Bruyne, Phil Foden and striker Erling Haaland.

  There are nine England Lionesses in the 26 players on the women's World 11 shortlist.

  Women's Super League champions Chelsea have four players nominated - forward Lauren James and defenders Millie Bright, Lucy Bronze and Jess Carter, who now represents American side NJ/NY Gotham FC.

  Goalkeeper Mary Earps, defender Alex Greenwood, midfielders Ella Toone and Keira Walsh and forward Alessia Russo are the other England women's internationals on the list.

  Spain and Barcelona midfielder Aitana Bonmati, who won the women's Ballon d'Or for the second year in a row in October, and Zambia and Orlando Pride striker Barbra Banda, BBC Women’s Footballer of the Year 2024, are also nominated.

  England forward Cole Palmer is shortlisted for the first time as a Manchester City and Chelsea player following his move from Etihad Stadium to Stamford Bridge in August 2023.

  Bayern Munich striker Harry Kane and Real Madrid midfielder Jude Bellingham are the other England internationals in the men's 26-player shortlist.

  Aston Villa and Argentina goalkeeper Emiliano Martinez is also included but there is no place for Liverpool and Egypt winger Mohamed Salah.

  Argentina and Inter Miami forward Lionel Messi and Al Nassr's Portugal striker Cristiano Ronaldo are the only two players from the list of 26 who play outside of Europe.

  Messi's 18th nomination extends his record as the most-nominated player in history, with Ronaldo close behind on 16.

  The Fifpro World 11 award is voted for solely by fellow professional footballers.

  Global players’ union Fifpro say over 21,000 men’s players from 70 countries have voted, while over 7,000 women’s footballers have cast their votes.

  The two World 11 sides will be named at the Fifa Best awards on 9 December.
