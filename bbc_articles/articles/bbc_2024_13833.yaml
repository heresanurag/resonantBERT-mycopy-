  Conway called up by Scotland as Doak drops out

  Tommy Conway scored in Scotland Under-21's 2-1 defeat by Turkey on Monday

  Tommy Conway has been called up to the provisional Scotland squad for the Euro 2024 finals following injuries to Lyndon Dykes and Ben Doak. Bristol City striker Conway scored in Scotland Under-21's 2-1 defeat by Turkey on Monday. He will bolster Scotland's striking options after Dykes was ruled out the tournament having injured his ankle in training. As the Scottish FA announced Conway's promotion to the senior squad, it also revealed Liverpool's Doak had been withdrawn. The uncapped 18-year-old winger had not played for his club since picking up an injury in December. Scotland head coach Steve Clarke had hinted that 21-year-old Conway - who scored 10 goals in 39 appearances in the Championship in 2023-24 - was in contention after Monday's 2-0 win over Gibraltar.

  Conway could be in contention for his senior debut as Scotland host Finland in Friday's final warm-up friendly before the competition in Germany. Dykes and Doak were included in an initial, 28-man squad that will be reduced to 26 before Scotland head to their training camp in Germany. That announcement might not come until after Friday's match at Hampden, with Clarke admitting: "It's quite a tricky one to be honest because you can put the team in at midnight on Friday. "You could tell someone on Thursday they are not going and then we pick up an injury on the Friday and you have to give them a cuddle and say, 'I love you, you're going'. "It's strange that they make us do it like this, but we will find a way. "I will be speaking to the players concerned if they are not going to be in the 26 before the Friday game. "Maybe you guys won't find out until after the Friday game." Midfielders Stuart Armstrong, who is leaving Southampton, and Manchester United's Scott McTominay did not feature against Gibraltar along with Rangers centre-half John Souttar as they work their way back from injury. Meanwhile, Leeds United centre-half Liam Cooper limped off in Faro, although he is expected to brush off a knee knock. "We will assess who played, the minutes they got, whether they feel they need a few more minutes, but it will be a little bit closer to a more familiar Scotland team under my tutelage," Clarke added.
