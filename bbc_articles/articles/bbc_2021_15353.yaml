title: 'North Shropshire by-election: Historic Lib Dems win is declared - BBC News'
date: '2021-12-17'
section: General
url: http://www.bbc.co.uk/news/uk-59693894
content: |-
  The Lib Dems have stunned the Conservatives with victory in the North Shropshire by-election.

  The Liberal Democrats have won a surprise victory in the North Shropshire by-election. Newly-elected MP Helen Morgan won with 17,957 votes. The Conservatives previously had a majority of almost 23,000 in the traditionally-safe Tory seat. The by-election was sparked by the resignation MP Owen Paterson.
