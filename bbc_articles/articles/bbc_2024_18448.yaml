content: |-
  The singer was disqualified from the contest in May, after an alleged altercation with a camerawoman.

  Eurovision star: There never was a case against me

  Joost Klein was one of the favourites to win the Eurovision Song Contest before he was disqualified

  Eurovision singer Joost Klein has expressed his frustration and relief after Swedish police dropped their investigation into a backstage incident that led to his disqualification from the contest. The singer was removed just hours before the grand final in May, after an alleged altercation with a camerawoman. But Swedish prosecutors said on Monday, external that they could not prove that a gesture Klein had made during the incident “was capable of causing serious fear,” or that Klein had intended it to scare her. Writing on Instagram, the singer welcomed the decision. "There is no case against me," he said, external, "because there never was a case."

  However, he expressed disappointment that it had taken three months for the investigation to be closed. "The last couple of months were terrible," he said. "Even though I love to perform anywhere around the world, something didn't feel right. Why did we have to wait so long for an answer?" He also suggested his disqualification had been motivated by commercial considerations, although it is unclear what those might have been. "Companies just want to protect their money and they tried to use me as a shield," he wrote. "A village against the city."

