content: |-
  The youngest member of The Nelons - who was not on board - confirmed the death of her parents and sister.

  Three members of family gospel group die in plane crash

  (From L-R) Kelly Nelon Clark, Amber Nelon Kistler, Autumn Nelon Clark and Jason Nelon Clark performed as The Nelons

  A husband, wife and their daughter who performed together in American gospel group The Nelons have been killed in a plane crash along with four other people. Jason and Kelly Nelon Clark died alongside Amber Nelon Kistler on Friday when their aircraft came down over Wyoming on its way to a performance. Autumn Nelon Streetman - who also performs in the Grammy Award-nominated group but was not on board - confirmed the death of her parents and sister on Instagram. She thanked fans for their "prayers, love and support" hours after the fatal crash.

  Amber's husband Nathan Kistler, the family's assistant Melodi Hodges, pilot Larry Haynie and his wife Melissa Haynie were also killed, according to the group's management. Gaither Management said the passengers were making their way to Seattle to join a cruise ship The Nelons were due to perform on. Officials in the area where the plane came down said it happened at about 13:00 local time, north of the town of Gillette. Local media said it triggered a wildfire. A National Transportation Safety Board spokesman said preliminary reports indicate the aircraft crashed after an "auto pilot issue". The band's management said Autumn - the youngest member of the family act - was awaiting the arrival of her parents and sister in Seattle when she was informed. In a post on Instagram, Autumn said: "Thank you for the prayers that have been extended already to me, my husband, Jamie, and our soon-to-be-born baby boy, as well as Jason's parents, Dan and Linda Clark." Rex Nelon, the father of Kelly Nelon Clark, founded the group in the 1970s. They have been nominated for three Grammy awards and were inducted into the Gospel Music Association Hall of Fame in 2016. The group's biggest hits include I Shall Not Be Moved, Come Morning and We Shall Wear a Robe and Crown. Kelly was also an actress and appeared in the ABC fantasy drama Resurrection.
