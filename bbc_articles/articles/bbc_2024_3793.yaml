title: Starling murmuration in Northamptonshire caught on camera - BBC News
date: '2024-03-10'
section: General
url: http://www.bbc.co.uk/news/uk-england-northamptonshire-68284841
content: |-
  Thousands of birds are spotted flying together and changing direction in unison at sunset.

  Thousands of birds have been captured on camera swooping above a village at sunset.

  The starlings were spotted flying and changing direction in unison in Crick, Northamptonshire.

  Murmurations like this happen at dusk and early evening in the autumn and winter months in the UK.

  Studies suggest the birds congregate to deter possible predators, which are confused by the swirling masses.

