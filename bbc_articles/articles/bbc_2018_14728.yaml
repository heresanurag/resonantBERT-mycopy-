title: 'Simon Thomas: Coping with grief at Christmas - BBC News'
date: '2018-12-18'
section: General
url: http://www.bbc.co.uk/news/uk-46607905
content: |-
  TV presenter Simon Thomas met with Joe, who also lost his wife to cancer, to speak about grief over the festive season.

  Simon Thomas's wife Gemma died from acute myeloid leukaemia just before last year's Christmas.

  This year, to help cope with his grief over the holiday period, the former Blue Peter presenter met with Joe who also lost his wife to blood cancer.

  Simon shared with BBC Breakfast what it's been like for his family and the hope his son gives him.
