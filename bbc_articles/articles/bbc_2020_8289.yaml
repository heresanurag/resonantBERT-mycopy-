title: 'PC Andrew Harper trial: Video shows defendants laughing - BBC News'
date: '2020-07-24'
section: General
url: http://www.bbc.co.uk/news/uk-england-berkshire-53445791
content: |-
  A video shows two teenagers who dragged a police officer to his death laughing as they leave court.

  A video shows two teenagers who dragged a police officer to his death laughing as they left court after a previous appearance.

  Albert Bowers, of Moat Close, Bramley, and Jessie Cole, of Paices Hill near Reading, both 18, were filmed ahead of the trial into the death of PC Andrew Harper.

  PC Harper died from catastrophic injuries after his ankles got caught in a strap trailing behind a vehicle driven by Henry Long, in August 2019.

  Long, 19, had earlier admitted manslaughter but was cleared of murder.

  Albert Bowers and Jessie Cole, both 18, were cleared of murder but found guilty at the Old Bailey of manslaughter
