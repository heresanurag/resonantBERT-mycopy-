content: |-
  A selection of your pictures of Scotland sent in between 1 and 8 January.

  Gordy Philip took an icy bike ride on the Great Glen Way between Blackfold and Abriachan in the hills above Loch Ness. He said of his image: "Could be the light at the end of the road on the first day of another lockdown."
