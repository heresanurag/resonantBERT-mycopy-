title: India's Chandrayaan-3 rocket blasts into space for Moon mission - BBC News
date: '2023-07-14'
section: India
url: http://www.bbc.co.uk/news/live/world-asia-india-66199759
content: |-
  The rocket set off from India's space port in Andhra Pradesh, and is due to land a rover on the Moon in August.

  To boldly go... Where no country has gone before

  So India is on its way to the Moon, something only three other countries have done before. But if they're successful they will be the first country to land near the Moon's south pole, which has not been explored as much as other parts of its surface. The first part has gone well, India's space agency says. But we will now need to wait until at least 23 August to see if India can do something no one else has ever done - and land on the south side of the moon. Thanks for being with us today. Zoya Mateen, Meryl Sebastian, Geeta Pandey and Arunoday Mukharji bought us updates from India and were joined by Anna Boys, Antoinette Radford, Jack Burgess and myself in London.
