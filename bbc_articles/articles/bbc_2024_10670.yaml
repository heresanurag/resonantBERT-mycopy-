title: 'Watch: Labour wins Blackpool South by-election - BBC News'
date: '2024-05-03'
section: General
url: http://www.bbc.co.uk/news/uk-68948432
content: |-
  Labour's candidate Chris Webb wins Blackpool South with a huge swing away from the Conservatives.

  Labour's candidate Chris Webb has won the Blackpool South by-election - the seat previously held by Conservative Scott Benton who resigned after a lobbying scandal.

  In his acceptance speech he said that the people of Blackpool South had "spoken for Britain".

  Mr Webb won the seat comfortably with a 7,607 majority and a huge 26% swing from the Conservatives - the third biggest in a by-election since 1945.

  Reform UK almost pushed the Tories into third place, with the party's candidate, local charity worker Mark Butcher, winning 3,101 votes compared with 3,218 for the Tories.
