title: Army horses enjoy Christmas break after busy year of state duties - BBC News
date: '2024-12-19'
section: General
url: http://www.bbc.co.uk/news/videos/cd60g9lz8j6o
content: |-
  The horses have ceremonial duties throughout the year but Christmas is for horsing around.

  The King's Troop Royal Horse Artillery was founded in 1946 and has played an important role in state occasions such as the King's Coronation ever since.

  But once the festive season arrives, the 120 horses based at Woolwich Barracks get the chance to unwind after a busy year of ceremonial duties.

  BBC London reporter Luxmy Gopal went to find out more.

