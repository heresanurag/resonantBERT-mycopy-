title: Sylvester Stallone shadow boxes with the Pope - BBC News
date: '2023-09-08'
section: General
url: http://www.bbc.co.uk/news/world-66757105
content: |-
  The Rocky actor threw some air punches with the pontiff during a meeting at the Vatican.

  Sylvester Stallone and Pope Francis playfully shadow boxed during a visit to the Vatican by the actor and his family.

  The Rocky star was received by the pontiff who told him he "grew up with [his] films".

  Stallone jokingly responded "we box" and threw a few light air jabs, which the Pope then returned.
