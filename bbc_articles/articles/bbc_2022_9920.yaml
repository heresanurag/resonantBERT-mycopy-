id: bbc_2022_9920
title: Crew member of sinking ship airlifted to safety - BBC News
date: '2022-07-02'
section: General
url: http://www.bbc.co.uk/news/world-asia-62024376
content: |-
  Over two dozen crew are still missing after an engineering vessel split in two in the South China Sea.

  A crew member of a sinking engineering vessel in the South China Sea has been rescued by a helicopter team.

  The ship encountered difficulties after a tropical storm passed through area, some 300km (190 miles) south-west of Hong Kong.

  Rescue operations are ongoing and over two dozen crew members are still missing.
