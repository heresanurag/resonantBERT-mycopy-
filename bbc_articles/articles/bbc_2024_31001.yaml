title: Ex-First Minister Humza Yousaf to step down as MSP at next election - BBC News
date: '2024-12-17'
section: Scotland Politics
url: http://www.bbc.co.uk/news/articles/c2ld7je8x2lo
content: |-
  The former SNP leader says it will be the "right time" to leave the Scottish Parliament.

  Humza Yousaf to step down as MSP at next election

  Humza Yousaf was the UK's first ethnic minority leader of a devolved government

  Former First Minister Humza Yousaf is to stand down as an MSP at the 2026 Holyrood election. The ex-SNP leader has been a backbencher since resigning as first minister in May. In a letter to his successor, John Swinney, Yousaf said the next election would be the "right time" to move on from parliament. The Glasgow Pollok MSP, who replaced Nicola Sturgeon in March 2023, was the UK's first ethnic minority leader of a devolved government and the first Muslim to lead a major UK party.

  He quit as first minister and SNP leader following the collapse of the SNP's power-sharing deal with the Scottish Greens.

  In his letter, Yousaf, 39, noted that he will have been an MSP for 15 years by 2026. He said standing down would "provide an opportunity for the next generation of MSPs to step forward, and to explore where I can best make a contribution in the future, in helping to tackle some of the most pressing challenges our world faces". The former first minister added: "I hope by becoming the first first minister of colour, and first Muslim leader of a western democratic nation, I have sent a clear message to every young person, of any background, who aspires to get involved in public service that you do belong and are just as deserving of opportunity as anyone else." After leaving office, Yousaf said terminating the power-sharing agreement with the Greens was his mistake, and that he "underestimated" the level of hurt caused by his decision. He also said he should have offered leadership rival Kate Forbes a more senior role in his government.

  Humza Yousaf was succeeded by John Swinney after resigning as first minister earlier this year

  During his time in Bute House, the former SNP leader took a significant early stand on the conflict in Gaza by calling for an immediate ceasefire. His in-laws were trapped in Gaza for four weeks following Israel's invasion – a period he described as being the most difficult of his life. In his letter to the first minister, Yousaf said he hoped he "was able to demonstrate leadership during what I view as the moral question of our time". Yousaf, the son of Pakistani immigrants, has previously questioned whether he and his family have a future in Scotland or the UK due to Islamophobia. He has also been in a long-running feud with tech billionaire and X owner Elon Musk, with each accusing the other of racism. Yousaf vowed to continue working hard for his constituents until 2026, and to be a committed campaigner for Scottish independence and the SNP after leaving parliament. The former first minister said he looked forward to more time with his family, and thanked his wife Nadia for the "sacrifices she has made for our family over the years".

  Before becoming first minister, Yousaf spent more than a decade in various ministerial roles, including spells as transport, justice and health secretary. John Swinney said he was "sorry" Yousaf was stepping down, describing him as a "pioneer in Scottish politics". The first minister added: "I wish Humza, Nadia and their family much peace together." Scottish Green co-leader Patrick Harvie described the former first minister's decision to end the power-sharing agreement with his party as a "mistake". He added: "But even those events never stopped me liking and respecting Humza, and nobody could doubt his commitment to his job or to building a fairer and better Scotland." The next Scottish Parliament election is scheduled for 2026. However, there is a possibility of a snap election being called before then if the minority SNP administration is unable to pass its budget. Yousaf had applied for initial vetting to stand as an SNP candidate in 2026, though the formal selection process will not start until next year.
