title: 'As it happened: Not the time for slightest relaxation, PM says - BBC News'
date: '2021-01-15'
section: World
url: http://www.bbc.co.uk/news/live/world-55673006
content: |-
  Scientists warn UK deaths will continue to rise as the global death toll passes two million.

  It's likely there are variants all over the world - Vallance

  ITV's Libby Wiener asks if the move to put restrictions in at the borders is too late. The PM says the government is taking steps to protect against the new variants. "We have a situation now where we have a very high rate of domestic infection in the UK combined with a vaccination programme," he says. "There will come a point in the next weeks and months where the vaccination programme will take effect... and you will see a decline in the death rate. "What you can't have is a situation where you have new variants with unknown qualities coming in from abroad and that's why we have set up the system to stop arrivals where new variants are a concern." Sir Patrick Vallance says the virus is changing all the time and he suspects there are variants "all over the world of different types". "The countries which have detected them first have got good sequencing," he says.
