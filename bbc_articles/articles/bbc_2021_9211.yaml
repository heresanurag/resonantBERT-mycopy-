title: Missing 11-year-old Bolton girl is found - BBC News
date: '2021-07-24'
section: Manchester
url: http://www.bbc.co.uk/news/uk-england-manchester-57955421
content: |-
  The child, who travelled from Bolton to London, is found after police mount a nationwide search.

  An 11-year-old girl who sparked a nationwide search when she went missing has been found safe and well.

  The girl left her home in Bolton, Greater Manchester, on Thursday and travelled to London Euston, arriving at 01:13 BST on Friday.

  Her parents who had publicly urged her to contact them, said they were "incredibly relieved".

  Police said she was found in London earlier and officers were now working to reunite her with her parents.

  Det Ch Insp Paul Rollinson said: "She was found in London earlier today so we are now working to reunite her with her parents, who are as you can imagine, incredibly relieved.

  "The last couple of days have been every parent's worst nightmare, so I know they will agree with me when I say a huge thank you to everyone who has shared our appeal to find the child.

  "Your help has been invaluable, so thank you.

  "We would now ask that their privacy be respected, so they can be together as a family."

