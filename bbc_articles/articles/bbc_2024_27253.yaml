content: |-
  A six-hour Manchester United board meeting concluded on Tuesday with Erik ten Hag still in position as the club's manager. Why has there been no comment on his future from the club?

  Why there is silence on Ten Hag's Man Utd future

  Erik ten Hag has been Manchester United manager since 2022

  Manchester United held a monthly board meeting in central London on Tuesday which the BBC reported as being significant in determining the immediate future of United manager Erik ten Hag. The meeting lasted around six hours, with footage of co-owner Sir Jim Ratcliffe arriving and leaving published by some media. After the big build-up, silence. We don't know the outcome because no-one is saying. Last summer, United took just over two weeks from their FA Cup final win over Manchester City to confirm Ten Hag would continue in his job, after days of speculation before and after the game that the Dutchman would be sacked. The BBC reported that United were considering other managers as part of that review. When Ineos decided to stick with Ten Hag, they triggered the option for an additional year on his contract, which now runs to 2026.

  In addition, significant elements of Ten Hag's backroom team were changed, including the exits of assistant manager Mitchell van der Gaag and coach Steve McClaren. To add to the sense of change, in July Dan Ashworth and Omar Berrada finally came off respective periods of gardening leave to take up the sporting director and chief executive roles. This created the structures which Ineos felt United had lacked prior to Ratcliffe's part purchase of the club, which had been announced on 24 December the previous year. After an eighth-place finish, the club's worst of the Premier League era, optimism was high around Old Trafford about a significant improvement. On 29 September, United were hammered 3-0 at home by Tottenham. Questions began to be posed again about Ten Hag's tenure. On 30 September, officials at United let it be known that Ten Hag would stay in his job for the forthcoming games against Porto and Aston Villa. It was not stated the situation would be reassessed after those games, but that was an interpretation some made externally.

