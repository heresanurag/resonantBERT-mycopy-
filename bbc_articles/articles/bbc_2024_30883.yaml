id: bbc_2024_30883
title: Tourists in Fiji ill after suspected pina-colada poisoning - BBC News
date: '2024-12-16'
section: World
url: http://www.bbc.co.uk/news/articles/cn08qdjwkkqo
content: |-
  Authorities said the patients had drunk pina coladas at a five-star resort bar.

  Seven foreigners in Fiji were sent to hospital for suspected poisoning after drinking pina coladas at a five-star resort's bar, local authorities said. Five are tourists, with one from the US and the rest from Australia, aged between 18 and 56. Two others are foreigners living in Fiji, according to local media reports citing the health ministry. Some were previously reported to be seriously ill, but local officials said on Monday that their symptoms have since improved and some were set to be discharged. The incident comes weeks after the deaths of six tourists in the South East Asian nation of Laos because of suspected methanol poisoning.

  Fiji tourism chief Brent Hill told RNZ they were keenly aware of the Laos incident, but added that the case in Fiji was "a long way from that". Shortly after drinking the rum cocktail at the Warwick Fiji resort on the Coral Coast, the seven guests displayed nausea, vomiting and neurological symptoms. They were initially taken to Sigatoka Hospital, and later transferred to Lautoka Hospital, according to the Fiji Times. Fiji's tourism minister Viliame Gavok has stressed that this was an "extremely isolated incident" and that the resort claimed "they have not engaged in practices such as substituting ingredients or altering the quality of drinks served to guests". Initial investigations are under way and no further cases have been reported, authorities said.

  Sydney resident David Sandoe told the Australian Broadcasting Corporation (ABC) that his daughter Tanya and granddaughter Georgia were among those affected. But he added they were returning home and doing "very well" considering what happened. "It's very difficult to take a call at 11 at night... and your daughter says that they have been poisoned and they're in hospital," Mr Sandoe said, adding that Georgia had suffered a seizure. The ABC had previously reported a 56-year-old Australian woman was under medical surveillance in hospital and a 19-year-old Australian woman had suffered "serious medical episodes". The Warwick Fiji hotel said in a statement to the BBC that it was aware of the "suspected alcohol poisoning" and was taking it "very seriously". The hotel said it was "conducting a thorough investigation" while awaiting a "test result report" from the health authorities to "gather all necessary information". Fiji police are said to be investigating the circumstances of the incident. Two Australian families in Fiji are receiving consular assistance, an Australian foreign ministry spokesperson told the BBC. A New Zealand foreign affairs ministry spokesperson told the BBC it had "not received any requests for assistance" after the apparent poisoning incident. The BBC also understands that no British persons were affected in the incident. "There's a real terrifying sense of deja vu," Australian minister Jason Clare told the ABC. Two 19-year-old Australian girls had died from suspected methanol poisoning in the Laos incident. Tourists have been advised to "be alert to the potential risks around drink spiking and methanol poisoning through consuming alcoholic drinks in Fiji" by Australia's Department of Foreign Affairs and Trade (DFAT). The guidance said tourists should "get urgent medical help if you suspect drink spiking".
