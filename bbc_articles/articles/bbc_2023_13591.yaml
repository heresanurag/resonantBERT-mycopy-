content: |-
  Wales fans are elated as the team hammer Australia to march into the Rugby World Cup quarter-finals.

  This video can not be played To play this video you need to enable JavaScript in your browser. Fans react with joy and disbelief as Wales secure a place in the Rugby World Cup quarter-finals

  Ecstatic Wales fans watched in joy and disbelief as their team swept aside Australia.

  The remarkable demolition of the Wallabies meant Wales sealed their place in the Rugby World Cup quarter-finals.

  Fans were searching for superlatives to describe the enormity of the record 40-6 win over the two-time World Cup champions.

  Some were even talking about winning the whole tournament.

  One fan leaving the ground, Steffan, called the performance "outstanding".

  "Fair play, we got it... I think we're the fittest team in the competition, and we're gonna win it!" he said.

  Wales secured their place in the quarter-finals after a 40-6 defeat of Australia

  Another fan, Nicholas, described it as "amazing".

  "We came out here in high hopes, and we destroyed them," he said.

  "Incredible," was the adjective of choice for Einion Davies, who travelled to Lyon from Llangollen, Denbighshire.

  "We started the first half a bit nervous, but second half we were comfortable all the way," he said.

  "I can't quite believe that performance after the Fiji and Portugal games. But we know we can do it now - looking forward to the next round."

  Gareth and Erin said it was a great experience to witness the result in person

  Fan Erin called herself "so proud to be Welsh" after the result.

  "I was here just to enjoy the atmosphere - France at the World Cup - unreal.

  "And then to get that score, amazing. I knew Wales was gonna win, but by that much, unbelievable," she said.

  Gareth, from Chepstow, Monmouthshire, who was at the game with Erin, said: "Australia were poor, but that doesn't happen to Wales very often. We had a good time in the stadium!"

  Dale Zdzieblo, from Rhymney, Caerphilly, said the game "exceeded all expectations".

  "The boys were really up for it, took advantage and forced Australia into a lot of uncharacteristic mistakes," he said.

  "I think we'll grow with each performance, as long as they believe."

  Colin, in the dragon hat on the right, predicted 40-0... and he wasn't far off

  It was a night for Wales where even the most optimistic pre-match predictions started to come true.

  Colin, from Bridgend, said before kick-off: "I'm very nervous, very worried, but I think we'll do it. It's going to be 40-0!"

  After the final whistle blew and the fans applauded the players to the rafters, Wales' followers poured onto the streets of this city which is considered the capital of French cuisine.

  Some no doubt celebrated with a bite to eat, and a drink... or several.

  Following this feast for the eyes, their appetite for more rugby like this will be insatiable.
