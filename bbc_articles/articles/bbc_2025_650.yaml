title: 'England women: Chloe Kelly left out of Nations League squad - BBC Sport'
date: '2025-02-11'
section: England Women
url: http://www.bbc.co.uk/sport/football/articles/cvg974vpwkko
content: |-
  Chloe Kelly is left out of England's squad for the Women's Nations League matches against Portugal and Spain this month.

  Chloe Kelly has scored seven goals in 48 senior appearances for the Lionesses

  Chloe Kelly has been left out of England's squad for the Women's Nations League matches against Portugal and Spain this month. The forward moved to Arsenal from Women's Super League rivals Manchester City on transfer deadline day in January after falling out of favour at Joie Stadium. The 27-year-old, who scored England's winner in the final of Euro 2022, has not been selected by manager Sarina Wiegman for the opening Nations League games on 21 and 26 February. Lauren James and Ella Toone return to the squad following injury but Georgia Stanway has been ruled out. Nikita Parris is also called into the senior England squad for the first time since November 2022, as the Brighton forward is rewarded for a strong start to the Women's Super League (WSL) season. The 30-year-old has scored four goals in 11 WSL games for Dario Vidosic's side.

  But there is no room for Kelly, who was named in the previous England squad that faced the United States in November before having to withdraw prior to the following game against Switzerland because of concussion. She has not played in the WSL since 15 December, when Manchester City were beaten 2-1 by Everton, after falling out of City manager Gareth Taylor's plans. Kelly pushed for a move in January, including posting messages on her social media, and joined Arsenal on loan but is yet to make her debut for the Gunners. Wiegman told a media conference on Tuesday she needed the 48-cap winger to feature for her new club before being considered for the national side. "She hasn't played enough," Wiegman said. "She has some credit, but now she has to get some minutes at Arsenal, show what she is about and we can revisit. "We had a good conversation, she understands. She is not out for the Euros, so hopefully she gets minutes and we can revisit." On Kelly's statement before leaving City, Wiegman added: "She was hurt and worried about her mental health. I don't have the full context, but I am glad now she has a move, hopefully she can get a smile on her face again and play some football."

  Georgia Stanway (left) suffered a serious injury in training for Bayern Munich last month

  Along with Parris, Toone and Chelsea duo James and Niamh Charles all return to the squad following injury. Toone missed the final squad of 2024 with a calf problem but has been in excellent form since returning from injury with six goals in her last five matches for Manchester United. James and Charles return to Wiegman's pool for the first time since April and July respectively after long-term injuries. But Bayern Munich midfielder Stanway has joined Lauren Hemp and Alex Greenwood on the injured list and is a doubt for Euro 2025 this summer. She tore the lateral ligament in her right knee during a training session in January and is out for "several months", according to her club. However Wiegman said Stanway is optimistic she will be fit to help England defend their European title in Switzerland this July. "She has a plan, and she is very committed and ready to be back," the Dutch coach said. "She had surgery that went well, she is in a good place. She knows where she wants to be." England open their Nations League schedule away to Portugal on 21 February, before the European champions welcome world champions Spain to Wembley on 26 February in a repeat of the 2023 World Cup final. Belgium are the other side in Group A3.
