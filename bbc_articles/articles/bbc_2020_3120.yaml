  Larger retail and leisure chains are unlikely to benefit from the rates holiday. State aid rules include a cap on the amount of tax relief a business can claim over three years. Most large firms will have already reached the limit as a result of rates relief provided in previous years.

  As expected, Mr Sunak scrapped a planned cut to corporation tax. The rate of the tax will remain at 19% rather than falling to 17%.

  Another change that was widely anticipated was a cut to Entrepreneurs' Tax Relief. Business owners who sell their firms on were entitled to tax relief on profits of up to £10m over their lifetime. The tax relief has been scaled back rather than abolished, with the lifetime limit reduced to £1m.

  This was two Budgets in one: a core Budget with big borrowing and spending plans for the years ahead and an emergency coronavirus Budget.

  Although it's primarily a health emergency, the next few weeks and months could be a life-or-death moment for many small businesses who are dealing with the virus - and more importantly, the response to it.

  Business rates relief for small firms, an offer to give firms more time to pay tax, and cash grants of £3,000 to virus-affected small firms will be welcomed. But many will feel the criteria are too prescriptive and a more general hardship fund would have been more appropriate for a situation where the impacts are hard to predict.

  Yet perhaps more important was the messaging that the government wants to unlock the potential of business. That is a warmer tone to the private sector than the one business has been used to.

  The government has acknowledged that business faces financial distress on top of the Brexit preparation that could substantially add to the cost and administrative burden that firms will face at the end of this year.

  Mike Cherry, chairman of the Federation of Small Businesses said the chancellor's measures would help reinject optimism into business.

  "We're already seeing supply chains disrupted and footfall hurt due to the spread of coronavirus. Against this backdrop, the chancellor's commitments to making more small business finance available, deferring tax bills, reducing business rates and setting up a hardship fund for the vulnerable - including the self-employed who cannot claim SSP - are all absolutely critical," he said.

  "The priority at this point needs to be ensuring that these support mechanisms reach the small firms that need them as swiftly as possible."

  However, larger businesses would feel left out in the cold, analysts said.

  "There is nothing in the Budget that tackles the issues of the larger businesses - and these are the ones shedding the jobs," said John Webber of property firm Colliers. "We are now destined to see more shop closures and job losses in the High Street in the months ahead."

  Jerry Schurder, at real estate advisors Gerald Eve, said larger retailers and small firms outside the retail and leisure sectors would still face "huge challenges" from the coronavirus outbreak but were "being left to rot by the Treasury".
