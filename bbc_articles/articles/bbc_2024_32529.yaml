title: Huge fire engulfs buildings at Livingston industrial estate - BBC News
date: '2024-12-07'
section: Edinburgh, Fife & East
url: http://www.bbc.co.uk/news/articles/c7855v8emzro
content: |-
  Thick black smoke from the blaze in West Lothian can be seen from miles away.

  The fire is at Brucefield Industrial Estate, south of Livingston

  Fire crews are tackling a "significant" blaze which started at a factory and has spread to nearby buildings at an industrial estate near Livingston, West Lothian. They were called to the Brucefield Industrial Estate, Bellsquarry, after 13:30 on Saturday. The public have been advised by police to avoid the area. Residents living nearby have been asked to keep their windows and doors closed. Several roads were closed nearby including the Wilderness roundabout, Cochrane Square and Brucefield Park West.

  Smoke from the fire has been seen from Fife

  Smoke can be seen from several miles away. A spokesman for the Scottish Fire and Rescue Service confirmed nine appliances were at the scene. "Firefighters are currently working to extinguish the fire, which has taken hold of a large factory and several adjoining buildings," he said. There are no reports of any injuries.
