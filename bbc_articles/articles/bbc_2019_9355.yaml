content: |-
  The US president pays his respects in Ohio and Texas after two shootings but there is controversy over his visit.

  'As an American, you need to stand behind the president'

  Tito Anchondo, who lost his brother Andre and sister-in-law Jordan in the shooting at El Paso's Walmart, voiced his support for Trump earlier this week. "As an American, you need to stand behind the president," he told the BBC. He noted there were differing views in his hometown, with Trump supporters and those who back Democrat Beto O'Rourke, but said everyone coexisted happily. His father Gilbert, he added, is a Mexican American who is proud of his roots and has always said America is the greatest nation on earth. Both said they were pleased with Trump's comments in the immediate aftermath of the tragedy, and the fact he had expressed his sympathy. "Mr Trump made a good statement," said Gilbert Anchondo. "He's making reforms and we appreciate it." Read the full interview: "Victim's father says he forgives his son's killer."
