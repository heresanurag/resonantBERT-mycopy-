title: Other colour-casting controversies - BBC News
date: '2017-01-14'
section: General
url: http://www.bbc.co.uk/news/entertainment-arts-38618631
content: |-
  Sky has pulled a TV programme about Michael Jackson - it's not the first casting controversy.

  Sky has said it will not air a TV programme about Michael Jackson after his daughter said she was "incredibly offended" by the portrayal of him, slated to be by Joseph Fiennes.

  It's not the first casting controversy.
