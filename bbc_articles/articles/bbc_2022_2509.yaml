  During their stay they will meet Ukrainian workers, LGBTQ+ people, ethnic minorities and human rights defenders.

  They plan to report back to grassroots organisations at home, with Mr Price saying the visit also reflects the historic ties between Wales and Ukraine going back to the foundation of Donetsk by Welsh migrants in the 19th century.

  "The more the Ukrainian people are threatened by Russian aggression and imperialism the more urgent it becomes for socialists, democrats and internationalist to stand shoulder to shoulder in solidarity with them - in defence of their right to national self-determination and in defiance of Putin's warmongering," Mr Price said.

  He is on the trip in a personal capacity, as is Pontypridd MS Mr Antoniw.

  Mr Antoniw said: "In too many of the discussions about the situation in Ukraine, it is the people themselves who are being bypassed. We want to listen to what the Ukrainian people say and to show our solidarity with them. We stand by them and their right to determine their own future and to defend their country from Russian aggression and imperialism."
