content: |-
  The host says it "makes sense for someone else to take the helm" of the long-running football show.

  Lineker: It is 'right time' to leave Match of the Day

  Lineker will stay on the BBC to front coverage of next season's FA Cup

  Gary Lineker has said it is "the right time" for another presenter to take on hosting Match of the Day, as the BBC looks to do the football programme "slightly differently" in the future. Earlier this week, Lineker announced he will step down from the show at the end of this season after 25 years as host. A new four-year deal for the BBC to air Premier League highlights will begin next season. "I feel this is now the right time," Lineker said of his decision. "I think [with] the next [highlights] contract, they're looking to do Match of the Day slightly differently, so I think it makes sense for someone else to take the helm."

  After leaving Match of the Day, Lineker will stay with the BBC to front coverage of next season's FA Cup and the 2026 men's World Cup. Speaking on his podcast The Rest Is Football, he said this week's announcement was "basically news of an extra year contract" for him at the BBC. "I always thought my next thing would be the end. I've been thinking about it for a long time. I've done Match of Day for 25 years. It's been an absolute joy and a privilege to present such an iconic show for the BBC. "But all things have to come to an end."

