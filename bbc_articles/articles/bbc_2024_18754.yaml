title: The Notebook actress Gena Rowlands dies at 94 - BBC News
date: '2024-08-15'
section: US & Canada
url: http://www.bbc.co.uk/news/articles/clyn3p853k5o
content: |-
  The Hollywood legend has been racking up acting awards since the 1950s.

  American actress Gena Rowlands, who is known for roles including in The Notebook and Another Woman, has died at the age of 94. Rowlands, who was nominated for an Oscar for 1974's A Woman Under the Influence and 1980's Gloria, died at her home in Indian Wells, California. No cause of death was given, but she had been suffering from Alzheimer's, according to reports. She quit acting in 2015 after winning four Emmys, two Golden Globes, and earning two Oscar nominations, according to Deadline, external.

  Both A Woman Under the Influence and Gloria were collaborations with her late husband John Cassavetes. Her Emmys were for The Betty Ford Story, Face of a Stranger, Hysterical Blindness, and The Incredible Mrs Ritchie. Born in Wisconsin, she moved to New York and starred in the Broadway debut of The Seven Year Itch. In 1956 she starred in Broadway play Middle of the Night. In 2015, she was given an honorary Academy Award for her long acting career. “Working this long? I didn’t even think I’d be living this long,” she recently told Variety, external. She also starred in films Faces, Opening Night, Unhook the Stars, Yellow and Broken English, Hope Floats, Tempest, The Brink's Job, Tony Rome and The Neon Bible. The Notebook was directed in 2004 by her son Nick Cassavetes, who recently spoke to Entertainment Weekly, external about how his mother played a character suffering from dementia. "We spent a lot of time talking about Alzheimer’s and wanting to be authentic with it, and now, for the last five years, she’s had Alzheimer’s,” he said. "She’s in full dementia. And it’s so crazy — we lived it, she acted it, and now it’s on us.”
