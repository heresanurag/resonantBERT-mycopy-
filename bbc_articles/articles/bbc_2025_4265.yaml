date: '2025-03-02'
section: US & Canada
url: http://www.bbc.co.uk/news/articles/cd9208qv1kzo
content: |-
  It was launched by Firefly Aerospace in January with the mission of exploring the Sea of Crises.

  This video can not be played To play this video you need to enable JavaScript in your browser. Watch: Celebrations as Luna lander touches down on Moon

  A private spacecraft has landed on the Moon, becoming only the second commercial vehicle to reach the lunar surface. Blue Ghost left Earth on 15 January, after being launched by US firm Firefly Aerospace with the intention of exploring the Sea of Crises, a huge basin visible from Earth. The project is the latest collaboration by US space agency Nasa and private companies. Intuitive Machines, another firm, is hoping to land its Athena spacecraft near the Moon's south pole in the next few days.

  Intuitive was the first private company to achieve a lunar landing. Its spacecraft Odysseus reached the Moon on 22 February last year. However, the mission was short-lived as the spacecraft landed on the slope of a crater, broke some landing gear and toppled over. Blue Ghost touched down smoothly, having been orbiting the Moon for the last two weeks. Staff at Firefly's headquarters in Texas broke out into cheering and applause when they were told their landing was successful.

  Blue Ghost orbiting the Moon in the week before it landed on the lunar surface

  Dr Simeon Barber, a planetary science researcher from the Open University, said Blue Ghost was essentially the first successful private venture to the Moon, as the vehicle was intact and responsive. He told BBC Breakfast: "[They've] demonstrated a technology for landing on the surface of the Moon, the kind that had been forgotten after the Apollo era when we had astronauts on the [lunar] surface." The importance of the Moon to many private firms, said Dr Barber, was to use it as a launch pad for exploring the rest of space. "By going to the Moon, we can learn how to run robotic instruments in space [and] in the really harsh environment of the Moon, which is at times hot and at times cold. It's very dusty, there's lots of radiation."

  Blue Ghost is the latest collaboration between Nasa and private firms who want to explore space

  Blue Ghost's mission is to explore the Sea of Crises – a huge basin visible from Earth

  He said at some point it was likely humans would return to the lunar surface and explained it had been so long because of a lack of funding. The last time humans set foot on the Moon was 19 December 1972, during the Apollo 17 mission. "The Apollo missions were hugely successful," explained Dr Barber. "But they were 'touch and go' missions." Back then, astronauts would be there for three days before having to leave again, as costs were running into the billions of dollars. "That's not sustainable," he said.

