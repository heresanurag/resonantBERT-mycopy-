  Dr Barber said the belief now was that bringing private companies into the fold would help reduce costs as a result of commercial competition. It could lead to cheaper landers and innovations that might extract resources from the moon, such as water for the astronauts to drink. The first private company to attempt to reach the moon was another US firm, Astrobotic Technology. They tried reaching the moon in January 2024, but their lander never made it to the moon, because of a suspected fuel leak, and crashed back to Earth. The fiery descent meant the spacecraft broke apart in its final moments before plunging into the southern Pacific Ocean.
