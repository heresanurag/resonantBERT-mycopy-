title: Bob Harris announces Johnnie Walker's death live on Radio 2 - BBC News
date: '2025-01-01'
section: General
url: http://www.bbc.co.uk/news/videos/clyj78epeqvo
content: |-
  Speaking live on BBC Radio 2, Bob Harris pays tribute to his former colleague and friend.

  Radio presenter Johnnie Walker has died at the age of 79, two months after calling time on his 58-year career because of ill health.

  DJ Bob Harris, who took over BBC Radio 2's Sounds of the 70s show after Walker's retirement, announced his former colleague's death live on the station.
