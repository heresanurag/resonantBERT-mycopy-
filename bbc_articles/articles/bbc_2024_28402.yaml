content: |-
  Actress Danika McGuigan died five weeks after being diagnosed with bowel cancer in 2019.

  Barry McGuigan opens up about death of daughter on I'm a Celebrity

  Former professional boxer Barry McGuigan has opened about the death of his daughter, while appearing on I'm a Celebrity... Get Me Out of Here! Actress Danika McGuigan died five weeks after being diagnosed with bowel cancer in 2019, aged 33. She had played Danielle in BBC Three comedy Can't Cope, Won't Cope and appeared in several films. In an emotional conversation, McGuigan told his jungle campmates on the ITV reality show about how she originally recovered from leukaemia as a child after two years of treatment.

  "She had leukaemia, when I was making the movie The Boxer with Daniel Day Lewis, three weeks from the end I had to leave because she'd been diagnosed with leukaemia, they thought she wasn't going to get better but she fought back and she won it," he said. "She had two years of chemo, she was good, she came back." When the Irishman started becoming visibly upset, his campmates offered their support. "You're a man going through pain and you're vulnerable about it, that takes strength. There is no rules to grieving... it's a reflection of your love," N-Dubz star Tulisa Contostavlos said. "It was hard for weeks in the hospital, just watching, shocking," McGuigan said tearfully. "Thank you, you're all so lovely, I really appreciate it," he added. McGuigan, a former professional boxer who became World Featherweight Champion in 1985, is on the 24th series of the reality TV show alongside celebrities including Danny Jones from McFly, TV presenter Jane Moore and Coleen Rooney. Later in the episode, Rooney, who is married to ex-England footballer Wayne Rooney, became emotional over the loss of her sister Rosie, after McGuigan spoke about Danika. "She was 14 when she died, she'd be 26 now. It's hard to lose a child, I've always said that... so we're lucky to have what we've got," she said. At the time of her death in 2013, Rooney posted a tribute on social media, writing that she and her family were "absolutely heart broken to have lost our angel Rosie... we love you more than words can say." Rett syndrome is a neurological disorder that causes profound physical and communication disabilities. It affects around one in 10,000 girls born each year and rarely occurs in boys.

  Coleen Rooney is a contestant on the 24th series of I'm a Celebrity...Get Me Out of Here!

  Separately, Rooney also spoke about going to court in the libel trial with Rebekah Vardy, wife of Leicester City striker Jamie Vardy, saying it was her "worst nightmare." Rooney had accused Vardy of leaking her private information to the press and a judge found her post claiming this to be the case was "substantially true". She was asked by a campmate if she was scared making the social media post. "No, because I just didn't think it would have the impact it did, because I was just that sick and tired of it, it was draining," Rooney said. She added: "What got me, over the whole thing, was it became a bit of a joke and that's really disappointing, it wasn't a joke for me. "...But no one knew the full story."
