  From 36-2 overnight, England even getting close to their target would have been a credible effort. A chase of 297 would have been their highest ever in Asia, joint-third-highest anywhere away from home and the best by a visiting team to Pakistan. But the notion of something extraordinary faded from the eighth delivery of the day, when Ollie Pope patted a return catch back to Sajid. On the snake pit of a pitch and against the unerring Pakistan bowlers, England’s best chance was to attack, an intent that played into the hands of Noman. Root was lbw on the sweep, Harry Brook palpably leg before missing a hack to the leg side and Smith spooned a catch to mid-on. Ben Stokes was sweeping and reverse-sweeping at every opportunity, Carse overturned being given lbw to Sajid to hit the same bowler for back-to-back straight sixes. The Durham pair added 37 from 31 balls before Stokes charged at Noman, comically flung his bat into the leg side and was left on all fours as wicketkeeper Muhammad Rizwan removed the bails. Carse edged Noman to slip, Jack Leach inside edged to short leg and, next ball, Shoaib Bashir was caught at silly point to end England’s four-Test winning run in Pakistan. Sajid and Noman bowled unchanged throughout for 33.3 overs, the longest two bowlers have done so in a completed Test innings since 1956.

  Harry Brook was one of eight England batters dismissed by Noman Ali in the second innings

  England captain Ben Stokes on BBC Test Match Special: "It was a very difficult run chase even before we started today. It looks quite far way off, but on that wicket, we have done a pretty decent job. "Hopefully, we can get a win next week and go home with another series win." Pakistan captain Shan Masood: "The first one is always special and it's come after some hard times, some rough times. "A lot has happened over the last week so for everyone to work together and come up with a strategy to take 20 wickets and make it happen, that's the most satisfying thing." England coach Brendon McCullum on TMS: "Credit to Pakistan, they won quite a big toss. But they also played well in these conditions and took a big gamble with the pitch. "We were decent for a few amount of the match in difficult situation, and there's a lot to be proud of." Former England bowler Steven Finn on TMS: "England won't beat themselves up or have a hard review about this defeat. "One thing that's really impressive about this England side is that they could've kicked and screamed about the pitch being used for two Tests in a row. We haven't heard any of them say this was a disgrace. On the opposite, England have relished this as a challenge."
