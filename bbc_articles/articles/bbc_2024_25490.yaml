content: |-
  England are spun out by Pakistan to lose the second Test by 152 runs, setting up a series decider in Rawalpindi next week.

  England spun to defeat in second Pakistan Test

  England captain Ben Stokes was the only batter to pass 30 in the second innings

  Second Test, Multan (day four of five)

  England were spun out by Pakistan to lose the second Test by 152 runs, setting up a series decider in Rawalpindi next week. Left with the monumental task of chasing 297 on a dusty Multan pitch re-used from their record-breaking first-Test victory, the tourists were dismissed for 144 before lunch on day four. Aided by sharp turn and unpredictable bounce, left-arm spinner Noman Ali claimed seven of the eight wickets to fall on Friday for an overall 8-46 and match figures of 11-147. Noman dovetailed with off-spinner Sajid, two of the four men Pakistan brought into their side for this Test. Sajid ended with nine victims in the match. It is only the seventh time in Test history and first occasion since 1972 that two bowlers have shared all 20 wickets. Despite the unique conditions and the disadvantage of losing the toss, England can also reflect on a collapse of 8-80 in their first innings and two crucial dropped catches in the same over in the Pakistan second innings. Intrigue will now surround the surface for the third and final Test, which begins on Thursday, 24 October.

  Pakistan were humiliated in the first Test, pulverised by England’s batters in conceding 823-7 declared. It was their sixth consecutive Test defeat, extending a winless home run to 11 matches. The response was extreme. An expanded selection committee dropped superstar batter Babar Azam, and pace bowlers Shaheen Shah Afridi and Naseem Shah. The decision to recycle the pitch from the first Test was unusual though not illegal. In doing that and packing the team with three specialist spinners, so much hinged on a toss Pakistan won. That is not say this match was decided by the flick of a coin. Kamran Ghulam filled Babar’s shoes with a fine debut hundred, while the charismatic Sajid and accurate Noman were relentless in their examination of England’s batters. Given the circumstances, this is a defeat England should be able to shrug off quite easily. Still, they had their moments. They reached 211-2 in response to Pakistan’s 366 thanks to a fine century from Ben Duckett. First-innings parity would have given them a strong chance, so to then be bowled out for 291 is disappointing on any pitch. Then, on the third afternoon, they had the opportunity to limit their eventual chase, only for wicketkeeper Jamie Smith and Joe Root to put down straightforward chances off Salman Agha in the same Brydon Carse over. Salman was in single figures at the time and his 63 put the result beyond doubt. The used pitch was made possible by the first two Tests being played at the same venue, so the move to Rawalpindi at least provides an element of newness. But given this result, England should probably prepare themselves for more spin and have a week to ponder their strategy.

