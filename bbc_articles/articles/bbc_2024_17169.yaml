  Dr Nigel Scawn, medical director at the Countess of Chester Hospital NHS Foundation Trust, said he was "extremely sorry that these awful crimes happened at our hospital". He added: "Since Lucy Letby worked at our hospital, we have made significant changes to our services and remain committed to providing high quality safe care to our local communities." Dr Scawn acknowledged the impact that the Letby case continued to have on everyone involved, adding he was "grateful for the unwavering cooperation and professionalism of our staff, some of whom returned to court to repeat evidence and relive events". Letby was initially charged with the murder of Baby K but the charge was dropped in June 2022 because the prosecution offered no evidence. In May, Letby lost her Court of Appeal bid to challenge her convictions. She will be sentenced for the attempted murder of Baby K on 5 July.

  A public inquiry into how Letby was able to commit her crimes on the neo-natal unit is set to begin at Liverpool Town Hall on 10 September. Det Supt Simon Blackwell said an investigation into corporate manslaughter at the hospital, which was launched in October 2023, remained ongoing and was considering areas including senior leadership and decision making between June 2015 and June 2016. He said "at this stage" the force was not investigating any individuals in relation to gross negligence manslaughter. The detective said he recognised the "significant impact" on a range of people and "we want to reassure that we are committed to carrying out a thorough investigation".
