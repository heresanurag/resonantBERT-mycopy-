title: Emotional Miley Cyrus accepts Disney Legend award - BBC News
date: '2024-08-12'
section: General
url: http://www.bbc.co.uk/news/videos/crmw7kd930no
content: |-
  The singer thanked fans as she became the youngest ever star to reach Disney Legend status.

  Miley Cyrus wiped away tears and thanked fans for their support as she accepted the prestigious Disney Legend award at a ceremony in California on Sunday.

  The singer was visibly moved during her acceptance speech, saying she was still 'so proud' to have portrayed Hannah Montana in the Disney Channel series of the same name.

  "This award is dedicated to Hannah and all of her amazing, loyal fans and to everyone who has made my dream a reality," she said.

  At 31, Cyrus is the youngest person ever to reach Disney Legend status.
