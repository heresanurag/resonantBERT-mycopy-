title: Two arrested over Birmingham fairground ride crash - BBC News
date: '2024-12-13'
section: Birmingham & Black Country
url: http://www.bbc.co.uk/news/articles/c5ydgl1jldvo
content: |-
  The men are being questioned on suspicion of perverting the course of justice, police say.

  Investigators remain at the scene on Friday after the incident

  Two men have been arrested after a Christmas fairground ride "crashed to the ground" in Birmingham city centre. The pair, aged 55 and 21, were arrested at the scene on Thursday evening on suspicion of perverting the course of justice and obstructing officers, West Midlands Police said. Two women were taken to hospital after the City Star Flyer ride "failed and crashed" in Centenary Square, while another 11 patients were assessed by paramedics and discharged at the scene.

  Police said officers would remain at the scene, on Centenary Square, to assist a Health & Safety Executive investigation, and a cordon was likely to remain in place throughout the day. Emergency services were called to the ride at about 19:30 GMT, with barriers set up between the ice rink, the library and the Rep theatre, and people asked to avoid the area.

  Louise Brown took photos of herself enjoying the ride moments before the crash and a short while after it

  Images taken by the BBC showed wires from at least two gondolas on the ride tangled up with each other. West Midlands Fire Service confirmed the ride had "dropped to the ground" while it was in operation. Louise Brown was on the 55m high City Star Flyer ride when it crashed to the ground, injuring her and several others. "It's hard to process how one minute you can be innocently having fun and screaming in a scared way to then screaming because you could've potentially lost your life," she said.

  This video can not be played To play this video you need to enable JavaScript in your browser. Louise Brown suffered injuries to her face, legs and arms

  "This can never happen again - we are in shock and all I can think of is, 'What if my kids were on the ride'." Danter Attractions, which runs the ride, said it was "fully co-operating with the authorities" as the crash was being investigated. A spokesperson said: "Our thoughts are with the individuals and families affected. "At this time we are unable to provide any additional comment." Lilly Nitsch, 18, from Leamington Spa, was at the scene and told the BBC she was "pretty shocked" by the incident. "That's one of my favourite rides growing up," she said. "It makes me think of of the times you've been on rides like that. It makes me feel lucky."

  Tangled chains and upturned seats remained visible on the ride on Friday

