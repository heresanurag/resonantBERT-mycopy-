title: 'Reform Wales: Ex-leader Nathan Gill charged with bribery - BBC News'
date: '2025-02-20'
section: Wales
url: http://www.bbc.co.uk/news/articles/cp3ywlwlqzzo
content: |-
  The ex-MEP and former UKIP Wales leader is to appear in court on Monday on charges of bribery.

  Nathan Gill was a member of the European Parliament from 2014 to 2020

  The former leader of Reform UK in Wales, Nathan Gill, is due to appear in court on Monday on charges of bribery. It follows an investigation led by detectives from the counter-terrorism command at the Metropolitan Police. He was an MEP for almost six years and briefly represented north Wales in the Welsh Parliament. The police force said Mr Gill was charged with eight counts of bribery and one count of conspiracy to commit bribery.

  A spokesperson for Reform Wales said Mr Gill "is not a member of Reform UK".

  Mr Gill was first elected as a UKIP MEP in 2014 and joined the National Assembly, as it was then called, in 2016. He was an Assembly Member for just over a year, before he was replaced by Mandy Jones in December 2017. He served as UKIP's leader for Wales and was briefly an independent before joining Reform's predecessor organisation, the Brexit Party, in 2019. It is not clear precisely when Gill ceased being leader of Reform UK Wales, but the job has not existed for some time.

  The Met said Mr Gill, 51, was interviewed under caution on 3 March 2022. "Further enquiries were carried out by officers and after authorisation by the Crown Prosecution Service Counter Terrorism Division, the man [Mr Gill] was subsequently charged," the force said. He is due to appear at Westminster Magistrates' Court on Monday.
