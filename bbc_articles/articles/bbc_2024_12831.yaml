title: Taylor Swift greets Cardiff crowd in Welsh on Eras Tour - BBC News
date: '2024-06-21'
section: General
url: http://www.bbc.co.uk/news/videos/c1661e64556o
content: |-
  Taylor Swift's record-breaking Eras Tour brings the house down in Cardiff.

  Taylor Swift wowed her fans in Cardiff on Tuesday night as she greeted them in Welsh.

  The 34-year-old singer shouted "shwmae" - Welsh for "hi" - eliciting screams from a 67,000 sell-out crowd at the Principality Stadium.

  "Oh Cardiff look what you've done," she said, pointing to her fans.

  "Look what you've done, you've gone and made me feel so amazing."

  Her first headline performance in Wales and the only single-date concert of her mega-selling 152-date Eras Tour delivered 40-plus songs from 10 albums to a thrilled audience.
