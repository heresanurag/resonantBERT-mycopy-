title: How Colman's mustard became synonymous with Norwich - BBC News
date: '2018-01-12'
section: Norfolk
url: http://www.bbc.co.uk/news/uk-england-norfolk-42170131
content: |-
  For generations the company provided everything from housing to healthcare for its family of workers.

  This video can not be played To play this video you need to enable JavaScript in your browser. Colman's has been based in Norwich for 160 years

  Colman's is one of Britain's best-known brands, but the decision to close its Norwich factory threatens to end 160 years of manufacture in the city famed for its mustard.

  Its products are a dinner table staple, with every jar, packet and bottle bearing the words "Colman's of Norwich".

  But that slogan could soon ring very hollow. Owner Unilever has announced it will close its Norwich factory next year and switch production to Burton-on-Trent and Germany.

  The news saddened actor and entertainer Stephen Fry, who went to school in the city and is a former director of Norwich City FC.

  "Take the Tower from London, the RSC from Stratford and the potteries from Stoke, but leave our mustard in the Fine City. A sad day. A sad day."

