  He followed his great uncle's example in educating employees' children, building a school on Carrow Hill in 1864 years before education was compulsory, and provided sick benefits, and savings and pensions schemes.

  Colman's also employed one of the first workplace nurses, built coffins for workers and their families, and rented and built houses for workers and pensioners.

  Many were in neighbouring Lakenham and Trowse, and some of the terraces were said to have had mustard-coloured front doors.

  The school built by Colman's in 1864 still stands on Norwich's Carrow Hill

  The doors of some rows of terraces, built by Colman's, were said to have been painted mustard yellow

  Thelma Blower, 91, was the third of four generations to work at Colman's. Her grandparents started there before the turn of the 1900s, joining a workforce of about 3,000.

  They were followed by both Mrs Blower's parents and later, three of her four children - including Valerie Colby, who joined straight from school, aged 15.

  "I was absolutely proud of working there - most people were," said Mrs Blower, who joined the firm during World War Two.

  "The money was not big in the wartime, but Colman's was a family."

  One day she was one of six girls asked to stay on for an extra hour to prepare a shipment and in doing so, survived a German raid, sheltering in tunnels beneath the site.

  "Our manager came up and thanked us for staying behind but said he had some sad news," she said.

  "He then said, 'It is God's will and fate I asked you to stay on - five women on Carrow Hill have been killed by a German plane'.

  "They were all from the mustard department."

  Working an extra hour at Colman's during a German bombing raid saved Thelma Blower's life

  Peter Webber's father Roy and grandfather Charles both worked at the plant

  Peter Webber, 69, was at Carrow Works for 30 years until 2008, following in his grandfather's and father's footsteps. ​

  His semi-detached house in nearby Trowse had been built for the supervisory ranks - a step up from the terraces ordinary workers lived in.

  "I was a tradesman, but I made more money a week on the lines than I did as an upholsterer," he said.

  "I used to think how lucky I was to work at a place with a canteen, medical centre, physiotherapist and chiropodist - it was 50p a foot.

  "If you had to go to hospital they had their own ambulance, but that was the type of company it was."

  Peter Webber was told to leave the artwork to his son

  Mr Webber's grandfather Charles spent his entire working life at Colman's, receiving a painting of an Italian castle as a long-service award.

  "He left it to my father, my father left it to me and he told me I have to leave it to my son," said Mr Webber.

  "I'm absolutely devastated to think about the site closing because I shut my eyes and think back and it's choking. It's been a big part of my life."

  Jeremiah James Colman was the third family member to run the firm
