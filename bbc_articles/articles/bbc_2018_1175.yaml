  Unilever says it will protect the historic link between Norwich and Colman's by retaining production and milling of mustard powder in a new facility in the area.

  It was a concession won in part by lobbying from the New Anglia Local Enterprise Partnership (LEP).

  "Colman's is synonymous with Norwich, in the same way that Worcestershire sauce is with Worcester, and Bass beer is with Burton," said its chief executive Chris Starkie.

  "The Colman's name is seared into the consciousness of people who live in the city and those further afield who, through its advertising, recognise the brand.

  In 1858, Colman's moved to its current site at Carrow

  The Norwich Society says Norwich and Colman's "go together"

  Colman's no longer makes just mustard and has a large roster of sauces and condiments sold across the world.

  The closure of its factory means the loss of at least 50 jobs and is another blow for the city - last month, drinks manufacturer Britvic, which shares Colman's sprawling Carrow Works site, announced it was leaving, with the loss of 242 jobs.

  Mr Starkie said the impact of the Colman's closure on the city would be "far more psychological than economical".

  But he added: "That doesn't in any way lessen the impact on the lives of the workers losing their jobs, and our priority is to support them through this difficult process."

  Paul Burall, vice-chairman of The Norwich Society, said: "Norwich and Colman's - and Colman's and Norwich - go together.

  "It's part of the history of Norwich, and people think of Colman's as part of the family."

  It is a feeling that stems largely from the attitude of the company's founding fathers. For generations of staff, Colman's was far more than just an employer.

  The move to Carrow Works meant mustard seed could easily be brought in by train

  Founded in 1814 by Jeremiah Colman, the firm had a cradle-to-grave ethos, providing education, housing, healthcare and leisure for workers and their families.

  "Old" Jeremiah died in 1851, followed three years later by James, his nephew, who he adopted as his son and made his business partner.

  James's son, Jeremiah James Colman, took over and proved to be a brilliant innovator whose masterstrokes included creating Colman's famous bull's head trademark in 1855 and moving from nearby Stoke Holy Cross to the Carrow enclave, which was bordered by beneficial railway and river links.

  The young entrepreneur also identified a ready-made workforce in the city - cloth workers made redundant by the industry's exodus to northern mills.

