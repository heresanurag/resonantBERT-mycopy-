title: Green comet captured from back garden - BBC News
date: '2023-02-02'
section: General
url: http://www.bbc.co.uk/news/uk-england-nottinghamshire-64499694
content: |-
  Stargazer George Chan photographed comet C/2022 E3 (ZTF) from his home in Bramcote, Nottinghamshire.

  A stargazer has captured the moment a newly-discovered green comet began to make its closest approach to Earth.

  George Chan photographed comet C/2022 E3 (ZTF) over several hours from his back garden in Bramcote, Nottinghamshire, and stitched the images together to form a timelapse video.

  The object originates in the Oort cloud, a collection of icy bodies at the edge of the solar system, and its journey to our planet took about 50,000 years.

  Comets are mostly composed of ice and dust. As they approach the Sun, the ice is vaporised and the dust shaken off to create the signature long tail.

