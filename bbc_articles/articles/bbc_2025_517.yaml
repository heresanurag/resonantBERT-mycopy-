content: |-
  The pop star praised and promoted Welsh musical talent during his surprise performances in Cardiff.

  Ed Sheeran told students there was too much pressure in schools towards financial jobs when the arts is such a key part of the British economy.

  Sheeran's comments come as he was launching the new Ed Sheeran Foundation, which advocates for the teaching of music in schools across the UK.

  The foundation aims to improve access to music for more than 12,000 children and young people by providing instruments, creating performance opportunities and opening pathways into the industry.

  "There's so much amazing music, amazing film, amazing painting that comes out of Wales," he told pupils Fitzalan High School in Cardiff ahead of a surprise performance during a school assembly.

  Sheeran went on to jam with Welsh artists at a community centre in Splott.

  "Wales was such key part of my early stages with [song writing collaborator Amy Wadge]," he said during the visit.

  "When I was 16 I was coming up here writing songs."
