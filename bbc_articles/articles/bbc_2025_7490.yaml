title: 'Eubank vs Benn: Chris Eubank Jr opens up on "pain" and heckles Eddie Hearn
  off stage at news conference - BBC Sport'
date: '2025-04-25'
section: Boxing
url: http://www.bbc.co.uk/sport/boxing/articles/cj0zddrerd3o
content: |-
  Chris Eubank Jr opens up on the pain of his estranged relationship with his father at a news conference before Saturday's much-hyped fight with rival Conor Benn.

  This video can not be played To play this video you need to enable JavaScript in your browser.

  Chris Eubank Jr opened up about the fractured relationship with his father and the death of his brother before Saturday's much-hyped fight with rival Conor Benn. The all-British grudge match will take place at Tottenham Hotspur Stadium, more than 30 years after their fathers began their own iconic rivalry. Speaking at Thursday's news conference, Benn, 28, vowed to inflict "pain" on the 35-year-old Eubank Jr in their middleweight contest. "What is pain, though?" retorted Eubank Jr, whose brother Sebastian died in 2021 aged 29. "I have a brother who is buried in the desert in Dubai - that is pain. "I have his son, three years old, he asks: 'Why can't I see my daddy? Why can't he take me to school?' That is pain." It is becoming increasingly unlikely Chris Eubank Sr, who beat Nigel Benn in 1990 before a contentious draw three years later, will be at Saturday's bout. Eubank Sr has fallen out with his son and not been involved in any of the fight build-up. "My own father, a man I idolised for my entire life, and he doesn't speak to me," added Eubank Jr. "We haven't spoken for years and he thinks I'm a disgrace. These things are what pain is to me." Eubank Jr and Benn were scheduled to fight in October 2022, before Benn failed a voluntary drugs test. A long and intense stare down ensued at the face-off, although there was no repeat of February's infamous news conference when Eubank Jr slapped Benn with an egg.

