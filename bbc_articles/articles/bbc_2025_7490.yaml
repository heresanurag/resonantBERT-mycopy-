  Eddie Hearn has promoted Conor Benn for his entire professional career

  Eubank Jr took his seat 15 minutes after the scheduled start time, leaving Benn and a few hundred of the boxing media waiting in a conference room overlooking the pitch at the fight night venue. Just like he did in February, Eubank Jr heckled promoter Eddie Hearn the moment the Matchroom boss began to speak. "I can't wait for him to smash you to pieces on Saturday," Hearn said, raising his voice to be heard. Hearn swapped places with Matchroom chief executive Frank Smith, but Eubank Jr did not back down. He then accused Benn, who based his training camp in Spain, of "fleeing" the United Kingdom. "He knew he couldn't handle the pressure of the UK streets and have people shouting drug cheat and egg jokes," added Eubank Jr. Benn, who has always maintained his innocence, had his suspension lifted in November after a two-year-battle with anti-doping authorities. With his father sat beside him, he refused to bite back and felt "no pressure" in a bid to extend his 23-fight unbeaten record.

  This video can not be played To play this video you need to enable JavaScript in your browser.

  Former world-title challenger Eubank Jr has won 34 fights and lost three, but competed at a much higher level than his opponent. Benn has operated the majority of his career two divisions below the middleweight limit. Both fighters will weigh in on Friday and are prohibited from adding more than 10lbs by a second weigh-in on Saturday morning. Eubank Jr remains favourite with bookmakers, but those in Benn's inner circle say he looks in phenomenal shape. Nigel Benn, as he has done throughout camp and in every media event, was by his son's side and predicted the fight "won't go past four rounds". He raved about his son "bullying" sparring partners as he spoke of a session in which Benn supposedly got the better of undefeated IBF world super-middleweight champion William Scull, who fights Saul 'Canelo' Alvarez on 4 May. "He couldn't take no more after eight rounds, he was meant to be doing 10 rounds," added the 61-year-old former two-weight world champion. Whether where is any truth to all the noise, or if it's just smoke and mirrors and the usual pre-fight hype, remains to be seen.
