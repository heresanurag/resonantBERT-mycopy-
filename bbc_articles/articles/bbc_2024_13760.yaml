  The ex-president was found guilty on all counts of falsifying business records. Americans have mixed opinions about the verdict.

  Donald Trump was found guilty on all 34 counts of falsifying business records during his criminal trial on Thursday.

  But what do people in the US think of the ex-president's conviction?
