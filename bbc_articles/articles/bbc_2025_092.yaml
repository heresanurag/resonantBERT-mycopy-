  Mr Livelsberger had decades of experience with the US military, having served in both the Army and National Guard. He was a decorated Special Forces Intelligence Sergeant. He was serving in Germany but on approved leave at the time of the incident. Mr Livelsberger's father told the BBC's news partner CBS that his son was in Colorado to see his wife and eight-month-old daughter. He said he last spoke to his son at Christmas and that everything seemed normal.
