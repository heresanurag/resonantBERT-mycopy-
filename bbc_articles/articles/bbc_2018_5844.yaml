title: Period power brings free sanitary towels to school - BBC News
date: '2018-05-27'
section: General
url: http://www.bbc.co.uk/news/uk-england-stoke-staffordshire-44138359
content: |-
  A group of teenagers at a school where free sanitary products are available tackle the stigma around periods.

  Teenagers at the Discovery Academy in Stoke-on-Trent, which has introduced free sanitary towels, tackle the stigma around "that time of the month".
