  Watch the moment Britain's Emma Raducanu beats Canada's Leylah Fernandez to win the US Open women's singles final in straight sets.

  Watch the moment Britain's Emma Raducanu beats Canada's Leylah Fernandez to win the US Open women's singles final in straight sets, becoming the first qualifier in the Open era to win a Grand Slam.
