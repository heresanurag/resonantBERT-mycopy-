title: 'London: Thames cable car pods turned into ''chatty cabins'' - BBC News'
date: '2025-03-11'
section: General
url: http://www.bbc.co.uk/news/videos/cwyg0le800jo
content: |-
  People are being encouraged to have conversations with others to try and combat loneliness.

  In a city with nearly nine million people, it's not uncommon for many people to still experience loneliness through a lack of a sense of belonging or connection.

  Transport for London is trying to tackle this with a "chatty cabins" scheme, as part of its 25th anniversary, to get Londoners talking more to improve their mental health.

  They are invited to spark new conversations as they fly above the River Thames on the cable car between Greenwich Peninsula and the Royal Docks.

