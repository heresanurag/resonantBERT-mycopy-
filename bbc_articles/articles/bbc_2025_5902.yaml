title: Cars carried away as flash flooding hits Greek island - BBC News
date: '2025-04-01'
section: General
url: http://www.bbc.co.uk/news/videos/cx275xnen7no
content: |-
  Heavy rain on the Greek island of Paros saw cars and debris swept through the streets.

  Heavy rain caused flash flooding on the Greek island of Paros on Monday, with water surging through the streets and sweeping vehicles away.

  Schools were closed and authorities urged residents to avoid travel, according to local media.

  Further heavy rainfall is expected to hit this week.
