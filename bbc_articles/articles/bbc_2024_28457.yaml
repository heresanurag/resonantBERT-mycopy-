title: Will Ukraine now strike Russia with UK weapons? - BBC News
date: '2024-11-19'
section: Europe
url: http://www.bbc.co.uk/news/articles/c5yxl7g7l22o
content: |-
  Britain has been unwilling to let Ukraine send storm shadow missiles into Russia over fears of escalation.

  Will UK follow the US and allow the use of long-range missiles?

  Now that the US has given Ukraine the green light to use American-supplied long range missiles in Russia, what will the UK decide? Ukraine’s President Volodymyr Zelensky has been pushing for permission from Washington to use the powerful US-made Army Tactical Missile System, known as ATACMS, to hit targets inside Russia. UK defence officials for their part have been seeking US approval for Kyiv to use Storm Shadow missiles provided by Britain to hit military targets inside Russia. But London has not been willing to go it alone and had been waiting for the White House to change its mind, which it did on Sunday. The change of US policy paves the way for Ukraine to use Storm Shadow with fewer restrictions - something Ukraine has been requesting for months.

  Storm Shadow missiles, and their French equivalent called SCALP, have been sent in limited quantities - low hundreds not thousands - to Ukraine and so far have only been used against targets inside its borders. Ukraine has already used them against Russian-occupied Crimea - for example hitting Russia’s Black Sea naval headquarters at Sevastopol. These missiles, which are launched from an aircraft, fly close to the speed of sound and carry highly explosive warheads making them an ideal weapon for penetrating Russian bunkers and ammunition stores. Protracted discussions about firing Storm Shadow missiles deep into Russia were raised during July's Nato summit in Washington. Starmer insisted the missiles were to be used for defensive purposes but said "it's up to Ukraine to decide how to deploy it". In a message on X at the time Zelensky wrote he had "learned about the permission to use Storm Shadow missiles against military targets in Russian territory", adding that he and Starmer had the "opportunity to discuss the practical implementation of this decision". But nothing actually happened after the summit. Zelensky made it clear the use of long-range missiles are a key part of his “Victory Plan”. He raised the issue again when he went to Downing Street to brief Starmer last month, in a meeting attended by the new Nato secretary general Mark Rutte. There was no change in policy, but Rutte said there was no legal reason to prevent Ukraine from striking Russia if the countries who supplied the missiles consented. UK Defence Secretary John Healey has worked hard to avoid to show any public disagreement with Washington. When recently asked about the matter in a joint press conference with US Defence Secretary Lloyd Austin, Healey said such discussions in public would only help Russia. And he is keeping tight-lipped about the UK's position now. On Monday he said he “won’t be drawn on details about long-range missiles” when asked about the use of UK weapons inside Russia. Responding to a question from the DUP MP Sammy Wilson in the House of Commons, Healey said "it risks operational security and the only person that benefits from public debate is President Putin." He added he spoke to the US defence secretary on Sunday about Russian escalation over the weekend, and would be speaking to the Ukrainian defence minister later on Monday. "I want this House to be in no doubt - the prime minister has been clear that we must double down and give Ukraine the support that it needs for as long as it needs. And we will continue to work in close co-ordination with the US in our support for Ukraine." The fear is that although Russian President Vladimir Putin’s threats have turned out to be largely bluffs, allowing Ukraine to hit targets deep inside Russia with Western-supplied missiles could provoke a major escalation. Kremlin spokesman Dmitry Peskov warned Putin had expressed such a move would put Nato "at war" with Russia - as such strikes would ultimately be carried out not by Ukraine but by the countries that give permission for such use of missiles. Professor Justin Bronk from defence think tank the Royal United Services Institute told BBC News it is "very likely" that US President Joe Biden's belated decision to allow long-range strikes with ATACMS ballistic missiles will also enable Storm Shadow to be used in at least the same way. "US objections will presumably have been dropped for them," he said. "Russian threats are unlikely to be considered a significant deterrent at this stage, since Russia has threatened dire consequences - including allusions to nuclear attacks - repeatedly throughout the war at each stage when Western equipment has been supplied." But he said there is little reason to think that expanding the usable area for UK Storm Shadow "will make any difference" to Ukraine's ability to hit back at Russia. He added "most of the more critical targets such as fighter bombers on Russian air bases are likely beyond the range of these missiles in practical terms - and there will be a limited number of the missiles available after lengthy combat use of the system in the war to date."
  • None Biden allows Ukraine to strike Russia with American long-range missiles
