  People aged 22-24 hold more debt of all kinds – credit cards, car loans and mortgages – than millennials did at the same age, the credit agency TransUnion found. And their debt is rising faster than their income. “There's no beginner mode anymore - the bottom rung of the ladder just feels completely gone, I think, for most of the generation,” Ms Scanlon said. And those fears of being left behind could drive voters to the ballot box, experts say. Abby Kiesa, deputy director of the Center for Information and Research on Civic Learning and Engagement (Circle), told the BBC she expects about half of young voters to turn out in this election – a similar proportion to 2020, which had the highest turnout in decades and an 11% increase compared to the presidential election in 2016. Meanwhile, the 2018 midterms saw a record-breaking turnout among young voters, according to Circle. That’s still far below the turnout of other age groups. In 2020, 69% of eligible Americans aged 35-64 voted, while 74% of voters over the age of 65 went to the polls, according to the US Census, external. But in an election that will be won by a razor’s edge, being able to rally a significant percentage of new voters could help give a candidate the boost they need to win. Ms Kiesa said focusing on addressing economic hardship will be key if politicians hope to boost turnout among Gen Z-ers feeling disconnected from politics. “For the past three elections, turnout among young voters has been historic,” she said. “We need candidates who understand, engage, and speak with them. That’s what has to change.”

  The two presidential nominees - Trump and Harris - have both sharpened their economic message in recent weeks and stepped up efforts to appeal to young voters. Harris has expanded on the Biden administration’s economic initiatives around student loan forgiveness, consumer pricing and housing affordability. She’s proposed a $25,000 subsidy for first-time home buyers and a $6,000 tax credit for families with newborns. Her campaign has doubled her youth organising staff and invested heavily in digital ads. She has enjoyed endorsements from high-profile celebrities including Taylor Swift and Billie Eilish, and built momentum by embracing viral memes about the vice-president on social media. Harris has also spent the last year touring college campuses in key battleground states. Meanwhile, Trump has sought to capitalise on economic dissatisfaction among young people, attacking Harris and Biden’s economic record and highlighing lower prices on goods under his administration. Both he and Harris have promised to eliminate tip taxation - a move aimed at the service industry, which employs millions of young people - and committed to ending regulatory barriers on cryptocurrency. The former president has also tried to reach younger voters through social media, podcasts, and partnerships with influencers. He’s posted TikToks with influencers like Logan Paul and Adin Ross. Polls showed Trump made inroads among young voters while he was running against Biden, who is 81. When Biden was still in the race, he led Trump by only a few percentage points, and the GenForward survey showed young people thought Trump handled the economy better than the Biden administration. But momentum has shifted back to the much younger Harris. She now holds a 31-point lead over Trump among likely voters aged 18-29, according to the Harvard Institute of Politics poll released in late September.

  Economic woes aren’t just driving people to vote, they’re lighting a fire in some young people to run for office themselves. Gabriel Sanchez, 27, a Democratic candidate for the Georgia state legislature, said he’s running for office to try to help ease the financial strain on his generation. As a waiter at a sports bar, he said rent hikes have forced him to move repeatedly. He is concerned that essentials like stable housing are becoming a privilege for many young Americans. “Most of us aren’t able to own a home, afford healthcare or buy the basic things we need,” Sanchez said in a TikTok posted on his campaign account. In May, Sanchez and three other young candidates cruised to victory in Georgia’s Democratic primary election, an outcome dubbed as Gen Z’s night in Atlanta, external.

