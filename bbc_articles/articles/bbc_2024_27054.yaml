  Sanchez said he believes his economic struggles resonated with voters. “We’re working hard but not seeing any rewards. This economy isn’t working for us,” Sanchez said. “We need representation - candidates who understand what young people are going through.” But it’s not only Democrats that are luring young candidates. Wyatt Gable, a 21-year-old in his last year at East Carolina University, won the Republican primary for North Carolina’s House of Representatives. He defeated George Cleveland, a 10-term, 85-year-old, incumbent. If elected in November, Gable will become the youngest person ever to hold a seat in the state legislature. As he prepares for the November vote, he said he expects the economy to be top of mind for young people at the polls this year. “My generation feels it. Seeing how bad inflation is, and with interest rates skyrocketing, that's going to be the biggest thing on young people's minds when they go to the ballot box,” he said.

