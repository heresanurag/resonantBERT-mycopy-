id: bbc_2023_1842
title: 'Turkey earthquake: Nurses rush to protect baby incubators as quake strikes
  - BBC News'
date: '2023-02-13'
section: General
url: http://www.bbc.co.uk/news/world-europe-64630282
content: |-
  CCTV from inside a hospital in Gaziantep, Turkey shows the neonatal unit in the minutes after the deadly earthquake.

  CCTV shows nurses at the neonatal unit of a hospital in southern Turkey running to protect babies in their incubators in the moments the earthquake struck.

  The hospital in the Gaziantep region was near the epicentre of Monday's earthquake which killed at least 35,000 people.
