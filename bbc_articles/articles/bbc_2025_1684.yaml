content: |-
  Officer Brian Larison recounts the events that led to the rescue of a woman from a burning car involved in a crash in Chandler, Arizona.

  Officer Brian Larison recounts the events that led to the rescue of a woman from a burning car in Chandler, Arizona.

  Body camera footage released by the Chandler Police Department shows Larison smash through the car window to allow an off-duty firefighter to pull the woman out.

  The Arizona Department of Public Safety told the BBC that one person suffered non-life-threatening injuries from the accident.
