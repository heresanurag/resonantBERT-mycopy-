  A 28-year-old man is due to appear in court in Londonderry on Thursday.

  Man charged with murder of woman in Londonderry

  The body of Montserrat Martorell was discovered in a flat in Harvey Street at about 04:15 BST on Saturday

  A man has been charged with the murder of Montserrat Martorell in Londonderry at the weekend. The 28-year-old has also been charged with arson with intent to endanger life and other serious offences. He is due to appear before Londonderry Magistrates Court on Thursday. The body of 65-year-old Ms Martorell, who the police had previously been unable to identify, was found in a flat following a fire in Harvey Street at about 04:15 BST on Saturday.

  An application for extending time for police to question the suspect was made at a closed court hearing at Londonderry Magistrates' Court

  The Spanish woman, who had been living in Derry, sustained multiple injuries in what the police described as a "horrific and sustained attack". In a closed court hearing at Londonderry Magistrates' Court on Wednesday, the police had been granted an additional 18 hours to question the man.
