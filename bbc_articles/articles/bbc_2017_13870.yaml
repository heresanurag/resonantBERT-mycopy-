title: Heather North, the voice of Scooby-Doo's Daphne, dies at 71 - BBC News
date: '2017-12-20'
section: Entertainment & Arts
url: http://www.bbc.co.uk/news/entertainment-arts-42425616
content: |-
  Heather North provided the voice of "danger-prone" Daphne Blake from 1970 to 2003.

  North was the second actress to lend her voice to Daphne (second from right)

  Heather North, the US actress who was the voice of Daphne in Scooby-Doo for many years, has died at the age of 71.

  According to reports, she died at her Los Angeles home on 30 November after a long illness.

  North was the second actress to voice the "danger-prone" Daphne Blake in the Scooby-Doo, Where Are You! TV series, making her debut in 1970.

  The California native continued voicing the role in various iterations of the property until 2003.

  They included The New Scooby-Doo Movies of the early 1970s, the short-lived Scooby-Doo and Scrappy-Doo series and The New Scooby-Doo Mysteries that aired in 1984.

