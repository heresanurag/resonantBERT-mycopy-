title: 'Georgia protests: Riot police face off against foreign influence bill demonstrators
  - BBC News'
date: '2024-05-13'
section: Europe
url: http://www.bbc.co.uk/news/world-europe-69001339
content: |-
  Thousands have gathered outside parliament in Tbilisi to protest the bill they say is Russian-inspired.

  This video can not be played To play this video you need to enable JavaScript in your browser. Watch: Police clash with protesters in Georgia over controversial bill

  Protests in Georgia have continued in a last-ditch effort to prevent the passing of a controversial law. After an overnight standoff with protesters outside parliament in Tbilisi, security forces pulled out from the main square on Monday morning. Critics of the governing Georgian Dream party say the foreign influence bill - which they describe as the "Russia law" - could be used to stifle dissent. The final voting on the proposed legislation is scheduled for Tuesday. On Monday morning, Georgian Dream lawmakers rushed it through a committee vote, approving it in 67 seconds. The bill - now due to go for its third and final reading - targets civil society organisations and independent media that receive foreign funding. Protesters are concerned that it would be used by the government to clamp down on opponents, and would harm Georgia's hopes of joining the European Union. Tens of thousands of demonstrators spent the night outside Tbilisi's parliament building, dancing as it rained through the dark hours. Once the sun rose on Monday, MPs from the governing party arriving ahead of the session were met with shouts and chants of "slaves" and "Russians". Ranks of police with shields and water cannon were stationed to allow legislators to get into the parliament building. Photos and footage online appeared to show violent altercations between protesters and police. Two US citizens and one Russian were among 20 people arrested at protests, Russian state news reported, citing the Georgian Ministry of Internal Affairs. Protesters plan to continue their noise through the parliamentary session in the hopes the sound will encourage MPs to reconsider voting for the bill.

  Tens of thousands of people have taken to the streets of Tbilisi ahead of the bill's final reading

  Opponents of the bill say the measures are inspired by Russian legislation passed in 2012, which they say has been used since then to crack down on critics of the Kremlin. This proposed law would force non-governmental groups and media to register as "organisations serving the interest of a foreign power" if more than 20% of their funding comes from overseas. Georgian Dream says the measure would increase transparency and defend Georgia's sovereignty.

  On Sunday, Prime Minister Irakli Kobakhidze vowed that his party would successfully pass it into law, despite the massive demonstrations that began nearly a month ago. The country's opposition leaders have asked the UK to do more to oppose the bill, calling on Foreign Secretary David Cameron to speak out against it. Last week, the US said it was "deeply troubled" by the treatment of protesters and called for an independent investigation into reports of "harassment and physical assault". EU Commission President Ursula von der Leyen has said the Georgian people want a "European future" and has called on legislators to "stay the course on the road to Europe". The EU granted Georgia candidate status in December, but has warned the bill could jeopardise further progress within the bloc. Georgian Dream has been in power since 2012, when it defeated a pro-Western government and vowed to normalise relations with Russia. The party last won re-election in 2020. The opposition accused it of fraud and voter intimidation, but international observers - while criticising aspects of the process - said it had been competitive. The next general election is due in October.
