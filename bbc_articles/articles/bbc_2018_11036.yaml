title: Child cancer treatment 'wonderful news' - BBC News
date: '2018-09-05'
section: General
url: http://www.bbc.co.uk/news/uk-45419551
content: |-
  A couple whose late son was on early trials for a cancer drug welcome a deal for it to treat children on the NHS.

  The NHS has agreed a deal for a revolutionary new cancer drug for children with advanced leukaemia.

  Lydia and Darrell Bate, whose late son Fabian was on early trials for the drug, welcomed its introduction.

