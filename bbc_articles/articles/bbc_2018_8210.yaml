  BBC Sport football expert Mark Lawrenson gives his predictions for the World Cup quarter-finals.

  Last updated on .From the section World Cup

  Live: Coverage across BBC TV, BBC Radio and BBC Sport website with further coverage on Red Button, Connected TVs and mobile app. BBC Sport football expert Mark Lawrenson is making a prediction for every match in Russia. Lawro picked the winner in six of the eight last-16 ties, and correctly predicted the outcome of 22 of the 48 group games. Before the tournament, Lawro correctly chose 14 of the 16 teams that reached the first knockout stage, including Brazil - his pick to win the tournament, and England - who he thought would go out in the quarter-finals. Lawro was speaking to BBC Sport's Chris Bevan in Moscow.
