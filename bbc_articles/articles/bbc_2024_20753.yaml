title: Moment Met Police's Sir Mark Rowley appears to push past journalist's microphone
  - BBC News
date: '2024-08-05'
section: General
url: http://www.bbc.co.uk/news/videos/cx2xxp7vw0no
content: |-
  Sir Mark Rowley was asked about "ending two-tier policing" as he left the Cabinet Office.

  Metropolitan Police Commissioner Sir Mark Rowley appeared to push past a Sky journalist and knock a microphone to the ground when he walked through reporters outside the Cabinet Office in Whitehall.

  Sir Mark was asked "are we going to end two-tier policing" as he emerged from the emergency Cobra meeting where ministers and representatives from law enforcement discussed the recent outbreaks of violence across the UK.

  So-called "two-tier policing" is where right-wing protests are considered to be dealt with more harshly than left-wing ones.

  The prime minister was asked about the incident and the accusation of "two-tier policing" during an interview following the Cobra meeting. Sir Kier Starmer replied "there is no two-tier policing" and said it is a "non-issue".

  A Met Police spokesperson said the commissioner "was in a hurry to return to New Scotland Yard to take action on the agreed next steps.”
