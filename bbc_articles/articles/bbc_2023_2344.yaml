title: Man charged after young girl's disappearance in the Borders - BBC News
date: '2023-02-08'
section: Scotland
url: http://www.bbc.co.uk/news/uk-scotland-64557459
content: |-
  The child went missing from the Borders on Sunday, but was found on Monday night.

  A 53-year-old man has been charged following the disappearance young girl who was later found in the Scottish Borders.

  The child was reported missing on Sunday but was found in the area at about 21:30 on Monday.

  Andrew Miller, also known as Amy George, was arrested on Tuesday. Police confirmed he was charged overnight.

  He is expected to appear at Selkirk Sheriff Court on Thursday and a report will be sent to the procurator fiscal.

  Officers have set up a cordon at a property in the village of Gattonside.

  A police cordon has been set up around a property in Gattonside

  Police held a press conference on Monday to appeal to the public for information as part of efforts to trace her.

  Members of the public joined the emergency services in the search which went on until Monday night.
