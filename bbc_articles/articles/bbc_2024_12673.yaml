  A sneaky seagull is caught on CCTV as it swoops for the scoop at a north Wales shop.

  Read all about it... A seagull in north Wales just couldn’t wait to catch up with the headlines.

  The bird swooped for the scoop at Late Stop 24 Bangor on Sunday.

  The unusual shoplifting moment was caught on CCTV, but what was the tabloid of choice?
