title: 'River Taff: One in hospital after Cardiff river search - BBC News'
date: '2022-06-22'
section: Wales
url: http://www.bbc.co.uk/news/uk-wales-61886590
content: |-
  Rescue teams search a river in Cardiff on Tuesday afternoon with one person taken to hospital.

  South Wales Fire and Rescue Service has been searching the River Taff in Cardiff

  One person has been taken to hospital following a search of a river in Cardiff.

  South Wales Fire Service, South Wales Police, the Welsh Ambulance Service and the Coastguard were called to the River Taff at about 16:30 BST.

  A National Police Air Service helicopter from St Athan was involved with the search in the Whitchurch and Llandaff North areas of the city.

  No further details have been released about the person or their condition.

  They were taken to the city's University Hospital of Wales.

  The fire service responded along with police, ambulance and coastguard
