title: Patrick Kielty is new host of the Late Late show - BBC News
date: '2023-05-20'
section: Northern Ireland
url: http://www.bbc.co.uk/news/uk-northern-ireland-65558276
content: |-
  He will succeed former presenter Ryan Tubridy who has hosted the show for 14 years.

  Patrick Kielty said he was thrilled to become the new presenter of the Late Late Show

  Patrick Kielty is the new host of RTÉ's The Late Late Show, succeeding former presenter Ryan Tubridy, the Irish broadcaster has announced.

  He is the fourth permanent presenter of the programme - one of the world's longest running late-night talk shows - since 1962.

  Kielty said he was "absolutely thrilled" and that it was "a real honour" to take up the role.

  The County Down-born comedian has a long career in TV and radio presenting.

  Kielty will continue to host his own Saturday radio programme on BBC Radio 5Live while presenting the Late Late.

  From 1999 to 2003, he fronted Patrick Kielty Almost Live on BBC One and also co-presented talent show Fame Academy with English presenter Cat Deeley in 2002 and 2003.

  The pair later became a couple and married in 2012.

  Patrick Kielty is married to the English presenter Cat Deeley

  In March, Ryan Tubridy announced he would be stepping down after 14 years at the helm of the Late Late Show.

  His final programme will be broadcast on Friday 26 May on RTÉ One, with Kielty expected to be on-air in September.

  Kielty grew up in the County Down village of Dundrum and played Gaelic football for Down's minor team.

  He studied psychology at Queen's University in Belfast before making his first serious steps into stardom as compere at the Empire Comedy Club in the city.

  The comedy club tweeted a throwback photo of a young Kielty performing on stage following the announcement.

