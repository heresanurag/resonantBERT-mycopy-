title: BBC's Nick Robinson discovers X account hacked - BBC News
date: '2025-02-11'
section: General
url: http://www.bbc.co.uk/news/videos/cgmyk3kkeddo
content: |-
  Contrary to posts on his X account, the Today presenter reveals he is not launching a new cryptocurrency.

  The BBC's Nick Robinson has said his X account was hacked overnight.

  The Today presenter made the discovery after finding his account had posted to his followers that he was launching a new cryptocurrency.
