content: |-
  The Green Party says it will set out plans for a “game-changing” transformation in the UK.

  Greens vow tax hike on wealthier to fund NHS and housing

  The Green Party has launched its manifesto, external pledging to raise taxes on the better off to fund more spending on housing, the NHS and the climate crisis. This includes introducing a new wealth tax and raising the National Insurance (NI) on annual wages above £50,270. Party co-leader Adrian Ramsay said the Greens were the "only party being honest" about the tax rises they claim are needed. Mr Ramsay said the Greens were not expecting to form the next government but their MPs will be in Parliament to "speak up for you on the issues you care about". The party pledged to spend £50bn per year on health and social care by 2030. It is focused on the four seats which it thinks are winnable. At the manifesto launch in Hove, co-leaders Carla Denyer and Adrian Ramsay said electing Green MPs would "push Labour to be bolder", particularly on Net Zero climate change policies, which they accused other parties of "running away from". “Most people are working harder and yet getting poorer,” Ms Denyer told supporters, but “transforming” tax would “end the rip-off of rising bills, appalling services and shareholders trousering millions”.

  The Greens want to introduce a new wealth tax of 1% on assets worth over £10m, and 2% on assets worth more than £1bn. They say the new wealth tax would affect fewer than 1% of UK households and raise £15bn a year by the end of the next Parliament, with the money going to the NHS. Mr Ramsay said the increase was "modest" by European standards. He said a small number of millionaires may leave the UK as a result but insisted the super rich would stay. Currently employees pay no National Insurance until they earn more than £12,570, 8% on earnings of between £12,570 and £50,270, and 2% on earnings of above £50,270 for the 2023/24 tax year. Under the Greens' plans, the 8% rate would be paid on all wages above the upper earnings threshold. This is equivalent to an extra £283.74 per year in tax for someone earning £55,000. The Greens say both tax hikes will raise £70bn. Arun Advani, a wealth expert from the University of Warwick said raising this much through a wealth tax was credible, depending on the design. However, Institute for Fiscal Studies deputy director Helen Miller said the Greens were unlikely to raise as much revenue as expected and the party's manifesto states borrowing will be £80bn higher. While a recurrent wealth tax could raise revenue it would be "tough to implement", she said. She added: "Restricting upfront income tax relief on pension contributions would also be difficult to achieve - and would hit a lot of workers on not terribly high salaries - many nurses and teachers for example."
