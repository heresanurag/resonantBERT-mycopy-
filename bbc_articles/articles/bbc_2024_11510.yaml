  • None Stopping all new fossil fuel projects in the UK
  • None Banning domestic flights for journeys that take less than three hours by train. Sian Berry, who is the party's candidate for the Brighton Pavilion constituency, said the "rental rollercoaster" is "destroying lives" and bringing in rent controls, stabilising tenancies and ending no-fault evictions was "not a pipe dream". "Decided locally and based on what the housing market looks like in the local community, this would allow all of us to make sure rents are affordable and stay connected with local earnings." The party also set out plans to make homes warmer and cheaper to run by increasing energy efficiency. On transport, the Greens say aviation is the fastest-growing source of CO2 emissions, and claim “it’s the wealthiest driving this trend”. They want to introduce a frequent-flyer levy and stop airport expansions. Campaign group Flight Free UK said the proposed domestic flight ban would apply to so few routes it would be be "fairly pointless". The Greens plan to field candidates in every constituency in England and Wales for the 4 July election. The Scottish Greens are a separate party. Mr Ramsay also confirmed four out of 574 candidates have been replaced after the party launched an investigation into reports of antisemitic or extreme comments. He said: "Out of that huge number, there were four who were originally selected who are now not going forward and have had new candidates put in their place." When pressed over other candidates who had been investigated, he said: "I can't recite every candidate" adding that the process is "separate from the leadership as a matter of good governance".
