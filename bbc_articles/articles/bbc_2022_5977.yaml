  The first set against Sasnovich was one of the very best Raducanu has played all year.

  But apart from a three-game burst at the start of the deciding set, the US Open champion looked tired and was lacking power thereafter.

  Raducanu says she is injury free - the benefit she thinks of the extra strengthening work she has been doing in the gym - but she does not currently have the stamina required.

  Norrie, meanwhile, has his best chance yet of reaching the fourth round of a Grand Slam for the first time. He has so far negotiated a favourable draw with little fuss, but will expect a much tougher challenge from Karen Khachanov, who has reached the last 16 here on four previous occasions.
