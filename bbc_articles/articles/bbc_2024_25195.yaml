content: |-
  Stephen and Christine Jefferies had both been shot, along with their pet dog, an inquest hears.

  Stephen Jefferies, 74, and his 72-year-old wife Christine were found shot dead, along with their dog

  A couple whose bodies were found by their daughter had both been shot in the head, an inquest has heard. Stephen Jefferies, 74, his 72-year-old wife Christine and their pet dog were found dead in their semi-detached house on Morfa Crescent in Trowbridge, Cardiff. South Wales Police recovered a rifle from the property after the couple's daughter called at the house on 5 October and let herself in after getting no answer at the door, only to find her parents in a bedroom. Both died from gunshot wounds to their right temple, an inquest at Pontypridd Coroner's Court was told.

  The couple's pet dog - believed to be a cocker spaniel - had also been shot. Coroner Graeme Hughes said, because both deaths appeared "unnatural", further investigation and inquests would be held. Adjourning the hearings, he expressed his "sincere condolences" to the family and friends of Christine and Stephen Jefferies.
