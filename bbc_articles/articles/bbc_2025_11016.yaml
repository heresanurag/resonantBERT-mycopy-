title: Crowds gather at Ipswich pub as Ed Sheeran performs - BBC News
date: '2025-05-08'
section: General
url: http://www.bbc.co.uk/news/videos/cy4833k0k4wo
content: |-
  He is watched by fans who got tickets by responding to an Ed Sheeran WhatsApp message.

  Video showed Ed Sheeran performing an intimate gig at a pub in his home county.

  The Thomas Wolsey in Ipswich town centre has been re-branded as The Old Phone, the title of his latest track.

  It was watched by fans who got tickets after responding to an Ed Sheeran WhatsApp message.

  Footage showed others gathered outside singing along and hoping to catch a glimpse of the singer.
