title: 'Dungannon: Woman arrested over death of two-year-old girl - BBC News'
date: '2021-08-10'
section: Northern Ireland
url: http://www.bbc.co.uk/news/uk-northern-ireland-58139997
content: |-
  The police are also given an extra 36 hours to hold a man arrested on suspicion of murder.

  Tributes to the little girl are left outside the house in Dungannon

  Detectives investigating the death of two-year-old girl Ali Maguire in County Tyrone have arrested a woman.

  The 24-year-old is being held on suspicion of perverting the course of justice, causing or permitting the death of a child and child cruelty.

  The girl died in hospital after the ambulance service was called to a house in Park Avenue, Dungannon, on Friday.

  Earlier, police were given extra time to question a 32-year-old man arrested on suspicion of murder.

  The girl died in hospital after the ambulance service was called to a house in Park Avenue on Friday afternoon

  An additional 36 hours was given to detectives from the Police Service of Northern Ireland's (PSNI) major investigation team.

  It was reported the girl had suffered a serious head injury.

  A post-mortem examination is to be carried out to establish the cause of her death.

  The MP for the area, Sinn Féin's Michelle Gildernew, said on Saturday that the community was in "shock at the news".
