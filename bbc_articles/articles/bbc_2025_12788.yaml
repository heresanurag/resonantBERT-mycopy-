title: More Labour MPs join benefit revolt despite ministers' appeals - BBC News
date: '2025-06-25'
section: Politics
url: http://www.bbc.co.uk/news/articles/cy4ymj00px7o
content: |-
  More than 130 MPs have signed an amendment opposing the government's welfare reform legislation.

  A growing number of Labour MPs are supporting a bid to block the government's planned welfare changes, despite ministers phoning backbenchers to persuade them to back down. More than 130 MPs, including 120 Labour MPs, have signed an amendment, external that would give them the opportunity to vote on a proposal to reject plans to cut disability and sickness-related benefits payments to save £5bn a year by 2030. Cabinet ministers are reported to be among those ringing round Labour MPs, calling on them to remove their names from the amendment. Only one Labour MP, Samantha Niblett, has taken her name off the list so far. Sir Keir Starmer has vowed to "press ahead" with the welfare changes.

  The Universal Credit and Personal Independence Payment Bill, external - set to be voted on by MPs next Tuesday - would make it harder for disabled people with less severe conditions to claim personal independence payment (Pip). The rebels cite the number of people the plans are expected to push into relative poverty, a lack of consultation, and an inadequate impact assessment on the consequences on the jobs market as reasons why they oppose the plans. Those who signed the amendment opposing the government's welfare reforms include MPs from the 2024 intake, as well as those who were elected MPs before Labour's landslide election victory.

  Labour MP Helen Hayes, who signed the amendment, denied it was any sort of confidence vote, saying "that's absolutely not the case". "Nobody who has signed this amendment wants to be in a position next week of voting against the government," she said. "We're asking the government, after many weeks of sharing our concerns privately, to listen to our concerns to avoid a situation next week where there's conflict." A confidence issue is generally seen as similar to a test of whether the government still maintains its support in the House of Commons. The names also include two MPs who were elected for Labour but have been suspended by the party - John McDonnell and Andrew Gwynne. Other signatories are members of Northern Ireland's political parties as well as Rosie Duffield, who quit Labour to sit as an independent. It is believed senior cabinet ministers, including Chancellor Rachel Reeves and Health Secretary Wes Streeting, called MPs who had signed the amendment to try to convince them to vote with the government. Asked if a U-turn akin to the winter fuel payment was coming, Defence Secretary John Healey told the BBC's Today programme: "Our ambition is to see a system which better targets the support towards those who have the highest needs." The BBC's chief political correspondent Henry Zeffman said some cabinet members were "taken aback by quite how sour the mood is on this issue and fearful that might bleed into a broader problem for this Labour leadership". A source close to the issue told the BBC on Tuesday night: "Once you take a breath, it is better to save some of the welfare package than lose all of it."

  Giving evidence to Westminster's Work and Pensions Committee on Wednesday morning, Disability Minister Sir Stephen Timms said the vote was expected to go ahead on Tuesday and he was "looking forward to the debate". He added he would be "delighted" to get support from the Conservatives and "across the entire House". Committee chair Debbie Abrahams, who has signed the rebel amendment, complained of a lack of consultation on provisions in the bill, which Sir Stephen said was due to "the urgency of the changes needing to be made". He set out how PIP cost the equivalent of £12bn in 2019 and £22bn in 2024, rising by £2.8bn in the last year. He said: "It's not in the interests of people who depend on Pip for it to be on a financially unsustainable trajectory. We do need to deal with that." Earlier on Wednesday, Chief Secretary to the Treasury Darren Jones was asked what could happen to government spending plans if the bill was rejected. "The first thing to say is of course that the government policy has not changed and we'll be progressing with our reforms to the welfare system," he said. He said future spending plans would be considered by the Chancellor at the Budget, taking into account the latest independent forecast from the Office for Budget Responsibility. Labour MP Jake Richards, who is supporting the government, said the current welfare system is "simply unsustainable". "I would gently urge colleagues to step back, look at this unsustainable welfare situation we have at the moment," he said. "They cannot like all the nice, easy spending money parts of welfare reform without accepting all the difficult decisions that come with that." The latest British Social Attitudes report shows that 45% of respondent felt there should be more spending on disability benefits - the first time the figure has dropped below half since the question was first asked in 1998. It is still up to the Speaker of the House of Commons Sir Lindsay Hoyle whether this specific amendment gets voted on, but that could now be more likely as a number of other MPs from parties including the SDLP and the DUP have also added their names to the list. The welfare reform bill - called the Universal Credit and Personal Independence Payment Bill - will include proposals to make it harder for disabled people with less severe conditions to claim personal independence payment (Pip). Speaking on Tuesday ahead of a meeting of Nato leaders, Sir Keir said he planned to "press ahead" with the welfare reforms, despite the objections from within his own party. He said the current welfare system "traps people" on benefits, and was set to fuel "unsustainable" rises in the cost to taxpayers.

