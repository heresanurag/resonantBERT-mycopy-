id: bbc_2018_2345
title: 'Syria war: Desperate rescue efforts in rebel enclave - BBC News'
date: '2018-02-24'
section: General
url: http://www.bbc.co.uk/news/world-middle-east-43143619
content: |-
  White Helmets in Eastern Ghouta find people trapped in the rubble after government bombardments.

  White Helmets civil defence workers in the Syrian rebel-held enclave of Eastern Ghouta have been finding people including young children buried under rubble, as a ferocious bombardment continues.

  Government air strikes have killed hundreds in the past three days.
