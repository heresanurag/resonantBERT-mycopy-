  They tell the BBC they do not believe Christine Blasey Ford's accusations against Brett Kavanaugh.

  The sexual assault allegations against Brett Kavanaugh have dominated the headlines.

  At a Trump rally in Mississippi, there's no doubt which side the president's supporters are on.
