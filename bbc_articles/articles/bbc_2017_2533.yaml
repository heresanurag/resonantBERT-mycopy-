title: 'Trump travel ban: President considering ''brand new order'' - BBC News'
date: '2017-02-11'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-38942277
content: |-
  Donald Trump told reporters on Air Force One that a new executive order could be issued as early as Monday or Tuesday.

  It comes after an appeals court in San Francisco upheld a court ruling to suspend his original order that barred entry by citizens from seven mainly Muslim countries.
