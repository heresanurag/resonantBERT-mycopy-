title: 'Northampton Saints 38-8 Castres: Premiership champions cruise to bonus-point
  win in Investec Champions Cup - BBC Sport'
date: '2024-12-07'
section: N'hampton
url: http://www.bbc.co.uk/sport/rugby-union/articles/c1ken90kkd1o
content: |-
  Northampton Saints kick-start their Investec Champions Cup campaign with a comfortable bonus-point victory over Castres at a blustery Franklin's Gardens.

  Northampton Saints kick-started their Investec Champions Cup campaign with a comfortable bonus-point victory over Castres at a blustery Franklin's Gardens. The Premiership champions started brightly and took the lead through a powerful finish by captain Fraser Dingwall. Castres reduced the deficit with a Louis le Brun penalty but Saints hit back immediately as Temo Mayanavanua broke through the white shirts and galloped over the line. As Storm Darragh began to strengthen in the East Midlands, the window for more attacking rugby closed until after the break as both sides resorted to playing for territory with the boot. Saints responded to slightly less ferocious winds after the interval and Tommy Freeman reacted quickest from a penalty to throw a wide pass for Juarno Augustus to open his account in the corner. Curtis Langdon secured the bonus point before number eight Augustus doubled his tally after being driven over the line by his team-mates. Castres claimed a late consolation as Pierre Colonna tapped a quick penalty and carried the ball over, but Saints would have the final say in a dominant display as teenager Henry Pollock marked his first European start with a strong solo finish. Saints' campaign takes them to South Africa and a date with the Bulls in their next outing on Saturday, 14 December (13:00 GMT), while Castres host Munster the night before (20:00).

  With the weather causing havoc, it was a day for the purists as Saints had to show their steel at close quarters. It has been a difficult start to the defence of their domestic title but the challenge of the Champions Cup allowed for a refocus and director of rugby Phil Dowson handed 19-year-old Pollock his European debut. The flanker has enjoyed a real breakthrough season for Saints and his impressive form for England A in the autumn has created headlines. Pollock delivered another performance which belied his years as he tirelessly tackled and hit breakdowns, but his powerful carrying is a point of difference. Man-mountain Augustus remains the main threat with ball in hand from the pack and his influential double-try display merited the man-of-the-match award, but with the South African set to join Ulster next year the stage is set for Pollock to come to the fore. His bustling run in the final embers, spinning around and charging through Castres defenders before pirouetting over the line, could well become a trademark for club and country.
