title: 'Durdle Door: Woman dies in cliff fall near popular coastal spot - BBC News'
date: '2021-06-14'
section: Dorset
url: http://www.bbc.co.uk/news/uk-england-dorset-57475474
content: |-
  The woman is pronounced dead at the scene near Durdle Door in Dorset.

  The woman fell from cliffs on to Man o' War beach

  A woman has died after falling from a cliff on the Dorset coast.

  Emergency services were called at about 15:00 BST to Man o' War beach, near Durdle Door and Lulworth.

  Police said the woman had been pronounced dead at the scene and the circumstances were still being investigated.

  Rachel Williams, from Maidenhead, Berkshire, said people shouted at the woman not to climb down the cliff before she fell.

  A coastguard helicopter was sent to the incident

  Ms Williams, who was on the beach, said: "The woman shouted, 'I'm coming down, I'm coming down', and we're all shouting 'Stop, stop'."

  She said it was not clear who the woman was shouting to.

  The Maritime and Coastguard Agency (MCA) said it received multiple 999 calls about the incident.

  Michelle Attard, from London and visiting nearby Durdle Door, saw emergency workers attending to the woman on Man o' War beach.

  She said: "There were two helicopters and police trying to find out how someone slipped off the edge of the cliff.

