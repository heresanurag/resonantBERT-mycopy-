title: Port Talbot woman died with blood clot after being sent home by hospital -
  BBC News
date: '2024-08-20'
section: Wales
url: http://www.bbc.co.uk/news/articles/c74lwn2pl4no
content: |-
  Jade Ellis' children have been awarded £160,000 in compensation after she died in her son's arms.

  Mother sent home by hospital died with blood clot

  Jade Ellis died hours after being sent home from hospital

  A mum died of a heart attack due to a blood clot after being sent home from hospital - with her family claiming the NHS "failed" her. Jade Ellis, 36, was discharged from Princess of Wales Hospital in Bridgend "within half an hour" of arriving with chest pains. But she died in her 18-year-old son's arms soon after arriving home in March 2020. Cwm Taf Morgannwg health officials have apologised and the family said they had been paid £160,000 in compensation.

  Sandra Bartlett and Deanna Ellis say Jade Ellis was failed by the NHS

  Ms Ellis' son Brandon started CPR when he spoke to a paramedic on the phone while waiting for an ambulance to their home in Cwmavon, Neath Port Talbot, but it was too late. Her daughter, Deanna Ellis, 20, said she would never forget the shock of seeing her mum lying dead on the bedroom floor. "I ran upstairs to see her, I collapsed," she said. "It took two or three people to get me off her because she just wasn’t waking up," she said.

  Ms Ellis' mother, Sandra Bartlett, 61, said: "I thought I was looking at someone else's life." Ms Bartlett said her daughter had "a quick ECG" (electrocardiogram test) at hospital before being discharged. "When she went into that hospital, she should have had a blood test," Ms Bartlett added. "She could have had blood thinner, they could have put stents in, but more so, they could have kept her at the hospital. "The NHS is an amazing service, but they failed my daughter. They failed her through something as simple as a blood test."

  Ms Ellis's two children have been awarded £160,000 of compensation from the NHS, £30,000 of which has been spent on legal fees. Ms Bartlett said the pain the family endured was irreversible. "I had a meeting with the hospital and they said to me the sentence that I will never forget - 'mistakes happen'. Cwm Taf Morgannwg University Health Board said its "heartfelt condolences" were with the family. "As a health board, we have apologised to Jade’s family for the instances where her care fell short of the high standards we expect for all of our patients, and have ensured that learning from this case has informed improvements in care for the future." NHS Wales said it did not want to comment further.
