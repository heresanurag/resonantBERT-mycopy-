id: bbc_2017_1925
title: Japanese women on their 'angry panda' moment - BBC News
date: '2017-02-13'
section: General
url: http://www.bbc.co.uk/news/world-asia-38915525
content: |-
  A heavy metal-loving panda full of rage is a new character Japanese working women can identify with.

  Being kawaii - or cute - is a huge part of being a good Japanese girl.

  For decades Hello Kitty was Japan's ambassador of cute, but now an angry red panda is channelling the frustrations of ordinary working women.
