content: |-
  The Ukrainian president is in Washington DC as part of a trip focused on winning financial support to repel Russia.

  'We should continue to supply Ukraine'

  With parents from Denmark, Alex is first-generation American - helping Ukraine is a top issue for him. For most of his life he was a Republican, but has shifted away from the party since the US Capitol riot. "I think the aid that we are providing is very important for the people in Ukraine and the surrounding areas. As long as Ukrainians have a spirit to fight, we should continue to support. Also, I think it's very important for our own country. The lessons that Ukrainians are learning on the battlefield are going to save our soldiers' lives in the next conflict. America has not fought a war like Ukraine is currently fighting since 1945. "The fact that we cannot manufacture enough artillery shells and ammunition supplies to even support half of what Ukraine is consuming shows that there is a major blind spot in our defence industry. "My personal belief is that we would already be in a recession in the United States if it were not for the war in Ukraine - money spent on military equipment benefits everyone here. "We should continue to supply them with whatever they need, but I do strongly feel that that should be done in terms of tanks, planes, and artillery instead of just giving them a big cheque."
