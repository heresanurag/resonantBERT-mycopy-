title: 'Southport attacks: Women''s groups praise ''brave'' yoga instructor - BBC
  News'
date: '2024-12-23'
section: Liverpool
url: http://www.bbc.co.uk/news/articles/c3dxn2klkjko
content: |-
  Leanne Lucas is praised for speaking at a vigil which remembered female victims of male violence.

  Leanne Lucas was severely injured during the Southport attacks

  Women's charities have praised the yoga instructor who was seriously injured during this summer's Southport stabbings for being "so courageous" while recently speaking in public for the first time about her experiences. Leanne Lucas was overseeing a Taylor Swift-themed dance and yoga class in the Merseyside town on 29 July when a knifeman entered and killed three girls. He stabbed eight other girls and a local man who had rushed to protect them. Ms Lucas, who was also trying to shield two girls from the knifeman, suffered serious stab wounds. At a vigil in Liverpool last month to remember women and girls who had lost their lives to male violence, she said: "The guilt, shame and fear we can feel as women will be outshone by courage, fierceness and our ability to connect."

  Addressing the crowd, she added: "Raise your voice and share your stories. Often we don't realise how powerful we are." Sandy Withe, who is involved with the Birkenhead-based Tomorrow's Women charity, described Ms Lucas's actions as "so brave and courageous". She added: "I admire people like that – for it to be recent to happen to her and then to stand up in front of those people and to let people know that there is help out there as well."

  Leanne Lucas said Southport had become more "connected" after the attacks, in which Elsie Dot Stancombe, Alice da Silva Aguiar and Bebe King were killed

  Since 2009, 74 women and girls have been killed in Merseyside, which has seen some of the highest rates of violence by men against women and girls in England. High-profile cases include the stabbing of Ava White, who was just 12 when she was attacked by a boy at a Christmas lights switch-on event in 2021. Other victims include nine-year-old Olivia Pratt-Korbel, 28-year-old Ashley Dale, and 26-year-old Elle Edwards, who was shot on Christmas Eve 2022.

  Sandy Withe (centre), from the Tomorrow's Women charity, described Ms Lucas as "so brave and courageous"

  The Rape and Sexual Abuse Support Merseyside (RASA) charity, which was involved in November's vigil in Liverpool, believes it is vital to keep the issue of violence against women and girls in the public eye. Operations manager Lorraine Wood said: "The names are read of all the women that have lost their lives and each year the number [is] growing. "It's really important that we do come together regularly to remember those women - those women should never be forgotten." Violence against women and girls has been described as a national emergency by Home Secretary Yvette Cooper. In January, for the first time, Liverpool will join other cities taking part in the UK Women's March. Among other things, it will highlight and condemn the rise in violence against women and girls. Merseyside Police said tackling it was a priority for the force, and that officers were putting women's voices at the heart of their work.
