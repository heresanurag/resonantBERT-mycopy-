  Your pictures on the theme of 'in the kitchen'

  We asked our readers to send in their best pictures on the theme of "in the kitchen". Here is a selection of the photographs we received from around the world.

  Sirsendu Gayen: "Traditional kitchen in the Indian sate of Arunachal Pradesh."

  Sara Bickley: "Not just cooking that takes place in the kitchen, the kitchen sink is also a handy place to bath the dog. This is Toby the Yorkshire Terrier, who is 17."

  Linda Alkove: "A kitchen is not a kitchen when it is a bed of rocks. Or is it? Taken in Farmington, New Mexico."

  Carolyn DiFrancesco: "Too colourful, too pretty to eat."

  Roland Trope: "Double Take. Guests and other visitors to Brasenose College, Oxford, may do a double take on seeing this pair of signs. It gives one pause about the preparation of the college meals."

  Evelyn Oakley: "In the late afternoon sun in my kitchen, with a cheese grater in my hand, I cast a mysterious shadow."

  Sue Hipperson: "I put the egg down in the whisk to stop it rolling off the worktop and it just created this picture with the slight movement."

  Ian Knight: "Three steps to preparing the perfect pancake, taken in my own kitchen and yes I am the photographer and the cook for these shots, timing is everything."

  Marianne Wever: "I live in the Netherlands. My kitchen still has an old-fashioned chimney. On the photo, my beloved gas cooker from the 1950s. It is still in use and I love to cook on it."

  Farnoush Hayati: "As an amateur photographer my kitchen is more than a place for culinary experience. Coloured lights + sink strainer + glass plate + water droplets = Saturday Night Fever."

  Jacqui Dimmock: "Caution is the keyword for these guys while they undertake cleaning up this kitchen mishap!"

  The next theme is "Summertime" and the deadline for entries is 20 August 2024. The pictures will be published later that week and you will be able to find them, along with other galleries, on the In Pictures section of the BBC News website. You can upload your entries directly here or email them to yourpics@bbc.co.uk. Further details and themes are at: We set the theme, you take the pictures.
