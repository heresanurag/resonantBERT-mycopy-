title: Ollie Watkins withdraws from England squad with minor injury - BBC Sport
date: '2025-06-06'
section: Football
url: http://www.bbc.co.uk/sport/football/articles/clyv08v98ydo
content: |-
  Aston Villa striker Ollie Watkins withdraws from the England squad with a minor injury.

  Aston Villa striker Ollie Watkins has withdrawn from the England squad with a minor injury.

  The 29-year-old will now miss the World Cup qualifying match in Andorra on Saturday (17:00 BST) and the friendly with Senegal next week.

  There are currently no plans to call up a replacement and England will prepare for both games with a 25-man squad.

  Watkins scored 17 goals in 54 games last season for Villa as they finished sixth in the Premier League.

  Thomas Tuchel is assessing his options before the World Cup next year and looking at who could be the understudy to captain Harry Kane.

  Watkins was one of three strikers named in the squad alongside Kane and Ivan Toney.

  Toney was recalled for the first time since featuring for England in the final of Euro 2024 and his move to Saudi Arabia.

  Since signing for Al-Ahli, Toney has scored 30 goals in 44 games and won the Asian Champions League.
