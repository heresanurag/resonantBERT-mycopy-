title: 'Brecon Beacons cave rescue: Rescuers reach man after two days - BBC News'
date: '2021-11-09'
section: General
url: http://www.bbc.co.uk/news/uk-wales-59211369
content: |-
  More than 240 volunteers are involved in helping a man in one of the UK's longest cave systems.

  Rescuers have reached a man who fell and was injured while caving in the Brecon Beacons two days ago.

  The South and Mid Wales Cave Rescue Team said he was caving in the Ogof Ffynnon Ddu cave system near Penwyllt, Powys.

  He is being moved by stretcher to a top cave entrance after being unable to get out himself due to his injuries.
