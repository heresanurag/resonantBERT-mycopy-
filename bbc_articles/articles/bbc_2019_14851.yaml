title: Man dies after early morning fire at Glasgow flats - BBC News
date: '2019-12-27'
section: Glasgow & West Scotland
url: http://www.bbc.co.uk/news/uk-scotland-glasgow-west-50923243
content: |-
  Crews were called to the blaze which broke out at the building in the Trongate area of Glasgow.

  A man died after the fire in the second floor flat in Parnie Street

  A man has died after a fire at a flat in the Trongate area of Glasgow.

  Scottish Fire and Rescue crews were called to the blaze on the second floor of flats in Parnie Street at about 01:35.

  Police Scotland said a man was removed from one of the flats and treated by ambulance staff at the scene. However he was pronounced dead.

  An investigation to establish the cause of the fire is under way. Other residents were evacuated.

  Residents were evacuated from the block

  Roddie Keith from Scottish Fire and Rescue Service said: "Firefighters located and removed one man from inside the property, who was treated at the scene by our crews and ambulance staff, however sadly he was pronounced dead.

  "A joint fire investigation alongside our Police Scotland colleagues is now under way."

  Fire crews also tackled a separate blaze on the 22nd floor of a high rise in Kirkton Avenue in Knightswood on Friday morning.

  Four appliances and an aerial unit were sent to Dunvegan Court at 04:56. Three people were treated - two in hospital.

  Fire appliances at Dunvegan Court in Knightswood where a fire broke out on the 22nd floor

