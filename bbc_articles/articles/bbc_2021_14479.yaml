  A Randox spokesperson said: "Randox acknowledges Mr Paterson's wish, at this difficult time, to step aside from his consultancy work to focus on his family and suicide prevention. We wish Owen and his family well in their future endeavours. Randox will not be making further comment."

  Lynn's Country Foods has been asked for comment.
