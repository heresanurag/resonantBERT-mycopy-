content: |-
  Aaron Bell, who questioned the PM in the wake of the Sue Gray report, confirms he has submitted a letter of no confidence.

  Is it out with the old and in with the new at No 10?

  And the string of departures will be said, by his supporters, to show he is shaking things up. That was the promise the prime minister made, after all, to a packed room of Tory MPs on Monday. But there are considerable doubts that this is part of some kind of masterplan to overhaul Number 10. For one thing, Munira Mirza’s resignation was because of her personal unhappiness at the PM's behaviour rather than part of any obvious revamp. Given she was also such a long-standing ally, it’s been seen as a body blow to Johnson. Then there’s her replacement as head of policy, Andrew Griffith. A choice which has been described to me as a "desperate" by one Tory MP and "bizarre" by another. This is partly because Griffith's prior job was that of a parliamentary aide to... Boris Johnson. Therefore, the rationale goes, he is not best-placed to help the PM hit refresh and see things with new eyes. One Conservative MP wearily remarked that it seemed so far to be a case of "Boris's old mates being replaced by some of Boris's slightly newer mates".
