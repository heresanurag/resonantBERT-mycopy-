content: |-
  In an exclusive BBC interview, the head of the Thai Navy Seals describes his relief following the successful cave rescue operation.

  Speaking exclusively to the BBC, the head of the Thai Navy Seals has been describing his relief following the successful rescue operation of 12 boys and their coach from a cave in Thailand.

  Interview by Kaona Pongpipat of BBC Thai. Video by Mohamed Madi, Tessa Wong and Panupong Changchai.
