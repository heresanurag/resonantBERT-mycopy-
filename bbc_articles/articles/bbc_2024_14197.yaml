content: |-
  Officials were concerned the ex-Post Office boss was unable to work with people who challenged her.

  Government officials weighed up sacking Paula Vennells as the Post Office's chief executive in 2014 some five years before she resigned, an inquiry has heard. According to internal government documents revealed at the long-running inquiry into the Horizon scandal, they had concerns about whether she was the right person to lead the group. One issue was the perception that she was "unable to work with personalities that provide robust challenge to her". Alice Perkins, who chaired the Post Office at the time and faced a second day of questioning by lawyers on Thursday, denied that Ms Vennells had surrounded herself with "yes-men and yes-women". But she admitted that she herself started to have doubts in 2014 about Ms Vennells' ability to lead the Post Office, which is owned by the government. Ms Vennells continued as chief executive until 2019 during which time she received bonuses. She was subsequently awarded a CBE "for services to the Post Office and to charity". She handed the CBE back earlier this year before being formally stripped of the honour.
