content: |-
  Shaolin Temple Cultural Centre has been able to expand classes thanks to BBC Children in Need.

  A martial arts centre in north London has been able to increase the number of classes it offers, as well as increasing support for families on low incomes, thanks to funding from BBC Children in Need., external

  Children and teenagers at the Shaolin Temple Cultural Centre in Enfield learn the martial art of Kung Fu with a master who is an Iranian refugee. The young students say it helps them with their mental health – and for those who are neurodivergent, it is a brilliant discipline to boost focus and communication.

