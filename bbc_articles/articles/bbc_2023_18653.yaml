title: 'Watch: Cool pool player pots black as car ploughs into pub - BBC News'
date: '2023-12-14'
section: General
url: http://www.bbc.co.uk/news/uk-england-nottinghamshire-67708784
content: |-
  Footage showed a pool player potting a ball as the car smashed through the wall.

  CCTV footage has shown the moment a 4x4 ploughs into the side of a pub in Worksop in Nottinghamshire.

  The Land Rover Discovery reached speeds of up to 110mph (177km/h) while being followed by officers on the evening of 27 March, Nottinghamshire Police said.

  In the footage, a pool player is seen potting a ball as the car smashed through the wall.

  At Nottingham Crown Court on Friday, Jamie Kettle, 37, admitted aggravated vehicle taking, dangerous driving, driving while disqualified and without insurance, criminal damage to the pub, and two counts of theft from a shop.

  He also admitted two counts of common assault of an emergency worker, as well as a charge of witness intimidation, and was jailed for two years.

  Kettle, of Bircotes, Doncaster, was also banned from driving for three years and three months.

  He was also ordered to pay a £156 victim surcharge and must take an extended re-test.

