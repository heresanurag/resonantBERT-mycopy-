  Last month, Enninful attended the King and Queen's Coronation. He has helped the King's charity, the Prince's Trust, with its work in Africa and worldwide as a global ambassador.

  Edward Enninful, pictured alongside singer Katy Perry, attended the Coronation of King Charles and Queen Camilla last month

  Enninful has been a high-profile champion for greater inclusivity in the fashion industry.

  He took over as editor-in-chief of British Vogue in August 2017 from Alexandra Shulman, who had been in the job for 25 years. One of his first priorities was to diversify his staff at the publication.

  And in 2018, model and writer Paris Lees became the first openly transgender woman to be featured in British Vogue as part of a feature celebrating 100 years since women have had the right to vote in the UK.

  Enninful has been open about his struggles with racism and being a black gay man.

  A few years ago, while working as editor-in-chief, Enninful said he was racially profiled after being told to "use the loading bay" by a security guard as he entered work.

  In interviews with the BBC, he has also shared concerns about losing his eyesight, his struggles with alcoholism and being estranged from his father for 15 years.

  British Vogue's contributing European sustainability editor Dana Thomas told the BBC she was "thrilled" by the news of his new role.

  "This gives him more freedom to do what he does best, and what clearly brings him joy, which is the creation of beauty," she said.

  "His influence has been immense. I write for British Vogue because I found him so inspiring. His leadership in the areas of inclusivity, diversity, and sustainability - what he calls the three pillars of British Vogue - have been unmatched in any publication."

  Selma Blair on the cover of British Vogue

  In a memo sent to Vogue staff, Enninful said he would "continue to contribute to the creative and cultural success of the Vogue brand globally" in his newly-created job, "whilst having the freedom to take on broader creative projects".

  A head of editorial content for British Vogue will also be hired, he said, adding: "For now everything remains the same, and I'm so excited about what the future holds for us."

  Enninful thanked editor-in-chief Anna Wintour and Roger Lynch, the chief executive officer of publishers Condé Nast, "for their continued support".
