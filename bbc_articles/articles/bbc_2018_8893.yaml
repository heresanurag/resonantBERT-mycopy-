title: 'World Cup 2018: What are England fans singing? - BBC News'
date: '2018-07-06'
section: England
url: http://www.bbc.co.uk/news/uk-england-44711734
content: |-
  England fans are in fine voice in Russia as Gareth Southgate's team marches on - but what are they singing?

  With England's footballers managing at long last to win a World Cup penalty shootout, supporters of Gareth Southgate's men remain in fine voice as their heroes' Russian sojourn is extended. But what songs are fans hollering before, during and after matches?

  This England World Cup campaign has had no official record released to mark it. As a result, there isn't an obvious tune to belt out along the lines of a World in Motion from 1990, or Three Lions '98 from the World Cup of that year.

  Not that this has put off the faithful from exercising their vocal chords - and even if their singing often lacks tunefulness, these spirited followers of the Three Lions surely make up for this with sheer exuberance.

