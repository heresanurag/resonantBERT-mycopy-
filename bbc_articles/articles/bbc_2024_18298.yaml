title: Anti-racism protesters gather across Scotland - BBC News
date: '2024-08-11'
section: Scotland
url: http://www.bbc.co.uk/news/articles/cn02d090v9ro
content: |-
  Demonstrations took place in Glasgow, Edinburgh, Dundee and Dumfries.

  This video can not be played To play this video you need to enable JavaScript in your browser.

  Anti-racism protesters have gathered across Scotland, with demonstrations taking place in Glasgow, Edinburgh, Dundee and Dumfries. It comes in response to violence across England and Northern Ireland fuelled by far-right and anti-immigration sentiment. The unrest began following the fatal stabbing of three young girls at a dance class in Merseyside in the north of England. Misinformation online claimed an asylum seeker was responsible for the girls' murder. Police said there was “no intelligence” to suggest there might be similar rioting in Scotland.

  A group gathered outside the Scottish Parliament in Edinburgh on Saturday morning

  Glasgow's George Square was the scene of one protest

  On Saturday morning, hundreds of demonstrators assembled outside the Scottish Parliament in Edinburgh. Many protesters were joined by their children and dogs. There were chants of "refugees are welcome here". One woman told the BBC: "I'm here today to protest against the rise of right-wing thinking. "We are not anti-immigration, we are not anti-migrant, we are anti-racist and I want to put all of those 'pro' feelings on the street." Another said: "I think everyone should be welcome here, it's not worth pointing a finger at your neighbour." The chanting was also repeated in Glasgow's George Square, where hundreds of demonstrators were gathered. There was a large police presence but the event was peaceful. At one stage, officers separated two counter protesters from the anti-racism demonstration. One man with a sign reading "asylum frauds out" and another with a megaphone were approached by a group of anti-racism protesters who shouted "Nazi scum off our streets" at them. A short time later, the pair left the square, escorted by a large group of police officers.

  A pair of counter protesters were separated from the main Glasgow demo by police

  In Dumfries, a number of speakers addressed the crowd

  On the Planestanes in Dumfries, about 200 people turned up, some with placards showing messages of unity. One read: "We are one people." They listened to a series of speeches, with one speaker telling the crowd: "This is not what we are in Dumfries." A demonstration also took place at City Square in Dundee. Outside the Caird Hall, the group held up signs condemning racism.

  A group of protesters also gathered in Dundee

  About 150 people joined a Stand Up to Racism demonstration in Paisley on Friday night

  On Friday evening, about 150 people joined a Stand Up to Racism demonstration in Paisley and about 100 people gathered at a similar event in Bathgate, West Lothian. The events were organised in response to rumours on social media that anti-immigration protests were being planned in the towns. However, there was no sign of far right protests.

  First Minister John Swinney met Imam Habib Rauf and members of the Muslim community

  First Minister John Swinney said on Friday that “adequate preparations” were in place to deal with any flare-ups should they happen and Police Scotland had the resources to deal with any potential disorder. The force is expected to send 120 officers to Northern Ireland next week to support the police service there, which has been dealing with a number of incidents of disorder. Mr Swinney has also written to social media companies Meta, TikTok and X calling for "immediate" action to tackle misinformation and hateful material which has fuelled violent scenes across parts of the UK.
