content: |-
  The Princess Royal returns to the hospital where she was treated for a head injury and concussion.

  This video can not be played To play this video you need to enable JavaScript in your browser.

  Princess Anne has thanked hospital staff who treated her for a head injury last summer. The Princess Royal visited Southmead Hospital in Bristol on Thursday for a tour of the building, meeting with some of the doctors, nurses and health professionals involved in her care. She spent five days in the hospital in June 2024 with a minor head injury and concussion suspected to have been caused by a horse striking her with its head or legs. Last month she revealed she had no memory of the incident.

  The princess went back to Southmead Hospital to thank staff who treated her

  Princess Anne, 74, said hospital staff had been helping her piece together the days after the accident.

  The Princess Royal told staff in the intensive care unit (ICU): "You've been filling in the blanks which partly, from my perspective, is really useful to know what happened because I seriously don't have any idea and, sadly, I don't have huge memories of being in here either. "I just know I was really well looked after, so thank you. "But whatever you did, it seemed to work... the recovery being relatively straightforward, thankfully. That isn't always true so I'm really grateful. "I'm also grateful in a weird sort of way that I remember nothing because that has huge advantages you can just carry on." During the visit she was given a performance by the staff choir in the main public atrium before viewing the hospital's air ambulance helicopter pad and staff gardens. The ICU at Southmead is a purpose-built 48-bed unit which admits more than 2,000 patients each year - making it one of the busiest in the country.

  Princess Anne told hospital staff they had "helped her fill in the blanks"

  Princess Anne was on her way to check on her chickens on her Gatcombe Park estate in Gloucestershire at the time of the accident on 23 June last year. She has no memory of what followed, but is thought to have been struck by a horse's head or legs. After being assessed by paramedics at the scene she was rushed 30 miles away to Southmead by road for tests, treatment and observation. The princess spent five nights in the hospital after the accident and did not return to public royal duties until almost three weeks later after rehabilitation support at home.

