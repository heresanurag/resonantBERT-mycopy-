title: Kangaroos filmed hopping through rare Australian snow - BBC News
date: '2019-08-13'
section: General
url: http://www.bbc.co.uk/news/world-australia-49333592
content: |-
  They were filmed bounding through the snow in New South Wales.

  Parts of Australia have experienced freezing conditions that have been debilitating for Australia's human residents. However, these kangaroos in New South Wales seem to be enjoying the rare snowfall.
