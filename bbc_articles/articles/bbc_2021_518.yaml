title: 'As it happened: First week after Brexit trade deal poses big test - BBC News'
date: '2021-01-04'
section: UK
url: http://www.bbc.co.uk/news/live/uk-55526235
content: |-
  The border crossings between the UK and the European Union face their first day of significant traffic under new rules.

  Northern Ireland's First Minister Arlene Foster has said there "is a gateway of opportunity" for the UK and Northern Ireland after Brexit.

  She told the BBC's Andrew Marr Show on Sunday that the trade deal also tackled "some of the great difficulties that there are with the (Northern Ireland) Protocol".

  The purpose of the Protocol is to prevent a hardening of the border between Northern Ireland and the Republic of Ireland. It does that by keeping Northern Ireland in the EU's single market for goods and by having Northern Ireland apply EU customs rules at its ports.

  As a result, an 'Irish Sea border' now exists, with most commercial goods entering Northern Ireland from Great Britain requiring a customs declaration.

  The Democratic Unionist Party (DUP), which Mrs Foster leads, opposed the protocol and had criticised the establishment of such a border. She told The Andrew Marr show that her party "didn't want the protocol but it is here".

  "I have to mitigate against that and my job from now on is to mitigate against those excesses and to hold the government to account," Mrs Foster added.
