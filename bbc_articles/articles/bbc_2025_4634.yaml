  Asked if there is a weak point in Heathrow's power system, he said: "You can say that but of course contingencies of certain sizes we cannot guard ourselves against 100% and this is one of them. "I mean, short of anybody getting hurt, this is as big as it gets for our airport." "This is unprecedented," he added. Mr Woldbye went on to say the airport expected to return to "100% operation" on Saturday.

  Heathrow is the UK's largest aviation hub, handling about 1,300 landings and take-offs each day. A record 83.9 million passengers passed through its terminals last year, according to its latest data. Transport Secretary Heidi Alexander said she believed airport bosses "stood up their resilience plan swiftly, and they've collaborated closely with our emergency responders and the airline operators; they do have backup energy supplies, they have generators, diesel generators. "None of that failed on this occasion because that backup supply is designed to protect the critical key systems within the airport and not to provide power to the whole airport." Alexander added that she was in close contact with the energy secretary, the home secretary and with Heathrow to "make sure that any lessons we need to learn from the systems that the airport has in place are learned". Ofgem, the energy regulator, earlier announced it would commission a review "to understand the cause of this incident and what lessons can be learned".

  Some 200,000 passengers were affected as flights were grounded throughout Friday

  Emergency services were first called to the scene at 23:20 GMT on Thursday. Some 120 aircraft heading to the airport at that time were forced to either divert or return to their point of origin. Ten fire engines and about 70 firefighters were sent to tackle the blaze, LFB said, with the fire being brought under control by 06:30. London Fire Brigade (LFB) said the fire involved a transformer containing 25,000 litres (5,500 gallons) of cooling fluid that had been set alight.

  A large cordon was put in place as a precaution and about 150 people were evacuated from their homes. Most of those had returned home by 17:00, according to LFB. Hillingdon Council said it was assisting 12 people with hotel accommodation until it was safe for them to return to their homes. More than 65,000 homes in the area were left without power as a result, as well as the airport, although the National Grid said power was restored by 14:00.

  London Fire Brigade said the fire was under control by 06:30 on Friday

  Local residents told the BBC they saw a bright flash before their lights went out. Savita Kapur, 51, said she "literally just ran out of the house" when she heard the first explosion. She said police officers told them to go back inside before eventually telling her she needed to leave. Ms Kapur said a "second explosion went off" as she was driving along the road "and the whole ground shook".

  Police said they were keeping an open mind as to the cause of the blaze

  LFB said the transformer which caught fire 25,000 litres of cooling fluid

  A family from Texas faced frustration after arriving at Heathrow for their flight home to Dallas to find the airport closed on Friday morning. Andrew Sri, his wife and their three children, aged one to eight, had been visiting his sister in east London. "I just wish they had updated us accordingly," Mr Sri said, as the family waited for updates at the terminal. "Now we've got here and they told us, 'actually the airport's been shut down', so it's a little bit disappointing."
