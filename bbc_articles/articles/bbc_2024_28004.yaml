  Mike Tyson says opponent Jake Paul is an "inferior" fighter before their heavyweight bout in Dallas, Texas.

  Tyson, aged 58, will step into the ring for the first time in 19 years in a professional contest against 27-year-old Paul.

  READ MORE: Tyson's health 'just fine' but precautions in place

  You can follow live text commentary of Mike Tyson v Jake Paul from 03:00 GMT on Saturday, 16 November on the BBC Sport website & app.
