title: Special forces dangle from Chinook helicopter over town - BBC News
date: '2024-09-20'
section: General
url: http://www.bbc.co.uk/news/videos/c0qz0jv4lkvo
content: |-
  Residents are gobsmacked to look up and see special forces member being flung through the sky.

  It was mission impossible for these special forces members as they were flung through the sky while dangling below a military Chinook helicopter.

  Residents of Boverton and Llantwit Major, in the Vale of Glamorgan, were left gobsmacked by the Tom Cruise-esque training exercise on Thursday evening.

  The battalion, based at the Special Forces Support Group base at West Camp, St Athan, were practising a technique known as Troop Insertion and Extraction (TIE), the BBC was told.

  The training continued until after sunset on Thursday when the Chinook departed the area.
