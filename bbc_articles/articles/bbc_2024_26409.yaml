  Pedro Martinez Losa insists "there is no way Scotland will lose at home on Tuesday" after their 1-0 Euro 2025 round one play-off first-leg win in Hungary.

  'No way' Scotland will lose at home - Martinez Losa

  This video can not be played To play this video you need to enable JavaScript in your browser.

  Pedro Martinez Losa insists "there is no way Scotland will lose at home on Tuesday" after their 1-0 Euro 2025 round one play-off win in Hungary. The head coach's bold statement was made - twice - in the aftermath of a first leg in Budapest where Martha Thomas' second-half strike was all that separated the sides. The striker's decisive finish was the highlight of a colourless showing for the Scots, but their Spanish boss is adamant it will prove to be enough to take them to within just two games of next summer's major tournament in Switzerland. Either Finland, who lead 1-0 heading into their home leg, or Montenegro lie in wait. Martinez Losa thinks that "with the players we have and the preparation we do", his side will not taste defeat on Tuesday at Easter Road. It is extreme confidence to take to the capital given this is a squad under intense scrutiny to qualify for a major tournament after failing to reach the previous two. Scotland have won three games at home this calendar year - 1-0 against Slovakia, 4-1 against Israel - both at Hampden - and 1-0 versus Serbia at Firhill. They last suffered defeat at home in a 6-0 mauling by England in December.

  While Scotland have undoubtedly improved since that defeat by their neighbours at Hampden, this is still a side who have questions to answer. Martinez Losa was back in Budapest, where, just over three years ago, he led the national team for the first time. The aim then was to qualify for the 2023 World Cup, but the Scots failed to do that after enduring an agonising play-off loss to the Republic of Ireland. Again, that was at home - at Hampden. Only recently has the hurt from that near miss started to fade. Nine of the squad that faced Hungary also started against Ireland and felt the weight of the nation's disappointment particularly deeply. Now there is an unbelievably heavy expectation to, at least, reach the final play-off stage. Martinez Losa is steadfast in his belief Scotland have developed since their last play-off heartache. They were outmuscled in a particularly strong League A group last year but rediscovered their groove and grit in the recent unbeaten League B campaign. Against Hungary, a fellow League B side, they faced an aggressive and powerful attack, the kind they would face at major tournaments. The head coach, though, said Scotland are "stable" and "competitive". "I think we have shown the team that we are competitive," he said. "We keep concentration and don't make mistakes in key moments. "We are a very stable team. We're not afraid to defend properly and be concentrated. "We had some good moments of football, but when you play away from home, it's not simple. "Although the score is tight, just 1-0, we didn't concede and we know there's no way we're going to lose the game at home in Scotland." As Martinez Losa and his players fly back home to ready themselves for Tuesday's second leg, there may be a few raised eyebrows greeting them given his dismissal of Hungary's chances of a comeback.
