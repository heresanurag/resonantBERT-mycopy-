title: 'Gower: Two rescued from burning boat after it caught fire - BBC News'
date: '2022-08-13'
section: Wales
url: http://www.bbc.co.uk/news/uk-wales-62534742
content: |-
  Coastguard says lifeboat crew "did an incredible job of taking two people off a burning vessel".

  Plumes of smoke were seen coming from the yacht off the Gower coast

  Two people have been rescued after their boat caught fire off Caswell Bay on Gower.

  Emergency services were called on Saturday, with HM Coastguard sending out the Mumbles RNLI lifeboat and Mumbles Coastguard Rescue Team.

  Mid and West Wales Fire and Rescue Service also attended the scene.

  The 37ft (11m) yacht has since gone aground near Brandy Cove, while the two people on the board were safely taken ashore.

  Swansea council had tweeted on Saturday advising people to avoid swimming at Caswell Bay as a precaution following the boat fire and a small oil leak.

  On Sunday, a council spokesman said its pollution control team had visited the site again and it is now fine to swim in the bay.

  Ieuan Williams, team leader with HM Coastguard, said: "This looked and was incredibly dramatic, the lifeboat did an incredible job of taking two people off a burning vessel.

  "We're also very grateful to all those in the area on their own pleasure boats who used their VHF radios to alert us to what was happening, and also stayed in the vicinity in case they were able to help."

  Counter pollution officers at the Maritime and Coastguard Agency have been informed, along with the local authority.
