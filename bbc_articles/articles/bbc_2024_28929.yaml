content: |-
  Married At First Sight UK contestants Emma and Nathan were reunited this week.

  The concept is simple: a dating show where potential couples get married the first time they meet.

  For Emma Barnes from Bristol, she and partner Caspar Todd decided to be friends.

  Meanwhile, Nathan Campbell from Frome, says he remains married to the woman he was paired with, 27-year-old Lacey Martin.

  They explained their reasons when they were guests on BBC Points West.

