title: 'M4: Pedestrian dies after being hit by car near Swansea - BBC News'
date: '2022-02-19'
section: Wales
url: http://www.bbc.co.uk/news/uk-wales-60444876
content: |-
  The 41-year-old man from Swansea died at the scene, say police.

  Police are appealing for witnesses following the death on the M4 between Penllergaer and Llangyfelach

  A 41-year-old man has died after being hit by a vehicle on the M4.

  It happened between junctions 46 and 47, Llangyfelach and Penllergaer, near Swansea, shortly before 20:35 GMT on Friday.

  The man, who was from Swansea, died at the scene "despite best efforts", South Wales Police said.

  The force is appealing for witnesses and dashcam footage. A silver Nissan Qashqai was involved in the crash.
