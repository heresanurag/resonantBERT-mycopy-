title: 'Solheim Cup: Anna Nordqvist named Europe captain for 2026 - BBC Sport'
date: '2025-02-24'
section: Golf
url: http://www.bbc.co.uk/sport/golf/articles/c5y4w5p102do
content: |-
  Swede Anna Nordqvist, who has played in nine Solheim Cups, will captain Europe against the USA next year.

  Sweden's Anna Nordqvist has been named Europe captain for next year's Solheim Cup against the United States in the Netherlands.

  The 37-year-old, a three-time major winner, has played in nine Solheim Cups, winning 17, halving three and losing 15 of her 35 matches.

  She was a playing vice-captain when Europe retained the trophy after a tie in Spain in 2023 and again in 2024, when the US won 151⁄2-121⁄2 in Virginia to claim the trophy for the first time in seven years.

  "I am so honoured to be appointed," Nordqvist said.

  "Whether we were winning or losing, the Solheim Cup has played such a huge part in my career ever since I made my debut in 2009 in Chicago.

  "The friendships I have made, and the memories created during the nine matches I've played, make it so incredibly special to be given the opportunity to be European captain at my 10th Solheim Cup."

  The 2026 competition will be held at Bernardus Golf in Cromvoirt from 11-13 September.
