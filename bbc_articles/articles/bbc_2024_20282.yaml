  • None Defiant Swifties take to streets after Vienna plot Earlier that day, Austrian authorities arrested two of the suspects. The third was arrested two days later. Authorities said the main suspect, a 19-year-old Austrian citizen, had pledged allegiance to the Islamic State and had focused on the Eras tour as a target. He hoped to “kill as many people as possible", authorities said. Last week, for the first time, Swift commented publicly on the planned attack, writing on Instagram that having to cancel the Vienna shows was "devastating". "The reason for the cancellations filled me with a new sense of fear, and a tremendous amount of guilt because so many people had planned on coming to those shows," she wrote. "But I was also so grateful to the authorities because thanks to them, we were grieving concerts and not lives." Swift performed eight concerts at Wembley this summer, overtaking a record for any solo singer, which was previously set by Michael Jackson in 1988. Her next show as part of The Eras Tour is scheduled for 18 October in Miami, Florida.
