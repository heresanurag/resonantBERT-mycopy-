title: CIA says Swift concert plotters planned to kill 'a huge number' of people -
  BBC News
date: '2024-08-29'
section: US & Canada
url: http://www.bbc.co.uk/news/articles/cy84gy4ympko
content: |-
  The agency says its intelligence helped Austrian authorities thwart the attack and led to arrests.

  The CIA says the suspects in the foiled plot to attack a Taylor Swift concert in Vienna wanted to kill "a huge number" of people at the event. The intelligence provided by the agency to Austrian authorities allowed them to disrupt the plot and save "hundreds of lives" , CIA's deputy director David Cohen said on Wednesday. Mr Cohen highlighted that there were "tens of thousands of people at this concert, I am sure many Americans". He added that the suspects' plans were "advanced". Three male teenage suspects were arrested in connection with the foiled attacks, allegedly inspired by the Islamic State group.

  Speaking at an annual intelligence summit outside Washington, DC, Mr Cohen said the day of the arrests was a "good day for Langley", referring to the CIA headquarters. "And not just for Swifties in the office." “The Austrians were able to make those arrests because the agency and our partners in the intelligence community provided them information about what this ISIS-connected group was planning to do," Mr Cohen said. He did not disclose how his agency had learned about the plot. Some 200,000 people had been expected to attend one of Swift's three Vienna concerts, part of the European swing of her multi-continent Eras tour. On 7 August, the day before the first show, concert organisers announced the shows would be scrapped after a warning about a "planned terrorist attack" from government officials.
