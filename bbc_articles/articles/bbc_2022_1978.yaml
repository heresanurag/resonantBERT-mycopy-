title: 'Ukraine: Woman confronts armed Russian soldier - BBC News'
date: '2022-02-26'
section: General
url: http://www.bbc.co.uk/news/world-europe-60525996
content: |-
  The woman angrily asks the soldier, seen holding a large machine gun, why he has come to the city.

  This is the moment a woman confronted an armed Russian soldier in the city of Henichesk in Ukraine.

  The woman approached the soldier on Thursday, who can be seen holding a large machine gun, before asking him, "Who are you... Why did you come here with weapons?"
