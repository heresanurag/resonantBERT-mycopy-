  Mr Nawaz is the founder of the Quilliam Foundation, a counter-extremism organisation.

  In September, he said he had tracked down an anonymous "hero" who was stabbed and beaten for defending him from a racist mob in Southend 25 years ago.

  Mr Nawaz said he was 15 when he was confronted by a group of skinheads armed with hammers and knives, who then attacked a passer-by who intervened.

