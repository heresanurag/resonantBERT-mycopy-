title: 'Maajid Nawaz: LBC presenter ''racially attacked'' in London - BBC News'
date: '2019-02-19'
section: London
url: http://www.bbc.co.uk/news/uk-england-london-47287308
content: |-
  LBC presenter Maajid Nawaz says he was racially abused and attacked outside a London theatre.

  Maajid Nawaz is a presenter for LBC and an anti-extremism activist

  An anti-extremism campaigner said he was racially attacked and hit in the face outside a theatre.

  Maajid Nawaz said a white man attacked him while he was standing alone outside the Soho Theatre in central London.

  The LBC radio presenter tweeted a photo of a cut to his forehead and said he was racially abused and then hit in the face with "maybe a signet ring".

  The Met Police said it was called to a report of a racially aggravated assault at 19:10 GMT.

  A spokesman said the suspect had fled the scene in Dean Street before officers arrived.

  No arrests have been made and an investigation has been launched, the force added.

  Mr Nawaz, who presents a show on LBC radio on Saturday and Sunday lunchtimes, said his attacker took nothing and "ran away like a coward".

  "My forehead will probably be scarred for life. But we will find you, you racist coward, and you will face British justice," he added.

  He said there were witnesses "who heard the racial abuse and have given statements" and added police had his attacker's "face on CCTV".

  In a later statement, Mr Nawaz thanked people who helped him saying their "kindness kept me sane".

  "People from all ethnicities and all faiths and none helped me yesterday. It's in that spirit that I wish to carry on my work," he wrote.

