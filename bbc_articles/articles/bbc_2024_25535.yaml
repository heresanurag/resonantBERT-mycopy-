  Hamas leader Yahya Sinwar was confirmed to have been killed in Gaza on Thursday. According to the Israeli military, he died in a firefight after the building where he was hiding in the southern Gaza city of Rafah was struck with "tank fire". The pathologist in Israel who conducted his autopsy told US media he had been shot in the head. Dr Chen Kugel also found injuries to his right forearm from "missile fire", a damaged left leg from "fallen masonry" and shrapnel injuries. His death raised some hopes in some quarters for an end to the war, but the group's deputy leader said Hamas would only be strengthened. US President Joe Biden has said there is a chance of "working towards a ceasefire” in Lebanon, where Israel is fighting Hezbollah militants, but it will be "harder in Gaza”. He was speaking as he left the German capital Berlin, where he had met German, French and British leaders. Iran's supreme leader, Ayatollah Ali Khamenei, said on Saturday the death of Hamas leader Sinwar will not halt the "Axis of Resistance" - the regional network of Iran-backed, heavily armed militias that oppose Israel. "Hamas is alive and will remain alive," Khamenei's statement added. On Friday, Hamas deputy leader Khalil al-Hayya said Israeli hostages would not be returned until Israel ended the war and withdrew from Gaza. The war in Gaza began after Hamas's attack on Israel on 7 October 2023 left around 1,200 people dead, with 251 taken to Gaza as hostages. Israel vowed to destroy Hamas in response, and since then at least 42,500 people have been killed and tens of thousands injured in Gaza, the Hamas-run authorities say.

  On Friday, fighting also continued in Lebanon, where Israel has been conducting a ground invasion against Hezbollah. The Israeli military said it had killed about 60 Hezbollah fighters and destroyed the Iran-backed group's regional command centre with an air strike. Hezbollah said it had fired rockets at the Israeli city of Haifa and areas to its north.
