title: 'Israel-Gaza war: Air strike said to have killed dozens in Jabalia - BBC News'
date: '2024-10-19'
section: World
url: http://www.bbc.co.uk/news/articles/c8xez14e7lro
content: |-
  Hamas-run authorities say 20 women are among at least 33 dead in Jabalia refugee camp.

  At least 33 killed in Israeli strikes in northern Gaza, local officials say

  Rubble on a street in Jabalia earlier this month

  Israeli strikes have killed at least 33 people including 21 women at a refugee camp in northern Gaza, the strip's Hamas-run authorities say. More than 85 people were said to be injured, some seriously, as homes belonging to three families in the camp were hit. A video circulating on social media - which the BBC has not verified - appears to show bodies wrapped in white shrouds laid out in the courtyard of al-Awda Hospital. Israeli forces have besieged the densely-populated Jabalia refugee camp for weeks.

  The director of al-Awda hospital said it had experienced an overwhelming influx of casualties, leaving hospital wards "completely full" with many of the injured "receiving treatment on the floor.” Nearby in Beit Lahia, the Indonesian Hospital came under “heavy gunfire” from Israeli forces on Saturday, the Hamas-run health ministry said. The ministry said more than 40 patients, as well as medical staff, were inside the hospital, and later said two people had died due to an "outage of electricity" and lack of "medical supplies". The Israel Defense Forces (IDF) said its troops were operating near the hospital and there "was no intentional fire directed at it". Local sources indicate that northern Gaza is effectively isolated, with telecommunications and internet services severed in the region. About 400,000 people have been trapped inside Jabalia camp with little food or water for more than two weeks. The head of the UN's Office for Humanitarian Assistance, Georgios Petropoulos, told the BBC's Newshour programme that families in Jabalia were enduring "atrocious conditions". "We can't hit the alarm bell hard enough about how dire and dangerous the situation for civilians there is," he said, speaking from Rafah in southern Gaza. Israel said it had sent about 30 lorries of supplies into northern Gaza on Friday including food, water, medical supplies and shelter equipment but local health officials told Reuters aid had not been reaching the worst-affected areas such as Jabalia. Israel has repeatedly denied it is preventing humanitarian aid from entering Gaza but the US has told it to boost access or risk having some American military assistance cut off. An Israeli minister, Amichai Chikli, told the BBC Israel had "blockaded" parts of northern Gaza, which include Jabalia. "We allowed the civilian population to escape into the safe zone, and we prevented supplies to enter the blockade region," he told the Newshour programme. He insisted this was "legal according to the international law".

