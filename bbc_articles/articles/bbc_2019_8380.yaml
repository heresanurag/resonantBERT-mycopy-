title: Dangerous flash floods hit Washington DC area - BBC News
date: '2019-07-08'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-48911919
content: |-
  Storms flooded the Washington DC metro area, snarling the morning commute and stranding drivers.

  A flooding emergency in the Washington DC area left commuters in hazardous conditions. Torrential downpours led to road closures and left drivers stranded as well as dangerous flooding on the underground rail-lines.
