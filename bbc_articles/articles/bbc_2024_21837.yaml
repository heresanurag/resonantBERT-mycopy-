title: 'Jared Isaacman: The billionaire behind first private spacewalk - BBC News'
date: '2024-09-13'
section: US & Canada
url: http://www.bbc.co.uk/news/articles/c3ejevknlvvo
content: |-
  Jared Isaacman started his first company at age 16, and has long been passionate about flying.

  American entrepreneur and billionaire Jared Isaacman became the first non-professional astronaut to walk in space on Thursday. The 41-year-old bankrolled the Polaris Dawn mission that launched him and three others into space aboard a SpaceX Crew Dragon spaceship. Worth an estimated $1.9bn (£1.46bn), Mr Isaacman made his fortune from payment processing company Shift4 Payments, which he founded in 1999 aged 16. The businessman had long been passionate about flying, first taking pilot lessons in 2004 and later setting a world record for circumnavigating the world in a light jet.

  Stepping out into space for his first time on Thursday, the businessman said: “Back at home we all have a lot of work to do. “But from here Earth sure looks like a perfect world.” SpaceX engineer Sarah Gillis also did a spacewalk after Isaacman returned. Ms Gillis, the violinist-turned-aerospace-engineer, is the Polaris Dawn's mission specialist.

