content: |-
  Jane Barlow's photograph of Loch Faskally has been unveiled as the first minister's Christmas card.

  First minister's Christmas card to go to auction

  The Christmas card will feature a photograph of Loch Faskally in Mr Swinney's North Perthshire constituency

  A photograph of Loch Faskally by photographer Jane Barlow has been selected for the first minister's official Christmas card. John Swinney unveiled this year's Christmas card picture, taken in his North Perthshire constituency, at Bute House, his official residence in Edinburgh. A framed copy of the picture, signed by Mr Swinney, will be auctioned in the new year to raise funds for children's charity, Children First. Speaking at the launch event, which included children and young people who have been helped by the charity, Mr Swinney said he was committed to ending child poverty in Scotland.

  The first minister with winner Jane Barlow

  Mr Swinney said: "The Scottish government is committed to making Scotland the best place in the world to grow up. So, it was important to me that this year's Christmas card reflected that pledge." He praised Children First for its "tremendous work protecting children from harm and delivering emotional, practical and financial support for families". The first minister thanked the "very talented" Press Association news agency photographer Ms Barlow for her photograph. Ms Barlow, who has two decades of experience as a photographer covering news and sport, won awards for the final images of the Queen at Balmoral just two days before she died in 2022.

  Jane Barlow won awards for the final images of the Queen in 2022

  Mr Swinney described Loch Faskally as a "place of great natural beauty that showcases the very best Scotland's environment has to offer". Children First chief executive Mary Glasgow said they were "delighted and honoured" that the first minister had chosen the charity to benefit from this year's Christmas card. Previous designs for the cards were by singer Annie Lennox and photographer Harry Benson, best known for his photographs of celebrities, in particular the Beatles. The card will be sent to everyone on the Scottish leader's list.
