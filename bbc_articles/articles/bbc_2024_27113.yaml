  A couple whose bodies were found in their home along with a rifle and a dead dog are named.

  Couple named after their bodies found with rifle

  The bodies of Christine Jefferies, 72, and Stephen Jefferies, 74, were found at their home on Saturday afternoon, along with a rifle and a dead dog

  A married couple in their 70s who were found dead in their home along with a rifle and a dead dog have been named. The bodies of Christine Jefferies, 72, and Stephen Jefferies, 74, were discovered by South Wales Police in Morfa Crescent in Trowbridge, Cardiff, on Saturday afternoon. The force said detectives were not currently seeking anyone else in connection with the deaths. "Extensive inquiries are continuing as we establish the tragic events which took place on Saturday," said Det Ch Insp Lianne Rees.

  Police were alerted at about 14:50 BST on Saturday after neighbours reported concerns about the couple. The couple's pet dog - believed to be a cocker spaniel - had been shot and a rifle was recovered from the property by the police. Retired welder Mr Jefferies, known by the nickname Jaffa, was a well-known rugby referee and also assessed other referees for the Welsh Rugby Union. The couple's home was cordoned off by police with Mr Jefferies' blue van still parked in the drive. The couple, who had been married for more than 50 years, had two grown-up children, a son and daughter who both live locally. The pair had an allotment nearby where they grew their own vegetables. A local resident, who did not want to be named, said: "They were a nice, quiet couple who always waved when they drove past me in their van. "Jaffa got injured playing rugby when he was about 20 and took up refereeing and then became an official assessor looking at the performance of other refs," they added. He said Mr Jefferies was "very well thought of in the game". "Our thoughts are with the family and friends of Christine and Stephen Jefferies at this difficult time," said Ms Rees. "I would like to thank the community for their continued support and understanding while we progress the investigation."
