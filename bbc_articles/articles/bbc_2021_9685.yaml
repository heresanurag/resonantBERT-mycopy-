id: bbc_2021_9685
title: 'Afghanistan: Desperation as thousands flee the Taliban - BBC News'
date: '2021-08-13'
section: General
url: http://www.bbc.co.uk/news/world-asia-58191043
content: |-
  Yogita Limaye reports from a camp in Kabul where thousands who have been displaced by violence seek refuge.

  In less than a week, the Taliban have taken over the capitals of more than a quarter of Afghanistan’s provinces, advancing at an unexpectedly rapid pace.

  Afghan forces say they are battling to regain control of some of the cities.

  The US has been launching air strikes against the Taliban in parts of the country.

  The violence has resulted in an acute humanitarian crisis – tens of thousands displaced and barely enough aid to supply even basic resources.
