title: NYPD officer uses crisp packet to save stabbing victim - BBC News
date: '2021-07-19'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-57885400
content: |-
  The police officer in New York has been praised for his decisive actions.

  A New York police officer has been praised for helping to save the life of a stabbing victim, using an empty crisp packet and some tape.

  The incident was captured on body cam footage in Harlem.

  The victim is in a critical but stable position.
