title: 'Anorexia: Doctors made MS Sarah Murphy feel like a ''freak'' - BBC News'
date: '2022-05-19'
section: Wales
url: http://www.bbc.co.uk/news/uk-wales-61504984
content: |-
  Sarah Murphy says anorexia help was so bad she would not be here without her parents' intervention.

  Sarah Murphy has been the MS for Bridgend since 2021

  "I wouldn't have come out, I would have died," said Sarah Murphy, reliving her experiences as a scared 14-year-old battling anorexia.

  She described a doctor treating her like a "freak" as plans were made to send her to an adult psychiatric unit.

  Sarah believes if her parents had not found the money for private treatment she "wouldn't be here".

  In a tearful Senedd debate speech, the MS gave harrowing details of her experiences.

  "I was thinking about this, and I think what would have happened is honestly, because when I said I wouldn't have come out, I would have died," she told BBC Radio Wales Breakfast.

  "Because even at that time, my circulation was very, very poor, my periods had stopped, I was dis-associating, I was very cold all the time.

