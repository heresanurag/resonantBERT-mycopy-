title: 'Hammond: Boris Johnson''s foreign secretary (not health secretary) - BBC News'
date: '2018-01-23'
section: General
url: http://www.bbc.co.uk/news/uk-politics-42787152
content: |-
  Asked about Boris Johnson's call for more health funding after Brexit, Chancellor Philip Hammond says his colleague is "foreign secretary" and the NHS got £6bn in the last Budget.

  Pressed on Boris Johnson's call for extra funding for the health service after Brexit, Chancellor Philip Hammond says his colleague is "the foreign secretary", not the health secretary.

  Mr Hammond says he gave Health and Social Care Secretary Jeremy Hunt an extra £6bn in the last Budget and the right time to revisit the issue is at the next spending review.
