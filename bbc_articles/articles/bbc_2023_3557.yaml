  Drone footage captures the devastation after a tornado hits Rolling Fork, Mississippi.

  Drone footage has captured the devastation after a tornado hit Rolling Fork, Mississippi.

  There is widespread destruction in the southern US state, with dozens of people killed, injured or missing.
