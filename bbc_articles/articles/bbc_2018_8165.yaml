title: Lord Carrington, former foreign secretary, dies aged 99 - BBC News
date: '2018-07-10'
section: UK Politics
url: http://www.bbc.co.uk/news/uk-politics-44778134
content: |-
  The Conservative peer was the last surviving member of Churchill's 1950s government.

  Lord Carrington with then Prime Minister Thatcher in 1980

  Former UK Foreign Secretary Lord Carrington, who was the last surviving member of Churchill's 1950s government, has died aged 99.

  The Conservative politician was also a former defence secretary.

  He resigned as foreign secretary in 1982 after the Falkland Islands were invaded by Argentine forces.

  Prime Minister Theresa May paid tribute to a "statesman who was respected globally for his remarkable lifetime of public service".

  The hereditary peer took his seat in the Lords in 1945 after serving in World War Two, where he gained a Military Cross, joining Churchill's government in 1951.

  He was agriculture minister under Churchill and later went on to become foreign secretary in Margaret Thatcher's government.

  After he resigned, taking responsibility for the failure to predict the Argentine invasion, Mrs Thatcher described his resignation as a "devastating blow for Britain".

