title: Suspected hit-woman Aimee Betro arrested in Armenia - BBC News
date: '2024-07-03'
section: Birmingham & Black Country
url: http://www.bbc.co.uk/news/articles/c87rjzx1r27o
content: |-
  Aimee Betro is taken into custody after being found near the country's capital, police say.

  Aimee Betro is wanted by police in connection with an attempted assassination

  A suspected hit-woman being hunted by police investigating an assassination attempt has been tracked down in Armenia. Aimee Betro was taken into custody on Tuesday after she was found in a housing complex on the outskirts of Yerevan, Police of the Republic of Armenia said. She is wanted by West Midlands Police in connection with the attempted shooting of a businessman outside his home in South Yardley, Birmingham, in September 2019. Mohammed Aslam and Mohammed Nazir, both from Elms Avenue, Derby, were recently found guilty of conspiracy to murder.

  It is alleged that the pair hired Betro, originally from Wisconsin in the US, to carry out the shooting. Their trial at Birmingham Crown Court was told she wore a hijab as a disguise but her gun jammed at the scene. West Midlands Police said it was aware of developments and officers were liaising with the relevant authorities.

  In a statement issued on Wednesday, police in Armenia said the 44-year-old was found and arrested in the Vanahovit district of Proshyan village, on the north-western fringes of Yerevan. The statement added that the suspect was wanted by law enforcement agencies in the UK on charges of conspiracy to commit murder and illegal possession of a firearm.
