title: Newcastle United fans head to Wembley for cup final as Angel of North draped
  in shirt - BBC News
date: '2025-03-15'
section: Tyne
url: http://www.bbc.co.uk/news/articles/c5y03yz7kgmo
content: |-
  NUFC fans are hopeful as more than 32,000 head to London for the Carabao Cup final.

  Angel of North gets Newcastle shirt ahead of final

  The Angel of the North has been decorated in support of the Magpies

  Thousands of Newcastle United supporters are making their way to London for the Carabao Cup final on Sunday. More than 32,000 fans will make the trip, including those without tickets to the Wembley clash, with the dream of seeing the Magpies lift their first major trophy since 1969. The iconic Angel of the North statue in Gateshead was draped in a black and white shirt on Saturday morning, with crowds of people turning up to take photos. Despite facing Premier League leaders Liverpool, many are hopeful of a win, including lifelong fan Lorraine Harrison who said: "I just think, if they've got the belief that they can do it, why not?"

  Without tickets for Wembley, Steph, her partner Sam, daughter Bonnie and nephew Harry went along to the Antony Gormley statue to soak up the atmosphere. The couple said they were planning to watch the match separately because they get "too nervous".

  Partners Sam and Steph with daughter Bonnie and nephew Harry at the Angel of the North

  "I got emotional when we pulled up and saw [the Angel]," said Steph. "It just represents so much as well about pride in the city and bringing people together. "It's more than just putting a shirt on the Angel of the North. Look at all the people who've come here today to enjoy it, it's really powerful." Sam added: "It's nice to have an occasion like this that brings people together."

  It is not the first North East landmark to get a black and white makeover, as Wor Flags set up this display across the River Tyne on Thursday

  Among the fans travelling to Wembley were father and son Peter and Charlie Maguire, who said they were excited to be travelling down again after making the same journey two years ago when Newcastle lost to Manchester United in the final. Mr Maguire said to have that experience with his son was "absolutely amazing".

  Peter Maguire said going to Wembley with his son Charlie in 2023 was "absolutely amazing"

  "It's going to be difficult, but I think you've always got to say we've got a chance because in football you never really know what's going to happen," said Charlie. His dad added: "You have to have hope and you have to have belief."

  For other fans, Sunday is about more than just the football and is a celebration of the Geordie culture. Matty Nicholls, from Ashington, Northumberland, has had a Greggs sausage roll shaved into the back of his head to mark the occasion. The bakery chain has its headquarters in Newcastle. "You talk to people about Newcastle, it's two things mainly - Newcastle United and Greggs," he said. "No matter where you go down the country, everyone loves a Greggs. "I wasn't sure if people would get it. You don't normally see sausage rolls on someone's head."

  Mr Nicholls said he was not sure if people would "get" his new hairstyle

  In London, supporters have gathered in Covent Garden, in advance of the game. The night before the final in 2023 it was Trafalgar Square, but it was not possible this time because of an event.

  Thousands of fans turned out in Covent Garden in London

  Bobby Moncur, the last Newcastle United captain to lift a major trophy for the club, told BBC Radio Newcastle he hoped he lived to see the next one. "I keep thinking, somebody's got to take this role over because it was 1969," he said. Moncur added he would have liked to have seen Alan Shearer do it, and he nearly did when he captained Newcastle in the 1999 FA Cup final. But the Magpies ultimately lost 2-0 to Manchester United. "Every year goes by, sadly I'm a year older and I'm thinking to myself 'I might not get to see them win a trophy'," the 80-year-old said. His message to the current team?

  The last time Newcastle United won a major trophy was the Fairs Cup in 1969

  Shearer, writing for BBC Sport, said he "will be as nervous as any supporter". "I know I am biased but if any set of fans deserves a trophy it is the Newcastle supporters because of their passion, their loyalty and how they have stuck by the team over the years," he said.

  This will be Newcastle United's second trip to Wembley in three seasons

