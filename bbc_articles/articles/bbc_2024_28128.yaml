title: Lionesses become TfL station announcers for 'historic' weekend - BBC News
date: '2024-11-16'
section: London
url: http://www.bbc.co.uk/news/articles/c9qlen17zp9o
content: |-
  All Women's Super League and Championship games will be played in main stadiums for the first time.

  Bethany England is one of the four England footballers delivering special station announcements on Saturday

  Football fans will hear some of their favourite Lionesses make special station announcements as they travel across London for a "historic weekend" in the women's game. The announcements will come from England Women’s footballers Alex Greenwood, Bethany England, Lotte Wubben-Moy and Lucy Bronze. They will be played at Fulham Broadway, Seven Sisters and White Hart Lane stations to mark the first time all games in the Barclays Women’s Super League and Barclays Women’s Championship will be played in main stadiums. Deputy Mayor for Transport, Seb Dance, said: “I hope fans enjoy this special weekend and reflect on how women’s football continues to thrive, inspire and unite communities.”

  It is the first time all games in the Barclays Women’s Super League and Barclays Women’s Championship will be played in main stadiums

  Dance added that he was "thrilled" Transport for London (TfL) had partnered with Barclays Women’s Super League "to celebrate this historic weekend for women’s football". On Saturday, Tottenham Hotspur will take on local rivals Arsenal at White Hart Lane while Chelsea host Manchester City at Stamford Bridge stadiums. Whiteboard messages on the TfL network will also highlight the games and the upcoming launch of the London Overground Lioness line, which runs between Watford Junction and Euston. The line runs through Wembley and pays homage to the most successful senior England football team since 1966. The Lionesses were crowned Euro 2022 champions and reached the Women's World Cup final in Australia last year.
