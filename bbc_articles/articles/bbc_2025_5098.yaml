title: Historic Somerset chemist bought by theme park - BBC News
date: '2025-03-27'
section: General
url: http://www.bbc.co.uk/news/videos/c2erl783lylo
content: |-
  WC White was found in South Petherton in 1987 and once featured at Cornish theme park Flambards.

  A Victorian chemist, which was boarded up for 80 years, has been bought by a new historical theme park.

  WC White was discovered in South Petherton in 1987, after being boarded up for decades.

  It was then bought at auction by Cornish theme park Flambards and featured in its Victorian village attraction before the park closed in November, and has now been taken over by Kynren - The Storied Lands, in County Durham.

