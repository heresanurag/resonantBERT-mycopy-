  Speaking after the vote, the first minister said it was up to them whether they wanted to call a separate vote of no confidence in the government rather than in him. That would be binding and would bring down the Welsh government if it succeeded. But for that to happen there would need to be a scenario – again - where Labour did not have the numbers and this time the stakes would be even higher. There has also been internal disquiet within Welsh Labour.

  This video can not be played To play this video you need to enable JavaScript in your browser.

  We don’t know yet if the desk-banging and clapping from Labour MSs today is a sign of them galvanising behind their under-pressure leader, especially after so many of them have been silent when he’s faced repeated grillings at a succession of first minister’s questions. And we also don’t know how this will affect the very public support for Mr Gething from senior UK Labour figures, including Sir Keir Starmer, especially in the middle of a general election campaign. Overnight Mr Gething is somewhere en route to Normandy via the Channel Tunnel for Thursday’s D-Day commemorations. Where he ends up eventually is far less certain.
