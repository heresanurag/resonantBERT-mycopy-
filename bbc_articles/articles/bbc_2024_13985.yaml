  It was quite a day for Vaughan Gething, writes BBC Wales political editor Gareth Lewis.

  It was quite a day for Vaughan Gething, and one that will go down in Welsh political history, writes BBC Wales political editor Gareth Lewis

  One that will go down in Welsh political history. Just over 24 hours ago Vaughan Gething said he was confident of winning the vote. Tonight he has had to clarify that he will not resign. The debate preceding the vote was passionate and emotional.

  At times the emotion spilled over with tears. The first minister had to wipe them away. The Conservatives were lambasted by Labour MS Joyce Watson for calling the vote on the same day as the UK D-Day commemorations. But the opposition were equally strong, calling into question Mr Gething's judgement in accepting the donations. It is not clear exactly what the opposition will do now.

