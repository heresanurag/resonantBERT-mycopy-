title: 'Ukraine latest news: Crowded shopping centre hit by Russian strike - 13 dead
  - BBC News'
date: '2022-06-26'
section: Europe
url: http://www.bbc.co.uk/news/live/world-europe-61941287
content: |-
  Ukraine's president says more than 1,000 people were inside the complex in the central-eastern city of Kremenchuk.

  Here are some images from the attack in Kremenchuk which left a shopping centre in flames.

  Two deaths have been confirmed but the number of victims is expected to rise significantly.

  Missiles struck the shopping mall at about 15:50 Ukraine time, officials in Kremenchuk say Image caption: Missiles struck the shopping mall at about 15:50 Ukraine time, officials in Kremenchuk say

  A fierce fire took hold of the site, covering an area of 10,000 sq m Image caption: A fierce fire took hold of the site, covering an area of 10,000 sq m

  Local fire crews battle to dampen down the intense flames Image caption: Local fire crews battle to dampen down the intense flames

  The full death toll is still not known, but two people are already confirmed to have died, with at least 20 others injured Image caption: The full death toll is still not known, but two people are already confirmed to have died, with at least 20 others injured

  The city's mayor called the attack "another Russian war crime, a crime against humanity" Image caption: The city's mayor called the attack "another Russian war crime, a crime against humanity"
