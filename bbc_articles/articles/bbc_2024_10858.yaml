  Pressed to give a commitment on the number that could be given homes in Rwanda Ms Makolo said "we are ready". But, she would not give an assurance it would be able to take the 52,000 people the UK would like to send, merely saying it would be "thousands".

  Ministers have said repeatedly they want the notion of being sent to Rwanda to be a deterrent for those trying to come to the UK. But, Ms Makolo said Rwanda had been "attacked unjustly". "Living in Rwanda is not a punishment. It is a beautiful country, including the weather," she added. Transport Secretary Mark Harper also appeared on the show and was asked whether the UK government has a back-up plan. Although he didn't answer directly, Mr Harper said the government has a "plan to start flights going in 10 to 12 weeks that is being worked on by the Home Office". Mr Harper added: "We want a steady rhythm of flights going to Rwanda through this year. "We will continue working closely with Rwanda on the partnership agreement we have got that has got all of the safeguards in place that people want to see. "I think if you can set up a system of deterrent through those flights you will break the business model of the organised crime groups who traffic people across the very dangerous waterway of the English Channel." Labour's Pat McFadden told the programme he thinks the government will succeed in getting flights running to Rwanda but believes it won't fix the migration problem or be value for money. He declined to scrap the scheme on the the first day of a Labour government, should it win the next general election, but reiterated the party does not want to continue with Mr Sunak's policy. Mr McFadden also said he doubted Labour would work to return any asylum seekers back to the UK.

  Separately, Ms Makolo denied Rwandan involvement in the bombing of a displacement camp in the Democratic Republic of Congo. At least nine people, including seven children, were killed in the strike on the Mugunga camp in the eastern city of Goma on Friday. The US has blamed the Rwandan army and M23 rebel group. Ms Makolo said the US government had been "very hasty to blame us without looking, without investigating this incident and without talking to the people who are affected. "It's something that we outright reject and it's unfair," she added.
