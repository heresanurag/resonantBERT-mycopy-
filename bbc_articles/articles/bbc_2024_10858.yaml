title: Rwanda won't guarantee how many migrants it will take from UK - BBC News
date: '2024-05-06'
section: UK Politics
url: http://www.bbc.co.uk/news/uk-politics-68961058
content: |-
  Government spokesperson Yolande Maloko also feels Rwanda has been "attacked unjustly".

  This video can not be played To play this video you need to enable JavaScript in your browser. Watch: Rwanda can't guarantee number of migrants it will take - spokesperson

  The Rwandan government won't guarantee how many migrants it can take from the UK if flights start to depart. Rishi Sunak has promised that migrants arriving in the UK without permission will be sent to Rwanda rather than allowed to claim asylum in the UK. Around 52,000 have come to the UK since the law was changed in 2023 and are in line for deportation. Rwanda has signed a five-year deal with the UK, with costs estimated to be at least £300 million already. Last month the prime minister's plans for the UK to send some asylum seekers to Rwanda passed Parliament. Speaking on 22 April, Mr Sunak said the first flight to Rwanda would leave in 10 to 12 weeks. Previously, the government said it aimed to start the flights in spring. Mr Sunak said there would be "multiple flights a month through the summer and beyond". When Parliament approved the legislation, according to Home Office there were 52,000 asylum seekers who could potentially be sent to Rwanda.

  This video can not be played To play this video you need to enable JavaScript in your browser. The PM says there is a "loud minority" who will try to stop government plans to send those seeking migrants to Rwanda.

  But, speaking on the BBC's Sunday with Laura Kuenssberg programme, Rwanda's government spokesperson Yolande Maloko said: "I cannot tell you is how many thousands we're taking in the first year or in the second year." But, when asked if Rwanda could accommodate all of the people in the current backlog. "This will depend on very many factors that are being worked out now," Ms Maloko said.

