title: Tourists flock to Death Valley hoping to experience heat record - BBC News
date: '2023-07-18'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-66229286
content: |-
  Death Valley in California did not reach its previous record but that didn't stop the tourists.

  Death Valley, California, hit a US record of 134 degrees Fahrenheit (56.6C) in 1913. One hundred years later tourists are tracking to the desert to be there when a new record breaks. But not everyone is in a mood to celebrate.
