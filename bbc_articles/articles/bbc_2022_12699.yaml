title: 'Rosie Cooper: Labour MP victim of murder plot quits for NHS role - BBC News'
date: '2022-09-20'
section: Lancashire
url: http://www.bbc.co.uk/news/uk-england-lancashire-62968372
content: |-
  Rosie Cooper was targeted in a plot by a man who wanted to "replicate" the killing of MP Jo Cox.

  A man was jailed in 2019 for planning to murder Rosie Cooper

  A Labour MP who was the target of a murder plot has stood down to take up a role in the NHS after admitting "events I have faced have taken their toll".

  West Lancashire MP Rosie Cooper said the decision to become chairman of Mersey Care NHS Foundation Trust had come after a "lot of soul searching".

  Jack Renshaw was jailed for life in 2019 for planning to murder the MP.

  A court heard the 23-year-old had wanted to "replicate" the murder of Jo Cox.

  The far-right extremist pleaded guilty to buying a machete to kill Ms Cooper and making threats to kill police officer Det Con Victoria Henderson.

  His plot was foiled by whistleblower and former National Action member Robbie Mullen.

  Ms Cooper said she had taken the decision after considerable "soul searching and reflection".

  "The events I have faced over the last few years are well documented and undoubtedly have taken their toll," she said.

  Jack Renshaw was foiled when a whistleblower revealed his plans

  She said it had been "an incredible honour and privilege" to have served the people of West Lancashire for the last 17 years.

  "I have loved every minute, even in the most difficult times," she said.

  Ms Cooper had recently been re-selected to stand in her constituency as the Labour Party candidate in the next general election.

  A by-election is expected later in the autumn.

  But the Labour councillor said she understood why Ms Cooper, who previously worked for the NHS and has served on the Health and Social Care Committee, had taken on the role.

  Ms Gibson said the MP had been a health campaigner for many years and it was "something close to her heart".

  She praised her work, including her campaign for a railway station in Skelmersdale and her push to make British Sign Language a recognised language after her own experience of growing up with deaf parents.

