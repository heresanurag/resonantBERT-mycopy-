title: 'Watch: Moment building collapses into river in India - BBC News'
date: '2024-08-01'
section: General
url: http://www.bbc.co.uk/news/videos/c1vdw9546wwo
content: |-
  No-one was injured in the incident, which took place in Himachal Pradesh, due to heavy rainfall.

  A building collapsed after heavy rainfall in Kullu district in the northern Indian state of Himachal Pradesh on Thursday morning.

  A senior district official told the BBC that the building, which was used as a vegetable market, had been evacuated before it fell and that no-one was injured in the incident.

  Videos show the Parvati river raging in the background as the four-storey building topples over. The state has been experiencing heavy rains during the monsoon season, leading to flooding, landslides and cloudbursts.
