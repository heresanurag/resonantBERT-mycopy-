title: Device behind M5 closure near Oldbury 'is flare' - BBC News
date: '2019-03-23'
section: England
url: http://www.bbc.co.uk/news/uk-england-47679224
content: |-
  The motorway was closed because of the object but has now reopened, say police.

  A suspected "unexploded device" which closed part of a motorway was a flare, say police.

  A member of the public found the object under the M5 motorway near Oldbury.

  Police said officers and Royal Logistics Corps members had "safely detonated" the flare which was found in a canal.

  The motorway had been closed in between junctions 1 and 2, but has now reopened.

