  Election campaign updates - including interviews with Boris Johnson, Jo Swinson and Nicola Sturgeon.

  PM: I did not force candidates to back my deal

  The Tories have said all of its parliamentary candidates support Mr Johnson's deal, but the PM says he has not "forced" prospective Conservative candidates to pledge their support. Asked by Robert Peston whether, for example, food standards are more important than a free-trade deal with the US, the PM does not agree or disagree but says "we have massive opportunities and we need to seize them now". Asked to name a deal that will happen as part of the "tidal wave" of investment post-Brexit, Mr Johnson claims Goldman Sachs says that there is £150bn riding on Britain leaving the EU. The PM adds that he doesn't wish to cite specific deals or people.
