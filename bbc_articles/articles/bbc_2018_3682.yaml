title: Vanessa Trump files for divorce from Donald Trump Jr - BBC News
date: '2018-03-16'
section: US & Canada
url: http://www.bbc.co.uk/news/world-us-canada-43425264
content: |-
  Vanessa Trump files for divorce from Donald Trump Jr in New York's court.

  Donald Trump Jr and Vanessa Trump have been married since 2005

  The wife of Donald Trump Jr, the eldest son of US President Donald Trump, has filed for divorce.

  Vanessa Trump, an ex-model, is seeking an uncontested divorce in a New York court.

  The couple, both 40, have been married since 2005. They have five children.

  Mr Trump Jr played a prominent role in his father's election campaign. He stayed in New York after the election and now co-runs the family business with his brother Eric Trump.

