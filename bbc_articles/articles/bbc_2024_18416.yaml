title: 'Nottingham attacks: Review of killer''s care finds ''a series of errors''
  - BBC News'
date: '2024-08-12'
section: Nottingham
url: http://www.bbc.co.uk/news/articles/cn47mm7ggv0o
content: |-
  The families of Valdo Calocane's victims say the report "demonstrates gross, systematic failures".

  Nottingham families say NHS and police have 'blood on their hands' over killings

  Ian Coates, Barnaby Webber and Grace O'Malley-Kumar were stabbed to death by Valdo Calocane

  The families of the victims of the Nottingham attacks say those responsible for failings in Valdo Calocane's care have "blood on their hands". Barnaby Webber and Grace O'Malley-Kumar, both 19, and 65-year-old Ian Coates were killed by Calocane, who was psychotic and suffering from paranoid delusions, on 13 June 2023. A review published by the Care Quality Commission (CQC) on Tuesday found "a series of errors, omissions and misjudgements" by mental health services. In a statement, the victims' families said the organisations involved "must bear a heavy burden of responsibility".

  The CQC review said "key" risk factors in Calocane's case had either been missed or omitted, including his refusal to take medicine, his persistent symptoms of psychosis and level of violence towards other people. Without action, it said, the issues identified would "continue to pose an inherent risk to... public safety". Health Secretary Wes Streeting met the victims' families last week. He said he expected the recommendations from the report to be applied nationally. The Department of Health and the Attorney General's Office both told the BBC the prime minister's commitment to a judge-led inquiry, external still stood. However, the families have insisted the inquiry must be statutory, with powers to compel witnesses to provide evidence.

  Calocane was diagnosed with paranoid schizophrenia three years before the killings

  Speaking to BBC Radio 5 Live, Mr Webber's mother Emma said the failings were "dreadful" and highlighted problems across the NHS. She said: "If any one of those missed opportunities had been addressed, then I honestly think Barnaby would still be here today - so would Grace. "He and Grace might be off on holiday together. Ian would have been off fishing enjoying his retirement that he jolly well earned. But, they're not." "It's systemic," she added. "It's not just one mental health trust. "It's uncovered and highlighted the urgency for conversation and change. "It's not a witchhunt, but we do expect accountability." Ian Coates's son, James Coates, said the report had been "a hard read". He told the BBC: "If jobs were done properly and these opportunities weren't missed and were dealt with properly and if he'd got the help he needed at an early stage, he might've gone in a different direction. "He might be an upstanding member of society. He might not have been in Nottingham. We'll never know."

