title: 'Sudan civil war: RSF kills 200 civilians in White Nile state, say activists
  - BBC News'
date: '2025-02-18'
section: Africa
url: http://www.bbc.co.uk/news/articles/c0rzw8wqn8vo
content: |-
  More than 200 civilians have been killed by paramilitaries, a rights group says.

  The allegations came as the RSF plans to announce plans to form a rival government in Sudan

  More than 200 unarmed civilians have been killed in a cluster of villages in Sudan over three days by the paramilitary Rapid Support Forces (RSF) that is involved in a brutal conflict with the military, a local rights group has said. The Emergency Lawyers network said the attacks happened in al-Kadaris and al-Khelwat towards the north of White Nile state - areas where the military had no presence. RSF fighters were guilty of "executions, kidnappings, enforced disappearances and property looting", the network added. The RSF, which was allied to the military before the civil war broke out in April 2023, has not commented on the allegations.

  The two had come to power together in a coup - but fell out over an internationally backed plan to move towards civilian rule. Some senior RSF leaders are currently in Kenya where they are expected to announce plans to form their own government in areas under their control. Analysts warn the move could deepen divisions in Sudan.
