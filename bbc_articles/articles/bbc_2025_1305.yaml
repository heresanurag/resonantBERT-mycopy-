  • None Last surgeons standing in Darfur city's only hospital Humanitarians have been sounding the alarm over Sudan, where the conflict has forced about 12 million people from their homes. Tens of thousands of civilians have been killed, with both the RSF and army accused of committing atrocities. At the heart of this conflict is a falling out between Sudan's de facto ruler and army chief Gen Abdel Fattah al-Burhan, and his deputy-turned-rival Mohamed Hamdan "Hemedti" Dagalo, who leads the RSF. The RSF was recently dealt a significant blow when the army regained control of parts of the capital, Khartoum - including its military headquarters. Beyond the capital, the army has also won near total control of the crucial state of Gezira. Following the setbacks, the RSF has rebounded with plans to launch a rival government in areas still under its control, which are mainly in Darfur and parts of Kordofan state. The RSF is meeting allied groups in Nairobi to finalise the adoption of what it calls a "political charter for the Government of Peace and Unity". Gen Burhan has rejected the move, and has vowed to reclaim the whole of Khartoum. He is currently based in Port Sudan, having been forced to leave Khartoum months after the civil war broke out when the RSF seized the military headquarters and the presidential palace.
