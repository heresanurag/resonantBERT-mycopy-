title: 'Sheffield stabbing: Boy charged with murder of Harvey Willgoose - BBC News'
date: '2025-02-05'
section: South Yorkshire
url: http://www.bbc.co.uk/news/articles/c14nmpde6y2o
content: |-
  The 15-year-old is also charged with possession of a bladed article and one count of affray.

  Harvey Willgoose was fatally injured at All Saints Catholic School in Sheffield on Monday

  A teenager has been charged with murder after the fatal stabbing of a 15-year-old boy at a school in Sheffield. Harvey Willgoose suffered serious injuries at All Saints Catholic High School, in Granville Road, at about 12:17 GMT on Monday and died shortly afterwards. The Crown Prosecution Service (CPS) confirmed on Wednesday it had authorised South Yorkshire Police to charge the boy, who was arrested on Monday, with murder, possession of a bladed article and affray. The boy, who cannot be named due to his age, will appear at Sheffield Youth Court later.

  Chris Hartley, deputy chief crown prosecutor for the CPS Yorkshire and Humberside, said: "The Crown Prosecution Service reminds all concerned that criminal proceedings against this defendant are active and that the youth has a right to a fair trial. "It is extremely important that there should be no reporting, commentary or sharing of information online which could in any way prejudice these proceedings."

  All Saints Catholic High School in Sheffield has been closed since Monday

  In a statement released through South Yorkshire Police on Tuesday, Harvey's "utterly heartbroken" family paid tribute to their "beautiful boy, Harvey Goose". "Our lives are devastated and will never be the same again," they said. "We have lost a beloved son, brother, grandson, cousin, nephew and most importantly, a best friend to all. "Harvey will be forever known for being a caring, loving and funny young man." Floral tributes and cards have been left in memory of the teenager outside All Saints Catholic High School, which has been closed since Monday. The CEO of the academy trust which runs the school expressed his "heartfelt" condolences to Harvey's family and friends. He described the teenager as an "invaluable part of our school community" and as an "immensely popular" young man, whose smile would "light up the room". A mass service will be held for Harvey at St Joseph's Catholic Church in Handsworth on Saturday. Listen to highlights from South Yorkshire on BBC Sounds, catch up with the latest episode of Look North or tell us a story you think we should be covering here, external.
