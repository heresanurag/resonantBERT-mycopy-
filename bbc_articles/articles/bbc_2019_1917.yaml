id: bbc_2019_1917
title: Golf ball-sized endangered tortoises hatch at Chester Zoo - BBC News
date: '2019-02-27'
section: General
url: http://www.bbc.co.uk/news/uk-england-merseyside-47379211
content: |-
  The critically endangered radiated tortoise can grow to half a metre in length and reach 100 years old.

  Two rare Madagascan tortoises have hatched at Chester Zoo.

  The radiated tortoise is a critically endangered species that can grow to half a metre in length and reach 100 years old.

  But these newborns are only the size of a golf ball.
