content: |-
  The fire at Bicester Motion, on a former RAF base, broke out on Thursday evening.

  Fire at motor and aviation site 'under control'

  To play this video you need to enable JavaScript in your browser. This video can not be played Large plumes of smoke were filmed coming from one of the Bicester Motion buildings

  A fire at a historic motoring and aviation centre on a former airbase in Oxfordshire has been brought under control. The blaze, initially tackled by 10 crews, broke out at Bicester Motion, Buckingham Road on the site of RAF Bicester, a former bomber station on Thursday at about 18:30 BST. Advice for those living nearby to remain indoors and shut all windows in place overnight has now been lifted, along with road closures. Bicester Motion, home to more than 50 specialist businesses focused on classic car restoration and engineering, has thanked the emergency services. They said the site will be closed today and over the weekend.

  Thick black smoke billowed from the site on Thursday evening

  Oxfordshire Fire and Rescue Service said four crews remain at the scene along with support appliances including a hydraulic platform and a water carrier. The cause of the fire is not yet known.

