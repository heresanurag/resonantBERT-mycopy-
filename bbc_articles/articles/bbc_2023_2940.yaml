title: Poet Laureate marks 100 years of the Flying Scotsman - BBC News
date: '2023-02-24'
section: General
url: http://www.bbc.co.uk/news/entertainment-arts-64760727
content: |-
  Simon Armitage has written a poem about one of the country's most romantic trains.

  The Making of Flying Scotsman is a new poem written by Poet Laureate Simon Armitage to mark 100 years since the famous locomotive entered service.

  The steam engine was the UK's first to officially reach 100mph, and also the first-ever service to run non-stop from London to Edinburgh.
