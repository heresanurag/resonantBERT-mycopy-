title: 'Wales sack Rob Page: Manager leaves after three years in charge - BBC Sport'
date: '2024-06-21'
section: Wales Men
url: http://www.bbc.co.uk/sport/football/articles/c877mp1852po
content: |-
  Wales sack manager Rob Page following the team's failure to qualify for Euro 2024 and recent poor performances.

  Former Wales centre-back Rob Page has previously managed Port Vale and Northampton

  Wales have sacked manager Rob Page after three and a half years in charge. Page, 49, led his country to a first World Cup in 64 years and guided them to the second round of Euro 2020. But he has paid the price for Wales' failure to qualify for Euro 2024, with this month's miserable friendly displays against Gibraltar and Slovakia proving to be the final straw. Football Association of Wales (FAW) bosses held talks for more than a week before eventually coming to an agreement that a change was needed. Following an underwhelming performance at the 2022 World Cup, Page faced heavy criticism after an embarrassing home defeat by Armenia during Euro 2024 qualifying. Wales responded with a memorable victory over Croatia, but their hopes of reaching a third successive European Championship ended in agonising fashion as they were beaten on penalties in the play-off final against Poland in March. The FAW backed Page in the immediate aftermath of that crushing disappointment, with president Steve Williams saying the former centre-back would be in charge for the 2026 World Cup qualifying campaign. Less than three months down the line, the FAW has decided a change of manager is needed. Dave Adams, the FAW's chief football officer, said: “I would like to thank Rob for his work with the association over the last seven years, firstly as the under-21s head coach and then onto the role of Cymru [Wales] head coach." FAW chief executive Noel Mooney said: "On behalf of myself and the entire FAW, I extend our heartfelt gratitude to Rob for his commitment and dedication to his roles for the national teams. "Under Rob Page's leadership, our Cymru men's team has achieved significant milestones and victories which have created many incredible memories for our nation, most notably our first World Cup in 64 years."

