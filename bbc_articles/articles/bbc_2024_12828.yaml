  Wales endured a desperate June international window, in which a youthful side drew with the minnows of Gibraltar before a stronger line-up were thumped 4-0 in Slovakia. Wales were without a host of frontline players for both matches, but that did not stop Page facing boos and heavy criticism from fans after both matches. "They [Wales' fans] want me out. I completely understand. I've got to stay true to myself and focused on the job in hand. Everything else is out of my control," Page said after the Slovakia defeat. Page became Wales boss in November 2020, initially taking over from Ryan Giggs on a temporary basis before getting the job permanently. The 49-year-old helped Wales secure promotion to the top tier of the Nations League for the first time immediately after stepping up from his assistant coach role to fill in for Giggs.

  Daniel James is consoled by his team-mates after his penalty shootout miss against Poland in the Euro 2024 qualification play-off final

  He won praise for guiding Wales through the group stages at Euro 2020, though they were dumped out of the tournament in the second round courtesy of a 4-0 thrashing by Denmark. Wales beat Ukraine in a play-off to reach the World Cup, but they made an early exit in Qatar after taking only one point from their three group matches as they were beaten by Iran and England. Page was handed a new contract running until 2026 before the tournament, but he has left his post before the Nations League returns in September. He was in charge of Wales for 45 matches, winning 15, drawing 15 and - including the Poland shootout - losing 15 of them. Wales' next game is the Nations League opener against Turkey on 6 September, with a trip to Montenegro to come three days later.
