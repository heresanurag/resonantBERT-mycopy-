title: Football and rugby games off as more festive Welsh sport falls due to Covid
  - BBC Sport
date: '2021-12-23'
section: Wales
url: http://www.bbc.co.uk/sport/wales/59728724
content: |-
  Swansea City and Newport County announce further postponements after Wales' Boxing Day schedule is wiped out.

  Swansea City have had a third consecutive match called off

  There are further disruptions to Wales' festive sporting schedule due to outbreaks of Covid-19. Swansea City and Newport County have called off their games on Wednesday, 29 December with more positive cases in their camps. The clubs, along with Cardiff City and Wrexham, had already seen their Boxing Day fixtures postponed. Sunday's United Rugby Championship (URC) derby between Cardiff and Scarlets is also off. It follows the Ospreys v Dragons game which had already been postponed. The professional sport schedule for matches due to be staged in Wales on Boxing Day has now been completely wiped out, along with post-Christmas fixtures in the Cymru Leagues and rugby's Welsh Premiership due to games having to be staged behind closed doors. Wales' first minister Mark Drakeford has also announced restrictions on sporting events. Cardiff were due to host Scarlets in the only remaining Welsh rugby Boxing Day derby after cases in Ospreys' camp caused the postponement of their encounter with Dragons. The game at the Arms Park was called off on Christmas Day due a number of positive cases within the Cardiff squad reported by the region. Cardiff say they have liaised with the URC medical advisory group and Public Health Wales and it has been deemed that the fixture cannot take place. The URC will now consider available dates to reschedule the game.

  Cardiff and Newport's fixtures against Coventry and Forest Green were called off on Monday, with Swansea's Boxing Day fixture at Millwall and Wrexham's match at home against Solihull Moors postponed on Thursday. Cardiff say the Coventry fixture in the Championship is off because of cases within the Bluebirds' playing squad and staff.

