  Swansea head coach Russell Martin said on Wednesday there were two Covid cases in Swansea's squad but that they were hoping the Millwall fixture on 26 December would go ahead. But there are multiple cases in the Millwall camp, with the Lions' game against Preston North End last weekend also called off. On Friday, Swansea confirmed their following fixture at home against Luton would also be postponed - a third consecutive match for the club. Newport's League Two fixture has been postponed because of cases at Forest Green, who had already called off two games scheduled for this week. County then announced on Boxing Day that Wednesday's trip to Leyton Orient was off after positive cases and injuries in their squad. Wrexham's game is off because of cases in their camp. The National League club said that, at this point, their game away to Altrincham on 28 December remains on - but that further updates would be provided. There were 12 games in the Cymru Premier over the festive period that have now been postponed because of the Welsh government's decision to play matches behind closed doors. In ice hockey's Elite League, Cardiff Devils were due to host Manchester Storm on 22 December but Coventry Blaze travelled to south Wales instead due to cases in the Storm roster. The Devils travel to face Blaze on Sunday before a return fixture the next day. Horse racing's Welsh Grand National is due to be held at Chepstow on 27 December.
