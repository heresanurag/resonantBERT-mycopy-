title: 'Portsmouth: Woman released on bail after girl, 8, dies in Portsmouth - BBC
  News'
date: '2023-08-25'
section: Hampshire & Isle of Wight
url: http://www.bbc.co.uk/news/uk-england-hampshire-66619542
content: |-
  The 43-year-old woman was initially arrested on suspicion of child neglect.

  The girl fell from a tower block flat in Portsmouth

  A woman arrested on suspicion of child neglect following the death of an eight-year old girl been released on bail.

  The girl died after falling from a tower block balcony.

  Police were called at 18:50 BST on Thursday to Wingfield Street in Portsmouth, Hampshire.

  The child was treated by paramedics but was later pronounced dead, police said. The woman arrested was released on bail until 24 November.

  Floral tributes have been left at the scene

  The girl's family had been informed, police said.

  A police spokesperson said: "We attended along with our colleagues from South Central Ambulance Service who treated the eight year-old girl, who subsequently died.

  "Officers will be in the area throughout the day to conduct inquiries.

  "Anyone with any concerns can speak to our Neighbourhood Policing Teams that will be regularly patrolling."

