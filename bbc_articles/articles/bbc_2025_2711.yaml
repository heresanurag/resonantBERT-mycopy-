  Sky News presenter Kay Burley has announced she is retiring from the network after 36 years. Closing the channel's breakfast programme on Wednesday, Burley said it had been "an honour and a privilege to work with some of the best and hardest working teams in the business". Burley reflected that Sky News had gone "from a standing start to one of the most recognised and valued brands in global news". Burley, 64, joined Sky News in 1989 and was part of the team that covered the death of Diana, Princess of Wales, the 9/11 terror attacks, the 2004 Indian Ocean earthquake and the birth of Prince George.

  Kay Burley (right) was part of the original presenting line-up of Sky News in 1989

  In 2018, she was given her own show, The Kay Burley Show which moved into the breakfast slot a year later. She was suspended from presenting her show for sixth months in December 2020 for breaching coronavirus restrictions as she celebrated her 60th birthday in central London. Speaking at the end of her show, Burley added: "News by its very nature is often devastating and together we've covered so many life-changing events. "But we've also enjoyed some wonderful high notes too, haven't we - the thrill of London winning the chance to host the 2012 Olympics; a plethora of royal weddings; jubilees and who can forget days and days and days waiting for royal babies to arrive at the Lindo Wing. "But after more than a million minutes of live TV news - more than anyone else in the world - its time for me to indulge in some of my other passions - including my love for travel. "So, after covering 12 separate general elections - including Sir Keir Starmer's victory last year - I am retiring from Sky News - let politicians of every party just rejoice at that news! "Thank you for waking up and tuning in every morning. I can't tell you how much I have appreciated your support over the last three and a half decades: You're awesome."

  Burley was part of the team that launched Sky News in 1989

  In 2007 Burley appeared as a contestant on ITV's Dancing on Ice and in 2018 she was part of the second series of Celebrity Hunted. David Rhodes, executive chairman of Sky News, said Kay's commitment to Sky and legacy in television journalism is "unmatched". "We thank Kay for her huge contribution to Sky, to the art of the interview and to British journalism. And we wish her the best of luck," he added. Paying tribute to Burley, TV producer Sam McAlister said on X that she was "an absolute icon". "Smart as hell, sharp as they come, bloody amazing company," she wrote., external
