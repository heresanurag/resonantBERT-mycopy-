content: |-
  Gust of 102.2mph recorded on Tay Bridge as Storm Ali sweeps across Scotland

  Amber alert over - but disruption for some time yet

  A yellow "plan ahead for severe weather" warning remains in force until 22:00 across most of Scotland. In many areas conditions are improving but 25,000 homes remain without power and commuters are facing a difficult journey home. Restrictions are in force on major bridges and many roads are still closed due to falling trees or debris. ScotRail has promised to have teams working though the night to ensure rail services are back up and running again tomorrow. That's the end of our live page coverage of Storm Ali - thanks to all of you who have sent in pictures and updates throughout the day.
