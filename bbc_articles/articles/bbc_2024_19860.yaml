content: |-
  Sharon Osbourne is seeking the identity of the fan who she says restored her faith in people.

  Sharon Osbourne said she unknowingly lost her wedding ring at an event at Villa Park

  Sharon Osbourne is trying to track down a mystery fan who returned her wedding ring after she dropped it. The TV personality and wife of singer Ozzy Osbourne said she had lost it during the opening of Aston Villa’s new store at Villa Park earlier this month. In a video post on Instagram, external, Osbourne said she had been having the "best time ever" meeting people before leaving the launch. As she was walking across the car park, she said a woman ran up to her holding her wedding ring.

  "I was like 'oh my god'. She found it on the floor of the store and presumed it was mine," Osbourne said in the video. "She came running after me and gave it to me and I never got her name because I was just in shock."

  Osbourne said her husband replaced her original wedding band after it was stolen

  Osbourne said her original wedding band had been stolen some years ago and her husband had got her a new one. "If I’d lost this it would’ve been terrible. So just thank you, thank you, thank you for returning it to me," she added. She also wrote that the woman had not only saved her from losing one of her "most cherished items", but had also restored her "faith in people". Osbourne has asked anyone who knows the woman to post her name in the comments under her Instagram post. Black Sabbath are some of Villa's most famous fans. Ozzy and bassist Geezer Butler helped launch the new kit in July.
