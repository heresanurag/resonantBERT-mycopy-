title: Andrew Lester dies awaiting sentencing for shooting teen Ralph Yarl - BBC News
date: '2025-02-19'
section: US & Canada
url: http://www.bbc.co.uk/news/articles/c04z90607v4o
content: |-
  Andrew Lester, 86, pleaded guilty last week to second-degree assault in the shooting of the teen boy in Kansas City in 2023.

  A Missouri man has died weeks before his sentencing for shooting a 16-year-old boy who accidentally went to the wrong address. Andrew Lester, 86, pleaded guilty last week to second-degree assault after opening fire on Ralph Yarl in Kansas City on 13 April 2023. Lester was scheduled for sentencing on 7 March and was facing seven years in prison. In a statement, the Yarl family expressed frustration that "justice was never truly served". Ralph Yarl rang Lester's doorbell while going to pick up his younger brothers. Prosecutors said Lester shot the teen without speaking to him. The boy survived and has since graduated from high school.

  The Clay County prosecutor's office said in a statement on Wednesday: "We have learned of the passing of Andrew Lester and extend our sincere condolences to his family during this difficult time. "While the legal proceedings have now concluded, we acknowledge that Mr Lester did take responsibility for his actions by pleading guilty in this case. "Our thoughts remain with both families affected by this tragic incident as they continue their healing process." But in a statement to the Kansas City Star, the Yarl family expressed dissatisfaction that "the man responsible escaped sentencing". They added: "One of the reasons we pushed for a speedy trial was to ensure the public would see that our society does not condone shooting an unarmed, innocent child simply for ringing the wrong doorbell - especially when that child was targeted because of the color of his skin." Police initially said there was a "racial component" to the shooting, but authorities ultimately did not charge Lester with a hate crime.

  This video can not be played To play this video you need to enable JavaScript in your browser. Watch: Ralph's mother, Cleo Nagbe, describes his injuries after he was shot on Thursday

  Lester and his lawyers said he was acting in self-defence and thought the teenager was trying to break into his home. Ralph Yarl told authorities his mother sent him to pick up his siblings from a playdate at around 22:00 local time that night. He mixed up similar street names - Northeast 115 Street and Northeast 115th Terrace - which put him on Lester's doorstep and about a block away from the house he was trying to find. After he rang the doorbell, Lester shot him twice - once in the forehead and once in the arm. Prosecutors have said the boy "did not cross the threshold" of Lester's home and survived after fleeing to neighbouring homes for help. Police initially detained Lester for questioning and released him without charges, sparking protests in Kansas City. The demonstrations drew support from celebrities including actresses Halle Berry, Kerry Washington and Jennifer Hudson. Lester turned himself in after an arrest warrant was issued. The case was one of several in spring 2023 in which Americans were injured after minor mistakes resulted in gun violence. One of the victims, 20-year-old Kaylin Gillis, was fatally shot after a car she was in pulled into the wrong driveway in upstate New York.
