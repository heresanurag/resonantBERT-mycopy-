title: 'Hualien earthquake: ''I''ve lost my home of 20 years'' - BBC News'
date: '2018-02-10'
section: General
url: http://www.bbc.co.uk/news/world-asia-43004930
content: |-
  A survivor of the Hualien earthquake returns to his former home.

  At least 12 people died and hundreds more were injured when a 6.4 magnitude earthquake struck the city of Hualien, Taiwan.

  Chen Chien Shiang survived but lost his home of more than 20 years. This is his story.
