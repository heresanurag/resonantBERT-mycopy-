  Rory McIlroy is two shots outside the medal positions after an opening 68 left him sharing 15th place at the Olympic men's golf event in Paris.

  McIlroy two shots off medal spot after opening 68

  Rory McIlroy carded five birdies and an eagle at Le Golf National but his momentum was hindered by four dropped shots

  Rory McIlroy is two shots outside the medal positions after a three-under 68 in the opening round of the Olympic men's golf event in Paris. McIlroy carded five birdies and an eagle but his progress was hampered by four bogeys, including one on the 18th hole to leave him in a tie for 15th. The Team Ireland golfer is five shots adrift of leader Hideki Matsuyama of Japan, who recorded eight birdies in a bogey-free round of 63 to lead at Le Golf National. Defending champion Xander Schauffele, who recently became the first player to win The Open and US PGA Championship in the same year since McIlroy in 2014, is second, two shots behind Matsuyama. American Schauffele and Spain's Jon Rahm were among the late finishers in a round that was temporarily suspended because of the threat of lightning. Chile's Joaquin Niemann, Argentina's Emiliano Grillo and South Korea's Tom Kim are tied for third after rounds of 66. World number one Scottie Scheffler, Great Britain's Tommy Fleetwood and Rahm were among those a further shot off the pace.

