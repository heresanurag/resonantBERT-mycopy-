  McIlroy's Ireland team-mate Shane Lowry could only manage a level-par 71 as his three bogeys included a dropped shot at the last following the first lightning delay. After bogeying the par-three second, McIlroy recovered to reach the turn in three under after birdies on the third and fifth were followed by an eagle three at the ninth. Bogeys on the 10th and 12th dropped him back to one under and while three successive birdies from the 13th put him on four under, his round ended on a frustrating note as he took five at the closing hole following three putts. McIlroy missed out on a bronze medal in a play-off on his Olympic debut in Tokyo.
