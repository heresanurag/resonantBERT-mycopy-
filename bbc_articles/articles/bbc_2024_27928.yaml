content: |-
  The man told officers he "accidentally stepped on the gas too hard" driving the vehicle into a pool.

  Bodycam footage released by the Phoenix Police Department has shown the dramatic moment an officer smashed the sunroof of a submerged vehicle to rescue a man trapped inside.

  The US man told officers that he "accidentally stepped on the gas too hard" before driving the vehicle into a pool.

  The Phoenix Police Department confirmed no other passengers were inside. The man was taken to an Arizona hospital following the rescue.
