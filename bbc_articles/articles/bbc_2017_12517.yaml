title: Roy Moore's lawyer casts doubt on accuser's yearbook claim - BBC News
date: '2017-11-16'
section: US & Canada
url: http://www.bbc.co.uk/news/world-us-canada-42005449
content: |-
  Mr Moore's lawyer questions an accuser's account as three more women come forward with more claims.

  This video can not be played To play this video you need to enable JavaScript in your browser. Roy Moore: How Alabamans are defending the accused judge

  A lawyer for embattled Senate candidate Roy Moore has raised questions about evidence provided by a woman who claims he sexually assaulted her as a teen.

  Beverly Young Nelson showed Mr Moore's purported signature and message in her high school yearbook as proof of his alleged interest in her.

  His lawyer cast doubt on the signature and called on Mrs Nelson to release the yearbook for handwriting examination.

  A number of women have come forward to accuse Mr Moore of sexual misconduct.

  Many of them accuse him of initiating sexual contact while they were teenage girls.

  The 70-year-old former Alabama Supreme Court judge has flatly denied the claims.

  He tweeted a defiant message - "Bring. It. On" - to Mitch McConnell, the Republican Senate majority leader, who is among those to have urged him to quit.

