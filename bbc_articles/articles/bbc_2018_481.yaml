title: 'Donald Trump: Regulation is stealth taxation - BBC News'
date: '2018-01-26'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-42836559
content: |-
  The US President criticises regulation and bureaucrats at the World Economic Forum in Davos.

  US President Donald Trump launched a fierce attack on regulation and bureaucrats during his speech at the World Economic Forum in Davos, Switzerland.

  "Regulation is stealth taxation," he told the world's finance leaders.
