title: 'Watch: North Sea oil rig blown up in Highland yard - BBC News'
date: '2024-06-14'
section: General
url: http://www.bbc.co.uk/news/videos/c0kkxxv9vpxo
content: |-
  The Northern Producer was moved to Kishorn from oil fields off Shetland for demolition.

  A decommissioned oil rig has been destroyed in a controlled explosion at a yard in the Highlands.

  The Northern Producer had been used in the Dons oil fields about 100 miles north-east of Shetland.

  The fields are being decommissioned and the semi-submersible drilling rig was taken to Kishorn Port Ltd's yard in Wester Ross in 2021.

  On Thursday it was blown up in the dry dock.

  Further work is to be done to recycle and reuse different parts of the rig.
