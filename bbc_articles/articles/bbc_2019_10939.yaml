title: Saudi Arabia oil drone attack 'a blow for the world' - BBC News
date: '2019-09-18'
section: General
url: http://www.bbc.co.uk/news/world-middle-east-49736754
content: |-
  Attacks on Saudi Arabia’s oil facilities are an attack on the "whole world" the country says.

  The drone attacks on Saudi Arabia’s oil installations are an attack on the "whole world" and its economy, according to the newly appointed Saudi ambassador to London.

  Prince Khalid Bin Bandar Al-Saud told the BBC's Frank Gardner that Iran was most likely behind the attack.

  He also called last year’s murder of Saudi journalist Jamal Al-Khashoggi by Saudi government agents "a stain" on Saudi Arabia and defended his country’s role in the war in Yemen.
