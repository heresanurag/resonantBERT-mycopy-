  At the weekend, President Macron had suggested a partial, month-long truce between Russia and Ukraine, in which both would agree to a truce for four weeks in the air, on the sea and around energy infrastructure, but it would not cover ground fighting along the frontline in the east. Eléonore Caroit, a member of the French foreign affairs committee, told BBC Radio 4's Today programme that President Macron's proposal sent a "very strong message" to Europe "that if we want, we can do something". But Defence Minister Luke Pollard told the BBC it was "not a plan that we currently recognise". He added: "Certainly there are a number of different options being discussed privately between the UK, France and our allies... What we are certainly doing is looking at what plan would bring peace as soon as we can, and what plan creates a lasting peace."

  The prime minister hosted the London summit as allies scramble to shape peace negotiations and smooth over fractured relations between Trump and Zelensky. At the summit, Sir Keir announced a four-point plan to work with Ukraine to end the war and defend the country from Russia. The plan involves including Ukraine in talks, continuing to supply it with military aid, boosting its defence capabilities and building a "coalition of the willing" to defend a deal to end the fighting. The UK and France are taking a leading role and have both committed to send soldiers to Ukraine, under the proposals. But apart from increasing spending on defence, there appears to be no consensus on a plan to end the war among European leaders. Defence Secretary John Healey will visit the US later this week to move discussions forward. In other developments over the weekend:
  • None Zelensky said he was prepared to resign as president if his country was granted membership of Nato, the western security alliance
  • None European Commission President Ursula von der Leyen has said she will present a plan to "rearm" Europe in the coming days
  • None Chancellor Rachel Reeves signed off a £2.26bn loan scheme to help Ukraine buy weapons and fund its reconstruction after the war

