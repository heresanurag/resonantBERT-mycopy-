title: 'Australia: Watch jewellery store heist by disguised gunmen - BBC News'
date: '2023-05-24'
section: General
url: http://www.bbc.co.uk/news/world-australia-65692194
content: |-
  CCTV has captured two thieves armed with guns robbing an Australian jewellery store wearing what appear to be burkas.

  CCTV has captured a brazen jewellery store heist in Queensland by two thieves armed with guns and disguised in what appear to be burkas. Rhia Jewellers owner Madhuri Azam told the BBC the thieves made off with over A$200,000 (£106,000) worth of stock after a bystander began screaming.
