title: Belfast man sentenced to six and a half years for rape - BBC News
date: '2023-10-05'
section: Northern Ireland
url: http://www.bbc.co.uk/news/uk-northern-ireland-67016933
content: |-
  Stephen Dalton, 39, attacked the woman who was walking home from a night out with friends in 2021.

  The court heard Stephen Dalton threatened two witnesses of the attack

  A Belfast man has been sentenced for raping a woman who was walking home from a night out with friends.

  Stephen Dalton, 39, was sentenced to six and a half years at Belfast Crown Court, half of which he will spend in jail.

  The court heard Dalton, of Fairfax Court, raped a 26-year-old woman on 10 September 2021.

  The judge told the court the case was "disturbing".

  Dalton had previously pleaded guilty to raping and sexually assaulting the woman.

  The court heard she was on a night out with friends in the city centre of Belfast and decided to walk home.

  The woman, who was in a vulnerable state, was confronted by Dalton on a footpath and after a brief exchange Dalton followed her across a bridge.

  The court heard Dalton sexually assaulted and raped the woman on a bench.

  Two cyclists witnessed part of the attack and said the woman "looked like a rag doll" and approached Dalton who said he was helping the woman.

  They realised she was not in a state to consent and called police, but Dalton threatened the cyclists and continued to sexually assault the victim.

  The court was told forensic examination linked Dalton to the victim.

  The victim told the court what happened to her was a "nightmare" and said she no longer socialises and has been left feeling paranoid.

  Judge Ramsey paid tribute both to her and to the two cyclists who came to her assistance.

  "They showed great courage in confronting the defendant and they must be commended for their swift action in bringing him to justice," they said.

  Dalton will also spend ten years on the Sexual Offences Prevention Order and will be placed on the Sex Offenders Register for an indefinite period.

  In a statement, PSNI Det Con Grant said Dalton "took advantage" of his victim and his actions were "callous, with total disregard to consent".

  "We would like to commend a passer-by who intervened, and the victim for her bravery in working with detectives throughout the investigation," they added.
