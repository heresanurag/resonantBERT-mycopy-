title: Tory members would choose me as leader, says Nigel Farage - BBC News
date: '2024-02-16'
section: UK Politics
url: http://www.bbc.co.uk/news/uk-politics-68314953
content: |-
  Reform UK's co-founder predicts he will end up in the same party as Tory MPs like Sir Jacob Rees-Mogg.

  This video can not be played To play this video you need to enable JavaScript in your browser. The Conservatives are “not even a centre-right party any more” says the honorary president of Reform.

  Nigel Farage has said Conservative members would choose him as their leader over Rishi Sunak, after Reform UK had its best ever by-elections.

  Mr Farage, Reform's honorary president, said he would "have to" eventually end up in the same party as Conservative MPs like Sir Jacob Rees-Mogg.

  Reform scored double-digit vote shares for the first time in both Kingswood and Wellingborough by-elections.

  The Conservatives said Reform UK "want to see Keir Starmer in Downing Street".

  Speaking to BBC Breakfast, Conservative Party Chairman Richard Holden said: "Their ambition is to block Conservatives winning seats."

  Mr Farage told BBC Radio 4's The World at One: "I think if you ask Tory party members right now they'd vote for me to be leader and not Rishi Sunak."

  Despite winning over the majority of Tory MPs, Mr Sunak lost a vote among party members, when 58% backed Liz Truss to become party leader in September 2022.

  Mr Farage said the Conservatives were doing badly because of their failure in government, not because of Reform.

  And he insisted there was "zero prospect" repeating the Brexit Party's 2019 deal with the Conservatives - which saw them withdraw candidates in hundreds of Tory target seats - to help keep Labour out of power.

  In his role as a GB News presenter, Mr Farage has been a regular sight at Tory events, where he has been feted by many right wingers for his role in delivering Brexit.

  He began his political journey as a Conservative but quit the party in the early 1990s over its then pro-European stance - but has spoken about returning to the fold, if the party shifts further to the right.

  "Maybe after the Tories lose heavily they'll rethink what they actually stand for. What we do need in this country is a centre right government," he told the BBC.

  "At some point in time people like myself and Jacob Rees-Mogg have to be in the same party - whether that's Reform, whether that's the Conservatives, whether that's something new.

  "Logically, that wing of the party and Reform have to be on the same team."

  Speaking after the by-elections, former cabinet minister Sir Jacob said the Conservatives needed to focus on appealing to voters who had turned to Reform, adding that there was "a lot of common ground" between the two parties.

  But Sir Jacob, insisted his support for Mr Sunak's leadership was "solid".

  Sir Jacob Rees-Mogg was one of several Tory ex-Cabinet ministers to launch the Popular Conservatism - aimed at pushing Rishi Sunak's government to adopt more right-wing ideas

  Mr Farage received a hero's welcome from many Conservatives at the party's annual conference in Manchester last year.

  On Friday, he said he was committed to backing Reform, but would "have to see what active role I play" in the party's general election campaign.

  Mr Farage has repeatedly said he has no plans to make an eighth attempt to get elected to the House of Commons.

  Declaring the by-elections as Reform's "coming of age," Mr Farage conceded his party will not win the general election - but said it could win the next one.

  Reform won 13% of the votes in Wellingborough and 10.4% in Kingswood, roughly matching the levels it has been polling nationally.

  BBC analysis of major opinion polls shows a marked increase in the party's support in recent months to an average of 10%, nearly double where it stood last year.

  Until now, Reform has struggled to repeat this in elections.

  Reform's pitch is to voters disaffected with both main parties But the party's polices - including a far tougher line on immigration and scrapping the government's net zero commitments - are in tune with the views of many on the right of the Tory Party.
