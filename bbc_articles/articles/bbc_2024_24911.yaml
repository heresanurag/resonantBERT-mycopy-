title: Leicestershire Police launch CCTV appeal after armed robberies - BBC News
date: '2024-10-13'
section: Leicester
url: http://www.bbc.co.uk/news/articles/cwyelw1d8vlo
content: |-
  Officers are linking incidents at three supermarkets in Leicestershire.

  Leicestershire Police has issued CCTV images of two men officers wish to speak to

  Police have launched a CCTV appeal after three armed robberies at supermarkets in Leicestershire. The incidents, which are reported to have involved a gun, took place in Wigston on Thursday, Evington on Friday and Enderby on Saturday. A 40-year-old man has been arrested on suspicion of conspiracy to commit robbery, Leicestershire Police said. The force also released images of two men officers would like to speak to as part of the investigation.

  According to police, the first robbery happened at Tesco in Blaby Road at about 23:55 BST on Thursday, while the second took place a day later at Tesco in Ethel Road at about 21:40. The third was reported at Sainsbury's near Fosse Park at about 09:25 on Saturday. In all three incidents, two men entered the stores at separate times before trying to leave without paying for bottles of alcohol, police said. When challenged by staff, threats were made with a gun before the suspects reportedly left with bottles of alcohol.

  A knife was also used during the incident at the Sainsbury's store, police added, but no serious injuries have been reported following the robberies. Det Insp George Fraser said: "We are treating these incidents as a priority in force and our investigation and enquiries are very much ongoing. “We are looking to speak to the men pictured and urge anyone who recognises them to make contact with us immediately. “If you see the men, please do not approach them but please contact 999 immediately."

