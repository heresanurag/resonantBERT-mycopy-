  While the list of Trump’s political appointees grows, there’s another group that stays small – and exceedingly influential. Elon Musk, the wealthiest man in the world, has been a full-time presence at Trump’s Mar-a-Lago transition headquarters. According to media reports, he is advising the president-elect on cabinet nominees and even joined a conversation between Trump and Ukrainian President Volodymyr Zelensky last week. On Tuesday night, Trump announced that he was assigning Musk to work with tech entrepreneur and former Republican presidential candidate Vivek Ramaswamy in a "department of government efficiency" tasked with identifying new budget cuts. Musk has regularly offered his political opinions on his social media platform X, including endorsing Florida Senator Rick Scott’s bid to be the next Senate majority leader. Musk’s political action committee spent around $200m to help Trump’s presidential campaign, and he promises to continue to fund the group’s efforts to advance the president-elect’s agenda and help Republican candidates in upcoming congressional elections. Meanwhile, it remains to be seen where Robert F Kennedy Jr, another key figure, lands. Trump has said that he plans to give the former Democrat and vaccine sceptic, who abandoned his independent bid and endorsed the Republican, a role in making America “healthy” again. “He wants to do some things, and we’re going to let him go to it,” Trump said in his election victory speech.

  As Trump takes office, Republicans have control of the Senate and could still take the House, albeit by a slim margin. However, the president-elect’s early actions suggest he is more concerned with exercising his presidential power than working with the legislative branch. Last week, he posted on social media that the Senate’s Republican leadership should smooth the way for more presidential “recess appointments” – allowing him to fill top administration jobs without Senate approval when Congress is not in session. The move would strengthen presidential power by undercutting the chamber’s constitutional role to “advise and consent” on political appointees. Meanwhile, the president-elect keeps chipping away at those narrow congressional majorities. Senators who move to administration roles can quickly be replaced by appointment from the governor of their home state. But any House vacancies – such as ones created by Stefanik and Waltz’s departures – require special elections that can take months to schedule. Some of Trump’s advisers, including Musk, have warned that the president-elect could be endangering his legislative agenda if he plucks too many more Republicans from the chambers. Even in the best of circumstances, congressional legislation takes time, effort and compromise. Executive action, such as new immigration enforcement, can be done with the stroke of a presidential pen. Trump’s actions indicate he is, at least at the moment, more focused on the latter.

  Trump has only just begun filling out the thousands of jobs that open up with a new presidential administration, not including the senior-level career bureaucrats he has said he will replace. In 2016, as a political newcomer, he had to rely on more establishment Republicans for key roles. This time, he has a wealth of prospective candidates with proven track records of supporting him and after eight years, Trump loyalists are the Republican establishment. On Tuesday, Trump named South Dakota Governor Kristi Noem as homeland security secretary, and Fox News host and conservative author Pete Hegseth as defence secretary. The latter has been particularly controversial, given his lack of experience navigating the sprawling US military bureaucracy and penchant for inflammatory remarks. For Trump, however, status as an outsider and a willingness to lean into hot-button cultural issues are a strength, not a flaw. And above all else, Hegseth and Noem have been fierce Trump defenders from the start. Some of Trump’s other picks, like Rubio and Stefanik, were critics of Trump early in his first presidential bid, but they have now spent years demonstrating that their harsh words are a thing of the past. Rubio, who ran for president against Trump in 2016, may still have White House ambitions, however. Trump often soured on appointees who seemed drawn to the limelight during his first term, and even the warmest of relationships could go bad. Trump may be placing a premium on loyalty with his early staff announcements, but the pressures of governing ultimately will reveal whether his second four years in office end up different from his first.
