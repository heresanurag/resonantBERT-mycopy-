  Many conservatives believe that China poses the single greatest threat to continued US global dominance, both economically and militarily. While Trump has been more circumspect, limiting most of his China critiques to the realm of trade, he is filling his foreign policy team with vocal China critics. The president-elect picked Florida Congressman Mike Waltz, a retired Army colonel, as his national security adviser – a key foreign policy post within the White House. Waltz has said the US is in a “cold war” with China and was one of the first members of Congress to call for a US boycott of the 2022 Beijing Winter Olympics. In October, Congresswoman Elise Stefanik, Trump’s pick for US ambassador to the UN, accused China of “blatant and malicious election interference” amid reports that China-backed hackers attempted to gather information from the former president’s phones. While Trump has yet to officially name his choice for secretary of state, Florida Senator Marco Rubio – another China hawk – appears to be the leading contender for the top diplomatic job. In 2020, Rubio was sanctioned by the Chinese government after he pushed measures to punish the nation for its crackdown on pro-democracy protestors in Hong Kong. US-China relations were often rocky during Trump's first term, amidst trade disputes and the Covid pandemic. The Biden administration, which kept many of Trump's China tariffs and imposed some new ones, only somewhat calmed the waters. Now it looks like the next Trump administration will pick up where the last one left off.
