content: |-
  The contours and priorities of his new presidency are starting to take shape as he fills key positions.

  What White House picks tell us about Trump 2.0

  Trump chose Congresswoman Elise Stefanik, who has been critical of China in the past, to be US ambassador to the United Nations.

  A week after Donald Trump won a second-term in the White House, the contours of his new presidency have started taking shape. The president-elect has announced nearly a dozen appointees, the first steps toward filling out his White House staff and key government departments. He also made comments to the media and on social media that highlight what his priorities will be upon taking office in January, with a special focus on immigration and foreign policy. After a sometimes chaotic start to his first term, Trump is laying the groundwork for his next administration with a more clearly defined plan - and personnel ready to enact it. Here’s a look at what we’ve learned so far.

  Some of Trump’s newly revealed appointments suggest that the president-elect’s campaign promise to deport millions of undocumented migrants living in the US is no exaggeration. Stephen Miller, who has been Trump’s close adviser and speechwriter since 2015, is Trump’s choice for White House deputy chief of staff for policy. He will likely shape any plans for mass deportations - and pare back both undocumented and legal immigration. During Trump's first term, Miller was involved in developing some of the administration's strictest immigration policies. Thomas Homan, acting director of the Immigration and Customs Enforcement Agency in Trump’s first term, supported the president’s policy of separating undocumented families detained at the US-Mexico border. Now he’s back with an even broader portfolio, as Trump’s “immigration tsar”. “I will run the biggest deportation force this country has ever seen,” Homan said at a conservative conference in July. Critics have warned that Trump’s mass deportation plan could cost upwards of $300bn. In an interview with NBC News last week, however, the president-elect said cost was not an issue. “When people have killed and murdered, when drug lords have destroyed countries, and now they’re going to go back to those countries because they’re not staying here,” he said. “There is no price tag.”
