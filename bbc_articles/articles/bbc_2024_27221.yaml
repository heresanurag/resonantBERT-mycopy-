title: Meteorologist becomes emotional giving Hurricane Milton update - BBC News
date: '2024-10-09'
section: General
url: http://www.bbc.co.uk/news/videos/cly5z4w388qo
content: |-
  Florida meteorologist John Morales became emotional as he gave an update on Hurricane Milton's dangerous and rapid intensification in the Gulf of Mexico.

  The weather system has rapidly intensified into a category five storm with winds of up to 175mph (281km/h).

  It is due to reach Florida on Wednesday night or early Thursday morning, according to the US National Hurricane Center.
