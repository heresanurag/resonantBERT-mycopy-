title: Trump mocks Haley after winning New Hampshire - BBC News
date: '2024-01-24'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-68077685
content: |-
  Donald Trump, who is the projected winner of the primary, criticised his rival's speech after the polls closed.

  Donald Trump criticised his rival Nikki Haley shortly after he was projected to win the New Hampshire primary on Tuesday.

  He said she was attempting to spin a defeat as a success. "Let’s not have someone take a victory when she had a very bad night," Mr Trump said.
