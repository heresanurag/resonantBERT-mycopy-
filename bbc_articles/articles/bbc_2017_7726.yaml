title: Prisoner back in jail after absconding in 1995 - BBC News
date: '2017-08-21'
section: England
url: http://www.bbc.co.uk/news/uk-england-41000696
content: |-
  Michael Ashworth, who absconded from jail in 1995, was arrested at the Channel Tunnel in France.

  Michael Ashworth was arrested as he tried to board a Eurotunnel shuttle to the UK

  A man who absconded from prison 22 years ago is back behind bars after being arrested in France.

  Michael John Ashworth, 57, was held in Coquelles on Sunday while trying to board a Eurotunnel shuttle to the UK.

  He absconded from HMP Sudbury in Derbyshire in 1995 during a five-year sentence for drugs offences and had been living in Holland.

  Medway magistrates said Ashworth, who was arrested by Kent Police officers, must serve the rest of his sentence.

  He had been accused of escaping from lawful custody, but the case was withdrawn by magistrates who heard he was on temporary licence and should not have been charged with the offence.

  Police had said he absconded in 1995 from HMP Sudbury and failed to return having been released on temporary licence.

  Ashworth said he had told police he wanted to hand himself in.

