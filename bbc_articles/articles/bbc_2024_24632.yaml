title: 'Rafael Nadal: Novak Djokovic and Roger Federer lead tributes after retirement
  announcement - BBC Sport'
date: '2024-10-10'
section: Tennis
url: http://www.bbc.co.uk/sport/tennis/articles/cy801wdv8p1o
content: |-
  Rafael Nadal is described as a "legend" and "one of the greatest of all time" after the tennis icon confirms he will retire at the end of this season.

  In addition to 14 French Open titles, Rafael Nadal is a four-time US Open champion and won both the Australian Open and Wimbledon twice

  Rafael Nadal has been described as a "legend" and "one of the greatest of all time" after the tennis icon confirmed he will retire at the end of this season. 'Big Three' rivals Roger Federer and Novak Djokovic have led the tributes to Spain's 22-time Grand Slam champion, who will compete for the final time at next month's Davis Cup Finals in Malaga. Known as the 'King of Clay' during an illustrious career in which he won 14 French Open titles, Nadal retires as the second-most successful men's singles player of all time, behind only Djokovic. "You have inspired millions of children to start playing tennis, and I think that is probably the greatest achievement anyone can wish for," said Djokovic, who confirmed he will be present in Malaga to "pay respect" to Nadal's career. "Your tenacity, dedication, fighting spirit is going to be taught for decades. Your legacy will live forever." While 24-time Slam winner Djokovic is still competing, Federer retired on 20 titles in 2022 - and famously cried alongside Nadal after the Swiss played his farewell tournament at the Laver Cup two years ago. Among many titanic battles for the sport's major prizes, the pair contested arguably "the greatest match ever played" in the 2008 Wimbledon final. "What a career, Rafa! I always hoped this day would never come," said Federer. "Thank you for the unforgettable memories and all your incredible achievements in the game we love. It's been an absolute honour."

