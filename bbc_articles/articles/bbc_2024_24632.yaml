  Jannik Sinner, the current men's world number one, said: "It's tough news for all the tennis world. I was very lucky to get to know him and he's an unbelievable person. "He gave to all of us a lot of emotions when we saw him playing." Women's world number four Coco Gauff said: "You are amazing! It's been so incredible to witness your greatness and work ethic and be able to learn from it." Ons Jabeur, the former world number two, said: "Thank you Rafa for inspiring me and all of us. You will be missed." The French Open posted on X: "14 thanks for the millions of memories!", while Wimbledon posted on Instagram: "Thank you for everything, Rafa." The Australian Open's X account posted: "Legendary memories. You are so loved around the world and here with us in Australia. Grateful for all the unforgettable moments. Gracias, Rafa. For everything!" Former British tennis player Greg Rusedski described Nadal as "a great competitor" and predicted nobody will beat the Spaniard's record of 14 French Open titles. "He's a legend of our game, he'll be truly missed," Rusedski told BBC Sport news correspondent Laura Scott. "To win that many matches on clay, no one will ever accomplish that feat again and that sort of winning record at the French Open." The ATP Tour posted: "There are no words for how this feels, the day we wished would never come. You have given us all the most incredible moments and memories." ITF president David Haggerty said: "Rafael Nadal is one of the greatest male tennis players of all time and as sad as it is to hear this news, I would like to congratulate him on his phenomenal career." International Olympic committee president Thomas Bach said: "You are a legend. A true Olympian and a great champion who understands the power of sport to make the world a better place. Whatever you do next, I am certain you will continue to give everything you have - as you have done throughout your career." Among the other sports stars to pay tribute to Nadal, Real Madrid and France footballer Kylian Mbappe posted on Instagram: "Well done on your career Rafa, you're an example as a player and a person. You will always be a legend." Portugal captain Cristiano Ronaldo said: "Rafa, what an incredible race you've had! Your dedication, passion and incredible talent have inspired millions around the world. It has been an honour to witness your journey and to be able to call you a friend. Congrats on an amazing career! Enjoy your retirement!"
