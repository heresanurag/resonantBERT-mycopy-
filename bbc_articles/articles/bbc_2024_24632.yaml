  Nadal's compatriot Carlos Alcaraz has already accumulated four Grand Slam titles as the 21-year-old looks to emulate the success of his childhood hero. Alcaraz, who partnered Nadal in the men's doubles at the Paris 2024 Olympics this summer, said he was "in shock" after he heard the news shortly before losing in the Shanghai Masters quarter-finals on Thursday. "Thankfully I saw it an hour before the match, so I had time to accept it. It is really difficult news, even tougher for me because he's been my idol since I started playing tennis," Alcaraz said. The world number two later posted on social media: "From the child who watched you on TV and dreamed of becoming a tennis player, to the one who had the immense gift of playing alongside you at Roland Garros representing Spain in the Olympic Games! "Thank you very much for being an example at all levels, your legacy is unrepeatable. I've enjoyed you so much and will miss you so much when you quit after Davis Cup, Rafa!"

