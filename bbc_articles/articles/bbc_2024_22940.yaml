  Hashim Salmman, defending, said Payne’s young age, lack of previous convictions and guilty pleas should be taken into account when sentencing. “You targeted a number of lone and therefore vulnerable women right in the heart of Swansea city centre,” he said. “You were intent on sexually assaulting any lone woman who crossed your path that night. “Then you continued to prowl the city, continuing to expose yourself and masturbating.” Judge Thomas said had the public not intervened Payne would have succeeded in raping both women. He was jailed and put on the sex offenders register for life. After sentencing, CPS Cymru-Wales' deputy chief Crown prosecutor, Iwan Jenkins, said Payne “prowled the city centre carrying out a campaign of terrifying sexual attacks and violent offences”.
