title: Swansea sex attacker who 'prowled' city for victims jailed - BBC News
date: '2024-09-23'
section: Wales
url: http://www.bbc.co.uk/news/articles/c93pn4l70y7o
content: |-
  Leo Payne is given a 16-year sentence for the attacks on two women.

  A sex attacker who "prowled" a city centre trying to rape women has been jailed. Swansea Crown Court heard Leo Payne, 20, from, Bonymaen, Swansea, attacked two women in the city in the early hours of 23 June. The 20-year-old was also seen exposing himself and performing a sex act in public, before hitting a man with a wine bottle. He pleaded guilty to two counts of attempted rape, sexual assault by penetration, exposure, and unlawful wounding.

  Payne was given a 16-year sentence, of which 11 years and three months will be served in prison. Carina Hughes, prosecuting, said Payne assaulted the first woman in the middle of the road on Strand, Swansea.

  The court heard the victim fought back, and the attack stopped when two taxi marshals chased him away while his trousers were down. Less than an hour later he sexually assaulted a second woman on Orchard Street after lying to her that he had a knife. The victim shouted for help and the attack was halted when members of the public stepped in. Later Payne was seen with his trousers down and performing a sex act on Walter Road. The court also heard Payne hit a man multiple times with a wine bottle, when he intervened as Payne followed another woman. Ms Hughes read victim impact statements by both women in which they spoke of their fear of walking alone since the assaults.

