title: 'Coronavirus: What we’ve learned about UK ''delay'' response - BBC News'
date: '2020-03-13'
section: General
url: http://www.bbc.co.uk/news/uk-51865454
content: |-
  The UK government have issued the next stage of response to the virus, with added measures for the public.

  The UK government has moved from the "containment" to the "delay" phase of its response to the Covid-19 outbreak.

  Seven-day self-isolation periods for those with persistent coughs or fevers were just one measure announced by Prime Minister Boris Johnson.

  Read more: People with fever or cough told to self-isolate
