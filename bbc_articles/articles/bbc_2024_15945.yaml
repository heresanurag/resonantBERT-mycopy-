content: |-
  Rikki Berry, 36, was shot on Quarryside Drive, Kirkby on Wednesday evening and died in hospital.

  Four arrests and vehicle seized over fatal shooting

  Rikki Berry, 36, was shot in Kirkby on Wednesday evening

  Four people have been arrested and a vehicle has been seized after the fatal shooting of a man on a Merseyside street. Rikki Berry, 36, was shot on Quarryside Drive in Kirkby, Knowsley, on Wednesday at about 18:35 BST, in what police believe was a targeted attack. Officers said "a vehicle of interest" was found in Prescot on Friday morning and has been taken for forensic inspection. Two women, aged 19 and 50, a 22-year-old man and a 15-year-old boy, all from Prescot, were held on suspicion of assisting an offender.

  Police patrols have been stepped up to provide reassurance to the community

  All four have been released on bail. A 20 year-old man, of Prescot, who was previously arrested on suspicion of murder has been conditionally bailed pending further inquiries, the force said. Mr Berry was taken to hospital but pronounced dead a short time later. Anyone who was in the area at the time and witnessed the incident or has video footage is asked to contact Merseyside Police. The force said a revolver and ammunition were recovered from wasteland close to Domingo Drive in Kirkby during a search on Thursday. Det Ch Insp Cath Cummings said: “Our investigation is making progress but I want to emphasise that we still need to speak to anyone who has yet to come forward, and as soon as possible."
