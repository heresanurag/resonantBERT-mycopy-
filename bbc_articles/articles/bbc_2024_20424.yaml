content: |-
  The storm has caused significant damage and flooding, resulting in two fatalities.

  The Winooski River has severely swollen after Hurricane Beryl's remnants lashed Vermont.

  Intense rainfall caused widespread flooding, damaged roads and homes across the region, resulting in two fatalities.
