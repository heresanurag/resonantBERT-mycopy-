content: |-
  Triple Paralympic champion Aled Sion Davies is awarded an OBE in the Queen's New Years Honours list for his services to athletics.

  Triple Paralympic champion Aled Sion Davies has been appointed an OBE in the Queen's New Years Honours list for his services to athletics.

  Davies won gold at his third successive games with success in the F63 shot put at Tokyo 2020, which had been delayed a year because of the pandemic.

  Davies had been awarded an MBE in 2013.
