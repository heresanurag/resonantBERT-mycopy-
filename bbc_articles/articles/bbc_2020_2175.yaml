title: Painkiller crash death nurse Cerys Price jailed - BBC News
date: '2020-02-06'
section: Wales
url: http://www.bbc.co.uk/news/uk-wales-51400335
content: |-
  Cerys Price killed Robert Dean as he was driving to his granddaughter's fourth birthday party.

  Cerys Price (centre) was found to have been in a "drugged up state" when she crashed into Robert Dean

  A "drugged-up" nurse who killed a man in a crash after taking a high dose of prescription painkillers has been jailed for five years and four months.

  Cerys Price, 28, crossed the central reservation of the A467 near Newport in July 2016 and crashed into the car of Robert Dean, 65. He died at the scene.

  Price, of Brynmawr, Blaenau Gwent, had taken tramadol before the crash.

  She denied causing death by dangerous driving, but was found guilty at a trial at Cardiff Crown Court.

  She was also found guilty of causing serious injury by dangerous driving to the passenger in her car, ex-boyfriend Jack Tinklin, 30.

  Timothy Evans, prosecuting, said: "Price had consumed an amount of tramadol significantly higher than any therapeutic range. She was in no way fit to drive a car. She was in a drugged-up state.

  "A completely innocent man, simply minding his own business driving along the opposite side of the road, lost his life."

