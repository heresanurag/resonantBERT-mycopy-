content: |-
  Two teenagers tell BBC Newsbeat what it was like to face the pros on court in SW19.

  We're the Wimbledon ball girls who took on the pros

  Aashny (left) and Saran (right) are both ball girls at Wimbledon

  Have you ever wanted to attend a huge event in person? Maybe you'd love to go to the Euros, or to see your favourite band. But while it's fun to imagine being part of the crowd, two teenagers from Surrey have taken that idea to the next level by playing tennis against some pros on court at Wimbledon. Aashny and Saran were working as ball girls at the time. In a clip posted by the official Wimbledon social accounts, the girls can be seen facing Britain's Jamie Delgado and Juan Sebastián Cabal from Colombia. Saran and Aashny have spoken to BBC Newsbeat about how they went from playing a supporting role to becoming part of the main event.

