  I also found an amazing podcast called The Philosopher's Zone. With some thinking time during this lockdown, this podcast is perfect for that. It covers so many different past philosophers as well as different debate topics. It's really nice to just put it on play and binge listen.

  I've started reading Aspire by Kevin Hall - an incredible read! It's very self-helpy (which is very me) but it's such a great read, it focuses on the power of words and how they make a real impact in our lives. I don't think I've sold that book well, but trust me on this one, haha!

