title: Dozens of women describe abuse by ex-doctor Larry Nassar - BBC News
date: '2018-01-17'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-42711940
content: |-
  Dozens of women abused by ex-Team USA gymnastics sports doctor Larry Nassar confront him in court.

  Nearly 100 women are expected to testify during a criminal sentencing hearing for ex-Team USA gymnastics sports doctor Larry Nassar, who pleaded guilty to sexually assaulting dozens of girls. Several women tearfully described how the 54-year-old abused them, imploring the court to impose the maximum sentence.
