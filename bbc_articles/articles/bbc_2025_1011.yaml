  Lucy Harrison was killed at the home of her father in Prosper, Texas, prompting a manslaughter investigation

  Police in Texas said they have launched a manslaughter investigation into the death of a British woman who was shot dead on holiday. Lucy Harrison, from Great Sankey in Warrington, Cheshire, was visiting her father in the town of Prosper, on the outskirts of Dallas, when she was fatally injured. A redacted report from the Prosper Police Department confirmed the case was being investigated as a "criminally negligent homicide". A spokesperson confirmed the case has been passed to the Collin County District Attorney (DA) for review.

  The exact circumstances of how Miss Harrison was shot at her father's property on the afternoon of 10 January have not been publicly revealed. The heavily redacted police report said a "suspect" had been identified by officers, along with five witnesses. The BBC understands the matter will be considered behind closed doors by a Grand Jury, which will decide if a criminal case should move forward. On Wednesday, an inquest was opened at Cheshire Coroner's Court in Warrington and adjourned until 28 March. After the hearing, a statement from Miss Harrison's family was shared via Cheshire Police. They described her as having lived "fiercely and fearlessly". "She was the embodiment of wonderful contradictions," her family said. "She adored travel and being away, experiencing new places and cultures, yet at the same time, she loved nothing more than snuggling up in her pyjamas with her candles on at home." They added she "was truly thriving in life and although this gives us great comfort, we are utterly heartbroken at the loss of our beautiful, gorgeous Luce".

