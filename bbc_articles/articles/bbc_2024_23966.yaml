content: |-
  'Everyone failed' Grenfell victims and 'now get them justice'

  Water company bosses could face up to two years in prison over pollution under government plans, the Daily Telegraph reports

  The publication of the final report from the inquiry into the Grenfell fire dominates the papers. The Guardian, external quotes the findings in its headline, saying the disaster was caused by "dishonesty and greed". Its front page - and those of many of this morning's papers - features pictures of the 72 victims of the fire, excepting those whose images have not been made public. The Times, external leads on calls from bereaved families for prosecutors to bring charges over the failings. The Daily Express, external describes the tower as a "death trap", alongside a picture of the burning building. The Financial Times, external tells its readers that warnings about the dangerous cladding were ignored, and that manufacturers "manipulated" testing. "Now get them justice," demands the Daily Mirror, external, which points out the latest official figures show that there are still more than 4,600 residential buildings in England with unsafe cladding. The i's headline, external reads "everyone failed them". The Daily Mail, external asks, "Will they ever get justice?", and notes the mounting pressure to speed up criminal charges. In its leader column, the Daily Telegraph, external says the inquiry's final report appears to have satisfied no-one and leaves bereaved families waiting many more years for justice if, the paper says, it ever comes. The Sun, external calls for the people responsible for the fire to be put "in the dock". The Telegraph's, external lead story focuses on the government's crackdown on water companies over pollution in rivers and seas. "Sewage leak water bosses to face two years' jail" reads its headline. The paper says there's been a "public outcry" over the regular dumping of sewage into waterways - and ministers believe that by making water companies pay for enforcement action, they can fund a major expansion of the Environment Agency's powers. But it also quotes critics who believe the plans don't go far enough. Campaigner Fergal Sharkey is apparently not sufficiently convinced to call off a mass protest planned for next month.

  The Daily Express, external says some temporary NHS staff fear speaking up about patient safety because they believe they could face discrimination as a result. The paper says a report by the Health Services Safety Investigations Body found that some workers felt "isolated" and worried about speaking up in case they lost future work opportunities. A number of the papers carry the ongoing story of the Oasis reunion after the band hit out against the practice known as "dynamic-pricing", which allows the price of tickets to rise in response to demand. "Definitely not me," says the Mirror, external. The paper reports that Oasis left all decisions about ticket pricing to their management. "Some might replay" reads the headline in the Sun, external. It says the band have pledged a fairer system when tickets for their two extra Wembley shows go on sale. The Times, external says Pope Francis has reignited his feud with childless pet-owners. It reports that, while addressing politicians in Indonesia, he said seeing people there having up to five children was an "example" for every country, adding that it "can't go well" when people prefer only to have pets. The paper recalls that last year he scolded a woman for referring to her dog as her baby.

