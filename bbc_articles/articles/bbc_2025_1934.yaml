id: bbc_2025_1934
title: Gas leak in Glasgow's Maryhill closes roads and evacuates buildings - BBC News
date: '2025-02-23'
section: General
url: http://www.bbc.co.uk/news/videos/c2415g23ql2o
content: |-
  Footage posted online showed a small fire burning in the road in Glasgow's west end.

  A main road in the west end of Glasgow was temporarily closed on Saturday because of a gas leak. Properties in the area were also evacuated.

  Emergency services were called out at about 11:45 on Saturday morning.

  Police Scotland said Maryhill Road was closed at its junctions with Garscube Road, Queen Margaret Drive and Hinshaw Street as a result.

  The force said Northpark Street was also closed and that Dunard Street was closed to vehicles.

  The fire service also attended, as did the gas distribution company SGN.

  Several properties were evacuated as a precaution, police said.

  Footage posted on social media showed a small fire on the pavement.

  The roads were reopened shortly before 19:00, police said.
