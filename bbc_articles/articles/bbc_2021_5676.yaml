title: 'Eurovision 2021: As it happened - BBC News'
date: '2021-05-22'
section: Entertainment & Arts
url: http://www.bbc.co.uk/news/live/entertainment-arts-57185284
content: |-
  Italy's Måneskin is this year's winner but the UK's James Newman came last with zero points.

  The Eurovision website has a short profile of the winning band, and says they are vocalist Damiano, bassist Victoria, guitarist Thomas and Ethan on drums.

  It says they took their band name from the Danish word for moonlight, as a tribute to their bassist Victoria’s home country.

  Although they have known each other since middle school, they didn't form the band until 2015. They cite their musical influences as rock, rap, reggae, funk and pop.

  The group is already well established in Italy, releasing two singles and their first chart-topping studio album Il ballo della vita in 2018.

  Two years ago they sold out 66 gigs and with 140,000 tickets for shows in Italy and across Europe.

  The Eurovision website's page also has a translation of the winning song's lyrics, which has a chorus:

  I'm out of my mind, but different from them/ And you are out of your mind, but different from them/ We are out of our minds, but different from them.
