id: bbc_2017_1541
title: Sports hall roof collapses during match in Czech Republic - BBC News
date: '2017-01-16'
section: General
url: http://www.bbc.co.uk/news/world-europe-38632441
content: |-
  A sports hall roof collapses during a floorball game in the Czech Republic city of Ceska Trebova.

  A sports hall roof collapsed on Saturday evening during a floorball game in the Czech Republic city of Ceska Trebova.

  No one was injured by the failure, though two people were hurt escaping the collapsing building.
