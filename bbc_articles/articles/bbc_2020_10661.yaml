title: 'Coronavirus: Caerphilly local lockdown explained - BBC News'
date: '2020-09-09'
section: General
url: http://www.bbc.co.uk/news/uk-wales-54081104
content: |-
  A rise in cases has been blamed on house parties and people failing to social distance.

  Caerphilly has been placed under lockdown following a spike in coronavirus cases.

  No-one is allowed to leave the county without good reason, with strict measures brought in at 18:00 BST on Tuesday.

  Family and friends living apart can no longer meet indoors, stay overnight or form extended households.

  The rise in cases has been blamed on house parties and people failing to social distance.
