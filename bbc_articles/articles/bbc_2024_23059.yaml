title: 'Salford: Woman and girl, 8, found dead at home identified - BBC News'
date: '2024-09-24'
section: Manchester
url: http://www.bbc.co.uk/news/articles/ced0ygj9g6eo
content: |-
  The pair, discovered in Salford, are identified by police as Martina Karos and child Eleni Edwards.

  Flowers and tributes were continuing to be left outside the home

  A woman and an eight-year-old girl found dead at a home in Greater Manchester have been identified by police as Martina Karos and child Eleni Edwards. The pair were found after emergency services were called to South Radford Street in Salford at 10:30 BST on Monday. A neighbour later said they were a "loving mother" and daughter who lived alone at the address. Det Ch Insp Charlotte Whalley said: "My thoughts, and the thoughts of the entire investigation team remain with the family of the Martina and Eleni."

  She added: "It is such a tragic loss of life, and our main priority is keeping their loved ones updated throughout the investigation." Greater Manchester Police said there were no suspicious circumstances and officers were not looking for anyone else in connection with the deaths.

  Police pictured at the scene of the home in South Radford Street

  The neighbour said the mother was half-Polish and half-Italian and had lived at the address for about two years. The mother was believed to have been a full-time carer for disabled Eleni. Flowers and tributes were continuing to be left outside the home. Among them, a teddy bear was left outside the end-of-terrace house, along with a card which read "rest in paradise". Det Ch Insp Whalley said: "We know there will be some disruption to the local community, but it is so important that we do this. "We need to be able to provide loved ones with the information they need to process this news. "We thank the public for their patience whilst we investigate and their compassion. She added that a file would be passed to the coroner.
