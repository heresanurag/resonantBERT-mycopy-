  The summer holidays will provide a natural firebreak, he says, as he asks parents to remain cautious.

  A man leaves a booth after being vaccinated in Beijing Image caption: A man leaves a booth after being vaccinated in Beijing

  China has now carried out 1.24bn vaccinations, according to the latest government data.

  As the country has 1.4bn people, this equates to 88% of the population having received a single dose, or 44% fully vaccinated.

  This means that China has been successful in meeting its goal of vaccinating 40% of the population by the end of June.

  The national Global Times newspaper says “several provinces said they had achieved the goal in advance”.

  Its success is due to the country being a major producer of domestic vaccines; the National Health Commission says China has the capacity to produce "close to five billion vaccine doses" annually.

  The country will now aim to ensure that 70% of the population are vaccinated by the end of the year.

  Officials have said the threshold for “herd immunity” in China will be where at least 80% of the population are vaccinated. The aim is to meet this by early 2022; but some cities, including the capital Beijing, say they are already there.

  Meanwhile, Taiwan has vaccinated roughly 7% of its 23.5m population . Vaccination has been slower here due to short supply. Originally, Taiwan only had several hundreds of thousands of doses of AstraZeneca.

  However, since experiencing a severe outbreak in May, it has received millions of doses of both AstraZeneca and Moderna from Japan and the US.

  Another batch of doses has just arrived in Taiwan in the last 24 hours - this time from the Netherlands.

  Taiwan is an island that has, for all practical purposes, been independent since 1950, but which China regards as a rebel region that must be reunited with the mainland - by force if necessary.
