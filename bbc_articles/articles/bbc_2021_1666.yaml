content: |-
  US president Joe Biden emailed Cardiff player Anna Hursey, 14, who is a UN climate change champion.

  This video can not be played To play this video you need to enable JavaScript in your browser.

  One of Wales' most talented young sports stars has been advising the new US president on halting climate change.

  Joe Biden emailed Anna Hursey,14, from Cardiff, who is a United Nations champion for climate change in sport.

  Anna made history as the youngest-ever athlete to compete in the Commonwealth Games in 2018, aged only 11.

  And she has now sent her most important message to Mr Biden - that we all can take steps to help the world reach zero carbon emissions.

  President Biden has put climate change at the top of his agenda and on 22 April's Earth Day, he will host a summit of world leaders.

  On him getting in touch Anna, who will be bidding for medals at next year's Commonwealth Games and the 2024 Paris Olympics, said: "I was really surprised, I thought it was an amazing opportunity.

  "His new agenda for climate change is bold, to achieve zero emissions in America by 2050 is incredible, so he's doing a lot already."

  Her profile as a young environmentalist was raised by her UN appointment last year.

  Since then, more than 110 sports organisations have signed up to the UN framework, pledging to promote environmental awareness and increase responsibility.

  President Biden seemed impressed by the 14-year-old's climate change credentials

  Anna said everyone can do more to protect the planet - a message she is keen to give to the new president.

  "There are some really simple things we can do, cycling instead of using the car, using less plastic," she said.

  Anna, who started playing table tennis as a toddler, swiftly rose through the rankings and in 2018 travelled to Australia's Gold Coast, representing Wales for the games, in the singles and doubles.

  She went to live and train full time in China to achieve her dreams of Commonwealth and Olympic medal glory.

  However, since the coronavirus outbreak she has been back in Wales, which means combining five hours of training with the Welsh senior squad six days a week and doing schoolwork online.
