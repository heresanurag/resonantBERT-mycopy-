title: 'Aidan Mann stabbing: Man in court over Downpatrick murder - BBC News'
date: '2022-01-06'
section: Northern Ireland
url: http://www.bbc.co.uk/news/uk-northern-ireland-59877826
content: |-
  Barry Donnelly is accused of stabbing the 28-year-old tattoo artist in Downpatrick on Monday.

  Aidan Mann, 28, was originally from Bangor but had recently moved to Downpatrick

  A 36-year-old man has appeared in court charged with the murder of Aidan Mann in Downpatrick, County Down, on Monday morning.

  The 28-year-old tattoo artist was attacked in Church Street at about 11:00 GMT.

  The victim was given treatment by paramedics but died at the scene.

  Barry Donnelly, of Church Street in Downpatrick, appeared at Newtownards Magistrates' Court on Wednesday morning via video-link.

  He is charged with murder and possessing two large kitchen knives in a public place.

  The court heard Mr Donnelly confirm he understood the charges against him.

  A defence solicitor said no bail application was being made.

  The case was adjourned to 27 January when the defendant is due to appear at Downpatrick Magistrates' Court via video-link.

  Aidan Mann was originally from Bangor, but had moved to Downpatrick in late 2021.
