content: |-
  Kamala Harris was appearing in Milwaukee as delegates at the DNC in Chicago threw their support behind her campaign for the presidency.

  Kamala Harris was appearing before a raucous crowd in Milwaukee as delegates at the Democratic National Convention in Chicago threw their support behind her campaign for the presidency.

  She spoke to them via a live link after a ceremonial roll call in which delegates from each state - as well as US territories - symbolically cast votes for her.

  Kamala Harris had already clinched her party’s nomination earlier this month through a virtual roll call.
