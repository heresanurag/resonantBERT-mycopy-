title: 'Mexican mining rescue: Ten miners trapped underground - BBC News'
date: '2022-08-07'
section: General
url: http://www.bbc.co.uk/news/world-latin-america-62455948
content: |-
  The 10 workers are stuck underground in Coahuila after a tunnel wall collapsed in a mine shaft.

  Ten miners have been trapped underground for more than three days in Coahuila, Mexico.

  More than 300 soldiers and other personnel have joined the rescue effort, including six divers from Mexican Special Forces.

  The coal mine opened in January and had no "record of complaints for any type of abnormality", according to the country's labour ministry.
