  Not so long ago, Nicole Yeargin's coach told her "no-one cares" about relay medals. But two bronzes in Paris has completed the set of Olympic, world, European and Commonwealth podium places for the US-born sprinter. She might only have run in the heats in the mixed, but Yeargin played a key role on the third leg as the Team GB quartet took bronze in the women’s final.

  Rowan McKellar had been in the women's four who finished fourth in Tokyo and memories of that heartbreak have never been far from her mind. So it was little surprise that the 30-year-old from Glasgow was in bits as soon as the boat broke through the finish line, less than a second ahead of the Australians. "As soon as we crossed the line, I had to cry," she told BBC Scotland. "I have just been a bundle of nerves for days, it is just complete relief."
