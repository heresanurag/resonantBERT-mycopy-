id: bbc_2017_2690
title: Driver screams obscenities at BBC presenter Jeremy Vine - BBC News
date: '2017-02-01'
section: General
url: http://www.bbc.co.uk/news/uk-england-london-38830432
content: |-
  Jeremy Vine posted footage of a driver screaming obscenities at him as he cycled in Kensington.

  A driver filmed screaming obscenities at BBC presenter Jeremy Vine as he cycled on a narrow road has been found guilty of road rage offences.

  Shanique Syrena Pearson, 22, made a gun sign and threatened Mr Vine during the row in Kensington, west London.

  Mr Vine filmed the argument using his helmet camera and posted it online.
