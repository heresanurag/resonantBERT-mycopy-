content: |-
  Filming for the final ever episode of the comedy series Gavin and Stacey has started in Barry.

  The BBC shared a clapperboard from the first day of filming for the final episode of Gavin and Stacey

  Filming for the final ever episode of the hit comedy series Gavin and Stacey has started. The BBC shared an image of a clapperboard from the first day on set, external, with the caption: "The final episode of Gavin & Stacey started filming today. Truth be told, we’re a little bit excited." The show's co-creators Ruth Jones and James Corden said in May the show would return for one last episode, to be aired on Christmas Day. On Monday morning, Corden shared a picture of his character Smithy's van, with the caption: "Day 1. Here we go."

