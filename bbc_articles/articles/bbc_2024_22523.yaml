  Speaking last month after revealing the final script was finished, Corden said he felt very emotional". "We will never write anything that Pam says again," Corden told Chris Evans on Virgin Radio. “We will never come up with an interesting thing that Bryn has done. “And we just looked at each other and we [Corden and Jones] were just like, ‘ah, isn’t that amazing?’ To even have the luxury of deciding to end it and to be in a position where people still care. “It’s inconceivable to us – all of it. I just feel very emotional by all of it. Everything.”
