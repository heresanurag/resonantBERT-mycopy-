  The comedy, which aired for three series between 2007 and 2010, followed the central characters of Gavin and Stacey - played by Mathew Horne and Joanna Page - as they pursued a relationship across Essex and south Wales. It returned in 2019 for a Christmas special that ended on a cliff-hanger when Nessa, played by Jones, got down on one knee to propose to Smithy, played by Corden. The festive episode scored the highest overnight Christmas ratings in 12 years when it aired, attracting an average audience of 11.6 million viewers - making it the biggest festive special since Christmas Day 2008.

  Gavin and Stacey first aired on the BBC in 2007

  Most episodes of the show - including many of the scenes that are set in Essex - were actually filmed in and around the town of Barry, Vale of Glamorgan. On Sunday, Jones was spotted having lunch at Marco's cafe on the seafront, known for its role in the show as where Stacey worked, and just a few doors down from where Nessa worked in an arcade. And on Friday, Welsh actor Rob Brydon, who plays Uncle Bryn on the show, posted a selfie with Ruth Jones on Instagram with the caption: "Something's occurring..."

