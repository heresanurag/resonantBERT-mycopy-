title: 'Duffield murder probe: Man and woman found dead at house - BBC News'
date: '2020-01-01'
section: Derby
url: http://www.bbc.co.uk/news/uk-england-derbyshire-50965109
content: |-
  A man is arrested after two bodies were found at a house in the early hours of New Year's Day.

  The area has been cordoned off while police investigate

  Two people have been found dead at a house in Derbyshire, prompting a double murder investigation.

  Officers were called to the home in New Zealand Lane, Duffield, at about 04:00 GMT where a man and a woman were found fatally injured inside.

  A 39-year-old man was arrested at the scene on suspicion of two counts of murder.

  Police said they were not looking for anyone else in connection with the deaths.

  They added no-one else was in the house at the time.

  The victims have not yet been formally identified but officers were supporting their families, a police spokesperson said.

  New Zealand Lane remains closed while officers continue investigations at the scene.

  Police thanked residents for their "patience and understanding" over the road closure.

  People living nearby have said they were shocked by what has happened in what they said was usually a quiet area.

