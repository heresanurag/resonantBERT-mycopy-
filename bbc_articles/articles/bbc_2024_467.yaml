title: Cat and dog theft set to be made criminal offence - BBC News
date: '2024-01-19'
section: UK Politics
url: http://www.bbc.co.uk/news/uk-politics-68021178
content: |-
  The government is getting behind MP Anna Firth's attempt to crackdown on pet abductions.

  The government has backed proposals to make stealing cats and dogs a specific criminal offence in England and Northern Ireland.

  A bill which would create an offence of "pet abduction" passed its first Commons hurdle unopposed on Friday.

  Under the legislation, anyone convicted of the offence could face a fine or a maximum of five years in prison.

  It will now face further scrutiny from MPs and peers but government support means it is more likely to become law.

  Currently, pets are considered in law to be property and stealing a pet is covered by the 1968 Theft Act. The law is similar in Scotland.

  The government promised to make the abduction of dogs a criminal offence in 2021, but no such legislation has yet been passed.

  Measures were included in the Animal Welfare (Kept Animals) Bill, which was dropped by ministers in May 2023, prompting a backlash from campaigners.

  The government had promised measures in the bill would be enacted by other means, including using private members' bills introduced by backbench MPs.

  The initial pledge followed recommendations made by a pet theft taskforce established in response to concerns about dog theft during the Covid pandemic.

  The Pet Abduction Bill was brought forward by Conservative MP Anna Firth.

  "I just find it unbelievable that we treat the loss of a living creature, a member of our family, as if it is a power tool or a laptop."

