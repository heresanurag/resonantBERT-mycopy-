  The BBC's Dan Johnson spent time with a police team trying to get knives off the city's streets.

  Police are constantly looking at different ways to tackle knife crime and the devastating impact it can have on communities.

  The BBC's west of England correspondent, Dan Johnson, spent time with a team in Bristol who are trying to get knives off the streets.

  He watched as they stopped a car, discovering weapons inside.

