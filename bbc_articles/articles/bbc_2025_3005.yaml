  How much attention did you pay to what has been going on in the world over the past seven days?

  Weekly quiz: Why did this pub landlady give away £1,500 of free beer?

  This week saw some of the world's biggest pop stars celebrate the year in music, Donald Trump slap tariffs on China and one English pub landlady make a very expensive promise. But how much attention did you pay to what else has been going on in the world over the past seven days?

