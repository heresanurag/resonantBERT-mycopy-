title: Ben Wallace and Alister Jack stand guard over Queen's coffin - BBC News
date: '2022-09-16'
section: General
url: http://www.bbc.co.uk/news/uk-62921909
content: |-
  The defence secretary and Scottish secretary take part in the vigil as the monarch lies in state.

  Defence Secretary Ben Wallace and Scottish Secretary Alister Jack have been taking part in the vigil around the Queen's coffin as she lies in state in Westminster Hall.

  The two cabinet members took their positions side-by-side, dressed in dark uniforms, on Thursday afternoon.

  Both politicians are members of the Royal Company of Archers, which functions as the monarch's bodyguard in Scotland.

  The Queen's coffin is being guarded in Westminster Hall 24-hours-a-day by units from the Sovereign's Bodyguard, the Household Division or Yeoman Warders of the Tower of London.
