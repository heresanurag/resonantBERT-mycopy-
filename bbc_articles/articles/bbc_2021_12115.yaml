title: Fabrice Muamba's son 'faced racist chants' in school rugby game - BBC News
date: '2021-09-12'
section: Manchester
url: http://www.bbc.co.uk/news/uk-england-manchester-58536338
content: |-
  A top school is investigating after Fabrice Muamba says his son was abused during a rugby game.

  Fabrice Muamba: 'Be careful what you are teaching your children'

  One of the country's top schools has launched an investigation after former footballer Fabrice Muamba said his son faced racist abuse in a school rugby game.

  Mr Muamba tweeted that his 12-year-old son "received monkey chants" from opponents at Manchester Grammar School after scoring a try.

  "Racism is learnt; be careful what you are teaching your children," he said.

  The school said it condemned racism and would "take the appropriate action".

  In a statement, it added: "We are a diverse school with pupils from all backgrounds, and we take any allegations of racism incredibly seriously.

  "Racism is abhorrent and we know the damage, distress and upset it causes. It is something we talk about regularly to all pupils."

