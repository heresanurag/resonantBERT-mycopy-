content: |-
  The United States Air Force says it is unclear if the "small unmanned aerial systems" were hostile.

  Mystery drones seen over three US air bases in UK

  RAF Lakenheath is home to the USAF's 48th Fighter Wing, aka the Liberty Wing

  A number of unidentified drones have been spotted over three airbases in Britain, the United States Air Force (USAF) has confirmed. The incidents, which occurred between Wednesday and Friday, saw "small unmanned aerial systems" spotted over RAF Lakenheath and RAF Mildenhall, in Suffolk, and RAF Feltwell in the neighbouring county of Norfolk. The USAF, which uses the bases, said it was unclear at this stage whether the drones were considered hostile. It also declined to comment on whether any defence mechanisms were used, but said it retained "the right to protect" installations.

  RAF Mildenhall in Suffolk is home to the USAF's refuelling wing in Europe

  A spokesperson for USAF in Europe said: "We can confirm that small unmanned aerial systems [UASs] were spotted in the vicinity of and over RAF Lakenheath, RAF Mildenhall and RAF Feltwell. "The number of UASs fluctuated and they ranged in size/configuration. "The UASs were actively monitored and installation leaders determined that none of the incursions impacted base residents or critical infrastructure. "To protect operational security, we do not discuss our specific force protection measures but retain the right to protect the installation. "We continue to monitor our airspace and are working with host-nation authorities and mission partners to ensure the safety of base personnel, facilities and assets."

  RAF Mildenhall is primarily home to the USAF's 100th Air Refueling Wing; RAF Lakenheath is home to USAF F-35A and F-15E fighter jets, while RAF Feltwell is mainly concerned with logistics and offers housing for military personnel.

  A spokesperson for the British Ministry of Defence, which owns the bases, said: "We take threats seriously and maintain robust measures at defence sites. "We won't comment further on security procedures."

