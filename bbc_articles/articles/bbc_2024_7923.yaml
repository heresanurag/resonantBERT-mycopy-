title: Moment spire collapses at Copenhagen stock exchange - BBC News
date: '2024-04-17'
section: General
url: http://www.bbc.co.uk/news/world-europe-68825078
content: |-
  Video posted on social media captured the iconic spire tumbling to the ground after fire ravages the building.

  The 17th Century Børsen is one of the city's oldest buildings and is a stone's throw from Denmark's parliament, the Folketing, and the royal palace, Christiansborg.

  The old stock exchange commissioned by Denmark's King Christian IV with the aim of turning Copenhagen into a major trading centre was being renovated and had been shrouded in scaffolding and protective plastic covering.

  It currently houses the Danish chamber of commerce and everyone inside the building managed to escape.

