id: bbc_2024_10917
title: The moment pastor survives shooting attempt during sermon - BBC News
date: '2024-05-07'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-68924801
content: |-
  Pennsylvania pastor Glenn Germany escaped injury when gunman's firearm failed to discharge.

  A gunman attempted to shoot pastor Glenn Germany during his sermon at Jesus' Dwelling Place Church in Pittsburgh, Pennsylvania on Sunday.

  Officials identified the gunman as 26-year-old Bernard Polite. Mr Germany escaped with his life because Mr Polite's firearm failed to discharge.

  After Mr Polite's arrest, police found another man fatally shot at his North Braddock home. The victim was identified as Derek Polite, 56. Police have not yet commented on Bernard Polite's relationship with him.
