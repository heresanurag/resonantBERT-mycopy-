title: 'Aberfan: Man in court over stabbing of pregnant woman - BBC News'
date: '2024-01-04'
section: Wales
url: http://www.bbc.co.uk/news/uk-wales-67880689
content: |-
  Andrea Pintili was airlifted to hospital after being stabbed near her home in December.

  A man has appeared in court accused of the attempted murder of a pregnant woman who was stabbed near her home.

  Daniel Mihail Popescu, 29, of Merthyr Tydfil, is also charged with witness intimidation and stalking.

  Andrea Pintili, 29, of Moy Road, Aberfan, was stabbed on 5 December.

  Mr Popescu spoke through a Romanian translator to confirm his name and date of birth but was not formally arraigned, pending psychiatric reports.

  A five-day trial has been provisionally set for 3 June at Merthyr Tydfil Crown Court.
