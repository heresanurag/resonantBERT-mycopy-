title: Students return with school restrictions lifted - BBC News
date: '2021-09-06'
section: General
url: http://www.bbc.co.uk/news/education-58443186
content: |-
  Students across the UK are returning to school after the summer break and and a year disrupted by Covid.

  Students across the UK have gone back to school after their summer break and a year disrupted by Covid.

  Most restrictions for students have been lifted, with face masks requirements and isolation bubbles gone.

  Those in Scotland still have to social distance.
