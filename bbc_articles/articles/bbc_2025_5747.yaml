  Weekly quiz: Anora cleaned up but who left the Oscars empty-handed?

  This week saw Hollywood celebrate the year in film at the Oscars, Donald Trump tell the US that he had "just got started", and scientists in Scotland unveil a dinosaur the size of a pony. But how much attention did you pay to what else has been going on in the world over the past seven days?

