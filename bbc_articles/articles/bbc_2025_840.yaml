content: |-
  Marius Ciolac, 35, was fatally shot at the police station car park in Derby.

  Footage has been released showing the moments before a man was fatally shot at a police station in Derby.

  Derby Coroner's Court has heard Marius Ciolac entered Ascot Drive police station holding a knife and a bag with a cat inside on the morning of 7 October 2022.

  CCTV and bodyworn footage, released by Derbyshire Police, shows Mr Ciolac smashing windows at the police station, while officers inside shout "put the knife down, drop the knife".

  An inquest into the 35-year-old's death heard the Romanian national entered the police station compound through a sliding gate.

  Officers used a Taser, baton round and stun grenade, before Mr Ciolac was shot in the abdomen minutes later. He died in hospital.
