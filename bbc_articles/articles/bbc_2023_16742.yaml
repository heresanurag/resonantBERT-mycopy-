content: |-
  The Bryant family continue to search for answers after their son vanished without a trace in 2013.

  Allan Bryant disappeared on a night out with friends in his hometown of Glenrothes in Fife in 2013.

  The 23-year-old was last seen on CCTV leaving the Styx nightclub, less than a mile from his house. No trace of him has ever been found since.

  While he is still classed as a missing person, Allan's family believe he has come to harm. A decade since his disappearance, they continue the fight to keep his name in the public eye.

  This is their story.
