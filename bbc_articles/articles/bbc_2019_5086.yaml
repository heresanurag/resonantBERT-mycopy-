  For Mrs Cromie, the public inquiry hearings in Belfast are another step on a long road.

  She said: "At the start when I got it I was told by a couple of nurses, hepatitis nurses, not to tell too many people.

  "I just had to say: 'Oh I caught a virus.'

  "That's what I said instead of being able to say: 'I got hepatitis C through infected blood.'"

  "But now, I will say to people when they say about, you know, your transplants and things, I say: 'Yeah I got it through contaminated blood.'

  "And my husband says the same to people. Through no fault of my own, I got it."
