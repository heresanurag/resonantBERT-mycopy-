title: William, Kate, Meghan and Harry pay respects at Windsor - BBC News
date: '2022-09-10'
section: General
url: http://www.bbc.co.uk/news/uk-62862575
content: |-
  All four of the royals are seen together to view tributes to the Queen.

  William and Catherine, the new Prince and Princess of Wales, along with Harry and Meghan, are viewing tributes outside the grounds of Windsor Castle.

  It's the first public appearance the royal couples have made together since the passing of the Queen.

  Read more on the BBC News Live page.
