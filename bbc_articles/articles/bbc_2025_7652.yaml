content: |-
  A blame game begins amid reports solid fuel intended for ballistic missiles may have been improperly stored.

  Mourning turns to anger in Iran after massive port explosion kills 40

  Thick black smoke was still towering above the port on Sunday

  In Iran, mourning is turning to anger after a huge blast at its largest commercial port killed at least 40 people and injured more than 1,000. The explosion happened on Saturday morning at Shahid Rajaee port. Many people rushed to hospitals up and down the country to give blood. A day later, fires are still blazing as a thick black cloud of toxic chemicals hangs over the surrounding area. People in nearby towns and cities have been told by the health ministry to stay indoors "until further notice" and wear more protective clothes. In the nearby southern city of Bandar Abbas, home to the Iranian Navy's main base, all schools and offices were ordered to shut on Sunday to allow authorities to focus on the emergency effort, state TV said. A local festival not far from Shahid Rajee Port that was supposed to be a celebration spontaneously turned into a solemn occasion for remembering the dead and praying for the injured. Authorities declared a day of national mourning on Monday, with an additional two days of mourning in Hormozgan province. It is a reminder that while Iran has been rocked physically by the blast - residents up to 50km (31 miles) away reported feeling the effects - the country is now being rocked by a growing blame game too.

  Ambrey Intelligence, a private maritime risk consultancy, said it believed that intense fires that could be seen spreading between containers before the explosion were a result of "improper handling of a shipment of solid fuel intended for use in Iranian ballistic missiles". The firm said it believed the affected containers had contained solid fuel destined for ballistic missiles, and was aware that an Iran-flagged ship "discharged a shipment of sodium perchlorate rocket fuel at the port in March 2025". The New York Times quoted a person with ties to Iran's Islamic Revolutionary Guard Corps, speaking on condition of anonymity, as saying that what exploded was sodium perchlorate - a major ingredient in solid fuel for missiles. Some Iranians are asking whether they should believe speculation on social media which said Iran's military and Revolutionary Guard were storing rocket fuel that they had recently imported from China at the port – a claim which has been denied by an army spokesman. Many in Iran are blaming the authorities for incompetence and worse, asking: How could so much inflammable material apparently be left on the port without due care?

