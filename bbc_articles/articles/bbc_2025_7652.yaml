  That is a question that the Iranian regime will need to address. Iranian President Masoud Pezeshkian visited the scene of the explosion on Sunday, saying: "We have come to see first-hand if there is anything or any issue that the government can follow up on." Pezeshkian had previously ordered an investigation into the cause of the blast, sending the interior minister to the region to lead it. Defence ministry spokesman Reza Talaei-Nik later told state TV that "there has been no imported or exported cargo for military fuel or military use in the area". The port's customs office said in a statement carried by state television that the explosion probably resulted from a fire that broke out at the hazardous and chemical materials' storage depot.

  Fires are still blazing more than a day after the blast

  There is also the question of whether Iran's economy may be affected, given the port handles nearly 80% of the country's imports. On Saturday, authorities were warning of possible food shortages in the near term with the port out of action for some time. A day later, they were playing that down, saying that the explosion only affected a part of the port and that the rest is functioning normally. An image from Iran's Tasnim news agency on Sunday showed a helicopter flying through a sky blackened by smoke to drop water on the disaster-struck area, AFP reported. Others showed firefighters working among toppled and blackened cargo containers, and carrying out the body of a victim. The authorities have closed off roads leading to the site.

  A charred truck lies at the scene of an explosion that took place a day earlier at the Shahid Rajaee port

  The Kremlin said Russian President Vladimir Putin had ordered that multiple specialist firefighting aircraft be sent to Iran to help deal with the aftermath of the disaster. Beijing's foreign ministry said in a statement to AFP on Sunday that three Chinese victims were in a "stable" condition and that it had received no further reports of casualties. Among the condolences being sent were from the United Arab Emirates, Saudi Arabia, Pakistan, India, Turkey, the United Nations and Russia. The explosion ripped through the port as Iranian and US delegations were meeting via mediators in Oman for high-level talks on Tehran's nuclear programme, with both sides reporting progress. Iran has said it is open to curbs on its nuclear programme in return for sanctions easing but has insisted it will not stop enriching uranium. It insists its nuclear programme is for civilian use.
