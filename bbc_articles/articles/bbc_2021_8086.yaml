title: 'Coronavirus: Walk-in Covid vaccine clinics open in ''final push'' - BBC News'
date: '2021-07-03'
section: Northern Ireland
url: http://www.bbc.co.uk/news/uk-northern-ireland-57698508
content: |-
  It's hoped the appointment-free venues will encourage younger people to come forward for vaccination.

  The mobile unit at Belfast City Hall offered the Pfizer vaccine to anyone unvaccinated aged over-18

  Appointment-free vaccine clinics have been operating in Northern Ireland in a "final push" to get younger people vaccinated against Covid-19.

  About 50% of those aged 18 and over and two-thirds of 30 to 40-year-olds have had a first dose.

  About 95% of all those aged over 50 have had a first dose of a Covid-19 vaccine.

  Overall, about 60% of adults in Northern Ireland are fully vaccinated with two doses.

