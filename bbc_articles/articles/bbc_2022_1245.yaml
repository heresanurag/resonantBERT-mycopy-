title: Lampeter man John Jones dies after being bitten by dogs - BBC News
date: '2022-01-12'
section: Wales
url: http://www.bbc.co.uk/news/uk-wales-59963866
content: |-
  John William Jones died at the scene and a woman has been arrested.

  John William Jones was pronounced dead at the scene

  A 68-year-old man has died after being bitten by dogs.

  John William Jones was pronounced dead at a house in Pleasant Hill in Lampeter, Ceredigion.

  Dyfed-Powys Police said officers were called just after 17:00 GMT on 10 January to reports that a man had been bitten by dogs within the house.

  A woman was arrested on suspicion of being in charge of a dog dangerously out of control and has been released under investigation.

  Dyfed-Powys Police said the three dogs involved did not fall under the Dangerous Dogs Act 1991 and have been removed from the property.

  An inquest into Mr Jones's death has been opened and adjourned.
