title: Dashcam shows tornado obliterate Nebraska building - BBC News
date: '2024-05-06'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-68964597
content: |-
  There were dozens of workers still inside when the extreme weather event struck - but all survived.

  Video has emerged of the moment a tornado destroyed a building in Lincoln, Nebraska, on 26 April.

  According to local media, there were dozens of workers still inside the industrial parts complex when the extreme weather event struck - but all survived.
