title: Russian prisoners arrive in Moscow following swap - BBC News
date: '2024-08-02'
section: General
url: http://www.bbc.co.uk/news/videos/c0dmemx80m2o
content: |-
  The former prisoners have been greeted by President Vladimir Putin as they walk out of the plane.

  A group of former prisoners has arrived back in Moscow after a historic exchange between Russia and the West.

  Among them is a Russian couple convicted of spying in Slovenia, who returned to Moscow with their two children.

  Russian President Vladimir Putin greeted each person as they stepped off the plane.

  The swap freed 24 prisoners being held in six countries: 16 detainees from the West and eight from Russia.
