  England's former deputy chief medical officer says police urged his family to temporarily move out of their home.

  Sunak looks set to be asked about advice sought for Eat Out to Help Out

  While we wait for the inquiry to resume, here's something that was brought up a little earlier in the House of Commons... Eat Out to Help Out was the scheme which offered us all a tenner towards a meal out. The idea, dreamt up by the Treasury, was to get the ailing hospitality industry going after the first lockdown. And it keeps coming up in this Inquiry. We've already heard senior civil servants in Downing Street didn't know about it before it was launched. This week we hear the government's two most senior scientific advisors at the time didn't either. On Monday Sir Patrick Vallance - the UK's chief scientific officer- said he didn't know about it until it was announced. He said, had he, "our advice would have been very clear". Today Prof Sir Chris Whitty had a similar view. But at Prime Minister's Questions earlier, Rishi Sunak insisted the government took advice from scientific advisers throughout the pandemic. Whether that's the same as the Treasury asking for advice on this specific scheme - he was the chancellor at the time - is almost certainly a question he'll be asked when he's up in front of the inquiry in the next few weeks.
