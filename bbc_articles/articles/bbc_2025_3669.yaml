  Cornwall Wildlife Trust says people are mistakenly returning the turtles to the water.

  Warning after turtles wash up on Cornwall beaches

  People should call the British Divers Marine Life Rescue (BDMLR) if they see a turtle

  Residents in Cornwall have been urged not to put turtles washed up on beaches back in the water. There have been reports of marine turtles stranded along the coast which "need urgent assistance to survive", Cornwall Wildlife Trust said. A spokesperson said people had mistakenly returned the turtles to the water but this could make the creatures more susceptible to drowning. Bex Allen, marine conservation officer at the trust, said a "quick phone call could save a turtle's life".

  She said Cornish waters were "generally too cold for marine turtles" and it was vital to act quickly if people found one at the beach. People should call the British Divers Marine Life Rescue (BDMLR) or, if the turtle is dead, contact the Marine Strandings hotline. Ms Allen said: "We do occasionally get marine turtles coming ashore along our coast and it's understandable that people want to help when they see a marine animal in trouble. "So, we're urging everyone to be aware of what to do in these situations – a quick phone call could save a turtle's life."

  Dan Jarvis, from British Divers Marine Life Rescue (BDMLR), said two washed up turtles had recently been reported in south east Cornwall. "We believe both of them probably were deceased," he told BBC Radio Cornwall. "We are just looking to some raise awareness out there that there are turtles potentially around at the moment. "If you do see them please do report them as soon as you can as they may still be alive."
