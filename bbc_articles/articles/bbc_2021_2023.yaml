  Covid cases are falling in most of the UK, ONS figures suggest.

  Five reasons to be (cautiously) hopeful on Covid

  It’s been a difficult few months with a surge in infections, tens of thousands of deaths and a damaging lockdown caused by the coronavirus pandemic. But there are now plenty of reasons to be, at least cautiously, hopeful that we are on the road to recovery. So what are they? We’re past the peak - Infection levels have been falling since early January and, in recent weeks, that has translated into fewer people being admitted to hospital. Vaccination programme going well - The UK has vaccinated more than 10 million people - more per head of population than almost anywhere in the world. Vaccination should slow the spread - As well as protecting the individual who has been vaccinated from developing Covid, there are growing signs the immunisation programme will also slow the spread of the virus between people. Infection offers long-lasting protection - Another factor that will help reduce the burden of Covid is that so many people have now been exposed to the virus, and the latest research suggests they should have lasting protection. The mutations can be beaten - There has been a lot of concern about how the virus is mutating – with new varients being found in the UK and South Africa. But this does not mean the vaccinations are ineffective.
