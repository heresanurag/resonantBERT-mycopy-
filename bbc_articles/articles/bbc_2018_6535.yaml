title: Icy dip to mark winter solstice in Antarctica - BBC News
date: '2018-06-21'
section: General
url: http://www.bbc.co.uk/news/world-44559948
content: |-
  Australian scientists take the plunge to welcome the return of brighter days after weeks of darkness.

  Australian scientists take the plunge in a traditional celebration to welcome the return of brighter days.

  They're based at Casey Station on the Antarctic coast, which manages a couple of hours of daylight this time of year.
