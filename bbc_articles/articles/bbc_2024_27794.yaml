title: 'M5 ''critical incident'': Girl dies after leaving police vehicle - BBC News'
date: '2024-11-13'
section: Somerset
url: http://www.bbc.co.uk/news/articles/c4gzjyeqlpxo
content: |-
  The 17-year-old was being transported to custody when she left the vehicle and was hit by a car.

  Avon and Somerset Police said the girl had been detained by officers shortly before the incident

  A 17-year-old girl died after being hit by a car on the M5 shortly after getting out of a stationary police vehicle, the police watchdog has said. The Independent Office for Police Conduct (IOPC) said the teenager was being transported to custody by Avon and Somerset Police before the incident, which happened between junctions 24 for Bridgwater and 25 for Taunton, Somerset. Police said the girl left the vehicle after officers stopped on the northbound carriageway and was later hit by another vehicle on the opposite side, at about 23:00 GMT on Monday. An IOPC spokesperson said an investigation had begun, adding: "Our sympathies are with the girl’s loved ones and everyone affected by her death."

  This video can not be played To play this video you need to enable JavaScript in your browser.

  The spokesperson added: "We were advised by Avon and Somerset Police that the girl was being transported to custody in a police vehicle and had got out of the vehicle shortly before the collision." IOPC investigators were later sent to the scene to gather evidence. Police said the ambulance service was on the scene within minutes but the girl was pronounced dead at the scene.

  Det Ch Supt Rachel Shields said the force's thoughts were "first and foremost with the girl's family", who were being supported by specially trained officers "at what is an incredibly difficult time following the tragic loss of such a young life". “A critical incident was declared and our Professional Standards Department notified overnight. A mandatory referral has been made to the IOPC," she said. “We recognise this incident has had a significant effect on the devastated officers, plus members of the public, who witnessed what happened, as well as other officers and staff involved in our response. "We will ensure staff are able to access any welfare support they may benefit from following this tragedy."

  There were long delays on the M5 after the closure between junctions 24 for Bridgwater and 25 for Taunton

  The M5 was closed in both directions following the crash while inquiries were carried out and repairs were made to make the motorway safe. National Highways confirmed at 10.20 GMT on Tuesday the northbound carriageway had reopened between junctions 24 and 25, and the southbound carriageway reopened shortly afterwards. The site of the collision is near Creech Heathfield, close to Taunton. There are long delays on local roads, especially the A38 near North Petherton and Bridgwater. Motorists travelling southbound on the M5 have been experiencing delays of 90 minutes, with seven miles of congestion. There have been delays of 30 minutes and congestion for two miles northbound. Anyone who witnessed the collision or may have dashcam footage which could help the investigation is urged to contact police.

