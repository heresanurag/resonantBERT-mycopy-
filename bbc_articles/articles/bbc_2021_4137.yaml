  • None Leicester failed to muster a single shot in the first half for the first time in a Premier League game since December 2019 against Liverpool.
  • None Jamie Vardy made his 300th league appearance for Leicester since his debut in August 2012, with the striker scoring 135 goals in those games, 93 more than any other Foxes player in that time.
  • None Benjamin Mendy netted just his second Premier League goal for Manchester City, with those two coming in his past six appearances in the competition, after failing to find the back of the net in his first 39.
  • None Gabriel Jesus has scored in five of his six Premier League appearances against Leicester (5 goals) - only scoring more against Everton (7) in the top flight.

  While Leicester have a full week to prepare for next Sunday's match at fellow top-four hopefuls West Ham (14:05 BST), Manchester City now turn their thoughts to Europe and a Champions League quarter-final first-leg home tie with Borussia Dortmund on Tuesday (20:00).
