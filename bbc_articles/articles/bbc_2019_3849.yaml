  Gavin Garraway was driving near Clapham Common Tube station when he was attacked on Friday.

  Mr Garraway was attacked near Clapham Common Tube station in south-west London

  A teenager has appeared in court charged with the murder of a man who was stabbed to death in his car.

  Father-of-three Gavin Garraway, 40, was driving near Clapham Common Tube station, in south-west London, when he was attacked on Friday afternoon.

  Zion Chiata, 18, of Patmore Estate, Battersea, appeared at Westminster Magistrates' Court accused of murder and possession of a bladed article.

  He was remanded in custody to appear at the Old Bailey on Friday.

  A 14-year-old boy and 19-year-old man arrested on suspicion of murder have been released under investigation.

  Mr Garraway, from Lambeth, died at the scene of the attack in Clapham Park Road. He was described by friends as a "loving" father.

