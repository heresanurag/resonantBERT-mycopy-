  Mott’s position is less certain, simply because head coaches are easier to replace. Key has already tipped one member of Mott’s backroom staff, former all-rounder Andrew Flintoff, as a future candidate for the main job, external. Ex-England batter Jonathan Trott has done his standing no harm by leading Afghanistan to the semi-finals. The task ahead of Mott is also not the one he was brought in to do. When he took charge, Morgan was captain and England’s white-ball team supreme. Mott was asked to repeat what he had achieved with the Australia women's side - keep them at the top of the game in a prolonged period of dominance. His England team is now in need of a refresh to build towards the T20 World Cup in India and Sri Lanka in 2026 and the 50-over showpiece a year later in South Africa, Zimbabwe and Namibia. Chris Jordan and Moeen Ali, aged 35 and 36 respectively, are the most obvious members of this squad to be thanked and moved on. Moeen said last year he did not think he should be part of the 50-over set-up going forward. A difficult decision is looming over 34-year-old Jonny Bairstow, who batted well at times but managed only 23 runs combined in his innings against Australia, South Africa and India. The selection of this summer's Test squad was pushed until after this World Cup in case it required an awkward conversation. Should Bairstow not get picked to play West Indies on 10 July, it is not impossible the Yorkshireman has played his last international. England have to hope leg-spinner Adil Rashid does not follow his mate Moeen into the sunset. His 10 wickets at an average of 19 and an economy below seven here show he remains one of the best in the world aged 36. He, Buttler, who will be 36 at the next T20 World Cup, and Archer should be the core going forward, along with younger men in Brook and Phil Salt. After that, a cupboard that once had Alex Hales, Dawid Malan and Sam Billings on the outside looks a little bare. Had a batter got injured in this tournament, the uncapped Tom Kohler-Cadmore, 29, would have been one of the next in line. England’s famed white-ball depth is not what it once was. Their next limited-overs series begins in September, one day after the third Test against Sri Lanka ends. By its end, the Test players will be leaving for Pakistan. Naturally there will be changes and last year’s list of central contracts give a clue to the bowlers who could come in. Expect fast bowlers Gus Atkinson and Brydon Carse, the latter will by then have served a three-month ban for betting offences, to feature in future squads, plus Hampshire quick John Turner. Whether Mott stays to make those calls remains to be seen. If you came here looking for definitive answers, I apologise. Perhaps that is part of the problem.
