content: |-
  An up-and-down T20 World Cup means questions about England's hierarchy have not been answered and doubts remain about the future, writes Matthew Henry.

  This video can not be played To play this video you need to enable JavaScript in your browser.

  If you are here to avoid discussion about the future of an England management struggling at a major tournament you are in the wrong place. For Gareth Southgate, see Jos Buttler and Matthew Mott. England’s semi-final defeat by India in Guyana was emphatic. It brought an end to their reign as T20 World Cup champions. In many ways it told us what we already knew – that England struggle on slow, low pitches and their bowling attack is not quite at the elite level. But at the same time this tournament leaves unanswered questions, namely, are England any good and are Mott and Buttler the right leaders to take them back to the top of the white-ball game? That those doubts remain is a problem for the coach and captain.

  Just days ago it felt like England had turned a corner. It seemed their leadership duo had wriggled free of the ghosts of last year’s disappointing defence of the 50-over World Cup. A run to the semi-finals would have been viewed as a decent effort in another world. But defeat by 68 runs brings those demons back into view, especially in a tournament where three of your four wins came against Namibia, Oman and the United States. Now, for the first time in five years, England do not hold a white-ball trophy. England's managing director of men's cricket Rob Key must decide whether there has been enough from Buttler and Mott to remain for the next one - the Champions Trophy in Pakistan in February. Buttler’s case is strengthened by the lack of alternatives. Harry Brook is the only realistic candidate of a suitable age, who is also guaranteed a place in the XI. Some doubt whether the job would suit the 25-year-old, but he has led Yorkshire four times in the T20 Blast and England at an Under-19 World Cup. Captaincy has never seemed to come as naturally to Buttler as it did his predecessor and close friend Eoin Morgan.

  This video can not be played To play this video you need to enable JavaScript in your browser.

  Speak to those close to Buttler and they insist he is the right man – a calm head with a smart cricket brain who can lead by example as England’s greatest white-ball batter. Big mistakes were made in India last year – decisions at the toss in Mumbai and against Afghanistan and bizarre switches in team selection – and Buttler’s call to give part-timer Will Jacks the second over against Australia in this tournament, a move he described as being a “gut” feeling at the time, was another. But he also deserves credit for other moves here, such as his bowling changes in England’s one impressive win against West Indies. He kept spirits high and his message clear when he fronted up as England’s campaign threatened to end after just two weeks. When England arrived in Antigua that week, with just one point and a huge net run-rate disadvantage to Scotland, they could have crumbled – as they did across 11 days in defeats by Afghanistan, South Africa and Sri Lanka in India last year. That campaign broke at the seams. This one steadied and corrected itself, albeit against poor opposition. Buttler, who led England to the title in 2022 with Mott, probably deserves to choose if he wants to go on.

