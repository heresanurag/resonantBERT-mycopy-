title: Could you endure Nasa's 3D-printed Mars simulation? - BBC News
date: '2023-04-12'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-65247481
content: |-
  For a full year, four people will live in a simulation of the planet to help Nasa prepare for human exploration there.

  For a full year, four people will live in a simulation of the planet Mars to help Nasa prepare for human exploration there.

  During the simulation, crew members will carry out different types of mission activities, like simulated spacewalks and robotic operations.

  To be as Mars-realistic as feasible, they will also face environmental stressors such as resource limitations, isolation and equipment failure.
