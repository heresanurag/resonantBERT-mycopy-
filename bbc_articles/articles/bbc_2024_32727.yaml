title: 'Saydnaya Prison: Mapping the Assads'' ''human slaughterhouse'' - BBC News'
date: '2024-12-09'
section: Middle East
url: http://www.bbc.co.uk/news/articles/c938lxengy9o
content: |-
  Thousands of people have been executed and tortured in the secretive prison since the 1980s.

  The Saydnaya Prison pictured on Monday morning by the White Helmets - a Syrian civil defence organisation

  Since the collapse of the Assad regime on Sunday, Syrian civilians hoping for news of their relatives have been flocking towards the country's most secretive and notorious prison, Saydnaya. Established in the early 1980s in a small town about 30km (19 miles) north of the capital Damascus, Saydnaya is where the Assad family has held opponents of their regime for decades. Referred to as a "human slaughterhouse" by rights groups, external, thousands of people are said to have been detained, tortured and executed at the prison since the Syrian civil war began in 2011. The layout of Saydnaya has been a closely guarded secret and images from inside the prison have never been seen before.

  Details of the prison's layout can only be established based on interviews with former guards and detainees. But information from rights groups and the US State Department have offered an insight into the building which became a powerful symbol of the Assads' brutal and repressive rule.

  Saydnaya was for decades administered by the Syrian military police and military intelligence, with construction beginning in the early 1980s. The first detainees arrived at the 1.4 sq km facility in 1987 - 16 years into the rule of President Hafeez al-Assad, Bashar's father. Once fully operational the prison contained two main detention facilities. The White Building was, according to rights groups, mainly built to hold military officers and troops suspected of being disloyal to the regime. It was an L-shaped complex in the south-east of the sprawling complex. The Red Building - the main prison - was for opponents of the regime, initially comprising those suspected of membership of Islamist groups. This wing was noted for its distinctive Y-shape, with three straight corridors spreading out from a central hub. Around 10,000-20,000 people could be housed between the two buildings, according to rights groups that have spoken to released prisoners. Videos circulating online since Sunday - which have been authenticated by BBC Verify - showed a large surveillance room in the prison filled with CCTV screens showing what appeared to be dozens of prison cells.

  A 2017 report by Amnesty International citing ex-guards at the prison found that after the Syrian civil war began in 2011 the White Building was emptied of existing prisoners, and prepared instead to house those detained for taking part in protests opposing President Bashar al-Assad's regime. One former officer told Amnesty that "after 2011, [Saydnaya] became the main political prison in Syria". The organisation also quoted testimony from former prisoners claiming that those held in the Red Building were frequently exposed to various methods of torture, including severe beatings, rape and denial of access to food and medicine. Housed beneath the White Building is what those speaking to Amnesty called an "execution room", where detainees in the Red Building would be transported to be hanged. A former guard said that a list of those to be executed from the Red Building would arrive at lunchtime. Troops would then take those marked for death to a basement holding cell - which could sometimes contain up to 100 people - where they were subjected to beatings.
