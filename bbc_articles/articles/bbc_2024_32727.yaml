  • None HTS leader not only player in Syria's fast-changing future Prisoners who spoke to Amnesty said detainees in the Red Building were typically "transferred" from the building in the dead of night - usually between midnight and 03:00. Blindfolded detainees were then led down a flight of stairs into the "execution room" in the south-east section of the White Building, before being led up onto a one metre-high platform with 10 nooses from which they were hanged. According to Amnesty, in 2012 the room was expanded, with a second platform with 20 more nooses. In footage shared by rebel-affiliated media after the fall of the regime, fighters displayed dozens of nooses they found in rooms around Saydnaya. It is estimated by rights groups that more than 30,000 detainees had either been executed or died as a result of torture, lack of medical care or starvation between 2011 and 2018. Citing accounts from the few released inmates, at least another 500 detainees had been executed between 2018 and 2021, the Association of the Missing and Detainees in Saydnaya Prison (AMDSP) said in 2022. In 2017, the US State Department claimed that authorities had constructed a possible crematorium on the site to dispose of the remains of murdered prisoners. In the images below, a small wing can be seen adjoining the White Building.

  A State Department spokesperson said officials had built the facility as part of "an effort to cover up the extent of mass murders taking place in Saydnaya prison". Satellite images released by US investigators showed a structure which they said was a small building converted into a crematorium. Officials said snow melt on the roof of the building helped to back up their claims - adding that at least 50 prisoners a day were being hanged at the facility at the time.

  Throughout its history, the facility was heavily guarded, with fortifications surrounding the grounds. The exterior of the prison was patrolled by a detachment of 200 troops from the military, with an additional 250 soldiers from military intelligence and the military police responsible for interior security, according to the 2022 report from AMDSP. Troops from the 21st Brigade of the army's Third Division were chosen to defend the prison because of their strong loyalty to the regime. Soldiers were commanded by officers from President Bashar al-Assad's Alawite minority. Since the downfall of the Assad regime, civilians have been urged to avoid rushing through the perimeter of the prison. Rights groups say the exterior of the complex is known to be heavily mined. A ring of anti-tank munitions runs around the exterior of the prison, with a secondary ring of anti-personnel mines running through the centre of the facility.

  Images released by the White Helmets - a Syrian civil defence group - showed high walls topped with barbed wire also surrounding the complex. Guard towers can also be seen dotted around the facility. The Assad regime always denied the accusations levelled against it by international organisations, calling them "baseless" and "devoid of truth". Amnesty says for families who suspect their relatives have been held in Saydnaya the fall of the regime "raises the prospect that they could finally discover the fate of their missing loved ones, in some cases decades later".
