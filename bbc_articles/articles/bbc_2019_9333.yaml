title: President Trump concerned by 'white supremacists and antifa' - BBC News
date: '2019-08-07'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-49244768
content: |-
  President Trump vows to act against "white supremacists and antifa".

  Talking to reporters at the White House, President Donald Trump said he's concerned about the rise of hate groups - he mentioned white supremacists as well as the left-wing militant antifa.
