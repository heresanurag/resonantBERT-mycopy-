  Goods worth billions cross the borders of the US, Canada and Mexico each day and their economies are deeply integrated. The Canadian Chamber of Commerce warned that affordability would be hurt and business relationships would suffer, despite the chances for targeted relief. "We've seen this movie before. President Trump puts tariffs in place and then doles out exemptions one at a time," said Matthew Holmes, the organisation's chief of public policy. "That is not how a long-lasting trade alliance is built." Ontario Premier Doug Ford told Canadian media that the one-month reprieve for automakers would not alter his plans for retaliation, which have already included a halt to sales of US liquor in the province.

  Trump's moves, and his threats to impose "reciprocal" tariffs on countries around the world, have raised fears of a wider trade war. As well as Mexico and Canada, he hit goods from China with an additional tariff on Tuesday, raising levies to at least 20% and prompting the country to retaliate against US exports, including agricultural products. Canada also responded with its own retaliatory import levies on US goods after Washington's 25% tariffs on its two neighbours came into effect on Tuesday, affecting items including peanut butter, oranges and wine. Mexico also said it would respond, including with its own tariffs. "I don't know where we go with this and how it ends. I just hope that it ends quickly," said Iowa farmer Bob Hemesath, the board president for lobby group Farmers for Free Trade, which has raised concerns about the tariffs.

  Big retailers in the US have already warned the measures will lead to higher prices on goods such as avocados within days, while economists are forecasting economic recessions in Mexico and Canada triggered by the tariffs. Trump has acknowledged his moves may lead to short-term economic pain in the US, but said he wants to protect US industry and boost manufacturing. He has cast the tariffs this week against goods from America's two neighbours, as well as China, as a response to the flow of migrants and fentanyl across the border. Writing on social media on Wednesday, Trump said he had told Trudeau that the situation was not improving. "He said that it's gotten better, but I said, 'That's not good enough'," Trump said. Trudeau has called called Trump's claims about drugs a "completely bogus" justification for tariffs on his country. White House officials have said Trump still intends to move ahead on 2 April with plans for reciprocal tariffs on other countries around the world that he sees as treating the US unfairly. "There are going to be tariffs - let's be clear - but what he's thinking about is which sections of the market that maybe he'll consider giving them relief until we get to, of course, April 2," Commerce Secretary Howard Lutnick told Bloomberg on Wednesday.
