title: Carmakers win reprieve from Trump's tariffs on Canada and Mexico - BBC News
date: '2025-03-06'
section: Business
url: http://www.bbc.co.uk/news/articles/c62zn47d5j1o
content: |-
  Trump says he will exempt cars from the new import taxes, while continuing his criticism of Canada.

  Carmakers win break from Trump's tariffs on Canada and Mexico

  US President Donald Trump said he would temporarily spare carmakers from a new 25% import tax imposed on Canada and Mexico, just a day after the tariffs came into effect. The announcement by the White House came even as Trump continued to blast Canada for not doing enough to stop drugs from entering the US. "Nothing has convinced me that it has stopped," Trump wrote on social media after a phone call with Canadian Prime Minister Justin Trudeau about the economic disruption caused by new trade tariffs. News of the relief helped to boost US shares, which closed higher after two days of declines that had wiped out gains the S&P 500 had seen since the presidential election in November.

  The tariff exemption is for cars made in North America that comply with the continent's existing free trade agreement. That deal, which was negotiated by Trump during his first term, sets out rules for how much of a car must be made in each country to qualify for duty-free treatment.
  • None China says it is ready for 'any type of war' with US
  • None What are tariffs and why is Trump using them? White House press secretary Karoline Leavitt said Trump had backed a one-month exemption to the tariffs for the car industry after pleas from Ford, General Motors and Stellantis, which have supply chains that stretch across North America. The new tariffs - which are a tax applied as goods enter the country - were poised to disrupt a third of car production in North America within a week, according to analysts at S&P Global Mobility. Shares in Ford were up by more than 5% after the announcement, while General Motors shares rose more than 7%. Stellantis shares in the US rose more than 9%. "The president is open to hearing about additional exemptions," Ms Leavitt added. "He always has open dialogue and he'll always do what he believes is right for the American people." Ford said in a statement the company will continue to have a "healthy and candid dialogue with the administration" and touted its investment of billions in the United States.

