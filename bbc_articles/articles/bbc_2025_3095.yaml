content: |-
  Ireland's Sam Prendergast is staying level-headed while the hype around him continues to grow.

  This video can not be played To play this video you need to enable JavaScript in your browser.

  Sam Prendergast tightened his grip on Ireland's number 10 jersey with an impressive display in Sunday's dominant win over Scotland at Murrayfield, but he is staying level-headed while the hype around him continues to grow. Prendergast, 21, had not played an away fixture for Ireland before Sunday and was winning just his fifth cap in a team filled with experience. But he looked as comfortable as any player in green, scoring 12 points while orchestrating the attack through an impressive range of passing, kicking and decision-making. Speaking on the BBC's television coverage, legendary Irish out-half Ronan O'Gara showered praise on the Leinster youngster, labelling him a "master of control". "[Prendergast has] been one of the shining lights, one of the three best performers on the pitch," O'Gara said after Ireland's powerful first-half display put them 17-5 ahead. "He's very composed, a good kick strategy, good decisions on when to run, when to kick, when to play the ball in front of his forwards. While a smiling Prendergast insists he did "not particularly" feel like O'Gara's description, he was happy to receive a "nice compliment from a very good player" while consciously focusing on the team's fast start. "I thought it was really good and it just kind of let us build a bit of momentum," said Prendergast, who was named player of the match.

  Prendergast has started Ireland's past four Tests, helping steer them to back-to-back Six Nations victories over England and Scotland which leaves Simon Easterby's team as the only side still able to win the Grand Slam. Having been preferred to Jack Crowley, Prendergast missed a couple of kicks against England but was strong off the tee and in open play at Murrayfield. "I wanted to do better than I did last week," he added. "I was a bit more used to the shot clock again but it was good." In a cramped corridor in the bowels of Murrayfield, softly spoken Prendergast constantly batted away attention on his own efforts, instead shining the light on the "world-class" players around him. "You look at the backs outside me and in terms of the managing the game, the help I get, there's a lot of world-class players in that backline. "It's a lot easier and then what the forwards are giving us both from the starters and bench, it's unbelievable to be a part of." While Ireland raced into a 17-0 lead, Scotland narrowed the gap to six points through a Duhan van der Merwe try and two Blair Kinghorn penalties. But Prendergast insists there was no panic in the Irish ranks, even during Scotland's resurgence either side of half-time. "We felt pretty good in the first half and they got a few, not lucky breaks, but a few things going their way. "I think we did well not to concede the tries off the back of it."

