  With a trip to Wales next for Ireland on 22 February, Prendergast could win a Triple Crown in just his third Six Nations appearance. But he is not entertaining any thoughts of silverware or milestones just yet. "I was just focused on this game. The only experience I have of the Six Nations before this is in the under-20s, but in terms of building game to game, it's quite similar. "You just need to keep taking each games as it comes. I'm not too focused on milestones, I'm just focused on getting better each week. "Now we have a week with no game so it's an opportunity to learn and get better."
