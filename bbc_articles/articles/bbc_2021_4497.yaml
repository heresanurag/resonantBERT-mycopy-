title: 'Greenwich murder: Woman stabbed to death in flat - BBC News'
date: '2021-04-04'
section: London
url: http://www.bbc.co.uk/news/uk-england-london-56632024
content: |-
  A man is arrested on suspicion of murdering a woman who was found seriously injured in Greenwich.

  The woman was found in a block of flats in Ravine Grove

  A 39-year-old man has been arrested on suspicion of murdering a woman who was stabbed to death in a flat.

  The Met Police said she was found seriously injured by emergency service workers at about 02:15 BST in Ravine Grove in Greenwich, south-east London.

  Paramedics treated her for stab wounds at the scene but she died an hour later.

  Officers are working to establish her identity and a post-mortem examination has not yet been held.

  The arrested man remains in custody at a police station in south London.

