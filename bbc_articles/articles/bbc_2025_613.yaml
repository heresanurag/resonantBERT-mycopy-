content: |-
  A range of stories on Tuesday's front pages including Sir Keir Starmer backing a Daily Mirror campaign.

  PM backs pub campaign and 'Farage deal for the birds'

  King Charles and Angela Rayner sharing a joke on their visit to Nansledan

  Several front pages carry images of King Charles, the prime minister and Angela Rayner during a visit to Cornwall while separately featuring stories highlight concerns about Donald Trump's new tariffs on steel. "UK fears steel industry faces a fatal blow" is the headline in the i newspaper, external as the trade union community says the levy "would be hugely damaging and threaten jobs". Britain is not expected to join the EU in responding with retaliatory tariffs, the Times, external reports. Meanwhile the Daily Telegraph, external says it understands that Sir Keir Starmer could visit President Trump as soon as next week.

  The front of Tuesday's Daily Express, external pictures two farmers with their young son at yesterday's protest in London against the government's changes to inheritance tax. Sir Keir Starmer has backed the Daily Mirror's, external campaign to save Britain's pubs from closure, the paper says. In other news, the Guardian, external leads with MPs are to scrap the requirement for a high court judge to decide on assisted dying cases amid growing concerns over the legislation, with an expert panel to scrutinise decisions instead. Finally, the Sun, external says Labour has now stumbled into a "fresh wokery row", because Andrew Gwynne's replacement as health minister, Ashley Dalton, thinks "people can self-identify as a llama".

