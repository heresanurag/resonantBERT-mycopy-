content: |-
  Six months on Vern Unsworth says he is amazed by the group's strength and recovery after the Thai cave drama.

  In July, the world watched on as a group of footballers were dramatically rescued from a cave in Thailand.

  Six months on, one of their rescuers - Briton Vern Unsworth - praises the "close-knit" group for their strength and recovery.
