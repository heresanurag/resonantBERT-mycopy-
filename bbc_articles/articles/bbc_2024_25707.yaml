title: 'Michael Cheika: Leicester Tigers head coach banned for ''disrespecting'' match-day
  doctor - BBC Sport'
date: '2024-10-02'
section: Leicester
url: http://www.bbc.co.uk/sport/rugby-union/articles/cm24enlnnvqo
content: |-
  Leicester head coach Michael Cheika is suspended by the RFU for "disrespecting" a match-day doctor in his first game in charge of the Tigers.

  Michael Cheika has overseen one win and one loss from his two games in charge of Leicester Tigers

  Leicester Tigers head coach Michael Cheika has been suspended by the Rugby Football Union (RFU) for "disrespecting" a match-day doctor in his first game in charge of the Premiership side. The 57-year-old Australian was charged with a breach of rule 5.12, which covers actions "prejudicial to the interests of the game", for his conduct towards the doctor after Leicester's narrow opening-day win at Exeter Chiefs. The former Australia and Argentina head coach was hit with a two-week ban, with one suspended until the end of the season, after an independent disciplinary panel heard the case on Tuesday night. Tigers were critical of decision and have come out to express their "dissatisfaction" that Cheika was deemed to be "disrespectful".

  The details of Cheika's issues with the match doctor and the circumstances around the incident are not known with the full judgement yet to be released by the RFU. He will miss Saturday's Premiership match away to Newcastle Falcons as a result. "The panel found that Michael Cheika disrespected the Independent match day doctor in challenging the decision he had made that a player was subject to an IPR (Immediate Permanent Removal)," said Richard Whittam, who chaired the panel. "Although it was an unusual case because there was a lack of clarity about the decisions made about the head injuries, the decisions of the Independent Match Day Doctor must be respected. "In this particular case, the appropriate sanction was one of two weeks. The panel mitigated this by suspending one week until the end of the season." In response, Tigers' executive chairman Peter Tom said they will consider an appeal once they receive written reasons for the judgement, and stressed they "would never question the World Rugby HIA [head injury assessment] process, when correctly implemented" and are "rigorously committed to the safety, wellbeing and health of our players". Tom added: "Whilst the panel have yet to provide reasons for its decision, the club is particularly disappointed with the disrespectful finding given that multiple witnesses gave evidence at the disciplinary hearing supporting Michael's version of events. "The club is also disappointed that despite its request not to do so, the RFU issued a statement announcing the panel’s decision despite the club having not yet been provided with the written judgment and knowing the exact reasons for the decision."
