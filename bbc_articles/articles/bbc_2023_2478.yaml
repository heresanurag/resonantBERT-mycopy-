title: 'WATCH: Key moments from PM''s NI Brexit deal speech - BBC News'
date: '2023-02-27'
section: General
url: http://www.bbc.co.uk/news/uk-64791359
content: |-
  Rishi Sunak hails the "breakthrough" agreement in a joint speech with EU chief Ursula von der Leyen.

  Rishi Sunak said today's agreement on new post-Brexit trade arrangements for Northern Ireland marks a "new chapter" in the UK's relationship with the EU.

  The deal will preserve the "delicate balance" in the 1998 Good Friday Agreement that protects the "aspirations and identity" of all people in Northern Ireland, the prime minister said in a press conference.

  The PM and European Commission President Ursula von der Leyen met in Windsor to finalise the agreement, which follows months of negotiations.
