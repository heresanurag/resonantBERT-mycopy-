  Manhunt for prisoner on the run from Wormwood Scrubs

  Graham Gomm, 63, managed to slip away during hospital treatment

  A manhunt is under way after a prisoner absconded from a west London prison while being treated in hospital. Graham Gomm, 63, was taken to Hammersmith Hospital by prison staff yesterday after becoming unwell. He had been on remand for burglary offences at HMP Wormwood Scrubs, the Met Police confirmed. There is nothing to suggest that he is a threat to the public, the Met added.

  Police were alerted at about 01:20 BST on Thursday that Mr Gomm had absconded. Mr Gomm was last seen wearing a grey T-shirt and grey tracksuit. Officers are carrying out searches and reviewing CCTV as well as visiting address related to him. A force spokesperson said there was also concern about Mr Gomm's welfare, as he undergoing medical treatment before he escaped.
  • None Where do prisoners 'on the run' go?

  HMP Wormwood Scrubs is a category B men's prison which houses around 1,000 inmates. It is the second time in three years that a prisoner has gone on the run from the prison during a medical visit. In 2021, Manray Woolfall fled when he was being taken to a central London hospital after a suspected medical episode.
