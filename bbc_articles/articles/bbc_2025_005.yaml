  The Met Police believes the house was targeted between 17:00 and 17:30 GMT by a man who climbed in through a second-floor window. The suspect is described as white, aged in his late 20s to 30s, and is said to have worn a dark hoodie, cargo pants and grey baseball cap and had kept his face covered. Avenue Road, where the raid took place, links the Swiss Cottage and Regent's Park areas and has some of the most expensive properties in London.
