  Minutes later the Labour Party shared a video of its own, declaring: "You can't trust the Tories with the NHS."

  Sorry, we're having trouble displaying this content. View original content on Facebook The BBC is not responsible for the content of external sites. Facebook content may contain adverts.

  And then, via an odd forced handshake and further sparring, the debate drew to a close - and the rush for supporters to declare their man the winner began.

  "Boris Johnson... was the undisputed winner of that debate," trumpeted Robert Jenrick. The official Conservative Party account had even got a handy winners graphic ready and published before the debate was due to finish.

