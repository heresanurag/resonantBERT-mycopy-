title: India and China agree to de-escalate border tensions - BBC News
date: '2024-10-21'
section: Asia
url: http://www.bbc.co.uk/news/articles/ckg0gwy0nlyo
content: |-
  The two countries have reached a patrolling agreement after several clashes between their troops since 2020.

  Ties between India and China have been strained since the 2020 clashes along a disputed border

  India and China have agreed on patrolling arrangements to de-escalate tensions along a disputed Himalayan border which has seen deadly hand-to-hand clashes in recent years, India’s top diplomat has said. Vikram Misri said on Monday the two sides have agreed on “disengagement and resolution of issues in these [border] areas that had arisen in 2020”. He was referring to the Galwan Valley clashes - the first fatal confrontation between the two sides since 1975, in which both sides suffered casualties. Relations between the neighbours have been strained since then.

  “An agreement has been arrived at on patrolling arrangements along the Line of Actual Control (LAC) in the India-China border areas, leading to disengagement and a resolution of the issues that had arisen in these areas in 2020,” Mr Misri said. Mr Misri, however, did not give any details about the disengagement process and whether it would cover all points of conflict along the disputed border. The Indian foreign secretary's statement comes just a day before Indian Prime Minister Narendra Modi travels to Russia for a meeting of Brics nations which includes Brazil, Russia, India, China and South Africa. Mr Misri didn’t confirm if a bilateral meeting between Mr Modi and Chinese President Xi Jinping was on the agenda.

  The Galwan clashes were the first fatal confrontation between the two sides since 1975
