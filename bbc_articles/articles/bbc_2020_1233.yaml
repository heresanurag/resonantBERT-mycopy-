title: Jurgen Klopp tells young Man Utd fan 'I can't make Liverpool lose' - BBC News
date: '2020-02-21'
section: Foyle & West
url: http://www.bbc.co.uk/news/uk-northern-ireland-foyle-west-51580401
content: |-
  Jurgen Klopp says 10-year-old Daragh's letter asking for Liverpool to lose was "nice" and "cheeky".

  Daragh Curley wrote the letter to Jurgen Klopp as part of a school project

  A young Manchester United fan who made a bid to stop Liverpool winning the title has been left shocked after Jurgen Klopp sent him a personal reply.

  Daragh Curley, from County Donegal, wrote to the Liverpool boss for a school assignment.

  The 10-year-old asked if it would be possible for Liverpool to lose some games so they would not win the league.

  Klopp said the letter had been "cheeky" and he had written the response privately.

  "I cannot answer all the letters, I get a lot," said Klopp, speaking at a press conference on Friday.

  "But it was nice, it was cheeky. We had time that day so I read the letter and I replied.

  "It's a private thing, I get a letter, I respond and the next day it's in a newspaper - I don't like that too much but it's all fine.

  "I like working for Liverpool and I like the rivalry we have," he added.

