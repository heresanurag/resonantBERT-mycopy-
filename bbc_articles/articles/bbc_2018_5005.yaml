  Former world heavyweight champion Tyson Fury will make his return to boxing on 9 June in Manchester - his first fight since 2015.

  Tyson Fury: Former world heavyweight champion to make comeback on 9 June Last updated on .From the section Boxing

  Former heavyweight champion Tyson Fury will return to boxing on 9 June against an unnamed opponent in Manchester - his first fight since 2015. Fury, 29, has not fought since claiming the IBF, WBA and WBO world titles from Wladimir Klitschko in November 2015. Fury was suspended in 2016 amid "anti-doping and medical issues" and accepted a backdated two-year ban in December. "I can't wait to get in there and prove I am the best even after all this time out," Fury said. "I'm coming into the prime of my life now. I'm stronger, faster, more confident. Looking at the competition out there, it should be relatively easy."
  • None Joshua and Fury share more than a rivalry Fury first fought as a professional in December 2008 and has won all 25 of his pro bouts. During his absence, fellow Briton Anthony Joshua has taken the IBF, IBO, WBA and WBO world heavyweight titles, while unbeaten American Deontay Wilder holds the WBC belt. Fury had his licence reinstated this year and has now signed with promoter Frank Warren. Fury said Wilder is "top of the pile" in the heavyweight division but added: "They're all very vulnerable and very beatable too." Of Joshua's success he said: "I've got to congratulate the fella, he's done very well. I hope he makes 10 times more money than he's already got." Promoter Warren said Fury was "already fit" but was "going to be busy" getting himself "fighting fit". "He needs to get some rounds under his belt," Warren added. "The agenda will be Tyson's agenda." After beating Joseph Parker to win the WBO title on 31 March, Joshua said: "I want Wilder. Or Fury. Get him [Wilder] in the ring and I'll knock him spark out." The WBA has since ordered Joshua to begin negotiations with Russia's mandatory challenger Alexander Povetkin, but the Londoner says he would prefer to fight Wilder next. The rematch that never happened. Fury and Klitschko were scheduled to fight again in summer 2016, but the British fighter postponed the bout before withdrawing all together
  • Nov 2015: Secures the WBA, IBF and WBO heavyweight belts by beating Wladimir Klitschko in Dusseldorf
  • Dec 2015: Forced to relinquish the IBF title, having refused to fight the organisation's mandatory challenger
  • June 2016: Postpones a rematch with Klitschko scheduled for summer 2016 because of an ankle injury
  • Sept 2016: Postpones a rematch for a second time because he is "medically unfit"
  • Oct 2016: Tells Rolling Stone magazine he was taking cocaine and struggling with mental health problems
  • Oct 2016: Gives up his world titles to focus on his mental health
  • Oct 2016: The British Boxing Board of Control (BBBC) suspends Fury owing to "anti-doping and medical issues"
  • Jan 2018: Meets with BBBC, which agrees to lift suspension
