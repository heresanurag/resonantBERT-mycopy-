content: |-
  A school sheltering displaced families was hit, according to Gaza's civil defence agency.

  Children among dozens killed in Israeli strikes, Gaza officials say

  An attack on a house in central Gaza killed at least 13 people, according to Gaza's civil defence agency

  At least 28 people, including children, have died in a wave of Israeli military strikes throughout the Gaza Strip, according to Gaza's civil defence agency. A school sheltering displaced families was among the facilities struck, killing eight people including four children over the weekend, the agency said. It comes as the UN issues a plea for Israel to cease its attacks in the vicinity of a hospital in Gaza's north. The Israeli military claimed a Hamas command centre was inside the compound of the Musa bin Nusair school in Gaza City, and has not commented on reports of attacks by the hospital.

  "Hamas systematically violates international law," the Israel Defense Forces (IDF) said on social media, adding that Israel's response would be to "act with force and determination against the terrorist organisations". Gaza's civil defence agency spokesperson Mahmoud Bassal told the AFP news agency that the school had been repurposed as a shelter for Palestinians displaced by the war. One displaced man who had been staying at the school, Abu, told BBC Arabic that the attack came while he was asleep. "We were sleeping peacefully, then suddenly we woke up to the sound of a very powerful explosion," he said. Another man, Mahmoud, said he was asleep in a tent in the schoolyard when the attack took place. "Stones and shrapnel were flying, the school's walls fell on our heads," he told BBC Arabic. On Sunday, Pope Francis condemned the Israeli attacks on Gaza for a second day in a row. He expressed pain thinking "of such cruelty, to the machine-gunning of children, to the bombing of schools and hospitals". The director of the Kamal Adwan hospital, Dr Hussam Abu Safiya, said its generators had been hit and claimed the Israeli army was targeting the fuel tank. The head of the World Health Organization (WHO), Dr Tedros Adhanom Ghebreyesus, issued a plea to the IDF to cease attacks in the vicinity of the hospital. Saturday night's reports of "bombardment near Kamal Adwan Hospital and order to evacuate the hospital are deeply worrisome," he said in a statement on social media. "We call for an immediate ceasefire in the vicinity of the hospital and to protect the patients and health workers." The hospital's director also released a statement that said Israeli forces were treating the hospital "as if we were a military installation". "Anyone who steps outside the hospital is at risk of being targeted," Dr Hussam Abu Safiya said. He added that relocating the operations of the hospital would jeopardise the patients, and called for health staff "be allowed to operate without the threat of evacuation". Israel has not commented on the reports of an evacuation order, but told the BBC the hospital was still operational. Palestinian groups involved in the fighting have told the BBC that a ceasefire deal is "closer than ever". More than 45,000 Palestinians have been killed during the 14-month war between Israel and Hamas, according to figures from Gaza's Hamas-run health ministry. The war began when Hamas-led gunmen carried out an unprecedented attack on southern Israel on 7 October 2023, during which about 1,200 people were killed and 251 others were taken hostage.
