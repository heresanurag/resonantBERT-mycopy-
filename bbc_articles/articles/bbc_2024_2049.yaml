id: bbc_2024_2049
title: Ofcom rejects Brewdog complaint over BBC documentary - BBC News
date: '2024-02-19'
section: Scotland
url: http://www.bbc.co.uk/news/uk-scotland-68321350
content: |-
  Brewdog claimed the company and its CEO James Watt were treated unfairly by a programme entitled The Truth about Brewdog.

  Brewdog co-founder James Watt denies allegations that he has acted inappropriately

  A complaint by Brewdog about a BBC documentary that highlighted allegations of inappropriate behaviour against the beer giant's chief executive has been rejected by Ofcom.

  Brewdog claimed that the company and its CEO James Watt were treated unfairly by a Disclosure programme entitled The Truth about Brewdog.

  It also said the programme had infringed Mr Watt's right to privacy.

  But the complaint has now been dismissed by the broadcasting watchdog.

  In its written decision, Ofcom said that facts were not presented, disregarded or omitted by the documentary in a way that was unfair.

  It said Brewdog and Mr Watt had been given an appropriate and timely opportunity to respond to the allegations made in the programme, and that their response was fairly reflected in the broadcast.

  Ofcom also said that Mr Watt's legitimate expectation of privacy did not, on balance, outweigh the broadcaster's right to freedom of expression and the public interest in obtaining and including the material in the programme.

  Therefore, it said, there was no unwarranted infringement of Mr Watt's privacy in connection with the obtaining and subsequent broadcast of material, which included allegations that he had bought £500,000 of shares in Heineken and invested £2m in a hedge fund in the Cayman Islands.

  Much of Brewdog's marketing is based on the firm's "punk" image, which the firm says has revolutionised the world of brewing and challenged mainstream beer brands.

  The documentary, which was originally broadcast on BBC1 Scotland on 24 January 2022, looked at BrewDog's marketing strategy and commercial practices in the context of claims about its corporate culture.

  It included accounts given by several former BrewDog employees who spoke about their experiences of Mr Watt's alleged personal misconduct and abuse of power in the workplace.

  Former Brewdog USA workers said Mr Watt's behaviour made female bartenders feel "uncomfortable" and "powerless".

  Brewdog's marketing is based on the firm being brewing "punks" who are challenging corporate beer brands

  Lawyers for Mr Watt said the allegations were false and he denied behaving inappropriately.

  Mr Watt founded Brewdog with his friend Martin Dickie in 2007, with the firm having its headquarters in Ellon in the north east of Scotland.

  It now has more than 100 bars and employs more than 2,000 people worldwide.

  The BBC Scotland Disclosure team started investigating the company after almost 300 former and current Brewdog employees signed a letter accusing Mr Watt of presiding over a toxic culture of fear.

  The programme included claims that Mr Watt was witnessed by staff kissing an intoxicated customer on a roof terrace bar; that female bartenders were advised how to avoid unwelcome attention from Mr Watt; and that managers would try to schedule certain female staff to be off to avoid Mr Watt's visits.

  One bartender said she felt "powerless" to prevent unwelcome attention from Mr Watt, who was also alleged to have left staff feeling uncomfortable by taking women on late night brewery tours while on trips to his US bars.

  The investigation also found that Brewdog sent multiple shipments of beer to the US, in contravention of US federal laws - with Mr Watt subsequently admitting on social media that "some mistakes with the paperwork on the first few shipments" had been made, but that all taxes were paid in full.

  He added that these "oversights" were "due to the fact we were trying to run a growing business on one side of the Atlantic and start a new business on the other".

  Mr Watt declined to be interviewed for the BBC Disclosure programme - which made no allegations of criminal behaviour - but his lawyer denied all of the claims that were made against him by the former employees.

  Following the broadcast of the documentary and a related story on the BBC News website, Mr Watt said the BBC had published claims which were totally false despite the extensive evidence he had provided.

  Mr Watt also said he hugely regretted "anyone feeling in any way uncomfortable around me, as the programme set out".

  He added: "This is absolutely the last thing I want and something I will learn from immediately. I truly apologise to anyone who felt that way. This was never my intention.

  "However, I would argue that people feeling uncomfortable around me based on false rumours and misinformation does not represent inappropriate behaviour on my behalf."

  Brewdog chairman Allan Leighton said he had been given assurances from Mr Watt that the BBC's claims were not accurate, and were based on misinformation.

  A spokesperson for Brewdog said that Ofcom's ruling concerned the BBC's reporting processes, not what was reported.

  "The regulator states itself that its role was not to determine the 'factual accuracy' of the programme," said the company.

  "The BBC's documentary contains numerous inaccuracies and misrepresentations, so we disagree with Ofcom's findings that the BBC took 'reasonable care'."

  The BBC welcomed the Ofcom decision, saying: "Throughout the process, we have stood by the accuracy and fairness of our journalism."
