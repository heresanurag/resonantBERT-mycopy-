content: |-
  Latest as residents face uncertainty after the evacuation of a tower block in Barton Hill, Bristol.

  Resident decides to stay in flat, despite advice

  A woman has said she and some other residents chose to stay in the tower block because they had "nowhere else to go". Speaking to BBC Radio Bristol's Chris Arnold, the woman said she "did not see this coming" and has had a sleepless night. "There was no forewarning, we were just told to get out that night and if we stayed in the building it was at our own risk. "Some of us did stay because we've got pets and everything there and we have got nowhere else to go," she said. "I haven't slept properly all night, it's just the uncertainty of not knowing what to do, I don't know where to stay, the anxiety is really bad. "I just feel drained and numb, I just don't know what to do," she continued. She said some people had spent the night in hotels, others with friends and family, and some had stayed at the local school.
