  Paul Dunleavy allegedly committed the offences on dates between 1964 and 1991.

  Former Christian Brother accused of abusing nine pupils

  A former teacher and member of the Order of Christian Brothers has gone on trial accused of historical sex offences against school boys. Paul Dunleavy, 88, of Glen Road in west Belfast, is accused of 32 counts of indecent assault, one of attempted buggery, and four of gross indecency. The offences are alleged to have been committed on dates between 1964 and 1991 against nine male complainants. The accused worked as either a teacher or headmaster at four schools in Belfast, Newry, County Down, and County Armagh during the time period the offences are alleged to have occurred.

  Opening the prosecution case at Belfast Crown Court, Neil Connor KC said Mr Dunleavy taught at schools across Northern Ireland from 1955 until his retirement in 1998 while a member of the Order of Christian Brothers. He told the jury of six men and six women that Mr Dunleavy was a teacher at Armagh Christian Brothers Primary School between 1960 and 1966. He later moved to the Abbey Christian Brothers Primary School in Newry from 1966 to 1973 before returning to the school in 1987 as headmaster until his retirement in 1998. Mr Dunleavy also taught at St Aiden's Christian Brothers Primary School off the Whiterock Road in west Belfast between 1973 and 1977, later becoming its headmaster between 1980 and 1985. He was also headmaster at Gortnamona Secondary School in west Belfast between 1985 and 1987. "Put simply, the prosecution case is that he sexually abused a number of pupils at those four schools who were entrusted into his care,'' the barrister said. "You will also hear, members of the jury, that the defendant is also a convicted child sexual abuser. "You will hear that he was convicted on two separate occasions of a series of sexual offences against children in his care at a number of schools where he taught."

  Mr Connor KC told the jury that one complainant was in his 11-Plus year at Armagh Christian Brothers Primary School around 1965/66. 'Boy A' told police that the accused took him to the showers in a nearby secondary school where he was "told to strip off and take a shower'' while the defendant watched. The complainant claimed Mr Dunleavy would then "dry him off'' before sexually abusing him. He told police that this happened "on a regular basis''. 'Boy A' claimed that the accused sometimes taught him, and when that happened, he would be held back after class and sexually abused. Mr Connor told the jury that Mr Dunleavy was interviewed by police about the allegations, and he either replied "no comment'' to all the questions or said "it didn't happen''. The senior prosecutor added: "It is our case that, once you have heard all the evidence in this case, you will be satisfied so you are sure and firmly convinced that the defendant is guilty of each and every one of the charges on the bill of indictment.''
