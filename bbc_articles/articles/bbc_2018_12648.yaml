title: Tina Turner from hardship to happiness - BBC News
date: '2018-10-19'
section: General
url: http://www.bbc.co.uk/news/entertainment-arts-45908496
content: |-
  As she approaches 80, the legendary singer Tina Turner speaks about fame, love and happiness.

  Tina Turner's latest book, My Love Story, reveals the abuse suffered at the hands of Ike Turner and how she found happiness later in life.

  She spoke to the BBC's Will Gompertz and tried to teach him how to dance...

  Watch more of Tina Turner's interview with the BBC here on iPlayer
