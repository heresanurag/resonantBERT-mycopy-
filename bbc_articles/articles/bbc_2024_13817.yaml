  Details of the major events planned to commemorate the 80th anniversary of the D-Day landings.

  D-Day 80: Where and when events are happening

  The Red Arrows are scheduled to perform a flypast at the D-Day 80 commemoration event in Southsea

  Events are taking place across the south of England to mark the 80th anniversary of D-Day. The Normandy landings were the largest seaborne invasion in history and laid the foundations for the Allied victory in World War Two. Troops from the UK, the US, Canada, and France attacked German forces on the coast of northern France, on 6 June 1944. Portsmouth and Southampton played key roles in the planning and preparation of the D-Day landings and are once again a key location in this week's events.

  From 10:00 BST on 5 June, The National Commemoration Event takes place at Southsea Common. Hosted by Dame Helen Mirren, it features tributes, readings, performances and more, with many special guests expected to grace the specially erected stage on Southsea Common. The event will be attended by dignitaries from around the world and broadcast live on the BBC. It is set to include a fly past from the Red Arrows, scheduled for 12:30. A planned fly past by the RAF's Battle of Britain Memorial Flight will no longer take place following death of a pilot in a spitfire crash last month. On Wednesday evening, A Tribute to the Fallen includes a community vigil to fallen Allied soldiers who fought and died during D Day operations, including a live broadcast from Bayeux War Cemetery in France. Hosted by Kirsty Young on BBC One. There will be a free shuttle bus running to and from Portsmouth & Southsea railway station (departing from the nearby Isambard Brunel Way) for both events, with services from 08:00 to 23:15. Tickets for both events have sold out, however other events are open to the public throughout the week. Portsmouth will mark the 80th anniversary of D-Day with its traditional commemoration, external at the D-Day Stone memorial near Southsea Seafront on Thursday. Provisional start time is 11:00. Armed Forces Day, external on Southsea Common on Saturday includes a display by the Red Arrows scheduled for 15:20, external. The D-Day Story, external museum is open all week telling the story of the build-up to and execution of the Normandy landings. Other events throughout the weekend can be found on the Visit Portsmouth, external website. A number of road closures and changes to public transport, external will be in place in the city throughout the week.

  Southampton’s town crier, Alan Spencer, will begin the city's commemorations at 08:00 on 6 June with a special proclamation on the Civic Centre steps. A memorial service will be held 19:30 at Holyrood Church in the city centre, which was destroyed by enemy bombing during the Blitz in November 1940. It will be conducted by the Bishop of Winchester and attended by the Lord Mayor of Southampton, veterans, and contingents from the 17 Port & Maritime Regiment. Following the service, the regiment, the RLC Corps of Drums and Army Band Tidworth will lead a parade through the city centre, passing the Bargate, and concluding in Guildhall Square. ABP are encouraging ships in Southampton port on Thursday to sound their whistles and horns at 08:00, 11:28 and 19:30 to mark the anniversary. Details of other exhibitions, walking tours and community events can be found on the Visit Southampton, external website.

  Hundreds of beacons are set to be lit across the UK from 21:15 on Thursday. Among the beacon locations on the south coast is Lepe Beach - one of the main embarkation points for troops heading to Normandy. Hampshire County Council is hosting a a beacon lighting and international tribute at the country park. The beacon will be part of a national chain of beacons lit across the country, and along the Normandy coast of France. On the Isle of Wight a beacon of remembrance will be lit on on East Cowes Esplanade. The beacon is Yarmouth is set to be lit on the Green. There will be a beacon lighting ceremony on Culver Down with singing from the Brading Community Choir at 20:45 followed by a memorial service and lighting of the beacon. Southampton's beacon at Guildhall Square is being lit after the memorial service and parade through the city centre. In Portsmouth the ceremony will be taking place at Southsea Castle.

