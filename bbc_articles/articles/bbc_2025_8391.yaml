title: 'Alessandro Coatti: Royal Society of Biology mourns scientist killed in Colombia
  - BBC News'
date: '2025-04-09'
section: Latin America
url: http://www.bbc.co.uk/news/articles/c2ewr80n2e7o
content: |-
  A local mayor in Colombia offers a cash reward to help find Alessandro Coatti’s killers.

  Alessandro Coatti worked for the Royal Society of Biology in London

  Tributes have been paid to a London-based scientist who formerly worked for the Royal Society of Biology (RSB) after he was found murdered in northern Colombia. Alessandro Coatti's remains were discovered on the outskirts of Santa Marta, a port city on the Caribbean coast, on Sunday, investigators say. Santa Marta's Mayor, Carlos Pinedo Cuello, said a reward of 50,000,000 Colombian pesos (£8,940) was being offered for information leading to the capture of those responsible for the death of the Italian citizen. In a statement issued on Tuesday, the RSB said it was "devastated" by news of Mr Coatti's killing.

  "He was a passionate and dedicated scientist, leading RSB animal science work, writing numerous submissions, organising events and giving evidence in the House of Commons," the RSB said. "Ale was funny, warm, intelligent, loved by everyone he worked with and will be deeply missed by all who knew and worked with him. "Our thoughts and best wishes go out to his friends and family at this truly awful time." Santa Marta is a gateway to some of Colombia's most popular tourist destinations including Tayrona National Park, Minca and the Sierra Nevada de Santa Marta mountains.

  Mr Coatti, who took a master's course at University College London (UCL), worked for the RSB for eight years as science policy officer before being promoted to senior science policy officer. He left the RSB at the end of 2024 to volunteer in Ecuador and travel in South America.

  Parts of the scientist's dismembered body were found in a suitcase dumped in a stream. Posting on X, Mr Pinedo Cuello said: "This crime will not go unpunished. The criminals must know that crime has no place in Santa Marta. We will pursue them until they are brought to justice." A hotel worker who spoke to Colombian newspaper El Tiempo said Mr Coatti had inquired about visiting the village of Minca and was conducting research on local animal species.
