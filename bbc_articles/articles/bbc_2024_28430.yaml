title: Ipswich man arrested over 1967 murder of Louisa Dunne in Bristol - BBC News
date: '2024-11-19'
section: England
url: http://www.bbc.co.uk/news/articles/crln1l9ew20o
content: |-
  Police say it follows a "significant development" in the investigation into who killed Louisa Dunne.

  Louisa Dunne's family have been informed of the arrest, police have said

  A 92-year-old man has been arrested on suspicion of murder and rape after the death of a woman in Bristol 57 years ago. Louisa Dunne, 75, was found dead at her home in Brittania Road, Easton by a neighbour on 28 June 1967. Avon and Somerset Police said it started reviewing the case, including further forensic examination of some items, in 2023, and a man from Ipswich was taken into custody on Tuesday morning. The force said the arrest follows a “significant development in the investigation".

  Ms Dunne's body was found at her home on Brittannia Road in the Easton area of Bristol

  Det Insp Dave Marchant said: “This is an extremely significant moment in an appalling and distressing case which has remained unsolved for almost six decades. "We recognise this will also come as a shock to the community in Easton." He said that while the the "tragic incident" happened many years ago, there will be people who either remember the murder or have connections to Ms Dunne's family. He said her next of kin had been updated on the development and are being supported by specialist family liaison officers. Det Insp Marchant said the public may see "operational police activity in the Ipswich area" as a result of the arrest.
