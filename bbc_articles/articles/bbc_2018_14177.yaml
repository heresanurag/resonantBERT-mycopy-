title: US Olympian Michael Johnson on making a full stroke recovery - BBC News
date: '2018-11-20'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-46265498
content: |-
  The former world record holder told the BBC about how he made a full recovery after suffering a stroke.

  The former 200m and 400m world record holder spoke exclusively to BBC Breakfast about the stroke he suffered in August.

  The former US athlete said his recovery was about taking "very small steps" and revealed his difficulties in walking 200m.
