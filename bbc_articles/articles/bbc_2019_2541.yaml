title: 'Croydon baby death: Woman charged with murder - BBC News'
date: '2019-03-03'
section: London
url: http://www.bbc.co.uk/news/uk-england-london-47434859
content: |-
  Officers were called to a home in Croydon by the ambulance service on Saturday.

  A woman has been charged with the murder of a three-month-old baby girl in south London.

  The Metropolitan Police said officers were called by London Ambulance Service to a home in Croydon shortly before 12:00 GMT on Saturday.

  The baby was found unresponsive and taken to hospital. She died about an hour later.

  A 40-year-old woman, who police said knew the baby, is due to appear at Bromley Magistrates Court on Monday.

