title: 'Keady baby death: Police questioning man over death of 11-month-old - BBC
  News'
date: '2019-11-27'
section: Northern Ireland
url: http://www.bbc.co.uk/news/uk-northern-ireland-50570196
content: |-
  A man, 31, is being questioned about the death of a baby named locally as Hunter Patrick McGleenon.

  Detectives investigating the sudden death of a baby have been allowed another 24 hours to question a 31-year-old man.

  The suspect was arrested following the death of an 11-month-old boy in Keady, County Armagh, on Tuesday.

  The baby was named locally as Hunter Patrick McGleenon and a post-mortem examination is due to take place to determine how he died.

  The man was arrested in Craigavon, County Armagh, on Tuesday.

  He was taken to Banbridge Police Station in County Down for questioning.

  Police Service of Northern Ireland (PSNI) officers and forensic teams are still carrying out investigations at a flat on Market Street in Keady.

  Sinn Féin's Newry and Armagh MLA Cathal Boylan said he spoke to a family member of the deceased child and they were in deep shock.

  Police were granted more time to question the suspect by a court on Wednesday.
