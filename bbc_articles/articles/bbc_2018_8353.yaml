title: 'Pride in London: Up to a million watch parade - BBC News'
date: '2018-07-08'
section: London
url: http://www.bbc.co.uk/news/uk-england-london-44745424
content: |-
  About 30,000 people march through central London to mark the annual celebration.

  The parade started off from Portland Place, central London

  Streets in central London were filled with thousands of people as they celebrated the Pride in London parade.

  The parade itself, which coincided with England's World Cup quarter-final in Russia, included about 30,000 people from 472 organisations.

  But up to one million other people are thought to have lined the streets to watch the event.

  It started out from Portland Place at 12:00 BST and finished in Whitehall at about 17:00.

  As ever Pride participants produced some imaginative costumes

  Organisers said they hoped "all the rainbows... will work their magic and send good vibes over to Russia."

  The streets of London were lined with thousands of spectators

  The parade was full of Pride's rainbow colours

  "It's quite poetic with Russia being so problematic as far as LGBT rights are concerned, there's a beautiful synergy there," co-chairwoman Alison Camps said.

  This video can not be played To play this video you need to enable JavaScript in your browser. LGBT+ hate crime on the rise in London

  Ms Camps said the event was taking place at a time LGBT rights issues were more important than ever as the UK is "falling down the rankings in terms of the best place to be LGBT."

  This video can not be played To play this video you need to enable JavaScript in your browser. Stuart Feather and Andrew Lumsden took part in the first London Pride march in 1972

  "There's a real danger in this country that people assume that the battle is over and that the job is done," she said.

  A recent survey by Pride in London found Britons care more about animal rights than LGBT rights.

  There were shouts and cheers as the parade got under way

  Pride said this year's parade was the most diverse

  Up to one million people are thought to have lined the streets for this year's parade

  Mayor of London Sadiq Khan took part and said he was proud of London's diversity and inclusivity.

  "We aren't just tolerant, we are respectful, we celebrate diversity and we embrace it as well. This is a great celebration of who we are.

  "In London, you're free to be who you are and you're free to love who you want to love, and it's really important we're never complacent," he said.

  Christian supporters of Pride also took part

  Sequins and glitter were the order of the day for this Pride supporter

  Among the organisations taking part were the Met Police, London Ambulance Service and London Fire Brigade.

  Some 150 Met officers were expected to join the parade, which Scotland Yard said was their biggest ever representation.

  Ch Supt Helen Millichap said people should enjoy the festivities but remain vigilant because the "current threat level remains at severe".

