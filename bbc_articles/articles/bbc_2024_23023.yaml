title: Wes Streeting says he will not back down on broken NHS claims - BBC News
date: '2024-09-24'
section: UK
url: http://www.bbc.co.uk/news/articles/cx2k0449747o
content: |-
  Health secretary comes out fighting after BBC reveals there is growing unease in NHS about approach.

  Wes Streeting says he will not back down in his criticism of the NHS, after the BBC revealed there was growing unease in the service about the "broken" NHS messaging from government. England's health secretary told the Labour Party conference that not acknowledging the problems in the NHS would result in "killing it with kindness". His comments came after senior sources in the health service said they believe some of the claims have gone too far - and may result in patients being put off seeking help and causing lasting damage to staff morale. In recent weeks, the government has claimed cancer is a "death sentence" because of NHS failings, while maternity services "shame" the nation.

  Streeting told delegates in Liverpool: "I know the doctor's diagnosis can sometimes be hard to hear. "But if you don't have an accurate diagnosis, you won't provide the correct prescription. "And when you put protecting the reputation of the NHS above protecting patients, you're not helping the NHS, you're killing it with kindness. "I won't back down. The NHS is broken, but it's not beaten, and together we will turn it around," Mr Streeting said. He went on to criticise the Tories for overseeing the decline of services, and said recovery would only come with reform, promising the forthcoming 10-year plan would create a "world-class" service for all.

  Streeting's speech came after senior people in the health service, as well as officials within NHS England, spoke to the BBC about the approach being taken by Labour. One hospital leader told the BBC: "We understand the politics of what the government is doing - they feel they need to establish in the public’s mind what a difficult inheritance they have been given. "It's something the Tories did very effectively in 2010, and even back in 1979, over the winter of discontent. "But there's an increasing nervousness that if it continues much longer it could spook patients, and make it really difficult to raise staff morale. Hope is important." Similar views are being expressed privately at NHS England. Sources there said officials had made the government aware of its concerns about the messaging, and is monitoring the impact it is having on patients coming forward for check-ups and appointments. "We are not seeing anything in the figures to suggest it's having an impact, but we are keeping a close eye on it," one source said. Another hospital leader said: "If the government isn’t careful, it will cause lasting damage. Yes, we know there are many problems, but there is also lots of great care out there that is not being recognised. "We need to see a shift - the cancer death sentence phrasing strikes completely the wrong tone." Streeting first made the broken claim on the day he was appointed health secretary on 5 July - and it is a phrase he and others in government have used repeatedly since. The death sentence claim was made in a written response from the government to a story covered by the BBC last week about the variation in waiting times by different cancers, and in the House of Commons by Streeting on 12 September, the day Lord Ara Darzi published his report into the state of the NHS. In both cases, it was suggested Lord Darzi’s report found cancer was "more likely to be a death sentence for NHS patients than those in other countries". Lord Darzi did not use the phrase "death sentence" in his report, although he did point out the UK had higher cancer mortality rates. Lord Darzi has been approached for comment, but is yet to respond. When asked for a response to the language, Cancer Research UK pointed the BBC to data showing that one in two people diagnosed with cancer now survive at least 10 years. Meanwhile, the phrase "national shame" was used by Streeting in response to a report by the Care Quality Commission report last week, which found two in three maternity units were not safe enough.

  Sir Keir Starmer and Wes Streeting addressed NHS staff at University College London Hospital earlier this month

  Sir Julian Hartley, of NHS Providers, which represents health leaders, said it was important to recognise what the NHS was doing well and the efforts of staff who were working "flat out". "There’s a lot to be proud of despite ongoing concerns and difficulties," he added. Thea Stein, chief executive of the Nuffield Trust think tank, who was running an NHS trust until last year, said those working in the NHS recognised the service was struggling and there was a "power" in having problems talked about openly. But she added: "At the same time language is important. The problem with the phrase 'broken' is that people may think something that is broken needs to be thrown away." She said she feared that could have an impact on patients, staff and young people who are thinking about a career in the health service. "It is important that the government now puts even more emphasis on repair, rebuilding and hope, alongside the 'broken' message," she said.
