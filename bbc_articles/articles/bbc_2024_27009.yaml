title: Murder probe after man attacked in Uddingston street - BBC News
date: '2024-10-07'
section: Glasgow & West Scotland
url: http://www.bbc.co.uk/news/articles/cly3x2qy22xo
content: |-
  David Graham was walking alone in Uddingston when he was attacked on Sunday evening.

  David Graham was attacked on Sunday and died from his injuries

  Police have launched a murder inquiry into the death of a man in South Lanarkshire. David Graham, 38, from Cambuslang, was walking alone in General’s Gate in Uddingston when he was attacked at about 19:30 on Sunday. He was taken to the Queen Elizabeth University Hospital in Glasgow but was pronounced dead on arrival. Police have expressed interest in a silver car seen parked near General's Gate at the time of the attack, which then drove off.

  Police officers and forensic experts near where the man was found seriously injured

  Det Ch Insp Graham McCreadie said there would be additional patrols throughout the area as the investigation continues. He appealed for anyone with information to contact Police Scotland through the non-emergency line or via an online portal, external. He said: "We have already spoken to a number of people who came to Mr Graham’s aid until the ambulance arrived and I would like to thank them for their assistance. "However, I am still keen to speak to anyone else who was in the area at the time, and may have seen or heard anything suspicious. Please get in touch with officers. “We would also urge any motorists with dashcams who were in General’s Gate or Old Glasgow Road areas on Sunday night to check your footage. "We understand that incidents of this nature can cause concern for the local community but please be assured we are doing everything we can to identify those involved."
