title: TikTok asks for emergency pause to looming US ban - BBC News
date: '2024-12-09'
section: Technology
url: http://www.bbc.co.uk/news/articles/c5yx7e2lx3yo
content: |-
  The app says the Supreme Court - and incoming Trump administration - needs more time to consider the case.

  TikTok asks for emergency pause to looming US ban

  TikTok has asked a court for an emergency injunction to prevent it becoming unavailable in the US next month. The US government passed a law demanding the app's sale or ban because of what it says are its links to the Chinese state - links TikTok and its parent company ByteDance deny. The social media company lost its appeal against the law in a decision handed down on Friday - and said afterwards it would appeal to the Supreme Court. TikTok and ByteDance have now submitted a legal request to temporarily block the law to give the Supreme Court more time to consider the matter. The Department of Justice (DOJ) has called for the request to be dismissed, saying its underlying arguments have already been "definitively rejected."

  TikTok and ByteDance say an injunction is also justified because Donald Trump is about to replace Joe Biden as president. Trump has previously indicated he would overturn the law. "The public interest favours providing sufficient time for the Supreme Court to conduct an orderly review process, and for the incoming Administration to evaluate this exceptionally important case," ByteDance and TikTok said in their emergency legal filing. They added that even a temporary ban from early 2025 would have "devastating effects" on its operations. It would be "inflicting irreparable injury by silencing Petitioners and the 170 million Americans who use the platform each month," the filing added. The company also said that even a temporary ban could cause a loss of revenue, as well as a loss of users and creators who make content for the platform. On Friday, judges rejected the idea that the law was unconstitutional - saying it was the result of "extensive, bipartisan action" by lawmakers. They further concluded the law was "carefully crafted to deal only with control by a foreign adversary, and it was part of a broader effort to counter a well-substantiated national security threat posed by the PRC (People's Republic of China)."

  According to the wording of the law, given President Joe Biden's stamp of approval as part of a broader foreign aid package in April, TikTok would stop being made available to US citizens unless sold by its parent company ByteDance within nine months. The deadline would see TikTok effectively banned in the US from 19 January 2025. In Monday's request for an emergency injunction, external, TikTok's lawyers argued the law would "inflict extreme and irreparable harm" on the company - adding it would do so "on the eve of a presidential inauguration". President-elect Donald Trump will take office as the country's 47th president on 20 January. He has previously claimed he would "save TikTok" from a ban. Ahead of the run-up to the November election, Trump said the law would benefit Meta, which owns Facebook and Instagram. But experts have warned that while his promises may offer a lifeline for the company's US future, they are no guarantee of the action he will take once in office. DOJ officials said in their letter also filed on Monday, external that the appeals court should reject the injunction request. "The Court is familiar with the relevant facts and law and has definitively rejected petitioners' constitutional claims in a thorough decision that recognizes the critical national-security interests underlying the Act," they argue.
