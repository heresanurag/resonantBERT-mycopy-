title: Alex Salmond harassment probe 'entirely confidential' - BBC News
date: '2018-08-25'
section: Scotland politics
url: http://www.bbc.co.uk/news/uk-scotland-scotland-politics-45307158
content: |-
  Details of one of the allegations against the former first minister have appeared in a newspaper.

  This video can not be played To play this video you need to enable JavaScript in your browser. Alex Salmond: 'I have not sexually harassed anyone'

  The investigation into sexual harassment claims against Alex Salmond has been "entirely confidential", the Scottish government has insisted.

  The Daily Record claims to have seen the wording of an allegation by a Scottish government staff member

  She alleges the former first minister touched her bottom and breasts through her clothing while she was alone with him at Bute House, the paper reports.

  Mr Salmond has strenuously denied any claims or harassment or criminality.

  He has described the allegations as "patently ridiculous" and said he is taking the Scottish government to court to contest the complaints process activated against him.

  In a tweet on Saturday, he reaffirmed his denial - but said he could make no further comment until his petition for a judicial review was heard at the Court of Session.

