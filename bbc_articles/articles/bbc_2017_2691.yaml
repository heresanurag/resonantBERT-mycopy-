id: bbc_2017_2691
title: RSPCA footage of caged puppies - BBC News
date: '2017-02-01'
section: General
url: http://www.bbc.co.uk/news/uk-38827491
content: |-
  A gang of puppy farmers which sold hundreds of dogs kept inside cages on a farm has been spared jail.

  Some of the animals were so sick they died shortly after arriving at their new homes.

  Mia was one of the dogs rescued, and the BBC spoke to her new owners.
