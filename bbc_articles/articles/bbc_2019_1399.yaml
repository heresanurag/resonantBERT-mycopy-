  Mr Guaidó last week offered an amnesty to military personnel who break with Mr Maduro, telling them that refusing to allow in aid is a "crime against humanity".

  Speaking to the BBC's Orla Guerin, Mr Maduro called US President Donald Trump's government a "gang of extremists" and blamed America for his country's crisis.

  Mr Maduro said he did not see the need for early presidential elections, and reiterated that he would not allow US humanitarian aid into the country. "They are warmongering in order to take over Venezuela," he said.

