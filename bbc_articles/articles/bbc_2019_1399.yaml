  The Trump administration has imposed a raft of economic measures on the country, including sanctions against the state-owned oil company PDVSA - Venezuela's main source of revenue.

  In recent years, the US has frozen Mr Maduro's US assets, restricted Venezuela's access to US markets and blocked dealings with those involved in the country's gold trade.

  For years Venezuelans have faced severe shortages of basic items such as medicine and food. Last year, the inflation rate saw prices double every 19 days on average.

  Three million people, or 10% of the population, have left the country since the economy started to worsen in 2014, according to UN figures.

  Mr Maduro, who has been in power since 2013, was re-elected to a second term last year. But the elections were controversial, with many opposition candidates barred from running or jailed and claims of vote-rigging.

  The head of the opposition-controlled National Assembly, Mr Guaidó declared himself president on 23 January. He said the constitution allowed him to assume power temporarily when the president was deemed illegitimate.

