  • None Liverpool have won 14 points from losing positions in the league this term; a joint-high with Tottenham.
  • None Ashley Barnes (10) is now just one goal short of tying with Danny Ings (11) for the most Premier League goals for Burnley.
  • None Liverpool conceded inside the first 10 minutes of a league game at Anfield for the first time since August 2015 (v West Ham, Manuel Lanzini).
  • None All 16 of Georginio Wijnaldum's Premier League goals have been scored in home matches (five for Liverpool, 11 for Newcastle).
  • None Since Jurgen Klopp's first game in charge, the Reds have scored more Premier League goals from outside the box than any other team (21).

  It's a big game for Liverpool in the battle for a top-four finish as they travel to Manchester City on Sunday, 19 March (16:30 GMT). Burnley head to struggling Sunderland the day before (15:00 GMT).
