  Boris Johnson was quizzed after a Tory rebellion on social care and criticism of a speech to business leaders.

  Has the government broken its manifesto pledge on social care?

  Boris Johnson was asked about whether he had broken his manifesto pledge on social care. The Conservative Party’s 2019 manifesto said: "Nobody needing care should be forced to sell their home to pay for it". The prime minister highlighted what is called the “housing disregard”, which means if you are receiving social care at home or if you are in a care home and your spouse is living in your home, the value of the home is not counted towards your assets when working out how much you should be contributing towards your social care. He also pointed out that people living in a care home without a spouse living in their home could access deferrals to paying care costs, so that they would not have to sell their homes straight away. But their homes may still have to be sold to pay for their care, even if this doesn’t happen during their lifetime. On Monday, the Business Minister Paul Scully told Sky News: "There will be fewer people selling their houses and hopefully none." Reality Check has looked at other claims about social care here.
