title: Luke Littler darts referee makes history as gay man officiating - BBC News
date: '2025-01-05'
section: Wales
url: http://www.bbc.co.uk/news/articles/ce32038kvwxo
content: |-
  Huw Ware says it was the biggest day of his life as he called in the new champion.

  Huw Ware became the first openly gay referee to officiate a World Darts Championship final

  A referee has spoken of his pride at becoming the first openly gay man to officiate a PDC World Darts Championship final as he oversaw Luke Littler's victory. Huw Ware, from Cardiff, took charge of the second half of the match as Littler demolished Michael Van Gerwen to become the youngest ever PDC World Championship winner. Huw hopes his success will help to break down barriers after "struggling at times" in the early stages of his career. He said he wants to "inspire the next generation" of players, officials or even fans and ensure that the sport he loves is a welcome space for everybody.

  Huw has been with the Professional Darts Corporation for eight years. He said it had been a "tough journey" at times as one of the few openly gay figures in the sport. "Especially in my early years I went through a lot and it was a big struggle at times. But what has been amazing to me is to have seen the changes that darts has gone through over the years, to a place now where it is a lot better than what it was when I first joined." Huw said that despite the issues he faced "days like yesterday mean it was worthwhile", adding that it was "the biggest day of my life". "It was one of the biggest honours of my life to take charge of the second half and call in the champion." The 31-year-old said it was important to see people from the LGBTQ+ community in high profile positions at sporting events. Especially sports such as darts which traditionally have a "macho" culture. "The best thing that I could offer is visibility. We've all seen some of the vitriol that some players have got for coming out. It's important for a ref to put yourself forward as well."

  Huw called in the new champion as Luke Littler became the youngest ever PDC World Championship winner

  He remembers being "inspired" by fellow Welshman and Rugby World Cup referee, Nigel Owens, who revealed his sexuality in 2007. "He broke down barriers for me back when he refereed the World Cup final in 2015. I felt like I had a lot in common with him. I could look at him and say 'he has got to the pinnacle and so can I'. Huw added that darts, but also sport in general, still has some way to go to be inclusive for all. "We look at everything that's going on with the LGBTQ+ discussion in sport these days, the fires are still very much raging. I hope that I can help to break down barriers for the next generation." Prior to officiating the final, Huw wrote on his blog, external that if he could say anything it would be to "gay boys or gay girls out there who are worried that their sexuality could close doors to worlds they would like to be in but no longer feel that they can, then that is not the case". He added that "worlds, such as the sports world, were open to everybody both gay and straight, no matter who you are you can achieve in any world you want to, and most importantly, you can belong".

  Huw added that he had seen an increase in people interested in the sport across Wales. "I went to a junior event just past Aberdare a few weeks before the final. It was heaving with all the kids there playing darts. So in terms of doubts of the sports and its future, it couldn't be in a more healthy place." Huw said he hopes to referee many more finals in the future. For now, he will be reflecting on entering the history books after a gruelling couple of weeks calling the scores at the oche. "I am celebrating tonight with a few friends. I can't wait."
