title: 'London flooding: Cars push through waterlogged streets - BBC News'
date: '2023-06-13'
section: General
url: http://www.bbc.co.uk/news/uk-65884939
content: |-
  The capital has experienced thunderstorms after a weekend of some of the hottest temperatures this year.

  Footage from the Golders Green area of North West London shows how torrential rain has disrupted traffic.

  The capital has been hit by thunderstorms after a weekend of some of the highest temperatures this year.

  The Met Office had issued a yellow warning for thunderstorms, which remained in place until 21:00 BST on Monday, 12 June.
