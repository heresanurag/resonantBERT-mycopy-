title: Film-maker Tallulah Self, 18, challenges healthy eating advert - BBC News
date: '2018-02-01'
section: General
url: http://www.bbc.co.uk/news/uk-england-norfolk-42907952
content: |-
  Film-maker Tallulah Self said a calorie-counting campaign was sending out a negative message to those living with eating disorders.

  The Change4Life television advert encourages parents to give their children snacks of 100 calories or fewer.

  But Tallulah Self says the message could have a harmful impact on those living with eating disorders.

  The 18-year-old from Norwich spent six months in hospital receiving treatment for anorexia in 2016.
