title: 'Covid deaths: The emergency mortuary in a Surrey woodland - BBC News'
date: '2021-01-11'
section: General
url: http://www.bbc.co.uk/news/uk-55613575
content: |-
  "Numbers are increasing not decreasing" - inside an emergency body storage facility in Surrey.

  As hospital mortuaries fill up in Surrey, England, some of the dead from the coronavirus pandemic are being brought to an emergency body storage facility.

  Surrey currently has one of the highest infection rates in the country, and some are concerned the facility may reach capacity.

  BBC home editor Mark Easton paid a visit to the site which has been set up in a Surrey woodland.
