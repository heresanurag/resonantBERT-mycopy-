title: 'Local elections 2024: Dogs at polling stations - BBC News'
date: '2024-05-02'
section: In Pictures
url: http://www.bbc.co.uk/news/in-pictures-68942528
content: |-
  People in England and Wales are voting today - some with the very best in canine company.

  Voters in parts of England and Wales are heading to the polls today to elect councillors and mayors in the local elections. Many combine an exercise in democracy with walking their dogs.
