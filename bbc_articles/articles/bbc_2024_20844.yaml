  Nelly Korda begins the defence of her women's Olympic title on Wednesday aiming to match the success of her world number one counterpart from the men's game. In the wake of Scottie Scheffler's sensational victory in Paris last Sunday, the women's event occurs with questions over golf's Olympic credentials surely well and truly banished from the sporting agenda. Scheffler's gold-medal-yielding, course-record-equalling, final-round 62 pipped GB's Tommy Fleetwood on an incredible final day at Le Golf National. As it unfolded, former European Tour player, GB Olympic manager and seasoned golf commentator Jamie Spence texted: "Best golf of the year." He was spot on. Indeed I'm still trying to recall a better tournament. Great crowds, a stellar leaderboard and true sporting legacy; it had everything. The format, 72-hole strokeplay, was thoroughly vindicated with so many players harbouring medal hopes through audacious back-nine charges like the one that left home favourite Victor Perez just a shot shy of a medal. And it was all the more captivating for being purely about trying to generate athletic glory for the golfers' respective nations. Usually, Scheffler does not seem to do emotion. Winning has become a customary part of his working life - all part of the deal in his glittering career. Most of his triumphs are met with a humble shrug and satisfied smile, not much more. Extraordinarily, this was his seventh win of a stellar 2024. But this was the one that made tears flow for the two-time Masters champion. "I take tremendous pride in coming over here and representing my country," the American said. "It was just very emotional being up there on stage as the flag is being raised and singing the national anthem. Yes, that's definitely one I'll remember for a long time." While Scheffler shed tears of pride, Jon Rahm reflected on unexpected capitulation that meant the Spaniard tumbled out of the medal positions after holding a four-shot lead with eight holes to play. He was like a middle-distance runner with a clear and commanding advantage with the bell sounding, only to stumble on his laces. The opposition compiled more composed final laps, especially Scheffler, who came home in just 29 blows. "To just not get it done for the whole country of Spain, it's a lot more painful than I would like it to be," Rahm admitted. Par golf from the 11th onwards would have yielded Spanish gold. "I think by losing, I'm getting a much deeper appreciation of what this tournament means to me than if I had won any medal,” he added. “I’m getting a taste of how much it really mattered. "I've been very honoured to represent Spain in many, many different events, and to not get this one done stings quite a bit." Rory McIlroy made a dart with five back-nine birdies in a row, only to run out of gas, finding water at the 15th from the middle of the fairway just 130 yards out. Team Ireland's hopes drowned right there. Silver medallist Fleetwood had battled his swing all week, but suddenly was in the groove. It was only momentarily on the home stretch that the Southport star stumbled. He missed the fairway on 17 and failed to fully control the next two shots on that penultimate hole. They cost him a bogey and a share of the lead. "It feels unbelievably special," Fleetwood acknowledged. "Standing on that podium with a medal in front of the crowd was one of the most amazing moments I've had as a golfer." Mcllroy is medal-less from two appearances but this former Olympic golf sceptic has been more than won over at a time when so much of the men’s game is beset by a dollar-laden civil war. The Team Ireland star now rates Olympic golf behind only the Ryder Cup as the game's best tournament. "With how much of the game of golf is right now, you think about the two tournaments that might be the purest form of competition in our sport, and we don't play for money in them," he said. "So it speaks volumes for what's important in sports. I think every single player this week has had an amazing experience."

  And now it is the top women golfers' turn to feel the excitement and honour of Olympic competition with their event starting on Wednesday. Most attention will inevitably surround Korda - the US star who won in Tokyo three years ago. But the 26-year-old has struggled for form of late. Since winning the Mizuho Americas Open in May, her sixth win of 2024, Korda has missed the cut in the two biggest majors - the US Open and Women’s PGA - and finished only in a share of 26th at the recent Evian Championship. Her biggest threat is likely to be American compatriot Lilia Vu, who won the LPGA Classic on her return to action from long-term injury in June and was runner up at the PGA. Britain's hopes rest with Charley Hull and Georgia Hall. Hull will surely need to temper her natural aggression because the key at Le Golf National is to find fairways and greens. Hall, who has slipped to 38 in the world, has to maintain the encouraging form that brought a share of third place at the Aramco Team Series at the Centurion Club last month. That event was won by Ireland's Leona Maguire, who has otherwise struggled to find her best stuff. Nevertheless, she is just the sort of character likely to be inspired by the unique nature of Olympic competition. Part one of the sport's time at the Games was a blockbuster, more Parisian golfing glory surely beckons this week.
