  How you rated the players in the Euro 2020 final between Italy and England.

  Euro 2020 final Italy v England - how you rated the players Last updated on .From the section Football

  Euro 2020: Italy win penalty shootout against England to become European champions England's bid to end their 55-year wait for a major trophy ended in penalty shootout agony at Wembley as Italy won Euro 2020. But it was Three Lions left-back Luke Shaw who was chosen as your player of the match, with a rating of 7.66 after his superb second-minute goal. Federico Chiesa was Italy's top-rated player with 7.20, while goalkeeper Gianluigi Donnarumma, who saved penalties from Jadon Sancho and Bukayo Saka achieved 6.86.
