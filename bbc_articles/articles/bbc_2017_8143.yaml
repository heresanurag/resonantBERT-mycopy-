title: Two die in light aircraft crash near Shaftesbury - BBC News
date: '2017-08-26'
section: Dorset
url: http://www.bbc.co.uk/news/uk-england-berkshire-41060535
content: |-
  The two men were killed when the Tiger Moth came down east of Compton Abbas Airfield this morning.

  The plane came down east of the airfield near Shaftesbury

  Two people have died in a light aircraft crash near an airfield in Dorset.

  The plane came down east of Compton Abbas Airfield near Shaftesbury at 09.28 BST, police said.

  The pilot, aged 64 from Blandford, and the passenger, aged 67, from Shaftesbury, were killed in the crash.

  Dorset Police identified the plane as a Tiger Moth and the Air Accident Investigation Branch has sent a team to the area to start inquiries.

  Compton Abbas Airfield on the border of Wiltshire and Dorset is about four miles south of the town of Shaftesbury

