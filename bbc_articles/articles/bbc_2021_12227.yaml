title: 'La Palma volcano: Lava destroys homes in the Canary Islands - BBC News'
date: '2021-09-20'
section: General
url: http://www.bbc.co.uk/news/world-europe-58625781
content: |-
  A volcanic eruption on the Spanish island of La Palma has demolished homes and caused evacuations.

  A volcanic eruption from the Cumbre Vieja volcano has caused lava flows on the Spanish island of La Palma since Sunday.

  About 5,000 residents have been forced to evacuate.

  Local officials said about 100 houses have been destroyed so far.
