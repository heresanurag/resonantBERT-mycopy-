title: 'Liverpool Santa Dash: Thousands join charity run - BBC News'
date: '2022-12-04'
section: General
url: http://www.bbc.co.uk/news/uk-england-merseyside-63853642
content: |-
  Participants, who wore red and blue suits, were fundraising for the Alder Hey Children's Hospital.

  About 5,000 people have taken part in the annual Santa Dash through Liverpool.

  Participants, who were kitted out in red and blue suits to reflect the city's Premier League clubs, ran past landmark locations including the Pier Head.

  The popular event, which heralds the city's run-up to Christmas, raised funds for Alder Hey Children's Hospital.
