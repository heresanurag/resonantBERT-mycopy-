title: Life on the world's steepest street - BBC News
date: '2017-01-03'
section: General
url: http://www.bbc.co.uk/news/world-asia-38461418
content: |-
  Baldwin Street in New Zealand is the world's steepest residential road.

  Baldwin Street in the city of Dunedin on New Zealand's South Island is officially the world's steepest residential road.

  At its steepest, the slope has a gradient of 35%.

  So what's it like to live on a road which must strike fear into the hearts of postmen and paper boys? We went along to find out.
