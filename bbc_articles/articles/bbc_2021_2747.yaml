  • None West Ham failed to win after being three goals ahead in a Premier League game for the first time since September 1998 (4-3 defeat against Wimbledon).
  • None This was the third time in the Premier League this season a team has led by three goals and failed to win (also West Brom 3-3 Chelsea and Spurs 3-3 West Ham) - the most instances in a single Premier League campaign since 2010-11 (also three).
  • None West Ham have only won one of their past 11 games against Arsenal in the league (D3 L7), failing to win any of their four meetings in the past two campaigns (D1 L3).
  • None This match against Arsenal (32 minutes) was the earliest from the start of a Premier League match that West Ham have scored three goals since May 2007 against Bolton (29 minutes).
  • None Jesse Lingard scored his fifth goal against Arsenal in all competitions - the most he has netted against any opponent in his professional career.
  • None West Ham are the first team to score two own goals in a single Premier League game since Swansea in January 2017, which was also against Arsenal.

  West Ham travel to Wolves on Monday, 5 April (20:15 BST) after the international break in the Premier League, while Arsenal host Liverpool on Sunday, 4 April (16:30 BST).
