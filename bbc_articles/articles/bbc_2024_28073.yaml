  What was impressive about Scotland was their will to win. They made a litany of errors and you know that they can be a whole lot better than this. But they believed. They dug in. They kept going, kept trying to overcome their own shortcomings. And Doak led the charge. Another brilliant run tormented Croatia, then he did Gvardiol again and lashed his shot at Dominik Kotarski. The Croat looked like a man who didn't know what day of the week it was. He was hesitant and fearful of the young marauder. And he was right to be. The next time Doak got it was the marvellous moment of mayhem that saw Scotland score. Poor, persecuted Gvardiol was left without a name again by Doak. He thundered an effort at Kotarski, who parried to McGinn. Goal. Four minutes of normal time left, but nothing about Hampden was normal at that stage. The minutes ticked on and the winless run ended. The Tartan Army will bid it good riddance while, at the same time, heralding the arrival of a new darling. The World Cup draw is next month. Scotland's seeding is most likely not going to be what they would have wanted and the challenge ahead is going to be arduous, but optimism returned on Friday. And that'll do nicely for now.
