content: |-
  As jurors start to deliberate, Bernd Debusmann Jr reports from court on what is at stake for the president's son.

  Hunter Biden, son of US President Joe Biden, is the first child of a sitting president to be a criminal defendant. Prosecutors allege the younger Biden, 54, lied about his drug use on application forms when he purchased a handgun in 2018.

  As the 12-person jury begins its deliberations in Wilmington, Delaware, the BBC's Bernd Debusmann Jr reports from court on what is at stake for the president's son.
