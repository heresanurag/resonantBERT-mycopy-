  The countdown for LA 2028 has begun as the Olympic flag arrived in the city of angels.

  The countdown for LA 2028 has begun as the Olympic flag arrived in the city to mark its preparations.

  Mayor Karen Bass was accompanied by athletes and officials as she waved the flag from a jet painted in Olympic colours.

  The BBC spoke to Gavin Newsom, the governor of California, and gold medallist Amit Elor about the city's latest turn to host the games.

  The flag will stay at Los Angeles City Hall until the games begin in 2028.
