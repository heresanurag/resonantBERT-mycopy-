title: Emotional Lahaina family returns to burnt-down home - BBC News
date: '2023-09-27'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-66932104
content: |-
  'It's going to break our family apart,' a resident said seeing the damage for the first time.

  Weeks after wildfires ravaged the city, authorities are gradually letting Lahaina residents return for the first time.

  'It's going to break our family apart,' one resident says standing amidst the rubble that used to be her home.
