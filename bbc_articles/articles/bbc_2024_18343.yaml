  The fire comes just a day after President Zelensky acknowledged for the first time that his military is conducting a cross-border offensive inside Russia's western Kursk region. In his nightly video address on Saturday, Mr Zelensky said Ukraine's military was pushing the war onto "the aggressor's territory". A senior Ukrainian official told the AFP news agency that thousands of troops were engaged in the operation, far more than initially reported by Russian border guards. Kyiv launched its surprise attack on Tuesday, rapidly advancing more than 30km (19 miles) inside Russia - the deepest raid since Moscow began its full-scale invasion of Ukraine in February 2022. Russia has so far struggled to halt the Ukrainian advance, with more than 76,000 people evacuated from the Kursk region, where a state of emergency has been declared by local authorities. Emergency trains from Kursk to Moscow have also been set up by Russia's rail operator for those looking to flee. The fighting appeared to be ongoing over the weekend, with Kursk Governor Aleksei Smirnov saying early on Sunday that there were injured people in a "treacherous" Ukrainian attack. Earlier this week, Russian President Vladimir Putin said the offensive was a "major provocation".
