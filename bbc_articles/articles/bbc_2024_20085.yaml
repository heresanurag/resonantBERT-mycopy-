title: Gordon Gault's mum says 'no justice' as son's killer to be freed - BBC News
date: '2024-08-27'
section: Tyne
url: http://www.bbc.co.uk/news/articles/cq82d7en0yxo
content: |-
  One of the teenagers jailed for killing a 14-year-old is to be released due to prison overcrowding.

  Mum says 'no justice' as son's killer to be freed

  Gordon Gault's mum, Dionne Barrett, says she "couldn't speak" when she was told one of her son's killers would be released early

  The mother of a 14-year-old killed in a machete attack says her son has had "no justice" after one of his killers is to be freed early from prison. Gordon Gault died days after being injured in November 2022, following a feud between rival gangs in Newcastle. Lawson Natty, 18, was sentenced to two years eight months for manslaughter in March, alongside Carlos Neto, also 18, but Natty's release has been brought forward under government rules to deal with overcrowding. The Ministry of Justice said: "All offenders released on licence are subject to strict conditions and we do not hesitate to recall them to custody if they break the rules."

  Gordon Gault was 14 when he died after being attacked in Newcastle

  Gordon's mother, Dionne Barrett, told BBC Radio Newcastle she "couldn't speak" after receiving a phone call about Natty's release, before an official letter arrived to explain the decision. "I was so shocked. I put the phone down, and had to call back because I couldn’t make sense of it. I still can't," she said. "Gordon’s had no justice whatsoever. It's giving the message out... take a knife, and you'll only do a couple months. "I've had so much anger. It infuriates me."

  Carlos Neto, 18, (left) was jailed for manslaughter in March, alongside Lawson Natty (right), also 18, who is set to be released in September

  Natty, of Newbiggin Hall, Newcastle, who had been on remand since last summer, is due to be released in September after serving 40% of his sentence. It follows emergency measures brought in to deal with prison overcrowding in England and Wales in July. Those eligible under the scheme will be monitored by the Probation Service, but failure to adhere to strict conditions, likely to include curfews and tagging, could result in them being recalled to prison. Neto, of Salford, who was sentenced to nine years two months, is not eligible for release under the scheme and will remain in prison.

  The court heard Natty supplied Neto with the machete used in the attack

  Gordon died six days after he was struck under the arm by a machete wielded by Neto in Elswick Park, which had been supplied by Natty. During the trial at Newcastle Crown Court, prosecutor Jonathan Sandiford KC said both youths - who were 17 at the time - were leaders of their group and had "immersed themselves in a gang culture which appeared to engage in, and celebrate, acts of significant violence". Both were cleared of Gordon's murder but found guilty of manslaughter, and unlawful wounding in relation to a second victim. In a statement, the Ministry of Justice said: "The government has had to take action to ensure we have enough prison places so police can continue to take dangerous criminals off the streets and keep the public safe. "All offenders released on licence are subject to strict conditions and we do not hesitate to recall them to custody if they break the rules."
