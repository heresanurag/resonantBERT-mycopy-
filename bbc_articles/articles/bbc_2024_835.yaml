title: 'Storm Isha: High winds smash glass garden table in Kent - BBC News'
date: '2024-01-22'
section: General
url: http://www.bbc.co.uk/news/uk-68052337
content: |-
  CCTV captures the spectacular moment a glass table is smashed as the UK sees winds of up to 90mph (145km/h).

  A glass garden table smashed in a spectacular style in Kent as Storm Isha continued to cause chaos across the UK.

  CCTV shows how high winds lifted the table's glass top which bursts into large pieces.
