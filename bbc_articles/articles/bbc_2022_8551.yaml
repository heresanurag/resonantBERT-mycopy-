title: 'Craig Mulligan: Call to publish Logan Mwangi killer''s custody court papers
  - BBC News'
date: '2022-07-03'
section: Wales
url: http://www.bbc.co.uk/news/uk-wales-62022840
content: |-
  Craig Mulligan moved in with Logan Mwangi's mother and partner days before the five-year-old was killed.

  Angharad Williamson, 31, Craig Mulligan, 14, and John Cole, 40, have been sentenced for Logan's murder

  A campaigner has called for private family court judgments relating to 14-year-old killer Craig Mulligan to be published so "lessons are learned".

  He was placed in the care of his step-father John Cole five days before Logan Mwangi was killed last July.

  Logan died of "catastrophic" injuries and his body was dumped in a river near his home in Sarn, Bridgend county.

  Mulligan, Cole and Logan's mother, Angharad Williamson were jailed for his murder last week.

  The Ministry of Justice said publishing documents relating to Cole and Williamson's custody of Mulligan was "a matter for the independent judge in the case to decide".

  "No stone should be left unturned in the inquiry into what happened in this case," said former Liberal Democrat MP John Hemming, who campaigns for improvements in family justice.

  "The public have a right to know what information family court judges had about this case and what decisions were made.

  Tondu Primary School has set up a memorial garden and "buddy bench" in memory of Logan

  "The most important thing is that lessons are learned, and lessons can't be learned if information isn't available so it can be properly discussed."

  By the time Mulligan was taken from his mother and put into care, he was already a "complex, troubled and violent boy", the trial was told.

  Cole, 40, who was Mulligan's mother's ex-partner, and Williamson, 31, petitioned the family courts for custody of the teenager.

  Five days later, Logan's body was found in the River Ogmore in Pandy Park by police.

  The adults were jailed for life for murder, while Mulligan was detained for at least 15 years on Thursday.

  Cole had also admitted perverting the course of justice while Williamson and Mulligan were convicted of the same charge after the court was told they moved Logan's body to the river, removed his clothing, washed bloodstained bed linen, and made a false missing person report.

  A review is under way into the circumstances of his death but the Welsh government has rejected calls for a nationwide independent inquiry into children's services in Wales.

