id: bbc_2019_12463
title: Severe flooding hits the Isle of Man - BBC News
date: '2019-10-01'
section: General
url: http://www.bbc.co.uk/news/world-europe-isle-of-man-49898129
content: |-
  Residents were trapped in their homes as a river burst its banks in the village of Laxey.

  A major incident has been declared on the Isle of Man, after a river burst its banks trapping residents in their homes in the village of Laxey.

  Heavy rain and flooding have also affected parts of the UK, with cars submerged in Leicestershire and landslides and falling trees blocking railway lines in Cumbria.

  Dozens of flood warnings were issued and some areas in the Midlands, Wales and southern England were hit by a week's rain in just an hour.
