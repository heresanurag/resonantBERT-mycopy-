title: Trampoline! Drivers surprised in Culloden after high winds - BBC News
date: '2020-01-08'
section: General
url: http://www.bbc.co.uk/news/uk-scotland-51028414
content: |-
  Drivers in Culloden near Inverness watched as a trampoline was blown down the road.

  Drivers in Culloden, near Inverness, faced an unusual sight after a trampoline was blown down the road.

  Stephen Davies filmed it as he was on his way to work.

  Wind gusts of 74mph were recorded in Scotland on Tuesday.
