content: |-
  The Champions League returns on Tuesday as Europe's top competition has been revamped with 36 teams playing, so take our quiz to test your knowledge.

  The 2025 Champions League final will take place on 31 May in Munich

  The Champions League returns on Tuesday as Europe's top competition has been revamped, with 36 sides each playing against eight different opponents in one league phase. The top eight sides will go through to the last 16, while those finishing between ninth and 24th will compete in play-offs to join them, with the rest eliminated from the Champions League. How much do you know about the teams taking part? We have set you 36 questions, one on each side, so how many can you get right?

  Watch highlights of every Champions League game from 22:00 on Wednesday on BBC iPlayer and the BBC Sport website and app. There will also be a Champions League Match of the Day on BBC One on Wednesday, from 22:40 to 00:00.
