title: Oasis fans see tickets cancelled over 'bots' claim - BBC News
date: '2025-02-09'
section: Cumbria
url: http://www.bbc.co.uk/news/articles/c62q1wynqlvo
content: |-
  Fans say they have been wrongly accused of using bots to buy their tickets for the comeback shows.

  Oasis fans have said their "dreams have been crushed" after Ticketmaster cancelled their tickets to the band's reunion tour, accusing them of being bots. Several devotees of the Manchester band expressed frustration they had been accused by the firm of breaking rules when they purchased their tickets to Oasis Live '25, which starts on 4 July. Leighah Conroy, 24, from Cumbria, said her friend purchased tickets in August but received an email from the ticket website on Friday claiming it was "identified that bots were used to make this purchase". A Ticketmaster spokesperson said a form was available for anyone who believes their tickets had been wrongly cancelled.

  Ms Conroy said she felt "sick in the stomach" when she heard the news. "It's a band you'll never experience or see again and it's been on my bucket list for years," she said. "It just feels like my dreams have been completely crushed."

  Both Ms Conroy and Ms Bonnet received the emails on Friday

  Ms Conroy said each ticket cost about £150 while a hotel stay cost £200 per person and a further £40 for travel. She described the company's handling of the situation as "totally outrageous", adding: "A lot of fans are wanting answers as to why this has happened and we've just got no answers whatsoever. Meanwhile, a fan from Spain who said she spent more than £3,000 for herself, her husband and two teenage children on tickets to see Oasis at Wembley on 3 August received the same email on Friday. Marta Bonnet initially thought the email was fake but after realising it was from Ticketmaster she felt "shocked then angry" and spent nearly five hours trying to liaise with the company via email and direct message on X about the issue. She told the BBC she would avoid purchasing tickets from the company in the future. "I know there are a lot of platforms trying to use bots to resell the tickets," she said. "But there must be another way to take control of this situation, which is not to take [it out on] all the people that are buying the tickets in a legal form." Ms Bonnet said she and her family were likely to keep their plane tickets to the UK but added "being there while Oasis is playing and you're not there" could sour the trip. A spokesperson from Ticketmaster said: "Anyone who has been contacted and believes a refund was made in error has been sent a form to fill in for the tour's promoters to review."
