title: Reservoir murder victim Roy Reynolds had more than 100 injuries - BBC News
date: '2024-03-01'
section: Northern Ireland
url: http://www.bbc.co.uk/news/uk-northern-ireland-68448757
content: |-
  Roy Reynolds was found dead in a reservoir near Carrickfergus in March 2022.

  Roy Reynolds, 54, was found dead in a reservoir near Carrickfergus in March 2022

  More than 100 injuries were inflicted on a man whose body was found partially submerged in a reservoir, a court has heard.

  Roy Reynolds, who was 54, was beaten and stabbed in a flat in Rathcoole in March 2022.

  His remains were then placed in the boot of a car and taken North Woodburn Reservoir near Carrickfergus.

  Details surrounding the "ferocious" fatal attack on Mr Reynolds emerged for the first time during a plea hearing at Belfast Crown Court.

  A previous hearing heard his murder was "barbaric and horrific".

  Michael Campbell, 34, whose address was given as HMP Maghaberry, previously admitted murdering Mr Reynolds on a date between 26 March and 29 March 2022.

  He has also admitted a charge of attempting to prevent the burial of a body on 28 March.

  Co-accused Robert Fulton, 70, of Brickhill Park, Newtownabbey previously pleaded guilty to a charge of assisting in the disposal of a body.

  Roy Reynolds' body was found in North Woodburn Reservoir near Carrickfergus

  The court heard Fulton was called by Campbell in the aftermath of the murder and drove his co-accused to the reservoir with Mr Reynolds' body in the boot of Fulton's Toyota car.

  Prior to this, the judge was addressed by a Crown barrister, who branded the incident as a "ferocious, brutal killing".

  Mr Reynolds, who lived in Newtownabbey, was last seen on CCTV walking on his own on the evening of 27 March on Derrycoole Way in Rathcoole.

  The court heard the evidence suggested he was murdered in Campbell's flat in Derrycoole Way some time between that evening and the early hours of the following morning.

  On Sunday evening, Campbell sent a video message from his flat where Mr Reynolds was present.

  At about 04:30 on Monday morning, police received a call about a naked body being dragged from a flat and placed into the boot of a car.

  The witness provided police with the car's registration, which was traced to Fulton. Details were circulated and the vehicle was stopped just before 07:00 in Rathcoole.

  Officers observed bloodstains on Campbell, who claimed he had been fighting with his brother.

  When the vehicle was searched, pools of blood were visible in the boot and other areas of the Toyota.

  This was pointed out to Fulton and when officers suggested someone was badly hurt, he said "aye, I know."

  When asked if there had been a body in his boot, Fulton replied: "Sure you know rightly."

  Campbell was arrested on suspicion on murder and he replied: "Murdered who?"

  Flowers were left at the reservoir after the body was found

  Mr Reynolds' body was discovered at 08:30 in shallow water at the reservoir in Carrickfergus.

  A breezeblock had been attached to the body in an attempt to weigh it down.

  Further searches were conducted at Campbell's flat, where there were signs of a serious assault.

  Clothing, a knife and screwdriver were seized - all which had Mr Reynolds' blood on them.

  A post-mortem examination revealed he died from multiple injuries to his neck, head, chest and abdomen.

  The prosecution barrister said the injuries to Mr Reynolds were inflicted by a "variety of mechanisms" including stamps, kicks and punches as well as the use of weapons and strangulation.

  Over the course of 11 interviews, Campbell provided an account of what happened.

  He claimed he invited Mr Reynolds to his flat for a drink, that he was provoked and that he acted in self defence.

  During an altercation, Mr Reynolds fell backwards and hit his head on a tiled floor, Campbell claimed.

  Flowers being laid at the North Woodburn Reservoir near Carrickfergus in memory of Mr Reynolds

  He then claimed to panic and called Fulton, as he needed to get Mr Reynolds out of his flat and into his car, police were told.

  Campbell denied using any weapons in the attack and said he did not intend to cause Mr Reynolds serious harm.

  Branding Campbell's account as a "series of multiple lies", the prosecution said it was "not supported by the evidence in any way" including the multiple injuries sustained and the presence of the breezeblock.

  During his interviews, Fulton told police the only role he played was as a driver for Campbell, which was accepted.

  Campbell's defence barrister said his "vulnerable" client had mental health issues.

  He said Campbell stood by his claim that he was provoked, and added his guilty plea indicated remorse.

  Fulton's barrister expressed her apologies to Mr Reynolds' family on Fulton's behalf, who she said was "horrified about what he became involved in."

  She also spoke of Fulton's health issues and time already spent on remand.

  After listening to submissions from both the Crown and defence, Mr Justice O'Hara said he needed time to reflect on what he had heard and said he would sentence both men on 13 March.
