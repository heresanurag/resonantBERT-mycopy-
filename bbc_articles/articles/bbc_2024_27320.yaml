content: |-
  Captain Jodie Cunningham says that women’s rugby league is in the best shape it has ever been "by a million miles" as England prepare to take on Wales at Headingley on Saturday.

  'Women's rugby league million miles better than it's ever been'

  Jodie Cunningham made her international debut for England in 2009

  Women: England v Wales Kick-off: 12:00 GMT Coverage: Live on BBC Two and BBC iPlayer, live commentary on BBC Radio 5 Sports Extra, text commentary on BBC Sport website and app Men: England v Samoa Kick-off: 14:30 GMT Coverage: Live on BBC One and BBC iPlayer, live radio and text commentary on BBC Sport website and app

  Jodie Cunningham says that women's rugby league is in the best shape it has ever been "by a million miles" as England prepare to take on Wales at Headingley on Saturday. Stuart Barrow’s side play Wales at 12:00 GMT in Leeds - before England's men face Samoa in the second Test of their series - having won 60-0 in the same fixture almost 12 months ago. The match is viewed as invaluable preparation for the Lionesses, who are starting to build towards a unique chance to showcase the British game when they face Australia in Las Vegas next March. And captain Cunningham, 32, believes that the opportunities and development now present in the women's game are in stark contrast to when she made her international bow in 2009. "If you compare what we get now, what it looks like, the product on the field from any of the time I've been in the squad, the progress is just phenomenal," she told BBC Sport. "It is [the best it's ever been] by a million miles. "People say: 'You are a generation too early and think of what you are going to miss out on.' I feel really grateful and appreciate the development year on year because I've seen what it was like when nobody cared, we got no funding and kits didn't fit and there were no young girls in the crowd because nobody knew about it." Cunningham cites the formation of the Women's Super League in 2017 as a major turning point. Since then, England has hosted a World Cup, while renewed calls for top-level female players to become fully professional has resulted in several clubs - including Leeds Rhinos, York Valkyrie and St Helens - introducing payments to players during a period in which attendances are also increasing. By the end of next term, it will also be compulsory for every Super League team to have an Academy Under-19s set-up to provide another pathway for talented youngsters to thrive.

  Hollie-Mae Dodd was the first English player to sign with a NRLW club

  The loose forward's immediate focus is on securing her place on the plane for the trip to the United States to play the world champions. "We have to make sure we get through the game, perform and get a win but I think people have an eye on the Vegas game," Cunningham added. "This is the last chance you're going to get to prove you should be on the plane and the competition for places now is so much higher than it's ever been. "There are names that have been left out that have been stalwarts of the team and I have no doubt will be back at some point. You look at the halves in Isabel Rowe and Jenna Foubister and what they can do is incredible. Erin Stott from St Helens has been brilliant all year and Amelia Brown has scored some incredible tries, again an exciting talent." The Super League talent on show for England against Wales will be supplemented by the return of Hollie-Mae Dodd, with the Canberra Raiders second row featuring for the first time since her move to the Women's NRL from York in 2023. "Getting Hollie back in the squad is massive," added Cunningham. "She is such a great young talent and she knows what it takes to compete against the best in the world because she does it on a weekly basis at club level. She understands the standards and where things need to be and will help raise them."

  Georgia Roche and Fran Goldthorp both have experience of playing in the NRLW

  Georgia Roche and Fran Goldthorp are among the notable omissions from previous squads. Newcastle Knights stand-off Roche is unavailable because of her commitments in Australia, while full-back Goldthorp, another to have played in the NRLW, has switched codes to rejoin Premiership Women's side Loughborough Lightning. "Stuart Barrow wanted to look at the young girls because it's not just about playing a one-off test - we are trying to win a World Cup and see what we need," Cunningham added. "With Georgia not being back, it gives him the chance to play some of the young girls but if there was a strong demand for, say, a match against Australia, I'm sure we'd make that happen." Meanwhile, Goldthorp's move back to rugby union comes with the Women's World Cup taking place in England in 2025. "Fran always spoke about wanting to be a dual-code international and it was something she said early on - even in the 2022 World Cup she talked about it," continued Cunningham. "I'm not surprised she wants to test herself back in union and try to make her international debut for the Roses, which she is more than capable of doing with her talent. “If Fran makes that World Cup squad next year, we will fully back her and hopefully she may tick that box off and come back to us. There is always a chance with Fran because she always follows her heart and I believe her heart is with league but she has some ambitions that she wants to fulfil."
