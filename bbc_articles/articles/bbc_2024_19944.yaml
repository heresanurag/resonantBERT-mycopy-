content: |-
  Two people have been taken to hospital after the fire, the cause of which is not yet known.

  Two people have been taken to hospital after a fire at a building partly used as a block of flats in Dagenham, east London.

  Over 100 residents were moved to safety after the building in Freshwater Road, Dagenham, started burning in the early hours of Monday morning.

  The scaffolding as well as parts of the building up to the sixth floor and the roof were ablaze, the London Fire Brigade (LFB) said.

  The cause of the fire is not yet known, it added.

