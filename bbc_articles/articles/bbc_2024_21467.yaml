content: |-
  The expedition, funded by billionaire Jared Isaacman, will attempt the world's first private spacewalk.

  SpaceX's Falcon 9 rocket, carrying four private citizens, has launched into space, where the crew will spend five days - and attempt the world's first private spacewalk.

  The mission is funded by billionaire Jared Isaacman and is the second privately-crewed mission from SpaceX - the spaceflight company founded by Elon Musk.
