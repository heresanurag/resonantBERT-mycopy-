title: Skipton wedding shop makes bucket list dream come true - BBC News
date: '2023-12-06'
section: General
url: http://www.bbc.co.uk/news/uk-england-york-north-yorkshire-67629640
content: |-
  The bridal store's event lets people model a dress even if they have no intention of marrying.

  A North Yorkshire bridal shop owner has spoken of her "honour" at helping a terminally-ill woman fulfil a bucket list wish.

  Molly Fuchs wanted to try on one of the gowns at the store in Skipton as "she's always wanted to be a bride".

  After being able to fulfil her dream, Ms Fuchs said: "It's just amazing, this is my wedding day."

  Shop owner Mandy Abramson said: "It's amazing, to just be a little part of that, I think it's a great honour."
