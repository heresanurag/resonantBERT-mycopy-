title: 'Australia fires: PM Morrison apologises for taking holiday during crisis -
  BBC News'
date: '2019-12-22'
section: General
url: http://www.bbc.co.uk/news/world-australia-50883062
content: |-
  Australia's prime minister apologised after taking a holiday in Hawaii while wildfires raged at home.

  Australian Prime Minister Scott Morrison has apologised for taking a trip to Hawaii whilst wildfires raged in his home country.

  The prime minister cut his trip short as criticism increased and announced that he was sorry in a press conference in Sydney.
