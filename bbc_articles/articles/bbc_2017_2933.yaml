content: |-
  If stargazing is your idea of a great night out, the Isle of Man is the place to be.

  With the highest concentration of dark sky sites in the British Isles, the Isle of Man is the perfect spot for stargazing.

  See more on BBC Inside Out North West at 19:30 GMT on Monday 13 February.
