title: 'Swansea fire: Five in hospital after Sandfields house blaze - BBC News'
date: '2021-10-22'
section: Wales
url: http://www.bbc.co.uk/news/uk-wales-59007222
content: |-
  Fire officers spent more than an hour putting the fire out, with an investigation now underway.

  Three fire crews used two hose reel jets and six sets of breathing apparatus to put the fire

  Three adults and two children have been taken to hospital after a house fire.

  The cause of the blaze on Burrows Road, Sandfields, Swansea, is now being investigated.

  It broke out at about 23:20 BST on Thursday, with three fire crews using two hose reel jets and six sets of breathing apparatus to put it out.

  The fire at the mid-terrace property was put out in just over an hour, with the condition of the five people unknown.

  The blaze was put out in just over an hour on Burrows Road
