title: 'Afghanistan earthquake: Injured carried to rescue helicopter - BBC News'
date: '2022-06-22'
section: General
url: http://www.bbc.co.uk/news/world-middle-east-61893747
content: |-
  More than 1000 people are killed as a 6.1 magnitude quake hits Paktika province.

  A government rescue helicopter has attended the scene of a 6.1 magnitude earthquake in Afghanistan's Paktika province.

  More that 1000 people have been killed and hundreds more injured, Taliban officials have said.
