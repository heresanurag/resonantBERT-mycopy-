title: Two people charged over Just Stop Oil protest at Stonehenge - BBC News
date: '2024-11-14'
section: Wiltshire
url: http://www.bbc.co.uk/news/articles/clyv96x9147o
content: |-
  Two people are charged with damaging an ancient monument following Just Stop Oil protests.

  The charges are related to the damage that was caused during the protest in June

  Two people have been charged in connection with an incident in which Stonehenge was sprayed with orange powder during a Just Stop Oil protest. Rajan Naidu, 73, of Gosford Street, Birmingham, and Niamh Lynch, 20, of Norfolk Road, Bedford, were both charged with one count of destroying or damaging an ancient protected monument and one count of causing a public nuisance. The protest took place at the ancient stone circle in June. They will both appear at Salisbury Magistrates' Court on 13 December for a first hearing.

  Sophie Stevens, from the Crown Prosecution Service, said: "I would like to remind all concerned that there are active criminal proceedings against these individuals, and they have the right to a fair trial." Following the protest, English Heritage said experts had quickly removed the orange powder from the stones.
