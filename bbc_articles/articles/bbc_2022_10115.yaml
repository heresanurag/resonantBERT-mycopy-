  It is the boundary of the huge water catchment area that feeds the Silent Valley and Ben Crom reservoirs.

  The Mourne Wall celebrates its 100th birthday this year with special celebrations held over the weekend.

  A listed structure that crosses 15 mountain summits, it’s the boundary of the huge water catchment area that feeds the Silent Valley and Ben Crom reservoirs.

  As well as celebrating its story, stonemasons are currently at work to maintain the wall.

  BBC News NI's South East reporter Cormac Campbell has been finding out what it entails.
