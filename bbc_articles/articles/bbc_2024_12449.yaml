content: |-
  Thousands of Scotland fans bring party atmosphere to Cologne ahead of a crucial Euro 2024 match.

  Thousands of Scotland fans have descended on Cologne ahead of a crucial Euro 2024 match against Switzerland.

  The Tartan Army have been bringing the party atmosphere and are hopeful of a much-needed result.

  Scotland need to avoid a loss to still have a chance of qualifying from the group stages.

  Earlier, Steve Clarke's men received support from an unlikely source, as FC Cologne's mascot Hennes -the goat - predicted the Scots would beat the Swiss.
