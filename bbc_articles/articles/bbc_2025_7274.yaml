content: |-
  Lib Dems say fines of up to £1,000 would tackle the "blight" of anti-social behaviour on public transport.

  Call to fine 'headphone dodgers' who play music on buses

  The Liberal Democrats are calling for fines of up to £1,000 for "headphone dodgers" who play loud music and videos on public transport. Current railway byelaws already ban many forms of anti-social behaviour on trains and at stations, including using equipment to produce sound without permission if this annoys others. However, the Lib Dems want to change the law to explicitly ban playing music and videos out loud from a phone on trains and buses in England. A Department for Transport spokesperson said: "There are already strict rules in place to prevent anti-social behaviour on public transport, including possible fines of up to £1,000."

  The government is also introducing further measures to tackle anti-social behaviour on buses, including mandatory training for staff on how to respond to incidents. The idea has cross-party support, with some Labour and Tory MPs previously suggesting similar measures. However, without government support the Lib Dem proposals are unlikely to become law.

  A survey of more than 2,000 UK adults for the Lib Dems, conducted by Savanta, found 38% had experienced people playing music out loud often or sometimes. Some 54% of people would not feel comfortable asking someone to turn down their music on public transport, the findings suggest. The figure was higher for women (63%) then men (46%). The Lib Dems said they would try to amend the Bus Service Bill, which is currently making its way through Parliament and is due to be debated by peers next week, to introduce the changes. The party said it also wanted existing railway byelaws to be amended to make clear playing music and videos out loud from a phone counts as unacceptable behaviour and should be punishable with a fine of up to £1,000. It said this should be accompanied by a national publicity campaign, including posters on train platforms and at bus stops. Currently passengers who breach bylaws can be removed from trains or stations, with a maximum fine of £1,000. Existing regulations also allow passengers to be removed from buses if they play sounds which are likely to annoy others. Liberal Democrat Home Affairs spokeswoman Lisa Smart said: "Far too many people dread their daily commute because of the blight of anti-social behaviour - and headphone dodgers playing loud music on buses and trains are some of the worst offenders. "Whether you're heading to work, taking your kids to school, or simply trying to enjoy a moment of peace, everyone deserves to feel safe and respected on public transport." She added: "It's time to take a stand for the quiet majority who just want to get from A to B in peace."

  Conservative shadow transport secretary Gareth Bacon said: "Playing loud music on public transport may seem like a small thing, but it speaks towards a growing tolerance of anti-social behaviour that chips away at public civility." He added that the Conservative Party supports "common-sense reforms like this" but "any new byelaws must be backed by stepping up enforcement - something the Liberal Democrats' plan fails to deliver". Reform UK and the Green Party have been approached for comment.

