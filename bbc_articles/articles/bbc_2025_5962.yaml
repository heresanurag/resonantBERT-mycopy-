  What happens next depends on two key questions. Firstly, whether China takes up that offer to negotiate. And secondly, assuming it eventually does, whether China is willing to make the kind of major concessions that America is looking for, including a complete overhaul of its export driven economic model. In answering them, the first thing to say is that we are in completely uncharted territory, so we should be wary of anyone who says they know how Beijing is likely to react. But there are certainly reasons to be cautious. China's vision of its economic strength - one based on strong exports and a tightly protected domestic market - is now closely bound up with its idea of national rejuvenation and the supremacy of its one-party system. Its tight control over the information sphere means it will be unlikely to drop its barriers to American technology companies, for example. But there is a third question, and it is one for America to answer. Does the US still believe in free trade? Donald Trump often suggests that tariffs are a good thing, not merely as a means to an end, but as an end in themselves. He talks about the benefit of a protectionist barrier for America, in order to stimulate domestic investment, encourage American companies to bring those foreign supply chains back home, and raise tax revenues. And if Beijing believes that is indeed the primary purpose of the tariffs, it may decide there is nothing to negotiate anyway. Rather than championing the idea of economic co-operation, the world's two biggest superpowers may find themselves locked in a fight for winner-takes-all economic supremacy. If so, that really would mark a shattering of the old consensus, and a very different, possibly very dangerous, future.

