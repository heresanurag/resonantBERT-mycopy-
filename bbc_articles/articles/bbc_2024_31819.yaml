  Woman in crown court charged with murder of son, 5

  A woman accused of murdering her five-year-old son has appeared in crown court for the first time. Claire Button, 35, of Windstar Drive in South Ockendon, Essex, is charged with the murder of Lincoln Button, who was found dead on 15 December. Ms Button appeared by video link from HMP Peterborough during a hearing at Chelmsford Crown Court and only spoke to confirm her name. She was remanded into custody until a plea hearing at Basildon Crown Court on 20 January.

  During the hearing she was not asked to enter a plea and no application for bail was made. Essex Police said it worked with paramedics to try and save Lincoln Button's life. The force initially responded to reports of serious concerns for the welfare of a child and a woman at an address in Windstar Drive. It said a woman was taken to hospital for treatment and her condition improved.

