content: |-
  Videos posted on social media show queues for fuel and gridlocked traffic as people try to leave Tehran.

  Videos posted on social media show queues for fuel and gridlocked traffic as people try to leave the Iranian capital Tehran.

  Israel began launching strikes on Iran four days ago, saying it was targeting the country's nuclear programme. Iran's health ministry reports that at least 224 people have been killed. BBC journalists are unable to report from inside Iran due to restrictions by the country's government.

  Meanwhile, Israel says 24 people have been killed in retaliatory strikes by Iran.
