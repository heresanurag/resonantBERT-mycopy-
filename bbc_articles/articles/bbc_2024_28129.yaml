  After years of being one of the best drilled sides in world rugby, the referee's whistle is becoming an increasingly prominent issue for this Irish outfit. Across their past three Test matches, they have allowed the opposition 18 successful shots at their posts. "It's something that we’ve been outstanding on over the last ten years, actually," said Farrell. "But certainly in that amount of time you’re saying there [the past three games], it’s not done out of players going out there to be ill-disciplined. It’s coming from the right place, if that may sound stupid. "All they’re trying to do is do the right thing by their team, They just need to be a little more patient individually and trust the team and what they’re about."

  Sam Prendergast [left] made his debut off the bench in place of Jack Crowley [right]

  If the most immediate area requiring improvement is readily apparent, the bigger picture remains Ireland's transition from a team for today into one built for tomorrow. One of Farrell's biggest strengths in his role has been as a selector, with his decisions - picking Jamison Gibson-Park and Mack Hansen at times when few were calling for them to start offering just two examples - often proving so prescient that the initial wider doubts have been largely forgotten. Having selected a team so obviously for the present rather than the future against the All Blacks, some quarters were calling for wholesale changes and an infusion of youth. Rather than opt to discard so many of those who had taken the side to number one in the world, the soon-to-be British and Irish Lions head coach rotated minimally for the Pumas, bringing in Robbie Henshaw for Bundee Aki for the only change to the starting side. There was greater upheaval to his bench, with Sam Prendergast, Craig Casey and Ryan Baird included at the expense of Frawley, Conor Murray and Iain Henderson, while the uncapped prop Thomas Clarkson debuted as a replacement with Tadhg Furlong and Tom O'Toole ruled out through injury. The 21-year-old Prendergast and Jamie Osborne, 22, in particular caught the eye in their cameos as Farrell weighs up how best to integrate the next generation into his side moving forward. A side that can beat opposition as good as Argentina even on a day when not firing on all cylinders is not one to be cast aside quickly, and greater rotation is surely in store against Fiji next week, but the pace of such change will remain a source of debate.
