  Seeking a response to defeat by the All Blacks seven days prior, Ireland's victory over Argentina answers some questions while presenting a few more.

  Better Ireland still seeking answers after vital win

  Ireland were never behind against Argentina but survived a late scare in their 22-19 win

  Seeking a response to a jarring defeat against the All Blacks seven days prior, Ireland's victory against Argentina at the Aviva Stadium on Friday served to answer some questions while presenting a few more. Andy Farrell called it "three or four games in one" and, as such, there was good, bad and ugly in the host's performance. Having taken the lead in the second minute, Ireland were never behind but, after failure to score in the second half, ended the contest against 14 men clinging on to a slender 22-19 advantage. The game had seemed in hand at half-time, yet come the final whistle the overriding emotion in Dublin was one of relief. Without consecutive losses since the opening two fixtures of the 2021 Six Nations, Ireland's response to setbacks has so often been emphatic. Whether it be overcoming a first Test defeat to win the series in New Zealand in 2022, putting their World Cup 2023 heartache behind them with a stirring away win in France to start the most recent Six Nations, or looking decidedly outplayed in the first Test against South Africa this summer only to turn the tables seven days later - Farrell's Ireland have proven masters at lifting themselves from the canvas. But, beaten so decisively by the All Blacks last week when discipline was a massive issue and the attack misfired, rarely in recent times had it felt like there was so much to fix from one game to the next. Prior to kick-off, Farrell said some of his players were "lucky" to get the opportunity to atone for their opening autumn performance. When asked after the nerve-shredding 82 minutes if he had got the desired response, he replied "in parts".

  Argentina, who have now lost all 11 Tests they have played in Dublin, have beaten France, South Africa, New Zealand and Australia in this calendar year alone. As such, they were never likely to allow Ireland to have things solely their own way. But, while there was a slice of luck involved in the way that Matias Moroni's yellow card negated the centre's own early try, Ireland could not have asked for a better platform than two tries in the opening five minutes. A third, as well as a disallowed fourth through Tadhg Beirne, would follow before the turn, but Ireland failed to score a single point across the game's final 48 minutes. Key to ensuring the win required such a dramatic final defensive stand was Irish ill-discipline. While Argentina failed to take advantage of yellow cards for Finlay Bealham and Joe McCarthy, and would see two players sent to the sin bin themselves, Ireland conceded 13 penalties for the second game in succession.

