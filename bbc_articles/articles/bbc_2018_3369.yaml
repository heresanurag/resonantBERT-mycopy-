title: Police surround French supermarket in hostage situation - BBC News
date: '2018-03-23'
section: General
url: http://www.bbc.co.uk/news/world-europe-43512536
content: |-
  Officers are at the scene of a hostage situation at a supermarket in Trèbes.

  A gunman is reported to have taken people hostage in a supermarket in Trèbes, in the south of France.

  The BBC's Lucy Williamson reports on what is know so far.
