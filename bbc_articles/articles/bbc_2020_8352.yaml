  The daily increase was the largest in the US state since 4 July and comes a day after Disney World reopened.

  Do people need to be forced to wear face coverings?

  Guidance on face coverings has evolved over the last few months. The key issue now is whether people will wear them without being forced to. The Scottish government is worried they won't - and so has told people they have to wear one in shops. On Friday, Boris Johnson appeared for the first time in public in a covering and hinted that stricter rules were coming in England. But now senior minister Michael Gove seems to be saying something different - that we should trust the common sense of shoppers. My sources are keen to point out Mr Gove also said the government would take more action when necessary - so mandatory face coverings in England aren't off the table. His comments are also in line with the policy as it stands just now. But at a time when public messaging is crucial, some believe the government view on whether or not stronger action is needed isn't clear.
