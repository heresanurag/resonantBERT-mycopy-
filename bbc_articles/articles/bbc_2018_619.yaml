  Esther McVey is among the new faces brought in by Theresa May on a day of drama.

  Kuenssberg: May's day 'did not go to script'

  Laura Kuenssberg says the reshuffle did not "entirely go to script" given that of the three ministers she wanted to move, one quit, one persuaded her that he should stay and the other wasn't even asked to move. At the end of the day, she says the cabinet does not look very different from how it did this morning in terms of its gender balance and diversity. While this was never intended to be a transformative moment - since the key figures in the PM's top team were all staying put - the BBC's political editor says No 10 will hope that day two of the reshuffle on Tuesday, when we will see changes to junior and middle ranks - goes more smoothly.
