title: Nottingham man charged with 'dognapping' denies offences - BBC News
date: '2024-11-08'
section: Nottingham
url: http://www.bbc.co.uk/news/articles/c4g269vy6w7o
content: |-
  Julian Mead is thought to be the first to be charged with "dognapping" since a new law.

  Julian Mead is thought to be the first person charged with "dognapping", but the offence has now been changed to burglary, which he denied

  A man said to be the first person charged with "dognapping" has denied attempted murder and burglary after a woman was left seriously hurt and a dog was stolen. Emergency services were called to Bells Lane in Cinderhill, Nottingham, on 1 October when a woman was found with serious injuries and a British bulldog, called Winnie, was later reported missing from a nearby property. Julian Mead, 40, was later arrested and Nottinghamshire Police said he was the first person in the UK charged with "dognapping". However, the dognapping charge was changed to burglary by the time he appeared at Nottingham Crown Court on Thursday.

  Mr Mead also pleaded not guilty to attempted murder, grievous bodily harm and possession of an offensive weapon - namely a hammer. The woman who was injured, who is in her 40s, was taken to hospital but police said her injuries were "not life-threatening". The offence of taking a dog so as to keep it from the person with lawful control, or "dognapping", became an offence when the Pet Abduction Act (2024) came into force in August. The offence carries a maximum sentence of five years in prison, while burglary is punishable by up to 14 years behind bars. Mr Mead, who wore a prison-issue grey sweatshirt, appeared in court via video-link from HMP Nottingham and spoke only to confirm his name and enter his pleas. Judge Stuart Rafferty KC remanded Mr Mead, of Welstead Avenue in Aspley, Nottingham, in custody until his trial on 24 March at the same court.

