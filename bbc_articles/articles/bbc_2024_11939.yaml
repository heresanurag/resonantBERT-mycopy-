title: Scotland fans endure humbling Euro opener against Germany - BBC News
date: '2024-06-15'
section: Scotland
url: http://www.bbc.co.uk/news/articles/cjmm49vempdo
content: |-
  The hosts defeated Steve Clarke's men 5-1 in the opening match of the tournament in Munich.

  Hundreds of fans followed the action in the Barras Art and Design venue in Glasgow

  Across Scotland there was optimism and excitement as the national team prepared to face Germany in the opening match of Euro 2024. But the Tartan Army endured a miserable night as Germany ran out 5-1 winners. It took only 10 minutes before the three-time European champions took the lead through Florian Wirtz. Worse soon followed in a disastrous first half as Jamal Musiala doubled the Germans' lead. A Kai Havertz penalty all but ended the game by half-time after Ryan Porteous was given a straight red card.

  Substitute Niclas Füllkrug made it 4-0 in the second half before a late own goal by Antonio Rüdiger gave the Scotland fans something to cheer about. But in injury time Emre Can added a fifth to cap the biggest win in the opening match in the 66-year history of the tournament.

  About 20,000 Scotland fans were in the Allianz Arena in Munich

  Anticipation for Scotland's first international tournament on foreign soil since the 1998 World Cup in France saw fans gather across the country in pubs and fan zones. And an estimated 200,000 made the pilgrimage to Germany to cheer on Steve Clarke's men.

  The first-half was a tough watch for these fans in Glasgow

  Despite taking on the tournament hosts, many fans were in upbeat mood ahead of the game and bar staff were braced for a bumper night. Jennifer Morrison, the event manager at Glasgow's Merchant Square said preparations for the game had been underway "for months", with hundreds coming through the doors.

  Many forecast a good result and one even said it felt "like Christmas Eve" in the build-up. More than 1,200 fans gathered at Platform in Glasgow city centre, wearing Scotland tops from across the years and waving Saltires. But the good mood swiftly faded and by half-time many were simply hoping it did not get any worse.

  "We always said it was a tough ask to go to Munich and get a result in the first game. Ally McGinnigal, 37, from Dennistoun, was already looking ahead to Scotland's remaining fixtures against Switzerland on Wednesday and Hungary on 23 June. He said: "There’s still two games to go. Stranger things have happened. "As a Scotland fan I know by now to expect minimal and then if something good happens it’s a bonus." In Munich, where thousands watched in the city's fan park, fans remained positive about the future.

  The Scotland fans delivered a rousing version of Flower of Scotland before kick-off

  One fan said: "The other two teams are not the same level as Germany, so we’re still hopeful. Still hopeful. Come on Scotland." Another added: "We knew with the injuries and stuff it was going to be a bit difficult but, we expected more than what’s just gone on just now. But we’ve still got two games left in the group so we’ll win the next two games." A sense of gloom sank in across the country at the fan zones that had been set up in hope of a party. At Cumbernauld's Broadwood stadium the half-time soundtrack of Deacon Blue's Dignity failed to raise spirits. And at Riverside Park in Dundee supporters endured foul weather ahead of kick-off. One fan at the fan zone in Inverness called the result “embarrassing” and “so bad” while another called the performance “disgusting.” But others retained some hope, saying that the team needed to "keep their heads up" for the remaining fixtures.

  Peter Nellis with his daughter Maria and his three grandchildren in Dunfermline

  At Dunfermline's East End Park there were three generations of one family in attendance with Peter Nellis joined by his daughter Maria and grandchildren Mason, Megan and Caitlyn. Megan told BBC Scotland News: "It's good for people like me, because I'm not allowed in pubs because of my age, so it's good to be in places like this where we can get a nice atmosphere for the games." However one young fan perhaps summed up the match best. He simply said: "Everyone was so bad."
