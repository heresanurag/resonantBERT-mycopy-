title: FIA ex-CEO Natalie Robyn breaks silence over 'serious challenges' - BBC Sport
date: '2025-04-10'
section: Formula 1
url: http://www.bbc.co.uk/sport/formula1/articles/cql66wv234go
content: |-
  Former FIA chief executive officer Natalie Robyn says motorsport's governing body has "serious ongoing structural challenges".

  Former CEO breaks silence on FIA's 'serious challenges'

  Natalie Robyn started work for the FIA in late 2022

  Former FIA chief executive Natalie Robyn says motorsport's governing body has "serious ongoing structural challenges". It is the first time Robyn has spoken publicly since leaving the organisation in May 2024 after just 18 months in the role. At the time, the FIA said that Robyn had left "by mutual agreement to pursue opportunities outside of the FIA". In fact, Robyn was forced to resign following disagreements with FIA president Mohammed Ben Sulayem. She was commenting in the wake of the resignation of FIA deputy president of sport Robert Reid.

  Robyn told BBC Sport: "During my tenure as CEO, I worked under challenging circumstances to strengthen the federation's governance framework and upgrade its operational transparency. "The resignation of the deputy president of sport clearly indicates there are serious ongoing structural challenges. "When professional processes are not adhered to and stakeholders are excluded from decision-making, it undermines the foundation of a strong organisation. "I am saddened to see these developments, as they threaten both the credibility and the long-term effectiveness of an important institution." Robyn's comments are a direct reaction to the decision of Reid to resign on Thursday citing "a fundamental breakdown in governance standards within motorsport's global governing body". Robyn added: "I worked closely with Robert during my time at the FIA and I have a great deal of respect for him and of course his commitment to the future of motorsport." Robyn left the FIA after raising questions about the general governance of the organisation and its professional practices, including finances in the president's office. Her departure was followed by those of the head of the audit committee Bertrand Badre and audit committee member Tom Purves, who were fired in the summer of 2024. The compliance officer Paolo Basarri, who looked into the allegations that Ben Sulayem interfered in the operations of two races during the 2023 season, was fired in November. The FIA has been approached for comment.

  Reid's resignation and Robyn's decision to go public are significant developments in the ongoing saga of controversies that have unfolded around Ben Sulayem in the past three years. They are the first of the significant number of people who worked closely with Ben Sulayem within the FIA who have since left to voice their criticisms of his management style and the direction in which he is taking the governing body. Whether coincidentally or not, they also come as Ben Sulayem attends his first grand prix of the new F1 season. Ben Sulayem heads to Bahrain this weekend hoping to convince the sport's engine manufacturers to back his plan to abandon the 2026 engine rules early and switch to naturally aspirated V10s run on sustainable fuel as soon as possible. There appears to be no hope of Ben Sulayem succeeding in this ambition. To be approved, his plan would need the support of four of the five 2026 engine manufacturers. And while Ferrari and Red Bull are in favour, Mercedes, Honda and Audi are not. The most likely outcome of Friday's meeting of the FIA, F1 and the engine manufacturers is an agreement to keep talking on the future direction of engines in the sport. But Honda, Mercedes and Audi are all wedded to the idea of some hybrid element in the future, and there appears to be no prospect of this changing. Ben Sulayem has not explained why he is so keen to change F1's engine formula, although it is known that there is widespread concern within the sport about the new engine rules and their potential effect on racing. After all, it is only two years since he was proclaiming the 2026 rules a great success that had attracted Audi and Ford to F1 and persuaded Honda to stay when it had been planning to withdraw. He has also been instrumental in General Motors' 2026 entry with its Cadillac brand. The strategic reasoning behind the move is also hard to fathom. Although it is known that Ben Sulayem has been listening to former F1 boss Bernie Ecclestone - a long-time opponent of hybrid engines - on the matter, and that Red Bull team principal Christian Horner is also a key proponent. Why Ecclestone's views are considered relevant eight years after he was ousted as F1 CEO is also unknown. Mercedes, Audi and Honda were never likely to agree to abandoning an electrical component to engines, so Ben Sulayem was always likely to face defeat on his plan. The FIA has spoken of trying to future-proof the sport against a global economic downturn that could risk the manufacturers pulling out - and that was before US president Donald Trump's tariffs made one more likely. And privately they are telling stakeholders that they want to prevent engines being a performance differentiator in the future. The problem with that reasoning is that changing to naturally aspirated engines would guarantee the departure of at least two of the 2026 manufacturers. And engines have always been a performance differentiator. The question now is whether these latest developments have any impact on the forthcoming FIA presidential election in December. Insiders say Ben Sulayem's support is solid. Indeed, some of the ways in which he has been trying to shore it up - for example, by offering financial incentives to motorsport clubs - are involved in the departures of some of the key figures who have left the FIA in the last year or so. So far, no one has come forward to oppose Ben Sulayem, but sources close to the FIA say that at least one potential candidate is in the wings. Beating Ben Sulayem, in the context of the FIA electoral system, will not be easy for anyone, whoever they are.

