  "It must have been so hard for her to actually come in and do that and try to blot out the scenes of what she had seen," she said.

  Ines said she sat her chemistry paper that morning as "there was no point me carrying on watching the building burning".

  Her family are currently living in a hotel as they wait to be offered a permanent home.

  Her 20-year-old brother Tiago, who joined her to collect her grades, said he was "very proud" of his "overachiever" sister.

  "It seems very surreal even though I knew she was going to get it," he said.

