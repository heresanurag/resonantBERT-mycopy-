content: |-
  Paisley Toten was feeding a giraffe when the animal suddenly picked the two-year-old up from her T-shirt.

  Paisley Toten was feeding a giraffe at the Fossil Rim Wildlife Center in Glen Rose, Texas, when the animal suddenly picked the two-year-old up from her T-shirt.

  The giraffe promptly dropped Paisley back into the truck, but not before startling the girl's parents.
