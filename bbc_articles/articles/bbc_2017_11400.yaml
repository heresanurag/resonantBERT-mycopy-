title: Texas mass shooting church transformed into haunting memorial - BBC News
date: '2017-11-13'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-41971707
content: |-
  Twenty-five people were killed when a gunman opened fire at the First Baptist Church in Sutherland Springs, Texas.

  It was the worst mass shooting in the state's history.
