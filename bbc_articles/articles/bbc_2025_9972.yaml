  Another witness, Yoni Kalin, said "people were calming him down, bringing him water, taking care of him". It later became apparent that the man they were helping was the alleged shooter, Mr Kalin said. After police arrived, Mr Kalin said the suspect confessed to the shooting and "pulled out a red keffiyeh". "He said 'I did this for Gaza. Free Palestine,'" Mr Kalin told the BBC. Ms Kalin, the organiser, said the event was about building coalitions in the Middle East. She told the BBC it is "deeply ironic that what we were discussing was bridge building, and then we were all hit over the head with such hatred". Dan Bongino, the deputy director of the FBI, said police are interviewing the suspect and that "early indicators are that this is is an act of targeted violence".
