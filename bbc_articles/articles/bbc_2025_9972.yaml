content: |-
  The alleged attacker looked "very distraught" and was being helped by bystanders before he revealed himself as the suspect.

  US Jewish museum shooting suspect was mistaken for witness

  To play this video you need to enable JavaScript in your browser. This video can not be played Watch: BBC talks to witnesses who saw shooter inside Jewish museum

  The suspect accused of shooting and killing two Israeli embassy staff members at a Wednesday night event in Washington DC was mistaken for a witness by security, eyewitnesses told the BBC. Jojo Kalin, who organised the American Jewish Committee event at the Capital Jewish Museum, said she saw the attacker inside the building, looking "very distraught" after the shooting. "The security let this person in thinking they were a bystander or witness," she said, adding that she did not see a weapon on him. After she gave him water, she said the suspect pulled out a keffiyeh and yelled "free Palestine". Police have named the suspect as 30-year-old Elias Rodriguez of Chicago, who is now in custody.

  Mr Rodriguez is accused of fatally shooting Yaron Lischinsky and Sarah Lynn Milgrim, who both worked at Israel's embassy in Washington DC. The two were a couple, according to Israel's ambassador to the US Yechiel Leiter. The ambassador said the young man had bought a ring this week and planned to propose next week in Jerusalem. The shooting unfolded at around 21:05 local time (02:05 BST), when a gunman opened fire at the couple as they were leaving Wednesday night's event. The chief of police in Washington DC, Pamela Smith, said Mr Rodriguez was allegedly seen pacing back and forth outside the museum before he approached a group of four and shot two of them with a handgun.
