title: 'Ardrossan shooting: Police name dead man as Paul Cairns - BBC News'
date: '2020-05-25'
section: Glasgow & West Scotland
url: http://www.bbc.co.uk/news/uk-scotland-52793559
content: |-
  Paul Cairns, 42, died of his injuries after a gunman opened fire at Ardrossan in North Ayrshire.

  The man who died was named by police as Paul Cairns

  A man shot dead in a house in North Ayrshire at the weekend has been named by police.

  Paul Cairns, 42, was fatally wounded by a gunman who entered a house in Nithsdale Road, Ardrossan, at about 16:50 on Sunday.

  Mr Cairns died at the scene. A 46-year-old woman was also in the house, but was not injured.

  A 42-year-old man has been arrested and charged in connection with the shooting.

  The shooting happened in Nithsdale Road in Ardrossan

  Ch Insp Brian Shaw, said: "It would appear to have been a targeted attack and I would like to reassure the community that we do not believe that there is an ongoing to risk to the public.

  "Additional officers have been deployed to the area and high visibility patrols will continue to provide further reassurance in the community.

  "Inquiries into the circumstances surrounding this death are ongoing and we are keen to talk to anyone who may have information that would help our investigation or who may have seen anything before or after the incident."
