  • None Nicolas Pepe has scored all his five goals for Arsenal in all competitions in London - four at the Emirates and one at London Stadium.
  • None Arsenal have scored eight goals via corners in the Premier League this season, two more than any other team.
  • None Manchester United have now lost four of their past five away Premier League visits to Arsenal (W1).

  Arsenal host Leeds on Monday, 6 January in the FA Cup third round (kick-off 19:56 GMT), while Manchester United travel to Wolves on Saturday, 4 January (kick-off 17:31) in a repeat of their quarter-final defeat last season.
