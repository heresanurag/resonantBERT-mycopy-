title: 'Ethiopian Airlines: 157 feared dead in crash - BBC News'
date: '2019-03-11'
section: General
url: http://www.bbc.co.uk/news/world-africa-47515295
content: |-
  The airline says 149 passengers and eight crew members were on flight ET302, which crashed shortly after take-off from Addis Ababa.

  An Ethiopian Airlines jet has crashed shortly after take-off from Addis Ababa, killing all on board.

  The airline said 149 passengers and eight crew members were on flight ET302 from the Ethiopian capital to Nairobi in Kenya.
