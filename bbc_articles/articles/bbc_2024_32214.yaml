title: Thomas Kingston took life after "adverse reaction" to medication - BBC News
date: '2024-12-04'
section: Gloucestershire
url: http://www.bbc.co.uk/news/articles/c8ewl7e75yxo
content: |-
  The husband of Prince and Princess Michael of Kent's daughter died from a head injury in February.

  Thomas Kingston took life after reaction to medication

  Lady Gabriella, the daughter of Prince and Princess Michael of Kent, with her late husband Thomas Kingston

  Lady Gabriella Kingston has said that the death of her husband was "likely provoked" by an adverse reaction to medication, as a coroner concluded that he took his own life. Thomas Kingston, the husband of Prince and Princess Michael of Kent’s daughter Lady Gabriella, died from a head injury at his parents’ home in the Cotswolds on 25 February. A gun was found near his body. The inquest into his death was told Mr Kingston had stopped taking medication in the days leading up to his death. "The lack of any evidence of inclination, it seems highly likely to me that he had an adverse reaction to the pills that led him to take his life," Lady Gabriella said.

  At Gloucestershire Coroner's Court on Tuesday, Lady Gabriella warned about the effects of drugs used to treat mental health problems. In her statement read out by Katy Skerrett, senior coroner for Gloucestershire, she said: "I believe anyone taking pills such as these need to be made more aware of the side effects to prevent any future deaths. "If this could happen to Tom, this could happen to anyone."

  Thomas Kingston had been given medication after complaining of trouble sleeping following stress at work

  The inquest was told Mr Kingston, a 45-year-old financier, had initially been given sertraline, a drug used to treat depression, and zopiclone, a sleeping tablet, by a GP at the Royal Mews Surgery, a practice at Buckingham Palace used by royal household staff, after complaining of trouble sleeping following stress at work. Mr Kingston returned to the surgery saying they were not making him feel better, and his doctor moved him from sertraline to citalopram, a similar drug. In the days leading up to his death, Mr Kingston stopped taking medication, the inquest was told. "(Work) was certainly a challenge for him over the years but I highly doubt it would have led him to take his own life, and it seemed much improved," Lady Gabriella said. "The fact that he took his life at the home of his beloved parents suggests the decision was the result of a sudden impulse."

  Lady Gabriella described her marriage as “deeply loving and trusting” and said her husband had never expressed any suicidal thoughts. Recording a narrative conclusion, Ms Skerrett said that Mr Kingston had taken his own life, adding: "The evidence of his wife, family and business partner all supports his lack of suicidal intent. “He was suffering adverse effects of medication he had recently been prescribed.”

