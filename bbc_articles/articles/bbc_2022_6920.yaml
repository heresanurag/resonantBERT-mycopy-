id: bbc_2022_6920
title: Buffalo shooting community's worst nightmare, says mayor - BBC News
date: '2022-05-16'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-61453629
content: |-
  "This is the worst nightmare that any community can face," Mayor Byron Brown says after the deadly attack.

  The Mayor of Buffalo in the US state of New York has spoken about how the community is "hurting and seething" in the wake of a shooting that killed ten people.

  An 18-year-old man has been detained following what is being treated as a racially-motivated hate crime.

  Mayor Brown went on to say that the suspect is not local to Buffalo.
