title: Lorraine Kelly reassures fans ahead of keyhole surgery - BBC News
date: '2025-05-04'
section: Culture
url: http://www.bbc.co.uk/news/articles/cr5dy8depj5o
content: |-
  The 65-year-old says she is having an operation after "not feeling all that well for a while".

  Lorraine Kelly told fans on social media that she needed surgery to remove her ovaries and fallopian tubes

  TV presenter Lorraine Kelly has revealed that she needs to undergo surgery to remove her ovaries and fallopian tubes. The 65-year-old shared a video on social media from her hospital bed on Saturday, saying she had not been "feeling all that well for a little while". The ITV host said that the "wee procedure" was "purely preventative" and had been recommended after some scans and tests. Kelly added that she was "going to be totally fine" and praised hospital staff, saying she felt "very lucky to be treated so well" in the video's caption.

