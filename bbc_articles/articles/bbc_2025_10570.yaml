  The Scottish presenter was sent well-wishes by fellow ITV colleagues Katie Piper, Charlotte Hawkins and Susanna Reid on Instagram, who wished her "a speedy recovery". The procedure, known as an laparoscopic bilateral salpingo-oophorectomy, takes one to two hours and requires several more hours of recovery in hospital. According to the NHS, external, you must stay off work for two to four weeks after having the procedure, which could mean Kelly could take a short break from presenting her show, Lorraine. Kelly has been a presenter and journalist for more than 37 years, starting her career on Good Morning Britain in 1988. She has been presenting her eponymous morning news programme Lorraine since 2010.
