title: Heathrow Airport expects third runway take offs in 10 years - BBC News
date: '2025-02-12'
section: Business
url: http://www.bbc.co.uk/news/articles/c87dv8rvjgxo
content: |-
  The chief executive of the UK's largest airport will unveil plans to develop terminals two and five.

  Heathrow expects third runway take offs in 10 years

  Heathrow Airport has confirmed a multi-billion pound investment plan to expand two of its terminals ahead of submitting proposals for a third runway to the government this summer. Heathrow Airport chief executive Thomas Woldbye said he wants planes to take off from its new third runway before the end of the next parliament, which could be ten years or fewer. The plans, which will be paid for with private cash, come after Chancellor Rachel Reeves backed a third runway at the UK's largest airport last month as part of efforts to grow the UK economy. Reeves' decision to back Heathrow's expansion has angered campaigners and members of her party who oppose it on environmental grounds.

  During his speech at British Steel's Scunthorpe plant, Mr Woldbye signed a pact to use UK steel to build new infrastructure. He also revealed funding to increase capacity at terminals two and five, and plans to reconfigure the airfield and improve bus connections. The commitment to use UK-made steel comes amid concern in the industry over the impact of tariffs being placed on imports of the metal to the US by President Donald Trump. The US import taxes could lead to excess steel being offloaded to the UK at cheaper prices, with the potential to undercut domestic businesses. While the detailed plans for a third runway at the UK's largest airport, are yet to be finalised, the construction of terminal five, which opened in 2008, required some 80,000 tonnes of steel. The expansion of Heathrow is highly controversial and faces opposition from environmental groups, many politicians, as well as nearby local authorities and residents. Critics say increasing air travel would make it much harder for the UK to meet its climate change commitments. "A third runway at Heathrow can not be a choice between economic growth and the environment," Mr Woldbye said. He added that it was a "collective mission" to grow Heathrow "responsibly within environmental boundaries." The aviation industry is a source of damaging emissions that can contribute to climate change, and it's already under pressure to find ways to reduce its impact. On Wednesday, Mr Woldbye outlined the expansion plan ahead of the new runway, which will see upgrades to terminal buildings to "enhance passenger experience and improve resilience and sustainability". "This privately funded programme will upgrade existing infrastructure while laying the groundwork for a third runway, boosting UK investment and economic growth, with tangible benefits felt this year," he said. The chancellor has said expansion at Heathrow is "badly needed" and could create 100,000 jobs. Zengwei An, chief executive of British Steel - which has the only facility in the country to make primary steel - said its workers in Scunthorpe and Teeside had a "distinguished history of supplying world-class products into projects like Heathrow's expansion". Gareth Stace, director-general of the steel industry body UK Steel, added that Heathrow committing to using domestically-made steel was a "major vote of confidence in UK steelmaking and British businesses full stop".

  Some have argued that it will take much longer than a decade for a third runway to become reality. A formal planning process has to take place, which could take between 18 months and two years. Any judicial review of the plan could take another year and a half, while actually building it could take about seven years. Reeves has said she wants to see "spades in the ground" before 2029 and planes to start using the runway by 2035, but Mr Woldbye has previously warned the project would take years and need "Churchillian resolve" to deliver. In his speech, the Heathrow boss said the airport's expansion plans will be carried out with "strict environmental safeguards" "This project can only go ahead if we meet the rules on noise, air quality and carbon... it's as simple as that," he added. "I want to assure you that we are committed to listening and working with our local communities to provide them with the certainty they deserve, ending years of doubt." Heathrow currently handles £200bn worth of trade a year and provides a key avenue for exports, particularly for small and medium-sized businesses. But Heathrow's infrastructure is strained: last year, a record 83.9 million passengers passed through its terminals with its two runways handling around 1,300 landings and take-offs every day. Flights from the airport are currently capped at a maximum of 480,000 per year and in practical terms it has reached that limit. A third runway would potentially increase the number of flights permitted to 720,000.

