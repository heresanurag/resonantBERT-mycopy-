id: bbc_2019_4183
title: New Zealand PM Jacinda Ardern gives emotional gun law speech - BBC News
date: '2019-04-10'
section: General
url: http://www.bbc.co.uk/news/world-asia-47880283
content: |-
  New Zealand's parliament backs changes to gun laws after last month's deadly mosque attacks.

  Ms Ardern spoke about the injuries victims of the Christchurch attacks received, as the New Zealand parliament voted to ban all types of semi-automatic weapons and assault rifles.

  "These weapons were designed to kill, and they were designed to maim and that is what they did on the 15th of March," Ms Ardern said.
