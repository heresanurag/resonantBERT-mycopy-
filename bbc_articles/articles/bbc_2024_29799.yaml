content: |-
  One Direction star Payne, 31, died after falling from a hotel balcony in Argentina.

  Three charged in connection with Liam Payne's death

  Three people have been charged in connection with the death of One Direction star Liam Payne, Argentinian authorities have said. The singer died on 16 October after falling from the third-floor balcony of a hotel in Buenos Aires. Argentina's National Criminal and Correctional Prosecutor's Office said one person, who had been accompanying Payne, is accused of "the abandonment of a person followed by death". A hotel employee and a third person have also been charged with supplying drugs. None of those arrested have been named.

  Payne, 31, a father-of-one, became one of the most recognisable names in pop after appearing on The X Factor and rising to fame with the boyband One Direction in the 2010s. Argentinian authorities have been investigating Payne's final days at the CasaSur hotel. After the singer's death, police found substances in his hotel room and destroyed objects and furniture. Hotel staff had made two calls to emergency services saying they had a guest who had taken "too many drugs and alcohol", and was "trashing the entire room", it was previously reported. On Thursday, the public prosecutor's office said toxicology tests revealed traces of alcohol, cocaine and a prescription antidepressant in his body. A post-mortem examination determined his cause of death as "multiple trauma" and "internal and external haemorrhage", as a result of the fall from the hotel balcony. According to the prosecutor's office, medical reports also suggested Payne may have fallen in a state of semi or total unconsciousness. The prosecutor's office say this rules out the possibility of a conscious or voluntary act by Payne, and they have concluded the singer did not know what he was doing nor have any comprehension of his actions. In addition, authorities have carried out nine raids on houses in Buenos Aires. They are continuing to investigate Payne's broken laptop and other devices seized. The prosecutor's office added it has examined more than 800 hours of video footage from security cameras in the hotel and on public roads, and received dozens of testimonies from hotel staff, family members, friends and medical professionals. The singer's body was released to his family on Wednesday to be flown back to the UK.

  Following Payne's death, tributes flooded in including from his former partner Cheryl, One Direction bandmates and music mogul Simon Cowell. Payne’s bandmates Niall Horan, Louis Tomlinson, Zayn Malik and Harry Styles said in a joint statement that they were “completely devastated” and will miss the singer “terribly”, adding the “memories we shared with him will be treasured forever”. Thousands of fans also remembered the late singer at memorial events in the UK and around the world.
