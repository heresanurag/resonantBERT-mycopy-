title: 'Newspaper headlines: Reeves ''risks hurting pensioners'' and shoplifting ''crisis''
  - BBC News'
date: '2024-10-25'
section: The Papers
url: http://www.bbc.co.uk/news/articles/c1ml901xy5xo
content: |-
  Warnings ahead of Rachel Reeves' first Budget, and the soaring cost of theft from shops, lead the papers.

  Online fraudsters are selling thousands of pounds worth of fake poppies, the Daily Express reports

  The build-up to next week's budget continues to lead many of the papers. The Daily Telegraph, external says Chancellor Rachel Reeves' plan to change the government's fiscal rules will "unleash a borrowing spree of up to £50bn". The Daily Mail s, externalays the figure equates to £1,750 per household. The shadow chancellor, Jeremy Hunt, is quoted saying the plan risks pushing up interest rates and "punishing families with mortgages". Writing in the Financial Times, external, Reeves says "guardrails" will be in place to ensure prudent spending. There's also a warning for Reeves at the prospect of imposing national insurance on employers' pension contributions - a policy that could raise £15bn. In a letter to the Times, external, former work and pensions secretary Lord Blunkett describes the potential measure as "very worrying" because it could lead to employers reducing pension contributions. That would come at a time when the government's own figures show four in ten private sector workers are not saving enough for an adequate income in retirement. The proposed ban on smoking in pub gardens is, according to the Sun, external, "running out of puff" and on the verge of being dropped. The paper says smoking is now only to be prohibited outside schools and hospitals. The Guardian reports, external that there was "fierce opposition from the hospitality trade" to the plan. No 10 officials also privately believe banning people from lighting up in pub gardens is an "unserious policy" and not backed by good evidence to show non-smokers are harmed. "Time to listen", is the message from the Daily Mirror, external on the subject of the UK paying reparations for its role in the slave trade. But the Daily Telegraph's editorial , externalsays there is "no case" for Britain to answer - and such demands for cash "stand on shaky moral ground". The Daily Mail's, external editorial takes aim at the prime minister's handling of the row. It says "canny politicians" from elsewhere in the Commonwealth - who are "astute at spotting the weakest link" - appear to have outsmarted him by securing a debate on reparations.

  An investigation by the Daily Express, external has found online fraudsters are ripping off the Royal British Legion's annual appeal by selling thousands of pounds worth of fake poppies. One website reportedly bragged that its produce was "suitable for Remembrance Day activities... to honour the lives and memories of fallen soldiers". The shadow defence secretary, James Cartlidge, has described the rip off merchants as "disgraceful". The Royal British Legion has urged people to only buy poppies from its trusted sellers. And the Sun's lead, external says a nuclear submarine ran so low on food during a six-month patrol that sailors were ordered to share rations. The crew reportedly "divvied up" sweets and hunted for leftovers. Off-duty sailors were also urged to sleep to save energy. A Royal Navy spokesperson is quoted as saying "every submariner receives a nutritionally balanced diet at all times".

