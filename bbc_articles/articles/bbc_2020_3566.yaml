content: |-
  Five ways to successfully self-isolate to prevent the spread of the virus.

  In the UK the official advice if you suspect you have coronavirus, have been in contact with someone who has it, or have been to a place where there are a lot of cases of the virus, is to self-isolate.

  But what does that actually mean and what's the right way to do it?

  The BBC's medical correspondent Fergus Walsh explains the top five methods to successfully self-isolate.
