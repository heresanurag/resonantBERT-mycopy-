title: 'Luton: Murder suspect son and brother of three victims - BBC News'
date: '2024-09-16'
section: Beds, Herts & Bucks
url: http://www.bbc.co.uk/news/articles/cp955rn2p12o
content: |-
  The children's schools have paid heartfelt tributes to their former pupils.

  Triple murder suspect is son and brother of victims

  Nicholas Prosper is due to appear in court on Monday charged with murder

  The suspect in a triple murder inquiry is the son and brother of the victims who died at a tower block in Luton. Bedfordshire Police said it believed the victims to be Juliana Prosper, 48, Kyle Prosper, 16, and Giselle Prosper, 13 - all of Leabank - but formal identification was yet to take place. Nicholas Prosper, 18, also of Leabank, and named locally as Ms Prosper's son and sibling to the child victims, has been charged with murder and a number of firearm offences. In statements from the children's schools, Giselle was described as a "beautiful soul" and a "model pupil", while Kyle's school called the tragedy "devastating".

  A statement on X, formerly Twitter, from Jess Pather, the head teacher at Lea Manor High School in the town, said: "We are deeply shocked... by the tragic incident that occurred on Friday in our local community and devastated by the loss of our pupil, Giselle Prosper. "Giselle was a beautiful soul and a model pupil, she excelled in all her subjects and will be sorely missed, particularly by her friends in Year 9. "Lea Manor High School will be open as usual on Monday and specialist bereavement counsellors will be available to provide additional support to our students and staff during this difficult time. "It will take us all time to process what has happened and our thoughts go out to everyone in our community and neighbouring schools who have been affected."

  Flowers and cards have been left at the entrance to the Leabank block of flats, in the Marsh Farm area of Luton

  A statement issued by Cardinal Newman Catholic School, also in Luton, said it was "shocked" and "deeply saddened" by the loss of Kyle Prosper. "This is devastating news to all those who knew and loved Kyle and it will take some time to come to terms with the profound sense of loss," it said. "We have already sent important information to parents and carers that outlines the support we have in place for students when they return to school on Monday. "We know this will be a difficult time for students and staff and we will do all we can to support them with love and compassion. "We extend our heartfelt condolences to Kyle's family on their immeasurable loss, to his friends and to all those in neighbouring schools who are coming to terms with their own loss. We pray for all those who have died in this tragic incident."

  Juliana Prosper and her children Kyle and Giselle were found dead in a flat in the Leabank block

  In reaction to an online police post about Mr Prosper being charged, the tributes continued - with one woman writing: "It is so heartbreaking - my son was a close friend of Kyle - he was a lovely, smiley, quiet boy." She continued: "It’s so hard to believe this has happened to him and his family." Another person posted: "My daughter has been in Kyle's class throughout her school life - it’s so hard to believe. RIP Kyle, Juliana and Giselle." Flowers and cards have been left at the entrance to the Leabank block of flats, in the Marsh Farm area of Luton.

  Scores of floral tributes, cards and notes have been left in memory of the family

  Officers were called to the flats at around 05:30 BST on Friday and found three people with fatal injuries. Bedfordshire Police said Mr Prosper, 18, was arrested shortly after officers were called to the property. He was charged on Saturday and is due to appear at Luton Magistrates’ Court on Monday. A firearm was found during a search of the surrounding area, the force confirmed.

  Leabank is in the centre of a group of tower blocks

  On Saturday, Det Supt Rob Hall, from the region's major crime unit, said officers who arrived at the scene were "met with such awful circumstances". He continued: "First and foremost, our thoughts are with the three people who sadly lost their lives yesterday and their loved ones. "Although formal identification has yet to take place, next of kin of those who we believe to have died have been informed and are being supported by specialist officers. "We would ask that their privacy is respected at this unimaginably difficult time." He added that officers would remain at the tower block while the investigation continues.

  Forensic investigators were still at the scene on Saturday
