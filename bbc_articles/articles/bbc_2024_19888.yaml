  According to the NHS, symptoms of breast cancer, external in women may include the following:
  • None a lump, or swelling in your breast, chest or armpit
  • None a change in the skin of your breast, such as dimpling that may look like orange peel or redness
  • None a change in size or shape of one of both breasts
  • None nipple discharge if you are not pregnant or breastfeeding which may have blood in it
  • None a change in the shape or look of your nipple such as it turning inwards or a rash on it
  • None pain in your breast or armpit that does not go away You should see a GP with any concerns and NHS information about breast cancer in men can be found here., external

