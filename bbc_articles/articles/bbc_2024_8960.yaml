  A banker's testimony allows the court to take a deep dive into the $130,000 payment made to Stormy Daniels.

  The Apprentice TV show is back on the agenda

  We're now talking about Trump's reality TV show, The Apprentice. Rhona Graff says Trump would often talk with her and others in the office about casting celebrities in the show. "He wanted people who were sort of controversial sometimes, right?" Trump's lawyer Susan Necheles asks. Necheles is now asking whether Stormy Daniels was discussed as a possible contestant for the show. Graff says she believes so. Necheles might be implying that The Apprentice casting was the purpose of Daniels' visit to Trump Tower that was mentioned earlier.
