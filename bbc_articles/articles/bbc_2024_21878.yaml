title: Tributes left as teen held over Luton tower block deaths - BBC News
date: '2024-09-14'
section: Beds, Herts & Bucks
url: http://www.bbc.co.uk/news/articles/cevyj2zpn84o
content: |-
  An 18-year-old is still being questioned by police after three people were found dead at flats.

  Flowers have been left outside the Leabank tower block, where three people died

  Tributes are being left for three people who died in a tower block as police continue to question an 18-year-old man on suspicion of murder. Bedfordshire Police responded to concerns about the welfare of some residents on Friday and discovered three injured people in a flat in the Marsh Farm area of Luton at about 05:30 BST. All three were pronounced dead at the 15-storey Leabank building and officers found a weapon following searches. People have been laying flowers at the flats, including local resident Shaun Dixon who said people were "devastated" by the news.

  Luton resident Shaun Dixon said he felt compelled to visit the scene to offer his condolences

  "I just spoke to one of the residents – a friend of mine – and she was devastated," he said. "My heart and condolences go out to the individuals [involved]. "Flowers have been left, but I wish there was more that could be done."

  Ade Efunkoya said he spotted the teenager being arrested by police wearing body armour

  On Friday detectives confirmed a firearm had been found in Bramingham Road. Armed police and investigators wearing white forensic gear were spotted at the tower block on Wauluds Bank Drive and in a nearby green open space. The 18-year-old was arrested in the morning on Bramingham Road, which has a junction with Wauluds Bank Drive. Ade Efunkoya, who lives nearby, saw police arresting the teenager. "I saw him being detained because I was driving the car past about 09:00-09:30," he said. "I saw four cars... you then think, if you see [police officers] in body armour that this is serious." Mr Efunkoya said he bought his property in Marsh Farm more than 20 years ago and the community spirit had flourished in that time. "Everyone comes out and chats and talks – it’s much better than 2001 when I first arrived here," he said. "This is a shocking one - I don’t think we’ve had something this bad."

  This video can not be played To play this video you need to enable JavaScript in your browser. Police launched a triple murder inquiry after being called out at about 05:30 BST

  Inquiries at the tower block were continuing, with forensic officers spotted at the scene on Saturday morning. Police have been reassuring local residents and said on Friday it was believed all the people involved were known to each other. Detectives added they did not believe there was any threat to the wider community. More officers have been seen patrolling the area since the incident.

  More officers were seen patrolling the area on Saturday morning after the deaths at the Leabank tower block

  Assistant Chief Constable John Murphy said: "I can absolutely understand people being scared – it’s an unusual event in any community. "The reassurance I would offer is that over the coming days people can expect to see an increased presence within the Marsh Farm area. "I would encourage people to go and speak to our officers and they can explain to them what is happening, but again I reiterate this is an isolated threat that has been mitigated by the arrest of an individual."

  A man was still being held by police after three people died in Marsh Farm

  Tributes have been left in memory of the victims

