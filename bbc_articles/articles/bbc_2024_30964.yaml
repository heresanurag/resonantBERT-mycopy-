  Kirillov served in different roles in Russia's military associated with hazardous materials, including the Directorate of the Chief of the Radiation, Chemical and Biological Defence Troops. He was appointed head of his unit in 2017. Reacting to Kirillov's death, UK Prime Minister Sir Keir Starmer's official spokesman said: "Clearly we are not going to mourn the death of an individual who has propagated an illegal invasion and imposed suffering and death on the Ukrainian people." Ukraine's Security Services appear to be stepping up their targeting of senior Russian individuals, almost three years into the conflict. Kirillov's death comes less than a week after a prominent Russian weapons expert was shot dead near his home in Moscow. Ukrainian media reported that the assassination of Mikhail Shatsky was carried out by Ukraine's military intelligence service. Senior Russian naval officer Valery Trankovsky and Russian prison boss Sergei Yevsyukov also died after car bombs exploded in Russian-occupied Ukraine in recent weeks.
