id: bbc_2019_10886
title: Backlash in Commons over Boris Johnson's language - BBC News
date: '2019-09-26'
section: General
url: http://www.bbc.co.uk/news/uk-politics-49833623
content: |-
  MPs accuse Boris Johnson of using "dangerous" language after he said a "surrender act" had been passed to stop Brexit.

  Boris Johnson is facing a backlash from MPs after he was accused of using "dangerous" language over Brexit.

  The prime minister was repeatedly challenged over his use of the word "surrender" to describe legislation passed earlier this month which aims to block a no-deal Brexit on 31 October.
