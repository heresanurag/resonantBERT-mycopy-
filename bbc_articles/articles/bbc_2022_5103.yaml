title: 'David Amess killing: Suspect told police ''I killed an MP'' - BBC News'
date: '2022-04-11'
section: General
url: http://www.bbc.co.uk/news/uk-60879157
content: |-
  The Old Bailey hears the man accused of killing Sir David Amess told police it was a terrorist attack.

  The man accused of murdering Sir David Amess MP told police only hours afterwards that it was a terrorist attack.

  The trial at the Old Bailey also heard how Mr Ali told police officers he "killed an MP".

  Sir David, the MP for Southend West, died after he was stabbed more than 20 times during a constituency surgery in Leigh-on-Sea, Essex, on 15 October.

  Ali Harbi Ali, 26, denies charges of murder and preparing acts of terrorism.
