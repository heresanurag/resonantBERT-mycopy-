  All the latest from the second round of voting in the Tory leadership race and the live TV debate.

  How does the deadline talk stack up?

  Four of the five candidates committed to leave the EU by - or not longer after - 31 October. Time is short, though. The new prime minister will not be in place until the end of July and then all of the relevant institutions in the UK and EU go on holiday until September. In September, you then have several weeks of recess for party conference season in Britain, so no real work is likely to get done until October. There is then only the rest of that month to do any negotiation, ratification and legislating, so the chances of getting anything through by Halloween look slim.
