title: Met Police officer stabbed in Westminster trying to detain armed robbers -
  BBC News
date: '2020-10-05'
section: London
url: http://www.bbc.co.uk/news/uk-england-london-54412772
content: |-
  The officer was injured trying to detain two teenagers but has since been discharged from hospital.

  Two teenagers armed with knives were trying to rob a grocery store in Chapter Street, Westminster, police said

  A police officer has been stabbed as she tried to detain two armed robbers.

  Two officers were in Chapter Street, Pimlico, at 15.42 BST on Sunday when they spotted armed suspects attempting to rob a shop.

  The shopkeeper managed to push the two teenagers out of the Westminster store. Officers then tried to detain the pair.

  Despite being stabbed in the abdomen, the officer chased the suspects along Vauxhall Bridge Road, a spokesperson for the Met Police said.

  The suspects, both believed to be 15 years old, were detained a short time later with the assistance of firearms officers.

  The injured officer was taken to hospital, and she was discharged on Sunday evening.

  Ch Insp Simon Brooker said: "For this officer to be stabbed on duty is unacceptable but, fortunately, she does not appear to be seriously injured."

  Mayor of London Sadiq Khan said: "Every day our courageous police officers put themselves in harm's way to keep Londoners safe.

  "Attacks on our police are utterly unacceptable and perpetrators will feel the full force of the law."

