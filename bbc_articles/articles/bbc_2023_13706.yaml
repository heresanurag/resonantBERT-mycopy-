title: 'Algae: Officials dismiss Ian Paisley drinking water concerns - BBC News'
date: '2023-09-14'
section: Northern Ireland
url: http://www.bbc.co.uk/news/uk-northern-ireland-66800302
content: |-
  NI Water says there is no risk to public health but tap water may taste "earthy or musty".

  Drinking water in Northern Ireland remains safe to drink despite concerns about the increased levels of blue-green algae over the summer months, NI Water has said.

  A number of outbreaks have been reported, many relating to Lough Neagh and the River Bann.

  North Antrim MP Ian Paisley said residents and businesses believed their water was "unclean".

  NI Water insisted taps could be used as normal.

  "Increased levels of algae can cause an unusual taste and smell to water from your tap but does not pose a risk to health," a spokesperson added.

  "The taste and smell can be earthy and/or musty. Therefore, while the water from your tap can be used in the normal way, we fully appreciate some customers might notice a difference in the taste and/or odour to their drinking water at this time."

  Mr Paisley said he had contacted NI Water to investigate the cleanliness of drinking water after concerns were highlighted by constituents in Portglenone.

  NI Water said it carried out sampling on water quality 365 days a year, testing from customer homes, reservoirs and treatment plants.

  During the summer, a number of tourist spots, including beaches have been closed, with businesses warning they were being impacted by the presence of algal blooms.

  On Wednesday, parts of the River Bann in County Antrim were closed to the public.

  Fermanagh and Omagh District Council confirmed on Thursday that the waters at Lough Lea and Castle Caldwell contained blue-green algae.

  Warning signs have been put up to alert the public to exercise caution near waterways.

  The bacteria can cause illness in humans and is particularly dangerous for pets.
