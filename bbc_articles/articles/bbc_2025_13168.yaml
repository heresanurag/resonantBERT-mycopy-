title: 'Geert Wilders: Dutch government collapses as far-right leader exits coalition
  - BBC News'
date: '2025-06-03'
section: Europe
url: http://www.bbc.co.uk/news/articles/c0r1x5yyd5wo
content: |-
  The decision, which sparked anger among Geert Wilders' coalition partners, will pave the way for new elections in the Netherlands.

  The Dutch government has collapsed after Geert Wilders withdrew his far-right party from the governing coalition following a row over migration. Prime Minister Dick Schoof confirmed he was stepping down on Tuesday and offered the resignation of the cabinet to King Willem-Alexander. In televised remarks following an emergency cabinet meeting, Schoof said Wilders' decision to withdraw the support of his PVV party was "irresponsible and unnecessary". "As far as I'm concerned, this shouldn't have happened," he added. The governing coalition was in place for less than one year.

  The row which led to its collapse came after Wilders pushed for 10 additional asylum measures, including a freeze on applications, halting the construction of reception centres and limiting family reunification. Schoof had made a last-minute appeal to coalition party leaders on Tuesday morning, but the meeting lasted just one minute before Wilders walked out, ending the coalition. "No signature for our asylum plans. PVV leaves the coalition," said Wilders on X. There was shock and anger among political leaders, many of whom pointed out that several of Wilders' demands were similar to policies already in the coalition agreement, and that they would not stand in the PVV's way to implement them. Many of the additional proposals put forward by Wilders had been dismissed during coalition talks because of legal concerns. Wilders' decision has put an end to an uneasy governing coalition which was born in July 2024 after months of political wrangling following elections the previous year. His anti-immigration, far-right PVV was the largest party. The other members were the conservative-liberal VVD, the Farmers' Citizen Movement (BBB) and the centrist New Social Contract.
  • None Geert Wilders: Who is he and what does he want? From the start the coalition seemed a marriage of convenience, characterised by infighting and appeared to struggle to push through any of policies it had proudly promoted. Following its collapse, Wilders' former coalition partners accused him of engineering the crisis. VVD leader Dilan Yesilgoz said the move was "super irresponsible", adding: "This wasn't about asylum at all." "I think Wilders is betraying the Netherlands," said deputy Prime Minister Mona Keijzer from the BBB. But Wilders appears to feel emboldened. On Tuesday he told reporters that he intended to become prime minister of the Netherlands "and ensure that the PVV becomes bigger than ever in the next elections". Sandra Phlippen, the chief economist for ABN AMRO bank, said the immediate economic impact of the cabinet's collapse appeared minimal because during its 11 months in office the government had "barely made any concrete plans". Polls show the far right and Green-Left parties are neck-and-neck, with migration and cost-of-living issues fuelling political volatility across Europe. Wilders wanted the government to collapse as the support for his Freedom Party continues to drop in the polls, according to Armida van Rij, the Head of the Europe Programme at Chatham House. With the Nato summit due to be held in the Hague at the end of the month, Schoof's ministers will seek to remain in power in a caretaker capacity until a date is set for the Netherlands to return to the polls - likely in the autumn, according to Dutch media. In the Dutch political system, becoming prime minister requires forming a majority coalition in the 150-seat parliament. Even if Wilders again surpasses the political pundits expectations, his decision to collapse the government is being seen as reckless - and perceptions he is putting personal ambition above national stability could further complicate his ability to form alliances after the next election. The parties that were reluctant or refused to go into government with Wilders after the last election are likely to find that kind of partnership even less attractive now. In addition, by toppling the coalition over the issue of asylum, it is likely Wilders will put it at the centre of his upcoming election campaign. However, given that his party had been responsible for asylum and immigration for almost a year, there are no guarantees that such a gamble will pay off.
