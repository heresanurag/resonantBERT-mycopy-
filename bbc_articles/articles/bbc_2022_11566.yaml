title: Eleven hurt as vehicle at Scunthorpe car meet hits bystanders - BBC News
date: '2022-09-25'
section: Humberside
url: http://www.bbc.co.uk/news/uk-england-humber-63025813
content: |-
  A 17-year-old has been held on suspicion of causing serious injury by dangerous driving.

  The meet began at Scunthorpe retail park before moving to the industrial estate

  Eleven people were injured when a car hit bystanders at what was thought to be a car meet in Scunthorpe.

  Emergency crews were called to the crash at Flixborough Industrial Estate at about 21:10 BST on Saturday.

  Humberside Police said one of those injured was in a critical condition and four had been seriously injured.

  Officers said a 17-year-old had been arrested on suspicion of causing serious injury by dangerous driving.

  It is believed about 50 cars were taking part in the event, which began at Scunthorpe Retail Park before moving to the industrial estate at Flixborough where the crash happened.

  Insp John Rickells said they were still trying to establish what had happened.

  He said the investigation was still at an early stage and the force would release more information when it could.

  Lisa Taylor, 21, and Steph Newman, 22, said they had travelled from Skegness after seeing the event advertised on social media, arriving at the retail park at about 19:30 BST.

  Ms Taylor said there were more than 50 people at that event, which started at about 19:00 and finished at about 20:35.

  Ms Newman said when the cars began to leave they followed them as they headed to the industrial estate and had just got out of their car when the crash happened.

  "I was in shock, I just stood there for five or 10 minutes, I couldn't move," Ms Taylor said.

  Ms Newman said it had happened very quickly and people had rushed to help those injured before the emergency services arrived.

  Humberside Police urged anyone with any phone or dashcam footage of the cars involved to contact them.

  "We are aware that a number of people left the scene prior to emergency services arriving and they may have witnessed what happened," Insp Rickells added.

