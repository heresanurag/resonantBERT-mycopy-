  This was another routine win in a highly successful summer for the revamped England team. Here they absorbed a further injury, this time to Mark Wood, with Olly Stone returning and fitting into a team that is looking strong in most areas. The down side for the hosts were the lack of runs for makeshift opener Dan Lawrence and stand-in captain Ollie Pope, who has been unable to show he can combine leadership with contributing at number three. Sri Lanka may regret their decision to bowl first after winning the toss, yet the good batting conditions late into the game showed the tourists may have been on to something. Ultimately, Sri Lanka were beaten by their poor display with the bat in the first innings, Atkinson’s all-round brilliance and twin centuries from Root, the second of which took him to an England record 34 tons. The electric atmosphere when Root reached his historic milestone on Saturday was in contrast to swathes of empty seats on Sunday. Some will point to the cost of tickets. The cheapest adult entry was £95 and it is true that watching Test cricket can be prohibitively expensive, not only at Lord’s. Perhaps there is also a reluctance to invest in fourth-day tickets when most of England’s Tests this summer have been one-sided. It raises questions whether the English game, and other global powerhouses Australia and India, are doing enough to protect Test cricket. The big nations cannot simply play each other, so must do all they can to ensure as many teams as possible are competitive in the longer format.

