  England captain Ollie Pope on Test Match Special: "A good win and some special individual performances from Gus and Joe. "In an ideal world you want to lead from the front with the bat but we're 2-0 up in the series. I haven't contributed in the way I'd have liked but I'd still take that every day of the week." Sri Lanka captain Dhananjaya de Silva: "We are a much better team than we have shown. "I would have batted first [if I had my time again at the toss]. I got it wrong. But we did really well in the first innings when we were bowling." Former England captain Michael Vaughan: "I hope Gus Atkinson never changes and sticks to that deadpan attitude, I love it. He will have tougher challenges but he's just being himself and enjoying the game." Player of the match, England bowler Gus Atkinson, speaking to BBC Sport: "I have had a good few games here, I don't know what it is. I enjoy bowling down the slope but the batting, I'm not sure!"

