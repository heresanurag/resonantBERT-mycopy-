content: |-
  Holders Manchester City will face Arsenal in the Continental Cup final after both sides claim narrow semi-final wins.

  Last updated on .From the section Women's Football

  Holders Manchester City Women will meet Arsenal in the Continental Tyres Cup final after winning semi-finals against Chelsea and Reading respectively.

  City beat Chelsea 1-0 at Kingsmeadow thanks to Nadia Nadim scoring her second goal in as many games.

  Arsenal had to come from behind with two goals in the last 10 minutes to beat a determined Reading 3-2.

  England's Jordan Nobbs netted the winner after Lauren Bruton had put the Royals 2-1 ahead in the second half.

  The final will be played on 11 March.

