title: 'Premiership: Sale 25-7 Saracens: Sharks move up to second in table - BBC Sport'
date: '2025-04-25'
section: Rugby Union
url: http://www.bbc.co.uk/sport/rugby-union/articles/cn807217770o
content: |-
  England fly-half George Ford scores his first try for Sale as the Sharks beat Saracens in a fiery match to move up to second in the Premiership.

  Sale second as Ford scores try in win over Sarries

  England fly-half George Ford scored his first try for Sale as the Sharks beat Saracens in a fiery match to move up to second in the Premiership. Rekeiti Ma'asi-White gave the hosts the lead inside 90 seconds before the brilliant Ford ran in the second between the posts. Arron Reed ran the length of the pitch to score one of the tries of the season before Angus Hall hit back for Saracens, who trailed 22-7 at the break. Ford kicked a penalty in a more controlled second half as Sale secured the win that lifts them above Bristol Bears and Leicester Tigers, who both play on Saturday. The hosts were denied a bonus point as referee Christophe Ridley's mistake prevented Raffi Quirke from scoring a certain fourth try when he blew up for a Sale knock-on, with replays showing the ball had come off the hand of Sarries flanker Nick Isiekwe. But Saracens missed the chance to break into the top four themselves and could end the weekend as low as sixth in the table.

  Arron Reed ran almost the length of the pitch to score Sale's third try

  Sale made a blistering start and took the lead in the second minute when Ford burst through before passing to Reed, who set up Ma'asi-White to dive into the corner. A big scuffle immediately broke out between both sets of players, which started after Tom Curry reacted to a late challenge from England team-mate Maro Itoje. That set the tone for a physical and frantic half which Sale dominated in all areas. Ford, who had been brilliant in Sale's win at Harlequins last week, was pulling the strings early on. Saracens hardly touched the ball until the eighth minute when Tom Willis went on a spectacular carry, bouncing off challenge after challenge before eventually losing the ball. Tom Roebuck and Ford combined in a lightning quick break which ended with the England fly-half touching down between the posts for his first try - duly converted - since joining the Manchester club in 2022. Fergus Burke missed a penalty kick from 35 metres out with Sarries' first chance to get on the board. Minutes later Reed came up with the moment of the match as he picked up the ball in front of his own tryline and tore away at lightning pace. He dashed past Nick Tompkins, rode the challenge of Angus Hall, ran beyond Elliot Daly, and celebrated long before getting to the line knowing no-one could match his blistering speed. Hall ran in Saracens' first try in the right corner after a period of pressure from the visitors, finishing up after Daly's great, 20-yard pass. Hall was taken off for a head injury assessment (HIA) after a challenge at the start of the second half, with Alex Goode coming on in his place, and did not return to the field. The hosts were in full control after the break and Ford kicked between the posts to open up an 18-point lead, though how costly referee Ridley's mistake will prove for the Sharks is yet to be seen. The unsighted referee's decision to blow his whistle at what he thought was a Sale knock-on was all that stopped the Sharks from claiming a deserved bonus point, which would have moved them up to 49 points. On a forgettable night for Saracens, one positive was the performance of England number eight Tom Willis, who was applauded by both sets of fans when he was replaced in the second half. Sale have now won their past four Premiership matches and go into the run-in with momentum. They visit Leicester next in two weeks' time, while Saracens host bottom side Newcastle Falcons.

  "We were physical and really clinical at times – and we're exactly where we want to be since we started setting targets after the Six Nations. "We've got to win every game but George Ford is like a coach on the field. He can manage games and he can break the game evidently from his performance tonight. "People have put other fly-halves ahead of him because of their attacking, game-breaking prowess. But I think he showed tonight that he's got that in his game as well – what can't he do? "Are there three better fly-halves in Britain and Ireland than George? I don't think so. He's in a rich vein of form and he's taking his team with him – but it [Lions selection] is not down to me." "Sale are a good team and really tough to play against. "But when you don't have that momentum and speed of ball, we were 22-0 down and that's a mountain to climb." [On Tom Willis] "Tom has certainly grown up this season and for him to make the metres he made against a team like Sale, it takes some doing. "For Tom to do some of the damage he did was outstanding and showed where he's at. I think he should definitely be in the conversation for Lions selection."
