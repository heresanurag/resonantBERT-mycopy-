  A temperature of 30.3C was recorded at London's Heathrow Airport, the Met Office says.

  UK sees hottest day of the year so far

  Wednesday was the hottest day of the year so far, the Met Office has said, after 30.3C was recorded at London's Heathrow Airport. Met Office meteorologist Kathryn Chalk said that was the highest maximum temperature recorded this year. Most of England is under yellow heat health alerts, which will remain in force in eight regions until 17:00 on Thursday. A yellow alert - issued by the UK Health Security Agency (UKHSA) - indicates that weather conditions could pose a risk to those who are particularly vulnerable. The UKHSA says minor impacts are probable across the health and social care sector. Ms Chalk added: "Yesterday we got to 30C and that was the first time we reached 30C since September 10 last year." BBC Weather's Matt Taylor said it will be a humid evening but there will be a "marked change" in humidity levels over the next 24 hours and "things will turn much fresher".

  A woman cools off in an outdoor Lido in Crouch End, London

  A woman arrives at the Glastonbury festival site with luggage

  Thousands of ticket holders have begun filtering into the Glastonbury festival site, which is set to benefit from a sunny week - temperatures hit 27C on Wednesday but are expected to cool down during the rest of the week. On Thursday, blustery showers are expected in the north-west, with spells of rain in the south-west turning brighter later. The south-east will stay dry and warm. BBC Weather said many places can expect largely dry conditions this weekend, albeit with lower temperatures.
  • None UK heatwave: How long will it last? Other areas will experience outbreaks of rain and strong winds with gusts of up to 50mph in places. Friday will be windy and cooler in the north, with showers, while the south will be breezy with some clouds. Saturday across the UK will be cloudy with a chance of rain, although still mainly sunny in the south.
