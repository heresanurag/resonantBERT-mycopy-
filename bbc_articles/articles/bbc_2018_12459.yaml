title: Young and black in Northern Ireland - BBC News
date: '2018-10-15'
section: General
url: http://www.bbc.co.uk/news/uk-northern-ireland-45843001
content: |-
  Young black people talk about what it's like for them living in Northern Ireland.

  According to the 2011 census, black people make up only 0.2% of the population in Northern Ireland. So what's it like to be a young black person here?
