  Amid all the elation, though, one person pointed out that Peele's win came after decades of under-representation for African-American screenwriters at the Academy Awards.

  This Twitter post cannot be displayed in your browser. Please enable Javascript or try a different browser. View original content on Twitter The BBC is not responsible for the content of external sites. Skip twitter post 7 by Britni Danielle This article contains content provided by Twitter. We ask for your permission before anything is loaded, as they may be using cookies and other technologies. You may want to read Twitter’s cookie policy, external and privacy policy, external before accepting. To view this content choose ‘accept and continue’. The BBC is not responsible for the content of external sites.

  Before Peele, the only black screenwriters to be nominated for the best original screenplay prize were Suzanne de Passe (for Lady Sings the Blues), Spike Lee (for Do the Right Thing) and John Singleton (for Boyz N the Hood).

  The best adapted screenplay category has shown more diversity - with wins for Geoffrey Fletcher (Precious), John Ridley (12 Years a Slave) and Barry Jenkins with Tarell Alvin McCraney (Moonlight).

