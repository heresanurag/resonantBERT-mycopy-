content: |-
  Re-live the moment Dina Asher-Smith became the first British woman to win a major global sprint title as she stormed to victory in 200m at the World Championships.

  Relive the moment Dina Asher-Smith became the first British woman to win a major global sprint title as she stormed to 200m victory at the 2019 World Championships, and catch-up with Dina tonight as she joins Gabby Logan to look back at the events of last year.

  Watch 'How Dina and Kat struck World gold' on Sunday, 31st May at 1500 - BBC One
