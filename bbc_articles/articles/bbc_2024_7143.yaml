title: 'In pictures: Eid celebrations around the world - BBC News'
date: '2024-04-10'
section: World
url: http://www.bbc.co.uk/news/world-68779475
content: |-
  Millions of Muslims are marking the end of Ramadan, a month of fasting from dawn to sunset.

  Eid al-Fitr - which means "festival of the breaking of the fast" - is celebrated at the end of Ramadan, a month of fasting for many adults, as well as spiritual reflection and prayer.
