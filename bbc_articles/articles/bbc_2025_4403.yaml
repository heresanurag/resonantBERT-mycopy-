  The Australian added: "Our car was very strong in Melbourne, but we're very aware it was an exceptional weekend rather than what we expect as the norm. We have a strong car, but it's still within reach for the others." Briton Russell, who finished third in Melbourne on Sunday, said that McLaren's main advantage was founded on the car's ability to look after its tyres. "If you're talking about trying to find that amount of lap time in downforce that isn't going to happen in a season and it's never happened in a season," Russell said. "They're clearly doing something better than the rest, clearly substantially quicker than everybody when the tyres are getting hot." Verstappen agreed, saying: "McLaren are quite far ahead, I don't think I'm an idiot in the wet but I didn't have a chance to fight in the first half of the race."
