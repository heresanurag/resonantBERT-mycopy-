  Quote Message: "I'm not the worst affected, I can still go buy food, but it's difficult for people across the board with everything going up. It's really concerning and getting to the point where there's not a lot left to cut back." "I'm not the worst affected, I can still go buy food, but it's difficult for people across the board with everything going up. It's really concerning and getting to the point where there's not a lot left to cut back."
