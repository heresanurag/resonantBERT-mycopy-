title: Warning after marshmallow toasting fire at Devon beauty spot - BBC News
date: '2024-08-19'
section: England
url: http://www.bbc.co.uk/news/articles/c8xlvjddjkro
content: |-
  The incident happened at Baggy Point, near Croyde, where a wildfire spread over 20 acres in 2022.

  Fire crews were able to extinguish the blaze before it was able to spread

  Firefighters have issued a warning after a fire, believed to have been started to toast marshmallows, burnt into the ground at a coastal beauty spot. Crews from Barnstaple were deployed to the incident at Baggy Point, near Croyde, Devon on Sunday. A spokesperson for Devon and Somerset Fire and Rescue Service said those attending were able to "extinguish it before it could take hold". In the same area, a disposable barbecue started a wildfire that spread over about 20 acres and destroyed wildlife habitats in 2022.

  The fire service spokesperson added: "We found leftover marshmallows at the scene, suggesting the fire may have been started for a bit of toasting. "While we all love a good marshmallow, please don’t have fires in open spaces. "We don’t want a repeat of the devastating fire we had in the area two years ago."
