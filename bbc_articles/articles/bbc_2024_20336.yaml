content: |-
  Lightning flickered through the orange skies at the same time as a rainbow, after a summer storm.

  A fierce thunderstorm swept through southern Minnesota on Monday night, cutting power to tens of thousands across the Twin Cities of Minneapolis-Saint Paul.

  After the most intense part of the storm, striking images emerged featuring vivid skies with rainbows framed by dramatic lightning strikes.
