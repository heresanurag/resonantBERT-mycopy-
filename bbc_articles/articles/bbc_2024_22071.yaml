content: |-
  The former BBC News presenter has arrived at Westminster Magistrates’ Court filmed by TV cameras, photographers and watched by journalists.

  Huw Edwards has arrived at Westminster Magistrates’ Court filmed by TV cameras, photographers and watched by journalists.

  In July Edwards admitted having 41 child abuse images, which were sent to him on WhatsApp. He is in court for a sentencing hearing today.

  There were questions shouted about whether he wanted to apologise for his crimes but the presenter, once the voice of BBC News, remained silent.

  Click here to follow the BBC's live coverage of events in court.
