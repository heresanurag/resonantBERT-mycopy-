content: |-
  Russia's defence ministry said it had engaged in fighting near two villages, some 25-30km inside Russia.

  Ukrainian troops now up to 30km inside Russia, Moscow says

  Journalists in the Sumy region witnessed Ukrainian armour moving towards the Russian border

  Ukrainian troops have advanced up to 30km inside Russia, in what has become the deepest and most significant incursion since Moscow began its full-scale invasion of Ukraine in February 2022. Russia's defence ministry said its forces had engaged Ukrainian troops near the villages of Tolpino and Obshchy Kolodez, as the offensive in the Kursk region entered a sixth day. Foreign ministry spokesperson Maria Zakharova accused Kyiv of "intimidating the peaceful population of Russia". President Volodymyr Zelensky, who directly acknowledged the attack for the first time in an address last night, said 2,000 cross-border attacks had been launched by Russia from Kursk this summer.

  "Artillery, mortars, drones. We also record missile strikes, and each such strike deserves a fair response," Mr Zelensky told the country in his nightly address from Kyiv. A senior Ukrainian official told the AFP news agency that thousands of troops were engaged in the operation, far more than the small incursion initially reported by Russian border guards. While Ukrainian-backed sabotage groups have launched intermittent cross-border incursions, the Kursk offensive marks the biggest co-ordinated attack on Russian territory by Kyiv's conventional forces. “We are on the offensive. The aim is to stretch the positions of the enemy, to inflict maximum losses and to destabilise the situation in Russia as they are unable to protect their own border,” the official said. Russia's defence ministry said on Sunday that its forces had "foiled attempts by enemy mobile groups with armoured vehicles to break through deep into Russian territory". But in an apparent admission that Kyiv's forces have now advanced deep into the Kursk border region, the defence ministry reported engaging Ukrainian troops near the villages of Tolpino and Obshchy Kolodez - which are about 25km and 30km from the Russia-Ukraine border. Footage circulating online and verified by the BBC also appeared to show a Russian strike near the village of Levshinka, around 25km from the border. Ukrainian troops have claimed to have captured a number of settlements in the Kursk region. In Guevo, a village about 3km inside Russia, soldiers filmed themselves removing the Russian flag from an administrative building. Clips have also emerged of Ukrainian troops seizing administrative buildings in Sverdlikovo and Poroz, while intense fighting has been reported in Sudzha - a town of about 5,000 people. Ukrainian troops have already filmed themselves outside Sudzha at a major gas facility involved in the transit of natural gas from Russia to the EU via Ukraine, which has continued despite the war. In Sumy region, which borders the Kursk region, BBC reporters witnessed a steady stream of armoured personnel carriers and tanks moving towards Russia. The armoured convoys are sporting white triangular insignias, seemingly to distinguish them from hardware used within Ukraine itself. Meanwhile, aerial photos have appeared to show Ukrainian tanks engaged in combat inside Russia. Photos analysed by BBC Verify also appeared to show Russia constructing new defensive lines near the Kursk nuclear power plant. Ukrainian forces engaged at Obshchy Kolodez were within 50km (31 miles) of the facility. Contrasting satellite imagery of the same location captured yesterday with imagery from a few days earlier, images show several newly constructed trench lines in the vicinity, with the nearest roughly 8km (5 miles) from the plant.

