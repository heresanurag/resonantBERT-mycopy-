title: Defaced Marcus Rashford mural covered in supportive notes - BBC News
date: '2021-07-12'
section: Manchester
url: http://www.bbc.co.uk/news/uk-england-manchester-57806142
content: |-
  Marcus Rashford says he was "on the verge of tears" after hearts were put on his vandalised mural.

  People covered the defaced part of the mural with hearts and supportive messages

  Marcus Rashford has said he was "on the verge of tears" when he saw his mural which was vandalised had been covered in hearts and supportive notes.

  The artwork in Withington, Manchester, was defaced following England's defeat to Italy in the Euro 2020 final.

  Notes and drawings with the words "role model", "wonderful human" and "hero" have been attached to the wall.

  Rashford said: "The communities that always wrapped their arms around me continue to hold me up."

  Those who brought the messages and hearts said they wanted to show solidarity with the Manchester United striker and stand against racism.

  Rashford missed a penalty in the 3-2 shootout loss, along with Jadon Sancho and Bukayo Saka.

  All three players have since been targeted with racist abuse on social media.

  Rashford tweeted he was sorry for missing his penalty, adding that he "wished it had gone differently" but then paid tribute to those who added messages on the mural.

  Notes with the words "role model" and "hero" were placed over the defaced mural

  The 23-year-old said: "The messages I had received today have been positively overwhelming and seeing the response in Withington had me on the verge of tears.

  "The communities that always wrapped their arms around me continue to hold me up."

