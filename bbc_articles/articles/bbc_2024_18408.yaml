content: |-
  The group says any deal must be based on the response it gave last month to President Biden's plan.

  Hamas says ceasefire must be based on group’s July response

  Israel issued a relocation order for southern Gaza's Khan Younis residents on Sunday, following a deadly air strike on a school in Gaza City

  Hamas has said a ceasefire plan for Gaza must be based on where talks were a month and a half ago rather than any new rounds of negotiations. In a statement on Sunday night, the group called on mediators “to present a plan to implement what was agreed upon by the movement on July 2, 2024, based on [President Joe] Biden's vision and the UN Security Council resolution”. On 2 July, Hamas issued its response to the outline ceasefire plan announced by Mr Biden on 30 May. The details of Hamas’s response have not been made public but the group is understood to have dropped a demand for a full ceasefire at the outset rather than an initial six-week pause put forward by the president.

  Negotiations resumed a week later, with Hamas accusing Israel of introducing new conditions. Hamas sources told the BBC that the introduction of the new conditions - that displaced Palestinians should be screened as they return to the north of Gaza, as well as the question of control of the Philadelphi corridor that borders Egypt - have been sticking points. It has also been widely reported in the Israeli press that these new demands were made by Israel's Prime Minister Benjamin Netanyahu, and that they have caused friction with his negotiating team. Last week, international mediators from Qatar, Egypt and the US urged Israel and Hamas to resume urgent discussions on the ceasefire and hostage release deal on 15 August. The mediators said they were prepared to offer a bridging proposal to overcome differences on the implementation of Mr Biden's framework agreement. Israel responded on Thursday, saying it would send a team of negotiators to take part in the meeting. Hamas rejected any new proposals, but the BBC understands that the group is open to resuming talks at the point prior to which the new conditions were introduced. On Monday, the leaders of the UK, France and Germany issued a joint call for talks to resume, saying there "can be no further delay". UK Prime Minister Sir Keir Starmer, French President Emmanuel Macron and German Chancellor Olaf Scholz echoed the mediators' call for ceasefire talks to resume in a joint statement. "We agree that there can be no further delay," the statement said. "We have been working with all parties to prevent escalation and will spare no effort to reduce tensions and find a path to stability." The countries also called for the de-escalation of tensions in the Middle East - which have risen since the assassination of senior members of Hamas and Lebanese group Hezbollah. US Defence Secretary Lloyd Austin confirmed on Sunday night that he had ordered the deployment of a guided missile submarine to the Middle East which will join the aircraft carrier USS Abraham Lincoln, which is heading to the region. Iran previously said it will respond to the killing of Hamas leader Ismail Haniyeh at the “right time” in the "appropriate" manner and that the US bears responsibility for his death because of its support of Israel. Iran has blamed Israel for the assassination, though Israel has not commented directly.

