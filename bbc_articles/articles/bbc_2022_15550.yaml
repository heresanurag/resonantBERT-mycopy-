content: |-
  The newborn baby's grandmother speaks of her death in an attack on a maternity hospital in Ukraine.

  The grandmother of a newborn baby has spoken of her death in a Russian missile attack on a Ukrainian maternity hospital.

  The governor of Zaporizhzhia region in Ukraine said the missile struck the town of Vilnyansk overnight.

  The baby's mother, who was the only woman in the facility at the time, and a doctor were rescued from the rubble.
