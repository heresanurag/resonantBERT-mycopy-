  The ShopMy platform is marketed at "elite creators" for them to earn money from links they have shared.

  Meghan launches online shop for fans to buy her fashion favourites

  The Duchess of Sussex has launched a new digital shop, allowing fans to purchase her favourite clothing, accessories and jewellery recommendations. Meghan, who described her 'high-low' style approach to mixing designer and accessible fashion during an episode of her recent Netflix series, shared the ShopMy link to her 2.6 million Instagram followers on Monday. She included the disclaimer that she would receive a sales commission on some products purchased through the affiliate links she shared. The ShopMy platform is marketed at "elite creators" as a way for them to earn revenue if someone purchases an item through a link they have shared - with commission as high as 30%.

  Meghan described the pieces in the online shop as a "handpicked and curated collection of the things I love", adding she had long been asked to share her wardrobe inspiration. Outfits the Duchess has been pictured in previously have been known to sell out in minutes - a white coat by the Canadian brand Line the Label which she wore to announce her engagement to Prince Harry in November 2017 was reportedly so in demand it crashed the clothing brand's website. A month later she was photographed carrying a £500 ($675) midi tote bag made by Strathberry, which led to the item selling out in 11 minutes flat across its global, US and China website. The 32 piece collection unveiled on Monday revealed a capsule wardrobe of neutral staples in muted colours - white, beige, light blue and black - and natural fabrics like linen and cashmere. Items included the "perfect" white cotton t-shirt, a striped blue "boyfriend" shirt and white linen trousers, as well as more formal items such as a black wool blazer and a full-length, ivory-coloured evening dress. The majority of the products are from upscale high-street brands, including Theory, Reformation, Polene, Madewell, J Crew, but they also include luxury and budget options. A trench coat she linked to is a £99 Uniqlo option, while a pair of brown leather slip-on sandals from Saint Laurent retail for £595. According to ShopMy, commissions earned from the platform typically from 10 to 30% "depending on the brand or retailer". The platform also allows creators to "discover and manage paid collaboration opportunities" with over 47,000 brands. The duchess's latest venture comes just weeks after the debut of her glossy Netflix lifestyle show which portrays her life at home, lunches with friends and various gardening and cooking activities. Last year she also launched a lifestyle brand, originally called American Riviera Orchard and now known as As Ever that aims to sell "beautifully crafted essentials" like artisan preserve and tea. Fashion, lifestyle and product recommendations are all areas the duchess has explored before. Meghan set up and ran her own lifestyle blog called The Tig for almost three years before closing it in April 2017 - just months before her engagement to Prince Harry was announced. On The Tig, Meghan shared beauty, diet and fashion tips, recipes, travel advice, and words of wisdom about love and life.
