content: |-
  Gunner Jaysley Beck's assault was incorrectly categorised as a minor sanction.

  Sergeant who 'pinned down' soldier will leave Army, inquest told

  Gunner Jaysley Beck was never asked to provide a written account, an inquest has been told

  A senior sergeant who reportedly "pinned down and tried to kiss" a teenage soldier plans to leave the Army, an inquest has been told. Royal Artillery Gunner Jaysley Beck, 19, was found dead in her barracks at Larkhill Camp, Wiltshire, on 15 December 2021 after a work party. The inquest heard she had filed a complaint against Battery Sergeant Major Michael Webber after the alleged incident. Mr Webber received a minor sanction on his record, but details of the offence were omitted and a "miscommunication" meant improper legal advice was given.

  Appearing at the inquest on Wednesday, Mr Webber was warned by assistant coroner, Nicholas Rheinberg, before beginning his evidence, he did not have to answer questions that could incriminate himself. Mr Webber confirmed he intended to leave the Army in April, and then declined to answer further questions surrounding the incident. However, he did tell the hearing that he had written a letter of apology to Gunner Beck and that the letter's content was true. The coroner asked: "You will see in the letter you describe your behaviour as 'absolutely unacceptable' – what was your behaviour?" He then refused to answer this question.

  The alleged sexual assault of Gunner Jaysley Beck was incorrectly categorised as a minor sanction, the inquest was told

  The inquest heard he was promoted to Warrant Officer 1 rank in May 2022 - despite the minor sanction he received for the incident with Gunner Beck. The alleged incident occurred at an adventure training exercise at Thorney Island, near Emsworth in Hampshire, in July 2021. Gunner Beck claimed WO1 Webber told her he had been "waiting for a moment for them to be alone", had engaged her in a drinking game called Last Man Standing before grabbing her leg and trying to kiss her.

  Shortly after, Gunner Beck called a friend "frightened and in tears" because "someone tried it on with her", the inquest was told. Lance Bombardier Kirsty Davis previously told the inquest: "[Webber] was trying to kiss her and she was trying to push him away, but he was pinning her down. "Jaysley had told him 'no', tried to get away from him but he had persisted so she left."

  Gunner Beck was found dead in her barracks at Larkhill Camp, 10 days before Christmas

  Following the incident, Major Robert Ronz was assigned to be the deciding officer in finding a consequence for Mr Webber's behaviour. Giving evidence at the inquest on Wednesday, he said the incident fell into "minor sanction territory" and required no formal investigation. "My decision on whether my administrative action was appropriate was based largely on the legal advice that was received," he said. However, the inquest was told that there had been a "miscommunication" through the chain of command and details concerning Mr Webber's attempt to touch Gunner Beck's leg had been lost. Major Ronz said he had been "unaware of any physical contact", but admitted had he known, the outcome would likely have been very different. Army policy states any offence which has a sexual element should be referred for legal advice and reported to Military Service Police for a formal investigation. Instead, the only paper trail that exists of the incident is a minor sanction record- which simply cites "inappropriate behaviour unbecoming of a warrant officer". Major Ronz added: "There is a loss of corporate knowledge because the detail is not sufficient." Minor sanctions have a "shelf life" of two years, and are wiped completely if a soldier is posted elsewhere, he said.

  Colleagues described Gunner Beck as having "a bubbly personality that really shone through"

  Colonel Samantha Shepherd previously told the inquest that she took a more "victim-led" approach to Mr Webber's disciplinary action. "I wanted Jaysley to feel [...] she was part of the process and had a degree of control over the outcome," she explained. Questions have been raised over whether this placed unnecessary pressure on the 19-year-old, and risked opening her up to backlash from colleagues. An Army service inquiry report, external published in October 2023 said this was "possibly a factor that may have influenced her failure to report other events that happened subsequently". The inquest has also heard that Gunner Beck received thousands of messages from another senior colleague, Bombardier Ryan Mason, whom she described as being "psychotic and possessive". It detailed three more "contributory factors" to her death - including the "significant strain" of a sexual relationship with a married colleague in the last few weeks of her life; a relationship that ended in November 2021 which involved "repeated allegations of unfaithfulness on the part of the boyfriend", and an "unhealthy approach to alcohol, with episodes of binge-drinking".

