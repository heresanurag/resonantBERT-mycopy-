title: Flipping fantastic choristers in cloisters pancake race - BBC News
date: '2024-03-24'
section: General
url: http://www.bbc.co.uk/news/uk-england-hereford-worcester-68288620
content: |-
  Choristers and the Dean of Worcester Cathedral don their cassocks for a pancake relay obstacle race.

  Choristers and clergy have taken part in an annual pancake race at Worcester Cathedral.

  The relay race over an obstacle course involved two teams made up of the two sides of the cathedral choir.

  People were dressed in cassocks and flipping pancakes along the way at the event, which was filmed by the cathedral.

  The Precentor, Canon John Paul Hoskins, was on the winning side for the second year, as his Cantoris team triumphed.
