  • None Chelsea have won all nine Premier League games in which Hazard has scored this season.
  • None Petr Cech has failed to keep a clean sheet in three of his four Premier League games against Chelsea for Arsenal and has conceded in both meetings at Stamford Bridge.
  • None Diego Costa failed to score in consecutive Premier League appearances for the first time since 2 May 2016 (three in a row).
  • None Cesc Fabregas scored his first ever Premier League goal against Arsenal.

  Chelsea will be looking to extend their lead further when they travel to Burnley in the Premier League next Sunday (12:30 GMT), while Arsenal host Hull on Saturday (12:30 GMT).
