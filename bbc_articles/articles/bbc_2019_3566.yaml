title: 'Brexit march: Remainer walks 200 miles to join protest - BBC News'
date: '2019-03-24'
section: Wales
url: http://www.bbc.co.uk/news/uk-wales-47670317
content: |-
  Ed Sides set off two and a half weeks ago and talked to Brexiteers along the way.

  Members of Swansea 4 Europe bade farewell to Ed Sides (left) as his walk began on 6 March

  A man has walked 200 miles to join a march in London in favour of another EU referendum, engaging with Brexit supporters along the way.

  Ed Sides set off from Swansea two and a half weeks ago and has "taken time to listen as much as talk".

  Wales for Europe had booked out 30 coaches to transport protesters to Saturday's demonstration.

  But one Leave supporter said a fresh vote would just prolong the arguments for another three years.

  Others from across Wales made their own way to Hyde Park for the march.

  Ed Sides and his wife Rhiannon Barrar in Hyde Park following their arrival in London

  Mr Sides, who was joined by his wife Rhiannon Barrar for part of the journey, set out on foot from Swansea on 6 March.

  "I set out on the walk to raise attention to our cause, but also to prove that just because you're passionate about something it doesn't mean you have to rubbish opposing opinions," he said.

  "We need a kinder, more rational debate about Brexit, and everywhere I've stopped I've taken the time to listen as much as talk."

  Hundreds of campaigners from Wales attended the march

  Welsh Government ministers Vaughan Gething and Eluned Morgan were among the many politicians joining the march in London.

  The UK had been due to leave the EU on 29 March, but that date has now been put back to 12 April, as MPs try to find a way forward.

  Prime Minister Theresa May's exit deal, negotiated with the EU over two years has been voted down twice in parliament, once by a record margin.

  MPs are now divided on what direction to take next - some want to leave without a deal, others want to not leave at all, and some want another referendum.

  In the 2016 referendum, Wales voted 52.5% to 47.5% in favour of leave, a slightly higher margin than the UK as a whole at 51.9% to 48.1%.

  But Peter Gilbey, director of the anti-Brexit campaign group Wales for Europe, believed the mood had shifted over the past three years.

  "Those who were ardent Remainers are probably more so now, and likewise with Leavers, but equally those who were uncertain in 2016 are even more confused than ever," he said.

  "The argument that a second referendum would be a betrayal of the people makes no sense; how can more information and more democracy equal less democracy?"

