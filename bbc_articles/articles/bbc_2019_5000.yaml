title: Aberdeenshire orphan lambs helping with dementia - BBC News
date: '2019-04-20'
section: General
url: http://www.bbc.co.uk/news/uk-scotland-47992909
content: |-
  Carehome residents have been visited by lambs from a local farm to help reduce loneliness and anxiety.

  Spring has arrived at one care home in Aberdeenshire.

  A trio of orphan lambs have visited the Balhousie Huntly care home in a bid to combat dementia.

  Many of the residents lived and worked on farms - so seeing the newborns now, helps them reconnect with their past.
