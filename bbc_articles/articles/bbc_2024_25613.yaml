content: |-
  It comes after Vance was fact-checked on a statement about "millions of illegal immigrants".

  During the debate, Republican vice-presidential candidate JD Vance was fact-checked over his claims about Haitian migrants in Springfield, Ohio, who he and Trump have baselessly accused of eating their neighbours' pets.

  After making a reference to "millions of illegal immigrants" being brought in, a moderator noted that most of those in Springfield were legal residents in the US.

  Watch as the candidates' microphones were ultimately muted.
