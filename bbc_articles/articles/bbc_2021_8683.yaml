title: Teenagers killed in London street stabbings named by police - BBC News
date: '2021-07-08'
section: London
url: http://www.bbc.co.uk/news/uk-england-london-57767060
content: |-
  Tamim Ian Habimana, 15, and Keane Flynn-Harling, 16, were killed in separate attacks in London.

  The victims of two fatal knife attacks in London have been named by police

  Officers found Tamim Ian Habimana, 15, suffering from a single stab wound on Woolwich New Road, Woolwich, at 17:25 BST on Monday.

  Despite treatment he was pronounced dead at the scene. A 15-year-old boy has been held on suspicion of murder.

  Hours later Keane Flynn-Harling, 16, was found stabbed in Oval Place, Vauxhall. A 29-year-old man has been arrested on suspicion of murder.

  To date, 21 teenagers have died in homicides in London in 2021. Across the whole of last year, 17 teens were killed in violent attacks in the capital.

  If teenage deaths continue at the current rate, this will be the worst year for young homicides in London since 2008.

