  Coastguard search for man missing from yacht in sea

  Crews are continuing to search for a man who went overboard from a yacht. The vessel was believed to have been travelling to Swansea from Brighton, via Falmouth in Cornwall, on Saturday. The Irish Coast Guard received a call at about 22:55 BST with a rescue helicopter from the UK's HM Coastguard sent to help, as well as a fixed wing aircraft. The search is continuing on Sunday afternoon.

  The Irish Coast Guard said the missing man is believed to have gone overboard from a UK registered yacht 16 nautical miles south of Dunmore East in the Irish Sea. A 999 call was received by its coordination centre in Dublin from the yacht requesting assistance. The search on Sunday will continue with the help of a helicopter from Waterford and a Dunmore lifeboat.
