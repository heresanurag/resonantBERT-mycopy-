title: 'Canada snowstorms: State of emergency declared - BBC News'
date: '2020-01-20'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-51168462
content: |-
  As much as 30 inches (76cm) of snow has fallen in Newfoundland after severe snowstorms.

  A state of emergency has been declared in Canada after severe snowstorms hit Newfoundland and Labrador.

  As much as 30 inches (76cm) of snow has fallen leaving some residents trapped in their own homes.
