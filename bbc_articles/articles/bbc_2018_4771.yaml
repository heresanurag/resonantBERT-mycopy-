id: bbc_2018_4771
title: Engineless runaway train in India gives passengers a scare - BBC News
date: '2018-04-09'
section: General
url: http://www.bbc.co.uk/news/world-asia-india-43697965
content: |-
  The train detached from the engine and rolled back for seven miles.

  Around 1,000 passengers had a narrow escape after a train sped backwards for seven miles without an engine.

  People could be heard shouting "pull the emergency chain!" as the train hurtled past a station in the eastern state of Odisha.

  The state-run railway has ordered an inquiry into the incident.
