  Speaking from his home state of Delaware, President Biden deplored the attack, calling it "sick". "There's no place in America for this kind of violence," he said. "Everybody must condemn it." The White House later said President Biden had spoken with Trump before returning to Washington DC. Trump remains locked in a tight contest with President Biden - the presumptive Democratic nominee - in a re-match of the 2020 election. Politicians of both parties joined Mr Biden in condemning the apparent attack. Former President Barack Obama said there "is absolutely no place for political violence in our democracy" and that he was "relieved that former President Trump wasn’t seriously hurt". Trump's former vice-president Mike Pence said he and his wife were praying for his former ally, adding that he urged "every American to join us". House Minority Leader Hakeem Jeffries said in a statement: “My thoughts and prayers are with former President Trump. I am thankful for the decisive law enforcement response. America is a democracy. Political violence of any kind is never acceptable.” UK Prime Minister Sir Keir Starmer led international condemnation of the shooting, saying he was "appalled by the shocking scenes at President Trump's rally". "Political violence in any form has no place in our societies and my thoughts are with all the victims of this attack," he said in a statement. Trump is still set to accept his party's nomination for president at the convention in Milwaukee on Monday, his campaign managers said. Some had speculated that he had been set to reveal his running mate at the Butler rally. Some Republicans were quick to blame President Biden over the shooting, accusing him of stoking fears about Trump's potential return to office. Senator JD Vance, who is thought to be on the shortlist to become Trump’s vice-presidential candidate, said the rhetoric from the Biden campaign had led directly to this incident. Mike Collins - a Republican congressman - accused the president of “inciting an assassination”. Meanwhile James Comer, the chair of the powerful House oversight committee, said he would summon the director of the Secret Service before his panel.
