  Former MP Jack Lopresti lost his seat in the last election and joined the Ukrainian military.

  A former Tory MP who lost his Westminster seat in last year's general election has explained why he joined the Ukrainian military.

  Jack Lopresti was serving as an MP for Filton and Bradley Stoke, in South Gloucestershire, until Labour's Claire Hazelgrove secured victory in July.

  He is now volunteering for the International Legion of Ukraine, Defence Intelligence.

  Mr Lopresti said he had been vocal in parliament over his position that "the defence of the UK starts in Ukraine".

