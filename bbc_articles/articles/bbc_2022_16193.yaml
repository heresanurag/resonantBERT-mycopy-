title: Joe Biden praises Zelensky and the Ukrainian people - BBC News
date: '2022-12-22'
section: General
url: http://www.bbc.co.uk/news/world-64059738
content: |-
  The US President called out Ukrainian people for their courage during a visit with President Zelensky.

  In an Oval Office meeting at the White House, US President Joe Biden affirmed support for the Ukrainian people and called President Zelensky the 'Man of the Year' while confirming the delivery of the Patriot missile system.
