title: Joey Barton charged over social media posts - BBC News
date: '2024-12-18'
section: England
url: http://www.bbc.co.uk/news/articles/c4g3zz1wynjo
content: |-
  The retired Premier League footballer faces two charges of sending malicious communications.

  Joey Barton will appear in a magistrates' court at a date still to be fixed

  Retired footballer Joey Barton has been charged in connection with allegations concerning social media posts. Mr Barton, 41, faces two charges of sending malicious communications relating to the BBC presenter Jeremy Vine and former England footballer Lucy Ward. Cheshire Police said Mr Barton, originally from Huyton, Merseyside, but now of Widnes in Cheshire, will appear in a magistrates' court at a date still to be fixed. The midfielder played for clubs including Manchester City, Newcastle United, Queens Park Rangers, Burnley and Rangers and moved into management after his retirement.

  He was sacked from his most recent role of manager at Bristol Rovers in October 2023 after almost three years in charge.
