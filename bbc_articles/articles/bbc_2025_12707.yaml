content: |-
  Kiki follows 10-year-old Sonny and his friends to school every day, before waiting in the playground and then following them home.

  Glasgow cat Kiki has gained praise for following 10-year-old Sonny and his friends to school every day, before waiting in the playground and then following them home.

  Kiki is such a fixture at the school gates, she is known by all the children and has been commended by the head for her "100%" attendance.

  Two-year-old Kiki has been nominated in the Connected Cats category of the National Cat Awards 2025. The award aims to recognise cats who play a part in bring joy to their local community.

  She has been put forward for not only bringing the school community together, but for providing an important talking point, helping the children learn about cats and how to treat them.
