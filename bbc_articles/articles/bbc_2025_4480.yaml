title: Trump's move to break up education department a conservative pipe dream since
  Reagan - BBC News
date: '2025-03-21'
section: US & Canada
url: http://www.bbc.co.uk/news/articles/ckg80x2rw58o
content: |-
  Conservatives in the US have long argued that control over education should lie with the states.

  Trump's move to dismantle education department was a conservative dream for decades

  Ronald Reagan referred to the Department of Education as a costly "bureaucratic boondoggle"

  As he strode into Congress for his State of the Union speech in 1982, US President Ronald Reagan was prepared to deliver a message that resonated with many Republicans: let's end the Department of Education. "We must cut out non-essential government spending," Reagan told lawmakers, vowing to cull the wider federal workforce by 75,000. For 43 years, that vision for abolishing the education department - backed by members chafing at "big government" control over state issues - went unrealised. But now, Donald Trump is attempting just that, through an executive order that instructs his Education Secretary Linda McMahon to take "all necessary steps" to shutter the department and "return education authority to the states", according to a White House-provided fact sheet. Trump has already moved to lay off half of the agency's workforce. While closing the department outright would require an act of Congress, a political longshot, the president can take steps to break up the department and narrow its remit. If ultimately successful, he would fulfil a campaign promise and long-running policy that has united disparate groups within the Republican Party, ranging from establishment Republicans and evangelical Christians to the Make America Great Again wing of the party that is most aligned with Trump. Trump's executive order cites a number of reasons for dismantling the department, including $3tn (£2.3tn) spent "without improving student achievement", plummeting test scores, excessive "ideological initiatives" and a return of control to the states "where it belongs". Jonathan Butcher, an education policy veteran with experience in South Carolina, Arkansas and Arizona, told the BBC that these reasons, broadly, are ones shared by various factions of the Republican Party - and have been for years. "Reagan correctly saw the philosophical and practical point that when you create an agency in Washington, it only grows in size and assumes additional responsibilities," said Mr Butcher, now a senior research fellow at the Heritage Foundation, a conservative think tank that has long called for the abolition of the department. "And sure enough, that's what the US Department of Education has done," he added.

