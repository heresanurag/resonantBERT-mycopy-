title: 'Notting Hill Carnival: Revellers party through rain - BBC News'
date: '2018-08-27'
section: General
url: http://www.bbc.co.uk/news/uk-england-london-45316764
content: |-
  Thousands of performers take to the streets for Notting Hill Carnival's Family Day.

  Performers and revellers danced through the rain for Family Day at the Notting Hill Carnival.

  More than one million people are expected to attend the two-day festival in west London.
