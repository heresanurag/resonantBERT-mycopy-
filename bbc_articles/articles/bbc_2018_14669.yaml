title: 'Mount Etna: Aerial footage shows damage from Italy quakes - BBC News'
date: '2018-12-26'
section: General
url: http://www.bbc.co.uk/news/world-europe-46689502
content: |-
  Two earthquakes have left buildings damaged and people injured following the eruption of Mount Etna on Monday.

  Aerial footage has captured the aftermath of two earthquakes that have struck Sicily.

  The quakes followed the eruption of Mount Etna, Europe's most active volcano, on Monday.

  Dozens of people were injured and buildings were damaged in several villages nearby.
