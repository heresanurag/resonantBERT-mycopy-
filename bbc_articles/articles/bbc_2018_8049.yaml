id: bbc_2018_8049
title: Paraglider interrupts Trump's resort visit in Scotland - BBC News
date: '2018-07-14'
section: General
url: http://www.bbc.co.uk/news/uk-44832450
content: |-
  A paragliding protester appeared to breach security around the president by flying close to the Turnberry Hotel.

  A protester in a paraglider interrupted Donald Trump's visit to his Ayrshire hotel and resort in Scotland on Friday evening.

  The paraglider had "Greenpeace" written across the canopy and flew a banner which read 'Trump: well below par'.
