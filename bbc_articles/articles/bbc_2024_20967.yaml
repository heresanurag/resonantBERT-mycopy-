title: Muslim counter-protesters embraced by pub-goers in Accrington - BBC News
date: '2024-08-07'
section: Lancashire
url: http://www.bbc.co.uk/news/articles/c3d9vn57p0yo
content: |-
  Haddi Malik said the moment pub-goers embraced his group was "massive".

  This video can not be played To play this video you need to enable JavaScript in your browser.

  A Muslim anti-fascist protester has spoken of the moment his group was embraced in support by pub-goers in Lancashire. Thousands of counter-protesters have taken to the streets in towns and cities across the UK after rumours that far-right organised gatherings would target immigration centres and mosques. Haddi Malik, 25, joined a peaceful march in Accrington, Lancashire, walking between two mosques in the town to counter a potential right-wing march. Mr Malik told the BBC it was a "massive" moment when pubgoers came up to some of the people marching and began hugging them.

  Haddi Malik said "we need to see unity to stop all this far-right violence"

  "We went to go and support the mosque that was under threat of violence," he said. He said around 300 of the group gathered outside the Raza Jamia Masjid mosque before peacefully marching across town. Mr Malik said: "We reflected on the history of the town, how South Asians, white people and Muslims have lived side-by-side there for decades." In a video posted on X, patrons of a pub on Blackburn Road came out and embraced some of the group. "There were a few shouts of ‘respect’ which was fantastic, we need to see unity to stop all this far-right violence," Mr Malik said.

  "We’ve seen people targeting Muslim communities but we’ve seen in Accrington communities living side-by-side peacefully. "It [the hugging] was massive. It was a pure expression of solidarity and support. "It’s showing we’re united against Islamophobia and again if there is any show of far-right fascism we’ll stand up together against it." In Liverpool, hundreds of protestors gathered outside the Asylum Link office in Overbury Street after it was named in a list of far-right demonstration targets circulating on social media. Merseyside Police attended but there were no signs of disorder and no opposing groups appeared to turn up. People in the crowd could be heard chanting that "refugees are welcome here". Placards were held by members of the crowd including ones which read "Nans against Nazis", "Merseyside pensioners fight back" and "When the poor blame the poor only the rich win”.
