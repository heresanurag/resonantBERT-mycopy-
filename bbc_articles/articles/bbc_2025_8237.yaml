title: Ukraine captures Chinese nationals fighting for Russia - BBC News
date: '2025-04-08'
section: World
url: http://www.bbc.co.uk/news/articles/cx2vg1x7g32o
content: |-
  President Zelensky says two soldiers were captured while fighting in Ukraine's Donetsk region.

  Ukraine's President Zelensky said Beijing had been contacted for a response

  Ukrainian forces have captured two Chinese nationals who were fighting for the Russian army in eastern Ukraine's Donetsk region, President Volodymyr Zelensky has said. He said on Tuesday that intelligence suggested the number of Chinese soldiers in Russia's army was "much higher than two". Ukrainian Foreign Minister Andrii Sybiha said Chinese troops fighting on Ukrainian territory "puts into question China's declared stance for peace" and added that their envoy in Kyiv was summoned for an explanation. It is the first official allegation from Ukraine that China is supplying Russia with manpower. Russia declined to comment on Zelensky's revelation on Wednesday.

  However, China's foreign ministry said it was "verifying the relevant situation with the Ukrainian side", but that it had consistently urged Chinese nationals to steer clear of any armed conflicts. It added that Kyiv's accusation that more Chinese citizens were involved in the fighting was "groundless". In a statement on social media platform X, Zelensky said the soldiers were captured in Ukraine's eastern Donetsk region with identification documents, including bank cards which had "personal data" on them. Ukraine's forces fought six Chinese soldiers and took two of them prisoner, he said. The post was accompanied by a video showing one of the alleged Chinese captives in handcuffs, speaking Mandarin Chinese and apparently describing a recent battle. "We have information suggesting that there are many more Chinese citizens in the occupier's units than just these two," he said. "Russia's involvement of China, along with other countries, whether directly or indirectly, in this war in Europe is a clear signal that Putin intends to do anything but end the war," Zelensky added. The Ukrainian president called for a response "from the United States, Europe, and all those around the world who want peace". An investigation is under way and the captives are currently in the custody of Ukraine's security service, he added.

  On Tuesday, US State Department spokesperson Tammy Bruce called the reports "disturbing". She added that China is a "major enabler" of Russia's war in Ukraine, citing its supply of dual-use goods such as navigation equipment, semiconductor chips and jet parts. Ukraine's foreign minister said that he had summoned China's chargé d'affaires in Kyiv to "demand an explanation". Writing on X, Andrii Sybiha said: "We strongly condemn Russia's involvement of Chinese citizens in its war of aggression against Ukraine, as well as their participation in combat against Ukrainian forces." He added that the move "puts into question China's declared stance for peace" and undermines Beijing's credibility as a member of the UN Security Council. French newspaper Le Monde has previously reported that it identified around 40 accounts on TikTok's sister app, Douyin - which is only available in China - belonging to Chinese individuals who claim to have signed up with the Russian army. North Korea has sent thousands of troops to aid Russia's war effort against Ukraine, according to Kyiv and Western officials.
  • None What we know about North Korean troops fighting Russia's war
  • None About 1,000 North Koreans killed fighting Ukraine in Kursk, officials say In a press conference on Tuesday, Zelensky said: "But there is a difference: North Koreans fought against us on the front in Kursk, the Chinese are fighting on the territory of Ukraine." In January Ukraine said it captured two injured North Korean soldiers in Russia's Kursk Oblast. While Beijing and Moscow are close political and economic allies, China has attempted to present itself as a neutral party in the conflict and has repeatedly denied supplying Russia with military equipment. In its response on Wednesday, the foreign ministry in Beijing appeared to indicate that if Chinese citizens had been captured by Ukrainian forces then they had been operating in a private capacity. "It is important to emphasise that the Chinese government has consistently urged its citizens to stay away from conflict zones and to avoid involvement in armed conflicts in any form - particularly participation in military actions on any side," said foreign ministry spokesman Lin Jian. One of Russia's chief advantages in the war is numbers. There have been reports of Moscow using "meat grinder" tactics to throw huge numbers of soldiers at the front lines and incrementally improve their position. Russian President Vladimir Putin launched a full-scale invasion of Ukraine in 2022, and Moscow currently controls about 20% of Ukraine's territory, mostly in the east.

  Russian drone attacks into Ukraine continued on Tuesday night with strikes injuring 14 people in the central Ukrainian city of Dnipro, and another two in Kharkiv, in the north-east, local officials said. A number of fires were reported in the two cities.
