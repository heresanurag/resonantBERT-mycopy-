title: 'Newspaper headlines: ''Fury in Commons'' and ''King''s tears'' - BBC News'
date: '2024-02-22'
section: The Papers
url: http://www.bbc.co.uk/news/blogs-the-papers-68366070
content: |-
  Many of the front pages focus on the scenes of "chaos" in the House of Commons on Wednesday during the Gaza ceasefire vote.

  The Daily Telegraph suggests Sir Lindsay Hoyle is fighting to keep his job - and reports that Sir Keir Starmer had personally lobbied the Speaker to choose the Labour amendment for a vote. It says the Labour leader visited Sir Lindsay - a former Labour MP - to plead his case. It argues that at the heart of the row is the allegation of political bias - which Sir Lindsay vehemently denies. The paper suggests his future depends on how many MPs now go public in calling for him to go.

  The Guardian, though, says some MPs are already actively trying to unseat him. Others are urging the Conservatives to ignore the long-running convention of not fielding a candidate against the Speaker at the next general election. The paper also claims such was the strength of feeling among Labour MPs on a ceasefire in Gaza that two shadow cabinet ministers were ready to resign over the issue.

  The Daily Express believes that although Sir Lindsay had enjoyed the support and respect of MPs across the political divide he has now destroyed his reputation for impartiality. The paper says it's hard to see how he can recover it. For the Daily Mail, the Speaker "spectacularly self-destructed".

  The main story for the Times is the warning from the equalities watchdog that companies could be sued for disability discrimination if they don't make "reasonable adjustments" for menopausal women. It notes that about 13 million women in the UK are going, or have been, through the menopause - with post-menopausal women making up the fastest-growing demographic in the workforce. But it points out that some organisations, such as the Police Federation of England and Wales have previously raised concerns whether it's appropriate to class the menopause as a disability,

  The Guardianhighlights the latest developments in the row over comments made by the former Post Office chairman, Henry Staunton. He claimed in a newspaper interview that a top civil servant had asked for a delay to compensation payments to postmasters wrongfully convicted in the Horizon IT scandal. But the civil servant involved, Sarah Munby, has written to Business Secretary Kemi Badenoch saying she never explicitly or implicitly suggested to Mr Staunton that payments be held back.

  The Financial Times says it's been told by officials that the chancellor is drawing up plans for a 99% mortgage scheme ahead of the Budget. Buyers would have to put down just 1% deposit on their first home, with the government acting as a loan backer. The paper says the Conservatives are keen to reassure voters that they are on the side of homebuyers.

  Andthe Times reports that a new study - funded by the Paul Hamlyn Foundation - suggests that acting out Shakespeare, rather than just reading the Bard, helps children's literacy and emotional development. The trial involved hundreds of year five pupils at 45 state primary schools and showed that children who rehearsed scenes like actors developed broader vocabularies and more complex writing.

