title: 'Paper headlines: Ukraine needs US support and Kate''s prison visit - BBC News'
date: '2025-02-12'
section: The Papers
url: http://www.bbc.co.uk/news/articles/c627mz8drmqo
content: |-
  A number of Wednesday's papers touch on the latest on the assisted dying bill going through Parliament.

  'Ukraine needs US support' and Kate's prison visit

  Much is made of the High Court's ruling against the Metropolitan Police's policy of sacking officers who fail their vetting. The ruling should serve as a "prompt to action" for ministers because "successive governments have allowed the police to enjoy greater job protection than most employees do", according to the Times, external. Leading the Daily Telegraph, external is a report that a family of six Palestinians have been granted the right to live in the UK after applying through a scheme meant for Ukrainian refugees. The Daily Mail, external says the government's preferred candidate to be Chief Inspector of Borders and Immigration, John Tuckett, has hinted he plans to work part of the time from his home in Finland.

  President Zelensky gives an interview to the Guardian, external where he tells the paper that "security guarantees without America are not real security guarantees". Photographs of the Princess of Wales under an umbrella on a visit to a women's prison make many of the papers - "Oh brolly good show, Ma'am", is the Daily Mirror's, external headline. The Daily Express, external reports there were cat calls and a wolf whistle as the Princess toured the grounds of HMP Styal. Finally, "United for our hero", is the Daily Star's, external headline, accompanying its coverage of the funeral of the former Manchester United and Scotland footballer, Denis Law.

