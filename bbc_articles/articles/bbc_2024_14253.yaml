  The body of a man in his 20s has been found after a search for a canoeist who went missing in a river. Dyfed-Powys Police began the search of the River Teifi at Cardigan, Ceredigion, after the canoeist was reported missing just before 19:40 BST on Thursday. Coastguards were joined by the RNLI and Mid and West Wales Fire and Rescue Service and other specialist search and rescue teams. The body was recovered at about 01:00 on Friday after several hours of searching.

  Dyfed Powys Police said no formal identification had taken place but the next-of-kin of the missing man had been informed and were being supported by officers.
