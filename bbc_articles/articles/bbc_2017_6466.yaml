  Recovery efforts at Grenfell Tower in West London resume; 58 people are dead or presumed dead.

  Councils must 'reach out to people on the ground'

  Rev Dr Alan Everett from St Clement's Church, who helped with relief efforts in the aftermath of the Grenfell Tower fire, told BBC Radio 4 that local authorities should do more to build relationships with local communities. He added: "The lesson to be learnt from here is that when local authorities have major incident plans that they really need to involve people on the ground. "You can have a plan in place, which operates at a high level, but you need to reach out to the people on the ground. "They really need to start building those relationships, I think they need to rehearse their plans more thoroughly, but I think there needs to be a much more positive and open approach to the people who are there day in day out and have all the local connections."
