id: bbc_2017_1933
title: 'Australia bushfires: ''Most buildings'' in community affected - BBC News'
date: '2017-02-13'
section: General
url: http://www.bbc.co.uk/news/world-australia-38954075
content: |-
  Aerial footage shows how bushfires have almost completely destroyed a small community in Australia.

  Bushfires ravaging the Australian state of New South Wales (NSW) have largely destroyed a tiny hamlet.

  More than 80 fires - including 20 uncontained - were still burning on Monday following record temperatures.
