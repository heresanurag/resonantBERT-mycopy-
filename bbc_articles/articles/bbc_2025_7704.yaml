title: Father of 14-year-old Morecambe boy killed in M6 crash charged - BBC News
date: '2025-04-27'
section: Lancashire
url: http://www.bbc.co.uk/news/articles/c0782rme5nro
content: |-
  A 31-year-old man has been charged with causing death by dangerous driving.

  Ryan Liam Morgan died at the scene of the crash on Easter Sunday

  The dad of a 14-year-old boy killed in a crash on the M6 has been charged with causing death by dangerous driving. Ryan Liam Morgan, from Morecambe, was killed on 20 April after the Peugeot van in which he was a passenger left the carriageway between junctions 34 and 33 southbound and crashed into a tree. The van driver, Daniel Burba, the father of the passenger, suffered serious injuries and was taken to hospital, but has since been discharged. The 31-year-old, of Arnside Crescent, Morecambe, has also been charged with causing death by driving whilst unlicensed and uninsured, Lancashire Police has confirmed.

  Mr Burba has been remanded in custody and is set to appear at Lancaster Magistrates' Court at 10:00 BST on Monday. Police said their thoughts remained with the family, who were being supported by specially trained officers. A tribute issued by Ryan Liam's family described him as "our precious boy". "There truly is no one like our Ryan, such a beautiful soul and so far from typical," his family said. "Words can't express how much we have loved and cherished him and how much we always will." No other vehicles were involved in the collision and police are appealing for anyone with information or footage to contact them.

