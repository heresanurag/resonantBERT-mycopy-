  The controlled explosion was carried out at 15:38 BST

  James Fraser, the developer of the site, told the BBC that the Army had informed him that some solar panels had been damaged on the nearby homes, but no windows were broken. Earlier, the Police Service of Northern Ireland said the device was to be "dealt with on site". Police said the decision followed discussions at great length about whether the device should be removed. On Saturday evening police said that the operation to neutralise the bomb, which has now entered its third day, could take "five or more days to complete". Following the controlled explosion, Supt McDowell said: "I appreciate the scale of disruption caused while we worked to ensure the safety of everyone in the area and I would like to thank those affected for their patience and understanding.”
