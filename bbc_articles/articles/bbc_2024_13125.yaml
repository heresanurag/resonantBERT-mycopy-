title: Tories pull support for candidates over bet scandal - BBC News
date: '2024-06-25'
section: Politics
url: http://www.bbc.co.uk/news/articles/cg33mvm8mvro
content: |-
  Both Craig Williams and Laura Saunders are being looked into by the Gambling Commission.

  The Conservative party have withdrawn support from two candidates who are under investigation for alleged betting on the date of the general election. Both Craig Williams, the candidate in Montgomeryshire and Glyndŵr, and Laura Saunders, the candidate in Bristol North West, are being looked into by the Gambling Commission. The pair will still appear on the ballot under Conservative party banners but this decision means they will become independent if elected, pending the result of an investigation. The Met Police says allegations about five further officers are being looked into by the Gambling Commission, following the arrest of one of the PM's close protection officers. Following the Conservatives' decision to pull support, Mr Williams posted a video on X, directed at voters in Montgomeryshire and Glyndŵr, in which he said he remained committed to standing in the constituency. He said he had "committed an error of judgment, not an offence" adding: "I want to reiterate my apology directly to you. "I am fully co-operating with routine inquiries from the Gambling Commission and I intend to clear my name. "In all these things, due process is important and that is what sets the UK apart from other countries, and the commission must be allowed to do its work." Last week, a spokesperson for Ms Saunders said she would be co-operating with the Gambling Commission and had nothing further to add. A Conservative Party spokesman said: "As a result of ongoing internal enquiries, we have concluded that we can no longer support Craig Williams or Laura Saunders as parliamentary candidates at the forthcoming general election. "We have checked with the Gambling Commission that this decision does not compromise the investigation that they are conducting, which is rightly independent and ongoing." Labour leader Sir Keir Starmer, commenting on the news that support had been withdrawn from the candidates, said: “Why didn’t that happen a week ago?” Liberal Democrat deputy leader Daisy Cooper said: "This should have happened immediately when these scandalous revelations emerged, but instead Rishi Sunak has dithered and delayed."

  Two sources earlier told the BBC that the party board had held urgent discussions about how to handle the row. Mr Sunak has said he is “incredibly angry” about the allegations and denied being aware of any other candidates being involved. Two members of Conservative staff have also taken leaves of absence from their roles after it emerged they were being looked into by the Gambling Commission. A police officer assigned to the protection of Mr Sunak has been arrested on suspicion of misconduct in public office and is on restricted duties with the Royalty and Specialist Protection Command. A Met Police spokesperson has confirmed five further officers are alleged to have placed bets on the timing of the general election and investigation is underway by the Gambling Commission. The Met said: “It is still the case that only one officer is under criminal investigation. “We have, however, been passed information from the Gambling Commission alleging that five further officers have placed bets related to the timing of the election. "The officers have not been arrested but the Met’s Directorate of Professional Standards has been informed." The spokesperson added the officers included at least one more from the Royalty and Specialist Command, as well as the Parliamentary and Diplomatic Protection Command and the Central West Basic Command Unit. None of the officers work in a close protection role, they added, and decisions on whether they will be subject to any restrictions will be taken in due course. The Metropolitan Police has denied reports that it leaked the names of people being investigated about alleged bets on the election date. A Plaid Cymru spokesperson said: "The people of Wales deserve better than London parties mired in scandals." A Reform UK spokesman asked how voters could back the Tories following news of the withdrawal of support.

  You can find a full list of candidates for the Bristol North West and Montgomeryshire and Glyndwr constituencies on the BBC News website.
