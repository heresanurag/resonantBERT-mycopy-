content: |-
  La Rochelle coach Ronan O'Gara says he is desperate to test himself in the international game, but is not considering floundering Wales as an option.

  O'Gara keen on international job - but not Wales

  O'Gara celebrates Friday's win over Bath with a small contingent of travelling La Rochelle fans

  La Rochelle coach Ronan O'Gara says he is desperate to test himself in the international game, but is wary of taking on a Wales team that have lost 12 Tests in a row. The 47-year-old former Ireland fly-half led La Rochelle to successive Champions Cup triumphs in 2022 and 2023 after working as an assistant at Racing 92 and New Zealand's Crusaders. "You have got to have those ambitions because you want to be the best you can be," O'Gara said. "There are Test jobs I would bite people's hands off for."

  While there are no current vacancies, under-pressure Wales coach Warren Gatland's future is being considered by the Welsh Rugby Union, with the New Zealander saying he will discuss with his family whether he still wants to continue in his role. However, O'Gara said he was not considering the possibility of succeeding Gatland. "I haven't thought about that, to be honest with you," he added. "Without lacking humility, I would prefer Ireland, England or France." O'Gara removed himself from the running for the England job after Eddie Jones was sacked in 2022, signing a five-year contract extension with La Rochelle. That deal expires in the summer of 2027, potentially offering O'Gara the chance to take on an international role after the Rugby World Cup in Australia later that year. La Rochelle's bid for a third straight European crown ended in quarter-final defeat by Leinster last season. They are still chasing a first Top 14 crown with O'Gara twice suffering defeat in the French game's showpiece final, losing to Toulouse in 2021 and 2023. However, La Rochelle, who beat Bath in their opening European game on Friday, have made a slow start to the current campaign, lying sixth in their domestic standings. "In France I am seen as very demanding and difficult because of standards I try and keep, but I just want players to try and experience what I did," said O'Gara, who won two European crowns with Munster and a Grand Slam with Ireland as a player. "I got so much out of the game. It gave me wonderful emotions, and now I want to really try and give back." La Rochelle play Bristol at home in the second of their four Champions Cup pool games on Saturday evening.

  O'Gara (bottom right) was part of a Munster team that beat Toulouse to win the Champions Cup in 2008 in Cardiff
