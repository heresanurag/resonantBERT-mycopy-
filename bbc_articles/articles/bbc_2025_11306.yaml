content: |-
  A 16-year-old girl is charged and four more have been arrested following disorder in Salford.

  To play this video you need to enable JavaScript in your browser. This video can not be played Footage appears to show a car reversing at speed during the unrest

  A 16-year-old girl has been charged with assaulting a police officer amid disorder in Salford that saw cars set on fire and bricks being hurled. About 50 to 60 people gathered during the disturbance in the city's Lower Broughton Road at about 13:30 BST, Greater Manchester Police said. Two men have been arrested on suspicion of possessing a weapon, while two others were held on suspicion of drugs offences and theft. The girl, who cannot be named for legal reasons, was charged with assaulting an emergency worker and has been bailed to appear in court at a later date.

  A burnt out car was left abandoned at the scene

  The force said cars were stolen and set on fire, motorbikes were being ridden erratically and bricks were thrown at officers, while wheelie bins and cars were used to block off the road. A video shared on social media appeared to show a Fiat 500 reversing at speed along the road with its boot open, as another car followed it. Supt Marcus Noden said there had been "no further incidents" since the unrest earlier but officers had "robust plans in place should any further incidents arise in the area". He added: "We are aware of speculation online that this incident is linked to immigration. This is categorically incorrect. "This sort of behaviour will not be tolerated and we took robust and appropriate action. "A large number of officers will be remaining in the area overnight as a precaution."
  • None A boy, 16, has been arrested on suspicion of theft and public order offences
  • None A man in his 30s has been arrested on suspicion of being drunk and disorderly and drug possession
  • None Two more men - aged 18 and 19 - were arrested on suspicion of possessing a weapon A dispersal order remains in place until 14:00 BST on Thursday.

