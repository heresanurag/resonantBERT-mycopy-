content: |-
  Footage from the Reykjanes Peninsula shows bright orange lava erupting into the air.

  Footage from the Reykjanes Peninsula shows bright orange lava spewing into the air in a volcanic eruption.

  It is the fourth eruption in Iceland since December, the country's meteorological office has confirmed.

  Reykjavik's airport remains open but the last time the volcano erupted in February more than 20,000 people had their heating cut off, roads were destroyed and thousands of residents were evacuated.

