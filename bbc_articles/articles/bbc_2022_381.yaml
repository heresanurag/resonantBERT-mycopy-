title: Andy Murray beats Reilly Opelka to reach Sydney Tennis Classic final but Dan
  Evans out - BBC Sport
date: '2022-01-14'
section: General
url: http://www.bbc.co.uk/sport/tennis/59992967
content: |-
  Britain's Andy Murray fights back to beat Reilly Opelka at the Sydney Tennis Classic and reach his first ATP Tour level final since 2019.

  Last updated on .From the section Tennis

  Britain's Andy Murray reached his first ATP Tour final since 2019 with a three-set win over Reilly Opelka at the Sydney Tennis Classic.

  The 34-year-old fought back from a set down to beat the 25th-ranked American 6-7 (6-8) 6-4 6-4.

  Murray let out a roar of triumph after converting his first match point.

  Compatriot Dan Evans was unable to set up the first all-British final at ATP Tour level after losing to Russian top seed Aslan Karatsev in the semi-final.

  Saturday's final will be shown live on BBC iPlayer, Red Button and BBC Sport website and app from 0800 GMT.

  Third seed Evans, 31, lost 6-3 6-7 (13-15) 6-3 to the 28-year-old, ending the Briton's hopes of securing his second ATP Tour title.

  He saved three match points before going on to win an epic second-set tie-break but was then furious about a bathroom break taken by Karatsev.

  Evans was broken in the first game of the deciding set and Karatsev then disappeared for five minutes.

  In an expletive-laden outburst, the Briton accused the umpire of failing to apply the ATP rules, which allow players a maximum of three minutes once they have entered the toilet.

  Those who are changing their clothes are allowed an additional two minutes.
