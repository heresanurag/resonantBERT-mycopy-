  No 'needle' with Ireland despite winless run - Townsend

  Gregor Townsend has never beaten Ireland as Scotland head coach

  Coverage: Watch on BBC One, iPlayer & BBC Sport website, listen on BBC Sounds

  Gregor Townsend says he does not view Scotland's Six Nations showdown with Ireland on Sunday as a "needle game", and insists ending a 10-match losing run to the Irish provides no extra motivation. The Scots have not beaten Ireland during Townsend's reign as head coach, with their last victory in the fixture coming in 2017 under Vern Cotter. Much has been made of the rivalry that has developed between the two sides in recent years, but Townsend says Sunday's match at Murrayfield carries no more significance for his side than any other in the Six Nations. Scotland have lost the past 10 meetings with Ireland, with just one victory in 15. "Teams want to build up something to provide extra motivation, so maybe it's more on the Irish side or the Irish media side that there's this rivalry or needle to give them extra motivation on why they want to win again," he said. "Obviously they've won this fixture a number of times but we say this every game, we respect Ireland a lot, admire what they've done over the last few years, but it doesn't stand out as a needle game for us."

  Jack Dempsey (left) and Tom Jordan come into the Scotland XV, having been replacements in the win over Italy

  Tom Jordan makes his first Six Nations start as Scotland make three changes from the team that beat Italy last weekend. Rory Sutherland comes in at loose-head prop and Jack Dempsey is at number eight, while Jordan is chosen at inside centre having impressed as a replacement against Italy. New Zealand-born Jordan, 26, made his Scotland bow during the autumn series, having qualified on residency grounds. Both of his international starts to date have been at full-back, while he primarily plays at fly-half for club side Glasgow Warriors. Sutherland's previous Test start came last summer against Uruguay, while he hasn't started a Six Nations match since February 2022 in a win over England. "I think there are similarities with the three of them, which is the real energy that they bring, they're quick players, they are in good form," said Townsend. "Jack obviously was getting back into full fitness and he's now had three weeks training with us, he's good to go. He's been a starter for us for the last few years. "I feel Rory has earned it, he brings a lot of speed in his kick-chase, his defence and his ball-carrying. "With Tom, it was great to see him again play like he has done in the 15 jersey for us in November. 12 was probably his natural position, it was the position he played most of his rugby growing up, so I think all three deserve an opportunity to start." Pierre Schoeman, Jamie Ritchie and Stafford McDowell drop to the bench while Matt Fagerson switches to the blindside flank to accommodate Dempsey's return. Sam Skinner is among the replacements, having been added to the squad this week, and Jamie Dobie is preferred to George Horne as back-up to scrum-half Ben White. Ireland, led by interim head coach Simon Easterby, beat England in their tournament opener last weekend as they attempt to win a third successive title.

