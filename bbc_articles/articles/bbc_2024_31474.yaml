  Fury has promised a knockout which will send Usyk into retirement but, by his usual standards, the brashness was generally toned down early in this fight week. Instead there was an edginess and intensity. Fury appeared disengaged, a little short, during media commitments. He laced up the gloves at a media workout but did not throw a single punch. The Gypsy King – having grown a beard - says he stopped speaking to wife Paris Fury for three months during his training camp for the rematch. For those wondering whether Fury had been humbled by defeat and adopted a new-found focus, the mask slipped a little after the remarkable face-off that lasted 11 minutes and 20 seconds on Thursday. Following a staredown in which neither man would look away, Fury hurled a number of insults at Usyk and insisted he was the real champion. Moments later, he danced with a group of drummers waiting outside. This was the Fury to whom we are all accustomed, although Usyk had already spoken about Fury's unpredictability a few days earlier. "Bad guy, good guy; bad opponent, good opponent; win, not win. I don't know. Crazy man. Change opinion every time," Usyk said.

  This video can not be played To play this video you need to enable JavaScript in your browser. Watch: Fury and Usyk face off for 11 minutes

  Usyk, who also unified the cruiserweight division, is keeping Saturday's gameplan close to his chest. "I learned a little bit [from the first fight] but I [will] not tell you. After my second win I will talk to you. It's not secret but maybe greedy belly will watch the TV," he says. The "greedy belly" taunt and Fury's "ugly rabbit" jibes at Usyk should be taken with a pinch of salt; this is a rivalry built on mutual respect and admiration. Fury versus Usyk has captured the wider public's attention and elevated the sport – and each other's profile - to a new level. It has flourished because of just how little there is to separate two elite-level operators. If a third judge had given one of the closer rounds to Fury instead of Usyk six months ago, Britain would have celebrated an undisputed heavyweight champion. "Tyson Fury is very important for my boxing career. He's a very strong opponent. He's important but not only for me but for future history, for boxing in the world," Usyk says. No rivalry should end on a tie, and a Fury victory this weekend could set up the trilogy. Usyk will not be drawn on how long he has left in the sport, but a win could just be a fitting way to bow out of the sport. And maybe then he can enjoy that well-deserved lie-in.
