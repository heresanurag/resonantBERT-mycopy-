title: Norwich student artist uses junk plastic to make artwork - BBC News
date: '2018-03-10'
section: General
url: http://www.bbc.co.uk/news/uk-england-norfolk-43347927
content: |-
  Norwich art student Jessica Mae Gower uses her spare time to recycle plastic to make art.

  A textile design student uses her spare time to turn old plastic wine glasses and spoons into art.

  Jessica Mae Gower is studying at the Norwich University of the Arts.
