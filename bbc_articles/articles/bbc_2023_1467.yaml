content: |-
  A woman is rescued from the debris of a building in Dnipro, a day after it was hit by a Russian missile strike.

  A woman has been rescued from the rubble of an apartment building in Dnipro, a day after it was hit by a Russian missile strike.

  At least 25 people died in the attack on Saturday and dozens were injured. Officials said 43 people are missing.

