content: |-
  Much remains unknown about the GHF, the new US- and Israeli-backed group created to feed people in Gaza.

  Searching for answers about US-backed aid agency in Gaza

  The road to Dover, Delaware, is lined with barns and giant wheat fields and all the other signs of American abundance. But on this journey, the scene only highlights the devastating contrast between peace and war. We're driving here because in this rural heartland lie clues to what's behind a highly contested development thousands of miles away on the ground in Gaza. The new US- and Israeli-backed entity created to feed the territory, the Gaza Humanitarian Foundation (GHF), was registered here in Delaware two weeks after US President Donald Trump took office. Little is known about the group, which has been at the centre of global headlines amid scenes of chaos and deadly incidents nearly every day as desperate Palestinians have tried to reach its sites. Eyewitnesses recently reported Israeli forces firing on crowds heading to an aid site. Israel says it is investigating while also accusing Hamas of trying to sabotage the operations. The GHF said on Thursday that eight of its local Palestinian workers were killed when Hamas attacked one of their buses. And in the latest deadly incident, at least 15 Palestinians were killed on Saturday by Israeli fire, local hospitals said. The Israeli military said troops fired warning shots at a group they believed posed a potential threat, and an aircraft shot at one person who moved towards them.
  • None Fifteen killed by Israeli fire near Gaza aid site, say hospitals

  On our journey in Delaware to find out more about the GHF, the search yields many clues but few definitive answers. GHF established itself saying it intended to feed civilians in Gaza, where the United Nations has said more than two million people are at risk of starvation. The foundation, which uses armed American security contractors, bypasses the UN as the main supplier of aid in Gaza. Critics see the GHF as enabling a plan by the Israeli government to displace Palestinians south into smaller areas of Gaza. But Israel - which has long sought to remove the UN as the major humanitarian provider to Palestinians - argues the alternative system was needed to stop Hamas stealing aid. Hamas denies that, while the posture of the previous US administration of President Joe Biden was that if supplies were being diverted, it was not at any scale that possibly could justify blockading aid to Gaza. In March, Israel cut off all food and other aid supplies to Gaza as it resumed its war against Hamas following a two-month ceasefire. Israel said the step, which has been widely condemned, was taken to pressure Hamas into releasing the remaining hostages. The UN and aid groups demanded access, while international condemnation of Israel grew.

