title: 'Alex Belfield: BBC apologises to staff targeted by stalker - BBC News'
date: '2025-03-13'
section: Nottinghamshire
url: http://www.bbc.co.uk/news/articles/c743w89djqpo
content: |-
  The corporation says it did not do enough to understand the impact of Alex Belfield's behaviour.

  Ex-BBC presenter Alex Belfield was sent to prison in September 2022

  The BBC has given a "full and unreserved apology" for not doing enough to help staff who alleged relentless abuse by a stalker. Former BBC presenter Alex Belfield, from Nottingham, was jailed for five-and-a-half years in September 2022 after being convicted of four stalking charges against broadcasters including Channel 5 host and BBC Radio 2 DJ Jeremy Vine. On Wednesday, the BBC issued a statement saying it cared "deeply about the welfare of its staff". The corporation also said it had "strengthened [its] internal investigative capabilities".

  In a statement, the BBC said: "People who work for the BBC are often in the public eye and under scrutiny, however, it is unacceptable for anyone to be the target of sustained abuse in the way that Rozina Breen, Elizabeth Green, Stephanie Hirst and Helen Thomas were over a number of years." Following a trial at Nottingham Crown Court, Belfield was found not guilty of stalking charges in relation to the BBC's former head of north Ms Breen, ex-Radio Leeds presenters Ms Green and Ms Hirst, and the director of BBC England Ms Thomas. However, indefinite restraining orders were made by the judge banning Belfield from contacting the women. Mr Justice Saini said: "Each of them suffered a campaign of harassment by email and social media communications. Each of them suffered serious mental health problems arising from Mr Belfield's conduct."

  Belfield made videos throughout his trial and posted them on YouTube

  The BBC's statement went on to say: "The BBC cares deeply about the welfare of its staff and we recognise that before 2019 we simply didn't do enough for these members of staff in understanding the full impact that Alex Belfield's unacceptable behaviour had on them. "For that we are deeply sorry and offer a full and unreserved apology. "Abuse - particularly on social media - presents lots of challenges for employers and we all need to keep learning and implement the best practice on how we can support our staff. "That's why the BBC has an online abuse guidance and reporting tool, which today provides all staff with information and support on how to address and combat online abuse. "The BBC has also expanded its mental wellbeing resources and strengthened our internal investigative capabilities. "We are significantly better equipped to manage these issues now and in the future, but we will never be complacent."

  Belfield was sent to prison after a jury found him guilty of stalking BBC Radio Northampton presenter Bernard Spedding, known as Bernie Keith, and videographer Ben Hewis. In relation to Vine and theatre blogger Philip Dehany, Belfield was convicted of two lesser offences of "simple" stalking, which does not require serious alarm or distress to be proved. The trial heard Belfield, who ran his own YouTube channel with a large number of followers, targeted his victims over several years. Vine described the harassment as "like an avalanche of hatred you get hit by", and "absolutely Olympic-level stalking, even for broadcasting".

