title: 'London Marathon 2022: Race attracts 42,000 participants - BBC News'
date: '2022-10-02'
section: London
url: http://www.bbc.co.uk/news/uk-england-london-63102270
content: |-
  An estimated 42,000 people took part in the 26.2-mile London Marathon as large crowds watched.

  About 42,000 runners embarked on the 26.2-mile run from Greenwich to The Mall - some donning fancy dress costumes

  A Spiderman, Shrek and a red postbox featuring the King's new cypher were among the fancy dress costumes donned by some of the thousands who took part in the London Marathon this year.

  Whether as a personal challenge or for charity, runners wore colourful, large, and occasionally furry costumes as they ran the 26.2-mile (42km) course.

  More than 40,000 runners took on the race from Greenwich to The Mall.

  It is the third time the event is being held in October.

  A man took on the race wearing a bright red postbox featuring the King's new cypher

  The race moved from its traditional spring spot due to the coronavirus pandemic, but will return in April next year.

  The event, which is in its 42nd year, was started by Lionesses Leah Williamson, Ellen White and Jill Scott, from England's Women's Euro 2022 team.

  Runners in an array of colourful costumes are taking part in this year's race

  A runner dressed up as Shrek for the race

  Williamson sounded the buzzer for the wheelchair races to begin at about 08:50 BST, while White started the women's elite race at 09:00 and Scott pressed the buzzer to send the elite men and everyone else across the start line by 10:00.

  Among the famous faces who took part, were actors Cynthia Erivo and Stephen Mangan and reality TV star turned presenter Mark Wright, who was forced to drop out last year due to injury.

  TV star Mark Wright finished his first ever London Marathon

  Sir Mo Farah was due to run but had to pull out earlier in the week through injury.

  The runners were cheered on by thousands of people who lined the streets to offer water, food, or just shouts of encouragement.

