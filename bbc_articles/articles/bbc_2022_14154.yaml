  Costumes were not a deterrent for those determined to complete the race.

  The sun came out as participants ran past Big Ben

  This year's race is taking place in October for the third and final time, after it was moved in 2020 due to the Covid-19 pandemic

  The men's wheelchair title was retained by Switzerland's Marcel Hug in a course record time of one hour, 24 minutes and 38 seconds.

  He won a sprint finish against American Daniel Romanchuk with Britain's David Weir, in his 23rd London Marathon, coming home in third.

  An ice cream cone costume were also among the London Marathon participants as thousands descended on the streets of the capital

  The feeling as people cross the finish line is absolutely buzzing. These people have travelled 26.2 miles to get here.

  Some look great, while others look a little bit broken.

  We've also had a few records. I've just seen someone dressed as a pencil crossing the finish line, breaking a Guinness World Record.

  While some are on their way down The Mall to have a well-deserved break, some still have a while to go on the route. But spectators are giving them high fives and shouting out runners' names to give them that final push.

  Mayor of London Sadiq Khan said: "I want to applaud everyone running today. Having taken part myself in 2014, I know how incredibly challenging and rewarding it can be.

  "It's amazing to see tens of thousands of people taking to the streets of London to support good causes."

  England's David Weir was interviewed after finishing third in the men's wheelchair race

  There was no monkeying around for this runner...

  Catherine Debrunner made it a Swiss double with victory in the women's wheelchair race in one hour, 38 minutes and 24 seconds.

  Eden Rainbow-Cooper, 21, claimed another third place for Britain behind Susannah Scaroni of the USA.

  Ethiopia's Yalemzerf Yehualaw won the women's race in 2 hours, 17 minutes and 25 seconds, while Kenyan Amos Kipruto won the men's race in two hours, four minutes and 39 seconds.

  Further coverage of the race is on the Red Button and the BBC Sport website app.

