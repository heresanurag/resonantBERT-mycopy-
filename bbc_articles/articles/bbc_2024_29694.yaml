id: bbc_2024_29694
title: Emotions high as America reacts to Trump's victory - BBC News
date: '2024-11-06'
section: General
url: http://www.bbc.co.uk/news/resources/idt-8860256c-b28a-47e4-89ad-431472d6b85e
content: "Images of delight and despair as the country reflects on the results of\
  \ the presidential election.\n\nDonald Trump will be the next US president after\
  \ beating Kamala Harris by some distance to cap a stunning political comeback. \n\
  \nHe walked on stage at a rally in Florida in the early hours of Wednesday and gave\
  \ a speech to jubilant supporters while surrounded by his family and advisers.\n\
  \nThe polls had predicted a close race, but as the night went on the results showed\
  \ that Trump had a clear lead over Harris in the race to hit 270 electoral college\
  \ votes.\n\nThe mood had been hopeful at the Harris campaign's election night watch\
  \ party in Washington DC as the first results started to come in, with a big crowd\
  \ of supporters singing and dancing along to music.\n\nBut as the night went on\
  \ the celebratory mood evaporated and campaign co-chair Cedric Richmond appeared\
  \ to tell Harris supporters that the vice-president would not be appearing on stage.\n\
  \nThe crowds of Harris supporters disappeared soon after the announcement, leaving\
  \ rows of empty chairs and abandoned flags."
