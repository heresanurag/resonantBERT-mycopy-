content: |-
  Former Spanish Football Federation president Luis Rubiales is scheduled to appear in a Madrid court on Friday over his kiss of Spain's Jenni Hermoso.

  Last updated on .From the section Football

  Former Spanish Football Federation president Luis Rubiales is due to appear in court on Friday over kissing Spain forward Jenni Hermoso.

  Hermoso filed a legal complaint last week over Rubiales kissing her on the lips following her country's Women's World Cup final win on 20 August.

  Rubiales has been summoned by a high court judge to respond to accusations of sexual assault and coercion.

  He will appear before a magistrate in Madrid at 12:00 local time (11:00 BST).

  Hermoso, 33, said the kiss was not consensual, while Rubiales has claimed it was "mutual" and "consensual" and again defended his actions in an interview with Piers Morgan, which was aired on Tuesday on Talk TV.
  • None Rubiales resigns as president of Spanish FA over Hermoso kiss

  Rubiales quit as Spanish FA president on Sunday as a result of the controversy, and has also resigned from his position as vice-president of Uefa's executive committee.

  Hermoso's complaint was one of sexual assault but last week prosecutor Marta Durantez Gil added an allegation of coercion after the forward alleged that some of her relatives had been pressured by Rubiales and his "professional entourage" to say she "justified and approved what happened".

  On Monday, Judge Francisco de Jorge of the National Court accepted the complaint and assigned a magistrate to investigate the case.

  After completing an investigation, the magistrate will then either make a recommendation for the case to go to trial or be dismissed.

  Jorge also requested video footage of the incident from Spain's public broadcaster RTVE, plus videos of the team's celebrations published online by Spanish newspapers El Pais, AS and La Vanguardia, be submitted as evidence.

  The fallout from the kiss has engulfed Spanish football in recent weeks and overshadowed Spain's World Cup win, with Rubiales ignoring repeated calls to resign before eventually quitting on Sunday.

  The charge of sexual assault can carry a punishment ranging from a fine to four years in prison under Spanish law.

  "I have faith in the truth and I will do everything in my power so that it prevails," Rubiales wrote in an open letter on Sunday.

  Pachuca player Hermoso released a long statement on social media on 25 August saying the kiss was not "consensual".

  "I feel the need to report this incident because I believe no person, in any work, sports or social setting should be a victim of these types of non-consensual behaviours. I felt vulnerable and a victim of an impulsive-driven, sexist, out-of-place act, without any consent on my part," she continued.

  "Quite simply, I was not respected."

  Some 81 Spain players, including all 23 World Cup winners, said they would not play for the national team again while Rubiales was in his position.

  World Cup-winning manager Jorge Vilda - considered a close ally of Rubiales - was sacked on 5 September, with Montse Tome named as his successor.

  Tome is scheduled to name her squad on Friday for her first game in charge, which is against Sweden on 22 September.

  Rubiales has previously apologised for the kiss but said there was "no harm, no sexual content, no aggression, nothing like that".

  However, he refused to directly apologise to Hermoso when asked if he would do so by Morgan.

  "What happened is bad for everyone," said Rubiales.

  "We had Jenni lifting me. We had the fleeting kiss, two tenths of a second, but what was created from that is crazy.

  "So what's left for me is to defend my dignity. So it's not about that [the apology] Piers, it's about humility."

  Asked again if he wished to apologise, Rubiales continued: "So what we had is a spontaneous act, a mutual act, an act that both consented to, which was driven by the emotion of the moment, the happiness, so I maintain that that is the truth of what happened."
