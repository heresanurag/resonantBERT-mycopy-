title: Huge potholes in Cambridge filmed by cyclist - BBC News
date: '2025-02-27'
section: General
url: http://www.bbc.co.uk/news/videos/c2d43wzz2ryo
content: |-
  He warns there could be "a very serious accident" unless the potholed road near a hospital is fixed.

  A cyclist filmed a long stretch of badly potholed road and warned there would be "a very serious accident soon" unless it was repaired.

  Simon Mackinder captured the footage on Granham's Road near Cambridge, which he described as an "absolutely important" route close to Addenbrooke's Hospital and linking a number of villages to the city.

  "Absolutely the worst I have ever seen," he said.

  Cambridgeshire county councillor Alex Beckett said the road should be repaired within a week and blamed decades of underinvestment in road resurfacing.

  "I'm really pleased to see the current administration has increased the amount we're spending on highways maintenance but those 15 to 20 years of managed decline have left them in a really bad state," he said.
