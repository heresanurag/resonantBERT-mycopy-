title: I was scammed by a fake Kevin Costner, says Suffolk woman - BBC News
date: '2024-07-08'
section: Suffolk
url: http://www.bbc.co.uk/news/articles/c3grw7l19v2o
content: |-
  Eileen Leeks, 63, is speaking out in a bid to warn other fans of the Hollywood star.

  ‘I was scammed out of £200 by a fake Kevin Costner'

  A woman said she "lost a lot of money" after being preyed on by fraudsters who posed as a legendary Hollywood star and his management team. Eileen Leeks, 63, who lives in Felixstowe, Suffolk, said she had been a huge fan of Yellowstone actor Kevin Costner for the last two years. A few months ago, she started following a Facebook page which she believed belonged to the 69-year-old Oscar winner. She said she was then inundated with messages telling her that to become an official fan she would need to purchase a £100 voucher. Ms Leeks was told that by doing so, she would get the chance to meet the actor in person.

  Eileen Leeks, 63, was targeted by con artists posing as actor Kevin Costner

  "I was getting nagged and then I gave in because they were saying you won’t meet him unless you get the Apple cards, so I bought two at £100 each,” she said. "I then got a message back saying I had been scammed and [in order to actually meet Costner] I would have to buy a VIP membership card for over £1,000.

  The con then took another bizarre turn when Ms Leeks received a video call from someone who she initially believed was Costner. She said: "His face was moving and that’s why I thought it was really him. He was sitting in a chair in his office and he was moving. "He said, ‘This is Kevin Costner and you have been scammed’. "His ‘management team’ then got hold of me and said it’s not him and people were using his face and voice to scam people." After reporting the scam, Ms Leeks said she was contacted on a private messaging service by the scammers again, promising her a job and an apartment in America. “I thought, ‘I don’t believe this, what on earth is going on?’" she said. "If fans think they are going to get a job in America and an apartment and they get all the way over there then they will lose an awful lot. "I am unemployed and I’ve lost a lot of money, so I am not very happy." The BBC has contacted representatives for Mr Costner.
