title: Two more giant tortoises found dead in woodland near Exeter - BBC News
date: '2024-02-08'
section: Devon
url: http://www.bbc.co.uk/news/uk-england-devon-68244399
content: |-
  The two new discoveries make a total of nine giant tortoises found in a Devon forest, say police.

  The tortoises were found dead in Ashclyst Forest in Devon

  Two more dead tortoises have been found by police investigating the deaths of several giant tortoises in woodland.

  The two new discoveries make a total of nine giant tortoises found in Ashclyst Forest, north of Exeter, say police.

  The Devon and Cornwall force also said a man in his 50s had been interviewed over suspected animal welfare offences.

  Post-mortems are still to be carried out to establish the cause of death of the tortoises as the investigation continues, said officers.

  Police said the dead animals were thought to be Aldabra giant tortoises

  Two of the tortoises were found on National Trust land on 8 January, and another five were found later nearby, officers said at the time.

  On Thursday police said: "Two further bodies were located in the same area as part of the ongoing enquiries.

  "Devon and Cornwall Police has been working with the National Wildlife Crime Unit and the RSPCA to progress this investigation."

  The force said a man in his 50s from the Exeter area attended a voluntary police interview in relation to suspected offences under the Animal Welfare Act 2006.

  The National Trust said dead tortoises were left at the entrance to Ashclyst Forest

  Police said the dead animals were thought to be Aldabra giant tortoises.

  Insp Mark Arthurs said: "We are grateful for the public support in response to our appeal and have been working through the information we have received.

  "We have been working closely with specialists, including the RSPCA and our colleagues from the National Wildlife Crime Unit.

