title: Danone denies 'safety issues' with new Aptamil milk formula - BBC News
date: '2018-07-10'
section: Business
url: http://www.bbc.co.uk/news/business-44780798
content: |-
  The firm says parents' concerns over the new formulation are unfounded.

  Rose Menzies' baby Harry did not like the new formula

  Danone, which makes Aptamil baby milk, says there are "no safety issues" with the new formulation of its product, despite concern from some customers.

  Parents have taken to social media to complain that the new formula is causing their infants to be sick.

  Danone UK admitted the new product doesn't dissolve as easily as the original.

  With hindsight it could have done more to make parents aware of alterations to mixing instructions, the firm said.

  Danone says it is listening to parents' concerns and will provide further information and support, but it defended the new formula which it says provides additional nutrients that support the good functioning of the gut.

  Parents told the BBC that their babies experienced upset stomachs after they started using the new recipe Aptamil.

  They said the milk powder did not dissolve in the bottles, leaving clumps of residue. One mother, Rosie Menzies, told the BBC her son was sick after feeds and began to refuse bottles until she switched brands.

