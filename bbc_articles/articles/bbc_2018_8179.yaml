  Danone said babies sometimes take time to adapt to new foods, which could cause temporary changes to their digestive patterns, but that the product had passed extensive clinical trials and product testing.

  "We have had good mixing results when the product is mixed in line with instructions," the firm said. The new formula needs to be shaken vigorously for at least ten seconds for the powder to dissolve properly, it said.

  "We acknowledge that with hindsight we could have made the changes to the mixing instructions clearer and we will take action on this, particularly across our consumer and social media channels," the firm added.

  The new formula underwent a different manufacturing process in order to include different nutrients, the firm said. That process reduced its solubility.

  Aptamil has changed the recipes of three products: Aptamil First Infant Milk powder (stage 1), Aptamil Follow On Milk powder (stage 2) and Aptamil Growing Up Milk powders (stages 3 & 4).

  Danone has established a helpline for parents who are concerned.

  Parents in the UK are advised to call 0800 996 1000, pressing option 0 followed by option 1.
