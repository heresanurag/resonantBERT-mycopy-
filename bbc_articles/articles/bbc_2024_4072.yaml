  Last updated on .From the section Women's Football

  Holders Chelsea will face Manchester United - a repeat of last season's final - in the Women's FA Cup semi-finals.

  Tottenham and Leicester, both in the last four for the first time, will meet in the other semi.

  Chelsea, who beat Manchester United 1-0 in last May's final, are going for a quadruple in Emma Hayes' final season as their boss.

  Both matches will be shown live on the BBC on 13 April and 14 April.

  Wembley Stadium will host the final on Sunday, 12 May.
