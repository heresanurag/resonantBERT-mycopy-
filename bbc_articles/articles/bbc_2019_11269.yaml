title: Boris Johnson to meet Irish Prime Minister Leo Varadkar - BBC News
date: '2019-09-09'
section: General
url: http://www.bbc.co.uk/news/uk-northern-ireland-49571577
content: |-
  Prime Minister Boris Johnson has confirmed he will visit Dublin on Monday to meet taoiseach Leo Varadkar.

  Mr Johnson is facing a showdown in Westminster as MPs aim to stop a no-deal Brexit.
