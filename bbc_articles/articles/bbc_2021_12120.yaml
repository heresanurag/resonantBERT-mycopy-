title: 'Clacton stabbing: Police arrest eight people in murder probe - BBC News'
date: '2021-09-12'
section: Essex
url: http://www.bbc.co.uk/news/uk-england-essex-58535593
content: |-
  A 21-year-old man died in hospital after suffering a fatal wound, police say.

  Police have cordoned off several roads in Clacton town centre while they carry out their investigation into the fatal stabbing of the 21-year-old man

  Eight people have been arrested as part of a murder investigation into the stabbing of a 21-year-old man.

  The victim was found with a single stab wound in Rosemary Road, Clacton-on-Sea, Essex, just after midnight on Sunday.

  He was treated at the scene, but later died in hospital.

  Five people were arrested within hours on suspicion of murder, with another two arrested later. A woman has been arrested on suspicion of assisting an offender.

  Police tweeted that they had been called to reports of a fight.

  Those arrested on suspicion of murder were:

  The woman arrested of suspicion of assisting an offender was 20 years old. All the suspects were from Clacton and remained in custody.

  The victim was treated at the scene by paramedic but died in hospital, police said

  Several roads in the town centre, including parts of the High Street, were sealed off while officers carried out inquiries, but reopened later.

  Essex Police said uniformed officers were guarding the scene and helping to carry out patrols

  Ch Insp Colin Cox, from Essex Police, said: "People will rightly be concerned by what has happened and I completely understand that.

  "But I want to reassure people that we will continue to work around the clock to deliver justice."

  He said the on-going road closures had allowed officers to "secure vital evidence".

  "We know the community understands how vital it is... we need to ensure justice for the young man who has lost his life," said Ch Insp Cox.

  "Our thoughts remain with the victim and his relatives at this extremely difficult time."

  He urged anyone with information anyone with information or video footage from CCTVs, dashcams or doorbells to contact the inquiry.

  Forensics officers have been searching the scene

