content: |-
  Designer Jonathan Anderson is the first person to head both the men's and women's collections at the French fashion house.

  Jonathan Anderson and actress Cate Blanchett attended a Vogue runway show in London in November

  Northern Ireland-born fashion designer Jonathan Anderson has announced he is to take on the role of creative director of both women's and men's collections at Dior. In April, Anderson confirmed he was to become the artistic director of the luxury French fashion house menswear, one month after stepping back as creative director at Loewe after more than 10 years in the job. He becomes the first designer to head both the women's and men's lines at the well-known brand. The 40-year-old, who was born in Magherafelt in County Londonderry, said it was a "great honour" to take on the role.

  "I have always been inspired by the rich history of this House, its depth, and empathy," he said in an Instagram post on Monday. "I look forward to working alongside its legendary Ateliers to craft the next chapter of this incredible story."

  Jonathan Anderson and singer/songwriter Charli XCX backstage after the designer's fashion show during London Fashion Week in 2020

  Anderson is to take on the womenswear collection after its artistic director, Maria Grazia Chiuri, announced her departure after almost a decade in the job last week. In January, British designer Kim Jones stepped down as artistic director for Dior's menswear. Anderson's move to Dior is part of a major reshuffling of jobs at global fashion brands following some resignations and forced departures. He is set to debut his first collection, Dior Men Summer 2026, during Paris Fashion Week on 27 June.

