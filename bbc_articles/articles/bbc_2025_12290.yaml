  Bernard Arnault, chair of luxury conglomerate Louis Vuitton Moët Hennessy (LVHM) and Dior's parent company, described Anderson as "one of the greatest creative talents of his generation". "His incomparable artistic signature will be a crucial asset in writing the next chapter of the history of the House of Dior."

  Ariana Grande's 2024 Met Gala look was designed by Anderson, who was the event's honorary chair

  Dior's chairperson, Delphine Arnault, said she is "delighted" that Anderson's creativity will be brought to life at the House. "I have followed his career with great interest since he joined the LVMH group over 10 years ago," she said in a statement. "I am convinced he will bring a creative and modern vision to our House, inspired by the fabulous story of Monsieur Dior and the codes he created."

  Anderson is known for his innovative styles and gender-fluid designs, and has created some iconic and recognisable looks throughout his career. In 2023, he crafted Rihanna's Super Bowl half-time performance outfit, which she used to announce her pregnancy and Ariana Grande's 2024 Met Gala gown. Anderson trained at the London College of Fashion, before beginning his career in Prada's marketing department. He launched his eponymous brand JW Anderson in 2008, before being appointed as the creative director at Loewe - a Spanish leather goods brand founded in 1846 - in 2013.

  Anderson posted the pattern for a cardigan worn by Harry Styles during a 2020 performance online, inspiring people to craft their own

  One of his designs, a colourful patchwork crochet cardigan worn by singer Harry Styles, external which inspired a viral TikTok trend amongst fans during the Covid-19 pandemic, was added to London's Victoria and Albert Museum fashion collection earlier this year. Anderson has won a number of high-profile awards, including Designer of the Year at the 2024 Fashion Awards in December for the second year in a row. He is also the son of former Ireland rugby captain, Willie Anderson.
