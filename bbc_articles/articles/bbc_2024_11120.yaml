content: |-
  Pilot Sqn Ldr Mark Long died when the Spitfire he was flying crashed in Lincolnshire.

  No D-Day flights for WW2 planes after fatal crash

  Sqn Ldr Mark Long died when the Spitfire he was flying crashed in Lincolnshire

  The RAF’s Battle of Britain Memorial Flight (BBMF) will not take part in D-Day anniversary events following the death of a pilot in a crash, the BBC understands. Sqn Ldr Mark Long was killed when the Spitfire he was flying crashed in a field in Lincolnshire shortly before 13:20 BST on Saturday. The remaining aircraft of the BBMF remain temporarily grounded while investigations continue. The cause of the crash is not yet known but the Defence Accident Investigation Branch has been examining the site and wreckage.

  The Battle of Britain Memorial Flight planes are a popular sight at summer shows

  An RAF A400 and Typhoon will still participate in the national commemorative event in Portsmouth on 5 June, but none of the other aircraft, which make up the Battle of Britain Memorial flight, will take part, the BBC has been told. Sqn Ldr Long was flying the spitfire to take part in a display when the aircraft crashed at RAF Coningsby. It is understood he issued a Mayday call soon after take off and the spitfire was seen turning just before it plunged toward the ground. Tributes have been paid to the "incredible" RAF pilot, who had spent four years flying with the BBMF. His family described how he "lived his life with an unwavering passion with laughter, love and dedication". His colleagues said he was the "epitome of a military fighter pilot, he personified the very best of the Royal Air Force and the Battle of Britain Memorial Flight". The death of Sqn Ldr Long was the BBMF’s first loss of life in 67 years.
