  A woman says Thomas Plimmer became aggressive during sex and later sent her obscene photos.

  Woman says struck-off sex GP tried to 'choke' her

  Thomas Plimmer was struck off after having sex with multiple women at his GP surgery

  Warning: This article contains text of a sexual nature

  A woman says a GP who was struck off for having sex with multiple women at his surgery attempted to choke her during sex. The woman, who does not want to be named, met Thomas Plimmer on a dating app in 2017. She claimed that when they were having sex at her home on a second date, he "started squeezing my throat" without her consent. Mr Plimmer said that under legal advice he was unable to comment due to his ongoing appeal against being struck off.

  During a Medical Practitioners Tribunal Service (MPTS) hearing, the former GP admitted sending explicit content to colleagues, having sex during working hours and behaving inappropriately around women. The tribunal made the decision about Mr Plimmer - who worked in Swindon - after several women complained to the General Medical Council (GMC) and Great Western Hospital NHS Foundation Trust. Documents from the hearing in 2023 show he faced allegations from several women between May 2018 and February 2021 and was described by the GMC as an "accomplished liar" when it came to the women. Despite being struck-off, Mr Plimmer still advised a private therapy patient to buy prescription-only sleeping tablets. During a consultation, secretly recorded by BBC West, he also failed to make clear he was no longer on the medical register.

  The woman, who spoke to our correspondent Matthew Hill, said Thomas Plimmer took indecent photos of her without consent

  Speaking exclusively to the BBC, the woman said that on their second date at her home she had opened the door and "he came in and he pushed me up against the wall and had his hand on my throat". "I was a little concerned as we had not had any discussion about that and he was kissing me quite forcefully as well," she said. "I did make it known that was not of any interest to me and he did apologise so I allowed him to stay in my house as he did seem genuinely remorseful."

  But later when they were having sex, she said: "He was behind me and grabbed hold of my throat and started squeezing my throat, which again was not something that had been discussed or that I was comfortable with. "So I was trying to dig my hand behind his hand and he did let go." She added: "I was worried he was going to cut off my airway. I was kind of held, literally held with one hand on the whole of my throat from behind and obviously that is not a very comfortable angle, it is not something we had discussed." If you have been affected by this story, help can be found at BBC Action Line. She also claimed Mr Plimmer sent her pictures and videos of him having sex with more than one woman. She said: "About six of them [the images] were completely out of my comfort zone and I was quite shocked and disgusted to be perfectly honest. So I ended up blocking him."

  The woman said she was concerned she may have been filmed because of seeing Mr Plimmer with his phone during intimate moments. She said she had complained to his medical practice in Swindon. The woman then looked Mr Plimmer up online and discovered he had written an article about being a self-confessed sex addict.

  In the MPTS hearing, Dr Plimmer admitted having sex with other colleagues during working hours and sending unsolicited intimate pictures - taken at work - to another woman. It was proven that Mr Plimmer had threatened one of the women, telling another that if one "takes me to the GMC, I’ll slit her throat. I know where she lives." In 2018, the tribunal found he had walked into the office of a colleague - known as Miss A - and unexpectedly showed her a video of him having sex with another woman. It also found he had placed her hand on his groin without her consent after he told her: "I have something that would cheer you up." Mr Plimmer has declined to comment on the woman's allegations. He says this is because of his forthcoming appeal against being struck off by the GMC.

