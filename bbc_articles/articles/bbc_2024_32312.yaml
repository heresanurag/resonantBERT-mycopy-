title: Bitcoin crosses $100k as Trump crypto boost continues - BBC News
date: '2024-12-05'
section: Technology
url: http://www.bbc.co.uk/news/articles/cqj0wkwv1x2o
content: |-
  Its record price is making headlines - but that's just one part of the cryptocurrency's tumultuous story.

  The price of Bitcoin has for the first time broken past the $100,000 mark, hitting a new record high. The value of the world's biggest cryptocurrency has been boosted by hopes US President-elect Donald Trump will adopt crypto-friendly policies. The milestone was reached hours after Trump said he would nominate former Securities and Exchange Commission (SEC) commissioner Paul Atkins to run the Wall Street regulator. Mr Atkins is seen as being far more pro-cryptocurrency than the current head of the SEC, Gary Gensler.

  The $100,000 milestone prompted celebrations from cryptocurrency fans around the world. Bitcoin's wildly fluctuating value has always attracted interest, with its backers reacting with delight when it has passed previous price thresholds - and defiance during its slumps. But this particular landmark has been especially keenly anticipated. For weeks charts, memes and predictions have swirled around social media about when the price would hit the figure thought to be one of the holy grails of the crypto world. Millions of viewers even tuned in to online watch parties as the price hovered close to $100k. The value of a single bitcoin is one of the barometers of optimism in the cryptocurrency industry which is now estimated to be worth $3.3tn, according to analysis firm Coin Market Cap. Trump's election victory last month was the catalyst for the latest surge. The president-elect has vowed to make the US "the crypto capital of the planet" - a remarkable turnaround given as recently as 2021 he was calling Bitcoin a "scam." Also remarkable is just how Bitcoin's price has rocketed. A valuation of $100k represents a 40% increase on election day in the U.S. and more than double the price it started the year at.

  But there's lots more to Bitcoin than the dizzying changes in its value. From its enigmatic inventor to the bringing down of the so-called Crypto King, it's a story with many twists and turns, which has seen the making - and losing - of huge fortunes. So here's the BBC's list of the seven wildest moments - so far - in Bitcoin's tumultuous history.

  Despite its enormous profile, no-one actually knows for sure who invented Bitcoin. The idea for it was posted on internet forums in 2008 by someone calling themselves Satoshi Nakamoto. They explained how a peer-to-peer digital cash system could work to enable people to send virtual coins over the internet, just as easily as sending an email. Satoshi created a complex computer system that would process transactions and create new coins using a huge network of self-appointed volunteers around the world who used special software and powerful computers. But he - or they - never revealed their identity, and the world has never worked it out.

  Dorian Nakamoto was wrongly accused of being Bitcoin's inventor

  In 2014, Japanese-American man Dorian Nakamoto was pursued by reporters who thought he was the elusive Bitcoin creator, but it proved to be a false lead caused by some mistranslated information. Australian computer scientist Craig Wright said it was him in 2016 - but after years of legal battles, a High Court judge concluded he was not Satoshi. Earlier this year, a Canadian Bitcoin expert called Peter Todd strongly denied being Satoshi, while in London this month a British man, Stephen Mollah, claimed he was - but no-one believed him.

  Bitcoin now underpins a two trillion-dollar cryptocurrency industry - but the first recorded transaction using it was the purchase of pizza. On 22 May 2010, Lazlo Hanyecz, offered $41 worth of Bitcoin on a crypto forum in return for two pizzas. A 19-year-old student obliged and the day went down in history for fans of the currency as #BitcoinPizza day. A source of memes for those in crypto community, it also showcased the power of Bitcoin - an internet money that could genuinely buy items online. Criminals must have been watching too, because within a year the first darknet marketplace was launched selling drugs and other illegal goods in exchange for Bitcoin. The deal looks pretty bad for Lazlo now too. If he had held onto those coins they would now be worth hundreds of millions of dollars!

  Hairdressers, supermarkets and other shops had to accept Bitcoin by law, alongside its main currency, the US dollar. Many Bitcoin enthusiasts and reporters visited the area, briefly boosting tourism to the country. While President Bukele hoped the move would increase investment in his country and cut costs for citizens exchanging money, it did not become as popular as he hoped. He is still hoping it will take off but for now the US dollar still remains king in the country.

  President Nayib Bukele plans to build a city called Bitcoin City, as he pushes his nation to use the digital currency

  As well as the huge amount of public money President Bukele spent on trying to make people embrace Bitcoin he also, controversially, bought more than 6,000 bitcoins over the past few years. The president spent at least $120m buying up bitcoins at various prices in the hope of making a profit for his cash-strapped country. It started to look good for him in December 2023 when, for the first time, his stash skyrocketed in value. A website built by Dutch software engineer Elias Zerrouq is tracking the country's Bitcoin, external holdings and currently estimates that the coins have risen 98% in value.

  In 2021, Kazakhstan became a hotspot for Bitcoin mining - the process of crunching through the complex calculations that underpin crypto transactions. These days it takes warehouses full of the latest computers running all day and all night, but the reward is brand new bitcoins for those companies that take part.

  BBC reporter Joe Tidy visited one of Kazakhstan's giant bitcoin mines during the boom

  Warehouses of computers require lots of power - and many businesses moved to Kazakhstan where electricity was abundant thanks to huge coal reserves. At first the government welcomed them with open arms as they brought investment. But too many miners arrived and put huge strain on the electricity grid, putting the country at risk of blackouts. Within a year, Kazakhstan's Bitcoin mining industry went from boom to bust as the government imposed restrictions and increased taxes to curb the growth. Around the world it is estimated that the Bitcoin network uses as much electricity as a small country, raising concerns about its environmental impact.

  Imagine having a crypto wallet worth more than $100m (£78m) - and then accidentally throwing away a hard drive containing the login details. That's what James Howells, from south Wales, says happened to him The very nature of crypto means that recovery is not as easy as resetting your password. With no banks involved - there is no customer support helpline.

  James Howells said he wants to donate a quarter of the money to the people of Newport

  Unfortunately for him, his local council in Newport refused to let him access the landfill site where he says the device ended up - even after he offered to donate 25% of his Bitcoin stash to local charities if they let him. He told the BBC: "It was a penny dropping moment and it was a sinking feeling."

  No-one has lost as much Bitcoin as former billionaire crypto mogul, Sam Bankman-Fried. The founder of the massive crypto firm FTX was nicknamed the Crypto King and loved by the community. FTX was a cryptocurrency exchange that allowed people to trade normal money for cryptocurrencies like Bitcoin.

  His empire was worth an estimated $32bn and he was flying high until everything came crashing down within days. Journalists had discovered that Bankman-Fried's company was financially shaky and had been illegally transferring FTX customer funds to prop up his other company, Alameda Research. Just before his arrest at his luxury apartment complex in the Bahamas in December 2022 he spoke to reporters. He told the BBC: "I don't think I committed fraud. I didn't want any of this to happen. I was certainly not nearly as competent as I thought I was." After being extradited to the US he was found guilty of fraud and money laundering and was jailed for 25 years.

  Despite all the turmoil, Bitcoin continues to attract attention from investors and big companies. In fact, in January 2024, some of the biggest financial firms in the world added Bitcoin to their official asset lists as Spot Bitcoin ETFs. These are like stocks and shares, linked to the value of Bitcoin but you don't have to personally own any. Customers have been pouring billions into these brand new products. Companies including Blackrock, Fidelity and GrayScale, have also been buying up Bitcoins in their thousands, pushing up its value to record highs. It is a huge milestone for crypto with some fans believing that Bitcoin is finally being taken as seriously as the mysterious Satoshi imagined. Nonetheless, few would back against more wild moments as the Bitcoin story continues to unfold.

  From record-breaking NFT sales to pizza purchases using Bitcoin: Nine key crypto moments.
