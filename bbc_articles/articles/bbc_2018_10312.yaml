content: |-
  The team's Amy Conroy explains why she loves the sport, as the World Championships start in Hamburg.

  The Wheelchair Basketball World Championships start in Hamburg on Thursday.

  GB forward Amy Conroy tells Newsbeat how she loves the physicality of the sport and why it's so refreshing that everyone is equal on the court.

