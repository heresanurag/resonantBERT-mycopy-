title: 'Fifa World Cup 2026: Donald Trump says co-host tensions will make tournament
  ''more exciting'' - BBC Sport'
date: '2025-03-08'
section: World Cup
url: http://www.bbc.co.uk/sport/football/articles/c36wk4djzego
content: |-
  Donald Trump says the tensions between the United States and its 2026 World Cup co-hosts Canada and Mexico will make the tournament "more exciting".

  This video can not be played To play this video you need to enable JavaScript in your browser. Watch: Trump says tariffs tension will make World Cup 'more exciting'

  US President Donald Trump says the political and economic tensions between the United States and its 2026 World Cup co-hosts Canada and Mexico will be good for the tournament. Trump has imposed tariffs - taxes charged on goods imported from other countries - on the United States' two neighbours. Asked how he saw the World Cup playing out, given the current trade situation between the three nations, Trump said: "I think it's going to make it more exciting. "Tension's a good thing, I think it makes it much more exciting."

  At the start of the week, Trump confirmed that he was moving forward with 25% tariffs on goods imported from Mexico and Canada. In the days that followed, the Trump administration announced that it would be temporarily sparing carmakers from the import levies. The next day, the president signed an executive order that placed a number of other exemptions on various goods.

  Trump was speaking alongside Fifa president Gianni Infantino at the signing of an executive order to establish a taskforce that will oversee preparations for the tournament. Trump will chair the task force, which will "co-ordinate with federal agencies in planning, organising and executing" the tournament. Forty-eight teams will compete in the expanded World Cup in 2026. Eleven of the 16 host cities are in the United States, with Toronto and Vancouver in Canada also set to stage matches, as will Guadalajara, Mexico City and Monterrey in Mexico. Azteca Stadium in Mexico City will host the opening match on 11 June with the final being played at MetLife Stadium in New Jersey on 19 July. The United States will also host the 2025 Club World Cup in June and July.
