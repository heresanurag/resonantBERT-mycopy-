title: President Joe Biden tours his Irish family heritage - BBC News
date: '2023-04-13'
section: General
url: http://www.bbc.co.uk/news/world-europe-65259132
content: |-
  The US President has been welcomed to the Republic of Ireland, where he's been exploring his ancestral ties.

  US President Joe Biden has been welcomed to the Republic of Ireland for a three-day visit, and he's been exploring his ancestral ties.

  The BBC's Charlotte Gallagher looks back at President Biden's first day in the Irish Republic, where he was welcomed in Dublin by the Taoiseach (Irish prime minister).
