content: |-
  A friend of Mr Evans accused the British Transport Police of failing to support the family.

  Apology issued to family of man killed in train crash

  David Tudor Evans, 66, was travelling on a westbound train when it crashed in mid-Wales last month

  A police force has apologised to the family of a man who died when two trains crashed in mid Wales last month. David Tudor Evans, 66, was travelling on a train from Shrewsbury to Aberystwyth when it crashed into a stationary train on 21 October near Llanbrynmair, Powys. A close family friend accused the British Transport Police (BTP) - who are investigating the incident - of failing to support his family. The BTP has issued an apology to the family, saying a "miscommunication" was issued shortly after the crash.

  The family friend told PA news agency that Rachel Evans, Mr Evans' wife, was "pretty much left to her own devices" after the crash, adding that "support wasn't adequately provided at the time". The force issued a statement on 22 October, saying "the deceased's next of kin have been informed and his family are being supported by specialist officers". But a specialist officer from the BTP visited the family on 23 October, PA reported. The friend added that the family also objected to media reports suggesting the cause of death. "Currently, news outlets are putting out that the cause of death was not related to the collision without any evidence," he said. They added that at the opening of the inquest the cause of death was still indeterminate. "We would like to apologise for a miscommunication issued shortly after the train collision which took place on Monday 21 October in Llanbrynmair," he said. "British Transport Police has apologised directly to the family of the deceased in relation to this statement and would like to apologise publicly for any additional suffering caused at this extremely difficult time." Louisa Corcoran, assistant coroner for Ceredigion, opened an inquest into Mr Evans death in Aberystwyth on Wednesday. She said a post-mortem examination is in progress and adjourned the inquest while the police investigation was ongoing. Four other people suffered serious injuries during the incident, and a further 11 sustained injuries requiring hospital treatment.
