title: Moment three Israeli hostages handed to Red Cross in Gaza - BBC News
date: '2025-02-08'
section: General
url: http://www.bbc.co.uk/news/videos/c20gygjjxlko
content: |-
  The men were all taken captive during the 7 October attacks and have been held in Gaza for 16 months.

  Three more Israeli hostages have been released by Hamas and handed to the Red Cross, during highly-choreographed scenes in Gaza's Deir al-Balah area.

  Eli Sharabi, Ohad ben Ami and Or Levy were all taken captive during the 7 October attacks and have been held in Gaza for 16 months.

  In exchange, Israel has begun to release some 180 Palestinian prisoners held in Israeli jails.

  The releases are taking place as part of a ceasefire deal between Israel and Hamas which came into force on 19 January.

  You can follow live updates on this story.
