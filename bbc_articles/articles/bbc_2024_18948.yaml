  Also jailed on Friday was Roger Haywood, 41, who was described as a "leader and instigator" of rioting in Blackpool. Haywood pleaded guilty to violent disorder and two offences of assaulting an emergency worker and was jailed for two-and-a-half years at Preston Crown Court. Lancashire Police said Haywood hurled abuse at police officers and attacked a member of the Hounds Hill shopping centre security team after attempting to break through the shutters of a closed store. Judge Robert Altham said Haywood had beckoned the Blackpool rioters to breach police lines, and that that his drunkenness on the day was an "aggravating feature". Haywood was later seen visibly "too intoxicated" to work out how to use a loudhailer to speak to the crowds, the judge added.

  This video can not be played To play this video you need to enable JavaScript in your browser. Watch the moment Roger Haywood is arrested in Blackpool

  Paul Williams, 45, was jailed for two years and two months on Friday after pleading guilty to one count of violent disorder in connection with the Sunderland riots. The court heard he had entered the city centre to collect a takeaway, but ended up at the "forefront" of an "orgy of mindless destruction, violence and disorder". His defence lawyer said he had no political opinions around immigration and was "entirely unaware of the basis of what started this". Newcastle Crown Court heard Williams threw metal fencing and a can of beer at police, stripped off his shirt and ran at the line of riot shields. Meanwhile, Stevie Mulryne, 29, was jailed for 16 months and Charles Smith, 22, was sentenced to 23 weeks for their roles in disorder near Downing Street on 31 July. Westminster Magistrates Court heard that Mulryne made a stabbing gesture towards police and led offensive chanting, while Smith "struck up a fighting stance" and chanted "scum" at officers.

  The first adult to be charged with riot, a more serious offence carrying a maximum penalty of 10 years in prison, has appeared in court. Kieran Usher, 32, did not enter a plea at South Tyneside Magistrates' Court after being charged in connection with disorder in Sunderland city centre on 2 August. On Thursday, a 15-year-old boy became the first person in England to be charged with riot over his role in the Sunderland unrest. Meanwhile, Ashkan Kareem, 33, has been jailed for 12 months after participating in a clash in Darlington on 5 August. Kareem said he was trying to protect a mosque from being attacked by "racists". The presiding judge said Kareem was part of a group which gathered in opposition to men "chanting racist and far-right slogans", but it was "abundantly clear that would result in violence and it did". Further sentences for offences of violent disorder were handed out in Bristol, Sheffield, Sunderland, Blackpool, Liverpool and Plymouth on Friday.
