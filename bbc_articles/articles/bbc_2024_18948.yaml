content: |-
  Two men, including one seen looting Lush, are jailed over "12 hours of racist, hate-fuelled mob violence".

  Men in 'baying mob' get toughest riot sentences yet

  Two men have received the longest prison sentences yet in relation to rioting that erupted in parts of England and Northern Ireland after the Southport stabbings. David Wilkinson, 48, who was jailed for six years, and John Honey were part of a "baying mob" who attacked a car containing three Romanian men in Hull on 3 August. Honey, 25, also looted shops including the cosmetic store Lush, and received a sentence of four years and eight months. More than 1,000 people have been arrested so far over the disorder, with some 480 charged and at least 99 sentences handed down as cases continue to be brought to court.

  Spotting the car as they marched down the street in Hull, a "baying mob" surrounded it and began to attack, attempting to drag the men from inside. Hull Crown Court heard how Honey pulled the passenger door open as the man inside tried to close it to protect himself, while Wilkinson was seen damaging the windscreen of the car, which was left with £1,500 of damage. The men, in fear of their lives, eventually left the car with their hands raised, before fleeing to a nearby hotel, the court was told. Passing sentence, Judge John Thackray KC said the scenes on 3 August were "12 hours of racist, hate-fuelled mob violence". He said both Wilkinson and Honey had intended to create a high risk of injury, and that watching footage of the riots had been “depressing” and “horrifying".

  Wilkinson also took part in an attack on a garage in which nine cars were damaged. He tried to set fire to a bin on top of a pile of tyres that were already alight, sending plumes of black smoke through the shutters of the workshop where people were sheltering. Wilkinson pleaded guilty to taking part in violent disorder, racially/religiously aggravated criminal damage and attempted arson. Honey, who also took part in the garage attack, pleaded guilty to violent disorder, racially aggravated criminal damage and three charges of burglary at Lush, an O2 store and Shoezone. His behaviour during the unrest was "appalling, shameless and violent,” Michael Quinn, deputy chief crown prosecutor of CPS Yorkshire and Humberside, said.

