content: |-
  Joel Fearon talks about anxiety and insomnia and how he is moving forwards after his sister's death.

  I was scared of everything after sister's murder - Olympian

  Joel Fearon says the death of his sister Natasha Morais had a significant impact on his mental health

  "For the first time in my life I found myself with no energy. I was scared of everything." Olympian Joel Fearon's sister was murdered in June last year. Natasha Morais had been tortured before she was killed and the impact on the sportsman was immense. It led to the bronze-medal winner retiring from his bobsleigh sport as he found himself gripped by anxiety and insomina. Now, as he starts to make a return to sport by training sprint athletes, he and his family want to honour his sister's memory by working with charities which support vulnerable women.

  Natasha Morais was very open and liked to help other people, her brother said

  Fearon, from Coventry, was one of the fastest sprinters in Great Britain. He had a personal best of 9.96secs in the 100m and later switched to bobsleigh, being awarded a retrospective Olympic bronze from Sochi 2014 after a team was stripped of a medal for doping. In 2019 he raced for Switzerland and got a third-place finish at the Europe Cup in Konigssee, Germany. He had been at the top of the sport for 10 years when he decided to call time on it. "I just couldn't be the person I was, everything became hard, I started having anxiety and insomnia, just general feelings and stress I had never felt before," he said.

