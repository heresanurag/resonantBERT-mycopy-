  Life had been based on conquering fears and to suddenly find himself fearful, when he had previously been confident, was difficult. "I was scared of going to work, and leaving my family, I was scared of everything, I just wanted to make sure everything and everyone was OK." His sister, 40, was killed by a man who had built a friendship with her after finding out she had received inheritance money from her grandmother. Her murderer was jailed for a minimum of 34 years after Ms Morais was found in Whetstone, Leicestershire. "Everyday I wake up and go, this really happened," said Fearon adding he felt he had let his sister down. He has had to learn to be kind to himself, and not put so much pressure on himself to make everything right.

  Joel Fearon and his mum Jacqui Morais, who described daughter Natasha as "full of love"

  He has now returned to work and said on a good day, he uses everything that his family has gone through as a "tool to move forward." Now he and his family want to honour Natasha's memory by working with charities which support vulnerable women. Fearon's mum, Jacqui Morais, said her daughter had been full of love. "She was just full of love, full of mischief.. she was just a nice person," she said. "She started helping with the homeless, so we might just carry that on. She used to feed them – but couldn’t cook – but she had a lovely conversation! "Whatever we do will definitely be about helping people."
