title: 'World Cup 2018: England have made me a believer - Ferdinand - BBC Sport'
date: '2018-07-06'
section: General
url: http://www.bbc.co.uk/sport/football/44728981
content: |-
  BBC pundit and ex-England captain Rio Ferdinand says England can get to the World Cup final, and admits that the team's performances so far in Russia have made him "a believer".
