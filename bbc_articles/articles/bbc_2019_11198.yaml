title: 'Littlehampton crash: Man held after two police officers hit by stolen car
  - BBC News'
date: '2019-09-23'
section: England
url: http://www.bbc.co.uk/news/uk-england-49797093
content: |-
  The officers were carrying out a routine drugs check on the roadside when they were struck.

  Two police officers and a man were injured in the crash in Littlehampton

  A man has been arrested on suspicion of attempted murder after two police officers were hit by a stolen car.

  The officers were carrying out a routine drugs check at the side of the A259 in Littlehampton, West Sussex, at about 01:05 BST when they were struck.

  Sussex Police said a Mercedes-Benz, taken in a burglary, hit the officers and a man they were with "at speed".

  One officer suffered a broken leg and shoulder, and his colleague suffered multiple fractures.

  The two officers and the man arrested in a roadside check - who suffered a back injury - were taken to hospital.

  A 20-year-old man has been arrested, and police are trying to track down two other people.

  Assistant Chief Constable Julia Chapman said: "We are investigating this as potentially a deliberate attack on our response officers as they carried out a proactive stop following a report of suspicious behaviour.

  "Tragically, they were seriously injured in the course of carrying out their duties."

  ACC Chapman described it as "a shocking incident", and said the officers involved were being supported.

  A force spokesman said they were a man and woman.

