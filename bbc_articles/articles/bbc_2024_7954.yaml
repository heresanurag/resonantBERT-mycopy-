title: ‘I paid £30k to protect my child from her paedophile dad’ - BBC News
date: '2024-04-17'
section: UK
url: http://www.bbc.co.uk/news/uk-67425080
content: |-
  The BBC follows a mother battling to keep a dangerous sex offender away from her daughter.

  Bethan is "absolutely petrified" about what will happen once he is freed from prison. She fears he might take their daughter out of school one day without her knowledge, and the only way to get the child back will be to go through the family court. And while he has their child, he could do to her what he did to the other children he abused.
