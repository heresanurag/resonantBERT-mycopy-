title: Boy accidentally smashes 3,500-year-old jar on museum visit - BBC News
date: '2024-08-28'
section: General
url: http://www.bbc.co.uk/news/articles/ckg2j2y20epo
content: |-
  It was on display near the entrance of the museum without glass when the accident happened.

  A 3,500-year-old jar has been accidentally smashed into pieces by a four-year-old boy during a trip to a museum in Israel. The Hecht Museum in Haifa told the BBC the crockery dated back to the Bronze Age between 2200 and 1500BC - and was a rare artefact because it was so intact. It had been on display near the entrance of the museum without glass, as the museum believes there is "special charm" in showing archaeological finds "without obstructions". The boy's father, Alex, said his son "pulled the jar slightly" because he was "curious about what was inside", causing it to fall.

  Alex also said he was "in shock" to see his son next to the smashed jar and at first thought "it wasn't my child that did it". However, after calming the boy down he spoke to the security guard, Alex told the BBC. The Hecht Museum said the child has been invited back to the exhibition with his family for an organised tour after the incident happened a few days ago. "There are instances where display items are intentionally damaged, and such cases are treated with great severity, including involving the police," Lihi Laszlo from the museum told the BBC. "In this case, however, this was not the situation. The jar was accidentally damaged by a young child visiting the museum, and the response will be accordingly." A specialist in conservation has also been appointed to restore the jar, and it will be returned to its spot "in a short time". The boy's father Alex said they will feel "relieved" to see the jar restored but added they are "sorry" because "it will no longer be the same item". The museum told the BBC that "whenever possible, items are displayed without barriers or glass walls". And "despite the rare incident" the museum said it intends to continue this tradition.

  Intact: The jar was displayed at the entrance to the museum

  The jar was most likely originally intended to be used to carry local supplies, such as wine and olive oil. It predates the time of the Biblical King David and King Solomon and is characteristic of the Canaan region on the eastern Mediterranean coast. Similar items of pottery found during archaeological digs are usually broken or incomplete when unearthed, making this intact jar "an impressive find" when it was discovered, the museum added. The Hecht Museum is in the grounds of the University of Haifa in northern Israel and collects items of archaeology and art.
