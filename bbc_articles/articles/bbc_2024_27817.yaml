title: Job cuts 'inevitable' over £30m Dundee University deficit - BBC News
date: '2024-11-14'
section: Tayside & Central Scotland
url: http://www.bbc.co.uk/news/articles/c14lv4y667eo
content: |-
  Dundee University has told staff it faces "an extremely challenging period" for the higher education sector.

  The university faces a deficit of £25m to £30m in the next financial year

  Dundee University has told staff that job losses are "inevitable" as it faces a potential deficit of £30m in the next financial year. In an all-staff email, the university's principal, Prof Iain Gillespie, said it was planning for "a significant deficit" in the wake of "an extremely challenging period" for the UK higher education sector. He said despite a recruitment freeze and reducing operational expenditure, the university was still looking at a deficit of between £25m and £30m next year. Academic union Dundee University College Union (DUCU) said it was "outraged" at the news after previously receiving "reassuring verbal updates."

  The university currently employs more than 3,000 people. Prof Gillespie told staff: "We must take further action now to address our financial stability and long-term future. "Given the profile of our costs, it is inevitable this will mean a reduction in our staffing levels. "This will be a very difficult period, certainly for this financial year and next." One staff member told BBC Scotland News: "The freeze on staff recruitment and the non-filling of vacancies will over-burden an already demoralised staff, and the threat of redundancy makes things even worse. "Staff who are on precarious temporary sessional contracts will be the most affected by this initially. "Whilst most staff care about the students and go that extra mile to help, as always, the students will feel the effects of this the most."

  In a letter to its members, DUCU said: "I am writing to you on behalf of the branch committee to express our outrage at the message the principal sent to all staff this morning. "DUCU was not involved in any conversations that UEG (University Executive Group) had around financial sustainability." The union said it would be holding a branch meeting on Friday as the university's financial situation was "now a priority for all our members."
