title: 'Sofiane Feghouli: West Ham midfielder''s red card rescinded - BBC Sport'
date: '2017-01-03'
section: General
url: http://www.bbc.co.uk/sport/football/38497190
content: |-
  West Ham midfielder Sofiane Feghouli has the red card shown to him during Monday's defeat by Manchester United overturned.

  Last updated on .From the section Football

  West Ham played for 75 minutes with 10 men after Sofiane Feghouli was dismissed for this challenge on Phil Jones West Ham's Sofiane Feghouli has had the red card shown to him during Monday's defeat by Manchester United rescinded by the Football Association. The midfielder was sent off by referee Mike Dean for a challenge on Red Devils defender Phil Jones 15 minutes into a match the Hammers lost 2-0. West Ham boss Slaven Bilic said Jones "made a meal" of the tackle from the Algeria international. He will now be available for Friday's FA Cup tie against Manchester City.
