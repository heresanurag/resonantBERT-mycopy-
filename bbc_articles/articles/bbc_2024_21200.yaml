  Dorset-born Aldridge claimed Team GB's second sailing medal after Emma Wilson's bronze in windsurfing. The 27-year-old is a back-to-back World Championship silver medallist and was second in the Olympic test event last year. Aldridge won her first major title at the European Championships in Portsmouth a few months later. The kite event at Paris 2024 has been hampered by low winds, with races seven to 16 cancelled. Aldridge advanced straight to the final as the second-best rider in the opening series behind Nolot. She dominated the first race of the final, leading from start to finish and in the second race benefited from her French rival's fall on the way to a convincing victory. Aldridge celebrated by jumping into the sea at Marseille Marina.

  Ellie Aldridge became the first Olympic kite sailing champion
