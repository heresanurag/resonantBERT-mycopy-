content: |-
  Great Britain's Ellie Aldridge claims gold in the women's kite sailing final at Paris 2024.

  This video can not be played To play this video you need to enable JavaScript in your browser.

  Great Britain's Ellie Aldridge said she "still can't believe" she won gold in the women's kite sailing final at Paris 2024, adding it felt "overwhelming". The 27-year-old became the inaugural Olympic kite champion by winning two races in the final series on Thursday. Aldridge, who claimed Team GB's 13th gold medal of Paris 2024, said "the whole thing just feels like a dream", but also revealed relief at no longer having to "put on weight" for the event. "We use the same equipment as the guys use, and they're all 100 kilos," she added. "It's become pretty obvious in recent years that, the heavier you are, the bigger kite you can hold down, and the faster you'll go.

  "Everyone's been trying to put on a bit of weight when they can and it's become just part of the fleet really. It's definitely been the hardest part of my journey. I can't wait to not have to eat food now." Aldridge also said the equipment for the sports next cycle "has already been announced", but hoped for "different-sized kites or something a bit fairer" in the future. Three victories are needed in the final series for an athlete to finish first, but Aldridge carried one over from the opening series. She convincingly took the first race of the final and then won the second after leader Lauriane Nolot, of France, fell into the water. Nolot won silver based on her two automatic wins from the opening series and Annelous Lammerts of the Netherlands took bronze thanks to her combined points total.

  Kite sailing is new to the Olympics, with competitors using a kite to be pulled forward across the water on a board at speeds of up to 45mph (40 knots). Over the first four days, competitors participate in up to 16 races, aiming for the highest possible ranking. The top two riders from this series advance directly to the grand final, while those placed 3rd to 10th proceed to the semi-finals. The eight remaining riders are split into two semi-final groups of equal strength with the objective of winning three races. The higher-ranked riders in each semi-final group start with two race wins, while the second-ranked riders carry over one race success. The winner from each semi-final advances to the grand final. In the conclusion, the leading rider from the opening series starts with two race wins, while the second-ranked rider begins with one. The aim is to achieve three race wins to end the competition.

