title: 'Biden-Putin summit: Presidents meet face-to-face - BBC News'
date: '2021-06-16'
section: General
url: http://www.bbc.co.uk/news/world-57498477
content: |-
  President Joe Biden and President Vladimir Putin hold their first talks since Mr Biden took office.

  President Joe Biden and President Vladimir Putin have met for talks in Geneva to see if they can find some common ground.

  The US and Russian leaders shook hands for the cameras before heading inside Villa La Grange on the shore of Lake Geneva.

  The presidents talked together for four hours, before holding separate news conferences.
