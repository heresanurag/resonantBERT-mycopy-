title: Send us your tributes to Queen Elizabeth - BBC News
date: '2022-09-09'
section: UK
url: http://www.bbc.co.uk/news/uk-62847406
content: |-
  The BBC wants to hear your memories and reflections on the extraordinary reign of Queen Elizabeth II.

  Tell us your memories of the Queen.

  BBC News wants to hear your tributes, reflections and memories after the death of Queen Elizabeth II. We'll be including these in special commemorative coverage on our website.

  Whether you or your relatives remember the coronation in 1953, you met the Queen, or you held a street party earlier this summer for her Platinum Jubilee, we want you to share your special moments with us.

  Or you might just want to pay tribute to the UK's longest-reigning monarch.

  Tell us what the Queen and her extraordinary 70-year reign meant to you.

  What are your memories of the Queen? Share your tributes and reflections by emailing yourqueen@bbc.co.uk.

  Please include a contact number if you are willing to speak to a BBC journalist. You can also get in touch in the following ways:

  If you are reading this page and can't see the form you will need to visit the mobile version of the BBC website to submit your question or comment or you can email us at yourqueen@bbc.co.uk. Please include your name, age and location with any submission.
