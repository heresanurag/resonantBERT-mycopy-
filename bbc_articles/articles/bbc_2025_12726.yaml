content: |-
  The actors are filming in Wales as they prepare to co-star in The Other Bennet Sister.

  Actors and friends Ruth Jones and Richard E Grant have embarked on a tour of Barry as they prepare for their next roles.

  They are set to take on iconic Jane Austen characters in BBC's The Other Bennet Sister which explores and expands the world of Pride and Prejudice.

  Richards says he has fond memories of watching Gavin & Stacey with his wife Joan before her death which made the visit all the more special.

  "It just cheered us up tremendously," he added.
