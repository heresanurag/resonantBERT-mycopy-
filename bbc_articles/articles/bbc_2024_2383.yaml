title: 'Newspaper headlines: ''Islamophobia row'' and ''generation sicknote'' - BBC
  News'
date: '2024-02-26'
section: The Papers
url: http://www.bbc.co.uk/news/blogs-the-papers-68399380
content: |-
  A deepening row about Islamophobia and figures on worker sickness feature on Monday's front pages.

  The Guardian says Rishi Sunak is being urged to explicitly denounce anti-Muslim bigotry, after Lee Anderson was suspended from the Tory parliamentary party for saying the Mayor of London was controlled by Islamists.

  The i's front page features a claim by Conservative peer Baroness Warsi that the party is being "dragged into the gutter". She says Muslims are treated as electoral campaign fodder, and that anti-Muslim racism is tolerated.

  But the Daily Telegraph reports that some Tory MPs in northern Red Wall constituencies say their inboxes have been flooded with messages of support for Mr Anderson.

  "Generation sicknote" is the front page headline in the Daily Mail, which says a new report warns that young people are increasingly blaming mental health problems for being jobless.

  The paper says the report, by the Resolution Foundation, suggests people in their early 20s are now more likely to be out of work because of ill health than those in their early 40s.

  The Daily Telegraph quotes an expert from the Health Foundation thinktank, who warns that without concerted cross-government effort, we risk creating a lost generation because of ill health.

  The Daily Mirror has the front page headline "Class war". It says a report by the teaching union, the NASUWT, has found school suspensions rose by 92% since the 2016 - 2017 academic year.

  The paper says some teachers reported having to lock classroom doors to keep out violent pupils. A senior union figure said there was a lack of funding, no classroom support for students and no mental health support.

  The Times leads on a warning from the home secretary that AI-generated fake videos, known as deepfakes, could be used by malicious states and criminals to hijack the general election. The paper says James Cleverly was speaking ahead of meetings with tech bosses in the US, where he will tell them to take collective action to protect democracy.

  The Financial Times includes a report that the biggest technology companies have substantially increased their water usage in recent years to cool data centres, sparking concerns about the environmental cost of AI. The paper says researchers from California are warning it is critical the matter is addressed as fresh water becomes increasingly scarce.

  And the Daily Star's front page states that rain forecast for the UK this week could make this February the wettest since records began. The paper says this month is one of the wettest ever, with the UK already having experienced two and a half times the averages rainfall.

  It says an extra day's rain on leap day this Thursday could make it "our biggest soaking in more than 250 years".

