id: bbc_2021_14919
title: Astroworld security officer 'felt a prick in his neck' - BBC News
date: '2021-11-06'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-59195084
content: |-
  A criminal investigation is underway after at least eight people died following a crowd surge at the festival.

  Police are investigating claims a security officer was injected in the neck while trying to restrain a concert-goer at the Astroworld Festival in Houston, Texas.

  A criminal investigation is underway after the deaths of at least eight people following a crowd surge during Travis Scott's headline set at the music event's opening night.

  Houston Police Chief Troy Finner told reporters the security officer "felt a prick in his neck" before falling unconscious and having to be revived by medical staff.
