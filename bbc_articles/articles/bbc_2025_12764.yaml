title: Waltham Abbey burst main sends water shooting into sky - BBC News
date: '2025-06-24'
section: General
url: http://www.bbc.co.uk/news/videos/c4g834z5x0ko
content: |-
  A resident says children have been trying to play in the leaking fountain of water.

  A resident captured footage as a water main burst and the resulting fountain reached as high as a telephone pole.

  It happened on Broomstick Hall Road in Waltham Abbey, Essex, on Monday.

  Neighbour Emma Bills said: "The school kids came out earlier and have all been playing in it.

  "It started about 10 o'clock this morning - just a small leak, flooding across the road."

  She said she reported it straight away and Thames Water attended half an hour later, but it started shooting into the air at about 15:00 BST.

  She added that it stopped just before 16:00.

  A Thames Water spokesperson said: "We're sorry for any disruption caused by the burst water pipe."

  It added that its engineers had been on site since Monday morning and had worked "quickly" to stop the flow and start the repairs.
