content: |-
  Governor Chris Sununu performed the Heimlich manoeuvre to assist the man.

  New Hampshire Governor Chris Sununu performed the Heimlich manoeuvre to save a man choking on seafood during an eating contest.

  Despite the incident, the contestant resumed the competition.
