  A joint statement says Brussels and London want to expand vaccine supply for all citizens.

  PM: UK may have to take action on France travel 'very soon'

  The Labour chair of the Home Affairs Select Committee, Yvette Cooper, has asked Boris Johnson why France has not been put on the UK's red list, given the rise in cases and new variants. The prime minister explains that putting a country on the "red list" has consequences for the supply of medicines and foods to the UK - a nod to the huge haulage industry that sees goods crossing the channel - but the PM concedes "we will have to look at tougher measures" if the circumstances change. Cooper says 20,000 people are coming to the UK from France every week and two-thirds of arrivals are exempt from restrictions - she wants to know why hauliers are not being tested in the UK. Johnson says the numbers have "massively diminished" in recent months - but says he will "look at the situation in the Channel" and "can't rule out further measures" on people arriving from France. Why is the PM not taking action now, asks Cooper? Johnson says there is "a balance to be struck" given the "very serious disruption" that would occur to cross-channel trade. "We will take action if necessary to protect public health" he adds and "we may have to do it "very soon".
