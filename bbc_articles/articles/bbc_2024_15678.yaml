id: bbc_2024_15678
title: 'Tony Dixon: Suspended Bristol surgeon harmed hundreds of women - BBC News'
date: '2024-07-18'
section: Bristol
url: http://www.bbc.co.uk/news/articles/cw0y189yknzo
content: |-
  The tribunal rule Tony Dixon’s fitness to practise is impaired and he still poses a "risk".

  Tony Dixon used artificial mesh to treat hundreds of bowel problems

  A surgeon has been suspended on the same day a hospital review concluded harm had been caused in hundreds of cases. A tribunal ruled that Tony Dixon, who used artificial mesh to treat prolapsed bowels at Southmead Hospital, in Bristol, and the Spire Hospital, still posed a risk. The Medical Practitioners Tribunal Service's hearing concluded on Thursday that a six-month suspension was "appropriate". Spire Healthcare has now released its review of Mr Dixon, and found 259 cases where harm had been caused. Health bosses have "apologised sincerely".

  The majority of harm was in three main areas: the failure to adequately investigate patients prior to offering the procedure; the failure to adequately offer alternative treatments; and poor consent with risks and benefits of the procedure not adequately discussed. The tribunal found Mr Dixon’s fitness to practise is impaired and his suspension would allow him time to "to develop further insight and remediate his misconduct". The General Medical Council brought the case against Mr Dixon, who denies all the allegations and maintains that the procedures were carried out in good faith.

  The decision follows an investigation by the BBC and a review by Southmead Hospital, which found more than 200 patients were harmed after Mr Dixon operated on them unnecessarily. The BBC first revealed allegations made against Mr Dixon in 2017, when many women complained of severe pain following their operations. Two years ago, a review by Southmead Hospital found that 203 mesh operations carried out by Mr Dixon were deemed to be unnecessary, and non-surgical treatments should have been offered instead. Mr Dixon used a technique known as mesh rectopexy to treat bowel problems.

  Paula Goss was one of the people who suffered after Mr Dixon's procedures

  Through the procedure, mesh implants are placed into the body to treat pelvic organ prolapse and incontinence in women - both conditions which can occur after childbirth. The mesh, which is usually made from synthetic polypropylene, is intended to repair damaged or weakened tissue.

  Paula Goss, from South Gloucestershire: who was one of Mr Dixon's mesh patients, said: "Devastated doesn't cover it. "The five witnesses, who had to give their evidence, were very brave however there are hundreds who were affected by this surgeon. This isn't justice," she said. "A six-months suspension is like a slap on the wrist, it's not justice for the harm that he's caused. "He should have been struck off, and that is what we will be trying to pursue. "We will group together with all his patients and try to push forward."

  In a report, the tribunal said: "This period of suspension would also address the public interest in this case by declaring and upholding proper standards of behaviour for the profession and by sending a signal to Mr Dixon, the wider profession and the public about conduct which is regarded as unbefitting a registered doctor. "The tribunal considered that a longer period of suspension would be unduly punitive, especially taking into account the period that Mr Dixon had already been the subject of fitness to practise proceedings." The MPTS added a review of Mr Dixon's case will be held shortly before the end of the suspension period, so "he had fully remediated his misconduct, developed his insight, and would not pose a risk of repetition of the misconduct". The tribunal ruled there was a risk of repetition as Mr Dixon’s insight was "developing and his remediation was incomplete". "Mr Dixon’s misconduct was so serious that action needed be taken to protect members of the public," the report stated.

  Mr Dixon worked at the Spire between 1996 to 2017

  Spire Healthcare bosses have now apologised to patients. A spokesperson said: "We would like to reassure patients that we have substantially strengthened our procedures to monitor consultant practice and outcomes. "Addressing any concerns promptly is a top priority and we are committed to monitoring learning continuously in everything we do." Further patient reviews will still be conducted if any new cases come to light, the spokesperson added. Southmead Hospital, which is run by North Bristol NHS Trust (NBT), also issued an apology. NBT's chief medical officer Tim Whittlestone: “Mr Dixon was dismissed in 2019. We have carried out a thorough and robust review of affected patients, and would like to reiterate our apology to all of these individuals."
