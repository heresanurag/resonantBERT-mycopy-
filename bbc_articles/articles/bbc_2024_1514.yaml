title: 'Haverfordwest: Woman in murder arrest after boy, seven, dies - BBC News'
date: '2024-01-11'
section: Wales
url: http://www.bbc.co.uk/news/uk-wales-67944588
content: |-
  Police are investigating the circumstances surrounding the boy's death and the woman is in custody.

  Police were called to Upper Market Street in Haverfordwest on Wednesday

  A woman has been arrested on suspicion of the murder of a seven-year-old boy.

  Dyfed-Powys Police said its officers were called to Upper Market Street in Haverfordwest, Pembrokeshire, just before 10:45 GMT on Wednesday.

  It said the woman remains in police custody while its investigations continue.

  Police officers and a police vehicle remained outside the property on Thursday.

  The force said in a statement: "We are continuing to investigate the circumstances that led to the death of a child in Haverfordwest.

  "Officers were called to an address in Upper Market Street at just before 10:45 yesterday.

  "Sadly, a seven-year-old was confirmed to have died shortly after. Our thoughts are with their loved ones at this tragic time.

  "A woman has been arrested on suspicion of murder and remains in police custody."
