title: 'Glen Rosa: Cheers as CalMac ferry is launched at Clyde shipyard - BBC News'
date: '2024-04-09'
section: Scotland
url: http://www.bbc.co.uk/news/live/uk-scotland-68765167
content: |-
  Crowds gathered to watch the long-delayed vessel enter the River Clyde at the Ferguson shipyard.

  No first ministers this time, so who will appear at the ceremony?

  No first ministers this time, so who will appear at the ceremony?

  Scottish government minister Mairi McAllan will speak at the launch Image caption: Scottish government minister Mairi McAllan will speak at the launch Previous landmark events in the construction process have attracted First Ministers Alex Salmond and Nicola Sturgeon to Ferguson's. That's not quite the case this time, but there will be a few political big guns alongside the more traditional elements of a seafaring launch. We can expect speeches from the Scottish government's wellbeing economy secretary, Mairi McAllan, and Ferguson Marine’s interim boss, John Petticrew, who replaced the sacked David Tydeman last week. The Glen Rosa will then be blessed by Rev William Boyle, minister at St Andrew’s Church of Scotland, prior to the official naming. That honour will fall to welder Beth Atkinson, who completed her apprenticeship at the yard during the Glen Rosa’s construction. It will be anchors away at about 12:45 when the party is piped in to the ceremony by Greenock and Inverclyde MSP Stuart McMillan, whose father previously worked at the yard. We are expecting the speeches to get under way shortly after 13:00, with the boat splashing into the Clyde about 45 minutes later.
