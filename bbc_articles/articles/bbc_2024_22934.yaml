  Arsenal fans were quick to seize on City winger Jeremy Doku doing what they felt was the same thing earlier in the game and escaping without sanction. But there did appear to be a fundamental difference in that Doku was kicking the ball into the general area in which Oliver wanted Arsenal to take their free-kick. "I've seen it and it's that obvious so I'll leave it to you guys," said Arteta. When it was pointed out kicking the ball away is a yellow-card offence, Arteta said: "I prefer not to comment. You analyse the situation and how long it takes." Arteta refused to comment when he was quizzed about perceived time-wasting tactics, which were the reason for game continuing longer than anticipated. However, speaking to BBC Match of the Day, City defender Stones was critical of Arsenal's approach. "They slow the game down," he said. "They get the keeper on the floor so they can get some information on to the pitch. We had to control our emotions during those tough times. "I wouldn't say they have mastered it but they have done it for a few years now so we knew to expect that. You can call it clever or dirty, whichever way you want to put it, but they break up the game which upsets the rhythm. "They use it to their advantage and we dealt with it very well." City captain Kyle Walker said on BBC Radio 5 Live: "As a football match, it is a great spectacle for the Premier League. Probably not so much certain stuff - I think it’s part and parcel of the game and we'll say the dark arts. "I think as a Manchester City fan or player, you are obviously frustrated. As an Arsenal manager, he is going to say well played and well managed."

