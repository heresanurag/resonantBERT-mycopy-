  After Erling Haaland gave City the lead, the hosts were upset at the build-up to Riccardo Calafiori’s equaliser. Arsenal were allowed to take a quick free-kick by referee Oliver as Walker was returning to his position after being summoned for a chat along with opposite number Bukayo Saka. Manager Pep Guardiola kicked his chair in the City dugout in frustration and made his feelings known to fourth official Madley both at the time and the end of the game. And, while he acknowledged his side should have taken control of the situation by shuffling their remaining defenders across the pitch to fill the space and standing over the ball to prevent a quick free-kick, he also said in future he would tell Walker not to go to the referee if such a situation occurred and ask the official to go to him. City earlier lost midfielder Rodri to injury 21 minutes into the game when he appeared to twist his knee while tangling with Arsenal's Thomas Partey. Rodri also went down following a collision with Kai Havertz in the opening seconds, but that was not deemed punishable by the video assistant referee (VAR). "It all started in the very first second. In the first action we realised what was going to happen," added Silva. "We had a player injured after they sent him to the ground twice in 10 minutes. We had a goal conceded after the referee called our captain and then didn't allow him to recover his position. "The second goal is already their usual block to our keeper allowed by the referee. And then the referee allowed a sequence of time-wasting events. "The thing that bothers me the most is having a lot of meetings with the FA at the beginning of each season. They tell us they will control this kind of situation and will stop them, but at the end it doesn't have any worth. They say a lot but nothing happens." Asked about the difference between City's rivalry with Arsenal to the one they shared with Liverpool during the Jurgen Klopp era, Silva continued: "I don't know. Maybe that Liverpool have already won a Premier League, Arsenal haven't. That Liverpool have won a Champions League, Arsenal haven't. "Liverpool always faced us face-to-face to try to win the games, so by this perspective the games against Arsenal haven't been like the ones we had and have against Liverpool." The controversy contributed to a thrilling afternoon that will live long in the memory - but Arteta said he wished the game had not turned on refereeing decisions. "I cannot be happy," the Spaniard said at the end of his post-match media conference. "I want to be involved in a game at this level that puts the game in a situation that we can enjoy and talk about it in the proper way. We’re not talking about that. It's clear. You haven't asked me one single tactical question."

