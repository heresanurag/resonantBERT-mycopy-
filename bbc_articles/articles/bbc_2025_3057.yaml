title: Astronaut stuck in space says it's an 'opportunity' - BBC News
date: '2025-02-09'
section: General
url: http://www.bbc.co.uk/news/videos/cz6p256vdpdo
content: |-
  Suni Williams said she still pinches herself seeing the view from the International Space Station.

  Stranded Nasa astronaut Sunita (Suni) Williams told CBS, the BBC's US partner, that being stuck in space is 'an opportunity' to share her experience with people that she wouldn't have had on a shorter mission.

  Williams went up to the International Space Station on 5 June, 2024. NASA plans to bring her and her crewmate, Butch Williams, back down to earth on March 19, some nine months after their planned return date.
