title: 'Talbot Green: Police consider mistaken identity in shooting case - BBC News'
date: '2025-03-11'
section: General
url: http://www.bbc.co.uk/news/videos/cn52l11175no
content: |-
  Joanne Penney was shot dead at a block of flats in Talbot Green on Sunday evening.

  Officers investigating the shooting of 40-year-old Joanne Penney, who died in Talbot Green, Rhondda Cynon Taf, on Sunday, say she may have been a victim of mistaken identity.

  Giving an update on Tuesday evening, Det Ch Supt Ceri Hughes of South Wales Police said: "We are working hard to establish a motive for Joanne's killing.

  "We are exploring several lines of inquiry, including the possibility that she was a victim of mistaken identity."

  She added four further arrests had been made - meaning five people were being held in connection with the case in total.
