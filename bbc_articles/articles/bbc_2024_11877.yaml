title: Drink-driver smashes Cambridgeshire lamp-post and garden fences - BBC News
date: '2024-06-14'
section: General
url: http://www.bbc.co.uk/news/videos/cy001308831o
content: |-
  CCTV video shows the BMW coming to a standstill in a garden having careered off a road.

  The moment a drink-driver hit a lamp-post and ploughed through two garden fences was captured on video.

  It happened as Callum Mcintosh was driving a black BMW on Ely Road in Stretham, Cambridgeshire, just after 07:30 GMT on 23 March.

  The 32-year-old, of St Bede’s Crescent, Cambridge, can be seen climbing out of the driver’s window after the crash, although he initially told police he had been a passenger and the driver had run away.

  Mcintosh pleaded guilty at Cambridge Magistrates’ Court to drink driving, driving without insurance and driving otherwise than in accordance with a licence.

  He was disqualified from driving for a year and eight months and told to pay a £500 fine.

