title: Young carers say school holidays are the loneliest time - BBC News
date: '2024-07-19'
section: Wales
url: http://www.bbc.co.uk/news/articles/cjk3z322ky5o
content: |-
  One charity warns that there are gaps in support for young carers during school breaks.

  Isac, 13, cares for his mother, Genna, and his two sisters aged six and four

  The school holidays can be a very isolating time for children like Isac, who act as carers for family. The 13-year-old not only cares for his mother, after back surgery led to her having to use a wheelchair, but he cooks, cleans and looks after his two younger siblings too. "It’s really difficult and it can make you feel really lonely, but I know it’s important to look after my mum and my sisters," said Isac, from Bargoed near Caerphilly. The summer break means young carers, at home from school, will usually end up caring for even longer hours - and there are concerns that gaps in help available to support them, like cover to allow them time away, will hit them hard. Isac said he has got some activities planned through a young carers group over the summer, but he worries about being at home for longer periods.

  Isac said his life "changed massively" after his mother’s back surgery led to nerve damage, leaving her with limited mobility. "My mum is in a wheelchair now and she will have to stay in the wheelchair for the rest of her life," he said. His sisters, age six and four, also rely on their schoolboy brother day-to-day. "I’ll make food for them, I put the dishes away, I feed the dogs, then they get changed and I’ll put them to bed," Isac said. The weight of responsibility can be tough for anyone, let alone a teenager. "Some days I feel like I just want to lock myself in my room," he said. "But then it is nice to know that you’re here for your mum to rely on."

  Akira cares for her mother and says she sometimes "dreads" the school holidays.

  Akira, 12, also cares for her mother, who has mental health problems. She said she sometimes "dreads" the summer holidays. "[My mum] has anxiety, - it’s hard for her to do things. Just me being there helps her," said Akira, who lives in Swansea. In order to help children like her, the city's YMCA young carers group have arranged regular meet-up sessions and activities for their members over the summer. "[YMCA] gives me a break from my caring role. It good to get out of the house and meet others," Akira said.

  Harley, 13, says the sessions at YMCA Swansea make him feel calm because home life is "chaotic"

  Another young carer, Harley, 13, who cares for his mother and siblings, said the sessions are very important because of the "chaotic" environment he faces at home. "The workers here are very brilliant at their jobs. It makes me feel more calm. It’s a good place to sit down and relax," he said. Egija Cinovska, the group's coordinator, said: "Many young carers tell us that the school holidays are the loneliest time for them. "During summer holidays we offer loads of different activities for young carers. It’s important that we ensure we’ve got the funding to provide this."

  Carers Trust Wales said young carers needed better support during the summer because of the greater number of hours they are caring for. "We know that there are gaps in provision,” said the charity’s head of external affairs, Catrin Edwards. "The transition from school to summer holidays, we hear countless times from young carers that this is a huge worry for them. "It’s so important that they have access to short breaks." The Welsh government said its £9m short breaks fund provides opportunities for carers of all ages to take part in sport, leisure, or social activities. "We have also supported three annual festivals for young carers which take place in August – an opportunity to enjoy themselves without financial worries," it said. "Young carers can also access the carers support fund, which provides unpaid carers on low incomes with grants to buy essential items."
