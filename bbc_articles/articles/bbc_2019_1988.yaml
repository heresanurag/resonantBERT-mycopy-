title: 'Hammond: UK economy saw robust performance - BBC News'
date: '2019-02-11'
section: General
url: http://www.bbc.co.uk/news/business-47198728
content: |-
  The chancellor says the UK's economy has performed well given the weakening global economy and Brexit uncertainty.

  The chancellor, Philip Hammond, says the UK's economy has performed well given the weakening global economy and Brexit uncertainty.

  His comments follow the release of data showing the UK economy grew at the slowest pace since 2012 last year.
