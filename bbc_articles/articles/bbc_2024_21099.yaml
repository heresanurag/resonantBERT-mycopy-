  Two American astronauts face the sudden prospect of spending Christmas and New Year in space.

  They went to space for eight days - and could be stuck until 2025

  Butch Wilmore and Sunita Williams prior to the launch of their mission in June

  When two American astronauts blasted off on a test mission to the International Space Station on 5 June, they were expecting to be back home in a matter of days. But things didn't quite go to plan. In fact, Barry “Butch” Wilmore and Sunita Williams are still there, floating high above the Earth nearly two months later. The pair - who are stuck indefinitely - now face the sudden prospect of missing the summer entirely and even spending Christmas and New Year in space.

  Mr Wilmore, 61, and Ms Williams, 58, flew a Boeing Starliner spacecraft to the station. It was the first flight of its kind with people on board and was a test designed to see how the new spacecraft performs before it is used more regularly. Problems, however, emerged as it made its approach. These included leaks in its propulsion system and some of its thrusters shutting down. So while they made it to the space station safely, they will need an alternative mode of transport to get home if the Starliner is not deemed safe to return to Earth. At a news briefing on Wednesday, Nasa officials said no firm decisions had been made when it comes to next steps. "Our prime option is to return Butch and Suni on Starliner," Steve Stich, manager of Nasa's Commercial Crew Program, said. "However, we have done the requisite planning to make sure we have other options open.”

  One potential option being considered, they said, is to attach the two astronauts to a mission that is scheduled to launch in September, and return them to earth with that mission in February 2025. That flight to the space station will be made by a SpaceX Crew Dragon craft. The initial plan was for four crew members to be aboard, but two of the seats could be left empty if needed. That plan would mean the astronauts would spend more than eight months – rather than eight days – aboard the International Space Station (ISS). If the Crew Dragon is used, the Starliner craft would be returned to Earth without any crew, under computer control. Nasa officials said it could take a week or more for a final decision to be made.
