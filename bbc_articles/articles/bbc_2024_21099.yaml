  • None How long Space missions mess with our minds Although the astronauts will spend much more time in space than they initially planned, others have spent much longer periods above the Earth's surface. Russian Valeri Polyakov spent 437 days in space in aboard the Mir space station in the mid-1990s. Last year, Frank Rubio returned from the ISS after 371 days, the longest time an American has spent in space. And Russia's Oleg Kononenko, also currently aboard the ISS, is the first person to have spent more than 1,000 days in space during the course of their career. In their briefings and interviews, the two Americans have been upbeat about their situation. "I’m not complaining that we’re here for a couple extra weeks," Ms Williams said last month. As things stand, the pair may be there for many more weeks to come.
