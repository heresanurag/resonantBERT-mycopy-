content: |-
  Having already lost Mack Hansen to injury, Ireland are ready for what promises to be another chaotic Six Nations visit to Scotland on Sunday.

  Ireland ready for Murrayfield chaos all over again

  Peter O'Mahony will start against Scotland after replacing Ryan Baird in the Ireland back row

  Coverage: Watch on BBC One & BBC iPlayer; live on BBC Radio 5 Live, BBC Radio Scotland, BBC Radio Ulster & BBC Sounds

  Drama has usually followed Ireland to Murrayfield in recent years. Eight years ago, it was the now-infamous 'busgate' episode, when Ireland's transport to take them to the stadium on gameday showed up late on, eating into the team's warm-up and enraging the notoriously meticulous Joe Schmidt. Scotland beat Ireland 27-22 that day thanks to a couple of late Greig Laidlaw penalties. The Irish never fully recovered from that opening-weekend defeat as England won the title. Two years later, the then Grand Slam holders' hopes of leaving Edinburgh with victory were again threatened when talismanic fly-half Johnny Sexton succumbed to injury just 24 minutes in, only for Schmidt's side to prevail 22-13. In 2021, at the end of another hectic afternoon, Ireland needed Sexton's nerveless late penalty to eke out a 27-24 victory. Two wins from a Grand Slam, Ireland lost both starting hooker Dan Sheehan and his replacement Ronan Kelleher to injury, leading to a hastily cobbled-together rejig in which prop Cian Healy scrummaged as a hooker and flanker Josh van der Flier threw the line-outs. Caelan Doris and Iain Henderson also went off hurt inside the opening 25 minutes, but as they often do, Ireland navigated the tumult and won 22-7.

  Earlier this week, scrum coach John Fogarty recalled his panic during the 2023 game and how head coach Andy Farrell surprisingly revelled in the moment. While Farrell is, for now, shielded from the stresses of organising a group of players for a Six Nations fixture, his interim successor Simon Easterby has been forced into a late reshuffle following Mack Hansen's withdrawal on the eve of the game, with Calvin Nash promoted to the line-up. Easterby will hope Hansen's troubles are not a portent for what lies ahead on Sunday with Ireland aiming to overcome a significant hurdle in their quest for a third successive title. England's thrilling victory over France on Saturday only heightens the stakes. With a bonus-point win at Murrayfield, Ireland will be in the driving seat heading into the down week.

  As has been widely discussed this week, Ireland's recent record against the Scots is remarkable. They lead 21-4 in Six Nations meetings and have won the past 10, the latter run including a couple of World Cup wins and an Autumn Nations Cup success. In fact, not since that infamous 2017 game have Scotland - then managed by Vern Cotter - got one over on their Celtic cousins. Ireland, however, have been keen to distance themselves from chat about winning streaks and psychological edges all week. Plenty has been said in the past, but a pre-match war of words has certainly not been forthcoming this week. "I don't think there's any room for that [complacency], given the respect we have for them," Ireland skipper Doris said on Saturday. "You hear that outside noise about our record against them, but it hasn't been talked about in here and we've been preparing for a proper Test match. "We've seen what they've been about over the last number of years, most recently last weekend. Especially at home there's that extra element."

