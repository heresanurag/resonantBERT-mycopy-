  Doris is right to point out Scotland's recent form. After losing to Ireland in the final Six Nations game last year, they have won eight out of their past nine Tests and claimed Australia's scalp in November a week before Ireland edged past them. The potency of the Scottish backline - even without injured centre Sione Tuipulotu - has been a big point of focus, too. "Their attack is very dangerous," added Doris, who made his Ireland debut against Scotland in 2020. "They attack with quite a bit of width and flair. Their counter-attack, with the wings and back three in general. "You're seeing some of the tries Duhan van der Merwe has scored, Darcy Graham as well is a massive threat and Blair Kinghorn, too. We'll have our hands full."

  Sunday will be Sam Prendergast's fifth cap, but his first away from home

  In an attempt to withstand the Scots, Easterby has reinstalled firebrand flanker Peter O'Mahony to the starting line-up for the first time since last summer. O'Mahony has history in this fixture, and given it will be his first start since being replaced by Doris as captain, the Munster veteran will not be short of motivation. "He loves these games, obviously he loves the Six Nations, he loves representing the nation, and he always adds something different, something a little bit special," observed Doris. "He's got 110 caps, 111 tomorrow, so a wealth of experience there, and just a good fella to have around camp. Last week, he was great even though he wasn't involved. "There is a bit of an added edge from him this week as well. He's always someone who I enjoy having alongside me in the back row." O'Mahony's return adds even more know-how to an Irish side packed with experience, the 23-man matchday squad totalling 1,220 caps compared with Scotland's 864. Fly-half Sam Prendergast is the outlier. It will be the 21-year-old's first away game for Ireland and Scotland will undoubtedly set out to unsettle him. Ireland's experience told against England, especially during a dominant second half when Jack Conan and Dan Sheehan made huge impacts off the bench. Not short of Test experience either, Scotland are also hardened by previous pain at Irish hands. Townsend set up defensively in Dublin last year, but stirred by the home crowd, his side may go all-out to make it another frantic afternoon for Ireland. It will not be anything Ireland have not encountered in the Scottish capital before. Navigate the mayhem once more and they will be this weekend's big winners.

