content: |-
  The volcano has erupted spewing massive flows of lava around the crater floor.

  The Kilauea volcano has erupted spewing massive flows of lava around the crater floor.

  The US Geological Survey captured the volcanic activity on a webcam.

  The last time Kilauea erupted was in January this year, with activity stretching into March.

  Located in a closed area of Hawaii Volcanoes National Park, Kilauea is one of the world's most active volcanoes.
