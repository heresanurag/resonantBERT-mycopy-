content: |-
  Spain's Jon Rahm holes an incredible skimming shot across the pond on the 16th hole at Augusta as he practises before the Masters which begins on Thursday.

  The patrons may be absent but the players still attempt the tradition of skimming their ball across the pond on to the 16th green at Augusta National as they prepare for the Masters, which starts on Thursday.

  And Spain's Jon Rahm manages to hole his effort, with the help of a friendly pin position on a sloping green.

