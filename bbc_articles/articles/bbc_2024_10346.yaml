title: Rare footage shows deep-sea squid attacking camera - BBC News
date: '2024-05-19'
section: General
url: http://www.bbc.co.uk/news/science-environment-69016403
content: |-
  Watch video of the super-fast Dana squid getting a close-up 1km below the Pacific Ocean's surface.

  Rare footage shows a deep-sea squid wrapping its arms around a camera at a depth of about 1km (0.6 miles), where conditions are near pitch black.

  The Dana squid has all the tools of a top ocean predator, including a pair of brilliant "headlights" that it flashes at the moment it goes in for the kill.

  They are intended to dazzle the prey, to hold the victim stationary for those few moments longer until it can be captured in a death embrace.

  Scientists filmed the squid in full attack mode while they were on a research cruise in the Pacific Ocean.

