title: Woman dies after waterfall rescue at Callander - BBC News
date: '2019-08-01'
section: Tayside and Central Scotland
url: http://www.bbc.co.uk/news/uk-scotland-tayside-central-49193996
content: |-
  An air ambulance helicopter and other emergency services were called to Bracklinn Falls in Callander.

  Rescue workers have been searching around Bracklinn Falls

  A 23-year-old woman has died after getting into difficulty at a waterfall in Stirlingshire.

  An air ambulance helicopter along with other emergency services were called to Bracklinn Falls in Callander at about 11:30.

  The Coastguard and rescue teams landed at nearby Callander golf course.

  Police said two women were rescued from the water - one, aged 25, was assessed by paramedics but did not require hospital treatment.

  However, the other woman was pronounced dead at the scene.

  Paramedics worked with others from the emergency services

  A Police Scotland spokesman said: "The death is being treated as unexplained, but not suspicious, and a report has been submitted to the procurator fiscal.

  "Our thoughts are with her family and friends at this difficult time."

  The Coastguard helicopter is part of the search team

  The helicopters landed at Callander golf course
