title: Daniel Khalife 'congratulated' officer who caught him, court told - BBC News
date: '2024-10-19'
section: UK
url: http://www.bbc.co.uk/news/articles/c5y0nkjkk2yo
content: |-
  A Met Police sergeant has told jurors the moment he "grabbed hold" of Daniel Khalife in west London.

  A former British soldier accused of escaping prison "congratulated" a police officer on catching him after he was stopped on a west London canal towpath, a court has heard. The plain clothes detective sergeant, who was not named in court, said he "jumped out" of his car, ran to the canal and "grabbed hold" of Daniel Khalife last September. Jurors at Woolwich Crown Court were told Mr Khalife was arrested three days after he was alleged to have escaped from HMP Wandsworth, in south London, by strapping himself to the underside of a food delivery lorry.

  Jurors were told on Friday that Mr Khalife was arrested on 9 September 2023 with a number of items including a mountain bike, a Waitrose bag with a phone, receipts, a diary and about £200 in notes. The Met Police officer recalled the moments he spotted Mr Khalife and went to arrest him. "It was quite a fast moving situation," he said. "I could see Khalife coming towards me on the footpath riding his bike with clothing matching the description. "I was sure it was Daniel Khalife, I told him he was under arrest. "I ran down the stairs, I pulled my taser out."

  Daniel Khalife joined the Army in September 2018 - two weeks before his 17th birthday

  Mr Khalife "flinched" when he saw the taser, but did not "have a chance to stop" because of the speed he was moving, the court heard. "I grabbed hold of his arm and pulled him off of the bike onto the floor," the officer continued - adding that Mr Khalife complied and was handcuffed. The officer was then joined by colleagues and Mr Khalife was formally arrested. Asked about Mr Khalife's demeanour, the officer said: "He was friendly towards me. Quite jovial. "At no point did he try to resist. "He was pleasant. He congratulated me on catching him." Jurors were also shown a photo of Mr Khalife sitting on the ground after being stopped by police.

  Asked by defence barrister Gul Nawaz Hussain KC if he had told Mr Khalife: "Stop, or I'll shoot," the officer said: "No." The court had heard that on 6 September Mr Khalife had been to Richmond and went to the outdoor clothes chain Mountain Warehouse, and the following day he was pictured in two supermarkets. The trial had also been told that on the day of the arrest, the former soldier was seen in a McDonald's. Prosecutor Mark Heywood KC previously told the jury Mr Khalife "quite deliberately escaped" after being escorted to the kitchen where he had a job. His absence was discovered during a headcount and then all movement in the prison was suspended, the jury was told. Mr Khalife, who was brought up in Kingston, south-west London, by his Iranian-born mother, joined the Army in September 2018, two weeks before his 17th birthday, the court heard. He also faces charges contrary to the Official Secrets Act and Terrorism Act, and is accused of perpetrating a bomb hoax, which he denies.
