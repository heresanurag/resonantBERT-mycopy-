title: US boy trapped in Florida stuffed toy arcade machine - BBC News
date: '2018-02-08'
section: US & Canada
url: http://www.bbc.co.uk/news/world-us-canada-42992945
content: |-
  Mason crawled in to get a stuffed toy before being rescued by his local fire department.

  In his quest to win a stuffed toy, young Mason got stuck inside an arcade machine

  A young boy became stuck in a machine in an amusement arcade while attempting to win a toy in Titusville, Florida.

  Mason crawled through the machine's small door, where a prize would normally fall, to get hold of the stuffed toy.

  An off-duty fire officer was eating in a nearby restaurant when he noticed Mason was trapped.

  The boy sat calmly in the machine as it was prised open, the local fire department said.

