title: 'Turkey earthquake: BBC reporter stops as rescuers listen for trapped people
  - BBC News'
date: '2023-02-08'
section: General
url: http://www.bbc.co.uk/news/world-europe-64567485
content: |-
  Tom Bateman was reporting from Adana, Turkey, when asked to be be quiet.

  BBC Middle East correspondent Tom Bateman paused his live broadcast as rescue teams in Adana, Turkey, called for quiet.

  The search for survivors across southern Turkey and northern Syria continues after Monday's devastating earthquake that killed thousands of people.
