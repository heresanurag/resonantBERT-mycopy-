title: 'Lancaster: Boy, 11, found dead at house - BBC News'
date: '2024-03-06'
section: Lancashire
url: http://www.bbc.co.uk/news/uk-england-lancashire-68488698
content: |-
  The boy's death is being treated as unexplained and is being investigated by police.

  The boy was found unresponsive at a house on Greenset Close in Lancaster

  Police investigating the death of an 11-year-old boy at a house in Lancashire said the inhalation of aerosols was one line of inquiry.

  Emergency services were called to a report of a sudden death at a house on Greenset Close in Lancaster on Saturday, Lancashire Police said.

  Police said the boy's death is being treated as unexplained and his family were being supported by officers.

  The force added the coroner has been informed.

  The force said in a statement: "Our thoughts are with the boy's loved ones at this incredibly sad time."

  It confirmed that while inhalation of aerosols was one line of enquiry into the boy's death, it would not comment any further on an "ongoing investigation".

  Anyone with information is being urged to contact Lancashire Police.

  A GoFundMe page has been set up to raise money towards his funeral expenses and has so far raised more than £2,000.

