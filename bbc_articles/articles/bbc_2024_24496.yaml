title: Cardiff school Ysgol Glantaf leaves X over platform 'racism' worry - BBC News
date: '2024-10-01'
section: Wales
url: http://www.bbc.co.uk/news/articles/c5y9qlzl310o
content: |-
  The head says young people on the app "were drawn into lies and racism" during the summer riots.

  The school head says it has also received "very vehement" messages about freedom of speech and freedom of information since closing its X account

  A Welsh secondary school has said it is closing its account on X - formerly known as Twitter - over concerns about racism on the social media platform. The head teacher of Ysgol Gyfun Gymraeg Glantaf in Cardiff said a decision was made by governors to "move away from the platform". Matthew HT Evans also called for other organisations such as the Welsh government and school inspectors Estyn to consider if they should remain on it. X, which was bought for $44bn (£38.1bn) in 2022 by the billionaire Elon Musk, has been contacted for a response.

  Speaking to BBC Cymru Fyw, Mr Evans said he was "shocked" over messages appearing on the platform during the summer, when rioting broke out in several areas of England and Northern Ireland following the murder of three girls in Southport. "During the hate riots in the summer, we were able to see young people and children on the streets who were drawn into the lies and racism that was going on, which was disturbing," he said. "You were seeing comments that made you feel uncomfortable about the clear racism that was going on that platform," he said.

  The head of Glantaf people on X "were drawn into lies and racism" during the summer riots which followed the murder of three girls in Southport

  After the killings in Southport, a false name - attributed to the 17-year-old suspect - spread like wildfire across X. There were false claims the attacker was a refugee who arrived in the UK by boat in 2023 and unfounded speculation he is Muslim - some of these posts were accompanied by Islamophobic and racist hate. The site's owner Mr Musk also shared a post from far-right activist and convicted criminal Stephen Yaxley-Lennon, also known as Tommy Robinson. Yaxley-Lennon, who had been banned on the platform until Musk took over, had taken aim at Prime Minister Sir Keir Starmer for his comments after riots broke out. Mr Musk also posted on X predicting civil war in the UK and repeatedly attacking the prime minister. The head of Glantaf said that since the school returned in September, concerns had been reflected in conversations with staff and with parents who felt uncomfortable. However, he said the school has also received "very vehement" messages about freedom of speech and freedom of information. "As far as we were concerned, it was not a matter of freedom of speech. Messages of hate and racism are another matter," he added.

  Mr Evans said he was "shocked" over messages appearing on the platform during summer

  The school was Cardiff's first Welsh-medium secondary school when it opened in 1978, and according to its latest Estyn report, has more than 1,300 pupils. It has decided that it will use now start using the social platform Instagram, although that will remain under scrutiny. "We will review it, as I'm not sure if Instagram is the right platform and ultimately we may have to consider that social platforms are not suitable for schools to communicate on," said Mr Evans. He also wondered if other organisations using X will follow suit. "My feeling is you've got a large number of organisations that are on this platform – Estyn, Welsh government, county councils – and I think there's a question for them all to how long they're going to continue on this platform?" he said. The Welsh government said it keeps the accounts it uses "under ongoing review." "We recognise the concerns raised about the management of X in recent months, but believe it is important to continue to engage with as many people as possible and provide clear, trusted information.” A spokesperson for Estyn said: "Our social media is an important way in which we share effective practice across education providers. "We regularly review our social media channels and continue to monitor our engagement on X as part of this review activity." The Welsh Local Government Association, which represents councils, declined to comment.
