  One of Villa's stand-out players during this campaign has been Morgan Rogers, who was once at City. The 22-year-old joined Guardiola's side in 2019 from West Bromwich Albion but failed to make a first-team appearance, spending time on loan at Lincoln City, Bournemouth and Blackpool. He signed for Villa last February from Middlesbrough and his stellar performances have seen him contribute 14 goals and 13 assists this term, as well as earning an England call-up. Guardiola said: "He was in the second team and trained sometimes with us. [From] the glimpses, we could see something, he could do it. "The impact in Villa has been [incredible] - what a player, so we had an exceptional player here."
