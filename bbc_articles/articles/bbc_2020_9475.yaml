title: 'Great Yarmouth boat crash: Trapped woman dies - BBC News'
date: '2020-08-19'
section: Norfolk
url: http://www.bbc.co.uk/news/uk-england-norfolk-53834369
content: |-
  It is believed the woman fell from a boat when it crashed on the River Bure in Great Yarmouth.

  The crash happened at about 13:35 BST near Great Yarmouth Yacht Station

  A woman has died after becoming trapped under a river boat that crashed in Norfolk.

  The victim, who was in her 30s and from London died in the water at North Quay, Great Yarmouth, in a crash at about 13:35 BST, Norfolk Police said.

  Paramedics, RNLI lifeboats, HM Coastguard patrol officers and police attended but she was pronounced dead at the scene.

  It is understood she fell into the River Bure when the boat hit a wall.

  The coastguard described the incident as "very serious"

  A spokeswoman for Norfolk Police said: "Officers attended the scene, along with Norfolk Fire and Rescue Service, the Coastguard and the East of England Ambulance Service, but the woman was sadly pronounced dead at the scene.

  "Inquiries are ongoing to establish the circumstances leading up to the incident and how the woman came to be in the water."

  The fire service, ambulances, RNLI lifeboat, HM Coastguard patrol officers and police were called to the site

