title: 'Seal of approval: Mammal makes a splash off Hastings - BBC News'
date: '2025-06-26'
section: General
url: http://www.bbc.co.uk/news/videos/c2k1gv358pyo
content: |-
  Paul Faraway was kayaking off Hastings when he and his wife met a curious harbour seal.

  A couple caught on camera a close encounter they had with a seal while they were kayaking near Hastings.

  They were just off Rock-A-Nore in the resort when the mammal started playing with their paddles and splashing near them.

  Paul Faraway said: "The seal came to us after following for quite a while, clearly very inquisitive."

  Ella Garrud, Sussex Wildlife Trust Wilder communities coastal officer, said: "It's incredible to observe top predators, such as seals, that we have in Sussex.

  "Any interaction you have with marine wildlife should be on their terms. If a seal approaches you, remain calm, do not touch the animal and, if you can, move away slowly to give the animal space."

