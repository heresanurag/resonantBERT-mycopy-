title: Ant & Dec help reunite Buckinghamshire woman with Aussie family - BBC News
date: '2024-09-15'
section: General
url: http://www.bbc.co.uk/news/videos/cpvyvr3gj3ko
content: |-
  Tina flies to Melbourne to meet her four siblings for the first time and it is captured on film.

  The moment a British woman was reunited with her four siblings in Australia following a DNA test was captured on camera.

  Tina Duggan, 47, from Aylesbury in Buckinghamshire, was inspired by an episode of the ITV programme DNA Journey which saw Ant and Dec trace their genealogies.

  She said she "felt whole again" after finally making contact.

  Ant and Dec sent a message to Tina saying: "We want to wish you the very best of luck, have the best time in Australia."

