title: Turkey coal mine explosion kills 41, injures 11 - BBC News
date: '2022-10-15'
section: Europe
url: http://www.bbc.co.uk/news/world-europe-63261746
content: |-
  Emergency crews had worked through the night to reach survivors hundreds of metres below ground.

