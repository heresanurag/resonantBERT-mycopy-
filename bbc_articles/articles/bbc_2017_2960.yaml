id: bbc_2017_2960
title: Fires ravage rural areas of New South Wales, Australia - BBC News
date: '2017-02-12'
section: General
url: http://www.bbc.co.uk/news/world-australia-38949906
content: |-
  Rural areas of Australia's New South Wales state have been evacuated as wildfires rage across the state, threatening homes and closing roads.

  Some 97 fires were burning across the state, with 37 uncontained, the Rural Fire Service said.
