title: Scuba couple tie the knot underwater - BBC News
date: '2025-04-11'
section: General
url: http://www.bbc.co.uk/news/videos/cedy2g8v37lo
content: |-
  Adam and Amy Harper meet through their mutual love of scuba diving.

  Two newlyweds have affirmed their vows in an underwater ceremony.

  Adam and Amy Harper from Sandwell in the West Midlands met each other in a chance encounter while scuba diving.

  Three years on, they recreated walking down the aisle in the diving pool at Sandwell Aquatic Centre.

  It was a way to celebrate with friends and family after a formal ceremony at a registry office in West Bromwich in front of two witnesses.
