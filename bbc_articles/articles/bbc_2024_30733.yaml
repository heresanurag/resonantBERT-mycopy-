title: Body found in search for missing Cairngorms skier - BBC News
date: '2024-12-14'
section: Highlands & Islands
url: http://www.bbc.co.uk/news/articles/cy9q0yzel3lo
content: |-
  Sam Burns was last in contact with friends on Friday morning ahead of going to ski alone in the Cairngorms.

  Sam Burns was in contact with friends when he was out skiing alone

  A body has been found in the search for a missing skier in the Cairngorms. Sam Burns, 40, had been in touch with friends when he went skiing alone on Friday, but failed to return to his van parked at the mountain car park in Aviemore. He had planned to ski Y Gulley or Diagonal Gulley from the Cairngorm Plateau. Police launched a search when he was reported missing and confirmed a body had been found on Saturday. Officers said formal identification had yet to take place, but Mr Burns' family had been informed.

  There are no suspicious circumstances and a report will be submitted to the procurator fiscal.
