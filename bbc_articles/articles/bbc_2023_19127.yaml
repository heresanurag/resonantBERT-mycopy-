title: 'Leeds: Mother in court charged with baby girl''s park murder - BBC News'
date: '2023-12-23'
section: Leeds & West Yorkshire
url: http://www.bbc.co.uk/news/uk-england-leeds-67810906
content: |-
  Evelyn, aged five months, was rushed to hospital but died after an incident at a Leeds park.

  Police taped off the Woodhouse Moor entrance near the junction of Clarendon Road and Moorland Road

  A woman has appeared in court after being charged with the murder of her baby daughter in Leeds.

  Five-month-old Evelyn was found in a serious condition in Woodhouse Moor park on Wednesday evening and was later pronounced dead in hospital.

  Hayley Macfarlane, 39, of Carrington Street, Barnsley, was remanded at Leeds Magistrates' Court on Saturday.

  She is next due to appear at Leeds Crown Court via a video link on Thursday, the court heard.

  Ms Macfarlane was not required to enter a plea to the charge during the court appearance.

  She spoke only to confirm her date of birth and her home address during the three-minute hearing.

