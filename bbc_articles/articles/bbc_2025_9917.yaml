title: Bella May Culley not 'far from childhood', new lawyer says - BBC News
date: '2025-05-22'
section: Tees
url: http://www.bbc.co.uk/news/articles/ckg77p5ey8ro
content: |-
  The 18-year-old, from Billingham, has had her first meeting with her new lawyer in Georgia.

  Bella Culley not 'far from childhood', says lawyer

  Bella Culley has now had a lawyer appointed by her family to represent her

  A British teenager held in prison in Georgia on suspicion of drug offences has been described as "not far from childhood" by her new lawyer. Bella Culley, 18, from Billingham on Teesside, has had the first meeting with her new family-appointed lawyer Malkhaz Salakaia, who said he had to explain to her where she was geographically. She is being detained for 55 days before trial while the prosecution investigates where the 12kg (26lbs) of marijuana and 2kg (4.4lbs) of hashish found in a travel bag came from, and whether she was planning on handing it over to someone else. Mr Salakaia said Miss Culley was in "good health" but he would not describe her as an adequate adult.

  The lawyer, who does not speak English and specialises in juvenile law, has been communicating with his client using a translator. Their first meeting lasted two hours in prison number 5, near the town of Rustavi. Mr Salakaia said his client was in good health, did not have any complaints about the place of detention and was ready to defend herself in court. When asked whether he would describe Miss Culley as an adequate adult, his answer was "no". He said he had the impression she was "not far from childhood".

  Bella Culley's family is being supported by the Foreign Office

  During their meeting, the 18-year-old was also giving evidence to Georgian investigators. Miss Culley asked for advice about what to say and on some questions she chose to remain silent. At the previous pre-trial hearing on 13 May, Miss Culley told the court she was pregnant. Georgian Police said officers had seized marijuana and the narcotic drug hashish in a travel bag at Tbilisi International Airport. The BBC understands Miss Culley arrived in Tbilisi on a flight from Sharjah, in the United Arab Emirates, on 10 May.

  Bella Culley has been sent to prison number 5, in the city of Rustavi, while she awaits trial

  The BBC has been told the British Embassy has advised the teenager's family not to speak to the press. Miss Culley was charged by Georgian police with illegally buying, possessing and importing large quantities of narcotics. A spokesperson said the arrest was the result of a joint operation between multiple departments and, if she was found guilty, Miss Culley could face up to 20 years in jail or life imprisonment.

