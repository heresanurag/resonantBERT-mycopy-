title: Charlie Sheen attacked by woman at his Malibu home - police - BBC News
date: '2023-12-23'
section: US & Canada
url: http://www.bbc.co.uk/news/world-us-canada-67804344
content: |-
  Police have arrested Sheen's neighbour for assault with a deadly weapon and residential burglary.

  Paramedics were reportedly called but Charlie Sheen was not taken to hospital

  American actor Charlie Sheen was assaulted by a woman at his Malibu home, police in Los Angeles have said.

  The attack occurred on Wednesday about 13:00 local time (21:00 GMT), authorities said.

  Police have arrested Electra Schrock, 47, for assault with a deadly weapon and residential burglary.

  Paramedics were reportedly called to Mr Sheen's home in the aftermath, but he was not taken to hospital.

  Police did not share a possible motive.

  The Los Angeles Sheriff's Department confirmed the mid-day attack on the former Two and a Half Men star in a statement to the BBC.

  Ms Schrock, who is reportedly a neighbour of Mr Sheen, was also arrested for using force likely to create great bodily injury.

  Police did not say what weapon was used in the alleged attack.

  TMZ reports that Ms Schrock attempted to strangle Mr Sheen and ripped his shirt after he opened his front door.

  Ms Schrock had earlier this year pleaded no contest to a charge of misdemeanour elder abuse, according to the Los Angeles Times.

  Mr Sheen, 58, has featured in Hollywood blockbusters such as Platoon, Wall Street and Major League.

  He starred for eight seasons on CBS hit sitcom Two and a Half Men, before a spectacular falling out with the show's creator.

  He went on to court tabloid headlines with a series of bizarre interviews. He later said that he regretted his actions during that time and blamed his behaviour on drug and alcohol abuse.

  In an interview with People magazine earlier this month, Mr Sheen said that "next month I'll be six years sober".

  "I have a very consistent lifestyle now. It's all about single dad stuff, and raising my 14-year-old twin boys," the actor said.
