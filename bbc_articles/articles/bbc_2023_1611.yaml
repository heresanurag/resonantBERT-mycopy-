title: Police confirm three deaths in Perth hotel fire - BBC News
date: '2023-01-02'
section: General
url: http://www.bbc.co.uk/news/uk-scotland-64146797
content: |-
  Ch Supt Phil Davison says thoughts are with the families and loved ones of those who have died.

  Three people have died following a fire at a the New County Hotel in Perth, Police Scotland has confirmed.

  Ch Supt Phil Davison said guests and nearby residents were evacuated and 11 people were treated by the ambulance service at the scene.

  A dog also died in the incident.

  More: Three dead in blaze at New County Hotel
