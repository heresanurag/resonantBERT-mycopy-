  Callum McGregor: Celtic's 'beating heart' set for 500th game

  In the immediate aftermath of Celtic's Champions League goalless draw at Dinamo Zagreb in December, captain Callum McGregor was asked how many titles he had won, just for the record. He hesitated for a split second, which spoke volumes, before answering: "22, I think." "You don't get to where you've got to by chasing the numbers or chasing that type of status," he added. "I'm humble enough to know I'm very lucky to play at this club and to have the career I've had. I've done that by hard work and trying to be the best I can every day. "Nothing changes for me." Nothing much does change. Winning titles has gone hand in hand with McGregor's time at Celtic. For the record, those comments came days before the Scottish League Cup final, in which Celtic edged past Rangers on penalties. It's now 23 medals for the Celtic captain, as he prepared to make his 500th appearance for the club against Motherwell. Level on accolades with the great Billy McNeil, he'll likely surpass that soon enough.

  With a contract until 2028, McGregor's influence - and trophy haul - shows no sign of relenting as he closes in on the top of the all-time Celtic medal winners' list. Only James Forrest and Bobby Lennox remain above him on 25, with Lennox and McNeil, of course, winners of the biggest of all in 1967. McGregor's season-long loan spell, aged 20, at Notts County is well documented. That experience played a huge part in forming the player he would become. The midfielder was instrumental in guiding them to survival in English football's third tier, finishing top scorer, playing alongside another loanee, England international Jack Grealish. Within months, he returned to Glasgow and scored a late winner on his Celtic debut in a Champions League qualifying away win over KR Reykjavik. Progression to the latter stages of the Champions League had eluded him throughout his Celtic career, until recent weeks. He's ticked that one off too. Now, if available, he'll lead Celtic into a two-legged play-off against German giants Bayern Munich in mid-February, chasing a last-16 place.

  With 499 appearances, 71 goals and a trophy haul that includes five trebles, McGregor has been a Celtic managers' dream. His presence has coincided with an incredible run of success, the only major blip being Rangers preventing a landmark 10 League titles in a row in 2021. He's in his second spell under Brendan Rodgers having previously played under Ronny Deila, Neil Lennon and Ange Postecoglou. A key man for all. His importance was perhaps highlighted 2018/19 season as Celtic clinched the a third consecutive treble. By the end of that campaign McGregor had played more minutes of competitive football than any other player in world football. Undroppable. Recent words of his current boss Rodgers sum up McGregor's role, particularly since inheriting the captaincy from Scott Brown. "He's the beating heart of the team". He remains so.
