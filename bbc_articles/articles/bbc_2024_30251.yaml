  Abbie Humphries, who was only three hours old when she was taken, dies at the age of 30.

  Woman abducted as baby in 1994 dies of cancer

  Baby Abbie Humphries was snatched from her hospital cot when she was only three hours old

  A woman who was abducted from a hospital as a baby when she was only three hours old has died at the age of 30. In 1994, newborn Abbie Humphries was taken by a woman posing as a nurse from the maternity ward at the Queen's Medical Centre, in Nottingham, and found 16 days later after a national search. In a social media post, external, husband Karl Sundgren - whom she married in 2017 - said she passed away peacefully on Sunday, four years after she was diagnosed with grade four brain cancer. Paying tribute to her, he said: "Abbie was so strong and her infectious smile will forever remain in our hearts."

  Baby Abbie was reunited with her parents Roger and Karen Humphries, 16 days after she disappeared

  Abbie reportedly did not know about her abduction until she moved house at the age of 10 and found press cuttings. Police reportedly received a tip-off that former dental nurse Julie Kelley - aged 22 at the time - had been pregnant and told people she was expecting a boy, but came home with a baby girl. Baby Abbie was found in a property in the Wollaton area of Nottingham, and reunited with her parents, Roger and Karen Humphries. Kelley pleaded guilty to taking Abbie and was put on probation for three years and treated for a personality disorder.

