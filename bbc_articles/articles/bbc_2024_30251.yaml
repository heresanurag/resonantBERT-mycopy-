  The family moved to New Zealand when Abbie was a child. Doctors discovered a 5cm brain tumour in November 2020, when Abbie started getting headaches after her mother died of breast cancer. Following her diagnosis, she told the Mail on Sunday: "There is no point feeling angry or blaming anything. We have just had a terrible amount of bad luck. "I usually choose to look at the positive side of everything. It makes everyone feel better." In the social media post after her death, Mr Sundgren wrote: "Our beautiful Abbie peacefully passed away yesterday, surrounded by loved ones. "She fought so hard with so much strength and grace for over four years and can finally rest." He said there would be a celebration of her life in Whenuapai, in Auckland, on Saturday.

