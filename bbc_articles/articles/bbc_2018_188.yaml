id: bbc_2018_188
title: 'Golden Globes: Stars plan a protest - BBC News'
date: '2018-01-07'
section: General
url: http://www.bbc.co.uk/news/entertainment-arts-42596903
content: |-
  Final preparations are being made for the Golden Globe Awards in Hollywood.

  Many stars are joining a movement to protest by wearing black in solidarity with the victims of sexual harassment.
