title: Luke Littler plays darts as a toddler in home video footage - BBC News
date: '2024-01-02'
section: General
url: http://www.bbc.co.uk/news/uk-67861077
content: |-
  The 16-year-old is on a strong run at the PDC World Darts Championship, where he has reached the semi-finals.

  Home video footage shows teenage darts sensation Luke Littler playing the sport as a toddler on several different occasions.

  In the video, Littler can be seen shouting "180" at the camera after throwing his darts - a reference to a score in the sport.

  Now aged 16, he is on a strong run of form at the PDC World Darts Championship, where he has reached the semi-finals.
