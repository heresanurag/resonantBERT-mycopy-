title: Angelina Jolie 'spellbinding' as opera star Callas - BBC News
date: '2024-10-18'
section: Culture
url: http://www.bbc.co.uk/news/articles/c89l0jdny2po
content: |-
  The actress plays the lead role in Pablo Larraín's Maria, which could place her in the Oscars race.

  Jolie's own singing voice is blended with original recordings by Callas in the film

  Angelina Jolie walked the red carpet in London on Friday as her film about opera singer Maria Callas received its UK premiere. Maria is the third in a trilogy of films about high-profile, complex women from director Pablo Larraín, following his movies about Jacqueline Kennedy and Princess Diana. Written by Peaky Blinders creator Steven Knight, the film focuses on Callas's final years, in the 1970s, when she was living in Paris. With Jolie taking on acting roles relatively rarely in recent years, the film has provided something of a comeback narrative for her and could lead to an Oscar nomination for best actress.

  Jolie's performance could see her in the race for best actress at the Oscars

  Callas was a US-born Greek soprano, and one of opera's most well-known singers. She died in 1977 aged 53. In Maria, a blend of Jolie's own voice and original recordings by Callas are used in the singing scenes. Speaking to the Hollywood Reporter about Callas, external in August, Jolie said: "I’m sure there’s a lot that will be read into it of our overlaps as women, but the one that’s maybe not the most obvious is I’m not sure how comfortable we both are with being public. "And there was a pressure behind the working that wasn’t just the joy of the work." Asked why she had been taking on fewer film roles in recent years, Jolie explained: "I needed to be home more with my kids." But, she continued, she felt ready to return because her children are now "a bit older, getting more independent... I’m less needed and so able to go away for different periods of time".

  Angelina Jolie walked the red carpet at London's Royal Festival Hall as the film received its UK premiere

  Jolie has been praised by critics for delivering a "virtuoso lead performance" in Maria

  The film has received mixed reviews, although critics have generally praised its central performance. "Jolie is absolutely spellbinding as Maria Callas, imbuing her with grace and resolve," said Sophia Ciminello of AwardsWatch., external "She doesn’t disappear into the role, she transcends." Thanks to a "virtuoso lead performance from Jolie and exceptional technical elements across the board", Next Best Picture's Ema Sasic wrote,, external "Maria is a triumphant high note for Larraín to close his trilogy on". "It is Jolie's ability to depict a woman owning everything she is that makes her performance truly sing," said Entertainment Weekly's Maureen Lee Lenker., external "It's a remarkable portrait of a woman reckoning with herself, even as her body fails her."

  Jolie walked the red carpet on Friday with director Pablo Larraín and co-star Alba Rohrwacher

  Maria Callas, pictured in 1973, was one of the world's best-known opera singers

  Time's Stephanie Zacharek was less keen, external on her performance, however, saying Jolie "plays her subject as haughtily cool and deeply insecure, but captures none of her imperious charisma". "Larraín does his movie no favours by using footage of the real Maria Callas in the closing credits sequence... [giving audiences] a jolt of all the vitality Jolie and Larraín have failed to capture." Vanity Fair's Richard Lawson was also a little cooler, external on the movie, writing: "There is something arbitrary, unspecific about the film. "With a few details removed, Maria could be about any grand diva, this blurry picture of a woman swanning through the final week of her life." Maria will be released in cinemas in the UK on 10 January.
