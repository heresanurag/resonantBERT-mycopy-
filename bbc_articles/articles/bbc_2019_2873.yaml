title: God of War, Red Dead Redemption and indie titles lead 2019 Bafta nominations
  - BBC News
date: '2019-03-14'
section: Newsbeat
url: http://www.bbc.co.uk/news/newsbeat-47570073
content: |-
  Big budget games and independent titles will compete across a variety of categories at a ceremony in April.

  God of War, Red Dead Redemption 2, Return of the Obra Dinn and Florence lead the nominations at this year's Bafta 2019 games awards.

  God of War has been nominated for ten while Red Dead, Obra Dinn and Florence all pick up six.

  These four, plus Astro Bot: Rescue Mission and Assassin's Creed: Odyssey compete for the big award of best game.

  The category is a mix of big budget games and critically acclaimed indie titles.

  You've probably heard of some famous franchises but Florence, Return of Obra Dinn and Celeste (which has five nominations) will be unknown to some players.

  Florence is a puzzle game based on a relationship between a bored woman and a musician, which was created to be a violence-free alternative to aggressive games that dominate the mainstream.

