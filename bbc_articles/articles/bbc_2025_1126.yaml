title: Trump steel tariffs negative for UK and US, says business secretary - BBC News
date: '2025-02-16'
section: Business
url: http://www.bbc.co.uk/news/articles/cx2483zrz0zo
content: |-
  President Donald Trump is set to impose 25% taxes on steel entering the US "without exceptions".

  Trump steel tariffs negative for UK and US, says Reynolds

  This video can not be played To play this video you need to enable JavaScript in your browser. Business Secretary Jonathan Reynolds: "We need guarantees on steel jobs and profitability."

  Imposing US tariffs on UK steel would be "negative" for both countries, the business secretary has said. Jonathan Reynolds told the BBC the UK and US have a "mutual interest" in negotiating an exemption from President Donald Trump's plans for the 25% import tax, which could come into force in March. He said the UK was in a different trading position to other countries and could offer "very specialised" steel and aluminium exports the US needs like Navy submarine casings made in Sheffield, while tariffs would push up costs for US taxpayers. Reynolds' comments came after the government promised up to £2.5bn in support for the UK steel industry.

  President Trump has said his tariffs would be enforced "without exceptions or exemptions". However, Reynolds told the Sunday with Laura Kuenssberg programme that imposing them on UK steel "would be negative for ourselves, it would be negative for the US as well". He said he has had "some very constructive conversations with key people in the Trump administration recognising our relationship is different", including the US special envoy to the UK. The minister told the programme he thought there was a basis for "constructive engagement" between the UK and US but "I'm not saying it's easy". He added: "I appreciate they have a mandate for changing how they approach the issues of trade, but we have got a different argument, a different story to tell, to the EU or to China in relation to our trading relationships."

  The government has already said it would not retaliate immediately to the tariffs announced by Trump. UK Steel, which represents the industry, has said the tariffs would be a "devastating blow" that would damage the sector's £400m-a-year contribution to UK-US trade. The UK is not a big supplier of steel to the US, with the country accounting for about 10% of British steel exports. But there are concerns within the industry the tariffs might not just hinder exports to the US, but also lead to excess steel being "dumped" in the UK. This could occur if other countries no longer exporting to the US decide to offload steel at cheaper prices, which could potentially lead to UK steelmaking businesses being undercut. Shadow business secretary Andrew Griffith said the "uncertainty" the steel industry faced due to US tariffs was something the government "has been entirely silent on when instead they should be talking to the US, our closest trading partner". On Sunday, the government launched a consultation on its Plan for Steel, which will look at ways to reverse long-term issues facing the industry - including cheap imports flooding the domestic market.

  The UK steel industry has faced heavy job losses in recent years. Tata Steel is replacing old blast furnaces with an electric arc furnace - which is less energy-intensive and environmentally friendlier - at its site in Port Talbot, Wales. Traditional steelmaking at the site ceased in September, resulting in 2,800 job cuts. British Steel announced in 2023 it would close blast furnaces in Scunthorpe, and unveiled plans to roll out an electric arc furnace, which requires fewer workers to keep it going, with 2,000 jobs under threat. Asked about the potential job losses in Scunthorpe, Reynolds accepted that there would be a "reduction in head count" with the introduction of new technologies, but he said more jobs could be created if demand for UK steel was increased. The government's plan will address issues that have been "holding the industry back for too long", the Department for Business and Trade (DBT) said, including:
  • None Encouraging the use of UK-made steel in public infrastructure projects
  • None Investing in electric arc furnaces, which are less energy-intensive than blast furnaces and take out the need for high carbon-emitting coke The consultation will also examine electricity costs for steel companies "to make the UK competitive globally", but the government has not yet made a firm commitment to reduce energy bills.

  Griffiths said he looked forward to seeing a detailed plan, but added "a clear part must be steps to reduce the cost of energy which is placing an intolerable strain on UK steel". Help for the sector will be available through the National Wealth Fund, which partners the government with the private sector and local authorities to finance infrastructure and other projects. The government says this financial assistance could benefit Scotland, as well as areas of England such as Scunthorpe, Lincolnshire, Rotherham and Redcar which have "a strong history of steel production". But the DBT said it was "wasting no time" supporting UK steel, pointing to the government's backing an expansion of Heathrow Airport, which it said would require 400,000 tonnes of steel.

  The GMB union said the government's plan to support the "beleaguered" steel industry provided "desperately needed" funding after "years of dithering". "As the world becomes more volatile, primary domestic steel making capacity is vital for both our economy and domestic security," the union's national secretary Andy Prendergast added. Gareth Stace, director-general of UK Steel, said the government's commitment to the industry was "both vital and welcome". Information gathered in the consultation will be used to help form a "steel strategy", to be launched in the spring. Stace added a robust strategy "has the power to reverse the sector's decline, particularly as we face increasing competition from imports benefiting from more favourable business conditions". The Liberal Democrats have said the government urgently needs to prepare for retaliatory tariff. Deputy leader Daisy Cooper said the UK steel industry was being left "dangerously exposed" to the "devastating damage" Trump's tariffs could inflict.
