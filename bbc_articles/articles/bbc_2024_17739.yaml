content: |-
  Eyewitness video shows the malfunction that led to multiple injuries and several hospitalisations.

  Eyewitnesses have captured the moment fireworks misfired and accidentally exploded in crowds, injuring several people.

  The incident occurred during Independence day celebrations at LaVell Edwards Stadium in Utah.

  Emergency services attended to the injured, who sustained burns and other non-life-threatening injuries.
