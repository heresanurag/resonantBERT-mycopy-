content: |-
  A boy aged 16 and an 18-year-old man died in the crash in East Yorkshire, police say.

  Two teenagers killed in New Year's Day crash

  Police said the crash happened on Staithes Road near the village of Preston

  Two teenagers have died and seven other people were injured in a two-car crash in East Yorkshire. The collision between a Volkswagen Golf and a Vauxhall Grandland happened at about 01:20 GMT on New Year's Day in Staithes Road near the village of Preston, Humberside Police said. A boy aged 16 died at the scene and an 18-year-old man died later in hospital, the force added. Two other passengers in the VW, a 16-year-old girl and a 17-year-old boy, and a 62-year-old male passenger in the Vauxhall suffered life-threatening injuries.

  The Vauxhall driver, a 34-year-old woman, sustained a serious injury to her arm and two other passengers in the car suffered minor injuries. The VW driver, whose age has not yet been released by the police, suffered minor injuries. The families of the dead and injured had been informed and "are being supported by specialist trained officers at this extremely difficult time", police said. Investigators are appealing for witnesses and any dashcam or CCTV footage of the incident. Listen to highlights from Hull and East Yorkshire on BBC Sounds, watch the latest episode of Look North or tell us about a story you think we should be covering here, external.
