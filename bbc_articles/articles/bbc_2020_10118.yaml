  The statistics have been published ahead of the introduction of new rules forbidding groups of more than six people - and then from only two separate households - meeting up either inside or outside in Scotland.

  Children under 12 from the two households are not counted in "rule of six" which comes into force on Monday.

  But more than 1.75m people in Scotland are also constrained by further restrictions following a spike in cases in the greater Glasgow area.

  People in Glasgow city, Lanarkshire, East and West Dunbartonshire, Renfrewshire and East Renfrewshire cannot meet other households at their own homes.

  The latest figures show there were 104 new cases in the Greater Glasgow and Clyde health board area in the last 24 hours.

  There were also 62 in Lanarkshire, 25 in Lothian, 12 in the Borders and 11 in Ayrshire and Arran.

  The remaining positive cases were recorded in all of the remaining mainland health board areas.

  Meanwhile more than 868,000 have downloaded the Protect Scotland contact tracing app.

