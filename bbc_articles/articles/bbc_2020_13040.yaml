title: Partially sighted woman abused over social distancing - BBC News
date: '2020-11-11'
section: General
url: http://www.bbc.co.uk/news/uk-54911640
content: |-
  Linda Johnson, who is partially sighted, is in fear of leaving her house after receiving abuse for accidentally breaching social distancing guidelines.

  Linda Johnson, who is partially sighted, is now in fear of leaving her house after receiving abuse for accidentally breaching social distancing guidelines.

  Her guide dog is not trained in social distancing and does not recognise queues of people as anything more than an obstacle to bypass. She told the BBC's Simon McCoy about the difficulties she faces.
