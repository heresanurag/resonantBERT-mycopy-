title: Volunteers clear 156 dog poo bags from Scunthorpe playing fields - BBC News
date: '2025-04-05'
section: Lincolnshire
url: http://www.bbc.co.uk/news/articles/cy0x94w8w0yo
content: |-
  Scunthorpe Litter Pickers shares a picture of waste collected from Everest Playing Fields.

  The waste was cleared from the Everest Playing Fields in Ashby

  A group of volunteer litter pickers have cleaned a playground of 156 bags of discarded dog poo in one day. The waste was found on the Everest Playing Fields in Ashby near Scunthorpe. One of the refuse collectors, Jayne Eaton, described the field of faeces as "pretty grotty". "It's a shame because it's a lovely field, " she said.

  "There's a children's park over there and it's just a shame for the community and the local residents." Ms Eaton said the Scunthorpe Litter Pickers group posted a picture of the bags on social media to try and give dogwalkers "a bit of a conscience". "It was an idea to promote awareness and just make people feel a little bit guilty when it's out there to see," she said.

  Jayne Eaton says she hopes the social media post would give dog walkers "a bit of a conscience"

  The volunteers cleared the playground only to find freshly discarded bags of waste the next day. Ms Eaton said the group had discovered other items during their cleaning sessions, including a crisp packet dating back to 2002. Listen to highlights from Hull and East Yorkshire on BBC Sounds, watch the latest episode of Look North or tell us about a story you think we should be covering here, external.
