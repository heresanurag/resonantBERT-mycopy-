id: bbc_2018_10249
title: Nasa's Parker Solar Probe spacecraft launches successfully - BBC News
date: '2018-08-12'
section: General
url: http://www.bbc.co.uk/news/science-environment-45160552
content: |-
  Nasa's Parker Solar Probe spacecraft has taken off on its mission to 'touch the Sun'.

  The Parker solar probe spacecraft has been launched successfully by Nasa.

  The Delta-IV Heavy rocket - which was carrying the probe - launched at 03:31 local time (07:31 GMT) from Cape Canaveral in Florida.

  The satellite is designed to fly within six million kilometres of the Sun – closer than ever before.
