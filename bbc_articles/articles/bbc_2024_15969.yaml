title: 'Jessie J: Singer reveals OCD and ADHD diagnosis - BBC News'
date: '2024-07-20'
section: Culture
url: http://www.bbc.co.uk/news/articles/c4ng542yll3o
content: |-
  The British singer said that having a baby had "exposed" the conditions more.

  Singer Jessie J has revealed she was diagnosed with attention deficit hyperactivity disorder (ADHD) and obsessive compulsive disorder (OCD) three months ago. In a post on Instagram on Saturday, the Price Tag singer, 36, said it had made her "re-think" her whole life. She added that ADHD felt like "a superpower as long as you look at it from the right perspective". ADHD is a condition that affects people's behaviour. It can make sufferers seem restless, and they may have trouble concentrating and can act on impulse, according to the NHS website.

  OCD is a mental health condition where a person has obsessive thoughts and compulsive behaviours, the NHS says. Jessie J, whose full name is Jessica Cornish, said having a baby had "exposed" the conditions more. Her son, Sky Safir Cornish Colman, was born last year. In her post, she said there had been moments where she felt like she couldn't discuss her conditions, but added: "Here I am talking about it." She wrote: "In telling people a lot of the reaction I got was 'Yeah I mean we knew that' (which I'm sure some of you are doing right now) and of course I knew to some extent but having a baby has let's say... exposed it a lot more which was comforting in a way, as it made it feel less heavy and scary."
  • None Jessie J on The Voice Kids and surviving fame The British star, also known for hits such as Domino, said she knew she had been "a little different and felt things differently" her whole life. She added it was weird when one day, someone finally explained why. She acknowledged that ADHD was a "wide spectrum", adding: "I low key feel like it's a superpower as long as you look at it from the right perspective and have the right people around you that can navigate it with you." Jessie J said that social media had given her the opportunity to relate, connect and heal with strangers who are going through similar things. "I have always been honest in the journey I'm going through in life," she said. "And I know there are so many people that are going through this same thing and I'm honestly just reaching out to hold your hand and because I need mine held too." The singer said her diagnosis had made her love herself even more, adding: "I'm hugging 11-year-old me. "Who would clean her trainers with a toothbrush when she was stressed and to this day has lived with a 1000 lists to not feel like life will crumble. "Here's to getting to know yourself even more through life. "And loving yourself all the way." She concluded that nothing in life defines people, but rather helps them grow and become "a more wholesome version" of themselves.
