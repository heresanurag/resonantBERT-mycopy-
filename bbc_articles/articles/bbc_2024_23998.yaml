title: Grenfell victims still waiting for justice after damning report - BBC News
date: '2024-09-05'
section: UK
url: http://www.bbc.co.uk/news/articles/cpdl388e35wo
content: |-
  "We lost friends, neighbours and loved ones in the most horrific way," bereaved families say.

  Grenfell victims say they're still waiting for justice after damning report

  This video can not be played To play this video you need to enable JavaScript in your browser.

  Victims of the Grenfell Tower fire say they are still waiting for justice after a damning report blamed it on "dishonest" companies and a chain of failures by governments. A cladding manufacturer “deliberately concealed” fire risks, while coalition and Conservative governments “ignored, delayed or disregarded” concerns, the six-year public inquiry's final report concluded. Grenfell United, which represents some of the families, said the inquiry's report set out how corporate bodies involved were "little better than crooks". Natasha Elcock, a spokeswoman for the group, said: "Human life was never a priority, and we lost friends, neighbours and loved ones in the most horrific way - from greed, corruption."

  The fire in the west London tower block in June 2017 left 72 people dead - 54 adults and 18 children. Hisam Choucair, who lost six family members, thanked the inquiry for its findings but said waiting for its conclusion had prevented prosecutions. Police and prosecutors have said that investigators will need until the end of next year to complete their inquiry, with final decisions on potential criminal charges by the end of 2026. Prime Minister Sir Keir Starmer said it was "imperative" that there was "full accountability" for those responsible - including potential criminal prosecution - as soon as possible. London Mayor Sadiq Khan said: "Those responsible must now be immediately held to account." Everyone deserves the right to live in a safe home, he said, adding: "The road to justice is still too long and change must be delivered without any further delay." Ms Elcock demanded the government address the failings without delay, saying police and the Crown Prosecution Service must make sure they held those responsible accountable.

