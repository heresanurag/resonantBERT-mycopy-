title: 'Nuno Espirito Santo: Nottingham Forest manager gets three-match touchline
  ban - BBC Sport'
date: '2024-10-18'
section: Nottm Forest
url: http://www.bbc.co.uk/sport/football/articles/c4g5dk10g0go
content: |-
  Nottingham Forest boss Nuno Espirito Santo is banned from the touchline for three matches following his red card in the draw at Brighton.

  Nuno Espirito Santo (right) was sent off after Morgan Gibbs-White's dismissal

  Nottingham Forest boss Nuno Espirito Santo says he is "surprised" at being banned from the touchline for three matches for his red card in the draw against Brighton last month. Midfielder Morgan Gibbs-White, who was also charged for his reaction to being dismissed in the 2-2 draw, has been suspended for one game. Gibbs-White was sent off in the 83rd minute after receiving a second booking, with Nuno and Brighton boss Fabian Hurzeler both red carded in the aftermath. "I'm surprised - it's a big sanction but there's nothing we can do," said Nuno. "We had a hearing, everything was normal. The sanction has been decided. Let's go." Meanwhile, Forest say they will appeal a five-match stadium ban handed to owner Evangelos Marinakis. He was found guilty of improper conduct following Forest's defeat against Fulham in September. As well as a three-match ban, Nuno was fined £55,000 and Gibbs-White £20,000. A Football Association statement, external read: "It was alleged that the Nottingham Forest head coach [Nuno] acted in an improper manner and/or used abusive and/or insulting words towards a match official. "The Nottingham Forest midfielder [Gibbs-White] allegedly acted in an improper manner and/or used abusive and/or insulting words towards the fourth official after being sent off. "It was alleged that the Brighton and Hove Albion manager [Hurzeler] acted in an improper manner."

  It said Nuno, Gibbs-White and Hurzeler all admitted to their respective charges, with the punishments enforced by the independent regulatory commission. Forest had asked for more time to prepare a response having initially been given until 27 September. Nuno apologised for his reaction to the officials, including referee Rob Jones and fourth official Anthony Taylor, and had hoped his contrition would lead to leniency. However, not only was the Portuguese manager given a two-match ban for this specific incident, a one-game suspended ban - for comments following Forest's 2-0 defeat at Everton in April - was also activated. Marinakis, 57, was charged with improper conduct following a 1-0 defeat against Fulham at the City Ground on 28 September. The charge, which related to the owner's behaviour around the tunnel area at full-time, came after Forest's unbeaten start to the season came to an end following a VAR-awarded penalty to Fulham in the 51st minute. Marinakis denied the charges but the independent regulatory commission found him guilty. Last week, the club was fined £750,000 after a social media post in April that criticised the appointment of Stuart Attwell for Forest's 2-0 defeat against Everton at Goodison Park.
