title: Wonky lamb with wobbly walk becomes internet star - BBC News
date: '2025-04-12'
section: General
url: http://www.bbc.co.uk/news/videos/cy5rr66246wo
content: |-
  When owner Rhoda Meek decided to share Wonky on her social media, she quickly attracted attention.

  A lamb born on the Isle of Tiree has become an internet star, thanks to her bent neck and wobbly walk.

  Wonky the lamb is thought to have been squashed in the womb by her larger brother, causing the condition.

  Croft owner Rhoda Meek decided to share Wonky on her social media accounts, and she quickly attracted attention.

  She said: "This little lamb had a wonky, bent-backed neck and I wasn't very sure if she'd be able to drink from her mother.

  "I had to feed her by tube and then I started working with her to see if we could get her drinking from her mum - and she has absolutely thrived.

  "She's doing great, her neck is straightening out and she's now out in the fields with some friends, which is lovely."
