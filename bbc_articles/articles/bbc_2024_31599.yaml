content: |-
  The BBC's Bethany Bell reports from the empty Magdeburg market, on what should be one of the busiest nights of the season.

  Germany is in mourning after a car ploughed into crowds at a Christmas market in the city of Magdeburg, leaving five people dead and more 200 injured.

  As the BBC's Europe correspondent Bethany Bell reports, this is not the first time Germany has dealt with a Christmas market vehicle attack.

  While the government has promised an investigation, many Germans are wondering how such an incident could happen again.
