  Scotland draft Matt Currie, Nathan McBeth and Ben Muncaster into their squad for this weekend's Six Nations game against Wales.

  Scotland call up trio as Crosbie and Mann drop out

  Matt Currie has four caps for Scotland

  Coverage: Watch on BBC One, listen on Radio 5 Live, BBC Radio Scotland & BBC Sounds; text commentary and highlights on BBC Sport website and app.

  Matt Currie, Nathan McBeth and Ben Muncaster have been called into the Scotland squad for this weekend's Six Nations game against Wales but back rows Luke Crosbie and Jack Mann have been ruled out by injury. Centre Currie is recalled after scoring a hat-trick for Edinburgh against Munster on Friday as he returned from the concussion sustained against Zebre. Muncaster, who has one cap, also started in Edinburgh's memorable win in Cork and provides cover following the injuries to Crosbie and Mann. Glasgow prop McBeth, who scored a try at the end of their tight defeat against Ospreys, has also joined the squad. Crosbie was replaced early on in Edinburgh's game on Friday night and has returned to his club for further assessment. Mann picked up a head injury in Warriors' game on Friday and is undergoing World Rugby's concussion protocols. Scrum-half Ali Price and winger Ross McCann have also returned to Edinburgh. Scotland lost against Ireland and England following their opening-weekend victory against Italy while Wales sit bottom of the Six Nations table after three defeats.

