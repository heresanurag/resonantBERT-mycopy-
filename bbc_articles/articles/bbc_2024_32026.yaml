title: Man suspected of Milton Keynes double murder remains in custody - BBC News
date: '2024-12-27'
section: Beds, Herts & Bucks
url: http://www.bbc.co.uk/news/articles/c9dp4qe9l2vo
content: |-
  As detectives continue to question a 49-year-old man, residents place flowers close to where two women died.

  Residents have been told there will be a large police presence in the area while the murder investigation goes on

  A man arrested on suspicion of murder after two women died in a suspected stabbing on Christmas Day remains in custody, police have said. The 49-year-old from Milton Keynes, Buckinghamshire, is also being held on suspicion of attempted murder after a man in his late 20s and a teenage boy were taken to hospital with serious injuries. Thames Valley Police said they were both in a stable condition after the incident in Santa Cruz Avenue in Newton Leys, Bletchley. The force said an injured dog, originally believed to have died, had survived. Sophie Pritchard, a local resident, told BBC Look East: "It's just awful what's happened, tragic... something like this shouldn't be happening anywhere."

  Sophie Pritchard placed flowers near the scene

  Officers were called at about 18:30 GMT on Wednesday to the scene where the two women, aged 38 and 24, died. A large cordon was in place on Thursday and a forensics team could be seen walking up the stairs of a block of flats. Numbered yellow evidence markers and first aid kits were visible on the road and pavement outside the address, and on the boot of a car parked on the adjoining Trinidad Grove. Flowers have since been left close to the police cordon. Ed Hume, a Milton Keynes city councillor, said: "The community here in Newton Leys is a strong community, it's a close knit community that looks out for each other and I know it is shocked and saddened."

  Tracey Howard, another resident, said she was "really shocked" and "upset"

  Det Ch Insp Stuart Brangwin extended his "deepest condolences to the families of the women who have tragically died in this shocking incident". He added: "We have launched a double murder investigation which may be concerning to the wider public, however we have made an arrest and are not looking for anyone else in connection with this incident and the parties are known to each other. "Members of the public will see a large police presence in the area while our investigation takes place. "If you have any questions or concerns, please feel free to approach our officers and they will do their best to help."

