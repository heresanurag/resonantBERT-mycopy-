  I should have been in England's Euros squad - Grealish

  Manchester City's Jack Grealish believes he should have been part of England's Euro 2024 squad and "can't speak highly enough" of interim manager Lee Carsley. Grealish, 29, was "devastated" after being omitted from Gareth Southgate's 26-man squad for the tournament, in which England lost to Spain in the final. However, Carsley has started the City playmaker in both games he has overseen since replacing Southgate on a temporary basis. "I will be honest with you - I didn't really agree with it," Grealish told BBC Radio 5 Live. Grealish admitted he felt he "didn’t have the best season" for his club, but added: "You need a bit of a balance in every position on the pitch and I class myself [as] quite an experienced player now. "I have won a lot of stuff now so, you asked me should I have gone, yes, I still think I should have, but obviously it wasn’t meant to be." On whether he felt he had a point to prove on his return to the England squad for September's internationals, he said: "Of course, I wanted to come here and train well and play well. "I thank the manager Lee Carsley for giving me that chance and having that trust in me. "It obviously really meant a lot, I think throughout my career when I have played under managers who have shown trust in me and communicated with me the way he has the last two camps, it really helps me. "It makes me feel that the manager really does rate me and I can't speak highly enough of him since I have been here." England recorded 2-0 victories over the Republic of Ireland and Finland in the first games under Carsley last month, with Grealish scoring against the former. A British record £100m signing when he joined City from Aston Villa in August 2021, Grealish will again hope to be in the starting line-up when England host Greece on Thursday, before taking on Finland on Sunday. And while Grealish believes missing out on Euro 2024 was "probably the most difficult period of my life", he said the birth of his daughter last week was "the best moment of my life". In an "unbelievable 24 hours", Grealish had to leave training and take a train to London on Friday morning to be present for the birth, before flying to Newcastle - arriving after midnight - and starting for City in the Premier League at midday on Saturday. "I don't really know how to explain it, you know you feel so many good moments in your life but that just tops everything," Grealish said.

