  Tottenham striker Dominic Solanke says it "means so much" to be making his return to the England squad following a seven-year absence. The 27-year-old was last included in a Three Lions squad when he made his one and only appearance as a substitute against Brazil in 2017. "I've worked very hard to get back to this moment," Solanke said on Tuesday. "It's just part of football. Everything happens at the right time for you. Everyone's journey is different. "I wouldn't have it any other way. I feel like this is the way it had to be for me and I feel like my game is clicking now." Solanke was signed by Spurs in a deal worth up to £65m this summer after he scored 19 goals in 38 Premier League appearances for Bournemouth last season. He has netted three goals in eight games for Tottenham so far, after the start of his career in north London was disrupted by an ankle injury, and could be in line to start for England on Thursday with captain Harry Kane a doubt to face Greece. "I always believed that I would get back here, so that was my mindset, and that's one of the things I was working towards," Solanke said. "I'm thankful to be back here now, and hopefully I can stay here. "That's what the dream is, to represent your country, no matter how many times, it's always the same."
