content: |-
  Olga Freeman, 40, is accused of killing Dylan Freeman, described as a "beautiful, bright" child.

  Olga Freeman is accused of killing her son Dylan

  A mother has appeared in court charged with murdering her 10-year-old son who was found dead in a west London house.

  Dylan Freeman's body was discovered in a property in Cumberland Park, Acton, after a woman called at a police station in the early hours of Sunday.

  Olga Freeman, 40, of Cumberland Park, appeared before Uxbridge Magistrates' Court and was remanded in custody.

  The boy's father, Dean Freeman, described him as a "beautiful, bright, inquisitive and artistic child".

  He said he "loved to travel, visit art galleries and swim".

  "I can't begin to comprehend his loss," he added.

  The body of Dylan Freeman was found at a house in Cumberland Park, Acton, on Sunday

  A spokesperson for Mr Freeman said the celebrity photographer had been in Spain "when he heard the shocking and heart-breaking news, and is beyond devastated".

  He is also the son of Robert Freeman who photographed the first five album covers for The Beatles.

  Olga Freeman is due to next appear at the Old Bailey on 19 August.

