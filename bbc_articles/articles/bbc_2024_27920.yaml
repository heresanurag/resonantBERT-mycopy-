title: Monaco agrees extension to host Formula 1 until at least 2031 - BBC Sport
date: '2024-11-14'
section: Formula 1
url: http://www.bbc.co.uk/sport/formula1/articles/c2e71dmn20ko
content: |-
  Monaco will continue to host Formula 1 races until at least 2031 after a new six-year deal is agreed.

  Monaco will continue to host Formula 1 races until at least 2031 after a new six-year deal was agreed. One of the sport's most iconic and prestigious races, the Monaco Grand Prix has hosted races every year since 1955, other than during the Covid-affected 2020 season. In recent years, it had been under pressure to modernise, but after organisers bowed to pressure from F1 over television broadcast and on-track advertising, its place on the calendar was secured. There remain questions about the the suitability of the principality's narrow streets for racing modern F1 cars, and the lack of overtaking, but no changes to the circuit are in the offing because of the difficulty of altering the layout. As part of the new deal, the race will move to the first full weekend in June from 2026. F1 has provided no explanation for Monaco moving from its traditional date on the last weekend in May from 2026. However, the sport has been pressuring the organisers of the Canadian Grand Prix in Montreal to move its early June date so that race can be twinned with the Miami event, which is held in early May, for sustainability reasons. So Monaco's date moving could indicate Canada moving to May from 2026, although there has been no confirmation of that. "I'm delighted that Formula 1 will continue to race in Monaco until 2031," said Formula 1 president and chief executive Stefano Domenicali. "The streets of Monte Carlo are unique and a famous part of Formula 1, and the Monaco Grand Prix remains a race that all drivers dream of winning."

  Ferrari’s Charles Leclerc won the 2024 Monaco race, becoming the first Monegasque driver since 1931 to win their home grand prix. In 2022, Leclerc said dropping the race from the calendar would be a "bad move". One of the most glamorous events in sport, it was first staged in 1929 and appeared on the first world championship calendar in 1950. But, with F1's owners Liberty Media keen to grow the sport, there have been doubts about its future in the expanded calendar. There are a record 24 races scheduled for the 2024 season. Crowds in Monaco are relatively small because of limited space while it pays a relatively small hosting fee compared to other races. Overtaking is also notoriously difficult on the street circuit, leading to complaints about the quality of racing. Michel Boeri, president of the Automobile Club of Monaco, added: "The signing of this new agreement with the Formula One Group until 2031 not only confirms the strength of our relationship but reaffirms our commitment to offering all visitors an unrivalled, first-class experience at race weekends. "The Monaco Grand Prix is the most important sporting event here and continues to attract hundreds of thousands of spectators to the principality and millions of global television viewers worldwide."
