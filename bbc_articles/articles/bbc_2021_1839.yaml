  Nadhim Zahawi pays tribute to those working "night and day" on this "huge logistical endeavour".

  Analysis: Are deaths starting to come down in the UK?

  The number of people who have died within 28 days of a positive coronavirus test in the UK has risen by another 915 today. It means the death toll by this measure is now in excess of 110,000. But after weeks of mounting deaths since mid-December, there are positive signs deaths are finally reducing. In the past week, daily recorded deaths have been lower than every corresponding day in the previous week. And the last time the daily deaths figure was below 1,000 (apart from on a Sunday and Monday when the numbers are usually much lower because of delayed reporting after a weekend) was on 5 January. That was just as lockdown restrictions were being introduced and children were told not to return to school for the new term. Much has changed since then: Hospitals have been under intense pressure because of Covid-19 and millions of people have been vaccinated against the disease. Confirmed cases and hospital admissions have been falling – usually an early indication that the numbers dying will also follow. However, there are clear warnings from health officials that there should be no complacency. Vaccinating the most vulnerable will reduce deaths initially, but it will take many millions more vaccinations for all the over-50s and those with underlying conditions to really reduce the pressure on the country’s hospitals.
