content: |-
  The rapper is awarded an honorary degree for helping black students get into higher education.

  The rapper took a selfie with students after receiving his degree from Cambridge University

  Stormzy has been awarded an honorary degree from the University of Cambridge for his work helping black students get into higher education. The 31-year-old received a Doctorate in Law for his "transformative" scholarship programme, which funds black UK students to study at the university. Stormzy, whose real name is Michael Ebenazer Kwadjo Omari Owuo Jr, launched the Stormzy Scholarship in 2018. Prof Deborah Prentice, vice-chancellor at the university, said: "Stormzy's scholarship programme has had a transformative impact and we are proud to recognise his work with this degree."

  Stormzy was awarded an honorary degree at the university on Wednesday

  So far, 56 undergraduates have benefited from full tuition and maintenance support, backed by his #Merky Foundation and HSBC UK. When he launched the scheme, Stormzy said: "It's so important for black students, especially, to be aware that it can 100% be an option to attend a university of this calibre." The rapper was among eight public figures to receive the honorary degree.

  Dame Katherine Grainger became the first female chair in the 119-year history of the British Olympic Association in November

  Other recipients included Lady Arden of Heswall, a former justice of the UK Supreme Court who was honoured with a Doctorate in Law, and Olympic gold medallist Dame Katherine Grainger, who was awarded the same honour. Acclaimed actor Sir Simon Russell Beale was awarded a Doctorate in Letters, as was US political activist and author Professor Angela Davis. Prof Prentice added: "Each of this year's honorary graduands has made an extraordinary contribution to their field, and their work continues to inspire people in Cambridge and around the world."

