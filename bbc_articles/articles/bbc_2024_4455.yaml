title: 'Newspaper headlines: Frank Hester ''gave £5m more'' and Russia ''jams Shapps
  jet'' - BBC News'
date: '2024-03-15'
section: The Papers
url: http://www.bbc.co.uk/news/blogs-the-papers-68571798
content: |-
  The latest from the row around Tory donor Frank Hester and an incident over the Baltic Sea lead the papers.

  An RAF jet carrying Defence Secretary Grant Shapps reportedly suffered a satellite blackout following a Russian attack on its systems

  The Guardian is unimpressed by the government's new definition of extremism. The paper's leader column suggests that the measure, announced by the Communities Secretary Michael Gove, is more likely to stoke divisions in society than ease them. "Had community cohesion and tackling hatred truly been a priority," it states, "a full public consultation and proper engagement with faith groups would have been the right way forward."

  But the Times takes a more positive view, arguing that the definition will provide "useful guidance" to public bodies. "There is always the danger," it says, "that in a tolerant society like Britain's, extremist groups will try to cosy up to officialdom - by portraying themselves as representatives of community opinion or special interests." The paper concludes that publishing a list of groups deemed to pose a threat to democracy is "a reasonable exercise in due diligence".

  The headline in the i reads: "No 10 anxiety grows as angry Tories question Sunak authority". The paper quotes an unnamed Conservative source saying that recent setbacks for the prime minister have left the mood among some backbenchers shifting from "resigned" to "actively angry".

  "Working hours for Commons hit record low under Sunak" is the lead in the Financial Times. It has conducted an analysis suggesting the average duration of a Commons sitting day in the current parliamentary session has been seven hours and nine minutes. The paper says this is shorter than in any other session in the past quarter-century. Opposition parties say this suggests the administration is running out of steam, but a spokesman for the Commons leader, Penny Mordaunt, insists the government has a "packed legislative agenda".

  The The Daily Telegraph is concerned about plans by NHS England to conduct trials of electric ambulances. It reports that pilot schemes are due to begin in several parts of the country next month. A spokesman for the College of Paramedics is quoted saying: "If I have a very sick patient and I am trying to get them to hospital, I don't want to be worrying about the battery." But the NHS tells the paper that, while patient care comes first, "it is also right that we seek green alternatives".

  "Russia attacks Shapps RAF jet by jamming GPS", says the Daily Mail. The paper says an aircraft carrying Defence Secretary Grant Shapps suffered a satellite and communications blackout close to Russian territory. A defence expert tells the Sun that such an attack was "wildly irresponsible". He adds that "while the RAF are well prepared to deal with this, it still puts an unnecessary risk on civilian aircraft and potentially endangers lives".

  And the Daily Mirror reports on what could be "Britain's smartest dog". Max, a border collie, has learned the names of all 231 of his toys. The paper explains that owners Martin and Helen Morris line up a selection of toys every night and shout out their names - and Max is able to correctly identify and fetch them. There's still work to do to break the international record, however. The paper says a collie in the United States has learned the names of more than 1,000 toys.

