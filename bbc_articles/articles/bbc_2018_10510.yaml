title: Huge blaze at Liverpool's Littlewoods Pools building - BBC News
date: '2018-09-03'
section: General
url: http://www.bbc.co.uk/news/uk-45392402
content: |-
  The art deco Littlewoods Pools building is a landmark in the city but has been empty for years.

  Firefighters are battling a large fire at the Littlewoods Pools building on Edge Lane.

  The five-storey art deco building is a local landmark and has been empty for years.
