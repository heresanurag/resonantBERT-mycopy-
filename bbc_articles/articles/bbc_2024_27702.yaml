content: |-
  The news comes a day after confirmation that he will leave the BBC's Match of the Day.

  Lineker was nominated for Sports Personality of the Year before becoming its co-host

  Gary Lineker has stepped down as co-presenter of the BBC's Sports Personality of the Year, following the news that he will leave Match of the Day, the corporation has confirmed. The annual ceremony recognises the UK-based sportsperson who has had the year's most notable achievements - chosen by a public vote. A BBC spokesperson said on Wednesday: "After 23 years, last year's 70th anniversary was his final show." Lineker's final appearance saw him present alongside Clare Balding, Gabby Logan and Alex Scott, with England goalkeeper Mary Earps crowned BBC Sports Personality of the Year 2023.

  Lineker and Gabby Logan presented the trophy to England goalkeeper Mary Earps last December

  Lineker's decision to step back comes a day after it was confirmed that he will stop hosting the BBC's long-running football highlights show Match of the Day at the end of the current season. However, the 63-year-old has signed a contract extension with the BBC through to the 2026 men's World Cup, and will also front the corporation's coverage of next season's FA Cup.
  • None Who could replace Lineker on Match of the Day?
  • None How Gary Lineker went from football sensation to BBC star The former England striker-turned-broadcaster will also continue with the MOTD Top Ten podcast, and his popular The Rest is Football podcast will now be hosted on BBC Sounds. The podcast features Lineker, Alan Shearer, and Micah Richards discussing the latest football news along with stories from their careers, and is part of Goalhanger productions, co-founded by Lineker. In a statement on Tuesday, Lineker said: "I'm delighted to continue my long association with BBC Sport and would like to thank all those who made this happen."
