title: Starmer warns Russia attacks in Ukraine risk global food security - BBC News
date: '2024-10-23'
section: Politics
url: http://www.bbc.co.uk/news/articles/c3vkv4kwr06o
content: |-
  Despite the war, Ukraine is still a significant supplier of agricultural goods including grain.

  Prime Minister Sir Keir Starmer has warned that Russia is stepping up attacks on Ukrainian ports in the Black Sea – delaying the export of agricultural produce, including aid intended for Palestinians caught up in the conflict with Israel. During several days of strikes in early October, Russian weapons hit at least four cargo ships, including one reportedly carrying 6,000 tonnes of corn. Sir Keir said that Russia’s President Vladimir Putin was willing “to gamble on global food security in his attempts to force Ukraine into submission”. The prime minister's remarks came as he travels to the Pacific Island of Samoa for a meeting of Commonwealth heads of government.

  During several days of strikes, Russian missile strikes on the Odesa region hit a Panamanian-registered ship and a Palau-flagged cargo ship were also attacked, killing one person on-board. Several people in the southern city of Zaporizhzhia were injured as 29 homes were destroyed and pictures released by regional officials show a giant crater in the mud, with bricks and wood strewn all around. A wave of strikes on Ukraine's Black Sea ports coincided with a European tour by President Volodymyr Zelensky - who visited leaders in London, Paris, Rome and Berlin. But Sir Keir pointed out the increasing number of Russian attacks coincided with harvest season. Despite the war, Ukraine is still a significant supplier of agricultural goods. But British intelligence suggests a growth in what officials call Russian "risk appetite” when attacking Ukrainian ports – with grain ships becoming what is described as “collateral damage” in Russia’s campaign. Sir Keir said the “indiscriminate attacks” were “harming millions of vulnerable people across Africa, Asia and the Middle East”. According to Ukrainian figures, more than 20 civilian ships have now been damaged in Russian attacks since the start of the war in 2022. Grain silos and other port infrastructure have been badly damaged too. However, Ukraine has succeeded in creating a maritime corridor to ensure the safety of grain exports, after Moscow pulled out of a Black Sea grain deal last year. Some 962,000 tonnes of grain were exported in the first ten days of October, according to the agriculture ministry in Kyiv - double the volume shipped in the same period last year. Speaking to journalists travelling with him to Samoa, Sir Keir said Russia’s recent recruitment of troops from North Korea was “an embarrassing and desperate act. On Tuesday, the British government announced that it would give Ukraine an extra £2.26bn using the profits from Russian assets held in Europe. The one-off payment is an addition to £3bn already pledged by the government to fund Ukraine’s war effort. So far, the UK has given more than £12bn in military aid and has promised to match that level of support in the future. Announcing the funding, Chancellor Rachel Reeves said it showed the UK's support for Ukraine was "unwavering and will remain for as long as it takes".
