  Palmer may have missed out on one award but he did not come away empty-handed. The 22-year-old scored 22 goals in 34 Premier League appearances in his first season for Chelsea. His form earned him a spot in the England squad for Euro 2024 and Palmer scored in the final which the Three Lions lost 2-1 to Spain. The Blues forward beat Arsenal's Bukayo Saka, Manchester United duo Kobbie Mainoo and Alejandro Garnacho, former Crystal Palace player Michael Olise and Brighton's Joao Pedro to the young player prize. In the women's categories, Manchester City's Khadija Shaw won the player of the year award and Manchester United's Grace Clinton was named young player of the year.

  The Premier League team of the year, as voted for by players, was dominated by Manchester City and Arsenal players. Kyle Walker, Rodri, Erling Haaland and Phil Foden feature from the reigning champions, while David Raya, William Saliba, Gabriel, Declan Rice and Martin Odegaard feature from the Gunners. Liverpool defender Virgil van Dijk and Aston Villa forward Ollie Watkins are also included.
