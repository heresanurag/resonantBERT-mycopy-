content: |-
  Manchester City midfielder Phil Foden wins the PFA men's player of the year award, while Chelsea winger Cole Palmer is named young player of the year.

  Phil Foden (left) and Cole Palmer used to play together at Manchester City

  Manchester City midfielder Phil Foden has won the Professional Footballers' Association men's player of the year award, while Chelsea winger Cole Palmer was named young player of the year. It is the first time since the 2009-10 campaign that both men's awards have gone to English players. Wayne Rooney and James Milner won the player and young player of the year prizes respectively for that season. "To win this award is something very special and it is one that I am very proud of and grateful for," said Foden. "To be recognised this way by your fellow professionals means everything and I would like to thank everyone who voted for me. "Last season was another very special one for everyone at the club, but now all our focus is concentrated on trying to achieve more success this term." Foden scored 19 goals in 35 top-flight appearances in 2023-24 as City won a historic fourth successive Premier League, and - aged 23 - he became the youngest player to have won six league titles. This is the first time the Stockport-born playmaker has been the PFA's player of the year, having twice been selected as the best young player. He also won the 2023-24 Premier League player of the season award and was named the Football Writers' Association (FWA) footballer of the year. Foden beat his City team-mates Erling Haaland, who won the award last year, and Rodri, as well as Chelsea's Palmer, Arsenal's Martin Odegaard and Aston Villa's Ollie Watkins who were on the shortlist.

