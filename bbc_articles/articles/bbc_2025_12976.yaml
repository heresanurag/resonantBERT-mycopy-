title: London Ambulance worker says patient attack was like horror film - BBC News
date: '2025-06-27'
section: London
url: http://www.bbc.co.uk/news/articles/crrqzdrw551o
content: |-
  A drunk patient was filmed throwing bricks at ambulance workers and smashing their windscreen.

  'Patient attack on me was like a horror film'

  Harvey Jenkins, 25, was hit by a brick thrown at his ambulance by a drunk, aggressive patient

  A pair of London ambulance workers said they felt like they were trapped in a "horror film" after a drunk patient became aggressive, kicked through their windscreen and threw bricks at them as they tried to help him. Harvey Jenkins said he and colleague Tom Pursey were covered in broken glass in the attack that "went on and on" after being called out to a housing estate in Rotherhithe, south-east London, last August. London's chief paramedic Pauline Cranmer said it was a "deeply disturbing and sustained attack" and said assaults like these were on the rise. The attacker, Seiitbek Uulu, admitted assaulting an emergency worker, damaging property and being drunk and disorderly in public.

  The London Ambulance Service (LAS) said the attack on 24 August unfolded as Uulu was being checked out by the medics. The patient left the ambulance appearing to be in distress and said he was looking for his bike, Mr Jenkins said. "My crewmate got out to help him look for it but then I heard the emergency button go off and I knew he was in trouble. "The patient was chasing him and threatening him."

