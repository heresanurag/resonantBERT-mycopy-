  The pair got into the front of the ambulance and tried to drive away, but as they set off, Uulu jumped on to the bonnet of the ambulance, the LAS said. Mr Harvey, 25, said: "He was punching and stamping on the windscreen until he got his foot through it. We were in disbelief and got into the back of the ambulance to get away. "It felt like a horror film, as it went quiet, but then suddenly he was punching the windows and throwing bricks and concrete trying to hit us. "The attack just went on and on. "We didn't know whether to go out and tackle him or stay in the ambulance – we just felt trapped." Mr Harvey was hit by a brick, although he was not seriously hurt. Police were called and Uulu was apprehended soon afterwards, while the ambulance was taken off the road for repair. Uulu, 33, of Gibsons Hill, Southwark, was sentenced last month at Croydon Magistrates' Court and ordered to pay a fine of £114, abstain from alcohol for four months and complete 150 hours of community service.

  Ms Cranmer said: "This was a deeply disturbing and sustained attack on an ambulance crew who were simply trying to help. "Attacks on ambulance workers are increasing and sentences should reflect the impact crimes like this have." According to LAS data, incidents of violence and abuse against ambulance workers have been on the rise in recent years, with an 11.3% increase in 2024 compared with 2023. Jason Killens, chair of the Association of Ambulance Chief Executives, said he believed the sentence handed to Uulu was "disproportionately low" given the "level of violence" towards the ambulance crew. "This appalling behaviour has a major long-term impact on the health and wellbeing of ambulance people, but the situation appears to be getting worse, with low rates of conviction and weak sentences issued to offenders who do not see them as a serious deterrent," he said.
