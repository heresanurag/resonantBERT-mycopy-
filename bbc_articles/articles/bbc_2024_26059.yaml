title: Labour volunteers in US helping Harris in spare time, Keir Starmer says - BBC
  News
date: '2024-10-23'
section: Politics
url: http://www.bbc.co.uk/news/articles/c62m2pde4p6o
content: |-
  The prime minister said volunteers from his party travelled to the US for "pretty much every" presidential election.

  Prime Minister Sir Keir Starmer has played down the significance of alleged interference by the Labour Party in the US presidential election. The Trump campaign has filed a complaint with the Federal Election Commission in Washington seeking an immediate investigation into alleged "blatant foreign interference". Sir Keir, who met Trump last month, said party staff going to the US to campaign for Democratic candidate Kamala Harris were volunteers "doing it in their spare time" and staying with other volunteers. Environment Secretary Steve Reed told the BBC the Labour Party had not funded or organised their trips, while Deputy Prime Minister Angela Rayner also insisted the activists had been campaigning "in their own time".

  Defence Secretary John Healey suggested the Trump campaign was “creating controversy" ahead of the presidential election on 5 November. Foreign nationals are permitted to volunteers in political campaigns in the US as long as they are not compensated, according to Federal Election Commission rules. Labour Party sources insist no one has done anything wrong, but there is undeniable awkwardness around tension with Trump, who could be elected as president in a fortnight. Labour officials have invested significant energy in trying to forge links with the Trump campaign, both in opposition and now in government, which could now be at risk. The row was sparked by a now-deleted social media post from Labour's head of operations, Sofia Patel, that she had about 100 current and former party staff heading to America before polling day. The LinkedIn post said she had “ten spots available” for anyone willing to travel to North Carolina to campaign for Harris, adding “we will sort your housing”. The ensuing complaint from the Trump campaign, external is both pointed and theatrical. In a reference to US winning its war of independence nearly 250 years ago, it says: "When representatives of the British government previously sought to go door-to-door in America, it did not end well for them."

  The Trump campaign complaint to the commission flags that senior Labour Party staff attended the Democratic convention in Chicago and met Harris’s campaign team, naming Morgan McSweeney, the prime minister’s chief of staff, and Matthew Doyle, Downing Street director of communications. Deborah Mattinson, Sir Keir’s former director of strategy, was also named as someone who travelled to Washington in September to brief Ms Harris’ presidential campaign on Labour’s election-winning approach. It is understood from Labour officials that Labour met McSweeney’s costs, while Doyle was hosted by the Progressive Policy Institute, a US think tank. But the officials said it would be wrong to suggest either man had advised or assisted the Harris campaign, adding that Labour sends a delegation to each Democratic convention. Officials also pointed out that Mattinson left the Labour party staff after July's general election in the UK. Sir Keir briefly addressed the issue during a flight to the Commonwealth Heads of Government Summit in Samoa in the South Pacific. He told reporters: “The Labour Party has volunteers, [they] have gone over pretty much every election. "They’re doing it in their spare time. They’re doing it as volunteers. They’re staying I think with other volunteers over there.” Asked if the row risked jeopardising his relationship with Donald Trump, the prime minister said “no” – pointing to the dinner the two men had together at Trump Tower in New York last month.

  “We established a good relationship. We’re grateful for him for making the time... for that dinner," Sir Keir said. "We had a good, constructive discussion and, of course as prime minister of the United Kingdom I will work with whoever the American people return as their president in their elections, which are very close now.” But he has met President Biden several times since becoming prime minister in July. Speaking on BBC Breakfast, Reed said UK volunteers campaigning in US elections was "not unusual". “It’s up to private citizens how they use their time and their money, and it’s not unusual for supporters of a party in one country to go and campaign for a sister party in another, it happens both ways round and across many many countries. "But none of this was organised or funded by the Labour Party itself, these are individual people making their own choices as they are free to do." Reed highlighted the UK's "longstanding special relationship" with the US, adding the Labour government would "work closely with whoever the people of the United States elect as their president in November". He said Sir Keir had "a very useful and respectful dinner" with Trump in New York last month, in addition to meeting President Biden in the White House. In an interview with BBC Radio Sheffield, Healey said: "I think this is Trump’s campaign doing what campaigns do - creating controversy during an election". "As far as the government goes, we’re looking beyond the election and will work with whatever president the American people elect." Asked about Patel's LinkedIn post, Healey added: "Most people’s LinkedIn accounts do signify what they tend to do in their professional life as well, but they’re personal accounts."

