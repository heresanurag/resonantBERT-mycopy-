title: 'PMQs: Does Corbyn call May a ''stupid woman''? - BBC News'
date: '2018-12-19'
section: General
url: http://www.bbc.co.uk/news/uk-politics-46619702
content: |-
  The prime minister teases the Labour leader about his bid for a confidence vote, and he does not look impressed.

  The prime minister teased the Labour leader about his bid for a confidence vote, with a series of panto references.

  But Jeremy Corbyn did not look impressed, and although microphones did not pick up what he muttered in response, many commentators and MPs believe he mouthed: "Stupid woman".

  Corbyn: I did not use the words 'stupid woman'
