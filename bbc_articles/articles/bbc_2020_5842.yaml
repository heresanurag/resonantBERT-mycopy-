content: |-
  Developments from Wales as the chancellor said the furlough scheme will continue until October.

  In an update to a story we brought you earlier, the Senedd petition committee has said a petition calling for the funeral costs of NHS staff who die with coronavirus to be covered by the public purse should be taken forward.

  Some 400 people have signed the petition submitted by Cardiff University academics Professor Jane Henderson and Professor Karin Wahl-Jorgensen.

  The Welsh Government has said a £60,000 death-in-service benefit announced last month should help cover financial hardship.

  Members of the Senedd's petition committee today said they would like to write to Health Minister Vaughan Gething for more details.

  Rhondda MS Leanne Wood said: "Yes, there's been a commitment to pay a death-in-service benefit to NHS salaries, but this is something separate."

  She said the issue was "much wider" than just NHS workers, saying: "There are care workers, there are people in the supermarkets, people driving with food, people driving taxis and buses.

  "There are a whole range of people - people who collect our refuse and so on - who are low-paid, in the main, and face serious risk.

  "Their families should not be facing this extra financial burden in the terrible, terrible situation where they lose a loved-one because of this.

  "So, I think all workers who have died as a result of Covid, in the work that they do, deserve to have their funerals covered by the state at the very minimum."
