title: 'World Cup 2022: German media and pundits react to group stage elimination
  - BBC Sport'
date: '2022-12-02'
section: General
url: http://www.bbc.co.uk/sport/football/63832705
content: |-
  Germany's elimination in the World Cup group stages for the second time in a row has led to a scathing reaction in the media at home.

  Last updated on .From the section World Cup

  If Germany thought the reaction to their elimination at the 2018 World Cup in Russia was bad, wait until they see the headlines back home this time.

  Despite their 4-2 win over Costa Rica on Thursday, Hansi Flick's side were eliminated in the group stages for the second successive World Cup as Japan topped the group following their 2-1 victory against second-placed Spain.

  For the four-time winners, whose most recent triumph was in Brazil only eight years ago, it is a steep decline.

  The German press, former players and pundits have had their say on the nation's premature World Cup exit - and the future of manager Flick with Germany set to host Euro 2024.
