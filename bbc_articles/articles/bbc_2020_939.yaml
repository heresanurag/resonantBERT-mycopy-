title: Burglar cooks snack in Taco Bell then falls asleep - BBC News
date: '2020-01-09'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-51056092
content: |-
  A Georgia man who broke into a Taco Bell overnight paused to make himself some food and take a nap.

  A man who broke into a Taco Bell in the early hours on Christmas Day was caught on CCTV making a snack and then taking a nap.

  The incident happened in the US state of Georgia.

  Police are appealing for the public's help in identifying him.
