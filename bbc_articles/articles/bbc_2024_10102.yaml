title: 'Watch: Judges deliver Nottingham attacks sentence ruling - BBC News'
date: '2024-05-14'
section: General
url: http://www.bbc.co.uk/news/uk-england-nottinghamshire-69008624
content: |-
  Valdo Calocane was given a hospital order after stabbing three people to death in Nottingham.

  The sentence of a man who stabbed three people to death in Nottingham was not unduly lenient, judges have ruled.

  Valdo Calocane killed Barnaby Webber and Grace O'Malley-Kumar, both 19, and 65-year-old Ian Coates on 13 June 2023.

  Calocane was given an indefinite hospital order after prosecutors accepted a plea of manslaughter on the grounds of diminished responsibility.

  A review into the sentence, launched by the attorney general, was held by the Lady Chief Justice of England and Wales, Lord Justice Edis and Mr Justice Garnham.

  Lady Chief Justice Baroness Carr delivered the ruling at the Court of Appeal on Tuesday, saying "there was no error in the approach" by Mr Justice Turner at Nottingham Crown Court in January.

