title: Stormy weather and extreme wind hits Somerset seafronts - BBC News
date: '2024-04-10'
section: General
url: http://www.bbc.co.uk/news/uk-england-somerset-68770855
content: |-
  Clevedon seafront and gates on Weston-super-Mare's promenade close, while Bristol's Portway floods.

  People have captured extreme stormy conditions at their local seafronts.

  Parts of Clevedon, Weston-super-Mare and Bristol have been affected by the extreme weather.

  Seafront's in those areas have been flooded and have seen large waves battering their coastlines.
