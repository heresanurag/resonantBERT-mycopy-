title: 'Ukraine war: The school that helped fleeing musicians find safety - BBC News'
date: '2022-04-10'
section: General
url: http://www.bbc.co.uk/news/world-europe-61038463
content: |-
  A group of young musicians from Kharkiv and Odesa have found new homes in Denmark.

  More than 4 million Ukrainian refugees have left the war-torn country since it was invaded by Russia.

  A group of young musicians from Kharkiv and Odesa have found safety in Denmark, after receiving help from a local music school. They’ll now be able to continue to study and play music.
