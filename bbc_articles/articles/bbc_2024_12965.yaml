title: 'Derry: Police injured after ''BB guns fired'' in Foyleside Centre - BBC News'
date: '2024-06-23'
section: Northern Ireland
url: http://www.bbc.co.uk/news/articles/ck55k1e2gpeo
content: |-
  One officer was kicked, a second's hand was stamped on while a third had a car door slammed on his arm.

  Three police officers have been injured after responding to reports that pellet guns were being fired at members of the public in a Londonderry shopping centre on Friday night. Police were called to Foyleside Shopping Centre at about 19:15 BST. One officer was kicked, a second's hand was stamped on, while a third officer's arm was injured after the door of a police vehicle was slammed on it. Police said one male member of the public was struck by a pellet. They said his injuries are not believed to be serious. Two teenage girls were arrested on suspicion of offences including assault on police, disorderly behaviour, and attempted criminal damage to a police vehicle. A teenage boy and a "young boy" were arrested on suspicion of offences including possession of an offensive weapon with intent to commit an indictable offence, common assault, criminal damage, disorderly behaviour, and assault on police. All four have been released on bail. A 30-year-old man who was also arrested has subsequently been charged with disorderly behaviour and obstructing police. He is due to appear at Londonderry Magistrates Court on 17 July.

  PSNI Insp Craig said that while BB/pellet guns are legal they have when "used recklessly they have the potential to cause serious injury". He added: "I would also reiterate the message that assaults on police are completely unacceptable and will not be tolerated as simply being 'part of the job'. "Our ask is that officers and the work they do should not be taken for granted - no one should be treated the way these officers were last night."
