title: 'Watch: Japan riot police pin G7 protesters to ground in violent scuffle -
  BBC News'
date: '2023-05-22'
section: General
url: http://www.bbc.co.uk/news/world-asia-65663384
content: |-
  Violence broke out in Hiroshima as riot police clashed with far-left anti-G7 protesters.

  Violence broke out on the sidelines of the G7 summit in Hiroshima as riot police wrestled people protesting the meeting of world leaders.

  Police could be seen pinning protesters to the ground on Sunday after a brawl broke out.

  The demonstration was organised by various far-left groups. Those who took part included the extremist group Revolutionary Communist League National Committee, which denounces the G7 summit as a conference of "imperialism for nuclear war".

  The G7 comprises the US, UK, Canada, France, Germany, Italy and Japan – and eight other nations have been invited this year. They're meeting to discuss the war in Ukraine and other foreign policy points - including their relationships with China.
