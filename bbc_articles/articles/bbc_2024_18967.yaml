title: 'North Wales Hospital: Plans to re-develop former Denbigh asylum - BBC News'
date: '2024-08-18'
section: Wales
url: http://www.bbc.co.uk/news/articles/c89wg8pev9do
content: |-
  The site dates back the the 1800s and has been plagued by fires and vandalism since it closed.

  The project hopes to restore the Grade II-listed building and bring employment, new homes, commercial units and green community spaces

  Plans to redevelop a Victorian asylum plagued by arson and vandalism have been welcomed by people living nearby. North Wales Hospital in Denbigh has been a blight on the landscape for years, but the North Wales Economic Ambition Board (NWEAB) said the scheme would restore the Grade II-listed building and create new homes, business spaces and green community spaces. NWEAB said the development hoped to create 360 apprenticeship opportunities, supported by a new on-site training facility, and 70 full-time jobs by 2035. Denbighshire council leader Jason McLellan said the £107m plans could be "a real benefit" for the town.

  "Our hope is that we can help transform this derelict site, bringing much needed new homes and jobs to the town and wider community," he added. Councillor Huw Hilditch-Roberts said the "opportunities for work and apprenticeships is huge and will benefit companies and the people of Ruthin to support the infrastructure of our small towns". The project, delivered by Jones Bros, will redevelop the derelict 53-acre site.

