  Dhoni, who turns 44 in July, is playing his 18th straight IPL season. Will this be his swansong?

  MS Dhoni: The 43-year-old Indian cricket icon gears up for another IPL

  Dhoni, who turns 44 in July, is playing his 18th straight IPL season

  As Indian Premier League (IPL) 2025 unfolds, all eyes are on MS Dhoni who continues to command superstar status in Indian cricket despite retiring from the international game in 2020. Dhoni continues to be a key figure in the world's richest cricket league. Alongside him are veterans like Virat Kohli and Rohit Sharma, pace bowler Jasprit Bumrah, and emerging stars like Shubman Gill, Yashaswi Jaiswal, and Rishabh Pant. They are among the players who led India to two ICC titles in the past nine months - the T20 World Cup in June and the Champions Trophy last month. Yet it is Dhoni who still commands unrivalled attention, with his leadership and presence in the league continuing to captivate fans. The cricketer, who turns 44 in July, is playing his 18th straight IPL season, 16 of these representing Chennai Super Kings (CSK). He is the oldest player in the tournament this year, though not the oldest to have played in the IPL. Australian spin bowler Brad Hogg was 45 years and 92 days old when he last played in the IPL in 2016, representing Kolkata Knight Riders (KKR). Leg-spinner Pravin Tambe, the oldest debutant at 41 years and 212 days for Rajasthan Royals, played his final match in 2019 at 44 years and 219 days, capping an astonishing career. Whether Dhoni will surpass Tambe and Hogg remains to be seen. Three seasons ago, when he gave up the CSK captaincy, his retirement seemed imminent. Last year, his infrequent appearances suggested the same. However, CSK used the retention clause in the IPL mega-auction to keep Dhoni for the 2025 season as an uncapped player, given his five-year absence from international cricket.

  Dhoni remains a big draw with fans after retirement from international cricket

  In 18 IPL seasons, Dhoni has scored 5,243 runs, placing him sixth on the all-time run list, currently topped by Kohli. His career batting average of 39.12 is higher than both Rohit Sharma and Kohli, and trails only David Warner (40.52) and AB de Villiers (39.70) among players with more than 5,000 runs in the league. Among players with over 5,000 runs, Dhoni's strike rate of 137.53 ranks behind only de Villiers (151.68) and Warner (139.77). In sixes, Dhoni (252) trails only Gayle (357), Sharma (280) and Kohli (272). These batting stats highlight just one aspect of Dhoni's prowess. As a wicketkeeper, he boasts 180 dismissals (141 catches, 39 stumpings), a record unmatched by anyone. His quick reflexes and deft glovework earned him the nickname "pickpocket" from former Indian coach Ravi Shastri. The "helicopter shot", a flick-drive played over mid-wicket with a wrist-flex of the bottom hand, became the signature stroke of his batting brilliance. The other notable aspect of his batting was his ability to control the match, taking the innings deep, virtually to the end, with a remarkable control of nerves, and interspersed with explosive strokes. He also ran like a hare between wickets, making him India's best match-winner in his prime years.

  Dhoni's speed between the wickets made him India's regular match-winner in his prime

  Dhoni holds the record for most IPL matches as captain (210) and most wins (123), leading CSK to five IPL titles and two Champions League titles. He also captained India to three ICC titles: the T20 World Cup (2007), ODI World Cup (2011) and Champions Trophy (2013). Additionally, his impact in Test cricket is immense, having played 90 Tests and guiding India to the No1 ICC ranking before his sudden retirement mid-series in 2014-15. Former Indian captains Sunil Gavaskar and Shastri have frequently hailed him as India's finest cricketer ever. While this is open to debate, that Dhoni belongs to the same cluster as Gavaskar, Sachin Tendulkar and Kapil Dev is now widely acknowledged. So what does the current season hold for him? Advancing age has taken a physical toll on Dhoni, though he remains mentally tough and highly competitive. Last season, he stepped away from his finisher role, which he'd held since the league's inception, and adapted his approach to provide valuable cameos that could impact the outcome.

  Dhoni holds the record for most IPL matches as captain and most wins, leading CSK to five IPL titles

  With the impact player rule - which allows teams to pick an extra specialist batter or bowler based on the game situation - now an integral part of the IPL, Dhoni could well settle into this role, while continuing to be a sounding board for the captain and mentor to the squad in a non-designated informal manner. For CSK, keeping Dhoni in the squad is a no-brainer. His appeal extends beyond CSK fans, offering massive commercial and branding benefits to both the franchise and the IPL. As CSK puts it, an IPL without Dhoni is "unthinkable". This may limit opportunities for young players, both Indian and overseas, but Ravi Shastri dismisses this argument. "The league operates on free-market dynamics. Franchise owners aren't sentimental - they know what's best for them, on and off the field," he says. Meanwhile, former India opener Robin Uthappa, who played under Dhoni for both India and CSK, warns rivals: "Write off Dhoni at your own risk. We could still see some old magic."
