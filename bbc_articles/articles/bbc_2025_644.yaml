title: 'Watch: Fans pack downtown Philadelphia to celebrate Eagles'' Super Bowl win
  - BBC News'
date: '2025-02-11'
section: General
url: http://www.bbc.co.uk/news/videos/cvg48dvyq41o
content: |-
  People climbed light poles and started fires after the Eagles beat the Kansas City Chiefs 40-22 in Super Bowl LIX in New Orleans.

  Celebrations kicked off in Philadelphia, Pennsylvania after the Eagles' 40-22 Super Bowl victory over the Kansas City Chiefs. Video showed fans climbing on light poles and garbage trucks, and lighting small fires, which first responders quickly put out.
