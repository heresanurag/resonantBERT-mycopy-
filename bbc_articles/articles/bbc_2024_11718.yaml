title: 'Kuwait fire: Forty Indians among 50 dead as blaze engulfs residential block
  - BBC News'
date: '2024-06-13'
section: World
url: http://www.bbc.co.uk/news/articles/c9ww0j74rddo
content: |-
  Indian authorities say DNA tests are being carried out to identify the victims and repatriate their bodies.

  Many of the building's residents were from the states of Kerala and Tamil Nadu

  At least 40 Indians are among 50 people killed in a fire at a residential building in the Kuwaiti city of Mangaf, India's foreign ministry has said. The fire broke out on Wednesday in a building where dozens of workers stayed. Video shared on social media showed flames engulfing the lower part of the building and thick black smoke billowing from the upper floors. Most of the casualties are from the southern Indian states of Kerala and Tamil Nadu. Around 50 Indians have also been injured.

  Three Filipinos have also been killed, AFP quoted Philippines officials as saying. Filipino and Nepali workers are also among the injured. Two-thirds of the Kuwaiti population is made up of foreign workers and the country is highly dependent on migrant labour, especially in the construction and domestic sectors. Human rights groups have regularly raised concerns over their living conditions. Local media reports said the building housed 196 workers and there are suggestions that it may have been overcrowded. A senior police officer told state TV that there were a "large number" of people in the building at the time of the fire. "Dozens were rescued, but unfortunately there were many deaths as a result of inhaling smoke from the fire," he said, adding that warnings were often issued about overcrowding in this type of accommodation. Kuwaiti Deputy Prime Minister Sheikh Fahad Yusuf al-Sabah accused property owners of greed and said violations of building standards had led to the tragedy. "Unfortunately the greed of the property owners is what led to this," Sheikh al-Sabah, who is also acting interior minister, told Reuters news agency. "They violate regulations and this is the result of the violations," he said.

  Kirti Vardhan Singh, a junior minister from India, is in Kuwait to oversee assistance for the victims of the fire

  The original death toll was 49 but Foreign Minister Abdullah Al-Yahya said on Thursday that one person had died overnight, AFP reported. Indian Prime Minister Narendra Modi has sent his condolences to the victims and their families. "The fire mishap in Kuwait City is saddening," he said on X. "My thoughts are with all those who have lost their near and dear ones. I pray that the injured recover at the earliest." He said the Indian embassy was monitoring the situation and working with the authorities on the ground. Kirti Vardhan Singh, a junior minister in the government who left for Kuwait on Thursday morning, said DNA tests were being carried out to identify the victims. "An Air Force plane is on the ready. As soon as the bodies are identified, the kin will be informed and our Air Force plane will bring the bodies back," he told news news agency ANI. Twenty-four victims are from Kerala state while five are from neighbouring Tamil Nadu. An eyewitness, Manikandan from Tamil Nadu, told BBC Tamil that many of the workers had been on night shifts. "Some of those who returned to that apartment early in the morning were cooking food after coming back from work," he said. "Once the fire erupted, it spread rapidly. People living in the building were not able to control the fire."

  Stephin Sabu from Kerala was set to travel home next month

  Back home in India, the families of the victims who have been identified are in shock. Umaruddeen Shameer from Kerala's Kollam district worked as a driver for an oil company in Kuwait. His family is stunned after hearing about his death, said a neighbour who picked up the phone at his house. "He was married just nine months ago when he came on a visit here," the neighbour told BBC Hindi without disclosing his identity. "His parents are not in a condition to speak to anyone."

  Another victim, Stephin Sabu, 29, was set to travel home to Kerala's Kottayam district next month, an acquaintance of the family told BBC Hindi. "His father is unwell and his mother is not able to speak," Babu Mathew, a member of the local church, told BBC Hindi, adding that his family had been waiting for Sabu's arrival for the housewarming ceremony of the house that he had built. Others who were waiting desperately for news of their loved ones were left distressed. Earlier on Thursday, Ashrafunnisa from Villupuram in Tamil Nadu had shared her worries about not being able to contact her husband Mohammed Sharief. He was working as a foreman in Kuwait for the past decade and lived in the building which was destroyed. “I last spoke to him on Tuesday afternoon. I haven’t been able to get through to him since then," she said. Hours after speaking to the BBC, she got the news of his death.
