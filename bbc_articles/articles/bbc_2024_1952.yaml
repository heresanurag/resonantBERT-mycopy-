title: 'Newspaper headlines: Hunt tax cuts warning and ''from Friend to Traitor''
  - BBC News'
date: '2024-02-27'
section: The Papers
url: http://www.bbc.co.uk/news/blogs-the-papers-68409881
content: |-
  A number of Tuesday's papers trail next week's Budget, while others report on the Tory Islamophobia row.

  "Get him back" is the headline in the Daily Express, which says Conservative MPs are "rallying around" Lee Anderson, demanding his suspension is lifted. It reports that party whips have been "besieged" with support for him, with some saying he must be reinstated before the election because of his "incredible popularity" with voters.

  According to The Times, some Tory MPs believe his suspension will spark a backlash from the party's supporters, despite Rishi Sunak's attempts to "close down the row". The Guardian has published WhatsApp messages from members of one grassroots Conservative group, which describe the prime minister as a "snake" who is "weak and feeble".

  According to the i, the chancellor has "six days to find tax cuts to save Tory MPs". It says Jeremy Hunt "is still clinging to hope" that he can cut 2p off personal taxes in the Budget next week, without having to reduce spending. The Times reports he is considering cutting national insurance by one percentage point and introducing a new levy on vaping.

  An investigation by the Mirror has found that the number of children being blackmailed over naked photographs has risen by 390% in two years. Experts tell the paper that up to 100 children a day are falling victim to what they call "sextortion" scams. It highlights the story of one 16-year-old victim, who took his own life after receiving threats.

  The Daily Telegraph leads with what it calls the government's U-turn on Army housing. It says the Ministry of Defence was "taken aback by the scale of the anger" about the plans to allocate accommodation according to family size, rather than rank. A government source tells the paper that just 69 people were originally interviewed about the scheme, but says more research will now be conducted.

  The Financial Times describes Hungary's decision to ratify Sweden's bid to join Nato as "one of the biggest geopolitical consequences" of the invasion of Ukraine. It says the accessions of both Sweden and Finland give the alliance "control of almost the entire Baltic Sea", doubling the length of its border with Russia.

  In an interview with the Guardian, the shadow education secretary, Bridget Phillipson, sets out what the paper calls "Labour's plan to battle misogyny in schools". She says she would help to train young male mentors to provide "a powerful counterbalance" to social media influencers, such as Andrew Tate, a self-proclaimed misogynist.

  And the Mail reacts to the news that the age rating for the 1964 Disney classic Mary Poppins has been raised from U to PG, because it features a colonial term used by white Europeans in South Africa. The paper proclaims that the move has "upstaged" what it considers "the only jarring element of the film": "Dick van Dyke's notorious assault on the Cockney accent".

