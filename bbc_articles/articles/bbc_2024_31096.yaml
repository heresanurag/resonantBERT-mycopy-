title: Former Archbishop of Canterbury Carey quits as priest - BBC News
date: '2024-12-18'
section: UK
url: http://www.bbc.co.uk/news/articles/cly2714wgdno
content: |-
  It follows a BBC investigation into the Church of England's handling of a sexual abuse case.

  Lord Carey resigned following a BBC investigation into the Church's handling of a sex abuse case

  Former Archbishop of Canterbury George Carey has quit his service as a Church of England priest after a BBC investigation revealed he had advocated for an alleged child abuser to return to priesthood. David Tudor was banned by the Church for five years in the 1980s, over allegations of assault against teenage girls, but Lord Carey later allowed him to return under supervision. Tudor was only sacked as a priest in October of this year after admitting sexual misconduct. In his resignation letter, in which he surrendered his "permission to officiate", Lord Carey said it had been an "honour to serve" for more than 60 years.

  The 89-year-old was named in the investigation into disgraced priest Tudor, who was found - among other things - to have been barred by the Church from being alone with children. The Church told the BBC that in 1993 Lord Carey, who was then Archbishop of Canterbury, agreed Tudor could return from his suspension under supervision - and that the decision was taken with "some trepidation". But the investigation found evidence suggesting Lord Carey helped Tudor get a job. Minutes of a meeting mention him "advocating for" Tudor, with a reference that a diocese had been "made to take" the disgraced priest. More than that, leaked documents also show he agreed to remove Tudor's name from the central list of clergy who had been subject to disciplinary action. "We recognise these procedures were neither sufficient nor survivor-focussed, and that very different decisions would have been made today," the Church told the BBC, acknowledging that Tudor should have received a lifetime ban.

  File on 4 Investigates: The abuse survivors calling on Archbishop of Canterbury stand-in to resign Listen now on BBC Sounds - or on BBC Radio 4 at 20:00 on Tuesday 17 December and 11:00 on Wednesday 18 December

  Lord Carey, who was the Archbishop of Canterbury from 1991-2002, told the investigation that he did not remember Tudor's name. In his resignation letter, sent on 4 December, he wrote: "I wish to surrender my Permission to Officiate." "It has been an honour to serve in the dioceses of London, Southwell, Durham, Bristol, Bath and Wells, Canterbury and finally Oxford," Lord Carey said "I am in my ninetieth year now and have been in active ministry since 1962 when I was made Deacon and then Priested in 1963." The current Archbishop of York Stephen Cottrell is resisting calls to resign in relation to the same investigation. The BBC found that from 2010, when he was made Bishop of Chelmsford, Mr Cottrell was made aware of the allegations of abuse against Tudor. Mr Cottrell also knew that Tudor was working as a priest under a provision that he could not be left alone with children and that he had made a large payment to an alleged victim. But under the then Bishop Cottrell, Tudor remained in post and was made Honorary Canon of Chelmsford Cathedral. Tudor was only suspended in 2019 when police opened a new investigation into him. Mr Cottrell said he was "deeply sorry" that action had not been taken earlier but that he had "inherited" the situation. He added there were no legal grounds to take alternative action. But some of those affected by the case, including victims of Tudor, have been critical of Archbishop Cottrell's response to the investigation. One, Rachel Ford, told the BBC Tudor was "very touchy-feely" with her at school and that Mr Cottrell's assertion showed "a complete lack of empathy for his victims". Mr Cottrell is weeks away from taking charge of the Church of England following the resignation of another Archbishop of Canterbury Justin Welby. Mr Welby stepped down last month over his management of a separate sex abuse case.
