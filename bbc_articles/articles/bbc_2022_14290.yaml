id: bbc_2022_14290
title: At least one victim could have survived Arena bomb, inquiry finds - BBC News
date: '2022-11-03'
section: UK
url: http://www.bbc.co.uk/news/live/uk-63500472
content: |-
  John Atkinson could have lived if the emergency response to the blast in Manchester had not been inadequate, a report finds.

  Ambulance service: We should have got more responders into the arena

  Daren Mochrie, chief executive of the North West Ambulance Service, is speaking now. He says the feeling of pain, loss and anger does not go away - and his thoughts and his sympathies are with everyone involved, especially bereaved families. He stresses that all those participating in the emergency response did their best to save lives and repeatedly did just that. However, he says the service accepts that a higher number of responders should have been deployed to the city room - the foyer of the arena. The service also has "deep regret" over its ability to work together with blue light partners. "Whilst our actions were well intentioned, we apologise wholeheartedly for our failures. They weigh heavily on us as individuals and as an organisation," Mochrie says.
