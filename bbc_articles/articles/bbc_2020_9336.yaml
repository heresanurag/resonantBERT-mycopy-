title: 'Cardiff river death: Nicola Williams, 15, named as victim - BBC News'
date: '2020-08-23'
section: Wales
url: http://www.bbc.co.uk/news/uk-wales-53874604
content: |-
  Nicola Williams died after an incident in a river in Cardiff on Friday evening.

  Floral tributes to Nicola were placed at the scene

  A 15-year-old girl who died after an incident in a river in Cardiff has been named by police.

  Nicola Williams died at Rhymney River, near Ball Lane, Llanrumney, on Friday.

  South Wales Police was called to the scene at 17:20 BST, along with fire crews and the ambulance service, as well as a police helicopter.

  She was found at about 18:40 and died despite the efforts of emergency crews, South Wales Police said. Her death is not being treated as suspicious.

  Nicola, from the Trowbridge area of Cardiff, went to St Illtyd's Catholic High School in the Rumney area of the city.

  "A child taken from their family is the worst pain anyone can suffer," said Llanrumney councillor Keith Jones.

  "And the community will try to help support them through this incredibly difficult time. The community is still coming to terms with how a 15-year-old girl has lost her life."

  Divers attempt to rescue Ms Williams from the Rhymney River

  Floral tributes have been left for Nicola at the scene where she died

  One resident said the community was still "in shock" after Nicola's death.

  "One minute it is a normal day then we have tragedy right on our doorstep," said Lee Cornock.

  "It's heartbreaking. My heart goes out to all Nicola's family and friends, the community is in shock."

  One tribute described Nicola as a "princess"
