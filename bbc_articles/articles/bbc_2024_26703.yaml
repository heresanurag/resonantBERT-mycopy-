title: 'Kabhi Khushi Kabhie Gham: Film track voted Bollywood''s best - BBC News'
date: '2024-10-04'
section: Newsbeat
url: http://www.bbc.co.uk/news/articles/c9dy9ljxd60o
content: |-
  Stars from the world of Bollywood have been reacting to BBC Asian Network's top 50 noughties songs.

  A song from a film featuring popular Bollywood duo Shah Rukh Khan and Kajol came out on top

  A blockbuster film track has been voted the UK's favourite noughties Bollywood tune. BBC Asian Network asked listeners to pick their Ultimate 00s Bollywood song from a shortlist of 50 tracks. The list was picked by a panel including station presenters Haroon Rashid, Nikita Kanda, Gagan Grewal and Vallisa Chauhan, along with industry experts Asim Burney, Natasha Retnasingam and music producer Farooq Got Audio. Many of the songs on the list such as Kal Ho Naa Ho's title track, Desi Girl from comedy romance Dostana and Teri Ore from comedy action Singh is Kinng are considered to have soundtracked people’s significant life moments.

  But there could only be one winner: Bole Chudiyan from the iconic film Kabhi Khushi Kabhie Gham. Released in 2001, the track is remembered for being the signature sound of the family drama movie featuring some of Bollywood's biggest names such as Amitabh Bachchan, Jaya Bachchan, Shah Rukh Khan, Kajol, Kareena Kapoor Khan and Hrithik Roshan. Composed by Jatin-Lalit and written by Sameer Anjaan, the song also features five powerhouse vocalists - Amit Kumar, Sonu Nigam, Alka Yagnik, Udit Narayan and Kavita Krishnamurthy. Bollywood movies are renowned for mixing tales of romance, comedy and action with song and dance numbers.

  Actress Janhvi Kapoor and director Karan Johar got nostalgic with Asian Network's Haroon Rashid at the IIFA Awards 2024

  The film was directed by Karan Johar who, in response to finding out the song had taken the coveted top spot, said all he could do is "wake up every morning and express gratitude to the universe". "I think we’re living in an age where nostalgia is so much more respected," he told Asian Network's Haroon Rashid at the IIFA Awards in Abu Dhabi. Johar directed and produced several of the noughties' biggest Bollywood films which featured three songs that were in the top 10. He said that when he "throws back to the entire Shah Rukh Khan era and the phenomena that he is and the movies that we all created" he's proud that "it all still continues to garner love". Actress Janhvi Kapoor, known for films such as Gunjan Saxena and Ulajh, said Johar's films are "a cultural phenomenon". "The movies haven’t just influenced cinema, I think they’ve influenced generations and personalities. "I know so many people who have completely shaped their personalities on his movies, his characters," the 27-year-old told Asian Network.

  Rani Mukerji starred in several 00s films like Veer-Zaara, Saathiya and Hum Tum

  Also reflecting on her appearance in the countdown, actress Rani Mukerji, whose films appear on the list several times with tracks like Saathiya, Hum Tum and Tauba Tumhare Ishare, said she felt "lucky". "I can’t take credit because the music directors, lyric writers during that time, my directors, the writers, I think they did all the hard work and those singers sung so beautifully. "So I can only say that we got lucky as artists to be able to lip sync to that music." Actress and Miss World winner Aishwarya Rai Bachchan, who also appears in the list with tracks like Crazy Kiya Re, Kajra Re and Dola Re Dola, added that she was "grateful for all the directors and talents I’ve got to work with". "And that’s what makes my work memorable. So it’s really a team effort."

  Composing trio Shankar-Ehsaan-Loy created a wide variety of tracks including the emotive Kal Ho Naa Ho (Tomorrow May Never Come) which came second

  The 00s were also a time where many of today's top Bollywood acting talents, such as Ranbir Kapoor, Kareena Kapoor Khan and Hrithik Roshan made their debuts. Today its films reach a global audience, and it’s easier than ever for fans to connect with tracks from the films via streaming services. The music was dominated by composers like Pritam, Vishal-Shekhar, Jatin-Lalit and Anu Malik, to name a few. The Asian Network’s top 50 consisted of seven appearances by composing trio Shankar-Ehsaan-Loy, who said that the music will always live on. "I think after we’re dead and gone there will still be things that people will listen to. "And there’s no better feeling than that, it’s gorgeous." The trio which consists of Shankar Mahadevan, Ehsaan Noorani and Loy Mendonsa are proud of creating "milestones" through their music which people relate to. "When the song plays a kind of role in a person’s life, that feels good as a composer."
