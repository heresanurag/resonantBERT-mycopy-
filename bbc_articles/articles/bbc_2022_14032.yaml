id: bbc_2022_14032
title: Man dies in suspected gas explosion in Denny - BBC News
date: '2022-10-16'
section: Tayside and Central Scotland
url: http://www.bbc.co.uk/news/uk-scotland-tayside-central-63277612
content: |-
  Four others were treated at the scene in Dunipace, near Denny, on Sunday afternoon.

  There were no visible sign of the explosion from the street in Denny on Monday morning

  A man has died in a suspected gas explosion in central Scotland.

  Emergency services were called to reports of a blast at an outbuilding in the Northfield Road area of Dunipace, near Denny, at about 16:10 on Sunday.

  Police Scotland said a man was pronounced dead at the scene, and there was no wider danger to the public.

  A spokesperson said the death was being treated as unexplained and there were no suspicious circumstances.

  It is understood that four other people were treated at the scene, but they did not need to be taken hospital.

  The Scottish Fire and Rescue Service said they sent three appliances to the scene and they worked with other emergency services to make the area safe.

  "There was no fire and we left the scene 18:50," a spokeswoman added.

  The Scottish Ambulance Service also confirmed they were in attendance with their special operations response unit.

  A Scottish Ambulance Service spokesperson said: "We received a call at 16:07 to attend an incident in Dunipace, Denny on Sunday.

  "We dispatched three resources, including the special operations response unit to the scene."
