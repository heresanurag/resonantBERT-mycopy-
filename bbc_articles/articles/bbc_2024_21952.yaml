content: |-
  The independent artist describes her sound as "soul with a cinematic edge".

  'You can't rely on your famous parents for success'

  Alice Dallin said she still has to work hard at her career

  Having a pop star as a mum, of course, has its benefits, but it does not always mean an "easy way in" to the music industry. Singer-songwriter Alice Dallin, 32, grew up "surrounded" by music thanks to having a famous parent. Her mum is Bristol-born Sara Dallin, a founding member of 80s icons Bananarama. Her dad, Bassey Walker, was also a musician and a dancer for the likes of Michael Jackson and Tina Turner, but not as well known as her mother. But the soul artist said, despite what some may think, it did not just "open doors" for her and she continues to self-fund and direct her own musical journey. "It's really not been that way for me. It's a really tough industry to crack," she said.

  "I'm very proud of my mum. It's nothing to be embarrassed of. I'm really inspired by her," added the singer. "I know that people are going to be probably more critical and you know [call it] 'nepotism' and all that kind of stuff, but I think also you have to have the talent yourself. "You can't just rely on your parents to open the door. "People will see through that," said Alice, who still has a 9-5 job.

  Her dad has also been a big inspiration to her career. "As a kid with my dad, I had like a little basic studio set up in our house, and I'd do stuff in there with him. "I wrote my first song with him when I was 11, but it was obviously not very good," she said. The singer grew up watching her mum on stage and recalls seeing her perform at the 80,000 capacity Stade de France, in Paris. "I was like, 'wow! I would absolutely love to do this'. It's such an amazing feeling. "But it does always seem a bit like, how do you get into that sort of career? Even for me."

  "If you haven't got the real passion or the talent, people will see through that," said Alice Dallin

  It was not until Alice started working with long-time friend, producer Oscar Scheller, who has worked with artists like Ashniko and Mabel, that she thought she wanted to pursue music as a career. The independent artist, who describes her sound as "soul with a cinematic edge", said what she benefits from the most is her mum's "advice and knowledge". "She's been in the industry over 40 years. She understands about production and harmonies and vocals, so then she can give me pointers, and in that respect, that's really helpful and kind of priceless to have that kind of sounding board. "But in terms of opening doors, it's really not been that way for me. There's been no easy way in," Alice said.

  Alice knows people will always compare her to her mother, but hopes her own talent "shines through"

  Alice recently co-wrote some songs for Bananarama's last album Masquerade. She said it was "amazing" to be able to write with her mum. The album featured a cover of one of Alice's tracks from her first EP, and she was brought onstage to perform it with the group during their three-night stint at The London Palladium, "which was nuts", said Alice. Despite the world-famous mum, the singer, who is supported by BBC Introducing, said she still feels like a regular emerging artist. Alice's new EP To Be Honest, explores "different human experiences", tackling subjects such as self-reflection, grief and family. She calls it her "most honest work yet". She said for anyone trying to make it, regardless of your connections, "make the music you want to make". "Try, not be influenced by others, and don't compare yourself to others. "And you know, not everyone's gonna like your music. And that's okay," she added.

