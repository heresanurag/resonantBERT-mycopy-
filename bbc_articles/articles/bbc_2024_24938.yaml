title: Climatic conker champs crisis conveniently clears - BBC News
date: '2024-10-13'
section: General
url: http://www.bbc.co.uk/news/articles/clylp8gg2k9o
content: |-
  Fears of storms causing a shortage of conkers for the 2024 world championships are put to rest.

  James Packer, the championship chairman, with his secret weapon for this year's event

  Fears that storms may cause havoc with an unusual international sporting event have been put to rest. Organisers of the World Conker Championships in Southwick in Northamptonshire say there are enough horse chestnut seeds for this year's tournament. Recent storms had blown hundreds of conkers out of the trees, raising concerns that they might rot before the big day. Two thousand people are expected in the village for the event on Sunday.

  The playing area has to be rigorously tested before the big day

  James Packer, the chairman of the championship, said: "The storms brought down a tremendous amount of conkers from the trees, and they were rotting before we could get them for the competition. "We've always had this contingency plan of freezing conkers from the previous year to play with if absolutely necessary, but fortunately it looks as though we might be out of the problem with that and we've not had to use them."

  David Jakins, known as King Conker, will start the proceedings off on Sunday

  Northamptonshire has been going bonkers for conkers since 1965, when the county hosted the championships for the first time. It was held at Ashton near Oundle for 45 years, before moving to a bigger site at the Shuckburgh Arms in Southwick. It has truly conkered the world, with competitors coming from places as far flung as Australia, Canada, Mexico, Poland and Sri Lanka. The event has also raised £420,000 for charity over the years,

  Sue Howes, a previous winner, now threads around 2,000 conkers for the competition

  Women were not allowed to play in the competition until 1988, but Sue Howes took advantage of a change in the rules to win the women's competition in 2009. She now helps out by picking good nuts and threading about 2,000 conkers for battle. She said: "We just go through these and look and think 'Oh yes, that's a good one' or 'that's a rubbish one', it's a matter of feeling them."

  The contest was only for men until 1988, but competition was fierce in the women's section last year

  All the conkers used in the event are supplied by the organisers and players draw them "blind" from a bag. They then have to hold their nuts so there is no less than eight inches (20cm) between them and their knuckles. Each player takes alternate strikes at their opponent's nut until one of them disintegrates. No matter who ends up as the ultimate conkerer, they will all say they have had a smashing time. Not that old chestnut again...

