title: Sabotage suspected as power cut hits Cannes Film Festival - BBC News
date: '2025-05-24'
section: Europe
url: http://www.bbc.co.uk/news/articles/c4gel3g84q0o
content: |-
  A substation was set on fire and a pylon damaged, interrupting screenings and affecting 160,000 homes.

  To play this video you need to enable JavaScript in your browser. This video can not be played

  A power cut in southern France caused by suspected sabotage has disrupted screenings on the final day of the Cannes Film Festival. About 160,000 homes in the city of Cannes and surrounding areas lost power early on Saturday, before supply was restored in the afternoon. Officials said an electricity substation had been set on fire and a pylon at another location damaged. Organisers of the international film festival say the closing ceremony will go ahead as planned as they have an alternative power supply.

  Prosecutors say a first power cut occurred when a substation in the village of Tanneron, which supplies Cannes, was attacked by arsonists in the early hours. At about 10:00 (08:00 GMT) the legs of an electricity pylon near the town of Villeneuve-Loubet were cut, triggering a second outage. In Cannes, shops and restaurants struggled to operate. "Another hour and I'll throw everything away," Laurent Aboukrat, who owns Cannes' Jamin restaurant, told the AFP news agency. He said his fridges had been off since the morning.

  Several ice cream shops were closed in Cannes following the outage

  "Cannes is in a total slowdown, meltdown, there's no coffee anywhere, and I think the town has run out of croissants, so this is like crisis territory," Australian producer Darren Vukasinovic told Reuters news agency. Several screenings were interrupted by the cut in the morning, before festival organisers were able to switch to private generators. Saturday is the last day of the festival. French actress Juliette Binoche and her jury are set to announce the winner of the Palme d'Or - the highest prize awarded at the festival.
