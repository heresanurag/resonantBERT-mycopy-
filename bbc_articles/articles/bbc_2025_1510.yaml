title: 'Richmond: Mannix Pedro found guilty over £1.38m watch heist - BBC News'
date: '2025-02-19'
section: London
url: http://www.bbc.co.uk/news/articles/cp8q89zynnno
content: |-
  A jury at Woolwich Crown Court finds Mannix Pedro guilty of conspiring to commit robbery.

  Woolwich Crown Court heard Mannix Pedro, 37, was "closely involved in the planning and execution" of the robbery from 247 Kettles in Richmond

  A man has been been found guilty of conspiring to commit robbery after watches worth £1.38m were stolen from a south-west London jewellery store. Mannix Pedro, 37, was "closely involved in the planning and execution" of the robbery from 247 Kettles in Richmond on 25 May last year, Woolwich Crown Court heard. The store's office manager Oliver White, 27, took his life the following day "as a direct result" of the raid, jurors were previously told. The jury found Pedro, from Woking in Surrey, guilty after more than 23 hours of deliberation. A second defendant, Junior Kunu, 30, from Mitcham in south-west London, remains on trial charged with the same offence.

  Office manager Oliver White took his life the day after the watches were stolen

  Prosecutors argued Pedro did not go into the shop during the robbery, but instead organised the use of a stolen Audi as one of two getaway cars. None of the watches stolen in the robbery were recovered and none were insured, despite the business being a victim of theft three years earlier, jurors were previously told.
