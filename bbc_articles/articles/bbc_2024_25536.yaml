title: 'Waterfoot: Teenager left in critical condition after assault - BBC News'
date: '2024-10-19'
section: Northern Ireland
url: http://www.bbc.co.uk/news/articles/c5yjnndvye9o
content: |-
  A 19-year-old is in a critical condition after a serious assault in Main Street in the village.

  A 19-year-old man is in a critical condition after a serious assault in Waterfoot in County Antrim. A 28-year old man has been arrested on suspicion of grievous bodily harm with intent. The teenager was found unconscious in the Main Street of the village just after 01:25 BST. The police believe there may have been an argument inside a pub before the altercation happened on the street outside.

  Officers are still at the scene and the road remains closed. Police are appealing to anyone who may have been in the bar or the main street at the time that the incident took place to contact them.
