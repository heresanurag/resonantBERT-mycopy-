content: |-
  All 24 crew members on board the ship were rescued by Indian navy personnel after an hours-long operation.

  The cargo ship capsized off the coast of Kochi in Kerala state

  Authorities in India's southern Kerala state have issued an alert after a ship carrying oil and hazardous cargo leaked and sank off the state's coast in the Arabian Sea. The spill occurred in a Liberian-flagged vessel that capsized near Kochi city on Sunday. The coastal stretch is rich in biodiversity and is also an important tourist destination. All 24 crew members on board the ship have been rescued but some of the ship's 640 containers have reportedly been drifting, external towards the shore, prompting evacuations in the area. Authorities fear that oil, fuel and other harmful substances that have leaked from the ship and its cargo could endanger the health of residents and marine life.

