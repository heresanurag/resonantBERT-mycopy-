content: |-
  A 53-year-old white British man has been arrested after a car drove into pedestrians in Water Street, police say.

  Four children are among the dozens of people injured after a car ploughed into a crowd at the Liverpool FC parade.

  Twenty-seven people were taken to hospital, and two suffered serious injuries.

  A 53-year-old white British man has been arrested and is believed to be the driver of the vehicle, according to Merseyside Police.
