content: |-
  Jeremy Clarkson has had a heated exchange with Victoria Derbyshire about his own remarks that he bought a farm to avoid inheritance tax.

  TV presenter and journalist Jeremy Clarkson has had a heated exchange with BBC Newsnight's Victoria Derbyshire about his own remarks that he bought a farm to avoid inheritance tax.

  Clarkson has fronted the Amazon Prime show Clarkson's Farm since 2021, about efforts to run the 1,000 acre Diddly Squat farm near Chipping Norton.

  Clarkson told the Times in 2021 that avoiding inheritance tax was “the critical thing” in his decision to buy land - but said today that he had bought the land "to shoot".
