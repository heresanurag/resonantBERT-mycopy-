  Yvette Williams, a co-ordinator of campaign group Justice 4 Grenfell, said survivors were "increasingly feeling a sense of injustice".

  Theresa May called the disaster "a local and a national tragedy with far-reaching consequences" which "we must not forget".

  Later in the evening, rapper Stormzy joined thousands of people at a silent walk around the local area, in memory of the victims.

  Labour leader Jeremy Corbyn, wearing a green scarf, also joined the march which came after a vigil at which another rapper, Lowkey, delivered a speech.

  He said: "This is a message to the government and I hope this message breaks through, regulate them before we regulate you."

  Mr Corbyn tweeted his commitment "to creating a housing system and a society where such a tragedy can never happen again".

  Green balloons were released above the tower overnight

