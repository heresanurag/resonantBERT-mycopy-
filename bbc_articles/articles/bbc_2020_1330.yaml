title: Ian Wright tearfully remembers childhood teacher - BBC News
date: '2020-02-17'
section: General
url: http://www.bbc.co.uk/news/uk-51516452
content: |-
  The former England star's voice cracks as he pays tribute to "the greatest man in the world".

  Former England striker Ian Wright has tearfully paid tribute to a childhood teacher he remembers as "the greatest man in the world".

  The ex-footballer had a hard time keeping the emotion out of his voice as he told Desert Island Discs about being reunited with Sydney Pigden in 2010 (footage of their reunion later went viral).

  When you were younger, was there a person or a life-changing experience that helped shape who you are today? We'd love to hear your stories. Please email us - haveyoursay@bbc.co.uk
