title: Boy, 12, suffers serious injuries in Oldham dog attack - BBC News
date: '2023-10-23'
section: Manchester
url: http://www.bbc.co.uk/news/uk-england-manchester-67191519
content: |-
  Greater Manchester Police say a 31-year-old woman was also hurt in the attack in Oldham.

  Armed police and a dog unit were sent to Villa Road after two people were attacked

  A boy has suffered life-changing injuries in a dog attack, police have said.

  Greater Manchester Police (GMP) said the 12-year-old was hurt on Villa Road, Oldham, at about 11:30 BST on Sunday.

  The force said a woman, aged 31, was also attacked but her injuries were not thought to be as serious.

  A 43-year-old woman has been arrested on suspicion of possessing a dangerously out of control dog.

  A GMP representative said the animal was "safely detained" after armed police and a dog unit were sent to the scene.

  They said the breed of the dog had not yet been established.

