content: |-
  Police are continuing to investigate the sudden death of a couple in their 70s.

  Couple found with dead dog and rifle were 'devoted'

  South Wales Police is continuing to investigate the deaths of a 72-year-old woman and a 74-year-old man

  Police investigating the deaths of a "devoted" married couple at a house in Trowbridge, Cardiff, say they are not looking for anyone else in connection with the tragedy. South Wales Police were called to Morfa Crescent in Trowbridge, Cardiff, at about 14:50 BST on Saturday after neighbours reported concerns about the couple. A man, aged 74, and his 72-year-old wife were found inside the semi-detached house where a rifle was recovered by police. The couple's pet dog - believed to be a cocker spaniel - had also been shot.

  A neighbour who knew the couple well said: "Everyone’s in shock, they were a lovely couple, completely devoted to each other. "What’s upset people as much as anything else is that their cocker spaniel was killed as well," the neighbour added. It is believed the couple, who had been married for more than 50 years, had two grown up children. Another resident in the area, who did not want to be named, said: "They were a nice, quiet couple who always waved when they drove past me in their van". The couple’s home was cordoned off by police. Det Ch Insp Lianne Rees said: "We understand this incident has shocked and saddened the local community. "Extensive inquiries are being conducted to establish the circumstances leading up to the incident. "We are awaiting the results of post-mortem examinations which will confirm the cause of death."
