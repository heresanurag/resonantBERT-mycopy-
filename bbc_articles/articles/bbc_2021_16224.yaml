title: 'Migrant crossings: More than 900 cross Channel in two days - BBC News'
date: '2021-12-19'
section: Kent
url: http://www.bbc.co.uk/news/uk-england-kent-59710100
content: |-
  Nearly 28,000 people have now crossed from France to England in small boats this year.

  The numbers of people crossing the English Channel has risen sharply this year

  More than 900 people have crossed the Channel in small boats over two days, the Home Office has confirmed.

  On Thursday 559 people were picked up off the Kent coast after making the crossing in 19 boats, and on Friday 358 people crossed in 10 boats.

  Over the two days the French authorities stopped 564 people from setting off.

  More than 27,700 people have made the crossing in small boats so far this year, compared to 8,400 in 2020.

  Last month 27 people including 17 men, seven women - one of whom was pregnant - and three children, drowned when their boat sank near Calais.

  Dan O'Mahoney, Clandestine Channel Threat Commander, said: "Last month's tragedy is a devastating reminder of the dangers of Channel crossings and we are determined to work with our European and international partners to target the ruthless organised criminal gangs behind them.

  "Unbelievably, these gangs continue their deadly trade with more crossings taking place today, shamelessly putting lives at risk."

