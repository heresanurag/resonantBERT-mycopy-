  The home secretary said he would not leave an individual stateless, which is illegal under international law.

  Mr Javid also suggested Ms Begum's child could still be British, despite the removal of Ms Begum's citizenship.

  Labour leader Jeremy Corbyn said Mr Javid's decision was "extreme" and she had "a right to return to Britain".

  Geoffrey Robertson QC, a former United Nations judge, said it should be up to the UK courts to determine what punishment she should receive for joining a terrorist organisation.

  He told the BBC: "It's surely for a judge to decide whether she deserves mercy or sympathy, not for a politician."
