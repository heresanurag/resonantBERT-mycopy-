id: bbc_2019_922
title: MP harassment prompts police review - BBC News
date: '2019-01-09'
section: General
url: http://www.bbc.co.uk/news/uk-politics-46804858
content: |-
  Police officers are expected to intervene and - if necessary - make arrests, Scotland Yard says.

  The question of how to deal with abusive protesters outside parliament has been put to the House of Commons and the Metropolitan Police.

  Speaker John Bercow urged Scotland Yard to review its current policy after MP Anna Soubry, who faced "Nazi" chants, criticised its response.

  The Metropolitan Police said police officers are expected to - if necessary - intervene and make arrests over any incidents they see fit.
