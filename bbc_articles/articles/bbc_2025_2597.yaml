title: 'Khadija Shaw: Manchester City ''appalled'' after forward subjected to racist
  and misogynistic abuse - BBC Sport'
date: '2025-02-04'
section: Women's Football
url: http://www.bbc.co.uk/sport/football/articles/ckgyr3y909zo
content: |-
  Manchester City say they are "appalled" by the racist and misogynistic abuse suffered by striker Khadija 'Bunny' Shaw following Sunday's loss to Arsenal.

  Manchester City say they are "appalled" after learning striker Khadija 'Bunny' Shaw was subjected to racist and misogynistic abuse following Sunday's Women's Super League loss to Arsenal.

  City confirmed the content has been shared with the relevant authorities and an investigation will be held.

  Jamaica international Shaw, 28, decided not to share the messages in order to avoid giving the individuals responsible any publicity.

  "Discrimination of any kind, either in stadiums or online, will not be tolerated and has absolutely no place inside or outside the game," Manchester City said in a statement.

  "Bunny has decided not to share the messages publicly so as not to give the oxygen of publicity to the vile individuals who sent them.

  "An investigation will follow, and the club offers our full support to Bunny following the disgusting treatment she's received."

  Shaw made her 100th appearance for Manchester City as a substitute in Sunday's 4-3 home loss against Arsenal.

  The forward has scored 86 times goals for City and was named the Club's Player of the Year in each of the last two seasons.
