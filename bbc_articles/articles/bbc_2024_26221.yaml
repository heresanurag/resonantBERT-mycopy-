title: 'Vladimir Putin: Watch Steve Rosenberg challenge Russian president over Ukraine
  war - BBC News'
date: '2024-10-24'
section: General
url: http://www.bbc.co.uk/news/videos/c9vn8z2wwy9o
content: |-
  The Russian president gave a news conference after hosting a summit of world leaders in Kazan.

  The BBC's Russia Editor asked Vladimir Putin about "justice and security" in light of the Ukraine war.

  In response to Steve Rosenberg's question, Putin said the Nato expansion "violates" Russian security. "There is no justice here and we want to change this situation", he added.

  Rosenberg also asked the Russian president about recent MI5 intelligence reports which said Russia's intelligence agency has been on a mission to generate "sustained mayhem on British and European streets".
