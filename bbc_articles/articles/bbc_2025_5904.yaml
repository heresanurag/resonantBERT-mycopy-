title: Sentencing guidelines delayed after 'two-tier' row - BBC News
date: '2025-04-01'
section: Politics
url: http://www.bbc.co.uk/news/articles/c5yg887m6qdo
content: |-
  It comes after the government said it would pass an emergency law to override the guidance.

  New rules on sentencing criminals from ethnic minorities have been abandoned following a weeks-long standoff between senior judges and the government. Shabana Mahmood, the justice secretary, believed the proposals from top judges would have created a "two-tier" justice system. The new guidelines, which had been in development for months, told judges to seek extra information before deciding how to punish offenders from certain minority groups. The proposals had sparked condemnation from politicians across both main parties in recent weeks and, following the Sentencing Council refusing Mahmood's demands to reconsider, she was set to overrule them with emergency legislation.

  The Council, made up of some of the most senior legal figures in England and Wales, was adamant that the guidelines would have helped address disparities between how different ethnicities are treated in the justice system. The new rules, which would have been binding on judges, were set to take effect on Tuesday but were delayed on Monday because of the inevitability that they would be overturned by parliament anyway. Government sources had said it would be all but impossible to pass such legislation before Parliament breaks for Easter. In a statement, the Sentencing Council said its chairman, Lord Justice William Davis, met Justice Secretary Shabana Mahmood on Monday morning. In the meeting, Lord Davis indicated the guidelines would not be brought in while there was a "draft bill due for imminent introduction that would make it unlawful". "On that basis, the council, an independent statutory body, has chosen to delay the in force date of the guideline pending such legislation taking effect," the statement said. Mahmood said she was "grateful" to the Sentencing Council for delaying the implementation of its new guidelines. The minister said: "These guidelines create a justice system where outcomes could be influenced by race, culture or religion. "This differential treatment is unacceptable - equality before the law is the backbone of public confidence in our justice system. "I will change the law to ensure fairness for all in our courts." Conservative shadow justice secretary Robert Jenrick claimed the Sentencing Council had "folded under the pressure" after he had threatened a legal challenge against the guidelines.

  The guidelines advise that magistrates and judges get a pre-sentence report - giving further details of an offender's background - before handing out punishment for someone of an ethnic or faith minority, alongside other groups such as young adults, abuse survivors and pregnant women. The Sentencing Council, made up of some of the most senior legal figures in England and Wales, said the guidance would address disparities in the punishments meted out by judges. Official figures, external show that offenders from ethnic minorities consistently get longer sentences than white offenders for indictable offences. Earlier on Monday, the prime minister had said he was "very disappointed", after the Sentencing Council previously refused to reconsider the guidance. Sir Keir Starmer said the government would bring forward legislation to reverse it. "There's no other option, so we will do that. We will fast-track it," he told GB News. The Ministry of Justice said the legislation would "clarify that guidance relating to sentencing reports should not single out specific cohorts for differential treatment". The Sentencing Guidelines (Pre-sentence Reports) Bill will be introduced on Tuesday. However, it needs to be debated and approved by MPs and peers before it becomes law. The House of Lords breaks for Easter on Thursday, while MPs break up on 8 April, and Parliament is not due to return until 22 April. This means there is limited time for the bill to complete its passage. Some in government believed the law could and should have been rushed through before the Easter break. Others are understood to have raised concerns that it would be obstructed in the House of Lords, especially by eminent lawyers, if the government were seen to be moving with excessive speed. Jenrick first raised concerns about the guidelines earlier this month, saying they were biased "against straight white men" and amounted to "two-tier justice". In response, Mahmood said she also opposed a "two-tier sentencing approach" and that she "did not stand for any differential treatment before the law". The Sentencing Council was established in 2010 to try to ensure consistency in sentencing. Sir Keir, at the time Director of Public Prosecutions, was one of its founding members.

