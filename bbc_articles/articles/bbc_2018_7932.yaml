content: |-
  The country came to a standstill as fans tuned in for England's first World Cup quarter-final for 12 years.

  "Watching England-Sweden on a TV hung in a tree on the beach in Ibiza is probably the most British thing I've ever done," tweeted singer-songwriter Kelli-Leigh.
