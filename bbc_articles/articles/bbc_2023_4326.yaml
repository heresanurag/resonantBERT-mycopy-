title: Yorkshire cricket racism hearing told Tim Bresnan used racial slur towards
  Azeem Rafiq sister - BBC Sport
date: '2023-03-01'
section: General
url: http://www.bbc.co.uk/sport/cricket/64814128
content: |-
  Former England bowler Tim Bresnan used a racial slur towards Azeem Rafiq's sister, a hearing into allegations of racism at Yorkshire is told.

  Former England bowler Tim Bresnan used a racial slur towards Azeem Rafiq's sister, a hearing into allegations of racism at Yorkshire has been told.

  Rafiq claimed Bresnan used the term towards his sister Amna during a media day at Headingley in 2014.

  Bresnan, who is not taking part in the process, denies the allegation.

  The claim was part of the evidence heard on the first day of the Cricket Discipline Commission hearing into allegations of racism at Yorkshire.

  The England and Wales Cricket Board (ECB) also set out its cases against former England bowler Matthew Hoggard and ex-Yorkshire coach John Blain, who have both withdrawn from proceedings.

  The ECB will state its cases against former Yorkshire head coach Andrew Gale and ex-bowling coach Richard Pyrah, who will both not attend, on Thursday before moving on to former England captain Michael Vaughan, who is set to appear.

  Rafiq briefly spoke to confirm witness statements regarding Hoggard, Bresnan and Blain but the panel said they had no need to ask him further questions. He is set to be called upon on Thursday.
