  Rafiq said former Yorkshire team-mates Bresnan and Gary Ballance used the phrase in reference to his sister's Pakistani heritage when they saw her at the media day while she was on work experience with the county.

  Ballance has previously admitted using the word during his time at Yorkshire. He has admitted liability in response to his charge and will not participate.

  The allegation formed part of the ECB's case against Bresnan, who has been charged with bringing the game into disrepute.

  The ECB's lawyer Jane Mulcahy, speaking at the International Arbitration Centre in London, said Rafiq also alleged Bresnan used the racial slur towards or about Asian women he found attractive from about 2014 onwards.

  Rafiq also claimed Bresnan, now 38, used the phrase to refer to an Asian woman who walked past them in a bar at a team hotel in Birmingham in July 2018.

  Bresnan, who played 23 Tests and 85 one-day internationals for England and won two Ashes series, said he had never and would never use these terms.

  In his initial response to the ECB and an interview with the governing body, Bresnan denied he had ever met Amna Rafiq. Later, he admitted he had seen her from afar when she was working at Leicester.

  Bresnan, who withdrew from proceedings in February, also denied ever being alone in a bar with Rafiq.

  What are the other claims against Bresnan?

  The two other parts of the charge against Bresnan concern allegations he used the terms "the brothers" and "you lot" in reference to Asian players at Yorkshire.

  Rafiq alleged Bresnan would regularly refer to him and other Asian players including England spinner Adil Rashid as "the brothers".

  It is also claimed Bresnan used the term towards Rafiq, Rashid, Ajmal Shahzad and Rana Naved-ul-Hasan before a Twenty20 match against Nottinghamshire at Trent Bridge in June 2009.

  Vaughan is accused of saying "too many of you lot, we need to do something about it" to those four Asian players before the same match, which he "completely and categorically denies".

  Bresnan said he had no recollection of asking "what are the brothers doing for dinner?" and said he was unlikely to use that phrase. He said he did use the term "brothers" or "brother" but not in a racial context.

  Shahzad said in his interview with the ECB that he did not hear Bresnan use racist terminology but he declined to provide a witness statement to the hearing.

  Rafiq accused Bresnan of using the phrase "you lot" regularly, and specifically towards him and Rashid before a County Championship match against Derbyshire on 15 August 2012.

  Bresnan admitted using the term regularly but denied it was in a racial context. He also said he had no recollection of the specific game against Derbyshire.

  Bresnan is also accused of asking former Yorkshire player Moin Ashraf "why do you lot pray before you bowl?" during T20 Finals Day in August 2012. Bresnan said he asked because he was genuinely interested and denied using the phrase "you lot" as part of the question.

  The ECB's case is that it is "more likely than not" Bresnan used these phrases in a racist or discriminatory manner, given Yorkshire have admitted a "systemic" use of such language during the relevant period, that Bresnan has admitted using the terms - albeit denying any racial connotation in their use - and that others involved in the case have admitted using such terms.

  The ECB have to prove their cases to the civil standard - that on the "balance of probabilities" the alleged conduct did occur.

  In the ECB's opening submissions, Mulcahy took the opportunity to "correct a number of misrepresentations" about the disciplinary process she claimed had been made by Bresnan, Blain, Pyrah and Hoggard to the media.

  Pyrah and Bresnan both claimed they had never been interviewed during the ECB's investigation, but the ECB said it has evidence to the contrary in the form of interview transcripts.

  Hoggard made a similar claim, but the ECB has evidence showing that after it initially wrote to him with the opportunity to provide written responses to the allegations made against him, he did so before informing the ECB he would not respond further, therefore denying himself the opportunity of an interview.

  Mulcahy also questioned Hoggard's claim he was not invited to participate in the investigation into Rafiq's claims by law firm Squire Patton Bogg (SPB), which upheld seven of the 43 allegations.

  She said emails from former acting chief executive Paul Hudson to Hoggard included attached emails from the investigation team to Hoggard, who denies receiving those messages. Hudson also reported the investigation team left a voicemail for Hoggard in March 2021.

  Former England bowler Hoggard was charged by the ECB following allegations he used racial slurs as well as referring to Rafiq and other Asian players in the Yorkshire squad as "you lot".

  He admitted to using the first racist term alleged and while he does not remember specifically using the second, he denied any racist or discriminatory intent. He also denied referring to Asian players or any other ethnic group as "you lot".

  It is also alleged Ashes winner Hoggard used the term "token black man" or "TBM" towards Ismail Dawood in 2004 and/or 2005 in the dressing room and in public.

  Hoggard claims ex-wicketkeeper and umpire Dawood gave himself the nickname on Hoggard's stag do in Dublin.

  Dawood told BBC Sport in February this was "another feeble attempt to malign and ridicule" and was "simply not true", and in his witness statement said Hoggard had used the phrase throughout the 2004 season.

  What is Blain charged with?

  The ECB charged Blain with using a racist phrase to describe Asian individuals during pre-season training at Headingley in 2010, as well as on other occasions at Yorkshire during that year and 2011. Blain denies the allegation.

  Rafiq alleges that on one occasion Blain used the term, he was pulled up for it by a team-mate and responded that it was "like calling a British person 'a Brit'".

  In his witness statement, former Scotland bowler Majid Haq said then team-mate Blain used the term in Nairobi in January 2007. Blain said in response that it was like calling Australians 'Aussies' and New Zealanders 'Kiwis'. Haq is set to give evidence on Friday.

  Blain denies both incidents took place and, in the case of the latter, alleged witnesses deny any recollection of the conversation.

  In laying out its case, the ECB noted the "striking" similarities of Blain's defence during the alleged incidents. It also said it was "notable" that Blain and Ballance overlapped in their time at Yorkshire.

  In the cases against Blain, Hoggard and Bresnan, Mulcahy said the panel could draw an "adverse inference" from their non-participation in the disciplinary proceedings.

  What is happening in the hearing?

  It has been more than two-and-a-half years since former Yorkshire spinner Rafiq first made claims of racism at the county, later calling English cricket "institutionally racist".

  The hearing concludes on 9 March and the opening four days of proceedings are being held in public. The rest will be conducted in private.

  A three-person panel will hear disciplinary proceedings brought against Yorkshire and seven individuals who were all charged by the ECB with bringing the game into disrepute.

  The panel comprises Cricket Discipline Commission chair, lawyer and former Derbyshire batsman Tim O'Gorman, Mark Milliken-Smith KC - a lawyer with specialist knowledge of sports law - and Dr Seema Patel, a senior law lecturer at Nottingham Trent University.

  Yorkshire will also not attend after the club pleaded guilty to four ECB amended charges, which were detailed on Wednesday.

  The county were accused of having "mishandled" the SPB investigation into Rafiq's initial claims of racism and charged with deleting relevant emails and/or documents held electronically, which the club last week confirmed had happened.

  The ECB stated Yorkshire "failed to take adequate action" on complaints of racist abuse against crowd members from fellow spectators during a match at Headingley in 2017 and at Scarborough in 2018.

  Yorkshire were also accused of failing to address the "systemic use of racist or discriminatory language over a long period" by employees or players at the club.
