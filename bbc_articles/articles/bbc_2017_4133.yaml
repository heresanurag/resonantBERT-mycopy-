title: 'Ross Barkley: Everton midfielder was victim of unprovoked attack, says lawyer
  - BBC Sport'
date: '2017-04-10'
section: General
url: http://www.bbc.co.uk/sport/football/39552207
content: |-
  Everton's Ross Barkley was the victim of an "unprovoked attack" in a bar, his lawyer says, as police investigate footage of the alleged incident.

  Last updated on .From the section Football

  Everton midfielder Ross Barkley was the victim of an "unprovoked attack" in a Liverpool bar, his lawyer has said.

  CCTV footage circulating on social media shows the 23-year-old England player being hit in the face by a man.

  Barkley was not seriously injured in the incident, which came hours after he played the full match for the Toffees in their win over Leicester on Sunday.

  Everton have not commented and no complaint has been made to police, who are viewing the footage.

  "Ross was the victim of an unprovoked attack by a stranger who approached him on Sunday evening," said Matt Himsworth, managing director of Himsworths Legal.

  Barkley, who trained as normal with his team-mates on Monday, has played 22 times for England and was part of Gareth Southgate's most recent Three Lions squad.

  The Liverpool-born player joined Everton as an 11-year-old and has made 173 first-team appearances.

  After Sunday's match, manager Ronald Koeman said Barkley should be sold if he does not sign a new contract.
