title: Thousands queue for hours to leave Burning Man festival - BBC News
date: '2023-09-05'
section: US & Canada
url: http://www.bbc.co.uk/news/world-us-canada-66704749
content: |-
  The wait time to leave was five hours as of Tuesday morning, after heavy rain left people stranded.

