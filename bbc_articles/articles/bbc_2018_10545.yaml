  Howard Johnson revisits the town of Aparri to assess the damage wreaked by Typhoon Mangkhut.

  The BBC's Howard Johnson revisits the town of Aparri to take a look at the damage caused by the Typhoon Mangkhut.

  Local community leaders say around 750 buildings in Aparri have been destroyed by the storm.
