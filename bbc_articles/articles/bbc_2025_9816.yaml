title: Gary Lineker's podcast The Rest is Football dropped by BBC after row - BBC
  News
date: '2025-05-21'
section: Culture
url: http://www.bbc.co.uk/news/articles/c0qgg2qn8g1o
content: |-
  The Rest is Football will have its last episode on BBC Sounds this week ahead of the host's exit.

  Gary Lineker, Micah Richards and Alan Shearer discuss football's biggest stories on The Rest is Football

  New episodes of Gary Lineker's podcast The Rest is Football will no longer appear on the BBC's audio streaming service after the presenter leaves the corporation in the wake of an antisemitism row. The show, which is produced by Lineker's company Goalhanger Productions, will continue to be available elsewhere, but will have its last episode on BBC Sounds this week. He had already been due to leave Match of the Day of Sunday, but will not stay to front the BBC's FA Cup and World Cup coverage next year as planned after being critcised for sharing a post about Zionism bearing the image of a rat. He has apologised, saying on Monday he did not see the image and that he "would never consciously repost anything antisemitic".

  He said: "However, I recognise the error and upset that I caused, and reiterate how sorry I am. Stepping back now feels like the responsible course of action."

  In November, the 64-year-old announced that this season would be his last as host of Match of the Day. He had been expected to continue fronting the BBC's coverage of the men's FA Cup and next summer's World Cup, but will now cut ties with the corporation completely after the final day of the Premier League season on Sunday. The Rest Is Football sees Lineker discuss football's biggest stories in a light-hearted manner with his Match of the Day sidekicks Alan Shearer and Micah Richards. The original Goalhanger agreement, announced last November, was for a "one-year deal with the opportunity to extend, with episodes remaining available on BBC Sounds for three years". The Rest is History, another popular Goalhanger production, hosted by Tom Holland and Dominic Sandbrook, will continue to be available on the platform. Other titles in the Goalhanger stable include The Rest is Politics and The Rest is Entertainment.
