title: 'Watch: Donald Trump calls trial ''a disgrace'' after guilty verdict - BBC
  News'
date: '2024-06-02'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-69077610
content: |-
  The former US president was found guilty on all 34 counts on Thursday.

  Former US president Donald Trump says his trial was "rigged" after a jury found him guilty of falsifying business records on Thursday.

  Speaking outside the courthouse after the verdict, he said he was a "very innocent man" and that the trial was a "disgrace".

  "This is long from over," he added, before walking away without answering questions.

  He will be sentenced on 11 July
