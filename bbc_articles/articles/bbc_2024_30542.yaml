title: Trump rings bell on record stock market - but will it last? - BBC News
date: '2024-12-12'
section: Business
url: http://www.bbc.co.uk/news/articles/clyn8yjw11go
content: |-
  The US president-elect comes into office with a strong economy, but investors hope for more and current highs may be difficult to sustain.

  Trump rings bell on record stock market - but will it last?

  Donald Trump stood on Wall Street on Thursday, a euphoric crowd of America's business elite assembled before him, and hammered the bell to kick off morning stock market trading. The mood was celebratory. Not only had the president-elect just been named Time person of the year, but the stock market, already up strongly, has surged to new heights since his election. For Trump, whose public appearances have been relatively sparing since his election win last month, the visit was a reminder of the high value he places on market opinion. But whether history will look back on his appearance as the well-timed heralding of another economic boom - or a death knell - remains to be seen.

