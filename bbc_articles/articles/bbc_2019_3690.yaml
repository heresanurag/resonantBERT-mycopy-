content: |-
  Safiyyah Syeed says since starting boxing she's found a new outlet which makes her happy.

  A teenage Bradford boxer, who wears a hijab, is aiming to break stereotypes in the sport.

  Safiyyah Syeed, 18, plans to have her first official amateur fight later this year.

  She says the sport has changed her life: "Honestly, I could have the worst day in the world but when I walk through them doors, I just forget."

  This video was created in 2019 as part of We Are Bradford - a BBC project with the people of the city to tell the stories which matter to them.

  You can find out how to get into boxing with the BBC Get Inspired guide.
