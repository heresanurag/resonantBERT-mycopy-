title: Sir Chris Hoy says he is 'blown away' by the increase in men seeking prostate
  cancer advice - BBC Sport
date: '2024-10-25'
section: Cycling
url: http://www.bbc.co.uk/sport/cycling/articles/cd7n3997l4zo
content: |-
  Six-time Olympic cycling champion Sir Chris Hoy says it is a 'huge comfort' to know that his story could save lives.

  Sir Chris Hoy performed the baton ceremony before the men's cycling sprint finals at this year's Paris Olympics

  Cyclist Sir Chris Hoy says he has been "blown away" by a near eight-fold increase in NHS searches for prostate cancer symptoms since he revealed his terminal diagnosis. The six-time Olympic champion, 48, said at the weekend that doctors have told him he has between two and four years to live. In the 48 hours after he had confirmed the news, NHS England said there were 14,478 visits to their symptoms advice website, compared to 1,876 in the previous week - a rise of 672%. It added the numbers peaked on Sunday with 8,816 visits. In a video posted on social media, external on Thursday, Sir Chris said he had received "incredible kindness and support". "I now have a deep resolve to turn this incredibly difficult diagnosis into something more positive," he added. "I understand that there has been a massive increase in men seeking advice in prostate cancer in the last few days and that's been a huge comfort to us to know that hopefully many lives could be saved by early testing." Sir Chris also said that he has written a book titled All That Matters, which will be released in November, about his illness and the story of his life since retiring from professional cycling in 2013. He described the writing experience as cathartic for himself and his family, and said that he hopes the book can provide understanding around how families deal with a terminal diagnosis and to "remind us that all we have is now". NHS England's National Clinical Director for Cancer, Professor Peter Johnson said: "We're very sorry to hear about Chris' prognosis, but his decision to speak so openly about it could save lives by encouraging people to come forward sooner with their symptoms. "Thanks to his bravery, we have seen a significant spike in people accessing vital information on our website about the signs and symptoms of cancer."

  Sir Chris and Sarra Hoy married in 2010 and share two children

  Sir Chris won six Olympic golds between 2004 and 2012 - the second highest total by any British Olympian behind Sir Jason Kenny's tally of seven. His wife, Sarra, also posted on social media that she was "completely overwhelmed" by the response. The pair have two children and Sarra was diagnosed with multiple sclerosis shortly before her husband learned of his illness. "I've been told that Chris' story is likely to save countless lives and this takes my breath away," she posted. "Watching Chris on the BBC at the weekend was like watching a masterclass in strength of character, dignity and humility. "I've said it before and I'll say it again - he truly is my real-life superhero." Sir Chris had been in Copenhagen with the BBC Sport team covering the World Track Cycling Championships, which took place between 16-20 October.
