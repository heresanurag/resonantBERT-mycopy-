  Agent Lauren Kelly said when she got the call about Hattie, "I was absolutely overwhelmed and shocked that I managed to get a little girl from here into what was definitely shaping up to be the film of the year". She said when that was followed by Karis's offer, she "cried actual tears". "To have Hattie already down there filming was amazing, but for her friend to then book the younger version of the title role was just the icing on the cake," she added. The two girls said they hoped their big breaks would lead to more film roles and lead to a long acting career. "I would like to carry on with main character vibes," Karis added.
