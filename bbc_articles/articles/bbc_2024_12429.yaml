title: 'Staines: Surrey Police to investigate cow being hit - BBC News'
date: '2024-06-19'
section: Surrey
url: http://www.bbc.co.uk/news/articles/c4nnk7ywnvqo
content: |-
  A police watchdog says Surrey Police’s professional standards department should investigate.

  A video which showed a police car twice hitting the escaped calf in a residential street caused widespread outrage

  Surrey Police has been told to carry out an investigation into why an escaped calf was "contained" on an urban street by it being hit with a patrol car. The force referred itself to the Independent Office for Police Conduct (IOPC) after a video emerged of the cow being rammed on Friday night, sparking widespread outrage. However, the IOPC has said an inquiry will be carried out by "Surrey's professional standards department". Deputy Chief Constable Nev Kemp said he knew how important it was to provide the public with answers on the incident and the events leading up to it.

  Beau Lucy has since been reunited with her herd

  Surrey Police said it also intended to make a compassionate payment to the owner of the cow to cover both the cost of her recovery from the scene and the cost of the immediate critical care by a veterinarian. "Service payments must be invoiced and recorded, and we have advised the owner of the trailer to invoice the force," a spokesperson added. Police said the total sum of the payment wasn't yet known as it would include costs from the vet which had not yet been received.

  A police car was seen twice ramming into the cow, now recovering and reunited with her herd, after she was reported to be walking the streets in Staines-upon-Thames. The officer driving the car has been removed from frontline duties, Surrey Police previously confirmed. The IOPC told Surrey Police to investigate whether the "methods used to contain the cow" were “appropriate and proportionate”. A spokesman added: “If the complainants are unhappy with the outcome of the investigation they will have a right of review to the IOPC, providing a level of independent oversight.”

  Mr Kemp said: "We acknowledge the decision of the IOPC that this should be a local investigation and will continue to progress this accordingly. "A full and thorough investigation will be led by Surrey Police’s professional standards department and overseen by a senior investigating officer from Surrey and Sussex Police’s Major Crime Team." He said it would take time but that he was committed "to ensuring that this is diligently investigated". An NFU spokesperson previously called for a protocol to safely deal with such situations, while Home Secretary James Cleverly described the actions as "heavy handed".

