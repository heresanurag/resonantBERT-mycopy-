id: bbc_2018_6722
title: 'Turkey election: Erdogan thanks voters for ''love'' - BBC News'
date: '2018-06-25'
section: General
url: http://www.bbc.co.uk/news/world-europe-44597818
content: |-
  The Turkish president addressed supporters in Ankara after his victory in a presidential vote.

  Turkey's long-standing leader Recep Tayyip Erdogan has been re-elected as president, the election authority says.

  He will assume sweeping executive powers under a new constitution.
