title: 'World Cup 2018: Thank you Russia for the memories - BBC News'
date: '2018-07-15'
section: Newsbeat
url: http://www.bbc.co.uk/news/newsbeat-44838245
content: |-
  As the 2018 World Cup comes to a close, Newsbeat’s Ben Mundy reflects on the tournament.

  They think it's all over, it is now.

  The 2018 World Cup closed on Sunday when France beat Croatia in the final.

  England finished fourth after their 2-0 defeat to Belgium.

  And it all concludes a rather breathtaking five weeks in Russia, so here are some of the things to remember:

