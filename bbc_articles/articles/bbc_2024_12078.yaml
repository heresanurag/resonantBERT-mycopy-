title: 'Newspaper headlines: ''England''s winning start'' and Labour''s jobs pledge
  - BBC News'
date: '2024-06-16'
section: The Papers
url: http://www.bbc.co.uk/news/articles/ce99meep5j8o
content: |-
  England's winning start at Euro 2024 and Labour's plan for 650,000 jobs lead Monday's newspapers.

  England's Jude Bellingham celebrates after giving his team the lead against Serbia

  Pictures of a triumphant Jude Bellingham celebrating his winning header for England feature on several front pages. The Daily Express nicknames him "head boy Jude". The Daily Mirror plays on his shirt number, calling him "perfect ten"., external Puns inspired by The Beatles are well represented. "Hey Jude," says the Daily Telegraph. "Yay, Jude" says the Sun. While the Daily Star goes for the slightly more imaginative: "Wahey Jude"., external The Daily Mail describes the match as a "nerve jangler", but says the result gave us "all something to cheer about!". "Go for the jugular" is the headline in the Times. The paper says ministers have urged Rishi Sunak to get personal with his attacks against Sir Keir Starmer, external. One un-named minister is quoted as saying: "I don’t think that there are any other options left.” An ally of Mr Sunak tells the paper that the prime minister did directly criticise the Labour leader during the first head-to-head TV debate. Separately, the Energy Secretary Claire Coutinho has attacked Labour's net zero plans, external. Writing in the Daily Telegraph, she said the party's policy of blocking new oil and gas exploration would take Britain "back to the dark ages". She said the proposal would "destroy jobs, raise taxes and hike up your bills". Labour dismissed the claim as "desperate nonsense". The i says Labour has been accused of "watering down" its pledges on housing. The paper says the party has ditched specific targets on ownership and affordable homes, external that featured in its national policy forum document last year. Labour sources tell the i that the policies were never officially presented to the public.

