  The Financial Times leads on an interview with the shadow chancellor Rachel Reeves. It says she has pledged to "tear down trade barriers" with the EU if Labour wins the election, external. But she is again stressed there would be no re-joining of the single market or the Customs Union. Ms Reeves has also told the paper she would hold an "investment summit" within 100 hundred days of forming a Labour government. She says its aim would be to attract foreign investors who have been put off by the UK's political instability. The Guardian says Rishi Sunak is "not opposed" to changing the law on assisted dying, external. It quotes the prime minister as saying "he's not against it in principle", and that it is a "question of having safeguards in place". The paper says Sir Keir Starmer supports changing the law and has set aside time for a vote on the issue should he win the election. Finally, the Star carries a warning about the aftermath of England's victory against Serbia. "The Hangover" is the headline on the front page, which features an image of jubilant fans celebrating, external. The paper says one million people are expected to "pull a sickie" this morning "after downing 30 million pints".
