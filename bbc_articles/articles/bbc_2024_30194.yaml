title: Tributes to former Scottish FM Alex Salmond at cathedral service - BBC News
date: '2024-12-01'
section: Scotland
url: http://www.bbc.co.uk/news/articles/cqj05kn4w8yo
content: |-
  The St Andrews Day memorial nearly a month after the former Scottish first minister's death included musical performances, prayers, eulogies and poems.

  This video can not be played To play this video you need to enable JavaScript in your browser.

  Former First Minister Alex Salmond has been hailed as a "political genius" at his memorial service in Edinburgh. High-profile figures including First Minister John Swinney and former prime minister Gordon Brown gathered at Edinburgh's St Giles' Cathedral. Salmond, 69, died of a heart attack while attending a conference in North Macedonia on 12 October. The St Andrew's Day service included tributes from political allies and opponents as well as musical performances by Dougie MacLean and The Proclaimers.
  • None Alex Salmond service as it happened - 'Independence burned in his heart' Salmond was buried after a private funeral service on 29 October in the village of Strichen in Aberdeenshire, where he had lived for many years with his wife, Moira. The memorial event was invitation only, with about 500 people attending.

  Crowds lined the Royal Mile in Edinburgh for the memorial service

  Moira Salmond was accompanied into the service by Rev Dr George Whyte

  Deputy First Minister Kate Forbes went to the service, as did Scottish Conservative leader Russell Findlay, Labour leader Anas Sarwar and Holyrood Presiding Officer Alison Johnstone. Actor Elaine C Smith, football pundit Michael Stewart and businessman Jim McColl were among the other guests. Former first minister Nicola Sturgeon, who had a public fallout with Salmond in the years after she succeeded her ex-mentor as SNP leader, did not attend. She was at the funeral of comedian Janey Godley in Glasgow on Saturday morning, but said her thoughts were with Salmond’s family and friends She described it as “a very sad day for them but one that I hope will allow them to remember Alec in the way they want to”.

  First Minister John Swinney and other political leaders attended the service

  Former prime minister Gordon Brown spoke with John Swinney at St Giles' Cathedral

  Salmond's service was led by the Rev Dr George Whyte, the former Principal Clerk of the General Assembly of the Church of Scotland. Mr Whyte said that the ex-first minister's life had “challenged the status quo”, adding: “He called people to a cause in which he believed and for which he would endure the slings and the arrows.” Salmond's niece Christina Hendry and his close friends and political allies Duncan Hamilton KC and Kenny MacAskill shared their memories of the former SNP leader. Ms Hendry described her uncle as a “political giant” and “dearly loved” family member.

  Singer Dougie MacLean was among the guests at St Giles

  The Proclaimers were among the acts to perform at the memorial service

  Kenny MacAskill called him a “political genius”, while Mr Hamilton recalled him as a "leader of courage, vision and intelligence”. Sir David Davis, the Conservative MP who was a close friend of Salmond's, read a passage from John 14: “Do not let your hearts be troubled”. Dougie MacLean sang Caledonia, while The Proclaimers expressed their "eternal gratitude" to Salmond before performing Cap in Hand, with the lyrics: "I can't understand why we let someone else rule our land, cap in hand."

  Alex Salmond was buried in a private funeral service near his home in Aberdeenshire

  Salmond was Scotland's first minister from 2007 to 2014. He stepped down after the Yes campaign lost the Scottish independence referendum. He resigned from the SNP amid allegations of sexual misconduct. Those later formed the basis of a criminal trial at the end of which he was acquitted of all charges. Salmond went on to set up the alternative independence-supporting party, Alba. He also hosted a talk show on the Russian-owned television channel RT. You can watch the Memorial Service on BBC iPlayer.
