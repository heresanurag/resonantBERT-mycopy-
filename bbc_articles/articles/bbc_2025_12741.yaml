title: Luton robbers attack Met Police officer with machetes - BBC News
date: '2025-06-24'
section: General
url: http://www.bbc.co.uk/news/videos/czxwkkx2d5po
content: |-
  CCTV footage shows PC Darren Attwood confronting the pair who had stolen a motorbike.

  Police have released footage of an off-duty officer defending himself against two machete-wielding robbers.

  PC Darren Attwood was injured after confronting the pair in Luton on 2 November.

  Brothers Hannan Mahmood, 20, and Humar Mahmood, 19, of Belmont Road, Luton, were jailed for seven years at Luton Crown Court on Monday for various offences.

  PC Attwood, of the Metropolitan Police, recalled one of the men saying "just kill him" which he said was "not ideal".

  The force commissioner Sir Mark Rowley said: "PC Attwood's actions demonstrated the very best of policing – bravery, dedication, a commitment to service and a passionate drive to protect people."

