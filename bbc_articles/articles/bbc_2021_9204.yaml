title: 'Tokyo Olympics: Geraint Thomas'' hopes dashed in crash as Ecuador''s Richard
  Carapaz wins road race gold - BBC Sport'
date: '2021-07-24'
section: Olympics
url: http://www.bbc.co.uk/sport/olympics/57952349
content: |-
  Geraint Thomas' medal hopes are dashed during fall in the men's road race as Ecuador's Richard Carapaz wins gold.

  This video can not be played To play this video you need to enable JavaScript in your browser. Geraint Thomas: Team GB cyclist crashes on day one of the Tokyo Olympics road race

  Great Britain's Geraint Thomas saw his medal hopes in the men's road race dashed after crashing for a second successive Games as Ecuador's Richard Carapaz won gold at the Tokyo Olympics. The 35-year-old, who also came off his bike at Rio 2016, suffered a fall involving team-mate Tao Geoghegan Hart. Thomas, the 2018 Tour de France winner, eventually pulled out with 60km to go. Carapaz, 28, motored clear to win a thrilling race by one minute seven seconds from Belgium's Wout van Aert. Van Aert won the sprint for silver, beating Slovenia's Tour de France winner Tadej Pogacar, who took bronze. British rider Adam Yates briefly led that sprint but finished ninth, while his twin brother Simon was 17th. "I'm feeling beaten up but not too bad," said Thomas, who will now focus on Wednesday's time trial. "I've definitely felt worse. The muscles and everything went into spasm almost. "It was a freak thing. Tao slipped on the metal ridge in the middle of the road and I had nowhere to go, I just went straight down. "We live to fight another day and I'll try to rest up now to give Wednesday one last go."

  This video can not be played To play this video you need to enable JavaScript in your browser. Tokyo Olympics: 'He's beaten the best in the world' - Carapaz wins road race gold

  The riders finished in front of around 10,000 fans at the Fuji International Speedway circuit, with venues outside Tokyo allowed to host up to 50% capacity. Thousands of onlookers also lined the streets to get a glimpse of the competitors as the 234km route weaved its way out of the city towards the foothills of Mount Fuji.

