  An early breakaway group opened a gap of more than 17 minutes as they hit the ascent towards the Doshi Road, the first of five climbs on a mountainous course. It was on that stretch the British pair crashed, with two-time team pursuit gold medallist Thomas tumbling over Geoghegan Hart after the 2020 Giro d'Italia champion lost his front wheel. That will have brought back memories of 2016 for Thomas, when he fell during the final descent in Rio, and of this year's Tour de France when the Welshman dislocated his shoulder. The leading riders were eventually reeled in and Pogacar saw a bid to break free snuffed out, before Carapaz and American Brandon McNulty went clear. But it was Carapaz who had the legs to pull away once more for a superb solo victory that earned Ecuador only their second Olympics gold medal.

