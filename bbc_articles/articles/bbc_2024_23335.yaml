title: Hijacked bus in Los Angeles chased by line of police cars - BBC News
date: '2024-09-26'
section: General
url: http://www.bbc.co.uk/news/videos/cvg3qg92rqeo
content: |-
  A passenger is shot dead before a Swat team deployed flash-bang grenades and arrested the suspect.

  A passenger was killed after an armed man hijacked a bus in Los Angeles just before 01:00 (09:00 BST) on Wednesday.

  Police say they stopped the bus with spike strips after an hour-long pursuit through the downtown area.

  Video shows a long line of police cars chasing the vehicle, with "911 CALL POLICE" flashing on its display.

  A man who was found inside the bus with gunshot wounds later died in hospital, and the suspect has been arrested.

