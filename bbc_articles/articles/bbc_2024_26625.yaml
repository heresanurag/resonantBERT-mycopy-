title: Minneapolis 10-year-old arrested for driving stolen car through playground
  - BBC News
date: '2024-10-04'
section: General
url: http://www.bbc.co.uk/news/videos/cg78v0l5gxvo
content: |-
  The child driver in the US city of Minneapolis nearly hit playing children and has been arrested.

  Minneapolis police have arrested a 10-year-old boy for driving a stolen car through a school playground, nearly hitting playing children.

  The incident occurred on 20 September at Nellie Stone Johnson School, with the boy now facing second-degree assault charges.

  Police records show the child has over 30 prior entries, including auto theft and assault.

  The family is cooperating with authorities, and the city's police chief Brian O'Hara has called for urgent intervention to prevent further harm.
