title: Aboriginal protester arrested outside Sydney Opera House - BBC News
date: '2024-10-22'
section: Australia
url: http://www.bbc.co.uk/news/articles/c79n9l0p3x8o
content: |-
  The man was arrested for yelling slogans echoing those an Australian senator aimed at the King on Monday.

  This video can not be played To play this video you need to enable JavaScript in your browser. Moment Aboriginal protester is arrested during the King's Sydney tour

  An Aboriginal protester has been arrested at the Sydney Opera House as crowds awaited a glimpse of the King and Queen on the final day of their tour in Australia. Thousands of people packed the harbourside forecourt to see the royal couple visit on Tuesday afternoon. Before they arrived, Wayne Wharton, a prominent Indigenous activist from Brisbane, was arrested after shouting anti-monarchist slogans and refusing a police order to move on. It comes as backlash over an Aboriginal senator's heckling of King Charles in Canberra on Monday intensifies.

  Mr Wharton had shouted "he’s not my King", echoing the words of independent Senator Lidia Thorpe the day before. The crowd waiting for the royals - many clutching Australian flags - shouted back "God save the King". Mr Wharton had also protested outside the church service the royals attended on Sunday. Thorpe's protest has been praised by some Indigenous activists as brave, but condemned by other prominent Aboriginal Australians as "embarrassing" and disrespectful. It has also been roundly criticised by her parliamentary peers. On Tuesday, Thorpe said she had deleted a violent cartoon of the King that was posted to her Instagram account, describing it as "inappropriate" and posted by a staff member without her knowledge. Outside the Sydney Opera House, onlookers applauded officers when Mr Wharton was arrested and placed into a police van. Many of the hundreds there had been queuing since early on Tuesday, a few draped in British flags. Others had accessorised with royal-themed jewellery and handbags. “We want to celebrate our country and all the people in it,” said Karen Clark, with her little boys Benjamin and Harrison who were both wearing crowns and capes with a fake fur trim. “We were brought up with the King, we celebrate the King’s birthday with the boys - it’s fun to have high tea and dress up in our best outfits.” Christie Delaney also lined up for several hours. Her reward? Shaking Queen Camilla’s hand. “I got a lot of excitement out of it to be honest... seeing somebody so famous," she told the BBC. "To be able to shake her hand and actually say hello to her and welcome her to Australia - that's something else isn’t it?” Bettina Bethuel, who came with her friend Taja Shephard, said: “My father was from Liverpool and I’ve always been interested in the royals." Taja saw the heckling by Thorpe on TV and wasn’t impressed. “I thought it was a little rude but I suppose she makes her point for Indigenous people,” she said. “But I don’t think it’s appropriate how she behaved.”

  Nellie Pollard-Wharton, who was with her father as he was arrested, said it was "laughable" to watch crowds "cheering as he’s put into a paddy wagon [police van] for standing up for his rights". "[We] need to keep resisting so we can have treaties, so we can have our rights heard, so our young people and our men and women in custody stop dying, so that our health outcomes improve... so we can actually self-determine," she told the BBC. On the other side of the city, King Charles began Tuesday with a visit to the National Centre of Indigenous Excellence in Redfern, where he met with Aboriginal elders. He later attended a community picnic in Parramatta, where the monarch had a go at cooking sausages on a barbeque before meeting a sheepdog.

