title: Councillor's wife appeals against jail term for Southport tweet - BBC News
date: '2025-05-15'
section: Northamptonshire
url: http://www.bbc.co.uk/news/articles/ckg4n4613npo
content: |-
  A councillor's wife tells the appeal court she never intended to incite violence with a 2024 post.

  Supporters held up a banner outside the Appeal Court

  A Conservative councillor's wife who was jailed after an online rant on the day of last year's Southport attacks "never" intended to incite violence, the Court of Appeal has heard. Lucy Connolly, from Northampton, used a social media post on 29 July to call for "mass deportation now" and urged followers to "set fire" to hotels housing asylum seekers. She is appealing against the sentence of two years and seven months she was given after she admitted inciting racial hatred. Supporters staged a demonstration outside the Appeal Court in London.

  The post came after three girls were stabbed and killed at a holiday club in Southport on the same date, sparking nationwide unrest. Giving evidence from HMP Drake Hall in Eccleshall in Staffordshire, Connolly told the Appeal Court when she initially wrote the post on X that she was "really angry, really upset" and "distressed that those children had died" and that she knew how the parents felt. The court heard that Connolly's son died tragically about 14 years ago, and that news of the murders in Southport had caused a resurgence of the anxiety caused by her son's death. Adam King, representing Connolly, asked if she had intended for anyone to set fire to asylum hotels, or "murder any politicians".

  Lucy Connolly is appealing against her prison sentence

  When asked why she had deleted the post three and a half hours after publishing it, Connolly added: "I calmed myself down, and I know that wasn't an acceptable thing to say. "It wasn't the right thing to say; it wasn't what I wanted to happen." Connolly told the court that during discussions with her barrister at the crown court, she did not understand that by pleading guilty she was accepting that she intended to incite violence. She said: "When I wrote that tweet there had been no violence and it was never my intention to cause any."

  Former Conservative councillor Ray Connolly was at hearing at the Royal Courts of Justice in central London and said he was "disappointed" there was no ruling

  Following Thursday's hearing, the Appeal Court judges said they would issue a written judgment "as soon as possible" Connolly's husband, Ray, had been a Conservative member of West Northamptonshire Council but lost his seat on 1 May. Speaking outside the Royal Courts of Justice after the hearing, Mr Connolly said: "Obviously I'm disappointed today. It didn't come to a conclusion and get a result. "It's 279 days now my daughter's been without her mother. I'm hoping that within a week she'll be home and this will come to a positive conclusion."

