title: Record-breaking crowds at Europe's largest Eid celebration - BBC News
date: '2018-06-15'
section: England
url: http://www.bbc.co.uk/news/uk-england-44496158
content: |-
  More than 140,000 people gather in Birmingham to celebrate Eid, which marks the end of Ramadan.

  Tens of thousands of people gathered in Birmingham's Small Heath Park on Friday to mark Eid

  As millions of Muslims around the world celebrate Eid, Birmingham is hosting Europe's largest event with more than 140,000 people gathering in Small Heath Park.

  Now in its seventh year, Celebrate Eid marks the end of Ramadan, the Islamic holy month of fasting.

  The huge celebration in Birmingham is organised by Green Lane Masjid and Community Centre (GLMCC) in the city and includes global delicacies, a bazaar and a funfair.

  Eid al-Fitr, which means "festival of breaking the fast", is a religious holiday and a day of celebrations when Muslims will give thanks to Allah and exchange small gifts and cards.

  Eid al-Fitr is one of the most important Muslim festivals in the Islamic calendar

  The celebration marks the end of Ramadan, which is the holy month of fasting

  The event has seen record-breaking crowds attending this year, up on the 106,000 last year, the GLMCC said

  Swedish National Nordin Tejeur, 44, who lives in Birmingham, said: “The festival is getting bigger every year”

  Worshippers of all ages came together for morning prayers, before enjoying the festivities

  The event has fairground rides, miniature golf and laser clay pigeon shooting, as well as food and drink from local food stalls

  This family from Yardley, Birmingham, enjoyed palm-themed flavoured ices at the festival

  A spokesman for GLMCC said: "We've been working for months with five local mosques and our charity partner Human Appeal to organise the community for a memorable day of prayer, games and fun"

  "This celebration is one of the most important in the Islamic religious calendar and it's an opportunity for us all to come together in peace and unity," the spokesman added

  The event has grown in popularity since it started in 2011, when 12,000 people attended

  Meanwhile, hundreds of people have gathered for the first time in Middlesbrough's Albert Park to begin Eid celebrations...

  A spokesman for the Birmingham event said: "We're all overwhelmed that so many people from different faiths and from across the world have travelled to Birmingham for this year's Celebrate Eid."

