content: |-
  Handcuffed Louis De Zoysa shot Sgt Matt Ratana with an antique gun he smuggled into a custody centre.

  'You were able to think about what you would do'

  The judge is going over the details of the case, and what happened on 25 September 2020. He says that De Zoysa knew that he was in possession of a gun, that he knew the gun could kill, and that he tried to retrieve the gun while he was handcuffed. "You had no lawful or good reason for the possession of the loaded gun or the cartridges," he says. He notes it was 50 minutes between the time he was stopped, and when he shot Mr Ratana. While in custody, "you were able to think about what you would do". "You posed a lethal risk" not just to Ratana, but also to other officers nearby, judge says. He says he was treated with "conspicuous compassion and kindness" on previous occasions when he was arrested.
