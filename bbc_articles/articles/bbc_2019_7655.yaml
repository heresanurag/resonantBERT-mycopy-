title: Donald Trump challenges Sadiq Khan to IQ test - BBC News
date: '2019-06-16'
section: General
url: http://www.bbc.co.uk/news/uk-36299929
content: |-
  Donald Trump challenges the new London mayor to an IQ test, during an interview on Good Morning Britain.

  Speaking on Good Morning Britain, Donald Trump has challenged the new London mayor to an IQ test after Sadiq Khan said he was ignorant.

  Mr Khan reacted to Mr Trump's latest comments, saying his views on Islam were ignorant.
