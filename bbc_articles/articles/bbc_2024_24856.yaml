title: Wales striker Kieffer Moore says Iceland opening shows they are on track -
  BBC Sport
date: '2024-10-12'
section: Wales Men
url: http://www.bbc.co.uk/sport/football/articles/cvgdzldeldmo
content: |-
  Wales striker Kieffer Moore believes the first half against Iceland showed everything they are trying to achieve under new boss Craig Bellamy.

  Striker Kieffer Moore has scored 13 goals in 46 games for Wales

  Coverage: Listen on BBC Radio Wales, BBC Radio Cymru & BBC Sounds; live text commentary on the BBC Sport website & app

  Wales striker Kieffer Moore believes the first half against Iceland on Friday showed everything they are trying to achieve under new manager Craig Bellamy. Goals from Brennan Johnson and Harry Wilson capped a dominant opening period for Wales in the Nations League game in Reykjavik. The second half was in stark contrast, as Wales crumbled to allow the hosts to come back to make it 2-2 and were perhaps fortunate to escape with a draw after Iceland hit the post late on. "First half it showed what we're about and what we're working on. Everything came off and that was our identity - that's how we should play," said Moore, who led the line in Reykjavik. "Second half we just lost a little bit of it. Iceland are no mugs. They're a good team and when you give a team like that a foothold in the game they can take advantage, which is obviously what they did. "But a point away from home is still a good result and we remain unbeaten."

