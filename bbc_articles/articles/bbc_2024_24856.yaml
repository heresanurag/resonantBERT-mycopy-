  Despite letting slip a lead that would have seen Wales top Group B4, they remain unbeaten under Bellamy following an opening draw with Turkey and 2-1 win in Montenegro in September. The reverse fixture against Montenegro comes on Monday at Cardiff City Stadium, with Moore keen for Wales to put into practice the lessons learned. "You can get exposed and it's a good learning curve for us," said the 32-year-old Sheffield United forward. "We're all new to this system and for us to be dealt with something like that - when they go man for man second half - is something we can learn from. "It was understanding where our free player was and we couldn't really find him. We'll look back at the footage where we went wrong and can improve on it. "In the whole of scheme we're grateful to get a point. We'll all remain positive because there are no easy places away from home and we'll take that point."

  Wales will be without Tottenham Hotspur forward Johnson and Rennes midfielder Jordan James against Montenegro due to suspension, after they picked up their second bookings of the campaign against Iceland. Johnson, who has scored seven goals in seven games for club and country, was taken off at half-time after taking a knock during the first half and was replaced by Ipswich Town's Wes Burns. "We're without players on Monday but it's a squad game and we've got some really good players to come in. I'm sure they'll take their chances when they get them," Moore added. "We've scored four goals away from home and that's what we're about. We're a high-press, high-attacking team and when we do get those chances in that style of play it's exciting. It gets people on their feet but sometimes it can work against you as well. "It's [top spot] still in our hands. We're still unbeaten and we look forward to Monday."
