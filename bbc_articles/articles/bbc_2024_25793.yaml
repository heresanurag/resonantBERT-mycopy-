  The actor opened the show in a sketch parodying Kamala Harris' interview on Fox News.

  Alec Baldwin returns to SNL for the first time since Rust trial

  Alec Baldwin will not stand trial again over Halyna Hutchins' death

  Alec Baldwin has returned to US sketch show Saturday Night Live (SNL) for the first time since his trial over a fatal shooting on the set of the film Rust was dismissed. Baldwin said his career might be over after a prop gun he was holding during rehearsals fired a live round killing Halyna Hutchins in 2021, leading to him being charged with involuntary manslaughter, which he denied. He returned to SNL this week, a show he has hosted a record 17 times. He opened this week's episode as Fox News host Bret Baier, in a parody of his recent interview with Democratic US presidential nominee Kamala Harris.

  Alongside Maya Rudolph as Harris, the pair poked fun at the combative interview. Baldwin's Baier said he could not listen to his interviewee's answers "because I'm talking", a joke about how the pair interrupted each other. After they shook hands, Rudolph's Harris laughed: "The pleasure is neither of ours." In 2017, Baldwin won an Emmy award for his portrayal of Republican US presidential nominee Donald Trump on SNL.

