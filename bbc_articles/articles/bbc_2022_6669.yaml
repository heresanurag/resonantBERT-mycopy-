content: |-
  The Ukrainian president says a group of about 100 people have left the besieged steel plant in the city.

  Ukrainians have been honouring dead friends and relatives, as is traditional on the first Sunday after Orthodox Easter.

  Alla Krotkikh comforts her 10-year-old son Savelii, as they mourn his father Ihor Krotkikh, 47, who she says was a soldier killed by shelling Image caption: Alla Krotkikh comforts her 10-year-old son Savelii, as they mourn his father Ihor Krotkikh, 47, who she says was a soldier killed by shelling

  Anatolii and Olena visit the grave of their son Oleksandr, a soldier, as part of the Easter tradition known as Hrobki or Provody Image caption: Anatolii and Olena visit the grave of their son Oleksandr, a soldier, as part of the Easter tradition known as Hrobki or Provody

  Crosses and floral wreaths are seen in a cemetery in Irpin, outside Kyiv, which saw intense fighting earlier in the war Image caption: Crosses and floral wreaths are seen in a cemetery in Irpin, outside Kyiv, which saw intense fighting earlier in the war

  Disabled athletes were among those in Lviv mourning soldier Dmytro Sydoruk, who also coached soldiers with disabilities for the Invictus Games Image caption: Disabled athletes were among those in Lviv mourning soldier Dmytro Sydoruk, who also coached soldiers with disabilities for the Invictus Games

