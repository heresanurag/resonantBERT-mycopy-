title: 'French elections: Macron v Le Pen and two visions for France - BBC News'
date: '2022-04-24'
section: Europe
url: http://www.bbc.co.uk/news/world-europe-61140262
content: |-
  French voters have a big choice to make on public services, immigration and foreign policy.

  The two candidates appeared only once together during the campaign to challenge each other's policies

  Emmanuel Macron and Marine Le Pen are proposing two very different futures for France, at home and abroad.

  As French voters decide on Sunday which of the two will lead their country, what are their rival plans for the next five years?

  The cost of living has been the number one issue of the election, and far-right hopeful Marine Le Pen has made it the focus of her campaign. But her other big plan is to make social housing, jobs and welfare a "national priority" for French nationals and to fight Islamism. Under the banner Marine, Présidente, she tells her supporters victory has never been so close.

  Her centrist rival has sought to rally voters under the slogan Nous Tous - All of us. And after five years in power, Emmanuel Macron's offer is for "complete renewal", as he tries to attract voters from the left as well as the mainstream right.

  Marine Le Pen has promised a raft of measures to cut the cost of living, which she wants to make the priority of a Le Pen presidency. She wants to scrap income tax for all under-30s, reduce VAT on fuel from 20% to 5.5% and abolish it on 100 other essentials. She wants to get businesses to raise wages by 10%, making the increases free of employer tax contributions, and to push up teachers' salaries by 3% every year for the next five years. She also wants to slash toll fees on motorways by 15% by renationalising them, and to privatise public broadcasting by scrapping the TV licence fee of €138 (£115).

  Emmanuel Macron says the government has already spent billions of euros capping energy bills, which he says is "twice as effective as dropping VAT". He proposes that employers should be allowed to give staff an untaxed bonus of up to €6,000. He wants to increase teachers' wages too in return for extra responsibilities and he is also prepared to scrap the TV licence fee. Bosses' organisation Medef say his policies are better for growth and jobs, while warning that Ms Le Pen's are unfunded and would lead France into a dead end.

  Many voters on the far left are expected not to vote for either candidate

  Emmanuel Macron wants to pay for much of his programme by raising the pension age from 62 to 65. But his policy has not played well with voters - especially on the left - and he says he will raise it gradually by four months a year. "It makes sense that I should be ready to listen," he explained. He has also promised to raise the minimum state pension from €950 to €1,100 (£785-£910).

  Marine Le Pen calls her rival's plan an "absolutely unbearable injustice" and wants to keep the pension age at 62, although anyone who began working at 20 could retire at 60. She wants to raise the minimum state pension to €1,000, less than her opponent.

  Marine Le Pen wants a referendum on immigration to put an end to what she calls "anarchic and massive immigration", and she plans strict rules for entering France and becoming French. Under a highly controversial proposal called Priorité nationale (national priority), she also wants French nationals to be given housing and social services ahead of foreigners - with 620,000 homes for foreign nationals put on the market for families where at least one parent is French. She was initially in favour of holding a referendum on the death penalty before realising it was "anti-constitutional".

  Emmanuel Macron has accused her of an "authoritarian" drift and failing to respect the constitution. He has condemned Ms Le Pen's "nationalist agenda, which is not patriotism". He has promised to free up police and gendarmes from admin tasks to double the numbers on the street by 2030, with 11 new mobile units and 200 brigades of gendarmes (military police). Marine Le Pen also promises 20,000 new prison places and 7,000 extra police.

  Marine Le Pen wants to ban women from wearing the headscarf in public places and fine them if they wear it. She calls the veil a "uniform" imposed by people with a radical vision of Islam. France has Western Europe's biggest Muslim population, and as 69% voted for far-left candidate Jean-Luc Mélenchon in the first round, the Muslim vote could play an important part in the second round.

  Emmanuel Macron has warned that banning the headscarf could start a "civil war". He insists that France's principle of state secularism, called laïcité, does not mean fighting against religion. He made clear his opposition to it by praising a young woman wearing a hijab who said she was a feminist. "This is the best answer to all the nonsense," he said.

  One big question for Marine Le Pen is how she could push through all her reforms if she won. She has few credible options for a government, relying on promises of a government of national unity. Her National Rally has only six seats in the National Assembly and it is difficult to see her winning a majority in elections in June. The electoral system works against her National Rally party, so she wants to introduce proportional representation (PR) in legislative elections and a seven-year term of office for president. One of her flagship policies is citizen referendums, which would enable 500,000 people to submit a proposal to change the law and bypass the problem of parliament.

  Emmanuel Macron is also campaigning to introduce an element of PR to the parliamentary vote, but says his opponent's plans for referendums indicate that she thinks she is above the constitution and can change the rules.

  Emmanuel Macron has called this election a "referendum on Europe", arguing that Europe protects France from crises and war, and accusing his opponent of wanting to leave the EU in a "Frexit" without daring to say so.

  Marine Le Pen has moved a long way from her original plan to leave the EU, although the Macron camp believes that is her ultimate plan. "Nobody is against Europe," she said after the first round. And yet in 2012, she was in favour of pulling France out of the EU, a stance which was then dropped in 2017 when she said she wanted to leave the euro instead. Now she speaks of a European alliance of nations.

  However, her plans for priority for French nationals would directly contradict EU law and she would do that via a referendum. She would also cause trouble if she tried to tighten border controls, slash French contributions to the EU budget, and give primacy to French law.

  She has also vowed to halt all co-operation with Germany, including military tank and warplanes projects, preferring to see France as a "big power that counts". An admirer of Brexit, she talks about freeing France from the "straitjacket of Brussels", while denying she harbours hopes of Frexit.

  Marine Le Pen has been critical of Russia's invasion of Ukraine, but her reliance on Russia for bank loans to her party and her friendly relations with Vladimir Putin have not been forgotten. "When you speak to Russia you are speaking to your banker," Mr Macron told her, saying she was dependent on Russian power. Her campaign team had to deny pulping 1.2 million election pamphlets because they featured a photo showing her shaking the Russian leader's hand ahead of the 2017 election. She is also no fan of Nato, proposing that France leaves its "integrated command" while remaining in the organisation, as it was from 1966-2009. After the war she believes there should be a "strategic rapprochement between Nato and Russia".

  Emmanuel Macron has played a key diplomatic role in the war, with France holding the presidency of the EU. He has maintained close contact with Ukrainian President Volodymyr Zelensky and says the role of France and Europe is to provide Ukraine with military equipment and take in refugees.

