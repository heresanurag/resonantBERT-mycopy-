title: 'Hanau: ''Several dead'' after Germany mass shooting - BBC News'
date: '2020-02-20'
section: General
url: http://www.bbc.co.uk/news/world-europe-51568105
content: |-
  Several people are dead following two shootings in the western German city of Hanau.

  An unknown attacker opened fire at two shisha bars in the city.
