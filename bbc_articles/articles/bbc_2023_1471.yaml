title: Olympic Games to remain free to air on BBC up to 2032 - BBC Sport
date: '2023-01-16'
section: Olympics
url: http://www.bbc.co.uk/sport/olympics/64275050
content: |-
  The BBC’s existing agreement included TV, radio and digital rights for the Paris 2024 Olympics

  Every Olympic Games up to and including the 2032 summer Games will continue to be shown free to air across the BBC. The BBC will offer live and on-demand coverage of both summer and winter editions of the Games on TV, radio, online and digital platforms. "The Olympic Games is a truly special event - thrilling and inspiring in equal measure," said BBC director general Tim Davie. "I'm delighted it will be on free to air for the UK public." The 2024 summer Olympics will be hosted in Paris, France. In 2028 they will be staged in Los Angeles in the United States and the 2032 Games will be in Brisbane, Australia. The 2026 Winter Olympics will take place in Milan and Cortina d'Ampezzo, Italy, with the 2030 hosts still to be decided. Tokyo 2020 saw a record-breaking 104 million requests to watch the action online throughout the duration of the Games, while 36.4 million watched on BBC TV. The BBC has secured the same package of rights across all of its broadcast platforms, meaning it will be able to run two simultaneous live streams, as well broadcasting a daily highlights programme and digital clips of the top action. Radio 5 Live will continue to cover all of the big moments.

