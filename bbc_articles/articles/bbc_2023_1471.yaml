  Barbara Slater, director of BBC Sport, said: "This partnership ensures that audiences in the UK will continue to have free-to-air access to the Olympic Games for the next decade. "The BBC's ability to bring the nation together is second to none and this new deal provides sports fans a comprehensive, compelling live and on-demand offer." The BBC has partnered with the European Broadcasting Union (EBU) and Warner Bros Discovery for the coverage. Noel Curran, the director general of the EBU, a European alliance of public service media organisations, added: "Sport should be for everyone, and we need public service media to bring all audiences together to enjoy the big national moments, inspire the next generation of athletes and grow fanbases for new and emerging sports."

