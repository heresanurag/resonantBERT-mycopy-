title: Mobo Awards founder Kanya King reveals cancer diagnosis - BBC News
date: '2024-12-12'
section: Newsbeat
url: http://www.bbc.co.uk/news/articles/cz9g5kqe307o
content: |-
  Kanya King, who launched the ceremony in 1996, says she wants to raise awareness of early detection.

  Revealing her diagnosis, Kanya King says she "never saw it coming"

  Mobo Awards founder Kanya King announced she has been diagnosed with stage four bowel cancer. Kanya launched the Mobos in 1996 to celebrate black talent across the entertainment industry including film, music and TV. The annual awards ceremony has become a major event, with February's party due to be held in Newcastle. Kanya said finding out she had cancer "was something I never saw coming and I am still processing this unexpected reality.

  "While this journey will undoubtedly be challenging, I've always believed in finding meaning through adversity," the 55-year-old said. "This diagnosis isn't the end of my story—it's a chance to inspire resilience, raise awareness, use this moment to not only fight my own battle but to amplify the message of early detection and the importance of proactively taking charge of your health. "If my story can save just one life, then it's a story worth telling."

  Kanya was appointed CBE for her services to music in 2018

  Sharing the news on Instagram, the Mobos says Kanya's "set her sights" on being at the next awards "to celebrate the achievements of our community". The post, which was also shared on Kanya's profile, said her diagnosis was "a reminder to all of us to be the CEO of our health". "Kanya's story is one of resilience, courage and hope. "As she has always inspired us to uplift and celebrate each other, let's do the same for her now." In a separate statement, the organisation said it "remains in capable hands" with Kanya's "guidance and unwavering support" while she focuses on her health. Since the post was shared, Kanya's had hundreds of messages of support from well-known names including DJ Target, Remel London and Alexandra Burke. Singer Marvin Humes, who has presented the Mobo Awards, said he's "sending love and strength" for Kanya's recovery.

  On Wednesday, Kanya won a LIVEtime achievement award at the LIVE Awards in east London. She was recognised for creating a "globally respected brand" and how she "transformed the landscape for Black artists" through her work. In 2018, she was recognised in the Queen's Birthday Honours list and appointed CBE for her services to music. She was also listed in the BBC's first 100 Women project when it launched in 2013. It has since gone on to be an annual series celebrating 100 inspiring and influential women from around the world. In 2009, the Mobo awards moved out of London for the first time and since then has moved around the UK. Last year the ceremony was held in Sheffield. The list of nominees was released earlier this month, with Central Cee in with a chance to win best male artist three times. Last year's best female act, Raye, is in the running to win the prize for a second year running. The awards also celebrate global talent and in the past have welcomed stars including Beyoncé, Usher, Rihanna and Janet Jackson.

