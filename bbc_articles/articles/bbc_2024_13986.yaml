title: 'Vaughan Gething: FM cries in Senedd ahead of confidence vote - BBC News'
date: '2024-06-05'
section: General
url: http://www.bbc.co.uk/news/videos/c4nn738kj4go
content: |-
  The first minister is seen to be visibly upset as a colleague speaks in his support.

  Vaughan Gething has been seen in tears in the Senedd ahead of a no-confidence vote that he is set to lose.

  The vote was tabled by the Welsh Conservatives following a row over donations to Mr Gething’s leadership campaign from a company owned by a man previously convicted of environmental offences.

  Despite Labour holding 30 of the 60 Senedd seats, two Labour Senedd members are off sick and will not take part.

  The first minister was visibly upset as Labour MS Vikki Howells spoke in his support.

  She previously said Mr Gething would not stand down if he lost, saying it was a "gimmick" and it was up to the "voting public to decide who is in the Senedd".
