title: Goat predicts winner of Italy v Wales Six Nations match - BBC News
date: '2017-02-04'
section: General
url: http://www.bbc.co.uk/news/uk-wales-38862283
content: |-
  A goat predicts the winner of Sunday's Six Nations rugby match between Italy and Wales.

  A goat has predicted the winner of Sunday's Six Nations rugby match between Italy and Wales.

  Lilian, who lives at Cefn Mably Farm Park, near Cardiff, uses two buckets to select her favourite side.
