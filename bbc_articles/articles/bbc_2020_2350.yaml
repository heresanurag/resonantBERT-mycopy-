title: Britain First leader Paul Golding charged with terror offence - BBC News
date: '2020-02-20'
section: UK
url: http://www.bbc.co.uk/news/uk-51581497
content: |-
  Paul Golding was charged after refusing to give police access to his phone after returning from Russia.

  The leader of far-right group Britain First has been charged with an offence under the Terrorism Act after refusing to give police access to his phone.

  Paul Golding was stopped at Heathrow Airport in October on his way back from a trip to the Russian Parliament in Moscow by officers from the Met's Counter Terrorism Command.

  He refused to give the pin codes for a number of his electronic devices.

  He is due to appear at Westminster Magistrates' Court next Thursday.

  Mr Golding, 38, is charged with refusing to comply with a duty under Schedule 7 of the Terrorism Act.

  In a statement he said he was not a terrorist and described the charges as "an abuse of legislation".

  Schedule 7 allows police to interrogate, search and detain anyone for up to six hours at UK ports.

  It is designed to determine whether an individual is involved in the "commission, preparation or instigation" of acts of terrorism.
