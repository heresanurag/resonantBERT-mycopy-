content: |-
  Chandeliers and suits of armour are just some of the features being dusted down.

  The chandelier, one of five in the Waterloo Chamber, dates from 1862 and was made by the Birmingham glass makers F and C Osler

  Windsor Castle is undergoing a two week spring clean before it is re-opened to the public over the weekend.

  Experts ensure the castle's State Apartments are cleaned from floor to ceiling during what the Royal Trust calls the annual "high clean".

  Chandeliers dating from 1862 and commissioned by Queen Victoria are dusted, along with suits of armour on the Grand Staircase.

  The castle will open its doors again to the public on Saturday.

  A marble bust of German Emperor Frederick III of Prussia in St George's Hall is cleaned as part of the annual clean

  Expert staff cleaning a cut glass chandelier, dated from 1862, in the Waterloo Chamber, Windsor Castle

  The clean takes two weeks to complete and sees each room cleaned from top to bottom

