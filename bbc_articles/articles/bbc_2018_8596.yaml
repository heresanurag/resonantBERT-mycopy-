title: Chinook helicopter crew rescues climber in Oregon - BBC News
date: '2018-07-15'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-44837226
content: |-
  A Chinook helicopter pilot landed two wheels on Mount Hood in Oregon to rescue a stranded climber.

  A Chinook helicopter pilot landed just two wheels on Mount Hood in Oregon to rescue a stranded climber.

  The state's national guard team flew the man to hospital where he is now recovering.
