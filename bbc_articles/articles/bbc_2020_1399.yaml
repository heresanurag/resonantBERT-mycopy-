  Alice Dearing, 22, could make history by becoming the first black woman to represent Great Britain in swimming at the Olympics.

  Alice Dearing, 22, could make history in 2020 by becoming the first black woman to represent Great Britain in swimming at the Olympics.

  She speaks to BBC Sport about breaking down stereotypes in the sport - as well as everyday issues, such as how she manages her hair in the pool.

