title: Proud mullet-wearers embrace their style at Belgium festival - BBC News
date: '2024-05-13'
section: General
url: http://www.bbc.co.uk/news/world-69006639
content: |-
  More than 200 people attended the European mullet festival in Quievrain, Belgium

  More than 200 people attended the European Mullet Festival in Quievrain, Belgium on 11 and 12 May.

  The festival has been running since 2019, and hosts a mullet contest, conga dancing and a range of hairdressers on site.

  Festival spokesman Edgar Funkel said the festival inspired people to try it for the first time and that it helped people show their individuality.
