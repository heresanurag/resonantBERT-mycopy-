  He used both Welsh and English to speak about his affection for "this ancient land" and how it was a privilege to share in the occasion. He said the Senedd's 25th anniversary was a milestone in a journey Wales had been on for all of his life. It had given Wales " a distinct voice", delivered with "clarity and purpose", he added.

  The King mingled with schoolchildren from across Wales after the ceremony

  Mared Pugh-Evans gave her first performance as the King's new harpist, while primary school pupils from Ysgol Treganna in Cardiff sang Safwn yn y Bwlch. The Royal couple then made their way through the Senedd, with Vaughan Gething chatting to Queen Camilla, and the King chatting to Ms Jones. They also met with Senedd staff, including members who have worked in the there for 25 years. The King and Queen then spent a few minutes speaking with the crowd gathered on the Senedd steps, mainly with a group of schoolchildren. Among those in the crowd was Alessandro Migliorati and his daughter Isabella, who describes herself as an ardent royalist.

  She has seen the King a few times already this year - including at the D Day commemorations in Normandy. Today she got to see the King and Queen up close, describing it as "really nice to see". "I love the history of it," she said.

  This video can not be played To play this video you need to enable JavaScript in your browser. The military band arrive along with soldiers for the guard of honour.

  A posy was presented to the Queen by 10-year-old Celyn Matthews Williams, a Covid community champion. Pantasia Steel Pans were played as the royal couple exited the Senedd. There were a few protesters outside, but most people were cheering and waving flags. In his last visit to Senedd, the King - formerly the Prince of Wales for 64 years - gave his first address in Welsh as Monarch.
