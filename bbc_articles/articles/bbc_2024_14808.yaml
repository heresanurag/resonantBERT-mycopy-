title: King speaks Welsh in the Senedd on its 25th birthday - BBC News
date: '2024-07-11'
section: Wales
url: http://www.bbc.co.uk/news/articles/cy68g4pv885o
content: |-
  The Royal couple meet First Minister Vaughan Gething at a Senedd ceremony.

  The King and Queen with Senedd Llywydd (Presiding Officer) Elin Jones and First Minister Vaughan Gething

  King Charles III has marked 25 years of the Welsh Parliament by addressing members of the Senedd in Welsh. The King and Queen Camilla also met First Minister Vaughan Gething and other party and parliamentary leaders in Wales on Thursday. The Royal Welsh put on a guard of honour for the royal pair, who were greeted by primary school children from across Wales. It was the King's first visit to the Senedd since his tour of the UK following his accession.

  His opening remarks to the chamber were in Welsh, thanking presiding officer Elin Jones. "The Queen and I are so delighted to join you today as we mark this significant milestone in our history - the 25th anniversary of Welsh devolution," he continued in English. "During times which have seen great change, profound sorrow and tremendous achieving - through it, my respect and affection for the people of this ancient land have deepened with every passing year."

