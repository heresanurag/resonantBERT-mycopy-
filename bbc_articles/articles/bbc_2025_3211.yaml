  Key lines from the King's letter to the US president, with analysis from BBC royal correspondent Sean Coughlan.

  What does it say and what does it mean? What does it say and what does it mean?

  UK Prime Minister Keir Starmer hand-delivered a letter from King Charles to US President Donald Trump during his visit to the White House. The King invited Trump to the UK for an unprecedented second state visit. But what else did it say? We take a look at key lines from the letter with further analysis from BBC royal correspondent Sean Coughlan.

  Given the... breadth of challenges across the world, I can only think that the... of our two countries has a vital role to play in promoting and... the values which matter so much to us all, image "Given the... breadth of challenges across the world, I can only think that the... of our two countries has a vital role to play in promoting and... the values which matter so much to us all" Given the... breadth of challenges across the world, I can only think that the... of our two countries has a vital role to play in promoting and... the values which matter so much to us all, image Sir Keir's visit comes amid concerns in the UK and Europe about some of Trump's statements since coming to office in particular in relation to Russia, the war in Ukraine and European security. Given the... breadth of challenges across the world, I can only think that the... of our two countries has a vital role to play in promoting and... the values which matter so much to us all, image I remember with great fondness your visits to the United Kingdom during your Presidency, and recall our nascent plan for you to visit Dumfries House, in Scotland, as the global pandemic began and all bets - and flights! - were off..., image "I remember with great fondness your visits to the United Kingdom during your Presidency, and recall our nascent plan for you to visit Dumfries House, in Scotland, as the global pandemic began and all bets - and flights! - were off..." I remember with great fondness your visits to the United Kingdom during your Presidency, and recall our nascent plan for you to visit Dumfries House, in Scotland, as the global pandemic began and all bets - and flights! - were off..., image Trump’s visits to the UK during his first period in office included a state visit in 2019 during which Trump and his wife Melania had dinner with Elizabeth II. He notes a plan for the president to visit one of his Scottish estates - Dumfries House - was prevented by the pandemic. I remember with great fondness your visits to the United Kingdom during your Presidency, and recall our nascent plan for you to visit Dumfries House, in Scotland, as the global pandemic began and all bets - and flights! - were off..., image There is much on both Estates which I think you might find interesting and enjoy - particularly as my Foundation at Dumfries House provides hospitality skills-training for young people who often end up as staff in your own establishments!, image "There is much on both Estates which I think you might find interesting and enjoy - particularly as my Foundation at Dumfries House provides hospitality skills-training for young people who often end up as staff in your own establishments!" There is much on both Estates which I think you might find interesting and enjoy - particularly as my Foundation at Dumfries House provides hospitality skills-training for young people who often end up as staff in your own establishments!, image Charles mentions Trump's golf course is near Dumfries House and suggests the president could visit Dumfries House or Balmoral. He also highlights the work of his foundation, which bought Dumfries House in 2007. There is much on both Estates which I think you might find interesting and enjoy - particularly as my Foundation at Dumfries House provides hospitality skills-training for young people who often end up as staff in your own establishments!, image it would also offer a valuable chance to plan a historic second State Visit to the United Kingdom. As you will know this is unprecedented by a US President., image "it would also offer a valuable chance to plan a historic second State Visit to the United Kingdom. As you will know this is unprecedented by a US President." it would also offer a valuable chance to plan a historic second State Visit to the United Kingdom. As you will know this is unprecedented by a US President., image Traditionally, second-term US presidents are not offered a state visit and are instead invited for tea or