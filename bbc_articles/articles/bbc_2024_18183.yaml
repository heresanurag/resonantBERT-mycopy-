title: 'Hackney: Man charged after quadruple shooting - BBC News'
date: '2024-08-10'
section: London
url: http://www.bbc.co.uk/news/articles/c9358p2vl4lo
content: |-
  The shooting in May left a nine-year-old girl with serious injuries and three others were also hurt.

  Three adults and a nine-year-old girl were injured after the shooting near Kingsland High Street

  A man has appeared in court charged with four counts of attempted murder after a quadruple shooting in Hackney which left a nine-year-old girl seriously injured. Three adults were also injured after the shooting near Kingsland High Street, Dalston at about 21:20 BST on 29 May. Javon Reily, 32, of Farnborough Road, Farnborough, appeared at Westminster Magistrates' Court on Saturday and has been remanded into custody. The girl remains in hospital in a stable condition, the Metropolitan Police has confirmed.

  The girl was having dinner with her family in a restaurant when shots came from outside. Three men, aged 26, 37 and 42, sitting outside the restaurant were also injured by gunshot, believed to have come from a lone motorcyclist. They have since been released from hospital. Det Ch Supt James Conway, lead for policing in Hackney and Tower Hamlets, said: "Our thoughts remain with our young victim and her family as they continue to confront the devastating effects of gun crime." Det Ch Insp Joanna Yorke, is leading the investigation and has appealed for witnesses to come forward. She said: "We are particularly keen to hear from anyone who has information about the identity of an individual seen on a motorcycle in Kingsland High Street at the time of this offence." A 35-year-old woman who was arrested on suspicion of conspiracy to murder and assisting an offender has been released on police bail. Mr Reily was arrested on Friday after a vehicle stop in Chelsea Embankment. He is due to next appear at the Old Bailey on 6 September.
