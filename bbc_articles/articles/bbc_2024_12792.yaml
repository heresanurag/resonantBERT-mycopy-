  A spokesperson from Bondi Sands said: "All of our products undergo rigorous testing processes to ensure they meet and exceed industry standards and requirements. "Bondi Sands will work with Which? to better understand testing results." Cosmetic Toiletry and Perfumery Association director Dr Emma Meredith said: “An incredible amount of research goes into developing and testing sunscreens to make sure we can trust the protection that they offer. "Companies use supportive data and scientists with expert sun-care knowledge to check their results and should only sell the product when the whole package of development test data and the final sun-protection test results match.” Prof Dorothy Bennet said UV light enabled people to produce essential vitamin D but also increased the risk of skin cancer - so controlling exposure was key. "It is important that we can depend on suncreams to provide the protection they claim," she said. "We may be able to realise if protection is lower by getting sunburn - but then it’s too late. "It is good that so many suncreams passed Which’s testing but disturbing that several creams failed to protect as advertised."

  Prof Bennet said there could be a number of reasons for the differing results stated by Which? and some of the companies involved, including how thickly the sunscreen was applied, on which part of the body and the exact waveband of UVB or UVA light used.
  • None Do not rely on sunscreen alone - wear suitable clothing and spend time in the shade when the sun is at its hottest
  • None When buying sunscreen, the label should show, at least, an SPF of 30, to protect against UVB, and four-star UVA protection - the letters "UVA" in a circle indicates it meets the EU standard
  • None Make sure sunscreen is not past its expiry date
  • None Do not spend any longer in the sun than you would without sunscreen
