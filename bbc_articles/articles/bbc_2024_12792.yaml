title: Top sunscreens fail protection tests, Which? says - BBC News
date: '2024-06-21'
section: Health
url: http://www.bbc.co.uk/news/articles/cgeevnvj997o
content: |-
  Some cheaper lotions from supermarkets Aldi and Lidl outperformed more expensive brands, Which? said.

  Three popular sunscreen lotions offer less protection than they claim, according to consumer organisation Which? Which? carried out spot-checks on 26 sunscreens. Three lotions, from Calypso Sun, Bondi Sands and Asda did not pass all the tests - but others, including some cheaper options from supermarkets Aldi and Lidl, did. Asda questioned the validity of the Which? tests, saying independent tests of the same batch had confirmed the lotion provided the level of protection on the label. Calypso Sun and Bondi Sands said all products were carefully tested and met safety standards.

  Which?, external says these products failed some of its checks: Natalie Hitchins, at Which?, said: “It is incredibly concerning that some big brands failed our tests and did not offer the level of sun protection claimed on the packaging. “However, it is great to see cheaper top-quality sunscreen options available on the High Street and in supermarkets at a time where shoppers need affordable options. "Our results prove that there’s no need to splash out to keep you and your loved ones safe in the sun this summer and that many of the supermarket own-brand products can do a good job.”

  Which? tested how much energy it took to redden the backs of volunteers exposed to rays from ultraviolet (UV) lamps, with and without sunscreen, and applied the lotions to glass plates to measure the amount of light they filtered. It carried out some tests in 2023 and some in 2024. An Asda spokesperson told BBC News: “We recently had our Asda Protect Moisturising Sun Lotion SPF 30 High retested by a leading external provider using internationally recognised testing methods. "These test results confirmed that this product has a sun-protection factor of 31.5 - and therefore, we do not recognise the test results Which? has published. “When Which? reviewed this same product in 2022, they awarded it 'great value' at that time and it passed their SPF test. "The product formulation has not changed since then, so we would question the validity of their test.” A spokesperson from Calypso Sun told BBC News: "We would like to thank Which? for sharing their 2024 study results - however, all our products are carefully and independently tested and have passed, in accordance with EU standards and regulations. "Calypso Sun will continue its proud commitment in providing safe-sun protection products for all the family, a promise we have consistently kept over several decades."
