title: Video shows car crashed in Bury St Edmunds Premier Inn reception - BBC News
date: '2024-03-10'
section: General
url: http://www.bbc.co.uk/news/uk-england-suffolk-68528263
content: |-
  Shattered glass can be seen at the front of the Premier Inn and the wreckage of a car in its foyer.

  Video showed the wreckage of a car that crashed through the front doors of a hotel into its reception area.

  The incident happened at the Premier Inn on Etna Road in Bury St Edmunds, Suffolk, on Friday night.

  Shattered glass could be seen at the front of the building in footage of the aftermath, and the crumpled bonnet of the car, which had come to a rest at one end of the foyer.

  Police said a member of staff, a man in his 20s, sustained serious injuries and was taken to hospital, while the driver of the car, a woman in her 50s, was not injured.

