title: 'Amanda Reddin: British Gymnastics head national coach steps aside amid claims
  about conduct - BBC Sport'
date: '2020-08-25'
section: Gymnastics
url: http://www.bbc.co.uk/sport/gymnastics/53897992
content: |-
  British Gymnastics' head national coach Amanda Reddin temporarily steps aside while an investigation into claims about her conduct takes place.

  Amanda Reddin competed at the 1984 Olympics in Los Angeles

  British Gymnastics' head national coach Amanda Reddin has temporarily stepped aside while an investigation into claims about her conduct takes place. Olympic medallist Amy Tinkler said part of the formal complaint she made to the governing body related to her "experiences" with Reddin. That followed two other gymnasts making allegations of mistreatment by Reddin on Monday. Rio 2016 Olympian Ruby Harrold said that Reddin presided over a "culture of fear" at British Gymnastics camps in Lilleshall. In a statement, British Gymnastics said: "British Gymnastics has agreed with Amanda Reddin that she will temporarily step aside from her role as head national coach to allow an investigation to proceed into claims about her conduct as a coach. "The investigation will be completed by an external independent expert and any outcome actioned immediately. Our processes and investigations will also be scrutinised by the independent review." Earlier on Tuesday, Tinkler said in a statement on social media, external: "I can confirm that part of the complaint I submitted in December 2019 related to my experiences with Amanda Reddin and the national performance coaching set-up at British Gymnastics between 2016-2019."

  Tinkler has previously said that the experiences she outlined in the complaint "were the reason for my retirement in January, not a physical injury as was suggested by some at the time". On Monday, in a statement to ITV, Reddin said: "I completely refute the historical claim, and the investigation by British Gymnastics did not uphold the complaint. "I completely refute these claims. It is wrong that my reputation within the sport that I love is now subject to a trial by media rather than through the proper processes. "I would welcome the allegations be submitted to the independent review into alleged abuse in gymnastics to ensure the integrity of the process is protected for both athletes and coaches." These are the latest in a catalogue of allegations in recent weeks of a culture of mistreatment in the sport. Last month, British Gymnastics announced an independent review would be launched, and chief executive Jane Allen said earlier this month that the organisation had "fallen short" in protecting its members. In July, Tinkler said she was "heartbroken" at the time it had taken British Gymnastics to responded to her complaint. On Tuesday, the 20-year-old, who won floor bronze at Rio 2016, said that she had since been "emailed, informing me that my complaints have been dealt with and the matter closed. No explanation was given". She added: "The way I received this information made me sick. It reinforced mine and every gymnast's fear, which is that their complaints aren't dealt with fairly and independently." Tinkler said that gymnasts "suffer in silence" because "we know that to speak up is a pointless, career-ending task". She said she plans to complain to the independent review. Tinkler was Great Britain's youngest medallist at Rio 2016, when she won bronze aged 16, and also won one world medal, three European medals and 10 British titles during her career.

