title: Five times Macron ripped into Trumpism - BBC News
date: '2018-04-26'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-43901951
content: |-
  President Emmanuel Macron used a speech to Congress to deliver several rebukes to his US counterpart.

  From the Paris climate accord to tariffs, the French president used a speech to Congress to take a dig at some of President Donald Trump's signature policies.
