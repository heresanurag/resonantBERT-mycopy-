  Rory McIlroy admits he's "unfortunately getting used to" painful near-misses as Rasmus Hojgaard pips him to the Irish Open at Royal County Down.

  McIlroy 'getting used to' painful near-misses

  McIlroy was edged out by Rasmus Hojgaard in a riveting Irish Open finale at Royal County Down

  They were scenes from a film we have seen before - and recently. There was the putt on the 72nd hole sliding past. There was the crowd stunned into silence. There was the consoling pat on the back from Harry Diamond. And there was, at the centre of it all, a dejected protagonist. Yes, for Rory McIlroy, an immensely enjoyable week back home ended with a familiar sinking feeling as the home favourite's bid to seal a memorable Irish Open win at Royal County Down was crushed by the brilliance of Rasmus Hojgaard. McIlroy was battling to banish two different demons on the Newcastle links he knows so well: the lingering pain of his US Open near-miss and the memories of his previous appearances competing on Northern Irish soil. When Royal County Down staged the 2015 Irish Open, he had the ignominy of watching the weekend's play on TV after missing the cut. It was the same story four years later at the Open when his challenge at Royal Portrush met an early end.

