title: Climate body CCC says cut electricity bills to boost heat pumps - BBC News
date: '2024-07-18'
section: Climate
url: http://www.bbc.co.uk/news/articles/c51y0y7yvlko
content: |-
  Cutting electricity bills would persuade more people to install heat pumps, the government is told.

  Electricity bills need to fall to get more people to install heat pumps, the government has been told

  Taxes on electricity should be shifted to gas so that people feel more benefit from using green technologies like heat pumps in their homes, the government's climate advisers say. The Climate Change Committee (CCC) says the change would mean consumers seeing clearer benefits from switching away from gas boilers, which emit CO2 and are a major cause of climate change. The Committee also wants the new government to reverse the steps taken by former Prime Minister Rishi Sunak to slow down carbon cutting plans. The CCC says the UK is in danger of missing a 2030 climate target, which is seen as a critical step on the road to net-zero emissions by 2050.
