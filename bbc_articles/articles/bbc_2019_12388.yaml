title: 'Fortnite Chapter 2: First glimpse of new season after map wiped out by asteroid
  - BBC News'
date: '2019-10-15'
section: Newsbeat
url: http://www.bbc.co.uk/news/newsbeat-50056001
content: |-
  Season 11 or Chapter 2 is now live with a new map and updated gameplay.

  Well that didn't last long.

  Less than two days after being hit by a massive asteroid and enveloped in a black hole, Fortnite is back online.

  Season 11 - or Chapter 2 - is now live, with gamers getting used to a whole new map and updated gameplay.

  Since Sunday night, the game has been offline, replaced by a livestream of a black hole on its Twitter page.

  But now, there's a trailer to the new season.

