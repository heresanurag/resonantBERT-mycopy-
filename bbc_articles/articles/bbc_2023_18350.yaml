title: 'Ilkeston: Murder arrest after group hit by van in town centre - BBC News'
date: '2023-12-17'
section: Derby
url: http://www.bbc.co.uk/news/uk-england-derbyshire-67736556
content: |-
  Police say a man was killed and two others injured when they were struck in a Derbyshire town.

  Police said Market Place was likely to remain closed "for some time"

  A man has died after a van struck a group of people in a town centre, police have said.

  Derbyshire Police said officers were called to Market Place, Ilkeston, at about 02:10 GMT on Saturday.

  The force said one person suffered serious injuries and died at the scene, while two other people were taken to hospital.

  It added that a man, thought to be the driver of the van, had been arrested on suspicion of murder.

  He is being held in custody while investigations continue.

  A police representative said officers did not believe the incident was terror-related and were not seeking anyone else in connection with it.

  The injuries suffered by the other two people were not thought to be serious, they said.

  Appealing for witnesses and dashcam footage, they said Market Place was likely to remain closed "for some time".

  They added a van had been recovered in Stapleford, Nottinghamshire, which they believed was involved in the incident.

  Market Place had earlier been busy with Christmas revellers at the start of the weekend.

  Footage shared on social media showed a crowd of people gathered in the area after the emergency services were called.

  An area between the King's Head and Sir John Warren pubs was then taped off by police as paramedics dealt with the casualties.

  Police recovered a van in Stapleford, in Nottinghamshire, after the incident

  In a post on social media, Erewash MP Maggie Throup said her "thoughts and prayers" were with "those who have been affected".

  "This is a developing situation and I would urge against speculating online as to what has happened," she added.

  Erewash Borough Council leader James Dawson said he was being briefed by police on what he described as a "terrible incident".

  He confirmed the council had cancelled the Saturday market and said traders had been offered alternative stalls in Long Eaton.

