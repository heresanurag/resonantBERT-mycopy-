title: Ex-snooker champion Graeme Dott in court over alleged child sex offences -
  BBC News
date: '2025-04-16'
section: Glasgow & West Scotland
url: http://www.bbc.co.uk/news/articles/c7vn178yjqzo
content: |-
  Former world snooker champion Graeme Dott had his bail extended during the appearance at the High Court in Glasgow.

  Former world snooker champion Graeme Dott has appeared in court for the first time over alleged child sex offences. The 47-year-old Scot, who won the world championship in 2006, is accused of two historical charges relating to two children both aged about 10 at the time. The first charge is related to an attack in the Glasgow area between 1993 and 1996, while the second relates to an attack between 2006 and 2010. Dott had his bail continued by Lord Arthurson during the five-minute appearance at the High Court in Glasgow and is expected to enter a plea at a future hearing later this year.

  No details of his bail conditions were read out in court. Prosecutor Kath Harper KC did state that Dott had never appeared on "petition" for the charges he will face. Any bail conditions in such cases are designed to be "protective" of any alleged victim. Dott was due to play world championship qualifying matches this week, but has been suspended by the World Professional Billiards and Snooker Association (WPBSA). Dott is expected to appear in court again on 11 June.
