  Captain Stokes to have scan before Pakistan tour

  Ben Stokes was injured playing for Northern Superchargers in The Hundred

  Ben Stokes will have a scan on his hamstring injury next week as England wait on the captain’s fitness for the first Test in Pakistan. The 33-year-old was hurt at the beginning of August and missed the 2-1 series defeat of Sri Lanka. Stokes has been netting throughout his lay-off, including a long net at Durham’s Chester-le-Street last week, and has this week been playing in the Celebrity Pro-Am at the PGA Championship golf at Wentworth. The scan is planned as part of monitoring the all-rounder’s recovery, rather than a reaction to any setback to the injury. The first Test in the three-match series is due to begin on 7 October. At the beginning of September, Stokes told ESPN Cricinfo he would be cautious with his return, rather than rushing back and risking further damage. "I'd rather take an extra two weeks than run the risk of potentially doing something worse and then putting myself out of the game for longer," he said. "I'm just making sure that I'm doing everything right and everything I possibly can to try and give myself a chance to being fit for that first Test." Despite the injury, Stokes has been named as captain of the 17-man squad which will depart on 1 October.

  If Stokes is ruled out of the first Test, Ollie Pope would continue to deputise as captain. In Stokes' absence from the Sri Lanka series, England opted to cover for the all-rounder by moving wicketkeeper Jamie Smith to number six and playing an extra bowler. The scenario of Stokes only being able to bat would potentially leave England with a selection decision. If they were to continue with the balance they favoured against Sri Lanka, England would have to bat Stokes in the top five, therefore squeezing out one of their regular top order. To avoid that scenario, England could revert to four frontline bowlers, supplemented by Joe Root’s off-spin, a tactic they favoured when Stokes was unable to bowl because of a knee injury in India earlier this year. Meanwhile, there is still no clarity on the venues for the three Tests, despite England travelling in less than two weeks. The matches were due to take place in Karachi, Rawalpindi and Multan, but building work in Karachi is likely to leave that stadium unavailable. There had been speculation part of the series could be shifted to the United Arab Emirates, however it is now thought the the three Tests will take place in Pakistan. It could be that one of Rawalpindi or Multan hosts two matches. England won 3-0 on their last visit to Pakistan in 2022, the first time a visiting team had recorded a three-test clean sweep in the country.
