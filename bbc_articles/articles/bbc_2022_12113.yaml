title: King, siblings and sons walk behind Queen's coffin - BBC News
date: '2022-09-15'
section: General
url: http://www.bbc.co.uk/news/uk-62903687
content: |-
  Royal Family members walk behind Queen Elizabeth's coffin as she heads to Westminster Hall.

  The King and his sons, Princes William and Harry, have walked behind Queen Elizabeth's coffin as Her Majesty made her way to Westminster Hall.

  The Queen's other children, Princess Anne, Prince Edward and Prince Andrew, also joined the procession.
