title: 'Ballymena: Fire at Larne leisure centre as violence erupts for third night
  - BBC News'
date: '2025-06-11'
section: Northern Ireland
url: http://www.bbc.co.uk/news/articles/cjdzv79l1emo
content: |-
  The worst of the disorder is in Ballymena, but unrest spread to other towns on Wednesday evening.

  Fire at leisure centre as Northern Ireland violence erupts for third night

  Fires have been set in several locations in County Antrim - with the worst in Ballymena, pictured

  Police have been attacked with fireworks, bottles and bricks as violence erupted for a third night in Northern Ireland. The worst of the disorder was in Ballymena, but unrest also spread to other towns on Wednesday evening. In Larne, masked youths attacked a leisure centre and set it on fire. The centre had been providing emergency shelter for families following the clashes earlier this week, the council said. The disorder first began on Monday after a peaceful protest over an alleged sexual assault in Ballymena, County Antrim.

  During the first two nights of disorder, 32 officers were injured and six people arrested. Police have not yet given any details about Wednesday night. Officials have described the violence as racially-motivated, with Assistant Chief Constable Ryan Henderson calling it "racist thuggery targeted at ethnic minorities and police officers". At the leisure centre in Larne - about 20 miles (30km) from Ballymena - police left the area after masked young people threw objects at vehicles, but later officers in riot gear returned to the scene. A crowd of about 50 people watched the dozen or so individuals target the centre. Local Alliance Party MLA Danny Donnelly, who was there, told BBC News NI there was "absolute disorder". He said "a brick went through a window when a yoga class was on" and "staff had to barricade themselves and run out the back door". Donnelly called the group carrying out the attack "thugs" and he was "absolutely disgusted".

