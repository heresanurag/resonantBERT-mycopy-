  Police said there have also been sporadic incidents of disorder in Carrickfergus, north Belfast and Newtownabbey, where one man was arrested. One man, 29, has been charged with riotous behaviour, disorderly behaviour, attempted criminal damage and resisting police after Monday's violence. ACC Henderson said many people woke up on Wednesday "feeling genuine fear for their lives and their livelihoods". He added "the power of social media" is "galvanising" some of the violent behaviour. "We have seen a number of calls over social media for protest activity this evening at various places within Northern Ireland," he said.

  Some homes have begun displaying stickers outlining the residents' nationalities. Signs which read "British household" and "Filipino lives here" could be seen on some doors. Businesses and homes were attacked and damaged and a number of vehicles were also set on fire in the area.

  Signs have appeared outside some homes in Ballymena to indicate the nationality of residents

  Mother-of-two Mika Kolev, who lives and works in Ballymena, said she was now fleeing her home with her family and is considering moving back to Bulgaria after her house was damaged in Tuesday's disorder. "We know what's going to happen so it's not possible to wait and see what's going to happen," she said. "I have to save my children, I have to save them."

  Mika Kolev and her family have been living and working in Ballymena for about 10 years

  ACC Henderson also said that it is "absolutely of note" that petrol bombs and masonry were thrown at police during Monday and Tuesday night. "There were people who were intent on violence right from the off, so that says to me that there was pre-planning involved from those who wanted to attack us."

  Prime Minister Sir Keir Starmer said he "utterly condemns" the violence. First Minister Michelle O'Neill said what was happening in Ballymena was "pure racism, there's no other way to dress it up". Meanwhile, the Deputy First Minister Emma Little-Pengelly said the violence was "serving no purpose whatsoever" and was only damaging communities. The PSNI Chief Constable Jon Boutcher described the disorder as "mindless violence".

