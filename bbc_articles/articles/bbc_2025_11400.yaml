  Fire damage was contained mainly to the front reception but there was extensive smoke damage, the fire service said. In a statement, Mid and East Antrim Borough Council said the families placed at the centre had all been "safely relocated" and were no longer using the centre.

  In a social media post earlier on Wednesday, Communities Minister Gordon Lyons said he had been made aware of individuals being temporarily moved to the centre. Matthew O'Toole, the leader of the opposition in the Northern Ireland Assembly, said he would refer Lyons to the standards commissioner over his comments, saying "lives are at stake". In a statement following the violence, Lyons condemned the violence. "Wanton destruction such as the attack on Larne Leisure Centre is an attack on all residents who use the facility."

  The Northern Ireland Fire & Rescue Service said that they attended the scene at 20:54 BST

  In Ballymena, smoke bombs, fireworks, bottles and bricks were thrown at police during a stand-off with a gathered crowd. A row of six police Land Rovers advanced on the crowd, with officers in full riot gear pushing a number of individuals back. Closer to Clonavon Terrace, the scene of most of the clashes during the first and second night of disorder, the windows of a residential property were also smashed.

  Water cannon was deployed again on Wednesday night

  The PSNI also said fires were set within Cloughfern Roundabout in Newtownabbey. "We are appealing to parents and guardians to check in on your young folk and see where they are. Youths are actively engaged in this criminal behaviour," they said. Meanwhile, Translink said there were "severe delays and disruption" to trains on the Londonderry line because of "civil unrest" in Coleraine and "possible damage to rail tracks".

  Police have sent reinforcements to Ballymena as the violence continues to flare

  Earlier on Wednesday it was confirmed that a significant number of extra police officers were being deployed into areas affected. Police Scotland has agreed to send officers, after police in Northern Ireland requested extra support under mutual aid arrangements. The deployment will involve an undisclosed number of public order officers trained to police civil unrest. The PSNI said they have requested 80 officers in Great Britain.

  The Doagh Road in Newtownabbey on Wednesday night

  ACC Henderson said all footage of incidents was being reviewed and prosecutions would come. "We... are surging a significant number of extra officers, vehicles and equipment to those areas where the rioting is taking place," he said. He said this would impact communities as "vital resources" are being taken away from other areas. "It's hugely important that people realise there are consequences for this."

  The first protest was organised hours after two teenage boys appeared before Coleraine Magistrates' Court. They spoke through an interpreter in Romanian to confirm their names and ages. Their solicitor said they would be denying the charges. ACC Henderson said: "This violence only serves to undermine the criminal investigation and cause further distress and turmoil to a young victim and her family. "This violence threatens to derail the very pursuit of justice it claims to challenge."

