title: Bakersfield neighbours speak of heartache over fatal house fire - BBC News
date: '2024-06-11'
section: Nottingham
url: http://www.bbc.co.uk/news/articles/cp3375lj4nlo
content: |-
  Despite attempts to save the woman from the fire, she died at the scene.

  Naeem Ahmed said he attempted to save his neighbour

  Residents have spoken of their shock after a woman died in a house fire in Nottingham Fire crews were called to the blaze in Ashworth Close, Bakersfield, on Friday night and found a woman in her 60s inside. Despite attempts to save her, the woman died at the scene. Her neighbour, Naeem Ahmed, told the BBC he had also attempted a rescue.

  Residents said the street was peaceful and described the news of their neighbour's death as "terrible"

  The taxi driver said he and another neighbour got into the home of the woman, who has not been named, through an open back door. "In the day, I took her to the hospital and brought her back and then I went to work," the 33-year-old said. "When I got back, there was an alarm going and I asked my wife, 'what's going on?'. "In the room, there was too much smoke - I opened the window and then the fire service came and said to move away," he said.

  A joint fire and police investigation has found the fire was not suspicious. "I'm feeling very sad. She was very nice and her partner was very nice," Mr Ahmed added. "I'm really quite upset - she was just next door."

  Flowers were left at the doorstep of the woman's home

  Another Ashfield Close resident, Muhammad Qasir Naveed, said: "It's devastating news for neighbours of the family. "I think we should always check on our neighbours. We look after each other." Group Manager Jonathan Holford previously said: “We would like to pass our deepest condolences to the family, friends and everyone affected by this sad incident. “We will be out in the local community in the coming days to offer reassurance to local residents, which will include free smoke alarm fittings." Follow BBC Nottingham on Facebook, external, on X, external, or on Instagram, external. Send your story ideas to eastmidsnews@bbc.co.uk, external or via WhatsApp, external on 0808 100 2210.
