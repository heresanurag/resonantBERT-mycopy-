  Rishi Sunak promised to stay on as leader of the Conservatives until his successor is chosen by the party.

  Mr Sunak has pledged to remain party leader until arrangements for selecting his successor were in place. Penny Mordaunt - the former leader of the Commons and twice a candidate to be prime minister - lost her Portsmouth North seat, as did ex-cabinet minister Sir Jacob Rees-Mogg. One key reason for the Conservatives' results was increased support for Reform UK - who won 14.3% of the vote, propelling party leader Nigel Farage into Parliament for the first time, alongside four other Reform MPs. The Liberal Democrats meanwhile have become the third largest in the Commons. The Greens recorded their best general election performance yet with 6.8% of the vote across Great Britain.
