title: Untreated sewage causes beaches to shut - BBC News
date: '2022-08-20'
section: General
url: http://www.bbc.co.uk/news/uk-62614739
content: |-
  Untreated wastewater has caused beaches across the South East to close due to a pollution risk.

  Beaches across Sussex have closed due to untreated sewage being released into the sea.

  In Hastings people have been advised not to swim due to a pollution risk. Beaches in Bexhill and Normans Bay were also shut after "significant" electrical issues at a pumping station.

  A spokesperson for Southern Water said: "I apologise to residents of Bexhill and Normans Bay because this is not acceptable."
