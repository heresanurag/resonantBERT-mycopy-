  There are faint hopes that an updated US-sponsored ceasefire proposal could still be accepted by Israel and Hamas. It reportedly would see the release of some remaining hostages in exchange for an unspecified period of calm. However Netanyahu has said Israel will expand its military offensive in Gaza and that nothing will stop the war. Hamas meanwhile has refused to release the remaining hostages unless Israel agrees to a permanent ceasefire and withdraws from Gaza. On Wednesday evening 67 former hostages signed a letter urging Netanyahu to reach a "comprehensive deal" for the return of all captives still being held by Hamas. "The majority of Israeli society wants the hostages home - even at the cost of halting military operations," the letter said. The Hostages and Missing Families Forum said the letter was written to build on the "historic momentum" after Edan Alexander's release. Hamas said it freed the 21-year-old as a goodwill gesture to Donald Trump, who is visiting the region. The ex-hostages' letter appealed to Trump not to "let this historic momentum stop". A poll for Israel's Channel 12 at the end of April suggested that 68% of respondents supported signing a hostage deal with Hamas even if it meant ending the war, while just 22% supported continued fighting in Gaza. "Despite American determination, there is no change in the PM's position - we will not allow an end to the war," an official in Mr Netanyahu's entourage said, according to diplomatic sources. Israel launched a military campaign to destroy Hamas in response to an unprecedented cross-border attack on 7 October 2023, in which about 1,200 people were killed and 251 others were taken hostage. At least 52,928 people have been killed in Gaza since then, the health ministry says.
