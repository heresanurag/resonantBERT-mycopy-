  Zelensky said the success of the minerals deal, which was formally backed by his government on Wednesday evening, would depend on the outcome of his meeting with Trump this week. Key details have not yet been made public, but Ukrainian Prime Minister Denys Shmyhal said it envisages an "investment fund" for Ukraine's reconstruction. The prospect of a deal was first proposed by Zelensky last year as a way to offer the US a tangible reason to continue supporting Ukraine. But disagreements over its substance exacerbated tensions between Trump and Zelensky in recent weeks. The Ukrainian president had rejected an initial request from the US for $500bn (£395bn) in mineral wealth, but media reports suggest this demand has now been dropped. There are also differences in how both sides are now describing the deal. Trump has lauded the "very big agreement" as an opportunity for the US to get its "money back" after funding aid to Ukraine. But Zelensky has instead referred to it as a "framework agreement" upon which he hopes further deals can be made.

  Trump has said he wants a quick end to the war in Ukraine and has sought to reset relations with Russia. After a phone call with Russian President Vladimir Putin, the two leaders sent delegations to Saudi Arabia in bilateral talks which excluded Ukraine. In response, Zelensky accused the US of helping Putin "break out of years of isolation" and Trump of living in a "Russian disinformation space". Ukraine is a country rich in natural resources. Kyiv estimates that about 5% of the world's "critical raw materials" are there. But accessing some of these resources will not be completely straightforward. Some of the mineral deposits have been seized by Russia. According to Yulia Svyrydenko, Ukraine's economy minister, resources worth $350bn (£277bn) remain in occupied territories today. There are warnings too that Ukraine first needs to addresses its problem with unexploded mines before striking a deal with the US. A quarter of Ukraine's landmass is estimated to be contaminated with landmines, mainly concentrated in the war-torn east of the country. Putin has also said he is open to offering the US access to rare minerals, including from Russian-occupied Ukraine. UK Prime Minister Sir Keir Starmer will also be meeting both Trump and Zelensky separately this week to discuss the war in Ukraine. He is due to arrive in Washington later on Wednesday.
