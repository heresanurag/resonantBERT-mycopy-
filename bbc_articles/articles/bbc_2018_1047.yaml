  Wing attack, a winning mentality and wedgies: The secrets of the England netball team.

  England's netball players are about to face New Zealand and Australia in the Quad Series.

  Ahead of the matches at the Copper Box Arena in London, we asked the squad for the secrets of the game that only netballers know.
