title: '''Oldest horse'' thrives on linseed cake and light exercise - BBC News'
date: '2025-02-21'
section: Northern Ireland
url: http://www.bbc.co.uk/news/articles/cgl0kg01g26o
content: |-
  Roana has recently celebrated her 46th birthday and is believed to be the oldest horse in the UK

  This video can not be played To play this video you need to enable JavaScript in your browser. 'Oldest horse' has benefited from good food, exercise and good genetics

  There's no better way for the horse believed to be the oldest in the UK to celebrate her 46th birthday than with a bit of cake. For birthday girl Roana, and stablemates Tinkerbell and Barnaby in County Down, the cake - made of linseed mash, grass pellets and a middle layer of grated carrot - went down extremely well. The horse emerged as the frontrunner for the title of UK's oldest horse in a survey by equestrian specialists Harry Hall and has lived well past the average horse age of 25 to 30 years. For owner Cerys Brown, it's an incredible achievement for an animal she first saddled up with as a six-year-old at riding school.

  "I can't imagine life without her," she said. "I just know her inside out, she knows me inside out, we've grown up together. "She's always there, she's always been there. She's my best friend." She rode Roana at competitive show-jumping events in the 1990s. Cerys joked that at first, Roana "wasn't very fond of small children". "But I was always the kid with treats in my pockets, and Roana likes treats. That's how I won her around."

  When the riding school closed during the next decades, Cerys's grandmother bought the mixed-breed pony for her. Roana has lived at her stables in County Down ever since. Cerys is often asked about the secret of Roana's longevity. "I think a lot of it is good care, and good feeding. She's had lots of exercise but not too much, so she has good joints. "And also, good genetics," she added. Roana has cantered through all the significant events in Cerys's life – even attending her wedding.

  She's been a help during more difficult times too. Cerys was diagnosed with Crohn's disease when she was 18 years old. She said that having Roana and another horse at the time gave her "the drive to get well again". "It just gave me a reason to get up and out in the morning." Cerys described Roana's personality as "thran" – which is a word often used in Northern Ireland to mean "stubborn". "Roana knows her own mind," she explained. "She does what she wants when she pleases. "I run to her schedule as opposed to the other way round. "But she's great fun, she has such a zest for life ... and even at age 46, she's not slow. She just wants to be out having fun."

  Cerys rode Roana at competitive show-jumping events in the 1990s

  Managing Director Liz Hopper from Harry Hall, which conducted the survey, said the relationship between Cerys and Roana was a "beautiful partnership". "Horses are living longer due to advancements in nutrition and medicine," she explained. "We are witnessing them surpassing expectations of the average age - which is around 25." Cerys said she hadn't previously thought that Roana could be a record-holder. "If horses get to their late 20s or early 30s, it's great. "But just because she's always been there, I never really thought Roana could be the oldest.

