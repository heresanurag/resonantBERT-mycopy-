title: Hurricane Michael flattens beach town like 'mother of all bombs' - BBC News
date: '2018-10-12'
section: US & Canada
url: http://www.bbc.co.uk/news/world-us-canada-45839343
content: "The storm flattened a beach town and knocked over 30-tonne freight rail\
  \ cars like toys.\n\nThis video can not be played To play this video you need to\
  \ enable JavaScript in your browser.\n\nHurricane Michael has landed on a Florida\
  \ beach town like the \"mother of all bombs\", almost wiping it off the map, officials\
  \ say.\n\nThe storm smashed into the state's north-west coast near Mexico Beach\
  \ on Wednesday with 155mph (250km/h) winds.\n\nThe hurricane, one of the most powerful\
  \ in US history, has killed 16 people, with fears the toll will rise.\n\nRescuers\
  \ \"still haven't got to some of the hardest-hit areas\", emergency management officials\
  \ say.\n\nMexico Beach is yet to report any fatalities, but rescuers working there\
  \ have yet to carry out a thorough search of the devastated area.\n\nMeanwhile,\
  \ more than 1m homes remain without power in Florida, Alabama, Georgia, Virginia\
  \ and the Carolinas.\n\nMichael, which fell just 2mph short of a top-level category\
  \ five, ripped apart entire neighbourhoods before moving out to sea by Friday morning.\n\
  \nThe hurricane's shrieking winds and wall of water swept beachfront homes off their\
  \ foundations, snapped boats in two and knocked over 30-tonne freight rail cars\
  \ like toys.\n\nOne of the first things you notice as you walk into Mexico Beach\
  \ is the stillness.\n\nNo wind, almost no-one on the street, just the beating hot\
  \ sun and the tossed and scattered debris - the calling card of a monstrous storm.\n\
  \nAnd then you hear faint bleeping sounds coming from all directions - a dissonant\
  \ symphony of high-pitched notes that turn out to be myriad small alarms, still\
  \ transmitting their warnings from the batteries which power them.\n\nMuch of the\
  \ damage in Mexico Beach, Florida was caused by the over-100mph winds.\n\nOn the\
  \ left, as we walk, there's a mattress slumped at the roadside, on the right a Dean\
  \ Koontz novel lies in the dirt.\n\nA little further on, and a woman, accompanied\
  \ by a friend, is sifting through the remains of her home, loading what she can\
  \ salvage into the boot of a car. This was her dream retirement place she tells\
  \ me - the last four years spent doing it up. \"I'll never step back in there,\"\
  \ she says through her tears.\n\nThe sheer force of Hurricane Michael has been well\
  \ analysed, but it's only when you see the everyday stuff of people's lives crushed,\
  \ broken, smashed to pieces, that you realise they will be living with this long\
  \ after we have gone.\n\nOne weeping resident of Mexico Beach pictured on CNN struggled\
  \ to even find her street, let alone her home.\n\nTom Bailey, the town's former\
  \ mayor, told the New York Times: \"The mother of all bombs doesn't do any more\
  \ damage than this.\"\n\nSome 285 people in the community - population 1,000 - defied\
  \ a mandatory evacuation order and stayed behind to ride out the storm.\n\nAn insurance\
  \ firm, Karen Clark & Company, estimated Michael caused about $8bn (£6bn) in damage.\n\
  \nFlash flooding affected the big North Carolina cities of Charlotte and Raleigh\
  \ and parts of Virginia. Police said there were five suspected tornados in Virginia.\n\
  \nBut it was Florida's Panhandle that bore the brunt of the tempest. Thousands of\
  \ military, police and rescue teams are converging on the area.\n\nUS Army personnel\
  \ have been using heavy equipment to clear away fallen trees so rescuers can reach\
  \ any trapped residents.\n\nFederal Emergency Management Agency (Fema) crews are\
  \ using dogs, drones and GPS in the search.\n\nFlooding destroyed 1,000 homes in\
  \ the small town of Port St Joe, not far from Mexico Beach.\n\nThe number of people\
  \ in emergency shelters was expected to reach 20,000 across five states by Friday,\
  \ said the American Red Cross.\n\nThe 16 known storm-related deaths so far are:\
  \ Three in North Carolina, one in Georgia, seven in Florida and five in Virginia.\n\
  \nIn North Carolina, one motorist was killed when a tree fell on his car, while\
  \ two others died when their car crashed into a tree felled by heavy winds.\n\n\
  Eleven-year-old Sarah Radney, who was visiting her grandparents in Seminole County,\
  \ Georgia, died when a metal carport near their home was lifted by powerful winds\
  \ and slammed through their roof.\n\nIn Virginia, police said four of the deaths\
  \ were due to drowning - including one man who drowned when his vehicle was caught\
  \ in flash floods in Pittsylvania County.\n\nThe waters were too turbulent for rescuers\
  \ to reach him, officials say.\n\nFirefighter Lt Brad Clark died when a truck hit\
  \ his fire engine on a rain-slicked road at the scene of a crash in Hanover County,\
  \ Virginia, on Thursday night.\n\nHurricanes are violent storms that can bring devastation\
  \ to coastal areas, threatening lives, homes and businesses. Hurricanes develop\
  \ from thunderstorms, fuelled by warm, moist air as they cross sub-tropical waters.\
  \ \n\nWarm air rises into the storm. Air swirls in to fill the low pressure in the\
  \ storm, sucking air in and upwards, reinforcing the low pressure. The storm rotates\
  \ due to the spin of the earth and energy from the warm ocean increases wind speeds\
  \ as it builds. When winds reach 119km/h (74mph), it is known as a hurricane - in\
  \ the Atlantic and Eastern Pacific - or a typhoon in the Western Pacific. \"Everybody\
  \ has a plan until they get punched in the face. Well, we're about to get punched\
  \ in the face.\" \n\nFlorida Mayor Bob Buckhorn, ahead of Hurricane Irma (2017)\
  \ The central eye of calmer weather is surrounded by a wall of rainstorms.\n\nThis\
  \ eyewall has the fastest winds below it and violent currents of air rising through\
  \ it. A mound of water piles up below the eye which is unleashed as the storm reaches\
  \ land. \n\nThese storm surges can cause more damage from flooding than the winds.\
  \ \"Urgent warning about the rapid rise of water on the SW FL coast with the passage\
  \ of #Irma's eye. MOVE AWAY FROM THE WATER!\"\n\nTweet from the National Hurricane\
  \ Center The size of hurricanes is mainly measured by the Saffir-Simpson scale -\
  \ other scales are used in Asia Pacific and Australia. Winds 154-177km/h\n\nRoofs\
  \ and trees could be damaged. \n\nStorm surge +1.8m-2.4m Hurricane Sandy (2012)\
  \ caused $71bn damage in the Caribbean and New York Hurricane Ike (2008) hit Caribbean\
  \ islands and Louisiana and was blamed for at least 195 deaths \"For everyone thinking\
  \ they can ride this storm out, I have news for you: that will be one of the biggest\
  \ mistakes you can make in your life.\" \n\nMayor of New Orleans Ray Nagin ahead\
  \ of Hurricane Gustav, 2008\n\nAre you in the area? If you've been affected by Hurricane\
  \ Michael and it's safe to share your experiences, please email haveyoursay@bbc.co.uk.\n\
  \nPlease include a contact number if you are willing to speak to a BBC journalist.\
