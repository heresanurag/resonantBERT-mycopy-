title: Water supplies restored to Glasgow homes after pipe burst - BBC News
date: '2021-02-13'
section: Glasgow & West Scotland
url: http://www.bbc.co.uk/news/uk-scotland-glasgow-west-56053872
content: |-
  More than 65,000 homes and businesses in Glasgow and Inverclyde are reconnected after pipe problems.

  Nearby streets were flooded after the burst in Glasgow

  Water supplies have been restored to more than 65,00 homes and businesses in Glasgow and Inverclyde after supply pipe problems.

  Scottish Water said a 36in (91cm) trunk main failed in Anniesland early on Saturday, affecting 53,000 customers.

  Nearby roads were flooded, with the water turning to ice in many places in the sub-zero temperatures.

  A separate problem in Inverclyde left 13,000 homes and businesses without water.

  Divers had to be brought in to remove the ice that was blocking a pipe to the Greenock water treatment plant which gets its water from Loch Thom.

  Supplies of bottled water were distributed in Greenock, Gourock, Inverkip, Wemyss Bay and Skelmorlie as specialist teams worked to fix the problem.

  Supplies were restored at about 21:00 on Saturday.

  During the first incident in Glasgow, police were brought in to manage traffic as roads were flooded.

