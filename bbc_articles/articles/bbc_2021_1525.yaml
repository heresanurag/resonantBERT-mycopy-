  A spokesperson for Scottish Water said: "We would like to apologise to customers in Glasgow who experienced disruption to their water supply this morning.

  "With all customers now back in supply, work is under way to excavate and repair the trunk water main so that the water network can be restored to normal operation.

  "We're grateful for local communities' patience and support while our teams are working in challenging conditions to keep the city's water flowing."

  Engineers were working to isolate the damaged pipe

  Customers were warned that water may initially appear discoloured or cloudy.

  They are advised to run their cold tap at half pressure until the water runs clear.
