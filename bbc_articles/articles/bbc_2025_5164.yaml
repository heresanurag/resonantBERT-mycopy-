id: bbc_2025_5164
title: Girl, 4, dies after suspected arson attack at house - BBC News
date: '2025-03-03'
section: Manchester
url: http://www.bbc.co.uk/news/articles/c5y02ekxg95o
content: |-
  A 44-year-old woman has been arrested on suspicion of arson with intent to endanger life, say police.

  The blaze broke out at a house in Gateshead Close, police said

  A four-year-old girl has died following a suspected arson attack at a house in Manchester, police have said. The child was found seriously injured by firefighters who brought her out of the property in the Rusholme area of the city at about 12:30 GMT. She was taken to hospital where she was later pronounced dead, Greater Manchester Police (GMP) said. A 44-year-old woman, who police said was known to the child, has since been arrested on suspicion of arson with intent to endanger life.

  The fire happened in a house in Gateshead Close in the Rusholme area of south Manchester

  Det Ch Insp Charlotte Whalley said: "This awful incident has seen the tragic death of a young girl, and I would like to send my condolences to her friends and family. "A woman has been arrested and I can confirm that she is known to the child. "There is no wider threat to the community and no-one else is currently being sought in connection with the investigation." She said the emergency services "did their utmost best" to save the little girl after the fire on Gateshead Close.

  Firefighters from four stations extinguished the blaze, police said

  Firefighters were able to quickly extinguish the blaze, police said. Investigators will now "leave no stone unturned" as they try to establish what happened, Det Ch Insp Whalley added. GMP has appealed for anyone with information to contact them. Ben Levy, area manager at Greater Manchester Fire and Rescue Service (GMFRS), said crews from four stations had attended the scene. "I want to pass on the condolences of everyone at Greater Manchester Fire and Rescue Service to the family and friends of the young girl who tragically lost her life following this incident," he said. "Our thoughts are with them during this sad and difficult time." Mr Levy said GMFRS would now work closely with police on the investigation.

  Police and emergency services remained in the area after the fatal house fire

  Reporting from the scene at about 17:30, the BBC's Zoe Toase said the smell of smoke was still strong in the air. She said a single police officer was standing in front of blue-and-white tape across the road, and that only residents were being allowed access. She said a fire engine remained outside the fire-hit property. A team of forensics officers emerged at about 17:45, she said.

