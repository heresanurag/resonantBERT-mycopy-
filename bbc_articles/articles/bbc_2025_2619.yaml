content: |-
  Time-lapse footage shows engineers completing the largest and longest viaduct operation of its type.

  HS2 has revealed new time-lapse footage showing engineers completing the heaviest and longest single-stage viaduct deck slide on the London-Birmingham railway project so far.

  The four-day operation over the A413 near Wendover in Buckinghamshire, closed the road as work began on Thursday.

  Engineers used "technology similar to the surface of a non-stick frying pan to slide the viaduct into position" over the road and an existing railway line, HS2 said.

