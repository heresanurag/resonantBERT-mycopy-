  Austria's Matthias Mayer produces a brilliant run to win the men's super G and claim his second Winter Olympics alpine skiing gold medal.

  This video can not be played To play this video you need to enable JavaScript in your browser.

  Austria's Matthias Mayer produced a brilliant run to win the men's super G and claim his second Winter Olympics alpine skiing gold medal. Mayer, the downhill champion in Sochi in 2014, won in a time of one minute 24.44 seconds, with Beat Feuz of Switzerland second and defending champion Kjetil Jansrud of Norway third. Norway's Aksel Lund Svindal could only manage fifth meaning he missed out on a historic 'speed double', a day after winning the downhill. Mayer's father is former alpine ski racer Helmut Mayer, who won Olympic silver in this event in Caglary 1988 Mayer's win breaks Norway's dominance in men's Olympic super G, which stretches back to 2002. Hermann Maier of Austria was the last man from outside Norway to win the event, at Nagano in 1998.

