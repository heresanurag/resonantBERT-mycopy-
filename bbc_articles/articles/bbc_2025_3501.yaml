content: |-
  The moment a boxing club coach’s life was saved during a children’s sparring session.

  This is the moment a boxing club coach's life was saved after he collapsed during a children's sparring session in south-east London.

  Actor and boxing coach Jon McKenna collapsed during a youth session at Double Jab Boxing Club in New Cross on 25 February.

  Within seconds, the club's founder, Patrick Harris, leapt into the ring and began performing CPR.

  Once medics arrived, the actor was taken to hospital and he plans to return to the ring soon having made a full recovery.

  The 77-year-old said: "There is no way I can repay him for saving my life, he will always be my friend and I will always stand up for Pat in any way I can."

