title: 'Aldi: Family-run London bakery wins supermarket deal - BBC News'
date: '2024-06-03'
section: General
url: http://www.bbc.co.uk/news/videos/ce99vw6evl3o
content: |-
  South London firm Flake Bake won a TV competition to have their Jamaican patties sold by Aldi.

  A family-run bakery in south London, which specialises in Jamaican patties, has landed a supermarket deal with Aldi after winning a Channel 4 competition.

  Flake Bake, based in South Bermondsey, is run by father-son duo Paul and Micheal Williams.

  They went up against five other bakeries to win, with their patties now available in 1,000 Aldi supermarkets.

  The firm struggled through the pandemic, but this new lease of life has given the company renewed focus, which has meant hiring more local workers to produce 20,000 patties a week in their south London kitchen.

