content: |-
  Lucy Evans had encephalitis, an inflammation of the brain that caused her frightening delusions.

  Lucy Evans from Aberystwyth had encephalitis, a serious condition that caused her brain to become swollen and led her to experience frightening delusions.

  Some types can kill in a matter of days, but a new report has highlighted how many patients are misdiagnosed.

