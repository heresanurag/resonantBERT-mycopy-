  Richie Parry was a ray of sunshine who will be sadly missed, Alsager School says.

  Tribute to 'ray of sunshine' killed in mountain fall

  Richie and Tom Parry fell while walking on a mountain in Glen Coe

  A boy who died in a hillwalking accident was a ray of sunshine, his school said. Twelve-year-old Richie Parry and his father Tom, 49, were killed in a fall on a mountain in the Scottish Highlands. The pair from Alsager in Cheshire were reported missing after failing to return home. Their bodies were found on Wednesday night. Alsager School said it was devastated by their deaths and that Richie was a kind, thoughtful and gentle boy.

  "We send our thoughts and condolences to Richie’s family and friends. We will miss him dearly," it said. Richie had also recently joined AFC Alsager's under 13s football team. The father and son had been in Glen Coe when their bodies were found on the mountain Stob Coire Nan Lochan. They were described as experienced hill walkers. On Friday wife and mother Gemma Parry said her husband was a loving father, and their son Richie an energetic, loving boy. She thanked the Scottish and Cheshire police as well as the mountain rescue service and all the emergency services involved in finding her son and husband. “We would also like to thank the community of Alsager and all of our family friends who have helped us and supported us throughout this time," she said. Mr Parry, a keen hill walker who colleagues said would meticulously plan his walks, worked at The Senate Group in the town. Chief executive Paul Keeling said his loss was immense.
