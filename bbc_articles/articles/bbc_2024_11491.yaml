content: |-
  Ian Gribbin, the party's candidate in Bexhill and Battle, claimed the country would be "far better" if it had "taken Hitler up on his offer of neutrality".

  Nigel Farage has been questioned about claims made by a Reform UK candidate.

  Ian Gribbin, the party's candidate in Bexhill and Battle, claimed the country would be "far better" if it had "taken Hitler up on his offer of neutrality" instead of fighting the Nazis in World War Two.

  He also wrote online that women were the "sponging gender" and should be "deprived of health care".
