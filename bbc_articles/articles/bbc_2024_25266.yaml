content: |-
  Former Chelsea boss Thomas Tuchel becomes only the third non-British manager of the England men's team.

  Tuchel 'very proud' to be named England manager

  Tuchel won the Champions League as manager of Chelsea

  Thomas Tuchel has been appointed England manager from 1 January 2025. The 51-year-old German, who has signed an 18-month contract, becomes the third non-British permanent manager of the men's team after Sven-Goran Eriksson and Fabio Capello. Gareth Southgate resigned in July after England’s defeat by Spain in the Euro 2024 final. Lee Carsley, who was overseen four games since being appointed interim manager in August, will remain in charge for the Nations League matches against Greece and the Republic of Ireland next month. Former Chelsea boss Tuchel, who left Bayern Munich at the end of last season, said: "I am very proud to have been given the honour of leading the England team. "I have long felt a personal connection to the game in this country, and it has given me some incredible moments already. "To have the chance to represent England is a huge privilege, and the opportunity to work with this special and talented group of players is very exciting." Chief executive Mark Bullingham said the Football Association had appointed "one of the best coaches in the world". He said: "Thomas and the team have a single-minded focus on giving us the best possible chance to win the World Cup in 2026."

  This video can not be played To play this video you need to enable JavaScript in your browser. Thomas Tuchel's career path: From TSV Krumbach to Chelsea and the Champions League final

  England have not won a major trophy since the 1966 World Cup. They will start their qualification process for the 2026 tournament in Canada, Mexico and the United States next year. The FA approached Manchester City manager Pep Guardiola in the summer to see if had an interest in the role, while Newcastle United boss Eddie Howe and ex-Brighton and Chelsea manager Graham Potter were also linked with the position. FA said, external Tuchel was the "preferred candidate" from "several" managers interviewed. It said the FA board approved the decision last week and Tuchel signed a contract on 8 October. Under Carsley, England lost to Greece on 10 October and beat Finland on 13 October. "The announcement was delayed to minimise distraction around the international camp that has just concluded," an FA statement read. English coach Anthony Barry, who worked with Tuchel at Chelsea and Bayern, will be his assistant. Tuchel won the German Cup with Borussia Dortmund and two Ligue 1 titles at Paris St-Germain, including a domestic treble in 2019-20. He became Chelsea manager in January 2021, winning the Champions League, Club World Cup and Uefa Super Cup before being sacked in September 2022. After Bayern failed to win the Bundesliga title last season for the first time since 2011-12, Tuchel left despite still having a year to run on his contract. "Exciting times for England, with a generation of talented players and a new manager taking the reins," the Prince of Wales said, external on social media. "Thomas, wishing you the best of luck, we’re all behind you! W" Carsley will return to manage England Under-21s when Tuchel takes over.

