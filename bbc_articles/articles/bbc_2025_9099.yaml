  The co-founder of Ben & Jerry's, Ben Cohen, was part of a protest in the US Senate.

  Ben Cohen, the co-founder of Ben & Jerry's, was arrested during a protest in the US Senate over military aid to Israel and humanitarian conditions in Gaza.

  Health and Human Services Secretary Robert F Kennedy Jr was testifying in the US Senate at the time of the protest.

