title: 'Covid in Scotland: Hairdressers and homeware shops reopen - BBC News'
date: '2021-04-05'
section: Scotland
url: http://www.bbc.co.uk/news/uk-scotland-56633337
content: |-
  Non-essential click and collect services are also able to resume business as Covid restrictions ease.

  Hairdressers and barbers like Tony Mann's in Giffnock can now reopen by appointment only

  Hairdressers, homeware shops and garden centres are reopening in Scotland as Covid restrictions on the economy have eased.

  Non-essential click-and-collect services are also allowed to resume.

  They are the latest lockdown measures to be relaxed after the Scottish government lifted its "stay at home" rule on Friday.

  Deputy First Minister John Swinney urged people to remember the virus is still circulating and to continue following the rules.

  He said: "The virus is down but it's not yet out, and the last thing we need is to see it making a comeback and undoing all the progress from the massive effort and sacrifices we have all had to make."

  Hairdressers and barbers with shopfronts can reopen by appointment only - but not mobile services.

  While some limited click-and-collect services have been operational since January - including clothing, footwear and books - non-essential click-and-collect can now resume.

  However, they will have to operate by staggered appointments.

  People still have to abide by the "stay local" rule, meaning they cannot travel outside their local authority boundaries, unless for essential reasons.

  Garden centres are among the businesses that can reopen

  Mr Swinney added: "While it's great news that garden centres and hairdressers are allowed to reopen, everyone needs to bear in mind that it doesn't mean the virus has gone away.

  "My message is simple - enjoy the latest relaxing of the rules but remember to look out for each other, too."

  Stylist Fallon Carberry said her salon in Glasgow had already been swamped with bookings.

  She told the BBC's Good Morning Scotland programme: "When we got the first announcement, we opened our books and we had over 1,000 bookings in 24 hours. We weren't expecting that.

  "It's crazy busy but the staff are all well rested. We are going to be open seven days until eight at night. There are long days ahead but we're ready."

  Marc McCune, who owns two hair salons in Glasgow, said his staff were as much a priority as customers as restrictions are lifted.

  He said: "The government has provided financial support and furlough has allowed us to keep all our team employed.

  "It's been a strange year for our team who have only worked for five months in the last year. So we are concerned more about their mental wellbeing."

  David Lonsdale, director of the Scottish Retail Consortium, welcomed the reopenings and urged shoppers to respect the rules in place.

  He said: "The decision to expand the list of essential retailers and unwind some of the elevated lockdown restrictions are positive steps. Its good news for shoppers and for the economy.

  "Retailers are working hard to prepare for reopening. Shoppers can play their part by adhering to the rules on face-coverings, social distancing, queuing, and by being respectful of shop staff."

  Outdoor contact sports for 12 to 17-year-olds can also start again and college students are able to return to in-person teaching for practical subjects.

  It is expected that all school pupils will return full-time after the Easter holidays. Those in secondary schools are currently operating under a blended learning system.

  Meanwhile Police Scotland have criticised campers who breached lockdown rules by pitching up in the Mennock Pass on Dumfries and Galloway.

  The campers were ordered by police to move on

  The force tweeted: "Whilst out on patrol yesterday in the Mennock Pass our officers found a large number of people who had travelled from out with our region to #DumfriesandGalloway.

  "Approximately 50 people who had intended camping for the weekend were reminded of the current guidelines prior to them leaving the area.

  "Our officers will continue to visit local beauty spots to encourage people to #StaySafe.

  "Please follow the The Scottish government guidelines as we ease out of lockdown."

  It comes after Scotland recorded 343 coronavirus cases and no new deaths of Covid patients on Sunday.

  Figures published by the Scottish government indicated the daily test positivity rate was 2.7%, up from 2.1% on Saturday.

  In total, 2,553,837 people had received a first dose of the Covid-19 vaccination and 451,057 had received their second dose.
