title: 'Project Restart: Premier League plan surprise inspections during training
  - BBC Sport'
date: '2020-05-19'
section: General
url: http://www.bbc.co.uk/sport/football/52704450
content: |-
  Clubs can expect surprise inspections during training as they prepare for the resumption of the Premier League under new safety guidelines.

  Last updated on .From the section Premier League

  Surprise inspections, GPS tracking and video analysis are methods that could be used to ensure clubs adhere to new safety guidance as they prepare for the resumption of the Premier League. Teams agreed to start non-contact training in small groups from Tuesday. "Gradually, we aim to ramp that up so we can have an inspector at every training ground," said Richard Garlick, the league's director of football. "That will enable us to give confidence the protocols are being complied with." He added: "We are looking at bringing in our own independent audit inspection team that we'll scale up over the next few days which will give us the ability to have inspections at training grounds to start with on a no-notice basis." After Monday's 'Project Restart' meeting with clubs, Richard Masters, Premier League's chief executive, also revealed that a trophy presentation for the title winners, likely to be Liverpool, remains part of the plans. He said: "We would try to do it unless it wasn't possible because of safety concerns." At the meeting, Premier League clubs agreed to stage one of the return-to-training protocols. As well as training in small groups of no more than five, sessions must last no longer than 75 minutes for each player. Social distancing must be adhered to. However, BBC Sport revealed that a survey of 138 Premier League and English Football League doctors and physiotherapists found more than half "do not fully understand their roles, responsibilities and potential liabilities" regarding return to training. The Premier League said the first stage "has been agreed in consultation with players, managers, club doctors, independent experts and the government". The league had previously identified 12 June for matches to possibly start again, but there is now an expectation this will need to be pushed back. A Premier League statement added: "Strict medical protocols of the highest standard will ensure everyone returns to training in the safest environment possible. "The health and wellbeing of all participants is the Premier League's priority, and the safe return to training is a step-by-step process. "Full consultation will now continue with players, managers, clubs, the PFA [Professional Footballers' Association] and LMA [League Managers' Association] as protocols for full-contact training are developed." All Premier League clubs carried out coronavirus tests on Sunday and Monday and the Premier League will announce on Tuesday how many, if any, positive tests were recorded. On Monday, the Premier League's medical adviser Mark Gillett said that discussions will take place in the coming weeks over whether clubs would have to isolate in a hotel for 14 days before play resumes, as happened in Germany before the Bundesliga restart.
  • None Restrictions in place for team training under 'Project Restart' Masters suggested that any proposal of a new date could hinge upon when teams begin contact training, with further talks expected to take place, "in the next week to 10 days". He said: "12 June was a staging post; it wasn't a firm commitment and what we don't want to do is continue to move it around. "We know there's a discussion to be had. It really depends on when we can start full contact training and we have a process to go through before we can get to that stage. Of course we've got to be flexible." Regarding the safety of players and staff, Masters added: "Clearly we cannot de-risk the entire thing. But I think what we have created is an extremely safe environment that is the first stage of a return to training. "So hopefully we have reassured all players and managers on that basis." Gillett suggested that the safety measures in place for clubs are expected to be the new normal for the foreseeable future. "They've made it very clear that the social situation, the public health situation is not going to change over the next six to 12 months," he told BBC Sport. "Regardless of the timing of this type of conversation, we're going to be looking at making the same kind of cultural changes at training grounds and in footballers' behaviours whether we have this conversation now or at any point this year. It is important that people understand that." The Premier League is likely to be given extra time to decide when it hopes to restart the 2019-20 season, after Uefa moved its executive committee meeting from 27 May to 17 June. Uefa had previously said it wanted leagues to tell it what their plans were by 25 May, as these can only be signed off by the executive committee. It took the Bundesliga nearly five weeks from starting non-contact training to playing matches. After Monday's announcement by the Premier League, that would leave them looking at either 19 or 26 June. Official protocols sent to players and managers last week and obtained by the BBC revealed corner flags, balls, cones, goalposts and even playing surfaces will be disinfected after each training session. Ongoing measures included in further guidance include twice-weekly testing and a daily pre-training questionnaire and temperature check. Newcastle United manager Steve Bruce said the league had "done everything they possibly can to make sure that everything is safe" for the return to training. Speaking to BBC Radio 4's Today programme he said: "The attention to detail has been quite fantastic. "So I think everything has been put in place and they've been meticulous in that plan. The vast majority of our squad are satisfied (with the first phase training protocols). Let's get up and going and see where it takes us. I think all of us want to get it started and finished." Magpies players will arrive in kit and wear snoods during training. 'Half of PL doctors do not understand' The body that represents medical practitioners in football said half of Premier League doctors and physiotherapists that responded to their survey did not feel they had been "fully and effectively" consulted regarding returning to training. Half also said they do not fully understand their "roles, responsibilities and potential liabilities" regarding return to training. The figure is even greater among their counterparts in the EFL, with 68% of those who responded to the survey raising concern. In total, 138 club medics across the top four divisions in England responded to the survey from the Football Medicine and Performance Association. A Premier League spokesman said: "We have actively engaged and consulted with a wide range of medical experts throughout this process to agree the first phase of our return to training protocols which include all Premier League club doctors, Public Health England, the Government and a cross-sport medical working group." What happens next?
  • 19 May: Players may return to group training under social distancing protocols
  • 25 May: Uefa deadline for leagues to have finalised plan for restarting seasons
  • 1 June: Government date for possible return of elite sport behind closed doors
  • 12 June: Premier League initially aiming to return with first fixture Championship clubs are of the view today's Premier League decision also clears them to return to training under the same conditions. They are planning to test players on Thursday and Friday before an anticipated return to training next Monday, which is the date outlined in the story. The key difference is clubs are now working to a restart date of 20 June. The idea is to play on five consecutive weekends and the four midweeks in between, meaning the final league games would be 18/19 July, followed by the play-offs, the format for which is still to be decided.
