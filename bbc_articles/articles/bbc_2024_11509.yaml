  A lot has happened in the five years since the United Kingdom last went to the polls in a general election.

  How could global turmoil affect the election in Scotland?

  It's nearly five years since the United Kingdom last went to the polls in a general election and a lot has happened in that time. Three events in particular will have their own lengthy entries in the history books. The global pandemic, the UK's departure from the European Union, and the war in Ukraine have had deep and lasting effects on life and politics in Scotland and further afield. What impact might they have on the outcome of this election?

  Scotland's first coronavirus death was confirmed in March 2020. Just 10 months later the UK registered more than 1,500 deaths with Covid-19 in a single day. Politicians responded to this unprecedented public health emergency by introducing the most extreme restrictions on our liberty ever known in peacetime. Whatever the rights and wrongs of lockdowns - which were supported by all four big UK parties - the publicly-funded National Health Service is still feeling the effects of that period. As much routine healthcare was suspended to prioritise tackling the virus, the number of people waiting for treatment, and the length of time they were waiting, soared. With their treatment delayed, many patients became sicker, with some developing additional conditions. That piled further pressure on the NHS, which is actually four separate systems, , externalcurrently administered by the Conservatives in England; the Scottish National Party in Scotland; Labour in Wales; and the power-sharing government of Sinn Fein and the Democratic Unionist Party (DUP) in Northern Ireland. For all four governments, the pandemic highlighted existing problems. "Critical underlying issues were brutally exposed with too few staff, too few beds, and buildings that were unsuitable for effective infection control," according to doctors' trade union,, external the British Medical Association (BMA).

  The NHS in Scotland has come under extreme pressure

  Scotland voted by a wide margin to stay in the EU

  Russian president Vladimir Putin's decision to order an invasion of Ukraine in February 2022 sent shockwaves through a global economy which was already struggling to cope with a surge in demand for imported products as lockdowns were lifted and trading resumed. As Western nations imposed sanctions on Russia, oil and gas prices soared, and supplies of wheat, sunflower oil and other products from the region were disrupted. The global effect was to turbo charge inflation, pushing up the price of energy, food and mortgages, and leading to "a widespread fall in household incomes.”, external The Institute for Fiscal Studies says 12 million people in the UK are now living in absolute poverty and this parliament "is on course to be the worst on record for growth in average incomes." At a global level the economic impact was a "catastrophe" for some of the poorest citizens on earth, according to the World Bank.

