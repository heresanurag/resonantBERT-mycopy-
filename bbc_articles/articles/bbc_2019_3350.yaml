title: 'Brexit People''s Vote protest: ''Stop Brexit'' chants at huge London march
  - BBC News'
date: '2019-03-23'
section: General
url: http://www.bbc.co.uk/news/uk-47681230
content: |-
  Hundreds of thousands of marchers demanded another referendum on the UK’s relationship with the EU.

  Hundreds of thousands of people gathered in central London for a march to support a further referendum on the UK’s relationship with the European Union.

  Under the slogan "Put It To The People”, protesters filled the streets from Park Lane to Parliament Square.

  On Thursday, European leaders agreed to delay the UK's departure from the EU.

  Meanwhile, PM Theresa May is coming under pressure to resign after saying she might not put her Brexit deal to a third vote by MPs.
