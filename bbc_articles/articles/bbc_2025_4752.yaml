  BBC reporter Cathy Minton explains how her husband's long Covid has impacted their family.

  A BBC reporter has shared how her husband's long Covid has affected their family life.

  Cathy Minton's husband Tom was working as a director at BBC Look North when he caught Covid during the pandemic.

  His difficulties with fatigue, brain fog and heart palpitations means he now works part-time.

  Mr Minton, who became a father two years ago, said: "I want to do all the things that I had in my mind that I would do as a parent and I can't do most of them."

  Listen to highlights from West Yorkshire on BBC Sounds, catch up with the latest episode of Look North.
