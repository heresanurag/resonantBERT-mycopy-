title: 'Covid: Bring back rules amid rising cases, urge NHS chiefs - BBC News'
date: '2021-10-20'
section: UK
url: http://www.bbc.co.uk/news/uk-58976577
content: "But the business secretary says it is not time for \"Plan B\" and he wants\
  \ to avoid further lockdowns.\n\nSome Covid restrictions must immediately be reintroduced\
  \ if England is to avoid \"stumbling into a winter crisis\", health leaders have\
  \ warned.\n\nThe NHS Confederation said a back-up strategy, or Plan B, which includes\
  \ mandatory face coverings in crowded and enclosed spaces, should be implemented.\n\
  \nUK cases have been rising sharply but deaths are well below the winter peak.\n\
  \nBusiness Secretary Kwasi Kwarteng said it was not time for Plan B yet and urged\
  \ greater uptake of booster jabs.\n\nHe said he did not want further lockdowns or\
  \ to jeopardise the \"hard-won gains\" of reopening the economy.\n\n\"I don't want\
  \ to inject any hint of complacency but I think so far our approach is working\"\
  \ he said, pointing to lower rates of hospital admissions and deaths than in earlier\
  \ waves of infection.\n\nDaily Covid cases have been above 40,000 for eight days\
  \ in a row, with 49,139 new infections reported on Wednesday, and, as of Tuesday,\
  \ there were 7,891 patients in hospital.\n\nAnother 179 people were reported to\
  \ have died within 28 days of testing positive for Covid.\n\nDowning Street said\
  \ on Wednesday that there were no plans to activate Plan B for winter, saying that\
  \ they would continue to monitor the data but that vaccination had broken the link\
  \ between cases, hospital admissions and deaths.\n\n\"Our focus remains on ensuring\
  \ we get boosters out to those who are eligible,\" a No 10 spokesman said.\n\nUnder\
  \ the government's Plan A for dealing with Covid in England this winter, which is\
  \ currently in place, booster jabs are being offered to about 30 million people,\
  \ a single dose of a vaccine is available for healthy 12 to 15-year-olds and people\
  \ are advised to wear face coverings in crowded places.\n\nIf these measures are\
  \ not enough to prevent \"unsustainable pressure\" on the NHS, then steps like making\
  \ face coverings mandatory in some settings, asking people to work from home and\
  \ introducing vaccine passports could be considered as part of Plan B.\n\nThis video\
  \ can not be played To play this video you need to enable JavaScript in your browser.\
  \ Kwasi Kwarteng: 'I don't want to reverse to a situation where we have lockdowns'\n\
  \nMatthew Taylor, head of the NHS Confederation, which represents health service\
  \ organisations, urged the government to roll out Plan B to avoid hospitals becoming\
  \ overwhelmed.\n\n\"The health service is right at the edge,\" he told BBC Radio\
  \ 4's Today programme.\n\nThe pressures would only grow worse and the nation had\
  \ to make a decision to take pre-emptive action, he said, adding: \"Or do we stumble\
  \ into a crisis once again, despite the evidence?\"\n\n\uFEFFIt is not surprising\
  \ that NHS leaders are warning about a very challenging time ahead with the risk\
  \ of a \"winter crisis\".\n\nSome may feel it is a familiar refrain and that the\
  \ health service often raises concerns ahead of winter.\n\nBut the significance\
  \ of this intervention by the NHS Confederation is that it came just hours after\
  \ Downing Street had ruled out Plan B at this stage and said it had not been discussed\
  \ by the cabinet.\n\nThe confederation is, in effect, taking issue with ministers\
  \ by suggesting the key government test for implementing Plan B in England - the\
  \ likelihood of the NHS coming under unsustainable pressure - has already been met.\n\
  \nConcerns about the pace of the rollout of the vaccine booster programme and a\
  \ steady increase in Covid cases and hospital numbers have left some amber lights\
  \ flashing.\n\nMinisters will argue more time is needed to assess data before taking\
  \ big decisions on restrictions affecting everyday lives.\n\nBut they have acknowledged\
  \ they will now be keeping \"a very close eye\" on case numbers.\n\nThe NHS Confederation\
  \ has also called for a package of further measures to support frontline services\
  \ - what it terms as a \"Plan B plus\". This could include encouraging people to\
  \ get vaccinated, turn up to appointments on time and even volunteer to support\
  \ the NHS.\n\nAs the UK's early vaccine rollout means some people may be at risk\
  \ of waning immunity, there has been criticism over the pace of the booster jab\
  \ programme.\n\nAbout 4.8 million people had their second dose more than six months\
  \ ago, but have not yet received the top-up - a gap that is growing each week.\n\
  \nBut NHS England chief executive Amanda Pritchard told MPs on Tuesday that \"there\
  \ is no delay\" in sending out invitations for booster jabs. Instead she put it\
  \ down to people being slow to coming forward for their third dose.\n\nProf Adam\
  \ Finn from the University of Bristol, one of the members of the Joint Committee\
  \ on Vaccination and Immunisation (JCVI), urged the government to encourage greater\
  \ voluntary measures now that we had a higher level of infections than at any point\
  \ in the pandemic.\n\nHe told BBC Breakfast: \"Relying on the vaccine programme\
  \ to take care of the problem is not going to be a solution, I'm afraid.\"\n\nProf\
  \ Andrew Pollard, chair of the JCVI, said Covid hospital admissions tended now to\
  \ be elderly people with other health conditions, who don't have severe symptoms\
  \ and are staying for a shorter period of time before being discharged.\n\n\"The\
  \ biggest pressure is still the unvaccinated, from an intensive care perspective,\"\
  \ he told the Today programme. \"The boosters don't have an impact on that, that's\
  \ where we really need to have people who are unvaccinated to be vaccinated.\"\n\
  \nOn Tuesday Northern Ireland announced its own autumn and winter plan, which will\
  \ see face coverings remain a legal requirement in crowded indoor spaces.\n\nThe\
  \ Welsh government has previously set out its plans for winter, with First Minister\
  \ Mark Drakeford saying Christmas this year was likely to be more normal.\n\nScotland\
  \ has set out a winter vaccination strategy and already has measures in place such\
  \ as the requirement of proof of vaccination status at nightclubs and face masks\
  \ in schools.\n\nMeanwhile, officials say they are monitoring a new descendant of\
  \ the Delta variant of Covid, which is causing a growing number of infections.\n\
  \nDowning Street said there was \"no evidence to suggest it is more easily spread\"\
  ."
