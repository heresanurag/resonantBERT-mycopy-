title: 'Watch: Lorry driver trapped in cabin after China bridge collapse - BBC News'
date: '2025-06-24'
section: General
url: http://www.bbc.co.uk/news/videos/c6256qk099wo
content: |-
  Local authorities said the driver was rescued with no injuries after heavy rainfall caused landslides in the region.

  A lorry was left hanging over the edge of a collapsed bridge after heavy rain caused landslides in Guizhou, southwest China, on Tuesday.

  Social media footage captured the moment a witness tried to help the driver trapped inside their cabin. Drone video released by Chinese state media shows the vehicle hanging over a deep chasm below.

  The region has seen "once-in-30-years" rainfall in recent days, Chinese state media reports, which has caused heavy flooding in towns and cities.

  Local authorities said the driver was rescued by the emergency services and was not injured.
