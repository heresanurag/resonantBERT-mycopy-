  The girl says she wanted to punch and slap a teacher but "never wished anyone to be dead".

  Girl who stabbed teacher always had knife at school

  Teachers Liz Hopkin (left) and Fiona Elias (right) were injured at the school on 24 April

  A 14-year-old girl who stabbed two teachers and a pupil said she had taken a knife to school every day since primary school, a court has heard. Teachers Fiona Elias and Liz Hopkin, as well as a pupil at Ysgol Dyffryn Aman in Ammanford, Carmarthenshire, were taken to hospital after being stabbed on 24 April. The girl, who cannot be named due to her age, has admitted the triple stabbing but denies attempted murder. Giving evidence at Swansea Crown Court, she said she was "scared and worried" in school so had taken "blades" or multi-tools in with her since Year 3 or 4.

  The girl, who was 13 at the time, told the court she felt "terrible" about what happened and would "do anything to go back". "It doesn't feel like I did it, to be honest. [I feel] terrible, guilty," she told Caroline Rees KC, defending. She added that she did not intend to kill any of the people who were injured and could not remember large parts of the incident.

