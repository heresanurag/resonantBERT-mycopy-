  She confirmed Ms Elias found a knife in her bag in September 2023 because she "forgot it was there" and was suspended for five days. Her dad subsequently checked her bag daily so she would take knives to school in her pocket, she said. The girl denied saying she wanted to kill Ms Elias before the attacks. "I would say stuff like ‘I want to punch her, or slap her. I never wished by anyone to be dead," she told the court. The teenager said she did not know Ms Hopkin, but had drawn and written about the pupil who was stabbed. She said that followed an incident that made her "angry" a week or two before the attacks, but she told the jury she did not want to physically hurt the pupil. She said she put the multitool in her pocket "as usual" on 24 April and would keep it under her bed or in her clothes so it would be "less suspicious".

  In CCTV footage shown to the court , the girl could be seen sitting around a table with a group of pupils and showing them the above knife

  She said nobody checked her bag that day and she was on her period, causing her to feel "upset or grumpy". She said before the stabbings she carved her name into the floor in the lower school hall, an area she was not allowed to be in. She also told the court she had self harmed in the past.

  Prosecution barrister William Hughes KC then asked the teenager about drawings and phrases found in her notebooks. When asked what she meant by the words "I want to do something humans are supposed to", she said: "Initially I was planning on killing myself." She was then asked what she meant by "why do I want to kill other as much as I want to kill myself?" She replied: "I meant it in more of a psychological term. I feel like I’m hurting others just by existing." She was also asked about the phrase "I feel like I’m going to commit a crime of a lifetime" and said that she was religious and, if she was going to kill herself, then it would be a crime. Drawings and phrases like "burning", "drowning" and "death", which referred to the pupil she stabbed, were an "expression" of how she felt, she told the jury. When asked by Mr Hughes why she continued to take a knife to school she said she "didn’t trust the system, the people". She told the court she did not take the knife to school on 24 April in order to use it on the teachers or the pupil.
