  Woman in court after man killed in dog attack

  Police sealed off the scene of the attack in Stratford on Wednesday

  A woman has appeared in court charged with having a banned pit bull terrier that fatally injured a man in east London. Leanne McDonnell, 32, appeared at Barkingside Magistrates' Court accused of owning or being in charge of the dog that attacked Akif Mustaq on Wednesday morning in Stratford. Mr Mustaq was injured on his neck, windpipe, thumb and thigh and died the following day, prosecutor Ramandeep Mahajan told the court on Friday. Ms McDonnell, from Shirley Road, Stratford, did not enter any pleas and was granted conditional bail to appear at Snaresbrook Crown Court on 6 January.

  The court heard the mother-of-three was friends with Mr Mustaq and the incident took place at her flat. It is alleged that Ms McDonnell failed to ensure the welfare of the dog, named Prince, as it was kept in an "unsuitable environment" with insufficient food and "items and debris" on the floor, according to the charge sheet. She is also accused of having custody of a fighting dog that is banned under the Dangerous Dogs Act 1991. Ms McDonnell is further charged with three counts of owning or being in charge of a dangerously out of control dog without causing injury on 18 November, and the court heard the incidents involved the same dog. Officers were called to Shirley Road at 4:53 GMT on Wednesday after reports that a 42-year-old man had been seriously wounded, the Metropolitan Police said. Mr Mustaq died in hospital and the force said the dog had been seized.
