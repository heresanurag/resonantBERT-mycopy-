  Watch Nomia Iqbal's full interview with the BBC director general on the Gary Lineker crisis.

  Tim Davie, the BBC's director general, says he will not resign over the fallout related to Gary Lineker's removal from Match of the Day.

  In this interview, he is pressed by correspondent Nomia Iqbal on trust in the BBC, accusations of double standards and whether he faced pressure from the government to remove Lineker.
