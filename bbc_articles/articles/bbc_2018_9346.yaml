title: Jeremy Corbyn 'wreath laying' attacked by Israeli PM - BBC News
date: '2018-08-13'
section: UK Politics
url: http://www.bbc.co.uk/news/uk-politics-45170622
content: |-
  The Labour leader says Benjamin Netanyahu's claims about his "actions and words are false".

  This video can not be played To play this video you need to enable JavaScript in your browser.

  Israel's PM has criticised Jeremy Corbyn over his presence at a ceremony said to have honoured the perpetrators of the 1972 Munich terror attack.

  Benjamin Netanyahu said Mr Corbyn deserved "unequivocal condemnation" for laying a wreath on the grave of one of those behind the atrocity.

  Mr Corbyn said Mr Netanyahu's claims about his "actions... are false".

  The Labour leader said he had attended the event in Tunis in 2014 as part of a wider event about the search for peace.

  He hit back at the Israeli prime minister, accusing his government of discriminating against Israel's Palestinian minority.

  Mr Netanyahu had also accused Mr Corbyn of comparing Israel to the Nazis, although a Labour statement reiterated a previous denial of that claim.

  The Israeli leader had commented after the Daily Mail said Mr Corbyn was pictured with a wreath near memorials of the group behind the attack.

