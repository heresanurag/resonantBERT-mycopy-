  Pollock, who is the youngest player in the squad, faces considerable competition to make the Test team, but he has excelled at every level so far in his rise towards the top of the game. "I wasn't certain, but I wouldn't say I needed convincing," said Farrell when asked whether Pollock's barnstorming performance against Leinster at the weekend had clinched his place in the squad. "I like what I see, like all top players, he is always trying to make a difference - there is an energy and bounce about him."

  Farrell has not played Test rugby since the end of the 2023 Rugby World Cup, after which he opted to take a break from England duty

  Owen Farrell could yet become a four-time Lions tourist, with Andy suggesting his son could be a late addition to the squad. He has endured a difficult first season with Racing 92 in Paris - a groin injury hampering him on the pitch and the sacking of former England coach Stuart Lancaster disrupting the set-up off it. However, Farrell's ability to drive standards and cover both fly-half and inside centre could prompt his promotion into the Lions squad. "Owen was in the conversation obviously, an experienced player like that, looking for his fourth tour and with his leadership qualities," said Andy Farrell. "But it got to a point, like with a few others, where he is still trying to find his way back to fitness. "There are 38 picked which leaves a couple of slots open for us down the track, if and when needed. Owen and a few other guys would be in that type of bracket."

  Doris and Itoje faced off before Ireland's win over England in the Six Nations in Dublin earlier this year

  Itoje had been touted as a future England captain ever since leading his country's age-grade side to the under-20s World Cup in 2014. However, it appeared that potential would go unrealised as ex-England coach Eddie Jones questioned whether Itoje was outgoing and vocal enough to own the dressing room, while Owen Farrell filled the role as captain for both England and Saracens. Having succeeded Farrell as Saracens captain in August, Itoje became England skipper in January and is now afforded the ultimate honour of leading the Lions. "I'm deeply honoured, humbled and I will do my best to do the role justice," he said. Doris, who was seen as Itoje's main rival for the job, will miss the trip to have surgery on an injury his club coach Jacques Nienaber described as "quite serious". "As you can imagine, he is devastated," said Andy Farrell on Doris. "He would definitely have been in the mix, such an experienced player and leader. "Sport can be cruel sometimes, but Caelan will be back bigger and stronger."
