title: 'British and Irish Lions squad 2025: Henry Pollock to tour Australia as Owen
  Farrell misses out - BBC Sport'
date: '2025-05-08'
section: British & Irish Lions
url: http://www.bbc.co.uk/sport/rugby-union/articles/c93y5n7zqz8o
content: |-
  Northampton's 20-year-old flanker Henry Pollock is included in a 38-strong British and Irish Lions squad to tour Australia.

  To play this video you need to enable JavaScript in your browser. This video can not be played

  Northampton's 20-year-old forward Henry Pollock will tour Australia with the British and Irish Lions this summer, but former England captain Owen Farrell, the son of head coach Andy, misses out. Pollock's inclusion marks a warp-speed rise to the top of the game. The flanker, who only turned 20 in January, had played only one Premiership game before the start of this season. Farrell, a three-time tourist in the past, has only just returned to fitness with French side Racing 92 but the 33-year-old had aspirations to represent the Lions once more. Elsewhere, Ireland's first-choice fly-half Sam Prendergast misses out with Scotland's Finn Russell and England pair Fin Smith and Marcus Smith preferred as stand-off options. Scrum-half Tomos Williams and flanker Jac Morgan are the only two Wales players included, a low for a Lions tour in the modern era. Ireland captain Caelan Doris, who was a near-certainty to be picked and a captaincy contender, will miss the tour after suffering a shoulder injury in Leinster's Champions Cup semi-final defeat by Northampton last weekend. England skipper Maro Itoje was confirmed as captain of the 38-strong party, completing a late-career rise as a leader.
  • None Toulouse's Blair Kinghorn, the versatile Scotland back, is the only France-based player to be picked.
  • None Centre Sione Tuipulotu and second row Scott Cummings are two of eight Scotland players to be included.
  • None Two-time tourist Jamie George and Wales co-captain Dewi Lake miss out at hooker with Dan Sheehan, Luke Cowan-Dickie and Ronan Kelleher preferred.
  • None England's George Ford, Scotland's Ben White, Tom Jordan and Darcy Graham, and Ireland centre Robbie Henshaw also fail to make the squad.
  • None Leinster have 12 players in the squad, the most of any club side. Ireland are best represented with 15 players, England will supply 13.

  Henry Pollock's name was greeted with loud cheers at the public squad announcement at London's Indigo

  With the Lions squad announcement made in front of a live audience for the first time, it was Pollock's inclusion that generated the most noise from about 2,000 fans inside Indigo, a venue within London's O2 Arena complex. His eye-catching line breaks, dogged breakdown work and confident, abrasive on-pitch persona, complete with pre-planned try celebrations, have made him the breakthrough star of the season. After returning from winning the under-20 Rugby World Cup in South Africa last summer, Pollock has become a key part of Saints' back row, scored two tries on his England debut against Wales in March and run amok in Northampton's run to the Investec Champions Cup final on 24 May. To fit him in among his back-row options, coach Farrell has overlooked Scotland's in-form back row Jamie Ritchie, England's Ben Curry, Toulouse's Englishman Jack Willis and Welsh Lions veteran Taulupe Faletau.

