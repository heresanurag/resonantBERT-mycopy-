title: 'Champions League semi-final: Karim Benzema earns Real Madrid draw against
  Chelsea - BBC Sport'
date: '2021-04-27'
section: General
url: http://www.bbc.co.uk/sport/football/56880436
content: |-
  Chelsea produce a composed performance to secure a draw and put themselves in a promising position after their Champions League semi-final first leg against Real Madrid.

  Last updated on .From the section European Football

  Chelsea produced a composed performance to secure a fully deserved draw and a crucial away goal to put themselves in a promising position after their Champions League semi-final first leg against Real Madrid.

  Thomas Tuchel's side were superior on the night and might even regard themselves as unfortunate not to take an advantage into the return at Stamford Bridge in eight days' time as they set their sights on a final date against either Manchester City or Paris St-Germain in Istanbul on 29 May.

  Chelsea over-ran Madrid in the early stages and should have taken the lead when Timo Werner shot straight at keeper Thibaut Courtois from only six yards - but they were ahead after only 14 minutes when Christian Pulisic kept his cool to steer home a clever finish.

  Real were on the ropes but danger man Karim Benzema, who had glanced the outside of an upright from long range, brought them back into the game with a brilliant equaliser, cushioning the ball with a header before sending an acrobatic volley beyond Edouard Mendy in the 29th minute.

  Chelsea had the better of the second half but could not carve out the chance to score a potentially vital second. Manager Tuchel will still be very satisfied with both the performance and result.
  • None Chelsea will need to show fight in Real Madrid second leg - Thomas Tuchel

  Chelsea's only regret as they left rain-soaked Madrid will be that they did not make their moments of superiority count even more after a performance of quality and discipline.

  Werner was guilty of an awful miss in the opening moments, shooting straight at Courtois with the goal at his mercy, but Chelsea were soon celebrating the brilliance of Pulisic, who showed commendable calm to go around the keeper in a congested penalty before steering a shot between two Real Madrid defenders on the line.

  Chelsea had a brief spell of anxiety around the time when Benzema equalised but they were rarely troubled until the dying seconds when Raphael Varane steered a header wide.

  Tuchel will be happy but he knows this tie is far from over and much work remains to be done against this dangerous Madrid side, who have already proved their enduring ability to get the job done in the Champions League by eliminating Liverpool.

  Chelsea have the edge because of that away goal but Real are masters of these situations and will still travel to Stamford Bridge with confidence for the second leg.

  Chelsea will rightly regard themselves as having a very slight advantage after not only avoiding defeat but also taking an away goal back to Stamford Bridge for the second leg.

  Real Madrid, however, still present a serious threat and they may well be satisfied to have avoided defeat after a desperately slow start in which they could have conceded more than one goal and were grateful for that awful miss by Werner.

  And in a side packed with experience and battle-hardened, streetwise operators who have been down this route before, there will be a steely determination that they can still navigate a way past Chelsea into the final.

  Benzema, at 33, remains the consummate striker and will be the big danger to Chelsea's aspirations of reaching their first final since they beat Bayern Munich in their own Allianz Arena in 2012.

  The French striker was Real's best performer, so has been so often under-rated and in the shadow of the likes of Cristiano Ronaldo. The brilliant strike that pegged Chelsea back was his 71st goal in the Champions League, making him joint-fourth highest scorer in the competition, level with another Real legend Raul and only behind Ronaldo, Lionel Messi and Robert Lewandowski.

  Benzema's class is permanent and he will be a huge threat in the return game at Stamford Bridge.
  • None Chelsea manager Thomas Tuchel has faced Real Madrid more often without losing in the Champions League than against any other opponent (W1 D4) - in the competition's history, he is the only manager to face Los Blancos as many as five times without ever losing.
  • None Chelsea have failed to win any of their eight Champions League semi-final matches played away from home (D5 L3), drawing each of the last five in a row.
  • None Real Madrid have faced Chelsea more often than any other side in all competitions without winning in their entire history, failing in all four matches (D2 L2).
  • None Real Madrid registered just one shot on target versus Chelsea - only versus Paris St-Germain (0) in September 2019 have they had fewer in a Champions League game since 2003-04.
  • None Real Madrid's Karim Benzema scored his 71st goal in the Champions League, making him the joint-fourth top scorer in the competition's history (along with Raúl). Only Cristiano Ronaldo, Lionel Messi and Robert Lewandowski have now scored more than the Frenchman.
  • None Chelsea's Christian Pulisic became the first American player to score in a Champions League semi-final, and one of only four Americans overall to score in the knockout stages of the competition.
  • None Christian Pulisic became the youngest Chelsea player to score in a semi-final match in Champions League history (22 years and 221 days).
  • None Chelsea defender Thiago Silva (36 years and 217 days) became the oldest outfield player to start in a Champions League semi-final since April 2011, when Ryan Giggs (37 years and 148 days) started for Manchester United against Schalke.
