title: Manchester police hunt van driver as girl, 3, dies in tram crash - BBC News
date: '2025-02-22'
section: Manchester
url: http://www.bbc.co.uk/news/articles/c0jg8q433ego
content: |-
  The three-year-old girl has died after being taken to hospital, police say.

  The force confirmed the child was a pedestrian and was not travelling in either the tram or van

  Police are searching for a driver after a three-year-old girl was killed in a crash between a van and a tram in Manchester city centre. Greater Manchester Police (GMP) said the girl, who had been taken to hospital, died from her injuries. After colliding with the tram, the van had been forced onto the pavement where it hit the girl, police said. The van driver fled the scene in Mosley Street and officers said they were following several lines of inquiry to locate him.

  No arrests have been made and inquiries are ongoing, GMP have said

  GMP said the crash was being treated as an isolated incident with no wider threat to the community. "I would like to send my condolences to the family of the victim. This is a tragic incident where a young girl has sadly lost her life despite the responding officer's best attempts to save her," Assistant Chief Constable Stephanie Parker said. "Our investigation is ongoing and we are investigating a number of lines of inquiry." North West Ambulance Service said two air ambulance crews had attended the scene at 09:58 GMT. "Our thoughts are with the family and loved ones of the little girl who sadly passed away," a spokesperson said. "We attended the scene, responding with two ambulances, a rapid response vehicle, two air ambulance crews and several senior clinicians." Transport for Greater Manchester (TfGM) said it was supporting the police with the investigation. A spokesperson said: "All of our thoughts are with her family and loved ones at this incredibly difficult time." Roads were closed and public transport services cancelled following the collision, which happened close to Manchester Art Gallery.

  Manchester City Council said it would make sure the family had its "full support". "All of Manchester is horrified at this shocking crash," a council spokesperson said. "All our thoughts and prayers are with the family and friends of this innocent little girl." No tram services were operating between St Peter's Square and Piccadilly Gardens as a result of the collision, TfGM has said. The network was also experiencing severe delays on most lines. Tickets and passes were being accepted on local bus services and Northern Rail services from Ashton and Manchester Airport to the city centre. The force advised commuters there would be "a lengthy closure of surrounding streets near to St Peter's Square".

