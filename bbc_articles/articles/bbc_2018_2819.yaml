  The film's hero - an affluent child of Reagan's Morning in America - had skipped class.

  Trump's critics argue that he has not learned the lesson of Smoot-Hawley either.

  They warn he risks reigniting the beggar-thy-neighbour trade wars waged amid the ruination of the global economy nine decades ago.

  The multi-billion dollar question is, when and where will Trump's tariff end?

  Or as Ferris Bueller's monotonous teacher would say: "Anyone? Anyone?"
