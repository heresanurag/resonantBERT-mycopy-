content: |-
  Yogita Limaye was reporting from the town of Rodynske when a blast was heard nearby.

  The town of Rodynske in Ukraine's Donetsk region has been the scene of intense Russian drone attacks and is on the front line of the war.

  The BBC's Yogita Limaye was reporting from Rodynske when a Russian drone struck nearby, forcing the journalist and her crew to take cover.

  She was reporting on the latest technological developments in drone warfare in the area, when the attack took place.

  Read more on how fibre optic drones have become the newest threat in the conflict.
