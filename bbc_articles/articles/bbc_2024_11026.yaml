title: 'Broughshane: Connor McNeill dies at scene of crash - BBC News'
date: '2024-05-08'
section: Northern Ireland
url: http://www.bbc.co.uk/news/uk-northern-ireland-68975374
content: |-
  A 41-year-old man dies and two children are treated in hospital after a crash on the Carnlough Road.

  Connor McNeill, who was 41, died in the crash in Broughshane on Tuesday

  A man has died and two children were taken to hospital after a single-vehicle crash in Broughshane, County Antrim. Connor McNeill, who was 41 and from Glenarm, died at the scene of the crash on the Carnlough Road on Tuesday afternoon. He was driving a grey Nissan X-Trail which left the road, police said. They added that two children who were in the vehicle have injuries which are not believed to be life-threatening. The Northern Ireland Ambulance Service said it received a 999 call at 15:25 BST. The air ambulance, two emergency crews and an ambulance officer were all sent to the scene. The two children were brought to the Royal Belfast Hospital for Sick Children where they remain for treatment.

  Members of Mr McNeill's local football club, Carnlough Swifts, have paid a warm tribute to him on social media, saying their community had lost "a good friend, a daddy, a husband, an uncle, a brother and a son". "Connor was a legend with the Swifts and was an integral part of every trophy won in the last 15 years," their Facebook post said. They offered their deepest sympathy to his wife, children and the wider McNeill family. In the aftermath of the crash, Carnlough Road was closed for a number of hours and motorists were diverted via the Hazelbank Road and the Buckna Road. The road reopened overnight and diversions have been lifted. The police have appealed to anyone who was travelling in the area at the time "to review any dashcam footage they may have captured and make contact with the PSNI Collision Investigation Unit".
