title: 'Labour leadership: Barry Gardiner ''considers'' entering race - BBC News'
date: '2020-01-08'
section: UK Politics
url: http://www.bbc.co.uk/news/uk-politics-51041680
content: |-
  The shadow energy minister says colleagues have told him he would bring "dynamism" to the debate.

  Veteran Labour MP Barry Gardiner has said he is considering running for the party's leadership.

  Speaking to the BBC's Victoria Derbyshire, the shadow energy minister said colleagues had told him he could bring "dynamism to the debate".

  Candidates have until 13 January to win the backing of the 22 MPs and MEPs needed to get on the ballot paper.

  On Wednesday, Sir Keir Starmer became the first candidate to pass this threshold, amassing 41 nominations.

  He also won the backing of the UK's largest union Unison, the first union to state a preference.

  The other contenders to succeed leader Jeremy Corbyn are shadow business secretary Rebecca Long Bailey, shadow foreign secretary Emily Thornberry, shadow Treasury minister Clive Lewis, Birmingham Yardley MP Jess Phillips and Wigan MP Lisa Nandy.

  The party's new leader and deputy will be announced on 4 April.

  Mr Gardiner, who is at a climate change conference in Abu Dhabi, has been MP for Brent North since 1997. He has served in Mr Corbyn's frontbench team since 2016.

  He said he would run if he believed he had "the best chance of winning a general election".

  Unite union boss Len McCluskey dismissed claims he had approached Mr Gardiner about running because of his concerns about the chances of Mrs Long Bailey, who is regarded as the standard bearer for the left of the party.

