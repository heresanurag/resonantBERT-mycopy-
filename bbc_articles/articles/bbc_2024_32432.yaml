title: 'Boohoo: Police investigate alleged stalking of executives - BBC News'
date: '2024-12-06'
section: Business
url: http://www.bbc.co.uk/news/articles/c938qzz25xgo
content: |-
  The retailer has also told the information watchdog about surveillance equipment outside its head office.

  Police in Manchester and Kent are investigating claims that current and former executives at the fashion retailer Boohoo have been the victims of stalking and surveillance. Greater Manchester Police said it is looking into allegations "involving serious distress" but no arrests have been made. The Times newspaper reported that alleged stalking offences , externalwere committed against Boohoo's co-founder and executive chair Mahmud Kamani, chief executive Dan Finley and its former boss John Lyttle. A spokesperson for Boohoo said: "It would be inappropriate to comment whilst a police investigation is ongoing."

  The Information Commissioner's Office (IOC) said that Boohoo had informed them of a potential surveillance incident taking place outside the retailer's headquarters in Manchester. "We can confirm that Boohoo Group has made us aware of concerns regarding the discovery of surveillance equipment outside its head office," a spokesperson for the information watchdog said. Greater Manchester Police said: "An investigation is ongoing around stalking involving serious alarm/distress with no arrests made at this stage." Kent Police said it "is investigating reported stalking offences including at locations within the Sevenoaks area". It said: "Enquiries are ongoing and there have been no arrests." Mr Lyttle, who stepped down as Boohoo's chief executive in October after five years in charge, has been approached by the BBC for comment. Mr Lyttle's departure followed Boohoo's announcement that it was considering a major restructure and possible break up of the company, saying the business remained "fundamentally undervalued". Separately, Frasers Group, which is Boohoo's biggest shareholder, has criticised the company's management, its recent results and its business review. In an open letter to other shareholders, Frasers also said it wants to install Mike Ashley on Boohoo's board. In response, Boohoo has said: "Frasers appears intent on disrupting boohoo's business review and acting only in its own commercial self-interest." Mr Ashley is the founder of Sports Direct and has built a retail empire including House of Fraser, Flannels and Evans Cycles which are housed under the Frasers Group parent company. Shareholders will be able to vote on Frasers Group's proposals for Boohoo at an extraordinary general meeting in Manchester on Friday, 20 December.
