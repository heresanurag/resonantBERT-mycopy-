title: 'Glory to Hong Kong: Singing a new protest anthem - BBC News'
date: '2019-09-13'
section: General
url: http://www.bbc.co.uk/news/world-asia-china-49688548
content: |-
  Protesters are staging singalongs of a new protest song - and some say it should be the city's anthem.

  After months of peaceful marches and clashes, Hong Kong protesters have begun staging a different type of demonstration - mass singalongs of a new song called Glory to Hong Kong.

  Some even think it should be replace the Chinese national anthem.

  Interviews and footage by BBC Chinese. Produced by Tessa Wong.
