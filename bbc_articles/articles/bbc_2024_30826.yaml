  Cranston, who received critical acclaim following the show for his performance in crime drama series Breaking Bad, said he was excited to return. Kaczmarek added: "What a delight I get to yell at that kid again! "We're very excited about coming back together and seeing what this family has been up to." A date is yet to be set for when the new episodes will air. Ayo Davis, president of Disney's branded television unit, said she hoped fans would be glad of the show's new run given how relatable it was when it first aired. "Its hilarious and heartfelt portrayal of a lovably chaotic family resonated with audiences of all ages and we're so excited to welcome the original cast back to bring that magic to life again."
