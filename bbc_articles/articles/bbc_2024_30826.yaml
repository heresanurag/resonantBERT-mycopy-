content: |-
  Stars hail a decision by Disney+ to order four new episodes 18 years after the comedy TV show ended.

  Stars hail return of Malcolm in the Middle: 'I get to yell at that kid again!'

  Malcolm in the Middle characters from left to right: Reese (Justin Berfield), Malcolm (Frankie Muniz), Dewey (Erik Per Sullivan), mom Lois (Jane Kaczmarek), dad Hal (Bryan Cranston) and Francis (Christopher Kennedy Masterson)

  Life might be unfair but for Malcolm in the Middle fans things are looking up – the TV sitcom is making a comeback. With familiar shouts of "Malcolm!", actors Bryan Cranston and Jane Kaczmarek introduced a video posted on social media announcing the show's return on Friday. They played the comedically dysfunctional parents of the highly intelligent teenager who first appeared on our screens nearly 25 years ago. The sitcom ended in 2006 after 151 episodes, during which it won several Emmy awards. A Grammy award was also given to the band behind the show's opening theme song Boss of Me, which ends on the lyric "life is unfair".

  Frankie Muniz, who reprises his role as the show's protagonist, said: "I have been waiting for this moment for 18 years. Let's find out where Malcolm and his family are now." Four new episodes have been commissioned by Disney+ with the storyline based on Malcolm and his daughter being drawn back "into the family's chaos when Hal (Cranston) and Lois (Kaczmarek) demand his presence for their 40th wedding anniversary party".

