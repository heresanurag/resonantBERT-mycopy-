  Advice to work from home has been removed in England, as restrictions to tackle Omicron are lifted.

  Classes were suspended at Hong Kong's primary schools last Friday Image caption: Classes were suspended at Hong Kong's primary schools last Friday

  All secondary schools in Hong Kong are to close from Monday because of rising Covid-19 infections, the city's education bureau has said.

  “The epidemic situation is getting severe,” it said, and advises that from next week, schools “flexibly deploy various teaching modes and provide respective support to sustain students’ learning at home”.

  Nursery and primary school classes were already suspended in the city last Friday and Hong Kong has moved to impose new restrictions over the last couple of weeks.

  On 7 Jan, bars and gyms were ordered to closed, and a 6pm restaurant curfew was introduced. Hong Kong has also this month introduced bans on flights from multiple countries, including the UK.

  The government has warned this week of “an imminent threat of both the Delta and Omicron mutant strains spreading in the community” . Sixteen local cases were recorded on Tuesday, two of unknown origins.
