title: 'Cave rescue: The divers who got the Thai boys out - BBC News'
date: '2018-07-11'
section: Asia
url: http://www.bbc.co.uk/news/world-asia-44761821
content: |-
  The mission to rescue the boys in the cave has been a Thai-led but truly international effort.

  Foreign divers, including Ivan Karadzic (2nd left) and Erik Brown (3rd right), were part of the extensive rescue operations

  The rescuers who worked to save the group trapped in a Thai cave were a mix of international divers collaborating with Thai navy Seals.

  The 12 boys and their football coach were first found by British divers but the effort to get them out was a truly global operation.

  Several Thai navy divers took part in the rescue. One ex-navy diver, Saman Gunan, died in the cave last Friday.

  Little information has been released about exactly who was involved and how, largely because most participants have been reluctant to talk.

  It is thought that dozens of divers - Thai and foreign - were part of the efforts. Here are just some of them:

  The last to leave the Tham Luang caves were three divers and a medic - all Thai Navy Seals

  Numerous Thai special forces were part of the rescue efforts. Most notable are a doctor - widely identified as Pak Loharnshoon - and three yet-to-be-named divers who volunteered to stay by the boys' side after they were found underground a week ago.

  Dr Pak is seen applying medicine to a boy's minor wounds in a video shared by the Thai navy Seals Facebook page last week.

  Four Thai Navy Seals personnel were the last to leave the cave on Tuesday evening.

  The Navy Seals unit was led by Rear Admiral Arpakorn Yuukongkaew.

  When divers were still trying to find the boys, he was the one updating reporters on the slow progress being made.

  Rear Adm Arphakorn was in charge of the Navy Seals during their risky operation

  Briton John Volanthen's voice was the first the boys and their coach heard after nine days trapped underground.

  He and fellow British diver Mr Stanton were called in by Thai authorities, along with another British caving expert, Robert Harper.

  The trio arrived in Thailand three days after the football team went missing.

  This video can not be played To play this video you need to enable JavaScript in your browser.

  Mr Volanthen, an IT consultant, and Mr Stanton, a former firefighter, are part of the South and Mid Wales Cave Rescue Team.

  They have participated in a number of cave diving rescue operations, including in Norway, France and Mexico.

  Dr Harris, from Adelaide in Australia, has decades of diving experience. He was the one who examined the boys in the cave and gave the green light so the rescue operation could go ahead.

