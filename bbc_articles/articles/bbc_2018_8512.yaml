  He began diving over a decade ago and co-founded Team Blue Immersion, a technical diving school in Egypt.

  On Tuesday night, he wrote on Facebook that he had done seven diving missions in nine days, which accumulated to 63 hours inside the Tham Luang caves.

  In a picture posted on Facebook, Erik Brown (l), Mikko Paasi (c) and Claus Rasmussen (r) are seen celebrating the completion of the rescue dives
