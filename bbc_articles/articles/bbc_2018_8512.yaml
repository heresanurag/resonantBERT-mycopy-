  Had the boys been too weak, a rescue attempt by diving out would have been too dangerous.

  According to media reports, Dr Harris has taken part in cave diving explorations in Australia, China, Christmas Island and New Zealand. A anaesthetist by training, he has also been specialising in expedition medicine and retrieval operations.

  In 2011, he recovered the body of his friend, experienced cave diver Agnes Milowka, who ran out of air during an extremely difficult expedition in South Australia.

  It is thought that his assistance in the Thai rescue was specifically requested by the British divers.

  Petty Officer Saman Gunan, 38, was a retired Thai navy diver who volunteered in the rescue efforts.

  He lost consciousness on his way out of the Tham Luang cave complex, where he had been delivering air tanks on 6 July.

  This video can not be played To play this video you need to enable JavaScript in your browser. Wife and father remember 'hero' Thai diver: "He loved helping others"

  His dive partner tried to revive him but could not, and his body was brought out of the cave.

  His widow told the BBC: "He's been praised as a hero because of who he was. He loved helping others, doing charity work and getting things done."

  Rear Adm Arphakorn said he would not let PO Gunan's "life be in vain."

  "We will not let the sacrifice of our friend go to waste."

  Belgian Ben Reymenants runs a dive shop in Phuket. He is thought to be part of the group that first found the boys on the Monday.

  Claus Rasmussen is a Danish national who has been living for years in Thailand, working for several different dive schools.

  He is currently an instructor working with Ben Reymenants' company, Blue Label Diving.

  He has been diving across Asia and also worked in several other countries in South East Asia.

  A picture Mr Paasi posted on Facebook, showing Claus Rasmussen in the cave

  Finnish national Mikko Paasi is the founder of a diving centre on the small Thai island of Koh Tao, where he specialises in technical diving.

  That means he focuses on wreck and cave diving.

  On 2 July, the day the boys and their coach were found, Mikko's wife said on Facebook she bought her husband's flight to Chiang Rai to join the rescue efforts on what was their eighth wedding anniversary.

  Mikko Paasi is one of several divers who worked to get the boys to safety

  Ivan Karadzic, a Dane, moved to Koh Tao a few years after Mr Paasi, and they now run the diving centre together.

  He told the BBC about his fear on seeing the first boy and a diver approach him from a distance - not knowing if it was a "casualty or kid" - and then his relief on realising the boy was safe.

  This video can not be played To play this video you need to enable JavaScript in your browser. Rescue diver in Thai cave: "I was very scared"

  On Mr Gunan's death in the run up to the final rescue efforts, Mr Karadzic wrote on his Facebook wall: "Rest in peace. You are a hero and we will never forget your sacrifice."

