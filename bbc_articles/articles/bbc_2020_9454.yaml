title: 'Makeup: The eyes have it for post-lockdown sales - BBC News'
date: '2020-08-19'
section: Business
url: http://www.bbc.co.uk/news/business-53835136
content: |-
  Masks and the ongoing use of video calls means eye makeup is taking a greater share of sales, analysts say.

  Life in a face covering means eye expression needs to make a big impression, prompting a shift in makeup sales.

  Eye makeup has been taking a larger proportion of prestige cosmetics sales during and after lockdown, according to analysts NPD.

  With lips now often hidden behind a mask, makeup sales in that area are taking a lesser share of spending.

  The fashion industry has been affected by homeworking and video conferencing.

  Online retailer Asos recently said sales of make-up and sportswear had been particularly strong as people were stuck at home, it said.

  It also said people were making more "deliberate purchases" rather than ordering and returning several items at a time.

