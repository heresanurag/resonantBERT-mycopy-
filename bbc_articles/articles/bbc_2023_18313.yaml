title: Cumbria hit by snow and ice travel chaos - BBC News
date: '2023-12-03'
section: General
url: http://www.bbc.co.uk/news/uk-67605619
content: |-
  A "major incident" is declared in Cumbria after heavy snowfall, with police urging people not to travel.

  A "major incident" incident has been declared in Cumbria after heavy snowfall, with police urging people not to travel on Sunday unless necessary.

  Drivers in the area told the BBC they had been in stop-start traffic with no food or water for many hours.

  Temperatures have also fallen below freezing in many other parts of the UK.
