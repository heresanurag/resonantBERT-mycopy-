content: |-
  Romain Ntamack and Damian Penaud return to the France line-up for Saturday's Six Nations game against Ireland in Dublin (14:15 GMT).

  Ntamack returns from suspension while Penaud is recalled after being dropped for the Italy game

  Coverage: Listen live on BBC Radio 5 Sports Extra, Radio Ulster & BBC Sounds; text commentary and highlights on BBC Sport website and app; watch on ITV1

  Romain Ntamack and Damian Penaud have returned to the France line-up for Saturday's Six Nations game against Ireland in Dublin. Fly-half Ntamack returns from suspension while Penaud is recalled to the right wing after being left out of the matchday squad for the win over Italy a fortnight ago. Ntamack and Penaud's return means Thomas Ramos switches from out-half to full-back, while Leo Barre and Theo Attissogbe drop out. "[Ntamack] has been training with us throughout the tournament. He's part of the team dynamic," said France head coach Fabien Galthie. "Damian is back in the team because he has undeniable potential and he's ready to play against Ireland." Galthie has again opted to go with seven forwards and just one back on the bench having used the tactic in last month's 73-24 win in Rome. Locks Emmanuel Meafou and Hugo Auradou replace Romain Taofifenua and Alexandre Roumat on the bench, with Maxime Lucu the only player providing backs cover. "The choice of a 7-1 bench is linked to the profiles of the most competitive players we currently have in the French team," added Galthie. "Looking at the performances we've had for a while now, that's what we think is the best way to perform."

  Galthie has named an unchanged pack with back row Gregory Alldritt having shaken off fitness concerns to start. Ntamack renews his half-back partnership with captain Antoine Dupont after serving a two-game ban for his red card in the opening win over Wales. Penaud, who has scored in his last two appearances against Ireland, is one try away from equalling Serge Blanco's record mark of 38. Louis Bielle-Biarrey, the tournament's top scorer with five tries, retains his place on the left wing. Three-in-a-row chasing Ireland lead the standings on 14 points after three games. France are three points behind the holders, so victory for Les Bleus could give them control of the title race heading into the final round of fixtures. "This match has special stakes, we know that and that's what we want," said Galthie. "What's more, it's a match against the best European nation in the last three or four years. "They're a very high-level team, one of the two best nations in the world, if not the best, and they're playing at home. It's true that the challenge is immense. And taking on a huge challenge is what we're looking for."

