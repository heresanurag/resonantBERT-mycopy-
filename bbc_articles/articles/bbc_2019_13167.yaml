  The SNP leader says in an interview she believes an independent Scotland could re-enter the EU relatively quickly.

  Sturgeon 'absolutely certain' own currency not required to join EU

  Challenged on how quickly Scotland could rejoin the EU if Brexit goes ahead and the country votes for independence, Ms Sturgeon says she is “not going to give a specific timescale” but it “could be relatively quick”. But Mr Neil says Scotland’s Growth Commission says it could be five or ten years, as the country would need to establish its own currency. Ms Sturgeon says she is “absolutely certain” that an independent currency would not be a requirement. “We would have a discussion with the EU about the journey" Scotland was on in terms of an independent currency, she says. Mr Neil says Scotland would also be required to build substantial reserves in its new currency and asks how it can do that with the largest deficit in Europe. Ms Sturgeon says Scotland is reducing its deficit faster than expected. “Our task is to get our deficit reducing faster. That is principally through growing our economy faster, which remaining in the EU or returning to the EU helps us to do,” she says.
