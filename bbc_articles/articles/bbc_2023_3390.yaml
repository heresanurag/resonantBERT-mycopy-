title: 'Putin arrest warrant: ICC accuses Russian leader of war crimes - BBC News'
date: '2023-03-17'
section: Europe
url: http://www.bbc.co.uk/news/live/world-europe-64994087
content: |-
  He is accused of forcibly deporting Ukrainian children to Russia - but Moscow says the warrant is meaningless.

  ICC uses very specific offence to directly accuse Putin

  The ICC has the power to charge political leaders with "waging aggressive war" - meaning an unjustified invasion not undertaken in self-defence. But Russia is not a signatory to the court so that's not a route open to its prosecutors. Russia would also use its veto, as it has already done in relation to Ukraine , to stop any attempts at the UN Security Council to grant the ICC new powers in relation to that offence. So some war crime experts had been calling for world leaders to launch an Ukraine war crimes tribunal as another means of charging Russia's leaders. They argued that no other crime but waging aggressive war could be pinned on Putin - meaning the only people who could ever theoretically face court would be his generals and foot soldiers. But the ICC appears to have found a way around this justice gap by dusting off the very specific offence of deporting children. The fact that Russia is not a party to the ICC still means Putin won't be extradited anytime soon but the arrest warrant could leave the president marooned in his own country - unless he wants to voluntarily surrender to The Hague.
