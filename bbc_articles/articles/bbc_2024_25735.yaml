title: 'Brecon: Soldier Christopher Gill dies in military exercise - BBC News'
date: '2024-10-20'
section: Wales
url: http://www.bbc.co.uk/news/articles/cn03drk8n5eo
content: |-
  Cpl Christopher Gill helped train fighters in Afghanistan as well as Ukrainian soldiers in the UK.

  Cpl Christopher Gill was described as a "strong and natural leader" in a MoD tribute.

  Police are investigating the death of a soldier on an Army training exercise. Cpl Christopher Gill, known as "Gilly", died in the Crickhowell area of Powys on 16 October, Dyfed-Powys Police said. The 35-year-old was part of the 4th Battalion, the Ranger Regiment, and was taking part in a "non-operational incident" at the time, the Ministry of Defence (MoD) said. He has been described as a "remarkable Army special operations soldier" who helped train fighters in Afghanistan as well as Ukrainian soldiers in the UK.

  "Our thoughts are with his family and friends at this sad time," said the MoD. Dyfed-Powys Police said it was notified at just after 01:00 BST on Wednesday and a joint investigation with the Health and Safety Executive was under way. The MoD declined to give further details about how the soldier died. Lt Col Charles Bairsto, commanding officer 4th Battalion, the Ranger Regiment, described Cpl Gill as a "strong and natural leader" who was "dedicated to his family". "Cpl Gill's professionalism and commitment to service inspired those around him and left him held in the highest regard," he said.

  He was initially deployed to Helmand Province in Afghanistan where he went on to train "specialist partners". He also served in Belize, the US, Kenya and Morocco and, in 2021, volunteered for Army special operations. Lt Col Charles Bairsto said Cpl Gill was also "quick to volunteer to train Ukrainian soldiers in the UK". "His family have lost a loving and doting father, husband, and son," he said. "His friends and fellow Rangers will miss a much-loved and respected leader. "The Army has lost a professional, capable, and loyal special operations soldier whose contribution to the team made it much stronger than the sum of its parts."

  According to the Army's website, external, its base at Brecon is used by its Infantry Battle School to train officers and soldiers. It provides "command and leadership training, infantry tactics training, weapons training, and live firing range qualifications" as well as providing "specialist training teams to assist foreign forces in their development".
