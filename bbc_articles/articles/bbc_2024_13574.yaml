title: 'Wandsworth Prison: Inquiry into ''inmate and officer sex video'' - BBC News'
date: '2024-06-28'
section: London
url: http://www.bbc.co.uk/news/articles/c047nnjgdp4o
content: |-
  HM Prison Service said a former prison officer had been reported to police over the video.

  The video was reportedly filmed in a cell at HMP Wandsworth

  A prison officer has been reported to police over a social media video allegedly showing a member of staff having sex with an inmate in a jail cell. The Metropolitan Police said it had been made aware of the video reportedly filmed at Wandsworth Prison, in south-west London. The Met said no arrests had been made and added that it was in contact with the Ministry of Justice over the matter. HM Prison Service said "staff corruption is not tolerated and the former prison officer allegedly featured in this video has been reported to the police".

  "It would be inappropriate to comment further while they investigate," the Prison Service added. In May, an "urgent notification" about conditions at HMP Wandsworth was issued by chief inspector of prisons Charlie Taylor. It came after inspectors found Wandsworth was stricken with severe overcrowding, vermin and rising violence among inmates. HM Inspectorate of Prisons has declined to comment due to the pre-election period.
