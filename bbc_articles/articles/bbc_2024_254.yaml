title: Storm Isha and Storm Jocelyn wreak havoc across UK - BBC News
date: '2024-01-24'
section: General
url: http://www.bbc.co.uk/news/uk-68081963
content: |-
  Storm Jocelyn and Storm Isha brought wind speeds of up to 97mph (157km/h) to parts of the UK.

  The UK has been thrashed by two consecutive storms, Storm Isha and Storm Jocelyn.

  Storm Isha first struck on Sunday, killing two people. Heavy rain and strong winds caused power cuts for thousands of homes and disrupted travel.

  Almost immediately after, Storm Jocelyn followed with wind speeds of 97mph (157km/h) being recorded in Capel Curing, north Wales.

  Amber weather warnings were in place across the country, with the last one expiring in Scotland at 08:00 on Wednesday.
