id: bbc_2018_4520
title: Kim Jong-un crosses Korean border for summit - BBC News
date: '2018-04-27'
section: General
url: http://www.bbc.co.uk/news/world-asia-43916858
content: |-
  He is the first North Korean leader to cross the military line into South Korea since the end of the Korean War.

  Kim Jong-un has become the first North Korean leader to cross the military line that divides the Koreas, since the end of the Korean War in 1953.

  He shook hands with South Korean President Moon Jae-in, ahead of their historic summit in the demilitarised zone (DMZ).
