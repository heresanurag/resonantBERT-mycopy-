  The King receives a long standing ovation from parliamentarians in Rome, as he gave a speech on the third day of his state visit to Italy.

  King Charles received a long standing ovation from parliamentarians in Rome, as he gave a speech on the third day of his state visit to Italy.

  "I hope I am not ruining Dante's language to the point I will not be invited back to Italy," he joked, as he delivered some of his speech in Italian.

  The visit also coincided with the King and Queen's 20th wedding anniversary.

  The King paid tribute to Queen Camilla, who was was wearing the same outfit she wore on her wedding day in 2005.
