title: 'Legoland Windsor: Baby who suffered cardiac arrest at theme park dies - BBC
  News'
date: '2024-05-07'
section: Berkshire
url: http://www.bbc.co.uk/news/uk-england-berkshire-68969750
content: |-
  A woman was arrested on suspicion of neglecting a child to cause unnecessary injury, police say.

  The baby suffered a cardiac arrest at the theme park on Thursday

  A five-month-old baby seriously injured in a "neglect incident" at a theme park has died in hospital, police said. The boy was taken to hospital after suffering a cardiac arrest at Legoland Windsor on Thursday and died on Monday. A woman, 27, from Witham, Essex, was arrested on suspicion of neglecting a child to cause unnecessary injury. She was released on bail until 26 July. Police want to speak to anyone who was queueing for the Coastguard HQ ride on Thursday between 11:30 BST and 12:45. Det Con Zoe Eele, from Thames Valley Police's child abuse investigation unit, said: "Firstly, our thoughts are with the family of the boy who sadly died in hospital after suffering a cardiac arrest. We are supporting them as best we can at this extremely difficult time. "We have made an arrest in relation to this incident and are not looking for anyone else as a suspect. "I would ask for the public to please avoid speculation about the incident and to respect the boy's family at this deeply upsetting time." A Legoland Windsor spokesperson said staff were "incredibly saddened to hear this news and our heartfelt condolences go out to all those affected" and they would support police with their investigation. On Sunday, a park spokesperson said its first aid team provided "immediate care until the emergency services arrived". They said the baby was taken from the park in an ambulance for further treatment. "We'd like to thank the emergency services for their swift response, and our guests for their cooperation," they added.

