id: bbc_2024_31345
title: Notting Hill Carnival police feel unsafe, new survey finds - BBC News
date: '2024-12-02'
section: London
url: http://www.bbc.co.uk/news/articles/c5yvk5dk38xo
content: |-
  A survey of 486 officers who work at the event finds 28% have been assaulted and 88% feel unsafe.

  Officers who have worked at the event over the last 10 years described it as "hell" and a "warzone"

  A majority of police officers feel unsafe working at Notting Hill Carnival, a survey by the Metropolitan Police Federation has suggested. As part of the survey, officers who have worked at the event over the last 10 years described it as "hell" and a "warzone". There were more than 350 violent or sexual offences reported at the carnival in August, including the fatal stabbing of young mother Cher Maximen, according to the Met Police, and 61 attacks on officers. However, the carnival's organiser said the survey had an "an anti-carnival agenda" and only represented the views of a minority of the 7,000 officers who work at the event.

  Notting Hill Carnival Ltd said the survey was "hugely flawed" as it returned the views of "at best just 7% of potential officers on duty". In a survey of 486 officers, 89% said they did not feel safe and 29% said they had been assaulted while policing the event. The federation, which represents rank and file officers, said the poll aimed to get "concrete evidence" of the experience of officers. The carnival - a celebration of Caribbean culture - takes place along a three-and-a-half mile (5.6km) route in north Kensington, west London, and has been running for more than 50 years.

  Held over each August bank holiday, the display of costumes, dancing and music attracts about two million revellers. The running of the event has been criticised in recent years over what police call "an unacceptable level of crime", but some supporters of the carnival claim it has been unfairly portrayed. One unnamed officer said it was "dangerous", with officers being treated as "lambs to slaughter", while another said they would "would rather crawl naked through broken glass" than work there.

  About two million people attend the carnival each August bank holiday, to see spectacular displays of dance and costumes

  Simon Hill, deputy general secretary of the Metropolitan Police Federation, said: "I'm actually quite shocked by some of the responses. I knew that the event wasn't popular, for a whole variety of reasons. "But the candour from the officers and some of their descriptions of how they feel, how they felt at the carnival and their experiences of being assaulted, quite frankly were shocking." The federation is also concerned the large scale of the event meant officers felt "powerless" to prevent those attending the event becoming victims of crime, Mr Hill said. "No other event in London has this combination or level of issues for officers." He said officers' concerns about long working hours also emerged from the survey.

  The event organiser said it condemned "all acts of violence" and said the results of the survey were "misleading". "It is quite clearly written with an anti-carnival agenda that the police federation highlights every year. It is driven by unsubstantiated quotes and little solid data, designed to create negative headlines," Notting Hill Carnival Ltd said. A spokesperson added that organisers rely on the collaboration with police and local authorities, but "this continued rhetoric unquestionably has a detrimental effect on the events planning process". The Metropolitan Police's Deputy Assistant Commissioner Matt Ward said: "The views described in the survey reflect many of the long-standing concerns about crowd safety and crime at Notting Hill Carnival. "They also highlight recent positive changes to officer provision which we know we need to continue to build on." He said the force was concerned by "unacceptable levels of crime at the event" and that "step change" was needed in the running of the event to prevent overcrowding.
