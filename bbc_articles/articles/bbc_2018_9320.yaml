title: Chuckle Brothers star Barry's funeral held in Rotherham - BBC News
date: '2018-08-17'
section: Sheffield & South Yorkshire
url: http://www.bbc.co.uk/news/uk-england-south-yorkshire-45219285
content: |-
  Roy Chubby Brown, Linda Nolan and Bernie Clifton were among those attending the service.

  Paul Elliott, right, helped carry the coffin of his brother Barry

  The funeral of Barry Chuckle, one half of the comedy duo the Chuckle Brothers, has been held in Rotherham.

  The 73-year-old entertainer, whose real name was Barry Elliott, starred in ChuckleVision with his brother Paul on the BBC between 1987 and 2009.

  Generations of children watched the accident-prone pair, known for their catchphrase, "To me, to you."

  The service was held at Rotherham United football club, of which Barry was an honorary life president.

  The funeral cortege was greeted by applause and shouts of the brothers' catchphrase by hundreds of fans gathered outside the ground.

  Barry's younger brother Paul was among those who carried the coffin in through the players' entrance.

  Paul had described Barry as his "very best friend", after his death on 5 August following a short illness.

  Famous faces including Roy Chubby Brown, Vicki Michelle, Linda Nolan, Bernie Clifton, Tommy Cannon and Billy Pearce were among those invited inside the stadium.

  Fans applauded as the funeral cortege arrived at the stadium

  Yorkshire comedian Billy Pearce said: "I think Barry would be honoured and elated to see that so many people loved him so much.

  "I think that's the main thing and we will all miss him."

