  Russia has denied asking Beijing for help, with Beijing calling the claim "disinformation".

  Who was Brent Renaud - US journalist killed in Ukraine?

  Brent Renaud, 50, was a journalist and filmmaker and was shot dead in the town of Irpin, outside Kyiv. He had been working in the region at the time of his death. Kyiv's police chief Andriy Nebytov said he had been targeted by Russian soldiers. Two other journalists were injured and taken to hospital. It is the first reported death of a foreign journalist covering the war in Ukraine. Renaud had reported from Afghanistan, Iraq and Haiti. He won a Peabody Award for his work on a 2014 series on Chicago schools, Last Chance High. He often worked alongside his brother, Craig, also a filmmaker. It is not known whether Craig also travelled to Ukraine. Photographs are circulating online showing a press ID for Renaud issued by the New York Times. In a statement, the newspaper said it was "deeply saddened" to hear of Renaud's death but that he had not been working for the newspaper in Ukraine.
