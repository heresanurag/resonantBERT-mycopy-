  To stay prepared for an opportunity, Kego would train relentlessly on his own. "It almost felt like a prison cell," he explains. "You wake up, you train, you see the same surroundings over and over again. Four years, the same thing. "I would wake up, I would see bricks, blocks. It's mad. Going from seeing grass, everything is cut for you, you have got new balls - now I am maybe playing with a flat football, playing with a tennis ball or a golf ball. "It's called the towerblock in my area. Every day I would be running up the stairs, training with my dad. I would even go to the park, on an 11-a-side pitch, I would start passing the ball to imaginary team-mates and then I would go and chase after the ball myself. It wasn't easy, but you have to work with what you have." But it was not just a physical battle. He could eat well and run until the sun came up - and friends say they would get calls at 4am to do just that - but mentally, with no end in sight, the churn was taxing. "When you're not at a team you're getting frustrated because you know your talent, you know that you can do that, that you're a good player, you have played with the best before," says Kego. "Mentally it is killing you." Kego says he went "deep inside my mind". He tried new things - he practises Simran meditation and, as a Christian, studies the Bible and prays. But he also found salvation on the streets, with a ball at his feet. "Street football is what gives you that tempo," he beams. "Short spaces. You have got to think quick. It really helped me. It gave me a lot of confidence. I was like 'you know what, if I can do it in this short space, imagine a bigger space'." Kego built a reputation in cage tournaments and pick-up games, becoming renowned in street football circles and even earning a deal with Puma. "Everyone knew if they wanted to win with style, call him," laughs Gundeep Anand, the founder of street football tournament The Last Stand. It was in one such tournament Kego was spotted by Spanish side UD Ibarra, and suddenly the dream was revived.

  Kego earned a glowing reputation on the street football scene, playing in tournaments such as The Last Stand

  Diego Maradona Jr is the head coach of Spanish side UD Ibarra, who play on the island of Tenerife

  Ibarra, from Tenerife, play in the fifth tier but are pushing for promotion and showing ambition. They recently appointed Diego Maradona Jr as head coach. "He passed the ball to me and I said 'what, wait, [it's like] his dad is passing the ball to me'," Kego remembers of their first meeting on the training pitch. "It's a bit mad. I was watching his dad's YouTube videos and then his son is passing the ball to me. "The way they walk, they have a similar look. It's very motivating." The forward is waiting to make his debut and Maradona Jr is keen to see the youngster kickstart his career in the Canary Islands. "We needed a player like him," he says. "Quick. Good technically, and had some experience in professional teams like Crystal Palace, the Colombian national team. "He can bring speed to the game. A player who can score many goals and who understands the game. "We hope he can bring a different mentality that we are trying to change with the team and the club." Kego describes joining Ibarra as "relief". Now, he says, "it's time to shine". "I was buzzing, excited, very emotional as well," he adds. "All these years of work, I would never have thought I would make it pro at 22. If I'm honest, I said let me just dedicate myself to playing street football." That is one dream accomplished, but what comes next? "I always think big," he smiles. "Short term is smash it here, do my best, focus and try and get many goals and get the club promotion. "Longer term... I want to be the best player in the world one day."
