title: Starmer says rioters can expect rapid sentencing - BBC News
date: '2024-08-07'
section: England
url: http://www.bbc.co.uk/news/articles/c2kjdjylnqyo
content: |-
  Teenager James Nelson is thought to be the first person to be jailed for their part in the disorder.

  This video can not be played To play this video you need to enable JavaScript in your browser. Keir Starmer: 'We are able to cope with this disorder'

  The prime minister has said those caught being involved in riots across England and Northern Ireland can expect to be rapidly processed through the courts. After chairing his second emergency co-ordination meeting with police chiefs in as many days, Sir Keir Starmer emerged to say he was now expecting “substantive sentencing” of rioters within days. James Nelson, 18, of Bolton, is thought to be the first person to be jailed for their part in the disorder. He was convicted of causing criminal damage in the town and given a two-month prison sentence. It is understood there are at least 30 potential gatherings planned for Wednesday that police are aware of but they believe the situation is "manageable".

  The unrest began last week following the fatal stabbing of three young girls in Southport. Violent scenes in towns and cities around the country followed - fuelled by misinformation on social media, the far-right and anti-immigration sentiment. On Wednesday, nearly 6,000 public order officers are being mobilised to respond to any disorder in the coming days, according to police sources. The Metropolitan Police said it was "aware" of events planned in parts of London on Wednesday and would "use every power, tactic and tool available to prevent further scenes of disorder". In Northern Ireland on Tuesday evening, a young boy was left with minor facial injuries after an attack in west Belfast which police are treating as a hate crime. More than 400 arrests have been made so far after days of disorder in various UK towns and cities following the killing of three girls in Southport - fuelled by misinformation spread online that the suspect was an asylum seeker. Inquests are to be opened later at Bootle Town Hall, Merseyside, into the deaths of Bebe King, six, Alice Dasilva Aguiar, nine, and Elsie Dot Stancombe, seven. Around 100 people have already been charged in connection with the recent disturbances in parts of England and Northern Ireland.

  James Nelson, 18, of Victoria Road, Horwich, Bolton, is thought to be the first person to receive a prison sentence over the rioting

  On Tuesday night, charges continued to be brought by police forces with defendants expected in court on Wednesday. Merseyside Police said two 38-year-old men had been charged with violent disorder in connection with unrest in Southport and Liverpool. Nigel Farage, leader of the opposition Reform UK party, has gone on social media to say he does not support "street protests, violence or thuggery in any way". Sir Keir praised the "robust and swift response" of the criminal justice system, adding he expected sentencing of some of those involved to take place by the end of the week. Speaking to reporters after chairing his second Cobra meeting in two days, the prime minister said: "That should send a very powerful message to anybody involved, either directly or online, that you are likely to be dealt with within a week. "Nobody, but nobody, should be involved themselves in this disorder." Communities Minister Jim McMahon stressed those breaking the law would face consequences whether they were acting on the streets or online, during an interview with BBC R4's Today programme on Wednesday morning.

  This video can not be played To play this video you need to enable JavaScript in your browser. Seven days of disorder - how the UK's far-right riots spread

  Earlier the director of public prosecutions, Stephen Parkinson, told the BBC prosecutors were considering terrorism offences for some suspects. He also said his teams would consider seeking the extradition of social media influencers allegedly playing a role in the disorder from abroad. Businesses across the country have been impacted by the unrest. On Wednesday, the British Retail Consortium (BRC) will co-ordinate a meeting to respond to the riots, which have damaged outlets and sparked safety concerns for staff and customers. Footfall is down by about 20% in some city centres like Manchester and Nottingham, BRC Chief Executive Helen Dickinson told BBC R4's Today Programme on Wednesday. Discussing the financial toll of the riots on retail, Ms Dickinson said: "It’s really too early to know, because obviously we are not out of the woods yet.”

  Separately, Jordan Parlour, 28, from Leeds, appeared before magistrates to indicate a guilty plea to a charge of using threatening words or behaviour intending to stir up racial hatred, the Crown Prosecution Service (CPS) said. The CPS said the charge related to a series of Facebook posts made by Parlour in connection with disorder in Leeds on 3 August about attacking a hotel where asylum seekers were housed. He has been remanded in custody until a sentencing hearing on Friday. The government also said on Tuesday said it would make more than 500 new prison places available to ensure those taking part in the violence could be jailed.

