id: bbc_2018_2380
title: Flames engulf highway in China after gas tanker overturns - BBC News
date: '2018-02-12'
section: General
url: http://www.bbc.co.uk/news/world-asia-china-43030411
content: |-
  Dashcam footage captures gas from an overturned tanker igniting, seriously injuring two people.

  Dashcam footage has captured the moment a Chinese highway was engulfed by flames, after liquefied natural gas from an overturned tanker caught fire in Hebei province.

  Two people were seriously injured.
