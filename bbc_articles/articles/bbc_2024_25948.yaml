content: |-
  Alessia Russo is named England women's player of the year for 2023-24.

  Alessia Russo, 25, scored three goals in England's Euro 2025 qualification campaign

  Alessia Russo has been named England women's player of the year for 2023-24. The Arsenal forward started 11 England games and scored six goals in a year in which the Lionesses secured a place at next summer's Euros in Switzerland. Fellow forward Lauren James finished second in the vote by fans, while defender Lucy Bronze came third. Goalkeeper Mary Earps won last year's award after helping England reach the World Cup final. England face Germany at Wembley in their next game on Friday (19:30 BST) in their first meeting since the Lionesses' triumph at the Euro 2022 final. Sarina Wiegman's side also face South Africa in a friendly on Tuesday, 29 October in Coventry (19:45 GMT).

  Russo becomes the fourth Arsenal player to win the award in the past decade, while Ellen White and Lucy Bronze have both won it twice in that time.
