content: |-
  Fans of Liam Payne say his death will hit his childhood home of Wolverhampton "hard".

  This video can not be played To play this video you need to enable JavaScript in your browser. Listen on BBC Sounds: John Carpenter from Wolverhampton used to go to school with Liam Payne

  People in Wolverhampton have expressed their grief and shock after the death of Liam Payne, who grew up in the city. The 31-year-old died on Wednesday after falling from the third floor of a hotel balcony in Buenos Aires, Argentina. John Carpenter, a secondary school friend of Liam's, said he was “absolutely shocked and heartbroken” at the news. “Liam was always a very confident and determined individual, he would never give up on anything," he said.

  Liam Payne was born in Bushbury, Wolverhampton, and went on to study at the City of Wolverhampton College

  Mr Carpenter first met Liam in 2004 at St Peter’s Collegiate Academy in Wolverhampton where they were both athletes. While there, Mr Carpenter said his friend had lots of intense auditions and was "absolutely mobbed by everyone". "My last ever words to him were ‘Liam I know you’re going to get a lot of money from this, I know you’re going to get a lot of fame from this and I wish you absolutely the very best, but please don’t lose your head'," he said. "That was the last time I saw him in person, just before the X Factor finals." The school said in a statement that "Liam was not only well-liked by his peers and teachers but also recognised for his talents". "He made a positive impact on our school community and his contributions will be remembered," a spokesperson added.

  Hairdressers Royston Blythe and Nick Malenko said Liam visited their salon when he was 14 years old

  Former celebrity hairdressers Royston Blythe and Nick Malenko fondly remembered Liam visiting their salon in Wolverhampton after school to get his hair done when he was about 14 years old. Mr Blythe said Liam's hair was always quite wavy and he would want it straightened every day. "I gave him a pair of straighteners, because he wouldn't have been able to afford to buy them," he said. Mr Blythe said Liam was already singing at that age and in the months leading up to his appearance on X Factor, he would often sing at charity functions. "I knew he was going to be a star one day, always knew it, because he had so much passion for singing," Mr Blythe said. "He was always so confident but never cocky. He would go on and talk naturally. He was just a lovely lad." Mr Malenko said they were both left in "complete shock" at the news of his death. "You don't expect anyone so young to go so quickly," he added. He said people in Wolverhampton could relate to him because he was from the area and would visit regularly. "He was an inspiration to a lot of young people thinking 'if he could do it, maybe we could'. It was fantastic to see that he did so well," Mr Malenko added.

  This video can not be played To play this video you need to enable JavaScript in your browser. People in Wolverhampton react to the death of Liam Payne

  The One Direction star, who was born in Bushbury in the city, was always proud of his roots. He announced the birth of his son Bear in 2017 with singer Cheryl and said that he "constantly inspired" him to be a better person. Wolverhampton resident Sunita Mistry told BBC Radio WM that Liam's death would hit the city "hard". "It's a big loss and it's a shame that he didn't get help when he should have," she said. Liam turned to alcohol after One Direction went on "hiatus" in 2016 and had suffered health troubles in recent years. Ms Mistry added she felt for his parents, Cheryl Cole and his son even if "she didn't know them on a personal basis".

  Tiegan Moseley said she was "heartbroken" by the news

  Tiegan Moseley, 19, said that she was "heartbroken" after spotting the news on Facebook this morning. Her childhood was filled with artists like Liam Payne and her thoughts were with his family, she added.

  Actress and singer Beverley Knight, also from Wolverhampton, said she was "stunned at the news of Liam’s tragic and untimely death". "I know this sense of utter shock is felt by millions around the world right now," she said. "I always kept my eye on what my fellow Wolverhamptoners (sic) in the spotlight were doing and felt immense pride that a young lad from my town had become a worldwide star, a member of one of the best selling boy bands of all time." Ms Knight added her "heart is shattered for his parents Karen and Geoff and his son whose future memories have been snatched away".

  One Direction (Liam Payne is second from the right) rose to international fame despite coming third on the TV show X Factor

  Kerri Dunn, from Dudley, said she knew Liam through his time at a stage school named Pink Productions and supported him when he went onto X Factor. "He couldn't dance very well but he could definitely sing, he was a really talented lad," she said. "He was a bit of a joker in dance rehearsals, he was a normal lad you wouldn't think he was globally famous" she added.

  Kerri Dunn described Liam as a "really talented lad" who was a "bit of a joker"

  City of Wolverhampton College principal Louise Fall said the college was "sorry to hear the news about former student Liam Payne". "[We] wish to extend our sympathies to his family and friends at this very sad time,” she added.

