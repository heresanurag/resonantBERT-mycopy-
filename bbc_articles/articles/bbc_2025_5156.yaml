  At least one person has died and more than 80 buildings have been damaged in the blaze.

  Thousands evacuated as Japan's biggest fire in decades continues to burn

  This video can not be played To play this video you need to enable JavaScript in your browser.

  Japan has deployed more than 2,000 firefighters to battle the country's biggest forest fire in three decades. At least one person has died in the blaze, which has torched more than 5,200 acres around the northern Japanese city of Ofunato since Thursday, according to the Fire and Disaster Management Agency (FDMA). Although January to March is typically Ofunato's driest season, the area saw less rainfall last month than any February in more than 20 years - recording just 2.5 millimetres, compared to the usual average of 41. About 4,600 people remain under government-issued evacuation orders as the fire continues to burn.

  Some 2,000 have already left the area to stay with friends or relatives, and more than 1,200 have evacuated to shelters, officials said. The fires are burning in a forest area of Iwate Prefecture, which is Japan's second largest prefecture and has the country's second-lowest population density. More than 80 buildings are estimated to have been damaged so far, although FDMA noted that details are still being assessed. "Although it is inevitable that the fire will spread to some extent, we will take all possible measures to ensure there will be no impact on people's homes," Prime Minister Shigeru Ishiba said in parliament. Thousands of firefighters from 14 prefectures, including Tokyo, have been dispatched to fight the fires. At least 16 helicopters are also being used, with images showing the aircraft dumping water onto the smouldering hills. Like many other countries, Japan in 2024 recorded its hottest year since records began. It is difficult to know if climate change has caused or worsened specific fires, because other factors - such as changes to the way land is used - are also relevant. However, the IPCC says, external climate change is making the weather conditions needed for wildfires to spread more likely. Have you been evacuated? Send us your story.

