title: Coronavirus in Scotland - Racism protests & no new deaths - BBC News
date: '2020-06-07'
section: Scotland
url: http://www.bbc.co.uk/news/live/uk-scotland-52917414
content: |-
  Thousands of people gather at a number of demonstrations, despite ministers urging people to avoid mass gatherings.

  Three airlines have written to the UK government to protest against its "wholly unjustified and disproportionate" quarantine rules due to come into force from Monday.

  Almost all arrivals in the UK will be required to self-isolate for 14 days and give details of their accommodation, measures that airlines fear will stop people wanting to come to the UK.

  Scotland's justice secretary, Humza Yousaf, today announced penalties for non compliance north of the border.

  The message from British Airways, Ryanair and easyJet is described as a "pre-action protocol letter," meaning it could be followed by legal action.

  The airlines say the measures are harsher than those imposed on people confirmed to have coronavirus who are asked to isolate and do not face criminal sanctions for failing to do so.
