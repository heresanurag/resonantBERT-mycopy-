  The new president warned it could take months to turn things around.

  Biden invited Taiwan's envoy to his inauguration - what does it mean?

  Biden’s inauguration was marked by many historic “firsts”, and one of them could be a sign of potential future clashes between Beijing and Washington. Bi-khim Hsiao, Taiwan’s top envoy to the US, was formally invited to the inauguration - the first time this has happened in more than four decades. A video shared on her social media shows her standing in front of the US Capitol ahead of the inauguration ceremony. “Democracy is our common language and freedom is our common objective,” Taiwan’s de facto ambassador to the US said. China views the self-ruled island as part of its territory that it will eventually retake, by force if necessary. And the status of Taiwan has long been a thorny issue in US-China relations, as the US is by far Taiwan’s most important friend. Hsiao’s presence at the inauguration signals the US may continue to demonstrate strong support for Taiwan, despite the fact that many Taiwanese people are concerned that Biden will take a less confrontational stance towards Beijing compared with Trump. By contrast, it’s unclear whether China’s ambassador to the US, Cui Tiankai, attended Biden’s inauguration. Earlier today, China’s foreign ministry spokeswoman Hua Chunying said Cui had been invited, but did not confirm whether he was present in the ceremony. Hua reiterated China’s position of opposing official interactions between Taiwan and the US. It’s a long-running unspoken rule that Beijing and Taipei’s top diplomats in Washington do not attend the same event, because sharing a stage could be seen as Beijing acknowledging Taiwan as an independent sovereign country.
