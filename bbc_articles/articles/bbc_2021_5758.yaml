title: 'New Zealand: At least four injured in supermarket stabbing - BBC News'
date: '2021-05-10'
section: Asia
url: http://www.bbc.co.uk/news/world-asia-57053265
content: |-
  The motive behind the attack is unclear but there is no indication it was a domestic terror event.

  A police car blocking an entrance to the Dunedin Central Countdown, where the stabbing took place

  Four people have been injured, three of whom are now in a critical condition, after a stabbing attack at a New Zealand supermarket.

  The stabbing took place at a Countdown store in the city of Dunedin on the South Island.

  Bystanders tackled the attacker, who was then arrested.

  Prime Minister Jacinda Ardern said the motive was not clear but that there was no indication it was a domestic terror event.

  He said it was "nothing short of heroic" that shoppers and staff had stopped the attacker.

  Incidents of mass violence are rare in New Zealand but the country saw the 2019 Christchurch shooting when a white supremacist killed more than 50 people at two mosques.

  Local media reports say the four injured on Monday are made up of both supermarket employees and customers.

  Police said the suspect sustained a minor injury and was receiving medical attention under police guard. He has not not yet been charged.

  The names of the victims and the suspect have not been made public.

  Witnesses described chaotic scenes at the supermarket as the attack unfolded.

  "We just heard a scream and thought someone must've fallen, but it got louder and louder and more people were screaming," an unnamed woman told the Otago Daily Times.

  "I saw one red hand among the people; a bloody hand, and everybody started running towards the exits."

