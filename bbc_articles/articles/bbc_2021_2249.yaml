  Court documents said Ms Coronel Aispuro was allegedly involved in planning another prison escape for her husband before he was extradited to the US in January 2017.

  She has not commented on the charges.

  Mexican President Andrés Manuel López Obrador said the arrest was "a matter that the United States will decide" but added that he hoped the US would share more of the details.

  Ms Coronel Aispuro is a dual US-Mexico citizen, a former beauty pageant winner and journalism student, and the mother of twins with Guzmán. According to previous interviews gave to US media, she first met Guzmán at a dance when she was 17 and he was 49.

  She attended nearly every day of her husband's three-month trial in New York, during which she heard not only grim accounts of murder and rape, but also claims he had spied on her and other mistresses.

  She came under the media spotlight during that trial. In one instance, she appeared to laugh during the tearful testimony of one of Guzmán's mistresses. On another day she and Guzmán wore similar velvet jackets, which many people interpreted as a show of solidarity.

  She remained supportive of Guzmán throughout, saying at the end of the trial: "I don't know my husband as the person they are trying to show him as, but rather I admire him as the human being that I met, and the one that I married."

  Guzmán came from a poor family in Sinaloa state, north-west Mexico. His organised crime business grew so big that he entered Forbes' 2009 list of the world's richest men at number 701, with an estimated worth of $1bn (£709m).
