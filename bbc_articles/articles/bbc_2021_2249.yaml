title: El Chapo's wife Emma Coronel Aispuro arrested in US over 'drug trafficking'
  - BBC News
date: '2021-02-23'
section: US & Canada
url: http://www.bbc.co.uk/news/world-us-canada-56163400
content: |-
  Emma Coronel Aispuro's arrest comes two years after her husband was convicted in the US over his cartel.

  Emma Coronel Aispuro stayed loyal to her husband, attending nearly every day of his trial in 2019

  The wife of jailed Mexican drug lord Joaquín "El Chapo" Guzmán has been arrested in the US on suspicion of drug trafficking, US authorities say.

  Emma Coronel Aispuro, 31, was detained at Dulles International Airport outside Washington DC.

  She is charged with participating in a conspiracy to distribute heroin, cocaine, methamphetamine and marijuana.

  Guzmán is currently serving a life sentence in Colorado for drug trafficking and money laundering.

  The 63-year-old is a former head of the Sinaloa cartel, which officials say was the biggest supplier of drugs to the US.

  His trial in 2019 heard shocking revelations about his life, from drugging and raping girls as young as 13 to carrying out the cold-blooded murders of former cartel members and rivals.

  Ms Coronel Aispuro appeared via video link before a federal judge at a court in Washington DC on Tuesday and was ordered to remain in detention for the time being.

  Emma Coronel Aispuro appeared during a virtual hearing at a federal court in Washington DC on Tuesday

  Prosecutor Anthony Nardozzi said Ms Coronel Aispuro had "worked closely" with members of the Sinaloa cartel and had possessed the "financial means to generate a serious risk of flight".

  As well as facing drug trafficking charges, she is also accused of conspiring with others to help her husband escape from prison in Mexico in 2015.

  He was sprung from Mexico's maximum-security Altiplano prison after his sons bought a property near the prison and a GPS watch smuggled into the prison gave diggers his exact location. He escaped by riding a specially adapted small motorcycle through the tunnel.

