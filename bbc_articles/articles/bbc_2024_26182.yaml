  Crisis-hit Caley Thistle to announce fate of players and staff

  A press conference with administrators BDO will outline the next steps for the club

  Players and staff at Inverness Caledonian Thistle are expected to learn about their future at the club later. The Highland side, which has sacked manager Duncan Ferguson, is fighting for survival after entering administration due to a financial crisis. An afternoon press conference has been called with administrators BDO, where they are due to outline the next steps for the club. BDO said it was working to secure Caley Thistle's "long term future".

  The club announced on Wednesday that former Rangers and Scotland striker Ferguson, assistant manager Gary Bollan and goalkeeping coach Stuart Garden had left with "immediate effect". It said in a statement: "The club would like to place on record our thanks to Duncan, Gary and Stuart for their efforts and wish them the very best in the future. "Scott Kellacher, first team coach, is stepping up to take over as first team head coach."

  Manager Duncan Ferguson was sacked by the club on Wednesday

  Ferguson, who had been working for free, said he had always "done the very best" for the club and players. He joined Inverness last September after the sacking of Billy Dodds, with the club sitting bottom of the Championship at the time. He described the process of administration as “brutal”, but said that he had enjoyed his time with the team. Administrators are attempting to find new owners to rescue the club. If that fails, assets could be sold and the money raised distributed to creditors.

  Inverness have had 15 points deducted as a result of administration, meaning they face potential relegation from League 1. They now sit bottom, on -3 points. Regardless of what division they are in next season, they will start on -5 points. Investor Alan Savage, a former club chairman, told BBC Scotland News he would give it his "best shot" to help save the club. He pledged to help anyone who lost their job to find a new one. Asked about his own potential role at the club if it survives administration, he said: "It’s a step by step process and until we’ve gone through those steps it’s a bit early to say.”
