id: bbc_2025_5667
title: Sister pays tribute to 'kind' boy killed on Glasgow street - BBC News
date: '2025-03-07'
section: Glasgow & West Scotland
url: http://www.bbc.co.uk/news/articles/ceqjy38jp1qo
content: |-
  Amen Teklay's sister told the BBC her brother had hoped to become a basketball player, a doctor or an engineer.

  Amen Teklay died at the scene of the incident in Glasgow

  A teenager has paid tribute to her "kind and bright" brother who died in a violent incident in Glasgow. Police launched a murder investigation after 15-year-old Amen Teklay was found seriously injured on Clarendon Street, in the city's St George's Cross area, at around 22:30 on Wednesday. Emergency services attended but he was pronounced dead at the scene. Police Scotland said the killing was an isolated incident and detectives were keeping an "open mind" to all motives. Delina Teklay, 17, told BBC Scotland News that Amen was "not just my brother, he was my best friend".

  It is understood that Amen, who is originally from Eritrea, lived with his father in Glasgow and had recently been granted 'right to remain' status in the UK. His sister said he had lived in the city for about eight years.

  Flowers were laid at the scene on Clarendon Street

  Delina called the teenager a "really sweet person, so kind and so bright". "He was the one I could go and talk to about anything," she added. "We grew up together so we were very close. "This was very unexpected and shocking for us. I just think this is a dream and I'm going to wake up tomorrow. I'm still in denial. "My dad is devastated, he's not eating at all or drinking anything. We're all devastated, it's shocking." She said Amen had hopes of gaining UK citizenship and becoming either a basketball player, a doctor or an engineer.

  A police cordon was set up around Clarendon Street for police investigations

  Police Scotland said it had launched a major investigation that was "fast moving and at the very early stages". Amen attended St Thomas Aquinas secondary school in Jordanhill. Headteacher Claire McInally said his death was a "shock to the school community". She added: "Amen was a friendly and much loved young man who was really interested in music and the media. "He was bright and showed great promise." Jamie O'Neill, Amen's support worker at Kingsway Community Connections, said he had felt "extreme grief" since he was told about his death. "We've lost Amen and we've seen how it's affecting his family," he told BBC Scotland. "We're trying to be strong for them and do our duty to help. "We have to try and support the young people who knew him and looked up to him who need a space to grieve and come to terms with what's happened."

  He said Amen was a "cool and laid back" boy who was "a bit cheeky at times, but knew his boundaries". The support worker told BBC Scotland that Amen was seen as an "older brother" to younger people in the group. Mr O'Neill said he had been worried about Amen recently, but the local area was "relatively calm and safe" for young people. He added: "Amen did hang about in other parts of Glasgow at times so that would be my concern. "I know this area well and you know everyone's faces here, but if you're leaving this area I would have concerns."

  Amen was part of youth organisations in Glasgow

  JATV Goals Youth Group, which offers film training for young people at boxing events, also paid tribute to the teenager who was part of the group. It said in a statement: "His life was tragically taken from us by the type of violence boxing does so well to combat. "Our community is heartbroken as we come to terms with the loss of a young boy who had his full life ahead of him." Police Scotland's Det Supt Cheryl Kelly said officers were reviewing CCTV and would be carrying out door-to-door inquiries. She said: "Our thoughts are with Amen's family and friends at this distressing time. We will continue to provide specialist support for them. "We are still keen to speak to anyone who was in the area at the time and anyone who has dash cam, CCTV or doorbell footage around the time of the incident." Det Supt Kelly said "answers lie with the local community", and urged anyone with information to contact Police Scotland via a major investigations public portal, external.
