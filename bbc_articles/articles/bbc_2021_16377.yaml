title: Kentucky weatherman films tornado 'ground zero' - BBC News
date: '2021-12-12'
section: General
url: http://www.bbc.co.uk/news/59623945
content: |-
  Meteorologist Noah Bergren shows the BBC the "utter devastation" of the tornadoes in the town of Mayfield.

  The governor of the US state of Kentucky has said that more than 70 people were killed by tornadoes on Friday night.

  Meteorologist Noah Bergren filmed the "utter devastation" of the tornadoes in the town of Mayfield and spoke to the BBC about what he saw.

  More on this story: Desperate search for survivors in tornado-hit US
