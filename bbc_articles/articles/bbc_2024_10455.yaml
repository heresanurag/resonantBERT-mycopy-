title: ICC's Karim Khan announces arrest warrant application for Israeli and Hamas
  leaders - BBC News
date: '2024-05-20'
section: General
url: http://www.bbc.co.uk/news/world-middle-east-69037324
content: |-
  The leaders are wanted for alleged war crimes in the 7 October attacks and following war.

  The chief prosecutor of the International Criminal Court has announced he has applied for arrest warrants for Israeli Prime Minister Benjamin Netanyahu and Hamas's leader in Gaza for war crimes.

  Karim Khan KC said there were reasonable grounds to believe that both men bore criminal responsibility for war crimes and crimes against humanity from at least 7 October 2023.

  Read more here: ICC prosecutor seeks arrest warrants for Netanyahu and Hamas leaders - BBC News
