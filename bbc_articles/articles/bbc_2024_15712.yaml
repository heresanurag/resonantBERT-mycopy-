title: Grandmother, 72, to test new rollercoasters at Alton Towers - BBC News
date: '2024-07-19'
section: England
url: http://www.bbc.co.uk/news/articles/cd10ygy592vo
content: |-
  The former paratrooper has been given the role of testing rollercoaster rides at Alton Towers Resort.

  The grandmother of four will be responsible for testing rollercoaster rides

  A 72-year-old woman said she is “honoured” to have been given the role of testing rollercoaster rides at Alton Towers Resort. Jackie Smith, who lives near Stonehenge in Wiltshire, will be known as the theme park's first chief thrillseeker. In 1971 when she was 19, Ms Smith became the first woman to join the Parachute Regiment, the Red Devils. She was the first woman to receive its prestigious red beret just two years later. In her new role, lasting 12 months, the grandmother of four will be responsible for attending the theme park’s biannual Thrillseeker Summit and testing rides.

  “It’s my absolute honour to be appointed Alton Towers’ first chief thrillseeker,” she said. “I can’t wait to bring my expertise from a lifetime of adventure to help ensure they continue to set new standards. “My first time on the iconic Nemesis Reborn definitely met my high standards for thrills – it felt like my first jump all over again." Ms Smith, who has completed 5,000 parachute jumps, said she had to convince her commanding officer in the Parachute Regiment to allow her to try parachuting, which was “forbidden” for women at the time.

  “My first time on the iconic Nemesis Reborn definitely met my high standards for thrills," Ms Smith said

  “At 19 years old I was stationed in Aldershot which was the home of the Parachute Regiment,” she explained. “I saw the guys training and something just clicked in me. I pestered my commanding officer to let me take basic training. “At the time the top brass wouldn’t let women jump because they were worried they would flash their knickers on the way down. “It was absolutely ridiculous. Eventually my persistence paid off and I was allowed to take basic training and I never looked back.” Ms Smith has also taken part in base-jumping off El Capitan, in America's Yosemite National Park, and opened the 1986 Commonwealth Games while four months pregnant. Bianca Sammut, divisional director at Alton Towers Resort, in Staffordshire, said she was “excited” to welcome “a true female trailblazer” to the theme park. “We’re so excited to welcome the inspirational Jackie to our team. Her seven decades of thrills expertise is sure to elevate our attractions at Alton Towers,” she said. “Jackie, a true female trailblazer, shows that you’re never too old for thrills."
