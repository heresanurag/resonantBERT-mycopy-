content: |-
  The prime minister defends the "pingdemic" after the food industry warned supplies could be hit.

  Nearly a quarter of Taiwan's population have reportedly received one vaccine dose Image caption: Nearly a quarter of Taiwan's population have reportedly received one vaccine dose

  In the last 24 hours, Taiwan has confirmed 16 new local cases and five further deaths. It has now been five days that Taiwan has recorded fewer than 20 local cases.

  Covid-19 restrictions are set to end on Monday, so in the next couple of days, the Central Epidemic Command Centre will decide whether or not to relax indoor and outdoor gathering limits, after two months of near lockdown.

  Currently, five people are allowed to gather indoors, and 10 outdoors.

  Since 20 May, all of Taiwan has been in Level 3 restrictions. This is where all but essential businesses are closed, and mask-wearing is mandatory. Recently, as cases have eased, some sports and entertainment venues have been allowed to reopen.

  Vaccination is escalating in Taiwan, so the hope is that this recent, severe wave of Covid-19 will be the last. Local media report that 23.5% of Taiwan’s 23.5m population have now had one dose of either AstraZeneca and Moderna.

  There are warnings, however, that some vaccinations may have to be postponed in the coming days, due to multiple typhoon warnings.

  Thanks to early border closures and strict regulations, Taiwan has kept cases relatively low throughout the pandemic. According to Johns Hopkins University it has recorded 15,453 cases and 773 deaths.
