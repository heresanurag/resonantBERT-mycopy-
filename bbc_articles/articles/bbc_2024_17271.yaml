  Earlier, Daniel Wiffen became the first athlete from Northern Ireland to win an Olympic gold medal in 36 years with victory in the 800m freestyle for Team Ireland. Home favourite Leon Marchand qualified for both the 200m breaststroke and 200m butterfly finals as he looks to add to his 400m medley gold. Both finals take place on Wednesday evening in what could be an epic session of swimming. Australia's Kaylee McKeown retained her 100m backstroke title, edging out American Regan Smith in one of the races billed as the best of this meet. Smith had taken McKeown's world record this year but McKeown powered down the second length to win by 0.33 seconds.
