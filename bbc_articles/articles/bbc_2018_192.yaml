title: Migrants drown in year’s ‘first sinking’ off Libya - BBC News
date: '2018-01-07'
section: General
url: http://www.bbc.co.uk/news/world-africa-42594159
content: |-
  A dinghy carrying people attempting to reach Europe sank off the coast of Libya.

  A dinghy carrying people attempting to reach Europe has sunk off the coast of Libya.

  The Italian Coastguard said they rescued 84 people from the partly-submerged dinghy, in international waters about 40 miles from Libya. But several bodies were also recovered.
