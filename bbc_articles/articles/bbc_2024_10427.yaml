title: 'Watch: Wild orangutan treats his own wounds - BBC News'
date: '2024-05-02'
section: General
url: http://www.bbc.co.uk/news/science-environment-68945873
content: |-
  It is the first time a creature in the wild has been seen using a medicinal plant to treat a wound.

  A Sumatran orangutan in Indonesia has self-medicated using a paste made from plants to heal a large wound on his cheek, say scientists.

  It is the first time a creature in the wild has been recorded treating an injury with a medicinal plant.
