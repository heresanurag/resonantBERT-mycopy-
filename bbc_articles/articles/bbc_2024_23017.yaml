  Scottish pilot in E1 Series Oban Duncan now races on lakes across Europe in the glamorous powerboat series.

  At 18 years old, Oban Duncan lives a relatively normal life with one exception: She’s an electric powerboat racer in the glamorous world of the Formula E series.

  The UIM E1 World Championship is the world’s first electric boat racing championship, and it sees nine teams go head-to-head to take the title.

  The series has celebrity status attached to it with Will Smith, Rafael Nadal and Didier Drogba as team leaders.

  Oban grew up in Balloch on the shores of Loch Lomond. At the age of eight, she placed second for Scotland in the RYA Honda RIB challenge, which is a national inflatable boat championship for 8 to 16-year-olds.

  Oban said: “Looking back it seems quite scary that at eight they were letting me drive a boat around on my own, but I think I just had the key skills to be able to do it safely.”

  You can watch more about the E1 World Championship in the latest Click episode.
