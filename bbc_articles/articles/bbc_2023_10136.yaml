title: 'Watch: Drone shows large chunks of highway destroyed in India floods - BBC
  News'
date: '2023-07-13'
section: General
url: http://www.bbc.co.uk/news/world-asia-66184879
content: |-
  Drone footage has shown the scale of destruction caused by floods and landslides in Manali, northern India.

  Drone footage has shown roads damaged by flooding and landslides in the northern India state of Himachal Pradesh. Many districts received a month’s rainfall in a single day over the weekend. In the town of Manali, tourists were stranded along with their vehicles after roads were washed away.
