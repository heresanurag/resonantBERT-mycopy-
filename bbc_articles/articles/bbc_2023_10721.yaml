title: 'Belarus camp offered to Wagner: BBC''s Steve Rosenberg visits - BBC News'
date: '2023-07-08'
section: General
url: http://www.bbc.co.uk/news/world-europe-66140699
content: |-
  Russia editor Steve Rosenberg says that, so far, only Belarusian troops appear to be on the site.

  The BBC's Russia editor Steve Rosenberg was granted access to a camp in Belarus that has been offered to Russian Wagner mercenaries - but so far only Belarusian troops appear to be there.

  The camp's true purpose is not yet known, but it has enough tents to host 5,000 people.

  He walks us through the camp, asking where Wagner is now, and talks through the possibility of the mercenary group moving in there.
