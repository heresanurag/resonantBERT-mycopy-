  David Jamieson, the West Midlands police and crime commissioner, said it was "heartbreaking" for "someone so young to lose their life in this way".

  Labour MP for Coventry North East, Colleen Fletcher, said she was "deeply saddened by the fatal stabbing of a young man in my constituency".

  The community is in a "state of complete shock", she said, adding that rising levels of knife crime in the city made her "hugely concerned".

  There were 284 incidents of knife crime in Coventry up to 12 November this year, according to West Midlands Police.

  The West Midlands recorded the highest number of knife offences outside of London, with 65 per 100,000 population.

  In London in 2016/17 there were 137 offences per 100,000 people.

