content: |-
  The city quickly pulled together with a wave of kindness from offers of lifts and food to accommodation.

  How Liverpool united after car ploughed into crowd

  Almost 50 people were injured, including four children, in the incident

  On what was a day of jubilant celebrations, the news of a car hitting a crowd of onlookers during Liverpool's Premier League victory parade sent shockwaves across the country. But, in the spirit of its famed kindness, the city quickly united as generous people offered to help with everything from messages of support to offers of lifts and accommodation. From opening up their homes to those who were stranded to offering car rides and food to those caught up in the horror, Merseyside pulled together. The overwhelming amount of generosity in the aftermath of incident on Monday evening has been praised by many.

  John and Kerri Davies, owners of J&K Travel, said they did not have to think twice about offering free transport to those who found themselves stranded - as public transport was overwhelmed.

  The couple – along with two of their colleagues – immediately headed to the scene in four minibuses to help. "We just wanted to get people home safely as we knew there wouldn't be any transportation," said Mrs Davies. "We called two members of staff and they didn't even question it. "They just jumped in their vehicles and headed over."

  The incident left people who had been celebrating moments earlier in shock

  Over the course of the evening, each minibus carried out four to five journeys back to Wirral. She said the overwhelming response of kindness was typical of the people of Merseyside. "We look after our own, everybody does everything to help everyone," she said. "We just wanted to do everything we could to help."

  Police were on hand to support people in the aftermath of the incident

  Liverpool University student Oli Fountain, who lives five minutes for the scene, was among those who had also offered to help. Posting on X, he said: "Anyone stuck in town who can't get home give me a dm, have 2 sofas people can crash on, can put the kettle on and get people warm at least." Speaking to the BBC, he said this was a "normal response for the city". "The city really came together in the aftermath of Southport stabbing and again last night," he said. "It makes me proud to live here."

  The car struck pedestrians on Water Street just after 18:00 BST

  Charlotte Hennessy, who lives in Flint, said she was "so proud to be a Red yesterday" as the fans all came together. Ms Hennessey, whose father James was among the 97 killed in the 1989 Hillsborough disaster, was back at her home when the incident unfolded and was among those who offered to collect fans stuck in Liverpool. She said it was the "Scouse way" to want to help others. "It's just the way we are," she added. "People were offering to help strangers - sharing hotel rooms, offering to pick them up and offering them money," she said.

  Nisha Katona, who is the founder of Mowgli Street Food, also praised her team "who were incredible in their calm maturity, resourcefulness and quick kindness" when its restaurant in Liverpool became a medical centre. "In the face of trauma their live for our beloved city and our Liverpool people was immediate and immense," she said.

  She posted on X: "Those who target joyful celebrations and our happiest moments, who care not for the welfare of little children are beneath contempt. "A stark contrast to the people of Liverpool who responded with extraordinary compassion, offering lifts, shelter, food, and more. Liverpool stood firm, displaying kindness and decency in the face of horror."

