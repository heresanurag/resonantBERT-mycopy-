  Great Britain will have three athletes in the women's 800m final for the first time, with Keely Hodgkinson providing the standout performance. The 19-year-old timed her finish to perfection to win her semi-final on the line in one minute 59.12 seconds. Jemma Reekie was second in her semi-final in 1:59.77, while Alex Bell (1:58.83) qualified for Tuesday's final as one of the two fastest losers. "It's a dream come true. I did not expect to be on this journey," said Bell. "Never in my wildest dreams did I think I would be an Olympic finalist." GB will have three men in Sunday's 100m semi-finals, with Zharnel Hughes running a season's best of 10.04 seconds, while CJ Ujah (10.08) also qualified automatically. A season's best by Reece Prescod (10.12) sent him through as one of the three fastest losers, with Canadian 2016 bronze medallist Andre de Grasse (9.91) the fastest qualifier from Saturday's heats.

