title: 'Ukraine war: President Zelensky speaks to UK MPs - BBC News'
date: '2022-03-08'
section: General
url: http://www.bbc.co.uk/news/uk-politics-60666782
content: |-
  President Volodymyr Zelensky addresses the House of Commons and pledges to keep on fighting against Russia.

  President Volodymyr Zelensky has addressed the House of Commons and pledged to keep on fighting against Russia.

  Two weeks after the invasion of Ukraine began, Mr Zelensky quoted William Shakespeare and Sir Winston Churchill, he thanked Boris Johnson and called for an increase in sanctions.

  The leader spoke virtually from Kyiv in Ukraine - it's the first time a foreign leader has addressed MPs in the chamber.
