title: Man arrested after firearms incident outside Glasgow pub - BBC News
date: '2019-12-22'
section: Glasgow & West Scotland
url: http://www.bbc.co.uk/news/uk-scotland-glasgow-west-50884051
content: |-
  The 32-year-old was arrested after an incident outside a bar in Glasgow's Sauchiehall Street.

  The incident took place outside the bar on Saturday evening

  A man has been arrested in connection with a firearms incident in Glasgow.

  The 32-year-old is alleged to have been in possession of a gun outside Nico's Cafe Bar in the city's Sauchiehall Street.

  The incident happened about 18:35 on Saturday.

  Police Scotland said the weapon has since been recovered.

  Many premises in the area have security cameras
