title: 'Frankie Morris: Three arrested after teen''s disappearance - BBC News'
date: '2021-05-16'
section: Wales
url: http://www.bbc.co.uk/news/uk-wales-57126999
content: |-
  Frantisek "Frankie" Morris, 18, was last seen near the Vaynol Arms, Pentir, Gwynedd, on 2 May.

  The 18-year-old had been at a rave the night before he disappeared

  Three people have been arrested in connection with the disappearance of a teenager almost two weeks ago.

  Frantisek "Frankie" Morris, 18, was last seen near the Vaynol Arms, Pentir, Gwynedd, on Sunday, 2 May, a day after going to a rave at a disused quarry.

  Police said a man had been arrested on suspicion of causing death by dangerous driving.

  A second man and a woman were held on suspicion of perverting the course of justice, the north Wales force said.

  Police have closed a road while investigations take place

  Officers said they had spoken to a cyclist who was caught on CCTV in the area but he was no longer part of their investigation.

  Ch Insp Owain Llewelyn said: "Due to the ongoing investigation, the road from Pont Felin, Pentir heading towards Waen Wen will be closed until further notice."

  He appealed for a number of drivers to get in touch.

  Frankie was last seen on CCTV pushing his bike near the Vaynol Arms

  North Wales Police also want to talk to three male cyclists seen near the pub at about 13:45 BST that day.

  Many volunteers have been involved in the search, using drones and dogs.

  Ch Insp Owain Llewelyn said "several useful reports and pieces of information" were being assessed.

  "If there is anyone who was at the rave at the disused quarry in Waunfawr on Saturday, please use this link to contact us, anonymously if you prefer," he said.

  Frankie was last seen on CCTV pushing his bike near the Vaynol Arms.

