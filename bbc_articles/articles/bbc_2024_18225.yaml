title: 'Football gossip: Ferguson, Wan-Bissaka, Osimhen, Lukaku, Felix, Lo Celso,
  Casemiro, Chalobah, Silva, Araujo - BBC Sport'
date: '2024-08-11'
section: Football
url: http://www.bbc.co.uk/sport/football/articles/c204wjvg2qxo
content: |-
  Manchester United monitor Evan Ferguson, Aston Villa keen on Giovani lo Celso, Victor Osimhen asks to leave Napoli, plus more.

  Manchester United monitor Brighton's Evan Ferguson, Aston Villa keen on Tottenham's Giovani lo Celso, and Victor Osimhen asks to leave Napoli.

  Manchester United are weighing up a £50m move for Brighton's 19-year-old Republic of Ireland striker Evan Ferguson amid concerns that Chelsea could try to sign him. (Daily Star on Sunday), external

  Manchester United could give English defender Aaron Wan-Bissaka, 26, a £5.6m pay-off to make up for the shortfall in his salary if he joins West Ham. (Manchester Evening News), external

  Napoli sporting director Giovanni Manna says 25-year-old Nigeria striker Victor Osimhen, who has been linked with Chelsea and Paris St-Germain, has asked to leave. (90 Min), external

  Chelsea have told Napoli they must pay £36m to sign 31-year-old Belgium striker Romelu Lukaku. (Gianluca Di Marzio), external

  Benfica and Barcelona are interested in Atletico Madrid's 24-year-old Portgual forward Joao Felix but are only likely to pursue a loan deal. (Sport - in Spanish), external

  Aston Villa and Real Betis are keen on 28-year-old Argentina midfielder Giovani lo Celso, who will be allowed to leave Tottenham. (Fabrizio Romano), external

  Wolves are prepared to consider offers of 20m euros (£17.1m) for 22-year-old Portugal forward Fabio Silva, who has also attracted interest from Espanyol, Genoa, Valencia and Wolfsburg. (Teamtalk), external

  Brazil midfielder Casemiro, 32, has been linked with a move to Saudi Arabia but Manchester United manager Erik ten Hag does not expect him to leave this summer. (Metro), external

  Crystal Palace are in talks with Wolfsburg about signing 24-year-old French defender Maxence Lacroix. (Sky Sports Germany), external

  Palace and Aston Villa are interested in Chelsea's 25-year-old English defender Trevoh Chalobah, who has been barred from their first-team facilities (Telegraph - subscription), external

  Bournemouth are close to signing 22-year-old Mexico defender Julian Araujo from Barcelona in a deal worth 10m euros (£8.6m). (ESPN), external

  Chelsea are planning to sell or loan out at least six senior players to reduce their squad to a manageable level before the transfer window closes. (Telegraph - subscription), external

  Several Premier League clubs have held talks with Bayer Leverkusen over the availability of 22-year-old Czech Republic forward Adam Hlozek, who is valued at £15m. (Florian Plettenberg), external
