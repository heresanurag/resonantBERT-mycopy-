title: Bargain Hunt art dealer Ochuko Ojiri charged with terror offences - BBC News
date: '2025-05-08'
section: London
url: http://www.bbc.co.uk/news/articles/ckg4180np8do
content: |-
  Oghenochuko Ojiri is due to appear at Westminster Magistrates' Court on Friday, the Met Police says.

  An art dealer who appeared as an expert on the BBC's Bargain Hunt has been charged with terror offences, the Metropolitan Police has said. Oghenochuko Ojiri, 53, of west London, has been charged with eight counts of "failing to make a disclosure during the course of business within the regulated sector", following an investigation into "terrorist financing". The Met added the alleged offences are said to have occurred between October 2020 and December 2021. Mr Ojiri, who is also known as Ochuko Ojiri, will appear at Westminster Magistrates' Court on Friday.

  The force said it is the first charge of its kind under section 21A of the Terrorism Act of 2000. It added the probe was carried out by its specialist arts and antiques unit, alongside the Office of Financial Sanctions Implementation (OFSI) and HMRC. In a statement the BBC said: "It would not be appropriate to comment on ongoing legal proceedings."

  Mr Ojiri is listed on Bargain Hunt's website as one of the show's experts. He is not a member of BBC staff, works as a freelance presenter and has also appeared on Antiques Road Trip and Channel 5's Storage: Flog the Lot! He has not worked on BBC programmes since 2023. Mr Ojiri also founded the Ramp Gallery, a contemporary art showroom now known as the Ojiri Gallery, based in east London.
