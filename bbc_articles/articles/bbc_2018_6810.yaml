  • None Brazil have won 10 of their 11 meetings with Costa Rica in all competitions, the one loss coming in a friendly in 1960.
  • None Costa Rica are winless in their last five World Cup matches (D3 L2).
  • None Costa Rica had just three shots in this match, with all of those coming in the opening 15 minutes.
  • None Brazil's second goal was timed at 96:49 - the latest recorded stoppage time goal in a World Cup match since 1966.
  • None Brazil are unbeaten in 13 games (W9 D4 L0), conceding just three goals in that run.
  • None Brazil's Neymar has been fouled 14 times so far in the 2018 World Cup, more than any other player.
  • None Neymar has been involved in 18 goals in his last 17 appearances for Brazil (10 goals, eight assists).
  • None Coutinho has been directly involved in four goals in his last four games for Brazil (three goals, one assist), as many as in his previous 14 combined for the national side.

  Brazil face Serbia in their final game next Wednesday (19:00 BST) in Moscow, and Costa Rica end their campaign against Switzerland (19:00 BST) in Nizhny Novgorod on the same day.
