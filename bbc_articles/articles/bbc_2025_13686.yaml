title: Teens arrested on suspicion of murder as boy, 14, stabbed to death - BBC News
date: '2025-06-09'
section: Manchester
url: http://www.bbc.co.uk/news/articles/cm26gpygp59o
content: |-
  A 14-year-old girl and a 37-year-old woman were also detained on suspicion of assisting an offender.

  Two murder arrests after boy, 14, stabbed to death

  Police cordons included the Fairway Inn in New Moston

  Two teenagers have been arrested on suspicion of murder after a 14-year-old boy was stabbed, police have said. Police, paramedics and an air ambulance were called to Nevin Road in the New Moston area of Manchester at about 17:00 BST on Sunday. The boy, who was found with stab wounds, later died in hospital, added Greater Manchester Police (GMP). Two boys - aged 14 and 16 - were arrested on suspicion of murder while a 14-year-old girl and a 37-year-old woman were detained on suspicion of assisting an offender.

  Forensics teams have been examining the area

  A GMP spokesperson said all four suspects remained in custody for questioning following the "distressing and heartbreaking incident [in which] a boy has lost his life". After he was stabbed, the boy reportedly ran to a nearby house. According to a resident quoted by the Manchester Evening News, external, the teenager said: "I don't want to die. "He just came through the door and said 'I've been stabbed'. "We sat him down on a chair and phoned an ambulance." "He just kept saying 'I don't want to die'."

  A police cordon remains in place around the Fairway Inn

  Several areas have been cordoned off, including outside the Fairway Inn on the corner of Nuthurst Road and Broadway. Det Ch Insp John Charlton said the incident had "shocked and saddened" the local community and "distressed anyone who witnessed it". He said: "We are deploying significant resources to this murder investigation, and this led to quickly identifying potential suspects. "We are still trying to establish the full circumstances around the incident. "There will be a large police presence and several scenes in place while we continue to investigate this horrific incident. "The boy's family are being supported by our officers and we are determined to give them the answers they deserve." GMP appealed for "information, doorbell or dashcam footage, or eyewitness accounts from anyone who was in the area at the time".

  Fran Hicklin said crowds of people gathered near her home

  Speaking to the BBC, residents described their sense of shock and sadness. Fran Hicklin, 80, lives near the Fairway Inn, which remains cordoned off by police "crime scene" tape. She said she returned home after 18:00 on Sunday to see crowds of people in the street. "When I got out of my car there was crowds along my fence at the front," she said. Ms Hicklin said she asked a man what was going on because "there were police all over at the pub". She said the man had told her that a young boy had been stabbed.

  Ms Hicklin said she was worried about knife crime, not least because she has grandsons. "I'm very wary about them growing up in this world." Another local resident, Ruba Devi, said she was cooking at home when her 13-year-old daughter noticed a commotion outside, with police cars and ambulances arriving. The 45-year-old said she stayed indoors with her children and stopped her 10-year-old son from looking out the window. Ms Devi said he was upset by what had happened, and had been asking lots of questions. She described it as "very sad news" and added that she was now "scared" to let her children play outside. Meanwhile Sandra Senior, who grew up in the area, said she was fearful for today's generation of teenagers. "It's awful," said the 55-year-old. "It's a shocking world now."

  Linnette Green said she felt for the boy's family

  Another local resident, Linnette Green, 50, agreed it was "very, very worrying". She said the age of the victim was particularly shocking. "A 14-year-old is no life at all," she said. "I feel sorry for the parents. "There are a lot of kids in the area with a school nearby." Ms Green said she worried whenever her 18-year-old daughter goes out. "Fingers crossed this is a one-off," she said. "You hear these things on the news and you don't think it is going to happen in your area but it does."

