title: 'Newspaper headlines: Israel ''sinks navy'' in Syria and Rayner to force through
  jail plans - BBC News'
date: '2024-12-11'
section: The Papers
url: http://www.bbc.co.uk/news/articles/clyk4grkzzzo
content: |-
  Strikes carried out by Israel inside Syria and plans to deliver more prison space lead the papers.

  Israel 'sinks navy' in Syria and Rayner to force through jail plans

  Wall Street is seeing its biggest boom in complex financial products, which typically carry greater risk, since the lead-up to the 2007 crash, the Financial Times reports

  Several front pages report on strikes launched into Syria since the toppling of President Bashar al-Assad. "Israel blitzes arms silos and sinks navy in Syria" is the Times's, external headline, while the i's, external reads: "New turmoil in Middle East as neighbours launch attacks inside Syria". In a comment piece, external, i editor Oliver Duff says regional players like Turkey, Israel, the US, Russia and Iran are all now "scrabbling to protect their interests, or seek advantage in the turmoil". The Daily Mirror, external reports that rebels in Syria are drawing up a hit list of people who carried out torture and killings for the Assad regime. Under the headline "evil thugs' time is up", its editorial column argues that those responsible deserve to face "their own day of judgement". There are pictures on the front of the Daily Mail, external and the Guardian, external of Luigi Mangione, the man charged with murdering a health insurance executive in New York last week. In the Guardian's photo, he's scowling at the camera as he's led into a court in Pennsylvania. "Suspect in angry outburst before court appearance" is the headline. According to the New York Times, external, the case has "mesmerised" the US because people across the nation share a "collective frustration" with health insurance companies. That public anger, it argues, is reflected in the number of social media posts supporting Luigi Mangione, since he was identified as the suspect in the shooting. The Daily Telegraph, external expresses anxiety that, under a new government strategy to ease prison overcrowding, the Ministry of Justice will be able to bypass councils that normally decide on planning applications. A representative from a campaign group, the Community Planning Alliance, tells the paper that "the green belt will not be safe". But Justice Secretary Shabana Mahmood is quoted saying the move will help ensure no government will run out of prison places again.

  The Financial Times, external leads on what it describes as "the biggest boom on Wall Street in complex financial products" since the lead-up to the 2007 global financial crash. The paper says the rush to buy into the products - which are often riskier than traditional investments - is being driven by a "relentless" appetite for "juicy" returns. There's outrage on the front of the Daily Star, external that executives at Thames Water have been awarded £770,000 worth of bonuses. It points out that this is in spite of what it calls the firm's "abject failure" to prevent sewage spills in rivers. the Daily Mail, external is unimpressed with the defence of the policy offered by the firm's boss, Chris Weston, who said pay needs to be high in order to attract talent. Its editorial, external asks simply: "Is he joking?" And the Times, external is cheered by evidence that the traditional Christmas pudding is enjoying a resurgence in popularity. It says that, after a decade of losing out to alternatives such as Italian panettone and chocolate desserts, one supermarket says sales are up by a fifth this year. "Whatever the cause of Christmas pud's renaissance," says the paper's leader, external, "it is welcome".

