  Jonas was part of a band with his brothers Joe and Kevin and got a big following on the Disney Channel through films like Camp Rock.

  He has since gone solo, with hits including Levels, Jealous and Chains, and was a mentor with Demi Lovato on The X Factor.

  The 25-year-old is said to have proposed to Chopra in London in June, after reportedly closing down a jewellery shop to buy her an expensive engagement ring.

