  The engagement party - called a roka - is a chance for the couple to exchange gifts and makes the union of their families public.

  Game of Thrones star Sophie Turner posted on Instagram, celebrating the official news of the engagement.

  The actress, who is to marry Nick's brother Joe, said: "I'm so excited to welcome you into the family Priyanka Chopra. I love you both."

