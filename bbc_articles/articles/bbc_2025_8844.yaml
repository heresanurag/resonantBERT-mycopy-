title: Watch timelapse of Trump's marathon handshake session with Saudis - BBC News
date: '2025-05-13'
section: General
url: http://www.bbc.co.uk/news/videos/c93y8835dzjo
content: |-
  Dozens of senior officials, military leaders and businessmen queued to greet the US president in Saudi Arabia.

  Donald Trump has met with dozens of officials in Saudi Arabia, as part of his first major diplomatic international visit of his second term as US president. A timelapse shows a huge queue of people waiting to shake hands with the president. Trump is in Saudi Arabia as part of a four-day trip to the United Arab Emirates, aimed at securing hundreds of billions of dollars of investment in the US.
