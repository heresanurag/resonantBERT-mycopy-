title: 'Trump travel ban: Mike Pence defends president - BBC News'
date: '2017-02-05'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-38872177
content: |-
  US Vice-President Mike Pence defends Donald Trump, after he called the man who suspended his travel ban a "so-called judge".

  US Vice-President Mike Pence has defended Donald Trump's right to ban people from travelling to the US from seven mainly-Muslim countries.

  On Friday the ban was suspended by federal Judge James Robart, who the president has since described as a "so-called judge".

  An attempt by the White House to reinstate the ban on Sunday was rejected by the US federal appeals court.
