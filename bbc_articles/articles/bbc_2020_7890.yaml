content: |-
  Stella Frew was pronounced dead at the scene after being struck by a van on Friday.

  Stella Frew was pronounced dead at the scene in Sutton on Friday

  A man has been arrested on suspicion of murdering a woman who died after she was struck by a van.

  Stella Frew, 38, was pronounced dead at the scene in Tonfield Road, Sutton, south-west London, just before 18:00 BST on Friday. The vehicle left the scene after the crash.

  Police believe she climbed into a white van on Friday afternoon and "later got into a dispute with the driver".

  A man in his 20s was arrested on Sunday and remains in custody.

  Emergency services were called to Tonfield Road in Sutton on Friday afternoon

  Det Ch Insp Helen Rance said police think Ms Frew had been "deliberately harmed".

  "We believe she got into a white transit van in this area and later got into a dispute with the driver of this van," she said.

  She appealed for "anyone who may have seen Stella in the area of the A24 in Stonecot, West Sutton on Friday afternoon" to contact Scotland Yard.

