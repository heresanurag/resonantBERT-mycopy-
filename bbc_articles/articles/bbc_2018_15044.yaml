title: 'France protests: Demonstrators flee police tear gas - BBC News'
date: '2018-12-09'
section: General
url: http://www.bbc.co.uk/news/world-europe-46492986
content: |-
  Police fire tear gas at protesters in Paris, who are demonstrating against President Emmanuel Macron.

  Police have fired tear gas at demonstrators in Paris who are staging another weekend of protests against President Emmanuel Macron.

  Some 8,000 officers have been deployed in the city, where about 5,000 protesters have gathered.
