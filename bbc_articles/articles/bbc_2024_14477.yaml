title: Michael Mosley's wife pays tribute to kind husband - BBC News
date: '2024-06-09'
section: Europe
url: http://www.bbc.co.uk/news/articles/c0kk9gvw8l0o
content: |-
  Tributes have been pouring in for the TV and radio presenter who has died on the Greek island of Symi.

  The wife of TV and radio presenter Dr Michael Mosley has paid tribute to her "wonderful, funny, kind and brilliant" husband, whose body was found, four days after he went missing on the Greek island of Symi. Dr Clare Bailey Mosley said it was "devastating" in a statement confirming his death. The 67-year-old father-of-four went missing on Wednesday after setting off on a walk from Agios Nikolaos beach. His body was found on a hillside near Agia Marina beach bar on Sunday. Dr Bailey Mosley said: "We had an incredibly lucky life together. "We loved each other very much and were so happy together." She said she was incredibly proud of her children and had been "hugely comforted by the outpouring of love from people around the world". Tributes have been pouring in to the broadcaster and author. Charlotte Moore, the BBC's chief content officer, said: "He was a brilliant science broadcaster and programme maker, able to make the most complex subjects simple, but he was also passionate about engaging and entertaining audiences, inspiring us all to live a healthier, fuller life." And Dr Saleyha Ahsan, co-presenter on Trust Me, I'm A Doctor, told BBC News he was a "national treasure" and a "hugely talented" man. She also praised his "passion for explaining science to a wider audience", adding he made it "accessible to anyone and everyone, not just a niche scientific crowd". Professor Brian Cox said Dr Mosley was a "mentor" to other science presenters. Sophie Laurimore, director of The Soho Agency which represented Dr Mosley, said he was a "wise, wonderful and lovely man". "He was immensely grateful for how receptive the public were to the ideas he had the privilege to share and to the many scientists whose work he had the honour to help popularise", she added. "Michael was unique." Some BBC News readers have also been sending tributes praising his impact. Glenis Shaw, from New Zealand, told the BBC Dr Mosley was "my absolute hero". "He taught me how to be healthy. I owe him so very much. "We have all lost someone very special and I feel devastated for his wife and family." Judith, a teacher from Salisbury, said she has used some of Dr Mosley's documentaries to teach GCSE History for the last 16 years. "He is a History teacher's best friend, and I am not sure if he ever knew it," she said. Sue said Dr Mosley helped her "get through Covid - just listening to his broadcasts". "I wish I could have thanked him personally," she added. "We are all the richer for having him in our lives."

