  Dr Mosley was reported missing after he left Agios Nikolaos beach to set off on a walk at about 13:30 local time (11:30 BST) on Wednesday. CCTV footage showed he had walked to the other side of the bay in intense heat and across rocky terrain. "We’re taking comfort in the fact that he so very nearly made it," his wife said in her statement. "He did an incredible climb, took the wrong route and collapsed where he couldn’t be easily seen by the extensive search team." "Michael was an adventurous man, it’s part of what made him so special," she continued. She also thanked the "extraordinary" people on Symi who worked "tirelessly" to find her husband.

  The body was found metres away from Agia Marina beach

  Symi's mayor Eleftherios Papakalodouka said the body was found as teams were searching the coastline. A bar manager found the body, PA news agency reported, after the island's mayor "saw something" by the fence of the bar and alerted staff. A police source told BBC News the deceased had been dead "for a number of days". Dr Mosley was found next to a fence around 30 minutes walk from the village of Pedi where he was last seen. A coroner has examined the body. Greek authorities had been conducting an extensive search for Dr Mosley amid high temperatures. A police officer apparently broke his leg as the body was being recovered.

  Dr Mosley studied medicine in London and qualified as a doctor, and for the last two decades was working as a presenter, documentary maker, journalist and author. He was known for his TV programmes including Trust Me, I'm a Doctor, and BBC Radio 4's Just One Thing podcast. Chris van Tulleken, one of Dr Mosley's co-presenters on Trust Me, I'm A Doctor, said he was "one of the most important broadcasters of the last few decades" as he paid tribute. "He basically invented a genre of science broadcasting", he wrote on X, formerly Twitter. Prof Tim Spector, who appeared on Dr Mosley's Just One Thing podcast, said his friend of 20 years was "humble, calm and self-deprecating" in a tribute published in the Telegraph, external. "What I will miss most about Michael is not just his friendship and generosity but his amazing positivity", he wrote. "He was immensely proud of his four children and they were a close family that kept him grounded and will be devastated that he left them so soon." Abramo Teodoro Balsamo told the BBC the Just One Thing podcast "inspired me so much", adding: "It’s a terrible loss, I cannot still believe it. "The void he is leaving is more than a mute signal on air." Tara Moore said she was sending love to Dr Mosley's family, and the country was mourning his "untimely" death. "Michael Mosley was a household name, if you had an ailment, chances are he'd covered it on one of his programs," she said. "He demonstrated cause and effect in a way that everyone could understand, and many people have improved their health as a direct result of Dr Mosley." Dr Mosley was also known for popularising the 5:2 and the Fast 800 diets, which advocate intermittent fasting and low-carbohydrate meals. His diets attracted a lot of attention in the past, both for their methods and scientific accuracy. In a statement, the Foreign Office said it was supporting the family of a British man who died in Greece, adding it was in contact with the local authorities.

