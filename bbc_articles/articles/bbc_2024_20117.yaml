title: 'Sven-Goran Eriksson obituary: Ex-England manager who could and should have
  ended trophy drought - BBC Sport'
date: '2024-08-27'
section: Football
url: http://www.bbc.co.uk/sport/football/articles/c1rr59g85e3o
content: |-
  Sven-Goran Eriksson was engaging, courteous and a shrewd tactician - and he could, and should, have ended England's trophy drought.

  'Engaging and courteous with a touch of steel'

  Sven-Goran Eriksson managed England at three major tournaments, including the 2002 and 2006 World Cups

  Sven-Goran Eriksson, who has died aged 76, is best remembered as England's first foreign manager and the man who presided over the country's so-called 'Golden Generation' during his time in charge. Eriksson's colourful private life has been well chronicled, while an eventful England managerial reign included a brush with an infamous tabloid 'Fake Sheikh' as well as heavy flirtations with Chelsea and Manchester United. The Eriksson sideshow often detracted from the successes he enjoyed as a club manager around Europe before he was announced as Kevin Keegan's successor in November 2000, although his England tenure is regarded as one of under-achievement given the riches he had at his disposal. At his peak, Eriksson was one of the game's finest coaches as he collected both domestic and European honours with regularity, something he was unable to replicate with England. Eriksson will, however, always have the memories of his most stunning night in charge, when Germany were beaten 5-1 in a World Cup qualifier in Munich's famous Olympic Stadium in September 2001. The Football Association's then chief executive Adam Crozier described Eriksson as "the unanimous choice of our selection team" when he was handed a five-year deal to tempt him away from Lazio, resigning early from the Italian club to assume his England duties in January 2001. Eriksson arrived with a glowing reputation as a shrewd tactician, the model of Scandinavian cool who would provide a stark contrast from Keegan, who relied heavily on the raw emotion that prompted him to quit in a toilet after a 1-0 defeat by Germany in October 2000, the final game at the old Wembley. The Swede also brought a track record of success with him to the FA's headquarters at Lancaster Gate that provided much optimism.

  Eriksson spent five years as manager of Sampdoria, taking charge of players such as Netherlands superstar Ruud Gullit

  Eriksson first came to wide prominence when he led IFK Gothenburg to a Uefa Cup triumph in 1982, beating Hamburg 4-0 on aggregate over two legs to give the Swedish club their first European success. It attracted the attention of Benfica, where he won two titles but could not repeat his Uefa Cup success, losing the 1983 final to Anderlecht. He had spells at Roma, with whom he won the Coppa Italia, and Fiorentina before returning to the Eagles in Lisbon, leading them to the 1990 European Cup final only to lose 1-0 to Arrigo Sacchi's legendary AC Milan side. There was a bizarre episode in Eriksson's career in December 1996 when he agreed to become manager of Blackburn Rovers for the start of the 1997-98 season. He reneged on this agreement three months later, leaving fellow future England boss Roy Hodgson to take charge at Ewood Park, while Eriksson was appointed as Lazio coach. It was at Lazio, after winning another Coppa Italia with Sampdoria in 1994, that Eriksson won the hearts and minds of the FA as the search for Keegan's successor started. Eriksson's Lazio won the European Cup Winners' Cup in 1999 with a 2-1 victory over Mallorca at Villa Park, having lost to Inter Milan in the previous season's Uefa Cup final. Lazio claimed the Coppa Italia twice then won Serie A in 1999-2000 under Eriksson, making him the top target for England.

