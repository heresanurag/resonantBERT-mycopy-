title: 'Olympic Games: Paris organisers propose breakdancing to IOC as a new sport
  for 2024 - BBC Sport'
date: '2019-02-21'
section: Olympics
url: http://www.bbc.co.uk/sport/olympics/47317052
content: |-
  Paris 2024 organisers will propose breakdancing to the IOC for inclusion, as well as surfing, climbing and skateboarding.

  Russia's Sergei Chernyshev, competing under the nickname Bumblebee, won breaking gold at the 2018 Youth Olympics

  Breakdancing has been proposed for inclusion in the Paris 2024 Olympic Games, organisers have announced. It is among four sports that organisers will propose to the International Olympic Committee (IOC), as well as surfing, climbing and skateboarding, which will all debut at Tokyo 2020. Squash campaigned unsuccessfully for inclusion in the Paris Games, as did billiard sports and chess. Breakdancing was included in the Youth Olympic Games in Buenos Aires in 2018.

  The IOC will consider the proposal and must reach a decision by December 2020. Tony Estanguet, a three-time canoeing Olympic champion and head of the Paris 2024 organising committee, said the inclusion of the new sports would make the Olympics "more urban" and "more artistic". Russia's Sergei Chernyshev, competing under the nickname Bumblebee, won the first breakdancing - known as 'breaking' - gold medal for boys at last year's Youth Olympics, while Japan's Ramu Kawai won the girls' title.

  This video can not be played To play this video you need to enable JavaScript in your browser. Watch: 'I want to be like Usain Bolt...but in breaking'

  The Youth Olympics saw competitors involved in head-to-head "battles" and it is reported, external that this format would be used in Paris. Team GB had no breaking competitors in Buenos Aires. A Team GB spokesperson said: "We look forward to welcoming all new sports into the Olympic Games and will work with the relevant bodies to develop our relationships at the appropriate time. "Although we did not compete in what was an invitational event at the recent Youth Olympic Games in Buenos Aires, we did witness the popularity of breakdancing among fans there." As well as the proposed sports, Paris organisers also announced that the 2024 Games would allow the public to immerse themselves in the Olympic experience, through virtual and connected sports. In addition, members of the public will be able to run the marathon course on the same day as the event - straight after the Olympic race - under the same conditions as those faced by the athletes. "With Paris 2024, the spectators of the Games finally become actors of the Games," said Estanguet.

  This video can not be played To play this video you need to enable JavaScript in your browser. Bumblebee wins first breaking gold for boys in Youth Olympics

  Squash's failure to make the list of proposed sports was met with "great disappointment" by the sport's governing bodies. In a joint statement, the World Squash Federation (WSF) and the Professional Squash Association (PSA) said: "We truly believe squash could seamlessly integrate into the Olympic programme with minimal costs and an optimised pool of participants. "Our unique interactive glass court would allow squash to bring a lot of additional excitement and spectacular action to any iconic monument of the host city or shed a new light on less known urban areas, while also helping to engage young people in the sport from day one of the preparations and well beyond the Olympic Games." Karate will make its Olympic debut at the 2020 Games but has not been included on the shortlist of proposed sports for the Paris Games four years later, with the World Karate Federation (WKF) saying it was "deeply saddened". "Our sport has grown exponentially over the last years, and we still haven't had the chance to prove our value as an Olympic sport since we will be making our debut as an Olympic discipline in Tokyo 2020," said WKF president Antonio Espinos. "Over the last months, we have worked relentlessly, together with the French Federation, to achieve our goal of being included in Paris 2024. "We believed that we had met all the requirements and that we had the perfect conditions to be added to the sports programme; however, we have learned today that our dream will not be coming true."

  Although there will be considerable 'sniggers' amongst Olympic purists - and further dismay in the world of squash - the Olympic Games are changing. I admit, I was someone sceptical about several sports with little history or experience bidding to be part of the Olympic movement being thrown into last year's Youth Olympics in Buenos Aires by the IOC. However - 'breaking' was one of the major success stories of the Games and it plays perfectly into the IOC's drive to boost the 'youth' appeal of the senior Olympics. I spent several days at their 'urban park' in Argentina, which was the venue for a host of 'new' sports such as breaking, sport climbing, freestyle BMX and 3v3 basketball - and every day was a sellout. People voted in their thousands there and given what I witnessed I've no doubts that 'breaking' will be a huge success in Paris. Today's news does raise questions about the future of karate which will debut in Tokyo - after heavy pressure from the Japanese organisers who dominate the sport - but could well disappear from the Games line-up after just one outing.

