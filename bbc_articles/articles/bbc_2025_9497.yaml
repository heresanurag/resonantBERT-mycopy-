title: JD Vance invites Pope Leo XIV to White House after Vatican talks - BBC News
date: '2025-05-19'
section: US & Canada
url: http://www.bbc.co.uk/news/articles/c4g2rpn3p9ro
content: |-
  The Vatican says a meeting between the new Pope and US vice-president was "cordial".

  To play this video you need to enable JavaScript in your browser. This video can not be played

  US Vice-President JD Vance has invited Pope Leo to make an official visit to Washington following a "cordial" meeting the Vatican, the White House has confirmed. Vance handed the pontiff a letter from President Donald Trump and First Lady Melania Trump inviting him to visit "as soon as [he] possibly can", White House spokesperson Karoline Leavitt said. In a statement, the Holy See said both sides had expressed satisfaction with relations between the US and Vatican during face-to-face talks on Monday. The meeting comes after Vance - a practicing Catholic - joined other dignitaries and worshippers at the Pope's inaugural mass on Sunday.

  Religious freedom and cooperation between church and state were also discussed on Monday, it was reported, with US Secretary of State Marco Rubio also taking part. "Finally, there was an exchange of views on current international issues with a shared call for respect for humanitarian and international law in conflict zones, and support for negotiated solutions among the parties involved," reads the Holy See's statement. The papal audience lasted 45 minutes, Vance's spokesperson said. It took place behind closed doors without reporters present. There was a customary exchange of gifts, with Vance handing Pope Leo a t-shirt for the Chicago Bears - an American football team from the Pope's birthplace - complete with his name. Vance's office said he also gave the pontiff two books by St Augustine. The Pope, meanwhile, gave the vice-president a bronze sculpture with the inscription "peace is a fragile flower" in Italian, and a picture book of the papal apartments in the Apostolic Palace - the Pope's official residence. The Vatican said Vance also held positive talks with Archbishop Paul Richard Gallagher, who is responsible for the Holy See's diplomatic relations.

  (Left to right) The vice president's wife, Usha Vance, JD Vance, Pope Leo, US Secretary of State Marco Rubio and his wife, Jeanette Rubio

  Marco Rubio (left) and JD Vance were photographed laughing with Pope Leo

  Pope Leo, who became the first American to lead the Catholic Church earlier this month, has previously appeared to make veiled criticisms of Vance and the Trump administration's migration stance. In February, an X account under Leo's name shared criticism of the White House's plans for mass deportations of migrants. That same month, the account also shared a link to an opinion piece titled: "JD Vance is wrong: Jesus doesn't ask us to rank our love for others." The Vatican has not responded to previous requests from BBC News to confirm whether the account belonged to Pope Leo. On Sunday, Vance said the United States was "very proud" of the Chicago-born pontiff. "Certainly our prayers go with him as he starts this very important work," the vice-president said.
