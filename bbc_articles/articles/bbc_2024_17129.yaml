  Sir Keir was England and Wales's chief prosecutor in the run-up to the trial of senior staff accused of phone hacking at Rupert Murdoch's News International, the predecessor to News UK, which is the publisher of the Sun. Former Sun editor Kelvin MacKenzie suggested, external this was one reason the paper had not given an early endorsement to Sir Keir's party. In previous elections, it declared its backing to parties much earlier. This time it has left it until polling day, when the printed edition of the newspaper will hit the streets. The paper's front page endorsement for Labour, external does not mention the party's name or its leader. Instead, it alludes to criticism of England manager Gareth Southgate, declaring: "As Britain goes to the polls, it's time for a new manager (and we don't mean sack Southgate!)"

  The Scottish Sun, which has previously endorsed Labour, the Scottish National Party and the Conservatives, has also come out in support of Labour, external. Over the weekend the Financial Times and the Sunday Times, which is also owned by News UK, joined the Daily Mirror, the Guardian and the Independent in backing Labour. But the Times said Labour was "yet to earn the trust of the British people". In an editorial , externalpublished on the eve of the election, the paper said Labour had "been sparing with the truth about what it will do in office and cannot expect an endorsement". "Sir Keir may have secured a huge majority by Friday. The day after he must begin the process of earning it." Meanwhile, the Daily Mail, the Daily Telegraph and the Sunday Express have backed the Conservatives.
