title: 'Coronavirus: EU countries begin mass vaccination - BBC News'
date: '2020-12-26'
section: General
url: http://www.bbc.co.uk/news/world-55456189
content: |-
  Countries across the EU received their first shipments of the Pfizer/BioNTech Covid-19 vaccines. A healthcare worker in Budapest was the first to get the shot.
