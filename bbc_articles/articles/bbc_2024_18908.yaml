title: 'Tredegar fire: Blaze at Ron Skinner and Son car dealership - BBC News'
date: '2024-08-17'
section: Wales
url: http://www.bbc.co.uk/news/articles/cn9l194gwqjo
content: |-
  About 100 firefighters work overnight to extinguish a large fire at a car dealership.

  Some residents reported hearing loud bangs at the height of the blaze

  A huge fire has torn through a car dealership after the blaze broke out overnight. Plumes of smoke and orange flames could be seen rising from Ron Skinner and Sons on the Tarfarnaubach Industrial Estate in Tredegar, Blaenau Gwent. There have been no reported injuries, but some nearby residents described hearing loud bangs which one woman said made the windows of her house shake. About 100 firefighters worked through the night to extinguish the fire, and Ron Skinnner said its Tredegar showroom was closed until further notice, but it was business as usual at its other locations.

  South Wales Fire and Rescue Service said on Saturday afternoon that investigations had started, and added five fire engines remained at the scene as well as fire investigation officers.

  This video can not be played To play this video you need to enable JavaScript in your browser. Drone footage shows the aftermath of the car dealership fire

  Councillor John C Morgan said the dealership was a "big employer" and the news would be "devastating for the workforce". South Wales Fire and Rescue Service first reported being at the scene of the blaze at about 01:00 BST on Saturday. "Members of the public are reminded to please avoid the area, and if they live locally, to stay indoors and keep windows and doors closed," the fire service said. Paige Bennett, from Tredegar, said she saw the fire from her home and described hearing "explosions [that] made the windows shake". Ms Bennett, who has lived opposite the car dealership for 21 years, added that she "just can't believe it".

  South Wales Fire Service sent about 100 firefighters to the scene of the blaze

  At about 10:00 on Saturday, the fire service reported that the blaze was being "scaled down". Blaenau Gwent Member of the Senedd Alun Davies said the community would be would be "devastated". "I have contacted Blaenau Gwent council and the Welsh government this morning to make sure that the business gets all the support it needs to recover and to rebuild," he said.

  Mr Morgan, who represents the Georgetown ward, said: "They are a big employer and it is a lovely company. It is devastating for the workforce and the community." In a post on Facebook, Ron Skinner and Sons said the Tredegar site was closed until further notice.

  The blaze was said to have "scaled down" by about 10:00 on Saturday

  Parc Bryn Bach, a nature reserve which neighbours the site, said it hoped to see the car dealership "back up and running in the not too-distant future". "We are saddened and devastated by the incident at our neighbouring business Ron Skinner and Sons last night," it added. Rhymney Rugby Club, FC Tredegar and Bush Ironsides also sent well wishes to the business via social media. "Ron Skinner is an important local employer for our town and community," said FC Tredegar. "Everyone at FC Tredegar is shocked and saddened to see the devastating news."
