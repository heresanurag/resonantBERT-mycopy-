title: The late Hans Rosling tells the modern world's story - BBC News
date: '2017-02-08'
section: General
url: http://www.bbc.co.uk/news/world-europe-38902490
content: |-
  Hans Rosling, who has died in Sweden aged 68, tells 200 years of world history in four minutes.

  In this spectacular section of The Joy Of Stats, broadcast by the BBC in 2010, he tells the story of the world in 200 countries over 200 years using 120,000 numbers - in just four minutes.
