title: Elon Musk's SpaceX Starship launches but ends in explosion - BBC News
date: '2023-04-20'
section: General
url: http://www.bbc.co.uk/news/world-65339852
content: |-
  Elon Musk's company launched the biggest and most powerful rocket ever built.

  Elon Musk's company SpaceX has launched Starship - the biggest and most powerful rocket ever built.

  The un-crewed spacecraft took off from Boca Chica, Texas.
