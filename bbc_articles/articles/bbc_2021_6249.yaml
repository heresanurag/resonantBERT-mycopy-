  The situation continues to worsen as it reports more than 400,000 new coronavirus cases in a single day.

  Revellers at the Circus Nightclub at Bramley-Moore Dock, Liverpool Image caption: Revellers at the Circus Nightclub at Bramley-Moore Dock, Liverpool

  DJ Marea Stamper has described the "incredible energy" at a pilot event in a warehouse on Liverpool's waterfront which saw some 3,000 clubbers gathered together without masks or social distancing on Friday.

  The event was part of the government's test programme to evaluate how to hold mass gatherings safely as the country unlocks.

  "Of course the whole thing sort of operated silently as a science experiment - they were studying ventilation and crowd patterns - but every precaution was taken to make sure we were safe," said the DJ, whose professional name is The Blessed Madonna.

  She told the BBC that those attending were "incredibly emotional".

  "I think we felt excited but also proud to be a part of creating the protocols that would lead to the reopening of all kinds of things."

  Culture Secretary Oliver Dowden has described the event as "another huge moment in our journey back to normality".

  The MP said he had attended the Snooker World Championship at Sheffield's Crucible Theatre on Friday - where initial social distancing requirements are being "gradually eased" to allow 100% capacity at the finals on Sunday and Monday.

  "I have seen first hand just how important these research events are," said Mr Dowden.

  But he cautioned: "We are making good progress but we have been clear that decisions on reopening will be led by the data.
