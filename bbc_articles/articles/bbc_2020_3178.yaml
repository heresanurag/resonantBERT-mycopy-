title: 'First Minister: This is effectively a lockdown - BBC News'
date: '2020-03-23'
section: Scotland
url: http://www.bbc.co.uk/news/live/uk-scotland-51998906
content: |-
  Measures to stop people from leaving their homes are strengthened in a bid to stop the coronavirus spread.

  Police patrols to increase in light of new restrictions

  Iain Livingstone, the chief constable of Police Scotland, said the force supported the new measures to increase social distancing and urged and expected everyone to comply. “We are aware of the proposed legislation in relation to coronavirus and are carefully considering the implications in this very fast moving situation, which presents the gravest of threats to the nation," he added. “In the meantime, Police Scotland has a clear, positive duty to both protect life and improve the safety and wellbeing of people across Scotland, while supporting the government and health agencies in our fight against this pandemic. “Therefore, until the new legislation is in place, we will be increasing police patrols in key areas across the country to engage with and provide guidance to anyone in contravention of the measures."
