content: |-
  Michael White is jailed for three years and removed from the World Snooker Tour and rankings list.

  Michael White has been removed from the World Snooker Tour and world rankings

  A snooker player jailed for assaulting his partner has been removed from the world tour and world ranking list, say the sport's authorities. Michael White, 33, from Neath, was sent to prison at Swansea Crown Court on Thursday for a total of three years after facing three counts of assault occasioning actual bodily harm. The World Professional Billiards and Snooker Association (WPBSA) said it "does not tolerate such behaviour by a member and has taken immediate action to remove Michael White as a member". It said it had been monitoring the case and had called an emergency board meeting following the sentencing.

  White’s membership will end with “immediate effect”, meaning he will also be taken off the world ranking list and World Snooker Tour (WST). “Michael White has the right to appeal the decision of the board within 21 days of the decision,” it said. The WPBSA also said that it and WST "were not a party to these [court] proceedings and therefore it was not appropriate to intervene while the criminal justice process was ongoing". It added: "Upon conclusion of the case, immediate action has been taken as outlined within our statement."

  “Michael White has rightfully been jailed after he carried out assaults on his victim on many occasions," says PC Ellen Green of South Wales Police

  After the case, PC Ellen Green of South Wales Police said: “Michael White has rightfully been jailed after he carried out assaults on his victim on many occasions, leaving them with injuries. "Tackling violence against women and girls is a priority for us at South Wales Police. Nobody should suffer in silence - this behaviour will not be tolerated." White was the youngest player to make a competitive century when he did so at the age of nine and was world amateur champion by the age of 14. He won his first world ranking title at the 2015 Indian Open in Mumbai. According to the website Snooker.org, external, White's world ranking was 60. Judge Catherine Richards sentenced White to two consecutive sentences of 17 months and 19 months in prison on two counts of assault, and ordered him to pay a £190 victim surcharge. A third assault charge was left to lie on the file, said the court.
