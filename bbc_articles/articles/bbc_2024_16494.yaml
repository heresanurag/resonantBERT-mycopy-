title: Stormzy admits to driving supercar with illegally tinted windows - BBC News
date: '2024-07-25'
section: London
url: http://www.bbc.co.uk/news/articles/c51y927e5g2o
content: |-
  The Lamborghini Urus he was driving had two front windows which only let in 4% of light.

  The 30-year-old rapper was driving a Lamborghini Urus with illegally tinted windows

  Stormzy has pleaded guilty to driving a Lamborghini with illegally tinted windows. The rapper, whose real name is Michael Ebenazer Owuo Junior, indicated a guilty plea on Wednesday to driving the Lamborghini Urus on Coombe Lane, Kingston upon Thames at about 14:45 BST on 17 October 2023, the charge sheet said. The front two windows in the car let 4% of light through but the legal requirement is a minimum of 70%, making them dark enough to "involve a danger of injury to any person", documents said. The rapper, of Kingston upon Thames, did not attend the hearing on Wednesday at Lavender Hill Magistrates' Court.

  It is also alleged that the rapper was driving a Rolls-Royce Wraith while using a hand-held phone shortly after 15:30 GMT on 7 March on Addison Road, west Kensington. Rolls-Royce Wraiths reportedly sell for £250,000 or more and Lamborghini Urus' sell for just under £200,000, according to online vehicle marketplace Auto Trader. The case was adjourned until 16 October in the same court. The court hearing comes a week after he and Love Island presenter Maya Jama announced their break-up in a joint Instagram post.
