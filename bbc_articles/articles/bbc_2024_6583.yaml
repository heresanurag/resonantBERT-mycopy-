  All fight week events are being held in Boulevard World, a huge 1.2km long entertainment attraction with areas dedicated to different parts of the globe. The news conference took place in the 'Greece' zone as the fighters took centre stage in the replica amphitheatre. But the event almost descended into chaos before it had even begun. Unforeseen road closures prevented shuttle buses from reaching the media hotel. Panic-stricken reporters jostled for last-minute taxis. Not a drop of rain had fallen all week but 45 minutes before the start the heavens opened. Fortunately for all those involved - the rain subsided and media made it in time as curious locals and a handful of tourists - en route to 'Egypt' - peered down from cable cars gliding above the Santorini-inspired setting. Joshua was short and snappy. He may not hate these obligatory fight week events, but he does not appear to overly enjoy them either. Instead it was Ngannou who stole the show. His performance against Fury has shown he is a legitimate heavyweight contender - but will he produce another Herculean effort and overcome Olympic and former world champion Joshua?
