title: 'Brits 2019: The 1975 come out on top with two big awards - BBC News'
date: '2019-02-21'
section: Entertainment & Arts
url: http://www.bbc.co.uk/news/entertainment-arts-47307988
content: |-
  The indie band won two awards, while George Ezra and Jorja Smith were named best male and best female.

  This video can not be played To play this video you need to enable JavaScript in your browser.

  The 1975 were the big winners at the Brits, taking home the awards for best British group and album of the year.

  The band said they were "humbled" to beat Anne-Marie, Arctic Monkeys and George Ezra to win the top prize.

  Singer Matty Healy also used the best group acceptance speech to address misogyny in the music industry.

  However, some viewers found out about the band's big night in advance, after a rogue TV advert announced their win ahead of the ceremony.

  It is unclear whether the band knew they had won in advance, and they did not acknowledge the mix-up during the awards show.

  Other winners on the night included George Ezra and Jorja Smith, who won best male and female respectively.

  Ezra, who performed his number one single Shotgun at the event, said "There's a not a day goes by where I don't count myself very lucky and this is the icing on the cake."

  This video can not be played To play this video you need to enable JavaScript in your browser.

  Calvin Harris bagged his first two Brit awards - from a total of 16 career nominations - for music producer of the year and best single, for One Kiss with Dua Lipa.

  He said on stage at London's O2: "I've been coming here for a few years and never had the opportunity to say anything.

  "I want to thank anyone that's bought a tune, streamed a tune, come to a show, listened to the song by accident on the radio and gone 'what's this?'.

  Dua Lipa and Calvin Harris took home the award for best single for One Kiss

  One Kiss, his collaboration with Dua Lipa, spent eight weeks at number one and was the best-selling single of 2018, with more than 1.5million combined sales, streams and downloads.

  The pair now have five Brit awards between them - Lipa won best female and British breakthrough act at last year's show.

  Pop star Anne-Marie was this year's Craig David: Leaving empty-handed after going into the ceremony with four nominations.

  The show was packed with performances from some of the biggest British artists, including The 1975, Jess Glynne and Jorja Smith.

  Hugh Jackman opened the show with the theme song to the hit film The Greatest Showman, with his performance featuring hundreds of dancers, acrobats and fire-breathing extras.

  Hugh Jackman performed a song from The Greatest Showman to open the awards

  The movie soundtrack, which was not nominated for any awards, was the UK's best-selling album of 2018.

  Little Mix won best video for Woman Like Me, which they performed on the night, and admitted they had "absolutely no shame in asking fans to vote for it every day".

  This year's international winners were noticeably absent, with best male and female winners Drake and Ariana Grande sending in pre-recorded acceptance speeches.

