title: 'DNC 2020: Watch Joe Biden''s speech at the Democratic National Convention
  - BBC News'
date: '2020-08-18'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-53815350
content: |-
  Joe Biden, Cory Booker and Andrew Yang are among a host of speakers in the virtual event's final day.

  The Democratic National Convention looks very different to previous events. The convention is usually packed with thousands of excited supporters, and marked with confetti and balloon drops, but this year it's all online because of the coronavirus pandemic.

  Speakers on Thursday, the final day, include presidential nominee Joe Biden, as well as Cory Booker and Andrew Yang, who both ran for the Democratic nomination.

  The four-day event kicks off two months of intense campaigning up to the 3 November presidential election.
