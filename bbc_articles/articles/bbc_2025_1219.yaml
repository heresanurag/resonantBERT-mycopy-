  The tit-for-tat is also playing out in court, where US district judge Yvonne Gonzalez Rogers is considering Mr Musk's request for an injunction that would block OpenAI from its planned conversion. He claims that he will be irreparably harmed without her intervention. "It is plausible that what Mr Musk is saying is true. We'll find out. He'll sit on the stand," Gonzalez Rogers said during a hearing in Musk v Altman earlier this month in Oakland, California. According to OpenAI's lawyers, Mr Musk's recent bid contradicts his earlier claims that OpenAI's assets cannot be transferred away for "private gain." "[O]ut of court, those constraints evidently do not apply, so long as Musk and his allies are the buyers," their reply brief states, external. Some observers say making a deal never appeared to be his goal. "I think he's just trying to create noise and news and consternation," says Karl Freund, founder and principal analyst at Cambrian-AI. But in addition to causing problems for his old rival, that strategy could inflict lasting damage on Mr Musk's own reputation. "He's brilliant. He creates incredible companies that are doing incredible things. But his personal agenda is causing people to question his motives," Mr Freund said.
