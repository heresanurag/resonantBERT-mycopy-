  Watch as Great Britain's Scarlett Mew Jensen and Yasmin Harper secure GB's first bronze medal as they scored over 300 points in Women's synchronised 3m springboard at the Paris 2024 Olympics.

  Watch as divers Scarlett Mew Jensen and Yasmin Harper secure Team GB's first medal of Paris 2024 with bronze in the synchronised 3m springboard after mistake by their Australian rivals on the final dive.

