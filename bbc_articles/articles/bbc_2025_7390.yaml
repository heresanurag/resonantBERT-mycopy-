content: |-
  Four party leaders faced off on Donald Trump, tariffs and security in the only English debate before Election Day.

  In an often heated two-hour debate, four of Canada's party leaders went head-to-head in discussions about Donald Trump, safety and immigration.

  Canadian Prime Minister Mark Carney, leader of the Liberal Party, came under attack for the work of his predecessor, former Prime Minister Justin Trudeau.

  "I know you want to be running against Justin Trudeau", Carney told Conservatives' Pierre Poilievre. "Justin Trudeau isn't here."

  Canadians are set to head to the polls in a snap election on 28 April.

