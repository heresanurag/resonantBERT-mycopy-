title: Rangers confirm takeover talks with investors including 49ers - BBC News
date: '2025-04-23'
section: Glasgow & West Scotland
url: http://www.bbc.co.uk/news/articles/ceqrvzdrw24o
content: |-
  Reports of interest first surfaced earlier this year but the Ibrox club has now confirmed "productive conversations" are ongoing.

  A Rangers fan holding a USA flag at Ibrox during a Scottish Premiership match in February

  Rangers have confirmed for the first time that they are in negotiations with American investors, including the San Francisco 49ers, about a possible takeover of the club. Reports of interest first surfaced earlier this year but the Ibrox club said that "productive conversations" are ongoing. In a joint statement, Rangers also added that the potential investors are looking for a controlling stake. Neither party have mentioned a timeline for any deal to be concluded, though sources close to negotiations previously said a deal was expected to be completed between April and June.

  The statement said: "Rangers and its existing controlling shareholders are in productive conversations with the two lead members of the Consortium, Andrew Cavenagh and 49ers Enterprises Global Football Group, about the potential for the Consortium to acquire control of the club and to inject additional capital. "These discussions reflect a shared recognition of the importance of Rangers FC's long-term direction, ambitions and management." BBC Sport previously reported that Paraag Marathe, the Leeds United chairman and the force behind 49ers Enterprises - the investment wing of the 49ers NFL franchise - is a key player in the prospective Rangers takeover.

  Paraag Marathe is the the Leeds United chairman and President of 49ers Enterprises

  The development comes just two days after the Elland Road side secured promotion to the Premier League. 49ers Enterprises has full control of Leeds after a £170m takeover in July 2023. Meanwhile, Rangers have now appointed Everton's director of football Kevin Thelwell as their new sporting director. The 51-year-old Englishman has already confirmed he is leaving the Merseyside club this summer. The Ibrox side's Europa League dreams ended earlier this month following a 2-0 defeat by Athletic Bilbao. Only five league fixtures remain as their city rivals Celtic prepare to clinch a 55th title and very possibly a ninth treble. Rangers posted a net loss of £17.2m in October 2024 despite what they called record revenue and income figures for the year to June. Conversations about selling Rangers have been happening in private since the second half of 2023. Since that point, there has been a growing acceptance at the club by those in charge that they were "running out of road" in terms of energy and finance.
