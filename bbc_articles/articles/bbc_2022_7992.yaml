title: 'Amir Khan: Three men charged over robbery of boxer - BBC News'
date: '2022-06-23'
section: London
url: http://www.bbc.co.uk/news/uk-england-london-61906616
content: |-
  The men are due in court after the boxer was robbed of his £72,000 watch in east London.

  The 2004 Olympic silver medallist was with his wife Faryal at the time

  Three men have been charged after former world boxing champion Amir Khan was robbed at gunpoint.

  He was with his wife on 18 April when he said a gun was pointed in his face on High Road in Leyton, east London, and his £72,000 watch was taken.

  Ahmed Bana, 25, Nurul Amin, 24, and Dante Campbell, 20, are in custody and will appear at Thames Magistrates' Court later, the Met Police said.

  They are all accused of conspiracy to commit robbery.

  The 35-year-old boxer said at the time that "the main thing is we're both safe".

  No shots were fired and no-one was injured, police said.

  Mr Bana and Mr Campbell have also been charged with possession of an imitation firearm.

  Mr Campbell, from Hornsey, is also accused of possession of an imitation firearm with intent to cause fear of violence and possession of ammunition for a firearm without certificate.

