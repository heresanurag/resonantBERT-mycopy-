  This has been a breakout year for Draper, who secured his first ATP title at the Stuttgart Open in June. That elevated the 22-year-old to British number one status for the first time, but it was a few days later at Queen's that he really made people stand up and take notice. Draper came up against Wimbledon champion Carlos Alcaraz in the second round, with the Spaniard defending a 13-match winning streak on grass. "Coming to Queen's for a home tournament, being British number one, you would think would put more stress on my shoulders - but it is the opposite," said Draper. "I feel calm and relaxed because I know I'm doing the right things. I trust in my tennis and know I'm going to be tough to beat." That calm was evident as Draper beat Alcaraz, who would later go on to defend his Wimbledon title, 7-6 (7-3) 6-3.

  Andy Murray has backed Draper to have 'a big future'

  For so long, Andy Murray was the undisputed king of British tennis - but for much of his career, there was no obvious heir. Draper put himself in contention when he took a set off Novak Djokovic on his Wimbledon debut in 2021, but injuries and fitness issues over the next couple of years threatened to derail his progress. However, he has returned to full fitness in 2024 and during his final Wimbledon, Murray was effusive in his praise of his Davis Cup team-mate. "Jack's definitely got the ability to go right to the top of the game," Murray said. "He's a really exciting player to watch and I think he's got a big future." While a second-round exit at SW19 followed, Draper's run in New York shows why he is so highly thought of by Murray. And Draper's comments about Murray after his fourth-round win over Machac in New York show the feeling is mutual. "I miss being next to his stinky shoes and all his stinky clothes," Draper said. "But Andy's a legend and if I have half the career he's had then I'll be a happy man." Draper's success so far means he follows 2012 champion Murray, 1997 runner-up Greg Rusedski and 2004 semi-finalist Tim Henman as British men who have reached the singles final four during the Open era in New York.

  Draper is not one to shy away from the spotlight off the court either. Glamorous photoshoots with stylish fashion magazines have shown his appeal to wider markets. Tatler described him as having a "jawline sharper than a Stanley knife" when he was featured alongside fellow British players Katie Boulter and Cameron Norrie last year, while he recently appeared in Vogue on his own. "I quite enjoy being in front of the camera, if I'm looking good, that is," Draper quipped to Vogue. Anna Wintour, the Vogue editor-in-chief, even sat with his support team during his fourth-round thrashing of Machac.

