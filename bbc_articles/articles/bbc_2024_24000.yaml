  There was little chance of Draper avoiding tennis when he was younger given how involved his family is in the sport. His father, Roger, was the chief executive of the Lawn Tennis Association between 2006 and 2013. Meanwhile, mother Nicky was one of Britain's top players as a junior and is now a tennis coach. His older brother Ben was also a talented tennis player and competed at US college level while at University of California-Berkeley. In more recent years, another member of the family, his dog Ozzy, has been important to Draper switching off away from the court. He says the labradoodle helps him to relax because he "couldn't care less if I've had a bad day or a great day, he's always happy". Away from tennis it must have been a mixed few days for Draper, who is a big Oasis fan and managed to get a ticket to see them next year. But he also supports Manchester United - and things have gone less well for them...
