  BBC Sport looks at Great Britain's Jack Draper and his journey to become a US Open semi-finalist.

  How Britain's Draper became US Open semi-finalist

  This video can not be played To play this video you need to enable JavaScript in your browser.

  Jack Draper has become just the fourth British man to reach the US Open singles semi-finals in the Open era. Getting the better of Zhang Zhizhen, Facundo Diaz Acosta, Botic van de Zandschulp, Tomas Machac and Alex de Minaur has carried him through to the last four, where world number one Jannik Sinner awaits. We take a look at the tennis journey that has brought Draper to this point.

  Draper was viewed as an exciting prospect from an early age in British tennis circles, but the first time he made his mark on a wider audience came in the Wimbledon juniors in 2018. The left-hander was just 16 but caught the eye at the All England Club as he progressed through the rounds. He faced a quarter-final against Lorenzo Musetti, who reached the men's semi-finals at SW19 this year, and saw off the much-fancied Italian before winning a marathon last-four battle against Nicolas Majia 7-6 (7-5) 6-7 (6-8) 19-17. Perhaps still exhausted after such an epic contest, Draper lost to Chinese Taipei’s Tseng Chun-hsin in the final, but there was enough to suggest there would be plenty more to come from him.

