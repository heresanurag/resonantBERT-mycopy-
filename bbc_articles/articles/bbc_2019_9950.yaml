content: |-
  England's hopes of regaining the Ashes look all but over after they are bowled out for 67 by Australia in the third Test at Headingley.

  Last updated on .From the section Cricket

  Men's Ashes: Third Specsavers Test, Headingley (day two of five)

  England's hopes of regaining the Ashes look all but over after they were bowled out for 67 by Australia on the second day of the third Test at Headingley.

  The home side were skittled for their lowest Ashes total since 1948 before Australia moved to 171-6, to lead by 283 at the end of a day when 16 wickets fell.

  It amounted to one of England's most dismal home Ashes days in recent memory, where they went from genuine optimism about levelling the series to the brink of being 2-0 down with two Tests to play.

  Their reply to Australia's first-innings 179 was simply awful. The visitors' bowling was magnificent, but flimsy England were blown away in ideal batting conditions.

  Pace bowler Josh Hazlewood took 5-30, while Joe Denly was the only batsman to reach double figures - his 12 is the lowest top-score in an England Test innings.
  • None 'This was England's chance - it feels like the Ashes are gone'
  • None 'Hope turns to gallows humour as England unravel at Headingley'
  • None England have not prepared properly for Ashes - Vaughan

  There was a glimmer of hope for England when Australia were reduced to 52-3 in their second innings, only for Marnus Labuschagne to take it away with his unbeaten 53 off 139 balls.

  He was dropped twice and caught behind off a no-ball, each miss adding further frustration to England's desperately disappointing day.

  At some point on Saturday or Sunday, Australia look likely to secure at least a series draw, which is all they need to take the urn back down under by virtue of their 4-0 success on home soil in 2017-18.

  England were hammered by 251 runs in the first Test, but seemed to have reversed the momentum by having the better of the drawn second match at Lord's, not least because of the introduction of the pace of Jofra Archer.

  It was Archer who bowled Australia out on Thursday with 6-45, giving England a golden opportunity to bat themselves into a dominant position in the Friday sunshine.

  That they fell in such a pathetic heap was not only the latest in a long line of batting disappointments, but also effectively ended what was shaping up to be a tremendous battle for the Ashes.

  Instead of being level with two to play, England's best hope is to draw the series and end a winless run against Australia which is almost certain to move to nine matches.

  As they do, they will have to consider how they use Archer, who hobbled off the field with cramp without being able to complete his 70th over in the space of nine days.

  It was a sad contrast to the end of the first day, when he was cheered from the ground. It perfectly mirrored the change in mood - from euphoria on Thursday, Headingley was a picture of deflated dejection on Friday.

  Even if England supporters are used to seeing the batting fail - this was the third time this year they have been bowled out for less than 100 - this was a particularly inept display.

  Whereas Australia were skittled in perfect bowling conditions on Thursday, England were unable to deal with a hint of movement because of weak defence, a lack of patience and loose strokes.

  Four were caught driving - Denly, Jason Roy, Jos Buttler and Ben Stokes, to one he could barely reach. Three others perished to short balls.

  Only captain Joe Root can count himself unfortunate to have edged a lovely delivery from Hazlewood, but that does not change the fact that the captain has registered successive ducks and been dismissed twice in three balls.

  England's miserable day was compounded in the field. Root dropped Labuschagne on 14 off the wholehearted Stokes, who was found to have overstepped during a review that would have seen the same batsman given caught behind and then had the right-hander put down by wicketkeeper Jonny Bairstow on 42.

  Stokes and Stuart Broad did remove Matthew Wade and Tim Paine respectively in consecutive overs late in the day, strikes that surely came too late to impact the result.

  England's meekness was matched by the ruthlessness of Australia. The tourists were incisive with the ball, took sharp catches and had clever plans for each batsman. In the evening, they took advantage of their good fortune to move practically out of sight.

  Pace bowler Hazlewood was excellent. His mode of attack was to hammer a length on and around off stump, examining England's batsmen with slight seam movement. James Pattinson did the same.

  When they found the edge, David Warner grabbed four smart catches at first slip.

  Pat Cummins was the aggressor, bowling with hostility to bounce out all of Rory Burns, Chris Woakes and Archer.

  Although Australia's own top order wobbled, they were steadied by Labuschagne, who made his third successive half-century and added 66 for the fifth wicket with Wade.

  Admittedly, Labuschagne had luck, but he still demonstrated all of the virtues of Test batsmanship that seem beyond many of the England side.
  • None England's 67 is their 12th lowest Test score of all time, their fourth lowest at home and their lowest at Headingley
  • None At 167 balls, it is England's ninth shortest completed Test innings
  • None It is England's lowest Test score against Australia since making 52 at The Oval in 1948
  • None It is the fourth time England have been dismissed for under 100 since the start of 2018 (after 58 v New Zealand, 77 v West Indies, 85 v Ireland) and the third time in 2019
  • None Joe Denly's 12 is the lowest highest score in a Test innings for England
  • None There have been 16 extras in Australia's second innings, more than any England batsman managed

  Former England captain Michael Vaughan on BBC Test Match Special: "Let's be honest, the Ashes have been retained.

  "If England had batted 70 overs they would have had a lead. They should comfortably be able to face a quality bowling line-up with the talent in their dressing room. It's just not good enough."

  England batting coach Graham Thorpe: "The cold, hard truth is we weren't good enough today. Test cricket is mentally challenging. You can't hide.

  "It was a golden opportunity for us today. But we've let it slip and we've let it slip badly through a bat batting performance. We collapsed in a heap.

  "We aren't going to say we can't win it, but we have made it a damn sight harder. We will try and knock them over tomorrow and chase whatever they set us."

  England's leading Test run-scorer Alastair Cook: "Australia were fantastic with the ball. They challenged England and England weren't good enough to handle it."

  Australia bowler Josh Hazlewood: "We didn't do too much, just put the ball in the right areas and we took our chances. We had a bit of luck."

  BBC cricket correspondent Jonathan Agnew: "This feels like a watershed moment. It feels like a complete let-down. It can't carry on like this."
