title: Trump impeached for second time - BBC News
date: '2021-01-14'
section: US & Canada
url: http://www.bbc.co.uk/news/live/world-us-canada-55645957
content: |-
  Ten members of his own party voted against the president over his role in the deadly riots at the US Capitol.

  President Trump has just become the first sitting president to be impeached twice by the US House of Representatives.

  We asked members of our BBC voter panel to weigh in as well.

  Here's what they said:

  Quote Message: Everything he has done is unconstitutional and, as a president, the number one thing he should be doing is upholding the Constitution. If not for him continually fighting the election results and claiming the election was stolen, if not for him holding that rally near the Capitol, if not for him talking about 'uprising', last week would very likely not have happened. Unfortunately it was completely predictable. from Melissa Dangaran 51, from Minnesota Everything he has done is unconstitutional and, as a president, the number one thing he should be doing is upholding the Constitution. If not for him continually fighting the election results and claiming the election was stolen, if not for him holding that rally near the Capitol, if not for him talking about 'uprising', last week would very likely not have happened. Unfortunately it was completely predictable.

  Quote Message: Unprecedented. He should not have been impeached at all. There is no justification, no legal basis, no constitutional basis for it. It's a rush to judgment for ulterior motives and a dark stain on our country. I'm concerned about the double standard and I'm afraid our Constitution is on its deathbed. Why would anybody who's rational think that our president meant for people to go break into the Capitol? from Belinda Noah 45, from Florida Unprecedented. He should not have been impeached at all. There is no justification, no legal basis, no constitutional basis for it. It's a rush to judgment for ulterior motives and a dark stain on our country. I'm concerned about the double standard and I'm afraid our Constitution is on its deathbed. Why would anybody who's rational think that our president meant for people to go break into the Capitol?

  Quote Message: It's more of a symbolic impeachment at this point because he'll be out soon, but it's necessary nonetheless. Not only is he a threat to our national security, but he doesn't condone white supremacy and other threats. It's deeply saddening to me. from Williams Morales 19, from Georgia It's more of a symbolic impeachment at this point because he'll be out soon, but it's necessary nonetheless. Not only is he a threat to our national security, but he doesn't condone white supremacy and other threats. It's deeply saddening to me.

  Quote Message: I was in DC at the rally - not near the Capitol - but I saw the president speak with my own eyes and he did not call for anyone to storm the building or cause harm. It's just a way to ensure he will not run in the next four years. It is political and it will create a bigger divide between left and right. All violence should be condemned fairly and justly. It was a very sad outcome, but I do not believe it was the most horrible day in our country's history. from Gabriel Montalvo 21, from New York I was in DC at the rally - not near the Capitol - but I saw the president speak with my own eyes and he did not call for anyone to storm the building or cause harm. It's just a way to ensure he will not run in the next four years. It is political and it will create a bigger divide between left and right. All violence should be condemned fairly and justly. It was a very sad outcome, but I do not believe it was the most horrible day in our country's history.
