  Elsewhere, while some of Mrs May's MPs have urged her not to pay any money to the EU unless a deal is struck, Chancellor Philip Hammond - who backed Remain - is understood to have told the cabinet the UK could face a big bill at the end of any transition period even if no deal is reached.

  According to the Daily Telegraph, that bill could be £36bn.

