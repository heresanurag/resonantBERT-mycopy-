  In the negotiations, she added, there should be a "significant difference between a membership of the EU and a partnership with the EU as a third country".

  Wednesday's European Council meeting was meant to be the occasion when the remaining 27 EU member states gave the green light for a special summit in November to finalise the terms of Britain's withdrawal from the EU.

  Both sides want to get an agreement in place within the next few weeks to avoid the prospect of the UK leaving without a deal on 29 March.

  But chief Brexit negotiator Michel Barnier is expected to say talks have failed to make the "decisive progress" the EU wanted to see before agreeing to a special summit.

