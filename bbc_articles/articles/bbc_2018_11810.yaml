id: bbc_2018_11810
title: 'Theresa May: Brexit deal possible with intensive work - BBC News'
date: '2018-10-17'
section: UK Politics
url: http://www.bbc.co.uk/news/uk-politics-45882360
content: |-
  The UK prime minister is meeting EU leaders in Brussels with talks deadlocked over the Irish border.

  "Intensive" work is needed to overcome differences on the Irish border and reach a Brexit deal, Theresa May says.

  Speaking in Brussels, where she hopes to convince her counterparts to back her plan, the UK prime minister said "considerable progress" had been made in recent weeks.

  She has held meetings with key figures before addressing leaders ahead of their dinner this evening.

  A senior EU official suggested Mrs May had offered "nothing new" of substance.

  "There was a message of goodwill and readiness to reach an agreement, but I didn't perceive anything substantially new in terms of content," said Antonio Tajani, president of the European Parliament.

  Ahead of the summit, Labour said the government was "too weak and too divided" to reach a deal.

  Earlier Mrs May and Jeremy Corbyn clashed over Brexit at Prime Minister's Questions, with the PM rejecting the Labour leader's claim that her planned long-term relationship with the EU, known as the Chequers plan, was "dead".

  What is the Chequers plan? This plan for Brexit was agreed by the Cabinet at the prime minister’s country residence, Chequers, in July 2018. It proposes tax or tariff-free trade with the EU, while leaving the UK free to pursue trade deals outside the EU. Under the plan, the UK would collect tariffs on the EU’s behalf for any goods entering the country but destined to be sent on to EU countries. Because EU tariffs had been collected, there would not need to be a separate border between Northern Ireland and the Republic. But the UK would have to follow EU rules, “the common rule book”, on things like food standards to avoid unnecessary border hold-ups. The plan also proposes ending the free movement of people, giving back the UK control over immigration rules. Former Brexit Secretary David Davis and former Foreign Secretary Boris Johnson both resigned their posts over the Chequers plan because they believe it means the UK would still be too closely tied to the EU.

  Both sides say they want to reach a deal, but preparations are taking place for what happens if they cannot agree by the time the UK leaves the EU on 29 March.

  In a new publication, the French government says Britons wanting to visit France, following a no-deal Brexit, could need a visa if they want to stay for three months or more. And those who were already living there could be treated as being in France illegally unless they have the necessary residence permits.

  It also said checks would need to be established on goods and people going to and from the UK as well as veterinary checks on animals and animal products.

  While the draft bill sets out the actions the government could take, it is not yet clear what the measures will be and the publication states any rules for expats could easily be adapted.

  German Chancellor Angela Merkel said there was still time to reach a "good and sustainable Brexit deal" but that her government was also preparing for no deal in areas like citizens' rights and customs.

