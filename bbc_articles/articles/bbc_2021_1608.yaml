title: Is another Beast from the East on the way? - BBC Weather
date: '2021-02-07'
section: Features
url: http://www.bbc.co.uk/weather/features/55936391
content: |-
  Easterly winds are set to bring a spell of substantial and potentially disruptive snow to parts of the UK in the coming days.

  This video can not be played To play this video you need to enable JavaScript in your browser. Is another Beast from the East on the way?

  The UK is set to experience much colder conditions by the end of the weekend, with some significant spells of snow likely.

  The Met Office has issued an amber warning for snow across parts of south east England with 5-10cm or more of fresh snow expected on Sunday. There are additional yellow warnings for snow and ice issued across the country through the weekend.

  Cold air coming from the Arctic Circle will spread in from the east over the weekend and as it tracks across the relatively mild North Sea, showers will form, bringing snow to eastern areas of the UK and a significant wind chill.

  The cold conditions have been influenced by three 'sudden stratospheric warming' events in the last month, which have disrupted weather patterns.

