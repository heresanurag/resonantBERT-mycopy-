  • None Fulham's 31-game winless streak away from home against Burnley in all competitions is their longest run without a victory on the road against an opponent in their history.
  • None There have been just 24 Premier League goals scored at Turf Moor this season (Burnley scoring 10 and conceding 14) - the joint-lowest total at a top-flight ground in 2020-21 (level with Craven Cottage).
  • None Fulham have gone six consecutive away games without defeat in the Premier League (W1 D5), their joint longest such run in the competition (also in August 2004 under Chris Coleman).
  • None Burnley have conceded the first goal of the game in eight of their 12 Premier League matches at Turf Moor this season, including each of the past five - only Sheffield United (10) have done so more often on home soil in the competition this campaign.
  • None There were just 224 seconds between Ola Aina's opener for Fulham and Ashley Barnes' equaliser for Burnley.
  • None Burnley's Jay Rodriguez has assisted in back-to-back Premier League games for the first time in his career, with this his 196th appearance in the competition.
  • None Burnley's Robbie Brady is the only player to have been substituted on and off in two separate Premier League games this season.
