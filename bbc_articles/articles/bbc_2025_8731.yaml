title: Nineteen injured in fatal M4 minibus crash near Reading - BBC News
date: '2025-05-12'
section: Berkshire
url: http://www.bbc.co.uk/news/articles/cz0dmp39ne9o
content: |-
  The M4 in Berkshire was closed for several hours on Sunday following the incident near Reading.

  All of the emergency services responded to the crash on Sunday

  Nineteen people were injured in a fatal minibus crash on a motorway slip road in which a child died, a fire service has said. The minibus overturned on the link road from junction 10 of the M4 to the A329(M) near Reading, Berkshire, at about 14:45 BST on Sunday. The motorway reopened after about three hours but the slip road remained closed through Monday. Royal Berkshire Fire and Rescue Service said two people were found to be trapped, with a total of 19 people being injured and receiving care from firefighters and paramedics.

  The child died at the scene and the fire service handed over responsibility for the scene to Thames Valley Police at about 17:00. The police force confirmed on Sunday that no arrests had been made.

