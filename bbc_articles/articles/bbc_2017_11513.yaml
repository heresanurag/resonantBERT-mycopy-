title: Catching fly-tippers in the act - BBC News
date: '2017-11-25'
section: General
url: http://www.bbc.co.uk/news/uk-42116278
content: |-
  When fly-tipping occurs on private property, it can be very costly for landowners.

  Councils in England spend £58m a year on clearing rubbish that is dumped on the street illegally.

  But when fly-tipping occurs on private property, it can be a huge cost to landowners.
