title: Bumbling police tweet '80-year ban' for dangerous driver - BBC News
date: '2017-09-22'
section: Manchester
url: http://www.bbc.co.uk/news/uk-england-manchester-41362923
content: |-
  Police backtrack after tweeting a sentencing for a dangerous driving conviction that was 78 years out.

  This video can not be played To play this video you need to enable JavaScript in your browser. Mohammed Ahsan was disqualified for two years for dangerous driving

  Bumbling traffic police were forced to backtrack after wrongly claiming a dangerous driver was banned for 80 years.

  Mohammed Ahsan, 20, of Hibbert Street, Manchester, was actually disqualified for two years after pleading guilty at Manchester Magistrates' Court.

  The GMP Traffic Twitter account announced the inflated ban along with a video of Ahsan's crash.

  It then posted: "It wasn't a typo! He is actually banned for 80 years!"

