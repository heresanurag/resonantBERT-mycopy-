id: bbc_2017_11512
title: Two men arrested after triple stabbing - BBC News
date: '2017-11-25'
section: Northern Ireland
url: http://www.bbc.co.uk/news/uk-northern-ireland-42123559
content: |-
  Two men in their 20s are arrested after three men were stabbed in north Belfast.

  The police said they received a report at about 00:45 GMT on Saturday morning

  Two men in their 20s have been arrested after a triple stabbing in north Belfast.

  A 20-year-old woman, who was arrested earlier on suspicion of attempted murder, has been released on bail pending further enquiries.

  Three men, all in their 20s, were stabbed in north Belfast in the early hours of Saturday and are all in a stable condition in hospital.

  One of the men was found with stab wounds to the head

  One of the men was found with stab wounds to the head.

  Another suffered a head injury and stab wounds to the neck.

  The third underwent surgery for abdominal injuries.

  The police said it had received reports of a disturbance at a property in the York Park area at about 00:45 GMT on Saturday morning.

  The police found the man with stab wounds to his head inside the house.

  The other two men were found a quarter of a mile away near a retail premises on the Shore Road.

  Police have appealed for information and would like to hear from anyone who was in the York Park area between 00:15 and 01:15.
