title: Deserted streets in Israel's border towns - BBC News
date: '2024-09-27'
section: General
url: http://www.bbc.co.uk/news/videos/cp8e5w1j13zo
content: |-
  Paul Adams visits the border town of Kiryat Shmona as rockets continue to be fired from Lebanon.

  Israel says it will do whatever it takes to push Hezbollah back from the border and return Israeli civilians to their homes in the north of the country.

  Thousands of Israelis have left, living away in hotels, kibbutzim or with relatives.

  The BBC's Paul Adams was shown around the streets of the country's northernmost town of Kiryat Shmona as Hezbollah continues to fire rockets at buildings from Lebanon.
