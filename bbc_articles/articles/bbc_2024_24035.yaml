  Tadeusz Moron was driving over the speed limit while going to pick his mother up from the airport.

  Man doing 100mph not deliberately speeding, says judge

  Tadeusz Moron was caught doing 100mph on the A29 near Dungannon

  A man who was caught driving at 100mph was not involved in "deliberate speeding", a judge said as he fined him and handed him five penalty points. Tadeusz Moron, from Lisnagowan Road in Dungannon, was clocked in June by a mobile camera device on a section of the A29 which has a 60mph limit. A defence barrister told Dungannon Magistrates' Court that 55-year-old Moron was going to collect his mother from the airport. District Judge Peter Magill imposed a fine of £650 as well as the penalty points.

  The barrister said Moron was "struggling a bit for time and was anxious about his mother who was travelling alone". District Judge Magill said in "normal circumstances" he would give Moron a £65 fine and three penalty points, but added: "That can’t happen here." "You have a clear record and there was a reason why you were rushing. It’s not an excuse but at least there was a reason behind what you were doing," he said. The judge said that rather than deliberate speeding, Moron had "something weighing on his mind" and noted he had no previous record. This story has been updated to correct an error in relation to the speed the defendant was driving at.
