title: 'Hawaii: Video shows progression of Kilauea volcano''s eruption - BBC News'
date: '2024-06-04'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-66772396
content: |-
  One of the world's most active volcanoes has erupted again on Hawaii's Big Island.

  Hawaii's Kilauea volcano, one of the world's most active, erupted again on Sunday, spewing fountains of lava more than 80ft (24m) in the air.

  Footage from the US Geological Survey shows how the event unfolded over several hours.

  The eruption "does not pose a lava threat to communities", but volcanic particles and gases may create breathing problems for people exposed, the Hawaii Emergency Management Agency said.
