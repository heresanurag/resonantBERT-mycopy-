title: 'Coronavirus: Adventure days for NHS staff and families - BBC News'
date: '2020-08-20'
section: General
url: http://www.bbc.co.uk/news/uk-england-berkshire-53833706
content: |-
  The key workers are given a chance to escape the stress of Covid-19 by an outdoor centre.

  NHS workers have been given a break from the stress of four months on the frontline fighting coronavirus.

  The Path Hill activity centre, near Reading in Berkshire, has teamed up with a local charity to say thank you by running outdoor adventure days.

  Forty families from hospitals across Berkshire and Oxfordshire have had the chance to spend time together in socially-distanced groups - learning activities like raft building and making campfires.
