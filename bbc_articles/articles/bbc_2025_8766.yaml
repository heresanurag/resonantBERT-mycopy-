  British couple die after Ferrari plunges into river in Spain

  A British couple have died in northern Spain after the sports car they were travelling in came off the road and landed in a river. The crash happened in a mountainous area in the region of León. The Civil Guard said the victims, a 78-year-old man and a 58-year-old woman, were driving through a rural area near the town of Boca de Huérgano when the Ferrari plunged into the Yuso river. A Foreign Office spokesperson said: "We are supporting the families of a British man and woman who died in Spain and are in contact with the local authorities."

  Local authorities said firefighters had to clear thick vegetation in order to reach the car, which was upside down and partially submerged in water. Both occupants of the car were already dead when their bodies were recovered. The Civil Guard said the cause of the crash is not yet clear.
