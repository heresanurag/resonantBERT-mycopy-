content: |-
  Thousands of soldiers, sailors and airmen will all be taking part in today's Coronation.

  Service personnel from the Army, RAF and Royal Navy arrive at Waterloo Station to take part in the coronation of King Charles III.

  You can watch full highlights of the Coronation now, on BBC iPlayer.
