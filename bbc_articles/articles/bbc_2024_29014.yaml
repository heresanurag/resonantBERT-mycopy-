content: |-
  Labour’s cabinet remains divided on how to vote on Friday’s bill to legalise assisted dying.

  Assisted dying bill about right to choose - minister

  This video can not be played To play this video you need to enable JavaScript in your browser.

  The assisted dying bill has been defended by Work and Pensions Secretary Liz Kendall who told the BBC it was about the "right to choose". She refused to criticise Justice Secretary Shabana Mahmood, who wrote to her constituents this weekend saying the proposed changes would create a “slippery slope to death on demand”. Kendall told Sunday with Laura Kuenssberg she believed the bill would give people "power, choice and control" over their own deaths. The bill, which would allow some terminally ill people to have a medically assisted death, is to be debated by MPs on Friday.

  Speaking on Sunday with Laura Kuenssberg, Kendall said: "I think you should have the right to choose. "The point is not that this is for everybody." Kendall, who is a long-time advocate of assisted dying, called the debate on the bill part of a “bigger” national discussion as more people "have longer deaths". Her comments came as 29 faith leaders representing Christians, Muslims, Jews, Hindus and Sikhs signed an open letter warning the Terminally Ill Adults (End of Life) Bill, would lead to people being pressured into ending their lives to avoid burdening families or the NHS. MPs will get a free vote on Friday on the bill - introduced by Labour MP Kim Leadbeater - meaning they can follow their conscience rather than party orders. Public opinion shows a majority support of changing the law, with the latest YouGov poll, showing 73% of Britons, external support allowing assisted dying in principle. Campaigning for both sides continues in the run-up to Friday's vote, which will be the first public expression of MPs' support.

  Former Labour prime minister Gordon Brown told BBC Radio 4's Sunday programme he wanted to see more debate on the issues. "People want to know what the evidence is for the scale of the challenge," he said. Brown is a longstanding critic of assisted dying and urged MPs to vote against changes saying: "I see life as a gift - I see it as something to be valued."

  Mahmood joined Health Secretary Wes Streeting and Education Secretary Bridget Phillipson who have already said that they would vote against the bill. Care Minister Stephen Kinnock expressed his support for the bill, while Prime Minister Sir Keir Starmer backed assisted dying proposals the last time they were debated by MPs in 2015. This time round he has said he will not pressurise Labour MPs either way. Campaigners supporting the bill, including broadcaster Dame Esther Rantzen, argue terminally ill people should get a choice over how they die to avoid unnecessary suffering. Dame Esther, who revealed last year she had joined Dignitas after a terminal cancer diagnosis, described the new bill as “wonderful”. In her letter, Mahmood said the most significant risk of introducing assisted dying is "the pressure the elderly, vulnerable, sick or disabled may place upon themselves" to end their lives sooner. She said she was "profoundly concerned" by the legislation, not just for religious reasons but because it could create a "slippery slope towards death on demand" and argued the government must “protect and preserve life, not take it away”. Mahmood added that scandals like Hillsborough, infected blood and the Post Office Horizon "reminded us that the state and those acting on its behalf are not always benign". Speaking to Sky News, Leadbeater said she had no doubts "whatsoever" her proposed bill was the right thing to do. Current laws are "failing" causing families to lose loved ones in "harrowing circumstances" and leaving people to endure "painful deaths", she said. "By creating a legal framework, we will improve the situation," she added.

  The divide on the assisted dying bill has not split neatly down party lines. Conservative shadow housing secretary Kevin Hollinrake told the BBC he plans to back the bill. Hollinrake argued he and others "would like that choice" at the end of their lives and he did not "think it’s right for the state to prevent them". While acknowledging other ministers concerns, he said he trusted Parliament to keep checks in place to protect the system.

  Veteran broadcaster Jonathan Dimbleby rejected fears of a "slippery slope" on assisted dying, citing Oregon in the US - which introduced similar laws 27 years ago without expanding them further. Appearing on the Sunday with Laura Kuenssberg panel, Dimbleby said he backed the bill and had been influenced by the experience of his brother Nicholas who died of motor neurone disease. However former culture secretary Nadine Dorries said she was against the bill and called for more palliative care. She said she was "forever grateful" her late husband had changed his mind about taking his own life after a terminal bowl cancer diagnosis, allowing him to have "the best four months" with his family before dying. Broadcaster Piers Morgan meanwhile told the panel he felt conflicted but urged for more hospice funding to ensure peaceful deaths for the terminally ill.
