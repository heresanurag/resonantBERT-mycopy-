  The UK education secretary also says longer school days and shorter holidays could help pupils catch up.

  'We've tried to give nurses as much as we can' - PM

  The prime minister was also asked about England's nurses' proposed 1% pay rise, which, as we're been reporting, has not gone down well with unions, nor Labour. He told reporters at the vaccination centre: "What we have done is try to give them as much as we can at the present time." He pointed out that the independent pay review body would look at the proposals, and come back. "Don't forget that there has been a public sector pay freeze, we're in pretty tough times," he added. "We've tried to give the NHS as much as we possibly can and that means, in addition to the £140bn of annual money, we've got another £62bn we've found to help support the NHS throughout the crisis," he said. "My gratitude is overwhelming and I'm so grateful particularly to the nurses, and thankfully we are seeing more nurses now in our amazing NHS - there are 10,000 more nurses this year than there were last year." Our Reality Check colleagues have been looking at nurses' pay in a lot more depth here.
