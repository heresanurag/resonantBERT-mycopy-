  Is the mutant Covid variant already in the US?

  Public health experts in the US have been weighing in on the UK's discovery of a new mutant variant of Covid-19, with many saying that there is a solid likelihood that the virus is already present in the US. Dr Anthony Fauci, the top US disease researcher, told ABC News this morning that it is "certainly possible" that the mutant strain is already present in the US. "I mean, when you have this amount of spread within a place like the UK that you really need to assume that it's here already," he said. "It may not - and certainly it's not the dominant strain, but I would not be surprised at all if it was already here." The former commissioner of the Food and Drug Administration (FDA), the regulator tasked with approving vaccines and medicines, said the new strain “is already in the US.” “I don’t think a travel ban [on the UK], at this point, is going to prevent this mutated strain from coming into the United States,” Scott Gottlieb told CNBC.
