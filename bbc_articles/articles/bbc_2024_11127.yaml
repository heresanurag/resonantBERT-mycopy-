url: http://www.bbc.co.uk/news/articles/c0kk5018nq1o
content: |-
  Nasen Saadi is charged with murder and attempted murder after two women were stabbed on a beach at night.

  Man charged with stab murder of woman on beach

  Amie Gray (left) was stabbed multiple times on a beach in Bournemouth

  A 20-year-old man has been charged with murdering a woman who was fatally stabbed on a beach. Two women from Poole, Dorset, were attacked on Durley Chine Beach in Bournemouth at about 23:45 BST on 24 May. Amie Gray, a 34-year-old personal trainer, died at the scene, while a 38-year-old woman was taken to hospital with serious stab wounds. Nasen Saadi, from Croydon, London, who is also charged with attempted murder, is due to appear before Poole Magistrates' Court on Saturday.

  Durley Chine Beach was cordoned off after the attack

  Two locations in Bournemouth were forensically examined, along with two addresses in Croydon, according to Dorset Police. An enhanced police presence would remain in the area into the weekend, the force added. Det Supt Richard Dixey, of the major crime investigation team, previously described the case as "fast-moving" and "extensive". He said: “Our thoughts remain with the family and loved ones of Amie Gray, as well as the woman who was seriously injured."

  Flowers were left at the scene of the stabbing

  Mrs Gray, who was head coach at a women's indoor football team, died from "multiple stab wounds", an inquest into her death revealed. Her wife Sian said she would be missed "immensely". She was described by her mother, Sharon Macklin, as "amazing, funny and kind" with an "energetic soul". "She was beautiful inside and out and there are no words that can express how empty our lives will be without her," she added. The second victim was discharged from hospital on Thursday.
