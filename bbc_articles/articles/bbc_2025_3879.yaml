content: |-
  At least 20 people have died after tornadoes and severe storms tore through central and southern states.

  At least 20 people have died after tornadoes and severe storms tore through central and southern parts of the US.

  A spate of fresh tornado warnings were issued in Missouri and Tennessee, with lightning and strong winds forecast.

  In Georgia, Governor Brian Kemp declared a state of emergency - warning residents to "be prepared".
