title: Labour is ready to govern, Jeremy Corbyn tells party conference - BBC News
date: '2018-09-26'
section: UK Politics
url: http://www.bbc.co.uk/news/uk-politics-45646690
content: |-
  The Labour leader vows to "rebuild and transform our country" in his party conference speech.

  This video can not be played To play this video you need to enable JavaScript in your browser. Jeremy Corbyn: "As it stands, Labour will vote against the Chequers plan or whatever is left of it"

  Labour is "ready" to start work on a "radical plan to rebuild and transform our country", Jeremy Corbyn has told his party conference in Liverpool.

  The Labour leader vowed to end the "greed-is-good" culture that has dominated politics and "kickstart a green jobs revolution".

  "We represent the new common sense of our time," he told the Labour faithful.

  Mr Corbyn also offered to back Theresa May if she presented a "sensible" Brexit deal to MPs for approval.

  But he said that Labour would oppose the PM's current plan "or whatever is left of it", and vowed to fight any move to leave the EU without a deal.

  Labour is hoping to force a general election if the final Brexit settlement is rejected by Parliament, and has not ruled out backing another referendum if one is not called.

  Mr Corbyn spoke for more than an hour, setting out his vision for a "fairer society under Labour" to enthusiastic support in the hall.

  "When we meet this time next year let it be as a Labour government. Investing in Britain after years of austerity and neglect and bringing our country together after a decade of division," he told delegates, to cheers.

  He told them "the old way of running things isn't working anymore" and Labour's better-than-expected election result last year showed voters were ready for something new.

  "Ten years ago this month, the whole edifice of greed-is-good, deregulated financial capitalism, lauded for a generation as the only way to run a modern economy, came crashing to earth, with devastating consequences.

  This video can not be played To play this video you need to enable JavaScript in your browser. Jeremy Corbyn tells the Jewish community: "We are your ally"

  "But instead of making essential changes to a broken economic system, the political and corporate establishment strained every sinew to bail out and prop up the system that led to the crash in the first place.

  "People in this country know - they showed that in June last year - that the old way of running things isn't working any more."

  The Labour conference is more at ease with itself this year, and this speech was designed to show the rest of the country that that party has solid, credible, worked-out answers for the questions of the day.

  Scepticism about his programme still runs far and wide in the parliamentary party at Westminster.

  But this Liverpool gathering has more or less, despite tensions over the EU, shown that Labour has moved on from the turmoil when Mr Corbyn first took over.

  Party conferences are always a shop window for leaders to show their wares to the rest of the country.

  Labour members voted on Tuesday to keep all options on the table - including a fresh referendum - if there is no Brexit deal with Brussels.

  Mr Corbyn said in his speech he would support Theresa May on Brexit - if she got a "sensible" deal that included a customs union that prevented the return of a hard border in Northern Ireland and protected workers' rights.

  He said Labour would vote against the PM's Chequers plan "or whatever is left of it" and oppose leaving the EU without a deal, which he said would be a "national disaster".

  But he told Mrs May: "If you deliver a deal that includes a customs union and no hard border in Ireland, if you protect jobs, people's rights at work and environmental and consumer standards - then we will support that sensible deal.

  "A deal that would be backed by most of the business world and trade unions too.

  "But if you can't negotiate that deal then you need to make way for a party that can and will."

  This call, delivered with venom by Mr Corbyn, went down well in the hall. Delegates gave their leader a standing ovation and there was an outbreak of "Oh, Jeremy Corbyn".

  Mrs May has consistently ruled out a customs union with the EU after Brexit.

  The Labour leader also used his speech to announce plans to create 400,000 skilled jobs with new investment in fresh wind farms and insulation for homes.

  He pointed to Labour's commitment to reduce the UK's net carbon emissions by 60% by 2030 - and to zero by 2050.

  Labour's energy plans would "make Britain the only developed country outside Scandinavia to be on track to meet our climate change obligations", said Mr Corbyn.

  And they would bring "skills and security to communities held back for too long", in all parts of the UK.

  Turning to the row over anti-Semitism in Labour, Mr Corbyn said it had caused "immense hurt and anxiety" and there was a standing ovation as he told Jewish people: "We are your ally."

  Being anti-racist was "integral to our very being", he went on, adding that he would not accept being accused of anti-Semitism by "Tory hypocrites", criticising the government's "hostile environment" immigration policies and MEPs' "support" for the Hungarian government of Viktor Orban.

  On foreign policy, Mr Corbyn said evidence "now points clearly to the Russian state" as being responsible for the Salisbury poisoning and promised "no more reckless wars of intervention" like those in Iraq and Libya.

