title: The man behind Australia's most viral meme dies at 82 - BBC News
date: '2024-08-08'
section: Australia
url: http://www.bbc.co.uk/news/articles/c9d1ynqpnxxo
content: |-
  Jack Karlson became an internet sensation as the subject of the "Succulent Chinese Meal" viral clip.

  “Gentlemen, this is democracy manifest” is now one of the most famous quotes in Australian pop culture

  A man responsible for one of the most viral clips in Australian history has died at the age of 82. The prison escapee and on-again off-again petty criminal – whose best-known alias was Jack Karlson – shot to fame in 2009, after a clip of his dramatic 1991 arrest outside a Chinese restaurant in Brisbane was uploaded to the internet and enthralled the world. “What is the charge? Eating a meal? A succulent Chinese meal” Karlson – born Cecil George Edwards – theatrically shouted, while resisting a string of officers. “Gentlemen, this is democracy manifest” and “get your hand off my penis” were among his other, now immortalised, phrases.

  The seminal moment has inspired thousands of memes, musical remixes, reaction videos – and even a few tattoos. Democracy Manifest is also the name of a purebred Australian racehorse. Karlson's family confirmed he had passed away in hospital on Wednesday, following a battle with prostate cancer, surrounded by loved ones. "He walked a full and colourful path and despite the troubles thrown at him, he lived by his motto – to keep on laughing," they said in a statement. Karlson had captivated the nation's media again in June, after he reunited with one of the policemen, Stoll Watt, who had arrested him that fateful day, to announce an upcoming documentary into his obscure and eccentric life. Although he was a convicted criminal, Karlson had always maintained that the 1991 incident was a case of mistaken identity. And after the footage emerged on the internet, it was broadly speculated that Karlson had been confused for a Hungarian chess player, famous for dine-and-dash attempts across the country at the time. "They thought I was some international gangster", he said. "Typical police grabbing you – if they can put something on you, they'll do it." In a recent interview with ABC News, Karlson described his long life as one of adventure. It reportedly included three jail breaks and multiple run-ins with authorities. And his theatrics apparently continued into his final weeks. His niece Kim Edwards told Australian broadcaster SBS: "He had a few attempts to escape [hospital] and pulled his cords out a couple of times and asked us many times to sneak in his pipe. "As a final send off we gave uncle a last taste of red wine through his drip just before it was removed." Those who knew him though, say his childhood was akin to a Charles Dickens tragedy - describing a youth spent in and out of care homes and government institutions. Tributes have flooded social media following the news of his passing.

  Memes of the theatrical arrest have made their way onto memorabilia

  "Sad news: Mr Democracy Manifest has died. The cultural icon, whose arrest inspired a thousand t-shirts and millions of downloads, had advanced cancer," Chris Reason, the reporter who covered the now infamous squabble, wrote on X. "His immortal words will echo through generations." One fan, Danny Kingston, posted a photograph of himself wearing a T-shirt depicting the meme, captioned: "A true legend has left this planet. Godspeed Jack Karlson." Mr Watt – who formed a close friendship with Karlson since their reunion – remembered the 82-year-old as a “larger than life” figure “with a big heart”. “It's a sad day for Australia. We've just lost a true colourful character," he told the ABC.
