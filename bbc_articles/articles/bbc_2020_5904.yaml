  The latest figures published by National Records of Scotland show that 3,546 people have died with those over 75 accounting for 76%.

  Getting families back together 'is at the core' of what we believe in

  Q: When will we be able to see our grandparents again? A: I think I can give some hope for that. Society connections are important everywhere but Scotland has a strong history of deep, deep cultural connection of families. Of course we believe business is important and it's important to get public transport back. But right at the core of what we believe is getting families back together. And I think over the next few weeks we will begin to see some loosening of what that might look like. We know outdoors is safer than indoors, so you would expect us maybe to do that first. We know small groups are safer than larger groupings, so you would expect us to do that first. Prof Leitch says he hopes that grannies will be able to get a hug within a month, but he is not going to guarantee it.
