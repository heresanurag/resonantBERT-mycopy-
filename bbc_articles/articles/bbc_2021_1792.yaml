title: 'Covid-19: Welsh Government update 10 February 2021 - BBC News'
date: '2021-02-10'
section: Wales
url: http://www.bbc.co.uk/news/live/uk-wales-55997258
content: |-
  Details and reaction to a briefing by NHS Wales Chief Executive Dr Andrew Goodall.

  A new virtual festival is being launched to bring music, laughter and culture into our homes almost a year on from the first lockdown.

  It will bring together four of Wales' major arts, music and comedy festivals and be broadcast as part of the BBC's Culture in Quarantine initiative.

  Director of BBC Wales Rhodri Talfan Davies said Gŵyl 2021 would provide a much needed "blast of creativity".

  It will be online and on BBC Radio Wales and Radio Cymru on 6-7 March.

  The event will see the first-ever joining of forces by Wales' Festival of Voice, new music event FOCUS Wales, the Aberystwyth Comedy Festival and Other Voices Cardigan.

  It has been filmed and recorded in line with Covid restrictions in recent months while the pandemic has kept the public away from arts venues and concerts in Wales.
