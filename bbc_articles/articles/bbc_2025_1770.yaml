title: Gordon Ramsay's new London restaurant sees 477 lucky cat thefts - BBC News
date: '2025-02-21'
section: London
url: http://www.bbc.co.uk/news/articles/c1jpdn97xdgo
content: |-
  The cat figurines known as maneki-neko feature within the TV chef's Lucky Cat restaurants.

  Maneki-neko figurines are popular in Japanese culture and are thought to bring good luck

  Nearly 500 cat figurines have been stolen from a new Gordon Ramsay restaurant in one week at an estimated cost of more than £2,000, the TV chef has said. The restaurateur recently launched Lucky Cat by Gordon Ramsay, in Bishopsgate in central London, featuring the beckoning Japanese cat models called maneki-neko. The 58-year-old told ITV's The Jonathan Ross Show: "The cats are getting stolen. There were 477 stolen last week - they cost £4.50 each." The City Of London Police said it has not received any reports of theft from the restaurant.

  The number of cat figurines stolen would amount to a loss of £2,146.50. The maneki-neko figurines are believed by some within Japanese culture to bring good luck and have been a feature in the Lucky Cat restaurants, which serve "Asian inspired" cuisine. Ramsay, known for his Hell's Kitchen and Ramsay's Kitchen Nightmares reality TV programmes, also said that he had issues with couples entering the toilets together. The restaurant opened earlier this month on the 60th floor of skyscraper 22 Bishopsgate, one of London's tallest buildings. Reflecting on his more than 80 restaurants globally, Ramsay said: "It does get a bit scary, in terms of how big it is and the global impact."

  The TV chef opened his fourth Lucky Cat restaurant in Bishopsgate earlier this month

  Ramsay also spoke about the upcoming nuptials of his daughter Holly Ramsay and Olympic swimmer Adam Peaty – and said they were planning a "Christmas wedding". He said that Peaty, a three-time Olympic gold medallist, did not seek his permission but did talk to him about the engagement. Ramsay said: "He's (Adam) so down to earth and so focused and disciplined. He sat us down in Cornwall. "He said 'Holly is just the perfect woman. I'd like to get your blessing – from you and Tana for her hand in marriage'. It was that sort of amazing moment. Everything went quiet. As a future son-in-law, we couldn't ask for anyone better." YouTuber Holly and Peaty announced their engagement in September, shortly after Peaty returned to competing for the Paris Olympics. The Jonathan Ross Show airs on Saturday at 9.30pm on ITV1 and ITVX.
