content: |-
  A rampant Australia run in six tries to claim a convincing 37-5 victory over Wales in their WXV2 opener in Cape Town.

  This video can not be played To play this video you need to enable JavaScript in your browser.

  Australia were in a rampant mood as they ran in six tries to claim a convincing victory over Wales in their WXV2 opener. It was sweet revenge for the Wallaroos who lost to Wales for the first time at Rodney Parade last week in a warm-up. This game in Cape Town had all the makings of another close contest with Wales trailing just 10-5 at half-time, Carys Phillips going over for Wales while Layne Morgan and Eva Karpani crossed for Australian tries. But the Wallaroos then scored 27 unanswered points in the second half, including four more tries as Wales fell off the pace. As well as the lopsided scoreline, a crowd of just 291 at the DHL Stadium was hugely disappointing.

  The build-up had been less than ideal for Wales, who were without star prop Sisilia Tuipulotu due to delays in her visa, which meant she did not travel to South Africa with the rest of the squad. There had also been a late shuffle to the starting XV, with flanker Alex Callender promoted from the bench in place of the injured Kate Williams and centre Hannah Jones ruled out completely. It meant Ioan Cunningham’s bench did not have the impact he was hoping for on 60 minutes, while Australia’s ultimately proving the difference as Wales struggled to live with the tempo.

  Wales dominated early possession and territory with Callender leading the charge. They had two early opportunities from five-metre driving lineouts, but it was not the well-oiled machine we have been used to seeing. Wales did show patience however, and Georgia Evans looked to have crossed under the posts but the ball was held up. Australia then started to go through the phases themselves, with Maya Stewart proving the danger woman on her wing. It was her meandering run which did all the damage for the opening try. Callender conceded a penalty a few metres out and Wales were caught napping when scrum-half Morgan took a quick-tap and dived over the line. Wales hit back and this time the lineout worked well. Phillips found her target in Bethan Lewis and then latched onto the back of the maul which rumbled over with ease. Wales then butchered another golden opportunity. Lewis had driven well to the line but Alisha Butchers' attempts to get the ball away forced a knock on. With the clock approaching the red, it looked as it there would be nothing to separate the sides at half-time, but powerful prop Karpani had other ideas. She took a pass on the edge of the Welsh 22 and bulldozed her way through Lewis and Butchers before shrugging off Jenny Hesketh to cross for a 10-5 lead.

  Wales flanker Alex Callender was a late call-up from the bench

  Australia looked the more dangerous after the break and certainly had the upper hand in the scrum as Wales continued to miss the physical presence of tighthead Tuipulotu. The Wallaroos were almost gifted a try when a wayward Welsh pass allowed them to counter, but a crucial turnover by Jasmine Joyce got them out of trouble. The gold and green waves of attack kept coming and this time it was Australia who blew their chance as Karpani was held up over the line. But as the game broke up with 20 minutes to go, Australia’s fitness shone through and a great run by powerful number eight Tabua Tuinakauvadra sucked in the defence which allowed the ball to go through the hands and out to Stewart who made no mistake off her wing. They were in again straight from the restart, this time it was the other wing - Desiree Miller - who broke free before Faitala Moleka picked up to score. Australia put the game beyond doubt 10 minutes later with their bench, particularly the introduction of Lori Cramer, making a real impact. Cramer combined well with Miller to cross, before taking over the kicking duties. Wales were dealt a further blow when they were forced to finish the game with 14 players, with last week’s try-scoring hero Molly Reardon yellow carded for a high tackle. The Wallaroos then enjoyed even more space to run riot and saved the best try for last. Stewart cut a great angle through the Welsh defence before powering her way out of a Georgia Evans tackle to cross for her second. It was a fitting end to the game and only a second Wallaroos win under Jo Yapp. Wales, however, will have to regroup, just a week after celebrating a first victory over Australia, this final score proved to be their worst defeat in eight meetings. Italy await Wales next on Friday, 4 October, while Australia can advance fair to face hosts South Africa the following day.

  Australia head coach Jo Yapp said: "We are so proud of the players, we've had a tough run but always knew we were capable of a performance like that and showed everyone what we've been working on. "We have real faith in the squad. "We've been able to have a lot of new caps and it's exciting to see so many players stepping up and performing like Faitala Moleka at 10." Wales head coach Ioan Cunningham said: “It’s very disappointing, but we started really well. "We weren’t quite accurate when we got opportunities in Australia’s 22. That’s something we’ve got to be better at next week. "We’ve got to look at how physical we can be against a great Wallaroos team. Fair play to them, they put us away today, especially in that second half."
