title: 'Parliament suspension: Thousands protest against plans to suspend Parliament
  - BBC News'
date: '2019-09-01'
section: General
url: http://www.bbc.co.uk/news/uk-49536312
content: |-
  Crowds take to the streets across the UK to protest against Boris Johnson's plans to suspend Parliament.

  Thousands of protesters have taken to the streets in cities including Sheffield, Belfast and Truro to protest against Boris Johnson's plans to suspend Parliament.

  In London, Whitehall has been brought to a standstill, with protesters chanting "Boris Johnson, shame on you".

  The prime minister's decision to prorogue Parliament prompted an angry backlash from MPs and opponents of a no-deal Brexit.
