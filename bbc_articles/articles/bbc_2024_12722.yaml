  Jane Dodds has been Welsh Lib Dem leader since 2017

  Jane Dodds was born in Wrexham in 1963, where she was raised before moving to Cardiff for university. After graduating she trained to become a child protection social worker - which would be her career for the next 27 years. Ms Dodds was first elected leader of the Welsh Liberal Democrats in November 2017. After winning a by-election for the Brecon and Radnorshire Westminster constituency in 2019, she held the seat for just three months before the Tories wrestled it back off her in that year's general election. Ms Dodds was then elected as a regional Senedd member for Mid and West Wales in 2021 and remains her party's only elected politician in Wales. She has said a good election night for her party on 4 July would be "kicking the Tories out of Wales". The party has heavily campaigned on improving social care, pledging to pay carers an extra £2 an hour and calling for them to be "valued higher in society". Ms Dodds also said she believes the electorate have moved on from the party's tuition fees u-turn when it formed a coalition government with the Tories in 2010, which preceded the Lib Dems losing all but eight seats at the following election.

  Reform UK candidate Oliver Lewis has said the Tory party "needs to die"

  Standing as a Reform UK candidate in the Montgomeryshire and Glyndwr constituency, Oliver Lewis has said he politically identifies as "a radical" who wants a "wholesale re-set of Britain’s institutions". Born and raised in Oxford, with a Welsh grandfather, Mr Lewis worked in financial services for five years after graduating university in 2009. He is currently researching "British state failure" as a PhD student at Oxford University, where he also teaches British politics. Mr Lewis has refuted suggestions that his party's aim for net zero immigration could cause gaps in the workforce, including in social and health care. He said it was "morally reprehensible" to pull foreign labour into the health service - saying it is "not a long-term solution to our issues". He also shot down a potential collaboration with the Tories in future, branding the party a "failing institution" which "frankly... needs to die". The Green Party’s Anthony Slaughter will respond to the debate on BBC Radio Wales at 20:00 BST.

  The debate will be broadcast live on BBC One Wales and BBC Radio Wales at 19:00 BST on Friday.
