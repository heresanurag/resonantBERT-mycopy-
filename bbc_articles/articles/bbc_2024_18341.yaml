title: 'Belfast trouble: Boy, 11, charged with disorder offences - BBC News'
date: '2024-08-12'
section: Northern Ireland
url: http://www.bbc.co.uk/news/articles/cp8nqmylvy8o
content: |-
  The offences include riot and throwing petrol bombs during disorder in south Belfast in July.

  Several police vehicles attended the disturbances in south Belfast last month

  An 11-year-old boy has been charged with a number of offences relating to disorder in Belfast in July. The charges include riot, three counts of possessing petrol bombs in suspicious circumstances, and possessing an offensive weapon in a public place. He has also been charged with throwing petrol bombs and causing an explosion likely to endanger life or cause serious injury to property in the Broadway area of south Belfast on Monday 15 July. He is due to appear before Belfast Youth Court on Friday 6 September.

  There were chaotic scenes last week as disorder took place across Belfast

  Police cars and vehicles belonging to members of the public were damaged during the violence at Broadway roundabout on 15 July. Petrol and paint bombs were also thrown at officers. Meanwhile, a 26-year-old man arrested on Monday has appeared in court charged with rioting and intentionally encouraging or assisting riot. Paul McAllister, of City Walk in Belfast, spoke at the city's magistrates' only to confirm that he understood the charges against him. There was no application for bail and he was remanded in custody to appear again via video-link on 21 August.
