title: 'Jordan Kukabu murder: Four jailed for life over Dagenham attack - BBC News'
date: '2024-10-16'
section: London
url: http://www.bbc.co.uk/news/articles/czegzdz6ynxo
content: |-
  Four attackers, including three teenagers, are jailed for murdering 18-year-old Jordan Kukabu.

  Jordan Kukabu, 18, was described by his father as "gentle with a pure heart"

  A group of four attackers who used a "fearsome" machete to murder a teenager in east London have been given life sentences. Wazabakana Elenda Jordan Kukabu, known as Jordan, died after he was stabbed in the heart outside Dagenham Heathway Underground station in May 2023. Michael Tommy-Mbogba, 21, and Toluwaslase Odunewu,18, as well as a two teenagers aged 17 and 16 - who cannot be identified due to their age - were all found guilty of murder following a trial at the Old Bailey. During sentencing, Mr Kukabu's mother, Tantine Kukabu, said she never thought she would lose her son, "let alone in such a brutal and painful way".

  The trial heard Mr Kukabu had arrived at the station with two associates when they were confronted by a heavily-armed group. Their car was surrounded as Mr Kukabu and his colleague Matthew Adekoya, 20, tried to escape. Mr Adekoya was chased and stabbed by the 17-year-old defendant, but managed to drive away. Mr Kukabu collapsed and died at the scene after being stabbed by Mbogba, the court heard.

  Toluwaslase Odunewu for a minimum of 23 years (right) and Michael Tommy-Mbogba (left) was jailed for at least 29 years

  During sentencing, Judge Anuja Dhir told the four: "This was a group attack in a public place in front of members of the public." The judge said although some of the group that had arrived with the victim had threatened violence, the response by the defendants to that behaviour "was out of all proportion". Judge Dhir told the defendants: "Although the fatal injury was inflicted with a large machete in the hands of Mbogba, each of you played a part in the death of Jordan Kukabu."

  Judge Dhir said: "You were not just carrying knives - there were four of you and you were carrying fearsome machete-style knives." She added: "None of you have explained why you were together and why so heavily armed outside Dagenham Heathway Underground station." She sentenced Mbogba to a minimum of 29 years; Odunewu, at least 23 years; the 17-year-old for 23 years and the 16-year-old for 16 years. The court heard they were identified after one man had seen the defendants sitting on the top deck of a bus after the murder, re-enacting the fatal attack they had just carried out.

  In a victim impact statement read to the court, Mr Kukabu's mother, Tantine Kukabu, said: "You took my precious son away. "I would never have thought I would lose my son - let alone in such a brutal and painful way."

  Mr Kukabu was described as possessing a beauty "both inside and out"

  His father, Nzuzi Ilenda said his "heart was crushed" by the murder. "My son possessed beauty both inside and out. "He had a pure heart and was so gentle he would not harm anyone, yet his life was taken so prematurely. "I can only visit Jordan’s grave and mourn the loss of his beautiful presence to this world.”

  The 17-year-old defendant was also given a concurrent sentence of 13 years for the attempted murder of Mr Adekoya, and the three other defendants received lesser sentences for wounding with intent to do grievous bodily harm against the same victim. All were also sentenced for violent disorder relating to an offence two days earlier and having an article with a blade or point.
