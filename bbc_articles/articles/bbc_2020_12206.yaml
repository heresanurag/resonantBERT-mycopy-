content: |-
  Details and reaction to what Economy Minister Ken Skates said at today's televised briefing.

  First Minister Mark Drakeford has written again to Chancellor Rishi Sunak warning "many staff will be laid off" in leisure and hospitality as a result of the firebreak lockdown in Wales.

  He said it is because they will not fulfil the eligibility criteria to be enrolled for the last week of the Job Retention Scheme (JRS).

  "Employers with no income will be faced with the difficult decision of paying all of the wage costs of these employees or making them redundant," Mr Drakeford said in the letter.

  "It makes no sense from the point of view of the UK Exchequer to have to meet the possible long-term costs of paying out-of-work benefits to these individuals for the sake of one week’s support on the JRS.

  "Will you therefore agree in these exceptional circumstances to waive the requirement for employees for whom JRS is claimed for this period to have been on furlough for at least three weeks prior to 30 June?"
