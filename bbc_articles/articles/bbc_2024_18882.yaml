id: bbc_2024_18882
title: X suspends business in Brazil over censorship row - BBC News
date: '2024-08-17'
section: Latin America
url: http://www.bbc.co.uk/news/articles/cgjv857plevo
content: |-
  The social media platform says its legal representative was threatened by a supreme court judge.

  X, formerly known as Twitter, has closed its office in Brazil over a censorship row. The social media platform said a Brazilian Supreme Court judge, Alexandre de Moraes, threatened its legal representative in Brazil with arrest if it did not comply with his "censorship orders". People in Brazil are still able to use X, billionaire Elon Musk's platform said on Saturday.

  Mr Moraes had ordered X accounts he has accused of spreading disinformation - many supporters of the former right-wing president Jair Bolsanaro - must be blocked while they are under investigation. After X owner Musk criticised Mr Moraes, the judge ordered 100,000 reais ($19,774; £15,670) fines a day for any account that X reactivated, and stressed the possible liability of the company's legal representatives in Brazil if this were to happen. He also put Mr Musk under investigation for charges including the obstruction of justice.

  X said in a statement that Brazilian staff had no responsibility or control over whether content is blocked but Mr Moraes has chosen to threaten staff in Brazil rather than respect the law. "As a result, to protect the safety of our staff, we have made the decision to close our operation in Brazil, effective immediately," X said. "His actions are incompatible with democratic government." Musk posted on X that there was "no question that Moraes needs to leave". He added that the decision to close the office in Brazil was "difficult", but if the company agreed to Mr Moraes' "demands, there was no way we could explain our actions without being ashamed". Mr Moraes is disliked by fans of the former president Mr Bolsonaro. During his presidency, he ordered investigations into some of the president’s allies.
