  Speaking about the response to his disappearance, Mr Elkington said: "It's unheard of, it's incredible the support, not just from his friends and family but the local ex-pat residents over here and obviously the Spanish residents now as well." But Jay's mother Ms Duncan said she was growing increasingly desperate. "He's just an all-round nice, bubbly guy with hundreds of friends who love being in his company," she said. Accrington and Rossendale College, where Jay was completing his apprenticeship, said: "We are deeply concerned about the recent news regarding one of our apprentices, Jay Slater, who has gone missing while on holiday in Tenerife. "The safety and wellbeing of our students are of upmost important to us, and our thoughts at this worrying time are with Jay’s family and friends." A spokesperson for the Foreign Office told the BBC: "We are supporting the family of a British man who has been reported missing in Spain and are in contact with the local authorities."
