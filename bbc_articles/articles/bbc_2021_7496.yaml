title: 'Daniel Morgan murder: Report ''deeply alarming'', says Patel - BBC News'
date: '2021-06-15'
section: General
url: http://www.bbc.co.uk/news/uk-57481718
content: |-
  The Met Police has been accused of "institutional corruption" for concealing or denying failings over the unsolved murder.

  An independent panel has accused the Met Police of "forms of institutional corruption" for concealing or denying failings over the unsolved murder of private investigator Daniel Morgan.

  Despite five police inquiries and an inquest, no-one has been brought to justice over the father-of-two's death in 1987, with the Metropolitan Police admitting corruption had hampered the original murder investigation.

  Speaking in the House of Commons, Home Secretary Priti Patel said: "Daniel Morgan deserved far, far better than this, as did his family."
