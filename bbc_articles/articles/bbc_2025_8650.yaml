  Police say Rainford Bypass was being using as a racetrack by cars in the early hours of the morning.

  Car racing at 135mph on bypass seized by police

  Police said the car was "clocked" at 135mph on the Rainford Bypass

  A car caught racing at 135mph on a bypass has been seized by police. Merseyside Police said the driver was caught after complaints the Rainford Bypass was being used by vehicles "as a racetrack". The male driver's car was seized in the early hours of Sunday in Rainford. Police said he had also been given a Section 59 warning for anti-social driving two months earlier.

