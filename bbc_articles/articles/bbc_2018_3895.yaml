title: 'YouTube shooting: Police describe ''chaotic'' scenes - BBC News'
date: '2018-04-03'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-43636668
content: |-
  At least four victims are in hospital with bullet wounds - and a female suspect was found dead.

  San Bruno police chief Ed Barberini briefs the media for the first time following the shooting at Youtube's HQ in California, revealing four people were wounded and a female suspect was found dead.
