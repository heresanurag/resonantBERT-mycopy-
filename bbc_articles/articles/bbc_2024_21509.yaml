  US team has 'unfinished business' with Europe - Korda

  Nelly Korda equalled the LPGA Tour record of five consecutive wins earlier this year

  World number one Nelly Korda says the United States have "unfinished business" as they bid to stop Europe winning the Solheim Cup a record fourth consecutive time. The 19th edition of the transatlantic tussle gets under way on Friday at the Robert Trent Jones Golf Club in Gainesville, Virginia, with the hosts aiming for a first win since their 161⁄2 - 111⁄2 success at Des Moines seven years ago. And Korda appears particularly motivated this time around, with her 2&1 defeat by Carlota Ciganda which allowed Europe to retain the trophy at Finca Cortesin 12 months ago, fresh in the memory. "Whenever you get to wear the red, white, and blue and stars and stripes, there's a different meaning to it," said Korda. "You're playing not just for yourself, but for your captains, for your team-mates and your country, and there's just nothing like it. We have got some unfinished business." Korda comes into the contest as the biggest name in women’s golf after a stellar campaign to date, with the 26-year-old triumphing at the Chevron Championship in April and six times in total on the LPGA Tour in 2024.

  However, she is yet to taste success in the biggest team competition in women's golf having also played in US defeats at Gleneagles in 2019 and the Inverness Club in 2021. "Obviously I haven't been on the winning side, but every experience I've had in the Solheim Cups has been an amazing one," added Korda, who practised alongside Allisen Corpuz on Tuesday. The duo won both their foursomes matches in Spain and are expected to reprise their successful partnership when captain Stacy Lewis announces her first set of pairings on Thursday afternoon. "I think it's something super-exciting too and refreshing to have a team-mate, have team-mates and captains and people to lean on when you normally don't," added Korda. "There's nothing like it. There's nothing like walking on to that first tee and feeling all those nerves. We have a great group of girls. We have a great group of guys. We have a great captain. We have really great assistant captains. Hopefully it all falls into place and we play some really good golf for the fans out here this week."
