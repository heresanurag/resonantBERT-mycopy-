title: Xi shows he wants to be close to Putin - but not too close - BBC News
date: '2025-05-09'
section: World
url: http://www.bbc.co.uk/news/articles/c753ng233nvo
content: |-
  The relationship between China and Russia is no longer one of equals.

  Xi shows he wants to be close to Putin - but not too close

  China's Xi Jinping sat beside Putin in Moscow - an indication of his significance in Friday's parade

  Chinese President Xi Jinping and his Russian counterpart Vladimir Putin make it look like they're the best of friends. Xi took his place at the right-hand side of Putin, the position of a steadfast ally, as their troops marched together on Red Square as part of Moscow's Victory Day parade. Hours earlier, Xi described the bond between the two countries as "unbreakable" and added that Russia and China should be "friends of steel". This is Xi's 11th visit to Russia since becoming president in 2013 and the two leaders have met on more than 40 occasions.

  Putin has already announced plans to visit China in the autumn and the two leaders have even, in the past, shared a rare public hug. But there is more to this relationship than meets the eye. "We see a lot of exchanges between the two men and patriotic displays of togetherness," said Mathieu Boulegue, from the Center for European Policy Analysis. "They can be friends on one end or co-operating on one end and then ripping each other apart on others, and actually be competitors in certain aspects of their relationship. "We get wowed by the symbolism. There's a lot of performance around this relationship. But it's interesting to look at the real substance."

  In truth, President Xi is walking a very fine line. Russia is an important partner for China but Putin's invasion of Ukraine has made him an international pariah in much of the world. Beijing needs to be careful that its friendship with Moscow doesn't isolate other prospective partners, especially as it is fighting an economic war with the United States. China has been courting Europe for several months and stepped up its campaign after Donald Trump became US president. Beijing has been keen to portray itself as a stable alternative global partner in contrast to an unpredictable White House in Washington.

  There were some signs earlier this week that these diplomatic overtures were working. Ursula von der Leyen, the president of the European Commission, and António Costa, the president of the European Council, exchanged messages on Tuesday with President Xi and Chinese Premier Li Qiang to celebrate the 50th anniversary of bilateral relations.

