  The stumbling block of any prospective partnership has been Beijing's close-knit relationship with Moscow and its economic support for Russia. China has not condemned its "old friend" for the invasion and instead calls for an end to the "crisis". If President Xi appears to stand too close to Putin, it could cause friction with Europe at a time when it is looking for friendship.

  But the Chinese leader has another key message to send. Trump's initial attempts to end the war in Ukraine had him touting his close personal relationship with Putin. It prompted analysts to ask if Washington was trying to drive a wedge between Moscow and Beijing. Xi will want to make it clear to Trump this is not possible. "Together, we must foil all schemes to disrupt or undermine our bonds of amity and trust," Xi wrote in a signed article for Russian media. The Russian and Chinese leaders also described Trump's plans for a "Golden Dome" missile defence shield over the US as "deeply destabilising", and argued that it would weaponise space. Both leaders are keen to present their vision of an alternative world order in the face of what they believe is US hegemony. But Xi will be aware that while China is a superpower – Russia's power is now limited. This is no longer a partnership of equals.

  President Xi and President Putin were joined by other world leaders as they observed the military parade

  The war in Ukraine has weakened Russia's economy and depleted its arsenal and army. Western sanctions have also left Moscow far more reliant on Beijing for economic survival. They have severely weakened the Kremlin on the world stage. "Russia needs China much more than the opposite is true," Boulegue said. Moscow will need to "suck it up", he added. Putin may lean into his friend as they watch the tanks roll through Red Square and they can team up when they need each other. But behind the bold statements, the smiles, handshakes and the occasional hug, there are potential sources of discord and disharmony which could surface in the years to come.
