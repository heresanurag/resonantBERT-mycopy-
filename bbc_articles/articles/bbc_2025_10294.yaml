title: Wiltshire teenager sets record for solving 12-sided Rubik's cube - BBC News
date: '2025-05-26'
section: General
url: http://www.bbc.co.uk/news/videos/c8jgg2kp0m9o
content: |-
  Aidan Grainger, 17, managed to complete the Megaminx gadget in just 22.89 seconds.

  A sixth form student has set a new world record for completing a 12-sided version of the Rubik's cube.

  Aidan Grainger, 17, from Royal Wootton Bassett in Wiltshire, solved the Megaminx gadget in just 22.89 seconds at an event in Weston-super-Mare on 18 May.

  He told the BBC: "For the last few years my biggest goal has been to get a world record and I was so happy to get it."

  The teenager became the national and European record holder in January 2024 and is now set to represent the UK at the World Championships in Seattle in June.

