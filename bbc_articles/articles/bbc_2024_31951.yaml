title: Gary Oldman voices Christmas poem for MI5 - BBC News
date: '2024-12-26'
section: General
url: http://www.bbc.co.uk/news/articles/c20ejp7l0ljo
content: |-
  Reprising his most recent role as a spy for the intelligence agency, Oldman puts a London spin on The Night Before Christmas.

  MI5 has released a special version of the festive poem The night before Christmas, read by actor Gary Oldman. In the voice over, Oldman reprises the role of his Slow Horses character Jackson Lamb - a spy in charge of a group of failed MI5 agents - beginning with the poem's famous words "'Twas the night before Christmas". In a post on Instagram, external, the UK's Security Service said they've "decided to forgo the traditional turkey in favour of some lamb - Jackson Lamb". The post said they asked the Harry Potter star to record the Christmas message during a brief break from filming Slow Horses - and he obliged.

  Oldman's rendition varies slightly from the classic poem, which was written by Clement Clarke Moore in 1823 and is officially titled A visit from St Nicholas. His version nods to the location of MI5 headquarters in central London: "'Twas the night before Christmas when all through Thames House, not a creature was stirring, just the click of a mouse." The poem focuses on the work that continues at the intelligence agency, while many other people are enjoying their festive holidays. "The hustle, the bustle, a hive of activity. Not the typical scene of your Christmas nativity," Oldman reads. "So, while people at home wrap last minute gifts, the staff inside Thames will be changing their shifts." But he ends with the classic last line: "Happy Christmas to all, and to all a good night."
