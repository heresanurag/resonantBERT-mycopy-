title: Drunken mistake creates Yorkshire village's Christmas tradition - BBC News
date: '2024-12-20'
section: North Yorkshire
url: http://www.bbc.co.uk/news/articles/c1j0z93193po
content: |-
  Santa that is taller than couple's house is now a popular attraction and raises money for charity.

  This video can not be played To play this video you need to enable JavaScript in your browser.

  A man's drunken mistake has led to a beloved Christmas tradition in a North Yorkshire village. Peter Routledge was shopping online after a festive session four years ago and quickly realised he'd made a huge error. He'd purchased an inflatable Santa that is actually bigger than his house in Poppleton. It quickly became the talk of the village but now Mr Routledge, along with his wife Katy, uses the decoration as a force for good.

  Mrs Routledge said: "It brings so much happiness to the village and a lot to people in York as well. He's also done some good work for charities and we also collect food for a local food bank." Local residents gather to see the giant Santa with one resident saying: "We live really locally so we have come to see him the last few years and the kids get really excited when we're driving past." Another said the inflatable was a major factor in the purchasing of their own home. She said: "When we moved here about two years ago, we saw in the press that this existed. "My husband and me and big fans of Christmas so that was a huge decider in us taking the house as well." Mrs Routledge added: "People have been so generous and people just love to come see it." Listen to highlights from North Yorkshire on BBC Sounds, catch up with the latest episode of Look North or tell us a story you think we should be covering here, external.
