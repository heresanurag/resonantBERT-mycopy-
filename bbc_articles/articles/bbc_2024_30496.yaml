  New Jersey assemblywoman Dawn Fantasia has dismissed the Pentagon's assertions. "To state that there is no known or credible threat is incredibly misleading," she said. The Republican - who was briefed by the Department of Homeland Security on Wednesday - said the drones appear to avoid detection by traditional methods such as helicopter and radio. Fantasia said the drones are up to 6ft (1.8m) in diameter, travel with lights turned off and "operate in a co-ordinated manner." While the mysterious objects are not believed to be hobbyist drones, Fantasia said it remains unclear what they are. In late November, the United States Air Force confirmed that unidentified drones were spotted over three US airbases in the UK: RAF Lakenheath and RAF Mildenhall in Suffolk and RAF Feltwell in Norfolk. Defence sources told the BBC that suspicion had fallen on a "state actor" being responsible for the incursions.
