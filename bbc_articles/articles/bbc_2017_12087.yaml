title: Afghanistan's child opium problem - BBC News
date: '2017-11-15'
section: General
url: http://www.bbc.co.uk/news/world-asia-42003158
content: |-
  Young children are becoming dependent on the drug, as the amount produced in Afghanistan hits a new high.

  Children as young as nine as becoming opium addicts in Afghanistan as the amount of the drug produced in the country hits record levels.

  Findings suggest that the area of land used to cultivate opium poppies grew dramatically and fewer provinces are now seen as "poppy free".
