title: Strictly's Chris McCausland's 'spectacular' blackout dance moment - BBC News
date: '2024-11-12'
section: General
url: http://www.bbc.co.uk/news/videos/c5y5kk5pp01o
content: |-
  Blind comedian Chris McCausland and his dance partner performed part of the routine with the lights off.

  Strictly Come Dancing contestant Chris McCausland performed a section of his dance with the lights off for a blackout moment the judges described as "spectacular".

  Chris McCausland is the competition's first blind contestant and has consistently ranked high on the weekly leaderboard. Head judge Shirley Ballas became emotional giving her glowing feedback, with her fellow judge Craig Revel Horwood adding: "That poignant blackout moment was absolutely spectacular."

  It follows a Strictly routine in 2021, in which deaf actor and Strictly Come Dancing champion, Rose Ayling-Ellis, and her dance partner performed for a short while in complete silence. The former Eastenders star and dance partner Giovanni Pernice won a Bafta for the best must-see TV moment.
