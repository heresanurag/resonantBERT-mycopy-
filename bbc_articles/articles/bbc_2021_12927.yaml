  The EU has repeatedly said that it does not consider the August elections to have been "free and fair" and has imposed sanctions on Mr Lukashenko's regime.

  The president launched a post-vote crackdown on dissent in Belarus after the country erupted in historic protests against his rule.

  However, despite Western sanctions, Mr Lukashenko has so far dismissed all attempts to oust him and enjoys the backing of his ally in Moscow, President Vladimir Putin.

  The 67-year-old leader, who has ruled Belarus since 1994, has responded by accusing European governments of having instigated the protests and has cut ties with a number of Western nations in recent months.

  In March, his regime expelled the entire staff of Latvia's embassy, including its ambassador, after Latvian authorities used a Belarusian opposition flag at an ice hockey championship.

  In August, Minsk revoked the appointment of the US ambassador - career diplomat Julie Fisher - who was to be the first US envoy to the ex-Soviet country since 2008.
