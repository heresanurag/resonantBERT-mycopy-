title: 'Naya Rivera: CCTV of star boarding boat - BBC News'
date: '2020-07-10'
section: General
url: http://www.bbc.co.uk/news/entertainment-arts-53369185
content: |-
  Police say the body of the Glee star has been found in a California lake, after she went missing on Wednesday.

  Glee star Naya Rivera went missing on Wednesday after going out boating with her son.

  The boy was found asleep on the boat alone. He told police he and his mother had gone swimming but she didn't return to the boat.

  On Monday, police said a body found in Lake Piru in California had been identified as Rivera.

  Sheriff Bill Ayub of the Ventura County Sheriff Department said there was no indication of foul play or that she took her own life.
