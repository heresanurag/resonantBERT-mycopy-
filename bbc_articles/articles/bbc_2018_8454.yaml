  Rosie Millard, the former chair of Hull City of Culture 2017, said she had wanted Hull's Ferens Art Gallery to win from the shortlist, saying: "Not one member of the jury from the north. Zero."

  Dr Gabrielle Heffernan, the curatorial manager at Carlisle's Tullie House Museum and Art Gallery, added she was keen to see a museum - rather than an art gallery - win the coveted award.

