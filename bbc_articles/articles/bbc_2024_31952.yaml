content: |-
  Fulham manager Marco Silva's reputation has not simply been restored at Fulham, it has been enhanced after a historic win at Chelsea.

  Fulham manager Marco Silva celebrates during the victory at Stamford Bridge

  Marco Silva spent Christmas five years ago recovering from his brutal sacking at Everton after only 18 months at Goodison Park. Silva's promising first season, in which he took Everton to eighth while often playing eye-catching attacking football, was quickly forgotten as he struggled into December before then-owner Farhad Moshiri pulled the trigger with the Toffees in 18th place following a 5-2 thrashing at Liverpool. In those closing weeks at Everton, Silva cut a haunted figure fighting a losing battle, the pleas of director of football Marcel Brands ignored as the Portuguese lost his job, eventually being replaced by Carlo Ancelotti. There were very few dissenting voices among supporters at Silva's dismissal. They were getting used to the new Everton reality that managers would now be shown the door in short order by Moshiri at almost the first sign of struggle, a sharp contrast to previous years of stability when David Moyes was in charge for more than a decade. Silva bided his time before returning to management with Fulham in July 2021. He has since carefully rebuilt a reputation that once earmarked him as one of Europe's most promising young coaches, established at Estoril and Sporting in Portugal then Olympiakos in Greece, making his mark at Fulham with promotion from the Championship as champions in his first season, winning 27 of 46 games. He has since re-established Fulham as a Premier League force, finishing 10th in 2022-23 and 13th last season. It is a fine body of work and this magnificent win at Chelsea was a prime example of a rehabilitation that has gathered new momentum in recent weeks. In December, Fulham earned a point at Tottenham then, more significantly, took a fully deserved share of the spoils against Arsenal at Craven Cottage before becoming only the second team to take league points off Liverpool at Anfield in a thrilling 2-2 draw. This, arguably, was Fulham's finest result and performance under Silva, given its meaning as a west London derby and after 45 years without a victory at Stamford Bridge Silva's successful festive period will be in the sharpest contrast to the misery of 2019, and he thinks Fulham's fans will share his joy as he said: "It will be one of the best Boxing Days for the fans in the last 50 years."

  Silva, animated and agitated in his technical area, ensured Fulham never took a backward step, undaunted by Cole Palmer's 16th-minute goal that Chelsea defended with increasing anxiety until eight minutes from time. He had replaced Adama Traore with Harry Wilson after 67 minutes then Raul Jimenez with Rodrigo Muniz seven minutes later. It was the work of a manager with the surest touch as first Wilson headed the equaliser with eight minutes left, then Muniz steered a finish past Chelsea keeper Robert Sanchez at Stamford Bridge's Shed End with one of the six minutes of stoppage time left. Silva's changes were made with positive intent, to maintain the attacking impetus Fulham carried in an outstanding second half, then gaining maximum reward. The 47-year-old could not contain his elation, jumping forward then wheeling around in joy to celebrate with his backroom staff as his players did likewise a special moment with their supporters. It was the first time Fulham had won a Premier League game at Stamford Bridge in 18 attempts, losing 11 and drawing six. It was their first away win against Chelsea in any competition since October 1979, in the former Second Division. In that period they have lost 12 and drawn nine. Fulham now stand eighth in the Premier League, level on 28 points with champions Manchester City, the difference being that the Cottagers' graph is on an upward curve while Pep Guardiola's team continue to slide. Silva has also built a team with character, winning eight points from losing positions this season, scoring seven goals from the 81st minute on, including the two here at Stamford Bridge.

  Fulham's players celebrate their first win at Chelsea in 45 years

  He has been the beneficiary of finally putting down roots at a club, allowing his coaching prowess - recognised throughout his career - the time to take effect. He was highly-regarded at Hull City, even though his five-month spell from January to May 2017 ended in relegation. Silva made an impressive start after being appointed Watford manager, but his head was turned when approached by Everton in November, following the sacking of Ronald Koeman. The advances were rejected amid acrimony but Watford's form went into decline. Before Everton's approach, Watford only lost four out of 11 games but afterwards they suffered defeat in eight of the next 13. Silva was sacked in January. Watford pointed the finger of blame firmly in Everton's direction in their statement, at the time, saying: "The catalyst is that approach, something which the board believes has seen a significant deterioration in both focus and results to the point where the long-term future of Watford has been jeopardised." Everton eventually got their man in summer 2018, but cast him aside 18 months later before Silva's managerial journey took him to Craven Cottage. Silva now looks and sounds like a different man. And this win at Chelsea was a coaching masterclass as he revealed how it was planned. He said: "We knew Neto would push up on Chelsea's right so we wanted to expose those spaces. This was our plan and we did it better in the second half with Antonee Robinson and pushing on. "We wanted to expose that area in the way we prepared then get more bodies in the box in the second half, which we did and got our goals. If people think we deserved to win this match then I would agree with them." Fulham's fans have come to idolise their manager, as proved by the wild outpouring of joy at the final whistle - and the feeling is mutual. He said: "Football is about connections. Connections between fans, players and staff, means something really big. The most important thing is for the fans. It's not about me at all. "Some of the speeches before the game were about the fans. It's been a long time [not winning at their neighbours]. We deserved it. We controlled more of the game. We didn't give them chances. "In the second half we started to make better decisions. All the good actions of the game give us confidence." Silva's connection with Fulham and the club's fans looks unbreakable - and he appears to be a manager who has finally found a home.
