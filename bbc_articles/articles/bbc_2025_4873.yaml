title: 'Barbra Banda: NWSL investigating ''hateful language'' towards Orlando Pride
  striker - BBC Sport'
date: '2025-03-25'
section: Women's Football
url: http://www.bbc.co.uk/sport/football/articles/cr52yrve641o
content: |-
  The National Women's Soccer League says it is investigating an incident involving "hateful language" directed at Orlando Pride striker Barbra Banda.

  Banda scored twice in Orlando's opening game of the 2025 season - a 6-0 win over Chicago Stars

  The National Women's Soccer League is investigating an incident involving "hateful language" directed at Orlando Pride striker Barbra Banda by a fan. The incident occurred during Orlando's 2-0 win over Gotham FC on Sunday at Sports Illustrated Stadium in New York. Gotham said they had apologised to Orlando and that they were working with the NWSL to investigate the incident. "This behaviour is unacceptable and has no place in our league or in our stadiums," the NWSL, Orlando Pride and Gotham FC all said in a statement on Monday. "Stadium security swiftly responded to the incident once it was reported and directly addressed the individual, monitoring the situation for the remainder of the match," Gotham added. Banda was named the BBC Women's Footballer of the Year in 2024 after scoring 17 goals to help Orlando claim their first NWSL championship last season. The 25-year-old also netted four goals for Zambia at the Paris Olympics last summer to become the leading African goalscorer in Olympic history with 10.
  • None Who is BBC Women's Footballer of the Year Banda?

  "We are committed to ensuring that our venues are safe and respectful environments for all - especially for the athletes who represent the very best of our sport," the NWSL said. "Barbra Banda is both an exceptional player and person, and the NWSL is immensely proud to support her as a member of our league." Orlando are top of the NWSL after winning their first two games of the 2025 season, including a 6-0 victory over Chicago Stars in which Banda scored twice. "Barbra is an outstanding role model and an influential advocate for soccer both in Africa and here in the United States. We look forward to continuing to celebrate and support her on and off the pitch," Orlando Pride added.
