title: Boys aged 11 and 12 arrested after animals killed at college - BBC News
date: '2024-02-27'
section: London
url: http://www.bbc.co.uk/news/uk-england-london-68419808
content: |-
  Some animals died and a barn owl is missing following the incident at a west London college campus.

  Capel Manor College said animals died during the incident at its Gunnersbury Park campus

  Two boys aged 11 and 12 have been arrested on suspicion of animal cruelty and burglary after police received reports "several animals had been killed" at a college in west London.

  The pair were arrested after officers were called to Capel Manor College's Gunnersbury Park campus on Sunday.

  Both boys have been bailed.

  The college confirmed some animals had died and also appealed for help in finding its "much-loved" barn owl Shiraz who is now missing.

  In a statement, the Met Police said: "Officers visited the scene and viewed CCTV footage. A forensic examination was also carried out."

  A spokesperson for the college said the Gunnersbury Park campus "experienced a break-in that resulted in damage to some of the animal areas, and sadly some animals died".

  The college added Shiraz the owl can be identified by a blue ring on her left ankle.

  "The safety of our staff, students, animals and community is of utmost importance to us," it said.

  "A team is onsite co-ordinating with the police in their ongoing investigation, and additional security staff have also been deployed at the campus."

  Teaching was held online on Monday before in-person learning resumed on site on Tuesday.

  The college's website says it specialises environmental teaching, offering young people and adults the opportunity to take care of its estates, gardens, farm and zoos.

  Principal Peter Brammall thanked staff "who worked tirelessly over Sunday and Monday to deal with and restore the devastation left by the intruders".

  "Our campus is now back open, student lessons are back on track and the team is working with our partners to bring in new animals over the next few weeks to replace those that were sadly lost," he said.

