title: '''Magical'' Liverpool win for Plymouth Argyle fans - BBC News'
date: '2025-02-10'
section: England
url: http://www.bbc.co.uk/news/articles/ckgn64e1k6ko
content: |-
  The Pilgrims progressed to the fifth round of the competition after a 1-0 win

  Plymouth Argyle fans are celebrating after their side beat Premier League leaders Liverpool in the FA Cup. Comedian and Argyle fan Josh Widdicombe said: "Suddenly people want to talk about Plymouth Argyle for the first time in my life." Fan Jo Benwell said: "It was incredible, it was such a magical afternoon." The Pilgrims progressed to the fifth round of the competition after a 1-0 win at Home Park on Sunday. It is the first time the Devon side have beaten Liverpool since February 1956.

  "It was incredible, it was such a magical afternoon"

  Ms Benwell said: "At the final whistle I just burst into tears, sharing that moment with my child, hoping that in 20 to 30 years she'll still be talking about it. "I couldn't sleep [on Sunday night], just scrolled social media taking in reactions - it was great." Paul Sweet, a supporter from Cornwall, said: "It was absolutely fantastic, I think it's up there with the best game I've seen Argyle play. "We looked solid at the back and we do possess some danger going forward. "I think they [Liverpool] possibly underestimated us, but you can't take anything away from the players. "They put absolutely everything into that, everything!"

  Plymouth Argyle lost to Liverpool in 2017, following an away draw, which earnt them a replay at Home Park that year. Speaking to the BBC after the game on Sunday, one fan said: "Eight years ago we went up to Liverpool, drew 0-0, we came back to here and they beat us 1-0. "We've got victory at last."
