  Border Force officers at some of the UK's biggest airports are walking out while Royal Mail will not be delivering letters.

  Are teachers in the top 10% of earners?

  As well as more strikes by ambulance staff, rail workers, nurses and postal staff in the new year, the UK is also facing the prospect of walkouts by teachers. Another teachers' strike is already scheduled to take place in Scotland on 10 and 11 January. Schools were forced to closed during action in November and December. Elsewhere in the UK, teachers are also considering industrial action over pay, with a decision expected in January. Facing questions from teachers and parents, earlier this week Education Secretary Gillian Keegan said that teachers were in the top 10% of earners in some parts of the country. Her comments drew criticism from some, with one teacher saying that the profession being one of the best-paid in the public sector was a "shameful" illustration of how poorly public servants were paid. The BBC's Lucy Gilder has been looking into this. She says that to be in the top 10% of earners across the country, a full-time employee would have to earn a monthly salary of at least £5,090, according to October 2022 estimates from the Office for National Statistics (ONS) . This would be more than £61,000 a year. The average classroom teacher salary of about £39,000 would be a long way short of the top 10%.
