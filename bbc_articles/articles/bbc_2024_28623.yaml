title: Met officers investigated over pregnant woman's police crash death - BBC News
date: '2024-11-20'
section: London
url: http://www.bbc.co.uk/news/articles/cwy42lxew44o
content: |-
  The heavily pregnant woman died after a collision with an unmarked car in south-east London.

  Tributes were near the scene of the crash on the A20 at Eltham, south-east London

  Two Metropolitan Police officers are under criminal investigation after a pregnant woman and her baby died in a collision with an unmarked police car in south-east London. The woman, 38, who was in the full-term of her pregnancy, was driving a car which was hit by an unmarked police car on 17 October on the A20 in Eltham. Her car was hit near the junction of Kidbrooke Park Road by one of two police cars that were responding to an unrelated incident. The police watchdog, the Independent Office for Police Conduct (IOPC), said the officers were being investigated for potential driving offences including causing death by dangerous driving.

  Both officers are also being investigated for potential gross misconduct proceedings, the IOPC said. A third officer, who was a passenger in the car involved in the crash, is being investigated for potential misconduct. The watchdog's regional director Mel Palmer said: "The deaths of the woman and her baby are tragic, and our thoughts remain with her family and friends, and all of those affected. "This was a devastating incident on a busy road and our investigators are working hard to establish all of the circumstances leading up to the collision and the actions of the officers involved."

  The police watchdog is investing the woman's death

  Ms Palmer added that at the end of the investigation, the IOPC will decide whether to refer a file of evidence to the Crown Prosecution Service to consider possible criminal charges. It will also decide whether any officers should face disciplinary proceedings. Investigators have so far commissioned reports from a forensic collision experts, taken witness statements and reviewed CCTV and dash cam footage, according to the IOPC. The woman who died has been formally identified, but her family has asked for her name not to be published. The London Ambulance Service, London Fire Brigade and London's Air Ambulance attended the crash scene at 18:15 BST on Thursday. The two officers who were in the car involved in the collision were taken to hospital following the collision, but were discharged a short time later. Flowers and tributes were left at the scene of the crash. One of them read: "My deepest thoughts are with you, your baby and your family and friends. "The most awful tragedy that should never have happened and hope your family get some justice. RIP beautiful lady and your baby." An inquest was due to open last week, but is to be rescheduled.
