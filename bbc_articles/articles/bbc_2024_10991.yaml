content: |-
  Natalie Elphicke says Rishi Sunak is not stopping the boats and is "letting the country down".

  Natalie Elphicke said Rishi Sunak was not stopping the boats and was "letting the country down".

  Speaking after her defection from the Conservatives to Labour, she said her new party had changed under Sir Keir Starmer.

  She was asked about her past criticism of Labour’s immigration policy after claiming the party could not be trusted.

  Tory MP defects to Labour as Sunak faces Starmer at PMQs
