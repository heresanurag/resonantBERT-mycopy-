title: 'Rob Burrow: Rugby unites to remember Leeds star who died of MND - BBC Sport'
date: '2024-06-08'
section: Leeds
url: http://www.bbc.co.uk/sport/rugby-league/articles/c03390z6wylo
content: |-
  Rugby league and rugby union come together on their biggest days of the season to pay tribute to Rob Burrow.

  Rob Burrow's image was displayed on Wembley's big screens during a minute's silence

  Rugby league and rugby union have come together on their biggest days of the season to pay tribute to Rob Burrow. The 41-year-old died on Sunday having lived with motor neurone disease (MND) since being diagnosed in late 2019. The Challenge Cup final between Wigan Warriors and Warrington Wolves had its kick-off moved to 15:07 BST in honour of Burrow's number seven shirt which he wore during a stellar rugby league career with Leeds Rhinos. Two huge banners depicting Burrow were displayed at either end of Wembley while Abide With Me was sung as the players and match officials walked out wearing shirts bearing his number on their backs. A minute's silence was observed at the start of both the men's and women's Challenge Cup finals. At Twickenham in rugby union's Premiership final fans stood and applauded for Burrow in the seventh minute, a tribute which also took place in both matches at Wembley.

  On a shirt placed underneath the rugby league statue at Wembley a fan wrote: "You were a great player, a great man and an even bigger inspiration. We will never forget you." Burrow's team-mate Jamie Peacock told BBC Sport: "It's about celebrating the good that Rob brought not only to the world of rugby league, but to the world as a whole. "In his battle with MND the greater world got to be inspired by it." He added: "Sitting back nearly a week after Rob's passed away, that's the celebration I try to take out of it is the bigger world coming together." Fellow half-back Kevin Brown praised Burrow's attitude on the field as a player, standing only 5ft 5in against much bigger opposition. "He was an inspiration for any little player because he punched above his weight," he told BBC Sport. "When people talk about toughness they normally talk about the big men, but Rob Burrow was as tough as anyone and he'd scare the life out of the big men because often he'd duck underneath and go through the other side."

