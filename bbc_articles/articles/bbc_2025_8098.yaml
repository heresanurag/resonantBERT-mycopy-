title: 'Tour of Flanders 2025: Tadej Pogacar wins second title in Belgium - BBC Sport'
date: '2025-04-06'
section: Cycling
url: http://www.bbc.co.uk/sport/cycling/articles/creq82ezprgo
content: |-
  Slovenia's Tadej Pogacar wins his second Tour of Flanders title, with defending champion Mathieu van der Poel finishing third.

  Tadej Pogacar previously won the Tour of Flanders in 2023

  Tadej Pogacar held off defending champion Mathieu van der Poel to claim his second Tour of Flanders title. The three-time Tour de France champion, racing for UAE Team Emirates-XRG, completed the 270km course in Belgium in five hours, 58 minutes and 41 seconds. Pogacar finished just over a minute clear of Denmark's Mads Pedersen in second, while Dutchman Van der Poel came third, having recovered from a crash with 127km to go. The Tour of Flanders, which began in 1913 and known as De Ronde, is a historic one-day road race held in Belgium every spring and highlighted by climbs and cobbled sectors. "The goal was to win, but at the end it's hard to realise. I cannot be more proud of the team," said 26-year-old Pogacar. Van der Poel re-joined the peloton within just 10km of his crash and tussled with Pogacar through the hills.

  Lotte Kopecky became the first woman to win three Tour of Flanders titles

  But the Slovenian pulled away with a race-winning attack on the final ascent of the Oude Kwaremont with around 15km to go and cruised along the flat roads to a solo victory. The chasing pack sprinted for the remaining medal positions with Belgian Wout van Aert missing out on a podium finish. In the women's race, Belgian Lotte Kopecky made history as the first cyclist to win three editions of the event. Riding for Team SD Worx, the 29-year-old claimed victory in thrilling style by winning a four-way sprint finish ahead of France's Pauline Ferrand-Prevot, Liane Lippert of Germany and Poland's Katarzyna Niewiadoma-Phinney. "It was a crazy race with a lot of crashes in the beginning," said Kopecky. "When it went with the four of us I was pretty confident." Italian rider Elisa Longo Borghini was among the favourites with Kopecky and also chasing a third Tour of Flanders title, but had to withdraw after crashing around 95km from the finish. Around 750,000 spectators gathered on the streets from Bruges to Oudenaarde for the event, which is one of five one-day races in the cycling calendar known as the Monuments. The others are Milan-San Remo, Paris-Roubaix, the Liege-Bastogne-Liege and Tour of Lombardy. On 13 April, Pogacar will be taking part on more cobbled tracks for the Paris-Roubaix race - known as 'hell of the north' - for the first time, where Van der Poel is again the defending champion. "Roubaix is a completely different race, but I will accept the challenge and try to do my best," added Pogacar.
