title: 'Jordan Sinnott: Murder inquiry after Matlock Town footballer dies - BBC News'
date: '2020-01-26'
section: Nottingham
url: http://www.bbc.co.uk/news/uk-england-nottinghamshire-51249670
content: |-
  Matlock Town's Jordan Sinnott suffered head injuries in an attack in Retford, Nottinghamshire.

  A non-league footballer has died after being attacked during a night out, police have said.

  Jordan Sinnott, who played for Matlock Town, was found unconscious in Market Place, Retford, Nottinghamshire, at about 02:00 GMT on Friday.

  Police have launched a murder investigation after the 25-year-old midfielder was found following "two large-scale disturbances" in the town.

  He suffered a fractured skull and died in hospital. A man has been arrested.

  The 27-year-old remains in police custody and was earlier being questioned on suspicion of causing grievous bodily harm.

  Det Insp Justine Wilson said: "Mr Sinnott's death is a sad and significant development in this investigation.

  "Our investigative team's focus will remain on identifying those responsible and bringing them to justice."

  On Saturday, Matlock Town, who play in the Northern Premier League, said players found out about Sinnott's condition when they arrived for their match versus Mickleover Sports and "agreed it should be postponed to a future date".

  The club issued a statement after Mr Sinnott died, which said: "His family and friends were with him at his bedside and we send our sincere condolences to them all at this very sad time."

  They tweeted: "You weren't just a footballer, you were our friend and brother. You gave us incredible memories and scored your first career hat-trick in your final game for the club. Rest easy Jordan, we love, miss and will never forget you."

  Sinnott had joined Matlock from National League North side Alfreton Town, who also issued a statement in which they described the player as a "model footballer and an exceptional talent".

  Others have paid tribute on social media:

