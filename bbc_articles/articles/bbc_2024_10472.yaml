title: How Iranian state TV broke news of President Ebrahim Raisi's death - BBC News
date: '2024-05-20'
section: General
url: http://www.bbc.co.uk/news/world-middle-east-69037323
content: |-
  Footage shows the site of the helicopter crash which killed the president and foreign minister.

  Iranian state media has announced the death of President Ebrahim Raisi, who has been killed in a helicopter crash in a mountainous area of north-western Iran.

  He was killed along with Foreign Minister Hossein Amir-Abdollahian and several others, when the helicopter they were travelling in came down on Sunday.

  Here's how the country's state TV broke the story.
