title: Rishi Sunak says he has confidence in Met Police chief after protest row -
  BBC News
date: '2024-04-22'
section: UK
url: http://www.bbc.co.uk/news/uk-68872398
content: |-
  But the prime minister says Sir Mark Rowley still needs to rebuild the trust of the Jewish community.

  Clips have been published showing the exchange between Gideon Falter and Met Police officers

  Rishi Sunak said he has confidence in Met Police chief Sir Mark Rowley after criticism over how a Jewish man was treated at a pro-Palestinian march.

  But the prime minister said Sir Mark still needs to work to rebuild the trust of the Jewish community.

  Sir Mark had faced a call to resign after antisemitism campaigner Gideon Falter was called "openly Jewish" by police and threatened with arrest.

  The Met has apologised and offered to meet Mr Falter to do so personally.

  New footage of the exchange published by Sky News on Sunday shows Mr Falter telling officers he wanted to get to an area on the other side of where pro-Palestinian protesters were marching in London on 13 April.

  Police officers do not let him pass and instead offer to escort him via another route, avoiding the protesters, so he will be "completely safe".

  During the exchange, an officer claims Mr Falter is being "disingenuous" and was trying to "antagonise" others because he "took it upon himself" to deliberately walk "right into the middle" of the march.

  Mr Falter, the head of the Campaign Against Antisemitism who was wearing a kippah, was described by an officer as "openly Jewish".

  He later told the BBC he felt he "was being treated like a criminal for being Jewish" and that police were "curtailing the rights of law-abiding Londoners" to walk wherever they like freely.

  Home Secretary James Cleverly and Minister for Policing Chris Philp are meeting Met Police commissioner Sir Mark for talks on Monday.

  Mr Philp said he was looking for "reassurance that every step possible is going to be taken to make sure all citizens - but including and in particular Jewish citizens - don't suffer any fear or harassment" in London.

  He said he and the home secretary would like to hear what Sir Mark would be "doing differently" to ensure this was always the case.

  Speaking at a news conference on Monday, Mr Sunak said: "What happened was clearly wrong and it's right that they've apologised for that.

  "Yes, I do have confidence in him but that's on the basis that he works to rebuild the confidence and trust not just of the Jewish community but the wider public, particularly people in London, but more broadly.

  "And you regain that trust and that confidence by making it clear that the police are not tolerating behaviour that we would all collectively deem as unacceptable when we see it."

  Mayor of London Sadiq Khan has also met Sir Mark for a separate discussion.

  A spokesperson said it was a "good, frank and constructive discussion", adding that the Commissioner had Mr Khan's "full confidence".

  "The Commissioner has assured the Mayor that he will continue to drive forward change to ensure the Met does a better job commanding the confidence of all London's communities and learns the lessons from recent events on how to engage and communicate with them better," he said.

  Mr Falter previously told the BBC "it's time for Sir Mark Rowley to go" - a call echoed by former home secretary Suella Braverman, who said it shows "the wholesale failure to combat antisemitism" by the police.

  Ms Braverman said the police had taken sides at the protest, telling BBC Radio 4's Today programme: "If this march was peaceful, why was a Jewish man not able to cross the street peacefully?"

  Rishi Sunak was asked for his opinion on the Met during a news conference on the Rwanda plan on Monday

  The Met apologised twice on Friday, and Assistant Commissioner Matt Twist has written to Mr Falter to offer a private meeting to apologise to him personally.

  The London Jewish Forum - which includes representatives from the Board of Deputies of British Jews and other Jewish groups - said it met Sir Mark on Monday morning for talks, and that Met officers apologised again.

  It said it would meet the police further to discuss the impact of the protests "in terms of disruption and intimidation of the Jewish community", and urged the police and government to reduce the number of protests and move them to less disruptive locations.

  Several politicians have criticised the force's handling of the exchange, although stopped short of calling for Sir Mark's resignation.

  Deputy Foreign Secretary Andrew Mitchell said the Met's response was "way over the top". Labour's Shadow Home Secretary Yvette Cooper said the incident "clearly wasn't handled properly" but added Sir Mark was "leading important reforms" to the Met "and it's really important that we work with the police".

  Former chief superintendent in the Met Police Dal Babu told BBC Breakfast on Monday that the fuller 13-minute clip of the incident showed "a totally different encounter to the one that Mr Falter has reported".

  Mr Babu said the officer's "openly Jewish" comment was "not acceptable". But he added: "What you see [Mr Falter] doing is attempting to go against the march, trying to push past the officers, and I think for 13 minutes the officers showed great restraint.

  "They offered to take him to a crossing point, they offered to help him and the group he was with the opportunity to cross at a more appropriate place. So the narrative that's been pushed for the past few days is not accurate."

  Mr Falter told ITV's Good Morning Britain on Monday that his members often attend pro-Palestinian marches to "force the police to make sure these things are safe for Jewish people" - and he would turn up at the next one.

  He said the protests were "so badly policed, that if you are a Jew on the sideline of this thing, they have to threaten you with arrest to get rid of you".
