title: Adele will take a 'big break' from music after Las Vegas and Munich shows -
  BBC News
date: '2024-07-17'
section: Culture
url: http://www.bbc.co.uk/news/articles/c1dm3dp9j3xo
content: |-
  The pop star says her "tank is empty" after a two-year concert residency in Las Vegas.

  Adele says she will take a 'big break' from music

  Adele's Las Vegas residency will reach its 100th and final show in November

  Adele has revealed she plans to take an extended break from music after her current run of concerts. "My tank is quite empty at the minute," the star told German broadcaster ZDF ahead of a 10-date residency in Munich. "I don’t have any plans for new music at all," she said. "I want a big break after all this and I think I want to do other creative things just for a little while. “You know, I don’t even sing at home at all. How strange is that?” The star's last album came out in 2021, and she has spent the past two years playing a weekend residency in Las Vegas, recently completing her 90th show at the 4,000-capacity Caesar's Palace. The show is due to conclude in November, and Adele said the experience had been emotionally draining. "Even though it's a very manageable size of crowd, it's really been an emotional exchange," she said. "I'm sure I'll feel even more like [that] every night after the shows in Munich. But it's a positive thing. It's just such an exchange of energy." However, not every Vegas concert has gone to plan.

  In June, Adele angrily cursed an audience member who allegedly yelled "Pride sucks" during one of her shows. "Did you come to my... show and just say that Pride sucks?" she scolded. "Don’t be so... ridiculous. "If you have nothing nice to say, shut up, all right?" Asked about the incident, the star admitted she was easily riled up. "Everything makes me angry," she told ZDF. "Absolutely everything. "I'm 36 years old. I'm old and grumpy now."

  Adele visited the site of her Munich concerts last week, before heading to watch England play Spain in the Euro 2024 final

  The specially-built stadium will host 74,000 people over the 10-date residency

  Her Munich shows will be on entirely different scale to the Las Vegas residency, with 74,000 fans expected to watch her every night in a specially-built "pop up" stadium. The venue will also host an "Adele experience" featuring an English pub, a stage for a cover band and stalls selling specially designed cocktails. Organisers are also aiming to get into the Guinness Book of World Records for the largest outdoor screen of all time, measuring 220m in length. Adele posted pictures of the venue to her Instagram account on Sunday, calling the set-up "bloody exciting". And she told ZDF that the video installation would enhance the experience for fans. "They just want to see your face and know it's you, so the screens are enormous."

  Adele's interaction with fans has been a highlight of her Vegas residency

  The first show will take place on 2 August but the residency is yet to sell out, with 5% of tickets still available, according to German press agency DPA. Promoter Marek Lieberberg said the tickets at the upper and lower ends of the price range had the most availability. The cheapest tickets cost €79 (£66) and the most expensive €430 (£360). But despite all the acclaim, Adele said one of the reasons she wants to take a break from music is because of a struggle with the limelight. "I miss everything about before I was famous, I think probably being anonymous the most," she said. "I like that I get to make music all the time, whenever I want to, and people are receptive to it and like it. That's pretty unimaginable. But the fame side of it, I absolutely hate. "The fact that people are even interested in my songs and my voice is pretty wild. I don't think it ever gets normal. So it's worth it, the balance."
