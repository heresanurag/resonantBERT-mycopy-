title: Frank Bruno 'can't wait to get back to work' after two weeks in hospital -
  BBC Sport
date: '2025-03-21'
section: Boxing
url: http://www.bbc.co.uk/sport/boxing/articles/c0mw7v7n2r3o
content: |-
  Former world heavyweight boxing champion Frank Bruno says he "can't wait to get back to work" after falling ill on a plane.

  Former world heavyweight boxing champion Frank Bruno says he "can't wait to get back to work" after falling ill on a plane and being taken to hospital.

  The 63-year-old spent nearly two weeks in a hospital in Doha after becoming unwell, external on a flight that took off from Heathrow on 3 March.

  The boxer said on X, external: "Morning, so my illness story is out! Now you know why I have been quiet on social media.

  "The last three weeks have been tough, especially not knowing what was wrong with me and a viral infection can mean loads of things.

  "The office tells me already this morning I have had hundreds of messages from well-wishers so thank you. Can't wait to get back to work."

  An 'Evening with Frank Bruno' event that was scheduled for this Sunday in Manchester has been postponed.

  Bruno won 40 of his 45 professional fights between 1982 and 1996, beating American Oliver McCall in 1995 to win the WBC heavyweight title.
