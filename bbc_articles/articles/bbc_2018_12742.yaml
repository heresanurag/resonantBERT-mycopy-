  Mrs May is reported to have told MPs that she had won a number of concessions from the EU, including the role of the European Court of Justice in enforcing the rights of EU citizens in the UK.

  She also rejected suggestions that her top European adviser, Olly Robbins, was "freelancing" when the UK agreed to consider extending the post-Brexit transition period beyond 2020.

  Talks on the UK's exit from the EU are said to be 95% complete, but have stalled over the Irish border issue.

  The UK prime minister has said that having the option of extending the transition could provide the "safety net" or "backstop" needed to guarantee no new visible border checks where Northern Ireland meets the Republic.

  But her plans have come in for criticism among Tory ranks, with a social media campaign called "Standup4Brexit" claiming to have 50 MPs backing its call for Mrs May to "chuck" her current strategy.

  The prime minister has said any temporary measure used to avoid a hard border would have to end by the next general election, which is due in 2022.

  At the weekend, anonymous quotes about Mrs May in the Sunday newspapers sparked a backlash from MPs of all parties.

  The Sunday Times quoted a Tory backbencher saying: "The moment is coming when the knife gets heated, stuck in her front and twisted. She'll be dead soon."

  Another said she should "bring her own noose" to the 1922 Committee meeting. Tory MPs said those behind the quotes were "spineless cowards" who should be thrown out of the party.

