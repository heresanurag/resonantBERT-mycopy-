id: bbc_2018_12742
title: Theresa May 'wins over' Tory critics at Brexit meeting - BBC News
date: '2018-10-24'
section: UK Politics
url: http://www.bbc.co.uk/news/uk-politics-45959456
content: |-
  A potentially hostile meeting turns out to be a "petting zoo, not a lion's den", one MP says.

  Theresa May has been applauded by Tory MPs after making a "heartfelt" appeal for unity over Brexit and urging her critics to get behind her.

  The prime minister has been addressing all her MPs in Parliament, many of whom are seeking a change of approach.

  Asked by one MP what concessions she had made to the EU, she set out areas where the EU had itself given ground.

  Former minister Amber Rudd said the PM "won the room" while another MP said it was a "petting zoo, not a lion's den".

  The sound of desks and doors being thumped could be heard coming from the Commons room where the 1922 committee - an elected body of MPs which represents backbenchers and also oversees leadership contests - met privately.

