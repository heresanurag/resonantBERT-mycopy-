title: 'A5: Two teenagers killed in single-vehicle Omagh crash - BBC News'
date: '2024-05-01'
section: Northern Ireland
url: http://www.bbc.co.uk/news/uk-northern-ireland-68934323
content: |-
  One of two teenage crash victims has been named by her school as Kamile Vaicikonyte.

  Two teenagers have died following a single-vehicle crash on the A5 in Omagh, County Tyrone, on Tuesday. A 19-year-old man and a 17-year-old girl died at the scene on the Doogary Road at about 21:50 BST, police said. One of the crash victims has been named by her school as Kamile Vaicikonyte. On Monday, Kamile took part in a demonstration at her school to remember people who have died on the A5 and calling for work to start on the long-awaited upgrade of the road. In a statement, the principal of St Ciaran's College in Ballygawley, Paul Lavery, described the Year 13 pupil as a "bubbly, out-going girl who was very popular with both staff and pupils".

  St Ciaran's College pupils earlier this week remembered those who have died on the A5

  Mr Lavery added the whole school community is "deeply shocked and saddened" to learn of her death and said the whole school's thoughts are with Ms Vaicikonyte's family at this time. He said trained staff from the Education Authority critical incident response team will be on site to assist pupils and staff.

  More than 50 people have died on the A5 since 2006

  As part of Monday's event, the school also released a video, external where pupils stood in the shape of a cross. More than 50 people have been killed on the road since 2006 with upgrade work hit by a series of delays and legal challenges.

  First Minister Michelle O'Neill described the loss of two young lives on the A5 as "absolutely heart-breaking". "My heart goes out to their families, friends, and everyone affected by this tragedy," Ms O'Neill said. "No family should ever have to experience this unimaginable heartache." In her post on social media, Ms O'Neill also said that the long-awaited A5 road upgrade "must be built". Stormont's Infrastructure Minister John O'Dowd offered his "heartfelt condolences" to the teenagers' families. He added: "Too many lives have been cut short or forever changed by serious injury as a result of road traffic collisions on the A5". In February the Irish government confirmed it would contribute €600m for the upgrade of the A5, as part of investment for cross-border projects. The following month Mr O'Dowd met campaigners who want the A5 road upgrade to be prioritised by Stormont. At that time, the minister said he was determined to deliver the project but said he could not provide a timescale for making a decision on when work could begin. On Wednesday, Mr O'Dowd said he has requested a meeting with senior police officers to "discuss serious road safety concerns along this road and what can be done in the interim". The SDLP's West Tyrone assembly member Daniel McCrossan said the A5 road "cannot be allowed to claim any more lives". He said immediate action was needed to progress the road upgrade.
