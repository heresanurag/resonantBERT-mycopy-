title: 'Manchester: Tributes paid to girl, 4, who died in suspected arson - BBC News'
date: '2025-03-07'
section: Manchester
url: http://www.bbc.co.uk/news/articles/cz03yp07880o
content: |-
  Lesma-Rose Wibier's family describe the four-year-old as "the most beautiful girl, inside and out".

  Lesma-Rose Wibier was "the most beautiful girl inside and out", her family said

  A four-year-old girl who died following a suspected arson attack at a house in Manchester has been named by police as Lesma-Rose Wibier. She died in hospital after being pulled from the blaze at a property in the Rusholme area of the city at about 12:30 GMT on Sunday. Greater Manchester Police (GMP) said a 44-year-old woman known to Lesma-Rose - initially detained on suspicion of arson with intent to endanger life - had now been re-arrested on suspicion of murder. Paying tribute to the little girl, her family said: "Lesma-Rose was the star of the family. Anyone who knew her knew she was the most beautiful girl inside and out."

  The fire happened at a house in Gateshead Close in Rusholme

  Lesma-Rose's family added: "She always had a smile on her face and could put the same on others'. "She was such a smart and intelligent girl in her own unique ways, and she will be deeply missed by anyone who was blessed to meet her." The arrested woman has been detained under the Mental Health Act and is awaiting further assessment. Lesma-Rose's family have asked for privacy, GMP said. A spokesperson for the force said they were awaiting the results of a post-mortem examination by a Home Office pathologist to determine the cause of Lesma-Rose's death. Det Ch Insp Charlotte Whalley said the emergency services "did their utmost best" to save Lesma-Rose after she was pulled from the house. Anyone with any information about the fire have been urged to contact police.
