  As well as individual tradespeople, organisations are also being targeted. Power tools worth more than £20,000 were stolen from a charity workshop in Chichester, West Sussex, just before Christmas. Sue Livett, the managing director of the Aldingbourne Trust, which supports adults with learning disabilities, said: "They were high value, good, solid tools, all worth a lot of money and necessary for the work we do." Since the break-in the charity says it has increased security, but the long-term effects will be harder to fix: "It makes people a bit less trusting and will affect the activities they can do," Ms Livett said.

  Gas fitter, Shoaib Awan, started a campaign group after having his tools stolen

  Tradespeople from across the UK gathered in London on Monday to call for a change in the law to help deter the theft of their valuable tools. Trades United, the campaign group organising the rally, says it wants to see longer sentences for criminals and curbs on selling second-hand power tools at knock-down prices. Shoaib Awan, from the group, says the crime is a nationwide "plague that cripples businesses - the loss of work, the loss of earnings".

  Mr Awan, who is a gas fitter from Romford, east London, founded Trades United after £8,500-worth of tools were stolen from his van. "Things have to change. The penalties and punishments have to be there," he said. Trades United is calling for stronger regulation around the sale of tools at car boot sales and markets.

  Campaigners say car boots offer a place for criminals to sell on stolen goods.

  At Kent Police's HQ in Maidstone, two shipping containers house nearly 4,000 stolen tools, worth about £1m, which were seized by the police over the last year. Officers say they cannot trace the owners for a "large percentage" of them, and are calling for the compulsory registration of power tools' serial numbers at the point of purchase.

  Thousands of stolen tools are being stored by Kent Police

  The Theft of Tools of Trade (Sentencing) Bill, tabled by Amanda Martin, MP for Portsmouth North, seeks to impose harsher sentencing for tool thieves. The bill proposes adding theft of tools to the list of examples considered as causing "significant additional harm" to a victim. It also aims to better recognise the total financial impact of having tools stolen, such as repairs to a vehicle and loss of work. "When you add in the value of the work loss, the reputational damage, the damage to the vans as well it can far exceed the value of the stolen tools," the MP said. "Even though we have preventative measures in place, tools are still being nicked." The Bill is due for a second reading in April.
