id: bbc_2025_2494
title: Tool thefts are a 'plague', tradespeople say - BBC News
date: '2025-02-03'
section: England
url: http://www.bbc.co.uk/news/articles/ckg7285zz8eo
content: |-
  One man says he struggled to afford replacements after his tools were stolen from his van.

  Tens of millions of pounds worth of tools are stolen every year, research shows

  A Kent roofer who had £3,000 worth of tools stolen in the time it took to buy a coffee is backing calls for tougher penalties for thieves. Dennis Richardson, from Maidstone, said: "We were out of sight for a couple of minutes at a coffee shop. "I've got a family, and we've got to eat, we've got to pay bills. To suddenly have to find £3,000 is not easy," he said. The government said it would continue to work with the police "to explore ways to tackle tool theft, ensure justice for victims, and punish criminals".

  A bill is going through Parliament, tabled by a Hampshire MP, which seeks to impose harsher sentencing for tool thieves.

  Mr Richardson, who works across the South East, and whose van was targeted in Dulwich, south-east London, said: "I would say they had followed me down that road. "Every single power tool had been stolen." He said: "I stay away from certain areas of London now. It's restricted the jobs I want to take." He joined a rally in Parliament Square on Monday, where campaigners demanded greater enforcement.

  Paul Saunderson-Barker, a plumber from Sussex, who also attended the rally, said he was left "devastated" after his van was broken into. He told the BBC: "They stole power tools and a thermal imaging camera. I had over £6,000 of equipment stolen." He said: "Other self employed traders locally have rallied around to help me."

  Work vans are often damaged by thieves.

  Tens of millions of pounds worth of equipment is stolen each year, according to recent research, external by one insurance company. Figures show that in 2023, of all the incidents of tool theft reported to the police, about half were taken from a vehicle. Many of these are taken from vans, which are often left severely damaged after being targeted.

  Stephen Baker had around £15,000 worth of tools stolen.

  Builder Stephen Baker estimates he lost about £15,000 worth of tools when his van was broken into a year ago. "It took them 22 seconds to get in to the van, four-and-a-half minutes to empty it," he said. After losing his business because he was unable to work, Mr Baker said he tried to take his own life. He said everything that he had ever worked for had been taken away in a matter of minutes. "It's not just your tools that have gone missing, it's your career, your way of providing for family, it's everything. It's horrible", he says.

