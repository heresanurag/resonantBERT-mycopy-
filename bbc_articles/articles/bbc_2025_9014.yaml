content: |-
  Lucy’s relationship was "like something out of a rom-com”, but quickly became abusive.

  'I thought the abuse was normal - he was my first proper boyfriend'

  To play this video you need to enable JavaScript in your browser. This video can not be played Lucy said her ex-boyfriend isolated her from everybody

  Lucy, not her real name, was just 13 years old when she met her ex-boyfriend online. The start of their relationship was "like something out of a rom-com or romance novel". "Within two weeks of first contacting him and adding him on social media, he was telling me he loved me," she said. "At the time, I didn't know that's not necessarily normal for relationships." She recalled how "in the flick of a switch" his personality had become "very dark", physically abusive and controlling. "He was just very angry, very possessive," she said. "He had access to all my social media - all my passwords, all my logins. "If people would message me and I was at school, he would message them back and then delete the chats, so I couldn't see it." Lucy says she was not allowed to see family or friends and was "isolated" from everybody she knew and trusted. "I thought it was normal, because he was my first proper boyfriend," she said.
