  Murs was due to support Take That at the Hydro in Glasgow but his flight from London was cancelled.

  This video can not be played To play this video you need to enable JavaScript in your browser. Glasgow singer becomes last-minute Take That support

  It's the break that all musicians dream of. An up-and-coming singer has been credited with saving the day, after standing in for Olly Murs at a Take That gig in Glasgow at the last minute. Daniel Rooney had been playing at a hotel bar in the city when he was asked to step in for Murs, who could no longer make it due to transport issues. Take That's frontman, Gary Barlow, later thanked him on Instagram. "This young man saved the day, thank you," Barlow wrote. He added a picture of Rooney and three love heart emojis. Writing on Instagram, Rooney said the presenter Ross King had spotted him at the Radisson hotel and brought him over to the Hydro. "Craziest 30 minutes ever," he said. "Also a big thanks to the Take That lads for calming me down before the show and talking setlist tunes. Absolute legends!" he added.

  Take That singer Gary Barlow praised Daniel for saving the day

  On social media, fans praised Rooney's performance at the Ovo Hydro, with one saying he'd smashed it. Murs, who has been supporting the world famous boy band on their This Life tour, was unable to make the gig after his flight from London was cancelled. He had been updating fans over the day on his Instagram story on his efforts to get to Glasgow. He posted a video from inside the plane before exiting and attempting to board another flight. Eventually, he posted on social media that it wasn't going to happen.

  Olly Murs had been unable to get to Glasgow due to flight issues

  "So sorry to everyone at the Take That show tonight in Glasgow, unfortunately I won't be there," the 39-year-old said on X. "Don't think I've ever missed a gig before, am so annoyed!" He was taking a car to ensure he made the Saturday and Sunday shows at the Ovo Hydro. After Glasgow, Take That are heading to Manchester for their next gigs. But their five dates next week will now be held at the AO Arena, after they were forced to move from the troubled Co-op Live arena amid a series of "technical issues".
