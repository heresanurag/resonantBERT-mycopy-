title: England's resilience keeps them on course for Euro 2024 glory - BBC Sport
date: '2024-07-08'
section: England Men
url: http://www.bbc.co.uk/sport/football/articles/cjr4njlrdyyo
content: |-
  England's resilience and individual brilliance keeps them on course for glory as they seal a Euro 2024 semi-final against the Netherlands, writes Phil McNulty.

  'Magic moments and resilience can lead England to history'

  This video can not be played To play this video you need to enable JavaScript in your browser.

  England's oddity of a Euro 2024 campaign was encapsulated by two qualities as they moved almost without trace into the last four of a major tournament once more. Gareth Southgate and his players have heard, with justification, plenty about what they cannot do as a largely indifferent set of performances took them through the group stage and stumbling into the knockout rounds. It is now time to give England credit for what they can do. The quarter-final win on penalties over Switzerland in Dusseldorf was another graphic example of a team making life difficult for themselves but still prevailing. For all their misfiring so far, Southgate's team have the capacity for individual brilliance bolted on to in-built resilience. In a campaign of contrasts, there is still the possibility of a glorious conclusion. England may not have left it until the last 86 seconds to pull themselves away from the precipice this time, as they did against Slovakia in the last 16 thanks to Jude Bellingham's moment of genius, but sweat may well have been forming on Southgate's brow before Bukayo Saka's drive levelled Breel Embolo's Swiss opener with only 10 minutes left. There was an irony in England's Euro 2024 side looking at their most composed and in control during a penalty shootout - the cause of such heartache to previous generations. Five flawless penalties from Cole Palmer, Bellingham, Saka, Ivan Toney and Trent Alexander-Arnold, combined with goalkeeper Jordan Pickford's save from Manuel Akanji, got the job done. Next it's on to a semi-final against the Netherlands in Dortmund on Wednesday.

