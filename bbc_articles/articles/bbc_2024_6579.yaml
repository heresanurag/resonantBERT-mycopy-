title: Chancellor Jeremy Hunt announces 2p National Insurance cut - BBC News
date: '2024-03-06'
section: General
url: http://www.bbc.co.uk/news/uk-politics-68492917
content: |-
  The cut means that National Insurance will fall from 10% to 8%, following an earlier 2p cut in the Autumn statement.

  Chancellor Jeremy Hunt has announced a fresh cut to National Insurance for employees, a fall from 10% to 8% taking effect from 6 April.

  The 2p cut will be worth around £450 per year, for a person on average income. The announcement was made as part of the Spring Budget.

  Mr Hunt also made a 2p cut to National Insurance in the Autumn statement.

  Labour leader Sir Keir Starmer accused the government of maxing out "the national credit card".
