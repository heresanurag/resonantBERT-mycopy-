id: bbc_2023_9224
title: 'Ukraine war: Video shows woman pulled alive from rubble in Ukraine - BBC News'
date: '2023-06-15'
section: General
url: http://www.bbc.co.uk/news/world-europe-65914810
content: |-
  Ukrainian police released footage showing the end of what it said was an hours-long rescue mission.

  A woman has been pulled from rubble in Kramatorsk after an hours-long mission to free her, Ukraine's police service has said.

  The authority released this footage, and said the woman and a man were freed from buildings destroyed by Russian air strikes.

  On Wednesday night Russian missile strikes killed three people in the Black Sea city of Odesa and three more in the Donetsk region, Ukrainian officials said.
