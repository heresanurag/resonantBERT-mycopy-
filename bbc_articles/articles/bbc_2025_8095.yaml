title: 'LIV Miami: Bryson DeChambeau leads as Masters winners gather - BBC Sport'
date: '2025-04-06'
section: Golf
url: http://www.bbc.co.uk/sport/golf/articles/cj9e1nmk37vo
content: |-
  US Open champion Bryson DeChambeau leads LIV Miami by two shots heading into Sunday's final round at Trump Doral.

  US Open champion Bryson DeChambeau will take a two-shot lead into the final round of LIV Miami after a hitting a two-under-par 70 in round two.

  The American improved his overall score to five under, with Sergio Garcia in second after he carded a 71.

  Garcia's fellow Masters champions Patrick Reed and Phil Mickelson are alongside Australian Marc Leishman on two under, while 2023 Augusta winner Jon Rahm is on one under.

  Dustin Johnson, who claimed the Green Jacket in 2020, reached four under with two to play but dropped a shot on the 17th and then had a triple-bogey seven on the last as he posted a 75 to drop to level par.

  A dozen LIV golfers will head to Georgia after this event for next week's first major of the season.

  Among them will be Chile's Joaquin Niemann, who has won two of the four LIV events held this year. He followed an opening 78 with a level-par 72 to remain at six over.

  England's Tyrrell Hatton, who will also be at Augusta, added a 77 to his first-round 78 and is way off the pace on 11 over par.
