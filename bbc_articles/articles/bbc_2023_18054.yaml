title: 'Hounslow house fire: Sixth person confirmed dead - BBC News'
date: '2023-11-16'
section: London
url: http://www.bbc.co.uk/news/uk-england-london-67440549
content: |-
  The body of a sixth person was found at the scene of the fire in Hounslow, the Met Police said.

  Aroen Kishen and his wife Seema lived in the property on Channel Close with their children

  A sixth person has been confirmed dead in a house fire that killed three children and two adults.

  Aroen Kishen and his wife Seema lived in Channel Close, Hounslow, with their three children, neighbours said.

  It is believed Mr Kishen is in hospital but his wife and children, Riyan, Shanaya and Arohi, died in the blaze on Sunday night, along with another adult.

  The Met Police said that the body of the sixth person had now been found at the scene.

  The BBC understands that two unnamed adults were visiting the family for Diwali, a festival marked by observants of the Hindu, Sikh and Jain faiths.

  Det Ch Insp Garth Hall said: "I want to express my sincere condolences to all those affected by this terrible incident.

  "The deaths of so many people, including children, is simply heart-breaking.

  "We intend to complete a meticulous investigation into how this tragedy happened.

  He explained that previously the scene had been "too unstable and dangerous" to investigate.

  "It was only after the walls were shored up, and the roof removed, that it became safe enough for search teams to enter the premises," he said.

  "We understand that family and communities will be looking for answers, but this will be a thorough investigation and we will not rush to any judgement, but follow where the evidence leads.

  "Should there be any change in the nature of this inquiry, we will share that information immediately."

  Post-mortem examinations and formal identification will take place in due course and the deaths are being treated as unexplained.

  The families of all those concerned have been informed of the development and are being supported, the Met added.

