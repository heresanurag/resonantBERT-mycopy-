title: English smacking ban being considered by government - BBC News
date: '2024-10-21'
section: Politics
url: http://www.bbc.co.uk/news/articles/cr4x4lqv4d0o
content: |-
  Government ministers are considering outlawing physical punishment of children, Department for Education confirms.

  Government ministers are considering a smacking ban for England, the Department for Education has confirmed. Smacking bans have already been brought in by devolved governments in Scotland, and Wales, as well as Jersey, outlawing the use of physical violence to punish children. Plans for similar laws in England were rejected by the previous Conservative government as recently as last year - but Labour ministers are now "looking carefully" at whether more can be done on the issue. The move comes following fresh calls for a ban by the Children's Commissioner for England Dame Rachel de Souza, after the death of 10-year-old Sara Sharif.

  A court heard Sara was hooded, burned and beaten over a two-year period as her father, stepmother and uncle stand trial for her murder, which they deny. Dame Rachel said a ban on any type of corporal punishment, including smacking, hitting, slapping, and shaking, could stop lower level violence from escalating. "If we are serious about keeping every child safe, it's time England takes this necessary step," she posted on X, external. "Too many children have been harmed or killed at the hands of the people who should love and care for them most." In England and Northern Ireland it is legal for a carer or parent to discipline their child physically if it is a "reasonable" punishment - but the Children Act 2004 made it illegal to assault a child causing actual or grievous bodily harm. Dame Rachel said the experience of Scotland and Wales " has taught us we need to take that step in England too" and "now is the time to go further". The NSPCC and Barnardo's have long called for an English smacking ban and two-thirds of English people polled by YouGov in March last year said physically disciplining a child is not acceptable. The previous government argued parents should be trusted to discipline their children. However, a Department for Education spokesperson told the BBC that stance has changed. "Any form of violence towards a child is completely unacceptable, and we are looking closely at the legal changes made in Wales and Scotland as we consider whether there is any more we could do in this area," they said. “We are already supporting teachers, social workers and all safeguarding professionals to spot the signs of abuse or neglect more quickly, including with our mandatory framework for safeguarding children.”
