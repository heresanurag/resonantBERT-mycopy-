  Body found in search for girl missing in Thames

  Police were called at 13:45 BST on Friday after concerns were raised for two children who had entered the river in Gravesend

  A body has been found in the search for a girl missing in the River Thames in Kent. Police were called at 13:45 BST on Friday after concerns were raised for two children who had entered the river at Royal Pier Road in Gravesend. Emergency services attended the scene, where a boy was retrieved from the water and taken to a local hospital. He remains in a stable condition. At about 11:40 BST, Kent Police and the Royal National Lifeboat Institution (RNLI) recovered a body from the river, since confirmed to be that of the missing girl.

  On Friday, HM Coastguard said it had responded to a report of two children in difficulty in the water. Their ages have not been revealed. The search for the missing girl was suspended on Friday evening before recommencing on Saturday morning. Kent Police said her body was found in the river near Gravesend at about 11:40 BST after a search of the water and river bank. Formal identification by the girl's next of kin has taken place. The death is not being treated as suspicious at this stage and a report will be prepared for the coroner, the force added.
