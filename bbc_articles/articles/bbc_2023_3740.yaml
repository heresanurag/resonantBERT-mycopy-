title: 'Hamburg shooting: Police spoke to gunman weeks before attack - BBC News'
date: '2023-03-10'
section: Europe
url: http://www.bbc.co.uk/news/world-europe-64918160
content: |-
  He co-operated with officers and there were not enough grounds to take away his gun, police say.

