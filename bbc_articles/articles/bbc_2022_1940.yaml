title: 'Logan Mwangi: Bridgend mum denies murdering her son, five - BBC News'
date: '2022-02-04'
section: Wales
url: http://www.bbc.co.uk/news/uk-wales-60259208
content: |-
  Logan Mwangi's body was found in the River Ogmore in July last year.

  Logan was found dead in the River Ogmore on 31 July

  A mother has pleaded not guilty to the murder of her five-year-old son who was found dead in a river last July.

  Angharad Williamson, of Sarn, Bridgend county, denied murdering Logan Mwangi, also known as Logan Williamson, at a hearing in Cardiff Crown Court.

  Logan's step-father, John Cole, 39, also appeared and denied allowing or causing the death of a child.

  Ms Williamson, 30, also denied that charge, as well as perverting the course of justice.

  Mr Cole, also from Sarn, admitted perverting the course of justice at a previous hearing, but denied murder.

  Angharad Williamson and John Cole have both been charged with Logan Mwangi's murder

  Logan's body was found in the River Ogmore in Bridgend county on 31 July 2021.

  A teenage boy, who cannot be identified due to his age, previously pleaded not guilty to Logan's murder and perverting the course of justice.

  He appeared at the pre-trial hearing via video link.

  Judge Dame Nerys Jefford said the trial would begin on 14 February and was expected to last for about six weeks.
