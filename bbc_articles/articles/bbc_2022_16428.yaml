title: Pope Francis says world suffering a 'famine of peace' - BBC News
date: '2022-12-26'
section: Europe
url: http://www.bbc.co.uk/news/world-europe-64089428
content: |-
  In his Christmas Day message, the pontiff also called for an "immediate end" to the war in Ukraine.

