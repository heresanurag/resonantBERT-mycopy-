content: |-
  South Africa's leader will have to rely on the opposition to form a government after electoral losses.

  The ANC dilemma which will determine South Africa's future

  South Africa's governing African National Congress (ANC) is faced with a tricky dilemma which will determine the future of the country after it spectacularly lost its parliamentary majority in last week's election. Having won only 40% of the vote, the ANC needs to find a coalition partner to secure a majority in parliament which will support its choice of president and legislative plans - unless it tries to go alone with a minority government. One option would be to strike a deal with the second biggest party, the centre-right Democratic Alliance (DA), which won 22% of the vote. However this would be politically risky, as the DA's critics accuse it of trying to protect the economic privileges the country's white minority built up during the racist system of apartheid - a charge the party denies. Alternatively, the ANC could work with two radical parties that broke away from it - former President Jacob Zuma's uMkhonto weSizwe (MK) party or Julius Malema's Economic Freedom Fighters (EFF). These three parties share the same constituency, the black majority, and their combined vote comes to 65%. Mr Malema has warned the ANC against forming a coalition that would "reinforce white supremacy" and be a "puppet of a white imperialist agenda". This was a clear reference to a coalition with the DA, whose policies are diametrically opposed to the ANC's, but they both agree on the need to uphold the constitution that South Africa adopted at the end of apartheid in 1994. President Cyril Ramaphosa has made it clear that any coalition agreement would have to be within the framework of the current constitution. One of the big obstacles to a deal is the DA's fierce opposition to the ANC's efforts to create a welfare state - especially a government-funded national health service, which the DA rejects, saying it is too expensive and threatens the future of the private health sector. The DA believes in the free market, opposes a minimum wage, and wants to reduce red tape, saying this is the best way to improve the economy and raise living standards for all South Africans. It is vehemently opposed to the ANC's black economic empowerment policies, seeing them as discriminating against racial minorities while simply leading to the enrichment of the ANC's business cronies. Denying the allegations, the ANC has resolutely pursued these policies, arguing that they give black people a stake in the economy that they were excluded from during apartheid. ANC chairman Gwede Mantashe has gone as far as to say the ANC's black empowerment policies are non-negotiable, suggesting that he has ruled out a coalition with the DA. But, according to some local media, President Ramaphosa is willing to enter into a coalition with the DA, believing that their policy differences could be overcome. To overcome racial sensitivities, other parties - such as the mainly black Inkatha Freedom Party (IFP) and the Patriotic Alliance or Good party, which draw their support primarily from the coloured community, as people of mixed race are known in South Africa - could be included to form a Government of National Unity (GNU).

  The recently formed party of ex-President Jacob Zuma caused a shock by coming third in the election

  The ANC's other option is to form a coalition with MK, which was the big winner of the election by securing third spot with 15% of the vote in the first election it contested. But it is demanding a fresh poll, alleging that it got even more votes but the final result was rigged. The electoral commission has rejected the allegation, and MK has not yet presented any evidence for its claim. The chasm between it and the ANC is wide, wider than with any other party, partly because of the personal animosity between Mr Zuma and Mr Ramaphosa, who ousted him as the country's leader. As well as demanding a new president, MK wants the constitution to be torn up so that South Africa becomes an "unfettered parliamentary democracy" - something the ANC has ruled out. At first glance, this also rules out the EFF, as it too is demanding a constitutional amendment so that white-owned land can be expropriated without compensation. Mr Malema, a former ANC youth leader who was expelled by the party in 2012 for fomenting divisions and bringing the party into disrepute, said the EFF was willing to work with the ANC in a coalition government. However, the party's demand for land expropriation was a "cardinal principle", and it would not join the government if the ANC rejects it. The ANC and EFF together have 198 seats - just short of the 201 seats needed for a parliamentary majority, so a smaller party would have to be brought into a coalition. Or they could team up with Mr Zuma's MK, which also supports land expropriation, and says there is a need to distribute farmland on an "equal basis among the farming population". But to change the constitution, a two-thirds majority is needed and again the ANC, EFF and MK fall just short of the 267 seats needed - they have 256 seats between them. While the ANC is opposed to constitutional amendments, it accepts that the current land-ownership patterns need to be tackled. In an interview with South Africa's Sunday Times newspaper, former President Kgalema Motlanthe, a close ally of Mr Ramaphosa, said the "land question" was a "source of national grievance". His comments suggest there could be room for agreement with the EFF, and possibly even MK, on the issue. The DA strongly opposes a deal between its three rivals, saying it would be a "Doomsday Coalition" that would turn South Africa into a "Zimbabwe or Venezuela". "The Doomsday Coalition will plunge this country into ethnic and racial conflict the likes of which it has never witnessed before," the party says.
