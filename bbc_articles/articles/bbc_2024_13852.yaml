  • None Who's up, who's down - and why But some ANC officials hold the opposite view - that stability would be threatened if MK is excluded, given its electoral success, which has made it the largest party in KwaZulu-Natal. KwaZulu-Natal is South Africa's second-most populous province, and is often described as the economic artery of the nation because of its ports. It is also politically the most volatile province, with a history of violence - more than 300 people died in riots after Mr Zuma was sent to prison in 2021. He was convicted of contempt of court for defying an order to co-operate with an official inquiry into corruption during his nine-year presidency, which ended in 2018. ANC members in KwaZulu-Natal point out that with another court case looming - Mr Zuma is due to stand trial next year on charges of corruption over a 1999 arms deal - there is a real risk of a fresh wave of violence. They therefore feel some sort of deal needs to be reached with him to draw a line under the past, and to recognise his status as a former president - especially as he has demonstrated that he commands 15% of the national vote.

  Julius Malema's Economic Freedom Fighters lost votes in the 29 May general election

  ANC leaders in Gauteng - South Africa's biggest and richest province - are said to favour a deal with the EFF, but their hand has been considerably weakened by the fact that the two parties do not have enough seats for a parliamentary majority. That increases the prospect of an ANC-DA coalition, especially as it is favoured by the private sector as the best option to guarantee economic stability and to avoid capital flight. But South Africa's respected News24 website reports that the ANC is considering the option of forming a minority government, while signing a confidence-and-supply agreement with the DA, and the Inkatha Freedom Party, a mainly black party with support in KwaZulu-Natal, which has 17 seats. The two would vote with the ANC on crucial issues such as the budget, while the ANC would have to constantly lobby them - or other parties - to support it on other legislation. This could help the ANC out of its dilemma of choosing a coalition partner, and it may also suit the DA, as a coalition with the ANC could cause it to lose support to parties to its right. However, there is a risk that a minority government could lead to political instability and "transactional politics" - opposition MPs demanding or being offered bribes to back ANC-sponsored legislation. It is still too early to say what will happen. All the parties are still considering their options, but many South Africans are hoping that by the time parliament convenes, within a fortnight, there will at least be an outline deal on what the next government will look like.
