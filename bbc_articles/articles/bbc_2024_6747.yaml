title: 'Watch: Drone video shows smoke over Southampton - BBC News'
date: '2024-03-07'
section: General
url: http://www.bbc.co.uk/news/uk-england-hampshire-68492554
content: |-
  The aerial footage shows a plume of smoke stretching for miles across Southampton.

  Video taken by BBC drone operator Marcus Gaines shows the size of the plume of smoke that has been seen over Southampton.

  It comes from a major fire which broke out at industrial units near the city's St Mary's Stadium earlier.

  A cordon has been put in place by emergency services.

