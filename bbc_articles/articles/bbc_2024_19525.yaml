title: Wrong junior winner announced at World Pipe Band Championships - BBC News
date: '2024-08-21'
section: Scotland
url: http://www.bbc.co.uk/news/articles/clylrzgzxn8o
content: |-
  A review found Lochgelly High School was wrongly named the winner in a junior category at the championships in Glasgow.

  A high school's junior pipe band could lose their world title after an "administrative error" saw the wrong winner announced in one of the categories at the World Pipe Band Championships. The Royal Scottish Pipe Band Association (RSPBA), which runs the competition, said an "administrative error" saw Lochgelly High School awarded top prize in the novice juvenile grade B category. The RSPBA said they had written to each of the bands who performed in Glasgow on Saturday and invited them to a meeting to explain how the error will affect final placings. The correct results for the grade will be announced after "full talks" with the bands.

  Organisers said they "deeply regret" the incident - which has been blamed on a late change to the playing order - and will put in every effort to "make good" on the error that took place. A statement on the RSPBA website, external from the organisation's board of directors said: "Following a review of the placings data, it became clear that the results were not accurately administered leading to a most regrettable situation where the incorrect results for this grade were announced." More than 200 bands from 13 countries gathered on Glasgow Green on Saturday and Sunday to take part in the World Pipe Band Championships. Inveraray & District Pipe Band were named the overall champions, facing competition from as far away as Canada and the US. The RSPBA said the cause of the error in the novice juvenile grade B (NJB) category was a late notice change to the order of play and a failure to ensure that all documentation reflected the change. It is understood the NJB category results were the only ones impacted by the administrative error. The Courier reported, external the Lochgelly High School junior band have been told their place has been affected, with band leaders asked to attend an online meeting on Thursday to discuss the results. Organisers said steps have been taken to ensure the error is not repeated in future years.
