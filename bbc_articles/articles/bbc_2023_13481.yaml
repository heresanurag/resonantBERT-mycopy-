content: |-
  The 43-year-old was arrested by the PSNI after searches in Londonderry last week.

  A 43-year-old man has been charged as part of a PSNI terrorism investigation in Londonderry.

  His arrest followed police searches carried out in the Columbcille Court area of the city on Saturday.

  On Wednesday evening, detectives confirmed he had been charged with possession of firearms and explosives.

  The man is expected to appear before Londonderry Magistrates' Court on Thursday.
