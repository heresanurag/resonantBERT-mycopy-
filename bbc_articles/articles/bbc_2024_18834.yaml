title: 'Love Island: Davide Sanclimenti says LA home broken in to - BBC News'
date: '2024-08-16'
section: Culture
url: http://www.bbc.co.uk/news/articles/czrgnzr163yo
content: |-
  The Love Island star claimed he had nearly £930,000 worth of possessions stolen from his Los Angeles home.

  Davide Sanclimenti won the 2022 series of Love Island, with ex-girlfriend Ekin-Su Cülcüloğlu

  Love Island star Davide Sanclimenti has said his US home has been burgled, with thieves stealing possessions worth nearly $1.2m (£930,000). The Italian reality TV winner told followers on Instagram the burglary took place at his home in Los Angeles, California, adding the items had been taken "within six minutes". He posted two images of his walk in wardrobe on his Instagram stories, which showed empty shelves. "I would like to say a big thank you to everyone who has displayed their concern and DMing me and asking why I have been quiet over socials," he said.

  "As you all know I'm living in LA atm [at the moment]. Our home got broken into and was robbed of nearly $1.2m worth of precious and personal belongings gone within 6 minutes... "Just goes to show the saying is true, ‘the evil always target the pure-hearted’ but I'm trying to stay positive that the good people will always win in the end!" Sanclimenti also said he would "take a few days to reset, change house and keep moving forward". BBC News has contacted LA Police Department to ask if they are investigating. Sanclimenti says on his LinkedIn that he is an "entrepreneur with a background in finance and asset management". But in 2022, he won the UK series of Love Island, with ex-girlfriend Ekin-Su Cülcüloğlu. Since then, they have split up twice, most recently in January this year. "Unfortunately, I have recently made the decision to end our relationship and to go our separate ways," Ekin-Su posted at the time. "Break-ups are never easy for any couple, and we hope that our privacy will be respected at this time." Sanclimenti then claimed Cülcüloğlu, who starred in the US series of The Traitors this year, had changed their "agreed statement" regarding the break-up. "Life sometimes reserves surprises and suddenly wakes you up," he posted. "Ekin and I, just after the ski holidays, decided to go different ways. "It was a joint decision but I was waiting to make it public to respect her time in the show [The Traitors]. "I don't know why the agreed statement changed last minute."
