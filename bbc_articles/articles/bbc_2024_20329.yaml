content: |-
  Around 7,200kg of drugs were seized by the navy, in two separate raids.

  Fifteen people were detained after the Mexican Navy seized 7,200kg of drugs, in two separate high-speed chases on 23 August.

  In a statement, Mexico's government said the seizure of "presumably cocaine" was the largest captured during their administration.

  Footage released by the navy shows how the operations took place off the coast of Mexico in the Pacific Ocean.

  The first was located near the city of Manzanillo and the second near Lazaro Cardenas.
