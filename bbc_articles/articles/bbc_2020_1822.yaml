title: 'Coronavirus: Living in quarantine on a cruise ship - BBC News'
date: '2020-02-05'
section: General
url: http://www.bbc.co.uk/news/world-asia-51383458
content: |-
  David Abel is stuck on the Diamond Princess, docked near Yokohama, after 10 others tested positive for coronavirus.

  David Abel is one of 3,700 people in quarantine aboard a cruise ship docked near Yokohama, Japan.

  Ten people who tested have positive for coronavirus have been taken off the ship and to hospital, but everyone else must remain on board the Diamond Princess.
