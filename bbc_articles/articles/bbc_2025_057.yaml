  About 90% of the island's customers lost power - the latest in a series of blackouts since Hurricane Maria in 2017.

  Puerto Rico left in dark by New Year's Eve blackout

  Traffic lights are dark and buildings remained without power in San Juan, Puerto Rico amid a New Year's Eve blackout.

  Puerto Rico was plunged into darkness on New Year's Eve by a nearly island-wide blackout. About 90% of almost 1.5 million customers had no electricity, said Luma Energy, the island's main power distributor. By late Tuesday night, more than 700,000 clients, including Puerto Rico's water and sewer company and 16 hospitals, had power back, said Luma. The blackout prompted renewed calls to address the unincorporated US territory's power issues, which have persisted since Hurricane Maria in 2017.

  A failure in an electric line at one of the main power plants, Costa Sur, caused cascading issues across the island, Luma spokesman Hugo Sorrentini said. US President Joe Biden has been briefed on the situation and Energy Secretary Jennifer Granholm has spoken with Puerto Rico's governor to offer assistance, the White House said. "We can't keep relying on an energy system that fails our people," Jenniffer González-Colon, Puerto Rico's current US congressional representative and the incoming governor of Puerto Rico, wrote on X. "Today's blackout and the uncertainty around restoration continue to impact our economy and quality of life," she said. On Facebook, the current governor, Pedro Pierluisi, demanded answers and solutions from the two main power companies, Luma and Genera. Hundreds of thousands of residents at a time have been affected by power outages this year. A June outage left about 350,000 customers without power as temperatures climbed, and more than 700,000 customers lost electricity after Hurricane Ernesto in August. As they awoke to another day without power, Puerto Ricans expressed frustration. "They're part of my everyday life," Enid Núñez, 49, said of the outages to the Associated Press. Puerto Rico's power grid was strained even before Hurricane Maria devastated the island. US government funding helped shore up the grid, facilitate recovery projects from other natural disasters, and make other important infrastructure improvements. But the implementation has been incomplete due to a variety of factors, such as issues starting construction and the Federal Emergency Management Agency's requirements to authorise use of some of the funds, according to a February 2024 report , externalfrom the US Government Accountability Office. "Inexcusably the power grid has still not recovered from damage in Hurricane Maria," Mark Levine, New York City's Manhattan borough president, wrote on X. New York City is home to the largest Puerto Rican community in the mainland US.
