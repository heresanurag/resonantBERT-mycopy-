title: 'Donegal: Two cousins killed following car crash - BBC News'
date: '2024-08-28'
section: Europe
url: http://www.bbc.co.uk/news/articles/cx2x50v754wo
content: |-
  A man in his 20s was pronounced dead on Tuesday afternoon, Irish police said.

  Kían Dawson-Kirk and Eoghán Dawson both died following Saturday's crash

  A man has died following a crash in County Donegal at the weekend in which his teenage cousin was also killed. The man, named locally as Eoghán Dawson, 20, had been taken to the Royal Victoria Hospital in Belfast in a critical condition after the crash on the R240 at Quigley’s Point at about 23:15 on Saturday. In a statement, An Garda Síochána (the Irish police service) said he was pronounced dead on Tuesday afternoon. Mr Dawson's cousin, 16-year-old Kían Dawson-Kirk from the Carnhill area of Derry, died at the scene of the crash.

  The crash happened on the R240 at Cross at about 23:15 local time on Saturday

  “It is difficult to imagine the suffering of the Dawson family at this awful time, having already lost Eoghán’s younger cousin, Kían,” he said on social media. Mr Durkan added: “I have no doubt the Derry community will rally in support of the family - they will need it in the dark days, weeks, months and years ahead."

  Gardai (Irish police) said Kían was a passenger in a car that was involved in the crash. On Monday St Columb's College principal Caroline McLaughlin said the whole school community was devastated by the teenager’s death. His football club, Don Bosco's FC described him as "the most genuine, well-mannered and unassuming young lad." His funeral is due to take place in Derry on Thursday.
