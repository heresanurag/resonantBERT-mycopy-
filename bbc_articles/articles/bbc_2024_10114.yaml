title: Moment car rams into French police van in ambush - BBC News
date: '2024-05-14'
section: General
url: http://www.bbc.co.uk/news/world-europe-69011700
content: |-
  At least two prison officers have died after the vehicle - which was carrying a prisoner at the time - was ambushed near Rouen in Normandy.

  CCTV shows the moment a car crashes into a French police van, starting an ambush in which at least two prison officers have died.

  After this video stops, a group of gunmen can be seen surrounding the police van and firing shots.

  The vehicle was carrying a prisoner at the time. Mohamed Amra was being taken from court to a prison, and escaped after the attack.

