  "Extraordinary" Euan MacDonald died on Wednesday age 50, 21 years after being diagnosed with the condition.

  Tributes paid to 'extraordinary' Euan MacDonald who died on Wednesday

  One of Scotland's leading champions for people with disabilities has died 21 years after being diagnosed with motor neuron disease (MND). Euan MacDonald, 50, was diagnosed with the condition that affects the brain and nerves at age 29. He created the unique Euan's Guide, a disability review website and smart phone app for disabled people, their families and their carers. Along with his father Donald, he also set up an internationally-recognised centre for MND research at Edinburgh University.

  "He always tried to protect his mother, and his father too about some of the difficult things," he said. "Courage was a huge part of his character. “He wasn’t an egocentric person but I’m sure he would be proud of what has been started."

  Euan and his father Donald set up a centre for MND research

  Inspired by one of Mr MacDonald's own ideas, the Euan MacDonald Centre for MND research established SpeakUnique - a project that created personalised synthetic voices for people who had lost their natural voice. The centre's director Professor Siddharthan Chandran said Mr MacDonald would be greatly missed. He said: "The common thread that runs through these three remarkable initiatives are his courage, selflessness, ability to galvanise and inspire people to come together, to work with one another to make a difference," he said. "Euan was an extraordinary man who, through his vision, advocacy and leadership, brought hope and helped transform the lives of countless people living with MND and other disabilities."

  Euan MacDonald was diagnosed with MND at the age of 29

  Mr MacDonald was born in Sheffield in 1974. Shortly afterwards, his family moved to Edinburgh where he eventually enrolled at George Watson's College before moving to Glenalmond College in Perthshire. After studying at the universities of St Andrews and Edinburgh, he worked for investment bank Dresdner Kleinwort in London. Four years after his diagnosis, Mr MacDonald and his father founded the Euan MacDonald Centre through a philanthropic gift. In 2009, he was awarded an MBE in the Queen's Birthday Honours list in recognition of his contribution to services for people with MND. In 2013, Mr MacDonald, his sister, Kiki, and their father Donald created Euan's Guide - a registered charity which made tens of thousands of accessible toilets safer for people with disabilities. Edinburgh university said the guide is a "vital resource" for wheelchair users, their families, friends and carers to share their knowledge of accessible places across the UK. Prof Sir Peter Mathieson, Edinburgh university principal and vice-chancellor, said he was was "so sad to learn that we have lost the inspiring and remarkable Euan MacDonald". He said: "Euan was an extraordinary person whose advocacy for the MND community has helped to push the boundaries of research in this area. "His impact at the university will continue to live on through our MND research and the Euan MacDonald Centre, which bears his name in tribute."
