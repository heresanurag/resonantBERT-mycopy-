title: 'India floods: Man trapped inside tunnel rescued in Uttarakhand - BBC News'
date: '2021-02-07'
section: General
url: http://www.bbc.co.uk/news/world-asia-india-55971882
content: |-
  A piece of a glacier dropped into a river prompting a flood through a valley in Uttarakhand.

  Emergency workers have rescued a man who was trapped inside a tunnel after a flood in northern India.

  The flooding was caused by the collapse of a dam.

  Dozens of people are missing and feared dead.
