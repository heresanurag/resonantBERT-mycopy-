content: |-
  Sandy Ryan says "an immediate rematch should be ordered" with Mikaela Mayer after their controversial bout last week.

  Ryan wants immediate Mayer rematch after paint attack

  Ryan now has has two defeats and seven wins in her career

  Britain’s Sandy Ryan says "an immediate rematch should be ordered" with American Mikaela Mayer after a controversal build-up to their fight in New York last weekend which saw her attacked with a can of red paint. Mayer took Ryan's WBO welterweight title via a majority decision on Friday. Before the bout, the 31-year-old from Derby was had red paint thrown over her as she made her way from her hotel to The Theater inside Madison Square Garden. On Monday, Ryan said she had also been threatened and subjected to a "disgusting and pathetic smear campaign" on fight day. She claimed that "defamatory" leaflets were distributed before and after the fight, that her team received threatening messages and that she was advised to leave New York "for her own safety". After her victory, Mayer, 34, said she was "shocked" to hear about the paint incident and that it had nothing to do with her or her team. "In light of everything that’s happened, I believe that an immediate rematch should be ordered," Ryan posted on social media on Monday. "I felt the fight itself was close but I thought I did enough to retain my title. ESPN had me winning by two rounds and I know many other respected boxing observers also had me winning the fight." Two of the scorecards read 97-93 and 96-94 for Mayer, while a third judge saw it a 95-95 draw. The pair have known each other since their amateur days but have become involved in a bitter feud over training arrangements after Ryan relocated to Mayer’s gym in the United States. They were involved in a fiery news conference on the eve of the fight.

  On Saturday, Ryan said she "shouldn’t have fought" after the paint incident but now insists pulling out of the bout was never an option. She also said the New York Police Department (NYPD) have told her they are investigating the incidents but the NYPD would not confirm this when approached by BBC Sport. "I’ve too much pride and have worked too hard to let incidents as pathetic as these force me out of a fight – especially when that fight gave me the opportunity to fulfil a dream of headlining a card at Madison Square Garden live on ESPN," Ryan said. "I have dedicated my life to this sport and am very grateful for the opportunities it has given me. Boxing deserves so much more than this kind of thuggery. "I can guarantee that this will not break me and makes me more determined than ever to leave my mark in this sport over the years to come."
