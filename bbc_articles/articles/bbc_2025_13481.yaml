title: Nadiya Hussain says BBC has not renewed her cookery show - BBC News
date: '2025-06-06'
section: Culture
url: http://www.bbc.co.uk/news/articles/clyg839e44lo
content: |-
  The TV chef has fronted several programmes for the BBC since winning The Great British Bake Off in 2015.

  The BBC said not renewing further cookery programmes from Hussain had been a "difficult decision"

  TV chef Nadiya Hussain has announced her cookery show has not been renewed by the BBC for another series. Hussain has fronted several food programmes for the BBC since winning The Great British Bake Off in 2015, including Nadiya Bakes, Nadiya's Fast Flavours and Nadiya's Simple Spices. But in a new post on Instagram, Hussain said the BBC had "decided they didn't want to commission the show anymore", which she described as a "huge turning point". A BBC spokesperson said: "After several wonderful series we have made the difficult decision not to commission another cookery show with Nadiya Hussain at the moment."

  The statement continued: "Nadiya remains a much-valued part of the BBC family, and we look forward to working together on future projects." Hussain also used her five-minute video message to discuss the war in Gaza as well as how she feels about being a Muslim woman in the food industry.

  Hussain's other series for the BBC have included Nadiya's Everyday Baking and Nadiya's Cook Once Eat Twice, as well as the documentary Nadiya: Anxiety and Me. Broadcasters make decisions on which shows to commission based on a number of factors, including viewing figures and value for money, while some shows are rested to make way for new talent. Hussain told her followers: "The BBC have decided that they didn't want to commission a show. And for me, that was a huge turning point because it's something I've done for the past 10 years. "I was already on this steady trajectory of change and I was thinking about where I wanted my career to go, and when the BBC decided they didn't want to commission the show anymore, it really did kind of solidify everything for me, and it made me dig my heels in and think 'OK, I know where I want to be'." Hussain is one of the best known contestants to have appeared on Bake Off, and one of the few to have gone on to front her own cookery programmes for a major TV network.

  Hussain shot to fame The Great British Bake Off, when the show was on the BBC and featured judge Mary Berry (pictured in 2016)

  Elsewhere in the video, Hussain reflected on her wider career, commenting that she had occasionally struggled while working in the food industry due to her background and the way she is perceived by some. "It's really difficult," she said. "As a Muslim woman, I work in an industry that doesn't always support people like me or recognise my talent or full potential. "There's a lot of gaslighting, making me feel like what's actually happening isn't happening." Hussain said she was moving in a "positive direction", adding: "I'm working on some new things, but for me it's about being my most authentic self, and working with people who believe my voice has a platform, and believing in my talent." The TV chef also discussed her feelings about the Gaza war, and her desire to work with brands who share similar values to her. "I'm way more mindful of who I work with, brands I work with, especially if they are brands that support the genocide," she said. "I've made sure I'm actively working with brands that align with me." "It's been interesting because there have been lots of changes in my career, that I'm really excited about, I'm excited about taking back a bit of ownership of what I do, how I do it and who I work with, and that's given me a freedom I haven't had in the last 10 years." Many high-profile brands are currently being scrutinised for any links, perceived links, or public positions on either side of the Gaza conflict. Israel has strongly denied allegations of genocide, claims which are also being examined by the International Court of Justice.
