title: Czech Republic lightning strike injures 18 people - BBC News
date: '2024-06-03'
section: Europe
url: http://www.bbc.co.uk/news/articles/cg33r1313n0o
content: |-
  Children taking part in an event at the park are among the injured, according to local media.

  Dozens of emergency personnel were deployed to the scene in the Liberec region

  Eighteen people were injured in the Czech Republic after a tree they were sheltering under was struck by lightning, local emergency services said. The strike happened on Sunday afternoon in the Liberec-Vratislavice castle park, located in the northern Liberec region about 55 miles (90km) north-east of the capital Prague. Photos and videos shared by the fire service show dozens of emergency personnel and vehicles at the scene. Officials have not provided details of those who were injured, but local media reported that children were among those taken to hospital and that the park was hosting an event to mark International Children's Day.

  Czech TV station CT 24 reported that five of the injured were children aged between two and 16, and that five adults were resuscitated at the scene. A spokesperson for the Liberec regional hospital, Vaclav Ricar, told local newspaper Liberecky Denik that it had received 17 patients who were all conscious. He also confirmed that one child was airlifted to a hospital in Prague. The Czech Republic was hit by heavy rain and storms over the weekend, and there were also reports of flooding affecting parts of the country. Many factors contribute to flooding, but a warming atmosphere caused by climate change makes extreme rainfall more likely. The world has already warmed by about 1.1C since the industrial era began and temperatures will keep rising unless governments around the world make steep cuts to emissions. If you are caught outside in a thunderstorm, experts advise you to find a low spot away from trees, fences, and poles. If your skin tingles and hair stands on end, it means lightning is about to strike. The advice is to crouch down immediately, balancing on the balls of your feet, place your hands on your knees with your head between them to ensure you make yourself into the smallest target possible, and to minimise contact with the ground.
