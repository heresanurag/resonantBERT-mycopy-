content: |-
  The 32-year-old is taken into custody on suspicion of the murder of Natalie McNally last December.

  Natalie McNally was expecting a baby boy when she was killed in December

  A 32-year-old man has been re-arrested on suspicion of Natalie McNally's murder.

  He was previously arrested on 19 December before being released.

  The man has been taken to Musgrave Serious Crime Suite where he is currently being questioned by detectives.

  Ms McNally, who was 32, was 15 weeks pregnant when she was stabbed on 18 December at her home in Silverwood Green in Lurgan.
