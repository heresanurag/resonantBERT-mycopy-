title: Darlington toddler Charlie Roberts killed after months of abuse, court told
  - BBC News
date: '2024-11-14'
section: Tees
url: http://www.bbc.co.uk/news/articles/cyv75p0ppezo
content: |-
  Charlie Roberts died from a "catastrophic" head injury but his stepfather denies murder.

  Charlie Roberts was 22 months old when he died

  A toddler was killed after months of being physically abused by his stepfather, prosecutors have said. Charlie Roberts was 22 months old when he collapsed with a "catastrophic" head injury at his home in Darlington in January, Teesside Crown Court heard. Ms Roberts bought a spy camera over concerns about Mr Stockton and her son but failed to take any further action to protect him, it is alleged.

  Opening the trial, prosecutor Nicholas Lumley KC said Charlie, who could "walk and talk", had suffered multiple injuries in the weeks and months before his death and he had been "cruelly neglected". He said Mr Stockton called 999 shortly after he was left alone with Charlie in a "trusted position of responsibility" on the morning of 12 January, to say the boy had become "lifeless and floppy".

  Charlie Roberts was fatally injured at his home in Frosterley Drive in January

  Mr Stockton told paramedics he believed Charlie had appeared to be choking on a biscuit, but further investigation after the child's death showed that could "not have been", Mr Lumley said. Charlie died the following day at Newcastle's Royal Victoria Infirmary from the "catastrophic effects of a head injury" after he had been "shaken or thrown with such violence", Mr Lumley said. Ms Roberts, who worked at an indoor climbing centre in Newton Aycliffe, County Durham, started a relationship with Mr Stockton in January 2023. He would be a regular visitor to her home in Frosterley Drive in Darlington, Mr Lumley said, with him first meeting Charlie in March.

  Nursery staff first noticed bruises on Charlie's head in April, and in May the toddler was taken to hospital as he had bruises across his face, with Ms Roberts telling doctors her son had fallen, the court heard. Social services investigated but concluded the injuries were accidental, Mr Lumley said. Further bruising was seen on Charlie over the following months by family and friends, and at the end of August 2023 Ms Roberts installed a spy camera overlooking her son's cot but took no further action, the court heard. Mr Lumley said there were "too many incidents of bruising for it not to have been the result of neglect", adding anyone living with Charlie bore "criminal responsibility" for what happened to him. Ms Roberts said bruises and lumps had been caused by Charlie falling out of bed and told "lies" about taking him to hospital when she had not, the court heard.

  She also told relatives her son would injure himself while sleep-walking, but a medical expert said pre-school children did "not as a rule sleep-walk", Mr Lumley said. The court was told Mr Stockton moved into Ms Roberts' home on 5 January. She left her son in his care at about 08:45 GMT on 12 January, while she went to an optician's appointment. Just 18 minutes later, Mr Stockton rang 999 to report Charlie had fallen unconscious. "In a very short time, for that is all it takes to lose one's temper, [Mr Stockton] must have assaulted Charlie by shaking or throwing him with considerable force," Mr Lumley said, adding it may have been "quickly and bitterly regretted", but it was "no accident".

  In the more than five-minute long call, Mr Stockton could be heard saying "come on little man", "wakey wakey" and "cough it up" before apparently performing CPR on Charlie under direction from the call-handler. He also repeatedly coughed and said he would "pass out" himself as he had a cold, the court heard. Mr Lumley said the jury would have to consider Mr Stockton's tone, adding: "Was he more concerned at times for his own health?" He said Mr Stockton denied causing Charlie's death and both parents would claim his bruises were accidental and the result of "everyday occurrences". The trial, which is anticipated to last for up to five weeks, continues.
