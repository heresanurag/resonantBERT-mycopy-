title: PETA's fox pub name row 'undermines real issues' - BBC News
date: '2024-11-27'
section: Birmingham & Black Country
url: http://www.bbc.co.uk/news/articles/cr5mym9l1e5o
content: |-
  Critics respond to PETA's suggestion The Sly Old Fox should change its name because its derogatory.

  Peta has asked the Victorian pub to consider rebranding as The Clever Old Fox

  An animal rights group has been accused of undermining real issues after asking a pub to change its name, claiming it is offensive to foxes. The People for the Ethical Treatment of Animals group (Peta) wrote to owners of The Sly Old Fox on Hurst Street, Birmingham, saying the name was "derogatory". Instead, Elisa Allen from the campaign group asked them to consider swapping "sly" with "clever". People on social media have said the request trivialised animal rights issues, but Ms Allen has hit back saying critics were getting their "knickers in a twist".

  The BBC has contacted the pub for a response. In her letter, Ms Allen said foxes had “unearned reputations” as pests and this was partly due to derogatory descriptions of them. "The word 'sly' often carries negative connotations like 'deceitful' – a wholly inaccurate and unfair perception of foxes," she said. She added that foxes were "magnificent animals" - resourceful, intelligent and had excellent memories - and even offered to help the pub with any rebranding costs. Reacting to the news on X, one person called the request "ridiculous". Another wrote: "So much to support you on but not this. It simply trivialises the issues. "If this is true it's a silly thing to say and will work to undo the good work vegans have been doing for years." "Please don't let young 'hotheads' undermine our cause," said one user.

  Ms Allen has urged people to view research on language used to describe animals. "Those who have their knickers in a twist over a friendly suggestion to give The Sly Old Fox a more cheerful, more accurate name would do well to look at the research, which indicates the language we use to describe other animals can affect how we view and treat them," she said. "If institutions have the chance of rebranding themselves in a way that not only better reflects who these animals truly are but could also inspire more reverence for foxes, why not take it?"

