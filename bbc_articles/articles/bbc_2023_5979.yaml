id: bbc_2023_5979
title: Iowa tornadoes captured by eyewitness in car - BBC News
date: '2023-04-01'
section: General
url: http://www.bbc.co.uk/news/world-europe-65146149
content: |-
  Footage shows the tornadoes sweeping through Iowa - one of several states affected.

  An eyewitness has captured two tornadoes from the roadside in Keota, a small town in the US state of Iowa.

  Tornadoes were reported in several states as a result of a large storm system moving towards the east of the US.
