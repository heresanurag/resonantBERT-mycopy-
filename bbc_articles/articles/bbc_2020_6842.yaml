  Bringing you the latest news from across England as schools begin to reopen.

  'My son can go to school but my daughter cannot'

  Danielle Nott, from Tyne and Wear, said she's decided to keep her son at home because it would be "unfair" on her daughter, who cannot go back because of capacity issues. Ms Nott's son is in nursery and her daughter is in Year 1. "There is no sound play, carpet time or book corner for him even if he did go," she said. "I would have to drag my daughter to school to drop him off and then take her home." "She is really upset; I am really struggling to get her to do her school work," Ms Nott added. She said her children's school were bringing students back "in order of age" with the youngest returning first. "All the younger ones are just playing; at least if my daughter went back, she would be learning," she said. "There is still a lot of learning that we can’t do at home."
