title: 'William Goodge: British man claims record-breaking run across Australia -
  BBC News'
date: '2025-05-20'
section: Australia
url: http://www.bbc.co.uk/news/articles/cm265m72l5jo
content: |-
  William Goodge ran from Perth to Sydney in 35 days, running the equivalent of 2.5 marathons each day.

  William Goodge says he beat the previous record by four days

  A British ultra-endurance athlete says he has broken the world record for running across the width of Australia, after a gruelling 35-day journey. William Goodge, 31, started the 3,800km (2,361-mile) run from Cottesloe Beach in Perth on 15 April, and finished on Monday afternoon at Australia's iconic Bondi Beach, his father by his side. Goodge's team says he ran the equivalent of two-and-a-half marathons - about 100km - every day. Originally from Bedfordshire in England, Goodge started running marathons after his mother, Amanda, died from cancer in 2018, with this journey raising money for cancer charities in the UK, US and Australia.

  The record is yet to be verified by Guinness World Records, which certified Chris Turnbull's record-breaking dash across the continent over 39 days in 2023. The year before, Australian electrician Nedd Brockmann ran the same route in 47 days, raising millions for charity. Speaking to BBC Breakfast about 24 hours after he had crossed the finish line, Goodge said "it's the toughest thing I've ever done". Along the way Goodge ran through a dust storm, lost several toenails, and suffered from injuries, including rotting feet and bone pain, which sometimes caused him to hallucinate. "It was full-on from start to finish," he told the BBC, adding the first nine days were particularly hard.

