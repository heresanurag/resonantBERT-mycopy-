  The Nullabor Plain - a vast area of desert that crosses from Western Australia to South Australia - was also "unforgiving", he said. Surprisingly though, Goodge said he was "feeling very comfortable" now that the run was over. Moments after crossing the finish line, Goodge placed a bunch of flowers on Bondi's famous shoreline in memory of his late mother. "She was the most special person in my life," he told the Guardian Australia, adding, "she would be proud of everything I've done - she'd also be concerned". Goodge said thinking about how his mother battled cancer was crucial during his journey, and helped him overlook his own suffering. "In the moments where it's tough, I'll think back to those times, I think about the woman she was, and how she handled herself, and how she supported me," he told the Sydney Morning Herald. "I feel like she's there with me a lot of the time." During the race, he says he saw almost all of Australia's famous animals - though most were dead on the road - and much of its unique countryside. Some in the running community however have questioned the accuracy of data tracking his speed and heart rate, external over the course of the run. "Goodge stands by his record keeping and asserts that he is taking every single step," his agent told the Canadian Running magazine last week. Goodge also claims to hold the record for the fastest British man to run across the US, crossing from Los Angeles to New York in 55 days.

