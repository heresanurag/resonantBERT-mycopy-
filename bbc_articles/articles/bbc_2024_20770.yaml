title: Molly Caudery fails to qualify for women's pole vault final at Paris Olympics
  2024 - BBC Sport
date: '2024-08-05'
section: Olympic Games
url: http://www.bbc.co.uk/sport/olympics/articles/cvgrrlv7d42o
content: |-
  Britain's Molly Caudery says her elimination in qualification for the women's pole vault final at the 2024 Paris Olympics is "heartbreaking".

  This video can not be played To play this video you need to enable JavaScript in your browser.

  Britain's Molly Caudery says her exit in qualification for the women's pole vault final at the 2024 Paris Olympics is "heartbreaking". Caudery, 24, entered the event at 4.55m - 35cm higher than the other athletes - but was eliminated on her third vault after clipping the bar on her way down. An emotional Caudery acknowledged the Stade de France crowd before being consoled by her fellow competitors. "It's honestly heartbreaking. Not the experience I was hoping for and I am so sorry for everyone back home," said Caudery. "I wish I could have done better, but I am going to try to learn from this and I will take everything I can from it. "I felt great, I'm in the best shape of my life. I didn't feel too nervous - I love a big crowd. I don't know why, but it wasn't my day." Caudery was tipped for a strong showing at the Games after winning this year's World Athletics Indoor Championships in March, having finished fifth at last year's event. She went on to set a British record 4.92m in June and won bronze at the European Championships. Former British 400m runner Katharine Merry said it is the "biggest shock" of the Olympic track and field events so far. "Molly Caudery has gone over a height of 4.92m [this season] - 4cm higher than anyone else in the world," Merry said on BBC Radio 5 Live. "She decided to come in at an opening height of 4.55m. In her pool nobody else entered at that height, everyone else came in at an earlier height." There was also disappointment for Tokyo 2020 bronze medallist Holly Bradshaw, with the 32-year-old eliminated early in the event. Television cameras showed Bradshaw on her knees in tears after failing to clear 4.40m, before being consoled by team-mate Caudery.

  This video can not be played To play this video you need to enable JavaScript in your browser. Team GB's Nielsen and Anning take direct route to women's 400m semi-finals

  In the 400m hurdles heats, Team GB's Alastair Chalmers finished third in a dramatic race, diving over the line to qualify for the semi-finals with a time of 48.99 seconds. Team-mate Jessie Knight also made the semi-finals, narrowly making it through her repechage to come second with a time of 55.10. In the women's 400m heats, Britons Amber Anning and Laviai Nielsen reached the semi-finals but Victoria Ohuruogu will have to make it through a repechage if she is to qualify. Nicholas Percy and Lawrence Okoye failed to qualify for the men's discus final. Elsewhere, Zharnel Hughes has withdrawn from Monday's men's 200m heats because of tightness in his hamstring. A British Athletics statement said the 29-year-old would be monitored over the next 48 hours and no decision has yet been taken about his involvement in the 4x100m relay, which begins on Thursday.
