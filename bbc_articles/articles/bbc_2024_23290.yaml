content: |-
  Daejaun Campbell, 15, died after being found with a stab injury in Woolwich on Sunday.

  An 18-year-old man has been charged with murder after a schoolboy was stabbed to death with a so-called zombie knife in south-east London. Daejaun Campbell, 15, was found with a stab injury on Eglinton Road, Woolwich, just after 18:30 BST on Sunday. He died at the scene. Jacob Losiewicz, 18, of Church Manor Way, Abbey Wood, has been charged with murder. He is set to appear at Bromley Magistrates' Court on Thursday.

  A second man who was arrested on suspicion of murder has been released without charge, the Metropolitan Police said. Det Ch Supt Trevor Lawry said investigating detectives were working "around the clock". "Local officers will remain in the area whilst we continue with our investigation." He appealed for anyone with information on Daejaun's death to contact police.
