  Mr McGinley added: "Volunteers are providing rest and food for local people and emergency services - they have clothes, drinks and foodstuffs available. Some people have been a bit traumatised by it so they can come down, have a cup of tea and chat to people about it."

  The council also said it had been overwhelmed by donations from the public and offers of help from local businesses.

  A hub for residents affected by the incident and emergency service workers has been set up at Kincaidston Community Pavilion.

  One community worker told the BBC that about 120 residents were initially unable to return to their homes following the explosion.

  "[They] had to register to say what location they were in approximate to the explosion and then they could get let back in their houses," he said. "We had kids in getting their evening meals.

  "As far as I'm led to believe one of the local hotels has put some of the residents up, that was [Tuesday] afternoon - I don't know what the situation is now."

  He said the centre had received donations from local businesses, including takeaways, supermarkets, bakers and butchers to support displaced people.

  "It's been quite hectic but the emergency services are very appreciative of what we've done for them - the community has rallied round."

  A total of 35 homes were damaged or strewn with debris

  Scottish Fire and Rescue Service area commander Ian McMeekin described the aftermath of the explosion as "extremely challenging".

  At its height, nine appliances responded to the explosion, which happened shortly after 19:00 on Monday, as well as urban search and rescue teams.

  Mr McMeekin said: "There is significant damage to the properties and the surrounding area."

  He also thanked the local community for their "support and understanding".

  Residents needing support following the blast have been urged to contact 0300 123 0900.

  The gas distribution company SGN said it would continue to work with "expert parties" in the coming days to establish the cause of the explosion.

  A temporary, above-ground gas pipeline has been installed for homes in Kincaidston.

  The company said: "We'd like to reiterate our reassurance to the local community that the gas network across the area remains safe and secure to use.

  "Our engineers have carried out full safety checks in the area to ensure the safety of all the homes close to the damaged properties.

  "We're aware some residents may have turned off their gas supply at the meter as a result of the incident.

  "If this applies to you, then our engineers are available to visit your property and safely turn your gas supply back on."
