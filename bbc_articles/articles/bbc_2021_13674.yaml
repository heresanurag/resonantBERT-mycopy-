title: 'Ayr explosion: Dozens out of homes for third night due to damage - BBC News'
date: '2021-10-20'
section: Scotland
url: http://www.bbc.co.uk/news/uk-scotland-58977529
content: |-
  Four houses in Kincaidston are likely to be demolished while 35 others are damaged or strewn with debris.

  One home was completely destroyed in the blast in Ayr

  Dozens of people will spend a third night away from home after an explosion at a property in Ayr.

  Four houses in Gorse Park, Kincaidston, are likely to be demolished while 35 others are damaged or strewn with debris.

  A family of four remains in hospital after the blast on Monday, the cause of which is still being investigated.

  Police Scotland said it was too early to determine whether it had been caused by gas.

  Engineers from Scottish Gas Networks (SGN) remained at the scene on Wednesday.

  A 43-year-old woman and a 16-year-old boy are being treated for serious injuries at Glasgow Royal Infirmary.

  A 47-year-old man is in the city's Queen Elizabeth University Hospital while an 11-year-old boy is in the adjoining Royal Hospital for Children.

  On Wednesday afternoon, South Ayrshire Council confirmed residents of 46 properties could safely return to their homes.

  Work is ongoing to re-establish gas supply in the wider area

  Of the properties that will be left standing, four have been "significantly" damaged and will need extensive repairs before householders can return, the council said.

  Others were damaged by debris and some are not safe to access due to broken windows or debris strewn across gardens or inside properties.

  The council said teams were working to remove debris, but that some people could return to their homes while their next-door neighbours could not.

  Work is ongoing to re-establish gas supply to the wider area.

  Emergency services will decide whether people can return to their homes

  Council leader Peter Henderson said: "I know that council teams, the emergency services and partners have been working tirelessly to help as many people as possible to return to their homes.

  "This is no easy task and I am relieved that their painstaking work has allowed some families to get back home today. Of course, it's still very early days and the devastation caused by this tragic event will take considerable time to rectify.

  "We are committed to working alongside our communities and partners to support them through the aftermath of this terrible event."

  Earlier, the deputy leader of South Ayrshire Council, Brian McGinley, told the BBC's Good Morning Scotland programme that some residents were back in their homes, some were staying with family and friends and others were in hotels.

  "We need to realise that this has been a very major incident, it's a very demanding and technical situation," he said.

  "Clearly we're working as fast and as hard as we can to make sure everybody is safe, that everyone's needs are met. But it's going to take a long time for this community to recover."

