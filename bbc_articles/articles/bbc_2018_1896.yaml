  "The public were not told the truth, the victims were not told the truth, the shareholders were not told the truth and the Leveson Inquiry was not told the truth."

  "That is why the second part of the Leveson Inquiry must take place - to get to the truth and discover who broke the law and who lied about it."

  Grant's lawyer Anjlee Saigol added one of Grant's main reasons for pursuing the case was to establish the truth about the group's investigations and knowledge of its unlawful activities before it admitted them in September 2014.

  She also said the company "actively sought to conceal its wrongdoing from its many victims of intrusion" and admitted intrusions into people's lives could have been prevented.

  On Monday, the judge also heard details of settlements against MGN by actor Ralf Little and Rupert Lowe, who was the executive chairman and joint managing director of Southampton Football Club between 1999 and 2006.

  Former police officer and Crimewatch presenter Jacqui Hames also settled her action against News Group Newspapers, publishers of the News of the World.

  Speaking for MGN, Alex Wilson said: "MGN accepts that the unlawful interception of voicemail messages and procurement of private information about Mr Grant and others should never have happened.

  "MGN acknowledges that was morally wrong and deeply regrets the wrongful acts of its former employees which caused damage and distress to those affected, including Mr Grant."

  The newspaper has been taken to court multiple times over claims of phone-hacking.

  In October last year, comedian Steve Coogan was the latest in a long list of more than 40 celebrities to have settled phone-hacking claims against MGN.

  They include Lord Archer, footballer Kevin Keegan and actresses Patsy Kensit and Michelle Collins.

  Grant, who is known for films including Notting Hill and Four Weddings and a Funeral, has been one of the leading voices in the campaign for stricter press regulation.

  In 2012 he accepted a "substantial sum" in damages from the now-defunct News of the World.

  Grant was one of the victims of the paper's widespread phone hacking, which led to its closure in 2011.

  He gave evidence at the Leveson Inquiry into press ethics, set up following the News of the World phone-hacking scandal.

