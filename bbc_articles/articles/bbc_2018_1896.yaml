title: Grant settles hacking claim against the Mirror - BBC News
date: '2018-02-05'
section: UK
url: http://www.bbc.co.uk/news/uk-42945445
content: |-
  Actor Hugh Grant is to be paid six-figure sum as he settles claim against Mirror Group Newspapers.

  Hugh Grant and Crimewatch presenter Jacqui Hames, who also settled a phone-hacking claim against another newspaper, speaking after the hearing in London

  Actor Hugh Grant has settled a phone-hacking damages claim against Mirror Group Newspapers at the High Court.

  It is understood the star will be paid a six-figure sum, which he will donate to the campaign group Hacked Off.

  The actor said the newspaper group had been guilty of phone hacking on an "industrial scale" and called for another public inquiry to "get to the truth".

  MGN said it "deeply regretted" the acts and described them as "morally wrong".

  Grant, 57, appeared at the court in London to hear his lawyer give details of the hacking settlement.

  Anjlee Saigol told Mr Justice Mann the action against the Mirror Group related to the alleged illegal misuse of Grant's information obtained by hacking his voicemails, masquerading as other people, and surveillance.

  The action related to employees at all three of MGN newspapers - the Daily Mirror, Sunday Mirror and Sunday People.

  As part of Monday's settlement, MGN admitted that senior employees including its editors, executives and journalists "condoned, encouraged or actively turned a blind eye" to the culture of phone-hacking, lawyer Ms Saigol said.

  The offences took place between 1998 and 2009 under the editorships of Piers Morgan and Richard Wallace at the Daily Mirror and Tina Weaver at the Sunday Mirror.

  The three former editors, along with ex-chief executive of Trinity Mirror Sly Bailey, had previously given evidence to the Leveson Inquiry and denied knowledge of phone hacking at MGN.

  Their statements to the inquiry were later found to be "wrong, not just disingenuous" in a court ruling in 2015.

  Speaking outside court after Monday's hearing, Grant said: "This case was not just about what they did to my phone and those close to me.

  "In this litigation my lawyer and I pressed further because I was determined to uncover the truth about the nature of high-level concealment at the Mirror Group.

  Hugh Grant arriving at the Rolls Building in central London for the High Court hearing.

  "This litigation has made clear that phone hacking and other unlawful information-gathering took place on an industrial scale at the Daily Mirror, Sunday Mirror and Sunday People.

  "This newspaper group has misled the public and its shareholders for many years; and it has let down its readers and its hard-working journalists.

