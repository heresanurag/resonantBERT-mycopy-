content: |-
  The nomination stunned Washington, triggering a political rollercoaster that turned into a bumpy ride for Trump's transition team.

  The rise and fall of Matt Gaetz in eight wild days

  Eight tumultuous days after US President-elect Donald Trump picked Matt Gaetz to be attorney general, the firebrand congressman has withdrawn from consideration for the post. It was a nomination that stunned Washington and sent a shiver through the corridors of the justice department. Trump settled on Gaetz, 42, during a two-hour flight from Washington to Florida last week, according to reports. Still basking in the glow of his election victory, the president-elect was flying back to West Palm Beach last Wednesday afternoon after a cordial meeting with President Joe Biden.

  That morning Gaetz was not even on the shortlist for the position of America’s top law officer, according to Politico, but Trump had felt underwhelmed by his other options.

  On so-called Trump Force One that day were Gaetz himself, Elon Musk, Trump’s incoming White House chief of staff, Susie Wiles, and his top legal adviser, Boris Epshteyn, reports the New York Times. Epshteyn reportedly set about convincing Trump that Gaetz should lead the justice department, which had conducted a sex-trafficking investigation into the lawmaker before dropping the matter. The allegation that Gaetz had sex with a minor, which he denies, was set to dominate and probably torpedo his nomination process. Losing his first choice is a setback to Trump and shows the reluctance of the Senate in ushering through a man who has no shortage of enemies in Congress. The woman Trump has picked instead, another Floridian Pam Bondi, would seem to have more allies and a smoother path ahead. Gaetz, a lawyer, has been one of Trump’s most strident defenders on Capitol Hill. He helped prepare the Republican nominee for his televised debate against Biden that effectively knocked the Democrat out of the White House race. One Trump adviser explained why the president-elect - who has himself been criminally investigated by the justice department, and accuses its prosecutors of witch hunts - took a shine to Gaetz as opposed to other contenders. “Everyone else looked at AG [attorney general] as if they were applying for a judicial appointment,” the unnamed aide told the Bulwark. “Gaetz was the only one who said, ‘Yeah, I’ll go over there and start cuttin’ [expletive] heads.’”

  Gaetz emerged as one of Trump's most loyal allies in the House

  While Republicans on Capitol Hill reacted tepidly to the nomination, career lawyers at the justice department told US media they were stunned and outraged. Speaking at a conservative conference last year, Gaetz had suggested that the justice department and the agencies it oversees, including the FBI, ought to be abolished, as he argued they were being weaponised against conservatives. The current Attorney General, Merrick Garland, has rejected these claims. Critics said Trump - who has also named three lawyers that defended him in criminal cases for senior positions at the justice department - was more interested in hiring loyalists than appointees who will uphold the rule of law. Former Trump National Security Adviser John Bolton dismissed Gaetz as the “worst cabinet-level appointment in history”. But the president’s son, Donald Trump Jr, said the furore from the Washington establishment showed his father’s unconventional cabinet picks were just the kind of change-makers that American voters had elected him to usher in.

