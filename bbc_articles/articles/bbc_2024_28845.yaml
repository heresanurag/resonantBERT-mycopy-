  After being nominated last week for attorney general, Gaetz resigned as representative for Florida's 1st congressional district, a seat he has held since 2017. His resignation came as the House Ethics Committee was due to decide whether to release a report on its investigation into allegations of misconduct involving drugs, bribes and paying for sex, including with an underage girl. Gaetz dismissed the claims as a smear. But his resignation triggered a drip feed of leaks in subsequent days as the ethics panel wrangled over what to do about the report. Few Republicans seemed willing, meanwhile, to circle the wagons round one of the most unpopular lawmakers in the House. Last year, the combative Gaetz came under fire from his own side of the aisle when he proved instrumental in ousting Republican Kevin McCarthy as House Speaker. Markwayne Mullin, a former House member turned senator, told CNN at the time there was a reason why none of Gaetz’s colleagues would defend him from allegations of sexual misconduct. "Because we had all seen the videos he was showing on the House floor," said the Oklahoman last October, accusing Gaetz of bragging about his sexual exploits.

  This video can not be played To play this video you need to enable JavaScript in your browser. Watch: Gaetz confirmation would have been 'challenging' - Lindsey Graham

  As the backlash to his nomination for attorney general began to build this week, Trump made calls to senators in an effort to shore up support. Trump seemed to be holding firm on Gaetz as he attended a SpaceX rocket launch in Boca Chica, Texas, on Tuesday with Musk. Asked if he was reconsidering, the president-elect said: "No." There was more encouraging news for Gaetz on Wednesday as House Ethics Committee Republicans voted not to release its investigation into him. It happened as Vice-President-elect JD Vance ferried the attorney general nominee around the Senate in a charm offensive. Gaetz said it had been “a great day”. But there were hints of turbulence ahead. When asked how messy the confirmation process could become, incoming Senate majority leader John Thune, a South Dakota Republican, said the hearings could be “on steroids”.

  Pam Bondi has been picked to fill Gaetz's shoes

  On Thursday morning, Trump was still calling Republican senators to gauge Gaetz's chances. But by lunchtime, the nominee had come to the conclusion he didn't have the votes and he again shocked Washington with the announcement that he was showing himself the door. “While the momentum was strong,” he posted on X, “it is clear that my confirmation was unfairly becoming a distraction to the critical work of the Trump/Vance Transition.” Trump’s post on Truth Social confirming the volte-face - his first political setback since his election 16 days earlier - was unusually muted for the president-elect. “I greatly appreciate the recent efforts of Matt Gaetz in seeking approval to be Attorney General,” he wrote, adding that the nominee did not wish to be a “distraction”. Hours later, Trump nominated former Florida Attorney General Pam Bondi instead for the post. While Trump predicted a "wonderful future" for Gaetz, a question mark hangs over what he will do next. He was comfortably re-elected this month, but there are already plans for a special election to fill his vacated seat. Randy Ross, a Florida-based fundraiser for Trump, told the BBC that America had not heard the last of Matt Gaetz. “My opinion is there’s still a spot in Trump’s administration, Florida or our country’s future leadership for this patriot," said Mr Ross. "We all look forward to his next steps." Meanwhile, Ginger Gaetz, who wed the congressman in 2021, posted an old photo on X following his withdrawal of them both on the steps on Capitol Hill. "The end of an era," she commented.

