id: bbc_2020_1648
title: 'Ian Paterson: Victim responds to malpractice inquiry report - BBC News'
date: '2020-02-04'
section: General
url: http://www.bbc.co.uk/news/uk-england-birmingham-51376800
content: |-
  Debbie Douglas was key to setting up the independent inquiry into disgraced surgeon Ian Paterson.

  Debbie Douglas - who was instrumental in getting the independent inquiry into disgraced surgeon Ian Paterson established - said the report’s recommendations “must be implemented”.

  She said: "This was important for the people that have died to be heard because without any exaggeration there are so many unnecessary deaths."

  The inquiry into Paterson's malpractice has recommended the recall of his 11,000 patients for their surgery to be assessed.

  Paterson is serving a 20-year jail term for 17 counts of wounding with intent.

  One of Paterson's colleagues has been referred to police and five more to health watchdogs by the inquiry.
