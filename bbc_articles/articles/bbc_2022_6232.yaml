title: Meghan Markle visits memorial for Texas school shooting victims - BBC News
date: '2022-05-26'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-61600595
content: |-
  The Duchess of Sussex laid flowers at the memorial for the 19 children and two adults who died.

  The Duchess of Sussex has paid a visit to a memorial for the victims of a mass shooting at Robb Elementary School in Uvalde, Texas.

  Meghan Markle placed flowers at the memorial to the 19 children and two adults who died in the deadly school shooting.

  A spokesperson for the Duchess of Sussex said she visited in a personal capacity as a mother to offer her condolences and support.
