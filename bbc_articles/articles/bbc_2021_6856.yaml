  • None England won their opening game of a European Championship finals at the 10th attempt (D5, L4).
  • None Croatia have lost eight of their 14 games in all competitions since the start of 2020 (W4 D2); before this, they had lost just eight of their previous 33 matches (W17 D8).
  • None England have won seven consecutive matches across all competitions for the first time since March 2015 under Roy Hodgson.
  • None Raheem Sterling has been directly involved in 19 goals in his last 17 appearances for England (13 goals, six assists
  • None Jude Bellingham (17 years and 349 days) became the youngest ever player to appear in the European Championship finals for any nation, and the youngest English player to play in any major tournament (World Cup & Euros).

  England host Scotland at Wembley on Friday, 18 June (20:00 BST). Croatia play the Czech Republic at Hampden Park the same evening (17:00 BST).
