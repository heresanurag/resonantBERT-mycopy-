title: 'Six Nations 2025: Ireland live rent free in Scotland heads again - BBC Sport'
date: '2025-02-10'
section: Ireland
url: http://www.bbc.co.uk/sport/rugby-union/articles/c07krpg7258o
content: |-
  There was a sense it was over almost before it began as Scotland suffered another chastening Six Nations defeat by Ireland, writes Tom English.

  As they strive to find new ways to raise revenues at Murrayfield, Scottish Rugby could do worse than having a giant Peter O'Mahony pinata hanging from the lower reaches of the east stand. They'd be queuing round the block to give Scotland's great bogey man some stick. A fortune could be made. On Sunday, O'Mahony wasn't as influential or as objectionable, to Scottish eyes, as he normally is, but the mere fact that the veteran forward was there had a psychological relevance. This was another day when Ireland lived rent free in Scottish heads - and then proceeded to wreck the joint. Gregor Townsend has taken Scotland a long way, but the head coach is running to stand still against Ireland. Eleven games, 11 defeats, too many of them decided too early, as was the case again on Sunday.

  It was the roaring predictability of it all that hit Scotland the hardest. Nothing about this latest defeat was surprising. It took Ireland eight minutes to score at Murrayfield, the nerveless Sam Prendergast enjoying time and space and a penalty advantage to throw a long left-to-right pass to Calvin Nash, all on his lonesome. In Scotland's grim history in this contest, it was an entirely familiar occurrence, one you could have set your watch by. Dan Sheehan, James Lowe, Robbie Henshaw, Johnny Sexton, James Ryan and Conor Murray have all scored early against Scotland in recent years. Lowe took two minutes to strike at the World Cup in Paris in 2019. Ryan took seven minutes four years earlier in Yokohama. Henshaw took eight minutes at Murrayfield in 2021. None of those scores came later than the 13th minute and all of them, of course, set Ireland on their way to victory. So, when Nash touched down in the corner on Sunday, those with a half-decent memory and a fatalistic bent started to lose all hope for Townsend's team. Injuries to Finn Russell and Darcy Graham added to the darkness of the day. This was more of the same. Not quite as awful as Yokohama or Paris, but close enough. To be 17-0 down after 31 minutes at home was mortifying, but the reality was that it could and should have been more. Ireland were denied a pretty clear penalty try and were held up over the Scotland line twice. They didn't just quieten the home crowd, they stunned them into silence.

