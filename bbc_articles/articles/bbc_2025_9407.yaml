  Mexico's Navy Secretary Raymundo Pedro Morales Ángeles said in a statement the results of any investigation would be followed with "total transparency and responsibility". The Cuauhtémoc left Acapulco, Mexico, on 6 April on a tour that included stops in New York and Aberdeen, Scotland, for the city's Tall Ships race in July.
