title: 'Baby P: Mother Tracey Connelly back in jail after breaking licence - BBC News'
date: '2024-09-03'
section: London
url: http://www.bbc.co.uk/news/articles/cgl23kygrj2o
content: |-
  Tracey Connelly was jailed in 2009 for causing or allowing the death of her 17-month-old son Peter.

  Tracey Connelly was recalled to prison for breaching her licence conditions

  The mother of Baby P, who died after months of abuse, is back behind bars two years after being freed from jail. Tracey Connelly was recalled to prison for breaching her licence conditions in a move authorised by Justice Secretary Shabana Mahmood. She was jailed at the Old Bailey in 2009 for causing or allowing the death of her 17-month-old son Peter at their home in Tottenham, north London, in 2007. A Prison and Probation Service spokeswoman said offenders on licence were subjected to "strict conditions" and they did not "hesitate to recall them to prison if they break the rules".

  Now in her 40s, Connelly left prison in July 2022 after the Parole Board ruled she was suitable for release in May that year. The justice secretary at the time, Conservative Dominic Raab, appealed. This was rejected by a judge, a decision Mr Raab said was proof the parole system needed a "fundamental overhaul".

  Connelly was also released on licence in 2013 but recalled to prison in 2015 for breaching her parole conditions. Three parole bids, in 2015, 2017 and 2019, were rejected. In the latest review, the Parole Board decided Connelly was suitable for release after hearing she was considered a "low risk of committing a further offence" and that probation officers and prison officials supported the plan. This was despite the panel highlighting concerns over Connelly's ability "to manipulate and deceive", and hearing evidence of how she had become embroiled in prison romances and traded secret love letters with an inmate.

  After her latest release, Connelly was subject to restrictions on her movements, activities, and who she contacted, as well as 20 extra licence conditions. They included living at a specified address, being supervised by probation, wearing an electronic tag, keeping to a curfew and disclosing her relationships. Her internet and phone use was to be watched, and she was also told not go to some places to "avoid contact with victims and to protect children". Last year, two High Court judges ruled a policy forbidding prison and probation staff recommending to the Parole Board whether prisoners were suitable for release was unlawful. They said it may have led to people being wrongly freed. The policy was introduced in the wake of the decision to free Connelly. She will have to face the Parole Board again at a later date in order to be considered for re-release.
