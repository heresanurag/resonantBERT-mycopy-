content: |-
  US President Donald Trump has praised Kim Jong-un and says he will end military exercises with South Korea.

  Kim only 'doing what he's seen done'

  Trump tells Voice of America, the US government-sponsored news network, that Kim "liked" him. "I think he liked me and I like him. And I understand the past and, you know, nobody has to tell me - he’s a rough guy. He has to be a rough guy or he has been a rough person." The interviewer, Greta Van Susteren, says: "But he's starved them. He's been brutal to them. He still loves his people?" "Look, he’s doing what he’s seen done, if you look at it," says Trump. "But, I really have to go by today and by yesterday and by a couple of weeks ago because that’s really when this whole thing started." Asked what his message is for the North Korean people directly, Trump says: "Well, I think you have somebody that has a great feeling for them. "He wants to do right by them and we got along really well. We had a great chemistry - you understand how I feel about chemistry. It’s very important." "I mean, I know people where there is no chemistry, no matter what you do you just don’t have it. We had it right from the beginning, I talked about that and I think great things are going to happen for North Korea."
