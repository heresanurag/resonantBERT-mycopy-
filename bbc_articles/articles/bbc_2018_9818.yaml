title: Venezuela's Maduro wins re-election - BBC News
date: '2018-08-05'
section: General
url: http://www.bbc.co.uk/news/world-latin-america-44194815
content: |-
  Venezuela's President Nicolás Maduro wins re-election in a vote marred by an opposition boycott.

  Venezuela's President Nicolás Maduro has won re-election to another six-year term, in a vote marred by an opposition boycott and claims of vote-rigging.
