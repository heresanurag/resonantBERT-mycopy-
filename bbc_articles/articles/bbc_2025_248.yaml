content: |-
  Tiarnán Trainor was injured in the incident just outside Killeavy, near Newry, and died in hospital.

  Tributes to 'much loved and popular' boy after quad bike crash

  Tiarnán was "much loved and popular," his school says

  Tributes have been paid to a 13-year-old boy who died after a quad bike crash near Newry. Tiarnán Trainor was injured in the incident on Low Road just outside Killeavy on Thursday. He was taken to the Royal Victoria Hospital in Belfast but later died from his injuries. St Paul's High School in Bessbrook described Tiarnán as a "much loved and popular year 10 pupil" who had recently been elected to serve on its student council.

  St Paul's has opened its oratory for pupils to come together and mourn the loss

  In a statement, the school said Tiarnán had "an infectious personality" and was well known throughout the school as a "lorry fanatic". It announced that the school oratory would be open on Saturday and Sunday for pupils and their families to come together to remember Tiarnán. "Following the return of pupils to school next week, the Education Authority's Critical Incident Team, as well as school staff, will be available to help and support pupils at this very sad time," the school added.

  She described Tiarnán as "a lovely cheeky chappy" that was "very likeable and lively". Ms. Fearon said Tiarnán was " very popular" and was recently elected to represent the 305 pupils in his year group. "He was a wonderful young lad and he will leave a massive void in St. Paul's," she added. Jonesborough Primary School, which Tiarnán previously attended, said: "As a community we stand in compassion with Tiarnán's family, understanding that words cannot soothe the heartbreak of loss nor grief, especially when a life ends so prematurely. "Tiarnán was a lively and spirited boy, who will be fondly remembered by all."

  Tiarnán Trainor died in hospital after the incident on Low Road

  Killeavy GAA club said it was "heartbroken" by the death of Tiarnán, who had been a player for its under-14 boys team. Members of the club described him as a "pleasure to coach". "He enjoyed playing matches and will be remembered by us all for his sparkling and positive personality, always jovial and energetic amongst his teammates and very well mannered young lad." "He will be greatly missed by his young teammates and coaches," the club added.

  Tiarnán attended the St Paul's Armagh Coaching School and held the Sam Maguire trophy after Armagh GAA won the All Ireland final

  The 12th Armagh Slieve Gullion Scouts said its leaders and members "are deeply saddened" to learn of the death. "We have many fond memories of him in Cubs" the group added. Armagh Summer School, where Tiarnan regularly attended its Gaelic Games camps, described the news as "heartbreaking". "Our thoughts and prayers go to his family and friends, may he rest in peace". Social Democratic and Labour Party (SDLP) MLA Justin McNulty described the incident as "horrendous". "We are all just shocked by this horrible news, especially at this time of year," he said. "We are just so devastated for the young boy's mother and father."
