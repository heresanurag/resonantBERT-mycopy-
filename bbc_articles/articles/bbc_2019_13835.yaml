id: bbc_2019_13835
title: 'England flooding: A tour of a flooded house in Fishlake - BBC News'
date: '2019-11-09'
section: General
url: http://www.bbc.co.uk/news/uk-50361354
content: |-
  This home in Fishlake has been left submerged after persistent rain which caused floods across Yorkshire and the Midlands.

  A month's worth of rain has fallen in some parts of the north of England.

  This home in Fishlake, near Doncaster, has been left nearly submerged by floodwater.
