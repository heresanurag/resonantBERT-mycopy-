title: '''What an incredible group'' - Wales boss Craig Bellamy - BBC Sport'
date: '2025-03-26'
section: General
url: http://www.bbc.co.uk/sport/football/videos/cgr2870n7q1o
content: |-
  Wales boss Craig Bellamy lauded his "incredible group" of players as they claimed a dramatic 1-1 draw in their World Cup qualifier with North Macedonia in Skopje.

  The hosts appeared destined to secure all three points as Bojan Miovski capitalised on Joe Allen's loose pass to score in the first minute of added time.

  But substitute David Brooks netted in the final seconds as Wales claimed a draw to preserve Bellamy's unbeaten start to his tenure as Wales manager.
