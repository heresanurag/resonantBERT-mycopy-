title: 'Ukraine war: Kyiv residents adapting to night-time power cuts - BBC News'
date: '2022-11-04'
section: General
url: http://www.bbc.co.uk/news/world-europe-63505135
content: |-
  People living in Ukraine's capital Kyiv are having to get used to living in a much darker environment.

  In recent weeks, Russia has carried out large scale missile and drone attacks on Ukrainian power plants.

  Ukraine's President Volodymyr Zelensky says these strikes have seriously damaged 40% of the country’s critical infrastructure, with multiple cities now introducing emergency stabilisation blackouts.

  While residents in the capital Kyiv are being asked to use electricity as sparingly as possible, they are also having to adapt to a much darker environment.

  BBC News correspondent Catherine Byaruhanga takes us on a night-time walk through the city.

  Filmed and Edited by Jonny Dunstan. Produced by Kyla Herrmannsen.
