content: |-
  A rare and compelling drainage feature at a reservoir is triggered for the first time in years by high water levels.

  A drainage pipe at a reservoir in Northern California has been activated for the first time in six years, creating a mesmerising whirlpool which resembles a plughole.

  Higher than normal water levels have triggered the feature at the Monticello Dam in Napa County, according to local water agency officials.

  It's the first time this release system, known as the Morning Glory Spillway, has been seen since February 2019.
