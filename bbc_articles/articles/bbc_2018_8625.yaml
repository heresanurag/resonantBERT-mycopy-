title: 'Thai cave rescue: Thai boys'' tears for lost rescue diver Saman - BBC News'
date: '2018-07-15'
section: Asia
url: http://www.bbc.co.uk/news/world-asia-44838803
content: |-
  The youngsters now know that a volunteer died helping to save them, Thailand's health ministry says.

  The 12 boys and their coach pictured with a drawing of Saman Gunan (also spelled Kunan), who died working to rescue them

  The 12 young footballers who were saved from a Thai cave after an international rescue effort are mourning a former Navy Seal who died in the operation.

  Volunteer diver Saman Gunan lost his life on 6 July while installing oxygen tanks in the flooded cave complex.

  He has since been hailed as a hero around the world.

  The boys and their 25-year-old coach were told of his sacrifice only on Saturday, when doctors decided they were strong enough to process the news.

  "All cried and expressed their condolences by writing messages on a drawing of Lieutenant Commander Saman and observed one minute of silence for him," said Jedsada Chokdamrongsuk, permanent secretary at the health ministry.

  Photos showed the "Wild Boars" football team, who are being monitored in hospital, gathered solemnly around a picture of the diver.

  "They also thanked him and promised to be good boys," the health ministry said.

  The young footballers bow their heads after writing messages of commemoration

