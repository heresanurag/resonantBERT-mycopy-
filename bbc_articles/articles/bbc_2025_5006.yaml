  Tandridge District Council (TDC), which is leading the operation, said it was confident all but four of the 30 evacuated households could return safely. All businesses, except one directly impacted by the collapse, are open for business as usual, the council added. "It is great news that almost all households are now able to return home," said TDC leader Catherine Sayer. "This has been a difficult and stressful time." She urged people to visit Godstone as it was "very much open for business".

  Matt Furniss, from Surrey County Council, said foam concrete had been used to "temporarily fill the hole to stabilise the area and ensure it doesn't get any bigger". He said work was ongoing to determine "how best to permanently repair the area so it doesn't reoccur". The cabinet member for highways, transport, and economic growth thanked residents for their patience as the local authority dealt with the "complex" and "unprecedented" incident.

  Tandridge District Council allocated hundreds of thousands of pounds to house residents affected by the collapse

  Authorities declared a major incident after the ground opened up on Godstone High Street on 17 February, with police telling people living in William Way to "get out as quickly as possible" at the time. Some residents were previously told it could be up to a year before they could go home, while six households returned a few days after the incident. TDC allocated up to £800,000 for temporary accommodation for up to 12 months, according to the Local Democracy Reporting Service.

