title: 'Godstone sinkhole: Families set to return home after evacuation - BBC News'
date: '2025-03-26'
section: Surrey
url: http://www.bbc.co.uk/news/articles/c8d4v9q8d55o
content: |-
  Surrey County Council says it still does not know what caused the High Street collapse.

  "Quite a lot of anomalies" had been detected in the area, said the council

  "Almost all" residents affected by a sinkhole in Surrey are set to return home, a local authority has said. Lloyd Allen, Surrey County Council's infrastructure team manager, said those impacted by the road collapse in Godstone High Street could return to their homes this weekend. But he warned this depended on a "couple of issues" still under investigation, such as whether water quality was up to the right standard. Mr Allen said the local authority was still trying to establish what caused the collapse in February.

  He said a GPR survey, which involves sending radar pulses through the ground, had detected "quite a lot of anomalies" in the area. "We are calling them anomalies at the moment because until we investigate further, we don't actually know what they are," he said. Mr Allen suggested they could be a "series of tunnels under the road", "deep sewers", or "potentially soakways from properties". He said the council would continue its investigations over the coming weeks to determine what is happening underground. But he warned the work, involving specialist engineers and digging boreholes, could take "several months".

