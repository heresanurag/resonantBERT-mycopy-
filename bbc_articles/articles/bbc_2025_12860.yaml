title: Rogue bears' honey supply replenished by community in Devon - BBC News
date: '2025-06-25'
section: Devon
url: http://www.bbc.co.uk/news/articles/c8j1087zppxo
content: |-
  The boss of a wildlife park where two bears escaped and gorged on honey thanks people for donations.

  To play this video you need to enable JavaScript in your browser. This video can not be played Watch: CCTV captures one of the bears helping itself to supplies outside the bear house

  A pair of bears who escaped and raided their keepers' food store in Devon are in the honey once more thanks to generous community donations. European brown bears Mish and Lucy sparked a "code red" on Tuesday, in an escape that conservation charity Wildwood Trust said was caused by an unlocked gate. The dynamic duo consumed "a week's worth of honey", the trust said, as well as jam and other supplies - prompting a "sugar rush" and leaving a depleted larder in their wake. Mark Habben, director of zoological operations at Wildwood Trust, near Exeter, said: "I think everyone's picked up on the fact bears really do love honey - we've had donations including a 15kg (33lb) tub."

  The antics of Mish and Lucy prompted an outpouring of support

  Mr Habben added: "We've also had donations to purchase more honey. "It's just been been really lovely support from the local community. "I couldn't have more gratitude for how people have responded to this and rallied around and offered support and also come in to see Mish and Lucy. "People have picked up the cheeky element of bears, I think, and that they're a lovely, peaceful animal." Mr Habben said they had also been inundated by visitors since the incident captured imaginations across the country and beyond.

  Mish is seen chewing on a stick at Wildwood in Devon

  It was at about 15:00 BST on Monday that the young bears "breached" the enclosure and made their way to a staff area. As the duo "feasted and played around", a park evacuation and lockdown took place, while staff trained in firearms and the police were deployed to the site. After about 55 minutes, Mish made her way back to the enclosure, while Lucy was lured back with a bell and some food.

  Mr Habben said the sugar from the honey hit the bears shortly afterwards. "They gorged on honey and then they somehow needed to burn all of the energy off that that honey had created. "They charged around for a good few hours, climbing up the trees, which was really fun to see, and jumping in the pond." He said they then "crashed out" in a deep sleep "for hours" - just as an influx of visitors arrived to see the now-famous bears. "I think it was all of the running around from the sugar rush coupled with all of that sensory enrichment from being somewhere they shouldn't. They are like toddlers."

  Mr Habben said a safety review was now under way to ensure the unlocked gate "never happens again". "We've been transparent that a mistake was made but at the end of it is a really positive ending and the engagement has been great."
