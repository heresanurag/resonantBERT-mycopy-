title: Gerwyn Price wins second Players Championship of 2025 as PDC world champion
  Luke Littler stumbles in quarter-finals - BBC Sport
date: '2025-02-12'
section: Darts
url: http://www.bbc.co.uk/sport/darts/articles/cn57d45vgd1o
content: |-
  Welshman Gerwyn Price wins the second Players Championship of 2025 after an 8-7 win over Chris Dobey in the final, having beaten Luke Littler earlier in the day.

  Gerwyn Price is eighth in the PDC world rankings

  Gerwyn Price won the second Players Championship of 2025 with a dramatic 8-7 victory over Chris Dobey in the final, having beaten Luke Littler in a thriller earlier in the day. Price secured his first ranking title for 15 months after coming back from 6-3 down to beat Dobey at Robin Park Leisure Centre in Wigan. The Welshman managed just a solitary 180 to Dobey's six in the match and his average of 99.58 was below below his opponent's 101.83, but he hit his doubles at key moments. The 39-year-old had earlier knocked out PDC world champion Littler in the quarter-finals with a tense 6-5 victory. Littler bettered his performance on Monday, when he was knocked out in the third round, but Price finished on top, hitting a 14-dart check out with the scores locked at five legs apiece. "Sometimes in the past I just gave up, rolled over and had my belly tickled, but my mentality and the way I think has changed," Price told PDC Darts. "I had a little bit of help with a sports psychologist before the World Championship, which really helped. "Now I'm getting back to my best. There's a lot more positivity in my game and it seems to be working," he added, after winning £15,000 and his first ranking title since a Players Championship win in Barnsley in 2023.

  Beau Greaves won the deciding leg in 11 darts against Josh Rock, who averaged 103.3 in the match

  Beau Greaves claimed a breakthrough win at the tournament in Wigan with her first victory on the PDC ProTour. The two-time Women's World Matchplay champion trailed 5-3 but won three consecutive legs to beat world number 17 Josh Rock 6-5 in the first round. England's Greaves hit six 180s and averaged 102.7 against Northern Ireland's 2022 world youth champion, who said last month he believes he can challenge Littler's prospective dominance in the future. Greaves lost 6-2 to Poland's Krzysztof Ratajski in the second round. There are 34 Players Championship events across the year. The next double header is in Rosmalen in the Netherlands on 17 and 18 February, with the competition's finals held in Minehead from 21 to 23 November.
