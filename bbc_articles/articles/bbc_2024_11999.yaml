title: 'T20 World Cup: England rescued by old Ashes foe Travis Head - BBC Sport'
date: '2024-06-16'
section: England
url: http://www.bbc.co.uk/sport/cricket/articles/ckddp099nw8o
content: |-
  Australia's Travis Head proves to be England's unlikely saviour in St Lucia to allow Jos Buttler's side to progress to the Super 8s.

  Travis Head top-scored with 68 as Australia chased 181 with two balls to spare to beat Scotland

  Alex Carey, David Warner, Steve Smith and all of that Ashes pain - England fans forgive you. For Scotland, this was T20 World Cup heartache - with Chris Sole's dropped catch in the final over only adding to 36 hours of cruel sporting misery. For England, Australia’s gripping victory against Scotland - which knocked out the Scots and sent Jos Buttler’s side through to the Super 8s - offered pure relief, served up by their oldest cricketing rivals. Last summer Travis Head was pounding England bowlers in an attempt to win back the Ashes urn. He was in the middle on that final day at The Oval with Smith, the pair threatening to take Australia home before Stuart Broad’s grand finale. Eighteen months earlier, during England’s most recent venture down under, Head flogged Ben Stokes et al around Brisbane in a blistering century. It was only the second day of the series, but England would never recover from it.

  This time each of his 68 runs, including three sixes in three momentum-swinging deliveries late on, will have been celebrated by every English fan following the events through the early hours of Sunday morning. When six catches were dropped – the most by any team in the history of the men’s competition – the conspiracy theorists were no doubt stretching for their keyboards, especially in the light of Josh Hazlewood’s comments this week. At one stage in their chase, Australia, who were already qualified for the Super 8s and allowed Scotland to pile up 180-5 - their highest total at a T20 World Cup - needed 89 from seven overs. England fans should not have worried. Resisting going all out for a win is not the Australian way. Perhaps they just wanted England fans to sweat along the way. “More externally than internally,” captain Mitchell Marsh said afterwards, when asked about the noise about the results ramification on England. “We won today and that’s all that matters.”

