title: Teenager jumps into frozen pond to rescue calf - BBC News
date: '2024-03-02'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-68038461
content: |-
  Oliver, 16, ran out of a car and into the freezing water when he spotted Wynonna, the two-month-old cow.

  Oliver Reyes jumped into a frozen pond at his family's farm in Philadelphia, Tennessee, when he noticed a longhorn calf named Wynonna had fallen through the ice. The 16-year-old told the BBC that jumping in was by 'instinct'.
