title: Several injured in 'violent' St Blazey Gate pub fight - BBC News
date: '2025-05-20'
section: Cornwall
url: http://www.bbc.co.uk/news/articles/c1derknn6z1o
content: |-
  Police are appealing for witnesses to the fight in Cornwall, which broke out on 16 May.

  Police are appealing for witnesses to a "violent" fight at a Cornish pub.

  Officers said "several" people were injured in the fight which broke out at the Four Lords pub in St Blazey Gate, Par, on Friday at about 22:30 BST.

  The fight, involving two groups of people, started in the toilets of the pub and ended up on the street outside, Devon and Cornwall Police said.

  The force said it would like to hear from anyone who was either at the pub or passing at the time.
