title: 'Michel Barnier: Macron to address nation after government collapse - BBC News'
date: '2024-12-05'
section: Europe
url: http://www.bbc.co.uk/news/articles/cwyd5j0dwkno
content: |-
  The prime minister will stay on as caretaker while President Emmanuel Macron chooses a successor.

  The French government fell after parliament backed a motion of no-confidence in Prime Minister Michel Barnier on Wednesday

  French President Emmanuel Macron will address the nation on Thursday night, a day after Prime Minister Michel Barnier was ousted in a no-confidence vote. The presidency said on Thursday that Barnier had resigned his post, but would remain in office on a caretaker basis with his ministers until a new government was appointed. Names for a new prime minister have been swirling, including Defence Minister Sébastien Lecornu, Interior Minister Bruno Retailleau and centrist former presidential candidate François Bayrou. But finding a name that would not immediately be shot down by one of the large parliamentary factions could take some time, as it did in the summer, when former PM Gabriel Attal stayed on as caretaker for two months.

  Barnier's government collapsed after MPs voted overwhelmingly in support of the motion against him, just three months after he was appointed by Macron. Wednesday night's vote was the first time a French government had been voted down by parliament in more than 60 years. Marine Le Pen's far right and the left-wing New Popular Front both united to censure Barnier's government after the former Brexit negotiator used special powers to force through his budget without a vote. A total of 331 voted in support of the motion, far more than the 288 required for it to pass. Barnier presented the resignation of his government after the vote, while the budget which triggered his downfall was automatically withdrawn. As president, Macron is constitutionally unaffected by Barnier's resignation. But many opposition politicians are increasingly open about wanting to force him to resign and call early presidential elections - something Macron has insisted is off the cards.

  Marine Le Pen said the "only dignified solution" for opposition MPs was to oppose the budget

  The left-wing alliance New Popular Front (NFP), which won the most seats in the parliamentary elections, had previously criticised Macron's decision to appoint centrist Barnier as prime minister over its own candidate. Alongside the far-right National Rally (RN), it deemed Barnier's budget - which included €60bn (£49bn) in deficit reduction - unacceptable. Marine Le Pen, the RN leader, said the budget was "toxic for the French". Ahead of the vote, Barnier told the National Assembly that voting him out of office would not solve the country's financial problems. "We have reached a moment of truth, of responsibility," he said, adding that "we need to look at the realities of our debt". "I did not present almost exclusively difficult measures because I wanted to." In an interview with French broadcaster TF1 on Wednesday, Le Pen said there was "no other solution" than to remove Barnier. Asked about the French president's prospects, she replied: "I am not asking for the resignation of Emmanuel Macron." Many of her allies, however, are increasingly openly hoping they can force him to resign. RN adviser Philippe Olivier told Le Monde the president was “a fallen republican monarch, advancing with his shirt open and a rope around his neck up to the next dissolution [of parliament]”. No new parliamentary elections can be held until July, so the current deadlock in the Assembly - where no group can hope to have a working majority - is set to continue.
