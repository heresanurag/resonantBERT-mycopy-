content: |-
  BBC Middle East correspondent Lina Sinjab describes chaotic scenes in the Syrian capital.

  BBC Middle East correspondent Lina Sinjab witnessed people looting a residence belonging to Bashar al-Assad, in chaotic scenes after he fled the country.

  "I've never been into this street... I can see people rushing into this place in revenge and also with lots of happiness that they've managed to break in," she reported.
