title: 'Wirral: Murder arrest two years after Ibiza balcony death fall - BBC News'
date: '2024-09-25'
section: Liverpool
url: http://www.bbc.co.uk/news/articles/c9qvw04qgxro
content: |-
  A 27-year-old man from London is held on suspicion of murdering Robyn Eve Maines who died in Ibiza.

  Robyn Eve Maines was on holiday when she is believed to have fallen from a hotel balcony

  A man has been arrested on suspicion of murder nearly two years after a woman died following a balcony fall in Ibiza. On the second anniversary of Robyn Eve Maines' death at the Hotel Rosamar in Calle Huelva, her family said she had been "tragically taken away from us". The 24-year-old, from Wallasey, was found on 25 September 2022. A man, 27, from London, was held on 3 September and has since been bailed pending further inquiries, Merseyside Police said.

  The force said it was now investigating Ms Maines' death, which was being treated as unexplained, following an earlier inquiry by Spanish Police and it was reviewing materials sent over by Spanish authorities. Det Insp Phil Ryan said: "On the second anniversary I am appealing for any witnesses who may have been staying at the hotel in September 2022, and who are based in the UK, to come forward. "Perhaps you return to this same hotel on the same date every year. Were you there in 2022 and did you see or hear anything, or do you have any other information which could assist with our investigation?" He said officers had a number of lines of inquiry, but that it was "vital that people come forward and tell us what they know". "Robyn’s family have understandably been left devastated by her death and are still seeking answers as to what happened," he added.
