id: bbc_2017_5252
title: What happened to the 276 kidnapped Chibok girls? - BBC News
date: '2017-05-19'
section: Africa
url: http://www.bbc.co.uk/news/world-africa-39965685
content: |-
  In April 2014 Islamist militants kidnapped 276 girls from their school in Chibok in north-eastern Nigeria.

  This month dozens were released. But when will the rest be free?
