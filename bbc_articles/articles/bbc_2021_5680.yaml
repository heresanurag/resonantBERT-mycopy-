title: 'Scottish Cup final: St Johnstone 1-0 Hibernian - Perth side complete domestic
  cup double - BBC Sport'
date: '2021-05-22'
section: General
url: http://www.bbc.co.uk/sport/football/57125203
content: |-
  St Johnstone edge Hibernian to lift the Scottish Cup for a second time and complete a domestic cup double in the greatest season in the club's history.

  Last updated on .From the section Scottish Cup

  St Johnstone edged Hibernian to lift the Scottish Cup for a second time and seal a domestic trophy double in the greatest season in the club's history. Wing-back Shaun Rooney, who scored the winner in the League Cup final against Livingston, rose above Josh Doig to head home after half an hour. Saints otherwise held on easily to win the cup for the first time since 2014. That Scottish Cup victory was their only previous appearance in the final, but they have now won on their last four appearances at Hampden Park - all in Callum Davidson's first season as manager. Their success against the side who finished two places above them - in third - in the Scottish Premiership, sees the Perth men upgrade their spot in next season's new Europa Conference League to the Europa League qualifiers. St Johnstone have now won their latest four meetings with Hibs without conceding a goal - including this season's League Cup semi-final. Their performance and win was all the more impressive given the build-up had been clouded in problems for Davidson's side after eight players were affected by Covid-19 protocols following positive tests. Both teams making a host of changes from goalless draws as the Premiership drew to a close last weekend, but they fielded the same starting line-ups other than one man apiece from their semi-final wins. Hibs settled first in terms of possession, but it was St Johnstone who had the better early chances. Kane ought to have made it a goal in three consecutive rounds of the Scottish Cup but lashed a shot over after a clever Craig Bryson flick. Hibs should have been ahead, though, when the ball fell kindly to Jackson Irvine in space deep inside the penalty box, but the Australia midfielder's low drive battered off goalkeeper Zander Clark's outstretched foot. St Johnstone steadied themselves and the lead was reward for determined tackles by Bryson and former Hibs left-back Callum Booth. When the ball fell to David Wotherspoon, the former Hibs midfielder turned Alex Gogic inside out and sent a sweet inswinging cross to the back post, where Rooney's jump dwarfed the flailing Doig to power his header home. Hibs came out after the break with greater fervour but were fortunate not to fall further behind as St Johnstone broke quickly after Gogic claimed for a penalty when his header was cleared from in front of goal. The latest of several superb Middleton runs was thwarted by a Joe Newell tackle and only a nick off the prone midfielder's leg prevented Rooney following up with his second of the game. Saints started to tire but were still dangerous on the break and Macey had to save from Middleton and Wotherspoon before the former Arsenal goalkeeper kept Hibs' hopes alive after the award of a penalty for Paul McGinn's foul on Kane. However, with the Leith side falling flat and failing to test Clark, an exhausted but resolute St Johnstone survived to record a famous win. David Wotherspoon (centre) delivered the cross for the goal and was a classy performer in midfield against his former club What did we learn? Where can St Johnstone go from here? After a difficult start to his first season as manager, Davidson has lifted the side inherited from Tommy Wright to new heights. They were underdogs not only because they finished below Hibs in the league but due to the havoc to their preparations through Covid. But once again they got the better of more lauded opponents. For Jack Ross' Hibs, it is another disappointment to add to their League Cup semi-final loss to Saints. Their goal-hungry front trio failed to ignite and how much they can build on their third place in the top flight will depend on how many of their best players will remain after the summer transfer window. What did they say? St Johnstone manager Callum Davidson: "Hibs have had a fantastic season and it could have gone either way. I am just very fortunate it went our way. "For a small club like St Johnstone to create a cup double - not many teams outside the Old Firm have managed to do it. I thought we weathered the storm and put pressure on Hibs." Hibs head coach Jack Ross: "In the first half, we probably have the clearest opportunity and we don't take it. And then of course St Johnstone go ahead. "That final third aspect where we're normally really creative, it just didn't quite come off for us. We've just got to make sure we come here again." For St Johnstone, the Europa League qualifiers await, while Hibs have to make do with the new Europa Conference League.
