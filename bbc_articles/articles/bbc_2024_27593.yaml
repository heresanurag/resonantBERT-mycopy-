content: |-
  Arsenal forward Beth Mead says interim manager Renee Slegers is a “breath of fresh air” and she would like her to stay at the club “in some capacity”.

  Arsenal forward Beth Mead says interim manager Renee Slegers has been a “breath of fresh air” and she would like her to stay at the club “in some capacity”. The Gunners are unbeaten in four games since the Dutchwoman took charge after Jonas Eidevall’s resignation last month. The club have said Slegers will remain in the job until at least December. "We've obviously worked with Renee for quite a while now - in different roles to what she's in now - but I think she's taken to it like a duck to water," said Mead. "It’s been an easy transition. We know what she gives us - the confidence she gives us, we’re playing good football. "As individuals and as a collective, we’re really happy with what Renee is doing for us right now.

  Former Netherlands international Slegers, 35, joined Arsenal as Eidevall's assistant in September 2023. The pair were reunited after working together at Swedish side Rosengard, before Slegers succeeded Eidevall at the club in June 2021, going on to lead them to back-to-back titles. "It's a new chapter starting, kind of, and we’ve got to take the most out of this chapter and keep pushing forward," said Mead. "It’s been a breath of fresh air with Renee, [I'm] really enjoying it so far." Asked if she would like Renee to stay, she said “always” - adding "in some capacity". "We love having Renee so we’ll be happy whatever she chooses to do,” she said. Slegers has not confirmed if she is interested in taking the job in a permanent capacity. “I really enjoyed the role I had before and right now I will play this role for the team," she said in a news conference before her side's crucial visit to Juventus on Tuesday (17:45 GMT) in the Women's Champions League. "About the future I don’t know, I’m just in the moment,” she added. The Gunners are level with Juventus on three points after one win and one defeat in their opening two group games.
