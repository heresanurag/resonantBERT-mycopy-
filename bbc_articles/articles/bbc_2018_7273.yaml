id: bbc_2018_7273
title: 'Brexit: Thousands march for ''people''s vote'' on final deal - BBC News'
date: '2018-06-23'
section: General
url: http://www.bbc.co.uk/news/uk-politics-44588303
content: |-
  Campaigners marched through London on the second anniversary of the UK voting to leave the EU.

  Thousands of people have marched through central London to demand a final vote on any UK exit deal, on the second anniversary of the Brexit vote.
