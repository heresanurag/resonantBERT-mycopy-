  A range of stories feature in Wednesday's papers, including the latest on Strictly Come Dancing.

  BBC 'sorry' over Strictly and plan to get people into work

  The latest in the Strictly Come Dancing story makes the front of some papers

  Many of Wednesday's front pages carry pictures of the three-time Olympic dressage champion, Charlotte Dujardin, who's pulled out of the Paris Games after a video emerged which she said showed her "making an error of judgement". The Daily Mail, external describes her as the "Team GB golden girl". The Daily Telegraph, external says she's alleged to have whipped a horse 24 times “like an elephant in the circus” and is “deeply ashamed” of her actions. The Telegraph, external leads with a report that GPs are threatening to see fewer patients in a row over pay. It says family doctors in England are voting on whether to take part in national “collective action” - with work-to-rule measures set to be introduced from next week. The paper says that could result in GPs cutting the number of appointments they offer each day by up to a third. The front page of The Times, external carries the headline: "Long-term sick should be forced to seek work", quoting the government's health adviser, Alan Milburn. The paper says the former health secretary is urging fundamental reform to deal with the UK's welfare burden. Mr Milburn is reported to have labelled the current system "crazy" and to have found that "seven out of ten economically inactive people wanted to work but few had any help or requirement to do so". The Sun's front page features a picture of the Islamist radical preacher Anjem Choudary, who's been convicted on terror charges. The paper declares, external: "Now throw away the key". The Mail, external asks "Why was jihad preacher freed to spout hate?" The paper says the 57-year-old "embarked on a global bid to recruit the next generation of terrorists" from Brazil, Canada, and the US after being freed from jail in 2018. It says the police investigation revealed he had also been "peddling sermons" to British schoolchildren as young as 14. The Financial Times, external carries the headline: "Windfall profit - Crown Estate blows in 1 billion pounds". It says a lucrative stretch of offshore wind farms around the coastlines of England, Wales, and Northern Ireland have sent profits at the monarchy’s estate soaring. The Crown Estate, which plays a leading role in royal finances, said earnings had more than doubled - largely due to fees charged to offshore wind developers. Several papers, including the Daily Mirror, external, the Daily Express, external, and the Metro, external lead on the BBC director general's apology for the allegations engulfing Strictly Come Dancing. The Mirror says Strictly dancers fear they're being "hung out to dry" by former celebrity partners and don't believe they're being "protected" over the abuse claims. The paper says the professional dancers are calling on BBC bosses to vet new contestants before they start "rigorous training" for the dance show. The Guardian, external pays tribute in an obituary to the actor Roberta Taylor, who's died at the age of 76. She was best known on television for her roles as the matriarch Irene Raymond in "EastEnders" and the hard-drinking inspector Gina Gold in "The Bill". She also had a distinguished stage career. The paper says Taylor "demonstrated triumphantly how a really good actor can encompass grand tragedy, high comedy and superior soap opera without strain".

