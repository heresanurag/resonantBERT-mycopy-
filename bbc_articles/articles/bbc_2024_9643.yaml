  Police have launched a murder investigation following the death of a 48-year-old man in Cardiff.

  Police have launched a murder investigation following the death of a 48-year-old man

  Three women have been arrested on suspicion of murdering a 48-year-old man in Cardiff.

  Emergency services were called to the Heol-Y-Berllan and Heol Trelai area of Caerau shortly before 23:30 BST on Sunday night.

  A 28-year-old woman from Ely, a 43-year-old woman from Caerau and a 43-year-old woman from Worcestershire remain in custody.

  South Wales Police has appealed for witnesses and cordoned off the area.

  The family of the 48-year-old man, who was from the Grangetown area of the city, have been made aware and are being supported by specially trained officers.

  Det Supt Darren George of the forces Major Crime Team said: "A murder investigation has begun.

  "Although arrests have been made the investigation remains in its very early stages, this is an appeal to witnesses who would have been in the Heol y Berllan and Heol Trelai area of Caerau between 23:00 and midnight last night to come forward with information no matter how insignificant they may feel it is.

  "There will also be an increased police presence in the area over the coming days as officers conduct their enquiries."
