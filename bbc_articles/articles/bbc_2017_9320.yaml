  However, clean-up crews found thousands of perfectly useable bicycles abandoned by attendees. Bikes are the most common form of transportation around Black Rock City, and the way they are tossed aside at the end has long been a problem.

  Burning Man partners with local charities to take, refurbish and sometimes donate the bikes to needy families, but this year, the sheer number of bikes overwhelmed even these partners. An estimated 5,000 bicycles were left behind.

  Logan Mirto, a Burning Man employee, took a picture of the dusty heap and shared it on social media with the caption: "Please ⚡️don't ⚡️leave ⚡️your ⚡️bikes ⚡️at ⚡️Burning ⚡️Man."

  The picture went viral, fuelled in part by the criticism that Burning Man is increasingly seen as a festival for the elite, attracting millionaires (and a few billionaires) from Silicon Valley and Hollywood.

  "Throwaway consumerism through and through," one critic wrote on Facebook. "Good job Burning Man goers (those who have the leisure to spend a month in the desert and then leave their crap for others to deal with)."

  Organisers posted desperate messages on social media imploring anyone with a truck to come and rescue the bicycles, warning they would otherwise be scrapped.

  Matthew Rockwell, a Burning Man contractor and founder of the charity start-up Disaster Hack, immediately made the connection between the abandoned bikes and the hundreds of thousands of dead cars in Houston. He started picking through the pile and pulled out about 500 bikes he thinks could be salvaged.

  The photo of the bikes also caught the attention of Meg Kiihne, who lives about four hours from the site. Kiihne once lived and ran a bike shop on Turks and Caicos, and saw pictures all over Facebook of her friends' and family's collapsed homes. She says she knew bicycles could be useful in the recovery effort after Hurricane Irma.

  "There are parts of the island which will not have power for months," she says. "Bikes can enable somebody who may have lost their home and staying with a friend, they can get to their job at a resort so they can continue to make money to help rebuild their home... they can get around on a bike and get to food."

  After a hastily arranged Go Fund Me, Kiihne and some friends rented a truck and a storage unit in nearby Reno, Nevada, and headed for the playa. They managed to harvest 110 bicycles.

  Meg Kiihne loads up a truck with bicycles in the Black Rock Desert

  Within 48 hours of Burning Man employees putting out the call, all the bikes had been claimed and "Bike Apocalypse" was over. Now begins the difficult process of cleaning and repairing bikes that spent days baking in the sun and covered in corrosive dust.

  "We have to go through an intensive cleaning process of cutting off all faux fur, lights, squeaky toys, baskets, and seat covers all trapping clumps of clay," says Kiihne.

  But there is treasure in the desert. Underneath layers of clay-caked fur and fabric, for example, Kiihne discovered a gleaming, brand new child's Trek:

  A Burner bike before and after, restored by Kiihne

  Once the bikes are cleaned and fixed, the next challenge will be to get them onto trucks and shipping containers heading for Houston and to the Caribbean. Kiihne is continuing to fundraise and negotiating with her industry contacts to try to get her bicycles heading to the Caribbean as soon as possible.

  While Rockwell says he will keep some in Nevada to lease back to Burners next year, he hopes to have about 100 of them on a flat bed truck and on the roof of his RV heading for Houston in the next 10 days. He says once he determines what the needs are in Houston, he will determine whether to return with another load.

  Carter Stern, the executive director of Houston's bike share programme, predicts he could easily find owners for all 500 of Rockwell's Burner bicycles. Stern has been collecting donor bicycles for hurricane victims in a campaign called Keep Houston Rolling and says he already has takers for 500 brand new bikes donated from Trek and Giant.

  "A lot of people who lost a vehicle all the sudden can't get to work, can't afford to get a new car. Long after the TV cameras have left Houston there's going to be a lingering need for transportation options," says Stern. "I think we can give away 1,000-2,000 bikes, no question."

  Weeks after the storm hit, Stern was able to get Rodriguez a bicycle and she has rented a small studio closer to the heart of the city so that she doesn't need a car - at least not immediately.

  "I'm able to bike around town now," she tells the BBC. "Slowly, things have progressed, but there's a lot to recover."
