title: Abandoned at Burning Man, bicycles now head for Houston and the Caribbean -
  BBC News
date: '2017-09-26'
section: US & Canada
url: http://www.bbc.co.uk/news/world-us-canada-41312810
content: |-
  How the abandoned bikes of Burning Man are making their way to hurricane victims.

  About 5,000 bicycles were abandoned in the desert at this year's festival

  Thousands of Burning Man revellers abandoned their bicycles when they left the desert festival. Will hurricane victims give them a second life and a new purpose?

  When the rains from Hurricane Harvey finally stopped, everything Yesenia Rodriguez owned was under 20 feet of water.

  "I lost my bike. I lost my car. I lost all my clothes," she says. "I found my baby picture in a tree."

  Rodriguez, a real estate agent, went to stay with relatives and is now starting over from scratch.

  But in a sprawling city like Houston - where pre-storm, 94% of residents owned a motor vehicle - getting to her job and around town without a car was impossible. An estimated 500,000 to 1m cars were destroyed by floodwaters. Many Houstonians don't have the means to replace their submerged vehicles and there's a rental car shortage in multiple Texas cities.

  So people like Rodriguez will have to convert from four wheels to two. If she had a bike, she says, she wouldn't have to rely on her family to ferry her around in her aunt's car. She could use it to get between bus stops and train stations, to get to work and to go to the shops. But even a few hundred dollars for a bike is currently beyond her reach.

  "Making any major purchase is out of the question right now."

  The solution for people in her situation may be coming from an unlikely place, nearly 2,000 miles away in the dry lakebed of the Black Rock Desert in Nevada.

  After nine days of parties, music and larger-than-life art installations, the 2017 season of Burning Man came to a close on 4 September. In theory, all evidence of "Black Rock City" - which attracted 70,000 attendees to the dusty desert - was supposed to vanish. One of the festival's core tenets is "leave no trace".

