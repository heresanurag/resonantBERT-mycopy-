title: 'Typhoon Mangkhut: Philippines hit by flash flooding and landslides - BBC News'
date: '2018-09-17'
section: General
url: http://www.bbc.co.uk/news/world-asia-45535797
content: |-
  Typhoon Mangkhut has led to widespread destruction in the Philippines.

  Flash floods and landslides have led to fatalities in the Philippines.

  Typhoon Mangkhut made its way through the main island of Luzon, and is now moving west towards Vietnam and China.
