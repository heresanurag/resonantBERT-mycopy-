title: Donald Trump and Elon Musk watch SpaceX launch Starship rocket - BBC News
date: '2024-11-21'
section: General
url: http://www.bbc.co.uk/news/videos/cz9x2nk1jyvo
content: |-
  The president-elect visited the launch site in Texas to watch the spacecraft's sixth test flight.

  President-elect Donald Trump joined Elon Musk in Brownsville, Texas to watch the sixth test launch of a SpaceX Starship spacecraft.

  SpaceX was reattempting an operation where the rocket booster is caught in a landing dock on its return to Earth, which was achieved for the first time during Starship's fifth test flight. But due to an issue, SpaceX aborted the plan and the booster splashed down in the Gulf of Mexico, after just minutes in the air.

  Earlier this month Trump chose Musk and Vivek Ramaswamy to to lead a new "Department of Government Efficiency" (Doge).

  Trump said the pair would act in an advisory capacity, and that the Doge would not be an official government department.
