  'Everything' will be looked at after exit - Buttler

  This video can not be played To play this video you need to enable JavaScript in your browser.

  Captain Jos Buttler says England will "review everything" following their semi-final exit at the T20 World Cup. The defending champions were bowled out for 103 by India in Guyana as they slumped to a 68-run defeat. It is the second world title they have given up in the past eight months following last year's disappointing defence of the 50-over World Cup. "You take some time to review tournaments and try to plan ahead for the next tournaments," said Buttler. "We have to review what we need to do better as a team, if that is the way we play, personnel, style of cricket. "We will review everything and come up with a plan." Buttler replaced Eoin Morgan as white-ball captain in 2022 and led England to victory in the T20 World Cup in Australia later that year. He suggested he wants to stay on as captain until the Champions Trophy in Pakistan in February next year. However, he added: "I am not thinking too far ahead to be honest and reflecting on the loss today, trying to review that. I haven’t thought past today."

  This video can not be played To play this video you need to enable JavaScript in your browser.

  He said England allowed India to get "20 to 25" runs too many on a challenging batting surface with low bounce as they posted 171-7. Spinners Axar Patel and Kuldeep Yadav then took 3-23 and 3-19 respectively as England crumbled. "With a good score and their brilliant bowling attack it was always going to be a tough chase." Despite making the semi-finals, England's tournament ends with only one victory against the Test-playing nations. In the group stages they almost exited after a washout against Scotland and defeat by Australia. They beat West Indies but their other wins were against Oman, Namibia and the United States. "We can only play who's in front of us," said Buttler. "We've had a lot of adversity but we have stuck together really well, we played good cricket in patches but unfortunately came up short when we needed it most."
