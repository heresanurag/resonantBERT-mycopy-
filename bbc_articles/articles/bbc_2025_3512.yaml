title: Scotland's former First Minister Nicola Sturgeon to step down as MSP at 2026
  Holyrood election - BBC News
date: '2025-03-12'
section: Scotland Politics
url: http://www.bbc.co.uk/news/articles/cvg5j74ld9lo
content: |-
  The ex-SNP leader says she will not seek re-election at the 2026 Scottish Parliament election.

  Nicola Sturgeon to step down from Holyrood

  This video can not be played To play this video you need to enable JavaScript in your browser. Nicola Sturgeon says serving as an MSP has been "an incredible chapter of my life"

  Scotland's former First Minister Nicola Sturgeon is to stand down as an MSP, she has announced. The ex-SNP leader confirmed she would not seek re-election at the Holyrood election in May next year. After announcing her decision on social media, she told BBC Scotland News her time in parliament had been a "privilege beyond words". She added: "But the time is right for me at this stage in my life to close the book on that chapter and open a new one."

  Sturgeon resigned as first minister in March 2023 after eight years in the role. She is Scotland's longest-serving first minister and the first woman to hold the position. Her resignation as party leader marked the beginning of a tumultuous period for her and the SNP. In June 2023 she was arrested and released without charge as part of a police investigation into SNP finances. She insists she has done nothing wrong. Her husband Peter Murrell, who had long served as the SNP's chief executive, has since been charged with embezzling SNP funds. In January, Sturgeon announced that the pair had decided to end their marriage. The Glasgow Southside MSP is one of the original MSPs elected in 1999.

  Nicola Sturgeon announced she was separating from her husband Peter Murrell in January

  Announcing her decision to step down, Sturgeon highlighted policies introduced during her time in office such as the Scottish Child Payment and expanded early years education. She also said she remained committed to the campaign for Scottish independence. The former first minister has faced criticism for her record on tackling drugs deaths, closing the attainment gap between school pupils from better off and more deprived backgrounds, and on controversial gender recognition reforms that would have made it easier for transgender people to change their legally recognised sex. Sturgeon told BBC Scotland News she was "proud" of her achievements and would "leave it to others" to criticise her legacy. On gender recognition reforms, she added: "I will never apologise for trying to make life better for one of the most stigmatised, discriminated against sections of our society."

  This video can not be played To play this video you need to enable JavaScript in your browser. Nicola Sturgeon delivers speech as she resigns as first minister

  Sturgeon succeeded Alex Salmond as SNP leader and first minister in 2014. The long-time friends remained close allies until their fallout over her government's mishandling of harassment complaints against him. Salmond died aged 69 while attending a conference in North Macedonia in October 2024. Sturgeon did not attend his funeral or memorial service. She led the SNP to a series of election victories at UK, Scottish and local level. This included a historic landslide in the 2015 general election, where the party won 56 of the 59 seats in Scotland. In 2022, the UK Supreme Court ruled that Holyrood did not have the power to stage another independence referendum - a move blocked by the UK government.

  Sturgeon with the 56 SNP MPs who won seats in 2015

  Sturgeon was succeeded by Humza Yousaf as first minister. He lasted just a year in the role, stepping down last April after a decision to rip up a power-sharing agreement with the Scottish Greens left him facing a vote of no confidence. Yousaf announced in December last year that he is to stand down as an MSP at the 2026 Holyrood election. Following Sturgeon's latest announcement, Yousaf posted on X, external: "I am excited to see what Nicola goes on to do next. "She is one of the most talented politicians of our generation. I am personally grateful for her advice, trust, and friendship over the years. With every good wish Nicola Sturgeon."

  Nicola Sturgeon was succeeded by Humza Yousaf and John Swinney as first minister

  Yousaf was replaced as first minister by Sturgeon's deputy John Swinney, who after a poor showing at July's general election has seen support for SNP stabilise in the polls. Swinney said he was "very sorry" that Sturgeon was stepping down and thanked her for her "extraordinary contribution" to Scottish politics. He added that the former first minister had "many different policy achievements to be proud of in changing the lives of people in Scotland for the better". Sturgeon told BBC Scotland News in December that she was focussed on her constituents after being criticised for speaking just four times in the parliament last year. She has made four contributions in the chamber so far this year, though three were to tell the presiding officer she had a problem with her voting app.

  Scottish Conservative deputy leader Rachael Hamilton said her party wished any departing MSP well "but we cannot forget the deep divisions in our country that Nicola Sturgeon created, fostered and encouraged". She added: "By any objective analysis, her record as first minister is one of failure. Scottish education standards collapsed on her watch and the poverty-related attainment gap, which she promised to eradicate, widened." Anas Sarwar, the Scottish Labour leader, said Sturgeon's announcement marked "the end of an era in Scottish politics". "Whilst I have many disagreements with her, I never doubted her passion for Glasgow and Scotland. I wish her well for the future," he added. Scottish Green co-leader Lorna Slater, who served as a minister in Sturgeon's SNP-Green government, described the former first minister as a "legend". "Scottish politics has been better with her in charge – her careful planning, her good communication and her sense that she really cares about people." Scottish Lib Dem leader Alex Cole-Hamilton said: "The SNP have been in power for too long, and the departure of another big figure is further proof of their decline."
