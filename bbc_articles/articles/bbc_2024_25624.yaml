  What happened to them in Dortmund was a shock, but it shouldn't have been. It's just a continuation of a theme involving a manager who has been singularly unable to achieve even the modest goal of making his team resilient in the face of superior opposition. Too often they go down in flames. Later on Tuesday, Rodgers was asked if he would do anything different in the way of formation. "Not really," he replied. Their next game is away to Atalanta, who beat a mighty Bayer Leverkusen 3-0 in last season's Europa League final and who started their Champions League campaign with a 0-0 draw at home to Arsenal. That one has menace written all over it if Celtic sleep-walk into it in the way they appear to have sleep-walked their way to Dortmund. In the preamble to Tuesday, Rodgers outlined his goals for the night. "I'm not looking for perfection," he said, which was just as well. What he got had a wearying familiarity to it. Pride before a fall and all of that. You'd say he needs to learn lessons about how he sets up his team for these tough assignments in Europe, but those things were said in his first spell, too. History is repeating itself in more ways than one.
