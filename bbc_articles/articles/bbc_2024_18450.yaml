title: Dame Denise Lewis steps down as BBC Sport pundit - BBC News
date: '2024-08-13'
section: England
url: http://www.bbc.co.uk/news/articles/ce8dj446vz2o
content: |-
  Dame Denise Lewis is leaving the BBC after 15 years to become president of UK Athletics.

  Dame Denise Lewis first joined the BBC Sport team in 2009

  Tributes have been paid to Olympic gold medallist Dame Denise Lewis after she announced she was leaving her role as a BBC Sport pundit. West Bromwich-born Lewis will be the new president of UK Athletics. She made the announcement at the close of the athletics coverage at Paris 2024. The 51-year-old, who won heptathlon gold at the 2000 Olympics in Sydney, received a damehood in the King's New Year Honours 2023. Since retiring in 2005, she has worked as a pundit and television presenter and has been a key part of the BBC's athletics coverage since 2009. Anchor Gabby Logan called Lewis a "brilliant person" and pundit Michael Johnson said she was a "legend".

  Lewis was the first British athlete to win Olympic gold in the heptathlon in 2000

  Speaking after the final athletics events, external at The Paris 2024 Olympics live on BBC One on Saturday, Lewis revealed it was her last appearance with the BBC Sport team. "It's a sad farewell to my team, as you know I love working with you guys," she said to her colleagues Logan, Jessica Ennis-Hill and Johnson. "It's time to try and develop and help the sport that's been so amazing to me - I wouldn't be in this position had I not dared to dream," she added. "It's been a journey." Posting a highlight reel to Instagram, external on Monday, the Olympian also thanked production teams, floor managers, runners, camera crews, statisticians and her "glam squad" over the past 15 years. "We've had a hoot," said Lewis, who grew up in Wolverhampton. "Thanks for the memories." "I'll still be watching my favourite sport but from a different seat. Hopefully the next seat will be cushioned," she added. Paying tribute on X, external, Logan described Lewis as a "brilliant colleague, a super human and someone I am proud to call a friend." "It’s not often you get people like @RealDeniseLewis in your life and I am going to miss her on our team," she said. Olympian Johnson, external added: "It’s been an absolute pleasure working with my good friend and legend, @RealDeniseLewis."
