title: 'Blanca Fernandez Ochoa: Winter Olympic medallist reported missing - BBC News'
date: '2019-09-01'
section: Europe
url: http://www.bbc.co.uk/news/world-europe-49541118
content: |-
  Blanca Fernandez Ochoa was last seen driving a black Mercedes in Madrid on 23 August.

  Blanca Fernandez Ochoa, an Olympic bronze medallist, was reported missing on 23 August

  Blanca Fernandez Ochoa, the first Spanish woman to win a medal at the Winter Olympics, has been reported missing.

  The former alpine skier, 56, disappeared more than a week ago, Spain's national police said.

  Officials said on Sunday that a black Mercedes A-Class car that Ms Fernandez was last seen driving has been located in a town near Madrid.

  But police are still working to locate Ms Fernandez herself.

  A public appeal was issued at the request of Ms Fernandez's family, according to Spanish newspaper El Pais.

