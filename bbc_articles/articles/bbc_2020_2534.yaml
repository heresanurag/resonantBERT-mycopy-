title: 'Croydon bus death: Boy, 16, charged over Damani Mauge stabbing - BBC News'
date: '2020-03-17'
section: London
url: http://www.bbc.co.uk/news/uk-england-london-51921300
content: |-
  Damani Mauge, 17, was found with fatal stab wounds on a bus in Croydon, police say.

  Damani Mauge was fatally stabbed while on the number 130 bus

  A 16-year-old boy has been charged with murdering teenager Damani Mauge, who was found with fatal stab wounds on a bus in Croydon.

  The teenager, from Mitcham, was arrested on Sunday and is due to appear at Croydon Magistrates' Court.

  He has also been charged with attempted robbery and possession of an offensive weapon in a public place.

  Police were called to a stabbing on a 130 bus in Whitehorse Lane in south London at about 20:30 GMT on 8 March.

  Damani, 17, was found with fatal stab wounds and was pronounced dead at the scene almost 40 minutes later.

  A post-mortem examination found the cause of death was a stab wound to the chest, police said.

  The attack happened on Whitehorse Lane in South Norwood

