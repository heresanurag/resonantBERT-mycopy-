title: 'Pakistan v England: Brydon Carse helped through ban by Test dream - BBC Sport'
date: '2024-10-12'
section: Cricket
url: http://www.bbc.co.uk/sport/cricket/articles/cx2l11pgv92o
content: |-
  Pace bowler Brydon Carse says the idea of playing Test cricket for England helped him through a three-month ban for historic gambling offences.

  Brydon Carse became the third pace bowler in four months to make a Test debut for England

  Pace bowler Brydon Carse said the idea of playing Test cricket for England helped him through a three-month ban for historic gambling offences. The 29-year-old made his Test debut in the astonishing win over Pakistan in Multan, little more than a month after completing his suspension. Carse was banned in May for placing 303 bets between 2017 and 2019, though none on matches he played in. Cricket’s betting integrity rules stipulate players are not allowed to gamble on matches anywhere in the world. Asked if the prospect of playing for England got him through some "tough moments" during the ban, Carse said: "Yeah, definitely."

  Carse was permitted to train during his ban and kept his two-year England central contract. Following the retirement of James Anderson, he may have been in line to make his Test debut in the home summer had he not been suspended. Instead, he returned for the white-ball series against Australia in September, then came into the Test side for the record-breaking first-Test defeat of Pakistan. Carse took four wickets in the match, as well as having another chalked off by DRS and a catch dropped. He was asked to bowl sustained spells of bouncers across 38 overs in extreme heat and credited fitness work done during his time away from the game. "I had some time off to work on a few things that I wanted to and then maybe improve my fitness in certain areas," he said. "I've come back refreshed and just wanting to do well and play as much as I can for England. "The group of players that we are playing with, I've got some close relationships. I just thoroughly enjoyed the occasion." Victory in the second Test, which starts on Tuesday, also in Multan, will see England win the three-match series. The tourists may be able to call on captain Ben Stokes, who has missed their past four matches because of a hamstring injury, but stepped up his return by training during the first Test. Though Saturday was designated as a rest day, Stokes did some gym work, with the whole squad having the option of a training session on Sunday. Pakistan are due to name their squad for the second Test after revamping their selection panel in the aftermath of the first-Test humbling. Former captain Azhar Ali, pace bowler Aaqib Javed and team analyst Hassan Cheema have been added to the committee. The most eye-catching addition is Aleem Dar, who recently stood down from the elite panel of umpires after standing in 453 internationals across a 25-year career. The 56-year-old also played 17 first-class matches as a spin-bowling all-rounder.
