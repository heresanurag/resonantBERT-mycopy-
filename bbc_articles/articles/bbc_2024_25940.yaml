title: 'Victoria Taylor: Body found in search for missing mother - BBC News'
date: '2024-10-22'
section: England
url: http://www.bbc.co.uk/news/articles/czxd4nlwwxvo
content: |-
  Police searching for Victoria Taylor say they have found a body in the River Derwent.

  Victoria Taylor had been missing since 30 September

  A body has been found in the search for missing mother Victoria Taylor in North Yorkshire. The 34-year-old, who has a young daughter and a partner, went missing from her home in Malton on 30 September, with her disappearance prompting a major police search. North Yorkshire Police said a body was recovered from the River Derwent at about 11:45 BST on Tuesday. Formal identification was yet to take place, officers said, but Ms Taylor's family had been informed and were being supported by specialist officers.

  Speaking at a press conference, Assistant Chief Constable Wayne Fox said the family were "understandably distressed" by the news. "Victoria’s family have again asked us to express their thanks to all of those who have supported police and other emergency services in our efforts to locate Victoria,” he said. CCTV footage had showed the care home nurse heading towards a playground close to the river on the day she vanished, with items belonging to her found at the location. Police said the body had been recovered by underwater search teams, close to where Ms Taylor's belongings were discovered.

  Assistant Chief Constable Wayne Fox passed on thanks from Ms Taylor's family to those who supported emergency services during the search

  River searches had taken place since Ms Taylor was reported missing on 1 October, including the use of divers and specialist sonar equipment. Just over a week after her disappearance, police said there was a "significant possibility" she had entered the river. In a statement released via police a week ago, Ms Taylor's sisters Emma and Heidi said: "The local community is amazing, from putting up posters to the daily walks to search for Vixx. "We would like to thank the special people, you know who you are." They added: "The wider community on the Facebook page with over 10,000 people sharing Vixx's information and sending support has given us comfort."

  Ms Taylor, originally from Huddersfield, was reported missing on 1 October

  A number of tributes have been paid on the page to Ms Taylor, who is originally from Huddersfield, West Yorkshire. A post from the Derwent Arms pub in Malton reads: "With the sad news to hit the local community within the last hour we would like to extend our deepest thoughts and condolences to the family and friends of Vixx - Victoria Taylor. "We at the Derwent Arms have supported the local community during the search for her and will continue to support people where possible."
