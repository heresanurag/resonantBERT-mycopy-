content: |-
  Luke Humphries adds the World Matchplay title to his World Championship crown with a thrilling 18-15 defeat of Michael van Gerwen.

  Luke Humphries has won five majors in the space of nine months

  Luke Humphries added the World Matchplay title to his World Championship crown with a thrilling 18-15 defeat of Michael van Gerwen. The 29-year-old Englishman stayed composed to see off a fightback from his Dutch rival at Blackpool’s Winter Gardens. Humphries sealed victory by hitting double 20 twice in a 100 checkout as Van Gerwen threatened to reel him in. He is only the fourth man to win both events in the same year after Van Gerwen, Peter Wright and Phil Taylor. "Honestly, I've felt more emotion than when I won the worlds. I am going to watch back that double tops 100 times tonight. I feel so blessed to have my name on that trophy," said Humphries after clinching a fifth major title in the space of nine months. "I am absolutely over the moon. I am emotional, it really means the world to me." World number one Humphries continued his record of ton-plus averages throughout the tournament as he clocked 100.94, including 12 180s, to clinch a £200,000 payday.

  Despite losing their past seven encounters, three-time champion Van Gerwen had vowed to "teach a lesson" to his opponent. Humphries, in his first World Matchplay final, averaged more than 104 - 11 better than his opponent - in the opening five legs but still went to the first break 3-2 down. He made his scoring power count with four consecutive legs to take control of the match and when Van Gerwen broke his throw, Humphries immediately hit back with a superb 141 checkout to take the 12th leg. The Dutchman upped his game, closed on the averages and finishes of 106 and 110 saw him level the contest at 12-12. Humphries fought back and took out 131 to go 16-13 ahead before Van Gerwen hit 160 and 108 checkouts to cut the deficit, but he missed four darts at the double when poised to level. He had three more chances again to take the next leg but Humphries finished in style with double double tops to clinch victory. "I made mistakes and I still feel I was the better player. Luke is a fantastic player and we know what he is capable of. I think I deserved a little bit more today," said world number two Van Gerwen.
