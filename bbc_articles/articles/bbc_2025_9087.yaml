title: Trump's critics and supporters unite against Qatar plane deal - BBC News
date: '2025-05-15'
section: World
url: http://www.bbc.co.uk/news/articles/ckg4zk22n9wo
content: |-
  The White House has doubled down on the proposed deal which has been criticised by some of the president's top supporters.

  US President Donald Trump and Qatar's Emir Tamim bin Hamad Al Thani at a signing ceremony in Doha on Wednesday

  In his eagerness to accept a plane from Qatar, Donald Trump has achieved a remarkable feat, uniting many partisans across America's bitter political divide. The problem for the White House is that unity is happening in opposition to it. Predictably, Trump's opponents in the Democratic Party slammed the president after he indicated he would accept a luxury jet from the Qatari royal family. More noteworthy – and potentially more troubling for the president – is that some of his strongest supporters also have serious reservations about the deal, even as it's yet to be finalised. Maga influencers have described the move as a "bribe", grift, or an example of the high-level corruption that Trump himself has consistently promised to root out. The Qatari royal family plans to give the luxury Boeing 747-8, estimated to be worth $400m (£300m), to the US Department of Defence to be used as part of a fleet of planes dubbed Air Force One – the president's official mode of air travel. The current fleet includes two 747-200 jets which have been in use since 1990, along with several smaller and somewhat secretive 757s, external. The White House says that the new plane – which could require years and millions of dollars to refit and upgrade – will be transferred to Trump's presidential library at the end of his term.

  The Democratic National Committee flew its own aircraft over Trump's Florida resort on Wednesday, towing a mocking banner reading "Qatar-a-Lago"

  After the news broke on Sunday, the backlash was fierce and immediate. "I think the technical term is 'skeezy'," deadpanned conservative Daily Wire commentator Ben Shapiro on his podcast. "Qatar is not allegedly giving President Trump a $400m jet out of the goodness of their sweet little hearts," he said. "They try to stuff money into pockets in totally bipartisan fashion." He and others pointed to allegations that Qatar has funnelled money into terrorist groups – allegations the country has denied – and called Qataris "the world's largest proponents of terrorism on an international scale." Laura Loomer, the conspiracy-spreading social media influencer who agitates for sackings of top White House officials deemed insufficiently loyal, interrupted her steady stream of pro-Trump messaging to criticise the move. Although she said she still supports the president, she called the plane deal "a stain" and posted a cartoon of the Trojan Horse, redrawn as a plane and filled with armed Islamist militants.

