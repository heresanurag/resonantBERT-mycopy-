content: |-
  The show, held over nine days, is in remembrance of those who lost their lives in both world wars.

  Remembrance display to light up Tower of London

  The historic White Tower will be transformed with moving images as part of an immersive experience

  The Tower of London is to be illuminated with a light show in remembrance of those who lost their lives in World War One and Two. People will be invited inside the walls of the famous fortress next month to see the historic White Tower transformed with moving images reflecting on the conflicts. Falling poppy petals, silhouettes of soldiers and the World War One military medal "For Bravery in the Field" will be among the artwork lighting up the Tower. The display, from 8-16 November, will also be accompanied by music and poetry recordings.

  The Luxmuralis sound and light installation is called Poppy Fields at the Tower of London

  Ticket holders to the after-dusk event will also be granted special access to see the Crown Jewels without the usual crowds, and learn about their removal from the Tower during both world wars. Historic Royal Palaces, the independent charity that cares for the Tower of London, said: "Poppy Fields at the Tower will create space for visitors to remember those who lost their lives in those conflicts, as well as all those who served, and will also look forward, exploring the collective desire for peace."

  In 2014, the Tower of London hosted an art installation that saw the moat filled with thousands of ceramic poppies to mark the centenary of the start of World War One
