title: Double-decker London bus crashes into front garden - BBC News
date: '2018-12-27'
section: London
url: http://www.bbc.co.uk/news/uk-england-london-46692049
content: |-
  The 118 service to Brixton ploughed through a fence and hit the front of a house in south London.

  The 118 service to Brixton crashed into a front garden

  One person was taken to hospital after a London double-decker bus crashed into the front garden of a house.

  The 118 Brixton service ploughed through a fence and hit the home in Streatham Vale, south London, shortly before 21:00 GMT on Boxing Day.

  Three people were treated at the scene for minor injuries. The Met Police said no arrests had been made.

  Streatham Vale was closed in both directions while the emergency services responded to the crash.

  Transport for London (TfL) has been approached for comment.

  Photos from the scene also appear to show damage to cars on the street.

  A damaged car could also be seen in photos from the scene

  A spokeswoman for the London Ambulance Service said paramedics attended at 20:55 GMT.

  She said: "We were called to reports of a bus colliding with a car and a house and we sent numerous resources.

  "Three people were treated at the scene for minor injuries - one person was taken to hospital by ambulance."

