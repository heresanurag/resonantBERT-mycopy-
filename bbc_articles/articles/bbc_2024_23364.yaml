title: 'Just Stop Oil: Protesters throw soup on Van Gogh paintings - BBC News'
date: '2024-09-27'
section: London
url: http://www.bbc.co.uk/news/articles/c243v5m0r0lo
content: |-
  Just Stop Oil supporters have thrown soup over two Van Gogh paintings in central London.

  The soup-throwing attack came on the same day two women, pictured here, were jailed for criminal damage over a similar act of protest at the National Gallery

  Just Stop Oil supporters have thrown soup over two Vincent van Gogh paintings, hours after two activists were given jail sentences for targeting one of the same works of art. Three protesters threw an orange-coloured soup at Sunflowers 1888 and Sunflowers 1889 in the Poets and Lovers exhibition at the National Gallery in central London. They have been arrested on suspicion of causing criminal damage. Earlier, Phoebe Plummer, 23, was given a two-year jail term, while Anna Holland, 22, got 20 months, for throwing soup over Sunflowers 1888 in October 2022. The National Gallery said the two paintings targeted on Friday had been removed for examination and were found to be undamaged.

  As the latest activists – two women and a man - threw soup over the two paintings, onlookers could be heard shouting "no" and "don't do it". In a video posted on X by JSO, the activists can be heard telling an angry crowd: "There are people in prison for demanding an end to new oil and gas, something which is now government policy after sustained, disruptive actions, countless headlines and the resulting political pressure. "Future generations will regard these prisoners of conscience to be on the right side of history." A spokesperson for the gallery said three people entered Room 6 of the exhibition just after 14:30 BST and threw a soup-like substance over two works. The Metropolitan Police said three people had been held on suspicion of causing criminal damage and its inquiries were continuing. It is the third time in recent years an artwork at the National Gallery has been selected as a target for protest action. In July 2022, two activists glued themselves to John Constable's The Hay Wain.
