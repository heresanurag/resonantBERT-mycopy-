title: Gold toilet Blenheim Palace theft accused 'searched for news' - BBC News
date: '2025-02-27'
section: England
url: http://www.bbc.co.uk/news/articles/c2ljjkzdl20o
content: |-
  Three men are standing trial over the theft of the gold toilet which had been part of an exhibition.

  The solid gold toilet disappeared from Blenheim Palace in 2019

  A man accused of the theft of a £4.8m golden toilet searched for online news articles related to the crime in the days following the heist, a court has heard. The artwork, called America, was taken from from Blenheim Palace in Oxfordshire in the early hours of 14 September 2019, two days after it went on display. Michael Jones, 39, from Oxford, denies one count of burglary. Fred Doe, 36, from Windsor and 41-year-old Bora Guccuk, from west London, both deny conspiring to transfer criminal property. The trial at Oxford Crown Court heard police found searches in the internet history of the mobile phone of Mr Jones after he was arrested.

  This video can not be played To play this video you need to enable JavaScript in your browser. CCTV of theft of £4.8m gold toilet shown in court on Tuesday

  Headlines that read "Maurizio Cattelan speaks out after Blenheim's £4.8m gold toilet stolen" and "Blenheim Palace reopens after gold toilet stolen in burglary" were also among the stories that were searched on his phone on 16 September. A fourth man, James Sheen, 40, from Wellingborough in Northamptonshire, has previously pleaded guilty to burglary. The court heard that hundreds of fragments of gold were found in and on his clothing at Sheen's home in Oxford, days after the robbery. Jurors were told that some of the fragments, when analysed, were found to be "indistinguishable from the gold from which the America golden toilet had been made". The court also heard that DNA, "likely to have been left by Mr Sheen" was found on a sledge hammer left in the toilet cubicle at the stately home.

  The toilet was part of an art exhibition at Blenheim Palace

  The 18-carat gold toilet was part of an exhibition by Italian conceptual artist Maurizio Cattelan. It weighed 98kg and was insured for $6m (£4.8m). Gold prices at the time would have seen the gold alone worth £2.8m, the court heard. The palace is a Unesco World Heritage Site and was the birthplace of Sir Winston Churchill.

