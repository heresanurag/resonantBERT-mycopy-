id: bbc_2018_3949
title: 'Sergei Lavrov: ''No evidence'' for Syria chemical attack - BBC News'
date: '2018-04-17'
section: General
url: http://www.bbc.co.uk/news/world-middle-east-43784550
content: |-
  Russia's foreign minister says the only evidence of a chemical attack came from the media.

  In an interview with BBC's HARDtalk, Russia's foreign minister Sergei Lavrov says there is no evidence for a chemical attack in Syria.

  You can see the interview in full on Hardtalk on Monday 16 and Tuesday 17 April on BBC World News and the BBC News Channel and after on BBCiPlayer (UK only).
