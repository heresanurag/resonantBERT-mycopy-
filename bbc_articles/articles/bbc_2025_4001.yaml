  The study at The Christie in Manchester was set up after Sarah Harding's death, aged 39.

  Sarah Harding died from breast cancer in 2021 but wanted to inspire studies into earlier diagnoses

  A breast cancer study created in memory of Girls Aloud singer Sarah Harding has already helped identify more than 80 young women who are at risk of developing breast cancer. The Breast Cancer Risk Assessment in Young Women (BCAN-RAY) study was set up in May 2023 inspired by the singer's desire to find new ways of spotting the disease earlier. Harding, of Stockport, died in 2021 at the age of 39. The second phase of the study involves setting up the Sarah Harding Young Women's Breast Cancer Fellowship, which will include a research lab dedicated to examining the factors which put younger women at risk.

  Harding, pictured here with Girls Aloud, revealed in August 2020 that she had been diagnosed with the disease, which had spread to other parts of her body

  BCAN-RAY, which is funded by The Christie Charity, Cancer Research UK, and The Shine Bright Foundation, is one of the world's first research programmes to identify breast cancer risks in younger women without a family history of the disease. Led by Dr Sacha Howell, who was Harding's consultant while she was receiving treatment at The Christie, the study focuses on exploring risk factors and creating personalised early screening options for women as young as 30. He said: "Breast cancer is the biggest killer of women aged 35-50 in the UK but if you pick it up early enough you don't die from it."

  "This research isn't about prolonging people's lives for a year or two. It's about curing people so they can live full lives with their loved ones," he said. Dr Howell said Harding's wish was that "no other young woman should experience the shock and devastation of a breast cancer diagnosis" when they had no reason to think they were at risk. "Eventually we would like to see the risk prediction for breast cancer in young women rolled out across the UK so we can reduce the number of deaths and improve lives," he said. "The fellowship will bring us a step closer to achieving Sarah's goal." Currently, breast screening in the UK starts at age 50, with women invited for routine checks every three years. The BCAN-RAY study identifies younger women at risk and provides them with early intervention. The study, which includes questionnaires, genetic testing and low-dose mammograms, has already recruited 500 women aged 30 to 39, with another 500 to be recruited. Of the first 500, 88 have been identified as being at increased risk, with 58 of those having phone consultations to discuss ways to reduce their risk, such as through diet, exercise, and medication.
