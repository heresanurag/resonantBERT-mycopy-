content: |-
  The Pope will visit Indonesia, Papua New Guinea, Timor-Leste and Singapore over 12 days.

  • None The Pope is welcomed at the airport as he arrives in Indonesia
  • None Before he landed, he spoke to journalists aboard the flight bound for the Indonesian capital
  • None Pope Francis waves upon his arrival at the Jakarta International Airport
