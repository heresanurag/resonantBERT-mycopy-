title: Dave Grohl fathers child outside his marriage - BBC News
date: '2024-09-10'
section: Culture
url: http://www.bbc.co.uk/news/articles/czdp9y7ree5o
content: |-
  The Foo Fighters frontman posted an announcement on his Instagram page but has turned off comments.

  Dave Grohl posted the announcement on his Instagram page but has turned off comments

  Foo Fighters frontman Dave Grohl has announced he has become the father to a baby girl born "outside of my marriage". In an Instagram post on Tuesday, the 55-year-old said he planned to be a "loving and supportive parent" to his new daughter. Grohl has three daughters with his wife Jordyn Blum whom he married in 2003. In his social media post, Grohl said he loved his family and was doing "everything I can to regain their trust and earn their forgiveness".

  "We're grateful for your consideration toward all the children involved, as we move forward together. Dave." The post contains no details about who the mother of his new child is.

  Dave Grohl and Jordyn Blum recently attended the Wimbledon Tennis Championships in July

  Grohl has turned off the comments on his Instagram post. His wife Blum worked as a TV producer and model and the two are parents to daughters Violet Maye, 18, Harper Willow, 15, and Ophelia Saint, 10.

  He was previously married to photographer Jennifer Leigh Youngblood from 1994 until 1997. They divorced after he admitted to being unfaithful during the marriage. Grohl played drums in the pioneering grunge band Nirvana from 1990 until 1994 when lead singer Kurt Cobain died aged 27. He went on to form Foo Fighters and has scored a number of chart-topping albums including their most recent effort, 2023's But Here We Are.
