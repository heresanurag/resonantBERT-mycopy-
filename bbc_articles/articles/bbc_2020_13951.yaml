  And some have expressed concern that the UK approved the Pfizer/BioNTech vaccine too quickly.

  Dr Anthony Fauci, who is leading the response to the pandemic in the US, told Fox News that the US Food and Drug Administration was being more careful. and suggested the UK's process had been "rushed".

  "The way the FDA is, our FDA is doing it, is the correct way," Dr Fauci said. "We really scrutinize the data very carefully to guarantee to the American public that this is a safe and efficacious vaccine."

  This video can not be played To play this video you need to enable JavaScript in your browser. Dr Fauci told the BBC: "I have a great deal of confidence in what the UK does both scientifically and from a regulator standpoint"

  But he later rowed back on his claims, saying he had a "great deal of confidence" in the UK's scientific and regulatory standards and he had not meant to "imply any sloppiness even though it came out that way".

  "Our process is one that takes more time than it takes in the UK," he told the BBC. "And that's just the reality."

  Both the MHRA and the EU have rejected Health Secretary Matt Hancock's claim that Brexit allowed the UK to "speed up" doing "all the same safety checks and the same processes" as the EU.

  The MHRA's chief executive, Dr June Raine, said on Wednesday that "we have been able to authorise the supply of this vaccine using provisions under European law, which exist until 1 January".
