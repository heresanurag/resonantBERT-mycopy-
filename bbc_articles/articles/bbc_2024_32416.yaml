title: Dick Van Dyke stars in moving Coldplay video as he turns 99 - BBC News
date: '2024-12-06'
section: Culture
url: http://www.bbc.co.uk/news/articles/c3vrl93553qo
content: |-
  The actor recreates dance moves from across his career, and reflects on old age in a touching video.

  Dick Van Dyke stars in Coldplay video as he turns 99

  The star briefly recreates Mary Poppins' "Penguin Dance" during the video

  Mary Poppins actor Dick Van Dyke has taken a starring role in Coldplay's latest music video, as he prepares to celebrate his 99th birthday. Filmed in his beachside home in Malibu, external, the moving video sees the star reminisce about his life and reflect on old age. "I'm acutely aware that I could go any day now," he says, "but I don't know why it doesn't concern me. I'm not afraid of it. I have the feeling that I'm gonna be alright." Set to the ballad All My Love, the video was co-directed by Mary Wigmore and Oscar-winning filmmaker Spike Jonze, whose movies include Being John Malkovich, Her and Adaptation.

