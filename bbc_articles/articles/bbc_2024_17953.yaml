title: Blenheim Palace set to close to public to host European leaders - BBC News
date: '2024-07-09'
section: Oxford
url: http://www.bbc.co.uk/news/articles/cx72q875l5yo
content: |-
  About 50 leaders from across Europe are due to attend a meeting hosted by Prime Minister Sir Keir Starmer.

  The meeting at Blenheim Palace on 18 July will bring together about 50 leaders from across Europe

  Blenheim Palace is set to shut to the public for six days to host a meeting of leaders from across Europe. The European Political Community (EPC) meeting is being held at the estate in Woodstock, Oxfordshire, on 18 July. Ahead of the meeting the palace, its gardens and parkland will be closed to the public from 15-20 July. Footpaths will shut between 16-19 July. About 50 leaders from across Europe are expected at the gathering hosted by Prime Minister Sir Keir Starmer.

  Police drones will be used in the area to enforce the restricted airspace over Blenheim Palace and London Oxford Airport

  Airspace restrictions will also be in place over Blenheim Palace and London Oxford Airport due to the meeting. Thames Valley Police said the restrictions come into force for aircraft and drones from 14 -18 July over and around the palace and the airport, except for emergencies. The force said: "We will be using police drones and support from the National Police Air Service in the area to enforce the restricted airspace."

  The EPC first met in October 2022. The event at the birthplace of Winston Churchill will be its fourth meeting The palace, state rooms, park and gardens at the ticketed attraction are normally open to the public daily. Blenheim Palace is the residence of the Duke of Marlborough and was designated as a UNESCO World Heritage Site in 1987.
