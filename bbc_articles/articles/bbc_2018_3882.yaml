title: 'Superintendent: Why teachers carry guns in Fayetteville - BBC News'
date: '2018-04-03'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-43619502
content: |-
  Jeff Harvey, Fayetteville Superintendent, explained to BBC Radio 5 live why his school has adopted the ‘Guardian Program’ - a programme that allows select teachers to carry guns.

  A school superintendent in Texas has told BBC Radio 5 live why some teachers carry guns in his school.

  Jeff Harvey runs Fayetteville School, which joined the ‘Guardian Program’ in the past few months, and is one of at least 170 schools in the state taking part.

  The school is 18 miles from the nearest police station.
