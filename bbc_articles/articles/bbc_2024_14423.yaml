content: |-
  Megan Boni's 'Looking for a man in finance' TikTok has been viewed millions of times.

  'I'm not actually looking for a man in finance'

  Megan's viral TikTok has been remixed by DJs including David Guetta, who's releasing a version on Friday

  "I'm looking for a man in finance..." If your brain added "with a trust fund. Six-five. Blue eyes", congratulations. You're one of the millions of who's been earwormed by Megan Boni. That's the viral song sample poking fun at the concept of an "ideal man" she recorded back in April that's taken over TikTok in the weeks since. Megan, better known as Girl on Couch shared the video with the caption: "Did I just write the song of the summer?" Forty million views later, it's inspired hundreds of remixes and parodies, with high-profile names including Billie Eilish's brother Finneas making their own videos based around the 19-second clip. DJs, brands and even Singapore's Ministry of Defence, external got in on the trend. Now Megan's hoping to storm the charts with a single she's recorded alongside superstar DJ David Guetta. But despite what she says in her TikTok, tells BBC Newsbeat she's not actually looking for a tall banker with a deep wallet. "I doubt we would work", she says.

