  The 27-year-old New Yorker tells Newsbeat the idea for the meme came out of dating app fatigue. Bored of complaining about being single, she started jotting down some lyric ideas in her notes app. "Dating apps are making dating so much more impossible because they're really raising everyone's standards," Megan says. "So I was just trying to make fun of girls like myself who complain about being single but then have this laundry list of impossible needs." Some people complained that the track objectifies men, but Megan brushes off the accusation. "I think it's so funny when these men are like 'If a guy wrote a song like this about a woman...' "Guys write songs about women all the time," she says. "It is a joke. I didn't think a man with these criteria existed."

  While Megan says she "couldn't be less interested in dating", she also says she's not too bothered about launching a music career. Universal Music Group - the label behind some of the world's biggest stars including Taylor Swift, Harry Styles and Ariana Grande - has offered her a publishing deal. It means she can make some money off royalties from the song, which she says hasn't so far been as profitable as some people assume. "I have made money from it, just not through the uses on TikTok," she says, which anyone can feature for free. Megan now has more than a quarter of a million followers on the app and tells Newsbeat after she posted the original video, "in the span of a week, my life was flipped upside down". She says she was also offered a deal to make a full album but decided to turn it down. "I was like: 'what makes you think I can write a song? What makes you think I could write an album?'" she says. "I don't fit. I'm just not interested in writing music."

