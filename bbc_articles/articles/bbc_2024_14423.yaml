  Instead, she's happy to just let the song have its moment online. "The sequel's never as good as the original," she says. "There's no way that I come out with another two-second song and it blows up as big so I'm not too stressed about doing that. "So for the summer, I'll ride the wave of the song and I'll party." It's working out pretty well so far for Megan, who recently flew to Las Vegas to perform the track alongside David Guetta and US dance duo The Chainsmokers. "I keep thinking I can't get any more excited," she says. "And then new stuff just keeps happening."
  • None Halsey 'lucky to be alive' after health struggles Once the hype dies down, she says, acting and comedy are what she really hopes to pursue. "It was never my dream to be a musician," she says. "I'm so lucky that this happened but I'm really trying to use it to do something that I love. "My dream would be to be on Saturday Night Live. That's the goal." She admits she feels a "little bit bad" about her overnight success though. "Some artists try to get a record deal their whole lives and I was just sitting on my couch," she says. "But that's how it happens, it's how the internet works. It's wild."

