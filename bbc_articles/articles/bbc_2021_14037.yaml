title: Protesters in Calais call for migrant protection - BBC News
date: '2021-11-25'
section: General
url: http://www.bbc.co.uk/news/world-59412309
content: |-
  A vigil took place at Calais calling for the protection of migrants after the tragedy in the Channel.

  A small protest and vigil took place at Calais port, with members from organisations calling for the protection of migrants taking part.

  One banner read: "30 years of announcements, of inhuman and degrading treatment."

  Human rights groups have long been calling on France and the UK to do more to protect the lives of migrants and refugees.

  The group laid candles at the port, as a mark of respect for the migrants who drowned in the Channel after their boat sank.
