  Comedian Julian Clary described Blair as a "showbiz trooper if ever there was", while broadcaster Piers Morgan said: "RIP Lionel Blair, 92. A wonderful all-round entertainer & lovely man. Sad news."

  Singer and presenter Michael Ball remembered Blair as a "funny, kind, generous, compassionate and gifted man". Entertainer Bonnie Langford added: "Dear Lionel. Privileged to have been your dance partner."

