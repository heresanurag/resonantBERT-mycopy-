  At the Gold Beach ceremony, President Macron honoured the bravery and sacrifice of those who fought. "France will never forget the British troops who landed on D-Day and all their brothers-in-arms," he said. "That faith in freedom which you have never lost, that constant selflessness and devotion both guide us and serve as a duty to us." Mr Macron awarded Légion d'Honneur medals to veterans including Christian Lamb, now 103, who spent the war as an officer in the Women's Royal Naval Service. In 1944, she helped plan the D-Day landings from Churchill's secret war rooms in London.

  "You were one of the heroes in the shadows," the French president told her. Other veterans present included 99-year-old Joe Mines, who landed on Gold Beach 80 years ago. In words read by actor Martin Freeman, Mr Mines said he had come back "to pay my respect to those who didn't make it". Roy Hayward, now 99, took part in the landings as a trooper in the Sherwood Rangers and was badly wounded in the assault. "The tank was hit and I was so badly damaged they had to amputate both legs below the knee," he told the BBC. "I always consider myself one of the lucky ones that survived, because so many of us didn’t." Also taking part in the day of tributes were President Volodymyr Zelensky of Ukraine, and German Chancellor Olaf Scholz. No Russian official was invited.

  Actor Tom Hanks and director Steven Spielberg were seen in Normandy

  Meanwhile, American actor Tom Hanks and film director Steven Spielberg joined the commemorations in Normandy. Their 1998 film Saving Private Ryan depicted the US landings on Omaha Beach in its famed opening battle scene. The film is being shown in around 300 French cinemas on Thursday to mark D-Day.
