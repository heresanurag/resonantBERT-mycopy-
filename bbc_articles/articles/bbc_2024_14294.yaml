  On 6 June 1944, tens of thousands of soldiers landed on five beaches in Normandy in northern France. The landings were the start of the campaign to liberate Nazi-occupied north-western Europe. Five years ago, 225 British veterans travelled to Normandy for commemorations. This year, there were 23, including some centenarians. One US Navy veteran travelling to France, Robert "Al" Persichitti from Rochester, New York, died on his way to the event, a veteran organisation has confirmed. He was airlifted to a hospital in Germany on 30 May after suffering a medical emergency aboard a ship heading to Europe. He died the following day, aged 102.

  Thursday's commemorations began early in the day with a military piper at Gold Beach in Arromanches, who played a lament at sea at 07:26, marking the exact moment when the invasion began. That heralded a series of re-enactments, military flyovers and memorial services in several locations. Those present at Thursday's events also included US President Joe Biden and Canadian Prime Minister Justin Trudeau - the leaders of the other main powers involved in the landings. Prince William was at the Canadian commemorative ceremony at Juno Beach, where he thanked Canadian veterans for their "extraordinary acts of bravery and sacrifice". "We continue to honour every Canadian, who gave so much, every Canadian family who lost a loved one," he said. He ended his speech by saying in French: "Thank you for our freedom, and thank you for your service." Mr Trudeau also paid tribute, saying: "We must all continue to stand for democracy day in day out, we owe it for future generations." Prince William sat alongside world leaders at the final event of the commemorations, the international memorial ceremony at Omaha Beach. William spoke to President Biden, French President Emmanuel Macron and Ukrainian President Volodymyr Zelensky ahead of the event. Mr Sunak did not attend the Omaha Beach ceremony, but UK Foreign Secretary David Cameron and Mr Starmer were both present. During the event, President Biden said that what happened 80 years ago in Normandy did not absolve modern generations from doing what had to be done today. "Democracy is never guaranteed," he said. It had to be preserved and fought for, he added. Mr Biden said the struggle of Ukrainians in the face of Russian aggression captured the spirit of D-Day. He described the conflict as being part of an unending struggle between dictatorship and freedom.

