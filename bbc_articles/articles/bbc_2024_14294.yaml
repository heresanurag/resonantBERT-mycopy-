title: 'D-Day: King and world leaders attend emotional D-Day events - BBC News'
date: '2024-06-07'
section: UK
url: http://www.bbc.co.uk/news/articles/cn44ed7yelzo
content: |-
  The King and Prince of Wales both made speeches, praising the "bravery and sacrifice" of those who "served at that critical time".

  • None The Prince of Wales attended the Canadian commemorative ceremony
  • None A lone piper marked the exact time of the landings 80 years ago
  • None Prince William joined world leaders at the final event on Omaha beach Slide 1 of 3 , Prince William meeting a D-Day veteran , The Prince of Wales attended the Canadian commemorative ceremony

  King Charles and the Prince of Wales joined world leaders and veterans at a series of events to mark the 80th anniversary of the D-Day landings. Both royals made speeches in France on Thursday, praising the "bravery and sacrifice" of those who "served at that critical time". The King laid a wreath at the British Normandy Memorial in Ver-sur-Mer, near Gold Beach, with a note attached touching on the sacrifices made on D-Day. Later in the day, Prince William joined heads of state at Omaha Beach in Saint-Laurent-sur-Mer for the final event of the two-day commemorations. In a speech at the British war memorial in France, the King said the lesson to learn was that free nations must stand together to oppose tyranny. "Our obligation to remember them, what they stood for, and what they achieved for us all, can never diminish," the King told the delegation at a sombre and emotional commemoration. UK Prime Minister Rishi Sunak and Labour leader Keir Starmer attended the same ceremony as the King, in what may be one of few remaining anniversaries that D-Day veterans will attend.

