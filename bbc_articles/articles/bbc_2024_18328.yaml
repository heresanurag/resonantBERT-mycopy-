title: 'Newspaper headlines: ''Merci, Paris!'' and ''UK has lost respect for police''
  - BBC News'
date: '2024-08-12'
section: The Papers
url: http://www.bbc.co.uk/news/articles/c23lvxnrppdo
content: |-
  The stories leading the papers on Monday include the Olympic closing ceremony in Paris and comments form the home secretary.

  Ms Cooper travelled to Southport following the attack to pay tribute to the victims

  The Times reports that the government is planning to give councils the power to compulsorily - and cheaply - purchase what was previously greenbelt land, external to help fulfil its pledge to build 1.5 million homes by 2030. Caps would be introduced to stop landowners making too much profit from selling off land that had been ineligible for development. The paper says campaign groups are likely to mount fierce opposition to the proposals, though planners are arguing it may be the only way some councils can meet their new housing targets. The home secretary tells the Daily Telegraph she believes, in the wake of the recent unrest, that Britain has lost its respect for the police. Yvette Cooper says a soft approach to justice has led too many people to think that crime has no consequences, external. She writes in the paper that she's not prepared to tolerate what she calls the brazen abuse and contempt which a minority have felt able to show for "our" men and women in uniform. Action has to be taken, she argues, to restore respect for police and the law.

