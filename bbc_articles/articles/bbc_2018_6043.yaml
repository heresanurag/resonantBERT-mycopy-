title: 'Brazil fire: Sao Paulo tower block collapses - BBC News'
date: '2018-05-01'
section: General
url: http://www.bbc.co.uk/news/world-latin-america-43959571
content: |-
  The 26-storey building collapsed 90 minutes after catching fire, killing at least one person.

  At least one person has died after a 26-storey building in Brazil's largest city collapsed 90 minutes after catching fire.

  The high-rise had been occupied by squatters and firefighters fear more people may have been trapped inside.
