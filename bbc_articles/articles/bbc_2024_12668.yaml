title: Key oil project must count full climate impact - court - BBC News
date: '2024-06-20'
section: Climate
url: http://www.bbc.co.uk/news/articles/cxwwzmn12g9o
content: |-
  Supreme Court has ruled Surrey Council should have considered the climate change impacts of new oil wells.

  Sarah Finch (centre) began her legal fight against Surrey County Council five years ago

  The Supreme Court has ruled a local council should have considered the full climate impact of burning oil from new wells - a landmark decision which could put future UK oil and gas projects in question. Under planning law the assumption has always been that only the impacts from constructing the wells and not the use of the final oil products should be considered. The case brought against Surrey County Council by Sarah Finch, on behalf of campaigners could threaten new UK fossil fuels projects. The council said it believed at the time it had followed planning law.

  The Supreme Court judges did not rule that Surrey County Council should reject the proposal for new oil wells but that it should have considered the downstream emissions. While this precedent for taking emissions from products like oil into account does not stop new drilling it is something companies will have to consider when looking at new projects. “I am absolutely over the moon to have won this important case," Sarah Finch told supporters. Today’s judgement relates to the Horse Hill oil well in Surrey. The site was given planning permission to expand its operations in 2019, a decision that was challenged by Ms Finch, on behalf of Weald Action Group. Lawyers acting for Ms Finch said that as part of the Environmental Impact Assessment the council should have considered not just the greenhouse gas emissions from building the wells but also burning any oil that was then used – known as downstream emissions. Summing up the case Lord Leggatt said it was “inevitable” that oil from the site will be burned, and the resulting greenhouse emissions were “straightforwardly results of the project” which should be considered. The six wells at Horse Hill are expected to produce 3.3 million tonnes of crude oil over the next 20 years. Burning that oil would produce over 10 million tonnes of CO2, the environmental campaigning organisation Friends of the Earth has estimated. Stephen Sanderson, the chief executive of UK oil and gas plc - the company behind the Horse Hill project said the court's ruling was "perplexing". But he added "the company's focus over the past few years has shifted away from oil and gas and firmly towards ... hydrogen storage."

  The test case could have implications for new oil and gas projects in the North Sea

  UK oil and gas plc said they will now work with Surrey County Council to amend its planning application, and that future production will fall below the levels at which an environmental assessment is required. Campaigners claim the judgement could also affect ongoing legal challenges of new projects in the UK including Rosebank oil field and the proposed coal mine in Whitehaven in Cumbria. "Today’s groundbreaking ruling is a heavy blow for fossil fuel lobbyists," said Weald Action Group. "The UK is already veering dangerously off track for meeting its legally binding carbon reduction targets, and its international pledge to reduce emissions by two-thirds by 2030," they added. Because the UK law on environmental assessments is based in part on European law the ruling could have impacts abroad as well, they say.

  Ms Finch’s victory ends a five-year legal battle on behalf of local residents, in which she was supported by environmental campaigners Friends of the Earth and Greenpeace. Her challenge to the project was initially rejected in the High Court but when it went to the Appeal Court in 2021 the judges returned a split decision and Ms Finch then took her case to the Supreme Court last year. The Supreme Court judges did not rule that Surrey County Council should reject the proposal for new oil wells but should have considered the downstream emissions.

