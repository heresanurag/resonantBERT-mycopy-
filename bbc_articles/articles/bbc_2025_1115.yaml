title: Colchester crash victims honoured at basketball matches - BBC News
date: '2025-02-16'
section: Essex
url: http://www.bbc.co.uk/news/articles/czx8vyj8wkwo
content: |-
  An applause is held in memory of four students who died when a car crashed into a building.

  The four university students died when their car crashed into a building

  Four students killed in a car crash were honoured at a university as basketball matches resumed for the first time since the incident. Makyle Bayley, 22, Eva Darold-Tchikaya, 21, Anthony "TJ" Hibbert, 24 and Daljang Wol, 22, died when a car crashed into a building on Magdalen Street, Colchester on 1 February. Mr Hibbert and Mr Wol played for the Essex Rebels, who dedicated Saturday's fixtures to the victims and held an applause in their memory. University of Essex director of sport Dave Parry said: "We've lost four really loved members of our university and sporting community, who gave so much to their friends and others."

  Mr Bayley was a member of the British Universities and Colleges Sport (BUCS) basketball team, while Ms Darold-Tchikaya was a member of the Essex Blades dance club and other societies.

  Saturday's basketball fixtures at the University of Essex were dedicated to the victims

  It was the first time matches had been played there since the incident

  Last week, more than 1,000 people including students, staff and relatives of the victims attended a gathering. Mr Parry described the deaths as "a terrible shock" and hoped the return of basketball matches would help to bring the community together. He said: "We've had an incredible outpouring of support from all over the country, particularly from the basketball community. "Clubs up and down the country have been sending us messages of support. "It's been a terrible couple of weeks and a tragic loss of such young talented lives and we will keep their memories in our hearts forever."

  Dave Parry said more than 1,000 people attended a gathering held at the university last week

