title: Eight dead after Channel migrant crossing - French officials - BBC News
date: '2024-09-16'
section: Europe
url: http://www.bbc.co.uk/news/articles/c2ln150287yo
content: |-
  The Home Office says 801 people crossed the Channel on Saturday.

  Archive photo showing a boat with migrants onboard crossing the Channel last year

  Eight people have died overnight while trying to cross the Channel from France to England, French police say. Rescue services were alerted after the boat got into difficulty in waters north of Boulogne-sur-mer in the northern Pas-de-Calais region after 01:00 local time (00:00 BST). The rubber vessel had around 60 people on board, from countries including Eritrea, Sudan, Syria and Iran. It comes less than two weeks after 12 people, including six children and a pregnant woman, died when a boat carrying dozens of migrants sank in what was the deadliest loss of life in the Channel this year.

  The French coast guard said the boat in the incident reported on Sunday was seen heading towards a beach in the town of Ambleteuse but rescue teams could not offer assistance from the sea. After getting into difficulty, it was driven onto rocks where it came apart. On the beach, emergency services provided care to 53 people and confirmed eight had died, the coast guard said. Six people were taken to hospital including a baby with hypothermia. No other people were found during sea searches. An investigation has been opened by the Boulogne-sur-mer public prosecutor's office. A UK government spokesperson confirmed the latest incident and said French authorities were leading the response and investigation. Foreign Secretary David Lammy said it was "awful" to hear of a "further loss of life" in the Channel. He told the Sunday with Laura Kuenssberg programme that many people were "of course not able to make it" across the Channel, having seen the types of rubber dinghies people have been using. He also reiterated the government's plan to work with European partners to tackle the criminal people-smuggling gangs to deter small boat crossings. There has been a spate of crossing attempts across the Channel in the last two days with the arrival of calmer weather. Some 801 people crossed the Channel on Saturday - the second highest daily total so far this year, according to provisional Home Office figures. On 18 June, 882 people made the journey. French maritime authorities said that 200 people were rescued in a 24-hour period over Friday and Saturday. The French coast guard and other first responders rescued people onboard four separate boats - one with 61, another with 55, and two others with 48 and 36 each. Eighteen attempted crossings were monitored by authorities over the course of the day. Including the eight latest victims, a total of 45 people have died in the Channel this year - the highest reported number since 2021, according to the UN's International Organisation for Migration.

  More than 23,000 people have crossed the Channel this year. Amnesty International UK said the latest incident was "yet another appalling and avoidable tragedy". Enver Solomon, CEO of the Refugee Council, said the deaths were not "inevitable" and a comprehensive approach to reduce crossings was needed. "Enforcement alone is not the solution," he said, adding that there needed to be improved access to safe asylum routes.

