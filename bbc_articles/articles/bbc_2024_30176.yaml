title: 'Londonderry: New mural tackles stigma around breastfeeding - BBC News'
date: '2024-12-01'
section: Northern Ireland
url: http://www.bbc.co.uk/news/articles/c1lg0190jpno
content: |-
  A new mural in Derry city centre hopes to spark a conversation about breastfeeding.

  'As mums we feel censored when it comes to breastfeeding'

  The mural was unveiled on Friday

  A group in Londonderry say they hope a new mural in the city centre will help tackle stigmas around breastfeeding. According to Public Health Agency figures,, external fewer mums in Derry and Strabane choose to breastfeed compared to the rest of Northern Ireland. The mural in Great James Street, was commissioned by the North West Breastfeeding and Perinatal Support (BAPS) organisation. "We want to encourage the conversation. We hope that it will bring change," Sinead O'Kane, the project coordinator said.

  The mural, which was created by artist collective Peaball, is located on a gable wall of the Pram Centre. It depicts a mum breast feeding her child, with part of the painting pixelated. "We wanted it to be censored because we wanted it to be like what it's like to feed here in Derry because as mums we do feel censored when it comes to feeding," said Sinead. The mother and baby are surrounded by a wreath, which Sinead explained represents the circle of support required in any breastfeeding journey. "The black and white mum and baby represents how it truly feels to breastfeed, their love and their connections," she added.

  Over thirty people gathered to see the mural

  Sinead said the mural was inspired by a similar project in Greenock in Scotland which saw a 5% increase in the amount of mothers in the area who were breastfeeding. "We want people who want to breastfeed to know there is a community here and ready to embrace, support and protect them while they learn this new skill," she said.

  The process began over a year ago when Sinead mentioned to Peaball artist, Donal O'Doherty, about the possibility of a mural. From there the group had workshops to help develop what the mural would look like. "We looked at different types of street art, we looked at different types of imagery and how that's portrayed by the general public," said Donal. "It gives them an idea of what direction they want to go in and styling." He said he is happy with the pixelated element as he believes it strikes a conversation.

  Denise McMahon was at the unveiling with her baby Robin

  Many mothers from the city attended the unveiling of the mural on Friday. Denise McMahon was at the unveiling with her baby Robin. "To know that a community is out and that there are other mums that are there to offer support, and people that you can meet up with if you're not feeling comfortable in the early days and just building confidence is great," she said.

  Cliodhna Dunne said it's important to show how valuable breastfeeding

  Mother-of-two, Cliodhna Dunne said it's important to show how valuable breastfeeding is and the bond between the mother and a baby. Meanwhile, Charmaine Kelly Aelin said she hoped it would "break some stigma" around breastfeeding. "I hope it helps mums feel more comfortable feeding in public. I know myself that was one of my own challenges to overcome," she said.
