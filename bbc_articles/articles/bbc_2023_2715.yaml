  Similarly, the harrowing Ice Cream Man describes her sexual assault at the hands of an A-list record producer.

  It's been part of her live set for several years - but the recorded version adds new lyrics, exposing a pattern of male predatory behaviour that's followed her throughout her life.

  "I was seven, was 21, was 17 and was 11," she sings. "If I was ruthless they'd be in a penitentiary."

  "Sadly, since I wrote, it, there's been other stories to add," she says.

  She finds the song "ridiculously challenging" to play "because it opens all of those details back up and I'm not 100% over it", but she wanted to share her experiences, to provide an outlet for fellow victims.

  "When it happened to me, I didn't tell anyone. I didn't know what to do with it.

  "So I hope the song finds its way to whoever needs it, so they can confront those feelings and cry it out, you know?"

  The danger of suppressing those emotions is something Raye is all too familiar with.

  "When you keep things in like that, they eat away at you from the inside," she says.

  "And for me, sadly, substance abuse was entangled with numbing the trauma that I had experienced.

  "I got pretty deep in and it got really dangerous at one point."

  The extent of her dependency came as a shock, as she'd always been wary of drug use.

  In fact, the song that initially got her recognised, HotBox, was about her first encounter with marijuana at a school friend's house.

  "Someone started rolling a massive joint and I was like, 'Oh my God: Drugs!'" she told the BBC in 2017.

  "I was just 14 and I said 'no thanks' but I became stoned anyway because the room became a big cloud," she said. "I felt really scared."

  But as her career floundered and her self-esteem took a pounding, things got dark.

  "It was around the height of my dance-pop [hits]," she recalls. "I was having to go out there and be this happy pop character when, in reality, I was processing this unaddressed trauma and coping with an immense amount of pressure.

  "Sprinkle a bit of heartbreak on there and it's a recipe for disaster.

  "I was just lost. It was a really sad time."

  The singer sings about abusing alcohol, cocaine, marijuana and the painkiller Codeine but says she is now clean and sober

  These days, she's sober again - something the 25-year-old attributes to rediscovering her Christian faith.

  She'd grown up attending a church in Croydon, where her father was the musical director and her mother sang in the choir. Nowadays, she has a more private relationship with religion, hosting Sunday hymn services at home with her friends. But the process has been crucial to her wellbeing.

  "There's a world in which if I didn't find faith again, I might not even be here," the singer says.

  "There's a lot of demons trying to claw at you and drag you to somewhere you don't belong, so I'm really grateful I have this faith. It's honestly pulled me out of a really dark place."

  So while 21st Century Blues exposes Raye's most wretched days, it also thrums with a newfound sense of purpose.

  "I'll bounce back, I'll bounce back," she asserts on Hard Out Here. "No weapon formed against me shall ever prosper."

  "It's so easy to take the ugly parts and let them impact you negatively, but no," she explains.

  "I took a step back to remember why, when I was 10 years old, I told my dad in the school playground, 'This is what I want to do with my life'.

  "It's not been straightforward since then. It's been a serious push. But when you love what you do this much, there's just no alternative.

  "And now I've started, nothing is stopping me. I'm staring out at an empty horizon and I'm like, which way do I want to go?'"

  For Raye, this is only the beginning.

