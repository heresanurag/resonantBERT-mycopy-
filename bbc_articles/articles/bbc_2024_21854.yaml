title: William and Kate donate funds to burgled Peckham food bank - BBC News
date: '2024-09-14'
section: London
url: http://www.bbc.co.uk/news/articles/cy0n0046dego
content: |-
  The Prince and Princess of Wales make a donation to Southwark Foodbank as the community rallies.

  The Prince and Princess of Wales saw reports about the burglary at Southwark Foodbank and decided to donate

  The Prince and Princess of Wales have made a donation to help replenish stock at a south London food bank which had thousands of pounds worth of goods stolen. Southwark Foodbank, which is operated by Pecan on Peckham High Street, was targeted by thieves on Sunday who took about £3,000 of food and hygiene products, as well as a laptop. Pecan chief executive Peter Edwards said: "This surprise donation by the Prince and Princess of Wales - following such a difficult spell for their family - underlines their kindness and decency. "After serious ill health, their first thought was of how to help others."

  He added: "Their generosity will inspire staff and volunteers to redouble Pecan's efforts to alleviate poverty in London." The food bank said its food stocks had now been replenished, following a surge in donations from members of the public. Kensington Palace said Prince William and Catherine had heard about the burglary and wanted to offer their support. The food bank said the couple had pledged £3,500.

  Staff and volunteers had been "very distressed" to be met with empty shelves when they discovered the theft on Monday morning, Mr Edwards said. Burglars had forced their way into the warehouse, causing damage in the process. Mr Edwards said there had been an "overwhelming reaction" from individuals, businesses and the local council, adding: "We thank them all for their support at the end of a very tough week. "We are delighted that after such a difficult time for their own family, the Waleses thought of us and the people of the community in need across Southwark, and that's testament to their decency and compassion."

  The food bank lost about £3,000 worth of food and hygiene products in the burglary

  Mr Edwards previously told the BBC the burglary had had a "devastating impact" which hit "the most vulnerable people in our community". It followed four other break-ins at two London food banks over the past 14 months including at Lewisham Foodbank in south-east London, where a large quantity of cash that would have been spent on food was stolen in July last year. The Metropolitan Police has said no arrests had been made over Sunday's burglary, during which a laptop, phone and food was stolen.
