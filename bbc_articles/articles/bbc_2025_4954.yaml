title: Two arrested after woman killed during Edgware police car chase - BBC News
date: '2025-03-26'
section: London
url: http://www.bbc.co.uk/news/articles/cjd37xpz57no
content: |-
  Two men, 18 and 19, were arrested on suspicion of causing death by dangerous driving.

  The collision happened at around 14:10 GMT in Grahame Park Way, Colindale

  Two men have been arrested after a woman died when she was hit by a car that had been travelling away from the Metropolitan Police in north-west London. The men, aged 18 and 19, were arrested on Wednesday on suspicion of causing death by dangerous driving and failing to stop. They remain in custody, the force said. The crash happened at about 14:10 GMT in Grahame Park Way, Colindale, on Tuesday. The woman, in her 60s, died at the scene. The driver had been driving away from a police vehicle prior to the crash and did not stop at the scene. It was later found abandoned in nearby Franco Avenue.

  A spokesperson for the Independent Office for Police Conduct (IOPC) said it was investigating the involvement of the Met Police in the crash. It said the Met notified the watchdog, and IOPC investigators began gathering evidence. The spokesperson added: "We declared an independent investigation shortly after 16:30 GMT on Tuesday and our inquiries are still at a very early stage."
