  Four teens drowned after their car flipped into a ditch while on a camping trip, an inquest hears.

  This video can not be played To play this video you need to enable JavaScript in your browser. Crash that killed four teens was avoidable, inquest hears

  A crash that killed four teenage boys when they drowned in an overturned car could have been avoided, an inquest has heard. Hugo Morris, 18, Harvey Owen, 17, Wilf Fitchett, 17, and Jevon Hirst, 16, all from Shrewsbury, died when their car left a rural road while they were on a camping trip last November. It flipped on to its roof in a flooded ditch, leaving the four A-level students trapped. A conclusion of road traffic collision was recorded by the senior coroner for North West Wales.

  The teenagers had been visiting Eryri National Park, also known as Snowdonia, when they set off from Harlech on 19 November to spend the night camping. But the Ford Fiesta being driven by Hugo left the A4085 road near the villages of Garreg and Llanfrothen. The crashed car could not be seen from the road and led to a massive two day search to find the boys. The inquest was told that a passing refuse recycling truck spotted the upturned car while on its round on the Tuesday morning.

  All four students were found dead in the car. The inquest was told that post-mortem examinations revealed none of them had any internal or external injuries, and had died as a result of drowning. Giving evidence to the hearing, crash investigators for North Wales Police said there were "no catastrophic mechanical failures" with the car. However, both rear tyres were only half the required inflated pressure for carrying four people.

  Mr Thompson said, in his view, Hugo had driven into a bend on the road too fast, causing the vehicle to come off the road. He said he calculated the maximum theoretical speed around the bend was 38mph. But he added: "Having driven the bend myself the fastest speed I felt comfortable negotiating the bend was 26mph." He said the Ford Fiesta had entered that bend at a speed that was in excess of the limit to negotiate it, even though that may well have been below the road's 60mph limit. Mr Thompson said the actions of Hugo Morris needed to be considered in the accident. While it had been raining heavily, with leaf cover on the road, the investigator said he did not consider weather conditions played a role in the collision. But he said in his view, the crash "was avoidable".

  Delivering her conclusion, senior coroner Kate Robertson noted that there had been inadequate signage on the approach to the bend. She said she will also be writing to Cyngor Gwynedd and the landowner by the crash site about the need for fencing or barriers at the location. The coroner will also write to the UK government, raising her own concerns over newly qualified drivers being able to carry passengers. "Having considered and heard the evidence I do have a concern," she said.
