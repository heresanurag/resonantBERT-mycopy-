  Tributes were read out to all the boys by the coroner. Harvey's mother Crystal said he was "perfect from the minute he came into the world and continued to be until he was tragically taken from us". "Harvey had the biggest, warmest smile that radiated love and calmness and a contagious positive energy," she said.

  Harvey Owen "always had a soft spot for people who he knew were struggling to fit in or felt they were having a bad time," said his mother Crystal

  She said "every parent's worst nightmare came true" last November and Harvey's family now faced "a lifetime of grieving the life he should be living, the time we should have had with him and the memories we should be creating".

  Heather Sanderson, Wilf's mother, said she was "very proud" of her son, who was "so kind and had a lovely sense of humour". "I will miss him for the rest of my life."

  The car carrying the four teens came off the A4085

  In a statement the mother of Jevon said he was "happiest when he was at home with his family". "He was really close to his family and was loved," said Melanie Hirst.

  The parents of Hugo said their son had a "thirst for life". "No words can express our loss," said Dominic and Sarah Morris. "Our world is shattered, bent and cracked. He is impossible to forget."

  Harvey's mother, Ms Owen, said the death of her son and his friends has led to her launching a campaign to change the law for younger drivers. She has started an online petition calling for the introduction of a graduated driving licence. It would require new learners to have at least six months training before being able to apply for a test. It would also ban newly-qualified drivers from carrying passengers under the age of 25 for the first six months, without an older adult present. Speaking outside the coroner's court, Ms Owen said she was "very happy" with the outcome but the government still needed to act. She said: "My son was able to get in the back of a car driven by a young, inexperienced driver and be driven on an unfamiliar rural road without my knowledge. He was let down by an outdated driving licence system."
