  Three-year-old Ethan had to be saved after crawling into a toy machine in Brisbane, Australia.

  Three-year-old Ethan had to be rescued after crawling into a toy machine in Brisbane, Australia.

  Officers were called to the shopping centre on Saturday. They directed the trapped but calm toddler to one corner before smashing the glass to retrieve him.
