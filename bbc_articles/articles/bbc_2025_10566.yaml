  The image, shared by White House social media accounts, comes as Catholics prepare to pick the next pontiff.

  Trump criticised after posting AI image of himself as Pope

  US President Donald Trump has attracted criticism from some Catholics after posting an AI-generated image of himself as the Pope. The picture, which was shared by official White House social media accounts, comes as Catholics mourn the death of Pope Francis, who died on 21 April, and prepare to choose the next pontiff. The New York State Catholic Conference accused Trump of mocking the faith. The post comes days after he joked to media: "I'd like to be Pope." Trump is not the first president to be accused of mocking the Catholic faith. Former US President Joe Biden, a Catholic, caused outrage a year ago when he made the sign of the cross at a pro-abortion access rally in Florida.

  Vatican spokesman Matteo Bruni declined to answer questions about Trump's post during a briefing with journalists on Saturday. The Vatican is preparing to host a conclave to choose Francis's successor beginning on Wednesday. The image posted by Trump on Friday night features him wearing a white cassock and pointed mitre, traditionally worn by a bishop. He wears a large cross around his neck, and has his finger held up, with a solemn facial expression. The New York State Catholic Conference, which represents bishops in New York, took to X to criticise the picture. "There is nothing clever or funny about this image, Mr President," the group wrote. "We just buried our beloved Pope Francis and the cardinals are about to enter a solemn conclave to elect a new successor of St Peter. Do not mock us."

