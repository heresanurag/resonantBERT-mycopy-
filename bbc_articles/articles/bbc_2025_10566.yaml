  "This is an image that offends believers, insults institutions and shows that the leader of the right-wing world enjoys clowning around," Renzi wrote in Italian on X. But the White House rejected any suggestion that the Republican president was making fun of the papacy. "President Trump flew to Italy to pay his respects to Pope Francis and attend his funeral, and he has been a staunch champion for Catholics and religious liberty," said press secretary Karoline Leavitt. The backlash continued on Sunday, as New York Archbishop Timothy Dolan - who has been friendly with Trump for years - told reporters that he disliked the image. "It wasn't good," he said, after attending a Mass in Rome. "I hope he didn't have anything to do with that." Switching to Italian, he called it a "brutta figura", a phrase meaning a bad or embarrassing impression. Asked if the White House should take down the image and apologise, he said - again in Italian - "who knows" and declined to speak more about it.
