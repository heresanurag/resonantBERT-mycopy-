id: bbc_2022_7596
title: Thunderstorm warning for most of Wales extended until midnight - BBC News
date: '2022-06-04'
section: Wales
url: http://www.bbc.co.uk/news/uk-wales-61689831
content: |-
  Forecasters warn of flooding and travel disruption on Sunday amid thunderstorm warning.

  Fast flowing or deep floodwater may cause danger to life, forecasters have warned

  Thunderstorms could bring flooding and travel disruption to most of Wales on Sunday, forecasters have warned.

  The Met Office yellow warning came into force at 00:00 BST on Sunday and runs until 00:00 BST on Monday.

  The forecaster said fast flowing or deep flood water was possible, potentially causing a danger to life.

  Forecasters have also warned of potential delays and cancellations to bus and train services due to flooding and lightning strikes.

  The only Welsh county not expected to be affected is Anglesey.
