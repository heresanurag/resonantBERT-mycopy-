  Rovers manager Stephen Bradley was delighted with his team's display in Belfast and it comes as they continue to push for a fifth straight League of Ireland title with just two matches left in the domestic season. "The players implemented the gameplan very well - they were excellent," Bradley said. "This group of players always come alive in the second part of the season. They thrive under pressure and the buzz of having to win." The visitors dominated the game on the big pitch at Windsor Park, used by Larne in the competition with their Inver Park home not meeting Uefa requirements. The win puts Bradley's side on four points from their opening two matches following a 1-1 draw with APOEL. "I knew getting the players on that big pitch suited them," said Bradley. "It's exactly where we want to be [on four points] - it gives us the chance to go on and qualify automatically."
