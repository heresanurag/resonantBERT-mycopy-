content: |-
  Princess Elizabeth and the Duke of Edinburgh married in November 1947. Winston Churchill described it as a flash of colour in the grey post-war Britain.

  Princess Elizabeth married her third cousin, the Duke of Edinburgh, in November 1947. It was, said Winston Churchill, a flash of colour in the grey post-war Britain.
