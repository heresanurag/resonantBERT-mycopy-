title: 'Squid Game: Season 2 sees return of Player 456 to deadly games - BBC News'
date: '2024-11-01'
section: Culture
url: http://www.bbc.co.uk/news/articles/cdrdxjpxzx4o
content: |-
  The new season follows Gi-hun as he tries to expose the games' secrets, three years after his narrow escape.

  Player 456 Seong Gi-hun, played by Lee Jung-jae, steps back into his iconic green tracksuit in season two

  The first trailer for the second season of Squid Game has been released, thrusting viewers back into the deadly arena where Player 456 has returned to play once more. Three years after his victory in the lethal series of children's games Seong Gi-hun, played by actor Lee Jung-jae, returns as Player 456 and is joined by hundreds of new competitors - and tries to lead them to safety. The first season of the South Korean drama followed a group of 456 people, desperate and in debt, fighting to the death for a huge cash prize. It became Netflix's biggest ever series launch, streamed by 111 million users in its first 28 days.

