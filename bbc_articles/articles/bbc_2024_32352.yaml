  Iran International journalist Pouria Zeraati was stabbed in the leg outside his Wimbledon home in March.

  Two men charged over stabbing of Iranian journalist in UK

  Two Romanian nationals have been charged after an Iranian journalist was stabbed outside his London home earlier this year. Iran International TV journalist Pouria Zeraati was knifed in the leg in Wimbledon on 29 March. On Wednesday, Nandito Badea, 19, and George Stana, 23, were arrested in Romania and charged with wounding and wounding with intent to cause grievous bodily harm, the Crown Prosecution Service (CPS) said. The two men appeared in a Romanian court for the start of extradition proceedings to the UK, the CPS said.

  A CPS spokesperson said on Thursday that "following a review of the evidence provided by the Metropolitan Police Service's Counter Terrorism Command, we have authorised charges against two Romanian nationals." "We continue to work closely with Romanian authorities, to ensure that our extradition request is progressed through the courts," the statement read. "The Crown Prosecution Service reminds all concerned that criminal proceedings against the defendants are active and that they have the right to a fair trial." Mr Zeraati described the incident to BBC's Radio 4 Today programme in April. He said that when he was going to his car to get to the studio, a man approached him pretending to ask for change. When he said he had none and moved to unlock the car door, a second man approached, and they grabbed him so that he could not move his hands, Mr Zeraati said. The first person stabbed him in the leg, he said, then they ran away. None of Mr Zeraati's belongings were stolen in the attack, he said. Police said at the time that the suspects travelled to Heathrow Airport shortly after with a third man and left the UK. Mr Zeraati was taken to hospital, but returned to work a week after the attack. He told the BBC in April that while he was "feeling much better", he was still mentally recovering.
