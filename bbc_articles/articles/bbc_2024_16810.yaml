content: |-
  Mr Findlay said the threats would not deter him from running to be the Scottish Conservatives leader.

  Tory MSP Russell Findlay warned of threat to his life

  This video can not be played To play this video you need to enable JavaScript in your browser. Russell Findlay has announced he will run to be Scottish Conservative leader

  Scottish Conservative MSP Russell Findlay says he has been warned by Police Scotland of a threat to his life. Mr Findlay, who is running for leadership of his party, said he was told that a "known criminal" was behind the intimidation. He said the threat is believed to be linked to the case of William Burns, a hitman who attacked Mr Findlay with acid at his home in 2015. Earlier this week Mr Findlay, a former crime journalist, became the first Scottish Conservative to formally announce his intention to run for leader.

  Mr Findlay has been an MSP since 2021

  He said he was "not going to let gangland threats" stop me him from running for the role. Mr Findlay reported on organised crime for many years and has served as the party's justice spokesman since his election as an MSP in 2021. He stated: "I accept that holding powerful and dangerous people to account can come at a cost and I am therefore cautious by necessity. “But you can't run away from threats. It does not work. You have to be defiant and stand firm for what you believe in." William Burns is believed to have a parole hearing within the next week. Mr Findlay added that there should be "full transparency around parole and sentencing" hearings. Police Scotland stated that they could not discuss individual cases but would always take "appropriate action". Assistant Chief Constable Andy Freeburn said: “We have well established relationships with elected representatives and regularly discuss security arrangements further with them." Mr Findlay is currently the only declared candidate for the Scottish Conservative leadership. The contest is to find a replacement for Douglas Ross, who announced during campaigning for the general election that he intended to stand down after four years in the role.
