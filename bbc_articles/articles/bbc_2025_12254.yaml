title: Musk sports black eye at White House farewell with Trump - BBC News
date: '2025-06-02'
section: General
url: http://www.bbc.co.uk/news/videos/cdr5eyjv306o
content: |-
  The tech mogul, whose time as a special government employee has ended, explained how he had got the bruise.

  US President Donald Trump has commended Elon Musk for his work at Doge as he hosted the tech mogul at the White House on his last day as as a special government employee.

  The president said that Musk "is not really leaving" and will occasionally be back at the White House because Doge is his "baby".

  He also presented Musk with a large golden key which, according to the president, was a thank you from the country. Musk was also asked about his bruised eye, which he attributed to rough-housing with his five-year-old son.

  Musk's designated role as a special government employee only allowed him to work in a federal job for 130 days in a calendar year.
