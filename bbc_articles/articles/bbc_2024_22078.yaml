  Nicholas Prosper, 18, is accused of murdering his mother and teenage siblings at a tower block.

  Man in court accused of murdering mum and siblings

  Nicholas Prosper was named locally as Juliana Prosper's son and sibling to the child victims

  An 18-year-old has appeared in court charged with murdering his mother and siblings at a tower block in Luton. Bedfordshire Police said it believed the victims were Juliana Prosper, 48, Kyle Prosper, 16, and Giselle Prosper, 13 - all of Leabank - but formal identification had not yet taken place. Nicholas Prosper, also of Leabank, appeared at Luton Magistrates' Court wearing a grey prison tracksuit and spoke only to confirm his name and date of birth. He is next due to appear at Luton Crown Court on 18 September.

  Police said they believed the victims to be Kyle Prosper, 16; Juliana Prosper, 48, and Giselle Prosper, 13

  As Mr Prosper was led out of the dock his father, Ray Prosper, shouted: "I still love you, son. It’s not your fault, OK?" and then wept. The teenager has also been charged with a number of other offences related to the murder, the court heard. Floral tributes have been left outside the block in the Marsh Farm area of the town. Officers were called to the flats at about 05:30 BST and found three people had been fatally injured.

  Flowers were left outside Leabank, a block of flats in the Marsh Farm area of Luton

