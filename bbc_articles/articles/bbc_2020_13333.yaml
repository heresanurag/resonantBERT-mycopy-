title: 'COVID-19: ''It doesn''t feel like a lockdown'' - BBC News'
date: '2020-11-24'
section: General
url: http://www.bbc.co.uk/news/uk-55050597
content: |-
  Covid-19 case numbers are dropping in most parts of England, but the South East's cases are rising.

  Covid-19 case numbers in parts of Kent (Swale and Thanet) in the South East are among the worst in England.

  The BBC's Dan Johnson has been trying to find out if people are sticking to the rules in Canterbury, where case numbers are still rising, bucking the national trend in England where case numbers are dropping.
