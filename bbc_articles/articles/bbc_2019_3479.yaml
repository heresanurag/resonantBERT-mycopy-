title: Firefighters tackle large Bradford mill blaze - BBC News
date: '2019-03-19'
section: General
url: http://www.bbc.co.uk/news/uk-england-leeds-47632963
content: |-
  A four-storey mill on Great Horton Road in Bradford is ablaze and 50 firefighters are in attendance.

  Smoke can be seen across the city.
