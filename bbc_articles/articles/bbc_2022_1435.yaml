title: Ukrainian officials run from apparent shelling - BBC News
date: '2022-02-21'
section: General
url: http://www.bbc.co.uk/news/world-europe-60452146
content: |-
  Watch the moment when a group including the interior minister take cover in eastern Ukraine.

  Watch the moment when Ukrainian officials, including the interior minister, and journalists take cover from what appears to be shelling in the eastern part of the country.

  The incident happened on Saturday, during a visit close to areas controlled by Russian-backed separatists.

  Ukraine confirmed the group were evacuated to a safe shelter.

  Russia has denied claims of an imminent invasion, saying troops are conducting military exercises in the region.
