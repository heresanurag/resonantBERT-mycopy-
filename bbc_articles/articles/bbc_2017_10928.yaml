  Calls to get more women and girls working in the Stem fields are about employment opportunities, but addressing the gender gap also protects against bias, experts say.

  Bias can be manifested in a number of different ways, says Catherine Ashcraft, director of research at the National Centre for Women and Information Technology, ranging from hiring practices to interview techniques.

  And there are other instances of human bias about race and gender actually becoming part of a computer's decision-making process.

  "Biases can also evolve even after technologies are created through machine learning - because they learn from the data we give them. This also ends up reflecting our biases," says Dr Ashcraft.

  Machine learning, a type of AI, can help humans perform tasks and take decisions by seeing patterns in large quantities of data.

  This concern about bias has become especially relevant in the world of work because companies have started to screen applicants using artificial intelligence.

  "Would artificial intelligence find a male applicant less fit for a nurse position? Or would this lead to women having lower chances to be called for a programming position?" said Aylin Caliskan, an AI expert at Princeton University, in an interview with Science magazine.

  Therefore, it could make a difference if more women work in the professions overseeing this new technology.

  "If we don't do something, bias will propagate and get worse," says Aimee Van Wynsberghe, the robotics expert.

