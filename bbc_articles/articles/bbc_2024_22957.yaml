title: '''Mini tornado hitting Luton'' captured on video - BBC News'
date: '2024-09-23'
section: General
url: http://www.bbc.co.uk/news/videos/cy0l525rv9wo
content: |-
  Footage shows debris caught up in strong, rotating winds during Sunday afternoon's storm.

  Video posted on social media, external captured what was described as a "mini tornado hitting Luton".

  The footage filmed near Dunstable Road on Sunday afternoon showed what appeared to be debris caught up in strong, rotating winds.

  BBC East senior weather presenter Gillian Brown said: "This weak tornado swept across Luton yesterday. It was associated with the thunderstorms moving across southern Britain.

  "They usually form during thunderstorms when warm air rises through colder air.

  "With the right wind conditions, the air starts to spin, and if the swirling air touches down on the ground, that forms a tornado."

