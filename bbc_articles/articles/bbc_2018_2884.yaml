id: bbc_2018_2884
title: 'Stephen Hawking at 75: Trump and climate change - BBC News'
date: '2018-03-14'
section: General
url: http://www.bbc.co.uk/news/science-environment-40473841
content: |-
  After President Trump withdrew from a climate agreement, Prof Hawking warns of the threat from global warming.

  Prof Stephen Hawking has told the BBC that President Trump's decision to withdraw from the Paris climate change agreement "will cause avoidable environmental damage".

  He spoke ahead of a birthday conference in Cambridge, which has been organised to mark his 75th year.

  Prof Hawking was born on 8 January 1942 in Oxford.
