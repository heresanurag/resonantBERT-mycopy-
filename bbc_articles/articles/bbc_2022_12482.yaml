title: 'Ukraine war: Controversial referendums being held in occupied areas of Ukraine
  - BBC News'
date: '2022-09-24'
section: World
url: http://www.bbc.co.uk/news/live/world-63002591
content: |-
  Russian-backed officials in four occupied regions are holding votes to decide on joining Russia.

  One man told the BBC he was in the queue to cross the Russia-Georgia border for 26 hours Image caption: One man told the BBC he was in the queue to cross the Russia-Georgia border for 26 hours

  The Russian internet company Yandex's map service indicates that the queue on the Russian side of the Upper Lars land border crossing to Georgia is at least 8km long.

  But there are reports of traffic congestion as far as the nearest town of Vladikavkaz, 30km away.

  People are only allowed to cross the Russian-Georgian border in vehicles, not on foot.

  An enterprising few have succeeded by switching to bicycles and scooters. One man who has been in the queue in his car for over 26 hours told the BBC that there were no places to eat or to go to the toilet.

  Many travellers are males of fighting age escaping the prospect of being drafted into the war in Ukraine following Vladimir Putin's announcement of a so-called "partial" mobilisation that has seen thousands of men rounded up with no military experience.

  Georgia is one of the last remaining overland options for Russians without the need for a visa on entry.

  The borders of Kazakhstan and Mongolia are also open, but Georgia is closest to the European Union.

  Estonia, Latvia and Lithuania have all closed their borders to most Russian citizens. Finland said it's border would close soon.
