title: 'Kairos: Japan rocket explodes seconds after launch - BBC News'
date: '2024-03-13'
section: General
url: http://www.bbc.co.uk/news/world-asia-68551401
content: |-
  Space One’s ‘Kairos’ rocket burst into flames shortly after lift-off on Wednesday morning.

  Space One’s ‘Kairos’ rocket burst into flames shortly after lift-off in western Japan on Wednesday. The explosion left a large plume of smoke in the air and sent fiery debris flying near the launchpad. The Tokyo start-up was racing to become Japan’s first private company to put a satellite into orbit.
