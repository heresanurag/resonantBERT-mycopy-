title: 'Christian Wade: Wigan Warriors sign Gloucester winger - BBC Sport'
date: '2025-04-18'
section: Wigan
url: http://www.bbc.co.uk/sport/articles/cq67zvmdyp7o
content: |-
  Gloucester rugby union winger Christian Wade will join Wigan Warriors in a cross-code switch at the end of the Gallagher Premiership season.

  Christian Wade has been playing for Gloucester in the Gallagher English Premiership this season

  Wigan Warriors have signed former England rugby union winger and NFL running back Christian Wade on a short-term deal that will begin when he finishes the Premiership season with Gloucester. The 33-year-old former Wasps and Racing 92 star will depart Gloucester and switch codes to link up with the Super League and world club champions on a deal until the end of 2025. Wade has scored seven tries for Gloucester in 10 Premiership matches - including two hat-tricks - to take his try-scoring tally to 89, fourth on the league's all-time list. "I'm excited for the challenge, but for now, my focus remains wholly on finishing the season strongly with Gloucester," Wade said, external. The West Country club are currently fourth in the Premiership and in line to be involved in the play-offs, with the final on 14 June.

  Wade previously scored 82 tries in seven seasons with Wasps before joining the Buffalo Bills as part of the NFL's International Player Pathway in 2019. He scored a 65-yard touchdown on his debut for the Bills during pre-season, but never made a regular-season appearance. He returned to rugby union in 2022 with a move to Racing, before linking up with Gloucester last summer. Wigan legend Martin Offiah, who himself left rugby union to join Widnes in 1987, said Wade's signing was big for the sport. "Wigan's signing of Christian Wade is the biggest coup for the sport of rugby league since Jonathan Davies joined me at Widnes back in the 80s," he said. Wigan head coach Matty Peet told the club website: "As well as working hard to learn a new sport, we are expecting Christian to bring his own personality to the team in terms of his athleticism, skill and experience."
