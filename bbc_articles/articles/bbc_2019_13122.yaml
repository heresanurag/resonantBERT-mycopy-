id: bbc_2019_13122
title: Tom Watson standing down as Labour deputy leader - BBC News
date: '2019-11-07'
section: General
url: http://www.bbc.co.uk/news/uk-politics-50326522
content: |-
  Tom Watson says he wants to see a Labour government elected, but he "wants to do something new".

  Labour's deputy leader Tom Watson has announced he is stepping down from his role after the general election, and will not be standing as an MP.

  Mr Watson said it was for "personal not political" reasons and was the the right time for a change.
