content: |-
  England's regeneration and refinement of their style was evident in the victory over Sri Lanka, writes Stephan Shemilt.

  'At Old Trafford, a place of regeneration, England showed future is now'

  England are unbeaten in Tests at Old Trafford since losing to Australia in 2019

  Old Trafford is a place of regeneration. While the cricket ground sprouts hotels and buildings that look like giant scart lead ports,, external just down the road, within eyesight, are the familiar white girders of the football ground. Now in need of a fix to a leaky roof, the Theatre of Dreams was once synonymous with evolution. One of the many great skills of Manchester United's legendary former manager Sir Alex Ferguson was the ability to know when and how to build a new squad, even if he already had a champion outfit. How fitting then, that this corner of Manchester is where the development in the England cricket team came into sharp focus. In contrast to Ferguson, Ben Stokes and Brendon McCullum did not have the luxury of refreshing a winning unit, rather one that had a single success in its previous 17 matches. In two-and-a-bit years, the leadership duo have reversed results and revamped the squad. One probably begat the other.

