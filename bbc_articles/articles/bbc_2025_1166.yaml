content: |-
  Qing Bao and Bao Li made their first appearance at the Smithsonian National Zoo after three months of adapting to life in the US.

  Giant pandas Qing Bao and Bao Li have made their public debut on Friday after three months of adapting to their new life in Washington DC's Smithsonian National Zoo.

  They arrived in the US in November 2024 after the zoo returned three other giant pandas Mei Xiang, Tian Tian and Xiao Qi Ji to China amid an expiring loan agreement between the two countries. Bao Li is the grandson of Mei Xiang and Tian Tian, and his mother Bao Bao was born at the DC zoo in 2013.
