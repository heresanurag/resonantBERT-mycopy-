content: |-
  More lockdown easing takes effect, but masks will be required on public transport in two weeks time.

  Opposition parties have criticised the Welsh Government's decision on making masks compulsory on public transport.

  The Welsh Conservatives said the rule should come into force from today rather than July 27.

  Covid recovery spokesman Darren Millar said: "The first minister and his cabinet must produce the scientific evidence - if it exists - to justify introducing them two weeks from now, rather than with immediate effect, and why only on public transport."

  Meanwhile Plaid Cymru wants masks worn in all enclosed spaces.

  Party leader Adam Price said: "In acknowledging that face coverings make a crucial difference on trains, buses and in taxis, the question must be begged of Welsh Government, why not in shops also?

