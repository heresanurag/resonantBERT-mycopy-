title: 'Whaley Bridge dam: Chinook races to save damaged reservoir - BBC News'
date: '2019-08-01'
section: General
url: http://www.bbc.co.uk/news/uk-england-derbyshire-49197455
content: |-
  The RAF helicopter is dropping 400 tonnes of aggregate to shore up Whaley Bridge dam.

  An RAF helicopter is dropping 400 tonnes of aggregate to try to shore up a damaged slipway at Toddbrook Reservoir

  Water is also being pumped out of the 300-million-gallon reservoir to try and prevent it from flooding.

  About 1,500 people have been evacuated from Whaley Bridge.
