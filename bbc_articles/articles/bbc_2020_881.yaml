content: |-
  Beau Greaves had a 16th birthday to remember as she won through to the semi-finals of the BDO women's World Darts Championship.

  Greaves is rated third favourite to win the title

  Beau Greaves had a 16th birthday to remember as she reached the semi-finals of the BDO women's World Darts Championship. The teenage debutant beat 29-year-old Dutch third seed Aileen de Graaf 2-1 to reach the last four. Sixth seed Greaves, from Doncaster, averaged 86.3 and hit three maximum 180s. She faces Japan's Mikuru Suzuki on Friday's after the reigning champion beat Anastasia Dobromyslova 2-0.

  Four-time champion Lisa Ashton plays Corrine Hammond in the other semi after a straight-sets victory over Lorraine Winstanley. Hammond earlier beat Laura Turner 2-0 in the women's quarter-finals at London's Indigo at the O2. Asked whether she felt she could now win the tournament, Greaves told BDO Darts: "Of course I can. You've always got to be confident, but not too confident. "But I felt really good and I'm looking forward to it. It's been an amazing week." In the men's event, Welsh second seed Jim Williams defeated Ryan Hogarth 4-0 to qualify for the quarter-finals. While the BDO tournament has been hit by low ticket sales and prize money problems, the championship has also showcased some of the sport's rising stars. Leighton Bennett, who only turned 14 on New Year's Eve, took a set off 2015 champion Scott Mitchell before losing 3-1 on Tuesday.

