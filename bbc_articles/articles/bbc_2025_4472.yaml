title: British Museum most visited UK attraction in 2024 for second year in a row
  - BBC News
date: '2025-03-21'
section: Culture
url: http://www.bbc.co.uk/news/articles/c39v2ddn4p4o
content: |-
  Other top 10 attractions last year included Windsor Great Park and the National Museum of Scotland.

  A visitor by the Nereid Monument at the British Museum

  The most-visited attraction in the UK for the second year in a row was the British Museum, according to official figures. The famous London museum saw 6,479,952 visitors through its doors in 2024, an 11% increase on 2023 numbers. There was also good news for the capital's Natural History Museum, which enjoyed an 11% increase in visitors (6,301,972), claiming second spot. Overall, the UK's most popular attractions saw an uplift of 3.4% in visitor numbers year-on-year, according to Alva (Association of Leading Visitor Attractions).

  The National Museum of Scotland, based in Edinburgh, presents nature, history, art, science and technology

  The total number of visits to 400 Alva sites in 2024 was 157.2 million but that was still a decline of 8.8% on the 169.7 million visits in 2019. Windsor Great Park (part of the Crown Estate) was the most visited outdoor attraction, welcoming 5,670,430 visitors last year, a 3% increase, which placed it in third. Alva director Bernard Donoghue said last year was "a year of steady but not significant growth", citing the "the long economic recovery" from Covid lockdown and "the effects of the cost-of-living crisis", as well as "modest inbound visitor numbers to the UK". "The recovery of visitor attractions and the broader cultural and heritage economies remains fragile", he noted, "but visitors have shown that in their leisure spending they still prioritise day trips to loved attractions."

  Cardiff's St Fagans National Museum of History includes a display of historic and vintage food and household products

  Edinburgh Castle was one of the most-visited attractions outside of London

  In Scotland, Edinburgh's National Museum of Scotland remained the country's most visited attraction. It also moved up to 11th in the UK table with 2,314,974 visitors (a 6% increase). National Galleries Scotland's National site welcomed 1,999,196 people, seeing a 9% increase, while Edinburgh Castle was close behind, with 1,981,152 visitors. In Northern Ireland, Titanic Belfast continued to be the most-visited attraction with a 10% increase to 881,573 visitors (35th place overall). In Wales, Cardiff's St Fagans National Museum of History was the most visited, with 600,690 visits (62nd place).

  The Titanic Belfast attraction tells visitors the story of the doomed ship, which was built in the city from 1909 to 1912

  Other notable successes included London's National Portrait Gallery, which reopened in summer 2023 after a three-year redevelopment, and saw a 36% increase in visitors (1,578,065), presumably eager to see the revamp. It took seventh place on the list. The Museum of Liverpool saw a 19% increase and moved 12 places to 41st with 829, 692 visitors; Pitt Rivers in Oxford gained a 27% increase to 509,703 visitors (80th spot) with The Fitzwilliam Museum in Cambridge enjoying a 25% uplift to 506,428 visitors (81st place). The Young V&A, based in the capital, saw 596,100 visitors come through its doors. That marked an increase of 47% in its second year of reopening and placed it 18th on the list. It was also named Museum of the Year in 2024. Buckingham Palace (which only opens to visitors for a few weeks each summer) received 646,832 visitors, the most its ever had in the history of its summer opening, which began in 1993. Despite its limited opening period, it was 59th on the list. The UK Parliament was visited by 560,317 people, a 196% increase (67th most visited).
