title: Runaway Household Cavalry horses on loose again in central London - BBC News
date: '2024-07-01'
section: London
url: http://www.bbc.co.uk/news/articles/c886qel3wdxo
content: |-
  It is the second time since April that Household Cavalry horses have bolted through the capital.

  This video can not be played To play this video you need to enable JavaScript in your browser. Watch: Horses on the loose in central London

  Military horses have broken free and run loose through central London for the second time since April. Three horses from the Household Cavalry Mounted Regiment "became loose from their riders" while six were exercising on Monday morning, according to the Ministry of Defence (MoD). All horses were recovered "swiftly and safely" and returned to Hyde Park Barracks by the Army and Metropolitan Police by 09:55 BST, with one receiving minor injuries. No soldiers were injured. Four other military horses were spooked by noise from a building site in Belgravia on 24 April and fled through the city, with some hitting vehicles including a double-decker bus.

  The Army says one of the horses received minor injuries

  A black cab driver caught some of the drama on his dashcam

  The latest incident happened when the lead horse, which was being led rather than ridden, became loose after being spooked by a London bus. Two riders were then unseated from their horses, who also became loose. Part of the incident was captured on dashcam footage by a black cab driver. The animals bolted from Seville Street to South Eaton Place, where one horse was recovered. Two horses continued to Vauxhall Bridge via Belgrave Road before being stopped. None of the three horses were involved in the previous bolting incident from 24 April, the MoD added.

  Two horses continued to Vauxhall Bridge before being stopped

  Jack Hanbury was cycling to work when he heard "the distinctive sound of hooves galloping along the pavement" as he travelled from Chelsea towards Hyde Park. "Then the three horses came into sight about 100m away and I pulled off the road to get out of their way," said the 30-year-old from Battersea, who works in finance. "One of the horses veered on to a kerb avoiding traffic and fell over, hitting the hard ground, sliding for at least a metre before getting up and carrying on. "It's the last thing you'd expect to find when you're heading to work in the morning."

  Horses from the Household Cavalry were seen galloping through central London back in April

  An Army spokesperson said: “We can confirm that whilst exercising this morning, three horses from the Household Cavalry Mounted Regiment became loose from their riders. They were swiftly and safely recovered. "One horse received minor injuries, but no further treatment is required and there were no injuries to the soldiers involved”. A spokeswoman for the Metropolitan Police said: "We’re aware that a number of horses were loose in central London and worked with the Army to locate them. "We're pleased to confirm that all of the horses have been accounted for. We are continuing to liaise with the Army."
