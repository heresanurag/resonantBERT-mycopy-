title: 'Rowley Regis: Murder investigation after girl, 10, dies - BBC News'
date: '2024-03-04'
section: Birmingham & Black Country
url: http://www.bbc.co.uk/news/uk-england-birmingham-68474591
content: |-
  Officers say a 33-year-old woman has been arrested after the child was found dead by police.

  Tributes were left at the scene by neighbours

  A woman has been arrested on suspicion of murder after a 10-year-old girl was discovered dead by police.

  Officers said the child was found with injuries in Rowley Regis, West Midlands.

  She was confirmed dead at an address on Robin Close, West Midlands Police added.

  A 33-year-old woman, believed to be known to the girl, has been taken into custody for questioning.

  The force said it was in the early stages of its investigation following the discovery at about 12:10 GMT.

  A police cordon remained in place on the street this evening, where neighbours had left toys near the scene.

  A police cordon was in place and a blue tent was visible at the scene

  Det Insp Dan Jarratt said officers would be seen around the area.

  "A young girl has tragically lost her life and our thoughts are with her loved ones and all those impacted by this terrible passing," he said.

  "We know how shocking and distressing this will be for the community and we'll continue to have a police presence and offer our support in the area over the coming days."

  A blue tent was visible near the front of a terraced property which was guarded by a police car and unicorn toys had been left tied to a lamppost nearby.

