  He is a pragmatist, with previous attack coach Rob Howley leaving alongside Gatland. Sherratt has changed more than half the team, brought back Gloucester duo Gareth Anscombe and Max Llewellyn, both discarded by Gatland, and is playing Ben Thomas in his usual centre position. Sherratt says he has had to "give himself a talking to about not drowning the players in information", focusing on promoting a couple of clear messages. But there will be a structure. "We have got a clear game plan to make sure players are going in the same direction," he said. "It would be easy to come in, talk about exciting the crowd, but we can't be reckless. "I've been coaching long enough to know if your foundations aren't in place, the rest of your game isn't going to show. "It has to be within a system, not 15 blokes trying to do their own thing. That's been this week's challenge."

  This video can not be played To play this video you need to enable JavaScript in your browser. Why Ireland are 'overwhelming' Six Nations title favourites

  Some parts of Ireland do not feel Wales will even test their team - with Wales 25-1 to win with some bookmakers in a two-horse race. Ireland, who have won seven of their last eight Tests against Wales, are ranked second in the world and can clinch the Triple Crown in Cardiff on their quest to becoming the first side to win three successive tournaments. One Irish podcast arrogantly suggested their nation could win with 13 men, give Wales a game with 12 or field their Under-20s side who lost to their Wales counterparts on Friday night. Sherratt smiled when asked about these comments. "I learned the first time I was with Wales about stuff like that when I was referred to as an 'unknown little Englishman' and I deleted my social media quickly," said Sherratt. "I respect Ireland. They are a well-coached team with good players. "Cardiff is a hostile place to come on a Saturday afternoon and there will be 15 players on the field desperate to represent their country. "That's all we're focused on, not any outside chat." Ireland will wear white shirts in order to help supporters impacted by colour blindness. They might not be sporting their traditional green jerseys but Sherratt knows their distinct identity remains. "If you think about Ireland, if they were outside the window now playing in different colour shirt, I could say within five minutes that was them," said Sherratt. "You can close your eyes and see how they play with their connected shape. "Our challenge as a Welsh squad is make sure we stand for something and have a clear identity."
