  It is hoped the new man can at least offer a feel-good factor sorely lacking in the past 18 months. "The word opportunity is one we used when speaking to the players," said Sherratt. "It's easy to get sucked into negativity. There's a group of players with lots of heart and pride about playing for Wales. "I want them to bring their personality and be brave if they see space, even if there's an error. "Anxiety in any sport is the biggest killer of performance, so it's trying to remove that, free the players up so they are not weighed down by expectation. "I want to make sure they feel comfortable in their own skin and we enjoy being here." Sherratt believes he has been able to offer some external perspective. "Sometimes when you're on the outside looking in, you see more clearly," he said. "What I could see was there was lots of effort being put in by players, almost desperation at times to do well for their country. "Sometimes when you're desperate for a win and have emotion, effort can be misplaced."

