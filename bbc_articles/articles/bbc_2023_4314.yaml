content: |-
  Dozens of people have died after two trains collided in northern Greece, emergency services say.

  Drone footage shows the aftermath of a deadly train crash near the city of Larissa, in northern Greece.

  Dozens of people were killed, with many more injured according to emergency services.

  More on this story: Survivors describe 'nightmarish seconds' as trains crashed
