  Chelsea could let Mykhailo Mudryk leave the club in January, Arsenal start Gabriel contract talks and AC Milan make contact with ex-Dortmund boss Edin Terzic. Chelsea are open to letting Ukraine winger Mykhailo Mudryk leave the club in January, with French club Marseille interested in the 23-year-old. (Teamtalk), external Arsenal have opened contract talks with 26-year-old centre-back Gabriel Magalhaes, although talks with the Brazil international are in the early stages. (Football Insider), external Denmark playmaker Christian Eriksen was linked with leaving Manchester United in the summer, but the 32-year-old, who has one year left on his contract, says he did not consider leaving the Old Trafford club. (Mail), external Real Sociedad and Spain midfielder Martin Zubimendi, 25, regrets not moving to Liverpool and wants the Reds to come back in for him. (Estadio Deportivo - in Spanish), external AC Milan adviser Zlatan Ibrahimovic has contacted former Borussia Dortmund boss Edin Terzic, with the Serie A side's manager Paulo Fonseca - who was appointed in the summer - already under pressure after a poor start to the season. (Sky Sports Germany), external

  Inter Milan president Giuseppe Marotta says the club were close to signing Manchester City and Norway striker Erling Haaland, 24, when he was 15, only for red tape to scupper the move. (Football Italia), external Arsenal could lose 25-year-old Japan defender Takehiro Tomiyasu in January, with Inter Milan, Napoli and Juventus interested. (Sun), external England left-back Ben Chilwell is still expected to leave Chelsea in January, despite the 27-year-old returning to first-team training after failing to secure a move in the summer. (Football Insider), external Chelsea could appoint Sachin Gupta, who is the executive vice-president of basketball operations for NBA side Minnesota Timberwolves, to a role at the Stamford Bridge club. (Athletic - subscription required), external Newcastle United are monitoring Chelsea's 18-year-old right-back Josh Acheampong and could try to make a move for the England Under-19 international. (i newspaper - subscription required), external
