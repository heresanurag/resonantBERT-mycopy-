id: bbc_2018_3466
title: North Korea 'will refrain from missile tests' - BBC News
date: '2018-03-09'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-43340202
content: |-
  South Korean national security adviser Chung Eui-yong says President Trump will meet Kim Jong-un by May.

  The head of a South Korean delegation that has held unprecedented talks in North Korea said US President Donald Trump had agreed to meet North Korean leader Kim Jong-un by May.

  Speaking at the White House, Chung Eui-yong said Mr Kim had offered to refrain from any further nuclear and missile tests.

  He praised Mr Trump's uncompromising stance on the North's nuclear and missile programme.
