  The first evening session of the Olympic athletics programme gets under way from 17:00 BST on Friday. Ugandan world record holder Joshua Cheptegui will be among the athletes chasing gold in the men's 10,000m final. Before then, Great Britain's gold medal hope Keely Hodgkinson, Tokyo fourth-place finisher Jemma Reekie and teenage sensation Pheobe Gill will each be in action in the women's 800m heats from 18:45 BST. GB's 4x400m mixed relay team are also in action and Scott Lincoln will seek to make the men's shot put final.
