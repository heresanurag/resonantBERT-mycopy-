  Lisette Angulo identified herself as the elder sister of the shooting's other 14-year-old victim, Christian Angulo. In a GoFundMe page aimed at raising money for the funeral, she said her brother was "a very good kid and very sweet and so caring". She went on to say the boy was "loved by many", describing her heartbreak at her loss. Speaking to the Washington Post, his father, Ismael Angulo, said he nicknamed his son "murcielaguín", which is Spanish for little bat. He told the newspaper that his son loved to visit relatives in Mexico and play school. "What can I say," Mr Angulo said of his son's death. "It's difficult." Schoolmates remembered Christian as funny and with a "chill" attitude, Fox 5 Atlanta reported. One friend who said the two had been close since middle school said he was "in denial" after hearing about the deadly shooting.

