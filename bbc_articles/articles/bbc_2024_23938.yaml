content: |-
  Students Mason Schermerhorn and Christian Angulo were killed, as were teachers Christina Irimie and Richard Aspinwall.

  A 'very sweet' boy and a talented dancer among Georgia dead

  Maths teachers Cristina Irimie and Richard Aspinwall were among the four killed

  Four people have been killed and nine others injured in a shooting at Apalachee High School in the city of Winder, Georgia. Officials have identified the deceased as students Mason Schermerhorn and Christian Angulo and teachers Cristina Irimie and Richard Aspinwall. The 14-year-old suspect was arrested and will be prosecuted as an adult. Here is what we know about the victims of the attack.

  Mason Schermerhorn was one of two 14-year-olds who were killed. In an interview with the Washington Post, his 17-year-old sister Alanna remembered him as "very energetic and kind." She said he was "sympathetic for people". He loved to play video games with her and their little brother, Gavin, like Super Mario Party on Nintendo Switch, Alanna said. He also covered his bed in stuffed animals and collected rubber ducks. “I wasn’t expecting him to be one of the people killed,” Alanna told the newspaper. “I’m just numb.” Friends of the child's mother told the New York Times that he had recently started at Apalachee. He was described as light-hearted, and enjoyed reading and visiting Walt Disney World. Mason had an "upbeat attitude about everything", Doug Kilburn told the newspaper. Another friend, Louis Briscoe, described the moment he heard of the boy's death from his mother, commenting: "Nobody should have to go through this type of pain." Before he was killed, Mason had texted his mother during the shooting to say that he was safe and sheltering inside a restroom, a chaplain who works with his mother told Fox News.
