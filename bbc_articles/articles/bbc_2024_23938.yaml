  Christina Irimie was one of two teachers killed in the shooting. The 53-year-old is named on the Apalachee High School website as a maths teacher. On the day of the shooting, she reportedly was celebrating her belated birthday with her students and had brought in desserts and treats for the classroom. Students described her as patient and caring, Fox 5 Atlanta reported. Ms Irimie was born in Romania and had come to the US more than two decades ago, a parish priest at a local Romanian Orthodox Church told the Atlanta Journal-Constitution newspaper. Nicolae Clempus said she was someone “you know you can count on” and was a talented dancer who taught traditional Romanian dance to children. “She definitely had a gift to work with young people,” the priest said. In a separate interview with CNN, Mr Clempus said his parish is grieving her death. “We are frustrated that she faced the evil on the front lines and basically gave her life being there, facing the wrath of a person that – for I don’t know what reason – did this thing,” he said. "It is unfair how things evolved and how it happened, and we are very, very sorry for the way we have to say goodbye.” One of her students told BBC's US partner CBS News that she was a "real nice" teacher, who liked to tell "corny jokes" and always made him feel confident. “She never made me feel dumb,” Isaac Sanguma said. “You could get a question wrong on the board, and she’s not going to make you feel dumb. She will make you feel welcome.” A GoFundMe launched to support her family says Ms Irimie "dedicated her life to shaping the minds and hearts of students and the community".

  A second maths teacher, 39-year-old Richard 'Ricky' Aspinwall, was also killed. He was also the defensive coordinator for the school's American football team. The head coach praised him as "a great dad, man and a great father". "He loved his two girls and he loved his wife," said coach Mike Hancock. "He did happen to love the game of football and he was well respected around this area." His cousin, Katie Seagraves, took to social media to remember Mr Aspinwall, writing that he was a "great father and loved his job so, so much". "I’m so mad and sad that he was taken away for no reason and his sweet girls and wife no longer have him," Ms Seagraves wrote. "My heart breaks so bad. This one hurts." He has also received tributes from his sporting peers. Nearby Mountain View High School identified Mr Aspinwall as its former teacher and coach, saying its "thoughts and prayers" were with his family. Brandon Gill, the football coach of nearby Buford High School, wrote on social media that Mr Aspinwall was a "helluva human being" who "would do anything for anyone." He was an "amazing husband, father, teacher and coach", he added. A football game scheduled for this weekend has been postponed in the wake of the shooting.

  As well as the four people who were killed, eight students and a teacher were wounded. The teacher was identified by his daughter as David Phenix. He has a role in curriculum assistance, according to the school's website. His daughter said he underwent surgery after being shot in the hip, and that she felt "so, so lucky" he had survived. Little has been revealed about the eight children who were injured. Police say all those who were hurt in the attack are expected to recover.

