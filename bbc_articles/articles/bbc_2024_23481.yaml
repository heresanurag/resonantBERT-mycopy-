title: 'Sinn Fein ard fheis: ''Jury still out'' on government, says Michelle O''Neill
  - BBC News'
date: '2024-09-28'
section: General
url: http://www.bbc.co.uk/news/articles/cq5e3lzelpwo
content: |-
  The Sinn Féin deputy leader was speaking at the party's annual conference in Athlone.

  'Jury still out' on new UK government, Michelle O'Neill says

  The "jury is still out" on the new UK government, Northern Ireland's First Minister Michelle O'Neill has said. The Sinn Féin vice-president was speaking at the party's annual ard fheis (conference) in Athlone. It is Sinn Féin's first conference since O'Neill became first minister of the Northern Ireland Executive - the first Irish nationalist to hold the role. Calling for a further devolution of powers to Stormont, she said the first actions of the new Labour government have been more "broken promises".

  Michelle O'Neill says the four main parties at Stormont are "working together with a unity of purpose"

  Northern Ireland's power-sharing institutions were restored in February after a two-year hiatus. Addressing party members on Friday evening, O'Neill said the four parties in the devolved administration are "working together with a unity of purpose". "And we are determined to deliver good public services, good governance, economic growth and strong communities that we all depend on," she added. O'Neill said the change of government in July offers "an opportunity to improve Irish-British relations". But she said "the jury is certainly still out" on how the government will meet its commitments under the Good Friday Agreement. "Their initial actions demonstrate more of the same - failed austerity and broken promises," she added.

  O'Neill was critical of the government's decision to cut winter fuel payments

  Criticising Labour's plans to cut winter fuel payments, she said that "financial limitations" placed on the Stormont executive "restrict our ability to be able to act". "So further financial powers are required," the Sinn Féin deputy leader added. "But it all points to one thing. That it's only through governing ourselves can we build a better future. "All powers and all decisions should be taken here at home on this island."

  O'Neill says the party's Westminster success "demonstrates that Sinn Féin can reaffirm our mission and that change can happen"

  In July, Sinn Féin became Northern Ireland's largest party at Westminster, although its MPs do not take their seats. The Irish republican party is also the largest at Stormont and at local council level, and is the main opposition party in the Republic of Ireland. It is aiming for a place in the Irish government for the first time following the next general election, which could be just months away. But the party has slipped in recent opinion polls in the Irish Republic, and underperformed against expectations in June's local and European elections. O'Neill said the party was "ready to fight the general election when it’s called". She said the party's Westminster success "demonstrates that Sinn Féin can reaffirm our mission and that change can happen". The Sinn Féin deputy leader said the party's "goal is a united, inclusive Ireland". In her speech, O'Neill also called for the government's pledge to repeal the Troubles Legacy Act to be "delivered in full". She also reaffirmed her party's commitment to the Casement Park GAA stadium project in west Belfast. Sinn Féin president Mary Lou McDonald is due to give a keynote speech to close the ard fheis on Saturday.

  If there is one thing Sinn Féin dislikes, it's partition. But when it comes to opinion polls on the party, the landscape looks divided. In Northern Ireland, Sinn Féin is riding high as the most popular party, securing the most seats at Stormont, Westminster and in local councils. But in the Republic of Ireland, its approval ratings have been sliding. With a general election perhaps just weeks away, the prospect of Sinn Féin entering government for the first time could slip from its grasp. But Sinn Féin, an Irish republican party which wants a united Ireland, has bounced back before and is aiming to do so again. In recent months it has sought to clear up its policy on immigration - considered one factor in recent underwhelming electoral performances in the south. And at this ard fheis, a big focus has been refocusing on key policy areas where it feels strongest, such as housing. Sinn Féin's conference slogan this year is "time for change". When the time comes, will voters agree?

  You can watch Mary Lou McDonald's speech at the Sinn Féin ard fheis and follow live coverage on the BBC News NI website from 18:00 BST.
