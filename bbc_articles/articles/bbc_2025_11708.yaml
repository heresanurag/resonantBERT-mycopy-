title: UK sends more RAF jets to Middle East as PM urges de-escalation - BBC News
date: '2025-06-15'
section: Politics
url: http://www.bbc.co.uk/news/articles/ceqg440v0gxo
content: |-
  Sir Keir Starmer said aircraft are being deployed amid intense fighting between Israel and Iran.

  More RAF jets are being sent to the Middle East amid intense fighting between Israel and Iran, the prime minister has said. Sir Keir Starmer said the military aircraft, including Typhoons and air-to-air refuelers, were being sent "for contingency support across the region". He said the situation was fast-moving and there were ongoing discussions with allies, adding: "The constant message is de-escalate." The UK last announced it had deployed jets to the region last year, when the government said British aircraft had been playing a role in preventing escalation.

  Sir Keir made the remarks as he travelled to Canada for the G7 summit, where he said the weekend's "intense" developments would be further discussed. He later met Canadian Prime Minister Mark Carney – a former Bank of England governor - in Ottawa for talks on security and trade. Both will head later to the Canadian province of Alberta for the summit, with the Middle East uppermost on the agenda. German Chancellor Friedrich Merz, French President Emmanuel Macron and US President Donald Trump are among those gathering there for three days of talks.

  The two prime ministers visited a pub in Ottawa

  The prime minister is neither ruling in nor out the prospect of British jets helping Israel – as happened in both April and October last year. Iran has warned the UK, France and America that were they to support Israel, their ships and bases in the region would be regarded as legitimate targets. "We've already been moving assets to the region, including jets, and that is for contingency support across the region," Sir Keir told reporters. "Our constant message is de-escalate, and therefore everything we're doing, all discussions we're having are to do with de-escalation." The prime minister would not be drawn on whether the UK would be involved in defending Israel. "I had a good and constructive discussion with Prime Minister [Benjamin] Netanyahu yesterday [Friday], and that included discussions about the safety and security of Israel, as you would expect, between two allies," he said. He reiterated that the UK had "long-standing concerns" about Iran's nuclear programme and recognised Israel's right to self-defence. Speaking on the BBC's Sunday with Laura Kuenssberg programme, Chancellor Rachel Reeves would not comment on where the British jets had been sent exactly. But she said it was a "fast-moving" situation and it would be a "dereliction of duty" to not do everything possible to protect UK personnel and bases in the Middle East. "It's right as a precautionary measure to send assets including jets," Reeves said. When asked how the UK might support Israel militarily, Reeves said "the thing that we have done in the past is defend Israel from attacks". "We have never been we've never been involved in attacking with Israel," she said. "Those two things are very different." The chancellor said "Israel has a right to defend itself" and that the UK was "very concerned about Iran's nuclear ambitions". She urged British nationals in the region to follow Foreign Office advice, which she said was "likely to change as the situation on the ground changes". On Sunday, the Foreign Office advised against all travel to Israel and the Occupied Palestinian Territories, warning of a "fast-moving situation that poses significant risks". It said those already there should check Israel's Home Front Command for the latest guidance and follow instructions from the Israeli government. Appearing on the same programme, shadow chancellor Mel Stride said it was "the right thing" for the UK to send jets. He said "we've got assets out there they need to be protected given Iran has suggested they might be under threat". Asked if he supported Israel's action against Iran, Stride said: "Yes, on the basis we can't allow Iran to be able to become a nuclear power".
