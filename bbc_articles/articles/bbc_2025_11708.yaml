  • None What we know about Israel's attacks on Iran Sir Keir spoke to Saudi Arabia's Crown Prince Mohammed bin Salman on Saturday afternoon, Downing Street said. "They discussed the gravely concerning situation in the Middle East and agreed on the need to de-escalate," a spokesman said. Iran launched a fresh attack on Israel on Saturday night, while the Israeli military said it was continuing to strike military targets in Tehran. Iran's President Masoud Pezeshkian has threatened a "more severe" response if Israel doesn't stand down. Israel's Defence Minister Israel Katz earlier warned that "Tehran will burn" if Iran continues to launch missiles. Iranian state TV reported 60 people had been killed in a strike in Tehran, while in Israel, officials said three people had been killed and dozens injured in strikes. Washington DC and Tehran were due to resume talks on Iran's nuclear programme on Sunday, but the talks have now been cancelled, mediator Oman said.
