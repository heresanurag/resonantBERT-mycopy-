title: Mina Smallman says she's using her anger over the selfies to drive her in reforming
  the Met Police - BBC News
date: '2024-07-22'
section: General
url: http://www.bbc.co.uk/news/videos/c99wxel0ge9o
content: |-
  Mina Smallman says she has forgiven the killer of her daughters, but not the officers who took selfies with their bodies.

  The mother of Nicole Smallman and Bibaa Henry, who were murdered in June 2020, has told the BBC that she has not forgiven the two police officers who took photos of their bodies.

  Mina Smallman told Today's Emma Barnett that she has forgiven the killer, but was using her anger over the selfies the officers took to drive her in reforming the Met Police.

  You can hear more from Ms Smallman's interview on Today here.
