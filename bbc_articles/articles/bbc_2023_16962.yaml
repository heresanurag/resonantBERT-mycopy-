content: |-
  Rishi Sunak says the speech lays out a vision for a "better Britain" - but Labour says it's "more of the same".

  What's going on with North Sea oil and gas projects?

  Earlier this year, the government issued 100 new licences for companies to explore for more oil and gas in the North Sea - and it is now clear this is not a one off. Today's speech shows the government is committed to promoting the UK's homegrown fossil fuels sector to provide a more reliable and cheaper source of energy. But this assumption, that drilling for more oil will produce lower bills, is a contested one. Any fuel taken out of the North Sea is not guaranteed to be used domestically. First off, some 80% is exported to international refineries as we do not have capacity here, and it will all be traded on global markets as our oil and gas fields are not publicly owned - so we will have to pay like everyone else. Another point of contention is whether opening new oil and gas fields will still mean that the UK is in line with its climate targets. The government's advisers, the UK Committee on Climate Change, as well as the International Energy Agency, have both recognised that fossil fuels will continue to play a role in our economies for decades. But the UKCCC have said this did not "in itself justify the development of new North Sea fields".
