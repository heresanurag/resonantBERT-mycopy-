title: Officer calls parents on Florida teen driving 132mph (212km/h) - BBC News
date: '2023-08-03'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-66400461
content: |-
  The teen was going double the posted speed limit and the officer dialled up his father right away.

  A police officer in Florida published dashcam footage of pulling over a 16-year-old driving his dad's car at 132mph (212km/h). The teen was clocked going double the posted speed limit.
