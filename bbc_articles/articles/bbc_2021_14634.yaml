title: Lucy Dyer jailed for killing baby in Llanelli drink-drive crash - BBC News
date: '2021-11-15'
section: Wales
url: http://www.bbc.co.uk/news/uk-wales-59290457
content: |-
  Six-month-old Eva Maria Nichifor was in a car which was hit by 23-year-old Lucy Dyer.

  Eva Maria Nichifor was described as "the apple of her parents' eye"

  A woman who caused catastrophic brain damage to a baby in a drink drive crash has been jailed for four years.

  Lucy Dyer, 23, of Heulwen Terrace, Llanelli, admitted death by dangerous driving and drink-driving at Swansea Crown Court.

  Dyer drove into the side of a car carrying Eva Maria Nichifor on 8 October in Llanelli, Carmarthenshire after drinking in local pubs.

  Eva's parents Florin and Carmen said they were "distraught by her loss".

  Her parents had previously paid tribute to their baby with her mother speaking of her "indescribable pain".

  In a statement read to court, her parents said: "I came to this country to ensure a better life for my family and ended up tearing it apart.

  "Since this tragedy has happened I couldn't sleep. I eat very rarely and when I close my eyes we only see her.

  "In the house where we live we can't see our place there without our little Eva because everywhere we look we see only memories of her, how happy she was with us, and how we learned with her what happiness means."

  Prosecutor Carina Hughes said on the night of the crash Dyer had behaved in a "merry" and "boisterous" way according to onlookers at the Carwyn James pub, and had to be stopped by door staff from taking her drink outside with her.

  Ms Hughes said: "When she was told she could not take the drink from the premises she downed it and handed the empty glass to door staff.

  "Despite drinking the defendant got into her BMW," she added.

  Witnesses told police they saw Dyer driving at speed and that she did not brake as she reached the junction at Heol Goffa where she was supposed to give way.

  After colliding with the family's car, Dyer ran down the road before returning to the scene and sitting on a grass bank with her cousin who had been in the passenger seat when the accident happened.

  Ms Hughes said: "The impact caused Carmen to exit the car holding her baby Eva Marie and screaming for help.

  "Witnesses at the scene called the emergency services and a family living on the street assisted. A Miss Evans took hold of the baby who clearly had sustained a head injury.

  "Carmen was so distraught she dropped to her knees and was naturally inconsolable.

  "Miss Evans confirms that since the accident she has had difficulty sleeping. She states that, 'every time I close my eyes I can hear the mother's screams', and says she sees Eva Marie."

  Dyer had been drinking in a nearby pub before driving home and killing Eva in the crash

  Police arrived at the scene and approached Dyer who they said smelled of alcohol and was in "visible distress".

  She told officers at the scene she had had two glasses of vodka and lemonade.

  Eva was taken to University Hospital Wales, Cardiff, where it was discovered she had suffered a brain stem injury and needed life support.

  She died the following day.

  Dyer was breathalysed at the scene of the accident which recorded 65 micrograms of alcohol per 100ml of breath - the legal limit is 35 micrograms.

  Dyer was also disqualified from driving for five years and ordered to take an extended driving test.

  Kate Williams, defending, said her client accepted responsibility for her actions.

  Dyer, who had written a letter to the court saying she was "truly sorry" and that the "guilt will stay with her forever", cried throughout the proceedings.

  Ms Williams said: "With some tragic irony she had gone out that evening because it was the anniversary of her own father's death and her cousin had asked her to go out to take her mind off that.

  "She decided to have a few drinks and make that terrible decision to get in her car and drive."

  Dyer failed to give way at this crossroad, causing the fatal crash

  The court heard how Dyer had no previous convictions or driving penalties and is a single mother of a young boy with autism.

  Dyer has been in custody since a previous hearing due to threats made to her from the local community.

  Senior crown prosecutor for the Crown Prosecution Service (CPS), Emma Myles, said: "This is a heart-breaking case which has had a profound impact on everyone involved in it.

  "The life of a baby was ended when it had barely begun but, for the short and precious time that she was with them, Eva Maria was the apple of her parents' eye, and her loss is immeasurable.

  "Our thoughts are with Eva Maria's family.

  "Lucy Dyer, who is herself a mother, will have to live with the consequences of her actions that night for the rest of her life."
