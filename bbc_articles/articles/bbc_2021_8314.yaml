content: |-
  Day two of the Tokyo 2020 Olympics brings Team GB's first medals with taekwondo silver for Bradly Sinden and Chelsie Giles winning judo bronze.

  This video can not be played To play this video you need to enable JavaScript in your browser.

  Bradly Sinden claimed taekwondo silver on day two of the Tokyo Olympics after Chelsie Giles won Team GB's first medal of the Games with judo bronze. In the men's -68kg event, 2019 world champion Sinden was beaten in a dramatic final by Uzbekistan qualifier Ulugbek Rashitov. Giles, competing at her first Olympics, finished third in the -52kg event, beating Switzerland's Fabienne Kocher to win bronze. Earlier, Sinden's team-mate and two-time defending Olympic champion Jade Jones fell to a shock defeat in the opening round of the women's -57kg taekwondo. Jones, the gold medallist in both London and Rio, was stunned by Kimia Alizadeh of the refugee team. That came moments after Andy Murray, also a two-time Olympic champion, pulled out of the defence of his singles title with a minor thigh strain. He will still continue in the men's doubles, alongside Joe Salisbury, after they won their opener on Saturday. Elsewhere, Adam Peaty won his 100m breaststroke semi-final in 57.63 seconds as he looks to win a second successive gold in the event on Monday. Meanwhile, Olympics organisers have cancelled two days of rowing with adverse weather conditions expected to hit Japan's capital. That news comes on the same day an extreme weather policy was activated in the tennis tournament, with temperatures reaching 32C in Tokyo on Sunday, leading the International Tennis Federation (ITF) to trigger measures to give competitors more protection.

  Here's a round-up of other news on the second day.

