  There's 21 gold medal events as the Olympics gets into top gear, with Adam Peaty looking to become the first British swimmer to retain an Olympic title.
  • None Swimming: World record holder Peaty, 26, qualified fastest and will race in the final at 03:12 BST on Monday.
  • None Triathlon: Before Peaty's bid for history, GB's Jonny Brownlee and Alex Yee tackle the triathlon, which is expected to finish just before 1:00.
  • None Diving: Remember young Tom Daley? Well, he's now 27 and starting his fourth Olympics - paired with Olympic debutant Matty Lee in the 10m synchro event (07:00-08:00).
  • None Gymnastics: Hosts Japan will hope to successfully defend their team title (11:00-14:10).
