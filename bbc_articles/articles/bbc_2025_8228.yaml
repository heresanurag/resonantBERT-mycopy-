  Most of Tuesday's front pages lead with the latest turmoil on the world's markets.

  'New China tariff threat' and 'gift of life'

  Grace Davidson (centre) who received a womb in the UK's first womb transplant has given birth to a baby girl

  Several papers lead on the baby who's become the first in Britain to be born from a transplanted womb. "Gift of Life" is the Daily Mirror's, external headline as it pictures the mother, Grace Davidson, smiling alongside her sister, who donated her womb. In an interview with the Daily Mail, external, Grace describes having her first period two weeks after the transplant, and crying with her husband after their positive pregnancy test. For the Daily Express, external, it's a great testimony for NHS work that will bring hope to women. In other domestic news, the Sun, external reports on Manchester City star Jack Grealish who was allegedly slapped in the face by a Manchester United fan at Old Trafford.

  Elsewhere, the Financial Times, external says President Donald Trump's threat to hike duties on Chinese imports is an escalation of a trade war that's triggered mounting fears of a recession. For the Daily Telegraph, external it quotes Trump, in its headline, "Don't Be A Panican". The president says the term refers to "a new party based on weak and stupid people" - as the paper reports that it's an apparent reference to Republicans panicking about the US economy. In the Times, external it says there's a split in the White House between those who see the measures as a part of a long-term re-orientation of the US economy, and others who want them to be a negotiating tool, for cutting trade deals. The Daily Star, external recalls the Liz Truss mini-budget by mocking up Trump as a lettuce, on its front page. Finally, the main editorial in the Guardian, external says the new economic era will require 'strategic boldness' from a habitually cautious prime minister.

