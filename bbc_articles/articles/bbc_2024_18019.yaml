title: Pet python found after escape into Banchory art gallery - BBC News
date: '2024-08-01'
section: Scotland
url: http://www.bbc.co.uk/news/articles/c3gvq2gzp92o
content: |-
  The 3m snake slithered through a vent and entered the gallery in Banchory, Aberdeenshire.

  This video can not be played To play this video you need to enable JavaScript in your browser. Mr Wolski is relieved the incident has now been wrapped up

  A pet python has been found after it managed to escape into an art gallery in Aberdeenshire. The 3m (10ft) long snake - named Bodhi - is kept at a property above Studio 1 shop and gallery in Banchory. The snake found its way into a vent, entered the gallery and knocked over several items while the gallery was closed on Monday. Bodhi's owner Martin Wolski worked out the snake's location after seeing the mess through the shop window.

  Mr Wolski saw there had been disruption caused in the gallery

  The five-year-old female is a reticulated python and is native to south east Asia. Mr Wolski told BBC Scotland News he felt "quite a bit of stress" when Bodhi escaped. He said: "She reached behind my line of view and escaped under the furniture and there was a vent there, and that vent led her into this shop.

  "I went outside, to consider options, I noticed a few things were knocked down from the shelves." He said he contacted the gallery owners and within two hours Bodhi was back home. Mr Wolski added: "I found that vent and blocked it so nothing like that can happen again."

  The gallery's Viv Kerridge has no fear of snakes

  Studio 1's Viv Kerridge said Bodhi made "quite a mess" of the shop. She added: "There were a few things from high shelves on the floor, things scattered around. She took a liking to one of the handbags. "Fortunately I have no phobia of snakes. We're just glad she wasn't hurt. "We've always said we're dog friendly, now we're snake friendly too."
