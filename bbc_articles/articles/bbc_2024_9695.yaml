title: Human remains in Croydon park identified as Sarah Mayhew - BBC News
date: '2024-04-08'
section: London
url: http://www.bbc.co.uk/news/uk-england-london-68763528
content: |-
  Police were called to Rowdown Fields in Croydon on Tuesday morning where human remains were found.

  Police are supporting Ms Mayhew's family, the Met said

  Human remains found in a park in south London have been identified as those of 38-year-old woman Sarah Mayhew.

  Police were called to Rowdown Fields in Croydon on Tuesday morning where Ms Mayhew was discovered.

  A man, 44, and a woman, 48, were arrested on Saturday and both remain in custody.

  The Metropolitan Police force said Ms Mayhew's family have been told and are being supported by officers as the investigation continues.

  Det Insp Martin Thorpe said: "My thoughts are with Sarah's family as they deal with this heartbreaking news.

  "No family should have to lose a loved one in such tragic circumstances, and we will continue to provide our support as our investigation progresses.

  "The two people in custody were known to Sarah and at present we are not looking for anyone else in connection with her death."

