title: Former policeman jailed for Jedburgh car crash murder bid - BBC News
date: '2024-10-10'
section: UK
url: http://www.bbc.co.uk/news/articles/cq5e9dqxzy5o
content: |-
  William McBurnie tried to kill his ex-partner and her mother at a funeral home in the Borders.

  This video can not be played To play this video you need to enable JavaScript in your browser. Watch: Ex-policeman crashes into shop in attempt to murder ex-partner

  A former police officer has been jailed for 11 years after he admitted attempting to murder his ex-partner and her mother at a funeral home in the Scottish Borders. William McBurnie drove his car at speed through the front window of Zoe Turnbull's office in Jedburgh a few months after she had ended their relationship. The 57-year-old former detective was appearing at the High Court in Livingston for sentencing. Judge Lord Mulholland told McBurnie he had used his car as a "lethal weapon" and his conduct had been "cowardly and reckless".

  He said: "You are fortunate you are not facing a murder charge." McBurnie had been working as a freelance press photographer in Jedburgh since relocating from his native Northern Ireland where he previously worked as a police officer in Belfast. He had formed a relationship with Ms Turnbull, but she had broken up with him during the summer of 2022.

  Following his sentencing, the 46-year-old businesswoman said: "Finally, after two years of physical, emotional and practical chaos, we have justice. "McBurnie was the Jekyll and Hyde of Jedburgh - charming in public but dangerous behind the scenes. "I believe the attempt on my life happened because he knew he was losing his grip on me and this extreme act was some warped and cowardly attempt to control things." She described him as a "forceful monster" and said she and her mother hoped to put the "painful chapter" behind them. Ms Turnbull urged anyone in a similar situation to speak up and get help. McBurnie had been drinking on the morning of 7 December 2022, and was nearly three times over the alcohol limit when he drove at speed through the window of the town centre funeral home. The vehicle narrowly missed Ms Turnbull and her 71-year-old mother, Beverley, but it left both with life-changing conditions. Ms Turnbull suffered hearing loss and injuries to her back and legs, while her mother experienced two cardiac arrests in the hours after the crash. She continues to suffer from atrial fibrillation, breathlessness and fatigue.

  Zoe Turnbull described McBurnie as "controlling" during their two-year relationship

  CCTV footage from inside the funeral directors was previously played at the High Court in Livingston after McBurnie pleaded guilty. It showed his car being driven at speed past a give-way sign, before mounting a pavement, crashing through two flower planters and then smashing through the large office window. The footage also showed Ms Turnbull and her mother pressing themselves against side walls to avoid the impact. The court heard that McBurnie had been struggling to come to terms with the end of the relationship and had said he had been drinking heavily for four months. Gareth Jones, defending, said his client had expressed "genuine remorse" for his actions and only had a vague recollection of what had happened. He also expressed shame and guilt but appreciated that his present position was entirely of his own doing.

  CCTV footage showed how McBurnie had smashed through a large office window

  Moira Orr, who leads on homicide and major crime for the Crown Office and Procurator Fiscal Service, said: "This was an extremely reckless act which could have had devastating consequences had it not been for the swift actions of William McBurnie’s former partner. "Our thoughts and best wishes remain with both women as they continue to deal with the lasting trauma caused by this individual." She added that the conviction reaffirmed its commitment to prosecuting such crimes. Lord Mulholland placed McBurnie on an extended sentence of a total of 13 years, including two years of supervision on his release from prison. In addition, he was banned from driving for 16-and-a-half years and issued with indefinite non-harassment orders concerning both women.
