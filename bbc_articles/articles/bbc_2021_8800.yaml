  That investment hasn't been without sacrifice. Peaty became a father in September when his partner, Eiri Munro, gave birth to their son, George. It provided him with a new perspective on life and a focus away from the pool, but even more motivation to achieve. "Being a father, all that emotional energy - I just can't think straight of how much I've done it for them," said Peaty. "I can look him in the eye and say all that time I had to go training and leave him, and all that time I had to leave her in difficult situations, it's all been worth it." Back home in the early hours on Monday, his little boy was watching his daddy do what he does best. Any routine his parents had him in was thrown out of the window as George sat with his mum to watch, "very confused as to what was going on" but excited all the same. "It was amazing. It's going to be something we will remember for the rest of our lives," Munro told the BBC's Olympic Breakfast. "It means everything." Back in Uttoxeter, where Peaty was born and raised, his parents, Mark and Caroline, were also watching (on an alternative channel, but we'll let that slide...). His mum had set her alarm for 02:30, waking "feeling sick and nervous". While the Peaty household is usually a noisy one, this time there was silence. "Both of us knew it was going to be close and both of us were really quiet," she said. "I was pushing myself back into the sofa because I was petrified." Peaty will come home with one medal - maybe more from the relay events - but his mum is glad one thing won't be returning: the moustache he shaved off after the heats. Munro loved it. But Peaty's mum "wasn't a fan at all". Moustache lost, Olympic gold gained, there's no doubt still plenty to come from Peaty. But when the end arrives, whenever that may be, he won't finish his career with a medal collection so bumper as those owned by Michael Phelps, or athletics' Usain Bolt. It doesn't matter, though, because that has never been an aim. What he craves is immortality; to retire with a swim so good it will never be beaten. Bet against him if you dare.

