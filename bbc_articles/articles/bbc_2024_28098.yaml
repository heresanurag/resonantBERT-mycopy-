content: |-
  Ireland's Katie Taylor defeats Amanda Serrano narrowly on points to retain her light-welterweight title in Texas.

  This video can not be played To play this video you need to enable JavaScript in your browser.

  Ireland's Katie Taylor was booed as she successfully retained her undisputed light-welterweight title with a contentious points win against Amanda Serrano at the AT&T Stadium in Texas. The pair served up another classic in their rematch, with Serrano's relentless volume punching and Irishwoman Taylor's smart countering. Taylor repeatedly leaned in with her head, causing a nasty cut above Serrano's right eye in the fourth round which opened up later in the fight as blood poured down the Puerto Rican's face. The 38-year-old was docked a point for a headbutt in the eighth, which convinced those in attendance that Serrano had done enough to gain revenge for a close points loss in 2022. But all three judges scored the fight 95-94 for Taylor. "I knew it was an absolute slugfest in there, an absolute war," Taylor said as she welcomed a trilogy bout. "I definitely didn't agree with the point deduction. I certainly wasn't fighting dirty. Sometimes it gets rough in there."

  The fight was chief support to 58-year-old Mike Tyson's comeback fight against Jake Paul as Taylor defended her IBF, WBA, WBC and WBO titles, extending her record to 24 wins and one defeat. For seven-division world champion Serrano, 36, it was only a third defeat in a remarkable 51 pro fights. "I knew when it went to the judges it was going to be a little shady," Serrano said. "Every time you get a cut it hurts. You get blood in your eye. She kept headbutting me, but we knew that from the very beginning, the first fight."

  Katie Taylor (right) won via unanimous decision despite an incredibly close contest

  The super-fight was deserving of topping the bill, yet the striking dome-shaped stadium was almost full when the boxers made their ring walks. A smiling Serrano lapped up the applause, dancing her way through a line of Dallas Cowboys cheerleaders. Taylor, in black with gold trim, was more understated in her ring walk but still soaking up the atmosphere as she sauntered down the runway without any real urgency. Serrano began strongly, whipping in a left hook in the closing seconds of round one to buckle Taylor's legs. Bray native Taylor knew all about her opponent's power, having somehow stayed on her feet in a memorable fifth round of the first fight. She once again weathered the storm and landed combinations in the second as the bout began to heat up. Promoter Eddie Hearn, who was not sure whether he would be given accreditation for the fight after criticising the Tyson-Paul bout, watched on at ringside. The challenger complained to the referee about Taylor's excessive holding as both women trading punches in a terrific fifth, Serrano with the accurate blows. The ringside doctor took a look at Serrano after another clash of heads in the fifth, as the crowd gasped at the close-up on the big screen. Serrano valiantly continued, her eyesight hindered as she wiped blood every few seconds. Taylor targeted the damage with left hooks as both boxers threw caution to the wind. Taylor was hurt by an uppercut in the seventh before replying with a two-punch combination. The fight was living up to all the hype, with Serrano's warrior spirit winning over those fans who may not have already been invested in the chief support. After the point deduction, Taylor continued with her punches but so did Serrano. Just like they did at New York's Madison Square Garden, Taylor and Serrano continued to throw hands until the final seconds of round 10. Serrano outlanded Taylor and was more accurate in her punching. She also landed 324 punches over 10 rounds. More than they landed combined in their first fight.

  Taylor improved her record to 24 wins and just one defeat

  Often the sequel is never as good, and while the standard of the first fight would have taken some beating, Taylor and Serrano delivered another masterpiece. Two years on from their first fight in New York, they earn career-high seven figure paydays and remain two of the most recognisable and biggest draws in female boxing. The close nature of a second fight and the controversy over the result sets up the trilogy bout nicely, as Taylor welcomed three-minute rounds for a third fight. In a fight week dominated by the controversial main event, with Paul's foul language and Tyson slapping his opponent, Taylor and Serrano conducted themselves professionally and showcased the best side of the sport. The hope is, though, that having entertained fans with 20 sensational rounds and a rematch being broadcasted to millions globally on Netflix, the Serrano-Taylor rivalry can inspire a generation of boxers and fans.
