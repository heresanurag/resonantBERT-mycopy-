id: bbc_2018_10829
title: Police chase car through Lyon airport - BBC News
date: '2018-09-10'
section: General
url: http://www.bbc.co.uk/news/world-europe-45475786
content: |-
  The airport was closed down and the suspect was arrested.

  One of the biggest airports in France was closed after a car fleeing from police broke through onto the tarmac.

  The driver tried to flee on foot but was surrounded and arrested by officials.
