id: bbc_2017_2638
title: Smoke alarms fail to wake most children - BBC News
date: '2017-02-23'
section: General
url: http://www.bbc.co.uk/news/health-39033679
content: |-
  Researchers are trying to design new smoke alarm sound after it was discovered they fail to wake most children.

  Researchers from Dundee University and Derbyshire Fire Service are looking for 500 families to try out a new smoke alarm sound aimed at children.

  This follows their discovery that most children fail to wake up to standard smoke alarms.
