title: 'Amber Rudd: ''80-90% government time'' spent on no-deal Brexit - BBC News'
date: '2019-09-09'
section: General
url: http://www.bbc.co.uk/news/uk-politics-49625144
content: |-
  MP Amber Rudd explains why she resigned from Boris Johnson’s cabinet and surrendered the Tory whip.

  MP Amber Rudd has quit the cabinet and surrendered the Conservative whip, saying she cannot "stand by" while "moderate Conservatives are expelled".

  Ms Rudd described the sacking of 21 Tory MPs on Tuesday as an "assault on decency and democracy".

  Speaking to Andrew Marr, she said there was not "sufficient concentration and planning" by the government on getting a Brexit deal.
