title: 'Julian Smith: Chief whip attacks cabinet''s post-election Brexit strategy
  - BBC News'
date: '2019-04-01'
section: UK Politics
url: http://www.bbc.co.uk/news/uk-politics-47768884
content: |-
  Julian Smith suggests closer links with the EU were "inevitable" after Conservatives lost majority in 2017.

  This video can not be played To play this video you need to enable JavaScript in your browser. The chief whip, Julian Smith: "The government should have been clearer on the consequences"

  The government should have made clear after the 2017 election that it would "inevitably" have to accept a closer relationship with the EU after Brexit, the Conservative chief whip has said.

  In a BBC documentary, Julian Smith - who manages party discipline - is also critical of the cabinet's behaviour.

  The attack comes as the cabinet is split over whether to move to a softer deal that could mean a customs union.

  No 10 said the prime minister had "never used the term soft Brexit".

  Several cabinet ministers have said agreeing to a customs union would break promises the Conservatives made at the 2017 election while ex-minister Steve Baker said doing so would "shatter" the party.

  MPs will hold further votes later on Brexit options to try and resolve the current deadlock. A customs union with the EU is thought to be the most popular of the ideas under consideration.

  Other options include leaving the EU without a deal on 12 April, a referendum to rule out no deal and a confirmatory referendum on Prime Minister Theresa May's deal.

  This video can not be played To play this video you need to enable JavaScript in your browser. The chief whip: "worst example" of cabinet ill-discipline in British political history

  Culture Minister Margot James told the BBC's Politics Live she was considering voting for the referendum option as although she still believed the PM's deal was the best on offer, the chances of it being approved were "receding".

  In interviews for The Brexit Storm: Laura Kuenssberg's Inside Story, Mr Smith accused ministers of trying to undermine the prime minister.

  He said he witnessed ministers "sitting around the cabinet table... trying to destabilise her [Mrs May]" and described their behaviour as the "worst example of ill-discipline in cabinet in British political history".

  This video can not be played To play this video you need to enable JavaScript in your browser. The treasury secretary says she doesn't fear a no deal Brexit

  Mr Smith said that when his party failed to get a majority in the 2017 election, which ended in a Hung Parliament, "the government as a whole probably should have just been clearer on the consequences of that".

  The parliamentary arithmetic after the poll, he added, meant "that this would be inevitably a kind of softer type of Brexit".

  But Chief Secretary to the Treasury Liz Truss said it was not clear a customs union could get a parliamentary majority, as it does not have the backing of the SNP and some Labour MPs.

  "It's not clear to me that going softer is the way to command support," she told Radio 4's Today, adding "the "answer lies in modifications to the prime minister's deal".

