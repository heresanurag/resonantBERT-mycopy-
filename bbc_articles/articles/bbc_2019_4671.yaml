  Parliament has rejected the withdrawal agreement the UK has negotiated - covering the UK's "divorce bill", guarantees on citizens' rights and contingency plans for the Irish border known as the backstop - with the EU three times.

  European Parliament's Brexit co-ordinator Guy Verhofstadt tweeted that Brexit was a "tragic reality" and urged MPs to find a compromise in Monday's votes.

