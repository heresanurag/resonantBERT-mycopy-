  In an attempt to force the government's hand, MPs will hold their second non-binding vote later on a series of options to see if any of them can command a majority in Parliament.

  Who is the chief whip? The chief whip, whose official title is parliamentary secretary to the Treasury, is appointed by - and answers to - the prime minister. Julian Smith, the MP for Skipton and Ripon, was appointed chief whip by Theresa May in November 2017. His role is to maintain party discipline and attempt to ensure members of the party vote with the government in important debates. Along with the other party whips, he looks after the day-to-day management of the government's business in Parliament. The chief whip is a member of the cabinet. It is customary for both the government and the opposition chief whips not to take part in parliamentary debates.

  None of MPs' eight proposed options secured a majority in the first set of indicative votes on 27 March, but those that received the greatest support were a customs union with the EU and a referendum on any deal.

  Mrs May's deal is opposed by parties including Northern Ireland's DUP - which the government relies upon for support - as well as a group of her own MPs.

  The DUP has said it will not vote for the deal as it believes it could threaten Northern Ireland's place in the UK.

  The party's Brexit spokesman, MP Sammy Wilson, said it would not back it even if Mrs May brings it for a vote in the Commons "1,000 times".

  The Brexit Storm: Laura Kuenssberg's Inside Story will be broadcast on Monday 1 April at 21:00 BST on BBC2
