title: Hedgehogs treated for dehydration at Shepreth Wildlife Park - BBC News
date: '2018-08-24'
section: General
url: http://www.bbc.co.uk/news/uk-england-cambridgeshire-45289427
content: |-
  A specialist treatment centre has an increased number of hedgehog patients due to the hard ground.

  The hot summer has caused an influx of dehydrated hedgehogs to be brought to a specialist hospital.

  Shepreth Wildlife Park in Cambridgeshire has taken in bigger numbers as they struggle to find food in the hard ground.
