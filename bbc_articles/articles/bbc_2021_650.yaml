title: 'Covid-19: Welsh Government update - BBC News'
date: '2021-01-08'
section: Wales
url: http://www.bbc.co.uk/news/live/uk-wales-55586800
content: |-
  Details and reaction as First Minister Mark Drakeford confirms an extended closure of schools.

  Parents and teachers are "frustrated" about plans to keep schools closed until the February half term and concerned about the impact on children.

  Speaking to the BBC Radio Wales phone-in, callers said they felt young people were being "thrown under the bus".

  Others said they were fed up with "bitty information" from the Welsh Government.

  Kaarina Rutta from Sully, Vale of Glamorgan, told the programme she was having to work at night when her four children had gone to bed after home schooling.

  "It's a challenge trying to help all four at the same time and also having in the back of your mind I should also be working and doing other things," she said.

  "I was quite sure that this was going to happen," she added.

  "It didn't come as a surprise I have to say, because the situation is just so bad I think there is no other way out of it at the moment.

  "I just wish we had known earlier on and it would have been easier to plan."

  First Minister Mark Drakeford said it was the "best certainty" he could offer "in a world which is highly uncertain".
