content: |-
  Good weekend weather allows hundreds of balloons to fly in mass ascents.

  The Bristol International Balloon Fiesta is in full swing - with mass ascents, night glows - and even a proposal.

  The annual event has been drawing thousands of people to Ashton Court on the edge of the city.

  Poor weather on Friday put paid to any flying that day, but better conditions over the weekend have led to some stunning scenes over the city and the surrounding countryside.
