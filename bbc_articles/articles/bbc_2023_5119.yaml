content: |-
  Tributes are being paid to the singer, who has died aged 46.

  Cattermole (bottom row, second-left) with his bandmates in around 2000 Image caption: Cattermole (bottom row, second-left) with his bandmates in around 2000

  We'll be closing this live page shortly - but before we go, here's a look back at some of the day's tributes to S Club 7's Paul Cattermole.

  It was announced earlier that the singer had died "unexpectedly" on Thursday, aged 46.

  Quote Message: We are truly devastated by the passing of our brother Paul. There are no words to describe the deep sadness and loss we all feel. We were so lucky to have had him in our lives and are thankful for the amazing memories we have. He will be so deeply missed by each and every one of us. We ask that you respect the privacy of his family and of the band at this time." from S Club 7 statement We are truly devastated by the passing of our brother Paul. There are no words to describe the deep sadness and loss we all feel. We were so lucky to have had him in our lives and are thankful for the amazing memories we have. He will be so deeply missed by each and every one of us. We ask that you respect the privacy of his family and of the band at this time."

  Simon Fuller, the music manager who created the band in 1998, said Cattermole was a "beacon of light for a generation of pop music fans", adding: "He will be greatly missed. We’re all deeply shocked and saddened by this news".

  BBC Radio 2 presenter Vernon Kay described Cattermole's death as "so very sad", and continued: "He always had time for a chat. RIP.”

  TV presenter Lorraine Kelly called the late star "gentle", "shy" and a "lovely man" who was "so looking forward to the S Club 7 reunion". Another broadcaster, Rylan Clark, wrote "sending all the love to you all" under the band's announcement of Cattermole's death.

  From Finland to New Zealand, you've also been sending us your own tributes. One reader from Surrey said he was "heartbroken".
