  Eric Christiansen testifies over the skiing accident that involved the US actress at an upmarket resort in Utah.

  'The first thing I did was observe them on the ground'

  Owens asks Christiansen: "Did you try to figure out what had happened?" Christiansen says he did: "The first thing I did was observe the way they were on the ground. Sanderson's head was uphill, his skis downhill." They were very close to the edge of the run; after the fall, both had their skis below them, still had their boots on and Paltrow was on top Sanderson, he adds. He's asked about what it means having their boots on. Christiansen says this means the following: "They went down with no heavy impact that would knock them over." It would be very difficult to get in that position without someone hitting from behind, he says. The next thing he observed is what they were saying, he says; Paltrow was saying she'd just been hit, Sanderson said she'd just appeared in front of him and that he was sorry.
