id: bbc_2025_6485
title: Hamas rejects Israeli truce disarmament proposal - official - BBC News
date: '2025-04-15'
section: Middle East
url: http://www.bbc.co.uk/news/articles/cdxgy7vwxlxo
content: |-
  The plan also gives no commitment to end the war in return for hostages, a Palestinian official says.

  Armed members of Hamas's military wing took part in hostage handover ceremonies during the recent ceasefire

  Hamas is said to have rejected an Israeli proposal for a six-week ceasefire in Gaza which called for the armed group to give up its weapons. A senior Palestinian official familiar with the talks said the plan gave no commitment to end the war or for an Israeli troop pull-out - key Hamas demands - in exchange for releasing half of the living hostages which it holds. It comes as Israel continues its military offensive in Gaza. A security guard was killed and nine other people were injured in an air strike on a field hospital in Khan Younis, the hospital said. The Israel Defense Forces (IDF) said it struck the head of a Hamas cell.

  A UN agency meanwhile warned that "the humanitarian situation in Gaza is now likely the worst it has been in the 18 months since the outbreak of hostilities". It is six weeks since Israel allowed any supplies to enter through crossings into the Palestinian territory - by far the longest such stoppage to date. UN agencies strongly refute Israel's claim that there is enough food in Gaza to last for a long time and suggest the blockade could breach international humanitarian law. Israel's prime minister said the block on supplies was aimed at pressuring Hamas to release hostages and to extend the ceasefire which expired on 1 March. At the same time, the UN's humanitarian affairs office stated: "Partners on the ground report a surge in attacks causing mass civilian casualties and the destruction of some of the remaining infrastructure that's needed to keep people alive."

  Israel is said to have submitted its latest ceasefire proposal to regional mediators late last week, just days after Prime Minister Benjamin Netanyahu met US President Donald Trump in Washington. A Hamas delegation headed by chief negotiator Khalil al-Hayya then met Egyptian intelligence officials in Cairo. The senior Palestinian official told the BBC: "The Israeli proposal relayed to the movement through Egypt explicitly called for the disarmament of Hamas without any Israeli commitment to end the war or withdraw from Gaza. Hamas therefore rejected the offer in its entirety." It is understood to be the first time that Israel has added Hamas disarmament as a condition for advancing a ceasefire - a red line for the group. The Palestinian official accused Israel of stalling for time, seeking only to retrieve the hostages while prolonging the war. It is believed that 59 hostages remain in Gaza, of whom 24 are alive. On Tuesday afternoon, the spokesman for Hamas's military wing said it had "lost contact" with a group of fighters holding Israeli-American hostage Edan Alexander following what he described as "a direct strike on their location". Abu Ubaida produced no evidence to support the claim and gave no indication of when contact had been lost. Israel has said it avoids hitting locations where it believes hostages are being held. Hamas released a video of the 21-year-old soldier on Saturday, in which he appeared to be speaking under duress as he criticised the Israeli government.

  In Israel, polls suggest a majority of Israelis back a new Gaza ceasefire and hostage release deal

  Recently released hostages related how many were held with them in dire conditions underground. Some are in poor health with untreated injuries. Hamas has said it is ready to return all of those held captive, in exchange for a complete end to hostilities and full Israeli pull-out from Gaza. It previously offered five hostages in exchange for a truce extension but claims to have shown flexibility on the number of hostages to be released. The BBC understands that Egypt has put forward a modified proposal to Hamas which it is now considering. Israeli media had not been anticipating an imminent ceasefire breakthrough. The newspaper Yedioth Ahronoth quoted an unnamed Israeli senior security official as saying: "We assess that there will be a deal within two-three weeks, but right now there are still gaps and the distance is great." "We want to get them to release 19 living hostages. Israel and the United States are co-ordinated, and the military pressure is having an impact," the official went on. "They have a shortage of gas, and the food and the fuel will run out in a few weeks. The big achievement of the residents' return to the northern Gaza Strip has been erased. Pressure from the residents has begun. That's rattled them." Israel resumed its bombardment of Gaza on 18 March and then restarted ground operations, saying it was targeting Hamas. The prime minister said future ceasefire talks would be held "under fire". Since Israel restarted its offensive in Gaza, at least 1,630 people have been killed - bringing the total killed in 18 months of war to 51,000, according to the latest figures from the Hamas-run health ministry. Some 1,200 people were killed and 251 were taken hostage in the unprecedented Hamas-led 7 October attacks which triggered the war, Israel says.

  A Kuwaiti field hospital in southern Gaza said a security guard was killed by an Israeli strike at its northern gate on Tuesday

  On Tuesday morning, Israeli warplanes struck by the gate of the Kuwaiti Field Hospital in al-Mawasi, a crowded tented area for displaced people on the coast near Khan Younis in southern Gaza, hospital spokesman Saber Abu Arar told the BBC. The man killed worked at the site, he said, and those injured were both hospital staff and patients. Three ambulances and some tents used as a reception area were damaged. Graphic footage released by the field hospital on Facebook showed a man covered in blood being rushed away with attempts made to resuscitate him. The IDF said in a statement that it "struck the head of a Hamas terrorist cell and a combat zone commander" outside the hospital, without giving any evidence. It also said a "precise munition" was used to mitigate harm in the area. The attack comes after the UN Secretary General, António Guterres, said he was "deeply alarmed" at Sunday's strike on al-Ahli Arab Hospital in Gaza City, his spokesman said. Israel said it targeted a building at the site which Hamas was using as "a command-and-control centre" - something the group denied. Doctors scrambled to evacuate the hospital, saying they were given just a 20-minute warning by the IDF. A 12-year-old boy being treated for head injuries is said to have died because his care was disrupted. The hospital - which had been the best functioning in northern Gaza - is now out of service and cannot admit new patients. "Under international humanitarian law, wounded and sick, medical personnel and medical facilities, including hospitals, must be respected and protected," the spokesman for Guterres said. He added that the attack dealt "a severe blow to an already devastated healthcare system in the strip", adding that with aid blocked, there was strong concern that medical supplies were now running low as well as stocks of food and water.

  The UN says almost 400,000 Palestinians have been displaced again since Israel resumed its offensive almost four weeks ago

  The UN secretary general pointed out that under international humanitarian law, an occupying power had obligations to ensure relief for the civilian population. Recent Israeli military evacuation orders have led to wide-scale displacement of Gaza's 2.1 million population. The UN says about 70% of the strip is currently under displacement orders or in "no-go" zones," where the Israeli authorities require humanitarian teams to coordinate their movements. In Israel, polls suggest that a majority of Israelis back a Gaza ceasefire deal and - when it comes to their countries' stated war goals - prioritise bringing home the hostages over dismantling Hamas' governing and military capabilities. However, Netanyahu is backed by hard-line religious ultranationalist parties who have threatened to collapse the government if he ends the war. Israel signed onto a ceasefire deal in January, leading to the release of 33 hostages - 25 of them alive - in exchange for some 1,800 Palestinian prisoners in the first six-week stage. It then largely refused to begin talks on the planned second stage which was supposed to lead to a full withdrawal of Israeli forces and a complete end to fighting. In the past week, Israeli military reservists and veterans have signed several open letters condemning the ongoing war and questioning its priorities. There has also been criticism of the IDF's chief of staff and air force commander for sacking air force reservists who signed an original statement. This has coincided with rising frustration among reservists and their families over the cost of ongoing reserve duty along with the government's failure to draft ultra-Orthodox Jews despite the IDF facing shortages of combat soldiers.
