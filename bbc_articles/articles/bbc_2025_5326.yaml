title: Abrdn adds back vowels after widely mocked rebrand - BBC News
date: '2025-03-04'
section: Business
url: http://www.bbc.co.uk/news/articles/cz9nkeg79gyo
content: |-
  The investment firm will now be called aberdeen group as it hopes the name change will remove "distractions".

  Investment firm Abrdn will add the vowels back into its name after dropping them in a rebrand that was widely mocked. The firm said it will now be called aberdeen group, with no capital letter at the start. In the past it has been Aberdeen Standard Life and Aberdeen Asset Management. Its rebrand to Abrdn in 2021 was largely derided, with some saying it seemed like a typo, and others joking the firm had "irritable vowel syndrome". The company said the mockery amounted to "corporate bullying". Chief executive Jason Windsor said the latest name change would remove "distractions".

  "This is a pragmatic decision marking a new phase for the organisation," said chief executive Jason Windsor, as he revealed a strategy revamp. However, some people commented that while the company had found its vowels, it still hadn't found its capital letters.

  The firm has faced a barrage of mockery over the last four years since rebranding to Abrdn under previous boss Stephen Bird. It attracted reaction on social media, external with one user posting a mock-up of word game Countdown. The letters ABRDN are shown on the letter board behind presenter Rachel Riley, with the words "another consonant please Rachel..." A new version of the image was posted on Tuesday with one user joking, external that reinstating the vowels was responsible for the firm's share price rising.

  When a senior executive said in 2024 that mockery around its name was corporate bullying, the Financial Times responded by publishing a post that read "Lv Abrdn aln" (Leave Abrdn alone), while City AM ran with a front page that read "Abrdn: an apology - sry we kp tkng th pss ot of yr mssng vwls".

  Rebrands for big firms have in the past proven tricky to navigate. Royal Mail, for example, caused a public outcry after it suggested a name change to "Consignia" in 2002. A few years ago, Volkswagen was greeted with derision after an April Fool's joke misfired. The German car giant was forced to deny that it was changing its name to "Voltswagen" in the US, despite having said in a press release that it would.

  Tuesday's announcement from aberdeen group came as it revealed a return to profit in 2024 with pre-tax profits of £251m. The firm also said it was starting the search for a new chairman and increasing targets for profit growth. The company said it expected costs associated with the name change to be "negligible".
