  Townsend says his team must be ready to embrace what is sure to be a fever-pitch atmosphere at the Stade de France, with the French fans coming in full expectation of seeing their side win the Six Nations for the first time since 2022. "We're aware of the context of the game," added Townsend. "The atmosphere will be amazing. We've experienced the atmospheres during the World Cup. We played France in a World Cup warm-up game and that was a pretty special atmosphere. "We've played at Stade de France in the past and this will be even more heightened because of what's at stake for France. To be involved in that game is great. "It's now just about focusing on our game and bringing that out for as long as we can and beyond. Pushing ourselves physically and being together throughout that 80 minutes. That's going to be very important."

  Scotland's last tango in the Six Nations comes in Paris - a place where they went close but not close enough two years ago. That was an outstanding effort, but what's required on Saturday is a task of a different dimension. France were okay back then, they're utterly ferocious now. Scotland need more dynamism and athleticism in the second row and Gregor Brown, making his first Six Nations start, has a chance of providing it. Jack Dempsey being out is a blow. Dempsey has the dog needed in such a massive Test and was terrific against Wales. Ben Muncaster is on the bench, which is a reflection of his own capacity to run hard and bring a nasty edge. The more attrition the better against a French team that Gregor Townsend says is the biggest challenge in world rugby right now. Scotland go 6-2 on the bench in preparation for the scary might of the French forward onslaught.
