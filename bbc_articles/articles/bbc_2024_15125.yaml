content: "BBC Sport readers pick Spain's Nico Williams as their man of the match in\
  \ the \nEuro 2024 final win over England.\n\nWilliams is your man of the match in\
  \ Euro 2024 final\n\nThis video can not be played To play this video you need to\
  \ enable JavaScript in your browser.\n\nWe asked you to rate the players during\
  \ England's Euro 2024 final defeat by Spain. You named Spain winger Nico Williams,\
  \ who scored the opening goal in Berlin, as your man of the match with a score of\
  \ 7.71 out of 10. Substitute Cole Palmer, who scored a couple of minutes after coming\
  \ off the bench, was England's highest-rated player with a score of 7.61.\n\nThe\
  \ Player Rater cannot be displayed in your browser. Please enable JavaScript or\
  \ try another browser. After the opportunity to rate players has closed, the score\
  \ displayed represents the average from all the submissions by BBC Sport users."
