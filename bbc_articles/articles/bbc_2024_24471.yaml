  James was also convicted of a second charge of causing grievous bodily harm with intent in relation to a separate incident in Avonmouth, just 10 days prior. During an investigation into the attack on Mr Tjitendero, mobile phone footage found on James’ phone showed a cyclist, Julian Ford, riding his bike along a pavement before a Ford C-Max mounts the kerb and is driven into him. "Patrick James you recorded the video, you came up behind him, and you were laughing as you knocked him off and drove away,” Judge Macmillan said. “Julian Ford remembers waking up in an ambulance unable to breathe.” Mr Ford suffered a fractured rib, a haemothorax, a lung injury and blood in his chest as a result of the attack. Judge Macmillan added that there was “a degree of callousness” in the intent behind the video, as James had searched on his phone for the legal consequences of sharing such content.
