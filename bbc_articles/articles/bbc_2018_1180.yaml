content: |-
  Leicester couple Laura and Tom Webster caught their three-month-old baby Jenson's first word on camera.

  A three-month-old baby's first word has been caught on camera by his delighted parents.

  Laura Webster, from Leicester, filmed her husband Tom as he successfully encouraged little Jenson to talk.
