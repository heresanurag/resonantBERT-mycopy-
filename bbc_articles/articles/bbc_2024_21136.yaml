  City's historic run to four straight English league titles is made more impressive by the list of players they have released in that time. They have also won six out of the past seven titles. In 2020, Leroy Sane was sold to Bayern Munich for £54.8m. In 2021, Ferran Torres to Barcelona for £46.7m. In 2022, Gabriel Jesus to Arsenal for £45m, Raheem Sterling to Chelsea for £50m and Oleksandr Zinchenko, also to Arsenal for £30m. Last summer alone, in the aftermath of a successful Treble quest, Mahrez was joined through the exit door by Aymeric Laporte, Cole Palmer and former skipper Ilkay Gundogan. Yet City have kept on winning. They will start this season as favourite for every tournament they enter, including the Community Shield on Saturday when they face Manchester United, nursing a huge desire to atone for their shock FA Cup final defeat by the same opposition in May. As with any club, the key to success starts with recruitment, overlaid by desire, good coaching and a little bit of luck. City have proved over time to be excellent at the former – rival clubs with similar budgets have not achieved anything close to the same success. Guardiola spends huge amounts of time assessing the second part to spot negative signs, with City having one of the most successful coaches there has ever been and, on the fine margins, sometimes it works for them, on others – losing on penalties to Real Madrid in the quarter-finals of last season’s Champions League for instance – it does not.

  Yet, as initially outlined, even before the Alvarez situation took a twist, this was always going to be a tricky season for City. We head into the new campaign still waiting for clarity around the club's legal action against the Premier League and its associated party transaction rules. The case was heard in the middle of June. The answer could have significant consequences for the way the league operates its profit and sustainability rules, which are due to be changed in 2025. And then we have the 115 charges for allegedly breaking profit and sustainability rules that date back to 2009, the punishment for which is open-ended, and they are charges that City strenuously deny. Amid irritation from some about the time taken for the case to be heard given City were charged in February 2023 - since when Everton have twice and Nottingham Forest once been charged and had points deducted - a hearing is expected at some point in the autumn. It is hoped a verdict will be delivered in the spring – but in a complex legal case such as this, there are no guarantees.
