  Until last week, it had been thought this season would be Guardiola's last as City boss. In the aftermath of his Premier League title success, he said it was "more likely" than not he would leave the club when he contract expires in the summer. But during City's recent tour of the United States, the former Barcelona coach pulled back from that position, saying that he "never said I am leaving", adding he may yet sign an extension. That dance may continue for a while before we find out one way or the other. When he does go though, City only have to look across at Manchester United to see what kind of fall is possible to experience when a club used to winning does not get their succession planning around a long-term hugely successful manager right. Beyond that, playmaker Kevin de Bruyne is now 33 and about to enter the final season of his contract, goalkeeper Ederson is wanted by the Saudi Pro League and both Bernardo Silva and John Stones have contracts that end in 2026. It would be folly to predict the fall of an empire that has been created with such strength. But there are plenty of hazards ahead as City set out on their journey towards a fifth successive title win.
