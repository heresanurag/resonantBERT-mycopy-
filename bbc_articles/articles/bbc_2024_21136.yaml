  Why are Manchester City letting forward Julian Alvarez leave for Atletico Madrid?

  An unwanted sale - so why have Man City let Alvarez leave?

  Julian Alvarez is Man City's third top scorer in all competitions over the past two seasons

  Right at the start of what many are expecting to be Manchester City's toughest season for a while, the Premier League champions have been presented with problem number one - Julian Alvarez's imminent £81.5m exit to Atletico Madrid. City boss Pep Guardiola did not want the 24-year-old forward to leave and - having featured in 103 matches across all competitions for the club over the past two seasons - his loss won't be easy to cover. Guardiola may have known the reality but his last public words on the Argentina forward, on Saturday after his side had beaten Chelsea in Columbus, made it clear what he felt. "He will come back," said Guardiola. "I count on him." Guardiola was not being disingenuous. He has relied on Alvarez as a significant part of his attacking unit. That is reflected in the price he is being sold for, the biggest in City's history by a considerable distance. But City have a long established policy of not keeping unhappy players – and everyone at the club knew an issue with Alvarez was looming once Argentina won the 2022 World Cup. At that point, the then 22-year-old had made 20 City appearances, having arrived from River Plate for £14.1m, relatively unknown to European audiences. Crucially, over half of those appearances came as a substitute. From that point, Alvarez knew he had no reason to be back-up to anyone. The clear issue was the man in his way at City. The prolific Erling Haaland.
  • None Over the last two seasons, Alvarez is seventh on the overall Premier League scoring list with 36. Haaland is top with 90.
  • None When goals and assists are added together, Alvarez is eighth with 53. Haaland is top with 105.
  • None Alvarez is ninth over the same period with total shots (214). Haaland (360) is top.
  • None Alvarez is eighth for shots on target (98). Haaland is at the head of that table too (183). There was no chance of Alvarez getting Haaland out of the team, leaving the Argentine looking elsewhere to become the main man.

  Less than 48 hours before it was confirmed City had agreed a fee with Atletico Madrid for Alvarez, their newest signing spoke at his unveiling. Twenty-year-old Brazilian Savinho has been likened to former blue Riyad Mahrez in the way he plays. He has even taken the Algerian’s number 26 shirt. If the comparison is accurate, he is not as direct as Alvarez, and may not drift into the same type of positions. But, as a loan player, he contributed nine goals to Girona's successful quest to qualify for this season's Champions League and plenty of clubs wanted to sign him from parent club Troyes. Be assured his arrival in Manchester is not a vanity signing on behalf of the expanding City Football Group. The question is, with Jeremy Doku and Jack Grealish in addition to Savinho, and young Norwegian Oscar Bobb - who caught the eye on the four-match tour of the United States - does Guardiola feel he has enough striking cover for Haaland ahead of what is acknowledged to be one of the toughest club seasons? It is a season that includes an expanded 36-team Champions League and the Club World Cup, which is not due to end until 13 July. City have already been linked with Joao Felix, who has spent the last two seasons on loan from Atletico at Chelsea and Barcelona. Given he still has two years left on his contract, that would appear more like Atletico looking to find a home for someone they spent £113m to sign in 2019 rather than a firm City belief the Portuguese is a good fit for them.

