title: Officers who confronted Axel Rudakubana in Southport get award nod - BBC News
date: '2025-05-09'
section: Liverpool
url: http://www.bbc.co.uk/news/articles/c6283654zv2o
content: |-
  Merseyside Police says three officers who were first to the Southport attacks showed great courage.

  The officers were the first to arrive on Hart Street in Southport on 29 July 2024

  Three police officers who were first on the scene to respond to the "unimaginable horror" of the Southport attacks have been nominated for National Police Bravery Awards. Sgt Gregory Gillespie, PC Luke Holden and PCSO Timothy Parry of Merseyside Police confronted and detained killer Axel Rudakubana after reports a man was attacking children with a knife. Alice Aguiar, nine, Elsie Dot Stancombe, seven, and six-year-old Bebe King were killed and 10 others were injured in the attack at a dance class in the seaside town on 29 July 2024. Chief Constable Serena Kennedy said the officers faced "the most harrowing situation Merseyside Police has ever had to deal with" with courage and professionalism.

  The officers had been on duty working out of Southport police station when they each heard a radio transmission at midday requesting for officers to attend immediately at Hart Street. "In those frantic initial moments, they were unaware of the horrific events taking place", Ms Kennedy said. "They dismissed any thoughts for their own safety, bravely detaining the offender while protecting and helping the victims and those inside." Rudakubana was jailed for a minimum of 52 years in January after admitting to the murders. Ms Kennedy described the award nomination as a "true testament" to the three officers for their courage and professionalism in the face of "unimaginable horror", adding the force was "immensely proud". "Our thoughts remain with the victims, their families, those who suffered serious injuries and all those involved in the appalling attack," she added.

  Elsie Dot Stancombe, Alice da Silva Aguiar and Bebe King were killed in the attack

  Merseyside Police Federation Chair Chris McGlade said: "In the face of the most challenging and perilous of circumstances, these three officers exemplified this commitment." He said they they acted without "without hesitation" and had demonstrated "the highest levels of bravery". "Their professionalism was unparalleled, and it is fitting that we acknowledge and honour their actions accordingly," he added. The National Police Bravery Awards, which recognises the extraordinary acts of courage by police officers from forces across England and Wales, takes place on 10 July.

