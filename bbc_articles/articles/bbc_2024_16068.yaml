title: Woman, 72, dies after three-vehicle crash near Ayrshire golf club - BBC News
date: '2024-07-21'
section: Glasgow & West Scotland
url: http://www.bbc.co.uk/news/articles/c87r1gp4vd0o
content: |-
  Police said the 72-year old was pronounced dead at the scene after the incident, which happened on the A71 at Galston.

  A woman has died and a man is in a serious condition following a three-vehicle crash near a golf club in Ayrshire. Police said the 72-year old was pronounced dead at the scene after the incident, which happened on the A71 at Galston, near the Loudoun Golf Club, at about 17:25 on Saturday. The woman, who has not been named, was driving a blue Volkswagen Golf when it was involved in a collision with a white Vauxhall Corsa and green Land Rover Discovery. The 37-year-old Corsa driver was taken to the Queen Elizabeth University Hospital in Glasgow where his condition is described as serious but stable.

  Officers closed the road near the golf club for about eight hours while an initial investigation took place. Sgt Andrew Coutts said: "We are appealing to anyone who may have seen what happened to get in touch, external. "Likewise, if you have dash cam footage that could assist with our investigation then make contact with officers."
