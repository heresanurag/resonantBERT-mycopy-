title: 'Private e-scooters: Police warn about illegal misuse - BBC News'
date: '2021-12-23'
section: General
url: http://www.bbc.co.uk/news/uk-england-birmingham-59747082
content: |-
  West Midlands Police says they have seized more than 140 private e-scooters since April.

  West Midlands Police are warning people to make sure they understand the law when it comes to using a private e-scooter if they are thinking of buying one this Christmas.

  At the moment it is legal to buy a private e-scooter but illegal to use it anywhere on public land.

  E-scooters can only be used on public roads if rented as part of a government-backed trial.

  The trial, which is running across various towns and cities, has led to confusion about which type of e-scooter people can ride and what the rules are.

