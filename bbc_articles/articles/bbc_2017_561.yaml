id: bbc_2017_561
title: Police hunt $6m jewellery heist suspects - BBC News
date: '2017-01-04'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-38501506
content: |-
  CCTV footage shows two men alleged to have stolen $6m (£4.9m) of jewellery from a wholesalers in New York.

  Police said they were still searching for the pair and a third man in connection with the robbery at the Gregg Ruth jewellery company.
