  The announcement comes after the president gathered his family together to spend the Thanksgiving weekend in Nantucket. Reporters spotted Biden out for a walk on Friday with Hunter and his four-year-old son Beau, as well as Biden's daughter Ashley. Senior Republicans in Washington reacted furiously to news of the pardon, with House Oversight Committee Chairman James Comer saying the president "lied from start to finish" about the circumstances surrounding his son's case. But there were signs of unease among Democrats too. Representative Greg Stanton of Arizona became the first politician in his party to disagree publicly with the decision, saying on X: "I respect President Biden, but I think he got this one wrong." In a statement, Hunter Biden said mistakes he made during the darkest days of his addiction had been "exploited to publicly humiliate and shame" his family for political sport. "I will never take the clemency I have been given today for granted and will devote the life I have rebuilt to helping those who are still sick and suffering," the 54-year-old added. The younger Biden has been sober for five-and-a-half years, his father said. This is not the first time a US president has pardoned a member of their family. Bill Clinton pardoned his younger half-brother, Roger Clinton, for a 1985 cocaine-related offence in 2001. In 2020, Donald Trump pardoned Charles Kushner, the father-in-law of his daughter Ivanka. President-elect Trump has recently announced that Kushner will be the new ambassador to France.

  Hunter Biden pleaded guilty to nine counts of federal tax fraud in September, for which he had been facing up to 17 years in prison. He was also convicted of three felonies in connection with a gun purchase in June, for which he had been facing up to 25 years in prison. Sentencing for these cases had been scheduled for 12 and 16 December. His legal troubles had been a dark cloud over his father's presidential campaign, which came to an end in July after Biden pulled out of the election race. Biden endorsed Vice-President Kamala Harris to succeed him as the Democratic candidate, who lost the election to Republican Donald Trump in November. Trump is set to take over the Oval Office from Biden on 20 January 2025 - Inauguration Day.
