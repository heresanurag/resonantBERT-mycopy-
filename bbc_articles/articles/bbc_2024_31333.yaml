title: US President Biden gives son Hunter 'full and unconditional' pardon - BBC News
date: '2024-12-02'
section: US & Canada
url: http://www.bbc.co.uk/news/articles/cjwl3venz39o
content: |-
  Biden says his son Hunter was "unfairly" prosecuted over tax and gun possession - but earlier he had ruled out a pardon.

  US President Joe Biden has issued an official pardon for his son Hunter, who was facing sentencing for two criminal cases, despite previously ruling it out. In a statement, the president said his son had been "singled out" and called his cases "a miscarriage of justice". Hunter Biden pleaded guilty to tax charges earlier in September, and was found guilty of being an illegal drug user in possession of a gun in June - becoming the first child of a sitting president to be a convicted of a crime. Reacting to the pardon, President-elect Donald Trump said: "Does the Pardon given by Joe to Hunter include the [6 January] Hostages, who have now been imprisoned for years? Such an abuse and miscarriage of Justice!"

  Trump was referring to his supporters who stormed the US Capitol on 6 January 2021 in a bid to overturn Trump's defeat in the 2020 election. Joe Biden's full and unconditional pardon for his son comes after the president had repeatedly said he would not give him clemency. Just a couple of months ago, in September, White House press secretary Karine Jean-Pierre said that Biden would not issue a pardon for his son. She repeated that stance last month in another briefing, saying: "We’ve been asked that question multiple times. Our answer stands, which is no." Before that, in June, on the sidelines of the G7 summit in Italy, Biden had said he would neither pardon his son nor commute his sentence. "I said I'd abide by the jury decision, and I will do that. And I will not pardon him," he told reporters covering the summit. But on Sunday evening, President Biden said although he believed in the justice system, "politics has infected this process and it led to a miscarriage of justice". "From the day I took office, I said I would not interfere with the Justice Department’s decision-making, and I kept my word even as I have watched my son being selectively, and unfairly, prosecuted," he said. Biden said he wrestled with the decision, and added: "Once I made this decision this weekend, there was no sense in delaying it further." "I hope Americans will understand why a father and a President would come to this decision," he said.

