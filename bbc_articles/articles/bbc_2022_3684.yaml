  • None The Sports Desk: Life after Abramovich - what's next for Chelsea and English football? Chelsea manager Thomas Tuchel raised the prospect of his players wearing a "message for peace" on their shirts, after mobile network provider Three suspended its shirt sponsorship deal with the club. "Maybe the worry is more to find enough shirts that we can play in, with the sanctions," Tuchel added. "But as long as we have enough shirts, and as long as the bus is full of fuel, we will arrive and we will be competitive. Manager Thomas Tuchel expresses hope for Chelsea in light of sanctions "This is what everybody can be sure of and this is what we demand of ourselves and when it's a big storm, you dig in, you are all together and then you stay strong and go through it. "But messages for peace can never be wrong." Meanwhile, Chelsea fans have been urged to stop chanting in support of Abramovich, after supporters sang the Russian's name during Chelsea's win at Norwich on Thursday. Technology minister Chris Philp told BBC Radio Four's Today programme that fans need to remember Abramovich has close ties with Russian president Vladimir Putin, whose regime has committed "barbaric acts" in Ukraine. 'We're in 2022 and to see this is horrible for everybody' Premier League managers gave their views on the sanctioning of Abramovich for the first time on Friday. Former Chelsea manager Antonio Conte - now in charge at Tottenham - said: "It's very sad that this serious situation, this war between Russia and Ukraine, is affecting football and the sporting world. "To know that Russia athletes are banned from competition is very sad. I think it's not fair. I know very well the work that they do every day for this competition. "You have to pay for this situation, I think it's not right. Honestly, I hoped the situation is going to be solved, because it's creating a lot of damage. We're in 2022 and to see this is horrible for everybody." Liverpool manager Jurgen Klopp sympathised with employees at Chelsea but believes the government was "right" to sanction Abramovich because "he is close" to Putin. Newcastle manager Eddie Howe believes the sanctions will not change how Chelsea perform, while Leicester manager Brendan Rodgers - who previously worked at Chelsea as a youth and reserve-team coach - said Tuchel's situation is challenging. "I've total empathy for him and for the players, but they're very professional," said Rodgers. "They're an outstanding team and I'm sure they'll focus on that element between now and the end of the season."
