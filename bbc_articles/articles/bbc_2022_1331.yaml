title: 'Freda and Ken Walker: Murder arrest after couple in 80s attacked at home -
  BBC News'
date: '2022-01-20'
section: Derby
url: http://www.bbc.co.uk/news/uk-england-derbyshire-60068158
content: |-
  A man is held on suspicion of murdering Freda Walker, 86, and attempting to murder her husband Ken.

  Freda Walker died at the scene while Ken Walker remains in hospital

  A man has been arrested on suspicion of murder after an 86-year-old woman was killed and her husband left with life-threatening injuries.

  Freda Walker was found dead at her home in Langwith Junction, Derbyshire, on Saturday morning.

  Her 88-year-old husband Ken, a former district councillor, remains in hospital in a critical condition.

  Derbyshire Police said the man arrested was also being held on suspicion of the attempted murder of Mr Walker.

  He is 33 years old and was arrested in Church Warsop in Nottinghamshire, the force added, where an address is being searched as part of the investigation.

  The motive of the attack is not yet known, but police believe it could have happened during a burglary.

  Assistant Chief Constable Dave Kirby said: "The man was arrested in the early hours and, as you would expect, there will be interviews and so on, and if we can give any more information about motive then we will do, but at this time we can't be conclusive.

  "One of the leading lines of inquiry is that it may have been a burglary, and that remains a leading line of inquiry."

  Police were called to the couple's house in Station Road shortly after 09:00 GMT on Saturday after being alerted by paramedics.

  ACC Kirby said officers were still appealing for potential witnesses to come forward, despite the arrest.

  "Today's arrest is clearly a significant breakthrough in the case but the investigation continues into this most appalling crime," he said.

  The couple were attacked at their home in Station Road

  On Wednesday, the force appealed for people who were in Station Road between 16:30 on Friday and 09:00 GMT on Saturday to come forward urgently.

  "That request still remains, so if you were on that street, either on foot or in a car, then please contact us as soon as possible," ACC Kirby said.

  Speaking about the arrest, he added: "It comes from a lot of help and support from this community, and I would just like to say thank you to everyone who has helped us so far."

  Mr Walker is a councillor for Shirebrook Town Council and was formerly a councillor for Bassetlaw District Council.

  Bolsover District Council leader Steve Fritchley said Freda and Ken Walker were "a lovely couple"

  He was also chairman of Bolsover District Council and was last month made an Honorary Alderman for his services.

  Bolsover District Council leader Steve Fritchley, who knew the couple well, said he was very upset and angry about what had happened.

  "Ken retired from being a district councillor in 2019 and just when they should both be enjoying their twilight years together, this terrible incident has happened," he said.

  "Freda was lovely. Always wanting to help people, always had the time of day to say 'hello' and speak to them as they walked past.

  "We have heard many people say 'Oh Ken and Freda, what a lovely couple', and they really were. This has sent shockwaves through the local community."

