title: 'Withybush crash: Baby dies after being hit by car at hospital - BBC News'
date: '2023-06-26'
section: Wales
url: http://www.bbc.co.uk/news/uk-wales-66016802
content: |-
  An eight-month-old baby dies in hospital, four days after being hit outside Withybush Hospital.

  Mabli Cariad Hall was "beautiful, smiley and happy", a family friend said in a tribute

  An eight-month-old baby has died four days after being hit by a car at a hospital.

  Mabli Cariad Hall was airlifted from Withybush Hospital in Pembrokeshire to Cardiff after being struck, along with another pedestrian, on Wednesday.

  The driver of the white BMW involved in the crash suffered non-life-threatening injuries and is still in hospital.

  Mabli was "beautiful, smiley and happy", a family friend said in a tribute.

  She was taken to Bristol Royal Hospital for Children but died from her injuries on Sunday.

  The passenger in the BMW and the other pedestrian also involved in the crash have already been discharged from hospital.

  Flowers were left outside in tribute to her

  Family friend Sinéad Morris said on social media that it was "with a heavy heart" that she had to announce Mabli's "injuries were too severe to be reversed".

  "Despite days of immense strength from Mabli, she peacefully crossed over the rainbow bridge in the loving arms of Gwen and Rob in the early hours of Sunday, June 25, 2023."

  Ms Morris added that the family wanted to "express their deepest gratitude to the dedicated healthcare professionals who have been involved in Mabli's care".

  An online fundraiser has raised about £20,000 for the family.

  A damaged BMW was removed from Withybush Hospital on 21 June

  Hywel Dda health board, which runs Withybush Hospital, said: "We are deeply saddened by the tragic death of the infant.

  "Our thoughts and deepest condolences are with the family and everyone affected."
