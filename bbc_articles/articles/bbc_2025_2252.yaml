title: Moment burglar appears through ceiling of Sainsbury's store - BBC News
date: '2025-02-26'
section: General
url: http://www.bbc.co.uk/news/videos/c5yxv9n7jp5o
content: |-
  A 50-year-old man stole about £200 worth of items before leaving via a fire exit, police say.

  A man who dangled from the ceiling of a Sainsbury's store before stealing hundreds of pounds worth of groceries has been jailed.

  Steven McMahon, 50, climbed through the roof of the shop on Waverley Street, Nottingham, at 06:10 GMT on Friday.

  He stole about £200 worth of scratchcards, food, washing detergent and crisps, before leaving through a fire exit, Nottinghamshire Police said.

  McMahon, of no fixed abode, was arrested shortly after and pleaded guilty to burglary at Nottingham Magistrates' Court on Saturday.

  He was jailed for 22 weeks and ordered to pay £200 in compensation.

