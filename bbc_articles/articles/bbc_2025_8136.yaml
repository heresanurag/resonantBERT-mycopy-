title: Death toll from weekend storms in US Midwest rises to 22 - BBC News
date: '2025-04-07'
section: US & Canada
url: http://www.bbc.co.uk/news/articles/crrzd0lge28o
content: |-
  A 16-year-old volunteer firefighter trying to rescue people in the storm was among the 22 killed.

  Death toll rises from weekend storms in US

  This video can not be played To play this video you need to enable JavaScript in your browser. Watch: Deadly storm system brings flooding to US South and Midwest

  At least 22 people have died from flash flooding and tornado damage that swept across multiple states in the the Midwestern and southern parts of the US over the weekend, officials have said. Nearly half of the reported deaths, which included children and elderly people, were in Tennessee, and three were in Missouri. Three people died in Kentucky while Indiana, Mississippi, Georgia and Arkansas have also reported deaths from the storm. The fierce weather has caused rivers to swell and the National Weather Service warned that dozens of locations would reach "major flood stage" even as the rain slows down. As many as nine million Americans were under a flood watch on Monday, US media reported.

  In Kentucky, a nine-year-old boy was swept away by floodwaters while walking to his school bus stop. His body was found two hours later. In Missouri, 16-year-old volunteer firefighter Chevy Gall died in a crash while trying to rescue people caught in the storm. "Chevy died while answering the call to help others," said local Fire Chief Terry Feth. "Our entire department is grieving, as we mourn with Chevy's family, friends, and our fellow first responders during this incredibly difficult time." In Little Rock, Arkansas, a five-year-old boy was killed by a tree that fell into his home, destroying it. In Georgia, a father and son were both killed on Sunday while playing golf. According to a coroner's report, Matthew Terrell Collins Sr, 58, and Matthew Terrell Collins Jr, 29, died when a tree fell on their golf cart. A GoFundMe campaign launched to raise money for the Collins family described: "They were spending time together when the storm struck - sharing a moment between father and son that would unknowingly become their last."

  Swollen rivers flooded cities such as Frankfort, Kentucky, prompting mandatory evacuations in some areas. "As long as I've been alive - and I'm 52 - this is the worst I've ever seen it," Frankfort resident Wendy Quire told AP News on Sunday. "The rain just won't stop," she added. "It's been nonstop for days and days." On Monday, the storm pushed across the country towards the coast, bringing severe rainfall to Florida, Georgia and the Carolinas. The National Weather Service warned that despite less rain in the forecast for the rest of the week, it could take days or weeks for water to recede in some locations.

  The Augusta National Golf Club, currently hosting the high-profile Masters Tournament, was forced to evacuate on Monday morning. Buffalo Trace Distillery, a well-known bourbon company in Kentucky, was forced to temporarily close because of the storms. The company said in a statement it plans to remain closed until Thursday. It has been a punishing week of weather for the Midwest. Dozens of tornados have been reported and hundreds of counties have spent days under storm warnings since Wednesday. The same region was hit by tornadoes, wildfires and dust storms that killed 40 and left "staggering" damage in March.
