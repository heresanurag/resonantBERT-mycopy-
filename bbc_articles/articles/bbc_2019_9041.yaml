  A music festival in Croatia has been evacuated because of a forest fire.

  Hundreds of people were forced to leave the Fresh Island music festival on Zrce Beach on Monday night, at the beginning of the three-day hip-hop event.

  The fire forced the closure of the road to the closest town, Novalja, preventing many people from returning to their hotels.

  "Thankfully police are escorting buses through to collect any remaining festival-goers," the organisers said.

  Rappers Stefflon Don and Yxng Bane were among the acts due to perform, with Tyga headlining.

  It is unclear whether the rest of the festival will be cancelled. In a statement, organisers said they were "doing everything we can to go ahead as planned to continue the parties".

  British rapper NOT3S, who was supposed to perform on Monday night, tweeted from backstage:

