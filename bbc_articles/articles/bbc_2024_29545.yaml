id: bbc_2024_29545
title: 'Newspaper headlines: Spanish ''flood fury'' and US candidates in ''final push''
  - BBC News'
date: '2024-11-04'
section: The Papers
url: http://www.bbc.co.uk/news/articles/cly287mez8no
content: |-
  Valencia locals confronting the King and Queen of Spain and the US election dominate the papers.

  A number of the papers focus on the final day of campaigning in the US presidential election. "Harris and Trump make final push in swing states" is the Guardian's , externalheadline. It says the candidates are trying to "sway wavering voters" on the eve of a "deeply polarised" election. The pair are returning to Pennsylvania later on Monday - where the paper says recent polling has suggested Trump has made progress.

  The DailyTelegraph, external says the former president went off-script during a rally in the state on Sunday, describing the Democratic party as demonic.

  The Financial Times, external says his campaign has been even "darker" than in 2016 and 2020.

  The i , externalsays Russia could try to whip up militant action by Mr Trump's supporters if he loses. It reports that diplomats are warning hostile state actors will "seize the opportunity" to spread disinformation and create instability.

  The New York Times, external says foreign interference in American elections has become far more sophisticated and difficult to track. The paper warns that disinformation has matured into a consistent and pernicious threat, and that the ability to convince just a small number of Americans could have outsize consequences.

  The Times, external leads with reporting of an article written for it by the businessman James Dyson, calling the Budget "spiteful". He writes that raising inheritance tax on farms and family businesses would be "the death of entrepreneurship".

  The Telegraph, external focuses on the Chancellor's defence of her decision to end the inheritance tax exemption for farmers. Rachel Reeves said on Sunday that the government couldn't afford to let the practice continue. The paper says the move will raise just £500m a year, which it says would fund the NHS for one day and five hours.

  "A leader who knows how to get Britain's economy booming" is the front page headline in the Daily Mail, external, as it welcomes Kemi Badenoch to her new job. It says her first interview as Conservative party leader created "clear blue water" with Labour, by saying she would shake up the economy with an approach "completely the opposite" to that taken by Rachel Reeves.

  The Times, external covers the prime minister's plans for tackling small boat crossings in the Channel. It says Sir Keir Starmer will double spending on the problem, and will warn that the world needs to wake up to the severity of the migration crisis.

  The Sun, external says it is already the deadliest year on record for small boat crossings.

  The front pages of the Guardian, external, the Times, external and the Telegraph, external all feature photographs of the King and Queen of Spain visiting areas devastated by last week's flash flooding. The royal couple are pictured splattered with mud, after some angry residents pelted them. "You've abandoned us" is the Guardian's, external caption.

  And the Daily Star, external says people heading out to enjoy bonfires and fireworks this week have been told they can leave their hats and scarves at home. It says the Met Office has forecast 20C for London on Wednesday - which would break the date record for 6 November.
