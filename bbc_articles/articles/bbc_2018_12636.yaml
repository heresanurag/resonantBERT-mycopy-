id: bbc_2018_12636
title: Macron plays down UK 'no deal' Brexit visa fears - BBC News
date: '2018-10-19'
section: General
url: http://www.bbc.co.uk/news/world-europe-45902017
content: |-
  The French president tries to allay fears of new barriers for Britons if there is no EU deal on Brexit, but he does not rule out visas.

  French President Emmanuel Macron has tried to allay fears that British visitors will need visas if there is no EU deal on Brexit.

  Mr Macron told the BBC's Gavin Lee that suggestions about UK visitors needing visas were "fake news".

  After confusion about Mr Macron's remarks, his aides explained that he had made a mistake in English by saying "we will not stop visas" - he meant to say "start".
