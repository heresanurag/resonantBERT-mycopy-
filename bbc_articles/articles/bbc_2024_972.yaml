title: Greater Manchester Police officer charged with child sex attack - BBC News
date: '2024-01-01'
section: Manchester
url: http://www.bbc.co.uk/news/uk-england-manchester-67856969
content: |-
  PC Dean Dempster, 34, is charged with the sexual assault of a child under 13 and misconduct.

  The 34-year-old was charged on Sunday and will appear in court later

  A serving Greater Manchester Police officer has been charged with sexually assaulting a child.

  PC Dean Dempster, based in Oldham, has been charged with the sexual assault of a child under 13 and misconduct in a public office after a police investigation.

  The 34-year-old is due to appear at Manchester and Salford Magistrates' Court later.

  The force said PC Dempster had been suspended from duty.

  It added any misconduct proceedings would resume "upon the conclusion of criminal proceedings".

