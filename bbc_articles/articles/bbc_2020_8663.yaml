  Official results show 29.9% of students in Wales achieved A* and As, up from 27% last year.

  'I still have a future and I can make the most of my education'

  When Heavenly Bomba, from the Democratic Republic of Congo, moved to Cardiff to be reunited with her mother, she wanted to study medicine. But the 19-year-old could not speak English at the time. While the focus is on A-levels today, many who have studied outside the traditional route in the classroom, will also get results helping them towards a career in their chosen field. Heavenly is one of many students on the Future Pathways programme, supported by Cardiff City, who have got their exam results today. The programme provides an alternative style of learning for those leaving secondary school, offering BTEC courses and a foundation degree in community football and development. Heavenly enrolled on a traineeship programme with the foundation and is now a full-time student and studying for a BTEC level 3 extended diploma in sport, with the hope of going to university to study physiotherapy. “Coming here has made me realise that I still have a future and that I can make the most of my education," she said, "I thought I would only be here to develop my English, but I am part of a team here. I am with people who want to help me grow in my new home.” After leaving school without any qualifications, Nathan Chichester, 20, from Cardiff, started on the programme due to his love of the Bluebirds. He has been accepted on the charity’s foundation degree, a two-year course designed for people wanting to gain a university qualification, working towards a career in football. “I’ve been massively inspired by the tutors at Cardiff City FC Foundation, they have helped me realise and achieve my goals, as well as provide me with an insight into my future career options," he said.
