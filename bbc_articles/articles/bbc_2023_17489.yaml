content: |-
  After an acrimonious split with the company in 2014, the 45-year-old returns at an event in Chicago.

  Guess who's back... CM Punk hinted he wouldn't return when he left WWE in 2014

  CM Punk has made a dramatic return to WWE after nearly a decade away.

  Fans roared after hearing his theme music at the Survivor Series event in the United States on Saturday night.

  He initially left WWE in 2014 and has often spoken about his frustrations over creative storylines and a lack of medical care towards him.

  There had been speculation the 45-year-old would come back after he recently left rival wrestling company All Elite Wrestling (AEW).

  But WWE's chief content officer Triple H said CM Punk's return at the show in his hometown Chicago was all a bit last minute.

  "This was one of those lightning in a bottle moments that came together very quickly, but we are incredibly excited about it," he said in a press conference after the show.

  "It didn't start to come to fruition until everybody stopped thinking it was going to happen, and then all of a sudden it was happening."

  Triple H also referenced the fact CM Punk has often hinted he would not return to WWE since he left a decade ago.

  "If you are the same person you were 10 years ago 10 years later, you've messed up," Triple H said.

  "Everybody grows, everybody changes. And I'm a different person, he's a different person, this is a different company and we're all on the same even starting ground."

  Fans were loving CM Punk's return in his hometown Chicago

  After leaving WWE in 2014, CM Punk - real name Phil Brooks - had a short stint in mixed martial arts with UFC.

  He then joined AEW in 2021, before leaving the company earlier this year after the All In pay-per-view event at Wembley Stadium.

  CM Punk didn't have a wrestling match at his shock WWE return and didn't even get into the ring, but his appearance was enough to send fans into a frenzy.

  Most reacted with shock on social media, with one fan writing it was the "biggest pop in history of wrestling".

  Joe Clarkson told BBC Newsbeat CM Punk's return came as "a complete and utter shock".

  He was at the wrestler's last match for AEW and thought he would never see him in the industry again.

  "I've never been so glad to be proven wrong," the 22-year-old said.

  "There are plenty of people in wrestling who cannot stand him, but there are so many who love him.

  "He's always a conversation starter, a star of the calibre of CM Punk doesn't come around very often."

  Joe says he's happy to see CM Punk back because he's always been a fan

  WWE fan Sabrina Nicole also told Newsbeat CM Punk's return means it's "an exciting time to be a wrestling fan".

  She was watching Survivor Series and said "hearing his music gave me chills".

  "I was definitely surprised to hear it, right at the end of the show."

  She's looking forward to seeing what happens next with him, possibly "a feud with Seth Rollins", who was pictured looking unhappy at his return.

  "It's quite surreal to be honest to see CM Punk back. I've always been a fan despite the ups and downs."

  Randy Orton, who made his own return at Survivor Series after more than a year out with injury, was in the ring when CM Punk returned, with the pair sharing a smile while Punk was stood at the top of the ramp.

  WWE star Cody Rhodes added: "If he can help with where we're going and what we're doing, absolutely welcome aboard.

  "I have a feeling the CM Punk we're getting is hungry, and that's the best."

