  Mr Farage, who regularly campaigns alongside the former president, told the Laura Kuenssberg show: "I'm obviously pleased that my friend Donald has got away with it, only just, but he's got away with it. "But one person is dead, two more are fighting for their lives in hospital so it's an absolutely horrendous incident and yet somehow I'm not shocked by it. "The narrative that is put out there about Trump by the liberals that oppose him is so nasty... that I think it almost encourages this type of behaviour." Pressed by Ms Kuenssberg on whether US Republicans have a responsibility to help create a better political environment, Mr Farage agreed, saying: "That's right", adding that all sides had a part to play. Since the assassination attempt, which President Biden condemned, his team has been pulling election advertisements critical of Trump. The White House has confirmed the president was briefed on the attack and spoke to Mr Trump several hours after the shooting. President Biden has called the shooting "sick", adding: "There's no place in America for this type of violence."

  Labour MP Kim Leadbeater, whose sister Jo Cox MP was murdered at work in her constituency eight years ago, was asked about the attack by Ms Kuenssberg. "We've got to have that conversation about what a civilised democracy looks like," she said. "I've been having it since Jo was killed. "I sadly feel that we're not making huge amounts of progress in this country, in other countries, and we have got to keep having that conversation." She added: "We all have a responsibility for what comes out of our mouths." Foreign Secretary David Lammy added his condemnation of the US attack, saying the government "condemns all forms of political violence in the strongest terms". Former Tory PM Boris Johnson said it was "a miracle that Donald Trump escaped an attempted assassination" and added that the incident reminded him of "the tragic fragility of democracy in the face of violence and unreason". Liberal Democrat leader Sir Ed Davey tweeted: "Political violence is wrong... We must all condemn this appalling attempt on Donald Trump's life."
