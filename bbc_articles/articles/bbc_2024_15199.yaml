title: Politicians react with shock to attack on Donald Trump - BBC News
date: '2024-07-14'
section: Politics
url: http://www.bbc.co.uk/news/articles/czd9jej784do
content: |-
  UK politicians react with shock to attack on Trump

  UK politicians have reacted with shock to the attempted assassination of Donald Trump. Prime Minister Keir Starmer led the condemnation, saying he was "appalled" and Conservative leader Rishi Sunak posted on social media that he was "horrified". Labour MP Kim Leadbeater, sister of murdered MP Jo Cox, said the attack was "shocking and deeply disturbing and deeply upsetting". Trump ally and Reform MP Nigel Farage said he was "very upset" but "not shocked".

  There has been a global outcry in the wake of the shooting, which is being treated by US authorities as an assassination attempt. One man at the rally in Pennsylvania was killed and two other men critically injured, in what is the most serious attempt on a president or presidential candidate's life since Ronald Reagan was shot in 1981. The suspect, who has been identified as Thomas Matthew Crooks, of Bethel Park in Pennsylvania, was killed by security services. The prime minister has sent his best wishes to the former president and said: "Political violence in any form has no place in our societies." Tory leader Rishi Sunak said: "Violence and intimidation must never be allowed to prevail." Labour MP Lucy Powell, Leader of the House of Commons, told the BBC's Sunday with Laura Kuenssberg show that the attack was "appalling", adding that the thoughts of the British government and people were with the US. "This is a horrific incident which we condemn completely and fulsomely," she said.

