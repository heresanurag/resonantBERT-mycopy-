title: UK bees in danger as Asian hornet sightings rise - BBC News
date: '2023-09-04'
section: Science & Environment
url: http://www.bbc.co.uk/news/science-environment-66697968
content: |-
  The invasive insect threatens to get a foothold, with nests found in East Sussex, Kent, Devon and Dorset.

