  The 10 secretaries of state will assist the senior ministers on key portfolios. Some notable names remaining in their roles include Francois-Philippe Champagne, who stays on as finance minister, a position he has held since March. Chrystia Freeland, the deputy prime minister under Trudeau and a former foreign affairs and finance minister in his government, stays in transport. Steven Guilbeault will continue to oversee Canadian culture and official languages. Federal cabinets in Canada by tradition balance representation of the country's regional, linguistic and ethnic diversity. The new cabinet includes representation from Canada's prairie provinces - a minister and secretary of state - where there are growing musings about separation amid a broader sense of western alienation from the power centre in Ottawa. Some of the new faces include former broadcaster Evan Solomon, who will be minister of artificial intelligence and digital innovation. Toronto MP Julie Dabrusin joins cabinet for the first time as environment minister after having served as parliamentary secretary for the file since 2021. Halifax MP Lena Metlege Diab is also new to cabinet in the role of minister for immigration. Vancouver's former mayor, Gregor Robertson, takes on a significant role overseeing housing. Carney has pledged to significantly ramp up construction amid a housing affordability crisis in Canada. Conservative leader Pierre Poilievre criticised Carney for keeping so many ministers who served in Trudeau's cabinet. "That isn't the change that Mr Carney promised," he said.
