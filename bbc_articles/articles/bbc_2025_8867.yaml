content: |-
  Prime Minister Mark Carney's cabinet reshuffle includes changes to the core team overseeing the fraught US-Canada relationship.

  Canada's Carney unveils cabinet of familiar and fresh faces amid US trade war

  Canadian Prime Minister Mark Carney has unveiled his cabinet, promising "decisive action" on his ambitious economic agenda, amid a trade war with the US. The new cabinet of 28 ministers and 10 secretaries of state heralds some significant changes, including a new foreign minister to handle the US-Canada relationship. The reshuffle, two weeks after the election, brings some familiar names as well as political newcomers - a team "purpose-built for this hinge moment", Carney told reporters. There are 24 new faces in cabinet, including 13 first-time MPs. Several veterans of former PM Justin Trudeau's government, such as Melanie Joly and Chrystia Freeland, return to cabinet.

  Other holdovers from the Trudeau era include Anita Anand, Gary Anandasangaree, Sean Fraser and Dominic LeBlanc. But housing, immigration and energy - key departments for which the Trudeau government was heavily criticised - have been given to first-time ministers. Carney is also continuing Trudeau's policy of maintaining gender parity in his cabinet.

  "Canada's new ministry is built to deliver the change Canadians want and deserve," Carney said on Tuesday. He has made a number of changes to the core team of ministers handling the strained relationship with the US. It comes after Carney recently met Trump at the White House, after which he said the US leader was willing to negotiate a new trade deal. Veteran member of parliament (MP), Dominic LeBlanc, who has overseen a number of cabinet positions, most recently international trade, will now focus on Canada-US trade and breaking down internal trade barriers within the country - a key campaign pledge. Toronto-area MP Maninder Sidhu, takes over as minister of international trade. Carney has also named a new foreign minister, Anita Anand, who held a number of top roles in Trudeau's cabinet, including defence. Melanie Joly was shuffled out of foreign affairs and given the industry portfolio. Former justice minister Gary Anandasangaree now takes on the role of public safety, a department that will oversee border security, which Trump has cited as a key reason for imposing tariffs on Canada as well as Mexico. David McGuinty, who previously held that position, now oversees defence. Two prominent names have been pushed out of the cabinet - Bill Blair, who oversaw defence, and Jonathan Wilkinson, natural resources minister. Rookie MP Tim Hodgson, first elected in April, is taking over at natural resources. Carney worked with him at the Bank of Canada, where Hodgson served as a special adviser.

