  • None Manchester United have been eliminated at the Champions League quarter-final stage on seven occasions - more than any other side.
  • None Barcelona's Lionel Messi scored his first Champions League quarter-final goals since April 2013 versus PSG, ending a run of 12 matches and 50 shots without a goal in quarter-final matches.
  • None This was United's heaviest aggregate defeat (4-0) in a two-legged European tie. Their previous heaviest was 5-2 by AC Milan in the 1957-58 European Cup semi-finals and 4-1 v Atletico Madrid in the last 16 of the 1991-92 Cup Winners' Cup.
  • None Manchester United have lost four consecutive away matches for the first time since October 1999.
  • None Messi has scored 45 goals for Barcelona this season - 10 more than any other player in the top five European leagues (England, France, Germany, Italy and Spain).
  • None Messi has scored twice as many Champions League goals against English sides as any other player (24 goals).
  • None United lost five Champions League matches this season, their joint-most in a season (also five in 1996-97).
  • None Spanish teams have lost just one of their past 24 Champions League knockout matches against English sides, winning 16. Leicester City's 2-0 win over Sevilla in March 2017 was the only victory for an English team in that time.
