title: Moment chimney is demolished at Cottam Power Station - BBC News
date: '2025-03-20'
section: General
url: http://www.bbc.co.uk/news/videos/cq5z1yl9qppo
content: |-
  The power plant near Retford, Nottinghamshire, marks its seventh explosive event.

  Further demolition work has taken place at a former power station in Nottinghamshire.

  Cottam Power Station, commissioned in 1968, was capable of generating enough electricity for 3.7 million homes and was originally only designed to be operational for 30 years, but its life was extended to 2019, when it closed for good.

  On Thursday, the power plant, near Retford, marked its seventh explosive event to bring down the station's main chimney stack.

  The operation has seen a succession of explosions over a 10-second period, during which the chimney collapsed under controlled conditions.

