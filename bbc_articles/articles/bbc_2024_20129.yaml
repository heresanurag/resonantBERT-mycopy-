title: 'Oasis reunion: Liam and Noel Gallagher confirm new live dates for summer 2025
  - BBC News'
date: '2024-08-27'
section: Culture
url: http://www.bbc.co.uk/news/articles/cwy5xr8yr8wo
content: |-
  The band will play shows in Dublin, Edinburgh, London, Manchester and Cardiff as part of a world tour.

  Oasis fans have spent the weekend asking: Is it definitely, or is it maybe? On Tuesday, the rumours were confirmed: It's definite. In a press release, Liam and Noel Gallagher confirmed Oasis will reunite for a series of live shows next summer, with gigs in London, Manchester, Cardiff, Edinburgh and Dublin. Fans in Burnage, where Oasis are from, can’t wait. "They're a big part of my life growing up," said one woman, who has an Oasis tattoo on her back. "I am so excited."

  This video can not be played To play this video you need to enable JavaScript in your browser. What would it take for Oasis to reunite? - Liam is asked back in 2016

  It’s not just us normal Oasis fans who are excited. Plenty of celebrities have also been sharing their thoughts this morning on the band's reunion. On Instagram, English singer-songwriter Tom Grennan described it as “massive”. On X, the football pundit and former player Stan Collymore said Oasis, external were “part of what reinvented British cool” in the 90s. Even ahead of the announcement, famous faces were weighing in on the rumours. Irish duo Jedward, external celebrated the possibility of a reunion by reposting a video of John covering Wonderwall with the actress Tara Reid in 2022. Edith Bowman, a radio DJ and television presenter, said people would be hitting refresh on their browsers as they try and get tickets. "I think for a lot of people of that age when they first came out - and I was one of them - they were their Beatles," she told BBC Radio 4's Today programme. "They were a band that appealed immediately, that they connected with them. And it was funny listening to their music this morning, there's something incredibly timeless [about them]." She said that their fans would span generations. "My brother passed down to his son, who cannot wait to hopefully see them live. My 11 year is desperate to learn to play them on the guitar," she said.

  Oasis's ability to win fans reach across generations is evident from TikTok. Liv, 23, calls herself The Oasis Girl on the social media platform. A huge fan, she has sung covers of the band's songs online including tracks such as Morning Glory and Cigarettes and Alcohol. She told BBC News the reunion was a “huge shock” as she “never thought” she would hear them live. “Noel Gallagher is one of the greatest lyricists of all time. Slide Away is a great love song," she said. She added that the band’s music “means the world” to her. “I’m going to try so hard to get tickets to both Manchester and London shows but it’ll be a struggle.” Music journalist Katie Macbeth, also 23, feels the band have an enduring appeal, and the gigs next summer will feature a mix of older and younger fans. "They’re like a generational band that people know," she told BBC Radio 1's Newsbeat. "Even if you don’t know anything deeper, everyone knows Wonderwall or Don’t Look Back in Anger." Katie, 23, recalls growing up and hearing Oasis as a child, but says these days through TikTok and streaming, they’ve managed to "still have the draw". "It’s something everybody has delved into," she added.

  In a statement, Oasis said "the stars had aligned" for a reunion tour

  The announcement was published on the brothers' social media accounts,, external as well as the official Oasis page. The shows will mark the group's first live dates in 16 years. Organisers said tickets would go on sale on Saturday (31 August). In a statement, Oasis commented: “The guns have fallen silent. The stars have aligned. The great wait is over. Come see. It will not be televised.” The band said these dates would be their only dates in Europe next year. However, Oasis Live '25 has been described as a "world tour", suggesting more dates will be announced soon. A rumoured Glastonbury appearance was not confirmed by the band. Oasis also confirmed the release of a 30th anniversary edition of their album Definitely Maybe. Manchester mayor Andy Burnham told BBC Breakfast a reunion tour was "the news we've all been waiting for" and it would be "a massive day for Manchester".
  • None Listen on BBC Sounds: The rise and fall of Oasis Fans of the Manchester rock band have pleaded with the brothers to regroup since they broke up in 2009, after a backstage brawl at the Rock en Seine festival in Paris. It is 30 years since the chart-topping album Definitely Maybe turned the Gallagher brothers into stars – helping to usher in the Britpop era and launching the hellraising pair into mega-stardom. The group's mega hits include Wonderwall, Don't Look Back In Anger and Stop Crying Your Heart Out. In 1996, around 2.5 million people applied for tickets to their two dates at Knebworth – which could hint at the demand the new gigs might see. However, the brothers have always had a fractious relationship, and a string of tours have fallen apart over the years, ending in the backstage fight in 2009 that resulted in Noel leaving the band. At the weekend, Liam Gallagher fuelled the reunion rumours which had been circulating on social media at his headline Reading Festival set on Sunday evening, where he dedicated the Oasis track Half The World Away to his brother. Some have questioned what the real motivation for the potential reunion after so many years of acrimony might be. Helen Brown, a music critic at The Independent, told BBC News: "After the decades of going at each other with cricket bats and fire extinguishers, it's extraordinary that [the Gallagher brothers] seem to be getting along better – and maybe money is an incentive here." She added: "Maybe they can put aside their differences to fill their coffers."

