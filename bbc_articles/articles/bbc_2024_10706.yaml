title: Mr Doodle transforms a telephone box in Bath city centre - BBC News
date: '2024-05-03'
section: General
url: http://www.bbc.co.uk/news/uk-england-somerset-68923223
content: |-
  The street art is part of the artist's first ever UK museum exhibition.

  "The whole idea is to not think too much," Sam Cox, also known as Mr Doodle says.

  As part of his first ever UK museum exhibition, he has transformed a telephone box in the centre of Bath.

  The artist, who studied illustration at UWE Bristol. rose to international fame after sharing his black and white "graffiti spaghetti" online.
