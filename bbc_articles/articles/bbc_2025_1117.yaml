title: 'James Maddison: Was Tottenham midfielder''s celebration a dig at Roy Keane?
  - BBC Sport'
date: '2025-02-16'
section: Tottenham
url: http://www.bbc.co.uk/sport/football/articles/cr7e7ndjyrmo
content: |-
  James Maddison did his best to "block out the noise" by scoring the winner as he helped Tottenham beat Manchester United in the Premier League on Sunday.

  Maddison does 'talking on the pitch' in response to critics

  This video can not be played To play this video you need to enable JavaScript in your browser. 'James Maddison dictates Man Utd game' - MOTD2 on Man Utd making their loss 'too easy'

  James Maddison says he is doing his "talking on the pitch" in response to the critics who questioned him before he scored the winner as Tottenham beat Manchester United on Sunday. Maddison was the only player following in after United keeper Andre Onana parried Lucas Bergvall's shot, allowing him to complete an easy tap-in to score the match's only goal. He marked the strike with both a talking and shushing gesture celebration. And after the match, without naming any individual critics, he told Sky Sports: "There was a little bit of outside noise this week. "People will have their opinions, but I wanted to do my talking on the pitch. I hope there is a certain few that enjoyed me being the match-winner today." This week, former Manchester United midfielder Roy Keane said on The Overlap podcast that Maddison "got relegated with Leicester and he'll get relegated with Spurs". Keane also stressed that Maddison was a "talented player", but said those who thought his return would help Spurs break into the top six "were in cuckoo land". Keane added: "People say Maddison's the man. When is he going to step up to the plate?" The 28-year-old had been out of action since picking up a calf injury against Hoffenheim in the Europa League on January 23. His goal against United was his first in the Premier League since December and his 10th in all competitions this season. Sandwiched between his talking and shushing gestures, Maddison also performed his usual darts throw celebration. When asked about responding to criticism, he added: "You do see it and it is there. Especially when it's a big profile name. "Nobody is more critical of myself than me. To be fair to the gaffer, he always talks about blocking out the outside noise, but sometimes it's difficult, you know. It is constantly in your face. Social media and WhatsApp, sending people's stuff."

  James Maddison's goal against Manchester United was his first in the Premier League since December

  Tottenham manager Ange Postecoglou said it "doesn't surprise him" if Maddison responded to what people are saying about him, adding that he "threw a shot back over the bow". Tottenham have missed playmaker Maddison's absence, losing three of the five games they have played while he has been sidelined in 2025. "It's just great to have him back," said Postecoglou. "He is a quality player. "If you just look at his goals return from midfield this year, it's still right up there." Maddison has scored four goals in his last four starts in the Premier League, and is Spurs' leading scorer in the league this season. He has been directly involved in 13 goals in 23 league games (nine goals, four assists). "He got frustrated when he got injured and to be honest we didn't think he would be back for a couple of weeks," added Postecoglou. "But he has worked awfully hard in training and done everything right to make sure he was available." Tottenham have been on a poor run and are 12th in the Premier League table, but a large part of their form can be attributed to a string of first-team injuries. Postecoglou will be thankful he was able to start playmaker Maddison as well as goalkeeper Guglielmo Vicario, who impressed on his first game back since breaking his ankle in November. Long-term absentees Brennan Johnson, Destiny Udogie and Wilson Odobert were also fit enough to make the bench.

