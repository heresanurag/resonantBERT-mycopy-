title: 'RFU: National League 1 clubs join calls for overhaul of governance - BBC Sport'
date: '2024-12-18'
section: Rugby Union
url: http://www.bbc.co.uk/sport/rugby-union/articles/c62z6v80188o
content: |-
  National League 1 clubs unite to join mounting calls for an overhaul of the way rugby union is run in England amid the ongoing controversy over record financial losses and executive bonuses.

  National League 1 is the third tier of men's rugby union in England

  National League 1 clubs have united to join mounting calls for an overhaul of the way rugby union is run in England amid the ongoing crisis over record financial losses and executive bonuses. In an open letter, the twelve clubs criticise "major failures in governance and leadership" and a "lack of accountability" before an emergency meeting of the Rugby Football Union (RFU) Council on Wednesday. Championship and grassroots clubs have already called for a debate leading to a vote of no confidence in the leadership of the game's governing body. Last month the RFU announced a record operating loss of nearly £40m, but chief executive Bill Sweeney earned £1.1m, after being awarded a bonus of £358,000 to go with his salary of £742,000. Sweeney was one of six executives who shared a bonus pot of £1.3m at a time when the union is making more than 40 people redundant. In their open letter, the National League 1 clubs say "recent events have shown change is required". It added: "The RFU Council and Board are complicit both in the lack of accountability and governance the member clubs expect them to exercise, and, alongside the RFU leadership, in the lack of clarity and strategy for the development of rugby in England. "We note there will be an emergency meeting of the RFU Council on 18 December. We call upon the members of the RFU Council to use this as an opportunity to instigate an independent review of the management of rugby in England. "The National League 1 clubs will act individually when it comes to arguing for or voting on any no-confidence motions that might arise either at that meeting or at any subsequent [meeting] of the RFU." The letter is signed by Blackheath FC, Darlington Mowden Park RFC, Dings Crusaders RFC, Esher RFC, Leicester Lions RFC, Plymouth Albion RFC, Rams RFC, Richmond FC, Rosslyn Park FC, Rotherham Titans RUFC, Sale FC, and Sedgley Park RUFC.

  This month RFU president Rob Udwin convened a meeting of the RFU's Council "to allow us to have a frank and open discussion about the finances of the union". But with parts of the game in uproar over the pay controversy, three former RFU chairmen then called for RFU chairman Tom Ilube, Sweeney and "the relevant RFU board members" to resign, claiming "enormous and irreparable damage" had been done to the reputation of the body. The Community Clubs Union (CCU) - a group of grassroots clubs campaigning for change - said it fully supported the former chairmen's letter. Second-tier Championship clubs then demanded a vote of no confidence in the RFU's leadership. In a statement at the time, the RFU said: "The RFU ends this latest four-year cycle with a strong balance sheet, no debt, a robust cash position and positive profit and loss reserves. "We always see losses in a Rugby World Cup year due to fewer home games and increased costs associated with attending the RWC. These revenue impacts were anticipated, planned for and are in line with expectations. "The RFU has continued to invest strategically in the game at all levels and for the last two years the RFU has been working hard to develop a redesigned Championship with the aim of developing a whole game solution to support the development of England Rugby." Ilube has also defended the bonuses, arguing the RFU's incentive plan recognised a reduction in remuneration caused by the pandemic, and challenging multi-year targets. The RFU also says it has been affected by rising costs of running a business, steep utility prices and the after-effects of the pandemic. The RFU has been approached for comment.
