  "As someone with a large platform, as someone that people look up to, as a woman that makes other women feel safe and empowered, people were asking me, 'Are you going to keep somebody on it who doesn't necessarily make us feel safe or empowered as a woman?'" Kehlani told Chicago radio station WGCI.

  "This is not an industry friendship. That's really my friend and someone I say I love you to," she added about Megan Thee Stallion.

  Megan, whose real name is Megan Pete, has previously described the incident but didn't say who shot her.

  "I had to get surgery to get it taken out, get the bullets taken out, and it was super scary," she said in July.

  She told her followers about what happened and referred to her family. Her mum - also her manager - died in March 2019.

  "It was just the worst experience of my life, and it's not funny," she said.

  "It's nothing to joke about and it's nothing for y'all to go and be making fake stories about.

  "I didn't put my hands on nobody. I didn't deserve to get shot."

  Megan Thee Stallion said she had surgery to remove the bullets

  Despite being shot at least twice, she said her injuries weren't serious.

  "And thank God that the bullets didn't touch bones, they didn't break tendons," she said previously.

  "I know my mama and my daddy and my granny had to be looking out for me with that one, because where the bullets hit at, they missed everything, but they were in there.

  "And it's not that I was protecting anybody, I just wasn't ready to speak."

  Megan previously described it as an act "with the intention to physically harm me," in an Instagram post following the incident.

