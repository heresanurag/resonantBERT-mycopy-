id: bbc_2020_8549
title: Megan Thee Stallion claims Tory Lanez shot her in feet - BBC News
date: '2020-08-21'
section: Newsbeat
url: http://www.bbc.co.uk/news/newsbeat-53566830
content: |-
  The rapper called the shooting "the worst experience of my life" in a tearful Instagram live.

  Megan Thee Stallion has accused Tory Lanez of shooting her in both feet in a July incident.

  "Tory shot me" after an argument in a car, rapper Megan claimed in an Instagram live.

  Singer Tory Lanez - whose real name is Daystar Peterson - was later charged with carrying a concealed weapon.

  Megan claimed she feared police would start shooting if she said a gun was involved, so she told them she'd stepped on broken glass.

  "I didn't tell the police nothing, because I didn't want us to get in no more trouble than we was about to get in."

  Tory was arrested at the time - 12 July - on the open charge of carrying a concealed firearm. He was released later that day.

  Megan Thee Stallion has had two UK top 10 singles this year

  Tory Lanez has been quiet since the incident but Megan Thee Stallion accused his team of spreading misinformation online.

  "Stop acting like black women is aggressive when all they be doing is speaking the... facts, and you... can't handle it," she said.

  She spoke about being called a "snitch" online - and also disputed claims that she hit Tory Lanez before the shooting.

  Megan has received support from JoJo and Kehlani.

  In response to questions from her fans, US singer JoJo confirmed Tory Lanez will not be appearing on the deluxe version of recent album Good to Know.

  It follows Kehlani saying the same about a track on her album that featured the Canadian singer.

