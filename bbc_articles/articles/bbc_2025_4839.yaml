  Backing his chancellor on Monday, the prime minister told the BBC: "We've toughened up the rules in terms of declarations, and everything she has done is according to the rules. That's what I would expect." In October, Sir Keir paid back £6,000 of gifts and hospitality he had received since becoming prime minister - including Taylor Swift tickets. However, he has defended accepting tickets for the corporate box at Arsenal's Emirates Stadium, saying he cannot watch games from the stands for security reasons. In September Downing Street said the PM, Deputy Prime Minister Angela Rayner and Reeves would no longer accept donations of clothes. Conservative shadow Cabinet Office minister Mike Wood said Reeves "must kick her addiction to freebies". Responding to the Pennycook's comments, he said: "This is an extraordinary slap down of the profligate champagne lifestyle Rachel Reeves has been enjoying since becoming chancellor. "When senior Labour ministers are openly criticising her judgement then it's no surprise business and investors are as well." Conservative shadow business secretary Andrew Griffith has also faced questions over accepting £4,000 of hospitality to attend the Bafta awards with his wife in February, as well as £973 for skiing in Davos, Switzerland. Griffith insisted his attendance at the Baftas was "quite different" to Reeves' free tickets, telling the BBC at the weekend that "a lot of ministers and people from different parties were there as well". He added that "engaging with Swiss parliamentarians" could help secure a financial services deal and create jobs.

