id: bbc_2021_12239
title: Spain hit with severe flooding after storm - BBC News
date: '2021-09-02'
section: General
url: http://www.bbc.co.uk/news/world-europe-58417789
content: |-
  Homes in north and central Spain are left isolated and without electricity as roads are forced to close.

  An intense rain storm has led to severe flooding in Spain.

  Thousands of homes are without electricity, and roads and rail links have been forced to close.

  Coastal towns in the north-eastern region of Catalonia bore the brunt of the storm, as well as parts of central Spain near Madrid.
