title: Starmer says US 'backstop' needed for Ukraine peace deal - BBC News
date: '2025-02-18'
section: Europe
url: http://www.bbc.co.uk/news/articles/cn4z4w3v5y8o
content: |-
  The PM says "a US security guarantee is the only way to effectively deter Russia from attacking Ukraine again".

  Starmer says US 'backstop' needed for Ukraine deal

  This video can not be played To play this video you need to enable JavaScript in your browser. Watch: "Europe must have a secure future," said UK prime minister

  Sir Keir Starmer has said any Ukraine peace deal would require a "US backstop" to deter Russia from attacking its neighbour again. Speaking after a hastily convened meeting with European leaders in Paris, he said a "US security guarantee was the only way to effectively deter Russia", and vowed to discuss the "key elements" of a peace deal with US President Donald Trump in Washington next week. The prime minister repeated that he would consider deploying UK troops to Ukraine in the event of a lasting peace agreement. But Germany's Chancellor Olaf Scholz, a key Nato ally, said for his part, discussing sending troops to Ukraine at present was "completely premature".

  Sir Keir said Europe would "have to do more" to defend the continent in the face of the "generational" security challenge Russia posed. He avoided explaining exactly what he meant by a "backstop" - but his allies suggest this could involve air support, logistics and intelligence capabilities. The talks at the Élysée Palace were held to discuss concerns over the Trump administration's decision to initiate peace talks with Russia - due to start in Saudi Arabia on Tuesday - alone. Sir Keir was joined by the leaders of France, Germany, Italy, Poland, Spain, the Netherlands and Denmark, the presidents of the European Council and European Commission, and Nato Secretary General Mark Rutte. Ukrainian President Volodymyr Zelensky has said Kyiv did not know about talks in Saudi Arabia and would not recognise any agreement made without its involvement. US officials have suggested European nations would be consulted on peace talks with Russia, but not directly involved in them.

  This video can not be played To play this video you need to enable JavaScript in your browser.

  French President Emmanuel Macron posted on X in the early hours of Tuesday that he had "just spoken" with Trump and Zelensky. "We will work on this together with all Europeans, Americans, and Ukrainians. This is the key," he said, adding that he "will continue these discussions in the coming days". Prior to the meeting, the European leaders had also expressed concern after US Defense Secretary Pete Hegseth said it was "unrealistic" to expect Ukraine would return to its borders before 2014, when Russia annexed Crimea. Hegseth downplayed the prospect of Ukraine joining Nato - something Sir Keir had said it was on an "irreversible" path towards - and said Europe would have to be primarily responsible for guaranteeing its own security going forward. Sir Keir said the US was "not going to leave Nato" but that it was "time to take responsibility for our security, our continent". Polish Prime Minister Donald Tusk said transatlantic relations were in a "new stage", and that the meeting had confirmed the time had come for "a much greater ability for Europe to defend itself".

  European leaders convened at the Élysée Palace to discuss recent US moves to secure a peace deal

  Sir Keir has indicated any troop contributions from the UK would be part of a multinational force to police the border between Ukrainian-held and Russian-held territory. But experts say to do so effectively would be a massive undertaking that would require a large increase in defence spending. Malcolm Chalmers, deputy director of the Royal United Services Institute, said that, unlike UN peacekeeping forces there to observe, if the force being proposed was intended to deter Russian attacks, it would be a "whole different matter altogether". "You need credible, well-armed forces - and you not only need frontline forces, you need back-up forces, and air forces, and so on," he told the BBC. "That's a much bigger ask." General Sir Adrian Bradshaw, a former Nato commander, said: "This cannot be a token force, it cannot be something that observes bad behaviour and stands on the sideline." The former head of the British Army, Lord Dannatt, previously estimated such a force would need around 100,000 troops - with the UK contributing about two-fifths. "We just haven't got that number available," he said on Saturday, adding that getting the military into shape to perform this role would come at a considerable cost.

  The former head of the Army said protecting Ukraine would require 40,000 British troops

  The UK currently spends around 2.3% of its total economic output on defence. The government has committed to increasing defence spending to 2.5%, but has not said when this will be achieved. Sir Keir earlier told reporters that the government would set out a path to meeting the 2.5% commitment once it finishes its strategic defence review. "Part of my message to our European allies is that we've all got to step up on both capability and on spending and funding," he said. "That includes the UK, which is why I've made that commitment to spend more." Some European figures have signalled their agreement with this. Danish Prime Minister Mette Frederiksen said Europe had to "step up" defence spending and support for Ukraine, as "Russia is threatening all of Europe now, unfortunately", while European Commission President Ursula von der Leyen called for a "surge" in defence spending. No 10 confirmed Sir Keir's trip to Washington earlier on Monday, after a minister said the UK could serve as a "bridge" between the US and Europe. The BBC understands the PM offered to host a follow-up meeting of European leaders following the Washington trip.

  German Chancellor Olaf Scholz said discussing sending troops at this state was 'premature'

  Poland's Tusk has already indicated his nation would not send troops into Ukraine, but would continue to support it with military, financial and humanitarian aid. UK government sources argue it is "no surprise" there was a difference of opinion between leaders, and that not every nation is willing to show their hand quite yet. British diplomats do not believe every nation would need to commit to contributing troops - but some would. And whatever Europe's eventual role, US involvement would still be required. Prof Chalmers said: "Having significant numbers of Nato troops on Ukrainian soil after a ceasefire would be a failure for Russia, so it's hard for me at this point to see Russia accepting such a presence as a part of the deal." Liberal Democrats leader Ed Davey called on Sir Keir to recall Parliament to discuss plans to defend Ukraine. Parliament is currently in recess and is due to reconvene on 24 February. Sir Keir's spokesperson said Parliament would be consulted "as appropriate" but this was "getting ahead of discussions" with other world leaders. Fighting on the ground in Ukraine continued over the weekend, with at least three civilians killed in Russian strikes on Sunday, according to local authorities. Several areas of Ukraine are under an emergency blackout following attacks on energy infrastructure, while Russia's defence ministry said it had intercepted and destroyed 90 Ukrainian drones on Sunday night.

