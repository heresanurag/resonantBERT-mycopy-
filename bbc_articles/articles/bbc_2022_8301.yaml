content: |-
  Labour's Simon Lightwood criticises Boris Johnson in his victory speech after regaining the Wakefield seat.

  Newly-elected MP Simon Lightwood has promised to "restore trust" in politics, saying the people of Wakefield, West Yorkshire were sick of the "deceit and dishonesty of this government".

  Labour has won the by-election to regain the seat it lost to the Conservatives at the 2019 general election.
