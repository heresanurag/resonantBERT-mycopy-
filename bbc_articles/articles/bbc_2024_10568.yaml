title: One person dies in North Yorkshire mudslide - BBC News
date: '2024-05-23'
section: York & North Yorkshire
url: http://www.bbc.co.uk/news/uk-england-york-north-yorkshire-69050475
content: |-
  Emergency services were called to the scene in Carlton-in-Cleveland on Wednesday afternoon.

  One person has died in a mudslide at Carlton-in-Cleveland

  One person has died in a mudslide on the edge of the North York Moors National Park. The mudslide happened at Carlton-in-Cleveland at about 13:15 BST, with emergency services called to the scene. A yellow weather warning for rain is in place, with BBC Yorkshire climate correspondent Paul Hudson saying the area saw a month's worth in 12 hours. North Yorkshire Police said nobody else was hurt but asked the public to avoid the area. A spokesperson said: "We would ask the public to refrain from speculation and spreading unverified information." The incident is believed to have happened on Carlton Bank.

  Mr Hudson said Loftus, which is about 20 miles away, had recorded 42mm since 07:00. "This is more than the average for the whole month of May, which is 41mm," he added. "It is likely that some sites, especially on the moors will have had more."

  The road was closed for investigations on Wednesday afternoon

  The yellow warning of rain is in place until 12:00 BST on Thursday and more rain is forecast for the rest of the week. Carlton Bank is in the Cleveland Hills and overlooks the villages of Carlton-in-Cleveland and Faceby. Local councillor David Hugill, who visited the scene on Wednesday evening, told the BBC he was "devastated" by the news and his heart went out to the family and friends of the victim. Danny Burton, publican at the nearby Blackwell Ox Inn, said: "We heard all of the police cars going past at about lunchtime. "It's very strange, especially around here, for that much police activity so we kind of knew that something had gone a bit wrong."

