title: 'Brendon McCullum: England ''not finished article'' despite 3-0 series win
  over West Indies - BBC Sport'
date: '2024-07-29'
section: Cricket
url: http://www.bbc.co.uk/sport/cricket/articles/c06km7xev3do
content: |-
  England's Test series win over West Indies shows the team's "progression" but they are "not the finished article" according to coach Brendon McCullum.

  This video can not be played To play this video you need to enable JavaScript in your browser. Ben Stokes makes history as England win third Test against West Indies

  England's emphatic Test series win over West Indies has shown the team's "progression" but they are "not the finished article", according to coach Brendon McCullum. A pulsating third day at Edgbaston saw England wrap up victory in the third Test by 10 wickets thanks to Ben Stokes' record-breaking half-century and a mesmerising five-wicket haul from Mark Wood. England won the first Test at Lord's by an innings and 114 runs and the second at Trent Bridge by 241 runs. Despite the margin of victory on each occasion - and the manner of them - McCullum said it "wasn't all one-way traffic" and England have "still got a lot of improvement" to make. "I thought, overall, it was a progression of where we wanted to get to as a team," he told BBC Test Match Special. "We're not the finished article - we know that. But I think this series has been a step forward for us. It has been a while for us to get a series win and we'll never take that for granted."

  This video can not be played To play this video you need to enable JavaScript in your browser.

  England's next assignment in Test cricket is a three-match series against Sri Lanka starting on 21 August at Old Trafford with a number of their players set to feature in The Hundred between now and then. Stokes said the performance of England's bowling attack during the series augurs well for future overseas tours. McCullum and Stokes had decided to reshape it this summer with one eye on the 2025-26 Ashes in Australia. Stokes added: "I think again that shows how important pace is. You also need skill to go with that. Obviously it was a pretty slow wicket but we showed that we had an attack that could expose different options. "Whether it was when it was reversing, when it was swinging or when it was very flat, we had an attack that could try and change the momentum of the game. "Having different types of options in your armoury in a bowling attack is obviously key, especially when it's flat, when it's not really offering you much in the air or off the wicket."

