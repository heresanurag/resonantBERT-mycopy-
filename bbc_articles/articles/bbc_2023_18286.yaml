title: 'Australia: Moment house collapses in Perth wildfire - BBC News'
date: '2023-12-21'
section: General
url: http://www.bbc.co.uk/news/world-australia-67784236
content: |-
  Residents in the Parkerville area of Perth were warned to leave the area, due to a threat to life.

  A house has collapsed near Perth, Australia, after a wildfire tore through the property.

  Residents in Parkerville, to the east of Perth, were given an emergency warning to leave the area immediately due to a threat to life.

  According to the Western Australia Fire and Emergency Services, the threat level in the area has since been downgraded to a "Watch and Act" area, after the fire was contained.

  Local media reports two people received minor injuries in Parkerville and were receiving treatment in hospital.
