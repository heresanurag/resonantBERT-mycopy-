title: Your pictures of Scotland 2 - 9 October - BBC News
date: '2020-10-09'
section: Scotland
url: https://www.bbc.co.uk/news/uk-scotland-54393991
content: |-
  A selection of your pictures of Scotland sent in between 2 and 9 October. Send your photos to scotlandpictures@bbc.co.uk. Please ensure you adhere to the BBC's rules regarding photographs which can be found here.

  Please also ensure you follow current coronavirus guidelines and take your pictures safely and responsibly.

  Swing state: "With the sky painted in an epic array of colours I had to get the camera out", Andrew Leinster said of this stunning image of Isla Morris at Burnturk Woods looking towards the Lomond hills.

  The tide and groom: "My daughter Kirsty and her new husband Andy Sneddon having some post-wedding fun on the beach at Luskentyre, Harris", from Lynn Cadger.

  Surf's up: Ian Brown captured this action shot at Troon, with Ailsa Craig in the background.

  Like an oil painting: The harbour in Aberdeen, Europe's oil capital, in all its glory thanks to Erskine Logan.

  Motherly love: A red deer and her calf in Galloway at sunrise, thanks to Mandy Williams.

  Full marks: "This is the moon over Goat Fell on the Isle of Arran and Saltcoats harbour in north Ayrshire", says Peter Ribbeck.

  A nice day on the horizon: A sensational sunrise scene at Broughty Ferry beach, courtesy of Connor McLaren.

  Border crossing: First light on Beinn Each in the Trossachs, starring Dougal the border terrier, from Stephen Willis.

  High hopes: "I don't know the fella in this picture but I hope he sees it", says Claire Scott. "Beautiful day with amazing views from the summit of The Cobbler."

  A sly drink: "This fox cub has learnt to drink from our birdbath in Edinburgh", says Peter MacKenzie.

  Monster effort: Loch Ness from the air, thanks to Justin Hill.

  Thistle do nicely: Brian Hughes took this Flower of Scotland shot in Pittencrieff Park in Dunfermline.

  The calm before the storm: "Looking across the countryside near Quilquox, Aberdeenshire, in beautiful light shortly before a rain shower", says Andy Leonard. "I was struck by the bright green of the new crops and the trees silhouetted against the storm clouds."

  Split decision: "I captured this shot of the sun truly splitting the trees on a walk up Dumgoyne Hill on the edge of the Campsie Fells", says Morven Hibbert.

  Swell idea: Stephen Swindell captured the power of these waves at Aberdeen harbour amid Storm Alex at the weekend.

  Seeing double: "The photo was taken at Ferneyhill Cemetery in Kelso looking towards the Thomson Monument", says Wendy Richardson.

  Afternoon Knapp: John Cuthbert captured this atmospheric scene at Knapps Loch in Inverclyde.

  Table for two: Marian Coburn spotted these “twins” in Perth.

  A well-trained eye: An atmospheric shot at the Glenfinnan Viaduct, from Tom Blackman

  Clouding the view: "There wasn't much of a view from the summit of Ben Klibreck due to cloud - but there was once you dropped below the clouds", reports Neil MacRitchie.

  Catch of the day: Angela Mihovska caught this fishing scene off the Stonehaven coast.

  A deer friend: Cassie Richardson sent this photo taken in front of Buachaille Etive Mòr.

  Leven it late: "Captured this lovely sunset over Loch Leven while staying in Glencoe", says Gerry Feeney.

  A robin red rest: Tracy Macpherson spotted this little chap taking a break at Dunoon.

  A whale of a time: Peter Maciver caught this majestic moment at Gare Loch.

  Where Hugo, I go: "This amazing sunset shows Arbroath beach in all its beauty, with my happy dachshund Hugo exploring", says Charlene Craig. "He loves the beach more than life itself."

  Storr blimey: "Took this picture on a walk up to the Old Man of Storr", says Jon Wood of his impressive Isle of Skye shot.

  Fishing for compliments: Gerry McKeown also caught this beautiful image after an evening on Loch Coulter, Stirling.

  "No, it’s not a volcano!": That was Phil Ashby's description of this well-timed shot of Glen Etive.

  Roe deer oh dear: "This chap decided to feed on our plants and shrubs in our garden in Oban", says Dave Todd. "Grabbed this image through our kitchen window".

  Best of bothy worlds: "Cycled past this on an mountain bike ride over from Glen Artney", says Duncan McLay.

  Something in the Ayr tonight: "We've been having some lovely colours at sunset lately", says Eilean Low.

  A lovely golf shot: Mark Grierson from Edinburgh captured a "fire-like" sunset at Gifford golf course.

  Beak-a-boo: "Wee bit close Mr Swan, taken at Hogganfield Loch", says Rosie McGeachan in Glasgow.

  Stag night: Moon and Mars aligning above Andy Scott's sculpture in Dumbarton", says Gerry Doherty.

  Beach buoys: "This is washed up in Irvine beach park at the moment", says Martin McKerrell. "It made an interesting focus for those walking on the beach".

  Outstanding in its field: "I came across this suitably masked scarecrow in the Royal Botanic Garden, Edinburgh", says Chris Pinder. "Who wouldn't want to maintain a social distance from her?!"

  Sons set: Charlie Gallagher caught this tranquil moment featuring sons Charlie, four, James, 10 and Chris, 11, enjoying an ice cream at the end of the day in Largs.

  Conditions of use: If you submit an image, you do so in accordance with the BBC's terms and conditions.

