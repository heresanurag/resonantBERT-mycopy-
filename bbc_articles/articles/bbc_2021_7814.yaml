  Radd Seiger, spokesman for Harry Dunn's parents, said: "It is a huge development and we are grateful to the politicians for making this possible.

  "This campaign has never been about vengeance or retribution, but about accountability for the loss of their totally innocent son.

  "That is what any of us would want and that is what must now be delivered."

  Last year, the Dunn family's constituency MP, Andrea Leadsom, said a virtual trial would see Mrs Sacoolas go through the court process in England, but she would remain in the US throughout, including any sentence handed down.

  What a virtual trial means in practice is unclear.

  The CPS has so far insisted that Mrs Sacoolas must be extradited to the UK.

  A criminal trial on US soil, under modern English law, would be a first since the British lost the American Revolutionary War in 1783 and therefore highly unlikely.

  But Mrs Sacoolas' lawyers have previously also said she is willing to serve some kind of community sentence at home.

  On Friday, Prime Minister Boris Johnson said he and US President Joe Biden were "working together" to resolve the case.

  Mr Raab said President Biden had "empathised from his own personal experience and it was very moving, genuinely".

  The president lost his first wife, Neilia Hunter, and their one-year-old daughter Naomi in a car crash in 1972.

  Harry Dunn's family want Mrs Sacoolas to be stripped of diplomatic immunity in order to face a British court over the death.

