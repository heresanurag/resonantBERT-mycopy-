  Tory rebel Anna Soubry suggested she was ready to pull back if Mrs May announced measures that would amount to a customs agreement on Friday, telling BBC Radio 4's The World This Weekend: "It's absolutely beholden now on the government to get itself in the right place."

  In his speech on Monday, Mr Corbyn will say the EU "is not the root of all our problems and leaving it will not solve all our problems," adding: "Brexit is what we make of it together, the priorities and choices we make in the negotiations."

  More than 80 senior figures in the Labour Party have, meanwhile, urged Mr Corbyn to commit to remaining in the EU single market after Brexit.

