content: |-
  Fans from both nations had their face-paint on and flags out as Spain defeated England in the final.

  Rollercoaster of emotions for England and Spain fans during Euro 2024 final

  It was heartbreak for England as they lose to Spain in the Euro 2024 final

  Football fans across Europe crowded around televisions, gathering in fan zones, and waving flags as they watched Spain beat England in the Euro 2024 final. Thousands of supporters poured into Berlin's Olympiastadion in Germany, while many of those without tickets watched the match on a screen at the Brandenburg Gate. Fans did not disappoint with their costumes, props, face-paint, and emotion for a tense conclusion to the tournament. Here is a taste of the atmosphere from the England and Spain fans throughout the day.

  The fiesta started for Spanish supporters before kick-off

  This was one way of showing off your favourite player, but let us hope the Lamine-Yamal-masked-fan was actually able to see the game

  Fan zones outside of Berlin tuned in to the match too with flags, colourful wigs, and face paint. In these crowded spaces, some even bought along goggles to avoid any drinks getting in their eyes when celebrating goals.

  There was a celebratory mood among these England fans in London as the game kicked off

  These England fans were well-prepared for any beer throwing

  There were many nail-biting moments for fans on Sunday night

  Fans gathered in Sunderland - where England goalkeeper Jordan Pickford is from - to watch the game

  No face paint? These England supporters in Manchester used sequins instead

  Fans in Pamplona, Spain celebrated after Nico Williams scored their first goal

  Meanwhile England fans in Manchester looked on in shock

  But shock turned to jubilation for fans in London as Cole Palmer scored to equalise

  But celebrations were short-lived as Mikel Oyarzabal scored a second goal for Spain

  Spain fans celebrated their Euro 2024 win after the final whistle

  It was heartbreak for England fans once more

  Fans in London were miserable as England prepared to return home empty-handed
