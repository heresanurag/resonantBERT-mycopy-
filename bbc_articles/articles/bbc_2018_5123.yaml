title: 'Winnie Madikizela-Mandela: ANC has ''messed up South Africa'' - BBC News'
date: '2018-04-02'
section: General
url: http://www.bbc.co.uk/news/world-africa-40649719
content: |-
  Winnie Madikizela-Mandela says South Africa is in a political crisis and the ANC has "messed up".

  Winnie Madikizela-Mandela has told the BBC that South Africa is in a political crisis and a no confidence vote against President Jacob Zuma, due next month, will be of any help.

  Her comments came on the day South Africans celebrated what would have been the 99th birthday of her former husband, Nelson Mandela, the country's first black president.
