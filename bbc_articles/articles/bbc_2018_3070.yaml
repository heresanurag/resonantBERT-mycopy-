  Replacements: Marmion for Earls (74), Larmour for Aki (56), Carbery for Sexton (34), J McGrath for Healy (51), S Cronin for Best (65), Porter for Furlong (65), Toner for J Ryan (67), Murphy for O'Mahony (73).
