title: Olivia Rodrigo reveals rescheduled gigs at Manchester's Co-op Live - BBC News
date: '2024-10-09'
section: Culture
url: http://www.bbc.co.uk/news/articles/cy89178vx7po
content: |-
  The US singer's original shows, in May, had to be postponed because of problems with the new arena.

  Rodrigo's new Manchester dates will be just after next year's Glastonbury Festival

  Olivia Rodrigo fans who had tickets for her ill fated gigs at Manchester's Co-op Live arena in May must wait until next summer for her rescheduled dates. The US pop singer's original shows at the venue were postponed days beforehand because of problems with the new arena. The new dates have now been revealed as Monday 30 June and Tuesday 1 July 2025, raising the prospect Rodrigo could also perform at the Glastonbury Festival, on 27-29 June. Tickets for the original Co-op Live shows will be valid for the new dates - but some fans have lost hundreds of pounds spent on booking travel and accommodation.

  Rodrigo had been due to begin her UK tour at the £365m arena - but the concerts were postponed after a heating pipe fell from the ceiling as the venue prepared to open. It was one of a number of major embarrassments for the 23,500-capacity venue, the UK's largest indoor arena. This weekend, Rodrigo's tour reached the world's biggest arena, the 55,000-capacity Philippine Arena, a show significant for the singer because her great-grandfather emigrated from the Philippines to the US. She has now moved on to Australia, the last leg of the main part of the Guts tour, but will also perform a string of shows in South America next March.
