title: London's Elizabeth line wins 2024 Riba Stirling Prize for architecture - BBC
  News
date: '2024-10-16'
section: London
url: http://www.bbc.co.uk/news/articles/c89lj77wgzeo
content: |-
  The Stirling Prize is normally awarded to a new building, but has gone to the entire train line.

  Judges said the Elizabeth line "sets a bold new standard for civic infrastructure"

  The Elizabeth line, London's newest train line, has been awarded the UK's most prestigious architecture prize. The Stirling Prize is normally awarded by the Royal Institute of British Architects (Riba) to the country's best new building, but this year it has gone to the entire 62-mile network and its 10 new stations. The judges praised its "slick suite of architectural components", in which "the typical commuter chaos is transformed into an effortless experience". Not all passengers will share that view. Some have complained about delays and overcrowding, and three have told BBC London they were injured at Ealing Broadway station because the gap between the platform and the trains is too big.

  The line, which runs from east to west via central London, opened in 2022 and transports more than 700,000 passengers every weekday. New station areas were built at Paddington, Bond Street, Tottenham Court Road, Liverpool Street and Canary Wharf, among other locations. "It is an extraordinarily complex architectural feat masked by an elegant simplicity," Riba said.

