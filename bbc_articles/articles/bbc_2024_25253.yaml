  Riba president and jury chair Muyiwa Oki said: "The Elizabeth line is a triumph in architect-led collaboration, offering a flawless, efficient, beautifully choreographed solution to inner-city transport. "It's an uncluttered canvas that incorporates a slick suite of architectural components to create a consistent, line-wide identity - through which thousands of daily passengers navigate with ease. "Descending into the colossal network of tunnels feels like entering a portal to the future, where the typical commuter chaos is transformed into an effortless experience." He added that it is "architecture of the digital age", which "utilises cutting-edge technology to create distinctive spatial characteristics and experiences", and "sets a bold new standard for civic infrastructure".

  The Elizabeth line includes 62 miles of track and 26 miles of tunnels

  The Elizabeth line was formerly known as Crossrail before being renamed after Queen Elizabeth II. It was designed by a group of architects, engineers and designers including Grimshaw, Maynard, Equation and AtkinsRéalis. Neill McClements, a partner at Grimshaw, said: "The Elizabeth line is a piece of infrastructure that has been transformative, not only for London’s transport network but also for many people’s lives, highlighting the role design plays in elevating our every day." The award comes almost a year after London Mayor Sadiq Khan said the Elizabeth line had "not met the consistently high standards" expected by Londoners. Previous Stirling Prize winners include Goldsmith Street council housing in Norwich and The New Library at Magdalene College, Cambridge.
