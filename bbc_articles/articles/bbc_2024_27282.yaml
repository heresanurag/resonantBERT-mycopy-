title: Trail of destruction after Spanish floods - BBC News
date: '2024-11-01'
section: General
url: http://www.bbc.co.uk/news/videos/c1e7zx71l1do
content: |-
  At least 158 people were killed following flash floods in southern Spain.

  Flash flooding in Spain left a trail of destruction with cars and debris piled in the streets.

  Emergency services worked overnight and used hoses in order to clear water from car parks.

  Drone footage shows a road partially collapsed as water continues to rush in.

  Spanish flags were lowered at half mast after at least 95 people were killed.
