title: 'Nazanin Zaghari-Ratcliffe: Iran''s take on Johnson''s remarks - BBC News'
date: '2017-11-11'
section: General
url: http://www.bbc.co.uk/news/world-middle-east-41952339
content: |-
  The British foreign secretary had commented on Nazanin Zaghari-Ratcliffe, who is in jail in Iran.

  This is how Iran's media reported comments made by the British Foreign Secretary Boris Johnson about Nazanin Zaghari-Ratcliffe.

  Mr Johnson said the British-Iranian charity worker had been training journalists in Iran, where she has been imprisoned.

  He has since said the government has "no doubt" she was on holiday "and that was the sole purpose of her visit".
