title: Personal theft up 22% in England and Wales, ONS says - BBC News
date: '2025-04-24'
section: UK
url: http://www.bbc.co.uk/news/articles/crld4lgelp3o
content: |-
  It is the highest number recorded in a year since the current data began in 2003.

  Personal theft up 22% in England and Wales, ONS says

  Police recorded the highest number of theft from the person offences since current data began in 2003

  Personal thefts recorded by police in England and Wales were up 22% in 2024 from the previous year, according to official figures. Data from the Office for National Statistics (ONS) shows police recorded 152,416 thefts from the person offences last year, the highest since the current data methods began in 2003. Shoplifting was also on the rise, surpassing half a million recorded offences for the first time. Meanwhile, the number of homicides was the lowest for a decade, and overall crime was still below pre-pandemic levels and down more than 75% since the mid-1990s.

  There were also 54,587 knife crime offences recorded by police in 2024, up 2% from the previous year, while firearm offences decreased by 20%. Overall, police recorded 6.64 million crimes in England and Wales last year - down 1% from 2023. Responding to the data, policing minister Dame Diana Johnson said the government "will not tolerate the criminality blighting our communities". She added: "That's why we're putting almost 3,000 more bobbies on the beat in neighbourhood roles this year." To build a bigger picture of crime in England and Wales, the ONS also refers to estimates from its crime survey. The Crime Survey for England and Wales (CSEW) is a face-to-face survey which asks people aged 16 and over about their experiences of crime in the past year. It estimated that there were 9.6 million incidents of what is described as "headline crime" in 2024 - which includes theft, robbery, criminal damage, fraud, computer misuse, and violence with or without injury. The latest CSEW survey, external reported that at the end of 2024:
  • None People's experiences of theft had gone up by 13% - including a 50% rise in theft from the person offences, such as mobile phone theft
  • None Theft from outside a dwelling - such as courier packages being taken from people's doorsteps - went up by 19%
  • None Fraud incidents, including bank and credit account fraud, were up by 33% to around 4.1 million incidents - with around 3 million incidents involving a loss and 2.1 million victims fully reimbursed in these cases Meanwhile, ONS data showed no significant change in people's experience of violent crime, which remained at the lowest level since equivalent records began in 1981. The ONS reported that, over the last 10 years, there has been an increase in sexual assault. In the year to March last year, 2.6% of people aged 16 to 59 reported experiencing sexual assault, including attempts. Ten years earlier, the proportion was 1.5%. There has been a fall in domestic abuse over the same period, with 5.4% of those aged 16-59 reporting they had experienced domestic abuse in the previous 12 months, down from 6.5% a decade earlier.
