title: Rooftop peacock leaves residents sleep deprived in Ossett - BBC News
date: '2024-05-17'
section: General
url: http://www.bbc.co.uk/news/uk-england-leeds-69023225
content: |-
  The bird, which escaped from a farm in West Yorkshire, has been waking people up in the night.

  A runaway rooftop peacock has been waking up residents in a West Yorkshire neighbourhood with its loud cry.

  The bird, which escaped from a nearby farm three days ago, has been disturbing people's sleep in Ossett.

  Both the RSPCA and RSPB have been called, but as the bird is not injured or in danger the charities are unable to help.

  The Watering Hole Farm, where the bird usually lives, said the peacock will return on its own when it is ready.
