title: 'National Television Awards: Stars hit the red carpet - BBC News'
date: '2021-09-09'
section: General
url: http://www.bbc.co.uk/news/entertainment-arts-58508240
content: |-
  It's the first big awards night for British TV since the pandemic began.

  Television stars took to the red carpet for the National Television Awards. It's the first big and flashy awards night for British TV since the pandemic began, taking place in London's O2.

  Stars posed for selfies with excited fans, ahead of what Alan Carr calls the most glitzy "office party" for members of the industry.
