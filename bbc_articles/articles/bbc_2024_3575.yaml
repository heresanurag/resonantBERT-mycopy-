  Replacements: Grady for Adams (61), Evans for Lloyd (80), Hardy for T. Williams (72), Domachowski for Thomas (58), Elias for Dee (54), Griffin for Assiratti (54), Rowlands for Beard (68), Basham for Mann (68).
