  Trump touted many of his executive actions, praised Musk for his work with Doge and named a teenager a Secret Service agent.

  US President Donald Trump addressed a joint session of Congress six weeks after beginning his second term in office.

  In addition to listing his achievements while in office, he made a teenager a US Secret Service agent and reaffirmed his desire for Greenland to become part of the US.

  Democratic Congressman Al Green was ejected from the chamber for interrupting Trump's speech.
