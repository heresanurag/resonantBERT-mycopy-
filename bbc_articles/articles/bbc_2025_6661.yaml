  Mazyar Azarbonyad is due in court over the crash during a police pursuit through Tyneside.

  Man charged over crash injuries to seven officers

  Five police vehicles were involved in the crash on the A1 near Denton Burn in Newcastle

  A man has been charged over a crash during a police pursuit on the A1 that left seven officers injured. Five police vehicles were involved in the crash with a BMW near Denton Burn, Newcastle, just before 02:30 BST on 9 April, Northumbria Police said. Mazyar Azarbonyad, 20, of Sylvia Terrace, Durham, will appear at Newcastle Magistrates' Court on Saturday charged with dangerous driving, the force added. He also faces two counts of failing to stop a motor vehicle when required by a constable, two counts of no insurance use, and two counts of driving otherwise than in accordance with a licence.

  A woman in her 20s who was arrested on suspicion of aiding and abetting dangerous driving was released with no further action to be taken in relation to that arrest. However, she was released on police bail for drug possession offences, pending further inquiries. The A1 was closed in both directions across the River Tyne, between Swalwell in Gateshead and Denton, for almost 13 hours following the crash.

