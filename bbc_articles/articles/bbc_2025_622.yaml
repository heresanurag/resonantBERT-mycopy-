  This prompted calls for a reduction in numbers of the pigs, which include escapees and others that had been illegally released to roam free. It is thought there could be a few thousand of the animals across Scotland. NatureScot said that Police Scotland had been informed of the potentially illegal release of the feral pigs, however the force said there was no police involvement at present. Police Scotland's investigation into the illegal release of the lynx remains ongoing. The three surviving cats are being cared for at RZSS' Edinburgh Zoo. To assist the police investigation, RZSS has said no details are being given on what sex they are or if the lynx have been microchipped. On the lynx investigation, Police Scotland said: "Inquiries are ongoing and any update will be issued proactively on our website, social media channels and as a press release."
