title: Feral pigs found after being 'illegally dumped' in Highlands - BBC News
date: '2025-02-11'
section: Highlands & Islands
url: http://www.bbc.co.uk/news/articles/ce8ykl5x8pvo
content: |-
  The pigs were spotted about five miles away from where four lynx were illegally released last month.

  The pigs were spotted on the western side of the Highlands park (stock picture)

  Park rangers have located a drove of feral pigs which may have been illegally released in the Cairngorms and are attempting to capture them. The Cairngorms National Park Authority said the pigs were seen near the Uath Lochans area of the Highlands park, which is near the small community of Insh, on Monday. It said they appeared to have been illegally abandoned and staff were attempting to capture the "relatively domesticated" animals using a live trap. The pigs were spotted about five miles away from where four lynx were illegally released in the park last month.

  The big cats were captured successfully but one died shortly afterwards. The Royal Zoological Society of Scotland (RZSS) said they would have been under great stress after being abandoned in a new and "extremely harsh" environment.

  The pigs were seen in an area of the Cairngorms National Park

  A park authority spokesman said on social media: "We are aware that feral pigs have been spotted in an area of the Cairngorms National Park near Uath Lochans. "The park authority is working closely with partners - including NatureScot and Forestry and Land Scotland (FLS) - to ascertain the full facts on the ground and FLS is currently attempting to trap the animals. "The animals appear to be relatively domesticated and it is likely that this is an illegal release. The park authority condemns any illegal release of animals in the strongest possible terms." A NatureScot spokesman said: "We are liaising with partner agencies to ascertain the full circumstances of how the feral pigs came to be in the area."

  The Cairngorms National Park is the UK's biggest national park, sprawling across 1,748 sq miles (4,527 sq km) and includes parts of five local authorities - Aberdeenshire, Angus, Highland, Moray and Perth and Kinross. Scottish Land and Estates (SLE), which supports rural businesses, condemned the "reckless" release, and encouraged anyone with information to contact police. Ross Ewing, director of moorland at SLE, said: "This appears to be a reckless and illegal act which demonstrates a total disregard for both animal welfare and the wider environment. "We saw the tragic consequences of last month's illegal lynx release, which resulted in the death of one of the animals. "Those responsible for these incidents show little concern for the welfare of the species they release or the serious impacts they could have." Tom Cameron from FLS told BBC Scotland's Lunchtime Live programme that there was a growing concern about illegal releases. He added: "We don't want people to think that the Cairngorms, or anywhere in Scotland, is a suitable place for illegally releasing or abandoning animals." Last year, herds of feral pigs were said to be out of control in the Highlands' Great Glen. The animals were blamed for killing sheep and damaging grazing land on crofts and farms.

