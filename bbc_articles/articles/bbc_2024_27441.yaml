  Building the link to western Europe has become more urgent as the Baltics see Russia as a threat.

  In Russia's shadow: The Baltics wait for Europe's strategic new railway

  The trans-Baltic rail project has already cost billions of euros, but is years from being completed

  The three Baltic states came up with the idea years ago for a high-speed railway spanning 870km (540 miles) across Estonia, Latvia and Lithuania. Rail Baltica began as a grand project, but it has now become a strategic imperative: since Russia’s full-scale invasion of Ukraine, the Baltics increasingly view their neighbour as an existential threat. Currently, there is no direct link that crosses the Baltics and connects with Poland. Rail Baltica will do that, cutting travel time and bringing economic and environmental benefits, but the costs of this ambitious scheme are mounting. Meanwhile, Baltic states and their Nato allies need the railway in place fast. Estonia's Infrastructure Minister Vladimir Svet said the rail link is vital amid the Russian war in Ukraine. “History is repeating itself,” he said. “Putin's aggressive regime is trying to recreate an imperial project on the territory of the former Soviet bloc." The memory of decades of Soviet occupation is still fresh in the Baltics. Moscow deported hundreds of thousands of people from the region to Siberia. Estonia and Latvia share land borders with Russia, while Lithuania is adjacent to the Russian enclave Kaliningrad, which also shares a border with Poland, and Moscow's close ally, Belarus.

  About 10,000 Nato soldiers are currently stationed in the Baltics, alongside local troops. Their total number could reach 200,000 in a worst-case scenario. “Rail Baltica will increase military mobility and allow trains to go directly from the Netherlands to Tallinn,” Cmdr Peter Nielsen, from Nato's Force Integration Unit, said. For Estonia's infrastructure minister, the railway is “an unbreakable link with the networks of Europe”. Not far from the Estonian capital, Tallinn, at the tip of the railway, dozens of workers are welding and hammering away at the new Ülemiste passenger terminal. “This will be the network's most northern point, the starting point of 215km of railway in Estonia and 870km across the three Baltic States,” said Anvar Salomets, CEO of Rail Baltica Estonia, stepping carefully across the embryonic platforms.

  The northernmost point of the line is in Estonia, although there is little sign of a track

  Until now, the Baltics have used a Russian track width because their rail system dates back to the Soviet era. Passengers have to change trains to the European system when they get to the Polish border. The new network will use the European railway track width and connect seamlessly with railways across the EU.

  “The trains will run at up to 250km/h (155mph) compared with 80 or 120km/h (50 or 74mph) right now,” Salomets added. That means journey times from Tallinn to the Lithuanian capital, Vilnius, will be massively reduced, from at least 12 hours now to under four. “It'll be a game-changer, decreasing the environmental impact across our whole transport sector,” says Salomets, who foresees big economic benefits. Recent analysis for the Rail Baltica consortium estimates the overall economic boost at €6.6bn (£5.5bn). “The vast majority of studies of existing high speed rail systems show a positive economic impact,” said Adam Cohen of the University of California at Berkeley.

  Latvia and Estonia have been criticised for building rail terminals before the railway itself

  But those benefits will not appear overnight and there is growing concern at the spiralling cost. Developers' estimates have increased fourfold since 2017 and now stand at €24bn. So far, the EU has subsidised 85% of the project and has just announced another €1.1bn. Estonia and Latvia have also come under criticism for focusing on putting up the rail terminals first before they build the mainline. French engineer Emilien Dang, whose RB Rail oversees the project, blamed recent global crises for the big spike in costs: “Our initial estimate hadn't taken into account the Covid pandemic and high inflation - and the situation in Ukraine has dramatically increased the cost of material.” As he walked across a big new terminal in the Latvian capital Riga, he also cited cultural issues. “The view from France, wrongly, is that the Baltics are one unit. But they are three countries, with different regulations.”

  French engineer Emilien Dang said the project was having to deal with three separate countries with different regulations

  The Baltic states have decided to split the project into two phases. The first, costing €15bn, will have a single instead of double track laid by 2030 and focus on the most important train stops. The second track and additional train stations are to be completed as part of a second phase with no specific completion date yet. The soaring costs have prompted the states to scale back some of their ambitions. “We can further scale back the scope of phase one, for example by connecting Riga airport at a later stage,” said Andris Kulbergs, who chairs a Latvian parliamentary committee investigating the project. As billions of euros for the first phase are yet to be secured, that might be necessary. Estonia's national auditor Janar Holm believes several more years of delays are likely: “We have to find the funds to build this railway now or it'll be even more expensive.” The country's infrastructure minister, Vladimir Svet, insisted "we are decreasing the budget as much as possible, we’ve rationalised the public procurement process and, if necessary, we'll take on a loan." “If we want to preserve our culture and feel secure about our freedom, there is no other way than being in a strong EU, Nato and international community that supports international law,” he added. For the three Baltic states that broke free of the Soviet Union to join the EU and Nato, Rail Baltica could serve as a lifeline - if it manages to stay on track.
