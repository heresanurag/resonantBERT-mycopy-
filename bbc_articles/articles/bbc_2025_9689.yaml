content: |-
  Dr Rose has been describing life at Nassar Hospital in Gazan city of Khan Younis.

  A British surgeon who returned to southern Gaza a week ago has been describing life at Nassar Hosptial in Khan Younis.

  Israel has issued an evacuation call to Palestinians around Khan Yunis ahead of what it described as an "unprecedented attack".

  Dr Rose says if Nassar hospital is evacuated - there's nowhere else with intensive care for the patients to be moved to.
