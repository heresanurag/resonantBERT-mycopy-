title: Kate briefed on early years report but no return to work yet - BBC News
date: '2024-05-21'
section: UK
url: http://www.bbc.co.uk/news/uk-69039748
content: |-
  A return to work is ruled out for the Princess of Wales, as her early years foundation issues a report.

  The Princess of Wales is continuing to stay away from public events while she recovers after a cancer diagnosis. "The princess is not expected to return to work until it's cleared by her medical team," said a Kensington Palace spokesman. The update emerged at the launch of a report by her early years foundation. Catherine has been away from public life for most of this year - and this latest news suggests a return to work is not imminent. The princess had been briefed on the report by the Royal Foundation Centre for Early Childhood, which calls for more business investment in children's early years. "Early childhood will continue to be central to her public work," said a Kensington Palace spokesman. The Princess of Wales revealed in March she was receiving treatment following a cancer diagnosis. That followed an announcement in January that the princess had undergone abdominal surgery. This latest information suggests nothing has changed since the previous calls for privacy while she recovers. But she is said to have remained a "driving force" behind the Centre for Early Childhood.

  The project's executive director, Christian Guy, said the princess was "excited" by the foundation's campaign and that the early years campaign was "rolling on as she recovers". The foundation is calling on businesses to invest in supporting families with young children, such as more flexible working hours or help with childcare. Produced by business leaders from companies such as NatWest, Aviva, the Co-op, Unilever and Deloitte, its latest report claims that the UK economy could make long-term gains of £45.5bn per year from a more successful approach to children's early years. It claims that better early years education would eventually boost productivity in the workplace, more access to childcare would allow more parents back to work and more support would mean reducing the long-term costs of a neglected childhood, such as higher risks of ill-health and unemployment. Emma Franklin, from Deloitte, which produced the report, said employers could help with cultural changes which would make it easier for workers with young children. This could be something like not expecting staff to stay in touch on days off or not to expect replies early in the morning, before parents had dropped off children at childcare or nursery or school, said Ms Franklin. She described it as "parenting out loud", where people were able to talk openly about the pressures of balancing parenthood with work. Improving the experience of early childhood would have a "generational impact", she said, benefiting individuals and the economy.

