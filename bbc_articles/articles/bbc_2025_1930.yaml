title: George Mills wins British indoor 3,000m title with championship record - BBC
  Sport
date: '2025-02-23'
section: Athletics
url: http://www.bbc.co.uk/sport/athletics/articles/cwye33334epo
content: |-
  George Mills wins the British indoor 3,000m title in a new championship record time.

  George Mills broke the championship record to win the men's 3,000m at the British Indoor Athletics Championships in Birmingham.

  Mills finished 0.17 seconds clear of James West to claim victory in a time of seven minutes 40.16 seconds.

  The 25-year-old was watched by his father, former England footballer Danny Mills, as he broke the previous championship record by almost 10 seconds.

  His performance has qualified him for the European Indoor Championships.

  "I came here to do a job - that was to first of all qualify for the European Indoor Championships and put my name in the hat again for Worlds and, obviously, to win," Mills told BBC Sport.

  "Delighted to do that. When I go to races now in these championships, I'm going to win medals, so that's what I'm aiming to do.

  "I really give everything to this sport and I just want to be the best athlete I can."

  In the women's 3,000m, Hannah Nuttall earned victory ahead of Laura Muir, who was second.

  Nuttall beat Muir by more than half a second after overtaking her late on to finish in a time of 8:49.49.

  Both will also feature at the Europeans.

  "I did think today I could potentially come out with the win if I had my best possible race, but to actually execute it and do it is another thing," said Nuttall.

  "I thought I'll just follow her [Muir] and see what I have left in the tank at the end. I had another gear and when I went past her she didn't have anything left.

  "The nerves the last few days have been off the scale."

  Elsewhere, 17-year-old Otis Poole won the high jump with a huge personal best of 2.20m, despite only receiving an invitation to compete on Wednesday. Poole's previous best was 2.09m.

  Scot Neil Gourley triumphed in the men's 1500m, setting a championship record of 3:38.84, while Olympic bronze medallist Georgia Hunter Bell retained her title in the women's event in 4:13.23.

  The European Indoor Championships take place in Apeldoorn, the Netherlands, from 6 to 9 March.
