  May's health problems come four years after he had a "small" heart attack. At the time, he said was shocked to realise he wasn't as healthy as he thought, and he was "very near death". He discovered three arteries were "congested and in danger of blocking the supply of blood to my heart", and subsequently had surgery to fit three stents - tiny tubes to hold open blocked arteries. May's guitar playing, songwriting and vocals helped propel Queen to be one of the biggest bands in the world in the 1970s and 80s. He wrote hits including We Will Rock You, Who Wants to Live Forever and Flash, and co-wrote others. After the death of frontman Freddie Mercury in 1991, the band have continued with new singer Adam Lambert. As well as his music career, May is known for his animal rights activism, and earned a PhD in astrophysics in 2007, 36 years after abandoning his thesis when the band took off. He is married to former EastEnders actress Anita Dobson.
