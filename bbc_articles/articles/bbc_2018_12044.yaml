title: Jet2 plane aborts Leeds Bradford Airport landing due to wind - BBC News
date: '2018-10-14'
section: General
url: http://www.bbc.co.uk/news/uk-england-leeds-45851759
content: |-
  A Jet2 plane has aborted a landing due to wind at Leeds Bradford Airport and diverted to Manchester.

  A Jet2 plane has aborted a landing at Leeds Bradford Airport due to wind.

  The flight LS272 from Alicante was eventually diverted and landed safely at Manchester

  Jet2 said the company was one of a number of airlines affected by the high winds.
