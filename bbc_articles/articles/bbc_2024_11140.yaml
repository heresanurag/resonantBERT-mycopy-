title: 'Netball Super League: Severn Stars beat Leeds Rhinos to reach semi-finals
  - BBC Sport'
date: '2024-06-01'
section: Netball
url: http://www.bbc.co.uk/sport/netball/articles/cw55qqv5z01o
content: |-
  Severn Stars secure their place in the Netball Super League semi-finals with a 61-56 away win over fifth-placed Leeds Rhinos.

  Severn Stars secured their place in the Netball Super League semi-finals before Manchester Thunder rounded off the weekend's action by clinching victory in a dramatic finish.

  Thunder and London Pulse had already sealed their spots in the final four but produced a thrilling finale when they met in Manchester on Sunday.

  Pulse fought back to lead 33-27 heading into the final quarter but Paige Reed helped the hosts draw level with four minutes left, then edge in front for a 44-40 win which sent them clear again as leaders.

  Severn ensured they will join them in the semi-finals on Saturday, with Sigrid Burger firing 49 goals as they won 61-56 at fifth-placed Leeds Rhinos to move out of reach of their hosts in the table.

  Cardiff Dragons, meanwhile, produced an impressive away display to beat Saracens Mavericks 63-43.

  Georgia Rowe scored 57 goals for the Dragons, who moved above their hosts into seventh in the table. Defeat for Saracens meant they dropped to eighth.

  Manchester's win over London on Sunday meant they went three points clear of Loughborough Lightning, who had drawn level after beating Surrey Storm 72-68.

  The visitors trailed 21-17 after the first quarter before recovering to take the lead in the second. Surrey edged the third in a tight contest but Loughborough, who are through to the semi-finals, claimed victory.

  On Friday, Team Bath could not mark their last ever home match in the Super League with a win as they were beaten by Strathclyde Sirens 57-50.

  Victory for Sirens was their first of the season amid a backdrop of emotion for those connected to the hosts as the five-time Super League champions have not been included in the relaunched Netball Super League (NSL).

  In an address of the home fans, Team Bath head coach Asha Francis said: "I really appreciate every single one of you.

  "To all of you who have supported us through the good, the bad, the highs and the lows, we definitely couldn’t have done any of this without you and we are so, so grateful to have the best fans in the league.

  "We really hope that, despite the decision that has been made, you continue to watch netball and that netball will still thrive in the South West, and we will come back bigger and stronger."
