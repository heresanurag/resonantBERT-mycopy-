title: HMS Prince of Wales departs from Portsmouth on major deployment - BBC News
date: '2025-04-22'
section: England
url: http://www.bbc.co.uk/news/articles/cy8qvn96lj1o
content: |-
  The £3bn aircraft carrier has set off from Portsmouth for eight months.

  This video can not be played To play this video you need to enable JavaScript in your browser. HMS Prince of Wales sets off on an eight-month deployment

  The Royal Navy's flagship HMS Prince of Wales has departed on one of its biggest deployments yet. The £3bn aircraft carrier set off from Portsmouth and will take part in exercises demonstrating the UK's ability to operate fast jets at sea, and carry out large scale military operations on the other side of the world. Up to 24 of the latest F-35B stealth jets will join the carrier as it leads a multi-national fleet of warships to 40 countries across the Mediterranean, Middle East, south-east Asia, Japan and Australia. The 65,000-tonne warship, which can hold up to 1,600 military personnel, will be deployed for eight months.

  Members of the public turned out in force to watch the aircraft carrier depart

  HMS Prince of Wales will be part of the Carrier Strike Group (CSG) which includes the Portsmouth destroyer HMS Dauntless, Plymouth frigate HMS Richmond, as well as warships from Norway, Canada, and other NATO members. On board will be the RAF's 617 squadron, also known as The Dambusters, and 809 Naval Air Squadron The Immortals. Commanding officer Capt Will Blackett said: "We've been practising and practising and practising. "What we'll do, once we sail and get past the Isle of Wight, is embark the largest air wing that has ever been embarked on this ship ever.

  This video can not be played To play this video you need to enable JavaScript in your browser. Families gathered on the harbour-side to watch their loved ones leave

  A Royal Navy spokesman confirmed the ensign on the flight deck of HMS Prince of Wales was at half-mast as a "mark of respect" for the late Pope. Defence Secretary John Healey said: "I want to thank the thousands of our armed forces personnel involved in the delivery of this immensely complex operation, demonstrating the UK's world-leading capability to deploy a major military force around the world." He added: "As one of only a handful of countries in the world able to lead a deployment of this scale, the Royal Navy is once again demonstrating its formidable capability while protecting British values and sending a powerful message of deterrence to any adversary."

  Capt Will Blackett, Commodore James Blackmore, and Capt Colin McGannity (l-r) are leading the mission

  In addition to the fighter jets are 16 Merlin and Wildcat helicopters, and a number of T-150 Malloy and Puma drones. With fast moving world events and the ongoing conflicts in Ukraine and the Middle East, Commodore James Blackmore, commander of the strike group, said there was always a possibility that the programme could be changed. "Agility allows me at any moment to undertake other operations if called upon," he explained.

  Up to 24 of the latest F-35B stealth jets will join the carrier on its deployment

  Able Seaman James South, from Brighton, said he was both excited and apprehensive. "It's the first very long deployment away from home for me so I'm curious to see what that brings," he said. Able Seaman Molly Plant, from Cornwall, said: "I think it's the most people we've taken away on a deployment. "It's a bit of a tight squeeze but everyone has a bed which is good." Altogether, 2,500 personnel from the Royal Navy, almost 600 from the RAF, and about 900 from the British Army will take part in the exercises. They should all be home in time for Christmas.

