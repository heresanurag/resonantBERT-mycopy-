title: Syrian government forces and rebels battle outside city of Hama - BBC News
date: '2024-12-04'
section: Middle East
url: http://www.bbc.co.uk/news/articles/czeng98w7r5o
content: |-
  A government counter-attack reportedly pushed back the rebels after they reached Hama's outskirts.

  Syrian government forces and rebels battle outside key city of Hama

  Rebels posed for photos on the highway north of Hama, home to about 1 million people

  Syrian President Bashar al-Assad’s forces are reportedly engaged in fierce battles with rebels on the outskirts of the major city of Hama. A monitoring group said on Tuesday evening that the Islamist militant group Hayat Tahrir al-Sham and its allies were “at the gates of Hama”, but on Wednesday it said the military had retaken several villages in a counter-attack backed by intense air strikes. Syrian state media also said troops had pushed back the rebels north of the city, but the rebels denied losing any ground there. Hama is 110km (70 miles) south of Aleppo, which the rebels captured last week after launching a surprise offensive from their stronghold in the north-west.

  The state-run Sana news agency and the Syrian Observatory for Human Rights (SOHR), a UK-based monitoring group, both reported intense fighting on Wednesday morning around Jabal Zain al-Abadin, a hill about 5km (3 miles) north-east of Hama. The SOHR said the clashes came after government forces launched a counter-attack, during which they were able to push the rebels back almost 10km from the city and recapture two villages near the hill. A spokesman for the rebel’s "Military Operations Division" accused the military of spreading rumours to raise the morale of its troops and insisted rebels were still in control of all locations they had recently taken. An affiliated news channel meanwhile said that five more villages east of Hama had been captured, as well as a base of the 25th Special Mission Forces Division.

  On Tuesday, the SOHR reported that there had been “major displacement” from Hama, which is home to about 1 million people, after the rebels reached the city’s outskirts and several civilians were injured by their shellfire. Wassim, a delivery driver who lives in the city, told AFP news agency: "The sounds were really terrifying, and the continuous bombing could be clearly heard”. But he added: "I'll stay home because I have nowhere else to flee to.” The SOHR has said that more than 600 people have been killed, including 107 civilians, and tens of thousands have been displaced since the start of the rebel offensive last Wednesday. The United Nations has expressed alarm at the sudden escalation of Syria’s devastating, 13-year civil war and warned that the situation is “extremely fluid and dangerous”. “If we do not see de-escalation and a rapid move to a serious political process, involving the Syrian parties and the key international players, then I fear we will see a deepening of the crisis," special envoy Geir Pedersen told the UN Security Council on Tuesday. “Syria will be in grave danger of further division, deterioration, and destruction.”

