  President Assad has vowed to “crush” the rebels and accused Western powers of trying to redraw the map of the region, while his key allies Russia and Iran have offered their “unconditional support”. Russian warplanes have intensified their strikes on rebel-held areas in recent days, Iran-backed militias have sent fighters to reinforce the government’s defensive lines around Hama, and Iran has said it is ready to send additional forces to Syria if asked. Turkey, which supports the Syrian opposition but has denied reports that it is involved in the HTS-led offensive, has urged Assad to engage in a political process with the opposition to bring an end to Syria’s 13-year civil war. Turkish-backed rebel factions have meanwhile capitalised on the government’s retreat in the north by launching a separate offensive on a pocket of territory near Aleppo that was controlled by a Kurdish-led militia alliance, the Syrian Democratic Forces (SDF).

  More than half a million people have been killed since the civil war erupted in 2011 after Assad’s government cracked down violently on peaceful pro-democracy protests. Before the start of the rebel offensive, the government had regained control of Syria’s main cities with the help of Russia, Iran and Iran-backed militias. However, large parts of the country remained out of its control. The rebels’ last stronghold was in Aleppo and Idlib provinces, which border Turkey and where more than four million people were living, many of them displaced from government-held areas. The enclave was dominated by HTS, which is designated as a terrorist organisation by the UN, US, Turkey and other countries because it was al-Qaeda's affiliate in Syria until it formally broke ties in 2016. A number of allied rebel factions and jihadist groups were also based there, along with Turkish-backed SNA factions and Turkish forces. In 2020, Turkey and Russia brokered a ceasefire to halt a push by the government to retake the region. That led to an extended lull in violence, but sporadic clashes, air strikes and shelling continued.

  Smoke rises from the town of Suran, between Aleppo and Hama, on Tuesday

  HTS and its allies said last Wednesday that they had launched an offensive to “deter aggression”, accusing the government and allied Iran-backed militias of escalating attacks on civilians in the north-west. But it came at a time when the government’s allies were preoccupied with other conflicts. The Iran-backed Lebanese group Hezbollah, which was crucial in helping push back rebels in the early years of the war, has suffered recently from Israel’s offensive in Lebanon. Israeli strikes have also eliminated Iranian military commanders in Syria and degraded supply lines to pro-government militias there. Russia has also been also distracted by the war in Ukraine. Mr Pedersen estimated that the rebels now had de facto control over territory containing an estimated 7 million people, including 2 million in Aleppo city.
