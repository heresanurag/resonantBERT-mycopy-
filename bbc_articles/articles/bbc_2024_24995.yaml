  As we mark the 10th year of BBC's Women's Footballer of the Year award, can you name all nine previous winners?

  Can you name BBC Women's Footballer of Year winners?

  This year marks the 10th edition of the BBC Women's Footballer of the Year award. Voting to crown the winner for 2024 launches on Tuesday, but can you name all nine previous winners?
