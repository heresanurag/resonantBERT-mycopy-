id: bbc_2018_3086
title: US Army St Patrick's Day video splits opinion - BBC News
date: '2018-03-18'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-43452626
content: |-
  A video uploaded to the US Army's official Twitter account features 'shamrocks' being fired from weapons.

  A US Army video made in honour of St Patrick's Day has received a mixed response online.

  The film, posted to the army's official Twitter account, features shamrocks being fired from various weapons.
