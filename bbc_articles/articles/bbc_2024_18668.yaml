content: |-
  Nottingham Forest manager Nuno Espirito Santo intends to rein in his criticism of match officials and is backing PGMOL boss Howard Webb to drive up standards.

  Nuno says Forest 'have to trust' referees this season

  Nuno Espirito Santo wants to avoid criticising referees this season

  Nuno Espirito Santo said Nottingham Forest "have to trust" referees to get big decisions right in the new season as he makes efforts to rein in his criticism. Forest manager Nuno expects Howard Webb, the former World Cup final referee who oversees officiating at the top level in England, to drive up standards. Nuno and Forest defender Neco Williams have been fined for misconduct and warned about their future conduct by the Football Association after being critical of referees after last season's defeat by Everton. Nuno has been fined £40,000 and handed a one-game touchline ban, suspended until 31 May 2026, while Williams has been fined £24,000. Forest had three penalty decisions go against them in their 2-0 Premier League defeat at Goodison Park in April, after which Nuno said they had been "not happy with the work of the referees" for a period of time, and Williams gave a similar view. Nuno has spoken to Professional Game Match Officials Limited (PGMOL) boss Webb this summer, and the former Wolves and Tottenham manager addressed his previous condemnation of officials just hours before his punishment was announced on Thursday. When asked if he will moan about decisions in the new campaign, Nuno said: "I hope not, honestly. "We had a nice meeting, the managers, and he [Webb] explained in detail the changes that they want to implement. Decisions to take less time, better decisions, I'm confident. "I'm really confident after the meetings we've had things will improve, not only for Forest but for all the Premier League. They are trying very hard to improve. We have to trust the referees."

  A verdict has yet to come on the charge levelled against Forest as a club after the Everton game, following the angry statement that was posted on X - seen over 45 million times - just minutes after the final whistle. Forest start their 2024-25 Premier League campaign against Bournemouth at the City Ground on Saturday. Speaking at his pre-match news conference, Nuno added of match officials: "When people tell you and speak to you and you see their desire to improve, we have to trust them and we as a club have to trust them." BBC Sport understands the Premier League has spoken to clubs and managers about how public criticism of the video assistant referee (VAR) system undermines the game - and that there will be a new focus on regulating such comments. Sources told BBC Sport the Premier League felt it became too easy to blame VAR as a deflection. In June, Premier League clubs voted 19-1 to keep VAR for the new season after Wolves triggered a vote on the technology when they formally submitted a resolution in May. In order for VAR to be scrapped, 14 of the 20 Premier League clubs needed to vote in favour of doing so, but only Wolves put their weight behind the proposal. Changes are being implemented this season to reduce delays in the game, with the introduction of semi-automated offsides due to be included by October.
