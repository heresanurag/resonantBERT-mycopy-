title: 'Suicide: Dad says he underestimated daughter''s mental health - BBC News'
date: '2024-09-10'
section: Wales
url: http://www.bbc.co.uk/news/articles/cgl2wggjz6po
content: |-
  A national service has been launched across Wales for those affected by suicide.

  Rhiannon Williams had been receiving counselling for depression and anxiety

  A father has said his 24-year-old daughter’s suicide hit him like a "depth charge" which "shred things in ways that are difficult to describe". One year on from Rhiannon’s death, Gareth Williams wants other parents to know how "seriously dangerous" poor mental health can be. The latest figures show the suicide rate in Wales in 2023 was the highest for a decade, with an average of about one every day. Mr Williams' comments come as a Welsh government-backed service is rolled out across Wales to support those affected by suicide.

