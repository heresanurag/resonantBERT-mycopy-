title: 'Covid-19: Welsh Government update 8 March 2021 - BBC News'
date: '2021-03-08'
section: Wales
url: http://www.bbc.co.uk/news/live/uk-wales-56298271
content: |-
  Details and reaction to a briefing on the pandemic by Education Minister Kirsty Williams.

  A cautious approach to easing restrictions on travel is "in line" with the scientific advice received by the Welsh Government, according to the education minister.

  Kirsty Williams said a potential "move from a 'stay at home' message to a 'stay local' message" at Friday's lockdown review announcement would allow the government to "monitor" the decision's impact "before moving to the next stage".

  She said there communities where unlocking to quickly caused a "great deal of concern."

  Ms Williams, who represents Brecon and Radnorshire, said: "We haven't had visitors in the [Brecon] Beacons for very many months.

  "Suddenly having an influx of people in to these areas could cause some concerns in those communities, especially if those communities have been fortunate enough to bring down levels low.

  "We need to follow the advice that in unlocking restrictions we do not undo the tremendous hard work of the Welsh public.

  "We want to ensure that when we unlock we do that on a permanent basis and not find ourselves in a situation where we will see cases rise quickly again and potentially hospital admissions rise quickly again."

  Kirsty Williams said there was concern that, even with the vaccination rollout, an increase in community transmission of the virus "potentially leads to the situation where we can see the development of new variants."

  She added: "We are at a critical juncture in the management of this pandemic, where there is much to be hopeful and optimistic about, but could so easily be thrown away."
