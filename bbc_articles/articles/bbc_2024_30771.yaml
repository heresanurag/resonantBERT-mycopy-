content: |-
  Secretary of State Antony Blinken confirms contact with the HTS group, despite it still being on the US terrorism list.

  US officials in 'direct contact' with victorious Syria rebels

  US Secretary of State Antony Blinken says the US has made direct contact with the rebels who control Syria

  The US has made "direct contact" with the HTS rebels who now control Syria after toppling the Assad regime, Secretary of State Antony Blinken has said. It is the first acknowledgement of direct US interaction with Hayat Tahrir al-Sham, which the US currently still designates as a terrorist organisation. Blinken told reporters the US has been in contact in particular over the fate of the missing American journalist, Austin Tice. Blinken was speaking in Jordan after talks with representatives from several Arab countries, Turkey, and Europe to discuss the future of Syria.

  Officials agreed to support a peaceful transition process in the country, with Jordan's foreign minister saying that regional powers did not want to see it "descend into chaos". A joint communique called for an inclusive Syrian government that respects the rights of minorities and does not offer a base for "terrorist groups". The talk both inside and outside Syria after the tumultuous events of recent weeks has been of the vital importance of setting up new governance that represents all Syrians. HTS was not present at the meeting in Jordan. There, Iraqi Foreign Minister Fuad Hussein expressed concern over Syria's future shared across the Middle East and beyond. He said regional players did not want to see another Libya - referring to the chaos that ensued after Colonel Gaddafi's removal from power. Turkish Foreign Minister Hakan Fidan said existing Syrian institutions must be preserved and reformed. "Never allow terrorism to take advantage of the transition period. And we have to coordinate our efforts and learn from the mistakes of the past," Fidan said according to Reuters news agency.

  Meanwhile, Israel has launched dozens more air strikes against Syria, according to a war monitor, despite regional condemnation. Israel has previously said it was taking action to "destroy strategic capabilities" that threaten it. The UN Secretary General has said he is "particularly concerned" about the hundreds of Israeli airstrikes on several locations in Syria. HTS, Syria's most powerful rebel group, was set up under a different name, Jabhat al-Nusra, in 2011 as a direct al-Qaeda affiliate. It was considered to be one of the most effective and deadly groups opposing President Assad. It was proscribed as a terrorist group by the UN, the US, Turkey, and other countries - and currently remains so. Its leader Ahmed al-Sharaa, who previously used the name Abu Mohammed al-Jolani, cut ties with al-Qaeda in 2016. He has recently pledged tolerance for different religious groups and communities. But the group's violent jihadist past has left some doubting whether it will live up to such promises. Missing from the talks in Jordan was any representative from Syria. The foreign ministers from eight Arab countries who did attend the meeting said they wanted to ensure that Syria was unified and not split along sectarian lines. Also absent were the two countries that gave financial support to Assad which enabled him to survive in power for so long - Iran and Russia. Assad's downfall followed a 13-year civil war, which started after he crushed pro-democracy protests. The fighting killed more than half a million people, displaced millions more, and embroiled international powers and their proxies. The shadow of all the outside forces that battled over Syria for so long hangs heavy over its future. Syria's next leaders will need cohesion not just inside the country but outside, too, if there is to be any real hope for the Syrian people to build on the freedom they have experienced in the past week.

  Ahmed al-Sharaa, the leader of HTS, previously used the name Abu Mohammed al-Jolani
