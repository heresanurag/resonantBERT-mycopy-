title: Shirley Ballas applauds Amy Dowden for Strictly return - BBC News
date: '2023-10-09'
section: Wales
url: http://www.bbc.co.uk/news/uk-wales-67036214
content: |-
  Amy Dowden appears on Strictly Come Dancing with a shaved head after her cancer diagnosis.

  A Strictly Come Dancing judge has applauded Amy Dowden for not wearing a wig in her first appearance on the show since starting cancer treatment.

  The 33-year-old from Caerphilly said she was doing really well with chemotherapy.

  Shirley Ballas said the professional dancer showed courage by appearing with a shaved head.

  "She's just an amazing young lady," she said.

  "I applaud her for not wearing a wig because she wanted to shine light on cancer [for] young people.

  "It took courage because she did have her wig there."

  Dowden underwent a mastectomy after discovering she had stage three breast cancer in April and has since been speaking her experience of cancer on social media.

  She revealed to presenter Claudia Winkleman on this week's programme she is more than half way through her chemotherapy treatment.

  The dancer from Caerphilly underwent a mastectomy after discovering a lump back in April

  Ballas, a Strictly head judge who has worked with Dowden since she was a juvenile dancer, said she had written letters to the star.

  "I write about all my daft day to make her laugh when she's going through her treatments and just trying to lift her spirits a little bit," she said.

  "She knows my mum, she knows my son very well and she knows my family. So, I can write her all personal things and she can have a giggle."

  "She wants to give strength to others and I've never met a woman like that in my life. She's amazing."

  Shirley Ballas and Joshua Keefe at opening night of the Strictly Come Dancing Arena Tour in 2020
