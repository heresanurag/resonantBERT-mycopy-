title: 'England v South Africa: Joe Root in bizarre run out - BBC Sport'
date: '2017-05-27'
section: General
url: http://www.bbc.co.uk/sport/cricket/40069700
content: |-
  An unlucky Joe Root sees his innings ended as he is run out after Eoin Morgan's shot hits the stumps at the non-striker's end after clipping the finger-tips of bowler Dwaine Pretorius.

  An unlucky Joe Root sees his innings ended as he is run out after Eoin Morgan's shot is hit straight back at bowler Dwaine Pretorius who manages to get a finger-tip to the ball before it hits the stumps at the non-striker's end.

