  His latest statement comes after Ukraine destroyed a strategically important bridge over the river Seym this week. The bridge had been used by the Kremlin to supply its troops and its destruction could hamper those efforts. The Russian foreign ministry said the bridge was "completely destroyed" and volunteers assisting the evacuated civilian population had been killed. However, as Ukraine moves further into western Russian territory, Russian forces are equally making gains in Ukraine's east and have claimed a string of villages in recent weeks. Russia attacked at least four Ukrainian regions on Saturday, according to Ukrainian officials, including the north-eastern region of Kharkiv. Mr Zelensky said on Saturday there had been "dozens of Russian assaults" on Ukrainian positions near the cities of Toretsk and Pokrovsk. Pokrovsk is a vital logistics hub that sits on a main road for supplies to Ukrainian troops along the eastern front. "Our soldiers and units are doing everything to destroy the occupier and repel the attacks," the Ukrainian president said, stressing the situation was "under control".
