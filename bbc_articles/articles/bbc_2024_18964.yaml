title: Ukraine incursion has strengthened, says Zelensky - BBC News
date: '2024-08-18'
section: Europe
url: http://www.bbc.co.uk/news/articles/c935y88vn7yo
content: |-
  Ukraine surprised many with its incursion which came as Russia was making progress in the east.

  Ukraine's military says it is continuing to advance in Russia's Kursk region

  Ukrainian troops are "strengthening" positions in captured territory in Russia and expanding further, President Volodymyr Zelensky has said. Ukrainian soldiers are two weeks into their incursion in Russia's Kursk region - their deepest since Moscow launched its full scale invasion more than two years ago. Troops are continuing to advance further into Kursk, the force said in its daily report. Moscow has called the incursion a major provocation and vowed to retaliate with a "worthy response".

  In a statement on messaging app Telegram, President Zelensky said: "Thank you to all the soldiers and commanders who are taking Russian military prisoners and bringing the release of our soldiers and civilians held by Russia closer. "General Syrskyi also reported on strengthening our forces' positions in the Kursk region and expanding the stabilised territory." Russia said its forces had repelled the Ukrainians near three settlements in the Kursk region and were searching for "mobile enemy groups" trying to pierce deeper into the country. Kyiv claims to have taken control of more than 80 settlements in the incursion.

