title: 'Tower Hamlets: Woman charged with murder of 31-year-old woman - BBC News'
date: '2024-09-16'
section: London
url: http://www.bbc.co.uk/news/articles/cdjee8x98ero
content: |-
  Hope Rowe is accused of killing a woman who was stabbed at a flat block in Duckett Street, Stepney.

  Police were called to a block of flats in Duckett Street in the early hours of Sunday

  A woman has been charged with the murder of another woman in east London. Hope Rowe, 32, of Piazza Walk, Whitechapel, is accused of killing a woman who was stabbed in a foyer of a block of flats in Duckett Street, Stepney Green, in the early hours of Sunday. The victim has not been formally identified but the Met Police says it is "confident" she is Charlotte Lawlor, 31. Ms Rowe is due to appear at Thames Magistrates' Court later.

  She has also been charged with possession of a bladed article. Police were called at about 01:17 BST on Sunday to Duckett Street in Tower Hamlets. The London Ambulance Service also attended but the woman was pronounced dead at the scene. The Met said Ms Lawlor's next of kin had been informed and continued to be supported by specially trained officers. A 37-year-old man who was arrested on suspicion of assisting an offender was later released on bail. A crime scene remains in place at the address and inquiries into the circumstances continue, the force said. It appealed for anyone with information to 101 and quote CAD480/15Sep.
