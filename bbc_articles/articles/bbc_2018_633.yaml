id: bbc_2018_633
title: Firefighters tackle Trump Tower blaze in New York - BBC News
date: '2018-01-08'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-42604291
content: |-
  Firefighters extinguish a blaze on the roof of Trump Tower in New York City.

  Firefighters have responded to a small fire on the roof of Trump Tower on the Upper West Side of New York City.

  Two people suffered minor injuries while tackling the blaze, which caused no damage inside the building.

  The New York City Fire Department says it was caused by a fault with an electrical box.
