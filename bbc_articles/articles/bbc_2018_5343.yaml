title: Woman with Down's contributes to Alzheimer's research - BBC News
date: '2018-05-07'
section: General
url: http://www.bbc.co.uk/news/disability-44010313
content: |-
  Amy is part of a Cambridge University study to find a treatment for Alzheimer's.

  Amy is part of a Cambridge University study tracking 40 people with Down's syndrome to try to find a treatment for Alzheimer's.

  People with Down's syndrome are at greater risk of Alzheimer's, and of developing it earlier than others, and Amy told the Today programme she hopes she can help scientists find a treatment for Alzheimer's.

