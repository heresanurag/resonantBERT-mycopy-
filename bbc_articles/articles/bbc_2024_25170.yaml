title: Timelapse captures rare comet passing by Hawaii - BBC News
date: '2024-10-15'
section: General
url: http://www.bbc.co.uk/news/videos/c4gl3xlwypjo
content: |-
  It is estimated the comet has made its closest approach to Earth at 44 million miles away, according to Nasa.

  Timelapse video captured on 12 October by the Subaru Telescope at the Mauna Kea Observatory in Hawaii shows the Tschinshan-ATLAS comet passing by Earth.

  A special live stream was launched from the telescope, which is operated by the National Astronomical Observatory of Japan, to capture the comet.

  Scientists estimate the comet is only visible from Earth every 80,000 years. The comet is expected to be visible through the end of October.
