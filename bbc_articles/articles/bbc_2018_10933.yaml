title: Two dead at Manchester's Britannia Hotel - BBC News
date: '2018-09-26'
section: Manchester
url: http://www.bbc.co.uk/news/uk-england-manchester-45651350
content: |-
  One man fell to his death and another was found in a room at the Britannia Hotel.

  One man fell to his death and another was found dead in a room at the hotel

  Two men have been found dead at a hotel in the centre of Manchester.

  One of the men, aged in his 20s, was reported to have fallen from the fifth floor of the Britannia Hotel in Portland Street at 05:30 BST. He died at the scene.

  Greater Manchester Police officers then found the body of the second man in a first floor bedroom.

  The death of the second man is being treated as "suspicious", the force said.

  Neither man has been formally identified, and officers were working to trace their next of kin.

  The road behind the Britannia has been sealed off

  Det Ch Insp Amber Waywell said: "The investigation is still in its early stages but we are not currently looking for anyone else in connection with this incident.

  "I would urge anyone with information that could assist our investigation to please get in touch as soon as possible."

  Silver Street, which runs behind the hotel, remains closed.

  Forensic officers have been taking photographs and videos of the scene

  Six police vehicles - three from the crime scene unit - and a number of police officers are in Silver Street at the rear of the Britannia Hotel, trying to unravel the mystery behind the two deaths.

  Around a police forensic tent there are shards of glass while directly above a white netted curtain is blowing from an open top floor window.

  Forensic officers are coming and going past the cordon, taking photographs and videos of the scene.

  Meanwhile, traffic is still running as normal in Portland Street at the front of the hotel which is in the heart of Manchester's city centre.

