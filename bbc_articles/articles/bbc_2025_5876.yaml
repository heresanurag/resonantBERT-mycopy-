  BBC Sport F1 correspondent Andrew Benson answers your questions before the Japanese Grand Prix in Suzuka.

  What would be a good season for Tsunoda at Red Bull?

  Coverage: Live radio commentary of practice and qualifying on BBC 5 Sports Extra, race live on BBC Radio 5 Live. Live text updates on the BBC Sport website and app

  We are only two races into the 2025 Formula 1 season and there has already been a major driver change with Red Bull promoting Yuki Tsunoda to replace Liam Lawson. Tsunoda competes at his home grand prix in Japan this weekend as team-mate to world champion Max Verstappen for the first time, with New Zealander Lawson demoted to Racing Bulls. BBC Sport F1 correspondent Andrew Benson answers your questions on the Red Bull situation and more before the race in Suzuka.

  What would be a good season for Yuki Tsunoda after the recent driver switch? - David Red Bull's decision to demote Liam Lawson after just two races and put Yuki Tsunoda in the second Red Bull alongside Max Verstappen is nothing less than a career lifeline for Tsunoda. The 24-year-old Japanese was staring at the likely end of his career this season. That's because he owed his seat at the second Red Bull team to Honda, and it is moving to Aston Martin for 2026, where there is no seat available to Tsunoda and no realistic prospect of one. Without Honda, the chances of Racing Bulls keeping Tsunoda for 2026 were slim, when there are other Red Bull juniors coming along the conveyor belt. So a seat alongside Verstappen this year gives him the opportunity to show once and for all that he deserves a long-time place in F1. But what level of performance would do that? The fact remains that Red Bull have a minimum level of expectation for their second driver - and that's to be within about 0.3 seconds a lap of Verstappen on a consistent basis. That's what Tsunoda needs to do to convince Red Bull that he deserves to be considered as a contender for a seat in 2026. And realistically if he does not do that, he is unlikely to convince anyone else that he is worth investing in either.

