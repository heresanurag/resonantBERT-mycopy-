  Is this season a write-off for Aston Martin? - Carlos It's not looking good so far, is it? On average, the Aston Martin is the seventh fastest car over a single lap over the first three races of the season, including the China sprint. Only the Alpine, Sauber and Haas have been slower. It's fair to say that Fernando Alonso has not had his best start to a season, and mistakes in qualifying at both races so far have hurt the team's ultimate potential. So, it's not completely clear yet what the car's ceiling is. Aston Martin came into this season with two main aims - to produce a more drivable car, and to prove that they could solve the correlation issues they have had between simulation and the real world and design upgrades that perform as expected. The drivers say that it is more drivable than last year - it's just not that quick. If they can prove their upgrades work, then the season will be at least a qualified success, regardless of the performance of the car to some extent. So it is probably fair to wait for at least the first upgrade package - which would typically be expected around May some time - before forming any firm conclusions.

  Is there a circuit(s) you'd really want on the calendar that currently isn't on there? And at the expense of which current circuit(s)? I love Fuji and I'm not a fan of street circuits – RAP The F1 calendar has a pretty good selection of circuits at the moment. There are some obvious candidates in the United States - Road America and Laguna Seca are both great circuits. But then so is Austin, and both Miami and Las Vegas work for the sport on a financial level. Bathurst in Australia is awesome - but not suitable for F1, sadly. As for Fuji, great backdrop, when the clouds are not covering Mount Fuji, but as a circuit it is not a patch on Suzuka. The one big miss in terms of the calendar is France. Somehow, it seems wrong not to have a grand prix in the country that gave birth to motorsport and hosted the first race with that title, even if Monaco is regarded as a sort of proxy French race. The problem is that France's only circuits with licences for F1 are Paul Ricard and Magny-Cours. Uninspiring both. But if the Sarthe circuit at Le Mans could be brought up to F1 standard and host a grand prix, that would be quite something.

