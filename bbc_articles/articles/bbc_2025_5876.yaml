  After another very dry sprint race in China I wonder again why F1 doesn't give the teams tyres that enables the drivers to race through a sprint. Surely the point of the sprint is it is fast, exciting and full of action? - Richard This is a question about tyre management. The fact is that - with a few very limited exceptions - drivers have never been able to race flat out since Pirelli entered F1 as the tyre supplier in 2011. That's not how their tyres work. Pirelli tyres have to be managed to stay within a temperature window. Drive them flat out and they overheat. And if they overheat, they rarely come back to optimum grip level. Sometimes this is even the case over a single qualifying lap. Pirelli has been asked before to provide tyres that can be driven flat out, but so far it has not done so.

