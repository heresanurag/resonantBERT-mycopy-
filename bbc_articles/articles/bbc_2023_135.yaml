  Rylan Clark, who hosts a Radio 2 show on Saturdays, wrote on Twitter: "Going to be so missed on air, but personally I'll miss having a beer in a foreign country discussing anything and everything whilst at Eurovision. Thanks for always being so lovely."

  Owain Wyn Evans, who is taking over as the station's early breakfast host, described him as "a legend".

  Bruce earned between £385,000-£389,999 in 2021-22, according to the last BBC annual report.

  The BBC has not yet confirmed who will replace Bruce, however Radio 2 often promotes presenters from within its existing roster.

  Trevor Nelson, Rylan Clark, Claudia Winkleman, Dermot O'Leary and Jo Whiley are among the names who could be considered for Bruce's slot.
