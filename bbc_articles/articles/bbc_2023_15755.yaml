title: Wayne Rooney leaves DC United after failing to reach MLS play-offs - BBC Sport
date: '2023-10-08'
section: General
url: http://www.bbc.co.uk/sport/football/67044864
content: |-
  Wayne Rooney leaves his role as coach of MLS side DC United by mutual consent after they fail to make the play-offs.

  Last updated on .From the section Football

  Wayne Rooney has left his role as coach of Major League Soccer side DC United by mutual consent after they missed out on the MLS Cup play-offs.

  Manchester United's record goalscorer took up the role with the Washington-based side in July 2022.

  He had previously spent 18 months at the club as a player before he joined Derby as player-coach in January 2020.

  "It's the right time. I've done everything I can to get this club into the play-offs," said the 37-year-old.

  "It's not a single thing that's happened. It's about timing."

  DC United missed the play-offs for the fourth consecutive year despite a 2-0 win on Saturday in their final regular-season match against New York City FC.

  "We have spoken with Wayne and agreed it is best for us to part ways at this time," said DC United chief executive and co-chairman Jason Levien.

  "This decision creates the avenue for our next general manager to have the full opportunity to impart a new philosophy and structure onto our sporting operations, which begins with the critical identification of a head coach who will best align with this.

  "We are grateful to Wayne Rooney for all he has done for our club and for soccer in the nation's capital, first as a DC United player and captain and most recently as our coach."
