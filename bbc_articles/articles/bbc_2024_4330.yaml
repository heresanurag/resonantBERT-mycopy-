  The report said improvements to resilience planning would be needed to prevent a similar meltdown in future.

  There does not seem to have been any rehearsal of how to manage such an incident, despite that being "best practice" and common in other sectors.

  The report describes "a significant lack of pre-planning and coordination" between different parts of the industry for unusual "major events and incidents".

  It also outlines how airlines and airports have expressed concerns about delays in being warned that there was a problem, and "limited explanation" during the event.

  For example, regional and City airports found out about the problems from BBC News, with no communications from NATS on the day.

  Communication issues, the report says, "resulted in more uncertainty and more severe impacts on passengers and others than was necessary".

  It also said some airlines told passengers they had to make their own plans to get home, with "misinformation" about their rights.

  An example was given of a passenger and her child stranded abroad being handed a leaflet saying they should make their own arrangements and then claim reimbursement.

  They could only find flights four or five days later. The airline said it would only reimburse for one overnight stay. It cost them £900.

  However, there were some good examples of individuals being offered all the appropriate assistance.

  The panel said the scale of disruption made providing care and assistance much harder, as so many people were stranded at the same time, on a busy bank holiday.

  Airports, restaurants and hotels, and most importantly alternative flights, quickly became full.

  While airlines made "huge efforts" to be there for customers in many cases, there were incidents where "incomplete or incorrect information was given about passenger rights", food vouchers were not accepted or not enough hotel accommodation was offered.

  Tim Alderslade, the chief executive of Airlines UK said the interim report "contains damning evidence that NATS' basic resilience planning and procedures were wholly inadequate and fell well below the standard that should be expected for national infrastructure of this importance".

  He added further investigation would lead to recommendations in the final report "so that this kind of catastrophic failure is not allowed to happen again".

  NATS said it had "cooperated fully" with the investigation.

  "We have not waited for the panel's report to make improvements for handling future events based on learning from the experience of last year," the air traffic provider said.

  "These include a review of our engagement with our airline customers, our wider crisis response and our engineering support processes."
