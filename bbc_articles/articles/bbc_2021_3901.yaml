title: 'Covid: UK cases keep falling, apart from in Scotland and NI - BBC News'
date: '2021-03-12'
section: UK
url: http://www.bbc.co.uk/news/live/uk-56370516
content: |-
  It comes as Scotland relaxes rules on outdoor socialising and Wales begins "phased" exit from lockdown.

  A Sarah Everard vigil could still be held tomorrow in London even though a judge this evening refused to intervene in a legal challenge against it being currently banned from going ahead.

  Mr Justice Holgate refused to grant a specific order against the Metropolitan Police, which yesterday had said the event planned for Saturday evening in London would be unlawful. But he left the door open for new talks between demonstrators and senior officers.

  The judge’s ruling came after the force told the court it recognised that it could not have a blanket ban on protests under the coronavirus regulations.

  The conclusion of Friday's High Court action means that while the judge said he could not get involved in what had happened so far, Scotland Yard has also accepted it must consider the legal right to protest before deciding whether to ban protests under coronavirus health regulations.

  That raises the prospect of the organisers reaching an agreement with the police that would allow a demonstration in London and other places around the country.

  At the outset of the hearing, lawyers for four women organising the vigil under the Reclaim These Streets banner told the court that the Metropolitan Police had said there was nothing they could do to allow the protest to take place.

  Senior officers had said their "hands were tied" by the Covid lockdown laws which banned all gatherings outdoors.

  But as the hearing continued, the force's own lawyer denied that it had a blanket ban on protests during the pandemic - but it was concerned about the health implications of a large gathering.

  The judge said: "There may well be further communication between the claimants and the police to deal with the application of the [Covid] regulations and [the rights to protest]. But that is not a matter on which the court should comment."
