title: Pope's health sees slight improvement, says Vatican - BBC News
date: '2025-02-19'
section: Europe
url: http://www.bbc.co.uk/news/articles/cx2e9w0n3pxo
content: |-
  The 88-year-old pontiff was admitted to hospital on Friday with a respiratory infection.

  The Pope's health has shown a "slight improvement" on his sixth day in hospital, the Vatican has said. Pope Francis, aged 88, was admitted to Rome's Gemelli hospital last week with a respiratory infection. He has been diagnosed with pneumonia in both lungs. On Wednesday, he was visited by Italy's Prime Minister Georgia Meloni, who said she was "very happy to have found him alert and responsive. We joked as always. He hasn't lost his proverbial sense of humour". She offered him best wishes for a speedy recovery, on behalf of the Italian government and the whole country.

  "The blood tests, evaluated by the medical staff, show a slight improvement, particularly in inflammatory indices," said the Vatican in a statement later on Wednesday. Earlier in the week, the Vatican said medical tests and a chest X-ray showed "a complex picture". Pneumonia is a serious infection that can inflame and scar the lungs, causing chest pain and making breathing more difficult. The Vatican said in its latest update on the pontiff's fragile health that he was alert and ate breakfast. A Vatican official said the Pope was still able to get out of bed and sit in an armchair in his hospital room, and he was continuing to do some work. He has cancelled a papal audience scheduled for Saturday and is not well enough to attend Mass on Sunday. Outside the hospital, well-wishers and pilgrims have continued to gather to pray, light candles and write notes of encouragement.

  Georgia Meloni said the Pope had not lost his sense of humour despite his ill health
