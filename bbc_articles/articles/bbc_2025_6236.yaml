  A week after his outstanding performance to win in Japan, Verstappen and Red Bull looked like a different driver in a different car. He complained over the radio about "terrible" braking and the Red Bull was out of its performance window around the Sakhir track. "It was tough all weekend," Verstappen said. "For whatever reason I have been struggling with the brakes, the feeling also. "It is something we need to investigate - and general grip throughout the lap. Quite inconsistent and that makes it very hard to understand what you need from the car when for whatever reason we can't seem to make the tyres work. "We have tried a lot with the set-up but nothing really gave us a clear answer, so that is a bit of a shame." His team-mate Yuki Tsunoda was 10th, ending up 0.88secs off Verstappen. The surprise of qualifying was Gasly, just 0.375secs off pole for a team that is last in the championship with no points after the first three races. "I'm so happy," the Frenchman said. "It was a very special lap. I just knew it was good, but I didn't expect it to be that good. I'm just very happy for the whole team. It has not been easy these first few races." Towards the back, Williams' Alex Albon was prevented from progressing into the second part of qualifying because stewards did not notice that Sauber's Nico Hulkenberg had exceeded track limits on this final lap. The German's time vaulted him ahead of Albon and into the top 15 who progressed, and it was only noticed that he had gone off track at Turn 11 after the second session had started. Governing body the FIA said that Turn 11 had not been considered a "hot spot" for track limits so was not monitored as closely as other corners. "We are building towards increased resources and improved systems and processes," a spokesperson said. "On this occasion, we got it wrong."

  Haas' Esteban Ocon crashed heavily during the second session
