title: 'Brian Thompson: United Healthcare CEO fatally shot outside Manhattan hotel
  - BBC News'
date: '2024-12-05'
section: US & Canada
url: http://www.bbc.co.uk/news/articles/cnv3dnm64vlo
content: |-
  Brian Thompson was "targeted" by a masked suspect who fled first on foot before grabbing an e-bike and heading towards Central Park.

  This video can not be played To play this video you need to enable JavaScript in your browser. Watch: What we know about the shooting of the UnitedHealthcare CEO

  New York City police have launched a manhunt for a masked suspect who gunned down the head of a US medical insurance giant, in what investigators described as a "brazen, targeted attack". UnitedHealthcare chief executive Brian Thompson was fatally shot in the back on Wednesday morning outside the Hilton Hotel in Midtown Manhattan, where he had been scheduled to speak at an investor conference later in the day. The 50-year-old father-of-two, who also was shot in the leg, was taken to the hospital, where he was pronounced dead minutes after the attack, officials said. Investigators said they did not know the motive of the assailant, who fled the scene without taking any of the victim's belongings. Police have offered a $10,000 (£7,800) reward.

  CCTV captured the suspect at a Starbucks minutes before the attack

  The attack unfolded at about 06:45 EST (11:45 GMT) in one of the busiest parts of Manhattan, close to the tourist magnets of Times Square and Central Park, in an area where shootings are extremely rare. Police drones, helicopters, dogs and thousands of CCTV cameras are combing the city street by street in an effort to trace the assailant. New York City Police Commissioner Jessica Tisch told a news conference: "Every indication is that this was a premeditated, pre-planned, targeted attack." The suspect, who was wearing a black face mask and cream jacket, appeared to be waiting for Thompson for five minutes outside the hotel, police said. The assailant was also captured on a surveillance camera minutes before the shooting at a Starbucks less than two blocks away. When Thompson arrived alone on foot at the Hilton, the shooter stepped on to the pavement from behind a car and shot him in the back.

  This video can not be played To play this video you need to enable JavaScript in your browser.

  The victim had been staying at another hotel, the Marriott, down the street, according to police sources. CCTV footage of the attack shows the suspect used a silencer on the weapon as he opened fire, police say. NYPD chief of detectives Joseph Kenny said the gun appeared to malfunction, but the suspect was able to quickly fix the issue and keep firing. The assailant fled the scene first on foot before grabbing a bicycle of some sort and heading towards Central Park, where he was last seen, Commissioner Tisch said. Officials initially said the suspect used an electric Citi Bike owned by Lyft. But Lyft, which owns and operates Citi Bike, later said it had been told by the NYPD that one of its vehicles had not been used, according to the BBC's US partner, CBS News. The victim's wife, Paulette Thompson, said in a phone call with NBC News that her husband had been receiving threats. "There had been some threats," she said. "Basically, I don’t know, a lack of [medical] coverage? I don’t know details. "I just know that he said there were some people that had been threatening him."

  New York Governor Kathy Hochul said police had briefed her on the "horrific and targeted" shooting. "Our hearts are with the family and loved ones of Mr Thompson and we are committed to ensuring the perpetrator is brought to justice," she said in a statement. UnitedHealthcare's parent company, UnitedHealth Group, said it was "deeply saddened and shocked at the passing of our dear friend and colleague". "Brian was a highly respected colleague and friend to all who worked with him," the group said in a statement.

  Felipe Rodriguez, a former NYPD detective, told the BBC’s US partner CBS News that he was "amazed" by the attack. "The fact that he [the suspect] was able to clear these jams in such an efficient manner shows that he is very proficient with firearms," he said. Thompson, who lived in a suburb of Minneapolis, Minnesota, began his career as a certified public accountant. He started at UnitedHealthcare - the largest private insurer in the US - in 2004 and was named chief executive in 2021. Last year he made $10.2m. In May he was named in a lawsuit filed by a pension fund, alleging fraud and illegal insider trading.

  Its parent company, UnitedHealth Group, cancelled its investor conference after the shooting. A Thompson family statement said: “We are shattered to hear about the senseless killing of our beloved Brian. "Brian was an incredibly loving, generous, talented man who truly lived life to the fullest and touched so many lives."
