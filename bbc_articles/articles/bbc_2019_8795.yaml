id: bbc_2019_8795
title: Drivers face penalty points for not wearing seat belts - BBC News
date: '2019-07-19'
section: UK
url: http://www.bbc.co.uk/news/uk-49040525
content: |-
  Government plans to toughen punishments for motorists breaking the law to try to reduce road deaths.

  Drivers caught not wearing a seat belt will face points on their driving licence under plans to increase penalties for motoring offences.

  Currently, motorists in England, Scotland and Wales who do not buckle up are given a £100 fine.

  The Department for Transport has not said how many points may be given.

  More than a quarter (27%) of the 787 car occupants who died in crashes on Britain's roads in 2017 were not wearing a seat belt, figures show.

  Drivers can lose their licence if they build up 12 or more points within three years.

  The law is different in Northern Ireland, where failure to wear a seat belt can lead to a £500 fine and three penalty points.

  The new punishment for not wearing a seat belt is one of 74 measures included in the government's Road Safety Action Plan.

  Under the plan, which is published on Friday, new drivers could be banned from travelling at night.

  The government is also considering fitting alcohol sensors to cars driven by people convicted of drinking and driving which will immobilise the vehicle if they are over the legal limit.

  Transport Secretary Chris Grayling said the Road Safety Action Plan was a "key milestone" that sets out how Britain would try to reduce the number of people killed and seriously injured on its roads.

  The RAC Foundation said it was "barely conceivable" that tens of thousands of drivers and passengers make the decision each day not to belt up.

  It said: "The direct effect of non-compliance might be felt by the vehicle occupant themselves in the event of a crash, but ultimately the emergency services are left to deal with the roadside consequences and the taxpayer foots the bills."
