title: 'As it happened: Millions to get payments to help with rising cost of living
  - BBC News'
date: '2022-05-26'
section: UK
url: http://www.bbc.co.uk/news/live/uk-61591398
content: |-
  A temporary tax will be levied on oil and gas giants to pay for bill discounts and cash handouts, Rishi Sunak says.

  A nurse from Somerset has described her struggle to make ends meet in the run up to payday.

  Lucy told Radio 5 Live she went to fill her car to get to work this morning, but had just £5 left to do so and won't get paid until tomorrow.

  Quote Message: I was on the red light and that £5 did not even take me out of the red light. I'm just hoping that I make it to work - I'm not sure how I'm going to get back I was on the red light and that £5 did not even take me out of the red light. I'm just hoping that I make it to work - I'm not sure how I'm going to get back

  Meanwhile, Justine from Surrey says she in a similar position of living from pay cheque to pay cheque, describing the cost of filling a car currently as "extortionate".

  Quote Message: We are turning off the hot water when we are not using it and everyone is using their towel a few extra times to reduce on the laundry. We are turning off the hot water when we are not using it and everyone is using their towel a few extra times to reduce on the laundry.

  Quote Message: I am also selling a few things out of my wardrobe as we are not going out so often. We are making lots and lots of little cutbacks in order to make the pennies last until the end of the month. I am also selling a few things out of my wardrobe as we are not going out so often. We are making lots and lots of little cutbacks in order to make the pennies last until the end of the month.
