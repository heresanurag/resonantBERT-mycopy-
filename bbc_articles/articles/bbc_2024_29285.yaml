title: 'Neil Foden: Staff suspended at paedophile head''s former school - BBC News'
date: '2024-11-27'
section: Wales
url: http://www.bbc.co.uk/news/articles/cdxy37exe1wo
content: |-
  The suspensions were confirmed in a letter sent to parents from governors.

  Neil Foden was convicted of 12 counts of sexual activity with a child, and two of sexual activity with a child while he was in a position of trust

  Two suspensions have been made at a school where the former headmaster was jailed for sexually abusing girls, governors confirmed in a letter to parents. The suspensions were made at Ysgol Friars in Bangor, because of information brought to the attention of local authority Cyngor Gwynedd’s education department. Neil Foden was headteacher at Ysgol Friars and was also a strategic headteacher at Ysgol Dyffryn Nantlle in Penygroes. He was jailed for 17 years in July after sexually abusing four girls over a period of four years.

  It is not known what information has been seen by education officials resulting in the two suspensions. A joint statement by Cyngor Gwynedd and the Ysgol Friars board of governors states that suspension from work is a “neutral act”, so that investigations can be carried out “thoroughly and in an appropriate manner”. It said the process will be conducted by the school's governing body, in line with usual school arrangements, and will be supported by an independent investigator. Newyddion S4C, external has seen a letter sent to staff from Brian Jones, chairman of governors stating that Lynne Hardcastle has been appointed to lead the school in the short term until Christmas. She is expected to start working full-time at the school next Monday. The role for a permanent headteacher has been advertised three times. Cyngor Gwynedd said recruiting had been “challenging”, and it was decided to recruit a temporary headteacher instead. Last week, it was confirmed that Margaret Davies had been appointed as Interim headteacher and is expected to join Ysgol Friars on secondment for four terms from Easter 2025 until the end of the 2026 summer term. Margaret Davies is currently head of St Christopher’s special school in Wrexham.

  Two staff have been suspended at Ysgol Friars

  The nature of the investigation has not been specified, but the letter to parents stresses that there is “no accusation of crime has been committed” and those involved are not the “subject of a wider investigation". Cyngor Gwynedd said it would not be appropriate for the authority or the board of governors to make any further comment.
