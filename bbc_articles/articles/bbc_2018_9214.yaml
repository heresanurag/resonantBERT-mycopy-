title: Three injured in shooting near Kingsbury Tube station - BBC News
date: '2018-08-21'
section: London
url: http://www.bbc.co.uk/news/uk-england-london-45254330
content: |-
  Police say the shooting near Kingsbury Tube station in Brent is "not terror-related".

  The shooting happened near to Kingsbury Tube station

  Three people have been injured in a shooting in north London, police have said.

  The Metropolitan Police and London Ambulance Service were called at about 21:45 BST on Monday to reports of shots fired in Kingsbury Road, Brent, near to Kingsbury Tube station.

  They found two men and a woman with injuries, who were taken to hospital.

  None of the injuries was life-threatening and the shooting was "not terror-related", the Met said.

  The men - aged 18 and 24 - remain in hospital while the 30-year-old woman has been discharged, Scotland Yard added.

  There have been no arrests so far, police said.

