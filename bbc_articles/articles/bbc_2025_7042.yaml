title: Seagull-chasing dog swoops to victory in Corgi Derby - BBC News
date: '2025-04-20'
section: Edinburgh, Fife & East
url: http://www.bbc.co.uk/news/articles/cx285vydymmo
content: |-
  A new training regime helps four-year-old Juno power to victory in the Easter event at Musselburgh Racecourse.

  This video can not be played To play this video you need to enable JavaScript in your browser. Juno, in Army green colours, saw off a determined challenge from previous champ Rodney, number 8, to claim victory

  A dog whose training regime included chasing Edinburgh's seagulls has claimed victory in this year's Corgi Derby. Sixteen runners were flagged off by official starter, tennis coach Judy Murray, at the Easter Saturday event at Musselburgh racecourse in East Lothian. Four-year-old Juno from Edinburgh's Portobello pipped the 2023 champion Rodney with a final sprint in the closing stages of the race, held over a third of a furlong or 70m (230ft). Her owners said chasing the gulls on "Porty Beach" had helped in her preparation, although the prospect of a treat at the end may also have spurred her to victory.

  The annual Corgi Derby has proved a popular Easter family event at the racecourse since it was first introduced in 2022. This year's race attracted one entrant - named Chester Barkington - from as far afield as Yorkshire.

  Juno seemed impressed by her winnings, presented by tennis coach Judy Murray

  Juno's proud owners, Frances Brandon and Alasdair Tew, said she came ninth out of 12 in last year's race - but a new training regime had paid dividends. In the Parade Ring, Mr Tew explained: "We trained her for this last year but this year we just resorted to just letting her chasing things, particularly seagulls on Porty Beach and that has paid off." Holding some treats, he added: "Juno is always ready for treats – that is probably why she won. We would love to come back next year."

  Some of the runners were showing some competitive spirit

  In a hotly-contested race, teeth were occasionally bared and there was some jostling for position in the closing sprint. In the end, however, Juno came from behind and pipped 2023 champion Rodney while third place was taken by a corgi named Daisy. Judy Murray, no stranger to champions, presented the winnings which included various dog toys and treats. The mother of tennis stars Andy and Jamie said it was the second time she had been invited to start the race. "Some of them will run straight, some of them will not start at all, some of them will go off on a tangent or bite each other," she explained. "It's absolute carnage but it's great fun because it's so unusual".

  First launched in 2022 to mark Queen Elizabeth II's Platinum Jubilee, the Corgi Derby was created to celebrate the breed which was the late monarch's favourite. Aisling Johnston, head of marketing at Musselburgh Racecourse, said the annual event was growing in popularity. "It was an extremely competitive race and a well-deserved victory by lovely Juno but congratulation to all owners and their corgis who took part."
