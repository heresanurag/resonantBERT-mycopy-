  Bayern Munich and Tottenham agree a deal in principle for England captain Harry Kane worth more than 100m euros (£86.4m).

  Harry Kane transfer news: Bayern Munich agree deal in principle with Tottenham for striker Last updated on .From the section Tottenham

  Bayern Munich and Tottenham have agreed a deal in principle for England captain Harry Kane worth more than 100m euros (£86.4m). Kane, 30, has one year left on his contract with Spurs and must now make a decision about whether or not to leave. The forward is Tottenham's all-time top scorer with 280 goals in 435 appearances. Kane was linked with Manchester United earlier this summer before Bayern made him their main target.
