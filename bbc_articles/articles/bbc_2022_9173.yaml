  Sir Keir Starmer's full statement after being cleared over lockdown beers by Durham police.

  Keir Starmer has addressed the media after being cleared over lockdown beers by Durham police.

  The Labour leader was filmed drinking beer in the constituency office of Durham MP Mary Foy on 30 April.

  Sir Keir said he had always insisted no rules were broken.
