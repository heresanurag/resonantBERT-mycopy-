title: Nottingham NHS trust fined £1.6m over failings in baby deaths - BBC News
date: '2025-02-13'
section: Nottinghamshire
url: http://www.bbc.co.uk/news/articles/cr46vdn133xo
content: |-
  The fine over the deaths of Adele O'Sullivan, Kahlani Rawson and Quinn Parker is the largest for an NHS trust in maternity care.

  Quinn Parker was delivered by emergency Caesarean section at Nottingham City Hospital in July 2021

  An NHS trust has been fined £1.6m for "avoidable failings" connected to the deaths of three babies in 2021. Adele O'Sullivan, Kahlani Rawson and Quinn Parker died shortly after they were born - all within 14 weeks of each other - while under the care of Nottingham University Hospitals (NUH) NHS Trust. The trust admitted six counts of failing to provide safe care and treatment to the babies and their mothers on Monday, following a prosecution brought by the healthcare watchdog, the Care Quality Commission (CQC). On Wednesday, family members cried in the courtroom as district judge Grace Leong expressed her "deepest sympathy" to each of them, and said the trust they put in NUH to deliver their babies safely had been broken.

  Adele died at just 26 minutes old on 7 April 2021, Kahlani died aged four days old on 15 June, and Quinn was two days old when he died on 16 July. In a statement read out on behalf of Quinn's parents - Emmie Studencki and Ryan Parker - outside Nottingham Magistrates' Court, lawyer Natalie Cosgrove said the prosecution would not bring him back "but although he never spoke, he has a voice, and it has been firmly heard". "Quinn died from a long list of failings and Emmie's life was put at risk," she said. "Some failings so basic, that a passing stranger on the street would have provided better attention to, and quality of care." Sadie Simpson, on behalf of the families of Adele and Kahlani, added the prosecution "must act as a turning point", adding it was "yet another acknowledgement of serious failures". The fine is the largest ever for an NHS trust for maternity care, the CQC said, and the fifth maternity prosecution it has brought overall.

  Lawyer Sadie Simpson spoke on behalf of the families outside court

  It was reduced from £5.5m, taking into account the trust's financial position and guilty pleas, the court heard. The judge said there were similarities among the "catalogue of failures" across the cases, in which all the mothers suffered a placental abruption, a serious condition in which the placenta starts to come away from the wall of the womb. Those failures, the court heard, included staff being inadequately trained or equipped to interpret cardiotocography (CTG) results - used to monitor foetal heart rate and mothers' contractions - a failure to expedite delivery of babies, failure to recognise serious conditions and a handover process that was not up to standard. The trust was placed in "special measures" following a CQC inspection in October 2020. Then, following another inspection in April 2021 in which inspectors found "improvements", Adele died the same month, followed by Kahlani and Quinn in June and July.

  The judge told the hearing, which was attended by NUH chief executive Anthony May, that the failures were "avoidable and should never have happened". Of the babies' families, the judge added: "They placed their trust in a system meant to protect expectant mothers and keep babies safe - and that trust was broken. "Three and a half years have gone by, yet for the families no doubt their grief remains as raw as ever and a constant presence in their lives that is woven into every moment. "It is very difficult, if not impossible, to move on from the failures of the trust and its maternity unit. "The weight of what should have been done different will linger indefinitely."

  The three babies were born at Nottingham City Hospital, one of two main hospitals run by the trust

  Adele was born prematurely following an emergency Caesarean after her mother, Daniela O'Sullivan, noticed bleeding and suffered abdominal pains. However, no vaginal examination was carried out and the court previously heard there was a delay in identifying that she was in labour. An inquest into Adele's death found a series of "missed opportunities" in her mother's treatment, but could not say whether or not they led to the baby's death. In Kahlani's case, his mother Ellise Rawson had complained of a lack of foetal movement days before she had to undergo an emergency Caesarean. The trust said in an interview under caution that it accepted the monitoring in her case was poor "from the outset" and that key information about her condition had not been passed on to consultants. A coroner said "failings in care" led to a 20-minute delay in carrying out an emergency Caesarean section. The court heard Emmie Studencki went to hospital four times before her son Quinn was born in July 2021 after suffering bleeding. On the final occasion, she called an ambulance after having a major antepartum haemorrhage. Prosecuting on behalf of the CQC, Ryan Donaghue told the court it was recorded by a paramedic that she lost about 1,200ml of blood but "those records did not find their way to the hospital notes". Quinn was "pale and floppy" when he was delivered by emergency Caesarean section, the court heard. An inquest found a series of errors contributed to his death.

  The trust is currently subject of the the largest maternity review of its kind in NHS history, with about 2,500 cases being looked at. It is the first trust to be prosecuted by the CQC more than once, after it was fined £800,000 in 2023 for failures in the care of Wynter Andrews, who died 23 minutes after being born at the Queen's Medical Centre in Nottingham in September 2019. The court heard the trust has an average turnover of £612m, and the judge said she was "acutely aware" that all its funds as a publicly-funded body were accounted for and that the trust was currently operating at a deficit of about £100m. She said: "I can't ignore the negative impact this will have... but the significant financial penalty has to be fixed to mark the gravity of these offences and hold the trust to account for their failings." At sentencing on Wednesday, the trust was also told to cover prosecution costs of £67,755.23 and ordered to pay a surcharge of £190. Following the hearing, NUH chief executive Anthony May said: "The mothers and families of these babies have had to endure things that no family should after the care provided by our hospitals failed them, and for that I am truly sorry. "Today's judgement is against the trust, and I also apologise to staff who we let down when it came to providing the right environment and processes to enable them to do their jobs safely." He said the trust believed it now had a "safer and more effective maternity service", and hearing the families in court gave the trust more "incentive" to improve. Helen Rawlings, the CQC's director of operations in the Midlands, added: "This is the second time we have prosecuted the trust for not providing safe care and treatment in its maternity services, and we will continue to monitor the trust closely to ensure they are making and embedding improvements so that women and babies receive the safe care they deserve."

