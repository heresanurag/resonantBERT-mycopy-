id: bbc_2018_1901
title: Eagles' first Super Bowl win sparks riots in Philadelphia - BBC News
date: '2018-02-05'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-42945804
content: |-
  Eagles fans took to the streets on Sunday night following their win against the New England Patriots.

  Celebrations got out of hand as some damaged property and lit fires following the team's first ever Super Bowl win.
