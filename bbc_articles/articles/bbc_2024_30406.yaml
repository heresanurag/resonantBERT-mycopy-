title: Orford Ness seal colony thriving with 'lack of human disturbance' - BBC News
date: '2024-12-11'
section: Suffolk
url: http://www.bbc.co.uk/news/articles/cwy3dvw14vgo
content: |-
  The National Trust hopes the colony will continue to grow and rival others along the coast.

  Orford Ness in Suffolk is welcoming scores of grey seal pups this winter

  A large colony of seals is thriving on an English coastline thanks to a "lack of human disturbance", according to the site's manager Orford Ness in Suffolk is the home to the county's first breeding colony of grey seals. The site, managed by the National Trust, welcomes more and more seals during each winter breeding season. Matt Wilson, the trust's countryside manager for the Suffolk and Essex coast, said he hoped the site would rival other UK seal colonies.

  The breeding season at Orford Ness is under way with many more pups expected to arrive over the coming weeks

  This winter's breeding season, which began in November, has seen 80 pups already born with many more expected. Since 2021, when the seals first arrived, their numbers have been steadily increasing. The site is now home to about 400 seals, up from about 200 three years ago. "We're really lucky," said Mr Wilson. "It's part of their natural movement of colonies anyway, so they've moved down, we think, from Lincolnshire and Norfolk colonies. "They've formed a breakaway group, found this site and moved into the space we've got here. "It's a real privilege to have them on this site and a responsibility, too, for the team here."

  The shingle spit is currently home to 400 adult grey seals with this number potentially increasing in years to come

  Orford Ness is a 10-mile long (16km) vegetated shingle spit, joined to the mainland just south of Aldeburgh. During the 20th Century it was a military testing site. The public are able to visit during the summer but not allowed to get close to the colony.

  Mr Wilson said he believed this was a "major factor" in the colony's success. "Even during our open season for visitors, the public aren't allowed on to this section because the seals are still here through the summer," he said. "It's a great factor for them, this lack of human disturbance, for what is a really amazing occurrence on this site." Mr Wilson said the spit's ridges and dips also added a "natural shelter barrier" against bad winter weather.

  Matt Wilson believes Orford Ness has a range of benefits for the grey seal colony

  He said the success of the colony was a good indicator of the health of both the species and the marine environment, because the seals would not be there unless there was a good food source for them in the North Sea. "We're certainly hoping it will become one of the hotspots for grey seals around the UK coast," he said. "It is such an enormous potential; it is a great environment for them."

