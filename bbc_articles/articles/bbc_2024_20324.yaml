title: 'Louis Rees-Zammit: Jacksonville Jaguars claim rugby star after Kansas City
  Chiefs cut - BBC Sport'
date: '2024-08-29'
section: American Football
url: http://www.bbc.co.uk/sport/american-football/articles/c74jw2wd5ljo
content: |-
  Louis Rees-Zammit is added to the Jacksonville Jaguars' practice squad following his pre-season training camp with the Kansas City Chiefs.

  Louis Rees-Zammit played against the Jacksonville Jaguars for the Kansas City Chiefs during pre-season

  Louis Rees-Zammit has been added to the Jacksonville Jaguars' practice squad following his pre-season training camp with the Kansas City Chiefs. The former Wales rugby union star missed out on the Chiefs' 53-man NFL roster and was expected to continue his contract on their practice squad. Rees-Zammit will instead join the Jaguars' practice squad - where he has been listed as a wide receiver - after they opted to sign the 23-year-old once the waiver deadline had passed. The former rugby wing had been signed as a running back by back-to-back Super Bowl champions Kansas on a three-year deal after successfully coming through the NFL's International Player Pathway program (IPP). He played three pre-season games for the Chiefs, including one against the Florida-based Jaguars, but missed out on their 'cutdown day' selection.

  Teams have an off-season training squad of 90 players and must select 53 for the start of the season, the deadline for which was Tuesday. Rees-Zammit was placed on waivers, meaning other teams could sign him, though it had been expected he would continue his development with Kansas City having initially signed a three-year contract. Jacksonville were one of several franchises that showed interest in Rees-Zammit after his impressive showing in the IPP pro day in March. The former British and Irish Lion made his American football debut against Jacksonville earlier this month in the Chiefs' opening pre-season game. Each NFL team can have one international player on its practice squad alongside 16 other players. Practice squad players can work out during the week with NFL teams but are ineligible to play in actual games unless the player is elevated to the regular roster. Rees-Zammit shocked the rugby world in January when he announced he was quitting Wales and Gloucester to pursue a dream to play in the NFL. He will now pursue that ambition with the Jaguars in Florida, a team which have a strong presence in the UK. The Jags will play twice in London this season, facing the Chicago Bears at Tottenham Hotspur Stadium before hosting the New England Patriots at Wembley.
