title: Nazanin Zaghari-Ratcliffe's husband on her return - BBC News
date: '2022-03-16'
section: General
url: http://www.bbc.co.uk/news/uk-60764547
content: |-
  Nazanin Zaghari-Ratcliffe's husband is awaiting his wife's return from Iran after years of campaigning.

  Nazanin Zaghari-Ratcliffe, the British-Iranian woman detained in Iran nearly six years ago, is on her way to the UK where her family await.

  Her husband Richard Ratcliffe campaigned for his wife's release, while caring for their daughter, Gabriella.
