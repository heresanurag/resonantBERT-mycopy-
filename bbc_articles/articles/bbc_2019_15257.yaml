  Ben Stokes did not train with England on Tuesday after his father was admitted to hospital after suffering a serious illness.

  Last updated on .From the section Cricket

  Coverage: Live text commentary and The Cricket Social on the BBC Sport website

  Ben Stokes did not train with England on Tuesday because his father had been admitted to hospital in South Africa after suffering a serious illness.

  Stokes' father, Ged, was in a critical condition after being taken to hospital in Johannesburg on Monday.

  All-rounder Stokes, 28, did not attend England's training session at SuperSport Park so he can be at his 64-year-old father's bedside.

  "It puts things in perspective," said England captain Joe Root.

  "We're here to play good, hard cricket, but it's important as a squad that we want Ben and his family to have all the support they can get."

  Root said he did not know whether Stokes would be available for the first of four Tests against South Africa, which begins on Thursday (08:00 GMT).

  "What's most important is we support him and his family. It's crucial that comes first," he added.
