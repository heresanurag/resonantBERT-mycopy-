title: 'Chelmsford murder probe: Human remains found at daughter''s home - BBC News'
date: '2023-09-19'
section: Essex
url: http://www.bbc.co.uk/news/uk-england-essex-66852004
content: |-
  Virginia McCullough appears at crown court charged with the murders of her parents in Chelmsford.

  Remains have been found at a house, in Great Baddow, during the search for the missing couple Lois and John McCullough

  Human remains, believed to be those of a couple whose daughter is charged with their murder, were found at the defendant's home, police confirmed.

  Police were called to an address in Pump Hill, Chelmsford, on Wednesday over concerns for the welfare of two people in their 70s, who were missing.

  Virginia McCullough, 35, of Pump Hill, has appeared at crown court charged with killing John and Lois McCullough.

  The judge set a provisional trial date for May.

  The defendant was accused of murdering her parents in Chelmsford between 21 August 2018 and 15 September 2023.

  Ms McCullough appeared before Chelmsford magistrates on Monday, and appeared at Basildon Crown Court via video link from HMP Peterborough on Tuesday.

  Judge Samantha Leigh remanded her into custody until a plea hearing on 1 December, with a provisional two-week trial scheduled to take place at Chelmsford Crown Court beginning on 13 May.

  No application for bail was made.

  Police remained in Great Baddow where the remains were found

  Essex Police said it received reports of concern for the wellbeing of two people aged in their 70s on 13 September.

  The force said it began an investigation and that detectives later found human remains in Pump Hill, Great Baddow.

  Det Supt Rob Kirby, of the Kent and Essex Serious Crime Directorate, said on Monday that the investigation was "incredibly complex".

  He said a police presence would remain on the street "throughout the coming days".

  The family of John and Lois McCullough, who are being supported by specialist officers, said in a statement released through police: "We are deeply shocked by their deaths and ask for privacy at this difficult time."

  Essex Police said officers would remain in the area for some time

