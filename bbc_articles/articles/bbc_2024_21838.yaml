content: |-
  Glasgow's bid to rescue the 2026 Commonwealth Games takes a further twist after Australian authorities offer "a multi-million pound investment".

  Glasgow 2026 would be a smaller-scale event than in 2014

  Glasgow's protracted bid to rescue the 2026 Commonwealth Games has taken a further twist after Australian authorities promised "a multi-million pound investment" to help finalise the deal. Earlier this week, it emerged that the UK government offered £2.3m to help cover safety and security costs associated with the scaled-down, privately-funded event, but asked the Scottish government to match that figure. However, Holyrood politicians remain concerned by what cabinet minister Neil Gray called the "reputational risk and financial risk" of the bid. Glasgow hosted the Games in 2014, but the 2026 proposal would feature 10 sports across four venues, instead of the 18 that took place a decade ago.

  While the stasis continues - and the timescales becoming increasingly pressing - Commonwealth Games Australia have offered to bridge any shortfall. They have told both their Scottish counterparts and the Scottish government that they are prepared to invest some of the compensation they received when the Australian state of Victoria withdrew as hosts last year due to financial issues. “We want to do all that we can to make Glasgow 2026 a reality,” president Ben Houston said. “We appreciate that the model is different and that that creates perceived financial and reputational challenges, but we have every confidence in the model. “Now is not the time to walk away from a Games that has inspired for generations, and we look forward to working collaboratively toward an outcome that benefits Commonwealth nations, their athletes, coaches and fans.” Commonwealth Games Scotland - who are behind the Glasgow bid - have welcomed the offer. In a statement they said the Australians' "willingness to invest, to further alleviate concerns of perceived financial and reputational risk, shows the high regard on which our cost-effective proposal is held within the global sport and events community.”
