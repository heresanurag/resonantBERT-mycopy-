content: |-
  Dog sled teams have competed in the annual marathon race over 300 miles in northern Minnesota.

  The annual Beargrease Dog Sled Marathon took place this week in the cold and snow of northern Minnesota. After months of training, dogs ran the 300-mile (480km) course.
