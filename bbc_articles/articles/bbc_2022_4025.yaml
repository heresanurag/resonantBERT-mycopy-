title: 'Ukraine war: Huge fireball lights up night sky over Lutsk - BBC News'
date: '2022-03-12'
section: General
url: http://www.bbc.co.uk/news/world-europe-60706789
content: |-
  According to eyewitness accounts from the area, a nearby airfield was hit by strikes.

  Footage shows a large fireball lighting up the night sky over the Ukrainian city of Lutsk, in the early hours of Friday morning.

  According to eyewitness accounts, a nearby airfield was hit by three strikes.
