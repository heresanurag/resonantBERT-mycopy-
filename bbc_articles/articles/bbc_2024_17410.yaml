title: BBC Roblox gaming pop-up injects fun into election process - BBC News
date: '2024-07-04'
section: General
url: http://www.bbc.co.uk/news/videos/cjr48ykkrddo
content: |-
  The BBC has built a special election pop-up in the Roblox video game.

  Players can meet Clive Myrie, Laura Kuenssberg and Jeremy Vine whilst helping Larry the Cat find ballot boxes across the game.

  The aim is to have fun whilst learning about the election process – you can check it out here., external
