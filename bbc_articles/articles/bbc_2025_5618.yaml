title: Moment Blue Ghost spacecraft lands on the Moon - BBC News
date: '2025-03-07'
section: General
url: http://www.bbc.co.uk/news/videos/cvg5v5deg8yo
content: |-
  Newly released footage shows Firefly Aerospace's Blue Ghost making the second-ever commercial moon landing.

  Newly released-footage shows the moment Firefly Aerospace's Blue Ghost became the first commercial spacecraft to successfully land on the Moon.

  It touched down in the Mare Crisium basin, located in the north-east quadrant of the Moon, on 2 March.

  Blue Ghost left Earth on 15 January, with the intention of exploring the Sea of Crises, and is the latest collaboration between US space agency Nasa and private companies.
