content: |-
  After 17 years of filming in the town, the cast of the hit BBC comedy say a final goodbye to Barry.

  This video can not be played To play this video you need to enable JavaScript in your browser. Gavin and Stacey say farewell to Barry after 17 years

  At the end of the day, when all's said and done... it's a wrap. The cast of Gavin and Stacey bid farewell to Barry for the final time as they finished filming there this week. Crowds had gathered come rain or shine in the Vale of Glamorgan town to see the hit BBC comedy’s grand finale, which will air on Christmas Day, being filmed. The show’s stars, including co-writers Ruth Jones and James Corden, as well as Welsh favourites Joanna Page and Rob Brydon, interacted with locals - but were determined to give nothing about the plot away.

  The cast gathered to say goodbye to spectators on their final day on Trinity Street

  Fans have waited five years for new material from the show, which spanned three series and a Christmas special, and was left on a cliff-hanger in 2019. Much of the show, even some scenes set in England, have been filmed in south Wales over the years and it was no different for the last instalment. Locations over the years have included Nessa's slots and Marco's cafe in Barry Island, the former Oceana nightclub in Cardiff, Pam and Mick's house in Dinas Powys and Dave's caravan in Rhoose. But the cast confirmed that they have now finished on Trinity Street, and will be moving on from Barry to complete the episode.

  The cast came out on the street to say goodbye to onlookers, with Jones thanking them for being "so patient".

  Ruth Jones thanked spectators for their support ahead of the final episode

  "You haven’t seen anything because we’ve been indoors, which shows you're true committed fans of the show and we hope that you won’t be disappointed on Christmas Day, when all will be revealed," she said. "This is our farewell now to Barry and to Trinity Street, so you won’t be seeing us here anymore but we’ve had a wonderful 17 years, it’s been fantastic."

  Filming has officially wrapped for Gavin and Stacey in Barry after 17 years

  James Corden added: "Thank you very much to everyone, we’ll see you soon." As the sun set in the background, the cast then waved and walked down the show's well-known hill one final time to a chorus of cheers.
