title: 'Lercanidipine: blood pressure drug recalled after wrong dose printed on pack
  - BBC News'
date: '2025-04-19'
section: Health
url: http://www.bbc.co.uk/news/articles/cwy7kpwn9l4o
content: |-
  People taking lercanidipine are being urged to check their medication after thousands of packs were recalled.

  Packs of 20mg tablets were incorrectly labelled as 10mg on some boxes

  Patients who take a common drug for high blood pressure are being urged to check their medication after a batch was recalled over the wrong dose being printed on the box. The Medicines and Healthcare Products Regulatory Agency (MHRA) says some packs of lercanidipine, manufactured by Recordati Pharmaceuticals, have been wrongly labelled as containing 10mg tablets when they contain 20mg pills. More than 7,700 packs that have already been distributed are subject to the recall, according to the MHRA. People with the wrongly-labelled medication are being urged to contact their GP or pharmacist, or call NHS 111. The NHS says taking too high a dose of lercanidipine can make you feel dizzy and sleepy.

  The alert from the MHRA, external said on Thursday that it was informed by Italian pharmaceutical firm Recordati that the error was limited to one batch of lercanidipine, which was first distributed on 10 April. Packs under the recall carry the batch number MD4L07 and have an expiry date of January 2028. While the incorrect strength is printed on the face of the affected packs, the correct dose is printed on the blister strips inside and on the side of some of the boxes. People who have been prescribed 20mg tablets should verify they have the correct strength by checking the printing on the blister strips, the MHRA says. Those who have been prescribed 10mg tablets should seek medical advice immediately. If patients cannot speak to a medical professional, the MHRA suggests they take half a 20mg tablet as a temporary measure.

  Dr Alison Cave, chief safety officer at the MHRA, said: "Healthcare professionals such as pharmacists are also being asked to stop supplying medicine from the affected batch and to return it to the supplier." She also advised anyone who experiences "suspected adverse reactions" to report them via the MHRA's Yellow Card scheme. In a statement to the BBC, a spokeswoman for Recordati said the company was "working proactively" with the MHRA and would be contacting customers who could have received the affected batch. She added: "We are investigating the root cause and continue to work with our partners to isolate the issue and minimise disruption to our patients. Patient safety remains our top priority." High blood pressure can lead to serious problems such as heart attacks or strokes, but the NHS says, external lifestyle changes and medication can help people remain healthy. There are four main types of blood pressure medication. Lercanidipine is a calcium channel blocker, which works by making it easier for the heart to pump blood around the body.
