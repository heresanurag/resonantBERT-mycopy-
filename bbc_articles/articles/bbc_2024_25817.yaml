title: Original Iron Maiden singer Paul D'Anno dies, aged 66 - BBC News
date: '2024-10-21'
section: Culture
url: http://www.bbc.co.uk/news/articles/cy0l0nnnekdo
content: |-
  The band's first singer appeared on two albums before being replaced by Bruce Dickinson.

  Di'Anno was known for his guttural, aggressive vocal style

  Paul Di'Anno, the original singer for heavy metal band Iron Maiden, has died at the age of 66. Born Paul Andrews, the musician featured on the band's first two albums, Iron Maiden and Killers, establishing them as a crucial part of the new wave of British heavy metal. He left the band in 1981 and was replaced by Bruce Dickinson. Di'Anno later admitted he had been partying "non-stop, 24 hours a day" and that the impact of his lifestyle "wasn’t fair to the band, the fans or to myself, external". The band's current members paid tribute, saying they were "all deeply saddened" by his death.

  In a statement on social media, bass player Steve Harris said it was "just so sad he's gone". "At least he was still gigging until recently, it was something that kept him going, to be out there whenever he could. He will be missed by us all. Rest in peace mate." The rest of the band's statement said: "Paul's contribution to Iron Maiden was immense and helped set us on the path we have been travelling as a band for almost five decades. "His pioneering presence as a frontman and vocalist, both on stage and on our first two albums, will be very fondly remembered not just by us, but by fans around the world." Di'Anno's death was announced by record label Conquest Music, on behalf of his family. In a statement, they said Di'Anno had "passed away at his home in Salisbury". No cause of death was given. "Conquest Music are proud to have had Paul Di'Anno in our artist family and ask his legion of fans to raise a glass in his memory," they added.

  The singer's contribution to the sound of British heavy metal cannot be overstated

  Born in Chingford, east London, in 1958, Di'Anno sang with numerous bands as a teenager, while working as a butcher and a chef. In 1977, he befriended Harris, who was seeking a singer for his up-and-coming metal band Iron Maiden. Di'Anno auditioned and got the job. Their sound was an anomaly during the ascendancy of punk rock, and they struggled to get gigs outside London. To address the issue, they decided to make a demo tape to drum up business. Known as the Soundhouse Tapes, the three-track demo gained them a cult following, selling 5,000 copies by mail order. By 1979, they had secured a record deal with EMI and started recording their self-titled debut. Although it was put together in a hurry, the record was hugely influential - with its combination of punk intensity and rock riffs setting the template for heavy metal in the 1980s. It entered the UK album chart at number four in April 1980, and the success of the single Running Free earned the band a coveted spot of music TV show Top of the Pops. The follow-up album, 1981's Killers, had a harder sound again. But after a world tour, Di'Anno was either kicked out of the band or left of his own accord. Either way, he said success had led him to a dark place. "I was already a fairly excessive character, but there I really went for it," he told Rock Hard magazine in 2004. "I was on another planet, as well as the rest of the band." With Dickinson taking over, Iron Maiden went on to become one of rock's most successful groups, with genre-defining hits like Run To The Hills and Can I Play With Madness. But Di'Anno never held a grudge against the band, or his replacement. "Everyone thinks that we hated each other, which is [completely wrong]," he told SDTV in an interview last month, external. "That's the press for you." He also denied rumours that he had been underpaid for his contribution to the first two Iron Maiden albums, which included co-writing credits on key tracks like Remember Tomorrow, Killers, Sanctuary and Running Free. "To be honest with you, it's nobody's damn business [but] I got paid very well," he told Rock Hard in 2022. "They looked after me. End of story."

  The singer was touring and releasing music this summer

  After leaving Iron Maiden, Di’Anno's raw, aggressive vocals were cited as an influence by metal bands including Metallica, Pantera and Sepultura. He stayed in music, both a solo artist and as a member of bands like Gogmagog, Battlezone, Praying Mantis, and Killers. In recent years, he had been performing in a wheelchair due to serious health issues including lymphedema, a condition that causes swelling of your body tissue. In 2022, fans helped him raise money to have major knee surgery in Croatia. Despite that, he kept up a robust touring schedule, playing more than 100 shows in 2023 and 2024. A career retrospective album, The Book of the Beast, was released last month, including highlights from his solo career and two "reworked" versions of Iron Maiden songs Tomorrow and Wrathchild. A documentary about his life is scheduled for release at the end of the year.
