  A number of Dali experts had raised their eyebrows at the claim before his body was exhumed, with biographer Ian Gibson noting the artist's own claim of "I'm impotent, you've got to be impotent to be a great painter".

  It is not known how Ms Martinez, who had been told from an early age she was the painter's daughter, has responded to the news.

  Dalí's wife, Gala, died in 1982 - after which he is said to have lost much of his zest for life
