title: 'Budget 2020: Small business rates abolished for 2020 - BBC News'
date: '2020-03-11'
section: General
url: http://www.bbc.co.uk/news/uk-politics-51835600
content: |-
  Rishi Sunak announces small venues and shops will not have to pay small business rates this year.

  The Chancellor, Rishi Sunak has announced that the government is scrapping business rates for small venues and shops this year.

  In his Budget speech, he said other venues, such as bed and breakfasts, gyms and leisure centres, all below a value of £51,000 would pay no business rates.

  He said the measure would save each business around £21,000.

