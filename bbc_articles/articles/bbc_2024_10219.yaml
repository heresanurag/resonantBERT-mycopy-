content: |-
  Police say they are investigating the discovery at a play park in an Oxfordshire village.

  Nails have been found glued sharp-end up to a slide, swings and other play equipment in a village park. Parents in Marcham, Oxfordshire, have described being left shocked by the discovery, which was made on Monday following a weekend community event. Thames Valley Police said it was investigating and urged anyone with information to get in contact. Marcham Parish Council, which owns the park, said it was "shocked and saddened" by the incident.

  Nails were also found on swings

  Parish council chairman Mark Harvie said the nails were found by a "distressed" parent early in the morning and the situation was flagged up on a local Facebook group. It came a day after the Big Marcham Weekend, a family-friendly two-day event held at the park.

  "Marcham is a great community, which was reflected in the very positive community event, which is part of the reason why everyone is so shocked," Mr Harvie said. "This is very much out of the ordinary - we've never [previously] had any reports like this." He said the parish council was "very much hoping" it was a one-off incident, and added that people should remain vigilant and check equipment before it was used.
