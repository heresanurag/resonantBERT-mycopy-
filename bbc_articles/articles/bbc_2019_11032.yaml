title: Dorian triggers 'panic, pillaging, looting’ in Bahamas - BBC News
date: '2019-09-05'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-49573590
content: |-
  A woman fleeing the Bahamas hurricane says people are trying to shoot each other for supplies.

  "There's just no way everyone's going to get out," says a woman fleeing Hurricane Dorian in the Bahamas, adding that people are trying to shoot each other for supplies.
