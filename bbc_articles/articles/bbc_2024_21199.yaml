id: bbc_2024_21199
title: Path to Peace
date: '2024-08-09'
section: General
url: http://www.bbc.co.uk/news/extra/s1pnrpx9j8/path-to-peace
content: "Thirty years ago, the IRA called its ceasefire, six weeks later loyalist\
  \ paramilitaries followed suit. Former BBC correspondent Brian Rowan recalls how\
  \ those breakthroughs led to peace in Northern Ireland.\n\nThe loyalist paramilitaries\
  \ waited more than six weeks before responding.\n\nOn 13 October, they announced\
  \ that they would “universally cease all operational hostilities”.\n\nAt a press\
  \ conference on 13 October 1994, Gusty Spence announced the loyalist ceasefire At\
  \ a press conference on 13 October 1994, Gusty Spence announced the loyalist ceasefire\n\
  \n“We first had to establish beyond reasonable doubt the bona fides of the republican\
  \ movement and, even more importantly the security of the union,” a source, who\
  \ I spoke to as part of the Ceasefire 30 project, told me.\n\nThirty years ago that\
  \ source was part of that Combined Loyalist Military Command.\n\nWhen we met, he\
  \ gave me five pages of handwritten notes – blue ink on green paper: \n\n“The spectre\
  \ of Perfidious Albion loomed large,” he wrote. It was a reference to fears of some\
  \ secret deal.\n\nAt one point in 1994, loyalists had thought about “outflanking”\
  \ the IRA, “but a series of events beyond our control ruled that out,” the source\
  \ said, referencing a series of shootings and retaliations that meant the loyalist\
  \ ceasefire would not come first.\n\nAs was so often the case in Northern Ireland,\
  \ events changed things, on this occasion the thinking and direction of loyalist\
  \ leadership.\n\nBack in late 1994, I became aware of a quiet initiative, involving\
  \ representatives of the loyalist leadership and the then Church of Ireland Archbishop\
  \ Robin Eames.\n\nThe loyalists had a document, dated March 1994, which they wanted\
  \ him to share with then Prime Minister John Major.\n\nIt outlined “terms for consideration\
  \ which would enable hostilities from this source to cease”.\n\nThirty years on,\
  \ we speak casually of the different peace initiatives and of those involved in\
  \ them, but listening back to a recorded conversation with Archbishop Eames from\
  \ November 1994 – with both ceasefires in place - I was reminded of the nervousness\
  \ at that time and of the risks taken by those who were brave enough to engage directly\
  \ with those who controlled the guns.\n\n“They asked me if I would look at something\
  \ in a document form showing what their concerns were,” the Archbishop began before\
  \ pausing.\n\n“Now, Brian, have they agreed that that is known, that they have a\
  \ position document?\n\nBecause I agreed at that point, that that document would\
  \ be entirely private.”\n\nAs the tape was running, I told him that I knew about\
  \ it and that I would address this with them. He insisted that I would check, and\
  \ then gave me his view of the document.\n\nHe believed most of the concerns raised\
  \ could be addressed in a ceasefire situation, but “not down the barrel of a gun”.\n\
  \nThirty years later, I asked my loyalist source for the thinking behind their decision\
  \ to approach Archbishop Eames: “The mere whiff of cordite would send the great\
  \ and the good scattering and running for cover.\n\n“A man of the cloth appeared\
  \ a safe bet. We could appeal to his pastoral concerns in order that he take the\
  \ risk of contamination by association in order to achieve the greater good. After\
  \ all, the prize was a big one.”\n\nArchbishop Eames made another important intervention\
  \ in between the two ceasefires of 1994. He met Major and was told there was no\
  \ secret agreement to bring about the IRA ceasefire, words he repeated in a news\
  \ conference in September that year. The loyalists were listening and weeks later\
  \ delivered their ceasefire, boldly stating that the union is safe.\n\nThe church\
  \ leader got to read the words before they were announced on 13 October.\n\n“I thanked\
  \ God particularly because I had said to them at one stage, ‘A ceasefire is going\
  \ to be very, very hollow unless you can say something about the victims of violence’.\
  \ And I was relieved when I saw they spoke about remorse.”\n\nOne of those who spoke\
  \ about remorse was Gusty Spence.\n\nHe founded the modern UVF in the 1960s and\
  \ was jailed in 1966 for murder, serving 18 years before being released and becoming\
  \ involved in politics.\n\nHe was the man who delivered the ceasefire statement\
  \ on behalf of the Combined Loyalist Military Command.\n\nAcross the Irish border\
  \ in the Republic of Ireland, Taoiseach Albert Reynolds had been taking the pulse\
  \ of unionist and nationalist communities in Northern Ireland.\n\nHe understood\
  \ that peace was about much more than an IRA ceasefire and knew the fine detail\
  \ of the talks involving Social Democratic and Labour Party (SDLP) leader John Hume\
  \ and Sinn Féin leader, Gerry Adams.\n\nThrough Archbishop Eames and the Presbyterian\
  \ minister Roy Magee, he was also hearing the concerns of the unionist/loyalist\
  \ community.\n\nHe knew that the challenge of any political initiative that he and\
  \ Major would take would require a balancing of words and aspirations.\n\nThey were\
  \ tiptoeing over the eggshells of 1990s Northern Ireland.\n\nIn the Ceasefire 30\
  \ project, the former taoiseach's daughter, Miriam Reynolds, after conversations\
  \ with her sisters and brothers, wrote: “We wouldn’t put peace past him.\n\n“We\
  \ backed him. But did we believe him when he said he’d deliver peace?\n\n\"Dad was\
  \ a great man for the unthinkable.\n\n\"But he valued odds and evidence. The real-time\
  \ evidence was ominous.”\n\nFirst there was the Shankill bomb of October 1993 in\
  \ Belfast and the retaliation shootings and killings, then the intercepted loyalist\
  \ arms shipment and the revelation of secret contacts between the UK government\
  \ and the IRA.\n\nThe atrocity at the Rising Sun bar in Greysteel happened a week\
  \ after the Shankill bombing The atrocity at the Rising Sun bar in Greysteel happened\
  \ a week after the Shankill bombing\n\nBut Miriam Reynolds writes of an impossible\
  \ peace that was looking possible.\n\nShe saw it in the relationship her late father\
  \ built with John Major and in the Downing Street Declaration of December 1993.\
  \ \n\nShe saw it in the work and words of Archbishop Eames, particularly on the\
  \ issue of consent in Northern Ireland regarding any constitutional change. \n\n\
  She saw it in the quiet diplomacy of Fr Alec Reid, the priest who served as an intermediary\
  \ linking the then taoiseach and Gerry Adams.\n\n“The austere Fr Reid typically\
  \ called, in person, at 3am, often carrying ‘A Chara’ (my friend) correspondence.”\n\
  \nIt was Fr Reid who provided the taoiseach with a draft of the proposed IRA ceasefire\
  \ statement, the one he read to Nancy Soderberg in order to secure the visa for\
  \ Joe Cahill.\n\nReynolds discussed the statement with his key adviser on Northern\
  \ Ireland Martin Mansergh.\n\nWhile the taoiseach knew it was not perfect, he was\
  \ prepared to run with it."
