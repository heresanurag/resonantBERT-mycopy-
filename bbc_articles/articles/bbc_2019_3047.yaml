title: Finding elite Russian troops during 2014 Crimea annexation - BBC News
date: '2019-03-18'
section: General
url: http://www.bbc.co.uk/news/world-europe-47558927
content: |-
  On the anniversary of Crimea's annexation, this is how the BBC discovered Russian troops were involved.

  On this day five years ago, Russian forces annexed Ukraine's Crimea peninsula - a move condemned internationally. Crimea has a Russian-speaking majority.

  How did BBC journalists discover Russian special forces were involved, despite official denials from the Kremlin?
