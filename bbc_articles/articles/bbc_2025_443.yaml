  Saturday's impressive performance in the 4-0 triumph against the woeful Foxes means Everton have now scored eight goals in their past three matches, all wins. It marks an incredible contrast to when Sean Dyche was in charge - only three of his 19 league games this season were won, with Everton failing to score in 11 of them. But the win lifted the Toffees up to 15th in the table, nine points clear of the relegation zone with a game in hand over the sides occupying the last four places. "A brilliant result," said Moyes. "A great performance in many aspects; sometimes we didn't play quite so well. If you had given me three wins out of four games in the position we are in, I would say 'thanks very much' but to score the goals and we could have got a couple more... We are doing a lot of really good things." Supporters may have wanted games to end early while watching the often turgid and one-dimensional style of play deployed by Dyche, but one fan was left asking for "20 more minutes" when the fourth official's board was held aloft in stoppage time. At full-time, goalscorer Beto acted as the cheerleader, rousing those in the Gwladys Street End, Moyes waved towards those in the main stand with a beaming smile on his face, while the home faithful were left singing the club's 'Spirit of the Blues' anthem long after the final whistle. Injuries to Dominic Calvert-Lewin, Armando Broja and Youssef Chermiti left Beto as Everton's only fit senior striker and the Portuguese stepped up when needed. "I'm really pleased for Beto," Moyes said. "The people who have been here much longer than me will know more about Beto. I'm just getting to know him. "He is a great kid, works hard in training, tries to improve himself. Sometimes in life, you need an opportunity. Today, he got an opportunity and the receptions he got coming off the pitch was as good as we've heard here for a long time. "Good credit to him he stuck at it and took his two goals well."

  Everton host Merseyside rivals Liverpool in their next league game on 12 February in a match postponed in December because of the weather. Arne Slot's side are in imperious form, sitting nine points clear at the top of the table after beating Bournemouth 2-0 on Saturday. Former Reds defender Stephen Warnock said on BBC Radio 5 Live: "Liverpool will now look back and wish they had played that game against Everton previously. Now, they have to face David Moyes. "He knows how to set his team up for a derby and they are in good form now." Leicester boss Ruud van Nistelrooy added: "After 10 seconds and five minutes you are 2-0 down at Goodison against a team with most clean sheets. You give yourselves a mountain to climb and didn't come back from that. "If you have a start like that, then it is difficult."
