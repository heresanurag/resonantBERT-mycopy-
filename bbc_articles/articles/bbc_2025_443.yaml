  'Not a magician' but Moyes casts spell again at Everton

  Everton have scored eight goals in their last three games under David Moyes

  Just a couple of weeks ago, David Moyes said he "can't magician" Everton to scoring some goals. Some quipped that they would have needed a Potter to conjure some wizardry after Englishman Graham took over at West Ham. But Moyes is waving his wand again in his second spell at Goodison Park. Ten was the magic number on Merseyside on Saturday. Abdoulaye Doucoure's goal after that many seconds came quicker than Moyes can say 'Expelliarmus' and the thrashing of Leicester was sealed by fans' favourite Iliman Ndiaye, who wears that particular shirt. Moyes said: "The players have just given themselves a bit of confidence and positivity. We are only trying to give them as much confidence as we can. "We have got a good strong base defensively and trying to find ways to score a few more. "I am certainly not getting carried away. After eight seconds, I was thinking 'my goodness this is fabulous'. The second goal backed it up."

