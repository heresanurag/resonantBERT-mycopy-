  Speaking on Wednesday, Ass Ch Cons David Beck said he was "absolutely appalled" that there had been another murder of a woman in Northern Ireland. He said: "Too many women are losing their lives at the hands of men". "We are absolutely determined that we will be relentless in our pursuit of the perpetrators and cannot allow another woman to die as a result of violence at the hands of men.”

  Police confirmed on Tuesday that following a review of its previous engagements with Ms Ward the case had been referred to the ombudsman. The Police Ombudsman's Office said the focus of its investigation would be on the police response to a report of violence in the weeks leading up to her death. It confirmed the case was referred to it by police on Sunday night.

  Police have said Ms Ward was the fourth woman to be killed in Northern Ireland in the last six weeks. Combating violence against women and girls (VAWG) has been rising up the list of police and political priorities recently. Two years ago, the PSNI launched an action plan. This was followed by an Executive Office strategy published last month, in response to the fact that more than 30 women and girls have been murdered in Northern Ireland in the last five years. In the 12 months to July, the PSNI recorded 22,400 VAWG-related offences. The PSNI has said this is a 16% drop year-on-year and showed some progress is being made.
