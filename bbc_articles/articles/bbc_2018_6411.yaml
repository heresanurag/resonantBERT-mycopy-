id: bbc_2018_6411
title: Eruptions from Hawaii's Kilauea volcano threaten escape route - BBC News
date: '2018-05-20'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-44187927
content: |-
  Eruptions could block escape routes for residents on south-eastern corner of Big Island, Hawaii.

  Residents in the south-eastern corner of Hawaii's Big Island have been told to evacuate immediately.

  Lava from the eruption of the Kilauea volcano is approaching a major coastal highway.
