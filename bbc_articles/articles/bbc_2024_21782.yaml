  Cristiano Ronaldo has made a career out of breaking records. His successes include being top scorer in Uefa Champions League history, having the most goals in the European Championship, and making more international appearances than anyone else. Last week he became the first footballer to score 900 top-level career goals. As with his playing career, he still has scope to improve his numbers on social media too, as unlike some of his rivals, he is not on TikTok or Threads. All of which is likely to add to another figure he dominates: earnings. According to Forbes, his total earnings now stand at $260 million, external - the highest of any athlete.
