title: Father's Day tribute to Chris Cornell - BBC News
date: '2018-06-17'
section: Entertainment & Arts
url: http://www.bbc.co.uk/news/entertainment-arts-44515326
content: |-
  The late singer's daughter posted a duet of the pair singing, saying she missed his love every day.

  The singer's wife, Vicky (r), and his children, Toni, Christopher and Lilli Jean, attended a vigil on the anniversary of his death last month

  Chris Cornell's daughter has paid an emotional tribute to her late father on Father's Day, posting a duet recorded by the pair on his Instagram account.

  Thirteen-year-old Toni Cornell shared the recording of Nothing Compares 2 U, saying she missed the Soundgarden singer's love "every day".

  Cornell was found dead following a concert in Detroit last year. He is understood to have hanged himself.

  "You were the best father anyone could ask for," Toni Cornell wrote.

