  Alongside a photo of her father holding her as a baby, his daughter wrote: "Daddy, I love you and miss you so much.

  "Our relationship was so special, and you were always there for me.

  "You gave me courage when I didn't have any. You believed in me when I didn't.

  "Recording this song with you was a special and amazing experience I wish I could repeat 100 times over - and I know you would too.

  "Happy Father's Day daddy, nothing compares to you. Toni."

  Cornell's death in May 2017 was 'sudden and unexpected'

  Cornell, a leading voice of the 1990s grunge movement, was most famous as the lead singer of Seattle band Soundgarden, which formed in 1984 and went on to release six studio albums.

  He later joined the supergroup Audioslave and had his biggest hit with the 2006 track You Know My Name, the theme song to Bond film Casino Royale.
