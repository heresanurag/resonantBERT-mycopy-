content: |-
  The popular path could be moved because the land is "very unstable", says a town council.

  This video can not be played To play this video you need to enable JavaScript in your browser. The coastal cliff path has had several serious landslides in recent years

  A popular coastal path could be moved due to fears of landslides in the area, according to local officials.

  Town councillors said they were concerned the scenic coastal path that stretches above Nefyn beach towards Porthdinllaen could be re-routed because the land is "very unstable".

  One expert has warned threats to coastal paths in Wales will rise due to climate change.

  Gwynedd council said it was working with Nefyn Town Council on a solution.

  There have been concerns regarding the Nefyn coastline for some time with the latest major landslide happening in 2021.

  Gruffydd Williams, who represents Nefyn in Gwynedd council, said it would be a "travesty" if the path was lost.

  "It's part of the heritage of the local community," he said.

  "People have been using it for well over a century. It's used on a daily basis by old and young people and tourists love to come and take in the fantastic views we have here."

  The coastal path attracts visitors and is an important walking route for local residents

  Mared Llywelyn Nefyn, the chairwoman of the town council, said the path brings a big economic boost to the area.

  "We sent questionnaires out to businesses and all of them state that the path is an integral part of why people come to stay here," she said.

  Mared Llywelyn Nefyn stressed the importance of the path for the local economy

  Dr Paula Roberts, from Bangor University, said the threat to coastal paths like this one would increase over the next few years due to the increasing impact of climate change.

  "More intense weather patterns, more energetic wave patterns and Increasing rainfall... unfortunately it's landslides that will occur," said Dr Roberts.

  "The more threats we see across the coastline in Wales, local authorities are going to have to think about moving coastal paths or doing some work to maintain them in their current positions."

  Nefyn Town Council said it was formulating a bid to the UK government's Levelling Up Fund in order to get investment to secure the land.

  Gwynedd council said its priority was ensuring the safety of walkers.

  This video can not be played To play this video you need to enable JavaScript in your browser. The last major landslide happened in 2021

  "We appreciate that Llwybr Penrallt is an important and popular resource for people and we emphasise it is still open and we have no plans to close it," it said.

  "Many landslides have been in Nefyn and Morfa Nefyn in recent times, and unfortunately the reality is we are likely to see more as the sea level rises and as we see more extreme weather because of climate change.

  "Engineering reports showed recently that Llwybr Penrallt was very unstable. In response we have been looking at options that would ensure access to the coastal path in the long term."
