content: |-
  Round three of the Six Nations brings together two sides under interim management but in hugely contrasting form and mood.

  Easterby looks to new leaders for history chase

  Ireland have taken 10 points from 10 available in the 2025 Six Nations

  Coverage: Watch on BBC One; listen on BBC Sounds, BBC Radio Ulster & BBC Radio Wales; live text and highlights on BBC Sport website and app

  To begin round three of the 2025 Six Nations, two sides with very different experiences of the word interim will go head to head. For the visitors Ireland, with head coach Andy Farrell on British and Irish Lions duty, the temporary switch to his assistant Simon Easterby has not derailed their bid for a historic third consecutive Six Nations title. Indeed, "seamless" appears to be the adjective of choice for the Ireland squad as back-to-back bonus-point wins have the reigning champions top of the table after the first block. In contrast, while the Principality Stadium roof will guard against the elements for the 80 minutes, for the hosts it is impossible not to view the game in the wider context of the storm clouds gathered over Welsh rugby. The Welsh Rugby Union used the down week to part company with head coach Warren Gatland, recent results accelerating a move that had been widely predicted to occur only after the championship concluded. After demoralising losses to France and Italy, Cardiff's Matt Sherratt takes up the reins, although with a new contract at the Arms Park appearing to indicate he is not in the running to be named Gatland's permanent successor. While Easterby himself has been talked about as a potential candidate - he distanced himself from such reports on Thursday - regardless of the length of Sherratt's reign, Wales fans will be hoping for some signs of recovery from a side who have lost their past 14 Tests dating back to the 2023 World Cup.

  Change this weekend has not been limited merely to the coaching box. Sherratt has made eight personnel switches from the side that lost against Italy last time out, along with two positional alterations. Scarlets wing Ellis Mee, off the back of just 10 senior outings for his region, will make his Wales debut, while significantly there are returns for Gareth Anscombe and WillGriff John. The former has not played in this competition since Wales clinched the Grand Slam six years ago, also against Ireland. The latter makes his Six Nations debut having not played international rugby for three and a half years. For Wales, perhaps it was to be expected that a new broom would sweep clean. But despite the winning formula utilised in the first two games, Easterby has made seven changes to his side too, with just two of them forced by injuries. With the likes of James Ryan, Bundee Aki and Finlay Bealham held in reserve, and Hugo Keenan not involved at all, this is by some way the most callow line-up Ireland have named so far in this championship. Replacement loose-head Jack Boyle will make his Ireland debut should he be used from the bench, while tight-head Tom Clarkson is set for his first start. Jamie Osborne, Gus McCarthy, Cian Prendergast have never before featured in the Six Nations.

