  Injury, meanwhile, means Ireland go into a Test match without their influential captain Caelan Doris for the first time in four years. As the number eight's incredible streak comes to an end, his positional replacement Jack Conan said the side's back row will be "under a huge amount of pressure" to compensate for his absence. Hooker Dan Sheehan, meanwhile, will captain the side for the first time and believes the onus of leadership can be shared among the squad. "We wish that Caelan wasn't injured but someone had to step up," said the 26-year-old. "I was asked on Monday and I was absolutely delighted to take that responsibility. It's something I've enjoyed so far. "This team sort of runs itself with the leaders that are in it. There are a handful of people who could have been named captain - Pete [O'Mahony], Tadhg Beirne, Jamo [Gibson-Park], Jack Conan. "A lot of them have huge amounts of leadership and they help to run the week as well. Obviously my name gets the 'c' beside it but we know in our group we rely on a lot of people."

  Dan Sheehan has come off the bench in both of Ireland's 2025 Six Nations games so far

  With the sides in such contrasting form, Ireland's unforced changes may lead to more in Wales thinking that their visitors have not arrived with full focus. Accusations of arrogance have swirled in the build-up after an Irish radio station debated whether their side would be victorious if they took the field with only 12 or 13 players. While hardly representative of the entire nation, or indeed the team, the clip was shared widely on social media and used as an example of a developing hubris around a side who have lost just twice in their past 20 Six Nations games. For his part, Easterby - who still lives in Wales - is not underestimating the opposition at a ground where Ireland did not win a Six Nations game between 2013 and '23. "I think Wales are always dangerous," he said. "You can read into whatever around the results and performances, but at home in the Principality they're a different beast. We have to respect that." Besides, whatever about the looming prospect of France back in Dublin next time out, Ireland should have learned their lesson last year in relation to looking too far ahead. When shooting for the history of consecutive Grand Slams, they were upset by England in Twickenham last March, with the thrill of winning the title against Scotland a week later somewhat diluted by the lack of a clean sweep. Now aiming to become the first side to win three outright Six Nations titles in a row, a slip on Saturday would be filed in the same category and viewed as evidence of a lesson not learned. As Conan rhetorically asked the media this week: "If we don't go out and perform this weekend, then what does that say about us?"

