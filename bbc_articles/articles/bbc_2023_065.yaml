content: |-
  Maureen Gitau, 24, was reported missing on 10 December, having last been seen five days earlier.

  A man has appeared in court accused of the murder of a missing woman from south-east London.

  Maureen Gitau, 24, was reported missing on 10 December, having last been seen five days earlier as she left her home in Evelyn Street, Deptford.

  Mark Moodie, 54, of Nightingale Place in Woolwich, appeared at Bromley Magistrates' Court charged with her murder.

  He is next due to appear in custody at the Old Bailey on Thursday.

  The details of the charge allege that Mr Moodie murdered Ms Gitau in the borough of Lewisham on 5 December.

  Ms Gitau's body has not been found.

