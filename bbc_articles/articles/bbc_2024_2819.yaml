title: 'Watch: Tesla Norway fjord crash passengers saved by floating sauna users -
  BBC News'
date: '2024-02-02'
section: General
url: http://www.bbc.co.uk/news/world-europe-68177125
content: |-
  The users of a sauna boat came to the rescue of two people who crashed into a fjord in Oslo.

  The users of a sauna boat came to the rescue after a Tesla plunged into a fjord in Norway.

  Eyewitness videos show the car sinking into the water in Oslo, before nearby sauna goers pull a driver and passenger out of the frigid water.

  Boat captain Nicholay Nordahl told local newspaper VG that the motorists were able to warm up in the sauna afterwards.

  The car was later pulled from the water using a tow truck.
